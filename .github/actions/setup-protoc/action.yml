#
# Drop-in replacement for arduino/setup-protoc, which is pinned to a deprecated
# Node runtime and effectively unmaintained. Wraps .github/scripts/install-protoc.sh
# so every workflow installs protoc through a single, checksum-verified code path.
name: "Setup Protoc"
description: "Install the protoc compiler and add it to PATH."
inputs:
  version:
    description: 'protoc version spec, e.g. "33.x" (latest 33.*) or "33.6" (exact).'
    required: true
  repo-token:
    description: "GitHub token for the releases API (avoids unauthenticated rate limits)."
    required: false
    default: ${{ github.token }}
runs:
  using: "composite"
  steps:
    - name: Install protoc
      shell: bash
      env:
        PROTOC_VERSION: ${{ inputs.version }}
        GH_TOKEN: ${{ inputs.repo-token }}
      run: "${GITHUB_ACTION_PATH}/../../scripts/install-protoc.sh"
