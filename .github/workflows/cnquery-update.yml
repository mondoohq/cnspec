name: Bump mql

on:
  repository_dispatch:
    types: [update-mql]
  workflow_dispatch:
    inputs:
      version:
        description: "mql version"
        required: true
        type: string

jobs:
  bump-mql:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check calling user
        if: ${{ github.event_name == 'repository_dispatch' && github.event.sender.login != 'mondoo-tools' }}
        run: |
          echo "This user is not allowed to trigger the workflow"
          exit 1
      - name: Determine Version and Validate
        id: version
        env:
          # Determine which version should be released based on event type
          VERSION: ${{ (github.event_name == 'workflow_dispatch' && inputs.version) || github.event.client_payload.version }}
        run: |
          # Semantic Versioning regex (with optional 'v' prefix)
          if [[ ! "$VERSION" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: Version is not a valid semantic version."
            exit 1
          fi
          echo "Version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      # Mint a short-lived installation token from the mondoo-mergebot
      # GitHub App. App tokens bypass the same "PRs created by GITHUB_TOKEN
      # don't trigger downstream workflows" limit that motivated the old
      # CNSPEC_DEPLOY_KEY_PRIV SSH deploy key, so the checkout and the
      # subsequent peter-evans/create-pull-request can both use it.
      - name: Generate mergebot token
        id: generate-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.MONDOO_MERGEBOT_APP_ID }}
          private-key: ${{ secrets.MONDOO_MERGEBOT_APP_PRIVATE_KEY }}
          owner: mondoohq
          repositories: cnspec
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          token: ${{ steps.generate-token.outputs.token }}

      - name: Import environment variables from file
        run: cat ".github/env" >> $GITHUB_ENV
      - name: Install Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: ">=${{ env.golang-version }}"
          check-latest: true
          cache: false
      - name: Bump mql
        env:
          MQL_VERSION: ${{ steps.version.outputs.version }}
        run: |
          MAJOR=$(echo "${MQL_VERSION}" | cut -d. -f1)
          go get go.mondoo.com/mql/${MAJOR}@${MQL_VERSION}
          go mod tidy
          echo "${MQL_VERSION}" > VERSION

      - name: Prepare title and branch name
        id: branch
        env:
          MQL_VERSION: ${{ steps.version.outputs.version }}
        run: |
          BRANCH_NAME="version/mql_update_${MQL_VERSION}"
          COMMIT_MSG="🧹 Bump mql to ${MQL_VERSION}"
          echo "COMMIT_TITLE=${COMMIT_MSG}" >> $GITHUB_OUTPUT
          echo "BRANCH_NAME=${BRANCH_NAME}" >> $GITHUB_OUTPUT

      - name: Create PR
        id: cpr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.generate-token.outputs.token }}
          base: main
          labels: dependencies,go
          committer: "Mondoo Tools <tools@mondoo.com>"
          commit-message: ${{ steps.branch.outputs.COMMIT_TITLE }}
          author: "Mondoo Tools <tools@mondoo.com>"
          title: ${{ steps.branch.outputs.COMMIT_TITLE }}
          branch: ${{ steps.branch.outputs.BRANCH_NAME }}
          body-path: .github/pr-body.md

      - name: PR infos
        if: ${{ steps.cpr.outputs.pull-request-number }}
        env:
          PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
          PR_URL: ${{ steps.cpr.outputs.pull-request-url }}
        run: |
          echo "Pull Request Number - ${PR_NUMBER}"
          echo "Pull Request URL - ${PR_URL}"
