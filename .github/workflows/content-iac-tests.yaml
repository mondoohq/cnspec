name: Content IaC Variant Tests

## Validates the Terraform / CloudFormation / Bicep / Dockerfile / Kubernetes
## policy checks in content/ against their per-check pass/fail fixtures
## (content/iac-variant-testdata).
##
## This suite is deliberately separate from the main "Code Test" Go job: it lives
## behind the `iac_variants` build tag, downloads extra providers (bicep), and
## runs many provider-backed scans, so it must never slow down or destabilize the
## default `go test ./...`. One matrix job per IaC type keeps wall-clock down and
## makes failures easy to attribute.
on:
  push:
    branches: ["main"]
    paths:
      - "content/**"
      - ".github/workflows/content-iac-tests.yaml"
  pull_request:
    branches: ["main"]
    paths:
      - "content/**"
      - ".github/workflows/content-iac-tests.yaml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  content-iac-variants:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        iac: [terraform, cloudformation, bicep, dockerfile, kubernetes]
    name: ${{ matrix.iac }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Import environment variables from file
        run: cat ".github/env" >> $GITHUB_ENV
      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ">=${{ env.golang-version }}"
          check-latest: true
          cache: false
      # https://github.com/actions/cache/blob/main/examples.md#go---modules
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Make provider dir
        run: mkdir -p ${PWD}/${GITHUB_JOB}/.providers
      - name: Set provider env
        run: echo "PROVIDERS_PATH=${PWD}/${GITHUB_JOB}/.providers" >> $GITHUB_ENV

      # matrix.iac is a fixed enum (terraform|cloudformation|bicep|dockerfile|
      # kubernetes) that maps to a dedicated make target — no untrusted input
      # reaches the shell.
      - name: Run ${{ matrix.iac }} variant tests
        run: make test/go/content-iac/${{ matrix.iac }}
