---
name: Lint Policies

on:
  pull_request:
    types: [opened, reopened, synchronize]
    paths:
      - "content/**"
  push:
    branches:
      - main
    paths:
      - "content/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Lint cnspec policies and output SARIF
        uses: mondoohq/actions/cnspec-lint@c38cfdf99da709760f58ff35aa5608688657f2f7 # v13.3.0
        with:
          path: ./content
          output-file: "results.sarif"
      - name: Display SARIF file content
        run: jq . results.sarif
      - name: Upload SARIF results file
        uses: github/codeql-action/upload-sarif@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        with:
          sarif_file: results.sarif
      - name: Check SARIF for errors
        run: |
          error_count=$(jq '[.runs[0].results[] | select(.level == "error")] | length' results.sarif)
          if [ "$error_count" -gt 0 ]; then
            echo "Found $error_count error(s). Check the Security tab or review the SARIF output above."
            exit 1
          fi
