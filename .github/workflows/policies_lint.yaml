---
name: Lint Policies

on:
  pull_request:
    types: [opened, reopened, synchronize]
    paths:
      - "content/**"
  push:
    branches:
      - main
    paths:
      - "content/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Lint cnspec policies and output SARIF
        uses: mondoohq/actions/cnspec-lint@b34b9555d2bbcd8481050c13c4b875d11a5398b9 # main
        with:
          path: ./content
          output-file: "results.sarif"
      - name: Display SARIF file content
        run: jq . results.sarif
      - name: Upload SARIF results file
        uses: github/codeql-action/upload-sarif@89a39a4e59826350b863aa6b6252a07ad50cf83e # v4.32.4
        with:
          sarif_file: results.sarif
      - name: Check SARIF for errors
        run: |
          error_count=$(jq '[.runs[0].results[] | select(.level == "error")] | length' results.sarif)
          if [ "$error_count" -gt 0 ]; then
            echo "Found $error_count error(s). Check the Security tab or review the SARIF output above."
            exit 1
          fi
