name: Generated Code Test

## Only trigger tests if source is changing
on:
  push:
    paths:
      - "**.proto"
      - "**.lr"
      - "**.go"

permissions:
  contents: read

jobs:
  # Check if there is any dirty change for generated files
  generated-files:
    runs-on:
      group: Default
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Import environment variables from file
        run: cat ".github/env" >> $GITHUB_ENV

      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ">=${{ env.golang-version }}"
          check-latest: true
          cache: false

      # We do not permit sudo on self-hosted runners
      - name: "Ensure GCC is installed"
        run: |
          if gcc --version; then
            echo "Good to go";
          else
            echo "Install GCC on the runner.";
          fi

      # Note we do not use apt install -y protobuf-compiler` since it is too old
      - name: Install Protoc
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          version: ${{ env.protoc-version }}

      - name: Check generated files
        run: |
          protoc --version
          make prep
          make prep/repos
          make cnspec/generate
          git diff --exit-code '*.pb.go'
          git diff --exit-code '*.ranger.go'
          git diff --exit-code '*.vtproto.pb.go'
