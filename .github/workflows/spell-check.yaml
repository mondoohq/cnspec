---
name: Spell Checking

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  spelling:
    name: Run spell check
    permissions:
      actions: read
      contents: read
      pull-requests: read
      security-events: write
    outputs:
      followup: ${{ steps.spelling.outputs.followup }}
    runs-on: ubuntu-latest
    concurrency:
      group: spelling-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    steps:
      - name: Check spelling
        id: spelling
        uses: check-spelling/check-spelling@cfb6f7e75bbfc89c71eaa30366d0c166f1bd9c8c # v0.0.26
        with:
          suppress_push_for_open_pull_request: 1
          checkout: true
          post_comment: 0
          largest_file: 9999999
          word-splitter-timeout: 120
          dictionary_source_prefixes: '{"mondoo": "https://raw.githubusercontent.com/mondoohq/spellcheck-dictionary/main/", "cspell": "https://raw.githubusercontent.com/check-spelling/cspell-dicts/v20230509/dictionaries/"}'
          extra_dictionaries: cspell:aws/aws.txt
            cspell:companies/src/companies.txt
            cspell:filetypes/filetypes.txt
            cspell:software-terms/src/software-terms.txt
            cspell:software-terms/src/software-tools.txt
            cspell:k8s/dict/k8s.txt
            mondoo:mondoo_dictionary.txt
            cspell:software-terms/dict/softwareTerms.txt
            cspell:golang/dict/go.txt

  comment:
    name: Report
    runs-on: ubuntu-latest
    needs: spelling
    permissions:
      contents: read
      pull-requests: write
    if: (success() || failure()) && needs.spelling.outputs.followup
    steps:
      - name: Post comment
        uses: check-spelling/check-spelling@cfb6f7e75bbfc89c71eaa30366d0c166f1bd9c8c # v0.0.26
        with:
          checkout: true
          task: ${{ needs.spelling.outputs.followup }}
