---
name: Validate Policy Remediation Commands

on:
  pull_request:
    types: [opened, reopened, synchronize]
    paths:
      - "content/**"

permissions:
  contents: read
  security-events: write

jobs:
  validate:
    name: Validate CLI commands in remediation steps
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Validate remediation commands
        run: |
          python3 content/validation/validate_remediation_commands.py \
            --sarif results.sarif; echo "exitcode=$?" >> "$GITHUB_ENV"

      - name: Upload SARIF results
        if: always() && hashFiles('results.sarif') != ''
        uses: github/codeql-action/upload-sarif@ff0a06e83cb2de871e5a09832bc6a81e7276941f # v3
        with:
          sarif_file: results.sarif
          category: remediation-commands

      - name: Fail on validation errors
        if: env.exitcode != '0'
        run: exit 1
