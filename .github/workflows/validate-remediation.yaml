---
name: Validate Policy Remediation Content

on:
  pull_request:
    types: [opened, reopened, synchronize]
    paths:
      - "content/**"

permissions:
  contents: read

jobs:
  validate-cli:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install AWS CLI v2
        # Official AWS installer (https://docs.aws.amazon.com/cli/latest/userguide/getting-started-install.html).
        # ubuntu-latest usually has aws pre-installed, but installing explicitly
        # keeps this job independent of runner-image changes.
        run: |
          curl -sSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
          unzip -q /tmp/awscliv2.zip -d /tmp
          sudo /tmp/aws/install --update
          aws --version

      - name: Install Google Cloud SDK
        # Official tarball from dl.google.com (https://cloud.google.com/sdk/docs/install-sdk#linux).
        # ubuntu-latest has gcloud pre-installed, but installing fresh ensures
        # the validator introspects the latest command tree.
        run: |
          curl -sSL "https://dl.google.com/dl/cloudsdk/channels/rapid/downloads/google-cloud-cli-linux-x86_64.tar.gz" -o /tmp/gcloud.tar.gz
          tar -xzf /tmp/gcloud.tar.gz -C "$HOME"
          "$HOME/google-cloud-sdk/install.sh" --quiet --path-update false --usage-reporting false
          echo "$HOME/google-cloud-sdk/bin" >> "$GITHUB_PATH"
          "$HOME/google-cloud-sdk/bin/gcloud" --version

      - name: Install OCI CLI
        # pip install always resolves to the latest oci-cli on PyPI.
        run: pip install --upgrade oci-cli

      - name: Install doctl
        # Pinned release tarball from
        # https://github.com/digitalocean/doctl/releases. Bump DOCTL_VERSION
        # and DOCTL_SHA256 in lockstep when DigitalOcean ships new commands
        # or flags — the SHA-256 is published in the per-release
        # `doctl-<version>-checksums.sha256` file. No auth needed for
        # `doctl --help` introspection.
        env:
          DOCTL_VERSION: "1.155.0"
          DOCTL_SHA256: "94f572c89d74a6a894f6238bae07cd55c599a6539f8da7ec9d1a89f09a292180"
        run: |
          # --fail makes curl exit non-zero on HTTP 4xx/5xx (default -sSL silently
          # writes the error body to disk and trips the sha256 check below).
          # --retry handles transient GitHub release-asset blips.
          curl --fail --retry 5 --retry-delay 5 --retry-all-errors -sSL \
            "https://github.com/digitalocean/doctl/releases/download/v${DOCTL_VERSION}/doctl-${DOCTL_VERSION}-linux-amd64.tar.gz" \
            -o /tmp/doctl.tar.gz
          echo "${DOCTL_SHA256}  /tmp/doctl.tar.gz" | sha256sum -c -
          tar -xzf /tmp/doctl.tar.gz -C /tmp
          sudo mv /tmp/doctl /usr/local/bin/doctl
          doctl version

      - name: Validate remediation commands
        run: python3 content/validation/validate_remediation_commands.py --github-actions

  validate-terraform:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Set up tflint
        uses: terraform-linters/setup-tflint@b480b8fcdaa6f2c577f8e4fa799e89e756bb7c93 # v6.2.2
        with:
          tflint_version: v0.61.0

      - name: Validate terraform remediation blocks
        run: python3 content/validation/validate_terraform_remediation.py --github-actions

  validate-ansible:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install ansible-lint
        run: pipx install ansible-lint==26.3.0

      - name: Validate ansible remediation blocks
        run: python3 content/validation/validate_ansible_remediation.py --github-actions

  validate-bash:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Validate bash remediation blocks
        run: python3 content/validation/validate_bash_remediation.py --github-actions
