---
name: Validate Policy Remediation Content

on:
  pull_request:
    types: [opened, reopened, synchronize]
    paths:
      - "content/**"

permissions:
  contents: read

jobs:
  validate-cli:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install AWS CLI v2
        # Official AWS installer (https://docs.aws.amazon.com/cli/latest/userguide/getting-started-install.html).
        # ubuntu-latest usually has aws pre-installed, but installing explicitly
        # keeps this job independent of runner-image changes.
        run: |
          curl -sSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
          unzip -q /tmp/awscliv2.zip -d /tmp
          sudo /tmp/aws/install --update
          aws --version

      - name: Install Google Cloud SDK
        # Official tarball from dl.google.com (https://cloud.google.com/sdk/docs/install-sdk#linux).
        # ubuntu-latest has gcloud pre-installed, but installing fresh ensures
        # the validator introspects the latest command tree.
        run: |
          curl -sSL "https://dl.google.com/dl/cloudsdk/channels/rapid/downloads/google-cloud-cli-linux-x86_64.tar.gz" -o /tmp/gcloud.tar.gz
          tar -xzf /tmp/gcloud.tar.gz -C "$HOME"
          "$HOME/google-cloud-sdk/install.sh" --quiet --path-update false --usage-reporting false
          echo "$HOME/google-cloud-sdk/bin" >> "$GITHUB_PATH"
          "$HOME/google-cloud-sdk/bin/gcloud" --version

      - name: Install OCI CLI
        # pip install always resolves to the latest oci-cli on PyPI.
        run: pip install --upgrade oci-cli

      - name: Install doctl
        # Pinned release tarball from
        # https://github.com/digitalocean/doctl/releases. Bump DOCTL_VERSION
        # and DOCTL_SHA256 in lockstep when DigitalOcean ships new commands
        # or flags — the SHA-256 is published in the per-release
        # `doctl-<version>-checksums.sha256` file. No auth needed for
        # `doctl --help` introspection.
        env:
          DOCTL_VERSION: "1.161.0"
          DOCTL_SHA256: "955771393b8b40b6e53a5babae5c56d8bf3bd775e15fcc3db649a1f61536e541"
        run: |
          # --fail makes curl exit non-zero on HTTP 4xx/5xx (default -sSL silently
          # writes the error body to disk and trips the sha256 check below).
          # --retry handles transient GitHub release-asset blips.
          curl --fail --retry 5 --retry-delay 5 --retry-all-errors -sSL \
            "https://github.com/digitalocean/doctl/releases/download/v${DOCTL_VERSION}/doctl-${DOCTL_VERSION}-linux-amd64.tar.gz" \
            -o /tmp/doctl.tar.gz
          echo "${DOCTL_SHA256}  /tmp/doctl.tar.gz" | sha256sum -c -
          tar -xzf /tmp/doctl.tar.gz -C /tmp
          sudo mv /tmp/doctl /usr/local/bin/doctl
          doctl version

      - name: Verify kubectl and gh
        # Both ship preinstalled on ubuntu-latest runner images and are
        # kept current by the image maintainers. The Cobra-tree walkers
        # only read `__complete` / `--help` output, so any recent version
        # works; fail fast here if a future image drops them.
        run: |
          kubectl version --client
          gh --version

      - name: Install glab
        # Pinned release tarball from the gitlab-org/cli generic package
        # registry. Bump GLAB_VERSION and GLAB_SHA256 in lockstep when
        # GitLab ships new commands or flags.
        env:
          GLAB_VERSION: "1.102.0"
          GLAB_SHA256: "2e06f278bb1762126e9b695f67baf5e3210df431b2039c76c1991252bf9c0868"
        run: |
          curl --fail --retry 5 --retry-delay 5 --retry-all-errors -sSL \
            "https://gitlab.com/api/v4/projects/gitlab-org%2Fcli/packages/generic/glab/${GLAB_VERSION}/glab_${GLAB_VERSION}_linux_amd64.tar.gz" \
            -o /tmp/glab.tar.gz
          echo "${GLAB_SHA256}  /tmp/glab.tar.gz" | sha256sum -c -
          mkdir -p /tmp/glab-extract
          tar -xzf /tmp/glab.tar.gz -C /tmp/glab-extract
          sudo mv /tmp/glab-extract/bin/glab /usr/local/bin/glab
          glab --version

      - name: Install hcloud
        # Pinned release tarball from
        # https://github.com/hetznercloud/cli/releases. Bump HCLOUD_VERSION
        # and HCLOUD_SHA256 in lockstep when Hetzner ships new commands or
        # flags — the SHA-256 is published in the per-release checksums.txt.
        env:
          HCLOUD_VERSION: "1.65.0"
          HCLOUD_SHA256: "f78d2db65b7ab58603d343739cb4397e13acef23182e41692a06e147a8d4c011"
        run: |
          curl --fail --retry 5 --retry-delay 5 --retry-all-errors -sSL \
            "https://github.com/hetznercloud/cli/releases/download/v${HCLOUD_VERSION}/hcloud-linux-amd64.tar.gz" \
            -o /tmp/hcloud.tar.gz
          echo "${HCLOUD_SHA256}  /tmp/hcloud.tar.gz" | sha256sum -c -
          mkdir -p /tmp/hcloud-extract
          tar -xzf /tmp/hcloud.tar.gz -C /tmp/hcloud-extract
          sudo mv /tmp/hcloud-extract/hcloud /usr/local/bin/hcloud
          hcloud version

      - name: Validate remediation commands
        run: python3 content/validation/validate_remediation_commands.py --github-actions

  validate-terraform:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Set up tflint
        uses: terraform-linters/setup-tflint@6e1e0642c0289bd619021bf6b34e3c08ed1e005a # v6.3.0
        with:
          tflint_version: v0.61.0

      - name: Validate terraform remediation blocks
        env:
          # `tflint --init` downloads ruleset plugins from GitHub releases.
          # Without an authenticated token it uses the 60-request/hour
          # anonymous GitHub API limit, which is exhausted partway through
          # plugin init and fails the google/azurerm rulesets. The token
          # raises the limit to 5000/hour.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 content/validation/validate_terraform_remediation.py --github-actions

  validate-ansible:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install ansible-lint
        run: pipx install ansible-lint==26.3.0

      - name: Validate ansible remediation blocks
        run: python3 content/validation/validate_ansible_remediation.py --github-actions

  validate-bash:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Validate bash remediation blocks
        run: python3 content/validation/validate_bash_remediation.py --github-actions
