---
name: Validate Policy Remediation Commands

on:
  pull_request:
    types: [opened, reopened, synchronize]
    paths:
      - "content/**"

permissions:
  contents: read

jobs:
  validate:
    name: Validate CLI commands in remediation steps
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Validate remediation commands
        run: python3 content/validation/validate_remediation_commands.py
