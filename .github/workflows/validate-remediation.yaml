---
name: Validate Remediation Commands

on:
  pull_request:
    types: [opened, reopened, synchronize]
    paths:
      - "content/**"
      - "content/validation/**"

permissions:
  contents: read

jobs:
  validate:
    name: Validate CLI commands in remediation steps
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate remediation commands
        run: python3 content/validation/validate_remediation_commands.py
