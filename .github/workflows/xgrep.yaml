name: xgrep

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  scan:
    name: xgrep security scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # required to upload SARIF to code scanning
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0 # required for diff-aware scanning on pull requests
      - name: Run xgrep
        uses: mondoohq/actions/xgrep@c38cfdf99da709760f58ff35aa5608688657f2f7 # v13.3.0
        with:
          path: .
          output-file: results.sarif
          fail-on: "off" # report-only for now; surface findings without blocking PRs
          # The IaC-variant test fixtures are deliberately insecure (fail-case
          # scenarios), so SAST findings on them are expected noise, not real
          # issues. Exclude them so they don't drown genuine findings.
          args: "--exclude **/iac-variant-testdata/**"
      - name: Upload SARIF results
        if: always()
        uses: github/codeql-action/upload-sarif@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        with:
          sarif_file: results.sarif
          category: xgrep
