AWSTemplateFormatVersion: "2010-09-09"
Resources:
  AppNode:
    Type: AWS::AppMesh::VirtualNode
    Properties:
      MeshName: my-mesh
      VirtualNodeName: app-node
      Spec:
        Listeners:
          - PortMapping:
              Port: 8080
              Protocol: http
            TLS:
              Mode: PERMISSIVE
              Certificate:
                ACM:
                  CertificateArn: arn:aws:acm:us-east-1:111122223333:certificate/abc
