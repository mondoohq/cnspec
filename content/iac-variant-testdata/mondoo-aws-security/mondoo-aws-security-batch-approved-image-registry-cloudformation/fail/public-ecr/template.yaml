AWSTemplateFormatVersion: "2010-09-09"
Resources:
  MyJobDefinition:
    Type: AWS::Batch::JobDefinition
    Properties:
      Type: container
      JobDefinitionName: my-job
      ContainerProperties:
        Image: public.ecr.aws/amazonlinux/amazonlinux:latest
        Vcpus: 1
        Memory: 512
