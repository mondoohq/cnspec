AWSTemplateFormatVersion: "2010-09-09"
Resources:
  MyJobDefinition:
    Type: AWS::Batch::JobDefinition
    Properties:
      Type: container
      JobDefinitionName: my-job
      ContainerProperties:
        Image: 123456789012.dkr.ecr.us-east-1.amazonaws.com/my-app:latest
        Vcpus: 1
        Memory: 512
        Privileged: true
