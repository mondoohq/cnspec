AWSTemplateFormatVersion: "2010-09-09"
Resources:
  OrgChangesMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: /aws/cloudtrail/logs
      FilterPattern: '{ ($.eventSource = organizations.amazonaws.com) && (($.eventName = "AcceptHandshake") || ($.eventName = "AttachPolicy") || ($.eventName = "CreatePolicy") || ($.eventName = "DeletePolicy") || ($.eventName = "DetachPolicy") || ($.eventName = "UpdatePolicy")) }'
      MetricTransformations:
        - MetricName: OrganizationsChanges
          MetricNamespace: CISBenchmark
          MetricValue: "1"
