AWSTemplateFormatVersion: "2010-09-09"
Resources:
  Recorder:
    Type: AWS::Config::ConfigurationRecorder
    Properties:
      Name: default
      RoleARN: arn:aws:iam::123456789012:role/config-role
      RecordingGroup:
        AllSupported: false
        IncludeGlobalResourceTypes: true
        ResourceTypes:
          - AWS::EC2::Instance
