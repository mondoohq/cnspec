AWSTemplateFormatVersion: "2010-09-09"
Resources:
  Cluster:
    Type: AWS::EKS::Cluster
    Properties:
      Name: prod
      RoleArn: arn:aws:iam::123456789012:role/eks-cluster-role
      ResourcesVpcConfig:
        SubnetIds:
          - subnet-0abc1234
          - subnet-0def5678
      EncryptionConfig:
        - Provider:
            KeyArn: arn:aws:kms:us-east-1:123456789012:key/abcd1234-a123-456a-a12b-a123b4cd56ef
          Resources:
            - secrets
