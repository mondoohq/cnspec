AWSTemplateFormatVersion: "2010-09-09"
Resources:
  SearchDomain:
    Type: AWS::Elasticsearch::Domain
    Properties:
      DomainName: my-search
      ElasticsearchVersion: "7.10"
      LogPublishingOptions:
        AUDIT_LOGS:
          CloudWatchLogsLogGroupArn: arn:aws:logs:us-east-1:123456789012:log-group:/aws/es/audit
          Enabled: true
        ES_APPLICATION_LOGS:
          CloudWatchLogsLogGroupArn: arn:aws:logs:us-east-1:123456789012:log-group:/aws/es/app
          Enabled: true
