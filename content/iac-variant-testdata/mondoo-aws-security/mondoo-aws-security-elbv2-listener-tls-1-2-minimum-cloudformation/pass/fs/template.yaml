AWSTemplateFormatVersion: "2010-09-09"
Resources:
  TlsListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: arn:aws:elasticloadbalancing:us-east-1:123456789012:loadbalancer/net/my-nlb/abc123
      Port: 443
      Protocol: TLS
      SslPolicy: ELBSecurityPolicy-FS-1-2-2019-08
      Certificates:
        - CertificateArn: arn:aws:acm:us-east-1:123456789012:certificate/abc-123
      DefaultActions:
        - Type: forward
          TargetGroupArn: arn:aws:elasticloadbalancing:us-east-1:123456789012:targetgroup/my-tg/def456
