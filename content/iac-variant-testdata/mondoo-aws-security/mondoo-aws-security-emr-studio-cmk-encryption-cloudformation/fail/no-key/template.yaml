AWSTemplateFormatVersion: "2010-09-09"
Resources:
  EMRStudio:
    Type: AWS::EMR::Studio
    Properties:
      Name: data-studio
      AuthMode: SSO
      VpcId: vpc-0abc1234def567890
      SubnetIds:
        - subnet-0abc1234def567890
      ServiceRole: arn:aws:iam::123456789012:role/EMRStudioServiceRole
      WorkspaceSecurityGroupId: sg-0abc1234def567890
      EngineSecurityGroupId: sg-0def5678abc123456
      DefaultS3Location: s3://my-emr-studio/
