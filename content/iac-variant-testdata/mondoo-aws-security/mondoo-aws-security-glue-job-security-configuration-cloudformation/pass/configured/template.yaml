AWSTemplateFormatVersion: "2010-09-09"
Resources:
  EtlJob:
    Type: AWS::Glue::Job
    Properties:
      Name: etl-job
      Role: arn:aws:iam::123456789012:role/GlueJobRole
      GlueVersion: "4.0"
      SecurityConfiguration: my-security-config
      Command:
        Name: glueetl
        ScriptLocation: s3://my-bucket/scripts/etl.py
