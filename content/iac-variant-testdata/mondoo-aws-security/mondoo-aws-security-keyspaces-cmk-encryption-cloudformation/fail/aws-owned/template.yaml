AWSTemplateFormatVersion: "2010-09-09"
Resources:
  Table:
    Type: AWS::Cassandra::Table
    Properties:
      KeyspaceName: my_keyspace
      TableName: my_table
      PartitionKeyColumns:
        - ColumnName: id
          ColumnType: text
      EncryptionSpecification:
        EncryptionType: AWS_OWNED_KMS_KEY
