AWSTemplateFormatVersion: "2010-09-09"
Resources:
  Key:
    Type: AWS::KMS::Key
    Properties:
      Description: application data key
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Sid: PublicAccess
            Effect: Allow
            Principal: "*"
            Action: kms:*
            Resource: "*"
