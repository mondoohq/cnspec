AWSTemplateFormatVersion: "2010-09-09"
Resources:
  AppKey:
    Type: AWS::KMS::Key
    Properties:
      Description: Application data key
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Sid: EnableRootPermissions
            Effect: Allow
            Principal:
              AWS: arn:aws:iam::123456789012:root
            Action: kms:*
            Resource: "*"
