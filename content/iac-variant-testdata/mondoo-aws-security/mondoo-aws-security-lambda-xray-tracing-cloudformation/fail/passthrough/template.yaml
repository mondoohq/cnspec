AWSTemplateFormatVersion: "2010-09-09"
Resources:
  AppFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: app-function
      Runtime: python3.12
      Handler: index.handler
      Role: arn:aws:iam::123456789012:role/lambda-exec
      TracingConfig:
        Mode: PassThrough
      Code:
        S3Bucket: my-deploy-bucket
        S3Key: app.zip
