AWSTemplateFormatVersion: "2010-09-09"
Resources:
  MyCluster:
    Type: AWS::MSK::Cluster
    Properties:
      ClusterName: my-msk
      KafkaVersion: 3.5.1
      NumberOfBrokerNodes: 3
      BrokerNodeGroupInfo:
        InstanceType: kafka.m5.large
        ClientSubnets:
          - subnet-0123456789abcdef0
          - subnet-0123456789abcdef1
      EncryptionInfo:
        EncryptionAtRest:
          DataVolumeKMSKeyId: arn:aws:kms:us-east-1:123456789012:key/abcd1234-a123-456a-a12b-a123b4cd56ef
        EncryptionInTransit:
          ClientBroker: TLS
          InCluster: true
