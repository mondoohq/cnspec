AWSTemplateFormatVersion: "2010-09-09"
Resources:
  MyDomain:
    Type: AWS::OpenSearchService::Domain
    Properties:
      DomainName: my-domain
      LogPublishingOptions:
        SEARCH_SLOW_LOGS:
          CloudWatchLogsLogGroupArn: arn:aws:logs:us-east-1:123456789012:log-group:/aws/opensearch/search
          Enabled: true
