AWSTemplateFormatVersion: "2010-09-09"
Resources:
  DBProxy:
    Type: AWS::RDS::DBProxy
    Properties:
      DBProxyName: app-proxy
      EngineFamily: MYSQL
      RoleArn: arn:aws:iam::123456789012:role/rds-proxy-role
      Auth:
        - AuthScheme: SECRETS
          SecretArn: arn:aws:secretsmanager:us-east-1:123456789012:secret:proxy-cred-AbCdEf
      VpcSubnetIds:
        - subnet-0123456789abcdef0
        - subnet-0abcdef1234567890
      RequireTLS: false
