AWSTemplateFormatVersion: "2010-09-09"
Resources:
  EncryptionKey:
    Type: AWS::KMS::Key
    Properties:
      Description: CMK for application data encryption
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Sid: EnableRootAccess
            Effect: Allow
            Principal:
              AWS: arn:aws:iam::123456789012:root
            Action: "kms:*"
            Resource: "*"
