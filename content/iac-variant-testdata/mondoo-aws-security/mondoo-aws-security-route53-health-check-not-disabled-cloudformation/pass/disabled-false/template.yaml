AWSTemplateFormatVersion: "2010-09-09"
Resources:
  ApiHealthCheck:
    Type: AWS::Route53::HealthCheck
    Properties:
      HealthCheckConfig:
        Type: HTTPS
        FullyQualifiedDomainName: api.example.com
        Port: 443
        ResourcePath: /health
        Disabled: false
        RequestInterval: 30
        FailureThreshold: 3
