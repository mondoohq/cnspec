AWSTemplateFormatVersion: "2010-09-09"
Resources:
  QueryLogConfig:
    Type: AWS::Route53Resolver::ResolverQueryLoggingConfig
    Properties:
      Name: vpc-dns-query-log
      DestinationArn: arn:aws:logs:us-east-1:123456789012:log-group:/aws/route53/dns-queries
  QueryLogAssociation:
    Type: AWS::Route53Resolver::ResolverQueryLoggingConfigAssociation
    Properties:
      ResolverQueryLogConfigId: !Ref QueryLogConfig
      ResourceId: vpc-0abc123def4567890
