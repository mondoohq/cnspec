AWSTemplateFormatVersion: "2010-09-09"
Resources:
  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: my-data-bucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowAppRoleRead
            Effect: Allow
            Principal:
              AWS: arn:aws:iam::123456789012:role/app-read-role
            Action:
              - s3:GetObject
            Resource: arn:aws:s3:::my-data-bucket/*
