AWSTemplateFormatVersion: "2010-09-09"
Resources:
  MyBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: my-bucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowReadFromAccount
            Effect: Allow
            Principal:
              AWS: "arn:aws:iam::123456789012:root"
            Action: "s3:GetObject"
            Resource: "arn:aws:s3:::my-bucket/*"
