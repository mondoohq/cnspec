AWSTemplateFormatVersion: "2010-09-09"
Resources:
  AppSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Docker daemon exposed to the internet over IPv6
      VpcId: vpc-0abcd1234ef567890
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2375
          ToPort: 2376
          CidrIpv6: ::/0
