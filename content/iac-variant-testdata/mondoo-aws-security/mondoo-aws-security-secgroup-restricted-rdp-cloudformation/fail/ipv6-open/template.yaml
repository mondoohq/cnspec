AWSTemplateFormatVersion: "2010-09-09"
Resources:
  ServiceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: RDP open to the internet over IPv6
      VpcId: vpc-0abc1234def567890
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3389
          ToPort: 3389
          CidrIpv6: "::/0"
