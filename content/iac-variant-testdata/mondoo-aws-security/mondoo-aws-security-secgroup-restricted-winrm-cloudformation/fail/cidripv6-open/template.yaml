AWSTemplateFormatVersion: "2010-09-09"
Resources:
  WinRmSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: WinRM open to the world over IPv6
      VpcId: vpc-0abcd1234ef567890
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5986
          ToPort: 5986
          CidrIpv6: "::/0"
