AWSTemplateFormatVersion: "2010-09-09"
Resources:
  SecretPolicy:
    Type: AWS::SecretsManager::ResourcePolicy
    Properties:
      SecretId: !Ref DbSecret
      ResourcePolicy:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: arn:aws:iam::123456789012:role/*
            Action: secretsmanager:GetSecretValue
            Resource: "*"
