AWSTemplateFormatVersion: "2010-09-09"
Resources:
  SecretRotation:
    Type: AWS::SecretsManager::RotationSchedule
    Properties:
      SecretId: !Ref DbSecret
      RotationLambdaARN: arn:aws:lambda:us-east-1:123456789012:function:rotate-secret
      RotationRules:
        AutomaticallyAfterDays: 30
