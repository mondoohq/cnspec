AWSTemplateFormatVersion: "2010-09-09"
Resources:
  Workflow:
    Type: AWS::StepFunctions::StateMachine
    Properties:
      StateMachineName: order-processing
      RoleArn: arn:aws:iam::123456789012:role/sfn-role
      DefinitionString: '{"StartAt":"Done","States":{"Done":{"Type":"Succeed"}}}'
      LoggingConfiguration:
        Level: ALL
        IncludeExecutionData: true
        Destinations:
          - CloudWatchLogsLogGroup:
              LogGroupArn: arn:aws:logs:us-east-1:123456789012:log-group:/aws/vendedlogs/states/order:*
