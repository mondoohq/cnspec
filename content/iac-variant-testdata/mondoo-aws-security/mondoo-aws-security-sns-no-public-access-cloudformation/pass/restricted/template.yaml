AWSTemplateFormatVersion: "2010-09-09"
Resources:
  TopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref MyTopic
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowAccountPublish
            Effect: Allow
            Principal:
              AWS: arn:aws:iam::123456789012:root
            Action: sns:Publish
            Resource: "*"
