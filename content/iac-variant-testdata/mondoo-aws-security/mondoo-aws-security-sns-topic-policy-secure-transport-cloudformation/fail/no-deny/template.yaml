AWSTemplateFormatVersion: "2010-09-09"
Resources:
  MyTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - arn:aws:sns:us-east-1:123456789012:my-topic
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowPublish
            Effect: Allow
            Principal:
              AWS: "arn:aws:iam::123456789012:root"
            Action: "sns:Publish"
            Resource: "arn:aws:sns:us-east-1:123456789012:my-topic"
