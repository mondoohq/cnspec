AWSTemplateFormatVersion: "2010-09-09"
Resources:
  MyTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - arn:aws:sns:us-east-1:123456789012:my-topic
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: DenyWhenSecure
            Effect: Deny
            Principal: "*"
            Action: "sns:Publish"
            Resource: "arn:aws:sns:us-east-1:123456789012:my-topic"
            Condition:
              Bool:
                "aws:SecureTransport": "true"
