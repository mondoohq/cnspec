AWSTemplateFormatVersion: "2010-09-09"
Resources:
  PatchBaseline:
    Type: AWS::SSM::PatchBaseline
    Properties:
      Name: prod-linux-baseline
      OperatingSystem: AMAZON_LINUX_2
      ApprovedPatchesComplianceLevel: CRITICAL
      RejectedPatches:
        - kernel*
      RejectedPatchesAction: ALLOW_AS_DEPENDENCY
