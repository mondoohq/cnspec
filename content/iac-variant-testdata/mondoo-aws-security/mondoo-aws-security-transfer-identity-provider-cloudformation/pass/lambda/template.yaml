AWSTemplateFormatVersion: "2010-09-09"
Resources:
  SftpServer:
    Type: AWS::Transfer::Server
    Properties:
      Protocols:
        - SFTP
      EndpointType: PUBLIC
      IdentityProviderType: AWS_LAMBDA
      IdentityProviderDetails:
        Function: arn:aws:lambda:us-east-1:123456789012:function:auth
