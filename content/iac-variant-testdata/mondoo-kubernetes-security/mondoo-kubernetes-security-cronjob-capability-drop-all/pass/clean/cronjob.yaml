apiVersion: batch/v1
kind: CronJob
metadata:
  name: cronjob-capability-drop-all
  namespace: default
spec:
  schedule: '*/5 * * * *'
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: cronjob-capability-drop-all
        spec:
          containers:
          - name: app
            image: nginx:1.25
            securityContext:
              capabilities:
                drop:
                - ALL
          restartPolicy: Never
