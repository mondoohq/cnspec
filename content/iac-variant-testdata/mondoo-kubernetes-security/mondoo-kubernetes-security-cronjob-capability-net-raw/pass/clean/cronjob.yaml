apiVersion: batch/v1
kind: CronJob
metadata:
  name: cronjob-capability-net-raw
  namespace: default
spec:
  schedule: '*/5 * * * *'
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: cronjob-capability-net-raw
        spec:
          containers:
          - name: app
            image: nginx:1.25
            securityContext:
              capabilities:
                drop:
                - NET_RAW
          restartPolicy: Never
