apiVersion: batch/v1
kind: CronJob
metadata:
  name: cronjob-capability-sys-admin
  namespace: default
spec:
  schedule: '*/5 * * * *'
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: cronjob-capability-sys-admin
        spec:
          containers:
          - name: app
            image: nginx:1.25
            securityContext:
              capabilities:
                add:
                - SYS_ADMIN
          restartPolicy: Never
