apiVersion: batch/v1
kind: CronJob
metadata:
  name: cronjob-hostpath-readonly
  namespace: default
spec:
  schedule: '*/5 * * * *'
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: cronjob-hostpath-readonly
        spec:
          containers:
          - name: app
            image: nginx:1.25
            volumeMounts:
            - name: hp
              mountPath: /data
              readOnly: false
          volumes:
          - name: hp
            hostPath:
              path: /data
          restartPolicy: Never
