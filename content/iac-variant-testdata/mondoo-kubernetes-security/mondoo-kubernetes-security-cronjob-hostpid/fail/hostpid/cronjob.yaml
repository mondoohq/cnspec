apiVersion: batch/v1
kind: CronJob
metadata:
  name: cronjob-hostpid
  namespace: default
spec:
  schedule: '*/5 * * * *'
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: cronjob-hostpid
        spec:
          containers:
          - name: app
            image: nginx:1.25
          hostPID: true
          restartPolicy: Never
