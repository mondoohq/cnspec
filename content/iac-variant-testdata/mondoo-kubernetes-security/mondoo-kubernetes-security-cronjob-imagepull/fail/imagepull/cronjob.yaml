apiVersion: batch/v1
kind: CronJob
metadata:
  name: cronjob-imagepull
  namespace: default
spec:
  schedule: '*/5 * * * *'
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: cronjob-imagepull
        spec:
          containers:
          - name: app
            image: nginx:latest
            imagePullPolicy: Always
          restartPolicy: Never
