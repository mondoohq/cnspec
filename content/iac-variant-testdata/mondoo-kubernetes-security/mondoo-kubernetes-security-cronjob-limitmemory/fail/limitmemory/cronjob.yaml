apiVersion: batch/v1
kind: CronJob
metadata:
  name: cronjob-limitmemory
  namespace: default
spec:
  schedule: '*/5 * * * *'
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: cronjob-limitmemory
        spec:
          containers:
          - name: app
            image: nginx:1.25
            resources:
              limits:
                cpu: 500m
          restartPolicy: Never
