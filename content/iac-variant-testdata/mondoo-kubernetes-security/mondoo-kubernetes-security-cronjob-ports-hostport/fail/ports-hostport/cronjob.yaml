apiVersion: batch/v1
kind: CronJob
metadata:
  name: cronjob-ports-hostport
  namespace: default
spec:
  schedule: '*/5 * * * *'
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: cronjob-ports-hostport
        spec:
          containers:
          - name: app
            image: nginx:1.25
            ports:
            - containerPort: 8080
              hostPort: 8080
          restartPolicy: Never
