apiVersion: batch/v1
kind: CronJob
metadata:
  name: cronjob-serviceaccount
  namespace: default
spec:
  schedule: '*/5 * * * *'
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: cronjob-serviceaccount
        spec:
          containers:
          - name: app
            image: nginx:1.25
          serviceAccountName: myapp-sa
          restartPolicy: Never
