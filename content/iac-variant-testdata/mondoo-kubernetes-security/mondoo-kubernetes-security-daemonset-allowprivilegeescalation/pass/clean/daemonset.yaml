apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: daemonset-allowprivilegeescalation
  namespace: default
spec:
  selector:
    matchLabels:
      app: daemonset-allowprivilegeescalation
  template:
    metadata:
      labels:
        app: daemonset-allowprivilegeescalation
    spec:
      containers:
      - name: app
        image: nginx:1.25
        securityContext:
          allowPrivilegeEscalation: false
