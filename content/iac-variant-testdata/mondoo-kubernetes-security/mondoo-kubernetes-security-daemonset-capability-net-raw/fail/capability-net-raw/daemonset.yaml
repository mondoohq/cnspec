apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: daemonset-capability-net-raw
  namespace: default
spec:
  selector:
    matchLabels:
      app: daemonset-capability-net-raw
  template:
    metadata:
      labels:
        app: daemonset-capability-net-raw
    spec:
      containers:
      - name: app
        image: nginx:1.25
        securityContext:
          capabilities:
            add:
            - NET_RAW
