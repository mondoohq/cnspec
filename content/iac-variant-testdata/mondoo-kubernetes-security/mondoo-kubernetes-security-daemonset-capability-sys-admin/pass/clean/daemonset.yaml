apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: daemonset-capability-sys-admin
  namespace: default
spec:
  selector:
    matchLabels:
      app: daemonset-capability-sys-admin
  template:
    metadata:
      labels:
        app: daemonset-capability-sys-admin
    spec:
      containers:
      - name: app
        image: nginx:1.25
