apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: daemonset-crio-socket
  namespace: default
spec:
  selector:
    matchLabels:
      app: daemonset-crio-socket
  template:
    metadata:
      labels:
        app: daemonset-crio-socket
    spec:
      containers:
      - name: app
        image: nginx:1.25
