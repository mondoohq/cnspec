apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: daemonset-hostipc
  namespace: default
spec:
  selector:
    matchLabels:
      app: daemonset-hostipc
  template:
    metadata:
      labels:
        app: daemonset-hostipc
    spec:
      containers:
      - name: app
        image: nginx:1.25
      hostIPC: true
