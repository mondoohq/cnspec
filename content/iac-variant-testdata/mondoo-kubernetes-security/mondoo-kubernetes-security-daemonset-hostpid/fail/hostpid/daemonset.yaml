apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: daemonset-hostpid
  namespace: default
spec:
  selector:
    matchLabels:
      app: daemonset-hostpid
  template:
    metadata:
      labels:
        app: daemonset-hostpid
    spec:
      containers:
      - name: app
        image: nginx:1.25
      hostPID: true
