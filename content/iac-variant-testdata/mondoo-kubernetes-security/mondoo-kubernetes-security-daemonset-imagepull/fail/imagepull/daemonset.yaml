apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: daemonset-imagepull
  namespace: default
spec:
  selector:
    matchLabels:
      app: daemonset-imagepull
  template:
    metadata:
      labels:
        app: daemonset-imagepull
    spec:
      containers:
      - name: app
        image: nginx:latest
        imagePullPolicy: Always
