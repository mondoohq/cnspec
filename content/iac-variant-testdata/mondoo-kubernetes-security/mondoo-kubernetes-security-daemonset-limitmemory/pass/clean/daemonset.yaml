apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: daemonset-limitmemory
  namespace: default
spec:
  selector:
    matchLabels:
      app: daemonset-limitmemory
  template:
    metadata:
      labels:
        app: daemonset-limitmemory
    spec:
      containers:
      - name: app
        image: nginx:1.25
        resources:
          limits:
            cpu: 500m
            memory: 256Mi
