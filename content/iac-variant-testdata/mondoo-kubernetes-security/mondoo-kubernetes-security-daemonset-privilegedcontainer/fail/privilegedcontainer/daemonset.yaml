apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: daemonset-privilegedcontainer
  namespace: default
spec:
  selector:
    matchLabels:
      app: daemonset-privilegedcontainer
  template:
    metadata:
      labels:
        app: daemonset-privilegedcontainer
    spec:
      containers:
      - name: app
        image: nginx:1.25
        securityContext:
          privileged: true
