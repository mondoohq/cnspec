apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: daemonset-serviceaccount
  namespace: default
spec:
  selector:
    matchLabels:
      app: daemonset-serviceaccount
  template:
    metadata:
      labels:
        app: daemonset-serviceaccount
    spec:
      containers:
      - name: app
        image: nginx:1.25
      serviceAccountName: default
      automountServiceAccountToken: true
