apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployment-allowprivilegeescalation
  namespace: default
spec:
  selector:
    matchLabels:
      app: deployment-allowprivilegeescalation
  template:
    metadata:
      labels:
        app: deployment-allowprivilegeescalation
    spec:
      containers:
      - name: app
        image: nginx:1.25
        securityContext:
          allowPrivilegeEscalation: true
  replicas: 1
