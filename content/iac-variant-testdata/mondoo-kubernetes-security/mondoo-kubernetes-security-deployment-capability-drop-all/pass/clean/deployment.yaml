apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployment-capability-drop-all
  namespace: default
spec:
  selector:
    matchLabels:
      app: deployment-capability-drop-all
  template:
    metadata:
      labels:
        app: deployment-capability-drop-all
    spec:
      containers:
      - name: app
        image: nginx:1.25
        securityContext:
          capabilities:
            drop:
            - ALL
  replicas: 1
