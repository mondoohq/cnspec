apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployment-capability-net-raw
  namespace: default
spec:
  selector:
    matchLabels:
      app: deployment-capability-net-raw
  template:
    metadata:
      labels:
        app: deployment-capability-net-raw
    spec:
      containers:
      - name: app
        image: nginx:1.25
        securityContext:
          capabilities:
            drop:
            - NET_RAW
  replicas: 1
