apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployment-capability-sys-admin
  namespace: default
spec:
  selector:
    matchLabels:
      app: deployment-capability-sys-admin
  template:
    metadata:
      labels:
        app: deployment-capability-sys-admin
    spec:
      containers:
      - name: app
        image: nginx:1.25
        securityContext:
          capabilities:
            add:
            - SYS_ADMIN
  replicas: 1
