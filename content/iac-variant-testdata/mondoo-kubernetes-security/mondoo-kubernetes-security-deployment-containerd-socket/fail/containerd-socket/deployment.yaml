apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployment-containerd-socket
  namespace: default
spec:
  selector:
    matchLabels:
      app: deployment-containerd-socket
  template:
    metadata:
      labels:
        app: deployment-containerd-socket
    spec:
      containers:
      - name: app
        image: nginx:1.25
        volumeMounts:
        - name: sock
          mountPath: /run/containerd/containerd.sock
      volumes:
      - name: sock
        hostPath:
          path: /run/containerd/containerd.sock
  replicas: 1
