apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployment-crio-socket
  namespace: default
spec:
  selector:
    matchLabels:
      app: deployment-crio-socket
  template:
    metadata:
      labels:
        app: deployment-crio-socket
    spec:
      containers:
      - name: app
        image: nginx:1.25
        volumeMounts:
        - name: sock
          mountPath: /var/run/crio/crio.sock
      volumes:
      - name: sock
        hostPath:
          path: /var/run/crio/crio.sock
  replicas: 1
