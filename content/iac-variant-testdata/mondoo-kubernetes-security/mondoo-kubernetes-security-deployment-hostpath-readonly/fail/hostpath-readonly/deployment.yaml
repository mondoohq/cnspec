apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployment-hostpath-readonly
  namespace: default
spec:
  selector:
    matchLabels:
      app: deployment-hostpath-readonly
  template:
    metadata:
      labels:
        app: deployment-hostpath-readonly
    spec:
      containers:
      - name: app
        image: nginx:1.25
        volumeMounts:
        - name: hp
          mountPath: /data
          readOnly: false
      volumes:
      - name: hp
        hostPath:
          path: /data
  replicas: 1
