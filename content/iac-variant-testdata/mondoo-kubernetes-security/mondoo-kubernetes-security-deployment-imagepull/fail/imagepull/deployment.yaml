apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployment-imagepull
  namespace: default
spec:
  selector:
    matchLabels:
      app: deployment-imagepull
  template:
    metadata:
      labels:
        app: deployment-imagepull
    spec:
      containers:
      - name: app
        image: nginx:latest
        imagePullPolicy: Always
  replicas: 1
