apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployment-k8s-dashboard
  namespace: default
spec:
  selector:
    matchLabels:
      app: deployment-k8s-dashboard
  template:
    metadata:
      labels:
        app: deployment-k8s-dashboard
    spec:
      containers:
      - name: app
        image: nginx:1.25
  replicas: 1
