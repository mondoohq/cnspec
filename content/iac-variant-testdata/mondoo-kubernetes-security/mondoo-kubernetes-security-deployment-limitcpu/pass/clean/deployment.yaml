apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployment-limitcpu
  namespace: default
spec:
  selector:
    matchLabels:
      app: deployment-limitcpu
  template:
    metadata:
      labels:
        app: deployment-limitcpu
    spec:
      containers:
      - name: app
        image: nginx:1.25
        resources:
          limits:
            cpu: 500m
            memory: 256Mi
  replicas: 1
