apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployment-privilegedcontainer
  namespace: default
spec:
  selector:
    matchLabels:
      app: deployment-privilegedcontainer
  template:
    metadata:
      labels:
        app: deployment-privilegedcontainer
    spec:
      containers:
      - name: app
        image: nginx:1.25
        securityContext:
          privileged: false
  replicas: 1
