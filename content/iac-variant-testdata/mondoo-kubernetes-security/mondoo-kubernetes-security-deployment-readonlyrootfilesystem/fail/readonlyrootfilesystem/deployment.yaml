apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployment-readonlyrootfilesystem
  namespace: default
spec:
  selector:
    matchLabels:
      app: deployment-readonlyrootfilesystem
  template:
    metadata:
      labels:
        app: deployment-readonlyrootfilesystem
    spec:
      containers:
      - name: app
        image: nginx:1.25
        securityContext:
          readOnlyRootFilesystem: false
  replicas: 1
