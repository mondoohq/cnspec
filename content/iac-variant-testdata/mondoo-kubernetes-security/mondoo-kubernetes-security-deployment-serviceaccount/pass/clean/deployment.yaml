apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployment-serviceaccount
  namespace: default
spec:
  selector:
    matchLabels:
      app: deployment-serviceaccount
  template:
    metadata:
      labels:
        app: deployment-serviceaccount
    spec:
      containers:
      - name: app
        image: nginx:1.25
      serviceAccountName: myapp-sa
  replicas: 1
