apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployment-tiller
  namespace: default
spec:
  selector:
    matchLabels:
      app: deployment-tiller
  template:
    metadata:
      labels:
        app: deployment-tiller
    spec:
      containers:
      - name: app
        image: gcr.io/kubernetes-helm/tiller:v2.16.0
  replicas: 1
