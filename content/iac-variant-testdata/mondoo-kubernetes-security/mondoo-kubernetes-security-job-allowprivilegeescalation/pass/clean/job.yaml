apiVersion: batch/v1
kind: Job
metadata:
  name: job-allowprivilegeescalation
  namespace: default
spec:
  template:
    metadata:
      labels:
        app: job-allowprivilegeescalation
    spec:
      containers:
      - name: app
        image: nginx:1.25
        securityContext:
          allowPrivilegeEscalation: false
      restartPolicy: Never
