apiVersion: batch/v1
kind: Job
metadata:
  name: job-capability-sys-admin
  namespace: default
spec:
  template:
    metadata:
      labels:
        app: job-capability-sys-admin
    spec:
      containers:
      - name: app
        image: nginx:1.25
        securityContext:
          capabilities:
            add:
            - SYS_ADMIN
      restartPolicy: Never
