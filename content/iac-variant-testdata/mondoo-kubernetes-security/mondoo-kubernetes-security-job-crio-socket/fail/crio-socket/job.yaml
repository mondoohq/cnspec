apiVersion: batch/v1
kind: Job
metadata:
  name: job-crio-socket
  namespace: default
spec:
  template:
    metadata:
      labels:
        app: job-crio-socket
    spec:
      containers:
      - name: app
        image: nginx:1.25
        volumeMounts:
        - name: sock
          mountPath: /var/run/crio/crio.sock
      volumes:
      - name: sock
        hostPath:
          path: /var/run/crio/crio.sock
      restartPolicy: Never
