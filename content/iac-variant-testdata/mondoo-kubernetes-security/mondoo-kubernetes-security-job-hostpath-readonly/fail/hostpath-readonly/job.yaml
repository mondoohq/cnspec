apiVersion: batch/v1
kind: Job
metadata:
  name: job-hostpath-readonly
  namespace: default
spec:
  template:
    metadata:
      labels:
        app: job-hostpath-readonly
    spec:
      containers:
      - name: app
        image: nginx:1.25
        volumeMounts:
        - name: hp
          mountPath: /data
          readOnly: false
      volumes:
      - name: hp
        hostPath:
          path: /data
      restartPolicy: Never
