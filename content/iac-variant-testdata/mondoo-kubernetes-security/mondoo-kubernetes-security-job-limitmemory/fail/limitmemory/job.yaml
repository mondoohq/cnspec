apiVersion: batch/v1
kind: Job
metadata:
  name: job-limitmemory
  namespace: default
spec:
  template:
    metadata:
      labels:
        app: job-limitmemory
    spec:
      containers:
      - name: app
        image: nginx:1.25
        resources:
          limits:
            cpu: 500m
      restartPolicy: Never
