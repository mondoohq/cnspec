apiVersion: batch/v1
kind: Job
metadata:
  name: job-readonlyrootfilesystem
  namespace: default
spec:
  template:
    metadata:
      labels:
        app: job-readonlyrootfilesystem
    spec:
      containers:
      - name: app
        image: nginx:1.25
        securityContext:
          readOnlyRootFilesystem: false
      restartPolicy: Never
