apiVersion: batch/v1
kind: Job
metadata:
  name: job-runasnonroot
  namespace: default
spec:
  template:
    metadata:
      labels:
        app: job-runasnonroot
    spec:
      containers:
      - name: app
        image: nginx:1.25
        securityContext:
          runAsNonRoot: false
      restartPolicy: Never
