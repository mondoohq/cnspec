apiVersion: v1
kind: Pod
metadata:
  name: pod-hostpath-readonly
  namespace: default
  labels:
    app: pod-hostpath-readonly
spec:
  containers:
  - name: app
    image: nginx:1.25
    volumeMounts:
    - name: hp
      mountPath: /data
      readOnly: false
  volumes:
  - name: hp
    hostPath:
      path: /data
