apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: superadmin
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: grant-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: superadmin
subjects:
  - kind: ServiceAccount
    name: app-sa
    namespace: production
