apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: replicaset-capability-net-raw
  namespace: default
spec:
  selector:
    matchLabels:
      app: replicaset-capability-net-raw
  template:
    metadata:
      labels:
        app: replicaset-capability-net-raw
    spec:
      containers:
      - name: app
        image: nginx:1.25
        securityContext:
          capabilities:
            add:
            - NET_RAW
  replicas: 1
