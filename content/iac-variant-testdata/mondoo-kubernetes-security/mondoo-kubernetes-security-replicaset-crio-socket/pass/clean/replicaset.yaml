apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: replicaset-crio-socket
  namespace: default
spec:
  selector:
    matchLabels:
      app: replicaset-crio-socket
  template:
    metadata:
      labels:
        app: replicaset-crio-socket
    spec:
      containers:
      - name: app
        image: nginx:1.25
  replicas: 1
