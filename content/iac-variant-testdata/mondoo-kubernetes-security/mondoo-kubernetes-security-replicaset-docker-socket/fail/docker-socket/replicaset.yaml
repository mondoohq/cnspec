apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: replicaset-docker-socket
  namespace: default
spec:
  selector:
    matchLabels:
      app: replicaset-docker-socket
  template:
    metadata:
      labels:
        app: replicaset-docker-socket
    spec:
      containers:
      - name: app
        image: nginx:1.25
        volumeMounts:
        - name: sock
          mountPath: /var/run/docker.sock
      volumes:
      - name: sock
        hostPath:
          path: /var/run/docker.sock
  replicas: 1
