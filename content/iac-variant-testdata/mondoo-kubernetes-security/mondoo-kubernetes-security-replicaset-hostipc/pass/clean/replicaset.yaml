apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: replicaset-hostipc
  namespace: default
spec:
  selector:
    matchLabels:
      app: replicaset-hostipc
  template:
    metadata:
      labels:
        app: replicaset-hostipc
    spec:
      containers:
      - name: app
        image: nginx:1.25
  replicas: 1
