apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: replicaset-imagepull
  namespace: default
spec:
  selector:
    matchLabels:
      app: replicaset-imagepull
  template:
    metadata:
      labels:
        app: replicaset-imagepull
    spec:
      containers:
      - name: app
        image: nginx:1.25
        imagePullPolicy: Always
  replicas: 1
