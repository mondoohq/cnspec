apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: replicaset-limitmemory
  namespace: default
spec:
  selector:
    matchLabels:
      app: replicaset-limitmemory
  template:
    metadata:
      labels:
        app: replicaset-limitmemory
    spec:
      containers:
      - name: app
        image: nginx:1.25
        resources:
          limits:
            cpu: 500m
  replicas: 1
