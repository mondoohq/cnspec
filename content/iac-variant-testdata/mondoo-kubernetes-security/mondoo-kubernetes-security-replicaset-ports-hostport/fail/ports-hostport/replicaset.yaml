apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: replicaset-ports-hostport
  namespace: default
spec:
  selector:
    matchLabels:
      app: replicaset-ports-hostport
  template:
    metadata:
      labels:
        app: replicaset-ports-hostport
    spec:
      containers:
      - name: app
        image: nginx:1.25
        ports:
        - containerPort: 8080
          hostPort: 8080
  replicas: 1
