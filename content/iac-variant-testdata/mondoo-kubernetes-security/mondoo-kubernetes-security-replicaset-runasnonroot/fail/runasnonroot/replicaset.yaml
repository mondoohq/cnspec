apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: replicaset-runasnonroot
  namespace: default
spec:
  selector:
    matchLabels:
      app: replicaset-runasnonroot
  template:
    metadata:
      labels:
        app: replicaset-runasnonroot
    spec:
      containers:
      - name: app
        image: nginx:1.25
        securityContext:
          runAsNonRoot: false
  replicas: 1
