apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: statefulset-containerd-socket
  namespace: default
spec:
  selector:
    matchLabels:
      app: statefulset-containerd-socket
  template:
    metadata:
      labels:
        app: statefulset-containerd-socket
    spec:
      containers:
      - name: app
        image: nginx:1.25
        volumeMounts:
        - name: sock
          mountPath: /run/containerd/containerd.sock
      volumes:
      - name: sock
        hostPath:
          path: /run/containerd/containerd.sock
  replicas: 1
  serviceName: statefulset-containerd-socket
