apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: statefulset-imagepull
  namespace: default
spec:
  selector:
    matchLabels:
      app: statefulset-imagepull
  template:
    metadata:
      labels:
        app: statefulset-imagepull
    spec:
      containers:
      - name: app
        image: nginx:latest
        imagePullPolicy: Always
  replicas: 1
  serviceName: statefulset-imagepull
