apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: statefulset-privilegedcontainer
  namespace: default
spec:
  selector:
    matchLabels:
      app: statefulset-privilegedcontainer
  template:
    metadata:
      labels:
        app: statefulset-privilegedcontainer
    spec:
      containers:
      - name: app
        image: nginx:1.25
        securityContext:
          privileged: true
  replicas: 1
  serviceName: statefulset-privilegedcontainer
