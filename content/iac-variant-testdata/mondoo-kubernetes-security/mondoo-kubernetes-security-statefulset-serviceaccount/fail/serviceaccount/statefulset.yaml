apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: statefulset-serviceaccount
  namespace: default
spec:
  selector:
    matchLabels:
      app: statefulset-serviceaccount
  template:
    metadata:
      labels:
        app: statefulset-serviceaccount
    spec:
      containers:
      - name: app
        image: nginx:1.25
      serviceAccountName: default
      automountServiceAccountToken: true
  replicas: 1
  serviceName: statefulset-serviceaccount
