        To verify that no Roo Code extension is installed:

        1. Open a terminal on the endpoint.
        2. List installed extensions for each VS Code-compatible editor and search for Roo Code:

           ```bash
           code --list-extensions | grep -iE 'roo-cline|roocode'
           cursor --list-extensions | grep -iE 'roo-cline|roocode'
           windsurf --list-extensions | grep -iE 'roo-cline|roocode'
           ```

        The endpoint passes when none of the editors return a Roo Code extension. A line matching `rooveterinaryinc.roo-cline` or `roocode.` is a failing result.
      remediation:
        - id: gui
          desc: |
            To remove the Roo Code extension from within the editor:

            1. Open the Extensions view (`Cmd+Shift+X` on macOS, `Ctrl+Shift+X` on Windows and Linux).
            2. Search for Roo Code.
            3. Select the extension and click **Uninstall**.
        - id: cli
          desc: |
            To uninstall the Roo Code extension from whichever editor has it installed:

            ```bash
            code --uninstall-extension rooveterinaryinc.roo-cline       # VS Code
            cursor --uninstall-extension rooveterinaryinc.roo-cline     # Cursor
            windsurf --uninstall-extension rooveterinaryinc.roo-cline   # Windsurf
            ```
        - id: ansible
          desc: |
            To remove the Roo Code extension from VS Code-compatible editors with Ansible:

            This playbook uninstalls the Roo Code extension from VS Code, Cursor, and Windsurf on the endpoint.

            ```yaml
            ---
            - name: Remove the Roo Code extension from VS Code-compatible editors
              hosts: workstations
              tasks:
                - name: Uninstall the Roo Code extension from each editor
                  ansible.builtin.command:
                    cmd: "{{ item }} --uninstall-extension rooveterinaryinc.roo-cline"
                  loop:
                    - code
                    - cursor
                    - windsurf
                  register: uninstall
                  changed_when: "'successfully uninstalled' in uninstall.stdout"
                  failed_when: false
            ```

  # ---------------------------------------------------------------------------
  # MCP server governance
  # ---------------------------------------------------------------------------
  - uid: mondoo-ai-security-no-unapproved-mcp-servers
    title: No unapproved MCP servers across all AI agents
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-uem-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-308-a-5-ii-b-security-awareness-training-and-tools-protection-from-malicious-software
      compliance/iso-27001-2022: iso-27001-2022-a-8-19
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-de-cm-5
      compliance/nist-csf-2: nist-csf-2-pr-ps-05
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-8
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-10
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc6-8-1
      compliance/vda-isa-5: false
    props:
      - uid: mondooAiSecurityApprovedMcpServers
        title: Regex matching approved MCP server names (applies to all agents)
        mql: |
          return /(?i)^$/
    mql: |
      claude.code.mcpServers.none(name != props.mondooAiSecurityApprovedMcpServers) &&
      openai.codex.mcpServers.none(name != props.mondooAiSecurityApprovedMcpServers) &&
      cursor.mcpServers.none(name != props.mondooAiSecurityApprovedMcpServers) &&
      github.copilot.mcpServers.none(name != props.mondooAiSecurityApprovedMcpServers) &&
      windsurf.mcpServers.none(name != props.mondooAiSecurityApprovedMcpServers) &&
      gemini.mcpServers.none(name != props.mondooAiSecurityApprovedMcpServers)
    docs:
      desc: |
        Model Context Protocol servers grant AI agents tool access to internal systems such as email, source control, databases, and messaging platforms. Only MCP servers reviewed and approved by the security team should be configured across Claude Code, OpenAI Codex, Cursor, GitHub Copilot, Windsurf, and Gemini CLI. The `mondooAiSecurityApprovedMcpServers` property defines a single centralized allow-list and can be customized for your environment, for example `return /(?i)(mondoo|github|jira)/`.

        **Why this matters**

        - **Broad data access:** An MCP server can read, modify, or exfiltrate data across connected internal systems on behalf of the user.
        - **Implicit consent:** Once a server is configured, the agent can invoke its tools without the user approving each individual action.
        - **Highest-risk vector:** Unreviewed MCP servers combine remote system access with autonomous agent behavior, making them the most consequential AI shadow IT exposure.
        - **Inventory gaps:** Servers configured outside the approved set leave security teams unaware of which systems an agent can reach.
      audit: |-
        To verify that only approved MCP servers are configured:

        1. Open a terminal on the endpoint.
        2. Inspect the locations each agent reads MCP servers from:

           ```bash
           cat ~/.claude.json ~/.claude/mcp-needs-auth-cache.json
           cat ~/.cursor/mcp.json
           cat ~/.config/github-copilot/mcp.json ~/.config/github-copilot/intellij/mcp.json
           cat ~/.codeium/windsurf/mcp_config.json
           cat ~/.gemini/settings.json
           ls ~/.codex/.tmp/plugins/
           ```

        The endpoint passes when every configured MCP server name appears in the approved allow-list. Any server name outside the allow-list is a failing result.
      remediation:
        - id: cli
          desc: |
            To remove unapproved MCP servers, delete the server entry from the location each agent actually reads:

            - Claude Code: run `claude mcp remove example-server` to delete the server from the user configuration in `~/.claude.json`, and remove any project-scoped entry from the repository's `.mcp.json`. Then delete the stale cache file `~/.claude/mcp-needs-auth-cache.json` so the removed server no longer appears in the inventory; Claude Code rebuilds it on next start.
            - OpenAI Codex: MCP servers can be defined in `~/.codex/config.toml` under `[mcp_servers.<name>]` tables and bundled by installed plugins under `~/.codex/.tmp/plugins/`. Remove the TOML table for a directly configured server, and uninstall the plugin that ships an unapproved server.
            - Cursor: edit `~/.cursor/mcp.json` (`%USERPROFILE%\.cursor\mcp.json` on Windows) and delete the entry under `mcpServers`.
            - GitHub Copilot: edit `~/.config/github-copilot/mcp.json` and, if present, `~/.config/github-copilot/intellij/mcp.json`, and delete the entry under `mcpServers`.
            - Windsurf: edit `~/.codeium/windsurf/mcp_config.json` (`%USERPROFILE%\.codeium\windsurf\` on Windows) and delete the entry under `mcpServers`.
            - Gemini CLI: edit `~/.gemini/settings.json` (`%USERPROFILE%\.gemini\settings.json` on Windows) and delete the entry under `mcpServers`.
        - id: ansible
          desc: |
            To surgically remove an unapproved MCP server entry from AI agent configuration files with Ansible:

            This playbook deletes a single named MCP server from each agent's `mcpServers` object using a JSON patch, leaving the rest of the configuration file intact, and removes the Claude Code MCP cache file so the deleted server no longer appears in its inventory. Set `unapproved_mcp_server` to the server name to remove, and edit `mcp_config_files` to match your environment. Each patched file is backed up before modification.

            The `mcpServers` path is not the same in every agent. Claude Code's `~/.claude.json` nests MCP servers per project rather than only at the top level, so a top-level `/mcpServers` patch can silently no-op and leave a project-scoped server in place; the `failed_when: false` guard hides that. For Claude Code, prefer running `claude mcp remove <name>` (covered by the command-line remediation) instead of patching the file, and confirm the project-scoped path for any agent whose configuration does not expose servers at top-level `mcpServers`.

            ```yaml
            ---
            - name: Remove an unapproved MCP server
              hosts: workstations
              vars:
                unapproved_mcp_server: example-server
                mcp_config_files:
                  - "{{ ansible_env.HOME }}/.claude.json"
                  - "{{ ansible_env.HOME }}/.cursor/mcp.json"
                  - "{{ ansible_env.HOME }}/.config/github-copilot/mcp.json"
                  - "{{ ansible_env.HOME }}/.gemini/settings.json"
              tasks:
                - name: Remove the unapproved server from each agent's mcpServers object
                  community.general.json_patch:
                    src: "{{ item }}"
                    operations:
                      - op: remove
                        path: "/mcpServers/{{ unapproved_mcp_server }}"
                    backup: true
                  loop: "{{ mcp_config_files }}"
                  failed_when: false

                - name: Remove the stale Claude Code MCP cache
                  ansible.builtin.file:
                    path: "{{ ansible_env.HOME }}/.claude/mcp-needs-auth-cache.json"
                    state: absent
            ```

  # ---------------------------------------------------------------------------
  # Local LLM runtimes
  # ---------------------------------------------------------------------------
  - uid: mondoo-ai-security-no-local-llm-runtimes
    title: No local LLM runtimes are running
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-uem-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-308-a-5-ii-b-security-awareness-training-and-tools-protection-from-malicious-software
      compliance/iso-27001-2022: iso-27001-2022-a-8-19
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-de-cm-5
      compliance/nist-csf-2: nist-csf-2-pr-ps-05
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-8
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-10
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc6-8-1
      compliance/vda-isa-5: false
    mql: |
      processes.where(
        executable == /(?i)(ollama|llama|lmstudio|lm-studio|localai|gpt4all)/
      ).length == 0
    docs:
      desc: |
        Local LLM inference runtimes such as Ollama, LM Studio, llama.cpp, LocalAI, GPT4All, and Jan run model inference directly on the endpoint. While they keep prompts off remote APIs, they still allow data to be processed outside approved channels and can carry licensing exposure from the model weights they load. Endpoints should run only the LLM runtimes approved by the security team.

        **Why this matters**

        - **Uncontrolled processing:** A local runtime lets users feed sensitive data into models outside sanctioned tooling and review.
        - **Licensing exposure:** Downloaded model weights may carry license restrictions that create legal risk for the organization.
        - **Resource and supply-chain risk:** Runtimes pull models from public registries that are not part of the organization's vetted supply chain.
        - **Inventory gaps:** An unsanctioned runtime leaves security teams without an accurate picture of how data is processed on the endpoint.
      audit: |-
        To verify that no local LLM runtime is running:

        1. Open a terminal on the endpoint.
        2. List processes whose executables match known LLM runtime names:

           ```bash
           ps aux | grep -iE 'ollama|llama|lmstudio|lm-studio|localai|gpt4all'
           ```

        The endpoint passes when no matching process is returned. Any running LLM runtime process is a failing result.
      remediation:
        - id: gui
          desc: |
            To remove a local LLM runtime using the operating system interface:

            1. On macOS, quit the runtime and drag the application from `/Applications` to the Trash.
            2. On Windows, open **Settings > Apps > Installed apps**, locate the runtime, and select **Uninstall**.
        - id: cli
          desc: |
            To stop and uninstall a local LLM runtime from the command line. Stopping the process halts inference immediately, and uninstalling the package removes the runtime so it cannot be relaunched. The commands below use Ollama as the example; the runtime name on your endpoint may differ, so look up the real package id first with `brew info`, `winget search`, or `dpkg -l` rather than assuming the install id matches the process name. LM Studio, GPT4All, LocalAI, and Jan are installed as standalone applications or containers and must be removed through their own uninstallers (for example `brew uninstall --cask lm-studio` or `winget uninstall ElementLabs.LMStudio` for LM Studio).

            macOS:

            ```bash
            pkill -f ollama
            brew uninstall ollama
            ```

            Linux:

            ```bash
            sudo systemctl stop ollama
            sudo apt remove ollama       # Debian/Ubuntu
            sudo dnf remove ollama       # RHEL/Fedora
            ```

            Windows:

            ```powershell
            Stop-Process -Name ollama
            winget uninstall Ollama
            ```
        - id: ansible
          desc: |
            To stop and remove local LLM runtimes with Ansible:

            This playbook stops any running local LLM runtime process, then stops and removes the Ollama package and service. Ollama is the runtime distributed as a system package and service; LM Studio, GPT4All, LocalAI, and Jan are installed as standalone applications or containers and must be removed through their own uninstallers.

            ```yaml
            ---
            - name: Remove local LLM runtimes
              hosts: workstations
              tasks:
                - name: Kill local LLM runtime processes
                  ansible.builtin.command:
                    cmd: pkill -f "{{ item }}"
                  loop:
                    - ollama
                    - llama
                    - lmstudio
                    - localai
                    - gpt4all
                  failed_when: false

            - name: Remove local LLM runtime packages (system)
              hosts: workstations
              become: true
              tasks:
                - name: Stop and disable Ollama service
                  ansible.builtin.systemd_service:
                    name: ollama
                    state: stopped
                    enabled: false
                  failed_when: false

                - name: Remove Ollama package
                  ansible.builtin.package:
                    name: ollama
                    state: absent
                  failed_when: false
            ```

  - uid: mondoo-ai-security-no-local-llm-listening-ports
    title: No local LLM inference servers are exposed beyond localhost
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-uem-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-308-a-5-ii-b-security-awareness-training-and-tools-protection-from-malicious-software
      compliance/iso-27001-2022: iso-27001-2022-a-8-19
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-de-cm-5
      compliance/nist-csf-2: nist-csf-2-pr-ps-05
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-8
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-10
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc6-8-1
      compliance/vda-isa-5: false
    mql: |
      ports.listening.where(address.notIn(["127.0.0.1", "::1", "[::1]"])).none(
        port == 11434 || port == 1234 || port == 1337
      )
    docs:
      desc: |
        Local LLM inference servers expose an HTTP API on well-known ports: 11434 for Ollama, 1234 for LM Studio, and 1337 for Jan. Listening on `127.0.0.1` or `::1` is acceptable because it limits the server to the local machine. The check fails when one of these ports is bound to `0.0.0.0`, a LAN address, or any other non-loopback interface, because that exposes the model to other hosts on the network.

        **Why this matters**

        - **Network exposure:** If the server binds to a non-loopback interface, other hosts on the network can submit prompts to it.
        - **Uncontrolled processing:** Data sent to a local inference API bypasses the review and logging applied to sanctioned tooling.
        - **Inventory gaps:** An unsanctioned inference server leaves security teams without an accurate picture of how data is processed on the endpoint.
      audit: |-
        To verify that no local LLM inference server is exposed beyond localhost:

        1. Open a terminal on the endpoint.
        2. List listening sockets on the LLM inference ports:

           ```bash
           lsof -nP -iTCP:11434 -iTCP:1234 -iTCP:1337 -sTCP:LISTEN
           ```

        The endpoint passes when no process is listening on any of these ports on a non-loopback address. A process bound to `127.0.0.1` or `::1` is acceptable.
      remediation:
        - id: cli
          desc: |
            Identify the process bound to the flagged port and reconfigure it to bind to the loopback address only. Restricting the listener to `127.0.0.1` keeps the inference API reachable only from the local machine, so other hosts on the network can no longer submit prompts to it.

            macOS:

            ```bash
            lsof -nP -iTCP:11434 -iTCP:1234 -iTCP:1337 -sTCP:LISTEN
            launchctl setenv OLLAMA_HOST 127.0.0.1:11434
            ```

            Then quit and reopen the Ollama app so it picks up the new bind address.

            Note that `launchctl setenv` applies only to the current login session and is lost on logout or reboot, and the Ollama menu-bar app does not reliably read it. For a fix that survives a restart, set the bind address in the Ollama app settings, or install a per-user LaunchAgent plist under `~/Library/LaunchAgents` that runs `launchctl setenv OLLAMA_HOST 127.0.0.1:11434` at login.

            Linux:

            ```bash
            sudo mkdir -p /etc/systemd/system/ollama.service.d
            printf '[Service]\nEnvironment="OLLAMA_HOST=127.0.0.1:11434"\n' | sudo tee /etc/systemd/system/ollama.service.d/override.conf
            sudo systemctl daemon-reload
            sudo systemctl restart ollama
            ```

            Windows:

            ```powershell
            Get-NetTCPConnection -LocalPort 11434,1234,1337 | Select-Object LocalAddress,LocalPort,OwningProcess
            [Environment]::SetEnvironmentVariable("OLLAMA_HOST", "127.0.0.1:11434", "User")
            ```

            Then restart Ollama so it picks up the new bind address.

            For LM Studio, change the server settings in the app so the listen address is `127.0.0.1` instead of `0.0.0.0` and restart the server. For Jan, which serves its local API on port 1337, set the API server host to `127.0.0.1` in **Settings > Local API Server** and restart the server.
        - id: ansible
          desc: |
            Reconfigure local LLM inference servers to bind to localhost with Ansible:

            This playbook creates a systemd override that binds Ollama to the loopback address and restarts the service. The override approach is required because the unit file installed by Ollama does not read `/etc/default/ollama`. LM Studio and Jan are desktop applications; change their server host settings in the app.

            ```yaml
            ---
            - name: Rebind Ollama to localhost
              hosts: workstations
              become: true
              tasks:
                - name: Create the systemd override directory for Ollama
                  ansible.builtin.file:
                    path: /etc/systemd/system/ollama.service.d
                    state: directory
                    mode: "0755"

                - name: Bind Ollama to the loopback address
                  ansible.builtin.copy:
                    dest: /etc/systemd/system/ollama.service.d/override.conf
                    content: |
                      [Service]
                      Environment="OLLAMA_HOST=127.0.0.1:11434"
                    mode: "0644"
                  notify: Restart Ollama

              handlers:
                - name: Restart Ollama
                  ansible.builtin.systemd_service:
                    name: ollama
                    state: restarted
                    daemon_reload: true
            ```
