policies:
  - uid: mondoo-ai-security
    name: Mondoo AI Security
    version: 2.0.2
    license: BUSL-1.1
    tags:
      mondoo.com/category: security
      mondoo.com/platform: macos,linux,windows
    require:
      - provider: os
    authors:
      - name: Mondoo, Inc.
        email: hello@mondoo.com
    summary: Enforce approved AI coding agents, IDE extensions, MCP servers, and local LLM runtimes
    docs:
      desc: |
        The Mondoo AI Security policy identifies unsanctioned AI tooling on corporate endpoints that could exfiltrate source code, leak credentials, or introduce supply-chain risk. This policy helps organizations enforce AI governance and detect unauthorized tooling before it can transmit sensitive files to third-party model providers, bypass code-review controls, and create blind spots for security teams.

        This policy provides security checks across endpoint AI tooling, surfacing unsanctioned components and exposure points:

        - AI coding agents installed as running processes, system packages, or Homebrew packages
        - AI assistant extensions installed in Visual Studio Code
        - Model Context Protocol (MCP) servers running outside the approved allow-list
        - Local large language model runtimes
        - LLM inference servers exposed beyond localhost

        **Aggregate allow-lists.** The `no-unapproved-ai-processes`, `no-unapproved-ai-packages`, and `no-unapproved-homebrew-ai-packages` checks remain governed by the existing `mondooAiSecurityApprovedProcesses` / `mondooAiSecurityApprovedPackages` / `mondooAiSecurityApprovedHomebrewPackages` regex properties (default: `(?i)(copilot|claude)`). Likewise, approved MCP servers are governed by `mondooAiSecurityApprovedMcpServers`.

        Have suggestions for new checks in this policy? Visit our [cnspec repository](https://github.com/mondoohq/cnspec).
    groups:
      - title: Unapproved AI Coding Agents
        filters: |
          asset.family.contains("unix") || asset.family.contains("windows")
        checks:
          - uid: mondoo-ai-security-no-unapproved-ai-processes
          - uid: mondoo-ai-security-no-unapproved-ai-packages
          - uid: mondoo-ai-security-no-unapproved-homebrew-ai-packages
          - uid: mondoo-ai-security-no-cursor
          - uid: mondoo-ai-security-no-windsurf
          - uid: mondoo-ai-security-no-goose
          - uid: mondoo-ai-security-no-zed
          - uid: mondoo-ai-security-no-cline
          - uid: mondoo-ai-security-no-roo
          - uid: mondoo-ai-security-no-continuedev
          - uid: mondoo-ai-security-no-trae
          - uid: mondoo-ai-security-no-opencode
          - uid: mondoo-ai-security-no-kiro
          - uid: mondoo-ai-security-no-pi
          - uid: mondoo-ai-security-no-mistral-vibe
          - uid: mondoo-ai-security-no-antigravity
          - uid: mondoo-ai-security-no-ibm-bob
          - uid: mondoo-ai-security-no-openclaw
          - uid: mondoo-ai-security-no-snowflake-cortex
          - uid: mondoo-ai-security-no-junie
          - uid: mondoo-ai-security-no-augment
          - uid: mondoo-ai-security-no-warp
          - uid: mondoo-ai-security-no-kilocode
          - uid: mondoo-ai-security-no-openhands
          - uid: mondoo-ai-security-no-qwen-code
      - title: Unapproved IDE Extensions
        filters: |
          asset.family.contains("unix") || asset.family.contains("windows")
        checks:
          - uid: mondoo-ai-security-no-vscode-codeium-extension
          - uid: mondoo-ai-security-no-vscode-tabnine-extension
          - uid: mondoo-ai-security-no-vscode-supermaven-extension
          - uid: mondoo-ai-security-no-vscode-continue-extension
          - uid: mondoo-ai-security-no-vscode-cline-extension
          - uid: mondoo-ai-security-no-vscode-cody-extension
          - uid: mondoo-ai-security-no-vscode-codex-extension
          - uid: mondoo-ai-security-no-vscode-claude-extension
          - uid: mondoo-ai-security-no-vscode-cursor-extension
          - uid: mondoo-ai-security-no-vscode-roo-extension
      - title: MCP Server Governance
        filters: |
          asset.family.contains("unix") || asset.family.contains("windows")
        checks:
          - uid: mondoo-ai-security-no-unapproved-mcp-servers
      - title: Local LLM Runtimes
        filters: |
          asset.family.contains("unix") || asset.family.contains("windows")
        checks:
          - uid: mondoo-ai-security-no-local-llm-runtimes
          - uid: mondoo-ai-security-no-local-llm-listening-ports
    scoring_system: highest impact

queries:
  # ---------------------------------------------------------------------------
  # Unapproved AI processes and packages
  # ---------------------------------------------------------------------------
  - uid: mondoo-ai-security-no-unapproved-ai-processes
    title: No unapproved AI agent processes are running
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-uem-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-308-a-5-ii-b-security-awareness-training-and-tools-protection-from-malicious-software
      compliance/iso-27001-2022: iso-27001-2022-a-8-19
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-de-cm-5
      compliance/nist-csf-2: nist-csf-2-pr-ps-05
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-8
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-10
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc6-8-1
      compliance/vda-isa-5: false
    props:
      - uid: mondooAiSecurityApprovedProcesses
        title: Regex matching approved AI process names
        mql: |
          return /(?i)(copilot|claude)/
    mql: |
      processes.where(
        executable == /(?i)(ollama|llama|lmstudio|lm-studio|localai|gpt4all|cursor|windsurf|codeium|tabby|codex|goose|zed|chatgpt)/ &&
        executable != props.mondooAiSecurityApprovedProcesses
      ).length == 0
    docs:
      desc: |
        Unapproved AI coding agents and local LLM runtimes running as live processes can transmit proprietary source code, customer data, or secrets to untrusted model providers. Only AI tools reviewed and approved by the security team should be permitted to execute on corporate endpoints. The `mondooAiSecurityApprovedProcesses` property defines the allow-list and can be customized for your environment.

        **Why this matters**

        - **Data egress:** A running AI agent can stream open files and repository contents to a third-party API without the user explicitly authorizing each transfer.
        - **Credential exposure:** Agents often read environment variables and configuration files that contain tokens, leaking them to the model provider.
        - **Bypassed review:** Code generated or modified by an unsanctioned agent skips the controls that govern approved tooling.
        - **Reduced visibility:** Security teams cannot account for data handled by tools they have not inventoried.
      audit: |-
        To verify that no unapproved AI agent processes are running:

        1. Open a terminal on the endpoint.
        2. List processes whose executables match known AI tool names:

           ```bash
           ps aux | grep -iE 'ollama|lmstudio|cursor|windsurf|codeium|tabby|codex|goose|zed|chatgpt'
           ```

        The endpoint passes when no process outside the approved allow-list is returned. Any matching process that is not an approved tool is a failing result.
      remediation:
        - id: gui
          desc: |
            To remove an unapproved AI tool using the operating system interface:

            1. Quit the application from the macOS menu bar or close it from the Windows system tray.
            2. On macOS, drag the application from `/Applications` to the Trash.
            3. On Windows, open **Settings > Apps > Installed apps**, locate the tool, and select **Uninstall**.
        - id: cli
          desc: |
            To identify, terminate, and uninstall an unapproved AI tool from the command line, search for the same executable names the check matches. Killing the process stops data egress now; uninstalling the package removes the tool so it cannot be relaunched. The commands below use Ollama as the example; repeat the kill and uninstall steps for each unapproved tool you find.

            The uninstall id rarely matches the process name, so look it up before running the uninstall command: `winget search <tool>` on Windows, `brew info <tool>` on macOS, or `dpkg -l | grep <tool>` (`rpm -qa | grep <tool>`) on Linux. For example, LM Studio runs as `lm-studio` but installs as `ElementLabs.LMStudio` (`winget`) or the `lm-studio` cask (`brew uninstall --cask lm-studio`).

            macOS:

            ```bash
            ps aux | grep -iE 'ollama|llama|lmstudio|lm-studio|localai|gpt4all|cursor|windsurf|codeium|tabby|codex|goose|zed|chatgpt'
            pkill -f ollama
            brew uninstall ollama
            ```

            Linux:

            ```bash
            ps aux | grep -iE 'ollama|llama|lmstudio|lm-studio|localai|gpt4all|cursor|windsurf|codeium|tabby|codex|goose|zed|chatgpt'
            pkill -f ollama
            sudo apt remove ollama   # Debian/Ubuntu
            sudo dnf remove ollama   # RHEL/Fedora
            ```

            Windows:

            ```powershell
            Get-Process | Where-Object { $_.Name -match 'ollama|llama|lmstudio|localai|gpt4all|cursor|windsurf|codeium|tabby|codex|goose|zed|chatgpt' }
            Stop-Process -Name ollama
            winget uninstall Ollama
            ```
        - id: ansible
          desc: |
            To stop and remove unapproved AI agent processes with Ansible:

            This playbook terminates any running AI processes matching the executable names the check inspects and removes the associated packages. The `unapproved_ai_packages` list holds placeholder values; replace them with the package names flagged on your endpoints.

            ```yaml
            ---
            - name: Remove unapproved AI agent processes
              hosts: workstations
              tasks:
                - name: Kill unapproved AI agent processes
                  ansible.builtin.command:
                    cmd: pkill -f "{{ item }}"
                  loop:
                    - ollama
                    - llama
                    - lmstudio
                    - lm-studio
                    - localai
                    - gpt4all
                    - cursor
                    - windsurf
                    - codeium
                    - tabby
                    - codex
                    - goose
                    - zed
                    - chatgpt
                  failed_when: false

            - name: Remove unapproved AI packages (system)
              hosts: workstations
              become: true
              vars:
                unapproved_ai_packages:
                  - ollama
                  - lm-studio
                  - gpt4all
              tasks:
                - name: Remove unapproved AI packages
                  ansible.builtin.package:
                    name: "{{ item }}"
                    state: absent
                  loop: "{{ unapproved_ai_packages }}"
            ```

  - uid: mondoo-ai-security-no-unapproved-ai-packages
    title: No unapproved AI tools installed via package managers
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-uem-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-308-a-5-ii-b-security-awareness-training-and-tools-protection-from-malicious-software
      compliance/iso-27001-2022: iso-27001-2022-a-8-19
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-de-cm-5
      compliance/nist-csf-2: nist-csf-2-pr-ps-05
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-8
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-10
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc6-8-1
      compliance/vda-isa-5: false
    props:
      - uid: mondooAiSecurityApprovedPackages
        title: Regex matching approved AI package names
        mql: |
          return /(?i)(copilot|claude)/
    mql: |
      packages.where(
        name == /(?i)(ollama|llama-cpp|llama\.cpp|lm-studio|localai|gpt4all|cursor|windsurf|codeium|tabby|codex|goose|chatgpt)/ &&
        name != props.mondooAiSecurityApprovedPackages
      ).length == 0
    docs:
      desc: |
        Unapproved AI tools installed through system package managers such as apt, dnf, rpm, or the Windows uninstall registry remain available even when not actively running. Only AI tools reviewed and approved by the security team should be present on corporate endpoints. The `mondooAiSecurityApprovedPackages` property defines the allow-list and can be customized for your environment.

        **Why this matters**

        - **Latent risk:** An installed but idle AI tool can be launched at any time, reintroducing data-egress exposure on demand.
        - **Cached state:** Package installations often retain credentials and configuration from prior use that survive between sessions.
        - **Inventory gaps:** Tools installed outside the approved set leave security teams without an accurate picture of endpoint software.
        - **Update channels:** Unsanctioned packages pull updates from third-party repositories that are not part of the organization's supply chain.
      audit: |-
        To verify that no unapproved AI tools are installed via package managers:

        1. Open a terminal on the endpoint.
        2. List installed packages and search for known AI tool names:

           ```bash
           dpkg -l | grep -iE 'ollama|llama|lm-studio|localai|gpt4all|cursor|windsurf|codeium|tabby|codex|goose|chatgpt'
           ```

           On RHEL or Fedora, use `rpm -qa` in place of `dpkg -l`.

        The endpoint passes when no package outside the approved allow-list is returned. Any matching package that is not an approved tool is a failing result.
      remediation:
        - id: gui
          desc: |
            To remove an unapproved AI package using the operating system interface:

            1. On Windows, open **Settings > Apps > Installed apps**, locate the tool, and select **Uninstall**.
            2. On macOS, quit the application and drag it from `/Applications` to the Trash. If the tool shipped with an uninstaller app, run that instead so package receipts are removed.
        - id: cli
          desc: |
            To remove an unapproved AI package using the system package manager, with Ollama as the example. Removing the package takes the tool off the endpoint so it cannot be relaunched.

            The package id rarely matches the process name, so look it up before running the uninstall command: `winget search <tool>` on Windows, `brew info <tool>` on macOS, or `dpkg -l | grep <tool>` (`rpm -qa | grep <tool>`) on Linux. For example, LM Studio runs as `lm-studio` but installs as `ElementLabs.LMStudio` (`winget`) or the `lm-studio` cask (`brew uninstall --cask lm-studio`).

            macOS:

            ```bash
            brew uninstall ollama
            ```

            Linux:

            ```bash
            sudo apt remove ollama   # Debian/Ubuntu
            sudo dnf remove ollama   # RHEL/Fedora
            ```

            Windows:

            ```powershell
            winget uninstall Ollama
            ```
        - id: ansible
          desc: |
            To remove unapproved AI packages installed via system package managers with Ansible:

            This playbook removes unapproved AI packages through the system package manager on Linux endpoints. On macOS, packages installed through Homebrew are covered by the Homebrew playbook in the Homebrew check; applications installed outside a package manager must be removed through their own uninstallers. The `unapproved_ai_packages` list holds placeholder values; replace them with the package names flagged on your endpoints.

            ```yaml
            ---
            - name: Remove unapproved AI packages
              hosts: workstations
              become: true
              vars:
                unapproved_ai_packages:
                  - ollama
                  - lm-studio
                  - gpt4all
              tasks:
                - name: Remove unapproved AI package
                  ansible.builtin.package:
                    name: "{{ item }}"
                    state: absent
                  loop: "{{ unapproved_ai_packages }}"
            ```

  - uid: mondoo-ai-security-no-unapproved-homebrew-ai-packages
    title: No unapproved AI tools installed via Homebrew
    filters: asset.platform == "macos"
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-uem-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-308-a-5-ii-b-security-awareness-training-and-tools-protection-from-malicious-software
      compliance/iso-27001-2022: iso-27001-2022-a-8-19
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-de-cm-5
      compliance/nist-csf-2: nist-csf-2-pr-ps-05
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-8
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-10
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc6-8-1
      compliance/vda-isa-5: false
    props:
      - uid: mondooAiSecurityApprovedHomebrewPackages
        title: Regex matching approved Homebrew AI package names
        mql: |
          return /(?i)(copilot|claude)/
    mql: |
      homebrew.packages.where(
        name == /(?i)(ollama|llama|llama-cpp|lm-studio|localai|gpt4all|cursor|windsurf|codex|chatgpt|goose|codeium|tabby)/ &&
        name != props.mondooAiSecurityApprovedHomebrewPackages
      ).length == 0
    docs:
      desc: |
        Homebrew is a common installation path for desktop AI applications on macOS, and packages installed this way persist outside the approved software set. Only AI tools reviewed and approved by the security team should be present on corporate endpoints. The `mondooAiSecurityApprovedHomebrewPackages` property defines the allow-list and can be customized for your environment.

        **Why this matters**

        - **Unmanaged installs:** Homebrew lets users install AI tools without administrator review or change control.
        - **Latent risk:** A package that is installed but idle can be launched at any time, reintroducing data-egress exposure.
        - **Inventory gaps:** Tools installed outside the approved set leave security teams without an accurate picture of endpoint software.
        - **Third-party taps:** Homebrew casks can pull from community taps that are not part of the organization's supply chain.
      audit: |-
        To verify that no unapproved AI tools are installed via Homebrew:

        1. Open a terminal on the macOS endpoint.
        2. List installed Homebrew packages and casks and search for known AI tool names:

           ```bash
           brew list --versions | grep -iE 'ollama|llama|lm-studio|localai|gpt4all|cursor|windsurf|codex|chatgpt|goose|codeium|tabby'
           ```

        The endpoint passes when no package outside the approved allow-list is returned. Any matching package that is not an approved tool is a failing result.
      remediation:
        - id: cli
          desc: |
            To remove an unapproved AI package installed via Homebrew:

            ```bash
            brew uninstall <package_name>
            ```
        - id: ansible
          desc: |
            To remove unapproved AI packages installed via Homebrew with Ansible:

            This playbook removes unapproved AI packages from Homebrew on macOS endpoints. The `unapproved_homebrew_ai_packages` list below holds placeholder values — replace them with the package names flagged on your endpoints.

            ```yaml
            ---
            - name: Remove unapproved Homebrew AI packages
              hosts: workstations
              become: false
              vars:
                unapproved_homebrew_ai_packages:
                  - ollama
                  - lm-studio
                  - gpt4all
              tasks:
                - name: Remove unapproved Homebrew AI package
                  community.general.homebrew:
                    name: "{{ item }}"
                    state: absent
                  loop: "{{ unapproved_homebrew_ai_packages }}"
            ```

  # ---------------------------------------------------------------------------
  # Unapproved AI agent configurations
  # ---------------------------------------------------------------------------
  - uid: mondoo-ai-security-no-cursor
    title: Cursor editor is not configured on this endpoint
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-uem-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-308-a-5-ii-b-security-awareness-training-and-tools-protection-from-malicious-software
      compliance/iso-27001-2022: iso-27001-2022-a-8-19
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-de-cm-5
      compliance/nist-csf-2: nist-csf-2-pr-ps-05
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-8
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-10
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc6-8-1
      compliance/vda-isa-5: false
    mql: |
      cursor.skills.length == 0 && cursor.mcpServers.length == 0 && cursor.rules.length == 0
    docs:
      desc: |
        Cursor is an AI-native code editor that sends code to cloud AI models for completion and chat. When it is configured on an endpoint, proprietary source code can be transmitted to third-party services as part of normal editing. Endpoints should carry only the editors approved by the security team.

        **Why this matters**

        - **Source code exposure:** Editing files in Cursor routinely uploads code context to a cloud model provider.
        - **Credential leakage:** Repository files opened in the editor may contain tokens and secrets that are sent alongside code context.
        - **Bypassed review:** AI-generated edits applied through Cursor skip the controls that govern approved tooling.
        - **Inventory gaps:** An unsanctioned editor leaves security teams without an accurate picture of how code leaves the endpoint.
      audit: |-
        To verify that Cursor is not configured on the endpoint:

        1. Open a terminal on the endpoint.
        2. Check for the Cursor configuration directories:

           ```bash
           ls -d ~/.cursor ~/Library/Application\ Support/Cursor ~/.config/Cursor 2>/dev/null
           ```

        The endpoint passes when no Cursor configuration directory exists. A directory containing skills, MCP servers, or rules is a failing result.
      remediation:
        - id: gui
          desc: |
            To remove Cursor using the operating system interface:

            1. On macOS, quit Cursor and drag the application from `/Applications` to the Trash.
            2. On Windows, open **Settings > Apps > Installed apps**, locate Cursor, and select **Uninstall**.
            3. Delete the leftover configuration folder, which the uninstaller does not remove and which is what this check inspects. On macOS, open Finder, choose **Go > Go to Folder**, enter `~/.cursor`, and move the folder to the Trash. On Windows, delete the `.cursor` folder in your user profile directory using File Explorer.
        - id: cli
          desc: |
            To uninstall Cursor and remove its configuration from the command line:

            macOS:

            ```bash
            rm -rf ~/Library/Application\ Support/Cursor
            rm -rf ~/.cursor
            ```

            Linux:

            ```bash
            rm -rf ~/.config/Cursor
            rm -rf ~/.cursor
            ```

            Windows:

            ```powershell
            Remove-Item -Recurse -Force "$env:APPDATA\Cursor"
            Remove-Item -Recurse -Force "$env:USERPROFILE\.cursor"
            winget uninstall Cursor
            ```
        - id: ansible
          desc: |
            To remove Cursor configuration directories with Ansible:

            This playbook removes the Cursor editor configuration directories from the endpoint.

            ```yaml
            ---
            - name: Remove Cursor
              hosts: workstations
              tasks:
                - name: Remove Cursor configuration directories
                  ansible.builtin.file:
                    path: "{{ item }}"
                    state: absent
                  loop:
                    - "{{ ansible_env.HOME }}/Library/Application Support/Cursor"
                    - "{{ ansible_env.HOME }}/.cursor"
                    - "{{ ansible_env.HOME }}/.config/Cursor"
            ```

  - uid: mondoo-ai-security-no-windsurf
    title: Windsurf editor is not configured on this endpoint
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-uem-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-308-a-5-ii-b-security-awareness-training-and-tools-protection-from-malicious-software
      compliance/iso-27001-2022: iso-27001-2022-a-8-19
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-de-cm-5
      compliance/nist-csf-2: nist-csf-2-pr-ps-05
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-8
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-10
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc6-8-1
      compliance/vda-isa-5: false
    mql: |
      windsurf.skills.length == 0 && windsurf.mcpServers.length == 0 && windsurf.rules.length == 0
    docs:
      desc: |
        Windsurf is an AI-native code editor from Codeium that sends code to cloud AI models for completion and chat. When it is configured on an endpoint, proprietary source code can be transmitted to third-party services as part of normal editing. Endpoints should carry only the editors approved by the security team.

        **Why this matters**

        - **Source code exposure:** Editing files in Windsurf routinely uploads code context to a cloud model provider.
        - **Credential leakage:** Repository files opened in the editor may contain tokens and secrets that are sent alongside code context.
        - **Bypassed review:** AI-generated edits applied through Windsurf skip the controls that govern approved tooling.
        - **Inventory gaps:** An unsanctioned editor leaves security teams without an accurate picture of how code leaves the endpoint.
      audit: |-
        To verify that Windsurf is not configured on the endpoint:

        1. Open a terminal on the endpoint.
        2. Check for the Windsurf configuration directories:

           ```bash
           ls -d ~/.codeium/windsurf ~/Library/Application\ Support/Windsurf ~/.config/Windsurf 2>/dev/null
           ```

        The endpoint passes when no Windsurf configuration directory exists. A directory containing skills, MCP servers, or rules is a failing result.
      remediation:
        - id: gui
          desc: |
            To remove Windsurf using the operating system interface:

            1. On macOS, quit Windsurf and drag the application from `/Applications` to the Trash.
            2. On Windows, open **Settings > Apps > Installed apps**, locate Windsurf, and select **Uninstall**.
