      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-308-a-5-ii-b-security-awareness-training-and-tools-protection-from-malicious-software
      compliance/iso-27001-2022: iso-27001-2022-a-8-19
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-de-cm-5
      compliance/nist-csf-2: nist-csf-2-pr-ps-05
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-8
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-10
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc6-8-1
      compliance/vda-isa-5: false
    mql: |
      cline.skills.length == 0
    docs:
      desc: |
        Cline is an autonomous AI coding agent that connects to cloud model providers and can execute commands and modify files on the endpoint. When it is configured, proprietary source code and credentials can be transmitted to third-party services. Endpoints should carry only the AI agents approved by the security team.

        **Why this matters**

        - **Autonomous execution:** Cline can run commands and edit files with the user's full privileges.
        - **Source code exposure:** The agent sends file and repository context to a cloud model provider.
        - **Credential leakage:** Files and environment variables read by the agent may contain tokens that reach a third-party API.
        - **Inventory gaps:** An unsanctioned agent leaves security teams without an accurate picture of how code and data leave the endpoint.
      audit: |-
        To verify that Cline is not configured on the endpoint:

        1. Open a terminal on the endpoint.
        2. Check for the shared agent skills directory that Cline reads and the Cline configuration directory:

           ```bash
           ls -d ~/.agents/skills ~/.cline 2>/dev/null
           ```

        The endpoint passes when the shared skills directory contains no skills. A `~/.agents/skills` directory containing skill definitions is a failing result.
      remediation:
        - id: cli
          desc: |
            Cline runs as a VS Code extension. Deleting its configuration directory does not uninstall the agent: the extension stays installed and regenerates its configuration the next time the editor starts. Uninstall the extension first, then remove the leftover configuration.

            Uninstall the Cline extension from whichever editor has it installed:

            ```bash
            code --uninstall-extension saoudrizwan.claude-dev       # VS Code
            cursor --uninstall-extension saoudrizwan.claude-dev     # Cursor
            windsurf --uninstall-extension saoudrizwan.claude-dev   # Windsurf
            ```

            Cline reads agent skills from the shared `~/.agents/skills` directory rather than its own configuration folder. Remove the skill definitions there, and remove the Cline configuration directory as well. The shared directory may also be used by other agents that follow the same skills convention; if an approved tool relies on it, delete only the unapproved skill subfolders instead of the whole directory. Removing these directories deletes any saved Cline history and settings, so confirm the contents before deleting.

            macOS and Linux:

            ```bash
            rm -rf ~/.agents/skills
            rm -rf ~/.cline
            ```

            Windows:

            ```powershell
            Remove-Item -Recurse -Force "$env:USERPROFILE\.agents\skills"
            Remove-Item -Recurse -Force "$env:USERPROFILE\.cline"
            ```
        - id: ansible
          desc: |
            To remove Cline skills and configuration with Ansible:

            This playbook removes the shared agent skills directory that Cline reads and the Cline configuration directory.

            ```yaml
            ---
            - name: Remove Cline
              hosts: workstations
              tasks:
                - name: Remove Cline skills and configuration directories
                  ansible.builtin.file:
                    path: "{{ item }}"
                    state: absent
                  loop:
                    - "{{ ansible_env.HOME }}/.agents/skills"
                    - "{{ ansible_env.HOME }}/.cline"
            ```

