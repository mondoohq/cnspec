  - uid: mondoo-alibaba-security-rds-instance-deletion-protection
    title: Ensure RDS instances have deletion protection enabled
    impact: 60
    docs:
      desc: |
        This check ensures that ApsaraDB for RDS instances have release (deletion) protection enabled so that a production database cannot be destroyed by an accidental or malicious delete request. Without deletion protection, a single API call or console action can permanently remove the instance and its data.

        **Why this matters**

        - **Irreversible data loss:** Deleting a database instance removes its data; without a guardrail a mistaken or malicious request can cause an outage and permanent loss.
        - **Availability impact:** Loss of a production database directly disrupts the applications and services that depend on it.
        - **Insider and automation risk:** Broad delete permissions or misfiring automation can remove critical instances unless a protective lock is in place.

        **Risk mitigation**

        - **Prevents accidental destruction:** Deletion protection requires the lock to be explicitly removed before an instance can be deleted, blocking one-step mistakes.
        - **Adds a deliberate safeguard:** The extra step gives operators a chance to catch and stop an unintended or unauthorized deletion.
      audit: |
        ### Audit via Console

        1. Sign in to the [ApsaraDB for RDS console](https://rdsnext.console.aliyun.com/).
        2. Open each instance and review the **Basic Information** page for **Release Protection**.
        3. Confirm that **Release Protection** is enabled.

        A passing instance shows release protection enabled. A failing instance shows it disabled.

        ### Audit via CLI

        1. Describe each instance and inspect the deletion protection flag:

        ```bash
        aliyun rds DescribeDBInstanceAttribute --DBInstanceId <instance-id>
        ```

        A passing instance reports `DeletionProtection` as `true`. A failing instance reports `false`.
      remediation:
        - id: console
          desc: |
            To enable release protection on an RDS instance in the console:

            1. Sign in to the [ApsaraDB for RDS console](https://rdsnext.console.aliyun.com/).
            2. Open the affected instance and go to **Basic Information**.
            3. Enable **Release Protection** and save.
        - id: cli
          desc: |
            To enable deletion protection on an RDS instance with the `aliyun` CLI:

            ```bash
            aliyun rds ModifyDBInstanceDeletionProtection \
              --DBInstanceId <instance-id> \
              --DeletionProtection true
            ```
        - id: terraform
          desc: |
            To enable deletion protection on an RDS instance in Terraform, set `deletion_protection` to `true`:

            ```hcl
            resource "alicloud_db_instance" "example" {
              engine               = "MySQL"
              engine_version       = "8.0"
              instance_type        = "rds.mysql.s2.large"
              instance_storage     = 30
              instance_charge_type = "Postpaid"

              deletion_protection = true
            }
            ```
    variants:
      - uid: mondoo-alibaba-security-rds-instance-deletion-protection-alicloud
      - uid: mondoo-alibaba-security-rds-instance-deletion-protection-terraform-hcl
      - uid: mondoo-alibaba-security-rds-instance-deletion-protection-terraform-plan
      - uid: mondoo-alibaba-security-rds-instance-deletion-protection-terraform-state
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: false
      compliance/dora: false
      compliance/hipaa: false
      compliance/iso-27001-2022: false
      compliance/nis-2: false
      compliance/nist-ai-100-1: false
      compliance/nist-csf-1: false
      compliance/nist-csf-2: false
      compliance/nist-sp-800-171: false
      compliance/nist-sp-800-53-rev5: false
      compliance/pci-dss-4: false
      compliance/soc2-2017: false
      compliance/vda-isa-5: false
  - uid: mondoo-alibaba-security-rds-instance-deletion-protection-alicloud
    filters: asset.platform == "alicloud"
    mql: |
      alicloud.rds.instances.all(deletionProtection == true)
  - uid: mondoo-alibaba-security-rds-instance-deletion-protection-terraform-hcl
    filters: |
      asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "alicloud_db_instance")
    mql: |
      terraform.resources("alicloud_db_instance").all(arguments["deletion_protection"] == true)
  - uid: mondoo-alibaba-security-rds-instance-deletion-protection-terraform-plan
    filters: |
      asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "alicloud_db_instance")
    mql: |
      terraform.plan.resourceChanges.where(type == "alicloud_db_instance").all(
