  - uid: mondoo-alibaba-security-kms-key-rotation-enabled
    title: Ensure KMS customer master keys have automatic rotation enabled
    impact: 70
    docs:
      desc: |
        This check ensures that symmetric, KMS-managed customer master keys (CMKs) have automatic key rotation enabled. Without rotation, the same key material protects data indefinitely, so a single key compromise exposes the entire history of data encrypted under that key.

        **Why this matters**

        - **Limits key exposure window:** Rotating key material regularly bounds how much data is protected by any single version of a key.
        - **Contains compromise:** If a key version is exposed, rotation ensures newer data is protected by material the attacker does not hold.
        - **Meets cryptographic hygiene expectations:** Regular rotation is a baseline expectation of most key-management standards.

        **Risk mitigation**

        - **Reduces blast radius:** Compromise of one key version does not compromise data encrypted under later versions.
        - **Automates a manual control:** Automatic rotation removes reliance on operators remembering to rotate keys on schedule.
      audit: |
        ### Audit via Console

        1. Sign in to the [KMS console](https://kms.console.aliyun.com/).
        2. Open each customer master key and review the **Key Rotation** setting.

        A passing key shows automatic rotation enabled. A failing key shows rotation disabled.

        ### Audit via CLI

        1. Inspect each key's rotation status with the `aliyun` CLI:

        ```bash
        aliyun kms DescribeKey --KeyId <key-id>
        ```

        A passing key returns `AutomaticRotation` as `Enabled`. A failing key returns `Disabled`.
      remediation:
        - id: console
          desc: |
            To enable automatic rotation on a KMS key in the console:

            1. Sign in to the [KMS console](https://kms.console.aliyun.com/).
            2. Open the customer master key.
            3. Enable **Key Rotation** and set a rotation period.
        - id: cli
          desc: |
            To enable automatic rotation with the `aliyun` CLI:

            ```bash
            aliyun kms UpdateRotationPolicy --KeyId <key-id> \
              --EnableAutomaticRotation true --RotationInterval 31536000s
            ```
        - id: terraform
          desc: |
            To enable automatic rotation in Terraform, set `automatic_rotation` on the key:

            ```hcl
            resource "alicloud_kms_key" "example" {
              description        = "example key"
              key_usage          = "ENCRYPT/DECRYPT"
              automatic_rotation = "Enabled"
              rotation_interval  = "31536000s"
            }
            ```
    variants:
      - uid: mondoo-alibaba-security-kms-key-rotation-enabled-alicloud
      - uid: mondoo-alibaba-security-kms-key-rotation-enabled-terraform-hcl
      - uid: mondoo-alibaba-security-kms-key-rotation-enabled-terraform-plan
      - uid: mondoo-alibaba-security-kms-key-rotation-enabled-terraform-state
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: false
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-ai-100-1: false
      compliance/nist-csf-1: false
      compliance/nist-csf-2: false
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-10
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-12
      compliance/pci-dss-4: pcidss-requirement-3
      compliance/soc2-2017: soc2-control-cc6-1-11
      compliance/vda-isa-5: vda-isa-5-5-1-1
  - uid: mondoo-alibaba-security-kms-key-rotation-enabled-alicloud
    filters: asset.platform == "alicloud"
    mql: |
      alicloud.kms.keys.where(keyState.downcase == "enabled").where(origin == "Aliyun_KMS").where(keyUsage.downcase == "encrypt/decrypt").all(automaticRotation == "Enabled")
  - uid: mondoo-alibaba-security-kms-key-rotation-enabled-terraform-hcl
    filters: |
      asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "alicloud_kms_key")
    mql: |
      terraform.resources("alicloud_kms_key").where(arguments["key_usage"] == empty || arguments["key_usage"].downcase == "encrypt/decrypt").all(arguments["automatic_rotation"] == "Enabled")
  - uid: mondoo-alibaba-security-kms-key-rotation-enabled-terraform-plan
    filters: |
      asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "alicloud_kms_key")
    mql: |
      terraform.plan.resourceChanges.where(type == "alicloud_kms_key").all(change.after["automatic_rotation"] == "Enabled")
  - uid: mondoo-alibaba-security-kms-key-rotation-enabled-terraform-state
    filters: |
      asset.platform == "terraform-state" && terraform.state.resources.contains(type == "alicloud_kms_key")
    mql: |
      terraform.state.resources.where(type == "alicloud_kms_key").all(values["automatic_rotation"] == "Enabled")

# No Terraform variants: the check bounds the rotation interval numerically, but Terraform expresses rotation_interval as a duration string ("31536000s") that cannot be parsed to an integer inside a variant query in this engine. The Terraform remediation still shows how to set a compliant interval.
  - uid: mondoo-alibaba-security-kms-key-rotation-interval
    title: Ensure KMS keys rotate at least once every 365 days
    impact: 70
    docs:
      desc: |
        This check ensures that KMS customer master keys with automatic rotation enabled are scheduled to rotate at least once every 365 days, by verifying the next scheduled rotation falls within a year. A rotation interval longer than a year leaves key material in service well beyond common cryptographic-hygiene guidance.

        **Why this matters**

        - **Bounds material lifetime:** A shorter rotation interval reduces the amount of data and time any single key version protects.
        - **Aligns with policy baselines:** Annual rotation is a widely referenced maximum for symmetric key material.
        - **Reduces standing risk:** Long-lived key versions accumulate exposure from backups, logs, and prior access.

        **Risk mitigation**

        - **Shrinks compromise value:** Frequent rotation limits the payoff of capturing a single key version.
        - **Enforces a ceiling:** A defined maximum interval prevents rotation from being set so far out that it never meaningfully occurs.
      audit: |
        ### Audit via Console

        1. Sign in to the [KMS console](https://kms.console.aliyun.com/).
        2. Open each customer master key with rotation enabled and review the **Rotation Period**.

        A passing key shows a rotation period of 365 days or less. A failing key shows a longer period.

        ### Audit via CLI

        1. Inspect each key's rotation interval with the `aliyun` CLI:

        ```bash
        aliyun kms DescribeKey --KeyId <key-id>
        ```

        A passing key returns a `RotationInterval` of `31536000s` (365 days) or less. A failing key returns a larger value.
      remediation:
        - id: console
          desc: |
            To shorten the rotation period in the console:

            1. Sign in to the [KMS console](https://kms.console.aliyun.com/).
            2. Open the customer master key.
            3. Set the **Rotation Period** to 365 days or less.
        - id: cli
          desc: |
            To set a rotation interval of 365 days or less with the `aliyun` CLI:

            ```bash
            aliyun kms UpdateRotationPolicy --KeyId <key-id> \
              --EnableAutomaticRotation true --RotationInterval 31536000s
            ```
        - id: terraform
          desc: |
            To bound the rotation interval in Terraform, set `rotation_interval` to 365 days or less:

            ```hcl
            resource "alicloud_kms_key" "example" {
              description        = "example key"
              automatic_rotation = "Enabled"
              rotation_interval  = "31536000s"
            }
            ```
    variants:
      - uid: mondoo-alibaba-security-kms-key-rotation-interval-alicloud
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: false
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-ai-100-1: false
      compliance/nist-csf-1: false
      compliance/nist-csf-2: false
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-10
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-12
      compliance/pci-dss-4: pcidss-requirement-3
      compliance/soc2-2017: soc2-control-cc6-1-11
      compliance/vda-isa-5: vda-isa-5-5-1-1
  - uid: mondoo-alibaba-security-kms-key-rotation-interval-alicloud
    filters: asset.platform == "alicloud"
    mql: |
      alicloud.kms.keys.where(automaticRotation == "Enabled").all(nextRotationDate != empty && nextRotationDate <= time.now + 365 * time.day)

  # ===========================================================================
  # ActionTrail
  # ===========================================================================
  - uid: mondoo-alibaba-security-actiontrail-trail-enabled
    title: Ensure at least one ActionTrail trail is enabled and logging
    impact: 90
    docs:
      desc: |
        This check ensures that the Alibaba Cloud account has at least one ActionTrail trail that is enabled and actively delivering logs. ActionTrail records management events across the account, so a disabled trail, or an account with no trail at all, leaves administrative and API activity unrecorded.

        **Why this matters**

        - **Audit logging is the record of who did what:** ActionTrail captures console and API operations across services; without it there is no authoritative trail of resource changes, sign-ins, or configuration edits.
        - **Detection depends on logs:** Threat detection, alerting, and post-incident forensics all rely on a continuous event record; a stopped or missing trail creates a blind spot an attacker can operate within undetected.
        - **Compliance requires retained audit records:** Regulatory regimes expect account activity to be logged and retained, and an unenabled trail fails that expectation outright.

        **Risk mitigation**

        - **Preserves accountability:** An enabled, logging trail attributes every recorded action to an identity, deterring misuse and supporting investigations.
        - **Enables timely response:** Continuous delivery of events to OSS or Simple Log Service feeds monitoring and alerting so suspicious activity can be caught early.
      audit: |
        ### Audit via Console

        1. Sign in to the [ActionTrail console](https://actiontrail.console.aliyun.com/).
        2. Navigate to **Trails**.
        3. Confirm that at least one trail exists, its status is **Enabled**, and it is actively delivering logs.

        A passing account has an enabled trail that is logging. A failing account has no trail, or every trail is disabled or stopped.

        ### Audit via CLI

        1. List trails and review each trail's status:

        ```bash
        aliyun actiontrail DescribeTrails
        aliyun actiontrail GetTrailStatus --Name <trail-name>
        ```

        A passing account returns a trail whose `Status` is `Enable` and whose `IsLogging` is `true`. A failing account returns no trail, or trails that are disabled or not logging.
      remediation:
        - id: console
          desc: |
            To create and enable a trail in the ActionTrail console:

            1. Sign in to the [ActionTrail console](https://actiontrail.console.aliyun.com/).
            2. Navigate to **Trails** and choose **Create Trail**.
            3. Select a delivery destination (an OSS bucket and/or a Simple Log Service project) and complete the wizard.
            4. Confirm the new trail's status is **Enabled** and that it is logging.
        - id: cli
          desc: |
            To create and start a trail with the `aliyun` CLI, create it against a delivery destination, then enable logging:

            ```bash
            aliyun actiontrail CreateTrail --Name <trail-name> \
              --OssBucketName <bucket-name> --EventRW All
            aliyun actiontrail StartLogging --Name <trail-name>
            ```
        - id: terraform
          desc: |
            To declare an enabled ActionTrail trail in Terraform, set `status` to `Enable`:

            ```hcl
            resource "alicloud_actiontrail_trail" "example" {
              trail_name      = "example-trail"
              oss_bucket_name = alicloud_oss_bucket.example.bucket
              event_rw        = "All"
              status          = "Enable"
            }
            ```
    variants:
      - uid: mondoo-alibaba-security-actiontrail-trail-enabled-alicloud
      - uid: mondoo-alibaba-security-actiontrail-trail-enabled-terraform-hcl
      - uid: mondoo-alibaba-security-actiontrail-trail-enabled-terraform-plan
      - uid: mondoo-alibaba-security-actiontrail-trail-enabled-terraform-state
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-03
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-ai-100-1: false
      compliance/nist-csf-1: nist-csf-1-de-cm
      compliance/nist-csf-2: nist-csf-2-de-cm
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-2
      compliance/pci-dss-4: pcidss-requirement-10
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
  - uid: mondoo-alibaba-security-actiontrail-trail-enabled-alicloud
    filters: asset.platform == "alicloud"
    mql: |
      alicloud.actiontrail.trails.any(status == "Enable" && isLogging == true)
  - uid: mondoo-alibaba-security-actiontrail-trail-enabled-terraform-hcl
    filters: |
      asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "alicloud_actiontrail_trail")
    mql: |
      terraform.resources("alicloud_actiontrail_trail").all(arguments["status"] != "Disable")
  - uid: mondoo-alibaba-security-actiontrail-trail-enabled-terraform-plan
    filters: |
      asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "alicloud_actiontrail_trail")
    mql: |
      terraform.plan.resourceChanges.where(type == "alicloud_actiontrail_trail").all(
        change.after["status"] != "Disable"
      )
  - uid: mondoo-alibaba-security-actiontrail-trail-enabled-terraform-state
    filters: |
      asset.platform == "terraform-state" && terraform.state.resources.contains(type == "alicloud_actiontrail_trail")
    mql: |
      terraform.state.resources.where(type == "alicloud_actiontrail_trail").all(
        values["status"] != "Disable"
