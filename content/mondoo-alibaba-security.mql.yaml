  # ===========================================================================
  # Redis (Tair)
  # ===========================================================================
  - uid: mondoo-alibaba-security-redis-instance-auth-enabled
    title: Ensure Redis (Tair) instances require password authentication
    impact: 85
    docs:
      desc: |
        This check ensures that every ApsaraDB for Redis (Tair) instance enforces password authentication. Redis instances can be placed in a password-free access mode that lets any client inside the VPC connect without presenting credentials, so a single foothold on an adjacent host grants direct read/write access to the cached data.

        **Why this matters**

        - **Password-free access removes the last control:** When authentication is disabled, network reachability is the only barrier; any compromised workload, container, or peered network in the VPC can read and modify every key.
        - **Caches hold sensitive data:** Redis frequently stores session tokens, credentials, and personal data, so unauthenticated access is a direct path to account takeover and data theft.
        - **Lateral movement is amplified:** An attacker who lands anywhere in the VPC can pivot straight into the datastore without needing to steal a credential first.

        **Risk mitigation**

        - **Requires a credential to connect:** Enforcing authentication blocks anonymous clients even when they can reach the instance over the network.
        - **Contains lateral movement:** A compromised neighbor must also obtain the instance password before it can touch the data.
      audit: |
        ### Audit via Console

        1. Sign in to the [ApsaraDB for Redis console](https://kvstore.console.aliyun.com/).
        2. Open each instance and review **Instance Information** for the **Password-free Access** (VPC authentication) setting.
        3. Confirm password-free access is disabled so a password is required.

        A passing instance requires a password. A failing instance has password-free access enabled.

        ### Audit via CLI

        1. Inspect the VPC authentication mode of each instance with the `aliyun` CLI:

        ```bash
        aliyun r-kvstore DescribeInstanceAttribute --InstanceId <instance-id>
        ```

        A passing instance returns `VpcAuthMode` set to `Open` (authentication required). A failing instance returns `Close` (password-free access).
      remediation:
        - id: console
          desc: |
            To require password authentication for a Redis instance in the console:

            1. Sign in to the [ApsaraDB for Redis console](https://kvstore.console.aliyun.com/).
            2. Open the affected instance and go to **Instance Information**.
            3. Turn off **Password-free Access** so clients must authenticate, then reset the instance password if needed.
        - id: cli
          desc: |
            To enforce password authentication with the `aliyun` CLI, set the VPC authentication mode to `Open`:

            ```bash
            aliyun r-kvstore ModifyInstanceVpcAuthMode --InstanceId <instance-id> --VpcAuthMode Open
            ```
        - id: terraform
          desc: |
            To enforce password authentication on a Redis (Tair) instance in Terraform, set `vpc_auth_mode` to `Open`:

            ```hcl
            resource "alicloud_kvstore_instance" "example" {
              db_instance_name = "example-instance"
              instance_class   = "redis.master.small.default"
              engine_version   = "5.0"
              vswitch_id       = alicloud_vswitch.example.id

              vpc_auth_mode = "Open"
            }
            ```
    variants:
      - uid: mondoo-alibaba-security-redis-instance-auth-enabled-alicloud
      - uid: mondoo-alibaba-security-redis-instance-auth-enabled-terraform-hcl
      - uid: mondoo-alibaba-security-redis-instance-auth-enabled-terraform-plan
      - uid: mondoo-alibaba-security-redis-instance-auth-enabled-terraform-state
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-14
      compliance/dora: false
