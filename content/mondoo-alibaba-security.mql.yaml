  - uid: mondoo-alibaba-security-rds-instance-restrict-security-ip-list
    title: Ensure RDS instance IP allowlists are not open to the internet
    impact: 85
    docs:
      desc: |
        This check ensures that no ApsaraDB for RDS instance has an IP allowlist entry of `0.0.0.0/0`, which would permit connections from any source address on the internet. A world-open allowlist removes the network barrier in front of the database and leaves only credentials protecting it.

        **Why this matters**

        - **World-open access:** An allowlist entry of `0.0.0.0/0` accepts connection attempts from every IP address, exposing the database to internet-wide scanning and brute-force attempts.
        - **Single line of defense:** With the network barrier removed, only the database password stands between an attacker and the data.
        - **Common breach vector:** Databases reachable from anywhere are routinely discovered and compromised through weak or leaked credentials.

        **Risk mitigation**

        - **Restores network segmentation:** Limiting the allowlist to specific trusted addresses forces connections through known, controlled sources.
        - **Reduces exposure:** A tightly scoped allowlist keeps the database off the open internet even if a credential is compromised.
      audit: |
        ### Audit via Console

        1. Sign in to the [ApsaraDB for RDS console](https://rdsnext.console.aliyun.com/).
        2. Open each instance and navigate to **Data Security** > **Whitelist Settings**.
        3. Review every whitelist group and confirm that no group contains `0.0.0.0/0`.

        A passing instance restricts the allowlist to specific addresses. A failing instance lists `0.0.0.0/0`.

        ### Audit via CLI

        1. Describe the IP allowlist of each instance:

        ```bash
        aliyun rds DescribeDBInstanceIPArrayList --DBInstanceId <instance-id>
        ```

        A passing instance lists only specific addresses. A failing instance includes `0.0.0.0/0` in a security IP list.
      remediation:
        - id: console
          desc: |
            To restrict an RDS instance IP allowlist in the console:

            1. Sign in to the [ApsaraDB for RDS console](https://rdsnext.console.aliyun.com/).
            2. Open the affected instance and go to **Data Security** > **Whitelist Settings**.
            3. Edit each whitelist group, remove `0.0.0.0/0`, and add only the specific IP addresses or CIDR ranges that require access.
        - id: cli
          desc: |
            To replace an open allowlist with specific addresses using the `aliyun` CLI:

            ```bash
            aliyun rds ModifySecurityIps \
              --DBInstanceId <instance-id> \
              --SecurityIps <comma-separated-trusted-cidrs>
            ```
        - id: terraform
          desc: |
            To scope the RDS allowlist in Terraform, set `security_ips` to specific trusted ranges instead of `0.0.0.0/0`:

            ```hcl
            resource "alicloud_db_instance" "example" {
              engine           = "MySQL"
              engine_version   = "8.0"
              instance_type    = "rds.mysql.s2.large"
              instance_storage = 30

              security_ips = ["10.0.0.0/24", "10.0.1.0/24"]
            }
            ```
    variants:
      - uid: mondoo-alibaba-security-rds-instance-restrict-security-ip-list-alicloud
      - uid: mondoo-alibaba-security-rds-instance-restrict-security-ip-list-terraform-hcl
      - uid: mondoo-alibaba-security-rds-instance-restrict-security-ip-list-terraform-plan
      - uid: mondoo-alibaba-security-rds-instance-restrict-security-ip-list-terraform-state
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: false
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-ai-100-1: false
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/pci-dss-4: pcidss-requirement-1
