  - uid: mondoo-alibaba-security-ecs-security-group-no-public-ipv6-admin
    title: Ensure security groups do not allow public IPv6 ingress to admin ports
    impact: 80
    docs:
      desc: |
        This check ensures that no security group permits inbound SSH (22) or RDP (3389) from the entire IPv6 internet (`::/0`). IPv6 exposure is easy to overlook when only IPv4 rules are reviewed, yet it grants the same reachability.

        **Why this matters**

        - **IPv6 is often forgotten:** Teams frequently harden IPv4 rules while leaving equivalent IPv6 rules wide open.
        - **Same attack surface:** World-open IPv6 admin ports are scanned and brute-forced just like IPv4.
        - **Broad blast radius:** The rule applies to every instance the security group protects.

        **Risk mitigation**

        - **Closes the IPv6 gap:** Restricting `::/0` sources removes untrusted inbound administrative access over IPv6.
        - **Consistent posture:** IPv6 and IPv4 rules enforce the same least-exposure policy.
      audit: |
        ### Audit via Console

        1. Sign in to the [ECS console](https://ecs.console.aliyun.com/).
        2. Navigate to **Network & Security** > **Security Groups**.
        3. Open each security group's **Inbound** rules and look for `::/0` rules covering TCP port 22 or 3389.

        A passing group has no such rule. A failing group has one.

        ### Audit via CLI

        1. Inspect a security group's inbound rules:

        ```bash
        aliyun ecs DescribeSecurityGroupAttribute --SecurityGroupId <sg-id> --Direction ingress
        ```

        A passing group returns no `Accept` permission with `Ipv6SourceCidrIp` `::/0` covering port 22 or 3389. A failing group returns one.
      remediation:
        - id: console
          desc: |
            To remove world-open IPv6 admin access in the ECS console:

            1. Sign in to the [ECS console](https://ecs.console.aliyun.com/).
            2. Open the security group and its **Inbound** rules.
            3. Delete or edit the `::/0` rule covering port 22 or 3389, restricting the source to a trusted IPv6 range.
        - id: cli
          desc: |
            To revoke a world-open IPv6 admin rule with the `aliyun` CLI:

            ```bash
            aliyun ecs RevokeSecurityGroup --SecurityGroupId <sg-id> \
              --IpProtocol tcp --PortRange 22/22 --Ipv6SourceCidrIp ::/0
            ```
        - id: terraform
          desc: |
            To scope IPv6 admin access in Terraform, set a trusted `ipv6_cidr_ip` instead of `::/0`:

            ```hcl
            resource "alicloud_security_group_rule" "ssh_v6" {
              type              = "ingress"
              ip_protocol       = "tcp"
              port_range        = "22/22"
              security_group_id = alicloud_security_group.example.id
              ipv6_cidr_ip      = "fd00::/8"
            }
            ```
