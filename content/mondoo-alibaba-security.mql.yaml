      terraform.state.resources.where(type == "alicloud_security_group_rule").map(values).where(_["type"] == "ingress").where(_["ipv6_cidr_ip"] == "::/0").where(_["policy"] == empty || _["policy"].downcase == "accept").none(_["ip_protocol"].downcase == "all" || _["ip_protocol"].downcase == "tcp" && _["port_range"] == "22/22" || _["ip_protocol"].downcase == "tcp" && _["port_range"] == "3389/3389" || _["ip_protocol"].downcase == "tcp" && _["port_range"] == "-1/-1" || _["ip_protocol"].downcase == "tcp" && _["port_range"] == "1/65535")

  # ---------------------------------------------------------------------------
  # Instances
  # ---------------------------------------------------------------------------
  # No Terraform variants: internetExposed is a computed inbound-reachability signal derived from public IP, EIP, and effective security-group rules; no single alicloud_instance attribute reproduces it, so a static variant would misrepresent the check.
  - uid: mondoo-alibaba-security-ecs-instance-no-public-ip
    title: Ensure ECS instances are not directly exposed to the internet
    impact: 70
    docs:
      desc: |
        This check ensures that ECS instances are not directly reachable from the internet through a public IP or elastic IP combined with permissive security-group rules. Instances that must be reached from outside should sit behind a load balancer or NAT gateway rather than exposing the host directly.

        **Why this matters**

        - **Direct exposure widens attack surface:** A publicly reachable instance is scanned and probed continuously.
        - **No intermediary controls:** Fronting services with load balancers or gateways adds a layer where filtering and monitoring occur.
        - **Lateral movement risk:** A compromised internet-facing instance is a foothold into the private network.

        **Risk mitigation**

        - **Reduces attack surface:** Removing direct public reachability forces traffic through controlled entry points.
        - **Contains blast radius:** Private instances are not directly reachable by external attackers.
      audit: |
        ### Audit via Console

        1. Sign in to the [ECS console](https://ecs.console.aliyun.com/).
        2. Open each instance and review its **Public IP** / **Elastic IP** and attached security groups.

        A passing instance has no public reachability. A failing instance has a public or elastic IP reachable via permissive security-group rules.

        ### Audit via CLI

        1. List instances and inspect public addresses:

        ```bash
        aliyun ecs DescribeInstances --output cols=InstanceId,PublicIpAddress,EipAddress
        ```

        A passing instance returns no public or elastic IP. A failing instance returns one.
      remediation:
        - id: console
          desc: |
            To remove direct internet exposure in the ECS console:

            1. Sign in to the [ECS console](https://ecs.console.aliyun.com/).
            2. Unbind the elastic IP from the instance, or release its public IP, and place the instance behind a load balancer or NAT gateway.
            3. Tighten the attached security groups so no administrative ports are open to `0.0.0.0/0`.
        - id: cli
          desc: |
            To unbind an elastic IP from an instance with the `aliyun` CLI:

            ```bash
            aliyun vpc UnassociateEipAddress --AllocationId <eip-alloc-id> \
              --InstanceId <instance-id> --InstanceType EcsInstance
            ```
        # No Terraform remediation: removing computed inbound reachability spans elastic IP association, public IP assignment, and security-group rules across multiple resources rather than one alicloud_instance attribute.
    variants:
      - uid: mondoo-alibaba-security-ecs-instance-no-public-ip-alicloud
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: false
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-ai-100-1: false
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/pci-dss-4: pcidss-requirement-1
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: false
  - uid: mondoo-alibaba-security-ecs-instance-no-public-ip-alicloud
    filters: asset.platform == "alicloud"
    mql: |
      alicloud.ecs.instances.all(internetExposed == false)

  # ---------------------------------------------------------------------------
  # Disks
  # ---------------------------------------------------------------------------
  - uid: mondoo-alibaba-security-ecs-disk-encryption-enabled
    title: Ensure ECS disks are encrypted at rest
    impact: 80
    docs:
      desc: |
        This check ensures that ECS disks are encrypted at rest. By default a disk is created unencrypted unless encryption is explicitly requested, leaving block storage contents readable if the underlying media is ever accessed.

        **Why this matters**

        - **Protects data on the block layer:** Encryption keeps disk contents unreadable outside the service.
        - **Covers system and data disks:** Both boot and attached data volumes hold sensitive material.
        - **Regulatory expectation:** Encryption of stored data is a common compliance requirement.

        **Risk mitigation**

        - **Reduces breach impact:** Encrypted volumes are unreadable to an attacker who obtains raw storage.
        - **Transparent protection:** Disk encryption requires no application changes.
      audit: |
        ### Audit via Console

        1. Sign in to the [ECS console](https://ecs.console.aliyun.com/).
        2. Navigate to **Storage & Snapshots** > **Disks** and review the **Encryption** column.

        A passing disk shows encryption enabled. A failing disk shows it disabled.

        ### Audit via CLI

        1. List disks and inspect the encryption flag:

        ```bash
        aliyun ecs DescribeDisks --output cols=DiskId,Encrypted
        ```

        A passing disk returns `Encrypted` `true`. A failing disk returns `false`.
      remediation:
        - id: console
          desc: |
            Disk encryption is set at creation and cannot be toggled on an existing disk. To fix this in the ECS console, create an encrypted copy and replace the disk:

            1. Sign in to the [ECS console](https://ecs.console.aliyun.com/).
            2. Take a snapshot of the disk, create a new **encrypted** disk from that snapshot, and attach it in place of the unencrypted disk.
        - id: cli
          desc: |
            To create an encrypted disk from a snapshot with the `aliyun` CLI:

            ```bash
            aliyun ecs CreateDisk --RegionId <region> --ZoneId <zone> \
              --SnapshotId <snapshot-id> --Encrypted true
            ```
        - id: terraform
          desc: |
            To require encryption on an ECS disk in Terraform, set `encrypted`:

            ```hcl
            resource "alicloud_ecs_disk" "example" {
              zone_id   = "cn-hangzhou-i"
              category  = "cloud_essd"
              size      = 40
              encrypted = true
            }
            ```
    variants:
      - uid: mondoo-alibaba-security-ecs-disk-encryption-enabled-alicloud
      - uid: mondoo-alibaba-security-ecs-disk-encryption-enabled-terraform-hcl
      - uid: mondoo-alibaba-security-ecs-disk-encryption-enabled-terraform-plan
      - uid: mondoo-alibaba-security-ecs-disk-encryption-enabled-terraform-state
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-ai-100-1: false
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/pci-dss-4: pcidss-requirement-3
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
  - uid: mondoo-alibaba-security-ecs-disk-encryption-enabled-alicloud
    filters: asset.platform == "alicloud"
    mql: |
      alicloud.ecs.disks.all(encrypted == true)
  - uid: mondoo-alibaba-security-ecs-disk-encryption-enabled-terraform-hcl
    filters: |
      asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "alicloud_ecs_disk")
    mql: |
      terraform.resources("alicloud_ecs_disk").all(arguments["encrypted"] == true)
  - uid: mondoo-alibaba-security-ecs-disk-encryption-enabled-terraform-plan
    filters: |
      asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "alicloud_ecs_disk")
    mql: |
      terraform.plan.resourceChanges.where(type == "alicloud_ecs_disk").all(change.after["encrypted"] == true)
  - uid: mondoo-alibaba-security-ecs-disk-encryption-enabled-terraform-state
    filters: |
      asset.platform == "terraform-state" && terraform.state.resources.contains(type == "alicloud_ecs_disk")
    mql: |
      terraform.state.resources.where(type == "alicloud_ecs_disk").all(values["encrypted"] == true)

  - uid: mondoo-alibaba-security-ecs-disk-kms-encryption
    title: Ensure ECS disk encryption uses a KMS customer master key
    impact: 70
    docs:
      desc: |
        This check ensures that encrypted ECS disks use a KMS customer master key (CMK) rather than relying solely on a service-default key. A customer-managed key gives the account control over key policy, rotation, and revocation.

        **Why this matters**

        - **Key governance:** A CMK lets the account define who can use the key and audit its use.
        - **Revocation control:** Disabling a CMK renders the associated volumes unreadable, a powerful containment lever.
        - **Separation of duties:** Customer-managed keys separate data access from key administration.

        **Risk mitigation**

        - **Stronger blast-radius control:** Key revocation immediately cuts access to data encrypted under the CMK.
        - **Auditable key use:** CMK operations are logged and governed by key policy.
      audit: |
        ### Audit via Console

        1. Sign in to the [ECS console](https://ecs.console.aliyun.com/).
        2. Navigate to **Storage & Snapshots** > **Disks** and review each encrypted disk's **KMS Key ID**.

        A passing disk references a KMS key. A failing encrypted disk has no KMS key ID.

        ### Audit via CLI

        1. List disks and inspect the KMS key association:

        ```bash
        aliyun ecs DescribeDisks --output cols=DiskId,Encrypted,KMSKeyId
        ```

        A passing disk returns a non-empty `KMSKeyId`. A failing disk is encrypted with no `KMSKeyId`.
      remediation:
        - id: console
          desc: |
            The KMS key is set at disk creation. To fix this in the ECS console, recreate the disk with a customer master key:

            1. Sign in to the [ECS console](https://ecs.console.aliyun.com/).
            2. Take a snapshot, create a new disk from it with encryption enabled and a specific **KMS Key**, and attach it in place of the original.
        - id: cli
          desc: |
            To create a disk encrypted with a specific KMS key using the `aliyun` CLI:

            ```bash
            aliyun ecs CreateDisk --RegionId <region> --ZoneId <zone> \
              --SnapshotId <snapshot-id> --Encrypted true --KMSKeyId <kms-key-id>
            ```
        - id: terraform
          desc: |
            To encrypt an ECS disk with a customer master key in Terraform, set `kms_key_id`:

            ```hcl
            resource "alicloud_ecs_disk" "example" {
              zone_id    = "cn-hangzhou-i"
              category   = "cloud_essd"
              size       = 40
              encrypted  = true
              kms_key_id = alicloud_kms_key.example.id
            }
            ```
    variants:
      - uid: mondoo-alibaba-security-ecs-disk-kms-encryption-alicloud
      - uid: mondoo-alibaba-security-ecs-disk-kms-encryption-terraform-hcl
      - uid: mondoo-alibaba-security-ecs-disk-kms-encryption-terraform-plan
      - uid: mondoo-alibaba-security-ecs-disk-kms-encryption-terraform-state
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: false
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-ai-100-1: false
      compliance/nist-csf-1: false
      compliance/nist-csf-2: false
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-10
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-12
      compliance/pci-dss-4: pcidss-requirement-3
      compliance/soc2-2017: soc2-control-cc6-1-11
      compliance/vda-isa-5: vda-isa-5-5-1-1
  - uid: mondoo-alibaba-security-ecs-disk-kms-encryption-alicloud
    filters: asset.platform == "alicloud"
    mql: |
      alicloud.ecs.disks.where(encrypted == true).all(kmsKey != empty)
  - uid: mondoo-alibaba-security-ecs-disk-kms-encryption-terraform-hcl
    filters: |
      asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "alicloud_ecs_disk")
    mql: |
      terraform.resources("alicloud_ecs_disk").where(arguments["encrypted"] == true).all(arguments["kms_key_id"] != empty)
  - uid: mondoo-alibaba-security-ecs-disk-kms-encryption-terraform-plan
    filters: |
      asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "alicloud_ecs_disk")
    mql: |
      terraform.plan.resourceChanges.where(type == "alicloud_ecs_disk").map(change.after).where(_["encrypted"] == true).all(_["kms_key_id"] != empty)
  - uid: mondoo-alibaba-security-ecs-disk-kms-encryption-terraform-state
    filters: |
      asset.platform == "terraform-state" && terraform.state.resources.contains(type == "alicloud_ecs_disk")
    mql: |
      terraform.state.resources.where(type == "alicloud_ecs_disk").map(values).where(_["encrypted"] == true).all(_["kms_key_id"] != empty)

  # ===========================================================================
  # ApsaraDB for RDS
  # ===========================================================================
  # No Terraform variants: RDS public access is granted by allocating a public endpoint through the separate alicloud_db_connection resource; alicloud_db_instance exposes no attribute that declares the instance network type (Internet vs Intranet).
  - uid: mondoo-alibaba-security-rds-instance-no-public-network
    title: Ensure RDS instances are not assigned a public network endpoint
    impact: 85
    docs:
      desc: |
        This check ensures that ApsaraDB for RDS instances are reachable only over the internal network and are not assigned a public (Internet) connection endpoint. An instance with a public endpoint is directly addressable from the internet, dramatically widening its exposure to credential-guessing, exploitation of database vulnerabilities, and data exfiltration.

        **Why this matters**

        - **Direct internet reachability:** A public endpoint places the database listener on the public internet, where it is continuously scanned and probed by opportunistic and targeted attackers.
        - **Reduced defense in depth:** Internal-only databases sit behind VPC boundaries and security groups; a public endpoint bypasses that layered isolation and leaves the IP allowlist as the only barrier.
        - **Blast radius of a single misconfiguration:** If the allowlist is ever loosened or a credential leaks, a publicly reachable database can be reached and drained from anywhere in the world.

        **Risk mitigation**

        - **Shrinks the attack surface:** Keeping the instance on the internal network removes it from internet-wide scanning and forces access through controlled network paths.
        - **Enforces network segmentation:** Internal endpoints require attackers to first gain a foothold inside the VPC, preserving defense in depth.
      audit: |
        ### Audit via Console

        1. Sign in to the [ApsaraDB for RDS console](https://rdsnext.console.aliyun.com/).
        2. Open each instance and navigate to **Database Connection**.
        3. Review the connection endpoints and confirm that only an **Internal Network** (VPC) endpoint is present.

        A passing instance exposes only an internal endpoint. A failing instance shows a **Public** endpoint.

        ### Audit via CLI

        1. Describe each instance and inspect the network connection type:

        ```bash
        aliyun rds DescribeDBInstances
        aliyun rds DescribeDBInstanceNetInfo --DBInstanceId <instance-id>
        ```

        A passing instance reports `DBInstanceNetType` as `Intranet`. A failing instance reports `Internet`.
      remediation:
        - id: console
          desc: |
            To release the public endpoint of an RDS instance in the console:

            1. Sign in to the [ApsaraDB for RDS console](https://rdsnext.console.aliyun.com/).
            2. Open the affected instance and go to **Database Connection**.
            3. Locate the **Public Endpoint** and select **Release Public Endpoint**.
            4. Confirm that applications connect through the internal endpoint only.
        - id: cli
          desc: |
            To release the public connection string of an RDS instance with the `aliyun` CLI:

            ```bash
            aliyun rds ReleaseInstancePublicConnection \
              --DBInstanceId <instance-id> \
              --CurrentConnectionString <public-connection-string>
            ```
        # No Terraform remediation: the public endpoint is created and released through the separate alicloud_db_connection resource and runtime connection APIs; alicloud_db_instance has no attribute that controls the instance network type.
    variants:
      - uid: mondoo-alibaba-security-rds-instance-no-public-network-alicloud
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: false
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-ai-100-1: false
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/pci-dss-4: pcidss-requirement-1
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: false
  - uid: mondoo-alibaba-security-rds-instance-no-public-network-alicloud
    filters: asset.platform == "alicloud"
    mql: |
      alicloud.rds.instances.all(dbInstanceNetType != empty && dbInstanceNetType != "Internet")

  # No Terraform variants: SSL/TLS on alicloud_db_instance is driven by the imperative ssl_action attribute (Open/Close/Update) rather than a declarative state, and enforcement is managed through separate connection resources; no attribute asserts that SSL is enabled.
  - uid: mondoo-alibaba-security-rds-instance-ssl-enabled
    title: Ensure RDS instances enforce SSL/TLS connections
    impact: 75
    docs:
      desc: |
        This check ensures that ApsaraDB for RDS instances have SSL/TLS enabled so that client connections are encrypted in transit. Without SSL/TLS, credentials and query data travel between clients and the database in cleartext and can be intercepted on the network path.

        **Why this matters**

        - **Cleartext credentials and data:** Unencrypted database connections expose usernames, passwords, and query results to anyone able to observe the network traffic.
        - **Man-in-the-middle risk:** Without server certificate validation, an attacker positioned on the path can impersonate the database or silently relay and modify traffic.
        - **Regulatory expectation:** Many compliance regimes require that data, especially personal or cardholder data, is encrypted while in transit.

        **Risk mitigation**

        - **Protects data on the wire:** SSL/TLS encrypts the session so intercepted traffic is unreadable.
        - **Authenticates the endpoint:** Certificate-based TLS lets clients verify they are connected to the genuine database and not an impostor.
      audit: |
        ### Audit via Console

        1. Sign in to the [ApsaraDB for RDS console](https://rdsnext.console.aliyun.com/).
        2. Open each instance and navigate to **Data Security** > **SSL**.
        3. Confirm that **SSL** is enabled and a valid server certificate is present.

        A passing instance shows SSL enabled. A failing instance shows SSL disabled.

        ### Audit via CLI

        1. Describe the SSL configuration of each instance:

        ```bash
        aliyun rds DescribeDBInstanceSSL --DBInstanceId <instance-id>
        ```

        A passing instance reports an enabled SSL connection. A failing instance reports SSL as disabled.
      remediation:
        - id: console
          desc: |
            To enable SSL/TLS on an RDS instance in the console:

            1. Sign in to the [ApsaraDB for RDS console](https://rdsnext.console.aliyun.com/).
            2. Open the affected instance and go to **Data Security** > **SSL**.
            3. Turn on **SSL**, select the endpoint to protect, and download the CA certificate for clients.
            4. Update client connection strings to require SSL and trust the CA certificate.
        - id: cli
          desc: |
            To enable SSL on an RDS instance with the `aliyun` CLI:

            ```bash
            aliyun rds ModifyDBInstanceSSL \
              --DBInstanceId <instance-id> \
              --ConnectionString <connection-string> \
              --SSLEnabled 1
            ```
        # No Terraform remediation: alicloud_db_instance exposes only the imperative ssl_action attribute (Open/Close/Update); SSL is a runtime connection state managed through the RDS SSL APIs rather than a declarative Terraform attribute.
    variants:
      - uid: mondoo-alibaba-security-rds-instance-ssl-enabled-alicloud
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-2-ii-transmission-security-encryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-ai-100-1: false
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/pci-dss-4: pcidss-requirement-4
      compliance/soc2-2017: soc2-control-cc6-7-1
      compliance/vda-isa-5: vda-isa-5-5-1-1
  - uid: mondoo-alibaba-security-rds-instance-ssl-enabled-alicloud
    filters: asset.platform == "alicloud"
    mql: |
      alicloud.rds.instances.all(sslEnabled == true)

  - uid: mondoo-alibaba-security-rds-instance-tde-enabled
    title: Ensure RDS instances have Transparent Data Encryption enabled
    impact: 80
    docs:
      desc: |
        This check ensures that ApsaraDB for RDS instances have Transparent Data Encryption (TDE) enabled so that database files are encrypted at rest. Without TDE, the underlying data files, logs, and backups are written unencrypted and are readable to anyone who obtains the raw storage.

        **Why this matters**

        - **Defense against storage-layer exposure:** TDE protects data if the underlying disks, snapshots, or backups are ever accessed outside the database service.
        - **Regulatory expectation:** Many compliance regimes require that stored data, especially personal or cardholder data, is encrypted at rest.
        - **Transparent to applications:** TDE encrypts and decrypts at the storage engine level, so it protects data without requiring application changes.

        **Risk mitigation**

        - **Reduces breach impact:** Encrypted data files are unreadable to an attacker who obtains raw storage without the keys.
        - **Protects backups:** Because encryption follows the data into backups, exported or leaked backup files remain protected.
      audit: |
        ### Audit via Console

        1. Sign in to the [ApsaraDB for RDS console](https://rdsnext.console.aliyun.com/).
        2. Open each instance and navigate to **Data Security** > **TDE**.
        3. Confirm that **TDE** is enabled.

        A passing instance shows TDE enabled. A failing instance shows TDE disabled.

        ### Audit via CLI

        1. Describe the TDE status of each instance:

        ```bash
        aliyun rds DescribeDBInstanceTDE --DBInstanceId <instance-id>
        ```

        A passing instance reports `TDEStatus` as `Enabled`. A failing instance reports `Disabled`.
      remediation:
        - id: console
          desc: |
            To enable TDE on an RDS instance in the console:

            1. Sign in to the [ApsaraDB for RDS console](https://rdsnext.console.aliyun.com/).
            2. Open the affected instance and go to **Data Security** > **TDE**.
            3. Enable **TDE** and select a KMS key (or the service-managed key) to protect the data.
        - id: cli
          desc: |
            To enable TDE on an RDS instance with the `aliyun` CLI:

            ```bash
            aliyun rds ModifyDBInstanceTDE \
              --DBInstanceId <instance-id> \
              --TDEStatus Enabled
            ```
        - id: terraform
          desc: |
            To enable TDE on an RDS instance in Terraform, set `tde_status` to `Enabled`:

            ```hcl
            resource "alicloud_db_instance" "example" {
              engine           = "MySQL"
              engine_version   = "8.0"
              instance_type    = "rds.mysql.s2.large"
              instance_storage = 30

              tde_status = "Enabled"
            }
            ```
    variants:
      - uid: mondoo-alibaba-security-rds-instance-tde-enabled-alicloud
      - uid: mondoo-alibaba-security-rds-instance-tde-enabled-terraform-hcl
      - uid: mondoo-alibaba-security-rds-instance-tde-enabled-terraform-plan
      - uid: mondoo-alibaba-security-rds-instance-tde-enabled-terraform-state
