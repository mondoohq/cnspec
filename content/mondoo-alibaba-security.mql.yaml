  - uid: mondoo-alibaba-security-ram-password-policy-max-login-attempts
    title: Ensure the RAM password policy sets a login attempt lockout
    impact: 60
    docs:
      desc: |
        This check ensures that the RAM account password policy locks an account after a small number of consecutive failed password attempts. A lockout threshold between 1 and 5 stops online password guessing while still allowing for occasional user error. A value of 0 disables the lockout entirely and permits unlimited guessing.

        **Why this matters**

        - **Online guessing needs a brake:** Without a lockout, an attacker can attempt passwords repeatedly against a live login until one succeeds.
        - **Disabled lockout is the default risk:** A policy that allows unlimited attempts turns every password-based account into a brute-force target.
        - **Low thresholds contain automated attacks:** Locking after a handful of failures stops credential-stuffing tools that rely on high request volume.

        **Risk mitigation**

        - **Throttles brute force:** A tight lockout threshold makes online password guessing impractical.
        - **Signals attacks:** Repeated lockouts surface guessing attempts for investigation.
      audit: |
        ### Audit via Console

        1. Sign in to the [RAM console](https://ram.console.aliyun.com/).
        2. Navigate to **Settings** > **Security Settings** > **Password Policy**.
        3. Review the value for the number of password retries before lockout.

        A passing account sets the lockout threshold between 1 and 5. A failing account sets it to 0 or above 5.

        ### Audit via CLI

        1. Retrieve the account password policy:

        ```bash
        aliyun ram GetPasswordPolicy
        ```

        A passing account returns `MaxLoginAttempts` between 1 and 5. A failing account returns 0 (no lockout) or a value above 5.
      remediation:
        - id: console
          desc: |
            To set a login attempt lockout in the console:

            1. Sign in to the [RAM console](https://ram.console.aliyun.com/).
            2. Navigate to **Settings** > **Security Settings** > **Password Policy**.
            3. Set the number of password retries to a value between 1 and 5 and save.
        - id: cli
          desc: |
            To set the maximum login attempts with the `aliyun` CLI:

            ```bash
            aliyun ram SetPasswordPolicy --MaxLoginAttemps 5
            ```
        - id: terraform
          desc: |
            To enforce a login attempt lockout in Terraform, set `max_login_attempts` on the account password policy:

            ```hcl
            resource "alicloud_ram_account_password_policy" "default" {
              max_login_attempts = 5
            }
            ```
    variants:
      - uid: mondoo-alibaba-security-ram-password-policy-max-login-attempts-alicloud
      - uid: mondoo-alibaba-security-ram-password-policy-max-login-attempts-terraform-hcl
      - uid: mondoo-alibaba-security-ram-password-policy-max-login-attempts-terraform-plan
      - uid: mondoo-alibaba-security-ram-password-policy-max-login-attempts-terraform-state
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: false
      compliance/dora: false
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: false
      compliance/nist-ai-100-1: false
      compliance/nist-csf-1: false
      compliance/nist-csf-2: false
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-8
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-7
      compliance/pci-dss-4: pcidss-requirement-8
      compliance/soc2-2017: false
      compliance/vda-isa-5: false
