    mql: |
      terraform.resources("alicloud_db_instance").all(
        arguments["security_ips"] == empty || arguments["security_ips"].none(_.contains("/0"))
      )
  - uid: mondoo-alibaba-security-rds-instance-restrict-security-ip-list-terraform-plan
    filters: |
      asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "alicloud_db_instance")
    mql: |
