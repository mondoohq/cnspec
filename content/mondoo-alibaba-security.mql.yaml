  # No Terraform variants: The runtime auditLogEnabled signal is derived from the ACK CheckControlPlaneLogEnable API reporting an "audit" control-plane log component; the Terraform control_plane_log_components attribute does not document an "audit" value, and the separate audit_log_config block writes cluster audit logs to an independent Log Service Logstore rather than flipping the control-plane audit component, so no Terraform attribute maps cleanly to this signal.
  - uid: mondoo-alibaba-security-cs-cluster-audit-log-enabled
    title: Ensure ACK clusters have audit logging enabled
    impact: 80
    docs:
      desc: |
        This check ensures that Container Service for Kubernetes (ACK) clusters ship Kubernetes API server audit logs from the control plane to Log Service. Audit logging records who called the API server, what they requested, and the outcome. Without it, there is no authoritative record of control-plane activity to investigate.

        **Why this matters**

        - **No audit log, no forensics:** If the audit component is disabled, malicious or accidental API server actions leave no trail, so an intrusion cannot be reconstructed after the fact.
        - **Detection depends on logs:** Alerting on suspicious API activity, such as unexpected secret reads or privilege escalations, requires the audit stream to exist.
        - **Compliance expectation:** Most security frameworks require that access to sensitive systems is logged and retained.

        **Risk mitigation**

        - **Enables investigation:** A complete audit trail lets responders determine the scope and impact of an incident.
        - **Supports detection:** Streaming audit events to Log Service allows anomaly detection and alerting on control-plane misuse.
      audit: |
        ### Audit via Console

        1. Sign in to the [Container Service console](https://cs.console.aliyun.com/).
        2. Open each cluster and navigate to **Operations** > **Log Center** > **Control Plane Logs**.
        3. Confirm that control-plane logging is enabled and includes the **audit** (kube-apiserver audit) component.

        A passing cluster collects the audit component. A failing cluster has control-plane logging off or excludes the audit component.

        ### Audit via CLI

        1. Check the control-plane log configuration of each cluster:

        ```bash
        aliyun cs GET /clusters/<cluster-id>/controlplanelog
        ```

        A passing cluster lists `audit` among the collected `components`. A failing cluster returns no components or omits `audit`.
      remediation:
        - id: console
          desc: |
            To enable control-plane audit logging on an ACK cluster in the console:

            1. Sign in to the [Container Service console](https://cs.console.aliyun.com/).
            2. Open the cluster and go to **Operations** > **Log Center** > **Control Plane Logs**.
            3. Enable control-plane log collection, select the **audit** component, choose or create a Log Service project, and save.
        - id: cli
          desc: |
            To enable control-plane audit logging with the `aliyun` CLI, install or update the log collection for the cluster and include the `audit` component:

            ```bash
            aliyun cs POST /clusters/<cluster-id>/controlplanelog \
              --body '{"components":["audit","apiserver"],"aliuid":"<uid>"}'
            ```
        # No Terraform remediation: The runtime signal reflects the control-plane "audit" log component reported by the ACK CheckControlPlaneLogEnable API; the Terraform control_plane_log_components attribute does not document an "audit" value, and the separate audit_log_config block targets an independent Log Service Logstore, so there is no Terraform attribute that enables this exact signal.
    variants:
      - uid: mondoo-alibaba-security-cs-cluster-audit-log-enabled-alicloud
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-03
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-ai-100-1: false
      compliance/nist-csf-1: nist-csf-1-de-cm
      compliance/nist-csf-2: nist-csf-2-de-cm
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-2
      compliance/pci-dss-4: pcidss-requirement-10
      compliance/soc2-2017: soc2-group-cc7-2
      compliance/vda-isa-5: false
  - uid: mondoo-alibaba-security-cs-cluster-audit-log-enabled-alicloud
    filters: asset.platform == "alicloud"
    mql: |
      alicloud.cs.clusters.all(auditLogEnabled == true)

  - uid: mondoo-alibaba-security-cs-cluster-rrsa-enabled
    title: Ensure ACK clusters enable RRSA (RAM Roles for Service Accounts)
    impact: 70
    docs:
      desc: |
        This check ensures that Container Service for Kubernetes (ACK) clusters enable RAM Roles for Service Accounts (RRSA). RRSA issues OIDC tokens so that individual Kubernetes service accounts assume narrowly scoped RAM roles, instead of every pod inheriting the shared worker node RAM role. Without RRSA, any workload on a node can use the node's role and reach whatever that role is permitted to do.

        **Why this matters**

        - **Shared node role is over-broad:** When pods rely on the worker node RAM role, a single compromised container inherits the same cloud permissions as every other workload on the node.
        - **No per-workload boundary:** Without RRSA there is no way to grant one application access to a specific bucket or key without granting it to all co-located workloads.
        - **Least privilege for workloads:** RRSA lets each service account carry only the permissions its application needs, containing the blast radius of a compromise.

        **Risk mitigation**

        - **Scopes credentials to workloads:** Per-service-account roles ensure a compromised pod can only reach the resources that workload was granted.
        - **Removes reliance on the node role:** Workloads stop borrowing the broad node identity, closing a common lateral-movement path.
      audit: |
        ### Audit via Console

        1. Sign in to the [Container Service console](https://cs.console.aliyun.com/).
        2. Open each cluster and go to **Cluster Information** > **Basic Information**.
        3. Confirm that **RRSA** (RAM Roles for Service Accounts) is enabled.

        A passing cluster shows RRSA enabled. A failing cluster shows RRSA disabled.

        ### Audit via CLI

        1. Describe each cluster and inspect the RRSA configuration:

        ```bash
        aliyun cs GET /api/v1/clusters/<cluster-id>
        ```

        A passing cluster returns `rrsa_config` with `enabled` set to `true`. A failing cluster returns RRSA disabled.
      remediation:
        - id: console
          desc: |
            To enable RRSA on an ACK cluster in the console:

            1. Sign in to the [Container Service console](https://cs.console.aliyun.com/).
            2. Open the cluster and go to **Cluster Information** > **Basic Information**.
            3. Enable **RRSA**, then bind service accounts to scoped RAM roles as required by your workloads.
        - id: cli
          desc: |
            To enable RRSA on an existing cluster with the `aliyun` CLI:

            ```bash
            aliyun cs POST /clusters/<cluster-id>/rrsa/enable
            ```
        - id: terraform
          desc: |
            To enable RRSA in Terraform, set `enable_rrsa` to `true` on the managed cluster. Once enabled, RRSA cannot be turned off:

            ```hcl
            resource "alicloud_cs_managed_kubernetes" "example" {
              name        = "example-cluster"
              enable_rrsa = true
            }
            ```
    variants:
      - uid: mondoo-alibaba-security-cs-cluster-rrsa-enabled-alicloud
      - uid: mondoo-alibaba-security-cs-cluster-rrsa-enabled-terraform-hcl
      - uid: mondoo-alibaba-security-cs-cluster-rrsa-enabled-terraform-plan
      - uid: mondoo-alibaba-security-cs-cluster-rrsa-enabled-terraform-state
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-16
      compliance/dora: false
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-2
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-ai-100-1: false
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-5
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-6
      compliance/pci-dss-4: pcidss-requirement-7
      compliance/soc2-2017: soc2-control-cc6-3-3
      compliance/vda-isa-5: false
  - uid: mondoo-alibaba-security-cs-cluster-rrsa-enabled-alicloud
    filters: asset.platform == "alicloud"
    mql: |
      alicloud.cs.clusters.all(rrsaEnabled == true)
  - uid: mondoo-alibaba-security-cs-cluster-rrsa-enabled-terraform-hcl
    filters: |
      asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "alicloud_cs_managed_kubernetes")
    mql: |
      terraform.resources("alicloud_cs_managed_kubernetes").all(
        arguments["enable_rrsa"] == true
      )
  - uid: mondoo-alibaba-security-cs-cluster-rrsa-enabled-terraform-plan
    filters: |
      asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "alicloud_cs_managed_kubernetes")
    mql: |
      terraform.plan.resourceChanges.where(type == "alicloud_cs_managed_kubernetes").all(
        change.after["enable_rrsa"] == true
      )
  - uid: mondoo-alibaba-security-cs-cluster-rrsa-enabled-terraform-state
