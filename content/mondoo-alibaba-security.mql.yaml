  - uid: mondoo-alibaba-security-mongodb-instance-restrict-security-ip-list
    title: Ensure MongoDB instance IP allowlists are not open to the internet
    impact: 85
    docs:
      desc: |
        This check ensures that no ApsaraDB for MongoDB instance IP whitelist contains the open CIDR block `0.0.0.0/0`. A whitelist entry of `0.0.0.0/0` permits connection attempts from any source address, exposing the database to the entire internet and reducing security to the database password alone.

        **Why this matters**

        - **Internet-wide reachability invites attack:** An open whitelist lets any host on the internet reach the database port, exposing it to credential-stuffing, brute-force, and exploitation of any service vulnerability.
        - **Password becomes the only barrier:** With the network control removed, a single weak or leaked credential is enough for full database access.
        - **Data stores are high-value targets:** MongoDB instances hold application data that is directly valuable to attackers, so broad exposure carries outsized risk.

        **Risk mitigation**

        - **Limits the reachable surface:** A tightly scoped whitelist restricts connections to known application networks.
        - **Adds a network barrier:** Requiring both a permitted source address and valid credentials forces an attacker to overcome two independent controls.
      audit: |
        ### Audit via Console

        1. Sign in to the [ApsaraDB for MongoDB console](https://mongodb.console.aliyun.com/).
        2. Open each instance and review **Data Security** > **Whitelist Settings**.
        3. Confirm no whitelist group contains `0.0.0.0/0`.

        A passing instance has whitelists scoped to specific addresses. A failing instance lists `0.0.0.0/0`.

        ### Audit via CLI

        1. Inspect the whitelist of each instance with the `aliyun` CLI:

        ```bash
        aliyun dds DescribeSecurityIps --DBInstanceId <instance-id>
        ```

        A passing instance returns whitelist entries scoped to specific addresses. A failing instance returns `0.0.0.0/0`.
      remediation:
        - id: console
          desc: |
            To restrict a MongoDB instance whitelist in the console:

            1. Sign in to the [ApsaraDB for MongoDB console](https://mongodb.console.aliyun.com/).
            2. Open the instance and go to **Data Security** > **Whitelist Settings**.
            3. Remove any `0.0.0.0/0` entry and replace it with the specific application CIDR blocks that require access.
        - id: cli
          desc: |
            To replace an open whitelist with scoped addresses using the `aliyun` CLI:

            ```bash
            aliyun dds ModifySecurityIps --DBInstanceId <instance-id> \
              --SecurityIps 10.0.0.0/24,10.0.1.0/24
            ```
        - id: terraform
          desc: |
            To scope a MongoDB instance whitelist in Terraform, set `security_ip_list` to specific CIDR blocks instead of `0.0.0.0/0`:

            ```hcl
            resource "alicloud_mongodb_instance" "example" {
              engine_version      = "4.4"
              db_instance_class   = "dds.mongo.mid"
              db_instance_storage = 10
              vswitch_id          = alicloud_vswitch.example.id

              security_ip_list = ["10.0.0.0/24", "10.0.1.0/24"]
            }
            ```
    variants:
      - uid: mondoo-alibaba-security-mongodb-instance-restrict-security-ip-list-alicloud
      - uid: mondoo-alibaba-security-mongodb-instance-restrict-security-ip-list-terraform-hcl
      - uid: mondoo-alibaba-security-mongodb-instance-restrict-security-ip-list-terraform-plan
      - uid: mondoo-alibaba-security-mongodb-instance-restrict-security-ip-list-terraform-state
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: false
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-ai-100-1: false
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/pci-dss-4: pcidss-requirement-1
