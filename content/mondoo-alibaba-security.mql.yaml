    mql: |
      terraform.resources("alicloud_mongodb_instance").all(
        arguments["security_ip_list"] == empty || arguments["security_ip_list"].none(_ == "0.0.0.0/0")
      )
  - uid: mondoo-alibaba-security-mongodb-instance-restrict-security-ip-list-terraform-plan
    filters: |
