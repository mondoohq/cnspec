policies:
  - uid: mondoo-alibaba-security
    name: Mondoo Alibaba Cloud Security
    version: 1.0.0
    license: BUSL-1.1
    tags:
      mondoo.com/category: security
      mondoo.com/platform: alicloud,cloud
    require:
      - provider: alicloud
      - provider: terraform
    authors:
      - name: Mondoo, Inc.
        email: hello@mondoo.com
    summary: Secure Alibaba Cloud RAM, OSS, ECS, RDS, PolarDB, Redis, MongoDB, KMS, ActionTrail, ACK, and network resources
    docs:
      desc: |
        The Mondoo Alibaba Cloud Security policy identifies critical misconfigurations that could leave your Alibaba Cloud infrastructure vulnerable to attackers. This policy focuses on security-relevant controls and helps organizations harden against unauthorized access, data exposure, weak cryptography, credential misuse, and missing audit logging.

        This policy provides security checks across key Alibaba Cloud services, uncovering misconfigurations that could put critical resources at risk:

        - Resource Access Management (RAM) identities, access keys, and password policy
        - Object Storage Service (OSS) buckets
        - Elastic Compute Service (ECS) instances, disks, and security groups
        - ApsaraDB for RDS, PolarDB, Redis (Tair), and MongoDB
        - Key Management Service (KMS)
        - ActionTrail audit logging
        - VPC flow logs
        - Container Service for Kubernetes (ACK)
        - Apsara File Storage NAS
        - Web Application Firewall (WAF), Anti-DDoS, Cloud Firewall, and load balancers

        Learn more about scanning Alibaba Cloud in the [cnspec documentation](https://mondoo.com/docs/cnspec).
    groups:
      - title: Resource Access Management (RAM)
        checks:
          - uid: mondoo-alibaba-security-ram-user-mfa-enabled
          - uid: mondoo-alibaba-security-ram-access-key-rotation-90-days
          - uid: mondoo-alibaba-security-ram-password-policy-min-length
          - uid: mondoo-alibaba-security-ram-password-policy-complexity
          - uid: mondoo-alibaba-security-ram-password-policy-max-login-attempts
          - uid: mondoo-alibaba-security-ram-policy-no-full-admin
          - uid: mondoo-alibaba-security-ram-user-inactive-credentials
      - title: Object Storage Service (OSS)
        checks:
          - uid: mondoo-alibaba-security-oss-bucket-encryption-enabled
          - uid: mondoo-alibaba-security-oss-bucket-no-public-acl
          - uid: mondoo-alibaba-security-oss-bucket-block-public-access
          - uid: mondoo-alibaba-security-oss-bucket-policy-no-anonymous
          - uid: mondoo-alibaba-security-oss-bucket-kms-encryption
          - uid: mondoo-alibaba-security-oss-bucket-logging-enabled
          - uid: mondoo-alibaba-security-oss-bucket-versioning-enabled
      - title: Elastic Compute Service (ECS)
        checks:
          - uid: mondoo-alibaba-security-ecs-security-group-no-public-ssh
          - uid: mondoo-alibaba-security-ecs-security-group-no-public-rdp
          - uid: mondoo-alibaba-security-ecs-security-group-no-public-all-ports
          - uid: mondoo-alibaba-security-ecs-security-group-no-public-ipv6-admin
          - uid: mondoo-alibaba-security-ecs-instance-no-public-ip
          - uid: mondoo-alibaba-security-ecs-disk-encryption-enabled
          - uid: mondoo-alibaba-security-ecs-disk-kms-encryption
      - title: ApsaraDB (RDS and PolarDB)
        checks:
          - uid: mondoo-alibaba-security-rds-instance-no-public-network
          - uid: mondoo-alibaba-security-rds-instance-ssl-enabled
          - uid: mondoo-alibaba-security-rds-instance-tde-enabled
          - uid: mondoo-alibaba-security-rds-instance-restrict-security-ip-list
          - uid: mondoo-alibaba-security-rds-instance-deletion-protection
          - uid: mondoo-alibaba-security-polardb-cluster-tde-enabled
          - uid: mondoo-alibaba-security-polardb-cluster-restrict-access-whitelist
      - title: ApsaraDB (Redis and MongoDB)
        checks:
          - uid: mondoo-alibaba-security-redis-instance-auth-enabled
          - uid: mondoo-alibaba-security-redis-instance-ssl-and-private
          - uid: mondoo-alibaba-security-redis-instance-tde-enabled
          - uid: mondoo-alibaba-security-mongodb-instance-tde-enabled
          - uid: mondoo-alibaba-security-mongodb-instance-ssl-and-audit
          - uid: mondoo-alibaba-security-mongodb-instance-restrict-security-ip-list
      - title: Key Management Service (KMS)
        checks:
          - uid: mondoo-alibaba-security-kms-key-rotation-enabled
          - uid: mondoo-alibaba-security-kms-key-rotation-interval
      - title: Audit Logging (ActionTrail and VPC Flow Logs)
        checks:
          - uid: mondoo-alibaba-security-actiontrail-trail-enabled
          - uid: mondoo-alibaba-security-vpc-flow-logs-enabled
      - title: Container Service for Kubernetes (ACK)
        checks:
          - uid: mondoo-alibaba-security-cs-cluster-no-public-apiserver
          - uid: mondoo-alibaba-security-cs-cluster-audit-log-enabled
          - uid: mondoo-alibaba-security-cs-cluster-rrsa-enabled
      - title: Network Edge (NAS, WAF, Anti-DDoS, Cloud Firewall, Load Balancers)
        checks:
          - uid: mondoo-alibaba-security-nas-access-rule-restrict-source
          - uid: mondoo-alibaba-security-cloudfirewall-enabled
          - uid: mondoo-alibaba-security-antiddos-instance-protection-active
          - uid: mondoo-alibaba-security-slb-listener-not-plaintext
          - uid: mondoo-alibaba-security-waf-domain-tls-hardened
queries:
  # ===========================================================================
  # RAM
  # ===========================================================================
  # No Terraform variants: MFA device binding is a runtime state on the identity, not an attribute of the alicloud_ram_user resource; there is no Terraform resource that enforces an MFA device is present.
  - uid: mondoo-alibaba-security-ram-user-mfa-enabled
    title: Ensure RAM users with console access have MFA enabled
    impact: 85
    docs:
      desc: |
        This check ensures that every RAM user who can sign in to the Alibaba Cloud console has a multi-factor authentication (MFA) device bound to their identity. By default a RAM user created with a logon profile can authenticate with a password alone, so a single leaked or guessed password grants full interactive access.

        **Why this matters**

        - **Password compromise is common:** Phishing, credential stuffing, and reused passwords are among the most frequent initial-access techniques; a second factor blocks account takeover even when the password is known.
        - **Console access is high value:** Interactive console sessions can reach every service the user is authorized for, so an unprotected console login is a direct path to broad account access.
        - **Privilege concentration:** RAM users often carry standing permissions, so protecting their sign-in materially reduces the account's overall attack surface.

        **Risk mitigation**

        - **Blocks single-factor takeover:** Requiring a device-bound second factor stops an attacker who only holds the password.
        - **Raises attacker cost:** MFA forces adversaries to compromise a physical or virtual device in addition to a credential.
      audit: |
        ### Audit via Console

        1. Sign in to the [RAM console](https://ram.console.aliyun.com/).
        2. Navigate to **Identities** > **Users**.
        3. Open each user and review the **Authentication** tab for a bound MFA device.

        A passing user with console access shows an enabled MFA device. A failing user has a logon profile but no MFA device.

        ### Audit via CLI

        1. List users and inspect each user's MFA binding:

        ```bash
        aliyun ram ListUsers
        aliyun ram GetUserMFAInfo --UserName <user-name>
        ```

        A passing user returns a bound `MFADevice`. A failing user returns no MFA device while a logon profile exists.
      remediation:
        - id: console
          desc: |
            To require MFA for a RAM user in the RAM console:

            1. Sign in to the [RAM console](https://ram.console.aliyun.com/).
            2. Navigate to **Identities** > **Users** and open the affected user.
            3. On the **Authentication** tab, select **Virtual MFA Device** or **U2F Security Key** and complete the binding.
            4. Enforce MFA at sign-in by attaching an MFA-required condition through the account's security settings.
        - id: cli
          desc: |
            To bind a virtual MFA device to a RAM user with the `aliyun` CLI, create the device, then bind it after the user enrolls the generated secret in an authenticator app:

            ```bash
            aliyun ram CreateVirtualMFADevice --VirtualMFADeviceName <device-name>
            aliyun ram BindMFADevice --SerialNumber <mfa-serial> --UserName <user-name> \
              --AuthenticationCode1 <code1> --AuthenticationCode2 <code2>
            ```
        # No Terraform remediation: MFA device enrollment is an interactive runtime action (the user must register the device secret in an authenticator); the alicloud provider exposes no resource that binds and activates an MFA device for a user.
    variants:
      - uid: mondoo-alibaba-security-ram-user-mfa-enabled-alicloud
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-14
      compliance/dora: false
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-j
      compliance/nist-ai-100-1: false
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-3
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-2
      compliance/pci-dss-4: pcidss-requirement-8
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-3
  - uid: mondoo-alibaba-security-ram-user-mfa-enabled-alicloud
    filters: asset.platform == "alicloud"
    mql: |
      alicloud.ram.users.where(loginProfile != empty).all(mfaDevice != empty)

  # ===========================================================================
  # OSS
  # ===========================================================================
  - uid: mondoo-alibaba-security-oss-bucket-encryption-enabled
    title: Ensure OSS buckets have server-side encryption enabled
    impact: 80
    docs:
      desc: |
        This check ensures that every Object Storage Service (OSS) bucket has server-side encryption configured so that objects are encrypted at rest. Without a bucket-level encryption rule, objects can be written in plaintext to the underlying storage.

        **Why this matters**

        - **Defense against storage-layer exposure:** Encryption at rest protects object contents if the underlying disks, backups, or storage media are ever accessed outside the service.
        - **Regulatory expectation:** Many compliance regimes require that stored data, especially personal or cardholder data, is encrypted at rest.
        - **Low-cost, high-coverage control:** A bucket-level default encryption rule transparently protects every object without changing application behavior.

        **Risk mitigation**

        - **Reduces breach impact:** Encrypted objects are unreadable to an attacker who obtains raw storage without the keys.
        - **Consistent coverage:** A default rule guarantees new objects are encrypted, eliminating gaps from per-object configuration mistakes.
      audit: |
        ### Audit via Console

        1. Sign in to the [OSS console](https://oss.console.aliyun.com/).
        2. Open each bucket and navigate to **Content Security** > **Server-side Encryption**.
        3. Confirm an encryption method (AES-256 or KMS) is enabled.

        A passing bucket shows a configured encryption method. A failing bucket shows encryption set to **None**.

        ### Audit via CLI

        1. Inspect the encryption configuration of each bucket with `ossutil` or the `aliyun` CLI:

        ```bash
        aliyun oss bucket-encryption --method get oss://<bucket-name>
        ```

        A passing bucket returns an `SSEAlgorithm`. A failing bucket returns no server-side encryption rule.
      remediation:
        - id: console
          desc: |
            To enable default encryption on an OSS bucket in the console:

            1. Sign in to the [OSS console](https://oss.console.aliyun.com/).
            2. Open the bucket and go to **Content Security** > **Server-side Encryption**.
            3. Set the encryption method to **KMS** (preferred) or **AES-256** and save.
        - id: cli
          desc: |
            To enable default server-side encryption with the `aliyun` CLI:

            ```bash
            aliyun oss bucket-encryption --method put oss://<bucket-name> --sse-algorithm KMS
            ```
        - id: terraform
          desc: |
            To enforce default encryption on an OSS bucket in Terraform, declare a `server_side_encryption_rule` block:

            ```hcl
            resource "alicloud_oss_bucket" "example" {
              bucket = "example-bucket"

              server_side_encryption_rule {
                sse_algorithm     = "KMS"
                kms_master_key_id = alicloud_kms_key.example.id
              }
            }
            ```
    variants:
      - uid: mondoo-alibaba-security-oss-bucket-encryption-enabled-alicloud
      - uid: mondoo-alibaba-security-oss-bucket-encryption-enabled-terraform-hcl
      - uid: mondoo-alibaba-security-oss-bucket-encryption-enabled-terraform-plan
      - uid: mondoo-alibaba-security-oss-bucket-encryption-enabled-terraform-state
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-ai-100-1: false
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/pci-dss-4: pcidss-requirement-3
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
  - uid: mondoo-alibaba-security-oss-bucket-encryption-enabled-alicloud
    filters: asset.platform == "alicloud"
    mql: |
      alicloud.oss.buckets.all(sseAlgorithm != empty)
  - uid: mondoo-alibaba-security-oss-bucket-encryption-enabled-terraform-hcl
    filters: |
      asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "alicloud_oss_bucket")
    mql: |
      terraform.resources("alicloud_oss_bucket").all(
        blocks.where(type == "server_side_encryption_rule") != empty &&
        blocks.where(type == "server_side_encryption_rule").all(arguments["sse_algorithm"] != empty)
      )
  - uid: mondoo-alibaba-security-oss-bucket-encryption-enabled-terraform-plan
    filters: |
      asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "alicloud_oss_bucket")
    mql: |
      terraform.plan.resourceChanges.where(type == "alicloud_oss_bucket").all(
        change.after["server_side_encryption_rule"] != empty
      )
  - uid: mondoo-alibaba-security-oss-bucket-encryption-enabled-terraform-state
    filters: |
      asset.platform == "terraform-state" && terraform.state.resources.contains(type == "alicloud_oss_bucket")
    mql: |
      terraform.state.resources.where(type == "alicloud_oss_bucket").all(
        values["server_side_encryption_rule"] != empty
      )

  # ===========================================================================
  # RAM
  # ===========================================================================
  # No Terraform variants: access key age is a runtime property of an issued credential; no alicloud_ram_access_key attribute governs how recently a key was rotated.
  - uid: mondoo-alibaba-security-ram-access-key-rotation-90-days
    title: Ensure RAM user access keys are rotated within 90 days
    impact: 70
    docs:
      desc: |
        This check ensures that every active RAM user access key was created within the last 90 days. Access keys are long-lived programmatic credentials, and the longer a key remains valid the greater the window for it to be leaked, harvested from source control, or reused after an employee departs. Rotating keys on a fixed schedule caps that exposure window.

        **Why this matters**

        - **Static secrets accumulate risk:** Unlike an interactive session, an access key does not expire on its own; a key that is years old may have been copied into scripts, CI systems, or laptops that are no longer trusted.
        - **Leaked keys are a top breach vector:** Access keys are routinely exposed in public repositories, logs, and container images; frequent rotation invalidates a leaked key before an attacker can rely on it.
        - **Departed users and stale automation:** A key that is never rotated outlives the context it was issued for, leaving credentials active long after the need for them ends.

        **Risk mitigation**

        - **Caps the exposure window:** Regular rotation guarantees that any single leaked key becomes useless within a bounded period.
        - **Forces credential hygiene:** A rotation policy surfaces unused and forgotten keys so they can be disabled and removed.
      audit: |
        ### Audit via Console

        1. Sign in to the [RAM console](https://ram.console.aliyun.com/).
        2. Navigate to **Identities** > **Users** and open each user.
        3. On the **Authentication** tab, review each **AccessKey** and its creation date.

        A passing key is in the **Active** state and was created within the last 90 days. A failing key is **Active** but older than 90 days.

        ### Audit via CLI

        1. List users, then list each user's access keys and inspect the creation date:

        ```bash
        aliyun ram ListUsers
        aliyun ram ListAccessKeys --UserName <user-name>
        ```

        A passing key returns `Status: Active` with a `CreateDate` within the last 90 days. A failing key is `Active` with a `CreateDate` older than 90 days.
      remediation:
        - id: console
          desc: |
            To rotate a RAM user access key in the console:

            1. Sign in to the [RAM console](https://ram.console.aliyun.com/).
            2. Navigate to **Identities** > **Users** and open the affected user.
            3. On the **Authentication** tab, create a new **AccessKey**, update the applications that use the old key, then set the old key to **Disabled** and delete it once traffic has moved.
        - id: cli
          desc: |
            To rotate a RAM user access key with the `aliyun` CLI, create a new key, migrate consumers to it, then disable and delete the old key:

            ```bash
            aliyun ram CreateAccessKey --UserName <user-name>
            aliyun ram UpdateAccessKey --UserName <user-name> \
              --UserAccessKeyId <old-access-key-id> --Status Inactive
            aliyun ram DeleteAccessKey --UserName <user-name> \
              --UserAccessKeyId <old-access-key-id>
            ```
        # No Terraform remediation: key rotation is an operational lifecycle action on an already-issued credential; the alicloud provider exposes no resource attribute that enforces the age of an access key.
    variants:
      - uid: mondoo-alibaba-security-ram-access-key-rotation-90-days-alicloud
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-15
      compliance/dora: false
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-5-17
      compliance/nis-2: false
      compliance/nist-ai-100-1: false
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-171: false
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-5
      compliance/pci-dss-4: pcidss-requirement-8
      compliance/soc2-2017: soc2-control-cc6-1-8
      compliance/vda-isa-5: vda-isa-5-4-1-3
  - uid: mondoo-alibaba-security-ram-access-key-rotation-90-days-alicloud
    filters: asset.platform == "alicloud"
    mql: |
      alicloud.ram.users.all(accessKeys.where(status == "Active").all(createDate > time.now - 90 * time.day))

  - uid: mondoo-alibaba-security-ram-password-policy-min-length
    title: Ensure the RAM password policy requires a minimum length of 14
    impact: 60
    docs:
      desc: |
        This check ensures that the RAM account password policy requires a minimum password length of at least 14 characters. Longer passwords dramatically increase the effort required for brute-force and dictionary attacks, and a short minimum length is one of the most common weaknesses in credential policy.

        **Why this matters**

        - **Length is the strongest single factor:** Each additional character multiplies the search space an attacker must cover, so length defeats offline cracking far more effectively than composition rules alone.
        - **Default policies are weak:** The Alibaba Cloud default minimum length is below modern guidance, so accounts left at the default permit easily guessed passwords.
        - **Console and API access share the policy:** A weak password floor exposes every RAM user who authenticates with a password.

        **Risk mitigation**

        - **Raises brute-force cost:** A 14-character floor pushes offline cracking beyond practical reach for common attackers.
        - **Consistent baseline:** Enforcing the minimum at the account level guarantees no user can set a short password.
      audit: |
        ### Audit via Console

        1. Sign in to the [RAM console](https://ram.console.aliyun.com/).
        2. Navigate to **Settings** > **Security Settings** and open the **Password Policy** section.
        3. Review the **Minimum Password Length** value.

        A passing account sets the minimum length to 14 or greater. A failing account sets it below 14.

        ### Audit via CLI

        1. Retrieve the account password policy:

        ```bash
        aliyun ram GetPasswordPolicy
        ```

        A passing account returns `MinimumPasswordLength` of 14 or greater. A failing account returns a value below 14.
      remediation:
        - id: console
          desc: |
            To raise the minimum password length in the console:

            1. Sign in to the [RAM console](https://ram.console.aliyun.com/).
            2. Navigate to **Settings** > **Security Settings** > **Password Policy**.
            3. Set **Minimum Password Length** to 14 or greater and save.
        - id: cli
          desc: |
            To set the minimum password length with the `aliyun` CLI:

            ```bash
            aliyun ram SetPasswordPolicy --MinimumPasswordLength 14
            ```
        - id: terraform
          desc: |
            To enforce the minimum password length in Terraform, set `minimum_password_length` on the account password policy:

            ```hcl
            resource "alicloud_ram_account_password_policy" "default" {
              minimum_password_length = 14
            }
            ```
    variants:
      - uid: mondoo-alibaba-security-ram-password-policy-min-length-alicloud
      - uid: mondoo-alibaba-security-ram-password-policy-min-length-terraform-hcl
      - uid: mondoo-alibaba-security-ram-password-policy-min-length-terraform-plan
      - uid: mondoo-alibaba-security-ram-password-policy-min-length-terraform-state
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: false
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-5-17
      compliance/nis-2: false
      compliance/nist-ai-100-1: false
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-7
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-5
      compliance/pci-dss-4: pcidss-requirement-8
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-3
  - uid: mondoo-alibaba-security-ram-password-policy-min-length-alicloud
    filters: asset.platform == "alicloud"
    mql: |
      alicloud.ram.passwordPolicy.minimumPasswordLength >= 14
  - uid: mondoo-alibaba-security-ram-password-policy-min-length-terraform-hcl
    filters: |
      asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "alicloud_ram_account_password_policy")
    mql: |
      terraform.resources("alicloud_ram_account_password_policy").all(
        arguments["minimum_password_length"] != empty && arguments["minimum_password_length"] >= 14
      )
  - uid: mondoo-alibaba-security-ram-password-policy-min-length-terraform-plan
    filters: |
      asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "alicloud_ram_account_password_policy")
    mql: |
      terraform.plan.resourceChanges.where(type == "alicloud_ram_account_password_policy").all(
        change.after["minimum_password_length"] != empty && change.after["minimum_password_length"] >= 14
      )
  - uid: mondoo-alibaba-security-ram-password-policy-min-length-terraform-state
    filters: |
      asset.platform == "terraform-state" && terraform.state.resources.contains(type == "alicloud_ram_account_password_policy")
    mql: |
      terraform.state.resources.where(type == "alicloud_ram_account_password_policy").all(
        values["minimum_password_length"] != empty && values["minimum_password_length"] >= 14
      )

  - uid: mondoo-alibaba-security-ram-password-policy-complexity
    title: Ensure the RAM password policy requires mixed character types
    impact: 60
    docs:
      desc: |
        This check ensures that the RAM account password policy requires all four character classes: uppercase letters, lowercase letters, numbers, and symbols. Requiring mixed character types widens the keyspace an attacker must search and blocks trivially guessable passwords built from a single class.

        **Why this matters**

        - **Composition widens the keyspace:** Requiring every character class forces passwords out of small, predictable alphabets that fall quickly to dictionary and mask attacks.
        - **Blocks weak patterns:** Without complexity rules, users default to lowercase words and simple number suffixes that automated cracking tools target first.
        - **Applies account-wide:** The policy governs every RAM user, so a single misconfiguration weakens all password-based logins.

        **Risk mitigation**

        - **Defeats low-effort guessing:** Mandatory mixed classes eliminate the weakest password patterns across the account.
        - **Complements length:** Combined with a strong minimum length, complexity requirements push passwords beyond practical offline cracking.
      audit: |
        ### Audit via Console

        1. Sign in to the [RAM console](https://ram.console.aliyun.com/).
        2. Navigate to **Settings** > **Security Settings** > **Password Policy**.
        3. Confirm that uppercase letters, lowercase letters, numbers, and special characters are all required.

        A passing account requires all four character types. A failing account leaves one or more character-type requirements disabled.

        ### Audit via CLI

        1. Retrieve the account password policy:

        ```bash
        aliyun ram GetPasswordPolicy
        ```

        A passing account returns `RequireUppercaseCharacters`, `RequireLowercaseCharacters`, `RequireNumbers`, and `RequireSymbols` all set to `true`. A failing account returns any of them set to `false`.
      remediation:
        - id: console
          desc: |
            To require mixed character types in the console:

            1. Sign in to the [RAM console](https://ram.console.aliyun.com/).
            2. Navigate to **Settings** > **Security Settings** > **Password Policy**.
            3. Enable the requirements for uppercase letters, lowercase letters, numbers, and special characters, then save.
        - id: cli
          desc: |
            To require all character classes with the `aliyun` CLI:

            ```bash
            aliyun ram SetPasswordPolicy \
              --RequireUppercaseCharacters true \
              --RequireLowercaseCharacters true \
              --RequireNumbers true \
              --RequireSymbols true
            ```
        - id: terraform
          desc: |
            To enforce mixed character types in Terraform, set the four complexity attributes on the account password policy:

            ```hcl
            resource "alicloud_ram_account_password_policy" "default" {
              require_uppercase_characters = true
              require_lowercase_characters = true
              require_numbers              = true
              require_symbols              = true
            }
            ```
    variants:
      - uid: mondoo-alibaba-security-ram-password-policy-complexity-alicloud
      - uid: mondoo-alibaba-security-ram-password-policy-complexity-terraform-hcl
      - uid: mondoo-alibaba-security-ram-password-policy-complexity-terraform-plan
      - uid: mondoo-alibaba-security-ram-password-policy-complexity-terraform-state
