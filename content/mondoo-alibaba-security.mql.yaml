  # Terraform variants assert the TLS (ssl_enable) portion only; alicloud_kvstore_instance
  # has no network_type attribute -- classic vs VPC placement is inferred from vswitch assignment.
  - uid: mondoo-alibaba-security-redis-instance-ssl-and-private
    title: Ensure Redis instances enforce TLS and are not on a classic network
    impact: 80
    docs:
      desc: |
        This check ensures that every ApsaraDB for Redis (Tair) instance encrypts client connections with TLS and is deployed in a VPC rather than the legacy classic network. Traffic to a Redis instance without TLS travels in plaintext, and classic-network instances share a flat address space with other tenants' resources, widening the exposure of the datastore.

        **Why this matters**

        - **Plaintext traffic is interceptable:** Without TLS, credentials and cached data can be read or tampered with by anything able to observe the connection path.
        - **Classic networks lack isolation:** The classic network offers none of the segmentation, security group, and routing controls of a VPC, so the instance is reachable across a much broader boundary.
        - **Defense in depth:** Encrypting transit and confining the instance to a VPC combine network isolation with cryptographic protection of the wire.

        **Risk mitigation**

        - **Protects data on the wire:** TLS prevents eavesdropping and manipulation of Redis traffic in transit.
        - **Shrinks the reachable surface:** A VPC deployment lets security groups and routing restrict which workloads can reach the instance.
      audit: |
        ### Audit via Console

        1. Sign in to the [ApsaraDB for Redis console](https://kvstore.console.aliyun.com/).
        2. Open each instance and confirm **SSL/TLS Encryption** is enabled under **Instance Information** > **SSL Settings**.
        3. Confirm the **Network Type** is **VPC** rather than **Classic Network**.

        A passing instance shows TLS enabled and a VPC network type. A failing instance shows TLS disabled or a classic network type.

        ### Audit via CLI

        1. Inspect the TLS status and network type of each instance with the `aliyun` CLI:

        ```bash
        aliyun r-kvstore DescribeInstanceSSL --InstanceId <instance-id>
        aliyun r-kvstore DescribeInstanceAttribute --InstanceId <instance-id>
        ```

        A passing instance returns `SSLEnabled` as `Enable` and `NetworkType` as `VPC`. A failing instance returns TLS disabled or a `CLASSIC` network type.
      remediation:
        - id: console
          desc: |
            To enforce TLS and a VPC deployment on a Redis instance in the console:

            1. Sign in to the [ApsaraDB for Redis console](https://kvstore.console.aliyun.com/).
            2. Open the instance and enable **SSL/TLS Encryption** under **SSL Settings**.
            3. For a classic-network instance, migrate it to a VPC through **Switch to VPC**.
        - id: cli
          desc: |
            To enable TLS with the `aliyun` CLI:

            ```bash
            aliyun r-kvstore ModifyInstanceSSL --InstanceId <instance-id> --SSLEnabled Enable
            ```

            Migrating a classic-network instance to a VPC is a separate operation performed with `SwitchNetwork`.
        - id: terraform
          desc: |
            To enforce TLS on a Redis (Tair) instance in Terraform, set `ssl_enable` to `Enable` and place the instance in a VPC by assigning `vswitch_id`:

            ```hcl
            resource "alicloud_kvstore_instance" "example" {
              db_instance_name = "example-instance"
              instance_class   = "redis.master.small.default"
              engine_version   = "5.0"
              vswitch_id       = alicloud_vswitch.example.id

              ssl_enable = "Enable"
            }
            ```
    variants:
      - uid: mondoo-alibaba-security-redis-instance-ssl-and-private-alicloud
      - uid: mondoo-alibaba-security-redis-instance-ssl-and-private-terraform-hcl
      - uid: mondoo-alibaba-security-redis-instance-ssl-and-private-terraform-plan
      - uid: mondoo-alibaba-security-redis-instance-ssl-and-private-terraform-state
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: false
      compliance/hipaa: hipaa-security-ss164-312-e-2-ii-transmission-security-encryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-ai-100-1: false
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/pci-dss-4: pcidss-requirement-4
      compliance/soc2-2017: soc2-control-cc6-7-1
      compliance/vda-isa-5: vda-isa-5-5-1-1
