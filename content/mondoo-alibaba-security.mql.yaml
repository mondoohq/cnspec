  - uid: mondoo-alibaba-security-ecs-security-group-no-public-all-ports
    title: Ensure security groups do not allow unrestricted public ingress
    impact: 90
    docs:
      desc: |
        This check ensures that no security group allows inbound access to all ports or all protocols from the entire internet (`0.0.0.0/0`). A fully open ingress rule exposes every service on every attached instance.

        **Why this matters**

        - **Total exposure:** An all-ports or all-protocol world-open rule negates network-level protection entirely.
        - **Broad blast radius:** Every instance the group protects becomes reachable on every port.
        - **Masks other controls:** Such a rule renders more specific hardening moot.

        **Risk mitigation**

        - **Restores segmentation:** Removing the rule re-establishes least-exposure networking.
        - **Limits reachable services:** Only intended ports and protocols remain accessible.
      audit: |
        ### Audit via Console

        1. Sign in to the [ECS console](https://ecs.console.aliyun.com/).
        2. Navigate to **Network & Security** > **Security Groups**.
        3. Open each security group's **Inbound** rules and look for `0.0.0.0/0` rules covering all ports (`-1/-1` or `1/65535`) or all protocols.

        A passing group has no such rule. A failing group has one.

        ### Audit via CLI

        1. Inspect a security group's inbound rules:

        ```bash
        aliyun ecs DescribeSecurityGroupAttribute --SecurityGroupId <sg-id> --Direction ingress
        ```

        A passing group returns no `Accept` permission from `0.0.0.0/0` covering all ports or all protocols. A failing group returns one.
      remediation:
        - id: console
          desc: |
            To remove an unrestricted ingress rule in the ECS console:

            1. Sign in to the [ECS console](https://ecs.console.aliyun.com/).
            2. Open the security group and its **Inbound** rules.
            3. Delete the `0.0.0.0/0` all-ports or all-protocol rule and add specific rules for the ports actually required.
        - id: cli
          desc: |
            To revoke an unrestricted ingress rule with the `aliyun` CLI:

            ```bash
            aliyun ecs RevokeSecurityGroup --SecurityGroupId <sg-id> \
              --IpProtocol all --PortRange -1/-1 --SourceCidrIp 0.0.0.0/0
            ```
        - id: terraform
          desc: |
            To replace an unrestricted rule in Terraform, scope the protocol, port range, and source:

            ```hcl
            resource "alicloud_security_group_rule" "app" {
              type              = "ingress"
              ip_protocol       = "tcp"
              port_range        = "443/443"
              security_group_id = alicloud_security_group.example.id
              cidr_ip           = "10.0.0.0/8"
            }
            ```
    variants:
      - uid: mondoo-alibaba-security-ecs-security-group-no-public-all-ports-alicloud
      - uid: mondoo-alibaba-security-ecs-security-group-no-public-all-ports-terraform-hcl
