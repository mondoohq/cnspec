      alicloud.ram.passwordPolicy.maxLoginAttempts > 0
      alicloud.ram.passwordPolicy.maxLoginAttempts <= 5
  - uid: mondoo-alibaba-security-ram-password-policy-max-login-attempts-terraform-hcl
    filters: |
      asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "alicloud_ram_account_password_policy")
