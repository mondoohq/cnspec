  # ===========================================================================
  # Container Service for Kubernetes (ACK)
  # ===========================================================================
  - uid: mondoo-alibaba-security-cs-cluster-no-public-apiserver
    title: Ensure ACK cluster API servers are not exposed to the internet
    impact: 85
    docs:
      desc: |
        This check ensures that Container Service for Kubernetes (ACK) clusters do not expose their Kubernetes API server on a public internet endpoint. When a cluster is created with an internet-facing API server load balancer, the control plane is reachable from any network, so the only barrier to the cluster is the strength of its authentication and authorization.

        **Why this matters**

        - **The API server is the control plane:** Anyone who can reach and authenticate to the Kubernetes API server can schedule workloads, read secrets, and manage every resource in the cluster.
        - **Public exposure invites attack:** An internet-reachable API server is continuously discoverable and probed for weak credentials, token leaks, and unpatched vulnerabilities.
        - **Defense in depth:** Keeping the API server on a private endpoint means an attacker must first gain a foothold inside the VPC before they can even attempt to authenticate.

        **Risk mitigation**

        - **Shrinks the attack surface:** A private-only API server removes the cluster control plane from internet-wide scanning and brute-force attempts.
        - **Forces network proximity:** Administrators reach the cluster over the VPC, a bastion, or a VPN, adding a network boundary in front of authentication.
      audit: |
        ### Audit via Console

        1. Sign in to the [Container Service console](https://cs.console.aliyun.com/).
        2. Open each cluster and review **Cluster Information** > **Basic Information**.
        3. Check the **API Server** endpoints: a passing cluster exposes only an intranet (internal) endpoint.

        A passing cluster shows no public API Server endpoint. A failing cluster shows an internet-facing API Server endpoint.

        ### Audit via CLI

        1. Describe each cluster and inspect the API server endpoints:

        ```bash
        aliyun cs GET /api/v1/clusters/<cluster-id>
        ```

        A passing cluster returns an empty `api_server_endpoint`. A failing cluster returns a populated public `api_server_endpoint`.
      remediation:
        - id: console
          desc: |
            The public API server endpoint is set when the cluster is created and cannot be removed on an existing cluster from the console. To bind API server access to the VPC:

            1. Sign in to the [Container Service console](https://cs.console.aliyun.com/).
            2. Restrict the API server security group and use the intranet endpoint for administration.
            3. For a permanently private control plane, create a replacement cluster with the internet API Server load balancer disabled and migrate workloads.
        - id: cli
          desc: |
            Create clusters with the internet API server load balancer disabled. When creating a managed cluster with the `aliyun` CLI, set `endpoint_public_access` off in the request body:

            ```bash
            aliyun cs POST /clusters --body '{"name":"<cluster-name>","cluster_type":"ManagedKubernetes","endpoint_public_access":false}'
            ```
        - id: terraform
          desc: |
            To keep the API server private in Terraform, disable the internet load balancer for the API server by setting `slb_internet_enabled` to `false`:

            ```hcl
            resource "alicloud_cs_managed_kubernetes" "example" {
              name                 = "example-cluster"
              slb_internet_enabled = false
            }
            ```
    variants:
      - uid: mondoo-alibaba-security-cs-cluster-no-public-apiserver-alicloud
      - uid: mondoo-alibaba-security-cs-cluster-no-public-apiserver-terraform-hcl
      - uid: mondoo-alibaba-security-cs-cluster-no-public-apiserver-terraform-plan
      - uid: mondoo-alibaba-security-cs-cluster-no-public-apiserver-terraform-state
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: false
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-ai-100-1: false
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/pci-dss-4: pcidss-requirement-1
      compliance/soc2-2017: soc2-control-cc6-6-4
