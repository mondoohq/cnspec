  # ===========================================================================
  # ApsaraDB for PolarDB
  # ===========================================================================
  - uid: mondoo-alibaba-security-polardb-cluster-tde-enabled
    title: Ensure PolarDB clusters have Transparent Data Encryption enabled
    impact: 80
    docs:
      desc: |
        This check ensures that ApsaraDB for PolarDB clusters have Transparent Data Encryption (TDE) enabled so that cluster data is encrypted at rest. Without TDE, the underlying data files and backups are stored unencrypted and are readable to anyone who obtains the raw storage.

        **Why this matters**

        - **Defense against storage-layer exposure:** TDE protects cluster data if the underlying storage, snapshots, or backups are ever accessed outside the service.
        - **Regulatory expectation:** Many compliance regimes require that stored data, especially personal or cardholder data, is encrypted at rest.
        - **Transparent to applications:** TDE encrypts and decrypts at the storage engine level, protecting data without application changes.

        **Risk mitigation**

        - **Reduces breach impact:** Encrypted cluster data is unreadable to an attacker who obtains raw storage without the keys.
        - **Protects backups:** Because encryption follows the data into backups, exported or leaked backup files remain protected.
      audit: |
        ### Audit via Console

        1. Sign in to the [ApsaraDB for PolarDB console](https://polardb.console.aliyun.com/).
        2. Open each cluster and navigate to **Settings and Management** > **TDE**.
        3. Confirm that **TDE** is enabled.

        A passing cluster shows TDE enabled. A failing cluster shows TDE disabled.

        ### Audit via CLI

        1. Describe the TDE status of each cluster:

        ```bash
        aliyun polardb DescribeDBClusterTDE --DBClusterId <cluster-id>
        ```

        A passing cluster reports `TDEStatus` as `Enabled`. A failing cluster reports `Disabled`.
      remediation:
        - id: console
          desc: |
            To enable TDE on a PolarDB cluster in the console:

            1. Sign in to the [ApsaraDB for PolarDB console](https://polardb.console.aliyun.com/).
            2. Open the affected cluster and go to **Settings and Management** > **TDE**.
            3. Enable **TDE** and select a KMS key (or the service-managed key) to protect the data.
        - id: cli
          desc: |
            To enable TDE on a PolarDB cluster with the `aliyun` CLI:

            ```bash
            aliyun polardb ModifyDBClusterTDE \
              --DBClusterId <cluster-id> \
              --TDEStatus Enabled
            ```
        - id: terraform
          desc: |
            To enable TDE on a PolarDB cluster in Terraform, set `tde_status` to `Enabled`:

            ```hcl
            resource "alicloud_polardb_cluster" "example" {
              db_type       = "MySQL"
              db_version    = "8.0"
              db_node_class = "polar.mysql.x4.large"
              pay_type      = "PostPaid"
              vswitch_id    = alicloud_vswitch.example.id

              tde_status = "Enabled"
            }
            ```
