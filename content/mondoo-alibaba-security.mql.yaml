  # ===========================================================================
  # NAS
  # ===========================================================================
  - uid: mondoo-alibaba-security-nas-access-rule-restrict-source
    title: Ensure NAS access rules do not grant read-write access to the internet
    impact: 80
    docs:
      desc: |
        This check ensures that no Apsara File Storage NAS access rule grants read-write (`RDWR`) access to the entire internet. A NAS access group controls which clients may mount a file system; an access rule that combines a world-open source (`0.0.0.0/0` or the IPv6 `::/0`) with read-write permission lets any reachable host both read and modify stored files.

        **Why this matters**

        - **World-writable exports are a data-integrity risk:** A read-write rule open to `0.0.0.0/0` allows any client that can reach the mount target to alter or destroy files, not just read them.
        - **Exfiltration and tampering:** Sensitive data in a file system exposed to the whole internet can be copied out, encrypted for ransom, or silently corrupted.
        - **Blast radius:** A single overly broad rule can undo tighter controls elsewhere, because NAS evaluates access rules by priority across the whole access group.

        **Risk mitigation**

        - **Scope to known networks:** Restricting `source_cidr_ip` to specific VPC or on-premises ranges removes anonymous internet clients from the mount surface.
        - **Prefer read-only where possible:** Granting `RDONLY` for broad ranges limits an exposed export to disclosure rather than modification.
      audit: |
        ### Audit via Console

        1. Sign in to the [NAS console](https://nas.console.aliyun.com/).
        2. Navigate to **Permission Groups** and open each access group.
        3. Review the rules and confirm that no rule sets **Authorization Address** to `0.0.0.0/0` (or `::/0`) while **Read/Write Permission** is **RDWR**.

        A passing access group has no read-write rule whose source is the entire internet. A failing group has an `RDWR` rule with a source of `0.0.0.0/0` or `::/0`.

        ### Audit via CLI

        1. List access groups and inspect the rules of each with the `aliyun` CLI:

        ```bash
        aliyun nas DescribeAccessGroups
        aliyun nas DescribeAccessRules --AccessGroupName <access-group-name>
        ```

        A passing rule with `RWAccess` of `RDWR` shows a specific `SourceCidrIp`. A failing rule shows `RWAccess` `RDWR` with `SourceCidrIp` `0.0.0.0/0` or `Ipv6SourceCidrIp` `::/0`.
      remediation:
        - id: console
          desc: |
            To tighten a NAS access rule in the console:

            1. Sign in to the [NAS console](https://nas.console.aliyun.com/).
            2. Navigate to **Permission Groups** and open the affected access group.
            3. Edit the offending rule and change **Authorization Address** from `0.0.0.0/0` to the specific VPC or client CIDR that needs access, or set **Read/Write Permission** to **RDONLY** where write access is not required.
        - id: cli
          desc: |
            To restrict a NAS access rule to a specific network with the `aliyun` CLI:

            ```bash
            aliyun nas ModifyAccessRule --AccessGroupName <access-group-name> \
              --AccessRuleId <rule-id> --SourceCidrIp 10.0.0.0/8 --RWAccessType RDONLY
            ```
        - id: terraform
          desc: |
            To declare a scoped NAS access rule in Terraform, set a specific `source_cidr_ip` and an appropriate `rw_access_type`:

            ```hcl
            resource "alicloud_nas_access_rule" "example" {
              access_group_name = alicloud_nas_access_group.example.access_group_name
              source_cidr_ip    = "10.0.0.0/8"
              rw_access_type    = "RDONLY"
              user_access_type  = "no_squash"
              priority          = 1
            }
            ```
    variants:
      - uid: mondoo-alibaba-security-nas-access-rule-restrict-source-alicloud
      - uid: mondoo-alibaba-security-nas-access-rule-restrict-source-terraform-hcl
      - uid: mondoo-alibaba-security-nas-access-rule-restrict-source-terraform-plan
      - uid: mondoo-alibaba-security-nas-access-rule-restrict-source-terraform-state
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: false
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-ai-100-1: false
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/pci-dss-4: pcidss-requirement-1
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-3-2
  - uid: mondoo-alibaba-security-nas-access-rule-restrict-source-alicloud
    filters: asset.platform == "alicloud"
    mql: |
      alicloud.nas.accessGroups.all(
        accessRules.where(rwAccess == "RDWR").all(sourceCidrIp != "0.0.0.0/0" && ipv6SourceCidrIp != "::/0")
      )
  - uid: mondoo-alibaba-security-nas-access-rule-restrict-source-terraform-hcl
    filters: |
      asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "alicloud_nas_access_rule")
    mql: |
      terraform.resources("alicloud_nas_access_rule").all(
        arguments["rw_access_type"] != "RDWR" || arguments["source_cidr_ip"] != "0.0.0.0/0" && arguments["ipv6_source_cidr_ip"] != "::/0"
      )
  - uid: mondoo-alibaba-security-nas-access-rule-restrict-source-terraform-plan
    filters: |
      asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "alicloud_nas_access_rule")
    mql: |
      terraform.plan.resourceChanges.where(type == "alicloud_nas_access_rule").all(
        change.after["rw_access_type"] != "RDWR" || change.after["source_cidr_ip"] != "0.0.0.0/0" && change.after["ipv6_source_cidr_ip"] != "::/0"
      )
  - uid: mondoo-alibaba-security-nas-access-rule-restrict-source-terraform-state
    filters: |
      asset.platform == "terraform-state" && terraform.state.resources.contains(type == "alicloud_nas_access_rule")
    mql: |
      terraform.state.resources.where(type == "alicloud_nas_access_rule").all(
        values["rw_access_type"] != "RDWR" || values["source_cidr_ip"] != "0.0.0.0/0" && values["ipv6_source_cidr_ip"] != "::/0"
      )

  # ===========================================================================
  # Cloud Firewall
  # ===========================================================================
  # No Terraform variants: whether Cloud Firewall is provisioned and switched on for the account is a runtime service posture reported by the buy-version API; there is no alicloud_* resource attribute that represents the "Cloud Firewall enabled" account state.
  - uid: mondoo-alibaba-security-cloudfirewall-enabled
    title: Ensure Cloud Firewall is enabled
    impact: 75
    docs:
      desc: |
        This check ensures that Alibaba Cloud Firewall is provisioned and switched on for the account. Cloud Firewall is the managed boundary firewall that inspects and filters north-south and east-west traffic; when it is not enabled, no centrally managed control policies are applied to internet-facing and inter-VPC traffic.

        **Why this matters**

        - **A boundary firewall is a baseline control:** Without Cloud Firewall enabled, the account has no managed choke point to enforce allow/deny policy on traffic crossing its perimeter.
        - **Visibility gap:** Cloud Firewall provides traffic analysis and intrusion prevention; leaving it off removes a primary source of network telemetry and blocking.
        - **Consistent policy enforcement:** A central firewall applies uniform control policies rather than relying on per-resource security groups that can drift.

        **Risk mitigation**

        - **Managed perimeter enforcement:** Enabling Cloud Firewall establishes a single place to define and enforce boundary allow/deny rules.
        - **Reduced exposure:** An active firewall can block malicious inbound and outbound flows before they reach or leave workloads.
      audit: |
        ### Audit via Console

        1. Sign in to the [Cloud Firewall console](https://yundun.console.aliyun.com/?p=cfwnext).
        2. Review the **Overview** page and confirm the firewall is provisioned and its protection is switched on.

        A passing account shows Cloud Firewall enabled. A failing account shows Cloud Firewall not provisioned or switched off.

        ### Audit via CLI

        1. Query the account's Cloud Firewall edition and status with the `aliyun` CLI:

        ```bash
        aliyun cloudfw DescribeUserBuyVersion
        ```

        A passing account returns `UserStatus` of `true`. A failing account returns `UserStatus` of `false`.
      remediation:
        - id: console
          desc: |
            To enable Cloud Firewall in the console:

            1. Sign in to the [Cloud Firewall console](https://yundun.console.aliyun.com/?p=cfwnext).
            2. Provision a Cloud Firewall edition for the account and switch protection on.
            3. Define control policies for internet, VPC, and internal boundaries to enforce the intended traffic policy.
        - id: cli
          desc: |
            Cloud Firewall is enabled by purchasing and activating an edition. After it is active, confirm the account status with the `aliyun` CLI:

            ```bash
            aliyun cloudfw DescribeUserBuyVersion
            ```
        # No Terraform remediation: enabling Cloud Firewall is a subscription/activation action against the account, not the declaration of an alicloud_* resource, so there is no Terraform resource that provisions and switches on the service.
    variants:
      - uid: mondoo-alibaba-security-cloudfirewall-enabled-alicloud
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: false
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-ai-100-1: false
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/pci-dss-4: pcidss-requirement-1
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-3-2
  - uid: mondoo-alibaba-security-cloudfirewall-enabled-alicloud
    filters: asset.platform == "alicloud"
    mql: |
      alicloud.cloudFirewall.enabled == true

  # ===========================================================================
  # Anti-DDoS
  # ===========================================================================
  # No Terraform variants: whether an Anti-DDoS instance is provisioned and its protection is active is a runtime status reported by the DDoS API; the alicloud_ddoscoo_instance resource does not expose an attribute that asserts protection is currently enabled and running.
  - uid: mondoo-alibaba-security-antiddos-instance-protection-active
    title: Ensure Anti-DDoS instances are enabled and active
    impact: 70
    docs:
      desc: |
        This check ensures that every provisioned Alibaba Anti-DDoS instance is enabled so that its DDoS mitigation is actively protecting the associated endpoints. An Anti-DDoS instance that exists but is not enabled leaves the workloads it is meant to shield without volumetric-attack protection. If the account has no Anti-DDoS instances the check passes, so it never forces a purchase.

        **Why this matters**

        - **Availability under attack:** Anti-DDoS absorbs and scrubs volumetric floods; a disabled instance cannot protect the endpoints it was bought for.
        - **Silent lapse:** A protection instance can be present in the account yet not actively enabled, giving a false sense of coverage.
        - **Continuity dependency:** Public-facing services often depend on DDoS mitigation to stay reachable during an attack.

        **Risk mitigation**

        - **Active mitigation:** An enabled instance scrubs attack traffic before it overwhelms the protected service.
        - **Verified coverage:** Confirming the enabled state ensures the purchased protection is actually in force.
      audit: |
        ### Audit via Console

        1. Sign in to the [Anti-DDoS console](https://yundun.console.aliyun.com/?p=ddoscoo).
        2. Open **Assets** > **Instances** and review each instance.
        3. Confirm each instance is enabled and its protection status is normal.

        A passing account has every Anti-DDoS instance enabled. A failing account has one or more instances that are provisioned but not enabled.

        ### Audit via CLI

        1. List the account's Anti-DDoS instances with the `aliyun` CLI:

        ```bash
        aliyun ddoscoo DescribeInstances
        ```

        A passing instance returns `Enabled` of `1`. A failing instance returns `Enabled` of `0`.
      remediation:
        - id: console
          desc: |
            To activate protection on an Anti-DDoS instance in the console:

            1. Sign in to the [Anti-DDoS console](https://yundun.console.aliyun.com/?p=ddoscoo).
            2. Open **Assets** > **Instances** and select the instance that is not enabled.
            3. Associate the protected object and enable the instance so its mitigation is in force.
        - id: cli
          desc: |
            After associating a protected object, confirm the instance is enabled with the `aliyun` CLI:

            ```bash
            aliyun ddoscoo DescribeInstances
            ```
        # No Terraform remediation: enabling protection on a provisioned Anti-DDoS instance is an operational action tied to associating protected objects; the alicloud provider exposes no resource attribute that toggles an instance's active protection state.
    variants:
      - uid: mondoo-alibaba-security-antiddos-instance-protection-active-alicloud
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: false
      compliance/hipaa: false
      compliance/iso-27001-2022: false
      compliance/nis-2: nis-2-21-2-c
      compliance/nist-ai-100-1: false
      compliance/nist-csf-1: nist-csf-1-pr-ds-4
      compliance/nist-csf-2: nist-csf-2-pr-ir-04
      compliance/nist-sp-800-171: false
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-5
      compliance/pci-dss-4: false
      compliance/soc2-2017: false
      compliance/vda-isa-5: false
  - uid: mondoo-alibaba-security-antiddos-instance-protection-active-alicloud
    filters: asset.platform == "alicloud"
    mql: |
      alicloud.antiddos.instances.all(enabled == true)

  # ===========================================================================
  # SLB (Classic Load Balancer)
  # ===========================================================================
  # No Terraform variants: SLB listeners are declared as separate alicloud_slb_listener resources keyed by a load balancer id, so correlating a listener's protocol to whether its parent load balancer is internet-facing is a runtime relationship the static Terraform graph does not resolve cleanly.
  - uid: mondoo-alibaba-security-slb-listener-not-plaintext
    title: Ensure internet-facing load balancer listeners are not plaintext HTTP
    impact: 75
    docs:
      desc: |
        This check ensures that internet-facing Server Load Balancer (SLB) instances do not expose plaintext `HTTP` listeners. An internet-facing load balancer that serves an `HTTP` listener terminates or forwards unencrypted web traffic over the public internet, where it can be read or modified in transit. Web traffic reaching a public load balancer should use `HTTPS` so it is protected by TLS.

        **Why this matters**

        - **Traffic is exposed in transit:** A public `HTTP` listener carries credentials, session tokens, and payloads in cleartext across untrusted networks.
        - **Interception and tampering:** On-path attackers can read or alter unencrypted web traffic between clients and the load balancer.
        - **Downgrade surface:** Offering `HTTP` at all invites clients onto an unencrypted path even when an `HTTPS` listener also exists.

        **Risk mitigation**

        - **Encrypt web traffic end to public edge:** Serving only `HTTPS` on internet-facing load balancers protects client traffic with TLS.
        - **Remove the cleartext option:** Eliminating public `HTTP` listeners closes the unencrypted path entirely.
      audit: |
        ### Audit via Console

        1. Sign in to the [SLB console](https://slb.console.aliyun.com/).
        2. For each load balancer whose address type is **Internet**, open the **Listeners** tab.
        3. Confirm no listener uses the **HTTP** protocol; web listeners should use **HTTPS**.

        A passing internet-facing load balancer serves no `HTTP` listener. A failing one exposes at least one `HTTP` listener.

        ### Audit via CLI

        1. List load balancers and inspect the listeners of each with the `aliyun` CLI:

        ```bash
        aliyun slb DescribeLoadBalancers --AddressType internet
        aliyun slb DescribeLoadBalancerListeners --LoadBalancerId <lb-id>
        ```

        A passing internet-facing load balancer returns no listener with `ListenerProtocol` of `http`. A failing one returns a listener with `ListenerProtocol` `http`.
      remediation:
        - id: console
          desc: |
            To remove plaintext web traffic from an internet-facing load balancer in the console:

            1. Sign in to the [SLB console](https://slb.console.aliyun.com/).
            2. Open the internet-facing load balancer and go to the **Listeners** tab.
            3. Add an **HTTPS** listener with a server certificate, migrate clients to it, then delete the **HTTP** listener (or configure it to redirect to HTTPS).
        - id: cli
          desc: |
            To create an HTTPS listener and remove the plaintext one with the `aliyun` CLI:

            ```bash
            aliyun slb CreateLoadBalancerHTTPSListener --LoadBalancerId <lb-id> \
              --ListenerPort 443 --ServerCertificateId <cert-id> --Bandwidth -1
            aliyun slb DeleteLoadBalancerListener --LoadBalancerId <lb-id> --ListenerPort 80
            ```
        # No Terraform remediation: SLB listeners are modeled as standalone alicloud_slb_listener resources decoupled from their load balancer's address type, so this posture is asserted against the running configuration rather than a single Terraform attribute.
    variants:
      - uid: mondoo-alibaba-security-slb-listener-not-plaintext-alicloud
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: false
      compliance/hipaa: hipaa-security-ss164-312-e-2-ii-transmission-security-encryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-ai-100-1: false
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/pci-dss-4: pcidss-requirement-4
      compliance/soc2-2017: soc2-control-cc6-7-1
      compliance/vda-isa-5: vda-isa-5-5-1-1
  - uid: mondoo-alibaba-security-slb-listener-not-plaintext-alicloud
    filters: asset.platform == "alicloud"
    mql: |
      alicloud.slb.loadBalancers.where(internetFacing == true).all(
        listeners.where(protocol == "http") == empty
      )

  # ===========================================================================
  # WAF
  # ===========================================================================
  # No Terraform variants: the negotiated TLS version served for a WAF-protected domain is a runtime property of the domain's listen configuration reported by the WAF API; the alicloud_waf_domain resource does not expose a stable attribute that pins the minimum TLS version served.
  - uid: mondoo-alibaba-security-waf-domain-tls-hardened
    title: Ensure WAF-protected domains enforce a modern TLS version
    impact: 70
    docs:
      desc: |
        This check ensures that Web Application Firewall (WAF) protected domains that serve HTTPS do not negotiate down to a legacy TLS version. Domains configured with a minimum TLS version of `tlsv1` or `tlsv1.1` allow clients to connect over protocol versions with known cryptographic weaknesses. HTTPS-enabled WAF domains should require TLS 1.2 or higher. Domains that do not serve HTTPS, and accounts with no WAF domains, pass because there is no negotiated TLS floor to weaken.

        **Why this matters**

        - **Legacy TLS is broken:** TLS 1.0 and 1.1 are deprecated and carry known weaknesses that undermine the confidentiality and integrity of the connection.
        - **Downgrade exposure:** Permitting an old minimum version lets clients negotiate a weak session even when stronger versions are available.
        - **Compliance expectation:** Modern standards require disabling early TLS for public web endpoints.

        **Risk mitigation**

        - **Raise the floor:** Setting the minimum to TLS 1.2 or higher forces every session onto a modern, supported protocol version.
        - **Remove weak negotiation:** Disallowing `tlsv1` and `tlsv1.1` eliminates downgrade to deprecated cryptography.
      audit: |
        ### Audit via Console

        1. Sign in to the [WAF console](https://yundun.console.aliyun.com/?p=waf).
        2. Open **Website Configuration** and review each protected domain.
        3. For each HTTPS-enabled domain, confirm the **TLS Version** floor is TLS 1.2 or higher, not TLS 1.0 or TLS 1.1.

        A passing HTTPS domain has a minimum TLS version of `tlsv1.2` or higher. A failing HTTPS domain has a minimum of `tlsv1` or `tlsv1.1`.
      remediation:
        - id: console
          desc: |
            To raise the TLS floor for a WAF-protected domain in the console:

            1. Sign in to the [WAF console](https://yundun.console.aliyun.com/?p=waf).
            2. Open **Website Configuration** and edit the HTTPS settings of the affected domain.
            3. Set the **TLS Version** to TLS 1.2 (or higher) and save.
        # No CLI remediation: the domain TLS-version floor is a WAF 3.0 listen setting that is not exposed by the default waf-openapi API version, so it is configured through the WAF console.
        # No Terraform remediation: the served minimum TLS version is a runtime listen property of the WAF domain; the alicloud provider exposes no stable resource attribute that pins the TLS version floor.
    variants:
      - uid: mondoo-alibaba-security-waf-domain-tls-hardened-alicloud
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: false
      compliance/hipaa: hipaa-security-ss164-312-e-2-ii-transmission-security-encryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-ai-100-1: false
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/pci-dss-4: pcidss-requirement-4
      compliance/soc2-2017: soc2-control-cc6-7-1
      compliance/vda-isa-5: vda-isa-5-5-1-1
  - uid: mondoo-alibaba-security-waf-domain-tls-hardened-alicloud
    filters: asset.platform == "alicloud"
    mql: |
      alicloud.waf.instances.all(
        domains.where(httpsEnabled == true).all(tlsVersion != "tlsv1" && tlsVersion != "tlsv1.1")
      )
