  - uid: mondoo-alibaba-security-oss-bucket-versioning-enabled
    title: Ensure OSS buckets have versioning enabled
    impact: 70
    docs:
      desc: |
        This check ensures that every Object Storage Service (OSS) bucket has versioning enabled. With versioning, OSS retains previous versions of an object when it is overwritten or deleted, so data can be recovered after accidental changes, malicious deletion, or ransomware.

        **Why this matters**

        - **Recovery from deletion:** Versioning preserves prior object versions, allowing restoration after accidental or malicious deletes and overwrites.
        - **Ransomware resilience:** An attacker who encrypts or overwrites objects cannot destroy the retained earlier versions without additional privileges.
        - **Data integrity:** Historical versions provide a reliable point-in-time reference when investigating unexpected changes.

        **Risk mitigation**

        - **Restores lost data:** Earlier versions can be recovered when current objects are corrupted or removed.
        - **Limits destructive impact:** Overwrites and deletes become recoverable events rather than permanent loss.
      audit: |
        ### Audit via Console

        1. Sign in to the [OSS console](https://oss.console.aliyun.com/).
        2. Open each bucket and go to **Redundancy for Fault Tolerance** > **Versioning**.
        3. Confirm versioning is set to **Enabled**.

        A passing bucket shows versioning **Enabled**. A failing bucket shows versioning disabled or suspended.

        ### Audit via CLI

        1. Inspect the versioning configuration of each bucket with the `aliyun` CLI:

        ```bash
        aliyun oss bucket-versioning --method get oss://<bucket-name>
        ```

        A passing bucket returns a `Status` of `Enabled`. A failing bucket returns no status or `Suspended`.
      remediation:
        - id: console
          desc: |
            To enable versioning on an OSS bucket in the console:

            1. Sign in to the [OSS console](https://oss.console.aliyun.com/).
            2. Open the bucket and go to **Redundancy for Fault Tolerance** > **Versioning**.
            3. Set versioning to **Enabled** and save.
        - id: cli
          desc: |
            To enable versioning on an OSS bucket with the `aliyun` CLI:

            ```bash
            aliyun oss bucket-versioning --method put oss://<bucket-name> enabled
            ```
        - id: terraform
          desc: |
            To enable versioning on an OSS bucket in Terraform, declare a `versioning` block with `status = "Enabled"`:

            ```hcl
            resource "alicloud_oss_bucket" "example" {
              bucket = "example-bucket"

              versioning {
                status = "Enabled"
              }
            }
            ```
    variants:
      - uid: mondoo-alibaba-security-oss-bucket-versioning-enabled-alicloud
      - uid: mondoo-alibaba-security-oss-bucket-versioning-enabled-terraform-hcl
      - uid: mondoo-alibaba-security-oss-bucket-versioning-enabled-terraform-plan
      - uid: mondoo-alibaba-security-oss-bucket-versioning-enabled-terraform-state
    tags:
