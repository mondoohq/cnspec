  - uid: mondoo-alibaba-security-redis-instance-tde-enabled
    title: Ensure Redis instances have TDE enabled
    impact: 80
    docs:
      desc: |
        This check ensures that every ApsaraDB for Redis (Tair) instance has transparent data encryption (TDE) enabled so that persisted data is encrypted at rest. Without TDE, the instance's data files and backups are written to the underlying storage in plaintext.

        **Why this matters**

        - **Protects data at rest:** TDE encrypts the data the instance persists, so raw access to the underlying disks or snapshots does not reveal cached contents.
        - **Backups inherit protection:** Encryption applied at the instance level extends to the data captured in backups and exports.
        - **Regulatory expectation:** Many compliance regimes require that stored sensitive data is encrypted at rest.

        **Risk mitigation**

        - **Reduces breach impact:** Encrypted data files are unreadable to an attacker who obtains raw storage without the keys.
        - **Transparent coverage:** TDE encrypts persisted data without any change to how applications read or write keys.
      audit: |
        ### Audit via Console

        1. Sign in to the [ApsaraDB for Redis console](https://kvstore.console.aliyun.com/).
        2. Open each instance and review **Data Security** > **TDE** under the instance settings.
        3. Confirm TDE is enabled.

        A passing instance shows TDE enabled. A failing instance shows TDE disabled.

        ### Audit via CLI

        1. Inspect the TDE status of each instance with the `aliyun` CLI:

        ```bash
        aliyun r-kvstore DescribeInstanceTDEStatus --InstanceId <instance-id>
        ```

        A passing instance returns `TDEStatus` as `Enabled`. A failing instance returns TDE disabled.
      remediation:
        - id: console
          desc: |
            To enable TDE on a Redis instance in the console:

            1. Sign in to the [ApsaraDB for Redis console](https://kvstore.console.aliyun.com/).
            2. Open the affected instance and go to **Data Security** > **TDE**.
            3. Enable TDE and select or create the KMS key to use.
        - id: cli
          desc: |
            To enable TDE with the `aliyun` CLI:

            ```bash
            aliyun r-kvstore ModifyInstanceTDE --InstanceId <instance-id> --TDEStatus Enabled
            ```
        - id: terraform
          desc: |
            To enable TDE on a Redis (Tair) instance in Terraform, set `tde_status` to `Enabled`:

            ```hcl
            resource "alicloud_kvstore_instance" "example" {
              db_instance_name = "example-instance"
              instance_class   = "redis.master.small.default"
              engine_version   = "5.0"
              vswitch_id       = alicloud_vswitch.example.id

              tde_status = "Enabled"
            }
            ```
    variants:
      - uid: mondoo-alibaba-security-redis-instance-tde-enabled-alicloud
      - uid: mondoo-alibaba-security-redis-instance-tde-enabled-terraform-hcl
      - uid: mondoo-alibaba-security-redis-instance-tde-enabled-terraform-plan
      - uid: mondoo-alibaba-security-redis-instance-tde-enabled-terraform-state
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-ai-100-1: false
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/pci-dss-4: pcidss-requirement-3
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
