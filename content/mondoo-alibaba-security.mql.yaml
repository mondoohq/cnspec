  # No Terraform variants: the check inspects the resolved JSON policy document of each custom RAM policy; the alicloud_ram_policy document is an opaque JSON string in HCL, so a robust wildcard-grant analysis is only reliable against the runtime resource.
  - uid: mondoo-alibaba-security-ram-policy-no-full-admin
    title: Ensure custom RAM policies do not grant full administrative access
    impact: 85
    docs:
      desc: |
        This check ensures that no custom RAM policy grants full administrative access by allowing every action on every resource. A statement with `Effect: Allow`, `Action: "*"`, and `Resource: "*"` is equivalent to the built-in AdministratorAccess policy and hands the attached identity unrestricted control of the account.

        **Why this matters**

        - **Wildcard grants defeat least privilege:** A single `*/*` allow statement bypasses every intended access boundary, so any identity carrying it can reach every service and resource.
        - **Custom policies escape review:** Broad permissions embedded in a custom policy are easy to overlook, unlike attaching the clearly named system administrator policy.
        - **Blast radius on compromise:** If an identity with full-admin custom permissions is compromised, the attacker inherits total account control.

        **Risk mitigation**

        - **Contains compromise:** Scoping permissions to required actions and resources limits what a stolen credential can do.
        - **Enforces intentional access:** Removing wildcard grants forces each permission to be justified against a real need.
      audit: |
        ### Audit via Console

        1. Sign in to the [RAM console](https://ram.console.aliyun.com/).
        2. Navigate to **Permissions** > **Policies** and filter by **Custom Policy**.
        3. Open each custom policy and inspect its document for a statement that allows action `*` on resource `*`.

        A passing account has no custom policy that allows all actions on all resources. A failing account has a custom policy with an `Allow` statement using `Action: "*"` and `Resource: "*"`.

        ### Audit via CLI

        1. List custom policies and inspect each policy document:

        ```bash
        aliyun ram ListPolicies --PolicyType Custom
        aliyun ram GetPolicy --PolicyType Custom --PolicyName <policy-name>
        ```

        A passing policy scopes actions and resources to specific values. A failing policy contains an `Allow` statement with `Action` and `Resource` both set to `*`.
      remediation:
        - id: console
          desc: |
            To remove full administrative access from a custom RAM policy in the console:

            1. Sign in to the [RAM console](https://ram.console.aliyun.com/).
            2. Navigate to **Permissions** > **Policies** and open the affected custom policy.
            3. Edit the policy document to replace the wildcard `Action` and `Resource` with the specific actions and resource ARNs the identity actually requires, then save a new version.
        - id: cli
          desc: |
            To replace a wildcard custom policy with a scoped document using the `aliyun` CLI, create a new policy version that lists only the required actions and resources:

            ```bash
            aliyun ram CreatePolicyVersion --PolicyName <policy-name> \
              --SetAsDefault true \
              --PolicyDocument '{"Version":"1","Statement":[{"Effect":"Allow","Action":["oss:GetObject"],"Resource":["acs:oss:*:*:example-bucket/*"]}]}'
            ```
        # No Terraform remediation: this check evaluates the resolved JSON policy document of existing custom policies; the alicloud_ram_policy document is an opaque JSON string in HCL, so the wildcard-grant condition cannot be reliably asserted through a Terraform resource attribute.
    variants:
      - uid: mondoo-alibaba-security-ram-policy-no-full-admin-alicloud
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-16
      compliance/dora: false
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-2
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-ai-100-1: false
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-5
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-6
      compliance/pci-dss-4: pcidss-requirement-7
      compliance/soc2-2017: soc2-control-cc6-3-3
      compliance/vda-isa-5: false
  - uid: mondoo-alibaba-security-ram-policy-no-full-admin-alicloud
    filters: asset.platform == "alicloud"
    mql: |
      alicloud.ram.policies.where(policyType == "Custom").all(
        policyDocument == empty ||
        parse.json(policyDocument).params["Statement"].none(
          _["Effect"] == "Allow" && _["Action"] == "*" && _["Resource"] == "*"
        )
      )

  # No Terraform variants: user inactivity is measured from the runtime last-login timestamp of a provisioned identity; no alicloud_ram_user attribute expresses when a user last authenticated.
  - uid: mondoo-alibaba-security-ram-user-inactive-credentials
    title: Ensure RAM users with console access are not inactive
    impact: 70
    docs:
      desc: |
        This check ensures that every RAM user with a console logon profile has signed in within the last 90 days. A user who can log in but has not done so recently represents standing access that is no longer being used, and dormant accounts are a favored target because their misuse is unlikely to be noticed.

        **Why this matters**

        - **Dormant access is unmonitored access:** An account that nobody actively uses can be compromised and operated for a long time before anyone notices.
        - **Orphaned accounts linger:** Users who have changed roles or left the organization often retain console access that was never revoked.
        - **Standing credentials expand attack surface:** Every enabled login that is not needed is an additional entry point an attacker can target.

        **Risk mitigation**

        - **Removes unused entry points:** Disabling or deprovisioning inactive users shrinks the set of credentials an attacker can abuse.
        - **Surfaces stale identities:** Flagging inactivity drives a regular review of who still needs access.
      audit: |
        ### Audit via Console

        1. Sign in to the [RAM console](https://ram.console.aliyun.com/).
        2. Navigate to **Identities** > **Users**.
        3. For each user that has console access, review the **Last Logon** time.

        A passing user with a logon profile has signed in within the last 90 days. A failing user has a logon profile but has not signed in within 90 days, or has never signed in.

        ### Audit via CLI

        1. List users and inspect each user's last logon time and logon profile:

        ```bash
        aliyun ram ListUsers
        aliyun ram GetUser --UserName <user-name>
        aliyun ram GetLoginProfile --UserName <user-name>
        ```

        A passing user has a logon profile and a recent `LastLoginDate`. A failing user has a logon profile but a `LastLoginDate` older than 90 days or none at all.
      remediation:
        - id: console
          desc: |
            To remediate an inactive console user in the console:

            1. Sign in to the [RAM console](https://ram.console.aliyun.com/).
            2. Navigate to **Identities** > **Users** and open the inactive user.
            3. If the access is no longer required, delete the user's logon profile to remove console access, or delete the user entirely once dependencies are cleared.
        - id: cli
          desc: |
            To remove console access from an inactive user with the `aliyun` CLI, delete the logon profile, or delete the user once its credentials and attachments are removed:

            ```bash
            aliyun ram DeleteLoginProfile --UserName <user-name>
            aliyun ram DeleteUser --UserName <user-name>
            ```
        # No Terraform remediation: inactivity is observed from runtime login history; the alicloud provider exposes no resource attribute that deprovisions a user based on how recently they authenticated.
    variants:
      - uid: mondoo-alibaba-security-ram-user-inactive-credentials-alicloud
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: false
      compliance/dora: false
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-5-16
      compliance/nis-2: false
      compliance/nist-ai-100-1: false
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-171: false
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-2
      compliance/pci-dss-4: pcidss-requirement-8
      compliance/soc2-2017: soc2-control-cc6-1-8
      compliance/vda-isa-5: vda-isa-5-4-1-3
  - uid: mondoo-alibaba-security-ram-user-inactive-credentials-alicloud
    filters: asset.platform == "alicloud"
    mql: |
      alicloud.ram.users.where(loginProfile != empty).all(lastLoginDate != empty && lastLoginDate > time.now - 90 * time.day)

  # ===========================================================================
  # OSS
  # ===========================================================================
  - uid: mondoo-alibaba-security-oss-bucket-no-public-acl
    title: Ensure OSS buckets do not use a public-read or public-read-write ACL
    impact: 90
    docs:
      desc: |
        This check ensures that no Object Storage Service (OSS) bucket is configured with a `public-read` or `public-read-write` access control list (ACL). A public ACL lets anonymous callers on the internet list and download bucket objects, and `public-read-write` additionally lets them upload and overwrite objects.

        **Why this matters**

        - **Direct data exposure:** A `public-read` bucket serves every object to anyone who knows or guesses the bucket URL, with no authentication.
        - **Unauthenticated writes:** A `public-read-write` bucket lets anyone add, replace, or delete objects, enabling data tampering, defacement, and hosting of malicious content on your namespace.
        - **Broad blast radius:** Bucket-level ACLs apply to the whole bucket, so a single misconfiguration can expose large volumes of data at once.

        **Risk mitigation**

        - **Keeps data private by default:** A private ACL requires authenticated, authorized requests for every object.
        - **Removes anonymous write paths:** Denying public write blocks tampering and abuse of your storage namespace.
      audit: |
        ### Audit via Console

        1. Sign in to the [OSS console](https://oss.console.aliyun.com/).
        2. Open each bucket and go to **Access Control** > **Access Control List (ACL)**.
        3. Confirm the bucket ACL is set to **Private**.

        A passing bucket shows a **Private** ACL. A failing bucket shows **Public Read** or **Public Read/Write**.

        ### Audit via CLI

        1. Inspect the ACL of each bucket with the `aliyun` CLI:

        ```bash
        aliyun oss stat oss://<bucket-name>
        ```

        A passing bucket returns a `Grant` of `private`. A failing bucket returns `public-read` or `public-read-write`.
      remediation:
        - id: console
          desc: |
            To make an OSS bucket private in the console:

            1. Sign in to the [OSS console](https://oss.console.aliyun.com/).
            2. Open the bucket and go to **Access Control** > **Access Control List (ACL)**.
            3. Set the ACL to **Private** and save.
        - id: cli
          desc: |
            To set an OSS bucket ACL to private with the `aliyun` CLI:

            ```bash
            aliyun oss set-acl oss://<bucket-name> private -b
            ```
        - id: terraform
          desc: |
            To enforce a private ACL on an OSS bucket in Terraform, use the `alicloud_oss_bucket_acl` resource:

            ```hcl
            resource "alicloud_oss_bucket" "example" {
              bucket = "example-bucket"
            }

            resource "alicloud_oss_bucket_acl" "example" {
              bucket = alicloud_oss_bucket.example.bucket
              acl    = "private"
            }
            ```
    variants:
      - uid: mondoo-alibaba-security-oss-bucket-no-public-acl-alicloud
      - uid: mondoo-alibaba-security-oss-bucket-no-public-acl-terraform-hcl
      - uid: mondoo-alibaba-security-oss-bucket-no-public-acl-terraform-plan
      - uid: mondoo-alibaba-security-oss-bucket-no-public-acl-terraform-state
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: false
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-ai-100-1: false
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-22
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-22
      compliance/pci-dss-4: pcidss-requirement-7
      compliance/soc2-2017: soc2-control-cc6-1-7
