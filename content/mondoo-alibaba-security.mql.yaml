  # Terraform variants assert the TLS (ssl_action) portion only; MongoDB audit logging is
  # configured through the separate alicloud_mongodb_audit_policy resource, not an attribute
  # of alicloud_mongodb_instance.
  - uid: mondoo-alibaba-security-mongodb-instance-ssl-and-audit
    title: Ensure MongoDB instances enforce TLS and enable audit logging
    impact: 80
    docs:
      desc: |
        This check ensures that every ApsaraDB for MongoDB instance encrypts client connections with TLS and has the audit log feature enabled. Traffic to a MongoDB instance without TLS travels in plaintext, and without audit logging there is no record of the operations executed against the database to support detection and investigation.

        **Why this matters**

        - **Plaintext traffic is interceptable:** Without TLS, credentials and query results can be read or tampered with by anything able to observe the connection path.
        - **No audit trail blinds detection:** Audit logs record the queries and administrative actions run against the database; without them, malicious access and data exfiltration leave no trace.
        - **Accountability:** Audit logging attributes database operations to a source, which is essential for incident response and compliance evidence.

        **Risk mitigation**

        - **Protects data on the wire:** TLS prevents eavesdropping and manipulation of MongoDB traffic in transit.
        - **Enables detection and forensics:** An audit trail lets defenders identify abnormal access and reconstruct what an attacker did.
      audit: |
        ### Audit via Console

        1. Sign in to the [ApsaraDB for MongoDB console](https://mongodb.console.aliyun.com/).
        2. Open each instance and confirm **SSL/TLS** is enabled under **Data Security** > **SSL**.
        3. Confirm the **Audit Log** feature is enabled under **Data Security** > **Audit Log**.

        A passing instance shows TLS enabled and audit logging enabled. A failing instance shows either control disabled.

        ### Audit via CLI

        1. Inspect the TLS and audit-log status of each instance with the `aliyun` CLI:

        ```bash
        aliyun dds DescribeDBInstanceSSL --DBInstanceId <instance-id>
        aliyun dds DescribeAuditPolicy --DBInstanceId <instance-id>
        ```

        A passing instance returns `SSLStatus` as `Open` and `AuditStatus` as `enable`. A failing instance returns TLS closed or audit logging disabled.
      remediation:
        - id: console
          desc: |
            To enforce TLS and audit logging on a MongoDB instance in the console:

            1. Sign in to the [ApsaraDB for MongoDB console](https://mongodb.console.aliyun.com/).
            2. Open the instance and enable **SSL/TLS** under **Data Security** > **SSL**.
            3. Enable the **Audit Log** feature under **Data Security** > **Audit Log**.
        - id: cli
          desc: |
            To enable TLS and audit logging with the `aliyun` CLI:

            ```bash
            aliyun dds ModifyDBInstanceSSL --DBInstanceId <instance-id> --SSLAction Open
            aliyun dds ModifyAuditPolicy --DBInstanceId <instance-id> --AuditStatus enable
            ```
        - id: terraform
          desc: |
            To enforce TLS on a MongoDB instance in Terraform, set `ssl_action` to `Open`, and enable audit logging through the `alicloud_mongodb_audit_policy` resource:

            ```hcl
            resource "alicloud_mongodb_instance" "example" {
              engine_version      = "4.4"
              db_instance_class   = "dds.mongo.mid"
              db_instance_storage = 10
              vswitch_id          = alicloud_vswitch.example.id

              ssl_action = "Open"
            }

            resource "alicloud_mongodb_audit_policy" "example" {
              db_instance_id = alicloud_mongodb_instance.example.id
              audit_status   = "enable"
            }
            ```
    variants:
