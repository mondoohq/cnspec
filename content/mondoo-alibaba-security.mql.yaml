    filters: asset.platform == "alicloud"
    mql: |
      alicloud.redis.instances.all(sslEnabled == true)
      alicloud.redis.instances.all(networkType == "VPC")
  - uid: mondoo-alibaba-security-redis-instance-ssl-and-private-terraform-hcl
    filters: |
      asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "alicloud_kvstore_instance")
    mql: |
      terraform.resources("alicloud_kvstore_instance").all(arguments["ssl_enable"] == "Enable")
  - uid: mondoo-alibaba-security-redis-instance-ssl-and-private-terraform-plan
    filters: |
      asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "alicloud_kvstore_instance")
    mql: |
      terraform.plan.resourceChanges.where(type == "alicloud_kvstore_instance").all(
        change.after["ssl_enable"] == "Enable"
      )
  - uid: mondoo-alibaba-security-redis-instance-ssl-and-private-terraform-state
