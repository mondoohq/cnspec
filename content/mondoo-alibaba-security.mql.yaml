              flow_log_name  = "example-flow-log"
              resource_type  = "VPC"
              resource_id    = alicloud_vpc.example.id
              traffic_type   = "All"
              project_name   = "example-sls-project"
              log_store_name = "example-logstore"
              status         = "Active"
            }
            ```
