  - uid: mondoo-alibaba-security-ecs-security-group-no-public-rdp
    title: Ensure security groups do not allow public ingress to RDP (port 3389)
    impact: 85
    docs:
      desc: |
        This check ensures that no security group permits inbound RDP (TCP port 3389) from the entire internet (`0.0.0.0/0`). World-open RDP is a primary vector for ransomware and unauthorized remote desktop access.

        **Why this matters**

        - **RDP is heavily targeted:** Exposed RDP is routinely scanned and brute-forced, and is a common ransomware entry point.
        - **Broad blast radius:** A single open rule exposes every instance the security group protects.
        - **Bypasses controlled access:** World-open RDP defeats VPN-gated or bastion-mediated administration.

        **Risk mitigation**

        - **Removes a standing attack surface:** Restricting source ranges eliminates untrusted inbound RDP.
        - **Forces controlled access:** Remote desktop access is funneled through known networks.
      audit: |
        ### Audit via Console

        1. Sign in to the [ECS console](https://ecs.console.aliyun.com/).
        2. Navigate to **Network & Security** > **Security Groups**.
        3. Open each security group's **Inbound** rules and look for rules allowing `0.0.0.0/0` to TCP port 3389.

        A passing group has no inbound rule allowing `0.0.0.0/0` to port 3389. A failing group has one.

        ### Audit via CLI

        1. Inspect a security group's inbound rules:

        ```bash
        aliyun ecs DescribeSecurityGroupAttribute --SecurityGroupId <sg-id> --Direction ingress
        ```

        A passing group returns no `Accept` permission with `SourceCidrIp` `0.0.0.0/0` covering port 3389. A failing group returns one.
      remediation:
        - id: console
          desc: |
            To remove world-open RDP access in the ECS console:

            1. Sign in to the [ECS console](https://ecs.console.aliyun.com/).
            2. Open the security group and its **Inbound** rules.
            3. Delete or edit the rule allowing `0.0.0.0/0` to port 3389, restricting the source to a trusted CIDR or bastion address.
        - id: cli
          desc: |
            To revoke a world-open RDP rule with the `aliyun` CLI:

            ```bash
            aliyun ecs RevokeSecurityGroup --SecurityGroupId <sg-id> \
              --IpProtocol tcp --PortRange 3389/3389 --SourceCidrIp 0.0.0.0/0
            ```
        - id: terraform
          desc: |
            To scope RDP access in Terraform, set a trusted `cidr_ip` instead of `0.0.0.0/0`:

            ```hcl
            resource "alicloud_security_group_rule" "rdp" {
              type              = "ingress"
              ip_protocol       = "tcp"
              port_range        = "3389/3389"
              security_group_id = alicloud_security_group.example.id
              cidr_ip           = "10.0.0.0/8"
            }
            ```
