      )
  - uid: mondoo-alibaba-security-cs-cluster-no-public-apiserver-terraform-plan
    filters: |
      asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "alicloud_cs_managed_kubernetes" || type == "alicloud_cs_kubernetes")
    mql: |
