        arguments["max_login_attempts"] != empty &&
        arguments["max_login_attempts"] > 0 &&
        arguments["max_login_attempts"] <= 5
      )
  - uid: mondoo-alibaba-security-ram-password-policy-max-login-attempts-terraform-plan
    filters: |
      asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "alicloud_ram_account_password_policy")
    mql: |
      terraform.plan.resourceChanges.where(type == "alicloud_ram_account_password_policy").all(
        change.after["max_login_attempts"] != empty &&
        change.after["max_login_attempts"] > 0 &&
        change.after["max_login_attempts"] <= 5
      )
  - uid: mondoo-alibaba-security-ram-password-policy-max-login-attempts-terraform-state
