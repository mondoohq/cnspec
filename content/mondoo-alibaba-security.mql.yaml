  # ---------------------------------------------------------------------------
  # Security groups
  # Port matching uses exact single-port and all-port ranges rather than numeric
  # range containment, because parse.int does not compile inside variant queries
  # in this engine. Broad custom ranges that include an admin port are not flagged.
  # ---------------------------------------------------------------------------
  - uid: mondoo-alibaba-security-ecs-security-group-no-public-ssh
    title: Ensure security groups do not allow public ingress to SSH (port 22)
    impact: 85
    docs:
      desc: |
        This check ensures that no security group permits inbound SSH (TCP port 22) from the entire internet (`0.0.0.0/0`). SSH exposed to the world invites brute-force and credential-stuffing attacks against every instance the group protects.

        **Why this matters**

        - **SSH is a top attack target:** Internet-facing SSH is continuously scanned and brute-forced by automated tooling.
        - **Broad blast radius:** A security group rule applies to every instance it is attached to, so one open rule exposes many hosts.
        - **Bypasses bastions:** World-open SSH defeats the purpose of jump hosts and VPN-gated administrative access.

        **Risk mitigation**

        - **Removes a standing attack surface:** Restricting source ranges eliminates untrusted inbound SSH.
        - **Forces controlled access:** Administrative access is funneled through known networks or bastions.
      audit: |
        ### Audit via Console

        1. Sign in to the [ECS console](https://ecs.console.aliyun.com/).
        2. Navigate to **Network & Security** > **Security Groups**.
        3. Open each security group's **Inbound** rules and look for rules allowing `0.0.0.0/0` to TCP port 22.

        A passing group has no inbound rule allowing `0.0.0.0/0` to port 22. A failing group has one.

        ### Audit via CLI

        1. Inspect a security group's inbound rules:

        ```bash
        aliyun ecs DescribeSecurityGroupAttribute --SecurityGroupId <sg-id> --Direction ingress
        ```

        A passing group returns no `Accept` permission with `SourceCidrIp` `0.0.0.0/0` covering port 22. A failing group returns one.
      remediation:
        - id: console
          desc: |
            To remove world-open SSH access in the ECS console:

            1. Sign in to the [ECS console](https://ecs.console.aliyun.com/).
            2. Open the security group and its **Inbound** rules.
            3. Delete or edit the rule allowing `0.0.0.0/0` to port 22, restricting the source to a trusted CIDR or bastion address.
        - id: cli
          desc: |
            To revoke a world-open SSH rule with the `aliyun` CLI:

            ```bash
            aliyun ecs RevokeSecurityGroup --SecurityGroupId <sg-id> \
