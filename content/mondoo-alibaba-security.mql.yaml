  - uid: mondoo-alibaba-security-oss-bucket-logging-enabled
    title: Ensure OSS buckets have access logging enabled
    impact: 70
    docs:
      desc: |
        This check ensures that every Object Storage Service (OSS) bucket has access logging enabled so that requests against the bucket are recorded to a target bucket. Without access logs there is no record of who read, wrote, or deleted objects, which undermines detection and forensic investigation.

        **Why this matters**

        - **Detection and investigation:** Access logs are the primary evidence for identifying unauthorized access, data exfiltration, and abuse.
        - **Accountability:** Recorded requests attribute actions to callers, supporting incident response and audits.
        - **Compliance expectation:** Many regimes require that access to data stores is logged and retained.

        **Risk mitigation**

        - **Enables timely detection:** Continuous logging surfaces anomalous access patterns for review.
        - **Supports forensics:** Retained request logs let responders reconstruct what happened during an incident.
      audit: |
        ### Audit via Console

        1. Sign in to the [OSS console](https://oss.console.aliyun.com/).
        2. Open each bucket and go to **Log Management** > **Real-time Log Query** or **Logging**.
        3. Confirm access logging is enabled with a target bucket configured.

        A passing bucket shows logging enabled with a log target. A failing bucket shows logging disabled.

        ### Audit via CLI

        1. Inspect the logging configuration of each bucket with the `aliyun` CLI:

        ```bash
        aliyun oss logging --method get oss://<bucket-name>
        ```

        A passing bucket returns a `LoggingEnabled` block with a `TargetBucket`. A failing bucket returns no logging configuration.
      remediation:
        - id: console
          desc: |
            To enable access logging on an OSS bucket in the console:

            1. Sign in to the [OSS console](https://oss.console.aliyun.com/).
            2. Open the bucket and go to **Log Management** > **Logging**.
            3. Enable logging, choose a target bucket and prefix for the log objects, and save.
        - id: cli
          desc: |
            To enable access logging on an OSS bucket with the `aliyun` CLI:

            ```bash
            aliyun oss logging --method put oss://<bucket-name> oss://<log-bucket-name>/log/
            ```
        - id: terraform
          desc: |
            To enable access logging on an OSS bucket in Terraform, declare a `logging` block:

            ```hcl
            resource "alicloud_oss_bucket" "example" {
              bucket = "example-bucket"

              logging {
                target_bucket = alicloud_oss_bucket.log.id
                target_prefix  = "log/"
              }
            }
            ```
    variants:
      - uid: mondoo-alibaba-security-oss-bucket-logging-enabled-alicloud
      - uid: mondoo-alibaba-security-oss-bucket-logging-enabled-terraform-hcl
      - uid: mondoo-alibaba-security-oss-bucket-logging-enabled-terraform-plan
      - uid: mondoo-alibaba-security-oss-bucket-logging-enabled-terraform-state
    tags:
