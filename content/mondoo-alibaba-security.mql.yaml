  # No Terraform variants: the OSS bucket policy is an opaque JSON document (the inline policy argument is deprecated in favor of the alicloud_oss_bucket_policy resource), and reliably parsing embedded policy JSON out of HCL/plan/state to evaluate Principal grants is fragile; this control is evaluated against the resolved runtime policy only.
  - uid: mondoo-alibaba-security-oss-bucket-policy-no-anonymous
    title: Ensure OSS bucket policies do not grant anonymous access
    impact: 90
    docs:
      desc: |
        This check ensures that no Object Storage Service (OSS) bucket policy grants access to anonymous principals. In an OSS bucket policy an anonymous grant is expressed as a `Principal` of `*`, which allows unauthenticated callers on the internet to perform the granted actions regardless of the bucket ACL.

        **Why this matters**

        - **Bypasses authentication:** A statement that allows `Principal` `*` grants the listed actions to anyone, with no credentials required.
        - **Easy to overlook:** Bucket policies are separate from the bucket ACL, so a private ACL can be silently undermined by a permissive policy.
        - **High-value target:** Object storage frequently holds backups, logs, and application data that are attractive to attackers when reachable anonymously.

        **Risk mitigation**

        - **Requires authenticated access:** Removing anonymous grants forces every request to present valid credentials.
        - **Closes a hidden exposure path:** Auditing policies alongside ACLs eliminates a common blind spot for public data access.
      audit: |
        ### Audit via Console

        1. Sign in to the [OSS console](https://oss.console.aliyun.com/).
        2. Open each bucket and go to **Access Control** > **Bucket Policy**.
        3. Review each statement and confirm none grants a `Principal` of `*`.

        A passing bucket has no policy or no statement with `Principal` `*`. A failing bucket has a statement granting `*`.

        ### Audit via CLI

        1. Retrieve the policy of each bucket with the `aliyun` CLI:

        ```bash
        aliyun oss bucket-policy --method get oss://<bucket-name>
        ```

        A passing bucket returns no policy or no `"Principal": ["*"]` grant. A failing bucket returns a statement whose `Principal` is `*`.
      remediation:
        - id: console
          desc: |
            To remove an anonymous grant from an OSS bucket policy in the console:

            1. Sign in to the [OSS console](https://oss.console.aliyun.com/).
            2. Open the bucket and go to **Access Control** > **Bucket Policy**.
            3. Edit or delete any statement whose `Principal` is `*`, restricting access to specific RAM identities, and save.
        - id: cli
          desc: |
            To replace a bucket policy with one that names specific principals instead of `*` with the `aliyun` CLI:

            ```bash
            aliyun oss bucket-policy --method put oss://<bucket-name> ./bucket-policy.json
            ```
        # No Terraform remediation: the bucket policy is an opaque JSON document and this control is not evaluated against Terraform sources.
    variants:
      - uid: mondoo-alibaba-security-oss-bucket-policy-no-anonymous-alicloud
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: false
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-ai-100-1: false
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-22
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-22
      compliance/pci-dss-4: pcidss-requirement-7
      compliance/soc2-2017: soc2-control-cc6-1-7
      compliance/vda-isa-5: vda-isa-5-4-1-2
  - uid: mondoo-alibaba-security-oss-bucket-policy-no-anonymous-alicloud
    filters: asset.platform == "alicloud"
    mql: |
      alicloud.oss.buckets.all(
        policy == empty ||
        parse.json(content: policy).params["Statement"].where(_["Effect"] == "Allow").all(
          _["Principal"] == empty || _["Principal"].contains("*") == false
        )
      )

  - uid: mondoo-alibaba-security-oss-bucket-kms-encryption
    title: Ensure OSS bucket encryption uses a KMS customer master key
    impact: 70
    docs:
      desc: |
        This check ensures that every Object Storage Service (OSS) bucket's default server-side encryption uses the KMS algorithm backed by a customer master key (CMK), rather than the built-in AES-256 keys. A KMS CMK gives you control over key rotation, access policy, and disable/delete operations, and produces an auditable trail of key usage.

        **Why this matters**

        - **Customer-controlled keys:** A KMS CMK lets you govern who can use the key and revoke access, which the service-managed AES-256 keys do not allow.
        - **Auditability:** KMS records every encrypt and decrypt operation, supporting investigation and compliance evidence.
        - **Stronger separation of duties:** Key administration is separated from data access, limiting what a single compromised identity can reach.

        **Risk mitigation**

        - **Revocable access:** Disabling the CMK renders the bucket's objects unreadable, providing a fast containment control.
        - **Governed key lifecycle:** Rotation and access policies for the CMK are managed centrally in KMS.
      audit: |
        ### Audit via Console

        1. Sign in to the [OSS console](https://oss.console.aliyun.com/).
        2. Open each bucket and go to **Content Security** > **Server-side Encryption**.
        3. Confirm the encryption method is **KMS** and a specific CMK is selected.

        A passing bucket shows **KMS** with a CMK. A failing bucket shows **None** or **AES-256**.

        ### Audit via CLI

        1. Inspect the encryption configuration of each bucket with the `aliyun` CLI:

        ```bash
        aliyun oss bucket-encryption --method get oss://<bucket-name>
        ```

        A passing bucket returns an `SSEAlgorithm` of `KMS` with a `KMSMasterKeyID`. A failing bucket returns no rule or an `SSEAlgorithm` of `AES256`.
      remediation:
        - id: console
          desc: |
            To enable KMS encryption on an OSS bucket in the console:

            1. Sign in to the [OSS console](https://oss.console.aliyun.com/).
            2. Open the bucket and go to **Content Security** > **Server-side Encryption**.
            3. Set the encryption method to **KMS**, select a customer master key, and save.
        - id: cli
          desc: |
            To enable default KMS encryption with a specific CMK using the `aliyun` CLI:

            ```bash
            aliyun oss bucket-encryption --method put oss://<bucket-name> --sse-algorithm KMS --kms-masterkey-id <cmk-id>
            ```
        - id: terraform
          desc: |
            To enforce KMS default encryption on an OSS bucket in Terraform, declare a `server_side_encryption_rule` block with a KMS master key:

            ```hcl
            resource "alicloud_oss_bucket" "example" {
              bucket = "example-bucket"

              server_side_encryption_rule {
                sse_algorithm     = "KMS"
                kms_master_key_id = alicloud_kms_key.example.id
              }
            }
            ```
    variants:
      - uid: mondoo-alibaba-security-oss-bucket-kms-encryption-alicloud
      - uid: mondoo-alibaba-security-oss-bucket-kms-encryption-terraform-hcl
      - uid: mondoo-alibaba-security-oss-bucket-kms-encryption-terraform-plan
      - uid: mondoo-alibaba-security-oss-bucket-kms-encryption-terraform-state
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-ai-100-1: false
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-12
      compliance/pci-dss-4: pcidss-requirement-3
      compliance/soc2-2017: soc2-control-cc6-1-11
      compliance/vda-isa-5: vda-isa-5-5-1-1
