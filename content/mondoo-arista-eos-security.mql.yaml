policies:
  - uid: mondoo-arista-eos-security
    name: Mondoo Arista EOS Security
    version: 1.2.3
    license: BUSL-1.1
    tags:
      mondoo.com/category: security
      mondoo.com/platform: arista-eos,networkdevice
    require:
      - provider: arista
    authors:
      - name: Mondoo, Inc.
        email: hello@mondoo.com
    summary: Secure Arista EOS switches and routers
    docs:
      desc: |
        The Mondoo Arista EOS Security policy identifies critical misconfigurations on Arista EOS switches and routers that could leave your network infrastructure vulnerable to attackers. This policy helps organizations detect and remediate hardening gaps before they can be exploited, reducing the likelihood of unauthorized device access, traffic interception, lateral movement, and disruption of network services.

        This policy provides security checks across key areas of Arista EOS configuration, uncovering misconfigurations that could put your network fabric at risk:

        - User authentication, password policies, and privilege management
        - AAA configuration and multifactor authentication
        - Secure management protocols and removal of insecure cleartext protocols
        - Interface configuration and VLAN security, including native VLAN protection
        - SNMP hardening
        - NTP time synchronization for accurate logging and audit trails
        - Centralized logging and remote log collection
        - Console, VTY, and remote access controls with timeouts and ACLs
        - Security banners and session controls
        - BGP route filtering and peer documentation
        - ACL completeness and logging for denied traffic

        Learn more about scanning Arista EOS in the [cnspec Arista EOS documentation](https://mondoo.com/docs/cnspec/network/arista).

        Have suggestions for new checks in this policy? Visit our [cnspec repository](https://github.com/mondoohq/cnspec).
    groups:
      - title: User Account Security
        filters: asset.platform == "arista-eos"
        checks:
          - uid: mondoo-arista-eos-security-no-users-without-password
          - uid: mondoo-arista-eos-security-admin-account-exists
          - uid: mondoo-arista-eos-security-users-with-encrypted-passwords
          - uid: mondoo-arista-eos-security-minimum-privilege-enforcement
          - uid: mondoo-arista-eos-security-password-minimum-length
      - title: Authentication and Authorization (AAA)
        filters: asset.platform == "arista-eos"
        checks:
          - uid: mondoo-arista-eos-security-aaa-authentication-enabled
          - uid: mondoo-arista-eos-security-aaa-authorization-console
          - uid: mondoo-arista-eos-security-aaa-accounting-commands
          - uid: mondoo-arista-eos-security-aaa-accounting-exec
          - uid: mondoo-arista-eos-security-aaa-accounting-system
          - uid: mondoo-arista-eos-security-aaa-authentication-failure-logging
          - uid: mondoo-arista-eos-security-multifactor-authentication
      - title: Protocol Security
        filters: asset.platform == "arista-eos"
        checks:
          - uid: mondoo-arista-eos-security-telnet-disabled
          - uid: mondoo-arista-eos-security-http-disabled
          - uid: mondoo-arista-eos-security-https-enabled
          - uid: mondoo-arista-eos-security-ssh-enabled
      - title: SNMP Security
        filters: asset.platform == "arista-eos"
        checks:
          - uid: mondoo-arista-eos-security-snmp-community-strings-configured
          - uid: mondoo-arista-eos-security-snmp-traps-secured
      - title: NTP and Time Configuration
        filters: asset.platform == "arista-eos"
        checks:
          - uid: mondoo-arista-eos-security-ntp-enabled
          - uid: mondoo-arista-eos-security-timezone-configured
          - uid: mondoo-arista-eos-security-ntp-servers-configured
      - title: Logging and Auditing
        filters: asset.platform == "arista-eos"
        checks:
          - uid: mondoo-arista-eos-security-logging-enabled
          - uid: mondoo-arista-eos-security-logging-level-configured
          - uid: mondoo-arista-eos-security-logging-host-configured
          - uid: mondoo-arista-eos-security-logging-buffered-configured
      - title: VLAN Security
        filters: |
          asset.platform == "arista-eos"
          arista.eos.vlans != empty
        checks:
          - uid: mondoo-arista-eos-security-vlan-names-configured
          - uid: mondoo-arista-eos-security-vlan-trunk-native-not-vlan1
          - uid: mondoo-arista-eos-security-unused-vlan1
      - title: Interface Security
        filters: |
          asset.platform == "arista-eos"
          arista.eos.interfaces != empty
        checks:
          - uid: mondoo-arista-eos-security-interface-descriptions
          - uid: mondoo-arista-eos-security-unused-interfaces-disabled
      - title: Access Control and Banners
        filters: asset.platform == "arista-eos"
        checks:
          - uid: mondoo-arista-eos-security-login-banner-configured
          - uid: mondoo-arista-eos-security-motd-banner-configured
          - uid: mondoo-arista-eos-security-exec-timeout-configured
          - uid: mondoo-arista-eos-security-console-timeout-configured
      - title: System Configuration
        filters: asset.platform == "arista-eos"
        checks:
          - uid: mondoo-arista-eos-security-hostname-configured
          - uid: mondoo-arista-eos-security-domain-name-configured
          - uid: mondoo-arista-eos-security-service-password-encryption
      - title: BGP Security
        filters: |
          asset.platform == "arista-eos"
          arista.eos.runningConfig.content.contains("router bgp") == true
        checks:
          - uid: mondoo-arista-eos-security-bgp-peers-inbound-route-map
          - uid: mondoo-arista-eos-security-bgp-peers-outbound-route-map
          - uid: mondoo-arista-eos-security-bgp-peers-descriptions
          - uid: mondoo-arista-eos-security-bgp-peers-established
      - title: ACL Security
        filters: |
          asset.platform == "arista-eos"
          arista.eos.runningConfig.content.contains("ip access-list") == true
        checks:
          - uid: mondoo-arista-eos-security-acl-explicit-deny
          - uid: mondoo-arista-eos-security-acl-deny-logging
    scoring_system: average
queries:
  - uid: mondoo-arista-eos-security-aaa-accounting-commands
    title: Ensure AAA accounting is enabled for commands
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-16
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    mql: |
      arista.eos.runningConfig.content.lines.one(_ == /aaa accounting commands all default start-stop/)
    docs:
      desc: |
        This check verifies that AAA accounting is configured to log all command executions. Command accounting creates a detailed audit trail of every command run on the device, which is essential for security monitoring and compliance.

        **Why this matters**

        Without command accounting enabled, the device has no record of what administrators have done. If command accounting is not configured:

        - There is no forensic evidence of commands executed during a security incident.
        - Compliance requirements from frameworks like DISA STIG, PCI DSS, and HIPAA cannot be met.
        - It becomes impossible to determine who made configuration changes or when they occurred.
        - Accountability for privileged operations is lost, undermining trust in administrative actions.

        Enabling command accounting ensures that all activity is logged and available for audit, investigation, and compliance reporting.
      audit: |
        Verify command accounting from the Arista EOS CLI:

        1. Connect to the switch and enter privileged EXEC mode.
        2. Run `show running-config section aaa accounting` to display the AAA accounting configuration.
        3. Confirm the output includes `aaa accounting commands all default start-stop`.

        If the `aaa accounting commands all default start-stop` line is present, the check passes. If it is absent, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Enter global configuration mode and enable AAA accounting for all commands:

            ```
            configure
            aaa accounting commands all default start-stop logging
            ```

            Configure a syslog server to receive accounting records:

            ```
            logging host <syslog-server-ip>
            ```

            Return to privileged EXEC mode and save the configuration. EOS does not save running-config automatically, so without this step the change is lost on the next reload:

            ```
            end
            write memory
            ```
    refs:
      - url: https://www.arista.com/en/um-eos/eos-section-aaa-authorization-and-accounting
        title: Arista EOS AAA Configuration Guide
  - uid: mondoo-arista-eos-security-aaa-accounting-exec
    title: Ensure AAA accounting is enabled for exec sessions
    impact: 85
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-16
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    mql: |
      arista.eos.runningConfig.content.lines.one(_ == /aaa accounting exec default start-stop/)
    docs:
      desc: |
        This check verifies that AAA accounting logs exec session start and stop events. Exec session accounting records login and logout activity, providing visibility into who accessed the device and for how long.

        **Why this matters**

        Without exec session accounting, the device cannot track user login activity. If session accounting is not enabled:

        - There is no record of when users logged in or out.
        - Unusual access patterns, such as logins at odd hours, go undetected.
        - Compliance and audit reporting requirements cannot be fulfilled.
        - Investigating unauthorized access becomes significantly harder without session data.

        Enabling exec session accounting ensures that all access activity is captured for monitoring, compliance, and forensic purposes.
      audit: |
        Verify exec session accounting from the Arista EOS CLI:

        1. Connect to the switch and enter privileged EXEC mode.
        2. Run `show running-config section aaa accounting` to display the AAA accounting configuration.
        3. Confirm the output includes `aaa accounting exec default start-stop`.

        If the `aaa accounting exec default start-stop` line is present, the check passes. If it is absent, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Enter global configuration mode and enable AAA accounting for exec sessions:

            ```
            configure
            aaa accounting exec default start-stop logging
            ```

            Return to privileged EXEC mode and save the configuration. EOS does not save running-config automatically, so without this step the change is lost on the next reload:

            ```
            end
            write memory
            ```
    refs:
      - url: https://www.arista.com/en/um-eos/eos-section-aaa-authorization-and-accounting
        title: Arista EOS AAA Configuration Guide
  - uid: mondoo-arista-eos-security-aaa-accounting-system
    title: Ensure AAA accounting is enabled for system events
    impact: 85
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-16
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    mql: |
      arista.eos.runningConfig.content.lines.one(_ == /aaa accounting system default start-stop/)
    docs:
      desc: |
        This check verifies that AAA accounting logs system-level events. System event accounting captures critical device activities such as reboots, reloads, and configuration modifications.

        **Why this matters**

        Without system event accounting, important device-level activities go unrecorded. If system accounting is not configured:

        - System-level configuration modifications are not logged.
        - Reboots, reloads, and other significant events cannot be tracked.
        - Comprehensive audit trails required for compliance are incomplete.
        - Unauthorized system changes may go undetected.

        Enabling system event accounting provides the visibility needed to detect unauthorized changes and maintain a complete audit record.
      audit: |
        Verify system event accounting from the Arista EOS CLI:

        1. Connect to the switch and enter privileged EXEC mode.
        2. Run `show running-config section aaa accounting` to display the AAA accounting configuration.
        3. Confirm the output includes `aaa accounting system default start-stop`.

        If the `aaa accounting system default start-stop` line is present, the check passes. If it is absent, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Enter global configuration mode and enable AAA accounting for system events:

            ```
            configure
            aaa accounting system default start-stop logging
            ```

            Return to privileged EXEC mode and save the configuration. EOS does not save running-config automatically, so without this step the change is lost on the next reload:

            ```
            end
            write memory
            ```
    refs:
      - url: https://www.arista.com/en/um-eos/eos-section-aaa-authorization-and-accounting
        title: Arista EOS AAA Configuration Guide
  - uid: mondoo-arista-eos-security-aaa-authentication-enabled
    title: Ensure AAA authentication is enabled
    impact: 95
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-j
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-3
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-3
    mql: |
      arista.eos.runningConfig.content.lines.any(_ == /^aaa authentication/)
    docs:
      desc: |
        This check verifies that Authentication, Authorization, and Accounting (AAA) is configured on the switch. AAA integrates with enterprise identity management systems to provide centralized authentication, access control, and audit logging.

        **Why this matters**

        Without AAA configured, the switch relies solely on local authentication, which is difficult to manage at scale. If AAA is not enabled:

        - The device cannot integrate with centralized identity management systems.
        - There is no enforcement of authentication before granting access to the device.
        - User activity cannot be tracked or audited effectively.
        - Compliance with most security frameworks and regulations cannot be achieved.
        - Managing user accounts individually across multiple devices becomes error-prone and impractical.

        Configuring AAA ensures centralized, scalable authentication with comprehensive audit trails across the network infrastructure.
      audit: |
        Verify AAA authentication from the Arista EOS CLI:

        1. Connect to the switch and enter privileged EXEC mode.
        2. Run `show running-config section aaa` to display the AAA configuration.
        3. Confirm at least one `aaa authentication` line is present.

        If one or more `aaa authentication` lines are configured, the check passes. If no `aaa authentication` lines exist, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Changing the default login method to an AAA server group is the classic way to lock yourself out of the device. Before you begin, confirm a local user with a valid secret already exists so the `local` fallback works, and keep your current session open throughout. After applying the change, verify that you can log in from a second, separate session before you disconnect the first one.

            Enter global configuration mode and configure AAA authentication for console and remote access:

            ```
            configure
            aaa authentication login default group <radius|tacacs+> local
            aaa authentication login console group <radius|tacacs+> local
            ```

            The `local` fallback ensures access is maintained if AAA servers are unreachable.

            Return to privileged EXEC mode and save the configuration. EOS does not save running-config automatically, so without this step the change is lost on the next reload:

            ```
            end
            write memory
            ```
    refs:
      - url: https://www.arista.com/en/um-eos/eos-section-aaa-authorization-and-accounting
        title: Arista EOS AAA Configuration Guide
  - uid: mondoo-arista-eos-security-aaa-authentication-failure-logging
    title: Ensure authentication failures are logged
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-16
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    mql: |
      arista.eos.passwordPolicy.logOnFailure == true
    docs:
      desc: |
        This check verifies that authentication failure events are logged for security monitoring. Logging failed authentication attempts is one of the most important indicators for detecting attacks against the device.

        **Why this matters**

        Without authentication failure logging, the device cannot alert on or record suspicious login activity. If failure logging is not enabled:

        - Brute-force and password-guessing attacks go undetected.
        - Attempts to use stolen or compromised credentials are not recorded.
        - Real-time alerting on suspicious authentication activity is not possible.
        - Forensic evidence of attempted unauthorized access is lost.
        - Compliance requirements for intrusion detection cannot be met.

        Enabling authentication failure logging ensures that all failed login attempts are captured, supporting both proactive security monitoring and incident investigation.
      audit: |
        Verify authentication failure logging from the Arista EOS CLI:

        1. Connect to the switch and enter privileged EXEC mode.
        2. Run `show running-config section aaa` to display the AAA configuration.
        3. Confirm the output includes `aaa authentication policy on-failure log`.

        If the `aaa authentication policy on-failure log` line is present, the check passes. If it is absent, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Enter global configuration mode and enable authentication failure logging:

            ```
            configure
            aaa authentication policy on-failure log
            ```

            Configure log monitoring and alerting for authentication failures:

            ```
            logging host <siem-server-ip>
            ```

            Return to privileged EXEC mode and save the configuration. EOS does not save running-config automatically, so without this step the change is lost on the next reload:

            ```
            end
            write memory
            ```
    refs:
      - url: https://www.arista.com/en/um-eos/eos-section-aaa-authorization-and-accounting
        title: Arista EOS AAA Configuration Guide
  - uid: mondoo-arista-eos-security-aaa-authorization-console
    title: Ensure AAA authorization is enabled for console
    impact: 85
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-2
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-3-1
      compliance/vda-isa-5: vda-isa-5-4-2-1
    mql: |
      arista.eos.runningConfig.content.lines.one(_ == "aaa authorization console")
    docs:
      desc: |
        This check verifies that AAA authorization is enabled for console access. Console authorization controls which commands users can execute after they authenticate, enforcing the principle of least privilege.

        **Why this matters**

        Without AAA authorization for the console, any authenticated user may have unrestricted command access. If console authorization is not enabled:

        - Users can execute commands beyond what their role requires.
        - Separation of duties cannot be enforced.
        - Authorization policies cannot be managed centrally from AAA servers.
        - Authorization decisions are not tracked for compliance reporting.

        Enabling console authorization ensures that users can only perform operations appropriate to their role, reducing the risk of accidental or intentional misuse.
      audit: |
        Verify console authorization from the Arista EOS CLI:

        1. Connect to the switch and enter privileged EXEC mode.
        2. Run `show running-config section aaa` to display the AAA configuration.
        3. Confirm the output includes `aaa authorization console`.

        If the `aaa authorization console` line is present, the check passes. If it is absent, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Enter global configuration mode and enable AAA authorization for console access:

            ```
            configure
            aaa authorization console
            aaa authorization commands all default local
            ```

            Return to privileged EXEC mode and save the configuration. EOS does not save running-config automatically, so without this step the change is lost on the next reload:

            ```
            end
            write memory
            ```
    refs:
      - url: https://www.arista.com/en/um-eos/eos-section-aaa-authorization-and-accounting
        title: Arista EOS AAA Configuration Guide
  - uid: mondoo-arista-eos-security-admin-account-exists
    title: Ensure an admin account of last resort exists
    impact: 85
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-2
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-3-1
      compliance/vda-isa-5: vda-isa-5-4-2-1
    mql: |
      arista.eos.users.one(
        name == "admin" &&
        format == "sha512" &&
        nopassword == false
      )
    docs:
      desc: |
        This check verifies that an admin account with strong password encryption exists as an account of last resort. This account provides emergency access when external authentication systems are unavailable.

        **Why this matters**

        Without a properly configured admin account of last resort, the device may become completely inaccessible during authentication system failures. If this account does not exist:

        - There is no way to access the device when AAA servers are unavailable.
        - Critical maintenance cannot be performed during authentication system outages.
        - Complete lockout from the device could result in extended downtime.
        - Using weak encryption for this account exposes the emergency credential to compromise.

        Maintaining an admin account with SHA-512 encryption ensures reliable emergency access while protecting the credential with the strongest available hashing algorithm.
      audit: |
        Verify the admin account of last resort from the Arista EOS CLI:

        1. Connect to the switch and enter privileged EXEC mode.
        2. Run `show running-config section username` to list configured local users.
        3. Confirm a `username admin` entry exists, uses a `secret sha512` hash, and is not configured with `nopassword`.

        If an `admin` account exists with a SHA-512 secret and no `nopassword` setting, the check passes. If the account is missing, uses a weaker hash, or has `nopassword` set, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Set SHA-512 as the default secret hashing algorithm, then configure the admin account. Do not place a cleartext password after the `sha512` keyword, because that keyword expects an already computed hash and a cleartext value stored there makes the account unusable. Supply the password with the cleartext marker `0` and let EOS hash it.

            Enter global configuration mode, then the `management defaults` sub-mode to set the hash, return to global configuration mode with `exit`, and create the admin account:

            ```
            configure
            management defaults
            secret hash sha512
            exit
            username admin privilege 15 role network-admin secret 0 <strong-password>
            ```

            Verify with `show running-config section username` that the admin entry shows `secret sha512` followed by a hash.

            Return to privileged EXEC mode and save the configuration. EOS does not save running-config automatically, so without this step the change is lost on the next reload:

            ```
            end
            write memory
            ```
    refs:
      - url: https://www.arista.com/en/um-eos/eos-user-security
        title: Arista EOS User Security Configuration Guide
  - uid: mondoo-arista-eos-security-console-timeout-configured
    title: Ensure console timeout is configured
    impact: 75
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-1
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-12
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-10
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-3
    mql: |
      arista.eos.runningConfig.section(name: "management console").content.lines.any(_ == /^\s+idle-timeout [1-9]\d*/)
    docs:
      desc: |
        This check verifies that console sessions have a timeout configured. An idle timeout ensures that inactive console sessions are automatically disconnected, reducing the risk of unauthorized physical access.

        **Why this matters**

        Without a console timeout, an idle session remains open indefinitely. If console timeouts are not configured:

        - Idle console sessions can be accessed by anyone with physical access to the device.
        - An unattended console connection could be used to make unauthorized changes.
        - Physical access security requirements for compliance cannot be met.

        Configuring console timeouts ensures that idle sessions are terminated, limiting the window of opportunity for unauthorized physical access.
      audit: |
        Verify the console session timeout from the Arista EOS CLI:

        1. Connect to the switch and enter privileged EXEC mode.
        2. Run `show running-config section management console` to display the console configuration.
        3. Confirm an `idle-timeout` line with a nonzero value is present under the `management console` block.

        If a nonzero `idle-timeout` is configured, the check passes. If the `idle-timeout` line is absent or set to 0, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Configure an idle timeout for console sessions. EOS expresses the timeout in minutes under the `management console` block. Enter global configuration mode, then the `management console` sub-mode, and set the timeout:

            ```
            configure
            management console
            idle-timeout 10
            ```

            A value of 0 disables the timeout, so choose a nonzero value that matches your security policy.

            Return to privileged EXEC mode and save the configuration. EOS does not save running-config automatically, so without this step the change is lost on the next reload:

            ```
            end
            write memory
            ```
    refs:
      - url: https://www.arista.com/en/um-eos/eos-user-security
        title: Arista EOS User Security Configuration Guide
  - uid: mondoo-arista-eos-security-domain-name-configured
    title: Ensure domain name is configured
    impact: 65
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ccc-06
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-1
      compliance/nist-csf-2: nist-csf-2-pr-ps-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-2
      compliance/pci-dss-4: pcidss-requirement-2-2-1
      compliance/soc2-2017: soc2-control-cc7-1-1
      compliance/vda-isa-5: vda-isa-5-5-2-1
    mql: |
      arista.eos.fqdn != arista.eos.hostname
      arista.eos.fqdn.contains(".") == true
    docs:
      desc: |
        This check verifies that a domain name is configured for the device. A domain name is required for generating a fully qualified domain name (FQDN), which is used by several security-critical features.

        **Why this matters**

        Without a domain name configured, the device cannot generate an FQDN and several important features are affected. If the domain name is not set:

        - SSH RSA/DSA key generation may fail or produce incomplete keys.
        - SSL/TLS certificate creation requires an FQDN and will not work correctly.
        - The device cannot be properly registered in DNS.
        - Identification of the device in logs and management systems is less reliable.

        Configuring a domain name ensures that the device can fully participate in secured communications and is properly identifiable across the network.
      audit: |
        Verify the domain name from the Arista EOS CLI:

        1. Connect to the switch and enter privileged EXEC mode.
        2. Run `show hostname` to display the configured hostname and fully qualified domain name.
        3. Confirm the FQDN differs from the bare hostname and contains a domain suffix.

        If the FQDN includes a domain suffix and is not identical to the hostname, the check passes. If no domain name is set, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Enter global configuration mode and configure the DNS domain name:

            ```
            configure
            dns domain <your-domain.com>
            ```

            Verify with `show hostname` that the fully qualified domain name now includes the domain suffix.

            Return to privileged EXEC mode and save the configuration. EOS does not save running-config automatically, so without this step the change is lost on the next reload:

            ```
            end
            write memory
            ```
    refs:
      - url: https://www.arista.com/en/um-eos/eos-system-configuration
        title: Arista EOS System Configuration Guide
  - uid: mondoo-arista-eos-security-exec-timeout-configured
    title: Ensure exec timeout is configured
    impact: 75
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-1
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-12
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-10
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-3
    mql: |
      arista.eos.sshSettings.idleTimeout > 0
    docs:
      desc: |
        This check verifies that an SSH idle timeout is configured to automatically disconnect inactive remote management sessions. An SSH idle timeout ensures that forgotten or unattended sessions are terminated before they can be exploited.

        **Why this matters**

        Without an SSH idle timeout, inactive remote management sessions remain open indefinitely. If the SSH idle timeout is not configured:

        - Forgotten sessions can be accessed by unauthorized users who gain access to the terminal.
        - Unattended sessions on shared workstations pose a significant security risk.
        - Security framework requirements for session management cannot be met.
        - Connection resources remain consumed by idle sessions, potentially blocking legitimate access.

        Configuring an SSH idle timeout ensures that inactive sessions are automatically closed, reducing the attack surface and freeing resources for active users.
      audit: |
        Verify the remote session idle timeout from the Arista EOS CLI:

        1. Connect to the switch and enter privileged EXEC mode.
        2. Run `show management ssh` to display the SSH service configuration.
        3. Confirm the idle timeout is set to a nonzero value.

        If a nonzero idle timeout is configured for the SSH service, the check passes. If the idle timeout is 0, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Configure an SSH idle timeout for remote management sessions. EOS expresses the timeout in minutes under the `management ssh` block. Enter global configuration mode, then the `management ssh` sub-mode, and set the timeout:

            ```
            configure
            management ssh
            idle-timeout 10
            ```

            A value of 0 disables the timeout, so choose a nonzero value that matches your security policy.

            Return to privileged EXEC mode and save the configuration. EOS does not save running-config automatically, so without this step the change is lost on the next reload:

            ```
            end
            write memory
            ```
    refs:
      - url: https://www.arista.com/en/um-eos/eos-user-security
        title: Arista EOS User Security Configuration Guide
  - uid: mondoo-arista-eos-security-hostname-configured
    title: Ensure hostname is configured
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    mql: |
      arista.eos.hostname != ""
      arista.eos.hostname.downcase != "switch"
      arista.eos.hostname.downcase != "arista"
      arista.eos.hostname.downcase != "localhost"
    docs:
      desc: |
        This check verifies that a unique, descriptive hostname is configured. A meaningful hostname is essential for identifying the device in logs, alerts, and management systems.

        **Why this matters**

        Without a unique hostname, the device uses a generic default name that makes it difficult to manage effectively. If the hostname is not properly configured:

        - The device cannot be clearly identified in logs or management platforms.
        - Log correlation and analysis across multiple devices becomes unreliable.
        - Network topology documentation is incomplete or ambiguous.
        - Security standards requiring unique device identification cannot be met.

        Setting a descriptive hostname that includes location, function, or other identifying information ensures the device is easily recognizable across all operational and security workflows.
      audit: |
        Verify the hostname from the Arista EOS CLI:

        1. Connect to the switch and enter privileged EXEC mode.
        2. Run `show hostname` to display the configured hostname.
        3. Confirm the hostname is set and is not a generic default such as `localhost`, `switch`, or `arista`.

        If a unique, descriptive hostname is configured, the check passes. If the hostname is empty or left at a generic default, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Enter global configuration mode and configure a descriptive, unique hostname:

            ```
            configure
            hostname <unique-descriptive-name>
            ```

            Use naming conventions that include location, function, or other identifying information.

            Return to privileged EXEC mode and save the configuration. EOS does not save running-config automatically, so without this step the change is lost on the next reload:

            ```
            end
            write memory
            ```
    refs:
      - url: https://www.arista.com/en/um-eos/eos-system-configuration
        title: Arista EOS System Configuration Guide
  - uid: mondoo-arista-eos-security-http-disabled
    title: Ensure HTTP API is disabled
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    mql: |
      arista.eos.eapi.httpServerConfigured == false
    docs:
      desc: |
        This check verifies that the insecure HTTP protocol is disabled for the management API. HTTP transmits all data in clear text, making it unsuitable for device management.

        **Why this matters**

        The management API provides powerful control over the device, and using HTTP exposes that access to interception. If HTTP is not disabled:

        - All API calls and credentials are transmitted in clear text and can be captured by anyone on the network.
        - Authentication tokens and passwords are vulnerable to interception.
        - Active sessions can be hijacked by attackers who observe the unencrypted traffic.
        - Intercepted credentials can be used to execute arbitrary API commands against the device.
        - Security standards requiring encrypted management interfaces cannot be met.

        Disabling HTTP and using only HTTPS ensures that all management API communications are encrypted and protected from eavesdropping and tampering.
      audit: |
        Verify the management API protocol from the Arista EOS CLI:

        1. Connect to the switch and enter privileged EXEC mode.
        2. Run `show running-config section management api http-commands` to display the management API configuration.
        3. Confirm there is no `protocol http` line enabling the cleartext HTTP listener.

        If the management API has no `protocol http` line, the check passes. If `protocol http` is configured, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Enable HTTPS for the management API first, then disable HTTP. Commands take effect immediately, so removing the HTTP listener before HTTPS is running can cut off any management session or automation that currently uses HTTP. Enter global configuration mode, then the `management api http-commands` sub-mode, and adjust the protocols:

            ```
            configure
            management api http-commands
            protocol https
            no protocol http
            ```

            Verify with `show management api http-commands` that the HTTPS server is running before closing your session.

            Return to privileged EXEC mode and save the configuration. EOS does not save running-config automatically, so without this step the change is lost on the next reload:

            ```
            end
            write memory
            ```
    refs:
      - url: https://www.arista.com/en/um-eos/eos-management-api
        title: Arista EOS Management API Configuration Guide
  - uid: mondoo-arista-eos-security-https-enabled
    title: Ensure HTTPS is enabled for management API
    impact: 85
    filters: arista.eos.runningConfig.content.contains("management api http-commands") == true
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    mql: |
      arista.eos.eapi.httpsServerConfigured == true
    docs:
      desc: |
        This check verifies that HTTPS is enabled for secure API access. HTTPS encrypts all management API traffic using TLS, protecting credentials and data from interception.

        **Why this matters**

        Without HTTPS enabled, the management API either operates over insecure HTTP or is not available at all. If HTTPS is not configured:

        - Credentials and data exchanged with the API are not protected by encryption.
        - The identity of the device cannot be validated through server certificates.
        - API communications are vulnerable to tampering by a man-in-the-middle attacker.
        - Security standards requiring encrypted management interfaces cannot be satisfied.

        Enabling HTTPS ensures that all API access is encrypted, authenticated, and integrity-protected, meeting both security best practices and compliance requirements.
      audit: |
        Verify the management API HTTPS listener from the Arista EOS CLI:

        1. Connect to the switch and enter privileged EXEC mode.
        2. Run `show running-config section management api http-commands` to display the management API configuration.
        3. Confirm the output includes a `protocol https` line.

        If the management API has `protocol https` configured, the check passes. If it is absent, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Enable HTTPS for the management API. Enter global configuration mode, then the `management api http-commands` sub-mode, and enable the protocol:

            ```
            configure
            management api http-commands
            protocol https
            ```

            Return to privileged EXEC mode and save the configuration. EOS does not save running-config automatically, so without this step the change is lost on the next reload:

            ```
            end
            write memory
            ```
    refs:
      - url: https://www.arista.com/en/um-eos/eos-management-api
        title: Arista EOS Management API Configuration Guide
  - uid: mondoo-arista-eos-security-interface-descriptions
    title: Ensure interfaces have descriptions configured
    impact: 60
    filters: arista.eos.interfaces != empty
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    mql: |
      arista.eos.interfaces.where(name != /^Management/).all(
        description != "" || interfaceStatus == "disabled"
      )
    docs:
      desc: |
        This check verifies that active interfaces have descriptions configured. Interface descriptions document the purpose and connected endpoint of each port, which is essential for both security and operational clarity.

        **Why this matters**

        Without interface descriptions, the purpose and expected connections for each port are undocumented. If descriptions are not configured:

        - It is difficult to determine whether a connection on a given port is authorized.
        - Configuration errors are more likely when the purpose of an interface is unclear.
        - Security audits and compliance reviews take longer and are less effective.
        - Troubleshooting network issues is slower without knowing what each interface connects to.

        Adding descriptions to all active interfaces ensures that the network configuration is self-documenting, supporting faster troubleshooting, better change management, and more effective security reviews.
      audit: |
        Verify interface descriptions from the Arista EOS CLI:

        1. Connect to the switch and enter privileged EXEC mode.
        2. Run `show interfaces description` to list every interface with its description and status.
        3. Confirm each non-management interface has a description, or is administratively disabled.

        If every active non-management interface has a description, the check passes. If any active interface has an empty description, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Configure descriptive names for all interfaces. Enter global configuration mode, then the interface sub-mode for each port, and set its description:

            ```
            configure
            interface <interface-name>
            description <purpose and connection details>
            ```

            For example: `description Uplink to Core Switch 1 Gi0/1`

            Return to privileged EXEC mode and save the configuration. EOS does not save running-config automatically, so without this step the change is lost on the next reload:

            ```
            end
            write memory
            ```
    refs:
      - url: https://www.arista.com/en/um-eos/eos-interfaces
        title: Arista EOS Interface Configuration Guide
  - uid: mondoo-arista-eos-security-logging-buffered-configured
    title: Ensure buffered logging is configured
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    mql: |
      arista.eos.runningConfig.content.lines.one(_ == /^logging buffered/)
    docs:
      desc: |
        This check verifies that local buffered logging is configured. Buffered logging stores log messages in the device's memory, providing immediate local access to recent events.

        **Why this matters**

        Without buffered logging, log messages may only be available on the console or at a remote syslog server. If buffered logging is not configured:

        - Logs are not available locally for quick troubleshooting during an incident.
        - If remote logging fails, there is no local backup of recent events.
        - Log handling may be less efficient without a dedicated buffer.

        Configuring buffered logging ensures that recent log messages are always available on the device for rapid diagnosis, while also providing a safety net if remote logging is temporarily unavailable.
      audit: |
        Verify buffered logging from the Arista EOS CLI:

        1. Connect to the switch and enter privileged EXEC mode.
        2. Run `show running-config | include logging buffered` to display the buffered logging configuration.
        3. Confirm a `logging buffered` line is present.

        If a `logging buffered` line is configured, the check passes. If it is absent, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Enter global configuration mode and configure buffered logging with an appropriate size:

            ```
            configure
            logging buffered 100000 informational
            ```

            Return to privileged EXEC mode and save the configuration. EOS does not save running-config automatically, so without this step the change is lost on the next reload:

            ```
            end
            write memory
            ```
    refs:
      - url: https://www.arista.com/en/um-eos/eos-logging
        title: Arista EOS Logging Configuration Guide
  - uid: mondoo-arista-eos-security-logging-enabled
    title: Ensure logging is enabled
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    mql: |
      arista.eos.runningConfig.content.lines.none(_ == /^no logging on$/)
    docs:
      desc: |
        This check verifies that system logging is enabled on the switch. Logging captures authentication failures, configuration changes, security events, and other system activities that are critical for monitoring and auditing.

        **Why this matters**

        Without logging enabled, the device silently discards all event data. If system logging is not turned on:

        - Security events such as authentication failures and configuration changes go unrecorded.
        - Investigating security incidents is impossible without log data.
        - Compliance with virtually all security frameworks requires active logging.
        - Diagnosing operational issues becomes significantly harder without event records.
        - There is no audit trail documenting system activities.

        Enabling system logging is a foundational security control that supports incident detection, investigation, compliance reporting, and day-to-day operations.
      audit: |
        Verify that logging is enabled from the Arista EOS CLI:

        1. Connect to the switch and enter privileged EXEC mode.
        2. Run `show running-config | include logging` to display the logging state.
        3. Confirm no `no logging on` line is present. Logging is enabled by default, so a compliant device shows no disable entry.

        If no `no logging on` line is present, the check passes. If logging has been disabled with `no logging on`, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Enter global configuration mode and enable system logging:

            ```
            configure
            logging on
            ```

            Return to privileged EXEC mode and save the configuration. EOS does not save running-config automatically, so without this step the change is lost on the next reload:

            ```
            end
            write memory
            ```
    refs:
      - url: https://www.arista.com/en/um-eos/eos-logging
        title: Arista EOS Logging Configuration Guide
  - uid: mondoo-arista-eos-security-logging-host-configured
    title: Ensure remote syslog server is configured
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    mql: |
      arista.eos.runningConfig.content.lines.any(_ == /^logging host/)
    docs:
      desc: |
        This check verifies that logs are sent to a remote syslog server for centralized management. Sending logs off-device protects them from loss due to device failure or compromise and enables correlation across the network.

        **Why this matters**

        Without a remote syslog server configured, all logs exist only on the local device. If remote logging is not set up:

        - Logs are lost if the device fails, reboots, or is compromised.
        - Correlating events across multiple devices is not possible without centralized collection.
        - SIEM systems cannot ingest logs for real-time security monitoring.
        - Most compliance frameworks require centralized log management.
        - An attacker who compromises the device can delete local logs to cover their tracks.

        Configuring remote syslog ensures that log data is preserved, centrally accessible, and tamper-resistant, enabling effective security monitoring and compliance.
      audit: |
        Verify the remote syslog configuration from the Arista EOS CLI:

        1. Connect to the switch and enter privileged EXEC mode.
        2. Run `show running-config | include logging host` to list configured syslog servers.
        3. Confirm at least one `logging host` line is present.

        If one or more `logging host` entries are configured, the check passes. If no `logging host` line exists, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Enter global configuration mode and configure one or more remote syslog servers:

            ```
            configure
            logging host <syslog-server-ip>
            logging trap informational
            ```

            Return to privileged EXEC mode and save the configuration. EOS does not save running-config automatically, so without this step the change is lost on the next reload:

            ```
            end
            write memory
            ```
    refs:
      - url: https://www.arista.com/en/um-eos/eos-logging
        title: Arista EOS Logging Configuration Guide
  - uid: mondoo-arista-eos-security-logging-level-configured
    title: Ensure appropriate logging level is configured
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    mql: |
      arista.eos.runningConfig.content.lines.any(_ == /logging level/)
    docs:
      desc: |
        This check verifies that logging levels are configured for capturing important events. Setting appropriate logging levels ensures that security-relevant events are recorded without overwhelming the system with unnecessary detail.

        **Why this matters**

        Without explicit logging levels, the device may use defaults that miss important events or generate excessive noise. If logging levels are not configured:

        - Authentication and authorization events may not be captured at the default level.
        - Troubleshooting is harder without sufficient log verbosity for the relevant subsystems.
        - System performance can degrade if logging is too verbose across all subsystems.
        - Compliance requirements that specify minimum logging levels cannot be verified.

        Configuring logging levels ensures the right balance between capturing security-relevant events and maintaining system performance.
      audit: |
        Verify configured logging levels from the Arista EOS CLI:

        1. Connect to the switch and enter privileged EXEC mode.
        2. Run `show running-config | include logging level` to display configured logging levels.
        3. Confirm at least one `logging level` line is present.

        If one or more `logging level` entries are configured, the check passes. If no `logging level` line exists, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Enter global configuration mode and set logging levels for important subsystems, choosing informational or debugging as appropriate:

            ```
            configure
            logging level all informational
            logging level security debugging
            ```

            Return to privileged EXEC mode and save the configuration. EOS does not save running-config automatically, so without this step the change is lost on the next reload:

            ```
            end
            write memory
            ```
    refs:
      - url: https://www.arista.com/en/um-eos/eos-logging
        title: Arista EOS Logging Configuration Guide
  - uid: mondoo-arista-eos-security-login-banner-configured
    title: Ensure login banner is configured
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ccc-06
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-ps-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-9
      compliance/pci-dss-4: pcidss-requirement-2-2-1
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-5-2-1
    mql: |
      arista.eos.runningConfig.content.lines.any(_ == /^banner login/)
      arista.eos.runningConfig.content.contains("no banner login") == false
    docs:
      desc: |
        This check verifies that a login banner is configured to display legal notice. A login banner communicates that the device is for authorized use only and that activity may be monitored, which is important for legal protection.

        **Why this matters**

        Without a login banner, there is no legal notice presented to users before they access the device. If a login banner is not configured:

        - There is no established expectation of monitoring, weakening legal standing.
        - Unauthorized users are not warned of the legal consequences of their actions.
        - Compliance with security frameworks and regulations that require banners cannot be met.
        - Prosecution of unauthorized access may be more difficult without a clear warning.

        Configuring a login banner with appropriate legal language establishes the terms of access and strengthens the organization's legal position in the event of unauthorized use.
      audit: |
        Verify the login banner from the Arista EOS CLI:

        1. Connect to the switch and enter privileged EXEC mode.
        2. Run `show running-config section banner login` to display the configured login banner.
        3. Confirm a `banner login` block is present and that `no banner login` is not configured.

        If a login banner is configured, the check passes. If no banner is set, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Enter global configuration mode and configure a login banner with appropriate legal language. The `banner login` command starts a text-entry mode that ends when you type `EOF` on its own line:

            ```
            configure
            banner login
            UNAUTHORIZED ACCESS TO THIS DEVICE IS PROHIBITED
            You must have explicit, authorized permission to access this device.
            Unauthorized attempts and actions to access or use this system may
            result in civil and/or criminal penalties. All activities performed
            on this device are logged and monitored.
            EOF
            ```

            Return to privileged EXEC mode and save the configuration. EOS does not save running-config automatically, so without this step the change is lost on the next reload:

            ```
            end
            write memory
            ```
    refs:
      - url: https://www.arista.com/en/um-eos/eos-user-security
        title: Arista EOS User Security Configuration Guide
  - uid: mondoo-arista-eos-security-minimum-privilege-enforcement
    title: Ensure users have appropriate privilege levels
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-2
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-3-1
      compliance/vda-isa-5: vda-isa-5-4-2-1
    mql: |
      arista.eos.users.where(name != "admin").all(
        privilege.downcase != "15" || role != ""
      )
    docs:
      desc: |
        This check verifies that non-admin users don't have unrestricted privilege level 15 without role-based access control. Privilege level 15 grants full administrative access, which should be restricted through role assignments.

        **Why this matters**

        Without proper privilege separation, non-admin users may have full administrative access to the device. If role-based access control is not enforced:

        - Users operate with more privileges than their role requires, violating the principle of least privilege.
        - There is no granular control over which commands each user can execute.
        - Audit trails are less meaningful when all users share the same privilege level.
        - A compromised non-admin account could cause the same damage as a compromised admin account.
        - Compliance frameworks that require privilege separation and least-privilege access cannot be satisfied.

        Assigning specific roles to non-admin users ensures that each person can only perform operations appropriate to their responsibilities, limiting the blast radius of any compromised or misused account.
      audit: |
        Verify user privilege assignments from the Arista EOS CLI:

        1. Connect to the switch and enter privileged EXEC mode.
        2. Run `show running-config section username` to list configured local users and their privilege levels and roles.
        3. Confirm no non-admin user holds privilege level 15 without an assigned role.

        If every non-admin user with privilege 15 also has a role assigned, the check passes. If any non-admin user has privilege 15 with no role, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Enter global configuration mode and assign appropriate roles to users instead of granting blanket privilege 15:

            ```
            configure
            username <username> privilege 1 role <appropriate-role>
            ```

            Create custom roles if needed. The `role` command enters a role sub-mode where you add privilege statements:

            ```
            role <role-name>
               <privilege statements>
            ```

            Return to privileged EXEC mode and save the configuration. EOS does not save running-config automatically, so without this step the change is lost on the next reload:

            ```
            end
            write memory
            ```
    refs:
      - url: https://www.arista.com/en/um-eos/eos-user-security
        title: Arista EOS User Security Configuration Guide
  - uid: mondoo-arista-eos-security-motd-banner-configured
    title: Ensure MOTD banner is configured
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ccc-06
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-ps-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-9
      compliance/pci-dss-4: pcidss-requirement-2-2-1
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-5-2-1
    mql: |
      arista.eos.runningConfig.content.lines.any(_ == /^banner motd/)
      arista.eos.runningConfig.content.contains("no banner motd") == false
    docs:
      desc: |
        This check verifies that a message-of-the-day (MOTD) banner is configured. An MOTD banner communicates important information to users upon login, including security policies, support contacts, and maintenance schedules.

        **Why this matters**

        Without an MOTD banner, users receive no information upon login about the device's policies or status. If an MOTD banner is not configured:

        - Security policies and requirements are not communicated to users at login.
        - Contact information for support is not readily available.
        - Users are not informed of scheduled maintenance or other operational notices.

        Configuring an MOTD banner ensures that all users are presented with relevant security notices and operational information each time they access the device.
      audit: |
        Verify the message-of-the-day banner from the Arista EOS CLI:

        1. Connect to the switch and enter privileged EXEC mode.
        2. Run `show running-config section banner motd` to display the configured MOTD banner.
        3. Confirm a `banner motd` block is present and that `no banner motd` is not configured.

        If an MOTD banner is configured, the check passes. If no banner is set, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Enter global configuration mode and configure an MOTD banner. The `banner motd` command starts a text-entry mode that ends when you type `EOF` on its own line:

            ```
            configure
            banner motd
            <your message here>
            EOF
            ```

            Return to privileged EXEC mode and save the configuration. EOS does not save running-config automatically, so without this step the change is lost on the next reload:

            ```
            end
            write memory
            ```
    refs:
      - url: https://www.arista.com/en/um-eos/eos-user-security
        title: Arista EOS User Security Configuration Guide
  - uid: mondoo-arista-eos-security-multifactor-authentication
    title: Ensure multifactor authentication is configured for privileged access
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-j
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-3
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-3
    mql: |
      arista.eos.runningConfig.content.lines.where(_ == /aaa authentication/).one(_ == /aaa authentication login console group/)
    docs:
      desc: |
        This check verifies that multifactor authentication (MFA) is configured for console access. MFA requires users to present multiple authentication factors, such as a password combined with a token or certificate, before gaining access.

        **Why this matters**

        Without multifactor authentication, a single compromised password is enough to gain full access to the device. If MFA is not configured:

        - Compromised passwords provide immediate, unrestricted access.
        - Phishing attacks that capture passwords succeed without a second factor to block them.
        - Compliance with frameworks like NIST 800-171, PCI DSS v4.0, and Zero Trust architectures cannot be achieved.
        - Administrative accounts, which are the most valuable targets, remain protected only by a password.

        Configuring MFA for console access ensures that stolen or guessed passwords alone are not sufficient to compromise the device, significantly raising the bar for attackers.
      audit: |
        Verify console authentication from the Arista EOS CLI:

        1. Connect to the switch and enter privileged EXEC mode.
        2. Run `show running-config section aaa` to display the AAA configuration.
        3. Confirm a `aaa authentication login console group` line directs console logins to a RADIUS or TACACS+ server group.

        If console authentication is directed to a RADIUS or TACACS+ server group, the check passes. If console logins use only local authentication, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Directing console logins to a RADIUS or TACACS+ server group is necessary for multifactor authentication, but it is not sufficient on its own. This command alone can still allow single-factor logins if the AAA server only checks a password. The second factor must be enforced on the AAA server itself, such as RSA SecurID, Duo Security push or one-time passcode, or certificate-based authentication.

            Enter global configuration mode and direct console authentication to the AAA server group:

            ```
            configure
            aaa authentication login console group radius local
            ```

            On the RADIUS or TACACS+ server, require a second factor for these logins so that a stolen or guessed password alone cannot authenticate.

            Return to privileged EXEC mode and save the configuration. EOS does not save running-config automatically, so without this step the change is lost on the next reload:

            ```
            end
            write memory
            ```
    refs:
      - url: https://www.arista.com/en/um-eos/eos-section-aaa-authorization-and-accounting
        title: Arista EOS AAA Configuration Guide
  - uid: mondoo-arista-eos-security-no-users-without-password
    title: Ensure no user accounts are configured without passwords
    impact: 95
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-5-17
      compliance/nis-2: nis-2-21-2-g
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-5
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-7
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-9
      compliance/vda-isa-5: vda-isa-5-4-1-3
    mql: arista.eos.users.where(nopassword == true) == []
    docs:
      desc: |
        This check verifies that all user accounts on the Arista switch have password protection enabled. Accounts without passwords allow anyone with network or console access to log in without authentication.

        **Why this matters**

        User accounts without password protection represent one of the most critical security vulnerabilities on a network device. If any account lacks a password:

        - Anyone with access to the device can log in to that account without any credentials.
        - Password-less accounts can be exploited to escalate privileges and gain administrative control.
        - Security standards that require password protection for all accounts are violated.
        - Accountability and audit capabilities are compromised because actions cannot be attributed to authenticated users.
        - Automated attack tools actively scan for and exploit accounts without passwords.

        Ensuring all accounts require strong password authentication prevents unauthorized access and maintains accountability for all device activity.
      audit: |
        Verify that no accounts lack a password from the Arista EOS CLI:

        1. Connect to the switch and enter privileged EXEC mode.
        2. Run `show running-config section username` to list configured local users.
        3. Confirm no `username` entry includes the `nopassword` keyword.

        If no account is configured with `nopassword`, the check passes. If any account has `nopassword` set, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Enter global configuration mode and assign a password to every account configured with `nopassword`. Setting a secret replaces the `nopassword` attribute in the running-config:

            ```
            configure
            username <username> secret 0 <strong-password>
            ```

            Remove accounts that are no longer needed:

            ```
            no username <username>
            ```

            Verify with `show running-config section username` that no entry still contains the `nopassword` keyword.

            Return to privileged EXEC mode and save the configuration. EOS does not save running-config automatically, so without this step the change is lost on the next reload:

            ```
            end
            write memory
            ```
    refs:
      - url: https://www.arista.com/en/um-eos/eos-user-security
        title: Arista EOS User Security Configuration Guide
  - uid: mondoo-arista-eos-security-ntp-enabled
    title: Ensure NTP synchronization is enabled
    impact: 85
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-17
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    mql: arista.eos.ntp.status != "disabled"
    docs:
      desc: |
        This check verifies that NTP time synchronization is enabled and operational. Accurate time is essential for correlating events across devices, validating certificates, and maintaining reliable audit logs.

        **Why this matters**

        Without NTP synchronization, the device's clock may drift, causing timestamps to become inaccurate. If NTP is not enabled:

        - Log events from different devices cannot be correlated because their timestamps are inconsistent.
        - Forensic analysis of security incidents is unreliable when event timing is uncertain.
        - TLS/SSL certificate validation may fail if the clock is too far off.
        - Time-based authentication protocols such as Kerberos stop working with unsynchronized clocks.
        - Audit log reliability is undermined by inaccurate timestamps.

        Enabling NTP ensures that the device maintains accurate time, which is foundational to security monitoring, incident response, and compliance.
      audit: |
        Verify NTP synchronization from the Arista EOS CLI:

        1. Connect to the switch and enter privileged EXEC mode.
        2. Run `show ntp status` to display the current NTP synchronization state.
        3. Confirm the status reports the clock as synchronized rather than disabled.

        If NTP reports a synchronized state, the check passes. If NTP is disabled, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Enter global configuration mode and configure NTP servers for time synchronization:

            ```
            configure
            ntp server <ntp-server-1>
            ntp server <ntp-server-2>
            ```

            Use multiple NTP servers for redundancy.

            Return to privileged EXEC mode and save the configuration. EOS does not save running-config automatically, so without this step the change is lost on the next reload:

            ```
            end
            write memory
            ```
    refs:
      - url: https://www.arista.com/en/um-eos/eos-ntp
        title: Arista EOS NTP Configuration Guide
  - uid: mondoo-arista-eos-security-ntp-servers-configured
    title: Ensure NTP servers are configured
    impact: 85
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-17
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    mql: |
      arista.eos.runningConfig.content.lines.any(_ == /^ntp server/)
    docs:
      desc: |
        This check verifies that NTP servers are configured for time synchronization. Having explicitly configured NTP servers ensures the device synchronizes with trusted, reliable time sources.

        **Why this matters**

        Without configured NTP servers, the device cannot synchronize its clock even if NTP is enabled. If NTP servers are not specified:

        - There is no time source for the device to synchronize against.
        - A single server provides no failover if that source becomes unavailable.
        - Using unauthenticated or untrusted NTP sources could allow time manipulation attacks.
        - Accurate audit logging required for compliance depends on reliable time synchronization.

        Configuring at least two NTP servers from trusted sources ensures redundant, reliable time synchronization for the device.
      audit: |
        Verify configured NTP servers from the Arista EOS CLI:

        1. Connect to the switch and enter privileged EXEC mode.
        2. Run `show running-config | include ntp server` to list configured NTP servers.
        3. Confirm at least one `ntp server` line is present.

        If one or more `ntp server` entries are configured, the check passes. If no `ntp server` line exists, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Enter global configuration mode and configure at least two NTP servers for redundancy:

            ```
            configure
            ntp server <primary-ntp-server>
            ntp server <secondary-ntp-server>
            ```

            Use NTP servers from reliable sources such as NIST time servers or internal stratum 1 or 2 servers.

            Return to privileged EXEC mode and save the configuration. EOS does not save running-config automatically, so without this step the change is lost on the next reload:

            ```
            end
            write memory
            ```
    refs:
      - url: https://www.arista.com/en/um-eos/eos-ntp
        title: Arista EOS NTP Configuration Guide
  - uid: mondoo-arista-eos-security-password-minimum-length
    title: Ensure password minimum length is configured
    impact: 85
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-5-17
      compliance/nis-2: nis-2-21-2-g
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-5
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-7
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-9
      compliance/vda-isa-5: vda-isa-5-4-1-3
    mql: |
      arista.eos.passwordPolicy.minimumLength > 0
    docs:
      desc: |
        This check verifies that a minimum password length policy is configured on the switch. Password length is the single most important factor in password strength, as longer passwords exponentially increase the time required for brute-force attacks.

        **Why this matters**

        Without a minimum password length policy, users can set short passwords that are easily cracked. If a minimum length is not enforced:

        - Short passwords can be brute-forced in seconds or minutes.
        - The security benefit of character variety is minimal compared to what length provides.
        - Compliance with security frameworks that mandate minimum password lengths cannot be achieved.
        - Current NIST guidelines, which emphasize length over complexity, are not followed.
        - The device is more vulnerable to dictionary and brute-force attacks.

        Configuring a minimum password length of at least 15 characters for administrative accounts provides substantial protection against credential-based attacks.
      audit: |
        Verify the minimum password length policy from the Arista EOS CLI:

        1. Connect to the switch and enter privileged EXEC mode.
        2. Run `show running-config section management security` to display the password policy.
        3. Confirm a `password minimum length` line is present and `no password minimum length` is not configured.

        If a `password minimum length` policy is configured, the check passes. If it is absent or disabled, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Configure a minimum password length. A length of 15 characters is recommended for high security. Enter global configuration mode, then the `management security` sub-mode, and set the minimum length:

            ```
            configure
            management security
            password minimum length 15
            ```

            For environments that must comply with specific standards such as DISA STIG, 15 characters is mandatory.

            Return to privileged EXEC mode and save the configuration. EOS does not save running-config automatically, so without this step the change is lost on the next reload:

            ```
            end
            write memory
            ```
    refs:
      - url: https://www.arista.com/en/um-eos/eos-user-security
        title: Arista EOS User Security Configuration Guide
  - uid: mondoo-arista-eos-security-service-password-encryption
    title: Ensure password encryption service is enabled
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-5
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-7
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-9
      compliance/vda-isa-5: vda-isa-5-4-1-3
    mql: |
      arista.eos.users.all(format == "sha512" || nopassword == true)
    docs:
      desc: |
        This check verifies that local user passwords are stored as SHA-512 hashes rather than in cleartext or with weak, reversible encodings. Hashing stored credentials protects them whenever the configuration is viewed, shared, or backed up.

        **Why this matters**

        Without strong hashing of stored credentials, passwords in the device configuration are exposed. If user secrets are stored in cleartext or with weak encodings:

        - Passwords in the configuration can be read by anyone who views the configuration file.
        - Configuration backups contain recoverable passwords that could be exposed.
        - Security standards requiring credential protection in configuration files are not met.
        - An additional layer of defense-in-depth protection is missing.

        Setting SHA-512 as the default secret hashing algorithm ensures that every local user secret is stored as a strong one-way hash.
      audit: |
        Verify stored password hashing from the Arista EOS CLI:

        1. Connect to the switch and enter privileged EXEC mode.
        2. Run `show running-config section username` to list configured local users.
        3. Confirm every account with a secret shows `secret sha512` followed by a hash.

        If every stored secret uses the SHA-512 format, the check passes. If any account stores its secret in cleartext or with a weaker encoding, the check fails. Accounts configured with `nopassword` have no stored secret to hash and are not evaluated here; a separate check in this policy flags accounts without a password.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            EOS does not store local user passwords in cleartext when the `secret` keyword is used. To ensure all secrets are hashed with the strongest available algorithm, set SHA-512 as the default hashing algorithm. Enter global configuration mode, then the `management defaults` sub-mode, and set the hash:

            ```
            configure
            management defaults
            secret hash sha512
            ```

            Re-enter any existing user secrets afterward so they are stored with the new algorithm, and verify with `show running-config section username` that each entry shows `secret sha512`.

            Return to privileged EXEC mode and save the configuration. EOS does not save running-config automatically, so without this step the change is lost on the next reload:

            ```
            end
            write memory
            ```
    refs:
      - url: https://www.arista.com/en/um-eos/eos-user-security
        title: Arista EOS User Security Configuration Guide
  - uid: mondoo-arista-eos-security-snmp-community-strings-configured
    title: Ensure SNMP community strings are not using defaults
    impact: 85
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-21
      compliance/nis-2: nis-2-21-2-g
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-5
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-7
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-9
      compliance/vda-isa-5: vda-isa-5-4-1-3
    mql: |
      arista.eos.runningConfig.content.contains("snmp-server community public") == false
      arista.eos.runningConfig.content.contains("snmp-server community private") == false
    docs:
      desc: |
        This check verifies that default SNMP community strings (public/private) are not configured. Default community strings are publicly known and are among the first things attackers try when probing network devices.

        **Why this matters**

        Using default SNMP community strings is equivalent to leaving the device unprotected. If default strings are not removed:

        - Attackers can use the well-known "public" and "private" strings to access the device.
        - Device information, including configuration details, can be queried by anyone.
        - Network reconnaissance is trivial when default SNMP access is available.
        - Write access with default strings allows attackers to modify the device configuration.
        - Compliance with security standards that prohibit default credentials is violated.

        Removing default community strings and replacing them with strong, unique values treats SNMP access with the same rigor as any other authentication credential.
      audit: |
        Verify SNMP community strings from the Arista EOS CLI:

        1. Connect to the switch and enter privileged EXEC mode.
        2. Run `show running-config | include snmp-server community` to list configured SNMP community strings.
        3. Confirm neither the default `public` nor `private` community string is configured.

        If no default community string is present, the check passes. If `snmp-server community public` or `snmp-server community private` is configured, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Enter global configuration mode, remove default community strings, and configure secure, unique strings:

            ```
            configure
            no snmp-server community public
            no snmp-server community private
            snmp-server community <strong-unique-string> ro
            ```

            Consider using SNMPv3 with authentication and encryption instead of community strings:

            ```
            snmp-server user <username> <group> v3 auth sha <password> priv aes <privpassword>
            ```

            Return to privileged EXEC mode and save the configuration. EOS does not save running-config automatically, so without this step the change is lost on the next reload:

            ```
            end
            write memory
            ```
    refs:
      - url: https://www.arista.com/en/um-eos/eos-snmp
        title: Arista EOS SNMP Configuration Guide
  - uid: mondoo-arista-eos-security-snmp-traps-secured
    title: Ensure SNMP traps are properly secured
    impact: 70
    filters: arista.eos.snmp.enabled == true
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-21
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-5
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-7
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-9
      compliance/vda-isa-5: vda-isa-5-4-1-3
    mql: |
      arista.eos.runningConfig.content.lines.none(_ == /^snmp-server host \S+.* (public|private)( |$)/)
    docs:
      desc: |
        This check verifies that SNMP trap notifications don't use default community strings. SNMP traps send device status and event information to monitoring servers, and using default strings exposes this data to interception.

        **Why this matters**

        Without securing SNMP trap community strings, sensitive device and network information may be exposed. If default strings are used for traps:

        - Device status and network topology information is sent using well-known community strings.
        - Security-relevant event notifications can be intercepted by unauthorized parties.
        - The overall SNMP security posture is undermined even if polling uses strong strings.

        Configuring SNMP traps with secure, unique community strings ensures that event notifications are only readable by authorized monitoring systems.
      audit: |
        Verify SNMP trap configuration from the Arista EOS CLI:

        1. Connect to the switch and enter privileged EXEC mode.
        2. Run `show running-config | include snmp-server host` to display configured SNMP trap destinations and their community strings.
        3. Confirm no trap destination uses the default `public` or `private` community string.

        If every trap destination uses a non-default community string, the check passes. If any destination uses `public` or `private`, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            The real fix is to send traps using SNMPv3 with authentication and privacy, because SNMPv3 encrypts the notification and authenticates its source. SNMP v2c sends traps in cleartext even with a non-default community string, so anyone who can capture the traffic still reads the contents. Configure an SNMPv3 user and point the trap host at it. Enter global configuration mode first:

            ```
            configure
            snmp-server user <username> <group> v3 auth sha <password> priv aes <privpassword>
            snmp-server host <server-ip> version 3 priv <username>
            ```

            If your monitoring system cannot yet accept SNMPv3, replacing the default community string with a strong, unique one is only a minimum stopgap that does not encrypt the traffic:

            ```
            no snmp-server host <server-ip>
            snmp-server host <server-ip> version 2c <secure-community-string>
            ```

            Verify with `show running-config | include snmp-server host` that no destination uses the `public` or `private` community string.

            Return to privileged EXEC mode and save the configuration. EOS does not save running-config automatically, so without this step the change is lost on the next reload:

            ```
            end
            write memory
            ```
    refs:
      - url: https://www.arista.com/en/um-eos/eos-snmp
        title: Arista EOS SNMP Configuration Guide
  - uid: mondoo-arista-eos-security-ssh-enabled
    title: Ensure SSH is enabled for secure management
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    mql: |
      arista.eos.sshSettings.enabled == true
    docs:
      desc: |
        This check verifies that SSH is enabled for secure remote management access. SSH encrypts all management traffic, including credentials, and is the universally accepted standard for secure remote device administration.

        **Why this matters**

        Without SSH enabled, secure remote management of the device is not possible. If SSH is disabled or shut down:

        - Remote management must rely on insecure protocols like Telnet, which transmit credentials in clear text.
        - Strong authentication methods such as public key authentication are not available.
        - Management sessions are vulnerable to tampering and eavesdropping.
        - Compliance with all major security frameworks that mandate encrypted management access cannot be achieved.

        Enabling SSH ensures that all remote management sessions are encrypted, authenticated, and protected from interception.
      audit: |
        Verify the SSH management service from the Arista EOS CLI:

        1. Connect to the switch and enter privileged EXEC mode.
        2. Run `show management ssh` to display the SSH service state.
        3. Confirm the `management ssh` service is configured and not shut down.

        If the SSH management service is enabled and not shut down, the check passes. If it is missing or shut down, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Before enabling SSH, make sure the prerequisites for key generation are in place. SSH needs host keys, and EOS cannot generate them until the device has a hostname and a DNS domain name configured, so the SSH service may not come up otherwise. Set the hostname and domain name first if they are missing. The domain name is covered by a separate check in this policy.

            Enter global configuration mode, then the `management ssh` sub-mode, and enable the service:

            ```
            configure
            management ssh
            no shutdown
            ```

            Harden the SSH service while still in the `management ssh` sub-mode, for example by setting an idle timeout:

            ```
            idle-timeout 10
            ```

            Return to privileged EXEC mode and save the configuration. EOS does not save running-config automatically, so without this step the change is lost on the next reload:

            ```
            end
            write memory
            ```
    refs:
      - url: https://www.arista.com/en/um-eos/eos-user-security
        title: Arista EOS User Security Configuration Guide
  - uid: mondoo-arista-eos-security-telnet-disabled
    title: Ensure Telnet is disabled
    impact: 95
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    mql: |
      arista.eos.telnetService.enabled == false
    docs:
      desc: |
        This check verifies that the insecure Telnet protocol is disabled on the switch. Telnet transmits all data, including passwords, in clear text and should never be used for network device management.

        **Why this matters**

        Telnet is inherently insecure and any credential transmitted over it should be considered compromised. If Telnet is not disabled:

        - All data including passwords is sent in plain text and can be captured by anyone on the network.
        - Network sniffers can passively harvest credentials from Telnet sessions.
        - An attacker can intercept and modify management traffic in transit.
        - Compliance with virtually all security frameworks that prohibit Telnet is violated.

        Disabling Telnet and using SSH as the sole remote management protocol ensures that all management communications are encrypted and protected from interception.
      audit: |
        Verify the Telnet management service from the Arista EOS CLI:

        1. Connect to the switch and enter privileged EXEC mode.
        2. Run `show management telnet` to display the Telnet service state.
        3. Confirm the `management telnet` service is shut down or not configured.

        If the Telnet management service is shut down or absent, the check passes. If Telnet is enabled, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Verify SSH access works before disabling Telnet. If your current session runs over Telnet, the `shutdown` command disconnects it immediately, so establish and test an SSH session first. Enter global configuration mode, then the `management ssh` sub-mode, and enable SSH:

            ```
            configure
            management ssh
            no shutdown
            ```

            After confirming you can log in over SSH, enter the `management telnet` sub-mode and disable Telnet:

            ```
            configure
            management telnet
            shutdown
            ```

            Return to privileged EXEC mode and save the configuration. EOS does not save running-config automatically, so without this step the change is lost on the next reload:

            ```
            end
            write memory
            ```
    refs:
      - url: https://www.arista.com/en/um-eos/eos-user-security
        title: Arista EOS User Security Configuration Guide
  - uid: mondoo-arista-eos-security-timezone-configured
    title: Ensure timezone is configured to UTC or GMT
    impact: 75
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-17
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    mql: |
      arista.eos.runningConfig.content.lines.one(_ == /clock timezone (UTC|GMT)/)
    docs:
      desc: |
        This check verifies that the system timezone is set to UTC or GMT for consistent logging. Using a standardized timezone across all infrastructure ensures that log timestamps can be directly compared without conversion.

        **Why this matters**

        Without a standardized timezone, log entries from different devices use different time references, complicating analysis. If the timezone is not set to UTC or GMT:

        - Correlating events across devices in different locations requires manual time conversion.
        - Forensic analysis of multi-device incidents is slower and more error-prone.
        - Compliance frameworks that require UTC/GMT for audit logs are not satisfied.
        - The industry standard practice of using UTC for infrastructure logging is not followed.

        Setting the timezone to UTC or GMT ensures consistent timestamps across all devices, enabling accurate event correlation and streamlined incident analysis.
      audit: |
        Verify the system timezone from the Arista EOS CLI:

        1. Connect to the switch and enter privileged EXEC mode.
        2. Run `show running-config | include clock timezone` to display the configured timezone.
        3. Confirm a `clock timezone UTC` or `clock timezone GMT` line is present.

        If the timezone is set to UTC or GMT, the check passes. If it is set to another zone or unset, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Enter global configuration mode and set the timezone to UTC or GMT:

            ```
            configure
            clock timezone UTC
            ```

            Return to privileged EXEC mode and save the configuration. EOS does not save running-config automatically, so without this step the change is lost on the next reload:

            ```
            end
            write memory
            ```
    refs:
      - url: https://www.arista.com/en/um-eos/eos-system-configuration
        title: Arista EOS System Configuration Guide
  - uid: mondoo-arista-eos-security-unused-interfaces-disabled
    title: Ensure unused interfaces are administratively disabled
    impact: 80
    filters: arista.eos.interfaces != empty
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-6
    mql: |
      arista.eos.interfaces.where(
        interfaceStatus == "notconnect" &&
        description == "" &&
        name != /^Management/
      ).all(interfaceStatus == "disabled")
    docs:
      desc: |
        This check identifies interfaces that are not connected, have no description, and should be disabled. Shutting down unused interfaces prevents unauthorized devices from being connected to the network through open ports.

        **Why this matters**

        Unused interfaces that remain enabled provide potential entry points for attackers. If unused interfaces are not administratively disabled:

        - Unauthorized devices can be plugged into open ports and gain network access.
        - The attack surface of the device is larger than necessary.
        - Plug-and-play attacks that exploit enabled but unmonitored ports are possible.
        - Compliance frameworks that require disabling unused ports cannot be satisfied.

        Disabling unused interfaces and documenting the intended purpose of reserved ports reduces the physical attack surface and prevents unauthorized network access.
      audit: |
        Verify the state of unused interfaces from the Arista EOS CLI:

        1. Connect to the switch and enter privileged EXEC mode.
        2. Run `show interfaces status` to list every interface with its connection state and description.
        3. Confirm each not-connected, undescribed non-management interface is administratively disabled.

        If every unused non-management interface is administratively disabled, the check passes. If any unused interface remains enabled, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Disable unused interfaces. Enter global configuration mode, then the interface sub-mode for each unused port, and shut it down:

            ```
            configure
            interface <interface-name>
            shutdown
            ```

            For interfaces that may be used in the future, add a description noting their intended purpose.

            Return to privileged EXEC mode and save the configuration. EOS does not save running-config automatically, so without this step the change is lost on the next reload:

            ```
            end
            write memory
            ```
    refs:
      - url: https://www.arista.com/en/um-eos/eos-interfaces
        title: Arista EOS Interface Configuration Guide
  - uid: mondoo-arista-eos-security-unused-vlan1
    title: Ensure VLAN 1 is not used for user traffic
    impact: 75
    filters: arista.eos.vlans != empty
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-1-5
      compliance/vda-isa-5: vda-isa-5-5-2-6
    mql: |
      arista.eos.switchports.where(mode == "access").all(accessVlan != "1")
    docs:
      desc: |
        This check verifies that no access ports are assigned to VLAN 1. VLAN 1 is the default VLAN on most switches and should not carry user traffic because it is a common target for attacks.

        **Why this matters**

        Using VLAN 1 for user traffic mixes it with management and control plane traffic, increasing security risk. If access ports remain on VLAN 1:

        - User traffic is not isolated from management traffic, weakening network segmentation.
        - The device is more exposed to VLAN hopping attacks that exploit VLAN 1's default status.
        - Industry best practices for VLAN security are not followed.

        Moving all access ports to dedicated user VLANs ensures proper traffic separation and reduces the risk of VLAN-based attacks.
      audit: |
        Verify access-port VLAN assignments from the Arista EOS CLI:

        1. Connect to the switch and enter privileged EXEC mode.
        2. Run `show interfaces switchport` to display the switchport mode and VLAN of each port.
        3. Confirm no access-mode port is assigned to VLAN 1.

        If no access port carries VLAN 1, the check passes. If any access port is assigned to VLAN 1, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Move all access ports from VLAN 1 to appropriate user VLANs. Enter global configuration mode, then the interface sub-mode for each access port, and set its access VLAN:

            ```
            configure
            interface <interface>
            switchport access vlan <appropriate-vlan>
            ```

            Return to privileged EXEC mode and save the configuration. EOS does not save running-config automatically, so without this step the change is lost on the next reload:

            ```
            end
            write memory
            ```
    refs:
      - url: https://www.arista.com/en/um-eos/eos-vlans
        title: Arista EOS VLAN Configuration Guide
  - uid: mondoo-arista-eos-security-users-with-encrypted-passwords
    title: Ensure all user passwords are encrypted with strong algorithms
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-5
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-7
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-9
      compliance/vda-isa-5: vda-isa-5-4-1-3
    mql: |
      arista.eos.users.where(secret != "").all(format == "sha512")
    docs:
      desc: |
        This check verifies that all user accounts use the strong SHA-512 password hashing algorithm. This cryptographically secure hash algorithm protects stored credentials from being recovered if the configuration is exposed.

        **Why this matters**

        Without strong password encryption, stored credentials are vulnerable to compromise. If weak algorithms like MD5 or plain text are used:

        - Passwords can be cracked using rainbow tables or brute-force attacks in a short time.
        - Configuration backups containing weakly hashed passwords put all accounts at risk.
        - Compliance with security standards that require strong cryptographic algorithms is violated.
        - A single exposed configuration file could compromise every account on the device.

        Using SHA-512 for all user passwords ensures that credentials remain protected even if the device configuration is inadvertently exposed or backed up insecurely.
      audit: |
        Verify user password hashing from the Arista EOS CLI:

        1. Connect to the switch and enter privileged EXEC mode.
        2. Run `show running-config section username` to list configured local users and their secret hash format.
        3. Confirm every account with a secret uses a `sha512` hash.

        If every account secret uses SHA-512, the check passes. If any account uses a weaker hash, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Set SHA-512 as the default secret hashing algorithm, then re-enter each user password. Do not place a cleartext password after the `sha512` keyword, because that keyword expects an already computed hash. Supply the password with the cleartext marker `0` and let EOS hash it.

            Enter global configuration mode, then the `management defaults` sub-mode to set the hash, return to global configuration mode with `exit`, and re-enter each user secret:

            ```
            configure
            management defaults
            secret hash sha512
            exit
            username <username> secret 0 <strong-password>
            ```

            Verify with `show running-config section username` that every entry shows `secret sha512` followed by a hash.

            Return to privileged EXEC mode and save the configuration. EOS does not save running-config automatically, so without this step the change is lost on the next reload:

            ```
            end
            write memory
            ```
    refs:
      - url: https://www.arista.com/en/um-eos/eos-user-security
        title: Arista EOS User Security Configuration Guide
  - uid: mondoo-arista-eos-security-vlan-names-configured
    title: Ensure VLANs have descriptive names configured
    impact: 60
    filters: arista.eos.vlans != empty
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-1-5
      compliance/vda-isa-5: vda-isa-5-5-2-6
    mql: |
      arista.eos.vlans.where(id != "1").all(name.downcase != /^vlan\d+$/)
    docs:
      desc: |
        This check verifies that VLANs have descriptive names rather than default names. Descriptive VLAN names make the network configuration self-documenting, which is important for both operations and security.

        **Why this matters**

        Without descriptive names, VLANs are identified only by their numeric IDs, making the configuration harder to understand and manage. If VLAN names are left as defaults:

        - The purpose and usage of each VLAN is not apparent from the configuration.
        - Unauthorized or misconfigured VLANs are harder to identify during security reviews.
        - Diagnosing network issues takes longer when VLAN purposes are unclear.
        - Configuration errors are more likely when administrators cannot easily distinguish between VLANs.

        Naming VLANs descriptively ensures that the network configuration is clear and understandable, supporting efficient operations, better change management, and more effective security audits.
      audit: |
        Verify VLAN names from the Arista EOS CLI:

        1. Connect to the switch and enter privileged EXEC mode.
        2. Run `show vlan` to list every VLAN with its name.
        3. Confirm every VLAN other than VLAN 1 carries a descriptive name rather than the default `VLANxxxx` form.

        If every VLAN other than VLAN 1 has a descriptive name, the check passes. If any VLAN keeps a default `VLANxxxx` name, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Configure descriptive names for all VLANs. Enter global configuration mode, then the `vlan` sub-mode for each VLAN, and set its name:

            ```
            configure
            vlan <vlan-id>
            name <descriptive-name>
            ```

            For example: `name GUEST_WIFI`, `name PROD_SERVERS`, `name MGMT_NETWORK`

            Return to privileged EXEC mode and save the configuration. EOS does not save running-config automatically, so without this step the change is lost on the next reload:

            ```
            end
            write memory
            ```
    refs:
      - url: https://www.arista.com/en/um-eos/eos-vlans
        title: Arista EOS VLAN Configuration Guide
  - uid: mondoo-arista-eos-security-vlan-trunk-native-not-vlan1
    title: Ensure trunk ports do not use VLAN 1 as native VLAN
    impact: 85
    filters: arista.eos.switchports != empty
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-1-5
      compliance/vda-isa-5: vda-isa-5-5-2-6
    mql: |
      arista.eos.switchports.where(mode == "trunk").all(
        trunkNativeVlan != "1" && trunkNativeVlan != ""
      )
    docs:
      desc: |
        This check verifies that trunk ports use a native VLAN other than VLAN 1. The native VLAN on trunk ports carries untagged traffic, and using the default VLAN 1 exposes the network to well-known attacks.

        **Why this matters**

        Using VLAN 1 as the native VLAN on trunk ports creates specific, exploitable security weaknesses. If VLAN 1 remains the native VLAN:

        - Attackers can perform VLAN hopping attacks by exploiting the default native VLAN configuration.
        - Control plane traffic carried on VLAN 1 by spanning tree is mixed with user traffic.
        - Security standards that recommend avoiding VLAN 1 for any traffic are not followed.
        - The device's default configuration becomes a known attack vector.

        Configuring a dedicated, unused VLAN as the native VLAN on trunk ports eliminates VLAN hopping risks and separates control plane traffic from user data.
      audit: |
        Verify trunk native VLAN assignments from the Arista EOS CLI:

        1. Connect to the switch and enter privileged EXEC mode.
        2. Run `show interfaces switchport` to display the trunk native VLAN of each port.
        3. Confirm every trunk port uses a native VLAN other than VLAN 1.

        If every trunk port uses a non-default native VLAN, the check passes. If any trunk port uses VLAN 1 as its native VLAN, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Configure a dedicated native VLAN other than VLAN 1 for trunk ports. Enter global configuration mode, then the interface sub-mode for each trunk port, and set its native VLAN:

            ```
            configure
            interface <interface>
            switchport trunk native vlan <vlan-id>
            ```

            Consider using an unused VLAN as the native VLAN and don't assign any access ports to it.

            Return to privileged EXEC mode and save the configuration. EOS does not save running-config automatically, so without this step the change is lost on the next reload:

            ```
            end
            write memory
            ```
    refs:
      - url: https://www.arista.com/en/um-eos/eos-vlans
        title: Arista EOS VLAN Configuration Guide
  - uid: mondoo-arista-eos-security-bgp-peers-inbound-route-map
    title: Ensure BGP peers have inbound route filtering configured
    impact: 90
    filters: arista.eos.runningConfig.content.contains("router bgp") == true
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-1-5
      compliance/vda-isa-5: vda-isa-5-5-2-6
    mql: |
      arista.eos.bgp.vrfs.all(
        peers.all(inboundRouteMap != "")
      )
    docs:
      desc: |
        This check verifies that all BGP peers have an inbound route map configured. Inbound route filtering controls which prefixes are accepted from each peer, preventing route hijacking and accidental route leaks from affecting the network.

        **Why this matters**

        Without inbound route filtering, a BGP peer can advertise arbitrary prefixes and the router will accept them. If inbound route maps are not configured:

        - A compromised or misconfigured peer can inject false routes, redirecting traffic through attacker-controlled infrastructure.
        - Accidental route leaks from peers can cause traffic blackholes or suboptimal routing.
        - The router has no mechanism to enforce prefix ownership or limit the scope of accepted routes.
        - BGP hijacking attacks become trivial when there is no prefix validation.
        - Compliance requirements for network boundary protection and information flow control cannot be met.

        Configuring inbound route maps on all BGP peers ensures that only expected, authorized prefixes are accepted, protecting the network from route hijacking and misrouting.
      audit: |
        Verify inbound BGP route filtering from the Arista EOS CLI:

        1. Connect to the switch and enter privileged EXEC mode.
        2. Run `show running-config section router bgp` to display the BGP configuration.
        3. Confirm every `neighbor` has a `route-map ... in` statement applied.

        If every BGP peer has an inbound route map applied, the check passes. If any peer has no inbound route map, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Create a route map and apply it inbound on each BGP peer. Enter global configuration mode, define the route map in its sub-mode, then enter the `router bgp` sub-mode to apply it to the neighbor:

            ```
            configure
            route-map INBOUND-FILTER permit 10
            match ip address prefix-list ALLOWED-PREFIXES
            !
            router bgp <asn>
            neighbor <peer-ip> route-map INBOUND-FILTER in
            ```

            Define a prefix list that includes only the prefixes expected from each peer.

            Return to privileged EXEC mode and save the configuration. EOS does not save running-config automatically, so without this step the change is lost on the next reload:

            ```
            end
            write memory
            ```
    refs:
      - url: https://www.arista.com/en/um-eos/eos-bgp-configuration
        title: Arista EOS BGP Configuration Guide
  - uid: mondoo-arista-eos-security-bgp-peers-outbound-route-map
    title: Ensure BGP peers have outbound route filtering configured
    impact: 85
    filters: arista.eos.runningConfig.content.contains("router bgp") == true
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-1-5
      compliance/vda-isa-5: vda-isa-5-5-2-6
    mql: |
      arista.eos.bgp.vrfs.all(
        peers.all(outboundRouteMap != "")
      )
    docs:
      desc: |
        This check verifies that all BGP peers have an outbound route map configured. Outbound route filtering controls which prefixes are advertised to each peer, preventing internal routes from being leaked to external networks.

        **Why this matters**

        Without outbound route filtering, the router may advertise internal or sensitive prefixes to external peers. If outbound route maps are not configured:

        - Internal network topology is exposed to external peers, aiding reconnaissance.
        - Private or infrastructure prefixes may be advertised to the internet, causing routing conflicts.
        - Accidental route leaks can disrupt traffic for other networks that accept the leaked prefixes.
        - The organization may become an unwitting participant in route hijacking incidents.
        - Network boundary protection requirements cannot be satisfied without controlling outbound route advertisements.

        Configuring outbound route maps on all BGP peers ensures that only intended prefixes are advertised, protecting internal network information and preventing route leaks.
      audit: |
        Verify outbound BGP route filtering from the Arista EOS CLI:

        1. Connect to the switch and enter privileged EXEC mode.
        2. Run `show running-config section router bgp` to display the BGP configuration.
        3. Confirm every `neighbor` has a `route-map ... out` statement applied.

        If every BGP peer has an outbound route map applied, the check passes. If any peer has no outbound route map, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Create a route map and apply it outbound on each BGP peer. Enter global configuration mode, define the route map in its sub-mode, then enter the `router bgp` sub-mode to apply it to the neighbor:

            ```
            configure
            route-map OUTBOUND-FILTER permit 10
            match ip address prefix-list ADVERTISED-PREFIXES
            !
            router bgp <asn>
            neighbor <peer-ip> route-map OUTBOUND-FILTER out
            ```

            Define a prefix list that includes only the prefixes intended for advertisement to each peer.

            Return to privileged EXEC mode and save the configuration. EOS does not save running-config automatically, so without this step the change is lost on the next reload:

            ```
            end
            write memory
            ```
    refs:
      - url: https://www.arista.com/en/um-eos/eos-bgp-configuration
        title: Arista EOS BGP Configuration Guide
  - uid: mondoo-arista-eos-security-bgp-peers-descriptions
    title: Ensure BGP peers have descriptions configured
    impact: 60
    filters: arista.eos.runningConfig.content.contains("router bgp") == true
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    mql: |
      arista.eos.bgp.vrfs.all(
        peers.all(description != "")
      )
    docs:
      desc: |
        This check verifies that all BGP peers have descriptions configured. Peer descriptions document the purpose, owner, and circuit details of each BGP session, which is essential for security auditing and incident response.

        **Why this matters**

        Without descriptions on BGP peers, the identity and purpose of each peering session is undocumented. If peer descriptions are not configured:

        - It is difficult to determine whether a BGP session is authorized during a security review.
        - Rogue or unauthorized peering sessions are harder to identify without documented baselines.
        - Incident response is slowed when operators must research the purpose of each peer.
        - Configuration audits and change management are less effective without documented intent.

        Adding descriptions to all BGP peers ensures that peering sessions are self-documenting, supporting faster incident response, more effective audits, and easier identification of unauthorized sessions.
      audit: |
        Verify BGP peer descriptions from the Arista EOS CLI:

        1. Connect to the switch and enter privileged EXEC mode.
        2. Run `show running-config section router bgp` to display the BGP configuration.
        3. Confirm every `neighbor` has a `description` statement.

        If every BGP peer has a description, the check passes. If any peer has no description, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Configure descriptions for all BGP peers. Enter global configuration mode, then the `router bgp` sub-mode, and set each neighbor description:

            ```
            configure
            router bgp <asn>
            neighbor <peer-ip> description <peer-name and circuit details>
            ```

            Include the peer organization, circuit ID, and purpose in the description.

            Return to privileged EXEC mode and save the configuration. EOS does not save running-config automatically, so without this step the change is lost on the next reload:

            ```
            end
            write memory
            ```
    refs:
      - url: https://www.arista.com/en/um-eos/eos-bgp-configuration
        title: Arista EOS BGP Configuration Guide
  - uid: mondoo-arista-eos-security-bgp-peers-established
    title: Ensure all BGP peers are in Established state
    impact: 70
    filters: arista.eos.runningConfig.content.contains("router bgp") == true
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-16
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    mql: |
      arista.eos.bgp.vrfs.all(
        peers.all(state == "Established")
      )
    docs:
      desc: |
        This check verifies that all configured BGP peers are in the Established state. A peer that is not Established indicates a connectivity failure, authentication mismatch, or potential security issue that requires investigation.

        **Why this matters**

        BGP peers that are not in the Established state may indicate active security or operational issues. If peers are stuck in Idle, Active, or other non-established states:

        - Routing redundancy is reduced, which may cause traffic to take unexpected paths.
        - Authentication failures could indicate credential compromise or unauthorized peering attempts.
        - A peer stuck in Active state may signal a man-in-the-middle attack or TCP hijacking attempt.
        - Network partitioning from failed BGP sessions can create routing blackholes.
        - Monitoring systems may not have full visibility into network health without established BGP sessions.

        Ensuring all BGP peers are in the Established state confirms that peering sessions are healthy, authenticated, and exchanging routes as expected.

        **Note:** Peers that are intentionally shut down (admin down via `neighbor shutdown`) will also be flagged by this check. During maintenance windows or decommissioning, this is expected and the finding can be acknowledged until the peer is removed from the configuration.
      audit: |
        Verify BGP peer session state from the Arista EOS CLI:

        1. Connect to the switch and enter privileged EXEC mode.
        2. Run `show ip bgp summary` to display the state of every BGP session.
        3. Confirm every configured peer reports the `Established` state.

        If every BGP peer is in the Established state, the check passes. If any peer is in another state, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Investigate the state of non-established peers:

            ```
            show ip bgp summary
            show ip bgp neighbors <peer-ip>
            ```

            Common causes include:
            - Incorrect peer IP or AS number configuration
            - Authentication key mismatch
            - Network connectivity issues between peers
            - Firewall rules blocking TCP port 179

            Correct the underlying issue and verify the peer reaches Established state.
    refs:
      - url: https://www.arista.com/en/um-eos/eos-bgp-configuration
        title: Arista EOS BGP Configuration Guide
  - uid: mondoo-arista-eos-security-acl-explicit-deny
    title: Ensure ACLs contain explicit deny entries
    impact: 85
    filters: arista.eos.runningConfig.content.contains("ip access-list") == true
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-6
    mql: |
      arista.eos.acls.all(
        entries.any(action == "deny")
      )
    docs:
      desc: |
        This check verifies that all access control lists contain at least one explicit deny entry. While Arista EOS has an implicit deny at the end of each ACL, relying solely on implicit behavior makes the security intent unclear and prevents logging of denied traffic.

        **Why this matters**

        Without explicit deny entries, ACLs rely entirely on the implicit deny, which has significant operational and security drawbacks. If explicit deny rules are not present:

        - Denied traffic is not logged because implicit deny entries cannot trigger logging.
        - The security intent of the ACL is ambiguous to anyone reviewing the configuration.
        - It is impossible to distinguish between intentionally denied traffic and traffic denied by default.
        - Troubleshooting access issues is harder when there is no visible deny rule to confirm blocking behavior.
        - Compliance frameworks that require deny-by-default with explicit access control documentation cannot be satisfied.

        Adding explicit deny entries to all ACLs makes the security policy visible, auditable, and capable of generating logs for denied traffic.

        **Note:** Some ACLs are legitimately permit-only, such as those used for route-map match clauses or BGP prefix filters. If this check flags such ACLs, verify that they are not used for traffic filtering before adding deny entries.
      audit: |
        Verify explicit deny entries from the Arista EOS CLI:

        1. Connect to the switch and enter privileged EXEC mode.
        2. Run `show ip access-lists` to display every configured ACL and its entries.
        3. Confirm each ACL contains at least one explicit `deny` entry.

        If every ACL has at least one explicit deny entry, the check passes. If any ACL has no explicit deny entry, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Add an explicit deny entry at the end of each standard ACL. Use a sequence number higher than every existing entry so the deny stays last. Enter global configuration mode, then the `ip access-list standard` sub-mode, and add the entry:

            ```
            configure
            ip access-list standard <acl-name>
            <high-sequence-number> deny any log
            ```

            The `log` keyword ensures denied traffic is recorded for security monitoring. This entry matches the same traffic as the implicit deny, so it does not change forwarding behavior for ACLs already ending in the implicit deny.

            Return to privileged EXEC mode and save the configuration. EOS does not save running-config automatically, so without this step the change is lost on the next reload:

            ```
            end
            write memory
            ```
    refs:
      - url: https://www.arista.com/en/um-eos/eos-access-control-lists
        title: Arista EOS Access Control Lists Configuration Guide
  - uid: mondoo-arista-eos-security-acl-deny-logging
    title: Ensure ACL deny entries have logging enabled
    impact: 75
    filters: arista.eos.runningConfig.content.contains("ip access-list") == true
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-12
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    mql: |
      arista.eos.acls.all(
        entries.where(action == "deny").all(log == true)
      )
    docs:
      desc: |
        This check verifies that all deny entries in access control lists have logging enabled. Logging denied traffic is essential for detecting attacks, identifying misconfigured clients, and maintaining a complete security audit trail.

        **Why this matters**

        Without logging on deny entries, blocked traffic is silently dropped with no record. If ACL deny logging is not enabled:

        - Blocked attack attempts are not recorded, making threat detection impossible.
        - There is no visibility into what traffic is being denied and why.
        - Security incident investigations lack evidence of blocked access attempts.
        - Trends in denied traffic that could indicate scanning or probing activity go undetected.
        - Compliance requirements for logging security-relevant events at network boundaries cannot be met.

        Enabling logging on all ACL deny entries ensures that blocked traffic is recorded, supporting real-time threat detection, forensic investigation, and compliance reporting.
      audit: |
        Verify ACL deny logging from the Arista EOS CLI:

        1. Connect to the switch and enter privileged EXEC mode.
        2. Run `show ip access-lists` to display every configured ACL and its entries.
        3. Confirm every `deny` entry includes the `log` keyword.

        If every ACL deny entry has logging enabled, the check passes. If any deny entry lacks the `log` keyword, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            List the current entries first to capture each sequence number and source:

            ```
            show ip access-lists
            ```

            Re-enter each deny entry with its existing sequence number and append the `log` keyword. Standard ACL entries take only a source address. Enter global configuration mode, then the `ip access-list standard` sub-mode, and re-enter the deny entries:

            ```
            configure
            ip access-list standard <acl-name>
            <sequence-number> deny <source> log
            ```

            Return to privileged EXEC mode and save the configuration. EOS does not save running-config automatically, so without this step the change is lost on the next reload:

            ```
            end
            write memory
            ```
    refs:
      - url: https://www.arista.com/en/um-eos/eos-access-control-lists
        title: Arista EOS Access Control Lists Configuration Guide
