          && values.state == "block-all-sharing"
      )
  - uid: mondoo-aws-security-ebs-snapshot-encrypted
    title: Ensure EBS Snapshots are configured to be encrypted at-rest
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-aws-security-ebs-snapshot-encrypted-aws
        tags:
          mondoo.com/filter-title: AWS EBS Snapshot
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-ebs-snapshot-encrypted-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ebs-snapshot-encrypted-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ebs-snapshot-encrypted-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Amazon EBS snapshots are encrypted at rest using AWS KMS. Snapshots inherit the encryption status of their source volume; snapshots taken from unencrypted volumes remain unencrypted unless explicitly encrypted during a copy operation, and those unencrypted snapshots persist until manually deleted.

        **Why this matters**

        - **Backup data exposure:** Unencrypted snapshots contain an exact copy of the volume's data at snapshot time, including database files, credentials, and application secrets, all readable by anyone who can restore the snapshot.
        - **Cross-account sharing risk:** Unencrypted snapshots can be shared with or copied to any AWS account and restored without any key access requirement, making accidental sharing far more consequential than it would be for encrypted snapshots.
        - **Independent attack surface:** Snapshots exist and persist independently of the running instance or volume; an attacker who compromises snapshot permissions can access backup data even if the original volume is encrypted.
        - **Encrypted volume hygiene:** If the source volume was encrypted but the snapshot was taken before encryption was enabled, the snapshot remains unencrypted even though the current volume is not.

        **Risk mitigation**

        - **Key-gated restoration:** Encrypted snapshots can only be restored by identities with access to the KMS key used for encryption, adding a cryptographic access control layer on top of IAM and snapshot permission checks.
        - **Centralized key management:** Using a customer-managed KMS key provides an audit trail of every decrypt operation against snapshot data and allows access to be revoked by disabling the key without deleting the snapshot.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and open the EC2 console at https://console.aws.amazon.com/ec2/.
        2. In the left navigation pane, under **Elastic Block Store**, choose **Snapshots**.
        3. Select **Owned by me** from the filter bar.
        4. Review the **Encrypted** column for each snapshot.

        A passing snapshot shows **Encrypted** set to **Yes**. A failing snapshot shows **No** in the Encrypted column.

        ### Audit via CLI

        1. List all snapshots owned by the account and check their encryption status:

        ```bash
        aws ec2 describe-snapshots --owner-ids self --query "Snapshots[*].{SnapshotId:SnapshotId,Encrypted:Encrypted}" --output table
        ```

        A passing snapshot shows `Encrypted: true`. A failing snapshot shows `Encrypted: false`.
      remediation:
        - id: console
          desc: |
            To ensure EBS Snapshots are configured to be encrypted at-rest using the AWS Console:

            1. Navigate to the AWS EC2 Console.
            2. Select Snapshots under the Elastic Block Store section.
            3. For unencrypted snapshots, you can create an encrypted copy:
               - Select the unencrypted snapshot.
               - Select Actions, then Copy.
               - In the Copy Snapshot dialog, check Encrypt this snapshot.
               - Choose a KMS key (AWS managed or customer managed).
               - Provide a description and click Copy Snapshot.
            4. After verifying the encrypted copy, consider deleting the unencrypted original.

            To ensure future snapshots are encrypted:
            1. Navigate to EC2 Dashboard > EBS settings.
            2. Enable EBS encryption by default.
        - id: cli
          desc: |
            To ensure EBS Snapshots are configured to be encrypted at-rest using the AWS CLI, check for unencrypted snapshots:

            ```bash
            aws ec2 describe-snapshots --owner-ids self --query "Snapshots[?Encrypted==`false`].SnapshotId"
            ```

            Create an encrypted copy of an unencrypted snapshot:

            ```bash
            aws ec2 copy-snapshot \
              --source-region us-east-1 \
              --source-snapshot-id snap-1234567890abcdef0 \
              --description "Encrypted copy of snapshot" \
              --encrypted \
              --kms-key-id arn:aws:kms:us-east-1:account-id:key/key-id
            ```

            Enable EBS encryption by default for all future volumes and snapshots:

            ```bash
            aws ec2 enable-ebs-encryption-by-default
            ```
        - id: terraform
          desc: |
            To ensure EBS Snapshots are configured to be encrypted at-rest in Terraform:

            ```hcl
            # Enable default EBS encryption for the account
            resource "aws_ebs_encryption_by_default" "example" {
              enabled = true
            }

            # Create a KMS key for EBS encryption
            resource "aws_kms_key" "ebs_encryption" {
              description             = "KMS key for EBS encryption"
              deletion_window_in_days = 10
              enable_key_rotation     = true
            }

            # Set the default KMS key for EBS encryption
            resource "aws_ebs_default_kms_key" "example" {
              key_arn = aws_kms_key.ebs_encryption.arn
            }

            # Create an encrypted snapshot
            resource "aws_ebs_snapshot" "example" {
              volume_id   = aws_ebs_volume.example.id
              description = "Encrypted snapshot"

              # Snapshots will be encrypted if the volume is encrypted
              # or if encryption by default is enabled
            }

            # Create an encrypted volume
            resource "aws_ebs_volume" "example" {
              availability_zone = "us-west-2a"
              size              = 50
              encrypted         = true
              kms_key_id        = aws_kms_key.ebs_encryption.arn
            }
            ```
        - id: cloudformation
          desc: |
            To ensure EBS Snapshots are configured to be encrypted at-rest in CloudFormation, ensure that EBS snapshots are encrypted in CloudFormation:

            ```yaml
            Resources:
              SecureEBSVolume:
                Type: "AWS::EC2::Volume"
                Properties:
                  Size: 20
                  AvailabilityZone: "us-east-1a"
                  Encrypted: true
                  KmsKeyId: !Ref MyKMSKey  # Optional - references a KMS key you define
                  Tags:
                    - Key: "Name"
                      Value: "Secure Volume"

              SecureEBSSnapshot:
                Type: "AWS::EC2::Snapshot"
                Properties:
                  VolumeId: !Ref SecureEBSVolume
                  Description: "Encrypted EBS snapshot"
                  Tags:
                    - Key: "Name"
                      Value: "Secure Snapshot"

              # Optional: Define your own KMS key for encryption
              MyKMSKey:
                Type: "AWS::KMS::Key"
                Properties:
                  Description: "KMS key for EBS volume encryption"
                  EnableKeyRotation: true
                  KeyPolicy:
                    Version: "2012-10-17"
                    Statement:
                      - Effect: "Allow"
                        Principal:
                          AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
                        Action: "kms:*"
                        Resource: "*"
            ```
    refs:
      - url: https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/ec2-security.html
        title: Amazon EC2 Security
      - url: https://docs.aws.amazon.com/ebs/latest/userguide/ebs-encryption.html
        title: Amazon EBS Encryption
  - uid: mondoo-aws-security-ebs-snapshot-encrypted-aws
    filters: asset.platform == "aws-ebs-snapshot"
    mql: |
      aws.ec2.snapshot.encrypted == true
  - uid: mondoo-aws-security-ebs-snapshot-encrypted-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_ebs_snapshot")
    mql: |
      terraform.resources.where(nameLabel == "aws_ebs_snapshot").all(
        arguments['encrypted'] == true
      )
  - uid: mondoo-aws-security-ebs-snapshot-encrypted-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_ebs_snapshot")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_ebs_snapshot").all(
        change.after.encrypted == true
      )
  - uid: mondoo-aws-security-ebs-snapshot-encrypted-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_ebs_snapshot")
    mql: |
      terraform.state.resources.where(type == "aws_ebs_snapshot").all(
        values.encrypted == true
      )
  - uid: mondoo-aws-security-ec2-encrypted-volumes
    title: Ensure attached EBS volumes are configured to be encrypted at-rest
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-aws-security-ec2-encrypted-volumes-aws
        tags:
          mondoo.com/filter-title: AWS EBS Volume
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-ec2-encrypted-volumes-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ec2-encrypted-volumes-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ec2-encrypted-volumes-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ec2-encrypted-volumes-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that EBS volumes attached to EC2 instances are encrypted at rest using AWS KMS. AWS introduced account-level EBS encryption by default in 2019, but that setting applies only to newly created volumes in regions where it has been explicitly enabled; existing volumes created before the setting was activated, volumes created in regions where it was not enabled, and volumes created before migration remain unencrypted unless individually addressed.

        **Why this matters**

        - **Storage media access:** Without volume encryption, data written to disk is readable at the storage infrastructure level without requiring any AWS credentials, database authentication, or application-layer access.
        - **Snapshot inheritance:** Snapshots taken from unencrypted volumes remain unencrypted and can be restored or shared without any key access requirement, extending the exposure beyond the lifecycle of the original instance.
        - **Pre-2019 volume risk:** Volumes created before the account-level default was enabled may still be running unencrypted in production, and automated scans are the only reliable way to detect them at scale.
        - **Defense-in-depth:** Volume encryption provides a layer of protection that remains effective even if network controls, IAM policies, or application-layer authentication are bypassed or misconfigured.

        **Risk mitigation**

        - **Transparent at-rest protection:** KMS-based EBS encryption is applied below the filesystem layer, requiring no application changes while ensuring all data written to the volume is automatically encrypted and only readable by authorized identities.
        - **Key-level access control:** Attaching a customer-managed KMS key lets the account owner audit every decrypt operation against volume data and restrict or revoke decryption access independently of the EC2 instance permissions.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and open the EC2 console at https://console.aws.amazon.com/ec2/.
        2. In the left navigation pane, under **Elastic Block Store**, choose **Volumes**.
        3. Review the **Encrypted** column for each volume that is in the **in-use** state.

        A passing volume shows **Yes** in the Encrypted column. A failing volume shows **No**.

        ### Audit via CLI

        1. List all EBS volumes and their encryption status:

        ```bash
        aws ec2 describe-volumes --query "Volumes[?State=='in-use'].{VolumeId:VolumeId,Encrypted:Encrypted,State:State}" --output table
        ```

        A passing volume shows `Encrypted: true`. A failing volume shows `Encrypted: false`.
      remediation:
        - id: console
          desc: |
            To ensure attached EBS volumes are configured to be encrypted at-rest using the AWS Console:

            1. Navigate to the AWS EC2 Console.
            2. Select Volumes under the Elastic Block Store section.
            3. For unencrypted volumes, create encrypted replacements:
               a. First, create a snapshot of the unencrypted volume:
                  - Select the unencrypted volume.
                  - Choose Actions > Create Snapshot.
                  - Add a description and tags, then click Create Snapshot.
               b. Create an encrypted copy of the snapshot:
                  - Go to Snapshots, select the newly created snapshot.
                  - Choose Actions > Copy.
                  - Check Encrypt this snapshot.
                  - Select a KMS key.
                  - Click Copy Snapshot.
               c. Create a new encrypted volume from the encrypted snapshot:
                  - Select the encrypted snapshot.
                  - Choose Actions > Create Volume.
                  - Configure the volume size and type.
                  - Verify Encryption is enabled.
                  - Click Create Volume.
               d. Attach the new encrypted volume:
                  - Stop the EC2 instance.
                  - Detach the original unencrypted volume.
                  - Attach the new encrypted volume.
                  - Start the instance.

            4. For future volumes, enable EBS encryption by default:
               - Go to EC2 Dashboard > EBS settings.
               - Select Manage under EBS encryption.
               - Check Always encrypt new EBS volumes.
               - Click Update.
        - id: cli
          desc: |
            To ensure attached EBS volumes are configured to be encrypted at-rest using the AWS CLI, check for unencrypted volumes:

            ```bash
            aws ec2 describe-volumes --query "Volumes[?Encrypted==`false`].VolumeId"
            ```

            Create a snapshot of an unencrypted volume:

            ```bash
            aws ec2 create-snapshot \
              --volume-id vol-1234567890abcdef0 \
              --description "Snapshot of unencrypted volume"
            ```

            Create an encrypted copy of the snapshot:

            ```bash
            aws ec2 copy-snapshot \
              --source-region us-east-1 \
              --source-snapshot-id snap-1234567890abcdef0 \
              --description "Encrypted copy of snapshot" \
              --encrypted \
              --kms-key-id arn:aws:kms:us-east-1:account-id:key/key-id
            ```

            Create a new encrypted volume from the encrypted snapshot:

            ```bash
            aws ec2 create-volume \
              --availability-zone us-east-1a \
              --snapshot-id snap-0abcdef1234567890 \
              --volume-type gp3
            ```

            Stop the instance, detach the old volume, and attach the new volume:

            ```bash
            aws ec2 stop-instances --instance-ids i-1234567890abcdef0

            aws ec2 detach-volume --volume-id vol-1234567890abcdef0

            aws ec2 attach-volume \
              --volume-id vol-0abcdef1234567890 \
              --instance-id i-1234567890abcdef0 \
              --device /dev/sda1

            aws ec2 start-instances --instance-ids i-1234567890abcdef0
            ```

            Enable EBS encryption by default:

            ```bash
            aws ec2 enable-ebs-encryption-by-default
            ```
        - id: terraform
          desc: |
            To ensure attached EBS volumes are configured to be encrypted at-rest in Terraform:

            ```hcl
            # Enable default EBS encryption for the account
            resource "aws_ebs_encryption_by_default" "example" {
              enabled = true
            }

            # Create a KMS key for EBS encryption
            resource "aws_kms_key" "ebs_encryption" {
              description             = "KMS key for EBS encryption"
              deletion_window_in_days = 10
              enable_key_rotation     = true
            }

            # Set the default KMS key for EBS encryption
            resource "aws_ebs_default_kms_key" "example" {
              key_arn = aws_kms_key.ebs_encryption.arn
            }

            # Create an encrypted volume
            resource "aws_ebs_volume" "encrypted_volume" {
              availability_zone = "us-west-2a"
              size              = 50
              encrypted         = true
              kms_key_id        = aws_kms_key.ebs_encryption.arn

              tags = {
                Name = "encrypted-volume"
              }
            }

            # EC2 instance with encrypted root and additional volumes
            resource "aws_instance" "example" {
              ami           = "ami-12345678"
              instance_type = "t3.micro"

              root_block_device {
                volume_size = 20
                volume_type = "gp3"
                encrypted   = true
                kms_key_id  = aws_kms_key.ebs_encryption.arn
              }

              ebs_block_device {
                device_name = "/dev/sdf"
                volume_size = 50
                volume_type = "gp3"
                encrypted   = true
                kms_key_id  = aws_kms_key.ebs_encryption.arn
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure attached EBS volumes are configured to be encrypted at-rest in CloudFormation, ensure EBS volumes are encrypted:

            ```yaml
            Resources:
              SecureInstance:
                Type: "AWS::EC2::Instance"
                Properties:
                  ImageId: "ami-12345678"
                  InstanceType: "t3.micro"
                  BlockDeviceMappings:
                    - DeviceName: "/dev/sda1"
                      Ebs:
                        VolumeSize: 20
                        Encrypted: true
                        KmsKeyId: !Ref "AWS::NoValue"  # Uses AWS-managed key by default
                    - DeviceName: "/dev/sdf"
                      Ebs:
                        VolumeSize: 50
                        Encrypted: true
                        KmsKeyId: !Ref "AWS::NoValue"  # Uses AWS-managed key by default
            ```
