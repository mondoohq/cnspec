    variants:
      - uid: mondoo-aws-security-dax-encryption-in-transit-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-dax-encryption-in-transit-terraform-hcl
        tags:
