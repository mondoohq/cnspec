  - uid: mondoo-aws-security-emr-logging-enabled
    title: Ensure EMR clusters have logging enabled
    impact: 50
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-pr-pt-1
      compliance/nist-csf-2: nist-csf-2-pr-ps-04
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    variants:
      - uid: mondoo-aws-security-emr-logging-enabled-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-emr-logging-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-emr-logging-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-emr-logging-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-emr-logging-enabled-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon EMR clusters have logging enabled by configuring an S3 log URI. EMR cluster logs include step logs, application logs, and bootstrap action logs that provide operational and security visibility into cluster activity.

        **Why this matters**

        - Without an S3 log URI, EMR cluster logs are only available on the cluster nodes themselves and are lost when the cluster terminates.
        - EMR logs contain critical information for debugging failed jobs, auditing data processing activity, and investigating security incidents.
        - Persisting logs to S3 enables long-term retention, centralized analysis, and integration with SIEM or log aggregation systems.

        **Risk mitigation**

        - **Operational visibility:** Persistent logs enable post-mortem analysis of failed jobs and performance issues.
        - **Security auditing:** Logs capture information about data access patterns, authentication events, and job execution that support security investigations.
        - **Compliance:** Meets logging and audit trail requirements under NIST SP 800-53 AU-6 and SOC 2 CC7.2.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and navigate to **Amazon EMR**.
        2. Select the cluster to review.
        3. Choose the **Summary** tab.
        4. Under **Log URI**, verify that an S3 path is configured for log storage.

        A passing cluster shows a populated **Log URI** field pointing to an S3 location. A failing cluster shows no Log URI or an empty value.

        ### Audit via CLI

        1. Check the log URI configured for an EMR cluster:

        ```bash
        aws emr describe-cluster \
          --cluster-id <cluster-id> \
          --query "Cluster.LogUri"
        ```

        A passing cluster returns a non-empty S3 URI such as `"s3://my-bucket/emr-logs/"`. A failing cluster returns `null` or an empty string.
      remediation:
        - id: console
          desc: |
            To ensure EMR clusters have logging enabled using the AWS Console, note: Log settings cannot be changed on a running cluster. You must configure logging when launching a new cluster.

            1. Navigate to the **Amazon EMR Console** and choose **Create cluster**.
            2. Under **General Configuration**, enable **Logging**.
            3. Specify an S3 bucket and optional prefix for log storage.
            4. Complete the cluster configuration and launch.
        - id: cli
          desc: |
            To ensure EMR clusters have logging enabled using the AWS CLI, create a cluster with logging enabled:

            ```bash
            aws emr run-job-flow \
              --name "logged-cluster" \
              --log-uri s3://<bucket>/emr-logs/ \
              --release-label emr-7.0.0 \
              --instances InstanceGroups='[{"InstanceRole":"MASTER","InstanceType":"m5.xlarge","InstanceCount":1},{"InstanceRole":"CORE","InstanceType":"m5.xlarge","InstanceCount":2}]'
            ```

            Check if an existing cluster has logging configured:

            ```bash
            aws emr describe-cluster --cluster-id <cluster-id> \
              --query "Cluster.LogUri"
            ```
        - id: terraform
          desc: |
            To ensure EMR clusters have logging enabled in Terraform:

            ```hcl
            resource "aws_emr_cluster" "example" {
              name          = "logged-cluster"
              release_label = "emr-7.0.0"
              service_role  = aws_iam_role.emr.arn
              log_uri       = "s3://my-bucket/emr-logs/"

              master_instance_group {
                instance_type = "m5.xlarge"
              }

              core_instance_group {
                instance_type  = "m5.xlarge"
                instance_count = 2
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure EMR clusters have logging enabled in CloudFormation:

            ```yaml
            Resources:
              EMRCluster:
                Type: AWS::EMR::Cluster
                Properties:
                  Name: logged-cluster
                  ReleaseLabel: emr-7.0.0
                  LogUri: s3://my-bucket/emr-logs/
                  Instances:
                    MasterInstanceGroup:
                      InstanceCount: 1
                      InstanceType: m5.xlarge
                    CoreInstanceGroup:
                      InstanceCount: 2
                      InstanceType: m5.xlarge
                  JobFlowRole: !Ref EMRInstanceProfile
                  ServiceRole: !Ref EMRServiceRole
            ```
    refs:
      - url: https://docs.aws.amazon.com/emr/latest/ManagementGuide/emr-plan-debugging.html
        title: Amazon EMR - Configure Cluster Logging and Debugging
      - url: https://docs.aws.amazon.com/securityhub/latest/userguide/emr-controls.html
        title: AWS Security Hub - EMR controls reference
