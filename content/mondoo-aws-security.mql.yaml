            Create the metric filter:

            ```bash
            aws logs put-metric-filter \
              --log-group-name <cloudtrail-log-group> \
              --filter-name ConsoleAuthenticationFailures \
              --filter-pattern '{ ($.eventName = ConsoleLogin) && ($.errorMessage = "Failed authentication") }' \
              --metric-transformations metricName=ConsoleAuthenticationFailures,metricNamespace=CISBenchmark,metricValue=1
            ```

