  - uid: mondoo-aws-security-ecr-repository-cmk-encryption
    title: Ensure ECR repositories use KMS encryption
    impact: 60
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-aws-security-ecr-repository-cmk-encryption-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-ecr-repository-cmk-encryption-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ecr-repository-cmk-encryption-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ecr-repository-cmk-encryption-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ecr-repository-cmk-encryption-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon ECR repositories are configured to use AWS KMS encryption instead of the default AES-256 encryption. Customer-managed KMS encryption provides additional control over the encryption keys used to protect container images at rest.

        **Why this matters**

        Using the default AES-256 encryption limits control over encryption key management:

        - **Key management:** With default encryption, AWS manages the encryption keys and organizations cannot control key policies, rotation, or access.
        - **Audit trail:** KMS encryption provides CloudTrail logging of all key usage, enabling detailed audit trails.
        - **Access control:** KMS key policies provide fine-grained control over which principals can encrypt and decrypt images.

        **Risk mitigation**

        - **Enhanced control:** Organizations can manage key policies, enforce key rotation, and revoke access as needed.
        - **Compliance:** Meets regulatory requirements that mandate customer-managed encryption keys.
        - **Auditability:** All encryption and decryption operations are logged in CloudTrail.
      remediation:
        - id: console
          desc: |
            To ensure ECR repositories use KMS encryption using the AWS Console:

            1. Navigate to the **Amazon ECR Console**.
            2. Select **Repositories** in the left panel.
            3. To configure KMS encryption, you must create a new repository (encryption type cannot be changed after creation).
            4. Choose **Create repository**.
            5. Under **Encryption settings**, select **KMS encryption**.
            6. Choose an existing KMS key or create a new one.
            7. Complete the repository creation.
            8. Migrate images from the old repository to the new KMS-encrypted repository.
        - id: cli
          desc: |
            To ensure ECR repositories use KMS encryption using the AWS CLI, create an ECR repository with KMS encryption:

            ```bash
            aws ecr create-repository \
              --repository-name <repository-name> \
              --encryption-configuration encryptionType=KMS,kmsKey=arn:aws:kms:region:account-id:key/key-id
            ```

            Check the encryption configuration of existing repositories:

            ```bash
            aws ecr describe-repositories \
              --query "repositories[*].{Name:repositoryName,EncryptionType:encryptionConfiguration.encryptionType}"
            ```
        - id: terraform
          desc: |
            To ensure ECR repositories use KMS encryption in Terraform, configure an ECR repository with KMS encryption:

            ```hcl
            resource "aws_ecr_repository" "example" {
              name = "example-repo"

              encryption_configuration {
                encryption_type = "KMS"
                kms_key         = aws_kms_key.ecr.arn
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure ECR repositories use KMS encryption in CloudFormation, configure an ECR repository with KMS encryption:

            ```yaml
            Resources:
              MyECRRepository:
                Type: AWS::ECR::Repository
                Properties:
                  RepositoryName: example-repo
                  EncryptionConfiguration:
                    EncryptionType: KMS
                    KmsKey: !GetAtt ECRKmsKey.Arn
            ```
    refs:
      - url: https://docs.aws.amazon.com/AmazonECR/latest/userguide/encryption-at-rest.html
        title: AWS Documentation - Encryption at rest for Amazon ECR
  - uid: mondoo-aws-security-ecr-repository-cmk-encryption-aws
    filters: asset.platform == "aws"
    mql: aws.ecr.privateRepositories.all( encryptionType == "KMS" )
  - uid: mondoo-aws-security-ecr-repository-cmk-encryption-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_ecr_repository")
    mql: |
      terraform.resources.where(nameLabel == "aws_ecr_repository").all(
        blocks.where(type == "encryption_configuration").length > 0 &&
        blocks.where(type == "encryption_configuration").all(arguments['encryption_type'] == "KMS")
      )
  - uid: mondoo-aws-security-ecr-repository-cmk-encryption-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_ecr_repository")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_ecr_repository").all(
        change.after['encryption_configuration'] != empty &&
        change.after['encryption_configuration'].all(_['encryption_type'] == "KMS")
      )
  - uid: mondoo-aws-security-ecr-repository-cmk-encryption-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_ecr_repository")
    mql: |
      terraform.state.resources.where(type == "aws_ecr_repository").all(
        values['encryption_configuration'] != empty &&
        values['encryption_configuration'].all(_['encryption_type'] == "KMS")
      )
  - uid: mondoo-aws-security-ecr-repository-cmk-encryption-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::ECR::Repository")
    mql: |
      cloudformation.template.resources.where(type == "AWS::ECR::Repository").all(
        properties['EncryptionConfiguration']['EncryptionType'] == "KMS"
      )
  - uid: mondoo-aws-security-neptune-cluster-log-export
    title: Ensure Neptune clusters have audit log export enabled
    impact: 60
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    variants:
      - uid: mondoo-aws-security-neptune-cluster-log-export-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-neptune-cluster-log-export-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-neptune-cluster-log-export-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-neptune-cluster-log-export-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-neptune-cluster-log-export-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon Neptune DB clusters have audit log export to CloudWatch Logs enabled. Without exported audit logs, attacks against the graph database -- including unauthorized graph traversal to map relationships between entities, authentication brute-force attempts, and privilege abuse by over-permissioned users -- are invisible to security monitoring and incident response teams.

        **Why this matters**

        Without audit log export, Neptune database attacks cannot be detected or investigated:

        - **Unauthorized graph traversal:** Attackers can traverse the graph to map sensitive relationships (such as organizational hierarchies, access paths, or data lineage) without any record of the queries they executed.
        - **Authentication brute force:** Failed authentication attempts against the Neptune cluster are not visible to centralized security monitoring, allowing credential attacks to proceed undetected.
        - **Privilege abuse:** Over-permissioned users or compromised service accounts can execute unauthorized queries or administrative actions without leaving a forensic trail outside the cluster.

        **Risk mitigation**

        - **Attack detection:** Enables real-time alerting on suspicious query patterns, failed authentication attempts, and unauthorized administrative actions through CloudWatch.
        - **Forensic investigation:** Provides audit trails that allow security teams to reconstruct attacker activity, identify compromised accounts, and determine the scope of data exposure.
        - **Anomaly detection:** Centralized logs enable baselining of normal query patterns so that unauthorized graph traversal or bulk data extraction can be identified.
      remediation:
        - id: console
          desc: |
            To ensure Neptune clusters have audit log export enabled using the AWS Console:

            1. Navigate to the **Amazon Neptune Console**.
            2. Select **Databases** in the left panel.
            3. Select the Neptune cluster to configure.
            4. Choose **Modify**.
            5. Under **Log exports**, enable **Audit log**.
            6. Choose **Apply immediately** or during the next maintenance window.
            7. Save the changes.
        - id: cli
          desc: |
            To ensure Neptune clusters have audit log export enabled using the AWS CLI, enable audit log export for a Neptune cluster:

            ```bash
            aws neptune modify-db-cluster \
              --db-cluster-identifier <cluster-id> \
              --cloudwatch-logs-export-configuration '{"EnableLogTypes":["audit"]}' \
              --apply-immediately
            ```

            Verify log export configuration:

            ```bash
            aws neptune describe-db-clusters \
              --db-cluster-identifier <cluster-id> \
              --query "DBClusters[*].{ClusterId:DBClusterIdentifier,LogExports:EnabledCloudwatchLogsExports}"
            ```
        - id: terraform
          desc: |
            To ensure Neptune clusters have audit log export enabled in Terraform, configure a Neptune cluster with audit log export:

            ```hcl
            resource "aws_neptune_cluster" "example" {
              cluster_identifier                   = "example-neptune"
              engine                               = "neptune"
              enable_cloudwatch_logs_exports        = ["audit"]
            }
            ```
        - id: cloudformation
          desc: |
            To ensure Neptune clusters have audit log export enabled in CloudFormation, configure a Neptune cluster with audit log export:

            ```yaml
            Resources:
              MyNeptuneCluster:
                Type: AWS::Neptune::DBCluster
                Properties:
                  DBClusterIdentifier: example-neptune
                  EnableCloudwatchLogsExports:
                    - audit
            ```
    refs:
      - url: https://docs.aws.amazon.com/neptune/latest/userguide/auditing.html
        title: AWS Documentation - Auditing Amazon Neptune
  - uid: mondoo-aws-security-neptune-cluster-log-export-aws
    filters: asset.platform == "aws-neptune-cluster"
