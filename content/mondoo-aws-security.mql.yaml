  - uid: mondoo-aws-security-secgroup-restricted-docker-daemon
    title: Ensure security groups restrict incoming Docker daemon traffic
    impact: 100
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-6
    variants:
      - uid: mondoo-aws-security-secgroup-restricted-docker-daemon-aws
        tags:
          mondoo.com/filter-title: AWS Security Group
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-secgroup-restricted-docker-daemon-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-secgroup-restricted-docker-daemon-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-secgroup-restricted-docker-daemon-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-secgroup-restricted-docker-daemon-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that AWS security groups do not allow inbound traffic on Docker daemon API ports (2375 plaintext, 2376 TLS) from `0.0.0.0/0` or `::/0`. The Docker daemon API is the equivalent of root on the host; any reachable client can spawn privileged containers and escape to the host filesystem.

        **Why this matters**

        - Port 2375 is unauthenticated by default. An exposed daemon allows any internet client to launch a container that mounts the host's `/` filesystem and writes to `/etc/cron.d`, instantly achieving root.
        - Even the TLS port 2376 must not be reachable from the internet; mTLS materials should be the only access path and they should be distributed through a private network.
      remediation:
        - id: cli
          desc: |
            ```bash
            aws ec2 revoke-security-group-ingress \
              --group-id <sg-id> \
              --ip-permissions IpProtocol=tcp,FromPort=2375,ToPort=2376,IpRanges='[{CidrIp=0.0.0.0/0}]'
            ```

            Prefer disabling the daemon's TCP socket entirely and using SSH-based contexts instead.
        - id: terraform
          desc: |
            Replace any `0.0.0.0/0` or `::/0` source on ports 2375-2376 with the application-tier security group, VPN CIDR, or specific bastion address. The example shows the modern `aws_vpc_security_group_ingress_rule` form; the same rule applies to inline `ingress` blocks on `aws_security_group`:

            ```hcl
            resource "aws_vpc_security_group_ingress_rule" "from_app" {
              security_group_id            = aws_security_group.workload.id
              referenced_security_group_id = aws_security_group.app.id
              ip_protocol                  = "tcp"
              from_port                    = 2375
              to_port                      = 2376
            }
