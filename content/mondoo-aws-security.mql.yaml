      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-aws-security-documentdb-snapshot-encrypted-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
    docs:
      desc: |
        This check ensures that Amazon DocumentDB cluster snapshots are encrypted at rest. Snapshots contain a complete backup of cluster data and, if unencrypted, could expose sensitive document data if the snapshot is shared, copied to another region, or accessed by unauthorized users.

        **Why this matters**

        - DocumentDB snapshots contain a full copy of all data in the cluster at the time the snapshot was taken.
        - Unencrypted snapshots can be shared with other AWS accounts or copied across regions without encryption protection.
        - If an unencrypted snapshot is inadvertently shared or an account is compromised, all document data is exposed in plaintext.
        - Snapshot encryption inherits from the source cluster; clusters must be created with encryption enabled to produce encrypted snapshots.

        **Risk mitigation**

        - **Data-at-rest encryption:** Ensures all backup data is encrypted using AWS KMS.
        - **Safe sharing:** Encrypted snapshots maintain protection even when shared across accounts.
        - **Compliance:** Meets encryption requirements for database backups and disaster recovery data.
      remediation:
        - id: console
          desc: |
            To ensure DocumentDB cluster snapshots are encrypted at rest using the AWS Console, documentDB snapshot encryption is inherited from the source cluster. To ensure encrypted snapshots:

            1. Navigate to the Amazon DocumentDB Console.
            2. Create a new cluster with **Encryption-at-rest** enabled.
            3. Migrate data from the unencrypted cluster to the new encrypted cluster.
            4. Delete the old unencrypted cluster and its snapshots.
        - id: cli
          desc: |
            To ensure DocumentDB cluster snapshots are encrypted at rest using the AWS CLI, check if snapshots are encrypted:

            ```bash
            aws docdb describe-db-cluster-snapshots \
              --query "DBClusterSnapshots[*].{SnapshotId:DBClusterSnapshotIdentifier,Encrypted:StorageEncrypted}"
            ```

            To create an encrypted cluster (snapshots will inherit encryption):

            ```bash
            aws docdb create-db-cluster \
              --db-cluster-identifier secure-docdb-cluster \
              --engine docdb \
              --master-username admin \
              --master-user-password <password> \
              --storage-encrypted \
              --kms-key-id arn:aws:kms:region:account-id:key/key-id
            ```
        - id: terraform
          desc: |
            To ensure DocumentDB cluster snapshots are encrypted at rest in Terraform, documentDB snapshot encryption is inherited from the source cluster. Ensure the cluster is created with encryption enabled:

            ```hcl
            resource "aws_docdb_cluster" "example" {
              cluster_identifier = "secure-docdb-cluster"
              engine             = "docdb"
              master_username    = "admin"
              master_password    = var.docdb_password
              storage_encrypted  = true
              kms_key_id         = aws_kms_key.docdb.arn
            }
            ```

            Snapshots created from this cluster will automatically inherit encryption.
        - id: cloudformation
          desc: |
            To ensure DocumentDB cluster snapshots are encrypted at rest in CloudFormation, documentDB snapshot encryption is inherited from the source cluster. Ensure the cluster is created with encryption enabled:

            ```yaml
            Resources:
              DocDBCluster:
                Type: AWS::DocDB::DBCluster
                Properties:
                  DBClusterIdentifier: secure-docdb-cluster
                  MasterUsername: admin
                  MasterUserPassword: !Ref DocDBPassword
                  StorageEncrypted: true
                  KmsKeyId: !Ref DocDBKmsKey
            ```

            Snapshots created from this cluster will automatically inherit encryption.
    refs:
      - url: https://docs.aws.amazon.com/documentdb/latest/developerguide/encryption-at-rest.html
        title: Amazon DocumentDB Encryption at Rest
      - url: https://docs.aws.amazon.com/documentdb/latest/developerguide/backup_restore-dump_restore_docdb.html
        title: Amazon DocumentDB Migrating Data
  - uid: mondoo-aws-security-documentdb-snapshot-encrypted-aws
    filters: asset.platform == "aws"
    mql: aws.documentdb.snapshots.all(storageEncrypted == true)
  - uid: mondoo-aws-security-memorydb-snapshot-cmk-encryption
    title: Ensure MemoryDB snapshots are encrypted with a customer-managed KMS key
    impact: 70
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-aws-security-memorydb-snapshot-cmk-encryption-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-memorydb-snapshot-cmk-encryption-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-memorydb-snapshot-cmk-encryption-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-memorydb-snapshot-cmk-encryption-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Amazon MemoryDB snapshots are encrypted with a customer-managed KMS key rather than the default AWS-managed key. Customer-managed keys provide greater control over the encryption lifecycle, including key rotation, access policies, and audit capabilities.

        **Why this matters**

        - MemoryDB snapshots contain a full copy of in-memory data that may include session data, cached credentials, or other sensitive application state.
        - Using AWS-managed keys limits control over key rotation policies and access auditing.
        - Customer-managed KMS keys enable fine-grained access control through key policies and IAM, restricting who can decrypt snapshot data.
        - Key rotation and deletion policies provide additional security controls for managing the encryption lifecycle.

        **Risk mitigation**

        - **Key control:** Provides full control over the encryption key lifecycle including rotation and deletion.
        - **Access auditing:** CloudTrail logs all uses of customer-managed keys for compliance auditing.
        - **Granular access:** Key policies enable fine-grained control over who can access encrypted snapshot data.
      remediation:
        - id: console
          desc: |
            To ensure MemoryDB snapshots are encrypted with a customer-managed KMS key using the AWS Console, memoryDB snapshot encryption is inherited from the source cluster. To ensure snapshots are encrypted with a CMK:

            1. Navigate to the Amazon MemoryDB Console.
            2. Create a new cluster with a customer-managed KMS key selected for encryption.
            3. Migrate data from the existing cluster to the new cluster.
        - id: cli
          desc: |
            To ensure MemoryDB snapshots are encrypted with a customer-managed KMS key using the AWS CLI, check snapshot encryption:

            ```bash
            aws memorydb describe-snapshots \
              --query "Snapshots[*].{Name:Name,KmsKeyId:KmsKeyId}"
            ```

            Create a cluster with CMK encryption (snapshots will inherit):

            ```bash
            aws memorydb create-cluster \
              --cluster-name secure-cluster \
              --node-type db.r6g.large \
              --acl-name my-acl \
              --kms-key-id arn:aws:kms:region:account-id:key/key-id
            ```
        - id: terraform
          desc: |
            To ensure MemoryDB snapshots are encrypted with a customer-managed KMS key in Terraform, memoryDB snapshot encryption is inherited from the source cluster. Specify a `kms_key_arn` on the snapshot or ensure the cluster uses a CMK:

            ```hcl
            resource "aws_memorydb_snapshot" "example" {
              cluster_name = aws_memorydb_cluster.example.name
              name         = "example-snapshot"
              kms_key_arn  = aws_kms_key.memorydb.arn
            }
            ```
        - id: cloudformation
          desc: |
            To ensure MemoryDB snapshots are encrypted with a customer-managed KMS key in CloudFormation, specify a KMS key when creating a MemoryDB snapshot:

            ```yaml
            Resources:
              MemoryDBSnapshot:
                Type: AWS::MemoryDB::Snapshot
                Properties:
                  ClusterName: !Ref MemoryDBCluster
                  SnapshotName: example-snapshot
                  KmsKeyId: !Ref MemoryDBKmsKey
            ```
    refs:
      - url: https://docs.aws.amazon.com/memorydb/latest/devguide/at-rest-encryption.html
        title: AWS Documentation - MemoryDB Encryption at Rest
      - url: https://docs.aws.amazon.com/kms/latest/developerguide/concepts.html#customer-cmk
        title: AWS KMS Customer Managed Keys
  - uid: mondoo-aws-security-memorydb-snapshot-cmk-encryption-aws
    filters: asset.platform == "aws"
    mql: aws.memorydb.snapshots.all(kmsKey != empty)
  - uid: mondoo-aws-security-memorydb-snapshot-cmk-encryption-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_memorydb_snapshot")
    mql: |
      terraform.resources.where(nameLabel == "aws_memorydb_snapshot").all(
      arguments.kms_key_arn != empty
      )
  - uid: mondoo-aws-security-memorydb-snapshot-cmk-encryption-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_memorydb_snapshot")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_memorydb_snapshot").all(
      change.after.kms_key_arn != empty
      )
  - uid: mondoo-aws-security-memorydb-snapshot-cmk-encryption-terraform-state
