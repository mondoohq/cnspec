  - uid: mondoo-aws-security-secgroup-no-unrestricted-egress
    title: Ensure security groups do not allow unrestricted egress
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-2
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-aws-security-secgroup-no-unrestricted-egress-aws
        tags:
          mondoo.com/filter-title: AWS Security Group
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-secgroup-no-unrestricted-egress-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-secgroup-no-unrestricted-egress-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-secgroup-no-unrestricted-egress-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-secgroup-no-unrestricted-egress-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that AWS VPC security groups are configured to deny unrestricted outbound traffic to all destinations on all protocols. By default, newly created security groups in AWS include an outbound rule allowing all traffic to `0.0.0.0/0`; restricting egress to only required destinations and ports limits the damage an attacker can do with a compromised resource.

        **Why this matters**

        - **Data exfiltration containment:** Broad egress rules allow compromised instances to send data to any external host, enabling attackers to exfiltrate sensitive data unimpeded.
        - **Command-and-control disruption:** Restricting outbound traffic prevents malware from establishing connections to attacker-controlled command-and-control infrastructure.
        - **Lateral movement limitation:** Controlled egress reduces the ability of a compromised instance to scan or attack external targets, limiting the blast radius of a breach.
        - **Defense-in-depth enforcement:** Egress filtering complements ingress controls by ensuring that even if an attacker gains execution inside the network, outbound communication is restricted.

        **Risk mitigation**

        - **Exfiltration prevention:** Allowing only necessary outbound connections eliminates the primary channel attackers use to remove data from a compromised environment.
        - **Malware impact reduction:** Blocking arbitrary outbound connections prevents ransomware and other malware from communicating with external infrastructure for key exchange or instructions.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and navigate to the **EC2** service.
        2. Select **Security Groups** under **Network & Security** in the left navigation pane.
        3. For each security group, select the group and open the **Outbound rules** tab.
        4. Review the outbound rules for any rule with protocol set to **All traffic**, destination **0.0.0.0/0** (or **::/0** for IPv6), and all port ranges.
        5. Any security group that has such a rule is not compliant.

        A passing security group has no outbound rule permitting all traffic to 0.0.0.0/0 or ::/0 on all protocols. A failing security group has at least one such unrestricted egress rule.

        ### Audit via CLI

        1. List security groups that have an unrestricted egress rule allowing all traffic:

        ```bash
        aws ec2 describe-security-groups \
          --query "SecurityGroups[?IpPermissionsEgress[?IpProtocol=='-1' && IpRanges[?CidrIp=='0.0.0.0/0']]].{GroupId:GroupId,GroupName:GroupName,VpcId:VpcId}"
        ```

        2. Also check for IPv6 unrestricted egress:

        ```bash
        aws ec2 describe-security-groups \
          --query "SecurityGroups[?IpPermissionsEgress[?IpProtocol=='-1' && Ipv6Ranges[?CidrIpv6=='::/0']]].{GroupId:GroupId,GroupName:GroupName,VpcId:VpcId}"
        ```

        A passing account returns an empty list for both commands. A failing account returns one or more security groups with unrestricted egress rules.
      remediation:
        - id: console
          desc: |
            To ensure security groups do not allow unrestricted egress using the AWS Console:

            1. Navigate to the AWS EC2 Console.
            2. Select Security Groups from the left panel under Network & Security.
            3. Identify security groups with an outbound rule allowing all traffic (0.0.0.0/0, all protocols, all ports).
            4. Select the security group and choose the Outbound rules tab.
            5. Select Edit outbound rules.
            6. Remove or replace the unrestricted rule with specific rules that allow only required destinations and ports.
            7. Select Save rules.
        - id: cli
          desc: |
            To ensure security groups do not allow unrestricted egress using the AWS CLI, list security groups with unrestricted egress:

            ```bash
            aws ec2 describe-security-groups \
              --query "SecurityGroups[?IpPermissionsEgress[?IpRanges[?CidrIp=='0.0.0.0/0'] && FromPort==\`0\` && ToPort==\`0\`]].{GroupId:GroupId,GroupName:GroupName}"
            ```

            Remove the unrestricted egress rule:

            ```bash
            aws ec2 revoke-security-group-egress \
              --group-id <sg-id> \
              --ip-permissions IpProtocol=-1,IpRanges='[{CidrIp=0.0.0.0/0}]'
            ```

            Add a specific outbound rule to allow only required traffic:

            ```bash
            aws ec2 authorize-security-group-egress \
              --group-id <sg-id> \
              --ip-permissions IpProtocol=tcp,FromPort=443,ToPort=443,IpRanges='[{CidrIp=0.0.0.0/0}]'
            ```
        - id: terraform
          desc: |
            To ensure security groups do not allow unrestricted egress in Terraform, restrict egress rules to specific destinations instead of allowing all traffic:

            ```hcl
            resource "aws_security_group" "example" {
              name        = "restricted-egress"
              description = "Security group with restricted egress"
              vpc_id      = aws_vpc.example.id

              egress {
                from_port   = 443
                to_port     = 443
                protocol    = "tcp"
                cidr_blocks = ["0.0.0.0/0"]
                description = "Allow HTTPS outbound"
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure security groups do not allow unrestricted egress in CloudFormation:

            ```yaml
            Resources:
              RestrictedEgressSG:
                Type: AWS::EC2::SecurityGroup
                Properties:
                  GroupDescription: Security group with restricted egress
                  VpcId: !Ref VPC
                  SecurityGroupEgress:
                    - IpProtocol: tcp
                      FromPort: 443
                      ToPort: 443
                      CidrIp: 0.0.0.0/0
                      Description: Allow HTTPS outbound
            ```
    refs:
      - url: https://docs.aws.amazon.com/vpc/latest/userguide/vpc-security-groups.html
        title: AWS Documentation - Control traffic to your AWS resources using security groups
      - url: https://docs.aws.amazon.com/securityhub/latest/userguide/ec2-controls.html
        title: AWS Security Hub - EC2 controls reference
  - uid: mondoo-aws-security-secgroup-no-unrestricted-egress-aws
    filters: asset.platform == "aws-security-group"
    mql: |
      aws.ec2.securitygroup.ipPermissionsEgress.where(
        ipProtocol == "-1").none(
          ipRanges.contains("0.0.0.0/0") || ipRanges.contains("::/0")
          )
  - uid: mondoo-aws-security-secgroup-no-unrestricted-egress-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_security_group")
    mql: |
      terraform.resources.where(nameLabel == "aws_security_group").all(
      arguments.egress == empty || arguments.egress.none(cidr_blocks.contains("0.0.0.0/0"))
      )
  - uid: mondoo-aws-security-secgroup-no-unrestricted-egress-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_security_group")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_security_group").all(
      change.after.egress == empty || change.after.egress.none(cidr_blocks.contains("0.0.0.0/0"))
      )
  - uid: mondoo-aws-security-secgroup-no-unrestricted-egress-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_security_group")
    mql: |
      terraform.state.resources.where(type == "aws_security_group").all(
      values.egress == empty || values.egress.none(cidr_blocks.contains("0.0.0.0/0"))
      )
  - uid: mondoo-aws-security-secgroup-no-unrestricted-egress-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::EC2::SecurityGroup")
    mql: |
      cloudformation.template.resources.where(type == "AWS::EC2::SecurityGroup").all(
      properties['SecurityGroupEgress'] == empty || properties['SecurityGroupEgress'].none(_['CidrIp'] == "0.0.0.0/0")
      )
