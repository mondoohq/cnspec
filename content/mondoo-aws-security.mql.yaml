      - uid: mondoo-aws-security-drs-no-public-recovery-ip-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that AWS Elastic Disaster Recovery (DRS) replication configurations do not create public IP addresses for recovery instances. Recovery instances with public IPs are directly accessible from the internet, increasing the attack surface during disaster recovery scenarios.

        **Why this matters**

        - Recovery instances with public IPs are exposed to the internet, making them targets for attacks during already-stressful DR events.
        - DR instances may not have the same hardening as production instances, making public exposure especially risky.
        - Private-only recovery instances require VPN or Direct Connect for access, ensuring controlled access paths.
        - During failover, security controls should remain as strict as production environments.
      remediation:
        - id: console
          desc: |
            To disable public IP creation for recovery instances using the AWS Console:

            1. Navigate to the **AWS Elastic Disaster Recovery** console.
            2. Select **Source servers**.
            3. Choose the source server and go to **Replication Settings**.
            4. Disable **Create public IP** for the recovery instance.
            5. Save the changes.
        - id: cli
          desc: |
            To disable public IP creation for recovery instances using the AWS CLI:

            ```bash
            aws drs update-replication-configuration \
              --source-server-id SOURCE_SERVER_ID \
              --no-create-public-ip
            ```
        - id: terraform
          desc: |
            Set `create_public_ip = false` on every `aws_drs_replication_configuration_template`:

            ```hcl
            resource "aws_drs_replication_configuration_template" "example" {
              staging_area_subnet_id   = aws_subnet.staging.id
              replication_servers_security_groups_ids = [aws_security_group.drs.id]
              ebs_encryption           = "DEFAULT"
              replication_server_instance_type = "t3.small"
              use_dedicated_replication_server = false
              associate_default_security_group = false
              bandwidth_throttling     = 0
              create_public_ip         = false
              data_plane_routing       = "PRIVATE_IP"
              default_large_staging_disk_type = "GP3"
            }
            ```
    refs:
      - url: https://docs.aws.amazon.com/drs/latest/userguide/replication-settings.html
        title: AWS DRS Replication Settings
  - uid: mondoo-aws-security-drs-no-public-recovery-ip-aws
    filters: asset.platform == "aws"
    mql: |
      aws.drs.sourceServers.all(
        replicationConfiguration.createPublicIP != true
      )
  - uid: mondoo-aws-security-drs-no-public-recovery-ip-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_drs_replication_configuration_template")
    mql: |
      terraform.resources.where(nameLabel == "aws_drs_replication_configuration_template").all(
        arguments.create_public_ip == false || arguments.create_public_ip == null
      )
  - uid: mondoo-aws-security-drs-no-public-recovery-ip-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_drs_replication_configuration_template")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_drs_replication_configuration_template").all(
