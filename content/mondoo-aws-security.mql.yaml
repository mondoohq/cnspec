  - uid: mondoo-aws-security-elasticbeanstalk-enhanced-health
    title: Ensure Elastic Beanstalk environments use enhanced health reporting
    impact: 50
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-16
      compliance/nis-2: false
      compliance/nist-csf-1: false
      compliance/nist-csf-2: false
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ca-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-12-3
      compliance/soc2-2017: soc2-control-cc7-2-1
    variants:
      - uid: mondoo-aws-security-elasticbeanstalk-enhanced-health-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/icon: aws
    docs:
      desc: |
        This check ensures that AWS Elastic Beanstalk environments have enhanced health reporting enabled. Enhanced health reporting goes beyond basic green/yellow/red status by evaluating application logs, instance metrics, and OS-level data to surface detailed health descriptors that are critical for security monitoring.

        **Why this matters**

        - Basic health reporting cannot distinguish between a routine performance issue and a security incident such as resource exhaustion from cryptomining, a denial-of-service attack, or a compromised instance behaving anomalously.
        - Enhanced health reporting provides the granular telemetry needed to detect anomalous behavior patterns that may indicate compromise, including unexpected traffic spikes, elevated error rates, abnormal CPU or memory usage, and unusual instance termination patterns.
        - Without this visibility, security teams have no early warning system for Elastic Beanstalk environments -- attackers can operate undetected while basic health status remains green.
        - Enhanced health events feed into CloudWatch, enabling integration with security alerting pipelines and SIEM systems for automated incident detection and response.
        - AWS Security Hub control ElasticBeanstalk.1 recommends enabling enhanced health reporting as a security baseline.

        **Risk mitigation:**

        - **Anomaly detection:** Surfaces instance-level behavioral changes (CPU spikes, memory exhaustion, network anomalies) that may indicate active compromise or lateral movement.
        - **Faster incident response:** Detailed status descriptors (Ok, Warning, Degraded, Severe) allow security teams to triage and prioritize investigation based on severity.
        - **Forensic capability:** Enhanced health events provide a timeline of environment changes useful for post-incident analysis and root cause determination.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            1. Navigate to the Elastic Beanstalk Console.
            2. Select the environment to update.
            3. Select **Configuration** in the left panel.
            4. Under **Monitoring**, select **Edit**.
            5. Set **Health reporting** to **Enhanced**.
            6. Select **Apply**.
        - id: cli
          desc: |
            **Using AWS CLI**

            Enable enhanced health reporting for an environment:

            ```bash
            aws elasticbeanstalk update-environment \
              --environment-name my-environment \
              --option-settings \
                Namespace=aws:elasticbeanstalk:healthreporting:system,OptionName=SystemType,Value=enhanced
            ```
        - id: terraform
          desc: |
            **Using Terraform**

            ```hcl
            resource "aws_elastic_beanstalk_environment" "example" {
              name                = "example-env"
              application         = aws_elastic_beanstalk_application.example.name
              solution_stack_name = "64bit Amazon Linux 2023 v4.0.0 running Python 3.11"

              setting {
                namespace = "aws:elasticbeanstalk:healthreporting:system"
                name      = "SystemType"
                value     = "enhanced"
              }
            }
            ```
    refs:
      - url: https://docs.aws.amazon.com/elasticbeanstalk/latest/dg/health-enhanced.html
        title: AWS Documentation - Enhanced health reporting and monitoring
      - url: https://docs.aws.amazon.com/securityhub/latest/userguide/elasticbeanstalk-controls.html
        title: AWS Documentation - Elastic Beanstalk controls
  - uid: mondoo-aws-security-elasticbeanstalk-enhanced-health-aws
    filters: asset.platform == "aws"
    mql: |
      aws.elasticbeanstalk.environments.all(
        health != ""
      )
  - uid: mondoo-aws-security-rds-proxy-tls-required
    title: Ensure RDS proxies require TLS for client connections
    impact: 80
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/soc2-2017: soc2-control-cc6-7-2
    variants:
      - uid: mondoo-aws-security-rds-proxy-tls-required-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/icon: aws
      - uid: mondoo-aws-security-rds-proxy-tls-required-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/icon: terraform
      - uid: mondoo-aws-security-rds-proxy-tls-required-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/icon: terraform
      - uid: mondoo-aws-security-rds-proxy-tls-required-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/icon: terraform
    docs:
      desc: |
        This check ensures that Amazon RDS Proxy instances are configured to require TLS encryption for all client connections. Without TLS enforcement, database connections through the proxy may transmit credentials and query data in plaintext, exposing sensitive information to network-based attacks.

        **Why this matters**

        - RDS Proxy sits between applications and databases, handling connection pooling and failover. All database credentials pass through the proxy.
        - Without TLS enforcement, connections between applications and the proxy are unencrypted, exposing database credentials and query data.
        - Man-in-the-middle attacks can intercept unencrypted database traffic to steal credentials or exfiltrate data.
        - Enforcing TLS at the proxy level ensures all client connections are encrypted regardless of individual application configurations.

        **Risk mitigation:**

        - **Data-in-transit encryption:** Ensures all connections through the proxy are encrypted with TLS.
        - **Credential protection:** Prevents database credentials from being transmitted in plaintext.
        - **Compliance:** Meets encryption-in-transit requirements for database connections.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            1. Navigate to the Amazon RDS Console.
            2. Select **Proxies** in the left panel.
            3. Select the proxy to update.
            4. Select **Modify**.
            5. Under **Transport Layer Security**, check **Require Transport Layer Security**.
            6. Select **Modify proxy**.
        - id: cli
          desc: |
            **Using AWS CLI**

            Enable TLS requirement for an RDS Proxy:

            ```bash
            aws rds modify-db-proxy \
              --db-proxy-name my-proxy \
              --require-tls
            ```

            Verify the setting:

            ```bash
            aws rds describe-db-proxies \
              --db-proxy-name my-proxy \
              --query "DBProxies[*].{Name:DBProxyName,RequireTLS:RequireTLS}"
            ```
        - id: terraform
          desc: |
            **Using Terraform**

            ```hcl
            resource "aws_db_proxy" "example" {
              name                   = "example-proxy"
              engine_family          = "MYSQL"
              role_arn               = aws_iam_role.proxy.arn
              vpc_subnet_ids         = aws_subnet.example[*].id
              require_tls            = true

              auth {
                auth_scheme = "SECRETS"
                secret_arn  = aws_secretsmanager_secret.db.arn
              }
            }
            ```
    refs:
      - url: https://docs.aws.amazon.com/AmazonRDS/latest/UserGuide/rds-proxy.html
        title: AWS Documentation - Using Amazon RDS Proxy
      - url: https://docs.aws.amazon.com/AmazonRDS/latest/UserGuide/rds-proxy-security.html
        title: AWS Documentation - Security with Amazon RDS Proxy
  - uid: mondoo-aws-security-rds-proxy-tls-required-aws
    filters: asset.platform == "aws"
    mql: aws.rds.proxies.all(requireTLS == true)
  - uid: mondoo-aws-security-rds-proxy-tls-required-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_db_proxy")
    mql: |
      terraform.resources.where(nameLabel == "aws_db_proxy").all(
        arguments.require_tls == true
      )
  - uid: mondoo-aws-security-rds-proxy-tls-required-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_db_proxy")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_db_proxy").all(
        change.after.require_tls == true
      )
  - uid: mondoo-aws-security-rds-proxy-tls-required-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_db_proxy")
    mql: |
      terraform.state.resources.where(type == "aws_db_proxy").all(
        values.require_tls == true
      )
  - uid: mondoo-aws-security-rds-proxy-no-debug-logging
    title: Ensure RDS proxies do not have debug logging enabled
    impact: 60
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-5
      compliance/nist-csf-2: false
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-11
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-2
      compliance/soc2-2017: soc2-control-cc6-7-2
    variants:
      - uid: mondoo-aws-security-rds-proxy-no-debug-logging-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/icon: aws
      - uid: mondoo-aws-security-rds-proxy-no-debug-logging-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/icon: terraform
      - uid: mondoo-aws-security-rds-proxy-no-debug-logging-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/icon: terraform
      - uid: mondoo-aws-security-rds-proxy-no-debug-logging-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/icon: terraform
    docs:
      desc: |
        This check ensures that Amazon RDS Proxy instances do not have debug logging enabled. When debug logging is active, detailed information about SQL statements, connection parameters, and query data is written to CloudWatch Logs. This debug output may include sensitive data such as query parameters, database schemas, and application logic.

        **Why this matters**

        - Debug logging captures detailed SQL statements and connection information that may contain sensitive data including PII, credentials, or business logic.
        - Debug logs are written to CloudWatch Logs where they may be accessible to users with log read permissions, expanding the attack surface.
        - Debug logging should only be enabled temporarily for troubleshooting and disabled in production environments.
        - Leaving debug logging enabled increases storage costs and creates unnecessary copies of potentially sensitive data.

        **Risk mitigation:**

        - **Data leakage prevention:** Prevents sensitive query data from being written to CloudWatch Logs.
        - **Least privilege:** Reduces the amount of sensitive information stored outside the database.
        - **Signal-to-noise ratio:** Excessive debug logging can obscure security-relevant events, making it harder to detect and investigate incidents in CloudWatch Logs.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            1. Navigate to the Amazon RDS Console.
            2. Select **Proxies** in the left panel.
            3. Select the proxy to update.
            4. Select **Modify**.
            5. Under **Enhanced logging**, uncheck **Enable enhanced logging**.
            6. Select **Modify proxy**.
        - id: cli
          desc: |
            **Using AWS CLI**

            Disable debug logging for an RDS Proxy:

            ```bash
            aws rds modify-db-proxy \
              --db-proxy-name my-proxy \
              --no-debug-logging
            ```
        - id: terraform
          desc: |
            **Using Terraform**

            ```hcl
            resource "aws_db_proxy" "example" {
              name                   = "example-proxy"
              engine_family          = "MYSQL"
              role_arn               = aws_iam_role.proxy.arn
              vpc_subnet_ids         = aws_subnet.example[*].id
              require_tls            = true
              debug_logging          = false

              auth {
                auth_scheme = "SECRETS"
                secret_arn  = aws_secretsmanager_secret.db.arn
              }
            }
            ```
    refs:
      - url: https://docs.aws.amazon.com/AmazonRDS/latest/UserGuide/rds-proxy.html
        title: AWS Documentation - Using Amazon RDS Proxy
  - uid: mondoo-aws-security-rds-proxy-no-debug-logging-aws
    filters: asset.platform == "aws"
    mql: aws.rds.proxies.all(debugLogging == false)
  - uid: mondoo-aws-security-rds-proxy-no-debug-logging-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_db_proxy")
    mql: |
      terraform.resources.where(nameLabel == "aws_db_proxy").all(
        arguments.debug_logging != true
      )
  - uid: mondoo-aws-security-rds-proxy-no-debug-logging-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_db_proxy")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_db_proxy").all(
        change.after.debug_logging != true
      )
  - uid: mondoo-aws-security-rds-proxy-no-debug-logging-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_db_proxy")
    mql: |
      terraform.state.resources.where(type == "aws_db_proxy").all(
        values.debug_logging != true
      )
  - uid: mondoo-aws-security-documentdb-snapshot-encrypted
    title: Ensure DocumentDB cluster snapshots are encrypted at rest
    impact: 80
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/soc2-2017: soc2-control-cc6-1-10
    variants:
      - uid: mondoo-aws-security-documentdb-snapshot-encrypted-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/icon: aws
    docs:
      desc: |
        This check ensures that Amazon DocumentDB cluster snapshots are encrypted at rest. Snapshots contain a complete backup of cluster data and, if unencrypted, could expose sensitive document data if the snapshot is shared, copied to another region, or accessed by unauthorized users.

        **Why this matters**

        - DocumentDB snapshots contain a full copy of all data in the cluster at the time the snapshot was taken.
        - Unencrypted snapshots can be shared with other AWS accounts or copied across regions without encryption protection.
        - If an unencrypted snapshot is inadvertently shared or an account is compromised, all document data is exposed in plaintext.
        - Snapshot encryption inherits from the source cluster; clusters must be created with encryption enabled to produce encrypted snapshots.

        **Risk mitigation:**

        - **Data-at-rest encryption:** Ensures all backup data is encrypted using AWS KMS.
        - **Safe sharing:** Encrypted snapshots maintain protection even when shared across accounts.
        - **Compliance:** Meets encryption requirements for database backups and disaster recovery data.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            DocumentDB snapshot encryption is inherited from the source cluster. To ensure encrypted snapshots:

            1. Navigate to the Amazon DocumentDB Console.
            2. Create a new cluster with **Encryption-at-rest** enabled.
            3. Migrate data from the unencrypted cluster to the new encrypted cluster.
            4. Delete the old unencrypted cluster and its snapshots.
        - id: cli
          desc: |
            **Using AWS CLI**

            Check if snapshots are encrypted:

            ```bash
            aws docdb describe-db-cluster-snapshots \
              --query "DBClusterSnapshots[*].{SnapshotId:DBClusterSnapshotIdentifier,Encrypted:StorageEncrypted}"
            ```

            To create an encrypted cluster (snapshots will inherit encryption):

            ```bash
            aws docdb create-db-cluster \
              --db-cluster-identifier secure-docdb-cluster \
              --engine docdb \
              --master-username admin \
              --master-user-password <password> \
              --storage-encrypted \
              --kms-key-id arn:aws:kms:region:account-id:key/key-id
            ```
    refs:
      - url: https://docs.aws.amazon.com/documentdb/latest/developerguide/encryption-at-rest.html
        title: Amazon DocumentDB Encryption at Rest
      - url: https://docs.aws.amazon.com/documentdb/latest/developerguide/backup_restore-dump_restore_docdb.html
        title: Amazon DocumentDB Migrating Data
  - uid: mondoo-aws-security-documentdb-snapshot-encrypted-aws
    filters: asset.platform == "aws"
    mql: aws.documentdb.snapshots.all(storageEncrypted == true)
  - uid: mondoo-aws-security-memorydb-snapshot-cmk-encryption
    title: Ensure MemoryDB snapshots are encrypted with a customer-managed KMS key
    impact: 70
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/soc2-2017: soc2-control-cc6-1-10
    variants:
      - uid: mondoo-aws-security-memorydb-snapshot-cmk-encryption-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/icon: aws
    docs:
      desc: |
        This check ensures that Amazon MemoryDB snapshots are encrypted with a customer-managed KMS key rather than the default AWS-managed key. Customer-managed keys provide greater control over the encryption lifecycle, including key rotation, access policies, and audit capabilities.

        **Why this matters**

        - MemoryDB snapshots contain a full copy of in-memory data that may include session data, cached credentials, or other sensitive application state.
        - Using AWS-managed keys limits control over key rotation policies and access auditing.
        - Customer-managed KMS keys enable fine-grained access control through key policies and IAM, restricting who can decrypt snapshot data.
        - Key rotation and deletion policies provide additional security controls for managing the encryption lifecycle.

        **Risk mitigation:**

        - **Key control:** Provides full control over the encryption key lifecycle including rotation and deletion.
        - **Access auditing:** CloudTrail logs all uses of customer-managed keys for compliance auditing.
        - **Granular access:** Key policies enable fine-grained control over who can access encrypted snapshot data.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            MemoryDB snapshot encryption is inherited from the source cluster. To ensure snapshots are encrypted with a CMK:

            1. Navigate to the Amazon MemoryDB Console.
            2. Create a new cluster with a customer-managed KMS key selected for encryption.
            3. Migrate data from the existing cluster to the new cluster.
        - id: cli
          desc: |
            **Using AWS CLI**

            Check snapshot encryption:

            ```bash
            aws memorydb describe-snapshots \
              --query "Snapshots[*].{Name:Name,KmsKeyId:KmsKeyId}"
            ```

            Create a cluster with CMK encryption (snapshots will inherit):

            ```bash
            aws memorydb create-cluster \
              --cluster-name secure-cluster \
              --node-type db.r6g.large \
              --acl-name my-acl \
              --kms-key-id arn:aws:kms:region:account-id:key/key-id
            ```
    refs:
      - url: https://docs.aws.amazon.com/memorydb/latest/devguide/at-rest-encryption.html
        title: AWS Documentation - MemoryDB Encryption at Rest
      - url: https://docs.aws.amazon.com/kms/latest/developerguide/concepts.html#customer-cmk
        title: AWS KMS Customer Managed Keys
  - uid: mondoo-aws-security-memorydb-snapshot-cmk-encryption-aws
    filters: asset.platform == "aws"
    mql: aws.memorydb.snapshots.all(kmsKey != empty)
  - uid: mondoo-aws-security-memorydb-no-open-access-acl
    title: Ensure MemoryDB clusters do not use the default open-access ACL
    impact: 80
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-5
      compliance/soc2-2017: soc2-control-cc6-1-3
    variants:
      - uid: mondoo-aws-security-memorydb-no-open-access-acl-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/icon: aws
    docs:
      desc: |
        This check ensures that MemoryDB clusters are not using the default "open-access" ACL. The open-access ACL grants all commands and all keys to any authenticated user, effectively bypassing access control. Clusters should use custom ACLs with properly scoped user permissions.

        **Why this matters**

        - The default "open-access" ACL allows any authenticated user to run all Redis commands including destructive operations like FLUSHALL or CONFIG SET.
        - Without proper ACLs, there is no separation of duties between read-only consumers and administrators.
        - An application compromise could lead to full data exfiltration or destruction if using the open-access ACL.
        - Custom ACLs enable the principle of least privilege by restricting users to only the commands and keys they need.

        **Risk mitigation:**

        - **Least privilege:** Custom ACLs restrict users to only necessary commands and key patterns.
        - **Separation of duties:** Different ACLs for different applications prevent lateral movement.
        - **Data protection:** Prevents unauthorized users from running destructive or administrative commands.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            1. Navigate to the Amazon MemoryDB Console.
            2. Select **Access control lists** in the left panel.
            3. Create a new ACL with appropriate user permissions.
            4. Select **Clusters** in the left panel.
            5. Select the cluster using the open-access ACL.
            6. Select **Modify**.
            7. Under **Access control list**, select the custom ACL.
            8. Select **Modify**.
        - id: cli
          desc: |
            **Using AWS CLI**

            Create a custom user and ACL:

            ```bash
            aws memorydb create-user \
              --user-name my-app-user \
              --authentication-mode Type=password,Passwords=<password> \
              --access-string "on ~app:* +get +set +del"

            aws memorydb create-acl \
              --acl-name my-app-acl \
              --user-names my-app-user

            aws memorydb update-cluster \
              --cluster-name my-cluster \
              --acl-name my-app-acl
            ```
    refs:
      - url: https://docs.aws.amazon.com/memorydb/latest/devguide/clusters.acls.html
        title: AWS Documentation - Authenticating users with Access Control Lists
  - uid: mondoo-aws-security-memorydb-no-open-access-acl-aws
    filters: asset.platform == "aws"
    mql: |
      aws.memorydb.acls.where(name == "open-access").all(
        clusters.length == 0
      )
  - uid: mondoo-aws-security-sns-subscription-https
    title: Ensure SNS topic subscriptions use HTTPS protocol
    impact: 70
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/soc2-2017: soc2-control-cc6-7-2
    variants:
      - uid: mondoo-aws-security-sns-subscription-https-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/icon: aws
      - uid: mondoo-aws-security-sns-subscription-https-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/icon: terraform
      - uid: mondoo-aws-security-sns-subscription-https-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/icon: terraform
      - uid: mondoo-aws-security-sns-subscription-https-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/icon: terraform
    docs:
      desc: |
        This check ensures that Amazon SNS topic subscriptions delivering to HTTP/HTTPS endpoints use the HTTPS protocol rather than plaintext HTTP. SNS notifications may contain sensitive data, and using HTTP transmits this data unencrypted across the network.

        **Why this matters**

        - SNS notifications delivered over HTTP are transmitted in plaintext, exposing message content to network interception.
        - Notification messages may contain sensitive data such as alerts, user information, or system events.
        - Man-in-the-middle attacks can intercept or modify HTTP-delivered messages without detection.
        - This check only applies to HTTP/HTTPS endpoint subscriptions. Other protocols (SQS, Lambda, email) use different transport mechanisms.

        **Risk mitigation:**

        - **Data-in-transit encryption:** Ensures notification messages are encrypted during delivery using TLS.
        - **Message integrity:** HTTPS prevents message tampering during transmission.
        - **Compliance:** Meets encryption-in-transit requirements for notification delivery.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            1. Navigate to the Amazon SNS Console.
            2. Select the topic containing the HTTP subscription.
            3. Select the HTTP subscription.
            4. Delete the HTTP subscription.
            5. Create a new subscription with the **HTTPS** protocol and the corresponding HTTPS endpoint URL.

            **Warning:** Switching an existing subscription from HTTP to HTTPS requires deleting the old subscription and creating a new one. This may cause temporary message delivery failures during the transition. Coordinate changes during a maintenance window and ensure your endpoint is ready to accept HTTPS connections before making the switch.
        - id: cli
          desc: |
            **Using AWS CLI**

            Replace the HTTP subscription with an HTTPS subscription:

            ```bash
            # Unsubscribe the HTTP endpoint
            aws sns unsubscribe \
              --subscription-arn arn:aws:sns:region:account-id:topic-name:subscription-id

            # Subscribe with HTTPS
            aws sns subscribe \
              --topic-arn arn:aws:sns:region:account-id:topic-name \
              --protocol https \
              --notification-endpoint https://example.com/webhook
            ```
        - id: terraform
          desc: |
            **Using Terraform**

            ```hcl
            resource "aws_sns_topic_subscription" "example" {
              topic_arn = aws_sns_topic.example.arn
              protocol  = "https"
              endpoint  = "https://example.com/webhook"
            }
            ```
    refs:
      - url: https://docs.aws.amazon.com/sns/latest/dg/sns-http-https-endpoint-as-subscriber.html
        title: AWS Documentation - Fanout to HTTP/S endpoints
      - url: https://docs.aws.amazon.com/sns/latest/dg/sns-security-best-practices.html
        title: AWS Documentation - Security best practices for Amazon SNS
  - uid: mondoo-aws-security-sns-subscription-https-aws
    filters: asset.platform == "aws"
    mql: |
      aws.sns.topics.all(
        subscriptions.where(protocol == "http").length == 0
      )
  - uid: mondoo-aws-security-sns-subscription-https-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_sns_topic_subscription")
    mql: |
      terraform.resources.where(nameLabel == "aws_sns_topic_subscription").all(
        arguments.protocol != "http"
      )
  - uid: mondoo-aws-security-sns-subscription-https-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_sns_topic_subscription")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_sns_topic_subscription").all(
