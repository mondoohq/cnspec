    mql: |
      aws.iam.policies.where(isAttachable == true) {
        defaultVersion.document.where(_['Statement'] != empty) {
          _['Statement'].all(
            _['Resource'].toString().contains("*") == false && _['Action'].toString().contains("*") == false || _['Effect'].upcase == "DENY"
          )
        }
      }
