  - uid: mondoo-aws-security-config-aggregator-enabled
    title: Ensure AWS Config aggregator is configured
    impact: 80
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-16
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-4
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-6
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    variants:
      - uid: mondoo-aws-security-config-aggregator-enabled-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-config-aggregator-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-config-aggregator-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-config-aggregator-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-config-aggregator-enabled-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that an AWS Config aggregator is configured to collect configuration and compliance data across all AWS accounts and regions. Without an aggregator, Config data is siloed per region, making it difficult to maintain a centralized view of resource compliance.

        **Why this matters**

        - **Incomplete visibility:** Without aggregation, security teams must check each region individually for compliance data.
        - **Regulatory gaps:** Many compliance frameworks require a centralized view of all infrastructure configuration across the entire organization.
        - **Incident response delays:** During security incidents, the inability to quickly query configuration data across all regions slows investigation and remediation.
      remediation:
        - id: console
          desc: |
            To ensure AWS Config aggregator is configured using the AWS Console:

            1. Navigate to the **AWS Config Console**.
            2. Select **Aggregators** in the left panel.
            3. Choose **Add aggregator**.
            4. Enter a name for the aggregator.
            5. Select **Add all accounts** or specify individual account IDs.
            6. Select **Add all regions** to aggregate data from every region.
            7. If using AWS Organizations, select the organization aggregation option and provide the required IAM role.
            8. Choose **Save**.
        - id: cli
          desc: |
            To ensure AWS Config aggregator is configured using the AWS CLI, create a Config aggregator for all regions:

            ```bash
            aws configservice put-configuration-aggregator \
              --configuration-aggregator-name my-aggregator \
              --account-aggregation-sources '[{"AccountIds":["123456789012"],"AllAwsRegions":true}]'
            ```

            For organization-level aggregation:

            ```bash
            aws configservice put-configuration-aggregator \
              --configuration-aggregator-name my-org-aggregator \
              --organization-aggregation-source '{"RoleArn":"arn:aws:iam::123456789012:role/ConfigAggregatorRole","AllAwsRegions":true}'
            ```

            Verify the aggregator:

            ```bash
            aws configservice describe-configuration-aggregators
            ```
        - id: terraform
          desc: |
            To ensure AWS Config aggregator is configured in Terraform:

            ```hcl
            resource "aws_config_configuration_aggregator" "organization" {
              name = "organization-aggregator"

              organization_aggregation_source {
                all_regions = true
                role_arn    = aws_iam_role.config_aggregator.arn
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure AWS Config aggregator is configured in CloudFormation:

            ```yaml
            Resources:
              ConfigAggregator:
                Type: AWS::Config::ConfigurationAggregator
                Properties:
                  ConfigurationAggregatorName: organization-aggregator
                  OrganizationAggregationSource:
                    AllAwsRegions: true
                    RoleArn: !GetAtt ConfigAggregatorRole.Arn
            ```
    refs:
      - url: https://docs.aws.amazon.com/config/latest/developerguide/aggregate-data.html
        title: AWS Documentation - Multi-Account Multi-Region Data Aggregation
  - uid: mondoo-aws-security-config-aggregator-enabled-aws
    filters: asset.platform == "aws"
    mql: aws.config.aggregators.length > 0
  - uid: mondoo-aws-security-config-aggregator-enabled-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_config_configuration_aggregator")
    mql: |
