          mondoo.com/filter-title: AWS Application Load Balancer
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-elb-deletion-protection-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-elb-deletion-protection-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-elb-deletion-protection-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-elb-deletion-protection-enabled-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that AWS Application Load Balancers (ALBs) have deletion protection enabled. An attacker with compromised IAM credentials can delete unprotected load balancers as a destructive sabotage action, immediately severing all traffic to backend applications and destroying security configurations such as WAF associations and access logging settings.

        **Why this matters**

        Without deletion protection, ALBs are vulnerable to intentional destruction:

        - An attacker with `elasticloadbalancing:DeleteLoadBalancer` permissions can destroy the load balancer in a single API call, causing immediate service disruption.
        - WAF rules, authentication configurations, and access logging settings attached to the ALB are lost, removing security controls and forensic data sources.
        - Rebuilding the ALB with identical security configurations is error-prone and time-consuming, extending the window of exposure during incident response.

        **Risk mitigation**

        - **Destructive attack prevention:** Requires an attacker to make two API calls (disable protection, then delete), increasing detection opportunity.
        - **Security configuration preservation:** Protects WAF associations, TLS settings, and logging configurations from being destroyed.
        - **Defense in depth:** Complements IAM policies by adding resource-level protection against credential compromise scenarios.
      remediation:
        - id: console
          desc: |
            To ensure Application Load Balancers have deletion protection using the AWS Console:

            1. Navigate to the AWS EC2 Console.
            2. Select Load Balancers under the Load Balancing section.
            3. Select an Application Load Balancer (ALB).
            4. Select the Description tab.
            5. Under Deletion Protection, check if it is enabled.
            6. If it is disabled, modify the setting:
              - Select Edit attributes.
              - Enable Deletion protection.
              - Select Save changes.
        - id: cli
          desc: |
            To ensure Application Load Balancers have deletion protection using the AWS CLI, check if an ALB has deletion protection enabled:

            ```bash
            aws elbv2 describe-load-balancers --query "LoadBalancers[*].{Name:LoadBalancerName, DeletionProtectionEnabled:Attributes[?Key=='deletion_protection.enabled'].Value | [0]}"
            ```

            Enable deletion protection for a specific ALB:

            ```bash
            aws elbv2 modify-load-balancer-attributes \
            --load-balancer-arn <load-balancer-arn> \
            --attributes Key=deletion_protection.enabled,Value=true
            ```
        - id: terraform
          desc: |
            To ensure Application Load Balancers have deletion protection in Terraform, ensure ALBs have deletion protection enabled:

            ```hcl
            resource "aws_lb" "secure_alb" {
              name               = "secure-application-lb"
              internal           = false
              load_balancer_type = "application"
              security_groups    = [aws_security_group.alb_sg.id]
              subnets            = [aws_subnet.public1.id, aws_subnet.public2.id]

              enable_deletion_protection = true  # Ensures deletion protection is enabled
            }
            ```
        - id: cloudformation
          desc: |
            To ensure Application Load Balancers have deletion protection in CloudFormation, enable deletion protection for ALBs:

            ```yaml
            Resources:
              SecureApplicationLoadBalancer:
                Type: "AWS::ElasticLoadBalancingV2::LoadBalancer"
                Properties:
                  Name: "secure-application-lb"
                  Type: "application"
                  Scheme: "internet-facing"
                  Subnets:
                    - !Ref PublicSubnet1
                    - !Ref PublicSubnet2
                  SecurityGroups:
                    - !Ref ALBSecurityGroup
                  LoadBalancerAttributes:
                    - Key: "deletion_protection.enabled"
                      Value: "true"
            ```
    refs:
      - url: https://docs.aws.amazon.com/elasticloadbalancing/latest/userguide/security.html
        title: Elastic Load Balancing Security
