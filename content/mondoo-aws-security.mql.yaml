          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ssm-document-not-public-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ssm-document-not-public-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that AWS Systems Manager (SSM) documents owned by the account are not shared publicly. SSM documents define automation runbooks, commands, and policies that may contain sensitive operational logic, internal infrastructure details, or references to internal resources.

        **Why this matters**

        - A publicly shared SSM document is visible to all AWS accounts. Any account can view the document content, which may reveal internal IP ranges, resource names, credentials references, or security configurations.
        - Automation documents often contain step-by-step operational procedures that could be used to understand and exploit your infrastructure.
        - Command documents may reference internal endpoints, database connection strings, or privileged operations that should not be exposed externally.
        - Public sharing is rarely intentional and typically results from misconfigured permissions.

        **Risk mitigation**

        - **Information disclosure prevention:** Restricts visibility of internal automation logic to authorized accounts only.
        - **Attack surface reduction:** Prevents adversaries from studying your operational procedures to plan targeted attacks.
        - **Least-privilege enforcement:** Ensures document access follows organizational boundaries rather than being open to the world.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and open **AWS Systems Manager**.
        2. In the left navigation pane, choose **Documents**, then select the **Owned by me** tab.
        3. For each document listed, select it and choose the **Permissions** tab.
        4. Review the **Account IDs** list under shared accounts.
        5. Check whether `All` appears in the list, which indicates public sharing.

        A passing document shows no entry of `All` in the shared accounts list. A failing document shows `All` as one of the shared account IDs.

        ### Audit via CLI

        1. List all documents owned by the current account:

        ```bash
        aws ssm list-documents \
          --filters "Key=Owner,Values=Self" \
          --query "DocumentIdentifiers[].Name" \
          --output text
        ```

        2. For each document name, check its sharing permissions:

        ```bash
        aws ssm describe-document-permission \
          --name <document-name> \
          --permission-type Share \
          --query "AccountIds"
        ```

        A passing document returns an empty list or a list containing only specific account IDs. A failing document returns a list that includes `All` or `all`.
      remediation:
        - id: console
          desc: |
            To restrict SSM document sharing using the AWS Console:

            1. Navigate to **AWS Systems Manager** > **Documents** > **Owned by me**.
            2. Select the document that is publicly shared.
            3. Choose the **Permissions** tab.
            4. Remove `All` from the account sharing list.
            5. Add only the specific account IDs that require access.
        - id: cli
          desc: |
            To restrict SSM document sharing using the AWS CLI, first identify publicly shared documents:

            ```bash
            aws ssm describe-document-permission \
              --name <document-name> --permission-type Share
            ```

            Remove public access:

            ```bash
            aws ssm modify-document-permission \
              --name <document-name> --permission-type Share \
              --account-ids-to-remove All
            ```
        - id: terraform
          desc: |
            To restrict SSM document sharing in Terraform, ensure `aws_ssm_document_permission` resources do not share with all accounts:

            ```hcl
            resource "aws_ssm_document_permission" "example" {
              document_name = aws_ssm_document.example.name
              permission    = "Share"
              account_ids   = ["123456789012"]
            }
            ```
    refs:
      - url: https://docs.aws.amazon.com/systems-manager/latest/userguide/sysman-doc-syntax.html
        title: AWS Documentation - SSM Document sharing
  - uid: mondoo-aws-security-ssm-document-not-public-aws
    filters: asset.platform == "aws"
    mql: |
      aws.ssm.documents.all(
        permissions.none(_['accountIds'].any(_ == "All" || _ == "all"))
      )
  - uid: mondoo-aws-security-ssm-document-not-public-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_ssm_document_permission")
    mql: |
      terraform.resources.where(nameLabel == "aws_ssm_document_permission").all(
        arguments.account_ids.none(_ == "All" || _ == "all")
      )
  - uid: mondoo-aws-security-ssm-document-not-public-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_ssm_document_permission")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_ssm_document_permission").all(
        change.after.account_ids.none(_ == "All" || _ == "all")
      )
  - uid: mondoo-aws-security-ssm-document-not-public-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_ssm_document_permission")
    mql: |
      terraform.state.resources.where(type == "aws_ssm_document_permission").all(
        values.account_ids.none(_ == "All" || _ == "all")
      )
  - uid: mondoo-aws-security-ssm-patch-baseline-reject-action
    title: Ensure SSM patch baselines block rejected patches
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-tvm-03
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-8
      compliance/nis-2: nis-2-21-2-d
      compliance/nist-csf-1: nist-csf-1-pr-ip-12
      compliance/nist-csf-2: nist-csf-2-pr-ps-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-1
      compliance/pci-dss-4: pcidss-requirement-6-3-3
      compliance/soc2-2017: soc2-control-cc7-1-4
      compliance/vda-isa-5: vda-isa-5-5-2-5
    variants:
      - uid: mondoo-aws-security-ssm-patch-baseline-reject-action-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-ssm-patch-baseline-reject-action-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ssm-patch-baseline-reject-action-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ssm-patch-baseline-reject-action-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ssm-patch-baseline-reject-action-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that custom SSM patch baselines do not use `ALLOW_AS_DEPENDENCY` as the rejected patches action. When this setting is enabled, patches that have been explicitly rejected can still be installed if they are required as a dependency of another patch, effectively undermining the rejection policy.

        **Why this matters**

        - Rejected patches are typically rejected because they introduce known vulnerabilities, break compatibility, or have not passed security review. Allowing them to be installed as dependencies defeats the purpose of the rejection list.
        - An attacker who identifies a rejected patch with a known CVE could potentially exploit the vulnerability if the patch was silently installed as a dependency.
        - Compliance frameworks require that patching policies are enforced consistently. A patch baseline that allows rejected patches as dependencies is not consistently enforcing its policy.

        **Risk mitigation**

        - **Vulnerability prevention:** Ensures that patches with known issues are never installed, even as transitive dependencies.
        - **Policy enforcement:** Maintains the integrity of the patch rejection list as an absolute block rather than a suggestion.
        - **Compliance assurance:** Demonstrates consistent patch management controls to auditors.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and open **AWS Systems Manager**.
        2. In the left navigation pane, under **Patch Manager**, choose **Patch baselines**.
        3. Filter to show custom (non-default) patch baselines.
        4. Select each custom baseline and choose **View details**.
        5. Under **Patch exceptions**, locate the **Rejected patches action** field.

        A passing patch baseline shows a **Rejected patches action** of **Block**. A failing patch baseline shows **Allow as dependency**.

        ### Audit via CLI

        1. List all non-default patch baselines:

        ```bash
        aws ssm describe-patch-baselines \
          --filters "Key=NAME_PREFIX,Values=" \
          --query "BaselineIdentities[?DefaultBaseline==\`false\`].{Id:BaselineId,Name:BaselineName}" \
          --output table
        ```

        2. For each custom baseline ID, check the rejected patches action:

        ```bash
        aws ssm get-patch-baseline \
          --baseline-id <baseline-id> \
          --query "{BaselineId:BaselineId,RejectedPatchesAction:RejectedPatchesAction}"
        ```

        A passing patch baseline returns `"RejectedPatchesAction": "BLOCK"`. A failing patch baseline returns `"RejectedPatchesAction": "ALLOW_AS_DEPENDENCY"`.
      remediation:
        - id: console
          desc: |
            To update the rejected patches action using the AWS Console:

            1. Navigate to **AWS Systems Manager** > **Patch Manager** > **Patch baselines**.
            2. Select the custom patch baseline.
            3. Choose **Actions** > **Modify patch baseline**.
            4. Under **Patch exceptions**, set **Rejected patches action** to **Block**.
            5. Save the changes.
        - id: cli
          desc: |
            To update the rejected patches action using the AWS CLI, first identify baselines with the permissive setting:

            ```bash
            aws ssm get-patch-baseline --baseline-id <baseline-id> \
              --query "RejectedPatchesAction"
            ```

            Update to block rejected patches:

            ```bash
            aws ssm update-patch-baseline --baseline-id <baseline-id> \
              --rejected-patches-action BLOCK
            ```
        - id: terraform
          desc: |
            To ensure patch baselines block rejected patches in Terraform:

            ```hcl
            resource "aws_ssm_patch_baseline" "example" {
              name             = "example-baseline"
              operating_system = "AMAZON_LINUX_2"

              rejected_patches        = ["KB123456"]
              rejected_patches_action = "BLOCK"
            }
            ```
        - id: cloudformation
          desc: |
            To ensure patch baselines block rejected patches in CloudFormation:

            ```yaml
            Resources:
              PatchBaseline:
                Type: AWS::SSM::PatchBaseline
                Properties:
                  Name: example-baseline
                  OperatingSystem: AMAZON_LINUX_2
                  RejectedPatches:
                    - KB123456
                  RejectedPatchesAction: BLOCK
            ```
    refs:
      - url: https://docs.aws.amazon.com/systems-manager/latest/userguide/patch-manager-approved-rejected-package-name-formats.html
        title: AWS Documentation - Patch baselines
  - uid: mondoo-aws-security-ssm-patch-baseline-reject-action-aws
    filters: asset.platform == "aws"
    mql: |
      aws.ssm.patchBaselines.where(isDefault == false).all(
        rejectedPatchesAction != "ALLOW_AS_DEPENDENCY"
      )
  - uid: mondoo-aws-security-ssm-patch-baseline-reject-action-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_ssm_patch_baseline")
    mql: |
      terraform.resources.where(nameLabel == "aws_ssm_patch_baseline").all(
        arguments.rejected_patches_action != null && arguments.rejected_patches_action != "ALLOW_AS_DEPENDENCY"
      )
  - uid: mondoo-aws-security-ssm-patch-baseline-reject-action-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_ssm_patch_baseline")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_ssm_patch_baseline").all(
        change.after.rejected_patches_action != null && change.after.rejected_patches_action != "ALLOW_AS_DEPENDENCY"
      )
  - uid: mondoo-aws-security-ssm-patch-baseline-reject-action-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_ssm_patch_baseline")
    mql: |
      terraform.state.resources.where(type == "aws_ssm_patch_baseline").all(
        values.rejected_patches_action != null && values.rejected_patches_action != "ALLOW_AS_DEPENDENCY"
      )
  - uid: mondoo-aws-security-ssm-patch-baseline-reject-action-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::SSM::PatchBaseline")
    mql: |
      cloudformation.template.resources.where(type == "AWS::SSM::PatchBaseline").all(
        properties['RejectedPatchesAction'] != "ALLOW_AS_DEPENDENCY"
      )
  - uid: mondoo-aws-security-ssm-maintenance-window-no-unassociated
    title: Ensure SSM maintenance windows do not allow unassociated targets
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-2
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-ps-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-5
      compliance/pci-dss-4: pcidss-requirement-2-2-4
      compliance/soc2-2017: soc2-control-cc7-1-1
      compliance/vda-isa-5: vda-isa-5-5-2-1
    variants:
      - uid: mondoo-aws-security-ssm-maintenance-window-no-unassociated-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-ssm-maintenance-window-no-unassociated-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ssm-maintenance-window-no-unassociated-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ssm-maintenance-window-no-unassociated-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ssm-maintenance-window-no-unassociated-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that SSM maintenance windows do not allow unassociated targets. When `AllowUnassociatedTargets` is enabled, any managed instance in the account can be targeted by tasks registered with the maintenance window, even if it is not explicitly associated with the window.

        **Why this matters**

        - Maintenance window tasks may include privileged operations such as patching, running scripts, or modifying configurations. Allowing unassociated targets means these operations could execute on any instance in the account.
        - If a maintenance window task is compromised or misconfigured, the blast radius expands from a defined set of targets to every managed instance in the account.
        - Least-privilege principles require that automation only affects explicitly designated resources, not the entire fleet.

        **Risk mitigation**

        - **Blast radius reduction:** Limits the scope of maintenance window tasks to explicitly registered targets.
        - **Least-privilege enforcement:** Ensures that automated operations only affect intended resources.
        - **Change management:** Provides clear accountability for which resources are affected by scheduled maintenance.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and open **AWS Systems Manager**.
        2. In the left navigation pane, choose **Maintenance Windows**.
        3. For each maintenance window listed, select it and choose **View details**.
        4. Review the **Allow unregistered targets** field in the window details.

        A passing maintenance window shows **Allow unregistered targets** set to **false** or unchecked. A failing maintenance window shows **Allow unregistered targets** set to **true** or checked.

        ### Audit via CLI

        1. List all maintenance windows and their unassociated targets setting:

        ```bash
        aws ssm describe-maintenance-windows \
          --query "WindowIdentities[].{WindowId:WindowId,Name:Name,AllowUnassociatedTargets:AllowUnassociatedTargets}" \
          --output table
        ```

        A passing maintenance window shows `AllowUnassociatedTargets` as `false`. A failing maintenance window shows `AllowUnassociatedTargets` as `true`.
      remediation:
        - id: console
          desc: |
            To disable unassociated targets on a maintenance window using the AWS Console:

            1. Navigate to **AWS Systems Manager** > **Maintenance Windows**.
            2. Select the maintenance window.
            3. Choose **Edit**.
            4. Uncheck **Allow unregistered targets**.
            5. Register the specific targets that should be included in the maintenance window.
            6. Save the changes.
        - id: cli
          desc: |
            To disable unassociated targets on a maintenance window using the AWS CLI:

            ```bash
            aws ssm update-maintenance-window \
              --window-id <window-id> --no-allow-unassociated-targets
            ```

            Then register specific targets:

            ```bash
            aws ssm register-target-with-maintenance-window \
              --window-id <window-id> --resource-type INSTANCE \
              --targets "Key=instanceids,Values=i-1234567890abcdef0"
            ```
        - id: terraform
          desc: |
            To disable unassociated targets on a maintenance window in Terraform:

            ```hcl
            resource "aws_ssm_maintenance_window" "example" {
              name                       = "example-window"
              schedule                   = "cron(0 2 ? * SUN *)"
              duration                   = 3
              cutoff                     = 1
              allow_unassociated_targets = false
            }

            resource "aws_ssm_maintenance_window_target" "example" {
              window_id     = aws_ssm_maintenance_window.example.id
              resource_type = "INSTANCE"

              targets {
                key    = "InstanceIds"
                values = ["i-1234567890abcdef0"]
              }
            }
            ```
        - id: cloudformation
          desc: |
            To disable unassociated targets on a maintenance window in CloudFormation:

            ```yaml
            Resources:
              MaintenanceWindow:
                Type: AWS::SSM::MaintenanceWindow
                Properties:
                  Name: example-window
                  Schedule: "cron(0 2 ? * SUN *)"
                  Duration: 3
                  Cutoff: 1
                  AllowUnassociatedTargets: false
            ```
    refs:
      - url: https://docs.aws.amazon.com/systems-manager/latest/userguide/sysman-maintenance-working.html
        title: AWS Documentation - Maintenance windows
  - uid: mondoo-aws-security-ssm-maintenance-window-no-unassociated-aws
    filters: asset.platform == "aws"
    mql: |
      aws.ssm.maintenanceWindows.all(
        allowUnassociatedTargets == false
      )
  - uid: mondoo-aws-security-ssm-maintenance-window-no-unassociated-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_ssm_maintenance_window")
    mql: |
      terraform.resources.where(nameLabel == "aws_ssm_maintenance_window").all(
        arguments.allow_unassociated_targets == false
      )
  - uid: mondoo-aws-security-ssm-maintenance-window-no-unassociated-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_ssm_maintenance_window")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_ssm_maintenance_window").all(
        change.after.allow_unassociated_targets == false
      )
  - uid: mondoo-aws-security-ssm-maintenance-window-no-unassociated-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_ssm_maintenance_window")
    mql: |
      terraform.state.resources.where(type == "aws_ssm_maintenance_window").all(
        values.allow_unassociated_targets == false
      )
  - uid: mondoo-aws-security-ssm-maintenance-window-no-unassociated-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::SSM::MaintenanceWindow")
    mql: |
      cloudformation.template.resources.where(type == "AWS::SSM::MaintenanceWindow").all(
        properties['AllowUnassociatedTargets'] == false
      )
  - uid: mondoo-aws-security-cloudwatch-log-destination-restrict-access
    title: Ensure CloudWatch log destinations restrict access
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-10-3-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-2-1
    variants:
      - uid: mondoo-aws-security-cloudwatch-log-destination-restrict-access-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-cloudwatch-log-destination-restrict-access-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-cloudwatch-log-destination-restrict-access-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-cloudwatch-log-destination-restrict-access-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that CloudWatch Logs cross-account destinations do not have overly permissive access policies. A log destination with a wildcard (`*`) principal allows any AWS account to send log data to the destination, creating a risk of log injection, data pollution, and increased costs.

        **Why this matters**

        - An unrestricted log destination allows any AWS account to write log data to your destination. Attackers could inject misleading log entries to obscure real security events or trigger false alerts.
        - Injected log data could overwhelm downstream consumers (Kinesis streams, S3 buckets, Lambda functions), increasing costs and potentially causing denial of service for legitimate log processing.
        - Security investigations rely on log integrity. If untrusted accounts can write to your log destinations, the forensic value of those logs is compromised.
        - Log destinations often feed into SIEM systems, alerting pipelines, and compliance archives. Polluted data can trigger false positives or mask real incidents.

        **Risk mitigation**

        - **Log integrity:** Ensures only trusted accounts can write to log destinations, preserving the forensic value of log data.
        - **Cost control:** Prevents unauthorized accounts from generating unexpected log volume and associated storage or processing costs.
        - **Attack surface reduction:** Eliminates a vector for log injection attacks that could be used to mask malicious activity.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and open **CloudWatch**.
        2. In the left navigation pane, under **Logs**, choose **Destinations**.
        3. For each destination listed, select it to view the **Access policy**.
        4. Review the policy document for any `Principal` set to `"*"` (wildcard).

        A passing log destination has an access policy with all principals scoped to specific AWS account IDs or ARNs. A failing log destination has an access policy with `"Principal": "*"` or `"AWS": "*"`.

        ### Audit via CLI

        1. List all CloudWatch log destinations:

        ```bash
        aws logs describe-destinations \
          --query "destinations[].{Name:destinationName,AccessPolicy:accessPolicy}" \
          --output table
        ```

        2. Review the `AccessPolicy` field for each destination. To isolate destinations with wildcard principals:

        ```bash
        aws logs describe-destinations \
          --query "destinations[?contains(accessPolicy, '\"*\"')].{Name:destinationName,AccessPolicy:accessPolicy}"
        ```

        A passing destination returns an access policy with no wildcard `"*"` principal. A failing destination returns an access policy that contains `"*"` as a principal value.
      remediation:
        - id: console
          desc: |
            To restrict CloudWatch log destination access using the AWS Console:

            1. Navigate to **CloudWatch** > **Logs** > **Destinations**.
            2. Select the destination with overly permissive access.
            3. Update the access policy to specify only the AWS account IDs that should be allowed to send logs.
            4. Remove any wildcard (`*`) principals from the policy.
        - id: cli
          desc: |
            To restrict CloudWatch log destination access using the AWS CLI, first check the current access policy:

            ```bash
            aws logs describe-destinations \
              --destination-name-prefix <destination-name>
            ```

            Update the access policy to restrict to specific accounts:

            ```bash
            aws logs put-destination-policy \
              --destination-name <destination-name> \
              --access-policy '{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Principal":{"AWS":"arn:aws:iam::123456789012:root"},"Action":"logs:PutSubscriptionFilter","Resource":"arn:aws:logs:us-east-1:999999999999:destination:my-destination"}]}'
            ```
        - id: terraform
          desc: |
            To restrict CloudWatch log destination access in Terraform, ensure the access policy specifies explicit account principals:

            ```hcl
            resource "aws_cloudwatch_log_destination_policy" "example" {
              destination_name = aws_cloudwatch_log_destination.example.name
              access_policy    = jsonencode({
                Version = "2012-10-17"
