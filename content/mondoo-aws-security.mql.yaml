  - uid: mondoo-aws-security-s3-bucket-encryption-uses-kms-cmk
    title: Ensure S3 buckets use KMS customer managed keys for encryption
    impact: 60
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-12
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-10
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-aws-security-s3-bucket-encryption-uses-kms-cmk-aws
        tags:
          mondoo.com/filter-title: AWS S3 Bucket
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-s3-bucket-encryption-uses-kms-cmk-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-s3-bucket-encryption-uses-kms-cmk-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-s3-bucket-encryption-uses-kms-cmk-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-s3-bucket-encryption-uses-kms-cmk-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon S3 buckets are configured to use AWS KMS customer managed keys (CMKs) for server-side encryption rather than the default AES-256 (SSE-S3) encryption. While SSE-S3 provides encryption, KMS CMKs offer additional security benefits including key rotation control, access auditing, and fine-grained permissions.

        **Why this matters**

        S3 buckets encrypted with AES-256 (SSE-S3) use AWS-managed keys that provide limited visibility and control:

        - No audit trail for encryption key usage (KMS keys log all usage to CloudTrail).
        - No ability to manage key rotation policies (KMS supports automatic annual rotation).
        - No fine-grained access control over encryption keys (KMS key policies control who can encrypt/decrypt).
        - Compliance frameworks such as PCI DSS, HIPAA, and FedRAMP often require customer managed encryption keys for sensitive data.

        **Risk mitigation**

        - Provides centralized key management with full audit logging through CloudTrail.
        - Enables custom key rotation policies to meet compliance requirements.
        - Allows fine-grained access control through KMS key policies and grants.
      remediation:
        - id: console
          desc: |
            To ensure S3 buckets use KMS customer managed keys for encryption using the AWS Console:

            1. Navigate to the Amazon S3 Console.
            2. Select the bucket to update.
            3. Go to the Properties tab.
            4. Under Default encryption, select Edit.
            5. Change the encryption type to "Server-side encryption with AWS Key Management Service keys (SSE-KMS)".
            6. Select a KMS key (create a new one or choose an existing customer managed key).
            7. Optionally enable Bucket Key to reduce KMS API costs.
            8. Select Save changes.
        - id: cli
          desc: |
            To ensure S3 buckets use KMS customer managed keys for encryption using the AWS CLI, update the bucket encryption to use a KMS CMK:

            ```bash
            aws s3api put-bucket-encryption \
              --bucket <bucket-name> \
              --server-side-encryption-configuration '{
                "Rules": [{
                  "ApplyServerSideEncryptionByDefault": {
                    "SSEAlgorithm": "aws:kms",
                    "KMSMasterKeyID": "arn:aws:kms:<region>:<account-id>:key/<key-id>"
                  },
                  "BucketKeyEnabled": true
                }]
              }'
            ```
        - id: terraform
          desc: |
            To ensure S3 buckets use KMS customer managed keys for encryption in Terraform:

            ```hcl
            resource "aws_s3_bucket_server_side_encryption_configuration" "example" {
              bucket = aws_s3_bucket.example.id

              rule {
                apply_server_side_encryption_by_default {
                  sse_algorithm     = "aws:kms"
                  kms_master_key_id = aws_kms_key.s3.arn
                }
                bucket_key_enabled = true
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure S3 buckets use KMS customer managed keys for encryption in CloudFormation:

            ```yaml
            Resources:
              S3Bucket:
                Type: AWS::S3::Bucket
                Properties:
                  BucketEncryption:
                    ServerSideEncryptionConfiguration:
                      - ServerSideEncryptionByDefault:
                          SSEAlgorithm: aws:kms
                          KMSMasterKeyID: !Ref S3KMSKey
                        BucketKeyEnabled: true
            ```
    refs:
      - url: https://docs.aws.amazon.com/AmazonS3/latest/userguide/UsingKMSEncryption.html
        title: AWS Documentation - Using SSE-KMS encryption for S3
      - url: https://docs.aws.amazon.com/AmazonS3/latest/userguide/bucket-key.html
        title: AWS Documentation - Reducing the cost of SSE-KMS with Amazon S3 Bucket Keys
  - uid: mondoo-aws-security-s3-bucket-encryption-uses-kms-cmk-aws
    filters: asset.platform == "aws-s3-bucket"
    mql: |
      aws.s3.bucket.encryptionRules.all(
        sseAlgorithm == "aws:kms" || sseAlgorithm == "aws:kms:dsse"
      )
  - uid: mondoo-aws-security-s3-bucket-encryption-uses-kms-cmk-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_s3_bucket_server_side_encryption_configuration")
    mql: |
      terraform.resources.where(nameLabel == "aws_s3_bucket_server_side_encryption_configuration").all(
        blocks.where(type == "rule").all(
          blocks.where(type == "apply_server_side_encryption_by_default").all(
            arguments.sse_algorithm == "aws:kms" || arguments.sse_algorithm == "aws:kms:dsse"
          )
        )
      )
  - uid: mondoo-aws-security-s3-bucket-encryption-uses-kms-cmk-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_s3_bucket_server_side_encryption_configuration")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_s3_bucket_server_side_encryption_configuration").all(
        change.after.rule[0].apply_server_side_encryption_by_default[0].sse_algorithm == "aws:kms" ||
        change.after.rule[0].apply_server_side_encryption_by_default[0].sse_algorithm == "aws:kms:dsse"
      )
  - uid: mondoo-aws-security-s3-bucket-encryption-uses-kms-cmk-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_s3_bucket_server_side_encryption_configuration")
    mql: |
      terraform.state.resources.where(type == "aws_s3_bucket_server_side_encryption_configuration").all(
        values.rule[0].apply_server_side_encryption_by_default[0].sse_algorithm == "aws:kms" ||
        values.rule[0].apply_server_side_encryption_by_default[0].sse_algorithm == "aws:kms:dsse"
      )
  - uid: mondoo-aws-security-s3-bucket-encryption-uses-kms-cmk-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::S3::Bucket")
    mql: |
      cloudformation.template.resources.where(type == "AWS::S3::Bucket").all(
      properties['BucketEncryption']['ServerSideEncryptionConfiguration'].all(
        _['ServerSideEncryptionByDefault']['SSEAlgorithm'] == "aws:kms" ||
        _['ServerSideEncryptionByDefault']['SSEAlgorithm'] == "aws:kms:dsse"
      )
      )
  - uid: mondoo-aws-security-codebuild-encryption-key-configured
    title: Ensure CodeBuild projects use KMS CMKs for artifact encryption
    impact: 60
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-aws-security-codebuild-encryption-key-configured-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-codebuild-encryption-key-configured-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-codebuild-encryption-key-configured-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-codebuild-encryption-key-configured-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-codebuild-encryption-key-configured-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that AWS CodeBuild projects are configured with a KMS customer managed key (CMK) for encrypting build artifacts. By default, CodeBuild uses an AWS-managed key for artifact encryption, but a customer managed key provides audit logging, key rotation control, and fine-grained access permissions.

        **Why this matters**

        CodeBuild artifacts may contain compiled binaries, deployment packages, test results, and other sensitive data. Without a customer managed KMS key:

        - There is no audit trail for encryption key usage in CloudTrail.
        - Key rotation cannot be customized to meet organizational or compliance requirements.
        - Access to decrypt build artifacts cannot be controlled through KMS key policies.
        - Compliance frameworks such as PCI DSS and HIPAA require customer managed encryption keys for sensitive data.

        **Risk mitigation**

        - Provides centralized key management with full audit logging for build artifact encryption.
        - Enables custom key rotation policies for compliance requirements.
        - Allows fine-grained access control over who can decrypt build artifacts.
      remediation:
        - id: console
          desc: |
            To ensure CodeBuild projects use KMS CMKs for artifact encryption using the AWS Console:

            1. Navigate to the AWS CodeBuild Console.
            2. Select Build projects in the left panel.
            3. Select the project to update.
            4. Choose Edit and then Artifacts.
            5. Under Encryption key, select Custom key.
            6. Choose an existing KMS key or create a new one.
            7. Choose Update artifacts to save the changes.
        - id: cli
          desc: |
            To ensure CodeBuild projects use KMS CMKs for artifact encryption using the AWS CLI, update a CodeBuild project to use a KMS CMK:

            ```bash
            aws codebuild update-project \
              --name <project-name> \
              --encryption-key arn:aws:kms:<region>:<account-id>:key/<key-id>
            ```
        - id: terraform
          desc: |
            To ensure CodeBuild projects use KMS CMKs for artifact encryption in Terraform:

            ```hcl
            resource "aws_codebuild_project" "example" {
              name          = "example"
              encryption_key = aws_kms_key.codebuild.arn

              artifacts {
                type = "S3"
              }

              environment {
                compute_type = "BUILD_GENERAL1_SMALL"
                image        = "aws/codebuild/standard:7.0"
                type         = "LINUX_CONTAINER"
              }

              source {
                type = "GITHUB"
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure CodeBuild projects use KMS CMKs for artifact encryption in CloudFormation:

            ```yaml
            Resources:
              CodeBuildProject:
                Type: AWS::CodeBuild::Project
                Properties:
                  Name: example
                  EncryptionKey: !GetAtt CodeBuildKMSKey.Arn
                  Artifacts:
                    Type: S3
                  Environment:
                    ComputeType: BUILD_GENERAL1_SMALL
                    Image: aws/codebuild/standard:7.0
                    Type: LINUX_CONTAINER
                  Source:
                    Type: GITHUB
            ```
    refs:
      - url: https://docs.aws.amazon.com/codebuild/latest/userguide/security-encryption.html
        title: AWS Documentation - Data encryption in AWS CodeBuild
      - url: https://docs.aws.amazon.com/codebuild/latest/userguide/security.html
        title: AWS Documentation - Security in AWS CodeBuild
  - uid: mondoo-aws-security-codebuild-encryption-key-configured-aws
    filters: asset.platform == "aws"
    mql: aws.codebuild.projects.all(encryptionKey.metadata["KeyManager"] == "CUSTOMER")
  - uid: mondoo-aws-security-codebuild-encryption-key-configured-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_codebuild_project")
    mql: |
      terraform.resources.where(nameLabel == "aws_codebuild_project").all(
        arguments.encryption_key != empty
      )
