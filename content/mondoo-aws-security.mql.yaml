  - uid: mondoo-aws-security-config-aggregator-all-regions
    title: Ensure AWS Config aggregator covers all regions
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-07
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-16
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-7
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-4
      compliance/nist-sp-800-171: nist-sp-800-171--3-12-3
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-1-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    variants:
      - uid: mondoo-aws-security-config-aggregator-all-regions-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-config-aggregator-all-regions-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-config-aggregator-all-regions-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-config-aggregator-all-regions-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-config-aggregator-all-regions-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that AWS Config configuration aggregators are configured to collect data from all AWS regions rather than a limited subset. An aggregator scoped to specific regions leaves the remaining regions as blind spots where misconfigurations and compliance violations can go undetected.

        **Why this matters**

        - **Shadow infrastructure:** Attackers or unauthorized users may deliberately provision resources in uncovered regions to avoid detection by region-scoped compliance tooling.
        - **False compliance posture:** A compliance dashboard fed by a partial aggregator shows a passing score for regions that are simply not observed, creating unwarranted confidence.
        - **Uniform coverage:** AWS services such as Lambda, EC2, and S3 can be deployed in any enabled region; only all-regions coverage ensures consistent policy enforcement.

        **Risk mitigation**

        - **Gap closure:** Enabling all-regions aggregation immediately brings previously unobserved regions into the compliance baseline without requiring additional per-region configuration.
        - **Future-proof coverage:** New AWS regions enabled for the account are automatically included in an all-regions aggregator, preventing coverage gaps from regional expansion.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and open the **AWS Config** console.
        2. In the left navigation pane, select **Aggregators**.
        3. Select each aggregator name to view its details.
        4. Under **Source accounts and regions**, verify that **All regions** is selected rather than a specific list of regions.

        A passing aggregator shows **All regions** selected under source regions. A failing aggregator shows only specific regions selected, leaving some regions uncovered.

        ### Audit via CLI

        1. Check each aggregator for all-regions coverage:

        ```bash
        aws configservice describe-configuration-aggregators \
          --query "ConfigurationAggregators[*].{Name:ConfigurationAggregatorName,AccountAllRegions:AccountAggregationSources[0].AllAwsRegions,OrgAllRegions:OrganizationAggregationSource.AllAwsRegions}"
        ```

        A passing aggregator returns `true` for either `AccountAllRegions` or `OrgAllRegions`. A failing aggregator returns `false` or `null` for both fields.
      remediation:
        - id: console
          desc: |
            To ensure AWS Config aggregator covers all regions using the AWS Console:

            1. Navigate to the **AWS Config Console**.
            2. Select **Aggregators** in the left panel.
            3. Select the existing aggregator.
            4. Under **Source accounts and regions**, ensure **All regions** is selected.
            5. Choose **Save**.
        - id: cli
          desc: |
            To ensure AWS Config aggregator covers all regions using the AWS CLI, update the Config aggregator to include all regions:

            ```bash
            aws configservice put-configuration-aggregator \
              --configuration-aggregator-name my-aggregator \
              --account-aggregation-sources '[{"AccountIds":["123456789012"],"AllAwsRegions":true}]'
            ```

            For organization-level aggregation:

            ```bash
            aws configservice put-configuration-aggregator \
              --configuration-aggregator-name my-org-aggregator \
              --organization-aggregation-source '{"RoleArn":"arn:aws:iam::123456789012:role/ConfigAggregatorRole","AllAwsRegions":true}'
            ```

            Verify:

            ```bash
            aws configservice describe-configuration-aggregators \
              --query "ConfigurationAggregators[*].{Name:ConfigurationAggregatorName,AccountAllRegions:AccountAggregationSources[0].AllAwsRegions,OrgAllRegions:OrganizationAggregationSource.AllAwsRegions}"
            ```
        - id: terraform
          desc: |
            To ensure AWS Config aggregator covers all regions in Terraform:

            ```hcl
            resource "aws_config_configuration_aggregator" "example" {
              name = "organization-aggregator"

              organization_aggregation_source {
                all_regions = true
                role_arn    = aws_iam_role.config_aggregator.arn
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure AWS Config aggregator covers all regions in CloudFormation:

            ```yaml
            Resources:
              ConfigAggregator:
                Type: AWS::Config::ConfigurationAggregator
                Properties:
                  ConfigurationAggregatorName: organization-aggregator
                  OrganizationAggregationSource:
                    AllAwsRegions: true
                    RoleArn: !GetAtt ConfigAggregatorRole.Arn
            ```
    refs:
      - url: https://docs.aws.amazon.com/config/latest/developerguide/aggregate-data.html
        title: AWS Documentation - Multi-Account Multi-Region Data Aggregation
  - uid: mondoo-aws-security-config-aggregator-all-regions-aws
    filters: asset.platform == "aws"
    mql: |
      if (aws.config.aggregators.length == 0) {
        return false
      }
      aws.config.aggregators.any(
        accountAggregationSources.any(allAwsRegions == true) ||
        organizationAggregationSource != null && organizationAggregationSource.allAwsRegions == true
      )
  - uid: mondoo-aws-security-config-aggregator-all-regions-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_config_configuration_aggregator")
    mql: |
      terraform.resources.where(nameLabel == "aws_config_configuration_aggregator").all(
        blocks.where(type == "account_aggregation_source").all(arguments.all_regions == true) &&
        blocks.where(type == "organization_aggregation_source").all(arguments.all_regions == true)
      )
  - uid: mondoo-aws-security-config-aggregator-all-regions-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_config_configuration_aggregator")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_config_configuration_aggregator").all(
        change.after['account_aggregation_source'].all(_['all_regions'] == true) ||
        change.after['organization_aggregation_source'] != null && change.after['organization_aggregation_source']['all_regions'] == true
      )
  - uid: mondoo-aws-security-config-aggregator-all-regions-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_config_configuration_aggregator")
    mql: |
      terraform.state.resources.where(type == "aws_config_configuration_aggregator").all(
        values['account_aggregation_source'].all(_['all_regions'] == true) ||
        values['organization_aggregation_source'] != null && values['organization_aggregation_source']['all_regions'] == true
      )
  - uid: mondoo-aws-security-config-aggregator-all-regions-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::Config::ConfigurationAggregator")
    mql: |
      cloudformation.template.resources.where(type == "AWS::Config::ConfigurationAggregator").all(
        properties['OrganizationAggregationSource']['AllAwsRegions'] == true ||
        properties['AccountAggregationSources'].any(_['AllAwsRegions'] == true)
      )
  - uid: mondoo-aws-security-ecr-no-public-access
    title: Ensure ECR repositories do not allow public access
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-2-1
    variants:
      - uid: mondoo-aws-security-ecr-no-public-access-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-ecr-no-public-access-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ecr-no-public-access-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ecr-no-public-access-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Amazon ECR private repository policies do not grant access to the wildcard principal (`*`), which would make the repository publicly accessible to any AWS account or unauthenticated caller. By default, ECR repositories have no resource policy and are private; a policy granting `Principal: "*"` explicitly opens the repository to the public.

        **Why this matters**

        - **Credential exposure:** Container images frequently contain application secrets, API keys, or internal configuration that were embedded during the build process and should never be publicly accessible.
        - **Supply chain risk:** Publicly accessible images can be pulled and analyzed by adversaries to discover vulnerabilities, reverse-engineer proprietary logic, or identify hardcoded credentials for targeted attacks.
        - **Intellectual property:** Container images may encode proprietary business logic or trade secrets that have significant competitive or regulatory value.
        - **Compliance violations:** Many data-protection and security frameworks require that application artifacts and their embedded configuration are restricted to authorized parties only.

        **Risk mitigation**

        - **Access restriction:** Replacing wildcard principals with explicit account or IAM role ARNs ensures only authorized systems can pull images, eliminating unintentional public exposure.
        - **Defense in depth:** Removing public access from repository policies complements network controls and image scanning, ensuring artifacts are protected at the storage layer.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and open the **Amazon ECR** console.
        2. In the left navigation pane, select **Repositories**.
        3. For each repository, select its name and navigate to the **Permissions** tab.
        4. Review the repository policy JSON. Look for any `Statement` where `Principal` is set to `"*"` or `{"AWS": "*"}`.

        A passing repository has no policy, or its policy contains no statement granting access to the `*` principal. A failing repository has a policy statement with `Principal: "*"` or `Principal: {AWS: "*"}`, granting public access.

        ### Audit via CLI

        1. List all private repositories, then check each policy:

        ```bash
        aws ecr describe-repositories \
          --query "repositories[*].repositoryName" --output text
        ```

        2. For each repository name, retrieve its policy:

        ```bash
        aws ecr get-repository-policy \
          --repository-name <repo-name> \
          --query "policyText"
        ```

        A passing repository returns no policy or a policy with no `Principal` set to `"*"` or `{"AWS": "*"}`. A failing repository returns a policy containing a statement where `Principal` is `"*"` or `{"AWS": "*"}`.
      remediation:
        - id: console
          desc: |
            To ensure ECR repositories do not allow public access using the AWS Console:

            1. Navigate to the **Amazon ECR Console**.
            2. Select **Repositories** in the left panel.
            3. Select the repository to review.
            4. Choose the **Permissions** tab.
            5. Review the policy document for any principals set to `*`.
            6. Select **Edit policy JSON** and remove or restrict any overly permissive statements.
            7. Save the updated policy.
        - id: cli
          desc: |
            To ensure ECR repositories do not allow public access using the AWS CLI, view the current repository policy:

            ```bash
            aws ecr get-repository-policy \
              --repository-name <repo-name>
            ```

            Delete an overly permissive policy:

            ```bash
            aws ecr delete-repository-policy \
              --repository-name <repo-name>
            ```

            Set a restricted policy:

            ```bash
            aws ecr set-repository-policy \
              --repository-name <repo-name> \
              --policy-text file://ecr-policy.json
            ```
        - id: terraform
          desc: |
            To ensure ECR repositories do not allow public access in Terraform:

            ```hcl
            resource "aws_ecr_repository" "example" {
              name = "example-repo"
            }

            resource "aws_ecr_repository_policy" "example" {
              repository = aws_ecr_repository.example.name

              policy = jsonencode({
                Version = "2012-10-17"
                Statement = [{
                  Effect    = "Allow"
                  Principal = { AWS = "arn:aws:iam::${data.aws_caller_identity.current.account_id}:root" }
                  Action    = ["ecr:GetDownloadUrlForLayer", "ecr:BatchGetImage"]
                }]
              })
            }
            ```
        - id: cloudformation
          desc: |
            To ensure ECR repositories do not allow public access in CloudFormation:

            ```yaml
            Resources:
              ECRRepository:
                Type: AWS::ECR::Repository
                Properties:
                  RepositoryName: example-repo
                  RepositoryPolicyText:
                    Version: "2012-10-17"
                    Statement:
                      - Effect: Allow
                        Principal:
                          AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
                        Action:
                          - ecr:GetDownloadUrlForLayer
                          - ecr:BatchGetImage
            ```
    refs:
      - url: https://docs.aws.amazon.com/AmazonECR/latest/userguide/repository-policies.html
        title: AWS Documentation - Amazon ECR repository policies
  - uid: mondoo-aws-security-ecr-no-public-access-aws
    filters: asset.platform == "aws"
    mql: |
      aws.ecr.privateRepositories.where(policy != empty).all(
        policy['Statement'].none(
          _['Principal'] == "*"
        )
      )
      aws.ecr.privateRepositories.where(policy != empty).all(
        policy['Statement'].none(
          _['Principal']['AWS'] == "*"
        )
      )
      aws.ecr.privateRepositories.where(policy != empty).all(
        policy['Statement'].none(
          _['Principal']['AWS'].contains("*")
        )
      )
  - uid: mondoo-aws-security-ecr-no-public-access-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_ecr_repository_policy")
    mql: |
