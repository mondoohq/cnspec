        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that all Amazon RDS clusters have storage encryption enabled, protecting data at rest with AES-256 encryption managed through AWS KMS. Encryption must be enabled when the cluster is created and cannot be added to an existing unencrypted cluster, making early detection essential.

        **Why this matters**

        - **Cluster-wide coverage:** Enabling encryption on the cluster protects the shared cluster storage volume, all automated backups, cluster snapshots, and any read replicas created within the cluster environment.
        - **Snapshot exposure risk:** Unencrypted cluster snapshots can be restored by any AWS account that receives a copy, bypassing all network and IAM controls that protect the live cluster.
        - **Storage media access:** Without encryption, data written to the underlying shared storage is readable at the infrastructure level without any database credentials or VPC network access.
        - **Regulatory baseline:** Most data protection and privacy frameworks treat encryption of database cluster storage as a mandatory baseline for systems handling sensitive or regulated data.

        **Risk mitigation**

        - **Transparent protection:** KMS-based cluster encryption operates below the Aurora storage layer with no application changes required, ensuring all data written to shared cluster storage is encrypted automatically.
        - **Key-level access control:** Using a customer-managed KMS key enables the account owner to audit every decrypt operation, restrict access to specific IAM roles, and revoke data access by disabling the key independently of the cluster.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and open the RDS console.
        2. In the left navigation pane, select **Databases**.
        3. Select an RDS cluster and open the **Configuration** tab.
        4. Under **Storage**, locate the **Encryption** field.

        A passing cluster shows **Enabled** next to Encryption. A failing cluster shows **Not enabled**.

        ### Audit via CLI

        1. Run the following command to check the encryption status of all RDS clusters:

        ```bash
        aws rds describe-db-clusters \
          --query "DBClusters[*].{DBClusterIdentifier:DBClusterIdentifier,StorageEncrypted:StorageEncrypted,KmsKeyId:KmsKeyId}" \
          --output table
        ```

        A passing cluster returns `"StorageEncrypted": true` with a non-empty `KmsKeyId`. A failing cluster returns `"StorageEncrypted": false`.

      remediation:
        - id: console
          desc: |
            To ensure all RDS clusters are set to be encrypted-at-rest using the AWS Console:

            1. Navigate to the AWS RDS Console.
            2. Select Databases in the left panel.
            3. Note: Encryption cannot be enabled on an existing unencrypted DB cluster. Instead, create a new encrypted cluster:
               - Select Create database.
               - Choose Amazon Aurora.
               - Configure the cluster with the same settings as the unencrypted cluster.
               - Under Encryption, enable "Turn on encryption".
               - Choose an AWS KMS key (default or custom).
               - Complete the cluster creation.
            4. Migrate data from the unencrypted cluster to the encrypted one using one of these methods:
               - For Aurora MySQL: Use mysqldump, AWS Database Migration Service, or native Aurora backup/restore.
               - For Aurora PostgreSQL: Use pg_dump/pg_restore, logical replication, or AWS DMS.
            5. Once migration is complete, decommission the unencrypted cluster.
        - id: cli
          desc: |
            To ensure all RDS clusters are set to be encrypted-at-rest using the AWS CLI, export data from unencrypted cluster (for MySQL):

            ```bash
            # Use the RDS export feature to S3
            aws rds start-export-task \
              --export-task-identifier "export-unencrypted-cluster" \
              --source-arn "arn:aws:rds:region:account-id:cluster:unencrypted-cluster" \
              --s3-bucket-name "your-export-bucket" \
              --iam-role-arn "arn:aws:iam::account-id:role/rds-s3-export-role" \
              --kms-key-id "arn:aws:kms:region:account-id:key/key-id"
            ```

            Create a new encrypted cluster:

            ```bash
            aws rds create-db-cluster \
              --db-cluster-identifier encrypted-cluster \
              --engine aurora-mysql \
              --engine-version 5.7.mysql_aurora.2.10.2 \
              --master-username admin \
              --master-user-password YourSecurePassword123 \
              --storage-encrypted \
              --kms-key-id arn:aws:kms:region:account-id:key/key-id
            ```

            Create DB instances for the new cluster:

            ```bash
            aws rds create-db-instance \
              --db-instance-identifier encrypted-instance-1 \
              --db-cluster-identifier encrypted-cluster \
              --engine aurora-mysql \
              --db-instance-class db.r5.large
            ```

            After migration and verification, delete the unencrypted cluster:

            ```bash
            aws rds delete-db-cluster \
              --db-cluster-identifier unencrypted-cluster \
              --skip-final-snapshot
            ```
        - id: terraform
          desc: |
            To ensure all RDS clusters are set to be encrypted-at-rest in Terraform:

            ```hcl
            # Create a KMS key for RDS cluster encryption
            resource "aws_kms_key" "aurora_encryption_key" {
              description         = "KMS key for Aurora cluster encryption"
              enable_key_rotation = true
            }

            # Create an encrypted Aurora cluster
            resource "aws_rds_cluster" "encrypted_cluster" {
              cluster_identifier      = "encrypted-aurora-cluster"
              engine                  = "aurora-mysql"
              engine_version          = "5.7.mysql_aurora.2.10.2"
              availability_zones      = ["us-west-2a", "us-west-2b", "us-west-2c"]
              database_name           = "production"
              master_username         = "admin"
              master_password         = var.master_password
              backup_retention_period = 7
              preferred_backup_window = "07:00-09:00"

              # Enable encryption
              storage_encrypted       = true
              kms_key_id              = aws_kms_key.aurora_encryption_key.arn

              skip_final_snapshot     = true
            }

            # Create cluster instances
            resource "aws_rds_cluster_instance" "cluster_instances" {
              count               = 2
              identifier          = "encrypted-aurora-cluster-${count.index}"
              cluster_identifier  = aws_rds_cluster.encrypted_cluster.id
              instance_class      = "db.r5.large"
              engine              = aws_rds_cluster.encrypted_cluster.engine
              engine_version      = aws_rds_cluster.encrypted_cluster.engine_version
            }
            ```
        - id: cloudformation
          desc: |
            To ensure all RDS clusters are set to be encrypted-at-rest in CloudFormation:

            ```yaml
            Resources:
              AuroraEncryptionKey:
                Type: "AWS::KMS::Key"
                Properties:
                  Description: "KMS key for Aurora cluster encryption"
                  EnableKeyRotation: true
                  KeyPolicy:
                    Version: "2012-10-17"
                    Statement:
                      - Effect: "Allow"
                        Principal:
                          AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
                        Action: "kms:*"
                        Resource: "*"

              EncryptedAuroraCluster:
                Type: "AWS::RDS::DBCluster"
                Properties:
                  DBClusterIdentifier: "encrypted-aurora-cluster"
                  Engine: "aurora-mysql"
                  EngineVersion: "5.7.mysql_aurora.2.10.2"
                  AvailabilityZones:
                    - !Select [0, !GetAZs ""]
                    - !Select [1, !GetAZs ""]
                    - !Select [2, !GetAZs ""]
                  DatabaseName: "production"
                  MasterUsername: "admin"
                  MasterUserPassword: "YourSecurePassword123"
                  BackupRetentionPeriod: 7
                  PreferredBackupWindow: "07:00-09:00"

                  # Enable encryption
                  StorageEncrypted: true
                  KmsKeyId: !Ref AuroraEncryptionKey

                  DeletionProtection: true

              InstanceOne:
                Type: "AWS::RDS::DBInstance"
                Properties:
                  DBClusterIdentifier: !Ref EncryptedAuroraCluster
                  DBInstanceIdentifier: "encrypted-aurora-cluster-0"
                  DBInstanceClass: "db.r5.large"
                  Engine: "aurora-mysql"

              InstanceTwo:
                Type: "AWS::RDS::DBInstance"
                Properties:
                  DBClusterIdentifier: !Ref EncryptedAuroraCluster
                  DBInstanceIdentifier: "encrypted-aurora-cluster-1"
                  DBInstanceClass: "db.r5.large"
                  Engine: "aurora-mysql"
            ```
