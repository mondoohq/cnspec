  - uid: mondoo-aws-security-elasticache-encryption-at-rest
    title: Ensure ElastiCache clusters have encryption at rest enabled
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-aws-security-elasticache-encryption-at-rest-cluster
        tags:
          mondoo.com/filter-title: AWS ElastiCache Cluster
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-elasticache-encryption-at-rest-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-elasticache-encryption-at-rest-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-elasticache-encryption-at-rest-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-elasticache-encryption-at-rest-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon ElastiCache clusters have encryption at rest enabled. Without encryption at rest, cached data is stored in plaintext, which could be exposed if the underlying storage is compromised.

        **Why this matters**

        - ElastiCache clusters often store session data, authentication tokens, and other sensitive information.
        - Without encryption at rest, this data is vulnerable to unauthorized access at the storage layer.
        - AWS Security Hub control ElastiCache.3 requires encryption at rest for ElastiCache replication groups.
        - Compliance frameworks require encryption of data at rest for all data stores.

        **Risk mitigation**

        - **Data protection:** Encrypts all data stored on disk in ElastiCache nodes.
        - **Compliance:** Meets PCI DSS, HIPAA, and SOC 2 requirements for data-at-rest encryption.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and navigate to the Amazon ElastiCache service.
        2. In the left navigation pane, select **Redis caches** (or **Clusters** for Memcached).
        3. Select a cluster to inspect.
        4. In the cluster details, locate the **Encryption** section.
        5. Verify that **Encryption at rest** shows **Enabled**.
        6. Repeat for each cluster in the account.

        A passing cluster shows **Encryption at rest: Enabled**. A failing cluster shows **Encryption at rest: Disabled** or no value.

        ### Audit via CLI

        1. List replication groups and check the at-rest encryption setting:

        ```bash
        aws elasticache describe-replication-groups \
          --query 'ReplicationGroups[*].{Id:ReplicationGroupId,AtRestEncryption:AtRestEncryptionEnabled}' \
          --output table
        ```

        A passing cluster returns `AtRestEncryption: true`. A failing cluster returns `AtRestEncryption: false` or `None`.

      remediation:
        - id: console
          desc: |
            To ensure ElastiCache clusters have encryption at rest enabled using the AWS Console:

            1. Navigate to the Amazon ElastiCache Console.
            2. Note: Encryption at rest can only be enabled at creation time.
            3. Create a new replication group or cluster with Encryption at rest enabled.
            4. Migrate data from the unencrypted cluster to the new encrypted cluster.
            5. Delete the old unencrypted cluster.
        - id: cli
          desc: |
            To ensure ElastiCache clusters have encryption at rest enabled using the AWS CLI, create a new replication group with encryption at rest:

            ```bash
            aws elasticache create-replication-group \
              --replication-group-id example-encrypted \
              --replication-group-description "Encrypted cluster" \
              --at-rest-encryption-enabled \
              --cache-node-type cache.r6g.large \
              --engine redis
            ```
        - id: terraform
          desc: |
            To ensure ElastiCache clusters have encryption at rest enabled in Terraform:

            ```hcl
            resource "aws_elasticache_replication_group" "example" {
              replication_group_id = "example-encrypted"
              description          = "Encrypted ElastiCache cluster"
              node_type            = "cache.r6g.large"
              engine               = "redis"

              at_rest_encryption_enabled = true
            }
            ```
        - id: cloudformation
          desc: |
            To ensure ElastiCache clusters have encryption at rest enabled in CloudFormation:

            ```yaml
            Resources:
              ElastiCacheReplicationGroup:
                Type: AWS::ElastiCache::ReplicationGroup
                Properties:
                  ReplicationGroupId: example-encrypted
                  ReplicationGroupDescription: Encrypted ElastiCache cluster
                  CacheNodeType: cache.r6g.large
                  Engine: redis
                  AtRestEncryptionEnabled: true
            ```
    refs:
      - url: https://docs.aws.amazon.com/AmazonElastiCache/latest/red-ug/at-rest-encryption.html
        title: AWS Documentation - ElastiCache at-rest encryption
