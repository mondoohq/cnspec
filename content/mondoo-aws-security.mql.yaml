              --filter-pattern '{ ($.eventName = CreateVpc) || ($.eventName = DeleteVpc) || ($.eventName = ModifyVpcAttribute) || ($.eventName = AcceptVpcPeeringConnection) || ($.eventName = CreateVpcPeeringConnection) || ($.eventName = DeleteVpcPeeringConnection) || ($.eventName = RejectVpcPeeringConnection) }' \
              --metric-transformations metricName=VPCChanges,metricNamespace=CISBenchmark,metricValue=1
            ```

            Create the alarm:

            ```bash
            aws cloudwatch put-metric-alarm \
              --alarm-name VPCChanges \
              --metric-name VPCChanges \
              --namespace CISBenchmark \
              --statistic Sum \
              --period 300 \
              --threshold 1 \
              --comparison-operator GreaterThanOrEqualToThreshold \
              --evaluation-periods 1 \
              --alarm-actions <sns-topic-arn>
            ```
        - id: terraform
          desc: |
            To ensure log metric filter exists for VPC changes in Terraform, create a CloudWatch log metric filter and alarm for VPC changes:

            ```hcl
            resource "aws_cloudwatch_log_metric_filter" "vpcchanges" {
              name           = "VPCChanges"
              log_group_name = aws_cloudwatch_log_group.cloudtrail.name
              pattern        = "{ ($.eventName = CreateVpc) || ($.eventName = DeleteVpc) || ($.eventName = ModifyVpcAttribute) || ($.eventName = AcceptVpcPeeringConnection) || ($.eventName = CreateVpcPeeringConnection) || ($.eventName = DeleteVpcPeeringConnection) || ($.eventName = RejectVpcPeeringConnection) }"

              metric_transformation {
                name      = "VPCChanges"
                namespace = "CISBenchmark"
                value     = "1"
              }
            }

            resource "aws_cloudwatch_metric_alarm" "vpcchanges" {
              alarm_name          = "VPCChanges"
              metric_name         = "VPCChanges"
              namespace           = "CISBenchmark"
              statistic           = "Sum"
              period              = 300
              threshold           = 1
              comparison_operator = "GreaterThanOrEqualToThreshold"
              evaluation_periods  = 1
              alarm_actions       = [aws_sns_topic.alerts.arn]
            }
            ```
        - id: cloudformation
          desc: |
            To ensure log metric filter exists for VPC changes in CloudFormation, create a CloudWatch log metric filter and alarm for VPC changes:

            ```yaml
            Resources:
              VPCChangesFilter:
                Type: AWS::Logs::MetricFilter
                Properties:
                  LogGroupName: !Ref CloudTrailLogGroup
                  FilterPattern: "{ ($.eventName = CreateVpc) || ($.eventName = DeleteVpc) || ($.eventName = ModifyVpcAttribute) || ($.eventName = AcceptVpcPeeringConnection) || ($.eventName = CreateVpcPeeringConnection) || ($.eventName = DeleteVpcPeeringConnection) || ($.eventName = RejectVpcPeeringConnection) }"
                  MetricTransformations:
                    - MetricName: VPCChanges
                      MetricNamespace: CISBenchmark
                      MetricValue: "1"

              VPCChangesAlarm:
                Type: AWS::CloudWatch::Alarm
                Properties:
                  AlarmName: VPCChanges
                  MetricName: VPCChanges
                  Namespace: CISBenchmark
                  Statistic: Sum
                  Period: 300
                  Threshold: 1
                  ComparisonOperator: GreaterThanOrEqualToThreshold
                  EvaluationPeriods: 1
                  AlarmActions:
                    - !Ref AlertsSNSTopic
            ```
