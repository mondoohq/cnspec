  - uid: mondoo-aws-security-transfer-vpc-endpoint
    title: Ensure Transfer Family servers use VPC endpoints
    impact: 80
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/vda-isa-5: vda-isa-5-5-2-6
    variants:
      - uid: mondoo-aws-security-transfer-vpc-endpoint-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-transfer-vpc-endpoint-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-transfer-vpc-endpoint-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-transfer-vpc-endpoint-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-transfer-vpc-endpoint-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that AWS Transfer Family servers use VPC or VPC_ENDPOINT endpoint types instead of PUBLIC endpoints. VPC endpoints keep file transfer traffic within the AWS network, reducing exposure to internet-based threats.

        **Why this matters**

        - PUBLIC endpoints expose Transfer Family servers directly to the internet, increasing the attack surface for brute-force and denial-of-service attacks.
        - VPC endpoints allow access only from within the VPC or connected networks, providing network-level isolation.
        - Security groups and NACLs can be applied to VPC endpoints for additional access control.
        - Compliance frameworks including NIST SP 800-53 SC-7 require boundary protection for network services.

        **Risk mitigation**

        - **Network isolation:** VPC endpoints restrict access to trusted networks only.
        - **Defense in depth:** Security groups and NACLs provide additional layers of access control.
        - **Reduced attack surface:** Eliminates direct internet exposure of file transfer services.
      remediation:
        - id: console
          desc: |
            To ensure Transfer Family servers use VPC endpoints using the AWS Console:

            1. Navigate to the **AWS Transfer Family Console** and select **Servers**.
            2. Note: Endpoint type cannot be changed after creation. Create a new server with VPC endpoint type.
            3. Choose **Create server**.
            4. Under **Endpoint type**, select **VPC** or **VPC endpoint**.
            5. Configure VPC, subnets, and security groups.
            6. Complete the server configuration and choose **Create server**.
            7. Migrate users and workflows from the old server, then delete it.
        - id: cli
          desc: |
            To ensure Transfer Family servers use VPC endpoints using the AWS CLI, create a new server with VPC endpoint type:

            ```bash
            aws transfer create-server \
              --endpoint-type VPC \
              --endpoint-details VpcId=<vpc-id>,SubnetIds=<subnet-id-1>,<subnet-id-2> \
              --protocols SFTP
            ```
        - id: terraform
          desc: |
            To ensure Transfer Family servers use VPC endpoints in Terraform:

            ```hcl
            resource "aws_transfer_server" "example" {
              endpoint_type = "VPC"
              protocols     = ["SFTP"]

              endpoint_details {
                vpc_id     = aws_vpc.example.id
                subnet_ids = [aws_subnet.example.id]
              }
            }
            ```
        - id: cloudformation
          desc: |
            Set `EndpointType: VPC` on every `AWS::Transfer::Server` so the server is reachable only through your VPC, not over the public internet:

            ```yaml
            Resources:
              TransferServer:
                Type: AWS::Transfer::Server
                Properties:
                  EndpointType: VPC
                  EndpointDetails:
                    VpcId: !Ref VpcId
                    SubnetIds:
                      - !Ref PrivateSubnetA
                      - !Ref PrivateSubnetB
                    SecurityGroupIds:
                      - !Ref TransferSecurityGroup
            ```
    refs:
      - url: https://docs.aws.amazon.com/transfer/latest/userguide/create-server-in-vpc.html
        title: AWS Documentation - Creating a server in a VPC
  - uid: mondoo-aws-security-transfer-vpc-endpoint-aws
