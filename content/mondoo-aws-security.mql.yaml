  - uid: mondoo-aws-security-glue-job-security-configuration
    title: Ensure AWS Glue jobs have a security configuration assigned
    impact: 70
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/soc2-2017: soc2-control-cc6-1-10
    variants:
      - uid: mondoo-aws-security-glue-job-security-configuration-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/icon: aws
      - uid: mondoo-aws-security-glue-job-security-configuration-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/icon: terraform
      - uid: mondoo-aws-security-glue-job-security-configuration-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/icon: terraform
      - uid: mondoo-aws-security-glue-job-security-configuration-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/icon: terraform
    docs:
      desc: |
        This check ensures that AWS Glue ETL jobs have a security configuration assigned. A Glue security configuration defines encryption settings for S3 targets, CloudWatch logs, and job bookmarks. Without a security configuration, Glue job outputs and logs are stored unencrypted.

        **Why this matters**

        - Glue ETL jobs process and transform data that may include sensitive information such as PII, financial records, or healthcare data.
        - Without a security configuration, data written to S3 by Glue jobs is stored in plaintext, exposing it to unauthorized access.
        - CloudWatch logs from Glue jobs may contain sensitive data excerpts or schema information that should be encrypted.
        - Job bookmarks track processing state and may contain metadata about processed data that should be protected.

        **Risk mitigation:**

        - **Data protection:** Ensures all outputs from Glue jobs are encrypted at rest.
        - **Log security:** Encrypts CloudWatch logs generated during job execution.
        - **Compliance:** Meets requirements for encryption of data processing pipelines.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            1. Navigate to the AWS Glue Console.
            2. Select **Security configurations** in the left panel.
            3. Create a security configuration if one does not exist, enabling S3 encryption, CloudWatch encryption, and job bookmark encryption.
            4. Select **Jobs** in the left panel.
            5. Select the job to update.
            6. Select **Edit**.
            7. Under **Security configuration**, select the security configuration created above.
            8. Select **Save**.
        - id: cli
          desc: |
            **Using AWS CLI**

            Create a security configuration:

            ```bash
            aws glue create-security-configuration \
              --name my-security-config \
              --encryption-configuration '{
                "S3Encryption": [{"S3EncryptionMode": "SSE-KMS", "KmsKeyArn": "arn:aws:kms:region:account-id:key/key-id"}],
                "CloudWatchEncryption": {"CloudWatchEncryptionMode": "SSE-KMS", "KmsKeyArn": "arn:aws:kms:region:account-id:key/key-id"},
                "JobBookmarksEncryption": {"JobBookmarksEncryptionMode": "CSE-KMS", "KmsKeyArn": "arn:aws:kms:region:account-id:key/key-id"}
              }'
            ```

            Update a job to use the security configuration:

            ```bash
            aws glue update-job --job-name my-job \
              --job-update '{"SecurityConfiguration": "my-security-config"}'
            ```
        - id: terraform
          desc: |
            **Using Terraform**

            ```hcl
            resource "aws_glue_security_configuration" "example" {
              name = "example-security-config"

              encryption_configuration {
                s3_encryption {
                  s3_encryption_mode = "SSE-KMS"
                  kms_key_arn        = aws_kms_key.glue.arn
                }
                cloudwatch_encryption {
                  cloudwatch_encryption_mode = "SSE-KMS"
                  kms_key_arn                = aws_kms_key.glue.arn
                }
                job_bookmarks_encryption {
                  job_bookmarks_encryption_mode = "CSE-KMS"
                  kms_key_arn                   = aws_kms_key.glue.arn
                }
              }
            }

            resource "aws_glue_job" "example" {
              name     = "example-job"
              role_arn = aws_iam_role.glue.arn

              security_configuration = aws_glue_security_configuration.example.name

              command {
                script_location = "s3://my-bucket/my-script.py"
              }
            }
            ```
    refs:
      - url: https://docs.aws.amazon.com/glue/latest/dg/console-security-configurations.html
        title: AWS Documentation - Working with security configurations on the AWS Glue console
      - url: https://docs.aws.amazon.com/glue/latest/dg/encryption-security-configuration.html
        title: AWS Documentation - Setting up encryption in AWS Glue
