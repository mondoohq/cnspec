          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-s3-bucket-versioning-enabled-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon S3 buckets have versioning enabled. Versioning preserves multiple versions of objects, providing protection against accidental deletions and enabling recovery of previous versions.

        **Why this matters**

        Without versioning:

        - **Data loss:** Accidental deletions or overwrites cannot be recovered.
        - **No audit trail:** Changes to objects cannot be tracked over time.
        - **Ransomware vulnerability:** Encrypted files cannot be restored to pre-attack versions.

        **Risk mitigation**

        - Protects against accidental data loss and overwrites.
        - Enables recovery from ransomware attacks.
        - Supports compliance with data retention requirements.
      remediation:
        - id: console
          desc: |
            To ensure S3 bucket versioning is enabled using the AWS Console:

            1.  Navigate to the Amazon S3 Console.
            2.  Select the desired bucket.
            3.  Go to the "Properties" tab.
            4.  Under "Bucket Versioning", click "Edit".
            5.  Enable versioning and save the changes.
        - id: cli
          desc: |
            To ensure S3 bucket versioning is enabled using the AWS CLI, enable versioning for an S3 bucket:

            ```bash
            aws s3api put-bucket-versioning \
              --bucket <bucket-name> \
              --versioning-configuration Status=Enabled
            ```
        - id: terraform
          desc: |
            To ensure S3 bucket versioning is enabled in Terraform (AWS Provider 4.x), enable versioning for S3 buckets:

            ```hcl
            resource "aws_s3_bucket" "example" {
              bucket = "my-bucket"
            }

            resource "aws_s3_bucket_versioning" "example" {
              bucket = aws_s3_bucket.example.id
              versioning_configuration {
                status = "Enabled"
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure S3 bucket versioning is enabled in CloudFormation:

            ```yaml
            Resources:
              S3Bucket:
                Type: AWS::S3::Bucket
                Properties:
                  BucketName: my-bucket
                  VersioningConfiguration:
                    Status: Enabled
            ```
    refs:
