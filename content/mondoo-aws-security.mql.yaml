  - uid: mondoo-aws-security-vpc-flow-logs-iam-role
    title: Ensure VPC flow logs have an IAM role for CloudWatch delivery
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    variants:
      - uid: mondoo-aws-security-vpc-flow-logs-iam-role-aws
        tags:
          mondoo.com/filter-title: AWS EC2 VPC
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-vpc-flow-logs-iam-role-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-vpc-flow-logs-iam-role-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-vpc-flow-logs-iam-role-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that VPC flow logs configured to deliver to CloudWatch Logs have an IAM role associated. Without an IAM role, flow logs cannot write to CloudWatch, causing log delivery to silently fail and creating a false sense of logging coverage.

        **Why this matters**

        - Flow logs that target CloudWatch Logs require an IAM role with `logs:CreateLogGroup`, `logs:CreateLogStream`, and `logs:PutLogEvents` permissions. Without this role, no logs are delivered.
        - A misconfigured flow log appears enabled in the console but produces no data, creating a dangerous gap between perceived and actual security monitoring.
        - Security teams relying on flow log data for incident detection and response may miss critical events if delivery is silently failing.

        **Risk mitigation**

        - **Reliable log delivery:** Ensures that flow log data is actually delivered to CloudWatch for analysis and alerting.
        - **Eliminates false confidence:** Detects flow logs that appear configured but are not functioning due to missing IAM permissions.
        - **Incident readiness:** Guarantees that network traffic data is available when needed for security investigations.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and navigate to the **VPC** console.
        2. In the left navigation pane, select **Your VPCs**.
        3. Select each VPC and choose the **Flow logs** tab.
        4. For each flow log with **Log destination type: CloudWatch Logs**, verify that the **IAM role** column shows a role ARN.

        A passing flow log shows a valid IAM role ARN in the **IAM role** column. A failing flow log targeting CloudWatch Logs shows no IAM role.

        ### Audit via CLI

        1. List all CloudWatch-destination flow logs and check for a missing IAM role:

        ```bash
        aws ec2 describe-flow-logs \
          --filter "Name=log-destination-type,Values=cloud-watch-logs" \
          --query "FlowLogs[*].{FlowLogId:FlowLogId,ResourceId:ResourceId,IamRoleArn:DeliverLogsPermissionArn}"
        ```

        A passing flow log returns a non-null, non-empty `IamRoleArn`. A failing flow log returns `null` for `IamRoleArn`.

      remediation:
        - id: console
          desc: |
            To ensure VPC flow logs have an IAM role for CloudWatch delivery using the AWS Console:

            1. Navigate to the **VPC Console** and select **Your VPCs**.
            2. Select the VPC and go to the **Flow logs** tab.
            3. For each flow log delivering to CloudWatch Logs, verify that an **IAM role** is configured.
            4. If no IAM role is set, delete the flow log and recreate it with an appropriate IAM role that has permissions to write to CloudWatch Logs.
        - id: cli
          desc: |
            To ensure VPC flow logs have an IAM role for CloudWatch delivery using the AWS CLI, identify flow logs without an IAM role:

            ```bash
            aws ec2 describe-flow-logs \
              --filter "Name=log-destination-type,Values=cloud-watch-logs" \
              --query "FlowLogs[?DeliverLogsPermissionArn==null].{Id:FlowLogId,VPC:ResourceId}"
            ```

            Recreate the flow log with an IAM role (flow logs cannot be modified after creation):

            ```bash
            aws ec2 create-flow-logs \
              --resource-type VPC \
              --resource-ids <vpc-id> \
              --traffic-type ALL \
              --log-destination-type cloud-watch-logs \
              --log-group-name vpc-flow-logs \
              --deliver-logs-permission-arn arn:aws:iam::<account-id>:role/flow-logs-role
            ```
        - id: terraform
          desc: |
            To ensure VPC flow logs have an IAM role for CloudWatch delivery in Terraform:

            ```hcl
            resource "aws_flow_log" "vpc_flow_log" {
              vpc_id          = aws_vpc.main.id
              traffic_type    = "ALL"
              log_destination = aws_cloudwatch_log_group.vpc_logs.arn
              iam_role_arn    = aws_iam_role.flow_log_role.arn
            }

            resource "aws_iam_role" "flow_log_role" {
              name = "vpc-flow-logs-role"
              assume_role_policy = jsonencode({
                Version = "2012-10-17"
                Statement = [{
                  Action = "sts:AssumeRole"
                  Effect = "Allow"
                  Principal = {
                    Service = "vpc-flow-logs.amazonaws.com"
                  }
                }]
              })
            }
            ```
        - id: cloudformation
          desc: |
            To ensure VPC flow logs have an IAM role for CloudWatch delivery in CloudFormation:

            ```yaml
            Resources:
              VPCFlowLog:
                Type: AWS::EC2::FlowLog
                Properties:
                  ResourceType: VPC
                  ResourceId: !Ref MainVPC
                  TrafficType: ALL
                  LogDestinationType: cloud-watch-logs
                  LogGroupName: !Ref VPCLogGroup
                  DeliverLogsPermissionArn: !GetAtt FlowLogRole.Arn
            ```
    refs:
      - url: https://docs.aws.amazon.com/vpc/latest/userguide/flow-logs-cwl.html
        title: AWS Documentation - Publish flow logs to CloudWatch Logs
  - uid: mondoo-aws-security-vpc-flow-logs-iam-role-aws
    filters: asset.platform == "aws-vpc"
    mql: |
      aws.vpc.flowLogs.where(destinationType == "cloud-watch-logs").all(
