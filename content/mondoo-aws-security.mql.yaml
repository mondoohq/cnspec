      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-aws-security-eks-nodegroup-encrypted-volumes-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-eks-nodegroup-encrypted-volumes-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-eks-nodegroup-encrypted-volumes-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-eks-nodegroup-encrypted-volumes-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that EKS managed node groups have EBS volume encryption enabled by verifying that EBS encryption by default is active in all regions where EKS node groups are deployed. Node group EBS volumes inherit the account-level EBS encryption setting.

        **Why this matters**

        - **Data protection**: EKS worker node EBS volumes contain container images, ephemeral storage, and potentially sensitive application data.
        - **Consistent encryption**: Account-level EBS encryption ensures all new volumes, including those created by auto-scaling, are encrypted.
        - **Compliance alignment**: Meets requirements for encryption of data at rest on compute resources.
        - **Defense in depth**: Encrypting node volumes protects data even if physical storage media is compromised.
      remediation:
        - id: console
          desc: |
            To ensure EBS encryption by default is enabled for EKS node group volumes using the AWS Console:

            1. Navigate to **EC2** > **EBS Encryption** (under Account attributes).
            2. Enable **Always encrypt new EBS volumes** in all regions where EKS clusters are deployed.
            3. Optionally set a default KMS key for EBS encryption.
        - id: cli
          desc: |
            To ensure EBS encryption by default is enabled for EKS node group volumes using the AWS CLI:

            ```bash
            aws ec2 enable-ebs-encryption-by-default --region <region>
            ```
        - id: terraform
          desc: |
            To ensure EBS encryption by default is enabled for EKS node group volumes in Terraform, use a launch template with encrypted EBS volumes for your EKS node group:

            ```hcl
            resource "aws_launch_template" "eks_nodes" {
              block_device_mappings {
                device_name = "/dev/xvda"
                ebs {
                  encrypted  = true
                  kms_key_id = aws_kms_key.example.arn
                }
              }
            }

            resource "aws_eks_node_group" "example" {
              cluster_name    = aws_eks_cluster.example.name
              node_group_name = "example"
              launch_template {
                id      = aws_launch_template.eks_nodes.id
                version = aws_launch_template.eks_nodes.latest_version
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure EBS encryption by default is enabled for EKS node group volumes in CloudFormation, use a launch template with encrypted EBS volumes for EKS node groups:

            ```yaml
            Resources:
              EKSNodeLaunchTemplate:
                Type: AWS::EC2::LaunchTemplate
                Properties:
                  LaunchTemplateData:
                    BlockDeviceMappings:
                      - DeviceName: /dev/xvda
                        Ebs:
                          Encrypted: true
                          KmsKeyId: !Ref MyKMSKey
              EKSNodeGroup:
                Type: AWS::EKS::Nodegroup
                Properties:
                  ClusterName: !Ref EKSCluster
                  LaunchTemplate:
                    Id: !Ref EKSNodeLaunchTemplate
            ```
    refs:
      - url: https://docs.aws.amazon.com/eks/latest/userguide/managed-node-groups.html
        title: Amazon EKS managed node groups
  - uid: mondoo-aws-security-eks-nodegroup-encrypted-volumes-aws
    filters: asset.platform == "aws"
    mql: |
      aws.ec2.ebsEncryptionByDefault.all(value == true)
  - uid: mondoo-aws-security-eks-nodegroup-encrypted-volumes-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_launch_template")
    mql: |
      terraform.resources.where(nameLabel == "aws_launch_template").all(
        blocks.where(type == "block_device_mappings") != empty &&
        blocks.where(type == "block_device_mappings").all(
          blocks.where(type == "ebs") != empty &&
          blocks.where(type == "ebs").all(arguments.encrypted == true)
        )
      )
  - uid: mondoo-aws-security-eks-nodegroup-encrypted-volumes-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_launch_template")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_launch_template").all(
        change.after.block_device_mappings != empty &&
        change.after.block_device_mappings.all(
          _['ebs'] != empty &&
          _['ebs'].all(_['encrypted'] == true)
        )
      )
  - uid: mondoo-aws-security-eks-nodegroup-encrypted-volumes-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_launch_template")
    mql: |
      terraform.state.resources.where(type == "aws_launch_template").all(
        values.block_device_mappings != empty &&
        values.block_device_mappings.all(
          _['ebs'] != empty &&
          _['ebs'].all(_['encrypted'] == true)
        )
      )
  - uid: mondoo-aws-security-eks-cluster-iam-auth-mode
    title: Ensure EKS clusters use API-based IAM authentication mode
    impact: 70
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-j
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-3
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-3
    variants:
      - uid: mondoo-aws-security-eks-cluster-iam-auth-mode-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-eks-cluster-iam-auth-mode-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-eks-cluster-iam-auth-mode-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-eks-cluster-iam-auth-mode-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-eks-cluster-iam-auth-mode-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon EKS clusters are configured to use API-based IAM authentication mode (API or API_AND_CONFIG_MAP) rather than relying solely on the legacy aws-auth ConfigMap. API-based authentication provides a more robust and auditable authentication mechanism.

        **Why this matters**

        - **Improved security**: API-based authentication mode uses the EKS API for managing cluster access, providing better auditability through CloudTrail.
        - **Centralized management**: Access entries can be managed through the EKS API, Terraform, or CloudFormation rather than editing a ConfigMap.
        - **Reduced risk**: The aws-auth ConfigMap can be accidentally deleted or misconfigured, potentially locking out cluster administrators.
        - **Compliance alignment**: API-based authentication provides better audit trails for access management.
      remediation:
        - id: console
          desc: |
            To ensure EKS clusters use API-based IAM authentication mode using the AWS Console:

            1. Navigate to the **EKS** console.
            2. Select the cluster and go to the **Access** tab.
            3. Update the authentication mode to **EKS API and ConfigMap** or **EKS API**.
        - id: cli
          desc: |
            To ensure EKS clusters use API-based IAM authentication mode using the AWS CLI:

            ```bash
            aws eks update-cluster-config --name <cluster-name> --access-config authenticationMode=API_AND_CONFIG_MAP
            ```
        - id: terraform
          desc: |
            To ensure EKS clusters use API-based IAM authentication mode in Terraform:

            ```hcl
            resource "aws_eks_cluster" "example" {
              name     = "example"
              role_arn = aws_iam_role.eks.arn

              access_config {
                authentication_mode = "API"
              }

              vpc_config {
                subnet_ids = [aws_subnet.example.id]
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure EKS clusters use API-based IAM authentication mode in CloudFormation:

            ```yaml
            Resources:
              MyEKSCluster:
                Type: AWS::EKS::Cluster
                Properties:
                  Name: example
                  RoleArn: !GetAtt EKSRole.Arn
                  AccessConfig:
                    AuthenticationMode: API
                  ResourcesVpcConfig:
                    SubnetIds:
                      - !Ref Subnet
            ```
    refs:
      - url: https://docs.aws.amazon.com/eks/latest/userguide/grant-k8s-access.html
        title: Grant IAM users and roles access to Kubernetes APIs
  - uid: mondoo-aws-security-eks-cluster-iam-auth-mode-aws
    filters: asset.platform == "aws-eks-cluster"
    mql: |
      aws.eks.cluster.authenticationMode == "API" || aws.eks.cluster.authenticationMode == "API_AND_CONFIG_MAP"
  - uid: mondoo-aws-security-eks-cluster-iam-auth-mode-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_eks_cluster")
    mql: |
      terraform.resources.where(nameLabel == "aws_eks_cluster").all(
      blocks.where(type == "access_config") != empty &&
      blocks.where(type == "access_config").all(arguments.authentication_mode == "API" || arguments.authentication_mode == "API_AND_CONFIG_MAP")
      )
  - uid: mondoo-aws-security-eks-cluster-iam-auth-mode-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_eks_cluster")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_eks_cluster").all(
      change.after.access_config != empty &&
      change.after.access_config.all(_['authentication_mode'] == "API" || _['authentication_mode'] == "API_AND_CONFIG_MAP")
      )
  - uid: mondoo-aws-security-eks-cluster-iam-auth-mode-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_eks_cluster")
    mql: |
      terraform.state.resources.where(type == "aws_eks_cluster").all(
      values.access_config != empty &&
      values.access_config.all(_['authentication_mode'] == "API" || _['authentication_mode'] == "API_AND_CONFIG_MAP")
      )
  - uid: mondoo-aws-security-eks-cluster-iam-auth-mode-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::EKS::Cluster")
    mql: |
      cloudformation.template.resources.where(type == "AWS::EKS::Cluster").all(
      properties['AccessConfig'] != empty && properties['AccessConfig']['AuthenticationMode'] != "CONFIG_MAP"
      )
  # No Terraform variants: Addon health status is runtime telemetry from the EKS control plane (`status == "ACTIVE"`); Terraform configures the addon but cannot represent operational health.
  - uid: mondoo-aws-security-eks-addon-healthy
    title: Ensure EKS cluster add-ons are in a healthy state
    impact: 60
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ccc-06
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-1
      compliance/nist-csf-2: nist-csf-2-pr-ps-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-1
      compliance/pci-dss-4: pcidss-requirement-2-2-1
      compliance/soc2-2017: soc2-control-cc7-1-1
      compliance/vda-isa-5: vda-isa-5-5-2-1
    variants:
      - uid: mondoo-aws-security-eks-addon-healthy-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
    docs:
      desc: |
        This check ensures that all EKS cluster add-ons are in an ACTIVE status. Degraded add-ons directly undermine cluster security controls: a degraded VPC CNI plugin can break network policy enforcement, enabling lateral movement between pods. A degraded kube-proxy can bypass network policies entirely, and unhealthy CoreDNS can disrupt DNS-based security controls.

        **Why this matters**

        - **Network policy bypass:** A degraded VPC CNI plugin can fail to enforce network policies, allowing pods to communicate freely and enabling lateral movement from a compromised container to other workloads in the cluster.
        - **kube-proxy security bypass:** A failed or degraded kube-proxy can cause network policy enforcement to stop functioning, removing pod-level network segmentation that prevents attackers from reaching sensitive services.
        - **Security patch gaps:** Unhealthy add-ons may be running outdated versions with known vulnerabilities that attackers can exploit for container escape or privilege escalation.
        - **DNS manipulation risk:** Degraded CoreDNS can fail to resolve security-critical endpoints (such as OIDC providers or admission webhook services), bypassing authentication and admission controls.
      remediation:
        - id: console
          desc: |
            To ensure EKS cluster add-ons are in a healthy state using the AWS Console:

            1. Navigate to the **EKS** console.
            2. Select the cluster and go to the **Add-ons** tab.
            3. Review the status of each add-on.
            4. Update or reconfigure any add-ons that are not in **Active** status.
        - id: cli
          desc: |
            To ensure EKS cluster add-ons are in a healthy state using the AWS CLI, list and update add-ons:

            ```bash
            aws eks list-addons --cluster-name <cluster-name>
            aws eks update-addon --cluster-name <cluster-name> --addon-name <addon-name> --addon-version <latest-version>
            ```
        - id: terraform
          desc: |
            To ensure EKS cluster add-ons are in a healthy state in Terraform, manage EKS add-ons with Terraform and ensure they are kept up to date:

            ```hcl
            resource "aws_eks_addon" "coredns" {
              cluster_name = aws_eks_cluster.example.name
              addon_name   = "coredns"
            }
            ```
        - id: cloudformation
          desc: |
            To ensure EKS cluster add-ons are in a healthy state in CloudFormation:

            ```yaml
            Resources:
              CoreDNSAddon:
                Type: AWS::EKS::Addon
                Properties:
                  ClusterName: !Ref EKSCluster
                  AddonName: coredns
            ```
    refs:
      - url: https://docs.aws.amazon.com/eks/latest/userguide/eks-add-ons.html
        title: Amazon EKS add-ons
  - uid: mondoo-aws-security-eks-addon-healthy-aws
    filters: asset.platform == "aws-eks-cluster"
    mql: |
      aws.eks.cluster.addons.all(status == "ACTIVE")
  - uid: mondoo-aws-security-ecs-cluster-container-insights
    title: Ensure ECS clusters have Container Insights enabled
    impact: 60
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    variants:
      - uid: mondoo-aws-security-ecs-cluster-container-insights-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-ecs-cluster-container-insights-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ecs-cluster-container-insights-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ecs-cluster-container-insights-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ecs-cluster-container-insights-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon ECS clusters have Container Insights enabled. Without Container Insights, attacks against containerized workloads -- including cryptomining, data exfiltration via abnormal egress traffic, and unauthorized container execution -- are invisible to security monitoring because there is no container-level metrics collection to detect anomalous behavior.

        **Why this matters**

        - **Cryptomining detection:** Cryptomining in compromised containers produces distinctive CPU usage patterns that Container Insights can detect. Without these metrics, cryptomining can run undetected, consuming resources and indicating a broader compromise.
        - **Data exfiltration detection:** Abnormal network egress patterns from containers (such as large data transfers to unexpected destinations) are only visible through Container Insights metrics, which provide task-level network monitoring.
        - **Unauthorized container activity:** Container Insights reveals unexpected container launches, resource consumption spikes, and task-level anomalies that indicate an attacker has deployed malicious containers or compromised existing ones.
        - **Incident response capability:** Without container-level metrics, security teams cannot determine which specific tasks or containers were involved in a breach, significantly slowing incident response and scope assessment.
      remediation:
        - id: console
          desc: |
            To ensure ECS clusters have Container Insights enabled using the AWS Console:

            1. Navigate to the **ECS** console.
            2. Select the cluster and choose **Update cluster**.
            3. Under **Monitoring**, enable **Container Insights**.
        - id: cli
          desc: |
            To ensure ECS clusters have Container Insights enabled using the AWS CLI:

            ```bash
            aws ecs update-cluster-settings --cluster <cluster-name> --settings name=containerInsights,value=enabled
            ```
        - id: terraform
          desc: |
            To ensure ECS clusters have Container Insights enabled in Terraform:

            ```hcl
            resource "aws_ecs_cluster" "example" {
              name = "example"

              setting {
                name  = "containerInsights"
                value = "enabled"
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure ECS clusters have Container Insights enabled in CloudFormation:

            ```yaml
            Resources:
              MyECSCluster:
                Type: AWS::ECS::Cluster
                Properties:
                  ClusterName: example
                  ClusterSettings:
                    - Name: containerInsights
                      Value: enabled
            ```
    refs:
      - url: https://docs.aws.amazon.com/AmazonECS/latest/developerguide/cloudwatch-container-insights.html
        title: Amazon ECS Container Insights
  - uid: mondoo-aws-security-ecs-cluster-container-insights-aws
    filters: asset.platform == "aws"
    mql: |
      aws.ecs.clusters.all(
        configuration["containerInsights"] == "enabled"
      )
  - uid: mondoo-aws-security-ecs-cluster-container-insights-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_ecs_cluster")
    mql: |
      terraform.resources.where(nameLabel == "aws_ecs_cluster").all(
      blocks.where(type == "setting") != empty &&
      blocks.where(type == "setting").any(arguments.name == "containerInsights" && arguments.value == "enabled")
      )
  - uid: mondoo-aws-security-ecs-cluster-container-insights-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_ecs_cluster")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_ecs_cluster").all(
      change.after.setting != empty &&
      change.after.setting.any(name == "containerInsights" && value == "enabled")
      )
  - uid: mondoo-aws-security-ecs-cluster-container-insights-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_ecs_cluster")
    mql: |
      terraform.state.resources.where(type == "aws_ecs_cluster").all(
      values.setting != empty &&
      values.setting.any(name == "containerInsights" && value == "enabled")
      )
  - uid: mondoo-aws-security-ecs-cluster-container-insights-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::ECS::Cluster")
    mql: |
      cloudformation.template.resources.where(type == "AWS::ECS::Cluster").all(
      properties['ClusterSettings'] != empty
      )
  - uid: mondoo-aws-security-ecs-cluster-fargate-encryption
    title: Ensure ECS clusters use KMS encryption for Fargate ephemeral storage
    impact: 70
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-aws-security-ecs-cluster-fargate-encryption-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-ecs-cluster-fargate-encryption-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ecs-cluster-fargate-encryption-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ecs-cluster-fargate-encryption-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ecs-cluster-fargate-encryption-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon ECS clusters have a KMS key configured for encrypting Fargate ephemeral storage. Fargate tasks use ephemeral storage for scratch space, and encrypting this storage with a customer-managed KMS key provides additional data protection.

        **Why this matters**

        - **Data protection**: Ephemeral storage may contain sensitive data processed by containers during task execution.
        - **Enhanced control**: Customer-managed KMS keys allow organizations to manage the encryption key lifecycle.
        - **Compliance alignment**: Encryption of all storage volumes, including ephemeral storage, is required by many regulatory frameworks.
        - **Audit trail**: KMS key usage is logged in CloudTrail for auditing purposes.
      remediation:
        - id: console
          desc: |
            To ensure ECS clusters use KMS encryption for Fargate ephemeral storage using the AWS Console:

            1. Navigate to the **ECS** console.
            2. Select the cluster and choose **Update cluster**.
            3. Under **Encryption**, configure a **KMS key** for Fargate ephemeral storage encryption.
        - id: cli
          desc: |
