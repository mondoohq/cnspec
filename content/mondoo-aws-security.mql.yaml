    mql: |
      terraform.resources.where(nameLabel == "aws_ecs_task_definition").all(
        arguments.container_definitions.all(_['logConfiguration'] != empty)
      )
  - uid: mondoo-aws-security-ecs-logging-enabled-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_ecs_task_definition")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_ecs_task_definition").all(
        change.after.container_definitions.all(_['logConfiguration'] != empty)
      )
  - uid: mondoo-aws-security-ecs-logging-enabled-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_ecs_task_definition")
    mql: |
      terraform.state.resources.where(type == "aws_ecs_task_definition").all(
        values.container_definitions.all(_['logConfiguration'] != empty)
      )
  - uid: mondoo-aws-security-ecs-logging-enabled-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::ECS::TaskDefinition")
    mql: |
      cloudformation.template.resources.where(type == "AWS::ECS::TaskDefinition").all(
      properties['ContainerDefinitions'].all(_['logConfiguration'] != empty)
      )
  - uid: mondoo-aws-security-efs-backup-enabled
    title: Ensure EFS file systems have automatic backups enabled
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-bcr-08
      compliance/dora: dora-art-12
      compliance/hipaa: hipaa-security-ss164-308-a-7-ii-a-contingency-plan-data-backup-plan
      compliance/iso-27001-2022: iso-27001-2022-a-8-14
      compliance/nis-2: nis-2-21-2-c
      compliance/nist-csf-1: nist-csf-1-pr-ip-4
      compliance/nist-csf-2: nist-csf-2-pr-ds-11
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cp-9
      compliance/nist-sp-800-171: false
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc9-1-1
      compliance/vda-isa-5: false
    variants:
      - uid: mondoo-aws-security-efs-backup-enabled-aws
        tags:
          mondoo.com/filter-title: AWS EFS File System
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-efs-backup-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-efs-backup-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-efs-backup-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-efs-backup-enabled-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon Elastic File System (EFS) file systems have automatic backups enabled through AWS Backup. By default, automatic backups are disabled on newly created EFS file systems, meaning data is unprotected against accidental deletion, corruption, or ransomware unless backups are explicitly configured.

        **Why this matters**

        - **Data loss risk:** EFS file systems commonly store application data, configuration, and shared content that is difficult or impossible to reconstruct if lost.
        - **Ransomware recovery:** A backup policy provides a clean recovery point that allows data to be restored to a known-good state after an encryption or deletion attack.
        - **Accidental deletion:** Automated backups protect against user error, runaway scripts, or misconfigured cleanup jobs that delete critical files.
        - **Business continuity:** Recovery point and time objectives can only be met if backups exist to restore from.

        **Risk mitigation**

        - **Restore capability:** AWS Backup creates point-in-time recovery points that can be used to restore an EFS file system to a previous state with a defined RPO.
        - **Ransomware resilience:** Immutable backup copies stored in AWS Backup vaults cannot be encrypted or deleted by the same compromised credentials that attacked the primary file system.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and navigate to **Amazon EFS**.
        2. In the left navigation pane, select **File systems**.
        3. For each file system, select the file system ID, then view the **General** section on the details page.
        4. Locate the **Automatic backups** row.

        A passing file system shows **Automatic backups** as **Enabled**. A failing file system shows **Automatic backups** as **Disabled**.

        ### Audit via CLI

        1. List all EFS file systems, then query the backup policy for each:

        ```bash
        aws efs describe-file-systems \
          --query "FileSystems[*].FileSystemId" --output text | \
          tr '\t' '\n' | \
          xargs -I {} aws efs describe-backup-policy --file-system-id {}
        ```

        A passing file system returns `"Status": "ENABLED"` in the `BackupPolicy` object. A failing file system returns `"Status": "DISABLED"`.

      remediation:
        - id: console
          desc: |
            To ensure EFS file systems have automatic backups enabled using the AWS Console:

            1. Navigate to the Amazon EFS Console.
            2. Select the file system you want to configure.
            3. Under the General section, check the Automatic backups setting.
            4. If disabled, select Edit, enable Automatic backups, and select Save.
        - id: cli
          desc: |
            To ensure EFS file systems have automatic backups enabled using the AWS CLI, check if automatic backups are enabled:

            ```bash
            aws efs describe-backup-policy --file-system-id <file-system-id>
            ```

            Enable automatic backups:

            ```bash
            aws efs put-backup-policy --file-system-id <file-system-id> \
              --backup-policy Status=ENABLED
            ```
        - id: terraform
          desc: |
            To ensure EFS file systems have automatic backups enabled in Terraform:

            ```hcl
            resource "aws_efs_file_system" "example" {
              encrypted = true
            }

            resource "aws_efs_backup_policy" "example" {
              file_system_id = aws_efs_file_system.example.id

              backup_policy {
                status = "ENABLED"
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure EFS file systems have automatic backups enabled in CloudFormation:

            ```yaml
            Resources:
              EFSFileSystem:
                Type: "AWS::EFS::FileSystem"
                Properties:
                  Encrypted: true
                  BackupPolicy:
                    Status: "ENABLED"
            ```
    refs:
      - url: https://docs.aws.amazon.com/efs/latest/ug/awsbackup.html
        title: AWS Documentation - Using AWS Backup to back up and restore Amazon EFS file systems
      - url: https://docs.aws.amazon.com/securityhub/latest/userguide/efs-controls.html
        title: AWS Documentation - EFS controls
  - uid: mondoo-aws-security-efs-backup-enabled-aws
    filters: asset.platform == "aws-efs-filesystem"
    mql: aws.efs.filesystem.backupPolicy["Status"] == "ENABLED"
  - uid: mondoo-aws-security-efs-backup-enabled-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_efs_backup_policy")
    mql: |
      terraform.resources.where(nameLabel == "aws_efs_backup_policy").all(
        blocks.where(type == "backup_policy") != empty &&
        blocks.where(type == "backup_policy").all(arguments.status == "ENABLED")
      )
  - uid: mondoo-aws-security-efs-backup-enabled-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_efs_backup_policy")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_efs_backup_policy").all(
        change.after.backup_policy.all(status == "ENABLED")
      )
  - uid: mondoo-aws-security-efs-backup-enabled-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_efs_backup_policy")
    mql: |
      terraform.state.resources.where(type == "aws_efs_backup_policy").all(
        values.backup_policy.all(status == "ENABLED")
      )
  - uid: mondoo-aws-security-efs-backup-enabled-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::EFS::FileSystem")
    mql: |
      cloudformation.template.resources.where(type == "AWS::EFS::FileSystem").all(
      properties['BackupPolicy'] != empty && properties['BackupPolicy']['Status'] == "ENABLED"
      )
  - uid: mondoo-aws-security-elb-drop-invalid-headers
    title: Ensure Application Load Balancers drop invalid HTTP headers
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-09
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-2-2-6
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-aws-security-elb-drop-invalid-headers-aws
        tags:
          mondoo.com/filter-title: AWS Application Load Balancer
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-elb-drop-invalid-headers-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-elb-drop-invalid-headers-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-elb-drop-invalid-headers-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-elb-drop-invalid-headers-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that AWS Application Load Balancers are configured to drop HTTP request headers that do not conform to the HTTP specification. By default, ALBs forward all headers to backend targets including malformed or non-standard ones, which can enable HTTP request smuggling attacks that exploit parsing differences between the load balancer and the backend.

        **Why this matters**

        - **Request smuggling:** Invalid or ambiguous HTTP headers such as duplicate `Content-Length` or `Transfer-Encoding` values can be crafted to cause the load balancer and backend to disagree on where one request ends and the next begins, allowing cache poisoning or authentication bypass.
        - **WAF evasion:** Malformed headers that pass through the ALB may be interpreted differently by a WAF and the origin server, allowing attackers to craft requests that bypass security rules at the WAF layer while executing malicious payloads at the origin.
        - **Routing exploitation:** Ambiguous header fields can be used to manipulate sticky session behavior, routing decisions, and access control checks that rely on header values.

        **Risk mitigation**

        - **Attack vector elimination:** Rejecting invalid headers at the load balancer removes a class of request smuggling techniques before they can reach backend services.
        - **Defense in depth:** Header validation at the ALB layer supplements application-level input validation, providing a redundant control that operates independently of backend logic.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and navigate to **EC2**.
        2. In the left navigation pane, under **Load Balancing**, select **Load Balancers**.
        3. Filter to **Application** load balancers.
        4. For each ALB, select the load balancer name and choose the **Attributes** tab.
        5. Locate the **Drop invalid header fields** attribute.

        A passing load balancer shows **Drop invalid header fields** as **On** or `true`. A failing load balancer shows the attribute as **Off** or `false`.

        ### Audit via CLI

        1. List all Application Load Balancers, then check the `routing.http.drop_invalid_header_fields.enabled` attribute for each:

        ```bash
        aws elbv2 describe-load-balancers \
          --query "LoadBalancers[?Type=='application'].LoadBalancerArn" \
          --output text | tr '\t' '\n' | \
          xargs -I {} aws elbv2 describe-load-balancer-attributes \
          --load-balancer-arn {} \
          --query "Attributes[?Key=='routing.http.drop_invalid_header_fields.enabled']"
        ```

        A passing load balancer returns `"Value": "true"`. A failing load balancer returns `"Value": "false"`.

      remediation:
        - id: console
          desc: |
            To ensure Application Load Balancers drop invalid HTTP headers using the AWS Console:

            1. Navigate to the AWS EC2 Console.
            2. Select Load Balancers under the Load Balancing section.
            3. Select the Application Load Balancer.
            4. Select the Attributes tab.
            5. Select Edit.
            6. Enable Drop invalid header fields.
            7. Select Save changes.
        - id: cli
          desc: |
            To ensure Application Load Balancers drop invalid HTTP headers using the AWS CLI, check if dropping invalid headers is enabled:

            ```bash
            aws elbv2 describe-load-balancer-attributes \
              --load-balancer-arn <load-balancer-arn> \
              --query "Attributes[?Key=='routing.http.drop_invalid_header_fields.enabled']"
            ```

            Enable dropping invalid headers:

            ```bash
            aws elbv2 modify-load-balancer-attributes \
              --load-balancer-arn <load-balancer-arn> \
              --attributes Key=routing.http.drop_invalid_header_fields.enabled,Value=true
            ```
        - id: terraform
          desc: |
            To ensure Application Load Balancers drop invalid HTTP headers in Terraform:

            ```hcl
            resource "aws_lb" "example" {
              name               = "example-alb"
              internal           = false
              load_balancer_type = "application"
              security_groups    = [aws_security_group.alb_sg.id]
              subnets            = [aws_subnet.public1.id, aws_subnet.public2.id]

              drop_invalid_header_fields = true
            }
            ```
        - id: cloudformation
          desc: |
            To ensure Application Load Balancers drop invalid HTTP headers in CloudFormation:

            ```yaml
            Resources:
              ApplicationLoadBalancer:
                Type: "AWS::ElasticLoadBalancingV2::LoadBalancer"
                Properties:
                  Name: "example-alb"
                  Type: "application"
                  Scheme: "internet-facing"
                  Subnets:
                    - !Ref PublicSubnet1
                    - !Ref PublicSubnet2
                  SecurityGroups:
                    - !Ref ALBSecurityGroup
                  LoadBalancerAttributes:
                    - Key: "routing.http.drop_invalid_header_fields.enabled"
                      Value: "true"
            ```
