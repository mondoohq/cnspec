  - uid: mondoo-aws-security-kinesis-stream-cmk-encryption
    title: Ensure Kinesis data streams are encrypted with a customer-managed KMS key
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-11
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-aws-security-kinesis-stream-cmk-encryption-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-kinesis-stream-cmk-encryption-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-kinesis-stream-cmk-encryption-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-kinesis-stream-cmk-encryption-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-kinesis-stream-cmk-encryption-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon Kinesis data streams are encrypted using a customer-managed AWS KMS key (CMK) rather than the default AWS-managed `aws/kinesis` service key. Customer-managed keys provide greater control over the encryption lifecycle, including key rotation policies, access control, and audit capabilities.

        **Why this matters**

        - The default AWS-managed `aws/kinesis` key does not allow you to control key rotation schedules, define granular access policies, or independently audit key usage.
        - Customer-managed KMS keys enable you to define who can use and manage the key through IAM and key policies, providing an additional layer of access control beyond Kinesis IAM policies.
        - Using CMKs enables detailed audit trails in AWS CloudTrail for all encryption and decryption operations on stream data.
        - Some compliance frameworks require organizations to manage their own encryption keys rather than relying on provider-managed keys.

        **Risk mitigation**

        - **Key control:** Provides full lifecycle control over encryption keys, including the ability to disable or revoke access.
        - **Audit visibility:** Enables detailed CloudTrail logging of all key usage for compliance and forensic purposes.
        - **Access separation:** Allows separation of duties between stream administrators and key administrators.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and navigate to **Amazon Kinesis** > **Data streams**.
        2. Select the stream name.
        3. Open the **Configuration** tab and review **Server-side encryption**.
        4. Note the KMS key ARN or alias shown.

        A passing stream shows a customer-managed KMS key ARN (not `alias/aws/kinesis`). A failing stream either shows no encryption or uses the AWS-managed `alias/aws/kinesis` key.

        ### Audit via CLI

        1. Retrieve the encryption configuration for a stream:

        ```bash
        aws kinesis describe-stream-summary --stream-name <stream-name> \
          --query "StreamDescriptionSummary.{Name:StreamName,Encryption:EncryptionType,KeyId:KeyId}"
        ```

        2. If encryption is KMS, verify the key manager:

        ```bash
        aws kms describe-key --key-id <key-id> \
          --query "KeyMetadata.{KeyId:KeyId,Manager:KeyManager}"
        ```

        A passing stream returns `"KeyManager": "CUSTOMER"`. A failing stream returns `"KeyManager": "AWS"` or has `"EncryptionType": "NONE"`.

      remediation:
        - id: console
          desc: |
            To ensure Kinesis data streams are encrypted with a customer-managed KMS key using the AWS Console:

            1. Navigate to the **Amazon Kinesis Console** and select **Data streams**.
            2. Select the stream to modify.
            3. Under the **Configuration** tab, choose **Edit** next to **Server-side encryption**.
            4. Select **Use a customer-managed AWS KMS key**.
            5. Choose or enter the ARN of your customer-managed KMS key.
            6. Choose **Save changes**.
        - id: cli
          desc: |
            To ensure Kinesis data streams are encrypted with a customer-managed KMS key using the AWS CLI, enable encryption with a customer-managed KMS key:

            ```bash
            aws kinesis start-stream-encryption \
              --stream-name <stream-name> \
              --encryption-type KMS \
              --key-id arn:aws:kms:region:account-id:key/key-id
            ```

            Verify the key used:

            ```bash
            aws kinesis describe-stream-summary --stream-name <stream-name> \
              --query "StreamDescriptionSummary.{Name:StreamName,Encryption:EncryptionType,KeyId:KeyId}"
            ```
        - id: terraform
          desc: |
            To ensure Kinesis data streams are encrypted with a customer-managed KMS key in Terraform, use a customer-managed KMS key:

            ```hcl
            resource "aws_kinesis_stream" "example" {
              name            = "example-stream"
              shard_count     = 1
              encryption_type = "KMS"
              kms_key_id      = aws_kms_key.example.id
            }
            ```
        - id: cloudformation
          desc: |
            To ensure Kinesis data streams are encrypted with a customer-managed KMS key in CloudFormation, specify a customer-managed KMS key:

            ```yaml
            Resources:
              KinesisStream:
                Type: AWS::Kinesis::Stream
                Properties:
                  Name: example-stream
                  ShardCount: 1
                  StreamEncryption:
                    EncryptionType: KMS
                    KeyId: !GetAtt KMSKey.Arn
            ```
    refs:
      - url: https://docs.aws.amazon.com/streams/latest/dev/what-is-sse.html
        title: Data protection in Amazon Kinesis Data Streams
      - url: https://docs.aws.amazon.com/kms/latest/developerguide/concepts.html#customer-cmk
        title: AWS KMS Customer Managed Keys
