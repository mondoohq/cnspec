policies:
  - uid: mondoo-aws-security
    name: Mondoo AWS Security
    version: 12.0.1
    license: BUSL-1.1
    tags:
      mondoo.com/category: security
      mondoo.com/platform: aws,cloud
    require:
      - provider: aws
      - provider: terraform
      - provider: cloudformation
    authors:
      - name: Mondoo, Inc.
        email: hello@mondoo.com
    summary: Secure AWS EC2, S3, IAM, RDS, Lambda, and more
    docs:
      desc: |
        The Mondoo AWS Security policy identifies critical misconfigurations that could leave your AWS infrastructure vulnerable to attackers. This policy helps organizations detect and remediate security risks before they can be exploited, reducing the likelihood of unauthorized access, data breaches, privilege escalation, and operational disruptions.

        This policy provides security checks across key AWS services, uncovering misconfigurations that could put critical resources at risk, particularly those exposed to the public internet:

        - API Gateway
        - AWS Backup
        - AWS CodeBuild
        - AWS Config
        - CloudFront
        - CloudTrail
        - CloudWatch
        - DynamoDB
        - Elastic Compute Cloud (EC2) instances & storage
        - Elastic Container Registry (ECR)
        - Elastic Container Service (ECS)
        - ElastiCache (Redis & Memcached)
        - Elastic File System (EFS)
        - Elastic Beanstalk
        - Elastic Kubernetes Service (EKS)
        - Elastic Load Balancers (ELBs)
        - Elastic MapReduce (EMR)
        - Elasticsearch (OpenSearch Service)
        - FSx
        - Glue
        - GuardDuty
        - IAM Access Analyzer
        - Identity and Access Management (IAM)
        - Key Management Service (KMS)
        - Lambda
        - Neptune
        - OpenSearch
        - Relational Database Service (RDS) & Redshift
        - SageMaker
        - Secrets Manager
        - Security Hub
        - Simple Notification Service (SNS)
        - Simple Queue Service (SQS)
        - Simple Storage Service (S3)
        - AWS Certificate Manager (ACM)
        - AWS Database Migration Service (DMS)
        - AWS Elastic Disaster Recovery (DRS)
        - Amazon Inspector
        - Amazon Timestream
        - AWS Systems Manager (SSM)
        - Virtual Private Cloud (VPCs)
        - Amazon Route 53
        - Amazon Cognito
        - Amazon Athena
        - Amazon Kinesis
        - Amazon MemoryDB
        - Amazon DocumentDB
        - Amazon WorkSpaces
        - Amazon WorkSpaces Web
        - Amazon AppStream 2.0
        - AWS Directory Service
        - Amazon MQ
        - Amazon MSK (Managed Streaming for Apache Kafka)
        - Amazon Keyspaces
        - AWS App Mesh
        - AWS IAM Identity Center
        - AWS Resource Access Manager (RAM)
        - AWS Step Functions
        - AWS Transfer Family

        Learn more about scanning AWS in the [cnspec AWS documentation](https://mondoo.com/docs/cnspec/cloud/aws).

        Have suggestions for new checks in this policy? Visit our [cnspec repository](https://github.com/mondoohq/cnspec).
