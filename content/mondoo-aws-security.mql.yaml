        values.code_signing_config_arn != ""
      )
  - uid: mondoo-aws-security-lambda-code-signing-configured-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::Lambda::Function")
    mql: |
      cloudformation.template.resources.where(type == "AWS::Lambda::Function").all(
      properties['CodeSigningConfigArn'] != ""
      )
  - uid: mondoo-aws-security-sagemaker-notebook-imdsv2
    title: Ensure SageMaker notebook instances use IMDSv2
    impact: 80
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-8
      compliance/vda-isa-5: vda-isa-5-4-1-3
    variants:
      - uid: mondoo-aws-security-sagemaker-notebook-imdsv2-aws
        tags:
          mondoo.com/filter-title: AWS SageMaker Notebook Instance
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-sagemaker-notebook-imdsv2-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-sagemaker-notebook-imdsv2-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-sagemaker-notebook-imdsv2-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-sagemaker-notebook-imdsv2-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon SageMaker notebook instances are configured to require Instance Metadata Service Version 2 (IMDSv2). IMDSv1 is vulnerable to Server-Side Request Forgery (SSRF) attacks that can expose instance credentials and metadata to attackers.

        **Why this matters**

        SageMaker notebook instances, like EC2 instances, use the Instance Metadata Service (IMDS) to access instance credentials and configuration. IMDSv1 allows simple unauthenticated HTTP GET requests, making it a known target for SSRF attacks:

        - SSRF vulnerabilities in notebook code or dependencies can be exploited to steal IAM role credentials from the metadata endpoint.
        - IMDSv1 does not require session tokens, making credential theft trivially easy for attackers.
        - The Capital One breach in 2019 demonstrated the real-world impact of IMDSv1 exploitation.
        - CIS AWS Foundations Benchmark and NIST recommend enforcing IMDSv2 for all compute instances.

        **Risk mitigation**

        - Prevents credential theft through SSRF attacks by requiring session-based authentication.
        - Enforces PUT-based token requests that are blocked by most SSRF attack vectors.
        - Aligns with security best practices for instance metadata access.
      remediation:
        - id: console
          desc: |
            To ensure SageMaker notebook instances use IMDSv2 using the AWS Console, note: The minimum IMDS version cannot be changed on an existing notebook instance. You must create a new instance.

            1. Navigate to the Amazon SageMaker Console.
            2. Select Notebook instances in the left panel.
            3. Select Create notebook instance.
            4. Under Network, set Minimum IMDS version to 2.
            5. Complete the remaining configuration and select Create notebook instance.
            6. Migrate data from the old notebook instance and delete it.
        - id: cli
          desc: |
            To ensure SageMaker notebook instances use IMDSv2 using the AWS CLI, create a new SageMaker notebook instance with IMDSv2 enforced:

            ```bash
            aws sagemaker create-notebook-instance \
              --notebook-instance-name "secure-notebook" \
              --instance-type ml.t3.medium \
              --role-arn arn:aws:iam::<account-id>:role/<role-name> \
              --instance-metadata-service-configuration MinimumInstanceMetadataServiceVersion=2
            ```
        - id: terraform
          desc: |
            To ensure SageMaker notebook instances use IMDSv2 in Terraform:

            ```hcl
            resource "aws_sagemaker_notebook_instance" "example" {
              name                                  = "secure-notebook"
              instance_type                         = "ml.t3.medium"
              role_arn                               = aws_iam_role.sagemaker.arn
              minimum_instance_metadata_service_version = "2"
            }
            ```
        - id: cloudformation
          desc: |
            To ensure SageMaker notebook instances use IMDSv2 in CloudFormation:

            ```yaml
            Resources:
              SageMakerNotebook:
                Type: AWS::SageMaker::NotebookInstance
                Properties:
                  NotebookInstanceName: secure-notebook
                  InstanceType: ml.t3.medium
                  RoleArn: !GetAtt SageMakerRole.Arn
                  InstanceMetadataServiceConfiguration:
                    MinimumInstanceMetadataServiceVersion: "2"
            ```
    refs:
      - url: https://docs.aws.amazon.com/sagemaker/latest/dg/notebook-interface-endpoint.html
        title: AWS Documentation - SageMaker Notebook Instance Security
      - url: https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/configuring-instance-metadata-service.html
        title: AWS Documentation - Instance Metadata Service Version 2
