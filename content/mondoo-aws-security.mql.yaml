  - uid: mondoo-aws-security-ram-no-external-principals
    title: Ensure RAM shares do not allow external principals
    impact: 80
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-5
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/vda-isa-5: vda-isa-5-4-1-1
    variants:
      - uid: mondoo-aws-security-ram-no-external-principals-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-ram-no-external-principals-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ram-no-external-principals-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ram-no-external-principals-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ram-no-external-principals-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that AWS Resource Access Manager (RAM) resource shares do not allow external principals. When external principals are allowed, resources can be shared with AWS accounts outside your organization, increasing the risk of unauthorized access.

        **Why this matters**

        - Allowing external principals enables sharing of resources such as VPC subnets, Transit Gateways, and License Manager configurations with accounts outside your AWS Organization.
        - External sharing bypasses organizational boundaries and SCPs, potentially exposing sensitive infrastructure to unauthorized parties.
        - Compliance frameworks including NIST SP 800-53 AC-6 and SOC 2 CC6.1 require least-privilege access controls on shared resources.

        **Risk mitigation**

        - **Blast radius reduction:** Restricting sharing to your organization limits exposure of critical resources.
        - **Policy enforcement:** Organization-only sharing respects SCPs and organizational policies.
        - **Compliance:** Satisfies access control requirements across multiple regulatory frameworks.
      remediation:
        - id: console
          desc: |
            To ensure RAM resource shares do not allow external principals using the AWS Console:

            1. Navigate to the **AWS RAM Console** and select **Resource shares**.
            2. Select the resource share you want to configure.
            3. Choose **Modify**.
            4. Under **Allow external principals**, uncheck the option.
            5. Remove any external principals from the share.
            6. Choose **Save**.
        - id: cli
          desc: |
            To ensure RAM resource shares do not allow external principals using the AWS CLI:

            ```bash
            aws ram update-resource-share \
              --resource-share-arn <resource-share-arn> \
              --no-allow-external-principals
            ```
        - id: terraform
          desc: |
            To ensure RAM resource shares do not allow external principals in Terraform:

            ```hcl
            resource "aws_ram_resource_share" "example" {
              name                      = "example-share"
              allow_external_principals = false
            }
            ```
        - id: cloudformation
          desc: |
            Set `AllowExternalPrincipals: false` on every `AWS::RAM::ResourceShare` so resources can only be shared with principals inside the AWS Organization:

            ```yaml
            Resources:
              ResourceShare:
                Type: AWS::RAM::ResourceShare
                Properties:
                  Name: example
                  AllowExternalPrincipals: false
                  ResourceArns:
                    - !GetAtt SharedSubnet.Arn
                  Principals:
                    - arn:aws:organizations::111122223333:ou/o-aaaa/ou-bbbb
            ```
    refs:
      - url: https://docs.aws.amazon.com/ram/latest/userguide/working-with-sharing.html
        title: AWS Documentation - Sharing your AWS resources
  - uid: mondoo-aws-security-ram-no-external-principals-aws
    filters: asset.platform == "aws"
    mql: |
      aws.ram.resourceShares.all(allowExternalPrincipals == false)
  - uid: mondoo-aws-security-ram-no-external-principals-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_ram_resource_share")
    mql: |
      terraform.resources.where(nameLabel == "aws_ram_resource_share").all(
        arguments.allow_external_principals == false
      )
  - uid: mondoo-aws-security-ram-no-external-principals-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_ram_resource_share")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_ram_resource_share").all(
        change.after["allow_external_principals"] == false
      )
  - uid: mondoo-aws-security-ram-no-external-principals-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_ram_resource_share")
    mql: |
      terraform.state.resources.where(type == "aws_ram_resource_share").all(
