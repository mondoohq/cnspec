  - uid: mondoo-aws-security-redshift-cluster-current-maintenance-track
    title: Ensure Redshift clusters are on the current maintenance track
    impact: 60
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-8
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-12
      compliance/nist-csf-2: nist-csf-2-pr-ps-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-1
      compliance/soc2-2017: soc2-control-cc7-1-1
    variants:
      - uid: mondoo-aws-security-redshift-cluster-current-maintenance-track-aws
        tags:
          mondoo.com/filter-title: AWS Redshift Cluster
          mondoo.com/icon: aws
    docs:
      desc: |
        This check ensures that Amazon Redshift clusters are configured to use the `Current` maintenance track rather than the `Trailing` track. The maintenance track determines which cluster version is applied during maintenance windows and directly affects the security posture of the cluster.

        **Why this matters**

        Amazon Redshift offers two maintenance tracks:

        - **Current**: Applies the latest approved cluster version, including the most recent security patches, bug fixes, and feature updates.
        - **Trailing**: Applies the cluster version that was current before the most recent update, meaning the cluster runs on an older version that may be missing critical security patches.

        Clusters on the `Trailing` maintenance track are intentionally running behind on security updates. While this may provide additional testing time for application compatibility, it increases the window of exposure to known vulnerabilities that have already been patched in the `Current` track.

        **Risk mitigation:**

        - **Timely Patching:** Ensures clusters receive security patches as soon as they are available.
        - **Reduced Vulnerability Window:** Minimizes the time clusters are exposed to known security issues.
        - **Compliance:** Meets patch management requirements under frameworks such as NIST 800-53 (SI-2), ISO 27001, and SOC 2.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            1. Navigate to the AWS Redshift Console.
            2. Select **Clusters** in the left panel.
            3. Select the cluster and go to the **Maintenance** tab.
            4. Under **Maintenance track**, check the current setting.
            5. If the cluster is on the `Trailing` track:
               - Select **Modify**.
               - Under **Maintenance track**, select **Current**.
               - Click **Modify cluster**.
        - id: cli
          desc: |
            **Using AWS CLI**

            Check the maintenance track of Redshift clusters:

            ```bash
            aws redshift describe-clusters --query "Clusters[*].{Cluster:ClusterIdentifier,MaintenanceTrack:MaintenanceTrackName}"
            ```

            If a cluster is on the `Trailing` track, switch to `Current`:

            ```bash
            aws redshift modify-cluster \
              --cluster-identifier <cluster-id> \
              --maintenance-track-name Current
            ```
        - id: terraform
          desc: |
            **Using Terraform**

            Ensure Redshift clusters use the `Current` maintenance track:

            ```hcl
            resource "aws_redshift_cluster" "secure_redshift" {
              cluster_identifier     = "secure-redshift-cluster"
              node_type              = "dc2.large"
              master_username        = "admin"
              master_password        = var.redshift_master_password
              maintenance_track_name = "Current"
            }
            ```
    refs:
      - url: https://docs.aws.amazon.com/redshift/latest/mgmt/managing-cluster-maintenance.html
        title: Amazon Redshift Cluster Maintenance
      - url: https://docs.aws.amazon.com/securityhub/latest/userguide/securityhub-controls-reference.html
        title: AWS Security Hub Controls Reference
  - uid: mondoo-aws-security-redshift-cluster-current-maintenance-track-aws
    filters: asset.platform == "aws-redshift-cluster"
    mql: aws.redshift.cluster.maintenanceTrackName == "Current"
  - uid: mondoo-aws-security-fsx-filesystem-cmk-encryption
    title: Ensure FSx file systems are encrypted with a customer-managed KMS key
    impact: 70
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-12
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-10
      compliance/soc2-2017: soc2-control-cc6-1-10
    variants:
      - uid: mondoo-aws-security-fsx-filesystem-cmk-encryption-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/icon: aws
      - uid: mondoo-aws-security-fsx-filesystem-cmk-encryption-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/icon: terraform
      - uid: mondoo-aws-security-fsx-filesystem-cmk-encryption-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/icon: terraform
      - uid: mondoo-aws-security-fsx-filesystem-cmk-encryption-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/icon: terraform
    docs:
      desc: |
        This check ensures that Amazon FSx file systems are encrypted using a customer-managed AWS KMS key (CMK). While FSx encrypts data at rest by default, using a CMK instead of the AWS-managed key provides additional control over key management, access policies, and rotation schedules.

        **Why this matters**

        - AWS-managed encryption keys do not allow customers to control key policies, audit key usage independently, or enforce custom rotation schedules.
        - Customer-managed KMS keys enable fine-grained access control, allowing organizations to restrict which principals can encrypt and decrypt file system data.
        - CMKs integrate with AWS CloudTrail for key usage auditing, providing visibility into who accessed encrypted data and when.
        - Compliance frameworks often require customer-controlled encryption keys for sensitive file storage.

        **Risk mitigation:**

        - **Key control:** Organizations maintain full control over the encryption key lifecycle, including creation, rotation, and deletion.
        - **Access auditing:** All key usage is logged in CloudTrail, enabling security monitoring and compliance reporting.
        - **Compliance:** Meets regulatory requirements for customer-managed encryption of data at rest.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            1. Open the AWS Console and navigate to **FSx** under **Storage** (or search for "FSx" in the search bar).
            2. Note: Encryption settings can only be configured at creation time and cannot be changed for existing file systems.
            3. Select **Create file system** and choose the appropriate file system type (Lustre, Windows File Server, NetApp ONTAP, or OpenZFS).
            4. In the **Encryption** section, choose **Customer managed KMS key** and select the desired key from the dropdown or enter a KMS key ARN.
            5. Configure the remaining file system settings (storage capacity, VPC, subnets, security groups) and complete the creation.
            6. Migrate data from the existing file system using AWS DataSync, Robocopy, or rsync depending on the file system type.
            7. Update application references to point to the new file system endpoint, then decommission the old file system.
            8. Update applications to use the new file system's DNS name or mount target.
            9. Delete the old file system after verifying the migration.
        - id: cli
          desc: |
            **Using AWS CLI**

            Create an FSx file system with a customer-managed KMS key:

            ```bash
            aws fsx create-file-system \
              --file-system-type LUSTRE \
              --storage-capacity 1200 \
              --subnet-ids <subnet-id> \
              --lustre-configuration DeploymentType=PERSISTENT_2,PerUnitStorageThroughput=125 \
              --kms-key-id arn:aws:kms:region:account-id:key/key-id
            ```

            Check the KMS key used by an existing file system:

            ```bash
            aws fsx describe-file-systems --file-system-ids <fs-id> \
              --query "FileSystems[*].{FileSystemId:FileSystemId,KmsKeyId:KmsKeyId}"
            ```
        - id: terraform
          desc: |
            **Using Terraform**

            ```hcl
            resource "aws_kms_key" "fsx" {
              description         = "KMS key for FSx encryption"
              enable_key_rotation = true
            }

            resource "aws_fsx_lustre_file_system" "example" {
              storage_capacity = 1200
              subnet_ids       = [aws_subnet.example.id]
              kms_key_id       = aws_kms_key.fsx.arn
            }
            ```
        - id: cloudformation
          desc: |
            **Using CloudFormation**

            ```yaml
            Resources:
              FSxKMSKey:
                Type: "AWS::KMS::Key"
                Properties:
                  Description: "KMS key for FSx encryption"
                  EnableKeyRotation: true

              FSxFileSystem:
                Type: "AWS::FSx::FileSystem"
                Properties:
                  FileSystemType: LUSTRE
                  StorageCapacity: 1200
                  SubnetIds:
                    - !Ref Subnet
                  KmsKeyId: !GetAtt FSxKMSKey.Arn
            ```
