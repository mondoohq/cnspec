    docs:
      desc: |
        This check ensures that all Amazon RDS instances have storage encryption enabled, protecting data at rest with AES-256 encryption managed through AWS KMS. Encryption cannot be enabled on an existing unencrypted RDS instance; it must be set at creation time, making early detection of unencrypted instances critical.

        **Why this matters**

        - **Data protection scope:** RDS encryption covers the instance storage, automated backups, read replicas, and all snapshots created from the instance, ensuring that every copy of the data inherits the same protection.
        - **Physical media exposure:** Without encryption, data written to the underlying storage media is readable by anyone with physical or low-level access to the host infrastructure.
        - **Snapshot portability risk:** Unencrypted snapshots can be shared with or copied to any AWS account and restored without any key access requirement, making them a common vector for accidental data leakage.
        - **Regulatory expectation:** Most data-protection frameworks treat encryption of database storage as a baseline control for any system that handles personal, financial, or health information.

        **Risk mitigation**

        - **Transparent protection:** AWS KMS encryption operates below the database engine layer, requiring no application changes while ensuring all writes to disk are encrypted automatically.
        - **Key-based access control:** Attaching a customer-managed KMS key allows the account owner to audit decrypt operations, restrict which roles can read data, and revoke access by disabling the key.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and open the RDS console.
        2. In the left navigation pane, select **Databases**.
        3. Select an RDS instance and open the **Configuration** tab.
        4. Under **Storage**, locate the **Encryption** field.

        A passing instance shows **Enabled** next to Encryption. A failing instance shows **Not enabled**.

        ### Audit via CLI

        1. Run the following command to check the encryption status of all RDS instances:

        ```bash
        aws rds describe-db-instances \
          --query "DBInstances[*].{DBInstanceIdentifier:DBInstanceIdentifier,StorageEncrypted:StorageEncrypted,KmsKeyId:KmsKeyId}" \
          --output table
        ```

        A passing instance returns `"StorageEncrypted": true` with a non-empty `KmsKeyId`. A failing instance returns `"StorageEncrypted": false`.

      remediation:
        - id: console
          desc: |
            To ensure all RDS instances are enabled for encryption-at-rest using the AWS Console:

            1. Navigate to the AWS RDS Console.
            2. Select Databases in the left panel.
            3. Note: Encryption cannot be enabled on an existing unencrypted DB instance. Instead, create a new encrypted instance:
               - Select Create database.
               - Configure the database with the same settings as the unencrypted instance.
               - Under Encryption, enable "Turn on encryption".
               - Choose an AWS KMS key (default or custom).
               - Complete the database creation.
            4. Migrate data from the unencrypted instance to the encrypted one.
               - For MySQL/MariaDB: Use mysqldump or AWS Database Migration Service.
               - For PostgreSQL: Use pg_dump/pg_restore or AWS DMS.
               - For Oracle: Use Oracle Data Pump or AWS DMS.
               - For SQL Server: Use native backup/restore or AWS DMS.
            5. Once migration is complete, decommission the unencrypted instance.
        - id: cli
          desc: |
            To ensure all RDS instances are enabled for encryption-at-rest using the AWS CLI, create a snapshot of the unencrypted instance:

            ```bash
            aws rds create-db-snapshot \
              --db-instance-identifier unencrypted-instance \
              --db-snapshot-identifier unencrypted-snapshot
            ```

            Create an encrypted copy of the snapshot:

            ```bash
            aws rds copy-db-snapshot \
              --source-db-snapshot-identifier unencrypted-snapshot \
              --target-db-snapshot-identifier encrypted-snapshot \
              --kms-key-id arn:aws:kms:region:account-id:key/key-id
            ```

            Restore a new instance from the encrypted snapshot:

            ```bash
            aws rds restore-db-instance-from-db-snapshot \
              --db-instance-identifier new-encrypted-instance \
              --db-snapshot-identifier encrypted-snapshot
            ```

            After verification, delete the unencrypted instance:

            ```bash
            aws rds delete-db-instance \
              --db-instance-identifier unencrypted-instance \
              --skip-final-snapshot
            ```
        - id: terraform
          desc: |
            To ensure all RDS instances are enabled for encryption-at-rest in Terraform:

            ```hcl
            # Create a KMS key for RDS encryption
            resource "aws_kms_key" "rds_encryption_key" {
              description         = "KMS key for RDS encryption"
              enable_key_rotation = true
            }

            # Create an encrypted RDS instance
            resource "aws_db_instance" "encrypted_instance" {
              identifier           = "encrypted-rds-instance"
              engine               = "mysql"
              engine_version       = "8.0"
              instance_class       = "db.t3.micro"
              allocated_storage    = 20
              storage_type         = "gp2"
              username             = "admin"
              password             = "YourSecurePassword123"

              # Enable encryption
              storage_encrypted    = true
              kms_key_id           = aws_kms_key.rds_encryption_key.arn

              # Other configuration
              multi_az             = true
              skip_final_snapshot  = true
            }
            ```
        - id: cloudformation
          desc: |
            To ensure all RDS instances are enabled for encryption-at-rest in CloudFormation:

            ```yaml
            Resources:
              RDSEncryptionKey:
                Type: "AWS::KMS::Key"
                Properties:
                  Description: "KMS key for RDS encryption"
                  EnableKeyRotation: true
                  KeyPolicy:
                    Version: "2012-10-17"
                    Statement:
                      - Effect: "Allow"
                        Principal:
                          AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
                        Action: "kms:*"
                        Resource: "*"

              EncryptedRDSInstance:
                Type: "AWS::RDS::DBInstance"
                Properties:
                  DBInstanceIdentifier: "encrypted-rds-instance"
                  Engine: "mysql"
                  EngineVersion: "8.0"
                  DBInstanceClass: "db.t3.micro"
                  AllocatedStorage: 20
                  StorageType: "gp2"
                  MasterUsername: "admin"
                  MasterUserPassword: "YourSecurePassword123"

                  # Enable encryption
                  StorageEncrypted: true
                  KmsKeyId: !Ref RDSEncryptionKey

                  # Other configuration
                  MultiAZ: true
                  SkipFinalSnapshot: true
            ```
    refs:
      - url: https://docs.aws.amazon.com/AmazonRDS/latest/UserGuide/UsingWithRDS.html
        title: Amazon RDS Security
      - url: https://docs.aws.amazon.com/AmazonRDS/latest/UserGuide/Overview.Encryption.html
        title: Amazon RDS Encryption
