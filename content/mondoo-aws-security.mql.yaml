      )
  - uid: mondoo-aws-security-memorydb-no-open-access-acl
    title: Ensure MemoryDB clusters do not use the default open-access ACL
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-5
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-2-1
    variants:
      - uid: mondoo-aws-security-memorydb-no-open-access-acl-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-memorydb-no-open-access-acl-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-memorydb-no-open-access-acl-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-memorydb-no-open-access-acl-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-memorydb-no-open-access-acl-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that MemoryDB clusters are not using the default "open-access" ACL. The open-access ACL grants all commands and all keys to any authenticated user, effectively bypassing access control. Clusters should use custom ACLs with properly scoped user permissions.

        **Why this matters**

        - The default "open-access" ACL allows any authenticated user to run all Redis commands including destructive operations like FLUSHALL or CONFIG SET.
        - Without proper ACLs, there is no separation of duties between read-only consumers and administrators.
        - An application compromise could lead to full data exfiltration or destruction if using the open-access ACL.
        - Custom ACLs enable the principle of least privilege by restricting users to only the commands and keys they need.

        **Risk mitigation**

        - **Least privilege:** Custom ACLs restrict users to only necessary commands and key patterns.
        - **Separation of duties:** Different ACLs for different applications prevent lateral movement.
        - **Data protection:** Prevents unauthorized users from running destructive or administrative commands.
      audit: |
        ### Audit via Console

        1. Open the AWS Management Console and navigate to **Amazon MemoryDB**.
        2. In the left navigation panel, select **Clusters**.
        3. For each cluster, select the cluster name.
        4. On the **Security** tab, locate the **Access control list** field.

        A passing cluster shows a custom ACL name (not `open-access`). A failing cluster shows `open-access` in the **Access control list** field.

        ### Audit via CLI

        1. List all MemoryDB clusters and their assigned ACLs:

        ```bash
        aws memorydb describe-clusters \
          --query "Clusters[*].{Name:Name,ACLName:ACLName}"
        ```

        A passing cluster returns an `ACLName` value that is not `open-access`. A failing cluster returns `ACLName` equal to `open-access`.

      remediation:
        - id: console
          desc: |
            To ensure MemoryDB clusters do not use the default open-access ACL using the AWS Console:

            1. Navigate to the Amazon MemoryDB Console.
            2. Select **Access control lists** in the left panel.
            3. Create a new ACL with appropriate user permissions.
            4. Select **Clusters** in the left panel.
            5. Select the cluster using the open-access ACL.
            6. Select **Modify**.
            7. Under **Access control list**, select the custom ACL.
            8. Select **Modify**.
        - id: cli
          desc: |
            To ensure MemoryDB clusters do not use the default open-access ACL using the AWS CLI, create a custom user and ACL:

            ```bash
            aws memorydb create-user \
              --user-name my-app-user \
              --authentication-mode Type=password,Passwords=<password> \
              --access-string "on ~app:* +get +set +del"

            aws memorydb create-acl \
              --acl-name my-app-acl \
              --user-names my-app-user

            aws memorydb update-cluster \
              --cluster-name my-cluster \
              --acl-name my-app-acl
            ```
        - id: terraform
          desc: |
            To ensure MemoryDB clusters do not use the default open-access ACL in Terraform, ensure the MemoryDB cluster uses a custom ACL instead of the default open-access ACL:

            ```hcl
            resource "aws_memorydb_cluster" "example" {
              cluster_name = "my-cluster"
              node_type    = "db.r6g.large"
              acl_name     = aws_memorydb_acl.custom.name
            }

            resource "aws_memorydb_acl" "custom" {
              name       = "my-app-acl"
              user_names = [aws_memorydb_user.app.name]
            }
            ```
        - id: cloudformation
          desc: |
            To ensure MemoryDB clusters do not use the default open-access ACL in CloudFormation, ensure the MemoryDB cluster uses a custom ACL:

            ```yaml
            Resources:
              MemoryDBCluster:
                Type: AWS::MemoryDB::Cluster
                Properties:
                  ClusterName: my-cluster
                  NodeType: db.r6g.large
                  ACLName: !Ref CustomACL

              CustomACL:
                Type: AWS::MemoryDB::ACL
                Properties:
                  ACLName: my-app-acl
                  UserNames:
                    - !Ref AppUser
            ```
    refs:
      - url: https://docs.aws.amazon.com/memorydb/latest/devguide/clusters.acls.html
        title: AWS Documentation - Authenticating users with Access Control Lists
  - uid: mondoo-aws-security-memorydb-no-open-access-acl-aws
    filters: asset.platform == "aws"
    mql: |
      aws.memorydb.acls.where(name == "open-access").all(
        clusters.length == 0
      )
