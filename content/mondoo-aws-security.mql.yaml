  - uid: mondoo-aws-security-kinesis-firehose-encrypted
    title: Ensure Kinesis Firehose delivery streams are encrypted
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-aws-security-kinesis-firehose-encrypted-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-kinesis-firehose-encrypted-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-kinesis-firehose-encrypted-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-kinesis-firehose-encrypted-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-kinesis-firehose-encrypted-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon Kinesis Firehose delivery streams have server-side encryption enabled. Without encryption, data buffered in the delivery stream before delivery to its destination is stored unencrypted, exposing sensitive data to unauthorized access.

        **Why this matters**

        - Firehose delivery streams buffer data before delivering it to destinations such as S3, Redshift, OpenSearch, or HTTP endpoints. Without encryption, this buffered data is stored unencrypted.
        - Delivery streams often carry sensitive data including application logs, analytics events, and operational metrics that may contain personally identifiable information (PII) or business-sensitive data.
        - Encryption at rest is a requirement for compliance with security frameworks including PCI DSS, HIPAA, and SOC 2.
        - Enabling server-side encryption ensures data is protected throughout the delivery pipeline, not just at the final destination.

        **Risk mitigation**

        - **Data protection:** Encrypts data at rest within the delivery stream buffer using AWS KMS.
        - **End-to-end security:** Ensures data is protected during the buffering phase before delivery to the destination.
        - **Compliance:** Meets regulatory requirements for encryption of data at rest in data pipeline services.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and navigate to **Amazon Data Firehose**.
        2. Select the delivery stream name.
        3. Open the **Configuration** tab and locate **Server-side encryption**.
        4. Check the **Status** field.

        A passing delivery stream shows **Enabled** under server-side encryption. A failing delivery stream shows **Disabled**.

        ### Audit via CLI

        1. List all Firehose delivery streams:

        ```bash
        aws firehose list-delivery-streams --query "DeliveryStreamNames"
        ```

        2. For each stream, check the encryption configuration:

        ```bash
        aws firehose describe-delivery-stream --delivery-stream-name <stream-name> \
          --query "DeliveryStreamDescription.{Name:DeliveryStreamName,Encryption:DeliveryStreamEncryptionConfiguration}"
        ```

        A passing delivery stream returns a `DeliveryStreamEncryptionConfiguration` object with `"Status": "ENABLED"`. A failing delivery stream returns `"Status": "DISABLED"` or an empty configuration.

      remediation:
        - id: console
          desc: |
            To ensure Kinesis Firehose delivery streams are encrypted using the AWS Console:

            1. Navigate to the **Amazon Data Firehose Console** and select the delivery stream.
            2. Under the **Configuration** tab, choose **Edit** next to **Server-side encryption**.
            3. Enable **Server-side encryption**.
            4. Choose a KMS key (AWS managed or customer-managed).
            5. Choose **Save changes**.
        - id: cli
          desc: |
            To ensure Kinesis Firehose delivery streams are encrypted using the AWS CLI, enable server-side encryption on a Firehose delivery stream:

            ```bash
            aws firehose start-delivery-stream-encryption \
              --delivery-stream-name <stream-name> \
              --delivery-stream-encryption-configuration-input KeyType=AWS_OWNED_CMK
            ```

            For a customer-managed key:

            ```bash
            aws firehose start-delivery-stream-encryption \
              --delivery-stream-name <stream-name> \
              --delivery-stream-encryption-configuration-input KeyType=CUSTOMER_MANAGED_CMK,KeyARN=arn:aws:kms:region:account-id:key/key-id
            ```

            Verify encryption status:

            ```bash
            aws firehose describe-delivery-stream --delivery-stream-name <stream-name> \
              --query "DeliveryStreamDescription.{Name:DeliveryStreamName,Encryption:DeliveryStreamEncryptionConfiguration}"
            ```
        - id: terraform
          desc: |
            To ensure Kinesis Firehose delivery streams are encrypted in Terraform, enable server-side encryption on a Firehose delivery stream:

            ```hcl
            resource "aws_kinesis_firehose_delivery_stream" "example" {
              name        = "example-stream"
              destination = "extended_s3"

              server_side_encryption {
                enabled = true
              }

              extended_s3_configuration {
                role_arn   = aws_iam_role.firehose.arn
                bucket_arn = aws_s3_bucket.example.arn
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure Kinesis Firehose delivery streams are encrypted in CloudFormation, configure `DeliveryStreamEncryptionConfiguration`:

            ```yaml
            Resources:
              FirehoseStream:
                Type: AWS::KinesisFirehose::DeliveryStream
                Properties:
                  DeliveryStreamName: example-stream
                  DeliveryStreamEncryptionConfiguration:
                    KeyType: AWS_OWNED_CMK
            ```
    refs:
      - url: https://docs.aws.amazon.com/firehose/latest/dev/encryption.html
        title: Data protection in Amazon Data Firehose
  - uid: mondoo-aws-security-kinesis-firehose-encrypted-aws
    filters: asset.platform == "aws"
    mql: |
      aws.kinesis.firehoseDeliveryStreams.all(
        serverSideEncryption.status == "ENABLED"
      )
