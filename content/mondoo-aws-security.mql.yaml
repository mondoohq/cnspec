      - uid: mondoo-aws-security-vpc-dhcp-custom-dns-aws
        tags:
          mondoo.com/filter-title: AWS EC2 VPC
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-vpc-dhcp-custom-dns-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-vpc-dhcp-custom-dns-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-vpc-dhcp-custom-dns-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that VPCs use DHCP options sets with custom DNS servers rather than the default AWS-provided DNS (AmazonProvidedDNS). Custom DNS servers allow organizations to enforce DNS-level security controls such as filtering, logging, and threat detection.

        **Why this matters**

        - The default AmazonProvidedDNS does not provide DNS query logging or filtering at the VPC level, limiting visibility into DNS-based threats such as data exfiltration via DNS tunneling.
        - Custom DNS servers such as Route 53 Resolver endpoints, corporate DNS, or third-party DNS firewalls enable DNS query inspection, domain blocklists, and centralized logging.
        - Organizations with compliance requirements for DNS monitoring may not meet audit expectations when using the default DNS configuration.

        **Risk mitigation**

        - **DNS visibility:** Custom DNS servers enable query logging for threat detection and forensic analysis.
        - **DNS filtering:** Allows blocking of known malicious domains, reducing the attack surface.
        - **Centralized control:** Provides a single point of DNS policy enforcement across the VPC.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and navigate to the **VPC** console.
        2. In the left navigation pane, select **Your VPCs**.
        3. Select each VPC and review the **DHCP options set** in the details panel.
        4. Select the linked DHCP options set ID and check the **domain-name-servers** configuration value.

        A passing VPC has a DHCP options set whose `domain-name-servers` value is a custom IP address, not `AmazonProvidedDNS`. A failing VPC uses `AmazonProvidedDNS`.

        ### Audit via CLI

        1. List all VPCs and their associated DHCP options:

        ```bash
        aws ec2 describe-vpcs \
          --query "Vpcs[*].{VpcId:VpcId,DhcpOptionsId:DhcpOptionsId}"
        ```

        2. For each DHCP options set, check the domain-name-servers value:

        ```bash
        aws ec2 describe-dhcp-options \
          --dhcp-options-ids <dhcp-options-id> \
          --query "DhcpOptions[*].DhcpConfigurations[?Key=='domain-name-servers'].Values[*].Value"
        ```

        A passing DHCP options set returns custom IP addresses, not `AmazonProvidedDNS`. A failing DHCP options set returns `AmazonProvidedDNS`.

      remediation:
        - id: console
          desc: |
            To ensure VPC DHCP options use custom DNS servers using the AWS Console:

            1. Navigate to the **VPC Console** and select **DHCP option sets**.
            2. Select **Create DHCP option set**.
            3. Set **Domain name servers** to your organization's DNS server IP addresses.
            4. Optionally set **Domain name** to your internal domain.
            5. Create the DHCP option set, then associate it with the target VPC under **Your VPCs** > **Actions** > **Edit DHCP options set**.
        - id: cli
          desc: |
            To ensure VPC DHCP options use custom DNS servers using the AWS CLI, create a custom DHCP options set:

            ```bash
            aws ec2 create-dhcp-options \
              --dhcp-configurations "Key=domain-name-servers,Values=10.0.0.2,10.0.1.2" \
                "Key=domain-name,Values=example.internal"
            ```

            Associate it with the VPC:

            ```bash
            aws ec2 associate-dhcp-options --dhcp-options-id <dhcp-options-id> --vpc-id <vpc-id>
            ```

            Verify the current DHCP options:

            ```bash
            aws ec2 describe-dhcp-options --dhcp-options-ids <dhcp-options-id>
            ```
        - id: terraform
          desc: |
            To ensure VPC DHCP options use custom DNS servers in Terraform:

            ```hcl
            resource "aws_vpc_dhcp_options" "custom" {
              domain_name         = "example.internal"
              domain_name_servers = ["10.0.0.2", "10.0.1.2"]
            }

            resource "aws_vpc_dhcp_options_association" "main" {
              vpc_id          = aws_vpc.main.id
              dhcp_options_id = aws_vpc_dhcp_options.custom.id
            }
            ```
        - id: cloudformation
          desc: |
            To ensure VPC DHCP options use custom DNS servers in CloudFormation:

            ```yaml
            Resources:
              CustomDHCPOptions:
                Type: AWS::EC2::DHCPOptions
                Properties:
                  DomainName: example.internal
                  DomainNameServers:
                    - 10.0.0.2
                    - 10.0.1.2

              DHCPAssociation:
                Type: AWS::EC2::VPCDHCPOptionsAssociation
                Properties:
                  VpcId: !Ref MainVPC
                  DhcpOptionsId: !Ref CustomDHCPOptions
            ```
    refs:
      - url: https://docs.aws.amazon.com/vpc/latest/userguide/VPC_DHCP_Options.html
        title: AWS Documentation - DHCP option sets
  - uid: mondoo-aws-security-vpc-dhcp-custom-dns-aws
    filters: asset.platform == "aws-vpc"
    mql: |
      aws.vpc.dhcpOptions.configurations.where(key == "domain-name-servers").all(
        values.none(_ == "AmazonProvidedDNS")
      )
  - uid: mondoo-aws-security-vpc-dhcp-custom-dns-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_vpc_dhcp_options")
    mql: |
      terraform.resources.where(nameLabel == "aws_vpc_dhcp_options").all(
        arguments.domain_name_servers == null ||
        arguments.domain_name_servers.none(_ == "AmazonProvidedDNS")
      )
  - uid: mondoo-aws-security-vpc-dhcp-custom-dns-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_vpc_dhcp_options")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_vpc_dhcp_options").all(
        change.after["domain_name_servers"] == null ||
        change.after["domain_name_servers"].none(_ == "AmazonProvidedDNS")
      )
  - uid: mondoo-aws-security-vpc-dhcp-custom-dns-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_vpc_dhcp_options")
    mql: |
      terraform.state.resources.where(type == "aws_vpc_dhcp_options").all(
        values["domain_name_servers"] == null ||
        values["domain_name_servers"].none(_ == "AmazonProvidedDNS")
      )
  - uid: mondoo-aws-security-vpc-endpoint-security-groups
    title: Ensure VPC endpoints have security groups attached
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-aws-security-vpc-endpoint-security-groups-aws
        tags:
          mondoo.com/filter-title: AWS EC2 VPC
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-vpc-endpoint-security-groups-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-vpc-endpoint-security-groups-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-vpc-endpoint-security-groups-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that VPC interface endpoints have security groups attached to control which resources can communicate with AWS services through the endpoint. Without security groups, any resource in the VPC can access the endpoint, bypassing network-level access controls.

        **Why this matters**

        - VPC interface endpoints without security groups allow unrestricted access from any resource within the VPC, violating the principle of least privilege.
        - An attacker who compromises a single resource in the VPC could access any AWS service exposed through unprotected endpoints.
        - Security groups on endpoints enable fine-grained control over which subnets, instances, or CIDR ranges can use the endpoint.

        **Risk mitigation**

        - **Least privilege:** Restricts endpoint access to only the resources that need it.
        - **Lateral movement prevention:** Limits an attacker's ability to access AWS services from compromised resources.
        - **Audit trail:** Security group rules provide a clear, auditable record of intended access patterns.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and navigate to the **VPC** console.
        2. In the left navigation pane, select **Endpoints**.
        3. Filter the endpoint list by **Type: Interface**.
        4. For each interface endpoint, review the **Security groups** column or detail panel.

        A passing endpoint shows one or more security groups attached. A failing endpoint shows no security groups listed.

        ### Audit via CLI

        1. List all interface VPC endpoints and their security groups:

        ```bash
        aws ec2 describe-vpc-endpoints \
          --filters Name=vpc-endpoint-type,Values=Interface \
          --query "VpcEndpoints[*].{EndpointId:VpcEndpointId,Service:ServiceName,SecurityGroups:Groups[*].GroupId}"
        ```

        A passing endpoint returns a non-empty `SecurityGroups` array. A failing endpoint returns an empty array `[]` or `null` for `SecurityGroups`.

      remediation:
        - id: console
          desc: |
            To ensure VPC endpoints have security groups attached using the AWS Console:

            1. Navigate to the **VPC Console** and select **Endpoints**.
            2. Select the endpoint to update.
            3. Choose **Actions** > **Manage security groups**.
            4. Attach one or more security groups that restrict inbound access to only the required source CIDR ranges or security groups.
            5. Save the changes.
        - id: cli
          desc: |
            To ensure VPC endpoints have security groups attached using the AWS CLI, list endpoints without security groups:

            ```bash
            aws ec2 describe-vpc-endpoints --query "VpcEndpoints[?Groups[0]==null].VpcEndpointId"
            ```

            Attach a security group to the endpoint:

            ```bash
            aws ec2 modify-vpc-endpoint --vpc-endpoint-id <endpoint-id> \
              --add-security-group-ids <security-group-id>
            ```
        - id: terraform
          desc: |
            To ensure VPC endpoints have security groups attached in Terraform:

            ```hcl
            resource "aws_vpc_endpoint" "s3" {
              vpc_id             = aws_vpc.main.id
              service_name       = "com.amazonaws.us-east-1.s3"
              vpc_endpoint_type  = "Interface"
              security_group_ids = [aws_security_group.endpoint_sg.id]
            }
            ```
        - id: cloudformation
          desc: |
            To ensure VPC endpoints have security groups attached in CloudFormation:

            ```yaml
            Resources:
              S3Endpoint:
                Type: AWS::EC2::VPCEndpoint
                Properties:
                  VpcId: !Ref MainVPC
                  ServiceName: !Sub com.amazonaws.${AWS::Region}.s3
                  VpcEndpointType: Interface
                  SecurityGroupIds:
                    - !Ref EndpointSecurityGroup
            ```
    refs:
      - url: https://docs.aws.amazon.com/vpc/latest/privatelink/configure-endpoint-security-groups.html
        title: AWS Documentation - Security groups for VPC endpoints
  - uid: mondoo-aws-security-vpc-endpoint-security-groups-aws
    filters: asset.platform == "aws-vpc"
    mql: |
      aws.vpc.endpoints.where(type == "Interface").all(
        securityGroups.length > 0
      )
  - uid: mondoo-aws-security-vpc-endpoint-security-groups-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_vpc_endpoint")
    mql: |
      terraform.resources.where(nameLabel == "aws_vpc_endpoint").where(arguments.vpc_endpoint_type == "Interface").all(
        arguments.security_group_ids != null && arguments.security_group_ids.length > 0
      )
  - uid: mondoo-aws-security-vpc-endpoint-security-groups-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_vpc_endpoint")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_vpc_endpoint").where(change.after["vpc_endpoint_type"] == "Interface").all(
        change.after["security_group_ids"] != null && change.after["security_group_ids"].length > 0
      )
  - uid: mondoo-aws-security-vpc-endpoint-security-groups-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_vpc_endpoint")
    mql: |
      terraform.state.resources.where(type == "aws_vpc_endpoint").where(values["vpc_endpoint_type"] == "Interface").all(
        values["security_group_ids"] != null && values["security_group_ids"].length > 0
      )
  - uid: mondoo-aws-security-vpc-endpoint-service-acceptance-required
    title: Ensure VPC endpoint services require acceptance
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-2-1
    variants:
      - uid: mondoo-aws-security-vpc-endpoint-service-acceptance-required-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-vpc-endpoint-service-acceptance-required-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-vpc-endpoint-service-acceptance-required-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-vpc-endpoint-service-acceptance-required-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that VPC endpoint service configurations (PrivateLink provider-side) require manual acceptance of connection requests. Without acceptance required, any AWS principal with the endpoint service name can create a connection, potentially allowing unauthorized access to internal services.

        **Why this matters**

        - Without acceptance required, any account that discovers the endpoint service name can connect to it, bypassing organizational access controls.
        - PrivateLink services often expose sensitive internal APIs, databases, or microservices that should only be accessible to approved consumers.
        - Manual acceptance provides an additional authorization checkpoint that ensures only vetted accounts and VPCs can establish connectivity.

        **Risk mitigation**

        - **Unauthorized access prevention:** Ensures that only explicitly approved consumers can connect to the service.
        - **Access governance:** Provides a review step before granting network-level access to internal services.
        - **Blast radius reduction:** Limits the exposure of internal services to known, trusted accounts.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and navigate to the **VPC** console.
        2. In the left navigation pane, select **Endpoint services**.
        3. Select each endpoint service and review the **Details** tab.
        4. Check the **Acceptance required** field.

        A passing endpoint service shows **Acceptance required: Yes**. A failing endpoint service shows **Acceptance required: No**.

        ### Audit via CLI

        1. List all VPC endpoint service configurations and their acceptance setting:

        ```bash
        aws ec2 describe-vpc-endpoint-service-configurations \
          --query "ServiceConfigurations[*].{ServiceId:ServiceId,ServiceName:ServiceName,AcceptanceRequired:AcceptanceRequired}"
        ```

        A passing endpoint service returns `"AcceptanceRequired": true`. A failing endpoint service returns `"AcceptanceRequired": false`.

      remediation:
        - id: console
          desc: |
            To ensure VPC endpoint services require acceptance using the AWS Console:

            1. Navigate to the **VPC Console** and select **Endpoint services**.
            2. Select the endpoint service to update.
            3. Choose **Actions** > **Modify endpoint service**.
            4. Enable **Acceptance required**.
            5. Save the changes.
        - id: cli
          desc: |
            To ensure VPC endpoint services require acceptance using the AWS CLI, check current settings:

            ```bash
            aws ec2 describe-vpc-endpoint-service-configurations \
              --query "ServiceConfigurations[?AcceptanceRequired==\`false\`].ServiceId"
            ```

            Enable acceptance required:

            ```bash
            aws ec2 modify-vpc-endpoint-service-configuration \
              --service-id <service-id> --acceptance-required
            ```
        - id: terraform
          desc: |
            To ensure VPC endpoint services require acceptance in Terraform:

            ```hcl
            resource "aws_vpc_endpoint_service" "example" {
              acceptance_required        = true
              network_load_balancer_arns = [aws_lb.example.arn]
            }
            ```
        - id: cloudformation
          desc: |
            To ensure VPC endpoint services require acceptance in CloudFormation:

            ```yaml
            Resources:
              EndpointService:
                Type: AWS::EC2::VPCEndpointService
                Properties:
                  AcceptanceRequired: true
                  NetworkLoadBalancerArns:
                    - !Ref ExampleNLB
            ```
    refs:
      - url: https://docs.aws.amazon.com/vpc/latest/privatelink/configure-endpoint-service.html
        title: AWS Documentation - VPC endpoint service configurations
  - uid: mondoo-aws-security-vpc-endpoint-service-acceptance-required-aws
    filters: asset.platform == "aws"
    mql: |
      aws.ec2.vpcEndpointServiceConfigurations.all(
        acceptanceRequired == true
      )
  - uid: mondoo-aws-security-vpc-endpoint-service-acceptance-required-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_vpc_endpoint_service")
    mql: |
      terraform.resources.where(nameLabel == "aws_vpc_endpoint_service").all(
        arguments.acceptance_required == true
      )
  - uid: mondoo-aws-security-vpc-endpoint-service-acceptance-required-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_vpc_endpoint_service")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_vpc_endpoint_service").all(
        change.after["acceptance_required"] == true
      )
  - uid: mondoo-aws-security-vpc-endpoint-service-acceptance-required-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_vpc_endpoint_service")
    mql: |
      terraform.state.resources.where(type == "aws_vpc_endpoint_service").all(
        values["acceptance_required"] == true
      )
  # No Terraform variants: VPC subnet flow-log enrollment is determined by `aws_flow_log` resources whose `subnet_id` references the subnet — a cross-resource correlation that requires inventorying every flow-log resource in the file. The runtime check inspects each subnet's resolved flow-logs at scan time; the equivalent variant pattern would have many false negatives without a graph of subnet-to-flow-log references.
  - uid: mondoo-aws-security-vpc-subnet-flow-logs-enabled
    title: Ensure VPC subnets have flow logs enabled
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    variants:
      - uid: mondoo-aws-security-vpc-subnet-flow-logs-enabled-aws
        tags:
          mondoo.com/filter-title: AWS EC2 VPC
          mondoo.com/filter-icon: aws
    docs:
      desc: |
        This check ensures that individual subnets within a VPC have flow logs enabled, providing granular network traffic visibility at the subnet level. While VPC-level flow logs capture traffic across the entire VPC, subnet-level flow logs enable targeted monitoring of sensitive or high-risk network segments.

        **Why this matters**

        - VPC-level flow logs may not be present in all environments. Subnet-level flow logs provide a safety net to ensure critical subnets are always monitored.
        - High-value subnets such as those hosting databases, internal APIs, or management infrastructure benefit from dedicated flow logs that can be routed to separate log groups for focused analysis.
        - Subnet-level logging enables more granular alerting and incident response when combined with CloudWatch metrics filters or SIEM integrations.

        **Risk mitigation**

        - **Gap detection:** Identifies subnets that lack network traffic logging, which may hide malicious activity.
        - **Targeted monitoring:** Enables focused security monitoring for sensitive network segments.
        - **Compliance coverage:** Supports audit requirements for comprehensive network logging.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and navigate to the **VPC** console.
        2. In the left navigation pane, select **Subnets**.
        3. Select each subnet and choose the **Flow logs** tab.
        4. Check whether at least one flow log is listed and its status is **Active**.

        A passing subnet shows at least one active flow log. A failing subnet shows no flow logs or only flow logs in an error state.

        ### Audit via CLI

        1. List all subnets:

        ```bash
        aws ec2 describe-subnets \
          --query "Subnets[*].SubnetId"
        ```

        2. For each subnet, check whether flow logs are configured:

        ```bash
        aws ec2 describe-flow-logs \
          --filter "Name=resource-id,Values=<subnet-id>" \
          --query "FlowLogs[*].{FlowLogId:FlowLogId,Status:FlowLogStatus}"
        ```

        A passing subnet returns at least one flow log with `"Status": "ACTIVE"`. A failing subnet returns an empty array `[]`.

      remediation:
        - id: console
          desc: |
            To ensure VPC subnets have flow logs enabled using the AWS Console:

            1. Navigate to the **VPC Console** and select **Subnets**.
            2. Select the subnet to update.
            3. Go to the **Flow logs** tab.
            4. Select **Create flow log** and configure:
               - **Filter:** Choose **All traffic** to capture both accepted and rejected packets.
               - **Destination:** Select **CloudWatch Logs** or **S3**.
               - **IAM Role:** Ensure an IAM role with appropriate permissions is selected.
            5. Select **Create flow log**.
        - id: cli
          desc: |
            To ensure VPC subnets have flow logs enabled using the AWS CLI, create a flow log for a subnet:

            ```bash
            aws ec2 create-flow-logs \
              --resource-type Subnet \
              --resource-ids <subnet-id> \
              --traffic-type ALL \
              --log-destination-type cloud-watch-logs \
              --log-group-name subnet-flow-logs \
              --deliver-logs-permission-arn arn:aws:iam::<account-id>:role/flow-logs-role
            ```

            Verify subnet flow logs:

            ```bash
            aws ec2 describe-flow-logs --filter "Name=resource-id,Values=<subnet-id>"
            ```
        - id: terraform
          desc: |
            To ensure VPC subnets have flow logs enabled in Terraform:

            ```hcl
            resource "aws_flow_log" "subnet_flow_log" {
              subnet_id       = aws_subnet.main.id
              traffic_type    = "ALL"
              log_destination = aws_cloudwatch_log_group.subnet_logs.arn
              iam_role_arn    = aws_iam_role.flow_log_role.arn
            }
            ```
        - id: cloudformation
          desc: |
            To ensure VPC subnets have flow logs enabled in CloudFormation:

            ```yaml
            Resources:
              SubnetFlowLog:
                Type: AWS::EC2::FlowLog
                Properties:
                  ResourceType: Subnet
                  ResourceId: !Ref MainSubnet
                  TrafficType: ALL
                  LogDestinationType: cloud-watch-logs
                  LogGroupName: !Ref SubnetLogGroup
                  DeliverLogsPermissionArn: !GetAtt FlowLogRole.Arn
            ```
    refs:
      - url: https://docs.aws.amazon.com/vpc/latest/userguide/flow-logs.html
        title: AWS Documentation - VPC Flow Logs
  - uid: mondoo-aws-security-vpc-subnet-flow-logs-enabled-aws
