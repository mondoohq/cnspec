  - uid: mondoo-aws-security-ssm-parameter-encryption
    title: Ensure SSM SecureString parameters use KMS encryption
    impact: 80
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-aws-security-ssm-parameter-encryption-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-ssm-parameter-encryption-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ssm-parameter-encryption-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ssm-parameter-encryption-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ssm-parameter-encryption-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that AWS Systems Manager Parameter Store parameters of type SecureString have an explicit KMS key configured for encryption. While SSM SecureString parameters are always encrypted, explicitly specifying a KMS key ensures the encryption configuration is intentional and auditable.

        **Why this matters**

        - **Explicit configuration**: Specifying a KMS key ensures encryption settings are intentional rather than relying on implicit defaults.
        - **Audit trail**: All KMS key usage is logged in CloudTrail, providing visibility into who accessed encrypted parameters.
        - **Compliance alignment**: Many regulatory frameworks require explicit encryption key configuration for sensitive data.
        - **Key rotation**: Explicitly configured keys support automatic rotation, improving security posture.
      remediation:
        - id: console
          desc: |
            To ensure SSM SecureString parameters use KMS encryption using the AWS Console:

            1. Navigate to **AWS Systems Manager** > **Parameter Store**.
            2. Select a SecureString parameter.
            3. Create a new version of the parameter with a customer-managed KMS key.
        - id: cli
          desc: |
            To ensure SSM SecureString parameters use KMS encryption using the AWS CLI:

            ```bash
            aws ssm put-parameter --name <parameter-name> --value <value> --type SecureString --key-id <kms-key-id> --overwrite
            ```
        - id: terraform
          desc: |
            To ensure SSM SecureString parameters use KMS encryption in Terraform:

            ```hcl
            resource "aws_ssm_parameter" "example" {
              name   = "/example/parameter"
              type   = "SecureString"
              value  = "sensitive-value"
              key_id = aws_kms_key.example.arn
            }
            ```
        - id: cloudformation
          desc: |
            To ensure SSM SecureString parameters use KMS encryption in CloudFormation:

            ```yaml
            Resources:
              MyParameter:
                Type: AWS::SSM::Parameter
                Properties:
                  Name: /example/parameter
                  Type: SecureString
                  Value: sensitive-value
            ```
    refs:
      - url: https://docs.aws.amazon.com/systems-manager/latest/userguide/sysman-paramstore-securestring.html
        title: AWS SSM SecureString parameters
  - uid: mondoo-aws-security-ssm-parameter-encryption-aws
    filters: asset.platform == "aws"
    mql: |
      aws.ssm.parameters.where(type == "SecureString").all(kmsKey != empty)
  - uid: mondoo-aws-security-ssm-parameter-encryption-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_ssm_parameter")
    mql: |
      terraform.resources.where(nameLabel == "aws_ssm_parameter").all(
      arguments.type == "SecureString" && arguments.key_id != empty
      )
  - uid: mondoo-aws-security-ssm-parameter-encryption-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_ssm_parameter")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_ssm_parameter").all(
      change.after.type == "SecureString" && change.after.key_id != empty
      )
  - uid: mondoo-aws-security-ssm-parameter-encryption-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_ssm_parameter")
    mql: |
      terraform.state.resources.where(type == "aws_ssm_parameter").all(
      values.type == "SecureString" && values.key_id != empty
      )
  - uid: mondoo-aws-security-ssm-parameter-encryption-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::SSM::Parameter")
    mql: |
      cloudformation.template.resources.where(type == "AWS::SSM::Parameter").all(
      properties['Type'] == "SecureString" && properties['KeyId'] != empty
      )
  - uid: mondoo-aws-security-dms-replication-not-public
    title: Ensure DMS replication instances are not publicly accessible
    impact: 90
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-6
    variants:
      - uid: mondoo-aws-security-dms-replication-not-public-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-dms-replication-not-public-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-dms-replication-not-public-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-dms-replication-not-public-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-dms-replication-not-public-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that AWS Database Migration Service (DMS) replication instances are not publicly accessible. Public replication instances expose database migration traffic to the internet, increasing the risk of data interception.

        **Why this matters**

        - **Data exposure**: DMS replication instances handle sensitive database traffic that should not traverse the public internet.
        - **Attack surface**: Publicly accessible instances can be targeted by attackers attempting to intercept or manipulate migration data.
        - **Network security**: Keeping replication instances private ensures all traffic stays within trusted VPC boundaries.
        - **Compliance alignment**: Data protection regulations often require that database traffic remains within private networks.
      remediation:
        - id: console
          desc: |
            To ensure DMS replication instances are not publicly accessible using the AWS Console:

            1. Navigate to the **AWS DMS** console.
            2. Select **Replication instances**.
            3. Select the instance and choose **Modify**.
            4. Uncheck **Publicly accessible**.
            5. Apply the changes.
        - id: cli
          desc: |
            To ensure DMS replication instances are not publicly accessible using the AWS CLI, note that public accessibility cannot be changed after creation. Create a new private instance and migrate:

            ```bash
            aws dms create-replication-instance \
              --replication-instance-identifier <new-instance-id> \
              --replication-instance-class <instance-class> \
              --no-publicly-accessible
            ```
        - id: terraform
          desc: |
            To ensure DMS replication instances are not publicly accessible in Terraform:

            ```hcl
            resource "aws_dms_replication_instance" "example" {
              replication_instance_id    = "example"
              replication_instance_class = "dms.t3.medium"
              publicly_accessible        = false
            }
            ```
        - id: cloudformation
          desc: |
            To ensure DMS replication instances are not publicly accessible in CloudFormation:

            ```yaml
            Resources:
              MyReplicationInstance:
                Type: AWS::DMS::ReplicationInstance
                Properties:
                  ReplicationInstanceClass: dms.t3.medium
                  PubliclyAccessible: false
            ```
    refs:
      - url: https://docs.aws.amazon.com/dms/latest/userguide/CHAP_ReplicationInstance.html
        title: AWS DMS Replication Instances
  - uid: mondoo-aws-security-dms-replication-not-public-aws
    filters: asset.platform == "aws"
    mql: |
      aws.dms.replicationInstances.all(_["PubliclyAccessible"] == false)
  - uid: mondoo-aws-security-dms-replication-not-public-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_dms_replication_instance")
    mql: |
      terraform.resources.where(nameLabel == "aws_dms_replication_instance").all(
      arguments.publicly_accessible != true
      )
  - uid: mondoo-aws-security-dms-replication-not-public-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_dms_replication_instance")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_dms_replication_instance").all(
      change.after.publicly_accessible != true
      )
  - uid: mondoo-aws-security-dms-replication-not-public-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_dms_replication_instance")
    mql: |
      terraform.state.resources.where(type == "aws_dms_replication_instance").all(
      values.publicly_accessible != true
      )
  - uid: mondoo-aws-security-dms-replication-not-public-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::DMS::ReplicationInstance")
    mql: |
      cloudformation.template.resources.where(type == "AWS::DMS::ReplicationInstance").all(
      properties['PubliclyAccessible'] != true
      )
  - uid: mondoo-aws-security-dms-replication-encrypted
    title: Ensure DMS replication instances use encryption
    impact: 80
