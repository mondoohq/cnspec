  # No Terraform variants: AppStream stack `contentRedirection.hostToClientEnabled` is not exposed as an argument on the `aws_appstream_stack` Terraform resource.
  - uid: mondoo-aws-security-appstream-stack-url-redirection-disabled
    title: Ensure AppStream stacks have URL redirection disabled
    impact: 70
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-12
      compliance/nis-2: nis-2-21-2-d
      compliance/nist-csf-1: nist-csf-1-pr-ds-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-6
    variants:
      - uid: mondoo-aws-security-appstream-stack-url-redirection-disabled-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
    docs:
      desc: |
        This check ensures that Amazon AppStream 2.0 stacks have host-to-client URL content redirection disabled. When enabled, this feature allows URLs opened within the streaming session to be redirected to the user's local browser, which can be exploited as a data exfiltration channel.

        **Why this matters**

        - Host-to-client URL redirection allows content from the streaming session to be sent to the user's local machine, bypassing DLP and network security controls.
        - Malicious or compromised applications within the streaming session could craft URLs to exfiltrate sensitive data through the redirection channel.
        - Organizations with strict data boundary requirements should disable this feature to maintain control over data flow between the streaming environment and client devices.

        **Risk mitigation**

        - **Data exfiltration prevention:** Disabling URL redirection prevents the streaming session from sending content to the client browser.
        - **DLP enforcement:** Ensures that data loss prevention controls within the streaming environment cannot be bypassed through URL redirection.
        - **Network boundary integrity:** Maintains the isolation between the streaming session and the client device.
      remediation:
        - id: console
          desc: |
            To ensure AppStream 2.0 stacks have URL redirection disabled using the AWS Console:

            1. Navigate to the **AppStream 2.0 Console** and select **Stacks**.
            2. Select the stack to update.
            3. Choose **Edit**.
            4. Under **User Settings**, locate **Clipboard, file transfer, print, and smart card settings**.
            5. Set **Host-to-client URL redirection** to **Disabled**.
            6. Save the changes.
        - id: cli
          desc: |
            ```bash
            aws appstream update-stack --name <StackName> --user-settings Action=CLIPBOARD_COPY_FROM_LOCAL_DEVICE,Permission=ENABLED Action=CLIPBOARD_COPY_TO_LOCAL_DEVICE,Permission=ENABLED Action=FILE_UPLOAD,Permission=ENABLED Action=FILE_DOWNLOAD,Permission=ENABLED Action=PRINTING_TO_LOCAL_DEVICE,Permission=ENABLED Action=AUTO_TIME_ZONE_REDIRECTION,Permission=ENABLED
            ```

            Note: The `--user-settings` parameter requires all user settings to be specified together. Omitting `DOMAIN_SMART_CARD_SIGN_IN` and `DOMAIN_PASSWORD_SIGN_IN` actions from the list leaves URL-related redirection disabled. Adjust other settings as needed for your environment.
    refs:
      - url: https://docs.aws.amazon.com/appstream2/latest/developerguide/url-redirection.html
        title: Amazon AppStream 2.0 - URL Redirection
  - uid: mondoo-aws-security-appstream-stack-url-redirection-disabled-aws
    filters: asset.platform == "aws"
    mql: |
      aws.appstream.stacks.all(
        contentRedirection.hostToClientEnabled == false
      )
