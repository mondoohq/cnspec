      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-aws-security-ec2-hibernation-encrypted-check-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
    docs:
      desc: |
        This check ensures that EBS encryption by default is enabled in accounts where EC2 instances use hibernation. When an instance hibernates, the contents of RAM — which may contain credentials, encryption keys, session tokens, and other sensitive data — are written to the root EBS volume. Enabling EBS encryption by default ensures that all newly created volumes, including those used by hibernation-enabled instances, are automatically encrypted.

        **Why this matters**

        - During hibernation, the entire contents of instance memory are persisted to the root EBS volume, including any sensitive data resident in RAM.
        - Without encryption, this memory dump is stored in plaintext on the underlying storage, where it could be exposed through snapshot sharing, volume detachment, or storage-level compromise.
        - AWS requires EBS encryption for hibernation. Enabling EBS encryption by default at the account level is the most reliable way to enforce this, as it applies to all new volumes automatically.
        - Note: This check validates the account-level EBS encryption-by-default setting, not individual volume encryption. Instances launched before this setting was enabled may still have unencrypted volumes.

        **Risk mitigation**

        - **Account-level enforcement:** Ensures all new EBS volumes are encrypted by default, including those used for hibernation.
        - **Credential protection:** Prevents exposure of in-memory secrets, tokens, and keys written during hibernation.
        - **Compliance:** Meets encryption-at-rest requirements for hibernation data.
      remediation:
        - id: console
          desc: |
            To ensure EBS encryption by default is enabled when EC2 hibernation is in use using the AWS Console:

            1. Navigate to the **EC2 Console** and select **Instances**.
            2. Identify instances with hibernation enabled (check **Stop - Hibernate behavior** in instance details).
            3. Verify the root volume is encrypted by checking **Block devices** in the instance details.
            4. If the root volume is not encrypted:
              - Create an encrypted snapshot of the root volume.
              - Create an encrypted AMI from the snapshot.
              - Launch a new instance from the encrypted AMI with hibernation enabled.
              - Terminate the original instance.
        - id: cli
          desc: |
            To ensure EBS encryption by default is enabled when EC2 hibernation is in use using the AWS CLI, find instances with hibernation enabled:

            ```bash
            aws ec2 describe-instances \
              --query "Reservations[*].Instances[*].[InstanceId,HibernationOptions.Configured]" \
              --output table
            ```

            Check if the root volume is encrypted:

            ```bash
            aws ec2 describe-volumes --volume-ids <root-volume-id> \
              --query "Volumes[*].[VolumeId,Encrypted]"
            ```
        - id: terraform
          desc: |
            To ensure EBS encryption by default is enabled when EC2 hibernation is in use in Terraform, when using hibernation, ensure the root EBS volume is encrypted:

            ```hcl
            resource "aws_instance" "example" {
              ami           = "ami-xxxxxxxxx"
              instance_type = "m5.large"
              hibernation   = true

              root_block_device {
                encrypted = true
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure EBS encryption by default is enabled when EC2 hibernation is in use in CloudFormation, when using hibernation, ensure the root EBS volume is encrypted:

            ```yaml
            Resources:
              MyInstance:
                Type: AWS::EC2::Instance
                Properties:
                  ImageId: ami-xxxxxxxxx
                  InstanceType: m5.large
                  HibernationOptions:
                    Configured: true
                  BlockDeviceMappings:
                    - DeviceName: /dev/xvda
                      Ebs:
                        Encrypted: true
            ```
    refs:
      - url: https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/hibernating-prerequisites.html
        title: Hibernation prerequisites for Amazon EC2
  - uid: mondoo-aws-security-ec2-hibernation-encrypted-check-aws
    filters: asset.platform == "aws"
    mql: |
      if (aws.ec2.instances.where(state == "running" && hibernationConfigured == true).length > 0) {
        aws.ec2.ebsEncryptionByDefault.values.all(_ == true)
      }
  - uid: mondoo-aws-security-route53-dnssec-enabled
    title: Ensure Route 53 public hosted zones have DNSSEC signing enabled
    impact: 70
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-12
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-10
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-1-11
      compliance/vda-isa-5: vda-isa-5-5-1-2
    variants:
      - uid: mondoo-aws-security-route53-dnssec-enabled-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-route53-dnssec-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-route53-dnssec-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-route53-dnssec-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Amazon Route 53 public hosted zones have DNSSEC signing enabled. DNSSEC (Domain Name System Security Extensions) adds cryptographic signatures to DNS records, allowing resolvers to verify that responses have not been tampered with in transit.

        **Why this matters**

        - Without DNSSEC, DNS responses can be spoofed or poisoned by attackers, redirecting users to malicious sites (DNS cache poisoning, man-in-the-middle attacks).
        - DNSSEC provides authentication of DNS data origin and data integrity verification.
        - AWS Route 53 supports DNSSEC signing for public hosted zones, with AWS managing the Zone Signing Key (ZSK) and customers managing the Key Signing Key (KSK) via AWS KMS.
        - Private hosted zones do not support DNSSEC and are excluded from this check.

        **Risk mitigation**

        - **DNS integrity:** Prevents DNS spoofing and cache poisoning attacks.
        - **Authentication:** Verifies that DNS responses originate from the authoritative source.
        - **Trust chain:** Establishes a chain of trust from the root DNS zone to your domain.
      remediation:
        - id: console
          desc: |
            To ensure Route 53 public hosted zones have DNSSEC signing enabled using the AWS Console:

            1. Navigate to the **Route 53 Console** and select **Hosted zones**.
            2. Select the public hosted zone to configure.
            3. Go to the **DNSSEC signing** tab.
            4. Choose **Enable DNSSEC signing**.
            5. Create or select a KMS key for the Key Signing Key (KSK).
            6. After enabling, establish the chain of trust by adding a DS record to the parent zone through your domain registrar.
        - id: cli
          desc: |
            To ensure Route 53 public hosted zones have DNSSEC signing enabled using the AWS CLI, check DNSSEC status for a hosted zone:

            ```bash
            aws route53 get-dnssec --hosted-zone-id <zone-id>
            ```

            Enable DNSSEC signing:

            ```bash
            aws route53 create-key-signing-key \
              --hosted-zone-id <zone-id> \
              --name example-ksk \
              --key-management-service-arn arn:aws:kms:us-east-1:account-id:key/key-id \
              --status ACTIVE

            aws route53 enable-hosted-zone-dnssec --hosted-zone-id <zone-id>
            ```
        - id: terraform
          desc: |
            To ensure Route 53 public hosted zones have DNSSEC signing enabled in Terraform, DNSSEC requires both a Key Signing Key and enabling DNSSEC on the hosted zone:

            ```hcl
            resource "aws_route53_key_signing_key" "example" {
              hosted_zone_id             = aws_route53_zone.example.id
              key_management_service_arn = aws_kms_key.example.arn
              name                       = "example-ksk"
            }

            resource "aws_route53_hosted_zone_dnssec" "example" {
              depends_on     = [aws_route53_key_signing_key.example]
              hosted_zone_id = aws_route53_zone.example.id
            }
            ```
        - id: cloudformation
          desc: |
            To ensure Route 53 public hosted zones have DNSSEC signing enabled in CloudFormation, note that CloudFormation does not natively support configuring DNSSEC signing for Route 53 hosted zones. Use the AWS CLI or Console to enable DNSSEC, or use a CloudFormation custom resource backed by a Lambda function.
    refs:
      - url: https://docs.aws.amazon.com/Route53/latest/DeveloperGuide/dns-configuring-dnssec.html
        title: Configuring DNSSEC signing in Amazon Route 53
  - uid: mondoo-aws-security-route53-dnssec-enabled-aws
    filters: asset.platform == "aws"
    mql: |
      aws.route53.hostedZones.where(isPrivate == false).all(
        dnssecStatus['serveSignature'] == "SIGNING"
      )
  - uid: mondoo-aws-security-route53-dnssec-enabled-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_route53_hosted_zone_dnssec")
    mql: |
      terraform.resources.where(nameLabel == "aws_route53_hosted_zone_dnssec").length > 0
  - uid: mondoo-aws-security-route53-dnssec-enabled-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_route53_hosted_zone_dnssec")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_route53_hosted_zone_dnssec").length > 0
  - uid: mondoo-aws-security-route53-dnssec-enabled-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_route53_hosted_zone_dnssec")
    mql: |
      terraform.state.resources.where(type == "aws_route53_hosted_zone_dnssec").length > 0
  - uid: mondoo-aws-security-route53-query-logging-enabled
    title: Ensure Route 53 public hosted zones have query logging enabled
    impact: 60
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    variants:
      - uid: mondoo-aws-security-route53-query-logging-enabled-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-route53-query-logging-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-route53-query-logging-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-route53-query-logging-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Amazon Route 53 public hosted zones have DNS query logging configured. Query logging sends information about DNS queries to Amazon CloudWatch Logs, enabling visibility into DNS traffic patterns and supporting security monitoring.

        **Why this matters**

        - Without query logging, there is no visibility into which DNS queries are being made against your hosted zones, making it difficult to detect reconnaissance, data exfiltration via DNS tunneling, or domain abuse.
        - DNS query logs provide critical data for incident response, allowing security teams to trace suspicious domain lookups and identify compromised systems.
        - Query logs can be used to detect shadow IT, unauthorized subdomains, and unusual query patterns that may indicate an attack.
        - Compliance frameworks recommend logging DNS activity as part of network monitoring requirements.

        **Risk mitigation**

        - **Threat detection:** Enables detection of DNS-based attacks including tunneling and exfiltration.
        - **Incident response:** Provides DNS query history for forensic analysis.
        - **Compliance:** Meets audit logging requirements for DNS infrastructure.
      remediation:
        - id: console
          desc: |
            To ensure Route 53 public hosted zones have query logging enabled using the AWS Console:

            1. Navigate to the **Route 53 Console** and select **Hosted zones**.
            2. Select the public hosted zone.
            3. Go to the **Query logging** tab.
            4. Choose **Configure query logging**.
            5. Select or create a CloudWatch Logs log group in the **us-east-1** region.
            6. Configure the appropriate resource policy to allow Route 53 to write to the log group.
        - id: cli
          desc: |
            To ensure Route 53 public hosted zones have query logging enabled using the AWS CLI, create a CloudWatch Logs log group (must be in us-east-1):

            ```bash
            aws logs create-log-group \
              --log-group-name /aws/route53/example.com \
              --region us-east-1
            ```

            Enable query logging:

            ```bash
            aws route53 create-query-logging-config \
              --hosted-zone-id <zone-id> \
              --cloud-watch-logs-log-group-arn arn:aws:logs:us-east-1:account-id:log-group:/aws/route53/example.com
            ```
        - id: terraform
          desc: |
            To ensure Route 53 public hosted zones have query logging enabled in Terraform, configure query logging for a Route 53 hosted zone:

            ```hcl
            resource "aws_route53_query_log" "example" {
              depends_on               = [aws_cloudwatch_log_resource_policy.route53]
              cloudwatch_log_group_arn = aws_cloudwatch_log_group.route53.arn
              zone_id                  = aws_route53_zone.example.zone_id
            }
            ```
        - id: cloudformation
          desc: |
            To ensure Route 53 public hosted zones have query logging enabled in CloudFormation, enable query logging via the `QueryLoggingConfig` property:

            ```yaml
            Resources:
              HostedZone:
                Type: AWS::Route53::HostedZone
                Properties:
                  Name: example.com
                  QueryLoggingConfig:
                    CloudWatchLogsLogGroupArn: !GetAtt LogGroup.Arn
            ```
    refs:
      - url: https://docs.aws.amazon.com/Route53/latest/DeveloperGuide/query-logs.html
        title: Logging DNS queries in Amazon Route 53
  - uid: mondoo-aws-security-route53-query-logging-enabled-aws
    filters: asset.platform == "aws"
    mql: |
      aws.route53.hostedZones.where(isPrivate == false).all(
        queryLoggingConfig != null
      )
  - uid: mondoo-aws-security-route53-query-logging-enabled-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_route53_query_log")
    mql: |
      terraform.resources.where(nameLabel == "aws_route53_query_log").length > 0
  - uid: mondoo-aws-security-route53-query-logging-enabled-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_route53_query_log")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_route53_query_log").length > 0
  - uid: mondoo-aws-security-route53-query-logging-enabled-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_route53_query_log")
    mql: |
      terraform.state.resources.where(type == "aws_route53_query_log").length > 0
  - uid: mondoo-aws-security-route53-health-check-not-disabled
    title: Ensure Route 53 health checks are not disabled
    impact: 50
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-bcr-08
      compliance/dora: dora-art-12
      compliance/hipaa: hipaa-security-ss164-308-a-7-ii-a-contingency-plan-data-backup-plan
      compliance/iso-27001-2022: iso-27001-2022-a-8-14
      compliance/nis-2: nis-2-21-2-c
      compliance/nist-csf-1: nist-csf-1-pr-ip-4
      compliance/nist-csf-2: nist-csf-2-pr-ds-11
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cp-9
      compliance/nist-sp-800-171: "false"
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc9-1-1
      compliance/vda-isa-5: false
    variants:
      - uid: mondoo-aws-security-route53-health-check-not-disabled-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-route53-health-check-not-disabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-route53-health-check-not-disabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-route53-health-check-not-disabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-route53-health-check-not-disabled-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that no Amazon Route 53 health checks are in a disabled state. An attacker who compromises an endpoint can disable its health check to prevent Route 53 from failing over to a healthy endpoint, ensuring that traffic continues to flow to the attacker-controlled or compromised resource.

        **Why this matters**

        - An attacker who has compromised an endpoint and has `route53:UpdateHealthCheck` permissions can disable the health check, preventing automatic failover and ensuring traffic continues to reach the compromised resource.
        - Disabled health checks cause Route 53 to treat the endpoint as healthy by default, meaning traffic will not fail away from a compromised or malicious endpoint even if it is serving manipulated responses.
        - Attackers can use this technique to maintain persistent traffic interception, serving phishing content or capturing credentials without triggering DNS-level remediation.

        **Risk mitigation**

        - **Compromised endpoint detection:** Active health checks enable automatic failover away from compromised endpoints that stop responding correctly.
        - **Attack persistence prevention:** Ensures that DNS failover cannot be silently disabled to maintain traffic flow to attacker-controlled resources.
        - **Monitoring integrity:** Maintains accurate health status so that compromised endpoints are detected and isolated through DNS routing changes.
      remediation:
        - id: console
          desc: |
            To ensure Route 53 health checks are not disabled using the AWS Console:

            1. Navigate to the **Route 53 Console** and select **Health checks**.
            2. Review the list for any health checks with a **Disabled** status.
            3. Select the disabled health check and choose **Edit**.
            4. Uncheck the **Disabled** option to re-enable the health check.
            5. If the health check is no longer needed, delete it rather than leaving it disabled.
        - id: cli
          desc: |
            To ensure Route 53 health checks are not disabled using the AWS CLI, list all health checks and their disabled status:

            ```bash
            aws route53 list-health-checks \
              --query "HealthChecks[*].{Id:Id,Disabled:HealthCheckConfig.Disabled,Type:HealthCheckConfig.Type}"
            ```

            Re-enable a disabled health check:

            ```bash
            aws route53 update-health-check \
              --health-check-id <health-check-id> \
              --no-disabled
            ```
        - id: terraform
          desc: |
            To ensure Route 53 health checks are not disabled in Terraform, ensure health checks are not disabled:

            ```hcl
            resource "aws_route53_health_check" "example" {
              fqdn              = "example.com"
              port              = 443
              type              = "HTTPS"
              resource_path     = "/health"
              failure_threshold = 3
              request_interval  = 30
              disabled          = false
            }
            ```
        - id: cloudformation
          desc: |
            To ensure Route 53 health checks are not disabled in CloudFormation, ensure the health check is not disabled:

            ```yaml
            Resources:
              HealthCheck:
                Type: AWS::Route53::HealthCheck
                Properties:
                  HealthCheckConfig:
                    FullyQualifiedDomainName: example.com
                    Port: 443
                    Type: HTTPS
                    Disabled: false
            ```
    refs:
      - url: https://docs.aws.amazon.com/Route53/latest/DeveloperGuide/health-checks-creating.html
        title: Creating and updating Amazon Route 53 health checks
  - uid: mondoo-aws-security-route53-health-check-not-disabled-aws
    filters: asset.platform == "aws"
    mql: |
      aws.route53.healthChecks.none(disabled == true)
  - uid: mondoo-aws-security-route53-health-check-not-disabled-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_route53_health_check")
    mql: |
      terraform.resources.where(nameLabel == "aws_route53_health_check").all(
      arguments.disabled != true
      )
  - uid: mondoo-aws-security-route53-health-check-not-disabled-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_route53_health_check")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_route53_health_check").all(
      change.after.disabled != true
      )
  - uid: mondoo-aws-security-route53-health-check-not-disabled-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_route53_health_check")
    mql: |
      terraform.state.resources.where(type == "aws_route53_health_check").all(
      values.disabled != true
      )
  - uid: mondoo-aws-security-route53-health-check-not-disabled-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::Route53::HealthCheck")
    mql: |
      cloudformation.template.resources.where(type == "AWS::Route53::HealthCheck").all(
      properties['HealthCheckConfig'] != empty && properties['HealthCheckConfig']['Disabled'] != true
      )
