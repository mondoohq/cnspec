        values.encryption_configuration.all(
          _['s3_encryption'] != empty && _['s3_encryption'].all(_['s3_encryption_mode'] != "DISABLED")
        )
      )
  - uid: mondoo-aws-security-glue-security-config-s3-encryption-cloudformation
