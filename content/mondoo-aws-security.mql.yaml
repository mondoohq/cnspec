        This check ensures that Amazon MQ brokers have general logging enabled. General logs capture broker-level events such as connections, disconnections, message delivery failures, and broker lifecycle events, providing operational visibility into broker activity.

        **Why this matters**

        - General logs are the primary source of operational and security telemetry for Amazon MQ brokers.
        - Without general logging, teams cannot detect anomalous connection patterns, authentication failures, or message processing errors.
        - Log data from Amazon MQ can be forwarded to CloudWatch Logs for centralized monitoring, alerting, and long-term retention.

        **Risk mitigation**

        - **Operational visibility:** General logs provide insight into broker health, client connectivity, and message throughput.
        - **Security monitoring:** Connection and authentication events in general logs can reveal unauthorized access attempts.
        - **Incident response:** Log data is critical for reconstructing the timeline of events during a security incident.
