      )
  - uid: mondoo-aws-security-cognito-user-pool-advanced-security-enforced-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_cognito_user_pool")
    mql: |
      terraform.state.resources.where(type == "aws_cognito_user_pool").all(
      values.user_pool_add_ons != empty && values.user_pool_add_ons.all(_['advanced_security_mode'] == "ENFORCED")
      )
  - uid: mondoo-aws-security-cognito-user-pool-advanced-security-enforced-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::Cognito::UserPool")
    mql: |
      cloudformation.template.resources.where(type == "AWS::Cognito::UserPool").all(
      properties['UserPoolAddOns'] != empty && properties['UserPoolAddOns']['AdvancedSecurityMode'] == "ENFORCED"
      )
  - uid: mondoo-aws-security-cognito-identity-pool-no-unauthenticated
    title: Ensure Cognito identity pools do not allow unauthenticated identities
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-14
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-2
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-2
    variants:
      - uid: mondoo-aws-security-cognito-identity-pool-no-unauthenticated-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-cognito-identity-pool-no-unauthenticated-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-cognito-identity-pool-no-unauthenticated-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-cognito-identity-pool-no-unauthenticated-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-cognito-identity-pool-no-unauthenticated-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon Cognito identity pools do not allow unauthenticated (guest) identities. When enabled, unauthenticated access grants temporary AWS credentials to anonymous users without requiring any form of authentication, which can lead to unauthorized access to AWS resources.

        **Why this matters**

        - Unauthenticated identities receive temporary AWS credentials through the identity pool's IAM role, granting anonymous users access to AWS services.
        - Even with restrictive IAM policies, unauthenticated access increases the attack surface by providing AWS credentials to anyone who can call the identity pool API.
        - Misconfigured IAM roles for unauthenticated users can inadvertently grant access to sensitive resources such as S3 buckets, DynamoDB tables, or API Gateway endpoints.
        - Attackers can abuse unauthenticated access to enumerate resources, exfiltrate data, or perform denial-of-service attacks using the granted credentials.

        **Risk mitigation**

        - **Access control:** Ensures all users must authenticate before receiving AWS credentials.
        - **Attack surface reduction:** Eliminates anonymous access to AWS resources through the identity pool.
        - **Credential protection:** Prevents distribution of AWS credentials to unauthenticated parties.
      audit: |
        ### Audit via Console

        1. Navigate to the **Amazon Cognito Console** at Services > Cognito.
        2. Select **Identity pools** in the left navigation panel.
        3. Select the identity pool to inspect.
        4. Choose the **User access** tab.
        5. Under **Guest access**, review whether unauthenticated identities are enabled.

        A passing identity pool shows **Guest access: Disabled**. A failing identity pool shows **Guest access: Enabled**.

        ### Audit via CLI

        1. List all Cognito identity pools:

        ```bash
        aws cognito-identity list-identity-pools \
          --max-results 60 \
          --query "IdentityPools[*].{Id:IdentityPoolId,Name:IdentityPoolName}"
        ```

        2. Check the unauthenticated identities setting for each pool:

        ```bash
        aws cognito-identity describe-identity-pool \
          --identity-pool-id <identity-pool-id> \
          --query "{Name:IdentityPoolName,AllowUnauth:AllowUnauthenticatedIdentities}"
        ```

        A passing identity pool returns `"AllowUnauth": false`. A failing identity pool returns `"AllowUnauth": true`.
      remediation:
        - id: console
          desc: |
            To ensure Cognito identity pools do not allow unauthenticated identities using the AWS Console:

            1. Navigate to the **Amazon Cognito Console** and select **Identity pools**.
            2. Select the identity pool to modify.
            3. Under **User access**, choose **Edit**.
            4. Disable **Guest access** (unauthenticated identities).
            5. Choose **Save changes**.
            6. Review and update any application code that relies on unauthenticated access to use authenticated flows instead.
        - id: cli
          desc: |
            To ensure Cognito identity pools do not allow unauthenticated identities using the AWS CLI, disable unauthenticated identities:

            ```bash
            aws cognito-identity update-identity-pool \
              --identity-pool-id <identity-pool-id> \
              --identity-pool-name <pool-name> \
              --no-allow-unauthenticated-identities
            ```

            Note: The `update-identity-pool` command requires specifying all identity pool settings. Include `--no-allow-classic-flow` or `--allow-classic-flow` to match your current configuration.

            Verify the setting:

            ```bash
            aws cognito-identity describe-identity-pool \
              --identity-pool-id <identity-pool-id> \
              --query "{Name:IdentityPoolName,AllowUnauth:AllowUnauthenticatedIdentities}"
            ```
        - id: terraform
          desc: |
            To ensure Cognito identity pools do not allow unauthenticated identities in Terraform, disable unauthenticated identities:

            ```hcl
            resource "aws_cognito_identity_pool" "example" {
              identity_pool_name               = "example-pool"
              allow_unauthenticated_identities = false
            }
            ```
        - id: cloudformation
          desc: |
            To ensure Cognito identity pools do not allow unauthenticated identities in CloudFormation, set `AllowUnauthenticatedIdentities` to `false`:

            ```yaml
            Resources:
              IdentityPool:
                Type: AWS::Cognito::IdentityPool
                Properties:
                  IdentityPoolName: example-pool
                  AllowUnauthenticatedIdentities: false
            ```
    refs:
      - url: https://docs.aws.amazon.com/cognito/latest/developerguide/identity-pools.html
        title: Amazon Cognito identity pools
      - url: https://docs.aws.amazon.com/cognito/latest/developerguide/switching-identities.html
        title: Switching unauthenticated users to authenticated users
  - uid: mondoo-aws-security-cognito-identity-pool-no-unauthenticated-aws
    filters: asset.platform == "aws"
    mql: aws.cognito.identityPools.all(allowUnauthenticatedIdentities == false)
  - uid: mondoo-aws-security-cognito-identity-pool-no-unauthenticated-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_cognito_identity_pool")
    mql: |
      terraform.resources.where(nameLabel == "aws_cognito_identity_pool").all(
