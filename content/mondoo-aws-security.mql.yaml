  - uid: mondoo-aws-security-backup-vault-encrypted
    title: Ensure AWS Backup vaults are encrypted
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-aws-security-backup-vault-encrypted-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-backup-vault-encrypted-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-backup-vault-encrypted-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-backup-vault-encrypted-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-backup-vault-encrypted-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that AWS Backup vaults are encrypted using a KMS key. Backup vaults store recovery points that may contain sensitive data from databases, file systems, and other resources.

        **Why this matters**

        - Backup vaults contain copies of production data that may include sensitive information.
        - Without encryption, backup data is vulnerable to unauthorized access at the storage layer.
        - Compliance frameworks require encryption of backup data at rest.

        **Risk mitigation**

        - **Data protection:** Encrypts all recovery points stored in the backup vault.
        - **Compliance:** Meets requirements for backup data encryption.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and navigate to the AWS Backup service.
        2. In the left navigation pane, select **Backup vaults**.
        3. Select a vault to inspect.
        4. In the vault details, locate the **Encryption key** field.
        5. Verify that a KMS key ARN is listed.
        6. Repeat for each vault in the account.

        A passing vault shows a KMS key ARN in the **Encryption key** field. A failing vault shows no encryption key or displays the default AWS-managed key.

        ### Audit via CLI

        1. List all backup vaults and check their encryption key:

        ```bash
        aws backup list-backup-vaults \
          --query 'BackupVaultList[*].{Name:BackupVaultName,EncryptionKey:EncryptionKeyArn}' \
          --output table
        ```

        A passing vault returns a non-empty `EncryptionKey` ARN. A failing vault returns `null` or an empty value.

      remediation:
        - id: console
          desc: |
            To ensure AWS Backup vaults are encrypted using the AWS Console:

            1. Navigate to the AWS Backup Console.
            2. Choose Backup vaults.
            3. Create a new vault with a KMS encryption key specified.
            4. Note: Encryption cannot be changed after vault creation.
        - id: cli
          desc: |
            To ensure AWS Backup vaults are encrypted using the AWS CLI:

            ```bash
            aws backup create-backup-vault \
              --backup-vault-name example-vault \
              --encryption-key-arn <kms-key-arn>
            ```
        - id: terraform
          desc: |
            To ensure AWS Backup vaults are encrypted in Terraform:

            ```hcl
            resource "aws_backup_vault" "example" {
              name        = "example-vault"
              kms_key_arn = aws_kms_key.backup.arn
            }
            ```
        - id: cloudformation
          desc: |
            To ensure AWS Backup vaults are encrypted in CloudFormation:

            ```yaml
            Resources:
              BackupVault:
                Type: AWS::Backup::BackupVault
                Properties:
                  BackupVaultName: example-vault
                  EncryptionKeyArn: !GetAtt BackupKey.Arn
            ```
    refs:
      - url: https://docs.aws.amazon.com/aws-backup/latest/devguide/encryption.html
        title: AWS Documentation - Encryption for backups in AWS Backup
  - uid: mondoo-aws-security-backup-vault-encrypted-aws
    filters: asset.platform == "aws"
    mql: aws.backup.vaults.all(encryptionKey != null)
  - uid: mondoo-aws-security-backup-vault-encrypted-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_backup_vault")
    mql: |
      terraform.resources.where(nameLabel == "aws_backup_vault").all(
        arguments.kms_key_arn != empty
      )
  - uid: mondoo-aws-security-backup-vault-encrypted-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_backup_vault")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_backup_vault").all(
        change.after.kms_key_arn != empty
      )
  - uid: mondoo-aws-security-backup-vault-encrypted-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_backup_vault")
    mql: |
