      )
  - uid: mondoo-aws-security-lambda-source-arn-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_lambda_permission")
    mql: |
      terraform.state.resources.where(type == "aws_lambda_permission").all(
      values.source_arn != empty || values.source_account != empty
      )
  - uid: mondoo-aws-security-lambda-source-arn-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::Lambda::Permission")
    mql: |
      cloudformation.template.resources.where(type == "AWS::Lambda::Permission").all(
      properties['SourceArn'] != empty || properties['SourceAccount'] != empty
      )
  - uid: mondoo-aws-security-s3-mfa-delete
    title: Ensure S3 buckets have MFA delete enabled
    impact: 30
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-14
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-j
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-3
      compliance/pci-dss-4: pcidss-requirement-8-4-2
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-2
    variants:
      - uid: mondoo-aws-security-s3-mfa-delete-aws
        tags:
          mondoo.com/filter-title: AWS S3 Bucket
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-s3-mfa-delete-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-s3-mfa-delete-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-s3-mfa-delete-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-s3-mfa-delete-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that versioned S3 buckets have MFA delete enabled, requiring multi-factor authentication before permanently deleting an object version or disabling bucket versioning. By default, S3 buckets do not require MFA for delete operations, meaning compromised credentials alone are sufficient to destroy all object versions.

        **Why this matters**

        - **Credential-only deletion:** Without MFA delete, an attacker with valid AWS credentials can permanently delete all versions of every object in a versioned bucket in a single automated operation.
        - **Ransomware targeting:** Cloud storage is a frequent ransomware target; MFA delete removes the ability to automate bulk destruction because each destructive operation requires a physical second factor.
        - **Versioning bypass:** Versioning protects against accidental overwrites but not against deliberate deletion of all versions; MFA delete is the control that closes this gap.
        - **Defense-in-depth for critical data:** Buckets containing audit logs, backups, or regulated data warrant the extra friction that MFA delete introduces for destructive operations.

        **Risk mitigation**

        - **Ransomware resilience:** Requiring physical MFA possession for deletion forces attackers to abandon automated destruction playbooks that rely on credential-only access.
        - **Irreversible action gating:** Adds a deliberate, auditable second factor to the most destructive S3 operation, creating additional detection opportunities before data is permanently lost.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and navigate to **S3**.
        2. Select the bucket to review.
        3. Choose the **Properties** tab.
        4. Under **Bucket Versioning**, check the MFA delete setting.

        A passing bucket shows MFA delete as **Enabled** alongside versioning. A failing bucket shows MFA delete as **Disabled** or shows that versioning is not enabled.

        ### Audit via CLI

        1. Check the versioning and MFA delete configuration for a bucket:

        ```bash
        aws s3api get-bucket-versioning --bucket <bucket-name>
        ```

        A passing bucket returns `"Status": "Enabled"` and `"MFADelete": "Enabled"`. A failing bucket returns `"MFADelete": "Disabled"`, an absent `MFADelete` field, or versioning not enabled.
      remediation:
        - id: console
          desc: |
            To ensure S3 buckets have MFA delete enabled using the AWS Console, MFA delete can only be enabled via the AWS CLI or SDK using root account credentials. The AWS Console does not support enabling MFA delete directly.
        - id: cli
          desc: |
            To ensure S3 buckets have MFA delete enabled using the AWS CLI, MFA delete must be enabled using root account credentials. Generate an MFA token from the root account's MFA device, then run:

            ```bash
            aws s3api put-bucket-versioning \
              --bucket <bucket-name> \
              --versioning-configuration Status=Enabled,MFADelete=Enabled \
              --mfa "arn:aws:iam::<account-id>:mfa/root-account-mfa-device <mfa-token>"
            ```

            Verify MFA delete is enabled:

            ```bash
            aws s3api get-bucket-versioning --bucket <bucket-name>
            ```

            The response should include `"MFADelete": "Enabled"`.
        - id: terraform
          desc: |
            To ensure S3 buckets have MFA delete enabled in Terraform:

            ```hcl
            resource "aws_s3_bucket_versioning" "example" {
              bucket = aws_s3_bucket.example.id

              versioning_configuration {
                status     = "Enabled"
                mfa_delete = "Enabled"
              }

              mfa = "${var.mfa_serial} ${var.mfa_token}"
            }
            ```

            Note: MFA delete requires root account credentials. The `mfa` argument must provide the root account MFA device serial number and a current token.
        - id: cloudformation
          desc: |
            To ensure S3 buckets have MFA delete enabled in CloudFormation, note that CloudFormation does not natively support enabling MFA delete on S3 buckets. MFA delete must be enabled using the AWS CLI with root account credentials. You can configure versioning via CloudFormation, but the MFA delete setting requires a separate CLI step:

            ```yaml
            Resources:
              S3Bucket:
                Type: AWS::S3::Bucket
                Properties:
                  VersioningConfiguration:
                    Status: Enabled
            ```

            After stack deployment, enable MFA delete via the CLI using root credentials.
    refs:
      - url: https://docs.aws.amazon.com/AmazonS3/latest/userguide/MultiFactorAuthenticationDelete.html
        title: AWS Documentation - Configuring MFA delete
      - url: https://docs.aws.amazon.com/securityhub/latest/userguide/s3-controls.html
        title: AWS Security Hub - S3 controls reference
  - uid: mondoo-aws-security-s3-mfa-delete-aws
    filters: asset.platform == "aws-s3-bucket"
    mql: |
      aws.s3.bucket.versioning['Status'] != "Enabled" ||
      aws.s3.bucket.versioning['MFADelete'] == "Enabled"
  - uid: mondoo-aws-security-s3-mfa-delete-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_s3_bucket_versioning")
    mql: |
      terraform.resources.where(nameLabel == "aws_s3_bucket_versioning").all(
