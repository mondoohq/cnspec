    docs:
      desc: |
        This check ensures that all SNS topics are encrypted with a customer-managed KMS key (CMK), not the default `aws/sns` AWS-managed key. CMKs allow rotation, fine-grained key policies, and the ability to revoke access by disabling or deleting the key.

        **Why this matters**

        AWS-managed keys cannot be rotated on demand and their key policies cannot be edited. Customer-managed keys give the workload owner full control of cryptographic material, supporting BYOK and regulatory residency requirements.
      remediation:
        - id: cli
          desc: |
            ```bash
            aws sns set-topic-attributes --topic-arn <arn> \
              --attribute-name KmsMasterKeyId --attribute-value <cmk-arn>
            ```
        - id: terraform
          desc: |
            Set `kms_master_key_id` on every `aws_sns_topic` to a customer-managed CMK ARN or alias other than `alias/aws/sns`:

            ```hcl
            resource "aws_kms_key" "sns" {
              description         = "CMK for SNS topic encryption"
              enable_key_rotation = true
            }

            resource "aws_sns_topic" "example" {
              name              = "example-topic"
              kms_master_key_id = aws_kms_key.sns.arn
            }
            ```
        - id: cloudformation
          desc: |
            Set `KmsMasterKeyId` on every `AWS::SNS::Topic` to a customer-managed CMK ARN or alias other than `alias/aws/sns`:

            ```yaml
            Resources:
              SnsKey:
                Type: AWS::KMS::Key
                Properties:
                  Description: CMK for SNS topic encryption
                  EnableKeyRotation: true
                  KeyPolicy:
                    Version: "2012-10-17"
                    Statement:
                      - Effect: Allow
                        Principal:
                          Service: sns.amazonaws.com
                        Action:
                          - kms:Decrypt
                          - kms:GenerateDataKey
                        Resource: "*"
              ExampleTopic:
                Type: AWS::SNS::Topic
                Properties:
                  TopicName: example-topic
                  KmsMasterKeyId: !GetAtt SnsKey.Arn
            ```
    refs:
      - url: https://docs.aws.amazon.com/sns/latest/dg/sns-server-side-encryption.html
        title: AWS Documentation - Encryption at rest for Amazon SNS
