  - uid: mondoo-aws-security-lambda-concurrency-check
    title: Ensure Lambda functions have concurrent execution limits
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ccc-06
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-c
      compliance/nist-csf-1: nist-csf-1-pr-ip-1
      compliance/nist-csf-2: nist-csf-2-pr-ps-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-6
      compliance/nist-sp-800-171: false
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc9-1-1
      compliance/vda-isa-5: false
    variants:
      - uid: mondoo-aws-security-lambda-concurrency-check-aws
        tags:
          mondoo.com/filter-title: AWS Lambda Function
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-lambda-concurrency-check-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-lambda-concurrency-check-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-lambda-concurrency-check-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-lambda-concurrency-check-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that AWS Lambda functions are configured with a function-level reserved concurrency limit greater than zero. By default, Lambda functions share the account-wide concurrency pool with no per-function cap, meaning a single function can exhaust the entire pool and deny service to all other functions in the account.

        **Why this matters**

        - **Denial-of-service prevention:** An attacker who can trigger a Lambda function through a public API endpoint, S3 event, or SQS queue can flood it with invocations, starving every other Lambda-backed service in the account.
        - **Denial-of-wallet containment:** Unbounded parallel executions convert a cheap event-source vulnerability into a large unexpected compute bill, even before any data is accessed.
        - **Security function availability:** Incident response automations and security event processors that are also Lambda functions must retain available concurrency during an attack to execute when they are needed most.
        - **Workload isolation:** Reserved concurrency acts as a resource boundary between unrelated workloads, preventing a traffic spike in one service from cascading into another.

        **Risk mitigation**

        - **Blast radius cap:** A per-function concurrency limit bounds the maximum parallel executions a single abused function can consume, protecting the rest of the account from starvation.
        - **Cost control:** Reserved concurrency limits the compute cost attributable to a single function, reducing the financial damage from event-source abuse or misconfigured triggers.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and open the Lambda console.
        2. In the left navigation pane, select **Functions**.
        3. Select a function and open the **Configuration** tab.
        4. Select **Concurrency** in the sub-navigation.
        5. Check the **Reserved concurrency** value.

        A passing function shows a **Reserved concurrency** value greater than zero. A failing function shows **Unreserved concurrency** (no reserved concurrency limit configured).

        ### Audit via CLI

        1. List all Lambda functions and check each for a reserved concurrency setting:

        ```bash
        aws lambda list-functions \
          --query "Functions[*].FunctionName" \
          --output text | tr '\t' '\n' | \
          xargs -I{} aws lambda get-function-concurrency \
            --function-name {}
        ```

        Alternatively, check a specific function:

        ```bash
        aws lambda get-function-concurrency \
          --function-name <function-name>
        ```

        A passing function returns `{"ReservedConcurrentExecutions": <number greater than 0>}`. A failing function returns an empty response `{}` (no reserved concurrency set).

      remediation:
        - id: console
          desc: |
            To ensure Lambda functions have concurrent execution limits using the AWS Console:

            1.  Navigate to the AWS Lambda Console.
            2.  Select Functions from the left panel.
            3.  Select a Lambda function and go to the Configuration tab.
            4.  Under Concurrency, select Edit.
            5.  Enable Reserved Concurrency and set an appropriate concurrent execution limit.
            6.  Save the changes.
        - id: cli
          desc: |
            To ensure Lambda functions have concurrent execution limits using the AWS CLI, check the current concurrency setting for a Lambda function:

            ```bash
            aws lambda get-function-concurrency --function-name <function-name>
            ```

            If no reserved concurrency is set, configure a limit:

            ```bash
            aws lambda put-function-concurrency --function-name <function-name> --reserved-concurrent-executions <limit>
            ```

            To remove a concurrency limit if needed:

            ```bash
            aws lambda delete-function-concurrency --function-name <function-name>
            ```
        - id: terraform
          desc: |
            To ensure Lambda functions have concurrent execution limits in Terraform, ensure Lambda functions have a reserved concurrency limit:

            ```hcl
            resource "aws_lambda_function" "secure_lambda" {
              function_name    = "SecureLambda"
              role            = aws_iam_role.lambda_role.arn
              handler         = "index.handler"
              runtime         = "python3.12"
              filename        = "lambda.zip"

              reserved_concurrent_executions = 10  # Set function-level concurrency limit
            }
            ```
        - id: cloudformation
          desc: |
            To ensure Lambda functions have concurrent execution limits in CloudFormation, define reserved concurrency settings for a Lambda function in CloudFormation:

            ```yaml
            Resources:
              SecureLambdaFunction:
                Type: AWS::Lambda::Function
                Properties:
                  FunctionName: SecureLambda
                  Description: Example Lambda function with reserved concurrency.
                  Role: arn:aws:iam::123456789012:role/YourLambdaExecutionRole
                  Handler: index.handler
                  Runtime: python3.8
                  Code:
                    S3Bucket: your-s3-bucket-name
                    S3Key: lambda.zip
                  ReservedConcurrentExecutions: 10
            ```
    refs:
      - url: https://docs.aws.amazon.com/lambda/latest/dg/lambda-security.html
        title: AWS Lambda Security
      - url: https://docs.aws.amazon.com/lambda/latest/dg/configuration-concurrency.html
        title: AWS Lambda Reserved Concurrency
  - uid: mondoo-aws-security-lambda-concurrency-check-aws
    filters: asset.platform == "aws-lambda-function"
    mql: |
      aws.lambda.function.concurrency > 0
  - uid: mondoo-aws-security-lambda-concurrency-check-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_lambda_function")
    mql: |
      terraform.resources.where(nameLabel == "aws_lambda_function").all(
        arguments.reserved_concurrent_executions > 0
      )
  - uid: mondoo-aws-security-lambda-concurrency-check-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_lambda_function")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_lambda_function").all(
        change.after.reserved_concurrent_executions > 0
      )
  - uid: mondoo-aws-security-lambda-concurrency-check-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_lambda_function")
    mql: |
      terraform.state.resources.where(type == "aws_lambda_function").all(
        values.reserved_concurrent_executions > 0
      )
  - uid: mondoo-aws-security-lambda-concurrency-check-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::Lambda::Function")
    mql: |
      cloudformation.template.resources.where(type == "AWS::Lambda::Function").all(
      properties['ReservedConcurrentExecutions'] > 0
      )
  - uid: mondoo-aws-security-lambda-function-public-access-prohibited
    title: Ensure the policy attached to the lambda function prohibits public access
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-2-1
    variants:
      - uid: mondoo-aws-security-lambda-function-public-access-prohibited-aws
        tags:
          mondoo.com/filter-title: AWS Lambda Function
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-lambda-function-public-access-prohibited-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-lambda-function-public-access-prohibited-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-lambda-function-public-access-prohibited-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that the resource-based policy attached to each AWS Lambda function contains no statements that grant invocation rights to the wildcard principal (`*`). By default, Lambda functions have no resource-based policy, but policies added for service integrations or cross-account access can inadvertently include a wildcard principal that exposes the function to any AWS identity or unauthenticated caller.

        **Why this matters**

        - **Unauthorized invocation:** A wildcard principal in an Allow statement lets any AWS account or unauthenticated caller trigger the function, potentially executing privileged business logic or reading sensitive data processed by the handler.
        - **Data exposure:** Functions that process customer records, access databases, or call downstream services can become a path to sensitive information when invocable by arbitrary callers.
        - **Amplification risk:** Publicly invocable functions can be used as a compute amplifier in denial-of-service or cryptomining attacks at the account owner's expense.
        - **Least-privilege enforcement:** Restricting invocation to named principals enforces the minimum-access model required by most security frameworks for compute resources.

        **Risk mitigation**

        - **Explicit principal scoping:** Replacing wildcard principals with specific AWS account IDs, service principals, or ARNs ensures only authorized callers can invoke the function.
        - **Reduced attack surface:** Removing public invoke permissions eliminates the most direct exploitation path for functions that handle sensitive workloads or privileged AWS API calls.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and open the Lambda console.
        2. In the left navigation pane, select **Functions**.
        3. Select a function and open the **Configuration** tab.
        4. Select **Permissions** in the sub-navigation.
        5. Under **Resource-based policy statements**, review each statement for a `Principal` of `*` or `{"AWS": "*"}`.

        A passing function either has no resource-based policy or has a policy with no statements granting `Allow` to principal `*`. A failing function has one or more policy statements with `Effect: Allow` and `Principal: *` (or `AWS: *`).

        ### Audit via CLI

        1. Retrieve the resource-based policy for each Lambda function:

        ```bash
        aws lambda get-policy \
          --function-name <function-name> \
          --query "Policy" \
          --output text | python3 -m json.tool
        ```

        Inspect each statement in the returned policy document for `"Principal": "*"` or `"Principal": {"AWS": "*"}` combined with `"Effect": "Allow"`.

        A passing function has no such statement (or returns a `ResourceNotFoundException` indicating no resource-based policy exists). A failing function has at least one `Allow` statement with a wildcard principal.

      remediation:
        - id: console
          desc: |
            To ensure the policy attached to the lambda function prohibits public access using the AWS Console:

            1. Navigate to the AWS Lambda Console.
            2. Select Functions in the left panel.
            3. Select the Lambda function that has public access.
            4. Go to the Configuration tab and select Permissions.
            5. Under Resource-based policy, check for any policy statements with "Principal": "*" or "Principal": {"AWS": "*"}.
            6. Select Edit to modify the resource-based policy.
            7. Remove or update any policy statements that allow public access, restricting access to specific AWS accounts or services.
            8. Select Save to apply the changes.
        - id: cli
          desc: |
            To ensure the policy attached to the lambda function prohibits public access using the AWS CLI, get the current policy for a Lambda function:

            ```bash
            aws lambda get-policy --function-name <function-name>
            ```

            Remove the existing policy if it contains public access:

            ```bash
            aws lambda remove-permission --function-name <function-name> --statement-id <sid>
            ```

            Add a more restrictive policy:

            ```bash
            aws lambda add-permission \
              --function-name <function-name> \
              --statement-id AllowExecutionFromSpecificAccount \
              --action lambda:InvokeFunction \
              --principal <trusted-aws-account-id> \
              --source-account <source-account-id>
            ```
        - id: terraform
          desc: |
            To ensure the policy attached to the lambda function prohibits public access in Terraform:

            ```hcl
            resource "aws_lambda_function" "secure_function" {
              function_name = "secure-function"
              role          = aws_iam_role.lambda_role.arn
              handler       = "index.handler"
              runtime       = "nodejs22.x"
              filename      = "lambda.zip"
            }

            # Use a proper permission policy without public access
            resource "aws_lambda_permission" "secure_permission" {
              statement_id  = "AllowExecutionFromSpecificAccount"
              action        = "lambda:InvokeFunction"
              function_name = aws_lambda_function.secure_function.function_name
              principal     = "123456789012" # Specific AWS account ID, not "*"

              # Optional: Add additional restrictions
              source_account = "123456789012"
              source_arn     = "arn:aws:s3:::example-bucket"
            }
            ```
        - id: cloudformation
          desc: |
            To ensure the policy attached to the lambda function prohibits public access in CloudFormation:

            ```yaml
            Resources:
              SecureFunction:
                Type: AWS::Lambda::Function
                Properties:
                  FunctionName: secure-function
                  Role: !GetAtt LambdaRole.Arn
                  Handler: index.handler
                  Runtime: nodejs18.x
                  Code:
                    ZipFile: !Ref LambdaZipFile  # Or use S3Bucket/S3Key if stored in S3

              SecureFunctionPermission:
                Type: AWS::Lambda::Permission
                Properties:
                  FunctionName: !Ref SecureFunction
                  Action: lambda:InvokeFunction
                  Principal: '123456789012'  # Specific AWS account ID, not "*"
                  SourceAccount: '123456789012'
                  SourceArn: 'arn:aws:s3:::example-bucket'
                  StatementId: AllowExecutionFromSpecificAccount
            ```
    refs:
      - url: https://docs.aws.amazon.com/lambda/latest/dg/lambda-security.html
        title: AWS Lambda Security
      - url: https://docs.aws.amazon.com/lambda/latest/dg/access-control-resource-based.html
        title: AWS Lambda Resource-Based Policies
  - uid: mondoo-aws-security-lambda-function-public-access-prohibited-aws
    filters: |
      asset.platform == "aws-lambda-function"
    mql: |
      aws.lambda.function.policy.Statement.where(Effect == "Allow").all(Principal {AWS {_ != "*"}})
  - uid: mondoo-aws-security-lambda-function-public-access-prohibited-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_lambda_permission")
    mql: |
      terraform.resources.where(nameLabel == "aws_lambda_permission").none(
        arguments.principal == "*"
      )
  - uid: mondoo-aws-security-lambda-function-public-access-prohibited-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_lambda_permission")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_lambda_permission").none(
        change.after.principal == "*"
      )
  - uid: mondoo-aws-security-lambda-function-public-access-prohibited-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_lambda_permission")
    mql: |
      terraform.state.resources.where(type == "aws_lambda_permission").none(
        values.principal == "*"
      )
  # No Terraform variants: Pending OS upgrades are runtime telemetry on the live instance (`pendingMaintenanceActions`), not configuration. There is no Terraform attribute that represents pending maintenance actions.
  - uid: mondoo-aws-security-rds-instance-no-pending-os-upgrades
    title: Ensure no pending OS upgrades are available for RDS instances
    impact: 90
    filters: asset.platform == "aws-rds-dbinstance"
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-tvm-03
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-8
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-id-ra-1
      compliance/nist-csf-2: nist-csf-2-id-ra-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-1
      compliance/pci-dss-4: pcidss-requirement-6-3-3
      compliance/soc2-2017: soc2-control-cc7-1-2
      compliance/vda-isa-5: vda-isa-5-5-2-5
    mql: aws.rds.dbinstance.pendingMaintenanceActions == empty
    docs:
      desc: |
        This check ensures that Amazon RDS instances have no pending OS-level maintenance actions waiting to be applied. AWS manages the underlying operating system for RDS instances and queues security patches and updates as pending maintenance; customer accounts are responsible for scheduling when those updates are applied within their maintenance windows.

        **Why this matters**

        - **Vulnerability exposure window:** Each day a known OS patch remains unapplied is an additional day that a known CVE can be exploited against the database host.
        - **Managed responsibility boundary:** Although AWS owns the underlying infrastructure, AWS explicitly delegates patch scheduling to the account owner, making pending maintenance a customer accountability item.
        - **Cascading risk:** Database hosts are high-value targets; an OS-level exploit on an unpatched RDS instance can give an attacker access to data in memory, bypass encryption, or pivot to other VPC resources.
        - **Compliance expectations:** Patch management controls in multiple security frameworks require that critical and high-severity patches be applied within defined timeframes after availability.

        **Risk mitigation**

        - **Attack surface reduction:** Applying pending OS patches closes known vulnerabilities before they can be exploited against database infrastructure.
        - **Audit evidence:** A clean pending-maintenance state provides auditors with evidence that patch management obligations are being met on a continuous basis.
        - **Operational stability:** OS-level updates include stability and performance fixes that reduce the risk of unexpected database host behavior in production.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and open the RDS console.
        2. In the left navigation pane, select **Databases**.
        3. Select an RDS instance and open the **Maintenance & backups** tab.
        4. Under **Pending maintenance**, check if any maintenance action is listed.

        A passing instance shows **None** under Pending maintenance. A failing instance lists a pending action such as a system update or OS patch.

        ### Audit via CLI

        1. Run the following command to check for pending maintenance actions on all RDS instances:

        ```bash
        aws rds describe-pending-maintenance-actions \
          --query "PendingMaintenanceActions[?ResourceIdentifier!=null].{Resource:ResourceIdentifier,Action:PendingMaintenanceActionDetails[0].Action,ApplyDate:PendingMaintenanceActionDetails[0].AutoAppliedAfterDate}" \
          --output table
        ```

        A passing instance does not appear in the output (no pending maintenance). A failing instance appears with a pending `system-update` or similar action listed under its ARN.

      remediation:
        - id: console
          desc: |
            To ensure no pending OS upgrades are available for RDS instances using the AWS Console:

            1. Navigate to the AWS RDS Console.
            2. Select Databases in the left panel.
            3. Select the RDS instance with pending OS upgrades.
            4. Under Maintenance & backups tab, check for pending maintenance.
            5. If maintenance is pending, select Actions, then Upgrade operating system.
            6. Choose whether to apply immediately or during the next maintenance window.
            7. Select Upgrade operating system to apply the pending patches.
        - id: cli
          desc: |
            To ensure no pending OS upgrades are available for RDS instances using the AWS CLI, check for RDS instances with pending OS upgrades:

            ```bash
            aws rds describe-pending-maintenance-actions
            ```

            Apply pending upgrades immediately:

            ```bash
            aws rds apply-pending-maintenance-action \
              --resource-identifier arn:aws:rds:region:account-id:db:instance-id \
              --apply-action system-update \
              --opt-in-type immediate
            ```

            Or schedule for next maintenance window:

            ```bash
            aws rds apply-pending-maintenance-action \
              --resource-identifier arn:aws:rds:region:account-id:db:instance-id \
              --apply-action system-update \
              --opt-in-type next-maintenance
            ```
        - id: terraform
          desc: |
            To ensure no pending OS upgrades are available for RDS instances in Terraform:

            ```hcl
            # You can use auto minor version upgrades to reduce manual management
            resource "aws_db_instance" "secure_rds" {
              identifier                  = "secure-rds-instance"
              engine                      = "mysql"
              engine_version              = "8.0"
              auto_minor_version_upgrade  = true
              maintenance_window          = "Mon:03:00-Mon:04:00"

              # Other configuration parameters
              instance_class              = "db.t3.micro"
              allocated_storage           = 20
              storage_type                = "gp2"
              username                    = "admin"
              password                    = "YourSecurePassword123"
              skip_final_snapshot         = true
            }
            ```
        - id: cloudformation
          desc: |
            To ensure no pending OS upgrades are available for RDS instances in CloudFormation:

            ```yaml
            Resources:
              SecureRDSInstance:
                Type: "AWS::RDS::DBInstance"
                Properties:
                  DBInstanceIdentifier: "secure-rds-instance"
                  Engine: "mysql"
                  EngineVersion: "8.0"
                  AutoMinorVersionUpgrade: true
                  PreferredMaintenanceWindow: "Mon:03:00-Mon:04:00"

                  # Other configuration parameters
                  DBInstanceClass: "db.t3.micro"
                  AllocatedStorage: 20
                  StorageType: "gp2"
                  MasterUsername: "admin"
                  MasterUserPassword: "YourSecurePassword123"
                  SkipFinalSnapshot: true
            ```
    refs:
      - url: https://docs.aws.amazon.com/AmazonRDS/latest/UserGuide/UsingWithRDS.html
        title: Amazon RDS Security
  - uid: mondoo-aws-security-rds-instance-encryption-at-rest
    title: Ensure all RDS instances are enabled for encryption-at-rest
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
