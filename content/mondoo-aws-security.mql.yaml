        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that all SQS queues are encrypted with a customer-managed KMS key (CMK) rather than SQS-managed encryption (SSE-SQS) or the AWS-managed `aws/sqs` key.

        **Why this matters**

        Sensitive queue payloads benefit from CMK protection because key policies can be tightly scoped, keys can be rotated on demand, and access can be revoked by disabling the CMK. SSE-SQS and `aws/sqs` keys offer no such control.
      remediation:
        - id: cli
          desc: |
            ```bash
            aws sqs set-queue-attributes --queue-url <url> \
              --attributes KmsMasterKeyId=<cmk-arn>,KmsDataKeyReusePeriodSeconds=300
            ```
        - id: terraform
          desc: |
            Set `kms_master_key_id` on every `aws_sqs_queue` to a customer-managed CMK ARN or alias other than `alias/aws/sqs`:

            ```hcl
            resource "aws_kms_key" "sqs" {
              description         = "CMK for SQS queue encryption"
              enable_key_rotation = true
            }

            resource "aws_sqs_queue" "example" {
              name                              = "example-queue"
              kms_master_key_id                 = aws_kms_key.sqs.arn
              kms_data_key_reuse_period_seconds = 300
            }
            ```
        - id: cloudformation
          desc: |
            Set `KmsMasterKeyId` on every `AWS::SQS::Queue` to a customer-managed CMK ARN or alias other than `alias/aws/sqs`:

            ```yaml
            Resources:
              SqsKey:
                Type: AWS::KMS::Key
                Properties:
                  Description: CMK for SQS queue encryption
                  EnableKeyRotation: true
              ExampleQueue:
                Type: AWS::SQS::Queue
                Properties:
                  QueueName: example-queue
                  KmsMasterKeyId: !GetAtt SqsKey.Arn
            ```
    refs:
      - url: https://docs.aws.amazon.com/AWSSimpleQueueService/latest/SQSDeveloperGuide/sqs-server-side-encryption.html
        title: AWS Documentation - Encryption at rest for Amazon SQS
