    mql: |
      cloudformation.template.resources.where(type == "AWS::RDS::DBInstance").all( properties['StorageEncrypted'] == true )
  - uid: mondoo-aws-security-rds-cluster-parameter-group-ssl
    title: Ensure RDS cluster parameter groups enforce encryption in transit
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    variants:
      - uid: mondoo-aws-security-rds-cluster-parameter-group-ssl-aws
        tags:
          mondoo.com/filter-title: AWS RDS DB Cluster
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-rds-cluster-parameter-group-ssl-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-rds-cluster-parameter-group-ssl-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-rds-cluster-parameter-group-ssl-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that the cluster parameter group associated with an Amazon RDS cluster sets the `ssl` parameter to `1`, which mandates TLS for all connections to every instance in the cluster. Without this cluster-level enforcement, individual instances or applications can establish unencrypted database connections even when TLS is available.

        **Why this matters**

        - **Uniform enforcement:** Setting the parameter at the cluster level applies the requirement to all current and future instances in the cluster, eliminating per-instance configuration drift.
        - **In-transit data protection:** Database queries frequently carry sensitive data such as credentials, PII, and financial records; unencrypted connections expose that data to anyone on the network path between the application and the database.
        - **Credential interception:** Without TLS, database authentication credentials transmitted in plaintext can be captured by a network observer or man-in-the-middle attacker on the same subnet or VPC.
        - **Compliance requirement:** Frameworks that mandate encryption of data in transit treat unencrypted database connections as a direct control failure, regardless of other compensating controls.

        **Risk mitigation**

        - **Centralized control:** A cluster parameter group change enforces TLS across every instance simultaneously, ensuring no instance can serve unencrypted connections even after a configuration change or instance replacement.
        - **Connection rejection:** With `ssl=1`, the database engine refuses plaintext connection attempts at the protocol level, providing a hard technical control rather than relying on application-side TLS configuration.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and open the RDS console.
        2. In the left navigation pane, select **Parameter groups**.
        3. Select the cluster parameter group associated with your RDS cluster.
        4. Search for the parameter named `ssl` (for Aurora PostgreSQL) or `require_secure_transport` (for Aurora MySQL).
        5. Check the current value.

        A passing parameter group shows the `ssl` parameter set to `1` (PostgreSQL) or `require_secure_transport` set to `ON` (MySQL). A failing parameter group shows `ssl` set to `0` or `require_secure_transport` set to `OFF` (or the parameter not present).

        ### Audit via CLI

        1. Identify the parameter group name for the cluster:

        ```bash
        aws rds describe-db-clusters \
          --query "DBClusters[*].{ClusterId:DBClusterIdentifier,ParameterGroup:DBClusterParameterGroup}" \
          --output table
        ```

        2. Check the SSL-related parameter in that group:

        ```bash
        aws rds describe-db-cluster-parameters \
          --db-cluster-parameter-group-name <parameter-group-name> \
          --query "Parameters[?ParameterName=='ssl' || ParameterName=='require_secure_transport'].{Name:ParameterName,Value:ParameterValue}" \
          --output table
        ```

        A passing parameter group returns `"ParameterValue": "1"` for `ssl` or `"ParameterValue": "ON"` for `require_secure_transport`. A failing parameter group returns `"ParameterValue": "0"` for `ssl` or `"ParameterValue": "OFF"` for `require_secure_transport`.

      remediation:
        - id: console
          desc: |
            To ensure RDS cluster parameter groups enforce encryption in transit using the AWS Console:

            1. Navigate to the AWS RDS Console.
            2. In the left navigation panel, select Parameter groups.
            3. Identify the cluster parameter group associated with your RDS cluster.
            4. Select the parameter group and choose Edit parameters.
            5. In the parameter search field, search for "ssl".
            6. Change the value of the ssl parameter from "0" to "1" to enforce SSL connections.
            7. Select Save changes to apply the modified parameter.
            8. If this is a new parameter group, you need to associate it with your RDS cluster:
               - Navigate to Databases in the left panel.
               - Select your RDS cluster.
               - Select Modify.
               - Under Additional configuration, select the parameter group with SSL enabled.
               - Select Continue and Apply immediately to apply the changes.
            9. After applying the changes, monitor the cluster status until it shows "Available" again.
            10. Note that the cluster may require a reboot to apply the parameter change.
        - id: cli
          desc: |
            To ensure RDS cluster parameter groups enforce encryption in transit using the AWS CLI, first, check if the cluster parameter group has SSL enabled:

            ```bash
            aws rds describe-db-cluster-parameters \
              --db-cluster-parameter-group-name <parameter-group-name> \
              --query "Parameters[?ParameterName=='ssl']"
            ```

            If SSL is not enabled (value is "0"), create a modified parameter group:

            ```bash
            # First, create a new parameter group (if needed)
            aws rds create-db-cluster-parameter-group \
              --db-cluster-parameter-group-name secure-cluster-params \
              --db-parameter-group-family aurora-mysql5.7 \
              --description "Cluster parameter group with SSL enabled"

            # Modify the SSL parameter to enforce SSL connections
            aws rds modify-db-cluster-parameter-group \
              --db-cluster-parameter-group-name secure-cluster-params \
              --parameters "ParameterName=ssl,ParameterValue=1,ApplyMethod=immediate"
            ```

            Apply the parameter group to your RDS cluster:

            ```bash
            aws rds modify-db-cluster \
              --db-cluster-identifier <cluster-identifier> \
              --db-cluster-parameter-group-name secure-cluster-params \
              --apply-immediately
            ```

            Verify the parameter group is associated and the SSL parameter is set correctly:

            ```bash
            aws rds describe-db-clusters \
              --db-cluster-identifier <cluster-identifier> \
              --query "DBClusters[*].DBClusterParameterGroup"

            aws rds describe-db-cluster-parameters \
              --db-cluster-parameter-group-name secure-cluster-params \
              --query "Parameters[?ParameterName=='ssl']"
            ```
        - id: terraform
          desc: |
            To ensure RDS cluster parameter groups enforce encryption in transit in Terraform:

            ```hcl
            # Create a MySQL cluster parameter group with SSL enabled
            resource "aws_rds_cluster_parameter_group" "secure_cluster_params" {
              name        = "secure-cluster-params-mysql5.7"
              family      = "aurora-mysql5.7"
              description = "Cluster parameter group with SSL enabled"

              parameter {
                name  = "require_secure_transport"
                value = "ON"
              }
            }

            # Create a Postgresql cluster parameter group with SSL enabled
            resource "aws_rds_cluster_parameter_group" "secure_cluster_params" {
              name        = "secure-cluster-params-pg10"
              family      = "aurora-postgresql10"
              description = "Cluster parameter group with SSL enabled"

              parameter {
                name  = "ssl"
                value = "1"
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure RDS cluster parameter groups enforce encryption in transit in CloudFormation:

            ```yaml
            Resources:
              # Create a cluster parameter group with SSL enabled
              SecureClusterParameterGroupMysql57:
                Type: "AWS::RDS::DBClusterParameterGroup"
                Properties:
                  Description: "Cluster parameter group with SSL enabled"
                  Family: "aurora-mysql5.7"
                  Parameters:
                    require_secure_transport: "ON"
                  Tags:
                    - Key: "Name"
                      Value: "secure-cluster-params"

              # Create a cluster parameter group with SSL enabled
              SecureClusterParameterGroupPG10:
                Type: "AWS::RDS::DBClusterParameterGroup"
                Properties:
                  Description: "Cluster parameter group with SSL enabled"
                  Family: "aurora-postgresql10"
                  Parameters:
                    ssl: 1
                  Tags:
                    - Key: "Name"
                      Value: "secure-cluster-params-pg10"
            ```
    refs:
      - url: https://docs.aws.amazon.com/AmazonRDS/latest/UserGuide/UsingWithRDS.html
        title: Amazon RDS Security
      - url: https://docs.aws.amazon.com/AmazonRDS/latest/AuroraUserGuide/UsingWithRDS.SSL.html
        title: Using SSL/TLS with Aurora
  - uid: mondoo-aws-security-rds-cluster-parameter-group-ssl-aws
    filters: asset.platform == "aws-rds-dbcluster"
    mql: |
      clusterParameterGroup = aws.rds.dbcluster.parameterGroupName
      aws.rds.clusterParameterGroups.where(name == clusterParameterGroup) != empty
      aws.rds.clusterParameterGroups.where(name == clusterParameterGroup)
        .all(
          parameters.where(name == 'ssl').any(value == 1)
            || parameters.where(name == 'require_secure_transport').any(value == "ON")
        )
  - uid: mondoo-aws-security-rds-cluster-parameter-group-ssl-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_rds_cluster_parameter_group")
    mql: |
      terraform.resources.where(nameLabel == "aws_rds_cluster_parameter_group" && arguments.family == /mysql/).all(
        blocks.any(
          attributes.name.value =='require_secure_transport'
            && attributes.value.value == "ON"
        )
      )

      terraform.resources.where(nameLabel == "aws_rds_cluster_parameter_group" && arguments.family == /postgres/).all(
        blocks.any(
          attributes.name.value =='ssl'
            && attributes.value.value == "1"
        )
      )
  - uid: mondoo-aws-security-rds-cluster-parameter-group-ssl-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_rds_cluster_parameter_group")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_rds_cluster_parameter_group" && change.after.family == /mysql/).all(
        change.after.parameter.where(name == "require_secure_transport").map(value).first == "ON"
      )
      terraform.plan.resourceChanges.where(type == "aws_rds_cluster_parameter_group" && change.after.family == /postgres/).all(
        change.after.parameter.where(name == "ssl").map(value).first == 1
      )
  - uid: mondoo-aws-security-rds-cluster-parameter-group-ssl-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_rds_cluster_parameter_group")
    mql: |
      terraform.state.resources.where(type == "aws_rds_cluster_parameter_group" && values.family == /mysql/).all(
        values.parameter.where(name == 'require_secure_transport').map(value).first == "ON"
      )
      terraform.state.resources.where(type == "aws_rds_cluster_parameter_group" && values.family == /postgres/).all(
        values.parameter.where(name == 'ssl').map(value).first == 1
      )
  # No Terraform variants: Pending OS upgrades are runtime telemetry queried from the AWS API (`aws.rds.allPendingMaintenanceActions`), not configuration. There is no Terraform attribute that represents pending maintenance actions.
  - uid: mondoo-aws-security-rds-cluster-no-pending-os-upgrades
    title: Ensure no pending OS upgrades are available for RDS clusters
    impact: 90
    filters: asset.platform == "aws-rds-dbcluster"
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-tvm-03
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-8
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-id-ra-1
      compliance/nist-csf-2: nist-csf-2-id-ra-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-1
      compliance/pci-dss-4: pcidss-requirement-6-3-3
      compliance/soc2-2017: soc2-control-cc7-1-2
      compliance/vda-isa-5: vda-isa-5-5-2-5
    mql: |
      rdsArn = asset.ids.where(_ == /^arn/).first
      aws.rds.allPendingMaintenanceActions.where(resourceArn == rdsArn) == empty
    docs:
      desc: |
        This check ensures that Amazon RDS clusters, including Aurora clusters, have no pending OS-level maintenance actions waiting to be applied. AWS queues critical security patches and updates as pending maintenance for the underlying host infrastructure; scheduling and applying those updates within the maintenance window is the account owner's responsibility.

        **Why this matters**

        - **Multi-instance blast radius:** An unpatched OS vulnerability in an Aurora cluster can affect the writer and all reader instances simultaneously, amplifying the risk compared to a single-instance deployment.
        - **Known CVE exposure:** Pending OS patches address published vulnerabilities; the longer they remain unapplied, the longer attackers with knowledge of those CVEs have an actionable target.
        - **High-value target profile:** Database clusters are among the most attractive targets in a cloud environment because they concentrate large amounts of sensitive data behind a single reachable endpoint.
        - **Compliance patch cadence:** Security frameworks commonly require that high-severity patches be applied within a defined window; unapplied pending maintenance is direct evidence of non-compliance.

        **Risk mitigation**

        - **Reduced vulnerability window:** Applying pending maintenance actions closes known OS-level vulnerabilities across all instances in the cluster, shrinking the exploitable attack surface.
        - **Audit readiness:** A cluster with no pending maintenance actions provides clean evidence that patch management obligations are being honored during each maintenance window cycle.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and open the RDS console.
        2. In the left navigation pane, select **Databases**.
        3. Select an RDS cluster (such as an Aurora cluster) and open the **Maintenance & backups** tab.
        4. Under **Pending maintenance**, check for any listed maintenance actions.

        A passing cluster shows **None** under Pending maintenance. A failing cluster lists a pending action such as a system update.

        ### Audit via CLI

        1. Run the following command to check for pending maintenance actions across all RDS resources, then filter for cluster ARNs:

        ```bash
        aws rds describe-pending-maintenance-actions \
          --query "PendingMaintenanceActions[?contains(ResourceIdentifier, ':cluster:')].{Resource:ResourceIdentifier,Action:PendingMaintenanceActionDetails[0].Action,ApplyDate:PendingMaintenanceActionDetails[0].AutoAppliedAfterDate}" \
          --output table
        ```

        A passing cluster does not appear in the output. A failing cluster appears with a pending `system-update` or similar action listed against its cluster ARN.

      remediation:
        - id: console
          desc: |
            To ensure no pending OS upgrades are available for RDS clusters using the AWS Console:

            1. Navigate to the AWS RDS Console.
            2. Select Databases in the left panel.
            3. Look for the RDS cluster with pending OS upgrades, such as an Aurora cluster.
            4. Under Maintenance & backups tab, check for pending maintenance.
            5. If maintenance is pending, select Actions, then Upgrade operating system.
            6. Choose whether to apply immediately or during the next maintenance window.
            7. If there are multiple instances in the cluster, you can choose to apply to all or specific instances.
            8. Select Upgrade operating system to apply the pending patches.
        - id: cli
          desc: |
            To ensure no pending OS upgrades are available for RDS clusters using the AWS CLI, check for pending maintenance actions on RDS clusters:

            ```bash
            aws rds describe-pending-maintenance-actions
            ```

            Apply pending OS upgrades immediately to a cluster:

            ```bash
            aws rds apply-pending-maintenance-action \
              --resource-identifier arn:aws:rds:region:account-id:cluster:cluster-id \
              --apply-action system-update \
              --opt-in-type immediate
            ```

            Schedule the upgrade for the next maintenance window:

            ```bash
            aws rds apply-pending-maintenance-action \
              --resource-identifier arn:aws:rds:region:account-id:cluster:cluster-id \
              --apply-action system-update \
