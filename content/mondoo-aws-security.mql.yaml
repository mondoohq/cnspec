        values.kms_key_id != empty
      )
  - uid: mondoo-aws-security-cloudwatch-log-group-encrypted-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::Logs::LogGroup")
    mql: |
      cloudformation.template.resources.where(type == "AWS::Logs::LogGroup").all(
      properties['KmsKeyId'] != empty
      )
  - uid: mondoo-aws-security-elb-security-policy-enabled
    title: Ensure ALBs are configured with a secure TLS policy
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    props:
      - uid: allowedTlsPoliciesAlb
        title: Defines a list of allowed TLS policies that can be used with ALBs
        mql: |
          return [
            "ELBSecurityPolicy-TLS13-1-2-2021-06",
            "ELBSecurityPolicy-TLS13-1-3-2021-06",
            "ELBSecurityPolicy-TLS13-1-2-Res-2021-06",
            "ELBSecurityPolicy-FS-1-2-Res-2020-10"
          ]
    variants:
      - uid: mondoo-aws-security-elb-security-policy-enabled-aws
        tags:
          mondoo.com/filter-title: AWS Application Load Balancer
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-elb-security-policy-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-elb-security-policy-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-elb-security-policy-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-elb-security-policy-enabled-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that AWS Application Load Balancer HTTPS listeners are configured with a security policy that enforces TLS 1.2 or higher and strong cipher suites. AWS provides several named TLS security policies; older policies such as ELBSecurityPolicy-2016-08 permit TLS 1.0 and 1.1 and include weak ciphers, while modern policies restrict negotiation to TLS 1.2 or TLS 1.3 with forward-secrecy cipher suites.

        **Why this matters**

        - **Protocol downgrade prevention:** TLS 1.0 and 1.1 are vulnerable to POODLE, BEAST, and related attacks; enforcing TLS 1.2+ eliminates those attack surfaces.
        - **Cipher suite strength:** Modern policies exclude export-grade, RC4, and other weak ciphers that allow decryption of captured traffic by a capable attacker.
        - **Forward secrecy:** Policies built around ECDHE key exchange ensure that compromising the server's long-term private key cannot retroactively decrypt past sessions.
        - **Compliance alignment:** Payment card and healthcare data regulations explicitly prohibit early TLS versions for transmitting sensitive data.

        **Risk mitigation**

        - **Session interception:** Weak cipher suites enable an attacker with captured traffic to decrypt session content offline; restricting to modern ciphers eliminates that risk.
        - **Downgrade attacks:** Advertising support for older protocol versions allows an active attacker to force negotiation to a weaker protocol; removing those versions from the policy closes that vector.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and open the EC2 console at https://console.aws.amazon.com/ec2/.
        2. In the left navigation pane, under **Load Balancing**, choose **Load Balancers**.
        3. Select an Application Load Balancer and open the **Listeners** tab.
        4. For each HTTPS listener, check the **Security policy** column.
        5. Confirm the policy is one of the approved secure policies: `ELBSecurityPolicy-TLS13-1-2-2021-06`, `ELBSecurityPolicy-TLS13-1-3-2021-06`, `ELBSecurityPolicy-TLS13-1-2-Res-2021-06`, or `ELBSecurityPolicy-FS-1-2-Res-2020-10`.

        A passing listener shows one of the approved TLS policy names. A failing listener shows a deprecated or less-secure policy name such as `ELBSecurityPolicy-2016-08` or `ELBSecurityPolicy-TLS-1-1-2017-01`.

        ### Audit via CLI

        1. List all load balancers and retrieve their listener configurations to check TLS policies:

        ```bash
        aws elbv2 describe-load-balancers --query "LoadBalancers[*].LoadBalancerArn" --output text | tr '\t' '\n' | xargs -I {} aws elbv2 describe-listeners --load-balancer-arn {} --query "Listeners[*].{LoadBalancerArn:LoadBalancerArn,ListenerArn:ListenerArn,Protocol:Protocol,SslPolicy:SslPolicy}" --output table
        ```

        A passing HTTPS listener shows `SslPolicy` set to one of the approved policy names. A failing listener shows an unapproved or legacy policy name.
      remediation:
        - id: console
          desc: |
            To enforce allowed TLS policies on ALBs using the AWS Console:

            1. Navigate to the AWS EC2 Console.
            2. Select Load Balancers under the Load Balancing section.
            3. Select the Application Load Balancer you want to update.
            4. Select the Listeners tab.
            5. For the HTTPS listener, select Edit.
            6. Under Security policy, select a more secure policy:
               - ELBSecurityPolicy-TLS13-1-2-2021-06 (recommended)
               - ELBSecurityPolicy-TLS13-1-3-2021-06 (if you need TLS 1.3 only)
               - ELBSecurityPolicy-FS-1-2-Res-2020-10 (for FIPS compliance)
            7. Select Save changes to apply the updated security policy.
        - id: cli
          desc: |
            To enforce allowed TLS policies on ALBs using the AWS CLI, identify listeners for your load balancer:

            ```bash
            aws elbv2 describe-listeners --load-balancer-arn arn:aws:elasticloadbalancing:region:account-id:loadbalancer/app/my-load-balancer/1234567890abcdef
            ```

            Update the security policy for an HTTPS listener:

            ```bash
            aws elbv2 modify-listener \
              --listener-arn arn:aws:elasticloadbalancing:region:account-id:listener/app/my-load-balancer/1234567890abcdef/listener-id \
              --ssl-policy ELBSecurityPolicy-TLS13-1-2-2021-06
            ```

            Verify the updated security policy:

            ```bash
            aws elbv2 describe-listeners \
              --listener-arns arn:aws:elasticloadbalancing:region:account-id:listener/app/my-load-balancer/1234567890abcdef/listener-id \
              --query "Listeners[0].SslPolicy"
            ```
        - id: terraform
          desc: |
            To enforce allowed TLS policies on ALBs in Terraform:

            ```hcl
            resource "aws_lb" "secure_alb" {
              name               = "secure-alb"
              internal           = false
              load_balancer_type = "application"
              security_groups    = [aws_security_group.lb_sg.id]
              subnets            = [aws_subnet.public_a.id, aws_subnet.public_b.id]
            }

            resource "aws_lb_listener" "https" {
              load_balancer_arn = aws_lb.secure_alb.arn
              port              = "443"
              protocol          = "HTTPS"
              ssl_policy        = "ELBSecurityPolicy-TLS13-1-2-2021-06" # Secure TLS policy
              certificate_arn   = aws_acm_certificate.cert.arn

              default_action {
                type             = "forward"
                target_group_arn = aws_lb_target_group.app.arn
              }
            }
            ```
        - id: cloudformation
          desc: |
            To enforce allowed TLS policies on ALBs in CloudFormation:

            ```yaml
            Resources:
              SecureLoadBalancer:
                Type: "AWS::ElasticLoadBalancingV2::LoadBalancer"
                Properties:
                  Name: "secure-alb"
                  Scheme: "internet-facing"
                  Type: "application"
                  SecurityGroups:
                    - !Ref LoadBalancerSecurityGroup
                  Subnets:
                    - !Ref PublicSubnetA
                    - !Ref PublicSubnetB

              SecureHttpsListener:
                Type: "AWS::ElasticLoadBalancingV2::Listener"
                Properties:
                  LoadBalancerArn: !Ref SecureLoadBalancer
                  Port: 443
                  Protocol: "HTTPS"
                  SslPolicy: "ELBSecurityPolicy-TLS13-1-2-2021-06"
                  Certificates:
                    - CertificateArn: !Ref SSLCertificate
                  DefaultActions:
                    - Type: "forward"
                      TargetGroupArn: !Ref DefaultTargetGroup

              DefaultTargetGroup:
                Type: "AWS::ElasticLoadBalancingV2::TargetGroup"
                Properties:
                  VpcId: !Ref VPC
                  Port: 80
                  Protocol: "HTTP"
            ```
    refs:
      - url: https://docs.aws.amazon.com/elasticloadbalancing/latest/userguide/security.html
        title: Elastic Load Balancing Security
  - uid: mondoo-aws-security-elb-security-policy-enabled-aws
    filters: asset.platform == "aws-elb-loadbalancer"
    mql: |
      aws.elb.loadbalancer.listenerDescriptions.all(
        SslPolicy.in(props.allowedTlsPoliciesAlb)
      )
  - uid: mondoo-aws-security-elb-security-policy-enabled-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_lb_listener")
    mql: |
      terraform.resources.where(nameLabel == "aws_lb_listener").all(
        arguments.ssl_policy.in(props.allowedTlsPoliciesAlb)
      )
  - uid: mondoo-aws-security-elb-security-policy-enabled-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_lb_listener")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_lb_listener").all(
        change.after.ssl_policy.in(props.allowedTlsPoliciesAlb)
      )
  - uid: mondoo-aws-security-elb-security-policy-enabled-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_lb_listener")
    mql: |
      terraform.state.resources.where(type == "aws_lb_listener").all(
        values.ssl_policy.in(props.allowedTlsPoliciesAlb)
      )
  - uid: mondoo-aws-security-elb-security-policy-enabled-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::ElasticLoadBalancingV2::Listener")
    mql: |
      cloudformation.template.resources.where(type == "AWS::ElasticLoadBalancingV2::Listener").all(
      properties['SslPolicy'].in(props.allowedTlsPoliciesAlb)
      )
  - uid: mondoo-aws-security-elb-ssl-listener
    title: Ensure Application Load Balancers are configured with HTTPS listeners
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    variants:
      - uid: mondoo-aws-security-elb-ssl-listener-aws
        tags:
          mondoo.com/filter-title: AWS Application Load Balancer
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-elb-ssl-listener-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-elb-ssl-listener-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-elb-ssl-listener-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-elb-ssl-listener-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that AWS Application Load Balancers serve traffic exclusively over HTTPS listeners, so that all data exchanged between clients and the load balancer is encrypted in transit. By default, ALBs support both HTTP and HTTPS listeners; an operator must explicitly remove or redirect HTTP-only listeners to enforce encryption for all client traffic.

        **Why this matters**

        - **Data confidentiality:** HTTPS listeners establish TLS sessions that encrypt all request and response data, preventing eavesdropping on network paths between clients and the application.
        - **Credential protection:** Login forms, session cookies, and API tokens transmitted over plain HTTP are readable by any network observer; HTTPS prevents this exposure.
        - **Integrity assurance:** TLS prevents man-in-the-middle modification of HTTP responses, protecting users from injected content or redirects.
        - **User trust:** Browsers and security scanners flag non-HTTPS endpoints as insecure, directly affecting user confidence and SEO ranking.

        **Risk mitigation**

        - **Network eavesdropping:** Plain HTTP traffic is readable on any network segment between the client and the load balancer; HTTPS eliminates that exposure at the transport layer.
        - **Session hijacking:** Unencrypted cookies and tokens can be captured and replayed; TLS sessions prevent token theft from network-level interception.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and open the EC2 console at https://console.aws.amazon.com/ec2/.
        2. In the left navigation pane, under **Load Balancing**, choose **Load Balancers**.
        3. Select an Application Load Balancer and open the **Listeners** tab.
        4. Review the **Protocol** column for each listener. Confirm that all listeners use **HTTPS**, or that any **HTTP** listeners are configured with a redirect action to HTTPS.

        A passing load balancer shows all listeners using the HTTPS protocol (or HTTP with a redirect to HTTPS). A failing load balancer shows one or more HTTP listeners that forward traffic directly without redirecting to HTTPS.

        ### Audit via CLI

        1. Retrieve listeners for all load balancers and check their protocols:

        ```bash
        aws elbv2 describe-load-balancers --query "LoadBalancers[*].LoadBalancerArn" --output text | tr '\t' '\n' | xargs -I {} aws elbv2 describe-listeners --load-balancer-arn {} --query "Listeners[*].{Protocol:Protocol,Port:Port,DefaultActions:DefaultActions}" --output json
        ```

        A passing load balancer returns only listeners with `Protocol: HTTPS` or HTTP listeners whose `DefaultActions` include a redirect to HTTPS. A failing load balancer returns an HTTP listener with a `forward` action and no HTTPS redirect.
      remediation:
        - id: console
          desc: |
            To ensure Application Load Balancers are configured with HTTPS listeners using the AWS Console:

            1. Navigate to the AWS EC2 Console.
            2. Select Load Balancers under the Load Balancing section.
            3. Select the Application Load Balancer that needs HTTPS configuration.
            4. Select the Listeners tab.
            5. If there isn't an HTTPS listener (port 443):
               - Select Add listener.
               - Set Protocol:Port to HTTPS:443.
               - Under Security policy, select a secure policy like ELBSecurityPolicy-TLS13-1-2-2021-06.
               - Under Default SSL certificate, choose one of:
                 * Choose from ACM (recommended)
                 * Choose from IAM
                 * Import a certificate
               - Configure the default action (typically forwarding to a target group).
            6. Select Add to create the HTTPS listener.

            7. For existing HTTP listeners, consider implementing a redirect to HTTPS:
               - Select the HTTP listener and choose Edit.
               - Change the default action to Redirect.
               - Set Protocol to HTTPS, Port to 443, and Status code to 301 (Permanently moved).
            8. Select Save changes to apply the updated configuration.
        - id: cli
          desc: |
            To ensure Application Load Balancers are configured with HTTPS listeners using the AWS CLI, create an HTTPS listener:

            ```bash
            aws elbv2 create-listener \
              --load-balancer-arn arn:aws:elasticloadbalancing:region:account-id:loadbalancer/app/my-load-balancer/1234567890abcdef \
              --protocol HTTPS \
              --port 443 \
              --ssl-policy ELBSecurityPolicy-TLS13-1-2-2021-06 \
              --certificates CertificateArn=arn:aws:acm:region:account-id:certificate/certificate-id \
              --default-actions Type=forward,TargetGroupArn=arn:aws:elasticloadbalancing:region:account-id:targetgroup/my-target-group/1234567890abcdef
            ```

            Update an existing HTTP listener to redirect to HTTPS:

            ```bash
            aws elbv2 modify-listener \
              --listener-arn arn:aws:elasticloadbalancing:region:account-id:listener/app/my-load-balancer/1234567890abcdef/listener-id \
              --port 80 \
              --protocol HTTP \
              --default-actions Type=redirect,RedirectConfig="{Protocol=HTTPS,Port=443,StatusCode=HTTP_301}"
            ```
        - id: terraform
          desc: |
            To ensure Application Load Balancers are configured with HTTPS listeners in Terraform:

            ```hcl
            resource "aws_lb" "secure_alb" {
              name               = "secure-alb"
              internal           = false
              load_balancer_type = "application"
              security_groups    = [aws_security_group.lb_sg.id]
              subnets            = [aws_subnet.public_a.id, aws_subnet.public_b.id]
            }

            # HTTPS listener
            resource "aws_lb_listener" "https" {
              load_balancer_arn = aws_lb.secure_alb.arn
              port              = "443"
              protocol          = "HTTPS"
              ssl_policy        = "ELBSecurityPolicy-TLS13-1-2-2021-06"
              certificate_arn   = aws_acm_certificate.cert.arn

              default_action {
                type             = "forward"
                target_group_arn = aws_lb_target_group.app.arn
              }
            }

            # HTTP listener redirecting to HTTPS
            resource "aws_lb_listener" "http" {
              load_balancer_arn = aws_lb.secure_alb.arn
              port              = "80"
              protocol          = "HTTP"

              default_action {
                type = "redirect"

                redirect {
                  port        = "443"
                  protocol    = "HTTPS"
                  status_code = "HTTP_301"
                }
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure Application Load Balancers are configured with HTTPS listeners in CloudFormation:

            ```yaml
            Resources:
              SecureLoadBalancer:
                Type: "AWS::ElasticLoadBalancingV2::LoadBalancer"
                Properties:
                  Name: "secure-alb"
                  Scheme: "internet-facing"
                  Type: "application"
                  SecurityGroups:
                    - !Ref LoadBalancerSecurityGroup
                  Subnets:
                    - !Ref PublicSubnetA
                    - !Ref PublicSubnetB

              # HTTPS Listener
              HttpsListener:
                Type: "AWS::ElasticLoadBalancingV2::Listener"
                Properties:
                  LoadBalancerArn: !Ref SecureLoadBalancer
                  Port: 443
                  Protocol: "HTTPS"
                  SslPolicy: "ELBSecurityPolicy-TLS13-1-2-2021-06"
                  Certificates:
                    - CertificateArn: !Ref SSLCertificate
                  DefaultActions:
                    - Type: "forward"
                      TargetGroupArn: !Ref DefaultTargetGroup

              # HTTP Listener with redirect to HTTPS
              HttpListener:
                Type: "AWS::ElasticLoadBalancingV2::Listener"
                Properties:
                  LoadBalancerArn: !Ref SecureLoadBalancer
                  Port: 80
                  Protocol: "HTTP"
                  DefaultActions:
                    - Type: "redirect"
                      RedirectConfig:
                        Protocol: "HTTPS"
                        Port: "443"
                        StatusCode: "HTTP_301"
            ```
