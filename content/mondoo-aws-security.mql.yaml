        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-documentdb-cluster-log-export-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-documentdb-cluster-log-export-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-documentdb-cluster-log-export-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-documentdb-cluster-log-export-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon DocumentDB clusters have audit log export to CloudWatch Logs enabled. Exporting audit logs to CloudWatch enables centralized monitoring, analysis, and alerting on DocumentDB operations.

        **Why this matters**

        Without audit log export, database activity monitoring is limited:

        - **Limited visibility:** Audit logs track data definition language (DDL), authentication, authorization, and data manipulation language (DML) events.
        - **Incident response:** Centralized logs are critical for investigating security incidents and unauthorized access attempts.
        - **Compliance:** Regulatory frameworks such as PCI DSS, HIPAA, and SOC 2 require audit logging for database services.

        **Risk mitigation**

        - **Monitoring:** Enables real-time monitoring of database operations through CloudWatch.
        - **Forensics:** Provides detailed audit trails for security investigations.
        - **Alerting:** Enables automated alerting on suspicious database activities through CloudWatch alarms.
      remediation:
        - id: console
          desc: |
            To ensure DocumentDB clusters have audit log export enabled using the AWS Console:

            1. Navigate to the **Amazon DocumentDB Console**.
            2. Select **Clusters** in the left panel.
            3. Select the DocumentDB cluster to configure.
            4. Choose **Modify**.
            5. Under **Log exports**, enable **Audit logs**.
            6. Ensure the cluster parameter group has `audit_logs` set to `enabled`.
            7. Choose **Apply immediately** or during the next maintenance window.
            8. Save the changes.
        - id: cli
          desc: |
            To ensure DocumentDB clusters have audit log export enabled using the AWS CLI, enable audit log export for a DocumentDB cluster:

            ```bash
            aws docdb modify-db-cluster \
              --db-cluster-identifier <cluster-id> \
              --cloudwatch-logs-export-configuration '{"EnableLogTypes":["audit"]}' \
              --apply-immediately
            ```

            Ensure the cluster parameter group enables auditing:

            ```bash
            aws docdb modify-db-cluster-parameter-group \
              --db-cluster-parameter-group-name <parameter-group-name> \
              --parameters "ParameterName=audit_logs,ParameterValue=enabled,ApplyMethod=pending-reboot"
            ```

            Verify log export configuration:

            ```bash
            aws docdb describe-db-clusters \
              --db-cluster-identifier <cluster-id> \
              --query "DBClusters[*].{ClusterId:DBClusterIdentifier,LogExports:EnabledCloudwatchLogsExports}"
            ```
        - id: terraform
          desc: |
            To ensure DocumentDB clusters have audit log export enabled in Terraform, configure a DocumentDB cluster with audit log export:

            ```hcl
            resource "aws_docdb_cluster" "example" {
              cluster_identifier              = "example-docdb"
              engine                          = "docdb"
              master_username                 = "admin"
              master_password                 = "changeme"
              enabled_cloudwatch_logs_exports = ["audit"]
            }
            ```
        - id: cloudformation
          desc: |
            To ensure DocumentDB clusters have audit log export enabled in CloudFormation, configure a DocumentDB cluster with audit log export:

            ```yaml
            Resources:
              MyDocDBCluster:
                Type: AWS::DocDB::DBCluster
                Properties:
                  DBClusterIdentifier: example-docdb
                  MasterUsername: admin
                  MasterUserPassword: changeme
                  EnableCloudwatchLogsExports:
                    - audit
            ```
    refs:
      - url: https://docs.aws.amazon.com/documentdb/latest/developerguide/event-auditing.html
        title: AWS Documentation - Auditing Amazon DocumentDB events
