  - uid: mondoo-aws-security-dynamodb-pitr-enabled-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::DynamoDB::Table")
    mql: |
      cloudformation.template.resources.where(type == "AWS::DynamoDB::Table").all(
      properties['PointInTimeRecoverySpecification'] != empty && properties['PointInTimeRecoverySpecification']['PointInTimeRecoveryEnabled'] == true
      )
  - uid: mondoo-aws-security-cloudwatch-unauthorized-api-alarm
    title: Ensure log metric filter exists for unauthorized API calls
    impact: 30
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-05
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-ae-3
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-4-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    variants:
      - uid: mondoo-aws-security-cloudwatch-unauthorized-api-alarm-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-cloudwatch-unauthorized-api-alarm-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-cloudwatch-unauthorized-api-alarm-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-cloudwatch-unauthorized-api-alarm-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-cloudwatch-unauthorized-api-alarm-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that a CloudWatch log metric filter and alarm are configured to detect unauthorized API calls across your AWS environment. By default, CloudWatch does not ship alerting for access-denied events; creating this filter and alarm surfaces patterns such as `AccessDenied` and `UnauthorizedAccess` errors in near real time.

        **Why this matters**

        - **Early breach detection:** Repeated authorization failures are a leading indicator that an attacker is probing your environment or that a compromised credential is being used.
        - **Reduced dwell time:** Prompt notification lets security teams investigate and revoke access before significant damage occurs.
        - **Continuous visibility:** Metric filters turn raw CloudTrail log data into actionable signals without requiring manual log reviews.
        - **IAM misconfiguration discovery:** Surges in access-denied calls often reveal overly restrictive or incorrectly attached IAM policies that need correction.

        **Risk mitigation**

        - **Attacker probing:** Alerting on authorization failures limits the window attackers have to quietly map permission boundaries before being detected.
        - **Credential compromise:** Real-time alarms enable rapid revocation of compromised credentials before they are leveraged for privilege escalation.
        - **Audit evidence:** A documented alarm configuration demonstrates active monitoring to auditors and incident response teams.
      audit: |
        ### Audit via Console

        1. Open the **Amazon CloudWatch Console** and navigate to **Logs** > **Log groups**.
        2. Select the log group associated with your CloudTrail trail.
        3. Choose **Metric filters** and look for a filter whose pattern contains `AccessDenied` or `UnauthorizedAccess`.
        4. Navigate to **Alarms** > **All alarms** and verify that an alarm is configured for the corresponding metric.

        A passing account has at least one metric filter matching unauthorized API call patterns with a corresponding alarm. A failing account has no such metric filter or has the filter but no associated alarm.

        ### Audit via CLI

        1. Check all CloudWatch Logs metric filters for patterns matching unauthorized API calls:

        ```bash
        aws logs describe-metric-filters \
          --query "metricFilters[?contains(filterPattern, 'AccessDenied') || contains(filterPattern, 'UnauthorizedAccess')]"
        ```

        2. Verify that an alarm exists for the matching metric:

        ```bash
        aws cloudwatch describe-alarms \
          --query "MetricAlarms[*].{Name:AlarmName,Metric:MetricName,Namespace:Namespace}" \
          --output table
        ```

        A passing account returns at least one metric filter entry containing `AccessDenied` or `UnauthorizedAccess` in the `filterPattern`, and a corresponding alarm for that metric. A failing account returns an empty list for the filter query or no alarm for the matching metric.
      remediation:
        - id: console
          desc: |
            To ensure log metric filter exists for unauthorized API calls using the AWS Console:

            1. Navigate to **CloudWatch** and select **Log groups**.
            2. Select the log group associated with your CloudTrail trail.
            3. Choose **Actions** > **Create metric filter**.
            4. Enter a filter pattern that includes `UnauthorizedAccess` or `AccessDenied`.
            5. Assign a metric name and namespace, then choose **Create metric filter**.
            6. Navigate to **Alarms** > **Create alarm**, select the new metric, and configure SNS notification.
        - id: cli
          desc: |
            To ensure log metric filter exists for unauthorized API calls using the AWS CLI, create the metric filter:

            ```bash
            aws logs put-metric-filter \
              --log-group-name <cloudtrail-log-group> \
              --filter-name UnauthorizedAPICalls \
              --filter-pattern '{ ($.errorCode = "AccessDenied") || ($.errorCode = "UnauthorizedAccess") }' \
              --metric-transformations metricName=UnauthorizedAPICalls,metricNamespace=CISBenchmark,metricValue=1
            ```

            Create the alarm:

            ```bash
            aws cloudwatch put-metric-alarm \
              --alarm-name UnauthorizedAPICalls \
              --metric-name UnauthorizedAPICalls \
              --namespace CISBenchmark \
              --statistic Sum \
              --period 300 \
              --threshold 1 \
              --comparison-operator GreaterThanOrEqualToThreshold \
              --evaluation-periods 1 \
              --alarm-actions <sns-topic-arn>
            ```
        - id: terraform
          desc: |
            To ensure log metric filter exists for unauthorized API calls in Terraform, create a CloudWatch log metric filter and alarm for unauthorized API calls:

            ```hcl
            resource "aws_cloudwatch_log_metric_filter" "unauthorizedapicalls" {
              name           = "UnauthorizedAPICalls"
              log_group_name = aws_cloudwatch_log_group.cloudtrail.name
              pattern        = "{ ($.errorCode = \"AccessDenied\") || ($.errorCode = \"UnauthorizedAccess\") }"

              metric_transformation {
                name      = "UnauthorizedAPICalls"
                namespace = "CISBenchmark"
                value     = "1"
              }
            }

            resource "aws_cloudwatch_metric_alarm" "unauthorizedapicalls" {
              alarm_name          = "UnauthorizedAPICalls"
              metric_name         = "UnauthorizedAPICalls"
              namespace           = "CISBenchmark"
              statistic           = "Sum"
              period              = 300
              threshold           = 1
              comparison_operator = "GreaterThanOrEqualToThreshold"
              evaluation_periods  = 1
              alarm_actions       = [aws_sns_topic.alerts.arn]
            }
            ```
        - id: cloudformation
          desc: |
            To ensure log metric filter exists for unauthorized API calls in CloudFormation, create a CloudWatch log metric filter and alarm for unauthorized API calls:

            ```yaml
            Resources:
              UnauthorizedAPICallsFilter:
                Type: AWS::Logs::MetricFilter
                Properties:
                  LogGroupName: !Ref CloudTrailLogGroup
                  FilterPattern: "{ ($.errorCode = \"AccessDenied\") || ($.errorCode = \"UnauthorizedAccess\") }"
                  MetricTransformations:
                    - MetricName: UnauthorizedAPICalls
                      MetricNamespace: CISBenchmark
                      MetricValue: "1"

              UnauthorizedAPICallsAlarm:
                Type: AWS::CloudWatch::Alarm
                Properties:
                  AlarmName: UnauthorizedAPICalls
                  MetricName: UnauthorizedAPICalls
                  Namespace: CISBenchmark
                  Statistic: Sum
                  Period: 300
                  Threshold: 1
                  ComparisonOperator: GreaterThanOrEqualToThreshold
                  EvaluationPeriods: 1
                  AlarmActions:
                    - !Ref AlertsSNSTopic
            ```
    refs:
      - url: https://docs.aws.amazon.com/AmazonCloudWatch/latest/monitoring/CloudWatch_Alarms.html
        title: Amazon CloudWatch Alarms
  - uid: mondoo-aws-security-cloudwatch-unauthorized-api-alarm-aws
    filters: asset.platform == "aws"
    mql: |
      aws.cloudwatch.logGroups.any(
        metricsFilters.any(
          filterPattern.contains("AccessDenied") || filterPattern.contains("UnauthorizedAccess")
        )
      )
  - uid: mondoo-aws-security-cloudwatch-unauthorized-api-alarm-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_cloudwatch_log_metric_filter")
    mql: |
      terraform.resources.where(nameLabel == "aws_cloudwatch_log_metric_filter").any(
      arguments.pattern.contains("UnauthorizedOperation") || arguments.pattern.contains("AccessDenied")
      )
  - uid: mondoo-aws-security-cloudwatch-unauthorized-api-alarm-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_cloudwatch_log_metric_filter")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_cloudwatch_log_metric_filter").any(
      change.after.pattern.contains("UnauthorizedOperation") || change.after.pattern.contains("AccessDenied")
      )
  - uid: mondoo-aws-security-cloudwatch-unauthorized-api-alarm-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_cloudwatch_log_metric_filter")
    mql: |
      terraform.state.resources.where(type == "aws_cloudwatch_log_metric_filter").any(
      values.pattern.contains("UnauthorizedOperation") || values.pattern.contains("AccessDenied")
      )
  - uid: mondoo-aws-security-cloudwatch-unauthorized-api-alarm-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::Logs::MetricFilter")
    mql: |
      cloudformation.template.resources.where(type == "AWS::Logs::MetricFilter").any(
