        values.metadata_options != empty && values.metadata_options[0].http_tokens == "required"
      )
  - uid: mondoo-aws-security-ec2-imdsv2-check-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::EC2::Instance")
    mql: |
      cloudformation.template.resources.where(type == "AWS::EC2::Instance").all(
      properties['MetadataOptions'] == empty || properties['MetadataOptions']['HttpTokens'] == "required"
      )
  - uid: mondoo-aws-security-vpc-bpa-enabled
    title: Ensure VPC Block Public Access (BPA) is enabled
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-aws-security-vpc-bpa-enabled-aws
        tags:
          mondoo.com/filter-title: AWS EC2 VPC
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-vpc-bpa-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-vpc-bpa-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-vpc-bpa-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that VPC Block Public Access is enabled at the AWS account level, preventing the creation or activation of internet gateways and public routes that would expose VPC resources directly to the internet. By default, VPC BPA is disabled and any user with sufficient permissions can attach an internet gateway or add a public route to any VPC, potentially exposing workloads that were designed to be private.

        **Why this matters**

        - **Centralized internet access governance:** VPC BPA is an account-level guardrail that prevents any VPC from gaining internet connectivity without an explicit exclusion, complementing subnet-level and security group controls.
        - **Misconfiguration prevention:** Even with correct security group rules and NACLs, attaching an internet gateway and adding a route with `0.0.0.0/0` is sufficient to expose resources; BPA prevents this class of misconfiguration entirely.
        - **Rapid development guardrails:** In environments where developers have broad VPC permissions, BPA prevents accidental internet exposure during infrastructure experimentation or incident response activities.

        **Risk mitigation**

        - **Internet gateway attachment blocking:** With BPA in bidirectional block mode, no new internet gateway can be made active in any VPC, eliminating the most direct path to unintentional public exposure of private workloads.
        - **Public route prevention:** BPA prevents the addition of public routes to route tables, ensuring that even if an internet gateway exists in a detached state, it cannot be activated without removing the BPA setting.
        - **Blast radius containment:** If an operator account is compromised, BPA prevents the attacker from exposing internal resources to the internet by modifying VPC routing, limiting the attacker's ability to exfiltrate data through newly created public paths.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and open the VPC console.
        2. In the left navigation pane, select **Settings** (under Virtual Private Cloud), then choose **Block public access settings**.
        3. Under **Internet gateway block mode**, check the current setting.

        A passing account shows a mode of **Block bidirectional** or **Block ingress** (anything other than **Off**). A failing account shows **Off**.

        ### Audit via CLI

        1. Run the following command to retrieve the VPC Block Public Access setting for the current region:

        ```bash
        aws ec2 describe-vpc-block-public-access-options \
          --query "VpcBlockPublicAccessOptions.{State:State,InternetGatewayBlockMode:InternetGatewayBlockMode}" \
          --output table
        ```

        A passing account returns an `InternetGatewayBlockMode` value of `block-bidirectional` or `block-ingress`. A failing account returns `off`.

      remediation:
        - id: console
          desc: |
            To ensure VPC Block Public Access (BPA) is enabled using the AWS Console:

            1. Navigate to the AWS VPC Console.
            2. Select Your VPCs from the left panel.
            3. Select the target VPC.
            4. Under Actions, select Edit VPC settings.
            5. In the Block Public Access settings section, select Enable block public access.
            6. Configure appropriate exclusions for resources that need public access, if needed.
            7. Select Save changes to apply the settings.
        - id: cli
          desc: |
            To ensure VPC Block Public Access (BPA) is enabled using the AWS CLI, enable VPC Block Public Access for a specific VPC:

            ```bash
            aws ec2 modify-vpc-block-public-access-options \
              --internet-gateway-block-mode block-bidirectional
            ```

            Create an exclusion for specific resources (if necessary):

            ```bash
            aws ec2 create-vpc-block-public-access-exclusion \
              --vpc-id vpc-12345678 \
              --internet-gateway-exclusion-mode allow-egress \
              --subnet-id subnet-12345678
            ```

            Verify the status of VPC BPA:

            ```bash
            aws ec2 describe-vpc-block-public-access-options
            ```
        - id: terraform
          desc: |
            To ensure VPC Block Public Access (BPA) is enabled in Terraform:

            ```hcl
            resource "aws_vpc" "main" {
              cidr_block = "10.0.0.0/16"
              tags = {
                Name = "main-vpc"
              }
            }

            resource "aws_vpc_block_public_access_options" "example" {
              internet_gateway_block_mode = "block-bidirectional"
            }

            # Optional: If you need exclusions for specific resources
            resource "aws_vpc_block_public_access_exclusion" "example" {
              vpc_id                         = aws_vpc.main.id
              subnet_id                      = aws_subnet.public.id
              internet_gateway_exclusion_mode = "allow-egress"
            }
            ```
        - id: cloudformation
          desc: |
            To ensure VPC Block Public Access (BPA) is enabled in CloudFormation, note that CloudFormation does not support managing VPC Block Public Access. There are no `AWS::EC2::VPCBlockPublicAccess` or `AWS::EC2::VPCBlockPublicAccessExclusion` resource types.

            Use the AWS CLI to enable VPC Block Public Access:

            ```bash
            aws ec2 modify-vpc-block-public-access-options \
              --internet-gateway-block-mode block-bidirectional
            ```
    refs:
      - url: https://docs.aws.amazon.com/vpc/latest/userguide/vpc-security-best-practices.html
        title: Amazon VPC Security Best Practices
  - uid: mondoo-aws-security-vpc-bpa-enabled-aws
    filters: asset.platform == "aws-vpc"
    mql: aws.vpc.internetGatewayBlockMode != "off"
  - uid: mondoo-aws-security-vpc-bpa-enabled-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains( nameLabel == "aws_vpc_block_public_access_options")
    mql: |
      terraform.resources.where( nameLabel == "aws_vpc_block_public_access_options" ).all(
        arguments.internet_gateway_block_mode != "off"
      )
  - uid: mondoo-aws-security-vpc-bpa-enabled-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains( type == "aws_vpc_block_public_access_options")
    mql: |
      terraform.plan.resourceChanges.where( type == "aws_vpc_block_public_access_options" ).all(
        change.after.internet_gateway_block_mode != "off"
      )
  - uid: mondoo-aws-security-vpc-bpa-enabled-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains( type == "aws_vpc_block_public_access_options")
    mql: |
      terraform.state.resources.where( type == "aws_vpc_block_public_access_options" ).all(
        values.internet_gateway_block_mode != "off"
      )
  - uid: mondoo-aws-security-vpc-flow-logs-enabled
    title: Ensure VPC flow logging is enabled in all VPCs
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    variants:
      - uid: mondoo-aws-security-vpc-flow-logs-enabled-aws
        tags:
          mondoo.com/filter-title: AWS EC2 VPC
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-vpc-flow-logs-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-vpc-flow-logs-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-vpc-flow-logs-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-vpc-flow-logs-enabled-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon VPC flow logs are enabled for all VPCs and configured to deliver active traffic metadata to a log destination. By default, VPCs do not have flow logging enabled, meaning all network traffic passes through without being recorded.

        **Why this matters**

        - **Threat detection:** Active flow log delivery to CloudWatch Logs captures connection attempts, port scans, and unexpected traffic patterns that signal unauthorized access or data exfiltration.
        - **Incident investigation:** Without a traffic record, security teams cannot reconstruct what happened after a breach or determine which resources were reached.
        - **Compliance evidence:** Continuous network traffic logging is a prerequisite for audit controls in many security frameworks that require demonstrable monitoring of ingress and egress activity.
        - **Anomaly baselining:** Long-term flow log data lets teams establish normal traffic patterns and alert on deviations before they escalate into incidents.

        **Risk mitigation**

        - **Network visibility:** Captures metadata for all accepted and rejected connections across every VPC, giving defenders a complete view of lateral movement and external contact.
        - **Early warning:** REJECT-type flow log entries surface reconnaissance and brute-force attempts against private resources before attackers succeed.
        - **Forensic record:** Retained flow logs provide a durable audit trail that supports post-incident analysis and regulatory inquiries.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and open the VPC console.
        2. In the left navigation pane, select **Your VPCs**.
        3. For each VPC, select its name and open the **Flow logs** tab.
        4. Verify that at least one flow log exists with a status of **Active** and a traffic type of **All** or **Reject**, and that the log destination is CloudWatch Logs.

        A passing VPC shows an active flow log delivering to CloudWatch Logs with traffic type ALL or REJECT. A failing VPC shows no flow logs, an inactive flow log, or a flow log that captures only ACCEPT traffic.

        ### Audit via CLI

        1. Run the following command to list all flow logs and their configuration:

        ```bash
        aws ec2 describe-flow-logs \
          --query "FlowLogs[*].{ResourceId:ResourceId,Status:FlowLogStatus,TrafficType:TrafficType,Destination:LogDestination,DestinationType:LogDestinationType,DeliverStatus:DeliverLogsStatus}" \
          --output table
        ```

        A passing VPC has a flow log entry where `FlowLogStatus` is `ACTIVE`, `LogDestinationType` is `cloud-watch-logs`, `DeliverLogsStatus` is `SUCCESS`, and `TrafficType` is `ALL` or `REJECT`. A failing VPC has no matching entry or the entry shows `FlowLogStatus` other than `ACTIVE`.

      remediation:
        - id: console
          desc: |
            To ensure VPC flow logging is enabled in all VPCs using the AWS Console:

            1.  Navigate to the AWS VPC Console.
            2.  Select Your VPCs from the left panel.
            3.  For each VPC:
              - Select the VPC name.
              - Go to the Flow Logs tab.
              - Select Create Flow Log and configure:
              - Filter: Choose All Traffic to capture both accepted and rejected packets.
              - Destination: Select Amazon CloudWatch Logs or Amazon S3.
              - IAM Role: Ensure an IAM role with appropriate permissions is used.
              - Log Format: Use default or a custom log format if required.
              - Select Create to enable flow logging.
        - id: cli
          desc: |
            To ensure VPC flow logging is enabled in all VPCs using the AWS CLI, check if VPC Flow Logs are enabled for all VPCs:

            ```bash
            aws ec2 describe-flow-logs --query "FlowLogs[*].{VPC:ResourceId,LogGroup:LogGroupName}"
            ```

            If a VPC does not have flow logs enabled, create one:

            ```bash
            aws ec2 create-flow-logs \
            --resource-type VPC \
            --resource-ids <vpc-id> \
            --traffic-type ALL \
            --log-destination-type cloud-watch-logs \
            --log-group-name vpc-flow-logs \
            --deliver-logs-permission-arn arn:aws:iam::<account-id>:role/vpc-flow-logs-role
            ```
        - id: terraform
          desc: |
            To ensure VPC flow logging is enabled in all VPCs in Terraform, ensure that VPC Flow Logs are enabled in Terraform:

            ```hcl
            resource "aws_flow_log" "vpc_flow_log" {
              vpc_id          = aws_vpc.main.id
              traffic_type    = "ALL"
              log_destination = aws_cloudwatch_log_group.vpc_logs.arn
            }

            resource "aws_cloudwatch_log_group" "vpc_logs" {
              name = "vpc-flow-logs"
            }
            ```
        - id: cloudformation
          desc: |
            To ensure VPC flow logging is enabled in all VPCs in CloudFormation, enable VPC Flow Logs in CloudFormation:

            ```yaml
            Resources:
              VPCFlowLog:
                Type: "AWS::EC2::FlowLog"
                Properties:
                  ResourceType: "VPC"
                  ResourceId: !Ref MyVPC
                  TrafficType: "ALL"
                  LogDestinationType: "cloud-watch-logs"
                  LogGroupName: "/aws/vpc/flow-logs"
                  DeliverLogsPermissionArn: !Sub "arn:aws:iam::${AWS::AccountId}:role/vpc-flow-logs-role"
              MyVPC:
                Type: "AWS::EC2::VPC"
                Properties:
                  CidrBlock: "10.0.0.0/16"
            ```
    refs:
      - url: https://docs.aws.amazon.com/securityhub/latest/userguide/securityhub-controls-reference.html
        title: AWS Documentation - Security Hub controls reference
      - url: https://awscli.amazonaws.com/v2/documentation/api/latest/reference/logs/index.html
        title: AWS Documentation - AWS CLI Command Reference - logs
      - url: https://awscli.amazonaws.com/v2/documentation/api/latest/reference/ec2/index.html
        title: AWS Documentation - AWS CLI Command Reference - ec2
      - url: https://registry.terraform.io/providers/cloudposse/awsutils/latest/docs
        title: Terraform registry - Cloud Posse AWS Utils Provider
      - url: https://registry.terraform.io/providers/hashicorp/aws/latest/docs
        title: Terraform Documentation - AWS Provider
  - uid: mondoo-aws-security-vpc-flow-logs-enabled-aws
    filters: asset.platform == "aws-vpc"
    mql: |
      aws.vpc.flowLogs.any(
        status == "ACTIVE" &&
        destination != empty &&
        destinationType == "cloud-watch-logs" &&
        deliverLogsStatus == "SUCCESS" &&
        trafficType.in(["REJECT", "ALL"])
      )
  - uid: mondoo-aws-security-vpc-flow-logs-enabled-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_flow_log")
    mql: |
      terraform.resources.where(nameLabel == "aws_flow_log").all(
        arguments.traffic_type.in(["ALL", "REJECT"])
      )
  - uid: mondoo-aws-security-vpc-flow-logs-enabled-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_flow_log")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_flow_log").all(
        change.after.traffic_type.in(["ALL", "REJECT"])
      )
  - uid: mondoo-aws-security-vpc-flow-logs-enabled-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_flow_log")
    mql: |
      terraform.state.resources.where(type == "aws_flow_log").all(
        values.traffic_type.in(["ALL", "REJECT"])
      )
  - uid: mondoo-aws-security-vpc-flow-logs-enabled-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::EC2::FlowLog")
    mql: |
      cloudformation.template.resources.where(type == "AWS::EC2::FlowLog").all(
      properties['TrafficType'].in(["ALL", "REJECT"]) &&
      properties['LogDestinationType'] == "cloud-watch-logs"
      )
  - uid: mondoo-aws-security-dynamodb-table-encrypted-kms
    title: Ensure DynamoDB tables are encrypted with AWS Key Management Service (KMS)
    impact: 30
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-aws-security-dynamodb-table-encrypted-kms-aws
        tags:
          mondoo.com/filter-title: AWS DynamoDB Table
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-dynamodb-table-encrypted-kms-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-dynamodb-table-encrypted-kms-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-dynamodb-table-encrypted-kms-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-dynamodb-table-encrypted-kms-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon DynamoDB tables are encrypted using a customer-managed AWS KMS key rather than the default AWS-owned key. By default, DynamoDB encrypts tables at rest using an AWS-owned key, which provides basic protection but does not give the account owner control over key lifecycle, access policy, or audit visibility.

        **Why this matters**

        - **Key ownership:** Customer-managed KMS keys (CMKs) allow the account owner to define, rotate, and revoke key access independently of AWS, enabling true control over who can decrypt table data.
        - **Access auditability:** Every API call that uses a CMK is logged to AWS CloudTrail, creating an auditable record of who accessed DynamoDB data and when.
        - **Separation of duties:** IAM key policies can restrict decryption to specific roles or services, preventing broad access even from accounts with full DynamoDB permissions.
        - **Regulatory alignment:** Many compliance frameworks require that encryption keys for sensitive data stores be customer-controlled and rotatable on a defined schedule.

        **Risk mitigation**

        - **Key revocation:** If a principal is compromised, the CMK can be disabled or its policy updated to immediately deny decryption without deleting the table.
        - **Blast radius containment:** Scoping CMK access to specific IAM roles limits the number of identities that can read plaintext table data even if another AWS service in the account is compromised.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and open the DynamoDB console.
        2. In the left navigation pane, select **Tables**.
        3. Select a table and open the **Additional settings** tab (or **Table details**).
        4. Under **Encryption**, review the **Encryption type** and **KMS key** fields.

        A passing table shows an **Encryption type** of **AWS managed key** using a customer-managed KMS key, or shows a customer-managed key ARN under the KMS key field (SSEType of KMS). A failing table shows **Owned by Amazon DynamoDB** (AWS-owned key) as the encryption type.

        ### Audit via CLI

        1. List all DynamoDB tables and retrieve their SSE configuration:

        ```bash
        aws dynamodb list-tables --query "TableNames" --output text | tr '\t' '\n' | \
          xargs -I{} aws dynamodb describe-table --table-name {} \
            --query "Table.{TableName:TableName,SSEType:SSEDescription.SSEType,KMSKeyArn:SSEDescription.KMSMasterKeyArn}"
        ```

        Alternatively, check a specific table:

        ```bash
        aws dynamodb describe-table \
          --table-name <table-name> \
          --query "Table.SSEDescription"
        ```

        A passing table returns `"SSEType": "KMS"` with a non-empty `KMSMasterKeyArn`. A failing table returns `"SSEType": "AES256"` or an empty `SSEDescription`.

      remediation:
        - id: console
          desc: |
            To ensure DynamoDB tables are encrypted with AWS Key Management Service (KMS) using the AWS Console:

            1.  Navigate to the AWS DynamoDB Console.
            2.  Select Tables from the left panel.
            3.  Select a table name and navigate to the Encryption section under Table Details.
            4.  Verify the KMS key type:
              - If it is AWS-owned key, change it to a Customer-managed KMS key (CMK).
              - Note that this requires creating a new table and migrating data, as encryption settings cannot be modified after table creation.
            5.  Create a new table with KMS encryption:
              - Select Create Table.
              - Under Encryption at rest, select AWS KMS and choose a Customer-Managed Key (CMK).
              - Migrate data from the old table and delete the unencrypted table.
        - id: cli
          desc: |
            To ensure DynamoDB tables are encrypted with AWS Key Management Service (KMS) using the AWS CLI, check if a DynamoDB table is encrypted with AWS KMS CMKs:

            ```bash
            aws dynamodb describe-table --table-name <table-name> --query "Table.SSEDescription"
            ```

            If KMSMasterKeyArn is missing or the SSEType is not "KMS", you need to create a new encrypted table and migrate data:

            ```bash
            aws dynamodb create-table \
            --table-name <new-table-name> \
            --attribute-definitions AttributeName=Id,AttributeType=S \
            --key-schema AttributeName=Id,KeyType=HASH \
            --billing-mode PAY_PER_REQUEST \
            --sse-specification Enabled=true,SSEType=KMS,KMSMasterKeyId="arn:aws:kms:region:account-id:key/key-id"
            ```

            Migrate data from the old table and delete the unencrypted table:

            ```bash
            aws dynamodb delete-table --table-name <old-table-name>
            ```
        - id: terraform
          desc: |
            To ensure DynamoDB tables are encrypted with AWS Key Management Service (KMS) in Terraform, ensure DynamoDB tables use KMS CMKs for encryption:

            ```hcl
            resource "aws_kms_key" "dynamodb_encryption" {
              description = "KMS key for DynamoDB encryption"
            }

            resource "aws_dynamodb_table" "secure_dynamodb" {
              name           = "secure-table"
              billing_mode   = "PAY_PER_REQUEST"
              hash_key       = "id"

              attribute {
                name = "id"
                type = "S"
              }

              server_side_encryption {
                enabled     = true
                kms_key_arn = aws_kms_key.dynamodb_encryption.arn
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure DynamoDB tables are encrypted with AWS Key Management Service (KMS) in CloudFormation, enable KMS encryption for DynamoDB tables in CloudFormation:

            ```yaml
            Resources:
              SecureDynamoDBTable:
                Type: "AWS::DynamoDB::Table"
                Properties:
                  TableName: "secure-table"
                  BillingMode: "PAY_PER_REQUEST"
                  AttributeDefinitions:
                    - AttributeName: "Id"
                      AttributeType: "S"
                  KeySchema:
                    - AttributeName: "Id"
                      KeyType: "HASH"
                  SSESpecification:
                    SSEEnabled: true
                    SSEType: "KMS"
                    KMSMasterKeyId: !Ref DynamoDBKMSKey

              DynamoDBKMSKey:
                Type: "AWS::KMS::Key"
                Properties:
                  Description: "KMS key for DynamoDB encryption"
                  EnableKeyRotation: true
                  KeyPolicy:
                    Version: "2012-10-17"
                    Statement:
                      - Effect: "Allow"
                        Principal:
                          AWS: "*"
                        Action: "kms:*"
                        Resource: "*"
            ```
