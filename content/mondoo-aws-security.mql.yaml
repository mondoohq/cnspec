  - uid: mondoo-aws-security-s3-bucket-policy-no-public-principal
    title: Ensure S3 bucket policies do not grant access to anonymous principals
    impact: 100
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-1-1
    variants:
      - uid: mondoo-aws-security-s3-bucket-policy-no-public-principal-aws
        tags:
          mondoo.com/filter-title: AWS S3 Bucket
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-s3-bucket-policy-no-public-principal-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-s3-bucket-policy-no-public-principal-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-s3-bucket-policy-no-public-principal-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-s3-bucket-policy-no-public-principal-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that S3 bucket policies do not contain `Allow` statements with a wildcard `Principal` (`"*"` or `{"AWS": "*"}`). A bucket policy that allows access from any principal makes objects readable or writable by anyone on the internet, regardless of whether Block Public Access is enabled at the account level.

        **Why this matters**

        - Bucket policies are evaluated independently of Block Public Access settings; a misconfigured policy can still grant anonymous access if BPA is not enforced.
        - Public bucket policies have been the root cause of the largest known cloud data leaks (US Voter Records, Booz Allen, Accenture, Verizon).
        - Even buckets without PII can become a foothold: attackers can use writable public buckets to host malware, phishing pages, or pivot to other AWS services.
      remediation:
        - id: console
          desc: |
            1. Open the S3 console and select the bucket.
            2. Choose **Permissions** → **Bucket policy**.
            3. Remove any statement with `"Principal": "*"` or `"Principal": {"AWS": "*"}` and `"Effect": "Allow"`.
            4. If a wildcard principal is required (e.g., for a public website), pair it with a strict `Condition` such as `aws:SourceVpce` or `aws:SourceIp`.
        - id: cli
          desc: |
            ```bash
            aws s3api get-bucket-policy --bucket <bucket-name>
            aws s3api put-bucket-policy --bucket <bucket-name> --policy file://restricted-policy.json
            ```
        - id: terraform
          desc: |
            Build the bucket policy with `aws_iam_policy_document` so wildcard principals are scoped, then attach it via `aws_s3_bucket_policy`. Avoid embedding raw JSON with `Principal = "*"` and no condition:

            ```hcl
            data "aws_iam_policy_document" "bucket" {
              statement {
                sid     = "AllowAccountRead"
                effect  = "Allow"
                actions = ["s3:GetObject"]
                resources = ["${aws_s3_bucket.example.arn}/*"]

                principals {
                  type        = "AWS"
                  identifiers = ["arn:aws:iam::111122223333:root"]
                }
              }
            }

            resource "aws_s3_bucket_policy" "example" {
              bucket = aws_s3_bucket.example.id
              policy = data.aws_iam_policy_document.bucket.json
            }
            ```
        - id: cloudformation
          desc: |
            Scope every `Allow` statement in an `AWS::S3::BucketPolicy` to a specific account, role, or service principal — never `"*"` or `{"AWS": "*"}`. For CDN or static-asset distribution, prefer CloudFront with OAC over a public bucket policy:

            ```yaml
            Resources:
              BucketPolicy:
                Type: AWS::S3::BucketPolicy
                Properties:
                  Bucket: !Ref Bucket
                  PolicyDocument:
                    Version: "2012-10-17"
                    Statement:
                      - Sid: AllowAppRole
                        Effect: Allow
                        Principal:
                          AWS: arn:aws:iam::111122223333:role/AppRole
                        Action: s3:GetObject
                        Resource: !Sub "${Bucket.Arn}/*"
            ```
    refs:
      - url: https://docs.aws.amazon.com/AmazonS3/latest/userguide/access-policy-language-overview.html
        title: AWS Documentation - Bucket policy language overview
  - uid: mondoo-aws-security-s3-bucket-policy-no-public-principal-aws
    filters: asset.platform == "aws-s3-bucket"
    mql: |
      aws.s3.bucket.policy == null ||
      aws.s3.bucket.policy.statements.where(_['Effect'] == "Allow").none(
        _['Principal'] == "*" ||
        _['Principal']['AWS'] == "*" ||
        _['Principal']['AWS'] != null && _['Principal']['AWS'].contains("*")
      )
