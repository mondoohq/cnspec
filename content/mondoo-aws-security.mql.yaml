        change.after.kms_master_key_id != empty
      )
  - uid: mondoo-aws-security-sns-topic-encrypted-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_sns_topic")
    mql: |
      terraform.state.resources.where(type == "aws_sns_topic").all(
        values.kms_master_key_id != empty
      )
  - uid: mondoo-aws-security-sns-topic-encrypted-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::SNS::Topic")
    mql: |
      cloudformation.template.resources.where(type == "AWS::SNS::Topic").all(
      properties['KmsMasterKeyId'] != empty
      )
  - uid: mondoo-aws-security-sns-topic-signature-version
    title: Ensure SNS topics use signature version 2 for message verification
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-c-1-integrity
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ds-6
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-15
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-8-2
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-aws-security-sns-topic-signature-version-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-sns-topic-signature-version-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-sns-topic-signature-version-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-sns-topic-signature-version-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-sns-topic-signature-version-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon SNS topics are configured to use signature version 2 for message verification. Signature version 2 uses SHA-256 hashing, which is more secure than the older SHA-1 based signature version 1.

        **Why this matters**

        - Signature version 1 uses SHA-1, which has known collision vulnerabilities.
        - Signature version 2 uses SHA-256, providing stronger message integrity verification.
        - Upgrading to signature version 2 prevents potential message tampering attacks.

        **Risk mitigation**

        - **Message integrity:** SHA-256 provides stronger cryptographic guarantees for message verification.
        - **Security posture:** Eliminates reliance on the deprecated SHA-1 algorithm.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and navigate to the Amazon SNS service.
        2. In the left navigation pane, select **Topics**.
        3. Select a topic to inspect.
        4. In the **Details** section, locate the **Signature version** field.
        5. Verify that the value is **2**.
        6. Repeat for each topic in the account.

        A passing topic shows **Signature version: 2**. A failing topic shows **Signature version: 1** or no value.

        ### Audit via CLI

        1. Retrieve the signature version attribute for each topic:

        ```bash
        aws sns get-topic-attributes \
          --topic-arn <topic-arn> \
          --query 'Attributes.SignatureVersion'
        ```

        A passing topic returns `"2"`. A failing topic returns `"1"` or no value.

      remediation:
        - id: console
          desc: |
            To ensure SNS topics use signature version 2 for message verification using the AWS Console:

            1. Navigate to the Amazon SNS Console.
            2. Select the topic.
            3. Choose Edit.
            4. Set the Signature version to 2.
            5. Choose Save changes.
        - id: cli
          desc: |
            To ensure SNS topics use signature version 2 for message verification using the AWS CLI:

            ```bash
            aws sns set-topic-attributes \
              --topic-arn <topic-arn> \
              --attribute-name SignatureVersion \
              --attribute-value "2"
            ```
        - id: terraform
          desc: |
            To ensure SNS topics use signature version 2 for message verification in Terraform:

            ```hcl
            resource "aws_sns_topic" "example" {
              name              = "example-topic"
              signature_version = 2
            }
            ```
        - id: cloudformation
          desc: |
            To ensure SNS topics use signature version 2 for message verification in CloudFormation:

            ```yaml
            Resources:
              SNSTopic:
                Type: AWS::SNS::Topic
                Properties:
                  TopicName: example-topic
                  SignatureVersion: "2"
            ```
    refs:
      - url: https://docs.aws.amazon.com/sns/latest/dg/sns-verify-signature-of-message.html
        title: AWS Documentation - Verifying the signatures of Amazon SNS messages
  - uid: mondoo-aws-security-sns-topic-signature-version-aws
    filters: asset.platform == "aws"
    mql: aws.sns.topics.all(signatureVersion == "2")
  - uid: mondoo-aws-security-sns-topic-signature-version-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_sns_topic")
    mql: |
      terraform.resources.where(nameLabel == "aws_sns_topic").all(
        arguments.signature_version == "2"
      )
  - uid: mondoo-aws-security-sns-topic-signature-version-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_sns_topic")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_sns_topic").all(
        change.after.signature_version == "2"
      )
  - uid: mondoo-aws-security-sns-topic-signature-version-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_sns_topic")
    mql: |
      terraform.state.resources.where(type == "aws_sns_topic").all(
        values.signature_version == "2"
      )
  - uid: mondoo-aws-security-sns-topic-signature-version-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::SNS::Topic")
    mql: |
      cloudformation.template.resources.where(type == "AWS::SNS::Topic").all(
      properties['SignatureVersion'] == "2"
      )
  - uid: mondoo-aws-security-sqs-queue-encrypted
    title: Ensure SQS queues are encrypted
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-aws-security-sqs-queue-encrypted-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-sqs-queue-encrypted-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-sqs-queue-encrypted-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-sqs-queue-encrypted-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-sqs-queue-encrypted-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon SQS queues are encrypted using either SQS-managed server-side encryption (SSE-SQS) or AWS KMS keys (SSE-KMS).

        **Why this matters**

        - SQS queues may contain sensitive messages that should be protected at rest.
        - Without encryption, messages are stored in plaintext on the SQS service infrastructure.
        - AWS Security Hub control SQS.1 requires SQS queues to be encrypted at rest.
        - Compliance frameworks require encryption of data at rest.

        **Risk mitigation**

        - **Data protection:** Encrypts messages at rest in the queue.
        - **Compliance:** Meets PCI DSS, HIPAA, and SOC 2 requirements for data-at-rest encryption.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and navigate to the Amazon SQS service.
        2. Select a queue to inspect.
        3. Choose the **Details** tab and locate the **Encryption** section.
        4. Verify that **Server-side encryption** shows either **SSE-SQS** or **SSE-KMS** as enabled.
        5. Repeat for each queue in the account.

        A passing queue shows SSE-SQS or SSE-KMS enabled under the Encryption section. A failing queue shows encryption as **Disabled**.

        ### Audit via CLI

        1. Retrieve the encryption attributes for each queue:

        ```bash
        aws sqs get-queue-attributes \
          --queue-url <queue-url> \
          --attribute-names SqsManagedSseEnabled KmsMasterKeyId \
          --query 'Attributes'
        ```

        A passing queue returns `SqsManagedSseEnabled: "true"` or a non-empty `KmsMasterKeyId`. A failing queue returns `SqsManagedSseEnabled: "false"` and an empty or absent `KmsMasterKeyId`.

      remediation:
        - id: console
          desc: |
            To ensure SQS queues are encrypted using the AWS Console:

            1. Navigate to the Amazon SQS Console.
            2. Select the queue.
            3. Choose Edit.
            4. Under Encryption, select Server-side encryption and choose SSE-SQS or SSE-KMS.
            5. Choose Save.
        - id: cli
          desc: |
            To ensure SQS queues are encrypted using the AWS CLI, enable SQS-managed encryption:

            ```bash
            aws sqs set-queue-attributes \
              --queue-url <queue-url> \
              --attributes SqsManagedSseEnabled=true
            ```
        - id: terraform
          desc: |
            To ensure SQS queues are encrypted in Terraform:

            ```hcl
            resource "aws_sqs_queue" "example" {
              name                    = "example-queue"
              sqs_managed_sse_enabled = true
            }
            ```
        - id: cloudformation
          desc: |
            To ensure SQS queues are encrypted in CloudFormation:

            ```yaml
            Resources:
              SQSQueue:
                Type: AWS::SQS::Queue
                Properties:
                  QueueName: example-queue
                  SqsManagedSseEnabled: true
            ```
    refs:
      - url: https://docs.aws.amazon.com/AWSSimpleQueueService/latest/SQSDeveloperGuide/sqs-server-side-encryption.html
        title: AWS Documentation - Encryption at rest for Amazon SQS
  - uid: mondoo-aws-security-sqs-queue-encrypted-aws
    filters: asset.platform == "aws"
    mql: aws.sqs.queues.all(sqsManagedSseEnabled == true || kmsKey != empty)
  - uid: mondoo-aws-security-sqs-queue-encrypted-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_sqs_queue")
