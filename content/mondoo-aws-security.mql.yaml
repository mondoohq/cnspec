  - uid: mondoo-aws-security-ssm-maintenance-window-no-unassociated
    title: Ensure SSM maintenance windows do not allow unassociated targets
    impact: 70
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-2
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-5
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-1-1
    variants:
      - uid: mondoo-aws-security-ssm-maintenance-window-no-unassociated-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-ssm-maintenance-window-no-unassociated-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ssm-maintenance-window-no-unassociated-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ssm-maintenance-window-no-unassociated-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ssm-maintenance-window-no-unassociated-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that SSM maintenance windows do not allow unassociated targets. When `AllowUnassociatedTargets` is enabled, any managed instance in the account can be targeted by tasks registered with the maintenance window, even if it is not explicitly associated with the window.

        **Why this matters**

        - Maintenance window tasks may include privileged operations such as patching, running scripts, or modifying configurations. Allowing unassociated targets means these operations could execute on any instance in the account.
        - If a maintenance window task is compromised or misconfigured, the blast radius expands from a defined set of targets to every managed instance in the account.
        - Least-privilege principles require that automation only affects explicitly designated resources, not the entire fleet.

        **Risk mitigation**

        - **Blast radius reduction:** Limits the scope of maintenance window tasks to explicitly registered targets.
        - **Least-privilege enforcement:** Ensures that automated operations only affect intended resources.
        - **Change management:** Provides clear accountability for which resources are affected by scheduled maintenance.
      remediation:
        - id: console
          desc: |
            To disable unassociated targets on a maintenance window using the AWS Console:

            1. Navigate to **AWS Systems Manager** > **Maintenance Windows**.
            2. Select the maintenance window.
            3. Choose **Edit**.
            4. Uncheck **Allow unregistered targets**.
            5. Register the specific targets that should be included in the maintenance window.
            6. Save the changes.
        - id: cli
          desc: |
            To disable unassociated targets on a maintenance window using the AWS CLI:

            ```bash
            aws ssm update-maintenance-window \
              --window-id <window-id> --no-allow-unassociated-targets
            ```

            Then register specific targets:

            ```bash
            aws ssm register-target-with-maintenance-window \
              --window-id <window-id> --resource-type INSTANCE \
              --targets "Key=instanceids,Values=i-1234567890abcdef0"
            ```
        - id: terraform
          desc: |
            To disable unassociated targets on a maintenance window in Terraform:

            ```hcl
            resource "aws_ssm_maintenance_window" "example" {
              name                       = "example-window"
              schedule                   = "cron(0 2 ? * SUN *)"
              duration                   = 3
              cutoff                     = 1
              allow_unassociated_targets = false
            }

            resource "aws_ssm_maintenance_window_target" "example" {
              window_id     = aws_ssm_maintenance_window.example.id
              resource_type = "INSTANCE"

              targets {
                key    = "InstanceIds"
                values = ["i-1234567890abcdef0"]
              }
            }
            ```
        - id: cloudformation
          desc: |
            To disable unassociated targets on a maintenance window in CloudFormation:

            ```yaml
            Resources:
              MaintenanceWindow:
                Type: AWS::SSM::MaintenanceWindow
                Properties:
                  Name: example-window
                  Schedule: "cron(0 2 ? * SUN *)"
                  Duration: 3
                  Cutoff: 1
                  AllowUnassociatedTargets: false
            ```
    refs:
      - url: https://docs.aws.amazon.com/systems-manager/latest/userguide/sysman-maintenance-working.html
        title: AWS Documentation - Maintenance windows
  - uid: mondoo-aws-security-ssm-maintenance-window-no-unassociated-aws
    filters: asset.platform == "aws"
    mql: |
      aws.ssm.maintenanceWindows.all(
        allowUnassociatedTargets == false
      )
  - uid: mondoo-aws-security-ssm-maintenance-window-no-unassociated-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_ssm_maintenance_window")
    mql: |
      terraform.resources.where(nameLabel == "aws_ssm_maintenance_window").all(
        arguments.allow_unassociated_targets == false
      )
  - uid: mondoo-aws-security-ssm-maintenance-window-no-unassociated-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_ssm_maintenance_window")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_ssm_maintenance_window").all(
        change.after.allow_unassociated_targets == false
      )
  - uid: mondoo-aws-security-ssm-maintenance-window-no-unassociated-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_ssm_maintenance_window")
    mql: |
      terraform.state.resources.where(type == "aws_ssm_maintenance_window").all(
        values.allow_unassociated_targets == false
      )
  - uid: mondoo-aws-security-ssm-maintenance-window-no-unassociated-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::SSM::MaintenanceWindow")
    mql: |
      cloudformation.template.resources.where(type == "AWS::SSM::MaintenanceWindow").all(
        properties['AllowUnassociatedTargets'] == false
      )
  - uid: mondoo-aws-security-cloudwatch-log-destination-restrict-access
    title: Ensure CloudWatch log destinations restrict access
    impact: 80
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-1-1
    variants:
      - uid: mondoo-aws-security-cloudwatch-log-destination-restrict-access-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-cloudwatch-log-destination-restrict-access-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-cloudwatch-log-destination-restrict-access-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-cloudwatch-log-destination-restrict-access-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that CloudWatch Logs cross-account destinations do not have overly permissive access policies. A log destination with a wildcard (`*`) principal allows any AWS account to send log data to the destination, creating a risk of log injection, data pollution, and increased costs.

        **Why this matters**

        - An unrestricted log destination allows any AWS account to write log data to your destination. Attackers could inject misleading log entries to obscure real security events or trigger false alerts.
        - Injected log data could overwhelm downstream consumers (Kinesis streams, S3 buckets, Lambda functions), increasing costs and potentially causing denial of service for legitimate log processing.
        - Security investigations rely on log integrity. If untrusted accounts can write to your log destinations, the forensic value of those logs is compromised.
        - Log destinations often feed into SIEM systems, alerting pipelines, and compliance archives. Polluted data can trigger false positives or mask real incidents.

        **Risk mitigation**

        - **Log integrity:** Ensures only trusted accounts can write to log destinations, preserving the forensic value of log data.
        - **Cost control:** Prevents unauthorized accounts from generating unexpected log volume and associated storage or processing costs.
        - **Attack surface reduction:** Eliminates a vector for log injection attacks that could be used to mask malicious activity.
      remediation:
        - id: console
          desc: |
            To restrict CloudWatch log destination access using the AWS Console:

            1. Navigate to **CloudWatch** > **Logs** > **Destinations**.
            2. Select the destination with overly permissive access.
            3. Update the access policy to specify only the AWS account IDs that should be allowed to send logs.
            4. Remove any wildcard (`*`) principals from the policy.
        - id: cli
          desc: |
            To restrict CloudWatch log destination access using the AWS CLI, first check the current access policy:

            ```bash
            aws logs describe-destinations \
              --destination-name-prefix <destination-name>
            ```

            Update the access policy to restrict to specific accounts:

            ```bash
            aws logs put-destination-policy \
              --destination-name <destination-name> \
              --access-policy '{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Principal":{"AWS":"arn:aws:iam::123456789012:root"},"Action":"logs:PutSubscriptionFilter","Resource":"arn:aws:logs:us-east-1:999999999999:destination:my-destination"}]}'
            ```
        - id: terraform
          desc: |
            To restrict CloudWatch log destination access in Terraform, ensure the access policy specifies explicit account principals:

            ```hcl
            resource "aws_cloudwatch_log_destination_policy" "example" {
              destination_name = aws_cloudwatch_log_destination.example.name
              access_policy    = jsonencode({
                Version = "2012-10-17"
                Statement = [{
                  Effect    = "Allow"
                  Principal = { AWS = "arn:aws:iam::123456789012:root" }
                  Action    = "logs:PutSubscriptionFilter"
                  Resource  = aws_cloudwatch_log_destination.example.arn
                }]
              })
            }
            ```
    refs:
      - url: https://docs.aws.amazon.com/AmazonCloudWatch/latest/logs/CreateDestination.html
        title: AWS Documentation - CloudWatch Logs destinations
  - uid: mondoo-aws-security-cloudwatch-log-destination-restrict-access-aws
    filters: asset.platform == "aws"
    mql: |
      aws.cloudwatch.logDestinations.all(
        accessPolicy != "" &&
        accessPolicy.contains('"*"') == false
      )
  - uid: mondoo-aws-security-cloudwatch-log-destination-restrict-access-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_cloudwatch_log_destination_policy")
    mql: |
      terraform.resources.where(nameLabel == "aws_cloudwatch_log_destination_policy").all(
        arguments.access_policy.contains('"*"') == false
      )
  - uid: mondoo-aws-security-cloudwatch-log-destination-restrict-access-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_cloudwatch_log_destination_policy")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_cloudwatch_log_destination_policy").all(
        change.after.access_policy.contains('"*"') == false
      )
  - uid: mondoo-aws-security-cloudwatch-log-destination-restrict-access-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_cloudwatch_log_destination_policy")
    mql: |
      terraform.state.resources.where(type == "aws_cloudwatch_log_destination_policy").all(
        values.access_policy.contains('"*"') == false
      )
  # No Terraform variants: Allowed principals on a VPC endpoint service are managed through `aws_vpc_endpoint_service_allowed_principal` resources — one per principal — keyed by the service ID. Verifying that at least one principal exists and none equals `*` requires graph traversal across resources that the variant pattern does not express.
  - uid: mondoo-aws-security-vpc-endpoint-service-restrict-principals
    title: Ensure VPC endpoint services restrict allowed principals
    impact: 80
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-1-1
    variants:
      - uid: mondoo-aws-security-vpc-endpoint-service-restrict-principals-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
    docs:
      desc: |
        This check ensures that VPC endpoint service configurations have an explicit list of allowed principals. Without restricting allowed principals, any AWS account that discovers the endpoint service name can request a connection, even when acceptance is required. The allowed principals list acts as a first line of defense by limiting who can even initiate a connection request.

        **Why this matters**

        - Even with `AcceptanceRequired` enabled, an unrestricted endpoint service still receives connection requests from any AWS account. Without an allowed principals list, operators must manually identify and reject unauthorized requests, increasing the risk of accidental approval.
        - PrivateLink services typically expose sensitive internal APIs, databases, or microservices. Allowing unrestricted connection requests increases the attack surface by letting unknown accounts probe for available services.
        - An allowed principals list combined with acceptance required provides defense in depth: the principals list prevents unauthorized accounts from requesting connections, and acceptance required ensures approved accounts still go through a review step.

        **Risk mitigation**

        - **Access control enforcement:** Only explicitly authorized AWS principals can request connections to the endpoint service.
        - **Defense in depth:** Combines with `AcceptanceRequired` to provide two layers of access control for PrivateLink services.
        - **Operational overhead reduction:** Reduces the volume of unauthorized connection requests that operators must review and reject.
      remediation:
        - id: console
          desc: |
            To restrict allowed principals on a VPC endpoint service using the AWS Console:

            1. Navigate to the **VPC Console** and select **Endpoint services**.
            2. Select the endpoint service to update.
            3. Choose the **Allow principals** tab.
            4. Add the ARNs of the AWS principals (accounts, IAM users, or roles) that should be allowed to create connections.
        - id: cli
          desc: |
            To restrict allowed principals on a VPC endpoint service using the AWS CLI:

            ```bash
            aws ec2 modify-vpc-endpoint-service-permissions \
              --service-id <service-id> \
              --add-allowed-principals "arn:aws:iam::123456789012:root"
            ```

            Verify the configuration:

            ```bash
            aws ec2 describe-vpc-endpoint-service-permissions \
              --service-id <service-id>
            ```
        - id: terraform
          desc: |
            To restrict allowed principals on a VPC endpoint service in Terraform:

            ```hcl
            resource "aws_vpc_endpoint_service" "example" {
              acceptance_required        = true
              network_load_balancer_arns = [aws_lb.example.arn]
            }

            resource "aws_vpc_endpoint_service_allowed_principal" "example" {
              vpc_endpoint_service_id = aws_vpc_endpoint_service.example.id
              principal_arn           = "arn:aws:iam::123456789012:root"
            }
            ```
        - id: cloudformation
          desc: |
            To restrict allowed principals on a VPC endpoint service in CloudFormation:

            ```yaml
            Resources:
              EndpointService:
                Type: AWS::EC2::VPCEndpointService
                Properties:
                  AcceptanceRequired: true
                  NetworkLoadBalancerArns:
                    - !Ref ExampleNLB
              EndpointServicePermission:
                Type: AWS::EC2::VPCEndpointServicePermissions
                Properties:
                  ServiceId: !Ref EndpointService
                  AllowedPrincipals:
                    - "arn:aws:iam::123456789012:root"
            ```
    refs:
      - url: https://docs.aws.amazon.com/vpc/latest/privatelink/configure-endpoint-service.html
        title: AWS Documentation - VPC endpoint service permissions
  - uid: mondoo-aws-security-vpc-endpoint-service-restrict-principals-aws
    filters: asset.platform == "aws"
    mql: |
      aws.ec2.vpcEndpointServiceConfigurations.all(
        allowedPrincipals.length > 0 &&
        allowedPrincipals.none(_ == "*")
      )
  - uid: mondoo-aws-security-sfn-logging-enabled
    title: Ensure Step Functions state machines have logging enabled
    impact: 60
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-ae-3
      compliance/nist-csf-2: nist-csf-2-de-cm-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    variants:
      - uid: mondoo-aws-security-sfn-logging-enabled-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-sfn-logging-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-sfn-logging-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-sfn-logging-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-sfn-logging-enabled-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that AWS Step Functions state machines have logging enabled. Without logging, execution history and state transition events are not captured, making it difficult to detect failures, debug workflows, or investigate security incidents.

        **Why this matters**

        - Step Functions logging provides visibility into state machine executions, including input/output data and state transitions.
        - Without logging enabled, security teams cannot detect anomalous workflow patterns or investigate unauthorized executions.
        - Compliance frameworks including NIST SP 800-53 AU-6 and SOC 2 CC7.2 require logging of critical application workflows.

        **Risk mitigation**

        - **Operational visibility:** Logs capture execution details that are essential for debugging and performance analysis.
        - **Security monitoring:** Execution logs enable detection of unauthorized or anomalous workflow invocations.
        - **Compliance:** Satisfies audit logging requirements across multiple regulatory frameworks.
      remediation:
        - id: console
          desc: |
            To ensure Step Functions state machines have logging enabled using the AWS Console:

            1. Navigate to the **AWS Step Functions Console** and select **State machines**.
            2. Select the state machine you want to configure.
            3. Choose **Edit**.
            4. Under **Logging**, set the log level to **ALL**, **ERROR**, or **FATAL**.
            5. Select or create a CloudWatch Logs log group.
            6. Choose **Save**.
        - id: cli
          desc: |
            To ensure Step Functions state machines have logging enabled using the AWS CLI:

            ```bash
            aws stepfunctions update-state-machine \
              --state-machine-arn <state-machine-arn> \
              --logging-configuration '{"level":"ALL","includeExecutionData":true,"destinations":[{"cloudWatchLogsLogGroup":{"logGroupArn":"<log-group-arn>"}}]}'
            ```
        - id: terraform
          desc: |
            To ensure Step Functions state machines have logging enabled in Terraform:

            ```hcl
            resource "aws_sfn_state_machine" "example" {
              name     = "example-state-machine"
              role_arn = aws_iam_role.sfn.arn

              definition = file("definition.json")

              logging_configuration {
                log_destination        = "${aws_cloudwatch_log_group.sfn.arn}:*"
                include_execution_data = true
                level                  = "ALL"
              }
            }
            ```
        - id: cloudformation
          desc: |
            Set `LoggingConfiguration.Level` on every `AWS::StepFunctions::StateMachine` to `ALL`, `ERROR`, or `FATAL` and pin a CloudWatch Logs destination so execution events are auditable:

            ```yaml
            Resources:
              StateMachineLogGroup:
                Type: AWS::Logs::LogGroup
                Properties:
                  LogGroupName: /aws/stepfunctions/example
                  RetentionInDays: 365
              StateMachine:
                Type: AWS::StepFunctions::StateMachine
                Properties:
                  StateMachineName: example
                  RoleArn: !GetAtt StateMachineRole.Arn
                  DefinitionString: !Sub |
                    {"StartAt": "Done", "States": {"Done": {"Type": "Succeed"}}}
                  LoggingConfiguration:
                    Level: ALL
                    IncludeExecutionData: false
                    Destinations:
                      - CloudWatchLogsLogGroup:
                          LogGroupArn: !GetAtt StateMachineLogGroup.Arn
            ```
