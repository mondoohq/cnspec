queries:
  - uid: mondoo-aws-security-eks-cluster-cmks-in-kms
    title: Ensure EKS clusters use KMS for Kubernetes secrets encryption
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-11
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-aws-security-eks-cluster-cmks-in-kms-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-eks-cluster-cmks-in-kms-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-eks-cluster-cmks-in-kms-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-eks-cluster-cmks-in-kms-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-eks-cluster-cmks-in-kms-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon EKS clusters are configured to use a customer-managed KMS key for encrypting Kubernetes secrets at rest. By default, EKS does not encrypt secrets unless an encryption configuration is explicitly provided; when configured, the customer-managed key gives the account owner direct control over key access, rotation, and revocation.

        **Why this matters**

        - **Customer control over key lifecycle:** A customer-managed key can be rotated, disabled, or revoked independently of the cluster, allowing immediate response to a suspected compromise.
        - **Separation of duties:** IAM key policies for the KMS key can restrict which principals can decrypt secrets, enforcing access controls beyond cluster-level RBAC.
        - **Audit trail:** Every use of the key is recorded in AWS CloudTrail, providing a cryptographically linked record of when secrets were accessed or decrypted.
        - **Blast radius reduction:** If the cluster is compromised, rotating or disabling the KMS key invalidates cached decryption of all persisted secrets without destroying the cluster.

        **Risk mitigation**

        - **Secrets exposure prevention:** Encrypting etcd secrets with a CMK ensures that raw etcd data, snapshot files, or backup volumes cannot be read without key access.
        - **Regulatory alignment:** Many frameworks require encryption of sensitive data at rest under keys the customer controls; AWS-managed keys satisfy encryption but not customer-key requirements.
        - **Revocability:** Customer-managed keys can be disabled or scheduled for deletion, making it possible to effectively revoke access to secrets for a compromised cluster.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and open the Amazon EKS console at https://console.aws.amazon.com/eks/.
        2. In the left navigation pane, choose **Clusters**.
        3. Select the cluster you want to examine.
        4. Choose the **Configuration** tab, then choose **Secrets encryption**.
        5. Review the **KMS key** field.

        A passing cluster shows a customer-managed KMS key ARN in the **KMS key** field. A failing cluster shows no key configured or displays only the default AWS-managed key.

        ### Audit via CLI

        1. List all EKS clusters in the account:

        ```bash
        aws eks list-clusters --query "clusters[]"
        ```

        2. For each cluster, describe the encryption configuration:

        ```bash
        aws eks describe-cluster --name <cluster-name> --query "cluster.encryptionConfig"
        ```

        A passing cluster returns a non-empty array containing an entry with `"resources": ["secrets"]` and a `"provider"` block that includes a non-empty `keyArn`. A failing cluster returns an empty array `[]` or a provider block with no `keyArn`.
      remediation:
        - id: console
          desc: |
            To ensure EKS clusters use KMS for Kubernetes secrets encryption using the AWS Console:

            1. Navigate to the Amazon EKS Console.
            2. Select the EKS cluster you want to configure.
            3. In the Configuration tab, select Secrets Encryption.
            4. Choose the option to use a custom KMS key.
            5. Select or create a new KMS key for encryption.
            6. Save the changes to apply the new configuration.
        - id: cli
          desc: |
            To ensure EKS clusters use KMS for Kubernetes secrets encryption using the AWS CLI, check if your EKS cluster is using a custom KMS key:

            ```bash
            aws eks describe-cluster --name <cluster_name> --query "cluster.encryptionConfig"
            ```

            If no custom KMS key is listed, associate an encryption configuration with the cluster:

            ```bash
            aws eks associate-encryption-config \
              --cluster-name <cluster_name> \
              --encryption-config '[{"resources":["secrets"],"provider":{"keyArn":"<kms_key_arn>"}}]'
            ```
        - id: terraform
          desc: |
            To ensure EKS clusters use KMS for Kubernetes secrets encryption in Terraform, define an EKS cluster with a custom KMS key in your Terraform configuration:

            ```hcl
            resource "aws_eks_cluster" "example" {
              name     = "example-cluster"
              role_arn = aws_iam_role.eks_role.arn

              vpc_config {
                subnet_ids = [aws_subnet.eks_subnet.id]
              }

              encryption_config {
                provider {
                  key_arn = aws_kms_key.example.arn
                }
                resources = ["secrets"]
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure EKS clusters use KMS for Kubernetes secrets encryption in CloudFormation, create an EKS cluster with a custom KMS key in your CloudFormation template:

            ```yaml
            Resources:
              MyEKSCluster:
                Type: AWS::EKS::Cluster
                Properties:
                  Name: example-cluster
                  RoleArn: !GetAtt eksRole.Arn
                  VpcConfig:
                    SubnetIds:
                      - !Ref eksSubnet
                  EncryptionConfig:
                    - Provider:
                        KeyArn: !Ref myKmsKey
                      Resources:
                        - secrets
            ```
    refs:
      - url: https://docs.aws.amazon.com/eks/latest/best-practices/security.html
        title: Amazon EKS Security Best Practices
      - url: https://docs.aws.amazon.com/kms/latest/developerguide/best-practices.html
        title: AWS KMS Best Practices
  - uid: mondoo-aws-security-eks-cluster-cmks-in-kms-aws
    filters: asset.platform == "aws-eks-cluster"
    mql: |
      aws.eks.cluster.encryptionKmsKey != null
  - uid: mondoo-aws-security-eks-cluster-cmks-in-kms-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_eks_cluster")
    mql: |
      terraform.resources.where( nameLabel == "aws_eks_cluster" ).all(
        blocks.where( type == "encryption_config" ) != empty &&
        blocks.where( type == "encryption_config" ).all(
          blocks.where( type == "provider" ) != empty &&
          blocks.where( type == "provider" ).all( arguments.key_arn != empty )
        )
      )
  - uid: mondoo-aws-security-eks-cluster-cmks-in-kms-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_eks_cluster")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_eks_cluster").all(
        change.after.encryption_config != empty &&
        change.after.encryption_config.all(
          _['provider'] != empty &&
          _['provider'].all( _['key_arn'] != empty )
        )
      )
  - uid: mondoo-aws-security-eks-cluster-cmks-in-kms-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_eks_cluster")
    mql: |
      terraform.state.resources.where(type == "aws_eks_cluster").all(
        values.encryption_config != empty &&
        values.encryption_config.all(
          _['provider'] != empty &&
          _['provider'].all( _['key_arn'] != empty )
        )
      )
  - uid: mondoo-aws-security-eks-cluster-cmks-in-kms-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::EKS::Cluster")
    mql: |
      cloudformation.template.resources.where(type == "AWS::EKS::Cluster").all(
      properties['EncryptionConfig'] != empty &&
      properties['EncryptionConfig'].all(
      _['Provider'] != empty &&
      _['Provider'].all( _['KeyArn'] != empty )
      )
      )
  - uid: mondoo-aws-security-eks-cluster-private-controlplane
    title: Ensure Amazon EKS clusters are configured with private endpoint access only
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-aws-security-eks-cluster-private-controlplane-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-eks-cluster-private-controlplane-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-eks-cluster-private-controlplane-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-eks-cluster-private-controlplane-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      refs:
        - url: https://docs.aws.amazon.com/eks/latest/userguide/pod-networking.html
          title: Amazon EKS - Pod networking
        - url: https://docs.aws.amazon.com/eks/latest/userguide/networking-vpc.html
          title: Amazon EKS - Networking in Amazon VPC
      desc: |
        This check ensures that Amazon EKS clusters are configured with private endpoint access. By default, EKS clusters are accessible over the public internet, which can expose them to potential attacks. Configuring private endpoint access restricts access to the cluster's API server to resources within the VPC.

        **Why this matters**

        - **Security:** Reduces the attack surface by preventing public access to the EKS control plane.
        - **Compliance:** Meets security standards and best practices for cloud-native applications.
        - **Network isolation:** Enhances network security by limiting access to trusted networks.

        **Risk mitigation**

        - **Prevents unauthorized access:** Only resources within the VPC can communicate with the EKS control plane.
        - **Enhances security posture:** Reduces the risk of data breaches and unauthorized access to sensitive information.
        - **Improves compliance:** Aligns with security frameworks and regulations that require network isolation.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and open the Amazon EKS console at https://console.aws.amazon.com/eks/.
        2. In the left navigation pane, choose **Clusters**.
        3. Select the cluster you want to examine.
        4. Choose the **Configuration** tab, then choose **Networking**.
        5. Review the **Cluster endpoint access** field.

        A passing cluster shows **Private** endpoint access enabled and **Public** endpoint access disabled. A failing cluster shows public endpoint access enabled, or shows both public and private access enabled simultaneously.

        ### Audit via CLI

        1. List all EKS clusters:

        ```bash
        aws eks list-clusters --query "clusters[]"
        ```

        2. For each cluster, check the endpoint access settings:

        ```bash
        aws eks describe-cluster --name <cluster-name> --query "cluster.resourcesVpcConfig.{PrivateAccess:endpointPrivateAccess,PublicAccess:endpointPublicAccess}"
        ```

        A passing cluster returns `"PrivateAccess": true` and `"PublicAccess": false`. A failing cluster returns `"PublicAccess": true`.
      remediation:
        - id: console
          desc: |
            To configure EKS cluster networking to use a private VPC endpoint using the AWS Console:

            1. Navigate to the Amazon EKS Console.
            2. Select the EKS cluster you want to configure.
            3. In the Configuration tab, select Networking.
            4. Under Cluster Endpoint Access, select Private and ensure Public access is disabled (unchecked).
            5. Save the changes to apply the new configuration.
        - id: cli
          desc: |
            To configure EKS cluster networking to use a private VPC endpoint using the AWS CLI, check if your cluster is using private endpoint access:

            ```bash
            aws eks describe-cluster --name <cluster_name> --query "cluster.resourcesVpcConfig.{Private:endpointPrivateAccess, Public:endpointPublicAccess}"
            ```

            The output should show `"Private": true` and `"Public": false`.

            If the output does not match, you can update the cluster configuration:

            ```bash
            aws eks update-cluster-config --name <cluster_name> --resources-vpc-config endpointPrivateAccess=true,endpointPublicAccess=false
            ```
        - id: terraform
          desc: |
            To configure EKS cluster networking to use a private VPC endpoint in Terraform, define a cluster with private endpoint access enabled and public access disabled:

            ```hcl
            resource "aws_eks_cluster" "example" {
              name     = "example-cluster"
              role_arn = aws_iam_role.eks_role.arn

              vpc_config {
                subnet_ids               = [aws_subnet.eks_subnet.id]
                endpoint_private_access  = true
                endpoint_public_access   = false
              }
            }
            ```
        - id: cloudformation
          desc: |
            To configure EKS cluster networking to use a private VPC endpoint in CloudFormation, create a cluster with private endpoint access enabled:

            ```yaml
            Resources:
              MyEKSCluster:
                Type: AWS::EKS::Cluster
                Properties:
                  Name: example-cluster
                  RoleArn: !GetAtt eksRole.Arn
                  VpcConfig:
                    SubnetIds:
                      - !Ref eksSubnet
                    EndpointPrivateAccess: true
                    EndpointPublicAccess: false
            ```
    refs:
      - url: https://docs.aws.amazon.com/eks/latest/best-practices/security.html
        title: Amazon EKS Security Best Practices
  - uid: mondoo-aws-security-eks-cluster-private-controlplane-aws
    filters: asset.platform == "aws-eks-cluster"
