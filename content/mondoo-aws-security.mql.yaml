    docs:
      desc: |
        This check ensures that a CloudWatch metric filter and alarm exist to detect changes to Virtual Private Clouds (VPCs). VPCs form the foundational network isolation layer in AWS, and changes to VPC configuration can have broad security implications across all resources within the VPC.

        Unauthorized creation, modification, or deletion of VPCs could be indicators of an attacker attempting to establish persistence or pivot within your AWS environment. Monitoring VPC changes provides visibility into fundamental network topology modifications that could affect your entire infrastructure.

        CIS AWS Foundations Benchmark recommends monitoring VPC changes to detect unauthorized modifications to your network isolation boundaries and maintain visibility into changes to the core network infrastructure.
      remediation:
        - id: console
          desc: |
            To ensure log metric filter exists for VPC changes using the AWS Console:

            1. Navigate to **CloudWatch** and select **Log groups**.
            2. Select the log group associated with your CloudTrail trail.
            3. Choose **Actions** > **Create metric filter**.
            4. Enter a filter pattern matching `CreateVpc`, `DeleteVpc`, `ModifyVpcAttribute`, `AcceptVpcPeeringConnection`, `CreateVpcPeeringConnection`, `DeleteVpcPeeringConnection`, `RejectVpcPeeringConnection`, `AttachClassicLinkVpc`, `DetachClassicLinkVpc`, `DisableVpcClassicLink`, and `EnableVpcClassicLink`.
            5. Assign a metric name and namespace, then choose **Create metric filter**.
            6. Navigate to **Alarms** > **Create alarm**, select the new metric, and configure SNS notification.
        - id: cli
          desc: |
            To ensure log metric filter exists for VPC changes using the AWS CLI, create the metric filter:

            ```bash
            aws logs put-metric-filter \
              --log-group-name <cloudtrail-log-group> \
              --filter-name VPCChanges \
              --filter-pattern '{ ($.eventName = CreateVpc) || ($.eventName = DeleteVpc) || ($.eventName = ModifyVpcAttribute) || ($.eventName = AcceptVpcPeeringConnection) || ($.eventName = CreateVpcPeeringConnection) || ($.eventName = DeleteVpcPeeringConnection) || ($.eventName = RejectVpcPeeringConnection) }' \
              --metric-transformations metricName=VPCChanges,metricNamespace=CISBenchmark,metricValue=1
            ```

            Create the alarm:

            ```bash
            aws cloudwatch put-metric-alarm \
              --alarm-name VPCChanges \
              --metric-name VPCChanges \
              --namespace CISBenchmark \
              --statistic Sum \
              --period 300 \
              --threshold 1 \
              --comparison-operator GreaterThanOrEqualToThreshold \
              --evaluation-periods 1 \
              --alarm-actions <sns-topic-arn>
            ```
        - id: terraform
          desc: |
            To ensure log metric filter exists for VPC changes in Terraform, create a CloudWatch log metric filter and alarm for VPC changes:

            ```hcl
            resource "aws_cloudwatch_log_metric_filter" "vpcchanges" {
              name           = "VPCChanges"
              log_group_name = aws_cloudwatch_log_group.cloudtrail.name
              pattern        = "{ ($.eventName = CreateVpc) || ($.eventName = DeleteVpc) || ($.eventName = ModifyVpcAttribute) || ($.eventName = AcceptVpcPeeringConnection) || ($.eventName = CreateVpcPeeringConnection) || ($.eventName = DeleteVpcPeeringConnection) || ($.eventName = RejectVpcPeeringConnection) }"

              metric_transformation {
