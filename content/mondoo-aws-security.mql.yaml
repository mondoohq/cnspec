  # No Terraform variants: Certificate expiry is runtime telemetry from ACM (`notAfter` timestamp on the resolved `aws.acm.certificate`). Terraform stores only the certificate ARN under `aws_opensearch_domain.domain_endpoint_options.custom_endpoint_certificate_arn` and cannot represent the cert's validity window.
  # No CloudFormation variants: same reason — `AWS::OpenSearchService::Domain.DomainEndpointOptions.CustomEndpointCertificateArn` is just an ARN reference and cannot expose the cert expiry timestamp.
  - uid: mondoo-aws-security-opensearch-custom-endpoint-certificate-valid
    title: Ensure OpenSearch domain custom endpoint certificate is not expiring
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-12
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-10
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-1-11
      compliance/vda-isa-5: vda-isa-5-5-1-2
    variants:
      - uid: mondoo-aws-security-opensearch-custom-endpoint-certificate-valid-aws
        tags:
          mondoo.com/filter-title: AWS OpenSearch Domain
          mondoo.com/filter-icon: aws
    docs:
      desc: |
        This check ensures that when an Amazon OpenSearch Service domain exposes a custom endpoint, the ACM certificate backing that endpoint is not expired and is not expiring within the next 30 days. Custom endpoints serve client traffic over HTTPS using a customer-supplied ACM certificate; once the certificate's `notAfter` timestamp passes, clients with strict TLS validation will refuse to connect.

        **Why this matters**

        - An expired TLS certificate causes outright service unavailability for any client that performs proper validation. Even auto-renewed certs require lead time on the OpenSearch endpoint to take effect.
        - Certificates that are within days of expiry leave little room to recover from rotation problems, ACM validation failures, or DNS changes that block re-issuance.
        - A long-running expired certificate signals broken certificate lifecycle management, which often correlates with similar gaps on other endpoints in the account.

        AWS Certificate Manager will renew certificates issued by ACM automatically when the domain validation records remain in place; certificates imported into ACM must be rotated manually before expiry.

        **Risk mitigation**

        - **Service availability:** Renewing certificates well before expiry prevents TLS handshake failures that take the endpoint offline.
        - **Certificate hygiene:** Surfacing expiring certificates drives the lifecycle discipline that protects every other certificate in the account.
        - **Compliance:** Satisfies cryptographic-key-management requirements that demand proactive certificate renewal.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and navigate to **Amazon OpenSearch Service**.
        2. Select the domain name and open the **General information** tab.
        3. Check whether a **Custom endpoint** is configured.
        4. If a custom endpoint is in use, note the certificate ARN listed under the domain's endpoint configuration.
        5. Navigate to **AWS Certificate Manager** and locate the referenced certificate.
        6. Review the **Expiration date** to confirm it is more than 30 days in the future.

        A passing domain either has no custom endpoint enabled or has a custom endpoint backed by a certificate whose expiration date is more than 30 days away. A failing domain has a custom endpoint backed by a certificate that has already expired or expires within 30 days.

        ### Audit via CLI

        1. Retrieve the custom endpoint configuration and certificate ARN for the domain:

        ```bash
        aws opensearch describe-domain \
          --domain-name <domain-name> \
          --query "DomainStatus.DomainEndpointOptions.{Custom:CustomEndpointEnabled,Endpoint:CustomEndpoint,CertArn:CustomEndpointCertificateArn}"
        ```

        2. Inspect the certificate expiry:

        ```bash
        aws acm describe-certificate \
          --certificate-arn <certificate-arn> \
          --query "Certificate.{Domain:DomainName,Status:Status,NotAfter:NotAfter,RenewalEligibility:RenewalEligibility}"
        ```

        A passing domain either has `CustomEndpointEnabled` as `false`, or has a certificate whose `NotAfter` timestamp is more than 30 days from today. A failing domain has a certificate whose `NotAfter` timestamp is within 30 days or already past.

      remediation:
        - id: console
          desc: |
            To ensure an OpenSearch domain's custom endpoint certificate is not expiring using the AWS Console:

            1. Navigate to the **AWS Certificate Manager Console** and locate the certificate referenced by the OpenSearch domain's custom endpoint.
            2. If the certificate is ACM-issued, confirm the DNS or email domain validation records are still in place so ACM can renew automatically. Renew or re-issue the certificate if it is close to expiry.
            3. If the certificate was imported, request a new certificate from your CA and import it into ACM.
            4. Open the **Amazon OpenSearch Service Console** and select the affected domain.
            5. Choose **Actions**, then **Edit security configuration**, and under **Custom endpoint** select the renewed certificate.
            6. Apply the change and wait for the domain to finish processing the configuration update.
        - id: cli
          desc: |
            To ensure an OpenSearch domain's custom endpoint certificate is not expiring using the AWS CLI, identify the certificate ARN currently in use by the domain:

            ```bash
            aws opensearch describe-domain \
              --domain-name <domain-name> \
              --query "DomainStatus.DomainEndpointOptions.{Custom:CustomEndpointEnabled,Endpoint:CustomEndpoint,CertArn:CustomEndpointCertificateArn}"
            ```

            Inspect the certificate's expiry timestamp:

            ```bash
            aws acm describe-certificate \
              --certificate-arn <certificate-arn> \
              --query "Certificate.{Domain:DomainName,Status:Status,NotAfter:NotAfter,RenewalEligibility:RenewalEligibility}"
            ```

            If the certificate is ACM-issued and renewable, request renewal:

            ```bash
            aws acm renew-certificate --certificate-arn <certificate-arn>
            ```

            If the certificate must be replaced, request a new one and update the OpenSearch domain to use it:

            ```bash
            aws opensearch update-domain-config \
              --domain-name <domain-name> \
              --domain-endpoint-options CustomEndpointEnabled=true,CustomEndpoint=<endpoint>,CustomEndpointCertificateArn=<new-certificate-arn>
            ```
        - id: terraform
          desc: |
            To ensure an OpenSearch domain's custom endpoint certificate is not expiring in Terraform, point `domain_endpoint_options.custom_endpoint_certificate_arn` at a renewed ACM certificate and apply the change:

            ```hcl
            resource "aws_opensearch_domain" "example" {
              domain_name = "example"

              domain_endpoint_options {
                custom_endpoint_enabled         = true
                custom_endpoint                 = "search.example.com"
                custom_endpoint_certificate_arn = aws_acm_certificate.opensearch.arn
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure an OpenSearch domain's custom endpoint certificate is not expiring in CloudFormation, point `DomainEndpointOptions.CustomEndpointCertificateArn` at a renewed ACM certificate and apply the change:

            ```yaml
            Resources:
              OpenSearchDomain:
                Type: "AWS::OpenSearchService::Domain"
                Properties:
                  DomainName: "example"
                  DomainEndpointOptions:
                    CustomEndpointEnabled: true
                    CustomEndpoint: "search.example.com"
                    CustomEndpointCertificateArn: !Ref OpenSearchCertificate
            ```
    refs:
      - url: https://docs.aws.amazon.com/opensearch-service/latest/developerguide/customendpoint.html
        title: Amazon OpenSearch Service - Custom endpoints
      - url: https://docs.aws.amazon.com/acm/latest/userguide/managed-renewal.html
        title: AWS Certificate Manager - Managed renewal
  - uid: mondoo-aws-security-opensearch-custom-endpoint-certificate-valid-aws
    filters: asset.platform == "aws-opensearch-domain"
    mql: |
      aws.opensearch.domain.customEndpointEnabled == false ||
        aws.opensearch.domain.customEndpointCertificate.notAfter > time.now + 30 * time.day
  - uid: mondoo-aws-security-neptune-cluster-cmk-encryption
    title: Ensure Neptune DB clusters are encrypted with a customer-managed KMS key
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-11
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-aws-security-neptune-cluster-cmk-encryption-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-neptune-cluster-cmk-encryption-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-neptune-cluster-cmk-encryption-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-neptune-cluster-cmk-encryption-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-neptune-cluster-cmk-encryption-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon Neptune DB clusters are encrypted using a customer-managed AWS KMS key (CMK) rather than the default AWS-managed service key. Customer-managed keys provide greater control over the encryption lifecycle, including key rotation policies, access control, and audit capabilities.

        **Why this matters**

        - AWS-managed keys do not allow you to control key rotation schedules, define granular access policies, or audit key usage independently.
        - Customer-managed KMS keys enable you to define who can use and manage the key through IAM and key policies, providing an additional layer of access control beyond Neptune IAM policies.
        - Using CMKs enables detailed audit trails in AWS CloudTrail for all encryption and decryption operations on Neptune data.
        - Some compliance frameworks require organizations to manage their own encryption keys rather than relying on provider-managed keys.

        **Risk mitigation**

        - **Key control:** Provides full lifecycle control over encryption keys, including the ability to disable or revoke access.
        - **Audit visibility:** Enables detailed CloudTrail logging of all key usage for compliance and forensic purposes.
        - **Access separation:** Allows separation of duties between database administrators and key administrators.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and navigate to **Amazon Neptune** > **Databases**.
        2. Select the Neptune DB cluster (not a DB instance).
        3. Under the **Configuration** tab, locate **Encryption** and review the **AWS KMS key** field.

        A passing cluster shows a customer-managed KMS key ARN (not the AWS-managed key). A failing cluster shows no KMS key or the default AWS-managed Neptune key.

        ### Audit via CLI

        1. List all Neptune clusters and their KMS key IDs:

        ```bash
        aws neptune describe-db-clusters \
          --query "DBClusters[*].{ClusterId:DBClusterIdentifier,StorageEncrypted:StorageEncrypted,KmsKeyId:KmsKeyId}"
        ```

        2. For each cluster with a KMS key, verify it is customer-managed:

        ```bash
        aws kms describe-key --key-id <kms-key-id> \
          --query "KeyMetadata.{KeyId:KeyId,Manager:KeyManager}"
        ```

        A passing cluster returns `"KeyManager": "CUSTOMER"`. A failing cluster returns `"KeyManager": "AWS"`, has an empty `KmsKeyId`, or has `StorageEncrypted` set to `false`.

      remediation:
        - id: console
          desc: |
            To ensure Neptune DB clusters are encrypted with a customer-managed KMS key using the AWS Console:

            1. Navigate to the Amazon Neptune Console.
            2. Select **Databases** in the left panel.
            3. To update encryption, you must create a new cluster with a customer-managed KMS key:
              - Select **Create database**.
              - Under **Encryption**, select a customer-managed KMS key.
              - Complete the cluster creation process.
            4. Migrate data from the existing cluster to the new cluster using Neptune export/import.
            5. Update applications to point to the new cluster endpoint.
        - id: cli
          desc: |
            To ensure Neptune DB clusters are encrypted with a customer-managed KMS key using the AWS CLI, create a Neptune cluster with a customer-managed KMS key:

            ```bash
            aws neptune create-db-cluster \
              --db-cluster-identifier secure-neptune-cluster \
              --engine neptune \
              --storage-encrypted \
              --kms-key-id arn:aws:kms:region:account-id:key/key-id
            ```

            Check the KMS key used by an existing cluster:

            ```bash
            aws neptune describe-db-clusters --db-cluster-identifier <cluster-id> \
              --query "DBClusters[*].{ClusterId:DBClusterIdentifier,KmsKeyId:KmsKeyId}"
            ```
        - id: terraform
          desc: |
            To ensure Neptune DB clusters are encrypted with a customer-managed KMS key in Terraform:

            ```hcl
            resource "aws_kms_key" "neptune" {
              description         = "KMS key for Neptune encryption"
              enable_key_rotation = true
            }

            resource "aws_neptune_cluster" "example" {
              cluster_identifier  = "neptune-cluster"
              engine              = "neptune"
              storage_encrypted   = true
              kms_key_arn         = aws_kms_key.neptune.arn
            }
            ```
        - id: cloudformation
          desc: |
            To ensure Neptune DB clusters are encrypted with a customer-managed KMS key in CloudFormation:

            ```yaml
            Resources:
              NeptuneKMSKey:
                Type: "AWS::KMS::Key"
                Properties:
                  Description: "KMS key for Neptune encryption"
                  EnableKeyRotation: true

              NeptuneCluster:
                Type: "AWS::Neptune::DBCluster"
                Properties:
                  DBClusterIdentifier: "neptune-cluster"
                  StorageEncrypted: true
                  KmsKeyId: !Ref NeptuneKMSKey
            ```
    refs:
      - url: https://docs.aws.amazon.com/neptune/latest/userguide/encrypt.html
        title: AWS Documentation - Encrypting Neptune resources
      - url: https://docs.aws.amazon.com/kms/latest/developerguide/concepts.html#customer-cmk
        title: AWS KMS Customer Managed Keys
