    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_lb")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_lb").all(
        change.after.enable_deletion_protection == true
      )
  - uid: mondoo-aws-security-elb-deletion-protection-enabled-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_lb")
    mql: |
      terraform.state.resources.where(type == "aws_lb").all(
        values.enable_deletion_protection == true
      )
  - uid: mondoo-aws-security-elb-deletion-protection-enabled-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::ElasticLoadBalancingV2::LoadBalancer")
    mql: |
      cloudformation.template.resources.where(type == "AWS::ElasticLoadBalancingV2::LoadBalancer").all(
      properties['EnableDeletionProtection'] == true
      )
  - uid: mondoo-aws-security-elasticsearch-encrypted-at-rest
    title: Ensure Elasticsearch Service domains have encryption at rest
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-aws-security-elasticsearch-encrypted-at-rest-aws
        tags:
          mondoo.com/filter-title: AWS ES Domain
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-elasticsearch-encrypted-at-rest-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-elasticsearch-encrypted-at-rest-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-elasticsearch-encrypted-at-rest-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-elasticsearch-encrypted-at-rest-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon Elasticsearch Service domains are configured with encryption at rest enabled. By default, Elasticsearch Service domains do not encrypt stored data unless encryption is explicitly enabled at domain creation time; existing unencrypted domains cannot be converted and must be replaced to achieve compliance.

        **Why this matters**

        - **Data confidentiality:** Elasticsearch domains often index sensitive business records, log data, or personally identifiable information; encryption at rest prevents that data from being read directly from the underlying storage if the domain or its storage is compromised.
        - **KMS integration:** When encryption is enabled, AWS KMS manages the keys, providing centralized key policy control, CloudTrail audit logging of key usage, and optional customer-managed key support.
        - **Storage-layer isolation:** Encryption ensures that access to raw EBS volumes backing the domain does not translate to readable data without possession of the corresponding KMS key.
        - **Compliance baseline:** Regulated industries treating Elasticsearch as a data store for sensitive records require encryption at rest as a minimum control.

        **Risk mitigation**

        - **Storage compromise:** If an attacker gains access to the underlying EBS volumes or snapshots of an Elasticsearch domain, encryption prevents plaintext data extraction without the KMS key.
        - **Snapshot exposure:** Automated EBS snapshots of unencrypted domains retain plaintext data; enabling encryption at rest ensures snapshots are also encrypted.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and open the Amazon OpenSearch Service (formerly Elasticsearch Service) console at https://console.aws.amazon.com/aos/.
        2. In the left navigation pane, choose **Domains**.
        3. Select a domain and open the **Security** tab.
        4. Under **Encryption**, check the **Encryption at rest** field.

        A passing domain shows **Encryption at rest: Enabled**. A failing domain shows **Encryption at rest: Disabled**.

        ### Audit via CLI

        1. Check the encryption-at-rest configuration for a specific Elasticsearch domain:

        ```bash
        aws es describe-elasticsearch-domain --domain-name <domain-name> --query "DomainStatus.EncryptionAtRestOptions"
        ```

        A passing domain returns `{"Enabled": true, "KmsKeyId": "..."}`. A failing domain returns `{"Enabled": false}`.
      remediation:
        - id: console
          desc: |
            To ensure Elasticsearch Service domains have encryption at rest using the AWS Console:

            1.  Navigate to the Amazon Elasticsearch Service Console.
            2.  Select Domains in the left panel.
            3.  Select an Elasticsearch domain and go to the Security tab.
            4.  Under Encryption at rest, check if encryption is enabled.
            5.  If encryption is not enabled, create a new Elasticsearch domain with encryption:
              - Select Create domain.
              - Under Encryption at rest, enable encrypt data at rest.
              - Choose a customer-managed KMS key (CMK) if required.
              - Complete the domain creation process.
            6.  Migrate data from the unencrypted domain to the new encrypted domain, then delete the unencrypted domain.
        - id: cli
          desc: |
            To ensure Elasticsearch Service domains have encryption at rest using the AWS CLI, check if an Elasticsearch domain is encrypted:

            ```bash
            aws es describe-elasticsearch-domain --domain-name <domain-name> --query "DomainStatus.EncryptionAtRestOptions"
            ```

            If encryption is not enabled, create a new encrypted Elasticsearch domain:

            ```bash
            aws es create-elasticsearch-domain \
            --domain-name "secure-es-domain" \
            --encryption-at-rest-options Enabled=true,KmsKeyId="arn:aws:kms:region:account-id:key/key-id"
            ```
        - id: terraform
          desc: |
            To ensure Elasticsearch Service domains have encryption at rest in Terraform, ensure Elasticsearch Service encryption is enabled using AWS KMS:

            ```hcl
            resource "aws_kms_key" "es_kms_key" {
              description         = "KMS key for Elasticsearch encryption"
              enable_key_rotation = true
            }

            resource "aws_elasticsearch_domain" "secure_es" {
              domain_name           = "secure-es-domain"
              elasticsearch_version = "7.10"

              encrypt_at_rest {
                enabled    = true
                kms_key_id = aws_kms_key.es_kms_key.arn
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure Elasticsearch Service domains have encryption at rest in CloudFormation, enable encryption at rest for Elasticsearch domains:

            ```yaml
            Resources:
              SecureESDomain:
                Type: "AWS::Elasticsearch::Domain"
                Properties:
                  DomainName: "secure-es-domain"
                  ElasticsearchVersion: "7.10"
                  EncryptionAtRestOptions:
                    Enabled: true
                    KmsKeyId: !Ref ESKMSKey

              ESKMSKey:
                Type: "AWS::KMS::Key"
                Properties:
                  Description: "KMS key for Elasticsearch encryption"
                  EnableKeyRotation: true
            ```
    refs:
