        This check ensures that AWS security groups do not allow inbound traffic on the Memcached port (11211) from `0.0.0.0/0` or `::/0`. Public Memcached servers have been weaponized for record-breaking UDP reflection/amplification DDoS attacks (>1 Tbps).

        **Why this matters**

        Memcached's default UDP responder amplifies a 200-byte query into multi-kilobyte responses, making any exposed instance a potential DDoS amplifier. The cached data itself is also typically unauthenticated.
      remediation:
        - id: cli
          desc: |
            ```bash
            aws ec2 revoke-security-group-ingress \
              --group-id <sg-id> \
              --ip-permissions IpProtocol=tcp,FromPort=11211,ToPort=11211,IpRanges='[{CidrIp=0.0.0.0/0}]'
            ```
        - id: terraform
          desc: |
            Replace any `0.0.0.0/0` or `::/0` source on port 11211 with the application-tier security group, VPN CIDR, or specific bastion address. The example shows the modern `aws_vpc_security_group_ingress_rule` form; the same rule applies to inline `ingress` blocks on `aws_security_group`:

            ```hcl
            resource "aws_vpc_security_group_ingress_rule" "from_app" {
              security_group_id            = aws_security_group.workload.id
              referenced_security_group_id = aws_security_group.app.id
              ip_protocol                  = "tcp"
              from_port                    = 11211
              to_port                      = 11211
            }
            ```
        - id: cloudformation
          desc: |
            To restrict Memcached access in CloudFormation, scope every `SecurityGroupIngress` rule covering port 11211 to a specific source security group, IP range, or VPC peer rather than `0.0.0.0/0` or `::/0`:

            ```yaml
            Resources:
              CacheSecurityGroup:
                Type: AWS::EC2::SecurityGroup
                Properties:
                  GroupDescription: Memcached access from app tier only
                  VpcId: !Ref VpcId
                  SecurityGroupIngress:
                    - IpProtocol: tcp
                      FromPort: 11211
                      ToPort: 11211
                      SourceSecurityGroupId: !Ref AppSecurityGroup
            ```
    refs:
      - url: https://www.cisa.gov/news-events/alerts/2018/02/27/memcached-distributed-denial-service-attacks
        title: CISA - Memcached-based DDoS attacks
