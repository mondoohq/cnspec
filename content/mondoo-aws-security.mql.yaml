    mql: terraform.state.resources.where( type == "aws_security_group" && values.ingress.contains( to_port == 3389 ) ).none( values.ingress.where(to_port == 3389).any(cidr_blocks.contains("0.0.0.0/0") || cidr_blocks.contains("::/0")))
