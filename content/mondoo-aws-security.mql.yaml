      )
  - uid: mondoo-aws-security-cognito-identity-pool-no-unauthenticated-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_cognito_identity_pool")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_cognito_identity_pool").all(
      change.after.allow_unauthenticated_identities != true
      )
  - uid: mondoo-aws-security-cognito-identity-pool-no-unauthenticated-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_cognito_identity_pool")
    mql: |
      terraform.state.resources.where(type == "aws_cognito_identity_pool").all(
      values.allow_unauthenticated_identities != true
      )
  - uid: mondoo-aws-security-cognito-identity-pool-no-unauthenticated-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::Cognito::IdentityPool")
    mql: |
      cloudformation.template.resources.where(type == "AWS::Cognito::IdentityPool").all(
      properties['AllowUnauthenticatedIdentities'] != true
      )
  - uid: mondoo-aws-security-cognito-identity-pool-no-classic-flow
    title: Ensure Cognito identity pools disable Basic (Classic) auth flow
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-16
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-j
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-2
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-2
    variants:
      - uid: mondoo-aws-security-cognito-identity-pool-no-classic-flow-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-cognito-identity-pool-no-classic-flow-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-cognito-identity-pool-no-classic-flow-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-cognito-identity-pool-no-classic-flow-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-cognito-identity-pool-no-classic-flow-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon Cognito identity pools do not have the Basic (Classic) authentication flow enabled. The Classic flow passes IAM role selection to the client, while the Enhanced (Simplified) flow handles role selection server-side, providing better security.

        **Why this matters**

        - The Classic flow allows client-side applications to directly call `AssumeRoleWithWebIdentity` with a role ARN, enabling clients to request any role that trusts the identity pool.
        - The Enhanced flow restricts role selection to server-side logic based on rules or the default role configuration, preventing clients from escalating privileges.
        - With the Classic flow, a compromised or malicious client could request credentials for a more privileged role than intended.
        - AWS recommends using the Enhanced flow for all new identity pools and migrating existing Classic flow implementations.

        **Risk mitigation**

        - **Privilege escalation prevention:** Prevents clients from selecting arbitrary IAM roles.
        - **Server-side control:** Ensures role assignment is controlled by server-side rules and configuration.
        - **Simplified security:** Reduces the attack surface by removing client-side role selection.
      audit: |
        ### Audit via Console

        1. Navigate to the **Amazon Cognito Console** at Services > Cognito.
        2. Select **Identity pools** in the left navigation panel.
        3. Select the identity pool to inspect.
        4. Choose the **User access** tab.
        5. Under **Authenticated role selection**, verify whether the **Basic (Classic) authentication flow** is enabled.

        A passing identity pool shows **Basic (Classic) flow: Disabled**. A failing identity pool shows **Basic (Classic) flow: Enabled**.

        ### Audit via CLI

        1. List all Cognito identity pools:

        ```bash
        aws cognito-identity list-identity-pools \
          --max-results 60 \
          --query "IdentityPools[*].{Id:IdentityPoolId,Name:IdentityPoolName}"
        ```

        2. Check the classic flow setting for each pool:

        ```bash
        aws cognito-identity describe-identity-pool \
          --identity-pool-id <identity-pool-id> \
          --query "{Name:IdentityPoolName,ClassicFlow:AllowClassicFlow}"
        ```

        A passing identity pool returns `"ClassicFlow": false` or omits the field (it defaults to disabled). A failing identity pool returns `"ClassicFlow": true`.
      remediation:
        - id: console
          desc: |
            To ensure Cognito identity pools disable Basic (Classic) auth flow using the AWS Console:

            1. Navigate to the **Amazon Cognito Console** and select **Identity pools**.
            2. Select the identity pool to modify.
            3. Under **User access**, choose **Edit**.
            4. Disable the **Basic (Classic) authentication flow**.
            5. Ensure the Enhanced (Simplified) flow is configured with appropriate role mappings.
            6. Choose **Save changes**.
            7. Update any application code that uses the Classic `GetOpenIdToken` and `AssumeRoleWithWebIdentity` flow to use `GetCredentialsForIdentity` instead.
        - id: cli
          desc: |
            To ensure Cognito identity pools disable Basic (Classic) auth flow using the AWS CLI, disable the Classic authentication flow:

            ```bash
            aws cognito-identity update-identity-pool \
              --identity-pool-id <identity-pool-id> \
              --identity-pool-name <pool-name> \
              --no-allow-classic-flow
            ```

            Note: The `update-identity-pool` command requires specifying all identity pool settings. Include `--no-allow-unauthenticated-identities` or `--allow-unauthenticated-identities` to match your current configuration.

            Verify the setting:

            ```bash
            aws cognito-identity describe-identity-pool \
              --identity-pool-id <identity-pool-id> \
              --query "{Name:IdentityPoolName,ClassicFlow:AllowClassicFlow}"
            ```
        - id: terraform
          desc: |
            To ensure Cognito identity pools disable Basic (Classic) auth flow in Terraform, disable the Classic authentication flow:

            ```hcl
            resource "aws_cognito_identity_pool" "example" {
              identity_pool_name               = "example-pool"
              allow_unauthenticated_identities = false
              allow_classic_flow               = false
            }
            ```
        - id: cloudformation
          desc: |
            To ensure Cognito identity pools disable Basic (Classic) auth flow in CloudFormation, set `AllowClassicFlow` to `false`:

            ```yaml
            Resources:
              IdentityPool:
                Type: AWS::Cognito::IdentityPool
                Properties:
                  IdentityPoolName: example-pool
                  AllowClassicFlow: false
            ```
    refs:
      - url: https://docs.aws.amazon.com/cognito/latest/developerguide/authentication-flow.html
        title: Identity pools authentication flow
      - url: https://docs.aws.amazon.com/cognito/latest/developerguide/iam-roles.html
        title: IAM roles for Amazon Cognito identity pools
  - uid: mondoo-aws-security-cognito-identity-pool-no-classic-flow-aws
    filters: asset.platform == "aws"
    mql: aws.cognito.identityPools.all(allowClassicFlow == false)
  - uid: mondoo-aws-security-cognito-identity-pool-no-classic-flow-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_cognito_identity_pool")
    mql: |
      terraform.resources.where(nameLabel == "aws_cognito_identity_pool").all(
      arguments.allow_classic_flow != true
      )
  - uid: mondoo-aws-security-cognito-identity-pool-no-classic-flow-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_cognito_identity_pool")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_cognito_identity_pool").all(
      change.after.allow_classic_flow != true
      )
  - uid: mondoo-aws-security-cognito-identity-pool-no-classic-flow-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_cognito_identity_pool")
    mql: |
      terraform.state.resources.where(type == "aws_cognito_identity_pool").all(
      values.allow_classic_flow != true
      )
  - uid: mondoo-aws-security-cognito-identity-pool-no-classic-flow-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::Cognito::IdentityPool")
    mql: |
      cloudformation.template.resources.where(type == "AWS::Cognito::IdentityPool").all(
      properties['AllowClassicFlow'] != true
      )
  - uid: mondoo-aws-security-route53-domain-transfer-lock
    title: Ensure Route 53 registered domains have transfer lock enabled
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ccc-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-1-1
    variants:
      - uid: mondoo-aws-security-route53-domain-transfer-lock-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-route53-domain-transfer-lock-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-route53-domain-transfer-lock-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-route53-domain-transfer-lock-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that domains registered through Amazon Route 53 have the transfer lock (registrar lock) enabled. Transfer lock prevents unauthorized or accidental domain transfers to another registrar, which is one of the most damaging attacks against an organization's online presence.

        **Why this matters**

        - Domain hijacking through unauthorized transfers allows an attacker to take full control of a domain, redirecting all traffic including web, email, and API endpoints.
        - Once a domain is transferred, recovery can take days or weeks through ICANN dispute resolution processes, during which the attacker controls all services associated with the domain.
        - An attacker controlling a domain can intercept emails (including password reset flows), serve phishing pages on legitimate URLs, and issue valid TLS certificates for the domain.
        - Transfer lock sets the `clientTransferProhibited` EPP status code at the registry level, requiring explicit removal before any transfer can proceed.

        **Risk mitigation**

        - **Domain protection:** Prevents unauthorized domain transfers at the registry level.
        - **Service continuity:** Ensures domains remain under organizational control, preventing service disruptions.
        - **Email security:** Protects email delivery and prevents interception of sensitive communications.
      audit: |
        ### Audit via Console

        1. Navigate to the **Route 53 Console** at Services > Route 53.
        2. Select **Registered domains** in the left navigation panel.
        3. Select the domain name to inspect.
        4. Under **Domain details**, locate the **Transfer lock** field.

        A passing domain shows **Transfer lock: Enabled**. A failing domain shows **Transfer lock: Disabled**.

        ### Audit via CLI

        1. List all Route 53 registered domains and their transfer lock status:

        ```bash
        aws route53domains list-domains \
          --region us-east-1 \
          --query "Domains[*].{Domain:DomainName,AutoRenew:AutoRenew,TransferLock:TransferLock}"
        ```

        Alternatively, inspect a specific domain in detail:

        ```bash
        aws route53domains get-domain-detail \
          --region us-east-1 \
          --domain-name example.com \
          --query "{Domain:DomainName,StatusList:StatusList}"
        ```

        A passing domain returns `"TransferLock": true` in the list output, or includes `"clientTransferProhibited"` in the `StatusList`. A failing domain returns `"TransferLock": false` or lacks `clientTransferProhibited` in the status list.
      remediation:
        - id: console
          desc: |
            To ensure Route 53 registered domains have transfer lock enabled using the AWS Console:

            1. Navigate to the **Route 53 Console** and select **Registered domains**.
            2. Select the domain name.
            3. Under **Transfer lock**, choose **Enable**.
            4. Confirm the change.
        - id: cli
          desc: |
            To ensure Route 53 registered domains have transfer lock enabled using the AWS CLI, enable transfer lock for a domain:

            ```bash
            aws route53domains enable-domain-transfer-lock \
              --region us-east-1 \
              --domain-name example.com
            ```

            Verify the transfer lock status:

            ```bash
            aws route53domains get-domain-detail \
              --region us-east-1 \
              --domain-name example.com \
              --query "{Domain:DomainName,TransferLock:StatusList}"
            ```
        - id: terraform
          desc: |
            To ensure Route 53 registered domains have transfer lock enabled in Terraform, domain transfer lock is not configurable via Terraform. Route 53 domain registration resources do not support managing transfer lock settings. Use the AWS CLI or Console to enable transfer lock.
        - id: cloudformation
          desc: |
            To ensure Route 53 registered domains have transfer lock enabled in CloudFormation, domain transfer lock is not configurable via CloudFormation. Use the AWS CLI or Console to manage transfer lock settings for registered domains.
    refs:
      - url: https://docs.aws.amazon.com/Route53/latest/DeveloperGuide/domain-lock.html
        title: Locking a domain to prevent unauthorized transfer to another registrar
  - uid: mondoo-aws-security-route53-domain-transfer-lock-aws
    filters: asset.platform == "aws"
    mql: aws.route53.domains.all(transferLock == true)
  - uid: mondoo-aws-security-route53-domain-transfer-lock-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_route53domains_registered_domain")
    mql: |
      terraform.resources.where(nameLabel == "aws_route53domains_registered_domain").all(
        arguments.transfer_lock == true
      )
  - uid: mondoo-aws-security-route53-domain-transfer-lock-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_route53domains_registered_domain")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_route53domains_registered_domain").all(
        change.after["transfer_lock"] == true
      )
  - uid: mondoo-aws-security-route53-domain-transfer-lock-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_route53domains_registered_domain")
    mql: |
      terraform.state.resources.where(type == "aws_route53domains_registered_domain").all(
        values["transfer_lock"] == true
      )
  - uid: mondoo-aws-security-route53-domain-contact-privacy
    title: Ensure Route 53 registered domains have contact privacy protection enabled
    impact: 50
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: false
      compliance/dora: false
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-5-34
      compliance/nis-2: false
      compliance/nist-csf-1: nist-csf-1-pr-ds-5
      compliance/nist-csf-2: false
      compliance/nist-sp-800-53-rev5: false
      compliance/nist-sp-800-171: false
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc6-1-13
      compliance/vda-isa-5: false
    variants:
      - uid: mondoo-aws-security-route53-domain-contact-privacy-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-route53-domain-contact-privacy-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-route53-domain-contact-privacy-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-route53-domain-contact-privacy-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that domains registered through Amazon Route 53 have privacy protection enabled for all contact types: admin, registrant, and tech. Without privacy protection, WHOIS records expose personal or organizational contact details to anyone who queries them.

        **Why this matters**

        - WHOIS records are publicly queryable and expose contact names, email addresses, phone numbers, and physical addresses associated with the domain registration.
        - Exposed contact details enable targeted social engineering and spear-phishing attacks against domain administrators.
        - Attackers use WHOIS data to impersonate domain owners in registrar support calls, potentially gaining unauthorized access to domain management.
        - Privacy protection replaces real contact details with proxy information from the registrar, preventing public disclosure while maintaining required ICANN contact records.

        **Risk mitigation**

        - **Social engineering prevention:** Hides contact details that attackers use for targeted phishing and impersonation.
        - **Spam reduction:** Prevents email harvesting from WHOIS records.
        - **Personnel privacy:** Protects the personal information of employees responsible for domain management.
      audit: |
        ### Audit via Console

        1. Navigate to the **Route 53 Console** at Services > Route 53.
        2. Select **Registered domains** in the left navigation panel.
        3. Select the domain name to inspect.
        4. Under **Contact information**, review the **Privacy protection** status for the Admin, Registrant, and Tech contacts.

        A passing domain shows **Privacy protection: Enabled** for all three contact types. A failing domain shows **Privacy protection: Disabled** for one or more contact types.

        ### Audit via CLI

        1. Check contact privacy settings for a domain:

        ```bash
        aws route53domains get-domain-detail \
          --region us-east-1 \
          --domain-name example.com \
          --query "{Domain:DomainName,AdminPrivacy:AdminPrivacy,RegistrantPrivacy:RegistrantPrivacy,TechPrivacy:TechPrivacy}"
        ```

        A passing domain returns `true` for all three privacy fields: `AdminPrivacy`, `RegistrantPrivacy`, and `TechPrivacy`. A failing domain returns `false` for one or more of those fields.
      remediation:
        - id: console
          desc: |
            To ensure Route 53 registered domains have contact privacy protection enabled using the AWS Console:

            1. Navigate to the **Route 53 Console** and select **Registered domains**.
            2. Select the domain name.
            3. Under **Contact information**, choose **Edit** for each contact type (Admin, Registrant, Tech).
            4. Enable **Privacy protection** for each contact type.
            5. Save the changes.
        - id: cli
          desc: |
            To ensure Route 53 registered domains have contact privacy protection enabled using the AWS CLI, enable privacy protection for all contact types:

            ```bash
            aws route53domains update-domain-contact-privacy \
              --region us-east-1 \
              --domain-name example.com \
              --admin-privacy \
              --registrant-privacy \
              --tech-privacy
            ```

            Verify privacy settings:

            ```bash
            aws route53domains get-domain-detail \
              --region us-east-1 \
              --domain-name example.com \
              --query "{Domain:DomainName,AdminPrivacy:AdminPrivacy,RegistrantPrivacy:RegistrantPrivacy,TechPrivacy:TechPrivacy}"
            ```
        - id: terraform
          desc: |
            To ensure Route 53 registered domains have contact privacy protection enabled in Terraform, domain contact privacy is not configurable via Terraform. Route 53 domain registration resources do not support managing privacy protection settings. Use the AWS CLI or Console to enable contact privacy.
        - id: cloudformation
          desc: |
            To ensure Route 53 registered domains have contact privacy protection enabled in CloudFormation, domain contact privacy is not configurable via CloudFormation. Use the AWS CLI or Console to manage privacy protection settings for registered domains.
    refs:
      - url: https://docs.aws.amazon.com/Route53/latest/DeveloperGuide/domain-privacy-protection.html
        title: Enabling or disabling privacy protection for contact information
  - uid: mondoo-aws-security-route53-domain-contact-privacy-aws
    filters: asset.platform == "aws"
    mql: |
      aws.route53.domains.all(
        adminPrivacy == true && registrantPrivacy == true && techPrivacy == true
      )
  - uid: mondoo-aws-security-route53-domain-contact-privacy-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_route53domains_registered_domain")
    mql: |
      terraform.resources.where(nameLabel == "aws_route53domains_registered_domain").all(
        arguments.admin_privacy == true && arguments.registrant_privacy == true && arguments.tech_privacy == true
      )
  - uid: mondoo-aws-security-route53-domain-contact-privacy-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_route53domains_registered_domain")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_route53domains_registered_domain").all(
        change.after["admin_privacy"] == true && change.after["registrant_privacy"] == true && change.after["tech_privacy"] == true
      )
  - uid: mondoo-aws-security-route53-domain-contact-privacy-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_route53domains_registered_domain")
    mql: |
      terraform.state.resources.where(type == "aws_route53domains_registered_domain").all(
        values["admin_privacy"] == true && values["registrant_privacy"] == true && values["tech_privacy"] == true
      )
  - uid: mondoo-aws-security-route53-domain-auto-renew
    title: Ensure Route 53 registered domains have auto-renew enabled
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: false
      compliance/dora: dora-art-11
      compliance/hipaa: false
      compliance/iso-27001-2022: false
      compliance/nis-2: nis-2-21-2-c
      compliance/nist-csf-1: nist-csf-1-pr-ip-4
      compliance/nist-csf-2: nist-csf-2-pr-ir-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cp-9
      compliance/nist-sp-800-171: false
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc9-1-1
      compliance/vda-isa-5: false
    variants:
      - uid: mondoo-aws-security-route53-domain-auto-renew-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-route53-domain-auto-renew-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-route53-domain-auto-renew-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-route53-domain-auto-renew-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that domains registered through Amazon Route 53 have automatic renewal enabled. Without auto-renew, domains can accidentally expire if manual renewal is missed, allowing attackers to register the lapsed domain and hijack all associated services.

        **Why this matters**

        - Expired domains can be registered by anyone, including attackers, immediately after the redemption grace period ends.
        - An attacker who registers an expired domain gains control over all DNS records, enabling them to intercept web traffic, email, API calls, and issue valid TLS certificates.
        - Organizations have lost control of critical domains due to missed renewal notices caused by outdated contact information, personnel changes, or email filtering.
        - Auto-renew ensures domains are renewed before expiration, provided a valid payment method is on file with the registrar.

        **Risk mitigation**

        - **Domain continuity:** Prevents accidental domain expiration and subsequent hijacking.
        - **Service availability:** Ensures DNS resolution continues uninterrupted for all services depending on the domain.
        - **Operational safety:** Removes dependency on manual renewal processes that can fail due to personnel changes or missed notifications.
      audit: |
        ### Audit via Console

        1. Navigate to the **Route 53 Console** at Services > Route 53.
        2. Select **Registered domains** in the left navigation panel.
        3. Review the **Auto renew** column in the domain list.

        A passing domain shows **Auto renew: Enabled**. A failing domain shows **Auto renew: Disabled**.

        ### Audit via CLI

        1. List all Route 53 registered domains and their auto-renew setting:

        ```bash
        aws route53domains list-domains \
          --region us-east-1 \
          --query "Domains[*].{Domain:DomainName,AutoRenew:AutoRenew,Expiry:Expiry}"
        ```

        A passing domain returns `"AutoRenew": true`. A failing domain returns `"AutoRenew": false`.
      remediation:
        - id: console
          desc: |
            To ensure Route 53 registered domains have auto-renew enabled using the AWS Console:

            1. Navigate to the **Route 53 Console** and select **Registered domains**.
            2. Select the domain name.
            3. Under **Auto-renew**, choose **Enable**.
            4. Verify that a valid payment method is configured in your AWS account.
        - id: cli
          desc: |
            To ensure Route 53 registered domains have auto-renew enabled using the AWS CLI, enable auto-renew for a domain:

            ```bash
            aws route53domains enable-domain-auto-renew \
              --region us-east-1 \
              --domain-name example.com
            ```

            Verify the auto-renew setting:

            ```bash
            aws route53domains list-domains \
              --region us-east-1 \
              --query "Domains[?DomainName=='example.com'].{Domain:DomainName,AutoRenew:AutoRenew}"
            ```
        - id: terraform
          desc: |
            To ensure Route 53 registered domains have auto-renew enabled in Terraform, domain auto-renew is not configurable via Terraform. Route 53 domain registration resources do not support managing auto-renewal settings. Use the AWS CLI or Console to enable auto-renew.
        - id: cloudformation
          desc: |
            To ensure Route 53 registered domains have auto-renew enabled in CloudFormation, domain auto-renew is not configurable via CloudFormation. Use the AWS CLI or Console to manage auto-renewal settings for registered domains.
    refs:
      - url: https://docs.aws.amazon.com/Route53/latest/DeveloperGuide/domain-enable-disable-auto-renewal.html
        title: Enabling or disabling automatic renewal for a domain
  - uid: mondoo-aws-security-route53-domain-auto-renew-aws
    filters: asset.platform == "aws"
    mql: aws.route53.domains.all(autoRenew == true)
  - uid: mondoo-aws-security-route53-domain-auto-renew-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_route53domains_registered_domain")
    mql: |
      terraform.resources.where(nameLabel == "aws_route53domains_registered_domain").all(
        arguments.auto_renew == true
      )
  - uid: mondoo-aws-security-route53-domain-auto-renew-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_route53domains_registered_domain")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_route53domains_registered_domain").all(
        change.after["auto_renew"] == true
      )
  - uid: mondoo-aws-security-route53-domain-auto-renew-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_route53domains_registered_domain")
    mql: |
      terraform.state.resources.where(type == "aws_route53domains_registered_domain").all(
        values["auto_renew"] == true
      )
  - uid: mondoo-aws-security-memorydb-cluster-tls-enabled
    title: Ensure MemoryDB clusters have encryption in transit (TLS) enabled
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    variants:
      - uid: mondoo-aws-security-memorydb-cluster-tls-enabled-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-memorydb-cluster-tls-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-memorydb-cluster-tls-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-memorydb-cluster-tls-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-memorydb-cluster-tls-enabled-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon MemoryDB clusters have encryption in transit (TLS) enabled. TLS encrypts all data transmitted between clients and the MemoryDB cluster, protecting sensitive data from interception on the network.

        **Why this matters**

        - Without TLS, all data transmitted between applications and MemoryDB travels in plaintext, including cached credentials, session tokens, and application data.
        - Network-level attacks such as packet sniffing, man-in-the-middle, and ARP spoofing can intercept unencrypted Redis traffic on shared or compromised networks.
        - TLS must be enabled at cluster creation and cannot be changed afterward. Clusters created without TLS must be recreated to enable encryption in transit.
        - MemoryDB is often used to cache sensitive data such as user sessions, authentication tokens, and API responses, making transport encryption critical.

        **Risk mitigation**

        - **Data confidentiality:** Encrypts all data in transit between clients and the cluster, preventing eavesdropping.
        - **Authentication:** TLS provides mutual authentication, ensuring clients connect to the legitimate cluster endpoint.
        - **Compliance:** Meets encryption-in-transit requirements in PCI DSS, HIPAA, SOC 2, and other frameworks.
      audit: |
        ### Audit via Console

        1. Navigate to the **Amazon MemoryDB Console** at Services > MemoryDB for Redis.
        2. Select **Clusters** in the left navigation panel.
        3. Select the cluster to inspect.
        4. Choose the **Settings** tab.
        5. Locate the **Encryption in transit** field.

        A passing cluster shows **Encryption in transit: Yes**. A failing cluster shows **Encryption in transit: No**.

        ### Audit via CLI

        1. List all MemoryDB clusters and their TLS status:

        ```bash
        aws memorydb describe-clusters \
          --query "Clusters[*].{Name:Name,TLS:TLSEnabled,Status:Status}"
        ```

        A passing cluster returns `"TLS": true`. A failing cluster returns `"TLS": false`.
      remediation:
        - id: console
          desc: |
            To ensure MemoryDB clusters have encryption in transit (TLS) enabled using the AWS Console, TLS cannot be enabled on an existing cluster. To remediate:

            1. Navigate to the **Amazon MemoryDB Console** and select **Clusters**.
            2. Create a new cluster with **Encryption in transit** enabled.
            3. Migrate data from the existing cluster to the new TLS-enabled cluster.
            4. Update application connection strings to use the new cluster endpoint with TLS.
            5. Delete the old cluster after verifying the migration.
        - id: cli
          desc: |
            To ensure MemoryDB clusters have encryption in transit (TLS) enabled using the AWS CLI, create a new MemoryDB cluster with TLS enabled:

            ```bash
            aws memorydb create-cluster \
              --cluster-name secure-memorydb-cluster \
              --node-type db.r6g.large \
              --acl-name my-acl \
              --tls-enabled
            ```

            Verify TLS status on existing clusters:

            ```bash
            aws memorydb describe-clusters \
              --query "Clusters[*].{Name:Name,TLS:TLSEnabled,Status:Status}"
            ```
        - id: terraform
          desc: |
            To ensure MemoryDB clusters have encryption in transit (TLS) enabled in Terraform, enable TLS on a MemoryDB cluster:

            ```hcl
            resource "aws_memorydb_cluster" "example" {
              name          = "secure-memorydb-cluster"
              node_type     = "db.r6g.large"
              acl_name      = "my-acl"
              tls_enabled   = true
            }
            ```
        - id: cloudformation
          desc: |
            To ensure MemoryDB clusters have encryption in transit (TLS) enabled in CloudFormation, set `TLSEnabled` to `true`:

            ```yaml
            Resources:
              MemoryDBCluster:
                Type: AWS::MemoryDB::Cluster
                Properties:
                  ClusterName: secure-memorydb-cluster
                  NodeType: db.r6g.large
                  ACLName: my-acl
                  TLSEnabled: true
            ```
