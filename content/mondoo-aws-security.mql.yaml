  - uid: mondoo-aws-security-appmesh-egress-filter
    title: Ensure App Mesh meshes use DROP_ALL egress filter
    impact: 70
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/vda-isa-5: vda-isa-5-5-2-6
    variants:
      - uid: mondoo-aws-security-appmesh-egress-filter-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-appmesh-egress-filter-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-appmesh-egress-filter-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-appmesh-egress-filter-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-appmesh-egress-filter-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that AWS App Mesh meshes use the DROP_ALL egress filter type. The DROP_ALL filter blocks all outbound traffic from virtual services unless explicitly allowed through virtual services definitions, implementing a deny-by-default network posture.

        **Why this matters**

        - The default ALLOW_ALL egress filter permits all outbound traffic, which can enable data exfiltration and communication with unauthorized external services.
        - DROP_ALL enforces explicit allowlisting of external service dependencies, reducing the attack surface.
        - A deny-by-default network posture is a core principle of zero-trust architectures.
        - NIST SP 800-53 SC-7 requires boundary protection that restricts outbound network traffic.

        **Risk mitigation**

        - **Data exfiltration prevention:** Blocks unauthorized outbound communication from mesh services.
        - **Zero trust:** Enforces explicit allowlisting of all external service dependencies.
        - **Blast radius reduction:** Compromised services cannot reach arbitrary external endpoints.
      remediation:
        - id: console
          desc: |
            To ensure App Mesh meshes use DROP_ALL egress filter using the AWS Console:

            1. Navigate to the **AWS App Mesh Console** and select **Meshes**.
            2. Select the mesh you want to configure.
            3. Choose **Edit**.
            4. Under **Egress filter**, select **DROP_ALL**.
            5. Ensure all required external services are defined as virtual services.
            6. Choose **Save**.
        - id: cli
          desc: |
            To ensure App Mesh meshes use DROP_ALL egress filter using the AWS CLI:

            ```bash
            aws appmesh update-mesh \
              --mesh-name <mesh-name> \
              --spec egressFilter={type=DROP_ALL}
            ```
        - id: terraform
          desc: |
            To ensure App Mesh meshes use DROP_ALL egress filter in Terraform:

            ```hcl
            resource "aws_appmesh_mesh" "example" {
              name = "example-mesh"

              spec {
                egress_filter {
                  type = "DROP_ALL"
                }
              }
            }
            ```
        - id: cloudformation
          desc: |
            Set `Spec.EgressFilter.Type: DROP_ALL` on every `AWS::AppMesh::Mesh` so virtual nodes can only reach destinations defined inside the mesh — no implicit egress to the public internet:

            ```yaml
            Resources:
              Mesh:
                Type: AWS::AppMesh::Mesh
                Properties:
                  MeshName: example
                  Spec:
                    EgressFilter:
                      Type: DROP_ALL
            ```
    refs:
      - url: https://docs.aws.amazon.com/app-mesh/latest/userguide/meshes.html
        title: AWS Documentation - App Mesh meshes
  - uid: mondoo-aws-security-appmesh-egress-filter-aws
    filters: asset.platform == "aws"
    mql: |
      aws.appmesh.meshes.all(egressFilterType == "DROP_ALL")
  - uid: mondoo-aws-security-appmesh-egress-filter-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_appmesh_mesh")
    mql: |
      terraform.resources.where(nameLabel == "aws_appmesh_mesh").all(
        blocks.where(type == "spec").any(
          blocks.where(type == "egress_filter").any(arguments.type == "DROP_ALL")
        )
      )
  - uid: mondoo-aws-security-appmesh-egress-filter-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_appmesh_mesh")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_appmesh_mesh").all(
