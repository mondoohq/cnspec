      )
  - uid: mondoo-aws-security-sagemaker-domain-kms-encryption-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_sagemaker_domain")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_sagemaker_domain").all(
