  - uid: mondoo-aws-security-s3-bucket-level-public-access-prohibited
    title: Ensure Amazon S3 buckets have public access restrictions enforced
    impact: 100
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-2-1
    variants:
      - uid: mondoo-aws-security-s3-bucket-level-public-access-prohibited-bucket
        tags:
          mondoo.com/filter-title: AWS S3 Bucket
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-s3-bucket-level-public-access-prohibited-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-s3-bucket-level-public-access-prohibited-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-s3-bucket-level-public-access-prohibited-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-s3-bucket-level-public-access-prohibited-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that every Amazon S3 bucket has public access block settings enabled at the bucket level, preventing the bucket and its objects from being exposed via public bucket policies, ACLs, or cross-account access grants. While an account-level block public access setting provides a broad safeguard, bucket-level controls ensure defense in depth when the account-level setting is absent or later changed.

        **Why this matters**

        - **Defense in depth:** Bucket-level block settings provide a second layer of control; if the account-level setting is ever disabled, individual bucket controls prevent immediate exposure of every bucket in the account.
        - **Granular visibility:** Bucket-level controls make the access posture of each bucket explicit and independently auditable, rather than relying entirely on an account-wide setting that may not be visible during per-bucket reviews.
        - **ACL and policy override:** Enabling all four block public access options at the bucket level neutralizes misconfigured ACL grants to `AllUsers` or `AuthenticatedUsers` and prevents public bucket policies from being applied, even if attempted by infrastructure automation.

        **Risk mitigation**

        - **Data breach prevention:** Restricting public access at the bucket level ensures that sensitive files cannot be accessed anonymously from the internet, even if a bucket policy or ACL is misconfigured.
        - **Cross-account exposure containment:** Blocking public and cross-account access prevents bucket policies from unintentionally granting access to external AWS accounts or the general public.
        - **Automated deployment safety:** Infrastructure-as-code pipelines that create or modify bucket policies cannot inadvertently make a bucket public when all four block settings are enforced at the bucket level.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and open the S3 console at https://console.aws.amazon.com/s3/.
        2. Select a bucket from the list.
        3. Choose the **Permissions** tab.
        4. Under **Block public access (bucket settings)**, verify that all four settings are enabled:
           - Block public access to buckets and objects granted through new access control lists (ACLs)
           - Block public access to buckets and objects granted through any access control lists (ACLs)
           - Block public access to buckets and objects granted through new public bucket policies
           - Block public and cross-account access to buckets and objects with public policies
        5. Repeat for each bucket in scope.

        A passing bucket shows all four block public access settings enabled. A failing bucket has one or more settings disabled.

        ### Audit via CLI

        1. List all S3 buckets:

        ```bash
        aws s3api list-buckets --query "Buckets[*].Name" --output text
        ```

        2. For each bucket, retrieve the public access block configuration:

        ```bash
        aws s3api get-public-access-block --bucket <bucket-name> --query "PublicAccessBlockConfiguration"
        ```

        A passing bucket returns an object where `BlockPublicAcls`, `IgnorePublicAcls`, `BlockPublicPolicy`, and `RestrictPublicBuckets` are all `true`. A failing bucket has one or more fields set to `false`, or returns a `NoSuchPublicAccessBlockConfiguration` error.
      remediation:
        - id: console
          desc: |
            To ensure Amazon S3 buckets have public access restrictions enforced using the AWS Console:

            1.  Navigate to the AWS S3 Console.
            2.  Select a bucket and go to the Permissions tab.
            3.  Under Block public access (bucket settings), ensure the following options are enabled:
              - Block public access to buckets and objects granted through new access control lists (ACLs)
              - Block public access to buckets and objects granted through any access control lists (ACLs)
              - Block public access to buckets and objects granted through new public bucket policies
              - Block public and cross-account access to buckets that have public policies
            4.  Under Bucket policy, review the policy and ensure it does not allow `Principal: "*"` or overly permissive access rules.
            5.  Under Access Control List (ACLs), verify that no objects or buckets have `READ` or `WRITE` permissions assigned to Everyone `(public)` or `Authenticated Users`.
            6.  Save changes and confirm that public access is fully restricted.
        - id: cli
          desc: |
            To ensure Amazon S3 buckets have public access restrictions enforced using the AWS CLI, check the public access block settings for a specific bucket:

            ```bash
            aws s3api get-public-access-block --bucket <bucket-name>
            ```

            If public access is not fully blocked, apply the following settings:

            ```bash
            aws s3api put-public-access-block --bucket <bucket-name> --public-access-block-configuration '{
                "BlockPublicAcls": true,
                "IgnorePublicAcls": true,
                "BlockPublicPolicy": true,
                "RestrictPublicBuckets": true
            }'
            ```

            Check if the bucket policy allows public access:

            ```bash
            aws s3api get-bucket-policy --bucket <bucket-name> --query "Policy"
            ```

            If a policy allows public access (Principal: "*", "Effect": "Allow", and "Action": "s3:*"), remove or modify it:

            ```bash
            aws s3api delete-bucket-policy --bucket <bucket-name>
            ```

            Check if ACLs allow public or cross-account access:

            ```bash
            aws s3api get-bucket-acl --bucket <bucket-name>
            ```

            If ACLs allow public access ("Grantee": { "URI": "http://acs.amazonaws.com/groups/global/AllUsers" }), remove the ACL:

            ```bash
            aws s3api put-bucket-acl --bucket <bucket-name> --acl private
            ```
        - id: terraform
          desc: |
            To ensure Amazon S3 buckets have public access restrictions enforced in Terraform, ensure S3 public access block settings are enforced at the bucket level:

            ```hcl
            resource "aws_s3_bucket_public_access_block" "secure_bucket" {
              bucket = aws_s3_bucket.my_bucket.id

              block_public_acls       = true
              ignore_public_acls      = true
              block_public_policy     = true
              restrict_public_buckets = true
            }
            ```

            Ensure S3 bucket policies do not allow public access:

            ```hcl
            resource "aws_s3_bucket_policy" "secure_policy" {
              bucket = aws_s3_bucket.my_bucket.id
              policy = jsonencode({
                Version = "2012-10-17",
                Statement = [
                  {
                    Effect    = "Deny",
                    Principal = "*",
                    Action    = "s3:*",
                    Resource  = [
                      "arn:aws:s3:::${aws_s3_bucket.my_bucket.id}",
                      "arn:aws:s3:::${aws_s3_bucket.my_bucket.id}/*"
                    ],
                    Condition = {
                      Bool = {
                        "aws:SecureTransport": "false"
                      }
                    }
                  }
                ]
              })
            }
            ```
        - id: cloudformation
          desc: |
            To ensure Amazon S3 buckets have public access restrictions enforced in CloudFormation, use the `PublicAccessBlockConfiguration` property within the `AWS::S3::Bucket` resource to enable public access blocking at the bucket level:

            ```yaml
            Resources:
              SecureBucket:
                Type: AWS::S3::Bucket
                Properties:
                  PublicAccessBlockConfiguration:
                    BlockPublicAcls: true
                    BlockPublicPolicy: true
                    IgnorePublicAcls: true
                    RestrictPublicBuckets: true

              SecureBucketPolicy:
                Type: AWS::S3::BucketPolicy
                Properties:
                  Bucket: !Ref SecureBucket
                  PolicyDocument:
                    Version: '2012-10-17'
                    Statement:
                      - Effect: Deny
                        Principal: '*'
                        Action: 's3:*'
                        Resource:
                          - !Sub 'arn:aws:s3:::${SecureBucket}'
                          - !Sub 'arn:aws:s3:::${SecureBucket}/*'
                        Condition:
                          Bool:
                            'aws:SecureTransport': 'false'
            ```
    refs:
      - url: https://docs.aws.amazon.com/securityhub/latest/userguide/securityhub-controls-reference.html
        title: AWS Documentation - Security Hub controls reference
      - url: https://docs.aws.amazon.com/AmazonS3/latest/userguide/access-control-block-public-access.html
        title: AWS Documentation - Blocking public access to your Amazon S3 storage
      - url: https://docs.aws.amazon.com/AmazonS3/latest/userguide/access-control-block-public-access.html
        title: AWS CLI Command Reference - aws s3api put-public-access-block
      - url: https://registry.terraform.io/providers/hashicorp/aws/latest/docs/resources/s3_bucket_public_access_block
        title: Terraform Documentation - AWS Provider - aws_s3_bucket_public_access_block
