  - uid: mondoo-aws-security-timestream-influxdb-not-public
    title: Ensure Timestream InfluxDB instances are not publicly accessible
    impact: 90
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-6
    variants:
      - uid: mondoo-aws-security-timestream-influxdb-not-public-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-timestream-influxdb-not-public-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-timestream-influxdb-not-public-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-timestream-influxdb-not-public-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-timestream-influxdb-not-public-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon Timestream for InfluxDB instances and clusters are not configured with public accessibility. Publicly accessible database instances can be reached from the internet, significantly increasing the attack surface.

        **Why this matters**

        - **Direct internet exposure**: Publicly accessible instances can be targeted by automated scanners, brute force attacks, and exploitation of known vulnerabilities.
        - **Data exfiltration risk**: If authentication is weak or credentials are compromised, attackers can access time-series data directly from the internet.
        - **Compliance violations**: Most security frameworks require databases to be deployed in private subnets without direct internet access.
        - **Lateral movement**: A compromised public-facing database can serve as a pivot point for accessing other resources in the VPC.
      remediation:
        - id: console
          desc: |
            To ensure Timestream InfluxDB instances are not publicly accessible using the AWS Console:

            1. Navigate to the **Amazon Timestream** console and select **InfluxDB instances** or **InfluxDB clusters**.
            2. Select the resource to review its connectivity configuration.
            3. If the instance is publicly accessible, it must be recreated in a private subnet:
               - Create a new instance with **Publicly accessible** set to **No** and place it in private subnets.
               - Migrate data from the public instance to the new private instance.
               - Update application connection strings to point to the new endpoint.
               - Delete the publicly accessible instance.

            Note: Public accessibility is set at creation time and cannot be modified after creation.
        - id: cli
          desc: |
            To ensure Timestream InfluxDB instances are not publicly accessible using the AWS CLI, when creating an InfluxDB instance, ensure it is placed in private subnets:

            ```bash
            aws timestream-influxdb create-db-instance \
              --name <name> \
              --db-instance-type db.influx.medium \
              --vpc-subnet-ids <private-subnet-ids> \
              --no-publicly-accessible \
              --allocated-storage 20
            ```
        - id: terraform
          desc: |
            To ensure Timestream InfluxDB instances are not publicly accessible in Terraform:

            ```hcl
            resource "aws_timestreaminfluxdb_db_instance" "example" {
              name                = "example"
              db_instance_type    = "db.influx.medium"
              allocated_storage   = 20
              vpc_subnet_ids      = [aws_subnet.private.id]
              publicly_accessible = false
            }
            ```
        - id: cloudformation
          desc: |
            To ensure Timestream InfluxDB instances are not publicly accessible in CloudFormation:

            ```yaml
            Resources:
              MyInfluxDBInstance:
                Type: AWS::Timestream::InfluxDBInstance
                Properties:
                  Name: example
                  DbInstanceType: db.influx.medium
                  AllocatedStorage: 20
                  PubliclyAccessible: false
                  VpcSubnetIds:
                    - !Ref PrivateSubnet
            ```
    refs:
      - url: https://docs.aws.amazon.com/timestream/latest/developerguide/timestream-influxdb.html
        title: Amazon Timestream for InfluxDB
  - uid: mondoo-aws-security-timestream-influxdb-not-public-aws
    filters: asset.platform == "aws"
    mql: |
      aws.timestream.influxdb.instances.all(publiclyAccessible == false)
      aws.timestream.influxdb.clusters.all(publiclyAccessible == false)
  - uid: mondoo-aws-security-timestream-influxdb-not-public-terraform-hcl
