  - uid: mondoo-aws-security-efs-encrypted-check
    title: Ensure EFS is configured to encrypt file data using KMS
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-aws-security-efs-encrypted-check-aws
        tags:
          mondoo.com/filter-title: AWS EFS File System
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-efs-encrypted-check-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-efs-encrypted-check-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-efs-encrypted-check-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-efs-encrypted-check-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon Elastic File System file systems are configured to encrypt file data at rest using AWS Key Management Service. By default, EFS does not enable encryption unless the account-level default or an explicit creation parameter requires it, meaning new file systems may store data in plaintext unless encryption is deliberately enforced.

        **Why this matters**

        - **Data confidentiality:** Encryption at rest ensures that raw storage blocks are unreadable without the corresponding KMS key, protecting against unauthorized access to the underlying storage infrastructure.
        - **Key lifecycle management:** KMS provides centralized control over key creation, rotation, and deletion, giving security teams visibility into who holds decryption authority.
        - **Access auditing:** All KMS key operations are logged in CloudTrail, creating a verifiable record of data-access events for the file system.
        - **Compliance coverage:** Regulated workloads storing personal health information, payment card data, or other sensitive records require encryption at rest as a baseline control.

        **Risk mitigation**

        - **Storage-layer compromise:** If an attacker gains access to the physical or logical storage layer, encryption prevents them from reading plaintext file data.
        - **Insider threat:** Restricting KMS key access via IAM policies limits which principals can decrypt data even if they have direct EFS permissions.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and open the EFS console at https://console.aws.amazon.com/efs/.
        2. Choose **File systems** in the left navigation pane.
        3. Select a file system and open the **General** tab.
        4. Check the **Encrypted** field and the **KMS key** field. Encryption must be enabled and a KMS key must be assigned.

        A passing file system shows **Encrypted: Yes** and a KMS key ARN. A failing file system shows **Encrypted: No** or shows encryption enabled with no KMS key.

        ### Audit via CLI

        1. List all EFS file systems with their encryption status and KMS key configuration:

        ```bash
        aws efs describe-file-systems --query "FileSystems[*].{FileSystemId:FileSystemId,Encrypted:Encrypted,KmsKeyId:KmsKeyId}" --output table
        ```

        A passing file system shows `Encrypted: true` and a non-empty `KmsKeyId`. A failing file system shows `Encrypted: false` or an empty `KmsKeyId`.
      remediation:
        - id: console
          desc: |
            To ensure EFS is configured to encrypt file data using KMS using the AWS Console:

            1.  Navigate to the AWS EFS Console.
            2.  Select File Systems from the left panel.
            3.  Identify file systems that do not have encryption enabled.
            4.  If an EFS file system is not encrypted, encryption cannot be enabled on an existing file system. You must:
              - Create a new EFS file system with encryption enabled.
              - Migrate data from the old unencrypted file system to the new encrypted one.
            5.  While creating a new file system:
              - Under General settings, check Enable encryption.
              - Select AWS KMS as the encryption provider.
              - Choose a customer-managed KMS key (CMK) if required.
            6.  Once data migration is complete, delete the old unencrypted file system.
        - id: cli
          desc: |
            To ensure EFS is configured to encrypt file data using KMS using the AWS CLI, check if an EFS file system is encrypted:

            ```bash
            aws efs describe-file-systems --query "FileSystems[*].{FileSystemId:FileSystemId, Encrypted:Encrypted}"
            ```

            Create an encrypted EFS file system using a KMS key:

            ```bash
            aws efs create-file-system --creation-token "secure-efs" --encrypted --kms-key-id "arn:aws:kms:region:account-id:key/key-id"
            ```
        - id: terraform
          desc: |
            To ensure EFS is configured to encrypt file data using KMS in Terraform, ensure EFS encryption is enabled with an AWS KMS key:

            ```hcl
            resource "aws_kms_key" "efs_encryption_key" {
              description             = "KMS key for EFS encryption"
              enable_key_rotation     = true
            }

            resource "aws_efs_file_system" "secure_efs" {
              encrypted  = true
              kms_key_id = aws_kms_key.efs_encryption_key.arn
            }
            ```
        - id: cloudformation
          desc: |
            To ensure EFS is configured to encrypt file data using KMS in CloudFormation, ensure EFS file systems are encrypted using AWS KMS:

            ```yaml
            Resources:
              SecureEFS:
                Type: "AWS::EFS::FileSystem"
                Properties:
                  Encrypted: true
                  KmsKeyId: !Ref EFSKMSKey

              EFSKMSKey:
                Type: "AWS::KMS::Key"
                Properties:
                  Description: "KMS key for EFS encryption"
                  EnableKeyRotation: true
            ```
    refs:
      - url: https://docs.aws.amazon.com/efs/latest/ug/security-considerations.html
        title: AWS Documentation - Security in Amazon EFS
      - url: https://registry.terraform.io/providers/hashicorp/aws/latest/docs/resources/efs_file_system
        title: Terraform Registry - aws_efs_file_system resource
      - url: https://docs.aws.amazon.com/efs/latest/ug/creating-using-create-fs.html#creating-using-fs-part1-cli
        title: AWS Documentation - Creating a file system using the AWS CLI
