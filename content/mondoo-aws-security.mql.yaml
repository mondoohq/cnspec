            Create a processing job with inter-container traffic encryption:

            ```bash
            aws sagemaker create-processing-job \
              --processing-job-name "encrypted-processing-job" \
              --app-specification ImageUri=<image-uri> \
              --role-arn "arn:aws:iam::<account-id>:role/SageMakerRole" \
              --processing-resources '{"ClusterConfig":{"InstanceType":"ml.m5.large","InstanceCount":2,"VolumeSizeInGB":50}}' \
              --network-config EnableInterContainerTrafficEncryption=true
            ```
        - id: terraform
          desc: |
            **Using Terraform**

            Ensure SageMaker processing jobs have inter-container traffic encryption:

            ```hcl
            resource "aws_sagemaker_processing_job" "example" {
              processing_job_name = "encrypted-processing-job"
              role_arn            = aws_iam_role.sagemaker.arn

              network_config {
                enable_inter_container_traffic_encryption = true
              }

              app_specification {
                image_uri = "<image-uri>"
              }

              processing_resources {
                cluster_config {
                  instance_type  = "ml.m5.large"
                  instance_count = 2
                  volume_size    = 50
                }
              }
            }
            ```
    refs:
      - url: https://docs.aws.amazon.com/sagemaker/latest/dg/train-encrypt.html
        title: Amazon SageMaker - Protect Communications Between ML Compute Instances
  - uid: mondoo-aws-security-sagemaker-processing-job-encryption-aws
    filters: asset.platform == "aws"
    mql: aws.sagemaker.processingJobs.all(enableInterContainerTrafficEncryption == true)
  - uid: mondoo-aws-security-sagemaker-processing-job-vpc-configured
    title: Ensure SageMaker processing jobs are deployed within a VPC
    impact: 70
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/soc2-2017: soc2-control-cc6-1-5
    variants:
      - uid: mondoo-aws-security-sagemaker-processing-job-vpc-configured-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/icon: aws
    docs:
      desc: |
        This check ensures that Amazon SageMaker processing jobs are deployed within a VPC. Running processing jobs in a VPC provides network-level access controls and keeps data transfer within the AWS private network.

        **Why this matters**

        Without VPC configuration, processing containers communicate over the public internet, which:

        - Increases exposure to network-based attacks during data transfer.
        - Prevents the use of security groups and NACLs to restrict access.
        - May not meet organizational requirements for network isolation of data processing workloads.

        Deploying processing jobs within a VPC ensures that all network traffic stays within your controlled network environment.

        **Risk mitigation:**

        - Restricts network access using security groups and NACLs.
        - Enables private connectivity to S3 and other AWS services via VPC endpoints.
        - Keeps data transfer within the AWS private network.
      remediation:
        - id: cli
          desc: |
            **Using AWS CLI**

            Create a processing job within a VPC:

            ```bash
            aws sagemaker create-processing-job \
              --processing-job-name "vpc-processing-job" \
              --app-specification ImageUri=<image-uri> \
              --role-arn "arn:aws:iam::<account-id>:role/SageMakerRole" \
              --processing-resources '{"ClusterConfig":{"InstanceType":"ml.m5.large","InstanceCount":1,"VolumeSizeInGB":50}}' \
              --network-config VpcConfig='{SecurityGroupIds=["sg-12345678"],Subnets=["subnet-12345678","subnet-87654321"]}'
            ```
        - id: terraform
          desc: |
            **Using Terraform**

            Ensure SageMaker processing jobs are deployed within a VPC:

            ```hcl
            resource "aws_sagemaker_processing_job" "example" {
              processing_job_name = "vpc-processing-job"
              role_arn            = aws_iam_role.sagemaker.arn

              network_config {
                vpc_config {
                  security_group_ids = [aws_security_group.sagemaker.id]
                  subnets            = [aws_subnet.private_a.id, aws_subnet.private_b.id]
                }
              }

              app_specification {
                image_uri = "<image-uri>"
              }

              processing_resources {
                cluster_config {
                  instance_type  = "ml.m5.large"
                  instance_count = 1
                  volume_size    = 50
                }
              }
            }
            ```
    refs:
      - url: https://docs.aws.amazon.com/sagemaker/latest/dg/process-vpc.html
        title: Amazon SageMaker - Give SageMaker Processing Jobs Access to Resources in Your VPC
  - uid: mondoo-aws-security-sagemaker-processing-job-vpc-configured-aws
    filters: asset.platform == "aws"
    mql: aws.sagemaker.processingJobs.all(vpcConfig != empty)
  - uid: mondoo-aws-security-sagemaker-domain-kms-encryption
    title: Ensure SageMaker domains are encrypted with a KMS key
    impact: 70
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/soc2-2017: soc2-control-cc6-1-10
    variants:
      - uid: mondoo-aws-security-sagemaker-domain-kms-encryption-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/icon: aws
    docs:
      desc: |
        This check ensures that Amazon SageMaker domains are configured with a KMS key for encrypting the EFS volume that stores user data. SageMaker domains use an EFS file system to store notebooks, data, and artifacts for all users in the domain.

        **Why this matters**

        SageMaker domains store sensitive data including notebooks, training scripts, datasets, and model artifacts in an Amazon EFS file system. Without KMS encryption:

        - Sensitive ML data is stored without customer-controlled encryption.
        - No centralized key management or auditing of encryption key usage.
        - Compliance requirements for encryption at rest may not be met.
        - Inability to control access to encrypted data through KMS key policies.

        Configuring a KMS key for the domain ensures that all data in the EFS volume is encrypted with a customer-managed key.

        **Risk mitigation:**

        - Protects sensitive ML data at rest with customer-managed encryption.
        - Enables centralized key management and rotation through AWS KMS.
        - Provides audit trail of encryption key usage via CloudTrail.
        - Supports compliance with frameworks requiring encryption at rest.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            1. Navigate to the Amazon SageMaker Console.
            2. Select **Domains** in the left panel.
            3. Note: KMS encryption must be configured at domain creation time and cannot be changed after creation.
            4. To remediate, create a new domain with KMS encryption:
               - Select **Create domain**.
               - In the **Encryption** section, select a KMS key.
               - Configure other domain settings as needed.
               - Migrate users and data to the new domain.
            5. Delete the unencrypted domain once migration is complete.
        - id: cli
          desc: |
            **Using AWS CLI**

            Create a SageMaker domain with KMS encryption:

            ```bash
            aws sagemaker create-domain \
              --domain-name "encrypted-domain" \
              --auth-mode "IAM" \
              --default-user-settings ExecutionRole=arn:aws:iam::<account-id>:role/SageMakerRole \
              --subnet-ids subnet-12345678 subnet-87654321 \
              --vpc-id vpc-12345678 \
              --kms-key-id "arn:aws:kms:<region>:<account-id>:key/<key-id>"
            ```
        - id: terraform
          desc: |
            **Using Terraform**

            Ensure SageMaker domains are encrypted with a KMS key:

            ```hcl
            resource "aws_kms_key" "sagemaker_domain" {
              description         = "KMS key for SageMaker domain EFS encryption"
              enable_key_rotation = true
            }

            resource "aws_sagemaker_domain" "example" {
              domain_name = "encrypted-domain"
              auth_mode   = "IAM"
              vpc_id      = aws_vpc.main.id
              subnet_ids  = [aws_subnet.private_a.id, aws_subnet.private_b.id]
              kms_key_id  = aws_kms_key.sagemaker_domain.arn

              default_user_settings {
                execution_role = aws_iam_role.sagemaker.arn
              }
            }
            ```
    refs:
      - url: https://docs.aws.amazon.com/sagemaker/latest/dg/encryption-at-rest.html
        title: Amazon SageMaker - Encryption at Rest
  - uid: mondoo-aws-security-sagemaker-domain-kms-encryption-aws
    filters: asset.platform == "aws"
    mql: aws.sagemaker.domains.all(kmsKey != empty)
  - uid: mondoo-aws-security-mq-audit-logging
    title: Ensure Amazon MQ brokers have audit logging enabled
    impact: 60
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/soc2-2017: soc2-control-cc7-2-1
    variants:
      - uid: mondoo-aws-security-mq-audit-logging-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/icon: aws
    docs:
      desc: |
        This check ensures that Amazon MQ ActiveMQ brokers have audit logging enabled. Audit logs capture administrative actions such as broker creation, modification, and deletion, providing a detailed record of who performed which operations and when. Note: This check only applies to ActiveMQ engine types, as RabbitMQ brokers on Amazon MQ do not support audit logging.

        **Why this matters**

        - Audit logs are essential for detecting unauthorized administrative changes to message broker configurations.
        - Without audit logging, security teams lack the visibility needed to investigate suspicious activity or configuration drift.
        - Many compliance frameworks, including ISO 27001, NIST SP 800-53, and SOC 2, require audit trails for administrative access to critical infrastructure components.

        **Risk mitigation:**

        - **Accountability:** Audit logs attribute administrative actions to specific IAM principals, enabling accountability and forensic investigation.
        - **Threat detection:** Log data can be shipped to SIEM systems or CloudWatch Logs Insights to detect anomalous administrative patterns.
        - **Compliance:** Supports audit trail requirements across multiple regulatory frameworks.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            1. Navigate to the **Amazon MQ Console** and select **Brokers**.
            2. Select the broker you want to configure.
            3. Choose **Edit**.
            4. Under **Logs**, enable **Audit logs**.
            5. Choose **Save** to apply the changes.
        - id: cli
          desc: |
            **Using AWS CLI**

            Update an existing broker to enable audit logging:

            ```bash
            aws mq update-broker \
              --broker-id <broker-id> \
              --logs '{"Audit": true}'
            ```

            Verify the logging configuration:

            ```bash
            aws mq describe-broker --broker-id <broker-id> \
              --query "Logs"
            ```
    refs:
      - url: https://docs.aws.amazon.com/amazon-mq/latest/developer-guide/security-logging-monitoring.html
        title: Amazon MQ - Logging and Monitoring
  - uid: mondoo-aws-security-mq-audit-logging-aws
    filters: asset.platform == "aws"
    mql: |
      aws.mq.brokers.where(engineType == "ACTIVEMQ").all(auditLogsEnabled == true)
  - uid: mondoo-aws-security-mq-general-logging
    title: Ensure Amazon MQ brokers have general logging enabled
    impact: 30
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/soc2-2017: soc2-control-cc7-2-1
    variants:
      - uid: mondoo-aws-security-mq-general-logging-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/icon: aws
    docs:
      desc: |
        This check ensures that Amazon MQ brokers have general logging enabled. General logs capture broker-level events such as connections, disconnections, message delivery failures, and broker lifecycle events, providing operational visibility into broker activity.

        **Why this matters**

        - General logs are the primary source of operational and security telemetry for Amazon MQ brokers.
        - Without general logging, teams cannot detect anomalous connection patterns, authentication failures, or message processing errors.
        - Log data from Amazon MQ can be forwarded to CloudWatch Logs for centralized monitoring, alerting, and long-term retention.

        **Risk mitigation:**

        - **Operational visibility:** General logs provide insight into broker health, client connectivity, and message throughput.
        - **Security monitoring:** Connection and authentication events in general logs can reveal unauthorized access attempts.
        - **Incident response:** Log data is critical for reconstructing the timeline of events during a security incident.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            1. Navigate to the **Amazon MQ Console** and select **Brokers**.
            2. Select the broker you want to configure.
            3. Choose **Edit**.
            4. Under **Logs**, enable **General logs**.
            5. Choose **Save** to apply the changes.
        - id: cli
          desc: |
            **Using AWS CLI**

            Update an existing broker to enable general logging:

            ```bash
            aws mq update-broker \
              --broker-id <broker-id> \
              --logs '{"General": true}'
            ```

            Verify the logging configuration:

            ```bash
            aws mq describe-broker --broker-id <broker-id> \
              --query "Logs"
            ```
    refs:
      - url: https://docs.aws.amazon.com/amazon-mq/latest/developer-guide/security-logging-monitoring.html
        title: Amazon MQ - Logging and Monitoring
  - uid: mondoo-aws-security-mq-general-logging-aws
    filters: asset.platform == "aws"
    mql: |
      aws.mq.brokers.all(generalLogsEnabled == true)
  - uid: mondoo-aws-security-mq-no-public-access
    title: Ensure Amazon MQ brokers are not publicly accessible
    impact: 90
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/soc2-2017: soc2-control-cc6-6-1
    variants:
      - uid: mondoo-aws-security-mq-no-public-access-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/icon: aws
    docs:
      desc: |
        This check ensures that Amazon MQ brokers are not publicly accessible over the internet. Publicly accessible brokers expose their management console and messaging endpoints to the public internet, significantly increasing the attack surface for unauthorized access and denial-of-service attacks.

        **Why this matters**

        - Amazon MQ brokers deployed with public accessibility are reachable from any IP address on the internet, exposing the AMQP, MQTT, OpenWire, STOMP, and WebSocket endpoints to potential attackers.
        - Message broker credentials, even when strong, are subject to brute-force and credential-stuffing attacks when endpoints are internet-facing.
        - Publicly accessible brokers also expose the ActiveMQ web console, which has historically been a target for remote code execution exploits.

        **Risk mitigation:**

        - **Network isolation:** Deploying brokers in a VPC without public accessibility ensures only authorized resources within the VPC can reach the broker endpoints.
        - **Reduced attack surface:** Eliminates exposure to internet-based scanning, brute-force, and exploitation attempts.
        - **Defense in depth:** Complements authentication controls by ensuring that network-layer access is restricted to trusted sources.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            Note: Public accessibility cannot be changed after a broker is created. You must create a new broker without public accessibility and migrate your workloads.

            1. Navigate to the **Amazon MQ Console** and choose **Create broker**.
            2. In the **Network & Security** section, ensure **Public accessibility** is set to **No**.
            3. Configure your VPC, subnets, and security groups to allow access only from trusted sources.
            4. Migrate clients from the public broker to the new private broker.
            5. Delete the publicly accessible broker.
        - id: cli
          desc: |
            **Using AWS CLI**

            Create a new broker without public accessibility:

            ```bash
            aws mq create-broker \
              --broker-name <broker-name> \
              --broker-instance-type mq.m5.large \
              --deployment-mode SINGLE_INSTANCE \
              --engine-type ACTIVEMQ \
              --engine-version "5.17.6" \
              --publicly-accessible false \
              --subnet-ids <subnet-id> \
              --users Username=admin,Password=<password>,ConsoleAccess=true
            ```

            List brokers and check public accessibility:

            ```bash
            aws mq list-brokers --query "BrokerSummaries[*].{Id:BrokerId,Name:BrokerName,Public:BrokerState}"
            ```
    refs:
      - url: https://docs.aws.amazon.com/amazon-mq/latest/developer-guide/accessing-web-console-of-a-broker.html
        title: Amazon MQ - Accessing the Web Console
      - url: https://docs.aws.amazon.com/amazon-mq/latest/developer-guide/security-api-authentication-authorization.html
        title: Amazon MQ - API Authentication and Authorization
  - uid: mondoo-aws-security-mq-no-public-access-aws
    filters: asset.platform == "aws"
    mql: |
      aws.mq.brokers.all(publiclyAccessible == false)
  - uid: mondoo-aws-security-msk-encryption-at-rest
    title: Ensure MSK clusters use a customer-managed KMS key
    impact: 70
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/soc2-2017: soc2-control-cc6-1-10
    variants:
      - uid: mondoo-aws-security-msk-encryption-at-rest-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/icon: aws
    docs:
      desc: |
        This check ensures that Amazon MSK (Managed Streaming for Apache Kafka) clusters are configured to use a customer-managed AWS KMS key for encryption of data at rest. By default, MSK encrypts data at rest using an AWS-managed key, but using a customer-managed key (CMK) provides greater control over key lifecycle and access policies.

        **Why this matters**

        - Without a customer-managed KMS key, organizations cannot enforce fine-grained access controls over who can decrypt broker storage, nor can they audit key usage through CloudTrail.
        - A customer-managed CMK enables key rotation policies, cross-account sharing controls, and the ability to revoke access by disabling or deleting the key.
        - Many compliance standards, including PCI DSS, HIPAA, and SOC 2, require demonstrable control over encryption keys used to protect sensitive data at rest.

        **Risk mitigation:**

        - **Key control:** Customer-managed keys give organizations full lifecycle control, including rotation and revocation.
        - **Audit trail:** All KMS key usage is logged to CloudTrail, providing a complete record of data access events.
        - **Compliance:** Satisfies encryption key management requirements in multiple regulatory frameworks.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            Note: Encryption at rest settings cannot be changed after an MSK cluster is created. A new cluster must be created with the desired KMS key.

            1. Navigate to the **Amazon MSK Console** and choose **Create cluster**.
            2. Under **Security**, in the **Encryption at rest** section, select **Use a custom KMS key**.
            3. Select an existing KMS key or create a new one.
            4. Complete the cluster configuration and create the cluster.
            5. Migrate producers and consumers to the new cluster and decommission the old one.
        - id: cli
          desc: |
            **Using AWS CLI**

            Create an MSK cluster with a customer-managed KMS key:

            ```bash
            aws kafka create-cluster \
              --cluster-name <cluster-name> \
              --broker-node-group-info file://broker-node-group.json \
              --kafka-version "3.5.1" \
              --number-of-broker-nodes 3 \
              --encryption-info EncryptionAtRest={DataVolumeKMSKeyId=arn:aws:kms:<region>:<account-id>:key/<key-id>}
            ```

            Verify the encryption configuration of an existing cluster:

            ```bash
            aws kafka describe-cluster --cluster-arn <cluster-arn> \
              --query "ClusterInfo.EncryptionInfo.EncryptionAtRest"
            ```
    refs:
      - url: https://docs.aws.amazon.com/msk/latest/developerguide/msk-encryption.html
        title: Amazon MSK - Encryption at Rest
  - uid: mondoo-aws-security-msk-encryption-at-rest-aws
    filters: asset.platform == "aws"
    mql: |
      aws.msk.clusters.all(kmsKey != empty)
  - uid: mondoo-aws-security-msk-encryption-in-transit
    title: Ensure MSK clusters encrypt data in transit with TLS
    impact: 80
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/soc2-2017: soc2-control-cc6-7-2
    variants:
      - uid: mondoo-aws-security-msk-encryption-in-transit-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/icon: aws
    docs:
      desc: |
        This check ensures that Amazon MSK clusters are configured to require TLS encryption for all client-to-broker communication. MSK supports three modes for client-broker encryption in transit: TLS only, plaintext only, or TLS preferred (allows both). Only the TLS-only setting prevents unencrypted data from traversing the network.

        **Why this matters**

        - Kafka clients communicating over plaintext connections transmit message payloads, consumer group metadata, and topic data in the clear, making them vulnerable to network-level interception.
        - The "TLS preferred" setting allows clients to fall back to plaintext, which can silently result in unencrypted communication if clients are misconfigured.
        - Enforcing TLS-only ensures that all data in transit between producers, consumers, and brokers is encrypted, regardless of client configuration.

        **Risk mitigation:**

        - **Confidentiality:** TLS encryption prevents eavesdropping on Kafka message streams in transit across the network.
        - **Integrity:** TLS protects against tampering with messages as they travel between clients and brokers.
        - **Compliance:** Satisfies in-transit encryption requirements under PCI DSS, HIPAA, NIST SP 800-53 SC-8, and SOC 2.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            Note: Encryption in transit settings cannot be changed after cluster creation. A new cluster must be created with the desired setting.

            1. Navigate to the **Amazon MSK Console** and choose **Create cluster**.
            2. Under **Security**, in the **Encryption in transit** section, set **Client-broker encryption** to **TLS**.
            3. Complete the cluster configuration and create the cluster.
            4. Update Kafka client configurations to use TLS and point to the new cluster endpoints.
            5. Decommission the old cluster once migration is complete.
        - id: cli
          desc: |
            **Using AWS CLI**

            Create an MSK cluster with TLS-only client-broker encryption:

            ```bash
            aws kafka create-cluster \
              --cluster-name <cluster-name> \
              --broker-node-group-info file://broker-node-group.json \
              --kafka-version "3.5.1" \
              --number-of-broker-nodes 3 \
              --encryption-info EncryptionInTransit={ClientBroker=TLS,InCluster=true}
            ```

            Verify the encryption in transit settings:

            ```bash
            aws kafka describe-cluster --cluster-arn <cluster-arn> \
              --query "ClusterInfo.EncryptionInfo.EncryptionInTransit"
            ```
    refs:
      - url: https://docs.aws.amazon.com/msk/latest/developerguide/msk-encryption.html
        title: Amazon MSK - Encryption in Transit
  - uid: mondoo-aws-security-msk-encryption-in-transit-aws
    filters: asset.platform == "aws"
    mql: |
      aws.msk.clusters.all(encryptionInTransitClientBroker == "TLS")
  - uid: mondoo-aws-security-msk-logging-enabled
    title: Ensure MSK clusters have logging enabled
    impact: 50
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/soc2-2017: soc2-control-cc7-2-1
    variants:
      - uid: mondoo-aws-security-msk-logging-enabled-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/icon: aws
    docs:
      desc: |
        This check ensures that Amazon MSK clusters have broker logging enabled to at least one destination: Amazon CloudWatch Logs, Amazon S3, or Amazon Kinesis Data Firehose. Broker logs capture Kafka broker events including connection events, topic activity, and error conditions.

        **Why this matters**

        - MSK broker logs provide visibility into Kafka cluster operations, enabling detection of abnormal consumer group activity, authentication failures, and replication issues.
        - Without logging, security teams lack the data needed to investigate incidents, detect unauthorized access, or perform compliance audits on Kafka workloads.
        - Centralizing logs in CloudWatch, S3, or Firehose enables integration with SIEM systems and supports long-term log retention policies.

        **Risk mitigation:**

        - **Security monitoring:** Broker logs contain connection and authentication events that can indicate unauthorized access attempts.
        - **Compliance:** Logging requirements under NIST SP 800-53 AU-6, ISO 27001 A.8.15, and SOC 2 CC7.2 require collection and review of audit logs from critical infrastructure.
        - **Operational insight:** Logs support diagnosis of performance issues, replication failures, and consumer lag.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            1. Navigate to the **Amazon MSK Console** and select your cluster.
            2. Choose **Edit cluster** (note: some logging settings require cluster recreation).
            3. Under **Broker log delivery**, enable one or more of the following:
               - **CloudWatch Logs**: Select a log group.
               - **S3**: Select or create a bucket and optional prefix.
               - **Kinesis Data Firehose**: Select a delivery stream.
            4. Save the configuration.
        - id: cli
          desc: |
            **Using AWS CLI**

            Update broker logging to deliver logs to CloudWatch Logs:

            ```bash
            aws kafka update-monitoring \
              --cluster-arn <cluster-arn> \
              --current-version <cluster-version> \
              --logging-info BrokerLogs={CloudWatchLogs={Enabled=true,LogGroup=/aws/msk/<cluster-name>}}
            ```

            Verify the logging configuration:

            ```bash
            aws kafka describe-cluster --cluster-arn <cluster-arn> \
              --query "ClusterInfo.LoggingInfo"
            ```
    refs:
      - url: https://docs.aws.amazon.com/msk/latest/developerguide/msk-logging.html
        title: Amazon MSK - Logging
  - uid: mondoo-aws-security-msk-logging-enabled-aws
    filters: asset.platform == "aws"
    mql: |
      aws.msk.clusters.all(cloudwatchLogsEnabled == true || s3LogsEnabled == true || firehoseLogsEnabled == true)
  - uid: mondoo-aws-security-cloudtrail-s3-bucket-not-public
    title: Ensure CloudTrail S3 bucket is not publicly accessible
    impact: 95
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/soc2-2017: soc2-control-cc6-6-1
    variants:
      - uid: mondoo-aws-security-cloudtrail-s3-bucket-not-public-aws
        tags:
          mondoo.com/filter-title: AWS CloudTrail Trail
          mondoo.com/icon: aws
    docs:
      desc: |
        This check ensures that the Amazon S3 bucket used to store AWS CloudTrail log files is not publicly accessible. CloudTrail logs contain a complete record of API calls made in your AWS account, including caller identity, source IP addresses, and request parameters. Exposing this data publicly is a critical security risk.

        **Why this matters**

        - Publicly accessible CloudTrail S3 buckets expose detailed information about your AWS infrastructure, IAM users, roles, and API usage patterns to anyone on the internet.
        - Attackers can use CloudTrail log data to identify high-privilege accounts, enumerate resources, understand security controls, and plan targeted attacks.
        - Public access to audit logs also violates the principle of least privilege and contravenes requirements in CIS AWS Foundations Benchmark, PCI DSS, and SOC 2.

        **Risk mitigation:**

        - **Confidentiality of audit data:** Restricting public access prevents adversaries from using log data for reconnaissance.
        - **Compliance:** CIS AWS Foundations Benchmark explicitly requires that the CloudTrail S3 bucket not be publicly accessible.
        - **Integrity protection:** Preventing public write access stops attackers from tampering with or deleting log files.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            1. Navigate to the **Amazon S3 Console** and select the bucket used by CloudTrail.
            2. Choose the **Permissions** tab.
            3. Under **Block public access (bucket settings)**, choose **Edit**.
            4. Enable all four **Block Public Access** settings.
            5. Choose **Save changes** and confirm.
            6. Also review the bucket policy and ACLs to ensure no public access is granted.
        - id: cli
          desc: |
            **Using AWS CLI**

            Block all public access on the CloudTrail S3 bucket:

            ```bash
            aws s3api put-public-access-block \
              --bucket <cloudtrail-bucket-name> \
              --public-access-block-configuration \
                BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true
            ```

            Verify the configuration:

            ```bash
            aws s3api get-public-access-block --bucket <cloudtrail-bucket-name>
            ```
    refs:
      - url: https://docs.aws.amazon.com/awscloudtrail/latest/userguide/create-s3-bucket-policy-for-cloudtrail.html
        title: Amazon S3 Bucket Policy for CloudTrail
      - url: https://docs.aws.amazon.com/AmazonS3/latest/userguide/access-control-block-public-access.html
        title: Blocking public access to your Amazon S3 storage
  - uid: mondoo-aws-security-cloudtrail-s3-bucket-not-public-aws
    filters: asset.platform == "aws-cloudtrail-trail"
    mql: |
      aws.cloudtrail.trail.s3bucket.public == false
  - uid: mondoo-aws-security-cloudtrail-s3-bucket-logging
    title: Ensure CloudTrail S3 bucket has access logging enabled
    impact: 50
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/soc2-2017: soc2-control-cc7-2-1
    variants:
      - uid: mondoo-aws-security-cloudtrail-s3-bucket-logging-aws
        tags:
          mondoo.com/filter-title: AWS CloudTrail Trail
          mondoo.com/icon: aws
    docs:
      desc: |
        This check ensures that the Amazon S3 bucket used to store CloudTrail logs has S3 server access logging enabled. S3 access logging records detailed information about every request made to the CloudTrail bucket, providing a second layer of audit data that captures who accessed or attempted to access the log files themselves.

        **Why this matters**

        - S3 access logs for the CloudTrail bucket create a meta-audit trail: a record of who is reading, writing, or deleting your audit logs.
        - Without S3 access logging, an attacker who gains access to the CloudTrail bucket could exfiltrate or delete log files without leaving any evidence of their actions.
        - This control is required by the CIS AWS Foundations Benchmark and supports requirements in NIST SP 800-53 AU-6 for audit log review and protection.

        **Risk mitigation:**

        - **Log integrity monitoring:** S3 access logs reveal unauthorized attempts to read or delete CloudTrail log files.
        - **Forensic capability:** Access logs provide evidence of tampering with audit data during incident investigations.
        - **Compliance:** Satisfies audit logging requirements that extend to protection of the audit logs themselves.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            1. Navigate to the **Amazon S3 Console** and select the bucket used by CloudTrail.
            2. Choose the **Properties** tab.
            3. Under **Server access logging**, choose **Edit**.
            4. Select **Enable**.
            5. Specify a target bucket and optional prefix for access log delivery.
            6. Choose **Save changes**.
        - id: cli
          desc: |
            **Using AWS CLI**

            Enable server access logging on the CloudTrail S3 bucket:

            ```bash
            aws s3api put-bucket-logging \
              --bucket <cloudtrail-bucket-name> \
              --bucket-logging-status '{
                "LoggingEnabled": {
                  "TargetBucket": "<logging-target-bucket>",
                  "TargetPrefix": "cloudtrail-access-logs/"
                }
              }'
            ```

            Verify the logging configuration:

            ```bash
            aws s3api get-bucket-logging --bucket <cloudtrail-bucket-name>
            ```
    refs:
      - url: https://docs.aws.amazon.com/AmazonS3/latest/userguide/ServerLogs.html
        title: Amazon S3 - Logging requests using server access logging
      - url: https://docs.aws.amazon.com/awscloudtrail/latest/userguide/create-s3-bucket-policy-for-cloudtrail.html
        title: Amazon S3 Bucket Policy for CloudTrail
  - uid: mondoo-aws-security-cloudtrail-s3-bucket-logging-aws
    filters: asset.platform == "aws-cloudtrail-trail"
    mql: |
      aws.cloudtrail.trail.s3bucket.logging['TargetBucket'] != empty
  - uid: mondoo-aws-security-dynamodb-pitr-enabled
    title: Ensure DynamoDB tables have point-in-time recovery enabled
    impact: 60
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-13
      compliance/nis-2: nis-2-21-2-c
      compliance/nist-csf-1: nist-csf-1-pr-ip-4
      compliance/nist-csf-2: nist-csf-2-pr-ds-11
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cp-9
      compliance/nist-sp-800-171: nist-sp-800-171--3-8-9
      compliance/soc2-2017: soc2-control-a1-2-1
    variants:
      - uid: mondoo-aws-security-dynamodb-pitr-enabled-aws
        tags:
          mondoo.com/filter-title: AWS DynamoDB Table
          mondoo.com/icon: aws
    docs:
      desc: |
        This check ensures that Amazon DynamoDB tables have Point-in-Time Recovery (PITR) enabled. PITR provides continuous backups of DynamoDB table data, allowing you to restore a table to any point in time within the last 35 days. This protects against accidental writes, deletes, and application bugs that corrupt or destroy data.

        **Why this matters**

        - Without PITR, recovering from accidental bulk deletions or data corruption requires manual backups that may not reflect the most recent state of the table.
        - PITR is a zero-impact operation that does not consume table throughput and does not require any additional configuration beyond enabling the feature.
        - Data recovery capabilities are a key requirement in business continuity and disaster recovery frameworks, including NIST SP 800-53 CP-9 and SOC 2 Availability criteria.

        **Risk mitigation:**

        - **Data recovery:** PITR enables restoration to any second within the recovery window, minimizing data loss in the event of accidental or malicious modification.
        - **Resilience:** Protects critical application data from application-level bugs, operator errors, and ransomware-style data destruction.
        - **Compliance:** Satisfies data backup and recovery requirements in multiple regulatory and security frameworks.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            1. Navigate to the **Amazon DynamoDB Console** and select **Tables**.
            2. Select the table you want to configure.
            3. Choose the **Backups** tab.
            4. Under **Point-in-time recovery (PITR)**, choose **Enable**.
            5. Confirm the action.
        - id: cli
          desc: |
            **Using AWS CLI**

            Enable PITR on a DynamoDB table:

            ```bash
            aws dynamodb update-continuous-backups \
              --table-name <table-name> \
              --point-in-time-recovery-specification PointInTimeRecoveryEnabled=true
            ```

            Verify PITR status:

            ```bash
            aws dynamodb describe-continuous-backups --table-name <table-name> \
              --query "ContinuousBackupsDescription.PointInTimeRecoveryDescription"
            ```
    refs:
      - url: https://docs.aws.amazon.com/amazondynamodb/latest/developerguide/PointInTimeRecovery.html
        title: Amazon DynamoDB - Point-in-Time Recovery
      - url: https://docs.aws.amazon.com/amazondynamodb/latest/developerguide/BackupRestore.html
        title: Amazon DynamoDB - On-Demand Backup and Restore
  - uid: mondoo-aws-security-dynamodb-pitr-enabled-aws
    filters: asset.platform == "aws-dynamodb-table"
    mql: |
      aws.dynamodb.table.continuousBackups["PointInTimeRecoveryDescription"]["PointInTimeRecoveryStatus"] == "ENABLED"
  - uid: mondoo-aws-security-cloudwatch-unauthorized-api-alarm
    title: Ensure log metric filter exists for unauthorized API calls
    impact: 30
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/soc2-2017: soc2-control-cc7-2-1
    variants:
      - uid: mondoo-aws-security-cloudwatch-unauthorized-api-alarm-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/icon: aws
    docs:
      desc: |
        This check ensures that a CloudWatch metric filter and alarm exist to detect unauthorized API calls within your AWS environment. Unauthorized API calls may indicate an attacker probing your environment or attempting to exploit misconfigured IAM permissions.

        Real-time monitoring of unauthorized API calls helps security teams identify and respond to potential breaches before significant damage occurs. Without this alarm, unauthorized access attempts may go undetected for extended periods.

        CIS AWS Foundations Benchmark recommends monitoring for these events to maintain continuous awareness of access control violations across all AWS services.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            1. Navigate to **CloudWatch** and select **Log groups**.
            2. Select the log group associated with your CloudTrail trail.
            3. Choose **Actions** > **Create metric filter**.
            4. Enter a filter pattern that includes `UnauthorizedAccess` or `AccessDenied`.
            5. Assign a metric name and namespace, then choose **Create metric filter**.
            6. Navigate to **Alarms** > **Create alarm**, select the new metric, and configure SNS notification.
        - id: cli
          desc: |
            **Using AWS CLI**

            Create the metric filter:

            ```bash
            aws logs put-metric-filter \
              --log-group-name <cloudtrail-log-group> \
              --filter-name UnauthorizedAPICalls \
              --filter-pattern '{ ($.errorCode = "AccessDenied") || ($.errorCode = "UnauthorizedAccess") }' \
              --metric-transformations metricName=UnauthorizedAPICalls,metricNamespace=CISBenchmark,metricValue=1
            ```

            Create the alarm:

            ```bash
            aws cloudwatch put-metric-alarm \
              --alarm-name UnauthorizedAPICalls \
              --metric-name UnauthorizedAPICalls \
              --namespace CISBenchmark \
              --statistic Sum \
              --period 300 \
              --threshold 1 \
              --comparison-operator GreaterThanOrEqualToThreshold \
              --evaluation-periods 1 \
              --alarm-actions <sns-topic-arn>
            ```
    refs:
      - url: https://docs.aws.amazon.com/AmazonCloudWatch/latest/monitoring/CloudWatch_Alarms.html
        title: Amazon CloudWatch Alarms
  - uid: mondoo-aws-security-cloudwatch-unauthorized-api-alarm-aws
    filters: asset.platform == "aws"
    mql: |
      aws.cloudwatch.logGroups.any(
        metricsFilters.any(
          filterPattern.contains("AccessDenied") || filterPattern.contains("UnauthorizedAccess")
        )
      )
  - uid: mondoo-aws-security-cloudwatch-no-mfa-login-alarm
    title: Ensure log metric filter exists for console sign-in without MFA
    impact: 30
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/soc2-2017: soc2-control-cc7-2-1
    variants:
      - uid: mondoo-aws-security-cloudwatch-no-mfa-login-alarm-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/icon: aws
    docs:
      desc: |
        This check ensures that a CloudWatch metric filter and alarm exist to detect AWS Management Console sign-ins that occur without multi-factor authentication (MFA). Console logins without MFA represent an elevated risk since accounts protected only by passwords are more susceptible to compromise.

        Monitoring for MFA-less logins allows security teams to identify users who bypass MFA requirements and take corrective action. This is particularly important for privileged accounts with broad permissions across your AWS environment.

        CIS AWS Foundations Benchmark recommends this control to enforce MFA usage and detect policy violations in real time.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            1. Navigate to **CloudWatch** and select **Log groups**.
            2. Select the log group associated with your CloudTrail trail.
            3. Choose **Actions** > **Create metric filter**.
            4. Enter a filter pattern matching `ConsoleLogin` events where `MFAUsed` is not `Yes`.
            5. Assign a metric name and namespace, then choose **Create metric filter**.
            6. Navigate to **Alarms** > **Create alarm**, select the new metric, and configure SNS notification.
        - id: cli
          desc: |
            **Using AWS CLI**

            Create the metric filter:

            ```bash
            aws logs put-metric-filter \
              --log-group-name <cloudtrail-log-group> \
              --filter-name ConsoleSigninWithoutMFA \
              --filter-pattern '{ ($.eventName = "ConsoleLogin") && ($.additionalEventData.MFAUsed != "Yes") }' \
              --metric-transformations metricName=ConsoleSigninWithoutMFA,metricNamespace=CISBenchmark,metricValue=1
            ```

            Create the alarm:

            ```bash
            aws cloudwatch put-metric-alarm \
              --alarm-name ConsoleSigninWithoutMFA \
              --metric-name ConsoleSigninWithoutMFA \
              --namespace CISBenchmark \
              --statistic Sum \
              --period 300 \
              --threshold 1 \
              --comparison-operator GreaterThanOrEqualToThreshold \
              --evaluation-periods 1 \
              --alarm-actions <sns-topic-arn>
            ```
    refs:
      - url: https://docs.aws.amazon.com/AmazonCloudWatch/latest/monitoring/CloudWatch_Alarms.html
        title: Amazon CloudWatch Alarms
  - uid: mondoo-aws-security-cloudwatch-no-mfa-login-alarm-aws
    filters: asset.platform == "aws"
    mql: |
      aws.cloudwatch.logGroups.any(
        metricsFilters.any(
          filterPattern.contains("ConsoleLogin") && filterPattern.contains("MFAUsed")
        )
      )
  - uid: mondoo-aws-security-cloudwatch-root-usage-alarm
    title: Ensure log metric filter exists for root account usage
    impact: 30
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/soc2-2017: soc2-control-cc7-2-1
    variants:
      - uid: mondoo-aws-security-cloudwatch-root-usage-alarm-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/icon: aws
    docs:
      desc: |
        This check ensures that a CloudWatch metric filter and alarm exist to detect usage of the AWS root account. The root account has unrestricted access to all resources and should be used only for tasks that specifically require root credentials, such as initial account setup.

        Any use of root credentials in day-to-day operations is a significant security concern and may indicate that an attacker has gained access to the root account. Immediate alerting on root usage enables rapid incident response.

        CIS AWS Foundations Benchmark strongly recommends monitoring root account activity to comply with the principle of least privilege and to detect potential account compromise.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            1. Navigate to **CloudWatch** and select **Log groups**.
            2. Select the log group associated with your CloudTrail trail.
            3. Choose **Actions** > **Create metric filter**.
            4. Enter a filter pattern matching root account usage via `userIdentity.type` and `Root`.
            5. Assign a metric name and namespace, then choose **Create metric filter**.
            6. Navigate to **Alarms** > **Create alarm**, select the new metric, and configure SNS notification.
        - id: cli
          desc: |
            **Using AWS CLI**

            Create the metric filter:

            ```bash
            aws logs put-metric-filter \
              --log-group-name <cloudtrail-log-group> \
              --filter-name RootAccountUsage \
              --filter-pattern '{ $.userIdentity.type = "Root" && $.userIdentity.invokedBy NOT EXISTS && $.eventType != "AwsServiceEvent" }' \
              --metric-transformations metricName=RootAccountUsage,metricNamespace=CISBenchmark,metricValue=1
            ```

            Create the alarm:

            ```bash
            aws cloudwatch put-metric-alarm \
              --alarm-name RootAccountUsage \
              --metric-name RootAccountUsage \
              --namespace CISBenchmark \
              --statistic Sum \
              --period 300 \
              --threshold 1 \
              --comparison-operator GreaterThanOrEqualToThreshold \
              --evaluation-periods 1 \
              --alarm-actions <sns-topic-arn>
            ```
    refs:
      - url: https://docs.aws.amazon.com/AmazonCloudWatch/latest/monitoring/CloudWatch_Alarms.html
        title: Amazon CloudWatch Alarms
  - uid: mondoo-aws-security-cloudwatch-root-usage-alarm-aws
    filters: asset.platform == "aws"
    mql: |
      aws.cloudwatch.logGroups.any(
        metricsFilters.any(
          filterPattern.contains("Root") && filterPattern.contains("userIdentity")
        )
      )
  - uid: mondoo-aws-security-cloudwatch-iam-policy-change-alarm
    title: Ensure log metric filter exists for IAM policy changes
    impact: 30
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/soc2-2017: soc2-control-cc7-2-1
    variants:
      - uid: mondoo-aws-security-cloudwatch-iam-policy-change-alarm-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/icon: aws
    docs:
      desc: |
        This check ensures that a CloudWatch metric filter and alarm exist to detect changes to IAM policies. IAM policy changes, such as creating, modifying, or deleting policies, can significantly alter the access control landscape of your AWS environment.

        Unauthorized or accidental IAM policy changes could grant excessive permissions to users or roles, potentially leading to privilege escalation or data exposure. Real-time alerting on IAM policy changes allows security teams to review and remediate unintended modifications promptly.

        CIS AWS Foundations Benchmark recommends monitoring IAM policy changes to maintain continuous visibility into access control modifications and prevent privilege escalation attacks.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            1. Navigate to **CloudWatch** and select **Log groups**.
            2. Select the log group associated with your CloudTrail trail.
            3. Choose **Actions** > **Create metric filter**.
            4. Enter a filter pattern matching IAM policy change events such as `CreatePolicy`, `DeletePolicy`, and `AttachRolePolicy`.
            5. Assign a metric name and namespace, then choose **Create metric filter**.
            6. Navigate to **Alarms** > **Create alarm**, select the new metric, and configure SNS notification.
        - id: cli
          desc: |
            **Using AWS CLI**

            Create the metric filter:

            ```bash
            aws logs put-metric-filter \
              --log-group-name <cloudtrail-log-group> \
              --filter-name IAMPolicyChanges \
              --filter-pattern '{ ($.eventName=DeleteGroupPolicy) || ($.eventName=DeleteRolePolicy) || ($.eventName=DeleteUserPolicy) || ($.eventName=PutGroupPolicy) || ($.eventName=PutRolePolicy) || ($.eventName=PutUserPolicy) || ($.eventName=CreatePolicy) || ($.eventName=DeletePolicy) || ($.eventName=CreatePolicyVersion) || ($.eventName=DeletePolicyVersion) || ($.eventName=SetDefaultPolicyVersion) || ($.eventName=AttachRolePolicy) || ($.eventName=DetachRolePolicy) || ($.eventName=AttachUserPolicy) || ($.eventName=DetachUserPolicy) || ($.eventName=AttachGroupPolicy) || ($.eventName=DetachGroupPolicy) }' \
              --metric-transformations metricName=IAMPolicyChanges,metricNamespace=CISBenchmark,metricValue=1
            ```

            Create the alarm:

            ```bash
            aws cloudwatch put-metric-alarm \
              --alarm-name IAMPolicyChanges \
              --metric-name IAMPolicyChanges \
              --namespace CISBenchmark \
              --statistic Sum \
              --period 300 \
              --threshold 1 \
              --comparison-operator GreaterThanOrEqualToThreshold \
              --evaluation-periods 1 \
              --alarm-actions <sns-topic-arn>
            ```
    refs:
      - url: https://docs.aws.amazon.com/AmazonCloudWatch/latest/monitoring/CloudWatch_Alarms.html
        title: Amazon CloudWatch Alarms
  - uid: mondoo-aws-security-cloudwatch-iam-policy-change-alarm-aws
    filters: asset.platform == "aws"
    mql: |
      aws.cloudwatch.logGroups.any(
        metricsFilters.any(
          filterPattern.contains("CreatePolicy") || filterPattern.contains("DeletePolicy") || filterPattern.contains("AttachRolePolicy")
        )
      )
  - uid: mondoo-aws-security-cloudwatch-cloudtrail-config-alarm
    title: Ensure log metric filter exists for CloudTrail config changes
    impact: 30
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
