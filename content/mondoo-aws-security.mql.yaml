    mql: |
      cloudformation.template.resources.where(type == "AWS::Backup::BackupVault").all(
      properties['KmsKeyId'] != empty
      )
  - uid: mondoo-aws-security-fsx-filesystem-encrypted
    title: Ensure FSx file systems are encrypted at rest
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-aws-security-fsx-filesystem-encrypted-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-fsx-filesystem-encrypted-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-fsx-filesystem-encrypted-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-fsx-filesystem-encrypted-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-fsx-filesystem-encrypted-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon FSx file systems are encrypted at rest. FSx supports multiple file system types (Lustre, Windows File Server, ONTAP, OpenZFS) and all should be encrypted.

        **Why this matters**

        - FSx file systems may store sensitive files, application data, and shared resources.
        - Without encryption, data is stored in plaintext on the underlying storage infrastructure.
        - Compliance frameworks require encryption of data at rest for all storage services.

        **Risk mitigation**

        - **Data protection:** Encrypts all data stored on FSx file systems.
        - **Compliance:** Meets requirements for data-at-rest encryption across file storage services.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and navigate to the Amazon FSx service.
        2. In the left navigation pane, select **File systems**.
        3. Select a file system to inspect.
        4. In the file system details, locate the **Encryption** section.
        5. Verify that **Encryption at rest** shows **Encrypted** and a KMS key ARN is listed.
        6. Repeat for each file system in the account.

        A passing file system shows **Encrypted** with a KMS key ARN. A failing file system shows **Not encrypted** or no encryption key.

        ### Audit via CLI

        1. List all FSx file systems and check their encryption settings:

        ```bash
        aws fsx describe-file-systems \
          --query 'FileSystems[*].{Id:FileSystemId,Type:FileSystemType,Encrypted:KmsKeyId}' \
          --output table
        ```

        A passing file system returns a non-empty `Encrypted` (KMS key ID) value. A failing file system returns `null` or no key.

      remediation:
        - id: console
          desc: |
            To ensure FSx file systems are encrypted at rest using the AWS Console:

            1. Navigate to the Amazon FSx Console.
            2. Note: Encryption can only be enabled at creation time.
            3. Create a new file system with encryption enabled.
            4. Migrate data from the unencrypted file system.
        - id: cli
          desc: |
            To ensure FSx file systems are encrypted at rest using the AWS CLI:

            ```bash
            aws fsx create-file-system \
              --file-system-type LUSTRE \
              --storage-capacity 1200 \
              --subnet-ids <subnet-id> \
              --lustre-configuration DeploymentType=PERSISTENT_2,PerUnitStorageThroughput=125 \
              --kms-key-id <kms-key-arn>
            ```
        - id: terraform
          desc: |
            To ensure FSx file systems are encrypted at rest in Terraform:

            ```hcl
            resource "aws_fsx_lustre_file_system" "example" {
              storage_capacity = 1200
              subnet_ids       = [aws_subnet.example.id]
              kms_key_id       = aws_kms_key.fsx.arn
            }
            ```
        - id: cloudformation
          desc: |
            To ensure FSx file systems are encrypted at rest in CloudFormation:

            ```yaml
            Resources:
              FSxFileSystem:
                Type: AWS::FSx::FileSystem
                Properties:
                  FileSystemType: LUSTRE
                  StorageCapacity: 1200
                  SubnetIds:
                    - !Ref Subnet
                  KmsKeyId: !GetAtt FSxKey.Arn
            ```
    refs:
      - url: https://docs.aws.amazon.com/fsx/latest/LustreGuide/encryption-at-rest.html
        title: AWS Documentation - Encrypting data at rest for Amazon FSx
  - uid: mondoo-aws-security-fsx-filesystem-encrypted-aws
    filters: asset.platform == "aws"
    mql: aws.fsx.fileSystems.all(encrypted == true)
  - uid: mondoo-aws-security-fsx-filesystem-encrypted-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_fsx_lustre_file_system")
    mql: |
