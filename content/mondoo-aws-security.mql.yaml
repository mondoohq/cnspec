      )
  - uid: mondoo-aws-security-ram-no-wildcard-principals
    title: Ensure RAM shares do not use wildcard principals
    impact: 70
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-5
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/vda-isa-5: vda-isa-5-4-2-1
    variants:
      - uid: mondoo-aws-security-ram-no-wildcard-principals-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-ram-no-wildcard-principals-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ram-no-wildcard-principals-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ram-no-wildcard-principals-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ram-no-wildcard-principals-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that AWS Resource Access Manager (RAM) resource shares do not use wildcard (*) principals. Wildcard principals grant access to all AWS accounts, effectively making shared resources publicly accessible.

        **Why this matters**

        - A wildcard principal in a RAM resource share means any AWS account can access the shared resources.
        - This creates a significant security risk, as sensitive infrastructure such as VPC subnets or Transit Gateways could be accessed by unknown third parties.
        - NIST SP 800-53 AC-6 requires least-privilege access, which is violated by wildcard sharing.

        **Risk mitigation**

        - **Least privilege:** Replace wildcard principals with specific account IDs or organizational unit ARNs.
        - **Access control:** Ensures only known, authorized accounts can access shared resources.
        - **Auditability:** Specific principals enable meaningful audit trails of resource access.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and open the **AWS RAM Console**.
        2. In the left navigation pane, choose **Resource shares**.
        3. Select each resource share and choose the **Principals** tab.
        4. Review the list of principals associated with the share.
        5. Check for any entry that is `*` (wildcard).

        A passing resource share shows only specific account IDs, user ARNs, role ARNs, or organizational unit ARNs in the principals list. A failing resource share shows `*` as one of the principals.

        ### Audit via CLI

        1. List all resource shares owned by this account:

        ```bash
        aws ram get-resource-shares \
          --resource-owner SELF \
          --query "resourceShares[].{Name:name,Arn:resourceShareArn}" \
          --output table
        ```

        2. For each resource share ARN, list the associated principals:

        ```bash
        aws ram get-principals \
          --resource-owner SELF \
          --resource-share-arns <resource-share-arn> \
          --query "principals[].id"
        ```

        A passing resource share returns a list of principals that contains no `"*"` entry. A failing resource share returns a list that includes `"*"`.
      remediation:
        - id: console
          desc: |
            To ensure RAM resource shares do not use wildcard principals using the AWS Console:

            1. Navigate to the **AWS RAM Console** and select **Resource shares**.
            2. Select the resource share you want to configure.
            3. Review the **Principals** section.
            4. Remove any wildcard (*) principals.
            5. Add specific AWS account IDs or organizational unit ARNs instead.
            6. Choose **Save**.
        - id: cli
          desc: |
            To ensure RAM resource shares do not use wildcard principals using the AWS CLI:

            ```bash
            aws ram disassociate-resource-share \
              --resource-share-arn <resource-share-arn> \
              --principals "*"
            ```

            Then associate specific principals:

            ```bash
            aws ram associate-resource-share \
              --resource-share-arn <resource-share-arn> \
              --principals <account-id-or-ou-arn>
            ```
        - id: terraform
          desc: |
            To ensure RAM resource shares do not use wildcard principals in Terraform:

            ```hcl
            resource "aws_ram_principal_association" "example" {
              principal          = "123456789012"
              resource_share_arn = aws_ram_resource_share.example.arn
            }
            ```
        - id: cloudformation
          desc: |
            Never list `"*"` in `Principals` on `AWS::RAM::ResourceShare`. Always scope shares to specific account, OU, or organization ARNs:

            ```yaml
            Resources:
              ResourceShare:
                Type: AWS::RAM::ResourceShare
                Properties:
                  Name: example
                  ResourceArns:
                    - !GetAtt SharedSubnet.Arn
                  Principals:
                    - "111122223333"
            ```
    refs:
      - url: https://docs.aws.amazon.com/ram/latest/userguide/working-with-sharing.html
        title: AWS Documentation - Sharing your AWS resources
  - uid: mondoo-aws-security-ram-no-wildcard-principals-aws
    filters: asset.platform == "aws"
    mql: |
      aws.ram.resourceShares.all(principals.none(_ == "*"))
  - uid: mondoo-aws-security-ram-no-wildcard-principals-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_ram_principal_association")
    mql: |
      terraform.resources.where(nameLabel == "aws_ram_principal_association").all(
        arguments.principal != "*"
      )
  - uid: mondoo-aws-security-ram-no-wildcard-principals-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_ram_principal_association")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_ram_principal_association").all(
        change.after["principal"] != "*"
      )
  - uid: mondoo-aws-security-ram-no-wildcard-principals-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_ram_principal_association")
    mql: |
      terraform.state.resources.where(type == "aws_ram_principal_association").all(
        values["principal"] != "*"
      )
  - uid: mondoo-aws-security-ram-no-wildcard-principals-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::RAM::ResourceShare")
    mql: |
      cloudformation.template.resources.where(type == "AWS::RAM::ResourceShare").all(
        properties['Principals'] == null || properties['Principals'].none(_ == "*")
      )
  - uid: mondoo-aws-security-transfer-no-ftp
    title: Ensure Transfer Family servers do not use plain FTP
    impact: 90
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/vda-isa-5: vda-isa-5-5-1-2
    variants:
      - uid: mondoo-aws-security-transfer-no-ftp-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-transfer-no-ftp-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-transfer-no-ftp-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-transfer-no-ftp-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-transfer-no-ftp-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that AWS Transfer Family servers do not use the plain FTP protocol. FTP transmits data and credentials in cleartext, making it vulnerable to interception and man-in-the-middle attacks.

        **Why this matters**

        - FTP transmits usernames, passwords, and file data without encryption, exposing sensitive information to network-level attackers.
        - SFTP and FTPS provide encrypted alternatives that protect data in transit.
        - Compliance frameworks including PCI DSS 4.2.1 and HIPAA require encryption of data in transit.
        - AWS Transfer Family supports SFTP, FTPS, and AS2 as secure alternatives to plain FTP.

        **Risk mitigation**

        - **Data protection:** Encrypted protocols prevent interception of file contents and credentials.
        - **Credential security:** SFTP and FTPS protect authentication credentials from network sniffing.
        - **Compliance:** Meets encryption-in-transit requirements across PCI DSS, HIPAA, and SOC 2 frameworks.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and open the **AWS Transfer Family Console**.
        2. In the left navigation pane, choose **Servers**.
        3. Select each server and review its **Protocols** field in the server details.
        4. Check whether **FTP** is listed among the enabled protocols.

        A passing server shows only **SFTP**, **FTPS**, or **AS2** in the protocols list. A failing server shows **FTP** as one of the enabled protocols.

        ### Audit via CLI

        1. List all Transfer Family servers and their protocols:

        ```bash
        aws transfer list-servers \
          --query "Servers[].{ServerId:ServerId,Protocols:Protocols}" \
          --output table
        ```

        2. To filter only servers with FTP enabled:

        ```bash
        aws transfer list-servers \
          --query "Servers[?contains(Protocols, 'FTP')].{ServerId:ServerId,Protocols:Protocols}"
        ```

        A passing server returns a `Protocols` list that does not contain `FTP`. A failing server returns a `Protocols` list that includes `FTP`.
      remediation:
        - id: console
          desc: |
            To ensure Transfer Family servers do not use plain FTP using the AWS Console:

            1. Navigate to the **AWS Transfer Family Console** and select **Servers**.
            2. Select the server you want to configure.
            3. Choose **Edit**.
            4. Under **Protocols**, remove **FTP** and ensure only **SFTP**, **FTPS**, or **AS2** are selected.
            5. Choose **Save**.
        - id: cli
          desc: |
            To ensure Transfer Family servers do not use plain FTP using the AWS CLI:

            ```bash
            aws transfer update-server \
              --server-id <server-id> \
              --protocols SFTP
            ```
        - id: terraform
          desc: |
            To ensure Transfer Family servers do not use plain FTP in Terraform:

            ```hcl
            resource "aws_transfer_server" "example" {
              protocols = ["SFTP"]

              endpoint_type = "VPC"

              endpoint_details {
                vpc_id = aws_vpc.example.id
              }
            }
            ```
        - id: cloudformation
          desc: |
            Drop `FTP` from `Protocols` on every `AWS::Transfer::Server`. SFTP and FTPS encrypt control and data channels; plain FTP does not:

            ```yaml
            Resources:
              TransferServer:
                Type: AWS::Transfer::Server
                Properties:
                  Protocols:
                    - SFTP
                    - FTPS
            ```
    refs:
      - url: https://docs.aws.amazon.com/transfer/latest/userguide/create-server.html
        title: AWS Documentation - Creating a Transfer Family server
  - uid: mondoo-aws-security-transfer-no-ftp-aws
    filters: asset.platform == "aws"
    mql: |
      aws.transfer.servers.all(protocols.none(_ == "FTP"))
  - uid: mondoo-aws-security-transfer-no-ftp-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_transfer_server")
    mql: |
      terraform.resources.where(nameLabel == "aws_transfer_server").all(
        arguments.protocols == null || arguments.protocols.none(_ == "FTP")
      )
  - uid: mondoo-aws-security-transfer-no-ftp-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_transfer_server")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_transfer_server").all(
        change.after["protocols"] == null || change.after["protocols"].none(_ == "FTP")
      )
  - uid: mondoo-aws-security-transfer-no-ftp-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_transfer_server")
    mql: |
      terraform.state.resources.where(type == "aws_transfer_server").all(
