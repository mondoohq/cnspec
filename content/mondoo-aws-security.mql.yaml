    docs:
      desc: |
        This check ensures that AWS Glue security configurations have CloudWatch log encryption enabled. Glue jobs and crawlers emit logs to CloudWatch during execution. Without CloudWatch encryption in the security configuration, these logs are stored unencrypted and may contain sensitive data excerpts, error details, or schema information.

        **Why this matters**

        - Glue job logs may contain data samples, SQL queries, transformation logic, or error messages that reveal sensitive information.
        - CloudWatch logs are retained according to retention policies and may be accessible to users with CloudWatch read permissions.
        - Encrypting logs ensures that even users with log access cannot read sensitive content without KMS key permissions.
        - Compliance frameworks require encryption of log data that may contain sensitive information.

        **Risk mitigation:**

        - **Log confidentiality:** Encrypts all CloudWatch logs generated by Glue jobs and crawlers.
        - **Access control:** Adds KMS-based access control on top of IAM permissions for log access.
        - **Compliance:** Meets encryption requirements for logging and monitoring data.
