  - uid: mondoo-aws-security-transfer-identity-provider
    title: Ensure Transfer Family servers use external identity providers
    impact: 60
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-5-17
      compliance/nis-2: nis-2-21-2-j
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-2
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-14
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/vda-isa-5: vda-isa-5-4-1-2
    variants:
      - uid: mondoo-aws-security-transfer-identity-provider-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-transfer-identity-provider-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-transfer-identity-provider-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-transfer-identity-provider-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-transfer-identity-provider-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that AWS Transfer Family servers use an external identity provider rather than the service-managed identity provider. Service-managed users authenticate with static passwords that are prime targets for credential stuffing attacks, cannot be protected with MFA, and cannot be centrally revoked when compromised.

        **Why this matters**

        - Service-managed Transfer Family passwords are static credentials vulnerable to credential stuffing, brute-force attacks, and password spraying, with no MFA to provide a second authentication factor.
        - When service-managed credentials are compromised, there is no centralized revocation mechanism. Each server's users must be individually managed, delaying incident response and leaving compromised access active on overlooked servers.
        - Service-managed users bypass corporate identity systems, meaning compromised credentials are invisible to centralized security monitoring, SIEM alert rules, and identity threat detection systems.
        - Without integration into a corporate identity provider, user offboarding is easily missed, leaving dormant accounts that attackers can exploit.

        **Risk mitigation**

        - **Credential stuffing defense:** External identity providers support MFA, conditional access, and anomaly detection that static service-managed passwords cannot provide.
        - **Centralized revocation:** Compromised identities can be disabled across all services simultaneously through the external provider, eliminating the delay of per-server user management.
        - **Security monitoring integration:** External providers feed authentication events into centralized logging and SIEM systems, enabling detection of brute-force attacks and anomalous access patterns.
      audit: |
        ### Audit via Console

        1. Navigate to the **AWS Transfer Family Console**.
        2. Select **Servers** from the left navigation.
        3. For each listed server, review the **Identity provider type** column.

        A passing server shows an identity provider type of **AWS Directory Service**, **Custom identity provider (API Gateway)**, or **AWS Lambda** — not **Service managed**. A failing server shows **Service managed**.

        ### Audit via CLI

        1. List all Transfer Family servers and check their identity provider type:

        ```bash
        aws transfer list-servers \
          --query 'Servers[*].{ServerId:ServerId,IdentityProviderType:IdentityProviderType}' \
          --output table
        ```

        A passing server returns an `IdentityProviderType` value of `API_GATEWAY`, `AWS_DIRECTORY_SERVICE`, or `AWS_LAMBDA`. A failing server returns `SERVICE_MANAGED`.

      remediation:
        - id: console
          desc: |
            To ensure Transfer Family servers use external identity providers using the AWS Console:

            1. Note: Identity provider type cannot be changed after server creation. Create a new server.
            2. Navigate to the **AWS Transfer Family Console** and choose **Create server**.
            3. Under **Identity provider**, select **AWS Directory Service**, **Custom identity provider**, or another external option.
            4. Configure the identity provider settings.
            5. Complete the server configuration and choose **Create server**.
            6. Migrate users from the old server and delete it.
        - id: cli
          desc: |
            To ensure Transfer Family servers use external identity providers using the AWS CLI, create a new server with a custom identity provider:

            ```bash
            aws transfer create-server \
              --identity-provider-type API_GATEWAY \
              --identity-provider-details Url=<api-gateway-url>,InvocationRole=<role-arn> \
              --protocols SFTP
            ```
        - id: terraform
          desc: |
            To ensure Transfer Family servers use external identity providers in Terraform:

            ```hcl
            resource "aws_transfer_server" "example" {
              protocols              = ["SFTP"]
              identity_provider_type = "API_GATEWAY"

              url            = aws_api_gateway_deployment.example.invoke_url
              invocation_role = aws_iam_role.transfer.arn
            }
            ```
        - id: cloudformation
          desc: |
            Set `IdentityProviderType` on every `AWS::Transfer::Server` to `AWS_DIRECTORY_SERVICE`, `API_GATEWAY`, or `AWS_LAMBDA` rather than the default `SERVICE_MANAGED` so account, password, and rotation policies live with your existing identity provider:

            ```yaml
            Resources:
              TransferServer:
                Type: AWS::Transfer::Server
                Properties:
                  IdentityProviderType: AWS_DIRECTORY_SERVICE
                  IdentityProviderDetails:
                    DirectoryId: !Ref DirectoryId
            ```
    refs:
      - url: https://docs.aws.amazon.com/transfer/latest/userguide/custom-identity-provider-users.html
        title: AWS Documentation - Using custom identity providers
