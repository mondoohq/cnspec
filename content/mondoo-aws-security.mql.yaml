      properties['DeliveryStreamEncryptionConfiguration'] != empty && properties['DeliveryStreamEncryptionConfiguration']['KeyType'] != empty
      )
  - uid: mondoo-aws-security-athena-workgroup-enforce-configuration
    title: Ensure Athena workgroups enforce workgroup configuration
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ccc-06
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-a
      compliance/nist-csf-1: nist-csf-1-pr-ip-3
      compliance/nist-csf-2: nist-csf-2-pr-ps-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-2
      compliance/pci-dss-4: pcidss-requirement-2-2-6
      compliance/soc2-2017: soc2-control-cc7-1-1
      compliance/vda-isa-5: false
    variants:
      - uid: mondoo-aws-security-athena-workgroup-enforce-configuration-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-athena-workgroup-enforce-configuration-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-athena-workgroup-enforce-configuration-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-athena-workgroup-enforce-configuration-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-athena-workgroup-enforce-configuration-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon Athena workgroups have the "enforce workgroup configuration" setting enabled. When this setting is disabled, individual users can override workgroup-level settings from their client, including the query result output location and encryption configuration.

        **Why this matters**

        - Without enforcement, users can override the configured S3 output location and write query results to arbitrary S3 buckets, potentially ones without encryption or proper access controls.
        - Users can bypass encryption settings configured at the workgroup level, writing unencrypted query results that may contain sensitive data.
        - Workgroup configuration enforcement is the primary mechanism for ensuring consistent security controls across all queries run within the workgroup.
        - Disabling enforcement defeats the purpose of centrally managing security settings and makes it impossible to guarantee data protection for query outputs.

        **Risk mitigation**

        - **Configuration integrity:** Ensures workgroup-level encryption and output location settings cannot be bypassed by individual users.
        - **Data protection:** Guarantees all query results are written to the approved S3 location with the configured encryption.
        - **Centralized control:** Enables administrators to enforce security policies consistently across all workgroup users.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and navigate to **Amazon Athena** > **Workgroups**.
        2. Select each workgroup name.
        3. Review the **Settings** section for **Override client-side settings**.

        A passing workgroup shows **Override client-side settings** as enabled. A failing workgroup shows the setting as disabled, meaning clients can override workgroup configuration.

        ### Audit via CLI

        1. List all Athena workgroups:

        ```bash
        aws athena list-work-groups --query "WorkGroups[*].Name"
        ```

        2. For each enabled workgroup, check the enforcement setting:

        ```bash
        aws athena get-work-group --work-group <workgroup-name> \
          --query "WorkGroup.Configuration.EnforceWorkGroupConfiguration"
        ```

        A passing workgroup returns `true`. A failing workgroup returns `false` or omits the field.

      remediation:
        - id: console
          desc: |
            To ensure Athena workgroups enforce workgroup configuration using the AWS Console:

            1. Navigate to the **Amazon Athena Console** and select **Workgroups**.
            2. Select the workgroup to modify.
            3. Choose **Edit**.
            4. Under **Settings**, enable **Override client-side settings**.
            5. Choose **Save**.
        - id: cli
          desc: |
            To ensure Athena workgroups enforce workgroup configuration using the AWS CLI, enable workgroup configuration enforcement:

            ```bash
            aws athena update-work-group \
              --work-group <workgroup-name> \
              --configuration-updates EnforceWorkGroupConfiguration=true
            ```

            Verify the setting:

            ```bash
            aws athena get-work-group --work-group <workgroup-name> \
              --query "WorkGroup.Configuration.EnforceWorkGroupConfiguration"
            ```
        - id: terraform
          desc: |
            To ensure Athena workgroups enforce workgroup configuration in Terraform, enforce workgroup configuration:

            ```hcl
            resource "aws_athena_workgroup" "example" {
              name = "example-workgroup"

              configuration {
                enforce_workgroup_configuration = true
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure Athena workgroups enforce workgroup configuration in CloudFormation, set `EnforceWorkGroupConfiguration` to `true`:

            ```yaml
            Resources:
              AthenaWorkGroup:
                Type: AWS::Athena::WorkGroup
                Properties:
                  Name: example-workgroup
                  WorkGroupConfiguration:
                    EnforceWorkGroupConfiguration: true
            ```
    refs:
      - url: https://docs.aws.amazon.com/athena/latest/ug/workgroups-settings-override.html
        title: Workgroup settings override client-side settings
  - uid: mondoo-aws-security-athena-workgroup-enforce-configuration-aws
    filters: asset.platform == "aws"
    mql: |
      aws.athena.workgroups.where(state == "ENABLED").all(
        enforceWorkGroupConfiguration == true
      )
  - uid: mondoo-aws-security-athena-workgroup-enforce-configuration-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_athena_workgroup")
    mql: |
      terraform.resources.where(nameLabel == "aws_athena_workgroup").all(
      blocks.where(type == "configuration") != empty &&
      blocks.where(type == "configuration").all(arguments.enforce_workgroup_configuration == true)
      )
  - uid: mondoo-aws-security-athena-workgroup-enforce-configuration-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_athena_workgroup")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_athena_workgroup").all(
      change.after.configuration != empty &&
      change.after.configuration.all(enforce_workgroup_configuration == true)
      )
  - uid: mondoo-aws-security-athena-workgroup-enforce-configuration-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_athena_workgroup")
    mql: |
      terraform.state.resources.where(type == "aws_athena_workgroup").all(
      values.configuration != empty &&
      values.configuration.all(enforce_workgroup_configuration == true)
      )
  - uid: mondoo-aws-security-athena-workgroup-enforce-configuration-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::Athena::WorkGroup")
    mql: |
      cloudformation.template.resources.where(type == "AWS::Athena::WorkGroup").all(
      properties['WorkGroupConfiguration'] != empty && properties['WorkGroupConfiguration']['EnforceWorkGroupConfiguration'] == true
      )
  - uid: mondoo-aws-security-athena-workgroup-results-encrypted
    title: Ensure Athena workgroups encrypt query results
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-aws-security-athena-workgroup-results-encrypted-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-athena-workgroup-results-encrypted-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-athena-workgroup-results-encrypted-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-athena-workgroup-results-encrypted-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-athena-workgroup-results-encrypted-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon Athena workgroups have encryption configured for query results. Query results are written to S3, and without encryption configuration at the workgroup level, results may be stored unencrypted, exposing sensitive data queried from data lakes, CloudTrail logs, or other sources.

        **Why this matters**

        - Athena queries often access sensitive data stored in S3 data lakes, CloudTrail logs, VPC Flow Logs, and other data sources. Query results containing this data must be encrypted.
        - Without workgroup-level encryption configuration, query results are written to S3 without server-side encryption unless the destination bucket has a default encryption policy.
        - Relying solely on S3 bucket default encryption is fragile. The output location can change, and not all buckets may have default encryption enabled.
        - Configuring encryption at the workgroup level, combined with enforcing workgroup configuration, guarantees all query results are encrypted regardless of the destination bucket settings.

        **Risk mitigation**

        - **Data protection:** Ensures all query results are encrypted at rest in S3 using SSE-S3, SSE-KMS, or CSE-KMS.
        - **Defense in depth:** Provides encryption independent of S3 bucket default encryption settings.
        - **Compliance:** Meets requirements for encryption of data at rest for query output in analytics services.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and navigate to **Amazon Athena** > **Workgroups**.
        2. Select each workgroup name.
        3. Review the **Settings** section under **Query result configuration** for the **Encrypt query results** setting.

        A passing workgroup shows an encryption type (SSE_S3, SSE_KMS, or CSE_KMS) configured for query results. A failing workgroup shows no encryption configured for query results.

        ### Audit via CLI

        1. List all Athena workgroups:

        ```bash
        aws athena list-work-groups --query "WorkGroups[*].Name"
        ```

        2. For each enabled workgroup, check the encryption configuration:

        ```bash
        aws athena get-work-group --work-group <workgroup-name> \
          --query "WorkGroup.Configuration.ResultConfiguration.EncryptionConfiguration"
        ```

        A passing workgroup returns an object with an `EncryptionOption` field (such as `SSE_S3`, `SSE_KMS`, or `CSE_KMS`). A failing workgroup returns `null` or an empty response.

      remediation:
        - id: console
          desc: |
            To ensure Athena workgroups encrypt query results using the AWS Console:

            1. Navigate to the **Amazon Athena Console** and select **Workgroups**.
            2. Select the workgroup to modify.
            3. Choose **Edit**.
            4. Under **Query result configuration**, configure **Encrypt query results**.
            5. Select the encryption type (SSE_S3, SSE_KMS, or CSE_KMS).
            6. For KMS-based encryption, select or enter the KMS key ARN.
            7. Choose **Save**.
        - id: cli
          desc: |
            To ensure Athena workgroups encrypt query results using the AWS CLI, configure query result encryption with SSE-KMS:

            ```bash
            aws athena update-work-group \
              --work-group <workgroup-name> \
              --configuration-updates '{
                "ResultConfigurationUpdates": {
                  "EncryptionConfiguration": {
                    "EncryptionOption": "SSE_KMS",
                    "KmsKey": "arn:aws:kms:region:account-id:key/key-id"
                  }
                }
              }'
            ```

            Verify the encryption configuration:

            ```bash
            aws athena get-work-group --work-group <workgroup-name> \
              --query "WorkGroup.Configuration.ResultConfiguration.EncryptionConfiguration"
            ```
        - id: terraform
          desc: |
            To ensure Athena workgroups encrypt query results in Terraform, configure query result encryption:

            ```hcl
            resource "aws_athena_workgroup" "example" {
              name = "example-workgroup"

              configuration {
                enforce_workgroup_configuration = true

                result_configuration {
                  encryption_configuration {
                    encryption_option = "SSE_KMS"
                    kms_key_arn       = aws_kms_key.example.arn
                  }
                }
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure Athena workgroups encrypt query results in CloudFormation, configure `EncryptionConfiguration` in the workgroup:

            ```yaml
            Resources:
              AthenaWorkGroup:
                Type: AWS::Athena::WorkGroup
                Properties:
                  Name: example-workgroup
                  WorkGroupConfiguration:
                    EnforceWorkGroupConfiguration: true
                    ResultConfiguration:
                      EncryptionConfiguration:
                        EncryptionOption: SSE_KMS
                        KmsKey: !GetAtt KMSKey.Arn
            ```
    refs:
      - url: https://docs.aws.amazon.com/athena/latest/ug/encrypting-query-results-stored-in-s3.html
        title: Encrypting Athena query results stored in Amazon S3
  - uid: mondoo-aws-security-athena-workgroup-results-encrypted-aws
    filters: asset.platform == "aws"
    mql: |
      aws.athena.workgroups.where(state == "ENABLED").all(
        resultConfiguration['EncryptionConfiguration'] != null &&
        resultConfiguration['EncryptionConfiguration']['EncryptionOption'] != null
      )
  - uid: mondoo-aws-security-athena-workgroup-results-encrypted-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_athena_workgroup")
    mql: |
      terraform.resources.where(nameLabel == "aws_athena_workgroup").all(
      blocks.where(type == "configuration") != empty &&
      blocks.where(type == "configuration").all(blocks.where(type == "result_configuration") != empty && blocks.where(type == "result_configuration").all(blocks.where(type == "encryption_configuration") != empty))
      )
  - uid: mondoo-aws-security-athena-workgroup-results-encrypted-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_athena_workgroup")
