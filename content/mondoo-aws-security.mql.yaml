  - uid: mondoo-aws-security-redshift-cluster-cmk-encryption
    title: Ensure Redshift clusters are encrypted with a customer-managed KMS key
    impact: 70
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-12
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-10
      compliance/soc2-2017: soc2-control-cc6-1-10
    variants:
      - uid: mondoo-aws-security-redshift-cluster-cmk-encryption-aws
        tags:
          mondoo.com/filter-title: AWS Redshift Cluster
          mondoo.com/icon: aws
      - uid: mondoo-aws-security-redshift-cluster-cmk-encryption-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/icon: terraform
      - uid: mondoo-aws-security-redshift-cluster-cmk-encryption-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/icon: terraform
      - uid: mondoo-aws-security-redshift-cluster-cmk-encryption-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/icon: terraform
    docs:
      desc: |
        This check ensures that Amazon Redshift clusters are encrypted using a customer-managed AWS KMS key (CMK). While Redshift supports encryption at rest with AWS-managed keys, using a CMK provides additional control over key management, access policies, and rotation schedules.

        **Why this matters**

        - AWS-managed encryption keys do not allow customers to control key policies, audit key usage independently, or enforce custom rotation schedules.
        - Customer-managed KMS keys enable fine-grained access control, allowing organizations to restrict which principals can encrypt and decrypt cluster data.
        - CMKs integrate with AWS CloudTrail for key usage auditing, providing visibility into who accessed encrypted data and when.
        - Compliance frameworks including PCI DSS, HIPAA, and SOC 2 often require customer-controlled encryption keys for sensitive data stores.

        **Risk mitigation:**

        - **Key control:** Organizations maintain full control over the encryption key lifecycle, including creation, rotation, and deletion.
        - **Access auditing:** All key usage is logged in CloudTrail, enabling security monitoring and compliance reporting.
        - **Compliance:** Meets regulatory requirements for customer-managed encryption of data at rest.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            1. Navigate to the Amazon Redshift Console.
            2. Select the cluster to modify.
            3. Select **Actions** > **Modify**.
            4. Under **Database configurations**, enable encryption and select a customer-managed KMS key.
            5. Select **Modify cluster**.

            Note: Changing the encryption key requires a cluster migration. Redshift will create an encrypted copy with the new key.
        - id: cli
          desc: |
            **Using AWS CLI**

            Modify a cluster to use a customer-managed KMS key:

            ```bash
            aws redshift modify-cluster \
              --cluster-identifier <cluster-id> \
              --encrypted \
              --kms-key-id arn:aws:kms:region:account-id:key/key-id
            ```

            Verify the KMS key:

            ```bash
            aws redshift describe-clusters --cluster-identifier <cluster-id> \
              --query "Clusters[*].{ClusterId:ClusterIdentifier,KmsKeyId:KmsKeyId}"
            ```
        - id: terraform
          desc: |
            **Using Terraform**

            ```hcl
            resource "aws_kms_key" "redshift" {
              description         = "KMS key for Redshift encryption"
              enable_key_rotation = true
            }

            resource "aws_redshift_cluster" "example" {
              cluster_identifier = "example-cluster"
              node_type          = "dc2.large"
              encrypted          = true
              kms_key_id         = aws_kms_key.redshift.arn
            }
            ```
        - id: cloudformation
          desc: |
            **Using CloudFormation**

            ```yaml
            Resources:
              RedshiftKMSKey:
                Type: "AWS::KMS::Key"
                Properties:
                  Description: "KMS key for Redshift encryption"
                  EnableKeyRotation: true

              RedshiftCluster:
                Type: "AWS::Redshift::Cluster"
                Properties:
                  ClusterIdentifier: "example-cluster"
                  NodeType: dc2.large
                  Encrypted: true
                  KmsKeyId: !Ref RedshiftKMSKey
            ```
    refs:
      - url: https://docs.aws.amazon.com/redshift/latest/mgmt/working-with-db-encryption.html
        title: AWS Documentation - Amazon Redshift database encryption
      - url: https://docs.aws.amazon.com/kms/latest/developerguide/concepts.html#customer-cmk
        title: AWS KMS Customer Managed Keys
