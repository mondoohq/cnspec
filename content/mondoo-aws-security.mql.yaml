  # No Terraform variants: `aws_db_snapshot` is rarely declared in Terraform; encryption is inherited from the source `aws_db_instance.kms_key_id`. Auditing snapshot KMS keys directly does not have a clean Terraform analog.
  - uid: mondoo-aws-security-rds-snapshot-cmk-encryption
    title: Ensure RDS snapshots use customer-managed KMS encryption
    impact: 70
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-aws-security-rds-snapshot-cmk-encryption-aws
        tags:
          mondoo.com/filter-title: AWS RDS Snapshot
          mondoo.com/filter-icon: aws
    docs:
      desc: |
        This check ensures that RDS snapshots are encrypted using customer-managed KMS keys (CMK). Snapshots may be shared across accounts or retained long-term, making encryption key control especially important.

        **Why this matters**

        - **Snapshot sharing:** When sharing encrypted snapshots across accounts, CMKs allow you to control which accounts can decrypt the data.
        - **Long-term retention:** Snapshots retained for compliance may outlive AWS-managed key policies, while CMK rotation and management remain under your control.
        - **Audit trail:** CMK usage is logged in CloudTrail, providing visibility into snapshot access patterns.

        **Risk mitigation**

        - Copy existing snapshots with CMK encryption.
        - Ensure source RDS instances use CMK encryption so snapshots inherit the key.
        - Regularly audit snapshot encryption configurations.
      remediation:
        - id: console
          desc: |
            To ensure RDS snapshots use customer-managed KMS encryption using the AWS Console:

            1. Navigate to the **RDS Console**.
            2. Select **Snapshots** in the left panel.
            3. Select the snapshot to review.
            4. Check the **Encryption** details in the snapshot configuration.
            5. If using an AWS-managed key or no encryption:
               - Select the snapshot and choose **Actions** > **Copy snapshot**.
               - In the copy dialog, check **Enable encryption** and select your customer-managed CMK from the KMS key dropdown.
               - Select **Copy snapshot** to save the CMK-encrypted copy.
               - Once the copy is available, you can delete the original snapshot if it is no longer needed.
        - id: cli
          desc: |
            To ensure RDS snapshots use customer-managed KMS encryption using the AWS CLI, check the encryption configuration of an RDS snapshot:

            ```bash
            aws rds describe-db-snapshots \
              --db-snapshot-identifier <snapshot-id> \
              --query "DBSnapshots[*].{ID:DBSnapshotIdentifier,Encrypted:Encrypted,KmsKeyId:KmsKeyId}"
            ```

            Copy a snapshot with CMK encryption:

            ```bash
            aws rds copy-db-snapshot \
              --source-db-snapshot-identifier <source-snapshot> \
              --target-db-snapshot-identifier <target-snapshot> \
              --kms-key-id <cmk-key-id>
            ```
        - id: terraform
          desc: |
            To ensure RDS snapshots use customer-managed KMS encryption in Terraform, RDS snapshots inherit encryption from the source database. Ensure your RDS instances use CMK encryption so that snapshots are automatically encrypted with the same key:

            ```hcl
            resource "aws_db_instance" "example" {
              identifier     = "example"
              engine         = "mysql"
              instance_class = "db.t3.micro"

              storage_encrypted = true
              kms_key_id        = aws_kms_key.rds.arn
            }
            ```
        - id: cloudformation
          desc: |
            To ensure RDS snapshots use customer-managed KMS encryption in CloudFormation, RDS snapshots inherit encryption from the source database. Ensure your RDS instances use CMK encryption:

            ```yaml
            Resources:
              MyRDSInstance:
                Type: AWS::RDS::DBInstance
                Properties:
                  DBInstanceIdentifier: example
                  Engine: mysql
                  DBInstanceClass: db.t3.micro
                  StorageEncrypted: true
                  KmsKeyId: !Ref MyKmsKey
            ```
    refs:
      - url: https://docs.aws.amazon.com/AmazonRDS/latest/UserGuide/USER_CopySnapshot.html
        title: AWS Documentation - Copying a DB snapshot
      - url: https://docs.aws.amazon.com/AmazonRDS/latest/UserGuide/Overview.Encryption.html
        title: AWS Documentation - Encrypting Amazon RDS resources
