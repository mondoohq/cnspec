      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-6
    variants:
      - uid: mondoo-aws-security-neptune-no-default-security-groups-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-neptune-no-default-security-groups-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-neptune-no-default-security-groups-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-neptune-no-default-security-groups-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-neptune-no-default-security-groups-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon Neptune database clusters do not use the default VPC security group. Default security groups often have overly permissive inbound and outbound rules that do not follow the principle of least privilege.

        **Why this matters**

        - **Overly permissive access:** The default security group allows all inbound traffic from other resources assigned the same default group, which may include unrelated workloads.
        - **Unintended exposure:** Changes to the default security group affect all resources using it, potentially opening access to Neptune from unrelated services.
        - **Compliance:** Security best practices and compliance frameworks require purpose-built security groups with minimal necessary access.

        **Risk mitigation**

        - Create dedicated security groups for Neptune clusters with specific inbound rules.
        - Restrict access to only the application subnets and ports required.
        - Regularly audit security group rules for Neptune clusters.
      remediation:
        - id: console
          desc: |
            To ensure Neptune clusters do not use default security groups using the AWS Console:

            1. Navigate to the **Neptune Console**.
            2. Select the cluster to review.
            3. Under **Connectivity & security**, review the associated security groups.
            4. If the default security group is used, select **Modify**.
            5. Replace the default security group with a purpose-built security group.
            6. Select **Apply immediately** or schedule for the next maintenance window.
        - id: cli
          desc: |
            To ensure Neptune clusters do not use default security groups using the AWS CLI, check security groups for a Neptune cluster:

            ```bash
            aws neptune describe-db-clusters \
              --db-cluster-identifier <cluster-id> \
              --query "DBClusters[*].VpcSecurityGroups"
            ```

            Modify the cluster to use a custom security group:

            ```bash
            aws neptune modify-db-cluster \
              --db-cluster-identifier <cluster-id> \
              --vpc-security-group-ids <custom-sg-id>
            ```
        - id: terraform
          desc: |
            To ensure Neptune clusters do not use default security groups in Terraform:

            ```hcl
            resource "aws_neptune_cluster" "example" {
              cluster_identifier = "example"
              engine             = "neptune"

              vpc_security_group_ids = [aws_security_group.neptune.id]
            }
            ```

            Always specify explicit `vpc_security_group_ids` rather than relying on the default security group.
        - id: cloudformation
          desc: |
            To ensure Neptune clusters do not use default security groups in CloudFormation:

            ```yaml
            Resources:
              MyNeptuneCluster:
                Type: AWS::Neptune::DBCluster
                Properties:
                  DBClusterIdentifier: example
                  VpcSecurityGroupIds:
                    - !Ref NeptuneSecurityGroup
            ```

            Always specify explicit `VpcSecurityGroupIds` rather than relying on the default security group.
    refs:
      - url: https://docs.aws.amazon.com/neptune/latest/userguide/security-vpc.html
        title: AWS Documentation - Amazon Neptune and VPC security groups
      - url: https://docs.aws.amazon.com/vpc/latest/userguide/default-security-group.html
        title: AWS Documentation - Default security groups
