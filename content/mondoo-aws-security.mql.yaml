              }
            }

            resource "aws_cloudwatch_metric_alarm" "awsorganizationschanges" {
              alarm_name          = "AWSOrganizationsChanges"
              metric_name         = "AWSOrganizationsChanges"
              namespace           = "CISBenchmark"
