    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::RDS::DBInstance")
    mql: |
      cloudformation.template.resources.where(type == "AWS::RDS::DBInstance").all(
        properties['StorageEncrypted'] == true &&
        properties['KmsKeyId'] != empty
      )
  - uid: mondoo-aws-security-rds-cluster-cmk-encryption
    title: Ensure RDS clusters use customer-managed KMS encryption
    impact: 70
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
