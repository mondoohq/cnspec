          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ecs-efs-volume-transit-encryption-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ecs-efs-volume-transit-encryption-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon ECS task definitions enable transit encryption (`transitEncryption: ENABLED`) for every EFS volume configuration. By default, the EFS mount helper does not enforce TLS, meaning data flows between the ECS task and the EFS mount target in plaintext unless encryption in transit is explicitly required in the volume configuration.

        **Why this matters**

        - **Data interception:** Without TLS, any network device or host on the path between the ECS task and the EFS mount target can capture and read file system traffic in plaintext.
        - **Man-in-the-middle attacks:** An attacker with access to the VPC network path can intercept reads and writes, injecting or altering data in transit between the container and the file system.
        - **Shared infrastructure risk:** In multi-tenant VPC environments or where network segmentation is incomplete, plaintext NFS traffic can be captured by adjacent workloads that should not have access to the data.
        - **Compliance gaps:** Transmitting file system data without encryption violates the in-transit encryption requirements of many security frameworks, even when the data is encrypted at rest.

        **Risk mitigation**

        - **End-to-end encryption:** TLS between the ECS task and the EFS mount target ensures that data is protected for its entire journey across the VPC network fabric.
        - **Independent protection layer:** Transit encryption operates regardless of what network controls exist between the task and EFS, providing protection even if VPC routing or security group configurations are later misconfigured.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and open the Amazon ECS console.
        2. In the left navigation, choose Task definitions.
        3. Select a task definition and choose the latest active revision.
        4. Choose the Volumes tab.
        5. For each EFS volume, review the Transit encryption setting.

        A passing task definition shows ENABLED for Transit encryption on every EFS volume. A failing task definition shows DISABLED or no transit encryption setting on at least one EFS volume.

        ### Audit via CLI

        1. Describe a task definition and check transit encryption on EFS volume configurations:

        ```bash
        aws ecs describe-task-definition \
          --task-definition <task-definition-name> \
          --query 'taskDefinition.volumes[?efsVolumeConfiguration!=`null`].{Name:name,TransitEncryption:efsVolumeConfiguration.transitEncryption}'
        ```

        A passing task definition returns `"TransitEncryption": "ENABLED"` for every EFS volume. A failing task definition returns `"TransitEncryption": "DISABLED"` for at least one EFS volume.

      remediation:
        - id: console
          desc: |
            To ensure ECS task definitions enforce transit encryption for EFS volumes using the AWS Console:

            1. Navigate to the Amazon ECS Console.
            2. Select Task definitions in the left panel.
            3. Select the task definition to review.
            4. Under Volumes, check EFS volume configurations.
            5. For each EFS volume, ensure Transit encryption is set to Enabled.
            6. Create a new revision with the updated setting.
        - id: cli
          desc: |
            To ensure ECS task definitions enforce transit encryption for EFS volumes using the AWS CLI, check for EFS volumes without transit encryption:

            ```bash
            aws ecs list-task-definitions --status ACTIVE --query "taskDefinitionArns" | \
              xargs -I {} aws ecs describe-task-definition --task-definition {} \
              --query "taskDefinition.volumes[?efsVolumeConfiguration].{Name:name, Transit:efsVolumeConfiguration.transitEncryption}"
            ```

            Register a new task definition revision with transit encryption enabled:

            ```bash
            aws ecs register-task-definition --cli-input-json file://task-definition.json
            ```

            Ensure the volume configuration includes `"transitEncryption": "ENABLED"`.
        - id: terraform
          desc: |
            To ensure ECS task definitions enforce transit encryption for EFS volumes in Terraform, ensure EFS volumes in ECS task definitions have transit encryption enabled:

            ```hcl
            resource "aws_ecs_task_definition" "example" {
              family = "example"

              volume {
                name = "efs-volume"

                efs_volume_configuration {
                  file_system_id     = aws_efs_file_system.example.id
                  transit_encryption = "ENABLED"
                  transit_encryption_port = 2999
                }
              }

              container_definitions = jsonencode([
                {
                  name  = "app"
                  image = "example:latest"

                  mountPoints = [
                    {
                      sourceVolume  = "efs-volume"
                      containerPath = "/data"
                    }
                  ]
                }
              ])
            }
            ```
        - id: cloudformation
          desc: |
            To ensure ECS task definitions enforce transit encryption for EFS volumes in CloudFormation:

            ```yaml
            Resources:
              TaskDefinition:
                Type: "AWS::ECS::TaskDefinition"
                Properties:
                  Family: "example"
                  Volumes:
                    - Name: "efs-volume"
                      EFSVolumeConfiguration:
                        FilesystemId: !Ref EFSFileSystem
                        TransitEncryption: "ENABLED"
                        TransitEncryptionPort: 2999
            ```
    refs:
      - url: https://docs.aws.amazon.com/AmazonECS/latest/developerguide/efs-volumes.html
        title: AWS Documentation - Amazon EFS volumes
      - url: https://docs.aws.amazon.com/efs/latest/ug/encryption-in-transit.html
        title: AWS Documentation - Encrypting data in transit
  - uid: mondoo-aws-security-ecs-efs-volume-transit-encryption-aws
    filters: asset.platform == "aws"
    mql: |
      aws.ecs.taskDefinitions.all(
        volumes.where(efsVolumeConfiguration != empty).all(
          efsVolumeConfiguration.transitEncryption == "ENABLED"
        )
      )
  - uid: mondoo-aws-security-ecs-efs-volume-transit-encryption-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_ecs_task_definition")
    mql: |
      terraform.resources.where(nameLabel == "aws_ecs_task_definition").all(
        blocks.where(type == "volume").all(
          blocks.where(type == "efs_volume_configuration").all(
            attributes.transit_encryption.value == "ENABLED"
          )
        )
      )
  - uid: mondoo-aws-security-ecs-efs-volume-transit-encryption-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_ecs_task_definition")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_ecs_task_definition").all(
        change.after.volume.where(_['efs_volume_configuration'] != empty).all(
          _['efs_volume_configuration']['transit_encryption'] == "ENABLED"
        )
      )
  - uid: mondoo-aws-security-ecs-efs-volume-transit-encryption-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_ecs_task_definition")
    mql: |
      terraform.state.resources.where(type == "aws_ecs_task_definition").all(
        values.volume.where(_['efs_volume_configuration'] != empty).all(
          _['efs_volume_configuration']['transit_encryption'] == "ENABLED"
        )
      )
  - uid: mondoo-aws-security-ecs-efs-volume-transit-encryption-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::ECS::TaskDefinition")
    mql: |
      cloudformation.template.resources.where(type == "AWS::ECS::TaskDefinition").all(
      properties['Volumes'] == empty ||
      properties['Volumes'].where(_['EFSVolumeConfiguration'] != empty).all(
      _['EFSVolumeConfiguration']['TransitEncryption'] == "ENABLED"
      )
      )
  - uid: mondoo-aws-security-cloudwatch-log-group-retention-set
    title: Ensure CloudWatch log groups have a retention period configured
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-02
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-pr-pt-1
      compliance/nist-csf-2: nist-csf-2-pr-ps-04
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-11
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-5-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    variants:
      - uid: mondoo-aws-security-cloudwatch-log-group-retention-set-aws
        tags:
          mondoo.com/filter-title: AWS CloudWatch Log Group
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-cloudwatch-log-group-retention-set-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-cloudwatch-log-group-retention-set-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-cloudwatch-log-group-retention-set-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-cloudwatch-log-group-retention-set-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon CloudWatch log groups have an explicit retention period configured rather than the default setting of never expiring. Without a defined retention period, log groups accumulate logs indefinitely but offer no guarantee that logs will be retained for a minimum duration, and organizations have no systematic control over when evidence of attacker activity may be permanently lost.

        **Why this matters**

        - **Dwell time coverage:** Advanced attackers commonly maintain access for weeks or months before detection; a defined retention period ensures that logs spanning the full intrusion window are available when an investigation begins.
        - **Forensic completeness:** Incident response teams need historical logs to reconstruct attack timelines, identify the initial access vector, track lateral movement, and determine the full scope of a breach.
        - **Compliance requirements:** Security frameworks require organizations to define and enforce minimum log retention periods, typically ranging from 90 days to one year, specifically to support security investigations and audit reviews.
        - **Lifecycle management:** An explicit retention policy prevents indefinite log accumulation that would otherwise inflate storage costs without improving security.

        **Risk mitigation**

        - **Evidence preservation:** A defined minimum retention ensures logs survive long enough to support threat hunting and investigation of compromises that were not immediately detected.
        - **Regulatory posture:** Demonstrating that a retention policy is enforced satisfies auditor requests for evidence of log management controls.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and open the Amazon CloudWatch console.
        2. In the left navigation, choose Logs, then Log groups.
        3. Review the Retention column for each log group.

        A passing log group shows a defined retention period such as 90 days or 1 year in the Retention column. A failing log group shows Never expire in the Retention column.

        ### Audit via CLI

        1. List all log groups and filter for those without a defined retention period:

        ```bash
        aws logs describe-log-groups \
          --query 'logGroups[?!retentionInDays].{LogGroupName:logGroupName,RetentionInDays:retentionInDays}'
        ```

        A passing environment returns an empty list. A failing environment returns one or more log groups where `retentionInDays` is not set.

      remediation:
        - id: console
          desc: |
            To ensure CloudWatch log groups have a retention period configured using the AWS Console:

            1. Navigate to the Amazon CloudWatch Console.
            2. Select Log Groups from the left panel.
            3. Select a log group.
            4. Under Actions, choose Edit retention setting.
            5. Set the retention period to an appropriate value such as 90 days or 1 year.
            6. Choose Save.
        - id: cli
          desc: |
            To ensure CloudWatch log groups have a retention period configured using the AWS CLI, check log groups without retention periods:

            ```bash
            aws logs describe-log-groups --query "logGroups[?!retentionInDays].logGroupName"
            ```

            Set a retention period on a log group:

            ```bash
            aws logs put-retention-policy \
              --log-group-name <log-group-name> \
              --retention-in-days 365
            ```
        - id: terraform
          desc: |
            To ensure CloudWatch log groups have a retention period configured in Terraform, ensure CloudWatch log groups have a retention period:

            ```hcl
            resource "aws_cloudwatch_log_group" "example" {
              name              = "example-log-group"
              retention_in_days = 365
            }
            ```
        - id: cloudformation
          desc: |
            To ensure CloudWatch log groups have a retention period configured in CloudFormation:

            ```yaml
            Resources:
              LogGroup:
                Type: "AWS::Logs::LogGroup"
                Properties:
                  LogGroupName: "example-log-group"
                  RetentionInDays: 365
            ```
    refs:
      - url: https://docs.aws.amazon.com/AmazonCloudWatch/latest/logs/Working-with-log-groups-and-streams.html
        title: AWS Documentation - Working with log groups and log streams
  - uid: mondoo-aws-security-cloudwatch-log-group-retention-set-aws
    filters: asset.platform == "aws-cloudwatch-loggroup"
    mql: |
      aws.cloudwatch.loggroup.retentionInDays > 0
  - uid: mondoo-aws-security-cloudwatch-log-group-retention-set-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_cloudwatch_log_group")
    mql: |
      terraform.resources.where(nameLabel == "aws_cloudwatch_log_group").all(
        arguments.retention_in_days != empty && arguments.retention_in_days > 0
      )
  - uid: mondoo-aws-security-cloudwatch-log-group-retention-set-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_cloudwatch_log_group")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_cloudwatch_log_group").all(
        change.after.retention_in_days != empty && change.after.retention_in_days > 0
      )
  - uid: mondoo-aws-security-cloudwatch-log-group-retention-set-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_cloudwatch_log_group")
    mql: |
      terraform.state.resources.where(type == "aws_cloudwatch_log_group").all(
        values.retention_in_days != empty && values.retention_in_days > 0
      )
  - uid: mondoo-aws-security-cloudwatch-log-group-retention-set-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::Logs::LogGroup")
    mql: |
      cloudformation.template.resources.where(type == "AWS::Logs::LogGroup").all(
      properties['RetentionInDays'] != empty && properties['RetentionInDays'] > 0
      )
  - uid: mondoo-aws-security-redshift-cluster-require-ssl
    title: Ensure Redshift clusters require SSL for connections
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    variants:
      - uid: mondoo-aws-security-redshift-cluster-require-ssl-aws
        tags:
          mondoo.com/filter-title: AWS Redshift Cluster
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-redshift-cluster-require-ssl-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-redshift-cluster-require-ssl-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-redshift-cluster-require-ssl-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-redshift-cluster-require-ssl-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon Redshift clusters are configured to require SSL/TLS for all client connections by setting the `require_ssl` parameter to `true` in the cluster parameter group. By default, Redshift does not enforce SSL, allowing clients to connect over unencrypted channels and exposing queries and results to network interception.

        **Why this matters**

        - **Data interception prevention:** Queries and results transmitted over unencrypted connections can be captured by anyone with network access, exposing sensitive business data.
        - **Credential protection:** Database usernames and passwords sent over unencrypted connections are vulnerable to capture via network sniffing.
        - **Man-in-the-middle defense:** SSL provides server identity verification, preventing connections to impersonated or spoofed endpoints.
        - **Transit confidentiality:** Enforcing SSL guarantees that all data moving between clients and the cluster is encrypted end to end.

        **Risk mitigation**

        - **Forced encryption:** Setting `require_ssl = true` in the parameter group rejects any connection attempt that does not negotiate TLS, removing the possibility of accidental plaintext connections.
        - **Scope control:** Applying the parameter at the cluster level ensures enforcement regardless of individual client configuration or driver behavior.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and open the Amazon Redshift console.
        2. In the left navigation, choose Configurations, then Workload management.
        3. Select the parameter group associated with the cluster to review.
        4. Locate the `require_ssl` parameter and check its value.

        A passing parameter group shows `require_ssl` set to `true`. A failing parameter group shows `require_ssl` set to `false` or the default value.

        ### Audit via CLI

        1. Retrieve the `require_ssl` parameter from the cluster's parameter group:

        ```bash
        aws redshift describe-cluster-parameters \
          --parameter-group-name <parameter-group-name> \
          --query "Parameters[?ParameterName=='require_ssl'].{Name:ParameterName,Value:ParameterValue,Source:Source}"
        ```

        A passing parameter group returns `"ParameterValue": "true"`. A failing parameter group returns `"ParameterValue": "false"` or the default.

      remediation:
        - id: console
          desc: |
            To ensure Redshift clusters require SSL for connections using the AWS Console:

            1. Navigate to the Amazon Redshift Console.
            2. Select Configurations > Workload management in the left panel.
            3. Select the parameter group used by your cluster.
            4. Choose Edit parameters.
            5. Set `require_ssl` to `true`.
            6. Choose Save.
            7. Reboot the cluster for changes to take effect.
        - id: cli
          desc: |
            To ensure Redshift clusters require SSL for connections using the AWS CLI, check the current require_ssl setting:

            ```bash
            aws redshift describe-cluster-parameters \
              --parameter-group-name <parameter-group-name> \
              --query "Parameters[?ParameterName=='require_ssl']"
            ```

            Enable require_ssl:

            ```bash
            aws redshift modify-cluster-parameter-group \
              --parameter-group-name <parameter-group-name> \
              --parameters ParameterName=require_ssl,ParameterValue=true
            ```

            Reboot the cluster to apply changes:

            ```bash
            aws redshift reboot-cluster --cluster-identifier <cluster-id>
            ```
        - id: terraform
          desc: |
            To ensure Redshift clusters require SSL for connections in Terraform, ensure the Redshift parameter group requires SSL:

            ```hcl
            resource "aws_redshift_parameter_group" "example" {
              name   = "example-parameter-group"
              family = "redshift-1.0"

              parameter {
                name  = "require_ssl"
                value = "true"
              }
            }

            resource "aws_redshift_cluster" "example" {
              cluster_identifier        = "example-cluster"
              node_type                 = "dc2.large"
              cluster_parameter_group_name = aws_redshift_parameter_group.example.name
            }
            ```
        - id: cloudformation
          desc: |
            To ensure Redshift clusters require SSL for connections in CloudFormation:

            ```yaml
            Resources:
              RedshiftParameterGroup:
                Type: AWS::Redshift::ClusterParameterGroup
                Properties:
                  Description: "Parameter group with SSL required"
                  ParameterGroupFamily: redshift-1.0
                  Parameters:
                    - ParameterName: require_ssl
                      ParameterValue: "true"

              RedshiftCluster:
                Type: AWS::Redshift::Cluster
                Properties:
                  ClusterIdentifier: example-cluster
                  NodeType: dc2.large
                  ClusterParameterGroupName: !Ref RedshiftParameterGroup
            ```
    refs:
      - url: https://docs.aws.amazon.com/redshift/latest/mgmt/connecting-ssl-support.html
        title: AWS Documentation - Configure security options for connections
      - url: https://docs.aws.amazon.com/redshift/latest/mgmt/working-with-parameter-groups.html
        title: AWS Documentation - Amazon Redshift parameter groups
  - uid: mondoo-aws-security-redshift-cluster-require-ssl-aws
    filters: asset.platform == "aws-redshift-cluster"
    mql: |
      aws.redshift.cluster.parameters.where(_['ParameterName'] == "require_ssl").all(
        _['ParameterValue'] == "true"
      )
  - uid: mondoo-aws-security-redshift-cluster-require-ssl-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_redshift_parameter_group")
    mql: |
      terraform.resources.where(nameLabel == "aws_redshift_parameter_group").all(
        blocks.any(
          attributes.name.value == "require_ssl"
            && attributes.value.value == "true"
        )
      )
  - uid: mondoo-aws-security-redshift-cluster-require-ssl-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_redshift_parameter_group")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_redshift_parameter_group").all(
        change.after.parameter.where(name == "require_ssl").map(value).first == "true"
      )
  - uid: mondoo-aws-security-redshift-cluster-require-ssl-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_redshift_parameter_group")
    mql: |
      terraform.state.resources.where(type == "aws_redshift_parameter_group").all(
        values.parameter.where(name == "require_ssl").map(value).first == "true"
      )
  - uid: mondoo-aws-security-redshift-cluster-require-ssl-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::Redshift::ClusterParameterGroup")
    mql: |
      cloudformation.template.resources.where(type == "AWS::Redshift::ClusterParameterGroup").all(
      properties['Parameters'].where(name == "require_ssl").map(value).first == "true"
      )
  - uid: mondoo-aws-security-vpc-subnet-no-auto-assign-public-ip
    title: Ensure VPC subnets do not automatically assign public IP addresses
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-aws-security-vpc-subnet-no-auto-assign-public-ip-aws
        tags:
          mondoo.com/filter-title: AWS EC2 VPC
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-vpc-subnet-no-auto-assign-public-ip-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-vpc-subnet-no-auto-assign-public-ip-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-vpc-subnet-no-auto-assign-public-ip-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-vpc-subnet-no-auto-assign-public-ip-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that VPC subnets are not configured to automatically assign public IP addresses to instances launched within them. When a subnet has auto-assign public IP enabled, every instance launched in that subnet receives a public IP address by default, potentially exposing it to the internet.

        **Why this matters**

        - Instances launched in subnets with auto-assign public IP enabled are immediately reachable from the internet if security group rules permit, increasing the attack surface.
        - Developers or automation tools may inadvertently launch instances in public subnets without realizing they will be publicly accessible.
        - Private workloads such as databases, internal APIs, and backend services should never be assigned public IP addresses.
        - Compliance frameworks including CIS AWS Foundations Benchmark, PCI DSS, and SOC 2 recommend minimizing public network exposure.

        **Risk mitigation**

        - **Reduced attack surface:** Prevents accidental public exposure of instances that should remain private.
        - **Defense in depth:** Works alongside security groups and NACLs to enforce network isolation.
        - **Intentional access:** Forces teams to explicitly assign public IPs or use NAT gateways/load balancers for internet access.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and open the VPC console.
        2. In the left navigation, choose Subnets.
        3. Select a subnet and choose the Details tab.
        4. Locate the Auto-assign public IPv4 address field.

        A passing subnet shows No for Auto-assign public IPv4 address. A failing subnet shows Yes.

        ### Audit via CLI

        1. List all subnets and check the `MapPublicIpOnLaunch` attribute:

        ```bash
        aws ec2 describe-subnets \
          --query 'Subnets[*].{SubnetId:SubnetId,VpcId:VpcId,MapPublicIpOnLaunch:MapPublicIpOnLaunch}'
        ```

        A passing subnet returns `"MapPublicIpOnLaunch": false`. A failing subnet returns `"MapPublicIpOnLaunch": true`.

      remediation:
        - id: console
          desc: |
            To ensure VPC subnets do not automatically assign public IP addresses using the AWS Console:

            1. Navigate to the AWS VPC Console.
            2. Select Subnets from the left panel.
            3. Select the subnet to modify.
            4. Select Actions > Edit subnet settings.
            5. Uncheck Enable auto-assign public IPv4 address.
            6. Select Save.
        - id: cli
          desc: |
            To ensure VPC subnets do not automatically assign public IP addresses using the AWS CLI, disable auto-assign public IP for a subnet:

            ```bash
            aws ec2 modify-subnet-attribute \
              --subnet-id <subnet-id> \
              --map-public-ip-on-launch false
            ```

            Verify the setting:

            ```bash
            aws ec2 describe-subnets --subnet-ids <subnet-id> \
              --query "Subnets[*].{SubnetId:SubnetId,MapPublicIpOnLaunch:MapPublicIpOnLaunch}"
            ```
        - id: terraform
          desc: |
            To ensure VPC subnets do not automatically assign public IP addresses in Terraform, ensure `map_public_ip_on_launch` is set to `false` (or omitted, as `false` is the default):

            ```hcl
            resource "aws_subnet" "private" {
              vpc_id                  = aws_vpc.main.id
              cidr_block              = "10.0.1.0/24"
              map_public_ip_on_launch = false

              tags = {
                Name = "private-subnet"
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure VPC subnets do not automatically assign public IP addresses in CloudFormation:

            ```yaml
            Resources:
              PrivateSubnet:
                Type: "AWS::EC2::Subnet"
                Properties:
                  VpcId: !Ref MainVPC
                  CidrBlock: "10.0.1.0/24"
                  MapPublicIpOnLaunch: false
                  Tags:
                    - Key: "Name"
                      Value: "private-subnet"
            ```
    refs:
      - url: https://docs.aws.amazon.com/vpc/latest/userguide/configure-subnets.html
        title: AWS Documentation - Configure subnets
      - url: https://docs.aws.amazon.com/vpc/latest/userguide/vpc-security-best-practices.html
        title: AWS Documentation - VPC security best practices
  - uid: mondoo-aws-security-vpc-subnet-no-auto-assign-public-ip-aws
    filters: asset.platform == "aws-vpc"
    mql: aws.vpc.subnets.all(mapPublicIpOnLaunch == false)
  - uid: mondoo-aws-security-vpc-subnet-no-auto-assign-public-ip-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_subnet")
