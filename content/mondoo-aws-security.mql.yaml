    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_instance")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_instance").none(
        change.after.instance_type == /^(t1|m1|m2|c1|cc1|cc2|cg1|cr1|hi1|hs1)\./
