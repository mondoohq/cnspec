  - uid: mondoo-aws-security-glue-catalog-encryption-enabled
    title: Ensure AWS Glue Data Catalog encryption at rest is enabled
    impact: 70
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-aws-security-glue-catalog-encryption-enabled-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-glue-catalog-encryption-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-glue-catalog-encryption-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-glue-catalog-encryption-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-glue-catalog-encryption-enabled-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that the AWS Glue Data Catalog has encryption at rest enabled. The Data Catalog stores metadata about data sources, tables, schemas, and partitions. Without encryption, this metadata is stored in plaintext and could expose sensitive information about your data infrastructure.

        **Why this matters**

        - The Data Catalog contains metadata about all data sources, including table schemas, column names, partition details, and connection information.
        - Unencrypted catalog metadata can reveal sensitive data structures, naming conventions, and data locations to unauthorized users.
        - Connection passwords stored in the Data Catalog should be encrypted to prevent credential exposure.
        - Compliance frameworks require encryption of metadata stores that describe sensitive data assets.

        **Risk mitigation**

        - **Metadata protection:** Encrypts all table definitions, schema information, and partition metadata in the Data Catalog.
        - **Credential security:** Encrypts connection passwords stored in the catalog.
        - **Compliance:** Meets encryption requirements for data catalog and metadata services.
      remediation:
        - id: console
          desc: |
            To ensure AWS Glue Data Catalog encryption at rest is enabled using the AWS Console:

            1. Navigate to the AWS Glue Console.
            2. Select **Settings** in the left panel (under Data catalog).
            3. Enable **Metadata encryption** and select a KMS key.
            4. Enable **Encrypt connection passwords** and select a KMS key.
            5. Select **Save**.
        - id: cli
          desc: |
            To ensure AWS Glue Data Catalog encryption at rest is enabled using the AWS CLI, enable Data Catalog encryption:

            ```bash
            aws glue put-data-catalog-encryption-settings \
              --data-catalog-encryption-settings '{
                "EncryptionAtRest": {
                  "CatalogEncryptionMode": "SSE-KMS",
                  "SseAwsKmsKeyId": "arn:aws:kms:region:account-id:key/key-id"
                },
                "ConnectionPasswordEncryption": {
                  "ReturnConnectionPasswordEncrypted": true,
                  "AwsKmsKeyId": "arn:aws:kms:region:account-id:key/key-id"
                }
              }'
            ```

            Verify the setting:

            ```bash
            aws glue get-data-catalog-encryption-settings \
              --query "DataCatalogEncryptionSettings"
            ```
        - id: terraform
          desc: |
            To ensure AWS Glue Data Catalog encryption at rest is enabled in Terraform:

            ```hcl
            resource "aws_glue_data_catalog_encryption_settings" "example" {
              data_catalog_encryption_settings {
                encryption_at_rest {
                  catalog_encryption_mode = "SSE-KMS"
                  sse_aws_kms_key_id     = aws_kms_key.glue.arn
                }
                connection_password_encryption {
                  return_connection_password_encrypted = true
                  aws_kms_key_id                      = aws_kms_key.glue.arn
                }
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure AWS Glue Data Catalog encryption at rest is enabled in CloudFormation:

            ```yaml
            Resources:
              GlueCatalogEncryption:
                Type: "AWS::Glue::DataCatalogEncryptionSettings"
                Properties:
                  CatalogId: !Ref "AWS::AccountId"
                  DataCatalogEncryptionSettings:
                    EncryptionAtRest:
                      CatalogEncryptionMode: SSE-KMS
                      SseAwsKmsKeyId: !Ref GlueKMSKey
                    ConnectionPasswordEncryption:
                      KmsKeyId: !Ref GlueKMSKey
                      ReturnConnectionPasswordEncrypted: true
            ```
    refs:
      - url: https://docs.aws.amazon.com/glue/latest/dg/encrypt-data-catalog.html
        title: AWS Documentation - Encrypting your Data Catalog
      - url: https://docs.aws.amazon.com/glue/latest/dg/encryption-at-rest.html
        title: AWS Documentation - Encryption at rest in AWS Glue
  - uid: mondoo-aws-security-glue-catalog-encryption-enabled-aws
    filters: asset.platform == "aws"
    mql: |
      aws.glue.catalogEncryptionSettings.all(
        _['EncryptionAtRest']['CatalogEncryptionMode'] != "" && _['EncryptionAtRest']['CatalogEncryptionMode'] != "DISABLED"
      )
  - uid: mondoo-aws-security-glue-catalog-encryption-enabled-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_glue_data_catalog_encryption_settings")
    mql: |
      terraform.resources.where(nameLabel == "aws_glue_data_catalog_encryption_settings").all(
        blocks.where(type == "data_catalog_encryption_settings").all(
          blocks.where(type == "encryption_at_rest").all(
            arguments.catalog_encryption_mode == /SSE-KMS/
          )
        )
      )
  - uid: mondoo-aws-security-glue-catalog-encryption-enabled-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_glue_data_catalog_encryption_settings")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_glue_data_catalog_encryption_settings").all(
        change.after.data_catalog_encryption_settings != empty &&
        change.after.data_catalog_encryption_settings.all(
          _['encryption_at_rest'] != empty
        )
      )
  - uid: mondoo-aws-security-glue-catalog-encryption-enabled-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_glue_data_catalog_encryption_settings")
    mql: |
      terraform.state.resources.where(type == "aws_glue_data_catalog_encryption_settings").all(
        values.data_catalog_encryption_settings != empty &&
        values.data_catalog_encryption_settings.all(
          _['encryption_at_rest'] != empty
        )
      )
  - uid: mondoo-aws-security-glue-catalog-encryption-enabled-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::Glue::DataCatalogEncryptionSettings")
    mql: |
      cloudformation.template.resources.where(type == "AWS::Glue::DataCatalogEncryptionSettings").all(
      properties['DataCatalogEncryptionSettings'] != empty &&
      properties['DataCatalogEncryptionSettings'].all(
      _['encryption_at_rest'] != empty
      )
      )
