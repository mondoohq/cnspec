    docs:
      desc: |
        This check ensures that AWS App Mesh meshes use the DROP_ALL egress filter type. The DROP_ALL filter blocks all outbound traffic from virtual services unless explicitly allowed through virtual services definitions, implementing a deny-by-default network posture.

        **Why this matters**

        - The default ALLOW_ALL egress filter permits all outbound traffic, which can enable data exfiltration and communication with unauthorized external services.
        - DROP_ALL enforces explicit allowlisting of external service dependencies, reducing the attack surface.
        - A deny-by-default network posture is a core principle of zero-trust architectures.
        - NIST SP 800-53 SC-7 requires boundary protection that restricts outbound network traffic.

        **Risk mitigation**

        - **Data exfiltration prevention:** Blocks unauthorized outbound communication from mesh services.
        - **Zero trust:** Enforces explicit allowlisting of all external service dependencies.
        - **Blast radius reduction:** Compromised services cannot reach arbitrary external endpoints.
      audit: |
        ### Audit via Console

        1. Navigate to the **AWS App Mesh Console**.
        2. Select **Meshes** from the left navigation.
        3. For each mesh, choose the mesh name to open its details.
        4. Under **Mesh details**, review the **Egress filter** value.

        A passing mesh shows an egress filter type of **DROP_ALL**. A failing mesh shows **ALLOW_ALL**.

        ### Audit via CLI

        1. List all meshes and retrieve their egress filter configuration:

        ```bash
        aws appmesh list-meshes --query 'meshes[*].meshName' --output text | \
          tr '\t' '\n' | \
          xargs -I {} aws appmesh describe-mesh --mesh-name {} \
            --query '{MeshName:mesh.meshName,EgressFilter:mesh.spec.egressFilter.type}'
        ```

        A passing mesh returns `"EgressFilter": "DROP_ALL"`. A failing mesh returns `"EgressFilter": "ALLOW_ALL"`.

      remediation:
        - id: console
          desc: |
            To ensure App Mesh meshes use DROP_ALL egress filter using the AWS Console:

            1. Navigate to the **AWS App Mesh Console** and select **Meshes**.
            2. Select the mesh you want to configure.
            3. Choose **Edit**.
            4. Under **Egress filter**, select **DROP_ALL**.
            5. Ensure all required external services are defined as virtual services.
            6. Choose **Save**.
        - id: cli
          desc: |
            To ensure App Mesh meshes use DROP_ALL egress filter using the AWS CLI:

            ```bash
            aws appmesh update-mesh \
              --mesh-name <mesh-name> \
              --spec egressFilter={type=DROP_ALL}
            ```
        - id: terraform
          desc: |
            To ensure App Mesh meshes use DROP_ALL egress filter in Terraform:

            ```hcl
            resource "aws_appmesh_mesh" "example" {
              name = "example-mesh"

              spec {
                egress_filter {
                  type = "DROP_ALL"
                }
              }
            }
            ```
        - id: cloudformation
          desc: |
            Set `Spec.EgressFilter.Type: DROP_ALL` on every `AWS::AppMesh::Mesh` so virtual nodes can only reach destinations defined inside the mesh, with no implicit egress to the public internet:

            ```yaml
            Resources:
              Mesh:
                Type: AWS::AppMesh::Mesh
                Properties:
                  MeshName: example
                  Spec:
                    EgressFilter:
                      Type: DROP_ALL
            ```
    refs:
      - url: https://docs.aws.amazon.com/app-mesh/latest/userguide/meshes.html
        title: AWS Documentation - App Mesh meshes
  - uid: mondoo-aws-security-appmesh-egress-filter-aws
    filters: asset.platform == "aws"
    mql: |
      aws.appmesh.meshes.all(egressFilterType == "DROP_ALL")
  - uid: mondoo-aws-security-appmesh-egress-filter-terraform-hcl
