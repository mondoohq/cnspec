      blocks.where(type == "workspace_access_properties") != empty &&
      blocks.where(type == "workspace_access_properties").all(arguments.device_type_web == "DENY")
      )
  - uid: mondoo-aws-security-workspaces-directory-web-access-disabled-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_workspaces_directory")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_workspaces_directory").all(
      change.after.workspace_access_properties != empty &&
      change.after.workspace_access_properties.all(device_type_web == "DENY")
      )
  - uid: mondoo-aws-security-workspaces-directory-web-access-disabled-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_workspaces_directory")
    mql: |
      terraform.state.resources.where(type == "aws_workspaces_directory").all(
      values.workspace_access_properties != empty &&
      values.workspace_access_properties.all(device_type_web == "DENY")
      )
