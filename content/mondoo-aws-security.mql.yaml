  - uid: mondoo-aws-security-sns-no-public-access
    title: Ensure SNS topics do not allow public access
    impact: 80
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-5-15
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-1-1
    variants:
      - uid: mondoo-aws-security-sns-no-public-access-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-sns-no-public-access-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-sns-no-public-access-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-sns-no-public-access-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-sns-no-public-access-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that SNS topic access policies do not grant public access. An SNS topic with a policy that allows Principal "*" without conditions enables any AWS account or unauthenticated user to publish or subscribe to the topic.

        **Why this matters**

        - Public SNS topics can be abused to send unauthorized notifications or subscribe to receive sensitive messages.
        - Attackers can publish messages to public topics, potentially triggering downstream Lambda functions or other integrations.
        - Unauthorized subscribers can receive sensitive data published to the topic.
        - SNS topic policies should follow the principle of least privilege, restricting access to specific accounts and services.
      remediation:
        - id: console
          desc: |
            To restrict SNS topic access using the AWS Console:

            1. Navigate to the **SNS** console and select the topic.
            2. Select **Edit**.
            3. Under **Access policy**, review the JSON policy.
            4. Remove any statements with `"Principal": "*"` that lack restrictive conditions.
            5. Restrict access to specific AWS accounts, services, or VPC endpoints.
            6. Save the changes.
        - id: cli
          desc: |
            To restrict SNS topic access using the AWS CLI, first get the current policy:

            ```bash
            aws sns get-topic-attributes --topic-arn TOPIC_ARN --query 'Attributes.Policy'
            ```

            Then update the policy to remove public access:

            ```bash
            aws sns set-topic-attributes \
              --topic-arn TOPIC_ARN \
              --attribute-name Policy \
              --attribute-value file://restricted-policy.json
            ```
        - id: terraform
          desc: |
            Build the topic policy with `aws_iam_policy_document` so wildcard principals are scoped to specific accounts, services, or VPC endpoints, then attach it via `aws_sns_topic_policy`:

            ```hcl
            data "aws_iam_policy_document" "topic" {
              statement {
                sid       = "AllowProductionPublish"
                effect    = "Allow"
                actions   = ["sns:Publish"]
                resources = [aws_sns_topic.alerts.arn]

                principals {
                  type        = "AWS"
                  identifiers = ["arn:aws:iam::111122223333:root"]
                }
              }
            }

            resource "aws_sns_topic_policy" "alerts" {
              arn    = aws_sns_topic.alerts.arn
              policy = data.aws_iam_policy_document.topic.json
            }
            ```
        - id: cloudformation
          desc: |
            Build the topic policy with specific principals — `aws:SourceArn`/`aws:SourceAccount` conditions narrow cross-service publishing where you can't name a fixed account:

            ```yaml
            Resources:
              TopicPolicy:
                Type: AWS::SNS::TopicPolicy
                Properties:
                  Topics:
                    - !Ref AlertTopic
                  PolicyDocument:
                    Version: "2012-10-17"
                    Statement:
                      - Effect: Allow
                        Principal:
                          AWS: arn:aws:iam::111122223333:root
                        Action: sns:Publish
                        Resource: !Ref AlertTopic
            ```
    refs:
      - url: https://docs.aws.amazon.com/sns/latest/dg/sns-access-policy-use-cases.html
        title: Amazon SNS access policy use cases
  - uid: mondoo-aws-security-sns-no-public-access-aws
    filters: asset.platform == "aws"
    mql: |
      aws.sns.topics.all(
        policy == empty || policy['Statement'].where(_['Effect'] == "Allow").none(
          _['Principal'] == "*" || _['Principal']['AWS'] == "*" || _['Principal']['AWS'].contains("*")
        )
      )
  - uid: mondoo-aws-security-sns-no-public-access-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_sns_topic_policy")
    mql: |
      terraform.resources.where(nameLabel == "aws_sns_topic_policy").all(
        arguments.policy["Statement"].where(_["Effect"] == "Allow").none(
          _["Principal"] == "*" || _["Principal"]["AWS"] == "*"
        )
      )
  - uid: mondoo-aws-security-sns-no-public-access-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_sns_topic_policy")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_sns_topic_policy").all(
        change.after["policy"]["Statement"].where(_["Effect"] == "Allow").none(
          _["Principal"] == "*" || _["Principal"]["AWS"] == "*"
        )
      )
  - uid: mondoo-aws-security-sns-no-public-access-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_sns_topic_policy")
    mql: |
      terraform.state.resources.where(type == "aws_sns_topic_policy").all(
        values["policy"]["Statement"].where(_["Effect"] == "Allow").none(
          _["Principal"] == "*" || _["Principal"]["AWS"] == "*"
        )
      )
  - uid: mondoo-aws-security-sns-no-public-access-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::SNS::TopicPolicy")
    mql: |
      cloudformation.template.resources.where(type == "AWS::SNS::TopicPolicy").all(
        properties['PolicyDocument'] == null ||
        properties['PolicyDocument']['Statement'] == null ||
        properties['PolicyDocument']['Statement'].where(_['Effect'] == "Allow").none(
          _['Principal'] == "*" ||
          _['Principal']['AWS'] == "*" ||
          _['Principal']['AWS'] != null && _['Principal']['AWS'].contains("*")
        )
      )
  - uid: mondoo-aws-security-drs-private-replication
    title: Ensure DRS uses private IP for data replication
    impact: 70
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-1-6
      compliance/vda-isa-5: vda-isa-5-5-2-6
    variants:
      - uid: mondoo-aws-security-drs-private-replication-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-drs-private-replication-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-drs-private-replication-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-drs-private-replication-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that AWS Elastic Disaster Recovery (DRS) replication configurations use private IP addresses for data plane routing. When set to PUBLIC_IP, replication data traverses the public internet, increasing exposure to interception and eavesdropping.

        **Why this matters**

        - Replication data sent over public IPs traverses the public internet, even if encrypted in transit.
        - Private IP replication keeps data within the AWS network, reducing the attack surface.
        - Using private IP routing is required for environments with strict network isolation requirements.
        - Compliance frameworks require data in transit to use private network paths where available.
      remediation:
        - id: console
          desc: |
            To configure private IP replication using the AWS Console:

            1. Navigate to the **AWS Elastic Disaster Recovery** console.
            2. Select **Source servers**.
            3. Choose the source server and go to **Replication Settings**.
            4. Set **Data routing** to **Private IP**.
            5. Ensure VPN or Direct Connect is configured for private connectivity.
            6. Save the changes.
        - id: cli
          desc: |
            To configure private IP replication using the AWS CLI:

            ```bash
            aws drs update-replication-configuration \
              --source-server-id SOURCE_SERVER_ID \
              --data-plane-routing PRIVATE_IP
            ```
        - id: terraform
          desc: |
            Set `data_plane_routing = "PRIVATE_IP"` on every `aws_drs_replication_configuration_template`:

            ```hcl
            resource "aws_drs_replication_configuration_template" "example" {
              staging_area_subnet_id   = aws_subnet.staging.id
              replication_servers_security_groups_ids = [aws_security_group.drs.id]
              ebs_encryption           = "DEFAULT"
              replication_server_instance_type = "t3.small"
              use_dedicated_replication_server = false
              associate_default_security_group = false
              bandwidth_throttling     = 0
              create_public_ip         = false
              data_plane_routing       = "PRIVATE_IP"
              default_large_staging_disk_type = "GP3"
            }
            ```
    refs:
      - url: https://docs.aws.amazon.com/drs/latest/userguide/replication-settings.html
        title: AWS DRS Replication Settings
  - uid: mondoo-aws-security-drs-private-replication-aws
    filters: asset.platform == "aws"
    mql: |
      aws.drs.sourceServers.all(
        replicationConfiguration.dataPlaneRouting == "PRIVATE_IP"
      )
  - uid: mondoo-aws-security-drs-private-replication-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_drs_replication_configuration_template")
    mql: |
      terraform.resources.where(nameLabel == "aws_drs_replication_configuration_template").all(
        arguments.data_plane_routing == "PRIVATE_IP"
      )
  - uid: mondoo-aws-security-drs-private-replication-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_drs_replication_configuration_template")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_drs_replication_configuration_template").all(
        change.after["data_plane_routing"] == "PRIVATE_IP"
      )
  - uid: mondoo-aws-security-drs-private-replication-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_drs_replication_configuration_template")
    mql: |
      terraform.state.resources.where(type == "aws_drs_replication_configuration_template").all(
        values["data_plane_routing"] == "PRIVATE_IP"
      )
  - uid: mondoo-aws-security-drs-no-public-recovery-ip
    title: Ensure DRS recovery instances have no public IPs
    impact: 70
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
