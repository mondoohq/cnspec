      )
  - uid: mondoo-aws-security-redshift-cluster-enhanced-vpc-routing
    title: Ensure Redshift clusters use enhanced VPC routing
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-1-5
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-aws-security-redshift-cluster-enhanced-vpc-routing-aws
        tags:
          mondoo.com/filter-title: AWS Redshift Cluster
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-redshift-cluster-enhanced-vpc-routing-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-redshift-cluster-enhanced-vpc-routing-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-redshift-cluster-enhanced-vpc-routing-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-redshift-cluster-enhanced-vpc-routing-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon Redshift clusters use enhanced VPC routing. Without enhanced VPC routing, Redshift COPY and UNLOAD operations route data through the public internet, where it is susceptible to network interception and completely bypasses VPC-level security monitoring such as flow logs, security groups, and network ACLs.

        **Why this matters**

        - COPY and UNLOAD operations without enhanced VPC routing traverse the internet, exposing sensitive query results and loaded data to network-level interception by attackers positioned along the route.
        - Internet-routed data transfers bypass all VPC security controls, meaning security groups, NACLs, and VPC endpoints cannot restrict or monitor data movement, creating a blind spot for data exfiltration detection.
        - An attacker who compromises Redshift credentials can exfiltrate data via UNLOAD to external S3 buckets over internet routes that are invisible to VPC flow logs, leaving no network-level forensic evidence.

        **Risk mitigation**

        - **Data interception prevention:** Forces all COPY and UNLOAD traffic through the VPC, eliminating internet-routed data exposure.
        - **Exfiltration detection:** VPC flow logs capture all data transfer traffic, enabling detection of unauthorized UNLOAD operations to external destinations.
        - **Network policy enforcement:** Security groups and NACLs can restrict which destinations Redshift can transfer data to, limiting an attacker's ability to exfiltrate data to attacker-controlled storage.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and open the Amazon Redshift console.
        2. In the left navigation, choose Clusters and select the cluster to review.
        3. Choose the Properties tab.
        4. Under Network and security, locate the Enhanced VPC routing row.

        A passing cluster shows Enhanced VPC routing as Enabled. A failing cluster shows it as Disabled.

        ### Audit via CLI

        1. Describe the cluster and check the `EnhancedVpcRouting` attribute:

        ```bash
        aws redshift describe-clusters \
          --cluster-identifier <cluster-id> \
          --query 'Clusters[*].{ClusterIdentifier:ClusterIdentifier,EnhancedVpcRouting:EnhancedVpcRouting}'
        ```

        A passing cluster returns `"EnhancedVpcRouting": true`. A failing cluster returns `"EnhancedVpcRouting": false`.

      remediation:
        - id: console
          desc: |
            To ensure Redshift clusters use enhanced VPC routing using the AWS Console:

            1. Navigate to the Amazon Redshift Console.
            2. Select the cluster.
            3. Choose Actions, then Modify.
            4. Enable Enhanced VPC routing.
            5. Choose Modify cluster.
        - id: cli
          desc: |
            To ensure Redshift clusters use enhanced VPC routing using the AWS CLI:

            ```bash
            aws redshift modify-cluster \
              --cluster-identifier <cluster-id> \
              --enhanced-vpc-routing
            ```
        - id: terraform
          desc: |
            To ensure Redshift clusters use enhanced VPC routing in Terraform:

            ```hcl
            resource "aws_redshift_cluster" "example" {
              cluster_identifier  = "example-cluster"
              node_type           = "dc2.large"
              enhanced_vpc_routing = true
            }
            ```
        - id: cloudformation
          desc: |
            To ensure Redshift clusters use enhanced VPC routing in CloudFormation:

            ```yaml
            Resources:
              RedshiftCluster:
                Type: AWS::Redshift::Cluster
                Properties:
                  ClusterIdentifier: example-cluster
                  NodeType: dc2.large
                  EnhancedVpcRouting: true
            ```
    refs:
      - url: https://docs.aws.amazon.com/redshift/latest/mgmt/enhanced-vpc-routing.html
        title: AWS Documentation - Amazon Redshift enhanced VPC routing
  - uid: mondoo-aws-security-redshift-cluster-enhanced-vpc-routing-aws
    filters: asset.platform == "aws-redshift-cluster"
    mql: aws.redshift.cluster.enhancedVpcRouting == true
  - uid: mondoo-aws-security-redshift-cluster-enhanced-vpc-routing-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_redshift_cluster")
    mql: |
      terraform.resources.where(nameLabel == "aws_redshift_cluster").all(
        arguments.enhanced_vpc_routing == true
      )
  - uid: mondoo-aws-security-redshift-cluster-enhanced-vpc-routing-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_redshift_cluster")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_redshift_cluster").all(
        change.after.enhanced_vpc_routing == true
      )
  - uid: mondoo-aws-security-redshift-cluster-enhanced-vpc-routing-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_redshift_cluster")
    mql: |
      terraform.state.resources.where(type == "aws_redshift_cluster").all(
        values.enhanced_vpc_routing == true
      )
  - uid: mondoo-aws-security-redshift-cluster-enhanced-vpc-routing-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::Redshift::Cluster")
    mql: |
      cloudformation.template.resources.where(type == "AWS::Redshift::Cluster").all(
      properties['EnhancedVpcRouting'] == true
      )
  - uid: mondoo-aws-security-cloudfront-minimum-tls-version
    title: Ensure CloudFront distributions use TLS 1.2 or higher
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    variants:
      - uid: mondoo-aws-security-cloudfront-minimum-tls-version-distribution
        tags:
          mondoo.com/filter-title: AWS CloudFront Distribution
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-cloudfront-minimum-tls-version-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-cloudfront-minimum-tls-version-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-cloudfront-minimum-tls-version-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-cloudfront-minimum-tls-version-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon CloudFront distributions are configured with a minimum TLS protocol version of 1.2 or higher. Older TLS versions (1.0 and 1.1) have known vulnerabilities and should not be used.

        **Why this matters**

        - TLS 1.0 and 1.1 have known vulnerabilities including POODLE and BEAST attacks.
        - Modern browsers and security standards require TLS 1.2 as the minimum version.
        - AWS Security Hub control CloudFront.10 requires TLS 1.2 or higher.
        - PCI DSS requires TLS 1.2 or higher for all connections handling cardholder data.

        **Risk mitigation**

        - **Protocol security:** Eliminates known vulnerabilities in older TLS versions.
        - **Compliance:** Meets PCI DSS, HIPAA, and industry requirements for modern encryption protocols.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and open the Amazon CloudFront console.
        2. Choose Distributions and select the distribution to review.
        3. Choose the General tab.
        4. Under Settings, locate the Minimum SSL/TLS version field.

        A passing distribution shows a minimum TLS version of TLSv1.2_2021 or TLSv1.2_2019. A failing distribution shows TLSv1, TLSv1.1, or TLSv1_2016.

        ### Audit via CLI

        1. Retrieve the viewer certificate configuration for the distribution:

        ```bash
        aws cloudfront get-distribution \
          --id <distribution-id> \
          --query 'Distribution.DistributionConfig.ViewerCertificate.{MinimumProtocolVersion:MinimumProtocolVersion,SSLSupportMethod:SSLSupportMethod}'
        ```

        A passing distribution returns `"MinimumProtocolVersion"` containing `TLSv1.2`. A failing distribution returns `TLSv1`, `TLSv1.1`, or `TLSv1_2016`.

      remediation:
        - id: console
          desc: |
            To ensure CloudFront distributions use TLS 1.2 or higher using the AWS Console:

            1. Navigate to the Amazon CloudFront Console.
            2. Select the distribution.
            3. Choose the General tab, then Edit.
            4. Under Custom SSL certificate, set the Minimum SSL/TLS protocol to TLSv1.2_2021.
            5. Choose Save changes.
        - id: cli
          desc: |
            To ensure CloudFront distributions use TLS 1.2 or higher using the AWS CLI:

            ```bash
            aws cloudfront get-distribution-config --id <distribution-id> > dist-config.json
            # Edit to set MinimumProtocolVersion to "TLSv1.2_2021"
            aws cloudfront update-distribution --id <distribution-id> \
              --if-match <etag> --distribution-config file://dist-config.json
            ```
        - id: terraform
          desc: |
            To ensure CloudFront distributions use TLS 1.2 or higher in Terraform:

            ```hcl
            resource "aws_cloudfront_distribution" "example" {
              viewer_certificate {
                minimum_protocol_version = "TLSv1.2_2021"
                ssl_support_method       = "sni-only"
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure CloudFront distributions use TLS 1.2 or higher in CloudFormation:

            ```yaml
            Resources:
              Distribution:
                Type: AWS::CloudFront::Distribution
                Properties:
                  DistributionConfig:
                    ViewerCertificate:
                      MinimumProtocolVersion: TLSv1.2_2021
                      SslSupportMethod: sni-only
            ```
    refs:
      - url: https://docs.aws.amazon.com/AmazonCloudFront/latest/DeveloperGuide/secure-connections-supported-viewer-protocols-ciphers.html
        title: AWS Documentation - Supported protocols and ciphers between viewers and CloudFront
  - uid: mondoo-aws-security-cloudfront-minimum-tls-version-distribution
    filters: asset.platform == "aws-cloudfront-distribution"
    mql: aws.cloudfront.distribution.minimumProtocolVersion == /TLSv1\.2/
  - uid: mondoo-aws-security-cloudfront-minimum-tls-version-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_cloudfront_distribution")
    mql: |
      terraform.resources.where(nameLabel == "aws_cloudfront_distribution").all(
        blocks.where(type == "viewer_certificate").all(
          arguments.minimum_protocol_version == /TLSv1\.2/
        )
      )
  - uid: mondoo-aws-security-cloudfront-minimum-tls-version-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_cloudfront_distribution")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_cloudfront_distribution").all(
        change.after.viewer_certificate != empty &&
        change.after.viewer_certificate.all(minimum_protocol_version == /TLSv1\.2/)
      )
  - uid: mondoo-aws-security-cloudfront-minimum-tls-version-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_cloudfront_distribution")
    mql: |
      terraform.state.resources.where(type == "aws_cloudfront_distribution").all(
        values.viewer_certificate != empty &&
        values.viewer_certificate.all(minimum_protocol_version == /TLSv1\.2/)
      )
  - uid: mondoo-aws-security-cloudfront-minimum-tls-version-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::CloudFront::Distribution")
    mql: |
      cloudformation.template.resources.where(type == "AWS::CloudFront::Distribution").all(
      properties['DistributionConfig'] != empty && properties['DistributionConfig']['ViewerCertificate'] != empty && properties['DistributionConfig']['ViewerCertificate']['MinimumProtocolVersion'] == /TLSv1\.2/
      )
  - uid: mondoo-aws-security-cloudfront-waf-enabled
    title: Ensure CloudFront distributions have WAF web ACL associated
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-23
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-aws-security-cloudfront-waf-enabled-distribution
        tags:
          mondoo.com/filter-title: AWS CloudFront Distribution
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-cloudfront-waf-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-cloudfront-waf-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-cloudfront-waf-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-cloudfront-waf-enabled-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon CloudFront distributions have an AWS WAF web ACL associated for protection against common web exploits and attacks.

        **Why this matters**

        - Without WAF, CloudFront distributions are exposed to common web attacks such as SQL injection, XSS, and DDoS.
        - WAF provides customizable rules to filter malicious traffic before it reaches your origin servers.
        - AWS Security Hub control CloudFront.6 requires WAF to be associated with CloudFront distributions.

        **Risk mitigation**

        - **Attack prevention:** Filters malicious web traffic at the edge before it reaches your infrastructure.
        - **DDoS protection:** Rate-limiting rules help mitigate application-layer DDoS attacks.
        - **Compliance:** Meets requirements for web application firewall protection.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and open the Amazon CloudFront console.
        2. Choose Distributions and select the distribution to review.
        3. Choose the General tab.
        4. Under Settings, locate the AWS WAF web ACL field.

        A passing distribution shows a web ACL ARN in the AWS WAF web ACL field. A failing distribution shows None or an empty value.

        ### Audit via CLI

        1. Retrieve the web ACL ID for the distribution:

        ```bash
        aws cloudfront get-distribution \
          --id <distribution-id> \
          --query 'Distribution.DistributionConfig.WebACLId'
        ```

        A passing distribution returns a non-empty string containing a web ACL ARN or ID. A failing distribution returns an empty string or `null`.

      remediation:
        - id: console
          desc: |
            To ensure CloudFront distributions have WAF web ACL associated using the AWS Console:

            1. Navigate to the Amazon CloudFront Console.
            2. Select the distribution.
            3. Choose the General tab, then Edit.
            4. Under AWS WAF web ACL, select a web ACL.
            5. Choose Save changes.
        - id: cli
          desc: |
            To ensure CloudFront distributions have WAF web ACL associated using the AWS CLI:

            ```bash
            aws cloudfront get-distribution-config --id <distribution-id> > dist-config.json
            # Edit to add WebACLId
            aws cloudfront update-distribution --id <distribution-id> \
              --if-match <etag> --distribution-config file://dist-config.json
            ```
        - id: terraform
          desc: |
            To ensure CloudFront distributions have WAF web ACL associated in Terraform:

            ```hcl
            resource "aws_cloudfront_distribution" "example" {
              web_acl_id = aws_wafv2_web_acl.example.arn
            }
            ```
        - id: cloudformation
          desc: |
            To ensure CloudFront distributions have WAF web ACL associated in CloudFormation:

            ```yaml
            Resources:
              Distribution:
                Type: AWS::CloudFront::Distribution
                Properties:
                  DistributionConfig:
                    WebACLId: !GetAtt WebACL.Arn
            ```
    refs:
      - url: https://docs.aws.amazon.com/AmazonCloudFront/latest/DeveloperGuide/distribution-web-awswaf.html
        title: AWS Documentation - Using AWS WAF to control access to your content
  - uid: mondoo-aws-security-cloudfront-waf-enabled-distribution
    filters: asset.platform == "aws-cloudfront-distribution"
    mql: aws.cloudfront.distribution.webAclId != empty
  - uid: mondoo-aws-security-cloudfront-waf-enabled-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_cloudfront_distribution")
    mql: |
      terraform.resources.where(nameLabel == "aws_cloudfront_distribution").all(
        arguments.web_acl_id != empty
      )
  - uid: mondoo-aws-security-cloudfront-waf-enabled-terraform-plan
