      )
  - uid: mondoo-aws-security-dax-encryption-in-transit-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::DAX::Cluster")
    mql: |
      cloudformation.template.resources.where(type == "AWS::DAX::Cluster").all(
        properties['ClusterEndpointEncryptionType'] == "TLS"
      )
  - uid: mondoo-aws-security-ecs-init-process-enabled
    title: Ensure ECS containers enable init process
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-04
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-1
      compliance/nist-csf-2: nist-csf-2-pr-ps-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-2
      compliance/pci-dss-4: pcidss-requirement-2-2-1
      compliance/soc2-2017: soc2-control-cc7-1-1
      compliance/vda-isa-5: vda-isa-5-5-2-1
    variants:
      - uid: mondoo-aws-security-ecs-init-process-enabled-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-ecs-init-process-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ecs-init-process-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ecs-init-process-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that ECS task definitions configure containers with the init process enabled. Without an init process, PID 1 does not properly reap zombie processes, signal handling is unreliable, and container stops may hang until the timeout is reached.

        **Why this matters**

        - **Zombie processes:** Without init, child processes that exit are not reaped, leading to zombie process accumulation that can exhaust PID table entries. PID exhaustion causes denial of service as the container can no longer spawn new processes.
        - **Signal handling:** Container applications running as PID 1 may not handle SIGTERM correctly, causing graceful shutdown failures. Without proper signal handling, containers may not shut down cleanly, potentially leaving sensitive data in memory or temporary files.
        - **Resource leaks:** Hung container stops waste compute resources and delay deployments during rolling updates.

        **Risk mitigation**

        - Enable the `initProcessEnabled` flag in ECS task definition container definitions.
        - This adds a lightweight init process (Tini) that properly handles signal forwarding and zombie reaping.
        - Test container shutdown behavior after enabling init.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and navigate to the **Elastic Container Service** console.
        2. In the left navigation pane, select **Task definitions**.
        3. Select each active task definition and choose the latest revision.
        4. Select each container definition and expand **Linux parameters**.
        5. Check whether **Enable init process** is selected.

        A passing container definition shows **Enable init process** checked. A failing container definition shows that option unchecked.

        ### Audit via CLI

        1. List all active task definition ARNs:

        ```bash
        aws ecs list-task-definitions --status ACTIVE \
          --query "taskDefinitionArns"
        ```

        2. For each task definition, inspect the `initProcessEnabled` flag for all container definitions:

        ```bash
        aws ecs describe-task-definition \
          --task-definition <task-definition-arn> \
          --query "taskDefinition.containerDefinitions[*].{Name:name,InitProcessEnabled:linuxParameters.initProcessEnabled}"
        ```

        A passing container definition returns `"InitProcessEnabled": true`. A failing container definition returns `null` or `false`.

      remediation:
        - id: console
          desc: |
            To ensure ECS containers enable init process using the AWS Console:

            1. Navigate to the **ECS Console**.
            2. Select **Task definitions** in the left panel.
            3. Select the task definition to review.
            4. For each container, expand **Linux parameters**.
            5. Enable the **Init process** option.
            6. Create a new revision of the task definition.
            7. Update the service to use the new revision.
        - id: cli
          desc: |
            To ensure ECS containers enable init process using the AWS CLI, check if init process is enabled in a task definition:

            ```bash
            aws ecs describe-task-definition \
              --task-definition <task-def> \
              --query "taskDefinition.containerDefinitions[*].{Name:name,InitProcess:linuxParameters.initProcessEnabled}"
            ```

            Register a new task definition revision with init enabled:

            ```bash
            aws ecs register-task-definition \
              --cli-input-json file://task-def.json
            ```

            In the task definition JSON, set `linuxParameters.initProcessEnabled` to `true` for each container.
        - id: terraform
          desc: |
            To ensure ECS containers enable init process in Terraform, enable the init process in ECS task definition container definitions:

            ```hcl
            resource "aws_ecs_task_definition" "example" {
              family = "example"

              container_definitions = jsonencode([{
                name  = "app"
                image = "my-app:latest"
                linuxParameters = {
                  initProcessEnabled = true
                }
              }])
            }
            ```
        - id: cloudformation
          desc: |
            To ensure ECS containers enable init process in CloudFormation, enable the init process in ECS task definition container definitions:

            ```yaml
            Resources:
              MyTaskDefinition:
                Type: AWS::ECS::TaskDefinition
                Properties:
                  Family: example
                  ContainerDefinitions:
                    - Name: app
                      Image: my-app:latest
                      LinuxParameters:
                        InitProcessEnabled: true
            ```
    refs:
      - url: https://docs.aws.amazon.com/AmazonECS/latest/developerguide/task_definition_parameters.html
        title: AWS Documentation - Task definition parameters
      - url: https://docs.aws.amazon.com/AmazonECS/latest/bestpracticesguide/security.html
        title: AWS Documentation - Amazon ECS best practices - Security
  - uid: mondoo-aws-security-ecs-init-process-enabled-aws
    filters: asset.platform == "aws"
    mql: |
      aws.ecs.taskDefinitions.all(containerDefinitions.all(initProcessEnabled == true))
  - uid: mondoo-aws-security-ecs-init-process-enabled-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_ecs_task_definition")
    mql: |
      terraform.resources.where(nameLabel == "aws_ecs_task_definition").all(
        arguments.container_definitions.all(_['linuxParameters']['initProcessEnabled'] == true)
      )
  - uid: mondoo-aws-security-ecs-init-process-enabled-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_ecs_task_definition")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_ecs_task_definition").all(
        change.after.container_definitions.all(_['linuxParameters']['initProcessEnabled'] == true)
      )
  - uid: mondoo-aws-security-ecs-init-process-enabled-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_ecs_task_definition")
    mql: |
      terraform.state.resources.where(type == "aws_ecs_task_definition").all(
        values.container_definitions.all(_['linuxParameters']['initProcessEnabled'] == true)
      )
  - uid: mondoo-aws-security-lambda-in-vpc
    title: Ensure Lambda functions are deployed within a VPC
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-5
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-1-5
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-aws-security-lambda-in-vpc-aws
        tags:
          mondoo.com/filter-title: AWS Lambda Function
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-lambda-in-vpc-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-lambda-in-vpc-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-lambda-in-vpc-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-lambda-in-vpc-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that AWS Lambda functions are deployed within a VPC. Lambda functions outside a VPC cannot leverage network-level security controls such as security groups, NACLs, or private subnets.

        **Note:** This check is most relevant for Lambda functions that access private VPC resources such as RDS databases, ElastiCache clusters, or internal APIs. Functions that only call public AWS APIs or external endpoints and do not require access to private resources may not benefit from VPC deployment, and placing them in a VPC adds complexity such as subnet management and NAT gateway costs without meaningful security improvement.

        **Why this matters**

        - **Network isolation:** Lambda functions in a VPC benefit from security groups and NACLs that restrict inbound and outbound network access.
        - **Private resource access:** VPC-deployed Lambda functions can securely access private resources like RDS databases, ElastiCache clusters, and internal APIs without exposing them to the internet.
        - **Data exfiltration prevention:** VPC flow logs and NAT gateway controls provide visibility and control over Lambda network traffic.

        **Risk mitigation**

        - Deploy Lambda functions in private subnets within a VPC.
        - Configure security groups with the minimum required outbound rules.
        - Use VPC endpoints for AWS service access instead of NAT gateways where possible.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and navigate to the **Lambda** console.
        2. Select **Functions** and open each function.
        3. Choose the **Configuration** tab and then **VPC**.
        4. Review the **VPC**, **Subnets**, and **Security groups** fields.

        A passing function shows a VPC ID, at least one subnet, and at least one security group. A failing function shows **No VPC** or blank VPC configuration.

        ### Audit via CLI

        1. List all Lambda functions and their VPC configuration:

        ```bash
        aws lambda list-functions \
          --query "Functions[*].{Name:FunctionName,VpcId:VpcConfig.VpcId}"
        ```

        A passing function returns a non-empty `VpcId` value. A failing function returns `null` or an empty string for `VpcId`.

      remediation:
        - id: console
          desc: |
            To ensure Lambda functions are deployed within a VPC using the AWS Console:

            1. Navigate to the **Lambda Console**.
            2. Select the function to review.
            3. Under **Configuration**, select **VPC**.
            4. Select **Edit** and select a VPC.
            5. Choose at least two private subnets in different Availability Zones.
            6. Select a security group with appropriate outbound rules.
            7. Select **Save**.
        - id: cli
          desc: |
            To ensure Lambda functions are deployed within a VPC using the AWS CLI, check VPC configuration for a Lambda function:

            ```bash
            aws lambda get-function-configuration \
              --function-name <function-name> \
              --query "VpcConfig"
            ```

            Update a Lambda function to use a VPC:

            ```bash
            aws lambda update-function-configuration \
              --function-name <function-name> \
              --vpc-config SubnetIds=<subnet-1>,<subnet-2>,SecurityGroupIds=<sg-id>
            ```
        - id: terraform
          desc: |
            To ensure Lambda functions are deployed within a VPC in Terraform:

            ```hcl
            resource "aws_lambda_function" "example" {
              function_name = "example"
              role          = aws_iam_role.lambda.arn
              handler       = "index.handler"
              runtime       = "nodejs22.x"
              filename      = "function.zip"

              vpc_config {
                subnet_ids         = [aws_subnet.private_a.id, aws_subnet.private_b.id]
                security_group_ids = [aws_security_group.lambda.id]
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure Lambda functions are deployed within a VPC in CloudFormation:

            ```yaml
            Resources:
              MyLambdaFunction:
                Type: AWS::Lambda::Function
                Properties:
                  FunctionName: example
                  Runtime: nodejs18.x
                  Handler: index.handler
                  Role: !GetAtt LambdaRole.Arn
                  VpcConfig:
                    SubnetIds:
                      - !Ref PrivateSubnetA
                      - !Ref PrivateSubnetB
                    SecurityGroupIds:
                      - !Ref LambdaSecurityGroup
            ```
    refs:
      - url: https://docs.aws.amazon.com/lambda/latest/dg/configuration-vpc.html
        title: AWS Documentation - Configuring a Lambda function to access resources in a VPC
      - url: https://docs.aws.amazon.com/lambda/latest/dg/security.html
        title: AWS Documentation - Security in AWS Lambda
  - uid: mondoo-aws-security-lambda-in-vpc-aws
    filters: asset.platform == "aws-lambda-function"
    mql: |
      aws.lambda.function.vpc != empty
  - uid: mondoo-aws-security-lambda-in-vpc-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_lambda_function")
    mql: |
      terraform.resources.where(nameLabel == "aws_lambda_function").all(
        blocks.where(type == "vpc_config") != empty
      )
  - uid: mondoo-aws-security-lambda-in-vpc-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_lambda_function")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_lambda_function").all(
        change.after['vpc_config'] != empty
      )
  - uid: mondoo-aws-security-lambda-in-vpc-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_lambda_function")
    mql: |
      terraform.state.resources.where(type == "aws_lambda_function").all(
        values['vpc_config'] != empty
      )
  - uid: mondoo-aws-security-lambda-in-vpc-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::Lambda::Function")
    mql: |
      cloudformation.template.resources.where(type == "AWS::Lambda::Function").all(
        properties['VpcConfig'] != empty
      )
  - uid: mondoo-aws-security-ecr-no-overly-permissive-policy
    title: Ensure ECR repository policies restrict access
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-2-1
    variants:
      - uid: mondoo-aws-security-ecr-no-overly-permissive-policy-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-ecr-no-overly-permissive-policy-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ecr-no-overly-permissive-policy-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ecr-no-overly-permissive-policy-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Amazon ECR repository policies do not grant overly permissive access through wildcard principals without conditions. ECR policies with unconditional wildcard principals allow any AWS account to pull or push images.

        **Why this matters**

        - **Image theft:** Wildcard principals allow any AWS account to pull container images, potentially exposing proprietary application code and configurations.
        - **Supply chain attacks:** If push access is granted, malicious actors could inject compromised images into your repository.
        - **Data leakage:** Container images may contain embedded secrets, configuration files, or proprietary business logic.

        **Risk mitigation**

        - Replace wildcard principals with specific AWS account IDs or IAM ARNs.
        - Add conditions such as `aws:PrincipalOrgID` to restrict access to your organization.
        - Use ECR repository policies in combination with IAM policies for defense in depth.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and navigate to the **Elastic Container Registry** console.
        2. Select **Repositories** and open each repository.
        3. In the left pane, select **Permissions** and review each statement.
        4. Check whether any statement has `Effect: Allow`, a wildcard `Principal` (i.e., `"*"` or `{"AWS": "*"}`), and no `Condition` block.

        A passing repository has no policy statements granting unconditional wildcard principal access. A failing repository has at least one `Allow` statement with a wildcard principal and no conditions.

        ### Audit via CLI

        1. List all private repository names:

        ```bash
        aws ecr describe-repositories \
          --query "repositories[*].repositoryName"
        ```

        2. Retrieve the policy for each repository and inspect for wildcard principals:

        ```bash
        aws ecr get-repository-policy \
          --repository-name <repository-name> \
          --query "policyText"
        ```

        A passing repository returns a policy with no `Allow` statements containing `"Principal": "*"` or `"Principal": {"AWS": "*"}` without a condition. A failing repository returns a policy with such a statement present.

      remediation:
        - id: console
          desc: |
            To ensure ECR repository policies restrict access using the AWS Console:

            1. Navigate to the **ECR Console**.
            2. Select the repository to review.
            3. Select **Permissions** in the left panel.
            4. Review each policy statement for wildcard principals.
            5. Select **Edit policy JSON** and replace wildcard principals with specific ARNs or add conditions.
            6. Save the updated policy.
        - id: cli
          desc: |
            To ensure ECR repository policies restrict access using the AWS CLI, view the repository policy:

            ```bash
            aws ecr get-repository-policy \
              --repository-name <repo-name>
            ```

            Set a restricted policy:

            ```bash
            aws ecr set-repository-policy \
              --repository-name <repo-name> \
              --policy-text file://ecr-policy.json
            ```

            Ensure the policy JSON replaces `"Principal": "*"` with specific account ARNs or includes conditions like `aws:PrincipalOrgID`.
        - id: terraform
          desc: |
            To ensure ECR repository policies restrict access in Terraform, ECR repository policies are evaluated at runtime and cannot be fully validated in Terraform statically. However, ensure your `aws_ecr_repository_policy` resources use specific principals:

            ```hcl
            resource "aws_ecr_repository_policy" "example" {
              repository = aws_ecr_repository.example.name

              policy = jsonencode({
                Version = "2012-10-17"
                Statement = [{
                  Sid       = "AllowSpecificAccount"
                  Effect    = "Allow"
                  Principal = {
                    AWS = "arn:aws:iam::123456789012:root"
                  }
                  Action = [
                    "ecr:GetDownloadUrlForLayer",
                    "ecr:BatchGetImage"
                  ]
                }]
              })
            }
            ```
        - id: cloudformation
          desc: |
            To ensure ECR repository policies restrict access in CloudFormation, ensure your ECR repository policies use specific principals rather than wildcards:

            ```yaml
            Resources:
              MyECRRepository:
                Type: AWS::ECR::Repository
                Properties:
                  RepositoryName: my-repo
                  RepositoryPolicyText:
                    Version: "2012-10-17"
                    Statement:
                      - Sid: AllowSpecificAccount
                        Effect: Allow
                        Principal:
                          AWS: arn:aws:iam::123456789012:root
                        Action:
                          - ecr:GetDownloadUrlForLayer
                          - ecr:BatchGetImage
            ```
    refs:
      - url: https://docs.aws.amazon.com/AmazonECR/latest/userguide/repository-policies.html
        title: AWS Documentation - Amazon ECR repository policies
      - url: https://docs.aws.amazon.com/AmazonECR/latest/userguide/security.html
        title: AWS Documentation - Security in Amazon ECR
  - uid: mondoo-aws-security-ecr-no-overly-permissive-policy-aws
    filters: asset.platform == "aws"
    mql: |
      aws.ecr.privateRepositories.where(policy != empty).all(
        policy['Statement'].where(_['Effect'] == "Allow").where(_['Condition'] == empty).none(
          _['Principal'] == "*" || _['Principal']['AWS'] == "*" || _['Principal']['AWS'].contains("*")
        )
      )
  - uid: mondoo-aws-security-ecr-no-overly-permissive-policy-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_ecr_repository_policy")
    mql: |
      terraform.resources.where(nameLabel == "aws_ecr_repository_policy").all(
        arguments['policy'] != /\"Principal\"\s*:\s*\"\*\"/ &&
        arguments['policy'] != /\"Principal\"\s*:\s*\{\s*\"AWS\"\s*:\s*\"\*\"\s*\}/
      )
  - uid: mondoo-aws-security-ecr-no-overly-permissive-policy-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_ecr_repository_policy")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_ecr_repository_policy").all(
        change.after.policy != /\"Principal\"\s*:\s*\"\*\"/ &&
        change.after.policy != /\"Principal\"\s*:\s*\{\s*\"AWS\"\s*:\s*\"\*\"\s*\}/
      )
  - uid: mondoo-aws-security-ecr-no-overly-permissive-policy-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_ecr_repository_policy")
    mql: |
      terraform.state.resources.where(type == "aws_ecr_repository_policy").all(
        values.policy != /\"Principal\"\s*:\s*\"\*\"/ &&
        values.policy != /\"Principal\"\s*:\s*\{\s*\"AWS\"\s*:\s*\"\*\"\s*\}/
      )
  - uid: mondoo-aws-security-elasticache-cmk-encryption
    title: Ensure ElastiCache clusters use CMK encryption
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-11
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-aws-security-elasticache-cmk-encryption-aws
        tags:
          mondoo.com/filter-title: AWS ElastiCache Cluster
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-elasticache-cmk-encryption-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-elasticache-cmk-encryption-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-elasticache-cmk-encryption-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-elasticache-cmk-encryption-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that ElastiCache replication groups are encrypted using customer-managed KMS keys (CMK). CMKs provide full control over key lifecycle, rotation policies, and access auditing for cached data.

        **Why this matters**

        - **Key control:** CMKs allow you to define key policies that control who can use and manage the encryption key.
        - **Audit trail:** All CMK usage is logged in CloudTrail, providing visibility into encryption key access patterns.
        - **Compliance:** Many regulatory frameworks require customer-managed encryption keys for data at rest, especially for caching layers that may contain sensitive session data.

        **Risk mitigation**

        - Create a CMK in KMS for ElastiCache encryption.
        - Enable encryption at rest with the CMK when creating new clusters.
        - For existing clusters, create a backup and restore to a new cluster with CMK encryption.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and navigate to the **ElastiCache** console.
        2. In the left navigation pane, select **Redis caches** or **Memcached clusters**, depending on the engine in use.
        3. Select each replication group and open the **Details** tab.
        4. Under **Encryption**, review the **Encryption at rest** setting and the associated **KMS key**.

        A passing replication group shows encryption at rest enabled and a customer-managed KMS key ARN. A failing replication group shows no encryption, an AWS-owned key, or an AWS-managed key (`aws/elasticache`).

        ### Audit via CLI

        1. List all replication groups and their encryption details:

        ```bash
        aws elasticache describe-replication-groups \
          --query "ReplicationGroups[*].{ID:ReplicationGroupId,AtRestEncryption:AtRestEncryptionEnabled,KmsKeyId:KmsKeyId}"
        ```

        2. For a reported KMS key ARN, confirm the key manager is `CUSTOMER`:

        ```bash
        aws kms describe-key \
          --key-id <kms-key-id> \
          --query "KeyMetadata.{KeyManager:KeyManager,KeyId:KeyId}"
        ```

        A passing replication group returns `"AtRestEncryption": true` with a `KmsKeyId` whose `KeyManager` is `CUSTOMER`. A failing replication group returns `"AtRestEncryption": false`, a null `KmsKeyId`, or a key with `KeyManager` of `AWS`.

      remediation:
        - id: console
          desc: |
            To ensure ElastiCache clusters use CMK encryption using the AWS Console:

            1. Navigate to the **ElastiCache Console**.
            2. Select the replication group to review.
            3. Under the **Description** or **Details** tab, check the **Encryption at rest** setting and the associated KMS key.
            4. Note that encryption at rest cannot be modified on an existing replication group. If using the default key or no encryption, you must create a new replication group with CMK encryption enabled.
            5. Create a backup of the existing replication group, then create a new replication group with **Encryption at rest** enabled and your customer-managed CMK selected.
            6. Restore the backup to the new replication group and update your application endpoints.
        - id: cli
          desc: |
            To ensure ElastiCache clusters use CMK encryption using the AWS CLI, check encryption configuration for an ElastiCache cluster:

            ```bash
            aws elasticache describe-replication-groups \
              --replication-group-id <group-id> \
              --query "ReplicationGroups[*].{ID:ReplicationGroupId,AtRestEncryption:AtRestEncryptionEnabled,KmsKeyId:KmsKeyId}"
            ```

            Create a new cluster with CMK encryption:

            ```bash
            aws elasticache create-replication-group \
              --replication-group-id <group-id> \
              --replication-group-description "Encrypted cluster" \
              --at-rest-encryption-enabled \
              --kms-key-id <cmk-key-arn> \
              --engine redis
            ```
        - id: terraform
          desc: |
            To ensure ElastiCache clusters use CMK encryption in Terraform:

            ```hcl
            resource "aws_elasticache_replication_group" "example" {
              replication_group_id = "example"
              description          = "Encrypted Redis cluster"
              engine               = "redis"

              at_rest_encryption_enabled = true
              kms_key_id                 = aws_kms_key.elasticache.arn
            }
            ```
        - id: cloudformation
          desc: |
            To ensure ElastiCache clusters use CMK encryption in CloudFormation:

            ```yaml
            Resources:
              MyElastiCacheGroup:
                Type: AWS::ElastiCache::ReplicationGroup
                Properties:
                  ReplicationGroupDescription: Encrypted Redis cluster
                  Engine: redis
                  AtRestEncryptionEnabled: true
                  KmsKeyId: !Ref MyKmsKey
            ```
    refs:
      - url: https://docs.aws.amazon.com/AmazonElastiCache/latest/red-ug/at-rest-encryption.html
        title: AWS Documentation - ElastiCache at-rest encryption
      - url: https://docs.aws.amazon.com/AmazonElastiCache/latest/red-ug/security.html
        title: AWS Documentation - Security in Amazon ElastiCache
  - uid: mondoo-aws-security-elasticache-cmk-encryption-aws
    filters: asset.platform == "aws-elasticache-cluster" && aws.elasticache.cluster.engine == "redis"
    mql: |
      aws.elasticache.cluster.kmsKey { metadata["KeyManager"] == "CUSTOMER" }
  - uid: mondoo-aws-security-elasticache-cmk-encryption-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_elasticache_replication_group")
    mql: |
      terraform.resources.where(nameLabel == "aws_elasticache_replication_group").all(
        arguments['at_rest_encryption_enabled'] == true &&
        arguments['kms_key_id'] != empty
      )
  - uid: mondoo-aws-security-elasticache-cmk-encryption-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_elasticache_replication_group")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_elasticache_replication_group").all(
        change.after['at_rest_encryption_enabled'] == true &&
        change.after['kms_key_id'] != empty
      )
  - uid: mondoo-aws-security-elasticache-cmk-encryption-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_elasticache_replication_group")
    mql: |
      terraform.state.resources.where(type == "aws_elasticache_replication_group").all(
        values['at_rest_encryption_enabled'] == true &&
        values['kms_key_id'] != empty
      )
  - uid: mondoo-aws-security-elasticache-cmk-encryption-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::ElastiCache::ReplicationGroup")
    mql: |
      cloudformation.template.resources.where(type == "AWS::ElastiCache::ReplicationGroup").all(
        properties['AtRestEncryptionEnabled'] == true &&
        properties['KmsKeyId'] != empty
      )
  - uid: mondoo-aws-security-kinesis-cmk-typed-key
    title: Ensure Kinesis streams use customer-managed KMS keys
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-11
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-aws-security-kinesis-cmk-typed-key-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-kinesis-cmk-typed-key-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-kinesis-cmk-typed-key-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-kinesis-cmk-typed-key-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-kinesis-cmk-typed-key-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon Kinesis Data Streams are encrypted using customer-managed KMS keys (CMK).

        **Why this matters**

        - **Key control:** CMKs allow you to define key policies that control who can use and manage the encryption key protecting stream data.
        - **Audit trail:** All CMK usage is logged in CloudTrail, providing visibility into when and by whom the key was accessed.
        - **Data sovereignty:** CMKs ensure that encryption keys for streaming data remain under your organizational control.

        **Risk mitigation**

        - Configure CMK encryption when creating Kinesis streams.
        - Migrate existing streams by updating the encryption settings to use a CMK.
        - Monitor KMS key usage via CloudTrail for audit purposes.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and navigate to the **Kinesis** console.
        2. Select **Data streams** in the left navigation pane.
        3. Select each stream and open the **Configuration** tab.
        4. Under **Server-side encryption**, review the **Status** and the **KMS key**.

        A passing stream shows **Enabled** with a customer-managed KMS key. A failing stream shows **Disabled** or uses an AWS-managed key (`aws/kinesis`).

        ### Audit via CLI

        1. List all Kinesis streams:

        ```bash
        aws kinesis list-streams --query "StreamNames"
        ```

        2. For each stream, check the encryption type and key ID:

        ```bash
        aws kinesis describe-stream-summary \
          --stream-name <stream-name> \
          --query "StreamDescriptionSummary.{EncryptionType:EncryptionType,KeyId:KeyId}"
        ```

        3. Confirm the key is customer-managed:

        ```bash
        aws kms describe-key \
          --key-id <key-id> \
          --query "KeyMetadata.KeyManager"
        ```

        A passing stream returns `"EncryptionType": "KMS"` with a `KeyId` whose `KeyManager` is `CUSTOMER`. A failing stream returns `"EncryptionType": "NONE"` or has a `KeyManager` of `AWS`.

      remediation:
        - id: console
          desc: |
            To ensure Kinesis streams use customer-managed KMS keys using the AWS Console:

            1. Navigate to the **Kinesis Console**.
            2. Select **Data streams** in the left panel.
            3. Select the stream to review.
            4. Under **Configuration**, check the **Server-side encryption** settings.
            5. If using an AWS-managed key, select **Edit** and select a customer-managed CMK.
            6. Select **Save changes**.
        - id: cli
          desc: |
            To ensure Kinesis streams use customer-managed KMS keys using the AWS CLI, check encryption configuration for a Kinesis stream:

            ```bash
            aws kinesis describe-stream \
              --stream-name <stream-name> \
              --query "StreamDescription.{EncryptionType:EncryptionType,KeyId:KeyId}"
            ```

            Update a stream to use CMK encryption:

            ```bash
            aws kinesis start-stream-encryption \
              --stream-name <stream-name> \
              --encryption-type KMS \
              --key-id <cmk-key-arn>
            ```
        - id: terraform
          desc: |
            To ensure Kinesis streams use customer-managed KMS keys in Terraform:

            ```hcl
            resource "aws_kinesis_stream" "example" {
              name        = "example-stream"
              shard_count = 1

              encryption_type = "KMS"
              kms_key_id      = aws_kms_key.kinesis.arn
            }
            ```
        - id: cloudformation
          desc: |
            To ensure Kinesis streams use customer-managed KMS keys in CloudFormation:

            ```yaml
            Resources:
              MyKinesisStream:
                Type: AWS::Kinesis::Stream
                Properties:
                  Name: example-stream
                  ShardCount: 1
                  StreamEncryption:
                    EncryptionType: KMS
                    KeyId: !Ref MyKmsKey
            ```
    refs:
      - url: https://docs.aws.amazon.com/streams/latest/dev/server-side-encryption.html
        title: AWS Documentation - Data protection in Amazon Kinesis Data Streams
      - url: https://docs.aws.amazon.com/streams/latest/dev/security.html
        title: AWS Documentation - Security in Amazon Kinesis Data Streams
  - uid: mondoo-aws-security-kinesis-cmk-typed-key-aws
    filters: asset.platform == "aws"
    mql: |
      aws.kinesis.streams.all(kmsKey { metadata["KeyManager"] == "CUSTOMER" })
  - uid: mondoo-aws-security-kinesis-cmk-typed-key-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_kinesis_stream")
    mql: |
