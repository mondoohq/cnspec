    docs:
      desc: |
        This check ensures that DynamoDB tables are encrypted using customer-managed KMS keys (CMK). CMKs provide full control over key lifecycle, rotation policies, and access auditing for DynamoDB table data.

        **Why this matters**

        - **Key control:** CMKs allow you to define key policies that control who can use and manage the encryption key protecting table data.
        - **Audit trail:** All CMK usage is logged in CloudTrail, providing visibility into when and by whom the encryption key was accessed.
        - **Compliance:** Many regulatory frameworks require customer-managed encryption keys for data at rest, especially for databases storing sensitive information.

        **Risk mitigation**

        - Configure CMK encryption when creating DynamoDB tables.
        - Update existing tables to use CMK encryption (this can be done without downtime).
        - Monitor KMS key usage via CloudTrail for audit purposes.
      remediation:
        - id: console
          desc: |
            To ensure DynamoDB tables use customer-managed KMS keys using the AWS Console:

            1. Navigate to the **DynamoDB Console**.
            2. Select **Tables** in the left panel.
            3. Select the table to review.
            4. Under **Additional settings**, check the **Encryption** configuration.
            5. If using the default AWS-owned key or AWS-managed key, select **Manage encryption**.
            6. Select **Customer managed CMK** and choose the appropriate key.
            7. Select **Save changes**.
        - id: cli
          desc: |
            To ensure DynamoDB tables use customer-managed KMS keys using the AWS CLI, check encryption configuration for a DynamoDB table:

            ```bash
            aws dynamodb describe-table \
              --table-name <table-name> \
              --query "Table.SSEDescription"
            ```

            Update a table to use CMK encryption:

            ```bash
            aws dynamodb update-table \
              --table-name <table-name> \
              --sse-specification Enabled=true,SSEType=KMS,KMSMasterKeyId=<cmk-key-arn>
            ```
        - id: terraform
          desc: |
            To ensure DynamoDB tables use customer-managed KMS keys in Terraform:

            ```hcl
            resource "aws_dynamodb_table" "example" {
              name     = "example-table"
              hash_key = "id"

              server_side_encryption {
                enabled     = true
                kms_key_arn = aws_kms_key.dynamodb.arn
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure DynamoDB tables use customer-managed KMS keys in CloudFormation:

            ```yaml
            Resources:
              MyDynamoDBTable:
                Type: AWS::DynamoDB::Table
                Properties:
                  TableName: example-table
                  SSESpecification:
                    SSEEnabled: true
                    SSEType: KMS
                    KMSMasterKeyId: !Ref MyKmsKey
            ```
    refs:
      - url: https://docs.aws.amazon.com/amazondynamodb/latest/developerguide/EncryptionAtRest.html
        title: AWS Documentation - DynamoDB encryption at rest
      - url: https://docs.aws.amazon.com/amazondynamodb/latest/developerguide/security.html
        title: AWS Documentation - Security in Amazon DynamoDB
