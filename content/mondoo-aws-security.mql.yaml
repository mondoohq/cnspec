        properties['Spec']['EgressFilter']['Type'] == "DROP_ALL"
      )
  - uid: mondoo-aws-security-identitycenter-session-duration
    title: Ensure Identity Center permission sets have short sessions
    impact: 60
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-g
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-5
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/pci-dss-4: pcidss-requirement-8-6-1
      compliance/vda-isa-5: vda-isa-5-4-1-3
    variants:
      - uid: mondoo-aws-security-identitycenter-session-duration-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-identitycenter-session-duration-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-identitycenter-session-duration-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-identitycenter-session-duration-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that AWS IAM Identity Center permission sets have session durations of 12 hours or less. Excessively long session durations increase the risk of session hijacking and unauthorized access from stolen credentials.

        **Why this matters**

        - Long-lived sessions increase the window of opportunity for attackers who obtain session tokens.
        - Permission sets with sessions exceeding 12 hours may indicate overly permissive configurations.
        - NIST SP 800-53 AC-12 requires session termination after defined periods of inactivity or maximum duration.
        - Shorter sessions force re-authentication, reducing the risk of stale credentials being used.

        **Risk mitigation**

        - **Session security:** Shorter sessions limit the impact of compromised credentials.
        - **Re-authentication:** Forces users to re-authenticate regularly, verifying continued authorization.
        - **Compliance:** Meets session management requirements in NIST, PCI DSS, and SOC 2.
      remediation:
        - id: console
          desc: |
            To ensure Identity Center permission sets have reasonable session durations using the AWS Console:

            1. Navigate to the **AWS IAM Identity Center Console**.
            2. Select **Permission sets**.
            3. Select the permission set you want to configure.
            4. Choose **Edit**.
            5. Under **Session duration**, set a value of 12 hours or less.
            6. Choose **Save**.
        - id: cli
          desc: |
            To ensure Identity Center permission sets have reasonable session durations using the AWS CLI:

            ```bash
            aws sso-admin update-permission-set \
              --instance-arn <instance-arn> \
              --permission-set-arn <permission-set-arn> \
              --session-duration PT4H
            ```
        - id: terraform
          desc: |
            To ensure Identity Center permission sets have reasonable session durations in Terraform:

            ```hcl
            resource "aws_ssoadmin_permission_set" "example" {
              name             = "example"
              instance_arn     = data.aws_ssoadmin_instances.example.arns[0]
              session_duration = "PT4H"
            }
            ```
    refs:
      - url: https://docs.aws.amazon.com/singlesignon/latest/userguide/permissionsetsconcept.html
        title: AWS Documentation - Permission sets
  - uid: mondoo-aws-security-identitycenter-session-duration-aws
    filters: asset.platform == "aws"
    mql: |
      aws.identitycenter.instances.all(permissionSets.all(sessionDuration <= "PT12H"))
  - uid: mondoo-aws-security-identitycenter-session-duration-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_ssoadmin_permission_set")
    mql: |
      terraform.resources.where(nameLabel == "aws_ssoadmin_permission_set").all(
        arguments.session_duration == null || arguments.session_duration <= "PT12H"
      )
  - uid: mondoo-aws-security-identitycenter-session-duration-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_ssoadmin_permission_set")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_ssoadmin_permission_set").all(
        change.after["session_duration"] == null || change.after["session_duration"] <= "PT12H"
      )
  - uid: mondoo-aws-security-identitycenter-session-duration-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_ssoadmin_permission_set")
    mql: |
      terraform.state.resources.where(type == "aws_ssoadmin_permission_set").all(
        values["session_duration"] == null || values["session_duration"] <= "PT12H"
      )
  - uid: mondoo-aws-security-identitycenter-no-inline-policy
    title: Ensure Identity Center permission sets use managed policies
    impact: 50
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-g
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-5
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/vda-isa-5: vda-isa-5-4-1-1
    variants:
      - uid: mondoo-aws-security-identitycenter-no-inline-policy-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-identitycenter-no-inline-policy-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-identitycenter-no-inline-policy-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-identitycenter-no-inline-policy-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that AWS IAM Identity Center permission sets use managed policies instead of inline policies. Inline policies embedded in permission sets are hiding spots for backdoor permissions that are significantly harder to detect during access reviews, allowing an attacker with Identity Center administrative access to plant persistent, stealthy access across multiple AWS accounts.

        **Why this matters**

        - Inline policies are not visible in centralized policy listings and require per-permission-set inspection to discover, making them ideal hiding spots for attacker-planted backdoor permissions.
        - An attacker with `sso:PutInlinePolicyToPermissionSet` access can embed broad permissions (such as `*:*`) in a permission set's inline policy, granting persistent cross-account access that survives credential rotation.
        - Inline policies bypass the change tracking and version history provided by managed policies, making it harder to detect when unauthorized permissions were added or by whom.
        - Policy sprawl from inline policies makes it difficult to maintain least-privilege, increasing the permissions available for an attacker to exploit after initial compromise.

        **Risk mitigation**

        - **Backdoor detection:** Managed policies are centrally visible and auditable, eliminating inline policies as a hiding spot for attacker-planted permissions.
        - **Change tracking:** Versioned managed policies provide audit trails that reveal when permissions were modified, supporting detection of unauthorized changes.
        - **Access review accuracy:** Centralized policies are discoverable by automated compliance tools, ensuring all permissions are included in access reviews.
      remediation:
        - id: console
          desc: |
            To ensure Identity Center permission sets use managed policies using the AWS Console:

            1. Navigate to the **AWS IAM Identity Center Console**.
            2. Select **Permission sets**.
            3. Select the permission set you want to configure.
            4. Under **Inline policy**, remove any inline policy content.
            5. Under **AWS managed policies** or **Customer managed policies**, attach the required policies.
            6. Choose **Save**.
        - id: cli
          desc: |
            To ensure Identity Center permission sets use managed policies using the AWS CLI, first remove the inline policy:

            ```bash
            aws sso-admin delete-inline-policy-from-permission-set \
              --instance-arn <instance-arn> \
              --permission-set-arn <permission-set-arn>
            ```

            Then attach a managed policy:

            ```bash
            aws sso-admin attach-managed-policy-to-permission-set \
              --instance-arn <instance-arn> \
              --permission-set-arn <permission-set-arn> \
              --managed-policy-arn <policy-arn>
            ```
        - id: terraform
          desc: |
            To ensure Identity Center permission sets use managed policies in Terraform:

            ```hcl
            resource "aws_ssoadmin_permission_set" "example" {
              name         = "example"
              instance_arn = data.aws_ssoadmin_instances.example.arns[0]
            }

            resource "aws_ssoadmin_managed_policy_attachment" "example" {
              instance_arn       = data.aws_ssoadmin_instances.example.arns[0]
              managed_policy_arn = "arn:aws:iam::aws:policy/ReadOnlyAccess"
              permission_set_arn = aws_ssoadmin_permission_set.example.arn
            }
            ```
    refs:
      - url: https://docs.aws.amazon.com/singlesignon/latest/userguide/permissionsetsconcept.html
        title: AWS Documentation - Permission sets
  - uid: mondoo-aws-security-identitycenter-no-inline-policy-aws
    filters: asset.platform == "aws"
    mql: |
      aws.identitycenter.instances.all(permissionSets.all(inlinePolicy == "" || inlinePolicy == empty))
  - uid: mondoo-aws-security-identitycenter-no-inline-policy-terraform-hcl
    filters: asset.platform == "terraform-hcl"
    mql: terraform.resources.where(nameLabel == "aws_ssoadmin_permission_set_inline_policy") == empty
  - uid: mondoo-aws-security-identitycenter-no-inline-policy-terraform-plan
    filters: asset.platform == "terraform-plan"
    mql: terraform.plan.resourceChanges.where(type == "aws_ssoadmin_permission_set_inline_policy") == empty
  - uid: mondoo-aws-security-identitycenter-no-inline-policy-terraform-state
    filters: asset.platform == "terraform-state"
    mql: terraform.state.resources.where(type == "aws_ssoadmin_permission_set_inline_policy") == empty
  - uid: mondoo-aws-security-identitycenter-group-assignments
    title: Ensure Identity Center uses group-based assignments
    impact: 60
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-g
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-5
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/vda-isa-5: vda-isa-5-4-1-1
    variants:
      - uid: mondoo-aws-security-identitycenter-group-assignments-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-identitycenter-group-assignments-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-identitycenter-group-assignments-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-identitycenter-group-assignments-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that AWS IAM Identity Center account assignments use groups rather than individual users. Direct user-level assignments are a stealthy persistence mechanism: an attacker with Identity Center administrative access can grant a compromised user direct account access that is invisible to group-based access reviews, surviving group membership cleanup during incident response.

        **Why this matters**

        - Direct user-level assignments bypass group-based access reviews, meaning an attacker-granted assignment will not be discovered when reviewing group memberships during incident response or routine audits.
        - An attacker can plant persistent access by assigning a compromised user directly to high-privilege permission sets across multiple AWS accounts, creating backdoor access that survives group-level remediation.
        - User-level assignments increase the risk of orphaned permissions when users change roles or leave, creating dormant access that can be exploited if the user's identity is later compromised.
        - Auditing individual user assignments requires inspecting each account separately, making it significantly harder to detect unauthorized cross-account access grants.

        **Risk mitigation**

        - **Persistence detection:** Group-based assignments ensure all access is visible in group membership reviews, eliminating user-level assignments as a hiding spot for attacker-planted access.
        - **Incident response completeness:** Removing a compromised user from all groups revokes all access when assignments are group-based, preventing persistence through direct assignments.
        - **Access review coverage:** Group-based access is discoverable by automated compliance tools, ensuring all assignments are included in access reviews and no stealthy user-level grants are missed.
      remediation:
        - id: console
          desc: |
            To ensure Identity Center uses group-based assignments using the AWS Console:

            1. Navigate to the **AWS IAM Identity Center Console**.
            2. Select **AWS accounts**.
            3. Select the account and review its assignments.
            4. Remove any user-level assignments.
            5. Create groups in the Identity Center directory or your external identity provider.
            6. Assign groups to accounts with the appropriate permission sets.
        - id: cli
          desc: |
            To ensure Identity Center uses group-based assignments using the AWS CLI, create a group-based assignment:

            ```bash
            aws sso-admin create-account-assignment \
              --instance-arn <instance-arn> \
              --target-id <account-id> \
              --target-type AWS_ACCOUNT \
              --permission-set-arn <permission-set-arn> \
              --principal-type GROUP \
              --principal-id <group-id>
            ```

            Remove any user-level assignments:

            ```bash
            aws sso-admin delete-account-assignment \
              --instance-arn <instance-arn> \
              --target-id <account-id> \
              --target-type AWS_ACCOUNT \
              --permission-set-arn <permission-set-arn> \
              --principal-type USER \
              --principal-id <user-id>
            ```
        - id: terraform
          desc: |
            To ensure Identity Center uses group-based assignments in Terraform:

            ```hcl
            resource "aws_ssoadmin_account_assignment" "example" {
              instance_arn       = data.aws_ssoadmin_instances.example.arns[0]
              permission_set_arn = aws_ssoadmin_permission_set.example.arn

              principal_id   = aws_identitystore_group.example.group_id
              principal_type = "GROUP"

              target_id   = "123456789012"
              target_type = "AWS_ACCOUNT"
            }
            ```
    refs:
      - url: https://docs.aws.amazon.com/singlesignon/latest/userguide/useraccess.html
        title: AWS Documentation - Multi-account permissions
  - uid: mondoo-aws-security-identitycenter-group-assignments-aws
    filters: asset.platform == "aws"
    mql: |
      aws.identitycenter.instances.all(accountAssignments.all(principalType == "GROUP"))
  - uid: mondoo-aws-security-identitycenter-group-assignments-terraform-hcl
