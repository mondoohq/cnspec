            resource "aws_cloudwatch_metric_alarm" "rootaccountusage" {
              alarm_name          = "RootAccountUsage"
              metric_name         = "RootAccountUsage"
              namespace           = "CISBenchmark"
              statistic           = "Sum"
              period              = 300
              threshold           = 1
              comparison_operator = "GreaterThanOrEqualToThreshold"
              evaluation_periods  = 1
              alarm_actions       = [aws_sns_topic.alerts.arn]
            }
            ```
        - id: cloudformation
          desc: |
            To ensure log metric filter exists for root account usage in CloudFormation, create a CloudWatch log metric filter and alarm for root account usage:

            ```yaml
            Resources:
              RootAccountUsageFilter:
                Type: AWS::Logs::MetricFilter
                Properties:
                  LogGroupName: !Ref CloudTrailLogGroup
                  FilterPattern: "{ $.userIdentity.type = \"Root\" && $.userIdentity.invokedBy NOT EXISTS && $.eventType != \"AwsServiceEvent\" }"
                  MetricTransformations:
                    - MetricName: RootAccountUsage
                      MetricNamespace: CISBenchmark
                      MetricValue: "1"

              RootAccountUsageAlarm:
                Type: AWS::CloudWatch::Alarm
                Properties:
                  AlarmName: RootAccountUsage
                  MetricName: RootAccountUsage
