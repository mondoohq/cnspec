    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_sqs_queue")
    mql: |
      terraform.resources.where(nameLabel == "aws_sqs_queue").all(
        arguments.sqs_managed_sse_enabled == true || arguments.kms_master_key_id != empty
      )
  - uid: mondoo-aws-security-sqs-queue-encrypted-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_sqs_queue")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_sqs_queue").all(
        change.after.sqs_managed_sse_enabled == true || change.after.kms_master_key_id != empty
      )
  - uid: mondoo-aws-security-sqs-queue-encrypted-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_sqs_queue")
    mql: |
      terraform.state.resources.where(type == "aws_sqs_queue").all(
        values.sqs_managed_sse_enabled == true || values.kms_master_key_id != empty
      )
  - uid: mondoo-aws-security-sqs-queue-encrypted-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::SQS::Queue")
    mql: |
      cloudformation.template.resources.where(type == "AWS::SQS::Queue").all(
      properties['SqsManagedSseEnabled'] == true || properties['KmsMasterKeyId'] != empty
      )
  - uid: mondoo-aws-security-sqs-queue-dead-letter-queue
    title: Ensure SQS queues have a dead letter queue configured
    impact: 60
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-bcr-08
      compliance/dora: dora-art-12
      compliance/hipaa: hipaa-security-ss164-308-a-7-ii-a-contingency-plan-data-backup-plan
      compliance/iso-27001-2022: iso-27001-2022-a-8-14
      compliance/nis-2: nis-2-21-2-c
      compliance/nist-csf-1: nist-csf-1-pr-ip-4
      compliance/nist-csf-2: nist-csf-2-pr-ds-11
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cp-9
      compliance/nist-sp-800-171: "false"
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc9-1-1
      compliance/vda-isa-5: false
    variants:
      - uid: mondoo-aws-security-sqs-queue-dead-letter-queue-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-sqs-queue-dead-letter-queue-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-sqs-queue-dead-letter-queue-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-sqs-queue-dead-letter-queue-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-sqs-queue-dead-letter-queue-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that SQS queues have a dead letter queue (DLQ) configured. Without a DLQ, an attacker can send malformed or malicious messages to a queue that silently fail processing and are discarded, causing security-relevant events, notifications, or workflow triggers to be permanently lost without any trace.

        **Known limitation:** This check requires all SQS queues to have a DLQ, but queues that are themselves acting as dead-letter queues should not have their own DLQ. Accounts that use DLQs may see false positives on the DLQ queues themselves. To suppress these findings, apply an exception for queues that serve as dead-letter targets.

        **Why this matters**

        - An attacker with `sqs:SendMessage` permissions can inject malformed messages that cause processing failures, silently dropping security-relevant events such as CloudTrail notifications, GuardDuty alerts, or incident response triggers.
        - Without a DLQ, failed messages are silently discarded after the maximum receive count, leaving no forensic evidence of the attack or the lost events.
        - SQS queues used in security pipelines (such as S3 event notifications triggering security scans, or SNS-to-SQS alert routing) become single points of failure when malformed messages can silently disrupt processing.

        **Risk mitigation**

        - **Security event preservation:** Failed messages are retained in the DLQ for investigation, ensuring security-relevant events are not silently lost.
        - **Attack detection:** DLQ message accumulation serves as an alert signal that messages are being rejected, potentially indicating injection of malicious payloads.
        - **Forensic evidence:** Retained failed messages provide evidence for investigating whether processing failures were caused by attacker activity.
      remediation:
        - id: console
          desc: |
            To ensure SQS queues have a dead letter queue configured using the AWS Console:

            1. Navigate to the Amazon SQS Console.
            2. Select the queue.
            3. Choose Edit.
            4. Under Dead-letter queue, enable it and select a target queue.
            5. Set the maximum receives before sending to the DLQ.
            6. Choose Save.
        - id: cli
          desc: |
            To ensure SQS queues have a dead letter queue configured using the AWS CLI:

            ```bash
            aws sqs set-queue-attributes \
              --queue-url <queue-url> \
              --attributes '{"RedrivePolicy":"{\"deadLetterTargetArn\":\"<dlq-arn>\",\"maxReceiveCount\":\"5\"}"}'
            ```
        - id: terraform
          desc: |
            To ensure SQS queues have a dead letter queue configured in Terraform:

            ```hcl
            resource "aws_sqs_queue" "dlq" {
              name = "example-dlq"
            }

            resource "aws_sqs_queue" "example" {
              name = "example-queue"

              redrive_policy = jsonencode({
                deadLetterTargetArn = aws_sqs_queue.dlq.arn
                maxReceiveCount     = 5
              })
            }
            ```
        - id: cloudformation
          desc: |
            To ensure SQS queues have a dead letter queue configured in CloudFormation:

            ```yaml
            Resources:
              DLQ:
                Type: AWS::SQS::Queue
                Properties:
                  QueueName: example-dlq
              MainQueue:
                Type: AWS::SQS::Queue
                Properties:
                  QueueName: example-queue
                  RedrivePolicy:
                    deadLetterTargetArn: !GetAtt DLQ.Arn
                    maxReceiveCount: 5
            ```
    refs:
      - url: https://docs.aws.amazon.com/AWSSimpleQueueService/latest/SQSDeveloperGuide/sqs-dead-letter-queues.html
        title: AWS Documentation - Amazon SQS dead-letter queues
