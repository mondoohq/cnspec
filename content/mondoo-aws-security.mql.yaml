  - uid: mondoo-aws-security-msk-logging-enabled
    title: Ensure MSK clusters have logging enabled
    impact: 50
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-pr-pt-1
      compliance/nist-csf-2: nist-csf-2-pr-ps-04
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    variants:
      - uid: mondoo-aws-security-msk-logging-enabled-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-msk-logging-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-msk-logging-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-msk-logging-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-msk-logging-enabled-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon MSK clusters have broker logging enabled to at least one destination: Amazon CloudWatch Logs, Amazon S3, or Amazon Kinesis Data Firehose. Broker logs capture Kafka broker events including connection events, topic activity, and error conditions.

        **Why this matters**

        - MSK broker logs provide visibility into Kafka cluster operations, enabling detection of abnormal consumer group activity, authentication failures, and replication issues.
        - Without logging, security teams lack the data needed to investigate incidents, detect unauthorized access, or perform compliance audits on Kafka workloads.
        - Centralizing logs in CloudWatch, S3, or Firehose enables integration with SIEM systems and supports long-term log retention policies.

        **Risk mitigation**

        - **Security monitoring:** Broker logs contain connection and authentication events that can indicate unauthorized access attempts.
        - **Compliance:** Logging requirements under NIST SP 800-53 AU-6, ISO 27001 A.8.15, and SOC 2 CC7.2 require collection and review of audit logs from critical infrastructure.
        - **Operational insight:** Logs support diagnosis of performance issues, replication failures, and consumer lag.
      audit: |
        ### Audit via Console

        1. Open the **Amazon MSK Console** and select **Clusters** in the left pane.
        2. Select each cluster.
        3. On the **Properties** tab, expand **Monitoring and logging** and locate **Broker log delivery**.
        4. Verify that at least one log destination (CloudWatch Logs, Amazon S3, or Kinesis Data Firehose) is enabled.

        A passing cluster shows at least one broker log delivery destination enabled. A failing cluster shows all delivery destinations disabled or none configured.

        ### Audit via CLI

        1. List all MSK clusters and check their logging configuration:

        ```bash
        aws kafka list-clusters \
          --query "ClusterInfoList[*].ClusterArn" \
          --output text | tr '\t' '\n' | while read arn; do
            aws kafka describe-cluster --cluster-arn "$arn" \
              --query "{Name:ClusterInfo.ClusterName,Logging:ClusterInfo.LoggingInfo}"
        done
        ```

        A passing cluster returns a `Logging` object with at least one broker log destination showing `"Enabled": true`. A failing cluster returns `null` for `Logging` or all destinations showing `"Enabled": false`.
      remediation:
        - id: console
          desc: |
            To ensure MSK clusters have logging enabled using the AWS Console:

            1. Navigate to the **Amazon MSK Console** and select your cluster.
            2. Choose **Edit cluster** (note: some logging settings require cluster recreation).
            3. Under **Broker log delivery**, enable one or more of the following:
               - **CloudWatch Logs**: Select a log group.
               - **S3**: Select or create a bucket and optional prefix.
               - **Kinesis Data Firehose**: Select a delivery stream.
            4. Save the configuration.
        - id: cli
          desc: |
            To ensure MSK clusters have logging enabled using the AWS CLI, update broker logging to deliver logs to CloudWatch Logs:

            ```bash
            aws kafka update-monitoring \
              --cluster-arn <cluster-arn> \
              --current-version <cluster-version> \
              --logging-info BrokerLogs={CloudWatchLogs={Enabled=true,LogGroup=/aws/msk/<cluster-name>}}
            ```

            Verify the logging configuration:

            ```bash
            aws kafka describe-cluster --cluster-arn <cluster-arn> \
              --query "ClusterInfo.LoggingInfo"
            ```
        - id: terraform
          desc: |
            To ensure MSK clusters have logging enabled in Terraform, enable broker logging on an MSK cluster (at least one destination):

            ```hcl
            resource "aws_msk_cluster" "example" {
              cluster_name           = "example-cluster"
              kafka_version          = "3.5.1"
              number_of_broker_nodes = 3

              logging_info {
                broker_logs {
                  cloudwatch_logs {
                    enabled   = true
                    log_group = aws_cloudwatch_log_group.msk.name
                  }
                }
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure MSK clusters have logging enabled in CloudFormation, enable broker logging on an MSK cluster:

            ```yaml
            Resources:
              MSKCluster:
                Type: AWS::MSK::Cluster
                Properties:
                  ClusterName: example-cluster
                  KafkaVersion: "3.5.1"
                  NumberOfBrokerNodes: 3
                  LoggingInfo:
                    BrokerLogs:
                      CloudWatchLogs:
                        Enabled: true
                        LogGroup: !Ref MSKLogGroup
            ```
    refs:
      - url: https://docs.aws.amazon.com/msk/latest/developerguide/msk-logging.html
        title: Amazon MSK - Logging
  - uid: mondoo-aws-security-msk-logging-enabled-aws
    filters: asset.platform == "aws"
    mql: |
      aws.msk.clusters.all(cloudwatchLogsEnabled == true || s3LogsEnabled == true || firehoseLogsEnabled == true)
  - uid: mondoo-aws-security-msk-logging-enabled-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_msk_cluster")
    mql: |
      terraform.resources.where(nameLabel == "aws_msk_cluster").all(
      blocks.where(type == "logging_info") != empty &&
      blocks.where(type == "logging_info").all(blocks.where(type == "broker_logs") != empty)
      )
  - uid: mondoo-aws-security-msk-logging-enabled-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_msk_cluster")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_msk_cluster").all(
      change.after.logging_info != empty
      )
  - uid: mondoo-aws-security-msk-logging-enabled-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_msk_cluster")
    mql: |
      terraform.state.resources.where(type == "aws_msk_cluster").all(
      values.logging_info != empty
      )
  - uid: mondoo-aws-security-msk-logging-enabled-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::MSK::Cluster")
    mql: |
      cloudformation.template.resources.where(type == "AWS::MSK::Cluster").all(
      properties['LoggingInfo'] != empty && properties['LoggingInfo']['BrokerLogs'] != empty
      )
  # No Terraform variants: The `aws_msk_replicator` Terraform resource only models MSK-to-MSK replication; the external (non-MSK) Apache Kafka cluster shape that exposes `encryption_in_transit.type` is API-only.
  # No CloudFormation variants: `AWS::MSK::Replicator` likewise lacks the external Apache Kafka cluster shape, so `EncryptionInTransit.Type` cannot be expressed in a template.
  # No Terraform / CloudFormation remediation: same reason — there is no IaC representation of an external Apache Kafka cluster target to fix.
  - uid: mondoo-aws-security-msk-replicator-external-kafka-tls
    title: Ensure MSK replicators encrypt data in transit to external Kafka
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    variants:
      - uid: mondoo-aws-security-msk-replicator-external-kafka-tls-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
    docs:
      desc: |
        This check ensures that Amazon MSK replicators targeting external (non-MSK) Apache Kafka clusters use TLS for traffic to those external brokers. When a replicator's source or target is an external Apache Kafka cluster, the `EncryptionInTransit.Type` setting controls whether replicated topic data travels over TLS or in plaintext. Only `TLS` ensures that messages crossing the boundary between MSK and the external broker are encrypted.

        **Why this matters**

        - MSK replicators move full topic streams between clusters, so plaintext links carry every replicated message, including sensitive payloads, in the clear.
        - Traffic to an external Apache Kafka cluster typically traverses VPC peering, Transit Gateway, Direct Connect, or the public internet. Plaintext on any of these paths is exposed to network-level interception.
        - Compliance frameworks such as PCI DSS, HIPAA, NIST SP 800-53 SC-8, and SOC 2 require encryption of regulated data in transit; Kafka replication is in scope when topics carry such data.

        **Risk mitigation**

        - **Confidentiality:** TLS prevents on-path attackers from reading replicated messages.
        - **Integrity:** TLS protects against tampering with the replication stream between clusters.
        - **Compliance:** Satisfies in-transit encryption requirements for regulated topic data.
      audit: |
        ### Audit via Console

        1. Open the **Amazon MSK Console** and select **Replicators** in the left pane.
        2. Select each replicator.
        3. Under **Kafka cluster configuration**, review the source and target cluster entries.
        4. For any cluster listed as an **Apache Kafka cluster** (external, non-MSK), confirm that **Encryption in transit** is set to **TLS**.

        A passing replicator shows **TLS** for all external Apache Kafka cluster connections. A failing replicator shows **PLAINTEXT** or **TLS_PLAINTEXT** for at least one external cluster connection.

        ### Audit via CLI

        1. List all MSK replicators and inspect the encryption in transit type for each external Kafka cluster:

        ```bash
        aws kafka list-replicators \
          --query "Replicators[*].ReplicatorArn" \
          --output text | tr '\t' '\n' | while read arn; do
            aws kafka describe-replicator --replicator-arn "$arn" \
              --query "KafkaClusters[].{Alias:KafkaClusterAlias,BootstrapServers:ApacheKafkaCluster.BootstrapServers,EncryptionType:ApacheKafkaCluster.EncryptionInTransit.Type}"
        done
        ```

        A passing replicator returns `"EncryptionType": "TLS"` for every entry that has a non-null `BootstrapServers` value. A failing replicator returns `"EncryptionType": "PLAINTEXT"` or `null` for at least one external cluster.
      remediation:
        - id: console
          desc: |
            Encryption-in-transit settings on an MSK replicator's external Apache Kafka cluster cannot be changed after creation. Recreate the replicator with TLS:

            1. Navigate to the **Amazon MSK Console** and choose **Replicators**.
            2. Note the source and target Kafka cluster configuration of the existing replicator.
            3. Delete the replicator. Replication stops at this point.
            4. Choose **Create replicator** and configure source and target. For any external Apache Kafka cluster, set **Encryption in transit** to **TLS** and confirm the broker presents a certificate trusted by the configured root CA.
            5. Verify the new replicator reaches the **RUNNING** state and resume your replication topology.
        - id: cli
          desc: |
            Encryption-in-transit on the external Apache Kafka cluster is set at create time and cannot be updated. Recreate the replicator with `EncryptionInTransit.Type=TLS` for any `ApacheKafkaCluster` source or target.

            Inspect the current configuration:

            ```bash
            aws kafka describe-replicator --replicator-arn <replicator-arn> \
              --query "KafkaClusters[].{Alias:KafkaClusterAlias,External:ApacheKafkaCluster.BootstrapServers,EncInTransit:ApacheKafkaCluster.EncryptionInTransit.Type}"
            ```

            Delete the misconfigured replicator:

            ```bash
            aws kafka delete-replicator --replicator-arn <replicator-arn>
            ```

            Recreate the replicator with TLS to the external Apache Kafka cluster. Substitute the appropriate VPC, subnet, security group, and credential settings for your environment:

            ```bash
            aws kafka create-replicator \
              --replicator-name <name> \
              --service-execution-role-arn <role-arn> \
              --kafka-clusters '[
                {
                  "AmazonMskCluster": {"MskClusterArn": "<msk-source-arn>"},
                  "VpcConfig": {"SubnetIds": ["subnet-aaa"], "SecurityGroupIds": ["sg-aaa"]}
                },
                {
                  "ApacheKafkaCluster": {
                    "BootstrapServers": "broker1:9092,broker2:9092",
                    "VpcConfig": {"SubnetIds": ["subnet-bbb"], "SecurityGroupIds": ["sg-bbb"]},
                    "EncryptionInTransit": {"Type": "TLS"},
                    "Authentication": {"Type": "SASL_SCRAM", "SaslScram": {"SecretArn": "<secret-arn>"}}
                  }
                }
              ]' \
              --replication-info-list file://replication-info.json
            ```
        # No Terraform remediation: The `aws_msk_replicator` Terraform resource only models MSK-to-MSK replication; external (non-MSK) Apache Kafka cluster configuration including `EncryptionInTransit.Type` is not exposed in the hashicorp/aws provider.
    refs:
      - url: https://docs.aws.amazon.com/msk/latest/developerguide/msk-replicator-encryption.html
        title: Amazon MSK Replicator - Encryption in Transit
      - url: https://docs.aws.amazon.com/cli/latest/reference/kafka/create-replicator.html
        title: AWS CLI - kafka create-replicator
  - uid: mondoo-aws-security-msk-replicator-external-kafka-tls-aws
    filters: asset.platform == "aws"
    mql: |
      aws.msk.replicators.all(
        kafkaClusters.where(apacheKafkaBootstrapBrokers != "").all(encryptionInTransitType == "TLS")
      )
  # No Terraform variants: This check follows a CloudTrail trail's `S3BucketName` to the referenced bucket and inspects its public ACL — a cross-resource correlation. The general `s3-bucket-level-public-access-prohibited-bucket` check covers the bucket directly in Terraform.
  - uid: mondoo-aws-security-cloudtrail-s3-bucket-not-public
    title: Ensure CloudTrail S3 bucket is not publicly accessible
    impact: 100
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-10-3-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-2-1
    # NOTE (2026-03-29): Terraform variants not included because aws_s3_bucket_public_access_block
    # cannot be correlated to the specific CloudTrail S3 bucket in MQL — the check would
    # over-match all S3 public access block resources. A general S3 public access check already
    # exists (mondoo-aws-security-s3-bucket-level-public-access-prohibited).
    variants:
      - uid: mondoo-aws-security-cloudtrail-s3-bucket-not-public-aws
        tags:
          mondoo.com/filter-title: AWS CloudTrail Trail
          mondoo.com/filter-icon: aws
    docs:
      desc: |
        This check ensures that the Amazon S3 bucket used to store AWS CloudTrail log files is not publicly accessible. CloudTrail logs contain a complete record of API calls made in your AWS account, including caller identity, source IP addresses, and request parameters. Exposing this data publicly is a critical security risk.

        **Why this matters**

        - Publicly accessible CloudTrail S3 buckets expose detailed information about your AWS infrastructure, IAM users, roles, and API usage patterns to anyone on the internet.
        - Attackers can use CloudTrail log data to identify high-privilege accounts, enumerate resources, understand security controls, and plan targeted attacks.
        - Public access to audit logs also violates the principle of least privilege and contravenes requirements in CIS AWS Foundations Benchmark, PCI DSS, and SOC 2.

        **Risk mitigation**

        - **Confidentiality of audit data:** Restricting public access prevents adversaries from using log data for reconnaissance.
        - **Compliance:** CIS AWS Foundations Benchmark explicitly requires that the CloudTrail S3 bucket not be publicly accessible.
        - **Integrity protection:** Preventing public write access stops attackers from tampering with or deleting log files.
      audit: |
        ### Audit via Console

        1. Open the **AWS CloudTrail Console**, navigate to **Trails**, and note the S3 bucket name used by each trail.
        2. Open the **Amazon S3 Console** and select that bucket.
        3. Choose the **Permissions** tab.
        4. Under **Block public access (bucket settings)**, confirm all four settings are enabled.
        5. Also review the **Bucket policy** and **Access control list (ACL)** for any public grants.

        A passing bucket shows all four Block Public Access settings enabled and no public grants in the policy or ACL. A failing bucket shows one or more Block Public Access settings disabled or a public-access grant present.

        ### Audit via CLI

        1. Retrieve the CloudTrail S3 bucket name and check its public access block configuration:

        ```bash
        aws cloudtrail describe-trails \
          --query "trailList[*].S3BucketName" \
          --output text | tr '\t' '\n' | while read bucket; do
            echo "Bucket: $bucket"
            aws s3api get-public-access-block --bucket "$bucket"
        done
        ```

        A passing bucket returns all four fields set to `true` (`BlockPublicAcls`, `IgnorePublicAcls`, `BlockPublicPolicy`, `RestrictPublicBuckets`). A failing bucket returns `false` for at least one field or returns an error indicating no public access block is configured.
      remediation:
        - id: console
          desc: |
            To ensure CloudTrail S3 bucket is not publicly accessible using the AWS Console:

            1. Navigate to the **Amazon S3 Console** and select the bucket used by CloudTrail.
            2. Choose the **Permissions** tab.
            3. Under **Block public access (bucket settings)**, choose **Edit**.
            4. Enable all four **Block Public Access** settings.
            5. Choose **Save changes** and confirm.
            6. Also review the bucket policy and ACLs to ensure no public access is granted.
        - id: cli
          desc: |
            To ensure CloudTrail S3 bucket is not publicly accessible using the AWS CLI, block all public access on the CloudTrail S3 bucket:

            ```bash
            aws s3api put-public-access-block \
              --bucket <cloudtrail-bucket-name> \
              --public-access-block-configuration \
                BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true
            ```

            Verify the configuration:

            ```bash
            aws s3api get-public-access-block --bucket <cloudtrail-bucket-name>
            ```
        - id: terraform
          desc: |
            To ensure CloudTrail S3 bucket is not publicly accessible in Terraform, block all public access on the CloudTrail S3 bucket:

            ```hcl
            resource "aws_s3_bucket_public_access_block" "cloudtrail" {
              bucket = aws_s3_bucket.cloudtrail.id

              block_public_acls       = true
              block_public_policy     = true
              ignore_public_acls      = true
              restrict_public_buckets = true
            }
            ```
        - id: cloudformation
          desc: |
            To ensure CloudTrail S3 bucket is not publicly accessible in CloudFormation, block all public access on the CloudTrail S3 bucket:

            ```yaml
            Resources:
              CloudTrailBucket:
                Type: AWS::S3::Bucket
                Properties:
                  BucketName: my-cloudtrail-bucket
                  PublicAccessBlockConfiguration:
                    BlockPublicAcls: true
                    BlockPublicPolicy: true
                    IgnorePublicAcls: true
                    RestrictPublicBuckets: true
            ```
    refs:
      - url: https://docs.aws.amazon.com/awscloudtrail/latest/userguide/create-s3-bucket-policy-for-cloudtrail.html
        title: Amazon S3 Bucket Policy for CloudTrail
      - url: https://docs.aws.amazon.com/AmazonS3/latest/userguide/access-control-block-public-access.html
        title: Blocking public access to your Amazon S3 storage
  - uid: mondoo-aws-security-cloudtrail-s3-bucket-not-public-aws
    filters: asset.platform == "aws-cloudtrail-trail"
    mql: |
      aws.cloudtrail.trail.s3bucket.public == false
  # No Terraform variants: This check follows a CloudTrail trail's `S3BucketName` to the referenced bucket and inspects its logging configuration — a cross-resource correlation. The general `s3-bucket-server-access-logging-enabled` check covers the bucket directly in Terraform.
  - uid: mondoo-aws-security-cloudtrail-s3-bucket-logging
    title: Ensure CloudTrail S3 bucket has access logging enabled
    impact: 50
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-pr-pt-1
      compliance/nist-csf-2: nist-csf-2-pr-ps-04
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-3-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    # NOTE (2026-03-29): Terraform variants not included because aws_s3_bucket_logging cannot be
    # correlated to the specific CloudTrail S3 bucket in MQL — the check would over-match any
    # S3 bucket logging configuration regardless of whether it belongs to the CloudTrail bucket.
    variants:
      - uid: mondoo-aws-security-cloudtrail-s3-bucket-logging-aws
        tags:
          mondoo.com/filter-title: AWS CloudTrail Trail
          mondoo.com/filter-icon: aws
    docs:
      desc: |
        This check ensures that the Amazon S3 bucket used to store CloudTrail logs has S3 server access logging enabled. S3 access logging records detailed information about every request made to the CloudTrail bucket, providing a second layer of audit data that captures who accessed or attempted to access the log files themselves.

        **Why this matters**

        - S3 access logs for the CloudTrail bucket create a meta-audit trail: a record of who is reading, writing, or deleting your audit logs.
        - Without S3 access logging, an attacker who gains access to the CloudTrail bucket could exfiltrate or delete log files without leaving any evidence of their actions.
        - This control is required by the CIS AWS Foundations Benchmark and supports requirements in NIST SP 800-53 AU-6 for audit log review and protection.

        **Risk mitigation**

        - **Log integrity monitoring:** S3 access logs reveal unauthorized attempts to read or delete CloudTrail log files.
        - **Forensic capability:** Access logs provide evidence of tampering with audit data during incident investigations.
        - **Compliance:** Satisfies audit logging requirements that extend to protection of the audit logs themselves.
      audit: |
        ### Audit via Console

        1. Open the **AWS CloudTrail Console**, navigate to **Trails**, and note the S3 bucket name used by each trail.
        2. Open the **Amazon S3 Console** and select that bucket.
        3. Choose the **Properties** tab.
        4. Under **Server access logging**, verify that logging is **Enabled** and a target bucket is configured.

        A passing bucket shows **Server access logging: Enabled** with a target bucket specified. A failing bucket shows **Server access logging: Disabled** or no logging configuration.

        ### Audit via CLI

        1. Retrieve the CloudTrail S3 bucket name and check its server access logging configuration:

        ```bash
        aws cloudtrail describe-trails \
          --query "trailList[*].S3BucketName" \
          --output text | tr '\t' '\n' | while read bucket; do
            echo "Bucket: $bucket"
            aws s3api get-bucket-logging --bucket "$bucket"
        done
        ```

        A passing bucket returns a `LoggingEnabled` object containing a `TargetBucket` value. A failing bucket returns an empty object `{}` indicating no server access logging is configured.
      remediation:
        - id: console
          desc: |
            To ensure CloudTrail S3 bucket has access logging enabled using the AWS Console:

            1. Navigate to the **Amazon S3 Console** and select the bucket used by CloudTrail.
            2. Choose the **Properties** tab.
            3. Under **Server access logging**, choose **Edit**.
            4. Select **Enable**.
            5. Specify a target bucket and optional prefix for access log delivery.
            6. Choose **Save changes**.
        - id: cli
          desc: |
            To ensure CloudTrail S3 bucket has access logging enabled using the AWS CLI, enable server access logging on the CloudTrail S3 bucket:

            ```bash
            aws s3api put-bucket-logging \
              --bucket <cloudtrail-bucket-name> \
              --bucket-logging-status '{
                "LoggingEnabled": {
                  "TargetBucket": "<logging-target-bucket>",
                  "TargetPrefix": "cloudtrail-access-logs/"
                }
              }'
            ```

            Verify the logging configuration:

            ```bash
            aws s3api get-bucket-logging --bucket <cloudtrail-bucket-name>
            ```
        - id: terraform
          desc: |
            To ensure CloudTrail S3 bucket has access logging enabled in Terraform, enable server access logging on the CloudTrail S3 bucket:

            ```hcl
            resource "aws_s3_bucket_logging" "cloudtrail" {
              bucket = aws_s3_bucket.cloudtrail.id

              target_bucket = aws_s3_bucket.logging.id
              target_prefix = "cloudtrail-access-logs/"
            }
            ```
        - id: cloudformation
          desc: |
            To ensure CloudTrail S3 bucket has access logging enabled in CloudFormation, enable server access logging on the CloudTrail S3 bucket:

            ```yaml
            Resources:
              CloudTrailBucket:
                Type: AWS::S3::Bucket
                Properties:
                  BucketName: my-cloudtrail-bucket
                  LoggingConfiguration:
                    DestinationBucketName: !Ref LoggingBucket
                    LogFilePrefix: cloudtrail-access-logs/
            ```
    refs:
      - url: https://docs.aws.amazon.com/AmazonS3/latest/userguide/ServerLogs.html
        title: Amazon S3 - Logging requests using server access logging
      - url: https://docs.aws.amazon.com/awscloudtrail/latest/userguide/create-s3-bucket-policy-for-cloudtrail.html
        title: Amazon S3 Bucket Policy for CloudTrail
  - uid: mondoo-aws-security-cloudtrail-s3-bucket-logging-aws
    filters: asset.platform == "aws-cloudtrail-trail"
    mql: |
      aws.cloudtrail.trail.s3bucket.logging['TargetBucket'] != empty
  - uid: mondoo-aws-security-dynamodb-pitr-enabled
    title: Ensure DynamoDB tables have point-in-time recovery enabled
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-bcr-08
      compliance/dora: dora-art-12
      compliance/hipaa: hipaa-security-ss164-308-a-7-ii-a-contingency-plan-data-backup-plan
      compliance/iso-27001-2022: iso-27001-2022-a-8-13
      compliance/nis-2: nis-2-21-2-c
      compliance/nist-csf-1: nist-csf-1-pr-ip-4
      compliance/nist-csf-2: nist-csf-2-pr-ds-11
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cp-9
      compliance/nist-sp-800-171: nist-sp-800-171--3-8-9
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc9-1-1
      compliance/vda-isa-5: false
    variants:
      - uid: mondoo-aws-security-dynamodb-pitr-enabled-aws
        tags:
          mondoo.com/filter-title: AWS DynamoDB Table
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-dynamodb-pitr-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-dynamodb-pitr-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-dynamodb-pitr-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-dynamodb-pitr-enabled-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon DynamoDB tables have Point-in-Time Recovery (PITR) enabled. PITR provides continuous backups of DynamoDB table data, allowing you to restore a table to any point in time within the last 35 days. This protects against accidental writes, deletes, and application bugs that corrupt or destroy data.

        **Why this matters**

        - Without PITR, recovering from accidental bulk deletions or data corruption requires manual backups that may not reflect the most recent state of the table.
        - PITR is a zero-impact operation that does not consume table throughput and does not require any additional configuration beyond enabling the feature.
        - Data recovery capabilities are a key requirement in business continuity and disaster recovery frameworks, including NIST SP 800-53 CP-9 and SOC 2 Availability criteria.

        **Risk mitigation**

        - **Data recovery:** PITR enables restoration to any second within the recovery window, minimizing data loss in the event of accidental or malicious modification.
        - **Resilience:** Protects critical application data from application-level bugs, operator errors, and ransomware-style data destruction.
        - **Compliance:** Satisfies data backup and recovery requirements in multiple regulatory and security frameworks.
      audit: |
        ### Audit via Console

        1. Open the **Amazon DynamoDB Console** and select **Tables** in the left pane.
        2. Select each table.
        3. Choose the **Backups** tab.
        4. Under **Point-in-time recovery (PITR)**, verify the status shows **Enabled**.

        A passing table shows **Point-in-time recovery: Enabled**. A failing table shows **Point-in-time recovery: Disabled**.

        ### Audit via CLI

        1. List all DynamoDB tables and check PITR status for each:

        ```bash
        aws dynamodb list-tables \
          --query "TableNames[]" \
          --output text | tr '\t' '\n' | while read table; do
            aws dynamodb describe-continuous-backups \
              --table-name "$table" \
              --query "{Table:TableName,PITRStatus:ContinuousBackupsDescription.PointInTimeRecoveryDescription.PointInTimeRecoveryStatus}" \
              --output table
        done
        ```

        A passing table returns `"PITRStatus": "ENABLED"`. A failing table returns `"PITRStatus": "DISABLED"`.
      remediation:
        - id: console
          desc: |
            To ensure DynamoDB tables have point-in-time recovery enabled using the AWS Console:

            1. Navigate to the **Amazon DynamoDB Console** and select **Tables**.
            2. Select the table you want to configure.
            3. Choose the **Backups** tab.
            4. Under **Point-in-time recovery (PITR)**, choose **Enable**.
            5. Confirm the action.
        - id: cli
          desc: |
            To ensure DynamoDB tables have point-in-time recovery enabled using the AWS CLI, enable PITR on a DynamoDB table:

            ```bash
            aws dynamodb update-continuous-backups \
              --table-name <table-name> \
              --point-in-time-recovery-specification PointInTimeRecoveryEnabled=true
            ```

            Verify PITR status:

            ```bash
            aws dynamodb describe-continuous-backups --table-name <table-name> \
              --query "ContinuousBackupsDescription.PointInTimeRecoveryDescription"
            ```
        - id: terraform
          desc: |
            To ensure DynamoDB tables have point-in-time recovery enabled in Terraform, enable point-in-time recovery on a DynamoDB table:

            ```hcl
            resource "aws_dynamodb_table" "example" {
              name     = "example-table"
              hash_key = "id"

              point_in_time_recovery {
                enabled = true
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure DynamoDB tables have point-in-time recovery enabled in CloudFormation, enable point-in-time recovery on a DynamoDB table:

            ```yaml
            Resources:
              DynamoDBTable:
                Type: AWS::DynamoDB::Table
                Properties:
                  TableName: example-table
                  PointInTimeRecoverySpecification:
                    PointInTimeRecoveryEnabled: true
            ```
    refs:
      - url: https://docs.aws.amazon.com/amazondynamodb/latest/developerguide/PointInTimeRecovery.html
        title: Amazon DynamoDB - Point-in-Time Recovery
      - url: https://docs.aws.amazon.com/amazondynamodb/latest/developerguide/BackupRestore.html
        title: Amazon DynamoDB - On-Demand Backup and Restore
  - uid: mondoo-aws-security-dynamodb-pitr-enabled-aws
    filters: asset.platform == "aws-dynamodb-table"
    mql: |
      aws.dynamodb.table.continuousBackups["PointInTimeRecoveryDescription"]["PointInTimeRecoveryStatus"] == "ENABLED"
