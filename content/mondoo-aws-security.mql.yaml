  - uid: mondoo-aws-security-dax-encryption-at-rest
    title: Ensure DynamoDB DAX clusters have encryption at rest
    impact: 70
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-aws-security-dax-encryption-at-rest-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-dax-encryption-at-rest-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-dax-encryption-at-rest-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-dax-encryption-at-rest-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-dax-encryption-at-rest-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon DynamoDB Accelerator (DAX) clusters have server-side encryption (SSE) enabled. DAX is an in-memory cache for DynamoDB that stores copies of table data, and without encryption at rest, cached data is stored unencrypted in memory and on disk.

        **Why this matters**

        - DAX clusters cache frequently accessed DynamoDB data in memory. Without SSE, this cached data, which may include sensitive information, is not encrypted at rest.
        - Encryption at rest for DAX cannot be enabled after cluster creation. A new cluster must be created with encryption enabled if the existing cluster lacks it.
        - Compliance frameworks including PCI DSS, HIPAA, and NIST SP 800-53 SC-28 require encryption of sensitive data at rest, including cached copies.

        **Risk mitigation**

        - **Data protection:** SSE encrypts data cached in DAX, ensuring sensitive DynamoDB data remains protected even in the caching layer.
        - **Compliance:** Satisfies at-rest encryption requirements that extend to all copies of data, including caches.
        - **Defense in depth:** Complements DynamoDB table-level encryption by extending protection to the DAX caching layer.
      remediation:
        - id: console
          desc: |
            To ensure DynamoDB DAX clusters have encryption at rest using the AWS Console, note: Encryption at rest cannot be enabled on an existing DAX cluster. You must create a new cluster with encryption enabled.

            1. Navigate to the **DynamoDB Console** and choose **DAX** > **Clusters**.
            2. Choose **Create cluster**.
            3. Under **Encryption**, select **Enable encryption**.
            4. Complete the cluster configuration and create the cluster.
            5. Update your application to point to the new encrypted DAX cluster endpoint.
            6. Delete the unencrypted cluster once migration is complete.
        - id: cli
          desc: |
            To ensure DynamoDB DAX clusters have encryption at rest using the AWS CLI, create a DAX cluster with encryption at rest enabled:

            ```bash
            aws dax create-cluster \
              --cluster-name <cluster-name> \
              --node-type dax.r5.large \
              --replication-factor 3 \
              --iam-role-arn arn:aws:iam::<account-id>:role/<dax-role> \
              --sse-specification Enabled=true
            ```

            Check the SSE status of an existing cluster:

            ```bash
            aws dax describe-clusters --cluster-names <cluster-name> \
              --query "Clusters[*].{Name:ClusterName,SSE:SSEDescription.Status}"
            ```
        - id: terraform
          desc: |
            To ensure DynamoDB DAX clusters have encryption at rest in Terraform:

            ```hcl
            resource "aws_dax_cluster" "example" {
              cluster_name       = "example-dax"
              iam_role_arn       = aws_iam_role.dax.arn
              node_type          = "dax.r5.large"
              replication_factor = 3

              server_side_encryption {
                enabled = true
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure DynamoDB DAX clusters have encryption at rest in CloudFormation:

            ```yaml
            Resources:
              DAXCluster:
                Type: AWS::DAX::Cluster
                Properties:
                  ClusterName: example-dax
                  IAMRoleARN: !GetAtt DAXRole.Arn
                  NodeType: dax.r5.large
                  ReplicationFactor: 3
                  SSESpecification:
                    SSEEnabled: true
            ```
    refs:
      - url: https://docs.aws.amazon.com/amazondynamodb/latest/developerguide/DAXEncryptionAtRest.html
        title: Amazon DynamoDB - DAX Encryption at Rest
      - url: https://docs.aws.amazon.com/securityhub/latest/userguide/dynamodb-controls.html
        title: AWS Security Hub - DynamoDB controls reference
  - uid: mondoo-aws-security-dax-encryption-at-rest-aws
    filters: asset.platform == "aws"
    mql: aws.dynamodb.daxClusters.all(sseStatus == "ENABLED")
  - uid: mondoo-aws-security-dax-encryption-at-rest-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_dax_cluster")
    mql: |
      terraform.resources.where(nameLabel == "aws_dax_cluster").all(
      blocks.where(type == "server_side_encryption") != empty &&
      blocks.where(type == "server_side_encryption").all(arguments.enabled == true)
      )
  - uid: mondoo-aws-security-dax-encryption-at-rest-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_dax_cluster")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_dax_cluster").all(
      change.after.server_side_encryption != empty &&
      change.after.server_side_encryption.all(enabled == true)
      )
  - uid: mondoo-aws-security-dax-encryption-at-rest-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_dax_cluster")
    mql: |
      terraform.state.resources.where(type == "aws_dax_cluster").all(
      values.server_side_encryption != empty &&
      values.server_side_encryption.all(enabled == true)
      )
  - uid: mondoo-aws-security-dax-encryption-at-rest-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::DAX::Cluster")
    mql: |
      cloudformation.template.resources.where(type == "AWS::DAX::Cluster").all(
      properties['SSESpecification'] != empty && properties['SSESpecification']['SSEEnabled'] == true
      )
  - uid: mondoo-aws-security-sqs-no-wildcard-policy
    title: Ensure SQS queues do not allow wildcard access policies
    impact: 80
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-3-1
      compliance/vda-isa-5: vda-isa-5-5-2-6
    variants:
      - uid: mondoo-aws-security-sqs-no-wildcard-policy-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-sqs-no-wildcard-policy-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-sqs-no-wildcard-policy-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-sqs-no-wildcard-policy-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-sqs-no-wildcard-policy-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon SQS queue access policies do not grant access to wildcard principals. A queue policy with `"Principal": "*"` or `"Principal": {"AWS": "*"}` without appropriate conditions allows any AWS account or unauthenticated user to perform actions on the queue.

        **Why this matters**

        - SQS queues with wildcard principal policies are effectively public, allowing any AWS account to send messages, receive messages, or delete messages depending on the actions granted.
        - Overly permissive queue policies can lead to unauthorized message injection, data exfiltration through message consumption, or denial of service through queue flooding.
        - Unlike S3 bucket policies where public access blockers provide a safety net, SQS does not have an equivalent account-level control to override permissive queue policies.

        **Risk mitigation**

        - **Least privilege:** Restricting queue policies to specific AWS accounts, IAM roles, or services ensures only authorized entities can interact with the queue.
        - **Data protection:** Prevents unauthorized parties from reading or injecting messages that may contain sensitive application data.
        - **Compliance:** Satisfies access control requirements under NIST SP 800-53 AC-3, ISO 27001 A.8.20, and SOC 2 CC6.3.
      remediation:
        - id: console
          desc: |
            To ensure SQS queues do not allow wildcard access policies using the AWS Console:

            1. Navigate to the **Amazon SQS Console** and select the queue.
            2. Choose the **Access policy** tab.
            3. Review the policy for any statements with `"Principal": "*"` or `"Principal": {"AWS": "*"}`.
            4. Replace wildcard principals with specific AWS account IDs, IAM role ARNs, or service principals.
            5. If broad access is required, add conditions such as `aws:SourceArn`, `aws:SourceAccount`, or `aws:PrincipalOrgID` to restrict access.
            6. Choose **Save**.
        - id: cli
          desc: |
            To ensure SQS queues do not allow wildcard access policies using the AWS CLI, view the current queue policy:

            ```bash
            aws sqs get-queue-attributes \
              --queue-url <queue-url> \
              --attribute-names Policy
            ```

            Set a restrictive policy that limits access to a specific account:

            ```bash
            aws sqs set-queue-attributes \
              --queue-url <queue-url> \
              --attributes '{
                "Policy": "{\"Version\":\"2012-10-17\",\"Statement\":[{\"Effect\":\"Allow\",\"Principal\":{\"AWS\":\"arn:aws:iam::<account-id>:root\"},\"Action\":\"SQS:*\",\"Resource\":\"<queue-arn>\"}]}"
              }'
            ```
        - id: terraform
          desc: |
            To ensure SQS queues do not allow wildcard access policies in Terraform:

            ```hcl
            resource "aws_sqs_queue" "example" {
              name = "example-queue"
            }

            resource "aws_sqs_queue_policy" "example" {
              queue_url = aws_sqs_queue.example.id

              policy = jsonencode({
                Version = "2012-10-17"
                Statement = [{
                  Effect    = "Allow"
                  Principal = { AWS = "arn:aws:iam::${data.aws_caller_identity.current.account_id}:root" }
                  Action    = "SQS:*"
                  Resource  = aws_sqs_queue.example.arn
                }]
              })
            }
            ```
        - id: cloudformation
          desc: |
            To ensure SQS queues do not allow wildcard access policies in CloudFormation:

            ```yaml
            Resources:
              SQSQueuePolicy:
                Type: AWS::SQS::QueuePolicy
                Properties:
                  Queues:
                    - !Ref SQSQueue
                  PolicyDocument:
                    Version: "2012-10-17"
                    Statement:
                      - Effect: Allow
                        Principal:
                          AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
                        Action: "SQS:*"
                        Resource: !GetAtt SQSQueue.Arn
            ```
    refs:
      - url: https://docs.aws.amazon.com/AWSSimpleQueueService/latest/SQSDeveloperGuide/sqs-basic-examples-of-sqs-policies.html
        title: Amazon SQS - Basic examples of Amazon SQS policies
      - url: https://docs.aws.amazon.com/securityhub/latest/userguide/sqs-controls.html
        title: AWS Security Hub - SQS controls reference
  - uid: mondoo-aws-security-sqs-no-wildcard-policy-aws
    filters: asset.platform == "aws"
    mql: |
      aws.sqs.queues.all(
        policy == empty ||
        policy['Statement'].where(_['Effect'] == "Allow").none(
          _['Principal'] == "*" || _['Principal']['AWS'] == "*" || _['Principal']['AWS'].contains("*")
        )
      )

  - uid: mondoo-aws-security-sqs-no-wildcard-policy-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_sqs_queue_policy")
    mql: |
      terraform.resources.where(nameLabel == "aws_sqs_queue_policy").all(
      arguments.policy == empty || arguments.policy != /"Principal"\s*:\s*"\*"/
      )
  - uid: mondoo-aws-security-sqs-no-wildcard-policy-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_sqs_queue_policy")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_sqs_queue_policy").all(
      change.after.policy == empty || change.after.policy != /"Principal"\s*:\s*"\*"/
      )
  - uid: mondoo-aws-security-sqs-no-wildcard-policy-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_sqs_queue_policy")
    mql: |
      terraform.state.resources.where(type == "aws_sqs_queue_policy").all(
      values.policy == empty || values.policy != /"Principal"\s*:\s*"\*"/
      )
  - uid: mondoo-aws-security-sqs-no-wildcard-policy-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::SQS::QueuePolicy")
    mql: |
      cloudformation.template.resources.where(type == "AWS::SQS::QueuePolicy").all(
      properties['PolicyDocument'].string != /"Principal"\s*:\s*"\*"/
      )
  # No Terraform variants: `aws_ecs_task_definition.container_definitions` is a JSON-encoded string in HCL — extracting and pattern-matching environment-variable names/values would require a JSON-walking variant pass that is not currently supported in the same shape as the runtime check.
  - uid: mondoo-aws-security-ecs-task-definition-no-plaintext-secrets
    title: Ensure ECS task definitions do not contain plaintext secrets
    impact: 90
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-aws-security-ecs-task-definition-no-plaintext-secrets-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
    docs:
      desc: |
        This check ensures that Amazon ECS task definitions do not contain plaintext secrets in container environment variables. Hardcoded secrets such as passwords, API keys, and access tokens in environment variables can be exposed through the ECS console, API calls, or container introspection.

        **Why this matters**

        Storing secrets as plaintext environment variables in ECS task definitions poses significant security risks:

        - **Credential exposure:** Environment variables are visible to anyone with permissions to describe task definitions and can be logged in various places.
        - **Rotation difficulty:** Hardcoded secrets require redeployment of task definitions to rotate, making it difficult to respond to compromises.
        - **Blast radius:** A single compromised task definition can expose multiple secrets simultaneously.

        **Scope:** This check detects common secret patterns in environment variable names (e.g., `DB_PASSWORD`, `API_KEY`, `AWS_SECRET_ACCESS_KEY`) and values (AWS access key IDs, private key headers). Secrets stored under non-standard variable names without recognizable value patterns will not be detected.

        **Risk mitigation**

        - Use AWS Secrets Manager or AWS Systems Manager Parameter Store to manage secrets securely.
        - Reference secrets in task definitions using the `secrets` field with `valueFrom` instead of the `environment` field.
        - Implement automated secret rotation through Secrets Manager.
      remediation:
        - id: console
          desc: |
            To ensure ECS task definitions do not contain plaintext secrets using the AWS Console:

            1. Navigate to the Amazon ECS Console.
            2. Select **Task definitions** in the left panel.
            3. Select the task definition to review.
            4. For each container definition, review the **Environment variables** section.
            5. Remove any environment variables with names that store secrets (e.g., `DB_PASSWORD`, `API_KEY`, `SECRET_KEY`, `AWS_SECRET_ACCESS_KEY`).
            6. Instead, use the **Secrets** section to reference values from AWS Secrets Manager or SSM Parameter Store.
            7. Create a new revision of the task definition with the changes.
        - id: cli
          desc: |
            To ensure ECS task definitions do not contain plaintext secrets using the AWS CLI, check for plaintext secrets in task definitions:

            ```bash
            aws ecs describe-task-definition --task-definition <task-def-name> \
              --query "taskDefinition.containerDefinitions[*].{Name:name, Environment:environment}"
            ```

            Update the task definition to use secrets references instead of environment variables:

            ```bash
            aws ecs register-task-definition --cli-input-json file://task-definition.json
            ```

            In your task definition JSON, replace environment variables containing secrets with the `secrets` field:

            ```json
            {
              "containerDefinitions": [
                {
                  "name": "app",
                  "secrets": [
                    {
                      "name": "DB_PASSWORD",
                      "valueFrom": "arn:aws:secretsmanager:region:account-id:secret:my-secret"
                    }
                  ]
                }
              ]
            }
            ```
        - id: terraform
          desc: |
            To ensure ECS task definitions do not contain plaintext secrets in Terraform, use the `secrets` block to reference values from Secrets Manager or SSM Parameter Store instead of embedding plaintext secrets in `environment`:

            ```hcl
            resource "aws_ecs_task_definition" "example" {
              family = "example"
              container_definitions = jsonencode([{
                name  = "app"
                image = "my-app:latest"
                secrets = [
                  {
                    name      = "DB_PASSWORD"
                    valueFrom = "arn:aws:secretsmanager:us-east-1:123456789012:secret:my-secret"
                  }
                ]
              }])
            }
            ```
        - id: cloudformation
          desc: |
            To ensure ECS task definitions do not contain plaintext secrets in CloudFormation, use the `Secrets` property to reference values from Secrets Manager or SSM Parameter Store instead of plaintext `Environment` entries:

            ```yaml
            Resources:
              TaskDefinition:
                Type: AWS::ECS::TaskDefinition
                Properties:
                  Family: example
                  ContainerDefinitions:
                    - Name: app
                      Image: my-app:latest
                      Secrets:
                        - Name: DB_PASSWORD
                          ValueFrom: arn:aws:secretsmanager:us-east-1:123456789012:secret:my-secret
            ```
    refs:
      - url: https://docs.aws.amazon.com/AmazonECS/latest/developerguide/specifying-sensitive-data.html
        title: AWS Documentation - Passing sensitive data to a container
  - uid: mondoo-aws-security-ecs-task-definition-no-plaintext-secrets-aws
    filters: asset.platform == "aws"
    mql: |
      aws.ecs.taskDefinitions.all(
        containerDefinitions.all(
          environment.none( name == /(?i)^(aws_secret_access_key|aws_access_key_id|db_password|database_password|master_password|admin_password|api_key|api_secret|private_key|secret_key|auth_token|access_token)$/ ) &&
          environment.none( value == /(A3T[A-Z0-9]|AKIA|AGPA|AIDA|AROA|AIPA|ANPA|ANVA|ASIA)[A-Z0-9]{16}/ ) &&
          environment.none( value == /-----BEGIN (RSA |DSA |EC |OPENSSH |PGP )?PRIVATE KEY/ )
        )
      )
  # No Terraform variants: The default VPC is created by AWS automatically per region; `aws_default_vpc` adopts an existing default VPC for management but does not delete it. The runtime check walks every region's VPCs to find any with `isDefault == true`; this regional inventory does not have a clean Terraform analog.
  - uid: mondoo-aws-security-no-default-vpc
    title: Ensure the default VPC is not used
    impact: 80
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-6
    variants:
      - uid: mondoo-aws-security-no-default-vpc-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
    docs:
      desc: |
        This check ensures that the default VPC is not present in the AWS account. Default VPCs are created automatically in each AWS region with permissive network configurations that are unsuitable for production workloads.

        **Why this matters**

        Default VPCs have several security concerns:

        - **Permissive configuration:** Default VPCs include an internet gateway, public subnets, and auto-assigned public IP addresses, which can inadvertently expose resources to the internet.
        - **Lack of segmentation:** The default network configuration does not enforce proper network segmentation or least-privilege access.
        - **Accidental deployment:** Resources launched without specifying a VPC are placed in the default VPC, potentially bypassing security controls.

        **Risk mitigation**

        - Delete default VPCs in all regions to prevent accidental use.
        - Create custom VPCs with properly configured subnets, route tables, and security groups.
        - Enforce VPC selection through service control policies or IAM conditions.
      remediation:
        - id: console
          desc: |
            To ensure the default VPC is not used using the AWS Console:

            1. Navigate to the **VPC Console**.
            2. Select **Your VPCs** in the left panel.
            3. Identify VPCs marked as **Default VPC = Yes**.
            4. Before deleting, ensure no resources (EC2 instances, RDS instances, etc.) are using the default VPC.
            5. Delete all associated resources (subnets, internet gateways, route tables, network ACLs, security groups).
            6. Select the default VPC and choose **Actions** > **Delete VPC**.
            7. Repeat for each AWS region.
        - id: cli
          desc: |
            To ensure the default VPC is not used using the AWS CLI, list default VPCs across all regions:

            ```bash
            for region in $(aws ec2 describe-regions --query "Regions[].RegionName" --output text); do
              echo "Region: $region"
              aws ec2 describe-vpcs --region "$region" --filters "Name=isDefault,Values=true" \
                --query "Vpcs[].VpcId" --output text
            done
            ```

            Delete the default VPC (after removing all dependent resources):

            ```bash
            aws ec2 delete-vpc --vpc-id <vpc-id> --region <region>
            ```
        - id: terraform
          desc: |
            Terraform does not manage default VPCs. To remove a default VPC, use the `aws_default_vpc` resource with a lifecycle block, or delete it using the AWS CLI. You can also use the `awsutils` provider's `awsutils_default_vpc_deletion` resource to automate default VPC removal across regions.
        - id: cloudformation
          desc: |
            CloudFormation does not support deleting default VPCs. Default VPC removal must be performed using the AWS CLI or Console. Consider using a custom CloudFormation resource backed by a Lambda function if automated removal is required.
    refs:
      - url: https://docs.aws.amazon.com/vpc/latest/userguide/default-vpc.html
        title: AWS Documentation - Default VPCs
  - uid: mondoo-aws-security-no-default-vpc-aws
    filters: asset.platform == "aws"
    mql: aws.vpcs.none(isDefault == true)
  - uid: mondoo-aws-security-emr-local-disk-encryption
    title: Ensure EMR clusters have local disk encryption enabled
    impact: 80
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-aws-security-emr-local-disk-encryption-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-emr-local-disk-encryption-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-emr-local-disk-encryption-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-emr-local-disk-encryption-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-emr-local-disk-encryption-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon EMR clusters have local disk encryption enabled. Local disk encryption protects data stored on instance store volumes and EBS volumes attached to EMR cluster nodes using Linux Unified Key Setup (LUKS) or other encryption mechanisms.

        **Why this matters**

        Without local disk encryption, sensitive data processed by EMR jobs is stored in plaintext on cluster node disks:

        - **Data exposure:** Temporary data, shuffle data, and spill files written during MapReduce, Spark, or Hive jobs can contain sensitive information.
        - **Compliance requirements:** Many regulatory frameworks require encryption of data at rest, including data on local storage volumes.
        - **Instance store volatility:** While instance store data is lost on termination, it remains accessible during the cluster lifetime without encryption.

        **Risk mitigation**

        - **Data protection:** Ensures all data on local disks is encrypted, preventing unauthorized access to intermediate processing data.
        - **Compliance:** Meets regulatory requirements for encryption of data at rest on compute instances.
        - **Defense in depth:** Adds an additional layer of protection beyond network-level controls.
      remediation:
        - id: console
          desc: |
            To ensure EMR clusters have local disk encryption enabled using the AWS Console:

            1. Navigate to the **Amazon EMR Console**.
            2. Select **Security configurations** in the left panel.
            3. Create a new security configuration or edit an existing one.
            4. Under **Encryption**, enable **At-rest encryption**.
            5. Under **Local disk encryption**, select the encryption provider and configure the key.
            6. Apply the security configuration when creating new EMR clusters.
        - id: cli
          desc: |
            To ensure EMR clusters have local disk encryption enabled using the AWS CLI, create a security configuration with local disk encryption:

            ```bash
            aws emr create-security-configuration \
              --name "emr-encryption-config" \
              --security-configuration '{
                "EncryptionConfiguration": {
                  "EnableAtRestEncryption": true,
                  "AtRestEncryptionConfiguration": {
                    "LocalDiskEncryptionConfiguration": {
                      "EncryptionKeyProviderType": "AwsKms",
                      "AwsKmsKey": "arn:aws:kms:region:account-id:key/key-id"
                    }
                  },
                  "EnableInTransitEncryption": false
                }
              }'
            ```

            Launch an EMR cluster with the security configuration:

            ```bash
            aws emr run-job-flow \
              --name "secure-cluster" \
              --security-configuration "emr-encryption-config" \
              --release-label emr-6.15.0 \
              --instances InstanceGroups='[{"InstanceRole":"MASTER","InstanceType":"m5.xlarge","InstanceCount":1}]'
            ```
        - id: terraform
          desc: |
            To ensure EMR clusters have local disk encryption enabled in Terraform, configure an EMR security configuration with local disk encryption:

            ```hcl
            resource "aws_emr_security_configuration" "encryption" {
              name = "emr-local-disk-encryption"

              configuration = jsonencode({
                EncryptionConfiguration = {
                  EnableAtRestEncryption = true
                  AtRestEncryptionConfiguration = {
                    LocalDiskEncryptionConfiguration = {
                      EncryptionKeyProviderType = "AwsKms"
                      AwsKmsKey                = aws_kms_key.emr.arn
                    }
                  }
                  EnableInTransitEncryption = false
                }
              })
            }

            resource "aws_emr_cluster" "example" {
              name                   = "secure-cluster"
              release_label          = "emr-6.15.0"
              security_configuration = aws_emr_security_configuration.encryption.name

              # ... other configuration
            }
            ```
        - id: cloudformation
          desc: |
            To ensure EMR clusters have local disk encryption enabled in CloudFormation:

            ```yaml
            EMRSecurityConfiguration:
              Type: AWS::EMR::SecurityConfiguration
              Properties:
                Name: emr-local-disk-encryption
                SecurityConfiguration:
                  EncryptionConfiguration:
                    EnableAtRestEncryption: true
                    AtRestEncryptionConfiguration:
                      LocalDiskEncryptionConfiguration:
                        EncryptionKeyProviderType: AwsKms
                        AwsKmsKey: !GetAtt EMRKmsKey.Arn
                    EnableInTransitEncryption: false
            ```
    refs:
      - url: https://docs.aws.amazon.com/emr/latest/ManagementGuide/emr-data-encryption-options.html
        title: AWS Documentation - Encryption options for Amazon EMR
  - uid: mondoo-aws-security-emr-local-disk-encryption-aws
    filters: asset.platform == "aws-emr-cluster"
    mql: |
      aws.emr.cluster.encryptionConfiguration.atRestEnabled == true &&
      aws.emr.cluster.encryptionConfiguration.atRestConfiguration['LocalDiskEncryptionConfiguration'] != empty
  - uid: mondoo-aws-security-emr-local-disk-encryption-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_emr_security_configuration")
    mql: |
      terraform.resources.where(nameLabel == "aws_emr_security_configuration").all(
      arguments.configuration.contains("LocalDiskEncryptionConfiguration")
      )
  - uid: mondoo-aws-security-emr-local-disk-encryption-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_emr_security_configuration")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_emr_security_configuration").all(
      change.after.configuration.contains("LocalDiskEncryptionConfiguration")
      )
  - uid: mondoo-aws-security-emr-local-disk-encryption-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_emr_security_configuration")
    mql: |
      terraform.state.resources.where(type == "aws_emr_security_configuration").all(
      values.configuration.contains("LocalDiskEncryptionConfiguration")
      )
  - uid: mondoo-aws-security-emr-local-disk-encryption-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::EMR::SecurityConfiguration")
    mql: |
      cloudformation.template.resources.where(type == "AWS::EMR::SecurityConfiguration").all(
      properties['SecurityConfiguration'].string.contains("LocalDiskEncryptionConfiguration")
      )
  - uid: mondoo-aws-security-cloudtrail-cloudwatch-integration
    title: Ensure CloudTrail trails deliver logs to CloudWatch
    impact: 60
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    variants:
      - uid: mondoo-aws-security-cloudtrail-cloudwatch-integration-aws
        tags:
          mondoo.com/filter-title: AWS CloudTrail Trail
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-cloudtrail-cloudwatch-integration-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-cloudtrail-cloudwatch-integration-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-cloudtrail-cloudwatch-integration-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-cloudtrail-cloudwatch-integration-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that AWS CloudTrail multi-region trails are configured to deliver logs to Amazon CloudWatch Logs. CloudWatch integration enables real-time monitoring, alerting, and automated responses to CloudTrail events.

        **Why this matters**

        Without CloudWatch integration, CloudTrail logs are only available in S3, limiting monitoring capabilities:

        - **Delayed detection:** Without real-time log analysis, security incidents may go undetected for extended periods.
        - **No automated alerting:** S3-only logging requires manual or separate tooling for alert generation.
        - **Compliance gaps:** Many security frameworks require real-time monitoring and alerting on security-relevant events.

        **Risk mitigation**

        - **Real-time monitoring:** Enables immediate detection of suspicious API activity through CloudWatch metric filters and alarms.
        - **Automated response:** CloudWatch alarms can trigger SNS notifications, Lambda functions, or other automated remediation actions.
        - **Compliance:** Meets requirements for continuous monitoring and real-time alerting in security frameworks.
      remediation:
        - id: console
          desc: |
            To ensure CloudTrail trails deliver logs to CloudWatch using the AWS Console:

            1. Navigate to the **AWS CloudTrail Console**.
            2. Select **Trails** in the left panel.
            3. Select the trail to configure.
            4. Under **CloudWatch Logs**, select **Edit**.
            5. Enable CloudWatch Logs delivery.
            6. Create a new log group or select an existing one.
            7. Create or select an IAM role that grants CloudTrail permissions to deliver logs to CloudWatch.
            8. Save the changes.
        - id: cli
          desc: |
            To ensure CloudTrail trails deliver logs to CloudWatch using the AWS CLI, configure CloudWatch Logs delivery for a trail:

            ```bash
            aws cloudtrail update-trail \
              --name <trail-name> \
              --cloud-watch-logs-log-group-arn arn:aws:logs:region:account-id:log-group:my-log-group:* \
              --cloud-watch-logs-role-arn arn:aws:iam::account-id:role/CloudTrail_CloudWatchLogs_Role
            ```

            Verify the configuration:

            ```bash
            aws cloudtrail describe-trails \
              --trail-name-list <trail-name> \
              --query "trailList[*].{Name:Name,CloudWatchLogsLogGroupArn:CloudWatchLogsLogGroupArn}"
            ```
        - id: terraform
          desc: |
            To ensure CloudTrail trails deliver logs to CloudWatch in Terraform, configure a CloudTrail trail with CloudWatch Logs integration:

            ```hcl
            resource "aws_cloudwatch_log_group" "cloudtrail" {
              name              = "/aws/cloudtrail/my-trail"
              retention_in_days = 90
            }

            resource "aws_cloudtrail" "example" {
              name                          = "my-trail"
              s3_bucket_name                = aws_s3_bucket.cloudtrail.id
              is_multi_region_trail         = true
              cloud_watch_logs_group_arn    = "${aws_cloudwatch_log_group.cloudtrail.arn}:*"
              cloud_watch_logs_role_arn     = aws_iam_role.cloudtrail_cloudwatch.arn
            }
            ```
        - id: cloudformation
          desc: |
            To ensure CloudTrail trails deliver logs to CloudWatch in CloudFormation, configure a CloudTrail trail with CloudWatch Logs integration:

            ```yaml
            Resources:
              CloudTrailLogGroup:
                Type: AWS::Logs::LogGroup
                Properties:
                  LogGroupName: /aws/cloudtrail/my-trail
                  RetentionInDays: 90
              CloudTrail:
                Type: AWS::CloudTrail::Trail
                Properties:
                  TrailName: my-trail
                  S3BucketName: !Ref CloudTrailBucket
                  IsMultiRegionTrail: true
                  IsLogging: true
                  CloudWatchLogsLogGroupArn: !GetAtt CloudTrailLogGroup.Arn
                  CloudWatchLogsRoleArn: !GetAtt CloudTrailRole.Arn
            ```
    refs:
      - url: https://docs.aws.amazon.com/awscloudtrail/latest/userguide/send-cloudtrail-events-to-cloudwatch-logs.html
        title: AWS Documentation - Sending events to CloudWatch Logs
  - uid: mondoo-aws-security-cloudtrail-cloudwatch-integration-aws
    filters: asset.platform == "aws-cloudtrail-trail" && aws.cloudtrail.trail.isMultiRegionTrail == true
    mql: |
      aws.cloudtrail.trail.cloudWatchLogsLogGroupArn != "" && aws.cloudtrail.trail.cloudWatchLogsLogGroupArn != empty
  - uid: mondoo-aws-security-cloudtrail-cloudwatch-integration-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_cloudtrail")
    mql: |
