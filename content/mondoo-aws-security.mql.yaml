              SearchSecurityGroup:
                Type: AWS::EC2::SecurityGroup
                Properties:
                  GroupDescription: Elasticsearch access from app tier only
                  VpcId: !Ref VpcId
                  SecurityGroupIngress:
                    - IpProtocol: tcp
                      FromPort: 9200
                      ToPort: 9300
                      SourceSecurityGroupId: !Ref AppSecurityGroup
            ```
