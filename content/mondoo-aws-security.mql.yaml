          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-mq-general-logging-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-mq-general-logging-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-mq-general-logging-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-mq-general-logging-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon MQ brokers have general logging enabled. General logs capture broker-level events such as connections, disconnections, message delivery failures, and broker lifecycle events, providing operational visibility into broker activity.

        **Why this matters**

        - General logs are the primary source of operational and security telemetry for Amazon MQ brokers.
        - Without general logging, teams cannot detect anomalous connection patterns, authentication failures, or message processing errors.
        - Log data from Amazon MQ can be forwarded to CloudWatch Logs for centralized monitoring, alerting, and long-term retention.

        **Risk mitigation**

        - **Operational visibility:** General logs provide insight into broker health, client connectivity, and message throughput.
        - **Security monitoring:** Connection and authentication events in general logs can reveal unauthorized access attempts.
        - **Incident response:** Log data is critical for reconstructing the timeline of events during a security incident.
      audit: |
        ### Audit via Console

        1. Open the **Amazon MQ Console** and select **Brokers** in the left pane.
        2. Select each broker.
        3. Under the **Logs** section of the broker details page, verify that **General logs** shows **Enabled**.

        A passing broker shows **General logs: Enabled**. A failing broker shows **General logs: Disabled** or no general log configuration.

        ### Audit via CLI

        1. List all brokers and check the general logging configuration for each:

        ```bash
        aws mq list-brokers \
          --query "BrokerSummaries[*].BrokerId" \
          --output text | tr '\t' '\n' | while read bid; do
            aws mq describe-broker --broker-id "$bid" \
              --query "{Id:BrokerId,Engine:EngineType,General:Logs.General}"
        done
        ```

        A passing broker returns `"General": true`. A failing broker returns `"General": false` or `"General": null`.
      remediation:
        - id: console
          desc: |
            To ensure Amazon MQ brokers have general logging enabled using the AWS Console:

            1. Navigate to the **Amazon MQ Console** and select **Brokers**.
            2. Select the broker you want to configure.
            3. Choose **Edit**.
            4. Under **Logs**, enable **General logs**.
            5. Choose **Save** to apply the changes.
        - id: cli
          desc: |
            To ensure Amazon MQ brokers have general logging enabled using the AWS CLI, update an existing broker to enable general logging:

            ```bash
            aws mq update-broker \
              --broker-id <broker-id> \
              --logs '{"General": true}'
            ```

            Verify the logging configuration:

            ```bash
            aws mq describe-broker --broker-id <broker-id> \
              --query "Logs"
            ```
        - id: terraform
          desc: |
            To ensure Amazon MQ brokers have general logging enabled in Terraform, enable general logging on an Amazon MQ broker:

            ```hcl
            resource "aws_mq_broker" "example" {
              broker_name = "example-broker"
              engine_type = "ActiveMQ"

              logs {
                general = true
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure Amazon MQ brokers have general logging enabled in CloudFormation, enable general logging on an Amazon MQ broker:

            ```yaml
            Resources:
              MQBroker:
                Type: AWS::AmazonMQ::Broker
                Properties:
                  BrokerName: example-broker
                  EngineType: ActiveMQ
                  Logs:
                    General: true
            ```
    refs:
      - url: https://docs.aws.amazon.com/amazon-mq/latest/developer-guide/security-logging-monitoring.html
        title: Amazon MQ - Logging and Monitoring
  - uid: mondoo-aws-security-mq-general-logging-aws
    filters: asset.platform == "aws"
    mql: |
      aws.mq.brokers.all(generalLogsEnabled == true)
  - uid: mondoo-aws-security-mq-general-logging-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_mq_broker")
    mql: |
      terraform.resources.where(nameLabel == "aws_mq_broker").all(
      blocks.where(type == "logs") != empty &&
      blocks.where(type == "logs").all(arguments.general == true)
      )
  - uid: mondoo-aws-security-mq-general-logging-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_mq_broker")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_mq_broker").all(
      change.after.logs != empty &&
      change.after.logs.all(_['general'] == true)
      )
  - uid: mondoo-aws-security-mq-general-logging-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_mq_broker")
    mql: |
      terraform.state.resources.where(type == "aws_mq_broker").all(
      values.logs != empty &&
      values.logs.all(_['general'] == true)
      )
  - uid: mondoo-aws-security-mq-general-logging-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::AmazonMQ::Broker")
    mql: |
      cloudformation.template.resources.where(type == "AWS::AmazonMQ::Broker").all(
      properties['Logs'] != empty && properties['Logs']['General'] == true
      )
  - uid: mondoo-aws-security-mq-no-public-access
    title: Ensure Amazon MQ brokers are not publicly accessible
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-aws-security-mq-no-public-access-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-mq-no-public-access-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-mq-no-public-access-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-mq-no-public-access-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-mq-no-public-access-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon MQ brokers are not publicly accessible over the internet. Publicly accessible brokers expose their management console and messaging endpoints to the public internet, significantly increasing the attack surface for unauthorized access and denial-of-service attacks.

        **Why this matters**

        - Amazon MQ brokers deployed with public accessibility are reachable from any IP address on the internet, exposing the AMQP, MQTT, OpenWire, STOMP, and WebSocket endpoints to potential attackers.
        - Message broker credentials, even when strong, are subject to brute-force and credential-stuffing attacks when endpoints are internet-facing.
        - Publicly accessible brokers also expose the ActiveMQ web console, which has historically been a target for remote code execution exploits.

        **Risk mitigation**

        - **Network isolation:** Deploying brokers in a VPC without public accessibility ensures only authorized resources within the VPC can reach the broker endpoints.
        - **Reduced attack surface:** Eliminates exposure to internet-based scanning, brute-force, and exploitation attempts.
        - **Defense in depth:** Complements authentication controls by ensuring that network-layer access is restricted to trusted sources.
      audit: |
        ### Audit via Console

        1. Open the **Amazon MQ Console** and select **Brokers** in the left pane.
        2. Select each broker.
        3. Under **Details**, locate the **Public accessibility** field.

        A passing broker shows **Public accessibility: No**. A failing broker shows **Public accessibility: Yes**.

        ### Audit via CLI

        1. List all brokers and check whether each is publicly accessible:

        ```bash
        aws mq list-brokers \
          --query "BrokerSummaries[*].{Id:BrokerId,Name:BrokerName,State:BrokerState}" \
          --output table
        ```

        2. For each broker ID, retrieve the public accessibility setting:

        ```bash
        aws mq describe-broker --broker-id <broker-id> \
          --query "{Id:BrokerId,Name:BrokerName,PubliclyAccessible:PubliclyAccessible}"
        ```

        A passing broker returns `"PubliclyAccessible": false`. A failing broker returns `"PubliclyAccessible": true`.
      remediation:
        - id: console
          desc: |
            To ensure Amazon MQ brokers are not publicly accessible using the AWS Console, note: Public accessibility cannot be changed after a broker is created. You must create a new broker without public accessibility and migrate your workloads.

            1. Navigate to the **Amazon MQ Console** and choose **Create broker**.
            2. In the **Network & Security** section, ensure **Public accessibility** is set to **No**.
            3. Configure your VPC, subnets, and security groups to allow access only from trusted sources.
            4. Migrate clients from the public broker to the new private broker.
            5. Delete the publicly accessible broker.
        - id: cli
          desc: |
            To ensure Amazon MQ brokers are not publicly accessible using the AWS CLI, create a new broker without public accessibility:

            ```bash
            aws mq create-broker \
              --broker-name <broker-name> \
              --host-instance-type mq.m5.large \
              --deployment-mode SINGLE_INSTANCE \
              --engine-type ACTIVEMQ \
              --engine-version "5.17.6" \
              --no-publicly-accessible \
              --subnet-ids <subnet-id> \
              --users Username=admin,Password=<password>,ConsoleAccess=true
            ```

            List brokers and check public accessibility:

            ```bash
            aws mq list-brokers --query "BrokerSummaries[*].{Id:BrokerId,Name:BrokerName,Public:BrokerState}"
            ```
        - id: terraform
          desc: |
            To ensure Amazon MQ brokers are not publicly accessible in Terraform, ensure the Amazon MQ broker is not publicly accessible:

            ```hcl
            resource "aws_mq_broker" "example" {
              broker_name        = "example-broker"
              engine_type        = "ActiveMQ"
              publicly_accessible = false
              subnet_ids          = [aws_subnet.private.id]
            }
            ```
        - id: cloudformation
          desc: |
            To ensure Amazon MQ brokers are not publicly accessible in CloudFormation, ensure the Amazon MQ broker is not publicly accessible:

            ```yaml
            Resources:
              MQBroker:
                Type: AWS::AmazonMQ::Broker
                Properties:
                  BrokerName: example-broker
                  EngineType: ActiveMQ
                  PubliclyAccessible: false
                  SubnetIds:
                    - !Ref PrivateSubnet
            ```
    refs:
      - url: https://docs.aws.amazon.com/amazon-mq/latest/developer-guide/accessing-web-console-of-a-broker.html
        title: Amazon MQ - Accessing the Web Console
      - url: https://docs.aws.amazon.com/amazon-mq/latest/developer-guide/security-api-authentication-authorization.html
        title: Amazon MQ - API Authentication and Authorization
  - uid: mondoo-aws-security-mq-no-public-access-aws
    filters: asset.platform == "aws"
    mql: |
      aws.mq.brokers.all(publiclyAccessible == false)
  - uid: mondoo-aws-security-mq-no-public-access-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_mq_broker")
    mql: |
      terraform.resources.where(nameLabel == "aws_mq_broker").all(
      arguments.publicly_accessible != true
      )
  - uid: mondoo-aws-security-mq-no-public-access-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_mq_broker")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_mq_broker").all(
      change.after.publicly_accessible != true
      )
  - uid: mondoo-aws-security-mq-no-public-access-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_mq_broker")
    mql: |
      terraform.state.resources.where(type == "aws_mq_broker").all(
      values.publicly_accessible != true
      )
  - uid: mondoo-aws-security-mq-no-public-access-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::AmazonMQ::Broker")
    mql: |
      cloudformation.template.resources.where(type == "AWS::AmazonMQ::Broker").all(
      properties['PubliclyAccessible'] != true
      )
  - uid: mondoo-aws-security-msk-encryption-at-rest
    title: Ensure MSK clusters use a customer-managed KMS key
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-11
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-aws-security-msk-encryption-at-rest-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-msk-encryption-at-rest-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-msk-encryption-at-rest-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-msk-encryption-at-rest-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-msk-encryption-at-rest-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon MSK (Managed Streaming for Apache Kafka) clusters are configured to use a customer-managed AWS KMS key for encryption of data at rest. By default, MSK encrypts data at rest using an AWS-managed key, but using a customer-managed key (CMK) provides greater control over key lifecycle and access policies.

        **Why this matters**

        - Without a customer-managed KMS key, organizations cannot enforce fine-grained access controls over who can decrypt broker storage, nor can they audit key usage through CloudTrail.
        - A customer-managed CMK enables key rotation policies, cross-account sharing controls, and the ability to revoke access by disabling or deleting the key.
        - Many compliance standards, including PCI DSS, HIPAA, and SOC 2, require demonstrable control over encryption keys used to protect sensitive data at rest.

        **Risk mitigation**

        - **Key control:** Customer-managed keys give organizations full lifecycle control, including rotation and revocation.
        - **Audit trail:** All KMS key usage is logged to CloudTrail, providing a complete record of data access events.
        - **Compliance:** Satisfies encryption key management requirements in multiple regulatory frameworks.
      audit: |
        ### Audit via Console

        1. Open the **Amazon MSK Console** and select **Clusters** in the left pane.
        2. Select each cluster.
        3. On the **Properties** tab, expand **Security** and locate **Encryption at rest**.
        4. Verify that a customer-managed **KMS key** ARN (not the AWS-managed default) is listed.

        A passing cluster shows a customer-managed KMS key ARN under **Encryption at rest**. A failing cluster shows `AWS managed key` or no key configured.

        ### Audit via CLI

        1. List all MSK clusters and check the encryption at rest configuration:

        ```bash
        aws kafka list-clusters \
          --query "ClusterInfoList[*].ClusterArn" \
          --output text | tr '\t' '\n' | while read arn; do
            aws kafka describe-cluster --cluster-arn "$arn" \
              --query "{Name:ClusterInfo.ClusterName,KMSKeyId:ClusterInfo.EncryptionInfo.EncryptionAtRest.DataVolumeKMSKeyId}"
        done
        ```

        A passing cluster returns a non-empty `KMSKeyId` value containing a customer-managed key ARN. A failing cluster returns an empty or null `KMSKeyId`.
      remediation:
        - id: console
          desc: |
            To ensure MSK clusters use a customer-managed KMS key using the AWS Console, note: Encryption at rest settings cannot be changed after an MSK cluster is created. A new cluster must be created with the desired KMS key.

            1. Navigate to the **Amazon MSK Console** and choose **Create cluster**.
            2. Under **Security**, in the **Encryption at rest** section, select **Use a custom KMS key**.
            3. Select an existing KMS key or create a new one.
            4. Complete the cluster configuration and create the cluster.
            5. Migrate producers and consumers to the new cluster and decommission the old one.
        - id: cli
          desc: |
            To ensure MSK clusters use a customer-managed KMS key using the AWS CLI, create an MSK cluster with a customer-managed KMS key:

            ```bash
            aws kafka create-cluster \
              --cluster-name <cluster-name> \
              --broker-node-group-info file://broker-node-group.json \
              --kafka-version "3.5.1" \
              --number-of-broker-nodes 3 \
              --encryption-info EncryptionAtRest={DataVolumeKMSKeyId=arn:aws:kms:<region>:<account-id>:key/<key-id>}
            ```

            Verify the encryption configuration of an existing cluster:

            ```bash
            aws kafka describe-cluster --cluster-arn <cluster-arn> \
              --query "ClusterInfo.EncryptionInfo.EncryptionAtRest"
            ```
        - id: terraform
          desc: |
            To ensure MSK clusters use a customer-managed KMS key in Terraform, configure a customer-managed KMS key for MSK encryption at rest:

            ```hcl
            resource "aws_msk_cluster" "example" {
              cluster_name           = "example-cluster"
              kafka_version          = "3.5.1"
              number_of_broker_nodes = 3

              encryption_info {
                encryption_at_rest_kms_key_arn = aws_kms_key.msk.arn
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure MSK clusters use a customer-managed KMS key in CloudFormation, configure a customer-managed KMS key for MSK encryption at rest:

            ```yaml
            Resources:
              MSKCluster:
                Type: AWS::MSK::Cluster
                Properties:
                  ClusterName: example-cluster
                  KafkaVersion: "3.5.1"
                  NumberOfBrokerNodes: 3
                  EncryptionInfo:
                    EncryptionAtRest:
                      DataVolumeKMSKeyId: !Ref MSKKmsKey
            ```
    refs:
      - url: https://docs.aws.amazon.com/msk/latest/developerguide/msk-encryption.html
        title: Amazon MSK - Encryption at Rest
  - uid: mondoo-aws-security-msk-encryption-at-rest-aws
    filters: asset.platform == "aws"
    mql: |
      aws.msk.clusters.all(kmsKey != empty)
  - uid: mondoo-aws-security-msk-encryption-at-rest-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_msk_cluster")
    mql: |
      terraform.resources.where(nameLabel == "aws_msk_cluster").all(
      blocks.where(type == "encryption_info") != empty &&
      blocks.where(type == "encryption_info").all(blocks.where(type == "encryption_at_rest_config") != empty && blocks.where(type == "encryption_at_rest_config").all(arguments.kms_key_arn != empty))
      )
  - uid: mondoo-aws-security-msk-encryption-at-rest-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_msk_cluster")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_msk_cluster").all(
      change.after.encryption_info != empty &&
      change.after.encryption_info.all(_['encryption_at_rest_kms_key_arn'] != empty)
      )
  - uid: mondoo-aws-security-msk-encryption-at-rest-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_msk_cluster")
    mql: |
      terraform.state.resources.where(type == "aws_msk_cluster").all(
      values.encryption_info != empty &&
      values.encryption_info.all(_['encryption_at_rest_kms_key_arn'] != empty)
      )
  - uid: mondoo-aws-security-msk-encryption-at-rest-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::MSK::Cluster")
    mql: |
      cloudformation.template.resources.where(type == "AWS::MSK::Cluster").all(
      properties['EncryptionInfo'] != empty && properties['EncryptionInfo']['EncryptionAtRest'] != empty && properties['EncryptionInfo']['EncryptionAtRest']['DataVolumeKMSKeyId'] != empty
      )
  - uid: mondoo-aws-security-msk-encryption-in-transit
    title: Ensure MSK clusters encrypt data in transit with TLS
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    variants:
      - uid: mondoo-aws-security-msk-encryption-in-transit-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-msk-encryption-in-transit-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-msk-encryption-in-transit-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-msk-encryption-in-transit-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-msk-encryption-in-transit-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon MSK clusters are configured to require TLS encryption for all client-to-broker communication. MSK supports three modes for client-broker encryption in transit: TLS only, plaintext only, or TLS preferred (allows both). Only the TLS-only setting prevents unencrypted data from traversing the network.

        **Why this matters**

        - Kafka clients communicating over plaintext connections transmit message payloads, consumer group metadata, and topic data in the clear, making them vulnerable to network-level interception.
        - The "TLS preferred" setting allows clients to fall back to plaintext, which can silently result in unencrypted communication if clients are misconfigured.
        - Enforcing TLS-only ensures that all data in transit between producers, consumers, and brokers is encrypted, regardless of client configuration.

        **Risk mitigation**

        - **Confidentiality:** TLS encryption prevents eavesdropping on Kafka message streams in transit across the network.
        - **Integrity:** TLS protects against tampering with messages as they travel between clients and brokers.
        - **Compliance:** Satisfies in-transit encryption requirements under PCI DSS, HIPAA, NIST SP 800-53 SC-8, and SOC 2.
      audit: |
        ### Audit via Console

        1. Open the **Amazon MSK Console** and select **Clusters** in the left pane.
        2. Select each cluster.
        3. On the **Properties** tab, expand **Security** and locate **Encryption in transit**.
        4. Verify that **Client-broker encryption** is set to **TLS**.

        A passing cluster shows **Client-broker encryption: TLS**. A failing cluster shows **TLS preferred** or **Plaintext**.

        ### Audit via CLI

        1. List all MSK clusters and check the client-broker encryption in transit setting:

        ```bash
        aws kafka list-clusters \
          --query "ClusterInfoList[*].ClusterArn" \
          --output text | tr '\t' '\n' | while read arn; do
            aws kafka describe-cluster --cluster-arn "$arn" \
              --query "{Name:ClusterInfo.ClusterName,ClientBroker:ClusterInfo.EncryptionInfo.EncryptionInTransit.ClientBroker}"
        done
        ```

        A passing cluster returns `"ClientBroker": "TLS"`. A failing cluster returns `"ClientBroker": "TLS_PLAINTEXT"` or `"ClientBroker": "PLAINTEXT"`.
      remediation:
        - id: console
          desc: |
            To ensure MSK clusters encrypt data in transit with TLS using the AWS Console, note: Encryption in transit settings cannot be changed after cluster creation. A new cluster must be created with the desired setting.

            1. Navigate to the **Amazon MSK Console** and choose **Create cluster**.
            2. Under **Security**, in the **Encryption in transit** section, set **Client-broker encryption** to **TLS**.
            3. Complete the cluster configuration and create the cluster.
            4. Update Kafka client configurations to use TLS and point to the new cluster endpoints.
            5. Decommission the old cluster once migration is complete.
        - id: cli
          desc: |
            To ensure MSK clusters encrypt data in transit with TLS using the AWS CLI, create an MSK cluster with TLS-only client-broker encryption:

            ```bash
            aws kafka create-cluster \
              --cluster-name <cluster-name> \
              --broker-node-group-info file://broker-node-group.json \
              --kafka-version "3.5.1" \
              --number-of-broker-nodes 3 \
              --encryption-info EncryptionInTransit={ClientBroker=TLS,InCluster=true}
            ```

            Verify the encryption in transit settings:

            ```bash
            aws kafka describe-cluster --cluster-arn <cluster-arn> \
              --query "ClusterInfo.EncryptionInfo.EncryptionInTransit"
            ```
        - id: terraform
          desc: |
            To ensure MSK clusters encrypt data in transit with TLS in Terraform, enforce TLS encryption for client-broker communication in MSK:

            ```hcl
            resource "aws_msk_cluster" "example" {
              cluster_name           = "example-cluster"
              kafka_version          = "3.5.1"
              number_of_broker_nodes = 3

              encryption_info {
                encryption_in_transit {
                  client_broker = "TLS"
                  in_cluster    = true
                }
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure MSK clusters encrypt data in transit with TLS in CloudFormation, enforce TLS encryption for client-broker communication in MSK:

            ```yaml
            Resources:
              MSKCluster:
                Type: AWS::MSK::Cluster
                Properties:
                  ClusterName: example-cluster
                  KafkaVersion: "3.5.1"
                  NumberOfBrokerNodes: 3
                  EncryptionInfo:
                    EncryptionInTransit:
                      ClientBroker: TLS
                      InCluster: true
            ```
    refs:
      - url: https://docs.aws.amazon.com/msk/latest/developerguide/msk-encryption.html
        title: Amazon MSK - Encryption in Transit
  - uid: mondoo-aws-security-msk-encryption-in-transit-aws
    filters: asset.platform == "aws"
    mql: |
      aws.msk.clusters.all(encryptionInTransitClientBroker == "TLS")
  - uid: mondoo-aws-security-msk-encryption-in-transit-terraform-hcl
