  - uid: mondoo-aws-security-cloudwatch-route-table-change-alarm
    title: Ensure log metric filter exists for route table changes
    impact: 30
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/soc2-2017: soc2-control-cc7-2-1
    variants:
      - uid: mondoo-aws-security-cloudwatch-route-table-change-alarm-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/icon: aws
    docs:
      desc: |
        This check ensures that a CloudWatch metric filter and alarm exist to detect changes to VPC route tables. Route tables control the routing of traffic within and between VPCs, and unauthorized modifications could redirect traffic to malicious destinations or disrupt network connectivity.

        Route table changes can be used in attacks to intercept or redirect network traffic, enabling man-in-the-middle attacks or data exfiltration. Monitoring route table changes provides visibility into potential traffic redirection attempts in your AWS network infrastructure.

        CIS AWS Foundations Benchmark recommends monitoring route table changes to maintain the integrity of network routing and detect unauthorized attempts to redirect or intercept network traffic within your VPCs.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            1. Navigate to **CloudWatch** and select **Log groups**.
            2. Select the log group associated with your CloudTrail trail.
            3. Choose **Actions** > **Create metric filter**.
            4. Enter a filter pattern matching `CreateRoute`, `CreateRouteTable`, `ReplaceRoute`, `ReplaceRouteTableAssociation`, `DeleteRouteTable`, `DeleteRoute`, and `DisassociateRouteTable`.
            5. Assign a metric name and namespace, then choose **Create metric filter**.
            6. Navigate to **Alarms** > **Create alarm**, select the new metric, and configure SNS notification.
        - id: cli
          desc: |
            **Using AWS CLI**

            Create the metric filter:

            ```bash
            aws logs put-metric-filter \
              --log-group-name <cloudtrail-log-group> \
              --filter-name RouteTableChanges \
              --filter-pattern '{ ($.eventName = CreateRoute) || ($.eventName = CreateRouteTable) || ($.eventName = ReplaceRoute) || ($.eventName = ReplaceRouteTableAssociation) || ($.eventName = DeleteRouteTable) || ($.eventName = DeleteRoute) || ($.eventName = DisassociateRouteTable) }' \
              --metric-transformations metricName=RouteTableChanges,metricNamespace=CISBenchmark,metricValue=1
            ```

            Create the alarm:

            ```bash
            aws cloudwatch put-metric-alarm \
              --alarm-name RouteTableChanges \
              --metric-name RouteTableChanges \
              --namespace CISBenchmark \
              --statistic Sum \
              --period 300 \
              --threshold 1 \
              --comparison-operator GreaterThanOrEqualToThreshold \
              --evaluation-periods 1 \
              --alarm-actions <sns-topic-arn>
            ```
    refs:
      - url: https://docs.aws.amazon.com/AmazonCloudWatch/latest/monitoring/CloudWatch_Alarms.html
        title: Amazon CloudWatch Alarms
