  - uid: mondoo-aws-security-ec2-launch-template-no-secrets
    title: Ensure EC2 launch templates do not contain secrets
    impact: 90
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-aws-security-ec2-launch-template-no-secrets-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-ec2-launch-template-no-secrets-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ec2-launch-template-no-secrets-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ec2-launch-template-no-secrets-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that EC2 launch template user data does not contain hard-coded secrets such as AWS access keys, private keys, passwords, or API tokens. Launch template user data is visible to anyone with EC2 describe permissions and is stored in plaintext, making it an insecure location for sensitive credentials.

        **Why this matters**

        - **Credential exposure:** Launch template user data is accessible via the EC2 API and console to any IAM principal with `ec2:DescribeLaunchTemplateVersions` permissions.
        - **Persistence:** Unlike instance-level user data, launch templates persist indefinitely and can be used across many instances, increasing the blast radius of leaked credentials.
        - **Version history:** All versions of a launch template are retained, meaning secrets embedded in any version remain accessible.

        **Risk mitigation**

        - Use IAM instance profiles instead of embedding AWS credentials.
        - Store secrets in AWS Secrets Manager or SSM Parameter Store and retrieve them at boot time.
        - Use EC2 instance metadata service (IMDSv2) for temporary credentials.
      remediation:
        - id: console
          desc: |
            To ensure EC2 launch templates do not contain secrets using the AWS Console:

            1. Navigate to the **EC2 Console**.
            2. Select **Launch templates** in the left panel.
            3. Select the launch template to review.
            4. For each version, expand **Advanced details** and review the **User data** section.
            5. Remove any hard-coded secrets from the user data.
            6. Replace secrets with references to AWS Secrets Manager or SSM Parameter Store.
            7. Create a new version of the launch template with the updated user data.
        - id: cli
          desc: |
            To ensure EC2 launch templates do not contain secrets using the AWS CLI, check user data in launch template versions:

            ```bash
            aws ec2 describe-launch-template-versions \
              --launch-template-id <template-id> \
              --query "LaunchTemplateVersions[*].{Version:VersionNumber,UserData:LaunchTemplateData.UserData}"
            ```

            Create a new launch template version without secrets:

            ```bash
            aws ec2 create-launch-template-version \
              --launch-template-id <template-id> \
              --launch-template-data file://updated-template-data.json
            ```
        - id: terraform
          desc: |
            To ensure EC2 launch templates do not contain secrets in Terraform, do not embed secrets in the `user_data` field of `aws_launch_template`. Instead, use IAM instance profiles and retrieve secrets at boot time:

            ```hcl
            resource "aws_launch_template" "example" {
              name_prefix   = "example-"
              instance_type = "t3.micro"
              image_id      = "ami-12345678"

              iam_instance_profile {
                name = aws_iam_instance_profile.example.name
              }

              user_data = base64encode(<<-EOF
                #!/bin/bash
                SECRET=$(aws secretsmanager get-secret-value --secret-id my-secret --query SecretString --output text)
              EOF
              )
            }
            ```
        - id: cloudformation
          desc: |
            To ensure EC2 launch templates do not contain secrets in CloudFormation, do not embed secrets in the `UserData` property of `AWS::EC2::LaunchTemplate`. Instead, use IAM instance profiles and retrieve secrets at boot time from Secrets Manager or SSM Parameter Store:

            ```yaml
            Resources:
              LaunchTemplate:
                Type: AWS::EC2::LaunchTemplate
                Properties:
                  LaunchTemplateData:
                    InstanceType: t3.micro
                    ImageId: ami-12345678
                    IamInstanceProfile:
                      Name: !Ref InstanceProfile
                    UserData:
                      Fn::Base64: |
                        #!/bin/bash
                        SECRET=$(aws secretsmanager get-secret-value --secret-id my-secret --query SecretString --output text)
            ```
    refs:
      - url: https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/ec2-launch-templates.html
        title: AWS Documentation - Launch templates
      - url: https://docs.aws.amazon.com/secretsmanager/latest/userguide/intro.html
        title: AWS Documentation - What is AWS Secrets Manager
  - uid: mondoo-aws-security-ec2-launch-template-no-secrets-aws
    filters: asset.platform == "aws"
    mql: |
      aws.ec2.launchTemplates.all(
        userData != /(A3T[A-Z0-9]|AKIA|AGPA|AIDA|AROA|AIPA|ANPA|ANVA|ASIA)[A-Z0-9]{16}/ &&
        userData != /-----BEGIN (RSA |DSA |EC |OPENSSH |PGP )?PRIVATE KEY/ &&
        userData != /(?i)(aws_secret_access_key|password|secret_key|api_key|apikey|access_token|auth_token)\s*[=:]\s*['"]?[A-Za-z0-9\/+=]{8,}/
      )
  - uid: mondoo-aws-security-ec2-launch-template-no-secrets-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_launch_template")
    mql: |
      terraform.resources.where(nameLabel == "aws_launch_template").all(
        arguments.user_data == null ||
        arguments.user_data == "" ||
        arguments.user_data != /(A3T[A-Z0-9]|AKIA|AGPA|AIDA|AROA|AIPA|ANPA|ANVA|ASIA)[A-Z0-9]{16}/ &&
        arguments.user_data != /-----BEGIN (RSA |DSA |EC |OPENSSH |PGP )?PRIVATE KEY/ &&
        arguments.user_data != /(?i)(aws_secret_access_key|password|secret_key|api_key|apikey|access_token|auth_token)\s*[=:]\s*['"]?[A-Za-z0-9\/+=]{8,}/
      )
  - uid: mondoo-aws-security-ec2-launch-template-no-secrets-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_launch_template")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_launch_template").all(
        change.after["user_data"] == null ||
        change.after["user_data"] == "" ||
        change.after["user_data"] != /(A3T[A-Z0-9]|AKIA|AGPA|AIDA|AROA|AIPA|ANPA|ANVA|ASIA)[A-Z0-9]{16}/ &&
        change.after["user_data"] != /-----BEGIN (RSA |DSA |EC |OPENSSH |PGP )?PRIVATE KEY/ &&
        change.after["user_data"] != /(?i)(aws_secret_access_key|password|secret_key|api_key|apikey|access_token|auth_token)\s*[=:]\s*['"]?[A-Za-z0-9\/+=]{8,}/
      )
  - uid: mondoo-aws-security-ec2-launch-template-no-secrets-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_launch_template")
    mql: |
      terraform.state.resources.where(type == "aws_launch_template").all(
        values["user_data"] == null ||
        values["user_data"] == "" ||
        values["user_data"] != /(A3T[A-Z0-9]|AKIA|AGPA|AIDA|AROA|AIPA|ANPA|ANVA|ASIA)[A-Z0-9]{16}/ &&
        values["user_data"] != /-----BEGIN (RSA |DSA |EC |OPENSSH |PGP )?PRIVATE KEY/ &&
        values["user_data"] != /(?i)(aws_secret_access_key|password|secret_key|api_key|apikey|access_token|auth_token)\s*[=:]\s*['"]?[A-Za-z0-9\/+=]{8,}/
      )
  # No Terraform variants: `isLogging` is runtime state from `GetTrailStatus`; Terraform's `aws_cloudtrail` has `enable_logging` (default `true`) but the runtime check verifies the actual logging service is running, not the declared default.
  - uid: mondoo-aws-security-cloudtrail-is-logging
    title: Ensure CloudTrail trails are actively logging
    impact: 90
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    variants:
      - uid: mondoo-aws-security-cloudtrail-is-logging-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
    docs:
      desc: |
        This check ensures that all multi-region AWS CloudTrail trails have logging actively enabled. The check scopes to multi-region trails because these provide the broadest visibility across all AWS regions, making them the most critical trails to keep active. A trail that exists but has logging stopped provides no visibility into API activity, creating a dangerous blind spot in your security monitoring.

        **Why this matters**

        - **Attacker evasion:** One of the first actions an attacker takes after gaining access is to disable CloudTrail logging to hide their tracks.
        - **Compliance gaps:** Many compliance frameworks (PCI DSS, HIPAA, SOC 2) require continuous logging of API activity.
        - **Incident response:** Without active logging, forensic investigation of security incidents becomes impossible for the period logging was disabled.

        **Risk mitigation**

        - Enable logging on all multi-region CloudTrail trails.
        - Set up CloudWatch alarms to detect when logging is stopped.
        - Use AWS Organizations SCPs to prevent disabling of CloudTrail logging.
      remediation:
        - id: console
          desc: |
            To ensure CloudTrail trails are actively logging using the AWS Console:

            1. Navigate to the **CloudTrail Console**.
            2. Select **Trails** in the left panel.
            3. Review each trail and check the **Logging** status.
            4. If logging is stopped, select the trail and select **Start logging**.
            5. Verify that multi-region logging is enabled.
        - id: cli
          desc: |
            To ensure CloudTrail trails are actively logging using the AWS CLI, check the logging status of a trail:

            ```bash
            aws cloudtrail get-trail-status \
              --name <trail-name>
            ```

            Start logging on a trail:

            ```bash
            aws cloudtrail start-logging \
              --name <trail-name>
            ```
        - id: terraform
          desc: |
            To ensure CloudTrail trails are actively logging in Terraform, cloudTrail active logging status is a runtime property that cannot be directly verified in Terraform. However, ensure your trails are configured with `enable_logging` set to `true`:

            ```hcl
            resource "aws_cloudtrail" "example" {
              name                          = "example-trail"
              s3_bucket_name                = aws_s3_bucket.cloudtrail.id
              is_multi_region_trail         = true
              enable_logging                = true
              include_global_service_events = true
            }
            ```
        - id: cloudformation
          desc: |
            To ensure CloudTrail trails are actively logging in CloudFormation, ensure your CloudTrail trails are configured with logging enabled:

            ```yaml
            Resources:
              MyTrail:
                Type: AWS::CloudTrail::Trail
                Properties:
                  TrailName: example-trail
                  S3BucketName: !Ref CloudTrailBucket
                  IsMultiRegionTrail: true
                  IsLogging: true
                  IncludeGlobalServiceEvents: true
            ```
    refs:
      - url: https://docs.aws.amazon.com/awscloudtrail/latest/userguide/cloudtrail-turning-off-logging.html
        title: AWS Documentation - Turning off logging for a trail
      - url: https://docs.aws.amazon.com/awscloudtrail/latest/userguide/cloudtrail-create-and-update-a-trail.html
        title: AWS Documentation - Creating and updating a trail
  - uid: mondoo-aws-security-cloudtrail-is-logging-aws
    filters: asset.platform == "aws"
    mql: |
      aws.cloudtrail.trails.where(isMultiRegionTrail == true).all(isLogging == true)
  - uid: mondoo-aws-security-ec2-snapshot-not-public
    title: Ensure EBS snapshots are not publicly shared
    impact: 90
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-1-1
    variants:
      - uid: mondoo-aws-security-ec2-snapshot-not-public-aws
        tags:
          mondoo.com/filter-title: AWS EBS Snapshot
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-ec2-snapshot-not-public-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ec2-snapshot-not-public-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ec2-snapshot-not-public-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that EBS snapshots are not publicly shared. Public snapshots expose volume data to any AWS account, potentially leaking sensitive information such as application data, credentials, or encryption keys stored on the volume.

        **Why this matters**

        - **Data exposure:** Any AWS account can copy and mount a public snapshot, gaining full access to all data on the volume.
        - **Credential leakage:** Volumes often contain application configurations with database passwords, API keys, or certificates.
        - **Compliance violations:** Public snapshots violate data protection requirements in most compliance frameworks.

        **Risk mitigation**

        - Remove public sharing from all EBS snapshots.
        - Use AWS Config rules to detect publicly shared snapshots.
        - Share snapshots only with specific, trusted AWS accounts when necessary.
      remediation:
        - id: console
          desc: |
            To ensure EBS snapshots are not publicly shared using the AWS Console:

            1. Navigate to the **EC2 Console**.
            2. Select **Snapshots** under **Elastic Block Store** in the left panel.
            3. Select the snapshot to review.
            4. Choose **Actions** > **Modify permissions**.
            5. Change the permission from **Public** to **Private**.
            6. Select **Save**.
        - id: cli
          desc: |
            To ensure EBS snapshots are not publicly shared using the AWS CLI, check if a snapshot is public:

            ```bash
            aws ec2 describe-snapshot-attribute \
              --snapshot-id <snapshot-id> \
              --attribute createVolumePermission
            ```

            Remove public access from a snapshot:

            ```bash
            aws ec2 modify-snapshot-attribute \
              --snapshot-id <snapshot-id> \
              --attribute createVolumePermission \
              --operation-type remove \
              --group-names all
            ```
        - id: terraform
          desc: |
            To ensure EBS snapshots are not publicly shared in Terraform, EBS snapshot public sharing is a runtime state that cannot be directly verified in Terraform. However, use `aws_ebs_snapshot_create_volume_permission` carefully and avoid granting public access. Consider using an AWS Config rule to detect public snapshots:

            ```hcl
            resource "aws_config_config_rule" "ebs_snapshot_public" {
              name = "ebs-snapshot-public-restorable-check"

              source {
                owner             = "AWS"
                source_identifier = "EBS_SNAPSHOT_PUBLIC_RESTORABLE_CHECK"
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure EBS snapshots are not publicly shared in CloudFormation, EBS snapshot public sharing is a runtime state. Use an AWS Config rule to detect public snapshots:

            ```yaml
            Resources:
              EBSSnapshotPublicCheck:
                Type: AWS::Config::ConfigRule
                Properties:
                  ConfigRuleName: ebs-snapshot-public-restorable-check
                  Source:
                    Owner: AWS
                    SourceIdentifier: EBS_SNAPSHOT_PUBLIC_RESTORABLE_CHECK
            ```
    refs:
      - url: https://docs.aws.amazon.com/ebs/latest/userguide/ebs-modifying-snapshot-permissions.html
        title: AWS Documentation - Share an Amazon EBS snapshot
      - url: https://docs.aws.amazon.com/ebs/latest/userguide/ebs-snapshots.html
        title: AWS Documentation - Amazon EBS snapshots
  - uid: mondoo-aws-security-ec2-snapshot-not-public-aws
    filters: asset.platform == "aws-ebs-snapshot"
    mql: |
      aws.ec2.snapshot.isPublic == false
  - uid: mondoo-aws-security-ec2-snapshot-not-public-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_snapshot_create_volume_permission")
    mql: |
      terraform.resources.where(nameLabel == "aws_snapshot_create_volume_permission").all(
        arguments.account_id != "all"
      )
  - uid: mondoo-aws-security-ec2-snapshot-not-public-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_snapshot_create_volume_permission")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_snapshot_create_volume_permission").all(
        change.after["account_id"] != "all"
      )
  - uid: mondoo-aws-security-ec2-snapshot-not-public-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_snapshot_create_volume_permission")
    mql: |
      terraform.state.resources.where(type == "aws_snapshot_create_volume_permission").all(
        values["account_id"] != "all"
      )
  - uid: mondoo-aws-security-ec2-launch-config-encrypted-volumes
    title: Ensure launch configuration EBS volumes are encrypted
    impact: 80
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-aws-security-ec2-launch-config-encrypted-volumes-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-ec2-launch-config-encrypted-volumes-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ec2-launch-config-encrypted-volumes-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ec2-launch-config-encrypted-volumes-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ec2-launch-config-encrypted-volumes-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that all EBS volumes defined in EC2 launch configurations are encrypted. Launch configurations are a legacy Auto Scaling mechanism, but many environments still use them. Unencrypted EBS volumes in launch configurations mean every instance launched by the associated Auto Scaling group will have unencrypted root or data volumes.

        **Why this matters**

        - **Data exposure:** Unencrypted EBS volumes can be read by anyone with physical access to the underlying storage hardware or by copying the volume/snapshot to another account.
        - **Compliance:** PCI DSS, HIPAA, SOC 2, and CIS AWS Foundations Benchmark all require encryption of data at rest.
        - **Blast radius:** Because launch configurations are used by Auto Scaling groups, a single misconfiguration propagates to every instance the group launches.
      remediation:
        - id: console
          desc: |
            To ensure launch configuration EBS volumes are encrypted using the AWS Console, AWS has deprecated the launch configuration console UI. It is recommended to migrate to launch templates instead:

            1. Navigate to the **EC2 Console** > **Launch Templates**.
            2. Select **Create launch template**.
            3. Configure the template to match your existing launch configuration settings.
            4. Under **Storage (Volumes)**, ensure every volume has **Encrypted** enabled.
            5. Save the launch template.
            6. Navigate to **Auto Scaling Groups**, select the group, select **Edit**, and update it to use the new launch template.
            7. Delete the old launch configuration.
        - id: cli
          desc: |
            To ensure launch configuration EBS volumes are encrypted using the AWS CLI, list launch configurations and check encryption:

            ```bash
            aws autoscaling describe-launch-configurations \
              --query "LaunchConfigurations[*].{Name:LaunchConfigurationName,BlockDevices:BlockDeviceMappings[*].Ebs.Encrypted}"
            ```

            Create a new launch configuration with encrypted volumes (launch configurations are immutable):

            ```bash
            aws autoscaling create-launch-configuration \
              --launch-configuration-name my-lc-encrypted \
              --image-id ami-12345678 \
              --instance-type t3.micro \
              --block-device-mappings '[{"DeviceName":"/dev/xvda","Ebs":{"Encrypted":true,"VolumeSize":20,"VolumeType":"gp3"}}]'
            ```
        - id: terraform
          desc: |
            To ensure launch configuration EBS volumes are encrypted in Terraform:

            ```hcl
            resource "aws_launch_configuration" "example" {
              image_id      = "ami-12345678"
              instance_type = "t3.micro"

              ebs_block_device {
                device_name = "/dev/xvda"
                encrypted   = true
                volume_size = 20
                volume_type = "gp3"
              }

              root_block_device {
                encrypted   = true
                volume_size = 20
                volume_type = "gp3"
              }
            }
            ```

            Note: Consider migrating to `aws_launch_template` which is the modern replacement.
        - id: cloudformation
          desc: |
            To ensure launch configuration EBS volumes are encrypted in CloudFormation:

            ```yaml
            Resources:
              MyLaunchConfig:
                Type: AWS::AutoScaling::LaunchConfiguration
                Properties:
                  ImageId: ami-12345678
                  InstanceType: t3.micro
                  BlockDeviceMappings:
                    - DeviceName: /dev/xvda
                      Ebs:
                        Encrypted: true
                        VolumeSize: 20
                        VolumeType: gp3
            ```

            Note: Consider migrating to `AWS::EC2::LaunchTemplate` which is the modern replacement.
