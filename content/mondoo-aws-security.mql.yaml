    filters: asset.platform == "aws-rds-snapshot"
    mql: |
      aws.rds.snapshot.kmsKey { metadata["KeyManager"] == "CUSTOMER" }
  - uid: mondoo-aws-security-emr-not-publicly-accessible
    title: Ensure EMR clusters are not publicly accessible
    impact: 90
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-6
    variants:
      - uid: mondoo-aws-security-emr-not-publicly-accessible-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-emr-not-publicly-accessible-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-emr-not-publicly-accessible-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-emr-not-publicly-accessible-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-emr-not-publicly-accessible-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check verifies that EMR cluster master nodes do not have a public DNS name assigned. A master node with a public DNS name is directly reachable from the internet, exposing sensitive data processing infrastructure and creating a significant attack surface.

        **Why this matters**

        - **Data exposure:** EMR clusters process potentially sensitive data and a public master node allows direct network access to these workloads.
        - **Service exploitation:** Publicly accessible Hadoop, Spark, and other EMR services may have known vulnerabilities that attackers can exploit.
        - **Lateral movement:** A compromised EMR master node provides access to the cluster's IAM role and connected data stores such as S3 and DynamoDB.

        **Risk mitigation**

        - Launch EMR clusters in private subnets.
        - Use VPN or AWS Systems Manager Session Manager for administrative access.
        - Configure security groups to restrict access to known IP ranges.
      remediation:
        - id: console
          desc: |
            To ensure EMR clusters are not publicly accessible using the AWS Console:

            1. Navigate to the **EMR Console**.
            2. Select the cluster to review.
            3. Under **Summary**, check the **Master public DNS** field.
            4. If a public DNS name is present, the master node is publicly accessible.
            5. Terminate the cluster and recreate it in a private subnet with no public IP assignment.
        - id: cli
          desc: |
            To ensure EMR clusters are not publicly accessible using the AWS CLI, check if an EMR cluster has a public master node:

            ```bash
            aws emr describe-cluster \
              --cluster-id <cluster-id> \
              --query "Cluster.MasterPublicDnsName"
            ```

            Create a new cluster in a private subnet:

            ```bash
            aws emr run-job-flow \
              --instances '{"Ec2SubnetId":"<private-subnet-id>","KeepJobFlowAliveWhenNoSteps":true,"InstanceGroups":[{"InstanceRole":"MASTER","InstanceCount":1,"InstanceType":"m5.xlarge"}]}' \
              --release-label emr-6.15.0 \
              --name "private-cluster"
            ```
        - id: terraform
          desc: |
            To ensure EMR clusters are not publicly accessible in Terraform:

            ```hcl
            resource "aws_emr_cluster" "example" {
              name          = "example"
              release_label = "emr-6.15.0"

              ec2_attributes {
                subnet_id = aws_subnet.private.id
              }

              # ... other configuration ...
            }
            ```

            Launch EMR clusters in a private subnet to prevent public accessibility.
        - id: cloudformation
          desc: |
            To ensure EMR clusters are not publicly accessible in CloudFormation, launch EMR clusters in a private subnet to prevent public accessibility:

            ```yaml
            Resources:
              MyEMRCluster:
                Type: AWS::EMR::Cluster
                Properties:
                  Name: example
                  ReleaseLabel: emr-6.15.0
                  Instances:
                    Ec2SubnetId: !Ref PrivateSubnet
                    MasterInstanceGroup:
                      InstanceCount: 1
                      InstanceType: m5.xlarge
                  JobFlowRole: !Ref EMRInstanceProfile
                  ServiceRole: !Ref EMRServiceRole
            ```
    refs:
      - url: https://docs.aws.amazon.com/emr/latest/ManagementGuide/emr-clusters-in-a-vpc.html
        title: AWS Documentation - Amazon EMR clusters in a VPC
      - url: https://docs.aws.amazon.com/emr/latest/ManagementGuide/emr-security.html
        title: AWS Documentation - Security in Amazon EMR
  - uid: mondoo-aws-security-emr-not-publicly-accessible-aws
    filters: asset.platform == "aws-emr-cluster"
    mql: |
      aws.emr.cluster.masterPublicDnsName == "" || aws.emr.cluster.masterPublicDnsName == empty
  - uid: mondoo-aws-security-emr-not-publicly-accessible-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_emr_cluster")
    mql: |
      terraform.resources.where(nameLabel == "aws_emr_cluster").all(
        blocks.where(type == "ec2_attributes") != empty &&
        blocks.where(type == "ec2_attributes").all(arguments['subnet_id'] != empty)
      )
  - uid: mondoo-aws-security-emr-not-publicly-accessible-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_emr_cluster")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_emr_cluster").all(
        change.after['ec2_attributes'] != empty &&
        change.after['ec2_attributes'].all(_['subnet_id'] != empty)
      )
  - uid: mondoo-aws-security-emr-not-publicly-accessible-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_emr_cluster")
    mql: |
      terraform.state.resources.where(type == "aws_emr_cluster").all(
        values['ec2_attributes'] != empty &&
        values['ec2_attributes'].all(_['subnet_id'] != empty)
      )
  - uid: mondoo-aws-security-emr-not-publicly-accessible-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::EMR::Cluster")
    mql: |
      cloudformation.template.resources.where(type == "AWS::EMR::Cluster").all(
      properties['Instances'] != empty && properties['Instances']['Ec2SubnetId'] != empty
      )
  - uid: mondoo-aws-security-emr-log-cmk-encryption
    title: Ensure EMR cluster logs are encrypted with CMK
    impact: 70
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-aws-security-emr-log-cmk-encryption-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-emr-log-cmk-encryption-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-emr-log-cmk-encryption-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-emr-log-cmk-encryption-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-emr-log-cmk-encryption-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that EMR clusters with logging enabled use a customer-managed KMS key (CMK) to encrypt log data. For Terraform deployments, the check verifies that a security configuration is attached to the cluster, as the security configuration is where CMK encryption settings for logs are defined. EMR logs may contain sensitive information including query results, application output, and debugging data.

        **Why this matters**

        - **Sensitive data in logs:** EMR logs can contain query results, error messages with data samples, and application output that may include sensitive information.
        - **Key control:** CMKs provide full control over who can access the encryption key and, by extension, the log data.
        - **Compliance:** Many regulatory frameworks require encryption with customer-managed keys for data at rest.

        **Risk mitigation**

        - Configure a CMK for EMR log encryption when creating clusters.
        - Create a KMS key policy that restricts access to authorized principals.
        - Monitor KMS key usage via CloudTrail for audit purposes.
      remediation:
        - id: console
          desc: |
            To ensure EMR cluster logs are encrypted with CMK using the AWS Console:

            1. Navigate to the **EMR Console**.
            2. Select **Create cluster** or review an existing cluster.
            3. Under **Logging**, ensure logging is enabled with an S3 location.
            4. Under **Security configuration**, select or create a security configuration.
            5. Enable **S3 encryption** with a **CMK** for log encryption.
        - id: cli
          desc: |
            To ensure EMR cluster logs are encrypted with CMK using the AWS CLI, create a security configuration with CMK log encryption:

            ```bash
            aws emr create-security-configuration \
              --name "emr-log-encryption" \
              --security-configuration '{
                "EncryptionConfiguration": {
                  "EnableAtRestEncryption": true,
                  "AtRestEncryptionConfiguration": {
                    "S3EncryptionConfiguration": {
                      "EncryptionMode": "SSE-KMS",
                      "AwsKmsKey": "<cmk-key-arn>"
                    }
                  }
                }
              }'
            ```
        - id: terraform
          desc: |
            To ensure EMR cluster logs are encrypted with CMK in Terraform, configure an EMR security configuration with KMS log encryption and associate it with the cluster:

            ```hcl
            resource "aws_emr_security_configuration" "example" {
              name = "emr-log-encryption"

              configuration = jsonencode({
                EncryptionConfiguration = {
                  EnableAtRestEncryption = true
                  AtRestEncryptionConfiguration = {
                    S3EncryptionConfiguration = {
                      EncryptionMode = "SSE-KMS"
                      AwsKmsKey      = aws_kms_key.emr.arn
                    }
                  }
                }
              })
            }

            resource "aws_emr_cluster" "example" {
              name          = "example"
              release_label = "emr-6.15.0"
              log_uri       = "s3://my-emr-logs/"

              security_configuration = aws_emr_security_configuration.example.name
              # ... other configuration ...
            }
            ```
        - id: cloudformation
          desc: |
            To ensure EMR cluster logs are encrypted with CMK in CloudFormation, create an EMR security configuration with KMS log encryption:

            ```yaml
            Resources:
              MyEMRSecurityConfig:
                Type: AWS::EMR::SecurityConfiguration
                Properties:
                  Name: emr-log-encryption
                  SecurityConfiguration:
                    EncryptionConfiguration:
                      EnableAtRestEncryption: true
                      AtRestEncryptionConfiguration:
                        S3EncryptionConfiguration:
                          EncryptionMode: SSE-KMS
                          AwsKmsKey: !GetAtt EMRKmsKey.Arn

              MyEMRCluster:
                Type: AWS::EMR::Cluster
                Properties:
                  Name: example
                  ReleaseLabel: emr-6.15.0
                  LogUri: s3://my-emr-logs/
                  SecurityConfiguration: !Ref MyEMRSecurityConfig
                  Instances:
                    MasterInstanceGroup:
                      InstanceCount: 1
                      InstanceType: m5.xlarge
                  JobFlowRole: !Ref EMRInstanceProfile
                  ServiceRole: !Ref EMRServiceRole
            ```
