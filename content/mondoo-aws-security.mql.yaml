  - uid: mondoo-aws-security-ec2-launch-template-no-secrets
    title: Ensure EC2 launch templates do not contain secrets
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-5-17
      compliance/nis-2: nis-2-21-2-g
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-10
      compliance/pci-dss-4: pcidss-requirement-8-3-2
      compliance/soc2-2017: soc2-control-cc6-1-9
      compliance/vda-isa-5: vda-isa-5-4-1-3
    variants:
      - uid: mondoo-aws-security-ec2-launch-template-no-secrets-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-ec2-launch-template-no-secrets-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ec2-launch-template-no-secrets-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ec2-launch-template-no-secrets-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that EC2 launch template user data does not contain hard-coded secrets such as AWS access keys, private keys, passwords, or API tokens. Launch template user data is visible to anyone with EC2 describe permissions and is stored in plaintext, making it an insecure location for sensitive credentials.

        **Why this matters**

        - **Credential exposure:** Launch template user data is accessible via the EC2 API and console to any IAM principal with `ec2:DescribeLaunchTemplateVersions` permissions.
        - **Persistence:** Unlike instance-level user data, launch templates persist indefinitely and can be used across many instances, increasing the blast radius of leaked credentials.
        - **Version history:** All versions of a launch template are retained, meaning secrets embedded in any version remain accessible.

        **Risk mitigation**

        - Use IAM instance profiles instead of embedding AWS credentials.
        - Store secrets in AWS Secrets Manager or SSM Parameter Store and retrieve them at boot time.
        - Use EC2 instance metadata service (IMDSv2) for temporary credentials.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and open the **EC2** console.
        2. In the left navigation pane, under **Instances**, select **Launch templates**.
        3. For each launch template, select its name and review each version.
        4. Select a version, scroll to **Advanced details**, and expand the **User data** field.
        5. Inspect the decoded user data for patterns such as AWS access key prefixes (`AKIA`, `ASIA`), private key headers (`-----BEGIN RSA PRIVATE KEY-----`), or plaintext credential assignments.

        A passing launch template has no user data, or user data that contains no hard-coded secrets or credential patterns. A failing launch template contains user data with embedded AWS keys, private keys, passwords, or API tokens.

        ### Audit via CLI

        1. List all launch templates:

        ```bash
        aws ec2 describe-launch-templates \
          --query "LaunchTemplates[*].{Id:LaunchTemplateId,Name:LaunchTemplateName}"
        ```

        2. For each template, retrieve user data from all versions:

        ```bash
        aws ec2 describe-launch-template-versions \
          --launch-template-id <template-id> \
          --query "LaunchTemplateVersions[*].{Version:VersionNumber,UserData:LaunchTemplateData.UserData}"
        ```

        Decode the base64-encoded user data and scan for secret patterns. A passing launch template returns no user data, empty user data, or user data free of AWS key patterns, private key headers, and credential assignments. A failing launch template returns user data that contains recognizable secret patterns such as `AKIA`-prefixed keys or `-----BEGIN PRIVATE KEY-----` headers.
      remediation:
        - id: console
          desc: |
            To ensure EC2 launch templates do not contain secrets using the AWS Console:

            1. Navigate to the **EC2 Console**.
            2. Select **Launch templates** in the left panel.
            3. Select the launch template to review.
            4. For each version, expand **Advanced details** and review the **User data** section.
            5. Remove any hard-coded secrets from the user data.
            6. Replace secrets with references to AWS Secrets Manager or SSM Parameter Store.
            7. Create a new version of the launch template with the updated user data.
        - id: cli
          desc: |
            To ensure EC2 launch templates do not contain secrets using the AWS CLI, check user data in launch template versions:

            ```bash
            aws ec2 describe-launch-template-versions \
              --launch-template-id <template-id> \
              --query "LaunchTemplateVersions[*].{Version:VersionNumber,UserData:LaunchTemplateData.UserData}"
            ```

            Create a new launch template version without secrets:

            ```bash
            aws ec2 create-launch-template-version \
              --launch-template-id <template-id> \
              --launch-template-data file://updated-template-data.json
            ```
        - id: terraform
          desc: |
            To ensure EC2 launch templates do not contain secrets in Terraform, do not embed secrets in the `user_data` field of `aws_launch_template`. Instead, use IAM instance profiles and retrieve secrets at boot time:

            ```hcl
            resource "aws_launch_template" "example" {
              name_prefix   = "example-"
              instance_type = "t3.micro"
              image_id      = "ami-12345678"

              iam_instance_profile {
                name = aws_iam_instance_profile.example.name
              }

              user_data = base64encode(<<-EOF
                #!/bin/bash
                SECRET=$(aws secretsmanager get-secret-value --secret-id my-secret --query SecretString --output text)
              EOF
              )
            }
            ```
        - id: cloudformation
          desc: |
            To ensure EC2 launch templates do not contain secrets in CloudFormation, do not embed secrets in the `UserData` property of `AWS::EC2::LaunchTemplate`. Instead, use IAM instance profiles and retrieve secrets at boot time from Secrets Manager or SSM Parameter Store:

            ```yaml
            Resources:
              LaunchTemplate:
                Type: AWS::EC2::LaunchTemplate
                Properties:
                  LaunchTemplateData:
                    InstanceType: t3.micro
                    ImageId: ami-12345678
                    IamInstanceProfile:
                      Name: !Ref InstanceProfile
                    UserData:
                      Fn::Base64: |
                        #!/bin/bash
                        SECRET=$(aws secretsmanager get-secret-value --secret-id my-secret --query SecretString --output text)
            ```
    refs:
      - url: https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/ec2-launch-templates.html
        title: AWS Documentation - Launch templates
      - url: https://docs.aws.amazon.com/secretsmanager/latest/userguide/intro.html
        title: AWS Documentation - What is AWS Secrets Manager
  - uid: mondoo-aws-security-ec2-launch-template-no-secrets-aws
    filters: asset.platform == "aws"
    mql: |
      aws.ec2.launchTemplates.all(
        userData != /(A3T[A-Z0-9]|AKIA|AGPA|AIDA|AROA|AIPA|ANPA|ANVA|ASIA)[A-Z0-9]{16}/ &&
        userData != /-----BEGIN (RSA |DSA |EC |OPENSSH |PGP )?PRIVATE KEY/ &&
        userData != /(?i)(aws_secret_access_key|password|secret_key|api_key|apikey|access_token|auth_token)\s*[=:]\s*['"]?[A-Za-z0-9\/+=]{8,}/
      )
  - uid: mondoo-aws-security-ec2-launch-template-no-secrets-terraform-hcl
