  - uid: mondoo-aws-security-ec2-user-data-no-secrets-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::EC2::Instance")
    mql: |
      cloudformation.template.resources.where(type == "AWS::EC2::Instance" && properties['UserData'] != empty) {
      properties['UserData'] {
      _.find(/(A3T[A-Z0-9]|AKIA|AGPA|AIDA|AROA|AIPA|ANPA|ANVA|ASIA)[A-Z0-9]{16}/).all("AKIAIOSFODNN7EXAMPLE")
      }
      properties['UserData'] {
      _.find(/([A-Za-z0-9\\\/+\\]{40})/).all("wJalrXUtnFEMI/A1AAAAA/bPxRfiCYAAAAAAAKEY")
