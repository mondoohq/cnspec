      properties['OptionSettings'] != empty &&
      properties['OptionSettings'].any(_['Namespace'] == "aws:elasticbeanstalk:healthreporting:system" && _['Value'] == "enhanced")
      )
  - uid: mondoo-aws-security-rds-proxy-tls-required
    title: Ensure RDS proxies require TLS for client connections
    impact: 80
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    variants:
      - uid: mondoo-aws-security-rds-proxy-tls-required-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-rds-proxy-tls-required-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-rds-proxy-tls-required-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-rds-proxy-tls-required-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-rds-proxy-tls-required-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon RDS Proxy instances are configured to require TLS encryption for all client connections. Without TLS enforcement, database connections through the proxy may transmit credentials and query data in plaintext, exposing sensitive information to network-based attacks.

        **Why this matters**

        - RDS Proxy sits between applications and databases, handling connection pooling and failover. All database credentials pass through the proxy.
        - Without TLS enforcement, connections between applications and the proxy are unencrypted, exposing database credentials and query data.
        - Man-in-the-middle attacks can intercept unencrypted database traffic to steal credentials or exfiltrate data.
        - Enforcing TLS at the proxy level ensures all client connections are encrypted regardless of individual application configurations.

        **Risk mitigation**

        - **Data-in-transit encryption:** Ensures all connections through the proxy are encrypted with TLS.
        - **Credential protection:** Prevents database credentials from being transmitted in plaintext.
        - **Compliance:** Meets encryption-in-transit requirements for database connections.
      remediation:
        - id: console
          desc: |
            To ensure RDS proxies require TLS for client connections using the AWS Console:

            1. Navigate to the Amazon RDS Console.
            2. Select **Proxies** in the left panel.
            3. Select the proxy to update.
            4. Select **Modify**.
            5. Under **Transport Layer Security**, check **Require Transport Layer Security**.
            6. Select **Modify proxy**.
        - id: cli
          desc: |
            To ensure RDS proxies require TLS for client connections using the AWS CLI, enable TLS requirement for an RDS Proxy:

            ```bash
            aws rds modify-db-proxy \
              --db-proxy-name my-proxy \
              --require-tls
            ```

            Verify the setting:

            ```bash
            aws rds describe-db-proxies \
              --db-proxy-name my-proxy \
              --query "DBProxies[*].{Name:DBProxyName,RequireTLS:RequireTLS}"
            ```
        - id: terraform
          desc: |
            To ensure RDS proxies require TLS for client connections in Terraform:

            ```hcl
            resource "aws_db_proxy" "example" {
              name                   = "example-proxy"
              engine_family          = "MYSQL"
              role_arn               = aws_iam_role.proxy.arn
              vpc_subnet_ids         = aws_subnet.example[*].id
              require_tls            = true

              auth {
                auth_scheme = "SECRETS"
                secret_arn  = aws_secretsmanager_secret.db.arn
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure RDS proxies require TLS for client connections in CloudFormation:

            ```yaml
            Resources:
              MyDBProxy:
                Type: AWS::RDS::DBProxy
                Properties:
                  DBProxyName: example-proxy
                  EngineFamily: MYSQL
                  RoleArn: !GetAtt ProxyRole.Arn
                  VpcSubnetIds:
                    - !Ref PrivateSubnetA
                    - !Ref PrivateSubnetB
                  RequireTLS: true
                  Auth:
                    - AuthScheme: SECRETS
                      SecretArn: !Ref DBSecret
            ```
    refs:
      - url: https://docs.aws.amazon.com/AmazonRDS/latest/UserGuide/rds-proxy.html
        title: AWS Documentation - Using Amazon RDS Proxy
      - url: https://docs.aws.amazon.com/AmazonRDS/latest/UserGuide/rds-proxy-security.html
        title: AWS Documentation - Security with Amazon RDS Proxy
  - uid: mondoo-aws-security-rds-proxy-tls-required-aws
    filters: asset.platform == "aws"
    mql: aws.rds.proxies.all(requireTLS == true)
  - uid: mondoo-aws-security-rds-proxy-tls-required-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_db_proxy")
    mql: |
      terraform.resources.where(nameLabel == "aws_db_proxy").all(
        arguments.require_tls == true
      )
  - uid: mondoo-aws-security-rds-proxy-tls-required-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_db_proxy")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_db_proxy").all(
        change.after.require_tls == true
      )
  - uid: mondoo-aws-security-rds-proxy-tls-required-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_db_proxy")
    mql: |
      terraform.state.resources.where(type == "aws_db_proxy").all(
        values.require_tls == true
      )
  - uid: mondoo-aws-security-rds-proxy-tls-required-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::RDS::DBProxy")
    mql: |
      cloudformation.template.resources.where(type == "AWS::RDS::DBProxy").all(
      properties['RequireTls'] == true
      )
  - uid: mondoo-aws-security-rds-proxy-no-debug-logging
    title: Ensure RDS proxies do not have debug logging enabled
    impact: 60
    tags:
