          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-athena-workgroup-results-cmk-encrypted-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-athena-workgroup-results-cmk-encrypted-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-athena-workgroup-results-cmk-encrypted-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-athena-workgroup-results-cmk-encrypted-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that every enabled Athena workgroup encrypts query results using `SSE_KMS` or `CSE_KMS` with an explicit customer-managed KMS key reference. Athena query results are written to S3 and can contain sensitive content from underlying data sources such as CloudTrail logs, application databases, and PII; without a KMS-backed encryption configuration, audit and access-control capabilities are limited to what S3 default encryption alone can provide.

        **Why this matters**

        - **Audit trail for results:** `SSE_KMS` and `CSE_KMS` produce CloudTrail `kms:Decrypt` events for every access to query output, while `SSE_S3` provides no per-key visibility into who decrypted the results.
        - **Customer key control:** A workgroup configured with `SSE_KMS` or `CSE_KMS` but no explicit key falls back to AWS-owned keys, which sit outside the customer's key administration and cannot be rotated or revoked.
        - **Enforcement at workgroup level:** Setting `EnforceWorkGroupConfiguration` to `true` alongside a CMK prevents individual query clients from overriding the encryption setting and writing unprotected output.

        **Risk mitigation**

        - **Restrict result access:** A customer-managed KMS key policy can restrict which principals can decrypt Athena query output independently of S3 bucket policies, adding a second access control boundary.
        - **Support incident response:** Disabling or revoking the CMK immediately blocks further decryption of query results, providing a fast revocation path if query output containing sensitive data is accessed improperly.
        - **Meet regulatory requirements:** Many compliance frameworks require customer-controlled key management for data at rest, and a CMK-backed workgroup is the only Athena configuration that satisfies this requirement for query results.
      audit: |
        ### Audit via Console

        1. Open the **Amazon Athena** console and choose **Workgroups** in the left navigation pane.
        2. For each enabled workgroup, select the workgroup and choose **View details**.
        3. Under **Query result configuration**, check that **Encrypt query results** is enabled, the encryption option is **SSE-KMS** or **CSE-KMS**, and a customer-managed KMS key is selected.

        A passing workgroup shows an encryption option of `SSE-KMS` or `CSE-KMS` paired with a non-empty KMS key ARN and **Override client-side settings** enabled. A failing workgroup shows no encryption or shows `SSE-KMS`/`CSE-KMS` selected but with no KMS key specified.

        ### Audit via CLI

        1. List all Athena workgroups, then describe each to inspect the result configuration:

        ```bash
        aws athena list-work-groups \
          --query 'WorkGroups[?State==`ENABLED`].Name' \
          --output text | tr '\t' '\n' | while read wg; do
          aws athena get-work-group --work-group "$wg" \
            --query 'WorkGroup.{Name:Name,EncryptionOption:Configuration.ResultConfiguration.EncryptionConfiguration.EncryptionOption,KmsKey:Configuration.ResultConfiguration.EncryptionConfiguration.KmsKey}'
        done
        ```

        A passing workgroup returns an `EncryptionOption` of `SSE_KMS` or `CSE_KMS` and a non-empty `KmsKey`. A failing workgroup returns a `null` encryption configuration, an `SSE_S3` option, or an empty `KmsKey`.
      remediation:
        - id: console
          desc: |
            To configure Athena workgroup query-result encryption using the AWS Console:

            1. Open the **Amazon Athena Console** and select **Workgroups**.
            2. Select the workgroup and choose **Edit**.
            3. Under **Query result configuration**, enable **Encrypt query results** and choose **SSE-KMS** or **CSE-KMS**.
            4. Select a customer-managed KMS key.
            5. Enable **Override client-side settings** and save the workgroup.
        - id: cli
          desc: |
            To configure Athena workgroup query-result encryption with a CMK using the AWS CLI:

            ```bash
            aws athena update-work-group \
              --work-group <workgroup-name> \
              --configuration-updates 'EnforceWorkGroupConfiguration=true,ResultConfigurationUpdates={EncryptionConfiguration={EncryptionOption=SSE_KMS,KmsKey=arn:aws:kms:<region>:<account>:key/<key-id>}}'
            ```
        - id: terraform
          desc: |
            To configure Athena workgroup query-result encryption with a CMK in Terraform, set `result_configuration.encryption_configuration` on `aws_athena_workgroup`:

            ```hcl
            resource "aws_athena_workgroup" "example" {
              name = "example"

              configuration {
                enforce_workgroup_configuration = true

                result_configuration {
                  output_location = "s3://${aws_s3_bucket.athena.id}/query-results/"

                  encryption_configuration {
                    encryption_option = "SSE_KMS"
                    kms_key_arn       = aws_kms_key.athena.arn
                  }
                }
              }
            }
            ```
        - id: cloudformation
          desc: |
            To configure Athena workgroup query-result encryption with a CMK in CloudFormation, set `WorkGroupConfiguration.ResultConfiguration.EncryptionConfiguration` on `AWS::Athena::WorkGroup`:

            ```yaml
            Resources:
              ExampleWorkGroup:
                Type: AWS::Athena::WorkGroup
                Properties:
                  Name: example
                  WorkGroupConfiguration:
                    EnforceWorkGroupConfiguration: true
                    ResultConfiguration:
                      OutputLocation: s3://example-athena-results/
                      EncryptionConfiguration:
                        EncryptionOption: SSE_KMS
                        KmsKey: !GetAtt AthenaKey.Arn
            ```
    refs:
      - url: https://docs.aws.amazon.com/athena/latest/ug/encryption.html
        title: Encrypting Athena query results
  - uid: mondoo-aws-security-athena-workgroup-results-cmk-encrypted-aws
    filters: asset.platform == "aws"
    mql: |
      aws.athena.workgroups.where(state == "ENABLED").all(
        resultConfiguration['EncryptionConfiguration'] != null &&
        resultConfiguration['EncryptionConfiguration']['EncryptionOption'] == /^(SSE|CSE)_KMS$/ &&
        resultConfiguration['EncryptionConfiguration']['KmsKey'] != null &&
        resultConfiguration['EncryptionConfiguration']['KmsKey'] != ""
      )
  - uid: mondoo-aws-security-athena-workgroup-results-cmk-encrypted-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_athena_workgroup")
    mql: |
      terraform.resources.where(nameLabel == "aws_athena_workgroup").all(
        blocks.where(type == "configuration").all(
          blocks.where(type == "result_configuration").all(
            blocks.where(type == "encryption_configuration") != empty &&
            blocks.where(type == "encryption_configuration").all(
              arguments.encryption_option == /^(SSE|CSE)_KMS$/ &&
              arguments.kms_key_arn != null && arguments.kms_key_arn != ""
            )
          )
        )
      )
  - uid: mondoo-aws-security-athena-workgroup-results-cmk-encrypted-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_athena_workgroup")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_athena_workgroup").all(
        change.after.configuration != empty &&
        change.after.configuration.all(
          _['result_configuration'] != empty && _['result_configuration'].all(
            _['encryption_configuration'] != empty &&
            _['encryption_configuration'].all(
              _['encryption_option'] == /^(SSE|CSE)_KMS$/ &&
              _['kms_key_arn'] != null && _['kms_key_arn'] != ""
            )
          )
        )
      )
  - uid: mondoo-aws-security-athena-workgroup-results-cmk-encrypted-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_athena_workgroup")
    mql: |
      terraform.state.resources.where(type == "aws_athena_workgroup").all(
        values.configuration != empty &&
        values.configuration.all(
          _['result_configuration'] != empty && _['result_configuration'].all(
            _['encryption_configuration'] != empty &&
            _['encryption_configuration'].all(
              _['encryption_option'] == /^(SSE|CSE)_KMS$/ &&
              _['kms_key_arn'] != null && _['kms_key_arn'] != ""
            )
          )
        )
      )
  - uid: mondoo-aws-security-athena-workgroup-results-cmk-encrypted-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::Athena::WorkGroup")
    mql: |
      cloudformation.template.resources.where(type == "AWS::Athena::WorkGroup").all(
        properties['WorkGroupConfiguration'] != empty &&
        properties['WorkGroupConfiguration']['ResultConfiguration'] != empty &&
        properties['WorkGroupConfiguration']['ResultConfiguration']['EncryptionConfiguration'] != empty &&
        properties['WorkGroupConfiguration']['ResultConfiguration']['EncryptionConfiguration']['EncryptionOption'] == /^(SSE|CSE)_KMS$/ &&
        properties['WorkGroupConfiguration']['ResultConfiguration']['EncryptionConfiguration']['KmsKey'] != null &&
        properties['WorkGroupConfiguration']['ResultConfiguration']['EncryptionConfiguration']['KmsKey'] != ""
      )
  - uid: mondoo-aws-security-lambda-function-url-auth-required
    title: Ensure Lambda function URLs require authentication
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-16
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-2
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-1-2
    variants:
      - uid: mondoo-aws-security-lambda-function-url-auth-required-aws
        tags:
          mondoo.com/filter-title: AWS Lambda Function
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-lambda-function-url-auth-required-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-lambda-function-url-auth-required-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-lambda-function-url-auth-required-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-lambda-function-url-auth-required-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that AWS Lambda function URLs require IAM authentication. By default, a function URL can be created with `AuthType: NONE`, which exposes the Lambda function as an anonymous HTTPS endpoint reachable by any caller on the internet without any credentials.

        **Why this matters**

        - **Anonymous code execution:** A function URL with `AuthType: NONE` is an unauthenticated compute endpoint that any internet client can invoke, including for denial-of-service, cryptomining, or unauthorized data access.
        - **Blast radius amplification:** Lambda functions often carry IAM execution roles with permissions to access S3, DynamoDB, RDS, or other services; allowing anonymous invocation gives attackers indirect access to those resources.
        - **Audit attribution loss:** Unauthenticated invocations cannot be attributed to a specific caller identity in CloudTrail, eliminating the ability to investigate or attribute suspicious function calls.
        - **IAM enforcement:** Setting `AuthType: AWS_IAM` requires all callers to sign requests with SigV4 credentials, enabling resource-based policies and identity policies to enforce least-privilege access to the function.

        **Risk mitigation**

        - **Block unauthorized invocation:** IAM authentication prevents internet callers from invoking the function without valid credentials, eliminating the anonymous attack surface.
        - **Preserve audit trails:** Authenticated invocations produce CloudTrail records with the caller's identity, supporting incident investigation and compliance reporting.
        - **Enable fine-grained access control:** IAM authentication allows function-level resource policies to control which identities may invoke the function, which role-based conditions apply, and which actions are permitted.
      audit: |
        ### Audit via Console

        1. Open the **Lambda** console and select a function.
        2. Choose the **Configuration** tab and select **Function URL**.
        3. If a function URL exists, confirm that **Auth type** is set to `AWS_IAM`.
        4. Repeat for all functions that have a function URL configured.

        A passing function URL shows **Auth type: AWS_IAM**. A failing function URL shows **Auth type: NONE**.

        ### Audit via CLI

        1. List all Lambda functions, then retrieve the function URL configuration for each:

        ```bash
        aws lambda list-functions \
          --query 'Functions[*].FunctionName' \
          --output text | tr '\t' '\n' | while read fn; do
          aws lambda get-function-url-config --function-name "$fn" 2>/dev/null \
            --query '{FunctionName:FunctionArn,AuthType:AuthType}'
        done
        ```

        A passing function URL config returns `AuthType` of `AWS_IAM`. A failing function URL config returns `AuthType` of `NONE`.
      remediation:
        - id: console
          desc: |
            To require authentication on a Lambda function URL using the AWS Console:

            1. Open the **Lambda** console and select the function.
            2. Choose the **Configuration** tab and select **Function URL**.
            3. Select **Edit** and set **Auth type** to `AWS_IAM`.
            4. Save the changes.
        - id: cli
          desc: |
            To require IAM authentication on a Lambda function URL using the AWS CLI:

            ```bash
            aws lambda update-function-url-config \
              --function-name <function-name> \
              --auth-type AWS_IAM
            ```
        - id: terraform
          desc: |
            To require IAM authentication on a Lambda function URL in Terraform, set `authorization_type = "AWS_IAM"` on the `aws_lambda_function_url` resource:

            ```hcl
            resource "aws_lambda_function_url" "example" {
              function_name      = aws_lambda_function.example.function_name
              authorization_type = "AWS_IAM"
            }
            ```
        - id: cloudformation
          desc: |
            To require IAM authentication on a Lambda function URL in CloudFormation, set `AuthType: AWS_IAM` on the `AWS::Lambda::Url` resource:

            ```yaml
            Resources:
              ExampleFunctionUrl:
                Type: AWS::Lambda::Url
                Properties:
                  TargetFunctionArn: !GetAtt ExampleFunction.Arn
                  AuthType: AWS_IAM
            ```
    refs:
      - url: https://docs.aws.amazon.com/lambda/latest/dg/urls-auth.html
        title: Security and auth model for Lambda function URLs
  - uid: mondoo-aws-security-lambda-function-url-auth-required-aws
    filters: asset.platform == "aws-lambda-function"
    mql: |
      aws.lambda.function.urlConfig == null || aws.lambda.function.urlConfig.authType != "NONE"
  - uid: mondoo-aws-security-lambda-function-url-auth-required-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_lambda_function_url")
    mql: |
      terraform.resources.where(nameLabel == "aws_lambda_function_url").all(
        arguments.authorization_type != null && arguments.authorization_type != "NONE"
      )
  - uid: mondoo-aws-security-lambda-function-url-auth-required-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_lambda_function_url")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_lambda_function_url").all(
        change.after.authorization_type != null && change.after.authorization_type != "NONE"
      )
  - uid: mondoo-aws-security-lambda-function-url-auth-required-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_lambda_function_url")
    mql: |
      terraform.state.resources.where(type == "aws_lambda_function_url").all(
        values.authorization_type != null && values.authorization_type != "NONE"
      )
  - uid: mondoo-aws-security-lambda-function-url-auth-required-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::Lambda::Url")
    mql: |
      cloudformation.template.resources.where(type == "AWS::Lambda::Url").all(
        properties['AuthType'] != null && properties['AuthType'] != "NONE"
      )
  - uid: mondoo-aws-security-apigateway-cors-not-wildcard-with-credentials
    title: Ensure API Gateway CORS does not pair wildcard origins with credentials
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-16
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-2-1
    variants:
      - uid: mondoo-aws-security-apigateway-cors-not-wildcard-with-credentials-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-apigateway-cors-not-wildcard-with-credentials-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-apigateway-cors-not-wildcard-with-credentials-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-apigateway-cors-not-wildcard-with-credentials-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that API Gateway HTTP APIs do not configure CORS with both `Access-Control-Allow-Origin: *` and `Access-Control-Allow-Credentials: true` simultaneously. The CORS specification explicitly forbids this combination because pairing a wildcard origin with credential access would allow any website to make authenticated cross-origin requests on behalf of the user, which is the exact attack CORS is designed to prevent.

        **Why this matters**

        - **Credential theft vector:** A wildcard origin with credentials enabled signals intent to accept authenticated requests from any site, which some non-browser clients and older browser versions may honor, enabling credential replay attacks.
        - **Configuration intent violation:** Even though modern browsers block this combination, the presence of this configuration in an API signals that least-privilege origin control has not been applied.
        - **Information leakage:** A misconfigured CORS policy reveals details about the API surface and the operator's security posture that can aid attacker reconnaissance.

        **Risk mitigation**

        - **Enforce explicit allowlists:** Replacing `*` with a specific list of trusted origin hostnames ensures only authorized front-end applications can make credentialed cross-origin requests.
        - **Prevent session hijacking:** Restricting allowed origins to known domains prevents malicious websites from issuing credentialed cross-origin requests that would impersonate the authenticated user.
        - **Align with browser security model:** Removing the wildcard-credentials combination ensures the CORS policy behaves predictably across all browser implementations and security scanners.
      audit: |
        ### Audit via Console

        1. Open the **API Gateway** console and select an HTTP API.
        2. Choose **CORS** in the left navigation pane.
        3. Check whether **Access-Control-Allow-Credentials** is enabled.
        4. If credentials are enabled, verify that no `*` entry appears in the **Access-Control-Allow-Origin** list.
        5. Repeat for all HTTP APIs in the account.

        A passing API either has credentials disabled or specifies explicit origin hostnames. A failing API shows **Allow credentials** enabled alongside `*` in the allowed origins list.

        ### Audit via CLI

        1. List all API Gateway v2 APIs and inspect the CORS configuration of each:

        ```bash
        aws apigatewayv2 get-apis \
          --query 'Items[*].{ApiId:ApiId,Name:Name,CorsConfig:CorsConfiguration}' \
          --output json
        ```

        A passing API either omits `CorsConfiguration`, sets `AllowCredentials` to `false`, or lists only specific origins when `AllowCredentials` is `true`. A failing API returns `AllowCredentials: true` combined with `AllowOrigins` containing `*`.
      remediation:
        - id: console
          desc: |
            To fix the CORS configuration on an API Gateway v2 HTTP API using the AWS Console:

            1. Open the **API Gateway** console and select the HTTP API.
            2. Choose **CORS** in the left pane.
            3. If **Access-Control-Allow-Credentials** is enabled, replace any `*` entry in **Access-Control-Allow-Origin** with a specific list of allowed origins.
            4. Save the changes.
        - id: cli
          desc: |
            To update the CORS configuration on an HTTP API using the AWS CLI, set explicit origins instead of `*` whenever credentials are allowed:

            ```bash
            aws apigatewayv2 update-api \
              --api-id <api-id> \
              --cors-configuration AllowOrigins=https://app.example.com,AllowCredentials=true
            ```
        - id: terraform
          desc: |
            To configure CORS safely on an API Gateway v2 HTTP API in Terraform, set explicit origins whenever `allow_credentials` is true:

            ```hcl
            resource "aws_apigatewayv2_api" "example" {
              name          = "example"
              protocol_type = "HTTP"

              cors_configuration {
                allow_origins     = ["https://app.example.com"]
                allow_credentials = true
                allow_methods     = ["GET", "POST"]
                allow_headers     = ["authorization", "content-type"]
              }
            }
            ```
    refs:
      - url: https://developer.mozilla.org/en-US/docs/Web/HTTP/CORS/Errors/CORSNotSupportingCredentials
        title: MDN Web Docs - CORS request did not succeed
      - url: https://docs.aws.amazon.com/apigateway/latest/developerguide/http-api-cors.html
        title: Configuring CORS for an HTTP API
  - uid: mondoo-aws-security-apigateway-cors-not-wildcard-with-credentials-aws
    filters: asset.platform == "aws"
    mql: |
      aws.apigatewayv2.apis.where(corsConfiguration != null).all(
        corsConfiguration["AllowCredentials"] != true ||
        corsConfiguration["AllowOrigins"] == null ||
        corsConfiguration["AllowOrigins"].contains("*") == false
      )
  - uid: mondoo-aws-security-apigateway-cors-not-wildcard-with-credentials-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_apigatewayv2_api")
    mql: |
      terraform.resources.where(nameLabel == "aws_apigatewayv2_api").all(
        blocks.where(type == "cors_configuration").all(
          arguments.allow_credentials != true ||
          arguments.allow_origins == null ||
          arguments.allow_origins.contains("*") == false
        )
      )
  - uid: mondoo-aws-security-apigateway-cors-not-wildcard-with-credentials-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_apigatewayv2_api")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_apigatewayv2_api").all(
        change.after.cors_configuration == empty ||
        change.after.cors_configuration.all(
          _['allow_credentials'] != true ||
          _['allow_origins'] == null ||
          _['allow_origins'].contains("*") == false
        )
      )
  - uid: mondoo-aws-security-apigateway-cors-not-wildcard-with-credentials-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_apigatewayv2_api")
    mql: |
      terraform.state.resources.where(type == "aws_apigatewayv2_api").all(
        values.cors_configuration == empty ||
        values.cors_configuration.all(
          _['allow_credentials'] != true ||
          _['allow_origins'] == null ||
          _['allow_origins'].contains("*") == false
        )
      )
