    docs:
      desc: |
        This check ensures that AWS Glue security configurations have job bookmark encryption enabled. Job bookmarks track the state of ETL job runs, allowing jobs to process only new or changed data. Without encryption, bookmark data is stored in plaintext and may reveal information about data processing patterns and state.

        **Why this matters**

        - Job bookmarks contain metadata about what data has been processed, including partition keys, timestamps, and file paths.
        - Unencrypted bookmarks may expose data processing patterns and the structure of source data to unauthorized users.
        - Bookmark data could be tampered with if not encrypted, potentially causing jobs to reprocess or skip data.
        - Comprehensive encryption of all Glue components (S3, CloudWatch, bookmarks) is required for full data pipeline protection.

        **Risk mitigation**

        - **State protection:** Encrypts job processing state and metadata using client-side encryption (CSE-KMS).
        - **Tamper prevention:** Encryption helps ensure bookmark integrity and prevents unauthorized modification.
        - **Compliance:** Completes the encryption coverage across all Glue security configuration components.
