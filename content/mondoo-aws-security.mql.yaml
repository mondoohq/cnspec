  - uid: mondoo-aws-security-elasticsearch-audit-logging
    title: Ensure Elasticsearch domains have audit logging enabled
    impact: 50
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    variants:
      - uid: mondoo-aws-security-elasticsearch-audit-logging-aws
        tags:
          mondoo.com/filter-title: AWS ES Domain
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-elasticsearch-audit-logging-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-elasticsearch-audit-logging-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-elasticsearch-audit-logging-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-elasticsearch-audit-logging-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon Elasticsearch Service domains have audit logging enabled. Audit logs capture authentication attempts, access to indices, and query activity, providing visibility into who is accessing your Elasticsearch data and what operations they perform.

        **Why this matters**

        - Without audit logging, there is no record of who accessed your Elasticsearch domain, what queries were executed, or what data was modified.
        - Audit logs are essential for detecting unauthorized access attempts, investigating security incidents, and meeting compliance requirements for data access monitoring.
        - Elasticsearch domains often contain sensitive application data, making access logging critical for data governance and security monitoring.

        **Risk mitigation**

        - **Access monitoring:** Audit logs reveal who is accessing your Elasticsearch data and what operations they perform.
        - **Incident response:** Log data provides the forensic trail needed to investigate security incidents involving Elasticsearch data.
        - **Compliance:** Satisfies audit logging requirements under NIST SP 800-53 AU-6, ISO 27001 A.8.15, and SOC 2 CC7.2.
      remediation:
        - id: console
          desc: |
            To ensure Elasticsearch domains have audit logging enabled using the AWS Console:

            1. Navigate to the **Amazon Elasticsearch Service Console** and select **Domains**.
            2. Select the domain you want to configure.
            3. Choose the **Logs** tab.
            4. Under **Audit logs**, choose **Enable** and select a CloudWatch Logs log group.
            5. Choose **Save changes**.

            Note: Audit logging requires fine-grained access control to be enabled on the domain.
        - id: cli
          desc: |
            To ensure Elasticsearch domains have audit logging enabled using the AWS CLI, enable audit logging by updating the log publishing options:

            ```bash
            aws es update-elasticsearch-domain-config \
              --domain-name <domain-name> \
              --log-publishing-options "AUDIT_LOGS={CloudWatchLogsLogGroupArn=arn:aws:logs:<region>:<account-id>:log-group:<log-group-name>,Enabled=true}"
            ```

            Verify the configuration:

            ```bash
            aws es describe-elasticsearch-domain \
              --domain-name <domain-name> \
              --query "DomainStatus.LogPublishingOptions.AUDIT_LOGS"
            ```
        - id: terraform
          desc: |
            To ensure Elasticsearch domains have audit logging enabled in Terraform:

            ```hcl
            resource "aws_elasticsearch_domain" "example" {
              domain_name           = "example-domain"
              elasticsearch_version = "7.10"

              log_publishing_options {
                log_type                 = "AUDIT_LOGS"
                cloudwatch_log_group_arn = aws_cloudwatch_log_group.es_audit.arn
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure Elasticsearch domains have audit logging enabled in CloudFormation:

            ```yaml
            Resources:
              ElasticsearchDomain:
                Type: AWS::Elasticsearch::Domain
                Properties:
                  DomainName: example-domain
                  ElasticsearchVersion: "7.10"
                  LogPublishingOptions:
                    AUDIT_LOGS:
                      CloudWatchLogsLogGroupArn: !GetAtt AuditLogGroup.Arn
                      Enabled: true
            ```
    refs:
      - url: https://docs.aws.amazon.com/elasticsearch-service/latest/developerguide/audit-logs.html
        title: Amazon Elasticsearch Service - Audit Logs
      - url: https://docs.aws.amazon.com/securityhub/latest/userguide/es-controls.html
        title: AWS Security Hub - Elasticsearch controls reference
