    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_s3_bucket_acl")
    mql: |
      terraform.state.resources.where(type == "aws_s3_bucket_acl").all(
        values.acl.downcase != /public-read/
      )
  - uid: mondoo-aws-security-s3-bucket-static-website-hosting-disabled
    title: Ensure S3 bucket static website hosting is disabled
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-22
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-aws-security-s3-bucket-static-website-hosting-disabled-aws
        tags:
          mondoo.com/filter-title: AWS S3 Bucket
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-s3-bucket-static-website-hosting-disabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-s3-bucket-static-website-hosting-disabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-s3-bucket-static-website-hosting-disabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-s3-bucket-static-website-hosting-disabled-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon S3 buckets do not have static website hosting enabled. When static website hosting is configured on an S3 bucket, AWS creates an unauthenticated HTTP endpoint that serves the bucket's contents publicly, bypassing the bucket's IAM and ACL access controls for any object that is readable.

        **Why this matters**

        - **Unauthenticated HTTP exposure:** The website endpoint serves content over plain HTTP without any authentication, making the bucket's objects accessible to any internet client regardless of bucket policy settings.
        - **Expanded attack surface:** A publicly accessible S3 website endpoint can be abused for phishing pages, malware distribution, or open redirect attacks that leverage the trusted amazonaws.com domain.
        - **Unintended data disclosure:** Buckets not intended as public websites may have website hosting enabled by misconfiguration, silently exposing internal files, logs, or backups to the internet.

        **Risk mitigation**

        - **Disable website hosting on non-public buckets:** Removing the website configuration eliminates the unauthenticated endpoint and ensures bucket access is controlled exclusively through IAM and bucket policies.
        - **Use purpose-built services for static content:** When public web hosting is genuinely needed, serving content through CloudFront with HTTPS enforcement and proper access controls is the safer alternative.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and navigate to the S3 service.
        2. Select the bucket you want to inspect.
        3. Open the **Properties** tab.
        4. Scroll to **Static website hosting** and read the status.

        A passing bucket shows **Static website hosting: Disabled**. A failing bucket shows **Static website hosting: Enabled** along with a bucket website endpoint URL.

        ### Audit via CLI

        1. Check whether a bucket has a website configuration:

        ```bash
        aws s3api get-bucket-website \
          --bucket <bucket-name>
        ```

        A passing bucket returns an error: `NoSuchWebsiteConfiguration`. A failing bucket returns a JSON object containing `IndexDocument` or `ErrorDocument` keys, indicating website hosting is active.

      remediation:
        - id: console
          desc: |
            To ensure S3 bucket static website hosting is disabled using the AWS Console:

            1. Navigate to the Amazon S3 Console.
            2. Select the desired bucket.
            3. Go to the "Properties" tab.
            4. Under "Static website hosting", click "Edit".
            5. Select "Disable" and save the changes.
        - id: cli
          desc: |
            To ensure S3 bucket static website hosting is disabled using the AWS CLI:

            ```bash
            aws s3api delete-bucket-website --bucket <bucket-name>
            ```
        - id: terraform
          desc: |
            To ensure S3 bucket static website hosting is disabled in Terraform, remove any `aws_s3_bucket_website_configuration` resources associated with the bucket:

            ```hcl
            # Remove or comment out website configuration resources
            # resource "aws_s3_bucket_website_configuration" "example" {
            #   bucket = aws_s3_bucket.example.id
            #   index_document {
            #     suffix = "index.html"
            #   }
            # }
            ```
        - id: cloudformation
          desc: |
            Do not include the `WebsiteConfiguration` property on `AWS::S3::Bucket` resources. If a bucket currently has website hosting enabled, remove the `WebsiteConfiguration` block from the template and update the stack.
    refs:
      - url: https://docs.aws.amazon.com/AmazonS3/latest/userguide/WebsiteHosting.html
        title: Hosting a static website using Amazon S3
      - url: https://registry.terraform.io/providers/hashicorp/aws/latest/docs/resources/s3_bucket_website_configuration
        title: Terraform Documentation - s3_bucket_website_configuration Resource
  - uid: mondoo-aws-security-s3-bucket-static-website-hosting-disabled-aws
    filters: asset.platform == "aws-s3-bucket"
    mql: |
      aws.s3.bucket.website == empty
  - uid: mondoo-aws-security-s3-bucket-static-website-hosting-disabled-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_s3_bucket_website_configuration")
    mql: |
      terraform.resources.where(nameLabel == "aws_s3_bucket_website_configuration").length == 0
