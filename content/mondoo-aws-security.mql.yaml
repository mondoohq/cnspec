        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon ElastiCache clusters have encryption in transit enabled, protecting data as it moves between clients and cache nodes.

        **Why this matters**

        - Without in-transit encryption, data between applications and ElastiCache is transmitted in plaintext.
        - Sensitive session data, authentication tokens, and cached content can be intercepted.
        - AWS Security Hub control ElastiCache.4 requires encryption in transit.

        **Risk mitigation**

        - **Data protection:** Encrypts all communication between clients and ElastiCache nodes using TLS.
        - **MITM prevention:** Prevents eavesdropping on cache traffic.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and navigate to the Amazon ElastiCache service.
        2. In the left navigation pane, select **Redis caches**.
        3. Select a cluster to inspect.
        4. In the cluster details, locate the **Encryption** section.
        5. Verify that **Encryption in transit** shows **Enabled**.
        6. Repeat for each cluster in the account.

        A passing cluster shows **Encryption in transit: Enabled**. A failing cluster shows **Encryption in transit: Disabled** or no value.

        ### Audit via CLI

        1. List replication groups and check the in-transit encryption setting:

        ```bash
        aws elasticache describe-replication-groups \
          --query 'ReplicationGroups[*].{Id:ReplicationGroupId,TransitEncryption:TransitEncryptionEnabled}' \
          --output table
        ```

        A passing cluster returns `TransitEncryption: true`. A failing cluster returns `TransitEncryption: false` or `None`.

      remediation:
        - id: console
          desc: |
            To ensure ElastiCache clusters have encryption in transit enabled using the AWS Console:

            1. Navigate to the Amazon ElastiCache Console.
            2. Note: Encryption in transit can only be enabled at creation time.
            3. Create a new replication group with Encryption in transit enabled.
            4. Migrate data and update application connection strings to use TLS.
        - id: cli
          desc: |
            To ensure ElastiCache clusters have encryption in transit enabled using the AWS CLI:

            ```bash
            aws elasticache create-replication-group \
              --replication-group-id example-encrypted \
              --replication-group-description "Encrypted cluster" \
              --transit-encryption-enabled \
              --cache-node-type cache.r6g.large \
              --engine redis
            ```
        - id: terraform
          desc: |
            To ensure ElastiCache clusters have encryption in transit enabled in Terraform:

            ```hcl
            resource "aws_elasticache_replication_group" "example" {
              replication_group_id = "example-encrypted"
              description          = "Encrypted ElastiCache cluster"
              node_type            = "cache.r6g.large"
              engine               = "redis"

              transit_encryption_enabled = true
            }
            ```
        - id: cloudformation
          desc: |
            To ensure ElastiCache clusters have encryption in transit enabled in CloudFormation:

            ```yaml
            Resources:
              ElastiCacheReplicationGroup:
                Type: AWS::ElastiCache::ReplicationGroup
                Properties:
                  ReplicationGroupId: example-encrypted
                  ReplicationGroupDescription: Encrypted ElastiCache cluster
                  CacheNodeType: cache.r6g.large
                  Engine: redis
                  TransitEncryptionEnabled: true
            ```
    refs:
      - url: https://docs.aws.amazon.com/AmazonElastiCache/latest/red-ug/in-transit-encryption.html
        title: AWS Documentation - ElastiCache in-transit encryption
