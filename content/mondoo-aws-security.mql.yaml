    mql: |
      cloudformation.template.resources.where(type == "AWS::DocDB::DBCluster").all(
      properties['StorageEncrypted'] == true
      )
  - uid: mondoo-aws-security-documentdb-cluster-cmk-encryption
    title: Ensure DocumentDB clusters are encrypted with a customer-managed KMS key
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-11
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-aws-security-documentdb-cluster-cmk-encryption-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-documentdb-cluster-cmk-encryption-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-documentdb-cluster-cmk-encryption-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-documentdb-cluster-cmk-encryption-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-documentdb-cluster-cmk-encryption-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon DocumentDB clusters are encrypted using a customer-managed AWS KMS key (CMK) rather than the default AWS-managed service key. Customer-managed keys provide greater control over the encryption lifecycle, including key rotation policies, access control, and audit capabilities.

        **Why this matters**

        - AWS-managed keys do not allow you to control key rotation schedules, define granular access policies, or audit key usage independently.
        - Customer-managed KMS keys enable you to define who can use and manage the key through IAM and key policies, providing an additional layer of access control beyond DocumentDB IAM policies.
        - Using CMKs enables detailed audit trails in AWS CloudTrail for all encryption and decryption operations on DocumentDB data.
        - Some compliance frameworks require organizations to manage their own encryption keys rather than relying on provider-managed keys.

        **Risk mitigation**

        - **Key control:** Provides full lifecycle control over encryption keys, including the ability to disable or revoke access.
        - **Audit visibility:** Enables detailed CloudTrail logging of all key usage for compliance and forensic purposes.
        - **Access separation:** Allows separation of duties between database administrators and key administrators.
      audit: |
        ### Audit via Console

        1. Navigate to the **Amazon DocumentDB Console** at Services > DocumentDB.
        2. Select **Clusters** in the left navigation panel.
        3. Select the cluster to inspect.
        4. Choose the **Configuration** tab.
        5. Locate the **KMS key** field and note the key ARN or alias displayed.
        6. Open the **AWS KMS Console**, find the key, and verify that **Key type** is **Customer managed**.

        A passing cluster shows a customer-managed KMS key (key type **Customer managed**). A failing cluster shows an AWS-managed key (`aws/docdb`) or no KMS key.

        ### Audit via CLI

        1. Retrieve the KMS key ID for each DocumentDB cluster:

        ```bash
        aws docdb describe-db-clusters \
          --query "DBClusters[*].{ClusterId:DBClusterIdentifier,KmsKeyId:KmsKeyId}"
        ```

        2. For each non-empty `KmsKeyId`, confirm the key is customer-managed:

        ```bash
        aws kms describe-key \
          --key-id <kms-key-id> \
          --query "KeyMetadata.{KeyId:KeyId,Manager:KeyManager}"
        ```

        A passing cluster has a `KmsKeyId` whose `KeyManager` value is `"CUSTOMER"`. A failing cluster has an empty `KmsKeyId` or a `KeyManager` value of `"AWS"`.
      remediation:
        - id: console
          desc: |
            To ensure DocumentDB clusters are encrypted with a customer-managed KMS key using the AWS Console:

            1. Navigate to the Amazon DocumentDB Console.
            2. Select **Clusters** in the left panel.
            3. To update encryption, you must create a new cluster with a customer-managed KMS key:
              - Select **Create cluster**.
              - Under **Encryption-at-rest**, select a customer-managed KMS key.
              - Complete the cluster creation process.
            4. Migrate data from the existing cluster to the new cluster.
            5. Update applications to point to the new cluster endpoint.
        - id: cli
          desc: |
            To ensure DocumentDB clusters are encrypted with a customer-managed KMS key using the AWS CLI, create a DocumentDB cluster with a customer-managed KMS key:

            ```bash
            aws docdb create-db-cluster \
              --db-cluster-identifier secure-docdb-cluster \
              --engine docdb \
              --master-username admin \
              --master-user-password <password> \
              --storage-encrypted \
              --kms-key-id arn:aws:kms:region:account-id:key/key-id
            ```

            Verify the KMS key used by an existing cluster:

            ```bash
            aws docdb describe-db-clusters --db-cluster-identifier <cluster-id> \
              --query "DBClusters[*].{ClusterId:DBClusterIdentifier,KmsKeyId:KmsKeyId}"
            ```
        - id: terraform
          desc: |
            To ensure DocumentDB clusters are encrypted with a customer-managed KMS key in Terraform, specify a customer-managed KMS key:

            ```hcl
            resource "aws_docdb_cluster" "example" {
              cluster_identifier = "secure-docdb-cluster"
              engine             = "docdb"
              master_username    = "admin"
              master_password    = var.db_password
              storage_encrypted  = true
              kms_key_id         = aws_kms_key.example.arn
            }
            ```
        - id: cloudformation
          desc: |
            To ensure DocumentDB clusters are encrypted with a customer-managed KMS key in CloudFormation, specify a customer-managed KMS key via `KmsKeyId`:

            ```yaml
            Resources:
              DocDBCluster:
                Type: AWS::DocDB::DBCluster
                Properties:
                  DBClusterIdentifier: secure-docdb-cluster
                  MasterUsername: admin
                  MasterUserPassword: !Ref DBPassword
                  StorageEncrypted: true
                  KmsKeyId: !GetAtt KMSKey.Arn
            ```
    refs:
      - url: https://docs.aws.amazon.com/documentdb/latest/developerguide/encryption-at-rest.html
        title: Amazon DocumentDB Encryption at Rest
      - url: https://docs.aws.amazon.com/kms/latest/developerguide/concepts.html#customer-cmk
        title: AWS KMS Customer Managed Keys
