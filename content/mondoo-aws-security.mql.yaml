                  EnableKeyRotation: true
                  KeyPolicy:
                    Version: "2012-10-17"
                    Statement:
                      - Effect: "Allow"
                        Principal:
                          AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
                        Action: "kms:*"
                        Resource: "*"

              EncryptedRDSInstance:
                Type: "AWS::RDS::DBInstance"
