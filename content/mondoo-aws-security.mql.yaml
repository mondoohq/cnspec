  - uid: mondoo-aws-security-neptune-cluster-iam-authentication
    title: Ensure Neptune DB clusters have IAM database authentication enabled
    impact: 80
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-j
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-3
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-3
    variants:
      - uid: mondoo-aws-security-neptune-cluster-iam-authentication-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-neptune-cluster-iam-authentication-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-neptune-cluster-iam-authentication-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-neptune-cluster-iam-authentication-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-neptune-cluster-iam-authentication-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon Neptune DB clusters have IAM database authentication enabled. IAM authentication allows managing database access using AWS IAM policies instead of relying solely on database-level passwords.

        **Why this matters**

        - Password-based authentication requires managing and rotating credentials separately from AWS IAM, increasing operational complexity and the risk of credential leakage.
        - IAM authentication integrates with AWS CloudTrail for audit logging of database access.
        - IAM policies provide fine-grained, centralized access control consistent with other AWS services.
        - Without IAM authentication, database credentials may be hardcoded in application configurations or stored insecurely.

        **Risk mitigation**

        - **Centralized access control:** Manages database access through IAM policies alongside other AWS resource permissions.
        - **Auditability:** All authentication attempts are logged in CloudTrail.
        - **No static credentials:** Eliminates the need to store or rotate database passwords.
      remediation:
        - id: console
          desc: |
            To ensure Neptune DB clusters have IAM database authentication enabled using the AWS Console:

            1. Navigate to the Amazon Neptune Console.
            2. Select Databases in the left panel.
            3. Select the Neptune DB cluster.
            4. Select Modify.
            5. Enable IAM DB authentication.
            6. Select Continue and apply the changes.
        - id: cli
          desc: |
            To ensure Neptune DB clusters have IAM database authentication enabled using the AWS CLI, enable IAM authentication on an existing cluster:

            ```bash
            aws neptune modify-db-cluster \
              --db-cluster-identifier <cluster-id> \
              --enable-iam-database-authentication
            ```

            Verify the setting:

            ```bash
            aws neptune describe-db-clusters --db-cluster-identifier <cluster-id> \
              --query "DBClusters[*].{ClusterId:DBClusterIdentifier,IAMAuth:IAMDatabaseAuthenticationEnabled}"
            ```
        - id: terraform
          desc: |
            To ensure Neptune DB clusters have IAM database authentication enabled in Terraform:

            ```hcl
            resource "aws_neptune_cluster" "example" {
              cluster_identifier                  = "neptune-cluster"
              engine                              = "neptune"
              iam_database_authentication_enabled = true
            }
            ```
        - id: cloudformation
          desc: |
            To ensure Neptune DB clusters have IAM database authentication enabled in CloudFormation:

            ```yaml
            Resources:
              NeptuneCluster:
                Type: "AWS::Neptune::DBCluster"
                Properties:
                  DBClusterIdentifier: "neptune-cluster"
                  IamAuthEnabled: true
            ```
    refs:
      - url: https://docs.aws.amazon.com/neptune/latest/userguide/iam-auth.html
        title: AWS Documentation - IAM database authentication in Neptune
      - url: https://docs.aws.amazon.com/neptune/latest/userguide/security.html
        title: AWS Documentation - Security in Amazon Neptune
  - uid: mondoo-aws-security-neptune-cluster-iam-authentication-aws
    filters: asset.platform == "aws-neptune-cluster"
    mql: aws.neptune.cluster.iamDatabaseAuthenticationEnabled == true
  - uid: mondoo-aws-security-neptune-cluster-iam-authentication-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_neptune_cluster")
    mql: |
      terraform.resources.where(nameLabel == "aws_neptune_cluster").all(
        arguments.iam_database_authentication_enabled == true
      )
  - uid: mondoo-aws-security-neptune-cluster-iam-authentication-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_neptune_cluster")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_neptune_cluster").all(
        change.after.iam_database_authentication_enabled == true
      )
  - uid: mondoo-aws-security-neptune-cluster-iam-authentication-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_neptune_cluster")
    mql: |
      terraform.state.resources.where(type == "aws_neptune_cluster").all(
        values.iam_database_authentication_enabled == true
      )
  - uid: mondoo-aws-security-neptune-cluster-iam-authentication-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::Neptune::DBCluster")
    mql: |
      cloudformation.template.resources.where(type == "AWS::Neptune::DBCluster").all(
      properties['IamAuthEnabled'] == true
      )
  - uid: mondoo-aws-security-kms-grants-no-create-grant
    title: Ensure KMS key grants do not include the CreateGrant permission
    impact: 80
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-3-1
      compliance/vda-isa-5: vda-isa-5-4-1-1
    variants:
      - uid: mondoo-aws-security-kms-grants-no-create-grant-aws
        tags:
          mondoo.com/filter-title: AWS KMS Key
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-kms-grants-no-create-grant-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-kms-grants-no-create-grant-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-kms-grants-no-create-grant-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that AWS KMS key grants do not include the `CreateGrant` operation. When a grant includes `CreateGrant`, the grantee can create additional grants on the same key, effectively delegating their own permissions to other principals without requiring changes to the key policy.

        **Why this matters**

        - The `CreateGrant` operation enables privilege escalation: a grantee with `CreateGrant` can create new grants that give other AWS principals (users, roles, or services) access to the KMS key.
        - This delegation chain can be difficult to audit and track, creating hidden access paths to encrypted data.
        - An attacker who compromises a principal with a `CreateGrant` grant can silently expand their access by granting `Decrypt` permissions to additional principals under their control.
        - Grants with `CreateGrant` effectively bypass the centralized access control provided by the key policy, undermining the principle of least privilege.

        **Risk mitigation**

        - **Prevent privilege escalation:** Removes the ability for grantees to delegate KMS key access to other principals.
        - **Auditable access:** Ensures all access to KMS keys is controlled through key policies and explicitly created grants.
        - **Least privilege:** Limits grant permissions to only the operations needed (Encrypt, Decrypt, GenerateDataKey, etc.) without delegation capability.

        **Important caveats:**

        - Some AWS services (such as AWS EBS, RDS, and S3) create grants with `CreateGrant` as part of their normal operation when using customer-managed CMKs. Review flagged grants to determine if they are service-linked before removing them.
        - Removing `CreateGrant` from service-linked grants may break encryption workflows for those services.
      remediation:
        - id: console
          desc: |
            To ensure KMS key grants do not include the CreateGrant permission using the AWS Console:

            1. Navigate to the AWS KMS Console.
            2. Select Customer managed keys.
            3. Select a key and go to the Key policy tab.
            4. Review the Grants section for any grants that include `CreateGrant`.
            5. For each flagged grant, determine if it is service-linked or user-created.
            6. For user-created grants, retire or revoke the grant and recreate it without the `CreateGrant` operation.
        - id: cli
          desc: |
            To ensure KMS key grants do not include the CreateGrant permission using the AWS CLI, list all grants for a KMS key and check for `CreateGrant`:

            ```bash
            aws kms list-grants --key-id <key-id> \
              --query "Grants[?contains(Operations, 'CreateGrant')].{GrantId:GrantId,Grantee:GranteePrincipal,Operations:Operations}"
            ```

            Revoke a grant that includes `CreateGrant`:

            ```bash
            aws kms revoke-grant --key-id <key-id> --grant-id <grant-id>
            ```

            Create a replacement grant without `CreateGrant`:

            ```bash
            aws kms create-grant \
              --key-id <key-id> \
              --grantee-principal <principal-arn> \
              --operations "Decrypt" "Encrypt" "GenerateDataKey"
            ```
        - id: terraform
          desc: |
            To ensure KMS key grants do not include the CreateGrant permission in Terraform, ensure `aws_kms_grant` resources do not include `CreateGrant` in the operations list:

            ```hcl
            resource "aws_kms_grant" "example" {
              key_id            = aws_kms_key.example.key_id
              grantee_principal = aws_iam_role.example.arn
              operations        = ["Decrypt", "Encrypt", "GenerateDataKey"]
            }
            ```
        - id: cloudformation
          desc: |
            To ensure KMS key grants do not include the CreateGrant permission in CloudFormation, note that CloudFormation does not natively support managing KMS grants. Use the AWS CLI, SDK, or a CloudFormation custom resource to manage KMS grants and ensure `CreateGrant` is not included in the operations list.
    refs:
      - url: https://docs.aws.amazon.com/kms/latest/developerguide/grants.html
        title: AWS Documentation - Grants in AWS KMS
      - url: https://docs.aws.amazon.com/kms/latest/developerguide/grant-manage.html
        title: AWS Documentation - Managing grants
  - uid: mondoo-aws-security-kms-grants-no-create-grant-aws
    filters: asset.platform == "aws-kms-key" && aws.kms.key.metadata.KeyManager == "CUSTOMER"
    mql: aws.kms.key.grants.none(operations.contains("CreateGrant"))
  - uid: mondoo-aws-security-kms-grants-no-create-grant-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_kms_grant")
    mql: |
      terraform.resources.where(nameLabel == "aws_kms_grant").all(
      arguments.operations.none(_ == "CreateGrant")
      )
  - uid: mondoo-aws-security-kms-grants-no-create-grant-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_kms_grant")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_kms_grant").all(
      change.after.operations.none(_ == "CreateGrant")
      )
  - uid: mondoo-aws-security-kms-grants-no-create-grant-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_kms_grant")
    mql: |
      terraform.state.resources.where(type == "aws_kms_grant").all(
      values.operations.none(_ == "CreateGrant")
      )
  - uid: mondoo-aws-security-kms-no-wildcard-grant-principals
    title: Ensure KMS key grants do not use wildcard principals
    impact: 80
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-3-1
      compliance/vda-isa-5: vda-isa-5-4-1-1
    variants:
      - uid: mondoo-aws-security-kms-no-wildcard-grant-principals-aws
        tags:
          mondoo.com/filter-title: AWS KMS Key
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-kms-no-wildcard-grant-principals-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-kms-no-wildcard-grant-principals-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-kms-no-wildcard-grant-principals-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that AWS KMS key grants do not use wildcard (`*`) grantee principals. A wildcard principal in a KMS grant allows any AWS principal to use the granted operations on the key, effectively making the key publicly accessible for those operations.

        **Why this matters**

        - A wildcard grantee principal grants KMS key permissions to every AWS principal, including those in other AWS accounts.
        - This violates the principle of least privilege and can lead to unauthorized access to encrypted data.
        - An attacker with any valid AWS credentials could use the key to decrypt data, generate data keys, or perform other granted operations.
        - Wildcard grants are difficult to audit and may go unnoticed, creating persistent security exposure.

        **Risk mitigation**

        - **Prevent unauthorized access:** Ensure only specific, named principals have access to KMS key operations.
        - **Enforce least privilege:** Grant permissions only to the principals that require them.
        - **Improve auditability:** Named principals make it straightforward to trace who has access to each key.
      remediation:
        - id: console
          desc: |
            To ensure KMS key grants do not use wildcard principals using the AWS Console:

            1. Navigate to the AWS KMS Console.
            2. Select Customer managed keys.
            3. Select a key and go to the Key policy tab.
            4. Review the Grants section for any grants with a wildcard (`*`) grantee principal.
            5. Revoke the wildcard grant and recreate it with a specific principal ARN.
        - id: cli
          desc: |
            To ensure KMS key grants do not use wildcard principals using the AWS CLI, list all grants for a KMS key and check for wildcard principals:

            ```bash
            aws kms list-grants --key-id <key-id> \
              --query "Grants[?GranteePrincipal=='*'].{GrantId:GrantId,Grantee:GranteePrincipal,Operations:Operations}"
            ```

            Revoke a grant with a wildcard principal:

            ```bash
            aws kms revoke-grant --key-id <key-id> --grant-id <grant-id>
            ```

            Create a replacement grant with a specific principal:

            ```bash
            aws kms create-grant \
              --key-id <key-id> \
              --grantee-principal <specific-principal-arn> \
              --operations "Decrypt" "Encrypt" "GenerateDataKey"
            ```
        - id: terraform
          desc: |
            To ensure KMS key grants do not use wildcard principals in Terraform, ensure `aws_kms_grant` resources specify a specific principal ARN rather than a wildcard:

            ```hcl
            resource "aws_kms_grant" "example" {
              key_id            = aws_kms_key.example.key_id
              grantee_principal = aws_iam_role.example.arn
              operations        = ["Decrypt", "Encrypt"]
            }
            ```
        - id: cloudformation
          desc: |
            To ensure KMS key grants do not use wildcard principals in CloudFormation, note that CloudFormation does not natively support managing KMS grants. Use the AWS CLI, SDK, or a CloudFormation custom resource to manage KMS grants and ensure specific principal ARNs are used instead of wildcards.
    refs:
      - url: https://docs.aws.amazon.com/kms/latest/developerguide/grants.html
        title: AWS Documentation - Grants in AWS KMS
      - url: https://docs.aws.amazon.com/kms/latest/developerguide/grant-manage.html
        title: AWS Documentation - Managing grants
  - uid: mondoo-aws-security-kms-no-wildcard-grant-principals-aws
    filters: asset.platform == "aws-kms-key" && aws.kms.key.metadata.KeyManager == "CUSTOMER"
    mql: aws.kms.key.grants.none(granteePrincipal == "*")
  - uid: mondoo-aws-security-kms-no-wildcard-grant-principals-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_kms_grant")
    mql: |
      terraform.resources.where(nameLabel == "aws_kms_grant").all(
        arguments.grantee_principal != "*"
      )
  - uid: mondoo-aws-security-kms-no-wildcard-grant-principals-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_kms_grant")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_kms_grant").all(
        change.after["grantee_principal"] != "*"
      )
  - uid: mondoo-aws-security-kms-no-wildcard-grant-principals-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_kms_grant")
    mql: |
      terraform.state.resources.where(type == "aws_kms_grant").all(
        values["grantee_principal"] != "*"
      )
  - uid: mondoo-aws-security-kms-key-origin-aws-kms
    title: Ensure customer-managed KMS keys use AWS_KMS origin
    impact: 60
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-12
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-10
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-11
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-aws-security-kms-key-origin-aws-kms-aws
        tags:
          mondoo.com/filter-title: AWS KMS Key
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-kms-key-origin-aws-kms-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-kms-key-origin-aws-kms-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-kms-key-origin-aws-kms-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-kms-key-origin-aws-kms-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that customer-managed AWS KMS keys use `AWS_KMS` as their key material origin rather than `EXTERNAL` (imported key material) or `AWS_CLOUDHSM`. When key material is externally managed, a compromise of the external key material gives an attacker the ability to decrypt all data encrypted with that key indefinitely, with no AWS-side detection mechanism or automatic rotation to limit the exposure window.

        **Why this matters**

        - An attacker who compromises externally managed key material (stored outside AWS) can decrypt all data encrypted with that key without any interaction with AWS services, making the decryption completely invisible to CloudTrail, GuardDuty, and all AWS-side monitoring.
        - Externally imported keys do not support automatic key rotation, meaning a compromised key remains valid indefinitely unless the customer manually rotates it and re-encrypts all data -- a process that is complex and rarely performed promptly.
        - The security of externally imported key material depends entirely on the customer's external key management practices. Weaknesses in generation, transport, storage, or access control of external key material create encryption bypass opportunities that AWS cannot detect or prevent.
        - Keys with `AWS_CLOUDHSM` origin require a functioning AWS CloudHSM cluster. If the cluster becomes unavailable, the KMS key cannot be used, and an attacker who compromises the HSM cluster gains access to all associated key material.

        **Risk mitigation**

        - **Cryptographic containment:** AWS_KMS origin keys never leave AWS hardened infrastructure, meaning an attacker must interact with AWS APIs (which are logged and monitored) to use the key.
        - **Automatic key rotation:** AWS_KMS origin keys support automatic annual rotation, limiting the exposure window if key material is compromised.
        - **Detection capability:** All key usage is logged in CloudTrail, enabling detection of unauthorized decryption attempts that would be invisible with externally managed keys.
        - **Tamper resistance:** AWS manages key material within FIPS 140-2 validated HSMs, providing stronger protection than most customer-managed external key storage.

        **Important caveats:**

        - Some organizations have regulatory requirements to use externally generated key material (e.g., BYOK mandates). In those cases, `EXTERNAL` origin is intentional and this check can be excluded for those keys.
        - `AWS_CLOUDHSM` origin may be required for specific compliance scenarios that mandate single-tenant HSM hardware. Evaluate flagged keys against your compliance requirements.
      remediation:
        - id: console
          desc: |
            To ensure customer-managed KMS keys use AWS_KMS origin using the AWS Console, KMS key origin cannot be changed after creation. To migrate to an `AWS_KMS` origin key:

            1. Navigate to the AWS KMS Console.
            2. Create a new customer-managed key with Origin set to KMS (the default).
            3. Update all services and applications that reference the old key to use the new key ARN.
            4. Re-encrypt any data encrypted with the old key using the new key.
            5. Schedule deletion of the old key after confirming all references have been updated.
        - id: cli
          desc: |
            To ensure customer-managed KMS keys use AWS_KMS origin using the AWS CLI, check the origin of a KMS key:

            ```bash
            aws kms describe-key --key-id <key-id> \
              --query "KeyMetadata.Origin"
            ```

            Create a new key with AWS_KMS origin (default):

            ```bash
            aws kms create-key \
              --description "Customer-managed key with AWS_KMS origin" \
              --key-usage ENCRYPT_DECRYPT \
              --origin AWS_KMS
            ```

            Schedule deletion of the old externally-imported key after migration:

            ```bash
            aws kms schedule-key-deletion --key-id <old-key-id> --pending-window-in-days 30
            ```
        - id: terraform
          desc: |
            To ensure customer-managed KMS keys use AWS_KMS origin in Terraform, ensure `aws_kms_key` resources do not specify an external origin:

            ```hcl
            resource "aws_kms_key" "example" {
              description              = "Customer-managed key with AWS_KMS origin"
              key_usage                = "ENCRYPT_DECRYPT"
              customer_master_key_spec = "SYMMETRIC_DEFAULT"
            }
            ```
        - id: cloudformation
          desc: |
            To ensure customer-managed KMS keys use AWS_KMS origin in CloudFormation:

            ```yaml
            Resources:
              MyKMSKey:
                Type: AWS::KMS::Key
                Properties:
                  Description: Customer-managed key with AWS_KMS origin
                  KeyUsage: ENCRYPT_DECRYPT
                  KeySpec: SYMMETRIC_DEFAULT
                  KeyPolicy:
                    Version: "2012-10-17"
                    Statement:
                      - Effect: Allow
                        Principal:
                          AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
                        Action: "kms:*"
                        Resource: "*"
            ```
    refs:
      - url: https://docs.aws.amazon.com/kms/latest/developerguide/concepts.html#key-origin
        title: AWS Documentation - Key material origin
      - url: https://docs.aws.amazon.com/kms/latest/developerguide/importing-keys.html
        title: AWS Documentation - Importing key material
  - uid: mondoo-aws-security-kms-key-origin-aws-kms-aws
    filters: asset.platform == "aws-kms-key" && aws.kms.key.metadata.KeyManager == "CUSTOMER"
    mql: aws.kms.key.metadata.Origin == "AWS_KMS"
  - uid: mondoo-aws-security-kms-key-origin-aws-kms-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_kms_key")
    mql: |
      // Terraform-created aws_kms_key resources use AWS_KMS origin by default.
      // Keys with external key material would use aws_kms_external_key instead.
      terraform.resources.none(nameLabel == "aws_kms_external_key")
  - uid: mondoo-aws-security-kms-key-origin-aws-kms-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_kms_key")
    mql: |
      // Terraform-created aws_kms_key resources use AWS_KMS origin by default.
      // Keys with external key material would use aws_kms_external_key instead.
      terraform.plan.resourceChanges.none(type == "aws_kms_external_key")
  - uid: mondoo-aws-security-kms-key-origin-aws-kms-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_kms_key")
    mql: |
      // Terraform-created aws_kms_key resources use AWS_KMS origin by default.
      // Keys with external key material would use aws_kms_external_key instead.
      terraform.state.resources.none(type == "aws_kms_external_key")
  - uid: mondoo-aws-security-kms-key-origin-aws-kms-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::KMS::Key")
    mql: |
      cloudformation.template.resources.where(type == "AWS::KMS::Key").all(
      properties['Origin'] == empty || properties['Origin'] == "AWS_KMS"
      )
  - uid: mondoo-aws-security-codebuild-source-ssl-verification
    title: Ensure CodeBuild projects have SSL verification enabled for source fetches
    impact: 80
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    variants:
      - uid: mondoo-aws-security-codebuild-source-ssl-verification-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-codebuild-source-ssl-verification-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-codebuild-source-ssl-verification-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-codebuild-source-ssl-verification-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-codebuild-source-ssl-verification-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that AWS CodeBuild projects have SSL verification enabled when fetching source code. When `insecureSsl` is set to `true`, CodeBuild skips TLS certificate verification when connecting to the source repository, making the build vulnerable to man-in-the-middle (MITM) attacks.

        **Why this matters**

        - Disabling SSL verification allows an attacker to intercept and modify source code during transit between the repository and CodeBuild, injecting malicious code into builds.
        - Supply chain attacks that compromise the build pipeline can affect all downstream artifacts, containers, and deployments.
        - An attacker performing a MITM attack could inject backdoors, credential-stealing code, or other malware that gets built into production artifacts.
        - SSL verification is enabled by default; disabling it is typically done as a workaround for self-signed certificates rather than a deliberate security decision.

        **Risk mitigation**

        - **Supply chain protection:** Ensures source code integrity by verifying the repository's TLS certificate during fetches.
        - **MITM prevention:** Prevents attackers from injecting malicious code during source retrieval.
        - **Build integrity:** Guarantees that the code being built matches what is stored in the source repository.
      remediation:
        - id: console
          desc: |
            To ensure CodeBuild projects have SSL verification enabled for source fetches using the AWS Console:

            1. Navigate to the AWS CodeBuild Console.
            2. Select the build project to modify.
            3. Select Edit > Source.
            4. Ensure Insecure SSL is not checked.
            5. If using a self-signed certificate, upload the certificate to an S3 bucket and configure CodeBuild to use it via the `certificate` setting instead of disabling SSL verification.
            6. Select Update source to apply the changes.
        - id: cli
          desc: |
            To ensure CodeBuild projects have SSL verification enabled for source fetches using the AWS CLI, check the current setting:

            ```bash
            aws codebuild batch-get-projects --names <project-name> \
              --query "projects[*].{Name:name,InsecureSsl:source.insecureSsl}"
            ```

            Update the project to enable SSL verification:

            ```bash
            aws codebuild update-project \
              --name <project-name> \
              --source "type=CODECOMMIT,location=<repo-url>,insecureSsl=false"
            ```
        - id: terraform
          desc: |
            To ensure CodeBuild projects have SSL verification enabled for source fetches in Terraform, ensure `insecure_ssl` is set to `false` (or omitted, as `false` is the default):

            ```hcl
            resource "aws_codebuild_project" "example" {
              name = "example-project"

              source {
                type         = "CODECOMMIT"
                location     = "https://git-codecommit.us-east-1.amazonaws.com/v1/repos/example"
                insecure_ssl = false
              }

              # For self-signed certificates, use certificate instead:
              # source {
              #   type         = "GITHUB_ENTERPRISE"
              #   location     = "https://github.example.com/repo"
              #   insecure_ssl = false
              # }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure CodeBuild projects have SSL verification enabled for source fetches in CloudFormation:

            ```yaml
            Resources:
              CodeBuildProject:
                Type: AWS::CodeBuild::Project
                Properties:
                  Name: example-project
                  Source:
                    Type: CODECOMMIT
                    Location: "https://git-codecommit.us-east-1.amazonaws.com/v1/repos/example"
                    InsecureSsl: false
            ```
    refs:
      - url: https://docs.aws.amazon.com/codebuild/latest/userguide/build-spec-ref.html
        title: AWS Documentation - Build specification reference
      - url: https://docs.aws.amazon.com/codebuild/latest/userguide/sample-source-version.html
        title: AWS Documentation - Source version sample
  - uid: mondoo-aws-security-codebuild-source-ssl-verification-aws
    filters: asset.platform == "aws"
    mql: aws.codebuild.projects.all(source["insecureSsl"] != true)
  - uid: mondoo-aws-security-codebuild-source-ssl-verification-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_codebuild_project")
    mql: |
      terraform.resources.where(nameLabel == "aws_codebuild_project").all(
        blocks.where(type == "source").all(
          arguments.insecure_ssl != true
        )
      )
  - uid: mondoo-aws-security-codebuild-source-ssl-verification-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_codebuild_project")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_codebuild_project").all(
        change.after.source[0].insecure_ssl != true
      )
  - uid: mondoo-aws-security-codebuild-source-ssl-verification-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_codebuild_project")
    mql: |
      terraform.state.resources.where(type == "aws_codebuild_project").all(
        values.source[0].insecure_ssl != true
      )
  - uid: mondoo-aws-security-codebuild-source-ssl-verification-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::CodeBuild::Project")
    mql: |
      cloudformation.template.resources.where(type == "AWS::CodeBuild::Project").all(
      properties['Source'] == empty || properties['Source']['InsecureSsl'] != true
      )
  - uid: mondoo-aws-security-elasticache-serverless-cmk-encryption
    title: Ensure ElastiCache serverless caches use CMK encryption
    impact: 70
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-aws-security-elasticache-serverless-cmk-encryption-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-elasticache-serverless-cmk-encryption-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-elasticache-serverless-cmk-encryption-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-elasticache-serverless-cmk-encryption-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-elasticache-serverless-cmk-encryption-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon ElastiCache serverless caches are encrypted using a customer-managed AWS KMS key (CMK). While ElastiCache serverless caches are encrypted by default with AWS-managed keys, using a CMK provides additional control over key management, access policies, and rotation schedules.

        **Why this matters**

        - AWS-managed encryption keys do not allow customers to control key policies, audit key usage, or enforce custom rotation schedules.
        - Customer-managed KMS keys enable fine-grained access control, allowing organizations to restrict which principals can encrypt and decrypt cache data.
        - CMKs integrate with AWS CloudTrail for key usage auditing, providing visibility into who accessed encrypted data and when.
        - Compliance frameworks including PCI DSS, HIPAA, and SOC 2 often require customer-controlled encryption keys for sensitive data stores.

        **Risk mitigation**

        - **Key control:** Organizations maintain full control over the encryption key lifecycle, including creation, rotation, and deletion.
        - **Access auditing:** All key usage is logged in CloudTrail, enabling security monitoring and compliance reporting.
        - **Compliance:** Meets regulatory requirements for customer-managed encryption of data at rest.
      remediation:
        - id: console
          desc: |
            To ensure ElastiCache serverless caches use CMK encryption using the AWS Console:

            1. Navigate to the Amazon ElastiCache Console.
            2. Select Serverless caches from the left panel.
            3. When creating a new serverless cache, under Encryption, select Customer managed CMK.
            4. Select or create a KMS key.
            5. Complete the cache creation.

            Note: Encryption settings cannot be changed after creation. To switch to CMK encryption, create a new serverless cache with the desired KMS key and migrate data.
        - id: cli
          desc: |
            To ensure ElastiCache serverless caches use CMK encryption using the AWS CLI, create a serverless cache with CMK encryption:

            ```bash
            aws elasticache create-serverless-cache \
              --serverless-cache-name my-cache \
              --engine redis \
              --kms-key-id arn:aws:kms:region:account-id:key/key-id
            ```

            Check existing serverless caches:

            ```bash
            aws elasticache describe-serverless-caches \
              --query "ServerlessCaches[*].{Name:ServerlessCacheName,KmsKeyId:KmsKeyId}"
            ```
        - id: terraform
          desc: |
            To ensure ElastiCache serverless caches use CMK encryption in Terraform:

            ```hcl
            resource "aws_kms_key" "elasticache" {
              description         = "KMS key for ElastiCache serverless"
              enable_key_rotation = true
            }

            resource "aws_elasticache_serverless_cache" "example" {
              engine = "redis"
              name   = "example-cache"

              kms_key_id = aws_kms_key.elasticache.arn
            }
            ```
        - id: cloudformation
          desc: |
            To ensure ElastiCache serverless caches use CMK encryption in CloudFormation:

            ```yaml
            Resources:
              ElastiCacheKMSKey:
                Type: "AWS::KMS::Key"
                Properties:
                  Description: "KMS key for ElastiCache serverless"
                  EnableKeyRotation: true

              ServerlessCache:
                Type: "AWS::ElastiCache::ServerlessCache"
                Properties:
                  ServerlessCacheName: "example-cache"
                  Engine: redis
                  KmsKeyId: !Ref ElastiCacheKMSKey
            ```
    refs:
      - url: https://docs.aws.amazon.com/AmazonElastiCache/latest/dg/serverless-overview.html
        title: AWS Documentation - ElastiCache Serverless
      - url: https://docs.aws.amazon.com/AmazonElastiCache/latest/dg/at-rest-encryption.html
        title: AWS Documentation - ElastiCache encryption at rest
  - uid: mondoo-aws-security-elasticache-serverless-cmk-encryption-aws
    filters: asset.platform == "aws"
    mql: aws.elasticache.serverlessCaches.all(kmsKey != empty)
  - uid: mondoo-aws-security-elasticache-serverless-cmk-encryption-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_elasticache_serverless_cache")
    mql: |
      terraform.resources.where(nameLabel == "aws_elasticache_serverless_cache").all(
        arguments.kms_key_id != empty
      )
  - uid: mondoo-aws-security-elasticache-serverless-cmk-encryption-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_elasticache_serverless_cache")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_elasticache_serverless_cache").all(
        change.after.kms_key_id != empty
      )
  - uid: mondoo-aws-security-elasticache-serverless-cmk-encryption-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_elasticache_serverless_cache")
    mql: |
      terraform.state.resources.where(type == "aws_elasticache_serverless_cache").all(
        values.kms_key_id != empty
      )
  - uid: mondoo-aws-security-elasticache-serverless-cmk-encryption-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::ElastiCache::ServerlessCache")
    mql: |
      cloudformation.template.resources.where(type == "AWS::ElastiCache::ServerlessCache").all(
      properties['KmsKeyId'] != empty
      )
  - uid: mondoo-aws-security-inspector-ec2-scanning-enabled
    title: Ensure Amazon Inspector is enabled for EC2 instance scanning
    impact: 80
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-tvm-03
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-8
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-id-ra-1
      compliance/nist-csf-2: nist-csf-2-id-ra-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-1
      compliance/pci-dss-4: pcidss-requirement-6-3-3
      compliance/soc2-2017: soc2-control-cc7-1-2
      compliance/vda-isa-5: vda-isa-5-5-2-1
    variants:
      - uid: mondoo-aws-security-inspector-ec2-scanning-enabled-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-inspector-ec2-scanning-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-inspector-ec2-scanning-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-inspector-ec2-scanning-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Amazon Inspector is enabled and actively scanning EC2 instances for vulnerabilities. Inspector automatically discovers and scans EC2 instances for software vulnerabilities and unintended network exposure.

        **Why this matters**

        - **Vulnerability detection**: Inspector continuously monitors EC2 instances for known software vulnerabilities (CVEs) and provides prioritized findings.
        - **Automated discovery**: Automatically detects new EC2 instances and begins scanning without manual configuration.
        - **Risk prioritization**: Uses context-aware risk scoring to help teams focus on the most critical vulnerabilities first.
        - **Compliance alignment**: Meets requirements for continuous vulnerability assessment mandated by frameworks such as PCI DSS and NIST.
      remediation:
        - id: console
          desc: |
            To ensure Amazon Inspector is enabled for EC2 instance scanning using the AWS Console:

            1. Navigate to the Amazon Inspector console.
            2. Choose **Get Started** or go to **Account management**.
            3. Enable scanning for **Amazon EC2** instances.
            4. Inspector will automatically begin discovering and scanning EC2 instances.
        - id: cli
          desc: |
            To ensure Amazon Inspector is enabled for EC2 instance scanning using the AWS CLI:

            ```bash
            aws inspector2 enable --resource-types EC2
            ```
        - id: terraform
          desc: |
            To ensure Amazon Inspector is enabled for EC2 instance scanning in Terraform:

            ```hcl
            resource "aws_inspector2_enabler" "example" {
              account_ids    = [data.aws_caller_identity.current.account_id]
              resource_types = ["EC2"]
            }
            ```
        - id: cloudformation
          desc: |
            To ensure Amazon Inspector is enabled for EC2 instance scanning in CloudFormation, note that CloudFormation does not natively support enabling Amazon Inspector scanning. Use the AWS CLI, SDK, or a CloudFormation custom resource to enable Inspector EC2 scanning.
    refs:
      - url: https://docs.aws.amazon.com/inspector/latest/user/getting_started_tutorial.html
        title: Getting started with Amazon Inspector
  - uid: mondoo-aws-security-inspector-ec2-scanning-enabled-aws
    filters: asset.platform == "aws"
    mql: |
      aws.inspector.coverages.where(resourceType == "AWS_EC2_INSTANCE" && statusCode == "ACTIVE").length > 0
  - uid: mondoo-aws-security-inspector-ec2-scanning-enabled-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_inspector2_enabler")
    mql: |
      terraform.resources.where(nameLabel == "aws_inspector2_enabler").all(
      arguments.resource_types.contains("EC2")
      )
  - uid: mondoo-aws-security-inspector-ec2-scanning-enabled-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_inspector2_enabler")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_inspector2_enabler").all(
