      - uid: mondoo-aws-security-kinesis-cmk-typed-key-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-kinesis-cmk-typed-key-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-kinesis-cmk-typed-key-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-kinesis-cmk-typed-key-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon Kinesis Data Streams are encrypted using customer-managed KMS keys (CMK).

        **Why this matters**

        - **Key control:** CMKs allow you to define key policies that control who can use and manage the encryption key protecting stream data.
        - **Audit trail:** All CMK usage is logged in CloudTrail, providing visibility into when and by whom the key was accessed.
        - **Data sovereignty:** CMKs ensure that encryption keys for streaming data remain under your organizational control.

        **Risk mitigation**

        - Configure CMK encryption when creating Kinesis streams.
        - Migrate existing streams by updating the encryption settings to use a CMK.
        - Monitor KMS key usage via CloudTrail for audit purposes.
      remediation:
        - id: console
          desc: |
            To ensure Kinesis streams use customer-managed KMS keys using the AWS Console:

            1. Navigate to the **Kinesis Console**.
            2. Select **Data streams** in the left panel.
            3. Select the stream to review.
            4. Under **Configuration**, check the **Server-side encryption** settings.
            5. If using an AWS-managed key, select **Edit** and select a customer-managed CMK.
            6. Select **Save changes**.
        - id: cli
          desc: |
            To ensure Kinesis streams use customer-managed KMS keys using the AWS CLI, check encryption configuration for a Kinesis stream:

            ```bash
            aws kinesis describe-stream \
              --stream-name <stream-name> \
              --query "StreamDescription.{EncryptionType:EncryptionType,KeyId:KeyId}"
            ```

            Update a stream to use CMK encryption:

            ```bash
            aws kinesis start-stream-encryption \
              --stream-name <stream-name> \
              --encryption-type KMS \
              --key-id <cmk-key-arn>
            ```
        - id: terraform
          desc: |
            To ensure Kinesis streams use customer-managed KMS keys in Terraform:

            ```hcl
            resource "aws_kinesis_stream" "example" {
              name        = "example-stream"
              shard_count = 1

              encryption_type = "KMS"
              kms_key_id      = aws_kms_key.kinesis.arn
            }
            ```
        - id: cloudformation
          desc: |
            To ensure Kinesis streams use customer-managed KMS keys in CloudFormation:

            ```yaml
            Resources:
              MyKinesisStream:
                Type: AWS::Kinesis::Stream
                Properties:
                  Name: example-stream
                  ShardCount: 1
                  StreamEncryption:
                    EncryptionType: KMS
                    KeyId: !Ref MyKmsKey
            ```
    refs:
      - url: https://docs.aws.amazon.com/streams/latest/dev/server-side-encryption.html
        title: AWS Documentation - Data protection in Amazon Kinesis Data Streams
      - url: https://docs.aws.amazon.com/streams/latest/dev/security.html
        title: AWS Documentation - Security in Amazon Kinesis Data Streams
  - uid: mondoo-aws-security-kinesis-cmk-typed-key-aws
