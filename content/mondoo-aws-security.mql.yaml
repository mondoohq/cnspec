    mql: |
      cloudformation.template.resources.where(type == "AWS::S3::Bucket").length == 0
  - uid: mondoo-aws-security-cloud-trail-multi-region-enabled
    title: Ensure CloudTrail is enabled in all regions with a multi-region trail
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-pr-pt-1
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    variants:
      - uid: mondoo-aws-security-cloud-trail-multi-region-enabled-aws
        tags:
          mondoo.com/filter-title: AWS CloudTrail Trail
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-cloud-trail-multi-region-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-cloud-trail-multi-region-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-cloud-trail-multi-region-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-cloud-trail-multi-region-enabled-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that AWS CloudTrail has at least one multi-region trail enabled that is actively logging. By default, CloudTrail trails created through the AWS Console are single-region, recording API activity only in the region where the trail was created and leaving all other regions without an audit record.

        **Why this matters**

        - **Blind spots in single-region trails:** An attacker who creates resources or performs API calls in a region without an active trail leaves no CloudTrail record of the activity, making detection and post-incident investigation impossible.
        - **Global service events require multi-region coverage:** IAM, STS, and CloudFront generate global events that are only captured when a trail is configured as multi-region with global service events enabled.
        - **Delayed detection window:** Without visibility into all regions, unauthorized activity such as new IAM users, cross-region data copies, or lateral movement through lesser-used regions may go undetected until the impact is already significant.

        **Risk mitigation**

        - **Ensure complete API audit coverage:** A multi-region trail with global service events captures every management API call across the entire account, eliminating the coverage gaps that single-region trails leave.
        - **Support threat detection and compliance:** Comprehensive logging is the foundation for detective controls such as GuardDuty, Security Hub, and custom CloudWatch alarms that alert on suspicious activity.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and navigate to the CloudTrail service.
        2. In the left navigation pane, select **Trails**.
        3. Review the **Multi-region trail** column for each trail.
        4. Select a trail and confirm that **Multi-region trail** is set to **Yes** and that **Logging** status shows **Enabled**.

        A passing trail shows **Multi-region trail: Yes** and **Logging: Enabled**. A failing account has no trail with both properties set, or all existing trails show **Multi-region trail: No**.

        ### Audit via CLI

        1. List all trails and check for a multi-region trail that is actively logging:

        ```bash
        aws cloudtrail describe-trails \
          --query "trailList[*].{Name:Name,IsMultiRegion:IsMultiRegionTrail,HomeRegion:HomeRegion}"
        ```

        2. For each trail returned with `IsMultiRegion: true`, confirm it is logging:

        ```bash
        aws cloudtrail get-trail-status \
          --name <trail-name> \
          --query "{IsLogging:IsLogging}"
        ```

        A passing account has at least one trail with `IsMultiRegionTrail: true` and `IsLogging: true`. A failing account has no such trail, or every trail shows `IsMultiRegionTrail: false` or `IsLogging: false`.

      remediation:
        - id: console
          desc: |
            To ensure CloudTrail is enabled in all regions with a multi-region trail using the AWS Console:

            1. Navigate to the AWS CloudTrail Console.
            2. Select Trails in the left panel.
            3. Select the trail you want to update, or create a new trail.
            4. Under General details, ensure the Multi-region trail option is set to Yes.
            5. Ensure Include global service events is also enabled.
            6. Select Save changes.
        - id: cli
          desc: |
            To ensure CloudTrail is enabled in all regions with a multi-region trail using the AWS CLI, check if any trail is configured as a multi-region trail:

            ```bash
            aws cloudtrail describe-trails \
              --query "trailList[*].{Name:Name,IsMultiRegion:IsMultiRegionTrail,IsLogging:HomeRegion}"
            ```

            If no multi-region trail exists, update an existing trail or create a new one:

            ```bash
            aws cloudtrail update-trail \
              --name my-trail \
              --is-multi-region-trail \
              --include-global-service-events
            ```

            Verify that the trail is logging:

            ```bash
            aws cloudtrail get-trail-status --name my-trail \
              --query "{IsLogging:IsLogging}"
            ```
        - id: terraform
          desc: |
            To ensure CloudTrail is enabled in all regions with a multi-region trail in Terraform:

            ```hcl
            resource "aws_cloudtrail" "multi_region_trail" {
              name                          = "multi-region-cloudtrail"
              s3_bucket_name                = aws_s3_bucket.cloudtrail_logs.id
              is_multi_region_trail         = true   # Enable multi-region trail
              include_global_service_events = true   # Include global service events
              enable_logging                = true
              enable_log_file_validation    = true
            }
            ```
        - id: cloudformation
          desc: |
            To ensure CloudTrail is enabled in all regions with a multi-region trail in CloudFormation:

            ```yaml
            Resources:
              MultiRegionCloudTrail:
                Type: "AWS::CloudTrail::Trail"
                Properties:
                  TrailName: "multi-region-cloudtrail"
                  S3BucketName: !Ref CloudTrailLogsBucket
                  IsMultiRegionTrail: true
                  IncludeGlobalServiceEvents: true
                  EnableLogFileValidation: true
                  IsLogging: true
            ```
    refs:
      - url: https://docs.aws.amazon.com/awscloudtrail/latest/userguide/cloudtrail-create-and-update-a-trail.html
        title: AWS Documentation - Creating and updating a trail
      - url: https://docs.aws.amazon.com/securityhub/latest/userguide/cloudtrail-controls.html
        title: AWS Documentation - CloudTrail controls
  - uid: mondoo-aws-security-cloud-trail-multi-region-enabled-aws
    filters: asset.platform == "aws-cloudtrail-trail"
    mql: |
      aws.cloudtrail.trail.isMultiRegionTrail == true
      aws.cloudtrail.trail.isLogging == true
  - uid: mondoo-aws-security-cloud-trail-multi-region-enabled-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_cloudtrail")
    mql: terraform.resources.where(nameLabel == "aws_cloudtrail").any(arguments.is_multi_region_trail == true)
  - uid: mondoo-aws-security-cloud-trail-multi-region-enabled-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_cloudtrail")
    mql: terraform.plan.resourceChanges.where(type == "aws_cloudtrail").any(change.after.is_multi_region_trail == true)
  - uid: mondoo-aws-security-cloud-trail-multi-region-enabled-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_cloudtrail")
    mql: terraform.state.resources.where(type == "aws_cloudtrail").any(values.is_multi_region_trail == true)
  - uid: mondoo-aws-security-cloud-trail-multi-region-enabled-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::CloudTrail::Trail")
    mql: |
      cloudformation.template.resources.where(type == "AWS::CloudTrail::Trail").any(properties['IsMultiRegionTrail'] == true)
  - uid: mondoo-aws-security-cloudfront-viewer-policy-https
    title: Ensure CloudFront distributions require HTTPS for viewer connections
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    variants:
      - uid: mondoo-aws-security-cloudfront-viewer-policy-https-distribution
        tags:
          mondoo.com/filter-title: AWS CloudFront Distribution
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-cloudfront-viewer-policy-https-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-cloudfront-viewer-policy-https-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-cloudfront-viewer-policy-https-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-cloudfront-viewer-policy-https-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon CloudFront distributions are configured to require HTTPS for viewer connections by setting the viewer protocol policy to redirect-to-https or https-only. By default, CloudFront distributions can be created with the allow-all viewer protocol policy, which permits both HTTP and HTTPS connections and exposes viewer traffic to interception.

        **Why this matters**

        - **Unencrypted traffic interception:** When HTTP connections are permitted, an attacker in a position to observe network traffic can read the full content of requests and responses, including authentication tokens and session cookies.
        - **Content tampering in transit:** Unencrypted HTTP traffic is susceptible to man-in-the-middle modification, allowing an attacker to inject malicious scripts or redirect users to attacker-controlled resources.
        - **Session hijacking:** Cookies and authentication headers transmitted over HTTP can be captured and replayed by an attacker who observes the traffic, leading to account takeover without requiring credential compromise.

        **Risk mitigation**

        - **Enforce HTTPS at the distribution level:** Setting the viewer protocol policy to redirect-to-https or https-only ensures every viewer connection is encrypted, regardless of whether the client initially requests HTTP.
        - **Protect all cache behaviors:** Applying HTTPS enforcement to all cache behaviors, not just the default, prevents individual content paths from becoming unencrypted exceptions.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and navigate to the CloudFront service.
        2. Select a distribution from the list.
        3. Open the **Behaviors** tab.
        4. Review the **Viewer protocol policy** column for each cache behavior.

        A passing distribution shows **Redirect HTTP to HTTPS** or **HTTPS only** for every cache behavior. A failing distribution shows **HTTP and HTTPS** (allow-all) for any behavior.

        ### Audit via CLI

        1. List all CloudFront distributions, then check the viewer protocol policy for each one:

        ```bash
        aws cloudfront list-distributions \
          --query "DistributionList.Items[*].{Id:Id,ViewerProtocolPolicy:DefaultCacheBehavior.ViewerProtocolPolicy}"
        ```

        A passing distribution returns `redirect-to-https` or `https-only` in the `ViewerProtocolPolicy` field. A failing distribution returns `allow-all`.

      remediation:
        - id: console
          desc: |
            To ensure CloudFront distributions require HTTPS for viewer connections using the AWS Console:

            1. Navigate to the Amazon CloudFront Console.
            2. Select the distribution you want to update.
            3. Select the Behaviors tab.
            4. Select the default cache behavior and choose Edit.
            5. Under Viewer Protocol Policy, select Redirect HTTP to HTTPS or HTTPS Only.
            6. Select Save changes.
            7. Repeat for any additional cache behaviors.
        - id: cli
          desc: |
            To ensure CloudFront distributions require HTTPS for viewer connections using the AWS CLI, check the viewer protocol policy for a distribution:

            ```bash
            aws cloudfront get-distribution-config --id <distribution-id> \
              --query "DistributionConfig.DefaultCacheBehavior.ViewerProtocolPolicy"
            ```

            If the output shows "allow-all", update the distribution:

            ```bash
            aws cloudfront get-distribution-config --id <distribution-id> > dist-config.json
            # Edit dist-config.json to set ViewerProtocolPolicy to "redirect-to-https"
            aws cloudfront update-distribution --id <distribution-id> \
              --if-match <etag> \
              --distribution-config file://dist-config.json
            ```
        - id: terraform
          desc: |
            To ensure CloudFront distributions require HTTPS for viewer connections in Terraform:

            ```hcl
            resource "aws_cloudfront_distribution" "secure_distribution" {
              enabled = true

              default_cache_behavior {
                viewer_protocol_policy = "redirect-to-https"  # Require HTTPS
                allowed_methods        = ["GET", "HEAD"]
                cached_methods         = ["GET", "HEAD"]
                target_origin_id       = "myS3Origin"

                forwarded_values {
                  query_string = false
                  cookies {
                    forward = "none"
                  }
                }
              }

              origin {
                domain_name = aws_s3_bucket.example.bucket_regional_domain_name
                origin_id   = "myS3Origin"
              }

              restrictions {
                geo_restriction {
                  restriction_type = "none"
                }
              }

              viewer_certificate {
                cloudfront_default_certificate = true
                minimum_protocol_version       = "TLSv1.2_2021"
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure CloudFront distributions require HTTPS for viewer connections in CloudFormation:

            ```yaml
            Resources:
              SecureCloudFrontDistribution:
                Type: "AWS::CloudFront::Distribution"
                Properties:
                  DistributionConfig:
                    Enabled: true
                    DefaultCacheBehavior:
                      ViewerProtocolPolicy: "redirect-to-https"
                      TargetOriginId: "myS3Origin"
                      ForwardedValues:
                        QueryString: false
                    Origins:
                      - Id: "myS3Origin"
                        DomainName: !GetAtt S3Bucket.DomainName
                        S3OriginConfig:
                          OriginAccessIdentity: ""
                    ViewerCertificate:
                      MinimumProtocolVersion: "TLSv1.2_2021"
                      CloudFrontDefaultCertificate: true
            ```
    refs:
      - url: https://docs.aws.amazon.com/AmazonCloudFront/latest/DeveloperGuide/using-https-viewers-to-cloudfront.html
        title: AWS Documentation - Requiring HTTPS for communication between viewers and CloudFront
      - url: https://docs.aws.amazon.com/securityhub/latest/userguide/cloudfront-controls.html
        title: AWS Documentation - CloudFront controls
  - uid: mondoo-aws-security-cloudfront-viewer-policy-https-distribution
