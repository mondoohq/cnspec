  - uid: mondoo-aws-security-rds-snapshot-encrypted
    title: Ensure RDS snapshots are encrypted at rest
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-aws-security-rds-snapshot-encrypted-aws
        tags:
          mondoo.com/filter-title: AWS RDS Snapshot
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-rds-snapshot-encrypted-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-rds-snapshot-encrypted-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-rds-snapshot-encrypted-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Amazon RDS snapshots are encrypted at rest using AWS Key Management Service (KMS). RDS snapshots inherit the encryption status of their source database instance; snapshots created from unencrypted databases remain unencrypted and cannot be encrypted in place without creating a new encrypted copy.

        **Why this matters**

        - **Backup data exposure:** Database snapshots contain a complete copy of all data in the source instance, including customer records, credentials, and financial information, making them as sensitive as the live database.
        - **Snapshot sharing risk:** Unencrypted snapshots can be shared with other AWS accounts or inadvertently made public; once shared, the data is accessible without any cryptographic protection.
        - **Storage-layer breach:** If the underlying S3 storage that holds snapshot data is accessed outside normal API paths, unencrypted snapshots can be read directly, bypassing all IAM and RDS access controls.
        - **Lateral movement:** An attacker with snapshot restore permissions on an unencrypted snapshot can reconstruct the database in a different account or region beyond the reach of the original environment's security controls.

        **Risk mitigation**

        - **Data-at-rest protection:** KMS encryption ensures that snapshot storage is unreadable without valid key authorization, protecting backup data alongside the live database.
        - **Key-level access control:** AWS KMS key policies can restrict which principals are authorized to restore from a snapshot, providing a separate access control layer beyond IAM snapshot permissions.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and open the Amazon RDS console.
        2. In the left navigation, choose Snapshots.
        3. Select Manual or Automated from the filter tabs.
        4. For each snapshot, review the Encryption column.

        A passing snapshot shows a KMS key ARN in the Encryption column. A failing snapshot shows Not encrypted.

        ### Audit via CLI

        1. List all RDS snapshots and filter for unencrypted ones:

        ```bash
        aws rds describe-db-snapshots \
          --query "DBSnapshots[?Encrypted==\`false\`].{SnapshotId:DBSnapshotIdentifier,Status:Status,Encrypted:Encrypted}"
        ```

        A passing environment returns an empty list. A failing environment returns one or more snapshots where `"Encrypted": false`.

      remediation:
        - id: console
          desc: |
            To ensure RDS snapshots are encrypted at rest using the AWS Console:

            1. Navigate to the Amazon RDS Console.
            2. Select Snapshots in the left panel.
            3. For unencrypted snapshots, create an encrypted copy:
               - Select the snapshot and choose Actions > Copy Snapshot.
               - Check Enable Encryption and select a KMS key.
               - Choose Copy Snapshot.
            4. After verifying the encrypted copy, delete the unencrypted original.

            To prevent future unencrypted snapshots, ensure all RDS instances use encryption at rest.
        - id: cli
          desc: |
            To ensure RDS snapshots are encrypted at rest using the AWS CLI, check for unencrypted snapshots:

            ```bash
            aws rds describe-db-snapshots --query "DBSnapshots[?Encrypted==\`false\`].DBSnapshotIdentifier"
            ```

            Create an encrypted copy of an unencrypted snapshot:

            ```bash
            aws rds copy-db-snapshot \
              --source-db-snapshot-identifier <snapshot-id> \
              --target-db-snapshot-identifier <encrypted-snapshot-id> \
              --kms-key-id <kms-key-id>
            ```
        - id: terraform
          desc: |
            To ensure RDS snapshots are encrypted at rest in Terraform, ensure RDS instances are encrypted so snapshots inherit encryption:

            ```hcl
            resource "aws_db_instance" "example" {
              engine               = "mysql"
              instance_class       = "db.t3.micro"
              allocated_storage    = 20
              storage_encrypted    = true
              kms_key_id           = aws_kms_key.rds.arn
            }
            ```
        - id: cloudformation
          desc: |
            To ensure RDS snapshots are encrypted at rest in CloudFormation:

            ```yaml
            Resources:
              RDSInstance:
                Type: AWS::RDS::DBInstance
                Properties:
                  Engine: mysql
                  DBInstanceClass: db.t3.micro
                  AllocatedStorage: 20
                  StorageEncrypted: true
                  KmsKeyId: !GetAtt RDSKey.Arn
            ```
    refs:
      - url: https://docs.aws.amazon.com/AmazonRDS/latest/UserGuide/Overview.Encryption.html
        title: AWS Documentation - Encrypting Amazon RDS resources
  - uid: mondoo-aws-security-rds-snapshot-encrypted-aws
    filters: asset.platform == "aws-rds-snapshot"
    mql: |
      aws.rds.snapshot.encrypted == true
  - uid: mondoo-aws-security-rds-snapshot-encrypted-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_db_snapshot")
    mql: |
      terraform.resources.where(nameLabel == "aws_db_snapshot").all(
        arguments['encrypted'] == true
      )
  - uid: mondoo-aws-security-rds-snapshot-encrypted-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_db_snapshot")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_db_snapshot").all(
        change.after.encrypted == true
      )
  - uid: mondoo-aws-security-rds-snapshot-encrypted-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_db_snapshot")
    mql: |
      terraform.state.resources.where(type == "aws_db_snapshot").all(
        values.encrypted == true
      )
  - uid: mondoo-aws-security-ec2-ami-public-sharing-prohibited
    title: Ensure AMIs owned by the account are not publicly shared
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-2-1
    variants:
      - uid: mondoo-aws-security-ec2-ami-public-sharing-prohibited-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-ec2-ami-public-sharing-prohibited-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ec2-ami-public-sharing-prohibited-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ec2-ami-public-sharing-prohibited-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Amazon Machine Images (AMIs) owned by the account are not configured with public launch permissions. Publicly shared AMIs can be launched by any AWS account globally, potentially exposing proprietary software, embedded secrets, internal configurations, and sensitive data baked into the image during its build process.

        **Why this matters**

        - **Credential exposure:** AMIs created from running instances may contain embedded SSH keys, API tokens, database connection strings, or application secrets that become accessible to anyone who launches the image.
        - **Intellectual property leakage:** Custom application binaries, scripts, and configurations within the AMI become available to competitors or attackers once the image is publicly visible.
        - **Vulnerability reconnaissance:** Attackers who can launch a copy of a public AMI can analyze it offline for vulnerabilities, weak configurations, and hardcoded credentials, then target running instances based on those findings.
        - **Compliance risk:** Inadvertent public sharing may violate data protection obligations if the AMI contains regulated data or system configurations.

        **Risk mitigation**

        - **Access restriction:** Removing public launch permissions ensures AMIs are used only by explicitly authorized AWS accounts.
        - **Secret exposure prevention:** Keeping AMIs private limits the blast radius if secrets were inadvertently baked into an image, as they remain inaccessible to external parties.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and open the Amazon EC2 console.
        2. In the left navigation, under Images, choose AMIs.
        3. Set the filter to Owned by me.
        4. Select each AMI and choose the Permissions tab.
        5. Check whether the AMI permission is set to Public.

        A passing AMI shows Private under AMI permissions with no public launch permission group. A failing AMI shows Public.

        ### Audit via CLI

        1. List all AMIs owned by the account that have public launch permissions:

        ```bash
        aws ec2 describe-images \
          --owners self \
          --query "Images[?Public==\`true\`].{ImageId:ImageId,Name:Name,Public:Public}"
        ```

        A passing account returns an empty list. A failing account returns one or more AMIs where `"Public": true`.

      remediation:
        - id: console
          desc: |
            To ensure AMIs owned by the account are not publicly shared using the AWS Console:

            1. Navigate to the Amazon EC2 Console.
            2. Select AMIs under Images in the left panel.
            3. Filter by Owned by me.
            4. Select each AMI and check the Permissions tab.
            5. If the AMI is public, select Edit AMI permissions.
            6. Change the setting from Public to Private.
            7. Optionally add specific AWS account IDs that should have access.
        - id: cli
          desc: |
            To ensure AMIs owned by the account are not publicly shared using the AWS CLI, list public AMIs owned by your account:

            ```bash
            aws ec2 describe-images --owners self --query "Images[?Public==\`true\`].ImageId"
            ```

            Make a public AMI private:

            ```bash
            aws ec2 modify-image-attribute \
              --image-id <ami-id> \
              --launch-permission "Remove=[{Group=all}]"
            ```

            Enable AMI Block Public Access at the account level:

            ```bash
            aws ec2 enable-image-block-public-access --image-block-public-access-state block-new-sharing
            ```
        - id: terraform
          desc: |
            To ensure AMIs owned by the account are not publicly shared in Terraform, ensure AMIs are not publicly shared:

            ```hcl
            resource "aws_ami" "example" {
              name                = "example-ami"
              virtualization_type = "hvm"
              root_device_name    = "/dev/xvda"

              ebs_block_device {
                device_name = "/dev/xvda"
                snapshot_id = aws_ebs_snapshot.example.id
              }
            }

            # Do not add launch permissions with group = "all"
            resource "aws_ami_launch_permission" "example" {
              image_id   = aws_ami.example.id
              account_id = "123456789012"  # Share with specific accounts only
            }
            ```
        - id: cloudformation
          desc: |
            To ensure AMIs owned by the account are not publicly shared in CloudFormation, AMI sharing is managed through the EC2 API rather than CloudFormation. Use the AWS CLI or Console to manage AMI permissions, or enable AMI Block Public Access at the account level.
    refs:
      - url: https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/sharing-amis.html
        title: AWS Documentation - Share an AMI with specific organizations or accounts
      - url: https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/block-public-access-to-amis.html
        title: AWS Documentation - Block public access to your AMIs
  - uid: mondoo-aws-security-ec2-ami-public-sharing-prohibited-aws
    filters: asset.platform == "aws"
    mql: |
      aws.ec2.images.all(
        launchPermissions.none(group == "all")
      )
  - uid: mondoo-aws-security-ec2-ami-public-sharing-prohibited-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_ami_launch_permission")
    mql: |
      terraform.resources.where(nameLabel == "aws_ami_launch_permission").none(
        arguments.group == "all"
      )
  - uid: mondoo-aws-security-ec2-ami-public-sharing-prohibited-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_ami_launch_permission")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_ami_launch_permission").none(
        change.after.group == "all"
      )
  - uid: mondoo-aws-security-ec2-ami-public-sharing-prohibited-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_ami_launch_permission")
    mql: |
      terraform.state.resources.where(type == "aws_ami_launch_permission").none(
        values.group == "all"
      )
  - uid: mondoo-aws-security-ecs-container-non-root-user
    title: Ensure ECS task definitions specify a non-root user for containers
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-2
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-5
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-3-3
      compliance/vda-isa-5: vda-isa-5-4-2-1
    variants:
      - uid: mondoo-aws-security-ecs-container-non-root-user-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-ecs-container-non-root-user-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ecs-container-non-root-user-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ecs-container-non-root-user-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ecs-container-non-root-user-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon ECS task definitions specify a non-root user for each container definition, preventing container processes from running as UID 0. By default, most container images run as root unless a non-root user is explicitly set in the task definition or the container image's Dockerfile.

        **Why this matters**

        - **Container escape risk:** Root processes inside a container are better positioned to exploit kernel vulnerabilities that cross the container boundary and gain access to the underlying host.
        - **File system access:** A root container process can read and modify all mounted volume content, including shared EFS volumes, secrets mounted as files, and any data written by other containers in the same task.
        - **Privilege escalation path:** If an attacker achieves remote code execution inside a root container, they begin with maximum in-container capabilities and require no further privilege escalation to access sensitive resources within the container's scope.
        - **Defense in depth:** Running as a non-root user is a foundational hardening measure that complements read-only filesystems, dropped capabilities, and seccomp profiles.

        **Risk mitigation**

        - **Least privilege:** A non-root user limits what an attacker can do after compromising a container, requiring additional steps to access root-owned resources.
        - **Host protection:** Non-root processes are less likely to succeed in exploiting container runtime vulnerabilities that require elevated privileges to trigger.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and open the Amazon ECS console.
        2. In the left navigation, choose Task definitions.
        3. Select a task definition and choose the latest active revision.
        4. Under Container definitions, select a container and expand the configuration.
        5. Locate the User field under Container configuration.

        A passing container definition shows a non-root user such as `1000` or a named non-root user in the User field. A failing container definition shows root, 0, or an empty User field.

        ### Audit via CLI

        1. List active task definition ARNs and inspect the user field for each container definition:

        ```bash
        aws ecs describe-task-definition \
          --task-definition <task-definition-name> \
          --query 'taskDefinition.containerDefinitions[*].{Name:name,User:user}'
        ```

        A passing task definition returns a non-empty, non-root value for every container's `user` field. A failing task definition returns an empty, `root`, or `0` user for at least one container.

      remediation:
        - id: console
          desc: |
            To ensure ECS task definitions specify a non-root user for containers using the AWS Console:

            1. Navigate to the Amazon ECS Console.
            2. Select Task definitions in the left panel.
            3. Select the task definition to review.
            4. For each container definition, check the User setting under Container configuration.
            5. Set the User field to a non-root user such as `1000` or `appuser`.
            6. Create a new revision with the updated setting.
        - id: cli
          desc: |
            To ensure ECS task definitions specify a non-root user for containers using the AWS CLI, check for containers running as root in task definitions:

            ```bash
            aws ecs list-task-definitions --status ACTIVE --query "taskDefinitionArns" | \
              xargs -I {} aws ecs describe-task-definition --task-definition {} \
              --query "taskDefinition.containerDefinitions[*].{Name:name, User:user}"
            ```

            Register a new task definition revision with a non-root user:

            ```bash
            aws ecs register-task-definition --cli-input-json file://task-definition.json
            ```

            Ensure the container definition in your JSON file has `"user": "1000"` or a named non-root user.
        - id: terraform
          desc: |
            To ensure ECS task definitions specify a non-root user for containers in Terraform, ensure container definitions specify a non-root user:

            ```hcl
            resource "aws_ecs_task_definition" "example" {
              family = "example"

              container_definitions = jsonencode([
                {
                  name      = "app"
                  image     = "example:latest"
                  essential = true
                  user      = "1000"  # Non-root user
                }
              ])
            }
            ```
        - id: cloudformation
          desc: |
            To ensure ECS task definitions specify a non-root user for containers in CloudFormation:

            ```yaml
            Resources:
              TaskDefinition:
                Type: "AWS::ECS::TaskDefinition"
                Properties:
                  Family: "example"
                  ContainerDefinitions:
                    - Name: "app"
                      Image: "example:latest"
                      Essential: true
                      User: "1000"
            ```
    refs:
      - url: https://docs.aws.amazon.com/AmazonECS/latest/bestpracticesguide/security-runtime.html
        title: AWS Documentation - Runtime security for Amazon ECS
      - url: https://docs.aws.amazon.com/AmazonECS/latest/developerguide/task_definition_parameters.html
        title: AWS Documentation - Task definition parameters
  - uid: mondoo-aws-security-ecs-container-non-root-user-aws
    filters: asset.platform == "aws"
    mql: |
      aws.ecs.taskDefinitions.all(
        containerDefinitions.all(user != empty && user != "root" && user != "0")
      )
  - uid: mondoo-aws-security-ecs-container-non-root-user-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_ecs_task_definition")
    mql: |
      terraform.resources.where(nameLabel == "aws_ecs_task_definition").all(
        arguments.container_definitions.all(
          _['user'] != empty && _['user'] != "root" && _['user'] != "0"
        )
      )
  - uid: mondoo-aws-security-ecs-container-non-root-user-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_ecs_task_definition")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_ecs_task_definition").all(
        change.after.container_definitions.all(
          _['user'] != empty && _['user'] != "root" && _['user'] != "0"
        )
      )
  - uid: mondoo-aws-security-ecs-container-non-root-user-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_ecs_task_definition")
    mql: |
      terraform.state.resources.where(type == "aws_ecs_task_definition").all(
        values.container_definitions.all(
          _['user'] != empty && _['user'] != "root" && _['user'] != "0"
        )
      )
  - uid: mondoo-aws-security-ecs-container-non-root-user-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::ECS::TaskDefinition")
    mql: |
      cloudformation.template.resources.where(type == "AWS::ECS::TaskDefinition").all(
      properties['ContainerDefinitions'].all(
      _['User'] != empty && _['User'] != "root" && _['User'] != "0"
      )
      )
