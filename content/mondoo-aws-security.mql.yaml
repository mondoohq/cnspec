  - uid: mondoo-aws-security-mfa-enabled-for-iam-console-access
    title: Ensure MFA is enabled for all IAM users with console access
    impact: 90
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-j
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-3
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-3
    variants:
      - uid: mondoo-aws-security-mfa-enabled-for-iam-console-access-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-mfa-enabled-for-iam-console-access-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-mfa-enabled-for-iam-console-access-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-mfa-enabled-for-iam-console-access-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that all AWS IAM users with console access have Multi-Factor Authentication (MFA) enabled. MFA provides an additional layer of security beyond just a username and password, reducing the risk of unauthorized account access in case credentials are compromised.

        **Why this matters**

        IAM users with console access rely on password-based authentication, which is vulnerable to phishing, credential leaks, and brute-force attacks. Without MFA, an attacker who obtains an IAM user's password can gain unauthorized access to AWS resources. Enforcing MFA helps mitigate this risk by requiring a second factor, such as a one-time code from a mobile authenticator app or a hardware security key.

        AWS best practices and security frameworks such as CIS AWS Foundations Benchmark, PCI DSS, NIST, ISO 27001, and SOC 2 require MFA for all users with administrative or privileged access.

        **Risk mitigation**

        - Prevents unauthorized access due to stolen or weak passwords
        - Enhances security posture by enforcing multi-layer authentication
        - Aligns with compliance and security best practices
      remediation:
        - id: console
          desc: |
            To ensure MFA is enabled for all IAM users with console access using the AWS Console:

            1.  Navigate to the AWS IAM Console.
            2.  Select Users in the left panel.
            3.  Identify users with Console Access enabled.
            4.  Select a user and go to the Security Credentials tab.
            5.  Under Multi-Factor Authentication (MFA), check if MFA is enabled.
            6.  If MFA is not enabled:
              - Select Assign MFA Device
              - Choose a method (Virtual MFA Device, FIDO Security Key, or Hardware MFA Token)
              - Follow the setup process and enter the required MFA codes
            7.  Repeat this process for all IAM users with console access.
        - id: cli
          desc: |
            To ensure MFA is enabled for all IAM users with console access using the AWS CLI, list IAM users with console access and check their MFA status:

            ```bash
            aws iam list-users --query "Users[*].UserName"
            ```

            For each user, check if MFA is enabled:

            ```bash
            aws iam list-mfa-devices --user-name <username>
            ```

            If no MFA device is listed, enforce MFA by setting up a virtual MFA device:

            ```bash
            aws iam enable-mfa-device --user-name <username> --serial-number "arn-of-mfa-device" --authentication-code1 123456 --authentication-code2 654321
            ```
        - id: terraform
          desc: |
            To ensure MFA is enabled for all IAM users with console access in Terraform, AWS does not allow enforcing MFA directly via Terraform, but you can create an IAM policy that denies access unless MFA is enabled:

            ```hcl
            resource "aws_iam_policy" "enforce_mfa" {
              name        = "EnforceMFA"
              description = "Require MFA for all IAM users with console access"

              policy = jsonencode({
                Version = "2012-10-17",
                Statement = [
                  {
                    Effect   = "Deny",
                    Action   = [
                      "ec2:*",
                      "s3:*",
                      "iam:*",
                      "lambda:*"
                    ],
                    Resource  = "*",
                    Condition = {
                      Bool = {
                        "aws:MultiFactorAuthPresent": "false"
                      }
                    }
                  }
                ]
              })
            }
            ```
        - id: cloudformation
          desc: |
            To ensure MFA is enabled for all IAM users with console access in CloudFormation:

            ```yaml
            Resources:
              EnforceMFAPolicy:
                Type: AWS::IAM::ManagedPolicy
                Properties:
                  ManagedPolicyName: EnforceMFA
                  Description: Require MFA for all IAM users with console access
                  PolicyDocument:
                    Version: '2012-10-17'
                    Statement:
                      - Effect: Deny
                        Action:
                          - 'ec2:*'
                          - 's3:*'
                          - 'iam:*'
                          - 'lambda:*'
                        Resource: '*'
                        Condition:
                          Bool:
                            'aws:MultiFactorAuthPresent': 'false'

            ```
    refs:
      - url: https://docs.aws.amazon.com/IAM/latest/UserGuide/id_credentials_mfa.html
        title: AWS Multi-factor authentication in IAM
      - url: https://docs.aws.amazon.com/IAM/latest/UserGuide/id_credentials_mfa_enable_virtual.html
        title: Assign a virtual MFA device in the AWS Management Console
      - url: https://registry.terraform.io/providers/hashicorp/aws/latest/docs
        title: Terraform Documentation - AWS Provider
  - uid: mondoo-aws-security-mfa-enabled-for-iam-console-access-aws
    filters: asset.platform == "aws"
    mql: |
      aws.iam.credentialReport.where(passwordEnabled == true).all(mfaActive == true)
  - uid: mondoo-aws-security-mfa-enabled-for-iam-console-access-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_iam_policy")
    mql: |
      terraform.resources.where(nameLabel == "aws_iam_policy").any(
        arguments.policy.any(
          _['Statement'].any(
            _['Condition']['Bool']['aws:MultiFactorAuthPresent'] == false
              && _['Effect'] == "Deny"
              && _['Resource'] == "*"
          )
        )
      )
  - uid: mondoo-aws-security-mfa-enabled-for-iam-console-access-terraform-plan
    filters: asset.platform == "terraform-plan"
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_iam_policy").any(
        change.after.policy.contains('Deny') &&
        change.after.policy.contains('aws:MultiFactorAuthPresent') &&
        change.after.policy.contains('false')
      )
  - uid: mondoo-aws-security-mfa-enabled-for-iam-console-access-terraform-state
    filters: asset.platform == "terraform-state"
    mql: |
      terraform.state.resources.where(type == "aws_iam_policy").any(
        values.policy.contains('Deny') &&
        values.policy.contains('aws:MultiFactorAuthPresent') &&
        values.policy.contains('false')
      )
  - uid: mondoo-aws-security-iam-group-has-users-check
    title: Ensure IAM groups are utilized by assigning at least one user
    impact: 30
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-3-1
      compliance/vda-isa-5: vda-isa-5-4-1-1
    variants:
      - uid: mondoo-aws-security-iam-group-has-users-check-aws
        tags:
          mondoo.com/filter-title: AWS IAM Group
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-iam-group-has-users-check-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-iam-group-has-users-check-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-iam-group-has-users-check-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that IAM groups in AWS have at least one assigned user. Empty IAM groups with attached policies represent a privilege escalation risk: an attacker with `iam:AddUserToGroup` permissions can add themselves or a compromised user to an empty group and instantly inherit all of its permissions without creating new policies that would be more visible in audit logs.

        **Why this matters**

        Empty IAM groups with policies attached are a latent privilege escalation path:

        - An attacker with `iam:AddUserToGroup` permissions can silently escalate privileges by joining an empty group, inheriting its policies without triggering policy-creation alerts.
        - Empty groups are often overlooked during access reviews because they appear unused, making them ideal hiding spots for pre-staged permissions.
        - Groups created for former roles or projects may retain broad permissions that exceed what current workloads require, providing excessive access if exploited.

        **Risk mitigation**

        - **Privilege escalation prevention:** Removing empty groups eliminates pre-staged permission sets that an attacker could exploit with a single API call.
        - **Access review accuracy:** Ensures all groups with permissions are actively used and reviewed, closing blind spots in security audits.
        - **Attack surface reduction:** Reduces the number of permission paths an attacker can exploit after initial credential compromise.
      remediation:
        - id: console
          desc: |
            To ensure IAM groups are utilized by assigning at least one user using the AWS Console:

            1.  Navigate to the AWS IAM Console.
            2.  Select Groups in the left panel.
            3.  Review IAM groups and check if they have at least one assigned user.
            4.  If a group has no users:
              - Select the group name.
              - Go to the Users tab and select Add Users to Group.
              - Select the appropriate users and select Add Users.
            5.  If an IAM group is not needed, consider deleting it to reduce clutter.
        - id: cli
          desc: |
            To ensure IAM groups are utilized by assigning at least one user using the AWS CLI, list all IAM groups:

            ```bash
            aws iam list-groups --query "Groups[*].GroupName"
            ```

            Check if an IAM group has users assigned:

            ```bash
            aws iam get-group --group-name <group-name> --query "Users[*].UserName"
            ```

            If a group has no users, add a user to the group:

            ```bash
            aws iam add-user-to-group --group-name <group-name> --user-name <user-name>
            ```

            If a group is unused and unnecessary, delete it:

            ```bash
            aws iam delete-group --group-name <group-name>
            ```
        - id: terraform
          desc: |
            To ensure IAM groups are utilized by assigning at least one user in Terraform, ensure IAM users are assigned to groups in Terraform:

            ```hcl
            resource "aws_iam_group" "admins" {
              name = "Admins"
            }

            resource "aws_iam_user" "user1" {
              name = "user1"
            }

            resource "aws_iam_group_membership" "admin_membership" {
              name  = "admin-membership"
              group = aws_iam_group.admins.name
              users = [aws_iam_user.user1.name]
            }
            ```
        - id: cloudformation
          desc: |
            To ensure IAM groups are utilized by assigning at least one user in CloudFormation, CloudFormation can manage IAM groups and group memberships. To ensure IAM groups have at least one user:

            ```yaml
            Resources:
              # Create an IAM group
              AdminGroup:
                Type: "AWS::IAM::Group"
                Properties:
                  GroupName: "Administrators"
                  Path: "/"
                  ManagedPolicyArns:
                    - "arn:aws:iam::aws:policy/AdministratorAccess"

              # Create an IAM user
              AdminUser:
                Type: "AWS::IAM::User"
                Properties:
                  UserName: "admin-user"
                  Path: "/"

              # Add user to the group
              GroupMembership:
                Type: "AWS::IAM::UserToGroupAddition"
                Properties:
                  GroupName: !Ref AdminGroup
                  Users:
                    - !Ref AdminUser
            ```
    refs:
      - url: https://docs.aws.amazon.com/IAM/latest/UserGuide/id_groups_manage.html
        title: AWS Documentation - IAM user groups
  - uid: mondoo-aws-security-iam-group-has-users-check-aws
    filters: asset.platform == "aws-iam-group"
    mql: aws.iam.group.usernames != empty
  - uid: mondoo-aws-security-iam-group-has-users-check-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_iam_group_membership")
    mql: |
      terraform.resources.where(nameLabel == "aws_iam_group_membership").all(
