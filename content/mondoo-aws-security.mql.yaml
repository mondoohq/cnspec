  - uid: mondoo-aws-security-sns-topic-encrypted
    title: Ensure SNS topics are encrypted with KMS
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-aws-security-sns-topic-encrypted-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-sns-topic-encrypted-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-sns-topic-encrypted-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-sns-topic-encrypted-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-sns-topic-encrypted-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon SNS topics are encrypted using AWS KMS. Without encryption, messages published to SNS topics are stored in plaintext, which could expose sensitive data.

        **Why this matters**

        - SNS topics may contain sensitive notifications, alerts, or data that should be protected at rest.
        - Without KMS encryption, messages are stored unencrypted on the SNS service infrastructure.
        - AWS Security Hub control SNS.1 requires SNS topics to be encrypted at rest using KMS.
        - Compliance frameworks such as PCI DSS and HIPAA require encryption of data at rest.

        **Risk mitigation**

        - **Data protection:** Encrypts messages at rest using KMS keys.
        - **Access control:** KMS key policies provide additional access control over who can publish and subscribe.
        - **Compliance:** Meets regulatory requirements for data-at-rest encryption.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and navigate to the Amazon SNS service.
        2. In the left navigation pane, select **Topics**.
        3. Select a topic to inspect.
        4. In the **Details** section, locate the **Encryption** field.
        5. Verify that encryption is enabled and a KMS key is listed.
        6. Repeat for each topic in the account.

        A passing topic shows a KMS key ARN under **Encryption**. A failing topic shows encryption as **Disabled** or no KMS key.

        ### Audit via CLI

        1. List all SNS topic ARNs and retrieve their encryption attribute:

        ```bash
        aws sns get-topic-attributes \
          --topic-arn <topic-arn> \
          --query 'Attributes.KmsMasterKeyId'
        ```

        A passing topic returns a non-empty KMS key ID or ARN. A failing topic returns `null` or an empty string.

      remediation:
        - id: console
          desc: |
            To ensure SNS topics are encrypted with KMS using the AWS Console:

            1. Navigate to the Amazon SNS Console.
            2. Select the topic.
            3. Choose Edit.
            4. Under Encryption, enable encryption and select a KMS key.
            5. Choose Save changes.
        - id: cli
          desc: |
            To ensure SNS topics are encrypted with KMS using the AWS CLI:

            ```bash
            aws sns set-topic-attributes \
              --topic-arn <topic-arn> \
              --attribute-name KmsMasterKeyId \
              --attribute-value <kms-key-id>
            ```
        - id: terraform
          desc: |
            To ensure SNS topics are encrypted with KMS in Terraform:

            ```hcl
            resource "aws_sns_topic" "example" {
              name              = "example-topic"
              kms_master_key_id = aws_kms_key.sns.arn
            }
            ```
        - id: cloudformation
          desc: |
            To ensure SNS topics are encrypted with KMS in CloudFormation:

            ```yaml
            Resources:
              SNSTopic:
                Type: AWS::SNS::Topic
                Properties:
                  TopicName: example-topic
                  KmsMasterKeyId: !GetAtt SNSKey.Arn
            ```
    refs:
      - url: https://docs.aws.amazon.com/sns/latest/dg/sns-server-side-encryption.html
        title: AWS Documentation - Encryption at rest for Amazon SNS
  - uid: mondoo-aws-security-sns-topic-encrypted-aws
    filters: asset.platform == "aws"
    mql: |
      aws.sns.topics.all(
        attributes["KmsMasterKeyId"] != empty
      )
  - uid: mondoo-aws-security-sns-topic-encrypted-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_sns_topic")
    mql: |
      terraform.resources.where(nameLabel == "aws_sns_topic").all(
