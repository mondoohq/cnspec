      terraform.resources.where(nameLabel == "aws_s3_bucket_versioning").all(
      blocks.where(type == "versioning_configuration") != empty &&
      blocks.where(type == "versioning_configuration").all(arguments.mfa_delete == "Enabled")
      )
  - uid: mondoo-aws-security-s3-mfa-delete-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_s3_bucket_versioning")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_s3_bucket_versioning").all(
      change.after.versioning_configuration != empty &&
      change.after.versioning_configuration.all(mfa_delete == "Enabled")
      )
  - uid: mondoo-aws-security-s3-mfa-delete-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_s3_bucket_versioning")
    mql: |
      terraform.state.resources.where(type == "aws_s3_bucket_versioning").all(
      values.versioning_configuration != empty &&
      values.versioning_configuration.all(mfa_delete == "Enabled")
      )
  - uid: mondoo-aws-security-s3-mfa-delete-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::S3::Bucket")
    mql: |
      cloudformation.template.resources.where(type == "AWS::S3::Bucket").all(
      properties['VersioningConfiguration'] != empty && properties['VersioningConfiguration']['Status'] == "Enabled"
      )
  - uid: mondoo-aws-security-elasticsearch-enforce-https
    title: Ensure Elasticsearch domains enforce HTTPS
    impact: 80
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    variants:
      - uid: mondoo-aws-security-elasticsearch-enforce-https-aws
        tags:
          mondoo.com/filter-title: AWS ES Domain
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-elasticsearch-enforce-https-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-elasticsearch-enforce-https-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-elasticsearch-enforce-https-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-elasticsearch-enforce-https-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon Elasticsearch Service domains are configured to require HTTPS for all traffic. When HTTPS is not enforced, communication between clients and the Elasticsearch domain occurs over plaintext HTTP, exposing query data and results to network-level interception.

        **Why this matters**

        - Elasticsearch domains often contain sensitive data such as application logs, user activity, and business analytics. Plaintext HTTP exposes this data to eavesdropping on the network path.
        - Without HTTPS enforcement, clients may unknowingly connect over HTTP, transmitting credentials and query payloads in the clear.
        - Enforcing HTTPS ensures all client-to-domain communication is encrypted with TLS, protecting data confidentiality and integrity in transit.

        **Risk mitigation**

        - **Confidentiality:** Prevents interception of search queries, results, and authentication credentials in transit.
        - **Integrity:** TLS protects against tampering with data exchanged between clients and the Elasticsearch cluster.
        - **Compliance:** Satisfies in-transit encryption requirements under PCI DSS, HIPAA, NIST SP 800-53 SC-8, and SOC 2.
      remediation:
        - id: console
          desc: |
            To ensure Elasticsearch domains enforce HTTPS using the AWS Console:

            1. Navigate to the **Amazon Elasticsearch Service Console** and select **Domains**.
            2. Select the domain you want to configure.
            3. Choose **Edit domain** or **Actions** > **Edit security configuration**.
            4. Under **Domain access policy** or **HTTPS**, enable **Require HTTPS for all traffic to the domain**.
            5. Choose **Save changes**.
        - id: cli
          desc: |
            To ensure Elasticsearch domains enforce HTTPS using the AWS CLI, update the domain to enforce HTTPS:

