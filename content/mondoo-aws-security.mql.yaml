  - uid: mondoo-aws-security-documentdb-instance-auto-minor-version-upgrade
    title: Ensure DocumentDB instances have automatic minor version upgrades enabled
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-tvm-03
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-8
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-12
      compliance/nist-csf-2: nist-csf-2-pr-ps-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-1
      compliance/pci-dss-4: pcidss-requirement-6-3-3
      compliance/soc2-2017: soc2-control-cc7-1-1
      compliance/vda-isa-5: vda-isa-5-5-2-5
    variants:
      - uid: mondoo-aws-security-documentdb-instance-auto-minor-version-upgrade-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-documentdb-instance-auto-minor-version-upgrade-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-documentdb-instance-auto-minor-version-upgrade-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-documentdb-instance-auto-minor-version-upgrade-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-documentdb-instance-auto-minor-version-upgrade-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon DocumentDB instances have automatic minor version upgrades enabled. When enabled, instances automatically receive minor engine version upgrades during the maintenance window, ensuring security patches and bug fixes are applied promptly.

        **Why this matters**

        - Minor version upgrades typically include security patches that address known vulnerabilities in the database engine.
        - Without automatic upgrades, instances may run outdated engine versions with known security vulnerabilities for extended periods.
        - Manual upgrade processes introduce delays between patch availability and application, increasing the window of exposure.
        - Keeping database engines up to date is a fundamental requirement for compliance with security frameworks that mandate timely patch management.

        **Risk mitigation**

        - **Patch management:** Ensures security patches are applied automatically during the next maintenance window.
        - **Vulnerability reduction:** Minimizes the time window during which known vulnerabilities remain unpatched.
        - **Compliance:** Meets requirements for timely application of security updates in managed database services.
      audit: |
        ### Audit via Console

        1. Navigate to the **Amazon DocumentDB Console** at Services > DocumentDB.
        2. Select **Instances** in the left navigation panel.
        3. Select the instance to inspect.
        4. Choose the **Maintenance** tab.
        5. Locate the **Auto minor version upgrade** field.

        A passing instance shows **Auto minor version upgrade: Yes**. A failing instance shows **Auto minor version upgrade: No**.

        ### Audit via CLI

        1. List all DocumentDB instances and their auto minor version upgrade setting:

        ```bash
        aws docdb describe-db-instances \
          --query "DBInstances[*].{Instance:DBInstanceIdentifier,AutoUpgrade:AutoMinorVersionUpgrade}"
        ```

        A passing instance returns `"AutoUpgrade": true`. A failing instance returns `"AutoUpgrade": false`.
      remediation:
        - id: console
          desc: |
            To ensure DocumentDB instances have automatic minor version upgrades enabled using the AWS Console:

            1. Navigate to the Amazon DocumentDB Console.
            2. Select **Instances** in the left panel.
            3. Select the instance to modify.
            4. Choose **Modify**.
            5. Under **Maintenance**, enable **Auto minor version upgrade**.
            6. Choose **Apply immediately** or **Apply during the next maintenance window**.
            7. Choose **Modify instance**.
        - id: cli
          desc: |
            To ensure DocumentDB instances have automatic minor version upgrades enabled using the AWS CLI, enable automatic minor version upgrades for a DocumentDB instance:

            ```bash
            aws docdb modify-db-instance \
              --db-instance-identifier <instance-id> \
              --auto-minor-version-upgrade \
              --apply-immediately
            ```

            Verify the setting:

            ```bash
            aws docdb describe-db-instances --db-instance-identifier <instance-id> \
              --query "DBInstances[*].{Instance:DBInstanceIdentifier,AutoUpgrade:AutoMinorVersionUpgrade}"
            ```
        - id: terraform
          desc: |
            To ensure DocumentDB instances have automatic minor version upgrades enabled in Terraform, enable automatic minor version upgrades:

            ```hcl
            resource "aws_docdb_cluster_instance" "example" {
              identifier                 = "docdb-instance"
              cluster_identifier         = aws_docdb_cluster.example.id
              instance_class             = "db.r5.large"
              auto_minor_version_upgrade = true
            }
            ```
        - id: cloudformation
          desc: |
            To ensure DocumentDB instances have automatic minor version upgrades enabled in CloudFormation, enable `AutoMinorVersionUpgrade`:

            ```yaml
            Resources:
              DocDBInstance:
                Type: AWS::DocDB::DBInstance
                Properties:
                  DBClusterIdentifier: !Ref DocDBCluster
                  DBInstanceClass: db.r5.large
                  AutoMinorVersionUpgrade: true
            ```
    refs:
      - url: https://docs.aws.amazon.com/documentdb/latest/developerguide/db-instance-modify.html
        title: Modifying an Amazon DocumentDB Instance
  - uid: mondoo-aws-security-documentdb-instance-auto-minor-version-upgrade-aws
    filters: asset.platform == "aws"
    mql: aws.documentdb.instances.all(autoMinorVersionUpgrade == true)
