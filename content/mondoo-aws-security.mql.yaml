      - uid: mondoo-aws-security-secgroup-restricted-oracle-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-secgroup-restricted-oracle-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that AWS security groups do not allow inbound traffic on the Oracle Database listener port (1521) from `0.0.0.0/0` or `::/0`.

        **Why this matters**

        Public exposure of the Oracle TNS listener has historically been used to enumerate SIDs, brute-force database credentials, and exploit listener-level vulnerabilities. Restricting the listener to internal subnets eliminates the entire class of internet-borne attacks against the database.
      remediation:
        - id: cli
          desc: |
            ```bash
            aws ec2 revoke-security-group-ingress \
              --group-id <sg-id> \
              --ip-permissions IpProtocol=tcp,FromPort=1521,ToPort=1521,IpRanges='[{CidrIp=0.0.0.0/0}]'
            ```
        - id: terraform
          desc: |
            Replace any `0.0.0.0/0` or `::/0` source on port 1521 with the application-tier security group, VPN CIDR, or specific bastion address. The example shows the modern `aws_vpc_security_group_ingress_rule` form; the same rule applies to inline `ingress` blocks on `aws_security_group`:

            ```hcl
            resource "aws_vpc_security_group_ingress_rule" "from_app" {
              security_group_id            = aws_security_group.workload.id
              referenced_security_group_id = aws_security_group.app.id
              ip_protocol                  = "tcp"
              from_port                    = 1521
              to_port                      = 1521
            }
            ```
        - id: cloudformation
          desc: |
            To restrict Oracle access in CloudFormation, scope every `SecurityGroupIngress` rule covering port 1521 to a specific source security group, IP range, or VPC peer rather than `0.0.0.0/0` or `::/0`:

            ```yaml
            Resources:
              DBSecurityGroup:
                Type: AWS::EC2::SecurityGroup
                Properties:
                  GroupDescription: Oracle access from app tier only
                  VpcId: !Ref VpcId
                  SecurityGroupIngress:
                    - IpProtocol: tcp
                      FromPort: 1521
                      ToPort: 1521
                      SourceSecurityGroupId: !Ref AppSecurityGroup
            ```
    refs:
      - url: https://docs.oracle.com/en/database/oracle/oracle-database/19/dbseg/index.html
        title: Oracle Database Security Guide
