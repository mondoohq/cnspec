  - uid: mondoo-aws-security-lambda-env-encryption-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::Lambda::Function")
    mql: |
      cloudformation.template.resources.where(type == "AWS::Lambda::Function").all(
      properties['Environment'] == empty ||
      properties['KmsKeyId'] != ""
      )
  - uid: mondoo-aws-security-lambda-code-signing-configured
    title: Ensure Lambda functions have code signing configured
    impact: 70
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-25
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ds-6
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sa-10
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-2
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc8-1-1
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-aws-security-lambda-code-signing-configured-aws
        tags:
          mondoo.com/filter-title: AWS Lambda Function
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-lambda-code-signing-configured-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-lambda-code-signing-configured-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-lambda-code-signing-configured-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-lambda-code-signing-configured-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that AWS Lambda functions have code signing configured to verify that only trusted code packages are deployed. Code signing uses AWS Signer to validate deployment packages against a set of allowed signing profiles, preventing unauthorized or tampered code from being deployed.

        **Why this matters**

        Without code signing, Lambda functions can accept any deployment package regardless of its origin or integrity:

        - Malicious actors with deployment permissions could deploy tampered or backdoored code.
        - Supply chain attacks can inject unauthorized code into the deployment pipeline.
        - There is no cryptographic verification that the deployed code matches what was built and approved.
        - Compliance frameworks increasingly require code integrity verification as part of secure software supply chain practices.

        **Risk mitigation**

        - Prevents deployment of unauthorized or tampered Lambda function code.
        - Provides cryptographic verification of code package integrity.
        - Establishes a chain of trust from code build to deployment.
      remediation:
        - id: console
          desc: |
            To ensure Lambda functions have code signing configured using the AWS Console:

            1. Navigate to the AWS Lambda Console.
            2. Select Functions in the left panel.
            3. Select the Lambda function to update.
            4. Go to the Configuration tab and select Code signing.
            5. Select Edit and choose a code signing configuration.
            6. If no code signing configuration exists, create one:
              - Go to Code signing configurations in the left panel.
              - Select Create configuration.
              - Add allowed signing profiles and set the validation policy to "Enforce".
            7. Select Save to apply the changes.
        - id: cli
          desc: |
            To ensure Lambda functions have code signing configured using the AWS CLI, create a code signing configuration:

            ```bash
            aws lambda create-code-signing-config \
              --allowed-publishers SigningProfileVersionArns=arn:aws:signer:<region>:<account-id>:/signing-profiles/<profile-name> \
              --code-signing-policies UntrustedArtifactOnDeployment=Enforce
            ```

            Attach the code signing configuration to a function:

            ```bash
            aws lambda put-function-code-signing-config \
              --function-name <function-name> \
              --code-signing-config-arn <code-signing-config-arn>
            ```
        - id: terraform
          desc: |
            To ensure Lambda functions have code signing configured in Terraform:

            ```hcl
            resource "aws_lambda_code_signing_config" "example" {
              allowed_publishers {
                signing_profile_version_arns = [
                  aws_signer_signing_profile.example.version_arn
                ]
              }

              policies {
                untrusted_artifact_on_deployment = "Enforce"
              }
            }

            resource "aws_lambda_function" "example" {
              function_name         = "example"
              code_signing_config_arn = aws_lambda_code_signing_config.example.arn
            }
            ```
        - id: cloudformation
          desc: |
            To ensure Lambda functions have code signing configured in CloudFormation:

            ```yaml
            Resources:
              CodeSigningConfig:
                Type: AWS::Lambda::CodeSigningConfig
                Properties:
                  AllowedPublishers:
                    SigningProfileVersionArns:
                      - !GetAtt SigningProfile.ProfileVersionArn
                  CodeSigningPolicies:
                    UntrustedArtifactOnDeployment: Enforce
              LambdaFunction:
                Type: AWS::Lambda::Function
                Properties:
                  FunctionName: example
                  CodeSigningConfigArn: !Ref CodeSigningConfig
            ```
    refs:
      - url: https://docs.aws.amazon.com/lambda/latest/dg/configuration-codesigning.html
        title: AWS Documentation - Configuring code signing for AWS Lambda
      - url: https://docs.aws.amazon.com/signer/latest/developerguide/Welcome.html
        title: AWS Documentation - AWS Signer Developer Guide
  - uid: mondoo-aws-security-lambda-code-signing-configured-aws
    filters: asset.platform == "aws-lambda-function"
    mql: aws.lambda.function.codeSigningConfig != null
  - uid: mondoo-aws-security-lambda-code-signing-configured-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_lambda_function")
    mql: |
      terraform.resources.where(nameLabel == "aws_lambda_function").all(
        arguments.code_signing_config_arn != empty
      )
  - uid: mondoo-aws-security-lambda-code-signing-configured-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_lambda_function")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_lambda_function").all(
        change.after.code_signing_config_arn != ""
      )
  - uid: mondoo-aws-security-lambda-code-signing-configured-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_lambda_function")
    mql: |
