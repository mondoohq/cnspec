  - uid: mondoo-aws-security-mq-no-public-access
    title: Ensure Amazon MQ brokers are not publicly accessible
    impact: 90
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-6
    variants:
      - uid: mondoo-aws-security-mq-no-public-access-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-mq-no-public-access-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-mq-no-public-access-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-mq-no-public-access-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-mq-no-public-access-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon MQ brokers are not publicly accessible over the internet. Publicly accessible brokers expose their management console and messaging endpoints to the public internet, significantly increasing the attack surface for unauthorized access and denial-of-service attacks.

        **Why this matters**

        - Amazon MQ brokers deployed with public accessibility are reachable from any IP address on the internet, exposing the AMQP, MQTT, OpenWire, STOMP, and WebSocket endpoints to potential attackers.
        - Message broker credentials, even when strong, are subject to brute-force and credential-stuffing attacks when endpoints are internet-facing.
        - Publicly accessible brokers also expose the ActiveMQ web console, which has historically been a target for remote code execution exploits.

        **Risk mitigation**

        - **Network isolation:** Deploying brokers in a VPC without public accessibility ensures only authorized resources within the VPC can reach the broker endpoints.
        - **Reduced attack surface:** Eliminates exposure to internet-based scanning, brute-force, and exploitation attempts.
        - **Defense in depth:** Complements authentication controls by ensuring that network-layer access is restricted to trusted sources.
      remediation:
        - id: console
          desc: |
            To ensure Amazon MQ brokers are not publicly accessible using the AWS Console, note: Public accessibility cannot be changed after a broker is created. You must create a new broker without public accessibility and migrate your workloads.

            1. Navigate to the **Amazon MQ Console** and choose **Create broker**.
            2. In the **Network & Security** section, ensure **Public accessibility** is set to **No**.
            3. Configure your VPC, subnets, and security groups to allow access only from trusted sources.
            4. Migrate clients from the public broker to the new private broker.
            5. Delete the publicly accessible broker.
        - id: cli
          desc: |
            To ensure Amazon MQ brokers are not publicly accessible using the AWS CLI, create a new broker without public accessibility:

            ```bash
            aws mq create-broker \
              --broker-name <broker-name> \
              --host-instance-type mq.m5.large \
              --deployment-mode SINGLE_INSTANCE \
              --engine-type ACTIVEMQ \
              --engine-version "5.17.6" \
              --no-publicly-accessible \
              --subnet-ids <subnet-id> \
              --users Username=admin,Password=<password>,ConsoleAccess=true
            ```

            List brokers and check public accessibility:

            ```bash
            aws mq list-brokers --query "BrokerSummaries[*].{Id:BrokerId,Name:BrokerName,Public:BrokerState}"
            ```
        - id: terraform
          desc: |
            To ensure Amazon MQ brokers are not publicly accessible in Terraform, ensure the Amazon MQ broker is not publicly accessible:

            ```hcl
            resource "aws_mq_broker" "example" {
              broker_name        = "example-broker"
              engine_type        = "ActiveMQ"
              publicly_accessible = false
              subnet_ids          = [aws_subnet.private.id]
            }
            ```
        - id: cloudformation
          desc: |
            To ensure Amazon MQ brokers are not publicly accessible in CloudFormation, ensure the Amazon MQ broker is not publicly accessible:

            ```yaml
            Resources:
              MQBroker:
                Type: AWS::AmazonMQ::Broker
                Properties:
                  BrokerName: example-broker
                  EngineType: ActiveMQ
                  PubliclyAccessible: false
                  SubnetIds:
                    - !Ref PrivateSubnet
            ```
    refs:
