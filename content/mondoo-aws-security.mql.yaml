  - uid: mondoo-aws-security-secgroup-no-unrestricted-egress
    title: Ensure security groups do not allow unrestricted egress
    impact: 80
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-6
    variants:
      - uid: mondoo-aws-security-secgroup-no-unrestricted-egress-aws
        tags:
          mondoo.com/filter-title: AWS Security Group
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-secgroup-no-unrestricted-egress-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-secgroup-no-unrestricted-egress-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-secgroup-no-unrestricted-egress-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-secgroup-no-unrestricted-egress-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        Security groups should restrict outbound traffic to only necessary destinations and ports. Unrestricted egress (0.0.0.0/0 on all ports) allows compromised instances to communicate with any external host, facilitating data exfiltration or command-and-control communication.

        **Why this matters**

        Unrestricted outbound access from EC2 instances and other resources can:

        - Enable compromised resources to exfiltrate sensitive data to attacker-controlled infrastructure.
        - Allow malware or backdoors to establish command-and-control (C2) channels to arbitrary external hosts.
        - Violate compliance requirements from frameworks such as CIS AWS Foundations Benchmark, PCI DSS, and ISO 27001 that mandate egress filtering.

        Limiting outbound traffic to only required destinations and ports is a fundamental defense-in-depth control.

        **Risk mitigation**

        - Reduces the impact of compromised instances by preventing arbitrary outbound communications.
        - Limits the blast radius of a breach by restricting lateral movement and data exfiltration paths.
        - Supports compliance with network segmentation and egress filtering requirements.
      remediation:
        - id: console
          desc: |
            To ensure security groups do not allow unrestricted egress using the AWS Console:

            1. Navigate to the AWS EC2 Console.
            2. Select Security Groups from the left panel under Network & Security.
            3. Identify security groups with an outbound rule allowing all traffic (0.0.0.0/0, all protocols, all ports).
            4. Select the security group and choose the Outbound rules tab.
            5. Select Edit outbound rules.
            6. Remove or replace the unrestricted rule with specific rules that allow only required destinations and ports.
            7. Select Save rules.
        - id: cli
          desc: |
            To ensure security groups do not allow unrestricted egress using the AWS CLI, list security groups with unrestricted egress:

            ```bash
            aws ec2 describe-security-groups \
              --query "SecurityGroups[?IpPermissionsEgress[?IpRanges[?CidrIp=='0.0.0.0/0'] && FromPort==\`0\` && ToPort==\`0\`]].{GroupId:GroupId,GroupName:GroupName}"
            ```

            Remove the unrestricted egress rule:

            ```bash
            aws ec2 revoke-security-group-egress \
              --group-id <sg-id> \
              --ip-permissions IpProtocol=-1,IpRanges='[{CidrIp=0.0.0.0/0}]'
            ```

            Add a specific outbound rule to allow only required traffic:

            ```bash
            aws ec2 authorize-security-group-egress \
              --group-id <sg-id> \
              --ip-permissions IpProtocol=tcp,FromPort=443,ToPort=443,IpRanges='[{CidrIp=0.0.0.0/0}]'
            ```
        - id: terraform
          desc: |
            To ensure security groups do not allow unrestricted egress in Terraform, restrict egress rules to specific destinations instead of allowing all traffic:

            ```hcl
            resource "aws_security_group" "example" {
              name        = "restricted-egress"
              description = "Security group with restricted egress"
              vpc_id      = aws_vpc.example.id

              egress {
                from_port   = 443
                to_port     = 443
                protocol    = "tcp"
                cidr_blocks = ["0.0.0.0/0"]
                description = "Allow HTTPS outbound"
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure security groups do not allow unrestricted egress in CloudFormation:

            ```yaml
            Resources:
              RestrictedEgressSG:
                Type: AWS::EC2::SecurityGroup
                Properties:
                  GroupDescription: Security group with restricted egress
                  VpcId: !Ref VPC
                  SecurityGroupEgress:
                    - IpProtocol: tcp
                      FromPort: 443
                      ToPort: 443
                      CidrIp: 0.0.0.0/0
                      Description: Allow HTTPS outbound
            ```
    refs:
      - url: https://docs.aws.amazon.com/vpc/latest/userguide/vpc-security-groups.html
        title: AWS Documentation - Control traffic to your AWS resources using security groups
      - url: https://docs.aws.amazon.com/securityhub/latest/userguide/ec2-controls.html
        title: AWS Security Hub - EC2 controls reference
  - uid: mondoo-aws-security-secgroup-no-unrestricted-egress-aws
    filters: asset.platform == "aws-security-group"
    mql: |
      aws.ec2.securitygroup.ipPermissionsEgress.where(
        ipProtocol == "-1").none(
          ipRanges.contains("0.0.0.0/0") || ipRanges.contains("::/0")
          )
  - uid: mondoo-aws-security-secgroup-no-unrestricted-egress-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_security_group")
    mql: |
      terraform.resources.where(nameLabel == "aws_security_group").all(
      arguments.egress == empty || arguments.egress.none(cidr_blocks.contains("0.0.0.0/0"))
      )
  - uid: mondoo-aws-security-secgroup-no-unrestricted-egress-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_security_group")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_security_group").all(
      change.after.egress == empty || change.after.egress.none(cidr_blocks.contains("0.0.0.0/0"))
      )
  - uid: mondoo-aws-security-secgroup-no-unrestricted-egress-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_security_group")
    mql: |
      terraform.state.resources.where(type == "aws_security_group").all(
      values.egress == empty || values.egress.none(cidr_blocks.contains("0.0.0.0/0"))
      )
  - uid: mondoo-aws-security-secgroup-no-unrestricted-egress-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::EC2::SecurityGroup")
    mql: |
      cloudformation.template.resources.where(type == "AWS::EC2::SecurityGroup").all(
      properties['SecurityGroupEgress'] == empty || properties['SecurityGroupEgress'].none(_['CidrIp'] == "0.0.0.0/0")
      )
  # No Terraform variants: The root user's MFA configuration is reported via `aws.iam.credentialReport` and `aws.iam.virtualMfaDevices`; the AWS root account itself is not a Terraform-managed resource.
  - uid: mondoo-aws-security-iam-root-hardware-mfa
    title: Ensure root account has a hardware MFA device enabled
    impact: 90
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-j
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-3
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-3
    variants:
      - uid: mondoo-aws-security-iam-root-hardware-mfa-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
    docs:
      desc: |
        The AWS root account has unrestricted access to all resources in the account and cannot be limited by IAM policies. Protecting it with a hardware MFA device provides a significantly stronger authentication guarantee than a software (virtual) MFA token, which can be compromised if the device or seed material is stolen.

        **Why this matters**

        The root account is the most privileged identity in an AWS account. If compromised, an attacker gains complete control over all resources, billing, and account settings. Hardware MFA provides:

        - A physical second factor that cannot be exfiltrated remotely, unlike virtual MFA apps or TOTP seeds stored in software.
        - Protection against phishing attacks targeting one-time codes entered on malicious sites.
        - Compliance with strict authentication requirements in standards such as PCI DSS, NIST SP 800-53, and ISO 27001 that differentiate hardware-based MFA.

        A virtual MFA device alone is insufficient for root account protection because the TOTP seed can be backed up, copied, or stolen without the account owner's knowledge.

        This check passes when MFA is active on the root account AND no virtual MFA device is associated with root, implying that a hardware MFA device is in use.

        **Risk mitigation**

        - Prevents root account takeover even if credentials are compromised through phishing or credential stuffing.
        - Ensures the most privileged account identity requires physical possession of a hardware token to authenticate.
        - Satisfies compliance requirements mandating hardware MFA for privileged or administrative accounts.
      remediation:
        - id: console
          desc: |
            To ensure root account has a hardware MFA device enabled using the AWS Console:

            1. Sign in to the AWS Management Console as the root user.
            2. Select your account name in the upper right corner and choose Security credentials.
            3. In the Multi-factor authentication (MFA) section, select Assign MFA device.
            4. Choose Hardware TOTP token or FIDO security key and follow the on-screen instructions to register the device.
            5. If a virtual MFA device is currently active for the root account, deactivate it after successfully registering the hardware device.
            6. Store the hardware MFA device securely and restrict physical access to authorized personnel.
        - id: cli
          desc: |
            To ensure root account has a hardware MFA device enabled using the AWS CLI, check whether a virtual MFA device is associated with the root account:

            ```bash
            aws iam list-virtual-mfa-devices --query "VirtualMFADevices[?contains(SerialNumber, 'root-account-mfa-device')]"
            ```

            View the root account MFA status in the credential report:

            ```bash
            aws iam generate-credential-report
            aws iam get-credential-report --query "Content" --output text | base64 -d | grep "<root_account>"
            ```

            Hardware MFA device registration must be completed through the AWS Console. After registering, deactivate any virtual MFA device for root:

            ```bash
            aws iam deactivate-mfa-device \
              --user-name "<root_account>" \
              --serial-number arn:aws:iam::<account-id>:mfa/root-account-mfa-device
            ```
        - id: terraform
          desc: |
            Hardware MFA for the root account cannot be configured through Terraform. Hardware MFA device registration must be performed manually through the AWS Console. Use the console or CLI remediation steps above.
        - id: cloudformation
          desc: |
            Hardware MFA for the root account cannot be configured through CloudFormation. Hardware MFA device registration must be performed manually through the AWS Console. Use the console or CLI remediation steps above.
    refs:
      - url: https://docs.aws.amazon.com/IAM/latest/UserGuide/id_credentials_mfa_enable_physical.html
        title: AWS Documentation - Enable a hardware TOTP token for the AWS account root user
      - url: https://docs.aws.amazon.com/securityhub/latest/userguide/iam-controls.html
        title: AWS Security Hub - IAM controls reference
  - uid: mondoo-aws-security-iam-root-hardware-mfa-aws
    filters: asset.platform == "aws"
    mql: |
      aws.iam.credentialReport.where(properties.user == "<root_account>").all(mfaActive == true) &&
      aws.iam.virtualMfaDevices.none(serialNumber.contains("root-account-mfa-device"))
  # No Terraform variants: Expiration of an IAM server certificate is runtime telemetry (`Expiration` timestamp from the IAM API). Terraform does not expose certificate expiration as an attribute on `aws_iam_server_certificate`.
  - uid: mondoo-aws-security-iam-expired-certificates
    title: Ensure expired SSL/TLS certificates are removed from IAM
    impact: 60
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-5-17
      compliance/nis-2: nis-2-21-2-g
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-5
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-7
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-9
      compliance/vda-isa-5: vda-isa-5-4-1-3
    variants:
      - uid: mondoo-aws-security-iam-expired-certificates-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
    docs:
      desc: |
        SSL/TLS certificates stored in AWS IAM that have passed their expiration date should be removed promptly. Expired certificates represent an expanded attack surface: their corresponding private keys may have been extracted, backed up, or compromised over time, and an attacker possessing these keys can impersonate the associated services. Forgotten expired certificates also indicate gaps in certificate lifecycle management that may extend to active certificates.

        **Why this matters**

        Expired certificates stored in IAM create security risks:

        - Private keys associated with long-lived or expired certificates have had extended exposure time, increasing the likelihood they have been compromised, backed up insecurely, or accessed by former employees.
        - An attacker with a compromised private key can perform service impersonation or man-in-the-middle attacks against clients that do not perform strict certificate validation.
        - Expired certificates that remain in IAM indicate a failure in certificate lifecycle management, suggesting that active certificates may also lack proper rotation, increasing the window for key compromise across the organization.

        AWS Certificate Manager (ACM) is the recommended service for managing certificates, but some legacy integrations still use IAM-stored certificates.

        **Risk mitigation**

        - **Attack surface reduction:** Removing expired certificates and rotating their associated keys eliminates potential impersonation vectors from compromised private keys.
        - **Credential hygiene:** Reduces the inventory to only valid, actively managed certificates, ensuring that compromised legacy keys cannot be used for impersonation.
        - **Lifecycle management:** Enforcing certificate cleanup drives adoption of proper rotation practices that limit key exposure time.
      remediation:
        - id: console
          desc: |
            To ensure expired SSL/TLS certificates are removed from IAM using the AWS Console, IAM server certificates cannot be managed directly through the AWS Console. Use the AWS CLI to list and delete expired certificates.
        - id: cli
          desc: |
            To ensure expired SSL/TLS certificates are removed from IAM using the AWS CLI, list all server certificates stored in IAM along with their expiration dates:

            ```bash
            aws iam list-server-certificates \
              --query "ServerCertificateMetadataList[*].{Name:ServerCertificateName,Expiration:Expiration}"
            ```

            Delete an expired certificate:

            ```bash
            aws iam delete-server-certificate --server-certificate-name <certificate-name>
            ```

            Verify the certificate has been removed:

            ```bash
            aws iam list-server-certificates \
              --query "ServerCertificateMetadataList[*].ServerCertificateName"
            ```
        - id: terraform
          desc: |
            Expired IAM SSL/TLS certificates cannot be managed through Terraform. Certificate lifecycle management, including removal of expired certificates, must be performed using the AWS CLI or Console. Consider migrating to AWS Certificate Manager (ACM) for automated certificate renewal.
        - id: cloudformation
          desc: |
            Expired IAM SSL/TLS certificates cannot be managed through CloudFormation. Certificate lifecycle management, including removal of expired certificates, must be performed using the AWS CLI or Console. Consider migrating to AWS Certificate Manager (ACM) for automated certificate renewal.
    refs:
      - url: https://docs.aws.amazon.com/IAM/latest/UserGuide/id_credentials_server-certs.html
        title: AWS Documentation - Managing server certificates in IAM
      - url: https://docs.aws.amazon.com/securityhub/latest/userguide/iam-controls.html
        title: AWS Security Hub - IAM controls reference
  - uid: mondoo-aws-security-iam-expired-certificates-aws
    filters: asset.platform == "aws"
    mql: aws.iam.serverCertificates.none(parse.date(_['Expiration'].string) < time.now)
  - uid: mondoo-aws-security-iam-support-role
    title: Ensure a support role has been created for AWS Support access
    impact: 30
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-2
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-3-1
      compliance/vda-isa-5: vda-isa-5-4-1-1
    variants:
      - uid: mondoo-aws-security-iam-support-role-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-iam-support-role-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-iam-support-role-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-iam-support-role-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        AWS recommends creating a dedicated IAM role or group with the AWSSupportAccess managed policy attached to manage interactions with AWS Support. Without a dedicated support role, operators are forced to use the root account for support interactions, expanding the blast radius of root credential compromise and eliminating forensic traceability for post-breach investigations.

        **Why this matters**

        Without a dedicated support role:

        - Root account usage for support interactions increases exposure of root credentials, which provide unrestricted access to the entire AWS account and cannot be scoped with IAM policies.
        - If the root account is compromised, there is no way to distinguish attacker-initiated support cases from legitimate ones, complicating incident response and forensic investigation.
        - Post-breach forensics require attributing actions to specific identities. Root account actions lack granular attribution, making it impossible to determine whether support interactions during a breach were legitimate or attacker-initiated.

        Assigning the AWSSupportAccess policy to a specific role, group, or user ensures that support interactions are performed with least-privilege credentials that can be audited.

        **Risk mitigation**

        - **Root credential protection:** Eliminates a reason to use root credentials, reducing exposure of the most privileged account in the environment.
        - **Forensic traceability:** Creates attributable, auditable identities for support interactions that can be distinguished from attacker activity during incident investigation.
        - **Blast radius containment:** Ensures support access is scoped to a dedicated role with limited permissions rather than the unrestricted root account.
      remediation:
        - id: console
          desc: |
            To ensure a support role has been created for AWS Support access using the AWS Console:

            1. Navigate to the AWS IAM Console.
            2. Select Roles from the left panel and choose Create role.
            3. Select AWS account as the trusted entity type and configure trust as appropriate.
            4. On the permissions page, search for and attach the AWSSupportAccess managed policy.
            5. Name the role (for example, AWSSupportRole) and create it.
            6. Assign the role to the appropriate IAM users or groups that manage AWS Support interactions.
        - id: cli
          desc: |
            To ensure a support role has been created for AWS Support access using the AWS CLI, create an IAM role with a trust policy for the account:

            ```bash
            aws iam create-role \
              --role-name AWSSupportRole \
              --assume-role-policy-document '{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Principal":{"AWS":"arn:aws:iam::<account-id>:root"},"Action":"sts:AssumeRole"}]}'
            ```

            Attach the AWSSupportAccess managed policy:

            ```bash
            aws iam attach-role-policy \
              --role-name AWSSupportRole \
              --policy-arn arn:aws:iam::aws:policy/AWSSupportAccess
            ```

            Verify the policy is attached:

            ```bash
            aws iam list-attached-role-policies --role-name AWSSupportRole
            ```
        - id: terraform
          desc: |
            To ensure a support role has been created for AWS Support access in Terraform:

            ```hcl
            resource "aws_iam_role" "support" {
              name = "AWSSupportRole"

              assume_role_policy = jsonencode({
                Version = "2012-10-17"
                Statement = [{
                  Effect    = "Allow"
                  Principal = { AWS = "arn:aws:iam::${data.aws_caller_identity.current.account_id}:root" }
                  Action    = "sts:AssumeRole"
                }]
              })
            }

            resource "aws_iam_role_policy_attachment" "support" {
              role       = aws_iam_role.support.name
              policy_arn = "arn:aws:iam::aws:policy/AWSSupportAccess"
            }
            ```
        - id: cloudformation
          desc: |
            To ensure a support role has been created for AWS Support access in CloudFormation:

            ```yaml
            Resources:
              AWSSupportRole:
                Type: AWS::IAM::Role
                Properties:
                  RoleName: AWSSupportRole
                  AssumeRolePolicyDocument:
                    Version: "2012-10-17"
                    Statement:
                      - Effect: Allow
                        Principal:
                          AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
                        Action: sts:AssumeRole
                  ManagedPolicyArns:
                    - arn:aws:iam::aws:policy/AWSSupportAccess
            ```
    refs:
      - url: https://docs.aws.amazon.com/awssupport/latest/user/security-iam-awsmanpol.html
        title: AWS Documentation - AWSSupportAccess managed policy
      - url: https://docs.aws.amazon.com/securityhub/latest/userguide/iam-controls.html
        title: AWS Security Hub - IAM controls reference
  - uid: mondoo-aws-security-iam-support-role-aws
    filters: asset.platform == "aws"
    mql: aws.iam.policies.where(arn == "arn:aws:iam::aws:policy/AWSSupportAccess").any(attachedUsers.length > 0 || attachedRoles.length > 0 || attachedGroups.length > 0)
  - uid: mondoo-aws-security-iam-support-role-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_iam_role_policy_attachment")
    mql: |
      terraform.resources.where(nameLabel == "aws_iam_role_policy_attachment").any(
        arguments['policy_arn'] == "arn:aws:iam::aws:policy/AWSSupportAccess"
      )
  - uid: mondoo-aws-security-iam-support-role-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_iam_role_policy_attachment")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_iam_role_policy_attachment").any(
        change.after.policy_arn == "arn:aws:iam::aws:policy/AWSSupportAccess"
      )
  - uid: mondoo-aws-security-iam-support-role-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_iam_role_policy_attachment")
    mql: |
      terraform.state.resources.where(type == "aws_iam_role_policy_attachment").any(
        values.policy_arn == "arn:aws:iam::aws:policy/AWSSupportAccess"
      )
  # No Terraform variants: Credential usage telemetry (`passwordLastUsed`, `accessKeyXLastUsedDate`) is reported by the IAM credential-report API and has no Terraform analog.
  - uid: mondoo-aws-security-iam-unused-credentials-disabled
    title: Ensure unused IAM credentials are disabled
    impact: 50
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-5-18
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-9
      compliance/vda-isa-5: vda-isa-5-4-1-3
    props:
      - uid: mondooAWSSecurityCredentialInactivityThreshold
        title: Define the number of days after which an unused credential is considered stale
        mql: "90"
    variants:
      - uid: mondoo-aws-security-iam-unused-credentials-disabled-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
    docs:
      desc: |
        This check identifies IAM credentials (passwords and access keys) that pose a risk due to inactivity. It flags two cases: (a) credentials that have **never been used** (where `passwordLastUsed` or `accessKey1LastUsedDate` is null), indicating they may have been provisioned but never needed, and (b) credentials that have not been used within a defined threshold period. Credentials that remain active but unused increase the attack surface, as they may belong to former employees, deprecated service accounts, or forgotten automation keys that an attacker could compromise without detection.

        **Why this matters**

        - **Reduced attack surface:** Unused credentials that remain active are prime targets for credential stuffing, phishing, or insider threats. Disabling them limits the window of opportunity for attackers.
        - **Compliance requirements:** CIS AWS Foundations Benchmark (1.12), NIST 800-53 (AC-2), and SOC 2 require organizations to review and disable credentials that are no longer in use.
        - **Operational hygiene:** Stale credentials often indicate poor offboarding processes or abandoned service integrations that should be cleaned up.

        By default, credentials unused for 90 days or more are flagged. This threshold can be adjusted using the `mondooAWSSecurityCredentialInactivityThreshold` property.
      remediation:
        - id: console
          desc: |
            To define the number of days after which an unused credential is considered stale using the AWS Console:

            1. Navigate to the **AWS IAM Console**.
            2. Select **Credential report** and choose **Download report**.
            3. Review the `password_last_used`, `access_key_1_last_used_date`, and `access_key_2_last_used_date` columns.
            4. For each credential unused for more than 90 days:
               - **Console passwords:** Select the user, go to **Security credentials**, and choose **Manage** next to Console access to disable it.
               - **Access keys:** Select the user, go to **Security credentials**, find the access key, and choose **Make inactive** or **Delete**.
            5. Confirm with the resource owner before disabling credentials to avoid disrupting active workloads.
        - id: cli
          desc: |
            To define the number of days after which an unused credential is considered stale using the AWS CLI, generate and review the credential report:

            ```bash
            aws iam generate-credential-report
            aws iam get-credential-report --query 'Content' --output text | base64 --decode
            ```

            Disable an unused console password:

            ```bash
            aws iam delete-login-profile --user-name <username>
            ```

            Deactivate an unused access key:

            ```bash
            aws iam update-access-key --access-key-id <key-id> --status Inactive --user-name <username>
            ```

            Delete an access key that is confirmed no longer needed:

            ```bash
            aws iam delete-access-key --access-key-id <key-id> --user-name <username>
            ```
        - id: terraform
          desc: |
            Unused IAM credential detection is a runtime operation based on the IAM credential report and cannot be managed through Terraform. Use the AWS Console or CLI to regularly review and disable unused credentials. Terraform can be used to manage IAM user lifecycle but cannot detect credential usage patterns.
        - id: cloudformation
          desc: |
            Unused IAM credential detection is a runtime operation based on the IAM credential report and cannot be managed through CloudFormation. Use the AWS Console or CLI to regularly review and disable unused credentials. Consider using AWS Config rules to automate detection of unused credentials.
    refs:
      - url: https://docs.aws.amazon.com/IAM/latest/UserGuide/id_credentials_getting-report.html
        title: AWS Documentation - Getting credential reports for your AWS account
      - url: https://docs.aws.amazon.com/IAM/latest/UserGuide/best-practices.html#remove-credentials
        title: AWS Documentation - Remove unnecessary credentials
