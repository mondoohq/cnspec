      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    variants:
      - uid: mondoo-aws-security-lambda-xray-tracing-aws
        tags:
          mondoo.com/filter-title: AWS Lambda Function
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-lambda-xray-tracing-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-lambda-xray-tracing-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-lambda-xray-tracing-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-lambda-xray-tracing-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        AWS X-Ray provides distributed tracing for Lambda functions, enabling visibility into function execution, latency, and downstream service calls. Enabling active tracing helps security and operations teams detect anomalous behavior, unexpected latency spikes, and unauthorized invocations.

        **Why this matters**

        Without X-Ray tracing enabled on Lambda functions:

        - Investigations into unexpected function behavior or security incidents lack detailed execution traces.
        - Latency and error patterns that may indicate abuse or compromise go undetected.
        - Compliance frameworks such as NIST SP 800-53 and SOC 2 require audit and monitoring capabilities for compute workloads.

        X-Ray tracing complements CloudWatch logs by providing structured, visual traces of function invocations and their downstream dependencies.

        **Risk mitigation**

        - Improves incident response by providing detailed traces of function execution and service calls.
        - Enables detection of anomalous invocation patterns or unexpected downstream API calls.
        - Supports compliance with logging and monitoring requirements for serverless workloads.
      remediation:
        - id: console
          desc: |
            To ensure Lambda functions have X-Ray tracing enabled using the AWS Console:

            1. Navigate to the AWS Lambda Console.
            2. Select Functions from the left panel.
            3. Select the Lambda function to configure.
            4. Go to the Configuration tab and select Monitoring and operations tools.
            5. Under AWS X-Ray, select Edit and enable Active tracing.
            6. Select Save to apply the changes.
        - id: cli
          desc: |
            To ensure Lambda functions have X-Ray tracing enabled using the AWS CLI, check the current tracing configuration for a Lambda function:

            ```bash
            aws lambda get-function-configuration \
              --function-name <function-name> \
              --query "TracingConfig"
            ```

            Enable active X-Ray tracing:

            ```bash
            aws lambda update-function-configuration \
              --function-name <function-name> \
              --tracing-config Mode=Active
            ```

            Verify the change was applied:

            ```bash
            aws lambda get-function-configuration \
              --function-name <function-name> \
              --query "TracingConfig.Mode"
            ```
        - id: terraform
          desc: |
            To ensure Lambda functions have X-Ray tracing enabled in Terraform:

            ```hcl
            resource "aws_lambda_function" "example" {
              function_name = "example-function"
              role          = aws_iam_role.lambda.arn
              handler       = "index.handler"
              runtime       = "nodejs20.x"
              filename      = "function.zip"

              tracing_config {
                mode = "Active"
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure Lambda functions have X-Ray tracing enabled in CloudFormation:

            ```yaml
            Resources:
              LambdaFunction:
                Type: AWS::Lambda::Function
                Properties:
                  FunctionName: example-function
                  Runtime: nodejs20.x
                  Handler: index.handler
                  Role: !GetAtt LambdaRole.Arn
                  TracingConfig:
                    Mode: Active
            ```
    refs:
      - url: https://docs.aws.amazon.com/lambda/latest/dg/services-xray.html
        title: AWS Documentation - Using AWS X-Ray with Lambda
      - url: https://docs.aws.amazon.com/securityhub/latest/userguide/lambda-controls.html
        title: AWS Security Hub - Lambda controls reference
  - uid: mondoo-aws-security-lambda-xray-tracing-aws
    filters: asset.platform == "aws-lambda-function"
    mql: aws.lambda.function.tracingMode == "Active"
