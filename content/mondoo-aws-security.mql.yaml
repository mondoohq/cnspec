    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_timestreaminfluxdb_db_instance")
    mql: |
      terraform.state.resources.where(type == "aws_timestreaminfluxdb_db_instance").all(
      values.log_delivery_configuration != empty
      )
  - uid: mondoo-aws-security-timestream-influxdb-logging-enabled-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::Timestream::InfluxDBInstance")
    mql: |
      cloudformation.template.resources.where(type == "AWS::Timestream::InfluxDBInstance").all(
      properties['LogDeliveryConfiguration'] != empty
      )
  - uid: mondoo-aws-security-nacl-no-unrestricted-ssh-rdp
    title: Ensure network ACLs do not allow unrestricted inbound SSH or RDP access
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-aws-security-nacl-no-unrestricted-ssh-rdp-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-nacl-no-unrestricted-ssh-rdp-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-nacl-no-unrestricted-ssh-rdp-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-nacl-no-unrestricted-ssh-rdp-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that VPC network ACLs do not contain inbound rules that allow unrestricted access from any IP address to SSH (port 22) or RDP (port 3389). Leaving these management ports open to the internet at the network ACL level removes a critical defense-in-depth layer and exposes all subnets associated with the NACL to direct remote access attempts.

        **Why this matters**

        - **Management port exposure:** SSH and RDP are high-value targets for automated brute force, credential stuffing, and exploitation of known protocol vulnerabilities.
        - **Stateless enforcement:** Unlike security groups, network ACLs are stateless and apply at the subnet boundary, providing a network-layer control that operates independently of instance-level configuration.
        - **Defense in depth:** Blocking management ports at the NACL level ensures that even if a security group is misconfigured to allow broad access, the NACL provides a backstop.
        - **Scope of impact:** A single permissive NACL rule affects every resource in every associated subnet, amplifying the risk of a single misconfiguration.

        **Risk mitigation**

        - **Source restriction:** Replacing any-source rules with rules that allow only known, trusted CIDR ranges limits SSH and RDP access to authorized network locations.
        - **Deny at the subnet boundary:** Ensuring NACL rules deny unrestricted management port access means the control is enforced before traffic even reaches individual instance security groups.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and navigate to the **VPC** console.
        2. Select **Network ACLs** from the left panel.
        3. For each network ACL, select the ACL and open the **Inbound rules** tab.
        4. Look for any **ALLOW** rules where the source is `0.0.0.0/0` or `::/0` and the port range includes port 22 (SSH) or port 3389 (RDP).

        A passing network ACL has no inbound ALLOW rules permitting port 22 or 3389 from `0.0.0.0/0` or `::/0`. A failing network ACL has one or more such unrestricted ALLOW rules.

        ### Audit via CLI

        1. List all network ACLs and their inbound rules:

        ```bash
        aws ec2 describe-network-acls \
          --query "NetworkAcls[*].{AclId:NetworkAclId,Entries:Entries[?Egress==\`false\` && RuleAction=='allow']}"
        ```

        2. Filter for rules that open SSH or RDP to the internet:

        ```bash
        aws ec2 describe-network-acls \
          --query "NetworkAcls[?Entries[?Egress==\`false\` && RuleAction=='allow' && (CidrBlock=='0.0.0.0/0' || Ipv6CidrBlock=='::/0')]].{AclId:NetworkAclId,Entries:Entries}"
        ```

        A passing account returns no network ACLs with inbound ALLOW rules from `0.0.0.0/0` or `::/0` covering port 22 or 3389. A failing account returns one or more ACLs with such entries.
      remediation:
        - id: console
          desc: |
            To ensure network ACLs do not allow unrestricted inbound SSH or RDP access using the AWS Console:

            1. Navigate to the **VPC** console and select **Network ACLs**.
            2. Review inbound rules for entries allowing ports 22 or 3389 from 0.0.0.0/0.
            3. Modify the rules to restrict the source CIDR to known, trusted IP ranges.
        - id: cli
          desc: |
            To ensure network ACLs do not allow unrestricted inbound SSH or RDP access using the AWS CLI:

            ```bash
            aws ec2 replace-network-acl-entry --network-acl-id <acl-id> --rule-number <number> --protocol tcp --port-range From=22,To=22 --cidr-block <trusted-cidr> --rule-action allow --no-egress
            ```
        - id: terraform
          desc: |
            To ensure network ACLs do not allow unrestricted inbound SSH or RDP access in Terraform, ensure `aws_network_acl_rule` resources restrict SSH and RDP to trusted CIDRs:

            ```hcl
            resource "aws_network_acl_rule" "ssh" {
              network_acl_id = aws_network_acl.example.id
              rule_number    = 100
              egress         = false
              protocol       = "tcp"
              rule_action    = "allow"
              cidr_block     = "10.0.0.0/8"
              from_port      = 22
              to_port        = 22
            }
            ```
        - id: cloudformation
          desc: |
            To ensure network ACLs do not allow unrestricted inbound SSH or RDP access in CloudFormation, ensure network ACL entries restrict SSH and RDP to trusted CIDRs:

            ```yaml
            Resources:
              MyNetworkAcl:
                Type: AWS::EC2::NetworkAcl
                Properties:
                  VpcId: !Ref MyVPC
              SSHInboundRule:
                Type: AWS::EC2::NetworkAclEntry
                Properties:
                  NetworkAclId: !Ref MyNetworkAcl
                  RuleNumber: 100
                  Protocol: 6
                  RuleAction: allow
                  CidrBlock: 10.0.0.0/8
                  PortRange:
                    From: 22
                    To: 22
            ```
    refs:
      - url: https://docs.aws.amazon.com/vpc/latest/userguide/vpc-network-acls.html
        title: Network ACLs - Amazon VPC
  - uid: mondoo-aws-security-nacl-no-unrestricted-ssh-rdp-aws
    filters: asset.platform == "aws"
    mql: |
      aws.ec2.networkAcls.all(
        entries.none(egress == false && ruleAction == "allow" && cidrBlock == "0.0.0.0/0" && protocol == "-1")
      ) &&
      aws.ec2.networkAcls.all(
        entries.none(egress == false && ruleAction == "allow" && ipv6CidrBlock == "::/0" && protocol == "-1")
      ) &&
      aws.ec2.networkAcls.all(
        entries.none(egress == false && ruleAction == "allow" && portRange.from <= 22 && portRange.to >= 22 && cidrBlock == "0.0.0.0/0")
      ) &&
      aws.ec2.networkAcls.all(
        entries.none(egress == false && ruleAction == "allow" && portRange.from <= 22 && portRange.to >= 22 && ipv6CidrBlock == "::/0")
      ) &&
      aws.ec2.networkAcls.all(
        entries.none(egress == false && ruleAction == "allow" && portRange.from <= 3389 && portRange.to >= 3389 && cidrBlock == "0.0.0.0/0")
      ) &&
      aws.ec2.networkAcls.all(
        entries.none(egress == false && ruleAction == "allow" && portRange.from <= 3389 && portRange.to >= 3389 && ipv6CidrBlock == "::/0")
      )
  - uid: mondoo-aws-security-nacl-no-unrestricted-ssh-rdp-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_network_acl_rule")
    mql: |
      terraform.resources.where(nameLabel == "aws_network_acl_rule" && arguments.egress != true && arguments.rule_action == "allow").none(
      arguments.from_port == 22 && arguments.cidr_block == "0.0.0.0/0" ||
      arguments.from_port == 22 && arguments.ipv6_cidr_block == "::/0" ||
      arguments.from_port == 3389 && arguments.cidr_block == "0.0.0.0/0" ||
      arguments.from_port == 3389 && arguments.ipv6_cidr_block == "::/0"
      )
  - uid: mondoo-aws-security-nacl-no-unrestricted-ssh-rdp-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_network_acl_rule")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_network_acl_rule" && change.after.egress != true && change.after.rule_action == "allow").none(
      change.after.from_port == 22 && change.after.cidr_block == "0.0.0.0/0" ||
      change.after.from_port == 22 && change.after.ipv6_cidr_block == "::/0" ||
      change.after.from_port == 3389 && change.after.cidr_block == "0.0.0.0/0" ||
      change.after.from_port == 3389 && change.after.ipv6_cidr_block == "::/0"
      )
  - uid: mondoo-aws-security-nacl-no-unrestricted-ssh-rdp-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_network_acl_rule")
    mql: |
      terraform.state.resources.where(type == "aws_network_acl_rule" && values.egress != true && values.rule_action == "allow").none(
      values.from_port == 22 && values.cidr_block == "0.0.0.0/0" ||
      values.from_port == 22 && values.ipv6_cidr_block == "::/0" ||
      values.from_port == 3389 && values.cidr_block == "0.0.0.0/0" ||
      values.from_port == 3389 && values.ipv6_cidr_block == "::/0"
      )
  - uid: mondoo-aws-security-default-nacl-restrictive
    title: Ensure the default network ACL restricts all traffic
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-1-5
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-aws-security-default-nacl-restrictive-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-default-nacl-restrictive-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-default-nacl-restrictive-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-default-nacl-restrictive-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that the default network ACL in each VPC is configured to deny all inbound and outbound traffic by containing no explicit ALLOW rules. By default, AWS creates the default NACL with rules that allow all traffic in both directions, and any subnet not explicitly associated with a custom NACL automatically falls back to these permissive defaults.

        **Why this matters**

        - **Safe fallback posture:** When a new subnet is created without an explicit NACL association, it inherits the default NACL; if that NACL allows all traffic, the subnet has no network-layer protection until a custom NACL is applied.
        - **Misconfiguration prevention:** Developers provisioning subnets rapidly during incidents or deployments may inadvertently leave subnets exposed by not assigning a custom NACL.
        - **Principle of least privilege:** A default-deny posture at the network layer ensures that only explicitly permitted traffic flows, reducing the risk of unintended access paths.
        - **Defense in depth:** A restrictive default NACL provides a safety net that catches security group misconfigurations or forgotten subnet associations.

        **Risk mitigation**

        - **Implicit deny:** Removing all ALLOW rules from the default NACL means any subnet that falls back to it is isolated from all traffic, making exposure from a missing custom NACL immediately visible rather than silently permissive.
        - **Custom NACL discipline:** Enforcing a restrictive default NACL creates an operational norm where teams must explicitly design and apply network access rules for every subnet, reducing ad hoc permissive configurations.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and open the **VPC** console.
        2. In the left navigation pane, choose **Network ACLs**.
        3. Review the **Default** column. Select each NACL that shows **Yes**.
        4. Choose the **Inbound rules** tab. Review all rules other than the implicit deny-all (rule number 32767).
        5. Choose the **Outbound rules** tab. Review all rules other than the implicit deny-all (rule number 32767).

        A passing default NACL has no rules with action **Allow** in either direction. A failing default NACL shows one or more **Allow** rules on the Inbound rules or Outbound rules tab.

        ### Audit via CLI

        1. List all network ACLs and filter for the default ones:

        ```bash
        aws ec2 describe-network-acls \
          --filters Name=default,Values=true \
          --query 'NetworkAcls[*].{AclId:NetworkAclId,VpcId:VpcId,Entries:Entries}'
        ```

        A passing default NACL returns an `Entries` array that contains only entries with `RuleAction` equal to `deny` (the implicit deny-all entries have rule numbers 32767 and 32768). A failing default NACL shows at least one entry with `"RuleAction": "allow"`.
      remediation:
        - id: console
          desc: |
            To ensure the default network ACL restricts all traffic using the AWS Console:

            1. Navigate to **VPC** > **Network ACLs**.
            2. Identify the default NACL (marked as "Yes" in the Default column).
            3. Modify inbound and outbound rules to deny all traffic.
            4. Ensure all subnets use custom NACLs with appropriate rules.
        - id: cli
          desc: |
            To ensure the default network ACL restricts all traffic using the AWS CLI, replace permissive rules with deny-all rules:

            ```bash
            aws ec2 replace-network-acl-entry --network-acl-id <default-acl-id> --rule-number 100 --protocol -1 --rule-action deny --cidr-block 0.0.0.0/0 --no-egress
            aws ec2 replace-network-acl-entry --network-acl-id <default-acl-id> --rule-number 100 --protocol -1 --rule-action deny --cidr-block 0.0.0.0/0 --egress
            ```
        - id: terraform
          desc: |
            To ensure the default network ACL restricts all traffic in Terraform, use `aws_default_network_acl` with no ingress or egress rules to deny all traffic:

            ```hcl
            resource "aws_default_network_acl" "default" {
              default_network_acl_id = aws_vpc.example.default_network_acl_id
            }
            ```
        - id: cloudformation
          desc: |
            To ensure the default network ACL restricts all traffic in CloudFormation, note that CloudFormation does not provide a dedicated resource for modifying the default network ACL. The default NACL is automatically created with each VPC. Use custom NACLs for all subnets and modify the default NACL rules via the AWS CLI or SDK to deny all traffic.
    refs:
      - url: https://docs.aws.amazon.com/vpc/latest/userguide/vpc-network-acls.html
        title: Network ACLs - Amazon VPC
  - uid: mondoo-aws-security-default-nacl-restrictive-aws
    filters: asset.platform == "aws"
    mql: |
      aws.ec2.networkAcls.where(isDefault == true).all(
        entries.where(ruleAction == "allow").length == 0
      )
  - uid: mondoo-aws-security-default-nacl-restrictive-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_default_network_acl")
    mql: |
