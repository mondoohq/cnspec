            1. Navigate to **CloudWatch** and select **Log groups**.
            2. Select the log group associated with your CloudTrail trail.
            3. Choose **Actions** > **Create metric filter**.
            4. Enter a filter pattern matching `PutBucketAcl`, `PutBucketPolicy`, `PutBucketCors`, `PutBucketLifecycle`, `PutBucketReplication`, `DeleteBucketPolicy`, and similar S3 policy events.
