  - uid: mondoo-aws-security-prefix-list-no-broad-cidrs
    title: Ensure managed prefix lists do not contain overly broad CIDRs
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-aws-security-prefix-list-no-broad-cidrs-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-prefix-list-no-broad-cidrs-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-prefix-list-no-broad-cidrs-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-prefix-list-no-broad-cidrs-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that customer-managed prefix lists do not contain overly broad CIDR ranges such as `0.0.0.0/0` or `::/0`. Prefix lists are referenced in security group rules and route tables; a broad CIDR in a prefix list effectively opens access to the entire internet, defeating the purpose of network segmentation.

        **Why this matters**

        - Managed prefix lists are reusable across multiple security groups and route tables. A single overly broad entry can cascade into unrestricted access across the entire VPC.
        - Security teams reviewing individual security group rules may not notice that a referenced prefix list contains `0.0.0.0/0`, creating a hidden gap in network controls.
        - Prefix lists are designed to centralize and simplify IP allowlists. Broad CIDRs undermine this purpose and should be replaced with specific IP ranges.

        **Risk mitigation**

        - **Network segmentation:** Ensures prefix lists enforce meaningful IP restrictions rather than allowing all traffic.
        - **Hidden exposure prevention:** Prevents broad access rules from being obscured behind prefix list references.
        - **Cascading risk reduction:** A single prefix list fix can tighten access across all security groups and route tables that reference it.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and open the **VPC Console**.
        2. In the left navigation pane, choose **Managed prefix lists**.
        3. Filter the list to show only customer-managed prefix lists (owner is not `AWS`).
        4. Select each prefix list and review its entries in the **Entries** tab.
        5. Check whether any entry uses the CIDR `0.0.0.0/0` or `::/0`.

        A passing prefix list shows no entries with `0.0.0.0/0` or `::/0`. A failing prefix list contains one or more entries with those broad CIDRs.

        ### Audit via CLI

        1. List all customer-managed prefix lists:

        ```bash
        aws ec2 describe-managed-prefix-lists \
          --filters "Name=owner-id,Values=self" \
          --query "PrefixLists[].{Id:PrefixListId,Name:PrefixListName}" \
          --output table
        ```

        2. For each prefix list ID, check for overly broad CIDR entries:

        ```bash
        aws ec2 get-managed-prefix-list-entries \
          --prefix-list-id <prefix-list-id> \
          --query "Entries[?Cidr=='0.0.0.0/0' || Cidr=='::/0']"
        ```

        A passing prefix list returns an empty array `[]`. A failing prefix list returns one or more entries with `0.0.0.0/0` or `::/0`.
      remediation:
        - id: console
          desc: |
            To ensure managed prefix lists do not contain overly broad CIDRs using the AWS Console:

            1. Navigate to the **VPC Console** and select **Managed prefix lists**.
            2. Select each customer-managed prefix list and review its entries.
            3. Remove any entries with `0.0.0.0/0` or `::/0`.
            4. Replace them with specific CIDR ranges that match your intended access patterns.
        - id: cli
          desc: |
            To ensure managed prefix lists do not contain overly broad CIDRs using the AWS CLI, list all customer-managed prefix lists:

            ```bash
            aws ec2 describe-managed-prefix-lists \
              --filters "Name=owner-id,Values=self" \
              --query "PrefixLists[].PrefixListId"
            ```

            Check entries for broad CIDRs:

            ```bash
            aws ec2 get-managed-prefix-list-entries --prefix-list-id <prefix-list-id> \
              --query "Entries[?Cidr=='0.0.0.0/0' || Cidr=='::/0']"
            ```

            Remove the broad entry:

            ```bash
            aws ec2 modify-managed-prefix-list --prefix-list-id <prefix-list-id> \
              --current-version <version> \
              --remove-entries "Cidr=0.0.0.0/0"
            ```
        - id: terraform
          desc: |
            To ensure managed prefix lists do not contain overly broad CIDRs in Terraform, review prefix list entries and replace broad CIDRs with specific ranges:

            ```hcl
            resource "aws_ec2_managed_prefix_list" "example" {
              name           = "allowed-ips"
              address_family = "IPv4"
              max_entries    = 5

              entry {
                cidr        = "10.0.0.0/8"
                description = "Internal network"
              }

              entry {
                cidr        = "203.0.113.0/24"
                description = "Office IP range"
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure managed prefix lists do not contain overly broad CIDRs in CloudFormation:

            ```yaml
            Resources:
              AllowedIPs:
                Type: AWS::EC2::PrefixList
                Properties:
                  PrefixListName: allowed-ips
                  AddressFamily: IPv4
                  MaxEntries: 5
                  Entries:
                    - Cidr: 10.0.0.0/8
                      Description: Internal network
                    - Cidr: 203.0.113.0/24
                      Description: Office IP range
            ```
    refs:
      - url: https://docs.aws.amazon.com/vpc/latest/userguide/managed-prefix-lists.html
        title: AWS Documentation - Managed prefix lists
  - uid: mondoo-aws-security-prefix-list-no-broad-cidrs-aws
    filters: asset.platform == "aws"
    mql: |
      aws.ec2.managedPrefixLists.where(ownerId != "AWS").all(
        entries.none(cidr == "0.0.0.0/0") &&
        entries.none(cidr == "::/0")
      )
  - uid: mondoo-aws-security-prefix-list-no-broad-cidrs-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_ec2_managed_prefix_list")
    mql: |
      terraform.resources.where(nameLabel == "aws_ec2_managed_prefix_list").all(
        blocks.where(type == "entry").all(
          arguments.cidr != "0.0.0.0/0" && arguments.cidr != "::/0"
        )
      )
  - uid: mondoo-aws-security-prefix-list-no-broad-cidrs-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_ec2_managed_prefix_list")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_ec2_managed_prefix_list").all(
        change.after["entry"] == null || change.after["entry"].all(
          _["cidr"] != "0.0.0.0/0" && _["cidr"] != "::/0"
        )
      )
  - uid: mondoo-aws-security-prefix-list-no-broad-cidrs-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_ec2_managed_prefix_list")
    mql: |
      terraform.state.resources.where(type == "aws_ec2_managed_prefix_list").all(
        values["entry"] == null || values["entry"].all(
          _["cidr"] != "0.0.0.0/0" && _["cidr"] != "::/0"
        )
      )
