    mql: |
      terraform.state.resources.where(type == "aws_transfer_web_app").all(
        values["endpoint_details"] != null && values["endpoint_details"] != empty
      )
  - uid: mondoo-aws-security-transfer-workflow-exception-handling
    title: Ensure Transfer workflows with DECRYPT or COPY define onExceptionSteps
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: false
      compliance/dora: dora-art-11
      compliance/hipaa: false
      compliance/iso-27001-2022: false
      compliance/nis-2: false
      compliance/nist-csf-1: nist-csf-1-pr-ip-9
      compliance/nist-csf-2: nist-csf-2-pr-ir-03
      compliance/nist-sp-800-53-rev5: false
      compliance/nist-sp-800-171: false
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc9-1-1
      compliance/vda-isa-5: false
    variants:
      - uid: mondoo-aws-security-transfer-workflow-exception-handling-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-transfer-workflow-exception-handling-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-transfer-workflow-exception-handling-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-transfer-workflow-exception-handling-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that any Transfer Family workflow containing `DECRYPT` or `COPY` steps also defines `onExceptionSteps`. Without exception handling, a partial workflow failure leaves intermediate decrypted or copied files in their staging location, where they may persist longer than intended and bypass the encryption posture the workflow was meant to maintain.

        **Why this matters**

        - `DECRYPT` produces cleartext output in S3 as an intermediate step; if a downstream step fails, the cleartext sits in the staging bucket without cleanup.
        - `COPY` similarly fans data out to additional locations; failure mid-flow leaves data in places the workflow author did not intend it to live.
        - `onExceptionSteps` are the only mechanism Transfer offers to clean up or quarantine partial output on failure.

        **Risk mitigation**

        - **Data residue prevention:** Ensures cleartext or fan-out copies are removed when the workflow fails.
        - **Encryption posture:** Maintains the at-rest encryption guarantee even on partial failures.
      audit: |
        ### Audit via Console

        1. Open the **AWS Transfer Family Console** and navigate to **Workflows**.
        2. For each workflow, select it and review the **Steps** tab to identify any steps of type `DECRYPT` or `COPY`.
        3. For each workflow that contains a `DECRYPT` or `COPY` step, confirm that the **Exception handlers** section lists at least one step such as `DELETE` or `TAG`.

        A passing workflow with `DECRYPT` or `COPY` steps shows one or more exception handler steps defined. A failing workflow shows an empty **Exception handlers** section alongside a `DECRYPT` or `COPY` nominal step.

        ### Audit via CLI

        1. List all Transfer workflows and inspect their steps and exception steps:

        ```bash
        aws transfer list-workflows --query 'Workflows[*].WorkflowId' --output text | \
          tr '\t' '\n' | \
          while read wid; do
            echo "--- $wid ---"
            aws transfer describe-workflow --workflow-id "$wid" \
              --query '{Steps: Workflow.Steps[*].Type, OnExceptionSteps: Workflow.OnExceptionSteps}'
          done
        ```

        A passing workflow returns a non-empty `OnExceptionSteps` array whenever `Steps` contains `DECRYPT` or `COPY`. A failing workflow returns `OnExceptionSteps: null` or `OnExceptionSteps: []` while one of its steps is `DECRYPT` or `COPY`.
      remediation:
        - id: console
          desc: |
            To add exception handling to a Transfer workflow using the AWS Console:

            1. Open the **AWS Transfer Family Console** and select **Workflows**. Workflow steps are immutable so a new workflow is required.
            2. Choose **Create workflow** and replicate the existing nominal steps.
            3. Under **Exception handlers**, add `DELETE` or `TAG` steps that operate on the partial output of `DECRYPT` and `COPY`.
            4. Switch the Transfer servers and connectors to reference the new workflow ID.
            5. Delete the old workflow once the migration is complete.
        - id: cli
          desc: |
            To create a workflow with exception handling using the AWS CLI:

            ```bash
            aws transfer create-workflow \
              --steps file://steps.json \
              --on-exception-steps file://exception-steps.json
            ```
        - id: terraform
          desc: |
            To create a Transfer Family workflow with exception handling steps in Terraform, use the `on_exception_steps` argument in `aws_transfer_workflow`:

            ```hcl
            resource "aws_transfer_workflow" "example" {
              description = "Workflow with DECRYPT step and exception handling"

              steps {
                type = "DECRYPT"

                decrypt_step_details {
                  name                  = "decrypt-files"
                  type                  = "PGP"
                  source_file_location  = "${original.file}"
                  overwrite_existing    = "TRUE"
                  destination_file_location {
                    s3_file_location {
                      bucket = aws_s3_bucket.dest.bucket
                      key    = "decrypted/${transfer:UploadDate}/${transfer:UserName}/"
                    }
                  }
                }
              }

              on_exception_steps {
                type = "DELETE"

                delete_step_details {
                  name                 = "delete-on-error"
                  source_file_location = "${original.file}"
                }
              }
            }
            ```
    refs:
      - url: https://docs.aws.amazon.com/transfer/latest/userguide/nominal-steps-workflow.html
        title: AWS Transfer Family - Workflow steps and exception handling
  - uid: mondoo-aws-security-transfer-workflow-exception-handling-aws
    filters: asset.platform == "aws"
    mql: |
      aws.transfer.workflows.where(
        steps.any(_['Type'] == "DECRYPT" || _['Type'] == "COPY")
      ).all(onExceptionSteps != null && onExceptionSteps.length > 0)
  - uid: mondoo-aws-security-transfer-workflow-exception-handling-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_transfer_workflow")
    mql: |
      terraform.resources.where(nameLabel == "aws_transfer_workflow").all(
        blocks.where(type == "steps").none(arguments["type"] == "DECRYPT" || arguments["type"] == "COPY") ||
        blocks.where(type == "on_exception_steps") != empty
      )
  - uid: mondoo-aws-security-transfer-workflow-exception-handling-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_transfer_workflow")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_transfer_workflow").all(
        change.after["steps"].none(_["type"] == "DECRYPT" || _["type"] == "COPY") ||
        change.after["on_exception_steps"] != null && change.after["on_exception_steps"] != empty
      )
  - uid: mondoo-aws-security-transfer-workflow-exception-handling-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_transfer_workflow")
    mql: |
      terraform.state.resources.where(type == "aws_transfer_workflow").all(
        values["steps"].none(_["type"] == "DECRYPT" || _["type"] == "COPY") ||
        values["on_exception_steps"] != null && values["on_exception_steps"] != empty
      )
  # No CloudFormation variant: AWS::Bedrock::CustomModel is not a CloudFormation resource type.
  - uid: mondoo-aws-security-bedrock-custom-model-cmk-encryption
    title: Ensure Bedrock custom models use a customer-managed KMS key
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-11
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-aws-security-bedrock-custom-model-cmk-encryption-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-bedrock-custom-model-cmk-encryption-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-bedrock-custom-model-cmk-encryption-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-bedrock-custom-model-cmk-encryption-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that every Amazon Bedrock custom model is encrypted at rest with a customer-managed KMS key (CMK). By default, Bedrock encrypts custom models with an AWS-owned key that the customer cannot rotate, audit, or revoke independently, which means the organization has no mechanism to render a leaked model artifact unrecoverable.

        **Why this matters**

        - **Training data sensitivity:** Custom model artifacts retain the statistical patterns of the training data used to produce them, so their unauthorized access can expose proprietary or regulated information.
        - **Key revocation capability:** A CMK can be disabled or deleted to render model artifacts permanently inaccessible, which is not possible with AWS-owned default keys.
        - **Granular access control:** CMK key policies and grants precisely define which principals can decrypt model artifacts and training outputs, limiting access to authorized services and users.
        - **Decryption audit trail:** CloudTrail logs every CMK use, providing a per-operation record of who accessed model artifacts and when.

        **Risk mitigation**

        - **Incident containment:** If a custom model is determined to contain sensitive training data that should not have been included, the CMK can be revoked to prevent further access while remediation is planned.
        - **Regulatory alignment:** CMK encryption satisfies BYOK requirements and compliance frameworks that mandate customer-controlled cryptographic material for AI and ML workloads handling regulated data.
      audit: |
        ### Audit via Console

        1. Open the **Amazon Bedrock Console** and select **Custom models** under **Foundation models**.
        2. Select each custom model and review the **Model details** page.
        3. Under **Encryption**, confirm that a customer-managed KMS key ARN is shown rather than the AWS-managed default key.

        A passing custom model shows a customer-managed KMS key ARN in the **Encryption** field. A failing custom model shows the AWS-managed key or no key listed.

        ### Audit via CLI

        1. List all Bedrock custom models and check the `modelKmsKeyArn` and key manager:

        ```bash
        aws bedrock list-custom-models --query 'modelSummaries[*].{Name:modelName,Arn:modelArn}' --output table
        ```

        2. For each model, retrieve the key details:

        ```bash
        aws bedrock get-custom-model --model-identifier <model-name-or-arn> \
          --query '{Name:modelName,KmsKeyArn:modelKmsKeyArn}'
        ```

        3. Confirm the KMS key is customer-managed:

        ```bash
        aws kms describe-key --key-id <kms-key-arn> \
          --query 'KeyMetadata.KeyManager'
        ```

        A passing custom model returns `"CUSTOMER"` for `KeyManager`. A failing custom model returns a null or empty `KmsKeyArn`, or returns `"AWS"` for `KeyManager`.
      remediation:
        - id: console
          desc: |
            Custom-model encryption is set at creation time and cannot be modified after the fact. To migrate to a CMK using the AWS Console:

            1. Open the **Amazon Bedrock Console** and select **Custom models**.
            2. Note the base model, training-data location, hyperparameters, and output-data location of the existing custom model.
            3. Choose **Customize model** and recreate the job, selecting your CMK under **Encryption** for the model output.
            4. Once the new model is trained and validated, delete the prior custom model.
        - id: cli
          desc: |
