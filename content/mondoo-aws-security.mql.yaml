      )
  - uid: mondoo-aws-security-kinesis-cmk-typed-key-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_kinesis_stream")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_kinesis_stream").all(
        change.after['encryption_type'] == "KMS" &&
        change.after['kms_key_id'] != empty
      )
  - uid: mondoo-aws-security-kinesis-cmk-typed-key-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_kinesis_stream")
    mql: |
      terraform.state.resources.where(type == "aws_kinesis_stream").all(
        values['encryption_type'] == "KMS" &&
        values['kms_key_id'] != empty
      )
  - uid: mondoo-aws-security-kinesis-cmk-typed-key-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::Kinesis::Stream")
    mql: |
