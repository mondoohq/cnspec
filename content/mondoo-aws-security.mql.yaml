    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_inspector2_enabler")
    mql: |
      terraform.state.resources.where(type == "aws_inspector2_enabler").all(
      values.resource_types.contains("EC2")
      )
