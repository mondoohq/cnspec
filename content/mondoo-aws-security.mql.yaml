      )
  - uid: mondoo-aws-security-ecs-no-privileged-containers-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_ecs_task_definition")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_ecs_task_definition").all(
        change.after.container_definitions.all(_['privileged'] != true)
      )
  - uid: mondoo-aws-security-ecs-no-privileged-containers-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_ecs_task_definition")
    mql: |
      terraform.state.resources.where(type == "aws_ecs_task_definition").all(
        values.container_definitions.all(_['privileged'] != true)
      )
  - uid: mondoo-aws-security-ecs-no-privileged-containers-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::ECS::TaskDefinition")
    mql: |
      cloudformation.template.resources.where(type == "AWS::ECS::TaskDefinition").all(
      properties['ContainerDefinitions'].all(_['privileged'] != true)
      )
  - uid: mondoo-aws-security-ecs-readonly-root-filesystem
    title: Ensure ECS task definitions use read-only root filesystems
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-c-1-integrity
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-1
      compliance/nist-csf-2: nist-csf-2-pr-ps-06
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-2
      compliance/pci-dss-4: pcidss-requirement-2-2-4
      compliance/soc2-2017: soc2-control-cc6-8-1
      compliance/vda-isa-5: vda-isa-5-4-2-1
    variants:
      - uid: mondoo-aws-security-ecs-readonly-root-filesystem-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-ecs-readonly-root-filesystem-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ecs-readonly-root-filesystem-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ecs-readonly-root-filesystem-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ecs-readonly-root-filesystem-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon ECS task definitions configure containers with read-only root filesystems, preventing processes inside the container from writing to the container image's file system. By default, ECS containers have a writable root filesystem, which applications rarely need for normal operation.

        **Why this matters**

        - **Tamper prevention:** A read-only root filesystem stops an attacker who achieves code execution from modifying container binaries, configuration files, or startup scripts.
        - **Persistence elimination:** Without the ability to write to the file system, attackers cannot plant backdoors, web shells, or cron jobs that survive container restarts.
        - **Malware containment:** Exploits that attempt to download and execute secondary payloads are blocked if the file system is not writable.
        - **Immutability enforcement:** Treating containers as immutable runtime units aligns with the rebuild-and-redeploy model, making the attack surface predictable.

        **Risk mitigation**

        - **Post-exploitation hardening:** Forces any data writes through explicitly declared volume mounts, making write activity observable and auditable.
        - **Image integrity:** Ensures the running container file system matches the built image, closing the gap between what was scanned and what is executing.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and navigate to **Amazon ECS**.
        2. In the left navigation pane, select **Task definitions**.
        3. For each active task definition, select the task definition name, then open the latest revision.
        4. For each container listed under **Container definitions**, select the container name and review the **Storage and logging** section.
        5. Check whether **Read only root file system** is enabled.

        A passing task definition shows **Read only root file system** as enabled for all containers. A failing task definition shows the setting as disabled or absent for one or more containers.

        ### Audit via CLI

        1. Retrieve active task definitions and check the `readonlyRootFilesystem` field for each container:

        ```bash
        aws ecs list-task-definitions --status ACTIVE \
          --query "taskDefinitionArns" --output text | \
          tr '\t' '\n' | \
          xargs -I {} aws ecs describe-task-definition --task-definition {} \
          --query "taskDefinition.{Family:family,Containers:containerDefinitions[*].{Name:name,ReadOnly:readonlyRootFilesystem}}"
        ```

        A passing task definition returns `"ReadOnly": true` for all containers. A failing task definition returns `"ReadOnly": false` or `null` for one or more containers.

      remediation:
        - id: console
          desc: |
            To ensure ECS task definitions use read-only root filesystems using the AWS Console:

            1. Navigate to the Amazon ECS Console.
            2. Select Task definitions in the left panel.
            3. Select the task definition to review.
            4. For each container definition, check the Storage and logging section.
            5. Enable Read only root file system.
            6. Add volume mounts for any directories that require write access such as `/tmp` or `/var/log`.
            7. Create a new revision with the updated settings.
        - id: cli
          desc: |
            To ensure ECS task definitions use read-only root filesystems using the AWS CLI, check read-only root filesystem settings:

            ```bash
            aws ecs list-task-definitions --status ACTIVE --query "taskDefinitionArns" | \
              xargs -I {} aws ecs describe-task-definition --task-definition {} \
              --query "taskDefinition.containerDefinitions[*].{Name:name, ReadonlyRootFilesystem:readonlyRootFilesystem}"
            ```

            Register a new task definition revision with read-only root filesystem:

            ```bash
            aws ecs register-task-definition --cli-input-json file://task-definition.json
            ```

            Ensure the container definition has `"readonlyRootFilesystem": true`.
        - id: terraform
          desc: |
            To ensure ECS task definitions use read-only root filesystems in Terraform:

            ```hcl
            resource "aws_ecs_task_definition" "example" {
              family = "example"

              container_definitions = jsonencode([
                {
                  name                   = "app"
                  image                  = "example:latest"
                  essential              = true
                  readonlyRootFilesystem = true
                  mountPoints = [
                    {
                      sourceVolume  = "tmp"
                      containerPath = "/tmp"
                    }
                  ]
                }
              ])

              volume {
                name = "tmp"
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure ECS task definitions use read-only root filesystems in CloudFormation:

            ```yaml
            Resources:
              TaskDefinition:
                Type: "AWS::ECS::TaskDefinition"
                Properties:
                  Family: "example"
                  ContainerDefinitions:
                    - Name: "app"
                      Image: "example:latest"
                      Essential: true
                      ReadonlyRootFilesystem: true
            ```
    refs:
      - url: https://docs.aws.amazon.com/AmazonECS/latest/bestpracticesguide/security-runtime.html
        title: AWS Documentation - Runtime security for Amazon ECS
      - url: https://docs.aws.amazon.com/securityhub/latest/userguide/ecs-controls.html
        title: AWS Documentation - ECS controls
