    docs:
      desc: |
        This check ensures that a CloudWatch metric filter and alarm exist to detect changes to Amazon S3 bucket policies and ACLs. S3 buckets frequently contain sensitive data, and unintended changes to bucket policies or ACLs can inadvertently expose that data publicly.

        Monitoring S3 bucket policy changes enables security teams to detect misconfiguration events that could lead to data breaches. This is especially important given the high frequency of data exposure incidents caused by misconfigured S3 buckets.

        CIS AWS Foundations Benchmark recommends monitoring S3 bucket policy changes to prevent unauthorized data exposure and enforce data governance policies across your object storage environment.
      remediation:
        - id: console
          desc: |
            To ensure log metric filter exists for S3 bucket policy changes using the AWS Console:

            1. Navigate to **CloudWatch** and select **Log groups**.
            2. Select the log group associated with your CloudTrail trail.
            3. Choose **Actions** > **Create metric filter**.
            4. Enter a filter pattern matching `PutBucketAcl`, `PutBucketPolicy`, `PutBucketCors`, `PutBucketLifecycle`, `PutBucketReplication`, `DeleteBucketPolicy`, and similar S3 policy events.
            5. Assign a metric name and namespace, then choose **Create metric filter**.
            6. Navigate to **Alarms** > **Create alarm**, select the new metric, and configure SNS notification.
        - id: cli
          desc: |
            To ensure log metric filter exists for S3 bucket policy changes using the AWS CLI, create the metric filter:

            ```bash
            aws logs put-metric-filter \
              --log-group-name <cloudtrail-log-group> \
              --filter-name S3BucketPolicyChanges \
              --filter-pattern '{ ($.eventSource = s3.amazonaws.com) && (($.eventName = PutBucketAcl) || ($.eventName = PutBucketPolicy) || ($.eventName = PutBucketCors) || ($.eventName = PutBucketLifecycle) || ($.eventName = PutBucketReplication) || ($.eventName = DeleteBucketPolicy)) }' \
              --metric-transformations metricName=S3BucketPolicyChanges,metricNamespace=CISBenchmark,metricValue=1
            ```

            Create the alarm:

            ```bash
            aws cloudwatch put-metric-alarm \
              --alarm-name S3BucketPolicyChanges \
              --metric-name S3BucketPolicyChanges \
              --namespace CISBenchmark \
              --statistic Sum \
              --period 300 \
              --threshold 1 \
              --comparison-operator GreaterThanOrEqualToThreshold \
              --evaluation-periods 1 \
              --alarm-actions <sns-topic-arn>
            ```
        - id: terraform
          desc: |
            To ensure log metric filter exists for S3 bucket policy changes in Terraform, create a CloudWatch log metric filter and alarm for S3 bucket policy changes:

            ```hcl
            resource "aws_cloudwatch_log_metric_filter" "s3bucketpolicychanges" {
              name           = "S3BucketPolicyChanges"
              log_group_name = aws_cloudwatch_log_group.cloudtrail.name
              pattern        = "{ ($.eventSource = s3.amazonaws.com) && (($.eventName = PutBucketAcl) || ($.eventName = PutBucketPolicy) || ($.eventName = DeleteBucketPolicy)) }"

              metric_transformation {
                name      = "S3BucketPolicyChanges"
                namespace = "CISBenchmark"
                value     = "1"
              }
            }

            resource "aws_cloudwatch_metric_alarm" "s3bucketpolicychanges" {
              alarm_name          = "S3BucketPolicyChanges"
              metric_name         = "S3BucketPolicyChanges"
              namespace           = "CISBenchmark"
              statistic           = "Sum"
              period              = 300
              threshold           = 1
              comparison_operator = "GreaterThanOrEqualToThreshold"
              evaluation_periods  = 1
              alarm_actions       = [aws_sns_topic.alerts.arn]
            }
            ```
        - id: cloudformation
          desc: |
            To ensure log metric filter exists for S3 bucket policy changes in CloudFormation, create a CloudWatch log metric filter and alarm for S3 bucket policy changes:

            ```yaml
            Resources:
              S3BucketPolicyChangesFilter:
                Type: AWS::Logs::MetricFilter
                Properties:
                  LogGroupName: !Ref CloudTrailLogGroup
                  FilterPattern: "{ ($.eventSource = s3.amazonaws.com) && (($.eventName = PutBucketAcl) || ($.eventName = PutBucketPolicy) || ($.eventName = DeleteBucketPolicy)) }"
                  MetricTransformations:
                    - MetricName: S3BucketPolicyChanges
                      MetricNamespace: CISBenchmark
                      MetricValue: "1"

              S3BucketPolicyChangesAlarm:
                Type: AWS::CloudWatch::Alarm
                Properties:
                  AlarmName: S3BucketPolicyChanges
                  MetricName: S3BucketPolicyChanges
                  Namespace: CISBenchmark
                  Statistic: Sum
                  Period: 300
                  Threshold: 1
                  ComparisonOperator: GreaterThanOrEqualToThreshold
                  EvaluationPeriods: 1
                  AlarmActions:
                    - !Ref AlertsSNSTopic
            ```
