  - uid: mondoo-aws-security-iam-users-only-one-access-key
    title: Ensure IAM users have only one active access key
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-07
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-5-17
      compliance/nis-2: nis-2-21-2-g
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-5
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-5
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-9
      compliance/vda-isa-5: vda-isa-5-4-1-3
    variants:
      - uid: mondoo-aws-security-iam-users-only-one-access-key-aws
        tags:
          mondoo.com/filter-title: AWS IAM User
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-iam-users-only-one-access-key-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-iam-users-only-one-access-key-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-iam-users-only-one-access-key-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that each AWS IAM user has no more than one active access key at a time. AWS allows up to two access keys per user to facilitate zero-downtime rotation; however, leaving two keys active simultaneously doubles the attack surface and makes it harder to track which key is in use or when each was last rotated.

        **Why this matters**

        - **Reduced credential exposure:** Each active access key is an independent credential that could be leaked through a separate channel; minimizing the number of active keys reduces the total number of secrets that must be protected.
        - **Rotation clarity:** When only one key is active, rotation has a clear starting state and the purpose of a second key is unambiguous; with two permanently active keys, rotation may be deferred indefinitely.
        - **Auditability:** A single active key per user makes it straightforward to correlate API activity to a specific credential and to determine when that credential was last rotated.

        **Risk mitigation**

        - **Compromised key isolation:** Limiting each user to one active key means a leaked credential can be identified and revoked without uncertainty about whether a second active key was also exposed.
        - **Key sprawl prevention:** Requiring users to deactivate old keys before creating new ones prevents credentials from accumulating over time and becoming forgotten attack surfaces.
        - **Simplified incident response:** With one key per user, revoking access after a compromise is a single operation with no risk of leaving a second active key behind.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and open the IAM console at https://console.aws.amazon.com/iam/.
        2. In the left navigation pane, choose **Users**.
        3. For each user, select the user name and choose the **Security credentials** tab.
        4. Under **Access keys**, count the number of keys with **Status** set to **Active**.

        A passing user has zero or one active access key. A failing user has two active access keys simultaneously.

        ### Audit via CLI

        1. List all IAM users:

        ```bash
        aws iam list-users --query "Users[*].UserName" --output text
        ```

        2. For each user, list active access keys and count them:

        ```bash
        aws iam list-access-keys --user-name <username> --query "AccessKeyMetadata[?Status=='Active'].AccessKeyId"
        ```

        A passing user returns an array with zero or one element. A failing user returns an array with two elements.
      remediation:
        - id: console
          desc: |
            To ensure IAM users have only one active access key using the AWS Console:

            1.  Navigate to the AWS IAM Console.
            2.  Select Users in the left panel.
            3.  Select a user and go to the Security Credentials tab.
            4.  Under Access Keys, check how many active keys exist.
            5.  If more than one active access key is present:

              - Determine which key is in use.
              - Disable and delete the extra key(s).
              - If a key is needed for rotation, create a new key before deleting the old one.
        - id: cli
          desc: |
            To ensure IAM users have only one active access key using the AWS CLI, list all IAM users:

            ```bash
            aws iam list-users --query "Users[*].UserName"
            ```

            Check access keys for a specific user:

            ```bash
            aws iam list-access-keys --user-name <username> --query "AccessKeyMetadata[*].{AccessKeyId:AccessKeyId, Status:Status}"
            ```

            If more than one Active (Status: Active) key exists, deactivate and delete extra keys:

            ```bash
            aws iam update-access-key --user-name <username> --access-key-id <access-key-id> --status Inactive
            aws iam delete-access-key --user-name <username> --access-key-id <access-key-id>
            ```
        - id: terraform
          desc: |
            To ensure IAM users have only one active access key in Terraform, AWS does not support direct enforcement of single active access keys in Terraform, but you can enforce a security policy to limit IAM users to one active key:

            ```hcl
            resource "aws_iam_policy" "limit_access_keys" {
              name        = "LimitAccessKeys"
              description = "Ensure IAM users have at most one active access key"

              policy = jsonencode({
                Version = "2012-10-17",
                Statement = [
                  {
                    Effect   = "Deny",
                    Action   = "iam:CreateAccessKey",
                    Resource = "*",
                    Condition = {
                      NumericGreaterThan = {
                        "iam:AccessKeysCount": 1
                      }
                    }
                  }
                ]
              })
            }
            ```
        - id: cloudformation
          desc: |
            To ensure IAM users have only one active access key in CloudFormation:

            ```yaml
            Resources:
              # Policy to deny creation of more than one access key per user
              LimitAccessKeysPolicy:
                Type: "AWS::IAM::ManagedPolicy"
                Properties:
                  ManagedPolicyName: "LimitAccessKeys"
                  Description: "Ensure IAM users have at most one active access key"
                  PolicyDocument:
                    Version: "2012-10-17"
                    Statement:
                      - Effect: "Deny"
                        Action: "iam:CreateAccessKey"
                        Resource: "*"
                        Condition:
                          NumericGreaterThanEquals:
                            "iam:ActiveAccessKeys": "1"
            ```
    refs:
      - url: https://docs.aws.amazon.com/IAM/latest/UserGuide/best-practices.html
        title: AWS IAM Best Practices
      - url: https://docs.aws.amazon.com/IAM/latest/UserGuide/id_credentials_access-keys.html
        title: AWS Documentation - Manage access keys for IAM users
  - uid: mondoo-aws-security-iam-users-only-one-access-key-aws
    filters: asset.platform == "aws-iam-user"
    mql: |
      aws.iam.user.accessKeys.flat.where(Status == "Active").length <= 1
  - uid: mondoo-aws-security-iam-users-only-one-access-key-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_iam_policy")
    mql: |
      terraform.resources.where(nameLabel == "aws_iam_policy").any(
        arguments.policy.any(
          _['Statement'].any(
            _['Effect'] == "Deny" &&
            _['Action'] == "iam:CreateAccessKey" &&
            _['Condition']['NumericGreaterThan']['iam:AccessKeysCount'] >= 1
          )
        )
      )
  - uid: mondoo-aws-security-iam-users-only-one-access-key-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_iam_policy")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_iam_policy").any(
        change.after.policy.contains('iam:CreateAccessKey') &&
        change.after.policy.contains('Deny') &&
        change.after.policy.contains('NumericGreaterThan') &&
        change.after.policy.contains('iam:AccessKeysCount')
      )
  - uid: mondoo-aws-security-iam-users-only-one-access-key-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_iam_policy")
    mql: |
      terraform.state.resources.where(type == "aws_iam_policy").any(
        values.policy.contains('iam:CreateAccessKey') &&
        values.policy.contains('Deny') &&
        values.policy.contains('NumericGreaterThan') &&
        values.policy.contains('iam:AccessKeysCount')
      )
  - uid: mondoo-aws-security-iam-user-no-inline-policies-check
    title: Ensure IAM users receive permissions only through groups
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-5
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-3-3
      compliance/vda-isa-5: vda-isa-5-4-2-1
    variants:
      - uid: mondoo-aws-security-iam-user-no-inline-policies-check-aws
        tags:
          mondoo.com/filter-title: AWS IAM User
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-iam-user-no-inline-policies-check-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-iam-user-no-inline-policies-check-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-iam-user-no-inline-policies-check-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that AWS IAM users have no directly attached inline or managed policies and receive all permissions exclusively through IAM group membership. Inline policies attached to individual users are hidden from bulk policy reviews, bypassing the group-based access model and creating persistent permission grants that survive credential rotations.

        **Why this matters**

        - **Backdoor concealment:** Inline policies do not appear in the IAM policy list and require per-user enumeration to discover, making them an effective hiding spot for attacker-planted persistent permissions.
        - **Audit coverage gap:** Access reviews that scan group policies miss per-user inline policies, allowing excessive or malicious permissions to persist undetected through multiple review cycles.
        - **Privilege creep accumulation:** When permissions are granted directly to users rather than through groups, there is no natural checkpoint for reviewing whether accumulated permissions still reflect least privilege.
        - **Policy lifecycle management:** Policies attached to groups are managed centrally and changes apply to all members simultaneously; inline policies require per-user remediation, making cleanup slower and less reliable.

        **Risk mitigation**

        - **Backdoor elimination:** Removing inline policies closes the most common technique for maintaining persistent access after initial IAM compromise, because any permissions granted through groups are visible in bulk reviews.
        - **Centralized permission control:** Group-based permissions allow security teams to review and modify the full set of a user's permissions in one place, reducing the risk of missed grants during access reviews.
        - **Privilege escalation prevention:** Without the ability to attach inline policies to specific users, an attacker who gains IAM write access cannot silently expand a user's permissions beyond what their group membership grants.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and open the IAM console at https://console.aws.amazon.com/iam/.
        2. In the left navigation pane, choose **Users**.
        3. For each user, select the user name and choose the **Permissions** tab.
        4. Check for any policies listed under **Permissions policies** that are not inherited from a group.
        5. Look for inline policies (shown with an **Inline policy** badge) and directly attached managed policies.

        A passing user has no inline policies and no directly attached managed policies; all permissions flow through group membership. A failing user shows one or more inline policies or directly attached managed policies.

        ### Audit via CLI

        1. List all IAM users:

        ```bash
        aws iam list-users --query "Users[*].UserName" --output text
        ```

        2. For each user, check for inline policies:

        ```bash
        aws iam list-user-policies --user-name <username> --query "PolicyNames"
        ```

        3. For each user, check for directly attached managed policies:

        ```bash
        aws iam list-attached-user-policies --user-name <username> --query "AttachedPolicies[*].PolicyName"
        ```

        A passing user returns empty arrays for both commands. A failing user returns one or more policy names in either command.
      remediation:
        - id: console
          desc: |
            To ensure IAM users receive permissions only through groups using the AWS Console:

            1.  Navigate to the AWS IAM Console.
            2.  Select Users in the left panel.
            3.  Select a user and go to the Permissions tab.
            4.  Identify users with directly attached policies (either managed or inline policies).
            5.  If direct policies exist:
              - Detach managed policies from the user.
              - Delete inline policies assigned to the user.
              - Assign the user to an IAM group that grants the necessary permissions.
        - id: cli
          desc: |
            To ensure IAM users receive permissions only through groups using the AWS CLI, list all IAM users and check if they have directly attached policies:

            ```bash
            aws iam list-users --query "Users[*].UserName"
            ```

            Check managed policies attached to a user:

            ```bash
            aws iam list-attached-user-policies --user-name <username>
            ```

            Detach any managed policies:

            ```bash
            aws iam detach-user-policy --user-name <username> --policy-arn <policy-arn>
            ```

            Check inline policies assigned to a user:

            ```bash
            aws iam list-user-policies --user-name <username>
            ```

            Delete any inline policies:

            ```bash
            aws iam delete-user-policy --user-name <username> --policy-name <policy-name>
            ```

            Assign the user to an IAM group instead:

            ```bash
            aws iam add-user-to-group --group-name <group-name> --user-name <username>
            ```
        - id: terraform
          desc: |
            To ensure IAM users receive permissions only through groups in Terraform, enforce group-based permissions and prevent direct policy assignments:

            ```hcl
            resource "aws_iam_group" "developers" {
              name = "Developers"
            }

            resource "aws_iam_user" "user1" {
              name = "user1"
            }

            resource "aws_iam_group_membership" "dev_group_membership" {
              name  = "dev-membership"
              group = aws_iam_group.developers.name
              users = [aws_iam_user.user1.name]
            }
            ```
        - id: cloudformation
          desc: |
            To ensure IAM users receive permissions only through groups in CloudFormation, CloudFormation can enforce that IAM users receive permissions through groups only:

            ```yaml
            Resources:
              # Create IAM groups with appropriate permissions
              ReadOnlyGroup:
                Type: "AWS::IAM::Group"
                Properties:
                  GroupName: "ReadOnlyUsers"
                  ManagedPolicyArns:
                    - "arn:aws:iam::aws:policy/ReadOnlyAccess"

              AdminGroup:
                Type: "AWS::IAM::Group"
                Properties:
                  GroupName: "Administrators"
                  ManagedPolicyArns:
                    - "arn:aws:iam::aws:policy/AdministratorAccess"

              # Create IAM users without direct policies
              ReadOnlyUser:
                Type: "AWS::IAM::User"
                Properties:
                  UserName: "readonly-user"
                  Path: "/"
                  # No inline policies or managed policies attached directly

              AdminUser:
                Type: "AWS::IAM::User"
                Properties:
                  UserName: "admin-user"
                  Path: "/"
                  # No inline policies or managed policies attached directly

              # Add users to the appropriate groups
              ReadOnlyUserGroupMembership:
                Type: "AWS::IAM::UserToGroupAddition"
                Properties:
                  GroupName: !Ref ReadOnlyGroup
                  Users:
                    - !Ref ReadOnlyUser

              AdminUserGroupMembership:
                Type: "AWS::IAM::UserToGroupAddition"
                Properties:
                  GroupName: !Ref AdminGroup
                  Users:
                    - !Ref AdminUser
            ```
    refs:
      - url: https://docs.aws.amazon.com/IAM/latest/UserGuide/access_policies_managed-vs-inline.html
        title: Managed policies and inline policies
  - uid: mondoo-aws-security-iam-user-no-inline-policies-check-aws
    filters: asset.platform == "aws-iam-user"
    mql: |
      aws.iam.user.policies == empty
      aws.iam.user.attachedPolicies == empty
  - uid: mondoo-aws-security-iam-user-no-inline-policies-check-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_iam_user")
    mql: |
      terraform.resources.where(nameLabel == "aws_iam_user_policy") == empty
  - uid: mondoo-aws-security-iam-user-no-inline-policies-check-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_iam_user")
    mql: |
      terraform.plan.resourceChanges.none(type == "aws_iam_user_policy")
  - uid: mondoo-aws-security-iam-user-no-inline-policies-check-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_iam_user")
    mql: |
      terraform.state.resources.none(type == "aws_iam_user_policy")
  - uid: mondoo-aws-security-vpc-default-security-group-closed
    title: Ensure the default security group of every VPC restricts all traffic
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-aws-security-vpc-default-security-group-closed-aws
        tags:
          mondoo.com/filter-title: AWS EC2 Security Group
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-vpc-default-security-group-closed-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-vpc-default-security-group-closed-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-vpc-default-security-group-closed-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-vpc-default-security-group-closed-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that the default security group for every AWS VPC is configured to allow no inbound or outbound traffic. When a VPC is created, AWS automatically creates a default security group that permits all traffic between instances assigned to the group; any resource inadvertently associated with this group, rather than a purpose-built security group, immediately has unrestricted internal network access.

        **Why this matters**

        - **Inadvertent exposure prevention:** Resources launched without an explicit security group assignment automatically receive the default group; if that group has permissive rules, those resources gain unintended network access to all other resources sharing the group.
        - **Lateral movement containment:** Unrestricted intra-group traffic means that a compromised instance can reach every other instance in the default group without any additional network controls, facilitating lateral movement.
        - **Configuration hygiene:** Restricting the default group forces operators to assign purpose-built security groups with explicit rules, making the intended network topology explicit and auditable.

        **Risk mitigation**

        - **Blast radius reduction:** An attacker who compromises an instance in the default security group gains no implicit network access to other resources, because the empty default group has no inbound rules to exploit.
        - **Misassignment defense:** Removing all rules from the default group means that accidental association of a new resource with that group results in network isolation rather than unrestricted access.
        - **Explicit access model enforcement:** Operators must actively choose a security group with defined rules, making the network access model intentional and reviewable rather than permissive by accident.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and open the VPC console at https://console.aws.amazon.com/vpc/.
        2. In the left navigation pane, choose **Security groups**.
        3. Use the filter bar to filter by **Group name** equal to `default`.
        4. For each default security group, select it and review the **Inbound rules** and **Outbound rules** tabs.

        A passing default security group shows no inbound rules and no outbound rules. A failing default security group shows one or more rules in either the inbound or outbound rules tab.

        ### Audit via CLI

        1. List all default security groups across all VPCs:

        ```bash
        aws ec2 describe-security-groups --filters Name=group-name,Values=default --query "SecurityGroups[*].{GroupId:GroupId,VpcId:VpcId,InboundRules:IpPermissions,OutboundRules:IpPermissionsEgress}"
        ```

        A passing security group returns empty arrays for both `InboundRules` and `OutboundRules`. A failing security group returns one or more entries in either `InboundRules` or `OutboundRules`.
      remediation:
        - id: console
          desc: |
            To ensure the default security group of every VPC restricts all traffic using the AWS Console:

            1.  Navigate to the AWS VPC Console.
            2.  Select Security Groups from the left panel.
            3.  Filter by “default” security groups under the VPC ID column.
            4.  For each default security group:
              - Remove all inbound rules by selecting Edit inbound rules and deleting all existing entries.
              - Remove all outbound rules by selecting Edit outbound rules and deleting all existing entries.
            5.  Save the changes to ensure that the default security group does not allow any traffic.
        - id: cli
          desc: |
            To ensure the default security group of every VPC restricts all traffic using the AWS CLI, list all default security groups:

            ```bash
            aws ec2 describe-security-groups --filters Name=group-name,Values=default --query "SecurityGroups[*].GroupId"
            ```

            For each default security group, remove all inbound rules:

            ```bash
            aws ec2 revoke-security-group-ingress --group-id <sg-id> --ip-permissions IpProtocol=-1,IpRanges='[{CidrIp=0.0.0.0/0}]'
            ```

            Remove all outbound rules:

            ```bash
            aws ec2 revoke-security-group-egress --group-id <sg-id> --ip-permissions IpProtocol=-1,IpRanges='[{CidrIp=0.0.0.0/0}]'
            ```
        - id: terraform
          desc: |
            To ensure the default security group of every VPC restricts all traffic in Terraform, ensure the default security group restricts all traffic:

            ```hcl
            resource "aws_default_security_group" "default_sg" {
              vpc_id = aws_vpc.main.id

              ingress = []  # No inbound rules
              egress  = []  # No outbound rules

              tags = {
                Name = "Restricted Default SG"
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure the default security group of every VPC restricts all traffic in CloudFormation, note that CloudFormation cannot directly manage or remove rules from a VPC's default security group. The default security group is automatically created with each VPC and cannot be deleted or have its rules managed through native CloudFormation resources.

            To restrict the default security group, use one of these approaches:

            - **AWS CLI**: Remove all inbound and outbound rules manually:

            ```bash
            # Revoke all ingress rules
            aws ec2 revoke-security-group-ingress --group-id <default-sg-id> --ip-permissions IpProtocol=-1,UserIdGroupPairs='[{GroupId=<default-sg-id>}]'

            # Revoke all egress rules
            aws ec2 revoke-security-group-egress --group-id <default-sg-id> --ip-permissions IpProtocol=-1,IpRanges='[{CidrIp=0.0.0.0/0}]'
            ```

            - **Lambda-backed Custom Resource**: Create a CloudFormation custom resource backed by a Lambda function that uses the AWS SDK to revoke all rules from the default security group after VPC creation.
    refs:
      - url: https://docs.aws.amazon.com/securityhub/latest/userguide/securityhub-controls-reference.html
        title: AWS Documentation - Security Hub controls reference
      - url: https://awscli.amazonaws.com/v2/documentation/api/latest/reference/ec2/index.html
        title: AWS Documentation - AWS CLI Reference - EC2
      - url: https://registry.terraform.io/providers/hashicorp/aws/latest/docs
        title: Terraform Documentation - AWS Provider
