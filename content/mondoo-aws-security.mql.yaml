      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-aws-security-glue-crawler-security-configuration-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-glue-crawler-security-configuration-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-glue-crawler-security-configuration-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-glue-crawler-security-configuration-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-glue-crawler-security-configuration-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that AWS Glue crawlers have a security configuration assigned. A Glue security configuration defines encryption settings for S3 targets, CloudWatch logs, and job bookmarks. Without a security configuration, data discovered and cataloged by crawlers may be processed without encryption protections.

        **Why this matters**

        - Glue crawlers scan data stores (S3, JDBC, DynamoDB) to populate the Data Catalog with table metadata and may access sensitive data sources containing PII, financial records, or proprietary information.
        - Without a security configuration, CloudWatch logs from crawler runs are stored unencrypted and may contain sensitive schema information, column names, sample data excerpts, and connection details.
        - Crawlers write metadata and temporary data that should be encrypted to prevent unauthorized access. Exposed metadata can reveal the structure and location of sensitive data assets.
        - Consistent security configuration across all Glue components (jobs, crawlers, dev endpoints) ensures comprehensive data protection. A crawler without a security configuration creates a gap in the encryption posture of the entire data pipeline.
        - Unencrypted crawler logs can be read by any IAM principal with CloudWatch Logs read permissions, potentially exposing sensitive schema details to users who should not have access to the underlying data.

        **Risk mitigation**

        - **Data protection:** Ensures crawler outputs, temporary data, and metadata are encrypted at rest, preventing unauthorized access to sensitive schema information.
        - **Log security:** Encrypts CloudWatch logs generated during crawler execution, protecting sensitive data excerpts and schema details from unauthorized readers.
        - **Pipeline integrity:** Maintains consistent encryption across the entire Glue data pipeline, eliminating gaps that could be exploited to access sensitive information.
        - **Compliance:** Meets encryption-at-rest requirements for data processing and cataloging across frameworks such as NIST SP 800-53 SC-28 and ISO 27001.
      remediation:
        - id: console
          desc: |
            To ensure AWS Glue crawlers have a security configuration assigned using the AWS Console:

            1. Navigate to the AWS Glue Console.
            2. Select **Security configurations** in the left panel.
            3. Create a security configuration if one does not exist.
            4. Select **Crawlers** in the left panel.
            5. Select the crawler to update.
            6. Select **Edit**.
            7. Under **Security configuration**, select the desired security configuration.
            8. Select **Save**.
        - id: cli
          desc: |
            To ensure AWS Glue crawlers have a security configuration assigned using the AWS CLI, update a crawler to use a security configuration:

            ```bash
            aws glue update-crawler --name my-crawler \
              --crawler-security-configuration my-security-config
            ```

            Verify the setting:

            ```bash
            aws glue get-crawler --name my-crawler \
              --query "Crawler.{Name:Name,SecurityConfig:CrawlerSecurityConfiguration}"
            ```
        - id: terraform
          desc: |
            To ensure AWS Glue crawlers have a security configuration assigned in Terraform:

            ```hcl
            resource "aws_glue_crawler" "example" {
              name          = "example-crawler"
              role          = aws_iam_role.glue.arn
              database_name = aws_glue_catalog_database.example.name

              security_configuration = aws_glue_security_configuration.example.name

              s3_target {
                path = "s3://my-bucket/my-data"
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure AWS Glue crawlers have a security configuration assigned in CloudFormation:

            ```yaml
            Resources:
              GlueCrawler:
                Type: AWS::Glue::Crawler
                Properties:
                  Name: example-crawler
                  Role: !GetAtt GlueRole.Arn
                  DatabaseName: !Ref GlueDatabase
                  CrawlerSecurityConfiguration: !Ref GlueSecurityConfig
                  Targets:
                    S3Targets:
                      - Path: s3://my-bucket/my-data
            ```
    refs:
      - url: https://docs.aws.amazon.com/glue/latest/dg/console-security-configurations.html
        title: AWS Documentation - Working with security configurations on the AWS Glue console
      - url: https://docs.aws.amazon.com/glue/latest/dg/encryption-security-configuration.html
        title: AWS Documentation - Setting up encryption in AWS Glue
