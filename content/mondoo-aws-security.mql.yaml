  - uid: mondoo-aws-security-transfer-logging-enabled
    title: Ensure Transfer Family servers have logging enabled
    impact: 60
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-pr-pt-1
      compliance/nist-csf-2: nist-csf-2-pr-ps-04
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    variants:
      - uid: mondoo-aws-security-transfer-logging-enabled-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-transfer-logging-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-transfer-logging-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-transfer-logging-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-transfer-logging-enabled-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that AWS Transfer Family servers have a logging role configured. Without a logging role, file transfer activity is not logged to CloudWatch, making it impossible to audit file access or detect unauthorized transfers.

        **Why this matters**

        - Transfer Family logging captures file upload, download, and delete operations with user identity and timestamps.
        - Without logging, security teams cannot detect data exfiltration or unauthorized file access.
        - Compliance frameworks including NIST SP 800-53 AU-6 and SOC 2 CC7.2 require audit logging of data access.

        **Risk mitigation**

        - **Audit trail:** Logs provide a complete record of all file transfer activity.
        - **Data loss prevention:** Log analysis can detect unusual transfer patterns indicating data exfiltration.
        - **Compliance:** Satisfies audit logging requirements across multiple regulatory frameworks.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and open the **AWS Transfer Family Console**.
        2. In the left navigation pane, choose **Servers**.
        3. Select each server and review its **CloudWatch logging** section in the server details.
        4. Check whether a **Logging role** IAM ARN is configured.

        A passing server shows a CloudWatch logging role ARN in the **Logging role** field. A failing server shows an empty or unconfigured logging role.

        ### Audit via CLI

        1. List all Transfer Family servers and their logging role configuration:

        ```bash
        aws transfer list-servers \
          --query "Servers[].ServerId" \
          --output text
        ```

        2. For each server ID, check the logging role:

        ```bash
        aws transfer describe-server \
          --server-id <server-id> \
          --query "{ServerId:Server.ServerId,LoggingRole:Server.LoggingRole}"
        ```

        A passing server returns a non-empty `LoggingRole` ARN. A failing server returns `null` or an empty string for `LoggingRole`.
      remediation:
        - id: console
          desc: |
            To ensure Transfer Family servers have logging enabled using the AWS Console:

            1. Navigate to the **AWS Transfer Family Console** and select **Servers**.
            2. Select the server you want to configure.
            3. Choose **Edit**.
            4. Under **CloudWatch logging**, select an IAM role with permissions to write to CloudWatch Logs.
            5. Choose **Save**.
        - id: cli
          desc: |
            To ensure Transfer Family servers have logging enabled using the AWS CLI:

            ```bash
            aws transfer update-server \
              --server-id <server-id> \
              --logging-role <iam-role-arn>
            ```
        - id: terraform
          desc: |
            To ensure Transfer Family servers have logging enabled in Terraform:

            ```hcl
            resource "aws_transfer_server" "example" {
              protocols    = ["SFTP"]
              logging_role = aws_iam_role.transfer_logging.arn
            }
            ```
        - id: cloudformation
          desc: |
            Set `LoggingRole` on every `AWS::Transfer::Server` to an IAM role that grants `logs:CreateLogStream` and `logs:PutLogEvents` so user activity lands in CloudWatch Logs:

            ```yaml
            Resources:
              TransferLoggingRole:
                Type: AWS::IAM::Role
                Properties:
                  AssumeRolePolicyDocument:
                    Version: "2012-10-17"
                    Statement:
                      - Effect: Allow
                        Principal:
                          Service: transfer.amazonaws.com
                        Action: sts:AssumeRole
                  ManagedPolicyArns:
                    - arn:aws:iam::aws:policy/service-role/AWSTransferLoggingAccess
              TransferServer:
                Type: AWS::Transfer::Server
                Properties:
                  LoggingRole: !GetAtt TransferLoggingRole.Arn
            ```
    refs:
      - url: https://docs.aws.amazon.com/transfer/latest/userguide/structured-logging.html
        title: AWS Documentation - Transfer Family logging
  - uid: mondoo-aws-security-transfer-logging-enabled-aws
    filters: asset.platform == "aws"
    mql: |
      aws.transfer.servers.all(loggingRole != empty)
  - uid: mondoo-aws-security-transfer-logging-enabled-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_transfer_server")
    mql: |
      terraform.resources.where(nameLabel == "aws_transfer_server").all(
        arguments.logging_role != null && arguments.logging_role != ""
      )
  - uid: mondoo-aws-security-transfer-logging-enabled-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_transfer_server")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_transfer_server").all(
        change.after["logging_role"] != null && change.after["logging_role"] != ""
      )
  - uid: mondoo-aws-security-transfer-logging-enabled-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_transfer_server")
    mql: |
