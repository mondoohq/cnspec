          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-rds-cluster-cmk-encryption-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that RDS clusters are encrypted using customer-managed KMS keys (CMK). Customer-managed keys provide full control over key lifecycle, rotation policies, and access auditing for cluster data.

        **Why this matters**

        - **Key control:** CMKs allow you to define who can use and manage the encryption key through KMS key policies.
        - **Audit trail:** All CMK usage is logged in CloudTrail, providing visibility into when and by whom the key was used.
        - **Cross-account sharing:** CMKs enable secure sharing of encrypted snapshots across AWS accounts with fine-grained access control.

        **Risk mitigation**

        - Create a CMK in KMS for RDS cluster encryption.
        - Enable encryption with the CMK when creating new Aurora clusters.
        - For existing clusters, create an encrypted snapshot with the CMK and restore from it.
      remediation:
        - id: console
          desc: |
            To ensure RDS clusters use customer-managed KMS encryption using the AWS Console:

            1. Navigate to the **RDS Console**.
            2. Select **Databases** in the left panel.
            3. Select the cluster to review.
            4. Under the **Configuration** tab, check the **Encryption** section.
            5. If using an AWS-managed key, you must re-encrypt via a snapshot:
               - Select the cluster, then choose **Actions** > **Take snapshot**. Give it a name and create it.
               - Navigate to **Snapshots** in the left panel.
               - Select the snapshot you just created, then choose **Actions** > **Copy snapshot**.
               - In the copy dialog, check **Enable encryption** and select your customer-managed CMK from the KMS key dropdown.
               - Save the copied snapshot.
               - Select the CMK-encrypted snapshot and choose **Actions** > **Restore snapshot** to create a new cluster from it.
               - Update your application to point to the new cluster, then delete the old cluster.
        - id: cli
          desc: |
            To ensure RDS clusters use customer-managed KMS encryption using the AWS CLI, check the encryption configuration of an RDS cluster:

            ```bash
            aws rds describe-db-clusters \
              --db-cluster-identifier <cluster-id> \
              --query "DBClusters[*].{ID:DBClusterIdentifier,Encrypted:StorageEncrypted,KmsKeyId:KmsKeyId}"
            ```

            Restore a cluster from a snapshot with CMK encryption:

            ```bash
            aws rds restore-db-cluster-from-snapshot \
              --db-cluster-identifier <new-cluster-id> \
              --snapshot-identifier <snapshot-id> \
              --kms-key-id <cmk-key-id> \
              --engine aurora-mysql
            ```
        - id: terraform
          desc: |
            To ensure RDS clusters use customer-managed KMS encryption in Terraform:

            ```hcl
            resource "aws_rds_cluster" "example" {
              cluster_identifier = "example"
              engine             = "aurora-mysql"
              master_username    = "admin"
              master_password    = "changeme"

              storage_encrypted = true
              kms_key_id        = aws_kms_key.rds.arn
            }
            ```
        - id: cloudformation
          desc: |
            To ensure RDS clusters use customer-managed KMS encryption in CloudFormation:

            ```yaml
            Resources:
              MyRDSCluster:
                Type: AWS::RDS::DBCluster
                Properties:
                  DBClusterIdentifier: example
                  Engine: aurora-mysql
                  MasterUsername: admin
                  MasterUserPassword: changeme
                  StorageEncrypted: true
                  KmsKeyId: !Ref MyKmsKey
            ```
    refs:
      - url: https://docs.aws.amazon.com/AmazonRDS/latest/AuroraUserGuide/Overview.Encryption.html
        title: AWS Documentation - Encrypting Amazon Aurora resources
      - url: https://docs.aws.amazon.com/kms/latest/developerguide/concepts.html
        title: AWS Documentation - AWS KMS concepts
