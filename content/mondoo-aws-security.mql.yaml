  - uid: mondoo-aws-security-emr-not-publicly-accessible
    title: Ensure EMR clusters are not publicly accessible
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-aws-security-emr-not-publicly-accessible-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-emr-not-publicly-accessible-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-emr-not-publicly-accessible-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-emr-not-publicly-accessible-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-emr-not-publicly-accessible-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check verifies that EMR cluster master nodes do not have a public DNS name assigned. A master node with a public DNS name is directly reachable from the internet, exposing sensitive data processing infrastructure and creating a significant attack surface.

        **Why this matters**

        - **Data exposure:** EMR clusters process potentially sensitive data and a public master node allows direct network access to these workloads.
        - **Service exploitation:** Publicly accessible Hadoop, Spark, and other EMR services may have known vulnerabilities that attackers can exploit.
        - **Lateral movement:** A compromised EMR master node provides access to the cluster's IAM role and connected data stores such as S3 and DynamoDB.

        **Risk mitigation**

        - Launch EMR clusters in private subnets.
        - Use VPN or AWS Systems Manager Session Manager for administrative access.
        - Configure security groups to restrict access to known IP ranges.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and open the **EMR** console.
        2. In the left navigation pane, choose **Clusters**.
        3. Select a cluster and review the **Summary** tab.
        4. Check the **Master public DNS** field.

        A passing cluster shows an empty or absent **Master public DNS** field. A failing cluster shows a public DNS hostname in that field, indicating the master node is internet-accessible.

        ### Audit via CLI

        1. Check whether an EMR cluster has a public master DNS name:

        ```bash
        aws emr describe-cluster \
          --cluster-id <cluster-id> \
          --query "Cluster.MasterPublicDnsName"
        ```

        A passing cluster returns `null` or an empty string. A failing cluster returns a public DNS hostname such as `ec2-1-2-3-4.compute-1.amazonaws.com`.

      remediation:
        - id: console
          desc: |
            To ensure EMR clusters are not publicly accessible using the AWS Console:

            1. Navigate to the **EMR Console**.
            2. Select the cluster to review.
            3. Under **Summary**, check the **Master public DNS** field.
            4. If a public DNS name is present, the master node is publicly accessible.
            5. Terminate the cluster and recreate it in a private subnet with no public IP assignment.
        - id: cli
          desc: |
            To ensure EMR clusters are not publicly accessible using the AWS CLI, check if an EMR cluster has a public master node:

            ```bash
            aws emr describe-cluster \
              --cluster-id <cluster-id> \
              --query "Cluster.MasterPublicDnsName"
            ```

            Create a new cluster in a private subnet:

            ```bash
            aws emr run-job-flow \
              --instances '{"Ec2SubnetId":"<private-subnet-id>","KeepJobFlowAliveWhenNoSteps":true,"InstanceGroups":[{"InstanceRole":"MASTER","InstanceCount":1,"InstanceType":"m5.xlarge"}]}' \
              --release-label emr-6.15.0 \
              --name "private-cluster"
            ```
        - id: terraform
          desc: |
            To ensure EMR clusters are not publicly accessible in Terraform:

            ```hcl
            resource "aws_emr_cluster" "example" {
              name          = "example"
              release_label = "emr-6.15.0"

              ec2_attributes {
                subnet_id = aws_subnet.private.id
              }

              # ... other configuration ...
            }
            ```

            Launch EMR clusters in a private subnet to prevent public accessibility.
        - id: cloudformation
          desc: |
            To ensure EMR clusters are not publicly accessible in CloudFormation, launch EMR clusters in a private subnet to prevent public accessibility:

            ```yaml
            Resources:
              MyEMRCluster:
                Type: AWS::EMR::Cluster
                Properties:
                  Name: example
                  ReleaseLabel: emr-6.15.0
                  Instances:
                    Ec2SubnetId: !Ref PrivateSubnet
                    MasterInstanceGroup:
                      InstanceCount: 1
                      InstanceType: m5.xlarge
                  JobFlowRole: !Ref EMRInstanceProfile
                  ServiceRole: !Ref EMRServiceRole
            ```
