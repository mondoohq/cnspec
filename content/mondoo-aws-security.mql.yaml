  - uid: mondoo-aws-security-s3-ownership-controls-enforced
    title: Ensure S3 buckets enforce bucket owner ownership
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-5-15
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-2-1
    variants:
      - uid: mondoo-aws-security-s3-ownership-controls-enforced-aws
        tags:
          mondoo.com/filter-title: AWS S3 Bucket
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-s3-ownership-controls-enforced-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-s3-ownership-controls-enforced-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-s3-ownership-controls-enforced-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-s3-ownership-controls-enforced-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that S3 buckets have Object Ownership set to `BucketOwnerEnforced`, which disables S3 ACLs and ensures the bucket owner owns all objects regardless of which account uploaded them. By default, S3 allows ACL-based access controls, meaning objects uploaded by external accounts can be owned by the uploading account and may not be accessible to the bucket owner.

        **Why this matters**

        - **Ownership clarity:** When objects are owned by the bucket owner, access is controlled entirely through bucket policies and IAM, eliminating the dual-control complexity of ACLs alongside policies.
        - **Accidental grant prevention:** S3 ACLs are a legacy mechanism that can silently grant permissions that conflict with or supplement bucket policies, creating unexpected access paths.
        - **Cross-account upload safety:** Without `BucketOwnerEnforced`, objects uploaded by cross-account principals may remain inaccessible to the bucket owner, causing operational failures and data availability issues.

        **Risk mitigation**

        - **Single access-control plane:** Disabling ACLs forces all access decisions through IAM and bucket policies, making the effective permission set transparent and auditable from a single location.
        - **Simplified compliance review:** Auditing access to S3 data is significantly easier when only bucket policies and IAM are in scope, reducing the risk of missed permissions during security reviews.
      audit: |
        ### Audit via Console

        1. Navigate to the **S3 Console** in the AWS Management Console.
        2. Select each bucket.
        3. Choose the **Permissions** tab.
        4. Under **Object Ownership**, review the current setting.

        A passing bucket shows **ACLs disabled (BucketOwnerEnforced)**. A failing bucket shows **ACLs enabled** (BucketOwnerPreferred or ObjectWriter).

        ### Audit via CLI

        1. List all buckets, then retrieve the ownership controls for each:

        ```bash
        aws s3api get-bucket-ownership-controls \
          --bucket <bucket-name> \
          --query 'OwnershipControls.Rules[*].ObjectOwnership'
        ```

        Run this for each bucket. A passing bucket returns `["BucketOwnerEnforced"]`. A failing bucket returns `["BucketOwnerPreferred"]`, `["ObjectWriter"]`, or an error indicating no ownership controls are configured.

      remediation:
        - id: console
          desc: |
            To enforce bucket owner ownership using the AWS Console:

            1. Navigate to the **S3** console and select the bucket.
            2. Go to the **Permissions** tab.
            3. Under **Object Ownership**, select **Edit**.
            4. Choose **ACLs disabled (recommended)** which sets BucketOwnerEnforced.
            5. Save the changes.
        - id: cli
          desc: |
            To enforce bucket owner ownership using the AWS CLI:

            ```bash
            aws s3api put-bucket-ownership-controls \
              --bucket BUCKET_NAME \
              --ownership-controls='Rules=[{ObjectOwnership=BucketOwnerEnforced}]'
            ```
        - id: terraform
          desc: |
            To enforce bucket owner ownership using Terraform:

            ```hcl
            resource "aws_s3_bucket_ownership_controls" "example" {
              bucket = aws_s3_bucket.example.id

              rule {
                object_ownership = "BucketOwnerEnforced"
              }
            }
            ```
        - id: cloudformation
          desc: |
            Set `OwnershipControls.Rules[].ObjectOwnership: BucketOwnerEnforced` on every `AWS::S3::Bucket` to disable ACLs and force bucket-owner ownership of all uploaded objects:

            ```yaml
            Resources:
              Bucket:
                Type: AWS::S3::Bucket
                Properties:
                  BucketName: example-secure
                  OwnershipControls:
                    Rules:
                      - ObjectOwnership: BucketOwnerEnforced
            ```
    refs:
      - url: https://docs.aws.amazon.com/AmazonS3/latest/userguide/about-object-ownership.html
        title: Controlling ownership of objects and disabling ACLs
  - uid: mondoo-aws-security-s3-ownership-controls-enforced-aws
    filters: asset.platform == "aws-s3-bucket"
    mql: aws.s3.bucket.ownershipControls == "BucketOwnerEnforced"
  - uid: mondoo-aws-security-s3-ownership-controls-enforced-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_s3_bucket_ownership_controls")
    mql: |
      terraform.resources.where(nameLabel == "aws_s3_bucket_ownership_controls").all(
        blocks.where(type == "rule").any(arguments.object_ownership == "BucketOwnerEnforced")
      )
  - uid: mondoo-aws-security-s3-ownership-controls-enforced-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_s3_bucket_ownership_controls")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_s3_bucket_ownership_controls").all(
        change.after["rule"].any(_["object_ownership"] == "BucketOwnerEnforced")
      )
  - uid: mondoo-aws-security-s3-ownership-controls-enforced-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_s3_bucket_ownership_controls")
    mql: |
      terraform.state.resources.where(type == "aws_s3_bucket_ownership_controls").all(
        values["rule"].any(_["object_ownership"] == "BucketOwnerEnforced")
      )
  - uid: mondoo-aws-security-s3-ownership-controls-enforced-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::S3::Bucket")
    mql: |
      cloudformation.template.resources.where(type == "AWS::S3::Bucket").all(
        properties['OwnershipControls'] != null &&
        properties['OwnershipControls']['Rules'].any(_['ObjectOwnership'] == "BucketOwnerEnforced")
      )
  - uid: mondoo-aws-security-cloudtrail-insights-enabled
    title: Ensure CloudTrail Insights is enabled
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-03
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-16
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-ae-3
      compliance/nist-csf-2: nist-csf-2-de-ae-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-4
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-5
      compliance/pci-dss-4: pcidss-requirement-10-4-1-1
      compliance/soc2-2017: soc2-control-cc7-2-3
      compliance/vda-isa-5: vda-isa-5-5-2-4
    variants:
      - uid: mondoo-aws-security-cloudtrail-insights-enabled-aws
        tags:
          mondoo.com/filter-title: AWS CloudTrail Trail
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-cloudtrail-insights-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-cloudtrail-insights-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-cloudtrail-insights-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-cloudtrail-insights-enabled-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that CloudTrail trails have Insights enabled to detect anomalous API activity. CloudTrail Insights automatically analyzes management events to identify unusual call rate or error rate patterns that may indicate account compromise, runaway automation, or misconfiguration. By default, CloudTrail trails do not enable Insights, so anomaly detection requires manual log analysis or custom tooling.

        **Why this matters**

        - **Automated anomaly detection:** Insights continuously evaluates API call patterns against a learned baseline and generates findings for statistically unusual activity, reducing the manual effort required to detect account compromise.
        - **Error rate visibility:** The `ApiErrorRateInsight` type detects unusual spikes in API errors that may indicate automated attack tools probing service limits or misconfigured automation.
        - **Reduced detection time:** Automated anomaly findings surfaced by Insights shorten the time between suspicious activity and investigation compared to manual log review.

        **Risk mitigation**

        - **Early compromise signals:** Unusual IAM provisioning spikes or resource creation bursts detected by `ApiCallRateInsight` can serve as early warning of a compromised credential being used for lateral movement or persistence.
        - **Operational awareness:** Insights findings also identify unintentional runaway automation that can generate unexpected costs or destabilize environments, providing value beyond pure security detection.
      audit: |
        ### Audit via Console

        1. Navigate to the **CloudTrail Console** in the AWS Management Console.
        2. Select **Trails** from the left navigation.
        3. For each trail, choose the trail name.
        4. Under **Insights events**, review the enabled insight types.

        A passing trail shows both **API call rate** and **API error rate** insights enabled. A failing trail shows neither or only one insight type enabled.

        ### Audit via CLI

        1. Retrieve the insight selectors configured for a trail:

        ```bash
        aws cloudtrail get-insight-selectors \
          --trail-name <trail-name> \
          --query 'InsightSelectors[*].InsightType'
        ```

        A passing trail returns `["ApiCallRateInsight", "ApiErrorRateInsight"]` (both types present). A failing trail returns an empty list or only one of the two insight types.

      remediation:
        - id: console
          desc: |
            To enable CloudTrail Insights using the AWS Console:

            1. Navigate to the **CloudTrail** console.
            2. Select the trail to configure.
            3. Under **Insights events**, select **Edit**.
            4. Enable both **API call rate** and **API error rate** insights.
            5. Save the changes.
        - id: cli
          desc: |
            To enable CloudTrail Insights using the AWS CLI:

            ```bash
            aws cloudtrail put-insight-selectors \
              --trail-name TRAIL_NAME \
              --insight-selectors '[{"InsightType":"ApiCallRateInsight"},{"InsightType":"ApiErrorRateInsight"}]'
            ```
        - id: terraform
          desc: |
            To enable CloudTrail Insights using Terraform:

            ```hcl
            resource "aws_cloudtrail" "example" {
              name           = "example-trail"
              s3_bucket_name = aws_s3_bucket.trail.id

              insight_selector {
                insight_type = "ApiCallRateInsight"
              }

              insight_selector {
                insight_type = "ApiErrorRateInsight"
              }
            }
            ```
        - id: cloudformation
          desc: |
            Enable both `ApiCallRateInsight` and `ApiErrorRateInsight` Insight selectors on every `AWS::CloudTrail::Trail` so anomalous activity is detected automatically:

            ```yaml
            Resources:
              Trail:
                Type: AWS::CloudTrail::Trail
                Properties:
                  TrailName: org-trail
                  S3BucketName: !Ref TrailBucket
                  IsLogging: true
                  IsMultiRegionTrail: true
                  IncludeGlobalServiceEvents: true
                  EnableLogFileValidation: true
                  InsightSelectors:
                    - InsightType: ApiCallRateInsight
                    - InsightType: ApiErrorRateInsight
            ```
    refs:
      - url: https://docs.aws.amazon.com/awscloudtrail/latest/userguide/logging-insights-events-with-cloudtrail.html
        title: Logging Insights events
  - uid: mondoo-aws-security-cloudtrail-insights-enabled-aws
    filters: asset.platform == "aws-cloudtrail-trail"
    mql: |
      aws.cloudtrail.trail.insightSelectorEntries.any(insightType == "ApiCallRateInsight") &&
      aws.cloudtrail.trail.insightSelectorEntries.any(insightType == "ApiErrorRateInsight")
  - uid: mondoo-aws-security-cloudtrail-insights-enabled-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_cloudtrail")
    mql: |
      terraform.resources.where(nameLabel == "aws_cloudtrail").all(
        blocks.where(type == "insight_selector").any(arguments.insight_type == "ApiCallRateInsight") &&
        blocks.where(type == "insight_selector").any(arguments.insight_type == "ApiErrorRateInsight")
      )
  - uid: mondoo-aws-security-cloudtrail-insights-enabled-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_cloudtrail")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_cloudtrail").all(
        change.after["insight_selector"] != null &&
        change.after["insight_selector"].any(_["insight_type"] == "ApiCallRateInsight") &&
        change.after["insight_selector"].any(_["insight_type"] == "ApiErrorRateInsight")
      )
  - uid: mondoo-aws-security-cloudtrail-insights-enabled-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_cloudtrail")
    mql: |
      terraform.state.resources.where(type == "aws_cloudtrail").all(
        values["insight_selector"] != null &&
        values["insight_selector"].any(_["insight_type"] == "ApiCallRateInsight") &&
        values["insight_selector"].any(_["insight_type"] == "ApiErrorRateInsight")
      )
  - uid: mondoo-aws-security-cloudtrail-insights-enabled-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::CloudTrail::Trail")
    mql: |
      cloudformation.template.resources.where(type == "AWS::CloudTrail::Trail").all(
        properties['InsightSelectors'] != null &&
        properties['InsightSelectors'].any(_['InsightType'] == "ApiCallRateInsight") &&
        properties['InsightSelectors'].any(_['InsightType'] == "ApiErrorRateInsight")
      )
  - uid: mondoo-aws-security-securityhub-standards-enabled
    title: Ensure Security Hub has standards enabled
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-03
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-16
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-de-cm-8
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-4
      compliance/nist-sp-800-171: nist-sp-800-171--3-12-3
      compliance/pci-dss-4: pcidss-requirement-10-4-1-1
      compliance/soc2-2017: soc2-control-cc7-1-5
      compliance/vda-isa-5: vda-isa-5-5-2-4
    variants:
      - uid: mondoo-aws-security-securityhub-standards-enabled-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-securityhub-standards-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-securityhub-standards-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-securityhub-standards-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-securityhub-standards-enabled-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that AWS Security Hub has at least one security standard enabled and actively evaluating controls. Security Hub without enabled standards acts only as an aggregation hub and performs no automated security checks; standards such as AWS Foundational Security Best Practices or CIS AWS Foundations Benchmark are required to continuously evaluate resource configurations against known security controls.

        **Why this matters**

        - **Automated control evaluation:** Enabled standards continuously check hundreds of AWS resource configurations against known best practices without requiring custom rule authoring or manual review.
        - **Centralized findings:** Standards generate Security Hub findings that can be routed to ticketing systems, SIEM platforms, and notification channels, accelerating remediation workflows.
        - **Compliance mapping:** Each standard maps controls to regulatory frameworks, providing evidence of continuous monitoring that auditors and compliance programs require.

        **Risk mitigation**

        - **Misconfiguration detection:** Standards surface newly introduced misconfigurations as soon as resources are created or modified, enabling rapid remediation before vulnerabilities can be exploited.
        - **Baseline establishment:** Enabling at least one standard creates an account-wide security baseline against which drift can be measured over time, making it easier to track security posture improvements.
      audit: |
        ### Audit via Console

        1. Navigate to the **Security Hub Console** in the AWS Management Console.
        2. Select **Security standards** from the left navigation.
        3. Review the list of available standards and their status.

        A passing account shows at least one security standard with a status of **Enabled**. A failing account shows all standards as **Disabled**, or Security Hub is not enabled at all.

        ### Audit via CLI

        1. Check whether Security Hub is enabled and retrieve the list of enabled standards:

        ```bash
        aws securityhub get-enabled-standards \
          --query 'StandardsSubscriptions[*].{StandardsArn:StandardsArn,Status:StandardsStatus}' \
          --output table
        ```

        A passing account returns at least one standards subscription with `StandardsStatus` of `READY`. A failing account returns an empty list or an error indicating Security Hub is not enabled.

      remediation:
        - id: console
          desc: |
            To enable Security Hub standards using the AWS Console:

            1. Navigate to the **Security Hub** console.
            2. Select **Security standards** from the navigation.
            3. Enable at least one standard (AWS Foundational Security Best Practices recommended).
            4. Review and acknowledge the pricing implications.
        - id: cli
          desc: |
            To enable Security Hub standards using the AWS CLI:

            ```bash
            aws securityhub batch-enable-standards \
              --standards-subscription-requests '[{"StandardsArn":"arn:aws:securityhub:::ruleset/aws-foundational-security-best-practices/v/1.0.0"}]'
            ```
        - id: terraform
          desc: |
            Pair `aws_securityhub_account` with at least one `aws_securityhub_standards_subscription`. The depends_on relationship guarantees Security Hub is enabled before standards are subscribed:

            ```hcl
            resource "aws_securityhub_account" "this" {}

            resource "aws_securityhub_standards_subscription" "fsbp" {
              standards_arn = "arn:aws:securityhub:::ruleset/aws-foundational-security-best-practices/v/1.0.0"
              depends_on    = [aws_securityhub_account.this]
            }
            ```
        - id: cloudformation
          desc: |
            Pair `AWS::SecurityHub::Hub` with at least one `AWS::SecurityHub::Standard` subscription. The `DependsOn` ensures Security Hub is enabled before standards are subscribed:

            ```yaml
            Resources:
              SecurityHub:
                Type: AWS::SecurityHub::Hub
                Properties: {}
              FsbpStandard:
                Type: AWS::SecurityHub::Standard
                DependsOn: SecurityHub
                Properties:
                  StandardsArn: arn:aws:securityhub:::ruleset/aws-foundational-security-best-practices/v/1.0.0
            ```
    refs:
      - url: https://docs.aws.amazon.com/securityhub/latest/userguide/securityhub-standards.html
        title: Security standards in AWS Security Hub
  - uid: mondoo-aws-security-securityhub-standards-enabled-aws
    filters: asset.platform == "aws"
    mql: |
      aws.securityhub.hubs.length > 0 &&
      aws.securityhub.hubs.all(
        standardSubscriptions.length > 0
      )
  - uid: mondoo-aws-security-securityhub-standards-enabled-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_securityhub_account")
    mql: |
      terraform.resources.where(nameLabel == "aws_securityhub_account") != empty &&
      terraform.resources.where(nameLabel == "aws_securityhub_standards_subscription") != empty
  - uid: mondoo-aws-security-securityhub-standards-enabled-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_securityhub_account")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_securityhub_account") != empty &&
      terraform.plan.resourceChanges.where(type == "aws_securityhub_standards_subscription") != empty
  - uid: mondoo-aws-security-securityhub-standards-enabled-terraform-state
