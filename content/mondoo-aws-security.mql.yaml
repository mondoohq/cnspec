    variants:
      - uid: mondoo-aws-security-nacl-no-unrestricted-ssh-rdp-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-nacl-no-unrestricted-ssh-rdp-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-nacl-no-unrestricted-ssh-rdp-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-nacl-no-unrestricted-ssh-rdp-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that VPC network ACLs do not contain inbound rules that allow unrestricted access (0.0.0.0/0 or ::/0) to SSH (port 22) or RDP (port 3389). Unrestricted network ACL rules expose management ports to the entire internet.

        **Why this matters**

        - **Attack surface reduction**: Restricting SSH and RDP access at the network ACL level provides defense-in-depth beyond security groups.
        - **Brute force prevention**: Open management ports are prime targets for automated brute force attacks.
        - **Compliance alignment**: CIS AWS Foundations Benchmark and other frameworks require restricting management port access.
        - **Defense in depth**: Network ACLs provide a stateless firewall layer that complements security group rules.
      remediation:
        - id: console
          desc: |
            To ensure network ACLs do not allow unrestricted inbound SSH or RDP access using the AWS Console:

            1. Navigate to the **VPC** console and select **Network ACLs**.
            2. Review inbound rules for entries allowing ports 22 or 3389 from 0.0.0.0/0.
            3. Modify the rules to restrict the source CIDR to known, trusted IP ranges.
        - id: cli
          desc: |
            To ensure network ACLs do not allow unrestricted inbound SSH or RDP access using the AWS CLI:

            ```bash
            aws ec2 replace-network-acl-entry --network-acl-id <acl-id> --rule-number <number> --protocol tcp --port-range From=22,To=22 --cidr-block <trusted-cidr> --rule-action allow --no-egress
            ```
        - id: terraform
          desc: |
            To ensure network ACLs do not allow unrestricted inbound SSH or RDP access in Terraform, ensure `aws_network_acl_rule` resources restrict SSH and RDP to trusted CIDRs:

            ```hcl
            resource "aws_network_acl_rule" "ssh" {
              network_acl_id = aws_network_acl.example.id
              rule_number    = 100
              egress         = false
              protocol       = "tcp"
              rule_action    = "allow"
              cidr_block     = "10.0.0.0/8"
              from_port      = 22
              to_port        = 22
            }
            ```
        - id: cloudformation
          desc: |
            To ensure network ACLs do not allow unrestricted inbound SSH or RDP access in CloudFormation, ensure network ACL entries restrict SSH and RDP to trusted CIDRs:

            ```yaml
            Resources:
              MyNetworkAcl:
                Type: AWS::EC2::NetworkAcl
                Properties:
                  VpcId: !Ref MyVPC
              SSHInboundRule:
                Type: AWS::EC2::NetworkAclEntry
                Properties:
                  NetworkAclId: !Ref MyNetworkAcl
                  RuleNumber: 100
                  Protocol: 6
                  RuleAction: allow
                  CidrBlock: 10.0.0.0/8
                  PortRange:
                    From: 22
                    To: 22
            ```
    refs:
      - url: https://docs.aws.amazon.com/vpc/latest/userguide/vpc-network-acls.html
        title: Network ACLs - Amazon VPC
  - uid: mondoo-aws-security-nacl-no-unrestricted-ssh-rdp-aws
    filters: asset.platform == "aws"
    mql: |
      aws.ec2.networkAcls.all(
        entries.none(egress == false && ruleAction == "allow" && cidrBlock == "0.0.0.0/0" && protocol == "-1")
      ) &&
      aws.ec2.networkAcls.all(
        entries.none(egress == false && ruleAction == "allow" && ipv6CidrBlock == "::/0" && protocol == "-1")
      ) &&
      aws.ec2.networkAcls.all(
        entries.none(egress == false && ruleAction == "allow" && portRange.from <= 22 && portRange.to >= 22 && cidrBlock == "0.0.0.0/0")
      ) &&
      aws.ec2.networkAcls.all(
        entries.none(egress == false && ruleAction == "allow" && portRange.from <= 22 && portRange.to >= 22 && ipv6CidrBlock == "::/0")
      ) &&
      aws.ec2.networkAcls.all(
        entries.none(egress == false && ruleAction == "allow" && portRange.from <= 3389 && portRange.to >= 3389 && cidrBlock == "0.0.0.0/0")
      ) &&
      aws.ec2.networkAcls.all(
        entries.none(egress == false && ruleAction == "allow" && portRange.from <= 3389 && portRange.to >= 3389 && ipv6CidrBlock == "::/0")
      )
  - uid: mondoo-aws-security-nacl-no-unrestricted-ssh-rdp-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_network_acl_rule")
    mql: |
      terraform.resources.where(nameLabel == "aws_network_acl_rule" && arguments.egress != true && arguments.rule_action == "allow").none(
      arguments.from_port == 22 && arguments.cidr_block == "0.0.0.0/0" ||
      arguments.from_port == 22 && arguments.ipv6_cidr_block == "::/0" ||
      arguments.from_port == 3389 && arguments.cidr_block == "0.0.0.0/0" ||
      arguments.from_port == 3389 && arguments.ipv6_cidr_block == "::/0"
      )
  - uid: mondoo-aws-security-nacl-no-unrestricted-ssh-rdp-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_network_acl_rule")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_network_acl_rule" && change.after.egress != true && change.after.rule_action == "allow").none(
      change.after.from_port == 22 && change.after.cidr_block == "0.0.0.0/0" ||
      change.after.from_port == 22 && change.after.ipv6_cidr_block == "::/0" ||
      change.after.from_port == 3389 && change.after.cidr_block == "0.0.0.0/0" ||
      change.after.from_port == 3389 && change.after.ipv6_cidr_block == "::/0"
      )
  - uid: mondoo-aws-security-nacl-no-unrestricted-ssh-rdp-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_network_acl_rule")
    mql: |
      terraform.state.resources.where(type == "aws_network_acl_rule" && values.egress != true && values.rule_action == "allow").none(
      values.from_port == 22 && values.cidr_block == "0.0.0.0/0" ||
      values.from_port == 22 && values.ipv6_cidr_block == "::/0" ||
      values.from_port == 3389 && values.cidr_block == "0.0.0.0/0" ||
      values.from_port == 3389 && values.ipv6_cidr_block == "::/0"
      )
  - uid: mondoo-aws-security-default-nacl-restrictive
    title: Ensure the default network ACL restricts all traffic
    impact: 80
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-1-5
      compliance/vda-isa-5: vda-isa-5-5-2-6
    variants:
      - uid: mondoo-aws-security-default-nacl-restrictive-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-default-nacl-restrictive-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-default-nacl-restrictive-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-default-nacl-restrictive-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that the default network ACL in each VPC is configured to deny all inbound and outbound traffic. The default NACL is automatically associated with subnets that are not explicitly associated with a custom NACL, so a permissive default NACL can inadvertently expose resources.

        **Why this matters**

        - **Principle of least privilege**: Default deny ensures that only explicitly allowed traffic can flow through the network.
        - **Misconfiguration prevention**: New subnets without a custom NACL automatically inherit the default NACL rules.
        - **Defense in depth**: A restrictive default NACL provides a safety net against misconfigured security groups.
        - **Compliance alignment**: CIS AWS Foundations Benchmark recommends restricting the default NACL.
      remediation:
        - id: console
          desc: |
            To ensure the default network ACL restricts all traffic using the AWS Console:

            1. Navigate to **VPC** > **Network ACLs**.
            2. Identify the default NACL (marked as "Yes" in the Default column).
            3. Modify inbound and outbound rules to deny all traffic.
            4. Ensure all subnets use custom NACLs with appropriate rules.
        - id: cli
          desc: |
            To ensure the default network ACL restricts all traffic using the AWS CLI, replace permissive rules with deny-all rules:

            ```bash
            aws ec2 replace-network-acl-entry --network-acl-id <default-acl-id> --rule-number 100 --protocol -1 --rule-action deny --cidr-block 0.0.0.0/0 --no-egress
            aws ec2 replace-network-acl-entry --network-acl-id <default-acl-id> --rule-number 100 --protocol -1 --rule-action deny --cidr-block 0.0.0.0/0 --egress
            ```
        - id: terraform
          desc: |
            To ensure the default network ACL restricts all traffic in Terraform, use `aws_default_network_acl` with no ingress or egress rules to deny all traffic:

            ```hcl
            resource "aws_default_network_acl" "default" {
              default_network_acl_id = aws_vpc.example.default_network_acl_id
            }
            ```
        - id: cloudformation
          desc: |
            To ensure the default network ACL restricts all traffic in CloudFormation, note that CloudFormation does not provide a dedicated resource for modifying the default network ACL. The default NACL is automatically created with each VPC. Use custom NACLs for all subnets and modify the default NACL rules via the AWS CLI or SDK to deny all traffic.
    refs:
      - url: https://docs.aws.amazon.com/vpc/latest/userguide/vpc-network-acls.html
        title: Network ACLs - Amazon VPC
  - uid: mondoo-aws-security-default-nacl-restrictive-aws
    filters: asset.platform == "aws"
    mql: |
      aws.ec2.networkAcls.where(isDefault == true).all(
        entries.where(ruleAction == "allow").length == 0
      )
  - uid: mondoo-aws-security-default-nacl-restrictive-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_default_network_acl")
    mql: |
      terraform.resources.where(nameLabel == "aws_default_network_acl").all(
      arguments.ingress == empty && arguments.egress == empty
      )
  - uid: mondoo-aws-security-default-nacl-restrictive-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_default_network_acl")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_default_network_acl").all(
      change.after.ingress == empty && change.after.egress == empty
      )
  - uid: mondoo-aws-security-default-nacl-restrictive-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_default_network_acl")
    mql: |
      terraform.state.resources.where(type == "aws_default_network_acl").all(
      values.ingress == empty && values.egress == empty
      )
  - uid: mondoo-aws-security-ec2-keypair-type
    title: Ensure EC2 key pairs use ED25519 or RSA key types
    impact: 60
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-5
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-7
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-9
      compliance/vda-isa-5: vda-isa-5-4-1-3
    variants:
      - uid: mondoo-aws-security-ec2-keypair-type-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-ec2-keypair-type-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ec2-keypair-type-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ec2-keypair-type-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ec2-keypair-type-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that EC2 key pairs use modern key types (ED25519 or RSA). Legacy or unsupported key types may use weaker cryptographic algorithms that are more susceptible to attacks.

        **Why this matters**

        - **Cryptographic strength**: ED25519 and RSA keys provide strong cryptographic security for SSH authentication.
        - **Modern standards**: ED25519 offers better performance and security properties than older key types.
        - **Compliance alignment**: Security frameworks recommend the use of strong cryptographic algorithms for authentication.
        - **SSH security**: Using modern key types reduces the risk of key compromise through cryptographic attacks.
      remediation:
        - id: console
          desc: |
            To ensure EC2 key pairs use ED25519 or RSA key types using the AWS Console:

            1. Navigate to **EC2** > **Key Pairs**.
            2. Create a new key pair using **ED25519** or **RSA** type.
            3. Update instances to use the new key pair.
            4. Delete the old key pair.
        - id: cli
          desc: |
            To ensure EC2 key pairs use ED25519 or RSA key types using the AWS CLI:

            ```bash
            aws ec2 create-key-pair --key-name my-key --key-type ed25519
            ```
        - id: terraform
          desc: |
            To ensure EC2 key pairs use ED25519 or RSA key types in Terraform, the `aws_key_pair` resource imports existing public key material. Ensure the key material provided uses ED25519 or RSA:

            ```hcl
            resource "aws_key_pair" "example" {
              key_name   = "my-key"
              public_key = file("~/.ssh/id_ed25519.pub")
            }
            ```
        - id: cloudformation
          desc: |
            To ensure EC2 key pairs use ED25519 or RSA key types in CloudFormation:

            ```yaml
            Resources:
              MyKeyPair:
                Type: AWS::EC2::KeyPair
                Properties:
                  KeyName: my-key
                  KeyType: ed25519
            ```
    refs:
      - url: https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/ec2-key-pairs.html
        title: Amazon EC2 key pairs
  - uid: mondoo-aws-security-ec2-keypair-type-aws
    filters: asset.platform == "aws"
    mql: |
      aws.ec2.keypairs.all(type == "ed25519" || type == "rsa")
  - uid: mondoo-aws-security-ec2-keypair-type-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_key_pair")
    mql: |
      terraform.resources.where(nameLabel == "aws_key_pair").all(
      arguments.key_type != empty
      )
  - uid: mondoo-aws-security-ec2-keypair-type-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_key_pair")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_key_pair").all(
      change.after.key_type != empty
      )
  - uid: mondoo-aws-security-ec2-keypair-type-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_key_pair")
    mql: |
      terraform.state.resources.where(type == "aws_key_pair").all(
      values.key_type != empty
      )
  - uid: mondoo-aws-security-ec2-keypair-type-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::EC2::KeyPair")
    mql: |
      cloudformation.template.resources.where(type == "AWS::EC2::KeyPair").all(
      properties['KeyType'] != empty
      )
  - uid: mondoo-aws-security-rds-instance-iam-auth
    title: Ensure RDS database instances have IAM authentication enabled
    impact: 70
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-j
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-3
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-3
    variants:
      - uid: mondoo-aws-security-rds-instance-iam-auth-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-rds-instance-iam-auth-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-rds-instance-iam-auth-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-rds-instance-iam-auth-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-rds-instance-iam-auth-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon RDS database instances have IAM database authentication enabled. IAM authentication allows managing database access through AWS IAM policies instead of relying solely on database-level passwords.

        **Why this matters**

        - **Centralized access control**: IAM authentication integrates database access with AWS identity management, eliminating the need for separate database credentials.
        - **Temporary credentials**: IAM database authentication uses short-lived authentication tokens rather than long-lived passwords.
        - **Audit trail**: Authentication attempts are logged in CloudTrail, providing visibility into database access patterns.
        - **Compliance alignment**: Eliminates shared database passwords and aligns with least-privilege access principles.
      remediation:
        - id: console
          desc: |
            To ensure RDS database instances have IAM authentication enabled using the AWS Console:

            1. Navigate to the **RDS** console.
            2. Select the database instance.
            3. Choose **Modify**.
            4. Under **Database authentication**, select **Password and IAM database authentication**.
            5. Apply the changes.
        - id: cli
          desc: |
            To ensure RDS database instances have IAM authentication enabled using the AWS CLI:

            ```bash
            aws rds modify-db-instance --db-instance-identifier <instance-id> --enable-iam-database-authentication --apply-immediately
            ```
        - id: terraform
          desc: |
            To ensure RDS database instances have IAM authentication enabled in Terraform:

            ```hcl
            resource "aws_db_instance" "example" {
              identifier                          = "example"
              engine                              = "mysql"
              instance_class                      = "db.t3.micro"
              iam_database_authentication_enabled = true
            }
            ```
        - id: cloudformation
          desc: |
            To ensure RDS database instances have IAM authentication enabled in CloudFormation:

            ```yaml
            Resources:
              MyDBInstance:
                Type: AWS::RDS::DBInstance
                Properties:
                  DBInstanceIdentifier: example
                  Engine: mysql
                  DBInstanceClass: db.t3.micro
                  EnableIAMDatabaseAuthentication: true
            ```
    refs:
      - url: https://docs.aws.amazon.com/AmazonRDS/latest/UserGuide/UsingWithRDS.IAMDBAuth.html
        title: IAM database authentication for Amazon RDS
  - uid: mondoo-aws-security-rds-instance-iam-auth-aws
    filters: asset.platform == "aws-rds-dbinstance"
    mql: aws.rds.dbinstance.iamDatabaseAuthentication == true
  - uid: mondoo-aws-security-rds-instance-iam-auth-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_db_instance")
    mql: |
      terraform.resources.where(nameLabel == "aws_db_instance").all(
      arguments.iam_database_authentication_enabled == true
      )
  - uid: mondoo-aws-security-rds-instance-iam-auth-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_db_instance")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_db_instance").all(
      change.after.iam_database_authentication_enabled == true
      )
  - uid: mondoo-aws-security-rds-instance-iam-auth-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_db_instance")
    mql: |
      terraform.state.resources.where(type == "aws_db_instance").all(
      values.iam_database_authentication_enabled == true
      )
  - uid: mondoo-aws-security-rds-instance-iam-auth-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::RDS::DBInstance")
    mql: |
      cloudformation.template.resources.where(type == "AWS::RDS::DBInstance").all(
      properties['EnableIAMDatabaseAuthentication'] == true
      )
  - uid: mondoo-aws-security-eks-nodegroup-encrypted-volumes
    title: Ensure EBS encryption by default is enabled for EKS node group volumes
    impact: 70
    tags:
