        arguments.key_storage_security_standard == "FIPS_140_2_LEVEL_3_OR_HIGHER"
      )
  - uid: mondoo-aws-security-privateca-hsm-key-storage-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_acmpca_certificate_authority")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_acmpca_certificate_authority").all(
        change.after.key_storage_security_standard == "FIPS_140_2_LEVEL_3_OR_HIGHER"
      )
  - uid: mondoo-aws-security-privateca-hsm-key-storage-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_acmpca_certificate_authority")
    mql: |
      terraform.state.resources.where(type == "aws_acmpca_certificate_authority").all(
        values.key_storage_security_standard == "FIPS_140_2_LEVEL_3_OR_HIGHER"
      )
  - uid: mondoo-aws-security-privateca-hsm-key-storage-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::ACMPCA::CertificateAuthority")
    mql: |
      cloudformation.template.resources.where(type == "AWS::ACMPCA::CertificateAuthority").all(
        properties['KeyStorageSecurityStandard'] == "FIPS_140_2_LEVEL_3_OR_HIGHER"
      )
  # No CloudFormation variant: AWS::Lightsail::Instance Networking.Ports is exposed in CloudFormation, but the variant adds little over the Terraform/runtime checks for Lightsail-managed resources; revisit if customer demand for CFN-only Lightsail coverage emerges.
  - uid: mondoo-aws-security-lightsail-instance-no-public-sensitive-ports
    title: Ensure Lightsail instances do not expose sensitive ports to the internet
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-4-2
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-aws-security-lightsail-instance-no-public-sensitive-ports-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-lightsail-instance-no-public-sensitive-ports-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-lightsail-instance-no-public-sensitive-ports-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-lightsail-instance-no-public-sensitive-ports-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Lightsail instance firewall rules do not expose remote-administration or database ports to the public internet. By default, Lightsail instances can have firewall rules that allow inbound traffic from any IP address, but leaving ports such as 22, 3389, 3306, 5432, 1433, 27017, 6379, and 9200 open to `0.0.0.0/0` gives attackers a direct path to the instance and any data store it hosts.

        **Why this matters**

        - **Brute-force exposure:** SSH (22) and RDP (3389) open to the world receive continuous credential-stuffing and brute-force traffic that standard auth mechanisms alone cannot fully absorb.
        - **Database attack surface:** Well-known database ports such as MySQL 3306, PostgreSQL 5432, and MongoDB 27017 are enumerated by internet scanners within minutes and are frequently targeted due to default credentials or missing authentication.
        - **Single control boundary:** Lightsail uses a per-instance firewall rather than VPC-level security groups for internet-facing traffic, making that firewall the only barrier between sensitive ports and the public internet.
        - **Minimal legitimate need:** Remote-administration ports should never be reachable from arbitrary IPs; restrict access to known CIDR ranges or use a bastion host.

        **Risk mitigation**

        - **Reduce attack surface:** Removing public rules on sensitive ports eliminates the most common initial-access vectors for opportunistic attackers.
        - **Enforce least privilege:** Scoping source CIDRs to specific management ranges ensures only authorized operators can reach administrative services.
        - **Protect data stores:** Keeping database ports off the public internet prevents direct data exfiltration even if application-layer authentication is misconfigured.
      audit: |
        ### Audit via Console

        1. Open the **Amazon Lightsail Console** and select **Instances**.
        2. For each instance, select it and go to the **Networking** tab.
        3. Review the **IPv4 Firewall** rules. Look for any rule where **Source** is `Anywhere (0.0.0.0/0)` and the port range covers any of: 22 (SSH), 3389 (RDP), 3306 (MySQL), 5432 (PostgreSQL), 1433 (SQL Server), 27017 (MongoDB), 6379 (Redis), or 9200 (Elasticsearch).

        A passing instance has no firewall rules that expose the listed sensitive ports to `0.0.0.0/0`. A failing instance has at least one rule permitting one of those ports from `Anywhere`.

        ### Audit via CLI

        1. List all Lightsail instances:

        ```bash
        aws lightsail get-instances \
          --query 'instances[*].{Name:name,State:state.name}' --output table
        ```

        2. For each instance, retrieve the firewall rules and inspect for sensitive port exposure:

        ```bash
        aws lightsail get-instance-port-states \
          --instance-name <instance-name> \
          --query 'portStates[*].{FromPort:fromPort,ToPort:toPort,Protocol:protocol,Cidrs:cidrs}'
        ```

        A passing instance returns no rules where `Cidrs` contains `0.0.0.0/0` and the port range covers ports 22, 3389, 3306, 5432, 1433, 27017, 6379, or 9200. A failing instance returns at least one rule with `0.0.0.0/0` in `Cidrs` that spans one or more of those sensitive ports.
      remediation:
        - id: console
          desc: |
            To restrict sensitive Lightsail ports using the AWS Console:

            1. Open the **Amazon Lightsail Console** and select the instance.
            2. Choose the **Networking** tab and locate the **IPv4 Firewall** section.
            3. For each rule that exposes a sensitive port to `Anywhere`, edit the **Source** to a specific IP, CIDR range, or remove the rule entirely.
            4. Save the firewall configuration.
        - id: cli
          desc: |
            To restrict a Lightsail instance firewall rule using the AWS CLI:

            ```bash
            aws lightsail put-instance-public-ports \
              --instance-name <instance-name> \
              --port-infos fromPort=22,toPort=22,protocol=tcp,cidrs=10.0.0.0/8
            ```

            To remove a sensitive port entirely:

            ```bash
            aws lightsail close-instance-public-ports \
              --instance-name <instance-name> \
              --port-info fromPort=22,toPort=22,protocol=tcp
            ```
        - id: terraform
          desc: |
            To restrict sensitive ports on a Lightsail instance in Terraform, scope `cidrs` on each `port_info` block of `aws_lightsail_instance_public_ports` so that ports such as 22 and 3389 are not open to `0.0.0.0/0`:

            ```hcl
            resource "aws_lightsail_instance_public_ports" "example" {
              instance_name = aws_lightsail_instance.example.name

              port_info {
                from_port = 22
                to_port   = 22
                protocol  = "tcp"
                cidrs     = ["10.0.0.0/8"]
              }

              port_info {
                from_port = 443
                to_port   = 443
                protocol  = "tcp"
                cidrs     = ["0.0.0.0/0"]
              }
            }
            ```
