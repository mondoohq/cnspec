    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_lb")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_lb").all(
        change.after.enable_deletion_protection == true
      )
