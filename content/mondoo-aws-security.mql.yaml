  - uid: mondoo-aws-security-appstream-fleet-max-session-duration
    title: Ensure AppStream 2.0 fleets enforce a maximum session duration
    impact: 50
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-10
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-5-18
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-12
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-10
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc6-1-8
      compliance/vda-isa-5: vda-isa-5-4-1-3
    variants:
      - uid: mondoo-aws-security-appstream-fleet-max-session-duration-aws
        tags:
          mondoo.com/filter-title: "AWS Account"
          mondoo.com/filter-icon: "aws"
      - uid: mondoo-aws-security-appstream-fleet-max-session-duration-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-appstream-fleet-max-session-duration-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-appstream-fleet-max-session-duration-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-appstream-fleet-max-session-duration-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon AppStream 2.0 fleets have a maximum user session duration of 10 hours (36000 seconds) or less. Excessively long or unlimited session durations increase the risk of unattended sessions being hijacked or misused.

        **Why this matters**

        - Long-running sessions that remain active for extended periods increase the window of opportunity for session hijacking or unauthorized access.
        - Unattended sessions may remain connected to sensitive applications and data indefinitely.
        - Session time limits enforce a regular re-authentication cycle, reducing the impact of stolen session credentials.
        - AWS allows a maximum of 5760 minutes (96 hours), but security best practices recommend limiting sessions to a reasonable work period.

        **Risk mitigation**

        - **Session security:** Limits the duration a compromised session can remain active.
        - **Re-authentication:** Forces periodic re-authentication to verify user identity.
        - **Resource management:** Prevents resource waste from abandoned sessions.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and navigate to the **Amazon AppStream 2.0** service.
        2. In the left navigation pane, select **Fleets**.
        3. Select a fleet from the list.
        4. Review the **Maximum session duration** field in the fleet details.

        A passing fleet shows a **Maximum session duration** of 600 minutes (36000 seconds) or less. A failing fleet shows a value greater than 600 minutes.

        ### Audit via CLI

        1. Run the following command to list all AppStream fleets and their maximum user duration:

        ```bash
        aws appstream describe-fleets \
          --query "Fleets[*].{Name:Name,MaxUserDurationInSeconds:MaxUserDurationInSeconds}" \
          --output table
        ```

        A passing fleet returns `MaxUserDurationInSeconds` of 36000 or less. A failing fleet returns a value greater than 36000.

      remediation:
        - id: console
          desc: |
            To ensure AppStream 2.0 fleets enforce a maximum session duration using the AWS Console:

            1. Navigate to the **AppStream 2.0 Console** and select **Fleets**.
            2. Select the fleet and choose **Edit**.
            3. Set **Maximum session duration** to 600 minutes (10 hours) or less.
            4. Save the changes.
        - id: cli
          desc: |
            To ensure AppStream 2.0 fleets enforce a maximum session duration using the AWS CLI, update the maximum session duration:

            ```bash
            aws appstream update-fleet \
              --name <fleet-name> \
              --max-user-duration-in-seconds 36000
            ```
        - id: terraform
          desc: |
            To ensure AppStream 2.0 fleets enforce a maximum session duration in Terraform, set the maximum session duration:

            ```hcl
            resource "aws_appstream_fleet" "example" {
              name          = "example-fleet"
              instance_type = "stream.standard.medium"
              image_name    = "AppStream-WinServer2019"

              max_user_duration_in_seconds = 36000
            }
            ```
        - id: cloudformation
          desc: |
            To ensure AppStream 2.0 fleets enforce a maximum session duration in CloudFormation, set `MaxUserDurationInSeconds` to 36000 or less:

            ```yaml
            Resources:
              Fleet:
                Type: AWS::AppStream::Fleet
                Properties:
                  Name: example-fleet
                  InstanceType: stream.standard.medium
                  MaxUserDurationInSeconds: 36000
            ```
    refs:
      - url: https://docs.aws.amazon.com/appstream2/latest/developerguide/fleets-and-stacks.html
        title: Amazon AppStream 2.0 fleets and stacks
  - uid: mondoo-aws-security-appstream-fleet-max-session-duration-aws
    filters: asset.platform == "aws"
    mql: |
      aws.appstream.fleets.all(maxUserDurationInSeconds <= 36000)
  - uid: mondoo-aws-security-appstream-fleet-max-session-duration-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_appstream_fleet")
    mql: |
      terraform.resources.where(nameLabel == "aws_appstream_fleet").all(
      arguments.max_user_duration_in_seconds <= 36000
      )
  - uid: mondoo-aws-security-appstream-fleet-max-session-duration-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_appstream_fleet")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_appstream_fleet").all(
      change.after.max_user_duration_in_seconds <= 36000
      )
  - uid: mondoo-aws-security-appstream-fleet-max-session-duration-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_appstream_fleet")
    mql: |
      terraform.state.resources.where(type == "aws_appstream_fleet").all(
      values.max_user_duration_in_seconds <= 36000
      )
  - uid: mondoo-aws-security-appstream-fleet-max-session-duration-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::AppStream::Fleet")
    mql: |
      cloudformation.template.resources.where(type == "AWS::AppStream::Fleet").all(
      properties['MaxUserDurationInSeconds'] != empty && properties['MaxUserDurationInSeconds'] <= 36000
      )
  - uid: mondoo-aws-security-appstream-fleet-idle-disconnect
    title: Ensure AppStream 2.0 fleets have idle disconnect timeout configured
    impact: 50
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-10
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-5-18
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-12
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-10
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc6-1-8
      compliance/vda-isa-5: vda-isa-5-4-1-3
    variants:
      - uid: mondoo-aws-security-appstream-fleet-idle-disconnect-aws
        tags:
          mondoo.com/filter-title: "AWS Account"
          mondoo.com/filter-icon: "aws"
      - uid: mondoo-aws-security-appstream-fleet-idle-disconnect-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-appstream-fleet-idle-disconnect-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-appstream-fleet-idle-disconnect-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-appstream-fleet-idle-disconnect-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon AppStream 2.0 fleets have an idle disconnect timeout configured and set to 15 minutes (900 seconds) or less. Without an idle timeout, abandoned sessions remain active indefinitely, leaving applications and data accessible.

        **Why this matters**

        - Sessions without idle timeouts remain connected even when users walk away, leave for the day, or forget to log out.
        - An unattended session connected to sensitive applications is a significant security risk, as anyone with physical or remote access to the user's device could access the streaming session.
        - Idle disconnect timeouts ensure that inactive sessions are automatically terminated, reducing the window of exposure.
        - A value of 0 means no idle timeout is configured, which is the least secure option.

        **Risk mitigation**

        - **Unattended sessions:** Automatically disconnects idle sessions to prevent unauthorized access.
        - **Least privilege:** Reduces the time window during which an abandoned session could be exploited.
        - **Resource efficiency:** Frees up fleet capacity from idle sessions.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and navigate to the **Amazon AppStream 2.0** service.
        2. In the left navigation pane, select **Fleets**.
        3. Select a fleet from the list.
        4. Review the **Idle disconnect timeout** field in the fleet details.

        A passing fleet shows an **Idle disconnect timeout** between 1 and 15 minutes (1 to 900 seconds). A failing fleet shows 0 (no idle timeout) or a value greater than 900 seconds.

        ### Audit via CLI

        1. Run the following command to list all AppStream fleets and their idle disconnect timeout:

        ```bash
        aws appstream describe-fleets \
          --query "Fleets[*].{Name:Name,IdleDisconnectTimeoutInSeconds:IdleDisconnectTimeoutInSeconds}" \
          --output table
        ```

        A passing fleet returns `IdleDisconnectTimeoutInSeconds` between 1 and 900. A failing fleet returns 0 or a value greater than 900.

      remediation:
        - id: console
          desc: |
            To ensure AppStream 2.0 fleets have idle disconnect timeout configured using the AWS Console:

            1. Navigate to the **AppStream 2.0 Console** and select **Fleets**.
            2. Select the fleet and choose **Edit**.
            3. Set **Idle disconnect timeout** to 15 minutes or less.
            4. Save the changes.
        - id: cli
          desc: |
            To ensure AppStream 2.0 fleets have idle disconnect timeout configured using the AWS CLI, update the idle disconnect timeout:

            ```bash
            aws appstream update-fleet \
              --name <fleet-name> \
              --idle-disconnect-timeout-in-seconds 900
            ```
        - id: terraform
          desc: |
            To ensure AppStream 2.0 fleets have idle disconnect timeout configured in Terraform, configure idle disconnect and disconnect timeouts:

            ```hcl
            resource "aws_appstream_fleet" "example" {
              name          = "example-fleet"
              instance_type = "stream.standard.medium"
              image_name    = "AppStream-WinServer2019"

              idle_disconnect_timeout_in_seconds = 900
              disconnect_timeout_in_seconds      = 300
            }
            ```
        - id: cloudformation
          desc: |
            To ensure AppStream 2.0 fleets have idle disconnect timeout configured in CloudFormation, set `IdleDisconnectTimeoutInSeconds`:

            ```yaml
            Resources:
              Fleet:
                Type: AWS::AppStream::Fleet
                Properties:
                  Name: example-fleet
                  InstanceType: stream.standard.medium
                  IdleDisconnectTimeoutInSeconds: 900
                  DisconnectTimeoutInSeconds: 300
            ```
    refs:
      - url: https://docs.aws.amazon.com/appstream2/latest/developerguide/fleets-and-stacks.html
        title: Amazon AppStream 2.0 fleets and stacks
  - uid: mondoo-aws-security-appstream-fleet-idle-disconnect-aws
    filters: asset.platform == "aws"
    mql: |
      aws.appstream.fleets.all(
        idleDisconnectTimeoutInSeconds > 0 && idleDisconnectTimeoutInSeconds <= 900
      )
  - uid: mondoo-aws-security-appstream-fleet-idle-disconnect-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_appstream_fleet")
    mql: |
      terraform.resources.where(nameLabel == "aws_appstream_fleet").all(
      arguments.idle_disconnect_timeout_in_seconds > 0 && arguments.idle_disconnect_timeout_in_seconds <= 900
      )
  - uid: mondoo-aws-security-appstream-fleet-idle-disconnect-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_appstream_fleet")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_appstream_fleet").all(
      change.after.idle_disconnect_timeout_in_seconds > 0 && change.after.idle_disconnect_timeout_in_seconds <= 900
      )
  - uid: mondoo-aws-security-appstream-fleet-idle-disconnect-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_appstream_fleet")
    mql: |
      terraform.state.resources.where(type == "aws_appstream_fleet").all(
      values.idle_disconnect_timeout_in_seconds > 0 && values.idle_disconnect_timeout_in_seconds <= 900
      )
  - uid: mondoo-aws-security-appstream-fleet-idle-disconnect-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::AppStream::Fleet")
    mql: |
      cloudformation.template.resources.where(type == "AWS::AppStream::Fleet").all(
      properties['IdleDisconnectTimeoutInSeconds'] != empty && properties['IdleDisconnectTimeoutInSeconds'] > 0 && properties['IdleDisconnectTimeoutInSeconds'] <= 900
      )
  - uid: mondoo-aws-security-appstream-image-builder-no-default-internet-access
    title: Ensure AppStream 2.0 image builders disable default internet access
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-4
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-aws-security-appstream-image-builder-no-default-internet-access-aws
        tags:
          mondoo.com/filter-title: "AWS Account"
          mondoo.com/filter-icon: "aws"
      - uid: mondoo-aws-security-appstream-image-builder-no-default-internet-access-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-appstream-image-builder-no-default-internet-access-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-appstream-image-builder-no-default-internet-access-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-appstream-image-builder-no-default-internet-access-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon AppStream 2.0 image builders do not have default internet access enabled. Image builders are used to create custom application images and may have access to sensitive configuration data, application binaries, and credentials during the image creation process.

        **Why this matters**

        - Image builders with direct internet access can reach any external endpoint, creating a risk of data exfiltration during image creation.
        - During image creation, builders may have access to application installation media, license keys, configuration files, and service credentials that should not be exposed to the public internet.
        - Malicious or compromised software installed during image building could communicate with command-and-control servers if direct internet access is available.
        - AWS recommends using a VPC with a NAT gateway to provide controlled internet access for image builders.

        **Risk mitigation**

        - **Data protection:** Prevents exfiltration of sensitive image build artifacts.
        - **Supply chain security:** Reduces risk of compromised software communicating externally during image creation.
        - **Network control:** Forces outbound traffic through monitored network paths.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and navigate to the **Amazon AppStream 2.0** service.
        2. In the left navigation pane, select **Image builders**.
        3. Select an image builder from the list.
        4. In the image builder details, review the **Network access** section.
        5. Check the **Default internet access** setting.

        A passing image builder shows **Default internet access** as **Disabled**. A failing image builder shows **Default internet access** as **Enabled**.

        ### Audit via CLI

        1. Run the following command to list all AppStream image builders and their default internet access setting:

        ```bash
        aws appstream describe-image-builders \
          --query "ImageBuilders[*].{Name:Name,DefaultInternetAccess:EnableDefaultInternetAccess,State:State}" \
          --output table
        ```

        A passing image builder returns `EnableDefaultInternetAccess: false`. A failing image builder returns `EnableDefaultInternetAccess: true`.

      remediation:
        - id: console
          desc: |
            To ensure AppStream 2.0 image builders disable default internet access using the AWS Console:

            1. Navigate to the **AppStream 2.0 Console** and select **Image builders**.
            2. When creating a new image builder, under **Network access**, do not check **Default Internet Access**.
            3. Configure a VPC with a NAT gateway for controlled internet access.
            4. For existing image builders, create a new one without default internet access and delete the old one.
        - id: cli
          desc: |
            To ensure AppStream 2.0 image builders disable default internet access using the AWS CLI, create an image builder without default internet access:

            ```bash
            aws appstream create-image-builder \
              --name <builder-name> \
              --instance-type stream.standard.medium \
              --image-name <base-image> \
              --no-enable-default-internet-access \
              --vpc-config SubnetIds=<subnet-id>,SecurityGroupIds=<sg-id>
            ```
        - id: terraform
          desc: |
            To ensure AppStream 2.0 image builders disable default internet access in Terraform, disable default internet access on image builders:

            ```hcl
            resource "aws_appstream_image_builder" "example" {
              name          = "example-builder"
              instance_type = "stream.standard.medium"
              image_name    = "AppStream-WinServer2019"

              enable_default_internet_access = false

              vpc_config {
                subnet_ids = [aws_subnet.example.id]
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure AppStream 2.0 image builders disable default internet access in CloudFormation, set `EnableDefaultInternetAccess` to `false`:

            ```yaml
            Resources:
              ImageBuilder:
                Type: AWS::AppStream::ImageBuilder
                Properties:
                  Name: example-builder
                  InstanceType: stream.standard.medium
                  ImageName: AppStream-WinServer2019
                  EnableDefaultInternetAccess: false
                  VpcConfig:
                    SubnetIds:
                      - !Ref PrivateSubnet
            ```
    refs:
      - url: https://docs.aws.amazon.com/appstream2/latest/developerguide/internet-access.html
        title: Internet access for Amazon AppStream 2.0
  - uid: mondoo-aws-security-appstream-image-builder-no-default-internet-access-aws
    filters: asset.platform == "aws"
    mql: |
      aws.appstream.imageBuilders.all(enableDefaultInternetAccess == false)
  - uid: mondoo-aws-security-appstream-image-builder-no-default-internet-access-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_appstream_image_builder")
    mql: |
      terraform.resources.where(nameLabel == "aws_appstream_image_builder").all(
      arguments.enable_default_internet_access != true
      )
  - uid: mondoo-aws-security-appstream-image-builder-no-default-internet-access-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_appstream_image_builder")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_appstream_image_builder").all(
      change.after.enable_default_internet_access != true
      )
  - uid: mondoo-aws-security-appstream-image-builder-no-default-internet-access-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_appstream_image_builder")
    mql: |
      terraform.state.resources.where(type == "aws_appstream_image_builder").all(
      values.enable_default_internet_access != true
      )
  - uid: mondoo-aws-security-appstream-image-builder-no-default-internet-access-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::AppStream::ImageBuilder")
    mql: |
      cloudformation.template.resources.where(type == "AWS::AppStream::ImageBuilder").all(
      properties['EnableDefaultInternetAccess'] != true
      )
  - uid: mondoo-aws-security-directoryservice-os-version
    title: Ensure Directory Service directories use SERVER_2019 or newer
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-tvm-03
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-8
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-12
      compliance/nist-csf-2: nist-csf-2-pr-ps-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-1
      compliance/pci-dss-4: pcidss-requirement-6-3-3
      compliance/soc2-2017: soc2-control-cc7-1-1
      compliance/vda-isa-5: vda-isa-5-5-2-5
    variants:
      - uid: mondoo-aws-security-directoryservice-os-version-aws
        tags:
          mondoo.com/filter-title: "AWS Account"
          mondoo.com/filter-icon: "aws"
      - uid: mondoo-aws-security-directoryservice-os-version-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-directoryservice-os-version-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-directoryservice-os-version-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that AWS Directory Service directories run on Windows Server 2019 or newer. Windows Server 2012 has reached end of life and no longer receives security patches from Microsoft, leaving directories vulnerable to known and future exploits.

        **Why this matters**

        - Windows Server 2012 reached end of extended support, meaning no further security patches are released, leaving directories exposed to known vulnerabilities.
        - Directory services are critical identity infrastructure. A compromise of the directory service can lead to full domain takeover and lateral movement across the entire environment.
        - Server 2019 includes security improvements such as enhanced credential protection, improved event logging, and Shielded VM support.
        - AWS supports upgrading the OS version for Managed Microsoft AD directories.

        **Risk mitigation**

        - **Patching:** Ensures the directory OS continues to receive security updates.
        - **Security features:** Leverages modern security capabilities available in Server 2019.
        - **Compliance:** Meets requirements for running supported, patched operating systems.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and navigate to the **AWS Directory Service** console.
        2. In the left navigation pane, select **Directories**.
        3. For each directory of type **AWS Managed Microsoft AD**, select the directory and review the details.
        4. Locate the **OS version** field in the directory details.

        A passing directory shows an **OS version** of **SERVER_2019** or newer. A failing directory shows **SERVER_2012**.

        ### Audit via CLI

        1. Run the following command to list all directories and their OS version:

        ```bash
        aws ds describe-directories \
          --query "DirectoryDescriptions[?Type=='MicrosoftAD' && Stage=='Active'].{Id:DirectoryId,Name:Name,OsVersion:OsVersion,Stage:Stage}" \
          --output table
        ```

        A passing directory returns `OsVersion: SERVER_2019` or a newer value. A failing directory returns `OsVersion: SERVER_2012`.

      remediation:
        - id: console
          desc: |
            To ensure Directory Service directories use SERVER_2019 or newer using the AWS Console:

            1. Navigate to the **Directory Service Console**.
            2. Select the directory running on SERVER_2012.
            3. Choose **Actions** > **Update OS version**.
            4. Select **SERVER_2019** as the target OS version.
            5. Note: OS version upgrades may require a maintenance window and should be tested in a non-production directory first.
        - id: cli
          desc: |
            To ensure Directory Service directories use SERVER_2019 or newer using the AWS CLI, check the OS version of your directories:

            ```bash
            aws ds describe-directories \
              --query "DirectoryDescriptions[*].{Id:DirectoryId,Name:Name,OS:OsVersion,Stage:Stage}"
            ```

            Update the OS version:

            ```bash
            aws ds update-settings \
              --directory-id <directory-id> \
              --settings "[{\"SettingId\":\"OS\",\"SettingValue\":\"SERVER_2019\"}]"
            ```
        - id: terraform
          desc: |
            To ensure Directory Service directories use SERVER_2019 or newer in Terraform, set the OS version when creating a Managed Microsoft AD directory:

            ```hcl
            resource "aws_directory_service_directory" "example" {
              name     = "corp.example.com"
              password = var.ad_password
              type     = "MicrosoftAD"
              edition  = "Standard"

              vpc_settings {
                vpc_id     = aws_vpc.example.id
                subnet_ids = [aws_subnet.a.id, aws_subnet.b.id]
              }
            }
            ```

            Note: The `os_version` attribute may require recreation of the directory. Check the Terraform AWS provider documentation for current support.
        - id: cloudformation
          desc: |
            To ensure Directory Service directories use SERVER_2019 or newer in CloudFormation, specify the OS version in the directory resource:

            ```yaml
            Resources:
              Directory:
                Type: AWS::DirectoryService::MicrosoftAD
                Properties:
                  Name: corp.example.com
                  Password: !Ref ADPassword
                  Edition: Standard
                  VpcSettings:
                    VpcId: !Ref VPC
                    SubnetIds:
                      - !Ref SubnetA
                      - !Ref SubnetB
            ```

            Note: OS version updates may not be supported via CloudFormation update. Use the AWS CLI for in-place upgrades.
    refs:
      - url: https://docs.aws.amazon.com/directoryservice/latest/admin-guide/ms_ad_directory_maintenance.html
        title: AWS Managed Microsoft AD directory maintenance
  - uid: mondoo-aws-security-directoryservice-os-version-aws
    filters: asset.platform == "aws"
    mql: |
      aws.directoryservice.directories.where(stage == "Active" && type == "MicrosoftAD").all(
        osVersion != "SERVER_2012"
      )
  - uid: mondoo-aws-security-directoryservice-os-version-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_directory_service_directory")
    mql: |
      terraform.resources.where(nameLabel == "aws_directory_service_directory" && arguments['type'] == "MicrosoftAD").all(
        arguments['os_version'] != "SERVER_2012"
      )
  - uid: mondoo-aws-security-directoryservice-os-version-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_directory_service_directory")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_directory_service_directory" && change.after.type == "MicrosoftAD").all(
        change.after.os_version != "SERVER_2012"
      )
  - uid: mondoo-aws-security-directoryservice-os-version-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_directory_service_directory")
    mql: |
      terraform.state.resources.where(type == "aws_directory_service_directory" && values.type == "MicrosoftAD").all(
        values.os_version != "SERVER_2012"
      )
  # No Terraform variants: `ssoEnabled` is toggled via the `EnableSso`/`DisableSso` API; the `aws_directory_service_directory` Terraform resource has no `sso_enabled` argument. Provisioning this state requires an out-of-band API call.
  - uid: mondoo-aws-security-directoryservice-sso-enabled
    title: Ensure Directory Service directories have SSO enabled
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-14
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-j
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-2
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-2
    variants:
      - uid: mondoo-aws-security-directoryservice-sso-enabled-aws
        tags:
          mondoo.com/filter-title: "AWS Account"
          mondoo.com/filter-icon: "aws"
    docs:
      desc: |
        This check ensures that AWS Directory Service directories have single sign-on (SSO) enabled. SSO is a critical security control that reduces password sprawl, centralizes access control, and provides a single point for access revocation across all directory-integrated applications.

        **Why this matters**

        - **Password sprawl reduction:** Without SSO, users manage separate credentials for each application, leading to weak passwords and password reuse. A single credential compromise can then cascade across multiple systems because the same password is used everywhere.
        - **Centralized access control:** SSO enforces authentication through the directory, ensuring password complexity policies, account lockout thresholds, and MFA requirements are applied consistently. Without SSO, each application enforces its own policies (or none at all), creating inconsistent security posture.
        - **Single point of access revocation:** When an employee leaves or an account is compromised, disabling the directory account immediately revokes access to all SSO-integrated applications. Without SSO, administrators must individually revoke access in each application, creating a window where orphaned accounts remain active and exploitable.
        - **Audit consolidation:** SSO funnels all authentication events through the directory, providing a single audit trail for access reviews, compliance reporting, and incident investigation rather than scattered logs across multiple applications.

        **Risk mitigation**

        - **Credential hygiene:** Eliminates multiple credential stores that could be targeted independently and reduces the password fatigue that leads to weak credential choices.
        - **Incident containment:** A single account disable instantly cuts off a compromised identity from all integrated resources, limiting blast radius.
        - **Compliance:** Meets centralized authentication requirements in SOC 2, NIST 800-53 (IA-2), and ISO 27001.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and navigate to the **AWS Directory Service** console.
        2. In the left navigation pane, select **Directories**.
        3. Select an Active Directory.
        4. Choose the **Application management** tab.
        5. Locate the **Single sign-on (SSO)** section and review its status.

        A passing directory shows SSO status as **Enabled**. A failing directory shows SSO status as **Disabled**.

        ### Audit via CLI

        1. Run the following command to list all active directories and their SSO status:

        ```bash
        aws ds describe-directories \
          --query "DirectoryDescriptions[?Stage=='Active'].{Id:DirectoryId,Name:Name,Type:Type,SsoEnabled:SsoEnabled}" \
          --output table
        ```

        A passing directory returns `SsoEnabled: true`. A failing directory returns `SsoEnabled: false`.

      remediation:
        - id: console
          desc: |
            To ensure Directory Service directories have SSO enabled using the AWS Console:

            1. Navigate to the **Directory Service Console**.
            2. Select the directory.
            3. Under the **Application management** tab, find **Single sign-on (SSO)**.
            4. Choose **Enable** to enable SSO.
        - id: cli
          desc: |
            To ensure Directory Service directories have SSO enabled using the AWS CLI, enable SSO for a directory:

            ```bash
            aws ds enable-sso --directory-id <directory-id>
            ```

            Verify SSO status:

            ```bash
            aws ds describe-directories --directory-ids <directory-id> \
              --query "DirectoryDescriptions[*].{Id:DirectoryId,SSOEnabled:SsoEnabled}"
            ```
        - id: terraform
          desc: |
            To ensure Directory Service directories have SSO enabled in Terraform, SSO for Directory Service is not directly configurable via Terraform. Use the AWS CLI or Console to enable SSO after the directory is created, or use a `null_resource` with a local-exec provisioner.
        - id: cloudformation
          desc: |
            To ensure Directory Service directories have SSO enabled in CloudFormation, SSO for Directory Service is not directly configurable via CloudFormation. Use the AWS CLI or Console to enable SSO after the directory is created, or use a CloudFormation custom resource.
    refs:
      - url: https://docs.aws.amazon.com/directoryservice/latest/admin-guide/ms_ad_single_sign_on.html
        title: Single sign-on for AWS Managed Microsoft AD
  - uid: mondoo-aws-security-directoryservice-sso-enabled-aws
    filters: asset.platform == "aws"
    mql: |
      aws.directoryservice.directories.where(stage == "Active" && type != "ADConnector").all(
        ssoEnabled == true
      )
  # No Terraform variants: RADIUS MFA is enabled via the `EnableRadius` API and the `aws_directory_service_directory` resource exposes no `radius_*` arguments. There is no Terraform analog for this configuration.
  - uid: mondoo-aws-security-directoryservice-radius-mfa-enabled
    title: Ensure Directory Service Managed AD has RADIUS MFA enabled
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-14
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-j
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-3
      compliance/pci-dss-4: pcidss-requirement-8-4-1
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-2
    variants:
      - uid: mondoo-aws-security-directoryservice-radius-mfa-enabled-aws
        tags:
          mondoo.com/filter-title: "AWS Account"
          mondoo.com/filter-icon: "aws"
    docs:
      desc: |
        This check ensures that AWS Managed Microsoft AD directories have multi-factor authentication (MFA) enabled through RADIUS integration. MFA adds a critical second layer of authentication beyond passwords, significantly reducing the risk of unauthorized access from compromised credentials.

        **Why this matters**

        - Directory services are the foundation of identity and access management. Compromised directory credentials can lead to full domain takeover.
        - Passwords alone are insufficient protection against credential stuffing, phishing, and brute-force attacks.
        - RADIUS MFA integration requires users to provide a second authentication factor (token, push notification, biometric) in addition to their password.
        - Without MFA, a single compromised password grants full access to all directory-integrated resources.
        - This check applies to Managed Microsoft AD directories, which support RADIUS-based MFA.

        **Risk mitigation**

        - **Account protection:** Prevents unauthorized access even when passwords are compromised.
        - **Phishing resistance:** Adds a factor that cannot be captured through phishing.
        - **Compliance:** Meets MFA requirements in PCI DSS, HIPAA, SOC 2, NIST 800-53, and other frameworks.
      audit: |
        ### Audit via Console

        1. Navigate to the **AWS Directory Service Console** at Services > Directory Service.
        2. Select the Managed Microsoft AD directory you want to inspect.
        3. Choose the **Networking & security** tab.
        4. Under **Multi-factor authentication**, check the displayed RADIUS status.

        A passing directory shows a RADIUS status of **Completed**. A failing directory shows a status of **Disabled** or no RADIUS configuration.

        ### Audit via CLI

        1. List all active Managed Microsoft AD directories and their RADIUS status:

        ```bash
        aws ds describe-directories \
          --query "DirectoryDescriptions[?Type=='MicrosoftAD' && Stage=='Active'].{Id:DirectoryId,Name:Name,RadiusStatus:RadiusStatus}"
        ```

        A passing directory returns `"RadiusStatus": "Completed"`. A failing directory returns `"RadiusStatus": "Disabled"` or omits the `RadiusStatus` field entirely.
      remediation:
        - id: console
          desc: |
            To ensure Directory Service Managed AD has RADIUS MFA enabled using the AWS Console:

            1. Navigate to the **Directory Service Console**.
            2. Select the Managed Microsoft AD directory.
            3. Under the **Networking & security** tab, find **Multi-factor authentication**.
            4. Choose **Actions** > **Enable multi-factor authentication**.
            5. Configure the RADIUS server settings:
              - Enter the RADIUS server IP addresses.
              - Set the port (default 1812).
              - Enter the shared secret.
              - Select the protocol (MS-CHAPv2 recommended).
              - Set the timeout and retry values.
            6. Choose **Enable**.
        - id: cli
          desc: |
            To ensure Directory Service Managed AD has RADIUS MFA enabled using the AWS CLI, enable RADIUS MFA for a directory:

            ```bash
            aws ds enable-radius --directory-id <directory-id> \
              --radius-settings '{
                "RadiusServers": ["10.0.0.1"],
                "RadiusPort": 1812,
                "RadiusTimeout": 10,
                "RadiusRetries": 3,
                "SharedSecret": "<shared-secret>",
                "AuthenticationProtocol": "MS-CHAPv2",
                "DisplayLabel": "MFA",
                "UseSameUsername": true
              }'
            ```

            Verify RADIUS status:

            ```bash
            aws ds describe-directories --directory-ids <directory-id> \
              --query "DirectoryDescriptions[*].{Id:DirectoryId,RadiusStatus:RadiusStatus}"
            ```
        - id: terraform
          desc: |
            To ensure Directory Service Managed AD has RADIUS MFA enabled in Terraform, configure RADIUS MFA settings for a directory:

            ```hcl
            resource "aws_directory_service_radius_settings" "example" {
              directory_id            = aws_directory_service_directory.example.id
              authentication_protocol = "MS-CHAPv2"
              display_label           = "MFA"
              radius_port             = 1812
              radius_retries          = 3
              radius_servers          = ["10.0.0.1"]
              radius_timeout          = 10
              shared_secret           = var.radius_secret
              use_same_username       = true
            }
            ```
        - id: cloudformation
          desc: |
            To ensure Directory Service Managed AD has RADIUS MFA enabled in CloudFormation, note that CloudFormation does not natively support configuring RADIUS MFA for Directory Service. Use the AWS CLI or Console to enable RADIUS MFA after directory creation, or use a CloudFormation custom resource.
    refs:
      - url: https://docs.aws.amazon.com/directoryservice/latest/admin-guide/ms_ad_mfa.html
        title: Enable multi-factor authentication for AWS Managed Microsoft AD
  - uid: mondoo-aws-security-directoryservice-radius-mfa-enabled-aws
    filters: asset.platform == "aws"
    mql: |
      aws.directoryservice.directories.where(stage == "Active" && type == "MicrosoftAD").all(
        radiusStatus == "Completed"
      )
  - uid: mondoo-aws-security-documentdb-cluster-encrypted
    title: Ensure DocumentDB clusters are encrypted at rest
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-aws-security-documentdb-cluster-encrypted-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-documentdb-cluster-encrypted-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-documentdb-cluster-encrypted-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-documentdb-cluster-encrypted-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-documentdb-cluster-encrypted-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon DocumentDB clusters are configured with encryption at rest using AWS Key Management Service (KMS). Encryption at rest protects document database data from unauthorized access by automatically encrypting data before it is written to the underlying storage infrastructure.

        **Why this matters**

        - DocumentDB clusters created without encryption cannot be modified to enable encryption later; a new encrypted cluster must be created and the data migrated.
        - Without encryption at rest, sensitive document data stored in DocumentDB is vulnerable to unauthorized access if the underlying storage media is compromised.
        - Encryption at rest is a requirement for compliance with security frameworks including PCI DSS, HIPAA, and SOC 2.
        - Encrypted DocumentDB clusters also encrypt automated backups, snapshots, and replicas, providing comprehensive data protection across the entire data lifecycle.

        **Risk mitigation**

        - **Data protection:** Ensures all document data, backups, and snapshots are encrypted using AWS KMS, preventing unauthorized access to stored data.
        - **Compliance:** Meets regulatory requirements for encryption of data at rest in managed database services.
        - **Key management:** Leverages AWS KMS for centralized key management, access control policies, and automatic key rotation.
      audit: |
        ### Audit via Console

        1. Navigate to the **Amazon DocumentDB Console** at Services > DocumentDB.
        2. Select **Clusters** in the left navigation panel.
        3. Select the cluster to inspect.
        4. Choose the **Configuration** tab.
        5. Locate the **Encryption** field.

        A passing cluster shows **Encryption: Enabled**. A failing cluster shows **Encryption: Disabled**.

        ### Audit via CLI

        1. List all DocumentDB clusters and their encryption status:

        ```bash
        aws docdb describe-db-clusters \
          --query "DBClusters[*].{ClusterId:DBClusterIdentifier,Encrypted:StorageEncrypted,KmsKeyId:KmsKeyId}"
        ```

        A passing cluster returns `"Encrypted": true`. A failing cluster returns `"Encrypted": false`.
      remediation:
        - id: console
          desc: |
            To ensure DocumentDB clusters are encrypted at rest using the AWS Console:

            1. Navigate to the Amazon DocumentDB Console.
            2. Select **Clusters** in the left panel.
            3. Select the DocumentDB cluster to review.
            4. Under the **Configuration** tab, check if **Encryption** is enabled.
            5. If encryption is not enabled, you must create a new encrypted cluster:
              - Select **Create cluster**.
              - Under **Encryption-at-rest**, enable encryption.
              - Choose a KMS key (AWS managed or customer-managed).
              - Complete the cluster creation process.
            6. Migrate data from the unencrypted cluster to the new encrypted cluster.
            7. Update applications to point to the new encrypted cluster endpoint.
            8. Delete the unencrypted cluster after verifying the migration.
        - id: cli
          desc: |
            To ensure DocumentDB clusters are encrypted at rest using the AWS CLI, check if a DocumentDB cluster is encrypted:

            ```bash
            aws docdb describe-db-clusters --db-cluster-identifier <cluster-id> \
              --query "DBClusters[*].{ClusterId:DBClusterIdentifier,Encrypted:StorageEncrypted,KmsKeyId:KmsKeyId}"
            ```

            Create a new encrypted DocumentDB cluster:

            ```bash
            aws docdb create-db-cluster \
              --db-cluster-identifier secure-docdb-cluster \
              --engine docdb \
              --master-username admin \
              --master-user-password <password> \
              --storage-encrypted \
              --kms-key-id arn:aws:kms:region:account-id:key/key-id
            ```
        - id: terraform
          desc: |
            To ensure DocumentDB clusters are encrypted at rest in Terraform, enable encryption at rest on a DocumentDB cluster:

            ```hcl
            resource "aws_docdb_cluster" "example" {
              cluster_identifier = "secure-docdb-cluster"
              engine             = "docdb"
              master_username    = "admin"
              master_password    = var.db_password
              storage_encrypted  = true
              kms_key_id         = aws_kms_key.example.arn
            }
            ```
        - id: cloudformation
          desc: |
            To ensure DocumentDB clusters are encrypted at rest in CloudFormation, enable `StorageEncrypted` on the cluster:

            ```yaml
            Resources:
              DocDBCluster:
                Type: AWS::DocDB::DBCluster
                Properties:
                  DBClusterIdentifier: secure-docdb-cluster
                  MasterUsername: admin
                  MasterUserPassword: !Ref DBPassword
                  StorageEncrypted: true
                  KmsKeyId: !Ref KMSKey
            ```
    refs:
      - url: https://docs.aws.amazon.com/documentdb/latest/developerguide/encryption-at-rest.html
        title: Amazon DocumentDB Encryption at Rest
  - uid: mondoo-aws-security-documentdb-cluster-encrypted-aws
    filters: asset.platform == "aws-documentdb-cluster"
    mql: aws.documentdb.cluster.storageEncrypted == true
  - uid: mondoo-aws-security-documentdb-cluster-encrypted-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_docdb_cluster")
    mql: |
