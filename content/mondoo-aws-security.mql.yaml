  - uid: mondoo-aws-security-s3-bucket-policy-no-public-principal-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::S3::BucketPolicy")
    mql: |
      cloudformation.template.resources.where(type == "AWS::S3::BucketPolicy").all(
        properties['PolicyDocument'] == null ||
        properties['PolicyDocument']['Statement'] == null ||
        properties['PolicyDocument']['Statement'].where(_['Effect'] == "Allow").none(
          _['Principal'] == "*" ||
          _['Principal']['AWS'] == "*" ||
          _['Principal']['AWS'] != null && _['Principal']['AWS'].contains("*")
        )
      )
  - uid: mondoo-aws-security-s3-bucket-policy-secure-transport
    title: Ensure S3 bucket policies enforce secure transport
    impact: 80
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    variants:
      - uid: mondoo-aws-security-s3-bucket-policy-secure-transport-aws
        tags:
          mondoo.com/filter-title: AWS S3 Bucket
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-s3-bucket-policy-secure-transport-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-s3-bucket-policy-secure-transport-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-s3-bucket-policy-secure-transport-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-s3-bucket-policy-secure-transport-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that an S3 bucket policy explicitly denies any request that does not use secure transport (`aws:SecureTransport: "false"`). Without an explicit deny, S3 happily accepts plain-HTTP requests, exposing object data and authorization headers in transit.

        **Why this matters**

        S3 endpoints accept HTTP and HTTPS by default. A `Deny` statement keyed on `aws:SecureTransport` is the only mechanism that prevents accidental plain-HTTP access by clients with bad TLS configuration.
      remediation:
        - id: console
          desc: |
            1. Open the S3 console and select the bucket.
            2. Choose **Permissions** → **Bucket policy**.
            3. Add the following statement (merging into any existing policy):

               ```json
               {
                 "Sid": "DenyInsecureTransport",
                 "Effect": "Deny",
                 "Principal": "*",
                 "Action": "s3:*",
                 "Resource": [
                   "arn:aws:s3:::<bucket>",
                   "arn:aws:s3:::<bucket>/*"
                 ],
                 "Condition": {"Bool": {"aws:SecureTransport": "false"}}
               }
               ```
        - id: cli
          desc: |
            Apply the secure-transport policy:

            ```bash
            aws s3api put-bucket-policy --bucket <bucket> --policy file://secure-transport.json
            ```
        - id: terraform
          desc: |
            Build the deny-on-insecure-transport statement with `aws_iam_policy_document` and attach it via `aws_s3_bucket_policy`:

            ```hcl
            data "aws_iam_policy_document" "secure_transport" {
              statement {
                sid     = "DenyInsecureTransport"
                effect  = "Deny"
                actions = ["s3:*"]
                resources = [
                  aws_s3_bucket.example.arn,
                  "${aws_s3_bucket.example.arn}/*",
                ]

                principals {
                  type        = "*"
                  identifiers = ["*"]
                }

                condition {
                  test     = "Bool"
                  variable = "aws:SecureTransport"
                  values   = ["false"]
                }
              }
            }

            resource "aws_s3_bucket_policy" "secure_transport" {
              bucket = aws_s3_bucket.example.id
              policy = data.aws_iam_policy_document.secure_transport.json
            }
            ```
        - id: cloudformation
          desc: |
            Add a `Deny` statement keyed on `aws:SecureTransport: "false"` to every `AWS::S3::BucketPolicy` so plaintext requests are rejected at the bucket layer:

            ```yaml
            Resources:
              BucketPolicy:
                Type: AWS::S3::BucketPolicy
                Properties:
                  Bucket: !Ref Bucket
                  PolicyDocument:
                    Version: "2012-10-17"
                    Statement:
                      - Sid: DenyInsecureTransport
                        Effect: Deny
                        Principal: "*"
                        Action: s3:*
                        Resource:
                          - !GetAtt Bucket.Arn
                          - !Sub "${Bucket.Arn}/*"
                        Condition:
                          Bool:
                            aws:SecureTransport: "false"
            ```
    refs:
      - url: https://docs.aws.amazon.com/config/latest/developerguide/s3-bucket-ssl-requests-only.html
        title: AWS Config Rule - s3-bucket-ssl-requests-only
  - uid: mondoo-aws-security-s3-bucket-policy-secure-transport-aws
    filters: asset.platform == "aws-s3-bucket"
    mql: |
      aws.s3.bucket.policy != null &&
      aws.s3.bucket.policy.statements.any(
        _['Effect'] == "Deny" &&
        _['Condition'] != null &&
        _['Condition']['Bool'] != null &&
        _['Condition']['Bool']['aws:SecureTransport'] == "false" ||
        _['Effect'] == "Deny" &&
        _['Condition'] != null &&
        _['Condition']['Bool'] != null &&
        _['Condition']['Bool']['aws:SecureTransport'] == false
      )
