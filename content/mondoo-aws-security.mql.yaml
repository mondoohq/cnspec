  - uid: mondoo-aws-security-emr-encryption-in-transit
    title: Ensure EMR clusters have in-transit encryption enabled
    impact: 70
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    variants:
      - uid: mondoo-aws-security-emr-encryption-in-transit-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-emr-encryption-in-transit-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-emr-encryption-in-transit-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-emr-encryption-in-transit-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-emr-encryption-in-transit-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon EMR clusters have in-transit encryption enabled through a security configuration. In-transit encryption protects data moving between nodes in the cluster and between the cluster and S3, preventing interception of data on the network.

        **Why this matters**

        - EMR clusters exchange data between master, core, and task nodes over the network. Without in-transit encryption, this inter-node communication occurs in plaintext and is vulnerable to eavesdropping.
        - In-transit encryption in EMR uses TLS to encrypt data flowing between cluster nodes, and between the cluster and Amazon S3 via EMRFS.
        - Frameworks running on EMR (Spark, Hive, Presto) transmit query data and intermediate results between nodes, which may contain sensitive information.

        **Risk mitigation**

        - **Network protection:** TLS encryption prevents interception of data flowing between cluster nodes and between the cluster and S3.
        - **Defense in depth:** Complements at-rest encryption to protect data throughout its lifecycle.
        - **Compliance:** Satisfies in-transit encryption requirements under PCI DSS, HIPAA, NIST SP 800-53 SC-8, and SOC 2.
      remediation:
        - id: console
          desc: |
            To ensure EMR clusters have in-transit encryption enabled using the AWS Console, note: Encryption settings cannot be changed on a running cluster. You must create a new security configuration and launch a new cluster.

            1. Navigate to the **Amazon EMR Console** and choose **Security configurations**.
            2. Choose **Create security configuration**.
            3. Under **Encryption**, enable **In-transit encryption**.
            4. Provide a PEM certificate or configure automatic certificate generation.
            5. Save the security configuration and use it when launching new clusters.
        - id: cli
          desc: |
            To ensure EMR clusters have in-transit encryption enabled using the AWS CLI, create a security configuration with in-transit encryption:

            ```bash
            aws emr create-security-configuration \
              --name "emr-intransit-encryption-config" \
              --security-configuration '{
                "EncryptionConfiguration": {
                  "EnableInTransitEncryption": true,
                  "InTransitEncryptionConfiguration": {
                    "TLSCertificateConfiguration": {
                      "CertificateProviderType": "PEM",
                      "S3Object": "s3://<bucket>/certs/my-certs.zip"
                    }
                  },
                  "EnableAtRestEncryption": false
                }
              }'
            ```

            Verify a cluster's security configuration:

            ```bash
            aws emr describe-cluster --cluster-id <cluster-id> \
              --query "Cluster.SecurityConfiguration"
            ```
        - id: terraform
          desc: |
            To ensure EMR clusters have in-transit encryption enabled in Terraform:

            ```hcl
            resource "aws_emr_security_configuration" "example" {
              name = "emr-intransit-encryption-config"

              configuration = jsonencode({
                EncryptionConfiguration = {
                  EnableInTransitEncryption = true
                  InTransitEncryptionConfiguration = {
                    TLSCertificateConfiguration = {
                      CertificateProviderType = "PEM"
                      S3Object                = "s3://my-bucket/certs/my-certs.zip"
                    }
                  }
                  EnableAtRestEncryption = false
                }
              })
            }
            ```
        - id: cloudformation
          desc: |
            To ensure EMR clusters have in-transit encryption enabled in CloudFormation:

            ```yaml
            Resources:
              EMRSecurityConfiguration:
                Type: AWS::EMR::SecurityConfiguration
                Properties:
                  Name: emr-intransit-encryption-config
                  SecurityConfiguration:
                    EncryptionConfiguration:
                      EnableInTransitEncryption: true
                      InTransitEncryptionConfiguration:
                        TLSCertificateConfiguration:
                          CertificateProviderType: PEM
                          S3Object: s3://my-bucket/certs/my-certs.zip
                      EnableAtRestEncryption: false
            ```
    refs:
      - url: https://docs.aws.amazon.com/emr/latest/ManagementGuide/emr-data-encryption-options.html
        title: Amazon EMR - Encryption Options
      - url: https://docs.aws.amazon.com/securityhub/latest/userguide/emr-controls.html
        title: AWS Security Hub - EMR controls reference
