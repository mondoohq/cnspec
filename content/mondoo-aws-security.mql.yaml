  - uid: mondoo-aws-security-acm-certificate-key-algorithm
    title: Ensure ACM certificates use RSA-2048 or higher or ECDSA key algorithms
    impact: 70
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    variants:
      - uid: mondoo-aws-security-acm-certificate-key-algorithm-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-acm-certificate-key-algorithm-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-acm-certificate-key-algorithm-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-acm-certificate-key-algorithm-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-acm-certificate-key-algorithm-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that AWS Certificate Manager (ACM) certificates use strong key algorithms. Certificates should use RSA-2048 or higher, or ECDSA key algorithms to provide adequate cryptographic strength.

        **Why this matters**

        - **Cryptographic strength**: RSA keys below 2048 bits are considered weak and may be vulnerable to cryptographic attacks.
        - **Modern standards**: ECDSA keys (P-256, P-384, P-521) offer equivalent security to much larger RSA keys with better performance.
        - **Compliance alignment**: PCI DSS, NIST, and other frameworks require minimum key sizes for TLS certificates.
        - **Future-proofing**: Stronger key algorithms provide better protection against advances in computing power.
      remediation:
        - id: console
          desc: |
            To ensure ACM certificates use RSA-2048 or higher or ECDSA key algorithms using the AWS Console:

            1. Navigate to **AWS Certificate Manager**.
            2. Request a new certificate with **RSA 2048** or higher, or an **ECDSA P256/P384** key algorithm.
            3. Replace any certificates using weaker key algorithms.
        - id: cli
          desc: |
            To ensure ACM certificates use RSA-2048 or higher or ECDSA key algorithms using the AWS CLI:

            ```bash
            aws acm request-certificate --domain-name example.com --key-algorithm RSA_2048
            ```
        - id: terraform
          desc: |
            To ensure ACM certificates use RSA-2048 or higher or ECDSA key algorithms in Terraform:

            ```hcl
            resource "aws_acm_certificate" "example" {
              domain_name       = "example.com"
              validation_method = "DNS"
              key_algorithm     = "RSA_2048"

              lifecycle {
                create_before_destroy = true
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure ACM certificates use RSA-2048 or higher or ECDSA key algorithms in CloudFormation:

            ```yaml
            Resources:
              MyCertificate:
                Type: AWS::CertificateManager::Certificate
                Properties:
                  DomainName: example.com
                  ValidationMethod: DNS
                  KeyAlgorithm: RSA_2048
            ```
    refs:
      - url: https://docs.aws.amazon.com/acm/latest/userguide/acm-certificate.html
        title: AWS Certificate Manager certificates
  - uid: mondoo-aws-security-acm-certificate-key-algorithm-aws
    filters: asset.platform == "aws"
    mql: |
      aws.acm.certificates.all(
        keyAlgorithm == "RSA_2048" || keyAlgorithm == "RSA_3072" || keyAlgorithm == "RSA_4096" ||
        keyAlgorithm == "EC_prime256v1" || keyAlgorithm == "EC_secp384r1" || keyAlgorithm == "EC_secp521r1"
      )
  - uid: mondoo-aws-security-acm-certificate-key-algorithm-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_acm_certificate")
    mql: |
      terraform.resources.where(nameLabel == "aws_acm_certificate").all(
      arguments.key_algorithm != "RSA_1024"
      )
  - uid: mondoo-aws-security-acm-certificate-key-algorithm-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_acm_certificate")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_acm_certificate").all(
      change.after.key_algorithm != "RSA_1024"
      )
  - uid: mondoo-aws-security-acm-certificate-key-algorithm-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_acm_certificate")
    mql: |
      terraform.state.resources.where(type == "aws_acm_certificate").all(
      values.key_algorithm != "RSA_1024"
      )
  - uid: mondoo-aws-security-acm-certificate-key-algorithm-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::CertificateManager::Certificate")
    mql: |
      cloudformation.template.resources.where(type == "AWS::CertificateManager::Certificate").all(
      properties['KeyAlgorithm'] != "RSA_1024"
      )
  - uid: mondoo-aws-security-lambda-env-encryption
    title: Ensure Lambda functions use KMS encryption for environment variables
    impact: 80
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-aws-security-lambda-env-encryption-aws
        tags:
          mondoo.com/filter-title: AWS Lambda Function
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-lambda-env-encryption-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-lambda-env-encryption-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-lambda-env-encryption-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-lambda-env-encryption-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that AWS Lambda functions with environment variables are configured with a KMS customer managed key (CMK) to encrypt those variables at rest. By default, Lambda encrypts environment variables with an AWS-managed key, but using a CMK provides centralized key management, audit logging, and fine-grained access control.

        **Why this matters**

        Lambda environment variables frequently contain sensitive data such as API keys, database credentials, and service tokens. Without a customer managed KMS key:

        - Environment variables are encrypted with an AWS-managed key that cannot be audited or rotated by the customer.
        - Any principal with `lambda:GetFunctionConfiguration` permission can view decrypted environment variable values.
        - There is no centralized key management or access control for encryption keys.
        - Compliance frameworks such as PCI DSS, HIPAA, and CIS AWS Foundations Benchmark recommend customer managed encryption keys for sensitive data.

        **Risk mitigation**

        - Prevents unauthorized access to sensitive environment variable values.
        - Enables audit logging of encryption key usage through AWS CloudTrail.
        - Provides fine-grained access control over who can decrypt environment variables.
      remediation:
        - id: console
          desc: |
            To ensure Lambda functions use KMS encryption for environment variables using the AWS Console:

            1. Navigate to the AWS Lambda Console.
            2. Select Functions in the left panel.
            3. Select the Lambda function to update.
            4. Go to the Configuration tab and select Environment variables.
            5. Under Encryption configuration, select "Use a customer master key".
            6. Choose an existing KMS key or create a new one.
            7. Select Save to apply the changes.
        - id: cli
          desc: |
            To ensure Lambda functions use KMS encryption for environment variables using the AWS CLI, update a Lambda function to use a KMS key for environment variable encryption:

            ```bash
            aws lambda update-function-configuration \
              --function-name <function-name> \
              --kms-key-arn arn:aws:kms:<region>:<account-id>:key/<key-id>
            ```
        - id: terraform
          desc: |
            To ensure Lambda functions use KMS encryption for environment variables in Terraform:

            ```hcl
            resource "aws_lambda_function" "example" {
              function_name = "example"
              kms_key_arn   = aws_kms_key.lambda_env.arn

              environment {
                variables = {
                  DB_HOST = "example.com"
                }
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure Lambda functions use KMS encryption for environment variables in CloudFormation:

            ```yaml
            Resources:
              LambdaFunction:
                Type: AWS::Lambda::Function
                Properties:
                  FunctionName: example
                  KmsKeyArn: !GetAtt LambdaKMSKey.Arn
                  Environment:
                    Variables:
                      DB_HOST: example.com
            ```
    refs:
      - url: https://docs.aws.amazon.com/lambda/latest/dg/configuration-envvars.html
        title: AWS Documentation - Using Lambda environment variables
      - url: https://docs.aws.amazon.com/lambda/latest/dg/security-dataprotection.html
        title: AWS Documentation - Data protection in AWS Lambda
