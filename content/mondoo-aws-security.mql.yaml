  - uid: mondoo-aws-security-sfn-encryption-configured
    title: Ensure Step Functions state machines use CMK encryption
    impact: 70
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/soc2-2017: soc2-control-cc6-1-11
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-aws-security-sfn-encryption-configured-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-sfn-encryption-configured-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-sfn-encryption-configured-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-sfn-encryption-configured-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-sfn-encryption-configured-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that AWS Step Functions state machines are encrypted using a customer-managed KMS key rather than the default AWS-owned key. Customer-managed keys provide greater control over key lifecycle, access policies, and audit capabilities.

        **Why this matters**

        - Step Functions state machines can process sensitive data in execution inputs, outputs, and state transition payloads.
        - The default AWS-owned key does not allow fine-grained access control through key policies or CloudTrail logging of key usage.
        - Customer-managed keys enable key rotation, cross-account sharing controls, and the ability to revoke access by disabling the key.

        **Risk mitigation**

        - **Key control:** Full control over key lifecycle including rotation and deletion.
        - **Audit trail:** All encryption operations are logged in CloudTrail when using a customer-managed key.
        - **Compliance:** Satisfies encryption key management requirements in PCI DSS, HIPAA, and SOC 2.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and open the **AWS Step Functions Console**.
        2. In the left navigation pane, choose **State machines**.
        3. Select each state machine and review its configuration details.
        4. Under the **Encryption** section, check the **Encryption key type** field.

        A passing state machine shows **Customer managed KMS key** as the encryption type. A failing state machine shows **AWS owned key** as the encryption type.

        ### Audit via CLI

        1. List all state machines:

        ```bash
        aws stepfunctions list-state-machines \
          --query "stateMachines[].stateMachineArn" \
          --output text
        ```

        2. For each state machine ARN, check the encryption configuration:

        ```bash
        aws stepfunctions describe-state-machine \
          --state-machine-arn <state-machine-arn> \
          --query "{Name:name,EncryptionType:encryptionConfiguration.type,KmsKeyId:encryptionConfiguration.kmsKeyId}"
        ```

        A passing state machine returns an `EncryptionType` of `CUSTOMER_MANAGED_KMS_KEY` with a populated `KmsKeyId`. A failing state machine returns an `EncryptionType` of `AWS_OWNED_KEY`.
      remediation:
        - id: console
          desc: |
            To ensure Step Functions state machines use CMK encryption using the AWS Console:

            1. Navigate to the **AWS Step Functions Console** and select **State machines**.
            2. Select the state machine you want to configure.
            3. Choose **Edit**.
            4. Under **Encryption**, select **Customer managed KMS key**.
            5. Choose or create a KMS key.
            6. Choose **Save**.
        - id: cli
          desc: |
            To ensure Step Functions state machines use CMK encryption using the AWS CLI:

            ```bash
            aws stepfunctions update-state-machine \
              --state-machine-arn <state-machine-arn> \
              --encryption-configuration '{"type":"CUSTOMER_MANAGED_KMS_KEY","kmsKeyId":"<kms-key-arn>","kmsDataKeyReusePeriodSeconds":300}'
            ```
        - id: terraform
          desc: |
            To ensure Step Functions state machines use CMK encryption in Terraform:

            ```hcl
            resource "aws_sfn_state_machine" "example" {
              name     = "example-state-machine"
              role_arn = aws_iam_role.sfn.arn

              definition = file("definition.json")

              encryption_configuration {
                type                             = "CUSTOMER_MANAGED_KMS_KEY"
                kms_key_id                       = aws_kms_key.sfn.arn
                kms_data_key_reuse_period_seconds = 300
              }
            }
            ```
        - id: cloudformation
          desc: |
            Set `EncryptionConfiguration.Type: CUSTOMER_MANAGED_KMS_KEY` on every `AWS::StepFunctions::StateMachine` so execution history and definitions are encrypted with a customer-managed CMK rather than the default AWS-owned key:

            ```yaml
            Resources:
              StateMachineKey:
                Type: AWS::KMS::Key
                Properties:
                  Description: CMK for Step Functions
                  EnableKeyRotation: true
              StateMachine:
                Type: AWS::StepFunctions::StateMachine
                Properties:
                  StateMachineName: example
                  RoleArn: !GetAtt StateMachineRole.Arn
                  DefinitionString: !Sub |
                    {"StartAt": "Done", "States": {"Done": {"Type": "Succeed"}}}
                  EncryptionConfiguration:
                    Type: CUSTOMER_MANAGED_KMS_KEY
                    KmsKeyId: !GetAtt StateMachineKey.Arn
                    KmsDataKeyReusePeriodSeconds: 300
            ```
    refs:
      - url: https://docs.aws.amazon.com/step-functions/latest/dg/encryption-at-rest.html
        title: AWS Documentation - Encryption at rest for Step Functions
