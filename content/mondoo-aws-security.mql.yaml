    docs:
      desc: |
        This check ensures that Amazon Route 53 endpoint health checks use HTTPS rather than HTTP. Health checks using HTTP send requests in plaintext, which can be intercepted and do not validate the identity of the endpoint being checked.

        **Why this matters**

        - HTTP health checks transmit data in plaintext, making them susceptible to interception and man-in-the-middle attacks.
        - HTTPS health checks verify the endpoint's TLS certificate, ensuring that the health check is actually reaching the intended endpoint and not an impersonator.
        - If health check traffic is intercepted, an attacker could manipulate responses to keep Route 53 routing traffic to a compromised endpoint.
        - This check only applies to endpoint-type health checks (HTTP, HTTPS, HTTP_STR_MATCH, HTTPS_STR_MATCH). Calculated and CloudWatch health checks are excluded.

        **Risk mitigation**

        - **Encryption in transit:** Ensures health check traffic is encrypted.
        - **Endpoint authentication:** Validates the TLS certificate of monitored endpoints.
        - **Tamper protection:** Prevents manipulation of health check responses.
      remediation:
        - id: console
          desc: |
            To ensure Route 53 endpoint health checks use HTTPS using the AWS Console:

            1. Navigate to the **Route 53 Console** and select **Health checks**.
            2. Select the HTTP health check and choose **Edit**.
            3. Change the **Protocol** from HTTP to HTTPS.
            4. Set the **Port** to 443 (or the appropriate HTTPS port).
            5. Enable **SNI** if checking a domain that uses name-based virtual hosting.
            6. Save the changes.
        - id: cli
          desc: |
            To ensure Route 53 endpoint health checks use HTTPS using the AWS CLI, update a health check to use HTTPS:

            ```bash
            aws route53 update-health-check \
              --health-check-id <health-check-id> \
              --port 443 \
              --resource-path /healthcheck \
              --enable-sni
            ```

            Note: You cannot change the health check type directly. To switch from HTTP to HTTPS, create a new HTTPS health check and update your DNS records to reference it.
        - id: terraform
          desc: |
            To ensure Route 53 endpoint health checks use HTTPS in Terraform, configure health checks to use HTTPS:

            ```hcl
            resource "aws_route53_health_check" "example" {
              fqdn              = "example.com"
              port              = 443
              type              = "HTTPS"
              resource_path     = "/health"
              failure_threshold = 3
              request_interval  = 30
            }
            ```
        - id: cloudformation
          desc: |
            To ensure Route 53 endpoint health checks use HTTPS in CloudFormation, set the health check type to HTTPS:

            ```yaml
            Resources:
              HealthCheck:
                Type: AWS::Route53::HealthCheck
                Properties:
                  HealthCheckConfig:
                    FullyQualifiedDomainName: example.com
                    Port: 443
                    Type: HTTPS
                    ResourcePath: /health
            ```
    refs:
      - url: https://docs.aws.amazon.com/Route53/latest/DeveloperGuide/health-checks-types.html
        title: Types of Amazon Route 53 health checks
  - uid: mondoo-aws-security-route53-health-check-https-aws
    filters: asset.platform == "aws"
    mql: |
      aws.route53.healthChecks.none(
        type == "HTTP" || type == "HTTP_STR_MATCH"
      )
  - uid: mondoo-aws-security-route53-health-check-https-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_route53_health_check")
    mql: |
      terraform.resources.where(nameLabel == "aws_route53_health_check").all(
      arguments.type != "HTTP" && arguments.type != "HTTP_STR_MATCH" && arguments.type != "TCP"
      )
  - uid: mondoo-aws-security-route53-health-check-https-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_route53_health_check")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_route53_health_check").all(
      change.after.type != "HTTP" && change.after.type != "HTTP_STR_MATCH" && change.after.type != "TCP"
      )
  - uid: mondoo-aws-security-route53-health-check-https-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_route53_health_check")
    mql: |
      terraform.state.resources.where(type == "aws_route53_health_check").all(
      values.type != "HTTP" && values.type != "HTTP_STR_MATCH" && values.type != "TCP"
      )
  - uid: mondoo-aws-security-route53-health-check-https-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::Route53::HealthCheck")
    mql: |
      cloudformation.template.resources.where(type == "AWS::Route53::HealthCheck").all(
      properties['HealthCheckConfig'] != empty && properties['HealthCheckConfig']['Type'] != "HTTP" && properties['HealthCheckConfig']['Type'] != "HTTP_STR_MATCH" && properties['HealthCheckConfig']['Type'] != "TCP"
      )
  - uid: mondoo-aws-security-appstream-fleet-no-default-internet-access
    title: Ensure AppStream 2.0 fleets do not have default internet access enabled
    impact: 70
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-4
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-6
    variants:
      - uid: mondoo-aws-security-appstream-fleet-no-default-internet-access-aws
        tags:
          mondoo.com/filter-title: "AWS Account"
          mondoo.com/filter-icon: "aws"
      - uid: mondoo-aws-security-appstream-fleet-no-default-internet-access-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-appstream-fleet-no-default-internet-access-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-appstream-fleet-no-default-internet-access-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-appstream-fleet-no-default-internet-access-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon AppStream 2.0 fleets do not have default internet access enabled. When enabled, streaming instances are assigned public IP addresses and can access the internet directly, bypassing network security controls such as firewalls, web proxies, and data loss prevention (DLP) systems.

        **Why this matters**

        - Default internet access gives AppStream streaming instances direct, unfiltered internet connectivity through a public IP address.
        - This bypasses security controls such as web proxies, firewalls, URL filtering, and DLP that would normally inspect and control outbound traffic.
        - Compromised or misused streaming sessions could exfiltrate sensitive data directly to the internet without detection.
        - AWS recommends using a VPC with a NAT gateway or VPC endpoints to control and monitor outbound internet traffic from AppStream fleets.

        **Risk mitigation**

        - **Network security:** Forces outbound traffic through controlled network paths with security inspection.
        - **Data protection:** Prevents direct data exfiltration from streaming sessions.
        - **Compliance:** Ensures network traffic is subject to organizational security policies.
      remediation:
        - id: console
          desc: |
            To ensure AppStream 2.0 fleets do not have default internet access enabled using the AWS Console:

            1. Navigate to the **AppStream 2.0 Console** and select **Fleets**.
            2. Select the fleet and choose **Edit**.
            3. Under **Network access**, uncheck **Default Internet Access**.
            4. Configure a VPC with a NAT gateway for controlled internet access.
            5. Save the changes and restart the fleet.
        - id: cli
          desc: |
            To ensure AppStream 2.0 fleets do not have default internet access enabled using the AWS CLI, update a fleet to disable default internet access:

            ```bash
            aws appstream update-fleet \
              --name <fleet-name> \
              --no-enable-default-internet-access
            ```

            Verify the setting:

            ```bash
            aws appstream describe-fleets --names <fleet-name> \
              --query "Fleets[*].{Name:Name,InternetAccess:EnableDefaultInternetAccess}"
            ```
        - id: terraform
          desc: |
            To ensure AppStream 2.0 fleets do not have default internet access enabled in Terraform, disable default internet access on AppStream fleets:

            ```hcl
            resource "aws_appstream_fleet" "example" {
              name          = "example-fleet"
              instance_type = "stream.standard.medium"
              image_name    = "AppStream-WinServer2019"

              enable_default_internet_access = false

              vpc_config {
                subnet_ids = [aws_subnet.example.id]
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure AppStream 2.0 fleets do not have default internet access enabled in CloudFormation, set `EnableDefaultInternetAccess` to `false`:

            ```yaml
            Resources:
              Fleet:
                Type: AWS::AppStream::Fleet
                Properties:
                  Name: example-fleet
                  InstanceType: stream.standard.medium
                  ImageName: AppStream-WinServer2019
                  EnableDefaultInternetAccess: false
                  VpcConfig:
                    SubnetIds:
                      - !Ref PrivateSubnet
            ```
    refs:
      - url: https://docs.aws.amazon.com/appstream2/latest/developerguide/internet-access.html
        title: Internet access for Amazon AppStream 2.0
  - uid: mondoo-aws-security-appstream-fleet-no-default-internet-access-aws
    filters: asset.platform == "aws"
    mql: |
      aws.appstream.fleets.all(enableDefaultInternetAccess == false)
  - uid: mondoo-aws-security-appstream-fleet-no-default-internet-access-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_appstream_fleet")
    mql: |
      terraform.resources.where(nameLabel == "aws_appstream_fleet").all(
      arguments.enable_default_internet_access != true
      )
  - uid: mondoo-aws-security-appstream-fleet-no-default-internet-access-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_appstream_fleet")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_appstream_fleet").all(
      change.after.enable_default_internet_access != true
      )
  - uid: mondoo-aws-security-appstream-fleet-no-default-internet-access-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_appstream_fleet")
    mql: |
      terraform.state.resources.where(type == "aws_appstream_fleet").all(
      values.enable_default_internet_access != true
      )
  - uid: mondoo-aws-security-appstream-fleet-no-default-internet-access-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::AppStream::Fleet")
    mql: |
      cloudformation.template.resources.where(type == "AWS::AppStream::Fleet").all(
      properties['EnableDefaultInternetAccess'] != true
      )
  - uid: mondoo-aws-security-appstream-fleet-max-session-duration
    title: Ensure AppStream 2.0 fleets enforce a maximum session duration
    impact: 50
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: false
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-12
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-10
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-8
      compliance/vda-isa-5: vda-isa-5-4-1-3
    variants:
      - uid: mondoo-aws-security-appstream-fleet-max-session-duration-aws
        tags:
          mondoo.com/filter-title: "AWS Account"
          mondoo.com/filter-icon: "aws"
      - uid: mondoo-aws-security-appstream-fleet-max-session-duration-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-appstream-fleet-max-session-duration-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-appstream-fleet-max-session-duration-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-appstream-fleet-max-session-duration-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon AppStream 2.0 fleets have a maximum user session duration of 10 hours (36000 seconds) or less. Excessively long or unlimited session durations increase the risk of unattended sessions being hijacked or misused.

        **Why this matters**

        - Long-running sessions that remain active for extended periods increase the window of opportunity for session hijacking or unauthorized access.
        - Unattended sessions may remain connected to sensitive applications and data indefinitely.
        - Session time limits enforce a regular re-authentication cycle, reducing the impact of stolen session credentials.
        - AWS allows a maximum of 5760 minutes (96 hours), but security best practices recommend limiting sessions to a reasonable work period.

        **Risk mitigation**

        - **Session security:** Limits the duration a compromised session can remain active.
        - **Re-authentication:** Forces periodic re-authentication to verify user identity.
        - **Resource management:** Prevents resource waste from abandoned sessions.
      remediation:
        - id: console
          desc: |
            To ensure AppStream 2.0 fleets enforce a maximum session duration using the AWS Console:

            1. Navigate to the **AppStream 2.0 Console** and select **Fleets**.
            2. Select the fleet and choose **Edit**.
            3. Set **Maximum session duration** to 600 minutes (10 hours) or less.
            4. Save the changes.
        - id: cli
          desc: |
            To ensure AppStream 2.0 fleets enforce a maximum session duration using the AWS CLI, update the maximum session duration:

            ```bash
            aws appstream update-fleet \
              --name <fleet-name> \
              --max-user-duration-in-seconds 36000
            ```
        - id: terraform
          desc: |
            To ensure AppStream 2.0 fleets enforce a maximum session duration in Terraform, set the maximum session duration:

            ```hcl
            resource "aws_appstream_fleet" "example" {
              name          = "example-fleet"
              instance_type = "stream.standard.medium"
              image_name    = "AppStream-WinServer2019"

              max_user_duration_in_seconds = 36000
            }
            ```
        - id: cloudformation
          desc: |
            To ensure AppStream 2.0 fleets enforce a maximum session duration in CloudFormation, set `MaxUserDurationInSeconds` to 36000 or less:

            ```yaml
            Resources:
              Fleet:
                Type: AWS::AppStream::Fleet
                Properties:
                  Name: example-fleet
                  InstanceType: stream.standard.medium
                  MaxUserDurationInSeconds: 36000
            ```
    refs:
      - url: https://docs.aws.amazon.com/appstream2/latest/developerguide/fleets-and-stacks.html
        title: Amazon AppStream 2.0 fleets and stacks
  - uid: mondoo-aws-security-appstream-fleet-max-session-duration-aws
    filters: asset.platform == "aws"
    mql: |
      aws.appstream.fleets.all(maxUserDurationInSeconds <= 36000)
  - uid: mondoo-aws-security-appstream-fleet-max-session-duration-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_appstream_fleet")
    mql: |
      terraform.resources.where(nameLabel == "aws_appstream_fleet").all(
      arguments.max_user_duration_in_seconds <= 36000
      )
  - uid: mondoo-aws-security-appstream-fleet-max-session-duration-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_appstream_fleet")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_appstream_fleet").all(
      change.after.max_user_duration_in_seconds <= 36000
      )
  - uid: mondoo-aws-security-appstream-fleet-max-session-duration-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_appstream_fleet")
    mql: |
      terraform.state.resources.where(type == "aws_appstream_fleet").all(
      values.max_user_duration_in_seconds <= 36000
      )
  - uid: mondoo-aws-security-appstream-fleet-max-session-duration-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::AppStream::Fleet")
    mql: |
      cloudformation.template.resources.where(type == "AWS::AppStream::Fleet").all(
      properties['MaxUserDurationInSeconds'] != empty && properties['MaxUserDurationInSeconds'] <= 36000
      )
  - uid: mondoo-aws-security-appstream-fleet-idle-disconnect
    title: Ensure AppStream 2.0 fleets have idle disconnect timeout configured
    impact: 50
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: false
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-12
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-10
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-8
      compliance/vda-isa-5: vda-isa-5-4-1-3
    variants:
      - uid: mondoo-aws-security-appstream-fleet-idle-disconnect-aws
        tags:
          mondoo.com/filter-title: "AWS Account"
          mondoo.com/filter-icon: "aws"
      - uid: mondoo-aws-security-appstream-fleet-idle-disconnect-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-appstream-fleet-idle-disconnect-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-appstream-fleet-idle-disconnect-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-appstream-fleet-idle-disconnect-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon AppStream 2.0 fleets have an idle disconnect timeout configured and set to 15 minutes (900 seconds) or less. Without an idle timeout, abandoned sessions remain active indefinitely, leaving applications and data accessible.

        **Why this matters**

        - Sessions without idle timeouts remain connected even when users walk away, leave for the day, or forget to log out.
        - An unattended session connected to sensitive applications is a significant security risk, as anyone with physical or remote access to the user's device could access the streaming session.
        - Idle disconnect timeouts ensure that inactive sessions are automatically terminated, reducing the window of exposure.
        - A value of 0 means no idle timeout is configured, which is the least secure option.

        **Risk mitigation**

        - **Unattended sessions:** Automatically disconnects idle sessions to prevent unauthorized access.
        - **Least privilege:** Reduces the time window during which an abandoned session could be exploited.
        - **Resource efficiency:** Frees up fleet capacity from idle sessions.
      remediation:
        - id: console
          desc: |
            To ensure AppStream 2.0 fleets have idle disconnect timeout configured using the AWS Console:

            1. Navigate to the **AppStream 2.0 Console** and select **Fleets**.
            2. Select the fleet and choose **Edit**.
            3. Set **Idle disconnect timeout** to 15 minutes or less.
            4. Save the changes.
        - id: cli
          desc: |
            To ensure AppStream 2.0 fleets have idle disconnect timeout configured using the AWS CLI, update the idle disconnect timeout:

            ```bash
            aws appstream update-fleet \
              --name <fleet-name> \
              --idle-disconnect-timeout-in-seconds 900
            ```
        - id: terraform
          desc: |
            To ensure AppStream 2.0 fleets have idle disconnect timeout configured in Terraform, configure idle disconnect and disconnect timeouts:

            ```hcl
            resource "aws_appstream_fleet" "example" {
              name          = "example-fleet"
              instance_type = "stream.standard.medium"
              image_name    = "AppStream-WinServer2019"

              idle_disconnect_timeout_in_seconds = 900
              disconnect_timeout_in_seconds      = 300
            }
            ```
        - id: cloudformation
          desc: |
            To ensure AppStream 2.0 fleets have idle disconnect timeout configured in CloudFormation, set `IdleDisconnectTimeoutInSeconds`:

            ```yaml
            Resources:
              Fleet:
                Type: AWS::AppStream::Fleet
                Properties:
                  Name: example-fleet
                  InstanceType: stream.standard.medium
                  IdleDisconnectTimeoutInSeconds: 900
                  DisconnectTimeoutInSeconds: 300
            ```
    refs:
      - url: https://docs.aws.amazon.com/appstream2/latest/developerguide/fleets-and-stacks.html
        title: Amazon AppStream 2.0 fleets and stacks
  - uid: mondoo-aws-security-appstream-fleet-idle-disconnect-aws
    filters: asset.platform == "aws"
    mql: |
      aws.appstream.fleets.all(
        idleDisconnectTimeoutInSeconds > 0 && idleDisconnectTimeoutInSeconds <= 900
      )
  - uid: mondoo-aws-security-appstream-fleet-idle-disconnect-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_appstream_fleet")
    mql: |
      terraform.resources.where(nameLabel == "aws_appstream_fleet").all(
      arguments.idle_disconnect_timeout_in_seconds > 0 && arguments.idle_disconnect_timeout_in_seconds <= 900
      )
  - uid: mondoo-aws-security-appstream-fleet-idle-disconnect-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_appstream_fleet")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_appstream_fleet").all(
      change.after.idle_disconnect_timeout_in_seconds > 0 && change.after.idle_disconnect_timeout_in_seconds <= 900
      )
  - uid: mondoo-aws-security-appstream-fleet-idle-disconnect-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_appstream_fleet")
    mql: |
      terraform.state.resources.where(type == "aws_appstream_fleet").all(
      values.idle_disconnect_timeout_in_seconds > 0 && values.idle_disconnect_timeout_in_seconds <= 900
      )
  - uid: mondoo-aws-security-appstream-fleet-idle-disconnect-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::AppStream::Fleet")
    mql: |
      cloudformation.template.resources.where(type == "AWS::AppStream::Fleet").all(
      properties['IdleDisconnectTimeoutInSeconds'] != empty && properties['IdleDisconnectTimeoutInSeconds'] > 0 && properties['IdleDisconnectTimeoutInSeconds'] <= 900
      )
