      compliance/vda-isa-5: vda-isa-5-5-1-2
    variants:
      - uid: mondoo-aws-security-sns-subscription-https-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-sns-subscription-https-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-sns-subscription-https-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-sns-subscription-https-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-sns-subscription-https-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon SNS topic subscriptions delivering to HTTP/HTTPS endpoints use the HTTPS protocol rather than plaintext HTTP. SNS notifications may contain sensitive data, and using HTTP transmits this data unencrypted across the network.

        **Why this matters**

        - SNS notifications delivered over HTTP are transmitted in plaintext, exposing message content to network interception.
        - Notification messages may contain sensitive data such as alerts, user information, or system events.
        - Man-in-the-middle attacks can intercept or modify HTTP-delivered messages without detection.
        - This check only applies to HTTP/HTTPS endpoint subscriptions. Other protocols (SQS, Lambda, email) use different transport mechanisms.

        **Risk mitigation**

        - **Data-in-transit encryption:** Ensures notification messages are encrypted during delivery using TLS.
        - **Message integrity:** HTTPS prevents message tampering during transmission.
        - **Compliance:** Meets encryption-in-transit requirements for notification delivery.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and navigate to **Amazon SNS**.
        2. In the left navigation pane, select **Subscriptions**.
        3. Review the **Protocol** column for each subscription.
        4. Filter or sort by protocol to identify any subscriptions using **http** (not https).

        A passing subscription shows **https** in the Protocol column. A failing subscription shows **http** in the Protocol column.

        ### Audit via CLI

        1. List all SNS topics, then for each topic list its subscriptions and check for HTTP-protocol entries:

        ```bash
        aws sns list-topics --query 'Topics[*].TopicArn' --output text | tr '\t' '\n' | while read arn; do
          aws sns list-subscriptions-by-topic \
            --topic-arn "$arn" \
            --query 'Subscriptions[?Protocol==`http`].[TopicArn,SubscriptionArn,Protocol,Endpoint]' \
            --output table
        done
        ```

        A passing topic returns no rows (no HTTP-protocol subscriptions). A failing topic returns one or more rows showing subscriptions with `Protocol` equal to `http`.
      remediation:
        - id: console
          desc: |
            To ensure SNS topic subscriptions use HTTPS protocol using the AWS Console:

            1. Navigate to the Amazon SNS Console.
            2. Select the topic containing the HTTP subscription.
            3. Select the HTTP subscription.
            4. Delete the HTTP subscription.
            5. Create a new subscription with the **HTTPS** protocol and the corresponding HTTPS endpoint URL.

            **Warning:** Switching an existing subscription from HTTP to HTTPS requires deleting the old subscription and creating a new one. This may cause temporary message delivery failures during the transition. Coordinate changes during a maintenance window and ensure your endpoint is ready to accept HTTPS connections before making the switch.
        - id: cli
          desc: |
            To ensure SNS topic subscriptions use HTTPS protocol using the AWS CLI, replace the HTTP subscription with an HTTPS subscription:

            ```bash
            # Unsubscribe the HTTP endpoint
            aws sns unsubscribe \
              --subscription-arn arn:aws:sns:region:account-id:topic-name:subscription-id

            # Subscribe with HTTPS
            aws sns subscribe \
              --topic-arn arn:aws:sns:region:account-id:topic-name \
              --protocol https \
              --endpoint https://example.com/webhook
            ```
        - id: terraform
          desc: |
            To ensure SNS topic subscriptions use HTTPS protocol in Terraform:

            ```hcl
            resource "aws_sns_topic_subscription" "example" {
              topic_arn = aws_sns_topic.example.arn
              protocol  = "https"
              endpoint  = "https://example.com/webhook"
            }
            ```
        - id: cloudformation
          desc: |
            To ensure SNS topic subscriptions use HTTPS protocol in CloudFormation:

            ```yaml
            Resources:
              MySNSSubscription:
                Type: AWS::SNS::Subscription
                Properties:
                  TopicArn: !Ref MySNSTopic
                  Protocol: https
                  Endpoint: https://example.com/webhook
            ```
    refs:
      - url: https://docs.aws.amazon.com/sns/latest/dg/sns-http-https-endpoint-as-subscriber.html
        title: AWS Documentation - Fanout to HTTP/S endpoints
      - url: https://docs.aws.amazon.com/sns/latest/dg/sns-security-best-practices.html
        title: AWS Documentation - Security best practices for Amazon SNS
  - uid: mondoo-aws-security-sns-subscription-https-aws
    filters: asset.platform == "aws"
    mql: |
      aws.sns.topics.all(
        subscriptions.where(protocol == "http").length == 0
      )
  - uid: mondoo-aws-security-sns-subscription-https-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_sns_topic_subscription")
    mql: |
      terraform.resources.where(nameLabel == "aws_sns_topic_subscription").all(
        arguments.protocol != "http"
      )
  - uid: mondoo-aws-security-sns-subscription-https-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_sns_topic_subscription")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_sns_topic_subscription").all(
        change.after.protocol != "http"
      )
  - uid: mondoo-aws-security-sns-subscription-https-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_sns_topic_subscription")
    mql: |
      terraform.state.resources.where(type == "aws_sns_topic_subscription").all(
        values.protocol != "http"
      )
  - uid: mondoo-aws-security-sns-subscription-https-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::SNS::Subscription")
    mql: |
      cloudformation.template.resources.where(type == "AWS::SNS::Subscription").all(
      properties['Protocol'] != "http"
      )
  - uid: mondoo-aws-security-sagemaker-model-network-isolation
    title: Ensure SageMaker models have network isolation enabled
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-1-5
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-aws-security-sagemaker-model-network-isolation-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-sagemaker-model-network-isolation-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-sagemaker-model-network-isolation-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-sagemaker-model-network-isolation-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-sagemaker-model-network-isolation-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon SageMaker models have network isolation enabled, which prevents model containers from making any outbound network connections including calls to other AWS services. Without network isolation, model inference containers have unrestricted outbound access that could be exploited to exfiltrate training data, model artifacts, or inference inputs.

        **Why this matters**

        - **Data exfiltration prevention:** A model container with outbound network access can send inference inputs, model weights, or processed data to external endpoints; network isolation removes this capability entirely.
        - **Command-and-control blocking:** Compromised or maliciously crafted model containers may attempt to beacon to attacker-controlled infrastructure; network isolation prevents this at the network level regardless of the container's behavior.
        - **Defense in depth:** Network isolation enforces a hard network boundary that operates independently of IAM policies, ensuring that even an overly permissive execution role cannot be abused for network-level data access.
        - **Regulatory alignment:** Data privacy frameworks increasingly require that ML inference environments be isolated from external networks when processing regulated or sensitive data.

        **Risk mitigation**

        - **Container compromise containment:** If a model container is exploited, network isolation prevents the attacker from using it as an outbound channel to exfiltrate data or reach external infrastructure.
        - **Blast radius reduction:** Isolating model containers from the network limits the potential impact of supply chain attacks embedded in model artifacts or inference code.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and navigate to **Amazon SageMaker**.
        2. In the left navigation pane, under **Inference**, select **Models**.
        3. Select each model to open its detail page.
        4. Under **Model settings**, check the **Network isolation** field.

        A passing model shows **Network isolation: Enabled**. A failing model shows **Network isolation: Disabled** or has no network isolation setting.

        ### Audit via CLI

        1. List all SageMaker models and check the `EnableNetworkIsolation` field for each:

        ```bash
        aws sagemaker list-models --query 'Models[*].ModelName' --output text | tr '\t' '\n' | while read model; do
          aws sagemaker describe-model \
            --model-name "$model" \
            --query '{ModelName:ModelName,EnableNetworkIsolation:EnableNetworkIsolation}' \
            --output table
        done
        ```

        A passing model returns `EnableNetworkIsolation: true`. A failing model returns `EnableNetworkIsolation: false` or omits the field entirely.
      remediation:
        - id: console
          desc: |
            To ensure SageMaker models have network isolation enabled using the AWS Console:

            1. Navigate to the Amazon SageMaker Console.
            2. Select **Models** in the left panel under **Inference**.
            3. Review each model's configuration.
            4. When creating new models, enable the **Network isolation** option.
            5. Note: Existing models cannot be modified. Create a new model with network isolation enabled and update your endpoints to use the new model.
        - id: cli
          desc: |
            To ensure SageMaker models have network isolation enabled using the AWS CLI, create a new SageMaker model with network isolation enabled:

            ```bash
            aws sagemaker create-model \
              --model-name "isolated-model" \
              --primary-container Image=<image-uri>,ModelDataUrl=<s3-path> \
              --execution-role-arn "arn:aws:iam::<account-id>:role/SageMakerRole" \
              --enable-network-isolation
            ```
        - id: terraform
          desc: |
            To ensure SageMaker models have network isolation enabled in Terraform, ensure SageMaker models have network isolation enabled:

            ```hcl
            resource "aws_sagemaker_model" "example" {
              name               = "isolated-model"
              execution_role_arn = aws_iam_role.sagemaker.arn
              enable_network_isolation = true

              primary_container {
                image = "<image-uri>"
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure SageMaker models have network isolation enabled in CloudFormation:

            ```yaml
            Resources:
              MySageMakerModel:
                Type: AWS::SageMaker::Model
                Properties:
                  ModelName: isolated-model
                  ExecutionRoleArn: !GetAtt SageMakerRole.Arn
                  EnableNetworkIsolation: true
                  PrimaryContainer:
                    Image: <image-uri>
            ```
    refs:
      - url: https://docs.aws.amazon.com/sagemaker/latest/dg/mkt-algo-model-internet-free.html
        title: Amazon SageMaker - Network Isolation
  - uid: mondoo-aws-security-sagemaker-model-network-isolation-aws
    filters: asset.platform == "aws"
    mql: aws.sagemaker.models.all(enableNetworkIsolation == true)
  - uid: mondoo-aws-security-sagemaker-model-network-isolation-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_sagemaker_model")
    mql: |
      terraform.resources.where(nameLabel == "aws_sagemaker_model").all(
      arguments.enable_network_isolation == true
      )
  - uid: mondoo-aws-security-sagemaker-model-network-isolation-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_sagemaker_model")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_sagemaker_model").all(
      change.after.enable_network_isolation == true
      )
  - uid: mondoo-aws-security-sagemaker-model-network-isolation-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_sagemaker_model")
    mql: |
      terraform.state.resources.where(type == "aws_sagemaker_model").all(
      values.enable_network_isolation == true
      )
  - uid: mondoo-aws-security-sagemaker-model-network-isolation-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::SageMaker::Model")
    mql: |
      cloudformation.template.resources.where(type == "AWS::SageMaker::Model").all(
      properties['EnableNetworkIsolation'] == true
      )
  - uid: mondoo-aws-security-sagemaker-model-vpc-configured
    title: Ensure SageMaker models are deployed within a VPC
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-5
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-1-5
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-aws-security-sagemaker-model-vpc-configured-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-sagemaker-model-vpc-configured-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-sagemaker-model-vpc-configured-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-sagemaker-model-vpc-configured-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-sagemaker-model-vpc-configured-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon SageMaker models are deployed within a VPC. By default, SageMaker model containers communicate over the public internet unless a VPC is explicitly configured, which removes network-level control over who can reach the endpoint.

        **Why this matters**

        - **Network isolation:** Deploying inside a VPC lets security groups and network ACLs restrict which resources can reach the model container.
        - **Private connectivity:** Traffic between the model container and AWS services such as S3 or ECR stays on the AWS private network rather than traversing the internet.
        - **Blast radius containment:** If a container is compromised, VPC boundaries limit how far an attacker can move laterally.
        - **Compliance alignment:** Many frameworks require that production workloads handling sensitive data operate within controlled network segments.

        **Risk mitigation**

        - **Controlled ingress and egress:** Security groups attached to the VPC enforce fine-grained rules on which traffic reaches the container.
        - **Reduced public exposure:** Removing the public-internet path eliminates a whole class of network-based attack vectors against inference endpoints.
        - **Auditability:** VPC flow logs provide visibility into all network traffic to and from model containers.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and navigate to **Amazon SageMaker**.
        2. In the left navigation pane, under **Inference**, select **Models**.
        3. Select each model to open its detail page.
        4. Under **Model settings**, check the **VPC** section for configured subnets and security groups.

        A passing model shows a VPC ID, subnet IDs, and security group IDs under the VPC section. A failing model shows no VPC configuration.

        ### Audit via CLI

        1. List all SageMaker models and check the `VpcConfig` field for each:

        ```bash
        aws sagemaker list-models --query 'Models[*].ModelName' --output text | tr '\t' '\n' | while read model; do
          aws sagemaker describe-model \
            --model-name "$model" \
            --query '{ModelName:ModelName,VpcConfig:VpcConfig}' \
            --output table
        done
        ```

        A passing model returns a `VpcConfig` object containing `Subnets` and `SecurityGroupIds`. A failing model returns `null` or an empty object for `VpcConfig`.
      remediation:
        - id: console
          desc: |
            To ensure SageMaker models are deployed within a VPC using the AWS Console:

            1. Navigate to the Amazon SageMaker Console.
            2. Select **Models** in the left panel under **Inference**.
            3. When creating a new model, expand the **VPC** section.
            4. Select a VPC, subnets, and security groups.
            5. Note: Existing models cannot be modified. Create a new model with VPC configuration and update your endpoints.
        - id: cli
          desc: |
            To ensure SageMaker models are deployed within a VPC using the AWS CLI, create a SageMaker model with VPC configuration:

            ```bash
            aws sagemaker create-model \
              --model-name "vpc-model" \
              --primary-container Image=<image-uri>,ModelDataUrl=<s3-path> \
              --execution-role-arn "arn:aws:iam::<account-id>:role/SageMakerRole" \
              --vpc-config SecurityGroupIds=sg-12345678,Subnets=subnet-12345678,subnet-87654321
            ```
        - id: terraform
          desc: |
            To ensure SageMaker models are deployed within a VPC in Terraform, ensure SageMaker models are deployed within a VPC:

            ```hcl
            resource "aws_sagemaker_model" "example" {
              name               = "vpc-model"
              execution_role_arn = aws_iam_role.sagemaker.arn

              primary_container {
                image = "<image-uri>"
              }

              vpc_config {
                security_group_ids = [aws_security_group.sagemaker.id]
                subnets            = [aws_subnet.private_a.id, aws_subnet.private_b.id]
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure SageMaker models are deployed within a VPC in CloudFormation:

            ```yaml
            Resources:
              MySageMakerModel:
                Type: AWS::SageMaker::Model
                Properties:
                  ModelName: vpc-model
                  ExecutionRoleArn: !GetAtt SageMakerRole.Arn
                  PrimaryContainer:
                    Image: <image-uri>
                  VpcConfig:
                    SecurityGroupIds:
                      - !Ref SageMakerSecurityGroup
                    Subnets:
                      - !Ref PrivateSubnetA
                      - !Ref PrivateSubnetB
            ```
    refs:
      - url: https://docs.aws.amazon.com/sagemaker/latest/dg/host-vpc.html
        title: Amazon SageMaker - Give SageMaker Hosted Endpoints Access to Resources in Your VPC
  - uid: mondoo-aws-security-sagemaker-model-vpc-configured-aws
    filters: asset.platform == "aws"
    mql: aws.sagemaker.models.all(vpc != empty)
  - uid: mondoo-aws-security-sagemaker-model-vpc-configured-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_sagemaker_model")
    mql: |
      terraform.resources.where(nameLabel == "aws_sagemaker_model").all(
      blocks.where(type == "vpc_config") != empty &&
      blocks.where(type == "vpc_config").all(arguments.subnets != empty)
      )
  - uid: mondoo-aws-security-sagemaker-model-vpc-configured-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_sagemaker_model")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_sagemaker_model").all(
      change.after.vpc_config != empty
      )
  - uid: mondoo-aws-security-sagemaker-model-vpc-configured-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_sagemaker_model")
    mql: |
      terraform.state.resources.where(type == "aws_sagemaker_model").all(
      values.vpc_config != empty
      )
  - uid: mondoo-aws-security-sagemaker-model-vpc-configured-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::SageMaker::Model")
    mql: |
      cloudformation.template.resources.where(type == "AWS::SageMaker::Model").all(
      properties['VpcConfig'] != empty && properties['VpcConfig']['Subnets'] != empty
      )
  # No Terraform variants: SageMaker training jobs are imperative API calls (`CreateTrainingJob`); there is no `aws_sagemaker_training_job` Terraform resource that carries `enable_network_isolation`.
  - uid: mondoo-aws-security-sagemaker-training-job-network-isolation
    title: Ensure SageMaker training jobs have network isolation enabled
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-1-5
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-aws-security-sagemaker-training-job-network-isolation-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
    docs:
      desc: |
        This check ensures that Amazon SageMaker training jobs have network isolation enabled. When enabled, training containers cannot make any outbound network calls, so sensitive training data and model artifacts have no path to external endpoints. By default, network isolation is off, meaning training containers can reach the internet unless this flag is explicitly set.

        **Why this matters**

        - **Data exfiltration prevention:** Network isolation eliminates the outbound path that malicious or compromised training code would use to send data to an attacker-controlled endpoint.
        - **Third-party algorithm safety:** Models and scripts from third-party sources may contain embedded callbacks; isolation prevents those callbacks from succeeding.
        - **Artifact protection:** Model weights, gradients, and hyperparameter data produced during training cannot leave the container.
        - **Defense in depth:** Isolation complements VPC security groups and IAM by adding a container-level network control.

        **Risk mitigation**

        - **Zero outbound path:** No network call leaves the training container regardless of what code runs inside it.
        - **Reduced lateral movement risk:** A compromised training environment cannot probe or pivot to other services in the VPC or on the internet.
        - **Supply-chain defense:** Even if a poisoned dependency tries to phone home, isolation silently blocks the attempt.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and navigate to **Amazon SageMaker**.
        2. In the left navigation pane, under **Training**, select **Training jobs**.
        3. Select each training job to open its detail page.
        4. Under **Network**, check the **Network isolation** field.

        A passing training job shows **Network isolation: Enabled**. A failing training job shows **Network isolation: Disabled**.

        ### Audit via CLI

        1. List all SageMaker training jobs and check the `EnableNetworkIsolation` field for each:

        ```bash
        aws sagemaker list-training-jobs \
          --query 'TrainingJobSummaries[*].TrainingJobName' \
          --output text | tr '\t' '\n' | while read job; do
          aws sagemaker describe-training-job \
            --training-job-name "$job" \
            --query '{TrainingJobName:TrainingJobName,EnableNetworkIsolation:EnableNetworkIsolation}' \
            --output table
        done
