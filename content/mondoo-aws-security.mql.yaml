      properties['RecordingGroup']['AllSupported'] == true && properties['RecordingGroup']['IncludeGlobalResourceTypes'] == true
      )
  - uid: mondoo-aws-security-secretsmanager-rotation-enabled
    title: Ensure Secrets Manager secrets have automatic rotation enabled
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-12
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-5-17
      compliance/nis-2: nis-2-21-2-g
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-5
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-10
      compliance/pci-dss-4: pcidss-requirement-8-3-9
      compliance/soc2-2017: soc2-control-cc6-1-9
      compliance/vda-isa-5: vda-isa-5-4-1-3
    variants:
      - uid: mondoo-aws-security-secretsmanager-rotation-enabled-aws
        tags:
          mondoo.com/filter-title: AWS Secretsmanager Secret
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-secretsmanager-rotation-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-secretsmanager-rotation-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-secretsmanager-rotation-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-secretsmanager-rotation-enabled-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that all AWS Secrets Manager secrets have automatic rotation enabled. Secrets that are not rotated regularly pose a significant security risk, as compromised credentials can be used indefinitely.

        **Why this matters**

        - Static secrets increase the blast radius of credential compromise.
        - Automatic rotation limits the validity period of any compromised credential.
        - Compliance frameworks including PCI DSS, SOC 2, and NIST 800-53 require regular credential rotation.
        - AWS Security Hub control SecretsManager.1 requires rotation to be enabled.

        **Risk mitigation**

        - **Credential hygiene:** Automatically replaces secrets on a defined schedule.
        - **Breach containment:** Limits the window of exposure for compromised credentials.
        - **Compliance:** Meets regulatory requirements for credential lifecycle management.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and navigate to the AWS Secrets Manager service.
        2. In the left navigation pane, select **Secrets**.
        3. Select a secret to inspect.
        4. Under **Rotation configuration**, verify that **Automatic rotation** is enabled and a rotation schedule is set.
        5. Repeat for each secret in the account.

        A passing secret shows **Automatic rotation** as **Enabled** with a rotation schedule. A failing secret shows **Automatic rotation** as **Disabled**.

        ### Audit via CLI

        1. List all secrets and check their rotation status:

        ```bash
        aws secretsmanager list-secrets \
          --query 'SecretList[*].{Name:Name,RotationEnabled:RotationEnabled}' \
          --output table
        ```

        A passing secret returns `RotationEnabled: true`. A failing secret returns `RotationEnabled: false` or a `null` value.

      remediation:
        - id: console
          desc: |
            To ensure Secrets Manager secrets have automatic rotation enabled using the AWS Console:

            1. Navigate to the AWS Secrets Manager Console.
            2. Select the secret.
            3. In the Rotation configuration section, choose Edit rotation.
            4. Enable Automatic rotation.
            5. Set the rotation schedule and select a Lambda rotation function.
            6. Choose Save.
        - id: cli
          desc: |
            To ensure Secrets Manager secrets have automatic rotation enabled using the AWS CLI:

            ```bash
            aws secretsmanager rotate-secret \
              --secret-id <secret-name-or-arn> \
              --rotation-lambda-arn <lambda-function-arn> \
              --rotation-rules AutomaticallyAfterDays=30
            ```
        - id: terraform
          desc: |
            To ensure Secrets Manager secrets have automatic rotation enabled in Terraform:

            ```hcl
            resource "aws_secretsmanager_secret_rotation" "example" {
              secret_id           = aws_secretsmanager_secret.example.id
              rotation_lambda_arn = aws_lambda_function.rotation.arn

              rotation_rules {
                automatically_after_days = 30
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure Secrets Manager secrets have automatic rotation enabled in CloudFormation:

            ```yaml
            Resources:
              SecretRotation:
                Type: AWS::SecretsManager::RotationSchedule
                Properties:
                  SecretId: !Ref MySecret
                  RotationLambdaARN: !GetAtt RotationFunction.Arn
                  RotationRules:
                    AutomaticallyAfterDays: 30
            ```
    refs:
      - url: https://docs.aws.amazon.com/secretsmanager/latest/userguide/rotating-secrets.html
        title: AWS Documentation - Rotate Secrets Manager secrets
  - uid: mondoo-aws-security-secretsmanager-rotation-enabled-aws
    filters: asset.platform == "aws-secretsmanager-secret"
    mql: aws.secretsmanager.secret.rotationEnabled == true
  - uid: mondoo-aws-security-secretsmanager-rotation-enabled-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_secretsmanager_secret_rotation")
    mql: terraform.resources.where(nameLabel == "aws_secretsmanager_secret_rotation").length > 0
  - uid: mondoo-aws-security-secretsmanager-rotation-enabled-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_secretsmanager_secret_rotation")
    mql: terraform.plan.resourceChanges.where(type == "aws_secretsmanager_secret_rotation").length > 0
  - uid: mondoo-aws-security-secretsmanager-rotation-enabled-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_secretsmanager_secret_rotation")
    mql: terraform.state.resources.where(type == "aws_secretsmanager_secret_rotation").length > 0
  - uid: mondoo-aws-security-secretsmanager-rotation-enabled-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::SecretsManager::RotationSchedule")
    mql: |
      cloudformation.template.resources.where(type == "AWS::SecretsManager::RotationSchedule").length > 0
  - uid: mondoo-aws-security-secretsmanager-cmk-encryption
    title: Ensure Secrets Manager secrets use customer-managed KMS keys
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-11
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-aws-security-secretsmanager-cmk-encryption-aws
        tags:
          mondoo.com/filter-title: AWS Secretsmanager Secret
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-secretsmanager-cmk-encryption-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-secretsmanager-cmk-encryption-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-secretsmanager-cmk-encryption-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-secretsmanager-cmk-encryption-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Secrets Manager secrets are encrypted using a customer-managed KMS key rather than the default AWS-managed key.

        **Why this matters**

        - The default AWS-managed key does not allow fine-grained access control through key policies.
        - Customer-managed keys enable audit logging of all encryption operations via CloudTrail.
        - You can revoke access to all secrets by disabling the CMK.
        - Compliance frameworks such as PCI DSS, HIPAA, and FedRAMP often require customer-managed encryption keys.

        **Risk mitigation**

        - **Key control:** Full control over key lifecycle including rotation and deletion.
        - **Access management:** Fine-grained access control through KMS key policies.
        - **Auditability:** All encryption operations are logged in CloudTrail.
        - **Crypto shredding:** Usage of a customer-managed key makes crypto shredding possible. Crypto shredding is a secure data destruction technique where the encryption key is deleted, making all data encrypted with that key permanently and irreversibly unrecoverable. This is required for compliance with data retention and deletion regulations.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and navigate to the AWS Secrets Manager service.
        2. In the left navigation pane, select **Secrets**.
        3. Select a secret to inspect.
        4. In the **Overview** section, locate the **Encryption key** field.
        5. Verify that it references a customer-managed KMS key (not the default `aws/secretsmanager` key).
        6. Repeat for each secret in the account.

        A passing secret shows a customer-managed KMS key ARN in the **Encryption key** field. A failing secret shows `aws/secretsmanager` or an empty value.

        ### Audit via CLI

        1. Retrieve the encryption key configured for each secret:

        ```bash
        aws secretsmanager list-secrets \
          --query 'SecretList[*].{Name:Name,KmsKeyId:KmsKeyId}' \
          --output table
        ```

        A passing secret returns a customer-managed key ARN (for example, `arn:aws:kms:...`) in the `KmsKeyId` field. A failing secret returns `null` or `aws/secretsmanager`.

      remediation:
        - id: console
          desc: |
            To ensure Secrets Manager secrets use customer-managed KMS keys using the AWS Console:

            1. Navigate to the AWS Secrets Manager Console.
            2. Select the secret.
            3. Choose Actions, then Edit encryption key.
            4. Select a customer-managed KMS key.
            5. Choose Save.
        - id: cli
          desc: |
            To ensure Secrets Manager secrets use customer-managed KMS keys using the AWS CLI:

            ```bash
            aws secretsmanager update-secret \
              --secret-id <secret-name-or-arn> \
              --kms-key-id <kms-key-id-or-arn>
            ```
        - id: terraform
          desc: |
            To ensure Secrets Manager secrets use customer-managed KMS keys in Terraform:

            ```hcl
            resource "aws_secretsmanager_secret" "example" {
              name       = "example-secret"
              kms_key_id = aws_kms_key.secrets.arn
            }
            ```
        - id: cloudformation
          desc: |
            To ensure Secrets Manager secrets use customer-managed KMS keys in CloudFormation:

            ```yaml
            Resources:
              Secret:
                Type: AWS::SecretsManager::Secret
                Properties:
                  Name: example-secret
                  KmsKeyId: !GetAtt SecretsKey.Arn
            ```
    refs:
      - url: https://docs.aws.amazon.com/secretsmanager/latest/userguide/security-encryption.html
        title: AWS Documentation - Secret encryption in Secrets Manager
  - uid: mondoo-aws-security-secretsmanager-cmk-encryption-aws
    filters: asset.platform == "aws-secretsmanager-secret"
    mql: aws.secretsmanager.secret.kmsKey != empty
  - uid: mondoo-aws-security-secretsmanager-cmk-encryption-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_secretsmanager_secret")
    mql: |
      terraform.resources.where(nameLabel == "aws_secretsmanager_secret").all(
