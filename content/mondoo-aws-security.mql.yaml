          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that WorkSpaces directories have automatic maintenance mode enabled in the default creation properties. When maintenance mode is enabled, WorkSpaces are automatically started during a daily maintenance window to install operating system and application updates.

        **Why this matters**

        - Without maintenance mode, WorkSpaces only receive updates when they are running. Always-on workspaces receive updates normally, but auto-stop workspaces may remain unpatched for extended periods.
        - Unpatched WorkSpaces are vulnerable to known security exploits that have publicly available patches.
        - Maintenance mode ensures that auto-stop workspaces are temporarily started during the maintenance window to apply critical security updates from Windows Update or Amazon Linux repositories.
        - Consistent patch management across all workspaces is a fundamental requirement for security compliance frameworks.

        **Risk mitigation**

        - **Patch management:** Ensures all workspaces receive operating system and application security updates regularly.
        - **Vulnerability reduction:** Minimizes the window during which known vulnerabilities remain unpatched on workspace instances.
        - **Compliance:** Meets requirements for automated patch management in managed desktop environments.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and navigate to **Amazon WorkSpaces** > **Directories**.
        2. Select the directory name.
        3. Review the **Maintenance mode** section in the directory details.

        A passing directory shows **Maintenance mode** as **Enabled**. A failing directory shows **Maintenance mode** as **Disabled**.

        ### Audit via CLI

        1. Check maintenance mode for all WorkSpaces directories:

        ```bash
        aws workspaces describe-workspace-directories \
          --query "Directories[*].{Id:DirectoryId,Name:DirectoryName,Maintenance:WorkspaceCreationProperties.EnableMaintenanceMode}"
        ```

        A passing directory returns `"EnableMaintenanceMode": true`. A failing directory returns `"EnableMaintenanceMode": false` or omits the field.

      remediation:
        - id: console
          desc: |
            To ensure WorkSpaces directories have maintenance mode enabled using the AWS Console:

            1. Navigate to the **Amazon WorkSpaces Console** and select **Directories**.
            2. Select the directory to modify.
            3. Under **Maintenance mode**, choose **Edit**.
            4. Enable **Maintenance mode**.
            5. Choose **Save**.
        - id: cli
          desc: |
            To ensure WorkSpaces directories have maintenance mode enabled using the AWS CLI, enable maintenance mode for a WorkSpaces directory:

            ```bash
            aws workspaces modify-workspace-creation-properties \
              --resource-id <directory-id> \
              --workspace-creation-properties EnableMaintenanceMode=true
            ```

            Verify the setting:

            ```bash
            aws workspaces describe-workspace-directories --directory-ids <directory-id> \
              --query "Directories[*].{Id:DirectoryId,Maintenance:WorkspaceCreationProperties.EnableMaintenanceMode}"
            ```
        - id: terraform
          desc: |
            To ensure WorkSpaces directories have maintenance mode enabled in Terraform, enable maintenance mode in workspace creation properties:

            ```hcl
            resource "aws_workspaces_directory" "example" {
              directory_id = aws_directory_service_directory.example.id

              workspace_creation_properties {
                enable_maintenance_mode = true
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure WorkSpaces directories have maintenance mode enabled in CloudFormation, note that CloudFormation does not natively support configuring WorkSpaces directory creation properties. Use the AWS CLI or Terraform to manage maintenance mode settings.
    refs:
      - url: https://docs.aws.amazon.com/workspaces/latest/adminguide/workspace-maintenance.html
        title: WorkSpaces maintenance
  - uid: mondoo-aws-security-workspaces-directory-maintenance-mode-aws
    filters: asset.platform == "aws"
    mql: |
      aws.workspaces.directories.all(
        defaultCreationProperties['EnableMaintenanceMode'] == true
      )
  - uid: mondoo-aws-security-workspaces-directory-maintenance-mode-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_workspaces_directory")
    mql: |
      terraform.resources.where(nameLabel == "aws_workspaces_directory").all(
      blocks.where(type == "workspace_creation_properties") != empty &&
      blocks.where(type == "workspace_creation_properties").all(arguments.enable_maintenance_mode == true)
      )
  - uid: mondoo-aws-security-workspaces-directory-maintenance-mode-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_workspaces_directory")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_workspaces_directory").all(
      change.after.workspace_creation_properties != empty &&
      change.after.workspace_creation_properties.all(enable_maintenance_mode == true)
      )
  - uid: mondoo-aws-security-workspaces-directory-maintenance-mode-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_workspaces_directory")
    mql: |
      terraform.state.resources.where(type == "aws_workspaces_directory").all(
      values.workspace_creation_properties != empty &&
      values.workspace_creation_properties.all(enable_maintenance_mode == true)
      )
  # No Terraform variants: The runtime check walks WorkSpaces directories down to security-group ingress rules — a cross-resource correlation. In Terraform, security-group rules are evaluated independently by the `secgroup-restricted-*` checks; there is no useful WorkSpaces-scoped HCL/plan/state analog.
  - uid: mondoo-aws-security-workspaces-no-unrestricted-inbound
    title: Ensure WorkSpaces security groups do not allow unrestricted inbound access
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-7
    # NOTE (2026-03-29): Terraform variants not included because aws_security_group cannot be
    # correlated to WorkSpaces-associated security groups in MQL — the check would over-match
    # all security groups in the configuration, not just those attached to WorkSpaces.
    variants:
      - uid: mondoo-aws-security-workspaces-no-unrestricted-inbound-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
    docs:
      desc: |
        This check ensures that security groups associated with Amazon WorkSpaces do not contain inbound rules that permit traffic from all IPv4 (`0.0.0.0/0`) or all IPv6 (`::/0`) sources. WorkSpaces are full Windows or Linux desktop environments with access to corporate applications, documents, and internal networks, making unrestricted inbound access a direct exposure of the corporate desktop fleet to the internet.

        **Why this matters**

        - **Direct desktop exposure:** Unrestricted inbound rules allow any internet host to attempt connections to WorkSpaces desktops, enabling brute-force and credential-stuffing attacks against RDP, PCoIP, or WSP protocols.
        - **Lateral movement risk:** A compromised WorkSpace typically has access to internal resources and corporate identity systems; an attacker who gains access can pivot freely across the internal network.
        - **Data exfiltration surface:** WorkSpaces users often have access to sensitive documents and applications; an attacker on a compromised desktop can exfiltrate data that is not directly internet-accessible.
        - **Protocol vulnerability exposure:** Open inbound rules leave WorkSpaces exposed to zero-day vulnerabilities in the remote desktop protocols without any network-layer filtering to reduce the attacker pool.

        **Risk mitigation**

        - **Attack surface reduction:** Restricting inbound rules to known CIDR ranges such as corporate office IPs or VPN endpoints eliminates opportunistic internet-sourced attacks against the desktop fleet.
        - **Breach containment:** Network-level restrictions limit the source of connections to trusted ranges, making it significantly harder for external attackers to establish an initial foothold on a WorkSpace.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and navigate to **Amazon WorkSpaces** > **WorkSpaces**.
        2. Note the security groups associated with each WorkSpace by selecting a workspace and reviewing its network details.
        3. Navigate to **VPC** > **Security Groups**.
        4. For each security group used by WorkSpaces, select it and review the **Inbound rules** tab.
        5. Check for rules with source `0.0.0.0/0` or `::/0`.

        A passing security group has no inbound rules with a source of `0.0.0.0/0` or `::/0`. A failing security group has one or more inbound rules permitting traffic from any source.

        ### Audit via CLI

        1. Identify security groups associated with WorkSpaces instances, then inspect each for unrestricted inbound rules:

        ```bash
        aws ec2 describe-security-groups \
          --group-ids <workspace-security-group-ids> \
          --query "SecurityGroups[*].{Id:GroupId,Name:GroupName,Rules:IpPermissions[?contains(IpRanges[].CidrIp,'0.0.0.0/0') || contains(Ipv6Ranges[].CidrIpv6,'::/0')]}"
        ```

        A passing security group returns an empty `Rules` array. A failing security group returns one or more inbound rule objects in the `Rules` array.

      remediation:
        - id: console
          desc: |
            To ensure WorkSpaces security groups do not allow unrestricted inbound access using the AWS Console:

            1. Navigate to the **Amazon WorkSpaces Console** and identify the security groups associated with your WorkSpaces.
            2. Go to the **VPC Console** > **Security Groups**.
            3. Select each security group used by WorkSpaces.
            4. Review the **Inbound rules** tab for rules with source `0.0.0.0/0` or `::/0`.
            5. Replace unrestricted sources with specific CIDR ranges for your corporate network, VPN, or management IPs.
        - id: cli
          desc: |
            To ensure WorkSpaces security groups do not allow unrestricted inbound access using the AWS CLI, identify security groups with unrestricted inbound rules:

            ```bash
            aws ec2 describe-security-groups \
              --group-ids <workspace-security-group-ids> \
              --query "SecurityGroups[*].{Id:GroupId,Name:GroupName,Rules:IpPermissions[?contains(IpRanges[].CidrIp,'0.0.0.0/0') || contains(Ipv6Ranges[].CidrIpv6,'::/0')]}"
            ```

            Remove the unrestricted rule and add a restricted one:

            ```bash
            aws ec2 revoke-security-group-ingress \
              --group-id <sg-id> \
              --ip-permissions IpProtocol=tcp,FromPort=<port>,ToPort=<port>,IpRanges='[{CidrIp=0.0.0.0/0}]'

            aws ec2 authorize-security-group-ingress \
              --group-id <sg-id> \
              --ip-permissions IpProtocol=tcp,FromPort=<port>,ToPort=<port>,IpRanges='[{CidrIp=<corporate-cidr>}]'
            ```
        - id: terraform
          desc: |
            To ensure WorkSpaces security groups do not allow unrestricted inbound access in Terraform, restrict security group inbound rules to specific CIDRs:

            ```hcl
            resource "aws_security_group" "workspaces" {
              name   = "workspaces-sg"
              vpc_id = aws_vpc.example.id

              ingress {
                from_port   = 4172
                to_port     = 4172
                protocol    = "tcp"
                cidr_blocks = ["10.0.0.0/8"]
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure WorkSpaces security groups do not allow unrestricted inbound access in CloudFormation, restrict inbound rules to specific CIDR ranges:

            ```yaml
            Resources:
              WorkSpacesSG:
                Type: AWS::EC2::SecurityGroup
                Properties:
                  GroupDescription: WorkSpaces security group
                  VpcId: !Ref VPC
                  SecurityGroupIngress:
                    - IpProtocol: tcp
                      FromPort: 4172
                      ToPort: 4172
                      CidrIp: 10.0.0.0/8
            ```
    refs:
      - url: https://docs.aws.amazon.com/workspaces/latest/adminguide/amazon-workspaces-security-groups.html
        title: Security Groups for Amazon WorkSpaces
      - url: https://docs.aws.amazon.com/vpc/latest/userguide/security-group-rules.html
        title: Security group rules
  - uid: mondoo-aws-security-workspaces-no-unrestricted-inbound-aws
    filters: asset.platform == "aws"
    mql: |
      aws.workspaces.instances.all(
        securityGroups.all(
          ipPermissions.all(
            ipRanges.contains("0.0.0.0/0") == false && ipRanges.contains("::/0") == false
          )
        )
      )
  - uid: mondoo-aws-security-neptune-instance-public-access
    title: Ensure Neptune DB instances are not publicly accessible
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-aws-security-neptune-instance-public-access-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-neptune-instance-public-access-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-neptune-instance-public-access-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-neptune-instance-public-access-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-neptune-instance-public-access-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon Neptune DB instances are not publicly accessible. When a Neptune instance is marked as publicly accessible, it can potentially be reached from outside the VPC, exposing the graph database to unauthorized access from the internet.

        **Why this matters**

        - Neptune databases often contain highly connected, sensitive data such as identity graphs, fraud detection networks, and knowledge graphs.
        - Publicly accessible instances are reachable from the internet if security group rules allow it, increasing the attack surface.
        - Even with authentication enabled, exposing database endpoints to the internet increases the risk of brute-force attacks and exploitation of potential vulnerabilities.
        - Neptune should be accessed only from within the VPC or through private connectivity mechanisms such as VPC peering or AWS PrivateLink.

        **Risk mitigation**

        - **Network isolation:** Ensures Neptune instances are only reachable from within the VPC.
        - **Reduced attack surface:** Eliminates the possibility of internet-based attacks against the database.
        - **Defense in depth:** Complements security group rules and IAM authentication by removing public network exposure.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and navigate to **Amazon Neptune** > **Databases**.
        2. Select each Neptune DB instance.
        3. Under the **Connectivity & security** tab, review the **Publicly accessible** field.

        A passing instance shows **Publicly accessible** as **No**. A failing instance shows **Publicly accessible** as **Yes**.

        ### Audit via CLI

        1. List all Neptune DB instances and their public accessibility setting:

        ```bash
        aws neptune describe-db-instances \
          --query "DBInstances[*].{InstanceId:DBInstanceIdentifier,Public:PubliclyAccessible}"
        ```

        A passing instance returns `"PubliclyAccessible": false`. A failing instance returns `"PubliclyAccessible": true`.

      remediation:
        - id: console
          desc: |
            To ensure Neptune DB instances are not publicly accessible using the AWS Console:

            1. Navigate to the Amazon Neptune Console.
            2. Select Databases in the left panel.
            3. Select the Neptune DB instance.
            4. Select Modify.
            5. Under Connectivity, set Publicly accessible to No.
            6. Select Continue and apply the changes.
        - id: cli
          desc: |
            To ensure Neptune DB instances are not publicly accessible using the AWS CLI, disable public accessibility on a Neptune instance:

            ```bash
            aws neptune modify-db-instance \
              --db-instance-identifier <instance-id> \
              --no-publicly-accessible
            ```

            Verify the setting:

            ```bash
            aws neptune describe-db-instances --db-instance-identifier <instance-id> \
              --query "DBInstances[*].{InstanceId:DBInstanceIdentifier,Public:PubliclyAccessible}"
            ```
        - id: terraform
          desc: |
            To ensure Neptune DB instances are not publicly accessible in Terraform:

            ```hcl
            resource "aws_neptune_cluster_instance" "example" {
              cluster_identifier  = aws_neptune_cluster.example.id
              instance_class      = "db.r5.large"
              publicly_accessible = false
            }
            ```
        - id: cloudformation
          desc: |
            To ensure Neptune DB instances are not publicly accessible in CloudFormation:

            ```yaml
            Resources:
              NeptuneInstance:
                Type: "AWS::Neptune::DBInstance"
                Properties:
                  DBInstanceClass: "db.r5.large"
                  DBClusterIdentifier: !Ref NeptuneCluster
                  PubliclyAccessible: false
            ```
    refs:
      - url: https://docs.aws.amazon.com/neptune/latest/userguide/security-vpc.html
        title: AWS Documentation - Amazon Neptune and VPCs
      - url: https://docs.aws.amazon.com/neptune/latest/userguide/security.html
        title: AWS Documentation - Security in Amazon Neptune
  - uid: mondoo-aws-security-neptune-instance-public-access-aws
    filters: asset.platform == "aws"
    mql: aws.neptune.instances.all(publiclyAccessible == false)
  - uid: mondoo-aws-security-neptune-instance-public-access-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_neptune_cluster_instance")
    mql: |
      terraform.resources.where(nameLabel == "aws_neptune_cluster_instance").all(
        arguments.publicly_accessible != true
      )
  - uid: mondoo-aws-security-neptune-instance-public-access-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_neptune_cluster_instance")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_neptune_cluster_instance").all(
        change.after.publicly_accessible != true
      )
  - uid: mondoo-aws-security-neptune-instance-public-access-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_neptune_cluster_instance")
    mql: |
      terraform.state.resources.where(type == "aws_neptune_cluster_instance").all(
        values.publicly_accessible != true
      )
  - uid: mondoo-aws-security-neptune-instance-public-access-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::Neptune::DBInstance")
    mql: |
      cloudformation.template.resources.where(type == "AWS::Neptune::DBInstance").all(
      properties['PubliclyAccessible'] != true
      )
  - uid: mondoo-aws-security-opensearch-auto-software-update
    title: Ensure OpenSearch domains have automatic software updates enabled
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-tvm-03
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-8
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-12
      compliance/nist-csf-2: nist-csf-2-pr-ps-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-1
      compliance/pci-dss-4: pcidss-requirement-6-3-3
      compliance/soc2-2017: soc2-control-cc7-1-2
      compliance/vda-isa-5: vda-isa-5-5-2-5
    variants:
      - uid: mondoo-aws-security-opensearch-auto-software-update-aws
        tags:
          mondoo.com/filter-title: AWS OpenSearch Domain
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-opensearch-auto-software-update-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-opensearch-auto-software-update-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-opensearch-auto-software-update-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-opensearch-auto-software-update-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon OpenSearch Service domains have automatic software updates enabled. When enabled, OpenSearch automatically applies security patches and minor updates during the maintenance window without requiring manual intervention.

        **Why this matters**

        - Software updates frequently include patches for known security vulnerabilities. Without automatic updates, domains may run outdated software with known exploits.
        - Manual patching introduces delays between patch availability and application, increasing the window of exposure to known vulnerabilities.
        - Automatic updates reduce operational overhead and ensure consistent patch levels across all domains.
        - Unpatched OpenSearch domains are a common target for data exfiltration and ransomware attacks.

        **Risk mitigation**

        - **Timely patching:** Security patches are applied automatically during the maintenance window.
        - **Reduced operational risk:** Eliminates the need to manually track and apply updates.
        - **Consistent security posture:** Ensures all domains receive updates without relying on manual processes.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and navigate to **Amazon OpenSearch Service**.
        2. Select the domain name.
        3. Under the **General information** tab, locate **Auto software update** or open **Edit software update settings**.
        4. Check whether **Automatic software updates** is enabled.

        A passing domain shows **Automatic software updates** as **Enabled**. A failing domain shows the setting as **Disabled**.

        ### Audit via CLI

        1. List all OpenSearch domains:

        ```bash
        aws opensearch list-domain-names --query "DomainNames[*].DomainName"
        ```

        2. For each domain, check the auto software update setting:

        ```bash
        aws opensearch describe-domain --domain-name <domain-name> \
          --query "DomainStatus.SoftwareUpdateOptions.AutoSoftwareUpdateEnabled"
        ```

        A passing domain returns `true`. A failing domain returns `false` or omits the field.

      remediation:
        - id: console
          desc: |
            To ensure OpenSearch domains have automatic software updates enabled using the AWS Console:

            1. Navigate to the Amazon OpenSearch Service Console.
            2. Select the domain you want to update.
            3. Select Edit software update settings.
            4. Enable Automatic software updates.
            5. Select Save changes.
        - id: cli
          desc: |
            To ensure OpenSearch domains have automatic software updates enabled using the AWS CLI, enable automatic software updates:

            ```bash
            aws opensearch update-domain-config --domain-name <domain-name> \
              --software-update-options '{"AutoSoftwareUpdateEnabled": true}'
            ```

            Verify the setting:

            ```bash
            aws opensearch describe-domain --domain-name <domain-name> \
              --query "DomainStatus.SoftwareUpdateOptions.AutoSoftwareUpdateEnabled"
            ```
        - id: terraform
          desc: |
            To ensure OpenSearch domains have automatic software updates enabled in Terraform, enable automatic software updates on an OpenSearch domain:

            ```hcl
            resource "aws_opensearch_domain" "example" {
              domain_name    = "example-domain"
              engine_version = "OpenSearch_2.11"

              software_update_options {
                auto_software_update_enabled = true
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure OpenSearch domains have automatic software updates enabled in CloudFormation, enable automatic software updates on an OpenSearch domain:

            ```yaml
            Resources:
              OpenSearchDomain:
                Type: AWS::OpenSearchService::Domain
                Properties:
                  DomainName: example-domain
                  EngineVersion: OpenSearch_2.11
                  SoftwareUpdateOptions:
                    AutoSoftwareUpdateEnabled: true
            ```
    refs:
      - url: https://docs.aws.amazon.com/opensearch-service/latest/developerguide/service-software.html
        title: AWS Documentation - Service software updates in Amazon OpenSearch Service
  - uid: mondoo-aws-security-opensearch-auto-software-update-aws
    filters: asset.platform == "aws-opensearch-domain"
    mql: aws.opensearch.domain.autoSoftwareUpdateEnabled == true
  - uid: mondoo-aws-security-opensearch-auto-software-update-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_opensearch_domain")
    mql: |
      terraform.resources.where(nameLabel == "aws_opensearch_domain").all(
      blocks.where(type == "software_update_options") != empty &&
      blocks.where(type == "software_update_options").all(arguments.auto_software_update_enabled == true)
      )
  - uid: mondoo-aws-security-opensearch-auto-software-update-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_opensearch_domain")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_opensearch_domain").all(
      change.after.software_update_options != empty &&
      change.after.software_update_options.all(auto_software_update_enabled == true)
      )
