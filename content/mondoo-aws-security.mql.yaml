  - uid: mondoo-aws-security-cognito-user-pool-advanced-security-enforced
    title: Ensure Cognito user pools have advanced security features in enforced mode
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-16
      compliance/nis-2: nis-2-21-2-j
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-4
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-6
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-2
      compliance/vda-isa-5: vda-isa-5-5-2-4
    variants:
      - uid: mondoo-aws-security-cognito-user-pool-advanced-security-enforced-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-cognito-user-pool-advanced-security-enforced-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-cognito-user-pool-advanced-security-enforced-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-cognito-user-pool-advanced-security-enforced-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-cognito-user-pool-advanced-security-enforced-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon Cognito user pools have advanced security features set to "ENFORCED" mode. Advanced security provides adaptive authentication, compromised credentials detection, and automated risk-based responses to suspicious sign-in attempts.

        **Why this matters**

        - In "OFF" mode, Cognito performs no risk analysis on sign-in attempts, allowing credential stuffing and suspicious login patterns to go undetected.
        - In "AUDIT" mode, Cognito logs risk assessments to CloudWatch but does not block or challenge suspicious attempts, providing visibility without protection.
        - "ENFORCED" mode actively responds to detected threats by requiring additional verification, blocking high-risk attempts, or triggering adaptive authentication challenges.
        - Advanced security detects sign-ins from compromised credential databases and can automatically require password resets for affected users.

        **Risk mitigation**

        - **Threat detection:** Identifies and responds to credential stuffing, brute-force attacks, and anomalous sign-in patterns.
        - **Compromised credentials:** Automatically detects when user credentials appear in known breach databases.
        - **Adaptive authentication:** Dynamically adjusts authentication requirements based on assessed risk level.
      audit: |
        ### Audit via Console

        1. Navigate to the **Amazon Cognito Console** at Services > Cognito.
        2. Select **User pools** in the left navigation panel.
        3. Select the user pool to inspect.
        4. Choose the **Sign-in experience** tab.
        5. Under **Advanced security**, review the advanced security mode.

        A passing user pool shows **Advanced security mode: Full-function (Enforced)**. A failing user pool shows **Audit only** or **Off**.

        ### Audit via CLI

        1. List all Cognito user pools:

        ```bash
        aws cognito-idp list-user-pools \
          --max-results 60 \
          --query "UserPools[*].{Id:Id,Name:Name}"
        ```

        2. Check the advanced security configuration for each user pool:

        ```bash
        aws cognito-idp describe-user-pool \
          --user-pool-id <user-pool-id> \
          --query "UserPool.{Name:Name,AdvancedSecurity:UserPoolAddOns.AdvancedSecurityMode}"
        ```

        A passing user pool returns `"AdvancedSecurity": "ENFORCED"`. A failing user pool returns `"AdvancedSecurity": "AUDIT"`, `"AdvancedSecurity": "OFF"`, or an empty `UserPoolAddOns` block.
      remediation:
        - id: console
          desc: |
            To ensure Cognito user pools have advanced security features in enforced mode using the AWS Console:

            1. Navigate to the **Amazon Cognito Console** and select **User pools**.
            2. Select the user pool to modify.
            3. Go to the **Sign-in experience** tab.
            4. Under **Advanced security**, choose **Edit**.
            5. Set the mode to **Full-function (Enforced)**.
            6. Configure the automatic risk responses for compromised credentials and adaptive authentication.
            7. Choose **Save changes**.

            Note: Advanced security features incur additional costs per monthly active user.
        - id: cli
          desc: |
            To ensure Cognito user pools have advanced security features in enforced mode using the AWS CLI, enable advanced security in enforced mode:

            ```bash
            aws cognito-idp update-user-pool \
              --user-pool-id <user-pool-id> \
              --user-pool-add-ons AdvancedSecurityMode=ENFORCED
            ```

            Verify the setting:

            ```bash
            aws cognito-idp describe-user-pool --user-pool-id <user-pool-id> \
              --query "UserPool.{Name:Name,AdvancedSecurity:UserPoolAddOns.AdvancedSecurityMode}"
            ```
        - id: terraform
          desc: |
            To ensure Cognito user pools have advanced security features in enforced mode in Terraform, enable advanced security in enforced mode:

            ```hcl
            resource "aws_cognito_user_pool" "example" {
              name = "example-pool"

              user_pool_add_ons {
                advanced_security_mode = "ENFORCED"
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure Cognito user pools have advanced security features in enforced mode in CloudFormation, set `AdvancedSecurityMode` to `ENFORCED`:

            ```yaml
            Resources:
              UserPool:
                Type: AWS::Cognito::UserPool
                Properties:
                  UserPoolName: example-pool
                  UserPoolAddOns:
                    AdvancedSecurityMode: ENFORCED
            ```
    refs:
      - url: https://docs.aws.amazon.com/cognito/latest/developerguide/cognito-user-pool-settings-advanced-security.html
        title: Adding advanced security to a user pool
  - uid: mondoo-aws-security-cognito-user-pool-advanced-security-enforced-aws
    filters: asset.platform == "aws"
    mql: aws.cognito.userPools.all(advancedSecurityMode == "ENFORCED")
  - uid: mondoo-aws-security-cognito-user-pool-advanced-security-enforced-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_cognito_user_pool")
