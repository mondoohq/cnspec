  - uid: mondoo-aws-security-iam-root-access-key-check
    title: Ensure no root user account access key exists
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-10
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-2
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-5
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-5
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-9
      compliance/vda-isa-5: vda-isa-5-4-1-3
    variants:
      - uid: mondoo-aws-security-iam-root-access-key-check-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-iam-root-access-key-check-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-iam-root-access-key-check-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-iam-root-access-key-check-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that the AWS root user account has no active access keys. The root user possesses unrestricted privileges over the entire AWS account and its access keys provide programmatic access that bypasses IAM permission boundaries; AWS recommends that the root user never be used for routine operations and that no programmatic credentials exist for it.

        **Why this matters**

        - **Unrestricted blast radius:** Root access keys, if leaked, allow an attacker to perform any action in the account, including deleting resources, disabling security controls, and exfiltrating all data.
        - **No IAM boundary enforcement:** Service control policies and IAM permission boundaries do not restrict root; a compromised root key is fully outside the normal permission model.
        - **Phishing and leak exposure:** Long-lived programmatic credentials stored in code repositories, CI pipelines, or local configuration files are a common source of credential leakage.
        - **Auditability gap:** Actions taken with root credentials are harder to attribute and often treated differently by monitoring tools, making detection more difficult.

        **Risk mitigation**

        - **Credential elimination:** Removing root access keys removes the single most dangerous credential class in the account; actions previously requiring root should be delegated to IAM roles with least-privilege policies.
        - **Breach containment:** Without a root access key, an attacker who compromises application or operator credentials cannot escalate to full account control through programmatic means.
        - **Compliance posture:** Absence of root access keys is a first-pass control checked by virtually every cloud security benchmark and audit framework.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console as the root user or with an IAM identity that has `iam:GenerateCredentialReport` permission.
        2. Open the IAM console at https://console.aws.amazon.com/iam/.
        3. In the left navigation pane, choose **Credential report**.
        4. Choose **Download credential report** to download the CSV file.
        5. Open the CSV and find the row where the `user` column contains `<root_account>`.
        6. Examine the `access_key_1_active` and `access_key_2_active` columns.

        A passing account shows `FALSE` in both `access_key_1_active` and `access_key_2_active` for the root account row. A failing account shows `TRUE` in either column.

        ### Audit via CLI

        1. Generate a fresh credential report:

        ```bash
        aws iam generate-credential-report
        ```

        2. Retrieve and decode the report, then filter for the root account row:

        ```bash
        aws iam get-credential-report --query 'Content' --output text | base64 --decode | awk -F',' 'NR==1 || $1=="<root_account>"'
        ```

        A passing account shows `false` in both the `access_key_1_active` and `access_key_2_active` fields for the `<root_account>` row. A failing account shows `true` in either field.
      remediation:
        - id: console
          desc: |
            To ensure no root user account access key exists using the AWS Console:

            1.  Navigate to the AWS IAM Console.
            2.  Select Users → Root User.
            3.  Under Access Keys, verify that no access keys are listed.
            4.  If an access key exists, delete it immediately:
                - Select the Access Key ID.
                - Select Delete and confirm the action.
            5.  Ensure that MFA is enabled for the root user for additional security.
        - id: cli
          desc: |
            To ensure no root user account access key exists using the AWS CLI, check if the root user has an access key:

            ```bash
            aws iam get-account-summary --query "SummaryMap.RootAccessKeysPresent"
            ```

            If the output is greater than 0, a root access key exists.

            Delete the root access key (replace ACCESS_KEY_ID with the actual key ID):

            ```bash
            aws iam delete-access-key --access-key-id ACCESS_KEY_ID --user-name root
            ```
        - id: terraform
          desc: |
            To ensure no root user account access key exists in Terraform, AWS does not allow direct management of the root user's access key via Terraform. However, you should enforce IAM policies that prevent the creation of root access keys:

            ```hcl
            resource "aws_iam_policy" "deny_root_access_keys" {
              name        = "DenyRootAccessKeys"
              description = "Prevents creation of root user access keys"

              policy = jsonencode({
                Version = "2012-10-17"
                Statement = [
                  {
                    Effect   = "Deny"
                    Action   = "iam:CreateAccessKey"
                    Resource = "arn:aws:iam::123456789012:root"
                  }
                ]
              })
            }
            ```
        - id: cloudformation
          desc: |
            To ensure no root user account access key exists in CloudFormation, AWS does not allow direct management of the root user's access keys via CloudFormation. However, you can create a stack that implements preventative controls:

            ```yaml
            Resources:
              DenyRootAccessKeysPolicy:
                Type: AWS::IAM::ManagedPolicy
                Properties:
                  ManagedPolicyName: DenyRootAccessKeys
                  Description: Prevents creation of root user access keys
                  PolicyDocument:
                    Version: '2012-10-17'
                    Statement:
                      - Effect: Deny
                        Action: 'iam:CreateAccessKey'
                        Resource: 'arn:aws:iam::123456789012:root'

            ```
    refs:
      - url: https://docs.aws.amazon.com/IAM/latest/UserGuide/id_root-user.html
        title: AWS Documentation - AWS account root user
      - url: https://docs.aws.amazon.com/IAM/latest/UserGuide/id_root-user_manage_delete-key.html
        title: AWS Documentation - Delete access keys for the root user
  - uid: mondoo-aws-security-iam-root-access-key-check-aws
    filters: asset.platform == "aws"
    mql: |
      aws.iam.credentialReport.where(properties.user == "<root_account>").all(accessKey1Active == false)
      aws.iam.credentialReport.where(properties.user == "<root_account>").all(accessKey2Active == false)
  - uid: mondoo-aws-security-iam-root-access-key-check-terraform-hcl
    filters: asset.platform == "terraform-hcl"
    mql: |
      terraform.resources.where(nameLabel == "aws_iam_policy").any(arguments.policy.any(Statement {Effect == "Deny" && Action == "iam:CreateAccessKey"} ) )
  - uid: mondoo-aws-security-iam-root-access-key-check-terraform-plan
    filters: asset.platform == "terraform-plan"
    mql: |
      policyPlan = terraform.plan.resourceChanges.where(type == "aws_iam_policy").map(change.after.policy).first
      policyPlan.contains('Action') && policyPlan.contains('iam:CreateAccessKey')
      policyPlan.contains('Effect') && policyPlan.contains('Deny')
  - uid: mondoo-aws-security-iam-root-access-key-check-terraform-state
    filters: asset.platform == "terraform-state"
    mql: |
      policyState = terraform.state.resources.where(type == "aws_iam_policy").map(values.policy).first
      policyState.contains('Action') && policyState.contains('iam:CreateAccessKey')
      policyState.contains('Effect') && policyState.contains('Deny')
  - uid: mondoo-aws-security-root-account-mfa-enabled
    title: Ensure MFA is enabled for the "root user" account
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-14
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-j
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-3
      compliance/pci-dss-4: pcidss-requirement-8-4-1
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-2
    variants:
      - uid: mondoo-aws-security-root-account-mfa-enabled-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-root-account-mfa-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-root-account-mfa-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-root-account-mfa-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Multi-Factor Authentication is enabled for the AWS root user account. The root user has full administrative control over every resource and service in the AWS account; by default MFA is not configured and the account is protected only by a password, which can be phished or leaked.

        **Why this matters**

        - **Account takeover prevention:** A second authentication factor means that a stolen or guessed root password alone is not sufficient for an attacker to gain access.
        - **Privileged identity protection:** Root-level actions cannot be constrained by IAM policies or SCPs, so protecting the login credential is the primary defense against full account compromise.
        - **Credential leak resilience:** Password breaches from other services are frequently used in credential-stuffing attacks; MFA breaks the direct path from a leaked password to account access.

        **Risk mitigation**

        - **Unauthorized login blocking:** Even if the root password is exposed through a phishing campaign or data breach, the attacker cannot authenticate without the MFA device.
        - **Lateral escalation barrier:** Attackers who compromise lower-privilege IAM users cannot pivot to root-level access through password guessing alone when MFA is required.
        - **Incident response window:** MFA buys time to detect and respond to a credential compromise before an attacker can escalate to destructive root actions.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console.
        2. Open the IAM console at https://console.aws.amazon.com/iam/.
        3. In the left navigation pane, choose **Dashboard**.
        4. Review the **Security recommendations** or **Root user** section.
        5. Check whether **MFA** is listed as enabled for the root user.

        A passing account shows MFA as active on the root user. A failing account displays a warning that root MFA is not enabled.

        ### Audit via CLI

        1. Check whether MFA is enabled for the root account:

        ```bash
        aws iam get-account-summary --query "SummaryMap.AccountMFAEnabled"
        ```

        A passing account returns `1`. A failing account returns `0`.
      remediation:
        - id: console
          desc: |
            To ensure MFA is enabled for the "root user" account using the AWS Console:

            1.  Navigate to the AWS IAM Console.
            2.  Select Users → Root User.
            3.  Under Multi-Factor Authentication (MFA), check if an MFA device is assigned.
            4.  If no MFA is enabled, select Enable MFA and choose one of the following options:
              - Virtual MFA device: Use a mobile authenticator app such as Google Authenticator or Authy.
              - Hardware MFA device: Use a FIDO2 security key or an AWS-supported MFA token.
            5.  Follow the on-screen steps to scan the QR code (for virtual MFA) or register a hardware MFA device.
            6.  Enter the two consecutive MFA codes generated by the device and select Enable MFA.
        - id: cli
          desc: |
            To ensure MFA is enabled for the "root user" account using the AWS CLI, check if MFA is enabled for the root user:

            ```bash
            aws iam get-account-summary --query "SummaryMap.AccountMFAEnabled"
            ```

            If the output is 0, MFA is not enabled.

            To enable MFA, first list existing MFA devices:

            ```bash
            aws iam list-mfa-devices --user-name root
            ```

            If no device is listed, assign a new MFA device (replace arn-of-mfa-device with the correct ARN):

            ```bash
            aws iam enable-mfa-device --user-name root --serial-number arn-of-mfa-device --authentication-code1 123456 --authentication-code2 654321
            ```
        - id: terraform
          desc: |
            To ensure MFA is enabled for the "root user" account in Terraform, AWS does not allow managing root MFA directly through Terraform. However, you can enforce a security policy that blocks root logins unless MFA is enabled:

            ```hcl
            resource "aws_iam_policy" "require_root_mfa" {
              name        = "RequireRootMFA"
              description = "Blocks root logins without MFA"

              policy = jsonencode({
                Version = "2012-10-17"
                Statement = [
                  {
                    Effect   = "Deny"
                    Action   = "sts:AssumeRole"
                    Resource = "*"
                    Condition = {
                      BoolIfExists = {
                        "aws:MultiFactorAuthPresent": "false"
                      }
                    }
                  }
                ]
              })
            }
            ```
        - id: cloudformation
          desc: |
            To ensure MFA is enabled for the "root user" account in CloudFormation:

            ```yaml
            Resources:
              RequireRootMFAPolicy:
                Type: "AWS::IAM::ManagedPolicy"
                Properties:
                  Description: "Blocks root logins without MFA"
                  ManagedPolicyName: "RequireRootMFA"
                  PolicyDocument:
                    Version: "2012-10-17"
                    Statement:
                      - Effect: "Deny"
                        Action: "*"
                        Resource: "*"
                        Condition:
                          Bool:
                            "aws:MultiFactorAuthPresent": "false"
                        Principal:
                          AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            ```
    refs:
      - url: https://docs.aws.amazon.com/IAM/latest/UserGuide/enable-virt-mfa-for-root.html
        title: Enable a virtual MFA device for the root user (console)
  - uid: mondoo-aws-security-root-account-mfa-enabled-aws
    filters: asset.platform == "aws"
    mql: aws.iam.credentialReport.where(properties.user == "<root_account>").all(mfaActive == true)
  - uid: mondoo-aws-security-root-account-mfa-enabled-terraform-hcl
    filters: asset.platform == "terraform-hcl"
    mql: |
      terraform.resources.where(nameLabel == "aws_iam_policy") {
        arguments.policy {
          Statement {
            Effect == "Deny"
            Action == "sts:AssumeRole"
            Resource == "*"
            Condition {BoolIfExists {_["aws:MultiFactorAuthPresent"] == false}}
          }
        }
      }
  - uid: mondoo-aws-security-root-account-mfa-enabled-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains( type == "aws_iam_policy" )
    mql: |
      policyPlan = terraform.plan.resourceChanges.where(type == "aws_iam_policy").map(change.after.policy).first
      policyPlan.contains('Action') && policyPlan.contains('sts:AssumeRole')
      policyPlan.contains('Effect') && policyPlan.contains('Deny')
      policyPlan.contains('Resource') && policyPlan.contains('"*"')
      policyPlan.contains('aws:MultiFactorAuthPresent') && policyPlan.contains('false')
  - uid: mondoo-aws-security-root-account-mfa-enabled-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains( type == "aws_iam_policy" )
    mql: |
      policyState = terraform.state.resources.where(type == "aws_iam_policy").map(values.policy).first
      policyState.contains('Action') && policyState.contains('sts:AssumeRole')
      policyState.contains('Effect') && policyState.contains('Deny')
      policyState.contains('Resource') && policyState.contains('"*"')
      policyState.contains('aws:MultiFactorAuthPresent') && policyState.contains('false')
  - uid: mondoo-aws-security-iam-password-policy
    title: Ensure strong account password policy requirements are used
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-5-17
      compliance/nis-2: nis-2-21-2-g
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-5
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-7
      compliance/pci-dss-4: pcidss-requirement-8-3-6
      compliance/soc2-2017: soc2-control-cc6-1-8
      compliance/vda-isa-5: vda-isa-5-4-1-3
    props:
      - uid: mondooAWSSecurityIamPasswordPolicyMaxPasswordAge
        title: Define the maximum number of days a password is allowed to exist before being rotated
        mql: "90"
      - uid: mondooAWSSecurityIamPasswordPolicyMinimumPasswordLength
        title: Minimum password length
        mql: "14"
      - uid: mondooAWSSecurityIamPasswordPolicyPasswordReusePrevention
        title: Number of passwords before allowing reuse
        mql: "24"
      - uid: mondooAWSSecurityIamPasswordPolicyRequireLowercaseCharacters
        title: Denotes whether lowercase characters are required for passwords
        mql: "true"
      - uid: mondooAWSSecurityIamPasswordPolicyRequireNumbers
        title: Denotes whether numbers are required for passwords
        mql: "true"
      - uid: mondooAWSSecurityIamPasswordPolicyRequireSymbols
        title: Denotes whether symbols are required for passwords
        mql: "true"
      - uid: mondooAWSSecurityIamPasswordPolicyRequireUppercaseCharacters
        title: Denotes whether uppercase characters are required for passwords
        mql: "true"
    variants:
      - uid: mondoo-aws-security-iam-password-policy-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-iam-password-policy-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-iam-password-policy-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-iam-password-policy-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that the AWS IAM account password policy enforces strong complexity and rotation requirements for all IAM user passwords. By default, AWS accounts have no password policy set, which means any password length and complexity is accepted; without explicit requirements, users may choose short, simple passwords that are trivially guessable.

        **Why this matters**

        - **Brute-force resistance:** Minimum length and complexity requirements significantly expand the keyspace an attacker must search, making dictionary and brute-force attacks impractical.
        - **Credential-stuffing defense:** Password reuse prevention ensures that credentials leaked from other services cannot be directly replayed against AWS console logins.
        - **Credential aging:** Maximum password age limits the window during which a previously leaked password remains valid, capping the dwell time of compromised credentials.
        - **Compliance baseline:** Most security frameworks require documented password policies with minimum length, complexity, and rotation requirements.

        **Risk mitigation**

        - **Weak password elimination:** Policy enforcement prevents IAM users from setting trivially guessable passwords that would otherwise pass default AWS validation.
        - **Reuse prevention:** Prohibiting reuse of recent passwords prevents users from cycling through a small set of passwords to satisfy rotation without actually changing their credential.
        - **Reduced exposure window:** Regular expiration ensures that credentials compromised through phishing or shoulder-surfing are automatically invalidated within a bounded period.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and open the IAM console at https://console.aws.amazon.com/iam/.
        2. In the left navigation pane, choose **Account settings**.
        3. Review the **Password policy** section and verify the following settings are configured:
           - Minimum password length is at least 14 characters.
           - Require at least one uppercase letter is enabled.
           - Require at least one lowercase letter is enabled.
           - Require at least one number is enabled.
           - Require at least one non-alphanumeric character is enabled.
           - Enable password expiration is set to 90 days or fewer.
           - Prevent password reuse is set to 24 or more passwords.

        A passing account has all of the above requirements set to compliant values. A failing account has one or more settings missing, disabled, or set to a weaker value.

        ### Audit via CLI

        1. Retrieve the current account password policy:

        ```bash
        aws iam get-account-password-policy
        ```

        A passing account returns a policy object where `MinimumPasswordLength` >= 14, `RequireUppercaseCharacters`, `RequireLowercaseCharacters`, `RequireNumbers`, and `RequireSymbols` are all `true`, `MaxPasswordAge` is <= 90, and `PasswordReusePrevention` is >= 24. A failing account returns values outside these thresholds or returns a `NoSuchEntityException` indicating no password policy exists.
      remediation:
        - id: console
          desc: |
            To require uppercase characters in IAM passwords using the AWS Console:

            1.  Navigate to the AWS IAM Console.
            2.  Select Account settings in the left panel.
            3.  In the Password Policy section, ensure the following settings are enabled:
              - Require at least one uppercase letter
              - Require at least one lowercase letter
              - Require at least one number
              - Require at least one symbol
              - Require a minimum password length of 14 characters
              - Prevent password reuse for the last 24 passwords
              - Require password expiration every 90 days
            4.  Select Apply Password Policy to enforce these settings.
        - id: cli
          desc: |
            To require uppercase characters in IAM passwords using the AWS CLI, check the current password policy settings:

            ```bash
            aws iam get-account-password-policy
            ```

            If no password policy exists, apply a strong password policy:

            ```bash
            aws iam update-account-password-policy \
            --minimum-password-length 14 \
            --require-symbols true \
            --require-numbers true \
            --require-uppercase-characters true \
            --require-lowercase-characters true \
            --max-password-age 90 \
            --password-reuse-prevention 24 \
            --allow-users-to-change-password true
            ```
        - id: terraform
          desc: |
            To require uppercase characters in IAM passwords in Terraform, define a strict password policy using Terraform:

            ```hcl
            resource "aws_iam_account_password_policy" "strong_policy" {
              minimum_password_length        = 14
              require_uppercase_characters   = true
              require_lowercase_characters   = true
              require_numbers                = true
              require_symbols                = true
              max_password_age               = 90
              password_reuse_prevention      = 24
              allow_users_to_change_password = true
            }
            ```
        - id: cloudformation
          desc: |
            To require uppercase characters in IAM passwords in CloudFormation, note that CloudFormation does not support managing the IAM account password policy. There is no `AWS::IAM::AccountPasswordPolicy` resource type.

            Use the AWS CLI to configure the account password policy:

            ```bash
            aws iam update-account-password-policy \
              --minimum-password-length 14 \
              --require-uppercase-characters \
              --require-lowercase-characters \
              --require-numbers \
              --require-symbols \
              --max-password-age 90 \
              --password-reuse-prevention 24 \
              --allow-users-to-change-password
            ```
