    filters: asset.platform == "terraform-plan"
    mql: terraform.plan.resourceChanges.where(type == "aws_ssoadmin_permission_set_inline_policy") == empty
  - uid: mondoo-aws-security-identitycenter-no-inline-policy-terraform-state
    filters: asset.platform == "terraform-state"
    mql: terraform.state.resources.where(type == "aws_ssoadmin_permission_set_inline_policy") == empty
  - uid: mondoo-aws-security-identitycenter-group-assignments
    title: Ensure Identity Center uses group-based assignments
    impact: 60
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-5
      compliance/soc2-2017: soc2-control-cc6-3-3
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/vda-isa-5: vda-isa-5-4-2-1
    variants:
      - uid: mondoo-aws-security-identitycenter-group-assignments-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-identitycenter-group-assignments-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-identitycenter-group-assignments-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-identitycenter-group-assignments-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that AWS IAM Identity Center account assignments use groups rather than individual users. Direct user-level assignments are a stealthy persistence mechanism: an attacker with Identity Center administrative access can grant a compromised user direct account access that is invisible to group-based access reviews, surviving group membership cleanup during incident response.

        **Why this matters**

        - Direct user-level assignments bypass group-based access reviews, meaning an attacker-granted assignment will not be discovered when reviewing group memberships during incident response or routine audits.
        - An attacker can plant persistent access by assigning a compromised user directly to high-privilege permission sets across multiple AWS accounts, creating backdoor access that survives group-level remediation.
        - User-level assignments increase the risk of orphaned permissions when users change roles or leave, creating dormant access that can be exploited if the user's identity is later compromised.
        - Auditing individual user assignments requires inspecting each account separately, making it significantly harder to detect unauthorized cross-account access grants.

        **Risk mitigation**

        - **Persistence detection:** Group-based assignments ensure all access is visible in group membership reviews, eliminating user-level assignments as a hiding spot for attacker-planted access.
        - **Incident response completeness:** Removing a compromised user from all groups revokes all access when assignments are group-based, preventing persistence through direct assignments.
        - **Access review coverage:** Group-based access is discoverable by automated compliance tools, ensuring all assignments are included in access reviews and no stealthy user-level grants are missed.
      audit: |
        ### Audit via Console

        1. Navigate to the **AWS IAM Identity Center Console**.
        2. Select **AWS accounts** from the left navigation.
        3. For each account listed, choose the account name.
        4. Under **Assigned users and groups**, review the **Type** column for each assignment.

        A passing account shows only **Group** entries in the Type column. A failing account shows one or more **User** entries, indicating direct user-level assignments.

        ### Audit via CLI

        1. Retrieve the Identity Center instance ARN and list account assignments across all accounts:

        ```bash
        INSTANCE_ARN=$(aws sso-admin list-instances \
          --query 'Instances[0].InstanceArn' --output text)

        aws sso-admin list-account-assignments-for-principal \
          --instance-arn "$INSTANCE_ARN" \
          --principal-type USER \
          --query 'AccountAssignments[*].{AccountId:AccountId,PrincipalType:PrincipalType,PrincipalId:PrincipalId}'
        ```

        A passing environment returns an empty list (no USER-type assignments). A failing environment returns one or more account assignments with `"PrincipalType": "USER"`.

      remediation:
        - id: console
          desc: |
            To ensure Identity Center uses group-based assignments using the AWS Console:

            1. Navigate to the **AWS IAM Identity Center Console**.
            2. Select **AWS accounts**.
            3. Select the account and review its assignments.
            4. Remove any user-level assignments.
            5. Create groups in the Identity Center directory or your external identity provider.
            6. Assign groups to accounts with the appropriate permission sets.
        - id: cli
          desc: |
            To ensure Identity Center uses group-based assignments using the AWS CLI, create a group-based assignment:

            ```bash
            aws sso-admin create-account-assignment \
              --instance-arn <instance-arn> \
              --target-id <account-id> \
              --target-type AWS_ACCOUNT \
              --permission-set-arn <permission-set-arn> \
              --principal-type GROUP \
              --principal-id <group-id>
            ```

            Remove any user-level assignments:

            ```bash
            aws sso-admin delete-account-assignment \
              --instance-arn <instance-arn> \
              --target-id <account-id> \
              --target-type AWS_ACCOUNT \
              --permission-set-arn <permission-set-arn> \
              --principal-type USER \
              --principal-id <user-id>
            ```
        - id: terraform
          desc: |
            To ensure Identity Center uses group-based assignments in Terraform:

            ```hcl
            resource "aws_ssoadmin_account_assignment" "example" {
              instance_arn       = data.aws_ssoadmin_instances.example.arns[0]
              permission_set_arn = aws_ssoadmin_permission_set.example.arn

              principal_id   = aws_identitystore_group.example.group_id
              principal_type = "GROUP"

              target_id   = "123456789012"
              target_type = "AWS_ACCOUNT"
            }
            ```
    refs:
      - url: https://docs.aws.amazon.com/singlesignon/latest/userguide/useraccess.html
        title: AWS Documentation - Multi-account permissions
  - uid: mondoo-aws-security-identitycenter-group-assignments-aws
    filters: asset.platform == "aws"
    mql: |
      aws.identitycenter.instances.all(accountAssignments.all(principalType == "GROUP"))
  - uid: mondoo-aws-security-identitycenter-group-assignments-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_ssoadmin_account_assignment")
