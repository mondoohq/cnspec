  - uid: mondoo-aws-security-redshift-secrets-manager-cmk
    title: Ensure Redshift managed passwords use CMK encryption
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-11
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-aws-security-redshift-secrets-manager-cmk-aws
        tags:
          mondoo.com/filter-title: AWS Redshift Cluster
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-redshift-secrets-manager-cmk-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-redshift-secrets-manager-cmk-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-redshift-secrets-manager-cmk-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-redshift-secrets-manager-cmk-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that when Redshift clusters use AWS Secrets Manager to manage the master password, the associated KMS key is a customer-managed key (CMK). This check only applies when Secrets Manager manages the Redshift master password.

        **Why this matters**

        - **Key control:** CMKs allow you to define key policies that control who can use and manage the encryption key protecting the master password secret.
        - **Audit trail:** All CMK usage is logged in CloudTrail, providing visibility into when the secret encryption key was accessed.
        - **Key rotation:** CMKs support automatic and manual rotation, ensuring cryptographic best practices for credential protection.

        **Risk mitigation**

        - Configure a CMK when enabling Secrets Manager integration for Redshift.
        - Create a KMS key policy that restricts access to authorized principals.
        - Enable automatic key rotation on the CMK.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and open the **Redshift** console.
        2. In the left navigation pane, choose **Clusters** and select a cluster.
        3. Under the **Properties** tab, find the **Database configurations** section.
        4. Locate the **Admin password managed by Secrets Manager** field and check the listed KMS key.
        5. Open the AWS KMS console and confirm that the key's **Key manager** is **Customer**.

        A passing cluster shows a customer-managed KMS key for the Secrets Manager-managed password. A failing cluster shows an AWS-managed key alias or has Secrets Manager integration without a CMK.

        ### Audit via CLI

        1. Retrieve the Secrets Manager KMS key ID for a Redshift cluster:

        ```bash
        aws redshift describe-clusters \
          --cluster-identifier <cluster-id> \
          --query "Clusters[*].{ID:ClusterIdentifier,MasterPasswordSecretKmsKeyId:MasterPasswordSecretKmsKeyId}"
        ```

        2. Verify the key manager for the returned KMS key:

        ```bash
        aws kms describe-key \
          --key-id <kms-key-id> \
          --query "KeyMetadata.KeyManager"
        ```

        A passing cluster returns a non-empty `MasterPasswordSecretKmsKeyId` and the key's `KeyManager` is `"CUSTOMER"`. A failing cluster returns an empty or null `MasterPasswordSecretKmsKeyId`, or the key's `KeyManager` is `"AWS"`.

      remediation:
        - id: console
          desc: |
            To ensure Redshift managed passwords use CMK encryption using the AWS Console:

            1. Navigate to the **Redshift Console**.
            2. Select the cluster to review.
            3. Under **Properties**, check the **Admin password managed by Secrets Manager** section.
            4. Verify that a customer-managed KMS key is configured.
            5. If using an AWS-managed key, modify the cluster to specify a CMK for the managed password.
        - id: cli
          desc: |
            To ensure Redshift managed passwords use CMK encryption using the AWS CLI, check the Secrets Manager KMS key for a Redshift cluster:

            ```bash
            aws redshift describe-clusters \
              --cluster-identifier <cluster-id> \
              --query "Clusters[*].MasterPasswordSecretKmsKeyId"
            ```

            Modify the cluster to use a CMK for the managed password:

            ```bash
            aws redshift modify-cluster \
              --cluster-identifier <cluster-id> \
              --master-password-secret-kms-key-id <cmk-key-arn>
            ```
        - id: terraform
          desc: |
            To ensure Redshift managed passwords use CMK encryption in Terraform:

            ```hcl
            resource "aws_redshift_cluster" "example" {
              cluster_identifier = "example"
              node_type          = "dc2.large"
              number_of_nodes    = 2

              manage_master_password               = true
              master_password_secret_kms_key_id    = aws_kms_key.redshift.arn
            }
            ```
        - id: cloudformation
          desc: |
            To ensure Redshift managed passwords use CMK encryption in CloudFormation:

            ```yaml
            Resources:
              MyRedshiftCluster:
                Type: AWS::Redshift::Cluster
                Properties:
                  ClusterIdentifier: example
                  NodeType: dc2.large
                  NumberOfNodes: 2
                  ManageMasterPassword: true
                  MasterPasswordSecretKmsKeyId: !Ref RedshiftKmsKey
            ```
    refs:
      - url: https://docs.aws.amazon.com/redshift/latest/mgmt/managing-clusters-console.html
        title: AWS Documentation - Managing clusters using the console
      - url: https://docs.aws.amazon.com/redshift/latest/mgmt/managing-cluster-passwords.html
        title: AWS Documentation - Managing cluster master passwords
  - uid: mondoo-aws-security-redshift-secrets-manager-cmk-aws
    filters: asset.platform == "aws-redshift-cluster"
    mql: |
      aws.redshift.cluster.masterPasswordSecretKmsKey { metadata["KeyManager"] == "CUSTOMER" }
  - uid: mondoo-aws-security-redshift-secrets-manager-cmk-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_redshift_cluster")
    mql: |
      terraform.resources.where(nameLabel == "aws_redshift_cluster").all(
        arguments['manage_master_password'] != true ||
        arguments['master_password_secret_kms_key_id'] != empty
      )
  - uid: mondoo-aws-security-redshift-secrets-manager-cmk-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_redshift_cluster")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_redshift_cluster").all(
        change.after['manage_master_password'] != true ||
        change.after['master_password_secret_kms_key_id'] != empty
      )
  - uid: mondoo-aws-security-redshift-secrets-manager-cmk-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_redshift_cluster")
    mql: |
      terraform.state.resources.where(type == "aws_redshift_cluster").all(
        values['manage_master_password'] != true ||
        values['master_password_secret_kms_key_id'] != empty
      )
  - uid: mondoo-aws-security-redshift-secrets-manager-cmk-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::Redshift::Cluster")
    mql: |
      cloudformation.template.resources.where(type == "AWS::Redshift::Cluster").all(
        properties['ManageMasterPassword'] != true ||
        properties['MasterPasswordSecretKmsKeyId'] != empty
      )
  - uid: mondoo-aws-security-cloudfront-sni-only
    title: Ensure CloudFront distributions use SNI-only SSL
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    variants:
      - uid: mondoo-aws-security-cloudfront-sni-only-aws
        tags:
          mondoo.com/filter-title: AWS CloudFront Distribution
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-cloudfront-sni-only-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-cloudfront-sni-only-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-cloudfront-sni-only-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that CloudFront distributions use SNI-only (Server Name Indication) for SSL/TLS certificate serving rather than dedicated IP SSL. SNI-only is the modern, recommended approach for HTTPS on CloudFront.

        **Why this matters**

        - **Weak cipher exposure:** Dedicated-IP SSL exists to support legacy clients that lack SNI support. These legacy clients typically also lack support for modern TLS versions and strong cipher suites, meaning dedicated-IP configurations may negotiate weaker cryptographic parameters that are vulnerable to interception or downgrade attacks.
        - **Legacy infrastructure risk:** Dedicated-IP SSL may indicate legacy infrastructure that has not been modernized. Environments retaining dedicated-IP configurations often have other outdated security practices that expand the overall attack surface.
        - **TLS version enforcement:** SNI-only ensures all connecting clients use modern TLS stacks, which correlates with stronger cipher suites, more recent protocol versions, and better security defaults that resist known cryptographic attacks.

        **Risk mitigation**

        - **Stronger cryptographic baseline:** Eliminates connections from legacy clients that would negotiate weak ciphers or outdated TLS versions vulnerable to known attacks.
        - **Attack surface reduction:** Removes support for legacy TLS stacks that may be susceptible to downgrade attacks or known protocol vulnerabilities.
        - **Security posture consistency:** Ensures all client connections meet a minimum TLS capability baseline, simplifying security monitoring and compliance.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and open the **CloudFront** console.
        2. Choose **Distributions** and select a distribution.
        3. Under the **General** tab, choose **Edit** in the **Settings** section.
        4. In the **Custom SSL certificate** section, review the **SSL support method** field.

        A passing distribution shows **SSL support method: SNI** (Server Name Indication). A failing distribution shows **SSL support method: Dedicated IP** or has the dedicated IP option selected.

        ### Audit via CLI

        1. Retrieve the SSL support method for a CloudFront distribution:

        ```bash
        aws cloudfront get-distribution \
          --id <distribution-id> \
          --query "Distribution.DistributionConfig.ViewerCertificate.SSLSupportMethod"
        ```

        A passing distribution returns `"sni-only"`. A failing distribution returns `"vip"` (dedicated IP) or `"static-ip"`.

      remediation:
        - id: console
          desc: |
            To ensure CloudFront distributions use SNI-only SSL using the AWS Console:

            1. Navigate to the **CloudFront Console**.
            2. Select the distribution, then choose **Edit** under **Settings**.
            3. In the **Custom SSL certificate** section, select **SNI** for the SSL support method.
            4. Select **Save changes**.
        - id: cli
          desc: |
            To ensure CloudFront distributions use SNI-only SSL using the AWS CLI, check the SSL support method for a distribution:

            ```bash
            aws cloudfront get-distribution \
              --id <distribution-id> \
              --query "Distribution.DistributionConfig.ViewerCertificate.SSLSupportMethod"
            ```

            Update the distribution to use SNI-only:

            ```bash
            aws cloudfront update-distribution \
              --id <distribution-id> \
              --distribution-config file://config.json
            ```

            In the config file, set `ViewerCertificate.SSLSupportMethod` to `sni-only`.
        - id: terraform
          desc: |
            To ensure CloudFront distributions use SNI-only SSL in Terraform:

            ```hcl
            resource "aws_cloudfront_distribution" "example" {
              # ... other configuration ...

              viewer_certificate {
                acm_certificate_arn      = aws_acm_certificate.cert.arn
                ssl_support_method       = "sni-only"
                minimum_protocol_version = "TLSv1.2_2021"
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure CloudFront distributions use SNI-only SSL in CloudFormation:

            ```yaml
            Resources:
              CloudFrontDistribution:
                Type: AWS::CloudFront::Distribution
                Properties:
                  DistributionConfig:
                    ViewerCertificate:
                      AcmCertificateArn: !Ref Certificate
                      SSLSupportMethod: sni-only
                      MinimumProtocolVersion: TLSv1.2_2021
            ```
    refs:
      - url: https://docs.aws.amazon.com/AmazonCloudFront/latest/DeveloperGuide/cnames-https-dedicated-ip-or-sni.html
        title: AWS Documentation - Choosing how CloudFront serves HTTPS requests
      - url: https://docs.aws.amazon.com/AmazonCloudFront/latest/DeveloperGuide/distribution-web-values-specify.html
        title: AWS Documentation - Values that you specify when you create or update a distribution
  - uid: mondoo-aws-security-cloudfront-sni-only-aws
    filters: asset.platform == "aws-cloudfront-distribution"
    mql: |
      aws.cloudfront.distribution.sslSupportMethod == "sni-only"
  - uid: mondoo-aws-security-cloudfront-sni-only-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_cloudfront_distribution")
    mql: |
      terraform.resources.where(nameLabel == "aws_cloudfront_distribution").all(
        blocks.where(type == "viewer_certificate") != empty &&
        blocks.where(type == "viewer_certificate").all(arguments['ssl_support_method'] == "sni-only")
      )
  - uid: mondoo-aws-security-cloudfront-sni-only-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_cloudfront_distribution")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_cloudfront_distribution").all(
        change.after['viewer_certificate'] != empty &&
        change.after['viewer_certificate'].all(_['ssl_support_method'] == "sni-only")
      )
  - uid: mondoo-aws-security-cloudfront-sni-only-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_cloudfront_distribution")
    mql: |
      terraform.state.resources.where(type == "aws_cloudfront_distribution").all(
        values['viewer_certificate'] != empty &&
        values['viewer_certificate'].all(_['ssl_support_method'] == "sni-only")
      )
  - uid: mondoo-aws-security-cloudfront-access-logging-enabled
    title: Ensure CloudFront distributions have access logging enabled
    impact: 50
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-pr-pt-1
      compliance/nist-csf-2: nist-csf-2-pr-ps-04
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    variants:
      - uid: mondoo-aws-security-cloudfront-access-logging-enabled-aws
        tags:
          mondoo.com/filter-title: AWS CloudFront Distribution
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-cloudfront-access-logging-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-cloudfront-access-logging-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-cloudfront-access-logging-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-cloudfront-access-logging-enabled-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon CloudFront distributions have standard access logging enabled and configured to write logs to an S3 bucket. By default, CloudFront does not enable access logging, so request-level data including client IPs, request paths, response codes, and edge locations is not retained.

        **Why this matters**

        - **Incident investigation:** Without access logs, there is no record of who accessed distribution content, when, or from where, severely limiting the ability to reconstruct events during a security incident.
        - **Abuse detection:** Access logs enable detection of unusual traffic patterns such as content scraping, credential stuffing against origin APIs, or high-volume DDoS precursors.
        - **Compliance evidence:** Many regulatory frameworks require logging of access to web-facing resources, and access logs provide the durable record needed to satisfy those requirements.
        - **Cost attribution:** Logs identify unexpected or high-volume traffic sources that may be inflating CloudFront data transfer costs due to unauthorized use.

        **Risk mitigation**

        - **Threat visibility:** Centralized access logs fed into a SIEM or CloudWatch allow security teams to alert on anomalous client behavior before it escalates to a significant incident.
        - **Forensic retention:** Storing logs in S3 with appropriate lifecycle policies ensures request-level evidence is available for post-incident forensic analysis.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and open the **CloudFront** console.
        2. Choose **Distributions** and select a distribution.
        3. Under the **General** tab, review the **Standard logging** field in the **Settings** section.

        A passing distribution shows **Standard logging: On** with an S3 bucket configured. A failing distribution shows **Standard logging: Off**.

        ### Audit via CLI

        1. Retrieve the logging configuration for a CloudFront distribution:

        ```bash
        aws cloudfront get-distribution \
          --id <distribution-id> \
          --query "Distribution.DistributionConfig.Logging"
        ```

        A passing distribution returns a logging object with `"Enabled": true` and a non-empty `Bucket`. A failing distribution returns `"Enabled": false` or an absent `Logging` block.

      remediation:
        - id: console
          desc: |
            To ensure CloudFront distributions have access logging enabled using the AWS Console:

            1. Navigate to the **CloudFront Console**.
            2. Select the distribution to configure.
            3. Under the **General** tab, select **Edit**.
            4. In the **Standard logging** section, select **On**.
            5. Select an S3 bucket for storing logs.
            6. Optionally set a log prefix.
            7. Select **Save changes**.
        - id: cli
          desc: |
            To ensure CloudFront distributions have access logging enabled using the AWS CLI, enable access logging on a distribution:

            ```bash
            aws cloudfront get-distribution-config --id <distribution-id> > config.json
            ```

            Edit the config to set `Logging.Enabled` to `true`, specify `Logging.Bucket` and `Logging.Prefix`, then update:

            ```bash
            aws cloudfront update-distribution \
              --id <distribution-id> \
              --distribution-config file://config.json \
              --if-match <etag>
            ```
        - id: terraform
          desc: |
            To ensure CloudFront distributions have access logging enabled in Terraform:

            ```hcl
            resource "aws_cloudfront_distribution" "example" {
              # ... other configuration ...

              logging_config {
                include_cookies = false
                bucket          = "my-logs-bucket.s3.amazonaws.com"
                prefix          = "cloudfront/"
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure CloudFront distributions have access logging enabled in CloudFormation:

            ```yaml
            Resources:
              MyDistribution:
                Type: AWS::CloudFront::Distribution
                Properties:
                  DistributionConfig:
                    Logging:
                      Bucket: my-logs-bucket.s3.amazonaws.com
                      IncludeCookies: false
                      Prefix: cloudfront/
            ```
    refs:
      - url: https://docs.aws.amazon.com/AmazonCloudFront/latest/DeveloperGuide/AccessLogs.html
        title: AWS Documentation - Configuring and using standard logs (access logs)
  - uid: mondoo-aws-security-cloudfront-access-logging-enabled-aws
    filters: asset.platform == "aws-cloudfront-distribution"
    mql: |
      aws.cloudfront.distribution.logging.enabled == true
  - uid: mondoo-aws-security-cloudfront-access-logging-enabled-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_cloudfront_distribution")
    mql: |
      terraform.resources.where(nameLabel == "aws_cloudfront_distribution").all(
        blocks.where(type == "logging_config") != empty
      )
  - uid: mondoo-aws-security-cloudfront-access-logging-enabled-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_cloudfront_distribution")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_cloudfront_distribution").all(
        change.after['logging_config'] != empty
      )
  - uid: mondoo-aws-security-cloudfront-access-logging-enabled-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_cloudfront_distribution")
    mql: |
      terraform.state.resources.where(type == "aws_cloudfront_distribution").all(
        values['logging_config'] != empty
      )
  - uid: mondoo-aws-security-cloudfront-access-logging-enabled-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::CloudFront::Distribution")
    mql: |
      cloudformation.template.resources.where(type == "AWS::CloudFront::Distribution").all(
        properties['DistributionConfig']['Logging'] != empty
      )
  - uid: mondoo-aws-security-dax-encryption-in-transit
    title: Ensure DAX clusters enforce encryption in transit
    impact: 80
    tags:
