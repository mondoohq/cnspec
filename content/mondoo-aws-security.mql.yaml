  - uid: mondoo-aws-security-redshift-cluster-current-maintenance-track
    title: Ensure Redshift clusters are on the current maintenance track
    impact: 60
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-tvm-03
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-8
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-12
      compliance/nist-csf-2: nist-csf-2-pr-ps-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-1
      compliance/pci-dss-4: pcidss-requirement-6-3-3
      compliance/soc2-2017: soc2-control-cc7-1-1
      compliance/vda-isa-5: vda-isa-5-5-2-1
    variants:
      - uid: mondoo-aws-security-redshift-cluster-current-maintenance-track-aws
        tags:
          mondoo.com/filter-title: AWS Redshift Cluster
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-redshift-cluster-current-maintenance-track-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
      - uid: mondoo-aws-security-redshift-cluster-current-maintenance-track-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-redshift-cluster-current-maintenance-track-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-redshift-cluster-current-maintenance-track-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Amazon Redshift clusters are configured to use the `Current` maintenance track rather than the `Trailing` track. The maintenance track determines which cluster version is applied during maintenance windows and directly affects the security posture of the cluster.

        **Why this matters**

        Amazon Redshift offers two maintenance tracks:

        - **Current**: Applies the latest approved cluster version, including the most recent security patches, bug fixes, and feature updates.
        - **Trailing**: Applies the cluster version that was current before the most recent update, meaning the cluster runs on an older version that may be missing critical security patches.

        Clusters on the `Trailing` maintenance track are intentionally running behind on security updates. While this may provide additional testing time for application compatibility, it increases the window of exposure to known vulnerabilities that have already been patched in the `Current` track.

        **Risk mitigation**

        - **Timely Patching:** Ensures clusters receive security patches as soon as they are available.
        - **Reduced Vulnerability Window:** Minimizes the time clusters are exposed to known security issues.
        - **Compliance:** Meets patch management requirements under frameworks such as NIST 800-53 (SI-2), ISO 27001, and SOC 2.
      remediation:
        - id: console
          desc: |
            To ensure Redshift clusters are on the current maintenance track using the AWS Console:

            1. Navigate to the AWS Redshift Console.
            2. Select **Clusters** in the left panel.
            3. Select the cluster and go to the **Maintenance** tab.
            4. Under **Maintenance track**, check the current setting.
            5. If the cluster is on the `Trailing` track:
               - Select **Modify**.
               - Under **Maintenance track**, select **Current**.
               - Select **Modify cluster**.
        - id: cli
          desc: |
            To ensure Redshift clusters are on the current maintenance track using the AWS CLI, check the maintenance track of Redshift clusters:

            ```bash
            aws redshift describe-clusters --query "Clusters[*].{Cluster:ClusterIdentifier,MaintenanceTrack:MaintenanceTrackName}"
            ```

            If a cluster is on the `Trailing` track, switch to `Current`:

            ```bash
            aws redshift modify-cluster \
              --cluster-identifier <cluster-id> \
              --maintenance-track-name Current
            ```
        - id: terraform
          desc: |
            To ensure Redshift clusters are on the current maintenance track in Terraform, ensure Redshift clusters use the `Current` maintenance track:

            ```hcl
            resource "aws_redshift_cluster" "secure_redshift" {
              cluster_identifier     = "secure-redshift-cluster"
              node_type              = "dc2.large"
              master_username        = "admin"
              master_password        = var.redshift_master_password
              maintenance_track_name = "Current"
            }
            ```
        - id: cloudformation
          desc: |
            To ensure Redshift clusters are on the current maintenance track in CloudFormation:

            ```yaml
            Resources:
              MyRedshiftCluster:
                Type: AWS::Redshift::Cluster
                Properties:
                  ClusterIdentifier: secure-redshift-cluster
                  NodeType: dc2.large
                  MasterUsername: admin
                  MasterUserPassword: !Ref RedshiftMasterPassword
                  MaintenanceTrackName: current
            ```
    refs:
      - url: https://docs.aws.amazon.com/redshift/latest/mgmt/managing-cluster-maintenance.html
        title: Amazon Redshift Cluster Maintenance
      - url: https://docs.aws.amazon.com/securityhub/latest/userguide/securityhub-controls-reference.html
        title: AWS Security Hub Controls Reference
  - uid: mondoo-aws-security-redshift-cluster-current-maintenance-track-aws
    filters: asset.platform == "aws-redshift-cluster"
    mql: aws.redshift.cluster.maintenanceTrackName == "Current"
  - uid: mondoo-aws-security-redshift-cluster-current-maintenance-track-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::Redshift::Cluster")
    mql: |
      cloudformation.template.resources.where(type == "AWS::Redshift::Cluster").all(
      properties['MaintenanceTrackName'] == "current" || properties['MaintenanceTrackName'] == "Current"
      )
