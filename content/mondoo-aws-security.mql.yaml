    docs:
      desc: |
        This check ensures that a CloudWatch metric filter and alarm exist to detect changes to AWS CloudTrail configuration. CloudTrail is the primary audit log for AWS API activity, and any modifications to its configuration could indicate an attempt to disable or circumvent logging.

        Attackers who gain sufficient privileges may attempt to disable CloudTrail to cover their tracks. Immediate alerting on CloudTrail configuration changes ensures that any tampering with the audit log system is detected and investigated promptly.

        CIS AWS Foundations Benchmark requires monitoring CloudTrail configuration changes to protect the integrity of the audit logging infrastructure itself.
      remediation:
        - id: console
          desc: |
            To ensure log metric filter exists for CloudTrail config changes using the AWS Console:

            1. Navigate to **CloudWatch** and select **Log groups**.
            2. Select the log group associated with your CloudTrail trail.
            3. Choose **Actions** > **Create metric filter**.
            4. Enter a filter pattern matching `CreateTrail`, `UpdateTrail`, `DeleteTrail`, `StartLogging`, and `StopLogging` events.
            5. Assign a metric name and namespace, then choose **Create metric filter**.
            6. Navigate to **Alarms** > **Create alarm**, select the new metric, and configure SNS notification.
        - id: cli
          desc: |
            To ensure log metric filter exists for CloudTrail config changes using the AWS CLI, create the metric filter:

            ```bash
            aws logs put-metric-filter \
              --log-group-name <cloudtrail-log-group> \
              --filter-name CloudTrailConfigChanges \
              --filter-pattern '{ ($.eventName = CreateTrail) || ($.eventName = UpdateTrail) || ($.eventName = DeleteTrail) || ($.eventName = StartLogging) || ($.eventName = StopLogging) }' \
              --metric-transformations metricName=CloudTrailConfigChanges,metricNamespace=CISBenchmark,metricValue=1
            ```

            Create the alarm:

            ```bash
            aws cloudwatch put-metric-alarm \
              --alarm-name CloudTrailConfigChanges \
              --metric-name CloudTrailConfigChanges \
              --namespace CISBenchmark \
              --statistic Sum \
              --period 300 \
              --threshold 1 \
              --comparison-operator GreaterThanOrEqualToThreshold \
              --evaluation-periods 1 \
              --alarm-actions <sns-topic-arn>
            ```
        - id: terraform
          desc: |
            To ensure log metric filter exists for CloudTrail config changes in Terraform, create a CloudWatch log metric filter and alarm for CloudTrail configuration changes:

            ```hcl
            resource "aws_cloudwatch_log_metric_filter" "cloudtrailconfigchanges" {
              name           = "CloudTrailConfigChanges"
              log_group_name = aws_cloudwatch_log_group.cloudtrail.name
              pattern        = "{ ($.eventName = CreateTrail) || ($.eventName = UpdateTrail) || ($.eventName = DeleteTrail) || ($.eventName = StartLogging) || ($.eventName = StopLogging) }"

              metric_transformation {
                name      = "CloudTrailConfigChanges"
                namespace = "CISBenchmark"
                value     = "1"
              }
            }

            resource "aws_cloudwatch_metric_alarm" "cloudtrailconfigchanges" {
              alarm_name          = "CloudTrailConfigChanges"
              metric_name         = "CloudTrailConfigChanges"
              namespace           = "CISBenchmark"
              statistic           = "Sum"
              period              = 300
              threshold           = 1
              comparison_operator = "GreaterThanOrEqualToThreshold"
              evaluation_periods  = 1
              alarm_actions       = [aws_sns_topic.alerts.arn]
            }
            ```
        - id: cloudformation
          desc: |
            To ensure log metric filter exists for CloudTrail config changes in CloudFormation, create a CloudWatch log metric filter and alarm for CloudTrail configuration changes:

            ```yaml
            Resources:
              CloudTrailConfigChangesFilter:
                Type: AWS::Logs::MetricFilter
                Properties:
                  LogGroupName: !Ref CloudTrailLogGroup
                  FilterPattern: "{ ($.eventName = CreateTrail) || ($.eventName = UpdateTrail) || ($.eventName = DeleteTrail) || ($.eventName = StartLogging) || ($.eventName = StopLogging) }"
                  MetricTransformations:
                    - MetricName: CloudTrailConfigChanges
                      MetricNamespace: CISBenchmark
                      MetricValue: "1"

              CloudTrailConfigChangesAlarm:
                Type: AWS::CloudWatch::Alarm
                Properties:
                  AlarmName: CloudTrailConfigChanges
                  MetricName: CloudTrailConfigChanges
                  Namespace: CISBenchmark
                  Statistic: Sum
                  Period: 300
                  Threshold: 1
                  ComparisonOperator: GreaterThanOrEqualToThreshold
                  EvaluationPeriods: 1
                  AlarmActions:
                    - !Ref AlertsSNSTopic
            ```
