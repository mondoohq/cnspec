      )
  - uid: mondoo-aws-security-sqs-no-wildcard-policy
    title: Ensure SQS queues do not allow wildcard access policies
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-3-1
      compliance/vda-isa-5: vda-isa-5-4-2-1
    variants:
      - uid: mondoo-aws-security-sqs-no-wildcard-policy-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-sqs-no-wildcard-policy-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-sqs-no-wildcard-policy-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-sqs-no-wildcard-policy-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-sqs-no-wildcard-policy-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon SQS queue access policies do not grant access to wildcard principals. A queue policy with `"Principal": "*"` or `"Principal": {"AWS": "*"}` without appropriate conditions allows any AWS account or unauthenticated user to perform actions on the queue.

        **Why this matters**

        - SQS queues with wildcard principal policies are effectively public, allowing any AWS account to send messages, receive messages, or delete messages depending on the actions granted.
        - Overly permissive queue policies can lead to unauthorized message injection, data exfiltration through message consumption, or denial of service through queue flooding.
        - Unlike S3 bucket policies where public access blockers provide a safety net, SQS does not have an equivalent account-level control to override permissive queue policies.

        **Risk mitigation**

        - **Least privilege:** Restricting queue policies to specific AWS accounts, IAM roles, or services ensures only authorized entities can interact with the queue.
        - **Data protection:** Prevents unauthorized parties from reading or injecting messages that may contain sensitive application data.
        - **Compliance:** Satisfies access control requirements under NIST SP 800-53 AC-3, ISO 27001 A.8.20, and SOC 2 CC6.3.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and navigate to **Amazon SQS**.
        2. Select the queue to review.
        3. Choose the **Access policy** tab.
        4. Examine the policy document for any `Effect: Allow` statements where `Principal` is `"*"` or `{"AWS": "*"}` without a restricting condition.

        A passing queue has no Allow statements with wildcard principals, or any wildcard principal is constrained by a condition such as `aws:SourceArn` or `aws:PrincipalOrgID`. A failing queue has at least one unconstrained Allow statement granting access to `*`.

        ### Audit via CLI

        1. Retrieve the access policy for a queue and inspect it for wildcard principals:

        ```bash
        aws sqs get-queue-attributes \
          --queue-url <queue-url> \
          --attribute-names Policy \
          --query "Attributes.Policy" \
          --output text | python3 -m json.tool
        ```

        A passing queue returns a policy with no Allow statements where `Principal` equals `"*"` or `{"AWS": "*"}` without conditions. A failing queue returns a policy containing one or more such unconstrained wildcard Allow statements.
      remediation:
        - id: console
          desc: |
            To ensure SQS queues do not allow wildcard access policies using the AWS Console:

            1. Navigate to the **Amazon SQS Console** and select the queue.
            2. Choose the **Access policy** tab.
            3. Review the policy for any statements with `"Principal": "*"` or `"Principal": {"AWS": "*"}`.
            4. Replace wildcard principals with specific AWS account IDs, IAM role ARNs, or service principals.
            5. If broad access is required, add conditions such as `aws:SourceArn`, `aws:SourceAccount`, or `aws:PrincipalOrgID` to restrict access.
            6. Choose **Save**.
        - id: cli
          desc: |
            To ensure SQS queues do not allow wildcard access policies using the AWS CLI, view the current queue policy:

            ```bash
            aws sqs get-queue-attributes \
              --queue-url <queue-url> \
              --attribute-names Policy
            ```

            Set a restrictive policy that limits access to a specific account:

            ```bash
            aws sqs set-queue-attributes \
              --queue-url <queue-url> \
              --attributes '{
                "Policy": "{\"Version\":\"2012-10-17\",\"Statement\":[{\"Effect\":\"Allow\",\"Principal\":{\"AWS\":\"arn:aws:iam::<account-id>:root\"},\"Action\":\"SQS:*\",\"Resource\":\"<queue-arn>\"}]}"
              }'
            ```
        - id: terraform
          desc: |
            To ensure SQS queues do not allow wildcard access policies in Terraform:

            ```hcl
            resource "aws_sqs_queue" "example" {
              name = "example-queue"
            }

            resource "aws_sqs_queue_policy" "example" {
              queue_url = aws_sqs_queue.example.id

              policy = jsonencode({
                Version = "2012-10-17"
                Statement = [{
                  Effect    = "Allow"
                  Principal = { AWS = "arn:aws:iam::${data.aws_caller_identity.current.account_id}:root" }
                  Action    = "SQS:*"
                  Resource  = aws_sqs_queue.example.arn
                }]
              })
            }
            ```
        - id: cloudformation
          desc: |
            To ensure SQS queues do not allow wildcard access policies in CloudFormation:

            ```yaml
            Resources:
              SQSQueuePolicy:
                Type: AWS::SQS::QueuePolicy
                Properties:
                  Queues:
                    - !Ref SQSQueue
                  PolicyDocument:
                    Version: "2012-10-17"
                    Statement:
                      - Effect: Allow
                        Principal:
                          AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
                        Action: "SQS:*"
                        Resource: !GetAtt SQSQueue.Arn
            ```
    refs:
      - url: https://docs.aws.amazon.com/AWSSimpleQueueService/latest/SQSDeveloperGuide/sqs-basic-examples-of-sqs-policies.html
        title: Amazon SQS - Basic examples of Amazon SQS policies
      - url: https://docs.aws.amazon.com/securityhub/latest/userguide/sqs-controls.html
        title: AWS Security Hub - SQS controls reference
  - uid: mondoo-aws-security-sqs-no-wildcard-policy-aws
    filters: asset.platform == "aws"
    mql: |
      aws.sqs.queues.all(
        policy == empty ||
        policy['Statement'].where(_['Effect'] == "Allow").none(
          _['Principal'] == "*" || _['Principal']['AWS'] == "*" || _['Principal']['AWS'].contains("*")
        )
      )

  - uid: mondoo-aws-security-sqs-no-wildcard-policy-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_sqs_queue_policy")
    mql: |
      terraform.resources.where(nameLabel == "aws_sqs_queue_policy").all(
      arguments.policy == empty || arguments.policy != /"Principal"\s*:\s*"\*"/
      )
  - uid: mondoo-aws-security-sqs-no-wildcard-policy-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_sqs_queue_policy")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_sqs_queue_policy").all(
      change.after.policy == empty || change.after.policy != /"Principal"\s*:\s*"\*"/
      )
  - uid: mondoo-aws-security-sqs-no-wildcard-policy-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_sqs_queue_policy")
    mql: |
      terraform.state.resources.where(type == "aws_sqs_queue_policy").all(
      values.policy == empty || values.policy != /"Principal"\s*:\s*"\*"/
      )
  - uid: mondoo-aws-security-sqs-no-wildcard-policy-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::SQS::QueuePolicy")
    mql: |
      cloudformation.template.resources.where(type == "AWS::SQS::QueuePolicy").all(
      properties['PolicyDocument'].string != /"Principal"\s*:\s*"\*"/
      )
  # No Terraform variants: `aws_ecs_task_definition.container_definitions` is a JSON-encoded string in HCL — extracting and pattern-matching environment-variable names/values would require a JSON-walking variant pass that is not currently supported in the same shape as the runtime check.
  - uid: mondoo-aws-security-ecs-task-definition-no-plaintext-secrets
    title: Ensure ECS task definitions do not contain plaintext secrets
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-5-17
      compliance/nis-2: nis-2-21-2-g
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-5
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-10
      compliance/pci-dss-4: pcidss-requirement-8-3-2
      compliance/soc2-2017: soc2-control-cc6-1-9
      compliance/vda-isa-5: vda-isa-5-4-1-3
    variants:
      - uid: mondoo-aws-security-ecs-task-definition-no-plaintext-secrets-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
    docs:
      desc: |
        This check ensures that Amazon ECS task definition container environment variables do not contain plaintext secrets such as passwords, API keys, or access tokens. Embedding secrets as environment variable values exposes them to anyone with `ecs:DescribeTaskDefinition` permissions and to logging pipelines that capture environment state.

        **Why this matters**

        - **Broad read exposure:** Task definition environment variables are readable by any IAM principal with describe permissions, by container runtime processes, and by observability tools that log environment state.
        - **Rotation complexity:** Hardcoded secrets require creating and deploying a new task definition revision to rotate, making rapid response to a compromise operationally difficult.
        - **Log leakage:** Container orchestration systems, debugging tools, and SIEM platforms frequently capture environment variable state, potentially persisting secret values in log storage.
        - **Blast radius on compromise:** A single task definition with multiple plaintext secrets exposes all of them simultaneously if the definition is read by an unauthorized party.

        **Risk mitigation**

        - **Secrets manager integration:** Referencing secrets via the `secrets` field with `valueFrom` pointing to AWS Secrets Manager or SSM Parameter Store ensures values are injected at runtime and never stored in the task definition itself.
        - **Rotation enablement:** Externalized secrets can be rotated in Secrets Manager and automatically picked up at the next task launch without redeployment of the task definition.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and navigate to **Amazon ECS**.
        2. Choose **Task definitions** in the left navigation.
        3. Select the task definition family and then the active revision.
        4. Expand each container definition and review the **Environment variables** section.
        5. Check whether any environment variable names match sensitive patterns such as `DB_PASSWORD`, `API_KEY`, `SECRET_KEY`, or `AWS_SECRET_ACCESS_KEY`, or whether any values resemble access keys (starting with `AKIA`, `ASIA`, etc.) or private key headers.

        A passing task definition has no environment variables with sensitive names or secret-like values. A failing task definition has at least one environment variable that stores a plaintext secret.

        ### Audit via CLI

        1. List all active task definition ARNs:

        ```bash
        aws ecs list-task-definitions \
          --status ACTIVE \
          --query "taskDefinitionArns"
        ```

        2. Inspect a specific task definition's container environment variables:

        ```bash
        aws ecs describe-task-definition \
          --task-definition <task-definition-arn> \
          --query "taskDefinition.containerDefinitions[*].{Name:name,Env:environment}"
        ```

        A passing task definition returns container definitions where no environment variable name matches a known secret pattern and no value resembles an access key or private key. A failing task definition returns one or more environment variables with names or values consistent with plaintext secrets.
      remediation:
        - id: console
          desc: |
            To ensure ECS task definitions do not contain plaintext secrets using the AWS Console:

            1. Navigate to the Amazon ECS Console.
            2. Select **Task definitions** in the left panel.
            3. Select the task definition to review.
            4. For each container definition, review the **Environment variables** section.
            5. Remove any environment variables with names that store secrets such as `DB_PASSWORD`, `API_KEY`, `SECRET_KEY`, or `AWS_SECRET_ACCESS_KEY`.
            6. Instead, use the **Secrets** section to reference values from AWS Secrets Manager or SSM Parameter Store.
            7. Create a new revision of the task definition with the changes.
        - id: cli
          desc: |
            To ensure ECS task definitions do not contain plaintext secrets using the AWS CLI, check for plaintext secrets in task definitions:

            ```bash
            aws ecs describe-task-definition --task-definition <task-def-name> \
              --query "taskDefinition.containerDefinitions[*].{Name:name, Environment:environment}"
            ```

            Update the task definition to use secrets references instead of environment variables:

            ```bash
            aws ecs register-task-definition --cli-input-json file://task-definition.json
            ```

            In your task definition JSON, replace environment variables containing secrets with the `secrets` field:

            ```json
            {
              "containerDefinitions": [
                {
                  "name": "app",
                  "secrets": [
                    {
                      "name": "DB_PASSWORD",
                      "valueFrom": "arn:aws:secretsmanager:region:account-id:secret:my-secret"
                    }
                  ]
                }
              ]
            }
            ```
        - id: terraform
          desc: |
            To ensure ECS task definitions do not contain plaintext secrets in Terraform, use the `secrets` block to reference values from Secrets Manager or SSM Parameter Store instead of embedding plaintext secrets in `environment`:

            ```hcl
            resource "aws_ecs_task_definition" "example" {
              family = "example"
              container_definitions = jsonencode([{
                name  = "app"
                image = "my-app:latest"
                secrets = [
                  {
                    name      = "DB_PASSWORD"
                    valueFrom = "arn:aws:secretsmanager:us-east-1:123456789012:secret:my-secret"
                  }
                ]
              }])
            }
            ```
        - id: cloudformation
          desc: |
            To ensure ECS task definitions do not contain plaintext secrets in CloudFormation, use the `Secrets` property to reference values from Secrets Manager or SSM Parameter Store instead of plaintext `Environment` entries:

            ```yaml
            Resources:
              TaskDefinition:
                Type: AWS::ECS::TaskDefinition
                Properties:
                  Family: example
                  ContainerDefinitions:
                    - Name: app
                      Image: my-app:latest
                      Secrets:
                        - Name: DB_PASSWORD
                          ValueFrom: arn:aws:secretsmanager:us-east-1:123456789012:secret:my-secret
            ```
    refs:
      - url: https://docs.aws.amazon.com/AmazonECS/latest/developerguide/specifying-sensitive-data.html
        title: AWS Documentation - Passing sensitive data to a container
  - uid: mondoo-aws-security-ecs-task-definition-no-plaintext-secrets-aws
    filters: asset.platform == "aws"
    mql: |
      aws.ecs.taskDefinitions.all(
        containerDefinitions.all(
          environment.none( name == /(?i)^(aws_secret_access_key|aws_access_key_id|db_password|database_password|master_password|admin_password|api_key|api_secret|private_key|secret_key|auth_token|access_token)$/ ) &&
          environment.none( value == /(A3T[A-Z0-9]|AKIA|AGPA|AIDA|AROA|AIPA|ANPA|ANVA|ASIA)[A-Z0-9]{16}/ ) &&
          environment.none( value == /-----BEGIN (RSA |DSA |EC |OPENSSH |PGP )?PRIVATE KEY/ )
        )
      )
  # No Terraform variants: The default VPC is created by AWS automatically per region; `aws_default_vpc` adopts an existing default VPC for management but does not delete it. The runtime check walks every region's VPCs to find any with `isDefault == true`; this regional inventory does not have a clean Terraform analog.
  - uid: mondoo-aws-security-no-default-vpc
    title: Ensure the default VPC is not used
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-06
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-aws-security-no-default-vpc-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
    docs:
      desc: |
        This check ensures that the default VPC is not present in any AWS region. AWS automatically creates a default VPC in every region with an internet gateway, public subnets, and auto-assigned public IP addresses, configuration that is unsuitable for production workloads and not aligned with least-privilege network design.

        **Why this matters**

        - **Automatic public exposure:** Instances launched into the default VPC receive public IP addresses by default, creating unintended internet-facing surfaces if a deployment targets the wrong VPC.
        - **Missing network segmentation:** Default VPCs lack the subnet tiering, route table customization, and security group defaults that purpose-built VPCs implement, reducing the effectiveness of network-level controls.
        - **Accidental deployment risk:** Developers and automation pipelines that omit a VPC parameter will silently land resources in the default VPC, bypassing security controls designed into production network architecture.
        - **Lateral movement path:** Resources inadvertently placed in the default VPC may be reachable from other resources in the same flat network, reducing isolation between environments and workloads.

        **Risk mitigation**

        - **Accidental exposure prevention:** Removing the default VPC eliminates the fallback network that could receive resources launched without explicit VPC targeting.
        - **Network architecture enforcement:** Ensures all workloads use purpose-built VPCs with intentional segmentation, routing, and ingress controls.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and open the **VPC** console.
        2. In the left navigation pane, select **Your VPCs**.
        3. In the VPC list, look at the **Default VPC** column.
        4. Repeat this check in every AWS region by switching regions in the console.

        A passing account shows no VPC with **Default VPC = Yes** in any region. A failing account shows at least one VPC marked as the default.

        ### Audit via CLI

        1. Run the following command for each region to list default VPCs:

        ```bash
        for region in $(aws ec2 describe-regions --query "Regions[].RegionName" --output text); do
          echo "Region: $region"
          aws ec2 describe-vpcs --region "$region" \
            --filters "Name=isDefault,Values=true" \
            --query "Vpcs[].VpcId" --output text
        done
        ```

        A passing account returns no VPC IDs for any region. A failing account returns one or more VPC IDs, indicating a default VPC is present.
      remediation:
        - id: console
          desc: |
            To ensure the default VPC is not used using the AWS Console:

            1. Navigate to the **VPC Console**.
            2. Select **Your VPCs** in the left panel.
            3. Identify VPCs marked as **Default VPC = Yes**.
            4. Before deleting, ensure no resources (EC2 instances, RDS instances, etc.) are using the default VPC.
            5. Delete all associated resources (subnets, internet gateways, route tables, network ACLs, security groups).
            6. Select the default VPC and choose **Actions** > **Delete VPC**.
            7. Repeat for each AWS region.
        - id: cli
          desc: |
            To ensure the default VPC is not used using the AWS CLI, list default VPCs across all regions:

            ```bash
            for region in $(aws ec2 describe-regions --query "Regions[].RegionName" --output text); do
              echo "Region: $region"
              aws ec2 describe-vpcs --region "$region" --filters "Name=isDefault,Values=true" \
                --query "Vpcs[].VpcId" --output text
            done
            ```

            Delete the default VPC (after removing all dependent resources):

            ```bash
            aws ec2 delete-vpc --vpc-id <vpc-id> --region <region>
            ```
        - id: terraform
          desc: |
            Terraform does not manage default VPCs. To remove a default VPC, use the `aws_default_vpc` resource with a lifecycle block, or delete it using the AWS CLI. You can also use the `awsutils` provider's `awsutils_default_vpc_deletion` resource to automate default VPC removal across regions.
        - id: cloudformation
          desc: |
            CloudFormation does not support deleting default VPCs. Default VPC removal must be performed using the AWS CLI or Console. Consider using a custom CloudFormation resource backed by a Lambda function if automated removal is required.
    refs:
      - url: https://docs.aws.amazon.com/vpc/latest/userguide/default-vpc.html
        title: AWS Documentation - Default VPCs
  - uid: mondoo-aws-security-no-default-vpc-aws
    filters: asset.platform == "aws"
    mql: aws.vpcs.none(isDefault == true)
  - uid: mondoo-aws-security-emr-local-disk-encryption
    title: Ensure EMR clusters have local disk encryption enabled
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-aws-security-emr-local-disk-encryption-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-emr-local-disk-encryption-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-emr-local-disk-encryption-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-emr-local-disk-encryption-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-emr-local-disk-encryption-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon EMR clusters have local disk encryption enabled through an EMR security configuration. By default, EMR clusters do not encrypt local disk storage; instance store volumes and EBS volumes attached to cluster nodes store data in plaintext unless encryption is explicitly configured.

        **Why this matters**

        - **Sensitive intermediate data:** MapReduce, Spark, and Hive jobs frequently write temporary data, shuffle files, and spill data to local disk that may contain the sensitive records being processed.
        - **Unencrypted EBS volumes:** Without local disk encryption, EBS volumes attached to EMR nodes store data at rest without protection, making any snapshot or cross-region copy of those volumes readable.
        - **Instance store persistence:** Instance store volumes remain accessible to other workloads on the same physical host until the underlying hardware is decommissioned; encryption limits the exposure window.
        - **Compliance scope:** Regulatory frameworks that require encryption of data at rest extend to local volumes on compute instances, not only managed database or object storage services.

        **Risk mitigation**

        - **Data-at-rest protection:** Encrypting local disks ensures that intermediate processing data, temporary files, and spill data are unreadable without the associated KMS key.
        - **Snapshot and copy safety:** Encrypted volumes cannot be read from snapshots or EBS copies without access to the encryption key, preventing data exfiltration through volume-level operations.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and open the **Amazon EMR** console.
        2. In the left navigation pane, select **Security configurations**.
        3. For each security configuration, select its name to view details.
        4. Under **Encryption**, expand **At-rest encryption** and check whether **Local disk encryption** is listed as enabled.
        5. For each running cluster, select the cluster and verify it is associated with a security configuration that has local disk encryption enabled.

        A passing cluster is associated with a security configuration that has **Local disk encryption** enabled. A failing cluster has no security configuration, or its security configuration does not enable local disk encryption.

        ### Audit via CLI

        1. List all EMR clusters and check their security configurations:

        ```bash
        aws emr list-clusters --active \
          --query "Clusters[*].{Id:Id,Name:Name,SecurityConfiguration:SecurityConfiguration}"
        ```

        2. For each security configuration name returned, inspect its encryption settings:

        ```bash
        aws emr describe-security-configuration \
          --name <security-configuration-name> \
          --query "SecurityConfiguration"
        ```

        A passing cluster returns a security configuration whose `EncryptionConfiguration.AtRestEncryptionConfiguration.LocalDiskEncryptionConfiguration` is present and `EnableAtRestEncryption` is `true`. A failing cluster has no security configuration or one that lacks a `LocalDiskEncryptionConfiguration` block.
      remediation:
        - id: console
          desc: |
            To ensure EMR clusters have local disk encryption enabled using the AWS Console:

            1. Navigate to the **Amazon EMR Console**.
            2. Select **Security configurations** in the left panel.
            3. Create a new security configuration or edit an existing one.
            4. Under **Encryption**, enable **At-rest encryption**.
            5. Under **Local disk encryption**, select the encryption provider and configure the key.
            6. Apply the security configuration when creating new EMR clusters.
        - id: cli
          desc: |
            To ensure EMR clusters have local disk encryption enabled using the AWS CLI, create a security configuration with local disk encryption:

            ```bash
            aws emr create-security-configuration \
              --name "emr-encryption-config" \
              --security-configuration '{
                "EncryptionConfiguration": {
                  "EnableAtRestEncryption": true,
                  "AtRestEncryptionConfiguration": {
                    "LocalDiskEncryptionConfiguration": {
                      "EncryptionKeyProviderType": "AwsKms",
                      "AwsKmsKey": "arn:aws:kms:region:account-id:key/key-id"
                    }
                  },
                  "EnableInTransitEncryption": false
                }
              }'
            ```

            Launch an EMR cluster with the security configuration:

            ```bash
            aws emr run-job-flow \
              --name "secure-cluster" \
              --security-configuration "emr-encryption-config" \
              --release-label emr-6.15.0 \
              --instances InstanceGroups='[{"InstanceRole":"MASTER","InstanceType":"m5.xlarge","InstanceCount":1}]'
            ```
        - id: terraform
          desc: |
            To ensure EMR clusters have local disk encryption enabled in Terraform, configure an EMR security configuration with local disk encryption:

            ```hcl
            resource "aws_emr_security_configuration" "encryption" {
              name = "emr-local-disk-encryption"

              configuration = jsonencode({
                EncryptionConfiguration = {
                  EnableAtRestEncryption = true
                  AtRestEncryptionConfiguration = {
                    LocalDiskEncryptionConfiguration = {
                      EncryptionKeyProviderType = "AwsKms"
                      AwsKmsKey                = aws_kms_key.emr.arn
                    }
                  }
                  EnableInTransitEncryption = false
                }
              })
            }

            resource "aws_emr_cluster" "example" {
              name                   = "secure-cluster"
              release_label          = "emr-6.15.0"
              security_configuration = aws_emr_security_configuration.encryption.name

              # ... other configuration
            }
            ```
        - id: cloudformation
          desc: |
            To ensure EMR clusters have local disk encryption enabled in CloudFormation:

            ```yaml
            EMRSecurityConfiguration:
              Type: AWS::EMR::SecurityConfiguration
              Properties:
                Name: emr-local-disk-encryption
                SecurityConfiguration:
                  EncryptionConfiguration:
                    EnableAtRestEncryption: true
                    AtRestEncryptionConfiguration:
                      LocalDiskEncryptionConfiguration:
                        EncryptionKeyProviderType: AwsKms
                        AwsKmsKey: !GetAtt EMRKmsKey.Arn
                    EnableInTransitEncryption: false
            ```
    refs:
      - url: https://docs.aws.amazon.com/emr/latest/ManagementGuide/emr-data-encryption-options.html
        title: AWS Documentation - Encryption options for Amazon EMR
  - uid: mondoo-aws-security-emr-local-disk-encryption-aws
    filters: asset.platform == "aws-emr-cluster"
    mql: |
      aws.emr.cluster.encryptionConfiguration.atRestEnabled == true &&
      aws.emr.cluster.encryptionConfiguration.atRestConfiguration['LocalDiskEncryptionConfiguration'] != empty
  - uid: mondoo-aws-security-emr-local-disk-encryption-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_emr_security_configuration")
    mql: |
      terraform.resources.where(nameLabel == "aws_emr_security_configuration").all(
      arguments.configuration.contains("LocalDiskEncryptionConfiguration")
      )
  - uid: mondoo-aws-security-emr-local-disk-encryption-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_emr_security_configuration")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_emr_security_configuration").all(
      change.after.configuration.contains("LocalDiskEncryptionConfiguration")
      )
  - uid: mondoo-aws-security-emr-local-disk-encryption-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_emr_security_configuration")
    mql: |
      terraform.state.resources.where(type == "aws_emr_security_configuration").all(
      values.configuration.contains("LocalDiskEncryptionConfiguration")
      )
  - uid: mondoo-aws-security-emr-local-disk-encryption-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::EMR::SecurityConfiguration")
    mql: |
      cloudformation.template.resources.where(type == "AWS::EMR::SecurityConfiguration").all(
      properties['SecurityConfiguration'].string.contains("LocalDiskEncryptionConfiguration")
      )
  - uid: mondoo-aws-security-cloudtrail-cloudwatch-integration
    title: Ensure CloudTrail trails deliver logs to CloudWatch
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-pr-pt-1
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-3-3
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    variants:
      - uid: mondoo-aws-security-cloudtrail-cloudwatch-integration-aws
        tags:
          mondoo.com/filter-title: AWS CloudTrail Trail
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-cloudtrail-cloudwatch-integration-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-cloudtrail-cloudwatch-integration-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-cloudtrail-cloudwatch-integration-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-cloudtrail-cloudwatch-integration-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that AWS CloudTrail multi-region trails are configured to deliver log events to Amazon CloudWatch Logs. By default, CloudTrail writes logs only to S3; CloudWatch integration must be configured explicitly to enable real-time monitoring and metric-based alerting on API activity.

        **Why this matters**

        - **Delayed detection without integration:** Logs stored only in S3 require periodic batch analysis or separate tooling to detect suspicious activity; CloudWatch Logs enables near-real-time event processing.
        - **No native alerting from S3:** CloudTrail-to-S3 delivery does not produce CloudWatch metric filters or alarms; automated alerting on root account usage, policy changes, or unauthorized API calls requires CloudWatch integration.
        - **Incident response speed:** Security incidents detected through real-time log streaming allow responders to act during or immediately after an attack rather than hours or days later during a log review cycle.
        - **Metric filter prerequisites:** CloudWatch metric filters and alarms for controls such as root account usage, unauthorized API calls, and security group changes require CloudWatch Logs delivery to function.

        **Risk mitigation**

        - **Real-time threat detection:** CloudWatch metric filters and alarms can surface suspicious API patterns within minutes of occurrence rather than in the next scheduled log review.
        - **Automated response enablement:** CloudWatch alarms can trigger SNS notifications, Lambda functions, or Systems Manager runbooks to contain threats without manual intervention.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and open the **CloudTrail** console.
        2. In the left navigation pane, select **Trails**.
        3. For each multi-region trail, select the trail name to view its details.
        4. Under the **CloudWatch Logs** section, verify that a **Log group** ARN is listed.

        A passing trail shows a CloudWatch Logs log group ARN in the **CloudWatch Logs** section. A failing trail shows **Not configured** or an empty **Log group** field.

        ### Audit via CLI

        1. List multi-region trails and their CloudWatch Logs configuration:

        ```bash
        aws cloudtrail describe-trails \
          --include-shadow-trails false \
          --query "trailList[?IsMultiRegionTrail==\`true\`].{Name:Name,LogGroup:CloudWatchLogsLogGroupArn}"
        ```

        A passing trail returns a non-null `CloudWatchLogsLogGroupArn` value. A failing trail returns `null` or an empty string for `CloudWatchLogsLogGroupArn`.
      remediation:
        - id: console
          desc: |
            To ensure CloudTrail trails deliver logs to CloudWatch using the AWS Console:

            1. Navigate to the **AWS CloudTrail Console**.
            2. Select **Trails** in the left panel.
            3. Select the trail to configure.
            4. Under **CloudWatch Logs**, select **Edit**.
            5. Enable CloudWatch Logs delivery.
            6. Create a new log group or select an existing one.
            7. Create or select an IAM role that grants CloudTrail permissions to deliver logs to CloudWatch.
            8. Save the changes.
        - id: cli
          desc: |
            To ensure CloudTrail trails deliver logs to CloudWatch using the AWS CLI, configure CloudWatch Logs delivery for a trail:

            ```bash
            aws cloudtrail update-trail \
              --name <trail-name> \
              --cloud-watch-logs-log-group-arn arn:aws:logs:region:account-id:log-group:my-log-group:* \
              --cloud-watch-logs-role-arn arn:aws:iam::account-id:role/CloudTrail_CloudWatchLogs_Role
            ```

            Verify the configuration:

            ```bash
            aws cloudtrail describe-trails \
              --trail-name-list <trail-name> \
              --query "trailList[*].{Name:Name,CloudWatchLogsLogGroupArn:CloudWatchLogsLogGroupArn}"
            ```
        - id: terraform
          desc: |
            To ensure CloudTrail trails deliver logs to CloudWatch in Terraform, configure a CloudTrail trail with CloudWatch Logs integration:

            ```hcl
            resource "aws_cloudwatch_log_group" "cloudtrail" {
              name              = "/aws/cloudtrail/my-trail"
              retention_in_days = 90
            }

            resource "aws_cloudtrail" "example" {
              name                          = "my-trail"
              s3_bucket_name                = aws_s3_bucket.cloudtrail.id
              is_multi_region_trail         = true
              cloud_watch_logs_group_arn    = "${aws_cloudwatch_log_group.cloudtrail.arn}:*"
              cloud_watch_logs_role_arn     = aws_iam_role.cloudtrail_cloudwatch.arn
            }
            ```
        - id: cloudformation
          desc: |
            To ensure CloudTrail trails deliver logs to CloudWatch in CloudFormation, configure a CloudTrail trail with CloudWatch Logs integration:

            ```yaml
            Resources:
              CloudTrailLogGroup:
                Type: AWS::Logs::LogGroup
                Properties:
                  LogGroupName: /aws/cloudtrail/my-trail
                  RetentionInDays: 90
              CloudTrail:
                Type: AWS::CloudTrail::Trail
                Properties:
                  TrailName: my-trail
                  S3BucketName: !Ref CloudTrailBucket
                  IsMultiRegionTrail: true
                  IsLogging: true
                  CloudWatchLogsLogGroupArn: !GetAtt CloudTrailLogGroup.Arn
                  CloudWatchLogsRoleArn: !GetAtt CloudTrailRole.Arn
            ```
    refs:
      - url: https://docs.aws.amazon.com/awscloudtrail/latest/userguide/send-cloudtrail-events-to-cloudwatch-logs.html
        title: AWS Documentation - Sending events to CloudWatch Logs
  - uid: mondoo-aws-security-cloudtrail-cloudwatch-integration-aws
    filters: asset.platform == "aws-cloudtrail-trail" && aws.cloudtrail.trail.isMultiRegionTrail == true
    mql: |
      aws.cloudtrail.trail.logGroup != null
  - uid: mondoo-aws-security-cloudtrail-cloudwatch-integration-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_cloudtrail")
    mql: |
      terraform.resources.where(nameLabel == "aws_cloudtrail" && arguments['is_multi_region_trail'] == true).all(
        arguments['cloud_watch_logs_group_arn'] != empty
      )
  - uid: mondoo-aws-security-cloudtrail-cloudwatch-integration-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_cloudtrail")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_cloudtrail" && change.after['is_multi_region_trail'] == true).all(
        change.after['cloud_watch_logs_group_arn'] != empty
      )
  - uid: mondoo-aws-security-cloudtrail-cloudwatch-integration-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_cloudtrail")
    mql: |
      terraform.state.resources.where(type == "aws_cloudtrail" && values['is_multi_region_trail'] == true).all(
        values['cloud_watch_logs_group_arn'] != empty
      )
  - uid: mondoo-aws-security-cloudtrail-cloudwatch-integration-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::CloudTrail::Trail")
    mql: |
      cloudformation.template.resources.where(type == "AWS::CloudTrail::Trail").all(
        properties['CloudWatchLogsLogGroupArn'] != empty
      )
  - uid: mondoo-aws-security-elasticache-backup-retention
    title: Ensure ElastiCache clusters have backup retention
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-bcr-08
      compliance/dora: dora-art-12
      compliance/hipaa: hipaa-security-ss164-308-a-7-ii-a-contingency-plan-data-backup-plan
      compliance/iso-27001-2022: iso-27001-2022-a-8-13
      compliance/nis-2: nis-2-21-2-c
      compliance/nist-csf-1: nist-csf-1-pr-ip-4
      compliance/nist-csf-2: nist-csf-2-pr-ds-11
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cp-9
      compliance/nist-sp-800-171: false
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc9-1-1
      compliance/vda-isa-5: false
    variants:
      - uid: mondoo-aws-security-elasticache-backup-retention-aws
        tags:
          mondoo.com/filter-title: AWS ElastiCache Cluster
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-elasticache-backup-retention-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-elasticache-backup-retention-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-elasticache-backup-retention-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-elasticache-backup-retention-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Redis ElastiCache clusters have automatic snapshot retention configured with a retention period greater than zero. By default, ElastiCache Redis clusters are created with `SnapshotRetentionLimit` set to 0, which disables automatic backups entirely.

        **Why this matters**

        - **No recovery without backups:** An attacker with `elasticache:ModifyCacheCluster` permissions or direct Redis access can flush all cache data, and without snapshots no recovery path exists.
        - **Session and state destruction:** Cache clusters frequently store session tokens, authentication state, and application configuration; destruction without backups causes cascading authentication failures and service outages.
        - **Ransomware targeting:** Managed cloud data stores including ElastiCache are targeted by ransomware-style attacks that destroy data to maximize business impact and pressure organizations into paying ransoms.
        - **Disabled by default:** AWS ships ElastiCache with backups off, meaning clusters deployed without explicit retention configuration have zero recovery capability from the moment of creation.

        **Risk mitigation**

        - **Ransomware resilience:** Automatic snapshots ensure data can be restored after adversarial destruction, removing the attacker's leverage.
        - **Recovery capability:** Retained snapshots enable restoration to a known-good cache state after a data destruction event, limiting downtime and cascading failures.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and open the **Amazon ElastiCache** console.
        2. In the left navigation pane, select **Redis clusters**.
        3. For each cluster, select the cluster name to view its details.
        4. On the **Description** tab, locate the **Backup retention period** field.

        A passing cluster shows a **Backup retention period** greater than 0 days. A failing cluster shows **Backup retention period: 0** or **Disabled**.

        ### Audit via CLI

        1. List Redis replication groups and their snapshot retention settings:

        ```bash
        aws elasticache describe-replication-groups \
          --query "ReplicationGroups[*].{Id:ReplicationGroupId,SnapshotRetentionLimit:SnapshotRetentionLimit}"
        ```

        A passing replication group returns a `SnapshotRetentionLimit` value greater than `0`. A failing replication group returns `0` for `SnapshotRetentionLimit`.
      remediation:
        - id: console
          desc: |
            To ensure ElastiCache clusters have backup retention using the AWS Console:

            1. Navigate to the **Amazon ElastiCache Console**.
            2. Select **Redis clusters** in the left panel.
            3. Select the cluster to configure.
            4. Choose **Modify**.
            5. Under **Backup**, set **Enable automatic backups** to **Yes**.
            6. Set the **Backup retention period** to an appropriate value such as 7 days.
            7. Save the changes.
        - id: cli
          desc: |
            To ensure ElastiCache clusters have backup retention using the AWS CLI, enable backup retention for a Redis replication group:

            ```bash
            aws elasticache modify-replication-group \
              --replication-group-id <replication-group-id> \
              --snapshot-retention-limit 7 \
              --apply-immediately
            ```

            Verify the backup configuration:

            ```bash
            aws elasticache describe-replication-groups \
              --replication-group-id <replication-group-id> \
              --query "ReplicationGroups[*].{Id:ReplicationGroupId,SnapshotRetentionLimit:SnapshotRetentionLimit}"
            ```
        - id: terraform
          desc: |
            To ensure ElastiCache clusters have backup retention in Terraform, configure an ElastiCache replication group with backup retention:

            ```hcl
            resource "aws_elasticache_replication_group" "example" {
              replication_group_id = "example-redis"
              description          = "Example Redis cluster"
              engine               = "redis"
              node_type            = "cache.r6g.large"
              num_cache_clusters   = 2

              snapshot_retention_limit = 7
            }
            ```
        - id: cloudformation
          desc: |
            To ensure ElastiCache clusters have backup retention in CloudFormation, configure an ElastiCache replication group with backup retention:

            ```yaml
            Resources:
              RedisReplicationGroup:
                Type: AWS::ElastiCache::ReplicationGroup
                Properties:
                  ReplicationGroupDescription: Example Redis cluster
                  Engine: redis
                  CacheNodeType: cache.r6g.large
                  NumCacheClusters: 2
                  SnapshotRetentionLimit: 7
            ```
    refs:
      - url: https://docs.aws.amazon.com/AmazonElastiCache/latest/red-ug/backups.html
        title: AWS Documentation - Backup and restore for ElastiCache for Redis
  - uid: mondoo-aws-security-elasticache-backup-retention-aws
    filters: asset.platform == "aws-elasticache-cluster" && aws.elasticache.cluster.engine == "redis"
    mql: aws.elasticache.cluster.snapshotRetentionLimit > 0
  - uid: mondoo-aws-security-elasticache-backup-retention-terraform-hcl
