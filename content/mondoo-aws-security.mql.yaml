      )
  - uid: mondoo-aws-security-timestream-influxdb-not-public-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_timestreaminfluxdb_db_instance")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_timestreaminfluxdb_db_instance").all(
      change.after.publicly_accessible != true
      )
