    mql: |
      cloudformation.template.resources.where(type == "AWS::Transfer::Server").all(
        properties['LoggingRole'] != null && properties['LoggingRole'] != ""
      )
  - uid: mondoo-aws-security-transfer-security-policy
    title: Ensure Transfer Family servers use current security policies
    impact: 70
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/vda-isa-5: vda-isa-5-5-1-2
    variants:
      - uid: mondoo-aws-security-transfer-security-policy-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-transfer-security-policy-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-transfer-security-policy-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-transfer-security-policy-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-transfer-security-policy-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that AWS Transfer Family servers are not using the deprecated TransferSecurityPolicy-2018-11 security policy. This policy supports older, weaker cryptographic algorithms that are no longer considered secure.

        **Why this matters**

        - The 2018-11 security policy allows outdated ciphers and key exchange algorithms that are vulnerable to known attacks.
        - Newer security policies enforce stronger cryptographic standards, including TLS 1.2+ and modern cipher suites.
        - PCI DSS 4.2.1 and NIST SP 800-53 SC-7 require the use of strong cryptographic protocols.

        **Risk mitigation**

        - **Cryptographic strength:** Modern security policies enforce stronger encryption algorithms and key exchange methods.
        - **Protocol security:** Newer policies deprecate weak protocols and cipher suites.
        - **Compliance:** Meets cryptographic requirements across PCI DSS, HIPAA, and SOC 2 frameworks.
      remediation:
        - id: console
          desc: |
            To ensure Transfer Family servers use current security policies using the AWS Console:

            1. Navigate to the **AWS Transfer Family Console** and select **Servers**.
            2. Select the server you want to configure.
            3. Choose **Edit**.
            4. Under **Security policy**, select a current policy such as **TransferSecurityPolicy-2024-01**.
            5. Choose **Save**.
        - id: cli
          desc: |
            To ensure Transfer Family servers use current security policies using the AWS CLI:

            ```bash
            aws transfer update-server \
              --server-id <server-id> \
              --security-policy-name TransferSecurityPolicy-2024-01
            ```
        - id: terraform
          desc: |
            To ensure Transfer Family servers use current security policies in Terraform:

            ```hcl
            resource "aws_transfer_server" "example" {
              protocols            = ["SFTP"]
              security_policy_name = "TransferSecurityPolicy-2024-01"
            }
            ```
        - id: cloudformation
          desc: |
            Pin `SecurityPolicyName` on every `AWS::Transfer::Server` to a current policy. The legacy `TransferSecurityPolicy-2018-11` permits TLS 1.0/1.1 and weak ciphers; pick the most recent year-prefixed policy supported in your region:

            ```yaml
            Resources:
              TransferServer:
                Type: AWS::Transfer::Server
                Properties:
                  SecurityPolicyName: TransferSecurityPolicy-2024-01
            ```
    refs:
      - url: https://docs.aws.amazon.com/transfer/latest/userguide/security-policies.html
        title: AWS Documentation - Transfer Family security policies
  - uid: mondoo-aws-security-transfer-security-policy-aws
    filters: asset.platform == "aws"
    mql: |
      aws.transfer.servers.all(securityPolicyName != "TransferSecurityPolicy-2018-11")
  - uid: mondoo-aws-security-transfer-security-policy-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_transfer_server")
    mql: |
