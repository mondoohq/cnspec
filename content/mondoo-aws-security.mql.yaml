    docs:
      desc: |
        This check ensures that AWS Glue security configurations have S3 encryption enabled. When Glue jobs and crawlers write data to S3, the security configuration controls whether that data is encrypted. Without S3 encryption enabled in the security configuration, ETL output data is stored in plaintext, potentially exposing sensitive information to unauthorized access.

        **Why this matters**

        - Glue ETL jobs frequently write transformed data to S3 buckets that may contain sensitive or regulated information such as PII, financial records, or healthcare data.
        - A security configuration with S3 encryption set to DISABLED provides no protection for output data, even if the security configuration is assigned to a job or crawler.
        - Without Glue-level S3 encryption, data protection depends entirely on the target bucket's default encryption settings, which may be misconfigured or absent.
        - Unencrypted ETL output in S3 can be read by any principal with S3 read permissions, without requiring KMS key access as an additional access control layer.
        - S3 server-side encryption (SSE-KMS or SSE-S3) ensures data is encrypted at rest regardless of the target bucket's default encryption settings.

        **Risk mitigation**

        - **Data-at-rest encryption:** Ensures all S3 output from Glue jobs and crawlers is encrypted, protecting sensitive data from unauthorized access.
        - **Defense in depth:** Provides encryption at the Glue level independent of S3 bucket policies, ensuring protection even if bucket-level controls are misconfigured.
        - **Access control:** When using SSE-KMS, adds KMS key permissions as an additional access control layer beyond IAM policies for S3 access.
        - **Compliance:** Meets encryption requirements for data processing output across frameworks such as NIST SP 800-53 SC-28 and ISO 27001.
      remediation:
        - id: console
          desc: |
            To ensure AWS Glue security configurations encrypt S3 targets using the AWS Console:

            1. Navigate to the AWS Glue Console.
            2. Select **Security configurations** in the left panel.
            3. Select the security configuration to update, or create a new one.
            4. Under **S3 encryption**, select **SSE-KMS** or **SSE-S3** and provide a KMS key if using SSE-KMS.
            5. Select **Save**.
        - id: cli
          desc: |
            To ensure AWS Glue security configurations encrypt S3 targets using the AWS CLI, create or update a security configuration with S3 encryption:

            ```bash
            aws glue create-security-configuration \
              --name my-security-config \
              --encryption-configuration '{
                "S3Encryption": [{"S3EncryptionMode": "SSE-KMS", "KmsKeyArn": "arn:aws:kms:region:account-id:key/key-id"}]
              }'
            ```
        - id: terraform
          desc: |
            To ensure AWS Glue security configurations encrypt S3 targets in Terraform:

            ```hcl
            resource "aws_glue_security_configuration" "example" {
              name = "example-security-config"

              encryption_configuration {
                s3_encryption {
                  s3_encryption_mode = "SSE-KMS"
                  kms_key_arn        = aws_kms_key.glue.arn
                }
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure AWS Glue security configurations encrypt S3 targets in CloudFormation:

            ```yaml
            Resources:
              GlueSecurityConfiguration:
                Type: AWS::Glue::SecurityConfiguration
                Properties:
                  Name: example-security-config
                  EncryptionConfiguration:
                    S3Encryptions:
                      - S3EncryptionMode: SSE-KMS
                        KmsKeyArn: !GetAtt GlueKMSKey.Arn
            ```
    refs:
      - url: https://docs.aws.amazon.com/glue/latest/dg/encryption-security-configuration.html
        title: AWS Documentation - Setting up encryption in AWS Glue
