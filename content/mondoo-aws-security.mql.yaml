        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/icon: aws
    docs:
      desc: |
        This check ensures that a CloudWatch metric filter and alarm exist to detect changes to AWS CloudTrail configuration. CloudTrail is the primary audit log for AWS API activity, and any modifications to its configuration could indicate an attempt to disable or circumvent logging.

        Attackers who gain sufficient privileges may attempt to disable CloudTrail to cover their tracks. Immediate alerting on CloudTrail configuration changes ensures that any tampering with the audit log system is detected and investigated promptly.

        CIS AWS Foundations Benchmark requires monitoring CloudTrail configuration changes to protect the integrity of the audit logging infrastructure itself.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            1. Navigate to **CloudWatch** and select **Log groups**.
            2. Select the log group associated with your CloudTrail trail.
            3. Choose **Actions** > **Create metric filter**.
            4. Enter a filter pattern matching `CreateTrail`, `UpdateTrail`, `DeleteTrail`, `StartLogging`, and `StopLogging` events.
            5. Assign a metric name and namespace, then choose **Create metric filter**.
            6. Navigate to **Alarms** > **Create alarm**, select the new metric, and configure SNS notification.
        - id: cli
          desc: |
            **Using AWS CLI**

            Create the metric filter:

            ```bash
            aws logs put-metric-filter \
              --log-group-name <cloudtrail-log-group> \
              --filter-name CloudTrailConfigChanges \
              --filter-pattern '{ ($.eventName = CreateTrail) || ($.eventName = UpdateTrail) || ($.eventName = DeleteTrail) || ($.eventName = StartLogging) || ($.eventName = StopLogging) }' \
              --metric-transformations metricName=CloudTrailConfigChanges,metricNamespace=CISBenchmark,metricValue=1
            ```

            Create the alarm:

            ```bash
            aws cloudwatch put-metric-alarm \
              --alarm-name CloudTrailConfigChanges \
              --metric-name CloudTrailConfigChanges \
              --namespace CISBenchmark \
              --statistic Sum \
              --period 300 \
              --threshold 1 \
              --comparison-operator GreaterThanOrEqualToThreshold \
              --evaluation-periods 1 \
              --alarm-actions <sns-topic-arn>
            ```
