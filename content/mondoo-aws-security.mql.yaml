  - uid: mondoo-aws-security-eks-cluster-logging-enabled
    title: Ensure Amazon EKS control plane logging is enabled
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-pr-pt-1
      compliance/nist-csf-2: nist-csf-2-pr-ps-04
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    variants:
      - uid: mondoo-aws-security-eks-cluster-logging-enabled-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-eks-cluster-logging-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-eks-cluster-logging-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-eks-cluster-logging-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-eks-cluster-logging-enabled-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon EKS clusters have control plane logging enabled by verifying that at least one log type is configured as active in the cluster's logging configuration. By default, EKS control plane logging is disabled when a cluster is created, meaning API server, audit, authenticator, controller manager, and scheduler events are not forwarded to CloudWatch Logs.

        **Why this matters**

        - **No audit trail for Kubernetes API activity:** Without the audit log type enabled, there is no record of who called the Kubernetes API, what resources they accessed, and what changes they made, eliminating the ability to detect unauthorized access or configuration changes.
        - **Authentication events go unrecorded:** The authenticator log type captures credential validation decisions; without it, failed and successful authentication attempts against the cluster API are invisible to security monitoring.
        - **Control plane failures are undiagnosable:** Scheduler and controller manager logs are essential for diagnosing workload scheduling failures and controller reconciliation errors that may indicate a compromised or misconfigured cluster.

        **Risk mitigation**

        - **Enable audit logging as a minimum:** The audit log type records all individual API requests and is the most critical for security monitoring, as it surfaces privilege escalation attempts, unauthorized resource modifications, and lateral movement within the cluster.
        - **Forward logs to CloudWatch for alerting:** Routing control plane logs to CloudWatch Logs enables metric filters and alarms that can alert on unauthorized API calls, repeated authentication failures, or anomalous resource access patterns in near real time.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and navigate to the Amazon EKS service.
        2. Select **Clusters** in the left navigation pane and choose a cluster.
        3. Open the **Observability** tab.
        4. Review the **Control plane logging** section to see which log types are enabled.

        A passing cluster has at least one log type (and ideally all five: API server, Audit, Authenticator, Controller manager, Scheduler) shown as **Enabled**. A failing cluster shows all log types as **Disabled**.

        ### Audit via CLI

        1. Check the control plane logging configuration for an EKS cluster:

        ```bash
        aws eks describe-cluster \
          --name <cluster-name> \
          --query "cluster.logging.clusterLogging"
        ```

        A passing cluster returns at least one entry with `"enabled": true` in the `clusterLogging` array. A failing cluster returns an empty array, null, or an array where every entry has `"enabled": false`.

      remediation:
        - id: console
          desc: |
            To ensure Amazon EKS control plane logging is enabled using the AWS Console:

            1. Navigate to the Amazon EKS Console.
            2. Select the EKS cluster you want to configure.
            3. In the Observability tab, select Manage logging.
            4. Enable all log types: API server, Audit, Authenticator, Controller manager, and Scheduler.
            5. Select Save changes.
        - id: cli
          desc: |
            To ensure Amazon EKS control plane logging is enabled using the AWS CLI, check the current logging configuration for an EKS cluster:

            ```bash
            aws eks describe-cluster --name <cluster_name> \
              --query "cluster.logging.clusterLogging"
            ```

            Enable all control plane log types:

            ```bash
            aws eks update-cluster-config --name <cluster_name> \
              --logging '{"clusterLogging":[{"types":["api","audit","authenticator","controllerManager","scheduler"],"enabled":true}]}'
            ```
        - id: terraform
          desc: |
            To ensure Amazon EKS control plane logging is enabled in Terraform:

            ```hcl
            resource "aws_eks_cluster" "example" {
              name     = "example-cluster"
              role_arn = aws_iam_role.eks_role.arn

              vpc_config {
                subnet_ids = [aws_subnet.eks_subnet.id]
              }

              enabled_cluster_log_types = [
                "api",
                "audit",
                "authenticator",
                "controllerManager",
                "scheduler"
              ]
            }
            ```
        - id: cloudformation
          desc: |
            To ensure Amazon EKS control plane logging is enabled in CloudFormation:

            ```yaml
            Resources:
              MyEKSCluster:
                Type: AWS::EKS::Cluster
                Properties:
                  Name: example-cluster
                  RoleArn: !GetAtt eksRole.Arn
                  ResourcesVpcConfig:
                    SubnetIds:
                      - !Ref eksSubnet
                  Logging:
                    ClusterLogging:
                      EnabledTypes:
                        - Type: api
                        - Type: audit
                        - Type: authenticator
                        - Type: controllerManager
                        - Type: scheduler
            ```
    refs:
      - url: https://docs.aws.amazon.com/eks/latest/userguide/control-plane-logs.html
        title: AWS Documentation - Amazon EKS control plane logging
      - url: https://docs.aws.amazon.com/securityhub/latest/userguide/eks-controls.html
        title: AWS Documentation - EKS controls
  - uid: mondoo-aws-security-eks-cluster-logging-enabled-aws
    filters: asset.platform == "aws-eks-cluster"
    mql: |
      aws.eks.cluster.logging['clusterLogging'] != null
      aws.eks.cluster.logging['clusterLogging'].any(_['enabled'] == true)
  - uid: mondoo-aws-security-eks-cluster-logging-enabled-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_eks_cluster")
    mql: |
      terraform.resources.where(nameLabel == "aws_eks_cluster").all(
        arguments.enabled_cluster_log_types != empty
      )
  - uid: mondoo-aws-security-eks-cluster-logging-enabled-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_eks_cluster")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_eks_cluster").all(
        change.after.enabled_cluster_log_types != empty
      )
  - uid: mondoo-aws-security-eks-cluster-logging-enabled-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_eks_cluster")
    mql: |
      terraform.state.resources.where(type == "aws_eks_cluster").all(
        values.enabled_cluster_log_types != empty
      )
  - uid: mondoo-aws-security-eks-cluster-logging-enabled-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::EKS::Cluster")
    mql: |
      cloudformation.template.resources.where(type == "AWS::EKS::Cluster").all(
      properties['EnabledClusterLogTypes'] != empty
      )
  - uid: mondoo-aws-security-opensearch-encrypted-at-rest
    title: Ensure OpenSearch Service domains have encryption at rest
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-aws-security-opensearch-encrypted-at-rest-aws
        tags:
          mondoo.com/filter-title: AWS OpenSearch Domain
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-opensearch-encrypted-at-rest-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-opensearch-encrypted-at-rest-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-opensearch-encrypted-at-rest-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-opensearch-encrypted-at-rest-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon OpenSearch Service domains are configured to encrypt data at rest using AWS Key Management Service (KMS). By default, OpenSearch Service does not encrypt data at rest unless explicitly enabled, leaving stored indexes and snapshots in plaintext on the underlying EBS volumes.

        **Why this matters**

        - **Plaintext exposure:** Without encryption, anyone with physical or logical access to the underlying storage can read index data, snapshots, and automated backups.
        - **Breach impact:** If an OpenSearch domain is compromised, unencrypted data can be exfiltrated immediately with no cryptographic barrier.
        - **Key auditability:** KMS-managed encryption provides centralized key rotation, access control policies, and CloudTrail audit records for every decryption event.
        - **Defense in depth:** Encryption at rest is a foundational layer that protects data even when network and IAM controls fail.

        **Risk mitigation**

        - **Unauthorized access prevention:** Ensures that raw storage volumes cannot be read without valid KMS key permissions.
        - **Incident containment:** Limits the value of data obtained during a storage-layer breach to encrypted ciphertext.
        - **Key lifecycle control:** AWS KMS enables key rotation and revocation, allowing teams to respond quickly if credentials are compromised.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and navigate to the Amazon OpenSearch Service.
        2. Select **Domains** in the left navigation pane and choose a domain.
        3. Open the **Security** tab.
        4. Review the **Encryption at rest** field.

        A passing domain shows **Encryption at rest: Enabled**. A failing domain shows **Encryption at rest: Disabled**.

        ### Audit via CLI

        1. Retrieve the encryption-at-rest settings for an OpenSearch domain:

        ```bash
        aws opensearch describe-domain \
          --domain-name <domain-name> \
          --query "DomainStatus.EncryptionAtRestOptions"
        ```

        A passing domain returns `{"Enabled": true, ...}`. A failing domain returns `{"Enabled": false}` or does not include the `EncryptionAtRestOptions` key.

      remediation:
        - id: console
          desc: |
            To ensure OpenSearch Service domains have encryption at rest using the AWS Console:

            1.  Navigate to the Amazon OpenSearch Service Console.
            2.  Select Domains in the left panel.
            3.  Select an OpenSearch domain and go to the Security tab.
            4.  Under Encryption at rest, check if encryption is enabled.
            5.  If encryption is not enabled, create a new OpenSearch domain with encryption:
              - Select Create domain.
              - Under Encryption at rest, enable encrypt data at rest.
              - Choose a customer-managed KMS key (CMK) if required.
              - Complete the domain creation process.
            6.  Migrate data from the unencrypted domain to the new encrypted domain, then delete the unencrypted domain.
        - id: cli
          desc: |
            To ensure OpenSearch Service domains have encryption at rest using the AWS CLI, check if an OpenSearch domain is encrypted:

            ```bash
            aws opensearch describe-domain --domain-name <domain-name> --query "DomainStatus.EncryptionAtRestOptions"
            ```

            If encryption is not enabled, create a new encrypted OpenSearch domain:

            ```bash
            aws opensearch create-domain \
            --domain-name "secure-opensearch-domain" \
            --encryption-at-rest-options Enabled=true,KmsKeyId="arn:aws:kms:region:account-id:key/key-id"
            ```
        - id: terraform
          desc: |
            To ensure OpenSearch Service domains have encryption at rest in Terraform, ensure OpenSearch Service encryption is enabled using AWS KMS:

            ```hcl
            resource "aws_kms_key" "opensearch_kms_key" {
              description         = "KMS key for OpenSearch encryption"
              enable_key_rotation = true
            }

            resource "aws_opensearch_domain" "secure_opensearch" {
              domain_name    = "secure-opensearch-domain"
              engine_version = "OpenSearch_2.11"

              encrypt_at_rest {
                enabled    = true
                kms_key_id = aws_kms_key.opensearch_kms_key.arn
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure OpenSearch Service domains have encryption at rest in CloudFormation, enable encryption at rest for OpenSearch domains:

            ```yaml
            Resources:
              SecureOpenSearchDomain:
                Type: "AWS::OpenSearchService::Domain"
                Properties:
                  DomainName: "secure-opensearch-domain"
                  EngineVersion: "OpenSearch_2.11"
                  EncryptionAtRestOptions:
                    Enabled: true
                    KmsKeyId: !Ref OpenSearchKMSKey

              OpenSearchKMSKey:
                Type: "AWS::KMS::Key"
                Properties:
                  Description: "KMS key for OpenSearch encryption"
                  EnableKeyRotation: true
            ```
    refs:
      - url: https://docs.aws.amazon.com/opensearch-service/latest/developerguide/encryption-at-rest.html
        title: Encryption of Data at Rest for Amazon OpenSearch Service
      - url: https://docs.aws.amazon.com/securityhub/latest/userguide/opensearch-controls.html
        title: AWS Documentation - OpenSearch controls
  - uid: mondoo-aws-security-opensearch-encrypted-at-rest-aws
    filters: asset.platform == "aws-opensearch-domain"
    mql: aws.opensearch.domain.encryptionAtRestEnabled == true
  - uid: mondoo-aws-security-opensearch-encrypted-at-rest-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_opensearch_domain")
    mql: |
      terraform.resources.where(nameLabel == "aws_opensearch_domain").all(
        blocks.where(type == "encrypt_at_rest") != empty &&
        blocks.where(type == "encrypt_at_rest").all(arguments.enabled == true)
      )
  - uid: mondoo-aws-security-opensearch-encrypted-at-rest-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_opensearch_domain")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_opensearch_domain").all(
        change.after.encrypt_at_rest != empty &&
        change.after.encrypt_at_rest.all(enabled == true)
      )
  - uid: mondoo-aws-security-opensearch-encrypted-at-rest-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_opensearch_domain")
    mql: |
      terraform.state.resources.where(type == "aws_opensearch_domain").all(
        values.encrypt_at_rest != empty &&
        values.encrypt_at_rest.all(enabled == true)
      )
  - uid: mondoo-aws-security-opensearch-encrypted-at-rest-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::OpenSearchService::Domain")
    mql: |
      cloudformation.template.resources.where(type == "AWS::OpenSearchService::Domain").all(
      properties['EncryptionAtRestOptions'] != empty &&
      properties['EncryptionAtRestOptions']['Enabled'] == true
      )
  - uid: mondoo-aws-security-opensearch-enforce-https
    title: Ensure Amazon OpenSearch Service domains enforce HTTPS
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    variants:
      - uid: mondoo-aws-security-opensearch-enforce-https-aws
        tags:
          mondoo.com/filter-title: AWS OpenSearch Domain
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-opensearch-enforce-https-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-opensearch-enforce-https-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-opensearch-enforce-https-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-opensearch-enforce-https-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon OpenSearch Service domains are configured to enforce HTTPS for all connections. Without HTTPS enforcement, data transmitted between clients and the OpenSearch domain is unencrypted, exposing sensitive search queries, indexed data, and authentication credentials to potential interception.

        **Why this matters**

        - Unencrypted traffic can be intercepted by network-level attackers, exposing sensitive data and credentials.
        - OpenSearch domains often contain business-critical or personally identifiable information (PII) that must be protected in transit.
        - AWS Security Hub control OpenSearch.8 requires HTTPS enforcement on OpenSearch domains.
        - Compliance frameworks such as PCI DSS, HIPAA, and SOC 2 require encryption of data in transit.

        **Risk mitigation**

        - **Data protection:** Encrypts all communication between clients and the OpenSearch cluster.
        - **Credential security:** Prevents exposure of authentication tokens and API keys in transit.
        - **Compliance:** Aligns with AWS Security Hub, CIS, and regulatory requirements for encryption in transit.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and navigate to the Amazon OpenSearch Service.
        2. Select **Domains** and choose a domain.
        3. Open the **Security** tab.
        4. Review the **Domain endpoint options** section for the **Require HTTPS** setting.

        A passing domain shows **Require HTTPS: Enabled**. A failing domain shows **Require HTTPS: Disabled**.

        ### Audit via CLI

        1. Check whether HTTPS is enforced for an OpenSearch domain:

        ```bash
        aws opensearch describe-domain \
          --domain-name <domain-name> \
          --query "DomainStatus.DomainEndpointOptions.EnforceHTTPS"
        ```

        A passing domain returns `true`. A failing domain returns `false` or does not include the `EnforceHTTPS` key.

      remediation:
        - id: console
          desc: |
            To ensure Amazon OpenSearch Service domains enforce HTTPS using the AWS Console:

            1. Navigate to the Amazon OpenSearch Service Console.
            2. Select the domain you want to update.
            3. Select Edit security configuration.
            4. Under Domain endpoint options, enable Require HTTPS for all traffic to the domain.
            5. Select Save changes.
        - id: cli
          desc: |
            To ensure Amazon OpenSearch Service domains enforce HTTPS using the AWS CLI, check if HTTPS is enforced on a domain:

            ```bash
            aws opensearch describe-domain --domain-name <domain-name> \
              --query "DomainStatus.DomainEndpointOptions.EnforceHTTPS"
            ```

            Enable HTTPS enforcement:

            ```bash
            aws opensearch update-domain-config --domain-name <domain-name> \
              --domain-endpoint-options '{"EnforceHTTPS": true, "TLSSecurityPolicy": "Policy-Min-TLS-1-2-2019-07"}'
            ```
        - id: terraform
          desc: |
            To ensure Amazon OpenSearch Service domains enforce HTTPS in Terraform:

            ```hcl
            resource "aws_opensearch_domain" "example" {
              domain_name    = "example-domain"
              engine_version = "OpenSearch_2.11"

              domain_endpoint_options {
                enforce_https       = true
                tls_security_policy = "Policy-Min-TLS-1-2-2019-07"
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure Amazon OpenSearch Service domains enforce HTTPS in CloudFormation:

            ```yaml
            Resources:
              OpenSearchDomain:
                Type: "AWS::OpenSearchService::Domain"
                Properties:
                  DomainName: "example-domain"
                  EngineVersion: "OpenSearch_2.11"
                  DomainEndpointOptions:
                    EnforceHTTPS: true
                    TLSSecurityPolicy: "Policy-Min-TLS-1-2-2019-07"
            ```
