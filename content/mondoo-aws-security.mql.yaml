      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/soc2-2017: soc2-control-cc7-2-1
    variants:
      - uid: mondoo-aws-security-cloudwatch-vpc-change-alarm-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/icon: aws
    docs:
      desc: |
        This check ensures that a CloudWatch metric filter and alarm exist to detect changes to Virtual Private Clouds (VPCs). VPCs form the foundational network isolation layer in AWS, and changes to VPC configuration can have broad security implications across all resources within the VPC.

        Unauthorized creation, modification, or deletion of VPCs could be indicators of an attacker attempting to establish persistence or pivot within your AWS environment. Monitoring VPC changes provides visibility into fundamental network topology modifications that could affect your entire infrastructure.

        CIS AWS Foundations Benchmark recommends monitoring VPC changes to detect unauthorized modifications to your network isolation boundaries and maintain visibility into changes to the core network infrastructure.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            1. Navigate to **CloudWatch** and select **Log groups**.
            2. Select the log group associated with your CloudTrail trail.
            3. Choose **Actions** > **Create metric filter**.
            4. Enter a filter pattern matching `CreateVpc`, `DeleteVpc`, `ModifyVpcAttribute`, `AcceptVpcPeeringConnection`, `CreateVpcPeeringConnection`, `DeleteVpcPeeringConnection`, `RejectVpcPeeringConnection`, `AttachClassicLinkVpc`, `DetachClassicLinkVpc`, `DisableVpcClassicLink`, and `EnableVpcClassicLink`.
            5. Assign a metric name and namespace, then choose **Create metric filter**.
            6. Navigate to **Alarms** > **Create alarm**, select the new metric, and configure SNS notification.
        - id: cli
          desc: |
            **Using AWS CLI**

            Create the metric filter:

            ```bash
            aws logs put-metric-filter \
              --log-group-name <cloudtrail-log-group> \
              --filter-name VPCChanges \
              --filter-pattern '{ ($.eventName = CreateVpc) || ($.eventName = DeleteVpc) || ($.eventName = ModifyVpcAttribute) || ($.eventName = AcceptVpcPeeringConnection) || ($.eventName = CreateVpcPeeringConnection) || ($.eventName = DeleteVpcPeeringConnection) || ($.eventName = RejectVpcPeeringConnection) }' \
              --metric-transformations metricName=VPCChanges,metricNamespace=CISBenchmark,metricValue=1
            ```

            Create the alarm:

            ```bash
            aws cloudwatch put-metric-alarm \
              --alarm-name VPCChanges \
              --metric-name VPCChanges \
              --namespace CISBenchmark \
              --statistic Sum \
              --period 300 \
              --threshold 1 \
              --comparison-operator GreaterThanOrEqualToThreshold \
              --evaluation-periods 1 \
              --alarm-actions <sns-topic-arn>
            ```
    refs:
      - url: https://docs.aws.amazon.com/AmazonCloudWatch/latest/monitoring/CloudWatch_Alarms.html
        title: Amazon CloudWatch Alarms
  - uid: mondoo-aws-security-cloudwatch-vpc-change-alarm-aws
    filters: asset.platform == "aws"
    mql: |
      aws.cloudwatch.logGroups.any(
        metricsFilters.any(
          filterPattern.contains("CreateVpc") || filterPattern.contains("DeleteVpc")
        )
      )
  - uid: mondoo-aws-security-cloudwatch-org-change-alarm
    title: Ensure log metric filter exists for organization changes
    impact: 30
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/soc2-2017: soc2-control-cc7-2-1
    variants:
      - uid: mondoo-aws-security-cloudwatch-org-change-alarm-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/icon: aws
    docs:
      desc: |
        This check ensures that a CloudWatch metric filter and alarm exist to detect changes to AWS Organizations configuration. AWS Organizations allows central governance of multiple AWS accounts, and unauthorized changes to organizational structure or policies can have broad security implications across your entire AWS footprint.

        Changes to Service Control Policies (SCPs), organizational units, or account membership in AWS Organizations can override security controls applied at the account level. Monitoring these changes is critical for organizations using AWS Organizations to enforce security guardrails across all member accounts.

        CIS AWS Foundations Benchmark recommends monitoring AWS Organizations changes to detect unauthorized modifications to your multi-account governance structure and service control policies.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            1. Navigate to **CloudWatch** and select **Log groups**.
            2. Select the log group associated with your CloudTrail trail in the management account.
            3. Choose **Actions** > **Create metric filter**.
            4. Enter a filter pattern matching events from `organizations.amazonaws.com`.
            5. Assign a metric name and namespace, then choose **Create metric filter**.
            6. Navigate to **Alarms** > **Create alarm**, select the new metric, and configure SNS notification.
        - id: cli
          desc: |
            **Using AWS CLI**

            Create the metric filter:

            ```bash
            aws logs put-metric-filter \
              --log-group-name <cloudtrail-log-group> \
              --filter-name AWSOrganizationsChanges \
              --filter-pattern '{ ($.eventSource = organizations.amazonaws.com) && (($.eventName = AcceptHandshake) || ($.eventName = AttachPolicy) || ($.eventName = CreateAccount) || ($.eventName = CreateOrganizationalUnit) || ($.eventName = CreatePolicy) || ($.eventName = DeclineHandshake) || ($.eventName = DeleteOrganization) || ($.eventName = DeleteOrganizationalUnit) || ($.eventName = DeletePolicy) || ($.eventName = DetachPolicy) || ($.eventName = DisablePolicyType) || ($.eventName = EnablePolicyType) || ($.eventName = InviteAccountToOrganization) || ($.eventName = LeaveOrganization) || ($.eventName = MoveAccount) || ($.eventName = RemoveAccountFromOrganization) || ($.eventName = UpdatePolicy) || ($.eventName = UpdateOrganizationalUnit)) }' \
              --metric-transformations metricName=AWSOrganizationsChanges,metricNamespace=CISBenchmark,metricValue=1
            ```

            Create the alarm:

            ```bash
            aws cloudwatch put-metric-alarm \
              --alarm-name AWSOrganizationsChanges \
              --metric-name AWSOrganizationsChanges \
              --namespace CISBenchmark \
              --statistic Sum \
              --period 300 \
              --threshold 1 \
              --comparison-operator GreaterThanOrEqualToThreshold \
              --evaluation-periods 1 \
              --alarm-actions <sns-topic-arn>
            ```
    refs:
      - url: https://docs.aws.amazon.com/AmazonCloudWatch/latest/monitoring/CloudWatch_Alarms.html
        title: Amazon CloudWatch Alarms
  - uid: mondoo-aws-security-cloudwatch-org-change-alarm-aws
    filters: asset.platform == "aws"
    mql: |
      aws.cloudwatch.logGroups.any(
        metricsFilters.any(
          filterPattern.contains("organizations.amazonaws.com")
        )
      )
  - uid: mondoo-aws-security-secgroup-no-unrestricted-egress
    title: Ensure security groups do not allow unrestricted egress
    impact: 80
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/soc2-2017: soc2-control-cc6-6-1
    variants:
      - uid: mondoo-aws-security-secgroup-no-unrestricted-egress-aws
        tags:
          mondoo.com/filter-title: AWS Security Group
          mondoo.com/icon: aws
    docs:
      desc: |
        Security groups should restrict outbound traffic to only necessary destinations and ports. Unrestricted egress (0.0.0.0/0 on all ports) allows compromised instances to communicate with any external host, facilitating data exfiltration or command-and-control communication.

        **Why this matters**

        Unrestricted outbound access from EC2 instances and other resources can:

        - Enable compromised resources to exfiltrate sensitive data to attacker-controlled infrastructure.
        - Allow malware or backdoors to establish command-and-control (C2) channels to arbitrary external hosts.
        - Violate compliance requirements from frameworks such as CIS AWS Foundations Benchmark, PCI DSS, and ISO 27001 that mandate egress filtering.

        Limiting outbound traffic to only required destinations and ports is a fundamental defense-in-depth control.

        **Risk mitigation:**

        - Reduces the impact of compromised instances by preventing arbitrary outbound communications.
        - Limits the blast radius of a breach by restricting lateral movement and data exfiltration paths.
        - Supports compliance with network segmentation and egress filtering requirements.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            1. Navigate to the AWS EC2 Console.
            2. Select Security Groups from the left panel under Network & Security.
            3. Identify security groups with an outbound rule allowing all traffic (0.0.0.0/0, all protocols, all ports).
            4. Select the security group and choose the Outbound rules tab.
            5. Select Edit outbound rules.
            6. Remove or replace the unrestricted rule with specific rules that allow only required destinations and ports.
            7. Select Save rules.
        - id: cli
          desc: |
            **Using AWS CLI**

            List security groups with unrestricted egress:

            ```bash
            aws ec2 describe-security-groups \
              --query "SecurityGroups[?IpPermissionsEgress[?IpRanges[?CidrIp=='0.0.0.0/0'] && FromPort==\`0\` && ToPort==\`0\`]].{GroupId:GroupId,GroupName:GroupName}"
            ```

            Remove the unrestricted egress rule:

            ```bash
            aws ec2 revoke-security-group-egress \
              --group-id <sg-id> \
              --protocol -1 \
              --port -1 \
              --cidr 0.0.0.0/0
            ```

            Add a specific outbound rule to allow only required traffic:

            ```bash
            aws ec2 authorize-security-group-egress \
              --group-id <sg-id> \
              --protocol tcp \
              --port 443 \
              --cidr 0.0.0.0/0
            ```
    refs:
      - url: https://docs.aws.amazon.com/vpc/latest/userguide/vpc-security-groups.html
        title: AWS Documentation - Control traffic to your AWS resources using security groups
      - url: https://docs.aws.amazon.com/securityhub/latest/userguide/ec2-controls.html
        title: AWS Security Hub - EC2 controls reference
  - uid: mondoo-aws-security-secgroup-no-unrestricted-egress-aws
    filters: asset.platform == "aws-security-group"
    mql: |
      aws.ec2.securitygroup.ipPermissionsEgress.where(
        ipProtocol == "-1").none(
          ipRanges.contains("0.0.0.0/0") || ipRanges.contains("::/0")
          )
  - uid: mondoo-aws-security-iam-root-hardware-mfa
    title: Ensure root account has a hardware MFA device enabled
    impact: 90
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-j
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-3
      compliance/soc2-2017: soc2-control-cc6-1-4
    variants:
      - uid: mondoo-aws-security-iam-root-hardware-mfa-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/icon: aws
    docs:
      desc: |
        The AWS root account has unrestricted access to all resources in the account and cannot be limited by IAM policies. Protecting it with a hardware MFA device provides a significantly stronger authentication guarantee than a software (virtual) MFA token, which can be compromised if the device or seed material is stolen.

        **Why this matters**

        The root account is the most privileged identity in an AWS account. If compromised, an attacker gains complete control over all resources, billing, and account settings. Hardware MFA provides:

        - A physical second factor that cannot be exfiltrated remotely, unlike virtual MFA apps or TOTP seeds stored in software.
        - Protection against phishing attacks targeting one-time codes entered on malicious sites.
        - Compliance with strict authentication requirements in standards such as PCI DSS, NIST SP 800-53, and ISO 27001 that differentiate hardware-based MFA.

        A virtual MFA device alone is insufficient for root account protection because the TOTP seed can be backed up, copied, or stolen without the account owner's knowledge.

        This check passes when MFA is active on the root account AND no virtual MFA device is associated with root, implying that a hardware MFA device is in use.

        **Risk mitigation:**

        - Prevents root account takeover even if credentials are compromised through phishing or credential stuffing.
        - Ensures the most privileged account identity requires physical possession of a hardware token to authenticate.
        - Satisfies compliance requirements mandating hardware MFA for privileged or administrative accounts.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            1. Sign in to the AWS Management Console as the root user.
            2. Select your account name in the upper right corner and choose Security credentials.
            3. In the Multi-factor authentication (MFA) section, select Assign MFA device.
            4. Choose Hardware TOTP token or FIDO security key and follow the on-screen instructions to register the device.
            5. If a virtual MFA device is currently active for the root account, deactivate it after successfully registering the hardware device.
            6. Store the hardware MFA device securely and restrict physical access to authorized personnel.
        - id: cli
          desc: |
            **Using AWS CLI**

            Check whether a virtual MFA device is associated with the root account:

            ```bash
            aws iam list-virtual-mfa-devices --query "VirtualMFADevices[?contains(SerialNumber, 'root-account-mfa-device')]"
            ```

            View the root account MFA status in the credential report:

            ```bash
            aws iam generate-credential-report
            aws iam get-credential-report --query "Content" --output text | base64 -d | grep "<root_account>"
            ```

            Hardware MFA device registration must be completed through the AWS Console. After registering, deactivate any virtual MFA device for root:

            ```bash
            aws iam deactivate-mfa-device \
              --user-name "<root_account>" \
              --serial-number arn:aws:iam::<account-id>:mfa/root-account-mfa-device
            ```
    refs:
      - url: https://docs.aws.amazon.com/IAM/latest/UserGuide/id_credentials_mfa_enable_physical.html
        title: AWS Documentation - Enable a hardware TOTP token for the AWS account root user
      - url: https://docs.aws.amazon.com/securityhub/latest/userguide/iam-controls.html
        title: AWS Security Hub - IAM controls reference
  - uid: mondoo-aws-security-iam-root-hardware-mfa-aws
    filters: asset.platform == "aws"
    mql: |
      aws.iam.credentialReport.where(properties.user == "<root_account>").all(mfaActive == true) &&
      aws.iam.virtualMfaDevices.none(serialNumber.contains("root-account-mfa-device"))
  - uid: mondoo-aws-security-iam-expired-certificates
    title: Ensure expired SSL/TLS certificates are removed from IAM
    impact: 60
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-5-17
      compliance/nis-2: nis-2-21-2-g
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-5
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-7
      compliance/soc2-2017: soc2-control-cc6-1-9
    variants:
      - uid: mondoo-aws-security-iam-expired-certificates-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/icon: aws
    docs:
      desc: |
        SSL/TLS certificates stored in AWS IAM that have passed their expiration date should be removed promptly. Expired certificates can no longer be used to establish trusted TLS connections, and their continued presence in IAM increases the risk of accidental use or confusion during incident response.

        **Why this matters**

        Expired certificates stored in IAM can:

        - Be accidentally associated with services, causing TLS handshake failures and service outages.
        - Indicate a failure in certificate lifecycle management, which may mean other certificates are also unmanaged.
        - Trigger compliance findings under frameworks such as PCI DSS, NIST SP 800-53, and ISO 27001 that require active management of cryptographic material.

        AWS Certificate Manager (ACM) is the recommended service for managing certificates, but some legacy integrations still use IAM-stored certificates.

        **Risk mitigation:**

        - Prevents accidental use of expired certificates that would cause TLS negotiation failures.
        - Reduces the certificate inventory to only valid, actively managed credentials.
        - Supports compliance with certificate and credential lifecycle management requirements.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            IAM server certificates cannot be managed directly through the AWS Console. Use the AWS CLI to list and delete expired certificates.
        - id: cli
          desc: |
            **Using AWS CLI**

            List all server certificates stored in IAM along with their expiration dates:

            ```bash
            aws iam list-server-certificates \
              --query "ServerCertificateMetadataList[*].{Name:ServerCertificateName,Expiration:Expiration}"
            ```

            Delete an expired certificate:

            ```bash
            aws iam delete-server-certificate --server-certificate-name <certificate-name>
            ```

            Verify the certificate has been removed:

            ```bash
            aws iam list-server-certificates \
              --query "ServerCertificateMetadataList[*].ServerCertificateName"
            ```
    refs:
      - url: https://docs.aws.amazon.com/IAM/latest/UserGuide/id_credentials_server-certs.html
        title: AWS Documentation - Managing server certificates in IAM
      - url: https://docs.aws.amazon.com/securityhub/latest/userguide/iam-controls.html
        title: AWS Security Hub - IAM controls reference
  - uid: mondoo-aws-security-iam-expired-certificates-aws
    filters: asset.platform == "aws"
    mql: aws.iam.serverCertificates.none(parse.date(_['Expiration'].string) < time.now)
  - uid: mondoo-aws-security-iam-support-role
    title: Ensure a support role has been created for AWS Support access
    impact: 30
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-2
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/soc2-2017: soc2-control-cc6-3-1
    variants:
      - uid: mondoo-aws-security-iam-support-role-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/icon: aws
    docs:
      desc: |
        AWS recommends creating a dedicated IAM role or group with the AWSSupportAccess managed policy attached to manage interactions with AWS Support. This ensures that support access is granted through a traceable, auditable IAM identity rather than relying on root account credentials.

        **Why this matters**

        Without a dedicated support role:

        - Operators may use the root account to interact with AWS Support, increasing the risk of root credential exposure.
        - There is no clear accountability for who opens or manages support cases on behalf of the organization.
        - Compliance frameworks such as CIS AWS Foundations Benchmark require a designated support role as part of access control best practices.

        Assigning the AWSSupportAccess policy to a specific role, group, or user ensures that support interactions are performed with least-privilege credentials that can be audited.

        **Risk mitigation:**

        - Avoids the need to use root account credentials for AWS Support interactions.
        - Creates a clear, auditable identity for support case management.
        - Aligns with CIS AWS Foundations Benchmark and least-privilege access control requirements.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            1. Navigate to the AWS IAM Console.
            2. Select Roles from the left panel and choose Create role.
            3. Select AWS account as the trusted entity type and configure trust as appropriate.
            4. On the permissions page, search for and attach the AWSSupportAccess managed policy.
            5. Name the role (for example, AWSSupportRole) and create it.
            6. Assign the role to the appropriate IAM users or groups that manage AWS Support interactions.
        - id: cli
          desc: |
            **Using AWS CLI**

            Create an IAM role with a trust policy for the account:

            ```bash
            aws iam create-role \
              --role-name AWSSupportRole \
              --assume-role-policy-document '{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Principal":{"AWS":"arn:aws:iam::<account-id>:root"},"Action":"sts:AssumeRole"}]}'
            ```

            Attach the AWSSupportAccess managed policy:

            ```bash
            aws iam attach-role-policy \
              --role-name AWSSupportRole \
              --policy-arn arn:aws:iam::aws:policy/AWSSupportAccess
            ```

            Verify the policy is attached:

            ```bash
            aws iam list-attached-role-policies --role-name AWSSupportRole
            ```
    refs:
      - url: https://docs.aws.amazon.com/awssupport/latest/user/security-iam-awsmanpol.html
        title: AWS Documentation - AWSSupportAccess managed policy
      - url: https://docs.aws.amazon.com/securityhub/latest/userguide/iam-controls.html
        title: AWS Security Hub - IAM controls reference
  - uid: mondoo-aws-security-iam-support-role-aws
    filters: asset.platform == "aws"
    mql: aws.iam.policies.where(arn == "arn:aws:iam::aws:policy/AWSSupportAccess").any(attachedUsers.length > 0 || attachedRoles.length > 0 || attachedGroups.length > 0)
  - uid: mondoo-aws-security-lambda-xray-tracing
    title: Ensure Lambda functions have X-Ray tracing enabled
    impact: 30
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/soc2-2017: soc2-control-cc7-2-1
    variants:
      - uid: mondoo-aws-security-lambda-xray-tracing-aws
        tags:
          mondoo.com/filter-title: AWS Lambda Function
          mondoo.com/icon: aws
    docs:
      desc: |
        AWS X-Ray provides distributed tracing for Lambda functions, enabling visibility into function execution, latency, and downstream service calls. Enabling active tracing helps security and operations teams detect anomalous behavior, unexpected latency spikes, and unauthorized invocations.

        **Why this matters**

        Without X-Ray tracing enabled on Lambda functions:

        - Investigations into unexpected function behavior or security incidents lack detailed execution traces.
        - Latency and error patterns that may indicate abuse or compromise go undetected.
        - Compliance frameworks such as NIST SP 800-53 and SOC 2 require audit and monitoring capabilities for compute workloads.

        X-Ray tracing complements CloudWatch logs by providing structured, visual traces of function invocations and their downstream dependencies.

        **Risk mitigation:**

        - Improves incident response by providing detailed traces of function execution and service calls.
        - Enables detection of anomalous invocation patterns or unexpected downstream API calls.
        - Supports compliance with logging and monitoring requirements for serverless workloads.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            1. Navigate to the AWS Lambda Console.
            2. Select Functions from the left panel.
            3. Select the Lambda function to configure.
            4. Go to the Configuration tab and select Monitoring and operations tools.
            5. Under AWS X-Ray, select Edit and enable Active tracing.
            6. Select Save to apply the changes.
        - id: cli
          desc: |
            **Using AWS CLI**

            Check the current tracing configuration for a Lambda function:

            ```bash
            aws lambda get-function-configuration \
              --function-name <function-name> \
              --query "TracingConfig"
            ```

            Enable active X-Ray tracing:

            ```bash
            aws lambda update-function-configuration \
              --function-name <function-name> \
              --tracing-config Mode=Active
            ```

            Verify the change was applied:

            ```bash
            aws lambda get-function-configuration \
              --function-name <function-name> \
              --query "TracingConfig.Mode"
            ```
    refs:
      - url: https://docs.aws.amazon.com/lambda/latest/dg/services-xray.html
        title: AWS Documentation - Using AWS X-Ray with Lambda
      - url: https://docs.aws.amazon.com/securityhub/latest/userguide/lambda-controls.html
        title: AWS Security Hub - Lambda controls reference
  - uid: mondoo-aws-security-lambda-xray-tracing-aws
    filters: asset.platform == "aws-lambda-function"
    mql: aws.lambda.function.tracingMode == "Active"
  - uid: mondoo-aws-security-lambda-source-arn
    title: Ensure Lambda permissions specify a source ARN
    impact: 80
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/soc2-2017: soc2-control-cc6-1-3
    variants:
      - uid: mondoo-aws-security-lambda-source-arn-aws
        tags:
          mondoo.com/filter-title: AWS Lambda Function
          mondoo.com/icon: aws
    docs:
      desc: |
        Lambda resource-based policy statements that grant Allow permissions to AWS services (such as S3, SNS, or EventBridge) should include a Condition that specifies a source ARN. Without this condition, any resource in the granting service's account can invoke the function, creating a confused deputy vulnerability.

        **Why this matters**

        When a Lambda permission grants invoke rights to an AWS service principal (for example, s3.amazonaws.com) without a source ARN condition:

        - Any S3 bucket in any account could be configured to trigger the Lambda function if the attacker can influence cross-account trust.
        - The confused deputy problem allows a malicious actor to use a trusted service as a proxy to invoke a Lambda function they do not have direct permission to call.
        - Compliance requirements from NIST SP 800-53 and ISO 27001 mandate that access grants be scoped to the minimum necessary resources.

        Adding a Condition with aws:SourceArn or aws:SourceAccount restricts invocations to the specific resource or account that legitimately needs access.

        **Risk mitigation:**

        - Eliminates the confused deputy attack vector by binding Lambda invoke permissions to a specific source resource ARN.
        - Ensures that only the intended AWS resource can trigger the function, even if another resource in the same service is compromised.
        - Reduces the blast radius of misconfigured cross-service permissions.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            1. Navigate to the AWS Lambda Console.
            2. Select the Lambda function to review.
            3. Go to the Configuration tab and select Permissions.
            4. Under Resource-based policy statements, review each Allow statement.
            5. For any statement that grants permissions to an AWS service principal without a Condition, select Edit (or remove and re-add the permission with a condition).
            6. Add a Condition block specifying aws:SourceArn or aws:SourceAccount to restrict the invocation scope.
            7. Save the updated policy.
        - id: cli
          desc: |
            **Using AWS CLI**

            Retrieve the current resource-based policy for a Lambda function:

            ```bash
            aws lambda get-policy --function-name <function-name> --query "Policy" --output text | python3 -m json.tool
            ```

            Remove a permission statement that lacks a source ARN condition:

            ```bash
            aws lambda remove-permission \
              --function-name <function-name> \
              --statement-id <statement-id>
            ```

            Add a scoped permission that includes a source ARN condition:

            ```bash
            aws lambda add-permission \
              --function-name <function-name> \
              --statement-id AllowS3Invoke \
              --action lambda:InvokeFunction \
              --principal s3.amazonaws.com \
              --source-arn arn:aws:s3:::<bucket-name> \
              --source-account <account-id>
            ```
    refs:
      - url: https://docs.aws.amazon.com/lambda/latest/dg/access-control-resource-based.html
        title: AWS Documentation - Lambda resource-based policies
      - url: https://docs.aws.amazon.com/IAM/latest/UserGuide/confused-deputy.html
        title: AWS Documentation - The confused deputy problem
      - url: https://docs.aws.amazon.com/securityhub/latest/userguide/lambda-controls.html
        title: AWS Security Hub - Lambda controls reference
  - uid: mondoo-aws-security-lambda-source-arn-aws
    filters: asset.platform == "aws-lambda-function"
    mql: |
      aws.lambda.function.policy == empty ||
      aws.lambda.function.policy.Statement.where(Effect == "Allow" && Principal['Service'] != empty).all(
        Condition.string.contains("SourceArn") || Condition.string.contains("SourceAccount")
      )
  - uid: mondoo-aws-security-s3-mfa-delete
    title: Ensure S3 buckets have MFA delete enabled
    impact: 30
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/soc2-2017: soc2-control-cc6-1-10
    variants:
      - uid: mondoo-aws-security-s3-mfa-delete-aws
        tags:
          mondoo.com/filter-title: AWS S3 Bucket
          mondoo.com/icon: aws
    docs:
      desc: |
        MFA delete adds an additional layer of protection for versioned S3 objects by requiring multi-factor authentication before permanently deleting an object version or changing the versioning state of a bucket. This prevents accidental or malicious deletion of critical data even if AWS credentials are compromised.

        **Why this matters**

        Without MFA delete enabled on versioned S3 buckets:

        - A compromised set of AWS credentials is sufficient to permanently delete all versions of an object, bypassing versioning protections.
        - Ransomware or insider threats can irreversibly destroy data without requiring physical possession of an MFA device.
        - Compliance frameworks such as NIST SP 800-53 SC-28 and SOC 2 CC6.1 require data protection controls that prevent unauthorized deletion.

        MFA delete ensures that permanent data deletion requires both knowledge (credentials) and possession (MFA device), providing defense against credential-based attacks.

        **Risk mitigation:**

        - Prevents permanent object deletion by requiring a second authentication factor for destructive operations.
        - Protects against ransomware attacks that target cloud storage by deleting or encrypting versioned objects.
        - Supports compliance with data protection requirements mandating controls against unauthorized data destruction.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            MFA delete can only be enabled via the AWS CLI or SDK using root account credentials. The AWS Console does not support enabling MFA delete directly.
        - id: cli
          desc: |
            **Using AWS CLI**

            MFA delete must be enabled using root account credentials. Generate an MFA token from the root account's MFA device, then run:

            ```bash
            aws s3api put-bucket-versioning \
              --bucket <bucket-name> \
              --versioning-configuration Status=Enabled,MFADelete=Enabled \
              --mfa "arn:aws:iam::<account-id>:mfa/root-account-mfa-device <mfa-token>"
            ```

            Verify MFA delete is enabled:

            ```bash
            aws s3api get-bucket-versioning --bucket <bucket-name>
            ```

            The response should include `"MFADelete": "Enabled"`.
    refs:
      - url: https://docs.aws.amazon.com/AmazonS3/latest/userguide/MultiFactorAuthenticationDelete.html
        title: AWS Documentation - Configuring MFA delete
      - url: https://docs.aws.amazon.com/securityhub/latest/userguide/s3-controls.html
        title: AWS Security Hub - S3 controls reference
  - uid: mondoo-aws-security-s3-mfa-delete-aws
    filters: asset.platform == "aws-s3-bucket"
    mql: |
      aws.s3.bucket.versioning['Status'] != "Enabled" ||
      aws.s3.bucket.versioning['MFADelete'] == "Enabled"
  - uid: mondoo-aws-security-elasticsearch-enforce-https
    title: Ensure Elasticsearch domains enforce HTTPS
    impact: 80
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/soc2-2017: soc2-control-cc6-7-2
    variants:
      - uid: mondoo-aws-security-elasticsearch-enforce-https-aws
        tags:
          mondoo.com/filter-title: AWS ES Domain
          mondoo.com/icon: aws
    docs:
      desc: |
        This check ensures that Amazon Elasticsearch Service domains are configured to require HTTPS for all traffic. When HTTPS is not enforced, communication between clients and the Elasticsearch domain occurs over plaintext HTTP, exposing query data and results to network-level interception.

        **Why this matters**

        - Elasticsearch domains often contain sensitive data such as application logs, user activity, and business analytics. Plaintext HTTP exposes this data to eavesdropping on the network path.
        - Without HTTPS enforcement, clients may unknowingly connect over HTTP, transmitting credentials and query payloads in the clear.
        - Enforcing HTTPS ensures all client-to-domain communication is encrypted with TLS, protecting data confidentiality and integrity in transit.

        **Risk mitigation:**

        - **Confidentiality:** Prevents interception of search queries, results, and authentication credentials in transit.
        - **Integrity:** TLS protects against tampering with data exchanged between clients and the Elasticsearch cluster.
        - **Compliance:** Satisfies in-transit encryption requirements under PCI DSS, HIPAA, NIST SP 800-53 SC-8, and SOC 2.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            1. Navigate to the **Amazon Elasticsearch Service Console** and select **Domains**.
            2. Select the domain you want to configure.
            3. Choose **Edit domain** or **Actions** > **Edit security configuration**.
            4. Under **Domain access policy** or **HTTPS**, enable **Require HTTPS for all traffic to the domain**.
            5. Choose **Save changes**.
        - id: cli
          desc: |
            **Using AWS CLI**

            Update the domain to enforce HTTPS:

            ```bash
            aws es update-elasticsearch-domain-config \
              --domain-name <domain-name> \
              --domain-endpoint-options EnforceHTTPS=true
            ```

            Verify the configuration:

            ```bash
            aws es describe-elasticsearch-domain \
              --domain-name <domain-name> \
              --query "DomainStatus.DomainEndpointOptions.EnforceHTTPS"
            ```
    refs:
      - url: https://docs.aws.amazon.com/elasticsearch-service/latest/developerguide/es-data-protection.html
        title: Amazon Elasticsearch Service - Data Protection
      - url: https://docs.aws.amazon.com/securityhub/latest/userguide/es-controls.html
        title: AWS Security Hub - Elasticsearch controls reference
  - uid: mondoo-aws-security-elasticsearch-enforce-https-aws
    filters: asset.platform == "aws-es-domain"
    mql: aws.es.domain.enforceHTTPS == true
  - uid: mondoo-aws-security-elasticsearch-tls-policy
    title: Ensure Elasticsearch domains use TLS 1.2 or higher
    impact: 70
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/soc2-2017: soc2-control-cc6-7-2
    variants:
      - uid: mondoo-aws-security-elasticsearch-tls-policy-aws
        tags:
          mondoo.com/filter-title: AWS ES Domain
          mondoo.com/icon: aws
    docs:
      desc: |
        This check ensures that Amazon Elasticsearch Service domains are configured with a TLS security policy that enforces TLS 1.2 or higher. Older TLS versions (1.0 and 1.1) have known vulnerabilities and should not be used for production workloads.

        **Why this matters**

        - TLS 1.0 and 1.1 are deprecated due to known vulnerabilities including BEAST, POODLE, and other protocol-level attacks that can compromise encryption.
        - Using outdated TLS versions may allow attackers to downgrade connections and exploit weaknesses in the encryption protocol.
        - Enforcing TLS 1.2 or higher ensures that all client connections use modern cryptographic standards with strong cipher suites.

        **Risk mitigation:**

        - **Strong encryption:** TLS 1.2+ provides modern cipher suites and eliminates vulnerabilities present in older protocol versions.
        - **Downgrade protection:** Prevents attackers from forcing connections to use weaker protocol versions.
        - **Compliance:** Meets TLS version requirements mandated by PCI DSS 3.2.1+, NIST SP 800-52, and industry best practices.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            1. Navigate to the **Amazon Elasticsearch Service Console** and select **Domains**.
            2. Select the domain you want to configure.
            3. Choose **Edit domain** or **Actions** > **Edit security configuration**.
            4. Under **HTTPS**, set the **TLS security policy** to **Policy-Min-TLS-1-2-2019-07** or higher.
            5. Choose **Save changes**.
        - id: cli
          desc: |
            **Using AWS CLI**

            Update the domain to enforce TLS 1.2:

            ```bash
            aws es update-elasticsearch-domain-config \
              --domain-name <domain-name> \
              --domain-endpoint-options EnforceHTTPS=true,TLSSecurityPolicy=Policy-Min-TLS-1-2-2019-07
            ```

            Verify the configuration:

            ```bash
            aws es describe-elasticsearch-domain \
              --domain-name <domain-name> \
              --query "DomainStatus.DomainEndpointOptions.TLSSecurityPolicy"
            ```
    refs:
      - url: https://docs.aws.amazon.com/elasticsearch-service/latest/developerguide/es-data-protection.html
        title: Amazon Elasticsearch Service - Data Protection
      - url: https://docs.aws.amazon.com/securityhub/latest/userguide/es-controls.html
        title: AWS Security Hub - Elasticsearch controls reference
  - uid: mondoo-aws-security-elasticsearch-tls-policy-aws
    filters: asset.platform == "aws-es-domain"
    mql: aws.es.domain.tlsSecurityPolicy == "Policy-Min-TLS-1-2-2019-07" || aws.es.domain.tlsSecurityPolicy == "Policy-Min-TLS-1-2-PFS-2023-10"
  - uid: mondoo-aws-security-elasticsearch-audit-logging
    title: Ensure Elasticsearch domains have audit logging enabled
    impact: 50
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/soc2-2017: soc2-control-cc7-2-1
    variants:
      - uid: mondoo-aws-security-elasticsearch-audit-logging-aws
        tags:
          mondoo.com/filter-title: AWS ES Domain
          mondoo.com/icon: aws
    docs:
      desc: |
        This check ensures that Amazon Elasticsearch Service domains have audit logging enabled. Audit logs capture authentication attempts, access to indices, and query activity, providing visibility into who is accessing your Elasticsearch data and what operations they perform.

        **Why this matters**

        - Without audit logging, there is no record of who accessed your Elasticsearch domain, what queries were executed, or what data was modified.
        - Audit logs are essential for detecting unauthorized access attempts, investigating security incidents, and meeting compliance requirements for data access monitoring.
        - Elasticsearch domains often contain sensitive application data, making access logging critical for data governance and security monitoring.

        **Risk mitigation:**

        - **Access monitoring:** Audit logs reveal who is accessing your Elasticsearch data and what operations they perform.
        - **Incident response:** Log data provides the forensic trail needed to investigate security incidents involving Elasticsearch data.
        - **Compliance:** Satisfies audit logging requirements under NIST SP 800-53 AU-6, ISO 27001 A.8.15, and SOC 2 CC7.2.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            1. Navigate to the **Amazon Elasticsearch Service Console** and select **Domains**.
            2. Select the domain you want to configure.
            3. Choose the **Logs** tab.
            4. Under **Audit logs**, choose **Enable** and select a CloudWatch Logs log group.
            5. Choose **Save changes**.

            Note: Audit logging requires fine-grained access control to be enabled on the domain.
        - id: cli
          desc: |
            **Using AWS CLI**

            Enable audit logging by updating the log publishing options:

            ```bash
            aws es update-elasticsearch-domain-config \
              --domain-name <domain-name> \
              --log-publishing-options "AUDIT_LOGS={CloudWatchLogsLogGroupArn=arn:aws:logs:<region>:<account-id>:log-group:<log-group-name>,Enabled=true}"
            ```

            Verify the configuration:

            ```bash
            aws es describe-elasticsearch-domain \
              --domain-name <domain-name> \
              --query "DomainStatus.LogPublishingOptions.AUDIT_LOGS"
            ```
    refs:
      - url: https://docs.aws.amazon.com/elasticsearch-service/latest/developerguide/audit-logs.html
        title: Amazon Elasticsearch Service - Audit Logs
      - url: https://docs.aws.amazon.com/securityhub/latest/userguide/es-controls.html
        title: AWS Security Hub - Elasticsearch controls reference
  - uid: mondoo-aws-security-elasticsearch-audit-logging-aws
    filters: asset.platform == "aws-es-domain"
    mql: aws.es.domain.auditLogEnabled == true
  - uid: mondoo-aws-security-emr-encryption-at-rest
    title: Ensure EMR clusters have at-rest encryption enabled
    impact: 70
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/soc2-2017: soc2-control-cc6-1-10
    variants:
      - uid: mondoo-aws-security-emr-encryption-at-rest-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/icon: aws
    docs:
      desc: |
        This check ensures that Amazon EMR clusters have at-rest encryption enabled through a security configuration. At-rest encryption protects data stored on local disks and in Amazon S3 by EMR clusters, preventing unauthorized access to data at the storage layer.

        **Why this matters**

        - EMR clusters process and store potentially sensitive data on local HDFS volumes and in S3. Without at-rest encryption, this data is stored in plaintext and vulnerable to unauthorized access if storage media is compromised.
        - EMR security configurations provide a centralized way to manage encryption settings for both S3 data (using SSE-S3, SSE-KMS, or CSE-KMS) and local disk data (using LUKS encryption with KMS keys).
        - Many compliance frameworks, including PCI DSS, HIPAA, and NIST SP 800-53 SC-28, require encryption of sensitive data at rest.

        **Risk mitigation:**

        - **Data protection:** Encrypts data on local cluster volumes and S3 storage, protecting against unauthorized access at the storage layer.
        - **Key management:** Uses AWS KMS for centralized key management, rotation, and access control.
        - **Compliance:** Satisfies at-rest encryption requirements across multiple regulatory frameworks.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            Note: Encryption settings cannot be changed on a running cluster. You must create a new security configuration and launch a new cluster.

            1. Navigate to the **Amazon EMR Console** and choose **Security configurations**.
            2. Choose **Create security configuration**.
            3. Under **Encryption**, enable **At-rest encryption**.
            4. Configure S3 encryption (SSE-S3, SSE-KMS, or CSE-KMS) and local disk encryption (KMS key).
            5. Save the security configuration and use it when launching new clusters.
        - id: cli
          desc: |
            **Using AWS CLI**

            Create a security configuration with at-rest encryption:

            ```bash
            aws emr create-security-configuration \
              --name "emr-encryption-config" \
              --security-configuration '{
                "EncryptionConfiguration": {
                  "EnableAtRestEncryption": true,
                  "AtRestEncryptionConfiguration": {
                    "S3EncryptionConfiguration": {
                      "EncryptionMode": "SSE-KMS",
                      "AwsKmsKey": "arn:aws:kms:<region>:<account-id>:key/<key-id>"
                    },
                    "LocalDiskEncryptionConfiguration": {
                      "EncryptionKeyProviderType": "AwsKms",
                      "AwsKmsKey": "arn:aws:kms:<region>:<account-id>:key/<key-id>"
                    }
                  },
                  "EnableInTransitEncryption": false
                }
              }'
            ```

            Launch a cluster with the security configuration:

            ```bash
            aws emr create-cluster \
              --name "encrypted-cluster" \
              --security-configuration "emr-encryption-config" \
              --release-label emr-7.0.0 \
              --instance-type m5.xlarge \
              --instance-count 3
            ```
    refs:
      - url: https://docs.aws.amazon.com/emr/latest/ManagementGuide/emr-data-encryption-options.html
        title: Amazon EMR - Encryption Options
      - url: https://docs.aws.amazon.com/securityhub/latest/userguide/emr-controls.html
        title: AWS Security Hub - EMR controls reference
  - uid: mondoo-aws-security-emr-encryption-at-rest-aws
    filters: asset.platform == "aws"
    mql: aws.emr.clusters.all(encryptionConfiguration.atRestEnabled == true)
  - uid: mondoo-aws-security-emr-encryption-in-transit
    title: Ensure EMR clusters have in-transit encryption enabled
    impact: 70
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/soc2-2017: soc2-control-cc6-7-2
    variants:
      - uid: mondoo-aws-security-emr-encryption-in-transit-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/icon: aws
    docs:
      desc: |
        This check ensures that Amazon EMR clusters have in-transit encryption enabled through a security configuration. In-transit encryption protects data moving between nodes in the cluster and between the cluster and S3, preventing interception of data on the network.

        **Why this matters**

        - EMR clusters exchange data between master, core, and task nodes over the network. Without in-transit encryption, this inter-node communication occurs in plaintext and is vulnerable to eavesdropping.
        - In-transit encryption in EMR uses TLS to encrypt data flowing between cluster nodes, and between the cluster and Amazon S3 via EMRFS.
        - Frameworks running on EMR (Spark, Hive, Presto) transmit query data and intermediate results between nodes, which may contain sensitive information.

        **Risk mitigation:**

        - **Network protection:** TLS encryption prevents interception of data flowing between cluster nodes and between the cluster and S3.
        - **Defense in depth:** Complements at-rest encryption to protect data throughout its lifecycle.
        - **Compliance:** Satisfies in-transit encryption requirements under PCI DSS, HIPAA, NIST SP 800-53 SC-8, and SOC 2.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            Note: Encryption settings cannot be changed on a running cluster. You must create a new security configuration and launch a new cluster.

            1. Navigate to the **Amazon EMR Console** and choose **Security configurations**.
            2. Choose **Create security configuration**.
            3. Under **Encryption**, enable **In-transit encryption**.
            4. Provide a PEM certificate or configure automatic certificate generation.
            5. Save the security configuration and use it when launching new clusters.
        - id: cli
          desc: |
            **Using AWS CLI**

            Create a security configuration with in-transit encryption:

            ```bash
            aws emr create-security-configuration \
              --name "emr-intransit-encryption-config" \
              --security-configuration '{
                "EncryptionConfiguration": {
                  "EnableInTransitEncryption": true,
                  "InTransitEncryptionConfiguration": {
                    "TLSCertificateConfiguration": {
                      "CertificateProviderType": "PEM",
                      "S3Object": "s3://<bucket>/certs/my-certs.zip"
                    }
                  },
                  "EnableAtRestEncryption": false
                }
              }'
            ```

            Verify a cluster's security configuration:

            ```bash
            aws emr describe-cluster --cluster-id <cluster-id> \
              --query "Cluster.SecurityConfiguration"
            ```
    refs:
      - url: https://docs.aws.amazon.com/emr/latest/ManagementGuide/emr-data-encryption-options.html
        title: Amazon EMR - Encryption Options
      - url: https://docs.aws.amazon.com/securityhub/latest/userguide/emr-controls.html
        title: AWS Security Hub - EMR controls reference
  - uid: mondoo-aws-security-emr-encryption-in-transit-aws
    filters: asset.platform == "aws"
    mql: aws.emr.clusters.all(encryptionConfiguration.inTransitEnabled == true)
  - uid: mondoo-aws-security-emr-logging-enabled
    title: Ensure EMR clusters have logging enabled
    impact: 50
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/soc2-2017: soc2-control-cc7-2-1
    variants:
      - uid: mondoo-aws-security-emr-logging-enabled-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/icon: aws
    docs:
      desc: |
        This check ensures that Amazon EMR clusters have logging enabled by configuring an S3 log URI. EMR cluster logs include step logs, application logs, and bootstrap action logs that provide operational and security visibility into cluster activity.

        **Why this matters**

        - Without an S3 log URI, EMR cluster logs are only available on the cluster nodes themselves and are lost when the cluster terminates.
        - EMR logs contain critical information for debugging failed jobs, auditing data processing activity, and investigating security incidents.
        - Persisting logs to S3 enables long-term retention, centralized analysis, and integration with SIEM or log aggregation systems.

        **Risk mitigation:**

        - **Operational visibility:** Persistent logs enable post-mortem analysis of failed jobs and performance issues.
        - **Security auditing:** Logs capture information about data access patterns, authentication events, and job execution that support security investigations.
        - **Compliance:** Meets logging and audit trail requirements under NIST SP 800-53 AU-6 and SOC 2 CC7.2.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            Note: Log settings cannot be changed on a running cluster. You must configure logging when launching a new cluster.

            1. Navigate to the **Amazon EMR Console** and choose **Create cluster**.
            2. Under **General Configuration**, enable **Logging**.
            3. Specify an S3 bucket and optional prefix for log storage.
            4. Complete the cluster configuration and launch.
        - id: cli
          desc: |
            **Using AWS CLI**

            Create a cluster with logging enabled:

            ```bash
            aws emr create-cluster \
              --name "logged-cluster" \
              --log-uri s3://<bucket>/emr-logs/ \
              --release-label emr-7.0.0 \
              --instance-type m5.xlarge \
              --instance-count 3
            ```

            Check if an existing cluster has logging configured:

            ```bash
            aws emr describe-cluster --cluster-id <cluster-id> \
              --query "Cluster.LogUri"
            ```
    refs:
      - url: https://docs.aws.amazon.com/emr/latest/ManagementGuide/emr-plan-debugging.html
        title: Amazon EMR - Configure Cluster Logging and Debugging
      - url: https://docs.aws.amazon.com/securityhub/latest/userguide/emr-controls.html
        title: AWS Security Hub - EMR controls reference
  - uid: mondoo-aws-security-emr-logging-enabled-aws
    filters: asset.platform == "aws"
    mql: aws.emr.clusters.all(logUri != empty)
  - uid: mondoo-aws-security-dax-encryption-at-rest
    title: Ensure DynamoDB DAX clusters have encryption at rest
    impact: 70
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/soc2-2017: soc2-control-cc6-1-10
    variants:
      - uid: mondoo-aws-security-dax-encryption-at-rest-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/icon: aws
    docs:
      desc: |
        This check ensures that Amazon DynamoDB Accelerator (DAX) clusters have server-side encryption (SSE) enabled. DAX is an in-memory cache for DynamoDB that stores copies of table data, and without encryption at rest, cached data is stored unencrypted in memory and on disk.

        **Why this matters**

        - DAX clusters cache frequently accessed DynamoDB data in memory. Without SSE, this cached data, which may include sensitive information, is not encrypted at rest.
        - Encryption at rest for DAX cannot be enabled after cluster creation. A new cluster must be created with encryption enabled if the existing cluster lacks it.
        - Compliance frameworks including PCI DSS, HIPAA, and NIST SP 800-53 SC-28 require encryption of sensitive data at rest, including cached copies.

        **Risk mitigation:**

        - **Data protection:** SSE encrypts data cached in DAX, ensuring sensitive DynamoDB data remains protected even in the caching layer.
        - **Compliance:** Satisfies at-rest encryption requirements that extend to all copies of data, including caches.
        - **Defense in depth:** Complements DynamoDB table-level encryption by extending protection to the DAX caching layer.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            Note: Encryption at rest cannot be enabled on an existing DAX cluster. You must create a new cluster with encryption enabled.

            1. Navigate to the **DynamoDB Console** and choose **DAX** > **Clusters**.
            2. Choose **Create cluster**.
            3. Under **Encryption**, select **Enable encryption**.
            4. Complete the cluster configuration and create the cluster.
            5. Update your application to point to the new encrypted DAX cluster endpoint.
            6. Delete the unencrypted cluster once migration is complete.
        - id: cli
          desc: |
            **Using AWS CLI**

            Create a DAX cluster with encryption at rest enabled:

            ```bash
            aws dax create-cluster \
              --cluster-name <cluster-name> \
              --node-type dax.r5.large \
              --replication-factor 3 \
              --iam-role-arn arn:aws:iam::<account-id>:role/<dax-role> \
              --sse-specification Enabled=true
            ```

            Check the SSE status of an existing cluster:

            ```bash
            aws dax describe-clusters --cluster-names <cluster-name> \
              --query "Clusters[*].{Name:ClusterName,SSE:SSEDescription.Status}"
            ```
    refs:
      - url: https://docs.aws.amazon.com/amazondynamodb/latest/developerguide/DAXEncryptionAtRest.html
        title: Amazon DynamoDB - DAX Encryption at Rest
      - url: https://docs.aws.amazon.com/securityhub/latest/userguide/dynamodb-controls.html
        title: AWS Security Hub - DynamoDB controls reference
  - uid: mondoo-aws-security-dax-encryption-at-rest-aws
    filters: asset.platform == "aws"
    mql: aws.dynamodb.daxClusters.all(sseStatus == "ENABLED")
  - uid: mondoo-aws-security-sqs-no-wildcard-policy
    title: Ensure SQS queues do not allow wildcard access policies
    impact: 80
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/soc2-2017: soc2-control-cc6-3-1
    variants:
      - uid: mondoo-aws-security-sqs-no-wildcard-policy-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/icon: aws
    docs:
      desc: |
        This check ensures that Amazon SQS queue access policies do not grant access to wildcard principals. A queue policy with `"Principal": "*"` or `"Principal": {"AWS": "*"}` without appropriate conditions allows any AWS account or unauthenticated user to perform actions on the queue.

        **Why this matters**

        - SQS queues with wildcard principal policies are effectively public, allowing any AWS account to send messages, receive messages, or delete messages depending on the actions granted.
        - Overly permissive queue policies can lead to unauthorized message injection, data exfiltration through message consumption, or denial of service through queue flooding.
        - Unlike S3 bucket policies where public access blockers provide a safety net, SQS does not have an equivalent account-level control to override permissive queue policies.

        **Risk mitigation:**

        - **Least privilege:** Restricting queue policies to specific AWS accounts, IAM roles, or services ensures only authorized entities can interact with the queue.
        - **Data protection:** Prevents unauthorized parties from reading or injecting messages that may contain sensitive application data.
        - **Compliance:** Satisfies access control requirements under NIST SP 800-53 AC-3, ISO 27001 A.8.20, and SOC 2 CC6.3.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            1. Navigate to the **Amazon SQS Console** and select the queue.
            2. Choose the **Access policy** tab.
            3. Review the policy for any statements with `"Principal": "*"` or `"Principal": {"AWS": "*"}`.
            4. Replace wildcard principals with specific AWS account IDs, IAM role ARNs, or service principals.
            5. If broad access is required, add conditions such as `aws:SourceArn`, `aws:SourceAccount`, or `aws:PrincipalOrgID` to restrict access.
            6. Choose **Save**.
        - id: cli
          desc: |
            **Using AWS CLI**

            View the current queue policy:

            ```bash
            aws sqs get-queue-attributes \
              --queue-url <queue-url> \
              --attribute-names Policy
            ```

            Set a restrictive policy that limits access to a specific account:

            ```bash
            aws sqs set-queue-attributes \
              --queue-url <queue-url> \
              --attributes '{
                "Policy": "{\"Version\":\"2012-10-17\",\"Statement\":[{\"Effect\":\"Allow\",\"Principal\":{\"AWS\":\"arn:aws:iam::<account-id>:root\"},\"Action\":\"SQS:*\",\"Resource\":\"<queue-arn>\"}]}"
              }'
            ```
    refs:
      - url: https://docs.aws.amazon.com/AWSSimpleQueueService/latest/SQSDeveloperGuide/sqs-basic-examples-of-sqs-policies.html
        title: Amazon SQS - Basic examples of Amazon SQS policies
      - url: https://docs.aws.amazon.com/securityhub/latest/userguide/sqs-controls.html
        title: AWS Security Hub - SQS controls reference
  - uid: mondoo-aws-security-sqs-no-wildcard-policy-aws
    filters: asset.platform == "aws"
    mql: |
      aws.sqs.queues.all(
        policy == empty ||
        policy['Statement'].where(_['Effect'] == "Allow").none(
          _['Principal'] == "*" || _['Principal']['AWS'] == "*" || _['Principal']['AWS'].contains("*")
        )
      )
