        arguments['encryption_type'] == "KMS" &&
        arguments['kms_key_id'] != empty
      )
  - uid: mondoo-aws-security-kinesis-cmk-typed-key-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_kinesis_stream")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_kinesis_stream").all(
        change.after['encryption_type'] == "KMS" &&
        change.after['kms_key_id'] != empty
      )
  - uid: mondoo-aws-security-kinesis-cmk-typed-key-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_kinesis_stream")
    mql: |
      terraform.state.resources.where(type == "aws_kinesis_stream").all(
        values['encryption_type'] == "KMS" &&
        values['kms_key_id'] != empty
      )
  - uid: mondoo-aws-security-kinesis-cmk-typed-key-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::Kinesis::Stream")
    mql: |
      cloudformation.template.resources.where(type == "AWS::Kinesis::Stream").all(
        properties['StreamEncryption'] != empty &&
        properties['StreamEncryption']['EncryptionType'] == "KMS" &&
        properties['StreamEncryption']['KeyId'] != empty
      )
  - uid: mondoo-aws-security-dynamodb-cmk-encryption
    title: Ensure DynamoDB tables use customer-managed KMS keys
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-11
