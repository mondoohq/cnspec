    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_s3_bucket_acl")
    mql: |
      terraform.resources.where(nameLabel == "aws_s3_bucket_acl").all(
        arguments['acl'].downcase != /public-read/
      )
