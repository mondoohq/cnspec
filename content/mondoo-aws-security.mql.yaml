          _['Condition']['Bool']['aws:SecureTransport'] == false
        )
      )
  - uid: mondoo-aws-security-s3-bucket-ownership-bucket-owner-enforced
    title: Ensure S3 buckets disable ACLs by enforcing bucket-owner ownership
    impact: 70
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-1-1
    variants:
      - uid: mondoo-aws-security-s3-bucket-ownership-bucket-owner-enforced-aws
        tags:
          mondoo.com/filter-title: AWS S3 Bucket
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-s3-bucket-ownership-bucket-owner-enforced-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-s3-bucket-ownership-bucket-owner-enforced-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-s3-bucket-ownership-bucket-owner-enforced-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-s3-bucket-ownership-bucket-owner-enforced-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that the S3 bucket has Object Ownership set to `BucketOwnerEnforced`. With this setting, ACLs are disabled and access is governed exclusively by IAM and bucket policies, removing an entire class of historical mistakes (objects uploaded with public-read ACLs).

        **Why this matters**

        Cross-account uploaders have historically retained ownership of objects, leading to scenarios where the bucket owner could neither delete nor secure objects in their own bucket. `BucketOwnerEnforced` deprecates ACLs in favor of a single, IAM-driven authorization model.
      remediation:
        - id: console
          desc: |
            1. Open the S3 console and select the bucket.
            2. Choose **Permissions** → **Object Ownership** → **Edit**.
            3. Select **ACLs disabled (recommended)** and save.
        - id: cli
          desc: |
            ```bash
            aws s3api put-bucket-ownership-controls --bucket <bucket> \
              --ownership-controls 'Rules=[{ObjectOwnership=BucketOwnerEnforced}]'
            ```
        - id: terraform
          desc: |
            Manage Object Ownership with `aws_s3_bucket_ownership_controls` and pin the rule to `BucketOwnerEnforced`:

            ```hcl
            resource "aws_s3_bucket_ownership_controls" "example" {
              bucket = aws_s3_bucket.example.id

              rule {
                object_ownership = "BucketOwnerEnforced"
              }
            }
            ```
        - id: cloudformation
          desc: |
            Set `OwnershipControls.Rules[].ObjectOwnership: BucketOwnerEnforced` on every `AWS::S3::Bucket`. This is the strongest of the three modes — ACLs are disabled and the bucket owner owns all objects regardless of uploader:

            ```yaml
            Resources:
              Bucket:
                Type: AWS::S3::Bucket
                Properties:
                  BucketName: example-secure
                  OwnershipControls:
                    Rules:
                      - ObjectOwnership: BucketOwnerEnforced
            ```
    refs:
      - url: https://docs.aws.amazon.com/AmazonS3/latest/userguide/about-object-ownership.html
        title: AWS Documentation - Controlling ownership of uploaded objects
  - uid: mondoo-aws-security-s3-bucket-ownership-bucket-owner-enforced-aws
    filters: asset.platform == "aws-s3-bucket"
    mql: |
      aws.s3.bucket.ownershipControls == "BucketOwnerEnforced"
  - uid: mondoo-aws-security-s3-bucket-ownership-bucket-owner-enforced-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_s3_bucket_ownership_controls")
    mql: |
      terraform.resources.where(nameLabel == "aws_s3_bucket_ownership_controls").all(
        blocks.where(type == "rule").any(arguments.object_ownership == "BucketOwnerEnforced")
      )
  - uid: mondoo-aws-security-s3-bucket-ownership-bucket-owner-enforced-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_s3_bucket_ownership_controls")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_s3_bucket_ownership_controls").all(
        change.after["rule"].any(_["object_ownership"] == "BucketOwnerEnforced")
      )
  - uid: mondoo-aws-security-s3-bucket-ownership-bucket-owner-enforced-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_s3_bucket_ownership_controls")
    mql: |
      terraform.state.resources.where(type == "aws_s3_bucket_ownership_controls").all(
        values["rule"].any(_["object_ownership"] == "BucketOwnerEnforced")
      )
  - uid: mondoo-aws-security-s3-bucket-ownership-bucket-owner-enforced-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::S3::Bucket")
    mql: |
      cloudformation.template.resources.where(type == "AWS::S3::Bucket").all(
        properties['OwnershipControls'] != null &&
        properties['OwnershipControls']['Rules'].any(_['ObjectOwnership'] == "BucketOwnerEnforced")
      )
