      - uid: mondoo-aws-security-redshift-cluster-public-access-check-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon Redshift clusters are not publicly accessible from the internet. Redshift clusters are often provisioned with public accessibility enabled by default in some configurations, directly exposing the data warehouse endpoint to external network access.

        **Why this matters**

        - **Data warehouse exposure:** Redshift clusters typically store large volumes of aggregated business intelligence and customer data; a publicly reachable endpoint makes this data a direct target for credential attacks.
        - **Broad attack surface:** The Redshift JDBC/ODBC port exposed to the internet is continuously scanned and probed by automated tooling looking for default credentials, known vulnerabilities, and misconfigured authentication.
        - **High-value target:** Data warehouses consolidate information from many source systems; a single successful attack against a publicly accessible Redshift cluster can yield a comprehensive dump of cross-system data.
        - **Network control bypass:** Enabling public accessibility routes around the private-subnet boundary that is intended to be the first layer of network defense for database infrastructure.

        **Risk mitigation**

        - **Private network placement:** Deploying Redshift clusters in private subnets and disabling public accessibility ensures all connections must originate from within the VPC or through explicitly provisioned private connectivity such as VPN or PrivateLink.
        - **Reduced credential risk:** Removing internet reachability means a leaked Redshift password cannot be directly exploited without the attacker first gaining access to the private network.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and open the Amazon Redshift console.
        2. In the left navigation pane, select **Clusters**.
        3. Select a cluster and open the **Properties** tab.
        4. Under **Network and security**, locate the **Publicly accessible** field.

        A passing cluster shows **No** for Publicly accessible. A failing cluster shows **Yes**.

        ### Audit via CLI

        1. Run the following command to check the public accessibility of all Redshift clusters:

        ```bash
        aws redshift describe-clusters \
          --query "Clusters[*].{ClusterIdentifier:ClusterIdentifier,PubliclyAccessible:PubliclyAccessible,VpcId:VpcId}" \
          --output table
        ```

        A passing cluster returns `"PubliclyAccessible": false`. A failing cluster returns `"PubliclyAccessible": true`.

      remediation:
        - id: console
          desc: |
            To ensure Redshift clusters are not publicly accessible using the AWS Console:

            1.  Navigate to the AWS Redshift Console.
            2.  Select Clusters in the left panel.
            3.  Select the cluster and go to the Properties tab.
            4.  Under Network and security, check Publicly accessible.
            5.  If the cluster is publicly accessible, modify the settings:
              - Select Edit publicly accessible setting.
              - Set Publicly accessible to No.
              - Select Save changes.
            6.  Ensure that the cluster is placed in a private subnet and that security groups restrict access to trusted sources only.
        - id: cli
          desc: |
            To ensure Redshift clusters are not publicly accessible using the AWS CLI, check if a Redshift cluster is publicly accessible:

            ```bash
            aws redshift describe-clusters --query "Clusters[*].{Cluster:ClusterIdentifier, PubliclyAccessible:PubliclyAccessible}"
            ```

            If a cluster is publicly accessible, modify it:

            ```bash
            aws redshift modify-cluster --cluster-identifier <cluster-id> --no-publicly-accessible
            ```

            Ensure the cluster is placed in a private subnet:

            ```bash
            aws ec2 describe-subnets --filters "Name=vpc-id,Values=<vpc-id>" --query "Subnets[*].MapPublicIpOnLaunch"
            ```

            If `MapPublicIpOnLaunch` is `true`, move the Redshift cluster to a private subnet.
        - id: terraform
          desc: |
            To ensure Redshift clusters are not publicly accessible in Terraform, ensure Redshift clusters are not publicly accessible:

            ```hcl
            resource "aws_redshift_cluster" "secure_redshift" {
              cluster_identifier  = "secure-redshift-cluster"
              node_type           = "dc2.large"
              master_username     = "admin"
              master_password     = var.redshift_master_password
              publicly_accessible = false  # Ensure Redshift is private
              cluster_subnet_group_name = aws_redshift_subnet_group.private_redshift_subnet.name
            }

            resource "aws_redshift_subnet_group" "private_redshift_subnet" {
              name       = "private-redshift-subnet"
              subnet_ids = [aws_subnet.private1.id, aws_subnet.private2.id]
            }
            ```
        - id: cloudformation
          desc: |
            To ensure Redshift clusters are not publicly accessible in CloudFormation, ensure Redshift clusters are not publicly accessible:

            ```yaml
            Resources:
              SecureRedshiftCluster:
                Type: "AWS::Redshift::Cluster"
                Properties:
                  ClusterIdentifier: "secure-redshift-cluster"
                  NodeType: "dc2.large"
                  MasterUsername: "admin"
                  MasterUserPassword: "securepassword"
                  PubliclyAccessible: false
                  ClusterSubnetGroupName: !Ref PrivateRedshiftSubnetGroup

              PrivateRedshiftSubnetGroup:
                Type: "AWS::Redshift::ClusterSubnetGroup"
                Properties:
                  Description: "Private Redshift Subnet Group"
                  SubnetIds:
                    - !Ref PrivateSubnet1
                    - !Ref PrivateSubnet2
            ```
