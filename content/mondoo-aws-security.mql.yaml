      - uid: mondoo-aws-security-securityhub-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that AWS Security Hub is enabled in your AWS account. Security Hub provides a comprehensive view of your security posture, aggregating findings from multiple AWS security services and third-party tools.

        **Why this matters**

        - Without Security Hub, security findings from services like GuardDuty, Inspector, and Macie are siloed and difficult to prioritize.
        - Security Hub provides automated compliance checks against CIS AWS Foundations Benchmark and PCI DSS.
        - Centralized visibility into security findings is essential for effective security operations.

        **Risk mitigation**

        - **Centralized visibility:** Aggregates findings from multiple security services into a single dashboard.
        - **Automated compliance:** Continuously evaluates your environment against industry standards.
        - **Prioritization:** Normalizes findings using the AWS Security Finding Format (ASFF).
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and navigate to **AWS Security Hub**.
        2. Review the Security Hub overview page.
        3. Verify that Security Hub is active and the security summary is visible.
        4. Repeat the check for each AWS region in use.

        A passing account shows Security Hub as enabled with a security summary dashboard. A failing account shows the Security Hub welcome page with an option to enable the service.

        ### Audit via CLI

        1. Check whether Security Hub is enabled by describing the hub resource in the current region:

        ```bash
        aws securityhub describe-hub --query "HubArn"
        ```

        A passing account returns a `HubArn` value. A failing account returns an error indicating Security Hub is not subscribed or enabled in the region.

      remediation:
        - id: console
          desc: |
            To ensure AWS Security Hub is enabled using the AWS Console:

            1. Navigate to the AWS Security Hub Console.
            2. Choose Go to Security Hub.
            3. Select the security standards you want to enable.
            4. Choose Enable Security Hub.
        - id: cli
          desc: |
            To ensure AWS Security Hub is enabled using the AWS CLI:

            ```bash
            aws securityhub enable-security-hub
            ```
        - id: terraform
          desc: |
            To ensure AWS Security Hub is enabled in Terraform:

            ```hcl
            resource "aws_securityhub_account" "main" {}
            ```
        - id: cloudformation
          desc: |
            To ensure AWS Security Hub is enabled in CloudFormation:

            ```yaml
            Resources:
              SecurityHub:
                Type: AWS::SecurityHub::Hub
                Properties: {}
            ```
    refs:
      - url: https://docs.aws.amazon.com/securityhub/latest/userguide/what-is-securityhub.html
        title: AWS Documentation - What is AWS Security Hub?
