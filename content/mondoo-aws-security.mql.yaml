      )
  - uid: mondoo-aws-security-dms-endpoint-ssl-enforced-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_dms_endpoint")
    mql: |
      terraform.state.resources.where(type == "aws_dms_endpoint").all(
        values.ssl_mode != empty && values.ssl_mode != "none"
      )
  - uid: mondoo-aws-security-dms-endpoint-ssl-enforced-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::DMS::Endpoint")
    mql: |
      cloudformation.template.resources.where(type == "AWS::DMS::Endpoint").all(
        properties['SslMode'] != empty && properties['SslMode'] != "none"
      )
  - uid: mondoo-aws-security-appmesh-virtual-node-tls-required
    title: Ensure App Mesh virtual node listeners require TLS
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    variants:
      - uid: mondoo-aws-security-appmesh-virtual-node-tls-required-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-appmesh-virtual-node-tls-required-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-appmesh-virtual-node-tls-required-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-appmesh-virtual-node-tls-required-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-appmesh-virtual-node-tls-required-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that every AWS App Mesh virtual node listener is configured with a TLS block whose `mode` is set to `STRICT` or `PERMISSIVE`. App Mesh defaults each listener to TLS disabled, so without an explicit `tls` block the Envoy proxy fronting the virtual node accepts plaintext traffic from any peer that can route to it inside the mesh.

        **Why this matters**

        - **Lateral movement exposure:** App Mesh is typically deployed inside a VPC that operators treat as a trusted boundary, which is exactly the assumption attackers exploit during lateral movement once a single workload is compromised.
        - **Plaintext sidecar traffic:** With TLS disabled at the listener, sidecar-to-sidecar traffic is plaintext gRPC or HTTP, and any compromised workload on the same subnet can read or rewrite it without detection.
        - **Incremental migration support:** `PERMISSIVE` mode accepts both TLS and plaintext during a migration window while still enabling certificate management, allowing existing services to be migrated gradually before locking down to `STRICT`.
        - **Certificate discoverability:** The TLS block is also where the certificate source is pinned to ACM, ACM Private CA, or a file-based certificate, keeping key material discoverable and auditable.

        **Risk mitigation**

        - **East-west traffic encryption:** Enforcing TLS at the virtual node listener ensures that service-to-service communication within the mesh is encrypted, containing the blast radius of a compromised sidecar or workload.
        - **Identity binding:** When the TLS certificate comes from ACM Private CA, each virtual node's certificate is bound to a verifiable identity, enabling mutual TLS and preventing impersonation by rogue services inside the VPC.
        - **Audit surface:** Encrypted mesh traffic combined with Envoy access logs creates an auditable record of service interactions, supporting detection of anomalous communication patterns that are invisible in a plaintext mesh.
      audit: |
        ### Audit via Console

        1. Open the **AWS App Mesh** console and select the mesh.
        2. Choose **Virtual nodes** and select each node.
        3. For each listener, expand the listener details and confirm that **TLS mode** is set to `STRICT` or `PERMISSIVE`.

        A passing virtual node shows every listener with a TLS mode of `STRICT` or `PERMISSIVE`. A failing virtual node shows at least one listener with no TLS configuration or TLS mode set to `DISABLED`.

        ### Audit via CLI

        1. List all meshes, then describe each virtual node's listener TLS configuration:

        ```bash
        aws appmesh list-meshes --query 'meshes[*].meshName'
        ```

        ```bash
        aws appmesh describe-virtual-node \
          --mesh-name <mesh-name> \
          --virtual-node-name <node-name> \
          --query 'virtualNode.spec.listeners[*].tls'
        ```

        A passing virtual node returns a `tls` object on every listener with `mode` equal to `STRICT` or `PERMISSIVE`. A failing virtual node returns `null` or an empty `tls` object on at least one listener.
      remediation:
        - id: console
          desc: |
            To require TLS on an App Mesh virtual node listener using the AWS Console:

            1. Open the **App Mesh** console and choose the mesh.
            2. Select the virtual node and edit each listener.
            3. Enable **Client policy** → **TLS** and set the mode to `STRICT` (or `PERMISSIVE` during a migration), then choose a certificate source.
            4. Save the virtual node.
        - id: cli
          desc: |
            To require TLS on an App Mesh virtual node using the AWS CLI, supply a listener spec with a TLS block:

            ```bash
            aws appmesh update-virtual-node \
              --mesh-name <mesh> \
              --virtual-node-name <node> \
              --spec file://virtual-node-spec.json
            ```

            where the listener block in `virtual-node-spec.json` includes a `tls` object with `mode: STRICT` and a certificate source.
        - id: terraform
          desc: |
            To require TLS on an App Mesh virtual node in Terraform, declare a `tls` block under each `listener` in the node spec:

            ```hcl
            resource "aws_appmesh_virtual_node" "example" {
              name      = "example"
              mesh_name = aws_appmesh_mesh.example.id

              spec {
                listener {
                  port_mapping {
                    port     = 8080
                    protocol = "http"
                  }

                  tls {
                    mode = "STRICT"

                    certificate {
                      acm {
                        certificate_arn = aws_acm_certificate.example.arn
                      }
                    }
                  }
                }
              }
            }
            ```
        - id: cloudformation
          desc: |
            To require TLS on an App Mesh virtual node in CloudFormation, set a `TLS` block on each listener:

            ```yaml
            Resources:
              MyVirtualNode:
                Type: AWS::AppMesh::VirtualNode
                Properties:
                  MeshName: !Ref MyMesh
                  VirtualNodeName: example
                  Spec:
                    Listeners:
                      - PortMapping:
                          Port: 8080
                          Protocol: http
                        TLS:
                          Mode: STRICT
                          Certificate:
                            ACM:
                              CertificateArn: !Ref MyCertificate
            ```
    refs:
      - url: https://docs.aws.amazon.com/app-mesh/latest/userguide/tls.html
        title: Transport Layer Security (TLS) in App Mesh
  - uid: mondoo-aws-security-appmesh-virtual-node-tls-required-aws
    filters: asset.platform == "aws"
    mql: |
      aws.appmesh.meshes.all(
        virtualNodes.all(
          listeners.all(
            _['tls'] != null &&
            _['tls']['mode'] == "STRICT" ||
            _['tls'] != null &&
            _['tls']['mode'] == "PERMISSIVE"
          )
        )
      )
  - uid: mondoo-aws-security-appmesh-virtual-node-tls-required-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_appmesh_virtual_node")
    mql: |
      terraform.resources.where(nameLabel == "aws_appmesh_virtual_node").all(
        blocks.where(type == "spec").all(
          blocks.where(type == "listener") != empty &&
          blocks.where(type == "listener").all(
            blocks.where(type == "tls") != empty &&
            blocks.where(type == "tls").all(
              arguments.mode == "STRICT" || arguments.mode == "PERMISSIVE"
            )
          )
        )
      )
  - uid: mondoo-aws-security-appmesh-virtual-node-tls-required-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_appmesh_virtual_node")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_appmesh_virtual_node").all(
        change.after.spec != empty &&
        change.after.spec.all(
          _['listener'] != empty &&
          _['listener'].all(
            _['tls'] != empty &&
            _['tls'].all(
              _['mode'] == "STRICT" || _['mode'] == "PERMISSIVE"
            )
          )
        )
      )
  - uid: mondoo-aws-security-appmesh-virtual-node-tls-required-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_appmesh_virtual_node")
    mql: |
      terraform.state.resources.where(type == "aws_appmesh_virtual_node").all(
        values.spec != empty &&
        values.spec.all(
          _['listener'] != empty &&
          _['listener'].all(
            _['tls'] != empty &&
            _['tls'].all(
              _['mode'] == "STRICT" || _['mode'] == "PERMISSIVE"
            )
          )
        )
      )
  - uid: mondoo-aws-security-appmesh-virtual-node-tls-required-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::AppMesh::VirtualNode")
    mql: |
      cloudformation.template.resources.where(type == "AWS::AppMesh::VirtualNode").all(
        properties['Spec']['Listeners'] != empty &&
        properties['Spec']['Listeners'].all(
          _['TLS'] != null &&
          _['TLS']['Mode'] == "STRICT" ||
          _['TLS'] != null &&
          _['TLS']['Mode'] == "PERMISSIVE"
        )
      )
