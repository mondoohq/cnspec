          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-codebuild-encryption-key-configured-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-codebuild-encryption-key-configured-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-codebuild-encryption-key-configured-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-codebuild-encryption-key-configured-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that AWS CodeBuild projects are configured with a customer managed KMS key for encrypting build artifacts. By default, CodeBuild uses an AWS-managed key, which provides no audit logging for key usage, no ability to customize rotation policy, and no fine-grained access control over who can decrypt build artifacts.

        **Why this matters**

        - **Build artifact sensitivity:** CodeBuild artifacts may contain compiled binaries, deployment packages, and test credentials that represent privileged access to production systems.
        - **Audit logging:** Encrypt and decrypt operations against a customer managed KMS key are recorded in CloudTrail, creating an audit trail for every access to build artifacts that the AWS-managed key does not provide.
        - **Access control:** KMS key policies allow organizations to restrict which principals can decrypt build artifacts, preventing unauthorized use even if an S3 bucket policy is misconfigured.
        - **Supply chain protection:** Controlling decryption access to build artifacts reduces the risk that an attacker who gains S3 read access can extract and analyze deployment packages.

        **Risk mitigation**

        - **Key-level access restriction:** Binding a CMK to CodeBuild ensures that decrypting artifacts requires both S3 access and explicit KMS key permission, enforcing defense in depth.
        - **Incident response capability:** A CMK can be disabled immediately to block further access to artifacts if a breach of the build pipeline is suspected.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and open the **CodeBuild** console.
        2. In the left navigation pane, choose **Build projects**.
        3. Select a project.
        4. Under **Artifacts**, review the **Encryption key** field.

        A passing project shows a customer managed KMS key ARN as the encryption key. A failing project shows the default AWS managed key (typically displayed as `aws/s3`) or no custom key configured.

        ### Audit via CLI

        1. List all CodeBuild projects and describe each to check the encryption key:

        ```bash
        aws codebuild batch-get-projects \
          --names <project-name> \
          --query 'projects[*].{Name:name,EncryptionKey:encryptionKey}'
        ```

        A passing project returns an `EncryptionKey` ARN whose `KeyManager` is `CUSTOMER`. A failing project returns the default AWS managed key ARN or no value.
      remediation:
        - id: console
          desc: |
            To ensure CodeBuild projects use KMS CMKs for artifact encryption using the AWS Console:

            1. Navigate to the AWS CodeBuild Console.
            2. Select Build projects in the left panel.
            3. Select the project to update.
            4. Choose Edit and then Artifacts.
            5. Under Encryption key, select Custom key.
            6. Choose an existing KMS key or create a new one.
            7. Choose Update artifacts to save the changes.
        - id: cli
          desc: |
            To ensure CodeBuild projects use KMS CMKs for artifact encryption using the AWS CLI, update a CodeBuild project to use a KMS CMK:

            ```bash
            aws codebuild update-project \
              --name <project-name> \
              --encryption-key arn:aws:kms:<region>:<account-id>:key/<key-id>
            ```
        - id: terraform
          desc: |
            To ensure CodeBuild projects use KMS CMKs for artifact encryption in Terraform:

            ```hcl
            resource "aws_codebuild_project" "example" {
              name          = "example"
              encryption_key = aws_kms_key.codebuild.arn

              artifacts {
                type = "S3"
              }

              environment {
                compute_type = "BUILD_GENERAL1_SMALL"
                image        = "aws/codebuild/standard:7.0"
                type         = "LINUX_CONTAINER"
              }

              source {
                type = "GITHUB"
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure CodeBuild projects use KMS CMKs for artifact encryption in CloudFormation:

            ```yaml
            Resources:
              CodeBuildProject:
                Type: AWS::CodeBuild::Project
                Properties:
                  Name: example
                  EncryptionKey: !GetAtt CodeBuildKMSKey.Arn
                  Artifacts:
                    Type: S3
                  Environment:
                    ComputeType: BUILD_GENERAL1_SMALL
                    Image: aws/codebuild/standard:7.0
                    Type: LINUX_CONTAINER
                  Source:
                    Type: GITHUB
            ```
    refs:
      - url: https://docs.aws.amazon.com/codebuild/latest/userguide/security-encryption.html
        title: AWS Documentation - Data encryption in AWS CodeBuild
      - url: https://docs.aws.amazon.com/codebuild/latest/userguide/security.html
        title: AWS Documentation - Security in AWS CodeBuild
  - uid: mondoo-aws-security-codebuild-encryption-key-configured-aws
    filters: asset.platform == "aws"
    mql: aws.codebuild.projects.all(encryptionKey.metadata["KeyManager"] == "CUSTOMER")
  - uid: mondoo-aws-security-codebuild-encryption-key-configured-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_codebuild_project")
    mql: |
      terraform.resources.where(nameLabel == "aws_codebuild_project").all(
        arguments.encryption_key != empty
      )
  - uid: mondoo-aws-security-codebuild-encryption-key-configured-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_codebuild_project")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_codebuild_project").all(
        change.after.encryption_key != ""
      )
  - uid: mondoo-aws-security-codebuild-encryption-key-configured-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_codebuild_project")
    mql: |
      terraform.state.resources.where(type == "aws_codebuild_project").all(
        values.encryption_key != ""
      )
  - uid: mondoo-aws-security-codebuild-encryption-key-configured-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::CodeBuild::Project")
    mql: |
      cloudformation.template.resources.where(type == "AWS::CodeBuild::Project").all(
      properties['EncryptionKey'] != ""
      )
  - uid: mondoo-aws-security-neptune-cluster-snapshot-encrypted
    title: Ensure Neptune DB cluster snapshots are encrypted at rest
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-aws-security-neptune-cluster-snapshot-encrypted-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-neptune-cluster-snapshot-encrypted-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-neptune-cluster-snapshot-encrypted-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-neptune-cluster-snapshot-encrypted-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-neptune-cluster-snapshot-encrypted-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon Neptune DB cluster snapshots have storage encryption enabled. Snapshots can be shared across AWS accounts or inadvertently made public, so their encryption status matters independently of the source cluster's encryption setting.

        **Why this matters**

        - **Cross-account sharing risk:** Snapshots shared with another AWS account expose their contents to that account's principals; unencrypted snapshots make this data available in plaintext without any additional access control.
        - **Accidental public exposure:** An unencrypted snapshot that is mistakenly made public exposes the complete graph database contents to anyone with internet access.
        - **Backup data parity:** Regulatory and compliance frameworks require that backup copies maintain the same encryption posture as the source data, which makes snapshot encryption independently verifiable.
        - **Data exfiltration via snapshots:** Attackers with limited permissions may be able to copy a snapshot to an account they control; encryption ensures the copy is useless without the associated KMS key.

        **Risk mitigation**

        - **Data-at-rest protection:** Encrypted snapshots ensure that graph data remains protected even if the snapshot is accessed outside the intended AWS account boundary.
        - **Compliance audit simplification:** Consistent encryption across the cluster and all its snapshots provides a clean audit result without requiring case-by-case snapshot reviews.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and navigate to the **Amazon Neptune** service.
        2. In the left navigation pane, select **Snapshots**.
        3. Review each snapshot listed under **Cluster snapshots**.
        4. Check the **Encrypted** column for each snapshot.

        A passing snapshot shows **Yes** in the **Encrypted** column. A failing snapshot shows **No**.

        ### Audit via CLI

        1. Run the following command to list all Neptune cluster snapshots and their encryption status:

        ```bash
        aws neptune describe-db-cluster-snapshots \
          --query "DBClusterSnapshots[*].{SnapshotId:DBClusterSnapshotIdentifier,Encrypted:StorageEncrypted}" \
          --output table
        ```

        A passing snapshot returns `StorageEncrypted: true`. A failing snapshot returns `StorageEncrypted: false`.

      remediation:
        - id: console
          desc: |
            To ensure Neptune DB cluster snapshots are encrypted at rest using the AWS Console, neptune snapshots inherit the encryption setting from the source cluster. To ensure snapshots are encrypted:

            1. Navigate to the Amazon Neptune Console.
            2. Select Databases in the left panel.
            3. Verify the source cluster has encryption enabled.
            4. If the cluster is not encrypted, create a new encrypted cluster and migrate data.
            5. For existing unencrypted snapshots, copy them with encryption enabled:
              - Select Snapshots in the left panel.
              - Select the unencrypted snapshot.
              - Choose Actions > Copy snapshot.
              - Enable encryption and select a KMS key.
              - Select Copy snapshot.
        - id: cli
          desc: |
            To ensure Neptune DB cluster snapshots are encrypted at rest using the AWS CLI, check if Neptune cluster snapshots are encrypted:

            ```bash
            aws neptune describe-db-cluster-snapshots \
              --query "DBClusterSnapshots[*].{SnapshotId:DBClusterSnapshotIdentifier,Encrypted:StorageEncrypted}"
            ```

            Copy an unencrypted snapshot with encryption:

            ```bash
            aws neptune copy-db-cluster-snapshot \
              --source-db-cluster-snapshot-identifier <snapshot-id> \
              --target-db-cluster-snapshot-identifier <new-snapshot-id> \
              --kms-key-id arn:aws:kms:<region>:<account-id>:key/<key-id>
            ```
        - id: terraform
          desc: |
            To ensure Neptune DB cluster snapshots are encrypted at rest in Terraform, ensure the source Neptune cluster is encrypted (snapshots inherit encryption):

            ```hcl
            resource "aws_neptune_cluster" "example" {
              cluster_identifier  = "example"
              engine              = "neptune"
              storage_encrypted   = true
              kms_key_arn         = aws_kms_key.neptune.arn
            }
            ```
        - id: cloudformation
          desc: |
            To ensure Neptune DB cluster snapshots are encrypted at rest in CloudFormation, ensure the source Neptune cluster is encrypted (snapshots inherit encryption):

            ```yaml
            Resources:
              NeptuneCluster:
                Type: AWS::Neptune::DBCluster
                Properties:
                  DBClusterIdentifier: example
                  StorageEncrypted: true
                  KmsKeyId: !Ref NeptuneKMSKey
            ```
    refs:
      - url: https://docs.aws.amazon.com/neptune/latest/userguide/encrypt.html
        title: AWS Documentation - Encrypting Neptune resources
      - url: https://docs.aws.amazon.com/neptune/latest/userguide/backup-restore-overview.html
        title: AWS Documentation - Neptune DB cluster snapshots
  - uid: mondoo-aws-security-neptune-cluster-snapshot-encrypted-aws
    filters: asset.platform == "aws-neptune-cluster"
    mql: |
      aws.neptune.cluster.snapshots.all(storageEncrypted == true)
  - uid: mondoo-aws-security-neptune-cluster-snapshot-encrypted-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_neptune_cluster")
    mql: |
      terraform.resources.where(nameLabel == "aws_neptune_cluster").all(
        arguments.storage_encrypted == true
      )
  - uid: mondoo-aws-security-neptune-cluster-snapshot-encrypted-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_neptune_cluster")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_neptune_cluster").all(
        change.after.storage_encrypted == true
      )
  - uid: mondoo-aws-security-neptune-cluster-snapshot-encrypted-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_neptune_cluster")
    mql: |
      terraform.state.resources.where(type == "aws_neptune_cluster").all(
        values.storage_encrypted == true
      )
  - uid: mondoo-aws-security-neptune-cluster-snapshot-encrypted-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::Neptune::DBCluster")
    mql: |
      cloudformation.template.resources.where(type == "AWS::Neptune::DBCluster").all(
      properties['StorageEncrypted'] == true
      )
  - uid: mondoo-aws-security-ec2-source-dest-check
    title: Ensure EC2 instances have source/destination check enabled
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-aws-security-ec2-source-dest-check-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-ec2-source-dest-check-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ec2-source-dest-check-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ec2-source-dest-check-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ec2-source-dest-check-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that the source/destination check is enabled on EC2 instances. By default this check is enabled; disabling it allows an instance to receive and forward network traffic not addressed to it, which is only required for instances intentionally operating as NAT gateways, VPN appliances, or network bridges.

        **Why this matters**

        - **Traffic interception:** An instance with the check disabled can receive packets destined for other hosts, enabling a compromised instance to act as a man-in-the-middle and inspect or modify traffic within the VPC.
        - **Security group bypass:** Routing traffic through an instance with the check disabled can allow that traffic to bypass security group rules applied to the actual destination, circumventing network access controls.
        - **IP spoofing enablement:** With the check disabled, an instance can send packets with a source IP address that does not belong to it, masking the origin of malicious traffic within the VPC.
        - **Lateral movement facilitation:** A compromised instance acting as a network bridge can reach subnets and resources that would otherwise be inaccessible based on the instance's own security group rules.

        **Risk mitigation**

        - **Network integrity enforcement:** Keeping the check enabled ensures each instance processes only its own traffic, preserving the routing assumptions on which VPC security group rules are built.
        - **Compromise isolation:** If an instance is compromised, the source/destination check limits the attacker's ability to pivot to other network segments by restricting what traffic the instance can handle.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and navigate to the **Amazon EC2** service.
        2. In the left navigation pane, select **Instances**.
        3. Select an instance that is not in a `terminated` or `shutting-down` state.
        4. In the instance details pane, select the **Networking** tab.
        5. Locate the **Source/destination check** field.

        A passing instance shows **Enabled** for source/destination check. A failing instance shows **Disabled**.

        ### Audit via CLI

        1. Run the following command to check the source/destination check setting for all running instances:

        ```bash
        aws ec2 describe-instances \
          --filters "Name=instance-state-name,Values=running,stopped,pending" \
          --query "Reservations[*].Instances[*].{InstanceId:InstanceId,SourceDestCheck:SourceDestCheck,State:State.Name}" \
          --output table
        ```

        A passing instance returns `SourceDestCheck: true`. A failing instance returns `SourceDestCheck: false`.

      remediation:
        - id: console
          desc: |
            To ensure EC2 instances have source/destination check enabled using the AWS Console:

            1. Navigate to the Amazon EC2 Console.
            2. Select Instances in the left panel.
            3. Select the instance to update.
            4. Choose Actions > Networking > Change source/destination check.
            5. Ensure the source/destination check is enabled (checked).
            6. Select Save.
        - id: cli
          desc: |
            To ensure EC2 instances have source/destination check enabled using the AWS CLI, enable source/destination check on an instance:

            ```bash
            aws ec2 modify-instance-attribute \
              --instance-id <instance-id> \
              --source-dest-check
            ```

            Verify the current setting:

            ```bash
            aws ec2 describe-instance-attribute \
              --instance-id <instance-id> \
              --attribute sourceDestCheck
            ```
        - id: terraform
          desc: |
            To ensure EC2 instances have source/destination check enabled in Terraform:

            ```hcl
            resource "aws_instance" "example" {
              ami               = "ami-12345678"
              instance_type     = "t3.micro"
              source_dest_check = true  # This is the default
            }
            ```
        - id: cloudformation
          desc: |
            To ensure EC2 instances have source/destination check enabled in CloudFormation:

            ```yaml
            Resources:
              EC2Instance:
                Type: AWS::EC2::Instance
                Properties:
                  InstanceType: t3.micro
                  ImageId: ami-12345678
                  SourceDestCheck: true
            ```
    refs:
      - url: https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/using-eni.html#change_source_dest_check
        title: AWS Documentation - Change the source/destination check
      - url: https://docs.aws.amazon.com/vpc/latest/userguide/VPC_NAT_Instance.html
        title: AWS Documentation - NAT instances
  - uid: mondoo-aws-security-ec2-source-dest-check-aws
    filters: |
      asset.platform == "aws"
    mql: |
      aws.ec2.instances.where(
        state != /terminated|shutting-down/
      ).all(
        sourceDestCheck == true
      )
  - uid: mondoo-aws-security-ec2-source-dest-check-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_instance")
    mql: |
      terraform.resources.where(nameLabel == "aws_instance").all(
        arguments.source_dest_check != false
      )
  - uid: mondoo-aws-security-ec2-source-dest-check-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_instance")
    mql: terraform.plan.resourceChanges.where(type == "aws_instance").all(change.after.source_dest_check != false)
  - uid: mondoo-aws-security-ec2-source-dest-check-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_instance")
    mql: terraform.state.resources.where(type == "aws_instance").all(values.source_dest_check != false)
  - uid: mondoo-aws-security-ec2-source-dest-check-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::EC2::Instance")
    mql: |
      cloudformation.template.resources.where(type == "AWS::EC2::Instance").all(properties['SourceDestCheck'] != false)
  # No Terraform variants: Boot mode is determined by the AMI launched, not by an `aws_instance` argument. The runtime check inspects `currentInstanceBootMode` from the live instance; there is no clean Terraform analog.
  - uid: mondoo-aws-security-ec2-uefi-boot-mode
    title: Ensure EC2 instances use UEFI boot mode
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-c-1-integrity
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-1
      compliance/nist-csf-2: nist-csf-2-pr-ps-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-1
      compliance/pci-dss-4: pcidss-requirement-2-2-1
      compliance/soc2-2017: soc2-control-cc6-8-2
      compliance/vda-isa-5: false
    variants:
      - uid: mondoo-aws-security-ec2-uefi-boot-mode-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
    docs:
      desc: |
        This check ensures that Amazon EC2 instances use UEFI boot mode instead of legacy BIOS. UEFI supports Secure Boot, which validates that boot software is signed and untampered, protecting against boot-level malware such as rootkits and bootkits.

        **Why this matters**

        - Legacy BIOS boot mode lacks Secure Boot capabilities, leaving instances vulnerable to boot-level attacks that execute before the operating system loads.
        - UEFI Secure Boot ensures that only trusted, signed firmware and bootloaders are executed during startup.
        - Modern instance types and AMIs support UEFI, and AWS recommends migrating away from legacy BIOS for improved security posture.
        - Compliance frameworks including NIST 800-53 and CIS Benchmarks recommend firmware integrity protections.

        **Risk mitigation**

        - **Boot integrity:** Prevents unauthorized modification of boot components.
        - **Malware protection:** Blocks rootkits and bootkits that tamper with the boot process.
        - **Modern security:** Aligns with current best practices for instance hardening.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and navigate to the **Amazon EC2** service.
        2. In the left navigation pane, select **Instances**.
        3. Select a running instance.
        4. In the instance details pane, select the **Details** tab.
        5. Locate the **Boot mode** and **Current instance boot mode** fields.

        A passing instance shows **uefi** or **uefi-preferred** under **Current instance boot mode**. A failing instance shows **legacy-bios**.

        ### Audit via CLI

        1. Run the following command to retrieve the boot mode and current instance boot mode for all running instances:

        ```bash
        aws ec2 describe-instances \
          --filters "Name=instance-state-name,Values=running" \
          --query "Reservations[*].Instances[*].{InstanceId:InstanceId,BootMode:BootMode,CurrentBootMode:CurrentInstanceBootMode}" \
          --output table
        ```

        A passing instance returns `CurrentInstanceBootMode` of `uefi` or `uefi-preferred`. A failing instance returns `CurrentInstanceBootMode` of `legacy-bios` or a blank value.

      remediation:
        - id: console
          desc: |
            To ensure EC2 instances use UEFI boot mode using the AWS Console:

            1. Navigate to the **EC2 Console**.
            2. When launching new instances, select an AMI that supports UEFI boot mode.
            3. For existing instances, check the **Boot mode** in instance details.
            4. To migrate, create a new UEFI-compatible AMI and launch replacement instances.
            5. Note: Boot mode cannot be changed on a running instance; a new instance must be launched.
        - id: cli
          desc: |
            To ensure EC2 instances use UEFI boot mode using the AWS CLI, check the boot mode of an instance:

            ```bash
            aws ec2 describe-instances --instance-ids <instance-id> \
              --query "Reservations[*].Instances[*].[InstanceId,BootMode,CurrentInstanceBootMode]"
            ```

            Launch a new instance with UEFI boot mode by selecting a UEFI-compatible AMI:

            ```bash
            aws ec2 describe-images --image-ids <ami-id> \
              --query "Images[*].[ImageId,BootMode]"
            ```
        - id: terraform
          desc: |
            To ensure EC2 instances use UEFI boot mode in Terraform, UEFI boot mode is determined by the AMI. Select a UEFI-compatible AMI for your instances:

            ```hcl
            resource "aws_instance" "example" {
              ami           = "ami-xxxxxxxxx"  # Use a UEFI-compatible AMI
              instance_type = "m6i.large"
            }
            ```
        - id: cloudformation
          desc: |
            To ensure EC2 instances use UEFI boot mode in CloudFormation, UEFI boot mode is determined by the AMI. Select a UEFI-compatible AMI for your instances:

            ```yaml
            Resources:
              MyInstance:
                Type: AWS::EC2::Instance
                Properties:
                  ImageId: ami-xxxxxxxxx  # Use a UEFI-compatible AMI
                  InstanceType: m6i.large
            ```
    refs:
      - url: https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/ami-boot.html
        title: Boot modes for Amazon EC2 instances
  - uid: mondoo-aws-security-ec2-uefi-boot-mode-aws
    filters: asset.platform == "aws"
    mql: |
      aws.ec2.instances.where(state == "running").all(
        currentInstanceBootMode == "uefi" || currentInstanceBootMode == "uefi-preferred"
      )
  - uid: mondoo-aws-security-ec2-no-paravirtual-instances
    title: Ensure EC2 instances use HVM virtualization
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-c-1-integrity
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-1
      compliance/nist-csf-2: nist-csf-2-pr-ps-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-1
      compliance/pci-dss-4: pcidss-requirement-2-2-1
      compliance/soc2-2017: soc2-control-cc6-8-2
      compliance/vda-isa-5: false
    variants:
      - uid: mondoo-aws-security-ec2-no-paravirtual-instances-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-ec2-no-paravirtual-instances-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ec2-no-paravirtual-instances-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ec2-no-paravirtual-instances-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Amazon EC2 instances use Hardware Virtual Machine (HVM) virtualization instead of paravirtual (PV). PV instances use older virtualization technology with a larger attack surface and are not supported on modern instance types.

        **Why this matters**

        - Paravirtual instances rely on modified guest kernels that interact directly with the hypervisor, increasing the potential attack surface for guest-to-host escape vulnerabilities.
        - HVM instances run on fully virtualized hardware with hardware-assisted virtualization extensions (Intel VT-x, AMD-V), providing stronger isolation.
        - AWS has deprecated PV instance types, and no modern instance families support PV virtualization.
        - PV instances cannot use Enhanced Networking, EBS optimization, or GPU capabilities available to HVM instances.

        **Risk mitigation**

        - **Stronger isolation:** HVM provides hardware-level isolation between guest and host.
        - **Reduced attack surface:** Eliminates PV-specific hypervisor call interfaces.
        - **Modern security features:** HVM supports NitroTPM, Secure Boot, and other advanced security features.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and navigate to the **Amazon EC2** service.
        2. In the left navigation pane, select **Instances**.
        3. Add the **Virtualization** column to the table by choosing the column preferences icon and enabling it.
        4. Review the **Virtualization** column for each running instance.

        A passing instance shows **hvm** in the **Virtualization** column. A failing instance shows **paravirtual**.

        ### Audit via CLI

        1. Run the following command to list all running instances and their virtualization type:

        ```bash
        aws ec2 describe-instances \
          --filters "Name=instance-state-name,Values=running" \
          --query "Reservations[*].Instances[*].{InstanceId:InstanceId,VirtualizationType:VirtualizationType}" \
          --output table
        ```

        A passing instance returns `VirtualizationType: hvm`. A failing instance returns `VirtualizationType: paravirtual`.

      remediation:
        - id: console
          desc: |
            To ensure EC2 instances use HVM virtualization using the AWS Console:

            1. Navigate to the **EC2 Console** and select **Instances**.
            2. Check the **Virtualization type** column for each instance.
            3. For any PV instances, plan migration to HVM:
              - Create an HVM-compatible AMI or select a new HVM AMI.
              - Launch a replacement HVM instance.
              - Migrate workloads and terminate the PV instance.
        - id: cli
          desc: |
            To ensure EC2 instances use HVM virtualization using the AWS CLI, list instances with their virtualization type:

            ```bash
            aws ec2 describe-instances \
              --query "Reservations[*].Instances[*].[InstanceId,VirtualizationType,State.Name]" \
              --output table
            ```

            Filter for paravirtual instances:

            ```bash
            aws ec2 describe-instances --filters "Name=virtualization-type,Values=paravirtual" \
              --query "Reservations[*].Instances[*].InstanceId"
            ```
        - id: terraform
          desc: |
            To ensure EC2 instances use HVM virtualization in Terraform, ensure instances use HVM AMIs (all modern AMIs use HVM):

            ```hcl
            resource "aws_instance" "example" {
              ami           = "ami-xxxxxxxxx"  # Use an HVM AMI
              instance_type = "t3.micro"       # Modern instance types only support HVM
            }
            ```
        - id: cloudformation
          desc: |
            To ensure EC2 instances use HVM virtualization in CloudFormation, ensure instances use HVM AMIs (all modern AMIs use HVM):

            ```yaml
            Resources:
              MyInstance:
                Type: AWS::EC2::Instance
                Properties:
                  ImageId: ami-xxxxxxxxx  # Use an HVM AMI
                  InstanceType: t3.micro  # Modern instance types only support HVM
            ```
    refs:
      - url: https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/virtualization_types.html
        title: Amazon EC2 virtualization types
  - uid: mondoo-aws-security-ec2-no-paravirtual-instances-aws
    filters: asset.platform == "aws"
    mql: |
      aws.ec2.instances.where(state == "running").all(
        virtualizationType == "hvm"
      )
  - uid: mondoo-aws-security-ec2-no-paravirtual-instances-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_instance")
    mql: |
      terraform.resources.where(nameLabel == "aws_instance").none(
        arguments['instance_type'] == /^(t1|m1|m2|c1|cc1|cc2|cg1|cr1|hi1|hs1)\./
      )
  - uid: mondoo-aws-security-ec2-no-paravirtual-instances-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_instance")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_instance").none(
        change.after.instance_type == /^(t1|m1|m2|c1|cc1|cc2|cg1|cr1|hi1|hs1)\./
      )
  - uid: mondoo-aws-security-ec2-no-paravirtual-instances-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_instance")
    mql: |
      terraform.state.resources.where(type == "aws_instance").none(
        values.instance_type == /^(t1|m1|m2|c1|cc1|cc2|cg1|cr1|hi1|hs1)\./
      )
  # No Terraform variants: This check correlates account-level `aws.ec2.ebsEncryptionByDefault` with per-instance `hibernationConfigured`. The account-level EBS-encryption-by-default setting has no first-class Terraform resource (it's a regional API call), so this combination cannot be replicated against an HCL/plan/state asset.
  - uid: mondoo-aws-security-ec2-hibernation-encrypted-check
    title: Ensure EBS encryption by default is enabled when EC2 hibernation is in use
    impact: 50
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-aws-security-ec2-hibernation-encrypted-check-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
    docs:
      desc: |
        This check ensures that EBS encryption by default is enabled in accounts where EC2 instances use hibernation. When an instance hibernates, the contents of RAM are written to the root EBS volume. RAM may contain credentials, encryption keys, session tokens, and other sensitive data. Enabling EBS encryption by default ensures that all newly created volumes, including those used by hibernation-enabled instances, are automatically encrypted.

        **Why this matters**

        - During hibernation, the entire contents of instance memory are persisted to the root EBS volume, including any sensitive data resident in RAM.
        - Without encryption, this memory dump is stored in plaintext on the underlying storage, where it could be exposed through snapshot sharing, volume detachment, or storage-level compromise.
        - AWS requires EBS encryption for hibernation. Enabling EBS encryption by default at the account level is the most reliable way to enforce this, as it applies to all new volumes automatically.
        - Note: This check validates the account-level EBS encryption-by-default setting, not individual volume encryption. Instances launched before this setting was enabled may still have unencrypted volumes.

        **Risk mitigation**

        - **Account-level enforcement:** Ensures all new EBS volumes are encrypted by default, including those used for hibernation.
        - **Credential protection:** Prevents exposure of in-memory secrets, tokens, and keys written during hibernation.
        - **Compliance:** Meets encryption-at-rest requirements for hibernation data.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and navigate to the **Amazon EC2** service.
        2. In the left navigation pane, select **Instances**.
        3. Filter instances that have hibernation enabled: select an instance, choose the **Details** tab, and look for **Hibernation** set to **Enabled**.
        4. For any hibernation-enabled instance, navigate to **EC2** > **Settings** (under **Account Attributes**) > **EBS encryption**.
        5. Verify that **Always encrypt new EBS volumes** is enabled for the region.

        A passing configuration shows **EBS encryption by default** as **Enabled**. A failing configuration shows it as **Disabled** while hibernation-enabled instances exist.

        ### Audit via CLI

        1. Check for running instances with hibernation configured:

        ```bash
        aws ec2 describe-instances \
          --filters "Name=instance-state-name,Values=running" \
          --query "Reservations[*].Instances[*].{InstanceId:InstanceId,HibernationConfigured:HibernationOptions.Configured}" \
          --output table
        ```

        2. If any instances have `HibernationConfigured: true`, check EBS encryption by default for the region:

        ```bash
        aws ec2 get-ebs-encryption-by-default
        ```

        A passing account returns `EbsEncryptionByDefault: true`. A failing account returns `EbsEncryptionByDefault: false` while hibernation-enabled instances are present.

      remediation:
        - id: console
          desc: |
            To ensure EBS encryption by default is enabled when EC2 hibernation is in use using the AWS Console:

            1. Navigate to the **EC2 Console** and select **Instances**.
            2. Identify instances with hibernation enabled (check **Stop - Hibernate behavior** in instance details).
            3. Verify the root volume is encrypted by checking **Block devices** in the instance details.
            4. If the root volume is not encrypted:
              - Create an encrypted snapshot of the root volume.
              - Create an encrypted AMI from the snapshot.
              - Launch a new instance from the encrypted AMI with hibernation enabled.
              - Terminate the original instance.
        - id: cli
          desc: |
            To ensure EBS encryption by default is enabled when EC2 hibernation is in use using the AWS CLI, find instances with hibernation enabled:

            ```bash
            aws ec2 describe-instances \
              --query "Reservations[*].Instances[*].[InstanceId,HibernationOptions.Configured]" \
              --output table
            ```

            Check if the root volume is encrypted:

            ```bash
            aws ec2 describe-volumes --volume-ids <root-volume-id> \
              --query "Volumes[*].[VolumeId,Encrypted]"
            ```
        - id: terraform
          desc: |
            To ensure EBS encryption by default is enabled when EC2 hibernation is in use in Terraform, when using hibernation, ensure the root EBS volume is encrypted:

            ```hcl
            resource "aws_instance" "example" {
              ami           = "ami-xxxxxxxxx"
              instance_type = "m5.large"
              hibernation   = true

              root_block_device {
                encrypted = true
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure EBS encryption by default is enabled when EC2 hibernation is in use in CloudFormation, when using hibernation, ensure the root EBS volume is encrypted:

            ```yaml
            Resources:
              MyInstance:
                Type: AWS::EC2::Instance
                Properties:
                  ImageId: ami-xxxxxxxxx
                  InstanceType: m5.large
                  HibernationOptions:
                    Configured: true
                  BlockDeviceMappings:
                    - DeviceName: /dev/xvda
                      Ebs:
                        Encrypted: true
            ```
    refs:
      - url: https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/hibernating-prerequisites.html
        title: Hibernation prerequisites for Amazon EC2
  - uid: mondoo-aws-security-ec2-hibernation-encrypted-check-aws
    filters: asset.platform == "aws"
    mql: |
      if (aws.ec2.instances.where(state == "running" && hibernationConfigured == true).length > 0) {
        aws.ec2.ebsEncryptionByDefault.values.all(_ == true)
      }
  - uid: mondoo-aws-security-route53-dnssec-enabled
    title: Ensure Route 53 public hosted zones have DNSSEC signing enabled
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-20
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-10
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc6-1-11
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-aws-security-route53-dnssec-enabled-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-route53-dnssec-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-route53-dnssec-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-route53-dnssec-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Amazon Route 53 public hosted zones have DNSSEC signing enabled. DNSSEC (Domain Name System Security Extensions) adds cryptographic signatures to DNS records, allowing resolvers to verify that responses have not been tampered with in transit.

        **Why this matters**

        - Without DNSSEC, DNS responses can be spoofed or poisoned by attackers, redirecting users to malicious sites (DNS cache poisoning, man-in-the-middle attacks).
        - DNSSEC provides authentication of DNS data origin and data integrity verification.
        - AWS Route 53 supports DNSSEC signing for public hosted zones, with AWS managing the Zone Signing Key (ZSK) and customers managing the Key Signing Key (KSK) via AWS KMS.
        - Private hosted zones do not support DNSSEC and are excluded from this check.

        **Risk mitigation**

        - **DNS integrity:** Prevents DNS spoofing and cache poisoning attacks.
        - **Authentication:** Verifies that DNS responses originate from the authoritative source.
        - **Trust chain:** Establishes a chain of trust from the root DNS zone to your domain.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and navigate to the **Route 53** service.
        2. In the left navigation pane, select **Hosted zones**.
        3. Select a public hosted zone (zones marked as **Private** are not applicable).
        4. Choose the **DNSSEC signing** tab.
        5. Review the **DNSSEC signing** status.

        A passing hosted zone shows a **DNSSEC signing** status of **Enabled** with `Signing`. A failing hosted zone shows **DNSSEC signing** as **Disabled** or **Not signing**.

        ### Audit via CLI

        1. List all public hosted zones and their IDs:

        ```bash
        aws route53 list-hosted-zones \
          --query "HostedZones[?Config.PrivateZone==\`false\`].{Id:Id,Name:Name}" \
          --output table
        ```

        2. For each public hosted zone, check its DNSSEC status:

        ```bash
        aws route53 get-dnssec --hosted-zone-id <zone-id> \
          --query "Status.ServeSignature"
        ```

        A passing hosted zone returns `"SIGNING"`. A failing hosted zone returns `"NOT_SIGNING"`.

      remediation:
        - id: console
          desc: |
            To ensure Route 53 public hosted zones have DNSSEC signing enabled using the AWS Console:

            1. Navigate to the **Route 53 Console** and select **Hosted zones**.
            2. Select the public hosted zone to configure.
            3. Go to the **DNSSEC signing** tab.
            4. Choose **Enable DNSSEC signing**.
            5. Create or select a KMS key for the Key Signing Key (KSK).
            6. After enabling, establish the chain of trust by adding a DS record to the parent zone through your domain registrar.
        - id: cli
          desc: |
            To ensure Route 53 public hosted zones have DNSSEC signing enabled using the AWS CLI, check DNSSEC status for a hosted zone:

            ```bash
            aws route53 get-dnssec --hosted-zone-id <zone-id>
            ```

            Enable DNSSEC signing:

            ```bash
            aws route53 create-key-signing-key \
              --hosted-zone-id <zone-id> \
              --name example-ksk \
              --key-management-service-arn arn:aws:kms:us-east-1:account-id:key/key-id \
              --status ACTIVE

            aws route53 enable-hosted-zone-dnssec --hosted-zone-id <zone-id>
            ```
        - id: terraform
          desc: |
            To ensure Route 53 public hosted zones have DNSSEC signing enabled in Terraform, DNSSEC requires both a Key Signing Key and enabling DNSSEC on the hosted zone:

            ```hcl
            resource "aws_route53_key_signing_key" "example" {
              hosted_zone_id             = aws_route53_zone.example.id
              key_management_service_arn = aws_kms_key.example.arn
              name                       = "example-ksk"
            }

            resource "aws_route53_hosted_zone_dnssec" "example" {
              depends_on     = [aws_route53_key_signing_key.example]
              hosted_zone_id = aws_route53_zone.example.id
            }
            ```
        - id: cloudformation
          desc: |
            To ensure Route 53 public hosted zones have DNSSEC signing enabled in CloudFormation, note that CloudFormation does not natively support configuring DNSSEC signing for Route 53 hosted zones. Use the AWS CLI or Console to enable DNSSEC, or use a CloudFormation custom resource backed by a Lambda function.
    refs:
      - url: https://docs.aws.amazon.com/Route53/latest/DeveloperGuide/dns-configuring-dnssec.html
        title: Configuring DNSSEC signing in Amazon Route 53
  - uid: mondoo-aws-security-route53-dnssec-enabled-aws
    filters: asset.platform == "aws"
    mql: |
      aws.route53.hostedZones.where(isPrivate == false).all(
        dnssecStatus['serveSignature'] == "SIGNING"
      )
  - uid: mondoo-aws-security-route53-dnssec-enabled-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_route53_hosted_zone_dnssec")
    mql: |
      terraform.resources.where(nameLabel == "aws_route53_hosted_zone_dnssec").length > 0
  - uid: mondoo-aws-security-route53-dnssec-enabled-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_route53_hosted_zone_dnssec")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_route53_hosted_zone_dnssec").length > 0
  - uid: mondoo-aws-security-route53-dnssec-enabled-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_route53_hosted_zone_dnssec")
    mql: |
      terraform.state.resources.where(type == "aws_route53_hosted_zone_dnssec").length > 0
  - uid: mondoo-aws-security-route53-query-logging-enabled
    title: Ensure Route 53 public hosted zones have query logging enabled
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-pr-pt-1
      compliance/nist-csf-2: nist-csf-2-de-cm-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    variants:
      - uid: mondoo-aws-security-route53-query-logging-enabled-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-route53-query-logging-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-route53-query-logging-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-route53-query-logging-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Amazon Route 53 public hosted zones have DNS query logging configured. Query logging sends information about DNS queries to Amazon CloudWatch Logs, enabling visibility into DNS traffic patterns and supporting security monitoring.

        **Why this matters**

        - Without query logging, there is no visibility into which DNS queries are being made against your hosted zones, making it difficult to detect reconnaissance, data exfiltration via DNS tunneling, or domain abuse.
        - DNS query logs provide critical data for incident response, allowing security teams to trace suspicious domain lookups and identify compromised systems.
        - Query logs can be used to detect shadow IT, unauthorized subdomains, and unusual query patterns that may indicate an attack.
        - Compliance frameworks recommend logging DNS activity as part of network monitoring requirements.

        **Risk mitigation**

        - **Threat detection:** Enables detection of DNS-based attacks including tunneling and exfiltration.
        - **Incident response:** Provides DNS query history for forensic analysis.
        - **Compliance:** Meets audit logging requirements for DNS infrastructure.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and navigate to the **Route 53** service.
        2. In the left navigation pane, select **Hosted zones**.
        3. Select a public hosted zone.
        4. Choose the **Query logging** tab.
        5. Check whether a query logging configuration is listed.

        A passing hosted zone shows a configured **CloudWatch Logs log group** under **Query logging**. A failing hosted zone shows no query logging configuration.

        ### Audit via CLI

        1. List all public hosted zones:

        ```bash
        aws route53 list-hosted-zones \
          --query "HostedZones[?Config.PrivateZone==\`false\`].{Id:Id,Name:Name}" \
          --output table
        ```

        2. For each public hosted zone, check for a query logging configuration:

        ```bash
        aws route53 list-query-logging-configs --hosted-zone-id <zone-id> \
          --query "QueryLoggingConfigs[*].{Id:Id,LogGroupArn:CloudWatchLogsLogGroupArn}"
        ```

        A passing hosted zone returns at least one query logging configuration entry. A failing hosted zone returns an empty list `[]`.

      remediation:
        - id: console
          desc: |
            To ensure Route 53 public hosted zones have query logging enabled using the AWS Console:

            1. Navigate to the **Route 53 Console** and select **Hosted zones**.
            2. Select the public hosted zone.
            3. Go to the **Query logging** tab.
            4. Choose **Configure query logging**.
            5. Select or create a CloudWatch Logs log group in the **us-east-1** region.
            6. Configure the appropriate resource policy to allow Route 53 to write to the log group.
        - id: cli
          desc: |
            To ensure Route 53 public hosted zones have query logging enabled using the AWS CLI, create a CloudWatch Logs log group (must be in us-east-1):

            ```bash
            aws logs create-log-group \
              --log-group-name /aws/route53/example.com \
              --region us-east-1
            ```

            Enable query logging:

            ```bash
            aws route53 create-query-logging-config \
              --hosted-zone-id <zone-id> \
              --cloud-watch-logs-log-group-arn arn:aws:logs:us-east-1:account-id:log-group:/aws/route53/example.com
            ```
        - id: terraform
          desc: |
            To ensure Route 53 public hosted zones have query logging enabled in Terraform, configure query logging for a Route 53 hosted zone:

            ```hcl
            resource "aws_route53_query_log" "example" {
              depends_on               = [aws_cloudwatch_log_resource_policy.route53]
              cloudwatch_log_group_arn = aws_cloudwatch_log_group.route53.arn
              zone_id                  = aws_route53_zone.example.zone_id
            }
            ```
        - id: cloudformation
          desc: |
            To ensure Route 53 public hosted zones have query logging enabled in CloudFormation, enable query logging via the `QueryLoggingConfig` property:

            ```yaml
            Resources:
              HostedZone:
                Type: AWS::Route53::HostedZone
                Properties:
                  Name: example.com
                  QueryLoggingConfig:
                    CloudWatchLogsLogGroupArn: !GetAtt LogGroup.Arn
            ```
    refs:
      - url: https://docs.aws.amazon.com/Route53/latest/DeveloperGuide/query-logs.html
        title: Logging DNS queries in Amazon Route 53
  - uid: mondoo-aws-security-route53-query-logging-enabled-aws
    filters: asset.platform == "aws"
    mql: |
      aws.route53.hostedZones.where(isPrivate == false).all(
        queryLoggingConfig != null
      )
  - uid: mondoo-aws-security-route53-query-logging-enabled-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_route53_query_log")
    mql: |
      terraform.resources.where(nameLabel == "aws_route53_query_log").length > 0
  - uid: mondoo-aws-security-route53-query-logging-enabled-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_route53_query_log")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_route53_query_log").length > 0
  - uid: mondoo-aws-security-route53-query-logging-enabled-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_route53_query_log")
    mql: |
      terraform.state.resources.where(type == "aws_route53_query_log").length > 0
  - uid: mondoo-aws-security-route53-health-check-not-disabled
    title: Ensure Route 53 health checks are not disabled
    impact: 50
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-bcr-08
      compliance/dora: dora-art-11
      compliance/hipaa: hipaa-security-ss164-308-a-7-ii-a-contingency-plan-data-backup-plan
      compliance/iso-27001-2022: iso-27001-2022-a-8-14
      compliance/nis-2: nis-2-21-2-c
      compliance/nist-csf-1: nist-csf-1-pr-ip-4
      compliance/nist-csf-2: nist-csf-2-pr-ir-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cp-9
      compliance/nist-sp-800-171: false
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc9-1-1
      compliance/vda-isa-5: false
    variants:
      - uid: mondoo-aws-security-route53-health-check-not-disabled-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-route53-health-check-not-disabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-route53-health-check-not-disabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-route53-health-check-not-disabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-route53-health-check-not-disabled-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that no Amazon Route 53 health checks are in a disabled state. An attacker who compromises an endpoint can disable its health check to prevent Route 53 from failing over to a healthy endpoint, ensuring that traffic continues to flow to the attacker-controlled or compromised resource.

        **Why this matters**

        - An attacker who has compromised an endpoint and has `route53:UpdateHealthCheck` permissions can disable the health check, preventing automatic failover and ensuring traffic continues to reach the compromised resource.
        - Disabled health checks cause Route 53 to treat the endpoint as healthy by default, meaning traffic will not fail away from a compromised or malicious endpoint even if it is serving manipulated responses.
        - Attackers can use this technique to maintain persistent traffic interception, serving phishing content or capturing credentials without triggering DNS-level remediation.

        **Risk mitigation**

        - **Compromised endpoint detection:** Active health checks enable automatic failover away from compromised endpoints that stop responding correctly.
        - **Attack persistence prevention:** Ensures that DNS failover cannot be silently disabled to maintain traffic flow to attacker-controlled resources.
        - **Monitoring integrity:** Maintains accurate health status so that compromised endpoints are detected and isolated through DNS routing changes.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and navigate to the **Route 53** service.
        2. In the left navigation pane, select **Health checks**.
        3. Review the **Status** column for each health check.
        4. Look for any health checks showing a **Disabled** status.

        A passing health check shows **Active** (not disabled). A failing health check shows **Disabled** in the status column.

        ### Audit via CLI

        1. Run the following command to list all health checks and their disabled status:

        ```bash
        aws route53 list-health-checks \
          --query "HealthChecks[*].{Id:Id,Type:HealthCheckConfig.Type,Disabled:HealthCheckConfig.Disabled}" \
          --output table
        ```

        A passing health check returns `Disabled: false` or `Disabled: None`. A failing health check returns `Disabled: true`.

      remediation:
        - id: console
          desc: |
            To ensure Route 53 health checks are not disabled using the AWS Console:

            1. Navigate to the **Route 53 Console** and select **Health checks**.
            2. Review the list for any health checks with a **Disabled** status.
            3. Select the disabled health check and choose **Edit**.
            4. Uncheck the **Disabled** option to re-enable the health check.
            5. If the health check is no longer needed, delete it rather than leaving it disabled.
        - id: cli
          desc: |
            To ensure Route 53 health checks are not disabled using the AWS CLI, list all health checks and their disabled status:

            ```bash
            aws route53 list-health-checks \
              --query "HealthChecks[*].{Id:Id,Disabled:HealthCheckConfig.Disabled,Type:HealthCheckConfig.Type}"
            ```

            Re-enable a disabled health check:

            ```bash
            aws route53 update-health-check \
              --health-check-id <health-check-id> \
              --no-disabled
            ```
        - id: terraform
          desc: |
            To ensure Route 53 health checks are not disabled in Terraform, ensure health checks are not disabled:

            ```hcl
            resource "aws_route53_health_check" "example" {
              fqdn              = "example.com"
              port              = 443
              type              = "HTTPS"
              resource_path     = "/health"
              failure_threshold = 3
              request_interval  = 30
              disabled          = false
            }
            ```
        - id: cloudformation
          desc: |
            To ensure Route 53 health checks are not disabled in CloudFormation, ensure the health check is not disabled:

            ```yaml
            Resources:
              HealthCheck:
                Type: AWS::Route53::HealthCheck
                Properties:
                  HealthCheckConfig:
                    FullyQualifiedDomainName: example.com
                    Port: 443
                    Type: HTTPS
                    Disabled: false
            ```
    refs:
      - url: https://docs.aws.amazon.com/Route53/latest/DeveloperGuide/health-checks-creating.html
        title: Creating and updating Amazon Route 53 health checks
  - uid: mondoo-aws-security-route53-health-check-not-disabled-aws
    filters: asset.platform == "aws"
    mql: |
      aws.route53.healthChecks.none(disabled == true)
  - uid: mondoo-aws-security-route53-health-check-not-disabled-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_route53_health_check")
    mql: |
      terraform.resources.where(nameLabel == "aws_route53_health_check").all(
      arguments.disabled != true
      )
  - uid: mondoo-aws-security-route53-health-check-not-disabled-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_route53_health_check")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_route53_health_check").all(
      change.after.disabled != true
      )
  - uid: mondoo-aws-security-route53-health-check-not-disabled-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_route53_health_check")
    mql: |
      terraform.state.resources.where(type == "aws_route53_health_check").all(
      values.disabled != true
      )
  - uid: mondoo-aws-security-route53-health-check-not-disabled-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::Route53::HealthCheck")
    mql: |
      cloudformation.template.resources.where(type == "AWS::Route53::HealthCheck").all(
      properties['HealthCheckConfig'] != empty && properties['HealthCheckConfig']['Disabled'] != true
      )
  - uid: mondoo-aws-security-route53-health-check-https
    title: Ensure Route 53 endpoint health checks use HTTPS
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    variants:
      - uid: mondoo-aws-security-route53-health-check-https-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-route53-health-check-https-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-route53-health-check-https-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-route53-health-check-https-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-route53-health-check-https-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon Route 53 endpoint health checks use HTTPS rather than HTTP. Health checks using HTTP send requests in plaintext, which can be intercepted and do not validate the identity of the endpoint being checked.

        **Why this matters**

        - HTTP health checks transmit data in plaintext, making them susceptible to interception and man-in-the-middle attacks.
        - HTTPS health checks verify the endpoint's TLS certificate, ensuring that the health check is actually reaching the intended endpoint and not an impersonator.
        - If health check traffic is intercepted, an attacker could manipulate responses to keep Route 53 routing traffic to a compromised endpoint.
        - This check only applies to endpoint-type health checks (HTTP, HTTPS, HTTP_STR_MATCH, HTTPS_STR_MATCH). Calculated and CloudWatch health checks are excluded.

        **Risk mitigation**

        - **Encryption in transit:** Ensures health check traffic is encrypted.
        - **Endpoint authentication:** Validates the TLS certificate of monitored endpoints.
        - **Tamper protection:** Prevents manipulation of health check responses.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and navigate to the **Route 53** service.
        2. In the left navigation pane, select **Health checks**.
        3. For each health check of type **HTTP endpoint** or **HTTP_STR_MATCH**, review the **Protocol** column.
        4. Identify any health checks using **HTTP** instead of **HTTPS**.

        A passing endpoint health check shows **HTTPS** or **HTTPS_STR_MATCH** as the protocol. A failing endpoint health check shows **HTTP** or **HTTP_STR_MATCH**.

        ### Audit via CLI

        1. Run the following command to list all health checks and their protocol type:

        ```bash
        aws route53 list-health-checks \
          --query "HealthChecks[*].{Id:Id,Type:HealthCheckConfig.Type,FQDN:HealthCheckConfig.FullyQualifiedDomainName}" \
          --output table
        ```

        A passing health check returns a `Type` of `HTTPS`, `HTTPS_STR_MATCH`, `CLOUDWATCH_METRIC`, or `CALCULATED`. A failing health check returns a `Type` of `HTTP` or `HTTP_STR_MATCH`.

      remediation:
        - id: console
          desc: |
            To ensure Route 53 endpoint health checks use HTTPS using the AWS Console:

            1. Navigate to the **Route 53 Console** and select **Health checks**.
            2. Select the HTTP health check and choose **Edit**.
            3. Change the **Protocol** from HTTP to HTTPS.
            4. Set the **Port** to 443 (or the appropriate HTTPS port).
            5. Enable **SNI** if checking a domain that uses name-based virtual hosting.
            6. Save the changes.
        - id: cli
          desc: |
            To ensure Route 53 endpoint health checks use HTTPS using the AWS CLI, update a health check to use HTTPS:

            ```bash
            aws route53 update-health-check \
              --health-check-id <health-check-id> \
              --port 443 \
              --resource-path /healthcheck \
              --enable-sni
            ```

            Note: You cannot change the health check type directly. To switch from HTTP to HTTPS, create a new HTTPS health check and update your DNS records to reference it.
        - id: terraform
          desc: |
            To ensure Route 53 endpoint health checks use HTTPS in Terraform, configure health checks to use HTTPS:

            ```hcl
            resource "aws_route53_health_check" "example" {
              fqdn              = "example.com"
              port              = 443
              type              = "HTTPS"
              resource_path     = "/health"
              failure_threshold = 3
              request_interval  = 30
            }
            ```
        - id: cloudformation
          desc: |
            To ensure Route 53 endpoint health checks use HTTPS in CloudFormation, set the health check type to HTTPS:

            ```yaml
            Resources:
              HealthCheck:
                Type: AWS::Route53::HealthCheck
                Properties:
                  HealthCheckConfig:
                    FullyQualifiedDomainName: example.com
                    Port: 443
                    Type: HTTPS
                    ResourcePath: /health
            ```
    refs:
      - url: https://docs.aws.amazon.com/Route53/latest/DeveloperGuide/health-checks-types.html
        title: Types of Amazon Route 53 health checks
  - uid: mondoo-aws-security-route53-health-check-https-aws
    filters: asset.platform == "aws"
    mql: |
      aws.route53.healthChecks.none(
        type == "HTTP" || type == "HTTP_STR_MATCH"
      )
  - uid: mondoo-aws-security-route53-health-check-https-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_route53_health_check")
    mql: |
      terraform.resources.where(nameLabel == "aws_route53_health_check").all(
      arguments.type != "HTTP" && arguments.type != "HTTP_STR_MATCH" && arguments.type != "TCP"
      )
  - uid: mondoo-aws-security-route53-health-check-https-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_route53_health_check")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_route53_health_check").all(
      change.after.type != "HTTP" && change.after.type != "HTTP_STR_MATCH" && change.after.type != "TCP"
      )
  - uid: mondoo-aws-security-route53-health-check-https-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_route53_health_check")
    mql: |
      terraform.state.resources.where(type == "aws_route53_health_check").all(
      values.type != "HTTP" && values.type != "HTTP_STR_MATCH" && values.type != "TCP"
      )
  - uid: mondoo-aws-security-route53-health-check-https-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::Route53::HealthCheck")
    mql: |
      cloudformation.template.resources.where(type == "AWS::Route53::HealthCheck").all(
      properties['HealthCheckConfig'] != empty && properties['HealthCheckConfig']['Type'] != "HTTP" && properties['HealthCheckConfig']['Type'] != "HTTP_STR_MATCH" && properties['HealthCheckConfig']['Type'] != "TCP"
      )
  - uid: mondoo-aws-security-appstream-fleet-no-default-internet-access
    title: Ensure AppStream 2.0 fleets do not have default internet access enabled
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-4
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-aws-security-appstream-fleet-no-default-internet-access-aws
        tags:
          mondoo.com/filter-title: "AWS Account"
          mondoo.com/filter-icon: "aws"
      - uid: mondoo-aws-security-appstream-fleet-no-default-internet-access-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-appstream-fleet-no-default-internet-access-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-appstream-fleet-no-default-internet-access-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-appstream-fleet-no-default-internet-access-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon AppStream 2.0 fleets do not have default internet access enabled. When enabled, streaming instances are assigned public IP addresses and can access the internet directly, bypassing network security controls such as firewalls, web proxies, and data loss prevention (DLP) systems.

        **Why this matters**

        - Default internet access gives AppStream streaming instances direct, unfiltered internet connectivity through a public IP address.
        - This bypasses security controls such as web proxies, firewalls, URL filtering, and DLP that would normally inspect and control outbound traffic.
        - Compromised or misused streaming sessions could exfiltrate sensitive data directly to the internet without detection.
        - AWS recommends using a VPC with a NAT gateway or VPC endpoints to control and monitor outbound internet traffic from AppStream fleets.

        **Risk mitigation**

        - **Network security:** Forces outbound traffic through controlled network paths with security inspection.
        - **Data protection:** Prevents direct data exfiltration from streaming sessions.
        - **Compliance:** Ensures network traffic is subject to organizational security policies.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and navigate to the **Amazon AppStream 2.0** service.
        2. In the left navigation pane, select **Fleets**.
        3. Select a fleet from the list.
        4. In the fleet details, select the **Network access** section.
        5. Review the **Default internet access** setting.

        A passing fleet shows **Default internet access** as **Disabled**. A failing fleet shows **Default internet access** as **Enabled**.

        ### Audit via CLI

        1. Run the following command to list all AppStream fleets and their default internet access setting:

        ```bash
        aws appstream describe-fleets \
          --query "Fleets[*].{Name:Name,DefaultInternetAccess:EnableDefaultInternetAccess,State:State}" \
          --output table
        ```

        A passing fleet returns `EnableDefaultInternetAccess: false`. A failing fleet returns `EnableDefaultInternetAccess: true`.

      remediation:
        - id: console
          desc: |
            To ensure AppStream 2.0 fleets do not have default internet access enabled using the AWS Console:

            1. Navigate to the **AppStream 2.0 Console** and select **Fleets**.
            2. Select the fleet and choose **Edit**.
            3. Under **Network access**, uncheck **Default Internet Access**.
            4. Configure a VPC with a NAT gateway for controlled internet access.
            5. Save the changes and restart the fleet.
        - id: cli
          desc: |
            To ensure AppStream 2.0 fleets do not have default internet access enabled using the AWS CLI, update a fleet to disable default internet access:

            ```bash
            aws appstream update-fleet \
              --name <fleet-name> \
              --no-enable-default-internet-access
            ```

            Verify the setting:

            ```bash
            aws appstream describe-fleets --names <fleet-name> \
              --query "Fleets[*].{Name:Name,InternetAccess:EnableDefaultInternetAccess}"
            ```
        - id: terraform
          desc: |
            To ensure AppStream 2.0 fleets do not have default internet access enabled in Terraform, disable default internet access on AppStream fleets:

            ```hcl
            resource "aws_appstream_fleet" "example" {
              name          = "example-fleet"
              instance_type = "stream.standard.medium"
              image_name    = "AppStream-WinServer2019"

              enable_default_internet_access = false

              vpc_config {
                subnet_ids = [aws_subnet.example.id]
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure AppStream 2.0 fleets do not have default internet access enabled in CloudFormation, set `EnableDefaultInternetAccess` to `false`:

            ```yaml
            Resources:
              Fleet:
                Type: AWS::AppStream::Fleet
                Properties:
                  Name: example-fleet
                  InstanceType: stream.standard.medium
                  ImageName: AppStream-WinServer2019
                  EnableDefaultInternetAccess: false
                  VpcConfig:
                    SubnetIds:
                      - !Ref PrivateSubnet
            ```
    refs:
      - url: https://docs.aws.amazon.com/appstream2/latest/developerguide/internet-access.html
        title: Internet access for Amazon AppStream 2.0
  - uid: mondoo-aws-security-appstream-fleet-no-default-internet-access-aws
    filters: asset.platform == "aws"
    mql: |
      aws.appstream.fleets.all(enableDefaultInternetAccess == false)
  - uid: mondoo-aws-security-appstream-fleet-no-default-internet-access-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_appstream_fleet")
    mql: |
      terraform.resources.where(nameLabel == "aws_appstream_fleet").all(
      arguments.enable_default_internet_access != true
      )
  - uid: mondoo-aws-security-appstream-fleet-no-default-internet-access-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_appstream_fleet")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_appstream_fleet").all(
      change.after.enable_default_internet_access != true
      )
