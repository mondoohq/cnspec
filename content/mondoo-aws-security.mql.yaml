              master_password    = "changeme"

              vpc_security_group_ids = [aws_security_group.docdb.id]
            }
            ```

            Always specify explicit `vpc_security_group_ids` rather than relying on the default security group.
        - id: cloudformation
          desc: |
            To ensure DocumentDB clusters do not use default security groups in CloudFormation:

            ```yaml
            Resources:
              MyDocDBCluster:
                Type: AWS::DocDB::DBCluster
                Properties:
                  DBClusterIdentifier: example
                  MasterUsername: admin
                  MasterUserPassword: !Ref DocDBMasterPassword
                  VpcSecurityGroupIds:
                    - !Ref DocDBSecurityGroup
            ```

            Always specify explicit `VpcSecurityGroupIds` rather than relying on the default security group.
