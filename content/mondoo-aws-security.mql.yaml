  - uid: mondoo-aws-security-msk-encryption-at-rest
    title: Ensure MSK clusters use a customer-managed KMS key
    impact: 70
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-aws-security-msk-encryption-at-rest-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-msk-encryption-at-rest-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-msk-encryption-at-rest-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-msk-encryption-at-rest-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-msk-encryption-at-rest-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon MSK (Managed Streaming for Apache Kafka) clusters are configured to use a customer-managed AWS KMS key for encryption of data at rest. By default, MSK encrypts data at rest using an AWS-managed key, but using a customer-managed key (CMK) provides greater control over key lifecycle and access policies.

        **Why this matters**

        - Without a customer-managed KMS key, organizations cannot enforce fine-grained access controls over who can decrypt broker storage, nor can they audit key usage through CloudTrail.
        - A customer-managed CMK enables key rotation policies, cross-account sharing controls, and the ability to revoke access by disabling or deleting the key.
        - Many compliance standards, including PCI DSS, HIPAA, and SOC 2, require demonstrable control over encryption keys used to protect sensitive data at rest.

        **Risk mitigation**

        - **Key control:** Customer-managed keys give organizations full lifecycle control, including rotation and revocation.
        - **Audit trail:** All KMS key usage is logged to CloudTrail, providing a complete record of data access events.
        - **Compliance:** Satisfies encryption key management requirements in multiple regulatory frameworks.
      remediation:
        - id: console
          desc: |
            To ensure MSK clusters use a customer-managed KMS key using the AWS Console, note: Encryption at rest settings cannot be changed after an MSK cluster is created. A new cluster must be created with the desired KMS key.

            1. Navigate to the **Amazon MSK Console** and choose **Create cluster**.
            2. Under **Security**, in the **Encryption at rest** section, select **Use a custom KMS key**.
            3. Select an existing KMS key or create a new one.
            4. Complete the cluster configuration and create the cluster.
            5. Migrate producers and consumers to the new cluster and decommission the old one.
        - id: cli
          desc: |
            To ensure MSK clusters use a customer-managed KMS key using the AWS CLI, create an MSK cluster with a customer-managed KMS key:

            ```bash
            aws kafka create-cluster \
              --cluster-name <cluster-name> \
              --broker-node-group-info file://broker-node-group.json \
              --kafka-version "3.5.1" \
              --number-of-broker-nodes 3 \
              --encryption-info EncryptionAtRest={DataVolumeKMSKeyId=arn:aws:kms:<region>:<account-id>:key/<key-id>}
            ```

            Verify the encryption configuration of an existing cluster:

            ```bash
            aws kafka describe-cluster --cluster-arn <cluster-arn> \
              --query "ClusterInfo.EncryptionInfo.EncryptionAtRest"
            ```
        - id: terraform
          desc: |
            To ensure MSK clusters use a customer-managed KMS key in Terraform, configure a customer-managed KMS key for MSK encryption at rest:

            ```hcl
            resource "aws_msk_cluster" "example" {
              cluster_name           = "example-cluster"
              kafka_version          = "3.5.1"
              number_of_broker_nodes = 3

              encryption_info {
                encryption_at_rest_kms_key_arn = aws_kms_key.msk.arn
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure MSK clusters use a customer-managed KMS key in CloudFormation, configure a customer-managed KMS key for MSK encryption at rest:

            ```yaml
            Resources:
              MSKCluster:
                Type: AWS::MSK::Cluster
                Properties:
                  ClusterName: example-cluster
                  KafkaVersion: "3.5.1"
                  NumberOfBrokerNodes: 3
                  EncryptionInfo:
                    EncryptionAtRest:
                      DataVolumeKMSKeyId: !Ref MSKKmsKey
            ```
    refs:
      - url: https://docs.aws.amazon.com/msk/latest/developerguide/msk-encryption.html
        title: Amazon MSK - Encryption at Rest
  - uid: mondoo-aws-security-msk-encryption-at-rest-aws
    filters: asset.platform == "aws"
    mql: |
      aws.msk.clusters.all(kmsKey != empty)
  - uid: mondoo-aws-security-msk-encryption-at-rest-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_msk_cluster")
    mql: |
      terraform.resources.where(nameLabel == "aws_msk_cluster").all(
      blocks.where(type == "encryption_info") != empty &&
      blocks.where(type == "encryption_info").all(blocks.where(type == "encryption_at_rest_config") != empty && blocks.where(type == "encryption_at_rest_config").all(arguments.kms_key_arn != empty))
      )
  - uid: mondoo-aws-security-msk-encryption-at-rest-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_msk_cluster")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_msk_cluster").all(
      change.after.encryption_info != empty &&
      change.after.encryption_info.all(_['encryption_at_rest_kms_key_arn'] != empty)
      )
  - uid: mondoo-aws-security-msk-encryption-at-rest-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_msk_cluster")
    mql: |
      terraform.state.resources.where(type == "aws_msk_cluster").all(
      values.encryption_info != empty &&
      values.encryption_info.all(_['encryption_at_rest_kms_key_arn'] != empty)
      )
  - uid: mondoo-aws-security-msk-encryption-at-rest-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::MSK::Cluster")
    mql: |
      cloudformation.template.resources.where(type == "AWS::MSK::Cluster").all(
      properties['EncryptionInfo'] != empty && properties['EncryptionInfo']['EncryptionAtRest'] != empty && properties['EncryptionInfo']['EncryptionAtRest']['DataVolumeKMSKeyId'] != empty
      )
  - uid: mondoo-aws-security-msk-encryption-in-transit
    title: Ensure MSK clusters encrypt data in transit with TLS
    impact: 80
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    variants:
      - uid: mondoo-aws-security-msk-encryption-in-transit-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-msk-encryption-in-transit-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-msk-encryption-in-transit-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-msk-encryption-in-transit-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-msk-encryption-in-transit-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon MSK clusters are configured to require TLS encryption for all client-to-broker communication. MSK supports three modes for client-broker encryption in transit: TLS only, plaintext only, or TLS preferred (allows both). Only the TLS-only setting prevents unencrypted data from traversing the network.

        **Why this matters**

        - Kafka clients communicating over plaintext connections transmit message payloads, consumer group metadata, and topic data in the clear, making them vulnerable to network-level interception.
        - The "TLS preferred" setting allows clients to fall back to plaintext, which can silently result in unencrypted communication if clients are misconfigured.
        - Enforcing TLS-only ensures that all data in transit between producers, consumers, and brokers is encrypted, regardless of client configuration.

        **Risk mitigation**

        - **Confidentiality:** TLS encryption prevents eavesdropping on Kafka message streams in transit across the network.
        - **Integrity:** TLS protects against tampering with messages as they travel between clients and brokers.
        - **Compliance:** Satisfies in-transit encryption requirements under PCI DSS, HIPAA, NIST SP 800-53 SC-8, and SOC 2.
      remediation:
        - id: console
          desc: |
            To ensure MSK clusters encrypt data in transit with TLS using the AWS Console, note: Encryption in transit settings cannot be changed after cluster creation. A new cluster must be created with the desired setting.

            1. Navigate to the **Amazon MSK Console** and choose **Create cluster**.
            2. Under **Security**, in the **Encryption in transit** section, set **Client-broker encryption** to **TLS**.
            3. Complete the cluster configuration and create the cluster.
            4. Update Kafka client configurations to use TLS and point to the new cluster endpoints.
            5. Decommission the old cluster once migration is complete.
        - id: cli
          desc: |
            To ensure MSK clusters encrypt data in transit with TLS using the AWS CLI, create an MSK cluster with TLS-only client-broker encryption:

            ```bash
            aws kafka create-cluster \
              --cluster-name <cluster-name> \
              --broker-node-group-info file://broker-node-group.json \
              --kafka-version "3.5.1" \
              --number-of-broker-nodes 3 \
              --encryption-info EncryptionInTransit={ClientBroker=TLS,InCluster=true}
            ```

            Verify the encryption in transit settings:

            ```bash
            aws kafka describe-cluster --cluster-arn <cluster-arn> \
              --query "ClusterInfo.EncryptionInfo.EncryptionInTransit"
            ```
        - id: terraform
          desc: |
            To ensure MSK clusters encrypt data in transit with TLS in Terraform, enforce TLS encryption for client-broker communication in MSK:

            ```hcl
            resource "aws_msk_cluster" "example" {
              cluster_name           = "example-cluster"
              kafka_version          = "3.5.1"
              number_of_broker_nodes = 3

              encryption_info {
                encryption_in_transit {
                  client_broker = "TLS"
                  in_cluster    = true
                }
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure MSK clusters encrypt data in transit with TLS in CloudFormation, enforce TLS encryption for client-broker communication in MSK:

            ```yaml
            Resources:
              MSKCluster:
                Type: AWS::MSK::Cluster
                Properties:
                  ClusterName: example-cluster
                  KafkaVersion: "3.5.1"
                  NumberOfBrokerNodes: 3
                  EncryptionInfo:
                    EncryptionInTransit:
                      ClientBroker: TLS
                      InCluster: true
            ```
    refs:
      - url: https://docs.aws.amazon.com/msk/latest/developerguide/msk-encryption.html
        title: Amazon MSK - Encryption in Transit
  - uid: mondoo-aws-security-msk-encryption-in-transit-aws
    filters: asset.platform == "aws"
    mql: |
      aws.msk.clusters.all(encryptionInTransitClientBroker == "TLS")
  - uid: mondoo-aws-security-msk-encryption-in-transit-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_msk_cluster")
    mql: |
      terraform.resources.where(nameLabel == "aws_msk_cluster").all(
      blocks.where(type == "encryption_info") != empty &&
      blocks.where(type == "encryption_info").all(blocks.where(type == "encryption_in_transit") != empty && blocks.where(type == "encryption_in_transit").all(arguments.client_broker == "TLS"))
      )
  - uid: mondoo-aws-security-msk-encryption-in-transit-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_msk_cluster")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_msk_cluster").all(
      change.after.encryption_info != empty &&
      change.after.encryption_info.all(_['encryption_in_transit'] != empty && _['encryption_in_transit'].all(_['client_broker'] == "TLS"))
      )
  - uid: mondoo-aws-security-msk-encryption-in-transit-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_msk_cluster")
    mql: |
      terraform.state.resources.where(type == "aws_msk_cluster").all(
      values.encryption_info != empty &&
      values.encryption_info.all(_['encryption_in_transit'] != empty && _['encryption_in_transit'].all(_['client_broker'] == "TLS"))
      )
  - uid: mondoo-aws-security-msk-encryption-in-transit-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::MSK::Cluster")
    mql: |
      cloudformation.template.resources.where(type == "AWS::MSK::Cluster").all(
      properties['EncryptionInfo'] != empty && properties['EncryptionInfo']['EncryptionInTransit'] != empty && properties['EncryptionInfo']['EncryptionInTransit']['ClientBroker'] == "TLS"
      )
  - uid: mondoo-aws-security-msk-logging-enabled
    title: Ensure MSK clusters have logging enabled
    impact: 50
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    variants:
      - uid: mondoo-aws-security-msk-logging-enabled-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-msk-logging-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-msk-logging-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-msk-logging-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-msk-logging-enabled-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon MSK clusters have broker logging enabled to at least one destination: Amazon CloudWatch Logs, Amazon S3, or Amazon Kinesis Data Firehose. Broker logs capture Kafka broker events including connection events, topic activity, and error conditions.

        **Why this matters**

        - MSK broker logs provide visibility into Kafka cluster operations, enabling detection of abnormal consumer group activity, authentication failures, and replication issues.
        - Without logging, security teams lack the data needed to investigate incidents, detect unauthorized access, or perform compliance audits on Kafka workloads.
        - Centralizing logs in CloudWatch, S3, or Firehose enables integration with SIEM systems and supports long-term log retention policies.

        **Risk mitigation**

        - **Security monitoring:** Broker logs contain connection and authentication events that can indicate unauthorized access attempts.
        - **Compliance:** Logging requirements under NIST SP 800-53 AU-6, ISO 27001 A.8.15, and SOC 2 CC7.2 require collection and review of audit logs from critical infrastructure.
        - **Operational insight:** Logs support diagnosis of performance issues, replication failures, and consumer lag.
      remediation:
        - id: console
          desc: |
            To ensure MSK clusters have logging enabled using the AWS Console:

            1. Navigate to the **Amazon MSK Console** and select your cluster.
            2. Choose **Edit cluster** (note: some logging settings require cluster recreation).
            3. Under **Broker log delivery**, enable one or more of the following:
               - **CloudWatch Logs**: Select a log group.
               - **S3**: Select or create a bucket and optional prefix.
               - **Kinesis Data Firehose**: Select a delivery stream.
            4. Save the configuration.
        - id: cli
          desc: |
            To ensure MSK clusters have logging enabled using the AWS CLI, update broker logging to deliver logs to CloudWatch Logs:

            ```bash
            aws kafka update-monitoring \
              --cluster-arn <cluster-arn> \
              --current-version <cluster-version> \
              --logging-info BrokerLogs={CloudWatchLogs={Enabled=true,LogGroup=/aws/msk/<cluster-name>}}
            ```

            Verify the logging configuration:

            ```bash
            aws kafka describe-cluster --cluster-arn <cluster-arn> \
              --query "ClusterInfo.LoggingInfo"
            ```
        - id: terraform
          desc: |
            To ensure MSK clusters have logging enabled in Terraform, enable broker logging on an MSK cluster (at least one destination):

            ```hcl
            resource "aws_msk_cluster" "example" {
              cluster_name           = "example-cluster"
              kafka_version          = "3.5.1"
              number_of_broker_nodes = 3

              logging_info {
                broker_logs {
                  cloudwatch_logs {
                    enabled   = true
                    log_group = aws_cloudwatch_log_group.msk.name
                  }
                }
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure MSK clusters have logging enabled in CloudFormation, enable broker logging on an MSK cluster:

            ```yaml
            Resources:
              MSKCluster:
                Type: AWS::MSK::Cluster
                Properties:
                  ClusterName: example-cluster
                  KafkaVersion: "3.5.1"
                  NumberOfBrokerNodes: 3
                  LoggingInfo:
                    BrokerLogs:
                      CloudWatchLogs:
                        Enabled: true
                        LogGroup: !Ref MSKLogGroup
            ```
    refs:
      - url: https://docs.aws.amazon.com/msk/latest/developerguide/msk-logging.html
        title: Amazon MSK - Logging
  - uid: mondoo-aws-security-msk-logging-enabled-aws
    filters: asset.platform == "aws"
    mql: |
      aws.msk.clusters.all(cloudwatchLogsEnabled == true || s3LogsEnabled == true || firehoseLogsEnabled == true)
  - uid: mondoo-aws-security-msk-logging-enabled-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_msk_cluster")
    mql: |
      terraform.resources.where(nameLabel == "aws_msk_cluster").all(
      blocks.where(type == "logging_info") != empty &&
      blocks.where(type == "logging_info").all(blocks.where(type == "broker_logs") != empty)
      )
  - uid: mondoo-aws-security-msk-logging-enabled-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_msk_cluster")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_msk_cluster").all(
      change.after.logging_info != empty
      )
  - uid: mondoo-aws-security-msk-logging-enabled-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_msk_cluster")
    mql: |
      terraform.state.resources.where(type == "aws_msk_cluster").all(
      values.logging_info != empty
      )
  - uid: mondoo-aws-security-msk-logging-enabled-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::MSK::Cluster")
    mql: |
      cloudformation.template.resources.where(type == "AWS::MSK::Cluster").all(
      properties['LoggingInfo'] != empty && properties['LoggingInfo']['BrokerLogs'] != empty
      )
  # No Terraform variants: The `aws_msk_replicator` Terraform resource only models MSK-to-MSK replication; the external (non-MSK) Apache Kafka cluster shape that exposes `encryption_in_transit.type` is API-only.
  # No CloudFormation variants: `AWS::MSK::Replicator` likewise lacks the external Apache Kafka cluster shape, so `EncryptionInTransit.Type` cannot be expressed in a template.
  # No Terraform / CloudFormation remediation: same reason — there is no IaC representation of an external Apache Kafka cluster target to fix.
  - uid: mondoo-aws-security-msk-replicator-external-kafka-tls
    title: Ensure MSK replicators encrypt data in transit to external Kafka
    impact: 80
    tags:
      compliance/bsi-grundschutz-sys15: false
