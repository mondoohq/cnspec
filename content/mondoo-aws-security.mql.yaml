  - uid: mondoo-aws-security-sagemaker-notebook-no-root-access
    title: Ensure SageMaker notebook instances do not allow root access
    impact: 80
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-2
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-5
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-3-1
      compliance/vda-isa-5: vda-isa-5-4-1-1
    variants:
      - uid: mondoo-aws-security-sagemaker-notebook-no-root-access-aws
        tags:
          mondoo.com/filter-title: AWS SageMaker Notebook Instance
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-sagemaker-notebook-no-root-access-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-sagemaker-notebook-no-root-access-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-sagemaker-notebook-no-root-access-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-sagemaker-notebook-no-root-access-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon SageMaker notebook instances have root access disabled. When root access is enabled, users within the notebook instance have full administrator privileges, which violates the principle of least privilege and increases the risk of privilege escalation.

        **Why this matters**

        SageMaker notebook instances with root access enabled pose several security risks:

        - Users can install arbitrary software packages, potentially introducing vulnerabilities.
        - Root access enables modification of system-level configurations that could weaken security controls.
        - Container escape vulnerabilities are more impactful when the process runs as root.
        - Compliance frameworks such as CIS, NIST, and PCI DSS require enforcing least privilege access.

        **Risk mitigation**

        - Enforces the principle of least privilege by restricting administrator access.
        - Reduces the attack surface by preventing installation of unauthorized packages.
        - Limits the impact of potential container escape or code execution vulnerabilities.
      remediation:
        - id: console
          desc: |
            To ensure SageMaker notebook instances do not allow root access using the AWS Console, note: Root access cannot be changed on an existing notebook instance. You must create a new instance.

            1. Navigate to the Amazon SageMaker Console.
            2. Select Notebook instances in the left panel.
            3. Select Create notebook instance.
            4. Under Permissions and encryption, set Root access to Disabled.
            5. Complete the remaining configuration and select Create notebook instance.
            6. Migrate data from the old notebook instance and delete it.
        - id: cli
          desc: |
            To ensure SageMaker notebook instances do not allow root access using the AWS CLI, create a new SageMaker notebook instance with root access disabled:

            ```bash
            aws sagemaker create-notebook-instance \
              --notebook-instance-name "secure-notebook" \
              --instance-type ml.t3.medium \
              --role-arn arn:aws:iam::<account-id>:role/<role-name> \
              --root-access "Disabled"
            ```
        - id: terraform
          desc: |
            To ensure SageMaker notebook instances do not allow root access in Terraform:

            ```hcl
            resource "aws_sagemaker_notebook_instance" "example" {
              name          = "secure-notebook"
              instance_type = "ml.t3.medium"
              role_arn      = aws_iam_role.sagemaker.arn
              root_access   = "Disabled"
            }
            ```
        - id: cloudformation
          desc: |
            To ensure SageMaker notebook instances do not allow root access in CloudFormation:

            ```yaml
            Resources:
              SageMakerNotebook:
                Type: AWS::SageMaker::NotebookInstance
                Properties:
                  NotebookInstanceName: secure-notebook
                  InstanceType: ml.t3.medium
                  RoleArn: !GetAtt SageMakerRole.Arn
                  RootAccess: Disabled
            ```
    refs:
      - url: https://docs.aws.amazon.com/sagemaker/latest/dg/nbi-root-access.html
        title: AWS Documentation - Control root access to a SageMaker notebook instance
      - url: https://docs.aws.amazon.com/securityhub/latest/userguide/sagemaker-controls.html
        title: AWS Documentation - SageMaker controls
  - uid: mondoo-aws-security-sagemaker-notebook-no-root-access-aws
    filters: asset.platform == "aws-sagemaker-notebookinstance"
    mql: aws.sagemaker.notebookinstance.details.rootAccess == false
  - uid: mondoo-aws-security-sagemaker-notebook-no-root-access-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_sagemaker_notebook_instance")
