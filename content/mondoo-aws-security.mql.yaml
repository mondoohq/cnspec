  - uid: mondoo-aws-security-secgroup-restricted-postgresql
    title: Ensure security groups restrict incoming PostgreSQL traffic
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-aws-security-secgroup-restricted-postgresql-aws
        tags:
          mondoo.com/filter-title: AWS Security Group
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-secgroup-restricted-postgresql-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-secgroup-restricted-postgresql-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-secgroup-restricted-postgresql-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-secgroup-restricted-postgresql-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that AWS security groups are configured to block unrestricted inbound access to the PostgreSQL port (5432) from the internet. By default, newly created security groups deny all inbound traffic, but permissive rules that allow `0.0.0.0/0` or `::/0` on port 5432 are commonly introduced during development and left in place in production.

        **Why this matters**

        - **Continuous credential probing:** Internet-exposed PostgreSQL endpoints are constantly scanned by automated tools looking for default credentials, weak passwords, and pre-auth vulnerabilities.
        - **Full data access on compromise:** A successful connection grants the attacker every privilege the database user holds, with no application-layer authorization in the path.
        - **Lateral movement:** A compromised database server is frequently used as a pivot point to reach adjacent services within the VPC.
        - **Compliance baseline:** Publicly reachable database ports violate the network boundary requirements found in common regulatory frameworks and industry security standards.

        **Risk mitigation**

        - **Replace wildcard sources:** Revoke any inbound rule allowing port 5432 from `0.0.0.0/0` or `::/0` and replace it with the specific application-tier security group or a known VPN CIDR.
        - **Apply defense-in-depth:** Pair network-level restrictions with database-level authentication, TLS enforcement, and role-based access control so a misconfigured rule alone does not result in full data exposure.
        - **Review rules on a cadence:** Periodically audit security group inbound rules to catch permissive entries introduced during testing that were never removed.
      audit: |
        ### Audit via Console

        1. Open the **EC2** console and select **Security Groups** under **Network & Security**.
        2. For each security group, select the group and open the **Inbound rules** tab.
        3. Look for any rule with **Type** `PostgreSQL` or **Port range** `5432` and **Source** `0.0.0.0/0` or `::/0`.

        A passing security group shows no inbound rule allowing port 5432 from `0.0.0.0/0` or `::/0`. A failing security group shows at least one such rule.

        ### Audit via CLI

        1. List security groups that allow unrestricted inbound traffic on port 5432:

        ```bash
        aws ec2 describe-security-groups \
          --query "SecurityGroups[?IpPermissions[?FromPort<=\`5432\` && ToPort>=\`5432\` && (IpRanges[?CidrIp=='0.0.0.0/0'] || Ipv6Ranges[?CidrIpv6=='::/0'])]].{GroupId:GroupId,GroupName:GroupName}" \
          --output table
        ```

        A passing security group returns no results in the query output. A failing security group appears in the results with its `GroupId` listed.

      remediation:
        - id: console
          desc: |
            1. Open the EC2 console and select **Security Groups**.
            2. Identify any rule allowing port 5432 from `0.0.0.0/0` or `::/0`.
            3. Edit the rule and replace the source with the application-tier security group, VPN CIDR, or specific bastion address.
        - id: cli
          desc: |
            Find offending rules:

            ```bash
            aws ec2 describe-security-groups \
              --query "SecurityGroups[?IpPermissions[?FromPort==`5432` && (IpRanges[].CidrIp=='0.0.0.0/0' || Ipv6Ranges[].CidrIpv6=='::/0')]].GroupId"
            ```

            Revoke the unrestricted rule:

            ```bash
            aws ec2 revoke-security-group-ingress \
              --group-id <sg-id> \
              --ip-permissions IpProtocol=tcp,FromPort=5432,ToPort=5432,IpRanges='[{CidrIp=0.0.0.0/0}]'
            ```
        - id: terraform
          desc: |
            Replace any `0.0.0.0/0` or `::/0` source on port 5432 with the application-tier security group, VPN CIDR, or specific bastion address. The example shows the modern `aws_vpc_security_group_ingress_rule` form; the same rule applies to inline `ingress` blocks on `aws_security_group`:

            ```hcl
            resource "aws_vpc_security_group_ingress_rule" "postgres_from_app" {
              security_group_id            = aws_security_group.db.id
              referenced_security_group_id = aws_security_group.app.id
              ip_protocol                  = "tcp"
              from_port                    = 5432
              to_port                      = 5432
            }
            ```
        - id: cloudformation
          desc: |
            To restrict PostgreSQL access in CloudFormation, scope every `SecurityGroupIngress` rule covering port 5432 to a specific source security group, IP range, or VPC peer rather than `0.0.0.0/0` or `::/0`:

            ```yaml
            Resources:
              DBSecurityGroup:
                Type: AWS::EC2::SecurityGroup
                Properties:
                  GroupDescription: PostgreSQL access from app tier only
                  VpcId: !Ref VpcId
                  SecurityGroupIngress:
                    - IpProtocol: tcp
                      FromPort: 5432
                      ToPort: 5432
                      SourceSecurityGroupId: !Ref AppSecurityGroup
            ```
    refs:
      - url: https://docs.aws.amazon.com/AmazonRDS/latest/UserGuide/Overview.RDSSecurityGroups.html
        title: AWS Documentation - Controlling access with security groups
  - uid: mondoo-aws-security-secgroup-restricted-postgresql-aws
    filters: asset.platform == "aws-security-group"
    mql: |
      aws.ec2.securitygroup.ipPermissions.where(
        fromPort <= 5432 && toPort >= 5432 && toPort != 0).none(
          ipRanges.contains("0.0.0.0/0") || ipRanges.contains("::/0")
          )
  - uid: mondoo-aws-security-secgroup-restricted-postgresql-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.where(nameLabel == "aws_security_group" || nameLabel == "aws_vpc_security_group_ingress_rule") != empty
    mql: |
      terraform.resources.where(nameLabel == "aws_security_group").all(
        blocks.where(type == "ingress" && arguments.from_port <= 5432 && arguments.to_port >= 5432).none(
          arguments.cidr_blocks.contains("0.0.0.0/0") || arguments.ipv6_cidr_blocks.contains("::/0")
        )
      ) &&
      terraform.resources.where(nameLabel == "aws_vpc_security_group_ingress_rule" && arguments.from_port <= 5432 && arguments.to_port >= 5432).all(
        arguments.cidr_ipv4 != "0.0.0.0/0" && arguments.cidr_ipv6 != "::/0"
      )
  - uid: mondoo-aws-security-secgroup-restricted-postgresql-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.where(type == "aws_security_group" || type == "aws_vpc_security_group_ingress_rule") != empty
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_security_group").all(
        change.after["ingress"].where(_["from_port"] <= 5432 && _["to_port"] >= 5432).none(
          _["cidr_blocks"].contains("0.0.0.0/0") || _["ipv6_cidr_blocks"].contains("::/0")
        )
      ) &&
      terraform.plan.resourceChanges.where(type == "aws_vpc_security_group_ingress_rule").where(change.after["from_port"] <= 5432 && change.after["to_port"] >= 5432).all(
        change.after["cidr_ipv4"] != "0.0.0.0/0" && change.after["cidr_ipv6"] != "::/0"
      )
  - uid: mondoo-aws-security-secgroup-restricted-postgresql-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.where(type == "aws_security_group" || type == "aws_vpc_security_group_ingress_rule") != empty
    mql: |
      terraform.state.resources.where(type == "aws_security_group").all(
        values["ingress"].where(_["from_port"] <= 5432 && _["to_port"] >= 5432).none(
          _["cidr_blocks"].contains("0.0.0.0/0") || _["ipv6_cidr_blocks"].contains("::/0")
        )
      ) &&
      terraform.state.resources.where(type == "aws_vpc_security_group_ingress_rule").where(values["from_port"] <= 5432 && values["to_port"] >= 5432).all(
        values["cidr_ipv4"] != "0.0.0.0/0" && values["cidr_ipv6"] != "::/0"
      )
  - uid: mondoo-aws-security-secgroup-restricted-postgresql-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::EC2::SecurityGroup")
    mql: |
      cloudformation.template.resources.where(type == "AWS::EC2::SecurityGroup").all(
        properties['SecurityGroupIngress'] == empty ||
        properties['SecurityGroupIngress'].where(_['FromPort'] <= 5432 && _['ToPort'] >= 5432).none(_['CidrIp'] == "0.0.0.0/0" || _['CidrIpv6'] == "::/0")
      )
