    mql: |
      terraform.state.resources.where(type == "aws_efs_backup_policy").all(
        values.backup_policy.all(status == "ENABLED")
      )
  - uid: mondoo-aws-security-efs-backup-enabled-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::EFS::FileSystem")
