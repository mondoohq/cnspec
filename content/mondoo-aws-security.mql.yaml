    docs:
      desc: |
        This check ensures that a CloudWatch metric filter and alarm exist to detect disabling or scheduled deletion of customer-managed KMS keys (CMKs). CMKs protect encrypted data across many AWS services, and their unauthorized deletion or disabling can render encrypted data permanently inaccessible.

        Disabling or deleting a CMK is an irreversible or time-sensitive operation that can cause widespread service disruption and data loss. Immediate alerting on these events allows administrators to cancel scheduled key deletions within the waiting period and prevent accidental or malicious data loss.

        CIS AWS Foundations Benchmark recommends this control to protect encryption key availability and detect ransomware-style attacks targeting KMS keys.
      remediation:
        - id: console
          desc: |
            To ensure log metric filter exists for CMK disable or deletion using the AWS Console:

            1. Navigate to **CloudWatch** and select **Log groups**.
            2. Select the log group associated with your CloudTrail trail.
            3. Choose **Actions** > **Create metric filter**.
            4. Enter a filter pattern matching `DisableKey` and `ScheduleKeyDeletion` events.
            5. Assign a metric name and namespace, then choose **Create metric filter**.
            6. Navigate to **Alarms** > **Create alarm**, select the new metric, and configure SNS notification.
        - id: cli
          desc: |
            To ensure log metric filter exists for CMK disable or deletion using the AWS CLI, create the metric filter:

            ```bash
            aws logs put-metric-filter \
              --log-group-name <cloudtrail-log-group> \
              --filter-name CMKDisableOrDelete \
              --filter-pattern '{ ($.eventSource = kms.amazonaws.com) && (($.eventName = DisableKey) || ($.eventName = ScheduleKeyDeletion)) }' \
              --metric-transformations metricName=CMKDisableOrDelete,metricNamespace=CISBenchmark,metricValue=1
            ```

            Create the alarm:

            ```bash
            aws cloudwatch put-metric-alarm \
              --alarm-name CMKDisableOrDelete \
              --metric-name CMKDisableOrDelete \
              --namespace CISBenchmark \
              --statistic Sum \
              --period 300 \
              --threshold 1 \
              --comparison-operator GreaterThanOrEqualToThreshold \
              --evaluation-periods 1 \
              --alarm-actions <sns-topic-arn>
            ```
        - id: terraform
          desc: |
            To ensure log metric filter exists for CMK disable or deletion in Terraform, create a CloudWatch log metric filter and alarm for CMK disable or scheduled deletion:

            ```hcl
            resource "aws_cloudwatch_log_metric_filter" "cmkdisableordelete" {
              name           = "CMKDisableOrDelete"
              log_group_name = aws_cloudwatch_log_group.cloudtrail.name
              pattern        = "{ ($.eventSource = kms.amazonaws.com) && (($.eventName = DisableKey) || ($.eventName = ScheduleKeyDeletion)) }"

              metric_transformation {
                name      = "CMKDisableOrDelete"
                namespace = "CISBenchmark"
                value     = "1"
