      )
  - uid: mondoo-aws-security-glue-job-supported-version-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::Glue::Job")
    mql: |
      cloudformation.template.resources.where(type == "AWS::Glue::Job").all(
      properties['GlueVersion'] >= "3.0"
      )
  - uid: mondoo-aws-security-elasticbeanstalk-enhanced-health
    title: Ensure Elastic Beanstalk environments use enhanced health reporting
    impact: 50
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-16
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-id-ra-1
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-4
      compliance/nist-sp-800-171: nist-sp-800-171--3-12-3
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    variants:
      - uid: mondoo-aws-security-elasticbeanstalk-enhanced-health-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-elasticbeanstalk-enhanced-health-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-elasticbeanstalk-enhanced-health-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-elasticbeanstalk-enhanced-health-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-elasticbeanstalk-enhanced-health-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that AWS Elastic Beanstalk environments have enhanced health reporting enabled. Enhanced health reporting goes beyond basic green/yellow/red status by evaluating application logs, instance metrics, and OS-level data to surface detailed health descriptors that are critical for security monitoring.

        **Why this matters**

        - Basic health reporting cannot distinguish between a routine performance issue and a security incident such as resource exhaustion from cryptomining, a denial-of-service attack, or a compromised instance behaving anomalously.
        - Enhanced health reporting provides the granular telemetry needed to detect anomalous behavior patterns that may indicate compromise, including unexpected traffic spikes, elevated error rates, abnormal CPU or memory usage, and unusual instance termination patterns.
        - Without this visibility, security teams have no early warning system for Elastic Beanstalk environments. Attackers can operate undetected while basic health status remains green.
        - Enhanced health events feed into CloudWatch, enabling integration with security alerting pipelines and SIEM systems for automated incident detection and response.
        - AWS Security Hub control ElasticBeanstalk.1 recommends enabling enhanced health reporting as a security baseline.

        **Risk mitigation**

        - **Anomaly detection:** Surfaces instance-level behavioral changes (CPU spikes, memory exhaustion, network anomalies) that may indicate active compromise or lateral movement.
        - **Faster incident response:** Detailed status descriptors (Ok, Warning, Degraded, Severe) allow security teams to triage and prioritize investigation based on severity.
        - **Forensic capability:** Enhanced health events provide a timeline of environment changes useful for post-incident analysis and root cause determination.
      audit: |
        ### Audit via Console

        1. Open the AWS Management Console and navigate to **Elastic Beanstalk**.
        2. Select each environment in the list.
        3. Select **Configuration** in the left navigation panel.
        4. In the **Monitoring** category, select **Edit**.
        5. Locate the **Health reporting** setting under **Health monitoring rule customization**.

        A passing environment shows **Health reporting** set to **Enhanced**. A failing environment shows **Health reporting** set to **Basic**.

        ### Audit via CLI

        1. List all Elastic Beanstalk environments:

        ```bash
        aws elasticbeanstalk describe-environments \
          --query "Environments[*].{Name:EnvironmentName,ApplicationName:ApplicationName}"
        ```

        2. For each environment, check the health reporting system type:

        ```bash
        aws elasticbeanstalk describe-configuration-settings \
          --application-name <application-name> \
          --environment-name <environment-name> \
          --query "ConfigurationSettings[*].OptionSettings[?Namespace=='aws:elasticbeanstalk:healthreporting:system' && OptionName=='SystemType']"
        ```

        A passing environment returns `Value` equal to `enhanced`. A failing environment returns `Value` equal to `basic` or returns no result for that namespace and option.

      remediation:
        - id: console
          desc: |
            To ensure Elastic Beanstalk environments use enhanced health reporting using the AWS Console:

            1. Navigate to the Elastic Beanstalk Console.
            2. Select the environment to update.
            3. Select **Configuration** in the left panel.
            4. Under **Monitoring**, select **Edit**.
            5. Set **Health reporting** to **Enhanced**.
            6. Select **Apply**.
        - id: cli
          desc: |
            To ensure Elastic Beanstalk environments use enhanced health reporting using the AWS CLI, enable enhanced health reporting for an environment:

            ```bash
            aws elasticbeanstalk update-environment \
              --environment-name my-environment \
              --option-settings \
                Namespace=aws:elasticbeanstalk:healthreporting:system,OptionName=SystemType,Value=enhanced
            ```
        - id: terraform
          desc: |
            To ensure Elastic Beanstalk environments use enhanced health reporting in Terraform:

            ```hcl
            resource "aws_elastic_beanstalk_environment" "example" {
              name                = "example-env"
              application         = aws_elastic_beanstalk_application.example.name
              solution_stack_name = "64bit Amazon Linux 2023 v4.0.0 running Python 3.11"

              setting {
                namespace = "aws:elasticbeanstalk:healthreporting:system"
                name      = "SystemType"
                value     = "enhanced"
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure Elastic Beanstalk environments use enhanced health reporting in CloudFormation:

            ```yaml
            Resources:
              MyBeanstalkEnvironment:
                Type: AWS::ElasticBeanstalk::Environment
                Properties:
                  EnvironmentName: example-env
                  ApplicationName: !Ref MyApplication
                  SolutionStackName: "64bit Amazon Linux 2023 v4.0.0 running Python 3.11"
                  OptionSettings:
                    - Namespace: aws:elasticbeanstalk:healthreporting:system
                      OptionName: SystemType
                      Value: enhanced
            ```
    refs:
      - url: https://docs.aws.amazon.com/elasticbeanstalk/latest/dg/health-enhanced.html
        title: AWS Documentation - Enhanced health reporting and monitoring
      - url: https://docs.aws.amazon.com/securityhub/latest/userguide/elasticbeanstalk-controls.html
        title: AWS Documentation - Elastic Beanstalk controls
  - uid: mondoo-aws-security-elasticbeanstalk-enhanced-health-aws
