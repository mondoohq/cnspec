        This check ensures that RDS database instances are encrypted using customer-managed KMS keys (CMK) rather than the default AWS-managed encryption. Customer-managed keys provide full control over key lifecycle, rotation policies, and access auditing.

        **Why this matters**

        - **Key control:** CMKs allow you to define who can use and manage the encryption key through KMS key policies.
        - **Audit trail:** All CMK usage is logged in CloudTrail, providing visibility into when and by whom the key was used.
        - **Key rotation:** CMKs support automatic annual rotation and manual rotation, giving you control over cryptographic best practices.

        **Risk mitigation**

        - Create a CMK in KMS for RDS encryption.
        - Enable encryption with the CMK when creating new RDS instances.
        - For existing instances, create an encrypted snapshot with the CMK and restore from it.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and open the **RDS** console.
        2. In the left navigation pane, choose **Databases**.
        3. Select an instance and choose the **Configuration** tab.
        4. In the **Encryption** section, review the **AWS KMS key** value.
        5. Open the AWS KMS console and verify that the key shown is a customer-managed key (its **Key manager** is **Customer**).

        A passing instance shows a customer-managed KMS key ARN in the Encryption section. A failing instance shows an AWS-managed key alias such as `aws/rds` or no encryption.

        ### Audit via CLI

        1. Retrieve the encryption configuration for an RDS instance:

        ```bash
        aws rds describe-db-instances \
          --db-instance-identifier <instance-id> \
          --query "DBInstances[*].{ID:DBInstanceIdentifier,Encrypted:StorageEncrypted,KmsKeyId:KmsKeyId}"
        ```

        2. Verify the key manager for the returned KMS key:

        ```bash
        aws kms describe-key \
          --key-id <kms-key-id> \
          --query "KeyMetadata.KeyManager"
        ```

        A passing instance returns `StorageEncrypted: true` and the key's `KeyManager` is `"CUSTOMER"`. A failing instance returns `StorageEncrypted: false` or the key's `KeyManager` is `"AWS"`.

      remediation:
        - id: console
          desc: |
            To ensure RDS instances use customer-managed KMS encryption using the AWS Console:

            1. Navigate to the **RDS Console**.
            2. Select **Databases** in the left panel.
            3. Select the database instance to review.
            4. Under the **Configuration** tab, check the **Encryption** section.
            5. If using an AWS-managed key, you must re-encrypt via a snapshot:
               - Select the instance, then choose **Actions** > **Take snapshot**. Give it a name and create it.
               - Navigate to **Snapshots** in the left panel.
               - Select the snapshot you just created, then choose **Actions** > **Copy snapshot**.
               - In the copy dialog, check **Enable encryption** and select your customer-managed CMK from the KMS key dropdown.
               - Save the copied snapshot.
               - Select the CMK-encrypted snapshot and choose **Actions** > **Restore snapshot** to create a new instance from it.
               - Update your application to point to the new instance, then delete the old instance.
        - id: cli
          desc: |
            To ensure RDS instances use customer-managed KMS encryption using the AWS CLI, check the encryption configuration of an RDS instance:

            ```bash
            aws rds describe-db-instances \
              --db-instance-identifier <instance-id> \
              --query "DBInstances[*].{ID:DBInstanceIdentifier,Encrypted:StorageEncrypted,KmsKeyId:KmsKeyId}"
            ```

            Copy a snapshot with CMK encryption:

            ```bash
            aws rds copy-db-snapshot \
              --source-db-snapshot-identifier <source-snapshot> \
              --target-db-snapshot-identifier <target-snapshot> \
              --kms-key-id <cmk-key-id>
            ```
        - id: terraform
          desc: |
            To ensure RDS instances use customer-managed KMS encryption in Terraform:

            ```hcl
            resource "aws_db_instance" "example" {
              identifier     = "example"
              engine         = "mysql"
              instance_class = "db.t3.micro"
              allocated_storage = 20

              storage_encrypted = true
              kms_key_id        = aws_kms_key.rds.arn
            }
            ```
        - id: cloudformation
          desc: |
            To ensure RDS instances use customer-managed KMS encryption in CloudFormation:

            ```yaml
            Resources:
              MyRDSInstance:
                Type: AWS::RDS::DBInstance
                Properties:
                  DBInstanceIdentifier: example
                  Engine: mysql
                  DBInstanceClass: db.t3.micro
                  AllocatedStorage: "20"
                  StorageEncrypted: true
                  KmsKeyId: !Ref MyKmsKey
            ```
    refs:
      - url: https://docs.aws.amazon.com/AmazonRDS/latest/UserGuide/Overview.Encryption.html
        title: AWS Documentation - Encrypting Amazon RDS resources
      - url: https://docs.aws.amazon.com/kms/latest/developerguide/concepts.html
        title: AWS Documentation - AWS KMS concepts
