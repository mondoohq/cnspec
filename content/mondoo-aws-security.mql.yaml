  - uid: mondoo-aws-security-waf-managed-rule-groups
    title: Ensure WAF Web ACLs include SQLi, XSS, and known-bad input rules
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ais-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-26
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-pt-4
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/pci-dss-4: pcidss-requirement-6-4-2
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-aws-security-waf-managed-rule-groups-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-waf-managed-rule-groups-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-waf-managed-rule-groups-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-waf-managed-rule-groups-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-waf-managed-rule-groups-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that every AWS WAFv2 web ACL references all three required AWS-managed rule groups: `AWSManagedRulesCommonRuleSet` for OWASP Top 10 including cross-site scripting, `AWSManagedRulesSQLiRuleSet` for SQL injection patterns, and `AWSManagedRulesKnownBadInputsRuleSet` for exploit attempts against common CVEs. A web ACL that lacks these rule groups relies only on custom rules, which require ongoing manual maintenance to remain current against new attack patterns.

        **Why this matters**

        - **Maintained signature coverage:** AWS updates these managed rule groups as new CVEs and exploit patterns emerge, so referencing them is more durable than hand-rolled signatures that can drift out of date.
        - **Injection attack coverage gap:** A web ACL with only rate-limiting or IP-based rules does not inspect request payloads and will not block SQLi or XSS attacks at the application layer.
        - **CVE exploit blocking:** The `KnownBadInputsRuleSet` blocks exploit attempts against specific vulnerabilities such as Log4Shell and Spring4Shell within hours of their disclosure.
        - **Baseline compliance:** Major compliance frameworks require web application firewall controls that cover injection and cross-site scripting attack classes.

        **Risk mitigation**

        - **Rapid threat response:** AWS-managed rule groups receive signature updates without requiring configuration changes, ensuring protection against newly disclosed vulnerabilities without manual intervention.
        - **Defense in depth:** Managed WAF rules complement application-layer input validation, reducing the impact of any single application-side sanitization failure.
      audit: |
        ### Audit via Console

        1. Open the **AWS WAF & Shield Console** and select **Web ACLs**.
        2. For each web ACL, select it and go to the **Rules** tab.
        3. Confirm that rules named `AWS-AWSManagedRulesCommonRuleSet`, `AWS-AWSManagedRulesSQLiRuleSet`, and `AWS-AWSManagedRulesKnownBadInputsRuleSet` (or equivalent managed rule group statements) are present and set to **Block** or **Count**.

        A passing web ACL shows all three required AWS managed rule groups in the rules list. A failing web ACL is missing one or more of the required groups.

        ### Audit via CLI

        1. List all WAFv2 web ACLs and then inspect the rules of each:

        ```bash
        aws wafv2 list-web-acls --scope REGIONAL \
          --query 'WebACLs[*].{Name:Name,Id:Id}' --output table
        ```

        2. For each web ACL, check which managed rule groups are referenced:

        ```bash
        aws wafv2 get-web-acl \
          --name <web-acl-name> \
          --scope REGIONAL \
          --id <web-acl-id> \
          --query 'WebACL.Rules[*].Statement.ManagedRuleGroupStatement.Name'
        ```

        A passing web ACL returns a list that includes `AWSManagedRulesCommonRuleSet`, `AWSManagedRulesSQLiRuleSet`, and `AWSManagedRulesKnownBadInputsRuleSet`. A failing web ACL returns a list missing one or more of those three group names.
      remediation:
        - id: console
          desc: |
            To attach the required managed rule groups to a web ACL using the AWS Console:

            1. Open the **AWS WAF & Shield Console** and select **Web ACLs**.
            2. Select the web ACL and choose **Add rules** then **Add managed rule groups**.
            3. Under **AWS managed rule groups**, enable **Core rule set**, **SQL database**, and **Known bad inputs**.
            4. Set the action for each rule group to **Block** unless you have a documented reason to use **Count**.
            5. Save and deploy the web ACL.
        - id: cli
          desc: |
            To attach managed rule groups using the AWS CLI, fetch the current web ACL configuration, append the managed rule statements, and update:

            ```bash
            aws wafv2 update-web-acl \
              --name <web-acl-name> \
              --scope REGIONAL \
              --id <web-acl-id> \
              --lock-token <lock-token> \
              --default-action Allow={} \
              --visibility-config SampledRequestsEnabled=true,CloudWatchMetricsEnabled=true,MetricName=<metric> \
              --rules file://rules.json
            ```

            Where `rules.json` references each of `AWSManagedRulesCommonRuleSet`, `AWSManagedRulesSQLiRuleSet`, and `AWSManagedRulesKnownBadInputsRuleSet` under `Statement.ManagedRuleGroupStatement`.
        - id: terraform
          desc: |
            To attach the required managed rule groups in Terraform, declare a `rule` block for each managed rule group on `aws_wafv2_web_acl`:

            ```hcl
            resource "aws_wafv2_web_acl" "example" {
              name  = "example"
              scope = "REGIONAL"

              default_action {
                allow {}
              }

              rule {
                name     = "AWS-AWSManagedRulesCommonRuleSet"
                priority = 1
                override_action {
                  none {}
                }
                statement {
                  managed_rule_group_statement {
                    name        = "AWSManagedRulesCommonRuleSet"
                    vendor_name = "AWS"
                  }
                }
                visibility_config {
                  cloudwatch_metrics_enabled = true
                  metric_name                = "AWSManagedRulesCommonRuleSet"
                  sampled_requests_enabled   = true
                }
              }

              rule {
                name     = "AWS-AWSManagedRulesSQLiRuleSet"
                priority = 2
                override_action {
                  none {}
                }
                statement {
                  managed_rule_group_statement {
                    name        = "AWSManagedRulesSQLiRuleSet"
                    vendor_name = "AWS"
                  }
                }
                visibility_config {
                  cloudwatch_metrics_enabled = true
                  metric_name                = "AWSManagedRulesSQLiRuleSet"
                  sampled_requests_enabled   = true
                }
              }

              rule {
                name     = "AWS-AWSManagedRulesKnownBadInputsRuleSet"
                priority = 3
                override_action {
                  none {}
                }
                statement {
                  managed_rule_group_statement {
                    name        = "AWSManagedRulesKnownBadInputsRuleSet"
                    vendor_name = "AWS"
                  }
                }
                visibility_config {
                  cloudwatch_metrics_enabled = true
                  metric_name                = "AWSManagedRulesKnownBadInputsRuleSet"
                  sampled_requests_enabled   = true
                }
              }

              visibility_config {
                cloudwatch_metrics_enabled = true
                metric_name                = "example"
                sampled_requests_enabled   = true
              }
            }
            ```
        - id: cloudformation
          desc: |
            To attach managed rule groups in CloudFormation, declare each one under `Rules` on `AWS::WAFv2::WebACL`:

            ```yaml
            Resources:
              ExampleWebACL:
                Type: AWS::WAFv2::WebACL
                Properties:
                  Name: example
                  Scope: REGIONAL
                  DefaultAction:
                    Allow: {}
                  VisibilityConfig:
                    SampledRequestsEnabled: true
                    CloudWatchMetricsEnabled: true
                    MetricName: example
                  Rules:
                    - Name: AWS-AWSManagedRulesCommonRuleSet
                      Priority: 1
                      OverrideAction:
                        None: {}
                      Statement:
                        ManagedRuleGroupStatement:
                          VendorName: AWS
                          Name: AWSManagedRulesCommonRuleSet
                      VisibilityConfig:
                        SampledRequestsEnabled: true
                        CloudWatchMetricsEnabled: true
                        MetricName: AWSManagedRulesCommonRuleSet
                    - Name: AWS-AWSManagedRulesSQLiRuleSet
                      Priority: 2
                      OverrideAction:
                        None: {}
                      Statement:
                        ManagedRuleGroupStatement:
                          VendorName: AWS
                          Name: AWSManagedRulesSQLiRuleSet
                      VisibilityConfig:
                        SampledRequestsEnabled: true
                        CloudWatchMetricsEnabled: true
                        MetricName: AWSManagedRulesSQLiRuleSet
                    - Name: AWS-AWSManagedRulesKnownBadInputsRuleSet
                      Priority: 3
                      OverrideAction:
                        None: {}
                      Statement:
                        ManagedRuleGroupStatement:
                          VendorName: AWS
                          Name: AWSManagedRulesKnownBadInputsRuleSet
                      VisibilityConfig:
                        SampledRequestsEnabled: true
                        CloudWatchMetricsEnabled: true
                        MetricName: AWSManagedRulesKnownBadInputsRuleSet
            ```
    refs:
      - url: https://docs.aws.amazon.com/waf/latest/developerguide/aws-managed-rule-groups-list.html
        title: AWS Managed Rules rule groups list
  - uid: mondoo-aws-security-waf-managed-rule-groups-aws
    filters: asset.platform == "aws"
    mql: |
      aws.waf.acls.all(
        rules.any(statement.managedRuleGroupStatement != null && statement.managedRuleGroupStatement.name == "AWSManagedRulesCommonRuleSet") &&
        rules.any(statement.managedRuleGroupStatement != null && statement.managedRuleGroupStatement.name == "AWSManagedRulesSQLiRuleSet") &&
        rules.any(statement.managedRuleGroupStatement != null && statement.managedRuleGroupStatement.name == "AWSManagedRulesKnownBadInputsRuleSet")
      )
  - uid: mondoo-aws-security-waf-managed-rule-groups-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_wafv2_web_acl")
    mql: |
      terraform.resources.where(nameLabel == "aws_wafv2_web_acl").all(
        blocks.where(type == "rule").any(
          blocks.where(type == "statement").any(
            blocks.where(type == "managed_rule_group_statement").any(arguments.name == "AWSManagedRulesCommonRuleSet")
          )
        ) &&
        blocks.where(type == "rule").any(
          blocks.where(type == "statement").any(
            blocks.where(type == "managed_rule_group_statement").any(arguments.name == "AWSManagedRulesSQLiRuleSet")
          )
        ) &&
        blocks.where(type == "rule").any(
          blocks.where(type == "statement").any(
            blocks.where(type == "managed_rule_group_statement").any(arguments.name == "AWSManagedRulesKnownBadInputsRuleSet")
          )
        )
      )
  - uid: mondoo-aws-security-waf-managed-rule-groups-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_wafv2_web_acl")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_wafv2_web_acl").all(
        change.after.rule != empty &&
        change.after.rule.any(_['statement'].any(_['managed_rule_group_statement'].any(_['name'] == "AWSManagedRulesCommonRuleSet"))) &&
        change.after.rule.any(_['statement'].any(_['managed_rule_group_statement'].any(_['name'] == "AWSManagedRulesSQLiRuleSet"))) &&
        change.after.rule.any(_['statement'].any(_['managed_rule_group_statement'].any(_['name'] == "AWSManagedRulesKnownBadInputsRuleSet")))
      )
  - uid: mondoo-aws-security-waf-managed-rule-groups-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_wafv2_web_acl")
    mql: |
      terraform.state.resources.where(type == "aws_wafv2_web_acl").all(
        values.rule != empty &&
        values.rule.any(_['statement'].any(_['managed_rule_group_statement'].any(_['name'] == "AWSManagedRulesCommonRuleSet"))) &&
        values.rule.any(_['statement'].any(_['managed_rule_group_statement'].any(_['name'] == "AWSManagedRulesSQLiRuleSet"))) &&
        values.rule.any(_['statement'].any(_['managed_rule_group_statement'].any(_['name'] == "AWSManagedRulesKnownBadInputsRuleSet")))
      )
  - uid: mondoo-aws-security-waf-managed-rule-groups-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::WAFv2::WebACL")
    mql: |
      cloudformation.template.resources.where(type == "AWS::WAFv2::WebACL").all(
        properties['Rules'] != empty &&
        properties['Rules'].any(_['Statement']['ManagedRuleGroupStatement']['Name'] == "AWSManagedRulesCommonRuleSet") &&
        properties['Rules'].any(_['Statement']['ManagedRuleGroupStatement']['Name'] == "AWSManagedRulesSQLiRuleSet") &&
        properties['Rules'].any(_['Statement']['ManagedRuleGroupStatement']['Name'] == "AWSManagedRulesKnownBadInputsRuleSet")
      )
  # No Terraform variants: aws_batch_job_definition stores container settings as a JSON-encoded string in `container_properties`, so the `privileged` field is not addressable as a structured argument.
  - uid: mondoo-aws-security-batch-no-privileged-containers
    title: Ensure AWS Batch job definitions do not run privileged containers
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-2
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-5
      compliance/pci-dss-4: pcidss-requirement-2-2-6
      compliance/soc2-2017: soc2-control-cc6-3-3
      compliance/vda-isa-5: vda-isa-5-4-2-1
    variants:
      - uid: mondoo-aws-security-batch-no-privileged-containers-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-batch-no-privileged-containers-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that active AWS Batch job definitions do not request privileged containers. A privileged container shares the host kernel's namespaces and capabilities, including the ability to load kernel modules, access raw block devices, and manipulate host networking, giving the container code effective root on the underlying EC2 worker node.

        **Why this matters**

        - **Host breakout risk:** A container running with `privileged: true` can mount the host filesystem, read other containers' memory, and escape the container isolation boundary entirely.
        - **Lateral movement:** A compromised privileged Batch job can attack other jobs running on the same EC2 instance and access the EC2 instance metadata endpoint to steal IAM credentials.
        - **Unnecessary escalation:** The vast majority of Batch workloads process data or run computations and have no legitimate need for raw device access or kernel-level capabilities.

        **Risk mitigation**

        - **Isolation boundary preservation:** Running without the privileged flag confines the container to its user namespace and capability set, so a code-execution flaw in the workload does not immediately yield host access.
        - **Blast radius limitation:** Non-privileged containers cannot modify the host network stack or access other containers' filesystems, reducing the damage a compromised job can cause.
      audit: |
        ### Audit via Console

        1. Open the **AWS Batch Console** and select **Job definitions**.
        2. Filter by **Status: Active** and select each job definition.
        3. Under **Container properties**, check the **Privileged** field. For multi-node job definitions, inspect each node range.

        A passing job definition shows **Privileged: false** or the field is absent. A failing job definition shows **Privileged: true** under any container properties section.

        ### Audit via CLI

        1. List active job definitions and inspect their container properties for the `privileged` flag:

        ```bash
        aws batch describe-job-definitions \
          --status ACTIVE \
          --query 'jobDefinitions[*].{Name:jobDefinitionName,Revision:revision,Privileged:containerProperties.privileged}' \
          --output table
        ```

        2. For multi-node job definitions, check each node range:

        ```bash
        aws batch describe-job-definitions \
          --status ACTIVE \
          --query 'jobDefinitions[?nodeProperties!=`null`].{Name:jobDefinitionName,NodeRanges:nodeProperties.nodeRangeProperties[*].container.privileged}'
        ```

        A passing job definition returns `false` or `null` for `Privileged` in all container properties. A failing job definition returns `true` for `Privileged` in any container or node range container.
      remediation:
        - id: console
          desc: |
            Job definitions are immutable, so privileged mode is removed by registering a new revision:

            1. Open the **AWS Batch Console** and select **Job definitions**.
            2. Select the offending job definition and choose **Create new revision**.
            3. Under **Container properties**, clear the **Privileged** option.
            4. Save the new revision and update the queue or workflow to use the new revision.
        - id: cli
          desc: |
            To register a non-privileged revision of a Batch job definition using the AWS CLI:

            ```bash
            aws batch register-job-definition \
              --job-definition-name <name> \
              --type container \
              --container-properties '{"image":"<image>","privileged":false,"vcpus":1,"memory":2048,"jobRoleArn":"<role-arn>"}'
            ```
        - id: terraform
          desc: |
            To register a non-privileged Batch job definition in Terraform, set `privileged` to `false` inside the `container_properties` JSON:

            ```hcl
            resource "aws_batch_job_definition" "example" {
              name = "example"
              type = "container"

              container_properties = jsonencode({
                image      = "123456789012.dkr.ecr.us-east-1.amazonaws.com/example:latest"
                privileged = false
                jobRoleArn = aws_iam_role.job_role.arn
                resourceRequirements = [
                  { type = "VCPU", value = "1" },
                  { type = "MEMORY", value = "2048" }
                ]
              })
            }
            ```
        - id: cloudformation
          desc: |
            To register a non-privileged Batch job definition in CloudFormation, leave `Privileged` off or set it to `false` under `ContainerProperties`:

            ```yaml
            Resources:
              ExampleJobDefinition:
                Type: AWS::Batch::JobDefinition
                Properties:
                  Type: container
                  JobDefinitionName: example
                  ContainerProperties:
                    Image: 123456789012.dkr.ecr.us-east-1.amazonaws.com/example:latest
                    Privileged: false
                    JobRoleArn: !GetAtt JobRole.Arn
                    ResourceRequirements:
                      - Type: VCPU
                        Value: "1"
                      - Type: MEMORY
                        Value: "2048"
            ```
    refs:
      - url: https://docs.aws.amazon.com/batch/latest/userguide/job_definition_parameters.html
        title: Batch job definition parameters
  - uid: mondoo-aws-security-batch-no-privileged-containers-aws
    filters: asset.platform == "aws"
    mql: |
      aws.batch.jobDefinitions.where(status == "ACTIVE").none(
        container.privileged == true ||
        nodeRangeProperties.any(container.privileged == true)
      )
  - uid: mondoo-aws-security-batch-no-privileged-containers-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::Batch::JobDefinition")
    mql: |
      cloudformation.template.resources.where(type == "AWS::Batch::JobDefinition").all(
        properties['ContainerProperties'] == empty || properties['ContainerProperties']['Privileged'] != true
      )
  # No Terraform variants: aws_batch_job_definition stores container settings as a JSON-encoded string in `container_properties`, so the `image` field is not addressable as a structured argument.
  - uid: mondoo-aws-security-batch-approved-image-registry
    title: Ensure AWS Batch job definitions use approved private registries
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ais-02
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-5-23
      compliance/nis-2: nis-2-21-2-d
      compliance/nist-csf-1: nist-csf-1-pr-ds-6
      compliance/nist-csf-2: nist-csf-2-id-ra-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sr-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-2
      compliance/pci-dss-4: pcidss-requirement-6-3-2
      compliance/soc2-2017: soc2-control-cc6-8-1
      compliance/vda-isa-5: vda-isa-5-1-3-3
    variants:
      - uid: mondoo-aws-security-batch-approved-image-registry-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-batch-approved-image-registry-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that active AWS Batch job definitions reference container images from approved private registries rather than public sources such as Amazon ECR Public (`public.ecr.aws`), Docker Hub (`docker.io`), or unqualified image names. Public registries serve images that may be retagged, compromised, or unavailable at pull time, creating a supply-chain risk that bypasses internal scanning and signing gates.

        **Why this matters**

        - **Supply-chain control:** Images from private registries can be required to pass internal vulnerability scanning, signing attestation, and admission policies before being usable as Batch job sources.
        - **Immutability and reproducibility:** Private registries under your control do not allow third parties to replace image content at a tag that is already in use, ensuring the same tag always runs the same code.
        - **Availability independence:** Pulling from public registries on every job submission depends on third-party availability and rate limits outside your operational control.

        **Risk mitigation**

        - **Malicious image prevention:** Restricting images to known private registries blocks an attacker from substituting a malicious image by compromising an upstream public registry namespace.
        - **Audit and provenance:** Images in a private ECR repository carry a push history and scan report that establishes provenance, enabling forensic investigation if a job produces unexpected behavior.
      audit: |
        ### Audit via Console

        1. Open the **AWS Batch Console** and select **Job definitions**.
        2. Filter by **Status: Active** and select each job definition.
        3. Under **Container properties**, review the **Image** field. Verify the image URI begins with a private registry host such as `123456789012.dkr.ecr.<region>.amazonaws.com/` rather than `public.ecr.aws/`, `docker.io/`, or a bare image name with no registry prefix.

        A passing job definition shows a private ECR registry URI in the **Image** field. A failing job definition shows a public registry reference such as `public.ecr.aws/`, `docker.io/`, or an unqualified image name like `ubuntu:22.04`.

        ### Audit via CLI

        1. List active job definitions and inspect each container image reference:

        ```bash
        aws batch describe-job-definitions \
          --status ACTIVE \
          --query 'jobDefinitions[*].{Name:jobDefinitionName,Revision:revision,Image:containerProperties.image}' \
          --output table
        ```

        2. Flag any image that begins with a public registry prefix or lacks a registry hostname:

        ```bash
        aws batch describe-job-definitions \
          --status ACTIVE \
          --query 'jobDefinitions[?containerProperties.image!=`null`].{Name:jobDefinitionName,Image:containerProperties.image}' | \
          grep -E '(^|: )(public\.ecr\.aws|docker\.io|registry\.hub\.docker\.com|[^/.:]+/)'
        ```

        A passing job definition returns a private ECR URI starting with an account ID and `.dkr.ecr.`. A failing job definition returns an image URI starting with `public.ecr.aws/`, `docker.io/`, `registry.hub.docker.com/`, or a bare image name with no registry host.
      remediation:
        - id: console
          desc: |
            To migrate a Batch job to a private registry using the AWS Console:

            1. Push or replicate the desired image to a private Amazon ECR repository in the same region as the Batch compute environment.
            2. Open the **AWS Batch Console** and select **Job definitions**.
            3. Select the job definition and choose **Create new revision**.
            4. Replace the public image reference in **Image** with the ECR URI such as `123456789012.dkr.ecr.us-east-1.amazonaws.com/<repo>:<tag>`.
            5. Save the new revision and update the queue or workflow to use it.
        - id: cli
          desc: |
            To register a Batch job definition that uses an Amazon ECR private repository:

            ```bash
            aws batch register-job-definition \
              --job-definition-name <name> \
              --type container \
              --container-properties '{"image":"123456789012.dkr.ecr.us-east-1.amazonaws.com/<repo>:<tag>","vcpus":1,"memory":2048,"jobRoleArn":"<role-arn>","executionRoleArn":"<exec-role-arn>"}'
            ```
        - id: terraform
          desc: |
            To register a Batch job definition that pulls from a private ECR repository in Terraform, set `image` inside `container_properties` to a private registry URI:

            ```hcl
            resource "aws_batch_job_definition" "example" {
              name = "example"
              type = "container"

              container_properties = jsonencode({
                image            = "123456789012.dkr.ecr.us-east-1.amazonaws.com/example:latest"
                jobRoleArn       = aws_iam_role.job_role.arn
                executionRoleArn = aws_iam_role.exec_role.arn
                resourceRequirements = [
                  { type = "VCPU", value = "1" },
                  { type = "MEMORY", value = "2048" }
                ]
              })
            }
            ```
        - id: cloudformation
          desc: |
            To register a Batch job definition that pulls from a private ECR repository in CloudFormation, set `Image` under `ContainerProperties` to a private registry URI:

            ```yaml
            Resources:
              ExampleJobDefinition:
                Type: AWS::Batch::JobDefinition
                Properties:
                  Type: container
                  JobDefinitionName: example
                  ContainerProperties:
                    Image: 123456789012.dkr.ecr.us-east-1.amazonaws.com/example:latest
                    JobRoleArn: !GetAtt JobRole.Arn
                    ExecutionRoleArn: !GetAtt ExecRole.Arn
                    ResourceRequirements:
                      - Type: VCPU
                        Value: "1"
                      - Type: MEMORY
                        Value: "2048"
            ```
    refs:
      - url: https://docs.aws.amazon.com/batch/latest/userguide/job_definitions.html
        title: AWS Batch job definitions
  - uid: mondoo-aws-security-batch-approved-image-registry-aws
    filters: asset.platform == "aws"
    mql: |
      aws.batch.jobDefinitions.where(status == "ACTIVE").none(
        container.image == /^public\.ecr\.aws\// ||
        container.image == /^docker\.io\// ||
        container.image == /^registry\.hub\.docker\.com\// ||
        container.image == /^[^\/]+$/ ||
        container.image == /^[^.:\/]+\// ||
        nodeRangeProperties.any(container.image == /^public\.ecr\.aws\//) ||
        nodeRangeProperties.any(container.image == /^docker\.io\//) ||
        nodeRangeProperties.any(container.image == /^registry\.hub\.docker\.com\//) ||
        nodeRangeProperties.any(container.image == /^[^\/]+$/) ||
        nodeRangeProperties.any(container.image == /^[^.:\/]+\//)
      )
  - uid: mondoo-aws-security-batch-approved-image-registry-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::Batch::JobDefinition")
    mql: |
      cloudformation.template.resources.where(type == "AWS::Batch::JobDefinition").all(
        properties['ContainerProperties'] == empty ||
        properties['ContainerProperties']['Image'] == null ||
        properties['ContainerProperties']['Image'] != /^public\.ecr\.aws\// &&
        properties['ContainerProperties']['Image'] != /^docker\.io\// &&
        properties['ContainerProperties']['Image'] != /^registry\.hub\.docker\.com\// &&
        properties['ContainerProperties']['Image'] != /^[^\/]+$/ &&
        properties['ContainerProperties']['Image'] != /^[^.:\/]+\//
      )
  # No Terraform variants: this check follows job-queue references into compute environments and then into subnet configuration; the cross-resource hop and `map_public_ip_on_launch` lookup on aws_subnet cannot be resolved against arbitrary Terraform configurations without traversing references.
  # No CloudFormation variant: same cross-resource correlation between AWS::Batch::JobQueue, AWS::Batch::ComputeEnvironment, and AWS::EC2::Subnet (`MapPublicIpOnLaunch`) is required.
  - uid: mondoo-aws-security-batch-compute-env-private-subnets
    title: Ensure AWS Batch compute environments use private subnets
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-06
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-5
      compliance/pci-dss-4: pcidss-requirement-1-4-2
      compliance/soc2-2017: soc2-control-cc6-1-5
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-aws-security-batch-compute-env-private-subnets-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
    docs:
      desc: |
        This check ensures that the compute environments backing every enabled AWS Batch job queue use private subnets where EC2 instances do not receive a public IPv4 address on launch. Batch workers typically require only outbound access to pull images, call AWS APIs, and write results; they have no legitimate need for inbound reachability from the internet.

        **Why this matters**

        - **Direct internet exposure:** An EC2 instance with a public IP exposes any services bound to host-network ports, including Docker daemon sockets and SSH, directly to internet scanners.
        - **Expanded attack surface:** Public IPs are visible to automated scanners that continuously probe random IPv4 space, increasing the likelihood that a misconfigured service is discovered and exploited.
        - **Uncontrolled egress bypass:** Instances in public subnets can route directly to the internet without passing through a NAT gateway or VPC endpoint, bypassing egress monitoring and filtering controls.

        **Risk mitigation**

        - **Controlled egress path:** Private subnets force all outbound traffic through a NAT gateway or VPC endpoint, where it can be monitored, rate-limited, and restricted to approved destinations.
        - **Defense in depth:** Subnet placement complements security groups as a network control, so a security group misconfiguration on a private-subnet instance does not immediately result in internet-accessible services.
      audit: |
        ### Audit via Console

        1. Open the **AWS Batch Console** and select **Job queues**. Filter by **State: ENABLED**.
        2. For each enabled job queue, select it and note the compute environments listed under **Compute environment order**.
        3. For each compute environment, navigate to **Compute environments**, select the environment, and review the **Networking** section for the configured subnets.
        4. Open the **VPC Console**, locate each subnet by ID, and check whether **Auto-assign public IPv4 address** is disabled.

        A passing compute environment shows all configured subnets have **Auto-assign public IPv4 address** set to **No**. A failing compute environment shows at least one subnet with **Auto-assign public IPv4 address** set to **Yes**.

        ### Audit via CLI

        1. List enabled job queues and their compute environments:

        ```bash
        aws batch describe-job-queues \
          --query 'jobQueues[?state==`ENABLED`].{Queue:jobQueueName,Envs:computeEnvironmentOrder[*].computeEnvironment}'
        ```

        2. For each compute environment, retrieve its subnet IDs:

        ```bash
        aws batch describe-compute-environments \
          --compute-environments <env-arn> \
          --query 'computeEnvironments[*].computeResources.subnets'
        ```

        3. For each subnet, check public IP assignment:

        ```bash
        aws ec2 describe-subnets \
          --subnet-ids <subnet-id> \
          --query 'Subnets[*].{SubnetId:SubnetId,MapPublicIpOnLaunch:MapPublicIpOnLaunch}'
        ```

        A passing compute environment returns `MapPublicIpOnLaunch: false` for every subnet. A failing compute environment returns `MapPublicIpOnLaunch: true` for at least one subnet.
      remediation:
        - id: console
          desc: |
            To move Batch compute environments into private subnets using the AWS Console:

            1. Open the **AWS Batch Console** and select **Compute environments**.
            2. Identify the compute environment with public-subnet membership and create a new compute environment that references private subnet IDs in the same VPC.
            3. Open the affected job queue and update its compute environment order to point at the new private compute environment.
            4. Once jobs have drained from the original compute environment, delete it.
        - id: cli
          desc: |
            To create a private-subnet compute environment using the AWS CLI:

            ```bash
            aws batch create-compute-environment \
              --compute-environment-name <name> \
              --type MANAGED \
              --state ENABLED \
              --service-role <service-role-arn> \
              --compute-resources type=EC2,minvCpus=0,maxvCpus=64,desiredvCpus=0,subnets=<priv-subnet-1>,<priv-subnet-2>,securityGroupIds=<sg-id>,instanceRole=<instance-profile>,instanceTypes=optimal
            ```

            Then update the job queue to reference the new compute environment:

            ```bash
            aws batch update-job-queue --job-queue <queue> --compute-environment-order order=1,computeEnvironment=<new-env-arn>
            ```
        - id: terraform
          desc: |
            To create an AWS Batch compute environment that uses only private subnets in Terraform:

            ```hcl
            resource "aws_batch_compute_environment" "example" {
              compute_environment_name = "example-private"
              type                     = "MANAGED"
              state                    = "ENABLED"
              service_role             = aws_iam_role.batch_service.arn

              compute_resources {
                type               = "EC2"
                min_vcpus          = 0
                max_vcpus          = 64
                desired_vcpus      = 0
                instance_role      = aws_iam_instance_profile.ecs_instance.arn
                instance_type      = ["optimal"]
                subnets            = [aws_subnet.private_a.id, aws_subnet.private_b.id]
                security_group_ids = [aws_security_group.batch.id]
              }
            }
            ```
    refs:
      - url: https://docs.aws.amazon.com/batch/latest/userguide/compute_environments.html
        title: AWS Batch compute environments
  - uid: mondoo-aws-security-batch-compute-env-private-subnets-aws
    filters: asset.platform == "aws"
    mql: |
      aws.batch.jobQueues.where(state == "ENABLED").all(
        computeEnvironmentOrderTyped.all(
          computeEnvironment.subnets.all(mapPublicIpOnLaunch == false)
        )
      )
  # No Terraform variants: this check follows job-definition references into the IAM role and inspects attached managed-policy documents; that cross-resource correlation against arbitrary aws_iam_role / aws_iam_role_policy / aws_iam_policy resources cannot be replicated structurally.
  # No CloudFormation variant: same cross-resource correlation between AWS::Batch::JobDefinition, AWS::IAM::Role, and AWS::IAM::Policy / AWS::IAM::ManagedPolicy is required.
  - uid: mondoo-aws-security-batch-job-role-no-wildcards
    title: Ensure AWS Batch job roles avoid wildcard permissions and inline policies
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-5
      compliance/pci-dss-4: pcidss-requirement-7-2-2
      compliance/soc2-2017: soc2-control-cc6-3-3
      compliance/vda-isa-5: vda-isa-5-4-2-1
    variants:
      - uid: mondoo-aws-security-batch-job-role-no-wildcards-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
    docs:
      desc: |
        This check ensures that the IAM role assumed by an AWS Batch container job does not contain `Allow` statements with wildcard `Action` (`"*"`) or wildcard `Resource` (`"*"`), and carries no inline policies whose permissions cannot be evaluated by this check. Batch job code runs under the job role, so over-permissive policies give the workload broad access to AWS services whenever a job executes.

        **Why this matters**

        - **Privilege escalation vector:** A Batch job role with `iam:PassRole` and `Resource: "*"` can pass itself or any other role to an AWS service, escalating from the Batch job to account-wide access.
        - **Untrusted input risk:** Batch jobs often process external data; a wildcard role means any code-execution flaw in the job can pivot into full account control.
        - **Inline policy opacity:** Inline policies are not surfaced through the managed-policy API in a structured form, making them invisible to many audit and governance tools; their presence is flagged so they can be converted to auditable managed policies.

        **Risk mitigation**

        - **Least-privilege enforcement:** Scoping job role permissions to the specific actions and resource ARNs the workload needs limits the blast radius of a compromised or misbehaving Batch job.
        - **Governance pipeline compatibility:** Managed policies with explicit resource ARNs can be reviewed in change control and validated by automated permission-analysis tools before deployment.
      audit: |
        ### Audit via Console

        1. Open the **AWS Batch Console** and select **Job definitions**. Filter by **Status: Active**.
        2. For each job definition, select it and note the **Job role ARN** under **Container properties**.
        3. Open the **IAM Console**, navigate to **Roles**, and select the job role.
        4. Under **Permissions**, review each attached managed policy. Open each policy version and look for any `Allow` statement where `Action` or `Resource` is `"*"`.
        5. Under **Inline policies**, confirm there are none present.

        A passing job role shows no `Allow` statements with wildcard `Action` or `Resource` and has no inline policies. A failing job role shows at least one `Allow` statement with `"Action": "*"` or `"Resource": "*"`, or has one or more inline policies attached.

        ### Audit via CLI

        1. List the job role for each active job definition:

        ```bash
        aws batch describe-job-definitions \
          --status ACTIVE \
          --query 'jobDefinitions[?containerProperties.jobRoleArn!=`null`].{Name:jobDefinitionName,Role:containerProperties.jobRoleArn}'
        ```

        2. For each role, check for inline policies:

        ```bash
        aws iam list-role-policies --role-name <role-name> --query 'PolicyNames'
        ```

        3. Check attached managed policies for wildcard statements:

        ```bash
        aws iam list-attached-role-policies --role-name <role-name> --query 'AttachedPolicies[*].PolicyArn' --output text | \
          tr '\t' '\n' | \
          while read arn; do
            version=$(aws iam get-policy --policy-arn "$arn" --query 'Policy.DefaultVersionId' --output text)
            aws iam get-policy-version --policy-arn "$arn" --version-id "$version" \
              --query 'PolicyVersion.Document.Statement[?Effect==`Allow`].{Action:Action,Resource:Resource}'
          done
        ```

        A passing job role returns an empty list for inline policies and shows no `Allow` statement where `Action` or `Resource` contains `"*"`. A failing job role returns a non-empty inline policy list, or an attached policy document contains `"Action": "*"` or `"Resource": "*"` in an `Allow` statement.
      remediation:
        - id: console
          desc: |
            To remove wildcard permissions from a Batch job role using the AWS Console:

            1. Open the **IAM Console** and select **Roles**.
            2. Select the role used as the Batch job role and review each attached managed policy and inline policy.
            3. Replace any statement whose `Action` or `Resource` is `"*"` with the explicit list of actions and resource ARNs the workload actually needs.
            4. Detach or rewrite inline policies so the job role has only the least-privilege managed policies your governance pipeline produces.
        - id: cli
          desc: |
            To list policies on a Batch job role using the AWS CLI:

            ```bash
            aws iam list-attached-role-policies --role-name <role-name>
            aws iam list-role-policies --role-name <role-name>
            ```

            Then create a least-privilege policy and attach it in place of the wildcard policy:

            ```bash
            aws iam create-policy --policy-name <name> --policy-document file://policy.json
            aws iam attach-role-policy --role-name <role-name> --policy-arn <new-policy-arn>
            aws iam detach-role-policy --role-name <role-name> --policy-arn <old-wildcard-policy-arn>
            ```
        - id: terraform
          desc: |
            To create a Batch job role without wildcard permissions in Terraform, attach a least-privilege managed policy and reference the role in the job definition:

            ```hcl
            resource "aws_iam_role" "batch_job_role" {
              name = "batch-job-role"

              assume_role_policy = jsonencode({
                Version = "2012-10-17"
                Statement = [{
                  Effect    = "Allow"
                  Principal = { Service = "ecs-tasks.amazonaws.com" }
                  Action    = "sts:AssumeRole"
                }]
              })
            }

            resource "aws_iam_policy" "batch_job_policy" {
              name = "batch-job-least-privilege"

              policy = jsonencode({
                Version = "2012-10-17"
                Statement = [{
                  Effect   = "Allow"
                  Action   = ["s3:GetObject", "s3:PutObject"]
                  Resource = "arn:aws:s3:::my-job-bucket/*"
                }]
              })
            }

            resource "aws_iam_role_policy_attachment" "batch_job_attachment" {
              role       = aws_iam_role.batch_job_role.name
              policy_arn = aws_iam_policy.batch_job_policy.arn
            }

            resource "aws_batch_job_definition" "example" {
              name = "example"
              type = "container"

              container_properties = jsonencode({
                image      = "123456789012.dkr.ecr.us-east-1.amazonaws.com/example:latest"
                jobRoleArn = aws_iam_role.batch_job_role.arn
                resourceRequirements = [
                  { type = "VCPU", value = "1" },
                  { type = "MEMORY", value = "2048" }
                ]
              })
            }
            ```
    refs:
      - url: https://docs.aws.amazon.com/IAM/latest/UserGuide/best-practices.html
        title: IAM security best practices
  - uid: mondoo-aws-security-batch-job-role-no-wildcards-aws
    filters: asset.platform == "aws"
    mql: |
      aws.batch.jobDefinitions.where(status == "ACTIVE" && container != null && container.jobRole != null).all(
        container.jobRole.inlinePolicies.length == 0 &&
        container.jobRole.attachedPolicies.all(
          defaultVersion.document['Statement'].all(
            _['Effect'].upcase == "DENY" ||
            [_['Resource']].flat.none(_ == "*") &&
            [_['Action']].flat.none(_ == "*")
          )
        )
      )
  # No Terraform variants: this check follows state-machine references into the IAM role and inspects attached managed-policy documents; that cross-resource correlation against arbitrary aws_iam_role / aws_iam_role_policy / aws_iam_policy resources cannot be replicated structurally.
  # No CloudFormation variant: same cross-resource correlation between AWS::StepFunctions::StateMachine, AWS::IAM::Role, and AWS::IAM::Policy / AWS::IAM::ManagedPolicy is required.
  - uid: mondoo-aws-security-sfn-role-no-wildcard-resource
    title: Ensure Step Functions state machine roles do not allow wildcard resources
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-5
      compliance/pci-dss-4: pcidss-requirement-7-2-2
      compliance/soc2-2017: soc2-control-cc6-3-3
      compliance/vda-isa-5: vda-isa-5-4-2-1
    variants:
      - uid: mondoo-aws-security-sfn-role-no-wildcard-resource-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
    docs:
      desc: |
        This check ensures that the IAM execution role of every AWS Step Functions state machine does not contain an `Allow` statement with `Resource: "*"`, and carries no inline policies. State machines orchestrate service calls under their execution role, and a wildcard resource means the workflow can invoke Lambda functions, write to DynamoDB tables, or publish to SNS topics across the entire account, far beyond the resources the workflow was designed to use.

        **Why this matters**

        - **Confused-deputy risk:** A workflow that accepts untrusted input and passes it to a service invocation parameter can be manipulated into calling arbitrary resources if the role permits any resource.
        - **Least-privilege auditing:** Wildcard resources make it impossible to determine from the role policy alone which downstream services the state machine actually depends on, hindering access review.
        - **Inline policy opacity:** Inline policies bypass the structured managed-policy API, making them invisible to permission-analysis tooling; flagging their presence prompts conversion to managed policies.

        **Risk mitigation**

        - **Explicit resource scoping:** Replacing `Resource: "*"` with the ARNs of the specific Lambda functions, DynamoDB tables, and other services the state machine integrates with limits the impact of a compromised or misconfigured workflow.
        - **Change-control visibility:** Managed policies with explicit resource lists can be reviewed and approved through infrastructure-as-code change control, giving security teams visibility before a state machine is deployed or modified.
      audit: |
        ### Audit via Console

        1. Open the **AWS Step Functions Console** and select **State machines**.
        2. For each state machine, select it and note the **IAM role ARN** in the configuration details.
        3. Open the **IAM Console**, navigate to **Roles**, and select the execution role.
        4. Under **Permissions**, review each attached managed policy. Open each policy version and look for any `Allow` statement where `Resource` is `"*"`.
        5. Under **Inline policies**, confirm there are none present.

        A passing execution role shows no `Allow` statements with `"Resource": "*"` and has no inline policies. A failing execution role shows at least one `Allow` statement with `"Resource": "*"`, or has one or more inline policies attached.

        ### Audit via CLI

        1. List all state machines and their role ARNs:

        ```bash
        aws stepfunctions list-state-machines \
          --query 'stateMachines[*].{Name:name,Arn:stateMachineArn}' --output table
        ```

        2. For each state machine, retrieve the execution role:

        ```bash
        aws stepfunctions describe-state-machine \
          --state-machine-arn <state-machine-arn> \
          --query 'roleArn'
        ```

        3. Check the role for inline policies and wildcard resource statements:

        ```bash
        aws iam list-role-policies --role-name <role-name> --query 'PolicyNames'
        aws iam list-attached-role-policies --role-name <role-name> --query 'AttachedPolicies[*].PolicyArn' --output text | \
          tr '\t' '\n' | \
          while read arn; do
            version=$(aws iam get-policy --policy-arn "$arn" --query 'Policy.DefaultVersionId' --output text)
            aws iam get-policy-version --policy-arn "$arn" --version-id "$version" \
              --query 'PolicyVersion.Document.Statement[?Effect==`Allow` && Resource==`*`]'
          done
        ```

        A passing execution role returns an empty inline policy list and no `Allow` statements with `"Resource": "*"`. A failing execution role returns a non-empty inline policy list, or an attached policy document contains an `Allow` statement with `"Resource": "*"`.
      remediation:
        - id: console
          desc: |
            To scope a Step Functions execution role using the AWS Console:

            1. Open the **AWS Step Functions Console** and select the state machine.
            2. Note the execution role ARN, then open that role in the **IAM Console**.
            3. Replace any allow statement whose `Resource` is `"*"` with the explicit list of resource ARNs (Lambda functions, DynamoDB tables, SNS topics) the state machine actually integrates with.
            4. If the role has inline policies, convert each one to a managed policy so it can be reviewed in change control.
        - id: cli
          desc: |
            To inspect the role attached to a state machine using the AWS CLI:

            ```bash
            aws stepfunctions describe-state-machine --state-machine-arn <state-machine-arn> \
              --query 'roleArn'
            aws iam list-attached-role-policies --role-name <role-name>
            ```

            Then attach a scoped-down policy and detach the wildcard policy:

            ```bash
            aws iam create-policy --policy-name <name> --policy-document file://policy.json
            aws iam attach-role-policy --role-name <role-name> --policy-arn <scoped-arn>
            aws iam detach-role-policy --role-name <role-name> --policy-arn <wildcard-arn>
            ```
        - id: terraform
          desc: |
            To create a Step Functions state machine with a scoped execution role in Terraform, attach a least-privilege policy with explicit resource ARNs:

            ```hcl
            resource "aws_iam_role" "sfn_exec" {
              name = "sfn-execution-role"

              assume_role_policy = jsonencode({
                Version = "2012-10-17"
                Statement = [{
                  Effect    = "Allow"
                  Principal = { Service = "states.amazonaws.com" }
                  Action    = "sts:AssumeRole"
                }]
              })
            }

            resource "aws_iam_policy" "sfn_policy" {
              name = "sfn-least-privilege"

              policy = jsonencode({
                Version = "2012-10-17"
                Statement = [
                  {
                    Effect   = "Allow"
                    Action   = "lambda:InvokeFunction"
                    Resource = aws_lambda_function.example.arn
                  },
                  {
                    Effect   = "Allow"
                    Action   = ["dynamodb:PutItem", "dynamodb:GetItem"]
                    Resource = aws_dynamodb_table.example.arn
                  }
                ]
              })
            }

            resource "aws_iam_role_policy_attachment" "sfn_attach" {
              role       = aws_iam_role.sfn_exec.name
              policy_arn = aws_iam_policy.sfn_policy.arn
            }

            resource "aws_sfn_state_machine" "example" {
              name     = "example"
              role_arn = aws_iam_role.sfn_exec.arn

              definition = jsonencode({
                Comment = "Example state machine"
                StartAt = "InvokeFunction"
                States  = {
                  InvokeFunction = {
                    Type     = "Task"
                    Resource = aws_lambda_function.example.arn
                    End      = true
                  }
                }
              })
            }
            ```
    refs:
      - url: https://docs.aws.amazon.com/step-functions/latest/dg/concepts-iam.html
        title: IAM and Step Functions
