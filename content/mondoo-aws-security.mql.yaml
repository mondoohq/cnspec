    docs:
      desc: |
        This check ensures that ElastiCache Redis clusters have authentication enabled via Redis AUTH tokens, preventing unauthorized access to cached data.

        **Why this matters**

        - Without authentication, anyone with network access to the Redis cluster can read and modify data.
        - Redis clusters often contain sensitive session data, tokens, and cached business data.
        - AWS Security Hub control ElastiCache.6 recommends Redis AUTH for authentication.

        **Risk mitigation**

        - **Access control:** Requires clients to authenticate before executing commands.
        - **Unauthorized access prevention:** Prevents data access from compromised network segments.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and navigate to the Amazon ElastiCache service.
        2. In the left navigation pane, select **Redis caches**.
        3. Select a cluster to inspect.
        4. In the cluster details, locate the **Security** section.
        5. Verify that **Auth token** shows **Enabled** or that a token is configured.
        6. Repeat for each Redis cluster in the account.

        A passing cluster shows an AUTH token as enabled. A failing cluster shows no AUTH token configured.

        ### Audit via CLI

        1. List replication groups and check the authentication token setting:

        ```bash
        aws elasticache describe-replication-groups \
          --query 'ReplicationGroups[*].{Id:ReplicationGroupId,AuthTokenEnabled:AuthTokenEnabled}' \
          --output table
        ```

        A passing cluster returns `AuthTokenEnabled: true`. A failing cluster returns `AuthTokenEnabled: false` or `None`.

      remediation:
        - id: console
          desc: |
            To ensure ElastiCache Redis clusters require authentication using the AWS Console:

            1. Navigate to the Amazon ElastiCache Console.
            2. Create a new replication group with Auth token enabled.
            3. Specify a strong AUTH token.
            4. Update application connection strings to include the AUTH token.
        - id: cli
          desc: |
            To ensure ElastiCache Redis clusters require authentication using the AWS CLI:

            ```bash
            aws elasticache create-replication-group \
              --replication-group-id example-auth \
              --replication-group-description "Auth-enabled cluster" \
              --transit-encryption-enabled \
              --auth-token <strong-auth-token> \
              --cache-node-type cache.r6g.large \
              --engine redis
            ```
        - id: terraform
          desc: |
            To ensure ElastiCache Redis clusters require authentication in Terraform:

            ```hcl
            resource "aws_elasticache_replication_group" "example" {
              replication_group_id = "example-auth"
              description          = "Auth-enabled cluster"
              node_type            = "cache.r6g.large"
              engine               = "redis"

              transit_encryption_enabled = true
              auth_token                 = var.redis_auth_token
            }
            ```
        - id: cloudformation
          desc: |
            To ensure ElastiCache Redis clusters require authentication in CloudFormation:

            ```yaml
            Resources:
              ElastiCacheReplicationGroup:
                Type: AWS::ElastiCache::ReplicationGroup
                Properties:
                  ReplicationGroupId: example-auth
                  ReplicationGroupDescription: Auth-enabled cluster
                  CacheNodeType: cache.r6g.large
                  Engine: redis
                  TransitEncryptionEnabled: true
                  AuthToken: !Ref RedisAuthToken
            ```
    refs:
      - url: https://docs.aws.amazon.com/AmazonElastiCache/latest/red-ug/auth.html
        title: AWS Documentation - Authenticating with the Redis AUTH command
  - uid: mondoo-aws-security-elasticache-redis-auth-enabled-cluster
    filters: asset.platform == "aws-elasticache-cluster" && aws.elasticache.cluster.engine == "redis"
