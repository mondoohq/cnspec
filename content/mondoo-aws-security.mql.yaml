      - uid: mondoo-aws-security-ec2-launch-config-encrypted-volumes-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ec2-launch-config-encrypted-volumes-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ec2-launch-config-encrypted-volumes-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ec2-launch-config-encrypted-volumes-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that all EBS volumes defined in EC2 launch configurations have encryption enabled. Launch configurations are a legacy Auto Scaling mechanism that defines the storage layout for every instance an Auto Scaling group launches; an unencrypted volume definition propagates unencrypted storage to every instance the group creates.

        **Why this matters**

        - **Data-at-rest exposure:** Unencrypted EBS volumes can be read by anyone who gains physical or logical access to the underlying storage, or by detaching and reattaching a volume to a different instance.
        - **Snapshot leakage:** Snapshots of unencrypted volumes inherit the unencrypted state, meaning any accidental public sharing of a snapshot exposes its full contents.
        - **Blast radius amplification:** Because launch configurations drive Auto Scaling groups, a single unencrypted template propagates the risk to every instance the group launches over its lifetime.

        **Risk mitigation**

        - **Storage-layer protection:** Encrypting EBS volumes ensures data is protected even if storage media is physically accessed, decommissioned, or a snapshot is inadvertently shared.
        - **Migration opportunity:** AWS recommends replacing launch configurations with launch templates, which support the same encryption settings and offer additional hardening options.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and open the **EC2** console.
        2. In the left navigation pane, under **Auto Scaling**, choose **Launch Configurations**.
        3. Select a launch configuration and review the **Storage** section.
        4. For each listed EBS volume in **Block devices**, confirm the **Encrypted** column shows **Yes**.

        A passing launch configuration shows all EBS volumes with **Encrypted: Yes**. A failing configuration shows one or more volumes with **Encrypted: No** or no encryption indicator.

        ### Audit via CLI

        1. List all launch configurations and their EBS encryption settings:

        ```bash
        aws autoscaling describe-launch-configurations \
          --query "LaunchConfigurations[*].{Name:LaunchConfigurationName,BlockDevices:BlockDeviceMappings[*].{Device:DeviceName,Encrypted:Ebs.Encrypted}}"
        ```

        A passing launch configuration returns `"Encrypted": true` for every block device mapping. A failing configuration returns `"Encrypted": false` or `null` for one or more block devices.

      remediation:
        - id: console
          desc: |
            To ensure launch configuration EBS volumes are encrypted using the AWS Console, AWS has deprecated the launch configuration console UI. It is recommended to migrate to launch templates instead:

            1. Navigate to the **EC2 Console** > **Launch Templates**.
            2. Select **Create launch template**.
            3. Configure the template to match your existing launch configuration settings.
            4. Under **Storage (Volumes)**, ensure every volume has **Encrypted** enabled.
            5. Save the launch template.
            6. Navigate to **Auto Scaling Groups**, select the group, select **Edit**, and update it to use the new launch template.
            7. Delete the old launch configuration.
        - id: cli
          desc: |
            To ensure launch configuration EBS volumes are encrypted using the AWS CLI, list launch configurations and check encryption:

            ```bash
            aws autoscaling describe-launch-configurations \
              --query "LaunchConfigurations[*].{Name:LaunchConfigurationName,BlockDevices:BlockDeviceMappings[*].Ebs.Encrypted}"
            ```

            Create a new launch configuration with encrypted volumes (launch configurations are immutable):

            ```bash
            aws autoscaling create-launch-configuration \
              --launch-configuration-name my-lc-encrypted \
              --image-id ami-12345678 \
              --instance-type t3.micro \
              --block-device-mappings '[{"DeviceName":"/dev/xvda","Ebs":{"Encrypted":true,"VolumeSize":20,"VolumeType":"gp3"}}]'
            ```
        - id: terraform
          desc: |
            To ensure launch configuration EBS volumes are encrypted in Terraform:

            ```hcl
            resource "aws_launch_configuration" "example" {
              image_id      = "ami-12345678"
              instance_type = "t3.micro"

              ebs_block_device {
                device_name = "/dev/xvda"
                encrypted   = true
                volume_size = 20
                volume_type = "gp3"
              }

              root_block_device {
                encrypted   = true
                volume_size = 20
                volume_type = "gp3"
              }
            }
            ```

            Note: Consider migrating to `aws_launch_template` which is the modern replacement.
        - id: cloudformation
          desc: |
            To ensure launch configuration EBS volumes are encrypted in CloudFormation:

            ```yaml
            Resources:
              MyLaunchConfig:
                Type: AWS::AutoScaling::LaunchConfiguration
                Properties:
                  ImageId: ami-12345678
                  InstanceType: t3.micro
                  BlockDeviceMappings:
                    - DeviceName: /dev/xvda
                      Ebs:
                        Encrypted: true
                        VolumeSize: 20
                        VolumeType: gp3
            ```

            Note: Consider migrating to `AWS::EC2::LaunchTemplate` which is the modern replacement.
    refs:
      - url: https://docs.aws.amazon.com/autoscaling/ec2/userguide/launch-configurations.html
        title: AWS Documentation - Launch configurations
      - url: https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/EBSEncryption.html
        title: AWS Documentation - Amazon EBS encryption
  - uid: mondoo-aws-security-ec2-launch-config-encrypted-volumes-aws
    filters: asset.platform == "aws"
    mql: |
      aws.ec2.launchConfigurations.all(
        blockDeviceMappings.where(ebs != null).all(ebs.encrypted == true)
      )
  - uid: mondoo-aws-security-ec2-launch-config-encrypted-volumes-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_launch_configuration")
    mql: |
      terraform.resources.where(nameLabel == "aws_launch_configuration").all(
        blocks.where(type == "ebs_block_device").all(arguments.encrypted == true) &&
        blocks.where(type == "root_block_device").all(arguments.encrypted == true)
      )
  - uid: mondoo-aws-security-ec2-launch-config-encrypted-volumes-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_launch_configuration")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_launch_configuration").all(
        change.after['ebs_block_device'].all(_['encrypted'] == true) &&
        change.after['root_block_device'].all(_['encrypted'] == true)
      )
  - uid: mondoo-aws-security-ec2-launch-config-encrypted-volumes-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_launch_configuration")
    mql: |
      terraform.state.resources.where(type == "aws_launch_configuration").all(
        values['ebs_block_device'].all(_['encrypted'] == true) &&
        values['root_block_device'].all(_['encrypted'] == true)
      )
  - uid: mondoo-aws-security-ec2-launch-config-encrypted-volumes-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::AutoScaling::LaunchConfiguration")
    mql: |
      cloudformation.template.resources.where(type == "AWS::AutoScaling::LaunchConfiguration").all(
        properties['BlockDeviceMappings'] != empty &&
        properties['BlockDeviceMappings'].all(_['Ebs']['Encrypted'] == true)
      )
  - uid: mondoo-aws-security-ec2-launch-config-no-public-ip
    title: Ensure launch configurations do not assign public IPs
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-aws-security-ec2-launch-config-no-public-ip-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-ec2-launch-config-no-public-ip-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ec2-launch-config-no-public-ip-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ec2-launch-config-no-public-ip-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ec2-launch-config-no-public-ip-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that EC2 launch configurations do not set `associatePublicIpAddress` to `true`, which would automatically assign a public IP address to every instance launched by the associated Auto Scaling group. By default, whether a public IP is assigned depends on the subnet setting, but explicitly enabling it in a launch configuration overrides subnet defaults for every instance the group creates.

        **Why this matters**

        - **Direct internet reachability:** Instances with public IP addresses are directly accessible from the internet, expanding the attack surface beyond what security groups alone can adequately control.
        - **Attack surface multiplication:** A launch configuration with public IP assignment enabled causes every Auto Scaling instance to be publicly routable, so one misconfigured template affects the entire fleet.
        - **Lateral movement risk:** A compromised internet-facing instance provides an attacker with a foothold inside the VPC that can be used for lateral movement to private resources.

        **Risk mitigation**

        - **Network isolation:** Routing outbound traffic through NAT gateways or VPC endpoints keeps instances private while still allowing necessary internet egress, removing the need for public IPs.
        - **Reduced exposure window:** Instances without public IPs are not reachable from scanning and probing activity that constantly targets the public internet address space.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and open the **EC2** console.
        2. In the left navigation pane, under **Auto Scaling**, choose **Launch Configurations**.
        3. Select a launch configuration and review the **Network settings** or **Details** tab.
        4. Check the **Assign public IP address** setting.

        A passing launch configuration shows **Assign public IP address: No** or does not assign a public IP. A failing configuration shows **Assign public IP address: Yes**.

        ### Audit via CLI

        1. List all launch configurations and their public IP assignment setting:

        ```bash
        aws autoscaling describe-launch-configurations \
          --query "LaunchConfigurations[*].{Name:LaunchConfigurationName,AssociatePublicIpAddress:AssociatePublicIpAddress}"
        ```

        A passing launch configuration returns `"AssociatePublicIpAddress": false` or `null`. A failing configuration returns `"AssociatePublicIpAddress": true`.

      remediation:
        - id: console
          desc: |
            To ensure launch configurations do not assign public IPs using the AWS Console, AWS has deprecated the launch configuration console UI. It is recommended to migrate to launch templates instead:

            1. Navigate to the **EC2 Console** > **Launch Templates**.
            2. Select **Create launch template**.
            3. Configure the template to match your existing launch configuration settings.
            4. Under **Network settings**, ensure **Auto-assign public IP** is set to **Don't include in launch template** or **Disable**.
            5. Save the launch template.
            6. Navigate to **Auto Scaling Groups**, select the group, select **Edit**, and update it to use the new launch template.
        - id: cli
          desc: |
            To ensure launch configurations do not assign public IPs using the AWS CLI, check which launch configurations assign public IPs:

            ```bash
            aws autoscaling describe-launch-configurations \
              --query "LaunchConfigurations[?AssociatePublicIpAddress==\`true\`].LaunchConfigurationName"
            ```

            Create a replacement without public IP assignment:

            ```bash
            aws autoscaling create-launch-configuration \
              --launch-configuration-name my-lc-private \
              --image-id ami-12345678 \
              --instance-type t3.micro \
              --no-associate-public-ip-address
            ```
        - id: terraform
          desc: |
            To ensure launch configurations do not assign public IPs in Terraform:

            ```hcl
            resource "aws_launch_configuration" "example" {
              image_id                    = "ami-12345678"
              instance_type               = "t3.micro"
              associate_public_ip_address = false
            }
            ```

            Note: Consider migrating to `aws_launch_template` which is the modern replacement.
        - id: cloudformation
          desc: |
            To ensure launch configurations do not assign public IPs in CloudFormation:

            ```yaml
            Resources:
              MyLaunchConfig:
                Type: AWS::AutoScaling::LaunchConfiguration
                Properties:
                  ImageId: ami-12345678
                  InstanceType: t3.micro
                  AssociatePublicIpAddress: false
            ```

            Note: Consider migrating to `AWS::EC2::LaunchTemplate` which is the modern replacement.
    refs:
      - url: https://docs.aws.amazon.com/autoscaling/ec2/userguide/launch-configurations.html
        title: AWS Documentation - Launch configurations
