      terraform.resources.where(nameLabel == "aws_keyspaces_table").all(
        blocks.where(type == "encryption_specification") != empty &&
        blocks.where(type == "encryption_specification").all(arguments['type'] == "CUSTOMER_MANAGED_KMS_KEY")
      )
  - uid: mondoo-aws-security-keyspaces-cmk-encryption-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_keyspaces_table")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_keyspaces_table").all(
        change.after['encryption_specification'] != empty &&
        change.after['encryption_specification'].all(_['type'] == "CUSTOMER_MANAGED_KMS_KEY")
      )
  - uid: mondoo-aws-security-keyspaces-cmk-encryption-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_keyspaces_table")
    mql: |
      terraform.state.resources.where(type == "aws_keyspaces_table").all(
        values['encryption_specification'] != empty &&
        values['encryption_specification'].all(_['type'] == "CUSTOMER_MANAGED_KMS_KEY")
      )
  - uid: mondoo-aws-security-keyspaces-cmk-encryption-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::Cassandra::Table")
    mql: |
      cloudformation.template.resources.where(type == "AWS::Cassandra::Table").all(
        properties['EncryptionSpecification'] != empty &&
        properties['EncryptionSpecification']['EncryptionType'] == "CUSTOMER_MANAGED_KMS_KEY"
      )
  - uid: mondoo-aws-security-keyspaces-pitr-enabled
    title: Ensure Keyspaces tables have point-in-time recovery enabled
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-bcr-08
      compliance/dora: dora-art-12
      compliance/hipaa: hipaa-security-ss164-308-a-7-ii-a-contingency-plan-data-backup-plan
      compliance/iso-27001-2022: iso-27001-2022-a-8-13
      compliance/nis-2: nis-2-21-2-c
      compliance/nist-csf-1: nist-csf-1-pr-ip-4
      compliance/nist-csf-2: nist-csf-2-pr-ds-11
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cp-9
      compliance/nist-sp-800-171: nist-sp-800-171--3-8-9
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc9-1-1
      compliance/vda-isa-5: false
    variants:
      - uid: mondoo-aws-security-keyspaces-pitr-enabled-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-keyspaces-pitr-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-keyspaces-pitr-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-keyspaces-pitr-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-keyspaces-pitr-enabled-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon Keyspaces tables have point-in-time recovery (PITR) enabled. Without PITR, an attacker who gains access to Keyspaces can perform ransomware-style data destruction by deleting or overwriting table data, and there is no recovery path. PITR provides continuous backups that allow restoration to any point within the last 35 days, removing the attacker's leverage.

        **Why this matters**

        - An attacker with Keyspaces write access can destroy or encrypt table data as a ransomware-style attack, and without PITR the damage is permanent.
        - Ransomware attacks targeting cloud-managed data stores rely on the absence of recovery mechanisms to maximize pressure on victims. PITR eliminates this leverage.
        - PITR is a zero-impact operation that does not consume table throughput, making it a low-cost defense against data destruction attacks.

        **Risk mitigation**

        - **Ransomware resilience:** PITR enables restoration to any second within the recovery window, ensuring data can be recovered after adversarial destruction.
        - **Attack recovery:** Enables restoration to the moment before a data destruction or corruption attack, minimizing data loss from compromised credentials or insider threats.
        - **Forensic comparison:** PITR snapshots can be used to compare pre-attack and post-attack table states during incident investigation.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and navigate to the **Amazon Keyspaces** console.
        2. Select **Tables** in the left navigation pane.
        3. Select each table and choose the **Backups** tab.
        4. Review the **Point-in-time recovery** status.

        A passing table shows **Point-in-time recovery** as **Enabled**. A failing table shows it as **Disabled**.

        ### Audit via CLI

        1. List all keyspaces:

        ```bash
        aws keyspaces list-keyspaces --query "keyspaces[*].keyspaceName"
        ```

        2. For each keyspace and table, check the PITR status:

        ```bash
        aws keyspaces get-table \
          --keyspace-name <keyspace-name> \
          --table-name <table-name> \
          --query "{PointInTimeRecovery:pointInTimeRecovery.status}"
        ```

        A passing table returns `"PointInTimeRecovery": "ENABLED"`. A failing table returns `"PointInTimeRecovery": "DISABLED"`.

      remediation:
        - id: console
          desc: |
            To ensure Keyspaces tables have point-in-time recovery enabled using the AWS Console:

            1. Navigate to the **Amazon Keyspaces Console** and select **Tables**.
            2. Select the table you want to configure.
            3. Choose the **Backups** tab.
            4. Under **Point-in-time recovery**, choose **Enable**.
            5. Confirm the action.
        - id: terraform
          desc: |
            To ensure Keyspaces tables have point-in-time recovery enabled in Terraform:

            ```hcl
            resource "aws_keyspaces_table" "example" {
              keyspace_name = aws_keyspaces_keyspace.example.name
              table_name    = "example-table"

              point_in_time_recovery {
                status = "ENABLED"
              }

              schema_definition {
                column {
                  name = "id"
                  type = "text"
                }
                partition_key {
                  name = "id"
                }
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure Keyspaces tables have point-in-time recovery enabled in CloudFormation:

            ```yaml
            Resources:
              KeyspacesTable:
                Type: AWS::Cassandra::Table
                Properties:
                  KeyspaceName: !Ref ExampleKeyspace
                  TableName: example-table
                  PointInTimeRecoveryEnabled: true
            ```
    refs:
      - url: https://docs.aws.amazon.com/keyspaces/latest/devguide/PointInTimeRecovery.html
        title: Amazon Keyspaces - Point-in-Time Recovery
  - uid: mondoo-aws-security-keyspaces-pitr-enabled-aws
    filters: asset.platform == "aws"
    mql: |
      aws.keyspaces.keyspaces.all(
        tables.all(pointInTimeRecoveryEnabled == true)
      )
  - uid: mondoo-aws-security-keyspaces-pitr-enabled-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_keyspaces_table")
