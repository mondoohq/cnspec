  - uid: mondoo-aws-security-timestream-influxdb-logging-enabled
    title: Ensure Timestream InfluxDB instances have log delivery enabled
    impact: 60
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-ae-3
      compliance/nist-csf-2: nist-csf-2-de-ae-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    variants:
      - uid: mondoo-aws-security-timestream-influxdb-logging-enabled-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-timestream-influxdb-logging-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-timestream-influxdb-logging-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-timestream-influxdb-logging-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-timestream-influxdb-logging-enabled-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon Timestream for InfluxDB instances and clusters have log delivery enabled to an S3 bucket. Logging provides visibility into database operations, query patterns, and potential security events.

        **Why this matters**

        - **Incident detection**: Without logs, suspicious queries, unauthorized access attempts, and data exfiltration go undetected.
        - **Forensic capability**: Logs are essential for investigating security incidents, understanding the scope of a breach, and meeting regulatory notification requirements.
        - **Compliance requirements**: Most security frameworks require audit logging for database services, including access patterns and administrative actions.
        - **Operational visibility**: Logs help identify performance issues, misconfigurations, and unusual usage patterns that may indicate compromise.
      remediation:
        - id: console
          desc: |
            To ensure Timestream InfluxDB instances have log delivery enabled using the AWS Console:

            1. Navigate to the **Amazon Timestream** console and select **InfluxDB instances** or **InfluxDB clusters**.
            2. Select the resource to modify.
            3. Choose **Modify**.
            4. Under **Log delivery**, enable log delivery.
            5. Select an S3 bucket as the log destination and configure the S3 prefix if desired.
            6. Choose **Save changes**.
        - id: cli
          desc: |
            To ensure Timestream InfluxDB instances have log delivery enabled using the AWS CLI, when creating an InfluxDB instance, enable log delivery:

            ```bash
            aws timestream-influxdb create-db-instance \
              --name <name> \
              --db-instance-type db.influx.medium \
              --vpc-subnet-ids <subnet-ids> \
              --allocated-storage 20 \
              --log-delivery-configuration '{"s3Configuration": {"bucketName": "<bucket-name>", "enabled": true}}'
            ```
        - id: terraform
          desc: |
            To ensure Timestream InfluxDB instances have log delivery enabled in Terraform:

            ```hcl
            resource "aws_timestreaminfluxdb_db_instance" "example" {
              name              = "example"
              db_instance_type  = "db.influx.medium"
              allocated_storage = 20
              vpc_subnet_ids    = [aws_subnet.example.id]

              log_delivery_configuration {
                s3_configuration {
                  bucket_name = aws_s3_bucket.logs.id
                  enabled     = true
                }
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure Timestream InfluxDB instances have log delivery enabled in CloudFormation:

            ```yaml
            Resources:
              MyInfluxDBInstance:
                Type: AWS::Timestream::InfluxDBInstance
                Properties:
                  Name: example
                  DbInstanceType: db.influx.medium
                  AllocatedStorage: 20
                  LogDeliveryConfiguration:
                    S3Configuration:
                      BucketName: !Ref LogBucket
                      Enabled: true
            ```
    refs:
      - url: https://docs.aws.amazon.com/timestream/latest/developerguide/timestream-influxdb.html
        title: Amazon Timestream for InfluxDB
  - uid: mondoo-aws-security-timestream-influxdb-logging-enabled-aws
    filters: asset.platform == "aws"
    mql: |
      aws.timestream.influxdb.instances.all(logDeliveryEnabled == true)
      aws.timestream.influxdb.clusters.all(logDeliveryEnabled == true)
  - uid: mondoo-aws-security-timestream-influxdb-logging-enabled-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_timestreaminfluxdb_db_instance")
