      terraform.state.resources.where(type == "aws_redshift_cluster").all(
        values["maintenance_track_name"] == "Current" || values["maintenance_track_name"] == "current"
      )
  - uid: mondoo-aws-security-fsx-filesystem-cmk-encryption
    title: Ensure FSx file systems are encrypted with a customer-managed KMS key
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-11
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-aws-security-fsx-filesystem-cmk-encryption-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-fsx-filesystem-cmk-encryption-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-fsx-filesystem-cmk-encryption-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-fsx-filesystem-cmk-encryption-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-fsx-filesystem-cmk-encryption-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon FSx file systems are encrypted using a customer-managed AWS KMS key (CMK). While FSx encrypts data at rest by default, using a CMK instead of the AWS-managed key provides additional control over key management, access policies, and rotation schedules.

        **Why this matters**

        - AWS-managed encryption keys do not allow customers to control key policies, audit key usage independently, or enforce custom rotation schedules.
        - Customer-managed KMS keys enable fine-grained access control, allowing organizations to restrict which principals can encrypt and decrypt file system data.
        - CMKs integrate with AWS CloudTrail for key usage auditing, providing visibility into who accessed encrypted data and when.
        - Compliance frameworks often require customer-controlled encryption keys for sensitive file storage.

        **Risk mitigation**

        - **Key control:** Organizations maintain full control over the encryption key lifecycle, including creation, rotation, and deletion.
        - **Access auditing:** All key usage is logged in CloudTrail, enabling security monitoring and compliance reporting.
        - **Compliance:** Meets regulatory requirements for customer-managed encryption of data at rest.
      audit: |
        ### Audit via Console

        1. Open the AWS Management Console and navigate to **Amazon FSx** under Storage.
        2. Select each file system in the list.
        3. On the **Summary** tab, locate the **KMS key ID** field under Encryption.

        A passing file system shows a customer-managed KMS key ARN (format: `arn:aws:kms:<region>:<account>:key/<key-id>`). A failing file system shows the AWS-managed key alias `aws/fsx` or an empty KMS key field.

        ### Audit via CLI

        1. List all FSx file systems and their KMS key IDs:

        ```bash
        aws fsx describe-file-systems \
          --query "FileSystems[*].{FileSystemId:FileSystemId,KmsKeyId:KmsKeyId}"
        ```

        2. For each returned KMS key ARN, confirm it is customer-managed:

        ```bash
        aws kms describe-key \
          --key-id <kms-key-id> \
          --query "KeyMetadata.{KeyManager:KeyManager,KeyId:KeyId}"
        ```

        A passing file system returns a `KmsKeyId` value with `KeyManager` equal to `CUSTOMER`. A failing file system returns a `KmsKeyId` referencing the `aws/fsx` alias or returns `KeyManager` equal to `AWS`.

      remediation:
        - id: console
          desc: |
            To ensure FSx file systems are encrypted with a customer-managed KMS key using the AWS Console:

            1. Open the AWS Console and navigate to **FSx** under **Storage** (or search for "FSx" in the search bar).
            2. Note: Encryption settings can only be configured at creation time and cannot be changed for existing file systems.
            3. Select **Create file system** and choose the appropriate file system type (Lustre, Windows File Server, NetApp ONTAP, or OpenZFS).
            4. In the **Encryption** section, choose **Customer managed KMS key** and select the desired key from the dropdown or enter a KMS key ARN.
            5. Configure the remaining file system settings (storage capacity, VPC, subnets, security groups) and complete the creation.
            6. Migrate data from the existing file system using AWS DataSync, Robocopy, or rsync depending on the file system type.
            7. Update application references to point to the new file system endpoint, then decommission the old file system.
            8. Update applications to use the new file system's DNS name or mount target.
            9. Delete the old file system after verifying the migration.
        - id: cli
          desc: |
            To ensure FSx file systems are encrypted with a customer-managed KMS key using the AWS CLI, create an FSx file system with a customer-managed KMS key:

            ```bash
            aws fsx create-file-system \
              --file-system-type LUSTRE \
              --storage-capacity 1200 \
              --subnet-ids <subnet-id> \
              --lustre-configuration DeploymentType=PERSISTENT_2,PerUnitStorageThroughput=125 \
              --kms-key-id arn:aws:kms:region:account-id:key/key-id
            ```

            Check the KMS key used by an existing file system:

            ```bash
            aws fsx describe-file-systems --file-system-ids <fs-id> \
              --query "FileSystems[*].{FileSystemId:FileSystemId,KmsKeyId:KmsKeyId}"
            ```
        - id: terraform
          desc: |
            To ensure FSx file systems are encrypted with a customer-managed KMS key in Terraform:

            ```hcl
            resource "aws_kms_key" "fsx" {
              description         = "KMS key for FSx encryption"
              enable_key_rotation = true
            }

            resource "aws_fsx_lustre_file_system" "example" {
              storage_capacity = 1200
              subnet_ids       = [aws_subnet.example.id]
              kms_key_id       = aws_kms_key.fsx.arn
            }
            ```
        - id: cloudformation
          desc: |
            To ensure FSx file systems are encrypted with a customer-managed KMS key in CloudFormation:

            ```yaml
            Resources:
              FSxKMSKey:
                Type: "AWS::KMS::Key"
                Properties:
                  Description: "KMS key for FSx encryption"
                  EnableKeyRotation: true

              FSxFileSystem:
                Type: "AWS::FSx::FileSystem"
                Properties:
                  FileSystemType: LUSTRE
                  StorageCapacity: 1200
                  SubnetIds:
                    - !Ref Subnet
                  KmsKeyId: !GetAtt FSxKMSKey.Arn
            ```
    refs:
      - url: https://docs.aws.amazon.com/fsx/latest/LustreGuide/encryption-at-rest.html
        title: AWS Documentation - Encrypting data at rest for Amazon FSx
      - url: https://docs.aws.amazon.com/kms/latest/developerguide/concepts.html#customer-cmk
        title: AWS KMS Customer Managed Keys
  - uid: mondoo-aws-security-fsx-filesystem-cmk-encryption-aws
    filters: asset.platform == "aws"
    mql: aws.fsx.fileSystems.all(kmsKey { metadata.KeyManager == "CUSTOMER" })
  - uid: mondoo-aws-security-fsx-filesystem-cmk-encryption-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_fsx_lustre_file_system")
    mql: |
      terraform.resources.where(nameLabel == "aws_fsx_lustre_file_system").all(
        arguments.kms_key_id != empty
      )
  - uid: mondoo-aws-security-fsx-filesystem-cmk-encryption-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_fsx_lustre_file_system")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_fsx_lustre_file_system").all(
        change.after.kms_key_id != empty
      )
  - uid: mondoo-aws-security-fsx-filesystem-cmk-encryption-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_fsx_lustre_file_system")
    mql: |
      terraform.state.resources.where(type == "aws_fsx_lustre_file_system").all(
        values.kms_key_id != empty
      )
  - uid: mondoo-aws-security-fsx-filesystem-cmk-encryption-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::FSx::FileSystem")
    mql: |
      cloudformation.template.resources.where(type == "AWS::FSx::FileSystem").all(
      properties['KmsKeyId'] != empty
      )
  - uid: mondoo-aws-security-opensearch-cmk-encryption
    title: Ensure OpenSearch domains are encrypted with a customer-managed KMS key
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-11
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-aws-security-opensearch-cmk-encryption-aws
        tags:
          mondoo.com/filter-title: AWS OpenSearch Domain
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-opensearch-cmk-encryption-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-opensearch-cmk-encryption-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-opensearch-cmk-encryption-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-opensearch-cmk-encryption-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon OpenSearch Service domains are encrypted at rest using a customer-managed AWS KMS key (CMK). While OpenSearch supports encryption at rest with the AWS-managed `aws/es` key, using a CMK provides additional control over key management, access policies, and rotation schedules.

        **Why this matters**

        - The default AWS-managed `aws/es` key does not allow customers to control key policies, audit key usage independently, or enforce custom rotation schedules.
        - Customer-managed KMS keys enable fine-grained access control, allowing organizations to restrict which principals can encrypt and decrypt domain data.
        - CMKs integrate with AWS CloudTrail for key usage auditing, providing visibility into who accessed encrypted data and when.
        - Compliance frameworks including PCI DSS, HIPAA, and SOC 2 often require customer-controlled encryption keys for sensitive data stores.

        **Risk mitigation**

        - **Key control:** Organizations maintain full control over the encryption key lifecycle, including creation, rotation, and deletion.
        - **Access auditing:** All key usage is logged in CloudTrail, enabling security monitoring and compliance reporting.
        - **Compliance:** Meets regulatory requirements for customer-managed encryption of data at rest.
      audit: |
        ### Audit via Console

        1. Open the AWS Management Console and navigate to **Amazon OpenSearch Service**.
        2. Select each domain in the list.
        3. On the **Security configuration** tab, locate the **Encryption at rest** section.
        4. Check the **KMS key** field to determine whether a customer-managed key is in use.

        A passing domain shows a customer-managed KMS key ARN (not the default `aws/es` alias). A failing domain shows `aws/es` or no KMS key configured.

        ### Audit via CLI

        1. List all OpenSearch domains:

        ```bash
        aws opensearch list-domain-names \
          --query "DomainNames[*].DomainName" \
          --output text
        ```

        2. Check the encryption configuration for each domain:

        ```bash
        aws opensearch describe-domain \
          --domain-name <domain-name> \
          --query "DomainStatus.EncryptionAtRestOptions"
        ```

        3. For each returned KMS key ID, verify it is customer-managed:

        ```bash
        aws kms describe-key \
          --key-id <kms-key-id> \
          --query "KeyMetadata.KeyManager"
        ```

        A passing domain returns `KeyManager` equal to `CUSTOMER`. A failing domain returns `KeyManager` equal to `AWS`, or the `KmsKeyId` references the `aws/es` alias.

      remediation:
        - id: console
          desc: |
            To ensure OpenSearch domains are encrypted with a customer-managed KMS key using the AWS Console:

            1. Navigate to the Amazon OpenSearch Service Console.
            2. Select the domain to update.
            3. Select **Actions** > **Edit security configuration**.
            4. Under **Encryption**, select a customer-managed KMS key.
            5. Select **Save changes**.

            Note: Changing the KMS key may require creating a new domain and migrating data, depending on the domain configuration.
        - id: cli
          desc: |
            To ensure OpenSearch domains are encrypted with a customer-managed KMS key using the AWS CLI, update a domain to use a customer-managed KMS key:

            ```bash
            aws opensearch update-domain-config --domain-name <domain-name> \
              --encryption-at-rest-options '{"Enabled": true, "KmsKeyId": "arn:aws:kms:region:account-id:key/key-id"}'
            ```

            Check the current encryption configuration:

            ```bash
            aws opensearch describe-domain --domain-name <domain-name> \
              --query "DomainStatus.EncryptionAtRestOptions"
            ```
        - id: terraform
          desc: |
            To ensure OpenSearch domains are encrypted with a customer-managed KMS key in Terraform:

            ```hcl
            resource "aws_kms_key" "opensearch" {
              description         = "KMS key for OpenSearch encryption"
              enable_key_rotation = true
            }

            resource "aws_opensearch_domain" "example" {
              domain_name    = "example-domain"
              engine_version = "OpenSearch_2.11"

              encrypt_at_rest {
                enabled    = true
                kms_key_id = aws_kms_key.opensearch.arn
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure OpenSearch domains are encrypted with a customer-managed KMS key in CloudFormation:

            ```yaml
            Resources:
              OpenSearchKMSKey:
                Type: "AWS::KMS::Key"
                Properties:
                  Description: "KMS key for OpenSearch encryption"
                  EnableKeyRotation: true

              OpenSearchDomain:
                Type: "AWS::OpenSearchService::Domain"
                Properties:
                  DomainName: "example-domain"
                  EngineVersion: "OpenSearch_2.11"
                  EncryptionAtRestOptions:
                    Enabled: true
                    KmsKeyId: !Ref OpenSearchKMSKey
            ```
    refs:
      - url: https://docs.aws.amazon.com/opensearch-service/latest/developerguide/encryption-at-rest.html
        title: AWS Documentation - Encryption of data at rest for Amazon OpenSearch Service
      - url: https://docs.aws.amazon.com/kms/latest/developerguide/concepts.html#customer-cmk
        title: AWS KMS Customer Managed Keys
  - uid: mondoo-aws-security-opensearch-cmk-encryption-aws
    filters: asset.platform == "aws-opensearch-domain"
    mql: aws.opensearch.domain.encryptionAtRestKmsKey { metadata.KeyManager == "CUSTOMER" }
