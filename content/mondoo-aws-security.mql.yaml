  - uid: mondoo-aws-security-client-vpn-security-groups
    title: Ensure Client VPN endpoints have security groups
    impact: 80
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-1-1
    variants:
      - uid: mondoo-aws-security-client-vpn-security-groups-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-client-vpn-security-groups-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-client-vpn-security-groups-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-client-vpn-security-groups-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that AWS Client VPN endpoints have security groups attached to control network access from VPN clients into the VPC. Without security groups, VPN clients may have unrestricted access to all resources within the associated VPC.

        **Why this matters**

        - Client VPN endpoints without security groups allow connected clients to reach any resource in the VPC, violating the principle of least privilege.
        - A compromised VPN client or stolen credentials could be used to access sensitive resources such as databases, internal APIs, and management interfaces.
        - Security groups on the VPN endpoint enable restricting client traffic to only the ports and destinations required for their role.

        **Risk mitigation**

        - **Least privilege access:** Limits VPN client traffic to only authorized destinations and ports.
        - **Credential compromise mitigation:** Reduces the blast radius if VPN credentials are stolen.
        - **Network segmentation:** Enforces network boundaries between VPN clients and sensitive infrastructure.
      remediation:
        - id: console
          desc: |
            To ensure Client VPN endpoints have security groups using the AWS Console:

            1. Navigate to the **VPC Console** and select **Client VPN endpoints**.
            2. Select the endpoint to update.
            3. Choose the **Security groups** tab.
            4. Select **Apply security groups** and attach security groups that restrict access to only required destinations.
            5. Save the changes.
        - id: cli
          desc: |
            To ensure Client VPN endpoints have security groups using the AWS CLI, check current settings:

            ```bash
            aws ec2 describe-client-vpn-endpoints \
              --query "ClientVpnEndpoints[].{Id:ClientVpnEndpointId,SGs:SecurityGroupIds}"
            ```

            Apply security groups to the endpoint:

            ```bash
            aws ec2 modify-client-vpn-endpoint \
              --client-vpn-endpoint-id <endpoint-id> \
              --security-group-ids <security-group-id>
            ```
        - id: terraform
          desc: |
            To ensure Client VPN endpoints have security groups in Terraform:

            ```hcl
            resource "aws_ec2_client_vpn_endpoint" "example" {
              server_certificate_arn = aws_acm_certificate.example.arn
              client_cidr_block      = "10.0.0.0/22"
              security_group_ids     = [aws_security_group.vpn_sg.id]
              vpc_id                 = aws_vpc.main.id

              authentication_options {
                type                       = "certificate-authentication"
                root_certificate_chain_arn = aws_acm_certificate.root.arn
              }

              connection_log_options {
                enabled = true
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure Client VPN endpoints have security groups in CloudFormation:

            ```yaml
            Resources:
              ClientVPN:
                Type: AWS::EC2::ClientVpnEndpoint
                Properties:
                  ServerCertificateArn: !Ref ServerCert
                  ClientCidrBlock: 10.0.0.0/22
                  SecurityGroupIds:
                    - !Ref VPNSecurityGroup
                  VpcId: !Ref MainVPC
                  AuthenticationOptions:
                    - Type: certificate-authentication
                      MutualAuthentication:
                        ClientRootCertificateChainArn: !Ref RootCert
                  ConnectionLogOptions:
                    Enabled: true
            ```
    refs:
      - url: https://docs.aws.amazon.com/vpn/latest/clientvpn-admin/cvpn-working-security-groups.html
        title: AWS Documentation - Security groups for Client VPN
  - uid: mondoo-aws-security-client-vpn-security-groups-aws
    filters: asset.platform == "aws"
    mql: |
      aws.ec2.clientVpnEndpoints.all(
        securityGroups.length > 0
      )
  - uid: mondoo-aws-security-client-vpn-security-groups-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_ec2_client_vpn_endpoint")
    mql: |
      terraform.resources.where(nameLabel == "aws_ec2_client_vpn_endpoint").all(
        arguments.security_group_ids != null && arguments.security_group_ids.length > 0
      )
  - uid: mondoo-aws-security-client-vpn-security-groups-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_ec2_client_vpn_endpoint")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_ec2_client_vpn_endpoint").all(
        change.after["security_group_ids"] != null && change.after["security_group_ids"].length > 0
      )
  - uid: mondoo-aws-security-client-vpn-security-groups-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_ec2_client_vpn_endpoint")
    mql: |
      terraform.state.resources.where(type == "aws_ec2_client_vpn_endpoint").all(
        values["security_group_ids"] != null && values["security_group_ids"].length > 0
      )
  - uid: mondoo-aws-security-prefix-list-no-broad-cidrs
    title: Ensure managed prefix lists do not contain overly broad CIDRs
    impact: 70
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-1-1
    variants:
      - uid: mondoo-aws-security-prefix-list-no-broad-cidrs-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-prefix-list-no-broad-cidrs-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-prefix-list-no-broad-cidrs-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-prefix-list-no-broad-cidrs-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that customer-managed prefix lists do not contain overly broad CIDR ranges such as `0.0.0.0/0` or `::/0`. Prefix lists are referenced in security group rules and route tables; a broad CIDR in a prefix list effectively opens access to the entire internet, defeating the purpose of network segmentation.

        **Why this matters**

        - Managed prefix lists are reusable across multiple security groups and route tables. A single overly broad entry can cascade into unrestricted access across the entire VPC.
        - Security teams reviewing individual security group rules may not notice that a referenced prefix list contains `0.0.0.0/0`, creating a hidden gap in network controls.
        - Prefix lists are designed to centralize and simplify IP allowlists. Broad CIDRs undermine this purpose and should be replaced with specific IP ranges.

        **Risk mitigation**

        - **Network segmentation:** Ensures prefix lists enforce meaningful IP restrictions rather than allowing all traffic.
        - **Hidden exposure prevention:** Prevents broad access rules from being obscured behind prefix list references.
        - **Cascading risk reduction:** A single prefix list fix can tighten access across all security groups and route tables that reference it.
      remediation:
        - id: console
          desc: |
            To ensure managed prefix lists do not contain overly broad CIDRs using the AWS Console:

            1. Navigate to the **VPC Console** and select **Managed prefix lists**.
            2. Select each customer-managed prefix list and review its entries.
            3. Remove any entries with `0.0.0.0/0` or `::/0`.
            4. Replace them with specific CIDR ranges that match your intended access patterns.
        - id: cli
          desc: |
            To ensure managed prefix lists do not contain overly broad CIDRs using the AWS CLI, list all customer-managed prefix lists:

            ```bash
            aws ec2 describe-managed-prefix-lists \
              --filters "Name=owner-id,Values=self" \
              --query "PrefixLists[].PrefixListId"
            ```

            Check entries for broad CIDRs:

            ```bash
            aws ec2 get-managed-prefix-list-entries --prefix-list-id <prefix-list-id> \
              --query "Entries[?Cidr=='0.0.0.0/0' || Cidr=='::/0']"
            ```

            Remove the broad entry:

            ```bash
            aws ec2 modify-managed-prefix-list --prefix-list-id <prefix-list-id> \
              --current-version <version> \
              --remove-entries "Cidr=0.0.0.0/0"
            ```
        - id: terraform
          desc: |
            To ensure managed prefix lists do not contain overly broad CIDRs in Terraform, review prefix list entries and replace broad CIDRs with specific ranges:

            ```hcl
            resource "aws_ec2_managed_prefix_list" "example" {
              name           = "allowed-ips"
              address_family = "IPv4"
              max_entries    = 5

              entry {
                cidr        = "10.0.0.0/8"
                description = "Internal network"
              }

              entry {
                cidr        = "203.0.113.0/24"
                description = "Office IP range"
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure managed prefix lists do not contain overly broad CIDRs in CloudFormation:

            ```yaml
            Resources:
              AllowedIPs:
                Type: AWS::EC2::PrefixList
                Properties:
                  PrefixListName: allowed-ips
                  AddressFamily: IPv4
                  MaxEntries: 5
                  Entries:
                    - Cidr: 10.0.0.0/8
                      Description: Internal network
                    - Cidr: 203.0.113.0/24
                      Description: Office IP range
            ```
    refs:
      - url: https://docs.aws.amazon.com/vpc/latest/userguide/managed-prefix-lists.html
        title: AWS Documentation - Managed prefix lists
  - uid: mondoo-aws-security-prefix-list-no-broad-cidrs-aws
    filters: asset.platform == "aws"
    mql: |
      aws.ec2.managedPrefixLists.where(ownerId != "AWS").all(
        entries.none(cidr == "0.0.0.0/0") &&
        entries.none(cidr == "::/0")
      )
  - uid: mondoo-aws-security-prefix-list-no-broad-cidrs-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_ec2_managed_prefix_list")
    mql: |
      terraform.resources.where(nameLabel == "aws_ec2_managed_prefix_list").all(
        blocks.where(type == "entry").all(
          arguments.cidr != "0.0.0.0/0" && arguments.cidr != "::/0"
        )
      )
  - uid: mondoo-aws-security-prefix-list-no-broad-cidrs-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_ec2_managed_prefix_list")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_ec2_managed_prefix_list").all(
        change.after["entry"] == null || change.after["entry"].all(
          _["cidr"] != "0.0.0.0/0" && _["cidr"] != "::/0"
        )
      )
  - uid: mondoo-aws-security-prefix-list-no-broad-cidrs-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_ec2_managed_prefix_list")
    mql: |
      terraform.state.resources.where(type == "aws_ec2_managed_prefix_list").all(
        values["entry"] == null || values["entry"].all(
          _["cidr"] != "0.0.0.0/0" && _["cidr"] != "::/0"
        )
      )
  - uid: mondoo-aws-security-ssm-document-not-public
    title: Ensure SSM documents are not publicly shared
    impact: 90
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-1-1
    variants:
      - uid: mondoo-aws-security-ssm-document-not-public-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-ssm-document-not-public-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ssm-document-not-public-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ssm-document-not-public-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that AWS Systems Manager (SSM) documents owned by the account are not shared publicly. SSM documents define automation runbooks, commands, and policies that may contain sensitive operational logic, internal infrastructure details, or references to internal resources.

        **Why this matters**

        - A publicly shared SSM document is visible to all AWS accounts. Any account can view the document content, which may reveal internal IP ranges, resource names, credentials references, or security configurations.
        - Automation documents often contain step-by-step operational procedures that could be used to understand and exploit your infrastructure.
        - Command documents may reference internal endpoints, database connection strings, or privileged operations that should not be exposed externally.
        - Public sharing is rarely intentional and typically results from misconfigured permissions.

        **Risk mitigation**

        - **Information disclosure prevention:** Restricts visibility of internal automation logic to authorized accounts only.
        - **Attack surface reduction:** Prevents adversaries from studying your operational procedures to plan targeted attacks.
        - **Least-privilege enforcement:** Ensures document access follows organizational boundaries rather than being open to the world.
      remediation:
        - id: console
          desc: |
            To restrict SSM document sharing using the AWS Console:

            1. Navigate to **AWS Systems Manager** > **Documents** > **Owned by me**.
            2. Select the document that is publicly shared.
            3. Choose the **Permissions** tab.
            4. Remove `All` from the account sharing list.
            5. Add only the specific account IDs that require access.
        - id: cli
          desc: |
            To restrict SSM document sharing using the AWS CLI, first identify publicly shared documents:

            ```bash
            aws ssm describe-document-permission \
              --name <document-name> --permission-type Share
            ```

            Remove public access:

            ```bash
            aws ssm modify-document-permission \
              --name <document-name> --permission-type Share \
              --account-ids-to-remove All
            ```
        - id: terraform
          desc: |
            To restrict SSM document sharing in Terraform, ensure `aws_ssm_document_permission` resources do not share with all accounts:

            ```hcl
            resource "aws_ssm_document_permission" "example" {
              document_name = aws_ssm_document.example.name
              permission    = "Share"
              account_ids   = ["123456789012"]
            }
            ```
    refs:
      - url: https://docs.aws.amazon.com/systems-manager/latest/userguide/sysman-doc-syntax.html
        title: AWS Documentation - SSM Document sharing
  - uid: mondoo-aws-security-ssm-document-not-public-aws
    filters: asset.platform == "aws"
    mql: |
      aws.ssm.documents.all(
        permissions.none(_['accountIds'].any(_ == "All" || _ == "all"))
      )
  - uid: mondoo-aws-security-ssm-document-not-public-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_ssm_document_permission")
    mql: |
      terraform.resources.where(nameLabel == "aws_ssm_document_permission").all(
        arguments.account_ids.none(_ == "All" || _ == "all")
      )
  - uid: mondoo-aws-security-ssm-document-not-public-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_ssm_document_permission")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_ssm_document_permission").all(
        change.after.account_ids.none(_ == "All" || _ == "all")
      )
  - uid: mondoo-aws-security-ssm-document-not-public-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_ssm_document_permission")
    mql: |
      terraform.state.resources.where(type == "aws_ssm_document_permission").all(
        values.account_ids.none(_ == "All" || _ == "all")
      )
  - uid: mondoo-aws-security-ssm-patch-baseline-reject-action
    title: Ensure SSM patch baselines block rejected patches
    impact: 80
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-tvm-03
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-8
      compliance/nis-2: nis-2-21-2-d
      compliance/nist-csf-1: nist-csf-1-pr-ip-12
      compliance/nist-csf-2: nist-csf-2-pr-ps-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-1
      compliance/pci-dss-4: pcidss-requirement-6-3-3
      compliance/soc2-2017: soc2-control-cc7-1-4
      compliance/vda-isa-5: vda-isa-5-5-2-1
    variants:
      - uid: mondoo-aws-security-ssm-patch-baseline-reject-action-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-ssm-patch-baseline-reject-action-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ssm-patch-baseline-reject-action-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ssm-patch-baseline-reject-action-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ssm-patch-baseline-reject-action-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that custom SSM patch baselines do not use `ALLOW_AS_DEPENDENCY` as the rejected patches action. When this setting is enabled, patches that have been explicitly rejected can still be installed if they are required as a dependency of another patch, effectively undermining the rejection policy.

        **Why this matters**

        - Rejected patches are typically rejected because they introduce known vulnerabilities, break compatibility, or have not passed security review. Allowing them to be installed as dependencies defeats the purpose of the rejection list.
        - An attacker who identifies a rejected patch with a known CVE could potentially exploit the vulnerability if the patch was silently installed as a dependency.
        - Compliance frameworks require that patching policies are enforced consistently. A patch baseline that allows rejected patches as dependencies is not consistently enforcing its policy.

        **Risk mitigation**

        - **Vulnerability prevention:** Ensures that patches with known issues are never installed, even as transitive dependencies.
        - **Policy enforcement:** Maintains the integrity of the patch rejection list as an absolute block rather than a suggestion.
        - **Compliance assurance:** Demonstrates consistent patch management controls to auditors.
      remediation:
        - id: console
          desc: |
            To update the rejected patches action using the AWS Console:

            1. Navigate to **AWS Systems Manager** > **Patch Manager** > **Patch baselines**.
            2. Select the custom patch baseline.
            3. Choose **Actions** > **Modify patch baseline**.
            4. Under **Patch exceptions**, set **Rejected patches action** to **Block**.
            5. Save the changes.
        - id: cli
          desc: |
            To update the rejected patches action using the AWS CLI, first identify baselines with the permissive setting:

            ```bash
            aws ssm get-patch-baseline --baseline-id <baseline-id> \
              --query "RejectedPatchesAction"
            ```

            Update to block rejected patches:

            ```bash
            aws ssm update-patch-baseline --baseline-id <baseline-id> \
              --rejected-patches-action BLOCK
            ```
        - id: terraform
          desc: |
            To ensure patch baselines block rejected patches in Terraform:

            ```hcl
            resource "aws_ssm_patch_baseline" "example" {
              name             = "example-baseline"
              operating_system = "AMAZON_LINUX_2"

              rejected_patches        = ["KB123456"]
              rejected_patches_action = "BLOCK"
            }
            ```
        - id: cloudformation
          desc: |
            To ensure patch baselines block rejected patches in CloudFormation:

            ```yaml
            Resources:
              PatchBaseline:
                Type: AWS::SSM::PatchBaseline
                Properties:
                  Name: example-baseline
                  OperatingSystem: AMAZON_LINUX_2
                  RejectedPatches:
                    - KB123456
                  RejectedPatchesAction: BLOCK
            ```
    refs:
      - url: https://docs.aws.amazon.com/systems-manager/latest/userguide/patch-manager-approved-rejected-package-name-formats.html
        title: AWS Documentation - Patch baselines
