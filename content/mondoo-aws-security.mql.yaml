      )
  - uid: mondoo-aws-security-memorydb-cluster-auto-minor-version-upgrade
    title: Ensure MemoryDB clusters have automatic minor version upgrades enabled
    impact: 60
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-tvm-03
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-8
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-12
      compliance/nist-csf-2: nist-csf-2-pr-ps-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-1
      compliance/pci-dss-4: pcidss-requirement-6-3-3
      compliance/soc2-2017: soc2-control-cc7-1-1
      compliance/vda-isa-5: vda-isa-5-5-2-1
    variants:
      - uid: mondoo-aws-security-memorydb-cluster-auto-minor-version-upgrade-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-memorydb-cluster-auto-minor-version-upgrade-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-memorydb-cluster-auto-minor-version-upgrade-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-memorydb-cluster-auto-minor-version-upgrade-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-memorydb-cluster-auto-minor-version-upgrade-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon MemoryDB clusters have automatic minor version upgrades enabled. When enabled, clusters automatically receive minor engine version upgrades during the maintenance window, ensuring security patches and bug fixes are applied promptly.

        **Why this matters**

        - Minor version upgrades typically include security patches that address known vulnerabilities in the Redis engine.
        - Without automatic upgrades, clusters may run outdated engine versions with known security vulnerabilities for extended periods.
        - Manual upgrade processes introduce delays between patch availability and application, increasing the window of exposure.
        - Keeping database engines up to date is a fundamental requirement for compliance with security frameworks that mandate timely patch management.

        **Risk mitigation**

        - **Patch management:** Ensures security patches are applied automatically during the next maintenance window.
        - **Vulnerability reduction:** Minimizes the time window during which known vulnerabilities remain unpatched.
        - **Compliance:** Meets requirements for timely application of security updates in managed database services.
      remediation:
        - id: console
          desc: |
            To ensure MemoryDB clusters have automatic minor version upgrades enabled using the AWS Console:

            1. Navigate to the **Amazon MemoryDB Console** and select **Clusters**.
            2. Select the cluster to modify.
            3. Choose **Modify**.
            4. Enable **Auto minor version upgrade**.
            5. Choose **Modify cluster**.
        - id: cli
          desc: |
            To ensure MemoryDB clusters have automatic minor version upgrades enabled using the AWS CLI, note that `update-cluster` does not support changing the auto minor version upgrade setting. You must create a new cluster with the flag enabled:

            ```bash
            aws memorydb create-cluster \
              --cluster-name <cluster-name> \
              --node-type <node-type> \
              --acl-name <acl-name> \
              --auto-minor-version-upgrade
            ```

            Verify the setting:

            ```bash
            aws memorydb describe-clusters \
              --query "Clusters[*].{Name:Name,AutoUpgrade:AutoMinorVersionUpgrade}"
            ```
        - id: terraform
          desc: |
            To ensure MemoryDB clusters have automatic minor version upgrades enabled in Terraform, enable automatic minor version upgrades:

            ```hcl
            resource "aws_memorydb_cluster" "example" {
              name                       = "example-cluster"
              node_type                  = "db.r6g.large"
              acl_name                   = "my-acl"
              auto_minor_version_upgrade = true
            }
            ```
        - id: cloudformation
          desc: |
            To ensure MemoryDB clusters have automatic minor version upgrades enabled in CloudFormation, set `AutoMinorVersionUpgrade` to `true`:

            ```yaml
            Resources:
              MemoryDBCluster:
                Type: AWS::MemoryDB::Cluster
                Properties:
                  ClusterName: example-cluster
                  NodeType: db.r6g.large
                  ACLName: my-acl
                  AutoMinorVersionUpgrade: true
            ```
    refs:
      - url: https://docs.aws.amazon.com/memorydb/latest/devguide/engine-versions.html
        title: MemoryDB engine versions
  - uid: mondoo-aws-security-memorydb-cluster-auto-minor-version-upgrade-aws
    filters: asset.platform == "aws"
    mql: aws.memorydb.clusters.all(autoMinorVersionUpgrade == true)
  - uid: mondoo-aws-security-memorydb-cluster-auto-minor-version-upgrade-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_memorydb_cluster")
    mql: |
      terraform.resources.where(nameLabel == "aws_memorydb_cluster").all(
      arguments.auto_minor_version_upgrade == true
      )
  - uid: mondoo-aws-security-memorydb-cluster-auto-minor-version-upgrade-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_memorydb_cluster")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_memorydb_cluster").all(
      change.after.auto_minor_version_upgrade == true
      )
  - uid: mondoo-aws-security-memorydb-cluster-auto-minor-version-upgrade-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_memorydb_cluster")
    mql: |
      terraform.state.resources.where(type == "aws_memorydb_cluster").all(
      values.auto_minor_version_upgrade == true
      )
  - uid: mondoo-aws-security-memorydb-cluster-auto-minor-version-upgrade-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::MemoryDB::Cluster")
    mql: |
      cloudformation.template.resources.where(type == "AWS::MemoryDB::Cluster").all(
      properties['AutoMinorVersionUpgrade'] == true
      )
  - uid: mondoo-aws-security-kinesis-stream-encrypted
    title: Ensure Kinesis data streams have server-side encryption enabled
    impact: 80
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-aws-security-kinesis-stream-encrypted-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-kinesis-stream-encrypted-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-kinesis-stream-encrypted-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-kinesis-stream-encrypted-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-kinesis-stream-encrypted-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon Kinesis data streams have server-side encryption enabled. Without encryption, data records stored in the stream are unencrypted, exposing sensitive streaming data to unauthorized access if the underlying storage is compromised.

        **Why this matters**

        - Kinesis data streams often carry sensitive data such as application logs, clickstream data, financial transactions, and IoT telemetry that must be protected at rest.
        - By default, Kinesis data streams do not have server-side encryption enabled, leaving all data records stored unencrypted.
        - Without encryption, anyone with access to the underlying storage infrastructure could read the raw data records.
        - Encryption at rest is a requirement for compliance with security frameworks including PCI DSS, HIPAA, and SOC 2.

        **Risk mitigation**

        - **Data protection:** Ensures all data records in the stream are encrypted at rest using AWS KMS.
        - **Compliance:** Meets regulatory requirements for encryption of data at rest in streaming services.
        - **Defense in depth:** Adds a layer of protection beyond IAM access controls.
      remediation:
        - id: console
          desc: |
            To ensure Kinesis data streams have server-side encryption enabled using the AWS Console:

            1. Navigate to the **Amazon Kinesis Console** and select **Data streams**.
            2. Select the stream to modify.
            3. Under the **Configuration** tab, choose **Edit** next to **Server-side encryption**.
            4. Enable **Server-side encryption**.
            5. Choose a KMS key (AWS managed or customer-managed).
            6. Choose **Save changes**.
        - id: cli
          desc: |
            To ensure Kinesis data streams have server-side encryption enabled using the AWS CLI, enable server-side encryption on a Kinesis data stream:

            ```bash
            aws kinesis start-stream-encryption \
              --stream-name <stream-name> \
              --encryption-type KMS \
              --key-id alias/aws/kinesis
            ```

            Verify encryption status:

            ```bash
            aws kinesis describe-stream-summary --stream-name <stream-name> \
              --query "StreamDescriptionSummary.{Name:StreamName,Encryption:EncryptionType,KeyId:KeyId}"
            ```
        - id: terraform
          desc: |
            To ensure Kinesis data streams have server-side encryption enabled in Terraform, enable server-side encryption on a Kinesis stream:

            ```hcl
            resource "aws_kinesis_stream" "example" {
              name            = "example-stream"
              shard_count     = 1
              encryption_type = "KMS"
              kms_key_id      = "alias/aws/kinesis"
            }
            ```
        - id: cloudformation
          desc: |
            To ensure Kinesis data streams have server-side encryption enabled in CloudFormation, configure `StreamEncryption`:

            ```yaml
            Resources:
              KinesisStream:
                Type: AWS::Kinesis::Stream
                Properties:
                  Name: example-stream
                  ShardCount: 1
                  StreamEncryption:
                    EncryptionType: KMS
                    KeyId: alias/aws/kinesis
            ```
    refs:
      - url: https://docs.aws.amazon.com/streams/latest/dev/what-is-sse.html
        title: Data protection in Amazon Kinesis Data Streams
  - uid: mondoo-aws-security-kinesis-stream-encrypted-aws
    filters: asset.platform == "aws"
    mql: aws.kinesis.streams.all(encryptionType == "KMS")
  - uid: mondoo-aws-security-kinesis-stream-encrypted-terraform-hcl
