        - id: cloudformation
          desc: |
            To ensure AWS Glue security configurations encrypt job bookmarks in CloudFormation:

            ```yaml
            Resources:
              GlueSecurityConfiguration:
                Type: AWS::Glue::SecurityConfiguration
                Properties:
