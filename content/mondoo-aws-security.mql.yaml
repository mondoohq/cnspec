      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-1-2
      compliance/vda-isa-5: vda-isa-5-5-2-4
    variants:
      - uid: mondoo-aws-security-iam-access-analyzer-enabled-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-iam-access-analyzer-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-iam-access-analyzer-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-iam-access-analyzer-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-iam-access-analyzer-enabled-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that IAM Access Analyzer is enabled with at least one active analyzer. Access Analyzer identifies resources shared with external entities, detecting unintended public or cross-account access.

        **Why this matters**

        - Without Access Analyzer, unintended external access to S3 buckets, IAM roles, KMS keys, and other resources may go undetected.
        - CIS AWS Foundations Benchmark 1.20 recommends enabling IAM Access Analyzer.
        - AWS Security Hub control IAM.8 requires Access Analyzer to be configured.

        **Risk mitigation**

        - **Access monitoring:** Continuously monitors resource policies for external access.
        - **Policy validation:** Validates IAM policies against security best practices.
        - **Compliance:** Meets CIS and Security Hub requirements for access analysis.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and navigate to the IAM service.
        2. In the left navigation pane, under **Access reports**, select **Access Analyzer**.
        3. Verify that at least one analyzer is listed with a status of **Active**.
        4. Repeat this check in each AWS Region.

        A passing account shows at least one Access Analyzer with status **Active**. A failing account shows no analyzers, or all analyzers in a non-active state.

        ### Audit via CLI

        1. List all Access Analyzers in the current region and check their status:

        ```bash
        aws accessanalyzer list-analyzers \
          --query 'analyzers[*].{Name:name,Status:status}' \
          --output table
        ```

        A passing account returns at least one analyzer with `Status: ACTIVE`. A failing account returns an empty list or only analyzers with a status other than `ACTIVE`.

      remediation:
        - id: console
          desc: |
            To ensure IAM Access Analyzer is enabled using the AWS Console:

            1. Navigate to the IAM Console.
            2. Under Access reports, select Access Analyzer.
            3. Choose Create analyzer.
            4. Enter a name and select the zone of trust.
            5. Choose Create analyzer.
        - id: cli
          desc: |
            To ensure IAM Access Analyzer is enabled using the AWS CLI:

            ```bash
            aws accessanalyzer create-analyzer \
              --analyzer-name account-analyzer \
              --type ACCOUNT
            ```
        - id: terraform
          desc: |
            To ensure IAM Access Analyzer is enabled in Terraform:

            ```hcl
            resource "aws_accessanalyzer_analyzer" "account" {
              analyzer_name = "account-analyzer"
              type          = "ACCOUNT"
            }
            ```
        - id: cloudformation
          desc: |
            To ensure IAM Access Analyzer is enabled in CloudFormation:

            ```yaml
            Resources:
              AccessAnalyzer:
                Type: AWS::AccessAnalyzer::Analyzer
                Properties:
                  AnalyzerName: account-analyzer
                  Type: ACCOUNT
            ```
    refs:
      - url: https://docs.aws.amazon.com/IAM/latest/UserGuide/what-is-access-analyzer.html
        title: AWS Documentation - What is IAM Access Analyzer?
  - uid: mondoo-aws-security-iam-access-analyzer-enabled-aws
