    mql: |
      terraform.state.resources.where(type == "aws_ec2_image_block_public_access").all(
        values["state"] == "block-new-sharing"
      )
  - uid: mondoo-aws-security-ec2-launch-template-imdsv2
    title: Ensure EC2 launch templates require IMDSv2
    impact: 80
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-1-3
    variants:
      - uid: mondoo-aws-security-ec2-launch-template-imdsv2-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-ec2-launch-template-imdsv2-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ec2-launch-template-imdsv2-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ec2-launch-template-imdsv2-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ec2-launch-template-imdsv2-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that EC2 launch templates are configured to require Instance Metadata Service Version 2 (IMDSv2). IMDSv2 uses session-oriented authentication that requires a PUT request to obtain a token before metadata can be accessed, preventing SSRF attacks from extracting instance credentials.

        **Why this matters**

        - IMDSv1 allows unauthenticated GET requests to retrieve instance metadata, including IAM role credentials.
        - SSRF vulnerabilities in applications running on EC2 instances can be exploited to steal IAM credentials via IMDSv1.
        - Launch templates define the configuration for new instances, so enforcing IMDSv2 in templates ensures all new instances are protected.
        - IMDSv2 is recommended by AWS and required by CIS AWS Foundations Benchmark.
      remediation:
        - id: console
          desc: |
            To require IMDSv2 in EC2 launch templates using the AWS Console:

            1. Navigate to the **EC2 Dashboard > Launch Templates**.
            2. Select the launch template and choose **Modify template (Create new version)**.
            3. Under **Advanced details > Metadata accessible**, set to **Enabled**.
            4. Set **Metadata version** to **V2 only (token required)**.
            5. Set **Metadata response hop limit** to **1** (recommended).
            6. Create the new template version and set it as the default.
        - id: cli
          desc: |
            To require IMDSv2 in EC2 launch templates using the AWS CLI:

            ```bash
            aws ec2 create-launch-template-version \
              --launch-template-id lt-XXXXX \
              --source-version '$Default' \
              --launch-template-data '{"MetadataOptions":{"HttpTokens":"required","HttpEndpoint":"enabled","HttpPutResponseHopLimit":1}}'
            ```
        - id: terraform
          desc: |
            To require IMDSv2 in EC2 launch templates using Terraform:

            ```hcl
            resource "aws_launch_template" "example" {
              name = "example"

              metadata_options {
                http_tokens                 = "required"
                http_endpoint               = "enabled"
                http_put_response_hop_limit = 1
              }
            }
            ```
        - id: cloudformation
          desc: |
            Set `LaunchTemplateData.MetadataOptions.HttpTokens: required` on every `AWS::EC2::LaunchTemplate` so launched instances enforce IMDSv2 from boot:

            ```yaml
            Resources:
              LaunchTemplate:
                Type: AWS::EC2::LaunchTemplate
                Properties:
                  LaunchTemplateName: hardened
                  LaunchTemplateData:
                    ImageId: !Ref AmiId
                    InstanceType: t3.small
                    MetadataOptions:
                      HttpTokens: required
                      HttpPutResponseHopLimit: 2
                      HttpEndpoint: enabled
            ```
    refs:
      - url: https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/configuring-instance-metadata-service.html
        title: Configure the instance metadata service
  - uid: mondoo-aws-security-ec2-launch-template-imdsv2-aws
    filters: asset.platform == "aws"
    mql: |
      aws.ec2.launchTemplates.all(
        metadataOptions['HttpTokens'] == "required"
      )
  - uid: mondoo-aws-security-ec2-launch-template-imdsv2-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_launch_template")
    mql: |
      terraform.resources.where(nameLabel == "aws_launch_template").all(
        blocks.where(type == "metadata_options").any(
          arguments.http_tokens == "required"
        )
      )
  - uid: mondoo-aws-security-ec2-launch-template-imdsv2-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_launch_template")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_launch_template").all(
        change.after["metadata_options"] != null && change.after["metadata_options"].any(
          _["http_tokens"] == "required"
        )
      )
  - uid: mondoo-aws-security-ec2-launch-template-imdsv2-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_launch_template")
    mql: |
      terraform.state.resources.where(type == "aws_launch_template").all(
        values["metadata_options"] != null && values["metadata_options"].any(
          _["http_tokens"] == "required"
        )
      )
  - uid: mondoo-aws-security-ec2-launch-template-imdsv2-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::EC2::LaunchTemplate")
    mql: |
      cloudformation.template.resources.where(type == "AWS::EC2::LaunchTemplate").all(
        properties['LaunchTemplateData'] != null &&
        properties['LaunchTemplateData']['MetadataOptions'] != null &&
        properties['LaunchTemplateData']['MetadataOptions']['HttpTokens'] == "required"
      )
  - uid: mondoo-aws-security-s3-ownership-controls-enforced
    title: Ensure S3 buckets enforce bucket owner ownership
    impact: 70
    tags:
