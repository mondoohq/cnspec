      )
  - uid: mondoo-aws-security-identitycenter-group-assignments-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_ssoadmin_account_assignment")
    mql: |
      terraform.state.resources.where(type == "aws_ssoadmin_account_assignment").all(
        values["principal_type"] == "GROUP"
      )
  - uid: mondoo-aws-security-secretsmanager-no-public-policy
    title: Ensure Secrets Manager secrets do not have public policies
    impact: 90
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-5
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/vda-isa-5: vda-isa-5-4-2-1
    variants:
      - uid: mondoo-aws-security-secretsmanager-no-public-policy-aws
        tags:
          mondoo.com/filter-title: AWS Secretsmanager Secret
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-secretsmanager-no-public-policy-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-secretsmanager-no-public-policy-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-secretsmanager-no-public-policy-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-secretsmanager-no-public-policy-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that AWS Secrets Manager secrets do not have resource policies that grant public access. A resource policy with a wildcard principal ("*") in an Allow statement without conditions effectively makes the secret accessible to any AWS account.

        **Why this matters**

        - Secrets Manager resource policies with wildcard principals can expose sensitive credentials to unauthorized parties.
        - Unlike S3 bucket policies, Secrets Manager does not have a public access block feature, making policy review the primary control.
        - A compromised secret can lead to cascading security breaches across dependent services.
        - NIST SP 800-53 AC-6 requires least-privilege access to sensitive information.

        **Risk mitigation**

        - **Least privilege:** Ensure resource policies grant access only to specific, authorized principals.
        - **Secret protection:** Prevents unauthorized access to sensitive credentials and configuration data.
        - **Blast radius reduction:** Restricting access limits the impact of policy misconfigurations.
      audit: |
        ### Audit via Console

        1. Navigate to the **AWS Secrets Manager Console**.
        2. Select each secret from the list.
        3. Under **Resource permissions**, review the resource policy JSON.
        4. Check all `Allow` statements for a `Principal` value of `"*"` or `{"AWS": "*"}`.

        A passing secret has no resource policy or has a policy with all `Allow` statements scoped to specific AWS principals. A failing secret has a policy with at least one `Allow` statement whose `Principal` is `"*"` or `{"AWS": "*"}`.

        ### Audit via CLI

        1. List all secrets, then retrieve and inspect each resource policy:

        ```bash
        aws secretsmanager list-secrets \
          --query 'SecretList[*].ARN' --output text | \
          tr '\t' '\n' | \
          xargs -I {} aws secretsmanager get-resource-policy \
            --secret-id {} \
            --query '{SecretId:ARN,Policy:ResourcePolicy}'
        ```

        A passing secret returns no `ResourcePolicy` or returns a policy that contains no `Allow` statements with `"Principal": "*"` or `"Principal": {"AWS": "*"}`. A failing secret returns a policy with a wildcard principal in an Allow statement.

      remediation:
        - id: console
          desc: |
            To ensure Secrets Manager secrets do not have public policies using the AWS Console:

            1. Navigate to the **AWS Secrets Manager Console**.
            2. Select the secret.
            3. Under **Resource permissions**, review the resource policy.
            4. Remove any statements with a wildcard (*) principal.
            5. Replace with specific AWS account IDs, IAM role ARNs, or organizational unit paths.
            6. Choose **Save**.
        - id: cli
          desc: |
            To review and update Secrets Manager resource policies using the AWS CLI:

            ```bash
            aws secretsmanager get-resource-policy \
              --secret-id <secret-name-or-arn>
            ```

            To block public access when setting a resource policy:

            ```bash
            aws secretsmanager put-resource-policy \
              --secret-id <secret-name-or-arn> \
              --resource-policy file://policy.json \
              --block-public-policy
            ```

            To remove a public resource policy entirely:

            ```bash
            aws secretsmanager delete-resource-policy \
              --secret-id <secret-name-or-arn>
            ```
        - id: terraform
          desc: |
            To ensure Secrets Manager secrets do not have public policies in Terraform:

            ```hcl
            resource "aws_secretsmanager_secret_policy" "example" {
              secret_arn = aws_secretsmanager_secret.example.arn
              policy = jsonencode({
                Version = "2012-10-17"
                Statement = [
                  {
                    Sid       = "AllowSpecificAccount"
                    Effect    = "Allow"
                    Principal = { AWS = "arn:aws:iam::123456789012:root" }
                    Action    = "secretsmanager:GetSecretValue"
                    Resource  = "*"
                  }
                ]
              })
              block_public_policy = true
            }
            ```
        - id: cloudformation
          desc: |
            Scope every `Allow` statement in an `AWS::SecretsManager::ResourcePolicy` to a specific account, role, or service principal. Never use `"*"` or `{"AWS": "*"}`:

            ```yaml
            Resources:
              SecretAccessPolicy:
                Type: AWS::SecretsManager::ResourcePolicy
                Properties:
                  SecretId: !Ref MySecret
                  ResourcePolicy:
                    Version: "2012-10-17"
                    Statement:
                      - Effect: Allow
                        Principal:
                          AWS: arn:aws:iam::111122223333:role/AppRole
                        Action: secretsmanager:GetSecretValue
                        Resource: "*"
            ```
    refs:
      - url: https://docs.aws.amazon.com/secretsmanager/latest/userguide/auth-and-access_resource-based-policies.html
        title: AWS Documentation - Resource-based policies for Secrets Manager
  - uid: mondoo-aws-security-secretsmanager-no-public-policy-aws
    filters: asset.platform == "aws-secretsmanager-secret"
    mql: |
      if (aws.secretsmanager.secret.resourcePolicy != "" && aws.secretsmanager.secret.resourcePolicy != empty) {
        aws.secretsmanager.secret.resourcePolicy != /"Effect"\s*:\s*"Allow"[\s\S]*?"Principal"\s*:\s*"\*"/
        aws.secretsmanager.secret.resourcePolicy != /"Effect"\s*:\s*"Allow"[\s\S]*?"Principal"\s*:\s*\{\s*"AWS"\s*:\s*"\*"\s*\}/
      }
  - uid: mondoo-aws-security-secretsmanager-no-public-policy-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_secretsmanager_secret_policy")
    mql: |
      terraform.resources.where(nameLabel == "aws_secretsmanager_secret_policy").all(
        arguments.policy["Statement"].where(_["Effect"] == "Allow").none(
          _["Principal"] == "*" || _["Principal"]["AWS"] == "*"
        )
      )
  - uid: mondoo-aws-security-secretsmanager-no-public-policy-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_secretsmanager_secret_policy")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_secretsmanager_secret_policy").all(
        change.after["policy"]["Statement"].where(_["Effect"] == "Allow").none(
          _["Principal"] == "*" || _["Principal"]["AWS"] == "*"
        )
      )
  - uid: mondoo-aws-security-secretsmanager-no-public-policy-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_secretsmanager_secret_policy")
    mql: |
      terraform.state.resources.where(type == "aws_secretsmanager_secret_policy").all(
        values["policy"]["Statement"].where(_["Effect"] == "Allow").none(
          _["Principal"] == "*" || _["Principal"]["AWS"] == "*"
        )
      )
  - uid: mondoo-aws-security-secretsmanager-no-public-policy-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::SecretsManager::ResourcePolicy")
    mql: |
      cloudformation.template.resources.where(type == "AWS::SecretsManager::ResourcePolicy").all(
        properties['ResourcePolicy'] == null ||
        properties['ResourcePolicy']['Statement'] == null ||
        properties['ResourcePolicy']['Statement'].where(_['Effect'] == "Allow").none(
          _['Principal'] == "*" ||
          _['Principal']['AWS'] == "*" ||
          _['Principal']['AWS'] != null && _['Principal']['AWS'].contains("*")
        )
      )
  - uid: mondoo-aws-security-ec2-serial-console-disabled
    title: Ensure EC2 serial console access is disabled
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-2
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-2-2-4
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-aws-security-ec2-serial-console-disabled-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-ec2-serial-console-disabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ec2-serial-console-disabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ec2-serial-console-disabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that EC2 serial console access is disabled across all AWS regions. The EC2 serial console provides text-based access to an instance's serial port and is intended for emergency troubleshooting of boot or networking failures. By default in newly created accounts the feature may be enabled, creating an additional access path that bypasses normal SSH key and network controls.

        **Why this matters**

        - **Access control bypass:** Serial console access does not require network connectivity or SSH keys; an IAM principal with the `ec2-instance-connect:SendSerialConsoleSSHPublicKey` permission can connect to an instance even if all inbound security group rules block traffic.
        - **Persistent access vector:** An attacker who obtains sufficient IAM credentials can use the serial console to maintain access to instances after SSH keys are rotated or security groups are tightened.
        - **Unnecessary attack surface:** The serial console is only needed during active troubleshooting; leaving it enabled permanently adds risk without operational benefit.

        **Risk mitigation**

        - **Attack surface reduction:** Disabling serial console access removes a network-independent instance access path, forcing all interactive access through audited, key-based SSH or AWS Systems Manager Session Manager.
        - **Least-privilege enforcement:** Keeping the feature disabled by default means enabling it requires a deliberate, auditable action, providing a change record for any troubleshooting use.
      audit: |
        ### Audit via Console

        1. Navigate to the **EC2 Dashboard** in the AWS Management Console.
        2. In the left navigation, under **Account attributes**, select **EC2 Serial Console**.
        3. Review the current status for each region.

        A passing region shows EC2 Serial Console access as **Disabled**. A failing region shows it as **Enabled**.

        ### Audit via CLI

        1. Check whether serial console access is enabled in each region:

        ```bash
        aws ec2 get-serial-console-access-status \
          --query 'SerialConsoleAccessEnabled' \
          --output text
        ```

        Repeat for each active region using `--region <region>`. A passing region returns `False`. A failing region returns `True`.

      remediation:
        - id: console
          desc: |
            To disable EC2 serial console access using the AWS Console:

            1. Navigate to the **EC2 Dashboard**.
            2. Under **Account attributes**, select **EC2 Serial Console**.
            3. Select **Manage**.
            4. Uncheck **Allow** to disable serial console access.
            5. Save the changes.
            6. Repeat for each region.
        - id: cli
          desc: |
            To disable EC2 serial console access using the AWS CLI:

            ```bash
            aws ec2 disable-serial-console-access --region REGION
            ```

            Run this command for each active region.
        - id: terraform
          desc: |
            Manage the regional setting with `aws_ec2_serial_console_access` and pin `enabled = false`. Repeat the resource per region using aliased providers:

            ```hcl
            resource "aws_ec2_serial_console_access" "this" {
              enabled = false
            }
            ```
    refs:
      - url: https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/configure-access-to-serial-console.html
        title: Configure access to the EC2 Serial Console
  - uid: mondoo-aws-security-ec2-serial-console-disabled-aws
    filters: asset.platform == "aws"
    mql: |
      aws.ec2.serialConsoleAccessEnabled.length > 0 &&
      aws.ec2.serialConsoleAccessEnabled.values.none(_ == true)
  - uid: mondoo-aws-security-ec2-serial-console-disabled-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_ec2_serial_console_access")
    mql: |
      terraform.resources.where(nameLabel == "aws_ec2_serial_console_access").all(
        arguments.enabled == false
      )
  - uid: mondoo-aws-security-ec2-serial-console-disabled-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_ec2_serial_console_access")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_ec2_serial_console_access").all(
        change.after["enabled"] == false
      )
  - uid: mondoo-aws-security-ec2-serial-console-disabled-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_ec2_serial_console_access")
    mql: |
      terraform.state.resources.where(type == "aws_ec2_serial_console_access").all(
        values["enabled"] == false
      )
  - uid: mondoo-aws-security-ec2-ami-block-public-access
    title: Ensure AMI block public access is enabled
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-5-15
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-2-1
    variants:
      - uid: mondoo-aws-security-ec2-ami-block-public-access-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-ec2-ami-block-public-access-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ec2-ami-block-public-access-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ec2-ami-block-public-access-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that the AMI block public access setting is enabled across all AWS regions. This account-level control prevents any Amazon Machine Image in the account from being made publicly shareable, protecting against accidental exposure of machine images that may contain sensitive configurations, credentials, or proprietary software. By default, this block may not be enabled, allowing individual AMI owners to mark images as public without an account-wide guard.

        **Why this matters**

        - **Secret exposure prevention:** AMIs created from running instances often retain shell history, configuration files, private keys, or hardcoded credentials that should never be exposed outside the account.
        - **Proprietary code protection:** Machine images may contain licensed software, compiled proprietary applications, or internal tooling that must not be distributed to arbitrary AWS accounts.
        - **Preventive control:** Block public access acts at the API layer before a misconfigured share permission can take effect, stopping accidental public exposure at the source.

        **Risk mitigation**

        - **Centralized enforcement:** A single account-level block eliminates the need to audit public-sharing permissions on every individual AMI, reducing the operational burden of maintaining a private image library.
        - **Incident containment:** Even if an automated pipeline or human error attempts to make an AMI public, the block setting rejects the operation before any external exposure can occur.
      audit: |
        ### Audit via Console

        1. Navigate to the **EC2 Dashboard** in the AWS Management Console.
        2. In the left navigation, under **Account attributes**, select **AMI block public access**.
        3. Review the current status for each region.

        A passing region shows AMI block public access as **Enabled** (block new public sharing). A failing region shows it as **Disabled** or **Not configured**.

        ### Audit via CLI

        1. Check the AMI block public access state for the current region:

        ```bash
        aws ec2 get-image-block-public-access-state \
          --query 'ImageBlockPublicAccessState' \
          --output text
        ```

        Repeat for each active region using `--region <region>`. A passing region returns `block-new-sharing`. A failing region returns `unblocked`.

      remediation:
        - id: console
          desc: |
            To enable AMI block public access using the AWS Console:

            1. Navigate to the **EC2 Dashboard**.
            2. Under **Account attributes**, select **AMI block public access**.
            3. Select **Manage**.
            4. Enable **Block new public sharing**.
            5. Save the changes.
            6. Repeat for each region.
        - id: cli
          desc: |
            To enable AMI block public access using the AWS CLI:

            ```bash
            aws ec2 enable-image-block-public-access --image-block-public-access-state block-new-sharing --region REGION
            ```

            Run this command for each active region.
        - id: terraform
          desc: |
            Manage the regional setting with `aws_ec2_image_block_public_access`. Pin `state = "block-new-sharing"` and repeat the resource per region using aliased providers:

            ```hcl
            resource "aws_ec2_image_block_public_access" "this" {
              state = "block-new-sharing"
            }
            ```
    refs:
      - url: https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/sharingamis-intro.html
        title: Block public access for AMIs
  - uid: mondoo-aws-security-ec2-ami-block-public-access-aws
    filters: asset.platform == "aws"
    mql: aws.ec2.imageBlockPublicAccess.values.all(_ == "block-new-sharing")
  - uid: mondoo-aws-security-ec2-ami-block-public-access-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_ec2_image_block_public_access")
    mql: |
      terraform.resources.where(nameLabel == "aws_ec2_image_block_public_access").all(
        arguments.state == "block-new-sharing"
      )
  - uid: mondoo-aws-security-ec2-ami-block-public-access-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_ec2_image_block_public_access")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_ec2_image_block_public_access").all(
        change.after["state"] == "block-new-sharing"
      )
  - uid: mondoo-aws-security-ec2-ami-block-public-access-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_ec2_image_block_public_access")
    mql: |
      terraform.state.resources.where(type == "aws_ec2_image_block_public_access").all(
        values["state"] == "block-new-sharing"
      )
  - uid: mondoo-aws-security-ec2-launch-template-imdsv2
    title: Ensure EC2 launch templates require IMDSv2
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-14
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-1
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-8
      compliance/vda-isa-5: vda-isa-5-4-1-3
    variants:
      - uid: mondoo-aws-security-ec2-launch-template-imdsv2-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-ec2-launch-template-imdsv2-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ec2-launch-template-imdsv2-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ec2-launch-template-imdsv2-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ec2-launch-template-imdsv2-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that EC2 launch templates require IMDSv2 by setting `MetadataOptions.HttpTokens` to `required`. IMDSv1 allows unauthenticated HTTP GET requests to the instance metadata endpoint at `169.254.169.254`, which means any server-side request forgery vulnerability in an application running on the instance can be used to retrieve IAM role credentials. Launch templates define the configuration for new instances, so enforcing IMDSv2 in the template ensures every instance created from it is protected.

        **Why this matters**

        - **SSRF credential theft prevention:** IMDSv2 requires a PUT-based token exchange before metadata can be read, which SSRF payloads typically cannot perform, breaking the most common credential-exfiltration attack chain.
        - **Fleet-wide protection:** Enforcing IMDSv2 in the launch template propagates the protection to every instance created from it, including those launched by Auto Scaling groups and Spot fleets.
        - **Defense against web-layer attacks:** Web application vulnerabilities such as SSRF are frequently exploited to escalate from application compromise to full IAM account access via IMDSv1; IMDSv2 closes this path.

        **Risk mitigation**

        - **Credential isolation:** Preventing unauthenticated metadata access ensures that even a fully compromised web application process cannot retrieve the instance role's AWS credentials without additional exploitation steps.
        - **Hop-limit hardening:** Combining `HttpTokens: required` with `HttpPutResponseHopLimit: 1` prevents containerized workloads from accessing the host's metadata endpoint, further limiting lateral credential access.
      audit: |
        ### Audit via Console

        1. Navigate to the **EC2 Dashboard** and select **Launch Templates** in the left navigation.
        2. For each launch template, choose the template name.
        3. Select the **Default version** tab and review the **Advanced details** section.
        4. Check the **Metadata accessible** and **Metadata version** fields.

        A passing launch template shows **Metadata version** set to **V2 only (token required)**. A failing launch template shows **V1 and V2 (optional)** or has no metadata options configured.

        ### Audit via CLI

        1. List all launch templates and check their metadata options:

        ```bash
        aws ec2 describe-launch-template-versions \
          --versions '$Default' \
          --query 'LaunchTemplateVersions[*].{TemplateId:LaunchTemplateId,TemplateName:LaunchTemplateName,HttpTokens:LaunchTemplateData.MetadataOptions.HttpTokens}' \
          --output table
        ```

        A passing launch template returns `HttpTokens` as `required`. A failing launch template returns `optional` or does not include the `MetadataOptions` field.

      remediation:
        - id: console
          desc: |
            To require IMDSv2 in EC2 launch templates using the AWS Console:

            1. Navigate to the **EC2 Dashboard > Launch Templates**.
            2. Select the launch template and choose **Modify template (Create new version)**.
            3. Under **Advanced details > Metadata accessible**, set to **Enabled**.
            4. Set **Metadata version** to **V2 only (token required)**.
            5. Set **Metadata response hop limit** to **1** (recommended).
            6. Create the new template version and set it as the default.
        - id: cli
          desc: |
            To require IMDSv2 in EC2 launch templates using the AWS CLI:

            ```bash
            aws ec2 create-launch-template-version \
              --launch-template-id lt-XXXXX \
              --source-version '$Default' \
              --launch-template-data '{"MetadataOptions":{"HttpTokens":"required","HttpEndpoint":"enabled","HttpPutResponseHopLimit":1}}'
            ```
        - id: terraform
          desc: |
            To require IMDSv2 in EC2 launch templates using Terraform:

            ```hcl
            resource "aws_launch_template" "example" {
              name = "example"

              metadata_options {
                http_tokens                 = "required"
                http_endpoint               = "enabled"
                http_put_response_hop_limit = 1
              }
            }
            ```
        - id: cloudformation
          desc: |
            Set `LaunchTemplateData.MetadataOptions.HttpTokens: required` on every `AWS::EC2::LaunchTemplate` so launched instances enforce IMDSv2 from boot:

            ```yaml
            Resources:
              LaunchTemplate:
                Type: AWS::EC2::LaunchTemplate
                Properties:
                  LaunchTemplateName: hardened
                  LaunchTemplateData:
                    ImageId: !Ref AmiId
                    InstanceType: t3.small
                    MetadataOptions:
                      HttpTokens: required
                      HttpPutResponseHopLimit: 2
                      HttpEndpoint: enabled
            ```
    refs:
      - url: https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/configuring-instance-metadata-service.html
        title: Configure the instance metadata service
