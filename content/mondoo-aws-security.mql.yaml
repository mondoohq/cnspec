            ```hcl
            resource "aws_ecs_task_definition" "example" {
              family = "example"

              container_definitions = jsonencode([
                {
                  name      = "app"
                  image     = "example:latest"
                  essential = true
                  user      = "1000"  # Non-root user
                }
              ])
            }
            ```
        - id: cloudformation
          desc: |
            **Using CloudFormation**

            ```yaml
            Resources:
              TaskDefinition:
                Type: "AWS::ECS::TaskDefinition"
                Properties:
                  Family: "example"
                  ContainerDefinitions:
                    - Name: "app"
                      Image: "example:latest"
                      Essential: true
                      User: "1000"
            ```
    refs:
