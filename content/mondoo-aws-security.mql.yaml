        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-emr-encryption-at-rest-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon EMR clusters have at-rest encryption enabled through a security configuration. At-rest encryption protects data stored on local disks and in Amazon S3 by EMR clusters, preventing unauthorized access to data at the storage layer.

        **Why this matters**

        - EMR clusters process and store potentially sensitive data on local HDFS volumes and in S3. Without at-rest encryption, this data is stored in plaintext and vulnerable to unauthorized access if storage media is compromised.
        - EMR security configurations provide a centralized way to manage encryption settings for both S3 data (using SSE-S3, SSE-KMS, or CSE-KMS) and local disk data (using LUKS encryption with KMS keys).
        - Many compliance frameworks, including PCI DSS, HIPAA, and NIST SP 800-53 SC-28, require encryption of sensitive data at rest.

        **Risk mitigation**

        - **Data protection:** Encrypts data on local cluster volumes and S3 storage, protecting against unauthorized access at the storage layer.
        - **Key management:** Uses AWS KMS for centralized key management, rotation, and access control.
        - **Compliance:** Satisfies at-rest encryption requirements across multiple regulatory frameworks.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and navigate to **Amazon EMR**.
        2. Select the cluster to review.
        3. Choose the **Summary** tab and locate the **Security and access** section.
        4. Find the **Security configuration** name and note it.
        5. Navigate to **Security configurations** in the left panel, select the configuration, and verify that **At-rest encryption** is enabled under the **Encryption** section.

        A passing cluster is associated with a security configuration that shows at-rest encryption as enabled. A failing cluster has no security configuration or one where at-rest encryption is disabled.

        ### Audit via CLI

        1. Describe the cluster to find its security configuration:

        ```bash
        aws emr describe-cluster \
          --cluster-id <cluster-id> \
          --query "Cluster.{SecurityConfig:SecurityConfiguration,Encryption:EncryptionConfiguration}"
        ```

        2. Retrieve the security configuration details:

        ```bash
        aws emr describe-security-configuration \
          --name <security-configuration-name> \
          --query "SecurityConfiguration"
        ```

        A passing cluster has a security configuration where `EncryptionConfiguration.EnableAtRestEncryption` is `true`. A failing cluster has no security configuration or one where `EnableAtRestEncryption` is `false`.
      remediation:
        - id: console
          desc: |
            To ensure EMR clusters have at-rest encryption enabled using the AWS Console, note: Encryption settings cannot be changed on a running cluster. You must create a new security configuration and launch a new cluster.

            1. Navigate to the **Amazon EMR Console** and choose **Security configurations**.
            2. Choose **Create security configuration**.
            3. Under **Encryption**, enable **At-rest encryption**.
            4. Configure S3 encryption (SSE-S3, SSE-KMS, or CSE-KMS) and local disk encryption (KMS key).
            5. Save the security configuration and use it when launching new clusters.
        - id: cli
          desc: |
            To ensure EMR clusters have at-rest encryption enabled using the AWS CLI, create a security configuration with at-rest encryption:

            ```bash
            aws emr create-security-configuration \
              --name "emr-encryption-config" \
              --security-configuration '{
                "EncryptionConfiguration": {
                  "EnableAtRestEncryption": true,
                  "AtRestEncryptionConfiguration": {
                    "S3EncryptionConfiguration": {
                      "EncryptionMode": "SSE-KMS",
                      "AwsKmsKey": "arn:aws:kms:<region>:<account-id>:key/<key-id>"
                    },
                    "LocalDiskEncryptionConfiguration": {
                      "EncryptionKeyProviderType": "AwsKms",
                      "AwsKmsKey": "arn:aws:kms:<region>:<account-id>:key/<key-id>"
                    }
                  },
                  "EnableInTransitEncryption": false
                }
              }'
            ```

            Launch a cluster with the security configuration:

            ```bash
            aws emr run-job-flow \
              --name "encrypted-cluster" \
              --security-configuration "emr-encryption-config" \
              --release-label emr-7.0.0 \
              --instances InstanceGroups='[{"InstanceRole":"MASTER","InstanceType":"m5.xlarge","InstanceCount":1},{"InstanceRole":"CORE","InstanceType":"m5.xlarge","InstanceCount":2}]'
            ```
        - id: terraform
          desc: |
            To ensure EMR clusters have at-rest encryption enabled in Terraform:

            ```hcl
            resource "aws_emr_security_configuration" "example" {
              name = "emr-encryption-config"

              configuration = jsonencode({
                EncryptionConfiguration = {
                  EnableAtRestEncryption = true
                  AtRestEncryptionConfiguration = {
                    S3EncryptionConfiguration = {
                      EncryptionMode = "SSE-KMS"
                      AwsKmsKey      = aws_kms_key.emr.arn
                    }
                    LocalDiskEncryptionConfiguration = {
                      EncryptionKeyProviderType = "AwsKms"
                      AwsKmsKey                 = aws_kms_key.emr.arn
                    }
                  }
                  EnableInTransitEncryption = false
                }
              })
            }
            ```
        - id: cloudformation
          desc: |
            To ensure EMR clusters have at-rest encryption enabled in CloudFormation:

            ```yaml
            Resources:
              EMRSecurityConfiguration:
                Type: AWS::EMR::SecurityConfiguration
                Properties:
                  Name: emr-encryption-config
                  SecurityConfiguration:
                    EncryptionConfiguration:
                      EnableAtRestEncryption: true
                      AtRestEncryptionConfiguration:
                        S3EncryptionConfiguration:
                          EncryptionMode: SSE-KMS
                          AwsKmsKey: !GetAtt EMRKMSKey.Arn
                        LocalDiskEncryptionConfiguration:
                          EncryptionKeyProviderType: AwsKms
                          AwsKmsKey: !GetAtt EMRKMSKey.Arn
                      EnableInTransitEncryption: false
            ```
