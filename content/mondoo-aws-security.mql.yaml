  - uid: mondoo-aws-security-secretsmanager-no-public-policy
    title: Ensure Secrets Manager secrets do not have public policies
    impact: 90
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-5
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/vda-isa-5: vda-isa-5-4-1-1
    variants:
      - uid: mondoo-aws-security-secretsmanager-no-public-policy-aws
        tags:
          mondoo.com/filter-title: AWS Secretsmanager Secret
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-secretsmanager-no-public-policy-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-secretsmanager-no-public-policy-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-secretsmanager-no-public-policy-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-secretsmanager-no-public-policy-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that AWS Secrets Manager secrets do not have resource policies that grant public access. A resource policy with a wildcard principal ("*") in an Allow statement without conditions effectively makes the secret accessible to any AWS account.

        **Why this matters**

        - Secrets Manager resource policies with wildcard principals can expose sensitive credentials to unauthorized parties.
        - Unlike S3 bucket policies, Secrets Manager does not have a public access block feature, making policy review the primary control.
        - A compromised secret can lead to cascading security breaches across dependent services.
        - NIST SP 800-53 AC-6 requires least-privilege access to sensitive information.

        **Risk mitigation**

        - **Least privilege:** Ensure resource policies grant access only to specific, authorized principals.
        - **Secret protection:** Prevents unauthorized access to sensitive credentials and configuration data.
        - **Blast radius reduction:** Restricting access limits the impact of policy misconfigurations.
      remediation:
        - id: console
          desc: |
            To ensure Secrets Manager secrets do not have public policies using the AWS Console:

            1. Navigate to the **AWS Secrets Manager Console**.
            2. Select the secret.
            3. Under **Resource permissions**, review the resource policy.
            4. Remove any statements with a wildcard (*) principal.
            5. Replace with specific AWS account IDs, IAM role ARNs, or organizational unit paths.
            6. Choose **Save**.
        - id: cli
          desc: |
            To review and update Secrets Manager resource policies using the AWS CLI:

            ```bash
            aws secretsmanager get-resource-policy \
              --secret-id <secret-name-or-arn>
            ```

            To block public access when setting a resource policy:

            ```bash
            aws secretsmanager put-resource-policy \
              --secret-id <secret-name-or-arn> \
              --resource-policy file://policy.json \
              --block-public-policy
            ```

            To remove a public resource policy entirely:

            ```bash
            aws secretsmanager delete-resource-policy \
              --secret-id <secret-name-or-arn>
            ```
        - id: terraform
          desc: |
            To ensure Secrets Manager secrets do not have public policies in Terraform:

            ```hcl
            resource "aws_secretsmanager_secret_policy" "example" {
              secret_arn = aws_secretsmanager_secret.example.arn
              policy = jsonencode({
                Version = "2012-10-17"
                Statement = [
                  {
                    Sid       = "AllowSpecificAccount"
                    Effect    = "Allow"
                    Principal = { AWS = "arn:aws:iam::123456789012:root" }
                    Action    = "secretsmanager:GetSecretValue"
                    Resource  = "*"
                  }
                ]
              })
              block_public_policy = true
            }
            ```
        - id: cloudformation
          desc: |
            Scope every `Allow` statement in an `AWS::SecretsManager::ResourcePolicy` to a specific account, role, or service principal — never `"*"` or `{"AWS": "*"}`:

            ```yaml
            Resources:
              SecretAccessPolicy:
                Type: AWS::SecretsManager::ResourcePolicy
                Properties:
                  SecretId: !Ref MySecret
                  ResourcePolicy:
                    Version: "2012-10-17"
                    Statement:
                      - Effect: Allow
                        Principal:
                          AWS: arn:aws:iam::111122223333:role/AppRole
                        Action: secretsmanager:GetSecretValue
                        Resource: "*"
            ```
    refs:
      - url: https://docs.aws.amazon.com/secretsmanager/latest/userguide/auth-and-access_resource-based-policies.html
        title: AWS Documentation - Resource-based policies for Secrets Manager
  - uid: mondoo-aws-security-secretsmanager-no-public-policy-aws
    filters: asset.platform == "aws-secretsmanager-secret"
    mql: |
      if (aws.secretsmanager.secret.resourcePolicy != "" && aws.secretsmanager.secret.resourcePolicy != empty) {
        aws.secretsmanager.secret.resourcePolicy != /"Effect"\s*:\s*"Allow"[\s\S]*?"Principal"\s*:\s*"\*"/
        aws.secretsmanager.secret.resourcePolicy != /"Effect"\s*:\s*"Allow"[\s\S]*?"Principal"\s*:\s*\{\s*"AWS"\s*:\s*"\*"\s*\}/
      }
  - uid: mondoo-aws-security-secretsmanager-no-public-policy-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_secretsmanager_secret_policy")
    mql: |
      terraform.resources.where(nameLabel == "aws_secretsmanager_secret_policy").all(
        arguments.policy["Statement"].where(_["Effect"] == "Allow").none(
          _["Principal"] == "*" || _["Principal"]["AWS"] == "*"
        )
      )
  - uid: mondoo-aws-security-secretsmanager-no-public-policy-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_secretsmanager_secret_policy")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_secretsmanager_secret_policy").all(
        change.after["policy"]["Statement"].where(_["Effect"] == "Allow").none(
          _["Principal"] == "*" || _["Principal"]["AWS"] == "*"
        )
      )
  - uid: mondoo-aws-security-secretsmanager-no-public-policy-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_secretsmanager_secret_policy")
    mql: |
      terraform.state.resources.where(type == "aws_secretsmanager_secret_policy").all(
        values["policy"]["Statement"].where(_["Effect"] == "Allow").none(
          _["Principal"] == "*" || _["Principal"]["AWS"] == "*"
        )
      )
  - uid: mondoo-aws-security-secretsmanager-no-public-policy-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::SecretsManager::ResourcePolicy")
    mql: |
      cloudformation.template.resources.where(type == "AWS::SecretsManager::ResourcePolicy").all(
        properties['ResourcePolicy'] == null ||
        properties['ResourcePolicy']['Statement'] == null ||
        properties['ResourcePolicy']['Statement'].where(_['Effect'] == "Allow").none(
          _['Principal'] == "*" ||
          _['Principal']['AWS'] == "*" ||
          _['Principal']['AWS'] != null && _['Principal']['AWS'].contains("*")
        )
      )
  - uid: mondoo-aws-security-ec2-serial-console-disabled
    title: Ensure EC2 serial console access is disabled
    impact: 80
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-2
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-1-1
    variants:
      - uid: mondoo-aws-security-ec2-serial-console-disabled-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-ec2-serial-console-disabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ec2-serial-console-disabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ec2-serial-console-disabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that EC2 serial console access is disabled across all regions. The EC2 serial console provides text-based access to an instance's serial port, which can be used to troubleshoot boot and network issues. However, if enabled, it can provide an additional attack vector for accessing instances.

        **Why this matters**

        - Serial console access bypasses normal network-based access controls and SSH key requirements.
        - An attacker with IAM credentials to connect to the serial console could access instances even if network security groups block all inbound traffic.
        - Serial console access is not needed for normal operations and should be disabled when not actively troubleshooting.
        - CIS AWS Foundations Benchmark recommends disabling serial console access.
      remediation:
        - id: console
          desc: |
            To disable EC2 serial console access using the AWS Console:

            1. Navigate to the **EC2 Dashboard**.
            2. Under **Account attributes**, select **EC2 Serial Console**.
            3. Select **Manage**.
            4. Uncheck **Allow** to disable serial console access.
            5. Save the changes.
            6. Repeat for each region.
        - id: cli
          desc: |
            To disable EC2 serial console access using the AWS CLI:

            ```bash
            aws ec2 disable-serial-console-access --region REGION
            ```

            Run this command for each active region.
        - id: terraform
          desc: |
            Manage the regional setting with `aws_ec2_serial_console_access` and pin `enabled = false`. Repeat the resource per region using aliased providers:

            ```hcl
            resource "aws_ec2_serial_console_access" "this" {
              enabled = false
            }
            ```
    refs:
      - url: https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/configure-access-to-serial-console.html
        title: Configure access to the EC2 Serial Console
  - uid: mondoo-aws-security-ec2-serial-console-disabled-aws
    filters: asset.platform == "aws"
    mql: |
      aws.ec2.serialConsoleAccessEnabled.length > 0 &&
      aws.ec2.serialConsoleAccessEnabled.values.none(_ == true)
  - uid: mondoo-aws-security-ec2-serial-console-disabled-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_ec2_serial_console_access")
    mql: |
      terraform.resources.where(nameLabel == "aws_ec2_serial_console_access").all(
        arguments.enabled == false
      )
  - uid: mondoo-aws-security-ec2-serial-console-disabled-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_ec2_serial_console_access")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_ec2_serial_console_access").all(
        change.after["enabled"] == false
      )
  - uid: mondoo-aws-security-ec2-serial-console-disabled-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_ec2_serial_console_access")
    mql: |
      terraform.state.resources.where(type == "aws_ec2_serial_console_access").all(
        values["enabled"] == false
      )
  - uid: mondoo-aws-security-ec2-ami-block-public-access
    title: Ensure AMI block public access is enabled
    impact: 80
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-5-15
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-1-1
    variants:
      - uid: mondoo-aws-security-ec2-ami-block-public-access-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-ec2-ami-block-public-access-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ec2-ami-block-public-access-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ec2-ami-block-public-access-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that AMI block public access is enabled across all regions. When enabled, this setting prevents AMIs from being publicly shared, protecting against accidental exposure of machine images that may contain sensitive configurations, credentials, or proprietary software.

        **Why this matters**

        - Publicly shared AMIs can expose sensitive data, credentials, or proprietary application code to anyone with an AWS account.
        - AMIs may contain hardcoded secrets, private keys, or internal network configurations.
        - Block public access for AMIs prevents accidental public sharing that could lead to data exposure.
        - This is a preventive control that stops the problem at the source rather than detecting it after the fact.
      remediation:
        - id: console
          desc: |
            To enable AMI block public access using the AWS Console:

            1. Navigate to the **EC2 Dashboard**.
            2. Under **Account attributes**, select **AMI block public access**.
            3. Select **Manage**.
            4. Enable **Block new public sharing**.
            5. Save the changes.
            6. Repeat for each region.
        - id: cli
          desc: |
            To enable AMI block public access using the AWS CLI:

            ```bash
            aws ec2 enable-image-block-public-access --image-block-public-access-state block-new-sharing --region REGION
            ```

            Run this command for each active region.
        - id: terraform
          desc: |
            Manage the regional setting with `aws_ec2_image_block_public_access`. Pin `state = "block-new-sharing"` and repeat the resource per region using aliased providers:

            ```hcl
            resource "aws_ec2_image_block_public_access" "this" {
              state = "block-new-sharing"
            }
            ```
    refs:
      - url: https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/sharingamis-intro.html
        title: Block public access for AMIs
  - uid: mondoo-aws-security-ec2-ami-block-public-access-aws
    filters: asset.platform == "aws"
    mql: aws.ec2.imageBlockPublicAccess.values.all(_ == "block-new-sharing")
  - uid: mondoo-aws-security-ec2-ami-block-public-access-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_ec2_image_block_public_access")
    mql: |
      terraform.resources.where(nameLabel == "aws_ec2_image_block_public_access").all(
        arguments.state == "block-new-sharing"
      )
  - uid: mondoo-aws-security-ec2-ami-block-public-access-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_ec2_image_block_public_access")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_ec2_image_block_public_access").all(
        change.after["state"] == "block-new-sharing"
      )
  - uid: mondoo-aws-security-ec2-ami-block-public-access-terraform-state
