  - uid: mondoo-aws-security-kinesis-firehose-encrypted-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_kinesis_firehose_delivery_stream")
    mql: |
      terraform.state.resources.where(type == "aws_kinesis_firehose_delivery_stream").all(
