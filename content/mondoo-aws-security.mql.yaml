      )
  - uid: mondoo-aws-security-ec2-launch-config-no-public-ip-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_launch_configuration")
    mql: |
      terraform.state.resources.where(type == "aws_launch_configuration").all(
        values['associate_public_ip_address'] != true
      )
  - uid: mondoo-aws-security-ec2-launch-config-no-public-ip-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::AutoScaling::LaunchConfiguration")
    mql: |
      cloudformation.template.resources.where(type == "AWS::AutoScaling::LaunchConfiguration").all(
        properties['AssociatePublicIpAddress'] != true
      )
  - uid: mondoo-aws-security-ec2-launch-config-imdsv2
    title: Ensure launch configurations enforce IMDSv2
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-14
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-1
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-3
    variants:
      - uid: mondoo-aws-security-ec2-launch-config-imdsv2-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-ec2-launch-config-imdsv2-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ec2-launch-config-imdsv2-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ec2-launch-config-imdsv2-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ec2-launch-config-imdsv2-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that EC2 launch configurations require IMDSv2 by setting the `httpTokens` metadata option to `required`. IMDSv1 accepts unauthenticated HTTP GET requests to `169.254.169.254`, making it vulnerable to server-side request forgery attacks that can extract instance IAM role credentials. Because launch configurations define the metadata settings for every instance an Auto Scaling group creates, an unprotected configuration propagates the vulnerability across the entire fleet.

        **Why this matters**

        - **SSRF credential theft:** Any SSRF vulnerability in an application running on the instance can be used to silently retrieve IAM role credentials from the IMDSv1 endpoint without requiring any instance-level access.
        - **Fleet-wide propagation:** A launch configuration without IMDSv2 enforcement applies the IMDSv1 vulnerability to every instance the Auto Scaling group launches, multiplying the exposure.
        - **Session-based protection:** IMDSv2 requires a PUT-based token request before metadata can be read, a step that typical SSRF payloads cannot perform.

        **Risk mitigation**

        - **Credential protection:** Enforcing IMDSv2 eliminates the SSRF-to-credential-theft attack path, preventing an application-layer vulnerability from escalating to full IAM compromise.
        - **Migration path:** AWS recommends replacing launch configurations with launch templates, which provide the same IMDSv2 enforcement and are the current standard for instance provisioning.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and open the **EC2** console.
        2. In the left navigation pane, under **Auto Scaling**, choose **Launch Configurations**.
        3. Select a launch configuration and choose the **Details** tab.
        4. Under **Advanced details**, review the **Metadata version** field.

        A passing launch configuration shows **Metadata version: V2 only (token required)**. A failing configuration shows **Metadata version: V1 and V2 (token optional)** or has no metadata options configured.

        ### Audit via CLI

        1. List all launch configurations and their metadata options:

        ```bash
        aws autoscaling describe-launch-configurations \
          --query "LaunchConfigurations[*].{Name:LaunchConfigurationName,HttpTokens:MetadataOptions.HttpTokens}"
        ```

        A passing launch configuration returns `"HttpTokens": "required"`. A failing configuration returns `"HttpTokens": "optional"` or `null`.

      remediation:
        - id: console
          desc: |
            To ensure launch configurations enforce IMDSv2 using the AWS Console, AWS has deprecated the launch configuration console UI. It is recommended to migrate to launch templates instead:

            1. Navigate to the **EC2 Console** > **Launch Templates**.
            2. Select **Create launch template**.
            3. Configure the template to match your existing launch configuration settings.
            4. Under **Advanced details**, set **Metadata version** to **V2 only (token required)**.
            5. Save the launch template.
            6. Navigate to **Auto Scaling Groups**, select the group, select **Edit**, and update it to use the new launch template.
        - id: cli
          desc: |
            To ensure launch configurations enforce IMDSv2 using the AWS CLI, check metadata options for launch configurations:

            ```bash
            aws autoscaling describe-launch-configurations \
              --query "LaunchConfigurations[*].{Name:LaunchConfigurationName,HttpTokens:MetadataOptions.HttpTokens}"
            ```

            Create a replacement with IMDSv2 required:

            ```bash
            aws autoscaling create-launch-configuration \
              --launch-configuration-name my-lc-imdsv2 \
              --image-id ami-12345678 \
              --instance-type t3.micro \
              --metadata-options "HttpTokens=required,HttpEndpoint=enabled"
            ```
        - id: terraform
          desc: |
            To ensure launch configurations enforce IMDSv2 in Terraform:

            ```hcl
            resource "aws_launch_configuration" "example" {
              image_id      = "ami-12345678"
              instance_type = "t3.micro"

              metadata_options {
                http_tokens   = "required"
                http_endpoint = "enabled"
              }
            }
            ```

            Note: Consider migrating to `aws_launch_template` which is the modern replacement.
        - id: cloudformation
          desc: |
            To ensure launch configurations enforce IMDSv2 in CloudFormation:

            ```yaml
            Resources:
              MyLaunchConfig:
                Type: AWS::AutoScaling::LaunchConfiguration
                Properties:
                  ImageId: ami-12345678
                  InstanceType: t3.micro
                  MetadataOptions:
                    HttpTokens: required
                    HttpEndpoint: enabled
            ```

            Note: Consider migrating to `AWS::EC2::LaunchTemplate` which is the modern replacement.
    refs:
      - url: https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/configuring-IMDS-new-instances.html
        title: AWS Documentation - Configure the instance metadata service
      - url: https://docs.aws.amazon.com/autoscaling/ec2/userguide/launch-configurations.html
        title: AWS Documentation - Launch configurations
