    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::CloudTrail::Trail")
    mql: |
      cloudformation.template.resources.where(type == "AWS::CloudTrail::Trail").all(
        properties['CloudWatchLogsLogGroupArn'] != empty
      )
  - uid: mondoo-aws-security-elasticache-backup-retention
    title: Ensure ElastiCache clusters have backup retention
    impact: 60
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-bcr-08
      compliance/dora: dora-art-12
      compliance/hipaa: hipaa-security-ss164-308-a-7-ii-a-contingency-plan-data-backup-plan
      compliance/iso-27001-2022: iso-27001-2022-a-8-13
      compliance/nis-2: nis-2-21-2-c
      compliance/nist-csf-1: nist-csf-1-pr-ip-4
      compliance/nist-csf-2: nist-csf-2-pr-ds-11
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cp-9
      compliance/nist-sp-800-171: "false"
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc9-1-1
      compliance/vda-isa-5: false
    variants:
      - uid: mondoo-aws-security-elasticache-backup-retention-aws
        tags:
          mondoo.com/filter-title: AWS ElastiCache Cluster
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-elasticache-backup-retention-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-elasticache-backup-retention-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-elasticache-backup-retention-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-elasticache-backup-retention-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Redis ElastiCache clusters have automatic backup (snapshot) retention configured. Without backups, an attacker with compromised credentials can flush or destroy cache data with no recovery path, and ransomware-style attacks targeting cloud data stores rely on the absence of backups to maximize damage and leverage.

        **Why this matters**

        Without backup retention, ElastiCache Redis clusters have no recovery path from adversarial data destruction:

        - An attacker with `elasticache:ModifyCacheCluster` or direct Redis access can flush all data, and without backups, recovery is impossible.
        - Ransomware-style attacks increasingly target cloud-managed data stores, destroying data to pressure organizations into paying ransoms.
        - Cache data often includes session tokens, authentication state, and application configuration that, if destroyed without backups, can cause cascading authentication failures and service outages.

        **Risk mitigation**

        - **Ransomware resilience:** Backups ensure data can be restored after adversarial destruction, removing the attacker's leverage.
        - **Incident recovery:** Enables restoration to a known-good state after a cache poisoning or data destruction attack.
        - **Compliance:** Meets regulatory requirements for data backup and recovery capabilities.
      remediation:
        - id: console
          desc: |
            To ensure ElastiCache clusters have backup retention using the AWS Console:

            1. Navigate to the **Amazon ElastiCache Console**.
            2. Select **Redis clusters** in the left panel.
            3. Select the cluster to configure.
            4. Choose **Modify**.
            5. Under **Backup**, set **Enable automatic backups** to **Yes**.
            6. Set the **Backup retention period** to an appropriate value (e.g., 7 days).
            7. Save the changes.
        - id: cli
          desc: |
            To ensure ElastiCache clusters have backup retention using the AWS CLI, enable backup retention for a Redis replication group:

            ```bash
            aws elasticache modify-replication-group \
              --replication-group-id <replication-group-id> \
              --snapshot-retention-limit 7 \
              --apply-immediately
            ```

            Verify the backup configuration:

            ```bash
            aws elasticache describe-replication-groups \
              --replication-group-id <replication-group-id> \
              --query "ReplicationGroups[*].{Id:ReplicationGroupId,SnapshotRetentionLimit:SnapshotRetentionLimit}"
            ```
        - id: terraform
          desc: |
            To ensure ElastiCache clusters have backup retention in Terraform, configure an ElastiCache replication group with backup retention:

            ```hcl
            resource "aws_elasticache_replication_group" "example" {
              replication_group_id = "example-redis"
              description          = "Example Redis cluster"
              engine               = "redis"
              node_type            = "cache.r6g.large"
              num_cache_clusters   = 2

              snapshot_retention_limit = 7
            }
            ```
        - id: cloudformation
          desc: |
            To ensure ElastiCache clusters have backup retention in CloudFormation, configure an ElastiCache replication group with backup retention:

            ```yaml
            Resources:
              RedisReplicationGroup:
                Type: AWS::ElastiCache::ReplicationGroup
                Properties:
                  ReplicationGroupDescription: Example Redis cluster
                  Engine: redis
                  CacheNodeType: cache.r6g.large
                  NumCacheClusters: 2
                  SnapshotRetentionLimit: 7
            ```
    refs:
      - url: https://docs.aws.amazon.com/AmazonElastiCache/latest/red-ug/backups.html
        title: AWS Documentation - Backup and restore for ElastiCache for Redis
  - uid: mondoo-aws-security-elasticache-backup-retention-aws
    filters: asset.platform == "aws-elasticache-cluster" && aws.elasticache.cluster.engine == "redis"
    mql: aws.elasticache.cluster.snapshotRetentionLimit > 0
  - uid: mondoo-aws-security-elasticache-backup-retention-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_elasticache_replication_group")
    mql: |
      terraform.resources.where(nameLabel == "aws_elasticache_replication_group").all(
        arguments['snapshot_retention_limit'] > 0
      )
  - uid: mondoo-aws-security-elasticache-backup-retention-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_elasticache_replication_group")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_elasticache_replication_group").all(
        change.after['snapshot_retention_limit'] > 0
      )
  - uid: mondoo-aws-security-elasticache-backup-retention-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_elasticache_replication_group")
    mql: |
      terraform.state.resources.where(type == "aws_elasticache_replication_group").all(
        values['snapshot_retention_limit'] > 0
      )
  - uid: mondoo-aws-security-elasticache-backup-retention-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::ElastiCache::ReplicationGroup")
    mql: |
      cloudformation.template.resources.where(type == "AWS::ElastiCache::ReplicationGroup").all(
        properties['SnapshotRetentionLimit'] > 0
      )
  - uid: mondoo-aws-security-rds-backup-retention
    title: Ensure RDS DB instances have backup retention enabled
    impact: 60
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-bcr-08
      compliance/dora: dora-art-12
      compliance/hipaa: hipaa-security-ss164-308-a-7-ii-a-contingency-plan-data-backup-plan
      compliance/iso-27001-2022: iso-27001-2022-a-8-13
      compliance/nis-2: nis-2-21-2-c
      compliance/nist-csf-1: nist-csf-1-pr-ip-4
      compliance/nist-csf-2: nist-csf-2-pr-ds-11
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cp-9
      compliance/nist-sp-800-171: "false"
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc9-1-1
      compliance/vda-isa-5: false
    variants:
      - uid: mondoo-aws-security-rds-backup-retention-aws
        tags:
          mondoo.com/filter-title: AWS RDS DB Instance
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-rds-backup-retention-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-rds-backup-retention-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-rds-backup-retention-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-rds-backup-retention-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon RDS DB instances have automated backup retention configured. Without backups, an attacker who compromises database credentials can destroy or corrupt data with no recovery path, and ransomware-style attacks targeting cloud databases rely on the absence of backups to maximize damage.

        **Why this matters**

        RDS instances without backup retention have no recovery path from adversarial data destruction:

        - An attacker with database-level access can DROP tables, corrupt data, or encrypt records as ransomware, and without backups the damage is permanent.
        - Ransomware attacks increasingly target cloud-managed databases, deleting or encrypting data to pressure organizations into paying ransoms.
        - Without point-in-time recovery, even detecting the exact moment of compromise is insufficient because there is no backup to restore from.

        **Risk mitigation**

        - **Ransomware resilience:** Automated backups ensure data can be restored after adversarial destruction, removing the attacker's leverage.
        - **Point-in-time recovery:** Enables restoration to the moment before an attack, minimizing data loss from SQL injection, insider threats, or credential compromise.
        - **Forensic capability:** Backup snapshots can be used to compare pre-attack and post-attack database states during incident investigation.
      remediation:
        - id: console
          desc: |
            To ensure RDS DB instances have backup retention enabled using the AWS Console:

            1. Navigate to the **Amazon RDS Console**.
            2. Select **Databases** in the left panel.
            3. Select the DB instance to configure.
            4. Choose **Modify**.
            5. Under **Backup**, set the **Backup retention period** to a value greater than 0 (e.g., 7 days).
            6. Choose **Apply immediately** or during the next maintenance window.
            7. Save the changes.
        - id: cli
          desc: |
            To ensure RDS DB instances have backup retention enabled using the AWS CLI, enable automated backups with a retention period:

            ```bash
            aws rds modify-db-instance \
              --db-instance-identifier <db-instance-id> \
              --backup-retention-period 7 \
              --apply-immediately
            ```

            Verify the backup configuration:

            ```bash
            aws rds describe-db-instances \
              --db-instance-identifier <db-instance-id> \
              --query "DBInstances[*].{DBInstanceId:DBInstanceIdentifier,BackupRetentionPeriod:BackupRetentionPeriod}"
            ```
        - id: terraform
          desc: |
            To ensure RDS DB instances have backup retention enabled in Terraform, configure an RDS instance with backup retention:

            ```hcl
            resource "aws_db_instance" "example" {
              identifier              = "example-db"
              engine                  = "mysql"
              instance_class          = "db.t3.medium"
              allocated_storage       = 20
              backup_retention_period = 7
            }
            ```
        - id: cloudformation
          desc: |
            To ensure RDS DB instances have backup retention enabled in CloudFormation, configure an RDS instance with backup retention:

            ```yaml
            Resources:
              MyDBInstance:
                Type: AWS::RDS::DBInstance
                Properties:
                  DBInstanceIdentifier: example-db
                  Engine: mysql
                  DBInstanceClass: db.t3.medium
                  AllocatedStorage: 20
                  BackupRetentionPeriod: 7
            ```
    refs:
      - url: https://docs.aws.amazon.com/AmazonRDS/latest/UserGuide/USER_WorkingWithAutomatedBackups.html
        title: AWS Documentation - Working with backups
  - uid: mondoo-aws-security-rds-backup-retention-aws
    filters: asset.platform == "aws-rds-dbinstance"
    mql: aws.rds.dbinstance.backupRetentionPeriod > 0
  - uid: mondoo-aws-security-rds-backup-retention-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_db_instance")
    mql: |
      terraform.resources.where(nameLabel == "aws_db_instance").all(
        arguments['backup_retention_period'] > 0
      )
