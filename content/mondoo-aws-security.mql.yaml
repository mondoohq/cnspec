  - uid: mondoo-aws-security-s3-bucket-encryption-uses-kms-cmk
    title: Ensure S3 buckets use KMS customer managed keys for encryption
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-11
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-aws-security-s3-bucket-encryption-uses-kms-cmk-aws
        tags:
          mondoo.com/filter-title: AWS S3 Bucket
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-s3-bucket-encryption-uses-kms-cmk-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-s3-bucket-encryption-uses-kms-cmk-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-s3-bucket-encryption-uses-kms-cmk-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-s3-bucket-encryption-uses-kms-cmk-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon S3 buckets use AWS KMS customer managed keys for server-side encryption rather than the default SSE-S3 (AES-256) encryption. While SSE-S3 encrypts data at rest, it uses AWS-managed keys with no customer visibility into key usage, no audit trail in CloudTrail, and no ability to enforce access control at the key level.

        **Why this matters**

        - **Audit trail:** Every encrypt and decrypt operation against a KMS CMK is recorded in CloudTrail, enabling detection of unauthorized or anomalous access to bucket data that SSE-S3 cannot provide.
        - **Access control enforcement:** KMS key policies allow organizations to restrict which IAM principals can decrypt bucket contents, adding a cryptographic layer of access control independent of S3 bucket policies.
        - **Key rotation control:** Customer managed KMS keys support configurable automatic rotation, allowing organizations to meet specific key lifecycle requirements that AWS-managed SSE-S3 keys do not expose.
        - **Breach response:** A CMK can be disabled or scheduled for deletion to prevent further decryption of bucket contents if a data breach is suspected.

        **Risk mitigation**

        - **Unauthorized decryption prevention:** Even an IAM principal with `s3:GetObject` cannot decrypt data without also having KMS `kms:Decrypt` permission on the CMK, reducing insider threat exposure.
        - **Compliance coverage:** Customer-controlled encryption keys satisfy data-protection requirements under frameworks that mandate organizational control over encryption key management.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and open the **S3** console.
        2. Select a bucket.
        3. Choose the **Properties** tab.
        4. Under **Default encryption**, review the **Encryption type** and **AWS KMS key** fields.

        A passing bucket shows **Server-side encryption with AWS Key Management Service keys (SSE-KMS)** as the encryption type and lists a customer managed KMS key. A failing bucket shows **Server-side encryption with Amazon S3 managed keys (SSE-S3)** or shows an AWS managed key (`aws/s3`) rather than a customer managed key.

        ### Audit via CLI

        1. Retrieve the bucket encryption configuration:

        ```bash
        aws s3api get-bucket-encryption \
          --bucket <bucket-name> \
          --query 'ServerSideEncryptionConfiguration.Rules[*].ApplyServerSideEncryptionByDefault'
        ```

        A passing bucket returns `SSEAlgorithm` as `aws:kms` or `aws:kms:dsse`. A failing bucket returns `SSEAlgorithm` as `AES256` or returns a `KMSMasterKeyID` pointing to the default AWS managed key (`aws/s3`).
      remediation:
        - id: console
          desc: |
            To ensure S3 buckets use KMS customer managed keys for encryption using the AWS Console:

            1. Navigate to the Amazon S3 Console.
            2. Select the bucket to update.
            3. Go to the Properties tab.
            4. Under Default encryption, select Edit.
            5. Change the encryption type to "Server-side encryption with AWS Key Management Service keys (SSE-KMS)".
            6. Select a KMS key (create a new one or choose an existing customer managed key).
            7. Optionally enable Bucket Key to reduce KMS API costs.
            8. Select Save changes.
        - id: cli
          desc: |
            To ensure S3 buckets use KMS customer managed keys for encryption using the AWS CLI, update the bucket encryption to use a KMS CMK:

            ```bash
            aws s3api put-bucket-encryption \
              --bucket <bucket-name> \
              --server-side-encryption-configuration '{
                "Rules": [{
                  "ApplyServerSideEncryptionByDefault": {
                    "SSEAlgorithm": "aws:kms",
                    "KMSMasterKeyID": "arn:aws:kms:<region>:<account-id>:key/<key-id>"
                  },
                  "BucketKeyEnabled": true
                }]
              }'
            ```
        - id: terraform
          desc: |
            To ensure S3 buckets use KMS customer managed keys for encryption in Terraform:

            ```hcl
            resource "aws_s3_bucket_server_side_encryption_configuration" "example" {
              bucket = aws_s3_bucket.example.id

              rule {
                apply_server_side_encryption_by_default {
                  sse_algorithm     = "aws:kms"
                  kms_master_key_id = aws_kms_key.s3.arn
                }
                bucket_key_enabled = true
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure S3 buckets use KMS customer managed keys for encryption in CloudFormation:

            ```yaml
            Resources:
              S3Bucket:
                Type: AWS::S3::Bucket
                Properties:
                  BucketEncryption:
                    ServerSideEncryptionConfiguration:
                      - ServerSideEncryptionByDefault:
                          SSEAlgorithm: aws:kms
                          KMSMasterKeyID: !Ref S3KMSKey
                        BucketKeyEnabled: true
            ```
    refs:
      - url: https://docs.aws.amazon.com/AmazonS3/latest/userguide/UsingKMSEncryption.html
        title: AWS Documentation - Using SSE-KMS encryption for S3
      - url: https://docs.aws.amazon.com/AmazonS3/latest/userguide/bucket-key.html
        title: AWS Documentation - Reducing the cost of SSE-KMS with Amazon S3 Bucket Keys
  - uid: mondoo-aws-security-s3-bucket-encryption-uses-kms-cmk-aws
    filters: asset.platform == "aws-s3-bucket"
    mql: |
      aws.s3.bucket.encryptionRules.all(
        sseAlgorithm == "aws:kms" || sseAlgorithm == "aws:kms:dsse"
      )
  - uid: mondoo-aws-security-s3-bucket-encryption-uses-kms-cmk-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_s3_bucket_server_side_encryption_configuration")
    mql: |
      terraform.resources.where(nameLabel == "aws_s3_bucket_server_side_encryption_configuration").all(
        blocks.where(type == "rule").all(
          blocks.where(type == "apply_server_side_encryption_by_default").all(
            arguments.sse_algorithm == "aws:kms" || arguments.sse_algorithm == "aws:kms:dsse"
          )
        )
      )
  - uid: mondoo-aws-security-s3-bucket-encryption-uses-kms-cmk-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_s3_bucket_server_side_encryption_configuration")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_s3_bucket_server_side_encryption_configuration").all(
        change.after.rule[0].apply_server_side_encryption_by_default[0].sse_algorithm == "aws:kms" ||
        change.after.rule[0].apply_server_side_encryption_by_default[0].sse_algorithm == "aws:kms:dsse"
      )
  - uid: mondoo-aws-security-s3-bucket-encryption-uses-kms-cmk-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_s3_bucket_server_side_encryption_configuration")
    mql: |
      terraform.state.resources.where(type == "aws_s3_bucket_server_side_encryption_configuration").all(
        values.rule[0].apply_server_side_encryption_by_default[0].sse_algorithm == "aws:kms" ||
        values.rule[0].apply_server_side_encryption_by_default[0].sse_algorithm == "aws:kms:dsse"
      )
  - uid: mondoo-aws-security-s3-bucket-encryption-uses-kms-cmk-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::S3::Bucket")
    mql: |
      cloudformation.template.resources.where(type == "AWS::S3::Bucket").all(
      properties['BucketEncryption']['ServerSideEncryptionConfiguration'].all(
        _['ServerSideEncryptionByDefault']['SSEAlgorithm'] == "aws:kms" ||
        _['ServerSideEncryptionByDefault']['SSEAlgorithm'] == "aws:kms:dsse"
      )
      )
