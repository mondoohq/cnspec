      - uid: mondoo-aws-security-glue-job-supported-version-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-glue-job-supported-version-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that AWS Glue ETL jobs are configured to use a supported Glue version (3.0 or later). Older Glue versions may contain unpatched vulnerabilities and lack security features available in newer releases. AWS Security Hub control Glue.4 recommends running jobs on supported versions.

        **Known limitation:** This check uses lexicographic string comparison on version numbers (e.g., `glueVersion >= "3.0"`). This is correct for current AWS Glue versions (2.0–4.0) but would produce incorrect results for future double-digit versions (e.g., "10.0" < "3.0" lexicographically). Update this check if AWS releases Glue version 10.0 or higher.

        **Why this matters**

        - Older Glue versions may have known security vulnerabilities in their underlying Apache Spark runtime, Python libraries, or Java dependencies that are only patched in newer releases.
        - Glue 3.0+ includes updated libraries, enhanced security defaults, and improved isolation between job runs.
        - Running unsupported software versions increases risk exposure and may violate compliance requirements for timely patching.
        - Older versions may lack support for newer encryption modes, IAM features, and VPC configurations that improve security posture.
        - End-of-support versions no longer receive security patches from AWS, leaving known CVEs unaddressed in your data processing pipeline.

        **Risk mitigation**

        - **Vulnerability management:** Ensures Glue jobs run on versions with the latest security patches, reducing exposure to known CVEs.
        - **Improved security defaults:** Newer versions include hardened default configurations and updated dependency libraries with fewer known vulnerabilities.
        - **Supply chain security:** Updated Glue versions use patched versions of open-source dependencies (Spark, Hadoop, Python packages), reducing supply chain risk.
        - **Compliance:** Meets requirements for running supported software versions (NIST SI-2, ISO 27001 A.8.8).
      remediation:
        - id: console
          desc: |
            To ensure AWS Glue jobs use a supported Glue version using the AWS Console:

            1. Navigate to the AWS Glue Console.
            2. Select **Jobs** in the left panel.
            3. Select the job to update.
            4. Select **Edit**.
            5. Under **Glue version**, select **Glue 3.0** or later.
            6. Select **Save**.
        - id: cli
          desc: |
            To ensure AWS Glue jobs use a supported Glue version using the AWS CLI, update the Glue version for a job:

            ```bash
            aws glue update-job --job-name my-job \
              --job-update '{"GlueVersion": "4.0"}'
            ```
        - id: terraform
          desc: |
            To ensure AWS Glue jobs use a supported Glue version in Terraform:

            ```hcl
            resource "aws_glue_job" "example" {
              name     = "example-job"
              role_arn = aws_iam_role.glue.arn
              glue_version = "4.0"

              command {
                script_location = "s3://my-bucket/my-script.py"
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure AWS Glue jobs use a supported Glue version in CloudFormation:

            ```yaml
            Resources:
              GlueJob:
                Type: AWS::Glue::Job
                Properties:
                  Name: example-job
                  Role: !GetAtt GlueRole.Arn
                  GlueVersion: "4.0"
                  Command:
                    Name: glueetl
                    ScriptLocation: s3://my-bucket/my-script.py
            ```
    refs:
      - url: https://docs.aws.amazon.com/glue/latest/dg/release-notes.html
        title: AWS Documentation - AWS Glue release notes
      - url: https://docs.aws.amazon.com/securityhub/latest/userguide/glue-controls.html
        title: AWS Documentation - AWS Glue controls
