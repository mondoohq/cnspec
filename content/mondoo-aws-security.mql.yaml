  - uid: mondoo-aws-security-keyspaces-cmk-encryption
    title: Ensure Keyspaces tables use customer-managed KMS keys
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-11
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-aws-security-keyspaces-cmk-encryption-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-keyspaces-cmk-encryption-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-keyspaces-cmk-encryption-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-keyspaces-cmk-encryption-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-keyspaces-cmk-encryption-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon Keyspaces (for Apache Cassandra) tables are encrypted using customer-managed AWS KMS keys rather than the default AWS-owned keys. Customer-managed keys provide greater control over key lifecycle, access policies, and audit capabilities.

        **Why this matters**

        - AWS-owned keys do not log individual key usage events to CloudTrail, limiting visibility into who accessed encrypted data and when.
        - Customer-managed KMS keys enable key rotation policies, cross-account sharing controls, and the ability to revoke access by disabling or deleting the key.
        - Many compliance standards, including PCI DSS, HIPAA, and SOC 2, require demonstrable control over encryption keys used to protect data at rest.

        **Risk mitigation**

        - **Key control:** Customer-managed keys give organizations full lifecycle control, including rotation and revocation.
        - **Audit trail:** All KMS key usage is logged to CloudTrail, providing a complete record of data access events.
        - **Compliance:** Satisfies encryption key management requirements in multiple regulatory and security frameworks.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and navigate to the **Amazon Keyspaces** console.
        2. Select **Tables** in the left navigation pane.
        3. Select each table and choose the **Additional settings** tab.
        4. Under **Encryption**, review the **Encryption type** and associated KMS key.

        A passing table shows **Customer managed key** with a customer-managed KMS key ARN. A failing table shows **AWS owned key** or **AWS managed key**.

        ### Audit via CLI

        1. List all keyspaces:

        ```bash
        aws keyspaces list-keyspaces --query "keyspaces[*].keyspaceName"
        ```

        2. For each keyspace, list tables and check their encryption:

        ```bash
        aws keyspaces list-tables \
          --keyspace-name <keyspace-name> \
          --query "tables[*].resourceArn"
        ```

        ```bash
        aws keyspaces get-table \
          --keyspace-name <keyspace-name> \
          --table-name <table-name> \
          --query "{EncryptionType:encryptionSpecification.type,KmsKeyId:encryptionSpecification.kmsKeyIdentifier}"
        ```

        A passing table returns `"EncryptionType": "CUSTOMER_MANAGED_KMS_KEY"` with a non-empty `KmsKeyId`. A failing table returns `"EncryptionType": "AWS_OWNED_KMS_KEY"`.

      remediation:
        - id: console
          desc: |
            To ensure Keyspaces tables use customer-managed KMS keys using the AWS Console:

            1. Navigate to the **Amazon Keyspaces Console** and select **Tables**.
            2. Select the table you want to update.
            3. Choose **Additional settings** and locate the **Encryption** section.
            4. Select **Customer managed key** and choose an existing KMS key or create a new one.
            5. Save the changes.
        - id: terraform
          desc: |
            To ensure Keyspaces tables use customer-managed KMS keys in Terraform:

            ```hcl
            resource "aws_keyspaces_table" "example" {
              keyspace_name = aws_keyspaces_keyspace.example.name
              table_name    = "example-table"

              encryption_specification {
                type       = "CUSTOMER_MANAGED_KMS_KEY"
                kms_key_identifier = aws_kms_key.example.arn
              }

              schema_definition {
                column {
                  name = "id"
                  type = "text"
                }
                partition_key {
                  name = "id"
                }
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure Keyspaces tables use customer-managed KMS keys in CloudFormation:

            ```yaml
            Resources:
              KeyspacesTable:
                Type: AWS::Cassandra::Table
                Properties:
                  KeyspaceName: !Ref ExampleKeyspace
                  TableName: example-table
                  EncryptionSpecification:
                    EncryptionType: CUSTOMER_MANAGED_KMS_KEY
                    KmsKeyIdentifier: !Ref ExampleKMSKey
            ```
    refs:
      - url: https://docs.aws.amazon.com/keyspaces/latest/devguide/EncryptionAtRest.html
        title: Amazon Keyspaces - Encryption at Rest
  - uid: mondoo-aws-security-keyspaces-cmk-encryption-aws
