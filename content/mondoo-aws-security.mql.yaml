  - uid: mondoo-aws-security-emr-log-cmk-encryption
    title: Ensure EMR cluster logs are encrypted with CMK
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-10-3-2
      compliance/soc2-2017: soc2-control-cc6-1-11
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-aws-security-emr-log-cmk-encryption-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-emr-log-cmk-encryption-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-emr-log-cmk-encryption-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-emr-log-cmk-encryption-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-emr-log-cmk-encryption-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that EMR clusters with logging enabled use a customer-managed KMS key (CMK) to encrypt log data. For Terraform deployments, the check verifies that a security configuration is attached to the cluster, as the security configuration is where CMK encryption settings for logs are defined. EMR logs may contain sensitive information including query results, application output, and debugging data.

        **Why this matters**

        - **Sensitive data in logs:** EMR logs can contain query results, error messages with data samples, and application output that may include sensitive information.
        - **Key control:** CMKs provide full control over who can access the encryption key and, by extension, the log data.
        - **Compliance:** Many regulatory frameworks require encryption with customer-managed keys for data at rest.

        **Risk mitigation**

        - Configure a CMK for EMR log encryption when creating clusters.
        - Create a KMS key policy that restricts access to authorized principals.
        - Monitor KMS key usage via CloudTrail for audit purposes.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and open the **EMR** console.
        2. In the left navigation pane, choose **Clusters**.
        3. Select a cluster and review the **Summary** tab. Check that **Log URI** is set.
        4. Under **Security and access**, review the **Security configuration** field. If logging is enabled, a security configuration should be attached.
        5. Open the **EMR** console, choose **Security configurations**, select the referenced configuration, and verify that **S3 encryption** is configured with a **SSE-KMS** mode using a CMK.

        A passing cluster shows a security configuration attached that includes CMK-based S3 encryption for logs. A failing cluster with logging enabled shows no security configuration or one with no CMK-based S3 encryption.

        ### Audit via CLI

        1. Retrieve the cluster's log URI and security configuration:

        ```bash
        aws emr describe-cluster \
          --cluster-id <cluster-id> \
          --query "Cluster.{LogUri:LogUri,SecurityConfiguration:SecurityConfiguration}"
        ```

        2. If a security configuration is attached, inspect its encryption settings:

        ```bash
        aws emr describe-security-configuration \
          --name <security-configuration-name> \
          --query "SecurityConfiguration"
        ```

        A passing cluster with logging enabled returns a security configuration name and the configuration's `S3EncryptionConfiguration.EncryptionMode` is `SSE-KMS` with an `AwsKmsKey` set to a CMK ARN. A failing cluster returns no security configuration or one without CMK-based S3 encryption.

      remediation:
        - id: console
          desc: |
            To ensure EMR cluster logs are encrypted with CMK using the AWS Console:

            1. Navigate to the **EMR Console**.
            2. Select **Create cluster** or review an existing cluster.
            3. Under **Logging**, ensure logging is enabled with an S3 location.
            4. Under **Security configuration**, select or create a security configuration.
            5. Enable **S3 encryption** with a **CMK** for log encryption.
        - id: cli
          desc: |
            To ensure EMR cluster logs are encrypted with CMK using the AWS CLI, create a security configuration with CMK log encryption:

            ```bash
            aws emr create-security-configuration \
              --name "emr-log-encryption" \
              --security-configuration '{
                "EncryptionConfiguration": {
                  "EnableAtRestEncryption": true,
                  "AtRestEncryptionConfiguration": {
                    "S3EncryptionConfiguration": {
                      "EncryptionMode": "SSE-KMS",
                      "AwsKmsKey": "<cmk-key-arn>"
                    }
                  }
                }
              }'
            ```
        - id: terraform
          desc: |
            To ensure EMR cluster logs are encrypted with CMK in Terraform, configure an EMR security configuration with KMS log encryption and associate it with the cluster:

            ```hcl
            resource "aws_emr_security_configuration" "example" {
              name = "emr-log-encryption"

              configuration = jsonencode({
                EncryptionConfiguration = {
                  EnableAtRestEncryption = true
                  AtRestEncryptionConfiguration = {
                    S3EncryptionConfiguration = {
                      EncryptionMode = "SSE-KMS"
                      AwsKmsKey      = aws_kms_key.emr.arn
                    }
                  }
                }
              })
            }

            resource "aws_emr_cluster" "example" {
              name          = "example"
              release_label = "emr-6.15.0"
              log_uri       = "s3://my-emr-logs/"

              security_configuration = aws_emr_security_configuration.example.name
              # ... other configuration ...
            }
            ```
        - id: cloudformation
          desc: |
            To ensure EMR cluster logs are encrypted with CMK in CloudFormation, create an EMR security configuration with KMS log encryption:

            ```yaml
            Resources:
              MyEMRSecurityConfig:
                Type: AWS::EMR::SecurityConfiguration
                Properties:
                  Name: emr-log-encryption
                  SecurityConfiguration:
                    EncryptionConfiguration:
                      EnableAtRestEncryption: true
                      AtRestEncryptionConfiguration:
                        S3EncryptionConfiguration:
                          EncryptionMode: SSE-KMS
                          AwsKmsKey: !GetAtt EMRKmsKey.Arn

              MyEMRCluster:
                Type: AWS::EMR::Cluster
                Properties:
                  Name: example
                  ReleaseLabel: emr-6.15.0
                  LogUri: s3://my-emr-logs/
                  SecurityConfiguration: !Ref MyEMRSecurityConfig
                  Instances:
                    MasterInstanceGroup:
                      InstanceCount: 1
                      InstanceType: m5.xlarge
                  JobFlowRole: !Ref EMRInstanceProfile
                  ServiceRole: !Ref EMRServiceRole
            ```
    refs:
      - url: https://docs.aws.amazon.com/emr/latest/ManagementGuide/emr-encryption-enable.html
        title: AWS Documentation - Encryption options for Amazon EMR
      - url: https://docs.aws.amazon.com/emr/latest/ManagementGuide/emr-plan-debugging.html
        title: AWS Documentation - Configure logging and debugging
  - uid: mondoo-aws-security-emr-log-cmk-encryption-aws
    filters: asset.platform == "aws-emr-cluster" && aws.emr.cluster.logUri != empty
