    docs:
      desc: |
        This check ensures that AWS IAM users do not have directly attached inline or managed policies and instead receive permissions exclusively through IAM groups. Inline policies attached directly to users are hiding spots for persistent backdoor permissions that are invisible to bulk policy reviews and difficult to discover during security audits.

        **Why this matters**

        Inline policies on IAM users create security blind spots:

        - An attacker who gains IAM write access can attach an inline policy to a user as a persistent backdoor, granting themselves access that survives password rotations and access key changes.
        - Inline policies do not appear in the IAM policy list and require per-user enumeration to discover, making them significantly harder to detect during access reviews.
        - Directly attached policies bypass group-based access control, allowing individual users to accumulate excessive privileges that are not visible when reviewing group permissions.

        **Risk mitigation**

        - **Backdoor detection:** Eliminates inline policies as a hiding spot for attacker-planted persistent permissions.
        - **Audit visibility:** Ensures all permissions are managed through groups where they are visible to bulk access reviews and automated compliance scanning.
        - **Privilege creep prevention:** Group-based assignment makes it easier to detect and revoke excessive permissions across multiple users simultaneously.
      remediation:
        - id: console
          desc: |
            To ensure IAM users receive permissions only through groups using the AWS Console:

            1.  Navigate to the AWS IAM Console.
            2.  Select Users in the left panel.
            3.  Select a user and go to the Permissions tab.
            4.  Identify users with directly attached policies (either managed or inline policies).
            5.  If direct policies exist:
              - Detach managed policies from the user.
              - Delete inline policies assigned to the user.
              - Assign the user to an IAM group that grants the necessary permissions.
        - id: cli
          desc: |
            To ensure IAM users receive permissions only through groups using the AWS CLI, list all IAM users and check if they have directly attached policies:

            ```bash
            aws iam list-users --query "Users[*].UserName"
            ```

            Check managed policies attached to a user:

            ```bash
            aws iam list-attached-user-policies --user-name <username>
            ```

            Detach any managed policies:

            ```bash
            aws iam detach-user-policy --user-name <username> --policy-arn <policy-arn>
            ```

            Check inline policies assigned to a user:

            ```bash
            aws iam list-user-policies --user-name <username>
            ```

            Delete any inline policies:

            ```bash
            aws iam delete-user-policy --user-name <username> --policy-name <policy-name>
            ```

            Assign the user to an IAM group instead:

            ```bash
            aws iam add-user-to-group --group-name <group-name> --user-name <username>
            ```
        - id: terraform
          desc: |
            To ensure IAM users receive permissions only through groups in Terraform, enforce group-based permissions and prevent direct policy assignments:

            ```hcl
            resource "aws_iam_group" "developers" {
              name = "Developers"
            }

            resource "aws_iam_user" "user1" {
              name = "user1"
            }

            resource "aws_iam_group_membership" "dev_group_membership" {
              name  = "dev-membership"
              group = aws_iam_group.developers.name
              users = [aws_iam_user.user1.name]
            }
            ```
        - id: cloudformation
          desc: |
            To ensure IAM users receive permissions only through groups in CloudFormation, CloudFormation can enforce that IAM users receive permissions through groups only:

            ```yaml
            Resources:
              # Create IAM groups with appropriate permissions
              ReadOnlyGroup:
                Type: "AWS::IAM::Group"
                Properties:
                  GroupName: "ReadOnlyUsers"
                  ManagedPolicyArns:
                    - "arn:aws:iam::aws:policy/ReadOnlyAccess"

              AdminGroup:
                Type: "AWS::IAM::Group"
                Properties:
                  GroupName: "Administrators"
                  ManagedPolicyArns:
                    - "arn:aws:iam::aws:policy/AdministratorAccess"

              # Create IAM users without direct policies
              ReadOnlyUser:
                Type: "AWS::IAM::User"
                Properties:
                  UserName: "readonly-user"
                  Path: "/"
                  # No inline policies or managed policies attached directly

              AdminUser:
                Type: "AWS::IAM::User"
                Properties:
                  UserName: "admin-user"
                  Path: "/"
                  # No inline policies or managed policies attached directly

              # Add users to the appropriate groups
              ReadOnlyUserGroupMembership:
                Type: "AWS::IAM::UserToGroupAddition"
                Properties:
                  GroupName: !Ref ReadOnlyGroup
                  Users:
                    - !Ref ReadOnlyUser

              AdminUserGroupMembership:
                Type: "AWS::IAM::UserToGroupAddition"
                Properties:
                  GroupName: !Ref AdminGroup
                  Users:
                    - !Ref AdminUser
            ```
    refs:
      - url: https://docs.aws.amazon.com/IAM/latest/UserGuide/access_policies_managed-vs-inline.html
        title: Managed policies and inline policies
  - uid: mondoo-aws-security-iam-user-no-inline-policies-check-aws
    filters: asset.platform == "aws-iam-user"
    mql: |
      aws.iam.user.policies == empty
      aws.iam.user.attachedPolicies == empty
  - uid: mondoo-aws-security-iam-user-no-inline-policies-check-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_iam_user")
    mql: |
