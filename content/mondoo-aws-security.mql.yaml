      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-6
    variants:
      - uid: mondoo-aws-security-ec2-launch-config-no-public-ip-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-ec2-launch-config-no-public-ip-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ec2-launch-config-no-public-ip-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ec2-launch-config-no-public-ip-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ec2-launch-config-no-public-ip-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that EC2 launch configurations do not automatically assign public IP addresses to instances. Instances with public IPs are directly reachable from the internet, increasing the attack surface.

        **Why this matters**

        - **Direct internet exposure:** Instances with public IPs can be scanned, probed, and attacked from anywhere on the internet.
        - **Credential exposure:** If an instance with a public IP is compromised, the attacker has a direct path out to exfiltrate data.
        - **Auto Scaling blast radius:** A launch configuration with `associatePublicIpAddress: true` ensures every instance launched by the group gets a public IP, multiplying the risk.
        - **Best practice:** Instances should use NAT gateways, VPC endpoints, or load balancers for internet connectivity rather than direct public IPs.
      remediation:
        - id: console
          desc: |
            To ensure launch configurations do not assign public IPs using the AWS Console, AWS has deprecated the launch configuration console UI. It is recommended to migrate to launch templates instead:

            1. Navigate to the **EC2 Console** > **Launch Templates**.
            2. Select **Create launch template**.
            3. Configure the template to match your existing launch configuration settings.
            4. Under **Network settings**, ensure **Auto-assign public IP** is set to **Don't include in launch template** or **Disable**.
            5. Save the launch template.
            6. Navigate to **Auto Scaling Groups**, select the group, select **Edit**, and update it to use the new launch template.
        - id: cli
          desc: |
            To ensure launch configurations do not assign public IPs using the AWS CLI, check which launch configurations assign public IPs:

            ```bash
            aws autoscaling describe-launch-configurations \
              --query "LaunchConfigurations[?AssociatePublicIpAddress==\`true\`].LaunchConfigurationName"
            ```

            Create a replacement without public IP assignment:

            ```bash
            aws autoscaling create-launch-configuration \
              --launch-configuration-name my-lc-private \
              --image-id ami-12345678 \
              --instance-type t3.micro \
              --no-associate-public-ip-address
            ```
        - id: terraform
          desc: |
            To ensure launch configurations do not assign public IPs in Terraform:

            ```hcl
            resource "aws_launch_configuration" "example" {
              image_id                    = "ami-12345678"
              instance_type               = "t3.micro"
              associate_public_ip_address = false
            }
            ```

            Note: Consider migrating to `aws_launch_template` which is the modern replacement.
        - id: cloudformation
          desc: |
            To ensure launch configurations do not assign public IPs in CloudFormation:

            ```yaml
            Resources:
              MyLaunchConfig:
                Type: AWS::AutoScaling::LaunchConfiguration
                Properties:
                  ImageId: ami-12345678
                  InstanceType: t3.micro
                  AssociatePublicIpAddress: false
            ```

            Note: Consider migrating to `AWS::EC2::LaunchTemplate` which is the modern replacement.
    refs:
      - url: https://docs.aws.amazon.com/autoscaling/ec2/userguide/launch-configurations.html
        title: AWS Documentation - Launch configurations
