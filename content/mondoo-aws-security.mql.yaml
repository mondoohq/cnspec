      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-12
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-10
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-aws-security-fsx-filesystem-cmk-encryption-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-fsx-filesystem-cmk-encryption-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-fsx-filesystem-cmk-encryption-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-fsx-filesystem-cmk-encryption-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-fsx-filesystem-cmk-encryption-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon FSx file systems are encrypted using a customer-managed AWS KMS key (CMK). While FSx encrypts data at rest by default, using a CMK instead of the AWS-managed key provides additional control over key management, access policies, and rotation schedules.

        **Why this matters**

        - AWS-managed encryption keys do not allow customers to control key policies, audit key usage independently, or enforce custom rotation schedules.
        - Customer-managed KMS keys enable fine-grained access control, allowing organizations to restrict which principals can encrypt and decrypt file system data.
        - CMKs integrate with AWS CloudTrail for key usage auditing, providing visibility into who accessed encrypted data and when.
        - Compliance frameworks often require customer-controlled encryption keys for sensitive file storage.

        **Risk mitigation**

        - **Key control:** Organizations maintain full control over the encryption key lifecycle, including creation, rotation, and deletion.
        - **Access auditing:** All key usage is logged in CloudTrail, enabling security monitoring and compliance reporting.
        - **Compliance:** Meets regulatory requirements for customer-managed encryption of data at rest.
      remediation:
        - id: console
          desc: |
            To ensure FSx file systems are encrypted with a customer-managed KMS key using the AWS Console:

            1. Open the AWS Console and navigate to **FSx** under **Storage** (or search for "FSx" in the search bar).
            2. Note: Encryption settings can only be configured at creation time and cannot be changed for existing file systems.
            3. Select **Create file system** and choose the appropriate file system type (Lustre, Windows File Server, NetApp ONTAP, or OpenZFS).
            4. In the **Encryption** section, choose **Customer managed KMS key** and select the desired key from the dropdown or enter a KMS key ARN.
            5. Configure the remaining file system settings (storage capacity, VPC, subnets, security groups) and complete the creation.
            6. Migrate data from the existing file system using AWS DataSync, Robocopy, or rsync depending on the file system type.
            7. Update application references to point to the new file system endpoint, then decommission the old file system.
            8. Update applications to use the new file system's DNS name or mount target.
            9. Delete the old file system after verifying the migration.
        - id: cli
          desc: |
            To ensure FSx file systems are encrypted with a customer-managed KMS key using the AWS CLI, create an FSx file system with a customer-managed KMS key:

            ```bash
            aws fsx create-file-system \
              --file-system-type LUSTRE \
              --storage-capacity 1200 \
              --subnet-ids <subnet-id> \
              --lustre-configuration DeploymentType=PERSISTENT_2,PerUnitStorageThroughput=125 \
              --kms-key-id arn:aws:kms:region:account-id:key/key-id
            ```

            Check the KMS key used by an existing file system:

            ```bash
            aws fsx describe-file-systems --file-system-ids <fs-id> \
              --query "FileSystems[*].{FileSystemId:FileSystemId,KmsKeyId:KmsKeyId}"
            ```
        - id: terraform
          desc: |
            To ensure FSx file systems are encrypted with a customer-managed KMS key in Terraform:

            ```hcl
            resource "aws_kms_key" "fsx" {
              description         = "KMS key for FSx encryption"
              enable_key_rotation = true
            }

            resource "aws_fsx_lustre_file_system" "example" {
              storage_capacity = 1200
              subnet_ids       = [aws_subnet.example.id]
              kms_key_id       = aws_kms_key.fsx.arn
            }
            ```
        - id: cloudformation
          desc: |
            To ensure FSx file systems are encrypted with a customer-managed KMS key in CloudFormation:

            ```yaml
            Resources:
              FSxKMSKey:
                Type: "AWS::KMS::Key"
                Properties:
                  Description: "KMS key for FSx encryption"
                  EnableKeyRotation: true

              FSxFileSystem:
                Type: "AWS::FSx::FileSystem"
                Properties:
                  FileSystemType: LUSTRE
                  StorageCapacity: 1200
                  SubnetIds:
                    - !Ref Subnet
                  KmsKeyId: !GetAtt FSxKMSKey.Arn
            ```
    refs:
      - url: https://docs.aws.amazon.com/fsx/latest/LustreGuide/encryption-at-rest.html
        title: AWS Documentation - Encrypting data at rest for Amazon FSx
      - url: https://docs.aws.amazon.com/kms/latest/developerguide/concepts.html#customer-cmk
        title: AWS KMS Customer Managed Keys
