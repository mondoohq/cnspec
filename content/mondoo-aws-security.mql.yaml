      )
  - uid: mondoo-aws-security-guardduty-enabled-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_guardduty_detector")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_guardduty_detector").all(
        change.after.enable == true
      )
  - uid: mondoo-aws-security-guardduty-enabled-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_guardduty_detector")
    mql: |
      terraform.state.resources.where(type == "aws_guardduty_detector").all(
        values.enable == true
      )
  - uid: mondoo-aws-security-guardduty-enabled-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::GuardDuty::Detector")
    mql: |
      cloudformation.template.resources.where(type == "AWS::GuardDuty::Detector").all(
      properties['Enable'] == true
      )
  - uid: mondoo-aws-security-guardduty-findings-publishing-frequency
    title: Ensure GuardDuty findings are published at least every 15 minutes
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-03
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-16
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-11-5-1
      compliance/soc2-2017: soc2-control-cc7-2-2
      compliance/vda-isa-5: vda-isa-5-5-2-4
    variants:
      - uid: mondoo-aws-security-guardduty-findings-publishing-frequency-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-guardduty-findings-publishing-frequency-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-guardduty-findings-publishing-frequency-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-guardduty-findings-publishing-frequency-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-guardduty-findings-publishing-frequency-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon GuardDuty detectors are configured to publish findings at least every 15 minutes. Timely publication of findings ensures security teams can respond quickly to detected threats.

        **Why this matters**

        - Delayed finding publication can increase the window of exposure to active threats.
        - The default publishing frequency may be set to one hour, delaying incident response.
        - Faster notification enables quicker containment and remediation of security incidents.

        **Risk mitigation**

        - **Rapid response:** Ensures security findings are available for review within 15 minutes.
        - **Incident containment:** Reduces the time between threat detection and response.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and navigate to **Amazon GuardDuty**.
        2. In the left navigation pane, select **Settings**.
        3. Under **Findings export options**, locate the **Updated findings** publishing frequency.
        4. Verify the frequency is set to **15 minutes**.

        A passing detector shows a findings publishing frequency of **15 minutes**. A failing detector shows **1 hour** or **6 hours**.

        ### Audit via CLI

        1. List all GuardDuty detectors and check the `FindingPublishingFrequency` for each:

        ```bash
        aws guardduty list-detectors --query "DetectorIds" --output text | \
          tr '\t' '\n' | \
          xargs -I {} aws guardduty get-detector --detector-id {} \
          --query "{DetectorId:DetectorId,FindingPublishingFrequency:FindingPublishingFrequency}"
        ```

        A passing detector returns `"FindingPublishingFrequency": "FIFTEEN_MINUTES"`. A failing detector returns `"ONE_HOUR"` or `"SIX_HOURS"`.

      remediation:
        - id: console
          desc: |
            To ensure GuardDuty findings are published at least every 15 minutes using the AWS Console:

            1. Navigate to the Amazon GuardDuty Console.
            2. Select Settings.
            3. Under Findings export options, set the Updated findings frequency to 15 minutes.
            4. Select Save.
        - id: cli
          desc: |
            To ensure GuardDuty findings are published at least every 15 minutes using the AWS CLI:

            ```bash
            aws guardduty update-detector \
              --detector-id <detector-id> \
              --finding-publishing-frequency FIFTEEN_MINUTES
            ```
        - id: terraform
          desc: |
            To ensure GuardDuty findings are published at least every 15 minutes in Terraform:

            ```hcl
            resource "aws_guardduty_detector" "main" {
              enable                       = true
              finding_publishing_frequency = "FIFTEEN_MINUTES"
            }
            ```
        - id: cloudformation
          desc: |
            To ensure GuardDuty findings are published at least every 15 minutes in CloudFormation:

            ```yaml
            Resources:
              GuardDutyDetector:
                Type: AWS::GuardDuty::Detector
                Properties:
                  Enable: true
                  FindingPublishingFrequency: FIFTEEN_MINUTES
            ```
    refs:
      - url: https://docs.aws.amazon.com/guardduty/latest/ug/guardduty_exportfindings.html
        title: AWS Documentation - Exporting GuardDuty findings
  - uid: mondoo-aws-security-guardduty-findings-publishing-frequency-aws
    filters: asset.platform == "aws"
    mql: |
      aws.guardduty.detectors.length > 0 &&
      aws.guardduty.detectors.all(findingPublishingFrequency == "FIFTEEN_MINUTES")
