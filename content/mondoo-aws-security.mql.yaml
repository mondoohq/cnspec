          aws sagemaker describe-processing-job \
            --processing-job-name "$job" \
            --query '{ProcessingJobName:ProcessingJobName,EnableNetworkIsolation:NetworkConfig.EnableNetworkIsolation}' \
            --output table
        done
        ```

        A passing processing job returns `EnableNetworkIsolation: true` under `NetworkConfig`. A failing processing job returns `EnableNetworkIsolation: false` or omits the field.
      remediation:
        - id: console
          desc: |
            To ensure SageMaker processing jobs have network isolation enabled using the AWS Console:

            1. Navigate to the **SageMaker Console**.
            2. When creating a processing job, under **Network**, enable **Network isolation**.
            3. This prevents the processing container from making outbound network calls.
        - id: cli
          desc: |
            To ensure SageMaker processing jobs have network isolation enabled using the AWS CLI, create a processing job with network isolation enabled:

            ```bash
            aws sagemaker create-processing-job \
              --processing-job-name "isolated-processing-job" \
              --app-specification ImageUri=<image-uri> \
              --role-arn "arn:aws:iam::<account-id>:role/SageMakerRole" \
              --processing-resources '{"ClusterConfig":{"InstanceType":"ml.m5.large","InstanceCount":1,"VolumeSizeInGB":50}}' \
              --network-config EnableNetworkIsolation=true
            ```
        - id: terraform
          desc: |
            SageMaker processing jobs are ephemeral and created via the `CreateProcessingJob` API. There is no corresponding Terraform resource type. Use the AWS CLI or SDK to configure network isolation when creating processing jobs.
        - id: cloudformation
          desc: |
            SageMaker processing jobs are created via the `CreateProcessingJob` API and do not have a corresponding CloudFormation resource type. Use the AWS CLI or SDK to configure network isolation when creating processing jobs.
