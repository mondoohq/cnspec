  - uid: mondoo-aws-security-access-keys-rotated
    title: Ensure IAM user access keys are rotated
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-07
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-5-17
      compliance/nis-2: nis-2-21-2-g
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-5
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-10
      compliance/pci-dss-4: pcidss-requirement-8-3-9
      compliance/soc2-2017: soc2-control-cc6-1-9
      compliance/vda-isa-5: vda-isa-5-4-1-3
    props:
      - uid: mondooAWSSecurityMaxAccessKeyAge
        title: Define the maximum number of days an IAM key is allowed to exist before rotation
        mql: "90"
    variants:
      - uid: mondoo-aws-security-access-keys-rotated-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-access-keys-rotated-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that active AWS IAM user access keys are rotated at least every 90 days. Access keys are long-lived programmatic credentials; once issued, they remain valid indefinitely unless explicitly rotated or deleted, meaning a key leaked months ago may still grant an attacker access to AWS APIs.

        **Why this matters**

        - **Credential exposure window:** The longer an access key exists without rotation, the greater the chance it has been leaked through code commits, log files, or misconfigured storage, and the longer an attacker can exploit it undetected.
        - **Key hygiene enforcement:** Regular rotation forces teams to audit which applications and scripts hold credentials, surfacing forgotten or orphaned keys.
        - **Incident response clarity:** Knowing that all active keys are recent makes it easier to determine whether a suspicious API call used a current or previously revoked credential.

        **Risk mitigation**

        - **Compromised credential invalidation:** Rotating keys periodically ensures that any key leaked before the last rotation is no longer valid, limiting the damage from past exposures.
        - **Stale credential cleanup:** The rotation process identifies keys that are no longer in use, prompting their deletion and reducing the total number of active credentials that could be stolen.
        - **Detection opportunity:** Monitoring for API calls that occur after a key is rotated but before the old key is deleted can surface unauthorized use of the old credential.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and open the IAM console at https://console.aws.amazon.com/iam/.
        2. In the left navigation pane, choose **Users**.
        3. For each user, select the user name and choose the **Security credentials** tab.
        4. Under **Access keys**, review the **Created** date for any active keys.
        5. Identify any active keys where the creation date is more than 90 days ago.

        A passing user has no active access keys older than 90 days. A failing user has at least one active access key that was created more than 90 days ago and has not been rotated.

        ### Audit via CLI

        1. List all IAM users:

        ```bash
        aws iam list-users --query "Users[*].UserName" --output text
        ```

        2. For each user, check the creation date of active access keys:

        ```bash
        aws iam list-access-keys --user-name <username> --query "AccessKeyMetadata[?Status=='Active'].{KeyId:AccessKeyId,Created:CreateDate}"
        ```

        A passing user has no active keys with a `Created` date more than 90 days in the past. A failing user has at least one active key whose `Created` date exceeds the 90-day rotation window.
      remediation:
        - id: console
          desc: |
            To define the maximum number of days an IAM key is allowed to exist before rotation using the AWS Console:

            1.  Navigate to the AWS IAM Console.
            2.  Select Users in the left panel.
            3.  Select an IAM user and go to the Security Credentials tab.
            4.  Under Access Keys, check the Last Used and Created Date columns.
            5.  If a key is older than 90 days, create a new access key:
              - Select Create access key
              - Update AWS applications and scripts to use the new key
              - Deactivate and delete the old access key
            6.  Repeat this process for all IAM users with access keys.
        - id: cli
          desc: |
            To define the maximum number of days an IAM key is allowed to exist before rotation using the AWS CLI, list all IAM users with active access keys:

            ```bash
            aws iam list-users --query "Users[*].UserName"
            ```

            Check the age of access keys for each user:

            ```bash
            aws iam list-access-keys --user-name <username> --query "AccessKeyMetadata[*].{AccessKeyId:AccessKeyId, CreateDate:CreateDate}"
            ```

            If a key is older than 90 days, create a new key and delete the old one:

            ```bash
            aws iam create-access-key --user-name <username>
            aws iam delete-access-key --access-key-id <old-access-key-id> --user-name <username>
            ```
        - id: terraform
          desc: |
            To define the maximum number of days an IAM key is allowed to exist before rotation in Terraform, AWS does not support automatic access key rotation in Terraform, but you can enforce IAM policies to require regular key rotation:

            ```hcl
            resource "aws_iam_policy" "enforce_key_rotation" {
              name        = "EnforceKeyRotation"
              description = "Requires IAM users to rotate access keys every 90 days"

              policy = jsonencode({
                Version = "2012-10-17",
                Statement = [
                  {
                    Effect   = "Deny",
                    Action   = "iam:UpdateAccessKey",
                    Resource = "*",
                    Condition = {
                      NumericGreaterThan = {
                        "aws:MultiFactorAuthAge": 7776000  # 90 days in seconds
                      }
                    }
                  }
                ]
              })
            }
            ```
        - id: cloudformation
          desc: |
            To define the maximum number of days an IAM key is allowed to exist before rotation in CloudFormation:

            ```yaml
            Resources:
              # IAM policy to enforce key rotation
              EnforceKeyRotationPolicy:
                Type: AWS::IAM::ManagedPolicy
                Properties:
                  ManagedPolicyName: EnforceKeyRotation
                  Description: Requires IAM users to rotate access keys every 90 days
                  PolicyDocument:
                    Version: '2012-10-17'
                    Statement:
                      - Effect: Deny
                        Action: 'iam:UpdateAccessKey'
                        Resource: '*'
                        Condition:
                          NumericGreaterThan:
                            'aws:MultiFactorAuthAge': 7776000  # 90 days in seconds
            ```
    refs:
      - url: https://docs.aws.amazon.com/IAM/latest/UserGuide/id_credentials_access-keys.html
        title: AWS Documentation - Manage access keys for IAM users
  - uid: mondoo-aws-security-access-keys-rotated-aws
    filters: asset.platform == "aws"
    mql: |
      aws.iam.credentialReport.where(accessKey1Active == true && time.now - createdAt > props.mondooAWSSecurityMaxAccessKeyAge * time.day).all(time.now - accessKey1LastRotated < props.mondooAWSSecurityMaxAccessKeyAge * time.day)
      aws.iam.credentialReport.where(accessKey2Active == true && time.now - createdAt > props.mondooAWSSecurityMaxAccessKeyAge * time.day).all(time.now - accessKey2LastRotated < props.mondooAWSSecurityMaxAccessKeyAge * time.day)
  - uid: mondoo-aws-security-access-keys-rotated-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_iam_access_key")
    mql: |
      terraform.state.resources.where(type == "aws_iam_access_key").all(time.now - parse.date(values.create_date) < props.mondooAWSSecurityMaxAccessKeyAge * time.day)
  - uid: mondoo-aws-security-mfa-enabled-for-iam-console-access
    title: Ensure MFA is enabled for all IAM users with console access
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-14
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-j
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-3
      compliance/pci-dss-4: pcidss-requirement-8-4-2
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-2
    variants:
      - uid: mondoo-aws-security-mfa-enabled-for-iam-console-access-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-mfa-enabled-for-iam-console-access-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-mfa-enabled-for-iam-console-access-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-mfa-enabled-for-iam-console-access-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that every IAM user with AWS Management Console access has Multi-Factor Authentication enabled. Console-enabled IAM users authenticate with a username and password; without MFA, a single stolen credential is sufficient for an attacker to log in and perform any action permitted by that user's policies.

        **Why this matters**

        - **Password theft resilience:** MFA ensures that phished or leaked passwords cannot be used for interactive login without also compromising the physical MFA device.
        - **Credential stuffing protection:** Passwords reused across services are frequently tested against cloud consoles; MFA breaks the direct path from a leaked password to console access.
        - **Insider threat mitigation:** MFA makes it harder for someone with knowledge of a colleague's password to access the console without detection, since the MFA prompt creates an additional out-of-band signal.
        - **Privileged action gating:** Many sensitive console operations such as policy modifications and resource deletion are only accessible through the console; protecting console access with MFA reduces the risk of high-impact accidental or malicious changes.

        **Risk mitigation**

        - **Unauthorized access prevention:** An attacker who obtains console credentials through phishing, credential stuffing, or insider access cannot authenticate without the second factor.
        - **Breach impact reduction:** Requiring MFA for every console user ensures that compromising one credential does not immediately translate into account access, giving security teams time to detect and respond.
        - **Policy compliance:** Most cloud security benchmarks require MFA for all users with console access as a baseline control.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and open the IAM console at https://console.aws.amazon.com/iam/.
        2. In the left navigation pane, choose **Credential report**.
        3. Choose **Download credential report** to download the CSV file.
        4. Open the CSV and filter for rows where `password_enabled` is `true`.
        5. For each such row, check the `mfa_active` column.

        A passing user with console access shows `true` in the `mfa_active` column. A failing user with console access shows `false` in the `mfa_active` column.

        ### Audit via CLI

        1. Generate and download the credential report:

        ```bash
        aws iam generate-credential-report
        aws iam get-credential-report --query 'Content' --output text | base64 --decode
        ```

        2. Filter for console-enabled users without MFA:

        ```bash
        aws iam get-credential-report --query 'Content' --output text | base64 --decode | awk -F',' 'NR==1 || ($4=="true" && $8=="false")'
        ```

        A passing account has no rows where `password_enabled` is `true` and `mfa_active` is `false`. A failing account has one or more console-enabled users with `mfa_active` set to `false`.
      remediation:
        - id: console
          desc: |
            To ensure MFA is enabled for all IAM users with console access using the AWS Console:

            1.  Navigate to the AWS IAM Console.
            2.  Select Users in the left panel.
            3.  Identify users with Console Access enabled.
            4.  Select a user and go to the Security Credentials tab.
            5.  Under Multi-Factor Authentication (MFA), check if MFA is enabled.
            6.  If MFA is not enabled:
              - Select Assign MFA Device
              - Choose a method (Virtual MFA Device, FIDO Security Key, or Hardware MFA Token)
              - Follow the setup process and enter the required MFA codes
            7.  Repeat this process for all IAM users with console access.
        - id: cli
          desc: |
            To ensure MFA is enabled for all IAM users with console access using the AWS CLI, list IAM users with console access and check their MFA status:

            ```bash
            aws iam list-users --query "Users[*].UserName"
            ```

            For each user, check if MFA is enabled:

            ```bash
            aws iam list-mfa-devices --user-name <username>
            ```

            If no MFA device is listed, enforce MFA by setting up a virtual MFA device:

            ```bash
            aws iam enable-mfa-device --user-name <username> --serial-number "arn-of-mfa-device" --authentication-code1 123456 --authentication-code2 654321
            ```
        - id: terraform
          desc: |
            To ensure MFA is enabled for all IAM users with console access in Terraform, AWS does not allow enforcing MFA directly via Terraform, but you can create an IAM policy that denies access unless MFA is enabled:

            ```hcl
            resource "aws_iam_policy" "enforce_mfa" {
              name        = "EnforceMFA"
              description = "Require MFA for all IAM users with console access"

              policy = jsonencode({
                Version = "2012-10-17",
                Statement = [
                  {
                    Effect   = "Deny",
                    Action   = [
                      "ec2:*",
                      "s3:*",
                      "iam:*",
                      "lambda:*"
                    ],
                    Resource  = "*",
                    Condition = {
                      Bool = {
                        "aws:MultiFactorAuthPresent": "false"
                      }
                    }
                  }
                ]
              })
            }
            ```
        - id: cloudformation
          desc: |
            To ensure MFA is enabled for all IAM users with console access in CloudFormation:

            ```yaml
            Resources:
              EnforceMFAPolicy:
                Type: AWS::IAM::ManagedPolicy
                Properties:
                  ManagedPolicyName: EnforceMFA
                  Description: Require MFA for all IAM users with console access
                  PolicyDocument:
                    Version: '2012-10-17'
                    Statement:
                      - Effect: Deny
                        Action:
                          - 'ec2:*'
                          - 's3:*'
                          - 'iam:*'
                          - 'lambda:*'
                        Resource: '*'
                        Condition:
                          Bool:
                            'aws:MultiFactorAuthPresent': 'false'

            ```
    refs:
      - url: https://docs.aws.amazon.com/IAM/latest/UserGuide/id_credentials_mfa.html
        title: AWS Multi-factor authentication in IAM
      - url: https://docs.aws.amazon.com/IAM/latest/UserGuide/id_credentials_mfa_enable_virtual.html
        title: Assign a virtual MFA device in the AWS Management Console
      - url: https://registry.terraform.io/providers/hashicorp/aws/latest/docs
        title: Terraform Documentation - AWS Provider
  - uid: mondoo-aws-security-mfa-enabled-for-iam-console-access-aws
    filters: asset.platform == "aws"
    mql: |
      aws.iam.credentialReport.where(passwordEnabled == true).all(mfaActive == true)
  - uid: mondoo-aws-security-mfa-enabled-for-iam-console-access-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_iam_policy")
    mql: |
      terraform.resources.where(nameLabel == "aws_iam_policy").any(
        arguments.policy.any(
          _['Statement'].any(
            _['Condition']['Bool']['aws:MultiFactorAuthPresent'] == false
              && _['Effect'] == "Deny"
              && _['Resource'] == "*"
          )
        )
      )
  - uid: mondoo-aws-security-mfa-enabled-for-iam-console-access-terraform-plan
    filters: asset.platform == "terraform-plan"
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_iam_policy").any(
        change.after.policy.contains('Deny') &&
        change.after.policy.contains('aws:MultiFactorAuthPresent') &&
        change.after.policy.contains('false')
      )
  - uid: mondoo-aws-security-mfa-enabled-for-iam-console-access-terraform-state
    filters: asset.platform == "terraform-state"
    mql: |
      terraform.state.resources.where(type == "aws_iam_policy").any(
        values.policy.contains('Deny') &&
        values.policy.contains('aws:MultiFactorAuthPresent') &&
        values.policy.contains('false')
      )
  - uid: mondoo-aws-security-iam-group-has-users-check
    title: Ensure IAM groups are utilized by assigning at least one user
    impact: 30
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-3-1
      compliance/vda-isa-5: vda-isa-5-4-2-1
    variants:
      - uid: mondoo-aws-security-iam-group-has-users-check-aws
        tags:
          mondoo.com/filter-title: AWS IAM Group
          mondoo.com/filter-icon: aws
