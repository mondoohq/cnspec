  - uid: mondoo-aws-security-eks-cluster-deletion-protection
    title: Ensure Amazon EKS clusters have deletion protection enabled
    impact: 50
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-bcr-08
      compliance/dora: dora-art-12
      compliance/hipaa: hipaa-security-ss164-308-a-7-ii-a-contingency-plan-data-backup-plan
      compliance/iso-27001-2022: iso-27001-2022-a-8-14
      compliance/nis-2: nis-2-21-2-c
      compliance/nist-csf-1: nist-csf-1-pr-ip-4
      compliance/nist-csf-2: nist-csf-2-pr-ds-11
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cp-9
      compliance/nist-sp-800-171: "false"
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc9-1-1
      compliance/vda-isa-5: false
    variants:
      - uid: mondoo-aws-security-eks-cluster-deletion-protection-aws
        tags:
          mondoo.com/filter-title: AWS EKS Cluster
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-eks-cluster-deletion-protection-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-eks-cluster-deletion-protection-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-eks-cluster-deletion-protection-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-eks-cluster-deletion-protection-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon EKS clusters have deletion protection enabled. An attacker with compromised IAM credentials can delete unprotected EKS clusters to destroy Kubernetes infrastructure, eliminating all running workloads, RBAC configurations, network policies, and security controls in a single API call.

        **Why this matters**

        Without deletion protection:

        - An attacker with `eks:DeleteCluster` permissions can destroy the entire Kubernetes control plane, immediately terminating all workloads and severing service connectivity.
        - Cluster deletion destroys RBAC policies, network policies, service meshes, and security admission controllers, removing all in-cluster security controls simultaneously.
        - EKS cluster recovery requires rebuilding from scratch and redeploying all workloads, creating an extended outage window that an attacker can exploit for further damage.
        - Targeted infrastructure destruction is a common post-compromise action to cover tracks or maximize business impact.

        **Risk mitigation**

        - **Destructive attack prevention:** Requires an attacker to make two API calls (disable protection, then delete), creating an additional detection opportunity via CloudTrail.
        - **Security control preservation:** Protects RBAC, network policies, and admission controllers from being destroyed in a single action.
        - **Incident response window:** The additional step buys time for automated alerting to detect unauthorized modification attempts before the cluster is destroyed.
      remediation:
        - id: console
          desc: |
            To ensure Amazon EKS clusters have deletion protection enabled using the AWS Console:

            1. Navigate to the Amazon EKS Console.
            2. Select the EKS cluster you want to configure.
            3. Select Manage deletion protection.
            4. Enable deletion protection.
            5. Select Save changes.
        - id: cli
          desc: |
            To ensure Amazon EKS clusters have deletion protection enabled using the AWS CLI, check if deletion protection is enabled:

            ```bash
            aws eks describe-cluster --name <cluster_name> \
              --query "cluster.deletionProtection"
            ```

            The value should be `true`. To enable deletion protection:

            ```bash
            aws eks update-cluster-config --name <cluster_name> \
              --deletion-protection
            ```
        - id: terraform
          desc: |
            To ensure Amazon EKS clusters have deletion protection enabled in Terraform:

            ```hcl
            resource "aws_eks_cluster" "example" {
              name                  = "example-cluster"
              role_arn              = aws_iam_role.eks_role.arn
              deletion_protection   = true  # Enable deletion protection

              vpc_config {
                subnet_ids = [aws_subnet.eks_subnet.id]
              }

              access_config {
                authentication_mode = "API"
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure Amazon EKS clusters have deletion protection enabled in CloudFormation:

            ```yaml
            Resources:
              MyEKSCluster:
                Type: AWS::EKS::Cluster
                Properties:
                  Name: example-cluster
                  RoleArn: !GetAtt eksRole.Arn
                  ResourcesVpcConfig:
                    SubnetIds:
                      - !Ref eksSubnet
            ```
    refs:
      - url: https://docs.aws.amazon.com/eks/latest/userguide/delete-cluster.html
        title: AWS Documentation - Deleting an Amazon EKS cluster
      - url: https://docs.aws.amazon.com/eks/latest/best-practices/security.html
        title: Amazon EKS Security Best Practices
  - uid: mondoo-aws-security-eks-cluster-deletion-protection-aws
    filters: asset.platform == "aws-eks-cluster"
    mql: aws.eks.cluster.deletionProtection == true
  - uid: mondoo-aws-security-eks-cluster-deletion-protection-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_eks_cluster")
    mql: |
      terraform.resources.where(nameLabel == "aws_eks_cluster").all(
        arguments.deletion_protection == true
      )
