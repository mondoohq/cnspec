  - uid: mondoo-aws-security-neptune-cluster-snapshot-encrypted
    title: Ensure Neptune DB cluster snapshots are encrypted at rest
    impact: 80
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/soc2-2017: soc2-control-cc6-1-10
    variants:
      - uid: mondoo-aws-security-neptune-cluster-snapshot-encrypted-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/icon: aws
      - uid: mondoo-aws-security-neptune-cluster-snapshot-encrypted-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/icon: terraform
      - uid: mondoo-aws-security-neptune-cluster-snapshot-encrypted-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/icon: terraform
      - uid: mondoo-aws-security-neptune-cluster-snapshot-encrypted-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/icon: terraform
    docs:
      desc: |
        This check ensures that Amazon Neptune DB cluster snapshots are encrypted at rest. While the existing cluster encryption check verifies that Neptune clusters themselves are encrypted, snapshots can be shared across accounts, making their encryption status independently important.

        **Why this matters**

        Neptune DB cluster snapshots contain a complete copy of the graph database at a point in time. Unencrypted snapshots pose several risks:

        - Snapshots shared with other AWS accounts expose unencrypted data to those accounts.
        - If a snapshot is made public (accidentally or intentionally), all graph data is exposed in plaintext.
        - Backup copies of sensitive graph data should maintain the same encryption standards as the source cluster.
        - Compliance frameworks require encryption at rest for all copies and backups of sensitive data.

        **Risk mitigation:**

        - Ensures all snapshots maintain encryption at rest, protecting data in backup copies.
        - Prevents accidental exposure of plaintext data when snapshots are shared.
        - Maintains compliance with data protection requirements across all copies of data.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            Neptune snapshots inherit the encryption setting from the source cluster. To ensure snapshots are encrypted:

            1. Navigate to the Amazon Neptune Console.
            2. Select Databases in the left panel.
            3. Verify the source cluster has encryption enabled.
            4. If the cluster is not encrypted, create a new encrypted cluster and migrate data.
            5. For existing unencrypted snapshots, copy them with encryption enabled:
              - Select Snapshots in the left panel.
              - Select the unencrypted snapshot.
              - Choose Actions > Copy snapshot.
              - Enable encryption and select a KMS key.
              - Select Copy snapshot.
        - id: cli
          desc: |
            **Using AWS CLI**

            Check if Neptune cluster snapshots are encrypted:

            ```bash
            aws neptune describe-db-cluster-snapshots \
              --query "DBClusterSnapshots[*].{SnapshotId:DBClusterSnapshotIdentifier,Encrypted:StorageEncrypted}"
            ```

            Copy an unencrypted snapshot with encryption:

            ```bash
            aws neptune copy-db-cluster-snapshot \
              --source-db-cluster-snapshot-identifier <snapshot-id> \
              --target-db-cluster-snapshot-identifier <new-snapshot-id> \
              --kms-key-id arn:aws:kms:<region>:<account-id>:key/<key-id>
            ```
        - id: terraform
          desc: |
            **Using Terraform**

            Ensure the source Neptune cluster is encrypted (snapshots inherit encryption):

            ```hcl
            resource "aws_neptune_cluster" "example" {
              cluster_identifier  = "example"
              engine              = "neptune"
              storage_encrypted   = true
              kms_key_arn         = aws_kms_key.neptune.arn
            }
            ```
        - id: cloudformation
          desc: |
            **Using CloudFormation**

            Ensure the source Neptune cluster is encrypted (snapshots inherit encryption):

            ```yaml
            Resources:
              NeptuneCluster:
                Type: AWS::Neptune::DBCluster
                Properties:
                  DBClusterIdentifier: example
                  StorageEncrypted: true
                  KmsKeyId: !Ref NeptuneKMSKey
            ```
    refs:
      - url: https://docs.aws.amazon.com/neptune/latest/userguide/encrypt.html
        title: AWS Documentation - Encrypting Neptune resources
      - url: https://docs.aws.amazon.com/neptune/latest/userguide/backup-restore-overview.html
        title: AWS Documentation - Neptune DB cluster snapshots
  - uid: mondoo-aws-security-neptune-cluster-snapshot-encrypted-aws
    filters: asset.platform == "aws"
    mql: |
      aws.neptune.clusters.all(
        snapshots.all(storageEncrypted == true)
      )
  - uid: mondoo-aws-security-neptune-cluster-snapshot-encrypted-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_neptune_cluster")
    mql: |
      terraform.resources.where(nameLabel == "aws_neptune_cluster").all(
        arguments.storage_encrypted == true
      )
  - uid: mondoo-aws-security-neptune-cluster-snapshot-encrypted-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_neptune_cluster")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_neptune_cluster").all(
        change.after.storage_encrypted == true
      )
  - uid: mondoo-aws-security-neptune-cluster-snapshot-encrypted-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_neptune_cluster")
    mql: |
      terraform.state.resources.where(type == "aws_neptune_cluster").all(
        values.storage_encrypted == true
      )
  - uid: mondoo-aws-security-ec2-source-dest-check
    title: Ensure EC2 instances have source/destination check enabled
    impact: 60
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/soc2-2017: soc2-control-cc6-6-1
    variants:
      - uid: mondoo-aws-security-ec2-source-dest-check-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/icon: aws
      - uid: mondoo-aws-security-ec2-source-dest-check-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/icon: terraform
      - uid: mondoo-aws-security-ec2-source-dest-check-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/icon: terraform
      - uid: mondoo-aws-security-ec2-source-dest-check-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/icon: terraform
    docs:
      desc: |
        This check ensures that EC2 instances have the source/destination check enabled. When this check is disabled, an instance can route network traffic that is not specifically destined for or originating from the instance, effectively allowing it to act as a network bridge, NAT gateway, or router.

        **Why this matters**

        Disabling source/destination checks on EC2 instances introduces network security risks:

        - An instance with this check disabled can forward traffic between subnets, potentially bypassing security group rules and network ACLs.
        - Compromised instances with disabled source/dest checks can be used to intercept or redirect network traffic (man-in-the-middle attacks).
        - It can mask the true source of malicious traffic by allowing an instance to send packets with spoofed source IP addresses.
        - Source/destination checks should only be disabled on instances intentionally functioning as NAT gateways, VPN appliances, or load balancers.

        **Risk mitigation:**

        - Prevents instances from being used as unauthorized network bridges or traffic interceptors.
        - Maintains the integrity of VPC routing by ensuring instances only process their own traffic.
        - Reduces the risk of network-based attacks from compromised instances.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            1. Navigate to the Amazon EC2 Console.
            2. Select Instances in the left panel.
            3. Select the instance to update.
            4. Choose Actions > Networking > Change source/destination check.
            5. Ensure the source/destination check is enabled (checked).
            6. Select Save.
        - id: cli
          desc: |
            **Using AWS CLI**

            Enable source/destination check on an instance:

            ```bash
            aws ec2 modify-instance-attribute \
              --instance-id <instance-id> \
              --source-dest-check
            ```

            Verify the current setting:

            ```bash
            aws ec2 describe-instance-attribute \
              --instance-id <instance-id> \
              --attribute sourceDestCheck
            ```
        - id: terraform
          desc: |
            **Using Terraform**

            ```hcl
            resource "aws_instance" "example" {
              ami               = "ami-12345678"
              instance_type     = "t3.micro"
              source_dest_check = true  # This is the default
            }
            ```
        - id: cloudformation
          desc: |
            **Using CloudFormation**

            ```yaml
            Resources:
              EC2Instance:
                Type: AWS::EC2::Instance
                Properties:
                  InstanceType: t3.micro
                  ImageId: ami-12345678
                  SourceDestCheck: true
            ```
    refs:
      - url: https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/using-eni.html#change_source_dest_check
        title: AWS Documentation - Change the source/destination check
      - url: https://docs.aws.amazon.com/vpc/latest/userguide/VPC_NAT_Instance.html
        title: AWS Documentation - NAT instances
  - uid: mondoo-aws-security-ec2-source-dest-check-aws
    filters: |
      asset.platform == "aws"
    mql: |
      aws.ec2.instances.where(
        state != /terminated|shutting-down/
      ).all(
        sourceDestCheck == true
      )
  - uid: mondoo-aws-security-ec2-source-dest-check-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_instance")
    mql: |
      terraform.resources.where(nameLabel == "aws_instance").all(
        arguments.source_dest_check != false
      )
  - uid: mondoo-aws-security-ec2-source-dest-check-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_instance")
    mql: terraform.plan.resourceChanges.where(type == "aws_instance").all(change.after.source_dest_check != false)
  - uid: mondoo-aws-security-ec2-source-dest-check-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_instance")
    mql: terraform.state.resources.where(type == "aws_instance").all(values.source_dest_check != false)
  - uid: mondoo-aws-security-ec2-uefi-boot-mode
    title: Ensure EC2 instances use UEFI boot mode
    impact: 60
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-1
      compliance/nist-csf-2: nist-csf-2-pr-ps-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-1
      compliance/soc2-2017: soc2-control-cc6-8-2
    variants:
      - uid: mondoo-aws-security-ec2-uefi-boot-mode-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/icon: aws
    docs:
      desc: |
        This check ensures that Amazon EC2 instances use UEFI boot mode instead of legacy BIOS. UEFI supports Secure Boot, which validates that boot software is signed and untampered, protecting against boot-level malware such as rootkits and bootkits.

        **Why this matters**

        - Legacy BIOS boot mode lacks Secure Boot capabilities, leaving instances vulnerable to boot-level attacks that execute before the operating system loads.
        - UEFI Secure Boot ensures that only trusted, signed firmware and bootloaders are executed during startup.
        - Modern instance types and AMIs support UEFI, and AWS recommends migrating away from legacy BIOS for improved security posture.
        - Compliance frameworks including NIST 800-53 and CIS Benchmarks recommend firmware integrity protections.

        **Risk mitigation:**

        - **Boot integrity:** Prevents unauthorized modification of boot components.
        - **Malware protection:** Blocks rootkits and bootkits that tamper with the boot process.
        - **Modern security:** Aligns with current best practices for instance hardening.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            1. Navigate to the **EC2 Console**.
            2. When launching new instances, select an AMI that supports UEFI boot mode.
            3. For existing instances, check the **Boot mode** in instance details.
            4. To migrate, create a new UEFI-compatible AMI and launch replacement instances.
            5. Note: Boot mode cannot be changed on a running instance; a new instance must be launched.
        - id: cli
          desc: |
            **Using AWS CLI**

            Check the boot mode of an instance:

            ```bash
            aws ec2 describe-instances --instance-ids <instance-id> \
              --query "Reservations[*].Instances[*].[InstanceId,BootMode,CurrentInstanceBootMode]"
            ```

            Launch a new instance with UEFI boot mode by selecting a UEFI-compatible AMI:

            ```bash
            aws ec2 describe-images --image-ids <ami-id> \
              --query "Images[*].[ImageId,BootMode]"
            ```
    refs:
      - url: https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/ami-boot.html
        title: Boot modes for Amazon EC2 instances
  - uid: mondoo-aws-security-ec2-uefi-boot-mode-aws
    filters: asset.platform == "aws"
    mql: |
      aws.ec2.instances.where(state == "running").all(
        currentInstanceBootMode == "uefi" || currentInstanceBootMode == "uefi-preferred"
      )
  - uid: mondoo-aws-security-ec2-no-paravirtual-instances
    title: Ensure EC2 instances use HVM virtualization
    impact: 70
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-1
      compliance/nist-csf-2: nist-csf-2-pr-ps-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-1
      compliance/soc2-2017: soc2-control-cc6-8-2
    variants:
      - uid: mondoo-aws-security-ec2-no-paravirtual-instances-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/icon: aws
    docs:
      desc: |
        This check ensures that Amazon EC2 instances use Hardware Virtual Machine (HVM) virtualization instead of paravirtual (PV). PV instances use older virtualization technology with a larger attack surface and are not supported on modern instance types.

        **Why this matters**

        - Paravirtual instances rely on modified guest kernels that interact directly with the hypervisor, increasing the potential attack surface for guest-to-host escape vulnerabilities.
        - HVM instances run on fully virtualized hardware with hardware-assisted virtualization extensions (Intel VT-x, AMD-V), providing stronger isolation.
        - AWS has deprecated PV instance types, and no modern instance families support PV virtualization.
        - PV instances cannot use Enhanced Networking, EBS optimization, or GPU capabilities available to HVM instances.

        **Risk mitigation:**

        - **Stronger isolation:** HVM provides hardware-level isolation between guest and host.
        - **Reduced attack surface:** Eliminates PV-specific hypervisor call interfaces.
        - **Modern security features:** HVM supports NitroTPM, Secure Boot, and other advanced security features.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            1. Navigate to the **EC2 Console** and select **Instances**.
            2. Check the **Virtualization type** column for each instance.
            3. For any PV instances, plan migration to HVM:
              - Create an HVM-compatible AMI or select a new HVM AMI.
              - Launch a replacement HVM instance.
              - Migrate workloads and terminate the PV instance.
        - id: cli
          desc: |
            **Using AWS CLI**

            List instances with their virtualization type:

            ```bash
            aws ec2 describe-instances \
              --query "Reservations[*].Instances[*].[InstanceId,VirtualizationType,State.Name]" \
              --output table
            ```

            Filter for paravirtual instances:

            ```bash
            aws ec2 describe-instances --filters "Name=virtualization-type,Values=paravirtual" \
              --query "Reservations[*].Instances[*].InstanceId"
            ```
    refs:
      - url: https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/virtualization_types.html
        title: Amazon EC2 virtualization types
  - uid: mondoo-aws-security-ec2-no-paravirtual-instances-aws
    filters: asset.platform == "aws"
    mql: |
      aws.ec2.instances.where(state == "running").all(
        virtualizationType == "hvm"
      )
  - uid: mondoo-aws-security-ec2-hibernation-encrypted-check
    title: Ensure EBS encryption by default is enabled when EC2 hibernation is in use
    impact: 50
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/soc2-2017: soc2-control-cc6-1-10
    variants:
      - uid: mondoo-aws-security-ec2-hibernation-encrypted-check-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/icon: aws
    docs:
      desc: |
        This check ensures that EBS encryption by default is enabled in accounts where EC2 instances use hibernation. When an instance hibernates, the contents of RAM — which may contain credentials, encryption keys, session tokens, and other sensitive data — are written to the root EBS volume. Enabling EBS encryption by default ensures that all newly created volumes, including those used by hibernation-enabled instances, are automatically encrypted.

        **Why this matters**

        - During hibernation, the entire contents of instance memory are persisted to the root EBS volume, including any sensitive data resident in RAM.
        - Without encryption, this memory dump is stored in plaintext on the underlying storage, where it could be exposed through snapshot sharing, volume detachment, or storage-level compromise.
        - AWS requires EBS encryption for hibernation. Enabling EBS encryption by default at the account level is the most reliable way to enforce this, as it applies to all new volumes automatically.
        - Note: This check validates the account-level EBS encryption-by-default setting, not individual volume encryption. Instances launched before this setting was enabled may still have unencrypted volumes.

        **Risk mitigation:**

        - **Account-level enforcement:** Ensures all new EBS volumes are encrypted by default, including those used for hibernation.
        - **Credential protection:** Prevents exposure of in-memory secrets, tokens, and keys written during hibernation.
        - **Compliance:** Meets encryption-at-rest requirements for hibernation data.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            1. Navigate to the **EC2 Console** and select **Instances**.
            2. Identify instances with hibernation enabled (check **Stop - Hibernate behavior** in instance details).
            3. Verify the root volume is encrypted by checking **Block devices** in the instance details.
            4. If the root volume is not encrypted:
              - Create an encrypted snapshot of the root volume.
              - Create an encrypted AMI from the snapshot.
              - Launch a new instance from the encrypted AMI with hibernation enabled.
              - Terminate the original instance.
        - id: cli
          desc: |
            **Using AWS CLI**

            Find instances with hibernation enabled:

            ```bash
            aws ec2 describe-instances \
              --query "Reservations[*].Instances[*].[InstanceId,HibernationOptions.Configured]" \
              --output table
            ```

            Check if the root volume is encrypted:

            ```bash
            aws ec2 describe-volumes --volume-ids <root-volume-id> \
              --query "Volumes[*].[VolumeId,Encrypted]"
            ```
    refs:
      - url: https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/hibernating-prerequisites.html
        title: Hibernation prerequisites for Amazon EC2
  - uid: mondoo-aws-security-ec2-hibernation-encrypted-check-aws
    filters: asset.platform == "aws"
    mql: |
      if (aws.ec2.instances.where(state == "running" && hibernationConfigured == true).length > 0) {
        aws.ec2.ebsEncryptionByDefault.values.all(_ == true)
      }
  - uid: mondoo-aws-security-route53-dnssec-enabled
    title: Ensure Route 53 public hosted zones have DNSSEC signing enabled
    impact: 70
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-12
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-10
      compliance/soc2-2017: soc2-control-cc6-1-11
    variants:
      - uid: mondoo-aws-security-route53-dnssec-enabled-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/icon: aws
    docs:
      desc: |
        This check ensures that Amazon Route 53 public hosted zones have DNSSEC signing enabled. DNSSEC (Domain Name System Security Extensions) adds cryptographic signatures to DNS records, allowing resolvers to verify that responses have not been tampered with in transit.

        **Why this matters**

        - Without DNSSEC, DNS responses can be spoofed or poisoned by attackers, redirecting users to malicious sites (DNS cache poisoning, man-in-the-middle attacks).
        - DNSSEC provides authentication of DNS data origin and data integrity verification.
        - AWS Route 53 supports DNSSEC signing for public hosted zones, with AWS managing the Zone Signing Key (ZSK) and customers managing the Key Signing Key (KSK) via AWS KMS.
        - Private hosted zones do not support DNSSEC and are excluded from this check.

        **Risk mitigation:**

        - **DNS integrity:** Prevents DNS spoofing and cache poisoning attacks.
        - **Authentication:** Verifies that DNS responses originate from the authoritative source.
        - **Trust chain:** Establishes a chain of trust from the root DNS zone to your domain.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            1. Navigate to the **Route 53 Console** and select **Hosted zones**.
            2. Select the public hosted zone to configure.
            3. Go to the **DNSSEC signing** tab.
            4. Choose **Enable DNSSEC signing**.
            5. Create or select a KMS key for the Key Signing Key (KSK).
            6. After enabling, establish the chain of trust by adding a DS record to the parent zone through your domain registrar.
        - id: cli
          desc: |
            **Using AWS CLI**

            Check DNSSEC status for a hosted zone:

            ```bash
            aws route53 get-dnssec --hosted-zone-id <zone-id>
            ```

            Enable DNSSEC signing:

            ```bash
            aws route53 create-key-signing-key \
              --hosted-zone-id <zone-id> \
              --name example-ksk \
              --key-management-service-arn arn:aws:kms:us-east-1:account-id:key/key-id \
              --status ACTIVE

            aws route53 enable-hosted-zone-dnssec --hosted-zone-id <zone-id>
            ```
    refs:
      - url: https://docs.aws.amazon.com/Route53/latest/DeveloperGuide/dns-configuring-dnssec.html
        title: Configuring DNSSEC signing in Amazon Route 53
  - uid: mondoo-aws-security-route53-dnssec-enabled-aws
    filters: asset.platform == "aws"
    mql: |
      aws.route53.hostedZones.where(isPrivate == false).all(
        dnssecStatus['serveSignature'] == "SIGNING"
      )
  - uid: mondoo-aws-security-route53-query-logging-enabled
    title: Ensure Route 53 public hosted zones have query logging enabled
    impact: 60
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/soc2-2017: soc2-control-cc7-2-1
    variants:
      - uid: mondoo-aws-security-route53-query-logging-enabled-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/icon: aws
    docs:
      desc: |
        This check ensures that Amazon Route 53 public hosted zones have DNS query logging configured. Query logging sends information about DNS queries to Amazon CloudWatch Logs, enabling visibility into DNS traffic patterns and supporting security monitoring.

        **Why this matters**

        - Without query logging, there is no visibility into which DNS queries are being made against your hosted zones, making it difficult to detect reconnaissance, data exfiltration via DNS tunneling, or domain abuse.
        - DNS query logs provide critical data for incident response, allowing security teams to trace suspicious domain lookups and identify compromised systems.
        - Query logs can be used to detect shadow IT, unauthorized subdomains, and unusual query patterns that may indicate an attack.
        - Compliance frameworks recommend logging DNS activity as part of network monitoring requirements.

        **Risk mitigation:**

        - **Threat detection:** Enables detection of DNS-based attacks including tunneling and exfiltration.
        - **Incident response:** Provides DNS query history for forensic analysis.
        - **Compliance:** Meets audit logging requirements for DNS infrastructure.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            1. Navigate to the **Route 53 Console** and select **Hosted zones**.
            2. Select the public hosted zone.
            3. Go to the **Query logging** tab.
            4. Choose **Configure query logging**.
            5. Select or create a CloudWatch Logs log group in the **us-east-1** region.
            6. Configure the appropriate resource policy to allow Route 53 to write to the log group.
        - id: cli
          desc: |
            **Using AWS CLI**

            Create a CloudWatch Logs log group (must be in us-east-1):

            ```bash
            aws logs create-log-group \
              --log-group-name /aws/route53/example.com \
              --region us-east-1
            ```

            Enable query logging:

            ```bash
            aws route53 create-query-logging-config \
              --hosted-zone-id <zone-id> \
              --cloud-watch-logs-log-group-arn arn:aws:logs:us-east-1:account-id:log-group:/aws/route53/example.com
            ```
    refs:
      - url: https://docs.aws.amazon.com/Route53/latest/DeveloperGuide/query-logs.html
        title: Logging DNS queries in Amazon Route 53
  - uid: mondoo-aws-security-route53-query-logging-enabled-aws
    filters: asset.platform == "aws"
    mql: |
      aws.route53.hostedZones.where(isPrivate == false).all(
        queryLoggingConfig != null
      )
  - uid: mondoo-aws-security-route53-health-check-not-disabled
    title: Ensure Route 53 health checks are not disabled
    impact: 50
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-14
      compliance/nis-2: nis-2-21-2-c
      compliance/nist-csf-1: nist-csf-1-pr-ip-4
      compliance/nist-csf-2: nist-csf-2-pr-ds-11
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cp-9
      compliance/nist-sp-800-171: "false"
      compliance/soc2-2017: soc2-control-cc9-1-1
    variants:
      - uid: mondoo-aws-security-route53-health-check-not-disabled-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/icon: aws
    docs:
      desc: |
        This check ensures that no Amazon Route 53 health checks are in a disabled state. Disabled health checks do not monitor endpoint availability, which can leave DNS failover routing non-functional and cause traffic to be directed to unhealthy or offline endpoints.

        **Why this matters**

        - Disabled health checks silently break DNS failover configurations, meaning traffic may continue to route to degraded or unreachable endpoints without triggering a failover.
        - If a health check associated with a failover or weighted routing policy is disabled, Route 53 considers the endpoint healthy by default, defeating the purpose of health-based routing.
        - Disabled health checks create a false sense of security, as monitoring dashboards may not clearly indicate that checks are not running.

        **Risk mitigation:**

        - **Availability:** Ensures DNS failover routing works correctly by keeping health checks active.
        - **Visibility:** Maintains accurate health status for all monitored endpoints.
        - **Reliability:** Prevents routing traffic to unhealthy endpoints due to disabled monitoring.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            1. Navigate to the **Route 53 Console** and select **Health checks**.
            2. Review the list for any health checks with a **Disabled** status.
            3. Select the disabled health check and choose **Edit**.
            4. Uncheck the **Disabled** option to re-enable the health check.
            5. If the health check is no longer needed, delete it rather than leaving it disabled.
        - id: cli
          desc: |
            **Using AWS CLI**

            List all health checks and their disabled status:

            ```bash
            aws route53 list-health-checks \
              --query "HealthChecks[*].{Id:Id,Disabled:HealthCheckConfig.Disabled,Type:HealthCheckConfig.Type}"
            ```

            Re-enable a disabled health check:

            ```bash
            aws route53 update-health-check \
              --health-check-id <health-check-id> \
              --no-disabled
            ```
    refs:
      - url: https://docs.aws.amazon.com/Route53/latest/DeveloperGuide/health-checks-creating.html
        title: Creating and updating Amazon Route 53 health checks
  - uid: mondoo-aws-security-route53-health-check-not-disabled-aws
    filters: asset.platform == "aws"
    mql: |
      aws.route53.healthChecks.none(disabled == true)
  - uid: mondoo-aws-security-route53-health-check-https
    title: Ensure Route 53 endpoint health checks use HTTPS
    impact: 60
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/soc2-2017: soc2-control-cc6-7-2
    variants:
      - uid: mondoo-aws-security-route53-health-check-https-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/icon: aws
    docs:
      desc: |
        This check ensures that Amazon Route 53 endpoint health checks use HTTPS rather than HTTP. Health checks using HTTP send requests in plaintext, which can be intercepted and do not validate the identity of the endpoint being checked.

        **Why this matters**

        - HTTP health checks transmit data in plaintext, making them susceptible to interception and man-in-the-middle attacks.
        - HTTPS health checks verify the endpoint's TLS certificate, ensuring that the health check is actually reaching the intended endpoint and not an impersonator.
        - If health check traffic is intercepted, an attacker could manipulate responses to keep Route 53 routing traffic to a compromised endpoint.
        - This check only applies to endpoint-type health checks (HTTP, HTTPS, HTTP_STR_MATCH, HTTPS_STR_MATCH). Calculated and CloudWatch health checks are excluded.

        **Risk mitigation:**

        - **Encryption in transit:** Ensures health check traffic is encrypted.
        - **Endpoint authentication:** Validates the TLS certificate of monitored endpoints.
        - **Tamper protection:** Prevents manipulation of health check responses.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            1. Navigate to the **Route 53 Console** and select **Health checks**.
            2. Select the HTTP health check and choose **Edit**.
            3. Change the **Protocol** from HTTP to HTTPS.
            4. Set the **Port** to 443 (or the appropriate HTTPS port).
            5. Enable **SNI** if checking a domain that uses name-based virtual hosting.
            6. Save the changes.
        - id: cli
          desc: |
            **Using AWS CLI**

            Update a health check to use HTTPS:

            ```bash
            aws route53 update-health-check \
              --health-check-id <health-check-id> \
              --port 443 \
              --resource-path /healthcheck \
              --enable-sni
            ```

            Note: You cannot change the health check type directly. To switch from HTTP to HTTPS, create a new HTTPS health check and update your DNS records to reference it.
    refs:
      - url: https://docs.aws.amazon.com/Route53/latest/DeveloperGuide/health-checks-types.html
        title: Types of Amazon Route 53 health checks
  - uid: mondoo-aws-security-route53-health-check-https-aws
    filters: asset.platform == "aws"
    mql: |
      aws.route53.healthChecks.none(
        type == "HTTP" || type == "HTTP_STR_MATCH"
      )
  - uid: mondoo-aws-security-appstream-fleet-no-default-internet-access
    title: Ensure AppStream 2.0 fleets do not have default internet access enabled
    impact: 70
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-4
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/soc2-2017: soc2-control-cc6-6-1
    variants:
      - uid: mondoo-aws-security-appstream-fleet-no-default-internet-access-aws
        tags:
          mondoo.com/filter-title: "AWS Account"
          mondoo.com/icon: "aws"
    docs:
      desc: |
        This check ensures that Amazon AppStream 2.0 fleets do not have default internet access enabled. When enabled, streaming instances are assigned public IP addresses and can access the internet directly, bypassing network security controls such as firewalls, web proxies, and data loss prevention (DLP) systems.

        **Why this matters**

        - Default internet access gives AppStream streaming instances direct, unfiltered internet connectivity through a public IP address.
        - This bypasses security controls such as web proxies, firewalls, URL filtering, and DLP that would normally inspect and control outbound traffic.
        - Compromised or misused streaming sessions could exfiltrate sensitive data directly to the internet without detection.
        - AWS recommends using a VPC with a NAT gateway or VPC endpoints to control and monitor outbound internet traffic from AppStream fleets.

        **Risk mitigation:**

        - **Network security:** Forces outbound traffic through controlled network paths with security inspection.
        - **Data protection:** Prevents direct data exfiltration from streaming sessions.
        - **Compliance:** Ensures network traffic is subject to organizational security policies.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            1. Navigate to the **AppStream 2.0 Console** and select **Fleets**.
            2. Select the fleet and choose **Edit**.
            3. Under **Network access**, uncheck **Default Internet Access**.
            4. Configure a VPC with a NAT gateway for controlled internet access.
            5. Save the changes and restart the fleet.
        - id: cli
          desc: |
            **Using AWS CLI**

            Update a fleet to disable default internet access:

            ```bash
            aws appstream update-fleet \
              --name <fleet-name> \
              --no-enable-default-internet-access
            ```

            Verify the setting:

            ```bash
            aws appstream describe-fleets --names <fleet-name> \
              --query "Fleets[*].{Name:Name,InternetAccess:EnableDefaultInternetAccess}"
            ```
    refs:
      - url: https://docs.aws.amazon.com/appstream2/latest/developerguide/internet-access.html
        title: Internet access for Amazon AppStream 2.0
  - uid: mondoo-aws-security-appstream-fleet-no-default-internet-access-aws
    filters: asset.platform == "aws"
    mql: |
      aws.appstream.fleets.all(enableDefaultInternetAccess == false)
  - uid: mondoo-aws-security-appstream-fleet-max-session-duration
    title: Ensure AppStream 2.0 fleets enforce a maximum session duration
    impact: 50
    tags:
      compliance/iso-27001-2022: false
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-12
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-10
      compliance/soc2-2017: soc2-control-cc6-1-8
    variants:
      - uid: mondoo-aws-security-appstream-fleet-max-session-duration-aws
        tags:
          mondoo.com/filter-title: "AWS Account"
          mondoo.com/icon: "aws"
    docs:
      desc: |
        This check ensures that Amazon AppStream 2.0 fleets have a maximum user session duration of 10 hours (36000 seconds) or less. Excessively long or unlimited session durations increase the risk of unattended sessions being hijacked or misused.

        **Why this matters**

        - Long-running sessions that remain active for extended periods increase the window of opportunity for session hijacking or unauthorized access.
        - Unattended sessions may remain connected to sensitive applications and data indefinitely.
        - Session time limits enforce a regular re-authentication cycle, reducing the impact of stolen session credentials.
        - AWS allows a maximum of 5760 minutes (96 hours), but security best practices recommend limiting sessions to a reasonable work period.

        **Risk mitigation:**

        - **Session security:** Limits the duration a compromised session can remain active.
        - **Re-authentication:** Forces periodic re-authentication to verify user identity.
        - **Resource management:** Prevents resource waste from abandoned sessions.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            1. Navigate to the **AppStream 2.0 Console** and select **Fleets**.
            2. Select the fleet and choose **Edit**.
            3. Set **Maximum session duration** to 600 minutes (10 hours) or less.
            4. Save the changes.
        - id: cli
          desc: |
            **Using AWS CLI**

            Update the maximum session duration:

            ```bash
            aws appstream update-fleet \
              --name <fleet-name> \
              --max-user-duration-in-seconds 36000
            ```
    refs:
      - url: https://docs.aws.amazon.com/appstream2/latest/developerguide/fleets-and-stacks.html
        title: Amazon AppStream 2.0 fleets and stacks
  - uid: mondoo-aws-security-appstream-fleet-max-session-duration-aws
    filters: asset.platform == "aws"
    mql: |
      aws.appstream.fleets.all(maxUserDurationInSeconds <= 36000)
  - uid: mondoo-aws-security-appstream-fleet-idle-disconnect
    title: Ensure AppStream 2.0 fleets have idle disconnect timeout configured
    impact: 50
    tags:
      compliance/iso-27001-2022: false
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-12
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-10
      compliance/soc2-2017: soc2-control-cc6-1-8
    variants:
      - uid: mondoo-aws-security-appstream-fleet-idle-disconnect-aws
        tags:
          mondoo.com/filter-title: "AWS Account"
          mondoo.com/icon: "aws"
    docs:
      desc: |
        This check ensures that Amazon AppStream 2.0 fleets have an idle disconnect timeout configured and set to 15 minutes (900 seconds) or less. Without an idle timeout, abandoned sessions remain active indefinitely, leaving applications and data accessible.

        **Why this matters**

        - Sessions without idle timeouts remain connected even when users walk away, leave for the day, or forget to log out.
        - An unattended session connected to sensitive applications is a significant security risk, as anyone with physical or remote access to the user's device could access the streaming session.
        - Idle disconnect timeouts ensure that inactive sessions are automatically terminated, reducing the window of exposure.
        - A value of 0 means no idle timeout is configured, which is the least secure option.

        **Risk mitigation:**

        - **Unattended sessions:** Automatically disconnects idle sessions to prevent unauthorized access.
        - **Least privilege:** Reduces the time window during which an abandoned session could be exploited.
        - **Resource efficiency:** Frees up fleet capacity from idle sessions.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            1. Navigate to the **AppStream 2.0 Console** and select **Fleets**.
            2. Select the fleet and choose **Edit**.
            3. Set **Idle disconnect timeout** to 15 minutes or less.
            4. Save the changes.
        - id: cli
          desc: |
            **Using AWS CLI**

            Update the idle disconnect timeout:

            ```bash
            aws appstream update-fleet \
              --name <fleet-name> \
              --idle-disconnect-timeout-in-seconds 900
            ```
    refs:
      - url: https://docs.aws.amazon.com/appstream2/latest/developerguide/fleets-and-stacks.html
        title: Amazon AppStream 2.0 fleets and stacks
  - uid: mondoo-aws-security-appstream-fleet-idle-disconnect-aws
    filters: asset.platform == "aws"
    mql: |
      aws.appstream.fleets.all(
        idleDisconnectTimeoutInSeconds > 0 && idleDisconnectTimeoutInSeconds <= 900
      )
  - uid: mondoo-aws-security-appstream-image-builder-no-default-internet-access
    title: Ensure AppStream 2.0 image builders disable default internet access
    impact: 60
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-4
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/soc2-2017: soc2-control-cc6-6-1
    variants:
      - uid: mondoo-aws-security-appstream-image-builder-no-default-internet-access-aws
        tags:
          mondoo.com/filter-title: "AWS Account"
          mondoo.com/icon: "aws"
    docs:
      desc: |
        This check ensures that Amazon AppStream 2.0 image builders do not have default internet access enabled. Image builders are used to create custom application images and may have access to sensitive configuration data, application binaries, and credentials during the image creation process.

        **Why this matters**

        - Image builders with direct internet access can reach any external endpoint, creating a risk of data exfiltration during image creation.
        - During image creation, builders may have access to application installation media, license keys, configuration files, and service credentials that should not be exposed to the public internet.
        - Malicious or compromised software installed during image building could communicate with command-and-control servers if direct internet access is available.
        - AWS recommends using a VPC with a NAT gateway to provide controlled internet access for image builders.

        **Risk mitigation:**

        - **Data protection:** Prevents exfiltration of sensitive image build artifacts.
        - **Supply chain security:** Reduces risk of compromised software communicating externally during image creation.
        - **Network control:** Forces outbound traffic through monitored network paths.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            1. Navigate to the **AppStream 2.0 Console** and select **Image builders**.
            2. When creating a new image builder, under **Network access**, do not check **Default Internet Access**.
            3. Configure a VPC with a NAT gateway for controlled internet access.
            4. For existing image builders, create a new one without default internet access and delete the old one.
        - id: cli
          desc: |
            **Using AWS CLI**

            Create an image builder without default internet access:

            ```bash
            aws appstream create-image-builder \
              --name <builder-name> \
              --instance-type stream.standard.medium \
              --image-name <base-image> \
              --no-enable-default-internet-access \
              --vpc-config SubnetIds=<subnet-id>,SecurityGroupIds=<sg-id>
            ```
    refs:
      - url: https://docs.aws.amazon.com/appstream2/latest/developerguide/internet-access.html
        title: Internet access for Amazon AppStream 2.0
  - uid: mondoo-aws-security-appstream-image-builder-no-default-internet-access-aws
    filters: asset.platform == "aws"
    mql: |
      aws.appstream.imageBuilders.all(enableDefaultInternetAccess == false)
  - uid: mondoo-aws-security-directoryservice-os-version
    title: Ensure Directory Service directories use SERVER_2019 or newer
    impact: 60
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-8
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-12
      compliance/nist-csf-2: nist-csf-2-pr-ps-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-1
      compliance/soc2-2017: soc2-control-cc7-1-1
    variants:
      - uid: mondoo-aws-security-directoryservice-os-version-aws
        tags:
          mondoo.com/filter-title: "AWS Account"
          mondoo.com/icon: "aws"
    docs:
      desc: |
        This check ensures that AWS Directory Service directories run on Windows Server 2019 or newer. Windows Server 2012 has reached end of life and no longer receives security patches from Microsoft, leaving directories vulnerable to known and future exploits.

        **Why this matters**

        - Windows Server 2012 reached end of extended support, meaning no further security patches are released, leaving directories exposed to known vulnerabilities.
        - Directory services are critical identity infrastructure — a compromise of the directory service can lead to full domain takeover and lateral movement across the entire environment.
        - Server 2019 includes security improvements such as enhanced credential protection, improved event logging, and Shielded VM support.
        - AWS supports upgrading the OS version for Managed Microsoft AD directories.

        **Risk mitigation:**

        - **Patching:** Ensures the directory OS continues to receive security updates.
        - **Security features:** Leverages modern security capabilities available in Server 2019.
        - **Compliance:** Meets requirements for running supported, patched operating systems.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            1. Navigate to the **Directory Service Console**.
            2. Select the directory running on SERVER_2012.
            3. Choose **Actions** > **Update OS version**.
            4. Select **SERVER_2019** as the target OS version.
            5. Note: OS version upgrades may require a maintenance window and should be tested in a non-production directory first.
        - id: cli
          desc: |
            **Using AWS CLI**

            Check the OS version of your directories:

            ```bash
            aws ds describe-directories \
              --query "DirectoryDescriptions[*].{Id:DirectoryId,Name:Name,OS:OsVersion,Stage:Stage}"
            ```

            Update the OS version:

            ```bash
            aws ds update-settings \
              --directory-id <directory-id> \
              --settings "[{\"SettingId\":\"OS\",\"SettingValue\":\"SERVER_2019\"}]"
            ```
    refs:
      - url: https://docs.aws.amazon.com/directoryservice/latest/admin-guide/ms_ad_directory_maintenance.html
        title: AWS Managed Microsoft AD directory maintenance
  - uid: mondoo-aws-security-directoryservice-os-version-aws
    filters: asset.platform == "aws"
    mql: |
      aws.directoryservice.directories.where(stage == "Active" && type == "MicrosoftAD").all(
        osVersion != "SERVER_2012"
      )
  - uid: mondoo-aws-security-directoryservice-sso-enabled
    title: Ensure Directory Service directories have SSO enabled
    impact: 60
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-j
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-3
      compliance/soc2-2017: soc2-control-cc6-1-4
    variants:
      - uid: mondoo-aws-security-directoryservice-sso-enabled-aws
        tags:
          mondoo.com/filter-title: "AWS Account"
          mondoo.com/icon: "aws"
    docs:
      desc: |
        This check ensures that AWS Directory Service directories have single sign-on (SSO) enabled. SSO is a critical security control that reduces password sprawl, centralizes access control, and provides a single point for access revocation across all directory-integrated applications.

        **Why this matters**

        - **Password sprawl reduction:** Without SSO, users manage separate credentials for each application, leading to weak passwords and password reuse. A single credential compromise can then cascade across multiple systems because the same password is used everywhere.
        - **Centralized access control:** SSO enforces authentication through the directory, ensuring password complexity policies, account lockout thresholds, and MFA requirements are applied consistently. Without SSO, each application enforces its own policies (or none at all), creating inconsistent security posture.
        - **Single point of access revocation:** When an employee leaves or an account is compromised, disabling the directory account immediately revokes access to all SSO-integrated applications. Without SSO, administrators must individually revoke access in each application, creating a window where orphaned accounts remain active and exploitable.
        - **Audit consolidation:** SSO funnels all authentication events through the directory, providing a single audit trail for access reviews, compliance reporting, and incident investigation rather than scattered logs across multiple applications.

        **Risk mitigation:**

        - **Credential hygiene:** Eliminates multiple credential stores that could be targeted independently and reduces the password fatigue that leads to weak credential choices.
        - **Incident containment:** A single account disable instantly cuts off a compromised identity from all integrated resources, limiting blast radius.
        - **Compliance:** Meets centralized authentication requirements in SOC 2, NIST 800-53 (IA-2), and ISO 27001.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            1. Navigate to the **Directory Service Console**.
            2. Select the directory.
            3. Under the **Application management** tab, find **Single sign-on (SSO)**.
            4. Choose **Enable** to enable SSO.
        - id: cli
          desc: |
            **Using AWS CLI**

            Enable SSO for a directory:

            ```bash
            aws ds enable-sso --directory-id <directory-id>
            ```

            Verify SSO status:

            ```bash
            aws ds describe-directories --directory-ids <directory-id> \
              --query "DirectoryDescriptions[*].{Id:DirectoryId,SSOEnabled:SsoEnabled}"
            ```
    refs:
      - url: https://docs.aws.amazon.com/directoryservice/latest/admin-guide/ms_ad_single_sign_on.html
        title: Single sign-on for AWS Managed Microsoft AD
  - uid: mondoo-aws-security-directoryservice-sso-enabled-aws
    filters: asset.platform == "aws"
    mql: |
      aws.directoryservice.directories.where(stage == "Active" && type != "ADConnector").all(
        ssoEnabled == true
      )
  - uid: mondoo-aws-security-directoryservice-radius-mfa-enabled
    title: Ensure Directory Service Managed AD has RADIUS MFA enabled
    impact: 80
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-j
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-3
      compliance/soc2-2017: soc2-control-cc6-1-4
    variants:
      - uid: mondoo-aws-security-directoryservice-radius-mfa-enabled-aws
        tags:
          mondoo.com/filter-title: "AWS Account"
          mondoo.com/icon: "aws"
    docs:
      desc: |
        This check ensures that AWS Managed Microsoft AD directories have multi-factor authentication (MFA) enabled through RADIUS integration. MFA adds a critical second layer of authentication beyond passwords, significantly reducing the risk of unauthorized access from compromised credentials.

        **Why this matters**

        - Directory services are the foundation of identity and access management — compromised directory credentials can lead to full domain takeover.
        - Passwords alone are insufficient protection against credential stuffing, phishing, and brute-force attacks.
        - RADIUS MFA integration requires users to provide a second authentication factor (token, push notification, biometric) in addition to their password.
        - Without MFA, a single compromised password grants full access to all directory-integrated resources.
        - This check applies to Managed Microsoft AD directories, which support RADIUS-based MFA.

        **Risk mitigation:**

        - **Account protection:** Prevents unauthorized access even when passwords are compromised.
        - **Phishing resistance:** Adds a factor that cannot be captured through phishing.
        - **Compliance:** Meets MFA requirements in PCI DSS, HIPAA, SOC 2, NIST 800-53, and other frameworks.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            1. Navigate to the **Directory Service Console**.
            2. Select the Managed Microsoft AD directory.
            3. Under the **Networking & security** tab, find **Multi-factor authentication**.
            4. Choose **Actions** > **Enable multi-factor authentication**.
            5. Configure the RADIUS server settings:
              - Enter the RADIUS server IP addresses.
              - Set the port (default 1812).
              - Enter the shared secret.
              - Select the protocol (MS-CHAPv2 recommended).
              - Set the timeout and retry values.
            6. Choose **Enable**.
        - id: cli
          desc: |
            **Using AWS CLI**

            Enable RADIUS MFA for a directory:

            ```bash
            aws ds enable-radius --directory-id <directory-id> \
              --radius-settings '{
                "RadiusServers": ["10.0.0.1"],
                "RadiusPort": 1812,
                "RadiusTimeout": 10,
                "RadiusRetries": 3,
                "SharedSecret": "<shared-secret>",
                "AuthenticationProtocol": "MS-CHAPv2",
                "DisplayLabel": "MFA",
                "UseSameUsername": true
              }'
            ```

            Verify RADIUS status:

            ```bash
            aws ds describe-directories --directory-ids <directory-id> \
              --query "DirectoryDescriptions[*].{Id:DirectoryId,RadiusStatus:RadiusStatus}"
            ```
    refs:
      - url: https://docs.aws.amazon.com/directoryservice/latest/admin-guide/ms_ad_mfa.html
        title: Enable multi-factor authentication for AWS Managed Microsoft AD
  - uid: mondoo-aws-security-directoryservice-radius-mfa-enabled-aws
    filters: asset.platform == "aws"
    mql: |
      aws.directoryservice.directories.where(stage == "Active" && type == "MicrosoftAD").all(
        radiusStatus == "Completed"
      )
  - uid: mondoo-aws-security-documentdb-cluster-encrypted
    title: Ensure DocumentDB clusters are encrypted at rest
    impact: 90
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/soc2-2017: soc2-control-cc6-1-10
    variants:
      - uid: mondoo-aws-security-documentdb-cluster-encrypted-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/icon: aws
    docs:
      desc: |
        This check ensures that Amazon DocumentDB clusters are configured with encryption at rest using AWS Key Management Service (KMS). Encryption at rest protects document database data from unauthorized access by automatically encrypting data before it is written to the underlying storage infrastructure.

        **Why this matters**

        - DocumentDB clusters created without encryption cannot be modified to enable encryption later; a new encrypted cluster must be created and the data migrated.
        - Without encryption at rest, sensitive document data stored in DocumentDB is vulnerable to unauthorized access if the underlying storage media is compromised.
        - Encryption at rest is a requirement for compliance with security frameworks including PCI DSS, HIPAA, and SOC 2.
        - Encrypted DocumentDB clusters also encrypt automated backups, snapshots, and replicas, providing comprehensive data protection across the entire data lifecycle.

        **Risk mitigation:**

        - **Data protection:** Ensures all document data, backups, and snapshots are encrypted using AWS KMS, preventing unauthorized access to stored data.
        - **Compliance:** Meets regulatory requirements for encryption of data at rest in managed database services.
        - **Key management:** Leverages AWS KMS for centralized key management, access control policies, and automatic key rotation.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            1. Navigate to the Amazon DocumentDB Console.
            2. Select **Clusters** in the left panel.
            3. Select the DocumentDB cluster to review.
            4. Under the **Configuration** tab, check if **Encryption** is enabled.
            5. If encryption is not enabled, you must create a new encrypted cluster:
              - Select **Create cluster**.
              - Under **Encryption-at-rest**, enable encryption.
              - Choose a KMS key (AWS managed or customer-managed).
              - Complete the cluster creation process.
            6. Migrate data from the unencrypted cluster to the new encrypted cluster.
            7. Update applications to point to the new encrypted cluster endpoint.
            8. Delete the unencrypted cluster after verifying the migration.
        - id: cli
          desc: |
            **Using AWS CLI**

            Check if a DocumentDB cluster is encrypted:

            ```bash
            aws docdb describe-db-clusters --db-cluster-identifier <cluster-id> \
              --query "DBClusters[*].{ClusterId:DBClusterIdentifier,Encrypted:StorageEncrypted,KmsKeyId:KmsKeyId}"
            ```

            Create a new encrypted DocumentDB cluster:

            ```bash
            aws docdb create-db-cluster \
              --db-cluster-identifier secure-docdb-cluster \
              --engine docdb \
              --master-username admin \
              --master-user-password <password> \
              --storage-encrypted \
              --kms-key-id arn:aws:kms:region:account-id:key/key-id
            ```
    refs:
      - url: https://docs.aws.amazon.com/documentdb/latest/developerguide/encryption-at-rest.html
        title: Amazon DocumentDB Encryption at Rest
  - uid: mondoo-aws-security-documentdb-cluster-encrypted-aws
    filters: asset.platform == "aws"
    mql: aws.documentdb.clusters.all(storageEncrypted == true)
  - uid: mondoo-aws-security-documentdb-cluster-cmk-encryption
    title: Ensure DocumentDB clusters are encrypted with a customer-managed KMS key
    impact: 70
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-12
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-10
      compliance/soc2-2017: soc2-control-cc6-1-10
    variants:
      - uid: mondoo-aws-security-documentdb-cluster-cmk-encryption-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/icon: aws
    docs:
      desc: |
        This check ensures that Amazon DocumentDB clusters are encrypted using a customer-managed AWS KMS key (CMK) rather than the default AWS-managed service key. Customer-managed keys provide greater control over the encryption lifecycle, including key rotation policies, access control, and audit capabilities.

        **Why this matters**

        - AWS-managed keys do not allow you to control key rotation schedules, define granular access policies, or audit key usage independently.
        - Customer-managed KMS keys enable you to define who can use and manage the key through IAM and key policies, providing an additional layer of access control beyond DocumentDB IAM policies.
        - Using CMKs enables detailed audit trails in AWS CloudTrail for all encryption and decryption operations on DocumentDB data.
        - Some compliance frameworks require organizations to manage their own encryption keys rather than relying on provider-managed keys.

        **Risk mitigation:**

        - **Key control:** Provides full lifecycle control over encryption keys, including the ability to disable or revoke access.
        - **Audit visibility:** Enables detailed CloudTrail logging of all key usage for compliance and forensic purposes.
        - **Access separation:** Allows separation of duties between database administrators and key administrators.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            1. Navigate to the Amazon DocumentDB Console.
            2. Select **Clusters** in the left panel.
            3. To update encryption, you must create a new cluster with a customer-managed KMS key:
              - Select **Create cluster**.
              - Under **Encryption-at-rest**, select a customer-managed KMS key.
              - Complete the cluster creation process.
            4. Migrate data from the existing cluster to the new cluster.
            5. Update applications to point to the new cluster endpoint.
        - id: cli
          desc: |
            **Using AWS CLI**

            Create a DocumentDB cluster with a customer-managed KMS key:

            ```bash
            aws docdb create-db-cluster \
              --db-cluster-identifier secure-docdb-cluster \
              --engine docdb \
              --master-username admin \
              --master-user-password <password> \
              --storage-encrypted \
              --kms-key-id arn:aws:kms:region:account-id:key/key-id
            ```

            Verify the KMS key used by an existing cluster:

            ```bash
            aws docdb describe-db-clusters --db-cluster-identifier <cluster-id> \
              --query "DBClusters[*].{ClusterId:DBClusterIdentifier,KmsKeyId:KmsKeyId}"
            ```
    refs:
      - url: https://docs.aws.amazon.com/documentdb/latest/developerguide/encryption-at-rest.html
        title: Amazon DocumentDB Encryption at Rest
      - url: https://docs.aws.amazon.com/kms/latest/developerguide/concepts.html#customer-cmk
        title: AWS KMS Customer Managed Keys
  - uid: mondoo-aws-security-documentdb-cluster-cmk-encryption-aws
    filters: asset.platform == "aws"
    mql: aws.documentdb.clusters.all(kmsKey { metadata.KeyManager == "CUSTOMER" })
  - uid: mondoo-aws-security-documentdb-instance-auto-minor-version-upgrade
    title: Ensure DocumentDB instances have automatic minor version upgrades enabled
    impact: 60
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-8
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-12
      compliance/nist-csf-2: nist-csf-2-pr-ps-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-1
      compliance/soc2-2017: soc2-control-cc7-1-1
    variants:
      - uid: mondoo-aws-security-documentdb-instance-auto-minor-version-upgrade-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/icon: aws
    docs:
      desc: |
        This check ensures that Amazon DocumentDB instances have automatic minor version upgrades enabled. When enabled, instances automatically receive minor engine version upgrades during the maintenance window, ensuring security patches and bug fixes are applied promptly.

        **Why this matters**

        - Minor version upgrades typically include security patches that address known vulnerabilities in the database engine.
        - Without automatic upgrades, instances may run outdated engine versions with known security vulnerabilities for extended periods.
        - Manual upgrade processes introduce delays between patch availability and application, increasing the window of exposure.
        - Keeping database engines up to date is a fundamental requirement for compliance with security frameworks that mandate timely patch management.

        **Risk mitigation:**

        - **Patch management:** Ensures security patches are applied automatically during the next maintenance window.
        - **Vulnerability reduction:** Minimizes the time window during which known vulnerabilities remain unpatched.
        - **Compliance:** Meets requirements for timely application of security updates in managed database services.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            1. Navigate to the Amazon DocumentDB Console.
            2. Select **Instances** in the left panel.
            3. Select the instance to modify.
            4. Choose **Modify**.
            5. Under **Maintenance**, enable **Auto minor version upgrade**.
            6. Choose **Apply immediately** or **Apply during the next maintenance window**.
            7. Choose **Modify instance**.
        - id: cli
          desc: |
            **Using AWS CLI**

            Enable automatic minor version upgrades for a DocumentDB instance:

            ```bash
            aws docdb modify-db-instance \
              --db-instance-identifier <instance-id> \
              --auto-minor-version-upgrade \
              --apply-immediately
            ```

            Verify the setting:

            ```bash
            aws docdb describe-db-instances --db-instance-identifier <instance-id> \
              --query "DBInstances[*].{Instance:DBInstanceIdentifier,AutoUpgrade:AutoMinorVersionUpgrade}"
            ```
    refs:
      - url: https://docs.aws.amazon.com/documentdb/latest/developerguide/db-instance-modify.html
        title: Modifying an Amazon DocumentDB Instance
  - uid: mondoo-aws-security-documentdb-instance-auto-minor-version-upgrade-aws
    filters: asset.platform == "aws"
    mql: aws.documentdb.instances.all(autoMinorVersionUpgrade == true)
  - uid: mondoo-aws-security-cognito-user-pool-mfa-enforced
    title: Ensure Cognito user pools enforce multi-factor authentication
    impact: 90
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-j
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-3
      compliance/soc2-2017: soc2-control-cc6-1-4
    variants:
      - uid: mondoo-aws-security-cognito-user-pool-mfa-enforced-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/icon: aws
    docs:
      desc: |
        This check ensures that Amazon Cognito user pools have multi-factor authentication (MFA) set to "ON" (required for all users) rather than "OFF" or "OPTIONAL". When MFA is set to "OPTIONAL", individual users can choose not to configure MFA, leaving their accounts protected only by a password.

        **Why this matters**

        - Cognito user pools are often the front door to web and mobile applications. Password-only authentication is vulnerable to credential stuffing, phishing, and brute-force attacks.
        - Setting MFA to "OPTIONAL" relies on individual users to opt in, and experience shows that most users will not enable MFA unless it is required.
        - An "OFF" setting disables MFA entirely, removing any possibility of a second authentication factor.
        - Enforcing MFA ("ON") ensures that every user must provide a second factor (SMS, TOTP, or email) in addition to their password, significantly reducing the risk of account takeover.

        **Risk mitigation:**

        - **Account protection:** Prevents unauthorized access even when passwords are compromised.
        - **Phishing resistance:** Adds a factor that cannot be captured through phishing alone.
        - **Compliance:** Meets MFA requirements in PCI DSS, HIPAA, SOC 2, NIST 800-53, and other frameworks.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            1. Navigate to the **Amazon Cognito Console** and select **User pools**.
            2. Select the user pool to modify.
            3. Go to the **Sign-in experience** tab.
            4. Under **Multi-factor authentication**, choose **Require MFA**.
            5. Select the MFA methods to allow (Authenticator apps, SMS, Email).
            6. Choose **Save changes**.

            Note: Changing MFA from OPTIONAL to required will require all existing users to set up MFA at their next sign-in.
        - id: cli
          desc: |
            **Using AWS CLI**

            Set MFA to required for a user pool:

            ```bash
            aws cognito-idp set-user-pool-mfa-config \
              --user-pool-id <user-pool-id> \
              --mfa-configuration ON \
              --software-token-mfa-configuration Enabled=true
            ```

            Verify the MFA configuration:

            ```bash
            aws cognito-idp describe-user-pool --user-pool-id <user-pool-id> \
              --query "UserPool.{Name:Name,MfaConfiguration:MfaConfiguration}"
            ```
    refs:
      - url: https://docs.aws.amazon.com/cognito/latest/developerguide/user-pool-settings-mfa.html
        title: Adding MFA to a user pool
  - uid: mondoo-aws-security-cognito-user-pool-mfa-enforced-aws
    filters: asset.platform == "aws"
    mql: aws.cognito.userPools.all(mfaConfiguration == "ON")
  - uid: mondoo-aws-security-cognito-user-pool-advanced-security-enforced
    title: Ensure Cognito user pools have advanced security features in enforced mode
    impact: 70
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-16
      compliance/nis-2: false
      compliance/nist-csf-1: false
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-4
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-6
      compliance/soc2-2017: soc2-control-cc7-2-1
    variants:
      - uid: mondoo-aws-security-cognito-user-pool-advanced-security-enforced-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/icon: aws
    docs:
      desc: |
        This check ensures that Amazon Cognito user pools have advanced security features set to "ENFORCED" mode. Advanced security provides adaptive authentication, compromised credentials detection, and automated risk-based responses to suspicious sign-in attempts.

        **Why this matters**

        - In "OFF" mode, Cognito performs no risk analysis on sign-in attempts, allowing credential stuffing and suspicious login patterns to go undetected.
        - In "AUDIT" mode, Cognito logs risk assessments to CloudWatch but does not block or challenge suspicious attempts, providing visibility without protection.
        - "ENFORCED" mode actively responds to detected threats by requiring additional verification, blocking high-risk attempts, or triggering adaptive authentication challenges.
        - Advanced security detects sign-ins from compromised credential databases and can automatically require password resets for affected users.

        **Risk mitigation:**

        - **Threat detection:** Identifies and responds to credential stuffing, brute-force attacks, and anomalous sign-in patterns.
        - **Compromised credentials:** Automatically detects when user credentials appear in known breach databases.
        - **Adaptive authentication:** Dynamically adjusts authentication requirements based on assessed risk level.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            1. Navigate to the **Amazon Cognito Console** and select **User pools**.
            2. Select the user pool to modify.
            3. Go to the **Sign-in experience** tab.
            4. Under **Advanced security**, choose **Edit**.
            5. Set the mode to **Full-function (Enforced)**.
            6. Configure the automatic risk responses for compromised credentials and adaptive authentication.
            7. Choose **Save changes**.

            Note: Advanced security features incur additional costs per monthly active user.
        - id: cli
          desc: |
            **Using AWS CLI**

            Enable advanced security in enforced mode:

            ```bash
            aws cognito-idp update-user-pool \
              --user-pool-id <user-pool-id> \
              --user-pool-add-ons AdvancedSecurityMode=ENFORCED
            ```

            Verify the setting:

            ```bash
            aws cognito-idp describe-user-pool --user-pool-id <user-pool-id> \
              --query "UserPool.{Name:Name,AdvancedSecurity:UserPoolAddOns.AdvancedSecurityMode}"
            ```
    refs:
      - url: https://docs.aws.amazon.com/cognito/latest/developerguide/cognito-user-pool-settings-advanced-security.html
        title: Adding advanced security to a user pool
  - uid: mondoo-aws-security-cognito-user-pool-advanced-security-enforced-aws
    filters: asset.platform == "aws"
    mql: aws.cognito.userPools.all(advancedSecurityMode == "ENFORCED")
  - uid: mondoo-aws-security-cognito-identity-pool-no-unauthenticated
    title: Ensure Cognito identity pools do not allow unauthenticated identities
    impact: 80
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/soc2-2017: soc2-control-cc6-1-3
    variants:
      - uid: mondoo-aws-security-cognito-identity-pool-no-unauthenticated-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/icon: aws
    docs:
      desc: |
        This check ensures that Amazon Cognito identity pools do not allow unauthenticated (guest) identities. When enabled, unauthenticated access grants temporary AWS credentials to anonymous users without requiring any form of authentication, which can lead to unauthorized access to AWS resources.

        **Why this matters**

        - Unauthenticated identities receive temporary AWS credentials through the identity pool's IAM role, granting anonymous users access to AWS services.
        - Even with restrictive IAM policies, unauthenticated access increases the attack surface by providing AWS credentials to anyone who can call the identity pool API.
        - Misconfigured IAM roles for unauthenticated users can inadvertently grant access to sensitive resources such as S3 buckets, DynamoDB tables, or API Gateway endpoints.
        - Attackers can abuse unauthenticated access to enumerate resources, exfiltrate data, or perform denial-of-service attacks using the granted credentials.

        **Risk mitigation:**

        - **Access control:** Ensures all users must authenticate before receiving AWS credentials.
        - **Attack surface reduction:** Eliminates anonymous access to AWS resources through the identity pool.
        - **Credential protection:** Prevents distribution of AWS credentials to unauthenticated parties.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            1. Navigate to the **Amazon Cognito Console** and select **Identity pools**.
            2. Select the identity pool to modify.
            3. Under **User access**, choose **Edit**.
            4. Disable **Guest access** (unauthenticated identities).
            5. Choose **Save changes**.
            6. Review and update any application code that relies on unauthenticated access to use authenticated flows instead.
        - id: cli
          desc: |
            **Using AWS CLI**

            Disable unauthenticated identities:

            ```bash
            aws cognito-identity update-identity-pool \
              --identity-pool-id <identity-pool-id> \
              --identity-pool-name <pool-name> \
              --no-allow-unauthenticated-identities
            ```

            Note: The `update-identity-pool` command requires specifying all identity pool settings. Include `--no-allow-classic-flow` or `--allow-classic-flow` to match your current configuration.

            Verify the setting:

            ```bash
            aws cognito-identity describe-identity-pool \
              --identity-pool-id <identity-pool-id> \
              --query "{Name:IdentityPoolName,AllowUnauth:AllowUnauthenticatedIdentities}"
            ```
    refs:
      - url: https://docs.aws.amazon.com/cognito/latest/developerguide/identity-pools.html
        title: Amazon Cognito identity pools
      - url: https://docs.aws.amazon.com/cognito/latest/developerguide/switching-identities.html
        title: Switching unauthenticated users to authenticated users
  - uid: mondoo-aws-security-cognito-identity-pool-no-unauthenticated-aws
    filters: asset.platform == "aws"
    mql: aws.cognito.identityPools.all(allowUnauthenticatedIdentities == false)
  - uid: mondoo-aws-security-cognito-identity-pool-no-classic-flow
    title: Ensure Cognito identity pools disable Basic (Classic) auth flow
    impact: 60
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-j
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-3
      compliance/soc2-2017: soc2-control-cc6-1-4
    variants:
      - uid: mondoo-aws-security-cognito-identity-pool-no-classic-flow-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/icon: aws
    docs:
      desc: |
        This check ensures that Amazon Cognito identity pools do not have the Basic (Classic) authentication flow enabled. The Classic flow passes IAM role selection to the client, while the Enhanced (Simplified) flow handles role selection server-side, providing better security.

        **Why this matters**

        - The Classic flow allows client-side applications to directly call `AssumeRoleWithWebIdentity` with a role ARN, enabling clients to request any role that trusts the identity pool.
        - The Enhanced flow restricts role selection to server-side logic based on rules or the default role configuration, preventing clients from escalating privileges.
        - With the Classic flow, a compromised or malicious client could request credentials for a more privileged role than intended.
        - AWS recommends using the Enhanced flow for all new identity pools and migrating existing Classic flow implementations.

        **Risk mitigation:**

        - **Privilege escalation prevention:** Prevents clients from selecting arbitrary IAM roles.
        - **Server-side control:** Ensures role assignment is controlled by server-side rules and configuration.
        - **Simplified security:** Reduces the attack surface by removing client-side role selection.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            1. Navigate to the **Amazon Cognito Console** and select **Identity pools**.
            2. Select the identity pool to modify.
            3. Under **User access**, choose **Edit**.
            4. Disable the **Basic (Classic) authentication flow**.
            5. Ensure the Enhanced (Simplified) flow is configured with appropriate role mappings.
            6. Choose **Save changes**.
            7. Update any application code that uses the Classic `GetOpenIdToken` and `AssumeRoleWithWebIdentity` flow to use `GetCredentialsForIdentity` instead.
        - id: cli
          desc: |
            **Using AWS CLI**

            Disable the Classic authentication flow:

            ```bash
            aws cognito-identity update-identity-pool \
              --identity-pool-id <identity-pool-id> \
              --identity-pool-name <pool-name> \
              --no-allow-classic-flow
            ```

            Note: The `update-identity-pool` command requires specifying all identity pool settings. Include `--no-allow-unauthenticated-identities` or `--allow-unauthenticated-identities` to match your current configuration.

            Verify the setting:

            ```bash
            aws cognito-identity describe-identity-pool \
              --identity-pool-id <identity-pool-id> \
              --query "{Name:IdentityPoolName,ClassicFlow:AllowClassicFlow}"
            ```
    refs:
      - url: https://docs.aws.amazon.com/cognito/latest/developerguide/authentication-flow.html
        title: Identity pools authentication flow
      - url: https://docs.aws.amazon.com/cognito/latest/developerguide/iam-roles.html
        title: IAM roles for Amazon Cognito identity pools
  - uid: mondoo-aws-security-cognito-identity-pool-no-classic-flow-aws
    filters: asset.platform == "aws"
    mql: aws.cognito.identityPools.all(allowClassicFlow == false)
  - uid: mondoo-aws-security-route53-domain-transfer-lock
    title: Ensure Route 53 registered domains have transfer lock enabled
    impact: 90
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/soc2-2017: soc2-control-cc6-1-3
    variants:
      - uid: mondoo-aws-security-route53-domain-transfer-lock-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/icon: aws
    docs:
      desc: |
        This check ensures that domains registered through Amazon Route 53 have the transfer lock (registrar lock) enabled. Transfer lock prevents unauthorized or accidental domain transfers to another registrar, which is one of the most damaging attacks against an organization's online presence.

        **Why this matters**

        - Domain hijacking through unauthorized transfers allows an attacker to take full control of a domain, redirecting all traffic including web, email, and API endpoints.
        - Once a domain is transferred, recovery can take days or weeks through ICANN dispute resolution processes, during which the attacker controls all services associated with the domain.
        - An attacker controlling a domain can intercept emails (including password reset flows), serve phishing pages on legitimate URLs, and issue valid TLS certificates for the domain.
        - Transfer lock sets the `clientTransferProhibited` EPP status code at the registry level, requiring explicit removal before any transfer can proceed.

        **Risk mitigation:**

        - **Domain protection:** Prevents unauthorized domain transfers at the registry level.
        - **Service continuity:** Ensures domains remain under organizational control, preventing service disruptions.
        - **Email security:** Protects email delivery and prevents interception of sensitive communications.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            1. Navigate to the **Route 53 Console** and select **Registered domains**.
            2. Select the domain name.
            3. Under **Transfer lock**, choose **Enable**.
            4. Confirm the change.
        - id: cli
          desc: |
            **Using AWS CLI**

            Enable transfer lock for a domain:

            ```bash
            aws route53domains enable-domain-transfer-lock \
              --region us-east-1 \
              --domain-name example.com
            ```

            Verify the transfer lock status:

            ```bash
            aws route53domains get-domain-detail \
              --region us-east-1 \
              --domain-name example.com \
              --query "{Domain:DomainName,TransferLock:StatusList}"
            ```
    refs:
      - url: https://docs.aws.amazon.com/Route53/latest/DeveloperGuide/domain-lock.html
        title: Locking a domain to prevent unauthorized transfer to another registrar
  - uid: mondoo-aws-security-route53-domain-transfer-lock-aws
    filters: asset.platform == "aws"
    mql: aws.route53.domains.all(transferLock == true)
  - uid: mondoo-aws-security-route53-domain-contact-privacy
    title: Ensure Route 53 registered domains have contact privacy protection enabled
    impact: 50
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-11
      compliance/nis-2: false
      compliance/nist-csf-1: false
      compliance/nist-csf-2: false
      compliance/nist-sp-800-53-rev5: false
      compliance/nist-sp-800-171: false
      compliance/soc2-2017: false
    variants:
      - uid: mondoo-aws-security-route53-domain-contact-privacy-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/icon: aws
    docs:
      desc: |
        This check ensures that domains registered through Amazon Route 53 have privacy protection enabled for all contact types: admin, registrant, and tech. Without privacy protection, WHOIS records expose personal or organizational contact details to anyone who queries them.

        **Why this matters**

        - WHOIS records are publicly queryable and expose contact names, email addresses, phone numbers, and physical addresses associated with the domain registration.
        - Exposed contact details enable targeted social engineering and spear-phishing attacks against domain administrators.
        - Attackers use WHOIS data to impersonate domain owners in registrar support calls, potentially gaining unauthorized access to domain management.
        - Privacy protection replaces real contact details with proxy information from the registrar, preventing public disclosure while maintaining required ICANN contact records.

        **Risk mitigation:**

        - **Social engineering prevention:** Hides contact details that attackers use for targeted phishing and impersonation.
        - **Spam reduction:** Prevents email harvesting from WHOIS records.
        - **Personnel privacy:** Protects the personal information of employees responsible for domain management.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            1. Navigate to the **Route 53 Console** and select **Registered domains**.
            2. Select the domain name.
            3. Under **Contact information**, choose **Edit** for each contact type (Admin, Registrant, Tech).
            4. Enable **Privacy protection** for each contact type.
            5. Save the changes.
        - id: cli
          desc: |
            **Using AWS CLI**

            Enable privacy protection for all contact types:

            ```bash
            aws route53domains update-domain-contact-privacy \
              --region us-east-1 \
              --domain-name example.com \
              --admin-privacy \
              --registrant-privacy \
              --tech-privacy
            ```

            Verify privacy settings:

            ```bash
            aws route53domains get-domain-detail \
              --region us-east-1 \
              --domain-name example.com \
              --query "{Domain:DomainName,AdminPrivacy:AdminPrivacy,RegistrantPrivacy:RegistrantPrivacy,TechPrivacy:TechPrivacy}"
            ```
    refs:
      - url: https://docs.aws.amazon.com/Route53/latest/DeveloperGuide/domain-privacy-protection.html
        title: Enabling or disabling privacy protection for contact information
  - uid: mondoo-aws-security-route53-domain-contact-privacy-aws
    filters: asset.platform == "aws"
    mql: |
      aws.route53.domains.all(
        adminPrivacy == true && registrantPrivacy == true && techPrivacy == true
      )
  - uid: mondoo-aws-security-route53-domain-auto-renew
    title: Ensure Route 53 registered domains have auto-renew enabled
    impact: 80
    tags:
      compliance/iso-27001-2022: false
      compliance/nis-2: false
      compliance/nist-csf-1: false
      compliance/nist-csf-2: false
      compliance/nist-sp-800-53-rev5: false
      compliance/nist-sp-800-171: false
      compliance/soc2-2017: false
    variants:
      - uid: mondoo-aws-security-route53-domain-auto-renew-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/icon: aws
    docs:
      desc: |
        This check ensures that domains registered through Amazon Route 53 have automatic renewal enabled. Without auto-renew, domains can accidentally expire if manual renewal is missed, allowing attackers to register the lapsed domain and hijack all associated services.

        **Why this matters**

        - Expired domains can be registered by anyone, including attackers, immediately after the redemption grace period ends.
        - An attacker who registers an expired domain gains control over all DNS records, enabling them to intercept web traffic, email, API calls, and issue valid TLS certificates.
        - Organizations have lost control of critical domains due to missed renewal notices caused by outdated contact information, personnel changes, or email filtering.
        - Auto-renew ensures domains are renewed before expiration, provided a valid payment method is on file with the registrar.

        **Risk mitigation:**

        - **Domain continuity:** Prevents accidental domain expiration and subsequent hijacking.
        - **Service availability:** Ensures DNS resolution continues uninterrupted for all services depending on the domain.
        - **Operational safety:** Removes dependency on manual renewal processes that can fail due to personnel changes or missed notifications.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            1. Navigate to the **Route 53 Console** and select **Registered domains**.
            2. Select the domain name.
            3. Under **Auto-renew**, choose **Enable**.
            4. Verify that a valid payment method is configured in your AWS account.
        - id: cli
          desc: |
            **Using AWS CLI**

            Enable auto-renew for a domain:

            ```bash
            aws route53domains enable-domain-auto-renew \
              --region us-east-1 \
              --domain-name example.com
            ```

            Verify the auto-renew setting:

            ```bash
            aws route53domains list-domains \
              --region us-east-1 \
              --query "Domains[?DomainName=='example.com'].{Domain:DomainName,AutoRenew:AutoRenew}"
            ```
    refs:
      - url: https://docs.aws.amazon.com/Route53/latest/DeveloperGuide/domain-enable-disable-auto-renewal.html
        title: Enabling or disabling automatic renewal for a domain
  - uid: mondoo-aws-security-route53-domain-auto-renew-aws
    filters: asset.platform == "aws"
    mql: aws.route53.domains.all(autoRenew == true)
  - uid: mondoo-aws-security-memorydb-cluster-tls-enabled
    title: Ensure MemoryDB clusters have encryption in transit (TLS) enabled
    impact: 90
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/soc2-2017: soc2-control-cc6-7-2
    variants:
      - uid: mondoo-aws-security-memorydb-cluster-tls-enabled-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/icon: aws
    docs:
      desc: |
        This check ensures that Amazon MemoryDB clusters have encryption in transit (TLS) enabled. TLS encrypts all data transmitted between clients and the MemoryDB cluster, protecting sensitive data from interception on the network.

        **Why this matters**

        - Without TLS, all data transmitted between applications and MemoryDB travels in plaintext, including cached credentials, session tokens, and application data.
        - Network-level attacks such as packet sniffing, man-in-the-middle, and ARP spoofing can intercept unencrypted Redis traffic on shared or compromised networks.
        - TLS must be enabled at cluster creation and cannot be changed afterward. Clusters created without TLS must be recreated to enable encryption in transit.
        - MemoryDB is often used to cache sensitive data such as user sessions, authentication tokens, and API responses, making transport encryption critical.

        **Risk mitigation:**

        - **Data confidentiality:** Encrypts all data in transit between clients and the cluster, preventing eavesdropping.
        - **Authentication:** TLS provides mutual authentication, ensuring clients connect to the legitimate cluster endpoint.
        - **Compliance:** Meets encryption-in-transit requirements in PCI DSS, HIPAA, SOC 2, and other frameworks.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            TLS cannot be enabled on an existing cluster. To remediate:

            1. Navigate to the **Amazon MemoryDB Console** and select **Clusters**.
            2. Create a new cluster with **Encryption in transit** enabled.
            3. Migrate data from the existing cluster to the new TLS-enabled cluster.
            4. Update application connection strings to use the new cluster endpoint with TLS.
            5. Delete the old cluster after verifying the migration.
        - id: cli
          desc: |
            **Using AWS CLI**

            Create a new MemoryDB cluster with TLS enabled:

            ```bash
            aws memorydb create-cluster \
              --cluster-name secure-memorydb-cluster \
              --node-type db.r6g.large \
              --acl-name my-acl \
              --tls-enabled
            ```

            Verify TLS status on existing clusters:

            ```bash
            aws memorydb describe-clusters \
              --query "Clusters[*].{Name:Name,TLS:TLSEnabled,Status:Status}"
            ```
    refs:
      - url: https://docs.aws.amazon.com/memorydb/latest/devguide/in-transit-encryption.html
        title: MemoryDB encryption in transit
  - uid: mondoo-aws-security-memorydb-cluster-tls-enabled-aws
    filters: asset.platform == "aws"
    mql: aws.memorydb.clusters.all(tlsEnabled == true)
  - uid: mondoo-aws-security-memorydb-cluster-cmk-encryption
    title: Ensure MemoryDB clusters are encrypted with a customer-managed KMS key
    impact: 70
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-12
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-10
      compliance/soc2-2017: soc2-control-cc6-1-10
    variants:
      - uid: mondoo-aws-security-memorydb-cluster-cmk-encryption-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/icon: aws
    docs:
      desc: |
        This check ensures that Amazon MemoryDB clusters are encrypted at rest using a customer-managed AWS KMS key (CMK) rather than the default AWS-owned service key. While MemoryDB always encrypts data at rest, using a customer-managed key provides greater control over the encryption lifecycle.

        **Why this matters**

        - The default AWS-owned key does not allow you to control key rotation schedules, define granular access policies, or independently audit key usage.
        - Customer-managed KMS keys enable you to define who can use and manage the key through IAM and key policies, providing an additional layer of access control.
        - Using CMKs enables detailed audit trails in AWS CloudTrail for all encryption and decryption operations on MemoryDB data.
        - Some compliance frameworks require organizations to manage their own encryption keys rather than relying on provider-managed keys.

        **Risk mitigation:**

        - **Key control:** Provides full lifecycle control over encryption keys, including the ability to disable or revoke access.
        - **Audit visibility:** Enables detailed CloudTrail logging of all key usage for compliance and forensic purposes.
        - **Access separation:** Allows separation of duties between database administrators and key administrators.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            KMS key cannot be changed on an existing cluster. To remediate:

            1. Navigate to the **Amazon MemoryDB Console** and select **Clusters**.
            2. Create a new cluster and under **Encryption at rest**, select a customer-managed KMS key.
            3. Migrate data from the existing cluster to the new cluster.
            4. Update application connection strings to use the new cluster endpoint.
            5. Delete the old cluster after verifying the migration.
        - id: cli
          desc: |
            **Using AWS CLI**

            Create a MemoryDB cluster with a customer-managed KMS key:

            ```bash
            aws memorydb create-cluster \
              --cluster-name secure-memorydb-cluster \
              --node-type db.r6g.large \
              --acl-name my-acl \
              --tls-enabled \
              --kms-key-id arn:aws:kms:region:account-id:key/key-id
            ```

            Verify the KMS key used by existing clusters:

            ```bash
            aws memorydb describe-clusters \
              --query "Clusters[*].{Name:Name,KmsKeyId:KmsKeyId}"
            ```
    refs:
      - url: https://docs.aws.amazon.com/memorydb/latest/devguide/at-rest-encryption.html
        title: MemoryDB encryption at rest
      - url: https://docs.aws.amazon.com/kms/latest/developerguide/concepts.html#customer-cmk
        title: AWS KMS Customer Managed Keys
  - uid: mondoo-aws-security-memorydb-cluster-cmk-encryption-aws
    filters: asset.platform == "aws"
    mql: aws.memorydb.clusters.all(kmsKey { metadata.KeyManager == "CUSTOMER" })
  - uid: mondoo-aws-security-memorydb-cluster-auto-minor-version-upgrade
    title: Ensure MemoryDB clusters have automatic minor version upgrades enabled
    impact: 60
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-8
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-12
      compliance/nist-csf-2: nist-csf-2-pr-ps-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-1
      compliance/soc2-2017: soc2-control-cc7-1-1
    variants:
      - uid: mondoo-aws-security-memorydb-cluster-auto-minor-version-upgrade-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/icon: aws
    docs:
      desc: |
        This check ensures that Amazon MemoryDB clusters have automatic minor version upgrades enabled. When enabled, clusters automatically receive minor engine version upgrades during the maintenance window, ensuring security patches and bug fixes are applied promptly.

        **Why this matters**

        - Minor version upgrades typically include security patches that address known vulnerabilities in the Redis engine.
        - Without automatic upgrades, clusters may run outdated engine versions with known security vulnerabilities for extended periods.
        - Manual upgrade processes introduce delays between patch availability and application, increasing the window of exposure.
        - Keeping database engines up to date is a fundamental requirement for compliance with security frameworks that mandate timely patch management.

        **Risk mitigation:**

        - **Patch management:** Ensures security patches are applied automatically during the next maintenance window.
        - **Vulnerability reduction:** Minimizes the time window during which known vulnerabilities remain unpatched.
        - **Compliance:** Meets requirements for timely application of security updates in managed database services.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            1. Navigate to the **Amazon MemoryDB Console** and select **Clusters**.
            2. Select the cluster to modify.
            3. Choose **Modify**.
            4. Enable **Auto minor version upgrade**.
            5. Choose **Modify cluster**.
        - id: cli
          desc: |
            **Using AWS CLI**

            Enable automatic minor version upgrades for a MemoryDB cluster:

            ```bash
            aws memorydb update-cluster \
              --cluster-name <cluster-name> \
              --auto-minor-version-upgrade
            ```

            Verify the setting:

            ```bash
            aws memorydb describe-clusters \
              --query "Clusters[*].{Name:Name,AutoUpgrade:AutoMinorVersionUpgrade}"
            ```
    refs:
      - url: https://docs.aws.amazon.com/memorydb/latest/devguide/engine-versions.html
        title: MemoryDB engine versions
  - uid: mondoo-aws-security-memorydb-cluster-auto-minor-version-upgrade-aws
    filters: asset.platform == "aws"
    mql: aws.memorydb.clusters.all(autoMinorVersionUpgrade == true)
  - uid: mondoo-aws-security-kinesis-stream-encrypted
    title: Ensure Kinesis data streams have server-side encryption enabled
    impact: 80
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/soc2-2017: soc2-control-cc6-1-10
    variants:
      - uid: mondoo-aws-security-kinesis-stream-encrypted-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/icon: aws
    docs:
      desc: |
        This check ensures that Amazon Kinesis data streams have server-side encryption enabled. Without encryption, data records stored in the stream are unencrypted, exposing sensitive streaming data to unauthorized access if the underlying storage is compromised.

        **Why this matters**

        - Kinesis data streams often carry sensitive data such as application logs, clickstream data, financial transactions, and IoT telemetry that must be protected at rest.
        - By default, Kinesis data streams do not have server-side encryption enabled, leaving all data records stored unencrypted.
        - Without encryption, anyone with access to the underlying storage infrastructure could read the raw data records.
        - Encryption at rest is a requirement for compliance with security frameworks including PCI DSS, HIPAA, and SOC 2.

        **Risk mitigation:**

        - **Data protection:** Ensures all data records in the stream are encrypted at rest using AWS KMS.
        - **Compliance:** Meets regulatory requirements for encryption of data at rest in streaming services.
        - **Defense in depth:** Adds a layer of protection beyond IAM access controls.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            1. Navigate to the **Amazon Kinesis Console** and select **Data streams**.
            2. Select the stream to modify.
            3. Under the **Configuration** tab, choose **Edit** next to **Server-side encryption**.
            4. Enable **Server-side encryption**.
            5. Choose a KMS key (AWS managed or customer-managed).
            6. Choose **Save changes**.
        - id: cli
          desc: |
            **Using AWS CLI**

            Enable server-side encryption on a Kinesis data stream:

            ```bash
            aws kinesis start-stream-encryption \
              --stream-name <stream-name> \
              --encryption-type KMS \
              --key-id alias/aws/kinesis
            ```

            Verify encryption status:

            ```bash
            aws kinesis describe-stream-summary --stream-name <stream-name> \
              --query "StreamDescriptionSummary.{Name:StreamName,Encryption:EncryptionType,KeyId:KeyId}"
            ```
    refs:
      - url: https://docs.aws.amazon.com/streams/latest/dev/what-is-sse.html
        title: Data protection in Amazon Kinesis Data Streams
  - uid: mondoo-aws-security-kinesis-stream-encrypted-aws
    filters: asset.platform == "aws"
    mql: aws.kinesis.streams.all(encryptionType == "KMS")
  - uid: mondoo-aws-security-kinesis-stream-cmk-encryption
    title: Ensure Kinesis data streams are encrypted with a customer-managed KMS key
    impact: 70
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-12
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-10
      compliance/soc2-2017: soc2-control-cc6-1-10
    variants:
      - uid: mondoo-aws-security-kinesis-stream-cmk-encryption-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/icon: aws
    docs:
      desc: |
        This check ensures that Amazon Kinesis data streams are encrypted using a customer-managed AWS KMS key (CMK) rather than the default AWS-managed `aws/kinesis` service key. Customer-managed keys provide greater control over the encryption lifecycle, including key rotation policies, access control, and audit capabilities.

        **Why this matters**

        - The default AWS-managed `aws/kinesis` key does not allow you to control key rotation schedules, define granular access policies, or independently audit key usage.
        - Customer-managed KMS keys enable you to define who can use and manage the key through IAM and key policies, providing an additional layer of access control beyond Kinesis IAM policies.
        - Using CMKs enables detailed audit trails in AWS CloudTrail for all encryption and decryption operations on stream data.
        - Some compliance frameworks require organizations to manage their own encryption keys rather than relying on provider-managed keys.

        **Risk mitigation:**

        - **Key control:** Provides full lifecycle control over encryption keys, including the ability to disable or revoke access.
        - **Audit visibility:** Enables detailed CloudTrail logging of all key usage for compliance and forensic purposes.
        - **Access separation:** Allows separation of duties between stream administrators and key administrators.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            1. Navigate to the **Amazon Kinesis Console** and select **Data streams**.
            2. Select the stream to modify.
            3. Under the **Configuration** tab, choose **Edit** next to **Server-side encryption**.
            4. Select **Use a customer-managed AWS KMS key**.
            5. Choose or enter the ARN of your customer-managed KMS key.
            6. Choose **Save changes**.
        - id: cli
          desc: |
            **Using AWS CLI**

            Enable encryption with a customer-managed KMS key:

            ```bash
            aws kinesis start-stream-encryption \
              --stream-name <stream-name> \
              --encryption-type KMS \
              --key-id arn:aws:kms:region:account-id:key/key-id
            ```

            Verify the key used:

            ```bash
            aws kinesis describe-stream-summary --stream-name <stream-name> \
              --query "StreamDescriptionSummary.{Name:StreamName,Encryption:EncryptionType,KeyId:KeyId}"
            ```
    refs:
      - url: https://docs.aws.amazon.com/streams/latest/dev/what-is-sse.html
        title: Data protection in Amazon Kinesis Data Streams
      - url: https://docs.aws.amazon.com/kms/latest/developerguide/concepts.html#customer-cmk
        title: AWS KMS Customer Managed Keys
  - uid: mondoo-aws-security-kinesis-stream-cmk-encryption-aws
    filters: asset.platform == "aws"
    mql: |
      aws.kinesis.streams.all(
        encryptionType == "KMS" && keyId != /alias\/aws\/kinesis/
      )
  - uid: mondoo-aws-security-kinesis-firehose-encrypted
    title: Ensure Kinesis Firehose delivery streams are encrypted
    impact: 80
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/soc2-2017: soc2-control-cc6-1-10
    variants:
      - uid: mondoo-aws-security-kinesis-firehose-encrypted-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/icon: aws
    docs:
      desc: |
        This check ensures that Amazon Kinesis Firehose delivery streams have server-side encryption enabled. Without encryption, data buffered in the delivery stream before delivery to its destination is stored unencrypted, exposing sensitive data to unauthorized access.

        **Why this matters**

        - Firehose delivery streams buffer data before delivering it to destinations such as S3, Redshift, OpenSearch, or HTTP endpoints. Without encryption, this buffered data is stored unencrypted.
        - Delivery streams often carry sensitive data including application logs, analytics events, and operational metrics that may contain personally identifiable information (PII) or business-sensitive data.
        - Encryption at rest is a requirement for compliance with security frameworks including PCI DSS, HIPAA, and SOC 2.
        - Enabling server-side encryption ensures data is protected throughout the delivery pipeline, not just at the final destination.

        **Risk mitigation:**

        - **Data protection:** Encrypts data at rest within the delivery stream buffer using AWS KMS.
        - **End-to-end security:** Ensures data is protected during the buffering phase before delivery to the destination.
        - **Compliance:** Meets regulatory requirements for encryption of data at rest in data pipeline services.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            1. Navigate to the **Amazon Data Firehose Console** and select the delivery stream.
            2. Under the **Configuration** tab, choose **Edit** next to **Server-side encryption**.
            3. Enable **Server-side encryption**.
            4. Choose a KMS key (AWS managed or customer-managed).
            5. Choose **Save changes**.
        - id: cli
          desc: |
            **Using AWS CLI**

            Enable server-side encryption on a Firehose delivery stream:

            ```bash
            aws firehose start-delivery-stream-encryption \
              --delivery-stream-name <stream-name> \
              --delivery-stream-encryption-configuration-input KeyType=AWS_OWNED_CMK
            ```

            For a customer-managed key:

            ```bash
            aws firehose start-delivery-stream-encryption \
              --delivery-stream-name <stream-name> \
              --delivery-stream-encryption-configuration-input KeyType=CUSTOMER_MANAGED_CMK,KeyARN=arn:aws:kms:region:account-id:key/key-id
            ```

            Verify encryption status:

            ```bash
            aws firehose describe-delivery-stream --delivery-stream-name <stream-name> \
              --query "DeliveryStreamDescription.{Name:DeliveryStreamName,Encryption:DeliveryStreamEncryptionConfiguration}"
            ```
    refs:
      - url: https://docs.aws.amazon.com/firehose/latest/dev/encryption.html
        title: Data protection in Amazon Data Firehose
  - uid: mondoo-aws-security-kinesis-firehose-encrypted-aws
    filters: asset.platform == "aws"
    mql: |
      aws.kinesis.firehoseDeliveryStreams.all(
        encryption['Status'] == "ENABLED"
      )
  - uid: mondoo-aws-security-athena-workgroup-enforce-configuration
    title: Ensure Athena workgroups enforce workgroup configuration
    impact: 70
    tags:
      compliance/iso-27001-2022: false
      compliance/nis-2: false
      compliance/nist-csf-1: false
      compliance/nist-csf-2: false
      compliance/nist-sp-800-53-rev5: false
      compliance/nist-sp-800-171: false
      compliance/soc2-2017: false
    variants:
      - uid: mondoo-aws-security-athena-workgroup-enforce-configuration-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/icon: aws
    docs:
      desc: |
        This check ensures that Amazon Athena workgroups have the "enforce workgroup configuration" setting enabled. When this setting is disabled, individual users can override workgroup-level settings from their client, including the query result output location and encryption configuration.

        **Why this matters**

        - Without enforcement, users can override the configured S3 output location and write query results to arbitrary S3 buckets, potentially ones without encryption or proper access controls.
        - Users can bypass encryption settings configured at the workgroup level, writing unencrypted query results that may contain sensitive data.
        - Workgroup configuration enforcement is the primary mechanism for ensuring consistent security controls across all queries run within the workgroup.
        - Disabling enforcement defeats the purpose of centrally managing security settings and makes it impossible to guarantee data protection for query outputs.

        **Risk mitigation:**

        - **Configuration integrity:** Ensures workgroup-level encryption and output location settings cannot be bypassed by individual users.
        - **Data protection:** Guarantees all query results are written to the approved S3 location with the configured encryption.
        - **Centralized control:** Enables administrators to enforce security policies consistently across all workgroup users.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            1. Navigate to the **Amazon Athena Console** and select **Workgroups**.
            2. Select the workgroup to modify.
            3. Choose **Edit**.
            4. Under **Settings**, enable **Override client-side settings**.
            5. Choose **Save**.
        - id: cli
          desc: |
            **Using AWS CLI**

            Enable workgroup configuration enforcement:

            ```bash
            aws athena update-work-group \
              --work-group <workgroup-name> \
              --configuration-updates EnforceWorkGroupConfiguration=true
            ```

            Verify the setting:

            ```bash
            aws athena get-work-group --work-group <workgroup-name> \
              --query "WorkGroup.Configuration.EnforceWorkGroupConfiguration"
            ```
    refs:
      - url: https://docs.aws.amazon.com/athena/latest/ug/workgroups-settings-override.html
        title: Workgroup settings override client-side settings
  - uid: mondoo-aws-security-athena-workgroup-enforce-configuration-aws
    filters: asset.platform == "aws"
    mql: |
      aws.athena.workgroups.where(state == "ENABLED").all(
        enforceWorkGroupConfiguration == true
      )
  - uid: mondoo-aws-security-athena-workgroup-results-encrypted
    title: Ensure Athena workgroups encrypt query results
    impact: 80
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/soc2-2017: soc2-control-cc6-1-10
    variants:
      - uid: mondoo-aws-security-athena-workgroup-results-encrypted-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/icon: aws
    docs:
      desc: |
        This check ensures that Amazon Athena workgroups have encryption configured for query results. Query results are written to S3, and without encryption configuration at the workgroup level, results may be stored unencrypted, exposing sensitive data queried from data lakes, CloudTrail logs, or other sources.

        **Why this matters**

        - Athena queries often access sensitive data stored in S3 data lakes, CloudTrail logs, VPC Flow Logs, and other data sources. Query results containing this data must be encrypted.
        - Without workgroup-level encryption configuration, query results are written to S3 without server-side encryption unless the destination bucket has a default encryption policy.
        - Relying solely on S3 bucket default encryption is fragile — the output location can change, and not all buckets may have default encryption enabled.
        - Configuring encryption at the workgroup level, combined with enforcing workgroup configuration, guarantees all query results are encrypted regardless of the destination bucket settings.

        **Risk mitigation:**

        - **Data protection:** Ensures all query results are encrypted at rest in S3 using SSE-S3, SSE-KMS, or CSE-KMS.
        - **Defense in depth:** Provides encryption independent of S3 bucket default encryption settings.
        - **Compliance:** Meets requirements for encryption of data at rest for query output in analytics services.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            1. Navigate to the **Amazon Athena Console** and select **Workgroups**.
            2. Select the workgroup to modify.
            3. Choose **Edit**.
            4. Under **Query result configuration**, configure **Encrypt query results**.
            5. Select the encryption type (SSE_S3, SSE_KMS, or CSE_KMS).
            6. For KMS-based encryption, select or enter the KMS key ARN.
            7. Choose **Save**.
        - id: cli
          desc: |
            **Using AWS CLI**

            Configure query result encryption with SSE-KMS:

            ```bash
            aws athena update-work-group \
              --work-group <workgroup-name> \
              --configuration-updates '{
                "ResultConfigurationUpdates": {
                  "EncryptionConfiguration": {
                    "EncryptionOption": "SSE_KMS",
                    "KmsKey": "arn:aws:kms:region:account-id:key/key-id"
                  }
                }
              }'
            ```

            Verify the encryption configuration:

            ```bash
            aws athena get-work-group --work-group <workgroup-name> \
              --query "WorkGroup.Configuration.ResultConfiguration.EncryptionConfiguration"
            ```
    refs:
      - url: https://docs.aws.amazon.com/athena/latest/ug/encrypting-query-results-stored-in-s3.html
        title: Encrypting Athena query results stored in Amazon S3
  - uid: mondoo-aws-security-athena-workgroup-results-encrypted-aws
    filters: asset.platform == "aws"
    mql: |
      aws.athena.workgroups.where(state == "ENABLED").all(
        resultConfiguration['EncryptionConfiguration'] != null &&
        resultConfiguration['EncryptionConfiguration']['EncryptionOption'] != null
      )
  - uid: mondoo-aws-security-workspaces-volume-encryption
    title: Ensure WorkSpaces instances have root and user volume encryption enabled
    impact: 80
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/soc2-2017: soc2-control-cc6-1-10
    variants:
      - uid: mondoo-aws-security-workspaces-volume-encryption-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/icon: aws
    docs:
      desc: |
        This check ensures that Amazon WorkSpaces instances have encryption enabled for both root and user volumes. Without volume encryption, data stored on the workspace — including operating system files, application data, and user documents — is unencrypted at rest.

        **Why this matters**

        - WorkSpaces store sensitive data including user documents, application data, browser profiles, cached credentials, and email on their volumes.
        - Without encryption, this data is vulnerable to unauthorized access if the underlying storage infrastructure is compromised.
        - Volume encryption must be enabled at workspace creation and cannot be changed afterward. Unencrypted workspaces must be rebuilt to enable encryption.
        - Both the root volume (operating system and applications) and user volume (user data and profile) should be encrypted for comprehensive protection.

        **Risk mitigation:**

        - **Data protection:** Ensures all data at rest on workspace volumes is encrypted using AWS KMS.
        - **Compliance:** Meets encryption-at-rest requirements in PCI DSS, HIPAA, SOC 2, and other frameworks.
        - **Defense in depth:** Protects data even if underlying storage is accessed outside of normal WorkSpaces operations.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            Volume encryption cannot be enabled on existing workspaces. To remediate:

            1. Navigate to the **Amazon WorkSpaces Console** and select **WorkSpaces**.
            2. Note the configuration of the unencrypted workspace (bundle, directory, user).
            3. Launch a new workspace for the same user with **Encryption** enabled for both root and user volumes.
            4. Select a KMS key for encryption (AWS managed or customer-managed).
            5. Migrate user data from the old workspace to the new one.
            6. Terminate the unencrypted workspace.

            To ensure all future workspaces are encrypted, configure encryption in the directory default creation properties.
        - id: cli
          desc: |
            **Using AWS CLI**

            Create an encrypted workspace:

            ```bash
            aws workspaces create-workspaces --workspaces '[{
              "DirectoryId": "<directory-id>",
              "UserName": "<username>",
              "BundleId": "<bundle-id>",
              "RootVolumeEncryptionEnabled": true,
              "UserVolumeEncryptionEnabled": true,
              "VolumeEncryptionKey": "arn:aws:kms:region:account-id:key/key-id"
            }]'
            ```

            Check encryption status of existing workspaces:

            ```bash
            aws workspaces describe-workspaces \
              --query "Workspaces[*].{Id:WorkspaceId,User:UserName,RootEncrypted:RootVolumeEncryptionEnabled,UserEncrypted:UserVolumeEncryptionEnabled}"
            ```
    refs:
      - url: https://docs.aws.amazon.com/workspaces/latest/adminguide/encrypt-workspaces.html
        title: Encrypted WorkSpaces
  - uid: mondoo-aws-security-workspaces-volume-encryption-aws
    filters: asset.platform == "aws"
    mql: |
      aws.workspaces.instances.all(
        rootVolumeEncryptionEnabled == true && userVolumeEncryptionEnabled == true
      )
  - uid: mondoo-aws-security-workspaces-directory-web-access-disabled
    title: Ensure WorkSpaces directories deny web access by default
    impact: 60
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/soc2-2017: soc2-control-cc6-1-3
    variants:
      - uid: mondoo-aws-security-workspaces-directory-web-access-disabled-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/icon: aws
    docs:
      desc: |
        This check ensures that WorkSpaces directories deny web browser access to workspaces. When web access is allowed, users can connect to their WorkSpaces from any web browser without requiring a managed device or the WorkSpaces client application, bypassing endpoint security controls.

        **Why this matters**

        - Web access allows connections from any device with a browser, including unmanaged personal devices, public kiosks, and shared computers that may not meet organizational security standards.
        - Unlike the WorkSpaces client, web browser sessions cannot be verified for device compliance, endpoint protection, or certificate-based authentication.
        - Browser-based access may expose workspace sessions to browser-specific attacks such as extensions capturing input, local storage leakage, or session hijacking.
        - Disabling web access enforces the use of the WorkSpaces client, which supports device authentication, managed device verification, and more granular connection controls.

        **Risk mitigation:**

        - **Device control:** Ensures users can only connect from devices with the WorkSpaces client installed, enabling managed device enforcement.
        - **Endpoint security:** Prevents access from unmanaged devices that may lack antivirus, encryption, or patch compliance.
        - **Session security:** Reduces exposure to browser-based attacks and session leakage risks.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            1. Navigate to the **Amazon WorkSpaces Console** and select **Directories**.
            2. Select the directory to modify.
            3. Under **Access control options**, choose **Edit**.
            4. Set **Web browser** to **Deny**.
            5. Choose **Save**.
        - id: cli
          desc: |
            **Using AWS CLI**

            Deny web access for a WorkSpaces directory:

            ```bash
            aws workspaces modify-workspace-access-properties \
              --resource-id <directory-id> \
              --workspace-access-properties DeviceTypeWeb=DENY
            ```

            Verify the setting:

            ```bash
            aws workspaces describe-workspace-directories --directory-ids <directory-id> \
              --query "Directories[*].{Id:DirectoryId,WebAccess:WorkspaceAccessProperties.DeviceTypeWeb}"
            ```
    refs:
      - url: https://docs.aws.amazon.com/workspaces/latest/adminguide/update-directory-details.html
        title: Update directory details for your WorkSpaces
  - uid: mondoo-aws-security-workspaces-directory-web-access-disabled-aws
    filters: asset.platform == "aws"
    mql: |
      aws.workspaces.directories.all(
        workspaceAccessProperties['DeviceTypeWeb'] == "DENY"
      )
  - uid: mondoo-aws-security-workspaces-directory-maintenance-mode
    title: Ensure WorkSpaces directories have maintenance mode enabled
    impact: 50
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-8
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-12
      compliance/nist-csf-2: nist-csf-2-pr-ps-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-1
      compliance/soc2-2017: soc2-control-cc7-1-1
    variants:
      - uid: mondoo-aws-security-workspaces-directory-maintenance-mode-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/icon: aws
    docs:
      desc: |
        This check ensures that WorkSpaces directories have automatic maintenance mode enabled in the default creation properties. When maintenance mode is enabled, WorkSpaces are automatically started during a daily maintenance window to install operating system and application updates.

        **Why this matters**

        - Without maintenance mode, WorkSpaces only receive updates when they are running. Always-on workspaces receive updates normally, but auto-stop workspaces may remain unpatched for extended periods.
        - Unpatched WorkSpaces are vulnerable to known security exploits that have publicly available patches.
        - Maintenance mode ensures that auto-stop workspaces are temporarily started during the maintenance window to apply critical security updates from Windows Update or Amazon Linux repositories.
        - Consistent patch management across all workspaces is a fundamental requirement for security compliance frameworks.

        **Risk mitigation:**

        - **Patch management:** Ensures all workspaces receive operating system and application security updates regularly.
        - **Vulnerability reduction:** Minimizes the window during which known vulnerabilities remain unpatched on workspace instances.
        - **Compliance:** Meets requirements for automated patch management in managed desktop environments.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            1. Navigate to the **Amazon WorkSpaces Console** and select **Directories**.
            2. Select the directory to modify.
            3. Under **Maintenance mode**, choose **Edit**.
            4. Enable **Maintenance mode**.
            5. Choose **Save**.
        - id: cli
          desc: |
            **Using AWS CLI**

            Enable maintenance mode for a WorkSpaces directory:

            ```bash
            aws workspaces modify-workspace-creation-properties \
              --resource-id <directory-id> \
              --workspace-creation-properties EnableMaintenanceMode=true
            ```

            Verify the setting:

            ```bash
            aws workspaces describe-workspace-directories --directory-ids <directory-id> \
              --query "Directories[*].{Id:DirectoryId,Maintenance:WorkspaceCreationProperties.EnableMaintenanceMode}"
            ```
    refs:
      - url: https://docs.aws.amazon.com/workspaces/latest/adminguide/workspace-maintenance.html
        title: WorkSpaces maintenance
  - uid: mondoo-aws-security-workspaces-directory-maintenance-mode-aws
    filters: asset.platform == "aws"
    mql: |
      aws.workspaces.directories.all(
        defaultCreationProperties['EnableMaintenanceMode'] == true
      )
  - uid: mondoo-aws-security-workspaces-no-unrestricted-inbound
    title: Ensure WorkSpaces security groups do not allow unrestricted inbound access
    impact: 80
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-4
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/soc2-2017: soc2-control-cc6-6-1
    variants:
      - uid: mondoo-aws-security-workspaces-no-unrestricted-inbound-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/icon: aws
    docs:
      desc: |
        This check ensures that security groups associated with Amazon WorkSpaces do not contain inbound rules allowing unrestricted access from `0.0.0.0/0` or `::/0`. Overly permissive security groups expose WorkSpaces to the entire internet, creating a direct attack path to corporate desktops.

        **Why this matters**

        - **Direct desktop exposure**: WorkSpaces are full desktop environments with access to corporate applications, documents, and internal networks. Unrestricted inbound access allows anyone on the internet to attempt connections.
        - **Credential attacks**: Open inbound ports enable brute force and credential stuffing attacks against RDP, PCoIP, or WSP protocols used by WorkSpaces.
        - **Lateral movement**: A compromised WorkSpace with broad network access can serve as a pivot point into the corporate network, reaching internal resources that are not directly internet-facing.
        - **Data exfiltration**: Attackers who gain access to a WorkSpace can access any data or applications available to the workspace user.
        - **Compliance requirements**: Security frameworks require network access to be restricted to the minimum necessary, and unrestricted inbound rules violate this principle.

        Restrict security group inbound rules to specific CIDR ranges such as corporate office IPs, VPN endpoints, or known management networks.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            1. Navigate to the **Amazon WorkSpaces Console** and identify the security groups associated with your WorkSpaces.
            2. Go to the **VPC Console** > **Security Groups**.
            3. Select each security group used by WorkSpaces.
            4. Review the **Inbound rules** tab for rules with source `0.0.0.0/0` or `::/0`.
            5. Replace unrestricted sources with specific CIDR ranges for your corporate network, VPN, or management IPs.
        - id: cli
          desc: |
            **Using AWS CLI**

            Identify security groups with unrestricted inbound rules:

            ```bash
            aws ec2 describe-security-groups \
              --group-ids <workspace-security-group-ids> \
              --query "SecurityGroups[*].{Id:GroupId,Name:GroupName,Rules:IpPermissions[?contains(IpRanges[].CidrIp,'0.0.0.0/0') || contains(Ipv6Ranges[].CidrIpv6,'::/0')]}"
            ```

            Remove the unrestricted rule and add a restricted one:

            ```bash
            aws ec2 revoke-security-group-ingress \
              --group-id <sg-id> \
              --protocol tcp --port <port> --cidr 0.0.0.0/0

            aws ec2 authorize-security-group-ingress \
              --group-id <sg-id> \
              --protocol tcp --port <port> --cidr <corporate-cidr>
            ```
    refs:
      - url: https://docs.aws.amazon.com/workspaces/latest/adminguide/amazon-workspaces-security-groups.html
        title: Security Groups for Amazon WorkSpaces
      - url: https://docs.aws.amazon.com/vpc/latest/userguide/security-group-rules.html
        title: Security group rules
  - uid: mondoo-aws-security-workspaces-no-unrestricted-inbound-aws
    filters: asset.platform == "aws"
    mql: |
      aws.workspaces.instances.all(
        securityGroups.all(
          ipPermissions.all(
            ipRanges.contains("0.0.0.0/0") == false && ipRanges.contains("::/0") == false
          )
        )
      )
  - uid: mondoo-aws-security-neptune-instance-public-access
    title: Ensure Neptune DB instances are not publicly accessible
    impact: 90
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/soc2-2017: soc2-control-cc6-6-1
    variants:
      - uid: mondoo-aws-security-neptune-instance-public-access-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/icon: aws
      - uid: mondoo-aws-security-neptune-instance-public-access-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/icon: terraform
      - uid: mondoo-aws-security-neptune-instance-public-access-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/icon: terraform
      - uid: mondoo-aws-security-neptune-instance-public-access-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/icon: terraform
    docs:
      desc: |
        This check ensures that Amazon Neptune DB instances are not publicly accessible. When a Neptune instance is marked as publicly accessible, it can potentially be reached from outside the VPC, exposing the graph database to unauthorized access from the internet.

        **Why this matters**

        - Neptune databases often contain highly connected, sensitive data such as identity graphs, fraud detection networks, and knowledge graphs.
        - Publicly accessible instances are reachable from the internet if security group rules allow it, increasing the attack surface.
        - Even with authentication enabled, exposing database endpoints to the internet increases the risk of brute-force attacks and exploitation of potential vulnerabilities.
        - Neptune should be accessed only from within the VPC or through private connectivity mechanisms such as VPC peering or AWS PrivateLink.

        **Risk mitigation:**

        - **Network isolation:** Ensures Neptune instances are only reachable from within the VPC.
        - **Reduced attack surface:** Eliminates the possibility of internet-based attacks against the database.
        - **Defense in depth:** Complements security group rules and IAM authentication by removing public network exposure.
      remediation:
        - id: console
          desc: |
            **Using AWS Console**

            1. Navigate to the Amazon Neptune Console.
            2. Select Databases in the left panel.
            3. Select the Neptune DB instance.
            4. Select Modify.
            5. Under Connectivity, set Publicly accessible to No.
            6. Select Continue and apply the changes.
        - id: cli
          desc: |
            **Using AWS CLI**

            Disable public accessibility on a Neptune instance:

            ```bash
            aws neptune modify-db-instance \
              --db-instance-identifier <instance-id> \
              --no-publicly-accessible
            ```

            Verify the setting:

            ```bash
            aws neptune describe-db-instances --db-instance-identifier <instance-id> \
              --query "DBInstances[*].{InstanceId:DBInstanceIdentifier,Public:PubliclyAccessible}"
            ```
        - id: terraform
          desc: |
            **Using Terraform**

            ```hcl
            resource "aws_neptune_cluster_instance" "example" {
              cluster_identifier  = aws_neptune_cluster.example.id
              instance_class      = "db.r5.large"
              publicly_accessible = false
            }
            ```
        - id: cloudformation
          desc: |
            **Using CloudFormation**

            ```yaml
            Resources:
              NeptuneInstance:
                Type: "AWS::Neptune::DBInstance"
                Properties:
                  DBInstanceClass: "db.r5.large"
                  DBClusterIdentifier: !Ref NeptuneCluster
                  PubliclyAccessible: false
            ```
    refs:
