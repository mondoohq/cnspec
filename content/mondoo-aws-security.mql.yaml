          --query "SecurityGroups[?IpPermissions[?FromPort<=\`9300\` && ToPort>=\`9200\` && (IpRanges[?CidrIp=='0.0.0.0/0'] || Ipv6Ranges[?CidrIpv6=='::/0'])]].{GroupId:GroupId,GroupName:GroupName}" \
          --output table
        ```

        A passing security group returns no results in the query output. A failing security group appears in the results with its `GroupId` listed.

      remediation:
        - id: cli
          desc: |
            ```bash
            aws ec2 revoke-security-group-ingress \
              --group-id <sg-id> \
              --ip-permissions IpProtocol=tcp,FromPort=9200,ToPort=9300,IpRanges='[{CidrIp=0.0.0.0/0}]'
            ```
        - id: terraform
          desc: |
            Replace any `0.0.0.0/0` or `::/0` source on ports 9200-9300 with the application-tier security group, VPN CIDR, or specific bastion address. The example shows the modern `aws_vpc_security_group_ingress_rule` form; the same rule applies to inline `ingress` blocks on `aws_security_group`:

            ```hcl
            resource "aws_vpc_security_group_ingress_rule" "from_app" {
              security_group_id            = aws_security_group.workload.id
              referenced_security_group_id = aws_security_group.app.id
              ip_protocol                  = "tcp"
              from_port                    = 9200
              to_port                      = 9300
            }
            ```
        - id: cloudformation
          desc: |
            To restrict Elasticsearch / OpenSearch access in CloudFormation, scope every `SecurityGroupIngress` rule covering port 9200–9300 to a specific source security group, IP range, or VPC peer rather than `0.0.0.0/0` or `::/0`:

            ```yaml
