  - uid: mondoo-aws-security-elasticsearch-tls-policy
    title: Ensure Elasticsearch domains use TLS 1.2 or higher
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    variants:
      - uid: mondoo-aws-security-elasticsearch-tls-policy-aws
        tags:
          mondoo.com/filter-title: AWS ES Domain
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-elasticsearch-tls-policy-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-elasticsearch-tls-policy-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-elasticsearch-tls-policy-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-elasticsearch-tls-policy-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon Elasticsearch Service domains are configured with a TLS security policy that enforces TLS 1.2 or higher. Older TLS versions (1.0 and 1.1) have known vulnerabilities and should not be used for production workloads.

        **Why this matters**

        - TLS 1.0 and 1.1 are deprecated due to known vulnerabilities including BEAST, POODLE, and other protocol-level attacks that can compromise encryption.
        - Using outdated TLS versions may allow attackers to downgrade connections and exploit weaknesses in the encryption protocol.
        - Enforcing TLS 1.2 or higher ensures that all client connections use modern cryptographic standards with strong cipher suites.

        **Risk mitigation**

        - **Strong encryption:** TLS 1.2+ provides modern cipher suites and eliminates vulnerabilities present in older protocol versions.
        - **Downgrade protection:** Prevents attackers from forcing connections to use weaker protocol versions.
        - **Compliance:** Meets TLS version requirements mandated by PCI DSS 3.2.1+, NIST SP 800-52, and industry best practices.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and navigate to **Amazon Elasticsearch Service** (or **Amazon OpenSearch Service**).
        2. Choose **Domains** in the left navigation and select the domain to review.
        3. Choose the **Security configuration** tab (or **Actions** > **Edit security configuration**).
        4. Under **HTTPS**, verify that the **TLS security policy** is set to **Policy-Min-TLS-1-2-2019-07** or **Policy-Min-TLS-1-2-PFS-2023-10**.

        A passing domain shows a TLS policy of `Policy-Min-TLS-1-2-2019-07` or stronger. A failing domain shows `Policy-Min-TLS-1-0-2020-07` or a weaker policy.

        ### Audit via CLI

        1. Retrieve the TLS security policy for an Elasticsearch domain:

        ```bash
        aws es describe-elasticsearch-domain \
          --domain-name <domain-name> \
          --query "DomainStatus.DomainEndpointOptions.TLSSecurityPolicy"
        ```

        A passing domain returns `"Policy-Min-TLS-1-2-2019-07"` or `"Policy-Min-TLS-1-2-PFS-2023-10"`. A failing domain returns `"Policy-Min-TLS-1-0-2020-07"` or any value below TLS 1.2.
      remediation:
        - id: console
          desc: |
            To ensure Elasticsearch domains use TLS 1.2 or higher using the AWS Console:

            1. Navigate to the **Amazon Elasticsearch Service Console** and select **Domains**.
            2. Select the domain you want to configure.
            3. Choose **Edit domain** or **Actions** > **Edit security configuration**.
            4. Under **HTTPS**, set the **TLS security policy** to **Policy-Min-TLS-1-2-2019-07** or higher.
            5. Choose **Save changes**.
        - id: cli
          desc: |
            To ensure Elasticsearch domains use TLS 1.2 or higher using the AWS CLI, update the domain to enforce TLS 1.2:

            ```bash
            aws es update-elasticsearch-domain-config \
              --domain-name <domain-name> \
              --domain-endpoint-options EnforceHTTPS=true,TLSSecurityPolicy=Policy-Min-TLS-1-2-2019-07
            ```

            Verify the configuration:

            ```bash
            aws es describe-elasticsearch-domain \
              --domain-name <domain-name> \
              --query "DomainStatus.DomainEndpointOptions.TLSSecurityPolicy"
            ```
        - id: terraform
          desc: |
            To ensure Elasticsearch domains use TLS 1.2 or higher in Terraform:

            ```hcl
            resource "aws_elasticsearch_domain" "example" {
              domain_name           = "example-domain"
              elasticsearch_version = "7.10"

              domain_endpoint_options {
                enforce_https       = true
                tls_security_policy = "Policy-Min-TLS-1-2-2019-07"
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure Elasticsearch domains use TLS 1.2 or higher in CloudFormation:

            ```yaml
            Resources:
              ElasticsearchDomain:
                Type: AWS::Elasticsearch::Domain
                Properties:
                  DomainName: example-domain
                  ElasticsearchVersion: "7.10"
                  DomainEndpointOptions:
                    EnforceHTTPS: true
                    TLSSecurityPolicy: Policy-Min-TLS-1-2-2019-07
            ```
    refs:
      - url: https://docs.aws.amazon.com/elasticsearch-service/latest/developerguide/es-data-protection.html
        title: Amazon Elasticsearch Service - Data Protection
      - url: https://docs.aws.amazon.com/securityhub/latest/userguide/es-controls.html
        title: AWS Security Hub - Elasticsearch controls reference
