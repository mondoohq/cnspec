  - uid: mondoo-aws-security-rds-cluster-public-access-check
    title: Ensure all RDS clusters are not publicly accessible
    impact: 100
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-aws-security-rds-cluster-public-access-check-aws
        tags:
          mondoo.com/filter-title: AWS RDS Cluster
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-rds-cluster-public-access-check-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-rds-cluster-public-access-check-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-rds-cluster-public-access-check-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Amazon RDS cluster instances are not configured as publicly accessible and that the VPC subnets hosting the cluster do not route traffic through an internet gateway. By default, the AWS console offers a publicly accessible option during cluster creation, and it is easy to inadvertently expose a cluster to the internet.

        **Why this matters**

        - **Direct internet exposure:** A publicly accessible RDS cluster has a DNS endpoint resolvable from the internet, making the database authentication layer directly reachable to any attacker worldwide.
        - **Brute-force attack surface:** Once a database endpoint is reachable from the internet, automated credential stuffing and brute-force tools can target it continuously without needing to first compromise any other resource.
        - **Compliance boundary violation:** Most security frameworks explicitly prohibit placing production database clusters on network segments with internet gateway routes, treating such configuration as a boundary control failure.
        - **Lateral movement risk:** A compromised publicly accessible cluster becomes a pivot point from which attackers can reach other private resources within the same VPC.

        **Risk mitigation**

        - **Network perimeter enforcement:** Deploying clusters in private subnets and removing internet gateway routes ensures the database is only reachable through controlled paths such as VPN, bastion host, or AWS PrivateLink.
        - **Reduced credential exposure:** Removing internet reachability eliminates the entire class of attacks that require only a network path to the database port, requiring attackers to first compromise an internal resource.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and open the RDS console.
        2. In the left navigation pane, select **Databases**.
        3. Select an RDS cluster and open the **Connectivity & security** tab.
        4. Under **Security**, review the VPC, subnet group, and security groups.
        5. Verify that the subnet group uses private subnets (no route to an internet gateway with destination `0.0.0.0/0`).
        6. For each DB instance in the cluster, check the **Publicly accessible** field.

        A passing cluster and its instances either show **Not publicly accessible** or are in subnets with no internet gateway route. A failing cluster has instances that are publicly accessible or has a security group associated with a VPC whose route table includes a `0.0.0.0/0` route via an internet gateway.

        ### Audit via CLI

        1. Check whether cluster instances are publicly accessible:

        ```bash
        aws rds describe-db-instances \
          --query "DBInstances[?DBClusterIdentifier!=null].{InstanceId:DBInstanceIdentifier,ClusterId:DBClusterIdentifier,PubliclyAccessible:PubliclyAccessible}" \
          --output table
        ```

        2. Verify that the VPC route tables used by the cluster's subnets do not have an internet gateway route:

        ```bash
        aws ec2 describe-route-tables \
          --filters "Name=vpc-id,Values=<vpc-id>" \
          --query "RouteTables[*].Routes[?GatewayId!=null && starts_with(GatewayId, 'igw-')].{DestinationCidrBlock:DestinationCidrBlock,GatewayId:GatewayId}" \
          --output table
        ```

        A passing cluster has all instances with `PubliclyAccessible: false` and no internet gateway routes (`igw-*`) with destination `0.0.0.0/0` in its VPC route tables. A failing cluster has at least one instance with `PubliclyAccessible: true` or has an internet gateway route reachable from the cluster's security groups.

      remediation:
        - id: console
          desc: |
            To ensure all RDS clusters are not publicly accessible using the AWS Console:

            1.  Navigate to the AWS RDS Console.
            2.  In the left panel, select Databases.
            3.  Locate and select the RDS Cluster you want to update, such as an Aurora cluster.
            4.  Under the Connectivity & security tab, check the Publicly accessible setting for both:
              - The cluster itself
              - Each DB instance in the cluster (shown below the cluster details)
            5.  If the cluster or any of its instances are publicly accessible:
              - For the cluster:
              - Choose Modify cluster.
              - Under Connectivity, set Public access to No.
              - Select Continue, then choose Apply immediately or schedule for the next maintenance window.
              - For each instance:
              - Choose the instance name to open its details.
              - Select Modify.
              - Under Connectivity, set Public access to No.
              - Select Continue, then Apply immediately or schedule as needed.
            6.  Ensure the DB subnet group used by the cluster points to private subnets, meaning subnets with MapPublicIpOnLaunch set to false.
            7.  Confirm the security group allows access only from trusted sources such as your app servers, bastion hosts, or VPN.
        - id: cli
          desc: |
            To ensure all RDS clusters are not publicly accessible using the AWS CLI, check if an RDS Cluster is publicly accessible:

            ```bash
            aws rds describe-db-clusters --query "DBClusters[*].{DBClusterIdentifier:DBClusterIdentifier, PubliclyAccessible:PubliclyAccessible}"
              ```

            Check if RDS Cluster instances are publicly accessible:

            ```bash
              aws rds describe-db-instances --query "DBInstances[*].{DBInstanceIdentifier:DBInstanceIdentifier, DBClusterIdentifier:DBClusterIdentifier, PubliclyAccessible:PubliclyAccessible}"
            ```

            If any instances are publicly accessible, disable public access on each instance:

            ```bash
            aws rds modify-db-instance \
              --db-instance-identifier <db-instance-id> \
              --no-publicly-accessible \
              --apply-immediately
            ```

            Ensure your RDS cluster is deployed in private subnets:

            ```bash
            aws ec2 describe-subnets --filters "Name=vpc-id,Values=<vpc-id>" --query "Subnets[*].{SubnetId:SubnetId, MapPublicIpOnLaunch:MapPublicIpOnLaunch}"
            ```

            If any subnet used by the DB subnet group has MapPublicIpOnLaunch: true, consider moving the cluster to a private subnet group.
        - id: terraform
          desc: |
            To ensure all RDS clusters are not publicly accessible in Terraform, ensure RDS clusters are not publicly accessible:

            ```hcl
              resource "aws_rds_cluster" "secure_cluster" {
                cluster_identifier      = "secure-rds-cluster"
                engine                  = "aurora-mysql"
                master_username         = "admin"
                master_password         = var.master_password
                vpc_security_group_ids  = [aws_security_group.private_sg.id]
                db_subnet_group_name    = aws_db_subnet_group.private_db_subnet.name
              }

              resource "aws_rds_cluster_instance" "secure_cluster_instances" {
                count                   = 2
                identifier              = "secure-rds-cluster-instance-${count.index}"
                cluster_identifier      = aws_rds_cluster.secure_cluster.id
                instance_class          = "db.r5.large"
                publicly_accessible     = false  # Can only be set on individual instances
                db_subnet_group_name    = aws_db_subnet_group.private_db_subnet.name
                engine                  = aws_rds_cluster.secure_cluster.engine
              }

              resource "aws_db_subnet_group" "private_db_subnet" {
                name       = "private-db-subnet"
                subnet_ids = [aws_subnet.private1.id, aws_subnet.private2.id]
              }
            ```
        - id: cloudformation
          desc: |
            To ensure all RDS clusters are not publicly accessible in CloudFormation, ensure RDS clusters are not publicly accessible:

            ```yaml
              Resources:
                SecureRDSCluster:
                  Type: "AWS::RDS::DBCluster"
                  Properties:
                    Engine: "aurora-mysql"
                    DBClusterIdentifier: "secure-rds-cluster"
                    MasterUsername: "admin"
                    MasterUserPassword: "YourSecurePassword123"
                    VpcSecurityGroupIds:
                      - !Ref PrivateSecurityGroup
                    DBSubnetGroupName: !Ref PrivateDBSubnetGroup

                SecureRDSClusterInstance1:
                  Type: "AWS::RDS::DBInstance"
                  Properties:
                    DBInstanceIdentifier: "secure-rds-cluster-instance-1"
                    DBClusterIdentifier: !Ref SecureRDSCluster
                    Engine: "aurora-mysql"
                    DBInstanceClass: "db.r5.large"
                    PubliclyAccessible: false  # Ensure the instance is private
                    DBSubnetGroupName: !Ref PrivateDBSubnetGroup

                SecureRDSClusterInstance2:
                  Type: "AWS::RDS::DBInstance"
                  Properties:
                    DBInstanceIdentifier: "secure-rds-cluster-instance-2"
                    DBClusterIdentifier: !Ref SecureRDSCluster
                    Engine: "aurora-mysql"
                    DBInstanceClass: "db.r5.large"
                    PubliclyAccessible: false
                    DBSubnetGroupName: !Ref PrivateDBSubnetGroup

                PrivateDBSubnetGroup:
                  Type: "AWS::RDS::DBSubnetGroup"
                  Properties:
                    DBSubnetGroupName: "private-db-subnet"
                    SubnetIds:
                      - !Ref PrivateSubnet1
                      - !Ref PrivateSubnet2
                    DBSubnetGroupDescription: "Private subnets for RDS cluster"
            ```
    refs:
      - url: https://awscli.amazonaws.com/v2/documentation/api/latest/reference/rds/create-db-cluster.html
        title: AWS CLI Command Reference - create-db-cluster
      - url: https://awscli.amazonaws.com/v2/documentation/api/latest/reference/rds/modify-db-cluster.html
        title: AWS CLI Command Reference - modify-db-cluster
      - url: https://registry.terraform.io/providers/hashicorp/aws/latest/docs/resources/rds_cluster_instance#publicly_accessible-1
        title: Terraform Registry - rds_cluster_instance
      - url: https://docs.aws.amazon.com/securityhub/latest/userguide/securityhub-controls-reference.html
        title: AWS Documentation - Security Hub controls reference
  - uid: mondoo-aws-security-rds-cluster-public-access-check-aws
    filters: |
      asset.platform == "aws-rds-dbcluster"
    mql: |
      aws.rds.dbcluster.securityGroups.where(
        vpc.routeTables.where(
          routeEntries.any(gatewayId == /igw-/ && destinationCidrBlock == "0.0.0.0/0")
        ).length > 0
      ).length == 0
  - uid: mondoo-aws-security-rds-cluster-public-access-check-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_rds_cluster")
    mql: |
      terraform.resources.where(nameLabel == "aws_rds_cluster").all(
