      change.after.configuration != empty &&
      change.after.configuration.all(result_configuration != empty && result_configuration.all(_['encryption_configuration'] != empty))
      )
  - uid: mondoo-aws-security-athena-workgroup-results-encrypted-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_athena_workgroup")
    mql: |
      terraform.state.resources.where(type == "aws_athena_workgroup").all(
      values.configuration != empty &&
      values.configuration.all(result_configuration != empty && result_configuration.all(_['encryption_configuration'] != empty))
      )
  - uid: mondoo-aws-security-athena-workgroup-results-encrypted-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::Athena::WorkGroup")
    mql: |
      cloudformation.template.resources.where(type == "AWS::Athena::WorkGroup").all(
      properties['WorkGroupConfiguration'] != empty && properties['WorkGroupConfiguration']['ResultConfiguration'] != empty && properties['WorkGroupConfiguration']['ResultConfiguration']['EncryptionConfiguration'] != empty
      )
  - uid: mondoo-aws-security-workspaces-volume-encryption
    title: Ensure WorkSpaces instances have root and user volume encryption enabled
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-aws-security-workspaces-volume-encryption-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-workspaces-volume-encryption-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-workspaces-volume-encryption-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-workspaces-volume-encryption-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-workspaces-volume-encryption-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon WorkSpaces instances have encryption enabled for both root and user volumes. Without volume encryption, data stored on the workspace is unencrypted at rest. This includes operating system files, application data, and user documents.

        **Why this matters**

        - WorkSpaces store sensitive data including user documents, application data, browser profiles, cached credentials, and email on their volumes.
        - Without encryption, this data is vulnerable to unauthorized access if the underlying storage infrastructure is compromised.
        - Volume encryption must be enabled at workspace creation and cannot be changed afterward. Unencrypted workspaces must be rebuilt to enable encryption.
        - Both the root volume (operating system and applications) and user volume (user data and profile) should be encrypted for comprehensive protection.

        **Risk mitigation**

        - **Data protection:** Ensures all data at rest on workspace volumes is encrypted using AWS KMS.
        - **Compliance:** Meets encryption-at-rest requirements in PCI DSS, HIPAA, SOC 2, and other frameworks.
        - **Defense in depth:** Protects data even if underlying storage is accessed outside of normal WorkSpaces operations.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and navigate to **Amazon WorkSpaces** > **WorkSpaces**.
        2. Select a workspace to review.
        3. In the workspace details, check the **Root volume encryption** and **User volume encryption** fields.

        A passing workspace shows both **Root volume encryption** and **User volume encryption** as **Enabled**. A failing workspace shows either or both fields as **Disabled**.

        ### Audit via CLI

        1. List all WorkSpaces and their encryption status:

        ```bash
        aws workspaces describe-workspaces \
          --query "Workspaces[*].{Id:WorkspaceId,User:UserName,RootEncrypted:RootVolumeEncryptionEnabled,UserEncrypted:UserVolumeEncryptionEnabled}"
        ```

        A passing workspace returns `"RootVolumeEncryptionEnabled": true` and `"UserVolumeEncryptionEnabled": true` for both volume fields. A failing workspace returns `false` for either field.

      remediation:
        - id: console
          desc: |
            To ensure WorkSpaces instances have root and user volume encryption enabled using the AWS Console, volume encryption cannot be enabled on existing workspaces. To remediate:

            1. Navigate to the **Amazon WorkSpaces Console** and select **WorkSpaces**.
            2. Note the configuration of the unencrypted workspace (bundle, directory, user).
            3. Launch a new workspace for the same user with **Encryption** enabled for both root and user volumes.
            4. Select a KMS key for encryption (AWS managed or customer-managed).
            5. Migrate user data from the old workspace to the new one.
            6. Terminate the unencrypted workspace.

            To ensure all future workspaces are encrypted, configure encryption in the directory default creation properties.
        - id: cli
          desc: |
            To ensure WorkSpaces instances have root and user volume encryption enabled using the AWS CLI, create an encrypted workspace:

            ```bash
            aws workspaces create-workspaces --workspaces '[{
              "DirectoryId": "<directory-id>",
              "UserName": "<username>",
              "BundleId": "<bundle-id>",
              "RootVolumeEncryptionEnabled": true,
              "UserVolumeEncryptionEnabled": true,
              "VolumeEncryptionKey": "arn:aws:kms:region:account-id:key/key-id"
            }]'
            ```

            Check encryption status of existing workspaces:

            ```bash
            aws workspaces describe-workspaces \
              --query "Workspaces[*].{Id:WorkspaceId,User:UserName,RootEncrypted:RootVolumeEncryptionEnabled,UserEncrypted:UserVolumeEncryptionEnabled}"
            ```
        - id: terraform
          desc: |
            To ensure WorkSpaces instances have root and user volume encryption enabled in Terraform, enable volume encryption on a workspace:

            ```hcl
            resource "aws_workspaces_workspace" "example" {
              directory_id = aws_workspaces_directory.example.id
              bundle_id    = data.aws_workspaces_bundle.example.id
              user_name    = "user"

              root_volume_encryption_enabled = true
              user_volume_encryption_enabled = true
              volume_encryption_key          = aws_kms_key.example.arn
            }
            ```
        - id: cloudformation
          desc: |
            To ensure WorkSpaces instances have root and user volume encryption enabled in CloudFormation, enable volume encryption:

            ```yaml
            Resources:
              Workspace:
                Type: AWS::WorkSpaces::Workspace
                Properties:
                  DirectoryId: !Ref Directory
                  BundleId: !Ref BundleId
                  UserName: user
                  RootVolumeEncryptionEnabled: true
                  UserVolumeEncryptionEnabled: true
                  VolumeEncryptionKey: !GetAtt KMSKey.Arn
            ```
    refs:
      - url: https://docs.aws.amazon.com/workspaces/latest/adminguide/encrypt-workspaces.html
        title: Encrypted WorkSpaces
  - uid: mondoo-aws-security-workspaces-volume-encryption-aws
    filters: asset.platform == "aws"
    mql: |
      aws.workspaces.instances.all(
        rootVolumeEncryptionEnabled == true && userVolumeEncryptionEnabled == true
      )
  - uid: mondoo-aws-security-workspaces-volume-encryption-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_workspaces_workspace")
    mql: |
      terraform.resources.where(nameLabel == "aws_workspaces_workspace").all(
      arguments.root_volume_encryption_enabled == true && arguments.user_volume_encryption_enabled == true
      )
  - uid: mondoo-aws-security-workspaces-volume-encryption-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "aws_workspaces_workspace")
    mql: |
      terraform.plan.resourceChanges.where(type == "aws_workspaces_workspace").all(
      change.after.root_volume_encryption_enabled == true && change.after.user_volume_encryption_enabled == true
      )
  - uid: mondoo-aws-security-workspaces-volume-encryption-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "aws_workspaces_workspace")
    mql: |
      terraform.state.resources.where(type == "aws_workspaces_workspace").all(
      values.root_volume_encryption_enabled == true && values.user_volume_encryption_enabled == true
      )
  - uid: mondoo-aws-security-workspaces-volume-encryption-cloudformation
    filters: asset.platform == "cloudformation" && cloudformation.template.resources.contains(type == "AWS::WorkSpaces::Workspace")
    mql: |
      cloudformation.template.resources.where(type == "AWS::WorkSpaces::Workspace").all(
      properties['RootVolumeEncryptionEnabled'] == true && properties['UserVolumeEncryptionEnabled'] == true
      )
  - uid: mondoo-aws-security-workspaces-directory-web-access-disabled
    title: Ensure WorkSpaces directories deny web access by default
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-aws-security-workspaces-directory-web-access-disabled-aws
        tags:
          mondoo.com/filter-title: AWS Account
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-workspaces-directory-web-access-disabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-workspaces-directory-web-access-disabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-workspaces-directory-web-access-disabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that WorkSpaces directories deny web browser access to workspaces. When web access is allowed, users can connect to their WorkSpaces from any web browser without requiring a managed device or the WorkSpaces client application, bypassing endpoint security controls.

        **Why this matters**

        - Web access allows connections from any device with a browser, including unmanaged personal devices, public kiosks, and shared computers that may not meet organizational security standards.
        - Unlike the WorkSpaces client, web browser sessions cannot be verified for device compliance, endpoint protection, or certificate-based authentication.
        - Browser-based access may expose workspace sessions to browser-specific attacks such as extensions capturing input, local storage leakage, or session hijacking.
        - Disabling web access enforces the use of the WorkSpaces client, which supports device authentication, managed device verification, and more granular connection controls.

        **Risk mitigation**

        - **Device control:** Ensures users can only connect from devices with the WorkSpaces client installed, enabling managed device enforcement.
        - **Endpoint security:** Prevents access from unmanaged devices that may lack antivirus, encryption, or patch compliance.
        - **Session security:** Reduces exposure to browser-based attacks and session leakage risks.
      audit: |
        ### Audit via Console

        1. Sign in to the AWS Management Console and navigate to **Amazon WorkSpaces** > **Directories**.
        2. Select the directory name.
        3. Under **Access control options**, review the **Web browser** setting.

        A passing directory shows **Web browser** as **Deny**. A failing directory shows **Web browser** as **Allow**.

        ### Audit via CLI

        1. List WorkSpaces directories and their web access setting:

        ```bash
        aws workspaces describe-workspace-directories \
          --query "Directories[*].{Id:DirectoryId,Name:DirectoryName,WebAccess:WorkspaceAccessProperties.DeviceTypeWeb}"
        ```

        A passing directory returns `"DeviceTypeWeb": "DENY"`. A failing directory returns `"DeviceTypeWeb": "ALLOW"` or omits the field.

      remediation:
        - id: console
          desc: |
            To ensure WorkSpaces directories deny web access by default using the AWS Console:

            1. Navigate to the **Amazon WorkSpaces Console** and select **Directories**.
            2. Select the directory to modify.
            3. Under **Access control options**, choose **Edit**.
            4. Set **Web browser** to **Deny**.
            5. Choose **Save**.
        - id: cli
          desc: |
            To ensure WorkSpaces directories deny web access by default using the AWS CLI, deny web access for a WorkSpaces directory:

            ```bash
            aws workspaces modify-workspace-access-properties \
              --resource-id <directory-id> \
              --workspace-access-properties DeviceTypeWeb=DENY
            ```

            Verify the setting:

            ```bash
            aws workspaces describe-workspace-directories --directory-ids <directory-id> \
              --query "Directories[*].{Id:DirectoryId,WebAccess:WorkspaceAccessProperties.DeviceTypeWeb}"
            ```
        - id: terraform
          desc: |
            To ensure WorkSpaces directories deny web access by default in Terraform, deny web access in the directory configuration:

            ```hcl
            resource "aws_workspaces_directory" "example" {
              directory_id = aws_directory_service_directory.example.id

              workspace_access_properties {
                device_type_web = "DENY"
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure WorkSpaces directories deny web access by default in CloudFormation, note that CloudFormation does not natively support configuring WorkSpaces directory access properties. Use the AWS CLI or Terraform to manage web access settings.
    refs:
      - url: https://docs.aws.amazon.com/workspaces/latest/adminguide/update-directory-details.html
        title: Update directory details for your WorkSpaces
  - uid: mondoo-aws-security-workspaces-directory-web-access-disabled-aws
    filters: asset.platform == "aws"
    mql: |
      aws.workspaces.directories.all(
        workspaceAccessProperties['DeviceTypeWeb'] == "DENY"
      )
  - uid: mondoo-aws-security-workspaces-directory-web-access-disabled-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "aws_workspaces_directory")
    mql: |
