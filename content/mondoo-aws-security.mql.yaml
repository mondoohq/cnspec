      desc: |
        This check ensures that a CloudWatch metric filter and alarm exist to detect changes to Network Access Control Lists (NACLs). NACLs provide subnet-level traffic filtering in VPCs, and unauthorized changes could weaken your network perimeter defenses.

        Unlike security groups which are stateful, NACLs are stateless and operate at the subnet boundary, making them a critical layer of defense-in-depth. Changes to NACLs can affect all resources within a subnet simultaneously, amplifying the impact of misconfiguration.

        CIS AWS Foundations Benchmark recommends monitoring NACL changes to maintain subnet-level network security and detect unauthorized modifications to your network access control infrastructure.
      remediation:
        - id: console
          desc: |
            To ensure log metric filter exists for NACL changes using the AWS Console:

            1. Navigate to **CloudWatch** and select **Log groups**.
            2. Select the log group associated with your CloudTrail trail.
            3. Choose **Actions** > **Create metric filter**.
            4. Enter a filter pattern matching `CreateNetworkAcl`, `CreateNetworkAclEntry`, `DeleteNetworkAcl`, `DeleteNetworkAclEntry`, `ReplaceNetworkAclEntry`, and `ReplaceNetworkAclAssociation`.
            5. Assign a metric name and namespace, then choose **Create metric filter**.
            6. Navigate to **Alarms** > **Create alarm**, select the new metric, and configure SNS notification.
        - id: cli
          desc: |
            To ensure log metric filter exists for NACL changes using the AWS CLI, create the metric filter:

            ```bash
            aws logs put-metric-filter \
              --log-group-name <cloudtrail-log-group> \
              --filter-name NetworkACLChanges \
              --filter-pattern '{ ($.eventName = CreateNetworkAcl) || ($.eventName = CreateNetworkAclEntry) || ($.eventName = DeleteNetworkAcl) || ($.eventName = DeleteNetworkAclEntry) || ($.eventName = ReplaceNetworkAclEntry) || ($.eventName = ReplaceNetworkAclAssociation) }' \
              --metric-transformations metricName=NetworkACLChanges,metricNamespace=CISBenchmark,metricValue=1
            ```

