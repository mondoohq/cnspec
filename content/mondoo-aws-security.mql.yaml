            ```
        - id: cloudformation
          desc: |
            To ensure Amazon MQ brokers have general logging enabled in CloudFormation, enable general logging on an Amazon MQ broker:

            ```yaml
            Resources:
              MQBroker:
                Type: AWS::AmazonMQ::Broker
                Properties:
                  BrokerName: example-broker
                  EngineType: ActiveMQ
                  Logs:
                    General: true
            ```
    refs:
