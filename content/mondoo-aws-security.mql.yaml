      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-6
    variants:
      - uid: mondoo-aws-security-secgroup-restricted-kubernetes-api-aws
        tags:
          mondoo.com/filter-title: AWS Security Group
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-secgroup-restricted-kubernetes-api-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-secgroup-restricted-kubernetes-api-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-secgroup-restricted-kubernetes-api-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-secgroup-restricted-kubernetes-api-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that AWS security groups do not allow inbound traffic on the Kubernetes API server port (6443) from `0.0.0.0/0` or `::/0`. The API server is the control plane for the entire cluster and must not be reachable from the public internet.

        **Why this matters**

        - Public API endpoints are continuously scanned for unauthenticated discovery, weak token configurations, and known control-plane CVEs.
        - Even when authentication is enforced, a public API server is the only piece of infrastructure that, if compromised, grants the attacker full cluster-wide privileges.
      remediation:
        - id: cli
          desc: |
            ```bash
            aws ec2 revoke-security-group-ingress \
              --group-id <sg-id> \
              --ip-permissions IpProtocol=tcp,FromPort=6443,ToPort=6443,IpRanges='[{CidrIp=0.0.0.0/0}]'
            ```

            For EKS, prefer setting cluster endpoint access to **Private** or restrict the public endpoint to an explicit allowlist via `aws eks update-cluster-config --resources-vpc-config endpointPublicAccess=true,publicAccessCidrs=...`.
        - id: terraform
          desc: |
            Replace any `0.0.0.0/0` or `::/0` source on port 6443 with the application-tier security group, VPN CIDR, or specific bastion address. The example shows the modern `aws_vpc_security_group_ingress_rule` form; the same rule applies to inline `ingress` blocks on `aws_security_group`:

            ```hcl
            resource "aws_vpc_security_group_ingress_rule" "from_app" {
              security_group_id            = aws_security_group.workload.id
              referenced_security_group_id = aws_security_group.app.id
              ip_protocol                  = "tcp"
              from_port                    = 6443
              to_port                      = 6443
            }
            ```
        - id: cloudformation
          desc: |
            To restrict Kubernetes API access in CloudFormation, scope every `SecurityGroupIngress` rule covering port 6443 to a specific source security group, IP range, or VPC peer rather than `0.0.0.0/0` or `::/0`:

            ```yaml
            Resources:
              K8sControlPlaneSecurityGroup:
                Type: AWS::EC2::SecurityGroup
                Properties:
                  GroupDescription: Kubernetes API access from operator subnet only
                  VpcId: !Ref VpcId
                  SecurityGroupIngress:
                    - IpProtocol: tcp
                      FromPort: 6443
                      ToPort: 6443
                      SourceSecurityGroupId: !Ref AppSecurityGroup
            ```
