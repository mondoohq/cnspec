  - uid: mondoo-aws-security-ec2-ebs-kms-encryption
    title: Ensure EBS volumes use KMS encryption instead of default
    impact: 70
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-12
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-aws-security-ec2-ebs-kms-encryption-aws
        tags:
          mondoo.com/filter-title: AWS EBS Volume
          mondoo.com/filter-icon: aws
      - uid: mondoo-aws-security-ec2-ebs-kms-encryption-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ec2-ebs-kms-encryption-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ec2-ebs-kms-encryption-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-aws-security-ec2-ebs-kms-encryption-cloudformation
        tags:
          mondoo.com/filter-title: CloudFormation
          mondoo.com/filter-icon: cloudformation
    docs:
      desc: |
        This check ensures that Amazon Elastic Block Store (EBS) volumes are encrypted using AWS Key Management Service (KMS) rather than the default EBS-managed encryption. While both methods encrypt data at rest, KMS encryption provides significantly stronger security controls including centralized key management, fine-grained access policies via IAM, automatic key rotation, and full audit trails through AWS CloudTrail.

        **Why this matters**

        EBS volumes support two server-side encryption types:

        - **sse-ebs** (default): Uses an AWS-managed key with no customer control over key policies, rotation, or access auditing.
        - **sse-kms**: Uses AWS KMS keys (either AWS-managed or customer-managed) that provide IAM-based access control, automatic or manual key rotation, and CloudTrail logging of all key usage.

        Using KMS encryption ensures that organizations maintain full visibility and control over their encryption keys. This is critical for meeting compliance requirements under frameworks such as PCI DSS, HIPAA, SOC 2, and NIST 800-53, which mandate auditability and key lifecycle management for encrypted data.

        **Risk mitigation**

        - **Key Management:** Provides centralized control over encryption key policies and lifecycle.
        - **Access Auditing:** All key usage is logged in CloudTrail, enabling detection of unauthorized access attempts.
        - **Key Rotation:** Supports automatic annual rotation of KMS keys to limit the blast radius of a compromised key.
        - **Regulatory Compliance:** Meets encryption key management requirements for PCI DSS, HIPAA, SOC 2, and NIST frameworks.
      remediation:
        - id: console
          desc: |
            To ensure EBS volumes use KMS encryption instead of default using the AWS Console, EBS encryption type cannot be changed in place. To migrate a volume from sse-ebs to sse-kms:

            1. Navigate to the AWS EC2 Console and select **Volumes**.
            2. Create a snapshot of the existing volume:
               - Select the volume, choose **Actions > Create Snapshot**.
            3. Create an encrypted copy of the snapshot with a KMS key:
               - Go to **Snapshots**, select the snapshot.
               - Choose **Actions > Copy**.
               - Check **Encrypt this snapshot** and select a KMS key.
               - Select **Copy Snapshot**.
            4. Create a new volume from the encrypted snapshot:
               - Select the encrypted snapshot, choose **Actions > Create Volume**.
               - Verify the KMS key is shown under encryption settings.
            5. Replace the original volume:
               - Stop the EC2 instance.
               - Detach the original volume, attach the new KMS-encrypted volume.
               - Start the instance.

            To enforce KMS encryption for all new volumes:

            1. Go to **EC2 Dashboard > EBS settings**.
            2. Under **Default encryption**, select **Change the default key**.
            3. Choose a KMS key (AWS-managed or customer-managed).
            4. Select **Update**.
        - id: cli
          desc: |
            To ensure EBS volumes use KMS encryption instead of default using the AWS CLI, check the encryption type of existing volumes:

            ```bash
            aws ec2 describe-volumes --query "Volumes[*].{VolumeId:VolumeId,Encrypted:Encrypted,KmsKeyId:KmsKeyId}" --output table
            ```

            Volumes using sse-kms will have a `KmsKeyId` value. Volumes using sse-ebs will show the KmsKeyId as empty or use the default AWS-managed EBS key.

            Set the default EBS encryption key to a KMS key:

            ```bash
            aws ec2 modify-ebs-default-kms-key-id \
              --kms-key-id arn:aws:kms:us-east-1:account-id:key/key-id
            ```

            Enable EBS encryption by default (new volumes will use the KMS key):

            ```bash
            aws ec2 enable-ebs-encryption-by-default
            ```
        - id: terraform
          desc: |
            To ensure EBS volumes use KMS encryption instead of default in Terraform:

            ```hcl
            resource "aws_kms_key" "ebs_encryption" {
              description             = "KMS key for EBS volume encryption"
              deletion_window_in_days = 10
              enable_key_rotation     = true
            }

            resource "aws_ebs_default_kms_key" "example" {
              key_arn = aws_kms_key.ebs_encryption.arn
            }

            resource "aws_ebs_encryption_by_default" "example" {
              enabled = true
            }

            resource "aws_ebs_volume" "encrypted_volume" {
              availability_zone = "us-west-2a"
              size              = 50
              encrypted         = true
              kms_key_id        = aws_kms_key.ebs_encryption.arn

              tags = {
                Name = "kms-encrypted-volume"
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure EBS volumes use KMS encryption instead of default in CloudFormation:

            ```yaml
            Resources:
              EBSKMSKey:
                Type: AWS::KMS::Key
                Properties:
                  Description: KMS key for EBS volume encryption
                  EnableKeyRotation: true

              EncryptedVolume:
                Type: AWS::EC2::Volume
                Properties:
                  AvailabilityZone: us-west-2a
                  Size: 50
                  Encrypted: true
                  KmsKeyId: !Ref EBSKMSKey
            ```
    refs:
      - url: https://docs.aws.amazon.com/ebs/latest/userguide/ebs-encryption.html
        title: Amazon EBS Encryption
      - url: https://docs.aws.amazon.com/kms/latest/developerguide/overview.html
        title: AWS Key Management Service
