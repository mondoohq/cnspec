              name        = "restricted-rdp"
              description = "Restricts RDP access"

              ingress {
                from_port   = 3389
                to_port     = 3389
                protocol    = "tcp"
                cidr_blocks = ["203.0.113.0/24"] # Replace with a trusted IP range
              }

              egress {
                from_port   = 0
                to_port     = 0
                protocol    = "-1"
                cidr_blocks = ["0.0.0.0/0"]  # Allow outbound traffic
              }
            }
            ```
        - id: cloudformation
          desc: |
            To ensure security groups restrict incoming RDP traffic in CloudFormation, ensure security groups do not allow unrestricted RDP access:

            ```yaml
            Resources:
              SecureSecurityGroup:
                Type: "AWS::EC2::SecurityGroup"
                Properties:
                  GroupDescription: "Security group with restricted RDP access"
                  VpcId: !Ref VPC
                  SecurityGroupIngress:
                    - IpProtocol: "tcp"
                      FromPort: 3389
                      ToPort: 3389
                      CidrIp: "192.168.1.0/24"  # Restrict to a trusted IP range
                  SecurityGroupEgress:
                    - IpProtocol: "-1"
                      FromPort: -1
                      ToPort: -1
                      CidrIp: "0.0.0.0/0"  # Allow outbound traffic
                  Tags:
                    - Key: "Name"
                      Value: "RestrictedRDPSecurityGroup"

              VPC:
                Type: "AWS::EC2::VPC"
                Properties:
                  CidrBlock: "10.0.0.0/16"
                  EnableDnsSupport: true
                  EnableDnsHostnames: true
                  Tags:
                    - Key: "Name"
                      Value: "SecureVPC"
            ```
