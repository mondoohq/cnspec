        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-ensure-that-notify-about-alerts-with-high-severity-is-on-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Microsoft Defender for Cloud is configured to send email notifications for high-severity security alerts. By default, Defender for Cloud generates alerts in the portal but does not send proactive email notifications unless security contacts and alert notification settings are explicitly configured.

        **Why this matters**

        - **Extended dwell time**: Without proactive notification, high-severity alerts such as detected brute-force attacks, suspicious VM behavior, or anomalous resource access accumulate in the Defender dashboard unreviewed while attackers escalate privileges and exfiltrate data.
        - **Alert fatigue exploitation**: Attackers deliberately trigger low-severity noise to bury real alerts in dashboards; email notifications for high-severity events ensure critical signals reach security teams even when the portal is not actively monitored.
        - **Incident response delay**: The time between Defender detection and human response is the attacker's operational window; email notifications push critical alerts to security teams immediately rather than waiting for the next scheduled dashboard review.
        - **On-call coverage**: Security operations teams cannot monitor the Defender portal continuously; email notifications enable out-of-hours alerting and escalation workflows that depend on receiving alert information outside normal working hours.

        **Risk mitigation**

        - **Reduced mean time to detect**: Email notification shortens the gap between when Defender detects a threat and when a human investigator begins responding, directly reducing the attacker's window of uncontested access.
        - **Escalation chain enablement**: Email alerts can be forwarded, filtered, and routed to on-call systems, ticketing platforms, and SIEM tools, integrating Defender detections into existing incident response workflows without requiring manual portal checks.
      audit: |
        **Manual Audit via Azure Portal:**

          1. From Azure Home, select the Portal Menu.
          2. Select `Microsoft Defender for Cloud`.
          3. Select `Environment Settings`.
          4. Select the appropriate Management Group, Subscription, or Workspace.
          5. Select `Email notifications`.
          6. Verify that the `Notify about alerts with the following severity (or higher):` setting is checked and set to `High`.

        **Automated Audit with Azure CLI:**

          Run the following command to check the notification settings for high severity alerts. Make sure the output is set to `true`, indicating that notifications for high severity alerts are enabled.

          ```bash
          az account get-access-token --query "{subscription:subscription,accessToken:accessToken}" --output tsv | xargs -L1 bash -c 'curl -X GET -H "Authorization: Bearer $1" -H "Content-Type: application/json" https://management.azure.com/subscriptions/$0/providers/Microsoft.Security/securityContacts?api-version=2020-01-01-preview' | jq '.|.[] | select(.name=="default")'|jq '.properties.alertNotifications'
          ```
      remediation:
        - id: portal
          desc: |
            To ensure that "Notify about alerts with high severity" is enabled using the Azure Portal, enable high severity alert notifications in Microsoft Azure Portal:

              1. Log into Microsoft Azure Portal at https://portal.azure.com.
              2. Select `Microsoft Defender for Cloud` from the Portal Menu.
              3. Go to `Environment Settings` and select the appropriate management group, subscription, or workspace.
              4. Navigate to `Email notifications`.
              5. Ensure the `Notify about alerts with the following severity (or higher):` option is enabled and set to `High`.
              6. Select `Save` to apply the changes.
        - id: cli
          desc: |
            To ensure that "Notify about alerts with high severity" is enabled using the Azure CLI, use the following command to update the security contact settings to enable high severity alert notifications. Replace `<Your_Subscription_Id>` and `<validEmailAddress>` with the appropriate values.

              ```bash
              az account get-access-token --query "{subscription:subscription,accessToken:accessToken}" --output tsv | xargs -L1 bash -c 'curl -X PUT -H "Authorization: Bearer $1" -H "Content-Type: application/json" https://management.azure.com/subscriptions/<$0>/providers/Microsoft.Security/securityContacts/default1?api-version=2017-08-01-preview -d "@input.json"'
              ```

              Ensure the `input.json` file contains the following data, with `<validEmailAddress>` replaced with your contact email:

              ```json
              {
                "id": "/subscriptions/<Your_Subscription_Id>/providers/Microsoft.Security/securityContacts/default1",
                "name": "default1",
                "type": "Microsoft.Security/securityContacts",
                "properties": {
                  "email": "<validEmailAddress>",
                  "alertNotifications": "On",
                  "alertsToAdmins": "On"
                }
              }
              ```
        - id: powershell
          desc: |
            To ensure that "Notify about alerts with high severity" is enabled using PowerShell, enable high severity alert notifications, use the following PowerShell command. Replace `<Your_Subscription_Id>` and `<validEmailAddress>` with the appropriate values.

              ```powershell
              $securityContact = @{
                id = "/subscriptions/<Your_Subscription_Id>/providers/Microsoft.Security/securityContacts/default1"
                name = "default1"
                type = "Microsoft.Security/securityContacts"
                properties = @{
                  email = "<validEmailAddress>"
                  alertNotifications = "On"
                  alertsToAdmins = "On"
                }
              }
              New-AzSecurityContact -SecurityContact $securityContact
              ```
        - id: terraform
          desc: |
            To ensure that "Notify about alerts with high severity" is enabled in Terraform, enable high severity alert notifications, use the following Terraform configuration. Replace `<Your_Subscription_Id>` and `<validEmailAddress>` with the appropriate values.

            ```hcl
            resource "azurerm_security_center_contact" "example" {
              email               = "security@example.com"
              phone               = "+1-555-555-5555"
              alert_notifications = true
              alerts_to_admins    = true
            }
            ```
        - id: bicep
          desc: |
            To ensure that "Notify about alerts with high severity" is enabled in Bicep:

            ```bicep
            resource securityContact 'Microsoft.Security/securityContacts@2023-12-01-preview' = {
              name: 'default'
              properties: {
                emails: 'security@example.com'
                notificationsByRole: {
                  state: 'On'
                  roles: [
                    'Owner'
                    'ServiceAdmin'
                  ]
                }
                alertNotifications: {
                  state: 'On'
                  minimalSeverity: 'High'
                }
              }
            }
            ```
