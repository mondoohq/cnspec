  - uid: mondoo-azure-security-ensure-auditing-retention-greater-than-30-days
    title: Ensure minimum 30-Day retention for SQL server Audit Logs
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-02
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-pr-pt-1
      compliance/nist-csf-2: nist-csf-2-pr-ps-04
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-11
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    variants:
      - uid: mondoo-azure-security-ensure-auditing-retention-greater-than-30-days-azure
        tags:
          mondoo.com/filter-title: Azure SQL Server
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-ensure-auditing-retention-greater-than-30-days-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-ensure-auditing-retention-greater-than-30-days-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-ensure-auditing-retention-greater-than-30-days-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure SQL server audit log retention is configured for a minimum of 30 days. By default, Azure SQL auditing retains logs for zero days when configured to use a storage account destination, meaning logs are overwritten immediately unless a retention period is explicitly set.

        **Why this matters**

        - **Forensic evidence preservation**: Attackers who gain SQL access often operate slowly to avoid detection; retention under 30 days means their early reconnaissance queries, privilege escalations, and data staging are deleted before investigators can analyze them.
        - **Attack timeline reconstruction**: Incident response teams need historical logs to trace the full attack chain from initial access through lateral movement to data exfiltration; short retention creates gaps that prevent complete reconstruction.
        - **Tampering detection**: Comparing current audit logs against historical baselines helps identify whether an attacker modified audit policies or deleted entries to cover their tracks.
        - **Dwell time coverage**: Advanced persistent threats typically remain undetected for weeks to months; a 30-day minimum ensures that at least the most recent attacker activity window is available when a breach is discovered.

        **Risk mitigation**

        - **Post-breach investigation**: Retained logs provide the evidence base needed to determine what data was accessed or exfiltrated, supporting breach notification obligations and remediation scoping.
        - **Regulatory accountability**: Minimum retention periods are required by many compliance frameworks to demonstrate that SQL server activity was monitored continuously and that records are available for audit review.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **SQL servers** in the Azure Portal.
        2. Select a server and select **Auditing** under the **Security** settings.
        3. Check if the **Retention (days)** is set to 30 or more.

        **Automated Audit with Azure CLI:**

        Retrieve the audit retention settings for all SQL servers:

        ```bash
        az sql server list --query "[].{ServerName:name, RetentionDays:auditingSettings.retentionDays}" -o table
        ```

        Ensure that each server listed has a retention period of 30 days or more.
      remediation:
        - id: portal
          desc: |
            To ensure minimum 30-Day retention for SQL server Audit Logs using the Azure Portal:

            1. Navigate to **SQL servers** in the Azure Portal.
            2. Select the SQL server you want to configure.
            3. Go to **Auditing** under the **Security** section.
            4. Set the **Retention (days)** to at least 30 days, or use '0' for unlimited retention.
            5. Select **Save** to apply the changes.
        - id: cli
          desc: |
            To ensure minimum 30-Day retention for SQL server Audit Logs using the Azure CLI, update the audit retention policy for a specific SQL server:

            ```bash
            az sql server audit-policy update --name <ServerName> --resource-group <ResourceGroupName> --retention-days 30
            ```
        - id: powershell
          desc: |
            To ensure minimum 30-Day retention for SQL server Audit Logs using PowerShell:

            ```powershell
            Set-AzSqlServerAudit -ServerName <ServerName> -ResourceGroupName <ResourceGroupName> -RetentionInDays 30
            ```
        - id: terraform
          desc: |
            To ensure minimum 30-Day retention for SQL server Audit Logs in Terraform:

            ```hcl
            resource "azurerm_mssql_server" "example" {
              name                         = "example-mssql-server"
              resource_group_name          = azurerm_resource_group.example.name
              location                     = azurerm_resource_group.example.location
              version                      = "12.0"
              administrator_login          = "sqladmin"
              administrator_login_password = var.sql_admin_password
            }

            resource "azurerm_mssql_server_extended_auditing_policy" "example" {
              server_id                               = azurerm_mssql_server.example.id
              storage_endpoint                        = azurerm_storage_account.example.primary_blob_endpoint
              storage_account_access_key              = azurerm_storage_account.example.primary_access_key
              storage_account_access_key_is_secondary = false
              retention_in_days                       = 90
            }
            ```
        - id: bicep
          desc: |
            To ensure minimum 30-Day retention for SQL server Audit Logs in Bicep:

            ```bicep
            resource sqlServerAudit 'Microsoft.Sql/servers/auditingSettings@2023-08-01-preview' = {
              parent: sqlServer
              name: 'default'
              properties: {
                state: 'Enabled'
                retentionDays: 90
                storageEndpoint: storageAccount.properties.primaryEndpoints.blob
                storageAccountAccessKey: storageAccount.listKeys().keys[0].value
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/azure-sql/database/security-overview
        title: Azure SQL Database Security
  - uid: mondoo-azure-security-no-sql-databases-allow-ingress-0-0-0-0-0
    title: Ensure no SQL Databases allow ingress 0.0.0.0/0 (ANY IP)
    impact: 80
    tags:
