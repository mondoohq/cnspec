  - uid: mondoo-azure-security-datafactory-public-access-disabled
    title: Ensure Data Factory disables public network access
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-azure-security-datafactory-public-access-disabled-azure
        tags:
          mondoo.com/filter-title: Azure Data Factory
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-datafactory-public-access-disabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-datafactory-public-access-disabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-datafactory-public-access-disabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure Data Factory instances have public network access disabled.

        **Why this matters**

        - **Reduced attack surface**: Disabling public network access prevents Data Factory from being reachable over the public internet, limiting exposure to unauthorized access attempts.
        - **Data exfiltration prevention**: Data Factory orchestrates data movement across diverse sources. Restricting network access helps prevent unauthorized data exfiltration through the service endpoint.

        **Risk mitigation**

        - Configure private endpoints to allow secure connectivity from approved virtual networks only.
        - Use Azure Private Link to ensure all traffic between your network and Data Factory traverses the Microsoft backbone network.
      audit: |
        ### Audit via Portal

        1. Navigate to **Data factories** in the Azure Portal.
        2. Select the target Data Factory instance.
        3. Under **Settings**, select **Networking**.
        4. Review the **Public network access** setting.

        A passing resource shows **Disabled**. A failing resource shows **Enabled**.

        ### Audit via CLI

        1. Run the following command, replacing `<resource-group-name>` and `<data-factory-name>` with the target values:

        ```bash
        az datafactory show \
          --resource-group <resource-group-name> \
          --factory-name <data-factory-name> \
          --query "properties.publicNetworkAccess" \
          --output tsv
        ```

        A passing resource returns `Disabled`. A failing resource returns `Enabled` or no value.
      remediation:
        - id: portal
          desc: |
            To ensure Data Factory disables public network access using the Azure Portal:

            1. Navigate to the [Azure Portal](https://portal.azure.com).
            2. Go to **Data factories** and select the target Data Factory instance.
            3. Under **Settings**, select **Networking**.
            4. Under **Public network access**, select **Disabled**.
            5. Select **Save**.
        - id: cli
          desc: |
            To ensure Data Factory disables public network access using the Azure CLI:

            ```bash
            az datafactory update \
              --resource-group <resource-group-name> \
              --factory-name <data-factory-name> \
              --public-network-access "Disabled"
            ```
        - id: terraform
          desc: |
            To ensure Data Factory disables public network access in Terraform:

            ```hcl
            resource "azurerm_data_factory" "example" {
              name                = "example-data-factory"
              location            = azurerm_resource_group.example.location
              resource_group_name = azurerm_resource_group.example.name

              public_network_access_enabled = false
            }
            ```
        - id: bicep
          desc: |
            To ensure Data Factory disables public network access in Bicep:

            ```bicep
            resource dataFactory 'Microsoft.DataFactory/factories@2018-06-01' = {
              name: 'example-data-factory'
              location: resourceGroup().location
              properties: {
                publicNetworkAccess: 'Disabled'
              }
            }
            ```
