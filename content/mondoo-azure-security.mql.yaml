  - uid: mondoo-azure-security-sql-ad-only-authentication
    title: Ensure SQL Server uses Azure AD-only authentication
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-14
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-j
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-2
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-2
    variants:
      - uid: mondoo-azure-security-sql-ad-only-authentication-azure
        tags:
          mondoo.com/filter-title: Azure SQL Server
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-sql-ad-only-authentication-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-sql-ad-only-authentication-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-sql-ad-only-authentication-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure SQL Server is configured with Microsoft Entra ID (formerly Azure AD) only authentication, disabling SQL authentication entirely.

        **Why this matters**

        - **Password-based attacks**: SQL authentication relies on passwords that can be brute-forced, sprayed, or leaked; Microsoft Entra ID-only authentication eliminates this attack vector.
        - **MFA enforcement**: Microsoft Entra ID supports multi-factor authentication and conditional access policies that SQL authentication cannot provide.
        - **Centralized identity**: Microsoft Entra ID-only authentication ensures all database access flows through the organization's identity provider with unified audit logging.

        **Risk mitigation**

        - Enable Microsoft Entra ID-only authentication on SQL Server instances.
        - Configure Microsoft Entra ID administrators and groups for database access.
      audit: |
        ### Audit via Portal

        1. Navigate to **SQL servers** in the Azure Portal.
        2. Select the SQL server.
        3. Under **Settings**, select **Microsoft Entra ID**.
        4. Review the **Support only Microsoft Entra authentication for this server** setting.

        A passing resource shows the Microsoft Entra-only authentication toggle enabled. A failing resource shows the toggle disabled, meaning SQL authentication is also permitted.

        ### Audit via CLI

        1. Run the following command, substituting your resource group and server name:

        ```bash
        az sql server ad-only-auth get --resource-group <ResourceGroupName> --name <ServerName> --query "azureAdOnlyAuthentication" -o tsv
        ```

        A passing resource returns `true`. A failing resource returns `false`.
      remediation:
        - id: portal
          desc: |
            To ensure SQL Server uses Azure AD-only authentication using the Azure Portal:

            1. Navigate to **SQL servers** in the Azure Portal.
            2. Select the SQL server.
            3. Under **Settings**, select **Microsoft Entra ID**.
            4. Enable **Support only Microsoft Entra authentication for this server**.
            5. Select **Save**.
        - id: cli
          desc: |
            To ensure SQL Server uses Azure AD-only authentication using the Azure CLI:

            ```bash
            az sql server ad-only-auth enable --resource-group <ResourceGroupName> --name <ServerName>
            ```
        - id: terraform
          desc: |
            To ensure SQL Server uses Azure AD-only authentication in Terraform:

            ```hcl
            resource "azurerm_mssql_server" "example" {
              name                         = "example-sql"
              resource_group_name          = azurerm_resource_group.example.name
              location                     = azurerm_resource_group.example.location
              version                      = "12.0"

              azuread_administrator {
                login_username              = "AzureAD Admin"
                object_id                   = data.azuread_group.sql_admins.object_id
                azuread_authentication_only = true
              }
            }
            ```
        - id: bicep
          desc: |
            To ensure SQL Server uses Azure AD-only authentication in Bicep:

            ```bicep
            resource sqlServer 'Microsoft.Sql/servers@2022-05-01-preview' = {
              name: 'example-sql'
              location: resourceGroup().location
              properties: {
                administrators: {
                  azureADOnlyAuthentication: true
                  administratorType: 'ActiveDirectory'
                  login: 'AzureAD Admin'
                  sid: azureAdGroupObjectId
                  tenantId: subscription().tenantId
                }
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/azure-sql/database/authentication-azure-ad-only-authentication
        title: Azure AD-only authentication for Azure SQL
  - uid: mondoo-azure-security-sql-ad-only-authentication-azure
    filters: |
      asset.platform == "azure-sql-server"
    mql: |
      azure.subscription.sql.server.azureAdOnlyAuthentication == true
  - uid: mondoo-azure-security-sql-ad-only-authentication-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "azurerm_mssql_server")
    mql: |
      terraform.resources.where(nameLabel == "azurerm_mssql_server").all(
        blocks.where(type == "azuread_administrator") != empty &&
        blocks.where(type == "azuread_administrator").all(arguments['azuread_authentication_only'] == true)
      )
  - uid: mondoo-azure-security-sql-ad-only-authentication-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "azurerm_mssql_server")
    mql: |
      terraform.plan.resourceChanges.where(type == "azurerm_mssql_server").all(
        change.after['azuread_administrator'] != empty &&
        change.after['azuread_administrator'].all(_['azuread_authentication_only'] == true)
      )
  - uid: mondoo-azure-security-sql-ad-only-authentication-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "azurerm_mssql_server")
    mql: |
