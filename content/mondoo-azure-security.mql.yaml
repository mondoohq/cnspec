  - uid: mondoo-azure-security-acr-export-policy-disabled
    title: Ensure ACR export policy is disabled
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-12
      compliance/nis-2: nis-2-21-2-d
      compliance/nist-csf-1: nist-csf-1-pr-ds-5
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-3
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-azure-security-acr-export-policy-disabled-azure
        tags:
          mondoo.com/filter-title: Azure Container Registry
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-acr-export-policy-disabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-acr-export-policy-disabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-acr-export-policy-disabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that the export policy is disabled on Azure Container Registry instances. Disabling the export policy prevents images from being exported out of the registry, reducing the risk of data exfiltration.

        **Why this matters**

        - An enabled export policy allows images to be transferred out of the registry to other registries or storage accounts, which could be exploited for data exfiltration.
        - Disabling exports ensures that container images containing proprietary code or sensitive configurations cannot be copied to unauthorized locations.
        - This control is especially important for registries in regulated environments where data residency and export controls are required.

        **Risk mitigation**

        - **Data exfiltration prevention:** Blocks unauthorized export of container images.
        - **Data residency:** Ensures images remain within the designated registry and region.
        - **Intellectual property protection:** Prevents unauthorized copying of proprietary container images.
      audit: |
        ### Audit via Portal

        1. Navigate to **Container registries** in the Azure Portal.
        2. Select the container registry.
        3. Under **Settings**, select **Policies**.
        4. Review the **Export policy** setting.

        A passing resource shows **Disabled**. A failing resource shows **Enabled**.

        ### Audit via CLI

        1. Run the following command, replacing `<RegistryName>` and `<ResourceGroupName>` with the target values:

        ```bash
        az acr show \
          --name <RegistryName> \
          --resource-group <ResourceGroupName> \
          --query "policies.exportPolicy.status" \
          --output tsv
        ```

        A passing resource returns `disabled`. A failing resource returns `enabled` or no value.
      remediation:
        - id: portal
          desc: |
            To disable the export policy using the Azure Portal:

            1. Navigate to **Container registries** in the Azure Portal.
            2. Select the container registry (must be Premium SKU).
            3. Go to **Policies** under **Settings**.
            4. Set **Export policy** to **Disabled**.
        - id: cli
          desc: |
            To disable image export on a Premium ACR using the Azure CLI:

            ```bash
            az acr update \
              --name <RegistryName> \
              --resource-group <ResourceGroupName> \
              --allow-exports false
            ```
        - id: terraform
          desc: |
            To disable the export policy in Terraform:

            ```hcl
            resource "azurerm_container_registry" "example" {
              name                    = "exampleregistry"
              resource_group_name     = azurerm_resource_group.example.name
              location                = azurerm_resource_group.example.location
              sku                     = "Premium"
              export_policy_enabled   = false

              # Disabling export requires the registry to be a zone-redundant Premium SKU
              # with public network access disabled and quarantine policy enabled.
              public_network_access_enabled = false
              zone_redundancy_enabled       = true
              quarantine_policy_enabled     = true
            }
            ```
        - id: bicep
          desc: |
            To disable the export policy in Bicep:

            ```bicep
            resource acr 'Microsoft.ContainerRegistry/registries@2023-07-01' = {
              name: 'exampleregistry'
              location: resourceGroup().location
              sku: {
                name: 'Premium'
              }
              properties: {
                policies: {
                  exportPolicy: {
                    status: 'disabled'
                  }
                }
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/container-registry/data-loss-prevention
        title: Data exfiltration protection for Azure Container Registry
