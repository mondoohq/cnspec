  - uid: mondoo-azure-security-datafactory-cmk-encryption
    title: Ensure Data Factory uses customer-managed key encryption
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-azure-security-datafactory-cmk-encryption-azure
        tags:
          mondoo.com/filter-title: Azure Data Factory
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-datafactory-cmk-encryption-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-datafactory-cmk-encryption-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-datafactory-cmk-encryption-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure Data Factory instances are configured with customer-managed key (CMK) encryption.

        **Why this matters**

        - **Full encryption control**: Customer-managed keys give your organization complete control over the encryption keys used to protect data at rest, enabling key rotation and revocation on your schedule.
        - **Compliance requirements**: Many regulatory frameworks require organizations to manage their own encryption keys rather than relying solely on platform-managed keys.

        **Risk mitigation**

        - Store customer-managed keys in Azure Key Vault with soft delete and purge protection enabled.
        - Implement key rotation policies and monitor key usage through Azure Key Vault logging.
      audit: |
        ### Audit via Portal

        1. Navigate to **Data factories** in the Azure Portal.
        2. Select the target Data Factory instance.
        3. Under **Settings**, select **Encryption**.
        4. Review the **Encryption type** setting.

        A passing resource shows **Customer-Managed Key** with a Key Vault URI configured. A failing resource shows **Microsoft-managed key** or no encryption key configured.

        ### Audit via CLI

        1. Run the following command, replacing `<resource-group-name>` and `<data-factory-name>` with the target values:

        ```bash
        az datafactory show \
          --resource-group <resource-group-name> \
          --factory-name <data-factory-name> \
          --query "properties.encryption" \
          --output json
        ```

        A passing resource returns a non-empty JSON object with `vaultBaseUrl` and `keyName` populated. A failing resource returns `null` or an empty result.
      remediation:
        - id: portal
          desc: |
            To ensure Data Factory uses customer-managed key encryption using the Azure Portal:

            1. Navigate to the [Azure Portal](https://portal.azure.com).
            2. Go to **Data factories** and select the target Data Factory instance.
            3. Under **Settings**, select **Encryption**.
            4. Select **Customer-Managed Key**.
            5. Provide the **Key Vault URI** and **Key Name** for the encryption key.
            6. Configure a **User-Assigned Managed Identity** to access the Key Vault.
            7. Select **Save**.

            Note: CMK encryption must be configured during Data Factory creation. To enable CMK on an existing factory, it must be recreated with CMK enabled.
        - id: cli
          desc: |
            To ensure Data Factory uses customer-managed key encryption using the Azure CLI:

            ```bash
            az resource update \
              --resource-group <resource-group-name> \
              --name <data-factory-name> \
              --resource-type Microsoft.DataFactory/factories \
              --set properties.encryption.vaultBaseUrl="https://<key-vault-name>.vault.azure.net" \
                   properties.encryption.keyName="<key-name>" \
                   properties.encryption.keyVersion="<key-version>" \
                   properties.encryption.identity.userAssignedIdentity="<user-assigned-identity-resource-id>"
            ```
        - id: terraform
          desc: |
            To ensure Data Factory uses customer-managed key encryption in Terraform:

            ```hcl
            resource "azurerm_data_factory" "example" {
              name                = "example-data-factory"
              location            = azurerm_resource_group.example.location
              resource_group_name = azurerm_resource_group.example.name

              customer_managed_key_id          = azurerm_key_vault_key.example.id
              customer_managed_key_identity_id = azurerm_user_assigned_identity.example.id
            }
            ```
        - id: bicep
          desc: |
            To ensure Data Factory uses customer-managed key encryption in Bicep:

            ```bicep
            resource dataFactory 'Microsoft.DataFactory/factories@2018-06-01' = {
              name: 'example-data-factory'
              location: resourceGroup().location
              identity: {
                type: 'UserAssigned'
                userAssignedIdentities: {
                  '${userAssignedIdentity.id}': {}
                }
              }
              properties: {
                encryption: {
                  vaultBaseUrl: 'https://example-keyvault.vault.azure.net'
                  keyName: 'example-key'
                  keyVersion: 'example-key-version'
                  identity: {
                    userAssignedIdentity: userAssignedIdentity.id
                  }
                }
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/data-factory/enable-customer-managed-key
        title: Encrypt Azure Data Factory with customer-managed keys
