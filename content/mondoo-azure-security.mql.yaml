      - uid: mondoo-azure-security-managed-hsm-private-endpoints-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure Managed HSM instances have at least one private endpoint connection configured. Private endpoints enable secure, private network connectivity to the HSM using Azure Private Link.

        **Why this matters**

        - Without private endpoints, HSM access must traverse the public internet, even when firewall rules restrict access by IP.
        - Private endpoints ensure that all cryptographic operations and key management traffic stays within the Azure backbone network.
        - This is critical for Managed HSMs, which protect the most sensitive encryption keys in an organization.

        **Risk mitigation**

        - **Network isolation:** HSM traffic uses private IP addresses within the virtual network.
        - **Data exfiltration prevention:** Private Link prevents traffic redirection outside the Microsoft backbone.
        - **Compliance:** Satisfies network isolation requirements for critical key management infrastructure.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Managed HSMs** in the Azure Portal.
        2. Select a Managed HSM.
        3. Go to **Networking** under **Settings**.
        4. Select the **Private endpoint connections** tab.
        5. Verify that at least one private endpoint connection exists.
      remediation:
        - id: portal
          desc: |
            To configure private endpoints using the Azure Portal:

            1. Navigate to **Managed HSMs** in the Azure Portal.
            2. Select the Managed HSM.
            3. Go to **Networking** under **Settings**.
            4. Select the **Private endpoint connections** tab.
            5. Select **+ Private endpoint** and configure the virtual network, subnet, and DNS settings.
            6. Select **Review + create**, then **Create**.
        - id: cli
          desc: |
            Look up the Managed HSM resource ID, create a private endpoint that targets it, then disable public network access using the Azure CLI:

            ```bash
            az keyvault show \
              --hsm-name <HSMName> \
              --resource-group <ResourceGroupName> \
              --query id \
              --output tsv

            az network private-endpoint create \
              --name <PrivateEndpointName> \
              --resource-group <ResourceGroupName> \
              --vnet-name <VNetName> \
              --subnet <SubnetName> \
              --private-connection-resource-id <HSMResourceId> \
              --group-id managedhsm \
              --connection-name <ConnectionName>

            az resource update \
              --resource-type Microsoft.KeyVault/managedHSMs \
              --name <HSMName> \
              --resource-group <ResourceGroupName> \
              --set properties.publicNetworkAccess=Disabled
            ```
        - id: terraform
          desc: |
            To configure a private endpoint for a Managed HSM in Terraform:

            ```hcl
            resource "azurerm_private_endpoint" "hsm" {
              name                = "example-hsm-pe"
              location            = azurerm_resource_group.example.location
              resource_group_name = azurerm_resource_group.example.name
              subnet_id           = azurerm_subnet.example.id

              private_service_connection {
                name                           = "example-hsm-psc"
                private_connection_resource_id = azurerm_key_vault_managed_hardware_security_module.example.id
                subresource_names              = ["managedhsm"]
                is_manual_connection           = false
              }
            }
            ```
        - id: bicep
          desc: |
            To configure private endpoints for Managed HSM in Bicep:

            ```bicep
            resource privateEndpoint 'Microsoft.Network/privateEndpoints@2024-05-01' = {
              name: 'example-hsm-pe'
              location: resourceGroup().location
              properties: {
                subnet: {
                  id: subnet.id
                }
                privateLinkServiceConnections: [
                  {
                    name: 'hsm-psc'
                    properties: {
                      privateLinkServiceId: managedHsm.id
                      groupIds: [
                        'managedhsm'
                      ]
                    }
                  }
                ]
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/key-vault/managed-hsm/private-link
        title: Integrate Managed HSM with Azure Private Link
  - uid: mondoo-azure-security-managed-hsm-private-endpoints-azure
