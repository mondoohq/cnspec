  - uid: mondoo-azure-security-batch-public-access-disabled
    title: Ensure public network access is disabled for Azure Batch accounts
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-azure-security-batch-public-access-disabled-azure
        tags:
          mondoo.com/filter-title: Azure Batch Account
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-batch-public-access-disabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-batch-public-access-disabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-batch-public-access-disabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure Batch accounts are configured to have public network access disabled, requiring all connections to go through private endpoints. By default, Azure Batch accounts accept connections from the public internet, exposing the management and task submission API to unauthenticated network probing.

        **Why this matters**

        - **Reduced attack surface:** Disabling public access ensures that the Batch account API is not reachable from the internet, eliminating exposure to credential-stuffing, API abuse, and direct exploit attempts.
        - **Network isolation:** All access routes through private endpoints within the virtual network, providing strong network-level isolation for batch processing job submission and management.
        - **Traffic confidentiality:** Private endpoints keep Batch management traffic on the Azure backbone, preventing interception of job metadata, credentials, and output data in transit.
        - **Defense in depth:** Combining private endpoints with disabled public access removes the public endpoint entirely, so misconfigured authentication settings cannot be exploited remotely.

        **Risk mitigation**

        - **Eliminate internet exposure:** Removing the public endpoint means attackers cannot probe or attack the Batch management API without first compromising an internal network resource.
        - **Enforce network perimeter:** Private endpoint connectivity ensures that only workloads within the approved virtual network or peered networks can submit jobs or access account data.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Batch accounts** in the Azure Portal.
        2. Select a Batch account.
        3. Go to **Networking** under **Settings**.
        4. Verify that **Public network access** is set to **Disabled**.

        **Automated Audit with Azure CLI:**

        ```bash
        az batch account list --query "[].{Name:name, ResourceGroup:resourceGroup, PublicNetworkAccess:publicNetworkAccess}" -o table
        ```

        **Automated Audit with PowerShell:**

        ```powershell
        Get-AzBatchAccount | Select-Object AccountName, ResourceGroupName, PublicNetworkAccess
        ```
      remediation:
        - id: portal
          desc: |
            To ensure public network access is disabled for Azure Batch accounts using the Azure Portal:

            1. Navigate to **Batch accounts** in the Azure Portal.
            2. Select the Batch account.
            3. Go to **Networking** under **Settings**.
            4. Set **Public network access** to **Disabled**.
            5. Configure a private endpoint for the Batch account.
            6. Select **Save**.
        - id: cli
          desc: |
            To ensure public network access is disabled for Azure Batch accounts using the Azure CLI:

            ```bash
            az resource update --ids $(az batch account show --name <BatchAccountName> --resource-group <ResourceGroupName> --query id -o tsv) --set properties.publicNetworkAccess=Disabled
            ```
        - id: powershell
          desc: |
            To ensure public network access is disabled for Azure Batch accounts using PowerShell:

            ```powershell
            Set-AzBatchAccount -AccountName <BatchAccountName> -ResourceGroupName <ResourceGroupName> -PublicNetworkAccess "Disabled"
            ```
        - id: terraform
          desc: |
            To ensure public network access is disabled for Azure Batch accounts in Terraform:

            ```hcl
            resource "azurerm_batch_account" "example" {
              name                          = "examplebatch"
              location                      = azurerm_resource_group.example.location
              resource_group_name           = azurerm_resource_group.example.name
              public_network_access_enabled = false
            }
            ```
        - id: bicep
          desc: |
            To ensure public network access is disabled for Azure Batch accounts in Bicep:

            ```bicep
            resource batchAccount 'Microsoft.Batch/batchAccounts@2024-07-01' = {
              name: 'examplebatch'
              location: resourceGroup().location
              properties: {
                publicNetworkAccess: 'Disabled'
                // ...
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/batch/private-connectivity
        title: Use private endpoints with Azure Batch accounts
