  - uid: mondoo-azure-security-acr-content-trust-enabled
    title: Ensure ACR content trust is enabled
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: false
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-c-1-integrity
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-6
      compliance/nist-csf-2: nist-csf-2-pr-ps-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-1
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc7-1-1
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-azure-security-acr-content-trust-enabled-azure
        tags:
          mondoo.com/filter-title: Azure Container Registry
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-acr-content-trust-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-acr-content-trust-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-acr-content-trust-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that content trust (image signing via Docker Notary) is enabled on Azure Container Registry instances. Content trust allows image publishers to sign images and image consumers to verify that pulled images have not been tampered with.

        **Why this matters**

        - Without content trust, there is no cryptographic guarantee that images pulled from the registry are the same images that were pushed.
        - Supply chain attacks can inject malicious code into container images between build and deployment.
        - Content trust provides an end-to-end chain of trust from image build to deployment.

        **Risk mitigation**

        - **Image integrity:** Signed images provide cryptographic proof that the image has not been modified.
        - **Supply chain security:** Prevents deployment of tampered or unauthorized images.
        - **Publisher verification:** Consumers can verify the identity of the image publisher.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Container registries** in the Azure Portal.
        2. Select a container registry.
        3. Go to **Content trust** under **Policies**.
        4. Verify that content trust is **Enabled**.
      remediation:
        - id: portal
          desc: |
            To enable content trust using the Azure Portal:

            1. Navigate to **Container registries** in the Azure Portal.
            2. Select the container registry (must be Premium SKU).
            3. Go to **Content trust** under **Policies**.
            4. Set content trust to **Enabled**.
        - id: cli
          desc: |
            To enable content trust on a Premium ACR using the Azure CLI:

            ```bash
            az acr config content-trust update \
              --registry <RegistryName> \
              --resource-group <ResourceGroupName> \
              --status enabled
            ```
        - id: terraform
          desc: |
            ```hcl
            resource "azurerm_container_registry" "example" {
              name                = "exampleregistry"
              resource_group_name = azurerm_resource_group.example.name
              location            = azurerm_resource_group.example.location
              sku                 = "Premium"

              trust_policy_enabled = true
            }
            ```
        - id: bicep
          desc: |
            ```bicep
            resource acr 'Microsoft.ContainerRegistry/registries@2023-07-01' = {
              name: 'exampleregistry'
              location: resourceGroup().location
              sku: {
                name: 'Premium'
              }
              properties: {
                policies: {
                  trustPolicy: {
                    status: 'enabled'
                    type: 'Notary'
                  }
                }
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/container-registry/container-registry-content-trust
        title: Content trust in Azure Container Registry
  - uid: mondoo-azure-security-acr-content-trust-enabled-azure
    filters: |
      asset.platform == "azure-container-registry"
    mql: |
      azure.subscription.containerRegistry.registry.policies.trustPolicyEnabled == true
  - uid: mondoo-azure-security-acr-content-trust-enabled-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "azurerm_container_registry")
    mql: |
