      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-8
    variants:
      - uid: mondoo-azure-security-aks-workload-identity-enabled-azure
        tags:
          mondoo.com/filter-title: Azure AKS Cluster
          mondoo.com/icon: azure
      - uid: mondoo-azure-security-aks-workload-identity-enabled-terraform-hcl
        tags:
