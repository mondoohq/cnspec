  - uid: mondoo-azure-security-cosmosdb-min-tls-version
    title: Ensure Azure Cosmos DB accounts use minimum TLS version 1.2
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    variants:
      - uid: mondoo-azure-security-cosmosdb-min-tls-version-azure
        tags:
          mondoo.com/filter-title: Azure Cosmos DB Account
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-cosmosdb-min-tls-version-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-cosmosdb-min-tls-version-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-cosmosdb-min-tls-version-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure Cosmos DB accounts are configured to require a minimum TLS version of 1.2 for all client connections, rejecting handshakes from clients using older protocol versions. By default, the `minimalTlsVersion` property is set to `Tls` (TLS 1.0), which allows insecure connections.

        **Why this matters**

        - **Protocol vulnerability elimination:** TLS 1.0 and 1.1 are affected by known weaknesses including BEAST, POODLE, and SLOTH that can allow an attacker to decrypt traffic under certain conditions; TLS 1.2 addresses these weaknesses.
        - **Strong cipher enforcement:** TLS 1.2 requires authenticated encryption cipher suites, preventing negotiation of weak ciphers that older protocol versions permit.
        - **Data in transit protection:** Requiring a modern TLS version ensures all data exchanged between application clients and Cosmos DB is protected by current cryptographic standards.
        - **Dependency hygiene:** Enforcing TLS 1.2 flushes out legacy client libraries and applications still using deprecated protocol versions before they can cause incidents in production.

        **Risk mitigation**

        - **Downgrade attack prevention:** Setting a minimum version server-side prevents an attacker from manipulating the handshake negotiation to force the connection to an older, weaker protocol.
        - **Passive interception resistance:** Connections using TLS 1.2 with strong cipher suites are resistant to passive traffic analysis and retroactive decryption attacks.
        - **Compliance boundary maintenance:** Enforcing TLS 1.2 satisfies the minimum transport encryption requirements specified by multiple regulatory frameworks without requiring per-connection verification.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Azure Cosmos DB** in the Azure Portal.
        2. Select a Cosmos DB account.
        3. Go to **Networking** under **Settings**.
        4. Verify that **Minimum TLS version** is set to **1.2**.

        **Automated Audit with Azure CLI:**

        ```bash
        az cosmosdb show --name <CosmosDBAccountName> --resource-group <ResourceGroupName> --query "minimalTlsVersion"
        ```

        **Automated Audit with PowerShell:**

        ```powershell
        Get-AzCosmosDBAccount -ResourceGroupName <ResourceGroupName> -Name <CosmosDBAccountName> | Select-Object Name, MinimalTlsVersion
        ```
      remediation:
        - id: portal
          desc: |
            To ensure Azure Cosmos DB accounts use minimum TLS version 1.2 using the Azure Portal:

            1. Navigate to **Azure Cosmos DB** in the Azure Portal.
            2. Select the Cosmos DB account.
            3. Go to **Networking** under **Settings**.
            4. Set **Minimum TLS version** to **1.2**.
            5. Select **Save**.
        - id: cli
          desc: |
            To ensure Azure Cosmos DB accounts use minimum TLS version 1.2 using the Azure CLI:

            ```bash
            az resource update --ids $(az cosmosdb show --name <CosmosDBAccountName> --resource-group <ResourceGroupName> --query id -o tsv) --set properties.minimalTlsVersion=Tls12
            ```
        - id: powershell
          desc: |
            To ensure Azure Cosmos DB accounts use minimum TLS version 1.2 using PowerShell:

            ```powershell
            Update-AzCosmosDBAccount -ResourceGroupName <ResourceGroupName> -Name <CosmosDBAccountName> -MinimalTlsVersion "Tls12"
            ```
        - id: terraform
          desc: |
            To ensure Azure Cosmos DB accounts use minimum TLS version 1.2 in Terraform:

            ```hcl
            resource "azurerm_cosmosdb_account" "example" {
              name                = "example-cosmosdb"
              location            = azurerm_resource_group.example.location
              resource_group_name = azurerm_resource_group.example.name
              offer_type          = "Standard"
              minimal_tls_version = "Tls12"
            }
            ```
        - id: bicep
          desc: |
            To ensure Azure Cosmos DB accounts use minimum TLS version 1.2 in Bicep:

            ```bicep
            resource cosmosDbAccount 'Microsoft.DocumentDB/databaseAccounts@2024-05-15' = {
              name: 'example-cosmosdb'
              location: resourceGroup().location
              properties: {
                minimalTlsVersion: 'Tls12'
                // ...
              }
            }
            ```
