      - uid: mondoo-azure-security-acr-encryption-key-rotation-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-acr-encryption-key-rotation-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure Container Registry instances with customer-managed key encryption have automatic key rotation enabled. Key rotation ensures that encryption keys are periodically updated, limiting the impact of a compromised key.

        **Why this matters**

        - Without key rotation, a compromised encryption key remains valid indefinitely, giving attackers persistent access to decrypt registry data.
        - Automatic key rotation ensures that new key versions are used without manual intervention, reducing operational burden.
        - Many compliance frameworks require periodic rotation of encryption keys as a cryptographic best practice.

        **Risk mitigation**

        - **Limit key exposure:** Regular rotation reduces the window of vulnerability if a key is compromised.
        - **Automated compliance:** Eliminates the operational overhead of manual key rotation.
        - **Cryptographic hygiene:** Follows industry best practices for encryption key management.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Container registries** in the Azure Portal.
        2. Select a container registry with CMK encryption.
        3. Go to **Encryption** under **Settings**.
        4. Verify that automatic key rotation is enabled.
      remediation:
        - id: portal
          desc: |
            To enable automatic key rotation using the Azure Portal:

            1. Navigate to **Container registries** in the Azure Portal.
            2. Select the container registry.
            3. Go to **Encryption** under **Settings**.
            4. Enable **Auto-rotation** for the encryption key.
        - id: cli
          desc: |
            Auto-rotation requires the encryption key to be referenced by a versionless Key Vault key URI. Rotate the registry to a versionless key with the Azure CLI:

            ```bash
            az acr encryption rotate-key \
              --name <RegistryName> \
              --resource-group <ResourceGroupName> \
              --identity <ManagedIdentityClientId> \
              --key-encryption-key <VersionlessKeyVaultKeyUri>
            ```

            A versionless key URI has the form `https://<vault>.vault.azure.net/keys/<keyName>` (no version suffix).
        - id: terraform
          desc: |
            Reference the Key Vault key by its versionless identifier so the registry tracks the latest key version automatically:

            ```hcl
            resource "azurerm_container_registry" "example" {
              name                = "exampleregistry"
              resource_group_name = azurerm_resource_group.example.name
              location            = azurerm_resource_group.example.location
              sku                 = "Premium"

              identity {
                type         = "UserAssigned"
                identity_ids = [azurerm_user_assigned_identity.example.id]
              }

              encryption {
                key_vault_key_id   = azurerm_key_vault_key.example.versionless_id
                identity_client_id = azurerm_user_assigned_identity.example.client_id
              }
            }
            ```

            Use `versionless_id` rather than `id`. Auto-rotation requires the URI to omit the key version.
        - id: bicep
          desc: |
            Key rotation is managed through Azure Key Vault key versioning. Configure the registry encryption to use a key URI without a version to enable automatic rotation:

            ```bicep
            resource acr 'Microsoft.ContainerRegistry/registries@2023-07-01' = {
              name: 'exampleregistry'
              location: resourceGroup().location
              sku: {
                name: 'Premium'
              }
              identity: {
                type: 'UserAssigned'
                userAssignedIdentities: {
                  '${managedIdentity.id}': {}
                }
              }
              properties: {
                encryption: {
                  status: 'enabled'
                  keyVaultProperties: {
                    keyIdentifier: 'https://example-kv.vault.azure.net/keys/example-key'
                    identity: managedIdentity.properties.clientId
                  }
                }
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/container-registry/container-registry-customer-managed-keys#rotate-key
        title: Rotate a customer-managed key
  - uid: mondoo-azure-security-acr-encryption-key-rotation-azure
    filters: |
      asset.platform == "azure-container-registry" &&
      azure.subscription.containerRegistry.registry.encryption.status == "enabled"
    mql: |
      azure.subscription.containerRegistry.registry.encryption.keyRotationEnabled == true
  - uid: mondoo-azure-security-acr-encryption-key-rotation-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "azurerm_container_registry")
    mql: |
      terraform.resources.where(nameLabel == "azurerm_container_registry").where(
        blocks.where(type == "encryption") != empty
      ).all(
        blocks.where(type == "encryption").all(
          arguments['key_vault_key_id'] == /\.versionless_id$/ ||
          arguments['key_vault_key_id'] == /^https:\/\/[^\/]+\/keys\/[^\/]+\/?$/
        )
      )
  # Plan: a null key_vault_key_id is treated as passing because the value resolves to "(known after
  # apply)" — null in the plan JSON — when it references a Key Vault key being created in the same
  # plan. State sees the resolved URI and rejects versioned ones outright.
  - uid: mondoo-azure-security-acr-encryption-key-rotation-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "azurerm_container_registry")
    mql: |
      terraform.plan.resourceChanges.where(type == "azurerm_container_registry").where(
        change.after.encryption != null && change.after.encryption.length > 0
      ).all(
        change.after.encryption.all(
          _['key_vault_key_id'] == null ||
          _['key_vault_key_id'] == /^https:\/\/[^\/]+\/keys\/[^\/]+\/?$/
        )
      )
  - uid: mondoo-azure-security-acr-encryption-key-rotation-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "azurerm_container_registry")
    mql: |
      terraform.state.resources.where(type == "azurerm_container_registry").where(
        values.encryption != null && values.encryption.length > 0
      ).all(
        values.encryption.all(
          _['key_vault_key_id'] == /^https:\/\/[^\/]+\/keys\/[^\/]+\/?$/
        )
      )
  - uid: mondoo-azure-security-storage-encryption-scope-cmk
    title: Ensure storage encryption scopes use customer-managed keys
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-azure-security-storage-encryption-scope-cmk-azure
        tags:
          mondoo.com/filter-title: Azure Storage Account
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-storage-encryption-scope-cmk-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-storage-encryption-scope-cmk-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-storage-encryption-scope-cmk-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure Storage account encryption scopes use customer-managed keys (CMK) stored in Azure Key Vault. Encryption scopes allow different containers within the same storage account to use different encryption keys, and using CMK provides organizational control over key lifecycle.

        **Why this matters**

        - Microsoft-managed keys do not provide visibility into key usage or the ability to control key rotation schedules.
        - Customer-managed keys enable centralized key management, audit logging, and the ability to revoke access by disabling the key.
        - Encryption scopes with CMK support multi-tenant scenarios where different data classifications require different key management policies.

        **Risk mitigation**

        - **Key lifecycle control:** Organizations manage rotation, access, and revocation policies per encryption scope.
        - **Audit trail:** Key usage is logged through Azure Key Vault for compliance evidence.
        - **Granular encryption:** Different containers can use different keys for data classification.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Storage accounts** in the Azure Portal.
        2. Select a storage account.
        3. Go to **Encryption scopes** under **Security + networking**.
        4. Verify that each encryption scope uses **Customer-managed key** as the source.

        **Automated Audit with Azure CLI:**

        ```bash
        az storage account encryption-scope list --account-name <AccountName> --query "[].{Name:name, Source:source, State:state}"
        ```
      remediation:
        - id: portal
          desc: |
            To configure encryption scopes with customer-managed keys using the Azure Portal:

            1. Navigate to **Storage accounts** in the Azure Portal.
            2. Select the storage account.
            3. Go to **Encryption scopes** under **Security + networking**.
            4. Select an encryption scope or create a new one.
            5. Set **Encryption type** to **Customer-managed key**.
            6. Configure the Key Vault key.
        - id: cli
          desc: |
            Create a new storage encryption scope that uses a customer-managed key with the Azure CLI:

            ```bash
            az storage account encryption-scope create \
              --account-name <StorageAccountName> \
              --resource-group <ResourceGroupName> \
              --name <EncryptionScopeName> \
              --key-source Microsoft.KeyVault \
              --key-uri <KeyVaultKeyUri>
            ```

            For an existing scope, switch the key source to Key Vault:

            ```bash
            az storage account encryption-scope update \
              --account-name <StorageAccountName> \
              --resource-group <ResourceGroupName> \
              --name <EncryptionScopeName> \
              --key-source Microsoft.KeyVault \
              --key-uri <KeyVaultKeyUri>
            ```
        - id: terraform
          desc: |
            To create an encryption scope with a customer-managed key in Terraform:

            ```hcl
            resource "azurerm_storage_encryption_scope" "example" {
              name               = "example-scope"
              storage_account_id = azurerm_storage_account.example.id
              source             = "Microsoft.KeyVault"
              key_vault_key_id   = azurerm_key_vault_key.example.id
            }
            ```
        - id: bicep
          desc: |
            To create an encryption scope with a customer-managed key in Bicep:

            ```bicep
            resource encryptionScope 'Microsoft.Storage/storageAccounts/encryptionScopes@2023-01-01' = {
              parent: storageAccount
              name: 'example-scope'
              properties: {
                source: 'Microsoft.KeyVault'
                keyVaultProperties: {
                  keyUri: keyVaultKey.properties.keyUriWithVersion
                }
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/storage/common/storage-encryption-scope-overview
        title: Encryption scopes for Blob storage
  - uid: mondoo-azure-security-storage-encryption-scope-cmk-azure
    filters: |
      asset.platform == "azure-storage-account"
    mql: |
      azure.subscription.storage.account.encryptionScopes.where(state == "Enabled").all(
        source == "Microsoft.KeyVault"
      )
  - uid: mondoo-azure-security-storage-encryption-scope-cmk-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "azurerm_storage_encryption_scope")
    mql: |
      terraform.resources.where(nameLabel == "azurerm_storage_encryption_scope").all(
        arguments['source'] == "Microsoft.KeyVault"
      )
  - uid: mondoo-azure-security-storage-encryption-scope-cmk-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "azurerm_storage_encryption_scope")
    mql: |
      terraform.plan.resourceChanges.where(type == "azurerm_storage_encryption_scope").all(
