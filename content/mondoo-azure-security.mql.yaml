  - uid: mondoo-azure-security-managed-hsm-public-access-disabled
    title: Ensure Managed HSM public network access is disabled
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-azure-security-managed-hsm-public-access-disabled-azure
        tags:
          mondoo.com/filter-title: Azure Subscription
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-managed-hsm-public-access-disabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-managed-hsm-public-access-disabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-managed-hsm-public-access-disabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that public network access is disabled on Azure Managed HSM instances. Managed HSMs contain the most sensitive cryptographic key material and should only be accessible through private network paths.

        **Why this matters**

        - Managed HSMs protect FIPS 140-2 Level 3 validated hardware security modules containing the most critical encryption keys.
        - Public network access exposes the HSM endpoint to the internet, increasing the risk of brute-force attacks, DDoS, and credential-based attacks.
        - Private network access ensures all HSM operations traverse the Azure backbone network, eliminating internet exposure.

        **Risk mitigation**

        - **Network isolation:** HSM operations occur entirely over private network paths.
        - **Reduced attack surface:** Eliminates internet-facing endpoints for critical key management infrastructure.
        - **Defense in depth:** Complements RBAC and access policies with network-level controls.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Managed HSMs** in the Azure Portal.
        2. Select a Managed HSM.
        3. Go to **Networking** under **Settings**.
        4. Verify that **Public network access** is **Disabled**.
      remediation:
        - id: portal
          desc: |
            To disable public network access using the Azure Portal:

            1. Navigate to **Managed HSMs** in the Azure Portal.
            2. Select the Managed HSM.
            3. Go to **Networking** under **Settings**.
            4. Set **Public network access** to **Disabled**.
            5. Ensure private endpoint connections are configured before disabling.
        - id: cli
          desc: |
            Disable public network access on the Managed HSM by patching the resource property. The `az keyvault update-hsm` command does not expose a dedicated flag for this:

            ```bash
            az resource update \
              --resource-type Microsoft.KeyVault/managedHSMs \
              --name <HSMName> \
              --resource-group <ResourceGroupName> \
              --set properties.publicNetworkAccess=Disabled
            ```
        - id: terraform
          desc: |
            To disable public network access in Terraform:

            ```hcl
            resource "azurerm_key_vault_managed_hardware_security_module" "example" {
              name                          = "example-hsm"
              resource_group_name           = azurerm_resource_group.example.name
              location                      = azurerm_resource_group.example.location
              sku_name                      = "Standard_B1"
              tenant_id                     = data.azurerm_client_config.current.tenant_id
              admin_object_ids              = [data.azurerm_client_config.current.object_id]
              public_network_access_enabled = false
            }
            ```
        - id: bicep
          desc: |
            To disable public network access in Bicep:

            ```bicep
            resource managedHsm 'Microsoft.KeyVault/managedHSMs@2023-07-01' = {
              name: 'example-hsm'
              location: resourceGroup().location
              sku: {
                family: 'B'
                name: 'Standard_B1'
              }
              properties: {
                tenantId: subscription().tenantId
                initialAdminObjectIds: [
                  adminObjectId
                ]
                publicNetworkAccess: 'Disabled'
              }
            }
            ```
