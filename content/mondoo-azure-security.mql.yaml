        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-ensure-that-ssl-enabled-latest-version-mysql-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure Database for MySQL Flexible Server is configured to enforce SSL connections and to require TLS 1.2 or later for all client connections. By default the `require_secure_transport` parameter is `ON`, but the minimum TLS version defaults to a value that permits older protocol versions.

        **Why this matters**

        - **Encrypted transport:** Enforcing SSL prevents all query data, credentials, and results from traveling over the network in plaintext, where they would be visible to any observer with network access.
        - **Protocol downgrade defense:** Requiring TLS 1.2 as the minimum eliminates the ability of attackers to negotiate older protocol versions that contain known cryptographic weaknesses such as POODLE and BEAST.
        - **Credential theft prevention:** Login credentials sent over an unencrypted or weakly encrypted connection can be captured and replayed by an attacker with access to the network path.
        - **Data integrity assurance:** TLS guarantees that rows returned from MySQL arrive unmodified; without it, an on-path attacker can silently alter query results.

        **Risk mitigation**

        - **Session interception:** Enforcing SSL with a current minimum TLS version closes the window for man-in-the-middle attacks that capture or modify database sessions in transit.
        - **Legacy protocol exploitation:** Setting a TLS floor of 1.2 prevents clients and load balancers from inadvertently negotiating deprecated cipher suites that are trivially broken with modern tooling.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Log in to the Azure Portal at https://portal.azure.com.
        2. Navigate to `Azure Database for MySQL servers`.
        3. Select each server to inspect its settings.
        4. Under `Connection security`, verify that `Enforce SSL connection` is set to `ENABLED`.
        5. Additionally, ensure that the server is configured to use the latest supported TLS version, such as TLS 1.2 or higher.

        **Automated Audit with Azure CLI:**

        Run the following command to inspect the SSL enforcement and the minimum TLS version for each MySQL server:

        ```bash
        az mysql flexible-server list --resource-group <resourceGroupName> --query "[].{Name:name}" -o table
        ```

        This command provides a tabulated view showing the SSL enforcement and TLS version for each server, facilitating quick identification of non-compliant or outdated configurations.
      remediation:
        - id: portal
          desc: |
            To ensure SSL is enabled with latest TLS for MySQL Database Server using the Azure Portal, enforce SSL connections and ensure the use of the latest TLS version:

            1. Access the Azure Portal at https://portal.azure.com.
            2. Navigate to `Azure Database for MySQL servers`.
            3. For each server, go to `Connection security`.
            4. Set `Enforce SSL connection` to `ENABLED`.
            5. Select the latest supported TLS version from the dropdown menu to ensure maximum security.
            6. Apply these settings to ensure compliance across all MySQL servers.

            Regular reviews and updates of these settings are recommended to adapt to new TLS versions as they become available, ensuring that the security configurations remain up-to-date.
        - id: cli
          desc: |
            To ensure SSL is enabled with latest TLS for MySQL Database Server using the Azure CLI, enforce SSL connections and set the latest TLS version for MySQL servers, use the following Azure CLI command:

            ```bash
            az mysql flexible-server parameter set --resource-group <resourceGroupName> --server-name <serverName> --name require_secure_transport --value ON
            az mysql flexible-server parameter set --resource-group <resourceGroupName> --server-name <serverName> --name tls_version --value TLSv1.2
            ```

            These commands update the specified MySQL flexible server to enforce SSL connections and set the minimum TLS version to 1.2. Adjust the `tls_version` parameter value as needed.
        - id: powershell
          desc: |
            To ensure SSL is enabled with latest TLS for MySQL Database Server using PowerShell, enforce SSL connections and set the latest TLS version for MySQL servers, use the following PowerShell command:

            ```powershell
            $server = Get-AzMySqlServer -ResourceGroupName <resourceGroupName> -Name <serverName>
            $server.SslEnforcement = "Enabled"
            $server.MinimalTlsVersion = "TLS1_2"
            Update-AzMySqlServer -MySqlServer $server
            ```

            This command retrieves the specified MySQL server, updates the SSL enforcement and TLS version settings, and applies the changes.
        - id: terraform
          desc: |
            To ensure SSL is enabled with latest TLS for MySQL Database Server in Terraform, enforce SSL connections and set TLS 1.2 on the flexible server:

            ```hcl
            resource "azurerm_mysql_flexible_server" "example" {
              name                = "example-mysql"
              resource_group_name = azurerm_resource_group.example.name
              location            = azurerm_resource_group.example.location
              version             = "8.0.21"

              administrator_login    = "mysqladmin"
              administrator_password = var.db_admin_password

              sku_name = "B_Standard_B1ms"
            }

            resource "azurerm_mysql_flexible_server_configuration" "require_secure_transport" {
              name                = "require_secure_transport"
              resource_group_name = azurerm_resource_group.example.name
              server_name         = azurerm_mysql_flexible_server.example.name
              value               = "ON"
            }

            resource "azurerm_mysql_flexible_server_configuration" "tls_version" {
              name                = "tls_version"
              resource_group_name = azurerm_resource_group.example.name
              server_name         = azurerm_mysql_flexible_server.example.name
              value               = "TLSv1.2"
            }
            ```

            Regularly review and update your Terraform configurations to ensure compliance with security best practices.
        - id: bicep
          desc: |
            To ensure SSL is enabled with latest TLS for MySQL Database Server in Bicep:

            ```bicep
            resource mysqlServer 'Microsoft.DBforMySQL/flexibleServers@2023-12-30' = {
              name: 'example-mysql'
              location: resourceGroup().location
              sku: {
                name: 'Standard_B1ms'
                tier: 'Burstable'
              }
              properties: {
                version: '8.0.21'
                administratorLogin: 'mysqladmin'
                administratorLoginPassword: adminPassword
              }

              resource requireSecureTransport 'configurations@2023-12-30' = {
                name: 'require_secure_transport'
                properties: {
                  value: 'ON'
                  source: 'user-override'
                }
              }

              resource tlsVersion 'configurations@2023-12-30' = {
                name: 'tls_version'
                properties: {
                  value: 'TLSv1.2'
                  source: 'user-override'
                }
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/mysql/single-server/concepts-security
        title: Azure MySQL Security
  - uid: mondoo-azure-security-ensure-disabled-public-access-sql
    title: Ensure SQL server public access is disabled or limited to selected networks
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-azure-security-ensure-disabled-public-access-sql-azure
        tags:
          mondoo.com/filter-title: Azure SQL Server
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-ensure-disabled-public-access-sql-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-ensure-disabled-public-access-sql-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-ensure-disabled-public-access-sql-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure SQL servers are configured with public network access disabled or restricted to selected networks. By default, new Azure SQL servers allow public internet connections, meaning any IP address can attempt to reach the SQL endpoint over port 1433.

        **Why this matters**

        - **Internet attack surface:** A publicly accessible SQL endpoint can be targeted by automated scanners, brute-force tools, and exploitation frameworks without any network-layer barrier.
        - **Credential spraying exposure:** Attackers can probe public SQL endpoints with leaked credential lists; disabling public access removes the endpoint from direct reach entirely.
        - **Least-privilege network access:** Restricting connections to selected networks or private endpoints means only approved sources can reach the database, enforcing the principle of least privilege at the network layer.
        - **Data exfiltration containment:** Limiting access to specific network paths constrains the channels through which an attacker could extract data, reducing the blast radius of a compromised application identity.

        **Risk mitigation**

        - **Unauthenticated probing:** Disabling public access ensures that unauthenticated connection attempts from the internet never reach the SQL service, eliminating a broad category of remote attack vectors.
        - **Perimeter bypass:** Selected-network restrictions prevent an attacker who compromises a public IP in a different region or cloud from pivoting directly to the SQL server without routing through approved network paths.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Log in to the Azure Portal at https://portal.azure.com.
        2. Navigate to **SQL servers** under Azure SQL services.
        3. Select each SQL server to review its networking settings.
        4. Under the **Security** section, select **Networking**.
        5. Verify that for **Public network access**, the setting is either **Disabled** or configured to allow **Selected networks** only, ensuring no open access to all networks.

        **Automated Audit with Azure CLI:**

        You can also verify the public network access settings using Azure CLI:

        ```bash
        az sql server list --query "[].{Name:name, PublicNetworkAccess:publicNetworkAccess}" -o table
        ```

        This command lists all SQL servers along with their public network access settings. Ensure that none of the servers are listed as having unrestricted public network access unless specific rules are applied.
      remediation:
        - id: portal
          desc: |
            To ensure SQL server public access is disabled or limited to selected networks using the Azure Portal, restrict public network access in Microsoft Azure Portal:

            1. Log into the Azure Portal at https://portal.azure.com.
            2. Navigate to **SQL servers** and select the server you wish to configure.
            3. In the server's settings, select **Networking** under the **Security** section.
            4. Locate the **Public network access** setting.
            5. Change the setting to **Disabled** to completely block public access or to **Selected networks** to restrict access to specific IP addresses or ranges.
            6. If selecting **Selected networks**, ensure you configure the necessary firewall rules or virtual network settings to specify which networks can access the server.
        - id: cli
          desc: |
            To ensure SQL server public access is disabled or limited to selected networks using the Azure CLI, disable public network access for all SQL servers in a subscription, you can use the following Azure CLI command for each server:

            ```bash
            az sql server update --name <ServerName> --resource-group <ResourceGroupName> --set publicNetworkAccess='Disabled'
            ```

            Replace `<ServerName>` and `<ResourceGroupName>` with your actual server names and resource group names. For granular control, manually configure network settings in the Azure Portal to specify allowed networks if opting for the "Selected networks" setting.
        - id: powershell
          desc: |
            To ensure SQL server public access is disabled or limited to selected networks using PowerShell, disable public network access for SQL servers, you can use the following PowerShell command:

            ```powershell
            $server = Get-AzSqlServer -ResourceGroupName <ResourceGroupName> -ServerName <ServerName>
            $server.PublicNetworkAccess = "Disabled"
            Set-AzSqlServer -SqlServer $server
            ```

            This command retrieves the specified SQL server, updates the public network access setting to disabled, and applies the changes. Regularly review and update these settings to ensure compliance with security best practices.
        - id: terraform
          desc: |
            To ensure SQL server public access is disabled or limited to selected networks in Terraform, disable public network access for SQL servers, you can use the following Terraform configuration:

            ```hcl
            resource "azurerm_mssql_server" "example" {
              name                          = "example-mssql-server"
              resource_group_name           = azurerm_resource_group.example.name
              location                      = azurerm_resource_group.example.location
              version                       = "12.0"
              administrator_login           = "sqladmin"
              administrator_login_password  = var.sql_admin_password
              public_network_access_enabled = false
            }
            ```

            This configuration ensures that public network access is disabled for the specified SQL server. Regularly review and update your Terraform configurations to ensure compliance with security best practices.
        - id: bicep
          desc: |
            To ensure SQL server public access is disabled or limited to selected networks in Bicep:

            ```bicep
            resource sqlServer 'Microsoft.Sql/servers@2023-08-01-preview' = {
              name: 'example-sql-server'
              location: resourceGroup().location
              properties: {
                publicNetworkAccess: 'Disabled'
                // ...
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/azure-sql/database/security-overview
        title: Azure SQL Database Security
  - uid: mondoo-azure-security-keyvault-public-access-disabled
    title: Ensure Key Vault public access is disabled or limited to selected networks
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-azure-security-keyvault-public-access-disabled-azure
        tags:
          mondoo.com/filter-title: Azure Key Vault
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-keyvault-public-access-disabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-keyvault-public-access-disabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-keyvault-public-access-disabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure Key Vault is configured with public network access disabled or restricted to selected networks. By default, Key Vault allows connections from any public IP address; an attacker who obtains a valid token can reach vault secrets directly from any internet-connected host.

        **Why this matters**

        - **Secret exfiltration risk:** Key vaults contain secrets, certificates, and encryption keys; a publicly reachable vault means that any stolen credential or token can be used from anywhere on the internet to retrieve those assets.
        - **Token replay window:** With public access enabled, an attacker who intercepts or exfiltrates an access token has an unrestricted network path to the vault; disabling public access adds a network barrier even when credentials are compromised.
        - **Blast radius containment:** Restricting access to selected VNets or private endpoints limits the machines that can consume vault secrets, ensuring that compromised workloads outside approved networks cannot escalate to key material.
        - **Defense in depth:** Network-level restrictions complement Azure RBAC and access policies; removing the public endpoint eliminates an entire class of remote exploitation scenarios even if authorization controls are misconfigured.

        **Risk mitigation**

        - **Credential theft escalation:** Disabling public access prevents an attacker who steals an application identity from using it to retrieve secrets from an arbitrary internet host, requiring them to also compromise an approved network path.
        - **Enumeration and probing:** A non-public vault endpoint does not respond to connection attempts from unauthorized networks, preventing reconnaissance of vault contents through error response analysis.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Log in to the Azure Portal at https://portal.azure.com.
        2. Navigate to **Key vaults** to list all key vaults in your subscriptions.
        3. Select each key vault to review its networking settings.
        4. In the key vault's **Settings**, select **Networking**.
        5. Check the **Firewalls and virtual networks** settings to ensure public access is either disabled or limited:
          - Verify that **Public network access** is set to **Disabled**.
          - If public access is enabled, ensure that access is restricted to selected networks by configuring IP rules or linking to specific virtual networks.

        **Automated Audit with Azure CLI:**

        You can check the public network access settings for all key vaults in a given subscription using the Azure CLI:

        ```bash
        az keyvault list --query "[].{Name:name, PublicNetworkAccess:properties.publicNetworkAccess}" -o table
        ```

        This command outputs the public network access settings for each key vault, allowing you to quickly identify configurations that do not align with best practices.
      remediation:
        - id: portal
          desc: |
            To ensure Key Vault public access is disabled or limited to selected networks using the Azure Portal, restrict public network access in Microsoft Azure Portal:

            1. Log into the Azure Portal at https://portal.azure.com.
            2. Navigate to **Key vaults** and select the key vault you wish to configure.
            3. In the key vault's **Settings**, select **Networking**.
            4. Locate the **Public network access** setting.
            5. Change the setting to **Disabled** to completely block public access or to **Enabled** with specific IP rules or virtual network links to restrict access to selected networks only.
            6. If you need to allow access from specific networks:
              - Set **Public network access** to **Enabled**.
              - Configure **Firewall rules** to define allowed IP address ranges.
              - Link to specific **Virtual networks** to restrict access to designated networks only.
        - id: cli
          desc: |
            To ensure Key Vault public access is disabled or limited to selected networks using the Azure CLI, disable public network access for all key vaults in a subscription, you can use the following Azure CLI command for each key vault:

            ```bash
            az keyvault update --name <KeyVaultName> --resource-group <ResourceGroupName> --set properties.publicNetworkAccess='Disabled'
            ```

            Replace `<KeyVaultName>` and `<ResourceGroupName>` with your actual key vault names and resource group names. For granular control, manually configure network settings in the Azure Portal to specify allowed networks if opting for the "Enabled" setting.
        - id: powershell
          desc: |
            To ensure Key Vault public access is disabled or limited to selected networks using PowerShell, disable public network access for key vaults, you can use the following PowerShell command:

            ```powershell
            $keyVault = Get-AzKeyVault -ResourceGroupName <ResourceGroupName> -VaultName <KeyVaultName>
            $keyVault.Properties.PublicNetworkAccess = "Disabled"
            Set-AzKeyVault -KeyVault $keyVault
            ```

            This command retrieves the specified key vault, updates the public network access setting to disabled, and applies the changes. Regularly review and update these settings to ensure compliance with security best practices.
        - id: terraform
          desc: |
            To ensure Key Vault public access is disabled or limited to selected networks in Terraform, disable public network access for key vaults, you can use the following Terraform configuration:

            ```hcl
            resource "azurerm_key_vault" "example" {
              name                          = "example-keyvault"
              location                      = azurerm_resource_group.example.location
              resource_group_name           = azurerm_resource_group.example.name
              sku_name                      = "standard"
              tenant_id                     = data.azurerm_client_config.current.tenant_id
              public_network_access_enabled = false
            }
            ```

            This configuration ensures that public network access is disabled for the specified key vault. Regularly review and update your Terraform configurations to ensure compliance with security best practices.
        - id: bicep
          desc: |
            To ensure Key Vault public access is disabled or limited to selected networks in Bicep:

            ```bicep
            resource keyVault 'Microsoft.KeyVault/vaults@2023-07-01' = {
              name: 'example-keyvault'
              location: resourceGroup().location
              properties: {
                publicNetworkAccess: 'Disabled'
                networkAcls: {
                  defaultAction: 'Deny'
                }
                // ...
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/key-vault/general/security-features
        title: Azure Key Vault Security
  - uid: mondoo-azure-security-sql-server-audit-on
    title: Ensure that all activities on SQL server are audited
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-07
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-pr-pt-1
      compliance/nist-csf-2: nist-csf-2-pr-ps-04
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-12
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    variants:
      - uid: mondoo-azure-security-sql-server-audit-on-azure
        tags:
          mondoo.com/filter-title: Azure SQL Server
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-sql-server-audit-on-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-sql-server-audit-on-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-sql-server-audit-on-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure SQL Server auditing is enabled so that all database activity is captured and forwarded to a durable log destination. Auditing is disabled by default on SQL servers and must be explicitly configured to write logs to Storage, Log Analytics, or an Event Hub.

        **Why this matters**

        - **Post-incident investigation:** Audit logs provide the forensic record needed to determine what data was accessed, by whom, and from where during and after a security incident.
        - **Unauthorized access detection:** Auditing records failed logins, privilege escalations, and unusual query patterns that are otherwise invisible without a server-level activity log.
        - **Regulatory evidence:** Many frameworks require demonstrable audit trails for database access; the absence of auditing makes it impossible to prove or disprove unauthorized access to regulated data.
        - **Insider threat visibility:** Auditing captures privileged-user actions including schema changes, bulk data exports, and administrative commands that administrative accounts can otherwise perform silently.

        **Risk mitigation**

        - **Evidence destruction:** Without a forwarded audit log, an attacker with sufficient privileges can wait for the default 90-day Azure Monitor retention window to expire, permanently erasing evidence of their activity.
        - **Compliance gap:** Regulators treat the absence of audit logging as a control failure in its own right; enabling auditing closes this gap independently of any other security control.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Go to the Azure Portal at https://portal.azure.com.
        2. Navigate to **SQL servers** and select each server to inspect its auditing settings.
        3. Select **Auditing** for each server.
        4. Verify that `Enable Azure SQL Auditing` is switched to `On`. Check that an appropriate storage account, Log Analytics workspace, or Event Hub is selected as the audit log destination.

        **Automated Audit with Azure CLI:**

        To verify the auditing settings for all SQL Servers in a subscription: (replace <resourceGroupName> with your resource group name)

        ```bash
        az sql server list --query "[].{Name:name, ResourceGroupName:<resourceGroupName>}" -o tsv | while read -r name rg; do
          echo "Server: $name"
          az sql server audit-policy show --name $name --resource-group $rg
        done
        ```

        This script iterates over all SQL servers, displaying their audit policy status, ensuring that auditing is enabled and correctly configured.
      remediation:
        - id: portal
          desc: |
            To ensure that all activities on SQL server are audited using the Azure Portal, enable auditing for SQL servers in Microsoft Azure Portal:

            1. Log into the Azure Portal at https://portal.azure.com.
            2. Navigate to **SQL servers** and select the server you want to configure.
            3. Under **Security**, select **Auditing**.
            4. Set `Enable Azure SQL Auditing` to `On`.
            5. Select a destination for the audit logs: Storage Account, Log Analytics workspace, or Event Hub.
            6. Configure the retention period, ensuring it aligns with your organization's compliance requirements.
            7. Select `Save` to apply the settings.
        - id: cli
          desc: |
            To ensure that all activities on SQL server are audited using the Azure CLI, for each SQL server, enable auditing and specify the log retention settings and destination. Here's how you can enable auditing to a Storage Account with a retention period:

            ```bash
            az sql server audit-policy update --name <ServerName> --resource-group <ResourceGroupName> --state Enabled --blob-storage-target-state Enabled --storage-endpoint <StorageAccountBlobEndpoint> --storage-key <StorageAccountKey> --retention-days 90
            ```

            Replace placeholders with your specific details. Similar commands can be executed to set up auditing with Log Analytics or Event Hub as the destination. Ensuring that auditing is enabled and properly configured across all SQL servers in your Azure environment is a key step in maintaining a strong security and compliance posture.
        - id: powershell
          desc: |
            To ensure that all activities on SQL server are audited using PowerShell, enable auditing for SQL servers, you can use the following PowerShell command:

            ```powershell
            Set-AzSqlServerAudit -ResourceGroupName <ResourceGroupName> -ServerName <ServerName> -State Enabled -StorageAccountName <StorageAccountName> -StorageAccountKey <StorageAccountKey> -RetentionDays 90
            ```

            This command enables auditing for the specified SQL server and configures the storage account and retention period. Regularly review and update these settings to ensure compliance with security best practices.
        - id: terraform
          desc: |
            To ensure that all activities on SQL server are audited in Terraform, enable auditing for SQL servers, you can use the following Terraform configuration:

            ```hcl
            resource "azurerm_mssql_server" "example" {
              name                         = "example-mssql-server"
              resource_group_name          = azurerm_resource_group.example.name
              location                     = azurerm_resource_group.example.location
              version                      = "12.0"
              administrator_login          = "sqladmin"
              administrator_login_password = var.sql_admin_password
            }

            resource "azurerm_mssql_server_extended_auditing_policy" "example" {
              server_id                               = azurerm_mssql_server.example.id
              storage_endpoint                        = azurerm_storage_account.example.primary_blob_endpoint
              storage_account_access_key              = azurerm_storage_account.example.primary_access_key
              storage_account_access_key_is_secondary = false
              retention_in_days                       = 90
            }
            ```

            This configuration ensures that auditing is enabled for the specified SQL server and configures the storage account and retention period. Regularly review and update your Terraform configurations to ensure compliance with security best practices.
        - id: bicep
          desc: |
            To ensure that all activities on SQL server are audited in Bicep:

            ```bicep
            resource sqlServerAudit 'Microsoft.Sql/servers/auditingSettings@2023-08-01-preview' = {
              parent: sqlServer
              name: 'default'
              properties: {
                state: 'Enabled'
                storageEndpoint: storageAccount.properties.primaryEndpoints.blob
                storageAccountAccessKey: storageAccount.listKeys().keys[0].value
                retentionDays: 90
              }
            }
            ```
