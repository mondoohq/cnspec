        title: Azure SQL Database Security
  - uid: mondoo-azure-security-diagnostic-settings-exist
    title: Ensure that diagnostic settings exist for the subscription
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-07
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-pr-pt-1
      compliance/nist-csf-2: nist-csf-2-pr-ps-04
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-12
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    variants:
      - uid: mondoo-azure-security-diagnostic-settings-exist-azure
        tags:
          mondoo.com/filter-title: Azure Subscription
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-diagnostic-settings-exist-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-diagnostic-settings-exist-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-diagnostic-settings-exist-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that at least one diagnostic setting is configured for the Azure subscription, forwarding activity logs to a durable destination such as a Log Analytics workspace, Storage account, or Event Hub. Without a diagnostic setting, subscription-level activity logs are retained in Azure Monitor for only 90 days and are inaccessible from SIEM tools or cross-subscription queries.

        **Why this matters**

        - **Invisible lateral movement:** Attackers who compromise a subscription can create resources, modify IAM roles, and change network configurations; without log forwarding these actions exist only in the short-lived activity log and are lost before incident response begins.
        - **Persistence establishment:** Backdoor service principals, role assignments, and newly deployed resources created by an attacker leave no centralized trace without diagnostic settings enabled.
        - **Evidence expiration:** The default 90-day activity log retention in Azure Monitor is shorter than many breach discovery timelines; forwarding logs to a controlled destination preserves the record beyond that window.
        - **SIEM and alerting gap:** Security operations tooling cannot correlate subscription-level events with other signals unless those events are forwarded to a queryable destination.

        **Risk mitigation**

        - **Anti-forensics by inaction:** An attacker with subscription-level access who waits out the 90-day default retention window effectively erases their activity log without taking any additional destructive action; diagnostic settings remove this natural cover.
        - **Compliance audit failure:** Regulatory frameworks require demonstrable audit log collection at the cloud account level; the absence of any diagnostic setting is an immediately verifiable control gap.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Go to the Azure Portal at https://portal.azure.com.
        2. Navigate to **Monitor** and then **Activity log**.
        3. Select **Diagnostic settings** and review the settings for your subscription.
        4. Ensure that there are diagnostic settings configured and that they cover the essential log categories: Administrative, Security, Alert, and Policy.

        **Automated Audit with Azure CLI:**

        To check the diagnostic settings for the subscription:

        ```bash
        az monitor diagnostic-settings list --resource /subscriptions/{subscriptionId}
        ```

        Verify that the output includes diagnostic settings with the necessary categories enabled.
      remediation:
        - id: portal
          desc: |
            To ensure that diagnostic settings exist for the subscription using the Azure Portal, configure diagnostic settings in the Azure Portal:

            1. Log into the Azure Portal at https://portal.azure.com.
            2. Navigate to **Monitor** and then **Activity log**.
            3. Select **Diagnostic settings** and select **Add diagnostic setting**.
            4. Provide a name for the diagnostic setting.
            5. Select the necessary log categories: Administrative, Security, Alert, and Policy.
            6. Choose the destination for the logs, such as an Azure Storage account, a Log Analytics workspace, or an Event Hub.
            7. Save the configuration to ensure continuous monitoring.
        - id: cli
          desc: |
            To ensure that diagnostic settings exist for the subscription using the Azure CLI, create or update diagnostic settings for a subscription, use the following command:

            ```bash
            az monitor diagnostic-settings create --name <NameOfSetting> --resource /subscriptions/{subscriptionId} --logs '[{"category": "Administrative", "enabled": true}, {"category": "Security", "enabled": true}, {"category": "Alert", "enabled": true}, {"category": "Policy", "enabled": true}]' --storage-account <StorageAccountId> --workspace <LogAnalyticsWorkspaceId> --event-hub <EventHubName>
            ```

            Replace the placeholders with your specific resource IDs and desired diagnostic setting name.
        - id: powershell
          desc: |
            To ensure that diagnostic settings exist for the subscription using PowerShell, configure diagnostic settings with PowerShell, use the following command:

            ```powershell
            $subsId = "<SubscriptionId>"
            $settingName = "<DiagnosticSettingName>"
            $storageAccountId = "<StorageAccountId>"
            $workspaceId = "<LogAnalyticsWorkspaceId>"
            $eventHubAuthRuleId = "<EventHubAuthorizationRuleId>"

            Set-AzDiagnosticSetting -ResourceId "/subscriptions/$subsId" -StorageAccountId $storageAccountId -WorkspaceId $workspaceId -Enabled $true -Name $settingName -Category @("Administrative", "Security", "Alert", "Policy")
            ```

            Modify the script to match your specific resource IDs and configuration preferences. It's crucial to routinely review and update these settings to adapt to any changes in your Azure environment or organizational requirements.
        - id: terraform
          desc: |
            To ensure that diagnostic settings exist for the subscription in Terraform, configure diagnostic settings for a subscription, you can use the following Terraform configuration:

            ```hcl
            resource "azurerm_monitor_diagnostic_setting" "example" {
              name               = "example-diagnostic-setting"
              target_resource_id = azurerm_sql_server.example.id

              log {
                category = "Administrative"
                enabled  = true
              }

              log {
                category = "Security"
                enabled  = true
              }

              log {
                category = "Alert"
                enabled  = true
              }

              log {
                category = "Policy"
                enabled  = true
              }

              storage_account_id = azurerm_storage_account.example.id
            }
            ```

            This configuration ensures that the specified log categories are collected for the Azure resource. Regularly review and update your Terraform configurations to ensure compliance with security best practices.
        - id: bicep
          desc: |
            To ensure that diagnostic settings exist for the subscription in Bicep:

            ```bicep
            resource diagnosticSetting 'Microsoft.Insights/diagnosticSettings@2021-05-01-preview' = {
              name: 'example-sub-diag'
              properties: {
                workspaceId: logAnalyticsWorkspace.id
                logs: [
                  {
                    category: 'Administrative'
                    enabled: true
                  }
                  {
                    category: 'Security'
                    enabled: true
                  }
                  {
                    category: 'Alert'
                    enabled: true
                  }
                  {
                    category: 'Policy'
                    enabled: true
                  }
                ]
              }
            }
            ```
