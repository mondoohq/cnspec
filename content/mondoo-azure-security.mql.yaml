        )
      )
  - uid: mondoo-azure-security-container-app-managed-identity-registries
    title: Ensure Container Apps pull images using managed identity
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-14
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-9
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-2
      compliance/pci-dss-4: pcidss-requirement-8-6-2
      compliance/soc2-2017: soc2-control-cc6-1-8
      compliance/vda-isa-5: vda-isa-5-4-1-3
    variants:
      - uid: mondoo-azure-security-container-app-managed-identity-registries-azure
        tags:
          mondoo.com/filter-title: Azure Subscription
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-container-app-managed-identity-registries-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-container-app-managed-identity-registries-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-container-app-managed-identity-registries-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure Container Apps that reference one or more private container registries authenticate to those registries using a managed identity rather than embedded credentials stored as Container Apps secrets. When registry credentials are stored as secrets in the Container App configuration, they become long-lived, shareable values that are easy to leak and difficult to rotate across all deployments.

        **Why this matters**

        - **Static credential leak risk**: Registry credentials embedded as secrets are long-lived, copied across environments, and easy to leak through configuration exports, source control, or backup files; an attacker who reads a single secret value gains pull or push access to every image in the registry.
        - **Automatic token rotation**: Managed identity authentication issues short-lived tokens scoped to the specific Container App and rotated automatically by Azure, eliminating the shared password and the manual rotation playbook required for static credentials.
        - **Least-privilege enforcement**: Azure RBAC on the registry grants the Container App identity precisely the role it needs, such as AcrPull, while embedded secrets are typically reused across workloads and carry broader permissions than any single workload requires.

        **Risk mitigation**

        - **Credential theft neutralization**: With managed identity authentication, there is no registry password in the Container App's secrets list to steal; even full read access to the Container App configuration yields no usable credential for direct registry access.
        - **Rotation-free security hygiene**: Managed identity tokens expire automatically and are issued on demand by Azure, removing the operational risk of forgotten or overdue credential rotations that leave stale passwords active in compromised environments.
        - **Supply-chain attack surface reduction**: Restricting registry pull access to a specific managed identity ensures that only the authorized Container App can pull images from the registry, preventing an attacker with generic Azure credentials from downloading images to extract embedded secrets or vulnerabilities.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Container Apps** in the Azure Portal.
        2. Select a container app.
        3. Go to **Containers** under **Application** and review the registry under **Image source**.
        4. Confirm the registry is configured with **Managed Identity** rather than a username and password backed by a secret.

        **Automated Audit with Azure CLI:**

        ```bash
        az containerapp show --name <ContainerAppName> --resource-group <ResourceGroupName> --query "properties.configuration.registries"
        ```

        Each registry entry should expose an `identity` value rather than a `passwordSecretRef`.
      remediation:
        - id: portal
          desc: |
            To switch a Container App to managed identity for registry authentication using the Azure Portal:

            1. Assign the Container App a system-assigned or user-assigned managed identity under **Identity**.
            2. In the target Azure Container Registry, grant that identity the **AcrPull** role under **Access control (IAM)**.
            3. Edit the Container App revision and set the registry **Authentication** to **Managed Identity**, choosing the identity assigned in step 1.
            4. Remove the registry password secret from the Container App **Secrets** list once the new revision is healthy.
        - id: cli
          desc: |
            To configure managed identity registry authentication using the Azure CLI:

            ```bash
            az containerapp identity assign --name <ContainerAppName> --resource-group <ResourceGroupName> --system-assigned
            az role assignment create --assignee <PrincipalId> --role AcrPull --scope <RegistryResourceId>
            az containerapp registry set --name <ContainerAppName> --resource-group <ResourceGroupName> --server <RegistryName>.azurecr.io --identity system
            ```
        - id: bicep
          desc: |
            To configure managed identity registry authentication in Bicep:

            ```bicep
            resource containerApp 'Microsoft.App/containerApps@2024-03-01' = {
              name: 'example-app'
              location: resourceGroup().location
              identity: {
                type: 'SystemAssigned'
              }
              properties: {
                managedEnvironmentId: environment.id
                configuration: {
                  registries: [
                    {
                      server: 'myacr.azurecr.io'
                      identity: 'system'
                    }
                  ]
                }
                template: {
                  containers: [
                    {
                      name: 'app'
                      image: 'myacr.azurecr.io/app@sha256:abcdef'
                    }
                  ]
                }
              }
            }
            ```
        - id: terraform
          desc: |
            To configure managed identity registry authentication on a Container App in Terraform, attach an identity to the resource and reference it from each `registry` block:

            ```hcl
            resource "azurerm_user_assigned_identity" "app" {
              name                = "example-app-identity"
              resource_group_name = azurerm_resource_group.example.name
              location            = azurerm_resource_group.example.location
            }

            resource "azurerm_role_assignment" "acr_pull" {
              scope                = azurerm_container_registry.example.id
              role_definition_name = "AcrPull"
              principal_id         = azurerm_user_assigned_identity.app.principal_id
            }

            resource "azurerm_container_app" "example" {
              name                         = "example-app"
              resource_group_name          = azurerm_resource_group.example.name
              container_app_environment_id = azurerm_container_app_environment.example.id
              revision_mode                = "Single"

              identity {
                type         = "UserAssigned"
                identity_ids = [azurerm_user_assigned_identity.app.id]
              }

              registry {
                server   = azurerm_container_registry.example.login_server
                identity = azurerm_user_assigned_identity.app.id
              }

              template {
                container {
                  name   = "app"
                  image  = "${azurerm_container_registry.example.login_server}/app@sha256:abcdef"
                  cpu    = 0.25
                  memory = "0.5Gi"
                }
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/container-apps/managed-identity-image-pull
        title: Pull images from Azure Container Registry using managed identity
  - uid: mondoo-azure-security-container-app-managed-identity-registries-azure
