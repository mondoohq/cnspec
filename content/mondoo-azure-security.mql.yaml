queries:
  - uid: mondoo-azure-security-ensure-os-disk-are-encrypted
    title: Ensure Azure VM OS disks are encrypted with CMK
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-azure-security-ensure-os-disk-are-encrypted-azure
        tags:
          mondoo.com/filter-title: Azure Virtual Machine
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-ensure-os-disk-are-encrypted-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-ensure-os-disk-are-encrypted-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-ensure-os-disk-are-encrypted-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure virtual machine OS disks are configured to use Customer Managed Keys (CMK) for encryption at rest. By default, Azure encrypts OS disks with platform-managed keys, but CMK gives organizations direct control over the cryptographic material via Azure Key Vault, enabling key rotation and revocation capabilities.

        **Why this matters**

        - **Data confidentiality**: Encrypting OS disks with CMK ensures that data is unreadable to anyone without access to the key in Key Vault, protecting it from both external attackers and insider threats.
        - **Key ownership**: CMK lets the organization revoke access to encrypted data instantly by disabling or deleting the key, a control that platform-managed keys do not provide.
        - **Scope of protection**: OS disks contain the operating system, boot secrets, and cached credentials; encrypting them prevents recovery of sensitive system data from stolen or improperly decommissioned disks.
        - **Defense in depth**: CMK encryption is complementary to network-level controls and provides a last line of defense if physical media or snapshot data is accessed outside the normal Azure control plane.

        **Risk mitigation**

        - **Disk theft and decommissioning**: Stolen or discarded disks yield no readable data when encrypted with CMK, because the decryption key is held separately in Key Vault.
        - **Snapshot and copy exposure**: Encrypted disks produce encrypted snapshots; an attacker who exfiltrates a snapshot cannot read its contents without access to the CMK in Key Vault.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Virtual machines** in the Azure Portal.
        2. Select a virtual machine and access **Disks** under the Settings menu.
        3. Verify the encryption settings for the OS disk to ensure it uses CMK.

        **Automated Audit with Azure CLI:**

        List and check the encryption settings for all disks in a specific resource group:

        ```bash
        az disk list --resource-group "yourResourceGroupName" --query "[].{Name:name, ResourceGroupName:resourceGroup, EncryptionSettings:encryptionSettingsCollection}" -o table
        ```

        **Automated Audit with PowerShell:**

        ```powershell
        Get-AzDisk -ResourceGroupName "yourResourceGroupName" | Select-Object Name, ResourceGroupName, EncryptionSettingsCollection
        ```

        Ensure the EncryptionType is set to EncryptionAtRestWithCustomerKey for OS disks.
      remediation:
        - id: portal
          desc: |
            To ensure Azure VM OS disks are encrypted with CMK using the Azure Portal:

            1. Log into the Azure Portal and navigate to **Disks**.
            2. Select the OS disk you wish to encrypt.
            3. In the **Encryption** section, set **Encryption type** to **Customer-managed keys**.
            4. Specify the Azure Key Vault and select the appropriate key.
            5. Save the changes.
        - id: cli
          desc: |
            To ensure Azure VM OS disks are encrypted with CMK using the Azure CLI:

            ```bash
            az vm encryption enable --resource-group <ResourceGroupName> --name <VMName> --disk-encryption-keyvault <KeyVaultName> --key-encryption-key <KeyName> --volume-type OS
            ```
        - id: powershell
          desc: |
            To ensure Azure VM OS disks are encrypted with CMK using PowerShell:

            ```powershell
            Set-AzVMDiskEncryptionExtension -ResourceGroupName <ResourceGroupName> -VMName <VMName> -KeyVaultUrl <KeyVaultUrl> -VolumeType OS
            ```
        - id: terraform
          desc: |
            To ensure Azure VM OS disks are encrypted with CMK in Terraform:

            __Encrypt disks Linux VM__

            ```hcl
            # Encrypt Linux OS disk with Terraform
            resource "azurerm_linux_virtual_machine" "example" {
              name                = "example-linux-machine"
              resource_group_name = azurerm_resource_group.example.name
              location            = azurerm_resource_group.example.location

              ...

              encryption_at_host_enabled = true

              ...
            }
            ```

            __Encrypt disks Windows VM__

            ```hcl
            resource "azurerm_windows_virtual_machine" "example" {
              name                = "example-win-vm"
              resource_group_name = azurerm_resource_group.example.name
              location            = azurerm_resource_group.example.location

              ...

              encryption_at_host_enabled = true

              ...
            }
            ```

            __Encrypt managed disks__

            ```hcl
            resource "azurerm_managed_disk" "example" {
              name                 = var.disk_name
              location             = var.location
              resource_group_name  = var.resource_group_name
              storage_account_type = "Standard_LRS"
              create_option        = "Empty"
              disk_size_gb         = 64

              encryption_settings {
                disk_encryption_key {
                  secret_url      = azurerm_key_vault_secret.example.id
                  source_vault_id = azurerm_key_vault.example.id
                }
              }
            }
            ```
        - id: bicep
          desc: |
            To ensure Azure VM OS disks are encrypted with CMK in Bicep:

            __Encrypt disks Linux VM__

            ```bicep
            resource linuxVM 'Microsoft.Compute/virtualMachines@2024-07-01' = {
              name: 'example-linux-machine'
              location: resourceGroup().location
              properties: {
                securityProfile: {
                  encryptionAtHost: true
                }
                // ...
              }
            }
            ```

            __Encrypt disks Windows VM__

            ```bicep
            resource windowsVM 'Microsoft.Compute/virtualMachines@2024-07-01' = {
              name: 'example-win-vm'
              location: resourceGroup().location
              properties: {
                securityProfile: {
                  encryptionAtHost: true
                }
                // ...
              }
            }
            ```

            __Encrypt managed disks__

            ```bicep
            resource managedDisk 'Microsoft.Compute/disks@2024-03-02' = {
              name: 'example-disk'
              location: resourceGroup().location
              properties: {
                encryptionSettingsCollection: {
                  enabled: true
                  encryptionSettings: [
                    {
                      diskEncryptionKey: {
                        secretUrl: keyVaultSecret.properties.secretUri
                        sourceVault: {
                          id: keyVault.id
                        }
                      }
                    }
                  ]
                }
              }
            }
            ```
