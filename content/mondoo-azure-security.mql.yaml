  - uid: mondoo-azure-security-appgw-min-tls-version
    title: Ensure Application Gateway enforces TLS 1.2+
    impact: 80
    variants:
      - uid: mondoo-azure-security-appgw-min-tls-version-azure
        tags:
          mondoo.com/filter-title: Azure Subscription
          mondoo.com/icon: azure
      - uid: mondoo-azure-security-appgw-min-tls-version-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/icon: terraform
      - uid: mondoo-azure-security-appgw-min-tls-version-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/icon: terraform
      - uid: mondoo-azure-security-appgw-min-tls-version-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/icon: terraform
    docs:
      desc: |
        This check ensures that all Azure Application Gateways enforce TLS 1.2 or higher as the minimum protocol version for SSL connections.

        **Why this matters**

        - **Protocol security**: TLS 1.0 and 1.1 have known vulnerabilities including BEAST, POODLE, and other attacks that allow traffic interception and decryption.
        - **Frontend protection**: Application Gateways handle TLS termination for backend services, making the SSL policy a critical security control.
        - **Compliance alignment**: Industry standards such as PCI DSS require TLS 1.2 as a minimum for secure communications.

        **Risk mitigation**

        - Configure all Application Gateways to use TLS 1.2 or higher as the minimum protocol version.
        - Use predefined SSL policies that enforce modern TLS versions.
      remediation:
        - id: portal
          desc: |
            **Using Azure Portal**

            1. Navigate to **Application gateways** in the Azure Portal.
            2. Select the Application Gateway.
            3. Under **Settings**, select **SSL settings**.
            4. Set the **Minimum protocol version** to **TLSv1_2**.
            5. Select **Save**.
        - id: cli
          desc: |
            **Using Azure CLI**

            ```bash
            az network application-gateway ssl-policy set --gateway-name <GatewayName> --resource-group <ResourceGroupName> --min-protocol-version TLSv1_2 --policy-type Custom --cipher-suites TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384 TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
            ```
        - id: terraform
          desc: |
            **Using Terraform**

            ```hcl
            resource "azurerm_application_gateway" "example" {
              name                = "example-appgw"
              resource_group_name = azurerm_resource_group.example.name
              location            = azurerm_resource_group.example.location

              ssl_policy {
                policy_type          = "Custom"
                min_protocol_version = "TLSv1_2"
                cipher_suites = [
                  "TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384",
                  "TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256",
                ]
              }

              # ... other required blocks
            }
            ```
        - id: bicep
          desc: |
            **Using Bicep**

            ```bicep
            resource appGateway 'Microsoft.Network/applicationGateways@2023-05-01' = {
              name: 'example-appgw'
              location: resourceGroup().location
              properties: {
                sslPolicy: {
                  policyType: 'Custom'
                  minProtocolVersion: 'TLSv1_2'
                  cipherSuites: [
                    'TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384'
                    'TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256'
                  ]
                }
                // ... other required properties
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/application-gateway/application-gateway-ssl-policy-overview
        title: Application Gateway SSL policy overview
  - uid: mondoo-azure-security-appgw-min-tls-version-azure
    filters: |
      asset.platform == "azure"
    mql: |
      azure.subscription.network.applicationGateways.all(
        sslMinProtocolVersion == "TLSv1_2" || sslMinProtocolVersion == "TLSv1_3"
      )
  - uid: mondoo-azure-security-appgw-min-tls-version-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "azurerm_application_gateway")
    mql: |
      terraform.resources.where(nameLabel == "azurerm_application_gateway").all(
        blocks.where(type == "ssl_policy") != empty &&
        blocks.where(type == "ssl_policy").all(arguments['min_protocol_version'] == "TLSv1_2" || arguments['min_protocol_version'] == "TLSv1_3")
      )
  - uid: mondoo-azure-security-appgw-min-tls-version-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "azurerm_application_gateway")
    mql: |
      terraform.plan.resourceChanges.where(type == "azurerm_application_gateway").all(
        change.after['ssl_policy'] != empty &&
        change.after['ssl_policy'].all(_['min_protocol_version'] == "TLSv1_2" || _['min_protocol_version'] == "TLSv1_3")
      )
  - uid: mondoo-azure-security-appgw-min-tls-version-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "azurerm_application_gateway")
    mql: |
      terraform.state.resources.where(type == "azurerm_application_gateway").all(
        values['ssl_policy'] != empty &&
        values['ssl_policy'].all(_['min_protocol_version'] == "TLSv1_2" || _['min_protocol_version'] == "TLSv1_3")
      )
  - uid: mondoo-azure-security-appgw-no-weak-ciphers
    title: Ensure Application Gateway has no weak SSL ciphers
    impact: 80
    variants:
      - uid: mondoo-azure-security-appgw-no-weak-ciphers-azure
        tags:
          mondoo.com/filter-title: Azure Subscription
          mondoo.com/icon: azure
    docs:
      desc: |
        This check ensures that Azure Application Gateways do not use weak SSL cipher suites such as RC4, 3DES, NULL, or EXPORT ciphers that allow decryption of intercepted traffic.

        **Why this matters**

        - **Cipher vulnerabilities**: RC4, 3DES, NULL, and EXPORT ciphers have known cryptographic weaknesses that allow attackers to decrypt intercepted traffic.
        - **Data confidentiality**: Weak ciphers undermine the confidentiality guarantees of TLS, exposing application data to interception.
        - **Compliance alignment**: Security standards such as PCI DSS and NIST explicitly prohibit the use of weak cipher suites.

        **Risk mitigation**

        - Configure Application Gateways to use only strong cipher suites.
        - Use predefined SSL policies that exclude weak ciphers.
      remediation:
        - id: portal
          desc: |
            **Using Azure Portal**

            1. Navigate to **Application gateways** in the Azure Portal.
            2. Select the Application Gateway.
            3. Under **Settings**, select **SSL settings**.
            4. Select the **SSL policy** configuration.
            5. Choose a predefined policy that excludes weak ciphers, or configure a custom policy removing RC4, 3DES, NULL, and EXPORT cipher suites.
            6. Select **Save**.
        - id: cli
          desc: |
            **Using Azure CLI**

            Use a predefined policy that excludes weak ciphers:

            ```bash
            az network application-gateway ssl-policy set --gateway-name <GatewayName> --resource-group <ResourceGroupName> --policy-type Predefined --policy-name AppGwSslPolicy20220101
            ```

            Or use a custom policy with only strong ciphers:

            ```bash
            az network application-gateway ssl-policy set --gateway-name <GatewayName> --resource-group <ResourceGroupName> --policy-type Custom --min-protocol-version TLSv1_2 --cipher-suites TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384 TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
            ```
        - id: bicep
          desc: |
            **Using Bicep**

            ```bicep
            resource appGateway 'Microsoft.Network/applicationGateways@2023-05-01' = {
              name: 'example-appgw'
              location: resourceGroup().location
              properties: {
                sslPolicy: {
                  policyType: 'Custom'
                  minProtocolVersion: 'TLSv1_2'
                  cipherSuites: [
                    'TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384'
                    'TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256'
                    'TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384'
                    'TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256'
                  ]
                }
                // ... other required properties
              }
            }
            ```
        - id: terraform
          desc: |
            **Using Terraform**

            ```hcl
            resource "azurerm_application_gateway" "example" {
              name                = "example-appgw"
              resource_group_name = azurerm_resource_group.example.name
              location            = azurerm_resource_group.example.location

              ssl_policy {
                policy_type          = "Custom"
                min_protocol_version = "TLSv1_2"
                cipher_suites = [
                  "TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384",
                  "TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256",
                  "TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384",
                  "TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256",
                ]
              }

              # ... other required configuration ...
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/application-gateway/application-gateway-ssl-policy-overview
        title: Application Gateway SSL policy overview
  - uid: mondoo-azure-security-appgw-no-weak-ciphers-azure
    filters: |
      asset.platform == "azure"
    mql: |
      azure.subscription.network.applicationGateways.all(
        sslCipherSuites.none(
          _ == /RC4/ || _ == /3DES/ || _ == /NULL/ || _ == /EXPORT/
        )
      )
  - uid: mondoo-azure-security-public-ip-ddos-protection
    title: Ensure public IP addresses have DDoS protection
    impact: 70
    variants:
      - uid: mondoo-azure-security-public-ip-ddos-protection-azure
        tags:
          mondoo.com/filter-title: Azure Subscription
          mondoo.com/icon: azure
    docs:
      desc: |
        This check ensures that all Azure public IP addresses have DDoS protection enabled, either through a DDoS Protection plan or inherited from the virtual network.

        **Why this matters**

        - **Volumetric attack protection**: Without DDoS protection, public IP addresses are vulnerable to volumetric attacks that can overwhelm network bandwidth and service availability.
        - **Application availability**: DDoS attacks can render applications unreachable, causing service outages and financial impact.
        - **Automatic mitigation**: Azure DDoS Protection provides automatic attack detection and mitigation with telemetry and alerting.

        **Risk mitigation**

        - Enable DDoS Protection on all public IP addresses or their associated virtual networks.
        - Monitor DDoS protection metrics and configure alerts for attack detection.
      remediation:
        - id: portal
          desc: |
            **Using Azure Portal**

            1. Navigate to **Public IP addresses** in the Azure Portal.
            2. Select the public IP address.
            3. Under **Settings**, select **Properties**.
            4. Verify that **DDoS protection** is set to **Enabled**.
            5. Associate the public IP with a DDoS Protection Plan if not already done.
            6. Select **Save**.
        - id: cli
          desc: |
            **Using Azure CLI**

            Enable DDoS Protection on a virtual network:

            ```bash
            az network ddos-protection create --resource-group <ResourceGroupName> --name <DdosPlanName>
            az network vnet update --resource-group <ResourceGroupName> --name <VNetName> --ddos-protection-plan <DdosPlanId> --ddos-protection true
            ```

            Enable DDoS protection on a public IP:

            ```bash
            az network public-ip update --resource-group <ResourceGroupName> --name <PublicIpName> --ddos-protection-mode Enabled --ddos-protection-plan <DdosPlanId>
            ```
        - id: bicep
          desc: |
            **Using Bicep**

            ```bicep
            resource publicIp 'Microsoft.Network/publicIPAddresses@2023-05-01' = {
              name: 'example-pip'
              location: resourceGroup().location
              sku: {
                name: 'Standard'
              }
              properties: {
                publicIPAllocationMethod: 'Static'
                ddosSettings: {
                  protectionMode: 'Enabled'
                  ddosProtectionPlan: {
                    id: ddosProtectionPlan.id
                  }
                }
              }
            }
            ```
        - id: terraform
          desc: |
            **Using Terraform**

            ```hcl
            resource "azurerm_public_ip" "example" {
              name                = "example-pip"
              location            = azurerm_resource_group.example.location
              resource_group_name = azurerm_resource_group.example.name
              allocation_method   = "Static"
              sku                 = "Standard"
              ddos_protection_mode = "Enabled"
              ddos_protection_plan_id = azurerm_network_ddos_protection_plan.example.id
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/ddos-protection/ddos-protection-overview
        title: Azure DDoS Protection overview
  - uid: mondoo-azure-security-public-ip-ddos-protection-azure
    filters: |
      asset.platform == "azure"
    mql: |
      azure.subscription.network.publicIpAddresses.all(
        ddosProtectionMode == "Enabled" || ddosProtectionMode == "VirtualNetworkInherited"
      )
  - uid: mondoo-azure-security-nsg-no-unrestricted-egress
    title: Ensure NSG rules do not allow unrestricted egress
    impact: 80
    variants:
      - uid: mondoo-azure-security-nsg-no-unrestricted-egress-azure
        tags:
          mondoo.com/filter-title: Azure Network Security Group
          mondoo.com/icon: azure
      - uid: mondoo-azure-security-nsg-no-unrestricted-egress-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/icon: terraform
      - uid: mondoo-azure-security-nsg-no-unrestricted-egress-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/icon: terraform
      - uid: mondoo-azure-security-nsg-no-unrestricted-egress-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/icon: terraform
    docs:
      desc: |
        This check ensures that network security group rules do not allow unrestricted outbound traffic to the internet on all ports and protocols. Unrestricted egress rules allow compromised resources to exfiltrate data, establish command-and-control channels, or participate in attacks against external targets without network-level controls.

        **Why this matters**

        - **Data exfiltration:** Compromised VMs can freely send data to any destination on any port.
        - **C2 communication:** Malware can reach attacker infrastructure without network restrictions.
        - **Lateral movement:** Unrestricted egress facilitates pivoting to external targets.
      remediation:
        - id: portal
          desc: |
            **Using Azure Portal**

            1. Navigate to **Network security groups**.
            2. Select the NSG.
            3. Under **Outbound security rules**, identify rules with destination `*` or `Internet` and port range `*`.
            4. Edit or delete the rule to restrict to specific destinations and ports.
        - id: cli
          desc: |
            **Using Azure CLI**

            List outbound rules that allow unrestricted egress:

            ```bash
            az network nsg rule list --resource-group <ResourceGroupName> --nsg-name <NsgName> --query "[?direction=='Outbound' && access=='Allow' && destinationAddressPrefix=='*' && destinationPortRange=='*']"
            ```

            Delete or update the offending rule:

            ```bash
            az network nsg rule delete --resource-group <ResourceGroupName> --nsg-name <NsgName> --name <RuleName>
            ```

            Or restrict it to specific destinations and ports:

            ```bash
            az network nsg rule update --resource-group <ResourceGroupName> --nsg-name <NsgName> --name <RuleName> --destination-port-ranges 443 --destination-address-prefixes Internet
            ```
        - id: bicep
          desc: |
            **Using Bicep**

            ```bicep
            resource nsg 'Microsoft.Network/networkSecurityGroups@2023-05-01' = {
              name: 'example-nsg'
              location: resourceGroup().location
              properties: {
                securityRules: [
                  {
                    name: 'DenyAllOutbound'
                    properties: {
                      priority: 4096
                      direction: 'Outbound'
                      access: 'Deny'
                      protocol: '*'
                      sourcePortRange: '*'
                      destinationPortRange: '*'
                      sourceAddressPrefix: '*'
                      destinationAddressPrefix: '*'
                    }
                  }
                  {
                    name: 'AllowHttpsOutbound'
                    properties: {
                      priority: 100
                      direction: 'Outbound'
                      access: 'Allow'
                      protocol: 'Tcp'
                      sourcePortRange: '*'
                      destinationPortRange: '443'
                      sourceAddressPrefix: '*'
                      destinationAddressPrefix: 'Internet'
                    }
                  }
                ]
              }
            }
            ```
        - id: terraform
          desc: |
            **Using Terraform**

            ```hcl
            resource "azurerm_network_security_rule" "deny_all_outbound" {
              name                        = "DenyAllOutbound"
              priority                    = 4096
              direction                   = "Outbound"
              access                      = "Deny"
              protocol                    = "*"
              source_port_range           = "*"
              destination_port_range      = "*"
              source_address_prefix       = "*"
              destination_address_prefix  = "*"
              resource_group_name         = azurerm_resource_group.example.name
              network_security_group_name = azurerm_network_security_group.example.name
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/virtual-network/network-security-groups-overview
        title: Azure Documentation - Network security groups
  - uid: mondoo-azure-security-nsg-no-unrestricted-egress-azure
    filters: |
      asset.platform == "azure-network-security-group"
    mql: |
      azure.subscription.network.securityGroup.securityRules
        .where(
          properties.access == 'Allow'
            && direction == 'Outbound'
            && properties.protocol == /\*/i
            && properties.destinationAddressPrefix == /\*|0\.0\.0\.0|internet|any/i
            && properties.destinationPortRange == "*"
        ).length == 0
  - uid: mondoo-azure-security-nsg-no-unrestricted-egress-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "azurerm_network_security_rule")
    mql: |
      terraform.resources.where(nameLabel == "azurerm_network_security_rule").none(
        arguments['direction'] == "Outbound" &&
        arguments['access'] == "Allow" &&
        arguments['protocol'] == "*" &&
        arguments['destination_address_prefix'] == "*" &&
        arguments['destination_port_range'] == "*"
      )
  - uid: mondoo-azure-security-nsg-no-unrestricted-egress-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "azurerm_network_security_rule")
    mql: |
      terraform.plan.resourceChanges.where(type == "azurerm_network_security_rule").none(
        change.after['direction'] == "Outbound" &&
        change.after['access'] == "Allow" &&
        change.after['protocol'] == "*" &&
        change.after['destination_address_prefix'] == "*" &&
        change.after['destination_port_range'] == "*"
      )
  - uid: mondoo-azure-security-nsg-no-unrestricted-egress-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "azurerm_network_security_rule")
    mql: |
      terraform.state.resources.where(type == "azurerm_network_security_rule").none(
        values['direction'] == "Outbound" &&
        values['access'] == "Allow" &&
        values['protocol'] == "*" &&
        values['destination_address_prefix'] == "*" &&
        values['destination_port_range'] == "*"
      )
  - uid: mondoo-azure-security-network-interface-ip-forwarding-disabled
    title: Ensure network interface IP forwarding is disabled
    impact: 50
    variants:
      - uid: mondoo-azure-security-network-interface-ip-forwarding-disabled-azure
        tags:
          mondoo.com/filter-title: Azure Subscription
          mondoo.com/icon: azure
      - uid: mondoo-azure-security-network-interface-ip-forwarding-disabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/icon: terraform
      - uid: mondoo-azure-security-network-interface-ip-forwarding-disabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/icon: terraform
      - uid: mondoo-azure-security-network-interface-ip-forwarding-disabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/icon: terraform
    docs:
      desc: |
        This check ensures that Azure network interfaces do not have IP forwarding enabled unless explicitly required. IP forwarding allows a network interface to send and receive traffic not destined for its own IP address, which is typically only needed for network virtual appliances (firewalls, load balancers).

        **Why this matters**

        - **Man-in-the-middle risk:** IP forwarding enables a VM to intercept and forward traffic between other VMs, facilitating eavesdropping.
        - **Routing abuse:** A compromised VM with IP forwarding can redirect traffic to attacker-controlled destinations.
        - **Least privilege:** IP forwarding should only be enabled on dedicated network virtual appliances, not general-purpose VMs.
      remediation:
        - id: portal
          desc: |
            **Using Azure Portal**

            1. Navigate to **Network interfaces**.
            2. Select the interface.
            3. Under **Settings** > **IP configurations**, disable **IP forwarding**.
        - id: cli
          desc: |
            **Using Azure CLI**

            ```bash
            az network nic update --name <nic-name> --resource-group <rg> --ip-forwarding false
            ```
        - id: bicep
          desc: |
            **Using Bicep**

            ```bicep
            resource nic 'Microsoft.Network/networkInterfaces@2023-05-01' = {
              name: 'example-nic'
              location: resourceGroup().location
              properties: {
                enableIPForwarding: false
                ipConfigurations: [
                  {
                    name: 'ipconfig1'
                    properties: {
                      subnet: {
                        id: subnet.id
                      }
                    }
                  }
                ]
              }
            }
            ```
        - id: terraform
          desc: |
            **Using Terraform**

            ```hcl
            resource "azurerm_network_interface" "example" {
              name                = "example-nic"
              location            = azurerm_resource_group.example.location
              resource_group_name = azurerm_resource_group.example.name

              enable_ip_forwarding = false

              ip_configuration {
                name                          = "internal"
                subnet_id                     = azurerm_subnet.example.id
                private_ip_address_allocation = "Dynamic"
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/virtual-network/virtual-network-network-interface
        title: Azure Documentation - Azure network interface settings
  - uid: mondoo-azure-security-network-interface-ip-forwarding-disabled-azure
    filters: |
      asset.platform == "azure"
    mql: |
