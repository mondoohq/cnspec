  - uid: mondoo-azure-security-appgw-no-weak-ciphers
    title: Ensure Application Gateway has no weak SSL ciphers
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    variants:
      - uid: mondoo-azure-security-appgw-no-weak-ciphers-azure
        tags:
          mondoo.com/filter-title: Azure Subscription
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-appgw-no-weak-ciphers-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-appgw-no-weak-ciphers-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-appgw-no-weak-ciphers-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure Application Gateways do not use weak SSL cipher suites such as RC4, 3DES, NULL, or EXPORT ciphers that allow decryption of intercepted traffic.

        **Why this matters**

        - **Cipher vulnerabilities**: RC4, 3DES, NULL, and EXPORT ciphers have known cryptographic weaknesses that allow attackers to decrypt intercepted traffic.
        - **Data confidentiality**: Weak ciphers undermine the confidentiality guarantees of TLS, exposing application data to interception.
        - **Compliance alignment**: Security standards such as PCI DSS and NIST explicitly prohibit the use of weak cipher suites.

        **Risk mitigation**

        - Configure Application Gateways to use only strong cipher suites.
        - Use predefined SSL policies that exclude weak ciphers.
      audit: |
        ### Audit via Portal

        1. Navigate to **Application gateways** in the Azure Portal.
        2. Select the Application Gateway.
        3. Under **Settings**, select **SSL settings**.
        4. Review the configured cipher suites or SSL policy name.

        A passing resource uses only strong cipher suites with no RC4, 3DES, NULL, or EXPORT ciphers listed. A failing resource includes one or more of these weak cipher suites or uses a policy that permits them.

        ### Audit via CLI

        1. Run the following command, substituting your resource group and gateway name:

        ```bash
        az network application-gateway show \
          --resource-group <ResourceGroupName> \
          --name <GatewayName> \
          --query "sslPolicy" -o json
        ```

        A passing resource returns an SSL policy with no `RC4`, `3DES`, `NULL`, or `EXPORT` entries in the `cipherSuites` list. A failing resource includes one or more of these weak cipher suite names.
      remediation:
        - id: portal
          desc: |
            To ensure Application Gateway has no weak SSL ciphers using the Azure Portal:

            1. Navigate to **Application gateways** in the Azure Portal.
            2. Select the Application Gateway.
            3. Under **Settings**, select **SSL settings**.
            4. Select the **SSL policy** configuration.
            5. Choose a predefined policy that excludes weak ciphers, or configure a custom policy removing RC4, 3DES, NULL, and EXPORT cipher suites.
            6. Select **Save**.
        - id: cli
          desc: |
            To ensure Application Gateway has no weak SSL ciphers using the Azure CLI, use a predefined policy that excludes weak ciphers:

            ```bash
            az network application-gateway ssl-policy set --gateway-name <GatewayName> --resource-group <ResourceGroupName> --policy-type Predefined --name AppGwSslPolicy20220101
            ```

            Or use a custom policy with only strong ciphers:

            ```bash
            az network application-gateway ssl-policy set --gateway-name <GatewayName> --resource-group <ResourceGroupName> --policy-type Custom --min-protocol-version TLSv1_2 --cipher-suites TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384 TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
            ```
        - id: bicep
          desc: |
            To ensure Application Gateway has no weak SSL ciphers in Bicep:

            ```bicep
            resource appGateway 'Microsoft.Network/applicationGateways@2023-05-01' = {
              name: 'example-appgw'
              location: resourceGroup().location
              properties: {
                sslPolicy: {
                  policyType: 'Custom'
                  minProtocolVersion: 'TLSv1_2'
                  cipherSuites: [
                    'TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384'
                    'TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256'
                    'TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384'
                    'TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256'
                  ]
                }
                // ... other required properties
              }
            }
            ```
        - id: terraform
          desc: |
            To ensure Application Gateway has no weak SSL ciphers in Terraform:

            ```hcl
            resource "azurerm_application_gateway" "example" {
              name                = "example-appgw"
              resource_group_name = azurerm_resource_group.example.name
              location            = azurerm_resource_group.example.location

              ssl_policy {
                policy_type          = "Custom"
                min_protocol_version = "TLSv1_2"
                cipher_suites = [
                  "TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384",
                  "TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256",
                  "TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384",
                  "TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256",
                ]
              }

              # ... other required configuration ...
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/application-gateway/application-gateway-ssl-policy-overview
        title: Application Gateway SSL policy overview
