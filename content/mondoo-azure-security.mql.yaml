  - uid: mondoo-azure-security-appgw-min-tls-version
    title: Ensure Application Gateway enforces TLS 1.2+
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    variants:
      - uid: mondoo-azure-security-appgw-min-tls-version-azure
        tags:
          mondoo.com/filter-title: Azure Subscription
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-appgw-min-tls-version-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-appgw-min-tls-version-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-appgw-min-tls-version-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that all Azure Application Gateways enforce TLS 1.2 or higher as the minimum protocol version for SSL connections.

        **Why this matters**

        - **Protocol security**: TLS 1.0 and 1.1 have known vulnerabilities including BEAST, POODLE, and other attacks that allow traffic interception and decryption.
        - **Frontend protection**: Application Gateways handle TLS termination for backend services, making the SSL policy a critical security control.
        - **Compliance alignment**: Industry standards such as PCI DSS require TLS 1.2 as a minimum for secure communications.

        **Risk mitigation**

        - Configure all Application Gateways to use TLS 1.2 or higher as the minimum protocol version.
        - Use predefined SSL policies that enforce modern TLS versions.
      audit: |
        ### Audit via Portal

        1. Navigate to **Application gateways** in the Azure Portal.
        2. Select the Application Gateway.
        3. Under **Settings**, select **SSL settings**.
        4. Review the **Minimum protocol version** field.

        A passing resource shows a minimum protocol version of **TLSv1_2** or **TLSv1_3**. A failing resource shows **TLSv1_0**, **TLSv1_1**, or an unset minimum version.

        ### Audit via CLI

        1. Run the following command, substituting your resource group and gateway name:

        ```bash
        az network application-gateway show \
          --resource-group <ResourceGroupName> \
          --name <GatewayName> \
          --query "sslPolicy.minProtocolVersion" -o tsv
        ```

        A passing resource returns `TLSv1_2` or `TLSv1_3`. A failing resource returns `TLSv1_0`, `TLSv1_1`, or an empty value.
      remediation:
        - id: portal
          desc: |
            To ensure Application Gateway enforces TLS 1.2+ using the Azure Portal:

            1. Navigate to **Application gateways** in the Azure Portal.
            2. Select the Application Gateway.
            3. Under **Settings**, select **SSL settings**.
            4. Set the **Minimum protocol version** to **TLSv1_2**.
            5. Select **Save**.
        - id: cli
          desc: |
            To ensure Application Gateway enforces TLS 1.2+ using the Azure CLI:

            ```bash
            az network application-gateway ssl-policy set --gateway-name <GatewayName> --resource-group <ResourceGroupName> --min-protocol-version TLSv1_2 --policy-type Custom --cipher-suites TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384 TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
            ```
        - id: terraform
          desc: |
            To ensure Application Gateway enforces TLS 1.2+ in Terraform:

            ```hcl
            resource "azurerm_application_gateway" "example" {
              name                = "example-appgw"
              resource_group_name = azurerm_resource_group.example.name
              location            = azurerm_resource_group.example.location

              ssl_policy {
                policy_type          = "Custom"
                min_protocol_version = "TLSv1_2"
                cipher_suites = [
                  "TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384",
                  "TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256",
                ]
              }

              # ... other required blocks
            }
            ```
        - id: bicep
          desc: |
            To ensure Application Gateway enforces TLS 1.2+ in Bicep:

            ```bicep
            resource appGateway 'Microsoft.Network/applicationGateways@2023-05-01' = {
              name: 'example-appgw'
              location: resourceGroup().location
              properties: {
                sslPolicy: {
                  policyType: 'Custom'
                  minProtocolVersion: 'TLSv1_2'
                  cipherSuites: [
                    'TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384'
                    'TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256'
                  ]
                }
                // ... other required properties
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/application-gateway/application-gateway-ssl-policy-overview
        title: Application Gateway SSL policy overview
  - uid: mondoo-azure-security-appgw-min-tls-version-azure
