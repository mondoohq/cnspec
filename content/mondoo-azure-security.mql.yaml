  - uid: mondoo-azure-security-cosmosdb-cmk-encryption
    title: Ensure Azure Cosmos DB accounts use customer-managed keys for encryption
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-azure-security-cosmosdb-cmk-encryption-azure
        tags:
          mondoo.com/filter-title: Azure Cosmos DB Account
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-cosmosdb-cmk-encryption-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-cosmosdb-cmk-encryption-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-cosmosdb-cmk-encryption-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure Cosmos DB accounts are configured with customer-managed keys via Azure Key Vault for data-at-rest encryption, rather than relying on the default Microsoft-managed keys. By default, Cosmos DB encrypts data using Microsoft-managed keys, which means the cloud provider retains control over the encryption material.

        **Why this matters**

        - **Encryption key ownership:** Customer-managed keys give organizations full control over the key material used to protect Cosmos DB data, including the authority to rotate, revoke, and audit key usage independently.
        - **Key lifecycle management:** Organizations can enforce rotation policies, set expiration dates, and revoke keys immediately when a breach is suspected, instantly rendering stored data inaccessible to unauthorized parties.
        - **Separation of duties:** Separating the data administrator role from the key administrator role ensures no single identity can both access data and control the encryption protecting it.
        - **Data residency and sovereignty:** Storing keys in a customer-controlled Key Vault instance provides assurance that encryption material does not leave the customer's control boundary.

        **Risk mitigation**

        - **Immediate access revocation:** Revoking the Key Vault key instantly cuts off all access to encrypted data, providing a fast response mechanism if an account is compromised.
        - **Insider threat at the provider:** Customer-managed keys ensure that Microsoft personnel cannot decrypt customer data at rest, limiting insider risk to the cloud provider.
        - **Regulatory evidence:** Key Vault audit logs provide a cryptographic audit trail of every key operation, satisfying auditor requests for evidence of encryption key management practices.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Azure Cosmos DB** in the Azure Portal.
        2. Select a Cosmos DB account.
        3. Go to **Encryption** under **Settings**.
        4. Verify that encryption is configured with a **Customer-managed key** from Azure Key Vault.

        **Automated Audit with Azure CLI:**

        ```bash
        az cosmosdb show --name <CosmosDBAccountName> --resource-group <ResourceGroupName> --query "keyVaultKeyUri"
        ```

        **Automated Audit with PowerShell:**

        ```powershell
        Get-AzCosmosDBAccount -ResourceGroupName <ResourceGroupName> -Name <CosmosDBAccountName> | Select-Object Name, KeyVaultKeyUri
        ```
      remediation:
        - id: portal
          desc: |
            To ensure Azure Cosmos DB accounts use customer-managed keys for encryption using the Azure Portal:

            1. Navigate to **Azure Cosmos DB** in the Azure Portal.
            2. Select the Cosmos DB account.
            3. Go to **Encryption** under **Settings**.
            4. Select **Customer-managed key**.
            5. Configure the Azure Key Vault, key, and version.
            6. Assign a managed identity with access to the Key Vault.
            7. Select **Save**.

            **Note**: Customer-managed key encryption must be configured at account creation time. Existing accounts using Microsoft-managed keys may need to be recreated.
        - id: cli
          desc: |
            To ensure Azure Cosmos DB accounts use customer-managed keys for encryption using the Azure CLI:

            ```bash
            az cosmosdb create --name <CosmosDBAccountName> --resource-group <ResourceGroupName> --key-uri "https://<KeyVaultName>.vault.azure.net/keys/<KeyName>/<KeyVersion>" --assign-identity "<ManagedIdentityResourceId>" --default-identity "UserAssignedIdentity=<ManagedIdentityResourceId>"
            ```
        - id: terraform
          desc: |
            To ensure Azure Cosmos DB accounts use customer-managed keys for encryption in Terraform:

            ```hcl
            resource "azurerm_cosmosdb_account" "example" {
              name                = "example-cosmosdb"
              location            = azurerm_resource_group.example.location
              resource_group_name = azurerm_resource_group.example.name
              offer_type          = "Standard"
              key_vault_key_id    = azurerm_key_vault_key.example.id

              identity {
                type = "SystemAssigned"
              }
            }
            ```
        - id: bicep
          desc: |
            To ensure Azure Cosmos DB accounts use customer-managed keys for encryption in Bicep:

            ```bicep
            resource cosmosDbAccount 'Microsoft.DocumentDB/databaseAccounts@2024-05-15' = {
              name: 'example-cosmosdb'
              location: resourceGroup().location
              properties: {
                keyVaultKeyUri: 'https://example-kv.vault.azure.net/keys/example-key'
                // ...
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/cosmos-db/how-to-setup-cmk
        title: Configure customer-managed keys for your Azure Cosmos DB account
