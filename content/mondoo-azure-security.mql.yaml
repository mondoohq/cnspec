  - uid: mondoo-azure-security-aks-node-resource-group-restricted
    title: Ensure AKS node resource group access is restricted
    impact: 70
    variants:
      - uid: mondoo-azure-security-aks-node-resource-group-restricted-azure
        tags:
          mondoo.com/filter-title: Azure AKS Cluster
          mondoo.com/icon: azure
      - uid: mondoo-azure-security-aks-node-resource-group-restricted-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/icon: terraform
      - uid: mondoo-azure-security-aks-node-resource-group-restricted-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/icon: terraform
      - uid: mondoo-azure-security-aks-node-resource-group-restricted-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/icon: terraform
    docs:
      desc: |
        This check ensures that AKS clusters have node resource group access restricted to read-only, preventing direct modification of managed infrastructure resources in the node resource group.

        **Why this matters**

        - **Infrastructure integrity**: Unrestricted node resource group access allows users to directly modify load balancers, disks, NICs, and other managed resources, potentially breaking cluster operations.
        - **Blast radius reduction**: Read-only restrictions prevent accidental or malicious deletion of critical node infrastructure components.
        - **Operational stability**: AKS manages node resource group resources through its own reconciliation loops; external modifications cause drift and unpredictable behavior.

        **Risk mitigation**

        - Set node resource group restrictions to `ReadOnly` to prevent unauthorized modifications.
        - Use AKS APIs and configuration options to manage cluster infrastructure instead of direct resource group changes.
      remediation:
        - id: portal
          desc: |
            **Using Azure Portal**

            1. Navigate to **Kubernetes services** in the Azure Portal.
            2. Select the AKS cluster.
            3. Under **Properties**, review the node resource group settings.
            4. Node resource group restrictions must be set to **ReadOnly** to prevent unauthorized modifications.

            Note: Node resource group restriction level changes may require recreation of the cluster or use of the Azure CLI.
        - id: cli
          desc: |
            **Using Azure CLI**

            Create a new cluster with node resource group restrictions:

            ```bash
            az aks create --resource-group <ResourceGroupName> --name <ClusterName> --nrg-lockdown-restriction-level ReadOnly
            ```

            Update an existing cluster:

            ```bash
            az aks update --resource-group <ResourceGroupName> --name <ClusterName> --nrg-lockdown-restriction-level ReadOnly
            ```
        - id: terraform
          desc: |
            **Using Terraform**

            ```hcl
            resource "azurerm_kubernetes_cluster" "example" {
              name                = "example-aks"
              location            = azurerm_resource_group.example.location
              resource_group_name = azurerm_resource_group.example.name

              node_resource_group_profile {
                restrictions = "ReadOnly"
              }
            }
            ```
        - id: bicep
          desc: |
            **Using Bicep**

            ```bicep
            resource aksCluster 'Microsoft.ContainerService/managedClusters@2024-01-01' = {
              name: 'example-aks'
              location: resourceGroup().location
              properties: {
                nodeResourceGroupProfile: {
                  restrictionLevel: 'ReadOnly'
                }
                // ...
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/aks/node-resource-group-lockdown
        title: Lock down resources in node resource group for AKS
  - uid: mondoo-azure-security-aks-node-resource-group-restricted-azure
    filters: |
      asset.platform == "azure-aks-cluster"
    mql: |
      azure.subscription.aksService.cluster.nodeResourceGroupRestrictionLevel == "ReadOnly"
  - uid: mondoo-azure-security-aks-node-resource-group-restricted-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "azurerm_kubernetes_cluster")
    mql: |
      terraform.resources.where(nameLabel == "azurerm_kubernetes_cluster").all(
        blocks.where(type == "node_resource_group_profile") != empty &&
        blocks.where(type == "node_resource_group_profile").all(arguments['restrictions'] == "ReadOnly")
      )
  - uid: mondoo-azure-security-aks-node-resource-group-restricted-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "azurerm_kubernetes_cluster")
    mql: |
      terraform.plan.resourceChanges.where(type == "azurerm_kubernetes_cluster").all(
        change.after['node_resource_group_profile'] != empty &&
        change.after['node_resource_group_profile'].all(_['restrictions'] == "ReadOnly")
      )
  - uid: mondoo-azure-security-aks-node-resource-group-restricted-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "azurerm_kubernetes_cluster")
