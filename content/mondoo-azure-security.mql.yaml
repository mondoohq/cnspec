  - uid: mondoo-azure-security-sql-server-tde-on
    title: Ensure that transparent data encryption is enabled for SQL Server databases
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-azure-security-sql-server-tde-on-azure
        tags:
          mondoo.com/filter-title: Azure SQL Server
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-sql-server-tde-on-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-sql-server-tde-on-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-sql-server-tde-on-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Transparent Data Encryption (TDE) is enabled for Azure SQL Server databases to encrypt database files, log files, and backups at rest. TDE is enabled by default on new Azure SQL databases, but it can be disabled, leaving stored data unencrypted on the underlying storage infrastructure.

        **Why this matters**

        - **Storage-layer protection:** TDE encrypts the physical database and log files using AES-256, ensuring that raw storage access by a cloud provider employee, a storage-layer vulnerability, or physical media theft does not expose readable data.
        - **Backup confidentiality:** TDE encryption extends to database backups, so exported or automated backups cannot be restored and read on an unauthorized server without the corresponding TDE protector key.
        - **Transparent application compatibility:** TDE operates at the storage engine level and requires no application changes; disabling it provides no operational benefit while removing a meaningful layer of protection.
        - **Defense against physical extraction:** In shared cloud environments, encryption at rest ensures that data remains unreadable even if underlying physical infrastructure is compromised at the storage layer.

        **Risk mitigation**

        - **Unauthorized backup access:** Without TDE, a copy of the database file or a backup set is immediately readable by anyone who can access the storage location, requiring no database credentials.
        - **Regulatory non-compliance:** Most data protection frameworks treat encryption at rest as a baseline control; disabling TDE on databases containing regulated data constitutes a direct compliance violation.
      audit: |
        **Manual Audit via Azure Portal:**

        1. In the Azure Portal, navigate to **SQL databases** under your SQL Server instances.
        2. Select each database to inspect its settings.
        3. Select **Transparent data encryption** under the **Security** settings.
        4. Verify that `Data encryption` is set to `On` for each database (except the master database, which cannot be encrypted with TDE).

        **Automated Audit with Azure CLI:**

        To check the TDE status for all databases in a specific SQL server:

        ```bash
        az sql db list --resource-group <ResourceGroupName> --server <ServerName> --query "[].{Name:name, TDE:transparentDataEncryption}" -o table
        ```

        Use the following command to check the TDE status of a specific database:

        ```bash
        az sql db tde show --database <DatabaseName> --resource-group <ResourceGroupName> --server <ServerName>
        ```

        Ensure the TDE status is `Enabled` for each database.
      remediation:
        - id: portal
          desc: |
            To ensure that transparent data encryption is enabled for SQL Server databases using the Azure Portal, enable TDE for SQL databases in Microsoft Azure Portal:

            1. Log into the Azure Portal at https://portal.azure.com.
            2. Navigate to **SQL databases** under your SQL Server instances.
            3. Select each database to configure TDE.
            4. Under the **Security** section, select **Transparent data encryption**.
            5. Set `Data encryption` to `On`.
            6. Save the changes to apply TDE to the selected database.
        - id: cli
          desc: |
            To ensure that transparent data encryption is enabled for SQL Server databases using the Azure CLI, enable TDE for a specific database, use the following command:

            ```bash
            az sql db tde set --database <DatabaseName> --resource-group <ResourceGroupName> --server <ServerName> --status Enabled
            ```

            Replace `<DatabaseName>`, `<ResourceGroupName>`, and `<ServerName>` with your actual database, resource group, and server names. This command enables TDE for the specified database.
        - id: powershell
          desc: |
            To ensure that transparent data encryption is enabled for SQL Server databases using PowerShell, enable TDE for SQL databases, use the following PowerShell command:

            ```powershell
            Set-AzSqlDatabaseTransparentDataEncryption -DatabaseName <DatabaseName> -ServerName <ServerName> -ResourceGroupName <ResourceGroupName> -State 'Enabled'
            ```

            Replace `<DatabaseName>`, `<ServerName>`, and `<ResourceGroupName>` with your actual database, server, and resource group names. This command enables TDE for the specified database.
        - id: terraform
          desc: |
            To ensure that transparent data encryption is enabled for SQL Server databases in Terraform, enable TDE for SQL databases, you can use the following Terraform configuration:

            ```hcl
            resource "azurerm_mssql_database" "example" {
              name                            = "example-db"
              server_id                       = azurerm_mssql_server.example.id
              transparent_data_encryption_enabled = true
            }
            ```

            This configuration ensures that TDE is enabled for the specified SQL database. Regularly review and update your Terraform configurations to ensure compliance with security best practices.
        - id: bicep
          desc: |
            To ensure that transparent data encryption is enabled for SQL Server databases in Bicep:

            ```bicep
            resource tde 'Microsoft.Sql/servers/databases/transparentDataEncryption@2023-08-01-preview' = {
              parent: sqlDatabase
              name: 'current'
              properties: {
                state: 'Enabled'
              }
            }
            ```
