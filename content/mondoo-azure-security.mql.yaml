  - uid: mondoo-azure-security-api-management-gateway-min-tls-1-2
    title: Ensure API Management gateway disables TLS 1.0 and TLS 1.1
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    variants:
      - uid: mondoo-azure-security-api-management-gateway-min-tls-1-2-azure
        tags:
          mondoo.com/filter-title: Azure API Management
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-api-management-gateway-min-tls-1-2-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-api-management-gateway-min-tls-1-2-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-api-management-gateway-min-tls-1-2-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure API Management gateways do not accept TLS 1.0 or TLS 1.1 on either the frontend (client-to-gateway) or backend (gateway-to-API) hops. TLS 1.0 and 1.1 are deprecated and carry known cryptographic weaknesses.

        **Why this matters**

        - **Protocol weaknesses**: TLS 1.0 and 1.1 are vulnerable to BEAST, POODLE, and downgrade attacks that can expose API request and response bodies in flight.
        - **Gateway position**: An API Management gateway typically sits in front of business-critical APIs; weak protocol negotiation there exposes every API behind the gateway.
        - **Two hops**: The gateway has independent TLS settings for the inbound (frontend) leg from clients and the outbound (backend) leg to upstream APIs; both must reject TLS 1.0 and 1.1.
        - **Compliance**: PCI DSS, NIST SP 800-53, and HIPAA require TLS 1.2 or higher for data in transit.

        **Risk mitigation**

        - Set the `Microsoft.WindowsAzure.ApiManagement.Gateway.Security.Protocols.Tls10` and `...Protocols.Tls11` custom properties to `"False"` on both the frontend and backend.
        - Pair this check with cipher-suite hardening (disabling Triple-DES and other legacy ciphers via the same custom-property map).
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **API Management services** in the Azure Portal.
        2. Select a service instance.
        3. Under **Security**, open **Protocols + ciphers**.
        4. Verify that **TLS 1.0** and **TLS 1.1** are **Disabled** for both client and backend connections.

        **Automated Audit with Azure CLI:**

        ```bash
        az apim show --resource-group <ResourceGroupName> --name <ApiManagementServiceName> --query "customProperties"
        ```
      remediation:
        - id: portal
          desc: |
            To disable TLS 1.0 and 1.1 on an API Management gateway using the Azure Portal:

            1. Navigate to **API Management services** in the Azure Portal.
            2. Select the service instance.
            3. Under **Security**, select **Protocols + ciphers**.
            4. Set **TLS 1.0** and **TLS 1.1** to **Disabled** for both client and backend.
            5. Select **Save**.
        - id: cli
          desc: |
            To disable TLS 1.0 and 1.1 on an API Management gateway using the Azure CLI:

            ```bash
            az apim update --resource-group <ResourceGroupName> --name <ApiManagementServiceName> \
              --set customProperties."Microsoft.WindowsAzure.ApiManagement.Gateway.Security.Protocols.Tls10"=False \
                    customProperties."Microsoft.WindowsAzure.ApiManagement.Gateway.Security.Protocols.Tls11"=False \
                    customProperties."Microsoft.WindowsAzure.ApiManagement.Gateway.Security.Backend.Protocols.Tls10"=False \
                    customProperties."Microsoft.WindowsAzure.ApiManagement.Gateway.Security.Backend.Protocols.Tls11"=False
            ```
        - id: terraform
          desc: |
            To disable TLS 1.0 and 1.1 on an API Management gateway in Terraform:

            ```hcl
            resource "azurerm_api_management" "example" {
              name                = "example-apim"
              location            = azurerm_resource_group.example.location
              resource_group_name = azurerm_resource_group.example.name
              publisher_name      = "Example Publisher"
              publisher_email     = "publisher@example.com"
              sku_name            = "Premium_1"

              security {
                enable_backend_tls10  = false
                enable_backend_tls11  = false
                enable_frontend_tls10 = false
                enable_frontend_tls11 = false
              }
            }
            ```
        - id: bicep
          desc: |
            To disable TLS 1.0 and 1.1 on an API Management gateway in Bicep:

            ```bicep
            resource apiManagement 'Microsoft.ApiManagement/service@2023-05-01-preview' = {
              name: 'example-apim'
              location: resourceGroup().location
              sku: {
                name: 'Premium'
                capacity: 1
              }
              properties: {
                publisherEmail: 'publisher@example.com'
                publisherName: 'Example Publisher'
                customProperties: {
                  'Microsoft.WindowsAzure.ApiManagement.Gateway.Security.Protocols.Tls10': 'False'
                  'Microsoft.WindowsAzure.ApiManagement.Gateway.Security.Protocols.Tls11': 'False'
                  'Microsoft.WindowsAzure.ApiManagement.Gateway.Security.Backend.Protocols.Tls10': 'False'
                  'Microsoft.WindowsAzure.ApiManagement.Gateway.Security.Backend.Protocols.Tls11': 'False'
                }
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/api-management/api-management-howto-manage-protocols-ciphers
        title: Manage protocols and ciphers in Azure API Management
  - uid: mondoo-azure-security-api-management-gateway-min-tls-1-2-azure
