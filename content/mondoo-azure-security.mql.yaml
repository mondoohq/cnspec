      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-azure-security-log-analytics-cmk-for-query-azure
        tags:
          mondoo.com/filter-title: Azure Subscription
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-log-analytics-cmk-for-query-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-log-analytics-cmk-for-query-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-log-analytics-cmk-for-query-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure Log Analytics workspaces are configured to enforce customer-managed keys (CMK) for saved queries and query-based log alerts. When enabled, all saved searches and alerts are encrypted with a customer-managed key.

        **Why this matters**

        - Saved queries may contain sensitive information about infrastructure, security logic, and detection patterns that should be protected with customer-managed encryption.
        - CMK for queries ensures that organizations maintain control over the encryption keys protecting their monitoring and alerting logic.
        - This is required in environments where all data at rest must be encrypted with customer-managed keys.

        **Risk mitigation**

        - **Query confidentiality:** Saved queries and alert rules are encrypted with keys the organization controls.
        - **Key lifecycle control:** Organizations manage rotation and revocation of query encryption keys.
        - **Compliance:** Satisfies requirements for customer-managed encryption of all data at rest.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Log Analytics workspaces** in the Azure Portal.
        2. Select a workspace.
        3. Go to **Properties** under **Settings**.
        4. Verify that **CMK for queries** is enabled.
      remediation:
        - id: portal
          desc: |
            To enforce CMK for queries using the Azure Portal:

            1. Navigate to **Log Analytics workspaces** in the Azure Portal.
            2. Select the workspace.
            3. Go to **Properties** under **Settings**.
            4. Enable **Customer-managed key for queries**.
            5. Link a dedicated cluster with CMK configured.
        - id: cli
          desc: |
            Enforcing CMK for queries requires the workspace to be linked to a dedicated Log Analytics cluster with CMK configured. There is no dedicated CLI flag for `forceCmkForQuery`; patch the workspace property directly:

            ```bash
            az resource update \
              --resource-type Microsoft.OperationalInsights/workspaces \
              --name <WorkspaceName> \
              --resource-group <ResourceGroupName> \
              --set properties.features.forceCmkForQuery=true
            ```

            Ensure the workspace is linked to a dedicated cluster that has CMK enabled before running this command.
        - id: terraform
          desc: |
            To enforce CMK for queries in Terraform:

            ```hcl
            resource "azurerm_log_analytics_workspace" "example" {
              name                 = "example-workspace"
              location             = azurerm_resource_group.example.location
              resource_group_name  = azurerm_resource_group.example.name
              sku                  = "PerGB2018"
              cmk_for_query_forced = true
            }
            ```
        - id: bicep
          desc: |
            To enforce CMK for queries in Bicep:

            ```bicep
            resource workspace 'Microsoft.OperationalInsights/workspaces@2023-09-01' = {
              name: 'example-workspace'
              location: resourceGroup().location
              properties: {
                sku: {
                  name: 'PerGB2018'
                }
                forceCmkForQuery: true
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/azure-monitor/logs/customer-managed-keys
        title: Azure Monitor customer-managed key
