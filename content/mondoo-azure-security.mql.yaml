    mql: |
      terraform.state.resources.where(type == "azurerm_storage_encryption_scope").all(
        values['source'] == "Microsoft.KeyVault"
      )
  - uid: mondoo-azure-security-storage-encryption-scope-infra-encryption
    title: Ensure storage encryption scopes require infra encryption
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-azure-security-storage-encryption-scope-infra-encryption-azure
        tags:
          mondoo.com/filter-title: Azure Storage Account
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-storage-encryption-scope-infra-encryption-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-storage-encryption-scope-infra-encryption-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-storage-encryption-scope-infra-encryption-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure Storage encryption scopes have infrastructure encryption enabled. Infrastructure encryption adds a second layer of encryption at the storage infrastructure level using a different algorithm, providing double encryption for defense in depth.

        **Why this matters**

        - Single-layer encryption relies on one algorithm and key hierarchy. If a vulnerability is discovered in that algorithm, data could be at risk.
        - Infrastructure encryption uses a separate encryption algorithm and key at the infrastructure level, ensuring data remains protected even if one layer is compromised.
        - This is required by some compliance standards for highly sensitive data classifications.

        **Risk mitigation**

        - **Double encryption:** Two independent encryption layers protect data at rest.
        - **Algorithm diversity:** Different algorithms at each layer reduce the risk of a single cryptographic vulnerability exposing data.
        - **Compliance:** Satisfies requirements for defense-in-depth encryption controls.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Storage accounts** in the Azure Portal.
        2. Select a storage account.
        3. Go to **Encryption scopes** under **Security + networking**.
        4. Verify that **Infrastructure encryption** is enabled for each scope.
      remediation:
        - id: portal
          desc: |
            Infrastructure encryption must be enabled at encryption scope creation time and cannot be changed after creation.

            1. Navigate to **Storage accounts** in the Azure Portal.
            2. Select the storage account.
            3. Go to **Encryption scopes** under **Security + networking**.
            4. Select **Add** to create a new encryption scope.
            5. Enable **Infrastructure encryption**.
        - id: cli
          desc: |
            Infrastructure encryption can only be set when the encryption scope is created, and it is not configurable on an existing scope. Create a new scope with infrastructure encryption required:

            ```bash
            az storage account encryption-scope create \
              --account-name <StorageAccountName> \
              --resource-group <ResourceGroupName> \
              --name <EncryptionScopeName> \
              --key-source Microsoft.Storage \
              --require-infrastructure-encryption true
            ```
        - id: terraform
          desc: |
            Infrastructure encryption must be enabled at encryption scope creation time:

            ```hcl
            resource "azurerm_storage_encryption_scope" "example" {
              name                               = "example-scope"
              storage_account_id                 = azurerm_storage_account.example.id
              source                             = "Microsoft.KeyVault"
              key_vault_key_id                   = azurerm_key_vault_key.example.id
              infrastructure_encryption_required = true
            }
            ```
        - id: bicep
          desc: |
            Infrastructure encryption must be enabled at encryption scope creation time:

            ```bicep
            resource encryptionScope 'Microsoft.Storage/storageAccounts/encryptionScopes@2023-01-01' = {
              parent: storageAccount
              name: 'example-scope'
              properties: {
                source: 'Microsoft.KeyVault'
                keyVaultProperties: {
                  keyUri: keyVaultKey.properties.keyUriWithVersion
                }
                requireInfrastructureEncryption: true
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/storage/common/infrastructure-encryption-enable
        title: Enable infrastructure encryption for double encryption
  - uid: mondoo-azure-security-storage-encryption-scope-infra-encryption-azure
    filters: |
      asset.platform == "azure-storage-account"
    mql: |
      azure.subscription.storage.account.encryptionScopes.where(state == "Enabled").all(
        requireInfrastructureEncryption == true
      )
  - uid: mondoo-azure-security-storage-encryption-scope-infra-encryption-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "azurerm_storage_encryption_scope")
    mql: |
      terraform.resources.where(nameLabel == "azurerm_storage_encryption_scope").all(
        arguments['infrastructure_encryption_required'] == true
      )
  - uid: mondoo-azure-security-storage-encryption-scope-infra-encryption-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "azurerm_storage_encryption_scope")
    mql: |
      terraform.plan.resourceChanges.where(type == "azurerm_storage_encryption_scope").all(
        change.after['infrastructure_encryption_required'] == true
      )
  - uid: mondoo-azure-security-storage-encryption-scope-infra-encryption-terraform-state
