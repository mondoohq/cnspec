  - uid: mondoo-azure-security-activity-log-retention-365-days
    title: Ensure activity log retention is at least 365 days
    impact: 60
    variants:
      - uid: mondoo-azure-security-activity-log-retention-365-days-azure
        tags:
          mondoo.com/filter-title: Azure Subscription
          mondoo.com/icon: azure
      - uid: mondoo-azure-security-activity-log-retention-365-days-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/icon: terraform
      - uid: mondoo-azure-security-activity-log-retention-365-days-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/icon: terraform
      - uid: mondoo-azure-security-activity-log-retention-365-days-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/icon: terraform
    docs:
      desc: |
        This check ensures that Azure Monitor log profiles retain activity logs for at least 365 days. Activity logs record control plane operations across the subscription and are critical for long-term security investigations and compliance audits.

        **Why this matters**

        - **Long-term investigations:** Advanced threats may remain undetected for months. A full year of activity logs ensures sufficient history for investigation.
        - **Compliance:** ISO 27001, SOC 2, and PCI DSS require at least 12 months of audit log retention.
        - **Forensics:** Shorter retention periods result in permanent loss of operational audit data.

        A retention of `0` days means unlimited retention, which satisfies this check.
      remediation:
        - id: cli
          desc: |
            **Using Azure CLI**

            Configure log profile retention:

            ```bash
            az monitor log-profiles update \
              --name default \
              --set retentionPolicy.enabled=true retentionPolicy.days=365
            ```
        - id: bicep
          desc: |
            **Using Bicep**

            ```bicep
            resource logProfile 'Microsoft.Insights/logprofiles@2016-03-01' = {
              name: 'default'
              location: ''
              properties: {
                storageAccountId: storageAccount.id
                categories: [
                  'Write'
                  'Delete'
                  'Action'
                ]
                locations: [
                  'global'
                ]
                retentionPolicy: {
                  enabled: true
                  days: 365
                }
              }
            }
            ```
        - id: terraform
          desc: |
            **Using Terraform**

            ```hcl
            resource "azurerm_monitor_log_profile" "example" {
              name = "default"

              categories = ["Write", "Delete", "Action"]
              locations  = ["global"]

              storage_account_id = azurerm_storage_account.example.id

              retention_policy {
                enabled = true
                days    = 365
              }
            }
            ```
        - id: portal
          desc: |
            **Using Azure Portal**

            1. Navigate to **Monitor** > **Activity log**.
            2. Select **Export Activity Logs**.
            3. Configure a diagnostic setting with a storage account destination.
            4. Set the retention period to at least 365 days.
            5. Select **Save**.
    refs:
      - url: https://learn.microsoft.com/en-us/azure/azure-monitor/essentials/activity-log
        title: Azure Documentation - Azure Activity log
  - uid: mondoo-azure-security-activity-log-retention-365-days-azure
    filters: |
      asset.platform == "azure"
    mql: |
      azure.subscription.monitor.logProfiles.all(
        properties['retentionPolicy']['enabled'] == true
      )
      azure.subscription.monitor.logProfiles.all(
        properties['retentionPolicy']['days'] >= 365
      )
  - uid: mondoo-azure-security-activity-log-retention-365-days-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "azurerm_monitor_log_profile")
    mql: |
      terraform.resources.where(nameLabel == "azurerm_monitor_log_profile").all(
        blocks.where(type == "retention_policy") != empty &&
        blocks.where(type == "retention_policy").all(arguments['enabled'] == true && arguments['days'] >= 365)
      )
  - uid: mondoo-azure-security-activity-log-retention-365-days-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "azurerm_monitor_log_profile")
    mql: |
      terraform.plan.resourceChanges.where(type == "azurerm_monitor_log_profile").all(
        change.after['retention_policy'] != empty &&
        change.after['retention_policy'][0]['enabled'] == true &&
        change.after['retention_policy'][0]['days'] >= 365
      )
  - uid: mondoo-azure-security-activity-log-retention-365-days-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "azurerm_monitor_log_profile")
    mql: |
      terraform.state.resources.where(type == "azurerm_monitor_log_profile").all(
        values['retention_policy'] != empty &&
        values['retention_policy'][0]['enabled'] == true &&
        values['retention_policy'][0]['days'] >= 365
      )
  - uid: mondoo-azure-security-log-profile-all-locations
    title: Ensure activity logs capture events from all locations
    impact: 50
    variants:
      - uid: mondoo-azure-security-log-profile-all-locations-azure
        tags:
          mondoo.com/filter-title: Azure Subscription
          mondoo.com/icon: azure
      - uid: mondoo-azure-security-log-profile-all-locations-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/icon: terraform
      - uid: mondoo-azure-security-log-profile-all-locations-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/icon: terraform
      - uid: mondoo-azure-security-log-profile-all-locations-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/icon: terraform
    docs:
      desc: |
        This check ensures that Azure Monitor log profiles capture activity log events from all Azure locations, including the special `global` category. Without capturing all locations, activity logs may miss events from certain regions.

        **Why this matters**

        - **Blind spots:** Excluding locations means operations in those regions are not captured in the activity log.
        - **Global events:** The `global` location captures subscription-level events that are not region-specific (policy changes, role assignments, etc.).
      remediation:
        - id: cli
          desc: |
            **Using Azure CLI**

            ```bash
            az monitor log-profiles update \
              --name default \
              --locations global westus eastus centralus
            ```
        - id: bicep
          desc: |
            **Using Bicep**

            ```bicep
            resource logProfile 'Microsoft.Insights/logprofiles@2016-03-01' = {
              name: 'default'
              location: ''
              properties: {
                storageAccountId: storageAccount.id
                locations: [
                  'global'
                  'westus'
                  'eastus'
                  'centralus'
                  // Include all regions where resources are deployed
                ]
                retentionPolicy: {
                  enabled: true
                  days: 365
                }
              }
            }
            ```
        - id: terraform
          desc: |
            **Using Terraform**

            ```hcl
            resource "azurerm_monitor_log_profile" "example" {
              name = "default"

              categories = ["Write", "Delete", "Action"]

              locations = [
                "global",
                "westus",
                "eastus",
                "centralus",
                # Include all regions where resources are deployed
              ]

              storage_account_id = azurerm_storage_account.example.id

              retention_policy {
                enabled = true
                days    = 365
              }
            }
            ```
        - id: portal
          desc: |
            **Using Azure Portal**

            1. Navigate to **Monitor** > **Activity log**.
            2. Select **Export Activity Logs**.
            3. Ensure the diagnostic setting includes all regions, including **global**.
            4. Select **Save**.
    refs:
      - url: https://learn.microsoft.com/en-us/azure/azure-monitor/essentials/activity-log
        title: Azure Documentation - Azure Activity log
  - uid: mondoo-azure-security-log-profile-all-locations-azure
    filters: |
      asset.platform == "azure"
    mql: |
      azure.subscription.monitor.logProfiles.all(
        properties['locations'].contains("global")
      )
  - uid: mondoo-azure-security-log-profile-all-locations-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "azurerm_monitor_log_profile")
    mql: |
      terraform.resources.where(nameLabel == "azurerm_monitor_log_profile").all(
        arguments['locations'] != empty &&
        arguments['locations'].contains("global")
      )
  - uid: mondoo-azure-security-log-profile-all-locations-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "azurerm_monitor_log_profile")
    mql: |
      terraform.plan.resourceChanges.where(type == "azurerm_monitor_log_profile").all(
        change.after['locations'] != empty &&
        change.after['locations'].contains("global")
      )
  - uid: mondoo-azure-security-log-profile-all-locations-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "azurerm_monitor_log_profile")
    mql: |
      terraform.state.resources.where(type == "azurerm_monitor_log_profile").all(
        values['locations'] != empty &&
        values['locations'].contains("global")
      )
