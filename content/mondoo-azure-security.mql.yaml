  - uid: mondoo-azure-security-nsg-no-unrestricted-egress
    title: Ensure NSG rules do not allow unrestricted egress
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-2
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-azure-security-nsg-no-unrestricted-egress-azure
        tags:
          mondoo.com/filter-title: Azure Network Security Group
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-nsg-no-unrestricted-egress-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-nsg-no-unrestricted-egress-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-nsg-no-unrestricted-egress-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that network security group rules do not allow unrestricted outbound traffic to the internet on all ports and protocols. Unrestricted egress rules allow compromised resources to exfiltrate data, establish command-and-control channels, or participate in attacks against external targets without network-level controls.

        **Why this matters**

        - **Data exfiltration:** Compromised VMs can freely send data to any destination on any port.
        - **C2 communication:** Malware can reach attacker infrastructure without network restrictions.
        - **Lateral movement:** Unrestricted egress facilitates pivoting to external targets.

        **Risk mitigation**

        - Replace broad allow-all outbound rules with specific rules that permit only required destination addresses and ports.
        - Add a deny-all outbound rule at a low priority and layer explicit allow rules above it for approved traffic.
        - Use Azure Firewall or a network virtual appliance for centralized egress filtering and logging.
      audit: |
        ### Audit via Portal

        1. Navigate to **Network security groups** in the Azure Portal.
        2. Select the NSG.
        3. Under **Outbound security rules**, review the list of rules.
        4. Identify any rules with **Action** set to **Allow**, **Destination** set to `*` or `Internet`, and **Destination port ranges** set to `*`.

        A passing resource has no outbound Allow rules with both destination address `*` or `Internet` and destination port `*`. A failing resource has at least one such unrestricted outbound allow rule.

        ### Audit via CLI

        1. Run the following command, substituting your resource group and NSG name:

        ```bash
        az network nsg rule list \
          --resource-group <ResourceGroupName> \
          --nsg-name <NsgName> \
          --query "[?direction=='Outbound' && access=='Allow' && destinationAddressPrefix=='*' && destinationPortRange=='*']" \
          -o table
        ```

        A passing resource returns an empty list. A failing resource returns one or more matching rules.
      remediation:
        - id: portal
          desc: |
            To ensure NSG rules do not allow unrestricted egress using the Azure Portal:

            1. Navigate to **Network security groups**.
            2. Select the NSG.
            3. Under **Outbound security rules**, identify rules with destination `*` or `Internet` and port range `*`.
            4. Edit or delete the rule to restrict to specific destinations and ports.
        - id: cli
          desc: |
            To ensure NSG rules do not allow unrestricted egress using the Azure CLI, list outbound rules that allow unrestricted egress:

            ```bash
            az network nsg rule list --resource-group <ResourceGroupName> --nsg-name <NsgName> --query "[?direction=='Outbound' && access=='Allow' && destinationAddressPrefix=='*' && destinationPortRange=='*']"
            ```

            Delete or update the offending rule:

            ```bash
            az network nsg rule delete --resource-group <ResourceGroupName> --nsg-name <NsgName> --name <RuleName>
            ```

            Or restrict it to specific destinations and ports:

            ```bash
            az network nsg rule update --resource-group <ResourceGroupName> --nsg-name <NsgName> --name <RuleName> --destination-port-ranges 443 --destination-address-prefixes Internet
            ```
        - id: bicep
          desc: |
            To ensure NSG rules do not allow unrestricted egress in Bicep:

            ```bicep
            resource nsg 'Microsoft.Network/networkSecurityGroups@2023-05-01' = {
              name: 'example-nsg'
              location: resourceGroup().location
              properties: {
                securityRules: [
                  {
                    name: 'DenyAllOutbound'
                    properties: {
                      priority: 4096
                      direction: 'Outbound'
                      access: 'Deny'
                      protocol: '*'
                      sourcePortRange: '*'
                      destinationPortRange: '*'
                      sourceAddressPrefix: '*'
                      destinationAddressPrefix: '*'
                    }
                  }
                  {
                    name: 'AllowHttpsOutbound'
                    properties: {
                      priority: 100
                      direction: 'Outbound'
                      access: 'Allow'
                      protocol: 'Tcp'
                      sourcePortRange: '*'
                      destinationPortRange: '443'
                      sourceAddressPrefix: '*'
                      destinationAddressPrefix: 'Internet'
                    }
                  }
                ]
              }
            }
            ```
        - id: terraform
          desc: |
            To ensure NSG rules do not allow unrestricted egress in Terraform:

            ```hcl
            resource "azurerm_network_security_rule" "deny_all_outbound" {
              name                        = "DenyAllOutbound"
              priority                    = 4096
              direction                   = "Outbound"
              access                      = "Deny"
              protocol                    = "*"
              source_port_range           = "*"
              destination_port_range      = "*"
              source_address_prefix       = "*"
              destination_address_prefix  = "*"
              resource_group_name         = azurerm_resource_group.example.name
              network_security_group_name = azurerm_network_security_group.example.name
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/virtual-network/network-security-groups-overview
        title: Azure Documentation - Network security groups
  - uid: mondoo-azure-security-nsg-no-unrestricted-egress-azure
    filters: |
      asset.platform == "azure-network-security-group"
    mql: |
      azure.subscription.network.securityGroup.securityRules
        .where(
          properties.access == 'Allow'
            && direction == 'Outbound'
            && properties.protocol == /\*/i
            && properties.destinationAddressPrefix == /\*|0\.0\.0\.0|internet|any/i
            && properties.destinationPortRange == "*"
        ).length == 0
  - uid: mondoo-azure-security-nsg-no-unrestricted-egress-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "azurerm_network_security_rule")
    mql: |
      terraform.resources.where(nameLabel == "azurerm_network_security_rule").none(
        arguments['direction'] == "Outbound" &&
        arguments['access'] == "Allow" &&
        arguments['protocol'] == "*" &&
        arguments['destination_address_prefix'] == "*" &&
        arguments['destination_port_range'] == "*"
      )
  - uid: mondoo-azure-security-nsg-no-unrestricted-egress-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "azurerm_network_security_rule")
    mql: |
      terraform.plan.resourceChanges.where(type == "azurerm_network_security_rule").none(
        change.after['direction'] == "Outbound" &&
        change.after['access'] == "Allow" &&
        change.after['protocol'] == "*" &&
        change.after['destination_address_prefix'] == "*" &&
        change.after['destination_port_range'] == "*"
      )
  - uid: mondoo-azure-security-nsg-no-unrestricted-egress-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "azurerm_network_security_rule")
    mql: |
      terraform.state.resources.where(type == "azurerm_network_security_rule").none(
        values['direction'] == "Outbound" &&
        values['access'] == "Allow" &&
        values['protocol'] == "*" &&
        values['destination_address_prefix'] == "*" &&
        values['destination_port_range'] == "*"
      )
  - uid: mondoo-azure-security-network-interface-ip-forwarding-disabled
    title: Ensure network interface IP forwarding is disabled
    impact: 50
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-azure-security-network-interface-ip-forwarding-disabled-azure
        tags:
          mondoo.com/filter-title: Azure Subscription
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-network-interface-ip-forwarding-disabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-network-interface-ip-forwarding-disabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-network-interface-ip-forwarding-disabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure network interfaces do not have IP forwarding enabled unless explicitly required. IP forwarding allows a network interface to send and receive traffic not destined for its own IP address, which is typically only needed for network virtual appliances (firewalls, load balancers).

        **Why this matters**

        - **Man-in-the-middle risk:** IP forwarding enables a VM to intercept and forward traffic between other VMs, facilitating eavesdropping.
        - **Routing abuse:** A compromised VM with IP forwarding can redirect traffic to attacker-controlled destinations.
        - **Least privilege:** IP forwarding should only be enabled on dedicated network virtual appliances, not general-purpose VMs.

        **Risk mitigation**

        - Disable IP forwarding on all network interfaces that do not require it.
        - Audit network interfaces periodically to ensure only authorized interfaces have IP forwarding enabled.
        - Use network security groups alongside IP forwarding-enabled interfaces to restrict traffic flow.

        **Note:** This check may produce expected findings for network virtual appliances (NVAs) such as firewalls, load balancers, or WAN optimizers that legitimately require IP forwarding. Review findings in the context of your network architecture.
      audit: |
        ### Audit via Portal

        1. Navigate to **Network interfaces** in the Azure Portal.
        2. Select the network interface.
        3. Under **Settings**, select **IP configurations**.
        4. Review the **IP forwarding** setting at the top of the page.

        A passing resource shows **IP forwarding** set to **Disabled**. A failing resource shows **IP forwarding** set to **Enabled**.

        ### Audit via CLI

        1. Run the following command, substituting your resource group and NIC name:

        ```bash
        az network nic show \
          --resource-group <ResourceGroupName> \
          --name <NicName> \
          --query "enableIPForwarding" -o tsv
        ```

        A passing resource returns `false`. A failing resource returns `true`.
      remediation:
        - id: portal
          desc: |
            To ensure network interface IP forwarding is disabled using the Azure Portal:

            1. Navigate to **Network interfaces**.
            2. Select the interface.
            3. Under **Settings** > **IP configurations**, disable **IP forwarding**.
        - id: cli
          desc: |
            To ensure network interface IP forwarding is disabled using the Azure CLI:

            ```bash
            az network nic update --name <nic-name> --resource-group <rg> --ip-forwarding false
            ```
        - id: bicep
          desc: |
            To ensure network interface IP forwarding is disabled in Bicep:

            ```bicep
            resource nic 'Microsoft.Network/networkInterfaces@2023-05-01' = {
              name: 'example-nic'
              location: resourceGroup().location
              properties: {
                enableIPForwarding: false
                ipConfigurations: [
                  {
                    name: 'ipconfig1'
                    properties: {
                      subnet: {
                        id: subnet.id
                      }
                    }
                  }
                ]
              }
            }
            ```
        - id: terraform
          desc: |
            To ensure network interface IP forwarding is disabled in Terraform:

            ```hcl
            resource "azurerm_network_interface" "example" {
              name                = "example-nic"
              location            = azurerm_resource_group.example.location
              resource_group_name = azurerm_resource_group.example.name

              enable_ip_forwarding = false

              ip_configuration {
                name                          = "internal"
                subnet_id                     = azurerm_subnet.example.id
                private_ip_address_allocation = "Dynamic"
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/virtual-network/virtual-network-network-interface
        title: Azure Documentation - Azure network interface settings
  - uid: mondoo-azure-security-network-interface-ip-forwarding-disabled-azure
