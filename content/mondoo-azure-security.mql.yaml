        change.after['customer_managed_key'] != empty
      )
  - uid: mondoo-azure-security-mysql-flexible-cmk-encryption-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "azurerm_mysql_flexible_server")
    mql: |
