    docs:
      desc: |
        This check ensures that the `log_checkpoints` server parameter is set to `ON` for Azure Database for PostgreSQL. Checkpoint logging records when checkpoints occur, which is essential for performance tuning and understanding I/O behavior.

        **Why this matters**

        - **Performance diagnostics:** Checkpoint frequency directly impacts database I/O performance. Without logging, checkpoint-related issues are invisible.
        - **Anomaly detection:** Unusual checkpoint patterns can indicate unexpected write activity, which may signal data manipulation or denial-of-service.
        - **Compliance:** CIS Azure Foundations Benchmark requires checkpoint logging.
      remediation:
        - id: cli
          desc: |
            **Using Azure CLI**

            ```bash
            az postgres flexible-server parameter set \
              --resource-group <rg> --server-name <server> \
              --name log_checkpoints --value on
            ```
        - id: bicep
          desc: |
            **Using Bicep**

            ```bicep
            resource logCheckpointsConfig 'Microsoft.DBforPostgreSQL/flexibleServers/configurations@2022-12-01' = {
              parent: postgresServer
              name: 'log_checkpoints'
              properties: {
                value: 'on'
                source: 'user-override'
              }
            }
            ```
        - id: terraform
          desc: |
            **Using Terraform**

            ```hcl
            resource "azurerm_postgresql_flexible_server_configuration" "log_checkpoints" {
              name      = "log_checkpoints"
              server_id = azurerm_postgresql_flexible_server.example.id
              value     = "on"
            }
            ```
        - id: portal
          desc: |
            **Using Azure Portal**

            1. Navigate to **Azure Database for PostgreSQL flexible servers**.
            2. Select the server instance.
            3. Go to **Server parameters** under **Settings**.
            4. Search for `log_checkpoints`.
            5. Set the value to **ON**.
            6. Select **Save**.
    refs:
