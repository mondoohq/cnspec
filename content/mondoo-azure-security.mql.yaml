      - uid: mondoo-azure-security-compute-disk-access-private-endpoints-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure disk access resources have at least one private endpoint connection configured. Disk access resources enable private endpoint connectivity for managed disk import/export operations, ensuring that disk data transfers do not traverse the public internet.

        **Why this matters**

        - Without private endpoints on disk access resources, disk export and import operations use public endpoints, exposing disk data to the internet during transfer.
        - Private endpoints ensure that managed disk data transfers stay within the Azure backbone network.
        - This is critical for disks containing sensitive data that must not be exposed during export or import operations.

        **Risk mitigation**

        - **Data protection during transfer:** Disk export/import stays within private network paths.
        - **Reduced attack surface:** Eliminates public internet exposure for disk data operations.
        - **Compliance:** Satisfies data-in-transit security requirements for managed disk operations.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Disk Accesses** in the Azure Portal.
        2. Select a disk access resource.
        3. Go to **Networking**.
        4. Verify that at least one private endpoint connection is configured.

        **Automated Audit with Azure CLI:**

        ```bash
        az disk-access list --query "[].{Name:name, PrivateEndpoints:privateEndpointConnections}" -o table
        ```
      remediation:
        - id: portal
          desc: |
            To configure private endpoints for disk access resources using the Azure Portal:

            1. Navigate to **Disk Accesses** in the Azure Portal.
            2. Select the disk access resource.
            3. Go to **Networking**.
            4. Select **+ Private endpoint** and configure the virtual network, subnet, and DNS settings.
            5. Select **Review + create**, then **Create**.
        - id: cli
          desc: |
            Create a disk access resource and attach a private endpoint that targets it using the Azure CLI:

            ```bash
            az disk-access create \
              --name <DiskAccessName> \
              --resource-group <ResourceGroupName> \
              --location <Location>

            az disk-access show \
              --name <DiskAccessName> \
              --resource-group <ResourceGroupName> \
              --query id \
              --output tsv

            az network private-endpoint create \
              --name <PrivateEndpointName> \
              --resource-group <ResourceGroupName> \
              --vnet-name <VNetName> \
              --subnet <SubnetName> \
              --private-connection-resource-id <DiskAccessResourceId> \
              --group-id disks \
              --connection-name <ConnectionName>
            ```
        - id: terraform
          desc: |
            To configure private endpoints for disk access in Terraform:

            ```hcl
            resource "azurerm_disk_access" "example" {
              name                = "example-disk-access"
              resource_group_name = azurerm_resource_group.example.name
              location            = azurerm_resource_group.example.location
            }

            resource "azurerm_private_endpoint" "disk_access" {
              name                = "example-disk-access-pe"
              location            = azurerm_resource_group.example.location
              resource_group_name = azurerm_resource_group.example.name
              subnet_id           = azurerm_subnet.example.id

              private_service_connection {
                name                           = "disk-access-psc"
                private_connection_resource_id = azurerm_disk_access.example.id
                subresource_names              = ["disks"]
                is_manual_connection           = false
              }
            }
            ```
        - id: bicep
          desc: |
            To configure private endpoints for disk access in Bicep:

            ```bicep
            resource diskAccess 'Microsoft.Compute/diskAccesses@2023-10-02' = {
              name: 'example-disk-access'
              location: resourceGroup().location
            }

            resource privateEndpoint 'Microsoft.Network/privateEndpoints@2024-05-01' = {
              name: 'example-disk-access-pe'
              location: resourceGroup().location
              properties: {
                subnet: {
                  id: subnet.id
                }
                privateLinkServiceConnections: [
                  {
                    name: 'disk-access-psc'
                    properties: {
                      privateLinkServiceId: diskAccess.id
                      groupIds: [
                        'disks'
                      ]
                    }
                  }
                ]
              }
            }
            ```
