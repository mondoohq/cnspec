  - uid: mondoo-azure-security-batch-encryption-configured
    title: Ensure Azure Batch accounts use customer-managed encryption keys
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-azure-security-batch-encryption-configured-azure
        tags:
          mondoo.com/filter-title: Azure Batch Account
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-batch-encryption-configured-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-batch-encryption-configured-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-batch-encryption-configured-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure Batch accounts are configured to use customer-managed encryption keys (CMK) sourced from Azure Key Vault. By default, Batch accounts use Microsoft-managed platform keys, which do not give customers control over key lifecycle, rotation, or revocation.

        **Why this matters**

        - **Key lifecycle control:** Customer-managed keys allow organizations to set key rotation schedules, revoke access immediately when needed, and audit every key use through Key Vault logs.
        - **Data sovereignty:** Encryption keys stored in a customer-owned Key Vault remain under the customer's control, satisfying data residency and sovereignty requirements that platform-managed keys cannot meet.
        - **Breach containment:** Revoking the CMK immediately renders Batch account data inaccessible, providing a fast-response mechanism if the account is compromised.
        - **Centralized key governance:** Key Vault integration provides access policies, RBAC, and audit logging for all encryption key operations, supporting separation of duties between key administrators and data owners.

        **Risk mitigation**

        - **Enable key revocation:** Using CMK means a compromised Batch account can be locked out of its own data by revoking Key Vault access, limiting attacker dwell time.
        - **Enforce separation of duties:** Storing keys in a dedicated Key Vault with its own access policies ensures that Batch account administrators cannot access encryption keys without separate authorization.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Batch accounts** in the Azure Portal.
        2. Select a Batch account.
        3. Go to **Encryption** under **Settings**.
        4. Verify that encryption is configured and review the key source (Microsoft-managed or Customer-managed).

        **Automated Audit with Azure CLI:**

        ```bash
        az batch account list --query "[].{Name:name, ResourceGroup:resourceGroup, Encryption:encryption}" -o table
        ```

        **Automated Audit with PowerShell:**

        ```powershell
        Get-AzBatchAccount | Select-Object AccountName, ResourceGroupName, Encryption
        ```
      remediation:
        - id: portal
          desc: |
            To ensure Azure Batch accounts use customer-managed encryption keys using the Azure Portal:

            1. Navigate to **Batch accounts** in the Azure Portal.
            2. Select the Batch account.
            3. Go to **Encryption** under **Settings**.
            4. Select **Customer-managed keys** as the encryption key source.
            5. Select the Key Vault and key to use for encryption.
            6. Select **Save**.
        - id: cli
          desc: |
            To ensure Azure Batch accounts use customer-managed encryption keys using the Azure CLI:

            ```bash
            az resource update --ids $(az batch account show --name <BatchAccountName> --resource-group <ResourceGroupName> --query id -o tsv) --set properties.encryption.keySource=Microsoft.KeyVault properties.encryption.keyVaultProperties.keyIdentifier=<KeyVaultKeyId>
            ```
        - id: powershell
          desc: |
            To ensure Azure Batch accounts use customer-managed encryption keys using PowerShell:

            ```powershell
            Set-AzBatchAccount -AccountName <BatchAccountName> -ResourceGroupName <ResourceGroupName> -EncryptionKeySource "Microsoft.KeyVault" -EncryptionKeyIdentifier <KeyVaultKeyId>
            ```
        - id: terraform
          desc: |
            To ensure Azure Batch accounts use customer-managed encryption keys in Terraform:

            ```hcl
            resource "azurerm_batch_account" "example" {
              name                = "examplebatch"
              location            = azurerm_resource_group.example.location
              resource_group_name = azurerm_resource_group.example.name

              encryption {
                key_vault_key_id = azurerm_key_vault_key.example.id
              }
            }
            ```
        - id: bicep
          desc: |
            To ensure Azure Batch accounts use customer-managed encryption keys in Bicep:

            ```bicep
            resource batchAccount 'Microsoft.Batch/batchAccounts@2024-07-01' = {
              name: 'examplebatch'
              location: resourceGroup().location
              identity: {
                type: 'UserAssigned'
                userAssignedIdentities: {
                  '${userAssignedIdentity.id}': {}
                }
              }
              properties: {
                encryption: {
                  keySource: 'Microsoft.KeyVault'
                  keyVaultProperties: {
                    keyIdentifier: 'https://example-kv.vault.azure.net/keys/example-key/version'
                  }
                }
                // ...
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/batch/batch-customer-managed-key
        title: Configure customer-managed keys for Azure Batch
  - uid: mondoo-azure-security-batch-encryption-configured-azure
    filters: |
      asset.platform == "azure-batch-account"
    mql: |
      azure.subscription.batchService.account.encryption["keySource"] == "Microsoft.KeyVault"
  - uid: mondoo-azure-security-batch-encryption-configured-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "azurerm_batch_account")
    mql: |
      terraform.resources.where(nameLabel == "azurerm_batch_account").all(
        blocks.one(type == "encryption")
      )
  - uid: mondoo-azure-security-batch-encryption-configured-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "azurerm_batch_account")
    mql: |
      terraform.plan.resourceChanges.where(type == "azurerm_batch_account").all(
        change.after.encryption != null &&
        change.after.encryption.any(_['key_vault_key_id'] != null && _['key_vault_key_id'] != "")
