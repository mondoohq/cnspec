  - uid: mondoo-azure-security-app-service-client-cert-enabled
    title: Ensure client certificate auth is enabled for App Service web apps
    impact: 60
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-j
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-3
      compliance/soc2-2017: soc2-control-cc6-1-4
    variants:
      - uid: mondoo-azure-security-app-service-client-cert-enabled-azure
        tags:
          mondoo.com/filter-title: Azure App Service
          mondoo.com/icon: azure
      - uid: mondoo-azure-security-app-service-client-cert-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/icon: terraform
      - uid: mondoo-azure-security-app-service-client-cert-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/icon: terraform
      - uid: mondoo-azure-security-app-service-client-cert-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/icon: terraform
    docs:
      desc: |
        This check ensures that client certificate authentication (mutual TLS) is enabled for Azure App Service web applications, requiring clients to present a valid certificate to establish a connection.

        **Why this matters**

        Enabling client certificate authentication provides several critical benefits:

        - **Mutual authentication**: Client certificates ensure both the client and server verify each other's identity, providing stronger authentication than username/password or token-based methods alone.
        - **Reduced attack surface**: By requiring a valid client certificate, unauthorized clients are blocked at the TLS handshake level before reaching the application layer.
        - **Phishing resistance**: Client certificates cannot be phished like passwords or tokens, as they are bound to the client device's certificate store.
        - **Compliance alignment**: Many regulatory standards and security frameworks require mutual TLS for sensitive applications handling financial, healthcare, or government data.

        By enabling client certificate authentication, organizations add a strong layer of identity verification that complements other authentication mechanisms.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **App Services** in the Azure Portal.
        2. Select a web app.
        3. Go to **Configuration** > **General settings**.
        4. Verify that **Client certificate mode** is set to **Require**.

        **Automated Audit with Azure CLI:**

        ```bash
        az webapp list --query "[].{Name:name, ResourceGroup:resourceGroup, ClientCertEnabled:clientCertEnabled}" -o table
        ```

        **Automated Audit with PowerShell:**

        ```powershell
        Get-AzWebApp | Select-Object Name, ResourceGroup, ClientCertEnabled
        ```
      remediation:
        - id: portal
          desc: |
            **Using Azure Portal**

            1. Navigate to **App Services** in the Azure Portal.
            2. Select the web app.
            3. Go to **Configuration** > **General settings**.
            4. Set **Client certificate mode** to **Require**.
            5. Select **Save**.
        - id: cli
          desc: |
            **Using Azure CLI**

            ```bash
            az webapp update --resource-group <ResourceGroupName> --name <WebAppName> --set clientCertEnabled=true
            ```
        - id: powershell
          desc: |
            **Using PowerShell**

            ```powershell
            Set-AzWebApp -ResourceGroupName <ResourceGroupName> -Name <WebAppName> -ClientCertEnabled $true
            ```
        - id: terraform
          desc: |
            **Using Terraform**

            ```hcl
            resource "azurerm_linux_web_app" "example" {
              name                       = "example-webapp"
              resource_group_name        = azurerm_resource_group.example.name
              location                   = azurerm_resource_group.example.location
              service_plan_id            = azurerm_service_plan.example.id
              client_certificate_enabled = true
              client_certificate_mode    = "Required"

              site_config {}
            }
            ```
        - id: bicep
          desc: |
            **Using Bicep**

            ```bicep
            resource webApp 'Microsoft.Web/sites@2024-04-01' = {
              name: 'example-webapp'
              location: resourceGroup().location
              properties: {
                clientCertEnabled: true
                clientCertMode: 'Required'
                serverFarmId: appServicePlan.id
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/app-service/app-service-web-configure-tls-mutual-auth
        title: Configure TLS mutual authentication for Azure App Service
  - uid: mondoo-azure-security-app-service-client-cert-enabled-azure
    filters: |
      asset.platform == "azure-app-service-webapp"
    mql: |
      azure.subscription.webService.appsite.clientCertEnabled == true
  - uid: mondoo-azure-security-app-service-client-cert-enabled-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == /azurerm_(linux|windows)_web_app/)
    mql: |
      terraform.resources.where(nameLabel == /azurerm_(linux|windows)_web_app/).all(
        arguments['client_certificate_enabled'] == true
      )
  - uid: mondoo-azure-security-app-service-client-cert-enabled-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == /azurerm_(linux|windows)_web_app/)
    mql: |
      if (terraform.plan.resourceChanges.where(type == "azurerm_linux_web_app").length > 0) {
        terraform.plan.resourceChanges.where(type == "azurerm_linux_web_app").all(
          change.after['client_certificate_enabled'] == true
        )
      }
      if (terraform.plan.resourceChanges.where(type == "azurerm_windows_web_app").length > 0) {
        terraform.plan.resourceChanges.where(type == "azurerm_windows_web_app").all(
          change.after['client_certificate_enabled'] == true
        )
      }
  - uid: mondoo-azure-security-app-service-client-cert-enabled-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == /azurerm_(linux|windows)_web_app/)
    mql: |
      if (terraform.state.resources.where(type == "azurerm_linux_web_app").length > 0) {
        terraform.state.resources.where(type == "azurerm_linux_web_app").all(
          values['client_certificate_enabled'] == true
        )
      }
      if (terraform.state.resources.where(type == "azurerm_windows_web_app").length > 0) {
        terraform.state.resources.where(type == "azurerm_windows_web_app").all(
          values['client_certificate_enabled'] == true
        )
      }
  - uid: mondoo-azure-security-app-service-remote-debugging-disabled
    title: Ensure remote debugging is disabled for App Service web apps
    impact: 80
