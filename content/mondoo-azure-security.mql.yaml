  - uid: mondoo-azure-security-default-network-access-rule-storage-accounts-deny
    title: Enforce Deny as Default Network Access for Azure Storage Accounts
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-azure-security-default-network-access-rule-storage-accounts-deny-azure
        tags:
          mondoo.com/filter-title: Azure Storage Account
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-default-network-access-rule-storage-accounts-deny-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-default-network-access-rule-storage-accounts-deny-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-default-network-access-rule-storage-accounts-deny-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure storage accounts are configured with a default network action of Deny, so that only explicitly allowlisted networks, IP addresses, or service endpoints can reach the account. By default, Azure storage accounts allow access from all networks, requiring administrators to actively add deny rules rather than allowlist rules.

        **Why this matters**

        - **Default-allow is dangerous**: A storage account open to all networks is directly reachable from any internet host; a single leaked SAS token or storage key then becomes a full data breach.
        - **Explicit allowlisting**: A Deny default forces teams to consciously allowlist the networks that legitimately need access, making unintended exposure immediately visible as a configuration gap rather than the assumed state.
        - **Limits blast radius from credential leaks**: Even if a storage key or SAS token is leaked, a Deny default combined with network rules means the key cannot be used from an unauthorized network location.
        - **Prerequisite for private endpoints**: Enabling private endpoints for storage requires the account to reject public network access; a Deny default is the first step toward a fully private storage architecture.

        **Risk mitigation**

        - **Internet exposure elimination**: Setting the default action to Deny removes the storage account from the reachable internet surface, reducing the attack vectors to only the explicitly allowlisted networks.
        - **Scope containment**: Network rules can restrict access to specific Virtual Network subnets or IP ranges, ensuring that a compromised workload in one subnet cannot reach storage intended for a different tier.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Storage Accounts** in the Azure Portal.
        2. Select a storage account and select the **Networking** blade.
        3. Under the **Firewalls and virtual networks** section, review the **Default action**.
        4. Ensure the Default action is set to **Deny**. This setting should block all access unless explicitly allowed by other network rules.

        **Automated Audit with Azure CLI:**

        Use the Azure CLI to verify the default network access rule for all storage accounts:

        ```bash
        az storage account list --query "[].{AccountName: name, DefaultAction: networkRuleSet.defaultAction}" -o table
        ```

        This command lists each storage account along with the default action. Verify that all entries show "Deny" as the default action.
      remediation:
        - id: portal
          desc: |
            To enforce Deny as Default Network Access for Azure Storage Accounts using the Azure Portal:

            1. Log into the Azure Portal and navigate to **Storage Accounts**.
            2. Select the storage account you wish to configure.
            3. Select the **Networking** blade.
            4. Navigate to the **Firewalls and virtual networks** section.
            5. Set the **Default action** to **Deny**.
            6. Save your changes to enforce that all unrecognized network traffic is blocked by default.
        - id: cli
          desc: |
            To enforce Deny as Default Network Access for Azure Storage Accounts using the Azure CLI, set the default network access rule to "Deny" for a new storage account, use the following Azure CLI command:

            ```bash
            az storage account create --name <StorageAccountName> --resource-group <ResourceGroupName> --location <Location> --default-action Deny
            ```

            This command updates the storage account to deny all traffic by default, significantly enhancing the security posture by limiting access to only configured exceptions.
        - id: powershell
          desc: |
            To enforce Deny as Default Network Access for Azure Storage Accounts using PowerShell, set the default network access rule to "Deny" for a new storage account, use the following PowerShell command:

            ```powershell
            New-AzStorageAccount -ResourceGroupName <ResourceGroupName> -Name <StorageAccountName> -Location <Location> -SkuName Standard_LRS -Kind StorageV2 -DefaultAction Deny
            ```

            This command updates the storage account to deny all traffic by default, significantly enhancing the security posture by limiting access to only configured exceptions.
        - id: terraform
          desc: |
            To enforce Deny as Default Network Access for Azure Storage Accounts in Terraform:

            ```hcl
            # Ensure the `default_action` is set to `Deny`

            resource "azurerm_storage_account_network_rules" "example_storage_account" {
              resource_group_name  = azurerm_resource_group.example.name
              storage_account_name = azure_storage_account.example.name

              default_action       = "Deny"
            }
            ```

            ```hcl
            resource "azurerm_storage_account" "example_storage_account" {
              name                = "examplestorageacct"
              resource_group_name = azurerm_resource_group.example.name
              location            = azurerm_resource_group.example.location

              network_rules {
                default_action = "Deny"
              }

              ...
            }
            ```
        - id: bicep
          desc: |
            To enforce Deny as Default Network Access for Azure Storage Accounts in Bicep:

            ```bicep
            resource storageAccount 'Microsoft.Storage/storageAccounts@2023-05-01' = {
              name: 'examplestorageaccount'
              location: resourceGroup().location
              kind: 'StorageV2'
              sku: {
                name: 'Standard_LRS'
              }
              properties: {
                networkAcls: {
                  defaultAction: 'Deny'
                }
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/storage/common/storage-security-guide
        title: Azure Storage Security Guide
