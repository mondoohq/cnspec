  - uid: mondoo-azure-security-recovery-vault-cmk-encryption
    title: Ensure Recovery Services Vaults use CMK encryption
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-azure-security-recovery-vault-cmk-encryption-azure
        tags:
          mondoo.com/filter-title: Azure Recovery Services Vault
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-recovery-vault-cmk-encryption-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-recovery-vault-cmk-encryption-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-recovery-vault-cmk-encryption-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure Recovery Services Vaults use customer-managed keys (CMK) for encryption with infrastructure encryption enabled. CMK provides control over the encryption keys protecting backup data, while infrastructure encryption adds a second encryption layer.

        **Why this matters**

        - Default platform-managed keys do not provide organizations with control over key lifecycle or the ability to revoke access.
        - Customer-managed keys enable key rotation, access auditing, and the ability to revoke encryption access if needed.
        - Infrastructure encryption adds a second layer of encryption at the storage level, providing defense in depth.

        **Risk mitigation**

        - **Key lifecycle control:** Organizations manage rotation and revocation of backup encryption keys.
        - **Double encryption:** Infrastructure encryption adds a second independent encryption layer.
        - **Compliance:** Satisfies requirements for customer-managed encryption of backup data.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Recovery Services vaults** in the Azure Portal.
        2. Select a vault.
        3. Go to **Properties** under **Settings**.
        4. Under **Encryption settings**, verify that a customer-managed key is configured and infrastructure encryption is enabled.
      remediation:
        - id: portal
          desc: |
            CMK encryption must be configured at vault creation or before protecting any items.

            1. Navigate to **Recovery Services vaults** in the Azure Portal.
            2. Create a new vault or select an existing vault without protected items.
            3. Go to **Properties** under **Settings**.
            4. Under **Encryption settings**, select **Update**.
            5. Choose **Use customer-managed key**.
            6. Configure the Key Vault key and enable infrastructure encryption.
            7. Save the changes.
        - id: cli
          desc: |
            Assign a managed identity to the vault, grant it `Key Vault Crypto Service Encryption User` permissions on the key, then enable customer-managed encryption with the Azure CLI:

            ```bash
            az backup vault identity assign \
              --name <VaultName> \
              --resource-group <ResourceGroupName> \
              --system-assigned

            az backup vault encryption update \
              --name <VaultName> \
              --resource-group <ResourceGroupName> \
              --encryption-key-id <KeyVaultKeyId> \
              --mi-system-assigned \
              --infrastructure-encryption Enabled
            ```
        - id: terraform
          desc: |
            To configure CMK encryption in Terraform:

            ```hcl
            resource "azurerm_recovery_services_vault" "example" {
              name                = "example-vault"
              location            = azurerm_resource_group.example.location
              resource_group_name = azurerm_resource_group.example.name
              sku                 = "Standard"

              encryption {
                key_id                            = azurerm_key_vault_key.example.id
                infrastructure_encryption_enabled = true
                use_system_assigned_identity      = true
              }

              identity {
                type = "SystemAssigned"
              }
            }
            ```
        - id: bicep
          desc: |
            To configure CMK encryption in Bicep:

            ```bicep
            resource vault 'Microsoft.RecoveryServices/vaults@2024-04-01' = {
              name: 'example-vault'
              location: resourceGroup().location
              sku: {
                name: 'RS0'
                tier: 'Standard'
              }
              identity: {
                type: 'SystemAssigned'
              }
              properties: {
                encryption: {
                  keyVaultProperties: {
                    keyUri: keyVaultKey.properties.keyUriWithVersion
                  }
                  kekIdentity: {
                    useSystemAssignedIdentity: true
                  }
                  infrastructureEncryption: 'Enabled'
                }
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/backup/encryption-at-rest-with-cmk
        title: Encryption of backup data using customer-managed keys
  - uid: mondoo-azure-security-recovery-vault-cmk-encryption-azure
    filters: |
      asset.platform == "azure-recovery-services-vault"
    mql: |
      azure.subscription.recoveryServices.vault.encryption.infrastructureEncryption == "Enabled" &&
      azure.subscription.recoveryServices.vault.encryption.keyVaultKeyUri != empty
  - uid: mondoo-azure-security-recovery-vault-cmk-encryption-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "azurerm_recovery_services_vault")
    mql: |
      terraform.resources.where(nameLabel == "azurerm_recovery_services_vault").all(
        blocks.where(type == "encryption") != empty &&
        blocks.where(type == "encryption").all(arguments['infrastructure_encryption_enabled'] == true)
      )
  - uid: mondoo-azure-security-recovery-vault-cmk-encryption-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "azurerm_recovery_services_vault")
    mql: |
      terraform.plan.resourceChanges.where(type == "azurerm_recovery_services_vault").all(
        change.after['encryption'] != empty
      )
  - uid: mondoo-azure-security-recovery-vault-cmk-encryption-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "azurerm_recovery_services_vault")
    mql: |
      terraform.state.resources.where(type == "azurerm_recovery_services_vault").all(
        values['encryption'] != empty
      )
