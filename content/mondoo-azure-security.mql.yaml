  - uid: mondoo-azure-security-aks-disk-encryption-set
    title: Ensure AKS clusters have disk CSI driver enabled for node pool encryption
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-azure-security-aks-disk-encryption-set-azure
        tags:
          mondoo.com/filter-title: Azure AKS Cluster
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-aks-disk-encryption-set-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-aks-disk-encryption-set-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-aks-disk-encryption-set-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that AKS clusters have the disk CSI driver enabled in the storage profile. The disk CSI driver is required to apply customer-managed key encryption and disk encryption sets to node pool disks. By default, AKS enables the disk CSI driver for new clusters, but older clusters or clusters with custom storage profiles may have it disabled, preventing encryption set configurations from taking effect.

        **Why this matters**

        - **Encryption set support**: The disk CSI driver is the prerequisite for attaching an Azure Disk Encryption Set to node pool disks, which is the only path to customer-managed key encryption for AKS persistent volumes.
        - **Compliance alignment**: Regulatory frameworks such as PCI DSS and HIPAA require encryption of all data at rest on compute infrastructure, including temporary storage attached to Kubernetes nodes.
        - **Dynamic provisioning with encryption**: The CSI driver allows Kubernetes persistent volumes to be dynamically provisioned with encryption configurations applied automatically at creation time, rather than requiring manual post-provisioning steps.

        **Risk mitigation**

        - **Customer-managed key enforcement**: Enabling the disk CSI driver allows teams to attach encryption sets that use keys stored in Azure Key Vault, giving the organization full control over key rotation and revocation for cluster storage.
        - **Consistent encryption posture**: Without the CSI driver, persistent volume encryption must be managed at the OS level and may be inconsistently applied across node pools, creating gaps that audits and compliance scans will flag.
        - **Reduced data exposure on node termination**: Encrypted disks tied to a customer-managed key become unreadable without active access to the key vault, limiting data exposure when nodes are decommissioned or disk snapshots are exported.
      audit: |
        **Automated Audit with Azure CLI:**

        ```bash
        az aks show --name <ClusterName> --resource-group <ResourceGroupName> --query "{EncryptionAtHost: agentPoolProfiles[].enableEncryptionAtHost, DiskCSI: storageProfile.diskCSIDriver.enabled}"
        ```
      remediation:
        - id: portal
          desc: |
            To ensure AKS clusters have disk CSI driver enabled for node pool encryption using the Azure Portal:

            1. Navigate to **Kubernetes services** in the Azure Portal.
            2. Select the AKS cluster.
            3. Under **Settings**, select **Node pools**.
            4. Select the node pool to view its configuration.
            5. Review the **Disk encryption set** setting.

            Note: Disk encryption set must be configured at cluster or node pool creation time and cannot be changed afterward.
        - id: cli
          desc: |
            To ensure AKS clusters have disk CSI driver enabled for node pool encryption using the Azure CLI, enable encryption at host when creating or adding a node pool:

            ```bash
            az aks nodepool add --cluster-name <ClusterName> --resource-group <ResourceGroupName> --name <PoolName> --enable-encryption-at-host
            ```

            Enable disk CSI driver on the cluster:

            ```bash
            az aks update --name <ClusterName> --resource-group <ResourceGroupName> --enable-disk-driver
            ```
        - id: terraform
          desc: |
            To ensure AKS clusters have disk CSI driver enabled for node pool encryption in Terraform:

            ```hcl
            resource "azurerm_kubernetes_cluster" "example" {
              name                = "example-aks"
              location            = azurerm_resource_group.example.location
              resource_group_name = azurerm_resource_group.example.name

              ...

              storage_profile {
                disk_driver_enabled = true
              }
            }
            ```
        - id: bicep
          desc: |
            To ensure AKS clusters have disk CSI driver enabled for node pool encryption in Bicep:

            ```bicep
            resource aksCluster 'Microsoft.ContainerService/managedClusters@2024-09-01' = {
              name: 'example-aks'
              location: resourceGroup().location
              properties: {
                storageProfile: {
                  diskCSIDriver: {
                    enabled: true
                  }
                }
                // ...
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/aks/azure-disk-customer-managed-keys
        title: Bring your own keys (BYOK) with Azure disks in Azure Kubernetes Service
  - uid: mondoo-azure-security-aks-disk-encryption-set-azure
    filters: |
      asset.platform == "azure-aks-cluster"
    mql: |
      azure.subscription.aksService.cluster.storageProfile["diskCSIDriver"]["enabled"] == true
  - uid: mondoo-azure-security-aks-disk-encryption-set-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "azurerm_kubernetes_cluster")
    mql: |
      terraform.resources.where(nameLabel == "azurerm_kubernetes_cluster").all(
        blocks.where(type == "storage_profile") != empty &&
        blocks.where(type == "storage_profile").all(arguments['disk_driver_enabled'] == true)
      )
  - uid: mondoo-azure-security-aks-disk-encryption-set-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "azurerm_kubernetes_cluster")
    mql: |
      terraform.plan.resourceChanges.where(type == "azurerm_kubernetes_cluster").all(
        change.after.storage_profile != empty &&
        change.after.storage_profile.all(disk_driver_enabled == true)
      )
  - uid: mondoo-azure-security-aks-disk-encryption-set-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "azurerm_kubernetes_cluster")
    mql: |
      terraform.state.resources.where(type == "azurerm_kubernetes_cluster").all(
        values.storage_profile != empty &&
        values.storage_profile.all(disk_driver_enabled == true)
      )
  - uid: mondoo-azure-security-appgw-ssl-policy-tls12
    title: Ensure Application Gateways enforce TLS 1.2 or higher
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    variants:
      - uid: mondoo-azure-security-appgw-ssl-policy-tls12-azure
        tags:
          mondoo.com/filter-title: Azure Subscription
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-appgw-ssl-policy-tls12-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-appgw-ssl-policy-tls12-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-appgw-ssl-policy-tls12-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that all Azure Application Gateways have an SSL policy configured that enforces TLS 1.2 or higher as the minimum protocol version, preventing the use of deprecated TLS versions. By default, newly created Application Gateways may allow TLS 1.0 and 1.1 unless a predefined or custom SSL policy is explicitly set.

        **Why this matters**

        - **Protocol security**: TLS 1.0 and 1.1 have known vulnerabilities including BEAST, POODLE, and other attacks that can compromise encrypted communications at the gateway level.
        - **Frontend protection**: Application Gateways handle TLS termination for backend services, making the SSL policy a critical security control for all traffic flowing through the gateway.
        - **Compliance alignment**: Industry standards such as PCI DSS require TLS 1.2 as a minimum for secure communications.
        - **Cipher suite control**: Newer TLS versions support stronger cipher suites and deprecate weak algorithms, providing better overall encryption strength.

        **Risk mitigation**

        - **Downgrade attack prevention**: Enforcing TLS 1.2 as the minimum prevents clients and intermediaries from negotiating a weaker protocol version, eliminating the classes of attack that rely on downgrade to exploit known TLS 1.0 and 1.1 weaknesses.
        - **Centralized enforcement**: Configuring the SSL policy at the Application Gateway level applies the control to every listener and backend pool, avoiding the need to independently harden each origin service.
        - **Predefined policy simplicity**: Azure predefined SSL policies such as AppGwSslPolicy20220101S bundle a minimum TLS version with a curated cipher suite list, reducing the risk of manual misconfiguration compared to building a custom policy from scratch.
      audit: |
        **Automated Audit with Azure CLI:**

        ```bash
        az network application-gateway list --query "[].{Name:name, SSLPolicy:sslPolicy}"
        ```
      remediation:
        - id: portal
          desc: |
            To ensure Application Gateways enforce TLS 1.2 or higher using the Azure Portal:

            1. Navigate to **Application gateways** in the Azure Portal.
            2. Select the Application Gateway.
            3. Under **Settings**, select **SSL settings** (gateway-level).
            4. Set the **Minimum protocol version** to **TLSv1.2**.
            5. Alternatively, select a predefined SSL policy such as **AppGwSslPolicy20220101S**.
            6. Select **Save**.
        - id: cli
          desc: |
            To ensure Application Gateways enforce TLS 1.2 or higher using the Azure CLI:

            ```bash
            az network application-gateway ssl-policy set --gateway-name <GatewayName> --resource-group <ResourceGroupName> --min-protocol-version TLSv1_2 --policy-type Custom
            ```

            Or use a predefined policy that enforces TLS 1.2:

            ```bash
            az network application-gateway ssl-policy set --gateway-name <GatewayName> --resource-group <ResourceGroupName> --policy-type Predefined --name AppGwSslPolicy20220101S
            ```
        - id: terraform
          desc: |
            To ensure Application Gateways enforce TLS 1.2 or higher in Terraform:

            ```hcl
            resource "azurerm_application_gateway" "example" {
              name                = "example-appgw"
              resource_group_name = azurerm_resource_group.example.name
              location            = azurerm_resource_group.example.location

              ...

              ssl_policy {
                policy_type = "Predefined"
                policy_name = "AppGwSslPolicy20220101S"
              }
            }
            ```
        - id: bicep
          desc: |
            To ensure Application Gateways enforce TLS 1.2 or higher in Bicep:

            ```bicep
            resource appGateway 'Microsoft.Network/applicationGateways@2024-05-01' = {
              name: 'example-appgw'
              location: resourceGroup().location
              properties: {
                sslPolicy: {
                  policyType: 'Predefined'
                  policyName: 'AppGwSslPolicy20220101S'
                }
                // ...
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/application-gateway/application-gateway-ssl-policy-overview
        title: Application Gateway SSL policy overview
  - uid: mondoo-azure-security-appgw-ssl-policy-tls12-azure
