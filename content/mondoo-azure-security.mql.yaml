  - uid: mondoo-azure-security-acr-cmk-encryption
    title: Ensure ACR uses customer-managed key encryption
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-azure-security-acr-cmk-encryption-azure
        tags:
          mondoo.com/filter-title: Azure Container Registry
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-acr-cmk-encryption-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-acr-cmk-encryption-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-acr-cmk-encryption-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure Container Registry instances use customer-managed keys (CMK) for encryption at rest. By default, ACR uses Microsoft-managed keys, but CMK provides additional control over key lifecycle and access policies.

        **Why this matters**

        - Customer-managed keys provide full control over the encryption key lifecycle, including rotation, revocation, and access management.
        - CMK enables audit logging of all key usage through Azure Key Vault and Azure Monitor.
        - Many compliance standards require customer-managed encryption keys for sensitive data.

        **Risk mitigation**

        - **Key lifecycle control:** Organizations manage rotation, access, and revocation policies.
        - **Audit trail:** Key usage is logged through Azure Key Vault for compliance evidence.
        - **Data sovereignty:** Keys remain under organizational control rather than Microsoft management.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Container registries** in the Azure Portal.
        2. Select a container registry.
        3. Go to **Encryption** under **Settings**.
        4. Verify that encryption is set to **Customer-managed key**.

        **Automated Audit with Azure CLI:**

        ```bash
        az acr show --name <RegistryName> --query "encryption"
        ```
      remediation:
        - id: portal
          desc: |
            To enable customer-managed key encryption using the Azure Portal:

            1. Navigate to **Container registries** in the Azure Portal.
            2. Select the container registry (must be Premium SKU).
            3. Go to **Encryption** under **Settings**.
            4. Select **Customer-managed key** and configure the Key Vault key.
            5. Save the changes.
        - id: cli
          desc: |
            To create a new Premium ACR with customer-managed key encryption using the Azure CLI:

            ```bash
            az acr create \
              --name <RegistryName> \
              --resource-group <ResourceGroupName> \
              --sku Premium \
              --identity <ManagedIdentityResourceId> \
              --key-encryption-key <KeyVaultKeyId>
            ```

            For an existing registry, rotate to a customer-managed key:

            ```bash
            az acr encryption rotate-key \
              --name <RegistryName> \
              --resource-group <ResourceGroupName> \
              --identity <ManagedIdentityClientId> \
              --key-encryption-key <KeyVaultKeyId>
            ```
        - id: terraform
          desc: |
            To enable customer-managed key encryption in Terraform:

            ```hcl
            resource "azurerm_container_registry" "example" {
              name                = "exampleregistry"
              resource_group_name = azurerm_resource_group.example.name
              location            = azurerm_resource_group.example.location
              sku                 = "Premium"

              encryption {
                key_vault_key_id   = azurerm_key_vault_key.example.id
                identity_client_id = azurerm_user_assigned_identity.example.client_id
              }

              identity {
                type         = "UserAssigned"
                identity_ids = [azurerm_user_assigned_identity.example.id]
              }
            }
            ```
        - id: bicep
          desc: |
            To enable customer-managed key encryption in Bicep:

            ```bicep
            resource acr 'Microsoft.ContainerRegistry/registries@2023-07-01' = {
              name: 'exampleregistry'
              location: resourceGroup().location
              sku: {
                name: 'Premium'
              }
              identity: {
                type: 'UserAssigned'
                userAssignedIdentities: {
                  '${managedIdentity.id}': {}
                }
              }
              properties: {
                encryption: {
                  status: 'enabled'
                  keyVaultProperties: {
                    keyIdentifier: keyVaultKey.properties.keyUriWithVersion
                    identity: managedIdentity.properties.clientId
                  }
                }
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/container-registry/container-registry-customer-managed-keys
        title: Encrypt registry using a customer-managed key
  - uid: mondoo-azure-security-acr-cmk-encryption-azure
    filters: |
      asset.platform == "azure-container-registry"
    mql: |
      azure.subscription.containerRegistry.registry.encryption.status == "enabled"
  - uid: mondoo-azure-security-acr-cmk-encryption-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "azurerm_container_registry")
    mql: |
      terraform.resources.where(nameLabel == "azurerm_container_registry").all(
        blocks.where(type == "encryption") != empty
      )
  - uid: mondoo-azure-security-acr-cmk-encryption-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "azurerm_container_registry")
    mql: |
      terraform.plan.resourceChanges.where(type == "azurerm_container_registry").all(
        change.after['encryption'] != empty
      )
  - uid: mondoo-azure-security-acr-cmk-encryption-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "azurerm_container_registry")
    mql: |
