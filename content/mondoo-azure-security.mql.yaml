  - uid: mondoo-azure-security-cosmosdb-cmk-encryption
    title: Ensure Azure Cosmos DB accounts use customer-managed keys for encryption
    impact: 60
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/soc2-2017: soc2-control-cc6-1-10
    variants:
      - uid: mondoo-azure-security-cosmosdb-cmk-encryption-azure
        tags:
          mondoo.com/filter-title: Azure Cosmos DB Account
          mondoo.com/icon: azure
      - uid: mondoo-azure-security-cosmosdb-cmk-encryption-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/icon: terraform
      - uid: mondoo-azure-security-cosmosdb-cmk-encryption-terraform-plan
        tags:
