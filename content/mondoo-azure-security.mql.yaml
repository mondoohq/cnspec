  - uid: mondoo-azure-security-vpn-gateway-ikev2
    title: Ensure VPN gateways use route-based type for IKEv2 protocol support
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    variants:
      - uid: mondoo-azure-security-vpn-gateway-ikev2-azure
        tags:
          mondoo.com/filter-title: Azure Subscription
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-vpn-gateway-ikev2-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-vpn-gateway-ikev2-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-vpn-gateway-ikev2-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure VPN gateways are configured to use the route-based VPN type, which supports the IKEv2 protocol. Policy-based VPN gateways only support IKEv1, which has known cryptographic weaknesses and is considered deprecated by modern security standards.

        **Why this matters**

        - **Aggressive-mode key cracking:** IKEv1 aggressive mode transmits the hash of the pre-shared key during the handshake, allowing an attacker who captures the exchange to perform offline brute-force or dictionary attacks and recover the PSK.
        - **Weak cryptographic primitives:** IKEv1 supports deprecated algorithms such as DES and MD5, and its cipher negotiation can be downgraded by an active attacker to force weaker cipher suites that are more easily broken.
        - **DoS amplification exposure:** IKEv1 is vulnerable to denial-of-service attacks via spoofed initial exchange packets, which can overwhelm the VPN gateway and disrupt legitimate site-to-site connections.
        - **Broader connectivity:** Route-based gateways supporting IKEv2 allow more flexible tunnel configurations and are compatible with a wider range of on-premises VPN devices.

        **Risk mitigation**

        - **Prevent PSK extraction:** Using route-based gateways with IKEv2 eliminates the aggressive-mode handshake that exposes the pre-shared key hash to offline cracking.
        - **Enforce modern cryptography:** IKEv2 supports stronger cipher suites and provides forward secrecy guarantees that IKEv1 cannot offer, reducing the impact of a key compromise.
      audit: |
        **Automated Audit with Azure CLI:**

        ```bash
        az network vnet-gateway list --query "[?gatewayType=='Vpn'].{Name:name, VpnType:vpnType}"
        ```
      remediation:
        - id: portal
          desc: |
            To ensure VPN gateways use route-based type for IKEv2 protocol support using the Azure Portal:

            1. Navigate to **Virtual network gateways** in the Azure Portal.
            2. Select the VPN gateway.
            3. Under **Settings**, select **Configuration**.
            4. Verify that **VPN type** is set to **Route-based**, which supports IKEv2.

            Note: VPN type is set at gateway creation and cannot be changed. Policy-based gateways must be recreated as route-based to support IKEv2.
        - id: cli
          desc: |
            To ensure VPN gateways use route-based type for IKEv2 protocol support using the Azure CLI, VPN type must be specified when creating the gateway. Policy-based gateways must be recreated as route-based:

            ```bash
            az network vnet-gateway create --name <GatewayName> --resource-group <ResourceGroupName> --vnet <VNetName> --gateway-type Vpn --vpn-type RouteBased --sku VpnGw1
            ```
        - id: terraform
          desc: |
            To ensure VPN gateways use route-based type for IKEv2 protocol support in Terraform:

            ```hcl
            resource "azurerm_virtual_network_gateway" "example" {
              name                = "example-vpn-gateway"
              location            = azurerm_resource_group.example.location
              resource_group_name = azurerm_resource_group.example.name
              type                = "Vpn"
              vpn_type            = "RouteBased"
              sku                 = "VpnGw1"

              ip_configuration {
                public_ip_address_id          = azurerm_public_ip.example.id
                private_ip_address_allocation = "Dynamic"
                subnet_id                     = azurerm_subnet.example.id
              }
            }
            ```
        - id: bicep
          desc: |
            To ensure VPN gateways use route-based type for IKEv2 protocol support in Bicep:

            ```bicep
            resource vpnGateway 'Microsoft.Network/virtualNetworkGateways@2024-05-01' = {
              name: 'example-vpn-gateway'
              location: resourceGroup().location
              properties: {
                gatewayType: 'Vpn'
                vpnType: 'RouteBased'
                sku: {
                  name: 'VpnGw1'
                  tier: 'VpnGw1'
                }
                ipConfigurations: [
                  {
                    name: 'default'
                    properties: {
                      publicIPAddress: {
                        id: publicIp.id
                      }
                      subnet: {
                        id: gatewaySubnet.id
                      }
                    }
                  }
                ]
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/vpn-gateway/vpn-gateway-about-vpn-gateway-settings
        title: About VPN Gateway configuration settings
  - uid: mondoo-azure-security-vpn-gateway-ikev2-azure
    filters: |
      asset.platform == "azure"
    mql: |
      azure.subscription.network.virtualNetworkGateways.where(gatewayType == "Vpn").all(
        vpnType == "RouteBased"
      )
  - uid: mondoo-azure-security-vpn-gateway-ikev2-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "azurerm_virtual_network_gateway")
    mql: |
      terraform.resources.where(nameLabel == "azurerm_virtual_network_gateway").where(arguments['type'] == "Vpn").all(
        arguments['vpn_type'] == "RouteBased"
      )
  - uid: mondoo-azure-security-vpn-gateway-ikev2-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "azurerm_virtual_network_gateway")
    mql: |
      terraform.plan.resourceChanges.where(type == "azurerm_virtual_network_gateway").where(change.after.type == "Vpn").all(
        change.after.vpn_type == "RouteBased"
      )
  - uid: mondoo-azure-security-vpn-gateway-ikev2-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "azurerm_virtual_network_gateway")
    mql: |
      terraform.state.resources.where(type == "azurerm_virtual_network_gateway").where(values.type == "Vpn").all(
        values.vpn_type == "RouteBased"
      )
  - uid: mondoo-azure-security-databricks-public-access-disabled
    title: Ensure Azure Databricks workspaces disable public network access
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-azure-security-databricks-public-access-disabled-azure
        tags:
          mondoo.com/filter-title: Azure Subscription
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-databricks-public-access-disabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-databricks-public-access-disabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-databricks-public-access-disabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure Databricks workspaces have public network access disabled, restricting connectivity to private endpoints only. By default, Databricks workspaces allow public internet access to the workspace web application and REST API, making them reachable by any client with valid credentials.

        **Why this matters**

        - **Reduced attack surface**: Disabling public network access prevents connections from the public internet, significantly reducing exposure to unauthorized access and data exfiltration.
        - **Data protection**: Databricks workspaces often process sensitive analytical and machine learning data; restricting access to private networks ensures that data and compute resources are only accessible within controlled network boundaries.
        - **Network isolation**: Private connectivity through VNet injection and private endpoints ensures that all traffic stays within the organization's network perimeter and is not exposed to internet-based scanning or credential stuffing.
        - **Compliance alignment**: Regulatory standards and security frameworks require data processing services handling sensitive data to be accessible only through private network connections.

        **Risk mitigation**

        - **Credential compromise containment**: Even if a Databricks user or service principal credential is stolen, disabling public access means the attacker cannot reach the workspace from outside the private network, limiting the blast radius of the credential theft.
        - **Lateral movement restriction**: Keeping workspace traffic on private endpoints prevents an attacker who has pivoted into the Azure network from using public DNS and routing to move laterally into adjacent Databricks workspaces in other subscriptions.
        - **Compliance audit simplification**: Network isolation controls that block all public access are easy to assert and verify; auditors can confirm the control with a single property check rather than reviewing complex firewall rules and IP allowlists.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Azure Databricks** in the Azure Portal.
        2. Select a workspace.
        3. Go to **Networking**.
        4. Verify that **Public network access** is set to **Disabled** or **No Public Access**.

        **Automated Audit with Azure CLI:**

        ```bash
        az databricks workspace list --query "[].{Name:name, PublicAccess:publicNetworkAccess}" -o table
        ```
      remediation:
        - id: portal
          desc: |
            To ensure Azure Databricks workspaces disable public network access using the Azure Portal:

            1. Navigate to **Azure Databricks** in the Azure Portal.
            2. Select the workspace.
            3. Go to **Networking**.
            4. Set **Public network access** to **Disabled**.
            5. Configure private endpoints for connectivity.
            6. Select **Save**.
        - id: cli
          desc: |
            To ensure Azure Databricks workspaces disable public network access using the Azure CLI:

            ```bash
            az databricks workspace update --name <WorkspaceName> --resource-group <ResourceGroupName> --public-network-access Disabled
            ```
        - id: terraform
          desc: |
            To ensure Azure Databricks workspaces disable public network access in Terraform:

            ```hcl
            resource "azurerm_databricks_workspace" "example" {
              name                        = "example-workspace"
              resource_group_name         = azurerm_resource_group.example.name
              location                    = azurerm_resource_group.example.location
              sku                         = "premium"
              public_network_access_enabled = false
            }
            ```
        - id: bicep
          desc: |
            To ensure Azure Databricks workspaces disable public network access in Bicep:

            ```bicep
            resource databricksWorkspace 'Microsoft.Databricks/workspaces@2024-05-01' = {
              name: 'example-databricks'
              location: resourceGroup().location
              properties: {
                publicNetworkAccess: 'Disabled'
                // ...
              }
              sku: {
                name: 'premium'
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/databricks/security/network/front-end/public-access
        title: Configure public network access for Azure Databricks
  - uid: mondoo-azure-security-databricks-public-access-disabled-azure
    filters: |
      asset.platform == "azure"
    mql: |
      azure.subscription.databricks.workspaces.all(
        properties["publicNetworkAccess"] == "Disabled"
      )
  - uid: mondoo-azure-security-databricks-public-access-disabled-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "azurerm_databricks_workspace")
    mql: |
      terraform.resources.where(nameLabel == "azurerm_databricks_workspace").all(
        arguments['public_network_access_enabled'] == false
      )
  - uid: mondoo-azure-security-databricks-public-access-disabled-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "azurerm_databricks_workspace")
    mql: |
      terraform.plan.resourceChanges.where(type == "azurerm_databricks_workspace").all(
        change.after.public_network_access_enabled == false
      )
  - uid: mondoo-azure-security-databricks-public-access-disabled-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "azurerm_databricks_workspace")
    mql: |
      terraform.state.resources.where(type == "azurerm_databricks_workspace").all(
        values.public_network_access_enabled == false
      )
  - uid: mondoo-azure-security-defender-for-endpoint-enabled
    title: Ensure Microsoft Defender for Endpoint integration is enabled
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-03
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-16
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-4
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-6
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-3
    variants:
      - uid: mondoo-azure-security-defender-for-endpoint-enabled-azure
        tags:
          mondoo.com/filter-title: Azure Subscription
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-defender-for-endpoint-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-defender-for-endpoint-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-defender-for-endpoint-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Microsoft Defender for Endpoint integration is enabled in Microsoft Defender for Cloud, providing endpoint detection and response capabilities for Azure virtual machines and arc-connected servers. By default the integration is disabled, leaving servers without behavioral threat detection even when other Defender plans are active.

        **Why this matters**

        - **Endpoint detection and response**: Defender for Endpoint provides advanced threat detection, investigation, and response capabilities for servers and workstations connected to Azure.
        - **Unified security management**: Integration with Defender for Cloud enables centralized security monitoring, correlating endpoint alerts with cloud workload protection data.
        - **Threat intelligence**: Leverages Microsoft's global threat intelligence network to detect known and emerging threats targeting endpoints.
        - **Automated investigation**: Provides automated investigation and remediation workflows to reduce response time and analyst workload.

        **Risk mitigation**

        - **Behavioral threat detection**: Defender for Endpoint monitors process execution, network connections, and file system activity in real time, catching attacker behavior that signature-based tools miss.
        - **Cross-signal correlation**: When endpoint telemetry is integrated with Defender for Cloud, an alert about a suspicious process on a VM can be correlated with anomalous API calls, helping analysts reconstruct the full attack chain rather than investigating each signal in isolation.
        - **Response acceleration**: Automated investigation playbooks can isolate a compromised host, collect forensic artifacts, and surface recommended remediation steps within minutes, reducing dwell time before human analysts engage.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Microsoft Defender for Cloud** in the Azure Portal.
        2. Select **Environment settings** and choose the subscription.
        3. Go to **Integrations**.
        4. Verify that **Microsoft Defender for Endpoint** is enabled.

        **Automated Audit with Azure CLI:**

        ```bash
        az security setting show --name WDATP --query "kind"
        ```
      remediation:
        - id: portal
          desc: |
            To ensure Microsoft Defender for Endpoint integration is enabled using the Azure Portal:

            1. Navigate to **Microsoft Defender for Cloud** in the Azure Portal.
            2. Select **Environment settings** and choose the subscription.
            3. Go to **Integrations**.
            4. Enable **Allow Microsoft Defender for Endpoint to access my data**.
            5. Select **Save**.
        - id: cli
          desc: |
            To ensure Microsoft Defender for Endpoint integration is enabled using the Azure CLI:

            ```bash
            az security setting create --name WDATP --data-export-settings '{"enabled": true}'
            ```
        - id: terraform
          desc: |
            To ensure Microsoft Defender for Endpoint integration is enabled in Terraform:

            ```hcl
            resource "azurerm_security_center_setting" "example" {
              setting_name = "WDATP"
              enabled      = true
            }
            ```
        - id: bicep
          desc: |
            To ensure Microsoft Defender for Endpoint integration is enabled in Bicep:

            ```bicep
            resource defenderForEndpoint 'Microsoft.Security/settings@2022-05-01' = {
              name: 'WDATP'
              kind: 'DataExportSettings'
              properties: {
                enabled: true
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/defender-for-cloud/integration-defender-for-endpoint
        title: Defender for Endpoint integration with Defender for Cloud
  - uid: mondoo-azure-security-defender-for-endpoint-enabled-azure
    filters: |
      asset.platform == "azure"
    mql: |
      azure.subscription.cloudDefender.settingsWDATP.properties["enabled"] == true
