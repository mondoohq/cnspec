      - uid: mondoo-azure-security-no-sql-databases-allow-ingress-0-0-0-0-0-single-azuresql
        tags:
          mondoo.com/filter-title: Azure SQL Database
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-no-sql-databases-allow-ingress-0-0-0-0-0-single-postgresql-flexible
        tags:
          mondoo.com/filter-title: Azure PostgreSQL Flexible Server
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-no-sql-databases-allow-ingress-0-0-0-0-0-single-mysql-flexible
        tags:
          mondoo.com/filter-title: Azure MySQL Flexible Server
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-no-sql-databases-allow-ingress-0-0-0-0-0-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-no-sql-databases-allow-ingress-0-0-0-0-0-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-no-sql-databases-allow-ingress-0-0-0-0-0-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure SQL, PostgreSQL Flexible Server, and MySQL Flexible Server instances are not configured with firewall rules that allow ingress from 0.0.0.0/0, which permits connections from any internet address. By default, Azure managed database services create a firewall with no rules, but administrators frequently add 0.0.0.0/0 rules to resolve connectivity issues without understanding the scope of access granted.

        **Why this matters**

        - **Direct database exposure**: A firewall rule allowing 0.0.0.0/0 places the database listener reachable from any internet host; the only remaining protection is the database credential, which is frequently weak or reused.
        - **Credential attack surface**: Internet-exposed database ports are continuously scanned and subjected to credential-stuffing attacks; a single compromised account grants full SQL access to potentially sensitive data.
        - **SQL injection amplification**: Attackers who identify exposed databases can probe for SQL injection vulnerabilities in connected applications and then pivot directly to the database server using the open firewall rule.
        - **Data exfiltration path**: An attacker with database access can exfiltrate entire tables or databases directly over the internet connection enabled by the permissive firewall rule, with no additional steps required.

        **Risk mitigation**

        - **Restrict to known IP ranges**: Replace 0.0.0.0/0 rules with specific IP addresses or ranges that correspond to application servers, jump hosts, or corporate network egress points that legitimately need database access.
        - **Use private endpoints**: Move database connectivity to Azure Private Link or VNet service endpoints, eliminating the need for public firewall rules entirely by routing traffic over the Azure backbone.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **SQL servers** in the Azure Portal.
        2. Select a specific SQL server.
        3. Under the **Settings** section, select **Firewall and virtual networks**.
        4. Review the **Firewall rules** section.
        5. Ensure that there are no rules allowing ingress from ""0.0.0.0/0"

        **Automated Audit with Azure CLI:**

        List the firewall rules for all SQL servers and verify that none allow ingress from "0.0.0.0/0":

        ```bash
        az sql server firewall-rule list --server <server-name> --resource-group <resource-group> --query "[?startIpAddress=='0.0.0.0'].{Name:name, StartIP:startIpAddress}"
        az postgres flexible-server firewall-rule list --name <server-name> --resource-group <resource-group> --query "[?startIpAddress=='0.0.0.0'].{Name:name, StartIP:startIpAddress}"
        az mysql flexible-server firewall-rule list --name <server-name> --resource-group <resource-group> --query "[?startIpAddress=='0.0.0.0'].{Name:name, StartIP:startIpAddress}"
        ```
      remediation:
        - id: portal
          desc: |
            To ensure no SQL Databases allow ingress 0.0.0.0/0 (ANY IP) using the Azure Portal:

            1. Navigate to **SQL servers** in the Azure Portal.
            2. Select the SQL server you want to configure.
            3. Go to **Firewall and virtual networks** under the **Settings** section.
            4. Review the **Firewall rules** and remove any rules allowing ingress from "0.0.0.0/0".
            5. Preferably, create new rules that restrict access to specific IP ranges or virtual networks.
            6. Save your changes.
        - id: cli
          desc: |
            To ensure no SQL Databases allow ingress 0.0.0.0/0 (ANY IP) using the Azure CLI, ensure that the start and end IP addresses in the firewall rules are set to secure IPs within your controlled network range, effectively blocking public access.

            ```bash
            # Replace <server-name>, <resource-group>, and <rule-name> with your specific details

            # Azure SQL
            az sql server firewall-rule create --resource-group <resource-group> --server <server-name> --name <rule-name> --start-ip-address <secure-start-ip> --end-ip-address <secure-end-ip>

            # PostgreSQL
            az postgres flexible-server firewall-rule create --resource-group <resource-group> --name <server-name> --rule-name <rule-name> --start-ip-address <secure-start-ip> --end-ip-address <secure-end-ip>

            # MySQL
            az mysql flexible-server firewall-rule create --resource-group <resource-group> --name <server-name> --rule-name <rule-name> --start-ip-address <secure-start-ip> --end-ip-address <secure-end-ip>

            ```
        - id: powershell
          desc: |
            To ensure no SQL Databases allow ingress 0.0.0.0/0 (ANY IP) using PowerShell:

            ```powershell
            # Replace <server-name>, <resource-group>, and <rule-name> with your specific details

            # Azure SQL
            New-AzSqlServerFirewallRule -ResourceGroupName <resource-group> -ServerName <server-name> -FirewallRuleName <rule-name> -StartIpAddress <secure-start-ip> -EndIpAddress <secure-end-ip>

            # PostgreSQL
            New-AzPostgreSqlServerFirewallRule -ResourceGroupName <resource-group> -ServerName <server-name> -FirewallRuleName <rule-name> -StartIpAddress <secure-start-ip> -EndIpAddress <secure-end-ip>

            # MySQL
            New-AzMySqlServerFirewallRule -ResourceGroupName <resource-group> -ServerName <server-name> -FirewallRuleName <rule-name> -StartIpAddress <secure-start-ip> -EndIpAddress <secure-end-ip>

            ```
        - id: terraform
          desc: |
            To ensure no SQL Databases allow ingress 0.0.0.0/0 (ANY IP) in Terraform, set `start_ip_address` to a specific trusted address (never `0.0.0.0`) on every firewall rule resource. Use the resource type that matches the server flavor.

            __Azure SQL Database__

            ```hcl
            resource "azurerm_mssql_firewall_rule" "example" {
              name             = "example-rule"
              server_id        = azurerm_mssql_server.example.id
              start_ip_address = "192.168.2.22"
              end_ip_address   = "192.168.2.22"
            }
            ```

            __PostgreSQL Flexible Server__

            ```hcl
            resource "azurerm_postgresql_flexible_server_firewall_rule" "example" {
              name             = "example-rule"
              server_id        = azurerm_postgresql_flexible_server.example.id
              start_ip_address = "192.168.2.22"
              end_ip_address   = "192.168.2.22"
            }
            ```

            __MySQL Flexible Server__

            ```hcl
            resource "azurerm_mysql_flexible_server_firewall_rule" "example" {
              name                = "example-rule"
              resource_group_name = azurerm_resource_group.example.name
              server_name         = azurerm_mysql_flexible_server.example.name
              start_ip_address    = "192.168.2.22"
              end_ip_address      = "192.168.2.22"
            }
            ```
        - id: bicep
          desc: |
            To ensure no SQL Databases allow ingress 0.0.0.0/0 (ANY IP) in Bicep:

            ```bicep
            resource sqlFirewallRule 'Microsoft.Sql/servers/firewallRules@2023-08-01-preview' = {
              parent: sqlServer
              name: 'AllowSpecificIP'
              properties: {
                startIpAddress: '203.0.113.0'
                endIpAddress: '203.0.113.255'
              }
            }
            ```

            Ensure no rule uses `startIpAddress: '0.0.0.0'` and `endIpAddress: '0.0.0.0'`.
    refs:
      - url: https://learn.microsoft.com/en-us/azure/azure-sql/database/security-overview
        title: Azure SQL Database Security
      - url: https://learn.microsoft.com/en-us/azure/security/fundamentals/network-best-practices
        title: Azure Network Security Best Practices
