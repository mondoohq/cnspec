  - uid: mondoo-azure-security-acr-admin-user-disabled
    title: Ensure ACR admin user is disabled
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-13
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-2
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-5
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-1-3
    variants:
      - uid: mondoo-azure-security-acr-admin-user-disabled-azure
        tags:
          mondoo.com/filter-title: Azure Container Registry
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-acr-admin-user-disabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-acr-admin-user-disabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-acr-admin-user-disabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that the admin user account is disabled on Azure Container Registry instances. The admin account provides unrestricted push and pull access using a shared username and password, which cannot be individually tracked or audited.

        **Why this matters**

        - The admin account uses shared credentials that cannot be attributed to individual users, making it impossible to audit who accessed or modified container images.
        - Admin credentials do not support multi-factor authentication or conditional access policies.
        - Azure AD (Entra ID) authentication with RBAC provides individual identity tracking, fine-grained permissions, and integration with organizational security policies.
        - CIS Azure Foundations Benchmark recommends disabling the admin user in favor of Azure AD-based authentication.

        **Risk mitigation**

        - **Identity tracking:** Azure AD authentication ensures all registry access is attributed to individual identities.
        - **Least privilege:** RBAC enables fine-grained permissions instead of the all-or-nothing admin access.
        - **Credential management:** Eliminates shared credentials that could be leaked or misused.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Container registries** in the Azure Portal.
        2. Select a container registry.
        3. Go to **Access keys** under **Settings**.
        4. Verify that **Admin user** is set to **Disabled**.

        **Automated Audit with Azure CLI:**

        ```bash
        az acr show --name <RegistryName> --query "adminUserEnabled"
        ```
      remediation:
        - id: portal
          desc: |
            To ensure the ACR admin user is disabled using the Azure Portal:

            1. Navigate to **Container registries** in the Azure Portal.
            2. Select the container registry.
            3. Go to **Access keys** under **Settings**.
            4. Set **Admin user** to **Disabled**.
        - id: cli
          desc: |
            To ensure the ACR admin user is disabled using the Azure CLI:

            ```bash
            az acr update --registry-name <RegistryName> --admin-enabled false
            ```
        - id: terraform
          desc: |
            To ensure the ACR admin user is disabled in Terraform:

            ```hcl
            resource "azurerm_container_registry" "example" {
              name                = "exampleregistry"
              resource_group_name = azurerm_resource_group.example.name
              location            = azurerm_resource_group.example.location
              sku                 = "Premium"
              admin_enabled       = false
            }
            ```
        - id: bicep
          desc: |
            To ensure the ACR admin user is disabled in Bicep:

            ```bicep
            resource acr 'Microsoft.ContainerRegistry/registries@2023-07-01' = {
              name: 'exampleregistry'
              location: resourceGroup().location
              sku: {
                name: 'Premium'
              }
              properties: {
                adminUserEnabled: false
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/container-registry/container-registry-authentication
        title: Authenticate with an Azure container registry
  - uid: mondoo-azure-security-acr-admin-user-disabled-azure
    filters: |
