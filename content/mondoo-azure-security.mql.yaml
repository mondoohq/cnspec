    docs:
      desc: |
        This check ensures that Azure Monitor activity log alerts are configured to fire on NSG create, update, and delete operations, providing real-time notification when network security group configurations change. By default, Azure does not create any activity log alerts, meaning NSG changes go undetected unless administrators proactively configure alerting.

        **Why this matters**

        - **Lateral movement enablement**: After compromising a single resource, attackers modify NSG rules to allow traffic between subnets or VNets that were previously isolated, enabling lateral movement without triggering network-level detection.
        - **Firewall rule backdoors**: Attackers add permissive inbound rules such as allowing all traffic from any source on a commonly allowed port to maintain persistent remote access, then label the rule to look legitimate.
        - **Detection evasion**: Deleting or replacing an NSG removes all its associated rules, allowing an attacker to operate on the affected subnet without any network-layer restrictions or audit evidence from that NSG.
        - **Configuration drift detection**: Alert-driven awareness of every NSG change enables security teams to identify unauthorized modifications quickly, before they are exploited, rather than discovering them during a post-incident review.

        **Risk mitigation**

        - **Real-time response**: Activity log alerts trigger within minutes of an NSG change, allowing security teams to investigate and revert unauthorized modifications before an attacker can exploit the newly opened path.
        - **Change accountability**: Each NSG write or delete event in the activity log records the identity of the principal who made the change, providing the evidence needed to determine whether a modification was authorized and to hold individuals accountable.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to the `Monitor` blade.
        2. Select `Alerts`.
        3. In the Alerts window, select `Alert rules`.
        4. Verify that alert rules exist for the following conditions:
          - Operation name equals `Microsoft.Network/networkSecurityGroups/write` for Create/Update events.
          - Operation name equals `Microsoft.Network/networkSecurityGroups/delete` for Delete events.
        5. Select the alert rule name to review its configuration.
          - Ensure the `Condition` panel specifies the correct operation names and does not filter on irrelevant criteria like `Level`, `Status`, or `Caller`.
          - Confirm that the `Actions` panel is set up to notify the appropriate personnel within your organization.

        **Automated Audit with Azure CLI:**

        Run the following commands to list the current alert rules and verify their conditions:

        ```bash
        az monitor activity-log alert list --subscription <subscription ID> --query "[].{Name:name, Enabled:enabled, Condition:condition.allOf, Actions:actions}"
        ```

        Check for the presence of conditions targeting the `Microsoft.Network/networkSecurityGroups/write` and `Microsoft.Network/networkSecurityGroups/delete` operation names in the output.

        **Using PowerShell**

        Utilize the following PowerShell commands to inspect the alert rules:

        ```powershell
        Get-AzActivityLogAlert -SubscriptionId <subscription ID> | where-object {$_.ConditionAllOf.Equal -match "Microsoft.Network/networkSecurityGroups/write"} | select-object Location, Name, Enabled, ResourceGroupName, ConditionAllOf

        Get-AzActivityLogAlert -SubscriptionId <subscription ID> | where-object {$_.ConditionAllOf.Equal -match "Microsoft.Network/networkSecurityGroups/delete"} | select-object Location, Name, Enabled, ResourceGroupName, ConditionAllOf
        ```
      remediation:
        - id: portal
          desc: |
            To ensure activity log alerts exist for NSG create, update, and delete using the Azure Portal, create or update activity log alerts in Microsoft Azure Portal:

            1. Log into Microsoft Azure Portal at https://portal.azure.com.
            2. Go to **Monitor**.
            3. Select **Alerts**.
            4. Select **+ Create**.
            5. Under **Resource types**, select **Activity Log**.
            6. Select the subscription name, resource group, or network security group to apply the rule to.
            7. Verify that the selection preview shows:
                - All network security groups or your selected network security group
                - The subscription, group, or resource you selected
            8. Select the **Apply** button.
            9. Select the **Condition** tab and select **See all signals**.
            10. Select **Create or Update Network Security Group**.
            11. Select the **Actions** tab and either choose an existing action group or create a new one to notify the necessary personnel.
            12. Select the **Details** tab and provide:
                - The resource group where you want the alert rule to reside
                - A name (and optional description) for the alert rule
            13. Select the **Review + create** button and verify the summary.
            14. Select the **Create** button.
        - id: cli
          desc: |
            To ensure activity log alerts exist for NSG create, update, and delete using the Azure CLI, create an activity log alert for network security group changes:

            ```bash
            az monitor activity-log alert create --name <AlertName> --resource-group <ResourceGroupName> --scope <ResourceID> --condition "category == 'Administrative' and operationName == 'Microsoft.Network/networkSecurityGroups/write'" --action-group <ActionGroupID>
            ```

            To create an activity log alert for network security group deletions:

            ```bash
            az monitor activity-log alert create --name <AlertName> --resource-group <ResourceGroupName> --scope <ResourceID> --condition "category == 'Administrative' and operationName == 'Microsoft.Network/networkSecurityGroups/delete'" --action-group <ActionGroupID>
            ```
        - id: powershell
          desc: |
            To ensure activity log alerts exist for NSG create, update, and delete using PowerShell, create an activity log alert for network security group changes:

            ```powershell
            New-AzActivityLogAlert -Name <AlertName> -ResourceGroupName <ResourceGroupName> -Location <Location> -Condition "category == 'Administrative' and operationName == 'Microsoft.Network/networkSecurityGroups/write'" -ActionGroupId <ActionGroupID>
            ```

            To create an activity log alert for network security group deletions:

            ```powershell
            New-AzActivityLogAlert -Name <AlertName> -ResourceGroupName <ResourceGroupName> -Location <Location> -Condition "category == 'Administrative' and operationName == 'Microsoft.Network/networkSecurityGroups/delete'" -ActionGroupId <ActionGroupID>
            ```
        - id: terraform
          desc: |
            To ensure activity log alerts exist for NSG create, update, and delete in Terraform, create an activity log alert for network security group changes:

            ```hcl
            resource "azurerm_monitor_activity_log_alert" "example" {
              name                = "example-alert"
              resource_group_name = azurerm_resource_group.example.name
              location            = azurerm_resource_group.example.location

              scopes = [
                azurerm_network_security_group.example.id,
              ]

              criteria {
                category = "Administrative"
                operation_name = "Microsoft.Network/networkSecurityGroups/write"
              }

              action {
                action_group_id = azurerm_monitor_action_group.example.id
              }
            }
            ```
        - id: bicep
          desc: |
            To ensure activity log alerts exist for NSG create, update, and delete in Bicep:

            ```bicep
            resource activityLogAlert 'Microsoft.Insights/activityLogAlerts@2020-10-01' = {
              name: 'NSGChangeAlert'
              location: 'global'
              properties: {
                enabled: true
                scopes: [
                  subscription().id
                ]
                condition: {
                  allOf: [
                    {
                      field: 'category'
                      equals: 'Administrative'
                    }
                    {
                      field: 'operationName'
                      equals: 'Microsoft.Network/networkSecurityGroups/write'
                    }
                  ]
                }
                actions: {
                  actionGroups: [
                    {
                      actionGroupId: actionGroup.id
                    }
                  ]
                }
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/azure-monitor/best-practices
        title: Azure Monitor Best Practices
      - url: https://learn.microsoft.com/en-us/azure/security/fundamentals/network-best-practices
        title: Azure Network Security Best Practices
