  - uid: mondoo-azure-security-ensure-register-with-ad-is-enabled-on-app-service
    title: Ensure App Service managed identities are enabled for Entra ID
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-14
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-j
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-1
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-8
      compliance/vda-isa-5: vda-isa-5-4-1-3
    variants:
      - uid: mondoo-azure-security-ensure-register-with-ad-is-enabled-on-app-service-azure
        tags:
          mondoo.com/filter-title: Azure App Service
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-ensure-register-with-ad-is-enabled-on-app-service-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-ensure-register-with-ad-is-enabled-on-app-service-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-ensure-register-with-ad-is-enabled-on-app-service-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure App Service instances are configured with a system-assigned or user-assigned managed identity, allowing them to authenticate to Microsoft Entra ID and downstream Azure services without storing credentials. By default, App Service instances do not have a managed identity assigned and must use connection strings, keys, or secrets to authenticate to backend services.

        **Why this matters**

        - **Credential elimination**: Managed identities remove the need to store service principal passwords, shared keys, or connection strings in application settings, environment variables, or code repositories, where they are frequently leaked.
        - **Non-repudiation**: Managed identity tokens are bound to the specific App Service instance and are automatically rotated by Azure; each token use is attributable to the specific resource rather than a shared credential.
        - **Key Vault integration**: With a managed identity, App Service can retrieve secrets from Key Vault at runtime without any long-lived credential; removing the bootstrap secret problem eliminates a common attack vector.
        - **Least privilege enablement**: Managed identities can be granted precisely scoped Azure RBAC roles, making it straightforward to enforce least privilege for each service rather than sharing a single broadly permissioned service account.

        **Risk mitigation**

        - **Secret sprawl prevention**: Without managed identities, credentials must be distributed to all instances and updated when rotated; managed identities eliminate this distribution surface and the stale-credential risk that comes with it.
        - **Compromise containment**: A managed identity credential is non-exportable and scoped to one resource; if an instance is compromised, the identity cannot be used from another host or exfiltrated for later use.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Log in to the Azure Portal at https://portal.azure.com.
        2. Navigate to **App Services**.
        3. Select an app service and select **Identity** under **Settings**.
        4. Verify that the **Status** for **System assigned managed identity** is set to **On**.

        **Automated Audit with Azure CLI:**

        Use the Azure CLI to check if the system assigned identity is enabled for each App Service:

        ```bash
        az webapp identity show --resource-group <RESOURCE_GROUP_NAME> --name <APP_NAME> --query principalId
        ```
        If the command returns a non-null principal ID, it indicates that the managed identity is enabled. If it returns null, the managed identity is not enabled.
      remediation:
        - id: portal
          desc: |
            To ensure App Service managed identities are enabled for Entra ID using the Azure Portal:

            1. Log in to the Azure Portal
            2. Navigate to **App Services**.
            3. Select an app service and select **Identity** under **Settings**.
            4. Set the **Status** for **System assigned managed identity** to **On**.
            5. Save your changes.
        - id: cli
          desc: |
            To ensure App Service managed identities are enabled for Entra ID using the Azure CLI, enable a system-assigned managed identity for an App Service:

            ```bash
            az webapp identity assign --resource-group <RESOURCE_GROUP_NAME> --name <APP_NAME>
            ```
        - id: powershell
          desc: |
            To ensure App Service managed identities are enabled for Entra ID using PowerShell:

            ```powershell
            $app = Get-AzWebApp -ResourceGroupName <RESOURCE_GROUP_NAME> -Name <APP_NAME>
            $app.Identity.Type = "SystemAssigned"
            Set-AzWebApp -ResourceGroupName <RESOURCE_GROUP_NAME> -Name <APP_NAME> -Identity $app.Identity
            ```
        - id: terraform
          desc: |
            To ensure App Service managed identities are enabled for Entra ID in Terraform:

            ```hcl
            resource "azurerm_service_plan" "example" {
              name                = "example-plan"
              resource_group_name = azurerm_resource_group.example.name
              location            = azurerm_resource_group.example.location
              os_type             = "Linux"
              sku_name            = "B1"
            }

            resource "azurerm_linux_web_app" "example" {
              name                = "example-web-app"
              resource_group_name = azurerm_resource_group.example.name
              location            = azurerm_resource_group.example.location
              service_plan_id     = azurerm_service_plan.example.id

              site_config {}

              identity {
                type = "SystemAssigned"
              }
            }
            ```
        - id: bicep
          desc: |
            To ensure App Service managed identities are enabled for Entra ID in Bicep:

            ```bicep
            resource webApp 'Microsoft.Web/sites@2024-04-01' = {
              name: 'example-webapp'
              location: resourceGroup().location
              identity: {
                type: 'SystemAssigned'
              }
              properties: {
                serverFarmId: appServicePlan.id
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/app-service/overview-security
        title: Azure App Service Security
      - url: https://learn.microsoft.com/en-us/entra/fundamentals/security-defaults
        title: Microsoft Entra Security Defaults
  - uid: mondoo-azure-security-ensure-register-with-ad-is-enabled-on-app-service-azure
