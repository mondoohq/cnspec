      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-azure-security-recovery-vault-public-access-disabled-azure
        tags:
          mondoo.com/filter-title: Azure Recovery Services Vault
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-recovery-vault-public-access-disabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-recovery-vault-public-access-disabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-recovery-vault-public-access-disabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that public network access is disabled on Azure Recovery Services Vaults. Disabling public access forces all backup and restore traffic through private endpoints.

        **Why this matters**

        - Backup traffic may contain sensitive data including database backups, VM disk snapshots, and file system data.
        - Public network access exposes the vault endpoint to the internet, increasing the risk of unauthorized access or data interception.
        - Private endpoints ensure that all backup and restore operations traverse the Azure backbone network.

        **Risk mitigation**

        - **Network isolation:** Backup traffic stays within private network paths.
        - **Data protection:** Sensitive backup data does not traverse the public internet.
        - **Reduced attack surface:** Eliminates internet-facing endpoints for backup infrastructure.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Recovery Services vaults** in the Azure Portal.
        2. Select a vault.
        3. Go to **Networking** under **Settings**.
        4. Verify that **Public network access** is **Disabled**.
      remediation:
        - id: portal
          desc: |
            To disable public network access using the Azure Portal:

            1. Navigate to **Recovery Services vaults** in the Azure Portal.
            2. Select the vault.
            3. Go to **Networking** under **Settings**.
            4. Set **Public network access** to **Disabled**.
            5. Ensure private endpoints are configured before disabling.
        - id: cli
          desc: |
            Disable public network access on the Recovery Services Vault using the Azure CLI:

            ```bash
            az backup vault update \
              --name <VaultName> \
              --resource-group <ResourceGroupName> \
              --public-network-access Disable
            ```
        - id: terraform
          desc: |
            To disable public network access in Terraform:

            ```hcl
            resource "azurerm_recovery_services_vault" "example" {
              name                          = "example-vault"
              location                      = azurerm_resource_group.example.location
              resource_group_name           = azurerm_resource_group.example.name
              sku                           = "Standard"
              public_network_access_enabled = false
            }
            ```
        - id: bicep
          desc: |
            To disable public network access in Bicep:

            ```bicep
            resource vault 'Microsoft.RecoveryServices/vaults@2024-04-01' = {
              name: 'example-vault'
              location: resourceGroup().location
              sku: {
                name: 'RS0'
                tier: 'Standard'
              }
              properties: {
                publicNetworkAccess: 'Disabled'
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/backup/private-endpoints
        title: Create and use private endpoints for Azure Backup
