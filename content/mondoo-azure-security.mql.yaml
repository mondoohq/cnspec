  - uid: mondoo-azure-security-recovery-vault-soft-delete
    title: Ensure Recovery Services Vaults have soft delete enabled
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-bcr-08
      compliance/dora: dora-art-12
      compliance/hipaa: hipaa-security-ss164-308-a-7-ii-a-contingency-plan-data-backup-plan
      compliance/iso-27001-2022: iso-27001-2022-a-8-13
      compliance/nis-2: nis-2-21-2-c
      compliance/nist-csf-1: nist-csf-1-pr-ip-4
      compliance/nist-csf-2: nist-csf-2-pr-ds-11
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cp-9
      compliance/nist-sp-800-171: nist-sp-800-171--3-8-9
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc9-1-1
      compliance/vda-isa-5: false
    variants:
      - uid: mondoo-azure-security-recovery-vault-soft-delete-azure
        tags:
          mondoo.com/filter-title: Azure Recovery Services Vault
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-recovery-vault-soft-delete-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-recovery-vault-soft-delete-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-recovery-vault-soft-delete-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure Recovery Services Vaults have soft delete enabled. Soft delete retains backup data for 14 additional days after deletion, allowing recovery from accidental or malicious deletion of backup items.

        **Why this matters**

        - Without soft delete, deleted backups are immediately and permanently removed, making recovery impossible.
        - Ransomware attacks frequently target backup infrastructure to prevent recovery, making soft delete a critical defense.
        - Soft delete provides a safety net that allows backup administrators to recover deleted backup data within the retention window.

        **Risk mitigation**

        - **Ransomware protection:** Backup data remains recoverable even after deletion by a compromised admin account.
        - **Accidental deletion recovery:** Provides a grace period to recover mistakenly deleted backups.
        - **Compliance:** Satisfies backup retention and recoverability requirements.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Recovery Services vaults** in the Azure Portal.
        2. Select a vault.
        3. Go to **Properties** under **Settings**.
        4. Under **Security settings**, verify that **Soft delete** is enabled.
      remediation:
        - id: portal
          desc: |
            To enable soft delete using the Azure Portal:

            1. Navigate to **Recovery Services vaults** in the Azure Portal.
            2. Select the vault.
            3. Go to **Properties** under **Settings**.
            4. Under **Security settings**, select **Update**.
            5. Enable **Soft delete**.
            6. Save the changes.
        - id: cli
          desc: |
            Enable soft-delete on the Recovery Services Vault using the Azure CLI:

            ```bash
            az backup vault backup-properties set \
              --name <VaultName> \
              --resource-group <ResourceGroupName> \
              --soft-delete-feature-state Enable
            ```

            For an "Always-On" enforcement that cannot be disabled by the vault admin, set the state to `AlwaysON`.
        - id: terraform
          desc: |
            Soft delete is enabled by default on `azurerm_recovery_services_vault`. To make it explicit (and avoid drift if it is ever disabled out-of-band):

            ```hcl
            resource "azurerm_recovery_services_vault" "example" {
              name                = "example-vault"
              location            = azurerm_resource_group.example.location
              resource_group_name = azurerm_resource_group.example.name
              sku                 = "Standard"
              soft_delete_enabled = true
            }
            ```
        - id: bicep
          desc: |
            To enable soft delete in Bicep:

            ```bicep
            resource vault 'Microsoft.RecoveryServices/vaults@2024-04-01' = {
              name: 'example-vault'
              location: resourceGroup().location
              sku: {
                name: 'RS0'
                tier: 'Standard'
              }
              properties: {
                securitySettings: {
                  softDeleteSettings: {
                    softDeleteState: 'Enabled'
                    softDeleteRetentionPeriodInDays: 14
                  }
                }
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/backup/backup-azure-security-feature-cloud
        title: Soft delete for Azure Backup
  - uid: mondoo-azure-security-recovery-vault-soft-delete-azure
    filters: |
      asset.platform == "azure-recovery-services-vault"
    mql: |
      azure.subscription.recoveryServices.vault.securitySettings.softDeleteState == "Enabled" ||
      azure.subscription.recoveryServices.vault.securitySettings.softDeleteState == "AlwaysOn"
  - uid: mondoo-azure-security-recovery-vault-soft-delete-terraform-hcl
