  - uid: mondoo-azure-security-vpn-gateway-generation2
    title: Ensure VPN gateways use Generation2 for stronger cryptographic standards
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-13
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    variants:
      - uid: mondoo-azure-security-vpn-gateway-generation2-azure
        tags:
          mondoo.com/filter-title: Azure Subscription
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-vpn-gateway-generation2-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-vpn-gateway-generation2-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-vpn-gateway-generation2-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure VPN gateways use the Generation2 SKU, which supports higher throughput, more tunnels, and stronger cryptographic standards compared to Generation1 gateways.

        **Why this matters**

        - **Stronger cryptography:** Generation2 gateways support the latest cryptographic algorithms and higher key sizes, providing stronger protection for VPN tunnels.
        - **Higher performance:** Generation2 SKUs offer significantly higher throughput compared to Generation1, reducing the risk of performance-related security workarounds.
        - **More tunnels:** Generation2 supports more site-to-site tunnels, reducing the need to consolidate traffic through fewer, potentially less secure paths.
        - **Long-term support:** Generation1 gateways are legacy SKUs; Microsoft recommends Generation2 for all new deployments.

        **Risk mitigation**

        - **Deploy Generation2 at creation time:** VPN gateway generation is set at creation and cannot be changed in place; new gateways should always specify Generation2.
        - **Replace existing Generation1 gateways:** Migration requires recreating the gateway as Generation2, which should be planned with appropriate maintenance windows to avoid connectivity disruptions.
        - **Enforce via IaC templates:** Codify the Generation2 requirement in Terraform or Bicep templates so that no future gateway deployment can revert to Generation1 through manual configuration.
      audit: |
        **Automated Audit with Azure CLI:**

        ```bash
        az network vnet-gateway list --query "[?gatewayType=='Vpn'].{Name:name, Generation:vpnGatewayGeneration, Sku:sku.name}"
        ```
      remediation:
        - id: portal
          desc: |
            To ensure VPN gateways use Generation2 for stronger cryptographic standards using the Azure Portal:

            1. Navigate to **Virtual network gateways** in the Azure Portal.
            2. Select the VPN gateway.
            3. Under **Settings**, select **Configuration**.
            4. Review the **Generation** setting.

            Note: VPN gateway generation is set at creation time and cannot be changed. Existing Generation1 gateways must be recreated as Generation2.
        - id: cli
          desc: |
            To ensure VPN gateways use Generation2 for stronger cryptographic standards using the Azure CLI, VPN gateway generation must be specified at creation time. Existing Generation1 gateways must be recreated as Generation2:

            ```bash
            az network vnet-gateway create --name <GatewayName> --resource-group <ResourceGroupName> --vnet <VNetName> --gateway-type Vpn --vpn-type RouteBased --sku VpnGw2 --vpn-gateway-generation Generation2
            ```
        - id: terraform
          desc: |
            To ensure VPN gateways use Generation2 for stronger cryptographic standards in Terraform:

            ```hcl
            resource "azurerm_virtual_network_gateway" "example" {
              name                = "example-vpn-gateway"
              location            = azurerm_resource_group.example.location
              resource_group_name = azurerm_resource_group.example.name
              type                = "Vpn"
              vpn_type            = "RouteBased"
              sku                 = "VpnGw2"
              generation          = "Generation2"

              ip_configuration {
                name                 = "vnetGatewayConfig"
                public_ip_address_id = azurerm_public_ip.example.id
                subnet_id            = azurerm_subnet.example.id
              }
            }
            ```
        - id: bicep
          desc: |
            To ensure VPN gateways use Generation2 for stronger cryptographic standards in Bicep:

            ```bicep
            resource vpnGateway 'Microsoft.Network/virtualNetworkGateways@2024-05-01' = {
              name: 'example-vpn-gateway'
              location: resourceGroup().location
              properties: {
                gatewayType: 'Vpn'
                vpnType: 'RouteBased'
                vpnGatewayGeneration: 'Generation2'
                sku: {
                  name: 'VpnGw2'
                  tier: 'VpnGw2'
                }
                ipConfigurations: [
                  {
                    name: 'default'
                    properties: {
                      publicIPAddress: {
                        id: publicIp.id
                      }
                      subnet: {
                        id: gatewaySubnet.id
                      }
                    }
                  }
                ]
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/vpn-gateway/vpn-gateway-about-vpn-gateway-settings
        title: About VPN Gateway configuration settings
