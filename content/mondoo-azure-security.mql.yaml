  - uid: mondoo-azure-security-api-management-internal-vnet-mode
    title: Ensure API Management uses VNet integration
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-azure-security-api-management-internal-vnet-mode-azure
        tags:
          mondoo.com/filter-title: Azure API Management
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-api-management-internal-vnet-mode-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-api-management-internal-vnet-mode-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-api-management-internal-vnet-mode-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure API Management services are deployed with virtual network integration in either **Internal** or **External** mode rather than the default **None** mode, which leaves the gateway entirely on the public internet.

        **Why this matters**

        - **Network segmentation**: API Management gateways often front line-of-business APIs containing customer or partner data; running the gateway with no VNet integration places that traffic on the public internet by default.
        - **Internal mode** keeps the gateway endpoint fully private and reachable only from peered networks, which is the correct posture for APIs consumed by internal apps or partners over ExpressRoute or VPN.
        - **External mode** keeps the management plane and developer portal private while still publishing the gateway publicly. This is appropriate for public APIs, but only when paired with WAF and rate-limit policies.
        - **None mode** offers no network segmentation, leaving every API endpoint and the management plane exposed.

        **Risk mitigation**

        - Deploy API Management in **Internal** mode for internal APIs, and front public APIs with Application Gateway or Azure Front Door over Private Link to an **External**-mode gateway.
        - Do not run production API Management instances with `virtualNetworkType` set to **None**.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **API Management services** in the Azure Portal.
        2. Select a service instance.
        3. Open **Virtual network** under **Deployment + infrastructure**.
        4. Verify that the **Virtual network type** is **Internal** or **External**, not **None**.

        **Automated Audit with Azure CLI:**

        ```bash
        az apim show --resource-group <ResourceGroupName> --name <ApiManagementServiceName> --query "virtualNetworkType"
        ```
      remediation:
        - id: portal
          desc: |
            To configure VNet integration on an API Management service using the Azure Portal:

            1. Navigate to **API Management services** in the Azure Portal.
            2. Select the service instance (must be Developer or Premium SKU for VNet integration).
            3. Under **Deployment + infrastructure**, select **Virtual network**.
            4. Set **Virtual network type** to **Internal** (recommended) or **External**.
            5. Select the target virtual network and subnet.
            6. Select **Apply**.
        - id: cli
          desc: |
            To configure VNet integration on an API Management service using the Azure CLI:

            ```bash
            az apim update --resource-group <ResourceGroupName> --name <ApiManagementServiceName> --set virtualNetworkType=Internal virtualNetworkConfiguration.subnetResourceId=<SubnetResourceId>
            ```
        - id: terraform
          desc: |
            To configure VNet integration on an API Management service in Terraform:

            ```hcl
            resource "azurerm_api_management" "example" {
              name                 = "example-apim"
              location             = azurerm_resource_group.example.location
              resource_group_name  = azurerm_resource_group.example.name
              publisher_name       = "Example Publisher"
              publisher_email      = "publisher@example.com"
              sku_name             = "Premium_1"
              virtual_network_type = "Internal"

              virtual_network_configuration {
                subnet_id = azurerm_subnet.apim.id
              }
            }
            ```
        - id: bicep
          desc: |
            To configure VNet integration on an API Management service in Bicep:

            ```bicep
            resource apiManagement 'Microsoft.ApiManagement/service@2023-05-01-preview' = {
              name: 'example-apim'
              location: resourceGroup().location
              sku: {
                name: 'Premium'
                capacity: 1
              }
              properties: {
                publisherEmail: 'publisher@example.com'
                publisherName: 'Example Publisher'
                virtualNetworkType: 'Internal'
                virtualNetworkConfiguration: {
                  subnetResourceId: subnet.id
                }
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/api-management/virtual-network-concepts
        title: Use a virtual network with Azure API Management
  - uid: mondoo-azure-security-api-management-internal-vnet-mode-azure
    filters: |
      asset.platform == "azure"
    mql: |
      azure.subscription.apiManagement.services.all(
        virtualNetworkType == "Internal" || virtualNetworkType == "External"
      )
