      - uid: mondoo-azure-security-synapse-managed-vnet-azure
        tags:
          mondoo.com/filter-title: Azure Synapse Workspace
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-synapse-managed-vnet-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-synapse-managed-vnet-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-synapse-managed-vnet-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure Synapse Analytics workspaces are configured with a managed virtual network.

        **Why this matters**

        - **Network isolation**: A managed virtual network provides network-level isolation for Spark pools and pipeline integration runtimes, ensuring they run within a dedicated, isolated network environment.
        - **Data exfiltration protection**: With a managed VNet, you can enable data exfiltration protection to restrict outbound traffic from the workspace to only approved targets.

        **Risk mitigation**

        - Enable managed virtual network during workspace creation (this setting cannot be changed after creation).
        - Configure managed private endpoints to securely connect to data sources from within the managed VNet.
      audit: |
        ### Audit via Portal

        1. Navigate to **Azure Synapse Analytics** in the Azure Portal.
        2. Select the target workspace.
        3. Under **Properties**, review the **Managed virtual network** field.

        A passing resource shows **Enabled** for the managed virtual network. A failing resource shows **Disabled** or no value.

        ### Audit via CLI

        1. Run the following command, replacing `<resource-group-name>` and `<workspace-name>` with the target values:

        ```bash
        az synapse workspace show \
          --resource-group <resource-group-name> \
          --name <workspace-name> \
          --query "managedVirtualNetwork" \
          --output tsv
        ```

        A passing resource returns `default`. A failing resource returns an empty string or no value.
      remediation:
        - id: portal
          desc: |
            To ensure Synapse Analytics uses managed virtual network using the Azure Portal:

            1. Navigate to the [Azure Portal](https://portal.azure.com).
            2. When creating a new Synapse workspace, go to the **Networking** tab.
            3. Under **Managed virtual network**, select **Enable**.
            4. Optionally enable **Data exfiltration protection** and specify allowed Azure AD tenants.
            5. Complete the workspace creation.

            **Note**: Managed virtual network can only be enabled during workspace creation. Existing workspaces without it must be recreated.
        - id: cli
          desc: |
            To ensure Synapse Analytics uses managed virtual network using the Azure CLI:

            ```bash
            az synapse workspace create \
              --resource-group <resource-group-name> \
              --name <workspace-name> \
              --location <location> \
              --storage-account <storage-account-name> \
              --file-system <filesystem-name> \
              --sql-admin-login-user <admin-user> \
              --sql-admin-login-password <admin-password> \
              --enable-managed-virtual-network true
            ```
        - id: terraform
          desc: |
            To ensure Synapse Analytics uses managed virtual network in Terraform:

            ```hcl
            resource "azurerm_synapse_workspace" "example" {
              name                                 = "example-synapse"
              resource_group_name                  = azurerm_resource_group.example.name
              location                             = azurerm_resource_group.example.location
              storage_data_lake_gen2_filesystem_id = azurerm_storage_data_lake_gen2_filesystem.example.id
              sql_administrator_login              = "sqladminuser"
              sql_administrator_login_password     = var.sql_admin_password

              managed_virtual_network_enabled = true
            }
            ```
        - id: bicep
          desc: |
            To ensure Synapse Analytics uses managed virtual network in Bicep:

            ```bicep
            @secure()
            param sqlAdminPassword string

            resource synapseWorkspace 'Microsoft.Synapse/workspaces@2021-06-01' = {
              name: 'example-synapse'
              location: resourceGroup().location
              properties: {
                defaultDataLakeStorage: {
                  accountUrl: 'https://examplestorage.dfs.core.windows.net'
                  filesystem: 'example-fs'
                }
                sqlAdministratorLogin: 'sqladminuser'
                sqlAdministratorLoginPassword: sqlAdminPassword
                managedVirtualNetwork: 'default'
              }
            }
            ```
