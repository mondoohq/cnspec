      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-azure-security-firewall-policy-configured-azure
        tags:
          mondoo.com/filter-title: Azure Subscription
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-firewall-policy-configured-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-firewall-policy-configured-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-firewall-policy-configured-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure Firewall instances are configured to have a firewall policy attached. Without a policy, firewall rules are managed through the legacy classic rules API, which does not support Premium features and does not allow rule sharing across multiple firewalls.

        **Why this matters**

        - **Centralized management:** Firewall policies provide a single location to manage rules across multiple firewalls, reducing configuration drift and administrative overhead.
        - **Policy inheritance:** Policies support hierarchical structures where child policies inherit rules from parent policies, enabling consistent baseline rules across the organization.
        - **Premium feature access:** Features such as IDPS, URL filtering, and TLS inspection are only available when the firewall is attached to a Premium-tier firewall policy.
        - **Rule prioritization:** Policies organize rules into rule collection groups with explicit priority ordering, reducing the risk of unintended rule shadowing.

        **Risk mitigation**

        - **Prevent rule drift:** Attaching a shared policy ensures all firewall instances enforce the same rule baseline, preventing permissive one-off rules from accumulating on individual firewalls.
        - **Enable security features:** A policy is required to unlock IDPS and TLS inspection on Premium firewalls, which block active network-layer threats.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Firewalls** in the Azure Portal.
        2. Select an Azure Firewall instance.
        3. Go to **Overview**.
        4. Verify that a **Firewall policy** is associated with the firewall.

        **Automated Audit with Azure CLI:**

        ```bash
        az network firewall list --query "[].{Name:name, ResourceGroup:resourceGroup, FirewallPolicy:firewallPolicy.id}" -o table
        ```

        **Automated Audit with PowerShell:**

        ```powershell
        Get-AzFirewall | Select-Object Name, ResourceGroupName, @{N="FirewallPolicy";E={$_.FirewallPolicy.Id}}
        ```
      remediation:
        - id: portal
          desc: |
            To ensure Azure Firewall has a firewall policy attached using the Azure Portal:

            1. Navigate to **Firewalls** in the Azure Portal.
            2. Select the Azure Firewall instance.
            3. Go to **Firewall policy** under **Settings**.
            4. Select **Associate a firewall policy**.
            5. Select an existing policy or create a new one.
            6. Select **Save**.
        - id: cli
          desc: |
            To ensure Azure Firewall has a firewall policy attached using the Azure CLI:

            ```bash
            az network firewall update --name <FirewallName> --resource-group <ResourceGroupName> --firewall-policy <PolicyResourceId>
            ```
        - id: powershell
          desc: |
            To ensure Azure Firewall has a firewall policy attached using PowerShell:

            ```powershell
            $policy = Get-AzFirewallPolicy -Name <PolicyName> -ResourceGroupName <ResourceGroupName>
            $firewall = Get-AzFirewall -Name <FirewallName> -ResourceGroupName <ResourceGroupName>
            $firewall.FirewallPolicy = $policy.Id
            Set-AzFirewall -AzureFirewall $firewall
            ```
        - id: terraform
          desc: |
            To ensure Azure Firewall has a firewall policy attached in Terraform:

            ```hcl
            resource "azurerm_firewall_policy" "example" {
              name                = "example-policy"
              location            = azurerm_resource_group.example.location
              resource_group_name = azurerm_resource_group.example.name
            }

            resource "azurerm_firewall" "example" {
              name                = "example-firewall"
              location            = azurerm_resource_group.example.location
              resource_group_name = azurerm_resource_group.example.name
              sku_name            = "AZFW_VNet"
              sku_tier            = "Premium"
              firewall_policy_id  = azurerm_firewall_policy.example.id
            }
            ```
        - id: bicep
          desc: |
            To ensure Azure Firewall has a firewall policy attached in Bicep:

            ```bicep
            resource firewallPolicy 'Microsoft.Network/firewallPolicies@2024-05-01' = {
              name: 'example-policy'
              location: resourceGroup().location
              properties: {
                sku: {
                  tier: 'Premium'
                }
              }
            }

            resource firewall 'Microsoft.Network/azureFirewalls@2024-05-01' = {
              name: 'example-firewall'
              location: resourceGroup().location
              properties: {
                firewallPolicy: {
                  id: firewallPolicy.id
                }
                // ...
              }
            }
            ```
