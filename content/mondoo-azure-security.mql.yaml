  - uid: mondoo-azure-security-postgresql-flexible-geo-backup
    title: Ensure PostgreSQL Flexible Server has geo-redundant backup
    impact: 70
    variants:
      - uid: mondoo-azure-security-postgresql-flexible-geo-backup-azure
        tags:
          mondoo.com/filter-title: Azure PostgreSQL Flexible Server
          mondoo.com/icon: azure
      - uid: mondoo-azure-security-postgresql-flexible-geo-backup-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/icon: terraform
      - uid: mondoo-azure-security-postgresql-flexible-geo-backup-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/icon: terraform
      - uid: mondoo-azure-security-postgresql-flexible-geo-backup-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/icon: terraform
    docs:
      desc: |
        This check ensures that Azure Database for PostgreSQL Flexible Server has geo-redundant backup enabled, protecting data against regional outages.

        **Why this matters**

        - **Disaster recovery**: Without geo-redundant backup, a regional outage can result in data loss beyond the backup retention window.
        - **Business continuity**: Geo-redundant backups enable recovery to a paired Azure region, maintaining business continuity during regional disasters.
        - **Compliance alignment**: Many regulatory frameworks require geographically distributed backups for critical data.

        **Risk mitigation**

        - Enable geo-redundant backup on PostgreSQL Flexible Server instances that store critical data.
        - Test recovery procedures regularly to ensure backup integrity.
      remediation:
        - id: portal
          desc: |
            **Using Azure Portal**

            1. Navigate to **Azure Database for PostgreSQL flexible servers** in the Azure Portal.
            2. Select the server instance.
            3. Under **Settings**, select **Compute + storage**.
            4. Under **Backup**, verify that **Geo-redundant backup** is enabled.

            Note: Geo-redundant backup must be enabled at server creation time and cannot be changed afterward.
        - id: cli
          desc: |
            **Using Azure CLI**

            Geo-redundant backup must be enabled at server creation:

            ```bash
            az postgres flexible-server create --resource-group <ResourceGroupName> --name <ServerName> --geo-redundant-backup Enabled
            ```
        - id: terraform
          desc: |
            **Using Terraform**

            ```hcl
            resource "azurerm_postgresql_flexible_server" "example" {
              name                         = "example-psql"
              resource_group_name          = azurerm_resource_group.example.name
              location                     = azurerm_resource_group.example.location
              administrator_login          = "adminuser"
              administrator_password       = var.administrator_password
              geo_redundant_backup_enabled = true
              sku_name                     = "GP_Standard_D2s_v3"
            }
            ```
        - id: bicep
          desc: |
            **Using Bicep**

            ```bicep
            resource postgresServer 'Microsoft.DBforPostgreSQL/flexibleServers@2022-12-01' = {
              name: 'example-psql'
              location: resourceGroup().location
              properties: {
                backup: {
                  geoRedundantBackup: 'Enabled'
                  backupRetentionDays: 7
                }
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/postgresql/flexible-server/concepts-backup-restore
        title: Backup and restore in Azure Database for PostgreSQL Flexible Server
  - uid: mondoo-azure-security-postgresql-flexible-geo-backup-azure
    filters: |
      asset.platform == "azure-postgresql-flexible-server"
    mql: |
      azure.subscription.postgreSql.flexibleServer.geoRedundantBackup == "Enabled"
  - uid: mondoo-azure-security-postgresql-flexible-geo-backup-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "azurerm_postgresql_flexible_server")
    mql: |
      terraform.resources.where(nameLabel == "azurerm_postgresql_flexible_server").all(
        arguments['geo_redundant_backup_enabled'] == true
      )
  - uid: mondoo-azure-security-postgresql-flexible-geo-backup-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "azurerm_postgresql_flexible_server")
    mql: |
      terraform.plan.resourceChanges.where(type == "azurerm_postgresql_flexible_server").all(
        change.after['geo_redundant_backup_enabled'] == true
      )
  - uid: mondoo-azure-security-postgresql-flexible-geo-backup-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "azurerm_postgresql_flexible_server")
    mql: |
      terraform.state.resources.where(type == "azurerm_postgresql_flexible_server").all(
        values['geo_redundant_backup_enabled'] == true
      )
