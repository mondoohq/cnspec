  - uid: mondoo-azure-security-acr-network-default-deny
    title: Ensure ACR network rule default action is Deny
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-azure-security-acr-network-default-deny-azure
        tags:
          mondoo.com/filter-title: Azure Container Registry
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-acr-network-default-deny-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-acr-network-default-deny-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-acr-network-default-deny-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that the network rule set default action is set to Deny for Azure Container Registry instances. A default Deny action blocks all network access except explicitly allowed IP ranges and virtual networks.

        **Why this matters**

        - A default Allow action permits access from any network, exposing the registry to the internet.
        - Setting the default action to Deny implements a zero-trust network model where only explicitly trusted sources can access the registry.
        - Network rules work in conjunction with private endpoints to provide defense in depth.

        **Risk mitigation**

        - **Zero-trust networking:** Only explicitly allowed networks can access the registry.
        - **Defense in depth:** Network rules complement authentication and authorization controls.
        - **Reduced attack surface:** Blocks access from untrusted networks by default.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Container registries** in the Azure Portal.
        2. Select a container registry (must be Premium SKU).
        3. Go to **Networking** under **Settings**.
        4. Verify that **Default action** is set to **Deny**.

        **Automated Audit with Azure CLI:**

        ```bash
        az acr show --name <RegistryName> --query "networkRuleSet.defaultAction"
        ```
      remediation:
        - id: portal
          desc: |
            To set the network rule default action to Deny using the Azure Portal:

            1. Navigate to **Container registries** in the Azure Portal.
            2. Select the container registry (must be Premium SKU).
            3. Go to **Networking** under **Settings**.
            4. Under **Public access**, select **Selected networks**.
            5. Configure allowed IP ranges and virtual networks.
            6. Save the changes.
        - id: cli
          desc: |
            To set the network rule default action to Deny using the Azure CLI:

            ```bash
            az acr update --registry-name <RegistryName> --default-action Deny
            ```
        - id: terraform
          desc: |
            To set the network rule default action to Deny in Terraform:

            ```hcl
            resource "azurerm_container_registry" "example" {
              name                = "exampleregistry"
              resource_group_name = azurerm_resource_group.example.name
              location            = azurerm_resource_group.example.location
              sku                 = "Premium"

              network_rule_set {
                default_action = "Deny"
              }
            }
            ```
        - id: bicep
          desc: |
            To set the network rule default action to Deny in Bicep:

            ```bicep
            resource acr 'Microsoft.ContainerRegistry/registries@2023-07-01' = {
              name: 'exampleregistry'
              location: resourceGroup().location
              sku: {
                name: 'Premium'
              }
              properties: {
                networkRuleSet: {
                  defaultAction: 'Deny'
                }
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/container-registry/container-registry-access-selected-networks
        title: Configure public IP network rules
  - uid: mondoo-azure-security-acr-network-default-deny-azure
    filters: |
      asset.platform == "azure-container-registry"
    mql: |
      azure.subscription.containerRegistry.registry.networkRuleSet.defaultAction == "Deny"
  - uid: mondoo-azure-security-acr-network-default-deny-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "azurerm_container_registry")
    mql: |
      terraform.resources.where(nameLabel == "azurerm_container_registry").all(
        blocks.where(type == "network_rule_set") != empty &&
        blocks.where(type == "network_rule_set").all(
          arguments['default_action'] == "Deny"
