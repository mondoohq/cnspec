  - uid: mondoo-azure-security-public-access-level-private-blob-containers
    title: Ensure blob anonymous access and storage public access are disabled
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-2-1
    variants:
      - uid: mondoo-azure-security-public-access-level-private-blob-containers-azure
        tags:
          mondoo.com/filter-title: Azure Storage Account
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-public-access-level-private-blob-containers-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-public-access-level-private-blob-containers-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-public-access-level-private-blob-containers-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure storage accounts are configured to deny anonymous blob access and disable public network access at the account level. By default, Azure storage accounts allow public network access, and blob containers can be individually configured for anonymous read access.

        **Why this matters**

        - **Unauthenticated data exposure**: Anonymous blob access allows any internet user to read container contents without credentials; a single misconfigured container can expose sensitive files to the world.
        - **Mass enumeration risk**: Public storage accounts are actively scanned by automated tools that enumerate blob containers and file names, accelerating reconnaissance when any container is accessible.
        - **Accidental oversharing**: Developers who enable anonymous access for a single test container often forget to restrict it before deploying to production, creating a silent disclosure path for business data.
        - **No audit trail**: Anonymous requests do not appear in standard authentication logs, making it impossible to determine who accessed data or how much was downloaded after a disclosure is discovered.

        **Risk mitigation**

        - **Account-level public access control**: Setting allow blob public access to false at the account level prevents any container in the account from being configured for anonymous access, regardless of per-container settings.
        - **Reduced blast radius**: Disabling public network access at the account level forces all traffic through authenticated paths and can be combined with service endpoints or private endpoints to eliminate internet exposure entirely.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Go to Storage Accounts.
        2. For each storage account, go to the Networking setting under Security + networking.
        3. Ensure the 'Public Network Access' setting is set to 'Disabled'.
        4. In the storage account menu pane, under the 'Settings' section, select 'Configuration'.
        5. Under 'Allow Blob Anonymous Access', ensure that the setting is 'Disabled'.

        **Automated Audit with Azure CLI:**

        1. Authenticate using az login and ensure you are in the correct subscription.
        2. Use the following command to check the 'Public Network Access' setting:

        ```bash
        az storage account show --name <storage-account> --resource-group <resource-group> --query "{publicNetworkAccess:publicNetworkAccess}"
        ```

        ```bash
        az storage account show --name <yourStorageAccountName> --query allowBlobPublicAccess
        ```
      remediation:
        - id: portal
          desc: |
            To ensure blob anonymous access and storage public access are disabled using the Azure Portal:

            1. Go to Storage Accounts.
            2. For each storage account, go to Networking in Security + networking.
            3. Set 'Public Network Access' to 'Disabled'.
            4. Select a Storage Account and in the settings pane, select 'Configuration'.
            5. Under 'Allow Blob Anonymous Access', select 'Disabled'.
            6. For each container, change the access level to 'Private (no anonymous access)'.
        - id: cli
          desc: |
            To ensure blob anonymous access and storage public access are disabled using the Azure CLI:

            - Disable public network access:

              ```bash
              az storage account update --name <storage-account> --resource-group <resource-group> --public-network-access Disabled
              ```

            - Set blob containers to private access:

              ```bash
              az storage container set-permission --name <container_name> --public-access off --account-name <account_name> --account-key <account_key>
              ```
        - id: powershell
          desc: |
            To ensure blob anonymous access and storage public access are disabled using PowerShell:

            - Disable public network access:

              ```powershell
              Set-AzStorageAccount -Name <storage-account> -ResourceGroupName <resource-group> -PublicNetworkAccess Disabled
              ```

            - Set blob containers to private access:

              ```powershell
              Set-AzStorageContainerAcl -Name <container_name> -PublicAccess Off -Context $context
              ```
        - id: terraform
          desc: |
            To ensure blob anonymous access and storage public access are disabled in Terraform:

            ```hcl
            # Ensure the `allow_nested_items_to_be_public` is set to `false`

            resource "azurerm_storage_account" "example_storage_account" {
              ...
              allow_nested_items_to_be_public = false
            }
            ```

            ```hcl
            # Ensure the `container_access_type` is set to `private`
            resource "azurerm_storage_container" "example_container" {
              ...
              container_access_type = "private"
            }
            ```
        - id: bicep
          desc: |
            To ensure blob anonymous access and storage public access are disabled in Bicep:

            ```bicep
            resource storageAccount 'Microsoft.Storage/storageAccounts@2023-05-01' = {
              name: 'examplestorageaccount'
              location: resourceGroup().location
              kind: 'StorageV2'
              sku: {
                name: 'Standard_LRS'
              }
              properties: {
                allowBlobPublicAccess: false
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/storage/common/storage-security-guide
        title: Azure Storage Security Guide
