      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-12
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-10
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc6-1-11
      compliance/vda-isa-5: false
    variants:
      - uid: mondoo-azure-security-managed-hsm-purge-protection-azure
        tags:
          mondoo.com/filter-title: Azure Subscription
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-managed-hsm-purge-protection-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-managed-hsm-purge-protection-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-managed-hsm-purge-protection-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure Managed HSM instances have purge protection enabled. Purge protection prevents permanent deletion of a soft-deleted HSM until the retention period expires, even by privileged administrators.

        **Why this matters**

        - Without purge protection, a soft-deleted HSM can be permanently purged before the retention period expires, making recovery impossible.
        - Managed HSMs contain FIPS 140-2 Level 3 validated hardware-protected keys used for the most sensitive cryptographic operations.
        - Purge protection is critical for protecting against malicious insider attacks where an attacker with admin privileges attempts to permanently destroy key material.

        **Risk mitigation**

        - **Immutable retention:** Prevents permanent deletion during the retention window.
        - **Insider threat protection:** Even administrators cannot bypass the retention period.
        - **Regulatory compliance:** Satisfies requirements for key recovery and data protection.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Managed HSMs** in the Azure Portal.
        2. Select a Managed HSM.
        3. Go to **Properties**.
        4. Verify that **Purge protection** is enabled.

        **Automated Audit with Azure CLI:**

        ```bash
        az keyvault show --hsm-name <HSMName> --query "properties.enablePurgeProtection"
        ```
      remediation:
        - id: portal
          desc: |
            To enable purge protection using the Azure Portal:

            1. Navigate to **Managed HSMs** in the Azure Portal.
            2. Select the Managed HSM.
            3. Go to **Properties**.
            4. Enable **Purge protection**.

            Note: Once enabled, purge protection cannot be disabled.
        - id: cli
          desc: |
            To enable purge protection using the Azure CLI:

            ```bash
            az keyvault update-hsm --name <HSMName> --enable-purge-protection true
            ```
        - id: terraform
          desc: |
            To enable purge protection in Terraform:

            ```hcl
            resource "azurerm_key_vault_managed_hardware_security_module" "example" {
              name                       = "example-hsm"
              resource_group_name        = azurerm_resource_group.example.name
              location                   = azurerm_resource_group.example.location
              sku_name                   = "Standard_B1"
              tenant_id                  = data.azurerm_client_config.current.tenant_id
              admin_object_ids           = [data.azurerm_client_config.current.object_id]
              purge_protection_enabled   = true
              soft_delete_retention_days = 90
            }
            ```
        - id: bicep
          desc: |
            To enable purge protection in Bicep:

            ```bicep
            resource managedHsm 'Microsoft.KeyVault/managedHSMs@2023-07-01' = {
              name: 'example-hsm'
              location: resourceGroup().location
              sku: {
                family: 'B'
                name: 'Standard_B1'
              }
              properties: {
                tenantId: subscription().tenantId
                initialAdminObjectIds: [
                  adminObjectId
                ]
                enablePurgeProtection: true
                enableSoftDelete: true
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/key-vault/managed-hsm/soft-delete-overview
        title: Managed HSM soft delete and purge protection
