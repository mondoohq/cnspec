  - uid: mondoo-azure-security-synapse-aad-only-auth
    title: Ensure Synapse uses Azure AD-only authentication
    impact: 80
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-j
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-3
      compliance/soc2-2017: soc2-control-cc6-1-1
    variants:
      - uid: mondoo-azure-security-synapse-aad-only-auth-azure
        tags:
          mondoo.com/filter-title: Azure Subscription
          mondoo.com/icon: azure
      - uid: mondoo-azure-security-synapse-aad-only-auth-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/icon: terraform
      - uid: mondoo-azure-security-synapse-aad-only-auth-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/icon: terraform
      - uid: mondoo-azure-security-synapse-aad-only-auth-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/icon: terraform
    docs:
      desc: |
        This check ensures that Azure Synapse Analytics workspaces are configured to use Azure Active Directory (Azure AD) only authentication, disabling local SQL authentication.

        **Why this matters**

        - **Centralized identity management**: Azure AD-only authentication ensures all access is managed through a centralized identity provider with support for multi-factor authentication, conditional access, and identity governance.
        - **Eliminate password-based attacks**: Disabling SQL authentication removes the risk of brute force attacks, credential stuffing, and password spraying against SQL administrator accounts.

        **Risk mitigation**

        - Configure an Azure AD administrator for the Synapse workspace before enabling Azure AD-only authentication.
        - Ensure all applications and users accessing the workspace are registered in Azure AD and have appropriate role assignments.
      remediation:
        - id: portal
          desc: |
            **Using Azure Portal**

            1. Navigate to the [Azure Portal](https://portal.azure.com).
            2. Go to **Azure Synapse Analytics** and select the target workspace.
            3. Under **Settings**, select **Azure Active Directory**.
            4. Set an **Azure AD admin** for the workspace.
            5. Enable **Azure Active Directory authentication only**.
            6. Click **Save**.
        - id: cli
          desc: |
            **Using Azure CLI**

            ```bash
            # Set Azure AD admin
            az synapse workspace aad-admin create \
              --resource-group <resource-group-name> \
              --workspace-name <workspace-name> \
              --display-name <admin-display-name> \
              --object-id <admin-object-id>

            # Enable Azure AD-only authentication
            az synapse workspace update \
              --resource-group <resource-group-name> \
              --name <workspace-name> \
              --azure-ad-only-auth true
            ```
        - id: terraform
          desc: |
            **Using Terraform**

            ```hcl
            resource "azurerm_synapse_workspace" "example" {
              name                                 = "example-synapse"
              resource_group_name                  = azurerm_resource_group.example.name
              location                             = azurerm_resource_group.example.location
              storage_data_lake_gen2_filesystem_id = azurerm_storage_data_lake_gen2_filesystem.example.id
              sql_administrator_login              = "sqladminuser"
              sql_administrator_login_password     = "H@Sh1CoR3!"

              aad_admin {
                login     = "AzureAD Admin"
                object_id = "00000000-0000-0000-0000-000000000000"
                tenant_id = "00000000-0000-0000-0000-000000000000"
              }
            }
            ```
        - id: bicep
          desc: |
            **Using Bicep**

            ```bicep
            resource synapseWorkspace 'Microsoft.Synapse/workspaces@2021-06-01' = {
              name: 'example-synapse'
              location: resourceGroup().location
              properties: {
                defaultDataLakeStorage: {
                  accountUrl: 'https://examplestorage.dfs.core.windows.net'
                  filesystem: 'example-fs'
                }
                sqlAdministratorLogin: 'sqladminuser'
                sqlAdministratorLoginPassword: 'H@Sh1CoR3!'
                azureADOnlyAuthentication: true
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/synapse-analytics/sql/active-directory-authentication
        title: Azure AD authentication with Azure Synapse Analytics
  - uid: mondoo-azure-security-synapse-aad-only-auth-azure
    filters: |
      asset.platform == "azure"
    mql: |
      azure.subscription.synapse.workspaces.all(
        azureADOnlyAuthentication == true
      )
  - uid: mondoo-azure-security-synapse-aad-only-auth-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "azurerm_synapse_workspace")
    mql: |
      terraform.resources.where(nameLabel == "azurerm_synapse_workspace").all(
        blocks.where(type == "aad_admin") != empty
      )
  - uid: mondoo-azure-security-synapse-aad-only-auth-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "azurerm_synapse_workspace")
    mql: |
      terraform.plan.resourceChanges.where(type == "azurerm_synapse_workspace").all(
        change.after['aad_admin'] != empty
      )
  - uid: mondoo-azure-security-synapse-aad-only-auth-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "azurerm_synapse_workspace")
    mql: |
      terraform.state.resources.where(type == "azurerm_synapse_workspace").all(
        values['aad_admin'] != empty
      )
  - uid: mondoo-azure-security-synapse-cmk-encryption
    title: Ensure Synapse uses customer-managed key encryption
    impact: 70
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/soc2-2017: soc2-control-cc6-1-1
    variants:
      - uid: mondoo-azure-security-synapse-cmk-encryption-azure
        tags:
          mondoo.com/filter-title: Azure Subscription
          mondoo.com/icon: azure
      - uid: mondoo-azure-security-synapse-cmk-encryption-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/icon: terraform
      - uid: mondoo-azure-security-synapse-cmk-encryption-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/icon: terraform
      - uid: mondoo-azure-security-synapse-cmk-encryption-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/icon: terraform
    docs:
      desc: |
        This check ensures that Azure Synapse Analytics workspaces are configured with customer-managed key (CMK) encryption.

        **Why this matters**

        - **Full encryption control**: Customer-managed keys provide your organization with complete control over the encryption keys protecting data at rest in Synapse, including dedicated SQL pools, serverless SQL pools, and Apache Spark pools.
        - **Compliance requirements**: Many regulatory frameworks and industry standards require organizations to manage their own encryption keys for sensitive data processing and analytics workloads.

        **Risk mitigation**

        - Store customer-managed keys in Azure Key Vault with soft delete and purge protection enabled.
        - Enable double encryption to add an additional layer of protection using a service-managed key alongside the customer-managed key.
      remediation:
        - id: portal
          desc: |
            **Using Azure Portal**

            1. Navigate to the [Azure Portal](https://portal.azure.com).
            2. Go to **Azure Synapse Analytics** and select the target workspace.
            3. Under **Security**, select **Encryption**.
            4. Select **Customer-Managed Key**.
            5. Select the Key Vault and key to use for encryption.
            6. Click **Save**.
        - id: cli
          desc: |
            **Using Azure CLI**

            ```bash
            az synapse workspace update \
              --resource-group <resource-group-name> \
              --name <workspace-name> \
              --key-name "cmk" \
              --encryption-key-name "<key-vault-key-name>" \
              --encryption-key-identifier "https://<key-vault-name>.vault.azure.net/keys/<key-name>/<key-version>"
            ```
        - id: terraform
          desc: |
            **Using Terraform**

            ```hcl
            resource "azurerm_synapse_workspace" "example" {
              name                                 = "example-synapse"
              resource_group_name                  = azurerm_resource_group.example.name
              location                             = azurerm_resource_group.example.location
              storage_data_lake_gen2_filesystem_id = azurerm_storage_data_lake_gen2_filesystem.example.id
              sql_administrator_login              = "sqladminuser"
              sql_administrator_login_password     = "H@Sh1CoR3!"

              customer_managed_key {
                key_versionless_id = azurerm_key_vault_key.example.versionless_id
                key_name           = "enckey"
              }
            }
            ```
        - id: bicep
          desc: |
            **Using Bicep**

            ```bicep
            resource synapseWorkspace 'Microsoft.Synapse/workspaces@2021-06-01' = {
              name: 'example-synapse'
              location: resourceGroup().location
              properties: {
                defaultDataLakeStorage: {
                  accountUrl: 'https://examplestorage.dfs.core.windows.net'
                  filesystem: 'example-fs'
                }
                sqlAdministratorLogin: 'sqladminuser'
                sqlAdministratorLoginPassword: 'H@Sh1CoR3!'
                encryption: {
                  cmk: {
                    key: {
                      name: 'enckey'
                      keyVaultUrl: 'https://example-keyvault.vault.azure.net/keys/example-key/version'
                    }
                  }
                }
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/synapse-analytics/security/workspaces-encryption
        title: Azure Synapse Analytics workspace encryption
  - uid: mondoo-azure-security-synapse-cmk-encryption-azure
    filters: |
      asset.platform == "azure"
    mql: |
