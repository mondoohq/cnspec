    docs:
      desc: |
        This check ensures that Azure Firewall Policy is configured to have Intrusion Detection and Prevention System (IDPS) set to Deny mode. Alert-only mode logs threats but does not prevent them from reaching protected resources, leaving the network exposed to known attack patterns.

        **Why this matters**

        - **Active blocking:** Deny mode actively drops packets that match known attack signatures rather than just logging them, preventing exploit traffic from reaching backend workloads.
        - **Signature-based detection:** IDPS uses a continuously updated signature library to detect malware command-and-control traffic, exploit attempts, and botnet activity crossing the network boundary.
        - **Encrypted traffic coverage:** Combined with TLS inspection on the Premium SKU, IDPS can inspect encrypted traffic for threats that would otherwise be hidden from signature matching.
        - **Reduced dwell time:** Blocking known attack patterns at the network perimeter shortens attacker dwell time by stopping lateral movement and C2 communication before deeper access is established.

        **Risk mitigation**

        - **Block known exploits:** Setting IDPS to Deny rather than Alert stops traffic matching published CVE exploit signatures before it reaches workloads.
        - **Complement perimeter rules:** IDPS catches threat traffic that passes through explicitly allowed ports and protocols, closing gaps that traditional allow/deny rules leave open.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Firewall Policies** in the Azure Portal.
        2. Select a firewall policy.
        3. Go to **IDPS** under **Settings**.
        4. Verify that IDPS mode is set to **Alert and deny**.

        **Automated Audit with Azure CLI:**

        ```bash
        az network firewall policy list --query "[].{Name:name, ResourceGroup:resourceGroup, IDPSMode:intrusionDetection.mode}" -o table
        ```

        **Automated Audit with PowerShell:**

        ```powershell
        Get-AzFirewallPolicy | Select-Object Name, ResourceGroupName, @{N="IDPSMode";E={$_.IntrusionDetection.Mode}}
        ```
      remediation:
        - id: portal
          desc: |
            To ensure Azure Firewall Policy has IDPS set to Deny mode using the Azure Portal:

            1. Navigate to **Firewall Policies** in the Azure Portal.
            2. Select the firewall policy.
            3. Go to **IDPS** under **Settings**.
            4. Set the IDPS mode to **Alert and deny**.
            5. Configure signature rules as needed.
            6. Select **Save**.
        - id: cli
          desc: |
            To ensure Azure Firewall Policy has IDPS set to Deny mode using the Azure CLI:

            ```bash
            az network firewall policy update --name <PolicyName> --resource-group <ResourceGroupName> --idps-mode Deny
            ```
        - id: powershell
          desc: |
            To ensure Azure Firewall Policy has IDPS set to Deny mode using PowerShell:

            ```powershell
            $policy = Get-AzFirewallPolicy -Name <PolicyName> -ResourceGroupName <ResourceGroupName>
            $policy.IntrusionDetection = New-AzFirewallPolicyIntrusionDetection -Mode "Deny"
            Set-AzFirewallPolicy -InputObject $policy
            ```
        - id: terraform
          desc: |
            To ensure Azure Firewall Policy has IDPS set to Deny mode in Terraform:

            ```hcl
            resource "azurerm_firewall_policy" "example" {
              name                = "example-policy"
              location            = azurerm_resource_group.example.location
              resource_group_name = azurerm_resource_group.example.name
              sku                 = "Premium"

              intrusion_detection {
                mode = "Deny"
              }
            }
            ```
        - id: bicep
          desc: |
            To ensure Azure Firewall Policy has IDPS set to Deny mode in Bicep:

            ```bicep
            resource firewallPolicy 'Microsoft.Network/firewallPolicies@2024-05-01' = {
              name: 'example-policy'
              location: resourceGroup().location
              properties: {
                intrusionDetection: {
                  mode: 'Deny'
                }
                sku: {
                  tier: 'Premium'
                }
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/firewall/premium-features
        title: Azure Firewall Premium features
