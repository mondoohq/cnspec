  - uid: mondoo-azure-security-app-service-min-tls-cipher-suite
    title: Ensure App Service web apps use a strong minimum TLS cipher suite
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    variants:
      - uid: mondoo-azure-security-app-service-min-tls-cipher-suite-azure
        tags:
          mondoo.com/filter-title: Azure App Service
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-app-service-min-tls-cipher-suite-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-app-service-min-tls-cipher-suite-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-app-service-min-tls-cipher-suite-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure App Service web applications are configured with a strong minimum TLS cipher suite, specifically TLS_AES_256_GCM_SHA384. By default, App Service permits a broader range of cipher suites including weaker options, and the minimum cipher suite setting is not configured unless explicitly set.

        **Why this matters**

        - **Cipher strength**: TLS_AES_256_GCM_SHA384 uses 256-bit AES encryption in GCM mode, providing the strongest available symmetric encryption for TLS connections to App Service.
        - **Forward secrecy**: Modern TLS cipher suites with ECDHE key exchange provide perfect forward secrecy, ensuring that past sessions cannot be decrypted even if the server's private key is later compromised.
        - **Protection against downgrade attacks**: Setting a minimum cipher suite prevents clients from negotiating weaker ciphers that may have known vulnerabilities or reduced key lengths.
        - **Compliance alignment**: Security frameworks require the use of strong encryption algorithms, and AES-256-GCM meets the highest standards for data protection in transit.

        **Risk mitigation**

        - **Weak cipher elimination**: Enforcing TLS_AES_256_GCM_SHA384 as the minimum removes the possibility of a client negotiating a cipher with known weaknesses, closing the attack surface for cryptographic downgrade exploits.
        - **Consistent encryption floor**: Applying the minimum cipher suite at the App Service configuration level ensures all hostnames and custom domains served by the app inherit the same encryption guarantee rather than relying on per-binding settings.
        - **Audit simplicity**: A single, well-known cipher suite setting is easier to verify and report on than a list of allowed suites, reducing the chance of a misconfigured allowlist creating an undetected gap.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **App Services** in the Azure Portal.
        2. Select a web app.
        3. Go to **Configuration** > **General settings**.
        4. Verify the **Minimum TLS Cipher Suite** setting.

        **Automated Audit with Azure CLI:**

        ```bash
        az webapp config show --name <WebAppName> --resource-group <ResourceGroupName> --query "minTlsCipherSuite"
        ```
      remediation:
        - id: portal
          desc: |
            To ensure App Service web apps use a strong minimum TLS cipher suite using the Azure Portal:

            1. Navigate to **App Services** in the Azure Portal.
            2. Select the web app.
            3. Go to **Configuration** > **General settings**.
            4. Set **Minimum TLS Cipher Suite** to **TLS_AES_256_GCM_SHA384**.
            5. Select **Save**.
        - id: cli
          desc: |
            To ensure App Service web apps use a strong minimum TLS cipher suite using the Azure CLI:

            ```bash
            az webapp config set --name <WebAppName> --resource-group <ResourceGroupName> --min-tls-cipher-suite TLS_AES_256_GCM_SHA384
            ```
        - id: terraform
          desc: |
            To ensure App Service web apps use a strong minimum TLS cipher suite in Terraform:

            ```hcl
            resource "azurerm_linux_web_app" "example" {
              name                = "example-webapp"
              resource_group_name = azurerm_resource_group.example.name
              location            = azurerm_resource_group.example.location
              service_plan_id     = azurerm_service_plan.example.id

              site_config {
                minimum_tls_cipher_suite = "TLS_AES_256_GCM_SHA384"
              }
            }
            ```
        - id: bicep
          desc: |
            To ensure App Service web apps use a strong minimum TLS cipher suite in Bicep:

            ```bicep
            resource webAppConfig 'Microsoft.Web/sites/config@2024-04-01' = {
              parent: webApp
              name: 'web'
              properties: {
                minTlsCipherSuite: 'TLS_AES_256_GCM_SHA384'
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/app-service/configure-ssl-bindings
        title: Secure a custom DNS name with a TLS/SSL binding in Azure App Service
  - uid: mondoo-azure-security-app-service-min-tls-cipher-suite-azure
    filters: |
      asset.platform == "azure-app-service-webapp"
    mql: |
      azure.subscription.webService.appsite.configuration.minTlsCipherSuite == "TLS_AES_256_GCM_SHA384"
  - uid: mondoo-azure-security-app-service-min-tls-cipher-suite-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == /azurerm_(linux|windows)_web_app/)
    mql: |
      terraform.resources.where(nameLabel == /azurerm_(linux|windows)_web_app/).all(
        blocks.where(type == "site_config") != empty &&
        blocks.where(type == "site_config").all(arguments['minimum_tls_cipher_suite'] == "TLS_AES_256_GCM_SHA384")
      )
  - uid: mondoo-azure-security-app-service-min-tls-cipher-suite-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == /azurerm_(linux|windows)_web_app/)
    mql: |
      if (terraform.plan.resourceChanges.where(type == "azurerm_linux_web_app").length > 0) {
        terraform.plan.resourceChanges.where(type == "azurerm_linux_web_app").all(
          change.after.site_config != empty &&
          change.after.site_config.all(_["minimum_tls_cipher_suite"] == "TLS_AES_256_GCM_SHA384")
        )
      }
      if (terraform.plan.resourceChanges.where(type == "azurerm_windows_web_app").length > 0) {
        terraform.plan.resourceChanges.where(type == "azurerm_windows_web_app").all(
          change.after.site_config != empty &&
          change.after.site_config.all(_["minimum_tls_cipher_suite"] == "TLS_AES_256_GCM_SHA384")
        )
      }
  - uid: mondoo-azure-security-app-service-min-tls-cipher-suite-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == /azurerm_(linux|windows)_web_app/)
    mql: |
      if (terraform.state.resources.where(type == "azurerm_linux_web_app").length > 0) {
        terraform.state.resources.where(type == "azurerm_linux_web_app").all(
          values.site_config != empty &&
          values.site_config.all(_["minimum_tls_cipher_suite"] == "TLS_AES_256_GCM_SHA384")
        )
      }
      if (terraform.state.resources.where(type == "azurerm_windows_web_app").length > 0) {
        terraform.state.resources.where(type == "azurerm_windows_web_app").all(
          values.site_config != empty &&
          values.site_config.all(_["minimum_tls_cipher_suite"] == "TLS_AES_256_GCM_SHA384")
        )
      }
