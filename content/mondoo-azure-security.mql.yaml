  - uid: mondoo-azure-security-synapse-cmk-encryption
    title: Ensure Synapse uses customer-managed key encryption
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-azure-security-synapse-cmk-encryption-azure
        tags:
          mondoo.com/filter-title: Azure Synapse Workspace
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-synapse-cmk-encryption-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-synapse-cmk-encryption-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-synapse-cmk-encryption-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure Synapse Analytics workspaces are configured with customer-managed key (CMK) encryption.

        **Why this matters**

        - **Full encryption control**: Customer-managed keys provide your organization with complete control over the encryption keys protecting data at rest in Synapse, including dedicated SQL pools, serverless SQL pools, and Apache Spark pools.
        - **Compliance requirements**: Many regulatory frameworks and industry standards require organizations to manage their own encryption keys for sensitive data processing and analytics workloads.

        **Risk mitigation**

        - Store customer-managed keys in Azure Key Vault with soft delete and purge protection enabled.
        - Enable double encryption to add an additional layer of protection using a service-managed key alongside the customer-managed key.
      audit: |
        ### Audit via Portal

        1. Navigate to **Azure Synapse Analytics** in the Azure Portal.
        2. Select the target workspace.
        3. Under **Security**, select **Encryption**.
        4. Review the **Encryption type** setting.

        A passing resource shows **Customer-managed key** with a Key Vault key configured. A failing resource shows **Service-managed key** or no key configured.

        ### Audit via CLI

        1. Run the following command, replacing `<resource-group-name>` and `<workspace-name>` with the target values:

        ```bash
        az synapse workspace show \
          --resource-group <resource-group-name> \
          --name <workspace-name> \
          --query "encryption" \
          --output json
        ```

        A passing resource returns a non-empty JSON object with a `cmk` block containing a `key` with a valid `keyVaultUrl`. A failing resource returns `null` or an empty result.
      remediation:
        - id: portal
          desc: |
            To ensure Synapse uses customer-managed key encryption using the Azure Portal:

            1. Navigate to the [Azure Portal](https://portal.azure.com).
            2. Go to **Azure Synapse Analytics** and select the target workspace.
            3. Under **Security**, select **Encryption**.
            4. Select **Customer-Managed Key**.
            5. Select the Key Vault and key to use for encryption.
            6. Select **Save**.

            Note: CMK encryption must be configured at workspace creation time. To enable CMK on an existing workspace, it must be recreated with CMK enabled.
        - id: cli
          desc: |
            To ensure Synapse uses customer-managed key encryption using the Azure CLI:

            ```bash
            az synapse workspace key create \
              --resource-group-name <resource-group-name> \
              --workspace-name <workspace-name> \
              --key-name "cmk" \
              --key-identifier "https://<key-vault-name>.vault.azure.net/keys/<key-name>/<key-version>"

            az synapse workspace activate \
              --resource-group-name <resource-group-name> \
              --workspace-name <workspace-name> \
              --key-name "cmk"
            ```
        - id: terraform
          desc: |
            To ensure Synapse uses customer-managed key encryption in Terraform:

            ```hcl
            resource "azurerm_synapse_workspace" "example" {
              name                                 = "example-synapse"
              resource_group_name                  = azurerm_resource_group.example.name
              location                             = azurerm_resource_group.example.location
              storage_data_lake_gen2_filesystem_id = azurerm_storage_data_lake_gen2_filesystem.example.id
              sql_administrator_login              = "sqladminuser"
              sql_administrator_login_password     = var.sql_admin_password

              customer_managed_key {
                key_versionless_id = azurerm_key_vault_key.example.versionless_id
                key_name           = "enckey"
              }
            }
            ```
        - id: bicep
          desc: |
            To ensure Synapse uses customer-managed key encryption in Bicep:

            ```bicep
            @secure()
            param sqlAdminPassword string

            resource synapseWorkspace 'Microsoft.Synapse/workspaces@2021-06-01' = {
              name: 'example-synapse'
              location: resourceGroup().location
              properties: {
                defaultDataLakeStorage: {
                  accountUrl: 'https://examplestorage.dfs.core.windows.net'
                  filesystem: 'example-fs'
                }
                sqlAdministratorLogin: 'sqladminuser'
                sqlAdministratorLoginPassword: sqlAdminPassword
                encryption: {
                  cmk: {
                    key: {
                      name: 'enckey'
                      keyVaultUrl: 'https://example-keyvault.vault.azure.net/keys/example-key/version'
                    }
                  }
                }
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/synapse-analytics/security/workspaces-encryption
        title: Azure Synapse Analytics workspace encryption
