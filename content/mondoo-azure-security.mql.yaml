  # No Terraform variants: SSH availability on Linux App Service is determined by the
  # container image (whether the image bundles an SSH daemon) rather than by a property on
  # azurerm_linux_web_app or azurerm_windows_web_app. There is no Terraform argument that
  # toggles SSH at the app level.
  - uid: mondoo-azure-security-app-service-ssh-disabled
    title: Ensure App Service has SSH access disabled
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-7
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-azure-security-app-service-ssh-disabled-azure
        tags:
          mondoo.com/filter-title: Azure App Service
          mondoo.com/filter-icon: azure
    docs:
      desc: |
        This check ensures that Azure App Service instances have SSH access disabled, reducing the attack surface of production web applications.

        **Why this matters**

        - **Attack surface reduction**: SSH access to production web apps provides a direct shell interface that can be exploited if credentials are compromised.
        - **Least privilege**: Web applications should be managed through deployment pipelines and Azure management APIs, not direct SSH access.
        - **Compliance alignment**: Security frameworks recommend disabling unnecessary remote access protocols on production services.

        **Risk mitigation**

        - Disable SSH access on App Service instances unless required for debugging.
        - Use Azure App Service diagnostics and logging instead of SSH for troubleshooting.
      audit: |
        ### Audit via Portal

        1. Navigate to **App Services** in the Azure Portal.
        2. Select the App Service instance.
        3. Under **Development Tools**, select **SSH**.
        4. Review whether SSH access is available and reachable.

        A passing resource shows SSH access as unavailable or restricted. A failing resource shows an active SSH session option.

        ### Audit via CLI

        1. Run the following command, substituting your resource group and app name:

        ```bash
        az webapp show --resource-group <ResourceGroupName> --name <AppName> --query "siteConfig.linuxFxVersion" -o tsv
        ```

        Then check the SSH-specific configuration:

        ```bash
        az webapp config show --resource-group <ResourceGroupName> --name <AppName> --query "linuxFxVersion" -o tsv
        ```

        A passing resource uses a custom container image that does not expose an SSH server. A failing resource exposes SSH through the SCM/Kudu endpoint or through the container image.
      remediation:
        - id: portal
          desc: |
            To ensure App Service has SSH access disabled using the Azure Portal, there is no direct toggle in the Azure Portal to disable SSH for App Service on Linux. To restrict SSH access:

            1. Navigate to **App Services** in the Azure Portal.
            2. Select the App Service instance.
            3. Under **Settings**, select **Networking** > **Access Restrictions**.
            4. Add restrictions to the SCM/Kudu endpoint (Advanced tool site) to limit who can initiate SSH sessions.

            For Linux App Services, SSH access can be fully disabled by using a custom container image that does not include an SSH server, or by restricting network access to the SCM/Kudu endpoint.
        - id: cli
          desc: |
            To ensure App Service has SSH access disabled using the Azure CLI, restrict access to the SCM site to disable SSH access:

            ```bash
            az webapp config access-restriction add --resource-group <ResourceGroupName> --name <AppName> --scm-site true --rule-name DenyAll --priority 100 --action Deny --ip-address 0.0.0.0/0
            ```

            Alternatively, use a custom container that does not include an SSH server to eliminate SSH access entirely.
        - id: bicep
          desc: |
            To ensure App Service has SSH access disabled in Bicep, note: SSH enablement for App Service on Linux is primarily controlled through the container configuration and is not directly configurable via a Bicep property. Use the Azure Portal or CLI to disable SSH.
        - id: terraform
          desc: |
            To ensure App Service has SSH access disabled in Terraform, SSH access for Azure App Service on Linux is controlled at the container level rather than through a Terraform resource property. Ensure your custom Docker container does not expose an SSH server, or use the Azure CLI to disable SSH after deployment.
    refs:
      - url: https://learn.microsoft.com/en-us/azure/app-service/configure-linux-open-ssh-session
        title: Configure SSH for Azure App Service
  - uid: mondoo-azure-security-app-service-ssh-disabled-azure
    filters: |
      asset.platform == "azure-appsite"
    mql: |
      azure.subscription.webService.appsite.sshEnabled == false
  - uid: mondoo-azure-security-app-service-public-network-access-disabled
    title: Ensure App Service disables public network access
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-azure-security-app-service-public-network-access-disabled-azure
        tags:
          mondoo.com/filter-title: Azure App Service
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-app-service-public-network-access-disabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-app-service-public-network-access-disabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-app-service-public-network-access-disabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure App Service instances have public network access disabled, requiring all traffic to flow through private endpoints or VNet integration.

        **Why this matters**

        - **Network isolation**: Public network access exposes web applications to internet-based attacks including DDoS, brute force, and exploitation of application vulnerabilities.
        - **Private connectivity**: Disabling public access forces traffic through private endpoints, ensuring only authorized networks can reach the application.
        - **Defense in depth**: Network-level restrictions complement application-level authentication and authorization controls.

        **Risk mitigation**

        - Disable public network access and configure private endpoints for App Service instances.
        - Use Azure Front Door or Application Gateway with private link for public-facing applications.
      audit: |
        ### Audit via Portal

        1. Navigate to **App Services** in the Azure Portal.
        2. Select the App Service instance.
        3. Under **Settings**, select **Networking**.
        4. Review the **Public network access** setting.

        A passing resource shows **Public network access** set to **Disabled**. A failing resource shows it set to **Enabled** or **Enabled from select virtual networks and IP addresses**.

        ### Audit via CLI

        1. Run the following command, substituting your resource group and app name:

        ```bash
        az webapp show --resource-group <ResourceGroupName> --name <AppName> --query "publicNetworkAccess" -o tsv
        ```

        A passing resource returns `Disabled`. A failing resource returns `Enabled` or an empty value.
      remediation:
        - id: portal
          desc: |
            To ensure App Service disables public network access using the Azure Portal:

            1. Navigate to **App Services** in the Azure Portal.
            2. Select the App Service instance.
            3. Under **Settings**, select **Networking**.
            4. Set **Public network access** to **Disabled**.
            5. Configure private endpoints for authorized network access.
            6. Select **Save**.
        - id: cli
          desc: |
            To ensure App Service disables public network access using the Azure CLI:

            ```bash
            az webapp update --resource-group <ResourceGroupName> --name <AppName> --set publicNetworkAccess=Disabled
            ```
        - id: terraform
          desc: |
            To ensure App Service disables public network access in Terraform:

            ```hcl
            resource "azurerm_linux_web_app" "example" {
              name                          = "example-app"
              resource_group_name           = azurerm_resource_group.example.name
              location                      = azurerm_resource_group.example.location
              service_plan_id               = azurerm_service_plan.example.id
              public_network_access_enabled = false

              site_config {}
            }
            ```
        - id: bicep
          desc: |
            To ensure App Service disables public network access in Bicep:

            ```bicep
            resource webApp 'Microsoft.Web/sites@2023-01-01' = {
              name: 'example-app'
              location: resourceGroup().location
              properties: {
                publicNetworkAccess: 'Disabled'
                serverFarmId: appServicePlan.id
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/app-service/networking/private-endpoint
        title: Azure App Service Private Endpoints
