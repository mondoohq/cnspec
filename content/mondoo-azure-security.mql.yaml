        values['key_vault_key_id'] != empty
      )
  - uid: mondoo-azure-security-postgresql-flexible-cmk-encryption
    title: Ensure PostgreSQL Flexible Server uses CMK encryption
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-azure-security-postgresql-flexible-cmk-encryption-azure
        tags:
          mondoo.com/filter-title: Azure PostgreSQL Flexible Server
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-postgresql-flexible-cmk-encryption-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-postgresql-flexible-cmk-encryption-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-postgresql-flexible-cmk-encryption-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure Database for PostgreSQL Flexible Server uses customer-managed keys for data encryption, providing customer-controlled encryption for data at rest. By default, Azure manages encryption with service-managed keys for PostgreSQL Flexible Server, but customer-managed keys provide additional control over the encryption lifecycle.

        **Why this matters**

        - **Key lifecycle control**: Customer-managed keys allow organizations to control key rotation, revocation, and access policies for PostgreSQL data encryption.
        - **Compliance alignment**: Many regulatory frameworks require customer-managed encryption keys for database encryption.
        - **Data sovereignty**: CMK ensures that encryption keys remain under the customer's control, supporting data sovereignty requirements.

        **Risk mitigation**

        - Configure customer-managed key encryption on PostgreSQL Flexible Server instances.
        - Implement key rotation policies in Azure Key Vault.
      audit: |
        ### Audit via Portal

        1. Navigate to **Azure Database for PostgreSQL flexible servers** in the Azure Portal.
        2. Select the server instance.
        3. Under **Security**, select **Data encryption**.
        4. Review the **Data encryption type** field.

        A passing resource shows **Customer-managed key** as the data encryption type. A failing resource shows **Service-managed key**.

        ### Audit via CLI

        1. Run the following command, substituting your resource group and server name:

        ```bash
        az postgres flexible-server show --resource-group <ResourceGroupName> --name <ServerName> --query "dataEncryption" -o json
        ```

        A passing resource returns a JSON object with `"type": "AzureKeyVault"` and a `primaryKeyURI` referencing the Key Vault key. A failing resource returns `null` or an object with `"type": "SystemManaged"`.
      remediation:
        - id: portal
          desc: |
            To ensure PostgreSQL Flexible Server uses CMK encryption using the Azure Portal:

            1. Navigate to **Azure Database for PostgreSQL flexible servers** in the Azure Portal.
            2. Select the server instance.
            3. Under **Security**, select **Data encryption**.
            4. Select **Customer-managed key**.
            5. Configure the Key Vault and key.
            6. Select **Save**.
        - id: cli
          desc: |
            To ensure PostgreSQL Flexible Server uses CMK encryption using the Azure CLI:

            ```bash
            az postgres flexible-server update --resource-group <ResourceGroupName> --name <ServerName> --key <KeyVaultKeyId> --identity <UserAssignedIdentityId>
            ```
        - id: bicep
          desc: |
            To ensure PostgreSQL Flexible Server uses CMK encryption in Bicep:

            ```bicep
            resource postgresServer 'Microsoft.DBforPostgreSQL/flexibleServers@2022-12-01' = {
              name: 'example-psql'
              location: resourceGroup().location
              identity: {
                type: 'UserAssigned'
                userAssignedIdentities: {
                  '${managedIdentity.id}': {}
                }
              }
              properties: {
                dataEncryption: {
                  type: 'AzureKeyVault'
                  primaryKeyURI: keyVaultKey.properties.keyUriWithVersion
                  primaryUserAssignedIdentityId: managedIdentity.id
                }
              }
            }
            ```
        - id: terraform
          desc: |
            To ensure PostgreSQL Flexible Server uses CMK encryption in Terraform:

            ```hcl
            resource "azurerm_postgresql_flexible_server" "example" {
              name                = "example-psql"
              resource_group_name = azurerm_resource_group.example.name
              location            = azurerm_resource_group.example.location

              customer_managed_key {
                key_vault_key_id                  = azurerm_key_vault_key.example.id
                primary_user_assigned_identity_id = azurerm_user_assigned_identity.example.id
              }

              identity {
                type         = "UserAssigned"
                identity_ids = [azurerm_user_assigned_identity.example.id]
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/postgresql/flexible-server/concepts-data-encryption
        title: Data encryption for Azure Database for PostgreSQL Flexible Server
