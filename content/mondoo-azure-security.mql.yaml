    docs:
      desc: |
        This check ensures that Azure Synapse Analytics workspaces have public network access disabled.

        **Why this matters**

        - **Reduced attack surface**: Disabling public network access prevents Synapse workspaces from being reachable over the public internet, protecting sensitive analytics workloads and data assets.
        - **Data protection**: Synapse workspaces process and store large volumes of organizational data. Restricting public access ensures that only authorized networks can reach the workspace endpoints.

        **Risk mitigation**

        - Configure private endpoints for Synapse workspace resources including SQL, SQL on-demand, and Dev endpoints.
        - Use Azure Private Link to route all traffic through the Microsoft backbone network.
      remediation:
        - id: portal
          desc: |
            **Using Azure Portal**

            1. Navigate to the [Azure Portal](https://portal.azure.com).
            2. Go to **Azure Synapse Analytics** and select the target workspace.
            3. Under **Security**, select **Networking**.
            4. Under **Public network access**, select **Disabled**.
            5. Click **Save**.
        - id: cli
          desc: |
            **Using Azure CLI**

            ```bash
            az synapse workspace update \
              --resource-group <resource-group-name> \
              --name <workspace-name> \
              --public-network-access "Disabled"
            ```
        - id: terraform
          desc: |
            **Using Terraform**

            ```hcl
            resource "azurerm_synapse_workspace" "example" {
              name                                 = "example-synapse"
              resource_group_name                  = azurerm_resource_group.example.name
              location                             = azurerm_resource_group.example.location
              storage_data_lake_gen2_filesystem_id = azurerm_storage_data_lake_gen2_filesystem.example.id
              sql_administrator_login              = "sqladminuser"
              sql_administrator_login_password     = "H@Sh1CoR3!"

              public_network_access_enabled = false
            }
            ```
        - id: bicep
          desc: |
            **Using Bicep**

            ```bicep
            resource synapseWorkspace 'Microsoft.Synapse/workspaces@2021-06-01' = {
              name: 'example-synapse'
              location: resourceGroup().location
              properties: {
                defaultDataLakeStorage: {
                  accountUrl: 'https://examplestorage.dfs.core.windows.net'
                  filesystem: 'example-fs'
                }
                sqlAdministratorLogin: 'sqladminuser'
                sqlAdministratorLoginPassword: 'H@Sh1CoR3!'
                publicNetworkAccess: 'Disabled'
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/synapse-analytics/security/connectivity-settings
        title: Azure Synapse Analytics connectivity settings
      - url: https://learn.microsoft.com/en-us/azure/synapse-analytics/security/synapse-workspace-managed-private-endpoints
