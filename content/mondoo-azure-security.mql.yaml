        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure Event Hubs namespaces encrypt event payloads at rest with customer-managed keys (CMK) stored in Azure Key Vault, rather than relying on platform-managed keys.

        **Why this matters**

        - **Key custody**: Event Hubs persists ingested events on Azure-managed storage for the retention window. Customer-managed keys put the encryption key under the organization's control, so key rotation and revocation are governed by the same policies as other regulated secrets.
        - **Revocation**: Revoking the Key Vault key renders namespace data unreadable, providing a fast containment lever if a key is suspected of compromise.
        - **Compliance alignment**: Workloads regulated under HIPAA, PCI DSS, ISO 27001, and SOC 2 commonly require customer-managed encryption for sensitive at-rest data, including streaming telemetry that contains personally identifiable information.

        **Risk mitigation**

        - Configure CMK on Premium or Dedicated tier Event Hubs namespaces using a Key Vault with soft delete and purge protection enabled.
        - Combine CMK with infrastructure (double) encryption for workloads that require defense-in-depth at the storage layer.

        Note: Only the Premium and Dedicated SKUs support CMK; Basic and Standard namespaces use platform-managed encryption only.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Event Hubs** in the Azure Portal.
        2. Select a Premium or Dedicated tier namespace.
        3. Open **Encryption** under **Settings**.
        4. Verify that the encryption key source is **Customer-managed key** and a Key Vault key is selected.

        **Automated Audit with Azure CLI:**

        ```bash
        az eventhubs namespace show --resource-group <ResourceGroupName> --name <NamespaceName> --query "encryption"
        ```
      remediation:
        - id: portal
          desc: |
            To configure CMK on an Event Hubs namespace using the Azure Portal:

            1. Ensure the namespace is on the Premium or Dedicated SKU and has a system-assigned or user-assigned managed identity.
            2. Grant the namespace's identity the **Key Vault Crypto Service Encryption User** role on the target Key Vault.
            3. Navigate to **Event Hubs** and select the namespace.
            4. Under **Settings**, select **Encryption**.
            5. Choose **Customer-managed key**, select the Key Vault and key, and **Save**.
        - id: cli
          desc: |
            To configure CMK on an Event Hubs namespace using the Azure CLI:

            ```bash
            az eventhubs namespace encryption add \
              --resource-group <ResourceGroupName> \
              --namespace-name <NamespaceName> \
              --encryption-config key-name=<KeyName> key-vault-uri=<KeyVaultUri>
            ```
        - id: terraform
          desc: |
            To configure CMK on an Event Hubs namespace in Terraform:

            ```hcl
            resource "azurerm_eventhub_namespace" "example" {
              name                = "example-eh-namespace"
              location            = azurerm_resource_group.example.location
              resource_group_name = azurerm_resource_group.example.name
              sku                 = "Premium"
              capacity            = 1

              identity {
                type = "SystemAssigned"
              }
            }

            resource "azurerm_eventhub_namespace_customer_managed_key" "example" {
              eventhub_namespace_id = azurerm_eventhub_namespace.example.id
              key_vault_key_ids     = [azurerm_key_vault_key.example.id]
            }
            ```
        - id: bicep
          desc: |
            To configure CMK on an Event Hubs namespace in Bicep:

            ```bicep
            resource eventHubNamespace 'Microsoft.EventHub/namespaces@2024-01-01' = {
              name: 'example-eh-namespace'
              location: resourceGroup().location
              sku: {
                name: 'Premium'
                tier: 'Premium'
                capacity: 1
              }
              identity: {
                type: 'SystemAssigned'
              }
              properties: {
                encryption: {
                  keySource: 'Microsoft.KeyVault'
                  keyVaultProperties: [
                    {
                      keyName: 'example-key'
                      keyVaultUri: 'https://example-kv.vault.azure.net'
                    }
                  ]
                }
              }
            }
            ```
