      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-azure-security-compute-disk-encryption-set-cmk-azure
        tags:
          mondoo.com/filter-title: Azure Subscription
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-compute-disk-encryption-set-cmk-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-compute-disk-encryption-set-cmk-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-compute-disk-encryption-set-cmk-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure disk encryption sets are configured to use customer-managed keys (CMK) for encrypting managed disks. Disk encryption sets centralize key management for multiple managed disks using a single Azure Key Vault key.

        **Why this matters**

        - Platform-managed keys do not provide visibility into key usage or the ability to control key rotation schedules.
        - Customer-managed keys enable centralized encryption key management, audit logging, and revocation capabilities.
        - Disk encryption sets using CMK allow organizations to meet compliance requirements for encryption key ownership.

        **Risk mitigation**

        - **Centralized key management:** One encryption set can manage keys for multiple disks.
        - **Audit trail:** Key usage is logged through Azure Key Vault.
        - **Compliance:** Demonstrates encryption key ownership for regulatory requirements.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Disk encryption sets** in the Azure Portal.
        2. Select a disk encryption set.
        3. Verify that the encryption type includes **Customer-managed key**.

        **Automated Audit with Azure CLI:**

        ```bash
        az disk-encryption-set list --query "[].{Name:name, EncryptionType:encryptionType}" -o table
        ```
      remediation:
        - id: portal
          desc: |
            To configure a disk encryption set with customer-managed keys using the Azure Portal:

            1. Navigate to **Disk encryption sets** in the Azure Portal.
            2. Select **Create**.
            3. Set **Encryption type** to **Encryption at rest with a customer-managed key**.
            4. Select the Azure Key Vault and key.
            5. Complete the creation.
        - id: cli
          desc: |
            To create a disk encryption set with customer-managed keys using the Azure CLI:

            ```bash
            az disk-encryption-set create \
              --name <DiskEncryptionSetName> \
              --resource-group <ResourceGroupName> \
              --key-url <KeyVaultKeyUrl> \
              --source-vault <KeyVaultId> \
              --encryption-type EncryptionAtRestWithCustomerKey
            ```
        - id: terraform
          desc: |
            To configure a disk encryption set with customer-managed keys in Terraform:

            ```hcl
            resource "azurerm_disk_encryption_set" "example" {
              name                = "example-des"
              resource_group_name = azurerm_resource_group.example.name
              location            = azurerm_resource_group.example.location
              key_vault_key_id    = azurerm_key_vault_key.example.id
              encryption_type     = "EncryptionAtRestWithCustomerKey"

              identity {
                type = "SystemAssigned"
              }
            }
            ```
        - id: bicep
          desc: |
            To configure a disk encryption set with customer-managed keys in Bicep:

            ```bicep
            resource diskEncryptionSet 'Microsoft.Compute/diskEncryptionSets@2023-10-02' = {
              name: 'example-des'
              location: resourceGroup().location
              identity: {
                type: 'SystemAssigned'
              }
              properties: {
                activeKey: {
                  keyUrl: keyVaultKey.properties.keyUriWithVersion
                  sourceVault: {
                    id: keyVault.id
                  }
                }
                encryptionType: 'EncryptionAtRestWithCustomerKey'
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/virtual-machines/disk-encryption-sets
        title: Azure disk encryption sets
