        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/icon: terraform
      - uid: mondoo-azure-security-security-contact-emails-configured-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/icon: terraform
    docs:
      desc: |
        This check ensures that at least one security contact has email addresses configured for receiving security alert notifications. Without configured email recipients, Defender for Cloud alerts go unnoticed.

        **Why this matters**

        - **Missed alerts:** Security alerts without notification recipients are only visible in the portal, which may not be monitored continuously.
        - **Response time:** Email notifications enable faster incident response by reaching security teams directly.
        - **Compliance:** CIS Azure Foundations Benchmark requires security contact email configuration.
      remediation:
        - id: portal
          desc: |
            **Using Azure Portal**

            1. Navigate to **Microsoft Defender for Cloud** > **Environment settings**.
            2. Select the subscription.
            3. Select **Email notifications**.
            4. Add email addresses for security alert recipients.
            5. Select **Save**.
        - id: cli
          desc: |
            **Using Azure CLI**

            Configure a security contact with email notifications:

            ```bash
            az security contact create --name default --email "security@example.com" --alert-notifications "On" --alerts-to-admins "On"
            ```
        - id: bicep
          desc: |
            **Using Bicep**

            ```bicep
            resource securityContact 'Microsoft.Security/securityContacts@2020-01-01-preview' = {
              name: 'default'
              properties: {
                emails: 'security@example.com'
                notificationsByRole: {
                  state: 'On'
                  roles: [
                    'Owner'
                  ]
                }
                alertNotifications: {
                  state: 'On'
                  minimalSeverity: 'High'
                }
              }
            }
            ```
        - id: terraform
          desc: |
            **Using Terraform**

            ```hcl
            resource "azurerm_security_center_contact" "example" {
              email               = "security@example.com"
              alert_notifications = true
              alerts_to_admins    = true
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/defender-for-cloud/configure-email-notifications
        title: Azure Documentation - Configure email notifications for security alerts
  - uid: mondoo-azure-security-security-contact-emails-configured-azure
