    docs:
      desc: |
        This check ensures that Azure Service Bus namespaces enforce a minimum TLS version of 1.2 for all client connections. TLS 1.0 and 1.1 are deprecated and have known cryptographic weaknesses.

        **Why this matters**

        - **Protocol weaknesses**: TLS 1.0 and 1.1 are vulnerable to BEAST, POODLE, and downgrade attacks that can expose AMQP and HTTP message traffic in flight.
        - **Compliance**: PCI DSS, NIST SP 800-53, and HIPAA require TLS 1.2 or higher for data in transit; allowing TLS 1.0 or 1.1 puts the workload out of compliance.
        - **Downgrade protection**: Setting the namespace-level minimum to TLS 1.2 prevents a misconfigured client or an attacker performing a downgrade from negotiating a weaker protocol.

        **Risk mitigation**

        - Set `minimumTlsVersion` to `1.2` on every namespace.
        - The Service Bus namespace minimum TLS setting is a property on the namespace itself; this check verifies Infrastructure-as-Code definitions enforce it.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Service Bus** in the Azure Portal.
        2. Select a namespace.
        3. Open **Configuration** under **Settings**.
        4. Verify that **Minimum TLS Version** is set to **1.2**.

        **Automated Audit with Azure CLI:**

        ```bash
        az servicebus namespace show --resource-group <ResourceGroupName> --name <NamespaceName> --query "minimumTlsVersion"
        ```
      remediation:
        - id: portal
          desc: |
            To enforce TLS 1.2 on a Service Bus namespace using the Azure Portal:

            1. Navigate to **Service Bus** in the Azure Portal.
            2. Select the namespace.
            3. Under **Settings**, select **Configuration**.
            4. Set **Minimum TLS Version** to **1.2**.
            5. Select **Save**.
        - id: cli
          desc: |
            To enforce TLS 1.2 on a Service Bus namespace using the Azure CLI:

            ```bash
            az servicebus namespace update --resource-group <ResourceGroupName> --name <NamespaceName> --minimum-tls-version 1.2
            ```
        - id: terraform
          desc: |
            To enforce TLS 1.2 on a Service Bus namespace in Terraform:

            ```hcl
            resource "azurerm_servicebus_namespace" "example" {
              name                = "example-sb-namespace"
              location            = azurerm_resource_group.example.location
              resource_group_name = azurerm_resource_group.example.name
              sku                 = "Premium"
              capacity            = 1
              minimum_tls_version = "1.2"
            }
            ```
        - id: bicep
          desc: |
            To enforce TLS 1.2 on a Service Bus namespace in Bicep:

            ```bicep
            resource serviceBusNamespace 'Microsoft.ServiceBus/namespaces@2024-01-01' = {
              name: 'example-sb-namespace'
              location: resourceGroup().location
              sku: {
                name: 'Premium'
                tier: 'Premium'
                capacity: 1
              }
              properties: {
                minimumTlsVersion: '1.2'
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/service-bus-messaging/transport-layer-security-configure-minimum-version
        title: Configure the minimum TLS version for an Azure Service Bus namespace
