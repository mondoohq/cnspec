    props:
      - uid: mondooAzureSecurityDisallowedPortsRDP
        title: a list of disallowed TCP ports, by default RDP listens only on TCP port 3389. Add more ports as needed.
        mql: |
          return [
            3389,
          ]
    docs:
      desc: |
        This check ensures that Azure Network Security Groups are configured to block inbound RDP traffic (TCP port 3389) from any internet source address. By default, Azure does not block internet-facing RDP in NSG rules, and many Windows VM deployments leave port 3389 open broadly for administrative convenience.

        **Why this matters**

        - **High-value attack target**: RDP is one of the most commonly exploited remote access protocols; internet-exposed RDP is actively scanned and attacked within minutes of a VM being provisioned.
        - **Credential attacks**: Automated tools perform credential stuffing and brute force against RDP; a single compromised account yields full interactive desktop access to the host.
        - **BlueKeep and similar CVEs**: Historically critical unauthenticated RDP vulnerabilities allow remote code execution before any credential check; restricting source addresses limits exposure to these classes of flaws.
        - **Ransomware deployment**: The majority of ransomware incidents involving Azure VMs begin with an internet-exposed RDP session, providing attackers a direct path to encrypt data and demand payment.

        **Risk mitigation**

        - **Restrict source addresses**: Limit RDP inbound rules to specific trusted IP ranges such as a corporate VPN gateway or designated jump host rather than any internet source.
        - **Use Azure Bastion**: Replace direct RDP NSG rules with Azure Bastion, which provides browser-based RDP access through the Azure portal without exposing port 3389 to the internet.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Log into the Azure Portal.
        2. Navigate to **Network security groups** under the Networking or directly through the search bar.
        3. For each NSG, access the **Inbound security rules**.
        4. Carefully review each rule to identify any that allow inbound RDP traffic (TCP port 3389):
          - Check for rules where the protocol is set to `TCP`.
          - The destination port or port range includes `3389`.
          - The source address prefix is too broad, such as 'Any', '0.0.0.0', 'Internet', '/0', 'internet', or 'any'.
        5. Note down any NSG rules that do not comply with your organization's security policy regarding restricted access to RDP. These rules should ideally allow access only from trusted, secure networks, and not from the open internet.

        1. Navigate to **Virtual Machines** in the Azure Portal.
        2. For each VM, select the **Networking** blade to review network configurations.
        3. Check the **Inbound port rules** under the associated Network Security Group (NSG).
        4. Verify that there are no rules allowing RDP access (TCP port 3389) from 'Any' or 'Internet'. Only secure, specified IP ranges should be allowed if necessary.

        **Automated Audit with Azure CLI:**

        List NSGs and verify RDP access rules:

        ```bash
        az network nsg list --query "[].{NSG: name, Rules: securityRules[?access=='Allow' && protocol=='Tcp' && direction=='Inbound' && (destinationPortRange=='3389' || destinationPortRanges.contains('3389')) && (sourceAddressPrefix=='*' || sourceAddressPrefix=='0.0.0.0' || sourceAddressPrefix=='Internet' || sourceAddressPrefix=='/0' || sourceAddressPrefix=='internet' || sourceAddressPrefix=='any')]}" -o table
        ```
      remediation:
        - id: portal
          desc: |
            To restrict RDP access on disallowed TCP ports using the Azure Portal:

            1. Log into the Azure Portal and navigate to **Network Security Groups**.
            2. Select the NSG associated with your VM.
            3. Review the **Inbound security rules** and modify or delete any rules that allow internet access to port 3389.
            4. Preferably, change the `source_address_prefix` to more restrictive settings, such as a specific IP range or a secure VPN gateway.
        - id: cli
          desc: |
            To restrict RDP access on disallowed TCP ports using the Azure CLI, update or create a new NSG rule to restrict RDP access:

            ```bash
            az network nsg rule create --resource-group <ResourceGroupName> --nsg-name <NSGName> --name RestrictRDP --priority 1001 --direction Inbound --access Deny --protocol Tcp --source-address-prefixes <YourSecureIPRange> --destination-port-ranges 3389
            ```
        - id: powershell
          desc: |
            To restrict RDP access on disallowed TCP ports using PowerShell:

            ```powershell
            New-AzNetworkSecurityRuleConfig -Name RestrictRDP -Protocol Tcp -Direction Inbound -Priority 1001 -SourceAddressPrefix <YourSecureIPRange> -SourcePortRange * -DestinationAddressPrefix * -DestinationPortRange 3389 -Access Allow
            ```
        - id: terraform
          desc: |
            To restrict RDP access on disallowed TCP ports in Terraform:

            ```hcl
            # Ensure the `source_address_prefix` is configured to a restrictive CIDR address

            resource "azurerm_network_security_group" "example" {
              name                = "example-rdp-security"
              location            = azurerm_resource_group.rg.location
              resource_group_name = azurerm_resource_group.rg.name

              security_rule {
                name                       = "RDP"
                priority                   = 1001
                direction                  = "Inbound"
                access                     = "Allow"
                protocol                   = "Tcp"
                source_port_range          = "*"
                destination_port_range     = "3389"
                source_address_prefix      = "192.168.22.5/24"
                destination_address_prefix = "*"
              }
            }
            ```
        - id: bicep
          desc: |
            To restrict RDP access on disallowed TCP ports in Bicep:

            ```bicep
            resource nsg 'Microsoft.Network/networkSecurityGroups@2024-05-01' = {
              name: 'myNetworkSecurityGroup'
              location: resourceGroup().location
              properties: {
                securityRules: [
                  {
                    name: 'RDP'
                    properties: {
                      priority: 1001
                      direction: 'Inbound'
                      access: 'Allow'
                      protocol: 'Tcp'
                      sourcePortRange: '*'
                      destinationPortRange: '3389'
                      sourceAddressPrefix: '192.168.22.5/24'
                      destinationAddressPrefix: '*'
                    }
                  }
                ]
              }
            }
            ```
