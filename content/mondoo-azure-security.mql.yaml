  - uid: mondoo-azure-security-disable-udp-virtualmachines
    title: Ensure direct UDP access to Resources from the internet is restricted
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-azure-security-disable-udp-virtualmachines-azure
        tags:
          mondoo.com/filter-title: Azure Network Security Group
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-disable-udp-virtualmachines-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-disable-udp-virtualmachines-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-disable-udp-virtualmachines-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    props:
      - uid: mondooAzureSecurityDisallowedPortsUDP
        title: A list of disallowed UDP ports, by default covering common UDP services. Add more as needed.
        mql: |
          return [
            53,    // DNS
            123,   // NTP
            161,   // SNMP
            389,   // CLDAP
            1900   // SSDP
          ]
    docs:
      desc: |
        This check ensures that Network Security Groups are configured to block inbound UDP traffic from the internet on high-risk ports including DNS (53), NTP (123), SNMP (161), CLDAP (389), and SSDP (1900). Azure NSGs default to allowing all outbound traffic and do not block inbound UDP from the internet unless explicit deny rules are added.

        **Why this matters**

        - **Reflection amplification attacks:** UDP's connectionless nature allows attackers to spoof a victim's source IP and send small requests to open UDP services, which respond with much larger payloads directed at the victim, producing volumetric denial-of-service with minimal attacker bandwidth.
        - **Source IP spoofing:** UDP carries no handshake that validates the sender's address; any open UDP port can be weaponized as an amplifier without requiring the attacker to own or compromise the originating IP.
        - **Protocol-specific exploitation:** DNS, NTP, CLDAP, SNMP, and SSDP are each known to provide amplification factors of 10x to 4000x, making even a single open service a significant DDoS contribution vector when exposed to the internet.
        - **Unintended service exposure:** UDP services intended for internal use only are often inadvertently left reachable from the internet through overly broad NSG rules, exposing information and amplification capabilities without any operational need.

        **Risk mitigation**

        - **DDoS contribution elimination:** Blocking internet-sourced UDP on amplification-prone ports prevents the resource from being used as a reflector in attacks against third parties, which can also trigger abuse reports or upstream provider action against the subscription.
        - **Reconnaissance suppression:** UDP services such as SNMP expose device and configuration metadata to unauthenticated requests; restricting internet access removes the ability to enumerate this information remotely.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Access the Azure Portal and review the networking settings for each resource, focusing on those with public internet exposure.
        2. Inspect inbound port rules for associated Network Security Groups (NSGs) and any other relevant firewall settings.
        3. Confirm that none of the critical UDP ports are allowed from the internet, particularly for resources that do not require such access.

        **Automated Audit with Azure CLI:**

        Use the Azure CLI to review NSG rules across your Azure environment:

        ```bash
        az network nsg rule list --query "[].{NSG:networkSecurityGroup, Protocol:protocol, Access:access, Direction:direction, SourceAddressPrefix:sourceAddressPrefix, DestinationPortRange:destinationPortRange}" -o table
        ```

        Ensure no rule improperly exposes the specified UDP ports to the internet.
      remediation:
        - id: portal
          desc: |
            To restrict access on disallowed UDP ports using the Azure Portal, restrict UDP traffic in Microsoft Azure Portal:

            1. Log into the Azure Portal at https://portal.azure.com.
            2. Navigate to **Network Security Groups** and select the NSG associated with your resources.
            3. Review the inbound security rules and identify any that allow traffic on the disallowed UDP ports from the internet.
            4. Modify or remove these rules as necessary to restrict access.
            5. For services requiring UDP access, consider using secure alternatives or private connections such as VPNs or ExpressRoute.
        - id: cli
          desc: |
            To restrict access on disallowed UDP ports using the Azure CLI, delete or update the NSG rules that allow disallowed UDP ports:

            ```bash
            az network nsg rule list --resource-group <ResourceGroupName> --nsg-name <NSGName> --query "[].{Name:name, Protocol:protocol, Access:access, Direction:direction, SourceAddressPrefix:sourceAddressPrefix, DestinationPortRange:destinationPortRange}" -o table
            ```

            Review the output and identify any rules allowing disallowed UDP ports. Then, either delete or update those rules as needed.
        - id: powershell
          desc: |
            To restrict access on disallowed UDP ports using PowerShell, use the following command to list NSG rules:

            ```powershell
            Get-AzNetworkSecurityRuleConfig -NetworkSecurityGroup <NSGName> | Where-Object { $_.Access -eq "Allow" -and $_.Direction -eq "Inbound" -and $_.Protocol -match "UDP|*" }
            ```

            Review the output and identify any rules allowing disallowed UDP ports. Then, either delete or update those rules as needed.
        - id: terraform
          desc: |
            To restrict access on disallowed UDP ports in Terraform, modify the NSG rules in your configuration:

            ```hcl
            resource "azurerm_network_security_rule" "example" {
              name                        = "example-nsg-rule"
              network_security_group_name = azurerm_network_security_group.example.name
              priority                    = 100
              direction                   = "Inbound"
              access                      = "Deny"
              protocol                    = "Udp"
              source_address_prefix      = "*"
              destination_port_range     = "<DisallowedPort>"
            }
            ```

            Replace `<DisallowedPort>` with the specific port you want to restrict. Regularly review and update your Terraform configurations to ensure compliance with security best practices.
        - id: bicep
          desc: |
            To restrict access on disallowed UDP ports in Bicep:

            ```bicep
            resource nsg 'Microsoft.Network/networkSecurityGroups@2024-05-01' = {
              name: 'myNetworkSecurityGroup'
              location: resourceGroup().location
              properties: {
                securityRules: [
                  {
                    name: 'DenyAllUDP'
                    properties: {
                      priority: 1000
                      direction: 'Inbound'
                      access: 'Deny'
                      protocol: 'Udp'
                      sourcePortRange: '*'
                      destinationPortRange: '*'
                      sourceAddressPrefix: 'Internet'
                      destinationAddressPrefix: '*'
                    }
                  }
                ]
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/security/fundamentals/network-best-practices
        title: Azure Network Security Best Practices
  - uid: mondoo-azure-security-disable-udp-virtualmachines-azure
    filters: |
      asset.platform == "azure-network-security-group"
    mql: |
      allNsgUDP = azure.subscription.network.securityGroup.securityRules
        .where(
          properties.access == 'Allow'
            && direction == 'Inbound'
            && properties.protocol == /UDP|\*/i
            && properties.sourceAddressPrefix == /\*|0\.0\.0\.0|Internet|\/0|internet|any/
        )
      allNsgUDP.all(properties.destinationPortRange != "*")
      props.mondooAzureSecurityDisallowedPortsUDP {
        disallowedPortUDP = _
        disallowedPortUDP
        allNsgUDP.none(destinationPortRange.any(fromPort <= disallowedPortUDP && toPort >= disallowedPortUDP))
      }
