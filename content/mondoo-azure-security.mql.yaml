  - uid: mondoo-azure-security-ensure-register-with-ad-is-enabled-on-app-service-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == /azurerm_(linux|windows)_web_app/)
    mql: |
      if (terraform.plan.resourceChanges.where(type == "azurerm_linux_web_app").length > 0) {
        terraform.plan.resourceChanges.where(type == "azurerm_linux_web_app").all(
          change.after.identity != empty &&
          change.after.identity.all(_["type"] != empty)
        )
      }
      if (terraform.plan.resourceChanges.where(type == "azurerm_windows_web_app").length > 0) {
        terraform.plan.resourceChanges.where(type == "azurerm_windows_web_app").all(
          change.after.identity != empty &&
          change.after.identity.all(_["type"] != empty)
        )
      }
  - uid: mondoo-azure-security-ensure-register-with-ad-is-enabled-on-app-service-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == /azurerm_(linux|windows)_web_app/)
    mql: |
      if (terraform.state.resources.where(type == "azurerm_linux_web_app").length > 0) {
        terraform.state.resources.where(type == "azurerm_linux_web_app").all(
          values.identity != empty &&
          values.identity.all(_["type"] != empty)
        )
      }
      if (terraform.state.resources.where(type == "azurerm_windows_web_app").length > 0) {
        terraform.state.resources.where(type == "azurerm_windows_web_app").all(
          values.identity != empty &&
          values.identity.all(_["type"] != empty)
        )
      }
  - uid: mondoo-azure-security-ensure-the-kv-is-recoverable
    title: Ensure Key Vaults are configured with Recovery features
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-bcr-08
      compliance/dora: dora-art-12
      compliance/hipaa: hipaa-security-ss164-308-a-7-ii-a-contingency-plan-data-backup-plan
      compliance/iso-27001-2022: iso-27001-2022-a-8-13
      compliance/nis-2: nis-2-21-2-c
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-12
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-10
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc6-1-11
      compliance/vda-isa-5: false
    variants:
      - uid: mondoo-azure-security-ensure-the-kv-is-recoverable-azure
        tags:
          mondoo.com/filter-title: Azure Key Vault
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-ensure-the-kv-is-recoverable-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-ensure-the-kv-is-recoverable-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-ensure-the-kv-is-recoverable-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure Key Vaults are configured with purge protection enabled, which enforces a mandatory retention period before a deleted vault or its contents can be permanently destroyed. By default, Key Vault enables soft delete but does not enable purge protection, allowing anyone with sufficient permissions to permanently delete a vault and all its keys, secrets, and certificates immediately after the soft-delete operation.

        **Why this matters**

        - **Ransomware and destructive attacks**: An attacker with Key Vault delete permissions can permanently purge the vault, destroying all encryption keys and rendering every dependent encrypted resource permanently inaccessible.
        - **Insider threat mitigation**: A disgruntled administrator can delete and purge a Key Vault in seconds; purge protection enforces a mandatory retention period, giving the organization time to detect the deletion and initiate recovery before data is permanently lost.
        - **Cross-service blast radius**: A single Key Vault deletion cascades across every service using CMKs from that vault, including storage accounts, SQL databases, and managed disks, making it one of the highest-impact destructive actions in an Azure subscription.
        - **Recovery window**: Purge protection guarantees a configurable retention window of 7 to 90 days during which deleted vaults and objects can be recovered, regardless of who performed the deletion.

        **Risk mitigation**

        - **Accidental deletion recovery**: With purge protection enabled, any accidental or malicious deletion of a vault or key can be reversed during the retention period, preventing permanent data loss from a single operational mistake.
        - **Permission scope reduction**: Purge protection removes the operational need for any principal to hold the Purge permission in production, enabling a least-privilege model where no individual can cause irreversible key destruction.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Log in to the Azure Portal at https://portal.azure.com.
        2. Navigate to **Key Vaults**.
        3. Select a key vault and select **Properties**.
        4. Verify that **Purge Protection** is enabled, which ensures that deleted vaults and vault objects are recoverable during the retention period.

        **Automated Audit with Azure CLI:**

        Verify Purge Protection is enabled for each Key Vault:

        ```bash
        az keyvault list --query "[].{Name: name, PurgeProtection: properties.enablePurgeProtection}"
        ```
        Check the output for each Key Vault, ensuring that PurgeProtection is set to true.
      remediation:
        - id: portal
          desc: |
            To ensure Key Vaults are configured with Recovery features using the Azure Portal:

            1. Log in to the Azure Portal at https://portal.azure.com.
            2. Navigate to **Key Vaults**.
            3. Select a key vault and select **Properties**.
            4. Scroll to the **Security** section.
            5. If **Purge Protection** is not enabled, enable it. Note that once enabled, this setting cannot be disabled.
            6. Save your changes.
        - id: cli
          desc: |
            To ensure Key Vaults are configured with Recovery features using the Azure CLI, enable Purge Protection for a specific Key Vault:

            ```bash
            az keyvault update --name <VaultName> --resource-group <ResourceGroupName> --set properties.enablePurgeProtection=true
            ```
        - id: powershell
          desc: |
            To ensure Key Vaults are configured with Recovery features using PowerShell:

            ```powershell
            $vault = Get-AzKeyVault -VaultName <VaultName> -ResourceGroupName <ResourceGroupName>
            $vault.EnablePurgeProtection = $true
            Set-AzKeyVault -KeyVault $vault
            ```
        - id: terraform
          desc: |
            To ensure Key Vaults are configured with Recovery features in Terraform:

            ```hcl
            resource "azurerm_key_vault" "example" {
              name                = "example-keyvault"
              location            = azurerm_resource_group.example.location
              resource_group_name = azurerm_resource_group.example.name

              purge_protection_enabled = true
            }
            ```
        - id: bicep
          desc: |
            To ensure Key Vaults are configured with Recovery features in Bicep:

            ```bicep
            resource keyVault 'Microsoft.KeyVault/vaults@2023-07-01' = {
              name: 'example-keyvault'
              location: resourceGroup().location
              properties: {
                enableSoftDelete: true
                softDeleteRetentionInDays: 90
                enablePurgeProtection: true
                // ...
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/key-vault/general/security-features
        title: Azure Key Vault Security
  - uid: mondoo-azure-security-ensure-web-app-is-using-the-latest-tls
    title: Ensure that Web Apps use the latest available version of TLS encryption
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    variants:
      - uid: mondoo-azure-security-ensure-web-app-is-using-the-latest-tls-azure
        tags:
          mondoo.com/filter-title: Azure App Service
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-ensure-web-app-is-using-the-latest-tls-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-ensure-web-app-is-using-the-latest-tls-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-ensure-web-app-is-using-the-latest-tls-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure App Services are configured to require a minimum TLS version of 1.2 for all inbound connections. By default, Azure App Service accepts TLS 1.0 and 1.1 connections for backward compatibility, exposing web applications to protocol-level downgrade attacks that exploit weaknesses in those older versions.

        **Why this matters**

        - **Protocol vulnerability exposure**: TLS 1.0 and 1.1 are affected by known cryptographic weaknesses including BEAST, POODLE, and SLOTH that allow an attacker with a network position to decrypt session content or forge authenticated messages.
        - **Cipher suite weakness**: Older TLS versions negotiate weaker cipher suites including RC4 and export-grade ciphers that are practically breakable with modern hardware, enabling passive decryption of captured traffic.
        - **Compliance requirement**: PCI DSS 4.0, NIST SP 800-52 Rev2, and Azure's own security baseline require TLS 1.2 as the minimum acceptable version for internet-facing services handling sensitive data.
        - **Browser and client enforcement**: Major browsers have dropped support for TLS 1.0 and 1.1; accepting these versions from server-side provides no legitimate operational benefit and only serves attackers who deliberately negotiate down.

        **Risk mitigation**

        - **Downgrade attack prevention**: Setting the minimum TLS version to 1.2 prevents clients and attackers from negotiating the weaker protocol versions that are susceptible to known decryption attacks.
        - **Modern cipher enforcement**: TLS 1.2 and above negotiate forward-secrecy cipher suites by default, ensuring that captured traffic cannot be decrypted retroactively even if a server private key is later compromised.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Log in to the Azure Portal at https://portal.azure.com.
        2. Navigate to **App Services**.
        3. Select an app service and select **TLS/SSL settings** under **Settings**.
        4. Verify that the **Minimum TLS Version** is set to **1.2**.

        **Automated Audit with Azure CLI:**

        Verify that the minimum TLS version is set to 1.2 for each App Service:

        ```bash
        az webapp config show --resource-group <RESOURCE_GROUP_NAME> --name <APP_NAME> --query minTlsVersion
        ```

        **Automated Audit with PowerShell:**

        ```powershell
        Get-AzWebApp | foreach {
          Get-AzWebApp -ResourceGroupName $_.ResourceGroup -Name $_.Name | Select-Object Name, ResourceGroup, @{Name="TLS Version"; Expression={$_.SiteConfig.MinTlsVersion}}
        }
        ```
      remediation:
        - id: portal
          desc: |
            To ensure that Web Apps use the latest available version of TLS encryption using the Azure Portal:
            1. Log into Microsoft Azure Portal at https://portal.azure.com
            2. Go to **App Services**.
            3. For each app:
              a. Select the app.
              b. Select **TLS/SSL settings** under **Settings**.
              c. Under **Minimum TLS Version**, select **1.2**.
              d. Select **Save**.
        - id: cli
          desc: |
            To ensure that Web Apps use the latest available version of TLS encryption using the Azure CLI, set the minimum TLS version to 1.2 for a new app service:

            ```bash
            az webapp create --name <APP_NAME> --resource-group <RESOURCE_GROUP_NAME> --plan <APP_SERVICE_PLAN> --min-tls-version 1.2
            ```
        - id: powershell
          desc: |
            To ensure that Web Apps use the latest available version of TLS encryption using PowerShell, set the minimum TLS version to 1.2 across all Web Apps:

            ```powershell
            Get-AzWebApp | foreach {
              Set-AzWebApp -ResourceGroupName $_.ResourceGroup -Name $_.Name -MinTlsVersion "1.2"
            }
            ```
        - id: terraform
          desc: |
            To ensure that Web Apps use the latest available version of TLS encryption in Terraform, set the minimum TLS version to 1.2 for an app service:

            ```hcl
            resource "azurerm_service_plan" "example" {
              name                = "example-plan"
              resource_group_name = azurerm_resource_group.example.name
              location            = azurerm_resource_group.example.location
              os_type             = "Linux"
              sku_name            = "B1"
            }

            resource "azurerm_linux_web_app" "example" {
              name                = "example-web-app"
              resource_group_name = azurerm_resource_group.example.name
              location            = azurerm_resource_group.example.location
              service_plan_id     = azurerm_service_plan.example.id

              site_config {
                minimum_tls_version = "1.2"
              }
            }
            ```
        - id: bicep
          desc: |
            To ensure that Web Apps use the latest available version of TLS encryption in Bicep:

            ```bicep
            resource webApp 'Microsoft.Web/sites@2024-04-01' = {
              name: 'example-webapp'
              location: resourceGroup().location
              properties: {
                siteConfig: {
                  minTlsVersion: '1.2'
                }
                serverFarmId: appServicePlan.id
              }
            }
            ```
