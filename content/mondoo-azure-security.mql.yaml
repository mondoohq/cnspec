        values['virtual_network_subnet_id'] != empty &&
        values['site_config'] != empty &&
        values['site_config'].all(_['vnet_route_all_enabled'] == true)
      )
  - uid: mondoo-azure-security-app-service-ip-restrictions-default-deny
    title: Ensure App Service IP restrictions default to deny
    impact: 80
    variants:
      - uid: mondoo-azure-security-app-service-ip-restrictions-default-deny-azure
        tags:
          mondoo.com/filter-title: Azure App Service
          mondoo.com/icon: azure
    docs:
      desc: |
        This check ensures that Azure App Service instances have IP restriction default action set to deny, blocking traffic from any IP address that is not explicitly allowed.

        **Why this matters**

        - **Zero-trust access**: A default-allow posture permits any IP address to reach the application unless explicitly blocked, which is inherently insecure.
        - **Allowlist approach**: Default-deny requires explicit allowlist rules for authorized IP ranges, following the principle of least privilege.
        - **Defense in depth**: IP restrictions complement authentication and authorization controls, providing network-level access control.

        **Risk mitigation**

        - Set the IP security restrictions default action to `Deny` on all App Service instances.
        - Create explicit allow rules only for trusted IP ranges that need access.
      remediation:
        - id: portal
          desc: |
            **Using Azure Portal**

            1. Navigate to **App Services** in the Azure Portal.
            2. Select the App Service instance.
            3. Go to **Networking** > **Access restriction**.
            4. Set **Unmatched rule action** to **Deny**.
            5. Add allow rules for trusted IP ranges.
            6. Select **Save**.
        - id: cli
          desc: |
            **Using Azure CLI**

            ```bash
            az webapp config access-restriction set --resource-group <ResourceGroupName> --name <AppName> --default-action Deny
            ```
        - id: terraform
          desc: |
            **Using Terraform**

            ```hcl
            resource "azurerm_linux_web_app" "example" {
              name                = "example-webapp"
              resource_group_name = azurerm_resource_group.example.name
              location            = azurerm_resource_group.example.location
              service_plan_id     = azurerm_service_plan.example.id

              site_config {
                ip_restriction_default_action = "Deny"
              }
            }
            ```
        - id: bicep
          desc: |
            **Using Bicep**

            ```bicep
            resource webAppConfig 'Microsoft.Web/sites/config@2023-01-01' = {
              parent: webApp
              name: 'web'
              properties: {
                ipSecurityRestrictionsDefaultAction: 'Deny'
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/app-service/app-service-ip-restrictions
        title: Azure App Service access restrictions
  - uid: mondoo-azure-security-app-service-ip-restrictions-default-deny-azure
    filters: |
      asset.platform == "azure-appsite"
    mql: |
      azure.subscription.webService.appsite.configuration.ipSecurityRestrictionsDefaultAction == "Deny"
  - uid: mondoo-azure-security-storage-cmk-encryption
    title: Ensure storage accounts use customer-managed keys
    impact: 70
    variants:
      - uid: mondoo-azure-security-storage-cmk-encryption-azure
        tags:
          mondoo.com/filter-title: Azure Storage Account
          mondoo.com/icon: azure
      - uid: mondoo-azure-security-storage-cmk-encryption-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/icon: terraform
      - uid: mondoo-azure-security-storage-cmk-encryption-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/icon: terraform
      - uid: mondoo-azure-security-storage-cmk-encryption-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/icon: terraform
    docs:
      desc: |
        This check ensures that Azure Storage accounts use customer-managed keys (CMK) for encryption, providing key lifecycle control beyond the default Microsoft-managed encryption.

        **Why this matters**

        - **Key lifecycle control**: Customer-managed keys allow organizations to control key rotation, revocation, and access policies.
        - **Compliance alignment**: Many regulatory frameworks require customer-managed encryption keys for sensitive data.
        - **Separation of duties**: CMK separates the encryption key management from the data storage, enabling independent audit and access control.

        **Risk mitigation**

        - Configure customer-managed keys in Azure Key Vault for storage account encryption.
        - Implement key rotation policies and access controls in Key Vault.
      remediation:
        - id: portal
          desc: |
            **Using Azure Portal**

            1. Navigate to **Storage accounts** in the Azure Portal.
            2. Select the storage account.
            3. Under **Security + networking**, select **Encryption**.
            4. Select **Customer-managed keys** as the encryption type.
            5. Configure the Key Vault and key.
            6. Select **Save**.
        - id: cli
          desc: |
            **Using Azure CLI**

            ```bash
            az storage account update --resource-group <ResourceGroupName> --name <StorageAccountName> --encryption-key-source Microsoft.Keyvault --encryption-key-vault <KeyVaultUri> --encryption-key-name <KeyName>
            ```
        - id: terraform
          desc: |
            **Using Terraform**

            ```hcl
            resource "azurerm_storage_account" "example" {
              name                     = "examplestorage"
              resource_group_name      = azurerm_resource_group.example.name
              location                 = azurerm_resource_group.example.location
              account_tier             = "Standard"
              account_replication_type = "LRS"

              customer_managed_key {
