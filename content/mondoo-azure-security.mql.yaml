      - uid: mondoo-azure-security-log-analytics-public-ingestion-disabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that public network access for log ingestion is disabled on Azure Log Analytics workspaces. Disabling public ingestion ensures that log data can only be sent to the workspace through private network paths.

        **Why this matters**

        - Public ingestion endpoints allow any network to send log data to the workspace, which could be exploited for log injection or data exfiltration via outbound log streams.
        - Private ingestion ensures that log data traverses the Azure backbone network, preventing interception or tampering.
        - This is critical for workspaces receiving sensitive security logs, diagnostic data, or compliance-relevant audit trails.

        **Risk mitigation**

        - **Network isolation:** Log ingestion occurs only through private endpoints.
        - **Log integrity:** Prevents unauthorized log injection from public networks.
        - **Data protection:** Sensitive log data does not traverse the public internet.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Log Analytics workspaces** in the Azure Portal.
        2. Select a workspace.
        3. Go to **Network Isolation** under **Settings**.
        4. Verify that **Public network access for ingestion** is **Disabled**.
      remediation:
        - id: portal
          desc: |
            To disable public ingestion access using the Azure Portal:

            1. Navigate to **Log Analytics workspaces** in the Azure Portal.
            2. Select the workspace.
            3. Go to **Network Isolation** under **Settings**.
            4. Set **Public network access for ingestion** to **Disabled**.
            5. Ensure private link scope resources are configured.
        - id: cli
          desc: |
            To disable public ingestion access using the Azure CLI:

            ```bash
            az monitor log-analytics workspace update \
              --workspace-name <WorkspaceName> \
              --resource-group <ResourceGroupName> \
              --ingestion-access Disabled
            ```
        - id: terraform
          desc: |
            To disable public ingestion access in Terraform:

            ```hcl
            resource "azurerm_log_analytics_workspace" "example" {
              name                               = "example-workspace"
              location                           = azurerm_resource_group.example.location
              resource_group_name                = azurerm_resource_group.example.name
              sku                                = "PerGB2018"
              internet_ingestion_enabled         = false
            }
            ```
        - id: bicep
          desc: |
            To disable public ingestion access in Bicep:

            ```bicep
            resource workspace 'Microsoft.OperationalInsights/workspaces@2023-09-01' = {
              name: 'example-workspace'
              location: resourceGroup().location
              properties: {
                sku: {
                  name: 'PerGB2018'
                }
                publicNetworkAccessForIngestion: 'Disabled'
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/azure-monitor/logs/private-link-security
        title: Use Azure Private Link to connect networks to Azure Monitor
