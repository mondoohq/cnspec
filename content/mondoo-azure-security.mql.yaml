  # No Terraform variants: the runtime check enforces httpPort == 0 to confirm HTTP is
  # disabled on the origin, but the azurerm_cdn_frontdoor_origin schema validates http_port
  # as 1..65535 (default 80) and offers no way to disable HTTP. The runtime intent is not
  # expressible as a Terraform configuration assertion.
  # No Terraform remediation: same reason — the azurerm_cdn_frontdoor_origin resource has no argument that disables HTTP on the origin.
  - uid: mondoo-azure-security-frontdoor-origin-https
    title: Ensure Front Door origins use HTTPS only
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    variants:
      - uid: mondoo-azure-security-frontdoor-origin-https-azure
        tags:
          mondoo.com/filter-title: Azure Subscription
          mondoo.com/filter-icon: azure
    docs:
      desc: |
        This check ensures that Azure Front Door origin servers are configured to serve traffic only over HTTPS, preventing unencrypted HTTP connections between Front Door and the origin. By default, Front Door allows origins to accept both HTTP and HTTPS, which means the client-facing TLS connection is terminated at the Front Door edge while the hop to the origin can be unencrypted.

        **Why this matters**

        - **Internal hop exposure**: Front Door terminates TLS at the edge, but traffic between Front Door and the origin can be sent over HTTP if the origin allows it, creating an unencrypted segment in the request path that carries the full request and response payload.
        - **Network interception risk**: An attacker with access to the network path between Front Door and the origin could intercept or tamper with unencrypted HTTP traffic, silently modifying responses or harvesting sensitive data.
        - **End-to-end encryption gap**: Configuring origins with only an HTTPS port ensures encryption is maintained from the client all the way to the origin, not just from the client to the CDN edge.
        - **Compliance scope**: Many compliance frameworks require encryption of data in transit across all network segments, not just the client-facing edge, and an unencrypted origin hop can cause a framework failure even when client-side HTTPS is enforced.

        **Risk mitigation**

        - **Origin impersonation prevention**: Requiring HTTPS on the origin connection forces certificate validation between Front Door and the origin, preventing a network-level attacker from inserting a transparent proxy that strips TLS at the edge-to-origin boundary.
        - **Response integrity**: Unencrypted HTTP traffic between Front Door and the origin can be tampered with in transit; enforcing HTTPS ensures that response payloads delivered to clients have not been modified between the origin and the Front Door edge.
        - **Consistent transport security**: Setting the HTTP port to 0 on the origin configuration makes it impossible for Front Door to fall back to HTTP, providing a stronger guarantee than relying on origin-side redirect rules that could be bypassed or misconfigured.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Front Door and CDN profiles** in the Azure Portal.
        2. Select a Front Door profile.
        3. Go to **Origin groups** under **Settings**.
        4. For each origin group, select the origin and verify that only the HTTPS port is configured and the HTTP port is not in use.

        **Automated Audit with Azure CLI:**

        ```bash
        az afd origin list --resource-group <ResourceGroupName> --profile-name <ProfileName> --origin-group-name <OriginGroupName> --query "[].{name:name, httpPort:httpPort, httpsPort:httpsPort}"
        ```
      remediation:
        - id: portal
          desc: |
            To configure Front Door origins for HTTPS only:

            1. Navigate to **Front Door and CDN profiles** in the Azure Portal.
            2. Select the Front Door profile.
            3. Go to **Origin groups** under **Settings**.
            4. Select the origin group, then select the origin.
            5. Set the **HTTPS port** to **443**.
            6. Remove or disable the **HTTP port** by setting it to **0** or removing HTTP from the origin configuration.
            7. Click **Update**.
        - id: cli
          desc: |
            ```bash
            az afd origin update --resource-group <ResourceGroupName> --profile-name <ProfileName> --origin-group-name <OriginGroupName> --origin-name <OriginName> --https-port 443 --http-port 0
            ```
        - id: bicep
          desc: |
            ```bicep
            resource origin 'Microsoft.Cdn/profiles/originGroups/origins@2024-02-01' = {
              parent: originGroup
              name: 'example-origin'
              properties: {
                hostName: 'example.azurewebsites.net'
                httpsPort: 443
                httpPort: 0
                enforceCertificateNameCheck: true
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/frontdoor/origin
        title: Origins and origin groups in Azure Front Door
      - url: https://learn.microsoft.com/en-us/azure/frontdoor/end-to-end-tls
        title: End-to-end TLS with Azure Front Door
  - uid: mondoo-azure-security-frontdoor-origin-https-azure
    filters: |
      asset.platform == "azure"
    mql: |
      azure.subscription.frontDoor.profiles.all(
        originGroups.all(origins.all(httpPort == 0))
      )
  - uid: mondoo-azure-security-sql-server-audit-destination-configured
    title: Ensure Azure SQL Server auditing has a log destination configured
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-02
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-pr-pt-1
      compliance/nist-csf-2: nist-csf-2-pr-ps-04
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-12
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    variants:
      - uid: mondoo-azure-security-sql-server-audit-destination-configured-azure
        tags:
          mondoo.com/filter-title: Azure SQL Server
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-sql-server-audit-destination-configured-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-sql-server-audit-destination-configured-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-sql-server-audit-destination-configured-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure SQL Server auditing is enabled and configured to send logs to a retained destination such as an Azure Storage account, or Log Analytics or Event Hub via Azure Monitor. Auditing with no destination produces no useful evidence: events are generated but never persisted for review.

        **Why this matters**

        - **Audit evidence:** Without a configured destination, audit events are dropped; a policy with `state: Enabled` but no storage endpoint and no Azure Monitor target produces zero retrievable logs.
        - **Compliance gap:** Frameworks that require database activity logging assume the logs are actually retained; a misconfigured policy fails the underlying control even when the toggle reads as enabled.
        - **Incident response:** Investigators need historical audit data; a destination must be configured before an incident occurs, not after, when it is too late to recover past activity.

        **Risk mitigation**

        - **Configure a durable log destination:** Set at least one of `storageEndpoint` (pointing to an Azure Storage account) or `isAzureMonitorTargetEnabled` (routing to Log Analytics or Event Hub) on the server audit policy.
        - **Verify destination accessibility:** Confirm that the storage account or Log Analytics workspace is accessible from the SQL server and that the server's managed identity has write permissions to the target.
        - **Alert on audit policy changes:** Monitor for modifications to the server audit policy configuration so that accidental or unauthorized destination removal is detected immediately rather than discovered during an incident investigation.
      audit: |
        **Manual Audit via Azure Portal:**

        1. In the Azure Portal, navigate to **SQL servers** and select the server.
        2. Under **Security**, select **Auditing**.
        3. Verify that auditing is enabled and that at least one destination is selected, such as Storage, Log Analytics, or Event Hub.

        **Automated Audit with Azure CLI:**

        ```bash
        az sql server audit-policy show --name <ServerName> --resource-group <ResourceGroupName>
        ```

        Confirm that `state` is `Enabled` and that either `storageEndpoint` is non-empty or `isAzureMonitorTargetEnabled` is `true`.
      remediation:
        - id: portal
          desc: |
            To configure a destination for SQL Server auditing using the Azure Portal:

            1. Log into the Azure Portal at https://portal.azure.com.
            2. Navigate to **SQL servers** and select the server.
            3. Under **Security**, select **Auditing**.
            4. Set **Enable Azure SQL Auditing** to **On**.
            5. Select at least one destination: **Storage**, **Log Analytics**, or **Event Hub**.
            6. Select **Save**.
        - id: cli
          desc: |
            To enable auditing with a Storage Account destination using the Azure CLI:

            ```bash
            az sql server audit-policy update --name <ServerName> --resource-group <ResourceGroupName> --state Enabled --blob-storage-target-state Enabled --storage-endpoint <StorageAccountBlobEndpoint> --storage-key <StorageAccountKey> --retention-days 90
            ```

            To enable auditing with a Log Analytics destination, use `--log-analytics-target-state Enabled --log-analytics-workspace-resource-id <WorkspaceResourceId>`.
        - id: terraform
          desc: |
            To configure SQL Server auditing with a destination in Terraform:

            ```hcl
            resource "azurerm_mssql_server_extended_auditing_policy" "example" {
              server_id              = azurerm_mssql_server.example.id
              storage_endpoint       = azurerm_storage_account.example.primary_blob_endpoint
              log_monitoring_enabled = true
              retention_in_days      = 90
            }
            ```
        - id: bicep
          desc: |
