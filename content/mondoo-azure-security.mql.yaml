  - uid: mondoo-azure-security-log-analytics-local-auth-disabled
    title: Ensure Log Analytics workspaces disable local authentication
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-14
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-5
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-1-2
    variants:
      - uid: mondoo-azure-security-log-analytics-local-auth-disabled-azure
        tags:
          mondoo.com/filter-title: Azure Subscription
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-log-analytics-local-auth-disabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-log-analytics-local-auth-disabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-log-analytics-local-auth-disabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that local authentication is disabled on Azure Log Analytics workspaces. When local authentication is enabled, clients can use workspace keys or shared access signatures to authenticate, bypassing Azure AD identity controls and conditional access policies.

        **Why this matters**

        - Local authentication uses shared keys that cannot be attributed to individual users, making it impossible to audit who accessed or modified log data.
        - Shared keys do not support multi-factor authentication, conditional access, or Privileged Identity Management.
        - Disabling local authentication forces all access through Azure AD, ensuring identity governance policies are enforced.
        - Log data often contains sensitive security events and diagnostic information that requires strict access controls.

        **Risk mitigation**

        - **Identity tracking:** All workspace access is attributed to individual Azure AD identities.
        - **Conditional access:** Azure AD policies such as MFA and location-based access apply to all log queries and ingestion.
        - **Audit trail:** Azure AD sign-in logs capture all workspace access attempts.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Log Analytics workspaces** in the Azure Portal.
        2. Select a workspace.
        3. Go to **Properties** under **Settings**.
        4. Verify that **Local authentication** is set to **Disabled**.

        **Automated Audit with Azure CLI:**

        ```bash
        az monitor log-analytics workspace show --workspace-name <WorkspaceName> --resource-group <ResourceGroupName> --query "features.disableLocalAuth"
        ```
      remediation:
        - id: portal
          desc: |
            To disable local authentication using the Azure Portal:

            1. Navigate to **Log Analytics workspaces** in the Azure Portal.
            2. Select the workspace.
            3. Go to **Properties** under **Settings**.
            4. Set **Local authentication** to **Disabled**.
            5. Save the changes.
        - id: cli
          desc: |
            To disable local authentication using the Azure CLI:

            ```bash
            az monitor log-analytics workspace update \
              --workspace-name <WorkspaceName> \
              --resource-group <ResourceGroupName> \
              --set features.disableLocalAuth=true
            ```
        - id: terraform
          desc: |
            To disable local authentication in Terraform:

            ```hcl
            resource "azurerm_log_analytics_workspace" "example" {
              name                = "example-workspace"
              location            = azurerm_resource_group.example.location
              resource_group_name = azurerm_resource_group.example.name
              sku                 = "PerGB2018"
              local_authentication_disabled = true
            }
            ```
        - id: bicep
          desc: |
            To disable local authentication in Bicep:

            ```bicep
            resource workspace 'Microsoft.OperationalInsights/workspaces@2023-09-01' = {
              name: 'example-workspace'
              location: resourceGroup().location
              properties: {
                sku: {
                  name: 'PerGB2018'
                }
                features: {
                  disableLocalAuth: true
                }
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/azure-monitor/logs/manage-access
        title: Manage access to Log Analytics workspaces
  - uid: mondoo-azure-security-log-analytics-local-auth-disabled-azure
    filters: |
      asset.platform == "azure"
    mql: |
