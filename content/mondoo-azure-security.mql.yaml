        values['frontend_ip_configuration'] != null &&
        values['frontend_ip_configuration'].any(
          _['subnet_id'] != null
        )
      )
  - uid: mondoo-azure-security-servicebus-namespace-cmk-encryption
    title: Ensure Service Bus namespaces use customer-managed encryption keys
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-azure-security-servicebus-namespace-cmk-encryption-azure
        tags:
          mondoo.com/filter-title: Azure Service Bus
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-servicebus-namespace-cmk-encryption-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-servicebus-namespace-cmk-encryption-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-servicebus-namespace-cmk-encryption-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure Service Bus namespaces encrypt data at rest with customer-managed keys (CMK) stored in Azure Key Vault, rather than relying on platform-managed keys.

        **Why this matters**

        - **Key custody**: Platform-managed keys are owned and rotated by Microsoft. Customer-managed keys live in a Key Vault that the organization controls, so cryptographic material is governed by the same access policies, rotation schedules, and audit pipeline as other regulated secrets.
        - **Revocation**: When CMK is enabled, revoking the Key Vault key immediately renders namespace data unreadable, which is a meaningful incident-response lever during a suspected compromise.
        - **Compliance alignment**: Many regulated frameworks require sensitive workload data at rest to be encrypted with keys the customer manages, especially when the data includes business-impacting messaging.

        **Risk mitigation**

        - Configure CMK on Premium-tier Service Bus namespaces with the key stored in a Key Vault that has soft delete and purge protection enabled.
        - Pair CMK with infrastructure-layer (double) encryption for workloads that require defense-in-depth at the storage layer.

        Note: Only the Premium SKU supports CMK; Basic and Standard namespaces use platform-managed encryption only.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Service Bus** in the Azure Portal.
        2. Select a Premium-tier namespace.
        3. Open **Encryption** under **Settings**.
        4. Verify that the encryption key source is **Customer-managed key** and a Key Vault key is selected.

        **Automated Audit with Azure CLI:**

        ```bash
        az servicebus namespace show --resource-group <ResourceGroupName> --name <NamespaceName> --query "encryption"
        ```
      remediation:
        - id: portal
          desc: |
            To configure CMK on a Service Bus namespace using the Azure Portal:

            1. Ensure the namespace is on the Premium SKU and has a system-assigned or user-assigned managed identity.
            2. Grant the namespace's identity the **Key Vault Crypto Service Encryption User** role on the target Key Vault.
            3. Navigate to **Service Bus** and select the namespace.
            4. Under **Settings**, select **Encryption**.
            5. Choose **Customer-managed key**, select the Key Vault and key, and **Save**.
        - id: cli
          desc: |
            To configure CMK on a Service Bus namespace using the Azure CLI:

            ```bash
            az servicebus namespace encryption add \
              --resource-group <ResourceGroupName> \
              --namespace-name <NamespaceName> \
              --encryption-config key-name=<KeyName> key-vault-uri=<KeyVaultUri>
            ```
        - id: terraform
          desc: |
            To configure CMK on a Service Bus namespace in Terraform:

            ```hcl
            resource "azurerm_servicebus_namespace" "example" {
              name                = "example-sb-namespace"
              location            = azurerm_resource_group.example.location
              resource_group_name = azurerm_resource_group.example.name
              sku                 = "Premium"
              capacity            = 1

              identity {
                type = "SystemAssigned"
              }

              customer_managed_key {
                key_vault_key_id              = azurerm_key_vault_key.example.id
                infrastructure_encryption_enabled = false
              }
            }
            ```
        - id: bicep
          desc: |
            To configure CMK on a Service Bus namespace in Bicep:

            ```bicep
            resource serviceBusNamespace 'Microsoft.ServiceBus/namespaces@2024-01-01' = {
              name: 'example-sb-namespace'
              location: resourceGroup().location
              sku: {
                name: 'Premium'
                tier: 'Premium'
                capacity: 1
              }
              identity: {
                type: 'SystemAssigned'
              }
              properties: {
                encryption: {
                  keySource: 'Microsoft.KeyVault'
                  keyVaultProperties: [
                    {
                      keyName: 'example-key'
                      keyVaultUri: 'https://example-kv.vault.azure.net'
                    }
                  ]
                }
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/service-bus-messaging/configure-customer-managed-key
        title: Configure customer-managed keys for Azure Service Bus
