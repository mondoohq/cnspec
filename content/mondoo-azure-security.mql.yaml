  - uid: mondoo-azure-security-secure-transfer-required-enabled
    title: Mandate HTTPS for Secure Data Transfer to Azure storage accounts
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    variants:
      - uid: mondoo-azure-security-secure-transfer-required-enabled-azure
        tags:
          mondoo.com/filter-title: Azure Storage Account
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-secure-transfer-required-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-secure-transfer-required-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-secure-transfer-required-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure storage accounts are configured to require HTTPS for all data transfer operations. By default, Azure storage accounts accept both HTTP and HTTPS connections, leaving data in transit vulnerable to interception on unencrypted paths.

        **Why this matters**

        - **In-transit confidentiality**: Enforcing HTTPS ensures that all data moving between clients and the storage account is encrypted with TLS, preventing passive eavesdropping on the network path.
        - **Tamper protection**: TLS provides integrity checking that detects and rejects modified responses; without it, a network-positioned attacker can inject or alter storage responses.
        - **Credential exposure prevention**: Shared Access Signatures and storage account keys transmitted over plain HTTP can be captured in plaintext by anyone monitoring the network path.
        - **SMB channel security**: The requirement also blocks unencrypted SMB 2.x connections to Azure Files shares, which transmit authentication material and file data in cleartext over SMB 2.x without signing.

        **Risk mitigation**

        - **Network interception**: Requiring HTTPS renders any intercepted traffic unreadable, protecting both data content and authentication tokens from passive capture.
        - **Man-in-the-middle prevention**: TLS certificate validation prevents attackers from impersonating the storage endpoint and serving modified data to clients.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Storage Accounts** from the Azure portal.
        2. For each storage account, select **Configuration** under the settings panel.
        3. Verify that the **Secure transfer required** option is set to **Enabled**.

        **Automated Audit with Azure CLI:**

        Use the Azure CLI to check the status of the 'Secure transfer required' setting across all storage accounts:

        ```bash
        az storage account list --query "[].{AccountName:name, SecureTransferEnabled: enableHttpsTrafficOnly}" -o table
        ```
      remediation:
        - id: portal
          desc: |
            To mandate HTTPS for Secure Data Transfer to Azure storage accounts using the Azure Portal:

            1. Navigate to **Storage Accounts** in the Azure portal.
            2. Select the storage account you want to configure.
            3. In the settings menu, select **Configuration**.
            4. Set the **Secure transfer required** option to **Enabled**.
            5. Save the changes.
        - id: cli
          desc: |
            To mandate HTTPS for Secure Data Transfer to Azure storage accounts using the Azure CLI, enable 'Secure transfer required' for an individual storage account in a resource group:

            ```bash
            az storage account update --name <StorageAccountName> --resource-group <ResourceGroupName> --https-only true
            ```
        - id: powershell
          desc: |
            To mandate HTTPS for Secure Data Transfer to Azure storage accounts using PowerShell:

            ```powershell
            Set-AzStorageAccount -Name <StorageAccountName> -ResourceGroupName <ResourceGroupName> -EnableHttpsTrafficOnly $true
            ```
        - id: terraform
          desc: |
            To mandate HTTPS for Secure Data Transfer to Azure storage accounts in Terraform:

            ```hcl
            resource "azurerm_storage_account" "example_storage_account" {
              ...
              https_traffic_only_enabled = true
            }
            ```
        - id: bicep
          desc: |
            To mandate HTTPS for Secure Data Transfer to Azure storage accounts in Bicep:

            ```bicep
            resource storageAccount 'Microsoft.Storage/storageAccounts@2023-05-01' = {
              name: 'examplestorageaccount'
              location: resourceGroup().location
              kind: 'StorageV2'
              sku: {
                name: 'Standard_LRS'
              }
              properties: {
                supportsHttpsTrafficOnly: true
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/storage/common/storage-security-guide
        title: Azure Storage Security Guide
