  - uid: mondoo-azure-security-log-analytics-workspace-cmk-encryption
    title: Ensure Log Analytics workspaces use a CMK-enabled dedicated cluster
    impact: 40
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-azure-security-log-analytics-workspace-cmk-encryption-azure
        tags:
          mondoo.com/filter-title: Azure Log Analytics
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-log-analytics-workspace-cmk-encryption-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-log-analytics-workspace-cmk-encryption-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-log-analytics-workspace-cmk-encryption-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure Log Analytics workspaces are linked to a dedicated Log Analytics cluster. A cluster link is the prerequisite for customer-managed-key (CMK) encryption of ingested log data: the cluster holds the CMK reference, and every workspace linked to that cluster inherits CMK protection for at-rest log data.

        **Why this matters**

        - **CMK is cluster-scoped**: Standalone workspaces always use platform-managed encryption. Customer-managed encryption for Log Analytics is configured on the dedicated cluster (`Microsoft.OperationalInsights/clusters`) and applies to every workspace linked to that cluster.
        - **Sensitive log content**: Log Analytics workspaces commonly hold authentication events, KQL detection results, and other security telemetry that should be encrypted with keys the organization controls.
        - **Posture signal**: A workspace with no linked cluster cannot have CMK applied. The presence of a cluster link is necessary but not sufficient. The cluster itself must also have CMK configured, which this check does not validate directly.

        **Risk mitigation**

        - Create a `Microsoft.OperationalInsights/clusters` resource with `keyVaultProperties` and a system-assigned identity that has access to the Key Vault key.
        - Link the workspace to the cluster via `azurerm_log_analytics_linked_service` (or the Azure equivalent).

        This check has a lower impact score because cluster-link visibility is a posture signal, not a definitive misconfiguration; the dedicated-cluster requirement also has a high commitment cost (a minimum capacity reservation) that not all workspaces meet.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Log Analytics workspaces** in the Azure Portal.
        2. Select a workspace.
        3. Open **Properties** under **Settings**.
        4. Verify that the workspace is linked to a **Dedicated cluster** and the cluster has customer-managed key encryption configured.

        **Automated Audit with Azure CLI:**

        ```bash
        az monitor log-analytics workspace show --resource-group <ResourceGroupName> --workspace-name <WorkspaceName> --query "features.clusterResourceId"
        ```
      remediation:
        - id: portal
          desc: |
            To link a Log Analytics workspace to a CMK-enabled dedicated cluster using the Azure Portal:

            1. Create a dedicated **Log Analytics cluster** (`Microsoft.OperationalInsights/clusters`) with a capacity reservation and a system-assigned managed identity.
            2. Grant the cluster's identity **Key Vault Crypto Service Encryption User** on the target Key Vault.
            3. On the cluster, configure **Encryption** with the Key Vault key.
            4. Link the workspace to the cluster from the cluster's **Linked workspaces** blade.
        - id: cli
          desc: |
            To link a Log Analytics workspace to a CMK-enabled dedicated cluster using the Azure CLI:

            ```bash
            az monitor log-analytics cluster create \
              --resource-group <ResourceGroupName> \
              --name <ClusterName> \
              --sku-capacity 500 \
              --identity-type SystemAssigned

            az monitor log-analytics cluster update \
              --resource-group <ResourceGroupName> \
              --name <ClusterName> \
              --key-vault-uri <KeyVaultUri> \
              --key-name <KeyName> \
              --key-version <KeyVersion>

            az monitor log-analytics workspace linked-service create \
              --resource-group <ResourceGroupName> \
              --workspace-name <WorkspaceName> \
              --name cluster \
              --write-access-resource-id <ClusterResourceId>
            ```
        - id: terraform
          desc: |
            To link a Log Analytics workspace to a CMK-enabled dedicated cluster in Terraform:

            ```hcl
            resource "azurerm_log_analytics_cluster" "example" {
              name                = "example-cluster"
              resource_group_name = azurerm_resource_group.example.name
              location            = azurerm_resource_group.example.location
              size_gb             = 500

              identity {
                type = "SystemAssigned"
              }
            }

            resource "azurerm_log_analytics_cluster_customer_managed_key" "example" {
              log_analytics_cluster_id = azurerm_log_analytics_cluster.example.id
              key_vault_key_id         = azurerm_key_vault_key.example.id
            }

            resource "azurerm_log_analytics_linked_service" "example" {
              resource_group_name = azurerm_resource_group.example.name
              workspace_id        = azurerm_log_analytics_workspace.example.id
              read_access_id      = azurerm_log_analytics_cluster.example.id
            }
            ```
        - id: bicep
          desc: |
            To link a Log Analytics workspace to a CMK-enabled dedicated cluster in Bicep:

            ```bicep
            resource cluster 'Microsoft.OperationalInsights/clusters@2022-10-01' = {
              name: 'example-cluster'
              location: resourceGroup().location
              identity: {
                type: 'SystemAssigned'
              }
              sku: {
                name: 'CapacityReservation'
                capacity: 500
              }
              properties: {
                keyVaultProperties: {
                  keyVaultUri: keyVault.properties.vaultUri
                  keyName: 'example-key'
                  keyVersion: ''
                }
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/azure-monitor/logs/customer-managed-keys
        title: Azure Monitor customer-managed key
