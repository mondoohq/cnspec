  - uid: mondoo-azure-security-network-database-ports-restricted
    title: Ensure database ports are restricted from the internet
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-azure-security-network-database-ports-restricted-azure
        tags:
          mondoo.com/filter-title: Azure Network Security Group
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-network-database-ports-restricted-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-network-database-ports-restricted-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-network-database-ports-restricted-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    props:
      - uid: mondooAzureSecurityDisallowedPortsDB
        title: A list of disallowed TCP database ports. Add more ports as needed.
        mql: |
          return [
            1433,
            3306,
            5432,
            27017,
          ]
    docs:
      desc: |
        This check ensures that network security group rules do not permit inbound internet access on common database ports, including MSSQL (1433), MySQL (3306), PostgreSQL (5432), and MongoDB (27017). Exposing database ports directly to the internet is one of the highest-risk misconfigurations in cloud environments, providing attackers with direct access to services that store sensitive data.

        **Why this matters**

        - **Brute-force and credential attack exposure:** Database services are among the most targeted by automated brute-force, credential stuffing, and default-credential attacks because they provide direct access to stored data.
        - **Vulnerability exploitation:** Database engines have a history of remotely exploitable vulnerabilities; restricting internet access limits exploitation to attackers who have already gained internal network access.
        - **Data exfiltration risk:** Direct internet connectivity to database ports allows attackers who successfully authenticate to exfiltrate entire datasets without traversing any additional security boundaries.
        - **Unintended exposure:** Database ports are sometimes left open during development or migration and forgotten, creating persistent exposure that is not reflected in operational risk assessments.

        **Risk mitigation**

        - **Attack surface elimination:** Blocking database ports from internet sources removes the direct path that automated scanners and opportunistic attackers use to discover and exploit database services.
        - **Breach containment:** Restricting database access to internal network ranges ensures that even if application-layer credentials are compromised, the attacker must first gain internal network access to exploit them against the database.
        - **Defense in depth:** NSG-level restrictions supplement database-level authentication controls, ensuring that a misconfigured database instance is not immediately accessible to internet-based attackers.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Log into the Azure Portal.
        2. Navigate to **Network security groups** under the Networking menu or directly through the search bar.
        3. For each NSG, access the **Inbound security rules**.
        4. Review each rule to identify any that allow inbound traffic on database ports (1433, 3306, 5432, 27017):
          - Check for rules where the protocol is set to `TCP` or `*`.
          - The destination port or port range includes any of the database ports.
          - The source address prefix is too broad, such as 'Any', '0.0.0.0', 'Internet', '/0', 'internet', or 'any'.

        **Automated Audit with Azure CLI:**

        List NSGs and check for database port access rules:

        ```bash
        az network nsg list --query "[].{NSG: name, Rules: securityRules[?access=='Allow' && protocol=='Tcp' && direction=='Inbound' && (destinationPortRange=='1433' || destinationPortRange=='3306' || destinationPortRange=='5432' || destinationPortRange=='27017') && (sourceAddressPrefix=='*' || sourceAddressPrefix=='0.0.0.0' || sourceAddressPrefix=='Internet' || sourceAddressPrefix=='/0' || sourceAddressPrefix=='internet' || sourceAddressPrefix=='any')]}" -o table
        ```

        **Automated Audit with PowerShell:**

        ```powershell
        Get-AzNetworkSecurityGroup | ForEach-Object { $nsg = $_; $_.SecurityRules | Where-Object { $_.Access -eq "Allow" -and $_.Direction -eq "Inbound" -and ($_.DestinationPortRange -in @("1433","3306","5432","27017")) -and ($_.SourceAddressPrefix -in @("*","0.0.0.0","Internet","/0","internet","any")) } | Select-Object @{Name="NSG";Expression={$nsg.Name}}, Name, DestinationPortRange }
        ```
      remediation:
        - id: portal
          desc: |
            To restrict access on disallowed TCP database ports using the Azure Portal:

            1. Log into the Azure Portal and navigate to **Network Security Groups**.
            2. Select the NSG associated with your resources.
            3. Review the **Inbound security rules** and modify or delete any rules that allow internet access to database ports (1433, 3306, 5432, 27017).
            4. Change the `source_address_prefix` to more restrictive settings, such as a specific IP range, virtual network, or private endpoint.
        - id: cli
          desc: |
            To restrict access on disallowed TCP database ports using the Azure CLI, update or create NSG rules to restrict database port access:

            ```bash
            az network nsg rule create --resource-group <ResourceGroupName> --nsg-name <NSGName> --name RestrictDBPorts --priority 1001 --direction Inbound --access Deny --protocol Tcp --source-address-prefixes "*" --destination-port-ranges 1433 3306 5432 27017
            ```
        - id: powershell
          desc: |
            To restrict access on disallowed TCP database ports using PowerShell:

            ```powershell
            New-AzNetworkSecurityRuleConfig -Name RestrictDBPorts -Protocol Tcp -Direction Inbound -Priority 1001 -SourceAddressPrefix * -SourcePortRange * -DestinationAddressPrefix * -DestinationPortRange 1433,3306,5432,27017 -Access Deny
            ```
        - id: terraform
          desc: |
            To restrict access on disallowed TCP database ports in Terraform:

            ```hcl
            # Ensure database ports are not exposed to the internet

            resource "azurerm_network_security_group" "example" {
              name                = "example-db-security"
              location            = azurerm_resource_group.rg.location
              resource_group_name = azurerm_resource_group.rg.name

              security_rule {
                name                       = "DenyDBFromInternet"
                priority                   = 1001
                direction                  = "Inbound"
                access                     = "Deny"
                protocol                   = "Tcp"
                source_port_range          = "*"
                destination_port_ranges    = ["1433", "3306", "5432", "27017"]
                source_address_prefix      = "*"
                destination_address_prefix = "*"
              }
            }
            ```
        - id: bicep
          desc: |
            To restrict access on disallowed TCP database ports in Bicep:

            ```bicep
            resource nsg 'Microsoft.Network/networkSecurityGroups@2024-05-01' = {
              name: 'example-nsg'
              location: resourceGroup().location
              properties: {
                securityRules: [
                  {
                    name: 'DenyDatabasePorts'
                    properties: {
                      priority: 1000
                      direction: 'Inbound'
                      access: 'Deny'
                      protocol: 'Tcp'
                      sourcePortRange: '*'
                      destinationPortRanges: [
                        '1433'
                        '3306'
                        '5432'
                        '1521'
                        '27017'
                      ]
                      sourceAddressPrefix: 'Internet'
                      destinationAddressPrefix: '*'
                    }
                  }
                ]
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/security/fundamentals/network-best-practices
        title: Azure Network Security Best Practices
  - uid: mondoo-azure-security-network-database-ports-restricted-azure
    filters: |
      asset.platform == "azure-network-security-group"
    mql: |
      allNsgTCP = azure.subscription.network.securityGroup.securityRules
        .where(
          properties.access == 'Allow'
            && direction == 'Inbound'
            && properties.protocol == /TCP|\*/i
            && properties.sourceAddressPrefix == /\*|0\.0\.0\.0|Internet|\/0|internet|any/
        )
      allNsgTCP.all(properties.destinationPortRange != "*")
      props.mondooAzureSecurityDisallowedPortsDB {
        disallowedPortDB = _
        disallowedPortDB
        allNsgTCP.none(destinationPortRange.any(fromPort <= disallowedPortDB && toPort >= disallowedPortDB))
      }
  - uid: mondoo-azure-security-network-database-ports-restricted-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "azurerm_network_security_group")
    mql: |
      terraform.resources.where(nameLabel == "azurerm_network_security_group").all(
        blocks.where(type == "security_rule").none(
          arguments['direction'] == "Inbound" &&
          arguments['access'] == "Allow" &&
          arguments['protocol'] == /Tcp|\*/i &&
          arguments['source_address_prefix'] == /\*|0\.0\.0\.0|Internet|Any/i &&
          arguments['destination_port_range'] == /^(1433|3306|5432|27017)$/
        )
      )
  - uid: mondoo-azure-security-network-database-ports-restricted-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "azurerm_network_security_group")
    mql: |
      terraform.plan.resourceChanges.where(type == "azurerm_network_security_group").all(
        change.after.security_rule == null ||
        change.after.security_rule.none(
          _['direction'] == "Inbound" &&
          _['access'] == "Allow" &&
          _['protocol'] == /Tcp|\*/i &&
          _['source_address_prefix'] == /\*|0\.0\.0\.0|Internet|Any/i &&
          _['destination_port_range'] == /^(1433|3306|5432|27017)$/
        )
      )
  - uid: mondoo-azure-security-network-database-ports-restricted-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "azurerm_network_security_group")
    mql: |
      terraform.state.resources.where(type == "azurerm_network_security_group").all(
        values.security_rule == null ||
        values.security_rule.none(
          _['direction'] == "Inbound" &&
          _['access'] == "Allow" &&
          _['protocol'] == /Tcp|\*/i &&
          _['source_address_prefix'] == /\*|0\.0\.0\.0|Internet|Any/i &&
          _['destination_port_range'] == /^(1433|3306|5432|27017)$/
        )
      )
  - uid: mondoo-azure-security-defender-for-cosmosdb-enabled
    title: Ensure Microsoft Defender for Cosmos DB is enabled
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-03
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-16
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-4
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-6
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    variants:
      - uid: mondoo-azure-security-defender-for-cosmosdb-enabled-azure
        tags:
          mondoo.com/filter-title: Azure Subscription
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-defender-for-cosmosdb-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-defender-for-cosmosdb-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-defender-for-cosmosdb-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Microsoft Defender for Cosmos DB is enabled to detect threats targeting Azure Cosmos DB accounts. Defender for Cosmos DB is not enabled by default; without it, there is no Azure-native layer of behavioral threat detection for anomalous queries, credential misuse, or unusual access patterns against Cosmos DB.

        **Why this matters**

        - **Threat detection coverage:** Defender for Cosmos DB detects potential SQL injection attempts, known suspicious access patterns, and anomalous query execution that may indicate active exploitation or reconnaissance.
        - **Anomalous access detection:** The service identifies unusual access from unexpected locations, suspicious IP addresses, or atypical user agents that can indicate compromised credentials being used against the database.
        - **Data exfiltration monitoring:** Defender monitors for unusual data extraction volumes and patterns that could indicate data theft, enabling timely response before large-scale exfiltration completes.
        - **Attacker technique coverage:** Defender for Cosmos DB includes detections tuned to Cosmos DB-specific attack techniques, going beyond generic network-level monitoring that would miss application-layer threats.

        **Risk mitigation**

        - **Early breach detection:** Enabling threat detection on the database layer provides an additional detection signal that catches compromises which bypass perimeter controls and reach the data tier.
        - **Reduced dwell time:** Behavioral alerts from Defender for Cosmos DB enable security teams to detect and contain incidents before attackers complete data exfiltration or establish persistent access.
        - **Incident investigation support:** Defender for Cosmos DB generates alerts with contextual details such as source IP, query patterns, and affected resources, accelerating forensic investigation after a detected event.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Microsoft Defender for Cloud** in the Azure Portal.
        2. Select **Environment settings** and choose the subscription.
        3. Under **Defender plans**, verify that **Cosmos DB** is set to **On**.

        **Automated Audit with Azure CLI:**

        ```bash
        az security pricing show --name CosmosDbs --query "pricingTier"
        ```

        **Automated Audit with PowerShell:**

        ```powershell
        Get-AzSecurityPricing -Name CosmosDbs | Select-Object Name, PricingTier
        ```
      remediation:
        - id: portal
          desc: |
            To ensure Microsoft Defender for Cosmos DB is enabled using the Azure Portal:

            1. Navigate to **Microsoft Defender for Cloud** in the Azure Portal.
            2. Select **Environment settings** and choose the subscription.
            3. Under **Defender plans**, set **Cosmos DB** to **On**.
            4. Select **Save**.
        - id: cli
          desc: |
            To ensure Microsoft Defender for Cosmos DB is enabled using the Azure CLI:

            ```bash
            az security pricing create --name CosmosDbs --tier Standard
            ```
        - id: powershell
          desc: |
            To ensure Microsoft Defender for Cosmos DB is enabled using PowerShell:

            ```powershell
            Set-AzSecurityPricing -Name CosmosDbs -PricingTier Standard
            ```
        - id: terraform
          desc: |
            To ensure Microsoft Defender for Cosmos DB is enabled in Terraform:

            ```hcl
            resource "azurerm_security_center_subscription_pricing" "cosmos_db" {
              tier          = "Standard"
              resource_type = "CosmosDbs"
            }
            ```
        - id: bicep
          desc: |
            To ensure Microsoft Defender for Cosmos DB is enabled in Bicep:

            ```bicep
            resource defenderForCosmosDb 'Microsoft.Security/pricings@2024-01-01' = {
              name: 'CosmosDbs'
              properties: {
                pricingTier: 'Standard'
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/defender-for-cloud/defender-for-databases-introduction
        title: Overview of Microsoft Defender for Databases
