  - uid: mondoo-azure-security-batch-pool-disk-encryption
    title: Ensure Azure Batch pools have disk encryption enabled
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-azure-security-batch-pool-disk-encryption-azure
        tags:
          mondoo.com/filter-title: Azure Batch Account
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-batch-pool-disk-encryption-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-batch-pool-disk-encryption-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-batch-pool-disk-encryption-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure Batch pool compute nodes are configured to have disk encryption enabled on the OS disk and temporary disk. Without disk encryption, task output files, temporary processing data, and cached credentials stored on node disks are exposed if the underlying storage media is accessed outside the VM.

        **Why this matters**

        - **Task data protection:** Batch compute nodes write task output, intermediate files, and application data to the OS disk and local temporary SSD. Encrypting these disks ensures that data cannot be read directly from the storage media if a node is decommissioned or recovered.
        - **Credential protection:** Nodes may cache service account tokens, application secrets, or job-specific credentials in temporary files. Disk encryption prevents extraction of these credentials from raw disk images.
        - **Defense in depth:** Disk encryption adds a cryptographic protection layer beyond network and identity controls, ensuring data remains protected even if an attacker gains physical or hypervisor-level access to the underlying host.
        - **Persistent data coverage:** Unlike ephemeral compute, Batch pools may run for extended periods with data accumulating on node disks. Encryption ensures that accumulated data is protected throughout the pool lifetime.

        **Risk mitigation**

        - **Protect node disk contents:** Enabling encryption on both OsDisk and TemporaryDisk targets ensures that no plaintext task data or credentials remain accessible on decommissioned or migrated node storage.
        - **Meet data-at-rest requirements:** Disk encryption on Batch pools satisfies cryptographic protection requirements for compute environments that process regulated or sensitive data.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Batch accounts** in the Azure Portal.
        2. Select the Batch account.
        3. Go to **Pools** under **Features**.
        4. Select each pool and review the **Disk Encryption Configuration** under the deployment configuration.
        5. Verify that disk encryption targets are specified (OsDisk, TemporaryDisk).

        **Automated Audit with Azure CLI:**

        ```bash
        az batch pool list --account-name <BatchAccountName> --account-endpoint <BatchAccountEndpoint> --query "[].{Name:id, DiskEncryption:deploymentConfiguration.virtualMachineConfiguration.diskEncryptionConfiguration}"
        ```
      remediation:
        - id: portal
          desc: |
            To ensure Azure Batch pools have disk encryption enabled using the Azure Portal:

            1. Navigate to **Batch accounts** in the Azure Portal.
            2. Select the Batch account.
            3. Go to **Pools** under **Features**.
            4. When creating a new pool, expand **Disk Encryption Configuration**.
            5. Select the disk encryption targets: **OsDisk** and/or **TemporaryDisk**.
            6. Complete the pool creation.

            Note: Disk encryption configuration can only be set at pool creation time. Existing pools must be recreated with the encryption configuration.
        - id: cli
          desc: |
            To ensure Azure Batch pools have disk encryption enabled using the Azure CLI, disk encryption must be specified at pool creation time:

            ```bash
            az batch pool create \
              --account-name <BatchAccountName> \
              --id <PoolId> \
              --vm-size Standard_D2s_v3 \
              --image canonical:0001-com-ubuntu-server-focal:20_04-lts \
              --disk-encryption-targets OsDisk TemporaryDisk
            ```
        - id: terraform
          desc: |
            To ensure Azure Batch pools have disk encryption enabled in Terraform:

            ```hcl
            resource "azurerm_batch_pool" "example" {
              name                = "example-pool"
              resource_group_name = azurerm_resource_group.example.name
              account_name        = azurerm_batch_account.example.name
              vm_size             = "Standard_D2s_v3"

              storage_image_reference {
                publisher = "Canonical"
                offer     = "0001-com-ubuntu-server-focal"
                sku       = "20_04-lts"
                version   = "latest"
              }

              disk_encryption {
                disk_encryption_target = "OsDisk"
              }

              disk_encryption {
                disk_encryption_target = "TemporaryDisk"
              }
            }
            ```
        - id: bicep
          desc: |
            To ensure Azure Batch pools have disk encryption enabled in Bicep:

            ```bicep
            resource batchPool 'Microsoft.Batch/batchAccounts/pools@2024-07-01' = {
              parent: batchAccount
              name: 'example-pool'
              properties: {
                vmSize: 'Standard_D2s_v3'
                deploymentConfiguration: {
                  virtualMachineConfiguration: {
                    diskEncryptionConfiguration: {
                      targets: [
                        'OsDisk'
                        'TemporaryDisk'
                      ]
                    }
                    // ...
                  }
                }
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/batch/disk-encryption
        title: Create a pool with disk encryption enabled
  - uid: mondoo-azure-security-batch-pool-disk-encryption-azure
