  - uid: mondoo-azure-security-recovery-vault-immutability
    title: Ensure Recovery Services Vaults have immutability enabled
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-bcr-08
      compliance/dora: dora-art-12
      compliance/hipaa: hipaa-security-ss164-308-a-7-ii-a-contingency-plan-data-backup-plan
      compliance/iso-27001-2022: iso-27001-2022-a-8-13
      compliance/nis-2: nis-2-21-2-c
      compliance/nist-csf-1: nist-csf-1-pr-ip-4
      compliance/nist-csf-2: nist-csf-2-pr-ds-11
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cp-9
      compliance/nist-sp-800-171: nist-sp-800-171--3-8-9
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc9-1-1
      compliance/vda-isa-5: false
    variants:
      - uid: mondoo-azure-security-recovery-vault-immutability-azure
        tags:
          mondoo.com/filter-title: Azure Recovery Services Vault
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-recovery-vault-immutability-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-recovery-vault-immutability-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-recovery-vault-immutability-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure Recovery Services Vaults have immutability enabled. Immutable vaults prevent any operation that could lead to loss of backup data, including stopping protection with delete data, reducing retention, and deleting the vault before data expires.

        **Why this matters**

        - Immutability provides the strongest protection against ransomware and insider threats by making backup data tamper-proof.
        - Even a compromised administrator cannot delete or modify backup data in an immutable vault.
        - This is critical for organizations that must demonstrate backup integrity for regulatory compliance.

        **Risk mitigation**

        - **Tamper-proof backups:** No one can delete or modify backup data before the retention period expires.
        - **Ransomware resilience:** Attackers cannot destroy backup data even with full administrative access.
        - **Regulatory compliance:** Demonstrates backup integrity for audit and compliance requirements.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Recovery Services vaults** in the Azure Portal.
        2. Select a vault.
        3. Go to **Properties** under **Settings**.
        4. Under **Immutability**, verify that it is set to **Enabled** or **Locked**.
      remediation:
        - id: portal
          desc: |
            To enable immutability using the Azure Portal:

            1. Navigate to **Recovery Services vaults** in the Azure Portal.
            2. Select the vault.
            3. Go to **Properties** under **Settings**.
            4. Under **Immutability**, select **Update**.
            5. Enable immutability. Optionally lock it to make it irreversible.
            6. Save the changes.
        - id: cli
          desc: |
            Enable the immutability state on the vault using the Azure CLI:

            ```bash
            az backup vault update \
              --name <VaultName> \
              --resource-group <ResourceGroupName> \
              --immutability-state Locked
            ```

            Use `Unlocked` if you need a reversible setting during initial rollout, then move to `Locked` once policies are validated. `Locked` cannot be undone.
        - id: terraform
          desc: |
            To enable immutability in Terraform. Use `Unlocked` while validating workloads, then change to `Locked` once verified (locking is irreversible):

            ```hcl
            resource "azurerm_recovery_services_vault" "example" {
              name                = "example-vault"
              location            = azurerm_resource_group.example.location
              resource_group_name = azurerm_resource_group.example.name
              sku                 = "Standard"
              immutability        = "Unlocked"
            }
            ```
        - id: bicep
          desc: |
            To enable immutability in Bicep:

            ```bicep
            resource vault 'Microsoft.RecoveryServices/vaults@2024-04-01' = {
              name: 'example-vault'
              location: resourceGroup().location
              sku: {
                name: 'RS0'
                tier: 'Standard'
              }
              properties: {
                securitySettings: {
                  immutabilitySettings: {
                    state: 'Unlocked'
                  }
                }
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/backup/backup-azure-immutable-vault-concept
        title: Immutable vault for Azure Backup
