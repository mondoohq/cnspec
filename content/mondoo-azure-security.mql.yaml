        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-ensure-the-expiration-date-is-set-for-all-keys-and-secrets-in-kv-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that all keys and secrets stored in Azure Key Vaults have expiration dates configured, enforcing automatic key lifecycle management and preventing the indefinite use of cryptographic material. By default, Azure Key Vault creates keys and secrets without expiration dates, meaning they remain valid and usable indefinitely unless manually revoked.

        **Why this matters**

        - **Long-lived key exposure**: Keys and secrets without expiration remain valid for years or decades; if compromised at any point during that window, the material continues to provide unauthorized access until someone manually revokes it.
        - **Cryptographic hygiene**: Cryptographic standards recommend regular key rotation because the probability of key material being compromised increases with time; expiration dates enforce rotation as a technical control rather than an administrative reminder.
        - **Secret sprawl detection**: Applications that hold references to expired keys and secrets surface immediately when expiration is enforced, revealing dependencies that should have been cleaned up and were invisible while the secret remained valid.
        - **Reduced blast radius of compromise**: A key with a near-term expiration date limits the window during which a compromised key can be exploited; an attacker who exfiltrates a key with 30 days remaining has a narrower exploitation window than one with no expiration.

        **Risk mitigation**

        - **Automated revocation**: Expiration dates cause Key Vault to stop returning the key or secret after the expiry time, automatically terminating any access that depended on the expired material without requiring a manual revocation action.
        - **Rotation discipline**: Setting expiration dates forces teams to establish rotation processes for each key and secret, creating a repeatable operational practice that is auditable and verifiable during compliance reviews.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Key Vaults** via the Azure Portal at https://portal.azure.com.
        2. Select a key vault and then select **Keys** or **Secrets**.
        3. Check each key and secret to verify that an expiration date is set and is appropriate.

        **Automated Audit with Azure CLI:**

        - For keys:

          ```bash
          az keyvault key list --vault-name <KeyVaultName> --query "[?attributes.expires && attributes.enabled == \`true\`].{name: name, expires: attributes.expires}" -o table
          ```

        - For secrets:

          ```bash
          az keyvault secret list --vault-name <KeyVaultName> --query "[?attributes.expires && attributes.enabled == \`true\`].{name: name, expires: attributes.expires}" -o table
          ```

        **Automated Audit with PowerShell:**

        - For keys:

          ```powershell
          Get-AzKeyVaultKey -VaultName <VaultName> | Where-Object {$_.Enabled -eq $true -and $_.Expires -ne $null}
          ```

        - For secrets:

          ```powershell
          Get-AzKeyVaultSecret -VaultName <VaultName> | Where-Object {$_.Enabled -eq $true -and $_.Expires -ne $null}
          ```
      remediation:
        - id: portal
          desc: |
            To ensure expiration dates are set for all Key Vault keys and secrets using the Azure Portal:

            1. Log into Microsoft Azure Portal at https://portal.azure.com.
            2. Go to **Key vaults**.
            3. For each key vault:
               a. Select the key vault.
               b. Select **Keys** or **Secrets**.
               c. For each key/secret, set an expiration date.
        - id: cli
          desc: |
            To ensure expiration dates are set for all Key Vault keys and secrets using the Azure CLI, set an expiration date for a key or secret in a key vault:

            - For keys:

              ```bash
              az keyvault key set-attributes --vault-name <VaultName> --name <KeyName> --expires <DateTime-in-ISO8601>
              ```

            - For secrets:

              ```bash
              az keyvault secret set-attributes --vault-name <VaultName> --name <SecretName> --expires <DateTime-in-ISO8601>
              ```
        - id: powershell
          desc: |
            To ensure expiration dates are set for all Key Vault keys and secrets using PowerShell, set an expiration date for a key or secret in a key vault:

            - For keys:

              ```powershell
              $key = Get-AzKeyVaultKey -VaultName <VaultName> -Name <KeyName>
              $key.Expires = (Get-Date).AddYears(1)
              Update-AzKeyVaultKey -VaultName <VaultName> -Key $key
              ```

            - For secrets:

              ```powershell
              $secret = Get-AzKeyVaultSecret -VaultName <VaultName> -Name <SecretName>
              $secret.Expires = (Get-Date).AddYears(1)
              Update-AzKeyVaultSecret -VaultName <VaultName> -Secret $secret
              ```
        - id: terraform
          desc: |
            To ensure expiration dates are set for all Key Vault keys and secrets in Terraform, set an expiration date for a key or secret in a key vault:

            ```hcl
            resource "azurerm_key_vault_key" "example" {
              name         = "example-key"
              key_vault_id = azurerm_key_vault.example.id
              key_type     = "RSA"
              key_size     = 2048
              expiration_date = "2027-05-01T01:02:03Z"

              key_opts = [
                "decrypt",
                "encrypt",
                "sign",
                "unwrapKey",
                "verify",
                "wrapKey",
              ]
            }

            resource "azurerm_key_vault_secret" "example" {
              name         = "example-secret"
              value        = "exampleValue"
              key_vault_id = azurerm_key_vault.example.id
              expiration_date = "2027-05-01T01:02:03Z"
            }
            ```
        - id: bicep
          desc: |
            To ensure expiration dates are set for all Key Vault keys and secrets in Bicep:

            ```bicep
            resource keyVaultKey 'Microsoft.KeyVault/vaults/keys@2023-07-01' = {
              parent: keyVault
              name: 'example-key'
              properties: {
                attributes: {
                  enabled: true
                  exp: 1735689600 // Unix timestamp for expiration
                }
              }
            }

            resource keyVaultSecret 'Microsoft.KeyVault/vaults/secrets@2023-07-01' = {
              parent: keyVault
              name: 'example-secret'
              properties: {
                attributes: {
                  enabled: true
                  exp: 1735689600 // Unix timestamp for expiration
                }
              }
            }
            ```
