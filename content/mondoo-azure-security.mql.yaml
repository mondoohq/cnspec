  - uid: mondoo-azure-security-batch-diagnostic-settings-enabled
    title: Ensure Azure Batch accounts have diagnostic settings enabled
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-07
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-pr-pt-1
      compliance/nist-csf-2: nist-csf-2-pr-ps-04
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-12
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    variants:
      - uid: mondoo-azure-security-batch-diagnostic-settings-enabled-azure
        tags:
          mondoo.com/filter-title: Azure Batch Account
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-batch-diagnostic-settings-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-batch-diagnostic-settings-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-batch-diagnostic-settings-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure Batch accounts are configured to have diagnostic settings enabled, routing job execution events, authentication records, and service logs to a centralized destination such as a Log Analytics workspace. Without diagnostic settings, Batch account activity generates no persistent audit trail.

        **Why this matters**

        - **Unauthorized job detection:** Diagnostic logs capture job and task submission events, enabling detection of unauthorized workloads submitted by an attacker who has compromised Batch account credentials.
        - **Resource abuse visibility:** Batch pools can auto-scale to hundreds of nodes. Logs revealing unexpected pool scaling and resource allocation surface compute-intensive abuse such as cryptomining before costs escalate.
        - **Authentication auditing:** Service and audit logs capture authentication attempts and authorization decisions, supporting detection of credential stuffing, unauthorized access, and privilege escalation within the account.
        - **Incident response capability:** A persistent log destination outside the Batch account itself ensures audit records survive even if an attacker deletes data within the account.

        **Risk mitigation**

        - **Detect active compromise early:** Centralizing Batch logs in Log Analytics enables alert rules that fire on anomalous job submission rates or pool scaling events that indicate unauthorized use.
        - **Support forensic investigation:** Retained service logs provide the evidence needed to determine the scope of an intrusion, which jobs ran, and what data was processed during an incident.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Batch accounts** in the Azure Portal.
        2. Select a Batch account.
        3. Go to **Diagnostic settings** under **Monitoring**.
        4. Verify that at least one diagnostic setting is configured with appropriate log categories and a destination.

        **Automated Audit with Azure CLI:**

        ```bash
        az monitor diagnostic-settings list --resource <BatchAccountResourceId> --query "[].{Name:name, Logs:logs}" -o table
        ```

        **Automated Audit with PowerShell:**

        ```powershell
        Get-AzDiagnosticSetting -ResourceId <BatchAccountResourceId> | Select-Object Name, Logs
        ```
      remediation:
        - id: portal
          desc: |
            To ensure Azure Batch accounts have diagnostic settings enabled using the Azure Portal:

            1. Navigate to **Batch accounts** in the Azure Portal.
            2. Select the Batch account.
            3. Go to **Diagnostic settings** under **Monitoring**.
            4. Select **Add diagnostic setting**.
            5. Select the log categories to collect (ServiceLog, AuditLog).
            6. Choose a destination (Log Analytics workspace, Storage account, or Event Hub).
            7. Select **Save**.
        - id: cli
          desc: |
            To ensure Azure Batch accounts have diagnostic settings enabled using the Azure CLI:

            ```bash
            az monitor diagnostic-settings create --name <SettingName> --resource <BatchAccountResourceId> --workspace <LogAnalyticsWorkspaceId> --logs '[{"category":"ServiceLog","enabled":true},{"category":"AuditLog","enabled":true}]'
            ```
        - id: powershell
          desc: |
            To ensure Azure Batch accounts have diagnostic settings enabled using PowerShell:

            ```powershell
            Set-AzDiagnosticSetting -ResourceId <BatchAccountResourceId> -Name <SettingName> -WorkspaceId <LogAnalyticsWorkspaceId> -Enabled $true -Category "ServiceLog","AuditLog"
            ```
        - id: terraform
          desc: |
            To ensure Azure Batch accounts have diagnostic settings enabled in Terraform:

            ```hcl
            resource "azurerm_monitor_diagnostic_setting" "example" {
              name                       = "example-diagnostics"
              target_resource_id         = azurerm_batch_account.example.id
              log_analytics_workspace_id = azurerm_log_analytics_workspace.example.id

              enabled_log {
                category = "ServiceLog"
              }

              enabled_log {
                category = "AuditLog"
              }
            }
            ```
        - id: bicep
          desc: |
            To ensure Azure Batch accounts have diagnostic settings enabled in Bicep:

            ```bicep
            resource diagnosticSetting 'Microsoft.Insights/diagnosticSettings@2021-05-01-preview' = {
              name: 'example-batch-diag'
              scope: batchAccount
              properties: {
                workspaceId: logAnalyticsWorkspace.id
                logs: [
                  {
                    categoryGroup: 'allLogs'
                    enabled: true
                  }
                ]
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/batch/monitor-batch
        title: Monitor Azure Batch
  - uid: mondoo-azure-security-batch-diagnostic-settings-enabled-azure
    filters: |
      asset.platform == "azure-batch-account"
    mql: |
      azure.subscription.batchService.account.diagnosticSettings.length > 0
  # HCL: anchored regex on the flattened reference string. cnquery's HCL parser turns a reference
  # like azurerm_batch_account.example.id into the dotted string "azurerm_batch_account.example.id"
  # (or "data.azurerm_batch_account.example.id" for data-source references). The regex requires the
  # exact resource type followed by a dot, so a hypothetical azurerm_batch_account_pool wouldn't pass.
  - uid: mondoo-azure-security-batch-diagnostic-settings-enabled-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "azurerm_batch_account")
    mql: |
      terraform.resources.where(nameLabel == "azurerm_monitor_diagnostic_setting").any(
        arguments['target_resource_id'] == /^(data\.)?azurerm_batch_account\./
      )
  # When the check runs against a Terraform plan: target_resource_id resolves to "(known after
  # apply)" — null in the plan JSON — when it references another resource being created in the
  # same plan, so we pass under the filter's benefit-of-the-doubt (a batch_account is also being
  # created here). When target_resource_id is a resolved literal string, we require it to contain
  # /batchAccounts/. Running against Terraform state is authoritative once the apply has resolved
  # every reference.
  - uid: mondoo-azure-security-batch-diagnostic-settings-enabled-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "azurerm_batch_account")
    mql: |
      terraform.plan.resourceChanges.where(type == "azurerm_monitor_diagnostic_setting").any(
        change.after['target_resource_id'] == null ||
        change.after['target_resource_id'].contains("/batchAccounts/")
      )
  - uid: mondoo-azure-security-batch-diagnostic-settings-enabled-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "azurerm_batch_account")
    mql: |
      terraform.state.resources.where(type == "azurerm_monitor_diagnostic_setting").any(
        values['target_resource_id'].contains("/batchAccounts/")
      )
  - uid: mondoo-azure-security-batch-private-endpoints-configured
    title: Ensure Azure Batch accounts have private endpoint connections configured
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-azure-security-batch-private-endpoints-configured-azure
        tags:
          mondoo.com/filter-title: Azure Batch Account
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-batch-private-endpoints-configured-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-batch-private-endpoints-configured-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-batch-private-endpoints-configured-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure Batch accounts are configured to have at least one private endpoint connection, enabling access over a private IP address within the virtual network. Without private endpoints, Batch account API traffic may traverse the public internet depending on client network configuration.

        **Why this matters**

        - **Network isolation:** Private endpoints expose the Batch account on a private IP within the virtual network, eliminating the public internet as a path to the management and task-submission API.
        - **Traffic confidentiality:** Private Link routes traffic across the Microsoft backbone rather than the public internet, preventing interception of job metadata, credentials, and output data.
        - **Secure job submission:** Private endpoints ensure that job submissions, pool management operations, and task queries travel exclusively over private network paths.
        - **Complementary to public access controls:** A private endpoint connection is a prerequisite for disabling public network access; it ensures a working access path exists before the public endpoint is removed.

        **Risk mitigation**

        - **Restrict reachability:** Routing Batch API access through a private endpoint scopes the reachable client set to workloads within the approved virtual network, making internet-based attacks impossible without first compromising an internal resource.
        - **Keep data on backbone:** Private Link connectivity ensures job output and metadata never traverse the public internet, reducing exposure to network-level interception and man-in-the-middle attacks.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Batch accounts** in the Azure Portal.
        2. Select the Batch account.
        3. Go to **Networking** under **Settings**.
        4. Select the **Private endpoint connections** tab.
        5. Verify that at least one private endpoint connection exists and is in the **Approved** state.

        **Automated Audit with Azure CLI:**

        ```bash
        az batch account show --name <BatchAccountName> --resource-group <ResourceGroupName> --query "privateEndpointConnections"
        ```
      remediation:
        - id: portal
          desc: |
            To ensure Azure Batch accounts have private endpoint connections configured using the Azure Portal:

            1. Navigate to **Batch accounts** in the Azure Portal.
            2. Select the Batch account.
            3. Go to **Networking** under **Settings**.
            4. Select the **Private endpoint connections** tab.
            5. Select **+ Private endpoint** to add a new private endpoint.
            6. Configure the private endpoint with the appropriate virtual network, subnet, and DNS settings.
            7. Select **Review + create**, then **Create**.
        - id: cli
          desc: |
            To ensure Azure Batch accounts have private endpoint connections configured using the Azure CLI:

            ```bash
            az network private-endpoint create \
              --name <PrivateEndpointName> \
              --resource-group <ResourceGroupName> \
              --vnet-name <VNetName> \
              --subnet <SubnetName> \
              --private-connection-resource-id $(az batch account show --name <BatchAccountName> --resource-group <ResourceGroupName> --query id -o tsv) \
              --group-id batchAccount \
              --connection-name <ConnectionName>
            ```
        - id: terraform
          desc: |
            To ensure Azure Batch accounts have private endpoint connections configured in Terraform:

            ```hcl
            resource "azurerm_private_endpoint" "batch" {
              name                = "example-batch-pe"
              location            = azurerm_resource_group.example.location
              resource_group_name = azurerm_resource_group.example.name
              subnet_id           = azurerm_subnet.example.id

              private_service_connection {
                name                           = "example-batch-psc"
                private_connection_resource_id = azurerm_batch_account.example.id
                subresource_names              = ["batchAccount"]
                is_manual_connection           = false
              }
            }
            ```
        - id: bicep
          desc: |
            To ensure Azure Batch accounts have private endpoint connections configured in Bicep:

            ```bicep
            resource privateEndpoint 'Microsoft.Network/privateEndpoints@2024-05-01' = {
              name: 'example-batch-pe'
              location: resourceGroup().location
              properties: {
                subnet: {
                  id: subnet.id
                }
                privateLinkServiceConnections: [
                  {
                    name: 'batch-psc'
                    properties: {
                      privateLinkServiceId: batchAccount.id
                      groupIds: [
                        'batchAccount'
                      ]
                    }
                  }
                ]
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/batch/private-connectivity
        title: Use private endpoints with Azure Batch accounts
  - uid: mondoo-azure-security-batch-private-endpoints-configured-azure
