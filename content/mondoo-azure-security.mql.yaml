        values['node_resource_group_profile'] != empty &&
        values['node_resource_group_profile'].all(_['restrictions'] == "ReadOnly")
      )
  - uid: mondoo-azure-security-aks-wireguard-transit-encryption
    title: Ensure AKS uses WireGuard for transit encryption
    impact: 70
    variants:
      - uid: mondoo-azure-security-aks-wireguard-transit-encryption-azure
        tags:
          mondoo.com/filter-title: Azure AKS Cluster
          mondoo.com/icon: azure
    docs:
      desc: |
        This check ensures that AKS clusters have WireGuard-based transit encryption enabled for pod-to-pod communication, protecting network traffic between nodes.

        **Why this matters**

        - **Data confidentiality**: Without transit encryption, pod-to-pod traffic traverses the node network in plaintext, exposing sensitive data to network-level interception.
        - **Zero-trust networking**: WireGuard encryption ensures that even compromised network infrastructure cannot read inter-pod communications.
        - **Compliance alignment**: Many regulatory frameworks require encryption of data in transit, including internal network communications.

        **Risk mitigation**

        - Enable WireGuard transit encryption on AKS clusters to protect pod-to-pod traffic.
        - Use Azure CNI Overlay or Cilium network plugin which supports WireGuard integration.
      remediation:
        - id: portal
          desc: |
            **Using Azure Portal**

            1. Navigate to **Kubernetes services** in the Azure Portal.
            2. Select the AKS cluster.
            3. Review the cluster networking configuration.

            Note: WireGuard transit encryption is only configurable via Azure CLI or API. It cannot be enabled through the Azure Portal.
        - id: cli
          desc: |
            **Using Azure CLI**

            Enable WireGuard transit encryption when creating a new cluster:

            ```bash
            az aks create --resource-group <ResourceGroupName> --name <ClusterName> --network-plugin azure --network-plugin-mode overlay --pod-cidr 192.168.0.0/16 --enable-wireguard
            ```

            Enable on an existing cluster:

            ```bash
            az aks update --resource-group <ResourceGroupName> --name <ClusterName> --enable-wireguard
            ```
        - id: bicep
          desc: |
            **Using Bicep**

            Note: WireGuard transit encryption is configured through the Azure CNI Overlay networking profile. Bicep support for the `advancedNetworking.security` property may be limited. Use Azure CLI to enable WireGuard on AKS clusters.

            ```bicep
            resource aksCluster 'Microsoft.ContainerService/managedClusters@2024-01-01' = {
              name: 'example-aks'
              location: resourceGroup().location
              properties: {
                networkProfile: {
                  networkPlugin: 'azure'
                  networkPluginMode: 'overlay'
                }
                // WireGuard enablement may require CLI post-deployment
              }
            }
            ```
        - id: terraform
          desc: |
            **Using Terraform**

            WireGuard transit encryption for AKS is only configurable via Azure CLI or the Azure API. The `azurerm_kubernetes_cluster` Terraform resource does not currently support the WireGuard enablement flag. Use the Azure CLI to enable WireGuard on the cluster after provisioning with Terraform.
    refs:
      - url: https://learn.microsoft.com/en-us/azure/aks/wireguard
        title: WireGuard-based encryption in AKS
  - uid: mondoo-azure-security-aks-wireguard-transit-encryption-azure
    filters: |
      asset.platform == "azure-aks-cluster"
    mql: |
      azure.subscription.aksService.cluster.advancedNetworking.transitEncryptionType == "WireGuard"
  - uid: mondoo-azure-security-aks-etcd-kms-encryption
    title: Ensure AKS etcd is encrypted with Key Vault KMS
    impact: 80
    variants:
      - uid: mondoo-azure-security-aks-etcd-kms-encryption-azure
        tags:
          mondoo.com/filter-title: Azure AKS Cluster
          mondoo.com/icon: azure
      - uid: mondoo-azure-security-aks-etcd-kms-encryption-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/icon: terraform
      - uid: mondoo-azure-security-aks-etcd-kms-encryption-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/icon: terraform
      - uid: mondoo-azure-security-aks-etcd-kms-encryption-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/icon: terraform
    docs:
      desc: |
        This check ensures that AKS clusters have Azure Key Vault KMS encryption configured for etcd, providing envelope encryption for Kubernetes secrets at rest.

        **Why this matters**

        - **Secrets protection**: Without KMS encryption, Kubernetes secrets are stored in etcd with only base64 encoding, which is not encryption and can be read by anyone with etcd access.
        - **Key management**: Azure Key Vault KMS provides centralized key management with rotation, auditing, and access control capabilities.
        - **Compliance alignment**: Many regulatory frameworks require encryption of secrets and sensitive data at rest with customer-managed keys.

        **Risk mitigation**

        - Enable Azure Key Vault KMS encryption on AKS clusters to protect etcd data at rest.
        - Configure key rotation policies in Azure Key Vault for regular key rotation.
      remediation:
        - id: portal
          desc: |
            **Using Azure Portal**

            1. Navigate to **Kubernetes services** in the Azure Portal.
            2. Select the AKS cluster.
            3. Review the cluster security configuration.

            Note: etcd KMS encryption is only configurable via Azure CLI or API. It cannot be enabled through the Azure Portal.
        - id: cli
          desc: |
            **Using Azure CLI**

            Enable KMS encryption on a new or existing AKS cluster:

            ```bash
            az aks update --resource-group <ResourceGroupName> --name <ClusterName> --enable-azure-keyvault-kms --azure-keyvault-kms-key-id <KeyVaultKeyId> --azure-keyvault-kms-key-vault-network-access Public
            ```
        - id: terraform
          desc: |
            **Using Terraform**

            ```hcl
            resource "azurerm_kubernetes_cluster" "example" {
              name                = "example-aks"
              location            = azurerm_resource_group.example.location
              resource_group_name = azurerm_resource_group.example.name

              key_vault_secrets_provider {
                secret_rotation_enabled = true
              }

              azure_key_vault_kms {
                key_id = azurerm_key_vault_key.example.id
              }
            }
            ```
        - id: bicep
          desc: |
            **Using Bicep**

            ```bicep
            resource aksCluster 'Microsoft.ContainerService/managedClusters@2024-01-01' = {
              name: 'example-aks'
              location: resourceGroup().location
              properties: {
                securityProfile: {
                  azureKeyVaultKms: {
                    enabled: true
                    keyId: keyVaultKey.properties.keyUriWithVersion
                  }
                }
                // ...
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/aks/use-kms-etcd-encryption
        title: Use Azure Key Vault KMS to encrypt etcd in AKS
