          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-keyvault-key-auto-rotation-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-keyvault-key-auto-rotation-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that all enabled keys in Azure Key Vault have an automatic rotation policy configured. Keys without auto-rotation remain valid indefinitely; a compromised key version retains decryption capability for all data it protects until the key is manually rotated or deleted.

        **Why this matters**

        - **Persistent decryption access:** An attacker who exfiltrates a key version via compromised credentials, API log analysis, or backup extraction retains the ability to decrypt all data encrypted with that version; without auto-rotation, this access never expires.
        - **Offline attack detectability:** Key compromise is difficult to detect because an attacker can decrypt data offline using the stolen key material without generating any Azure audit log entries; limiting the key's active lifetime bounds the window of undetectable access.
        - **Blast radius over time:** The longer a key version remains active, the more data is encrypted with it; auto-rotation periodically retires old key versions, limiting the volume of data any single compromised version can decrypt.
        - **Operational crypto hygiene:** Periodic automatic rotation ensures that key material is refreshed on a predictable schedule without requiring manual intervention, reducing the risk that rotation is deferred or forgotten as teams change.

        **Risk mitigation**

        - **Indefinite compromise window:** Without auto-rotation, a compromised key version remains valid as a decryption oracle forever; a configured rotation policy limits this window to the rotation interval, after which the old version is no longer the primary encryption key.
        - **Manual rotation failure:** Relying on manual key rotation creates risk that the rotation step is skipped during incidents, high-load periods, or team transitions; automated rotation removes this dependency on human execution.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Key Vaults** in the Azure Portal.
        2. Select a Key Vault and go to **Keys**.
        3. Select each enabled key and review its **Rotation policy**.
        4. Verify that auto-rotation is configured with an appropriate rotation interval.

        **Automated Audit with Azure CLI:**

        ```bash
        az keyvault key rotation-policy show --vault-name <VaultName> --name <KeyName>
        ```
      remediation:
        - id: portal
          desc: |
            To ensure Key Vault keys have auto-rotation enabled using the Azure Portal:

            1. Navigate to **Key Vaults** in the Azure Portal.
            2. Select the Key Vault and go to **Keys**.
            3. Select the key.
            4. Go to **Rotation policy**.
            5. Configure the auto-rotation settings with an appropriate expiry time and rotation interval.
            6. Select **Save**.
        - id: cli
          desc: |
            To ensure Key Vault keys have auto-rotation enabled using the Azure CLI:

            ```bash
            az keyvault key rotation-policy update --vault-name <VaultName> --name <KeyName> --value @rotation-policy.json
            ```
        - id: terraform
          desc: |
            To ensure Key Vault keys have auto-rotation enabled in Terraform:

            ```hcl
            resource "azurerm_key_vault_key" "example" {
              name         = "example-key"
              key_vault_id = azurerm_key_vault.example.id
              key_type     = "RSA"
              key_size     = 2048
              key_opts     = ["decrypt", "encrypt", "sign", "unwrapKey", "verify", "wrapKey"]

              rotation_policy {
                automatic {
                  time_before_expiry = "P30D"
                }

                expire_after         = "P90D"
                notify_before_expiry = "P29D"
              }
            }
            ```
        - id: bicep
          desc: |
            To ensure Key Vault keys have auto-rotation enabled in Bicep:

            ```bicep
            resource keyVaultKey 'Microsoft.KeyVault/vaults/keys@2023-07-01' = {
              parent: keyVault
              name: 'example-key'
              properties: {
                rotationPolicy: {
                  lifetimeActions: [
                    {
                      trigger: {
                        timeAfterCreate: 'P90D'
                      }
                      action: {
                        type: 'Rotate'
                      }
                    }
                    {
                      trigger: {
                        timeBeforeExpiry: 'P30D'
                      }
                      action: {
                        type: 'Notify'
                      }
                    }
                  ]
                  attributes: {
                    expiryTime: 'P1Y'
                  }
                }
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/key-vault/keys/how-to-configure-key-rotation
        title: Configure key auto-rotation in Azure Key Vault
  - uid: mondoo-azure-security-keyvault-private-endpoints
    title: Ensure Azure Key Vault has private endpoint connections configured
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-azure-security-keyvault-private-endpoints-azure
        tags:
          mondoo.com/filter-title: Azure Key Vault
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-keyvault-private-endpoints-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-keyvault-private-endpoints-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-keyvault-private-endpoints-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure Key Vault instances have at least one private endpoint connection configured, routing all vault access over a private IP within the virtual network rather than over the public internet. Without a private endpoint, Key Vault traffic traverses the public internet even when firewall rules restrict which IPs can connect.

        **Why this matters**

        - **Network path confidentiality:** Private endpoints route traffic between workloads and Key Vault over the Microsoft backbone network without any public internet traversal, eliminating the possibility of network-level interception of secret retrieval requests.
        - **Public endpoint eliminable:** A configured private endpoint allows the vault's public endpoint to be disabled entirely, reducing the attack surface to only identities that can route through the approved VNet.
        - **Exfiltration path control:** Private Link prevents data exfiltration through DNS-based or network-level redirection attacks, because vault traffic stays within the Microsoft network fabric and cannot be routed to an attacker-controlled destination.
        - **Defense in depth:** Private endpoints complement RBAC and network ACLs by adding a network-layer constraint that is independent of Azure IAM; an attacker who steals a token still requires a network path through the approved VNet to reach the vault.

        **Risk mitigation**

        - **Token replay from arbitrary locations:** Without a private endpoint, a stolen access token can be used to retrieve vault secrets from any internet-connected host; a private endpoint combined with public endpoint disablement limits token use to hosts with network access through the approved VNet.
        - **Network-level reconnaissance:** Public vault endpoints respond to connection probes, enabling attackers to confirm vault existence and probe firewall rules; private-endpoint-only vaults do not respond to connections from outside the approved network, removing this reconnaissance vector.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Key Vaults** in the Azure Portal.
        2. Select the Key Vault.
        3. Go to **Networking** under **Settings**.
        4. Select the **Private endpoint connections** tab.
        5. Verify that at least one private endpoint connection exists and is in the **Approved** state.

        **Automated Audit with Azure CLI:**

        ```bash
        az keyvault show --name <VaultName> --query "properties.privateEndpointConnections" -o table
        ```
      remediation:
        - id: portal
          desc: |
            To ensure Azure Key Vault has private endpoint connections configured using the Azure Portal:

            1. Navigate to **Key Vaults** in the Azure Portal.
            2. Select the Key Vault.
            3. Go to **Networking** under **Settings**.
            4. Select the **Private endpoint connections** tab.
            5. Select **+ Create** to add a new private endpoint.
            6. Configure the private endpoint with the appropriate virtual network, subnet, and DNS settings.
            7. Select **Review + create**, then **Create**.
        - id: cli
          desc: |
            To ensure Azure Key Vault has private endpoint connections configured using the Azure CLI:

            ```bash
            az network private-endpoint create \
              --name <PrivateEndpointName> \
              --resource-group <ResourceGroupName> \
              --vnet-name <VNetName> \
              --subnet <SubnetName> \
              --private-connection-resource-id $(az keyvault show --name <VaultName> --query id -o tsv) \
              --group-id vault \
              --connection-name <ConnectionName>
            ```
        - id: terraform
          desc: |
            To ensure Azure Key Vault has private endpoint connections configured in Terraform:

            ```hcl
            resource "azurerm_private_endpoint" "keyvault" {
              name                = "example-keyvault-pe"
              location            = azurerm_resource_group.example.location
              resource_group_name = azurerm_resource_group.example.name
              subnet_id           = azurerm_subnet.example.id

              private_service_connection {
                name                           = "example-keyvault-psc"
                private_connection_resource_id = azurerm_key_vault.example.id
                subresource_names              = ["vault"]
                is_manual_connection           = false
              }
            }
            ```
        - id: bicep
          desc: |
            To ensure Azure Key Vault has private endpoint connections configured in Bicep:

            ```bicep
            resource privateEndpoint 'Microsoft.Network/privateEndpoints@2024-05-01' = {
              name: 'example-kv-pe'
              location: resourceGroup().location
              properties: {
                subnet: {
                  id: subnet.id
                }
                privateLinkServiceConnections: [
                  {
                    name: 'kv-psc'
                    properties: {
                      privateLinkServiceId: keyVault.id
                      groupIds: [
                        'vault'
                      ]
                    }
                  }
                ]
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/key-vault/general/private-link-service
        title: Integrate Key Vault with Azure Private Link
  - uid: mondoo-azure-security-compute-data-disks-encrypted
    title: Ensure Azure VM data disks are encrypted with CMK
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-azure-security-compute-data-disks-encrypted-azure
        tags:
          mondoo.com/filter-title: Azure Virtual Machine
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-compute-data-disks-encrypted-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-compute-data-disks-encrypted-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-compute-data-disks-encrypted-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that data disks attached to Azure virtual machines are encrypted with Customer Managed Keys (CMK). By default Azure encrypts managed disks with platform-managed keys, but CMK gives you full ownership of the encryption keys through Azure Key Vault, enabling key rotation and revocation.

        **Why this matters**

        - **Data confidentiality:** Encryption with CMK ensures disk contents are unreadable to anyone who cannot access your Key Vault, including Microsoft personnel.
        - **Key control:** You can rotate or revoke keys at any time, immediately cutting off access to the encrypted data without deleting the disk.
        - **Breach containment:** If a disk is improperly decommissioned or a snapshot is accessed without authorization, CMK encryption prevents data exposure.
        - **Audit trail:** Key Vault access logs provide a record of every encryption and decryption operation tied to a specific identity.

        **Risk mitigation**

        - **Insider threat reduction:** Separating key management from disk ownership prevents a single compromised identity from accessing both the key and the data.
        - **Snapshot and clone protection:** Disks cloned or snapshotted from a CMK-encrypted source inherit the encryption, so data cannot be extracted by bypassing the original VM.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Virtual machines** in the Azure Portal.
        2. Select a virtual machine and access **Disks** under the Settings menu.
        3. Review each data disk and verify that encryption is set to Customer-managed keys.

        **Automated Audit with Azure CLI:**

        ```bash
        az disk list --resource-group <ResourceGroupName> --query "[?managedBy!=null].{Name:name, EncryptionType:encryption.type}" -o table
        ```
      remediation:
        - id: portal
          desc: |
            To ensure Azure VM data disks are encrypted with CMK using the Azure Portal:

            1. Navigate to **Disks** in the Azure Portal.
            2. Select the data disk you wish to encrypt.
            3. In the **Encryption** section, set **Encryption type** to **Customer-managed keys**.
            4. Specify the Azure Key Vault and select the appropriate key.
            5. Save the changes.
        - id: cli
          desc: |
            To ensure Azure VM data disks are encrypted with CMK using the Azure CLI:

            ```bash
            az disk update --resource-group <ResourceGroupName> --name <DiskName> --encryption-type EncryptionAtRestWithCustomerKey --disk-encryption-set <DiskEncryptionSetId>
            ```
        - id: terraform
          desc: |
            To ensure Azure VM data disks are encrypted with CMK in Terraform:

            ```hcl
            resource "azurerm_managed_disk" "example" {
              name                 = "example-data-disk"
              location             = azurerm_resource_group.example.location
              resource_group_name  = azurerm_resource_group.example.name
              storage_account_type = "Standard_LRS"
              create_option        = "Empty"
              disk_size_gb         = 128
              disk_encryption_set_id = azurerm_disk_encryption_set.example.id
            }
            ```
        - id: bicep
          desc: |
            To ensure Azure VM data disks are encrypted with CMK in Bicep:

            ```bicep
            resource managedDisk 'Microsoft.Compute/disks@2024-03-02' = {
              name: 'example-data-disk'
              location: resourceGroup().location
              properties: {
                diskSizeGB: 128
                encryption: {
                  diskEncryptionSetId: diskEncryptionSet.id
                }
                creationData: {
                  createOption: 'Empty'
                }
              }
              sku: {
                name: 'Premium_LRS'
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/virtual-machines/disk-encryption-overview
        title: Overview of managed disk encryption options
  - uid: mondoo-azure-security-compute-data-disks-encrypted-azure
    filters: |
      asset.platform == "azure-compute-vm-api"
    mql: |
      azure.subscription.compute.vm.dataDisks.all(properties.encryption.type == "EncryptionAtRestWithCustomerKey")
  - uid: mondoo-azure-security-compute-data-disks-encrypted-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "azurerm_managed_disk")
    mql: |
      terraform.resources.where(nameLabel == "azurerm_managed_disk").all(
        arguments['disk_encryption_set_id'] != empty
      )
  - uid: mondoo-azure-security-compute-data-disks-encrypted-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "azurerm_managed_disk")
    mql: |
      terraform.plan.resourceChanges.where(type == "azurerm_managed_disk").all(
        change.after['disk_encryption_set_id'] != empty
      )
  - uid: mondoo-azure-security-compute-data-disks-encrypted-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "azurerm_managed_disk")
    mql: |
      terraform.state.resources.where(type == "azurerm_managed_disk").all(
        values['disk_encryption_set_id'] != empty
      )
  - uid: mondoo-azure-security-network-watcher-flow-logs-enabled
    title: Ensure Network Watcher flow logs are enabled
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-07
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-pr-ps-04
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-12
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    variants:
      - uid: mondoo-azure-security-network-watcher-flow-logs-enabled-azure
        tags:
          mondoo.com/filter-title: Azure Subscription
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-network-watcher-flow-logs-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-network-watcher-flow-logs-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-network-watcher-flow-logs-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure Network Watcher flow logs are enabled to capture IP traffic flowing through network security groups. By default flow logs are disabled when a Network Watcher is provisioned, leaving network activity unrecorded and unavailable for security review or forensic investigation.

        **Why this matters**

        - **Network visibility:** Flow logs record source and destination IPs, ports, protocols, and allow or deny decisions, giving teams a complete picture of traffic within the subscription.
        - **Threat detection:** Anomalous traffic patterns such as unexpected port scans or lateral movement can be identified in flow log data before an incident escalates.
        - **Forensic investigation:** When a security event occurs, flow log records provide the evidence needed to reconstruct attack paths and assess scope.
        - **Traffic analytics integration:** Flow logs feed Azure Traffic Analytics, enabling visualization of top talkers, geo-based anomalies, and long-term trend analysis.

        **Risk mitigation**

        - **Blind spot elimination:** Without flow logs, reconnaissance and exfiltration traffic that never triggers a Defender alert leaves no trace; enabling logs closes that gap.
        - **Audit evidence:** Many regulatory frameworks require demonstrable network monitoring; flow log retention records satisfy this requirement without additional tooling.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Network Watcher** in the Azure Portal.
        2. Select **NSG flow logs** under **Logs**.
        3. Verify that flow logs are enabled for all relevant network security groups.

        **Automated Audit with Azure CLI:**

        ```bash
        az network watcher flow-log list --location <Location> --query "[].{Name:name, Enabled:enabled, TargetResourceId:targetResourceId}" -o table
        ```
      remediation:
        - id: portal
          desc: |
            To ensure Network Watcher flow logs are enabled using the Azure Portal:

            1. Navigate to **Network Watcher** in the Azure Portal.
            2. Select **NSG flow logs** under **Logs**.
            3. Select the NSG for which to enable flow logs.
            4. Set **Flow logs** to **On**.
            5. Configure the storage account and retention settings.
            6. Optionally enable **Traffic Analytics** for advanced insights.
            7. Select **Save**.
        - id: cli
          desc: |
            To ensure Network Watcher flow logs are enabled using the Azure CLI:

            ```bash
            az network watcher flow-log create --location <Location> --name <FlowLogName> --nsg <NSGResourceId> --storage-account <StorageAccountId> --enabled true --retention 90
            ```
        - id: terraform
          desc: |
            To ensure Network Watcher flow logs are enabled in Terraform:

            ```hcl
            resource "azurerm_network_watcher_flow_log" "example" {
              network_watcher_name = azurerm_network_watcher.example.name
              resource_group_name  = azurerm_resource_group.example.name
              name                 = "example-flow-log"

              network_security_group_id = azurerm_network_security_group.example.id
              storage_account_id        = azurerm_storage_account.example.id
              enabled                   = true

              retention_policy {
                enabled = true
                days    = 90
              }
            }
            ```
        - id: bicep
          desc: |
            To ensure Network Watcher flow logs are enabled in Bicep:

            ```bicep
            resource flowLog 'Microsoft.Network/networkWatchers/flowLogs@2024-05-01' = {
              parent: networkWatcher
              name: 'example-flow-log'
              location: resourceGroup().location
              properties: {
                targetResourceId: nsg.id
                storageId: storageAccount.id
                enabled: true
                retentionPolicy: {
                  days: 90
                  enabled: true
                }
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/network-watcher/nsg-flow-logs-overview
        title: NSG flow logs overview
  - uid: mondoo-azure-security-network-watcher-flow-logs-enabled-azure
    filters: |
      asset.platform == "azure"
    mql: |
      azure.subscription.network.watchers.all(flowLogs.any(enabled == true))
  - uid: mondoo-azure-security-network-watcher-flow-logs-enabled-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "azurerm_network_watcher_flow_log")
    mql: |
      terraform.resources.where(nameLabel == "azurerm_network_watcher_flow_log").all(
        arguments['enabled'] == true
      )
  - uid: mondoo-azure-security-network-watcher-flow-logs-enabled-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "azurerm_network_watcher_flow_log")
    mql: |
      terraform.plan.resourceChanges.where(type == "azurerm_network_watcher_flow_log").all(
