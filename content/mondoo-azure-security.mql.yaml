  - uid: mondoo-azure-security-redis-ssl-only
    title: Ensure Azure Cache for Redis disables the non-SSL port
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    variants:
      - uid: mondoo-azure-security-redis-ssl-only-azure
        tags:
          mondoo.com/filter-title: Azure Cache for Redis
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-redis-ssl-only-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-redis-ssl-only-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-redis-ssl-only-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that the non-SSL port (6379) is disabled on Azure Cache for Redis instances, requiring all client connections to use TLS-encrypted communication on port 6380. By default, Azure Cache for Redis enables both the SSL and non-SSL ports, allowing unencrypted connections unless the non-SSL port is explicitly disabled.

        **Why this matters**

        - **Data in transit protection:** Redis protocol traffic sent over the non-SSL port is transmitted in plaintext; disabling it ensures all commands and responses are encrypted by TLS.
        - **Authentication token security:** Redis AUTH tokens and connection strings transmitted over an unencrypted connection can be captured and replayed to gain unauthorized cache access.
        - **Cached data confidentiality:** Application data stored in cache, which may include session tokens, user data, or sensitive query results, is exposed to network-level interception on unencrypted connections.
        - **Default-open risk:** The non-SSL port is enabled by default, meaning new Redis instances are immediately reachable over plaintext unless administrators take explicit action.

        **Risk mitigation**

        - **Network sniffing prevention:** Disabling the non-SSL port ensures that even an attacker with access to network traffic between client and cache cannot read Redis commands or responses.
        - **Misconfigured client detection:** Applications that accidentally connect to the non-SSL port produce immediate connection failures rather than silently transmitting data in plaintext.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Azure Cache for Redis** in the Azure Portal.
        2. Select a Redis cache instance.
        3. Go to **Advanced settings**.
        4. Verify that **Allow access only via SSL** is set to **Yes** (or that the non-SSL port is disabled).

        **Automated Audit with Azure CLI:**

        ```bash
        az redis list --query "[].{Name:name, ResourceGroup:resourceGroup, NonSslPort:enableNonSslPort}" -o table
        ```
      remediation:
        - id: portal
          desc: |
            To ensure Azure Cache for Redis disables the non-SSL port using the Azure Portal:

            1. Navigate to **Azure Cache for Redis** in the Azure Portal.
            2. Select the Redis cache instance.
            3. Go to **Advanced settings**.
            4. Set **Allow access only via SSL** to **Yes**.
            5. Select **Save**.
        - id: cli
          desc: |
            To ensure Azure Cache for Redis disables the non-SSL port using the Azure CLI:

            ```bash
            az redis update --name <RedisCacheName> --resource-group <ResourceGroupName> --set enableNonSslPort=false
            ```
        - id: terraform
          desc: |
            To ensure Azure Cache for Redis disables the non-SSL port in Terraform:

            ```hcl
            resource "azurerm_redis_cache" "example" {
              name                = "example-redis"
              location            = azurerm_resource_group.example.location
              resource_group_name = azurerm_resource_group.example.name
              capacity            = 1
              family              = "C"
              sku_name            = "Standard"
              enable_non_ssl_port = false
              minimum_tls_version = "1.2"
            }
            ```
        - id: bicep
          desc: |
            To ensure Azure Cache for Redis disables the non-SSL port in Bicep:

            ```bicep
            resource redisCache 'Microsoft.Cache/redis@2024-03-01' = {
              name: 'example-redis'
              location: resourceGroup().location
              properties: {
                enableNonSslPort: false
                minimumTlsVersion: '1.2'
                // ...
              }
              sku: {
                name: 'Standard'
                family: 'C'
                capacity: 1
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/azure-cache-for-redis/cache-remove-tls-10-11
        title: Remove TLS 1.0 and 1.1 from use with Azure Cache for Redis
  - uid: mondoo-azure-security-redis-public-access-disabled
    title: Ensure Azure Cache for Redis disables public network access
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-azure-security-redis-public-access-disabled-azure
        tags:
          mondoo.com/filter-title: Azure Cache for Redis
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-redis-public-access-disabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-redis-public-access-disabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-redis-public-access-disabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure Cache for Redis instances are configured to disable public network access, requiring all connections to route through private endpoints. By default, Redis instances are reachable over the public internet; disabling public access eliminates that exposure entirely.

        **Why this matters**

        - **Reduced attack surface:** Removing the public endpoint prevents Redis from being targeted by internet-facing scans, brute-force attempts, and exploitation of unpatched protocol vulnerabilities.
        - **Network isolation:** Traffic between clients and Redis stays within the Azure backbone via Private Link, never traversing the public internet where it could be intercepted.
        - **Data protection:** Cached data, which may include session tokens or query results, is inaccessible to anyone outside the authorized virtual network.
        - **Defense in depth:** Network-level isolation complements access keys and TLS, so a leaked credential alone cannot reach the cache from outside the private network.

        **Risk mitigation**

        - **Credential theft protection:** An attacker who obtains a Redis access key cannot connect if the public endpoint is disabled and they have no network path inside the VNet.
        - **Lateral movement prevention:** Restricting network reachability limits an attacker's ability to pivot from a compromised internet-facing resource to the Redis tier.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Azure Cache for Redis** in the Azure Portal.
        2. Select a Redis cache instance.
        3. Go to **Private endpoint connections** under **Settings**.
        4. Verify that public network access is disabled and private endpoints are configured.

        **Automated Audit with Azure CLI:**

        ```bash
        az redis list --query "[].{Name:name, ResourceGroup:resourceGroup, PublicNetworkAccess:publicNetworkAccess}" -o table
        ```
      remediation:
        - id: portal
          desc: |
            To ensure Azure Cache for Redis disables public network access using the Azure Portal:

            1. Navigate to **Azure Cache for Redis** in the Azure Portal.
            2. Select the Redis cache instance.
            3. Go to **Private endpoint connections** under **Settings**.
            4. Set **Public network access** to **Disabled**.
            5. Configure a private endpoint for the Redis cache.
            6. Select **Save**.
        - id: cli
          desc: |
            To ensure Azure Cache for Redis disables public network access using the Azure CLI:

            ```bash
            az redis update --name <RedisCacheName> --resource-group <ResourceGroupName> --set publicNetworkAccess=Disabled
            ```
        - id: terraform
          desc: |
            To ensure Azure Cache for Redis disables public network access in Terraform:

            ```hcl
            resource "azurerm_redis_cache" "example" {
              name                          = "example-redis"
              location                      = azurerm_resource_group.example.location
              resource_group_name           = azurerm_resource_group.example.name
              capacity                      = 1
              family                        = "C"
              sku_name                      = "Standard"
              public_network_access_enabled = false
            }
            ```
        - id: bicep
          desc: |
            To ensure Azure Cache for Redis disables public network access in Bicep:

            ```bicep
            resource redisCache 'Microsoft.Cache/redis@2024-03-01' = {
              name: 'example-redis'
              location: resourceGroup().location
              properties: {
                publicNetworkAccess: 'Disabled'
                // ...
              }
              sku: {
                name: 'Premium'
                family: 'P'
                capacity: 1
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/azure-cache-for-redis/cache-private-link
        title: Azure Cache for Redis with Azure Private Link
  - uid: mondoo-azure-security-aks-private-cluster-enabled
    title: Ensure AKS clusters are configured as private clusters
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-azure-security-aks-private-cluster-enabled-azure
        tags:
          mondoo.com/filter-title: Azure AKS Cluster
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-aks-private-cluster-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-aks-private-cluster-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-aks-private-cluster-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that AKS clusters are configured as private clusters, making the Kubernetes API server accessible only through private endpoints within the virtual network. By default, AKS provisions a public API server endpoint reachable from the internet; private cluster mode removes that endpoint entirely.

        **Why this matters**

        - **Control-plane isolation:** Removing the public API server endpoint means only clients with network access inside the VNet can reach the Kubernetes control plane, eliminating a major remote attack surface.
        - **Backbone-only traffic:** API traffic between the control plane and node pools traverses the Microsoft backbone network via Private Link, never crossing the public internet.
        - **Credential exposure reduction:** Kubernetes API tokens and kubeconfig files stolen from a developer's machine cannot be used from outside the private network.
        - **Blast-radius containment:** Restricting API server reachability limits the ability of an attacker who compromises one cluster component to pivot to the control plane from an external host.

        **Risk mitigation**

        - **Brute-force and enumeration prevention:** Without a public endpoint, the API server is invisible to internet-wide scanners and credential-stuffing tooling targeting AKS.
        - **Insider lateral movement:** Network-level controls mean that access to the API server requires an established network path, slowing lateral movement even if credentials are compromised.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Kubernetes services** in the Azure Portal.
        2. Select an AKS cluster.
        3. Go to **Networking** under **Settings**.
        4. Verify that **Private cluster** is enabled.

        **Automated Audit with Azure CLI:**

        ```bash
        az aks list --query "[].{Name:name, ResourceGroup:resourceGroup, PrivateCluster:apiServerAccessProfile.enablePrivateCluster}" -o table
        ```

        **Automated Audit with PowerShell:**

        ```powershell
        Get-AzAksCluster | Select-Object Name, ResourceGroupName, @{Name="PrivateCluster"; Expression={$_.ApiServerAccessProfile.EnablePrivateCluster}}
        ```
      remediation:
        - id: portal
          desc: |
            To ensure AKS clusters are configured as private clusters using the Azure Portal, private cluster must be configured at cluster creation time:

            1. Navigate to **Kubernetes services** and select **Create**.
            2. Under **Networking**, enable **Private cluster**.
            3. Complete the cluster creation process.

            For existing public clusters, you must recreate the cluster as a private cluster.
        - id: cli
          desc: |
            To ensure AKS clusters are configured as private clusters using the Azure CLI, when creating a new cluster:

            ```bash
            az aks create --resource-group <ResourceGroupName> --name <ClusterName> --enable-private-cluster
            ```
