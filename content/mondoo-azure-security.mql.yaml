      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-azure-security-search-service-public-network-access-disabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-search-service-public-network-access-disabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-search-service-public-network-access-disabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure AI Search services have public network access disabled, requiring index and query traffic to flow over private endpoints.

        **Why this matters**

        - **Network isolation**: Search endpoints often contain document content extracted from sensitive line-of-business systems; exposing the search endpoint to the public internet exposes that content to indexer scraping and credential abuse.
        - **Private connectivity**: Disabling public access forces ingestion and query traffic through Private Link, so only authorized peered networks can reach the search service.
        - **Defense in depth**: Even with API-key or role-based authentication, removing public network exposure stops attackers from probing the service for index names, schema, and known-vulnerable query patterns.

        **Risk mitigation**

        - Set the search service's public network access to **Disabled** and configure private endpoints for index, query, and management traffic.
        - Restrict access to indexer source connectors (Storage, SQL, Cosmos DB) via shared private link resources so the indexer never traverses the public internet.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Azure AI Search** in the Azure Portal.
        2. Select a search service.
        3. Open **Networking** under **Settings**.
        4. Verify that **Public network access** is **Disabled**.

        **Automated Audit with Azure CLI:**

        ```bash
        az search service show --resource-group <ResourceGroupName> --name <SearchServiceName> --query "publicNetworkAccess"
        ```
      remediation:
        - id: portal
          desc: |
            To disable public network access on an Azure AI Search service using the Azure Portal:

            1. Navigate to **Azure AI Search** in the Azure Portal.
            2. Select the search service.
            3. Under **Settings**, select **Networking**.
            4. Set **Public network access** to **Disabled**.
            5. Configure private endpoints for clients and indexers.
            6. Select **Save**.
        - id: cli
          desc: |
            To disable public network access on an Azure AI Search service using the Azure CLI:

            ```bash
            az search service update --resource-group <ResourceGroupName> --name <SearchServiceName> --public-network-access disabled
            ```
        - id: terraform
          desc: |
            To disable public network access on an Azure AI Search service in Terraform:

            ```hcl
            resource "azurerm_search_service" "example" {
              name                          = "example-search"
              resource_group_name           = azurerm_resource_group.example.name
              location                      = azurerm_resource_group.example.location
              sku                           = "standard"
              public_network_access_enabled = false
            }
            ```
        - id: bicep
          desc: |
            To disable public network access on an Azure AI Search service in Bicep:

            ```bicep
            resource searchService 'Microsoft.Search/searchServices@2024-06-01-preview' = {
              name: 'example-search'
              location: resourceGroup().location
              sku: {
                name: 'standard'
              }
              properties: {
                publicNetworkAccess: 'Disabled'
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/search/service-configure-firewall
        title: Configure network access and firewall rules for Azure AI Search
