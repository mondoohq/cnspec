  - uid: mondoo-azure-security-aks-network-policy-enabled
    title: Ensure AKS clusters have a network policy configured
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-1-5
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-azure-security-aks-network-policy-enabled-azure
        tags:
          mondoo.com/filter-title: Azure AKS Cluster
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-aks-network-policy-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-aks-network-policy-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-aks-network-policy-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that AKS clusters have a network policy engine configured to control pod-to-pod traffic. Supported engines include Azure Network Policy Manager and Calico. Without a network policy engine present, Kubernetes network policies cannot be enforced even if they are defined in manifests.

        **Why this matters**

        - **Micro-segmentation enforcement:** A network policy engine enforces ingress and egress rules at the pod level, allowing teams to define exactly which workloads can communicate with each other.
        - **Default-deny capability:** With a policy engine installed, teams can apply a default-deny posture and explicitly allow only required traffic paths, implementing least-privilege networking.
        - **Lateral movement prevention:** Without enforced network policies, a compromised pod can reach any other pod in the cluster; a policy engine restricts that movement to the defined allow-list.
        - **Blast radius reduction:** Limiting a compromised workload's network reach to only its required dependencies reduces the number of systems an attacker can pivot to.

        **Risk mitigation**

        - **Manifest-defined isolation:** Once the engine is in place, individual workload teams can ship network policies alongside their application manifests, keeping security posture close to the code.
        - **Compliance segmentation requirements:** Workload isolation between environments such as production and staging can be enforced at the network layer, satisfying segmentation controls without requiring separate clusters.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Kubernetes services** in the Azure Portal.
        2. Select an AKS cluster.
        3. Go to **Networking** under **Settings**.
        4. Verify that a **Network policy** is configured (Azure or Calico).

        **Automated Audit with Azure CLI:**

        ```bash
        az aks show --resource-group <ResourceGroupName> --name <ClusterName> --query "networkProfile.networkPolicy"
        ```
      remediation:
        - id: portal
          desc: |
            To ensure AKS clusters have a network policy configured using the Azure Portal, network policy must be configured at cluster creation time:

            1. Navigate to **Kubernetes services** and select **Create**.
            2. Under **Networking**, select a **Network policy** option (Azure or Calico).
            3. Complete the cluster creation process.

            For existing clusters, network policy cannot be changed. You must recreate the cluster with network policy enabled.
        - id: cli
          desc: |
            To ensure AKS clusters have a network policy configured using the Azure CLI, when creating a new cluster:

            ```bash
            az aks create --resource-group <ResourceGroupName> --name <ClusterName> --network-plugin azure --network-policy azure
            ```
        - id: terraform
          desc: |
            To ensure AKS clusters have a network policy configured in Terraform:

            ```hcl
            resource "azurerm_kubernetes_cluster" "example" {
              name                = "example-aks"
              location            = azurerm_resource_group.example.location
              resource_group_name = azurerm_resource_group.example.name
              dns_prefix          = "example"

              network_profile {
                network_plugin = "azure"
                network_policy = "azure"
              }

              default_node_pool {
                name       = "default"
                node_count = 1
                vm_size    = "Standard_D2_v2"
              }

              identity {
                type = "SystemAssigned"
              }
            }
            ```
        - id: bicep
          desc: |
            To ensure AKS clusters have a network policy configured in Bicep:

            ```bicep
            resource aksCluster 'Microsoft.ContainerService/managedClusters@2024-09-01' = {
              name: 'example-aks'
              location: resourceGroup().location
              properties: {
                networkProfile: {
                  networkPlugin: 'azure'
                  networkPolicy: 'azure'
                }
                // ...
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/aks/use-network-policies
        title: Secure traffic between pods using network policies in AKS
