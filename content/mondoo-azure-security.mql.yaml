  - uid: mondoo-azure-security-appconfiguration-cmk-encryption
    title: Ensure App Configuration stores use customer-managed encryption keys
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-azure-security-appconfiguration-cmk-encryption-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-appconfiguration-cmk-encryption-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-appconfiguration-cmk-encryption-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure App Configuration stores encrypt configuration values at rest with customer-managed keys (CMK) stored in Azure Key Vault, instead of relying on platform-managed keys.

        **Why this matters**

        - **Secret-adjacent data**: App Configuration stores hold connection strings, feature flag definitions, and Key Vault references that describe an application's runtime topology. The Key Vault references themselves are not secrets, but the surrounding context routinely leaks information about which secrets, hosts, and dependencies an application uses.
        - **Key custody**: Customer-managed keys live in a Key Vault that the organization controls, so key rotation, revocation, and access policies follow the organization's existing key-management governance.
        - **Compliance alignment**: PCI DSS, ISO 27001, and SOC 2 require customer-managed encryption for sensitive at-rest data, including configuration data that exposes deployment topology.

        **Risk mitigation**

        - Configure the App Configuration store with a managed identity and reference a Key Vault key in the `encryption.key_vault_key_identifier` argument.
        - Use the Standard tier (CMK is not available on the Free tier) and ensure the target Key Vault has soft delete and purge protection enabled.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **App Configuration** in the Azure Portal.
        2. Select a configuration store.
        3. Open **Encryption** under **Settings**.
        4. Verify that the encryption key source is **Customer-managed key** and a Key Vault key is selected.

        **Automated Audit with Azure CLI:**

        ```bash
        az appconfig show --resource-group <ResourceGroupName> --name <ConfigStoreName> --query "encryption"
        ```
      remediation:
        - id: portal
          desc: |
            To configure CMK on an App Configuration store using the Azure Portal:

            1. Ensure the store is on the Standard tier and has a system-assigned or user-assigned managed identity.
            2. Grant the store's identity the **Key Vault Crypto Service Encryption User** role on the target Key Vault.
            3. Navigate to **App Configuration** and select the store.
            4. Under **Settings**, select **Encryption**.
            5. Choose **Customer-managed key**, select the Key Vault key, and **Save**.
        - id: cli
          desc: |
            To configure CMK on an App Configuration store using the Azure CLI:

            ```bash
            az appconfig update \
              --resource-group <ResourceGroupName> \
              --name <ConfigStoreName> \
              --encryption-key-name <KeyName> \
              --encryption-key-vault <KeyVaultUri> \
              --identity-client-id <UserAssignedIdentityClientId>
            ```
        - id: terraform
          desc: |
            To configure CMK on an App Configuration store in Terraform:

            ```hcl
            resource "azurerm_app_configuration" "example" {
              name                = "example-appconfig"
              resource_group_name = azurerm_resource_group.example.name
              location            = azurerm_resource_group.example.location
              sku                 = "standard"

              identity {
                type         = "UserAssigned"
                identity_ids = [azurerm_user_assigned_identity.example.id]
              }

              encryption {
                key_vault_key_identifier = azurerm_key_vault_key.example.id
                identity_client_id       = azurerm_user_assigned_identity.example.client_id
              }
            }
            ```
        - id: bicep
          desc: |
            To configure CMK on an App Configuration store in Bicep:

            ```bicep
            resource appConfig 'Microsoft.AppConfiguration/configurationStores@2024-05-01' = {
              name: 'example-appconfig'
              location: resourceGroup().location
              sku: {
                name: 'standard'
              }
              identity: {
                type: 'UserAssigned'
                userAssignedIdentities: {
                  '${userAssignedIdentity.id}': {}
                }
              }
              properties: {
                encryption: {
                  keyVaultProperties: {
                    keyIdentifier: keyVaultKey.properties.keyUriWithVersion
                    identityClientId: userAssignedIdentity.properties.clientId
                  }
                }
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/azure-app-configuration/concept-customer-managed-keys
        title: Customer-managed keys for Azure App Configuration
