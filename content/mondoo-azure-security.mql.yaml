  - uid: mondoo-azure-security-acr-retention-policy-enabled
    title: Ensure ACR retention policy is enabled
    impact: 50
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-dsp-16
      compliance/dora: false
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-10
      compliance/nis-2: false
      compliance/nist-csf-1: nist-csf-1-pr-ip-6
      compliance/nist-csf-2: nist-csf-2-pr-ds-11
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-12
      compliance/nist-sp-800-171: false
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc6-5-1
      compliance/vda-isa-5: false
    variants:
      - uid: mondoo-azure-security-acr-retention-policy-enabled-azure
        tags:
          mondoo.com/filter-title: Azure Container Registry
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-acr-retention-policy-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-acr-retention-policy-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-acr-retention-policy-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that the retention policy is enabled on Azure Container Registry instances. A retention policy automatically removes untagged manifests after a configured number of days, reducing the attack surface from accumulated vulnerable images.

        **Why this matters**

        - Untagged and orphaned images accumulate over time, each potentially containing known CVEs in base images, libraries, or application dependencies. These stale images represent a growing attack surface that can be pulled and deployed by any user with registry access.
        - Attackers who gain registry access can identify and exploit old, untagged images with known vulnerabilities, deploying them as containers to gain code execution with vulnerable software.
        - A retention policy ensures automatic removal of stale images, reducing the window during which vulnerable images remain available for accidental or malicious deployment.

        **Risk mitigation**

        - **Reduced vulnerability exposure**: Removes old images containing known CVEs before they can be deployed, shrinking the pool of exploitable artifacts in the registry.
        - **Deployment safety**: Prevents accidental rollback to vulnerable image versions by ensuring they are automatically purged from the registry.
        - **Supply chain hygiene**: Maintains a clean registry with only current, actively maintained images, reducing the risk of supply chain attacks through stale dependencies.
      audit: |
        ### Audit via Portal

        1. Navigate to **Container registries** in the Azure Portal.
        2. Select the container registry.
        3. Under **Settings**, select **Policies**.
        4. Review the **Retention policy** setting.

        A passing resource shows **Enabled** with a configured number of days. A failing resource shows **Disabled** or no retention period set.

        ### Audit via CLI

        1. Run the following command, replacing `<RegistryName>` and `<ResourceGroupName>` with the target values:

        ```bash
        az acr config retention show \
          --registry <RegistryName> \
          --resource-group <ResourceGroupName> \
          --output json
        ```

        A passing resource returns `"status": "enabled"` with a `days` value greater than zero. A failing resource returns `"status": "disabled"` or an empty result.
      remediation:
        - id: portal
          desc: |
            To enable the retention policy using the Azure Portal:

            1. Navigate to **Container registries** in the Azure Portal.
            2. Select the container registry (must be Premium SKU).
            3. Go to **Policies** under **Settings**.
            4. Set **Retention policy** to **Enabled**.
            5. Configure the retention period in days.
        - id: cli
          desc: |
            To enable the retention policy on a Premium ACR using the Azure CLI:

            ```bash
            az acr config retention update \
              --registry <RegistryName> \
              --resource-group <ResourceGroupName> \
              --status enabled \
              --days <RetentionDays> \
              --type UntaggedManifests
            ```
        - id: terraform
          desc: |
            To enable the retention policy in Terraform:

            ```hcl
            resource "azurerm_container_registry" "example" {
              name                      = "exampleregistry"
              resource_group_name       = azurerm_resource_group.example.name
              location                  = azurerm_resource_group.example.location
              sku                       = "Premium"
              retention_policy_in_days  = 30
            }
            ```
        - id: bicep
          desc: |
            To enable the retention policy in Bicep:

            ```bicep
            resource acr 'Microsoft.ContainerRegistry/registries@2023-07-01' = {
              name: 'exampleregistry'
              location: resourceGroup().location
              sku: {
                name: 'Premium'
              }
              properties: {
                policies: {
                  retentionPolicy: {
                    status: 'enabled'
                    days: 30
                  }
                }
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/container-registry/container-registry-retention-policy
        title: Set a retention policy for untagged manifests
  - uid: mondoo-azure-security-acr-retention-policy-enabled-azure
    filters: |
      asset.platform == "azure-container-registry"
    mql: |
      azure.subscription.containerRegistry.registry.policies.retentionPolicyEnabled == true
  - uid: mondoo-azure-security-acr-retention-policy-enabled-terraform-hcl
