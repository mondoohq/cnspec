      asset.platform == "azure-batch-account"
    mql: |
      azure.subscription.batchService.account.pools.all(
        properties["deploymentConfiguration"]["virtualMachineConfiguration"]["diskEncryptionConfiguration"] != null &&
        properties["deploymentConfiguration"]["virtualMachineConfiguration"]["diskEncryptionConfiguration"]["targets"] != empty
      )
  - uid: mondoo-azure-security-batch-pool-disk-encryption-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "azurerm_batch_pool")
    mql: |
      terraform.resources.where(nameLabel == "azurerm_batch_pool").all(
        blocks.any(type == "disk_encryption")
      )
  - uid: mondoo-azure-security-batch-pool-disk-encryption-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "azurerm_batch_pool")
    mql: |
      terraform.plan.resourceChanges.where(type == "azurerm_batch_pool").all(
        change.after.disk_encryption != null &&
        change.after.disk_encryption != empty
      )
  - uid: mondoo-azure-security-batch-pool-disk-encryption-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "azurerm_batch_pool")
    mql: |
      terraform.state.resources.where(type == "azurerm_batch_pool").all(
        values.disk_encryption != null &&
        values.disk_encryption != empty
      )
  - uid: mondoo-azure-security-sql-server-min-tls-12
    title: Ensure Azure SQL servers enforce minimal TLS version 1.2
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    variants:
      - uid: mondoo-azure-security-sql-server-min-tls-12-azure
        tags:
          mondoo.com/filter-title: Azure SQL Server
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-sql-server-min-tls-12-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-sql-server-min-tls-12-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-sql-server-min-tls-12-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure SQL servers enforce a minimum TLS version of 1.2 for all connections, preventing the use of older, less secure TLS versions. By default, Azure SQL Server permits connections using TLS 1.0 and 1.1, which have known cryptographic weaknesses.

        **Why this matters**

        - **Protocol security:** TLS 1.0 and 1.1 are vulnerable to attacks such as BEAST and POODLE that can compromise encrypted communications between clients and the database server.
        - **Data protection:** Enforcing TLS 1.2 ensures that all data in transit to and from the SQL server is protected by strong encryption algorithms.
        - **Deprecation:** Microsoft has deprecated TLS 1.0 and 1.1 for Azure services; relying on these versions leaves the server exposed as vendor support and patches are no longer provided.

        **Risk mitigation**

        - **Set minimum TLS to 1.2:** Configure the SQL server's `minimalTlsVersion` to `1.2` so that all new connections must negotiate TLS 1.2 or higher.
        - **Audit connection clients:** Before enforcing TLS 1.2, identify any client applications or drivers that still negotiate TLS 1.0 or 1.1 so they can be updated without causing outages.
        - **Monitor for failed connections:** After enforcement, track connection errors that indicate legacy clients attempting to connect, and update or retire those clients promptly.
      audit: |
        **Automated Audit with Azure CLI:**

        ```bash
        az sql server list --query "[].{Name:name, MinTLS:minimalTlsVersion}"
        ```
      remediation:
        - id: portal
          desc: |
            To ensure Azure SQL servers enforce minimal TLS version 1.2 using the Azure Portal:

            1. Navigate to **SQL servers** in the Azure Portal.
            2. Select the SQL server.
            3. Under **Security**, select **Networking**.
            4. Set **Minimum TLS version** to **1.2**.
            5. Select **Save**.
        - id: cli
          desc: |
            To ensure Azure SQL servers enforce minimal TLS version 1.2 using the Azure CLI:

            ```bash
            az sql server update --name <ServerName> --resource-group <ResourceGroupName> --minimal-tls-version 1.2
            ```
        - id: terraform
          desc: |
            To ensure Azure SQL servers enforce minimal TLS version 1.2 in Terraform:

            ```hcl
            resource "azurerm_mssql_server" "example" {
              name                         = "example-sql-server"
              resource_group_name          = azurerm_resource_group.example.name
              location                     = azurerm_resource_group.example.location
              version                      = "12.0"
              administrator_login          = "sqladmin"
              administrator_login_password = var.sql_admin_password
              minimum_tls_version          = "1.2"
            }
            ```
        - id: bicep
          desc: |
            To ensure Azure SQL servers enforce minimal TLS version 1.2 in Bicep:

            ```bicep
            @secure()
            param sqlAdminPassword string

            resource sqlServer 'Microsoft.Sql/servers@2023-08-01-preview' = {
              name: 'example-sql-server'
              location: resourceGroup().location
              properties: {
                minimalTlsVersion: '1.2'
                administratorLogin: 'sqladmin'
                administratorLoginPassword: sqlAdminPassword
              }
            }
            ```
