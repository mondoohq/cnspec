  - uid: mondoo-azure-security-recovery-vault-backup-policies
    title: Ensure Recovery Services Vaults have backup policies
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-bcr-08
      compliance/dora: dora-art-12
      compliance/hipaa: hipaa-security-ss164-308-a-7-ii-a-contingency-plan-data-backup-plan
      compliance/iso-27001-2022: iso-27001-2022-a-8-13
      compliance/nis-2: nis-2-21-2-c
      compliance/nist-csf-1: nist-csf-1-pr-ip-4
      compliance/nist-csf-2: nist-csf-2-pr-ds-11
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cp-9
      compliance/nist-sp-800-171: nist-sp-800-171--3-8-9
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc9-1-1
      compliance/vda-isa-5: false
    variants:
      - uid: mondoo-azure-security-recovery-vault-backup-policies-azure
        tags:
          mondoo.com/filter-title: Azure Recovery Services Vault
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-recovery-vault-backup-policies-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-recovery-vault-backup-policies-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-recovery-vault-backup-policies-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure Recovery Services Vaults have at least one backup policy configured. Backup policies define the schedule, retention, and scope of backup operations.

        **Why this matters**

        - Ransomware operators perform reconnaissance on backup infrastructure before launching attacks. A Recovery Services Vault with no backup policies signals that workloads have no automated backup protection, giving the attacker maximum ransom leverage because there is no recovery path.
        - A vault without backup policies may indicate an attacker has already deleted the policies as a preparatory step before launching a destructive attack. Monitoring for absent backup policies can detect this pre-attack activity.
        - Unconfigured vaults create gaps in backup coverage that leave workloads completely unprotected against data destruction, whether from ransomware, insider threats, or accidental deletion.

        **Risk mitigation**

        - **Ransomware resilience**: Ensures vaults are actively configured with backup policies so that protected workloads can be restored after a destructive attack.
        - **Pre-attack detection**: Absence of backup policies where they previously existed may indicate attacker preparation for a ransomware or destructive attack.
        - **Compliance alignment**: Regulatory frameworks require documented backup policies to demonstrate data protection and recovery capabilities.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Recovery Services vaults** in the Azure Portal.
        2. Select a vault.
        3. Go to **Backup policies** under **Manage**.
        4. Verify that at least one backup policy exists.

        **When this check runs against Terraform:** The Terraform version of this check is presence-only. It verifies that at least one `azurerm_backup_policy_vm`, `azurerm_backup_policy_vm_workload`, or `azurerm_backup_policy_file_share` resource is declared when a vault is, but it does not correlate each policy back to a specific vault via `recovery_vault_name`. A configuration with multiple vaults where only one has an associated policy still passes against Terraform HCL, plan, or state. The Azure runtime check enforces the strict per-vault rule and is authoritative.
      remediation:
        - id: portal
          desc: |
            To create a backup policy using the Azure Portal:

            1. Navigate to **Recovery Services vaults** in the Azure Portal.
            2. Select the vault.
            3. Go to **Backup policies** under **Manage**.
            4. Select **+ Add**.
            5. Choose the workload type and configure the schedule and retention.
            6. Save the policy.
        - id: cli
          desc: |
            Generate a policy template, customize the schedule and retention, create the policy on the vault, then protect a workload such as an Azure VM using the Azure CLI:

            ```bash
            az backup policy get-default-for-vm \
              --resource-group <ResourceGroupName> \
              --vault-name <VaultName> > policy.json
            ```

            Edit `policy.json` to set `schedulePolicy`, `retentionPolicy`, and `timeZone` to match your RPO/RTO. The schema is documented at [Azure Backup policies for Azure VMs](https://learn.microsoft.com/en-us/azure/backup/backup-azure-vm-backup-policy-concept). Then:

            ```bash
            az backup policy create \
              --resource-group <ResourceGroupName> \
              --vault-name <VaultName> \
              --name <PolicyName> \
              --backup-management-type AzureIaasVM \
              --workload-type VM \
              --policy @policy.json

            az vm show \
              --name <VMName> \
              --resource-group <ResourceGroupName> \
              --query id \
              --output tsv

            az backup protection enable-for-vm \
              --resource-group <ResourceGroupName> \
              --vault-name <VaultName> \
              --vm <VMResourceId> \
              --policy-name <PolicyName>
            ```
        - id: terraform
          desc: |
            Define a backup policy alongside the vault. For Azure VM backups:

            ```hcl
            resource "azurerm_backup_policy_vm" "example" {
              name                = "example-vm-backup-policy"
              resource_group_name = azurerm_resource_group.example.name
              recovery_vault_name = azurerm_recovery_services_vault.example.name

              backup {
                frequency = "Daily"
                time      = "23:00"
              }

              retention_daily {
                count = 30
              }
            }
            ```

            Use `azurerm_backup_policy_file_share` for Azure Files workloads and `azurerm_backup_policy_vm_workload` for SQL Server or SAP HANA backups.
        - id: bicep
          desc: |
            Backup policies are configured as child resources of the vault. Example for a VM backup policy:

            ```bicep
            resource backupPolicy 'Microsoft.RecoveryServices/vaults/backupPolicies@2024-04-01' = {
              parent: vault
              name: 'example-vm-policy'
              properties: {
                backupManagementType: 'AzureIaasVM'
                schedulePolicy: {
                  schedulePolicyType: 'SimpleSchedulePolicy'
                  scheduleRunFrequency: 'Daily'
                  scheduleRunTimes: [
                    '2024-01-01T02:00:00Z'
                  ]
                }
                retentionPolicy: {
                  retentionPolicyType: 'LongTermRetentionPolicy'
                  dailySchedule: {
                    retentionTimes: [
                      '2024-01-01T02:00:00Z'
                    ]
                    retentionDuration: {
                      count: 30
                      durationType: 'Days'
                    }
                  }
                }
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/backup/backup-azure-arm-vms-prepare
        title: Prepare to back up Azure VMs
