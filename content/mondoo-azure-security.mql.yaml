  - uid: mondoo-azure-security-sql-audit-retention-90-days
    title: Ensure SQL audit log retention is at least 90 days
    impact: 60
    variants:
      - uid: mondoo-azure-security-sql-audit-retention-90-days-azure
        tags:
          mondoo.com/filter-title: Azure SQL Server
          mondoo.com/icon: azure
      - uid: mondoo-azure-security-sql-audit-retention-90-days-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/icon: terraform
      - uid: mondoo-azure-security-sql-audit-retention-90-days-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/icon: terraform
      - uid: mondoo-azure-security-sql-audit-retention-90-days-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/icon: terraform
    docs:
      desc: |
        This check ensures that Azure SQL Server audit log retention is configured for at least 90 days. While the existing 30-day check establishes a baseline, 90 days provides sufficient history for thorough security investigations, compliance audits, and trend analysis.

        **Why this matters**

        - **Incident investigation:** Advanced persistent threats may operate undetected for weeks or months. A 90-day retention window provides adequate history for investigation.
        - **Compliance:** PCI DSS requires a minimum of 90 days of audit log retention. Many other frameworks require similar or longer periods.
        - **Forensics:** Shorter retention periods may result in loss of critical evidence before an incident is detected.

        A retention value of `0` means unlimited retention, which satisfies this check.
      remediation:
        - id: cli
          desc: |
            **Using Azure CLI**

            ```bash
            az sql server audit-policy update \
              --resource-group <rg> --server <server> \
              --state Enabled --retention-days 90 \
              --storage-account <storage-account-id>
            ```
        - id: bicep
          desc: |
            **Using Bicep**

            ```bicep
            resource sqlAudit 'Microsoft.Sql/servers/auditingSettings@2022-05-01-preview' = {
              parent: sqlServer
              name: 'default'
              properties: {
                state: 'Enabled'
                retentionDays: 90
                storageEndpoint: storageAccount.properties.primaryEndpoints.blob
                storageAccountAccessKey: storageAccount.listKeys().keys[0].value
              }
            }
            ```
        - id: terraform
          desc: |
            **Using Terraform**

            ```hcl
            resource "azurerm_mssql_server_extended_auditing_policy" "example" {
              server_id              = azurerm_mssql_server.example.id
              storage_endpoint       = azurerm_storage_account.example.primary_blob_endpoint
              storage_account_access_key = azurerm_storage_account.example.primary_access_key
              retention_in_days      = 90
            }
            ```
        - id: portal
          desc: |
            **Using Azure Portal**

            1. Navigate to **SQL servers**.
            2. Select the server.
            3. Go to **Auditing** under **Security**.
            4. Enable auditing and set the retention period to at least 90 days.
            5. Select **Save**.
    refs:
      - url: https://learn.microsoft.com/en-us/azure/azure-sql/database/auditing-overview
        title: Azure Documentation - Auditing for Azure SQL Database
  - uid: mondoo-azure-security-sql-audit-retention-90-days-azure
    filters: |
      asset.platform == "azure-sql-server"
    mql: |
      azure.subscription.sql.server.auditingPolicy.state == "Enabled"
      azure.subscription.sql.server.auditingPolicy.retentionDays >= 90 ||
       azure.subscription.sql.server.auditingPolicy.retentionDays == 0
  - uid: mondoo-azure-security-sql-audit-retention-90-days-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "azurerm_mssql_server_extended_auditing_policy")
    mql: |
      terraform.resources.where(nameLabel == "azurerm_mssql_server_extended_auditing_policy").all(
        arguments['retention_in_days'] >= 90 || arguments['retention_in_days'] == 0
      )
  - uid: mondoo-azure-security-sql-audit-retention-90-days-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "azurerm_mssql_server_extended_auditing_policy")
    mql: |
      terraform.plan.resourceChanges.where(type == "azurerm_mssql_server_extended_auditing_policy").all(
        change.after['retention_in_days'] >= 90 || change.after['retention_in_days'] == 0
      )
  - uid: mondoo-azure-security-sql-audit-retention-90-days-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "azurerm_mssql_server_extended_auditing_policy")
    mql: |
      terraform.state.resources.where(type == "azurerm_mssql_server_extended_auditing_policy").all(
        values['retention_in_days'] >= 90 || values['retention_in_days'] == 0
      )
  - uid: mondoo-azure-security-sql-threat-alert-emails-configured
    title: Ensure SQL threat alert email addresses are configured
    impact: 50
    variants:
      - uid: mondoo-azure-security-sql-threat-alert-emails-configured-azure
        tags:
          mondoo.com/filter-title: Azure SQL Server
          mondoo.com/icon: azure
      - uid: mondoo-azure-security-sql-threat-alert-emails-configured-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/icon: terraform
      - uid: mondoo-azure-security-sql-threat-alert-emails-configured-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/icon: terraform
      - uid: mondoo-azure-security-sql-threat-alert-emails-configured-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/icon: terraform
    docs:
      desc: |
        This check ensures that at least one email address is configured to receive SQL threat detection alerts. Without notification recipients, threat detection alerts are generated but never seen by security teams.

        **Why this matters**

        - **Missed alerts:** If no email addresses are configured, critical threat detection alerts such as SQL injection attempts or anomalous database access go unnoticed.
        - **Response time:** Timely email notifications enable faster incident response.
      remediation:
        - id: cli
          desc: |
            **Using Azure CLI**

            ```bash
            az sql server threat-policy update \
              --resource-group <rg> --server <server> \
              --state Enabled \
              --email-addresses "security@example.com"
            ```
        - id: bicep
          desc: |
            **Using Bicep**

            ```bicep
            resource sqlThreatPolicy 'Microsoft.Sql/servers/securityAlertPolicies@2022-05-01-preview' = {
              parent: sqlServer
              name: 'default'
              properties: {
                state: 'Enabled'
                emailAddresses: [
                  'security@example.com'
                ]
              }
            }
            ```
        - id: terraform
          desc: |
            **Using Terraform**

            ```hcl
            resource "azurerm_mssql_server_security_alert_policy" "example" {
              resource_group_name = azurerm_resource_group.example.name
              server_name         = azurerm_mssql_server.example.name
              state               = "Enabled"
              email_addresses     = ["security@example.com"]
            }
            ```
        - id: portal
          desc: |
            **Using Azure Portal**

            1. Navigate to **SQL servers**.
            2. Select the server.
            3. Go to **Microsoft Defender for SQL** under **Security**.
            4. Select **Configure**.
            5. Add email addresses for threat alert notifications.
            6. Select **Save**.
    refs:
      - url: https://learn.microsoft.com/en-us/azure/azure-sql/database/threat-detection-configure
        title: Azure Documentation - Configure Advanced Threat Protection
  - uid: mondoo-azure-security-sql-threat-alert-emails-configured-azure
    filters: |
      asset.platform == "azure-sql-server"
    mql: |
      azure.subscription.sql.server.threatDetectionPolicy.state == "Enabled"
      azure.subscription.sql.server.threatDetectionPolicy.emailAddresses.where(_ != "").length > 0
  - uid: mondoo-azure-security-sql-threat-alert-emails-configured-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "azurerm_mssql_server_security_alert_policy")
    mql: |
      terraform.resources.where(nameLabel == "azurerm_mssql_server_security_alert_policy").all(
        arguments['state'] == "Enabled" &&
        arguments['email_addresses'] != empty
      )
  - uid: mondoo-azure-security-sql-threat-alert-emails-configured-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "azurerm_mssql_server_security_alert_policy")
    mql: |
      terraform.plan.resourceChanges.where(type == "azurerm_mssql_server_security_alert_policy").all(
        change.after['state'] == "Enabled" &&
        change.after['email_addresses'] != empty
      )
  - uid: mondoo-azure-security-sql-threat-alert-emails-configured-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "azurerm_mssql_server_security_alert_policy")
    mql: |
