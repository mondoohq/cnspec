      - uid: mondoo-azure-security-recovery-vault-job-failure-alerts-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure Recovery Services Vaults have monitoring alerts enabled for all backup job failures. Without alerts, failed backup jobs go unnoticed while attackers prepare destructive operations.

        **Why this matters**

        - Ransomware operators deliberately sabotage backup jobs before launching encryption attacks. By causing backup failures through tactics such as modifying backup policies, revoking service principal access, or corrupting backup data, attackers ensure there is no recent backup to restore from when the ransom demand arrives.
        - Silent backup failures accumulate over days or weeks, creating an expanding window of unprotected data. Attackers who monitor backup status can time their destructive attack to coincide with maximum data loss exposure.
        - Timely job failure alerts enable security and backup teams to investigate whether failures are caused by misconfiguration or deliberate sabotage, triggering incident response before the attacker launches their primary attack.

        **Risk mitigation**

        - **Attack early warning**: Backup job failures can be the first indicator that an attacker is preparing a ransomware or destructive attack against the environment.
        - **Recovery assurance**: Alerts ensure that backup gaps are detected and resolved before an attacker can exploit them.
        - **Sabotage detection**: Unexpected backup failures trigger investigation that may reveal an attacker's presence before they complete their objective.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Recovery Services vaults** in the Azure Portal.
        2. Select a vault.
        3. Go to **Properties** under **Settings**.
        4. Under **Monitoring settings**, verify that **Alerts for all job failures** is enabled.
      remediation:
        - id: portal
          desc: |
            To enable job failure alerts using the Azure Portal:

            1. Navigate to **Recovery Services vaults** in the Azure Portal.
            2. Select the vault.
            3. Go to **Properties** under **Settings**.
            4. Under **Monitoring settings**, select **Update**.
            5. Enable **Alerts for all job failures**.
            6. Save the changes.
        - id: cli
          desc: |
            Enable Azure Monitor alerts for backup job failures using the Azure CLI:

            ```bash
            az backup vault backup-properties set \
              --name <VaultName> \
              --resource-group <ResourceGroupName> \
              --job-failure-alerts Enable
            ```

            Wire alerts to a notification channel by creating an action group and attaching it to the built-in `Backup Job Failures` alert rule scoped to the vault.
        - id: terraform
          desc: |
            To enable job failure alerts in Terraform. The default is `true`, so leaving the `monitoring` block off also passes; declaring it explicitly prevents drift:

            ```hcl
            resource "azurerm_recovery_services_vault" "example" {
              name                = "example-vault"
              location            = azurerm_resource_group.example.location
              resource_group_name = azurerm_resource_group.example.name
              sku                 = "Standard"

              monitoring {
                alerts_for_all_job_failures_enabled = true
              }
            }
            ```
        - id: bicep
          desc: |
            To enable job failure alerts in Bicep:

            ```bicep
            resource vault 'Microsoft.RecoveryServices/vaults@2024-04-01' = {
              name: 'example-vault'
              location: resourceGroup().location
              sku: {
                name: 'RS0'
                tier: 'Standard'
              }
              properties: {
                monitoringSettings: {
                  azureMonitorAlertSettings: {
                    alertsForAllJobFailures: 'Enabled'
                  }
                }
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/backup/backup-azure-monitoring-built-in-monitor
        title: Monitor Azure Backup with Azure Monitor
