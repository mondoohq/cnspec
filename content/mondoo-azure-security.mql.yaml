      - uid: mondoo-azure-security-compute-unattached-disks-encrypted-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that unattached Azure managed disks are encrypted with Customer Managed Keys (CMK) stored in Azure Key Vault. Unattached disks retain data from previous workloads and are often overlooked during security reviews, yet they remain accessible at rest without a VM to enforce OS-level access controls.

        **Why this matters**

        - **Residual data protection:** Unattached disks frequently contain sensitive data from previous VM deployments and are not protected by OS-level controls once detached, making encryption the primary remaining safeguard.
        - **Key ownership and revocation:** CMK gives organizations direct control over encryption key lifecycle, enabling key rotation, expiry, and emergency revocation through Azure Key Vault without data migration.
        - **Orphaned resource risk:** Unattached disks may persist indefinitely after a VM is deleted, making them easy to forget and hard to discover; encryption ensures forgotten disks do not become unprotected data stores.
        - **Scope of protection:** Platform-managed keys protect against Azure infrastructure access, while CMK extends protection so that even Azure support personnel cannot access disk contents without the customer's explicit key authorization.

        **Risk mitigation**

        - **Data exposure from stale resources:** Encrypting unattached disks ensures that orphaned or forgotten disks do not expose workload data if they are inadvertently shared, exported, or accessed through the Azure platform.
        - **Key compromise isolation:** CMK encryption means that revoking the key immediately renders all encrypted disk data inaccessible, providing an emergency stop capability not available with platform-managed keys.
        - **Regulatory audit coverage:** Demonstrating CMK encryption on all disks, including unattached ones, satisfies encryption-at-rest requirements that apply to data regardless of resource operational state.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Disks** in the Azure Portal.
        2. Filter disks by **Disk state** to show only **Unattached** disks.
        3. For each unattached disk, verify that the encryption type is set to **Customer-managed keys**.

        **Automated Audit with Azure CLI:**

        ```bash
        az disk list --query "[?diskState=='Unattached'].{Name:name, ResourceGroup:resourceGroup, EncryptionType:encryption.type}" -o table
        ```

        **Automated Audit with PowerShell:**

        ```powershell
        Get-AzDisk | Where-Object { $_.DiskState -eq "Unattached" } | Select-Object Name, ResourceGroupName, @{Name="EncryptionType";Expression={$_.Encryption.Type}}
        ```

        Ensure all unattached disks have the EncryptionType set to EncryptionAtRestWithCustomerKey.
      remediation:
        - id: portal
          desc: |
            To ensure unattached disks are encrypted with Customer Managed Keys using the Azure Portal:

            1. Navigate to **Disks** in the Azure Portal.
            2. Select the unattached disk you wish to encrypt.
            3. In the **Encryption** section, set **Encryption type** to **Customer-managed keys**.
            4. Specify the Azure Key Vault and select the appropriate key.
            5. Save the changes.
        - id: cli
          desc: |
            To ensure unattached disks are encrypted with Customer Managed Keys using the Azure CLI:

            ```bash
            az disk update --resource-group <ResourceGroupName> --name <DiskName> --encryption-type EncryptionAtRestWithCustomerKey --disk-encryption-set <DiskEncryptionSetId>
            ```
        - id: powershell
          desc: |
            To ensure unattached disks are encrypted with Customer Managed Keys using PowerShell:

            ```powershell
            $disk = Get-AzDisk -ResourceGroupName <ResourceGroupName> -DiskName <DiskName>
            $disk.Encryption = New-Object Microsoft.Azure.Management.Compute.Models.Encryption
            $disk.Encryption.Type = "EncryptionAtRestWithCustomerKey"
            $disk.Encryption.DiskEncryptionSetId = "<DiskEncryptionSetId>"
            Update-AzDisk -ResourceGroupName <ResourceGroupName> -DiskName <DiskName> -Disk $disk
            ```
        - id: terraform
          desc: |
            To ensure unattached disks are encrypted with Customer Managed Keys in Terraform:

            ```hcl
            resource "azurerm_managed_disk" "example" {
              name                   = "example-unattached-disk"
              location               = azurerm_resource_group.example.location
              resource_group_name    = azurerm_resource_group.example.name
              storage_account_type   = "Standard_LRS"
              create_option          = "Empty"
              disk_size_gb           = 128
              disk_encryption_set_id = azurerm_disk_encryption_set.example.id
            }
            ```
        - id: bicep
          desc: |
            To ensure unattached disks are encrypted with Customer Managed Keys in Bicep:

            ```bicep
            resource managedDisk 'Microsoft.Compute/disks@2024-03-02' = {
              name: 'example-unattached-disk'
              location: resourceGroup().location
              properties: {
                diskSizeGB: 128
                encryption: {
                  diskEncryptionSetId: diskEncryptionSet.id
                }
                creationData: {
                  createOption: 'Empty'
                }
              }
              sku: {
                name: 'Premium_LRS'
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/virtual-machines/disk-encryption-overview
        title: Overview of managed disk encryption options
