  - uid: mondoo-azure-security-recovery-vault-private-endpoints
    title: Ensure Recovery Services Vaults have private endpoints
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-azure-security-recovery-vault-private-endpoints-azure
        tags:
          mondoo.com/filter-title: Azure Recovery Services Vault
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-recovery-vault-private-endpoints-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-recovery-vault-private-endpoints-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-recovery-vault-private-endpoints-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure Recovery Services Vaults have at least one private endpoint connection configured. Private endpoints enable secure, private connectivity for backup and restore operations.

        **Why this matters**

        - Without private endpoints, backup traffic must traverse the public internet, exposing sensitive backup data.
        - Private endpoints ensure that backup and restore operations stay within the Azure backbone network.
        - This is critical for vaults containing backups of sensitive databases, VMs, and file systems.

        **Risk mitigation**

        - **Network isolation:** Backup traffic uses private IP addresses within the virtual network.
        - **Data exfiltration prevention:** Private Link prevents traffic redirection outside the Microsoft backbone.
        - **Compliance:** Satisfies network isolation requirements for backup infrastructure.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Recovery Services vaults** in the Azure Portal.
        2. Select a vault.
        3. Go to **Networking** under **Settings**.
        4. Select the **Private endpoint connections** tab.
        5. Verify that at least one private endpoint connection exists.
      remediation:
        - id: portal
          desc: |
            To configure private endpoints using the Azure Portal:

            1. Navigate to **Recovery Services vaults** in the Azure Portal.
            2. Select the vault.
            3. Go to **Networking** under **Settings**.
            4. Select **+ Private endpoint** and configure the virtual network, subnet, and DNS settings.
            5. Select **Review + create**, then **Create**.
        - id: cli
          desc: |
            Look up the vault resource ID, create a private endpoint that targets it, then disable public network access using the Azure CLI:

            ```bash
            az backup vault show \
              --name <VaultName> \
              --resource-group <ResourceGroupName> \
              --query id \
              --output tsv

            az network private-endpoint create \
              --name <PrivateEndpointName> \
              --resource-group <ResourceGroupName> \
              --vnet-name <VNetName> \
              --subnet <SubnetName> \
              --private-connection-resource-id <VaultResourceId> \
              --group-id AzureBackup \
              --connection-name <ConnectionName>

            az backup vault update \
              --name <VaultName> \
              --resource-group <ResourceGroupName> \
              --public-network-access Disable
            ```
        - id: terraform
          desc: |
            To configure private endpoints in Terraform:

            ```hcl
            resource "azurerm_private_endpoint" "vault" {
              name                = "example-vault-pe"
              location            = azurerm_resource_group.example.location
              resource_group_name = azurerm_resource_group.example.name
              subnet_id           = azurerm_subnet.example.id

              private_service_connection {
                name                           = "vault-psc"
                private_connection_resource_id = azurerm_recovery_services_vault.example.id
                subresource_names              = ["AzureBackup"]
                is_manual_connection           = false
              }
            }
            ```
        - id: bicep
          desc: |
            To configure private endpoints for Recovery Services Vault in Bicep:

            ```bicep
            resource privateEndpoint 'Microsoft.Network/privateEndpoints@2024-05-01' = {
              name: 'example-vault-pe'
              location: resourceGroup().location
              properties: {
                subnet: {
                  id: subnet.id
                }
                privateLinkServiceConnections: [
                  {
                    name: 'vault-psc'
                    properties: {
                      privateLinkServiceId: vault.id
                      groupIds: [
                        'AzureBackup'
                      ]
                    }
                  }
                ]
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/backup/private-endpoints
        title: Create and use private endpoints for Azure Backup
  - uid: mondoo-azure-security-recovery-vault-private-endpoints-azure
    filters: |
      asset.platform == "azure-recovery-services-vault"
    mql: |
