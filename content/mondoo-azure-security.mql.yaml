  - uid: mondoo-azure-security-app-service-vnet-route-all
    title: Ensure App Service routes all traffic through VNet
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-7
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-azure-security-app-service-vnet-route-all-azure
        tags:
          mondoo.com/filter-title: Azure App Service
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-app-service-vnet-route-all-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-app-service-vnet-route-all-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-app-service-vnet-route-all-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure App Service instances route all outbound traffic through VNet integration, subjecting it to network security controls such as NSGs and Azure Firewall.

        **Why this matters**

        - **Traffic inspection**: Without VNet routing, outbound traffic from the application bypasses network security controls and flows directly to the internet.
        - **Data exfiltration prevention**: VNet routing enables inspection and filtering of outbound traffic, preventing unauthorized data exfiltration.
        - **Network segmentation**: Routing through VNet ensures outbound traffic is subject to the same security policies as other resources in the virtual network.

        **Risk mitigation**

        - Enable VNet integration and route all traffic through the virtual network.
        - Configure NSGs and Azure Firewall to inspect and filter outbound traffic.
      audit: |
        ### Audit via Portal

        1. Navigate to **App Services** in the Azure Portal.
        2. Select the App Service instance.
        3. Under **Settings**, select **Networking**.
        4. Under **Outbound traffic configuration**, review **VNet integration**.
        5. Check whether **Route All** is enabled for the VNet integration.

        A passing resource shows VNet integration configured with **Route All** enabled. A failing resource has VNet integration absent or **Route All** disabled.

        ### Audit via CLI

        1. Run the following command, substituting your resource group and app name:

        ```bash
        az webapp show --resource-group <ResourceGroupName> --name <AppName> --query "vnetRouteAllEnabled" -o tsv
        ```

        A passing resource returns `true`. A failing resource returns `false` or an empty value.
      remediation:
        - id: portal
          desc: |
            To ensure App Service routes all traffic through VNet using the Azure Portal:

            1. Navigate to **App Services** in the Azure Portal.
            2. Select the App Service instance.
            3. Under **Settings**, select **Networking**.
            4. Under **VNet integration**, set **Route All** to **Enabled**.
            5. Select **Save**.
        - id: cli
          desc: |
            To ensure App Service routes all traffic through VNet using the Azure CLI:

            ```bash
            az webapp vnet-integration add --resource-group <ResourceGroupName> --name <AppName> --vnet <VNetName> --subnet <SubnetName>
            az webapp update --resource-group <ResourceGroupName> --name <AppName> --set vnetRouteAllEnabled=true
            ```
        - id: terraform
          desc: |
            To ensure App Service routes all traffic through VNet in Terraform:

            ```hcl
            resource "azurerm_linux_web_app" "example" {
              name                = "example-app"
              resource_group_name = azurerm_resource_group.example.name
              location            = azurerm_resource_group.example.location
              service_plan_id     = azurerm_service_plan.example.id

              virtual_network_subnet_id = azurerm_subnet.example.id

              site_config {
                vnet_route_all_enabled = true
              }
            }
            ```
        - id: bicep
          desc: |
            To ensure App Service routes all traffic through VNet in Bicep:

            ```bicep
            resource webAppConfig 'Microsoft.Web/sites/config@2023-01-01' = {
              parent: webApp
              name: 'web'
              properties: {
                vnetRouteAllEnabled: true
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/app-service/overview-vnet-integration
        title: Azure App Service VNet Integration
  - uid: mondoo-azure-security-app-service-vnet-route-all-azure
    filters: |
