  - uid: mondoo-azure-security-firewall-premium-sku
    title: Ensure Azure Firewall uses Premium SKU for advanced threat protection
    impact: 40
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-azure-security-firewall-premium-sku-azure
        tags:
          mondoo.com/filter-title: Azure Subscription
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-firewall-premium-sku-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-firewall-premium-sku-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-firewall-premium-sku-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure Firewall instances use the Premium SKU, which provides advanced threat protection capabilities including TLS inspection, intrusion detection and prevention, and enhanced URL filtering that are not available in the Standard SKU. The Standard SKU is often provisioned by default and lacks these deep packet inspection features.

        **Why this matters**

        - **TLS inspection:** The Premium SKU can decrypt, inspect, and re-encrypt TLS traffic, enabling the firewall to detect threats hidden inside encrypted connections that the Standard SKU passes through uninspected.
        - **Intrusion detection and prevention:** A signature-based IDPS engine detects and blocks known attack patterns in network traffic, providing a layer of protection beyond stateful packet filtering.
        - **URL path filtering:** Enhanced URL filtering can evaluate the full URL path rather than only the domain, allowing more precise control over allowed and blocked web destinations.
        - **Web category filtering:** Granular category-based filtering lets administrators block access to entire classes of content such as malware distribution sites, anonymizing proxies, or unsanctioned cloud storage.

        **Risk mitigation**

        - **Encrypted threat detection:** Without TLS inspection, encrypted command and control traffic, data exfiltration, and malware downloads pass through the firewall undetected; the Premium SKU closes this blind spot.
        - **Zero-day pattern blocking:** The IDPS engine receives signature updates that can block newly discovered attack patterns before they reach internal hosts.
        - **Lateral movement prevention:** Deep packet inspection of east-west traffic can detect and block attacker tools and exploit traffic moving between network segments.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Firewalls** in the Azure Portal.
        2. Select an Azure Firewall instance.
        3. Go to **Overview**.
        4. Verify that the **SKU tier** is set to **Premium**.

        **Automated Audit with Azure CLI:**

        ```bash
        az network firewall list --query "[].{Name:name, ResourceGroup:resourceGroup, SkuTier:sku.tier}" -o table
        ```

        **Automated Audit with PowerShell:**

        ```powershell
        Get-AzFirewall | Select-Object Name, ResourceGroupName, @{N="SkuTier";E={$_.Sku.Tier}}
        ```
      remediation:
        - id: portal
          desc: |
            To ensure Azure Firewall uses Premium SKU for advanced threat protection using the Azure Portal:

            1. Navigate to **Firewalls** in the Azure Portal.
            2. Select the Azure Firewall instance.
            3. Note: Upgrading from Standard to Premium requires redeployment. Create a new firewall with Premium SKU and migrate rules.
            4. Select **Premium** as the SKU tier during creation.
            5. Migrate existing firewall rules and policies to the new Premium firewall.
        - id: cli
          desc: |
            To ensure Azure Firewall uses Premium SKU for advanced threat protection using the Azure CLI:

            ```bash
            az network firewall create --name <FirewallName> --resource-group <ResourceGroupName> --location <Location> --sku AZFW_VNet --tier Premium
            ```
        - id: powershell
          desc: |
            To ensure Azure Firewall uses Premium SKU for advanced threat protection using PowerShell:

            ```powershell
            New-AzFirewall -Name <FirewallName> -ResourceGroupName <ResourceGroupName> -Location <Location> -SkuName "AZFW_VNet" -SkuTier "Premium"
            ```
        - id: terraform
          desc: |
            To ensure Azure Firewall uses Premium SKU for advanced threat protection in Terraform:

            ```hcl
            resource "azurerm_firewall" "example" {
              name                = "example-firewall"
              location            = azurerm_resource_group.example.location
              resource_group_name = azurerm_resource_group.example.name
              sku_name            = "AZFW_VNet"
              sku_tier            = "Premium"
            }
            ```
        - id: bicep
          desc: |
            To ensure Azure Firewall uses Premium SKU for advanced threat protection in Bicep:

            ```bicep
            resource firewall 'Microsoft.Network/azureFirewalls@2024-05-01' = {
              name: 'example-firewall'
              location: resourceGroup().location
              properties: {
                sku: {
                  name: 'AZFW_VNet'
                  tier: 'Premium'
                }
                // ...
              }
            }
            ```
