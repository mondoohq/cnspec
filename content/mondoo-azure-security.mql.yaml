  - uid: mondoo-azure-security-search-service-cmk-encryption
    title: Ensure Azure AI Search services enforce customer-managed key encryption
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-azure-security-search-service-cmk-encryption-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-search-service-cmk-encryption-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-search-service-cmk-encryption-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure AI Search services enforce customer-managed key (CMK) encryption for indexes and synonym maps, instead of allowing them to fall back to platform-managed keys.

        **Why this matters**

        - **Indexed content sensitivity**: Indexes built by AI Search often mirror sensitive line-of-business content extracted from storage accounts, Cosmos DB, or SQL databases. The indexed copy must be encrypted with keys the organization controls, otherwise CMK on the source data is undermined the moment that data is indexed.
        - **Key custody**: Customer-managed keys live in a Key Vault that the organization controls, so key rotation, revocation, and access policies follow the organization's existing key-management governance.
        - **Enforcement vs. opt-in**: Without `encryptionWithCmk.enforcement` set to **Enabled**, individual indexes can be created without specifying a CMK and silently fall back to platform-managed encryption.

        **Risk mitigation**

        - Set the service-level CMK enforcement policy to **Enabled** so any index or synonym map created without a Key Vault key is rejected at creation.
        - Grant the search service's managed identity the **Key Vault Crypto Service Encryption User** role on the target Key Vault.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Azure AI Search** in the Azure Portal.
        2. Select a search service.
        3. Open **Keys** under **Settings**.
        4. Verify that **Encryption with customer-managed keys** is set to **Enforced**.

        **Automated Audit with Azure CLI:**

        ```bash
        az search service show --resource-group <ResourceGroupName> --name <SearchServiceName> --query "encryptionWithCmk"
        ```
      remediation:
        - id: portal
          desc: |
            To enforce CMK on an Azure AI Search service using the Azure Portal:

            1. Navigate to **Azure AI Search** in the Azure Portal.
            2. Select the search service.
            3. Under **Settings**, select **Keys**.
            4. Set **Encryption with customer-managed keys** to **Enforced**.
            5. Save the change, then create or update each index with a `encryptionKey` reference to a Key Vault key.
        - id: cli
          desc: |
            To enforce CMK on an Azure AI Search service using the Azure CLI, patch the service resource directly:

            ```bash
            az resource update \
              --resource-type Microsoft.Search/searchServices \
              --name <SearchServiceName> \
              --resource-group <ResourceGroupName> \
              --set properties.encryptionWithCmk.enforcement=Enabled
            ```
        - id: terraform
          desc: |
            To enforce CMK on an Azure AI Search service in Terraform:

            ```hcl
            resource "azurerm_search_service" "example" {
              name                                     = "example-search"
              resource_group_name                      = azurerm_resource_group.example.name
              location                                 = azurerm_resource_group.example.location
              sku                                      = "standard"
              customer_managed_key_enforcement_enabled = true
            }
            ```
        - id: bicep
          desc: |
            To enforce CMK on an Azure AI Search service in Bicep:

            ```bicep
            resource searchService 'Microsoft.Search/searchServices@2024-06-01-preview' = {
              name: 'example-search'
              location: resourceGroup().location
              sku: {
                name: 'standard'
              }
              properties: {
                encryptionWithCmk: {
                  enforcement: 'Enabled'
                }
              }
            }
            ```
    refs:
