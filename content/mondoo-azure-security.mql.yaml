  - uid: mondoo-azure-security-sql-tde-cmk-encryption
    title: Ensure SQL Server TDE uses customer-managed keys
    impact: 70
    variants:
      - uid: mondoo-azure-security-sql-tde-cmk-encryption-azure
        tags:
          mondoo.com/filter-title: Azure SQL Server
          mondoo.com/icon: azure
      - uid: mondoo-azure-security-sql-tde-cmk-encryption-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/icon: terraform
      - uid: mondoo-azure-security-sql-tde-cmk-encryption-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/icon: terraform
      - uid: mondoo-azure-security-sql-tde-cmk-encryption-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/icon: terraform
    docs:
      desc: |
        This check ensures that Azure SQL Server Transparent Data Encryption (TDE) uses customer-managed keys stored in Azure Key Vault, providing key lifecycle control for data-at-rest encryption.

        **Why this matters**

        - **Key lifecycle control**: Customer-managed keys allow organizations to control key rotation, revocation, and access policies for TDE encryption.
        - **Compliance alignment**: Many regulatory frameworks require customer-managed encryption keys for database encryption.
        - **Revocation capability**: With CMK, organizations can revoke access to encrypted databases by removing key access, providing a strong data protection mechanism.

        **Risk mitigation**

        - Configure TDE with customer-managed keys in Azure Key Vault.
        - Implement key rotation policies and monitor key access through Key Vault audit logs.
      remediation:
        - id: portal
          desc: |
            **Using Azure Portal**

            1. Navigate to **SQL servers** in the Azure Portal.
            2. Select the SQL server.
            3. Under **Security**, select **Transparent data encryption**.
            4. Select **Customer-managed key** as the encryption type.
            5. Configure the Key Vault and key.
            6. Select **Save**.
        - id: cli
          desc: |
            **Using Azure CLI**

            ```bash
            az sql server tde-key set --resource-group <ResourceGroupName> --server <ServerName> --server-key-type AzureKeyVault --kid <KeyVaultKeyId>
            ```
        - id: terraform
          desc: |
            **Using Terraform**

            ```hcl
            resource "azurerm_mssql_server_transparent_data_encryption" "example" {
              server_id        = azurerm_mssql_server.example.id
              key_vault_key_id = azurerm_key_vault_key.example.id
            }
            ```
        - id: bicep
          desc: |
            **Using Bicep**

            ```bicep
            resource sqlServerEncryption 'Microsoft.Sql/servers/encryptionProtector@2022-05-01-preview' = {
              parent: sqlServer
              name: 'current'
              properties: {
                serverKeyType: 'AzureKeyVault'
                serverKeyName: '${keyVaultName}_${keyName}_${keyVersion}'
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/azure-sql/database/transparent-data-encryption-byok-overview
        title: TDE with customer-managed keys for Azure SQL
  - uid: mondoo-azure-security-sql-tde-cmk-encryption-azure
    filters: |
      asset.platform == "azure-sql-server"
    mql: |
      azure.subscription.sql.server.encryptionProtectorServerKeyType == "AzureKeyVault"
  - uid: mondoo-azure-security-sql-tde-cmk-encryption-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "azurerm_mssql_server_transparent_data_encryption")
    mql: |
      terraform.resources.where(nameLabel == "azurerm_mssql_server_transparent_data_encryption").all(
        arguments['key_vault_key_id'] != empty
      )
  - uid: mondoo-azure-security-sql-tde-cmk-encryption-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "azurerm_mssql_server_transparent_data_encryption")
    mql: |
