  - uid: mondoo-azure-security-ensure-that-ssl-enabled-postgresql
    title: Ensure SSL connection enabled for PostgreSQL database servers
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    variants:
      - uid: mondoo-azure-security-ensure-that-ssl-enabled-postgresql-azure
        tags:
          mondoo.com/filter-title: Azure PostgreSQL Flexible Server
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-ensure-that-ssl-enabled-postgresql-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-ensure-that-ssl-enabled-postgresql-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-ensure-that-ssl-enabled-postgresql-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure Database for PostgreSQL Flexible Server is configured to enforce SSL/TLS for all incoming connections. By default, the `require_secure_transport` server parameter is set to `ON`, but it can be disabled, leaving connections unencrypted over the network.

        **Why this matters**

        - **Eavesdropping prevention:** Encrypted connections prevent network-level interception of query results and credentials traveling between application and database.
        - **Man-in-the-middle protection:** SSL/TLS certificate validation blocks session hijacking attacks that can redirect database traffic through an attacker-controlled proxy.
        - **Credential confidentiality:** Database passwords and token-based credentials transmitted over an unencrypted connection are visible to anyone with network access to the path.
        - **Data integrity:** TLS guarantees that query results arrive unmodified; without it, an on-path attacker can silently alter data returned from the database.

        **Risk mitigation**

        - **Network interception:** Enforcing SSL/TLS ensures all data in transit is encrypted, eliminating the ability of network observers to read or modify database sessions.
        - **Regulatory exposure:** Many frameworks require encrypted transport for data stores containing personal or sensitive information; disabling SSL/TLS immediately violates those controls.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Log in to Azure Portal at https://portal.azure.com.
        2. Navigate to `Azure Database for PostgreSQL server`.
        3. Select each database server to review its settings.
        4. Under `Connection security`, confirm that `Enforce SSL connection` is set to `ENABLED`. This setting should be consistent across all PostgreSQL database servers to ensure uniform security posture.

        **Automated Audit with Azure CLI:**

        To verify the SSL enforcement setting across all PostgreSQL servers in a resource group, you can use the Azure CLI. The expected output for compliant servers is `Enabled`:

        ```bash
        az postgres flexible-server list --resource-group <resourceGroupName> --query "[].{Name:name}" -o table
        ```

        This command provides a clear, tabulated output indicating which servers have SSL enforced and which do not, enabling quick identification of non-compliant resources.

        **Using PowerShell**

        PowerShell can also be used for a detailed audit. The command should return `Enabled` for each server checked:

        ```powershell
        Get-AzPostgreSqlServer -ResourceGroupName <ResourceGroupName> | Select-Object Name, SslEnforcement
        ```

        This command lists all PostgreSQL servers in the specified resource group along with their SSL enforcement status, providing a comprehensive overview.
      remediation:
        - id: portal
          desc: |
            To ensure SSL connection enabled for PostgreSQL database servers using the Azure Portal, enforce SSL connections:

            1. Access the Azure Portal at https://portal.azure.com.
            2. Navigate to `Azure Database for PostgreSQL server`.
            3. For each server, access `Connection security`.
            4. Locate the `SSL settings` and set `Enforce SSL connection` to `ENABLED`.
            5. Apply the changes to ensure that the setting is enforced across all servers.

            Consistency in enforcement is key. Verify that all PostgreSQL servers within your Azure environment have this setting enabled to maintain a high security standard.
        - id: cli
          desc: |
            To ensure SSL connection enabled for PostgreSQL database servers using the Azure CLI, for a batch update or to automate the enforcement across multiple servers, use the Azure CLI:

            ```bash
            az postgres flexible-server parameter set --resource-group <resourceGroupName> --server-name <serverName> --name require_secure_transport --value on
            ```

            Automate this process using scripts to iterate over all PostgreSQL servers in a subscription or resource group, ensuring no server is left without SSL enforcement.
        - id: powershell
          desc: |
            To ensure SSL connection enabled for PostgreSQL database servers using PowerShell, enforce SSL connections across all PostgreSQL servers in a resource group, you can use the following PowerShell script:

            ```powershell
            $servers = Get-AzPostgreSqlServer -ResourceGroupName <ResourceGroupName>
            foreach ($server in $servers) {
                Set-AzPostgreSqlServer -ResourceGroupName <ResourceGroupName> -ServerName $server.Name -SslEnforcement Enabled
            }
            ```

            This script iterates over all PostgreSQL servers in the specified resource group and sets SSL enforcement to `Enabled`. Regularly running such scripts can help maintain compliance over time, especially in dynamic environments where new servers are frequently deployed.
        - id: terraform
          desc: |
            To ensure SSL connection enabled for PostgreSQL database servers in Terraform, enforce SSL by setting `require_secure_transport` to `ON` on the flexible server:

            ```hcl
            resource "azurerm_postgresql_flexible_server" "example" {
              name                = "example-postgresql"
              resource_group_name = azurerm_resource_group.example.name
              location            = azurerm_resource_group.example.location
              version             = "16"

              administrator_login    = "psqladmin"
              administrator_password = var.db_admin_password

              storage_mb = 32768
              sku_name   = "B_Standard_B1ms"
            }

            resource "azurerm_postgresql_flexible_server_configuration" "require_secure_transport" {
              name      = "require_secure_transport"
              server_id = azurerm_postgresql_flexible_server.example.id
              value     = "ON"
            }
            ```

            Regularly review and update your Terraform configurations to ensure compliance with security best practices.
        - id: bicep
          desc: |
            To ensure SSL connection enabled for PostgreSQL database servers in Bicep:

            ```bicep
            resource postgresServer 'Microsoft.DBforPostgreSQL/flexibleServers@2024-08-01' = {
              name: 'example-postgresql'
              location: resourceGroup().location
              sku: {
                name: 'Standard_B1ms'
                tier: 'Burstable'
              }
              properties: {
                version: '16'
                administratorLogin: 'psqladmin'
                administratorLoginPassword: adminPassword
                storage: {
                  storageSizeGB: 32
                }
              }

              resource requireSecureTransport 'configurations@2024-08-01' = {
                name: 'require_secure_transport'
                properties: {
                  value: 'ON'
                  source: 'user-override'
                }
              }
            }
            ```
