  - uid: mondoo-azure-security-cosmosdb-cors-no-wildcard
    title: Ensure Azure Cosmos DB accounts do not allow wildcard CORS origins
    impact: 50
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-4
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-3-1
      compliance/vda-isa-5: vda-isa-5-4-2-1
    variants:
      - uid: mondoo-azure-security-cosmosdb-cors-no-wildcard-azure
        tags:
          mondoo.com/filter-title: Azure Cosmos DB Account
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-cosmosdb-cors-no-wildcard-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-cosmosdb-cors-no-wildcard-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-cosmosdb-cors-no-wildcard-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure Cosmos DB accounts do not have Cross-Origin Resource Sharing (CORS) configured with a wildcard origin (`*`), which permits any web page from any domain to make cross-origin requests to the Cosmos DB HTTP API. Wildcard CORS is the permissive default when CORS is enabled without specifying allowed origins.

        **Why this matters**

        - **Cross-site request forgery amplification:** A wildcard CORS policy allows malicious web pages to make authenticated requests to Cosmos DB on behalf of a logged-in user, potentially reading or modifying data without the user's knowledge.
        - **Credential exposure scope:** When any origin is allowed, a session token or API key embedded in browser requests can be leveraged from any compromised website the user visits.
        - **Principle of least privilege:** Allowing only specific, known origins ensures the Cosmos DB HTTP endpoint is reachable from browser contexts only where the application intentionally exposes it.
        - **Data access containment:** Restricting allowed origins limits cross-origin data access to the application's own domains, reducing the blast radius of a cross-site scripting vulnerability.

        **Risk mitigation**

        - **Cross-site data theft prevention:** Explicit origin allowlists ensure that data returned by the Cosmos DB HTTP API cannot be read by third-party web pages outside the approved origin set.
        - **Token hijacking limitation:** Even if a user's session token is captured by a malicious script, the CORS policy prevents that script from using it to query Cosmos DB from an unapproved origin.
        - **Attack surface reduction:** Narrowing the allowed origins eliminates the ability of arbitrary websites to initiate cross-origin requests against the Cosmos DB endpoint.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Azure Cosmos DB** in the Azure Portal.
        2. Select a Cosmos DB account and go to **Settings** > **CORS**.
        3. Verify that allowed origins do not include `*`.

        **Automated Audit with Azure CLI:**

        ```bash
        az cosmosdb show --name <CosmosDBAccountName> --resource-group <ResourceGroupName> --query "cors"
        ```
      remediation:
        - id: portal
          desc: |
            To ensure Azure Cosmos DB accounts do not allow wildcard CORS origins using the Azure Portal:

            1. Navigate to **Azure Cosmos DB** in the Azure Portal.
            2. Select the Cosmos DB account and go to **Settings** > **CORS**.
            3. Replace the wildcard `*` origin with specific, trusted domain origins.
            4. Select **Save**.
        - id: cli
          desc: |
            To ensure Azure Cosmos DB accounts do not allow wildcard CORS origins using the Azure CLI, update CORS allowed origins to specific domains instead of wildcard:

            ```bash
            az resource update --ids $(az cosmosdb show --name <CosmosDBAccountName> --resource-group <ResourceGroupName> --query id -o tsv) --set properties.cors='[{"allowedOrigins":"https://specific-domain.com"}]'
            ```
        - id: terraform
          desc: |
            To ensure Azure Cosmos DB accounts do not allow wildcard CORS origins in Terraform:

            ```hcl
            resource "azurerm_cosmosdb_account" "example" {
              name                = "example-cosmosdb"
              location            = azurerm_resource_group.example.location
              resource_group_name = azurerm_resource_group.example.name

              ...

              cors_rule {
                allowed_origins = ["https://example.com"]
                allowed_methods = ["GET", "POST"]
                allowed_headers = ["Content-Type", "Authorization"]
                exposed_headers = ["ETag"]
              }
            }
            ```
        - id: bicep
          desc: |
            To ensure Azure Cosmos DB accounts do not allow wildcard CORS origins in Bicep:

            ```bicep
            resource cosmosDbAccount 'Microsoft.DocumentDB/databaseAccounts@2024-05-15' = {
              name: 'example-cosmosdb'
              location: resourceGroup().location
              properties: {
                cors: [
                  {
                    allowedOrigins: 'https://example.com'
                    allowedMethods: 'GET,POST'
                    allowedHeaders: 'Content-Type,Authorization'
                    exposedHeaders: 'ETag'
                  }
                ]
                // ...
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/cosmos-db/nosql/how-to-configure-cross-origin-resource-sharing
        title: Configure Cross-Origin Resource Sharing in Azure Cosmos DB
  - uid: mondoo-azure-security-cosmosdb-cors-no-wildcard-azure
    filters: |
      asset.platform == "azure-cosmosdb"
    mql: |
      azure.subscription.cosmosDbService.account.properties["cors"] == null ||
      azure.subscription.cosmosDbService.account.properties["cors"].none(_["allowedOrigins"] == "*")
  - uid: mondoo-azure-security-cosmosdb-cors-no-wildcard-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "azurerm_cosmosdb_account")
    mql: |
      terraform.resources.where(nameLabel == "azurerm_cosmosdb_account").all(
        blocks.where(type == "cors_rule") == empty ||
        blocks.where(type == "cors_rule").all(arguments["allowed_origins"].none(_ == "*"))
      )
  - uid: mondoo-azure-security-cosmosdb-cors-no-wildcard-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "azurerm_cosmosdb_account")
    mql: |
      terraform.plan.resourceChanges.where(type == "azurerm_cosmosdb_account").all(
        change.after["cors_rule"] == empty ||
        change.after["cors_rule"].all(_["allowed_origins"].none(_ == "*"))
      )
  - uid: mondoo-azure-security-cosmosdb-cors-no-wildcard-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "azurerm_cosmosdb_account")
    mql: |
      terraform.state.resources.where(type == "azurerm_cosmosdb_account").all(
        values["cors_rule"] == empty ||
        values["cors_rule"].all(_["allowed_origins"].none(_ == "*"))
      )
  - uid: mondoo-azure-security-cosmosdb-continuous-backup
    title: Ensure Azure Cosmos DB accounts use continuous backup policy
    impact: 50
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-bcr-08
      compliance/dora: dora-art-12
      compliance/hipaa: hipaa-security-ss164-308-a-7-ii-a-contingency-plan-data-backup-plan
      compliance/iso-27001-2022: iso-27001-2022-a-8-13
      compliance/nis-2: nis-2-21-2-c
      compliance/nist-csf-1: nist-csf-1-pr-ip-4
      compliance/nist-csf-2: nist-csf-2-pr-ds-11
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cp-9
      compliance/nist-sp-800-171: false
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc9-1-1
      compliance/vda-isa-5: false
    variants:
      - uid: mondoo-azure-security-cosmosdb-continuous-backup-azure
        tags:
          mondoo.com/filter-title: Azure Cosmos DB Account
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-cosmosdb-continuous-backup-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-cosmosdb-continuous-backup-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-cosmosdb-continuous-backup-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure Cosmos DB accounts are configured with a continuous backup policy, enabling point-in-time restore to any second within the retention window. By default, Cosmos DB accounts use a periodic backup policy with discrete snapshot intervals, which limits restore granularity and leaves gaps between snapshots.

        **Why this matters**

        - **Fine-grained recovery points:** Continuous backup captures changes in near real time, allowing restoration to any specific second rather than being limited to the most recent periodic snapshot.
        - **Ransomware and destruction recovery:** An attacker who deletes or corrupts data can be recovered from by restoring to a point in time immediately before the destructive action, minimizing data loss.
        - **Tamper detection baseline:** Point-in-time restore enables comparison of historical and current database states, helping identify when subtle record modifications such as altered financial figures or access policies were introduced.
        - **Post-exfiltration integrity verification:** After an incident involving data theft, continuous backup provides a reliable baseline to confirm what data existed at specific points in time.

        **Risk mitigation**

        - **Data loss minimization:** Continuous backup reduces the recovery point objective to seconds rather than hours, limiting the maximum amount of data permanently lost in a destructive incident.
        - **Snapshot gap elimination:** Unlike periodic backups with fixed intervals, continuous backup leaves no window during which changes are unprotected, removing the possibility of losing data that falls between snapshots.
        - **Incident timeline reconstruction:** Granular restore points support forensic investigation by enabling recovery of intermediate database states for comparison during post-incident analysis.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Azure Cosmos DB** in the Azure Portal.
        2. Select a Cosmos DB account and go to **Settings** > **Backup & Restore**.
        3. Verify that the backup policy is set to **Continuous**.

        **Automated Audit with Azure CLI:**

        ```bash
        az cosmosdb show --name <CosmosDBAccountName> --resource-group <ResourceGroupName> --query "backupPolicy"
        ```
      remediation:
        - id: portal
          desc: |
            To ensure Azure Cosmos DB accounts use continuous backup policy using the Azure Portal:

            1. Navigate to **Azure Cosmos DB** in the Azure Portal.
            2. Select the account.
            3. Under **Backup & Restore** > **Backup policy**, select **Continuous**.
            4. Select **Save**.
        - id: cli
          desc: |
            To ensure Azure Cosmos DB accounts use continuous backup policy using the Azure CLI:

            ```bash
            az cosmosdb update --name <CosmosDBAccountName> --resource-group <ResourceGroupName> --backup-policy-type Continuous
            ```
        - id: terraform
          desc: |
            To ensure Azure Cosmos DB accounts use continuous backup policy in Terraform:

            ```hcl
            resource "azurerm_cosmosdb_account" "example" {
              name                = "example-cosmosdb"
              location            = azurerm_resource_group.example.location
              resource_group_name = azurerm_resource_group.example.name

              ...

              backup {
                type = "Continuous"
              }
            }
            ```
        - id: bicep
          desc: |
            To ensure Azure Cosmos DB accounts use continuous backup policy in Bicep:

            ```bicep
            resource cosmosDbAccount 'Microsoft.DocumentDB/databaseAccounts@2024-05-15' = {
              name: 'example-cosmosdb'
              location: resourceGroup().location
              properties: {
                backupPolicy: {
                  type: 'Continuous'
                }
                // ...
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/cosmos-db/continuous-backup-restore-introduction
        title: Continuous backup with point-in-time restore in Azure Cosmos DB
  - uid: mondoo-azure-security-cosmosdb-continuous-backup-azure
    filters: |
      asset.platform == "azure-cosmosdb"
    mql: |
      azure.subscription.cosmosDbService.account.properties["backupPolicy"]["type"] == "Continuous"
  - uid: mondoo-azure-security-cosmosdb-continuous-backup-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "azurerm_cosmosdb_account")
    mql: |
      terraform.resources.where(nameLabel == "azurerm_cosmosdb_account").all(
        blocks.where(type == "backup").all(arguments["type"] == "Continuous")
      )
  - uid: mondoo-azure-security-cosmosdb-continuous-backup-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "azurerm_cosmosdb_account")
    mql: |
