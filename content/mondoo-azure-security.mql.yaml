      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ds-6
      compliance/nist-csf-2: nist-csf-2-pr-ps-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-2
      compliance/pci-dss-4: pcidss-requirement-6-3-3
      compliance/soc2-2017: soc2-control-cc7-1-1
      compliance/vda-isa-5: vda-isa-5-5-2-3
    variants:
      - uid: mondoo-azure-security-acr-quarantine-policy-enabled-azure
        tags:
          mondoo.com/filter-title: Azure Container Registry
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-acr-quarantine-policy-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-acr-quarantine-policy-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-acr-quarantine-policy-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that the quarantine policy is enabled on Azure Container Registry instances. When enabled, newly pushed images are quarantined by default and are not available for pull until they have been validated and approved.

        **Why this matters**

        - Without quarantine, newly pushed images are immediately available for pull, even if they contain vulnerabilities or malicious content.
        - Quarantine enables a gating workflow where images must pass security scans, compliance checks, or manual review before becoming available.
        - This supports shift-left security practices by preventing vulnerable images from reaching deployment environments.

        **Risk mitigation**

        - **Image validation:** Ensures all images pass security gates before becoming available.
        - **Supply chain security:** Prevents unvalidated images from being deployed.
        - **Compliance:** Supports change management and approval workflows.
      audit: |
        ### Audit via Portal

        1. Navigate to **Container registries** in the Azure Portal.
        2. Select the container registry.
        3. Under **Settings**, select **Policies**.
        4. Review the **Quarantine policy** setting.

        A passing resource shows **Enabled**. A failing resource shows **Disabled**.

        ### Audit via CLI

        1. Run the following command, replacing `<RegistryName>` and `<ResourceGroupName>` with the target values:

        ```bash
        az acr show \
          --name <RegistryName> \
          --resource-group <ResourceGroupName> \
          --query "policies.quarantinePolicy.status" \
          --output tsv
        ```

        A passing resource returns `enabled`. A failing resource returns `disabled` or no value.
      remediation:
        - id: portal
          desc: |
            To enable the quarantine policy using the Azure Portal:

            1. Navigate to **Container registries** in the Azure Portal.
            2. Select the container registry (must be Premium SKU).
            3. Go to **Policies** under **Settings**.
            4. Set **Quarantine policy** to **Enabled**.
        - id: cli
          desc: |
            The quarantine policy is a preview feature without a dedicated CLI flag. Enable it on a Premium ACR by patching the resource directly:

            ```bash
            az resource update \
              --resource-type Microsoft.ContainerRegistry/registries \
              --name <RegistryName> \
              --resource-group <ResourceGroupName> \
              --set properties.policies.quarantinePolicy.status=enabled
            ```
        - id: terraform
          desc: |
            To enable the quarantine policy in Terraform:

            ```hcl
            resource "azurerm_container_registry" "example" {
              name                       = "exampleregistry"
              resource_group_name        = azurerm_resource_group.example.name
              location                   = azurerm_resource_group.example.location
              sku                        = "Premium"
              quarantine_policy_enabled  = true
            }
            ```
        - id: bicep
          desc: |
            To enable the quarantine policy in Bicep:

            ```bicep
            resource acr 'Microsoft.ContainerRegistry/registries@2023-07-01' = {
              name: 'exampleregistry'
              location: resourceGroup().location
              sku: {
                name: 'Premium'
              }
              properties: {
                policies: {
                  quarantinePolicy: {
                    status: 'enabled'
                  }
                }
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/container-registry/container-registry-quarantine
        title: Quarantine pattern for Azure Container Registry
  - uid: mondoo-azure-security-acr-quarantine-policy-enabled-azure
