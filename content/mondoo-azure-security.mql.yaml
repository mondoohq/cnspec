  - uid: mondoo-azure-security-storage-cmk-encryption
    title: Ensure storage accounts use customer-managed keys
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-azure-security-storage-cmk-encryption-azure
        tags:
          mondoo.com/filter-title: Azure Storage Account
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-storage-cmk-encryption-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-storage-cmk-encryption-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-storage-cmk-encryption-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure Storage accounts use customer-managed keys (CMK) for encryption, providing key lifecycle control beyond the default Microsoft-managed encryption.

        **Why this matters**

        - **Key lifecycle control**: Customer-managed keys allow organizations to control key rotation, revocation, and access policies.
        - **Compliance alignment**: Many regulatory frameworks require customer-managed encryption keys for sensitive data.
        - **Separation of duties**: CMK separates the encryption key management from the data storage, enabling independent audit and access control.

        **Risk mitigation**

        - Configure customer-managed keys in Azure Key Vault for storage account encryption.
        - Implement key rotation policies and access controls in Key Vault.
      audit: |
        ### Audit via Portal

        1. Navigate to **Storage accounts** in the Azure Portal.
        2. Select the storage account.
        3. Under **Security + networking**, select **Encryption**.
        4. Review the **Encryption type** field.

        A passing resource shows **Encryption type** set to **Customer-managed keys**. A failing resource shows **Microsoft-managed keys**.

        ### Audit via CLI

        1. Run the following command, substituting your resource group and storage account name:

        ```bash
        az storage account show --resource-group <ResourceGroupName> --name <StorageAccountName> --query "encryption.keySource" -o tsv
        ```

        A passing resource returns `Microsoft.Keyvault`. A failing resource returns `Microsoft.Storage`.
      remediation:
        - id: portal
          desc: |
            To ensure storage accounts use customer-managed keys using the Azure Portal:

            1. Navigate to **Storage accounts** in the Azure Portal.
            2. Select the storage account.
            3. Under **Security + networking**, select **Encryption**.
            4. Select **Customer-managed keys** as the encryption type.
            5. Configure the Key Vault and key.
            6. Select **Save**.
        - id: cli
          desc: |
            To ensure storage accounts use customer-managed keys using the Azure CLI:

            ```bash
            az storage account update --resource-group <ResourceGroupName> --name <StorageAccountName> --encryption-key-source Microsoft.Keyvault --encryption-key-vault <KeyVaultUri> --encryption-key-name <KeyName>
            ```
        - id: terraform
          desc: |
            To ensure storage accounts use customer-managed keys in Terraform:

            ```hcl
            resource "azurerm_storage_account" "example" {
              name                     = "examplestorage"
              resource_group_name      = azurerm_resource_group.example.name
              location                 = azurerm_resource_group.example.location
              account_tier             = "Standard"
              account_replication_type = "LRS"

              customer_managed_key {
                key_vault_key_id          = azurerm_key_vault_key.example.id
                user_assigned_identity_id = azurerm_user_assigned_identity.example.id
              }

              identity {
                type         = "UserAssigned"
                identity_ids = [azurerm_user_assigned_identity.example.id]
              }
            }
            ```
        - id: bicep
          desc: |
            To ensure storage accounts use customer-managed keys in Bicep:

            ```bicep
            resource storageAccount 'Microsoft.Storage/storageAccounts@2023-01-01' = {
              name: 'examplestorage'
              location: resourceGroup().location
              kind: 'StorageV2'
              sku: {
                name: 'Standard_LRS'
              }
              identity: {
                type: 'UserAssigned'
                userAssignedIdentities: {
                  '${managedIdentity.id}': {}
                }
              }
              properties: {
                encryption: {
                  keySource: 'Microsoft.Keyvault'
                  keyVaultProperties: {
                    keyVaultUri: keyVault.properties.vaultUri
                    keyName: keyVaultKey.name
                  }
                  identity: {
                    userAssignedIdentity: managedIdentity.id
                  }
                }
              }
            }
            ```
