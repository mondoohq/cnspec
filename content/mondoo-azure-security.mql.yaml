  - uid: mondoo-azure-security-ensure-disabled-public-access-sql
    title: Ensure SQL server public access is disabled or limited to selected networks
    impact: 80
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/soc2-2017: soc2-control-cc6-1-3
    variants:
      - uid: mondoo-azure-security-ensure-disabled-public-access-sql-azure
        tags:
          mondoo.com/filter-title: Azure SQL Server
          mondoo.com/icon: azure
      - uid: mondoo-azure-security-ensure-disabled-public-access-sql-terraform-hcl
