  - uid: mondoo-azure-security-nsg-sensitive-ports-restricted
    title: Ensure sensitive ports are not exposed to the entire network
    impact: 80
    variants:
      - uid: mondoo-azure-security-nsg-sensitive-ports-restricted-azure
        tags:
          mondoo.com/filter-title: Azure Network Security Group
          mondoo.com/icon: azure
      - uid: mondoo-azure-security-nsg-sensitive-ports-restricted-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/icon: terraform
      - uid: mondoo-azure-security-nsg-sensitive-ports-restricted-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/icon: terraform
      - uid: mondoo-azure-security-nsg-sensitive-ports-restricted-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/icon: terraform
    docs:
      desc: |
        This check ensures that network security groups do not expose sensitive management and database ports (Telnet/23, SMB/445, RPC/135, MSSQL/1433, MySQL/3306, PostgreSQL/5432) to the entire internet. These services are frequent targets for exploitation.

        **Why this matters**

        - **Direct exploitation:** Management protocols like Telnet transmit data in cleartext. Database ports exposed to the internet are prime targets for brute-force and injection attacks.
        - **Worm propagation:** Ports like SMB/445 are used by major worms and ransomware (WannaCry, NotPetya).
        - **Data breach:** Exposed database ports allow direct attacks against databases containing sensitive data.
      remediation:
        - id: portal
          desc: |
            **Using Azure Portal**

            1. Navigate to **Network security groups**.
            2. Review inbound rules that allow traffic from `*` or `Internet`.
            3. Restrict source addresses to specific IP ranges.
            4. Remove rules that expose sensitive ports to the internet.
        - id: cli
          desc: |
            **Using Azure CLI**

            List inbound rules that expose sensitive ports to the internet:

            ```bash
            az network nsg rule list --resource-group <ResourceGroupName> --nsg-name <NsgName> --query "[?direction=='Inbound' && access=='Allow' && sourceAddressPrefix=='*']"
            ```

            Delete rules that allow internet access to sensitive ports:

            ```bash
            az network nsg rule delete --resource-group <ResourceGroupName> --nsg-name <NsgName> --name <RuleName>
            ```

            Or restrict the source address to specific IP ranges:

            ```bash
            az network nsg rule update --resource-group <ResourceGroupName> --nsg-name <NsgName> --name <RuleName> --source-address-prefixes 10.0.0.0/8
            ```
        - id: bicep
          desc: |
            **Using Bicep**

            ```bicep
            resource nsg 'Microsoft.Network/networkSecurityGroups@2023-05-01' = {
              name: 'example-nsg'
              location: resourceGroup().location
              properties: {
                securityRules: [
                  {
                    name: 'DenyInternetSensitivePorts'
                    properties: {
                      priority: 100
                      direction: 'Inbound'
                      access: 'Deny'
                      protocol: '*'
                      sourcePortRange: '*'
                      destinationPortRanges: [
                        '23'
                        '135'
                        '445'
                        '1433'
                        '3306'
                        '5432'
                      ]
                      sourceAddressPrefix: 'Internet'
                      destinationAddressPrefix: '*'
                    }
                  }
                ]
              }
            }
            ```
        - id: terraform
          desc: |
            **Using Terraform**

            ```hcl
            resource "azurerm_network_security_rule" "deny_sensitive_ports" {
              name                        = "DenyInternetSensitivePorts"
              priority                    = 100
              direction                   = "Inbound"
              access                      = "Deny"
              protocol                    = "*"
              source_port_range           = "*"
              destination_port_ranges     = ["23", "135", "445", "1433", "3306", "5432"]
              source_address_prefix       = "Internet"
              destination_address_prefix  = "*"
              resource_group_name         = azurerm_resource_group.example.name
              network_security_group_name = azurerm_network_security_group.example.name
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/virtual-network/network-security-groups-overview
        title: Azure Documentation - Network security groups
  - uid: mondoo-azure-security-nsg-sensitive-ports-restricted-azure
    filters: |
      asset.platform == "azure-network-security-group"
    mql: |
      sensitivePortRules = azure.subscription.network.securityGroup.securityRules
        .where(
          properties.access == 'Allow'
            && direction == 'Inbound'
            && properties.sourceAddressPrefix == /\*|0\.0\.0\.0|<nw>\/0|\/0|internet|any/
        )
      sensitivePortRules.none(
        properties.destinationPortRange == "*" ||
        destinationPortRange.any(fromPort <= 23 && toPort >= 23) ||
        destinationPortRange.any(fromPort <= 445 && toPort >= 445) ||
        destinationPortRange.any(fromPort <= 135 && toPort >= 135) ||
        destinationPortRange.any(fromPort <= 1433 && toPort >= 1433) ||
        destinationPortRange.any(fromPort <= 3306 && toPort >= 3306) ||
        destinationPortRange.any(fromPort <= 5432 && toPort >= 5432)
      )
  - uid: mondoo-azure-security-nsg-sensitive-ports-restricted-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "azurerm_network_security_rule")
    mql: |
      terraform.resources.where(nameLabel == "azurerm_network_security_rule" && arguments['direction'] == "Inbound" && arguments['access'] == "Allow" && arguments['source_address_prefix'] == "*").none(
        arguments['destination_port_range'] == "*" ||
        arguments['destination_port_range'] == "23" ||
        arguments['destination_port_range'] == "135" ||
        arguments['destination_port_range'] == "445" ||
        arguments['destination_port_range'] == "1433" ||
        arguments['destination_port_range'] == "3306" ||
        arguments['destination_port_range'] == "5432"
      )
  - uid: mondoo-azure-security-nsg-sensitive-ports-restricted-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "azurerm_network_security_rule")
    mql: |
      terraform.plan.resourceChanges.where(type == "azurerm_network_security_rule" && change.after['direction'] == "Inbound" && change.after['access'] == "Allow" && change.after['source_address_prefix'] == "*").none(
        change.after['destination_port_range'] == "*" ||
        change.after['destination_port_range'] == "23" ||
        change.after['destination_port_range'] == "135" ||
        change.after['destination_port_range'] == "445" ||
        change.after['destination_port_range'] == "1433" ||
        change.after['destination_port_range'] == "3306" ||
        change.after['destination_port_range'] == "5432"
      )
  - uid: mondoo-azure-security-nsg-sensitive-ports-restricted-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "azurerm_network_security_rule")
    mql: |
      terraform.state.resources.where(type == "azurerm_network_security_rule" && values['direction'] == "Inbound" && values['access'] == "Allow" && values['source_address_prefix'] == "*").none(
        values['destination_port_range'] == "*" ||
        values['destination_port_range'] == "23" ||
        values['destination_port_range'] == "135" ||
        values['destination_port_range'] == "445" ||
        values['destination_port_range'] == "1433" ||
        values['destination_port_range'] == "3306" ||
        values['destination_port_range'] == "5432"
      )
  - uid: mondoo-azure-security-compute-vm-password-auth-disabled
    title: Ensure password authentication is disabled on Linux VMs
    impact: 70
    variants:
      - uid: mondoo-azure-security-compute-vm-password-auth-disabled-azure
        tags:
          mondoo.com/filter-title: Azure Compute VM
          mondoo.com/icon: azure
      - uid: mondoo-azure-security-compute-vm-password-auth-disabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/icon: terraform
      - uid: mondoo-azure-security-compute-vm-password-auth-disabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/icon: terraform
      - uid: mondoo-azure-security-compute-vm-password-auth-disabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/icon: terraform
    docs:
      desc: |
        This check ensures that Azure Linux virtual machines have password authentication disabled in favor of SSH key-based authentication. Password authentication is vulnerable to brute-force attacks, credential stuffing, and password spraying.

        **Why this matters**

        - **Brute-force attacks:** Password-based SSH is a primary target for automated attacks.
        - **Credential reuse:** Users may reuse passwords across systems, amplifying the impact of a compromise.
        - **Non-repudiation:** SSH keys provide stronger identity verification than passwords.
      remediation:
        - id: cli
          desc: |
            **Using Azure CLI**

            Deploy VMs with SSH key authentication only:

            ```bash
            az vm create \
              --name myVM \
              --resource-group myResourceGroup \
              --image Ubuntu2204 \
              --authentication-type ssh \
              --ssh-key-values ~/.ssh/id_rsa.pub
            ```
        - id: bicep
          desc: |
            **Using Bicep**

            ```bicep
            resource linuxVM 'Microsoft.Compute/virtualMachines@2023-07-01' = {
              name: 'example-vm'
              location: resourceGroup().location
              properties: {
                osProfile: {
                  computerName: 'example-vm'
                  adminUsername: 'azureuser'
                  linuxConfiguration: {
                    disablePasswordAuthentication: true
                    ssh: {
                      publicKeys: [
                        {
                          path: '/home/azureuser/.ssh/authorized_keys'
                          keyData: sshPublicKey
                        }
                      ]
                    }
                  }
                }
                // ...
              }
            }
            ```
        - id: terraform
          desc: |
            **Using Terraform**

            ```hcl
            resource "azurerm_linux_virtual_machine" "example" {
              name                            = "example-vm"
              resource_group_name             = azurerm_resource_group.example.name
              location                        = azurerm_resource_group.example.location
              size                            = "Standard_B2s"
              admin_username                  = "azureuser"
              disable_password_authentication = true

              admin_ssh_key {
                username   = "azureuser"
                public_key = file("~/.ssh/id_rsa.pub")
              }

              # ... other required blocks
            }
            ```
        - id: portal
          desc: |
            **Using Azure Portal**

            1. Navigate to **Virtual machines**.
            2. When creating a new Linux VM, select **SSH public key** as the authentication type.
            3. For existing VMs, password authentication can be disabled by configuring the OS directly or redeploying with SSH-only authentication.
    refs:
      - url: https://learn.microsoft.com/en-us/azure/virtual-machines/linux/mac-create-ssh-keys
        title: Azure Documentation - Create and use SSH keys for Linux VMs
  - uid: mondoo-azure-security-compute-vm-password-auth-disabled-azure
    filters: |
      asset.platform == "azure-compute-vm-api"
    mql: |
      if (azure.subscription.compute.vm.properties['storageProfile']['osDisk']['osType'] != "Linux") {
        return true
      }
      azure.subscription.compute.vm.properties['osProfile']['linuxConfiguration']['disablePasswordAuthentication'] == true
  - uid: mondoo-azure-security-compute-vm-password-auth-disabled-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "azurerm_linux_virtual_machine")
    mql: |
      terraform.resources.where(nameLabel == "azurerm_linux_virtual_machine").all(
        arguments['disable_password_authentication'] == true
      )
  - uid: mondoo-azure-security-compute-vm-password-auth-disabled-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "azurerm_linux_virtual_machine")
    mql: |
      terraform.plan.resourceChanges.where(type == "azurerm_linux_virtual_machine").all(
        change.after['disable_password_authentication'] == true
      )
  - uid: mondoo-azure-security-compute-vm-password-auth-disabled-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "azurerm_linux_virtual_machine")
    mql: |
      terraform.state.resources.where(type == "azurerm_linux_virtual_machine").all(
        values['disable_password_authentication'] == true
      )
  - uid: mondoo-azure-security-postgresql-log-connections-enabled
    title: Ensure PostgreSQL 'log_connections' is enabled
    impact: 60
    variants:
      - uid: mondoo-azure-security-postgresql-log-connections-enabled-azure
        tags:
          mondoo.com/filter-title: Azure PostgreSQL Flexible Server
          mondoo.com/icon: azure
      - uid: mondoo-azure-security-postgresql-log-connections-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/icon: terraform
      - uid: mondoo-azure-security-postgresql-log-connections-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/icon: terraform
      - uid: mondoo-azure-security-postgresql-log-connections-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/icon: terraform
    docs:
      desc: |
        This check ensures that the `log_connections` server parameter is set to `ON` for Azure Database for PostgreSQL. When enabled, each attempted connection to the server is logged, including successful and failed authentication attempts.

        **Why this matters**

        - **Security monitoring:** Connection logs enable detection of unauthorized access attempts, brute-force attacks, and anomalous connection patterns.
        - **Forensics:** During incident response, connection logs help establish who accessed the database and when.
        - **Compliance:** CIS Azure Foundations Benchmark and many regulatory frameworks require connection logging.
      remediation:
        - id: cli
          desc: |
            **Using Azure CLI**

            ```bash
            az postgres flexible-server parameter set \
              --resource-group <rg> --server-name <server> \
              --name log_connections --value on
            ```
        - id: bicep
          desc: |
            **Using Bicep**

            ```bicep
            resource logConnectionsConfig 'Microsoft.DBforPostgreSQL/flexibleServers/configurations@2022-12-01' = {
              parent: postgresServer
              name: 'log_connections'
              properties: {
                value: 'on'
                source: 'user-override'
              }
            }
            ```
        - id: terraform
          desc: |
            **Using Terraform**

            ```hcl
            resource "azurerm_postgresql_flexible_server_configuration" "log_connections" {
              name      = "log_connections"
              server_id = azurerm_postgresql_flexible_server.example.id
              value     = "on"
            }
            ```
        - id: portal
          desc: |
            **Using Azure Portal**

            1. Navigate to **Azure Database for PostgreSQL flexible servers**.
            2. Select the server instance.
            3. Go to **Server parameters** under **Settings**.
            4. Search for `log_connections`.
            5. Set the value to **ON**.
            6. Select **Save**.
    refs:
      - url: https://learn.microsoft.com/en-us/azure/postgresql/flexible-server/how-to-configure-server-parameters-using-cli
        title: Azure Documentation - Configure PostgreSQL server parameters
  - uid: mondoo-azure-security-postgresql-log-connections-enabled-azure
    filters: |
      asset.platform == "azure-postgresql-flexible-server"
    mql: |
      azure.subscription.postgreSql.flexibleServer.configuration.where(name == 'log_connections').all(value.downcase == "on")
  - uid: mondoo-azure-security-postgresql-log-connections-enabled-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "azurerm_postgresql_flexible_server_configuration")
