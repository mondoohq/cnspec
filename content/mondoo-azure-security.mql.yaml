    mql: |
      azure.subscription.networkService.applicationGateway.properties["frontendIPConfigurations"].any(
        _["properties"]["subnet"] != null
      )
  - uid: mondoo-azure-security-application-gateway-no-public-frontend-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "azurerm_application_gateway")
    mql: |
      terraform.resources.where(nameLabel == "azurerm_application_gateway").all(
        blocks.where(type == "frontend_ip_configuration").any(
          arguments['subnet_id'] != null
        )
      )
  - uid: mondoo-azure-security-application-gateway-no-public-frontend-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "azurerm_application_gateway")
    mql: |
      terraform.plan.resourceChanges.where(type == "azurerm_application_gateway").all(
        change.after['frontend_ip_configuration'] != null &&
        change.after['frontend_ip_configuration'].any(
          _['subnet_id'] != null
        )
      )
  - uid: mondoo-azure-security-application-gateway-no-public-frontend-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "azurerm_application_gateway")
    mql: |
