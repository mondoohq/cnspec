  - uid: mondoo-azure-security-trusted-microsoft-services-enabled-for-storage-account-access
    title: Ensure "Trusted Microsoft Services" have access to Azure storage accounts
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-1-7
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-azure-security-trusted-microsoft-services-enabled-for-storage-account-access-azure
        tags:
          mondoo.com/filter-title: Azure Storage Account
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-trusted-microsoft-services-enabled-for-storage-account-access-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-trusted-microsoft-services-enabled-for-storage-account-access-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-trusted-microsoft-services-enabled-for-storage-account-access-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure storage accounts are configured to allow the trusted Microsoft services bypass, permitting first-party Azure services to access storage even when network rules would otherwise block them. By default, strict network deny rules block all traffic including traffic from Azure services such as Azure Defender, Azure Monitor, and Azure Backup.

        **Why this matters**

        - **Threat detection continuity**: Azure Defender for Storage requires access to storage account data and metadata to scan for malware uploads and detect anomalous access patterns; blocking trusted services disables this protection silently.
        - **Audit log ingestion**: Azure Monitor and Log Analytics collect diagnostic logs from storage accounts; when blocked, the audit trail for storage operations is destroyed, eliminating forensic evidence of attacker activity.
        - **Backup and recovery**: Azure Backup and Site Recovery must reach the storage account to create and restore recovery points; blocking trusted services leaves no recovery path if ransomware encrypts or deletes blobs.
        - **Operational dependencies**: Azure services such as Azure Import/Export, Azure Machine Learning, and Azure Event Grid use storage accounts as part of their pipeline; blocking trusted service access breaks these workflows without warning.

        **Risk mitigation**

        - **Security service continuity**: Enabling the bypass ensures that monitoring and protection services remain active even when strict network deny rules are applied, preventing gaps in threat detection coverage.
        - **Recovery capability preservation**: Azure Backup can maintain recovery points for storage data, providing a clean restore target if data is destroyed or encrypted by an attacker.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Storage Accounts** in the Azure Portal.
        2. Select a specific storage account.
        3. Go to the **Networking** blade.
        4. Under the **Firewalls and virtual networks** section, check if the option **Allow Azure services on the trusted services list to access this storage account** is enabled.

        **Automated Audit with Azure CLI:**

        List the network rules for all storage accounts and verify that AzureServices is included in the bypass list:

        ```bash
        az storage account list --query "[*].{AccountName:name, BypassRules:networkRuleSet.bypass}" -o table
        ```
      remediation:
        - id: portal
          desc: |
            To ensure "Trusted Microsoft Services" have access to Azure storage accounts using the Azure Portal:

            1. Navigate to **Storage Accounts** in the Azure Portal.
            2. Select the storage account you want to configure.
            3. Go to the **Networking** blade.
            4. Under the **Firewalls and virtual networks** section, check the box for **Allow Azure services on the trusted services list to access this storage account**.
            5. Save your changes.
        - id: cli
          desc: |
            To ensure "Trusted Microsoft Services" have access to Azure storage accounts using the Azure CLI, enable trusted Microsoft services for a storage account:

            ```bash
            az storage account update --name <StorageAccountName> --resource-group <ResourceGroupName> --bypass AzureServices
            ```
        - id: powershell
          desc: |
            To ensure "Trusted Microsoft Services" have access to Azure storage accounts using PowerShell:

            ```powershell
            Set-AzStorageAccount -Name <StorageAccountName> -ResourceGroupName <ResourceGroupName> -NetworkRuleSetBypass AzureServices
            ```
        - id: terraform
          desc: |
            To ensure "Trusted Microsoft Services" have access to Azure storage accounts in Terraform:

            ```hcl
            resource "azurerm_storage_account" "example" {
                ...
              network_rules {
                ...
                bypass = ["AzureServices"]
                ...
              }
            }
            ```
        - id: bicep
          desc: |
            To ensure "Trusted Microsoft Services" have access to Azure storage accounts in Bicep:

            ```bicep
            resource storageAccount 'Microsoft.Storage/storageAccounts@2023-05-01' = {
              name: 'examplestorageaccount'
              location: resourceGroup().location
              kind: 'StorageV2'
              sku: {
                name: 'Standard_LRS'
              }
              properties: {
                networkAcls: {
                  bypass: 'AzureServices'
                  defaultAction: 'Deny'
                }
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/storage/common/storage-security-guide
        title: Azure Storage Security Guide
