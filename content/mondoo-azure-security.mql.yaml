      )
  # No Terraform variants: azurerm_recovery_services_vault does not expose the
  # securitySettings.enhancedSecurityState property. Enhanced security is controlled via the
  # ARM API or Azure Portal and has no equivalent argument on the Terraform resource.
  # No Terraform remediation: same reason — there is no HCL argument to set enhanced security state on this resource.
  - uid: mondoo-azure-security-recovery-vault-enhanced-security
    title: Ensure Recovery Services Vaults have enhanced security
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-bcr-08
      compliance/dora: dora-art-12
      compliance/hipaa: hipaa-security-ss164-308-a-7-ii-a-contingency-plan-data-backup-plan
      compliance/iso-27001-2022: iso-27001-2022-a-8-13
      compliance/nis-2: nis-2-21-2-c
      compliance/nist-csf-1: nist-csf-1-pr-ip-4
      compliance/nist-csf-2: nist-csf-2-pr-ds-11
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cp-9
      compliance/nist-sp-800-171: nist-sp-800-171--3-8-9
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc9-1-1
      compliance/vda-isa-5: false
    variants:
      - uid: mondoo-azure-security-recovery-vault-enhanced-security-azure
        tags:
          mondoo.com/filter-title: Azure Recovery Services Vault
          mondoo.com/filter-icon: azure
    docs:
      desc: |
        This check ensures that Azure Recovery Services Vaults have enhanced security enabled. Enhanced security provides additional protections including multi-user authorization for critical operations, PIN-based verification, and additional checks before destructive actions.

        **Why this matters**

        - Without enhanced security, a single compromised administrator account can delete backup data without additional verification.
        - Enhanced security adds layers of protection such as requiring a security PIN for destructive operations and retaining deleted backup data.
        - This is a recommended best practice for all production backup vaults.

        **Risk mitigation**

        - **Multi-user authorization:** Critical operations require additional verification.
        - **PIN verification:** Destructive operations require a security PIN sent to the vault administrator.
        - **Additional retention:** Deleted backup data is retained for additional protection.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Recovery Services vaults** in the Azure Portal.
        2. Select a vault.
        3. Go to **Properties** under **Settings**.
        4. Under **Security settings**, verify that **Enhanced security** is enabled.
      remediation:
        - id: portal
          desc: |
            To enable enhanced security using the Azure Portal:

            1. Navigate to **Recovery Services vaults** in the Azure Portal.
            2. Select the vault.
            3. Go to **Properties** under **Settings**.
            4. Under **Security settings**, select **Update**.
            5. Enable **Enhanced security**.
            6. Save the changes.
        - id: cli
          desc: |
            Enable the vault's hybrid backup security features, sometimes referred to as enhanced security settings, using the Azure CLI:

            ```bash
            az backup vault backup-properties set \
              --name <VaultName> \
              --resource-group <ResourceGroupName> \
              --hybrid-backup-security-features Enable
            ```
        - id: bicep
          desc: |
            To enable enhanced security in Bicep:

            ```bicep
            resource vault 'Microsoft.RecoveryServices/vaults@2024-04-01' = {
              name: 'example-vault'
              location: resourceGroup().location
              sku: {
                name: 'RS0'
                tier: 'Standard'
              }
              properties: {
                securitySettings: {
                  softDeleteSettings: {
                    enhancedSecurityState: 'Enabled'
                  }
                }
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/backup/backup-azure-enhanced-security
        title: Security features for protecting Azure Backup
