  - uid: mondoo-azure-security-compute-vm-no-public-ip
    title: Ensure virtual machines do not have public IP addresses directly attached
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-azure-security-compute-vm-no-public-ip-azure
        tags:
          mondoo.com/filter-title: Azure Virtual Machine
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-compute-vm-no-public-ip-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-compute-vm-no-public-ip-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-compute-vm-no-public-ip-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure virtual machines do not have public IP addresses directly attached to their network interfaces. Directly attaching a public IP makes the VM reachable from any source on the internet, exposing all listening services to port scanning, brute-force attacks, and exploitation of unpatched vulnerabilities.

        **Why this matters**

        - **Reduced attack surface:** A VM with a public IP is reachable by any attacker on the internet without first traversing a firewall or other inspection layer, dramatically expanding the exploitable target area.
        - **Defense in depth:** Routing external traffic through Azure Firewall, Azure Bastion, or a load balancer adds protocol inspection, rate limiting, and centralized logging that a direct public IP bypasses entirely.
        - **Network segmentation enforcement:** Removing public IPs ensures all access to VMs must pass through controlled ingress points, making network architecture reflect intended access patterns.
        - **Credential brute-force reduction:** Without a public IP, remote management ports such as SSH and RDP are not directly reachable from the internet, preventing automated credential spray and brute-force attempts.

        **Risk mitigation**

        - **Internet-borne exploitation prevention:** Removing the public IP eliminates the direct internet-to-VM path, requiring attackers to first compromise another system or a network entry point before reaching the VM.
        - **Lateral movement barriers:** VMs without public IPs can only be reached through internal paths, making it harder for external attackers to pivot directly to specific compute resources.
        - **Log centralization:** Routing traffic through managed ingress services ensures all connection attempts are logged in a single location, improving detection and forensic capability.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Virtual machines** in the Azure Portal.
        2. Select a virtual machine and access **Networking** under the Settings menu.
        3. Review the network interface configurations and verify that no public IP addresses are directly attached.

        **Automated Audit with Azure CLI:**

        List all VMs and their public IP addresses:

        ```bash
        az vm list-ip-addresses --query "[].{VMName:virtualMachine.name, PublicIPs:virtualMachine.network.publicIpAddresses[].ipAddress}" -o table
        ```

        **Automated Audit with PowerShell:**

        ```powershell
        Get-AzVM | ForEach-Object { $vm = $_; $nics = Get-AzNetworkInterface -ResourceId $vm.NetworkProfile.NetworkInterfaces.Id; $nics | ForEach-Object { $_.IpConfigurations | Where-Object { $_.PublicIpAddress } } } | Select-Object Name, PublicIpAddress
        ```

        Ensure no VMs have public IP addresses directly attached.
      remediation:
        - id: portal
          desc: |
            To ensure virtual machines do not have public IP addresses directly attached using the Azure Portal:

            1. Navigate to **Virtual machines** in the Azure Portal.
            2. Select the virtual machine with a public IP address.
            3. Go to **Networking** under the Settings menu.
            4. Select the network interface and then select the IP configuration.
            5. Under **Public IP address**, select **Disassociate**.
            6. Save the changes.
            7. Consider using Azure Bastion, a load balancer, or Azure Firewall for secure access.
        - id: cli
          desc: |
            To ensure virtual machines do not have public IP addresses directly attached using the Azure CLI, disassociate a public IP from a VM's network interface:

            ```bash
            az network nic ip-config update --resource-group <ResourceGroupName> --nic-name <NICName> --name <IPConfigName> --remove PublicIpAddress
            ```
        - id: powershell
          desc: |
            To ensure virtual machines do not have public IP addresses directly attached using PowerShell:

            ```powershell
            $nic = Get-AzNetworkInterface -ResourceGroupName <ResourceGroupName> -Name <NICName>
            $nic.IpConfigurations[0].PublicIpAddress = $null
            Set-AzNetworkInterface -NetworkInterface $nic
            ```
        - id: terraform
          desc: |
            To ensure virtual machines do not have public IP addresses directly attached in Terraform, ensure the network interface does not include a public IP address:

            ```hcl
            resource "azurerm_network_interface" "example" {
              name                = "example-nic"
              location            = azurerm_resource_group.example.location
              resource_group_name = azurerm_resource_group.example.name

              ip_configuration {
                name                          = "internal"
                subnet_id                     = azurerm_subnet.example.id
                private_ip_address_allocation = "Dynamic"
                # Do not include public_ip_address_id
              }
            }
            ```
        - id: bicep
          desc: |
            To ensure virtual machines do not have public IP addresses directly attached in Bicep, create a NIC without a public IP address:

            ```bicep
            resource nic 'Microsoft.Network/networkInterfaces@2024-05-01' = {
              name: 'example-nic'
              location: resourceGroup().location
              properties: {
                ipConfigurations: [
                  {
                    name: 'internal'
                    properties: {
                      subnet: {
                        id: subnet.id
                      }
                      privateIPAllocationMethod: 'Dynamic'
                      // Do not include publicIPAddress
                    }
                  }
                ]
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/virtual-machines/ip-services/associate-public-ip-address-vm
        title: Associate a public IP address to a virtual machine
