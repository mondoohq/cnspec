      asset.platform == "azure-cosmosdb"
    mql: |
      azure.subscription.cosmosDbService.account.disableKeyBasedMetadataWriteAccess == true
  - uid: mondoo-azure-security-cosmosdb-key-based-metadata-write-disabled-terraform-hcl
