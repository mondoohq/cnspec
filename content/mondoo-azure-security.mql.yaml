      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-azure-security-app-service-ip-restrictions-default-deny-azure
        tags:
          mondoo.com/filter-title: Azure App Service
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-app-service-ip-restrictions-default-deny-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-app-service-ip-restrictions-default-deny-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-app-service-ip-restrictions-default-deny-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure App Service instances have IP restriction default action set to deny, blocking traffic from any IP address that is not explicitly allowed.

        **Why this matters**

        - **Zero-trust access**: A default-allow posture permits any IP address to reach the application unless explicitly blocked, which is inherently insecure.
        - **Allowlist approach**: Default-deny requires explicit allowlist rules for authorized IP ranges, following the principle of least privilege.
        - **Defense in depth**: IP restrictions complement authentication and authorization controls, providing network-level access control.

        **Risk mitigation**

        - Set the IP security restrictions default action to `Deny` on all App Service instances.
        - Create explicit allow rules only for trusted IP ranges that need access.
      audit: |
        ### Audit via Portal

        1. Navigate to **App Services** in the Azure Portal.
        2. Select the App Service instance.
        3. Under **Settings**, select **Networking**.
        4. Select **Access restriction**.
        5. Review the **Unmatched rule action** setting.

        A passing resource shows **Unmatched rule action** set to **Deny**. A failing resource shows it set to **Allow**.

        ### Audit via CLI

        1. Run the following command, substituting your resource group and app name:

        ```bash
        az webapp config access-restriction show --resource-group <ResourceGroupName> --name <AppName> --query "ipSecurityRestrictionsDefaultAction" -o tsv
        ```

        A passing resource returns `Deny`. A failing resource returns `Allow` or an empty value.
      remediation:
        - id: portal
          desc: |
            To ensure App Service IP restrictions default to deny using the Azure Portal:

            1. Navigate to **App Services** in the Azure Portal.
            2. Select the App Service instance.
            3. Go to **Networking** > **Access restriction**.
            4. Set **Unmatched rule action** to **Deny**.
            5. Add allow rules for trusted IP ranges.
            6. Select **Save**.
        - id: cli
          desc: |
            To ensure App Service IP restrictions default to deny using the Azure CLI:

            ```bash
            az webapp config access-restriction set --resource-group <ResourceGroupName> --name <AppName> --default-action Deny
            ```
        - id: terraform
          desc: |
            To ensure App Service IP restrictions default to deny in Terraform:

            ```hcl
            resource "azurerm_linux_web_app" "example" {
              name                = "example-webapp"
              resource_group_name = azurerm_resource_group.example.name
              location            = azurerm_resource_group.example.location
              service_plan_id     = azurerm_service_plan.example.id

              site_config {
                ip_restriction_default_action = "Deny"
              }
            }
            ```
        - id: bicep
          desc: |
            To ensure App Service IP restrictions default to deny in Bicep:

            ```bicep
            resource webAppConfig 'Microsoft.Web/sites/config@2023-01-01' = {
              parent: webApp
              name: 'web'
              properties: {
                ipSecurityRestrictionsDefaultAction: 'Deny'
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/app-service/app-service-ip-restrictions
        title: Azure App Service access restrictions
  - uid: mondoo-azure-security-app-service-ip-restrictions-default-deny-terraform-hcl
