  - uid: mondoo-azure-security-function-app-private-endpoints
    title: Ensure Azure Function apps use private endpoints
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-azure-security-function-app-private-endpoints-azure
        tags:
          mondoo.com/filter-title: Azure Function App
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-function-app-private-endpoints-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-function-app-private-endpoints-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-function-app-private-endpoints-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure Function apps are configured with private endpoints, restricting network access to only traffic from within the virtual network. By default, Function apps accept connections from the public internet, which exposes them to opportunistic scanning and exploitation attempts.

        **Why this matters**

        - **Network isolation:** Private endpoints ensure that the Function app is only accessible from within a virtual network, removing exposure to the public internet.
        - **Data exfiltration prevention:** Restricting network access to private endpoints prevents data from being routed to unauthorized destinations outside the virtual network.
        - **Reduced attack surface:** Removing public internet access eliminates a broad class of attacks including port scanning, DDoS, and opportunistic exploitation of vulnerable function endpoints.
        - **Consistent network controls:** All inbound traffic traverses the same network security controls applied to other internal resources, enabling uniform inspection and logging.

        **Risk mitigation**

        - **Credential exposure impact:** Even if function credentials are leaked, private endpoint access ensures an attacker must first gain access to the virtual network before invoking functions.
        - **Reconnaissance prevention:** Removing the public endpoint stops attackers from probing function metadata, enumerating endpoints, or fingerprinting deployed code.
        - **Compliant data handling:** Keeping function traffic within the virtual network boundary makes it easier to satisfy network segmentation requirements for sensitive workloads.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Function Apps** in the Azure Portal.
        2. Select a function app.
        3. Go to **Networking** under **Settings**.
        4. Under **Inbound traffic**, verify that **Private endpoints** are configured.

        **Automated Audit with Azure CLI:**

        ```bash
        az functionapp show --resource-group-name <ResourceGroupName> --name <FunctionAppName> --query "privateEndpointConnections"
        ```
      remediation:
        - id: portal
          desc: |
            To ensure Azure Function apps use private endpoints using the Azure Portal:

            1. Navigate to **Function Apps** in the Azure Portal.
            2. Select the function app.
            3. Go to **Networking** under **Settings**.
            4. Under **Inbound traffic**, select **Private endpoints**.
            5. Select **Add** to create a new private endpoint.
            6. Configure the virtual network, subnet, and DNS settings.
            7. Select **OK**.
        - id: cli
          desc: |
            To ensure Azure Function apps use private endpoints using the Azure CLI:

            ```bash
            az network private-endpoint create --resource-group <ResourceGroupName> --name <PrivateEndpointName> --vnet-name <VNetName> --subnet <SubnetName> --private-connection-resource-id <FunctionAppResourceId> --group-id sites --connection-name <ConnectionName>
            ```
        - id: terraform
          desc: |
            To ensure Azure Function apps use private endpoints in Terraform:

            ```hcl
            resource "azurerm_private_endpoint" "example" {
              name                = "example-pe"
              location            = azurerm_resource_group.example.location
              resource_group_name = azurerm_resource_group.example.name
              subnet_id           = azurerm_subnet.example.id

              private_service_connection {
                name                           = "example-connection"
                private_connection_resource_id = azurerm_linux_function_app.example.id
                subresource_names              = ["sites"]
                is_manual_connection           = false
              }
            }
            ```
        - id: bicep
          desc: |
            To ensure Azure Function apps use private endpoints in Bicep:

            ```bicep
            resource privateEndpoint 'Microsoft.Network/privateEndpoints@2024-05-01' = {
              name: 'example-func-pe'
              location: resourceGroup().location
              properties: {
                subnet: {
                  id: subnet.id
                }
                privateLinkServiceConnections: [
                  {
                    name: 'func-psc'
                    properties: {
                      privateLinkServiceId: functionApp.id
                      groupIds: [
                        'sites'
                      ]
                    }
                  }
                ]
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/app-service/networking/private-endpoint
        title: Using private endpoints for Azure App Service
