            resource connectionThrottleConfig 'Microsoft.DBforPostgreSQL/flexibleServers/configurations@2022-12-01' = {
              parent: postgresServer
              name: 'connection_throttle.enable'
              properties: {
                value: 'on'
                source: 'user-override'
              }
            }
