          mondoo.com/icon: terraform
    docs:
      desc: |
        This check ensures that Azure Data Factory instances have public network access disabled.

        **Why this matters**

        - **Reduced attack surface**: Disabling public network access prevents Data Factory from being reachable over the public internet, limiting exposure to unauthorized access attempts.
        - **Data exfiltration prevention**: Data Factory orchestrates data movement across diverse sources. Restricting network access helps prevent unauthorized data exfiltration through the service endpoint.

        **Risk mitigation**

        - Configure private endpoints to allow secure connectivity from approved virtual networks only.
        - Use Azure Private Link to ensure all traffic between your network and Data Factory traverses the Microsoft backbone network.
      remediation:
        - id: portal
          desc: |
            **Using Azure Portal**

            1. Navigate to the [Azure Portal](https://portal.azure.com).
            2. Go to **Data factories** and select the target Data Factory instance.
            3. Under **Settings**, select **Networking**.
            4. Under **Public network access**, select **Disabled**.
            5. Click **Save**.
        - id: cli
          desc: |
            **Using Azure CLI**

            ```bash
            az datafactory update \
              --resource-group <resource-group-name> \
              --factory-name <data-factory-name> \
              --public-network-access "Disabled"
            ```
        - id: terraform
          desc: |
            **Using Terraform**

            ```hcl
            resource "azurerm_data_factory" "example" {
              name                = "example-data-factory"
              location            = azurerm_resource_group.example.location
              resource_group_name = azurerm_resource_group.example.name

              public_network_enabled = false
            }
            ```
        - id: bicep
          desc: |
            **Using Bicep**

            ```bicep
            resource dataFactory 'Microsoft.DataFactory/factories@2018-06-01' = {
              name: 'example-data-factory'
              location: resourceGroup().location
              properties: {
                publicNetworkAccess: 'Disabled'
              }
            }
            ```
