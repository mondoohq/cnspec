    variants:
      - uid: mondoo-azure-security-application-gateway-no-public-frontend-azure
        tags:
          mondoo.com/filter-title: Azure Application Gateway
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-application-gateway-no-public-frontend-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-application-gateway-no-public-frontend-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-application-gateway-no-public-frontend-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure Application Gateways are configured to have at least one private frontend IP configuration attached to a subnet. Gateways with only public frontend configurations expose all listeners to the internet, including those intended to serve only internal or peered-network traffic.

        **Why this matters**

        - **Unintended public exposure:** Application Gateways used for internal workloads or fronted by Azure Front Door over Private Link should have a private frontend. A gateway with no private frontend may be inadvertently exposing internal listeners to the internet.
        - **Listener misconfiguration detection:** A gateway that should route traffic from peered VNets to backend pools through a private listener will silently fail this access pattern if no private frontend is configured, routing all traffic through the public IP instead.
        - **Front Door over Private Link prerequisite:** When Application Gateway is the backend origin for Azure Front Door over Private Link, a private frontend is required to accept connections from the Front Door private endpoint. Its absence indicates a configuration gap.

        **Risk mitigation**

        - **Confirm intentional exposure:** Treat a failure as a prompt to review the gateway's listener and routing configuration and verify that exclusive public frontend exposure matches the intended architecture.
        - **Add private frontend for internal listeners:** For gateways serving internal or hybrid traffic, adding a subnet-attached private frontend IP configuration enables listeners to bind to a private IP, removing the dependency on the public endpoint.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Application gateways** in the Azure Portal.
        2. Select a gateway.
        3. Open **Frontend IP configurations** under **Settings**.
        4. Verify that at least one frontend IP configuration is attached to a subnet (Private), unless the gateway is intentionally public-only.

        **Automated Audit with Azure CLI:**

        ```bash
        az network application-gateway show --resource-group <ResourceGroupName> --name <AppGatewayName> --query "frontendIPConfigurations[].{name:name, subnet:subnet.id, publicIp:publicIPAddress.id}"
        ```
      remediation:
        - id: portal
          desc: |
            To add a private frontend IP configuration to an Application Gateway using the Azure Portal:

            1. Navigate to **Application gateways** in the Azure Portal.
            2. Select the gateway.
            3. Under **Settings**, select **Frontend IP configurations**.
            4. Select **Add** and choose **Private**.
            5. Select the dedicated Application Gateway subnet and either dynamic or static private IP allocation.
            6. Select **Save**, then update relevant listeners to use the new private frontend.

            If the gateway should be exclusively public, document the decision and suppress this check for the workspace.
        - id: cli
          desc: |
            To add a private frontend IP configuration using the Azure CLI:

            ```bash
            az network application-gateway frontend-ip create \
              --resource-group <ResourceGroupName> \
              --gateway-name <AppGatewayName> \
              --name privateFrontend \
              --vnet-name <VNetName> \
              --subnet <SubnetName> \
              --private-ip-address <PrivateIPAddress>
            ```
        - id: terraform
          desc: |
            To define an Application Gateway with at least one private frontend in Terraform, include a `frontend_ip_configuration` block that references a subnet:

            ```hcl
            resource "azurerm_application_gateway" "example" {
              name                = "example-appgw"
              resource_group_name = azurerm_resource_group.example.name
              location            = azurerm_resource_group.example.location

              sku {
                name     = "Standard_v2"
                tier     = "Standard_v2"
                capacity = 2
              }

              gateway_ip_configuration {
                name      = "gatewayIpConfig"
                subnet_id = azurerm_subnet.appgw.id
              }

              frontend_ip_configuration {
                name                          = "privateFrontend"
                subnet_id                     = azurerm_subnet.appgw.id
                private_ip_address_allocation = "Dynamic"
              }

              # ... listeners, backend pools, rules ...
            }
            ```
        - id: bicep
          desc: |
            To define an Application Gateway with at least one private frontend in Bicep:

            ```bicep
            resource appGateway 'Microsoft.Network/applicationGateways@2024-05-01' = {
              name: 'example-appgw'
              location: resourceGroup().location
              properties: {
                sku: {
                  name: 'Standard_v2'
                  tier: 'Standard_v2'
                  capacity: 2
                }
                gatewayIPConfigurations: [
                  {
                    name: 'gatewayIpConfig'
                    properties: {
                      subnet: {
                        id: appgwSubnet.id
                      }
                    }
                  }
                ]
                frontendIPConfigurations: [
                  {
                    name: 'privateFrontend'
                    properties: {
                      subnet: {
                        id: appgwSubnet.id
                      }
                      privateIPAllocationMethod: 'Dynamic'
                    }
                  }
                ]
                // ... listeners, backendAddressPools, requestRoutingRules ...
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/application-gateway/configuration-front-end-ip
        title: Application Gateway frontend IP address configuration
