  - uid: mondoo-azure-security-ssh-access-restricted-from-internet
    title: Ensure that SSH access is restricted from the internet
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-azure-security-ssh-access-restricted-from-internet-azure
        tags:
          mondoo.com/filter-title: Azure Network Security Group
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-ssh-access-restricted-from-internet-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-ssh-access-restricted-from-internet-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-ssh-access-restricted-from-internet-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    props:
      - uid: mondooAzureSecurityDisallowedPortsSSH
        title: A list of disallowed TCP ports, by default SSH listens only on TCP port 22. Add more ports as needed.
        mql: |
          return [
            22,
          ]
    docs:
      desc: |
        This check ensures that Azure Network Security Groups are configured to block inbound SSH traffic (TCP port 22) from any internet source address. By default, Azure does not block internet-facing SSH access in NSG rules, and many provisioning workflows open port 22 broadly as a convenience during setup.

        **Why this matters**

        - **Brute-force attack surface**: SSH exposed to the internet is continuously probed by automated credential-stuffing and brute-force tools; a single weak password or unpatched daemon vulnerability provides direct shell access.
        - **Lateral movement entry point**: An attacker who gains SSH access to one host can pivot to internal resources that are not exposed to the internet, bypassing network-layer controls that only inspect ingress from outside.
        - **Credential harvesting**: SSH banners and failed-authentication logs can expose server version information and valid usernames, helping attackers refine targeted attacks.
        - **Privilege escalation path**: Many cloud workloads run SSH daemons as root or with sudo-capable accounts; unrestricted SSH access makes these accounts directly reachable from the internet.

        **Risk mitigation**

        - **Restrict source addresses**: Limit SSH inbound rules to specific trusted IP ranges such as a corporate VPN or jump-host address rather than any internet source.
        - **Use Azure Bastion**: Replace direct SSH NSG rules with Azure Bastion, which provides browser-based SSH access through the Azure portal without exposing port 22 to the internet.
      audit: |
        **Manual Audit via Azure Portal:**

          **Checking via Network Security Groups (NSGs) for All Resources:**
          1. From the main Azure Portal menu, navigate to **Network security groups**.
          2. Select an NSG associated with the resources you want to check.
          3. Go to the **Inbound security rules** section.
          4. Review all the rules to ensure none allow SSH access (port 22, TCP) from broadly defined sources such as 'Any', '0.0.0.0', or 'Internet'.
          5. Confirm that rules configured to permit SSH access are scoped to specific, known IP addresses or ranges to minimize exposure.

          **Checking Specific Virtual Machines:**
          1. Log into the Azure Portal.
          2. Navigate to **Virtual machines**.
          3. Select a specific virtual machine to review.
          4. Within the virtual machine's blade, select **Networking** under the settings menu.
          5. Access the **Networking** blade of the selected VM, then review the **Inbound port rules**.
          6. Ensure there are no rules allowing SSH access (port 22, TCP) from 'Any' or 'Internet' source address prefixes. Only secure, specified IP ranges should be allowed, if necessary.

        **Automated Audit with Azure CLI:**

        List NSGs and check for SSH access rules:

        ```bash
        az network nsg list --query "[].{NSG: name, Rules: securityRules[?access=='Allow' && protocol=='Tcp' && direction=='Inbound' && (destinationPortRange=='22' || destinationPortRanges.contains('22')) && (sourceAddressPrefix=='*' || sourceAddressPrefix=='0.0.0.0' || sourceAddressPrefix=='Internet' || sourceAddressPrefix=='/0' || sourceAddressPrefix=='internet' || sourceAddressPrefix=='any')]}" -o table
        ```
      remediation:
        - id: portal
          desc: |
            To restrict SSH access on disallowed TCP ports using the Azure Portal:

            1. In the Azure Portal, navigate to **Network Security Groups (NSG)** associated with your VMs.
            2. Review or modify the inbound security rules:
              - Set `source_address_prefix` to a specific IP range or a VPN gateway rather than 'Any' or 'Internet'.
              - Ensure that the `destination_port_range` does not include TCP port 22 unless absolutely necessary and from a secure source.
        - id: cli
          desc: |
            To restrict SSH access on disallowed TCP ports using the Azure CLI, update or create a new NSG rule to restrict SSH access:

            ```bash
            az network nsg rule create --resource-group <ResourceGroupName> --nsg-name <NSGName> --name RestrictSSH --priority 1001 --direction Inbound --access Deny --protocol Tcp --source-address-prefixes <YourSecureIPRange> --destination-port-ranges 22
            ```
        - id: powershell
          desc: |
            To restrict SSH access on disallowed TCP ports using PowerShell:

            ```powershell
            New-AzNetworkSecurityRuleConfig -Name RestrictSSH -Protocol Tcp -Direction Inbound -Priority 1001 -SourceAddressPrefix <YourSecureIPRange> -SourcePortRange * -DestinationAddressPrefix * -DestinationPortRange 22 -Access Allow
            ```
        - id: terraform
          desc: |
            To restrict SSH access on disallowed TCP ports in Terraform:

            ```hcl
            # Ensure the `source_address_prefix` is configured to a restrictive CIDR address

            resource "azurerm_network_security_group" "my_terraform_nsg" {
              name                = "myNetworkSecurityGroup"
              location            = azurerm_resource_group.rg.location
              resource_group_name = azurerm_resource_group.rg.name

              security_rule {
                name                       = "SSH"
                priority                   = 1001
                direction                  = "Inbound"
                access                     = "Allow"
                protocol                   = "Tcp"
                source_port_range          = "*"
                destination_port_range     = "22"
                source_address_prefix      = "192.168.22.5/24"
                destination_address_prefix = "*"
              }
            }
            ```
        - id: bicep
          desc: |
            To restrict SSH access on disallowed TCP ports in Bicep:

            ```bicep
            resource nsg 'Microsoft.Network/networkSecurityGroups@2024-05-01' = {
              name: 'myNetworkSecurityGroup'
              location: resourceGroup().location
              properties: {
                securityRules: [
                  {
                    name: 'SSH'
                    properties: {
                      priority: 1001
                      direction: 'Inbound'
                      access: 'Allow'
                      protocol: 'Tcp'
                      sourcePortRange: '*'
                      destinationPortRange: '22'
                      sourceAddressPrefix: '192.168.22.5/24'
                      destinationAddressPrefix: '*'
                    }
                  }
                ]
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/security/fundamentals/network-best-practices
        title: Azure Network Security Best Practices
  - uid: mondoo-azure-security-ssh-access-restricted-from-internet-azure
    filters: |
      asset.platform == "azure-network-security-group"
    mql: |
      allNsgTCP = azure.subscription.network.securityGroup.securityRules
        .where(
          properties.access == 'Allow'
            && direction == 'Inbound'
            && properties.protocol == /TCP|\*/i
            && properties.sourceAddressPrefix == /\*|0\.0\.0\.0|Internet|\/0|internet|any/
        )
      allNsgTCP.all(properties.destinationPortRange != "*")
      props.mondooAzureSecurityDisallowedPortsSSH {
        disallowedPortSSH = _
        disallowedPortSSH
        allNsgTCP.none(destinationPortRange.any(fromPort <= disallowedPortSSH && toPort >= disallowedPortSSH))
      }
  - uid: mondoo-azure-security-ssh-access-restricted-from-internet-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "azurerm_network_security_group")
    mql: |
      terraform.resources.where(nameLabel == "azurerm_network_security_group").all(
        blocks.where(type == "security_rule").none(
          arguments['direction'] == "Inbound" &&
          arguments['access'] == "Allow" &&
          arguments['protocol'] == /Tcp|\*/i &&
          arguments['source_address_prefix'] == /\*|0\.0\.0\.0|Internet|Any/i &&
          arguments['destination_port_range'] == "22"
        )
      )
