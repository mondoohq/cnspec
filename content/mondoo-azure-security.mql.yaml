    docs:
      desc: |
        This check ensures that Azure Cognitive Services (Azure AI Services) accounts have public network access disabled, so prompt content, model inputs, and embeddings only traverse private endpoints inside an authorized VNet.

        **Why this matters**

        - **Sensitive data exposure**: Cognitive Services accounts routinely process unredacted customer documents, user prompts, transcribed audio, and other sensitive payloads. Exposing the inference endpoint to the public internet exposes those payloads to interception of leaked subscription keys and to API-key brute-force attempts.
        - **Network isolation**: Disabling public access forces inference and management traffic through Private Link, which prevents access from outside the perimeter even when an API key is stolen.
        - **Defense in depth**: Microsoft Entra ID authentication, customer-managed keys, and content filtering policies are most effective when combined with network-level isolation that blocks direct internet probing of the endpoint.

        **Risk mitigation**

        - Set the Cognitive Services account's public network access to **Disabled** and configure private endpoints in each consumer VNet.
        - Disable account access keys and require Microsoft Entra ID authentication for production workloads.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Azure AI services** (Cognitive Services) in the Azure Portal.
        2. Select an account.
        3. Open **Networking** under **Resource Management**.
        4. On the **Public access** tab, verify that **Allow access from** is set to **Disabled**.

        **Automated Audit with Azure CLI:**

        ```bash
        az cognitiveservices account show --resource-group <ResourceGroupName> --name <AccountName> --query "properties.publicNetworkAccess"
        ```
      remediation:
        - id: portal
          desc: |
            To disable public network access on a Cognitive Services account using the Azure Portal:

            1. Navigate to **Azure AI services** in the Azure Portal.
            2. Select the account.
            3. Under **Resource Management**, select **Networking**.
            4. On the **Public access** tab, set **Allow access from** to **Disabled**.
            5. Configure private endpoints for authorized consumer subnets.
            6. Select **Save**.
        - id: cli
          desc: |
            To disable public network access on a Cognitive Services account using the Azure CLI:

            ```bash
            az resource update --resource-type Microsoft.CognitiveServices/accounts --resource-group <ResourceGroupName> --name <AccountName> --set properties.publicNetworkAccess=Disabled
            ```
        - id: terraform
          desc: |
            To disable public network access on a Cognitive Services account in Terraform:

            ```hcl
            resource "azurerm_cognitive_account" "example" {
              name                          = "example-cognitive"
              location                      = azurerm_resource_group.example.location
              resource_group_name           = azurerm_resource_group.example.name
              kind                          = "OpenAI"
              sku_name                      = "S0"
              public_network_access_enabled = false
            }
            ```
        - id: bicep
          desc: |
            To disable public network access on a Cognitive Services account in Bicep:

            ```bicep
            resource cognitiveAccount 'Microsoft.CognitiveServices/accounts@2024-10-01' = {
              name: 'example-cognitive'
              location: resourceGroup().location
              kind: 'OpenAI'
              sku: {
                name: 'S0'
              }
              properties: {
                publicNetworkAccess: 'Disabled'
