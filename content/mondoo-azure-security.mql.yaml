      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-azure-security-servicebus-namespace-public-network-access-disabled-azure
        tags:
          mondoo.com/filter-title: Azure Service Bus
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-servicebus-namespace-public-network-access-disabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-servicebus-namespace-public-network-access-disabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-servicebus-namespace-public-network-access-disabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure Service Bus namespaces have public network access disabled, forcing all client traffic through private endpoints or trusted Azure services.

        **Why this matters**

        - **Network isolation**: Messaging endpoints exposed to the public internet attract credential stuffing, SAS-key exfiltration attempts, and reconnaissance traffic that consumes namespace throughput units.
        - **Private connectivity**: Disabling public access requires consumers to reach the namespace over private endpoints, Microsoft backbone-only paths, or trusted-service exceptions, narrowing the blast radius of a leaked SAS key.
        - **Defense in depth**: Layer-7 message-level authorization with Microsoft Entra ID is strongest when paired with layer-3 isolation; turning off public ingress prevents attackers from probing the namespace from outside the VNet.

        **Risk mitigation**

        - Disable public network access at the namespace level and configure private endpoints in each consumer VNet.
        - Use the Premium SKU for production workloads; Basic and Standard namespaces do not support private endpoints.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Service Bus** in the Azure Portal.
        2. Select a namespace.
        3. Open **Networking** under **Settings**.
        4. On the **Public access** tab, confirm that public network access is **Disabled** (or restricted to selected networks only).

        **Automated Audit with Azure CLI:**

        ```bash
        az servicebus namespace show --resource-group <ResourceGroupName> --name <NamespaceName> --query "publicNetworkAccess"
        ```
      remediation:
        - id: portal
          desc: |
            To disable public network access on a Service Bus namespace using the Azure Portal:

            1. Navigate to **Service Bus** in the Azure Portal.
            2. Select the namespace.
            3. Under **Settings**, select **Networking**.
            4. On the **Public access** tab, set **Public network access** to **Disabled**.
            5. Configure private endpoints for authorized consumer subnets.
            6. Select **Save**.
        - id: cli
          desc: |
            To disable public network access on a Service Bus namespace using the Azure CLI:

            ```bash
            az servicebus namespace update --resource-group <ResourceGroupName> --name <NamespaceName> --set publicNetworkAccess=Disabled
            ```
        - id: terraform
          desc: |
            To disable public network access on a Service Bus namespace in Terraform:

            ```hcl
            resource "azurerm_servicebus_namespace" "example" {
              name                          = "example-sb-namespace"
              location                      = azurerm_resource_group.example.location
              resource_group_name           = azurerm_resource_group.example.name
              sku                           = "Premium"
              capacity                      = 1
              public_network_access_enabled = false
            }
            ```
        - id: bicep
          desc: |
            To disable public network access on a Service Bus namespace in Bicep:

            ```bicep
            resource serviceBusNamespace 'Microsoft.ServiceBus/namespaces@2024-01-01' = {
              name: 'example-sb-namespace'
              location: resourceGroup().location
              sku: {
                name: 'Premium'
                tier: 'Premium'
                capacity: 1
              }
              properties: {
                publicNetworkAccess: 'Disabled'
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/service-bus-messaging/network-security
        title: Network security for Azure Service Bus
