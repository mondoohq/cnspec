  - uid: mondoo-azure-security-managed-hsm-soft-delete
    title: Ensure Managed HSM has soft delete enabled
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-bcr-08
      compliance/dora: dora-art-12
      compliance/hipaa: hipaa-security-ss164-308-a-7-ii-a-contingency-plan-data-backup-plan
      compliance/iso-27001-2022: iso-27001-2022-a-8-13
      compliance/nis-2: nis-2-21-2-c
      compliance/nist-csf-1: nist-csf-1-pr-ip-4
      compliance/nist-csf-2: nist-csf-2-pr-ds-11
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-12
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-10
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc9-1-1
      compliance/vda-isa-5: false
    variants:
      - uid: mondoo-azure-security-managed-hsm-soft-delete-azure
        tags:
          mondoo.com/filter-title: Azure Subscription
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-managed-hsm-soft-delete-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-managed-hsm-soft-delete-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-managed-hsm-soft-delete-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure Managed HSM instances have soft delete enabled. Soft delete allows recovery of deleted HSM pools and their contents during a configurable retention period, defending against ransomware and insider threat scenarios.

        **Why this matters**

        - Managed HSMs store the most sensitive cryptographic keys in an organization, including those used for data encryption, code signing, and TLS termination. Without soft delete, an attacker or malicious insider who deletes an HSM permanently destroys all key material, rendering every dependent encrypted dataset irrecoverable.
        - Ransomware operators specifically target cryptographic key infrastructure. Deleting an HSM without soft delete is a one-step action that can cause catastrophic, permanent data loss across all services relying on those keys.
        - Soft delete enforces a mandatory retention period during which the HSM can be recovered, giving security teams time to detect and respond to unauthorized deletions before they become permanent.

        **Risk mitigation**

        - **Anti-ransomware defense**: Soft delete prevents attackers from permanently destroying HSMs, preserving the ability to recover keys and decrypt data after an attack.
        - **Insider threat mitigation**: A disgruntled administrator cannot permanently destroy cryptographic material in a single action; the retention period provides a detection and recovery window.
        - **Key continuity**: Prevents permanent loss of hardware-protected cryptographic keys that underpin data encryption across multiple services.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Managed HSMs** in the Azure Portal.
        2. Select a Managed HSM.
        3. Go to **Properties**.
        4. Verify that **Soft delete** is enabled.

        **Automated Audit with Azure CLI:**

        ```bash
        az keyvault show --hsm-name <HSMName> --query "properties.enableSoftDelete"
        ```
      remediation:
        - id: portal
          desc: |
            Soft delete is enabled by default on new Managed HSM instances and cannot be disabled. If you have a Managed HSM without soft delete, contact Azure support.
        - id: cli
          desc: |
            Soft-delete is enabled by default on every Managed HSM and cannot be disabled. When you provision a new HSM with the Azure CLI, set the retention period explicitly:

            ```bash
            az keyvault create \
              --hsm-name <HSMName> \
              --resource-group <ResourceGroupName> \
              --location <Location> \
              --administrators <AdminObjectId> \
              --retention-days 90
            ```
        - id: terraform
          desc: |
            Soft delete is enabled by default on Managed HSM and cannot be disabled. Configure the retention period explicitly in Terraform:

            ```hcl
            resource "azurerm_key_vault_managed_hardware_security_module" "example" {
              name                       = "example-hsm"
              resource_group_name        = azurerm_resource_group.example.name
              location                   = azurerm_resource_group.example.location
              sku_name                   = "Standard_B1"
              tenant_id                  = data.azurerm_client_config.current.tenant_id
              admin_object_ids           = [data.azurerm_client_config.current.object_id]
              soft_delete_retention_days = 90
            }
            ```
        - id: bicep
          desc: |
            Soft delete is enabled by default on Managed HSM and cannot be disabled:

            ```bicep
            resource managedHsm 'Microsoft.KeyVault/managedHSMs@2023-07-01' = {
              name: 'example-hsm'
              location: resourceGroup().location
              sku: {
                family: 'B'
                name: 'Standard_B1'
              }
              properties: {
                tenantId: subscription().tenantId
                initialAdminObjectIds: [
                  adminObjectId
                ]
                softDeleteRetentionInDays: 90
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/key-vault/managed-hsm/soft-delete-overview
        title: Managed HSM soft delete overview
