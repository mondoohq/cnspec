  - uid: mondoo-azure-security-vnc-access-restricted-from-internet
    title: Ensure that VNC access is restricted from the internet
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-azure-security-vnc-access-restricted-from-internet-azure
        tags:
          mondoo.com/filter-title: Azure Network Security Group
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-vnc-access-restricted-from-internet-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-vnc-access-restricted-from-internet-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-vnc-access-restricted-from-internet-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    props:
      - uid: mondooAzureSecurityDisallowedPortsVNC
        title: a list of disallowed TCP ports, by default VNC listens only on TCP port 5900. Add more ports as needed.
        mql: |
          return [
            5900,
          ]
    docs:
      desc: |
        This check ensures that Azure Network Security Groups are configured to block inbound VNC traffic (TCP port 5900) from any internet source address. By default, Azure does not block internet-facing VNC in NSG rules, and VNC is frequently left open on Linux or macOS workloads for remote desktop access during development and testing.

        **Why this matters**

        - **Weak authentication by default**: VNC commonly ships with simple password-only authentication and no account lockout; internet exposure enables unlimited brute-force attempts against these credentials.
        - **Unencrypted session traffic**: Many VNC configurations transmit session data without transport-layer encryption, allowing network-positioned attackers to capture full graphical session content including keystrokes and displayed secrets.
        - **Graphical root access**: VNC typically provides full graphical desktop access equivalent to being physically at the console; compromising VNC gives an attacker the same privilege level as the logged-in user, often root or an administrator.
        - **Persistent backdoor risk**: Attackers who access a system via VNC can install additional backdoors before closing the session, maintaining persistence even after the NSG rule is corrected.

        **Risk mitigation**

        - **Restrict source addresses**: Limit VNC inbound rules to specific trusted IP ranges such as a corporate VPN or designated jump host rather than any internet source.
        - **Replace with encrypted alternatives**: Use SSH tunneling to forward VNC traffic over an encrypted channel, or replace VNC entirely with a zero-trust remote access solution that does not require opening port 5900.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Log into the Azure Portal.
        2. Navigate to **Network security groups** under the Networking or directly through the search bar.
        3. For each NSG, access the **Inbound security rules**.
        4. Carefully review each rule to identify any that allow inbound VNC traffic (TCP port 5900):
          - Check for rules where the protocol is set to `TCP`.
          - The destination port or port range includes `5900`.
          - The source address prefix is too broad, such as 'Any', '0.0.0.0', 'Internet', '/0', 'internet', or 'any'.
        5. Note down any NSG rules that do not comply with your organization's security policy regarding restricted access to VNC. These rules should ideally allow access only from trusted, secure networks, and not from the open internet.

        1. Navigate to **Virtual Machines** in the Azure Portal.
        2. For each VM, select the **Networking** blade to review network configurations.
        3. Check the **Inbound port rules** under the associated Network Security Group (NSG).
        4. Verify that there are no rules allowing VNC access (TCP port 5900) from 'Any' or 'Internet'. Only secure, specified IP ranges should be allowed if necessary.

        **Automated Audit with Azure CLI:**

        List NSGs and verify VNC access rules:

        ```bash
        az network nsg list --query "[].{NSG: name, Rules: securityRules[?access=='Allow' && protocol=='Tcp' && direction=='Inbound' && (destinationPortRange=='5900' || destinationPortRanges.contains('5900')) && (sourceAddressPrefix=='*' || sourceAddressPrefix=='0.0.0.0' || sourceAddressPrefix=='Internet' || sourceAddressPrefix=='/0' || sourceAddressPrefix=='internet' || sourceAddressPrefix=='any')]}" -o table
        ```
      remediation:
        - id: portal
          desc: |
            To restrict VNC access on disallowed TCP ports using the Azure Portal:

            1. Log into the Azure Portal and navigate to **Network Security Groups**.
            2. Select the NSG associated with your VM.
            3. Review the **Inbound security rules** and modify or delete any rules that allow internet access to port 5900.
            4. Preferably, change the `source_address_prefix` to more restrictive settings, such as a specific IP range or a secure VPN gateway.
        - id: cli
          desc: |
            To restrict VNC access on disallowed TCP ports using the Azure CLI, update or create a new NSG rule to restrict VNC access:

            ```bash
            az network nsg rule create --resource-group <ResourceGroupName> --nsg-name <NSGName> --name RestrictVNC --priority 1001 --direction Inbound --access Deny --protocol Tcp --source-address-prefixes <YourSecureIPRange> --destination-port-ranges 5900
            ```
        - id: powershell
          desc: |
            To restrict VNC access on disallowed TCP ports using PowerShell:

            ```powershell
            New-AzNetworkSecurityRuleConfig -Name RestrictVNC -Protocol Tcp -Direction Inbound -Priority 1001 -SourceAddressPrefix <YourSecureIPRange> -SourcePortRange * -DestinationAddressPrefix * -DestinationPortRange 5900 -Access Allow
            ```
        - id: terraform
          desc: |
            To restrict VNC access on disallowed TCP ports in Terraform:

            ```hcl
            # Ensure the `source_address_prefix` is configured to a restrictive CIDR address

            resource "azurerm_network_security_group" "example" {
              name                = "example-vnc-security"
              location            = azurerm_resource_group.rg.location
              resource_group_name = azurerm_resource_group.rg.name

              security_rule {
                name                       = "VNC"
                priority                   = 1001
                direction                  = "Inbound"
                access                     = "Allow"
                protocol                   = "Tcp"
                source_port_range          = "*"
                destination_port_range     = "5900"
                source_address_prefix      = "192.168.22.5/24"
                destination_address_prefix = "*"
              }
            }
            ```
        - id: bicep
          desc: |
            To restrict VNC access on disallowed TCP ports in Bicep:

            ```bicep
            resource nsg 'Microsoft.Network/networkSecurityGroups@2024-05-01' = {
              name: 'myNetworkSecurityGroup'
              location: resourceGroup().location
              properties: {
                securityRules: [
                  {
                    name: 'VNC'
                    properties: {
                      priority: 1001
                      direction: 'Inbound'
                      access: 'Allow'
                      protocol: 'Tcp'
                      sourcePortRange: '*'
                      destinationPortRange: '5900-5901'
                      sourceAddressPrefix: '192.168.22.5/24'
                      destinationAddressPrefix: '*'
                    }
                  }
                ]
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/security/fundamentals/network-best-practices
        title: Azure Network Security Best Practices
  - uid: mondoo-azure-security-vnc-access-restricted-from-internet-azure
    filters: |
      asset.platform == "azure-network-security-group"
    mql: |
      allNsgTCP = azure.subscription.network.securityGroup.securityRules
        .where(
          properties.access == 'Allow'
            && direction == 'Inbound'
            && properties.protocol == /TCP|\*/i
            && properties.sourceAddressPrefix == /\*|0\.0\.0\.0|Internet|\/0|internet|any/
        )
      allNsgTCP.all(properties.destinationPortRange != "*")
      props.mondooAzureSecurityDisallowedPortsVNC {
        disallowedPortVNC = _
        disallowedPortVNC
        allNsgTCP.none(destinationPortRange.any(fromPort <= disallowedPortVNC && toPort >= disallowedPortVNC))
      }
