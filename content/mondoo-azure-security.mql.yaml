          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-compute-disk-encryption-set-auto-rotation-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure disk encryption sets have automatic key rotation enabled. When enabled, the disk encryption set automatically updates all managed disks, snapshots, and images associated with it to use the new key version within one hour.

        **Why this matters**

        - Without auto-rotation, disk encryption sets continue to use old key versions indefinitely, even after new key versions are created in Key Vault.
        - Manual rotation requires updating each disk encryption set individually, which is error-prone and can leave disks encrypted with outdated keys.
        - Auto-rotation ensures that cryptographic best practices for key freshness are automatically enforced.

        **Risk mitigation**

        - **Automated key freshness:** Disks automatically use the latest key version.
        - **Reduced operational risk:** Eliminates manual rotation steps that can be missed.
        - **Compliance:** Satisfies key rotation requirements without manual intervention.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Disk encryption sets** in the Azure Portal.
        2. Select a disk encryption set.
        3. Under **Settings**, verify that **Auto key rotation** is enabled.

        **Automated Audit with Azure CLI:**

        ```bash
        az disk-encryption-set list --query "[].{Name:name, AutoRotation:rotationToLatestKeyVersionEnabled}" -o table
        ```
      remediation:
        - id: portal
          desc: |
            To enable auto key rotation using the Azure Portal:

            1. Navigate to **Disk encryption sets** in the Azure Portal.
            2. Select the disk encryption set.
            3. Under **Settings**, enable **Auto key rotation**.
        - id: cli
          desc: |
            To enable auto key rotation using the Azure CLI:

            ```bash
            az disk-encryption-set update \
              --name <DiskEncryptionSetName> \
              --resource-group <ResourceGroupName> \
              --enable-auto-key-rotation true
            ```
        - id: terraform
          desc: |
            To enable auto key rotation in Terraform:

            ```hcl
            resource "azurerm_disk_encryption_set" "example" {
              name                      = "example-des"
              resource_group_name       = azurerm_resource_group.example.name
              location                  = azurerm_resource_group.example.location
              key_vault_key_id          = azurerm_key_vault_key.example.id
              auto_key_rotation_enabled = true

              identity {
                type = "SystemAssigned"
              }
            }
            ```
        - id: bicep
          desc: |
            To enable auto key rotation in Bicep:

            ```bicep
            resource diskEncryptionSet 'Microsoft.Compute/diskEncryptionSets@2023-10-02' = {
              name: 'example-des'
              location: resourceGroup().location
              identity: {
                type: 'SystemAssigned'
              }
              properties: {
                activeKey: {
                  keyUrl: keyVaultKey.properties.keyUriWithVersion
                }
                rotationToLatestKeyVersionEnabled: true
              }
            }
            ```
