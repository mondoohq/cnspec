  - uid: mondoo-azure-security-rbac-custom-roles-least-privilege
    title: Ensure custom RBAC roles use least privilege actions
    impact: 50
    variants:
      - uid: mondoo-azure-security-rbac-custom-roles-least-privilege-azure
        tags:
          mondoo.com/filter-title: Azure Subscription
          mondoo.com/icon: azure
      - uid: mondoo-azure-security-rbac-custom-roles-least-privilege-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/icon: terraform
      - uid: mondoo-azure-security-rbac-custom-roles-least-privilege-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/icon: terraform
      - uid: mondoo-azure-security-rbac-custom-roles-least-privilege-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/icon: terraform
    docs:
      desc: |
        This check ensures that custom RBAC role definitions do not grant wildcard (`*`) action permissions. Custom roles with `*` actions provide the same level of access as built-in Owner/Contributor roles, defeating the purpose of creating a custom role with specific permissions.

        **Why this matters**

        - **Excessive permissions:** A custom role with `*` actions grants access to all current and future Azure operations, including destructive ones.
        - **Least privilege violation:** Custom roles should grant only the specific actions needed for the role's purpose.
        - **Audit risk:** Wildcard permissions make it impossible to determine what a role can actually do without checking every Azure resource provider.
      remediation:
        - id: cli
          desc: |
            **Using Azure CLI**

            List custom roles with wildcard actions:

            ```bash
            az role definition list --custom-role-only \
              --query "[?contains(permissions[0].actions, '*')].{Name:roleName, Actions:permissions[0].actions}"
            ```

            Update the role to use specific actions:

            ```bash
            az role definition update --role-definition @role.json
            ```
        - id: bicep
          desc: |
            **Using Bicep**

            ```bicep
            resource customRole 'Microsoft.Authorization/roleDefinitions@2022-04-01' = {
              name: guid(subscription().id, 'custom-role')
              properties: {
                roleName: 'Custom Role'
                description: 'Custom role with least privilege'
                type: 'CustomRole'
                permissions: [
                  {
                    actions: [
                      'Microsoft.Compute/virtualMachines/read'
                      'Microsoft.Compute/virtualMachines/start/action'
                      // Use specific actions instead of '*'
                    ]
                    notActions: []
                  }
                ]
                assignableScopes: [
                  subscription().id
                ]
              }
            }
            ```
        - id: terraform
          desc: |
            **Using Terraform**

            ```hcl
            resource "azurerm_role_definition" "example" {
              name        = "custom-role"
              scope       = data.azurerm_subscription.primary.id
              description = "Custom role with least privilege"

              permissions {
                actions = [
                  "Microsoft.Compute/virtualMachines/read",
                  "Microsoft.Compute/virtualMachines/start/action",
                  # Use specific actions instead of '*'
                ]
                not_actions = []
              }

              assignable_scopes = [
                data.azurerm_subscription.primary.id,
              ]
            }
            ```
        - id: portal
          desc: |
            **Using Azure Portal**

            1. Navigate to **Subscriptions** > **Access control (IAM)**.
            2. Select **Roles** and find the custom role.
            3. Select **Edit** on the role.
            4. Under **Permissions**, replace wildcard (`*`) actions with specific actions.
            5. Select **Update**.
    refs:
      - url: https://learn.microsoft.com/en-us/azure/role-based-access-control/custom-roles
        title: Azure Documentation - Azure custom roles
  - uid: mondoo-azure-security-rbac-custom-roles-least-privilege-azure
    filters: |
      asset.platform == "azure"
    mql: |
      azure.subscription.iam.roles.where(type == "CustomRole").all(
        permissions.none(allowedActions.any(_ == "*"))
      )
  - uid: mondoo-azure-security-rbac-custom-roles-least-privilege-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "azurerm_role_definition")
    mql: |
      terraform.resources.where(nameLabel == "azurerm_role_definition").all(
        blocks.where(type == "permissions").all(
          arguments['actions'].none(_ == "*")
        )
      )
  - uid: mondoo-azure-security-rbac-custom-roles-least-privilege-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "azurerm_role_definition")
    mql: |
      terraform.plan.resourceChanges.where(type == "azurerm_role_definition").all(
        change.after['permissions'] != empty &&
        change.after['permissions'].all(_['actions'].none(_ == "*"))
      )
  - uid: mondoo-azure-security-rbac-custom-roles-least-privilege-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "azurerm_role_definition")
    mql: |
      terraform.state.resources.where(type == "azurerm_role_definition").all(
        values['permissions'] != empty &&
        values['permissions'].all(_['actions'].none(_ == "*"))
      )
  - uid: mondoo-azure-security-rbac-no-custom-role-creation
    title: Ensure custom roles do not allow role creation
    impact: 60
    variants:
      - uid: mondoo-azure-security-rbac-no-custom-role-creation-azure
        tags:
          mondoo.com/filter-title: Azure Subscription
          mondoo.com/icon: azure
      - uid: mondoo-azure-security-rbac-no-custom-role-creation-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/icon: terraform
      - uid: mondoo-azure-security-rbac-no-custom-role-creation-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/icon: terraform
      - uid: mondoo-azure-security-rbac-no-custom-role-creation-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/icon: terraform
    docs:
      desc: |
        This check ensures that custom RBAC role definitions do not include the `Microsoft.Authorization/roleDefinitions/write` permission, which allows creating new custom roles. Granting this permission to custom roles enables privilege escalation by allowing users to create roles with arbitrary permissions.

        **Why this matters**

        - **Privilege escalation:** A user with role creation permission can create a new role with any permissions and assign it to themselves, effectively gaining unlimited access.
        - **Audit circumvention:** Custom role creation can be used to bypass existing access controls without modifying existing role assignments.
      remediation:
        - id: cli
          desc: |
            **Using Azure CLI**

            Remove the role definition write permission from custom roles:

            ```bash
            az role definition update --role-definition @role.json
            ```

            Ensure `Microsoft.Authorization/roleDefinitions/write` is not in the `actions` array.
        - id: bicep
          desc: |
            **Using Bicep**

            ```bicep
            resource customRole 'Microsoft.Authorization/roleDefinitions@2022-04-01' = {
              name: guid(subscription().id, 'custom-role')
              properties: {
                roleName: 'Custom Role'
                description: 'Custom role without role creation permission'
                type: 'CustomRole'
                permissions: [
                  {
                    actions: [
                      'Microsoft.Compute/virtualMachines/read'
                      // Do NOT include 'Microsoft.Authorization/roleDefinitions/write'
                    ]
                    notActions: [
                      'Microsoft.Authorization/roleDefinitions/write'
                    ]
                  }
                ]
                assignableScopes: [
                  subscription().id
                ]
              }
            }
            ```
        - id: terraform
          desc: |
            **Using Terraform**

            ```hcl
            resource "azurerm_role_definition" "example" {
              name        = "custom-role"
              scope       = data.azurerm_subscription.primary.id
              description = "Custom role without role creation permission"

              permissions {
                actions = [
                  "Microsoft.Compute/virtualMachines/read",
                  # Do NOT include 'Microsoft.Authorization/roleDefinitions/write'
                ]
                not_actions = [
                  "Microsoft.Authorization/roleDefinitions/write",
                ]
              }

              assignable_scopes = [
                data.azurerm_subscription.primary.id,
              ]
            }
            ```
        - id: portal
          desc: |
            **Using Azure Portal**

            1. Navigate to **Subscriptions** > **Access control (IAM)**.
            2. Select **Roles** and find the custom role.
            3. Select **Edit** on the role.
            4. Under **Permissions**, remove `Microsoft.Authorization/roleDefinitions/write`.
            5. Select **Update**.
    refs:
      - url: https://learn.microsoft.com/en-us/azure/role-based-access-control/custom-roles
        title: Azure Documentation - Azure custom roles
  - uid: mondoo-azure-security-rbac-no-custom-role-creation-azure
    filters: |
      asset.platform == "azure"
    mql: |
      azure.subscription.iam.roles.where(type == "CustomRole").all(
        permissions.none(
          allowedActions.any(_ == "Microsoft.Authorization/roleDefinitions/write")
        )
      )
  - uid: mondoo-azure-security-rbac-no-custom-role-creation-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "azurerm_role_definition")
    mql: |
      terraform.resources.where(nameLabel == "azurerm_role_definition").all(
        blocks.where(type == "permissions").all(
          arguments['actions'].none(_ == "Microsoft.Authorization/roleDefinitions/write")
        )
      )
  - uid: mondoo-azure-security-rbac-no-custom-role-creation-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "azurerm_role_definition")
    mql: |
      terraform.plan.resourceChanges.where(type == "azurerm_role_definition").all(
        change.after['permissions'] != empty &&
        change.after['permissions'].all(_['actions'].none(_ == "Microsoft.Authorization/roleDefinitions/write"))
      )
  - uid: mondoo-azure-security-rbac-no-custom-role-creation-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "azurerm_role_definition")
