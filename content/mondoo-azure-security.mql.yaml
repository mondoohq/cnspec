      - uid: mondoo-azure-security-appconfiguration-public-network-access-disabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-appconfiguration-public-network-access-disabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure App Configuration stores have public network access disabled, so configuration keys, feature flags, and Key Vault references can only be read by clients on authorized private networks.

        **Why this matters**

        - **Network isolation**: App Configuration stores commonly hold connection strings, feature flags, and Key Vault references that describe the runtime topology of an application. Exposing the store endpoint to the public internet exposes that topology to anyone who can guess or harvest the endpoint name.
        - **Private connectivity**: Disabling public access forces clients to read configuration through a private endpoint inside a peered VNet, which prevents access from outside the perimeter even if access keys leak.
        - **Defense in depth**: Combining Microsoft Entra ID authentication with network-level isolation prevents a leaked access key from being usable from arbitrary networks.

        **Risk mitigation**

        - Set the App Configuration store's public network access to **Disabled** and configure a private endpoint in each consumer VNet.
        - Disable access key authentication where possible and require Microsoft Entra ID-only access.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **App Configuration** in the Azure Portal.
        2. Select a configuration store.
        3. Open **Networking** under **Settings**.
        4. On the **Public access** tab, verify that **Public network access** is **Disabled**.

        **Automated Audit with Azure CLI:**

        ```bash
        az appconfig show --resource-group <ResourceGroupName> --name <ConfigStoreName> --query "publicNetworkAccess"
        ```
      remediation:
        - id: portal
          desc: |
            To disable public network access on an App Configuration store using the Azure Portal:

            1. Navigate to **App Configuration** in the Azure Portal.
            2. Select the configuration store.
            3. Under **Settings**, select **Networking**.
            4. On the **Public access** tab, set **Public network access** to **Disabled**.
            5. Configure private endpoints for authorized consumer subnets.
            6. Select **Save**.
        - id: cli
          desc: |
            To disable public network access on an App Configuration store using the Azure CLI:

            ```bash
            az appconfig update --resource-group <ResourceGroupName> --name <ConfigStoreName> --enable-public-network false
            ```
        - id: terraform
          desc: |
            To disable public network access on an App Configuration store in Terraform:

            ```hcl
            resource "azurerm_app_configuration" "example" {
              name                  = "example-appconfig"
              resource_group_name   = azurerm_resource_group.example.name
              location              = azurerm_resource_group.example.location
              sku                   = "standard"
              public_network_access = "Disabled"
            }
            ```
        - id: bicep
          desc: |
            To disable public network access on an App Configuration store in Bicep:

            ```bicep
            resource appConfig 'Microsoft.AppConfiguration/configurationStores@2024-05-01' = {
              name: 'example-appconfig'
              location: resourceGroup().location
              sku: {
                name: 'standard'
              }
              properties: {
                publicNetworkAccess: 'Disabled'
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/azure-app-configuration/concept-private-endpoint
        title: Private access to Azure App Configuration
