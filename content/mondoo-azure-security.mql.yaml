      )
  - uid: mondoo-azure-security-storage-queue-logging-enabled
    title: Ensure Queue Services logging is enabled for storage
    impact: 50
    variants:
      - uid: mondoo-azure-security-storage-queue-logging-enabled-azure
        tags:
          mondoo.com/filter-title: Azure Storage Account
          mondoo.com/icon: azure
      - uid: mondoo-azure-security-storage-queue-logging-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/icon: terraform
      - uid: mondoo-azure-security-storage-queue-logging-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/icon: terraform
      - uid: mondoo-azure-security-storage-queue-logging-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/icon: terraform
    docs:
      desc: |
        This check ensures that Azure Storage account Queue Services have analytics logging enabled for read, write, and delete operations. Queue storage logging provides an audit trail of all operations performed on queues.

        **Why this matters**

        - **Audit trail:** Without queue logging, there is no record of messages being read, written, or deleted from queues, making it impossible to investigate data loss or unauthorized access.
        - **Security monitoring:** Queue access patterns can reveal unauthorized data access or exfiltration via queues.
        - **Compliance:** Many regulatory frameworks require comprehensive logging of data access operations.
      remediation:
        - id: cli
          desc: |
            **Using Azure CLI**

            Enable queue logging:

            ```bash
            az storage logging update \
              --account-name <storage-account> \
              --services q \
              --log rwd \
              --retention 90
            ```
        - id: bicep
          desc: |
            **Using Bicep**

            Note: Storage Queue analytics logging (read, write, delete) is configured through the data plane API, not through ARM/Bicep resource definitions. Use Azure CLI or Azure PowerShell to enable queue logging after provisioning the storage account.

            ```bash
            az storage logging update --account-name <storage-account> --services q --log rwd --retention 90
            ```
        - id: terraform
          desc: |
            **Using Terraform**

            ```hcl
            resource "azurerm_storage_account" "example" {
              name                     = "examplestorage"
              resource_group_name      = azurerm_resource_group.example.name
              location                 = azurerm_resource_group.example.location
              account_tier             = "Standard"
              account_replication_type = "LRS"

              queue_properties {
                logging {
                  delete  = true
                  read    = true
                  write   = true
                  version = "1.0"
                  retention_policy_days = 90
                }
              }
            }
            ```
        - id: portal
          desc: |
            **Using Azure Portal**

            1. Navigate to **Storage accounts**.
            2. Select the storage account.
            3. Go to **Monitoring** > **Diagnostics settings (classic)**.
            4. Under **Queue properties**, enable logging for **Read**, **Write**, and **Delete** requests.
            5. Set the retention period.
            6. Select **Save**.
    refs:
      - url: https://learn.microsoft.com/en-us/azure/storage/queues/monitor-queue-storage
        title: Azure Documentation - Monitor Azure Queue Storage
  - uid: mondoo-azure-security-storage-queue-logging-enabled-azure
    filters: |
