  - uid: mondoo-azure-security-cosmosdb-public-access-disabled
    title: Ensure public network access is disabled for Azure Cosmos DB accounts
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-azure-security-cosmosdb-public-access-disabled-azure
        tags:
          mondoo.com/filter-title: Azure Cosmos DB Account
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-cosmosdb-public-access-disabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-cosmosdb-public-access-disabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-cosmosdb-public-access-disabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that public network access is disabled on Azure Cosmos DB accounts, requiring all connections to route through private endpoints or approved virtual networks. By default, Cosmos DB accounts are created with public network access enabled, exposing the account endpoint to the internet.

        **Why this matters**

        - **Reduced attack surface:** Disabling public access removes the Cosmos DB endpoint from the public internet, eliminating a broad class of remote attack vectors.
        - **Network isolation:** All traffic is forced through private endpoints within the virtual network, providing a strong network-level boundary around sensitive data.
        - **Data interception prevention:** Traffic routed through private endpoints stays on the Microsoft backbone network, preventing exposure to public internet routing and interception risks.
        - **Credential theft impact reduction:** Even if account keys or tokens are leaked, disabling public access ensures an attacker cannot use them from outside the private network.

        **Risk mitigation**

        - **Lateral movement containment:** Restricting access to approved virtual networks limits an attacker's ability to pivot from a compromised internet-facing resource to the database tier.
        - **Exfiltration path removal:** Without a public endpoint, bulk data exfiltration over the internet requires first compromising a host on the private network, adding a detection opportunity.
        - **Credential exposure consequence reduction:** Stolen credentials cannot be leveraged remotely when the account is not reachable from the public internet.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Azure Cosmos DB** in the Azure Portal.
        2. Select a Cosmos DB account.
        3. Go to **Networking** under **Settings**.
        4. Verify that **Public network access** is set to **Disabled**.

        **Automated Audit with Azure CLI:**

        ```bash
        az cosmosdb list --query "[].{Name:name, ResourceGroup:resourceGroup, PublicNetworkAccess:publicNetworkAccess}" -o table
        ```

        **Automated Audit with PowerShell:**

        ```powershell
        Get-AzCosmosDBAccount | Select-Object Name, ResourceGroupName, PublicNetworkAccess
        ```
      remediation:
        - id: portal
          desc: |
            To ensure public network access is disabled for Azure Cosmos DB accounts using the Azure Portal:

            1. Navigate to **Azure Cosmos DB** in the Azure Portal.
            2. Select the Cosmos DB account.
            3. Go to **Networking** under **Settings**.
            4. Set **Public network access** to **Disabled**.
            5. Configure a private endpoint for the Cosmos DB account.
            6. Select **Save**.
        - id: cli
          desc: |
            To ensure public network access is disabled for Azure Cosmos DB accounts using the Azure CLI:

            ```bash
            az cosmosdb update --name <CosmosDBAccountName> --resource-group <ResourceGroupName> --public-network-access DISABLED
            ```
        - id: powershell
          desc: |
            To ensure public network access is disabled for Azure Cosmos DB accounts using PowerShell:

            ```powershell
            Update-AzCosmosDBAccount -ResourceGroupName <ResourceGroupName> -Name <CosmosDBAccountName> -PublicNetworkAccess "Disabled"
            ```
        - id: terraform
          desc: |
            To ensure public network access is disabled for Azure Cosmos DB accounts in Terraform:

            ```hcl
            resource "azurerm_cosmosdb_account" "example" {
              name                          = "example-cosmosdb"
              location                      = azurerm_resource_group.example.location
              resource_group_name           = azurerm_resource_group.example.name
              offer_type                    = "Standard"
              public_network_access_enabled = false
            }
            ```
        - id: bicep
          desc: |
            To ensure public network access is disabled for Azure Cosmos DB accounts in Bicep:

            ```bicep
            resource cosmosDbAccount 'Microsoft.DocumentDB/databaseAccounts@2024-05-15' = {
              name: 'example-cosmosdb'
              location: resourceGroup().location
              properties: {
                publicNetworkAccess: 'Disabled'
                // ...
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/cosmos-db/how-to-configure-firewall
        title: Configure IP firewall in Azure Cosmos DB
  - uid: mondoo-azure-security-cosmosdb-public-access-disabled-azure
