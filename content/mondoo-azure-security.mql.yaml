      compliance/nis-2: nis-2-21-2-j
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-9
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-2
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-8
      compliance/vda-isa-5: vda-isa-5-4-1-3
    variants:
      - uid: mondoo-azure-security-datafactory-managed-identity-azure
        tags:
          mondoo.com/filter-title: Azure Data Factory
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-datafactory-managed-identity-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-datafactory-managed-identity-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-datafactory-managed-identity-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure Data Factory instances are configured with a managed identity.

        **Why this matters**

        - **Credential-free authentication**: Managed identities eliminate the need to store and rotate credentials in application code or configuration, reducing the risk of credential leakage.
        - **Secure resource access**: Data Factory uses managed identities to authenticate to Azure Key Vault, Azure Storage, Azure SQL, and other services without embedding secrets in linked services.

        **Risk mitigation**

        - Enable a system-assigned or user-assigned managed identity on all Data Factory instances.
        - Use managed identity authentication for all linked services instead of connection strings or service principal secrets.
      audit: |
        ### Audit via Portal

        1. Navigate to **Data factories** in the Azure Portal.
        2. Select the target Data Factory instance.
        3. Under **Settings**, select **Identity**.
        4. Review the **System assigned** or **User assigned** managed identity status.

        A passing resource shows a managed identity with **Status: On** or a user-assigned identity listed. A failing resource shows **Status: Off** with no user-assigned identity.

        ### Audit via CLI

        1. Run the following command, replacing `<resource-group-name>` and `<data-factory-name>` with the target values:

        ```bash
        az datafactory show \
          --resource-group <resource-group-name> \
          --factory-name <data-factory-name> \
          --query "identity" \
          --output json
        ```

        A passing resource returns a non-empty JSON object containing `principalId` or `userAssignedIdentities`. A failing resource returns `null` or an empty result.
      remediation:
        - id: portal
          desc: |
            To ensure Data Factory uses managed identity using the Azure Portal:

            1. Navigate to the [Azure Portal](https://portal.azure.com).
            2. Go to **Data factories** and select the target Data Factory instance.
            3. Under **Settings**, select **Identity**.
            4. Enable **System assigned** managed identity by setting the status to **On**.
            5. Select **Save**.

            Note: A system-assigned managed identity is automatically created when the Data Factory is created. If the identity was removed, re-enable it from this blade.
        - id: cli
          desc: |
            To ensure Data Factory uses managed identity using the Azure CLI:

            ```bash
            az resource update \
              --resource-group <resource-group-name> \
              --name <data-factory-name> \
              --resource-type Microsoft.DataFactory/factories \
              --set identity.type="SystemAssigned"
            ```
        - id: terraform
          desc: |
            To ensure Data Factory uses managed identity in Terraform:

            ```hcl
            resource "azurerm_data_factory" "example" {
              name                = "example-data-factory"
              location            = azurerm_resource_group.example.location
              resource_group_name = azurerm_resource_group.example.name

              identity {
                type = "SystemAssigned"
              }
            }
            ```
        - id: bicep
          desc: |
            To ensure Data Factory uses managed identity in Bicep:

            ```bicep
            resource dataFactory 'Microsoft.DataFactory/factories@2018-06-01' = {
              name: 'example-data-factory'
              location: resourceGroup().location
              identity: {
                type: 'SystemAssigned'
              }
              properties: {}
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/data-factory/data-factory-service-identity
        title: Managed identity for Azure Data Factory
