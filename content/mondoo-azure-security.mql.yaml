      - url: https://learn.microsoft.com/en-us/azure/key-vault/general/security-features
        title: Azure Key Vault Security
  - uid: mondoo-azure-security-ensure-logging-enabled-kv
    title: Ensure all operations in Azure Key Vault are logged
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-07
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-pr-pt-1
      compliance/nist-csf-2: nist-csf-2-pr-ps-04
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-12
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    variants:
      - uid: mondoo-azure-security-ensure-logging-enabled-kv-azure
        tags:
          mondoo.com/filter-title: Azure Key Vault
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-ensure-logging-enabled-kv-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-ensure-logging-enabled-kv-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-ensure-logging-enabled-kv-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure Key Vault instances have diagnostic logging enabled, sending audit and operational logs to a Storage Account, Log Analytics workspace, or Event Hub. By default, Key Vault does not emit diagnostic logs, meaning that key, secret, and certificate access operations are invisible to security monitoring systems.

        **Why this matters**

        - **Unauthorized access detection**: Key Vault logs record every successful and failed attempt to read, write, or delete keys, secrets, and certificates; without logs, an attacker who gains access to Key Vault can exfiltrate secrets silently.
        - **Privileged operation auditing**: Administrative operations such as access policy changes, purge events, and vault configuration changes are captured in audit logs; these are exactly the operations an attacker or insider threat would perform to cover tracks or escalate access.
        - **Anomaly detection**: Baseline access patterns for Key Vault are typically predictable; logs fed into a SIEM or Log Analytics can trigger alerts when access volume, timing, or principals deviate from normal, indicating a potential breach.
        - **Forensic reconstruction**: In the event of a key compromise, logs provide the evidence needed to determine when access began, which secrets were retrieved, and from which identity, supporting both incident response and regulatory breach notification.

        **Risk mitigation**

        - **Post-compromise investigation**: Retained Key Vault logs allow investigators to reconstruct the full timeline of key and secret access after a breach is discovered, determining what data was reachable using the compromised cryptographic material.
        - **Insider threat visibility**: Logging all Key Vault operations makes it possible to detect and investigate cases where a privileged user accesses secrets outside their normal scope or performs destructive operations such as key deletion.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to the Azure Portal at https://portal.azure.com.
        2. Go to **Key Vaults** and select a Key Vault.
        3. Under **Monitoring**, select **Diagnostic settings**.
        4. Verify that logging for both **audit** and **allLogs** categories are enabled and that they are configured to send logs to an Azure Storage Account, Log Analytics workspace, or Event Hub.

        **Automated Audit with Azure CLI:**

        Retrieve the diagnostic settings for each Key Vault to ensure that logging is enabled:

        ```bash
        az monitor diagnostic-settings list --resource <Key Vault Resource ID> --output table
        ```

        Ensure that the output shows that logs for audit and allLogs categories are enabled and properly configured to a storage account or other supported destinations.

        **Automated Audit with PowerShell:**

        ```powershell
        Get-AzKeyVault | ForEach-Object {
            Get-AzDiagnosticSetting -ResourceId $_.ResourceId
        }
        ```
        Verify that each Key Vault has audit and allLogs enabled and is logging to the designated destinations.
      remediation:
        - id: portal
          desc: |
            To ensure all operations in Azure Key Vault are logged using the Azure Portal:

            1. Log into Microsoft Azure Portal at https://portal.azure.com.
            2. Navigate to **Key Vaults**.
            3. Select a Key Vault and go to **Diagnostic settings**.
            4. Select **Add diagnostic setting** or edit an existing one.
            5. Ensure that both **audit** and **allLogs** categories are selected.
            6. Choose the appropriate destination for logs, such as a Storage Account or Log Analytics workspace.
            7. Save the changes.
        - id: cli
          desc: |
            To ensure all operations in Azure Key Vault are logged using the Azure CLI, create or update diagnostic settings for a Key Vault. Choose one of the following destinations:

            Send logs to a Storage Account:

            ```bash
            az monitor diagnostic-settings create --name "defaultLogs" --resource <Key Vault Resource ID> --logs '[{"category": "audit", "enabled": true}, {"category": "allLogs", "enabled": true}]' --storage-account <Storage Account ID>
            ```

            Send logs to a Log Analytics workspace:

            ```bash
            az monitor diagnostic-settings create --name "defaultLogs" --resource <Key Vault Resource ID> --logs '[{"category": "audit", "enabled": true}, {"category": "allLogs", "enabled": true}]' --workspace <Log Analytics Workspace ID>
            ```

            Send logs to an Event Hub:

            ```bash
            az monitor diagnostic-settings create --name "defaultLogs" --resource <Key Vault Resource ID> --logs '[{"category": "audit", "enabled": true}, {"category": "allLogs", "enabled": true}]' --event-hub <Event Hub Name>
            ```
        - id: powershell
          desc: |
            To ensure all operations in Azure Key Vault are logged using PowerShell, create or update diagnostic settings for a Key Vault. Choose one of the following destinations:

            Send logs to a Storage Account:

            ```powershell
            $logs = @(
                New-AzDiagnosticSettingLogConfig -Category "audit" -Enabled $true
                New-AzDiagnosticSettingLogConfig -Category "allLogs" -Enabled $true
            )
            Set-AzDiagnosticSetting -ResourceId <Key Vault Resource ID> -Log $logs -StorageAccountId <Storage Account ID>
            ```

            Send logs to a Log Analytics workspace:

            ```powershell
            $logs = @(
                New-AzDiagnosticSettingLogConfig -Category "audit" -Enabled $true
                New-AzDiagnosticSettingLogConfig -Category "allLogs" -Enabled $true
            )
            Set-AzDiagnosticSetting -ResourceId <Key Vault Resource ID> -Log $logs -WorkspaceId <Log Analytics Workspace ID>
            ```

            Send logs to an Event Hub:

            ```powershell
            $logs = @(
                New-AzDiagnosticSettingLogConfig -Category "audit" -Enabled $true
                New-AzDiagnosticSettingLogConfig -Category "allLogs" -Enabled $true
            )
            Set-AzDiagnosticSetting -ResourceId <Key Vault Resource ID> -Log $logs -EventHubAuthorizationRuleId <Event Hub Authorization Rule ID> -EventHubName <Event Hub Name>
            ```
        - id: terraform
          desc: |
            To ensure all operations in Azure Key Vault are logged in Terraform, create or update diagnostic settings for a Key Vault:

            ```hcl
            resource "azurerm_monitor_diagnostic_setting" "example" {
              name               = "kv-logging"
              target_resource_id = azurerm_key_vault.example.id
              log_analytics_workspace_id = azurerm_log_analytics_workspace.example.id

              log {
                category = "audit"
                enabled  = true

                retention_policy {
                  enabled = true
                  days    = 0
                }
              }

              log {
                category = "allLogs"
                enabled  = true

                retention_policy {
                  enabled = true
                  days    = 0
                }
              }

              metric {
                category = "AllMetrics"
                enabled  = false

                retention_policy {
                  enabled = false
                  days    = 0
                }
              }
            }
            ```
        - id: bicep
          desc: |
            To ensure all operations in Azure Key Vault are logged in Bicep:

            ```bicep
            resource diagnosticSetting 'Microsoft.Insights/diagnosticSettings@2021-05-01-preview' = {
              name: 'example-kv-diag'
              scope: keyVault
              properties: {
                workspaceId: logAnalyticsWorkspace.id
                logs: [
                  {
                    categoryGroup: 'allLogs'
                    enabled: true
                    retentionPolicy: {
                      enabled: true
                      days: 90
                    }
                  }
                ]
              }
            }
            ```
