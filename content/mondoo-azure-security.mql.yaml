      azure.subscription.containerAppService.containerApp.containers.all(imagePinned == true)
  - uid: mondoo-azure-security-container-app-image-digest-pinned-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "azurerm_container_app")
    mql: |
      terraform.resources.where(nameLabel == "azurerm_container_app").all(
        blocks.where(type == "template") != empty &&
        blocks.where(type == "template").all(
          blocks.where(type == "container") != empty &&
          blocks.where(type == "container").all(
            arguments['image'] != null && arguments['image'].contains("@sha256:")
          )
        )
      )
  - uid: mondoo-azure-security-container-app-image-digest-pinned-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "azurerm_container_app")
    mql: |
      terraform.plan.resourceChanges.where(type == "azurerm_container_app").all(
        change.after['template'] != null &&
        change.after['template'] != empty &&
        change.after['template'].all(
          _['container'] != null &&
          _['container'] != empty &&
          _['container'].all(_['image'].contains("@sha256:"))
        )
      )
  - uid: mondoo-azure-security-container-app-image-digest-pinned-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "azurerm_container_app")
    mql: |
      terraform.state.resources.where(type == "azurerm_container_app").all(
        values['template'] != null &&
        values['template'] != empty &&
        values['template'].all(
          _['container'] != null &&
          _['container'] != empty &&
          _['container'].all(_['image'].contains("@sha256:"))
        )
      )
  - uid: mondoo-azure-security-container-instance-private-registry
    title: Ensure Container Instances pull images from Azure Container Registry
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: false
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-19
      compliance/nis-2: nis-2-21-2-d
      compliance/nist-csf-1: nist-csf-1-id-sc-2
      compliance/nist-csf-2: nist-csf-2-id-ra-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-8
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc7-1-1
      compliance/vda-isa-5: vda-isa-5-1-3-3
    variants:
      - uid: mondoo-azure-security-container-instance-private-registry-azure
        tags:
          mondoo.com/filter-title: Azure Subscription
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-container-instance-private-registry-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-container-instance-private-registry-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-container-instance-private-registry-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that every container in an Azure Container Instance group references an image hosted in a private Azure Container Registry, identified by the `*.azurecr.io/` server prefix, rather than a public registry such as Docker Hub, Quay, or ghcr.io. Pulling from public registries exposes workloads to supply-chain attacks, typo-squatting, and unvetted image updates from external maintainers.

        **Why this matters**

        - **Supply-chain trust boundary**: Public registries serve images that any account can publish or update; workloads pulling from public namespaces inherit the trust posture of those publishers and are exposed to typo-squatting, account takeover, and supply-chain compromise of upstream maintainers.
        - **Access control and scanning coverage**: Azure Container Registry supports private network access, role-based access control, content trust, image scanning, and image signing; sourcing images from ACR keeps every running workload covered by the same policies that apply to internally produced images.
        - **Audit trail completeness**: Centralizing image pulls in ACR produces a complete record of who pushed each image and when, which is required by most regulated environments and cannot be reproduced with arbitrary public registries.

        **Risk mitigation**

        - **Malicious image injection prevention**: Restricting Container Instance groups to ACR-hosted images ensures that only images reviewed, scanned, and pushed by authorized principals in your organization's registry can run as workloads, closing the path for an attacker to substitute a malicious public image.
        - **Vulnerability scan enforcement**: When all images originate from ACR, organization-wide scanning and admission policies can be applied uniformly; public registry images bypass those controls and may run unscanned CVEs in production.
        - **Network egress reduction**: Pulling from a private ACR endpoint eliminates the public internet egress required to fetch images from Docker Hub or other public registries, reducing the attack surface for DNS hijacking or registry CDN compromise during image pulls.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Container instances** in the Azure Portal.
        2. Select a container group.
        3. Go to **Containers** under **Settings** and review each container's **Image** value.
        4. Confirm every image reference begins with a `*.azurecr.io/` host name pointing at an Azure Container Registry your organization controls.

        **Automated Audit with Azure CLI:**

        ```bash
        az container show --name <ContainerGroupName> --resource-group <ResourceGroupName> --query "containers[].properties.image"
        ```
      remediation:
        - id: portal
          desc: |
            To move a Container Instance group to a private Azure Container Registry source using the Azure Portal:

            1. Push the desired image to an Azure Container Registry your organization owns.
            2. Navigate to **Container instances** in the Azure Portal.
            3. Recreate the container group with the new image reference of the form `<RegistryName>.azurecr.io/<Repository>:<Tag>` or `<RegistryName>.azurecr.io/<Repository>@sha256:<Digest>`.
            4. Configure registry credentials using a managed identity or registry credentials backed by Azure Key Vault.
        - id: cli
          desc: |
            To launch a Container Instance group from a private Azure Container Registry using the Azure CLI:

            ```bash
            az container create \
              --name <ContainerGroupName> \
              --resource-group <ResourceGroupName> \
              --image <RegistryName>.azurecr.io/<Repository>@sha256:<Digest> \
              --acr-identity <UserAssignedIdentityResourceId> \
              --assign-identity <UserAssignedIdentityResourceId>
            ```
        - id: bicep
          desc: |
            To launch a Container Instance group from a private Azure Container Registry in Bicep:

            ```bicep
            resource containerGroup 'Microsoft.ContainerInstance/containerGroups@2023-05-01' = {
              name: 'example-group'
              location: resourceGroup().location
              identity: {
                type: 'UserAssigned'
                userAssignedIdentities: {
                  '${userAssignedIdentity.id}': {}
                }
              }
              properties: {
                osType: 'Linux'
                containers: [
                  {
                    name: 'app'
                    properties: {
                      image: 'myacr.azurecr.io/app@sha256:abcdef'
                      resources: {
                        requests: {
                          cpu: 1
                          memoryInGB: json('1.5')
                        }
                      }
                    }
                  }
                ]
                imageRegistryCredentials: [
                  {
                    server: 'myacr.azurecr.io'
                    identity: userAssignedIdentity.id
                  }
                ]
              }
            }
            ```
        - id: terraform
          desc: |
            To launch a Container Instance group from a private Azure Container Registry in Terraform, set every `container.image` to an `*.azurecr.io/` reference and authenticate with a user-assigned identity:

            ```hcl
            resource "azurerm_user_assigned_identity" "ci" {
              name                = "example-ci-identity"
              resource_group_name = azurerm_resource_group.example.name
              location            = azurerm_resource_group.example.location
            }

            resource "azurerm_role_assignment" "acr_pull" {
              scope                = azurerm_container_registry.example.id
              role_definition_name = "AcrPull"
              principal_id         = azurerm_user_assigned_identity.ci.principal_id
            }

            resource "azurerm_container_group" "example" {
              name                = "example-group"
              resource_group_name = azurerm_resource_group.example.name
              location            = azurerm_resource_group.example.location
              os_type             = "Linux"

              identity {
                type         = "UserAssigned"
                identity_ids = [azurerm_user_assigned_identity.ci.id]
              }

              image_registry_credential {
                server                    = azurerm_container_registry.example.login_server
                user_assigned_identity_id = azurerm_user_assigned_identity.ci.id
              }

              container {
                name   = "app"
                image  = "${azurerm_container_registry.example.login_server}/app@sha256:abcdef"
                cpu    = "1"
                memory = "1.5"

                ports {
                  port     = 80
                  protocol = "TCP"
                }
              }
            }
            ```
