  - uid: mondoo-azure-security-log-analytics-public-query-disabled
    title: Ensure Log Analytics workspaces disable public query access
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-azure-security-log-analytics-public-query-disabled-azure
        tags:
          mondoo.com/filter-title: Azure Subscription
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-log-analytics-public-query-disabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-log-analytics-public-query-disabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-log-analytics-public-query-disabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that public network access for queries is disabled on Azure Log Analytics workspaces. Disabling public query access prevents log data from being queried over the public internet.

        **Why this matters**

        - Public query access allows authorized users to query log data from any network, increasing the risk of data exposure if credentials are compromised.
        - Restricting queries to private networks adds a network-level barrier that limits the blast radius of credential compromise.
        - Log data often contains sensitive information including IP addresses, user activities, error details, and security events.

        **Risk mitigation**

        - **Data confidentiality:** Log query results cannot be retrieved over the public internet.
        - **Defense in depth:** Network-level restriction complements identity-based access controls.
        - **Reduced blast radius:** Compromised credentials cannot be used to exfiltrate log data from outside the private network.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Log Analytics workspaces** in the Azure Portal.
        2. Select a workspace.
        3. Go to **Network Isolation** under **Settings**.
        4. Verify that **Public network access for queries** is **Disabled**.
      remediation:
        - id: portal
          desc: |
            To disable public query access using the Azure Portal:

            1. Navigate to **Log Analytics workspaces** in the Azure Portal.
            2. Select the workspace.
            3. Go to **Network Isolation** under **Settings**.
            4. Set **Public network access for queries** to **Disabled**.
        - id: cli
          desc: |
            To disable public query access using the Azure CLI:

            ```bash
            az monitor log-analytics workspace update \
              --workspace-name <WorkspaceName> \
              --resource-group <ResourceGroupName> \
              --query-access Disabled
            ```
        - id: terraform
          desc: |
            To disable public query access in Terraform:

            ```hcl
            resource "azurerm_log_analytics_workspace" "example" {
              name                          = "example-workspace"
              location                      = azurerm_resource_group.example.location
              resource_group_name           = azurerm_resource_group.example.name
              sku                           = "PerGB2018"
              internet_query_enabled        = false
            }
            ```
        - id: bicep
          desc: |
            To disable public query access in Bicep:

            ```bicep
            resource workspace 'Microsoft.OperationalInsights/workspaces@2023-09-01' = {
              name: 'example-workspace'
              location: resourceGroup().location
              properties: {
                sku: {
                  name: 'PerGB2018'
                }
                publicNetworkAccessForQuery: 'Disabled'
              }
            }
            ```
