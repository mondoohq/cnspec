    docs:
      desc: |
        This check ensures that Azure Function Apps have public network access disabled, requiring all inbound HTTP traffic to flow through private endpoints or VNet integration.

        **Why this matters**

        - **Network isolation**: Function endpoints exposed to the public internet are easily discoverable by attackers scanning Azure-owned IP ranges and are routinely abused for credential probing and HTTP-trigger replay.
        - **Private connectivity**: Disabling public access forces traffic through private endpoints, so only authorized peered networks can invoke the function HTTP trigger.
        - **Defense in depth**: Network-level restrictions complement function-key, Easy Auth, and managed-identity controls so a stolen function key cannot be replayed from outside the VNet.

        **Risk mitigation**

        - Set the Function App's public network access to **Disabled** and configure private endpoints.
        - Front internet-facing function endpoints with Azure Front Door or Application Gateway over private link instead of exposing the function app directly.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Function App** in the Azure Portal.
        2. Select a function app.
        3. Open **Networking** under **Settings**.
        4. Verify that **Public network access** is **Disabled**.

        **Automated Audit with Azure CLI:**

        ```bash
        az functionapp show --resource-group <ResourceGroupName> --name <FunctionAppName> --query "publicNetworkAccess"
        ```
      remediation:
        - id: portal
          desc: |
            To disable public network access on a Function App using the Azure Portal:

            1. Navigate to **Function App** in the Azure Portal.
            2. Select the function app.
            3. Under **Settings**, select **Networking**.
            4. Set **Public network access** to **Disabled**.
            5. Configure private endpoints for authorized network access.
            6. Select **Save**.
        - id: cli
          desc: |
            To disable public network access on a Function App using the Azure CLI:

            ```bash
            az functionapp update --resource-group <ResourceGroupName> --name <FunctionAppName> --set publicNetworkAccess=Disabled
            ```
        - id: terraform
          desc: |
            To disable public network access on a Function App in Terraform:

            ```hcl
            resource "azurerm_linux_function_app" "example" {
              name                          = "example-funcapp"
              resource_group_name           = azurerm_resource_group.example.name
              location                      = azurerm_resource_group.example.location
              service_plan_id               = azurerm_service_plan.example.id
              storage_account_name          = azurerm_storage_account.example.name
              storage_account_access_key    = azurerm_storage_account.example.primary_access_key
              public_network_access_enabled = false

              site_config {}
            }
            ```
        - id: bicep
          desc: |
            To disable public network access on a Function App in Bicep:

            ```bicep
            resource functionApp 'Microsoft.Web/sites@2023-01-01' = {
              name: 'example-funcapp'
              location: resourceGroup().location
              kind: 'functionapp,linux'
              properties: {
                serverFarmId: appServicePlan.id
                publicNetworkAccess: 'Disabled'
              }
            }
            ```
