  # No Terraform variants: WireGuard transit encryption for AKS is controlled by the
  # advancedNetworking.transitEncryptionType property, which the azurerm_kubernetes_cluster
  # resource does not currently expose. The feature can only be enabled through the Azure CLI or
  # ARM API after provisioning.
  - uid: mondoo-azure-security-aks-wireguard-transit-encryption
    title: Ensure AKS uses WireGuard for transit encryption
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    variants:
      - uid: mondoo-azure-security-aks-wireguard-transit-encryption-azure
        tags:
          mondoo.com/filter-title: Azure AKS Cluster
          mondoo.com/filter-icon: azure
    docs:
      desc: |
        This check ensures that AKS clusters have WireGuard-based transit encryption enabled for pod-to-pod communication, protecting network traffic between nodes.

        **Why this matters**

        - **Data confidentiality**: Without transit encryption, pod-to-pod traffic traverses the node network in plaintext, exposing sensitive data to network-level interception.
        - **Zero-trust networking**: WireGuard encryption ensures that even compromised network infrastructure cannot read inter-pod communications.
        - **Compliance alignment**: Many regulatory frameworks require encryption of data in transit, including internal network communications.

        **Risk mitigation**

        - Enable WireGuard transit encryption on AKS clusters to protect pod-to-pod traffic.
        - Use Azure CNI Overlay or Cilium network plugin which supports WireGuard integration.
      audit: |
        ### Audit via Portal

        1. Navigate to **Kubernetes services** in the Azure Portal.
        2. Select the AKS cluster.
        3. Under **Settings**, select **Cluster networking**.
        4. Review the network configuration for the cluster.

        Note: The WireGuard transit encryption setting is not exposed in the Portal. Use the Azure CLI to confirm the `transitEncryptionType` field.

        ### Audit via CLI

        1. Run the following command, substituting your resource group and cluster name:

        ```bash
        az aks show --resource-group <ResourceGroupName> --name <ClusterName> --query "networkProfile.advancedNetworking.security.transitEncryption" -o tsv
        ```

        A passing resource returns `WireGuard`. A failing resource returns `None` or an empty value.
      remediation:
        - id: portal
          desc: |
            To ensure AKS uses WireGuard for transit encryption using the Azure Portal:

            1. Navigate to **Kubernetes services** in the Azure Portal.
            2. Select the AKS cluster.
            3. Review the cluster networking configuration.

            Note: WireGuard transit encryption is only configurable via Azure CLI or API. It cannot be enabled through the Azure Portal.
        - id: cli
          desc: |
            To ensure AKS uses WireGuard for transit encryption using the Azure CLI, enable WireGuard transit encryption when creating a new cluster:

            ```bash
            az aks create --resource-group <ResourceGroupName> --name <ClusterName> --network-plugin azure --network-plugin-mode overlay --network-dataplane cilium --pod-cidr 192.168.0.0/16
            ```

            Enable on an existing cluster:

            ```bash
            az aks update --resource-group <ResourceGroupName> --name <ClusterName> --network-dataplane cilium
            ```
        - id: bicep
          desc: |
            To ensure AKS uses WireGuard for transit encryption in Bicep, note: WireGuard transit encryption is configured through the Azure CNI Overlay networking profile. Bicep support for the `advancedNetworking.security` property may be limited. Use Azure CLI to enable WireGuard on AKS clusters.

            ```bicep
            resource aksCluster 'Microsoft.ContainerService/managedClusters@2024-01-01' = {
              name: 'example-aks'
              location: resourceGroup().location
              properties: {
                networkProfile: {
                  networkPlugin: 'azure'
                  networkPluginMode: 'overlay'
                }
                // WireGuard enablement may require CLI post-deployment
              }
            }
            ```
        - id: terraform
          desc: |
            To ensure AKS uses WireGuard for transit encryption in Terraform, wireGuard transit encryption for AKS is only configurable via Azure CLI or the Azure API. The `azurerm_kubernetes_cluster` Terraform resource does not currently support the WireGuard enablement flag. Use the Azure CLI to enable WireGuard on the cluster after provisioning with Terraform.
    refs:
      - url: https://learn.microsoft.com/en-us/azure/aks/wireguard
        title: WireGuard-based encryption in AKS
