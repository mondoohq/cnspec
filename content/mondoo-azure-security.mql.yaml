  - uid: mondoo-azure-security-acr-private-endpoints
    title: Ensure ACR has private endpoint connections configured
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-azure-security-acr-private-endpoints-azure
        tags:
          mondoo.com/filter-title: Azure Container Registry
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-acr-private-endpoints-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-acr-private-endpoints-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-acr-private-endpoints-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure Container Registry instances have at least one private endpoint connection configured. Private endpoints enable secure access through private network connectivity using Azure Private Link.

        **Why this matters**

        - Private endpoints ensure that registry traffic stays within the Azure backbone network, eliminating internet exposure.
        - Without private endpoints, registry access traverses the public internet even when firewall rules restrict access by IP.
        - Azure Private Link provides data exfiltration protection by ensuring traffic cannot be redirected to unauthorized destinations.

        **Risk mitigation**

        - **Network isolation:** Registry traffic uses private IP addresses within the virtual network.
        - **Data exfiltration prevention:** Private Link prevents traffic from being redirected outside the Microsoft backbone.
        - **Compliance:** Satisfies network isolation requirements for sensitive container registries.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Container registries** in the Azure Portal.
        2. Select a container registry.
        3. Go to **Networking** under **Settings**.
        4. Select the **Private endpoint connections** tab.
        5. Verify that at least one private endpoint connection exists.
      remediation:
        - id: portal
          desc: |
            To configure private endpoints using the Azure Portal:

            1. Navigate to **Container registries** in the Azure Portal.
            2. Select the container registry (must be Premium SKU).
            3. Go to **Networking** under **Settings**.
            4. Select the **Private endpoint connections** tab.
            5. Select **+ Private endpoint** and configure the virtual network, subnet, and DNS settings.
            6. Select **Review + create**, then **Create**.
        - id: cli
          desc: |
            Look up the registry resource ID, create a private endpoint that targets it, then disable public network access using the Azure CLI:

            ```bash
            az acr show \
              --name <RegistryName> \
              --resource-group <ResourceGroupName> \
              --query id \
              --output tsv

            az network private-endpoint create \
              --name <PrivateEndpointName> \
              --resource-group <ResourceGroupName> \
              --vnet-name <VNetName> \
              --subnet <SubnetName> \
              --private-connection-resource-id <RegistryResourceId> \
              --group-id registry \
              --connection-name <ConnectionName>

            az acr update \
              --name <RegistryName> \
              --resource-group <ResourceGroupName> \
              --public-network-enabled false
            ```
        - id: terraform
          desc: |
            To configure private endpoints in Terraform:

            ```hcl
            resource "azurerm_private_endpoint" "acr" {
              name                = "example-acr-pe"
              location            = azurerm_resource_group.example.location
              resource_group_name = azurerm_resource_group.example.name
              subnet_id           = azurerm_subnet.example.id

              private_service_connection {
                name                           = "example-acr-psc"
                private_connection_resource_id = azurerm_container_registry.example.id
                subresource_names              = ["registry"]
                is_manual_connection           = false
              }
            }
            ```
        - id: bicep
          desc: |
            To configure private endpoints for ACR in Bicep:

            ```bicep
            resource privateEndpoint 'Microsoft.Network/privateEndpoints@2024-05-01' = {
              name: 'example-acr-pe'
              location: resourceGroup().location
              properties: {
                subnet: {
                  id: subnet.id
                }
                privateLinkServiceConnections: [
                  {
                    name: 'acr-psc'
                    properties: {
                      privateLinkServiceId: acr.id
                      groupIds: [
                        'registry'
                      ]
                    }
                  }
                ]
              }
            }
            ```
