        change.after.network_profile.all(network_plugin != "kubenet")
      )
  - uid: mondoo-azure-security-aks-no-kubenet-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "azurerm_kubernetes_cluster")
