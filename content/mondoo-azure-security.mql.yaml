          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that public network access is disabled on Azure Container Registry instances. Disabling public access forces all registry traffic through private endpoints, preventing unauthorized access from the internet.

        **Why this matters**

        - Public registries are exposed to the internet and can be targeted by brute-force attacks, credential stuffing, or vulnerability scanning.
        - Private endpoints ensure that registry traffic stays within the Azure backbone network, reducing the attack surface.
        - Disabling public access is a key control for meeting network isolation requirements in compliance frameworks.

        **Risk mitigation**

        - **Network isolation:** All registry access occurs through private network paths.
        - **Reduced attack surface:** Eliminates internet-facing endpoints that could be exploited.
        - **Data exfiltration prevention:** Private Link ensures traffic traverses the Microsoft backbone network.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Container registries** in the Azure Portal.
        2. Select a container registry.
        3. Go to **Networking** under **Settings**.
        4. Verify that **Public network access** is set to **Disabled**.

        **Automated Audit with Azure CLI:**

        ```bash
        az acr show --name <RegistryName> --query "publicNetworkAccess"
        ```
      remediation:
        - id: portal
          desc: |
            To disable public network access using the Azure Portal:

            1. Navigate to **Container registries** in the Azure Portal.
            2. Select the container registry.
            3. Go to **Networking** under **Settings**.
            4. Set **Public network access** to **Disabled**.
            5. Ensure private endpoint connections are configured before disabling public access.
        - id: cli
          desc: |
            To disable public network access using the Azure CLI:

            ```bash
            az acr update --registry-name <RegistryName> --public-network-enabled false
            ```
        - id: terraform
          desc: |
            To disable public network access in Terraform:

            ```hcl
            resource "azurerm_container_registry" "example" {
              name                          = "exampleregistry"
              resource_group_name           = azurerm_resource_group.example.name
              location                      = azurerm_resource_group.example.location
              sku                           = "Premium"
              public_network_access_enabled = false
            }
            ```
        - id: bicep
          desc: |
            To disable public network access in Bicep:

            ```bicep
            resource acr 'Microsoft.ContainerRegistry/registries@2023-07-01' = {
              name: 'exampleregistry'
              location: resourceGroup().location
              sku: {
                name: 'Premium'
              }
              properties: {
                publicNetworkAccess: 'Disabled'
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/container-registry/container-registry-access-selected-networks
        title: Configure public IP network rules
