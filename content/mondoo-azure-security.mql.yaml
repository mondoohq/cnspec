      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    variants:
      - uid: mondoo-azure-security-function-app-min-tls-1-2-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-function-app-min-tls-1-2-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-function-app-min-tls-1-2-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure Function Apps enforce a minimum TLS version of 1.2 on the main site, preventing clients from negotiating TLS 1.0 or 1.1 against the function endpoints.

        **Why this matters**

        - **Protocol weaknesses**: TLS 1.0 and 1.1 are vulnerable to BEAST, POODLE, and other downgrade or cryptographic attacks that can expose function request and response bodies in flight.
        - **HTTPS-only is not enough**: A function app set to HTTPS-only still negotiates whatever TLS versions the site config allows; without an explicit minimum, TLS 1.0/1.1 connections may succeed.
        - **Compliance**: PCI DSS, NIST SP 800-53, and HIPAA require TLS 1.2 or higher for data in transit; lower versions put the workload out of compliance.

        **Risk mitigation**

        - Set `site_config.minimum_tls_version` to `"1.2"` on every function app (Linux and Windows).
        - Pair this check with the function-app HTTPS-only check so unencrypted HTTP is rejected and remaining TLS traffic is at least TLS 1.2.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Function Apps** in the Azure Portal.
        2. Select a function app.
        3. Under **Settings**, open **Configuration** then **General settings**.
        4. Verify that **Minimum Inbound TLS Version** is **1.2**.

        **Automated Audit with Azure CLI:**

        ```bash
        az functionapp config show --resource-group <ResourceGroupName> --name <FunctionAppName> --query "minTlsVersion"
        ```
      remediation:
        - id: portal
          desc: |
            To enforce TLS 1.2 on a Function App using the Azure Portal:

            1. Navigate to **Function Apps** in the Azure Portal.
            2. Select the function app.
            3. Under **Settings**, select **Configuration** then **General settings**.
            4. Set **Minimum Inbound TLS Version** to **1.2**.
            5. Select **Save**.
        - id: cli
          desc: |
            To enforce TLS 1.2 on a Function App using the Azure CLI:

            ```bash
            az functionapp config set --resource-group <ResourceGroupName> --name <FunctionAppName> --min-tls-version 1.2
            ```
        - id: terraform
          desc: |
            To enforce TLS 1.2 on a Function App in Terraform:

            ```hcl
            resource "azurerm_linux_function_app" "example" {
              name                = "example-function"
              resource_group_name = azurerm_resource_group.example.name
              location            = azurerm_resource_group.example.location
              service_plan_id     = azurerm_service_plan.example.id
              storage_account_name       = azurerm_storage_account.example.name
              storage_account_access_key = azurerm_storage_account.example.primary_access_key

              https_only = true

              site_config {
                minimum_tls_version = "1.2"
              }
            }
            ```
        - id: bicep
          desc: |
            To enforce TLS 1.2 on a Function App in Bicep:

            ```bicep
            resource functionApp 'Microsoft.Web/sites@2024-04-01' = {
              name: 'example-function'
              location: resourceGroup().location
              kind: 'functionapp,linux'
              properties: {
                httpsOnly: true
                serverFarmId: appServicePlan.id
                siteConfig: {
                  minTlsVersion: '1.2'
                }
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/app-service/configure-ssl-bindings
        title: Configure TLS/SSL settings for Azure App Service and Functions
