        values['encryption'] != empty
      )
  - uid: mondoo-azure-security-function-app-cmk-encryption
    title: Ensure Function Apps reference a managed identity for Key Vault access
    impact: 30
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-2
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-8
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-azure-security-function-app-cmk-encryption-azure
        tags:
          mondoo.com/filter-title: Azure Functions
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-function-app-cmk-encryption-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-function-app-cmk-encryption-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-function-app-cmk-encryption-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This is a soft check that verifies each Function App declares a `keyVaultReferenceIdentity` so that Key Vault references in app settings resolve through a managed identity rather than the App Service shared identity. Setting this property is a prerequisite for the customer-managed-key pattern used to encrypt application secrets and the storage account backing the function host.

        **Why this matters**

        - **Function App encryption surface**: A Function App does not have a single CMK toggle. End-to-end customer-managed encryption requires the backing storage account to use CMK and the function host to read secrets through a managed identity that has access to the Key Vault holding those secrets. The `keyVaultReferenceIdentity` property is the integration point that ties those two halves together.
        - **Identity-based Key Vault access**: When `keyVaultReferenceIdentity` is set, the function reads secrets using its own managed identity, so revoking that identity's Key Vault access revokes the function's ability to use the secrets. This is a meaningful incident-response lever.
        - **Posture signal**: A Function App that does not declare this property is almost certainly not participating in a CMK-managed secret flow. The presence of the property does not by itself prove CMK is end-to-end, but its absence is a strong negative signal worth flagging for review.

        **Risk mitigation**

        - Set `key_vault_reference_identity` on `azurerm_linux_function_app` or `azurerm_windows_function_app` to a user-assigned managed identity with `Key Vault Secrets User` on the secrets Key Vault.
        - Ensure the storage account in `storage_account_name` is itself configured with CMK using `azurerm_storage_account.customer_managed_key`.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Function App** in the Azure Portal.
        2. Select a function app.
        3. Open **Identity** under **Settings** and confirm a system-assigned or user-assigned identity is configured.
        4. Open **Configuration** under **Settings** and confirm that **Key Vault reference identity** is set to a managed identity (not **System assigned**, unless that is the intended identity).

        **Automated Audit with Azure CLI:**

        ```bash
        az functionapp show --resource-group <ResourceGroupName> --name <FunctionAppName> --query "properties.keyVaultReferenceIdentity"
        ```
      remediation:
        - id: portal
          desc: |
            To configure a Key Vault reference identity on a Function App using the Azure Portal:

            1. Ensure the function app has a user-assigned managed identity attached under **Identity**.
            2. Grant that identity **Key Vault Secrets User** on the Key Vault holding application secrets.
            3. Under **Configuration**, set **Key Vault reference identity** to the user-assigned identity.
            4. Confirm that the storage account in **Configuration** is itself configured with customer-managed key encryption.
        - id: cli
          desc: |
            To configure a Key Vault reference identity on a Function App using the Azure CLI:

            ```bash
            az functionapp update \
              --resource-group <ResourceGroupName> \
              --name <FunctionAppName> \
              --set properties.keyVaultReferenceIdentity=<UserAssignedIdentityResourceId>
            ```
        - id: terraform
          desc: |
            To configure a Key Vault reference identity on a Function App in Terraform:

            ```hcl
            resource "azurerm_linux_function_app" "example" {
              name                          = "example-funcapp"
              resource_group_name           = azurerm_resource_group.example.name
              location                      = azurerm_resource_group.example.location
              service_plan_id               = azurerm_service_plan.example.id
              storage_account_name          = azurerm_storage_account.example.name
              storage_account_access_key    = azurerm_storage_account.example.primary_access_key
              key_vault_reference_identity  = azurerm_user_assigned_identity.example.id

              identity {
                type         = "UserAssigned"
                identity_ids = [azurerm_user_assigned_identity.example.id]
              }

              site_config {}
            }
            ```
        - id: bicep
          desc: |
            To configure a Key Vault reference identity on a Function App in Bicep:

            ```bicep
            resource functionApp 'Microsoft.Web/sites@2023-01-01' = {
              name: 'example-funcapp'
              location: resourceGroup().location
              kind: 'functionapp,linux'
              identity: {
                type: 'UserAssigned'
                userAssignedIdentities: {
                  '${userAssignedIdentity.id}': {}
                }
              }
              properties: {
                serverFarmId: appServicePlan.id
                keyVaultReferenceIdentity: userAssignedIdentity.id
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/app-service/app-service-key-vault-references
        title: Use Key Vault references for App Service and Azure Functions
