  - uid: mondoo-azure-security-sql-threat-detection-types-configured
    title: Ensure SQL threat detection types are configured
    impact: 60
    variants:
      - uid: mondoo-azure-security-sql-threat-detection-types-configured-azure
        tags:
          mondoo.com/filter-title: Azure SQL Server
          mondoo.com/icon: azure
      - uid: mondoo-azure-security-sql-threat-detection-types-configured-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/icon: terraform
      - uid: mondoo-azure-security-sql-threat-detection-types-configured-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/icon: terraform
      - uid: mondoo-azure-security-sql-threat-detection-types-configured-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/icon: terraform
    docs:
      desc: |
        This check ensures that all SQL threat detection alert types are enabled and none have been disabled. Azure SQL threat detection monitors for SQL injection, SQL injection vulnerabilities, anomalous client login, access from unusual locations, and other threat patterns.

        **Why this matters**

        - **Reduced coverage:** Disabling specific alert types creates blind spots in threat detection coverage.
        - **Attack detection:** Each alert type detects a different attack vector. Disabling any type means that specific attack pattern will go undetected.
      remediation:
        - id: cli
          desc: |
            **Using Azure CLI**

            Enable all threat detection types:

            ```bash
            az sql server threat-policy update \
              --resource-group <rg> --server <server> \
              --state Enabled \
              --disabled-alerts ""
            ```
        - id: bicep
          desc: |
            **Using Bicep**

            ```bicep
            resource sqlThreatPolicy 'Microsoft.Sql/servers/securityAlertPolicies@2022-05-01-preview' = {
              parent: sqlServer
              name: 'default'
              properties: {
                state: 'Enabled'
                disabledAlerts: []
              }
            }
            ```
        - id: terraform
          desc: |
            **Using Terraform**

            ```hcl
            resource "azurerm_mssql_server_security_alert_policy" "example" {
              resource_group_name = azurerm_resource_group.example.name
              server_name         = azurerm_mssql_server.example.name
              state               = "Enabled"
              disabled_alerts     = []
            }
            ```
        - id: portal
          desc: |
            **Using Azure Portal**

            1. Navigate to **SQL servers**.
            2. Select the server.
            3. Go to **Microsoft Defender for SQL** under **Security**.
            4. Select **Configure**.
            5. Ensure all **Advanced Threat Protection types** are enabled.
            6. Select **Save**.
    refs:
      - url: https://learn.microsoft.com/en-us/azure/azure-sql/database/threat-detection-configure
        title: Azure Documentation - Configure Advanced Threat Protection
  - uid: mondoo-azure-security-sql-threat-detection-types-configured-azure
    filters: |
