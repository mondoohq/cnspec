  - uid: mondoo-azure-security-redis-cmk-encryption
    title: Ensure Azure Cache for Redis uses CMK encryption
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-azure-security-redis-cmk-encryption-azure
        tags:
          mondoo.com/filter-title: Azure Cache for Redis
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-redis-cmk-encryption-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-redis-cmk-encryption-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-redis-cmk-encryption-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure Cache for Redis uses customer-managed keys for encryption, providing key lifecycle control for cached data at rest.

        **Why this matters**

        - **Key lifecycle control**: Customer-managed keys allow organizations to control key rotation, revocation, and access policies for Redis data encryption.
        - **Compliance alignment**: Many regulatory frameworks require customer-managed encryption keys for data at rest.
        - **Data sovereignty**: CMK ensures that encryption keys remain under the customer's control.

        **Risk mitigation**

        - Configure customer-managed key encryption on Azure Cache for Redis instances.
        - Implement key rotation policies in Azure Key Vault.
      audit: |
        ### Audit via Portal

        1. Navigate to **Azure Cache for Redis** in the Azure Portal.
        2. Select the cache instance.
        3. Under **Settings**, select **Encryption**.
        4. Review the **Encryption key** setting.

        A passing resource shows a configured **Customer-managed key**. A failing resource shows no customer-managed key configured.

        ### Audit via CLI

        1. Run the following command, substituting your resource group and cache name:

        ```bash
        az redis show \
          --resource-group <ResourceGroupName> \
          --name <CacheName> \
          --query "redisConfiguration" -o json
        ```

        A passing resource returns a `redisConfiguration` object containing `customer-managed-key-encryption` with a configured key URI. A failing resource returns no `customer-managed-key-encryption` field.
      remediation:
        - id: portal
          desc: |
            To ensure Azure Cache for Redis uses CMK encryption using the Azure Portal:

            1. Navigate to **Azure Cache for Redis** in the Azure Portal.
            2. Select the cache instance.
            3. Under **Settings**, select **Encryption**.
            4. Select **Customer-managed key**.
            5. Configure the Key Vault and key.
            6. Select **Save**.

            Note: CMK encryption must be configured at cache creation time. To enable CMK on an existing cache, the cache must be recreated with CMK enabled.
        - id: cli
          desc: |
            To ensure Azure Cache for Redis uses CMK encryption using the Azure CLI:

            ```bash
            az redis create \
              --resource-group <ResourceGroupName> \
              --name <CacheName> \
              --location <Location> \
              --sku Premium \
              --vm-size p1 \
              --mi-user-assigned <UserAssignedIdentityResourceId> \
              --redis-configuration '{"customer-managed-key-encryption": {"identity-type": "userAssignedIdentity", "key-encryption-key-url": "<KeyVaultKeyUrl>", "user-assigned-identity-resource-id": "<IdentityResourceId>"}}'
            ```

            Note: CMK encryption must be configured at cache creation time. To update an existing cache, recreate it with CMK enabled.
        - id: terraform
          desc: |
            To ensure Azure Cache for Redis uses CMK encryption in Terraform:

            ```hcl
            resource "azurerm_redis_cache" "example" {
              name                = "example-redis"
              location            = azurerm_resource_group.example.location
              resource_group_name = azurerm_resource_group.example.name
              capacity            = 1
              family              = "P"
              sku_name            = "Premium"

              redis_configuration {
                customer_managed_key_id = azurerm_key_vault_key.example.id
              }

              identity {
                type         = "UserAssigned"
                identity_ids = [azurerm_user_assigned_identity.example.id]
              }
            }
            ```
        - id: bicep
          desc: |
            To ensure Azure Cache for Redis uses CMK encryption in Bicep:

            ```bicep
            resource redisCache 'Microsoft.Cache/redis@2023-08-01' = {
              name: 'example-redis'
              location: resourceGroup().location
              identity: {
                type: 'UserAssigned'
                userAssignedIdentities: {
                  '${managedIdentity.id}': {}
                }
              }
              properties: {
                sku: {
                  name: 'Premium'
                  family: 'P'
                  capacity: 1
                }
                redisConfiguration: {
                  'customer-managed-key-encryption': {
                    identityType: 'userAssignedIdentity'
                    keyEncryptionKeyUrl: keyVaultKey.properties.keyUriWithVersion
                    userAssignedIdentityResourceId: managedIdentity.id
                  }
                }
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/azure-cache-for-redis/cache-customer-managed-keys
        title: Configure customer-managed keys for Azure Cache for Redis
