        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure Recovery Services Vaults have monitoring alerts enabled for critical operations such as stopping protection, deleting backup data, and modifying security settings.

        **Why this matters**

        - Critical operations like stopping protection or deleting backup data could indicate a ransomware attack or malicious insider activity.
        - Without alerts on these operations, attackers can quietly disable backup protection before launching a destructive attack.
        - Timely notification of critical operations enables rapid investigation and response.

        **Risk mitigation**

        - **Attack detection:** Alerts on destructive operations provide early warning of potential ransomware or insider attacks.
        - **Rapid response:** Teams can investigate and potentially reverse unauthorized operations before damage is done.
        - **Accountability:** Creates an alert trail for all high-impact changes to backup configuration.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Recovery Services vaults** in the Azure Portal.
        2. Select a vault.
        3. Go to **Properties** under **Settings**.
        4. Under **Monitoring settings**, verify that **Alerts for critical operations** is enabled.
      remediation:
        - id: portal
          desc: |
            To enable critical operation alerts using the Azure Portal:

            1. Navigate to **Recovery Services vaults** in the Azure Portal.
            2. Select the vault.
            3. Go to **Properties** under **Settings**.
            4. Under **Monitoring settings**, select **Update**.
            5. Enable **Alerts for critical operations**.
            6. Save the changes.
        - id: cli
          desc: |
            Enable the vault's built-in classic alerts for critical operations using the Azure CLI:

            ```bash
            az backup vault backup-properties set \
              --name <VaultName> \
              --resource-group <ResourceGroupName> \
              --classic-alerts Enable
            ```

            Wire alerts to a notification channel by creating an action group and attaching it to the vault's built-in alert rules through the **Backup center → Alerts → Manage notifications** workflow.
        - id: terraform
          desc: |
            To enable critical operation alerts in Terraform. The default is `true`, so leaving the `monitoring` block off also passes; declaring it explicitly prevents drift:

            ```hcl
            resource "azurerm_recovery_services_vault" "example" {
              name                = "example-vault"
              location            = azurerm_resource_group.example.location
              resource_group_name = azurerm_resource_group.example.name
              sku                 = "Standard"

              monitoring {
                alerts_for_critical_operation_failures_enabled = true
              }
            }
            ```
        - id: bicep
          desc: |
            To enable critical operation alerts in Bicep:

            ```bicep
            resource vault 'Microsoft.RecoveryServices/vaults@2024-04-01' = {
              name: 'example-vault'
              location: resourceGroup().location
              sku: {
                name: 'RS0'
                tier: 'Standard'
              }
              properties: {
                monitoringSettings: {
                  classicAlertSettings: {
                    alertsForCriticalOperations: 'Enabled'
                  }
                }
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/backup/backup-azure-monitoring-built-in-monitor
        title: Monitor Azure Backup with Azure Monitor
