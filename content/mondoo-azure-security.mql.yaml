        change.after['queue_properties'] != empty &&
        change.after['queue_properties'].all(
          _['logging'] != empty &&
          _['logging'].all(_['read'] == true && _['write'] == true && _['delete'] == true)
        )
      )
  - uid: mondoo-azure-security-storage-queue-logging-enabled-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "azurerm_storage_account")
    mql: |
