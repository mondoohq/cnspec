  - uid: mondoo-azure-security-cosmosdb-multi-region-write
    title: Ensure multi-region Cosmos DB accounts have multi-region write enabled
    impact: 40
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-14
      compliance/nis-2: nis-2-21-2-c
      compliance/nist-csf-1: nist-csf-1-pr-ip-4
      compliance/nist-csf-2: nist-csf-2-pr-ds-11
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cp-9
      compliance/nist-sp-800-171: "false"
      compliance/soc2-2017: soc2-control-cc9-1-1
    variants:
      - uid: mondoo-azure-security-cosmosdb-multi-region-write-azure
        tags:
          mondoo.com/filter-title: Azure Cosmos DB Account
          mondoo.com/icon: azure
      - uid: mondoo-azure-security-cosmosdb-multi-region-write-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/icon: terraform
      - uid: mondoo-azure-security-cosmosdb-multi-region-write-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/icon: terraform
      - uid: mondoo-azure-security-cosmosdb-multi-region-write-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/icon: terraform
    docs:
      desc: |
        This check ensures that Azure Cosmos DB accounts distributed across multiple regions have multi-region write enabled, reducing write latency and improving availability.

        **Why this matters**

        Enabling multi-region write on multi-region Cosmos DB accounts provides several critical benefits:

        - **Reduced write latency**: Writes can be performed in the nearest region, reducing latency for globally distributed applications.
        - **Improved availability**: Eliminates the single point of failure for write operations during regional outages.
        - **Business continuity**: Complements automatic failover by enabling write operations to continue in any region during outages.
      audit: |
        **Automated Audit with Azure CLI:**

        ```bash
        az cosmosdb show --name <CosmosDBAccountName> --resource-group <ResourceGroupName> --query "{EnableMultipleWriteLocations:enableMultipleWriteLocations, Locations:locations[].locationName}"
        ```
      remediation:
        - id: portal
          desc: |
            **Using Azure Portal**

            1. Navigate to **Azure Cosmos DB** in the Azure Portal.
            2. Select the account.
            3. Under **Replicate data globally**, enable **Multi-region writes**.
            4. Select **Save**.
        - id: cli
          desc: |
            **Using Azure CLI**

            ```bash
            az cosmosdb update --name <CosmosDBAccountName> --resource-group <ResourceGroupName> --enable-multiple-write-locations true
            ```
        - id: terraform
          desc: |
            **Using Terraform**

            ```hcl
            resource "azurerm_cosmosdb_account" "example" {
              name                            = "example-cosmosdb"
              location                        = azurerm_resource_group.example.location
              resource_group_name             = azurerm_resource_group.example.name
              multiple_write_locations_enabled = true

              ...

              geo_location {
                location          = "eastus"
                failover_priority = 0
              }

              geo_location {
                location          = "westus"
                failover_priority = 1
              }
            }
            ```
        - id: bicep
          desc: |
            **Using Bicep**

            ```bicep
            resource cosmosDbAccount 'Microsoft.DocumentDB/databaseAccounts@2024-05-15' = {
              name: 'example-cosmosdb'
              location: resourceGroup().location
              properties: {
                enableMultipleWriteLocations: true
                locations: [
                  {
                    locationName: 'eastus'
                    failoverPriority: 0
                  }
                  {
                    locationName: 'westus'
                    failoverPriority: 1
                  }
                ]
                // ...
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/cosmos-db/how-to-multi-master
        title: Configure multi-region writes in Azure Cosmos DB
  - uid: mondoo-azure-security-cosmosdb-multi-region-write-azure
    filters: |
      asset.platform == "azure-cosmosdb" &&
      azure.subscription.cosmosDbService.account.properties["locations"].length > 1
    mql: |
      azure.subscription.cosmosDbService.account.enableMultipleWriteLocations == true
  - uid: mondoo-azure-security-cosmosdb-multi-region-write-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "azurerm_cosmosdb_account")
    mql: |
      terraform.resources.where(nameLabel == "azurerm_cosmosdb_account").all(
        arguments["multiple_write_locations_enabled"] == true
      )
  - uid: mondoo-azure-security-cosmosdb-multi-region-write-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "azurerm_cosmosdb_account")
    mql: |
      terraform.plan.resourceChanges.where(type == "azurerm_cosmosdb_account").all(
        change.after["multiple_write_locations_enabled"] == true
      )
  - uid: mondoo-azure-security-cosmosdb-multi-region-write-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "azurerm_cosmosdb_account")
    mql: |
      terraform.state.resources.where(type == "azurerm_cosmosdb_account").all(
        values["multiple_write_locations_enabled"] == true
      )
  - uid: mondoo-azure-security-cosmosdb-strong-consistency
    title: Ensure Azure Cosmos DB accounts use bounded staleness or strong consistency
    impact: 30
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-1
      compliance/nist-csf-2: nist-csf-2-pr-ps-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-1
      compliance/soc2-2017: soc2-control-cc7-1-1
    variants:
      - uid: mondoo-azure-security-cosmosdb-strong-consistency-azure
        tags:
          mondoo.com/filter-title: Azure Cosmos DB Account
          mondoo.com/icon: azure
      - uid: mondoo-azure-security-cosmosdb-strong-consistency-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/icon: terraform
      - uid: mondoo-azure-security-cosmosdb-strong-consistency-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/icon: terraform
      - uid: mondoo-azure-security-cosmosdb-strong-consistency-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/icon: terraform
    docs:
      desc: |
        This check ensures that Azure Cosmos DB accounts are configured with strong or bounded staleness consistency, providing stronger data integrity guarantees for security-sensitive workloads.

        **Why this matters**

        Using strong or bounded staleness consistency provides several critical benefits:

        - **Data integrity**: Ensures reads always return the most recent committed write, preventing stale reads that could be exploited in security-sensitive scenarios.
        - **Financial data protection**: For accounts handling financial, medical, or compliance-critical data, strong consistency prevents data integrity issues.
        - **Audit reliability**: Ensures audit trail reads are consistent with the latest writes, preventing gaps in security monitoring.

        Note: Many workloads legitimately use session consistency for better performance. This check is most appropriate for high-security environments.
      audit: |
        **Automated Audit with Azure CLI:**

        ```bash
        az cosmosdb show --name <CosmosDBAccountName> --resource-group <ResourceGroupName> --query "consistencyPolicy.defaultConsistencyLevel"
        ```
      remediation:
        - id: portal
          desc: |
            **Using Azure Portal**

            1. Navigate to **Azure Cosmos DB** in the Azure Portal.
            2. Select the account.
            3. Under **Default consistency**, select **Bounded staleness** or **Strong**.
            4. Select **Save**.
        - id: cli
          desc: |
            **Using Azure CLI**

            ```bash
            az cosmosdb update --name <CosmosDBAccountName> --resource-group <ResourceGroupName> --default-consistency-level BoundedStaleness
            ```
        - id: terraform
          desc: |
            **Using Terraform**

            ```hcl
            resource "azurerm_cosmosdb_account" "example" {
              name                = "example-cosmosdb"
              location            = azurerm_resource_group.example.location
              resource_group_name = azurerm_resource_group.example.name

              ...

              consistency_policy {
                consistency_level       = "BoundedStaleness"
                max_interval_in_seconds = 300
                max_staleness_prefix    = 100000
              }
            }
            ```
        - id: bicep
          desc: |
            **Using Bicep**

            ```bicep
            resource cosmosDbAccount 'Microsoft.DocumentDB/databaseAccounts@2024-05-15' = {
              name: 'example-cosmosdb'
              location: resourceGroup().location
              properties: {
                consistencyPolicy: {
                  defaultConsistencyLevel: 'BoundedStaleness'
                  maxIntervalInSeconds: 300
                  maxStalenessPrefix: 100000
                }
                // ...
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/cosmos-db/consistency-levels
        title: Consistency levels in Azure Cosmos DB
  - uid: mondoo-azure-security-cosmosdb-strong-consistency-azure
    filters: |
      asset.platform == "azure-cosmosdb"
    mql: |
      azure.subscription.cosmosDbService.account.properties["consistencyPolicy"]["defaultConsistencyLevel"] == "Strong" ||
      azure.subscription.cosmosDbService.account.properties["consistencyPolicy"]["defaultConsistencyLevel"] == "BoundedStaleness"
  - uid: mondoo-azure-security-cosmosdb-strong-consistency-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "azurerm_cosmosdb_account")
    mql: |
      terraform.resources.where(nameLabel == "azurerm_cosmosdb_account").all(
        blocks.where(type == "consistency_policy").all(arguments["consistency_level"] == "BoundedStaleness" || arguments["consistency_level"] == "Strong")
      )
  - uid: mondoo-azure-security-cosmosdb-strong-consistency-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "azurerm_cosmosdb_account")
    mql: |
      terraform.plan.resourceChanges.where(type == "azurerm_cosmosdb_account").all(
        change.after["consistency_policy"] != empty &&
        change.after["consistency_policy"].all(_["consistency_level"] == "BoundedStaleness" || _["consistency_level"] == "Strong")
      )
  - uid: mondoo-azure-security-cosmosdb-strong-consistency-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "azurerm_cosmosdb_account")
    mql: |
      terraform.state.resources.where(type == "azurerm_cosmosdb_account").all(
        values["consistency_policy"] != empty &&
        values["consistency_policy"].all(_["consistency_level"] == "BoundedStaleness" || _["consistency_level"] == "Strong")
      )
  - uid: mondoo-azure-security-firewall-threat-intel-deny
    title: Ensure Azure Firewall threat intelligence is set to Deny mode
    impact: 80
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/soc2-2017: soc2-control-cc6-6-4
    variants:
      - uid: mondoo-azure-security-firewall-threat-intel-deny-azure
        tags:
          mondoo.com/filter-title: Azure Subscription
          mondoo.com/icon: azure
      - uid: mondoo-azure-security-firewall-threat-intel-deny-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/icon: terraform
      - uid: mondoo-azure-security-firewall-threat-intel-deny-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/icon: terraform
      - uid: mondoo-azure-security-firewall-threat-intel-deny-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/icon: terraform
    docs:
      desc: |
        This check ensures that Azure Firewall threat intelligence-based filtering is set to Deny mode, actively blocking traffic from and to known malicious IP addresses and domains.

        **Why this matters**

        Setting threat intelligence to Deny mode provides several critical benefits:

        - **Active threat blocking**: Deny mode actively blocks traffic from known malicious IP addresses and fully qualified domain names, rather than just alerting on them.
        - **Proactive defense**: Threat intelligence feeds from Microsoft are continuously updated, providing protection against the latest known threats without manual intervention.
        - **Reduced incident response burden**: By automatically blocking malicious traffic, the volume of security incidents requiring manual investigation is significantly reduced.
        - **Compliance alignment**: Many security frameworks require active blocking of known malicious traffic, not just detection and alerting.

        By setting threat intelligence to Deny mode, organizations ensure that known malicious traffic is automatically blocked at the firewall level.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Firewalls** in the Azure Portal.
        2. Select an Azure Firewall instance.
        3. Go to **Threat intelligence** under **Settings**.
        4. Verify that the mode is set to **Alert and deny**.

        **Automated Audit with Azure CLI:**

        ```bash
        az network firewall list --query "[].{Name:name, ResourceGroup:resourceGroup, ThreatIntelMode:threatIntelMode}" -o table
        ```

        **Automated Audit with PowerShell:**

        ```powershell
        Get-AzFirewall | Select-Object Name, ResourceGroupName, ThreatIntelMode
        ```
      remediation:
        - id: portal
          desc: |
            **Using Azure Portal**

            1. Navigate to **Firewalls** in the Azure Portal.
            2. Select the Azure Firewall instance.
            3. Go to **Threat intelligence** under **Settings**.
            4. Set the mode to **Alert and deny**.
            5. Select **Save**.
        - id: cli
          desc: |
            **Using Azure CLI**

            ```bash
            az network firewall update --name <FirewallName> --resource-group <ResourceGroupName> --threat-intel-mode Deny
            ```
        - id: powershell
          desc: |
            **Using PowerShell**

            ```powershell
            $firewall = Get-AzFirewall -Name <FirewallName> -ResourceGroupName <ResourceGroupName>
            $firewall.ThreatIntelMode = "Deny"
            Set-AzFirewall -AzureFirewall $firewall
            ```
        - id: terraform
          desc: |
            **Using Terraform**

            ```hcl
            resource "azurerm_firewall" "example" {
              name                = "example-firewall"
              location            = azurerm_resource_group.example.location
              resource_group_name = azurerm_resource_group.example.name
              sku_name            = "AZFW_VNet"
              sku_tier            = "Premium"
              threat_intel_mode   = "Deny"
            }
            ```
        - id: bicep
          desc: |
            **Using Bicep**

            ```bicep
            resource firewall 'Microsoft.Network/azureFirewalls@2024-05-01' = {
              name: 'example-firewall'
              location: resourceGroup().location
              properties: {
                threatIntelMode: 'Deny'
                sku: {
                  name: 'AZFW_VNet'
                  tier: 'Premium'
                }
                // ...
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/firewall/threat-intel
        title: Azure Firewall threat intelligence-based filtering
  - uid: mondoo-azure-security-firewall-threat-intel-deny-azure
    filters: |
      asset.platform == "azure"
    mql: |
      azure.subscription.network.firewalls.all(threatIntelMode == "Deny")
  - uid: mondoo-azure-security-firewall-threat-intel-deny-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "azurerm_firewall")
    mql: |
