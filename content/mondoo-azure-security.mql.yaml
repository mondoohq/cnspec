      - uid: mondoo-azure-security-log-profile-all-categories-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/icon: terraform
    docs:
      desc: |
        This check ensures that Azure Monitor log profiles capture all activity log categories: Write, Delete, and Action. Missing any category creates blind spots in the audit trail.

        **Why this matters**

        - **Incomplete audit trail:** Without all categories, some operations (like deletions or policy actions) may not be logged.
        - **Compliance:** Security frameworks require comprehensive audit logging of all management operations.
      remediation:
        - id: cli
          desc: |
            **Using Azure CLI**

            ```bash
            az monitor log-profiles update \
              --name default \
              --categories Write Delete Action
            ```
        - id: bicep
          desc: |
            **Using Bicep**

            ```bicep
            resource logProfile 'Microsoft.Insights/logprofiles@2016-03-01' = {
              name: 'default'
              location: ''
              properties: {
                storageAccountId: storageAccount.id
                categories: [
                  'Write'
                  'Delete'
                  'Action'
                ]
                locations: [
                  'global'
                ]
                retentionPolicy: {
                  enabled: true
                  days: 365
                }
              }
            }
            ```
        - id: terraform
          desc: |
            **Using Terraform**

            ```hcl
            resource "azurerm_monitor_log_profile" "example" {
              name = "default"

              categories = ["Write", "Delete", "Action"]
              locations  = ["global"]

              storage_account_id = azurerm_storage_account.example.id

              retention_policy {
                enabled = true
                days    = 365
              }
            }
            ```
        - id: portal
          desc: |
            **Using Azure Portal**

            1. Navigate to **Monitor** > **Activity log**.
            2. Select **Export Activity Logs**.
            3. Ensure categories include **Write**, **Delete**, and **Action**.
            4. Select **Save**.
    refs:
      - url: https://learn.microsoft.com/en-us/azure/azure-monitor/essentials/activity-log
