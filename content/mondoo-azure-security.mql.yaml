  # No runtime variant: cnquery azure provider exposes virtual-network-gateway connections but does not surface the typed `ipsecPolicies` array; the strong-IPsec policy check has no runtime analog. Ship Terraform variants only; revisit if the provider adds typed IPsec policy fields to azure.subscription.network.virtualNetworkGateways.connections.
  - uid: mondoo-azure-security-vpn-gateway-ikev2-strong-ipsec-policy
    title: Ensure VPN gateway connections use IKEv2 and strong IPsec ciphers
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-13
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    variants:
      - uid: mondoo-azure-security-vpn-gateway-ikev2-strong-ipsec-policy-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-vpn-gateway-ikev2-strong-ipsec-policy-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-vpn-gateway-ikev2-strong-ipsec-policy-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Azure VPN gateway connections that define a custom IPsec/IKE policy use IKEv2 with strong cipher suites: AES-256 or GCM-AES-256 for both IKE and IPsec encryption.

        **Why this matters**

        - **IKEv1 weaknesses**: IKEv1 aggressive mode leaks a hash of the pre-shared key during the handshake and supports deprecated ciphers (DES, 3DES, MD5). An attacker who captures the handshake can perform offline brute-force attacks and decrypt or impersonate the tunnel.
        - **Weak ciphers cause real downgrades**: A policy that allows AES-128, 3DES, or SHA-1 lets the peer negotiate down to those algorithms; an attacker who controls the network path can force a weaker selection unless the policy excludes them.
        - **Companion to the IKEv2 gateway check**: The route-based-vs-policy-based gateway check enforces that the gateway *can* speak IKEv2, but it doesn't verify that each connection actually uses IKEv2 with strong ciphers. This check covers the per-connection settings.

        **Risk mitigation**

        - On `azurerm_virtual_network_gateway_connection` resources that define an `ipsec_policy` block, set `ike_encryption` and `ipsec_encryption` to `AES256` or `GCMAES256`.
        - Avoid `DHGroup1` and `DHGroup2`; prefer `DHGroup14` or higher, with `PFSGroup14` or higher for perfect forward secrecy.
        - When `ipsec_policy` is omitted, Azure negotiates from a set of default proposals that already exclude IKEv1 on route-based gateways; this check intentionally verifies only connections that pin a policy explicitly so a weak custom policy cannot slip through.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Navigate to **Virtual network gateways** in the Azure Portal.
        2. Select a VPN gateway and open **Connections**.
        3. For each connection, open **Configuration** and review the **IPsec / IKE policy** settings.
        4. Verify that **IKE Phase 1 Encryption** and **IPsec Encryption** use **AES256** or **GCMAES256**, and that Diffie-Hellman groups are 14 or higher.

        **Automated Audit with Azure CLI:**

        ```bash
        az network vpn-connection list --resource-group <ResourceGroupName> --query "[].{Name:name, IpsecPolicies:ipsecPolicies}"
        ```
      remediation:
        - id: portal
          desc: |
            To configure a strong IPsec/IKE policy on a VPN gateway connection using the Azure Portal:

            1. Navigate to **Virtual network gateways** in the Azure Portal.
            2. Select the VPN gateway and open **Connections**.
            3. Select the connection and open **Configuration**.
            4. Enable **Custom IPsec / IKE policy** and set IKE and IPsec encryption to **AES256** or **GCMAES256**, integrity to **SHA256**, and Diffie-Hellman group to **DHGroup14** (or higher).
            5. Select **Save**.
        - id: cli
          desc: |
            To configure a strong IPsec/IKE policy on a VPN gateway connection using the Azure CLI:

            ```bash
            az network vpn-connection ipsec-policy add \
              --connection-name <ConnectionName> \
              --resource-group <ResourceGroupName> \
              --ike-encryption AES256 \
              --ike-integrity SHA256 \
              --dh-group DHGroup14 \
              --ipsec-encryption AES256 \
              --ipsec-integrity SHA256 \
              --pfs-group PFS2048 \
              --sa-lifetime 27000 \
              --sa-max-size 102400000
            ```
        - id: terraform
          desc: |
            To configure a strong IPsec/IKE policy on a VPN gateway connection in Terraform:

            ```hcl
            resource "azurerm_virtual_network_gateway_connection" "example" {
              name                = "example-connection"
              location            = azurerm_resource_group.example.location
              resource_group_name = azurerm_resource_group.example.name

              type                       = "IPsec"
              virtual_network_gateway_id = azurerm_virtual_network_gateway.example.id
              local_network_gateway_id   = azurerm_local_network_gateway.example.id

              shared_key = var.shared_key

              ipsec_policy {
                ike_encryption   = "AES256"
                ike_integrity    = "SHA256"
                ipsec_encryption = "AES256"
                ipsec_integrity  = "SHA256"
                dh_group         = "DHGroup14"
                pfs_group        = "PFS2048"
                sa_datasize      = 102400000
                sa_lifetime      = 27000
              }
            }
            ```
        - id: bicep
          desc: |
            To configure a strong IPsec/IKE policy on a VPN gateway connection in Bicep:

            ```bicep
            resource vpnConnection 'Microsoft.Network/connections@2024-05-01' = {
              name: 'example-connection'
              location: resourceGroup().location
              properties: {
                connectionType: 'IPsec'
                virtualNetworkGateway1: {
                  id: vpnGateway.id
                  properties: {}
                }
                localNetworkGateway2: {
                  id: localGateway.id
                  properties: {}
                }
                sharedKey: sharedKey
                ipsecPolicies: [
                  {
                    saLifeTimeSeconds: 27000
                    saDataSizeKilobytes: 102400000
                    ipsecEncryption: 'AES256'
                    ipsecIntegrity: 'SHA256'
                    ikeEncryption: 'AES256'
                    ikeIntegrity: 'SHA256'
                    dhGroup: 'DHGroup14'
                    pfsGroup: 'PFS2048'
                  }
                ]
              }
            }
            ```
