    docs:
      desc: |
        This check ensures that Azure subscription diagnostic settings are configured to collect the Administrative, Security, Alert, and Policy log categories. A diagnostic setting can exist but omit categories; missing categories create blind spots even when log forwarding is otherwise enabled.

        **Why this matters**

        - **Undetected privilege escalation:** The Administrative category captures role assignments and resource modifications; without it, an attacker who assigns themselves Owner or creates a backdoor service principal generates no forwarded log entry.
        - **Invisible policy tampering:** The Policy category logs Azure Policy evaluation results and exemptions; an attacker who disables security policies operates without detection when this category is absent.
        - **Missed security signals:** The Security category contains Defender for Cloud alerts; without forwarding these to a SIEM, high-severity detections remain siloed in the Azure portal and are not correlated with other events.
        - **Suppressed alert visibility:** The Alert category captures alert rule firings and state changes; attackers who suppress or delete alert rules to avoid detection leave no trace without this category.
        - **Incomplete forensic record:** Each missing category represents a class of subscription-level actions that an attacker can take with no forwarded evidence, permanently limiting post-incident investigation.

        **Risk mitigation**

        - **Category-selective blind spots:** Configuring diagnostic settings with only some categories gives a false sense of coverage; collecting all four essential categories ensures that the most security-relevant action classes are always forwarded.
        - **Attacker evasion through policy manipulation:** An attacker who exempts resources from Defender for Cloud policies or disables alert rules leaves no trace without the Policy and Alert categories enabled; both are required to detect this class of evasion.
      audit: |
        **Manual Audit via Azure Portal:**

        1. Access **Azure Monitor** within the Azure Portal.
        2. Navigate to **Activity log** and proceed to **Diagnostic settings**.
        3. Review the settings for each subscription ensuring the collection of Administrative, Security, Alert, and Policy logs.
        4. Confirm that these categories are enabled and correctly configured to export to an appropriate destination.

        **Automated Audit with Azure CLI:**

        Use the Azure CLI to list and verify the diagnostic settings across subscriptions:

        ```bash
        az monitor diagnostic-settings list --resource /subscriptions/{subscriptionId}
        ```

        Review the settings to confirm that the essential categories are enabled.
      remediation:
        - id: portal
          desc: |
            To ensure that diagnostic settings collect essential security categories using the Azure Portal, configure diagnostic settings for essential categories in the Azure Portal:

            1. Log into the Azure Portal at https://portal.azure.com.
            2. Navigate to **Monitor** and then **Activity log**.
            3. Select **Diagnostic settings** and either add a new setting or edit an existing one.
            4. Provide a name for the diagnostic setting and ensure the inclusion of Administrative, Security, Alert, and Policy logs.
            5. Choose the destination for these logs, such as an Azure Storage account, Log Analytics workspace, or Event Hub.
            6. Save the configuration to ensure continuous monitoring.
        - id: cli
          desc: |
            To ensure that diagnostic settings collect essential security categories using the Azure CLI, create or update diagnostic settings for capturing essential log categories, use:

            ```bash
            az monitor diagnostic-settings create --name <NameOfSetting> --resource /subscriptions/{subscriptionId} --logs '[{"category": "Administrative", "enabled": true}, {"category": "Security", "enabled": true}, {"category": "Alert", "enabled": true}, {"category": "Policy", "enabled": true}]' --storage-account <StorageAccountId> --workspace <LogAnalyticsWorkspaceId> --event-hub <EventHubName>
            ```

            Replace the placeholders with your specific resource IDs and desired diagnostic setting name.
        - id: powershell
          desc: |
            To ensure that diagnostic settings collect essential security categories using PowerShell, configure diagnostic settings with PowerShell, use the following command:

            ```powershell
            $subsId = "<SubscriptionId>"
            $settingName = "<DiagnosticSettingName>"
            $storageAccountId = "<StorageAccountId>"
            $workspaceId = "<LogAnalyticsWorkspaceId>"
            $eventHubAuthRuleId = "<EventHubAuthorizationRuleId>"

            Set-AzDiagnosticSetting -ResourceId "/subscriptions/$subsId" -StorageAccountId $storageAccountId -WorkspaceId $workspaceId -Enabled $true -Name $settingName -Category @("Administrative", "Security", "Alert", "Policy")
            ```

            Modify the script to match your specific resource IDs and configuration preferences. It's crucial to routinely review and update these settings to adapt to any changes in your Azure environment or organizational requirements.
        - id: terraform
          desc: |
            To ensure that diagnostic settings collect essential security categories in Terraform, configure diagnostic settings for essential categories, you can use the following Terraform configuration:

            ```hcl
            resource "azurerm_monitor_diagnostic_setting" "example" {
              name               = "example-diagnostic-setting"
              target_resource_id = azurerm_sql_server.example.id

              log {
                category = "Administrative"
                enabled  = true
              }

              log {
                category = "Security"
                enabled  = true
              }

              log {
                category = "Alert"
                enabled  = true
              }

              log {
                category = "Policy"
                enabled  = true
              }

              storage_account_id = azurerm_storage_account.example.id
            }
            ```

            This configuration ensures that the specified log categories are collected for the Azure resource. Regularly review and update your Terraform configurations to ensure compliance with security best practices.
        - id: bicep
          desc: |
            To ensure that diagnostic settings collect essential security categories in Bicep:

            ```bicep
            resource diagnosticSetting 'Microsoft.Insights/diagnosticSettings@2021-05-01-preview' = {
              name: 'example-sub-diag'
              properties: {
                workspaceId: logAnalyticsWorkspace.id
                logs: [
                  {
                    category: 'Administrative'
                    enabled: true
                  }
                  {
                    category: 'Security'
                    enabled: true
                  }
                  {
                    category: 'Alert'
                    enabled: true
                  }
                  {
                    category: 'Policy'
                    enabled: true
                  }
