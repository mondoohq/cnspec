        tags:
          mondoo.com/filter-title: Azure App Service
          mondoo.com/filter-icon: azure
      - uid: mondoo-azure-security-app-service-scm-min-tls-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-app-service-scm-min-tls-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-azure-security-app-service-scm-min-tls-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that the SCM (Kudu) endpoint for Azure App Service uses TLS 1.2 or higher, preventing credential interception during deployment operations.

        **Why this matters**

        - **Deployment security**: The SCM endpoint (Kudu) handles code deployments and provides diagnostic tools; weak TLS allows credential interception during these operations.
        - **Separate attack surface**: The SCM endpoint is a separate site from the main application and may have different TLS settings if not explicitly configured.
        - **Compliance alignment**: Security standards require TLS 1.2 as the minimum protocol version for all encrypted communications.

        **Risk mitigation**

        - Configure the SCM minimum TLS version to 1.2 on all App Service instances.
        - Audit both the main site and SCM endpoint TLS settings independently.
      audit: |
        ### Audit via Portal

        1. Navigate to **App Services** in the Azure Portal.
        2. Select the App Service instance.
        3. Under **Settings**, select **Configuration**.
        4. Go to **General settings**.
        5. Review the **SCM Minimum TLS Version** field.

        A passing resource shows **SCM Minimum TLS Version** set to **1.2**. A failing resource shows a lower version such as 1.0 or 1.1.

        ### Audit via CLI

        1. Run the following command, substituting your resource group and app name:

        ```bash
        az webapp config show --resource-group <ResourceGroupName> --name <AppName> --query "scmMinTlsVersion" -o tsv
        ```

        A passing resource returns `1.2`. A failing resource returns `1.0`, `1.1`, or an empty value.
      remediation:
        - id: portal
          desc: |
            To ensure App Service SCM endpoint uses TLS 1.2+ using the Azure Portal:

            1. Navigate to **App Services** in the Azure Portal.
            2. Select the App Service instance.
            3. Under **Settings**, select **Configuration**.
            4. Go to **General settings**.
            5. Set **SCM Minimum TLS Version** to **1.2**.
            6. Select **Save**.
        - id: cli
          desc: |
            To ensure App Service SCM endpoint uses TLS 1.2+ using the Azure CLI:

            ```bash
            az webapp config set --resource-group <ResourceGroupName> --name <AppName> --min-tls-version 1.2
            az resource update --ids $(az webapp show --resource-group <ResourceGroupName> --name <AppName> --query id -o tsv)/config/web --set properties.scmMinTlsVersion=1.2
            ```
        - id: terraform
          desc: |
            To ensure App Service SCM endpoint uses TLS 1.2+ in Terraform:

            ```hcl
            resource "azurerm_linux_web_app" "example" {
              name                = "example-app"
              resource_group_name = azurerm_resource_group.example.name
              location            = azurerm_resource_group.example.location
              service_plan_id     = azurerm_service_plan.example.id

              site_config {
                scm_minimum_tls_version = "1.2"
              }
            }
            ```
        - id: bicep
          desc: |
            To ensure App Service SCM endpoint uses TLS 1.2+ in Bicep:

            ```bicep
            resource webAppConfig 'Microsoft.Web/sites/config@2023-01-01' = {
              parent: webApp
              name: 'web'
              properties: {
                scmMinTlsVersion: '1.2'
              }
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/azure/app-service/configure-ssl-bindings
        title: Configure TLS/SSL settings for Azure App Service
  - uid: mondoo-azure-security-app-service-scm-min-tls-azure
