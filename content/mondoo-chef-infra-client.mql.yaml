    docs:
      desc: |
        This check verifies that the `/var/log/chef` directory is owned by `root` and restricted to mode `750`. This directory holds Chef Infra Client log files that can expose sensitive operational detail to anyone able to read them.

        **Why this matters**

        - **Infrastructure detail:** Logged node attributes can reveal IP addresses, hostnames, and topology.
        - **Secret leakage:** Resource parameters can include secrets when verbose or debug logging is enabled.
        - **Internal exposure:** Stack traces expose internal paths and software versions an attacker can target.
        - **Weakness disclosure:** Compliance scan results in the logs can point an attacker at exploitable misconfigurations.
      audit: |
        Run the following command to inspect the directory ownership and permissions:

        ```bash
        stat -c '%a %U:%G %n' /var/log/chef
        ```

        If the output is `750 root:root /var/log/chef`, the directory is correctly restricted and the check passes. A stricter mode `700` also passes. Any other owner, group, or mode means the check fails.
      remediation:
        - id: cli
          desc: |
            **Using CLI**

            Run these commands to set proper permissions on your /var/log/chef directory:

            ```bash
            chown root:root /var/log/chef
            chmod 750 /var/log/chef
            ```

            To verify the permissions were applied correctly:

            ```bash
            stat -c '%a %U:%G %n' /var/log/chef
            ```

            Expected output: `750 root:root /var/log/chef`
        - id: chef
          desc: |
            **Using Chef Infra**

            Use this Chef Infra recipe code to set proper permissions on your /var/log/chef directory:

            ```ruby
            directory '/var/log/chef' do
              owner 'root'
              group 'root'
              mode '0750'
            end
            ```
    refs:
      - url: https://docs.chef.io/chef_client_security/
        title: Chef Infra Client Security
  - uid: client-rb-permissions
    title: Ensure /etc/chef/client.rb is owned by root with 640 permissions
    impact: 100
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-5
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-6
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-1-1
    mql: |
      if (file("/etc/chef/client.rb").exists) {
        file("/etc/chef/client.rb") {
          user.name == 'root'
          group.name == 'root'
          permissions.user_readable == true
          permissions.user_writeable == true
          permissions.user_executable == false
          permissions.group_writeable == false
          permissions.group_executable == false
          permissions.other_readable == false
          permissions.other_writeable == false
          permissions.other_executable == false
        }
      }
    docs:
      desc: |
        This check verifies that the `/etc/chef/client.rb` configuration file is owned by `root` and restricted to mode `640`, so that only `root` can write to it and only `root` and the root group can read it. This is the primary configuration file for Chef Infra Client and frequently holds sensitive settings.

        **Why this matters**

        - **Topology disclosure:** The file exposes the Chef Infra Server URL, organization, node name, and environment.
        - **Token leakage:** It can contain Chef Automate data collector tokens when reporting is configured directly.
        - **Code execution:** Write access lets an attacker inject custom Ruby that runs during every Chef Infra Client run.
        - **Key chaining:** Combined with a readable `client.pem`, the disclosed configuration eases access to Chef Infra Server.
      audit: |
        Run the following command to inspect the file ownership and permissions:

        ```bash
        stat -c '%a %U:%G %n' /etc/chef/client.rb
        ```

        If the output is `640 root:root /etc/chef/client.rb`, the file is correctly restricted and the check passes. A stricter mode `600` also passes. Any other owner, group, or mode means the check fails.
      remediation:
        - id: cli
          desc: |
            **Using CLI**

            Run these commands to set proper permissions on your /etc/chef/client.rb file:

            ```bash
            chown root:root /etc/chef/client.rb
            chmod 640 /etc/chef/client.rb
            ```

            To verify the permissions were applied correctly:

            ```bash
            stat -c '%a %U:%G %n' /etc/chef/client.rb
            ```

            Expected output: `640 root:root /etc/chef/client.rb`
        - id: chef
          desc: |
            **Using Chef Infra**

            Use this Chef Infra recipe code to set proper permissions on your /etc/chef/client.rb file:

            ```ruby
            file '/etc/chef/client.rb' do
              owner 'root'
              group 'root'
              mode '0640'
            end
            ```
    refs:
      - url: https://docs.chef.io/config_rb_client/
        title: Chef Infra Client Configuration Reference
  - uid: client-pem-permissions
    title: Ensure /etc/chef/client.pem is owned by root:root with mode 600 or 640
    impact: 100
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-5
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-6
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-1-1
    mql: |
      if (file("/etc/chef/client.pem").exists) {
        file("/etc/chef/client.pem") {
          user.name == 'root'
          group.name == 'root'
          permissions.user_readable == true
          permissions.user_writeable == true
          permissions.user_executable == false
          permissions.group_writeable == false
          permissions.group_executable == false
          permissions.other_readable == false
          permissions.other_writeable == false
          permissions.other_executable == false
        }
      }
    docs:
      desc: |
        This check verifies that the `/etc/chef/client.pem` private key is owned by `root:root` and restricted to mode `600` or `640`. This RSA key uniquely identifies the node to Chef Infra Server and signs every API request it makes.

        **Why this matters**

        - **Full impersonation:** Anyone who reads this key can authenticate to Chef Infra Server as the node.
        - **Secret access:** The key grants access to any data bags the node is authorized to read, including passwords and certificates.
        - **Run list tampering:** An attacker can modify the node's run list to execute malicious cookbooks.
        - **Lateral movement:** If the node has admin privileges, the key opens a path to other nodes and harvested credentials.
      audit: |
        Run the following command to inspect the file ownership and permissions:

        ```bash
        stat -c '%a %U:%G %n' /etc/chef/client.pem
        ```

        If the output is `600 root:root /etc/chef/client.pem`, the key is correctly restricted and the check passes. Mode `640` with group `root` is also accepted. Any other owner, group, or mode means the check fails.
      remediation:
        - id: cli
          desc: |
            **Using CLI**

            Run these commands to set proper permissions on your /etc/chef/client.pem file. Mode 600 matches what Chef Infra Client sets when it first registers the node:

            ```bash
            chown root:root /etc/chef/client.pem
            chmod 600 /etc/chef/client.pem
            ```

            To verify the permissions were applied correctly:

            ```bash
            stat -c '%a %U:%G %n' /etc/chef/client.pem
            ```

            Expected output: `600 root:root /etc/chef/client.pem`
        - id: chef
          desc: |
            **Using Chef Infra**

            Use this Chef Infra recipe code to set proper permissions on your /etc/chef/client.pem file:

            ```ruby
            file '/etc/chef/client.pem' do
              owner 'root'
              group 'root'
              mode '0600'
            end
            ```
    refs:
      - url: https://docs.chef.io/chef_client_security/
        title: Chef Infra Client Security
  - uid: validation-pem-not-present
    title: Ensure /etc/chef/validation.pem is not present
    impact: 100
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-j
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-3
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-2
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-3
    mql: |
      file("/etc/chef/validation.pem").exists == false
    docs:
      desc: |
        This check verifies that the `/etc/chef/validation.pem` file has been removed from the node. The organization validator key is needed only during the initial bootstrap; once the node receives its own `client.pem`, leaving the validator key on disk is a significant risk.

        **Why this matters**

        - **Rogue node registration:** The validator key lets an attacker register unlimited new nodes in the Chef organization.
        - **Impersonation:** Attacker-created nodes can use arbitrary names, mimicking existing infrastructure.
        - **Persistent foothold:** A rogue registered node provides a durable base for pivoting attacks.
        - **Unintended access:** Newly registered nodes inherit access to any data bags and policies available by default.
      audit: |
        Run the following command to check whether the validator key is still present:

        ```bash
        ls -la /etc/chef/validation.pem
        ```

        If the command reports `No such file or directory`, the validator key has been removed and the check passes. If the file is listed, it remains on the node and the check fails.
      remediation:
        - id: cli
          desc: |
            **Using CLI**

            Run this command to remove the validation.pem file:

            ```bash
            rm -f /etc/chef/validation.pem
            ```

            To verify the file has been removed:

            ```bash
            if [ -e /etc/chef/validation.pem ]; then
              echo "File still exists"
            else
              echo "Successfully removed"
            fi
            ```
        - id: chef
          desc: |
            **Using Chef Infra**

            Use this Chef Infra recipe code to remove the validation.pem file. Add this to a recipe that runs on all nodes:

            ```ruby
            file '/etc/chef/validation.pem' do
              action :delete
            end
            ```

            To prevent the key from landing on new nodes in the first place, bootstrap with `knife bootstrap` using your own user credentials. Knife performs a validatorless bootstrap by default in Chef Infra Client 15 and later, so validation.pem is never written to the node.
    refs:
      - url: https://docs.chef.io/install_bootstrap/
        title: Chef Bootstrap Guide
  - uid: non-eol-infra-client
    title: Ensure a non-EOL Chef Infra Client or Cinc Client release is used
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-tvm-03
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-8
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-12
      compliance/nist-csf-2: nist-csf-2-pr-ps-02
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-1
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-2
      compliance/pci-dss-4: pcidss-requirement-6-3-3
      compliance/soc2-2017: soc2-control-cc7-1-1
      compliance/vda-isa-5: vda-isa-5-5-2-1
    mql: |
      command("chef-client -v") {
        stdout == /^(Chef Infra|Cinc) Client: (18|19|20|21|22).*/m
      }
    docs:
      desc: |
        This check verifies that the installed Chef Infra Client (or its community fork, Cinc Client) is a release that still receives security maintenance. Chef supports the current major version plus one previous version, so only two major versions receive updates at any time.

        **Why this matters**

        - **No security patches:** Vulnerabilities discovered after end of life are never fixed on the affected release.
        - **No bug fixes:** Critical bugs that cause configuration drift go unresolved on unsupported versions.
        - **Compatibility breakage:** Newer cookbooks and Chef Infra Server versions may not work with an end-of-life client.
        - **Compliance failure:** Many security frameworks explicitly require running vendor-supported software.
      audit: |
        Run the following command to display the installed client version:

        ```bash
        chef-client -v
        ```

        Compare the reported major version against the [Chef Supported Versions documentation](https://docs.chef.io/versions/). If the output reports a currently supported major version (for example `Chef Infra Client: 18.x.x`), the check passes. If it reports an end-of-life major version, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using CLI**

            1. Check your current Chef Infra Client version:

            ```bash
            chef-client -v
            ```

            2. Install the latest supported release with the Chef install script. The same command works on Debian, Ubuntu, RHEL, CentOS, and Amazon Linux:

            ```bash
            curl -L https://omnitruck.chef.io/install.sh | sudo bash -s -- -P chef -v 18
            ```

            For nodes running Cinc Client, use the Cinc install script instead:

            ```bash
            curl -L https://omnitruck.cinc.sh/install.sh | sudo bash -s -- -P cinc -v 18
            ```

            3. Verify the upgrade was successful:

            ```bash
            chef-client -v
            ```

            **Important**: Before upgrading in production, review the [Chef Infra Client release notes](https://docs.chef.io/release_notes_client/) for breaking changes and test your cookbooks in a non-production environment.
        - id: chef
          desc: |
            **Using Chef Infra**

            If you use Chef to manage Chef Infra Client installations, update your cookbook to install a supported version. Using the `chef_client_updater` cookbook:

            ```ruby
            chef_client_updater 'Install latest Chef 18' do
              version '18'
            end
            ```

            Or using the `chef-ingredient` cookbook:

            ```ruby
            chef_ingredient 'chef' do
              version '18'
              action :upgrade
            end
            ```

            **Upgrade Planning Tips**:

            - Test cookbooks against the new version in a development environment first
            - Review deprecation warnings in your current Chef runs
            - Check cookbook metadata for `chef_version` constraints that may need updating
            - Plan for a phased rollout starting with non-critical systems
    refs:
      - url: https://docs.chef.io/versions/
        title: Chef Supported Versions
  - uid: disable-legacy-encrypted-data-bags
    title: Disable support for less secure Encrypted Data Bag versions
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    mql: |
      if (file("/etc/chef/client.rb").exists) {
        file("/etc/chef/client.rb").content == /^\s*data_bag_decrypt_minimum_version\s+3\b/m
      }
    docs:
      desc: |
        This check verifies that `client.rb` sets `data_bag_decrypt_minimum_version 3`, so that Chef Infra Client refuses to decrypt encrypted data bags stored in the legacy versions 0, 1, and 2 formats. Only version 3 uses authenticated AES-256-GCM encryption.

        **Why this matters**

        - **Predictable IVs:** Versions 0 and 1 use predictable initialization vectors that weaken the ciphertext.
        - **No authentication:** Version 2 lacks message authentication and is exposed to padding oracle attacks.
        - **Secret disclosure:** A successful attack on a legacy data bag reveals passwords, API keys, and certificates.
        - **Forced upgrade:** Requiring version 3 drives any remaining legacy data bags onto the secure format.
      audit: |
        Run the following command to check the configured minimum data bag version:

        ```bash
        grep data_bag_decrypt_minimum_version /etc/chef/client.rb
        ```

        If the output shows an uncommented `data_bag_decrypt_minimum_version 3` line, legacy formats are rejected and the check passes. If the line is absent, commented out, or set to a lower number, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using CLI**

            Edit your Chef Infra Client configuration file at `/etc/chef/client.rb` and add the following line:

            ```ruby
            data_bag_decrypt_minimum_version 3
            ```

            After making this change, verify the configuration is valid:

            ```bash
            chef-client --why-run
            ```

            **Important**: Before enabling this setting, ensure all your encrypted data bags have been re-encrypted using version 3. You can check the version of an encrypted data bag by examining its JSON structure - v3 data bags include an `auth_tag` field.
        - id: chef
          desc: |
            **Using Chef Infra**

            If you manage client.rb with the `chef_client_config` resource, which is built into Chef Infra Client 16.6 and later, append the setting through `additional_config`. The resource regenerates client.rb from a template, so declare every setting the node needs:

            ```ruby
            chef_client_config 'Set minimum data bag version' do
              chef_server_url Chef::Config[:chef_server_url]
              additional_config 'data_bag_decrypt_minimum_version 3'
            end
            ```

            Alternatively, if you manage client.rb with your own template, add this line to your template:

            ```ruby
            data_bag_decrypt_minimum_version 3
            ```

            **Important**: Ensure all encrypted data bags have been upgraded to v3 encryption before deploying this change to avoid Chef run failures.
    refs:
      - url: https://docs.chef.io/data_bags/#encryption-versions
        title: Chef Encrypted Data Bag Versions
  - uid: avoid-reporting-tokens-in-config
    title: Avoid storing Automate tokens in the client.rb config
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-j
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-3
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-2
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-3
    mql: |
      if (file("/etc/chef/client.rb").exists) {
        file("/etc/chef/client.rb").content.contains("data_collector.token") == false
      }
    docs:
      desc: |
        This check verifies that `client.rb` does not contain a `data_collector.token` entry. Storing a Chef Automate API token on every managed node spreads a shared credential far wider than necessary; reporting data should instead be proxied through Chef Infra Server.

        **Why this matters**

        - **Plaintext credential sprawl:** The token sits in cleartext on every managed node that reports directly to Automate.
        - **Broad read access:** Any local user or process that can read `client.rb` can extract the token.
        - **Single point of compromise:** The same token is typically shared fleet-wide, so one node leak exposes all of them.
        - **Rotation friction:** Rotating a node-stored token means updating every managed node instead of one server.
      audit: |
        Run the following command to check whether an Automate token is configured on the node:

        ```bash
        grep data_collector.token /etc/chef/client.rb
        ```

        If the command returns no output, no token is stored on the node and the check passes. If a `data_collector.token` line is printed, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using CLI**

            1. First, configure your Chef Infra Server to proxy data to Automate. Edit `/etc/opscode/chef-server.rb` on your Infra Server and add:

            ```ruby
            data_collector['root_url'] = 'https://your-automate-server/data-collector/v0/'
            data_collector['token'] = 'your-automate-token'
            ```

            2. Reconfigure the Infra Server:

            ```bash
            chef-server-ctl reconfigure
            ```

            3. On each managed node, delete the token line and any direct Automate URL from `/etc/chef/client.rb`:

            ```bash
            sed -i '/data_collector\.token/d' /etc/chef/client.rb
            ```

            4. Point the client at the Infra Server endpoint instead by adding this line to `/etc/chef/client.rb`. If the line is omitted entirely, Chef Infra Client defaults to this same endpoint:

            ```ruby
            data_collector.server_url "https://your-chef-server/organizations/your-org/data-collector"
            ```

            See the [Chef Infra Server Data Collector documentation](https://docs.chef.io/server/config_rb_server_optional_settings/) for complete configuration options.
        - id: chef
          desc: |
            **Using Chef Infra**

            If you manage client.rb with the `chef_client_config` resource, which is built into Chef Infra Client 16.6 and later, route reporting through the Infra Server and leave the token unset. The resource regenerates client.rb from a template, so declare every setting the node needs:

            ```ruby
            chef_client_config 'Configure data collector' do
              chef_server_url Chef::Config[:chef_server_url]
              data_collector_server_url 'https://your-chef-server/organizations/your-org/data-collector'
            end
            ```

            Ensure you have also configured your Chef Infra Server to proxy data to Automate as described in the CLI remediation steps above.
    refs:
      - url: https://docs.chef.io/automate/data_collection/
        title: Chef Automate Data Collection
  - uid: ssl-verification-enabled
    title: Ensure SSL verification is not disabled
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    mql: |
      if (file("/etc/chef/client.rb").exists) {
        file("/etc/chef/client.rb").content != /^\s*ssl_verify_mode\s*\(?\s*:verify_none/m
      }
    docs:
      desc: |
        This check verifies that `client.rb` does not set `ssl_verify_mode :verify_none`, which would turn off certificate validation for connections to Chef Infra Server. SSL verification must stay enabled so the client can confirm it is talking to the genuine server.

        **Why this matters**

        - **Man-in-the-middle exposure:** Without verification, an attacker can intercept and alter traffic to and from Chef Infra Server.
        - **Credential theft:** Node authentication keys and API tokens can be captured over an unverified connection.
        - **Cookbook tampering:** An interceptor can substitute malicious cookbook content for the client to apply.
        - **Trust integrity:** Certificate validation is the only assurance the client has of the server's identity.
      audit: |
        Run the following command to check whether SSL verification has been disabled:

        ```bash
        grep ssl_verify_mode /etc/chef/client.rb
        ```

        If the command returns no output, or shows `ssl_verify_mode :verify_peer`, verification is enabled and the check passes. If it shows an uncommented `ssl_verify_mode :verify_none` line, verification is disabled and the check fails.
      remediation:
        - id: cli
          desc: |
            **Using CLI**

            Delete any line containing `ssl_verify_mode :verify_none` from `/etc/chef/client.rb`. Commenting the line out is not enough; remove it entirely:

            ```bash
            sed -i '/ssl_verify_mode :verify_none/d' /etc/chef/client.rb
            ```

            To explicitly enable verification, add:

            ```ruby
            ssl_verify_mode :verify_peer
            ```
        - id: chef
          desc: |
            **Using Chef Infra**

            If you manage client.rb with the `chef_client_config` resource, which is built into Chef Infra Client 16.6 and later, set verification explicitly. The resource regenerates client.rb from a template, so declare every setting the node needs:

            ```ruby
            chef_client_config 'Enable SSL verification' do
              chef_server_url Chef::Config[:chef_server_url]
              ssl_verify_mode :verify_peer
            end
            ```

            Alternatively, if you manage client.rb manually with a template, ensure the following line is present and not commented out:

            ```ruby
            ssl_verify_mode :verify_peer
            ```
    refs:
      - url: https://docs.chef.io/config_rb_client/
        title: Chef Infra Client Configuration Reference
