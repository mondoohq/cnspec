      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-5
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-6
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-1-1
    mql: |
      if (file("/var/chef").exists) {
        file("/var/chef") {
          user.name == 'root'
          group.name == 'root'
          permissions.user_readable == true
          permissions.user_writeable == true
          permissions.user_executable == true
          permissions.group_writeable == false
          permissions.other_readable == false
          permissions.other_writeable == false
          permissions.other_executable == false
        }
      }
    docs:
      desc: |
        This check verifies that the `/var/chef` directory is owned by `root` and restricted to mode `750`. This directory is the default location for Chef Infra Client cache and backup files, and its contents frequently include sensitive data.

        **Why this matters**

        - **Backup exposure:** Backup copies of files modified by recipes can contain sensitive configuration data.
        - **Cached secrets:** `remote_file` downloads and cached cookbook content may include embedded credentials or proprietary software.
        - **Reconnaissance:** Cached cookbook files reveal infrastructure logic an attacker can study to plan further attacks.
        - **Least privilege:** Mode `750` keeps unprivileged local users and processes away from cached sensitive material.
      audit: |
        Run the following command to inspect the directory ownership and permissions:

        ```bash
        stat -c '%a %U:%G %n' /var/chef
        ```

        If the output is `750 root:root /var/chef`, the directory is correctly restricted and the check passes. A stricter mode `700` also passes. Any other owner, group, or mode means the check fails.
      remediation:
        - id: cli
          desc: |
            **Using CLI**

            Run these commands to set proper permissions on your /var/chef directory:

            ```bash
            chown root:root /var/chef
            chmod 750 /var/chef
            ```

            To verify the permissions were applied correctly:

            ```bash
            stat -c '%a %U:%G %n' /var/chef
            ```

            Expected output: `750 root:root /var/chef`
        - id: chef
          desc: |
            **Using Chef Infra**

            Use this Chef Infra recipe code to set proper permissions on your /var/chef directory:

            ```ruby
            directory '/var/chef' do
              owner 'root'
              group 'root'
              mode '0750'
            end
            ```
    refs:
      - url: https://docs.chef.io/chef_client_security/
        title: Chef Infra Client Security
  - uid: var-log-chef-directory-permissions
