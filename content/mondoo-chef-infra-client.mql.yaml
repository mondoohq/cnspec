policies:
  - uid: chef-infra-client
    name: Mondoo Chef Infra Client Security
    version: 1.3.3
    license: BUSL-1.1
    tags:
      mondoo.com/category: security
      mondoo.com/platform: linux,unix
    require:
      - provider: os
    authors:
      - name: Mondoo, Inc.
        email: hello@mondoo.com
    summary: Secure Chef Infra Client credentials and installations
    docs:
      desc: |
        The Mondoo Chef Infra Client Security policy identifies insecure Chef Infra Client installations that could expose node credentials and provide attackers with a path to compromise every system the client manages. This policy helps organizations detect end-of-life client releases that no longer receive security updates and configuration weaknesses that could let an attacker steal client keys, escalate privileges, or pivot from a managed node into the broader Chef-managed estate.

        This policy provides security checks across key Chef Infra Client areas:

        - End-of-life client versions per the [Chef Supported Versions documentation](https://docs.chef.io/versions/)
        - File permissions on client configuration and credential files
        - Secure configuration of the client run environment

        Have suggestions for new checks in this policy? Visit our [cnspec repository](https://github.com/mondoohq/cnspec).
    groups:
      - title: Insecure permissions
        filters: |
          asset.family.contains('unix')
          file("/opt/chef").exists
        checks:
          - uid: client-pem-permissions
          - uid: client-rb-permissions
          - uid: etc-chef-directory-permissions
          - uid: var-chef-directory-permissions
          - uid: var-log-chef-directory-permissions
      - title: Insecure configurations
        filters: |
          asset.family.contains('unix')
          file("/opt/chef").exists
        checks:
          - uid: avoid-reporting-tokens-in-config
          - uid: disable-legacy-encrypted-data-bags
          - uid: ssl-verification-enabled
          - uid: validation-pem-not-present
      - title: EOL software
        filters: |
          asset.family.contains('unix')
          file("/opt/chef").exists || file("/opt/cinc").exists
        checks:
          - uid: non-eol-infra-client
queries:
  - uid: etc-chef-directory-permissions
    title: Ensure /etc/chef/ is owned by root with 750 permissions
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-5
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-6
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-1-1
    mql: |
      if (file("/etc/chef").exists) {
        file("/etc/chef") {
          user.name == 'root'
          group.name == 'root'
          permissions.user_readable == true
          permissions.user_writeable == true
          permissions.user_executable == true
          permissions.group_writeable == false
          permissions.other_readable == false
          permissions.other_writeable == false
          permissions.other_executable == false
        }
      }
    docs:
      desc: |
        This check verifies that the `/etc/chef` directory is owned by `root` and restricted to mode `750`, so that only `root` can write to it and only `root` and the root group can list its contents. The directory holds the `client.rb` configuration file and the `client.pem` private key that authenticate the node to Chef Infra Server.

        **Why this matters**

        - **Node impersonation:** A readable `client.pem` lets an attacker authenticate to Chef Infra Server as this node.
        - **Configuration disclosure:** `client.rb` reveals server URLs, organization names, and node identifiers useful for reconnaissance.
        - **Tampering:** Write access lets an attacker alter the client configuration to exfiltrate data or disable security controls.
        - **Least privilege:** Mode `750` keeps unprivileged local users and processes away from credential material.
      audit: |
        Run the following command to inspect the directory ownership and permissions:

        ```bash
        stat -c '%a %U:%G %n' /etc/chef
        ```

        If the output is `750 root:root /etc/chef`, the directory is correctly restricted and the check passes. A stricter mode `700` also passes. Any other owner, group, or mode means the check fails.
      remediation:
        - id: cli
          desc: |
            **Using CLI**

            Run these commands to set proper permissions on your /etc/chef directory:

            ```bash
            chown root:root /etc/chef
            chmod 750 /etc/chef
            ```

            To verify the permissions were applied correctly:

            ```bash
            stat -c '%a %U:%G %n' /etc/chef
            ```

            Expected output: `750 root:root /etc/chef`
        - id: chef
          desc: |
            **Using Chef Infra**

            Use this Chef Infra recipe code to set proper permissions on your /etc/chef directory:

            ```ruby
            directory '/etc/chef' do
              owner 'root'
              group 'root'
              mode '0750'
            end
            ```
    refs:
      - url: https://docs.chef.io/chef_client_security/
        title: Chef Infra Client Security
  - uid: var-chef-directory-permissions
    title: Ensure /var/chef/ is owned by root with 750 permissions
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-04
      compliance/dora: dora-art-9
