policies:
  - uid: mondoo-cisco-iosxe-security
    name: Mondoo Cisco IOS-XE Security
    version: 1.0.1
    license: BUSL-1.1
    tags:
      mondoo.com/category: security
      mondoo.com/platform: cisco-ios-xe,networkdevice
    require:
      - provider: networkdevices
    authors:
      - name: Mondoo, Inc.
        email: hello@mondoo.com
    summary: Secure Cisco IOS-XE routers and switches
    docs:
      desc: |
        The Mondoo Cisco IOS-XE Security policy identifies critical misconfigurations on Cisco IOS-XE routers and switches that could leave your network infrastructure vulnerable to attackers. This policy helps organizations detect and remediate hardening gaps before they can be exploited, reducing the likelihood of unauthorized device access, traffic interception, routing manipulation, and disruption of network services.

        This policy provides security checks across key areas of Cisco IOS-XE configuration:

        - SSH configuration, version enforcement, and key strength
        - AAA authentication, authorization, and accounting
        - Removal of insecure services such as HTTP, BOOTP, DHCP, and CDP
        - User account security and password encryption
        - NTP authentication and time synchronization for accurate logging
        - Logging configuration and remote log collection
        - SNMP hardening with ACLs and strong community strings
        - VTY, console, and auxiliary line security
        - Security banners and session timeouts
        - Routing protocol authentication for BGP and OSPF
        - Disabling source routing and other dangerous features

        Learn more about scanning Cisco IOS-XE in the [cnspec Cisco IOS-XE documentation](https://mondoo.com/docs/cnspec/network/cisco).

        Have suggestions for new checks in this policy? Visit our [cnspec repository](https://github.com/mondoohq/cnspec).

    groups:
      - title: SSH Security
        filters: asset.platform == "cisco-iosxe"
        checks:
          - uid: mondoo-cisco-iosxe-security-ssh-enabled
          - uid: mondoo-cisco-iosxe-security-ssh-version-2
          - uid: mondoo-cisco-iosxe-security-ssh-timeout-configured
          - uid: mondoo-cisco-iosxe-security-rsa-key-minimum-size
      - title: Authentication and Authorization (AAA)
        filters: asset.platform == "cisco-iosxe"
        checks:
          - uid: mondoo-cisco-iosxe-security-aaa-new-model-enabled
          - uid: mondoo-cisco-iosxe-security-aaa-authentication-login-configured
          - uid: mondoo-cisco-iosxe-security-aaa-accounting-configured
      - title: User Account Security
        filters: asset.platform == "cisco-iosxe"
        checks:
          - uid: mondoo-cisco-iosxe-security-users-secret-not-password
          - uid: mondoo-cisco-iosxe-security-enable-secret-configured
          - uid: mondoo-cisco-iosxe-security-service-password-encryption
      - title: Protocol and Service Security
        filters: asset.platform == "cisco-iosxe"
        checks:
          - uid: mondoo-cisco-iosxe-security-http-disabled
          - uid: mondoo-cisco-iosxe-security-https-enabled
          - uid: mondoo-cisco-iosxe-security-cdp-disabled
          - uid: mondoo-cisco-iosxe-security-bootp-disabled
          - uid: mondoo-cisco-iosxe-security-source-routing-disabled
          - uid: mondoo-cisco-iosxe-security-pad-disabled
      - title: NTP and Time Configuration
        filters: asset.platform == "cisco-iosxe"
        checks:
          - uid: mondoo-cisco-iosxe-security-ntp-authentication-enabled
          - uid: mondoo-cisco-iosxe-security-ntp-servers-configured
      - title: Logging and Auditing
        filters: asset.platform == "cisco-iosxe"
        checks:
          - uid: mondoo-cisco-iosxe-security-logging-config-changes
          - uid: mondoo-cisco-iosxe-security-logging-hosts-configured
          - uid: mondoo-cisco-iosxe-security-logging-failed-logins
      - title: SNMP Security
        filters: asset.platform == "cisco-iosxe"
        checks:
          - uid: mondoo-cisco-iosxe-security-snmp-no-public-community
          - uid: mondoo-cisco-iosxe-security-snmp-communities-acl
      - title: VTY and Line Security
        filters: asset.platform == "cisco-iosxe"
        checks:
          - uid: mondoo-cisco-iosxe-security-vty-transport-ssh-only
          - uid: mondoo-cisco-iosxe-security-vty-exec-timeout-configured
          - uid: mondoo-cisco-iosxe-security-vty-acl-configured
          - uid: mondoo-cisco-iosxe-security-aux-line-no-exec
          - uid: mondoo-cisco-iosxe-security-console-exec-timeout
      - title: Access Control and Banners
        filters: asset.platform == "cisco-iosxe"
        checks:
          - uid: mondoo-cisco-iosxe-security-login-banner-configured
          - uid: mondoo-cisco-iosxe-security-motd-banner-configured
          - uid: mondoo-cisco-iosxe-security-hostname-configured
          - uid: mondoo-cisco-iosxe-security-domain-name-configured
      - title: Service Hardening
        filters: asset.platform == "cisco-iosxe"
        checks:
          - uid: mondoo-cisco-iosxe-security-tcp-keepalives-in
          - uid: mondoo-cisco-iosxe-security-tcp-keepalives-out
      - title: Routing Protocol Security
        filters: asset.platform == "cisco-iosxe"
        checks:
          - uid: mondoo-cisco-iosxe-security-bgp-neighbor-passwords
          - uid: mondoo-cisco-iosxe-security-ospf-area-authentication
    scoring_system: average
queries:
  - uid: mondoo-cisco-iosxe-security-ssh-enabled
    title: Ensure SSH is enabled
    impact: 95
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    mql: |
      cisco.iosxe.ssh.enabled == true
    docs:
      desc: |
        This check verifies that SSH is enabled on the device. SSH provides encrypted remote management access, replacing insecure protocols like Telnet.

        **Why this matters**

        Without SSH enabled, the device cannot provide encrypted management access. If SSH is not enabled:

        - Remote management must rely on insecure protocols such as Telnet.
        - All management traffic including credentials is transmitted in clear text.
        - Compliance with security frameworks requiring encrypted management access cannot be met.

        Enabling SSH ensures that secure, encrypted remote management access is available.
      audit: |-
        To verify that SSH is enabled on the device:

        1. Open an authenticated session to the device CLI.
        2. Display the SSH server status:

           ```
           show ip ssh
           ```

        The device passes when the output reports `SSH Enabled` along with a protocol version. Output reporting `SSH Disabled` is a failing result.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            SSH requires a hostname, a domain name, and an RSA key pair. Set the hostname and domain name only if they are not already configured, because changing them renames the device in logs and management systems:

            ```
            configure terminal
            hostname <hostname>
            ip domain name <domain.com>
            crypto key generate rsa modulus 2048
            ip ssh version 2
            ```

            If an RSA key pair already exists, the key generation command asks for confirmation before replacing it. Replacing the key pair changes the SSH host identity, so clients that stored the old host key must accept the new one.
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/ios-xml/ios/sec_usr_ssh/configuration/xe-16/sec-usr-ssh-xe-16-book/sec-secure-shell-v2.html
        title: Cisco IOS-XE SSH Configuration Guide
  - uid: mondoo-cisco-iosxe-security-ssh-version-2
    title: Ensure SSH version 2 is configured
    impact: 95
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    mql: |
      cisco.iosxe.ssh.version == "2.0"
    docs:
      desc: |
        This check verifies that SSH version 2 is enforced. SSH version 1 has known cryptographic vulnerabilities and must not be used.

        **Why this matters**

        SSH version 1 has well-documented weaknesses including susceptibility to man-in-the-middle attacks. If SSH version 2 is not enforced:

        - Management sessions are vulnerable to cryptographic attacks in SSH version 1.
        - Session integrity cannot be guaranteed.
        - Compliance with modern security frameworks cannot be met.

        Enforcing SSH version 2 ensures all remote management sessions use strong cryptographic protections.
      audit: |-
        To verify that SSH version 2 is enforced:

        1. Open an authenticated session to the device CLI.
        2. Display the SSH server status:

           ```
           show ip ssh
           ```

        The device passes when the output reports `SSH Enabled - version 2.0`. Any output reporting version 1.5, 1.99, or compatibility mode is a failing result.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Configure SSH version 2:

            ```
            configure terminal
            ip ssh version 2
            ```
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/ios-xml/ios/sec_usr_ssh/configuration/xe-16/sec-usr-ssh-xe-16-book/sec-secure-shell-v2.html
        title: Cisco IOS-XE SSH Configuration Guide
  - uid: mondoo-cisco-iosxe-security-ssh-timeout-configured
    title: Ensure SSH timeout is configured
    impact: 75
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-1
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-12
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-10
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-3
    mql: |
      cisco.iosxe.ssh.timeoutSeconds > 0
      cisco.iosxe.ssh.timeoutSeconds <= 120
    docs:
      desc: |
        This check verifies that an SSH login timeout is configured to limit the time allowed for authentication. The timeout should be 120 seconds or less.

        **Why this matters**

        Without an SSH timeout, connection attempts can remain open indefinitely during authentication. If the timeout is not configured:

        - Resources are consumed by stale connection attempts.
        - Slow brute-force attacks can keep connections open for extended periods.

        Configuring an SSH timeout limits the authentication window and reduces resource consumption.
      audit: |-
        To verify that an SSH login timeout is configured:

        1. Open an authenticated session to the device CLI.
        2. Display the SSH configuration:

           ```
           show ip ssh
           ```

        The device passes when the reported `Authentication timeout` is greater than 0 and 120 seconds or less. A timeout of 0 or greater than 120 seconds is a failing result.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Configure SSH timeout (60 seconds recommended):

            ```
            configure terminal
            ip ssh time-out 60
            ```
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/ios-xml/ios/sec_usr_ssh/configuration/xe-16/sec-usr-ssh-xe-16-book/sec-secure-shell-v2.html
        title: Cisco IOS-XE SSH Configuration Guide
  - uid: mondoo-cisco-iosxe-security-rsa-key-minimum-size
    title: Ensure RSA key is at least 2048 bits
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-12
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-11
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-1
    mql: |
      cisco.iosxe.cryptoKeysRsa.any(modulusSize >= 2048)
    docs:
      desc: |
        This check verifies that at least one RSA key pair has a modulus of 2048 bits or larger. Keys smaller than 2048 bits are considered cryptographically weak.

        **Why this matters**

        RSA keys with fewer than 2048 bits can be factored with current computing resources. If the key size is insufficient:

        - The SSH host key can potentially be compromised.
        - Compliance with NIST and other standards requiring minimum 2048-bit RSA keys cannot be met.

        Using RSA keys of at least 2048 bits ensures adequate cryptographic strength.
      audit: |-
        To verify the RSA key modulus size:

        1. Open an authenticated session to the device CLI.
        2. Display the device crypto keys:

           ```
           show crypto key mypubkey rsa
           ```

        The device passes when at least one key pair reports a modulus of 2048 bits or larger. If every key pair reports a modulus smaller than 2048 bits, it is a failing result.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Generate a new RSA key pair with at least 2048 bits:

            ```
            configure terminal
            crypto key generate rsa modulus 2048
            ```

            The device asks for confirmation before replacing an existing key pair. Replacing the key pair changes the SSH host identity, so SSH clients that stored the old host key receive a host key change warning and must accept the new key. Existing sessions stay connected. Notify administrators and update any automation that verifies the host key.
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/ios-xml/ios/sec_usr_ssh/configuration/xe-16/sec-usr-ssh-xe-16-book/sec-secure-shell-v2.html
        title: Cisco IOS-XE SSH Configuration Guide
  - uid: mondoo-cisco-iosxe-security-aaa-new-model-enabled
    title: Ensure AAA new model is enabled
    impact: 95
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-j
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-3
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-3
    mql: |
      cisco.iosxe.aaa.newModelEnabled == true
    docs:
      desc: |
        This check verifies that the AAA new model is enabled. The AAA new model (`aaa new-model`) is required to use TACACS+ or RADIUS for centralized authentication, authorization, and accounting.

        **Why this matters**

        Without the AAA new model enabled, the device cannot use centralized authentication services. If AAA new model is not enabled:

        - The device relies solely on local authentication, which is difficult to manage at scale.
        - Centralized access control through TACACS+ or RADIUS is not available.
        - Audit trails for authentication events are incomplete.
        - Compliance with security frameworks requiring centralized authentication cannot be achieved.

        Enabling the AAA new model is the prerequisite for all AAA functionality.
      audit: |-
        To verify that the AAA new model is enabled:

        1. Open an authenticated session to the device CLI.
        2. Display the running configuration for the AAA setting:

           ```
           show running-config | include aaa new-model
           ```

        The device passes when the output contains `aaa new-model`. Empty output is a failing result.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Enabling the AAA new model immediately changes authentication on every line, including the VTY lines you use for remote management. If no local user and no default login method list exist, you can lose access to the device. Create a local user and a default login method list in the same session, and keep that session open until you verify access:

            ```
            configure terminal
            username <admin-user> privilege 15 algorithm-type scrypt secret <strong-password>
            aaa new-model
            aaa authentication login default local
            ```

            Open a second session and confirm that you can still log in before closing your current session.
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/ios-xml/ios/sec_usr_aaa/configuration/xe-16/sec-usr-aaa-xe-16-book/sec-cfg-authentification.html
        title: Cisco IOS-XE AAA Configuration Guide
  - uid: mondoo-cisco-iosxe-security-aaa-authentication-login-configured
    title: Ensure AAA authentication login is configured
    impact: 95
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-j
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-3
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-3
    mql: |
      cisco.iosxe.aaa.loginEntries.length > 0
    docs:
      desc: |
        This check verifies that AAA authentication login method lists are configured. AAA authentication login defines how users are authenticated when accessing the device.

        **Why this matters**

        Without AAA authentication login configured, the device may allow access without proper authentication. If AAA login is not configured:

        - User authentication may not be enforced consistently.
        - Centralized identity management cannot be leveraged.
        - Audit trails for authentication events are incomplete.

        Configuring AAA authentication login ensures proper authentication is enforced for all access methods.
      audit: |-
        To verify that AAA authentication login method lists are configured:

        1. Open an authenticated session to the device CLI.
        2. Display the configured AAA authentication login lists:

           ```
           show running-config | include aaa authentication login
           ```

        The device passes when at least one `aaa authentication login` method list is listed. Empty output is a failing result.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Define the TACACS+ server, then configure the default login method list with a local fallback. The default list takes effect on all lines as soon as it is entered, so create a local user first and keep your current session open until you verify login from a second session:

            ```
            configure terminal
            username <admin-user> privilege 15 algorithm-type scrypt secret <strong-password>
            aaa new-model
            tacacs server <server-name>
             address ipv4 <tacacs-server-ip>
             key <shared-secret>
            exit
            aaa authentication login default group tacacs+ local
            ```

            The `local` fallback ensures access is maintained if AAA servers are unreachable.
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/ios-xml/ios/sec_usr_aaa/configuration/xe-16/sec-usr-aaa-xe-16-book/sec-cfg-authentification.html
        title: Cisco IOS-XE AAA Configuration Guide
  - uid: mondoo-cisco-iosxe-security-aaa-accounting-configured
    title: Ensure AAA accounting is configured
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-16
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    mql: |
      cisco.iosxe.aaa.accountingRecords.length > 0
    docs:
      desc: |
        This check verifies that AAA accounting is configured to log user activity. Accounting records provide an audit trail of commands executed, sessions started, and system events.

        **Why this matters**

        Without AAA accounting, there is no record of administrative activity. If accounting is not configured:

        - There is no forensic evidence of commands executed during a security incident.
        - Compliance requirements for audit logging cannot be met.
        - Accountability for privileged operations is lost.

        Enabling AAA accounting ensures that all activity is logged for audit and compliance.
      audit: |-
        To verify that AAA accounting is configured:

        1. Open an authenticated session to the device CLI.
        2. Display the configured AAA accounting entries:

           ```
           show running-config | include aaa accounting
           ```

        The device passes when at least one `aaa accounting` entry is listed. Empty output is a failing result.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            AAA accounting requires the AAA new model and a configured TACACS+ server. With those prerequisites in place, enable accounting for EXEC sessions and privileged commands:

            ```
            configure terminal
            aaa accounting exec default start-stop group tacacs+
            aaa accounting commands 15 default start-stop group tacacs+
            ```

            Verify that records arrive on the TACACS+ server after the next login.
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/ios-xml/ios/sec_usr_aaa/configuration/xe-16/sec-usr-aaa-xe-16-book/sec-cfg-acctng.html
        title: Cisco IOS-XE AAA Accounting Guide
  - uid: mondoo-cisco-iosxe-security-users-secret-not-password
    title: Ensure users use secret instead of password
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-j
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-5
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-10
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-3
    mql: |
      cisco.iosxe.users.all(
        credentialType == "secret"
      )
    docs:
      desc: |
        This check verifies that all local user accounts use `secret` rather than `password` for credential storage. The `secret` keyword uses a one-way hash (MD5, SHA-256, or SCRYPT) while `password` uses reversible Type 7 encryption that is trivially decoded.

        **Why this matters**

        Type 7 passwords can be decoded instantly using freely available tools. If users are configured with `password` instead of `secret`:

        - Credentials can be recovered in plain text from the running configuration.
        - Configuration backups expose all user passwords.
        - An attacker with read access to the configuration obtains all credentials.

        Using `secret` for all user accounts ensures that credentials are stored with a one-way hash.
      audit: |-
        To verify that local users use `secret` rather than `password`:

        1. Open an authenticated session to the device CLI.
        2. Display the configured user accounts:

           ```
           show running-config | include ^username
           ```

        The device passes when every `username` line uses the `secret` keyword. Any `username` line using `password` is a failing result.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Cisco IOS XE does not allow a user account to have both a password and a secret, so accounts configured with `password` must be removed and recreated with `secret`. Deleting the account removes its credentials until the next command recreates it. Before you begin, confirm that a second administrator account exists or that you have console access, so that a dropped session between the two commands cannot lock you out. If you are converting the account you are logged in with, keep your session open and verify the new credential from a second session before closing:

            ```
            configure terminal
            no username <user>
            username <user> privilege <level> algorithm-type scrypt secret <password>
            ```

            The `algorithm-type scrypt` keyword stores the credential as a type 9 hash, which is the strongest option. Repeat for every account that still uses `password`.
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/ios-xml/ios/sec_usr_aaa/configuration/xe-16/sec-usr-aaa-xe-16-book/sec-cfg-authentification.html
        title: Cisco IOS-XE User Configuration Guide
  - uid: mondoo-cisco-iosxe-security-enable-secret-configured
    title: Ensure enable secret is configured (not enable password)
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-j
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-5
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-10
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-3
    mql: |
      cisco.iosxe.configuration.enableSecret.type == "secret"
    docs:
      desc: |
        This check verifies that the privileged EXEC mode access is protected with `enable secret` rather than `enable password`. The `enable secret` uses a one-way hash, while `enable password` uses easily reversed Type 7 encryption.

        **Why this matters**

        The enable password controls access to privileged EXEC mode, which grants full administrative control. If `enable password` is used instead of `enable secret`:

        - The privileged mode credential is stored with reversible encryption.
        - An attacker can decode the password from the configuration.
        - Full administrative access to the device is compromised.

        Using `enable secret` ensures the privileged mode credential is protected with a one-way hash.
      audit: |-
        To verify that privileged EXEC access uses `enable secret`:

        1. Open an authenticated session to the device CLI.
        2. Display the running configuration for the enable credential:

           ```
           show running-config | include enable
           ```

        The device passes when the output contains an `enable secret` line and no `enable password` line. An `enable password` line is a failing result.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Configure the enable secret first, then remove the legacy enable password so the device is never left without a privileged EXEC credential:

            ```
            configure terminal
            enable secret 0 <strong-password>
            no enable password
            ```

            To store the credential as a type 9 hash, use `enable algorithm-type scrypt secret <strong-password>` instead of the `enable secret 0` form.
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/ios-xml/ios/sec_usr_aaa/configuration/xe-16/sec-usr-aaa-xe-16-book/sec-cfg-authentification.html
        title: Cisco IOS-XE Password Configuration Guide
  - uid: mondoo-cisco-iosxe-security-service-password-encryption
    title: Ensure service password encryption is enabled
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-11
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-1
    mql: |
      cisco.iosxe.configuration.service.passwordEncryptionEnabled == true
    docs:
      desc: |
        This check verifies that the `service password-encryption` command is enabled. While this provides only Type 7 encryption (which is reversible), it prevents passwords from being visible in plain text when viewing the configuration.

        **Why this matters**

        Without service password encryption, some passwords appear in clear text in the configuration. If password encryption is not enabled:

        - Passwords are visible to anyone who can view the running configuration.
        - Shoulder-surfing during configuration review exposes credentials.
        - Configuration backups contain clear-text passwords.

        Enabling service password encryption provides a basic layer of protection against casual observation.
      audit: |-
        To verify that service password encryption is enabled:

        1. Open an authenticated session to the device CLI.
        2. Display the running configuration for the service setting:

           ```
           show running-config | include service password-encryption
           ```

        The device passes when the output contains `service password-encryption`. Empty output is a failing result.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Enable service password encryption:

            ```
            configure terminal
            service password-encryption
            ```
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/ios-xml/ios/sec_usr_aaa/configuration/xe-16/sec-usr-aaa-xe-16-book/sec-cfg-authentification.html
        title: Cisco IOS-XE Password Configuration Guide
  - uid: mondoo-cisco-iosxe-security-http-disabled
    title: Ensure HTTP server is disabled
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    mql: |
      cisco.iosxe.ip.httpEnabled == false
    docs:
      desc: |
        This check verifies that the HTTP server is disabled. HTTP transmits all data in clear text, making it unsuitable for device management.

        **Why this matters**

        The HTTP server provides a web-based management interface over an unencrypted connection. If HTTP is enabled:

        - All management traffic including credentials is transmitted in clear text.
        - Sessions can be hijacked through traffic interception.
        - The HTTP service increases the attack surface with potential web vulnerabilities.

        Disabling HTTP and using only HTTPS ensures that all web-based management is encrypted.
      audit: |-
        To verify that the HTTP server is disabled:

        1. Open an authenticated session to the device CLI.
        2. Display the running configuration for the HTTP server:

           ```
           show running-config | include ip http server
           ```

        The device passes when the output contains `no ip http server` or no `ip http server` line at all. An `ip http server` line is a failing result.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Disable the HTTP server:

            ```
            configure terminal
            no ip http server
            ```
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/ios-xml/ios/https/configuration/xe-16/https-xe-16-book/nm-https.html
        title: Cisco IOS-XE HTTP Configuration Guide
  - uid: mondoo-cisco-iosxe-security-https-enabled
    title: Ensure HTTPS server is enabled
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    mql: |
      cisco.iosxe.ip.httpsEnabled == true
    docs:
      desc: |
        This check verifies that the HTTPS server is enabled for secure web-based management. HTTPS provides TLS-encrypted management access when a web interface is required.

        **Why this matters**

        If web-based management is needed, HTTPS must be used to encrypt all traffic. Without HTTPS:

        - Web-based management is either unavailable or relies on unencrypted HTTP.
        - Compliance requirements for encrypted management interfaces cannot be met.

        Enabling HTTPS ensures that web-based management uses encrypted communications.
      audit: |-
        To verify that the HTTPS server is enabled:

        1. Open an authenticated session to the device CLI.
        2. Display the running configuration for the secure HTTP server:

           ```
           show running-config | include ip http secure-server
           ```

        The device passes when the output contains `ip http secure-server`. Empty output or `no ip http secure-server` is a failing result.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Enable the HTTPS server:

            ```
            configure terminal
            ip http secure-server
            ```
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/ios-xml/ios/https/configuration/xe-16/https-xe-16-book/nm-https.html
        title: Cisco IOS-XE HTTPS Configuration Guide
  - uid: mondoo-cisco-iosxe-security-cdp-disabled
    title: Ensure CDP is disabled
    impact: 75
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ccc-06
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ac-3
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-6
      compliance/pci-dss-4: pcidss-requirement-2-2-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-1
    mql: |
      cisco.iosxe.cdp.enabled == false
    docs:
      desc: |
        This check verifies that Cisco Discovery Protocol (CDP) is disabled. CDP broadcasts detailed device information that can be exploited for network reconnaissance.

        **Why this matters**

        CDP operates at Layer 2 and sends information in clear text including hostname, IP address, platform, and software version. If CDP is not disabled:

        - Detailed device information is broadcast to all directly connected devices.
        - Attackers can passively collect network topology and software version data.
        - This information enables targeted attacks against specific platform vulnerabilities.

        Disabling CDP prevents unnecessary information disclosure.
      audit: |-
        To verify that CDP is disabled globally:

        1. Open an authenticated session to the device CLI.
        2. Display the global CDP status:

           ```
           show cdp
           ```

        The device passes when the output reports that CDP is not enabled. Output reporting `CDP is enabled globally` is a failing result.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Disable CDP globally:

            ```
            configure terminal
            no cdp run
            ```

            Before disabling CDP, confirm that nothing depends on it. Cisco IP phones use CDP for voice VLAN assignment and power negotiation, and some monitoring and topology tools rely on CDP data. Plan the change with the teams that operate those systems.
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/ios-xml/ios/cdp/configuration/xe-16/cdp-xe-16-book/nm-cdp-discover.html
        title: Cisco IOS-XE CDP Configuration Guide
  - uid: mondoo-cisco-iosxe-security-bootp-disabled
    title: Ensure BOOTP service is disabled
    impact: 75
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ccc-06
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ac-3
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-6
      compliance/pci-dss-4: pcidss-requirement-2-2-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-1
    mql: |
      cisco.iosxe.bootp.enabled == false
    docs:
      desc: |
        This check verifies that the Bootstrap Protocol (BOOTP) service is disabled. BOOTP is a legacy protocol for network bootstrapping that is rarely needed and increases the attack surface.

        **Why this matters**

        The BOOTP service allows the device to act as a BOOTP server. If enabled unnecessarily:

        - The service increases the attack surface with an unused network service.
        - It can be exploited for network reconnaissance or denial-of-service attacks.

        Disabling BOOTP removes an unnecessary service and reduces the attack surface.
      audit: |-
        To verify that the BOOTP service is disabled:

        1. Open an authenticated session to the device CLI.
        2. Display the running configuration for the BOOTP server:

           ```
           show running-config all | include ip bootp server
           ```

        The device passes when the output contains `no ip bootp server`. An `ip bootp server` line is a failing result.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Disable BOOTP:

            ```
            configure terminal
            no ip bootp server
            ```
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/ios-xml/ios/ipaddr_dhcp/configuration/xe-16/dhcp-xe-16-book.html
        title: Cisco IOS-XE DHCP/BOOTP Configuration Guide
  - uid: mondoo-cisco-iosxe-security-source-routing-disabled
    title: Ensure IP source routing is disabled
    impact: 85
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ccc-06
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ac-3
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-6
      compliance/pci-dss-4: pcidss-requirement-2-2-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-1
    mql: |
      cisco.iosxe.ip.sourceRouteEnabled == false
    docs:
      desc: |
        This check verifies that IP source routing is disabled. Source routing allows a sender to specify the route a packet takes through the network, which can be abused to bypass security controls.

        **Why this matters**

        IP source routing enables attackers to specify routing paths that circumvent firewalls, ACLs, and other security controls. If source routing is enabled:

        - Attackers can route packets through paths that bypass security controls.
        - Spoofed packets can be directed to reach internal networks.
        - Network access controls can be circumvented.

        Disabling source routing prevents attackers from manipulating packet routing paths.
      audit: |-
        To verify that IP source routing is disabled:

        1. Open an authenticated session to the device CLI.
        2. Display the running configuration for the source-route setting:

           ```
           show running-config all | include ip source-route
           ```

        The device passes when the output contains `no ip source-route`. An `ip source-route` line is a failing result.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Disable IP source routing:

            ```
            configure terminal
            no ip source-route
            ```
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/ios-xml/ios/ipaddr_nat/configuration/xe-16/nat-xe-16-book.html
        title: Cisco IOS-XE IP Configuration Guide
  - uid: mondoo-cisco-iosxe-security-pad-disabled
    title: Ensure PAD service is disabled
    impact: 75
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ccc-06
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ac-3
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-6
      compliance/pci-dss-4: pcidss-requirement-2-2-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-1
    mql: |
      cisco.iosxe.configuration.service.padEnabled == false
    docs:
      desc: |
        This check verifies that the X.25 Packet Assembler/Disassembler (PAD) service is disabled. PAD is a legacy service for X.25 networks that is no longer needed in modern networks and increases the attack surface.

        **Why this matters**

        The PAD service is a legacy protocol that has no place in modern network environments. If PAD is enabled:

        - An unnecessary service is exposed that could be exploited.
        - The attack surface is increased with a rarely monitored legacy service.

        Disabling PAD removes an unnecessary legacy service.
      audit: |-
        To verify that the PAD service is disabled:

        1. Open an authenticated session to the device CLI.
        2. Display the running configuration for the PAD service:

           ```
           show running-config all | include service pad
           ```

        The device passes when the output contains `no service pad`. A `service pad` line is a failing result.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Disable PAD:

            ```
            configure terminal
            no service pad
            ```
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/ios-xml/ios/fundamentals/configuration/xe-16/fundamentals-xe-16-book.html
        title: Cisco IOS-XE Service Configuration Guide
  - uid: mondoo-cisco-iosxe-security-ntp-authentication-enabled
    title: Ensure NTP authentication is enabled
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-17
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-6
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-7
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    mql: |
      cisco.iosxe.ntp.authenticate == true
    docs:
      desc: |
        This check verifies that NTP authentication is enabled to ensure the device only synchronizes time with trusted NTP servers.

        **Why this matters**

        Without NTP authentication, an attacker can manipulate the device's clock through NTP spoofing. If NTP authentication is not enabled:

        - Log timestamps become unreliable, undermining forensic investigations.
        - Certificate validation can be bypassed with manipulated time.
        - Time-sensitive security mechanisms can be compromised.

        Enabling NTP authentication ensures the device only accepts time updates from verified sources.
      audit: |-
        To verify that NTP authentication is enabled:

        1. Open an authenticated session to the device CLI.
        2. Display the running configuration for NTP authentication:

           ```
           show running-config | include ntp authenticate
           ```

        The device passes when the output contains `ntp authenticate`. Empty output is a failing result.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Configure NTP authentication:

            ```
            configure terminal
            ntp authenticate
            ntp authentication-key 1 md5 <key-value>
            ntp trusted-key 1
            ntp server <server-ip> key 1
            ```
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/ios-xml/ios/bsm/configuration/xe-16/bsm-xe-16-book/bsm-time-calendar-set.html
        title: Cisco IOS-XE NTP Configuration Guide
  - uid: mondoo-cisco-iosxe-security-ntp-servers-configured
    title: Ensure NTP servers are configured
    impact: 75
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-17
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-6
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-7
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    mql: |
      cisco.iosxe.ntp.servers.length > 0
    docs:
      desc: |
        This check verifies that at least one NTP server is configured. Accurate time is essential for log correlation, certificate validation, and security event analysis.

        **Why this matters**

        Without NTP servers configured, the device clock drifts over time. If NTP servers are not configured:

        - Log timestamps are inaccurate, making incident investigation unreliable.
        - Certificate expiration checks may malfunction.
        - Event correlation across multiple devices is impossible.

        Configuring NTP servers ensures accurate, synchronized time.
      audit: |-
        To verify that NTP servers are configured:

        1. Open an authenticated session to the device CLI.
        2. Display the configured NTP associations:

           ```
           show ntp associations
           ```

        The device passes when at least one NTP server association is listed. Empty output is a failing result.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Configure NTP servers:

            ```
            configure terminal
            ntp server <ntp-server-ip-1>
            ntp server <ntp-server-ip-2>
            ```
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/ios-xml/ios/bsm/configuration/xe-16/bsm-xe-16-book/bsm-time-calendar-set.html
        title: Cisco IOS-XE NTP Configuration Guide
  - uid: mondoo-cisco-iosxe-security-logging-config-changes
    title: Ensure configuration change logging is enabled
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-16
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    mql: |
      cisco.iosxe.logging.configurationChangesLoggingEnabled == true
    docs:
      desc: |
        This check verifies that logging of configuration changes is enabled. Configuration change logging records all modifications to the device configuration, providing an audit trail of who changed what and when.

        **Why this matters**

        Without configuration change logging, modifications to the device go unrecorded. If change logging is not enabled:

        - There is no record of configuration modifications.
        - Unauthorized changes cannot be detected.
        - Compliance requirements for change management cannot be met.

        Enabling configuration change logging provides visibility into all configuration modifications.
      audit: |-
        To verify that configuration change logging is enabled:

        1. Open an authenticated session to the device CLI.
        2. Display the configuration archive logging status:

           ```
           show archive log config all
           ```

        The device passes when the configuration logger is enabled and records change entries. Output reporting that the logger is not enabled is a failing result.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Enable configuration change logging:

            ```
            configure terminal
            archive
            log config
            logging enable
            ```
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/ios-xml/ios/config-mgmt/configuration/xe-16/config-mgmt-xe-16-book/cm-config-logger.html
        title: Cisco IOS-XE Configuration Change Logging Guide
  - uid: mondoo-cisco-iosxe-security-logging-hosts-configured
    title: Ensure remote logging hosts are configured
    impact: 85
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-16
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    mql: |
      cisco.iosxe.logging.hosts.length > 0
    docs:
      desc: |
        This check verifies that at least one remote logging host is configured. Sending logs to a remote server ensures data is preserved even if the device is compromised.

        **Why this matters**

        Logs stored only on the device are vulnerable to loss or tampering. If remote logging hosts are not configured:

        - Logs are lost when the device reboots or the buffer overflows.
        - An attacker who compromises the device can erase local logs.
        - Centralized log correlation is not possible.

        Configuring remote logging hosts ensures logs are preserved centrally.
      audit: |-
        To verify that remote logging hosts are configured:

        1. Open an authenticated session to the device CLI.
        2. Display the logging configuration:

           ```
           show logging
           ```

        The device passes when at least one remote syslog host is listed under `Trap logging`. No configured logging host is a failing result.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Configure remote logging hosts:

            ```
            configure terminal
            logging host <syslog-server-ip>
            logging trap informational
            logging source-interface <interface>
            ```
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/ios-xml/ios/config-mgmt/configuration/xe-16/config-mgmt-xe-16-book/cm-config-logger.html
        title: Cisco IOS-XE Logging Configuration Guide
  - uid: mondoo-cisco-iosxe-security-logging-failed-logins
    title: Ensure failed login logging is enabled
    impact: 85
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-16
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    mql: |
      cisco.iosxe.logging.logUnsuccessfulLogin == true
    docs:
      desc: |
        This check verifies that failed login attempts are logged. Logging failed authentications is essential for detecting brute-force attacks and unauthorized access attempts.

        **Why this matters**

        Without failed login logging, suspicious authentication activity goes undetected. If failed login logging is not enabled:

        - Brute-force attacks go undetected.
        - There is no evidence of attempted unauthorized access.
        - Real-time alerting on suspicious activity is not possible.

        Enabling failed login logging captures authentication failures for security monitoring.
      audit: |-
        To verify that failed login logging is enabled:

        1. Open an authenticated session to the device CLI.
        2. Display the running configuration for login logging:

           ```
           show running-config | include login on-failure
           ```

        The device passes when the output contains `login on-failure log`. Empty output is a failing result.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Enable failed login logging:

            ```
            configure terminal
            login on-failure log
            ```
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/ios-xml/ios/sec_usr_aaa/configuration/xe-16/sec-usr-aaa-xe-16-book/sec-login-enhance.html
        title: Cisco IOS-XE Login Enhancement Guide
  - uid: mondoo-cisco-iosxe-security-snmp-no-public-community
    title: Ensure SNMP does not use default community strings
    impact: 95
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-j
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-5
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-10
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-3
    mql: |
      if (cisco.iosxe.snmp.enabled == true) {
        cisco.iosxe.snmp.communities.none(name == "public")
        cisco.iosxe.snmp.communities.none(name == "private")
      }
    docs:
      desc: |
        This check verifies that the default SNMP community strings "public" and "private" are not in use. These well-known defaults are the first values attackers try.

        **Why this matters**

        Default SNMP community strings are universally known and actively scanned for. If default communities are in use:

        - Anyone can read device data using the "public" community.
        - The "private" community may allow unauthorized configuration changes.
        - Automated scanning tools will immediately exploit default strings.

        Removing default community strings and using unique values ensures SNMP access is restricted.
      audit: |-
        To verify that default SNMP community strings are not in use:

        1. Open an authenticated session to the device CLI.
        2. Display the configured SNMP community strings:

           ```
           show running-config | include snmp-server community
           ```

        The device passes when no community named `public` or `private` is listed. A `public` or `private` community string is a failing result.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Remove the default community strings, create an ACL that permits only your management stations, and configure a unique community string restricted by that ACL:

            ```
            configure terminal
            no snmp-server community public
            no snmp-server community private
            access-list 10 permit <nms-ip>
            snmp-server community <unique-string> RO 10
            ```

            Any monitoring system still polling with the removed community strings loses access immediately. Update all pollers to the new community string as part of the same change.
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/ios-xml/ios/snmp/configuration/xe-16/snmp-xe-16-book/nm-snmp-cfg-snmp-support.html
        title: Cisco IOS-XE SNMP Configuration Guide
  - uid: mondoo-cisco-iosxe-security-snmp-communities-acl
    title: Ensure SNMP communities have ACLs applied
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ac-3
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-4
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-4-1-1
    mql: |
      if (cisco.iosxe.snmp.enabled == true && cisco.iosxe.snmp.communities.length > 0) {
        cisco.iosxe.snmp.communities.all(aclId != "")
      }
    docs:
      desc: |
        This check verifies that all SNMP community strings have ACLs applied to restrict which hosts can query the device via SNMP.

        **Why this matters**

        SNMP without ACL restrictions allows any network host to query the device. If ACLs are not applied:

        - Any device on the network can query SNMP data.
        - Write-access community strings allow remote configuration changes from any host.

        Applying ACLs restricts SNMP access to authorized management stations.
      audit: |-
        To verify that SNMP communities have ACLs applied:

        1. Open an authenticated session to the device CLI.
        2. Display the configured SNMP community strings:

           ```
           show running-config | include snmp-server community
           ```

        The device passes when every `snmp-server community` line ends with an ACL number or name. Any community string with no ACL applied is a failing result.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Create an ACL that permits only your management stations, then reapply each community string with the ACL. Re-entering a community string with the same name replaces the existing entry:

            ```
            configure terminal
            access-list 10 permit <nms-ip-1>
            access-list 10 permit <nms-ip-2>
            snmp-server community <community-string> RO 10
            ```

            Make sure the ACL permits every monitoring server before applying it. Servers not matched by the ACL lose SNMP access immediately.
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/ios-xml/ios/snmp/configuration/xe-16/snmp-xe-16-book/nm-snmp-cfg-snmp-support.html
        title: Cisco IOS-XE SNMP Configuration Guide
  - uid: mondoo-cisco-iosxe-security-vty-transport-ssh-only
    title: Ensure VTY lines use SSH transport only
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    mql: |
      cisco.iosxe.vtyLines.all(
        inputTransportTypes.contains("ssh") &&
        inputTransportTypes.contains("telnet") == false
      )
    docs:
      desc: |
        This check verifies that all VTY lines are configured to accept only SSH as the transport protocol. Telnet transmits all data in clear text, including credentials.

        **Why this matters**

        Telnet on VTY lines exposes management traffic to interception. If telnet is allowed:

        - Usernames and passwords are transmitted unencrypted.
        - Active sessions can be hijacked.
        - Compliance with encrypted management requirements cannot be met.

        Restricting VTY transport to SSH ensures all remote sessions are encrypted.
      audit: |-
        To verify that VTY lines accept only SSH transport:

        1. Open an authenticated session to the device CLI.
        2. Display the VTY line configuration:

           ```
           show running-config | section line vty
           ```

        The device passes when every VTY line reports `transport input ssh`. A VTY line allowing `telnet` or `all` is a failing result.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Before restricting transport to SSH, verify that SSH login to the device works. Once applied, telnet connections are refused immediately, including the session you may be using. Display all VTY lines with `show line` and apply the setting to every VTY range, not just lines 0 to 15:

            ```
            ! Before proceeding, open a new SSH session to this device and confirm login succeeds.
            ! Do not close your current session until SSH access is verified.
            configure terminal
            line vty 0 15
            transport input ssh
            line vty 16 31
            transport input ssh
            ```

            Adjust the second range to match the highest VTY line your platform provides.
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/ios-xml/ios/sec_usr_ssh/configuration/xe-16/sec-usr-ssh-xe-16-book/sec-secure-shell-v2.html
        title: Cisco IOS-XE SSH Configuration Guide
  - uid: mondoo-cisco-iosxe-security-vty-exec-timeout-configured
    title: Ensure VTY exec timeout is configured
    impact: 75
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-1
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-12
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-10
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-3
    mql: |
      cisco.iosxe.vtyLines.all(
        execTimeout > 0 * time.second
      )
    docs:
      desc: |
        This check verifies that all VTY lines have an exec timeout configured. The exec timeout disconnects idle sessions to reduce the risk of unauthorized access through unattended terminals.

        **Why this matters**

        Without an exec timeout, idle VTY sessions remain open indefinitely. If exec timeouts are not configured:

        - Forgotten sessions can be exploited by unauthorized users.
        - Connection resources are consumed by idle sessions.
        - Compliance requirements for session management cannot be met.

        Configuring exec timeouts on VTY lines ensures idle sessions are terminated.
      audit: |-
        To verify that VTY lines have an exec timeout configured:

        1. Open an authenticated session to the device CLI.
        2. Display the VTY line configuration:

           ```
           show running-config | section line vty
           ```

        The device passes when every VTY line reports a non-zero `exec-timeout`. A VTY line with `exec-timeout 0 0` or no exec timeout is a failing result.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Configure exec timeout on VTY lines (10 minutes recommended):

            ```
            configure terminal
            line vty 0 15
            exec-timeout 10 0
            ```
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/ios-xml/ios/fundamentals/configuration/xe-16/fundamentals-xe-16-book.html
        title: Cisco IOS-XE Line Configuration Guide
  - uid: mondoo-cisco-iosxe-security-vty-acl-configured
    title: Ensure VTY lines have ACLs configured
    impact: 85
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ac-3
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-4
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-4-1-1
    mql: |
      cisco.iosxe.vtyLines.all(
        accessClassIn != ""
      )
    docs:
      desc: |
        This check verifies that all VTY lines have an inbound access class (ACL) configured to restrict remote management access to authorized source IP addresses.

        **Why this matters**

        VTY lines without ACLs allow connection attempts from any source. If ACLs are not configured:

        - Any host can attempt brute-force attacks against the device.
        - Management access cannot be restricted to trusted networks.

        Applying ACLs to VTY lines restricts access to authorized management stations.
      audit: |-
        To verify that VTY lines have an inbound access class configured:

        1. Open an authenticated session to the device CLI.
        2. Display the VTY line configuration:

           ```
           show running-config | section line vty
           ```

        The device passes when every VTY line reports an `access-class <acl> in` entry. A VTY line with no inbound access class is a failing result.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Create an ACL that permits your management hosts, then apply it inbound on every VTY line. The ACL takes effect immediately, so make sure it includes the address you are connecting from, keep your current session open, and verify that a new session still succeeds before closing:

            ```
            configure terminal
            access-list 11 permit <management-subnet> <wildcard-mask>
            line vty 0 15
            access-class 11 in
            line vty 16 31
            access-class 11 in
            ```

            Display all VTY lines with `show line` and apply the access class to every range your platform provides.
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/ios-xml/ios/fundamentals/configuration/xe-16/fundamentals-xe-16-book.html
        title: Cisco IOS-XE Line Configuration Guide
  - uid: mondoo-cisco-iosxe-security-aux-line-no-exec
    title: Ensure auxiliary line has exec disabled
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-1
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-3
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-6
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-4-1-3
    mql: |
      cisco.iosxe.auxLine.exec == false
    docs:
      desc: |
        This check verifies that the auxiliary (AUX) line has exec mode disabled. The AUX port is typically used for modem connections and should not provide direct EXEC access, as it represents a potential backdoor.

        **Why this matters**

        The AUX port provides a physical access path that bypasses network-based security controls. If exec is enabled on the AUX line:

        - An attacker with physical access to the AUX port can gain CLI access.
        - Modem connections to the AUX port can be used for unauthorized remote access.
        - The AUX port bypasses network ACLs and firewall rules.

        Disabling exec on the AUX line prevents it from being used as an entry point.
      audit: |-
        To verify that the auxiliary line has exec disabled:

        1. Open an authenticated session to the device CLI.
        2. Display the auxiliary line configuration:

           ```
           show running-config | section line aux
           ```

        The device passes when the auxiliary line reports `no exec`. An auxiliary line without `no exec` is a failing result.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Disable exec on the auxiliary line:

            ```
            configure terminal
            line aux 0
            no exec
            ```
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/ios-xml/ios/fundamentals/configuration/xe-16/fundamentals-xe-16-book.html
        title: Cisco IOS-XE Line Configuration Guide
  - uid: mondoo-cisco-iosxe-security-console-exec-timeout
    title: Ensure console exec timeout is configured
    impact: 75
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-1
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-12
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-10
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-3
    mql: |
      cisco.iosxe.consoleLine.execTimeout > 0 * time.second
    docs:
      desc: |
        This check verifies that the console line has an exec timeout configured to disconnect idle sessions automatically.

        **Why this matters**

        Without a console timeout, an idle session remains open indefinitely. If the console timeout is not set:

        - An unattended console connection can be used for unauthorized changes.
        - Physical access security requirements cannot be met.

        Configuring a console exec timeout ensures idle sessions are terminated.
      audit: |-
        To verify that the console line has an exec timeout configured:

        1. Open an authenticated session to the device CLI.
        2. Display the console line configuration:

           ```
           show running-config | section line con
           ```

        The device passes when the console line reports a non-zero `exec-timeout`. A console line with `exec-timeout 0 0` or no exec timeout is a failing result.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Configure console exec timeout (10 minutes recommended):

            ```
            configure terminal
            line con 0
            exec-timeout 10 0
            ```
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/ios-xml/ios/fundamentals/configuration/xe-16/fundamentals-xe-16-book.html
        title: Cisco IOS-XE Line Configuration Guide
  - uid: mondoo-cisco-iosxe-security-login-banner-configured
    title: Ensure a login banner is configured
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-9
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-3
    mql: |
      cisco.iosxe.configuration.loginBanner != ""
    docs:
      desc: |
        This check verifies that a login banner is configured. A login banner provides legal notice to users before they authenticate, which is essential for prosecuting unauthorized access.

        **Why this matters**

        Without a login banner, there is no legal warning before access. If a login banner is not configured:

        - Legal proceedings against unauthorized access may be weakened.
        - Users are not informed of acceptable use policies or monitoring.
        - Compliance requirements for access warnings cannot be met.

        Configuring a login banner ensures all users receive legal notice before accessing the device.
      audit: |-
        To verify that a login banner is configured:

        1. Open an authenticated session to the device CLI.
        2. Display the running configuration for the login banner:

           ```
           show running-config | include banner login
           ```

        The device passes when a `banner login` entry with text is configured. Empty output is a failing result.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Configure a login banner:

            ```
            configure terminal
            banner login ^Authorized access only. All activity is monitored and logged.^
            ```
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/ios-xml/ios/fundamentals/configuration/xe-16/fundamentals-xe-16-book.html
        title: Cisco IOS-XE Banner Configuration Guide
  - uid: mondoo-cisco-iosxe-security-motd-banner-configured
    title: Ensure MOTD banner is configured
    impact: 65
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-9
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-3
    mql: |
      cisco.iosxe.configuration.motdBanner != ""
    docs:
      desc: |
        This check verifies that a Message of the Day (MOTD) banner is configured. The MOTD banner is displayed before login and serves as a general warning to all users.

        **Why this matters**

        The MOTD banner provides an additional layer of legal notice and organizational messaging. If the MOTD banner is not configured:

        - Users connecting to the device receive no warning about authorized use.
        - Legal requirements for displaying access warnings may not be met.

        Configuring a MOTD banner ensures users are notified of access policies.
      audit: |-
        To verify that a Message of the Day banner is configured:

        1. Open an authenticated session to the device CLI.
        2. Display the running configuration for the MOTD banner:

           ```
           show running-config | include banner motd
           ```

        The device passes when a `banner motd` entry with text is configured. Empty output is a failing result.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Configure a MOTD banner:

            ```
            configure terminal
            banner motd ^Unauthorized access is prohibited. All activity is subject to monitoring.^
            ```
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/ios-xml/ios/fundamentals/configuration/xe-16/fundamentals-xe-16-book.html
        title: Cisco IOS-XE Banner Configuration Guide
  - uid: mondoo-cisco-iosxe-security-hostname-configured
    title: Ensure hostname is configured
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    mql: |
      cisco.iosxe.hostname != ""
      cisco.iosxe.hostname.downcase != "router"
      cisco.iosxe.hostname.downcase != "switch"
    docs:
      desc: |
        This check verifies that a unique, descriptive hostname is configured. A meaningful hostname is essential for identifying the device in logs, alerts, and management systems.

        **Why this matters**

        Without a unique hostname, the device uses a generic default name. If the hostname is not configured:

        - The device cannot be clearly identified in logs or management platforms.
        - Log correlation across multiple devices is unreliable.
        - Network topology documentation is incomplete.

        Setting a descriptive hostname ensures the device is identifiable across all workflows.
      audit: |-
        To verify that a unique, descriptive hostname is configured:

        1. Open an authenticated session to the device CLI.
        2. Display the configured hostname:

           ```
           show running-config | include ^hostname
           ```

        The device passes when a hostname is set and is not the generic value `router` or `switch`. An empty or generic hostname is a failing result.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Configure a descriptive hostname:

            ```
            configure terminal
            hostname <unique-descriptive-name>
            ```
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/ios-xml/ios/fundamentals/configuration/xe-16/fundamentals-xe-16-book.html
        title: Cisco IOS-XE System Configuration Guide
  - uid: mondoo-cisco-iosxe-security-domain-name-configured
    title: Ensure domain name is configured
    impact: 65
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ccc-06
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-1
      compliance/nist-csf-2: nist-csf-2-pr-ps-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-2
      compliance/pci-dss-4: pcidss-requirement-2-2-1
      compliance/soc2-2017: soc2-control-cc7-1-1
      compliance/vda-isa-5: vda-isa-5-5-2-1
    mql: |
      cisco.iosxe.domainNames.length > 0
    docs:
      desc: |
        This check verifies that a domain name is configured. A domain name is required for generating an FQDN, which is used for SSH key generation and certificate creation.

        **Why this matters**

        Without a domain name, the device cannot generate an FQDN. If the domain name is not set:

        - SSH RSA key generation may fail.
        - SSL/TLS certificate creation requires an FQDN.
        - Device identification in DNS is not possible.

        Configuring a domain name ensures the device can participate in secured communications.
      audit: |-
        To verify that a domain name is configured:

        1. Open an authenticated session to the device CLI.
        2. Display the running configuration for the domain name:

           ```
           show running-config | include ip domain name
           ```

        The device passes when an `ip domain name` entry is configured. Empty output is a failing result.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Configure the domain name:

            ```
            configure terminal
            ip domain name <your-domain.com>
            ```
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/ios-xml/ios/fundamentals/configuration/xe-16/fundamentals-xe-16-book.html
        title: Cisco IOS-XE System Configuration Guide
  - uid: mondoo-cisco-iosxe-security-tcp-keepalives-in
    title: Ensure TCP keepalives-in is enabled
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ac-3
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-10
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-9
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-6
    mql: |
      cisco.iosxe.configuration.service.tcpKeepalivesInEnabled == true
    docs:
      desc: |
        This check verifies that TCP keepalives for inbound sessions are enabled. TCP keepalives detect dead connections and clean up orphaned sessions that consume resources.

        **Why this matters**

        Without TCP keepalives, dead sessions persist indefinitely. If keepalives-in is not enabled:

        - Orphaned sessions consume VTY line resources, potentially blocking legitimate access.
        - Dead sessions are not detected and cleaned up.

        Enabling TCP keepalives-in ensures dead inbound sessions are detected and removed.
      audit: |-
        To verify that TCP keepalives for inbound sessions are enabled:

        1. Open an authenticated session to the device CLI.
        2. Display the running configuration for the service setting:

           ```
           show running-config all | include service tcp-keepalives-in
           ```

        The device passes when the output contains `service tcp-keepalives-in`. A `no service tcp-keepalives-in` line or empty output is a failing result.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Enable TCP keepalives for inbound sessions:

            ```
            configure terminal
            service tcp-keepalives-in
            ```
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/ios-xml/ios/fundamentals/configuration/xe-16/fundamentals-xe-16-book.html
        title: Cisco IOS-XE Service Configuration Guide
  - uid: mondoo-cisco-iosxe-security-tcp-keepalives-out
    title: Ensure TCP keepalives-out is enabled
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ac-3
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-10
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-9
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-6
    mql: |
      cisco.iosxe.configuration.service.tcpKeepalivesOutEnabled == true
    docs:
      desc: |
        This check verifies that TCP keepalives for outbound sessions are enabled. TCP keepalives detect dead connections and clean up orphaned outbound sessions.

        **Why this matters**

        Without TCP keepalives for outbound sessions, stale connections persist. If keepalives-out is not enabled:

        - Dead outbound connections consume resources.
        - The device may not detect when a remote peer has become unreachable.

        Enabling TCP keepalives-out ensures dead outbound sessions are detected and removed.
      audit: |-
        To verify that TCP keepalives for outbound sessions are enabled:

        1. Open an authenticated session to the device CLI.
        2. Display the running configuration for the service setting:

           ```
           show running-config all | include service tcp-keepalives-out
           ```

        The device passes when the output contains `service tcp-keepalives-out`. A `no service tcp-keepalives-out` line or empty output is a failing result.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Enable TCP keepalives for outbound sessions:

            ```
            configure terminal
            service tcp-keepalives-out
            ```
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/ios-xml/ios/fundamentals/configuration/xe-16/fundamentals-xe-16-book.html
        title: Cisco IOS-XE Service Configuration Guide
  - uid: mondoo-cisco-iosxe-security-bgp-neighbor-passwords
    title: Ensure BGP neighbors have authentication configured
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    mql: |
      if (cisco.iosxe.bgp.neighbors.length > 0) {
        cisco.iosxe.bgp.neighbors.all(password != "")
      }
    docs:
      desc: |
        This check verifies that all BGP neighbors have MD5 authentication configured. BGP authentication prevents unauthorized peers from injecting routes.

        **Why this matters**

        Without BGP authentication, an attacker can establish rogue BGP sessions. If authentication is not configured:

        - Malicious routes can be injected, redirecting or black-holing traffic.
        - BGP sessions can be disrupted through TCP reset attacks.

        Configuring authentication on BGP neighbors ensures only authorized peers can establish sessions.
      audit: |-
        To verify that BGP neighbors have authentication configured:

        1. Open an authenticated session to the device CLI.
        2. Display the BGP configuration:

           ```
           show running-config | section router bgp
           ```

        The device passes when every configured `neighbor` has a `password` entry. A BGP neighbor with no password configured is a failing result.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Configure MD5 authentication for each BGP neighbor. The same password must be configured on both peers, and adding or changing the password resets the BGP session until the two sides match. Coordinate the change with the peer operator and schedule it during a maintenance window:

            ```
            configure terminal
            router bgp <as-number>
            neighbor <neighbor-ip> password <password>
            ```

            When neighbors belong to a peer group, set the password on the peer group so every member inherits it.
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/ios-xml/ios/iproute_bgp/configuration/xe-16/irg-xe-16-book.html
        title: Cisco IOS-XE BGP Configuration Guide
  - uid: mondoo-cisco-iosxe-security-ospf-area-authentication
    title: Ensure OSPF areas have authentication configured
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    mql: |
      if (cisco.iosxe.routerOspf.length > 0) {
        cisco.iosxe.routerOspf.all(
          areas.all(authenticationEnabled == true || md5AuthenticationEnabled == true)
        )
      }
    docs:
      desc: |
        This check verifies that all OSPF areas have authentication configured. OSPF authentication prevents unauthorized routers from injecting routes into the routing domain.

        **Why this matters**

        Without OSPF authentication, any device on the segment can participate in OSPF routing. If authentication is not configured:

        - Rogue routers can inject false routes.
        - OSPF adjacencies can be disrupted.
        - Man-in-the-middle attacks via route injection are possible.

        Configuring OSPF authentication ensures only authorized routers participate in the routing domain.
      audit: |-
        To verify that OSPF areas have authentication configured:

        1. Open an authenticated session to the device CLI.
        2. Display the OSPF configuration:

           ```
           show running-config | section router ospf
           ```

        The device passes when every configured area has `authentication` or `authentication message-digest` set. An OSPF area with no authentication is a failing result.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Configure a message digest key on every OSPF interface in the area, then enable message digest authentication for the area. Routers drop adjacencies with neighbors whose authentication does not match, so apply the same key on all routers in the area and schedule the change during a maintenance window:

            ```
            configure terminal
            interface <interface>
            ip ospf message-digest-key 1 md5 <key>
            exit
            router ospf <process-id>
            area <area-id> authentication message-digest
            ```

            Repeat the interface step for each OSPF interface in the area, then verify adjacencies with `show ip ospf neighbor`.
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/ios-xml/ios/iproute_ospf/configuration/xe-16/iro-xe-16-book.html
        title: Cisco IOS-XE OSPF Configuration Guide
