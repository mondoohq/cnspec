policies:
  - uid: mondoo-cisco-iosxe-security
    name: Mondoo Cisco IOS-XE Security
    version: 1.0.0
    license: BUSL-1.1
    tags:
      mondoo.com/category: security
      mondoo.com/platform: cisco-iosxe,networkdevice
    require:
      - provider: networkdevices
    authors:
      - name: Mondoo, Inc.
        email: hello@mondoo.com
    summary: Secure Cisco IOS-XE routers and switches
    docs:
      desc: |-
        The Mondoo Cisco IOS-XE Security policy provides comprehensive security checks for Cisco IOS-XE routers and switches. This policy helps ensure your Cisco IOS-XE infrastructure is properly configured, hardened, and maintained according to security best practices.

        This policy covers the following critical security areas:

        - Validates SSH configuration, version, and key strength
        - Ensures AAA authentication, authorization, and accounting are enabled
        - Verifies insecure services (HTTP, BOOTP, DHCP, CDP) are disabled
        - Validates user account security and password encryption
        - Ensures proper NTP authentication and time synchronization
        - Validates logging configuration and remote log collection
        - Ensures SNMP is hardened with ACLs and strong community strings
        - Validates VTY, console, and auxiliary line security
        - Ensures security banners and session timeouts are configured
        - Validates routing protocol authentication for BGP and OSPF
        - Ensures source routing and other dangerous features are disabled

        Have suggestions for new checks in this policy? Visit our [cnspec repository](https://github.com/mondoohq/cnspec).

    groups:
      - title: SSH Security
        filters: asset.platform == "cisco-iosxe"
        checks:
          - uid: mondoo-cisco-iosxe-security-ssh-enabled
          - uid: mondoo-cisco-iosxe-security-ssh-version-2
          - uid: mondoo-cisco-iosxe-security-ssh-timeout-configured
          - uid: mondoo-cisco-iosxe-security-rsa-key-minimum-size
      - title: Authentication and Authorization (AAA)
        filters: asset.platform == "cisco-iosxe"
        checks:
          - uid: mondoo-cisco-iosxe-security-aaa-new-model-enabled
          - uid: mondoo-cisco-iosxe-security-aaa-authentication-login-configured
          - uid: mondoo-cisco-iosxe-security-aaa-accounting-configured
      - title: User Account Security
        filters: asset.platform == "cisco-iosxe"
        checks:
          - uid: mondoo-cisco-iosxe-security-users-secret-not-password
          - uid: mondoo-cisco-iosxe-security-enable-secret-configured
          - uid: mondoo-cisco-iosxe-security-service-password-encryption
      - title: Protocol and Service Security
        filters: asset.platform == "cisco-iosxe"
        checks:
          - uid: mondoo-cisco-iosxe-security-http-disabled
          - uid: mondoo-cisco-iosxe-security-https-enabled
          - uid: mondoo-cisco-iosxe-security-cdp-disabled
          - uid: mondoo-cisco-iosxe-security-bootp-disabled
          - uid: mondoo-cisco-iosxe-security-source-routing-disabled
          - uid: mondoo-cisco-iosxe-security-pad-disabled
      - title: NTP and Time Configuration
        filters: asset.platform == "cisco-iosxe"
        checks:
          - uid: mondoo-cisco-iosxe-security-ntp-authentication-enabled
          - uid: mondoo-cisco-iosxe-security-ntp-servers-configured
      - title: Logging and Auditing
        filters: asset.platform == "cisco-iosxe"
        checks:
          - uid: mondoo-cisco-iosxe-security-logging-config-changes
          - uid: mondoo-cisco-iosxe-security-logging-hosts-configured
          - uid: mondoo-cisco-iosxe-security-logging-failed-logins
      - title: SNMP Security
        filters: asset.platform == "cisco-iosxe"
        checks:
          - uid: mondoo-cisco-iosxe-security-snmp-no-public-community
          - uid: mondoo-cisco-iosxe-security-snmp-communities-acl
      - title: VTY and Line Security
        filters: asset.platform == "cisco-iosxe"
        checks:
          - uid: mondoo-cisco-iosxe-security-vty-transport-ssh-only
          - uid: mondoo-cisco-iosxe-security-vty-exec-timeout-configured
          - uid: mondoo-cisco-iosxe-security-vty-acl-configured
          - uid: mondoo-cisco-iosxe-security-aux-line-no-exec
          - uid: mondoo-cisco-iosxe-security-console-exec-timeout
      - title: Access Control and Banners
        filters: asset.platform == "cisco-iosxe"
        checks:
          - uid: mondoo-cisco-iosxe-security-login-banner-configured
          - uid: mondoo-cisco-iosxe-security-motd-banner-configured
          - uid: mondoo-cisco-iosxe-security-hostname-configured
          - uid: mondoo-cisco-iosxe-security-domain-name-configured
      - title: Service Hardening
        filters: asset.platform == "cisco-iosxe"
        checks:
          - uid: mondoo-cisco-iosxe-security-tcp-keepalives-in
          - uid: mondoo-cisco-iosxe-security-tcp-keepalives-out
      - title: Routing Protocol Security
        filters: asset.platform == "cisco-iosxe"
        checks:
          - uid: mondoo-cisco-iosxe-security-bgp-neighbor-passwords
          - uid: mondoo-cisco-iosxe-security-ospf-area-authentication
    scoring_system: average
queries:
  - uid: mondoo-cisco-iosxe-security-ssh-enabled
    title: Ensure SSH is enabled
    impact: 95
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/bsi-c5-2022: bsi-c5-cos-01
      compliance/bsi-grundschutz-sys15: false
      compliance/cis-controls-8: cisc-12-3
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/pci-dss-4: pcidss-requirement-2-2-7
      compliance/vda-isa-5: vda-isa-5-5-2-7
    mql: |
      cisco.iosxe.ssh.enabled == true
    docs:
      desc: |
        This check verifies that SSH is enabled on the device. SSH provides encrypted remote management access, replacing insecure protocols like Telnet.

        **Why this matters**

        Without SSH enabled, the device cannot provide encrypted management access. If SSH is not enabled:

        - Remote management must rely on insecure protocols such as Telnet.
        - All management traffic including credentials is transmitted in clear text.
        - Compliance with security frameworks requiring encrypted management access cannot be met.

        Enabling SSH ensures that secure, encrypted remote management access is available.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Enable SSH by configuring a hostname, domain name, and generating RSA keys:

            ```
            configure terminal
            hostname <hostname>
            ip domain-name <domain.com>
            crypto key generate rsa modulus 2048
            ip ssh version 2
            ```
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/ios-xml/ios/sec_usr_ssh/configuration/xe-16/sec-usr-ssh-xe-16-book/sec-secure-shell-v2.html
        title: Cisco IOS-XE SSH Configuration Guide
  - uid: mondoo-cisco-iosxe-security-ssh-version-2
    title: Ensure SSH version 2 is configured
    impact: 95
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/bsi-c5-2022: bsi-c5-cos-01
      compliance/bsi-grundschutz-sys15: false
      compliance/cis-controls-8: cisc-12-3
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/pci-dss-4: pcidss-requirement-2-2-7
      compliance/vda-isa-5: vda-isa-5-5-2-7
    mql: |
      cisco.iosxe.ssh.version == "2.0"
    docs:
      desc: |
        This check verifies that SSH version 2 is enforced. SSH version 1 has known cryptographic vulnerabilities and must not be used.

        **Why this matters**

        SSH version 1 has well-documented weaknesses including susceptibility to man-in-the-middle attacks. If SSH version 2 is not enforced:

        - Management sessions are vulnerable to cryptographic attacks in SSH version 1.
        - Session integrity cannot be guaranteed.
        - Compliance with modern security frameworks cannot be met.

        Enforcing SSH version 2 ensures all remote management sessions use strong cryptographic protections.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Configure SSH version 2:

            ```
            configure terminal
            ip ssh version 2
            ```
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/ios-xml/ios/sec_usr_ssh/configuration/xe-16/sec-usr-ssh-xe-16-book/sec-secure-shell-v2.html
        title: Cisco IOS-XE SSH Configuration Guide
  - uid: mondoo-cisco-iosxe-security-ssh-timeout-configured
    title: Ensure SSH timeout is configured
    impact: 75
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-1
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-12
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-10
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/bsi-c5-2022: false
      compliance/bsi-grundschutz-sys15: false
      compliance/cis-controls-8: cisc-4-1
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-uem-06
      compliance/dora: false
      compliance/hipaa: hipaa-security-ss164-312-a-2-iii-access-control-automatic-logoff
      compliance/pci-dss-4: pcidss-requirement-8-2-8
      compliance/vda-isa-5: false
    mql: |
      cisco.iosxe.ssh.timeoutSeconds > 0
      cisco.iosxe.ssh.timeoutSeconds <= 120
    docs:
      desc: |
        This check verifies that an SSH login timeout is configured to limit the time allowed for authentication. The timeout should be 120 seconds or less.

        **Why this matters**

        Without an SSH timeout, connection attempts can remain open indefinitely during authentication. If the timeout is not configured:

        - Resources are consumed by stale connection attempts.
        - Slow brute-force attacks can keep connections open for extended periods.

        Configuring an SSH timeout limits the authentication window and reduces resource consumption.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Configure SSH timeout (60 seconds recommended):

            ```
            configure terminal
            ip ssh time-out 60
            ```
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/ios-xml/ios/sec_usr_ssh/configuration/xe-16/sec-usr-ssh-xe-16-book/sec-secure-shell-v2.html
        title: Cisco IOS-XE SSH Configuration Guide
  - uid: mondoo-cisco-iosxe-security-rsa-key-minimum-size
    title: Ensure RSA key is at least 2048 bits
    impact: 90
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-12
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-11
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/bsi-c5-2022: bsi-c5-cry-01
      compliance/bsi-grundschutz-sys15: false
      compliance/cis-controls-8: cisc-3-11
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/pci-dss-4: pcidss-requirement-8-3-2
      compliance/vda-isa-5: vda-isa-5-5-1-1
    mql: |
      cisco.iosxe.cryptoKeysRsa.any(modulusSize >= 2048)
    docs:
      desc: |
        This check verifies that at least one RSA key pair has a modulus of 2048 bits or larger. Keys smaller than 2048 bits are considered cryptographically weak.

        **Why this matters**

        RSA keys with fewer than 2048 bits can be factored with current computing resources. If the key size is insufficient:

        - The SSH host key can potentially be compromised.
        - Compliance with NIST and other standards requiring minimum 2048-bit RSA keys cannot be met.

        Using RSA keys of at least 2048 bits ensures adequate cryptographic strength.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Generate a new RSA key pair with at least 2048 bits:

            ```
            configure terminal
            crypto key generate rsa modulus 2048
            ```
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/ios-xml/ios/sec_usr_ssh/configuration/xe-16/sec-usr-ssh-xe-16-book/sec-secure-shell-v2.html
        title: Cisco IOS-XE SSH Configuration Guide
  - uid: mondoo-cisco-iosxe-security-aaa-new-model-enabled
    title: Ensure AAA new model is enabled
    impact: 95
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-j
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-3
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/bsi-c5-2022: bsi-c5-idm-01
      compliance/bsi-grundschutz-sys15: false
      compliance/cis-controls-8: cisc-6-6
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-01
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-i-access-control-unique-user-identification
      compliance/pci-dss-4: pcidss-requirement-8-2-1
      compliance/vda-isa-5: vda-isa-5-4-1-2
    mql: |
      cisco.iosxe.aaa.newModelEnabled == true
    docs:
      desc: |
        This check verifies that the AAA new model is enabled. The AAA new model (`aaa new-model`) is required to use TACACS+ or RADIUS for centralized authentication, authorization, and accounting.

        **Why this matters**

        Without the AAA new model enabled, the device cannot use centralized authentication services. If AAA new model is not enabled:

        - The device relies solely on local authentication, which is difficult to manage at scale.
        - Centralized access control through TACACS+ or RADIUS is not available.
        - Audit trails for authentication events are incomplete.
        - Compliance with security frameworks requiring centralized authentication cannot be achieved.

        Enabling the AAA new model is the prerequisite for all AAA functionality.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Enable the AAA new model:

            ```
            configure terminal
            aaa new-model
            ```
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/ios-xml/ios/sec_usr_aaa/configuration/xe-16/sec-usr-aaa-xe-16-book/sec-cfg-authentification.html
        title: Cisco IOS-XE AAA Configuration Guide
  - uid: mondoo-cisco-iosxe-security-aaa-authentication-login-configured
    title: Ensure AAA authentication login is configured
    impact: 95
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-j
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-3
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/bsi-c5-2022: bsi-c5-idm-01
      compliance/bsi-grundschutz-sys15: false
      compliance/cis-controls-8: cisc-6-6
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-01
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-i-access-control-unique-user-identification
      compliance/pci-dss-4: pcidss-requirement-8-2-1
      compliance/vda-isa-5: vda-isa-5-4-1-2
    mql: |
      cisco.iosxe.aaa.loginEntries.length > 0
    docs:
      desc: |
        This check verifies that AAA authentication login method lists are configured. AAA authentication login defines how users are authenticated when accessing the device.

        **Why this matters**

        Without AAA authentication login configured, the device may allow access without proper authentication. If AAA login is not configured:

        - User authentication may not be enforced consistently.
        - Centralized identity management cannot be leveraged.
        - Audit trails for authentication events are incomplete.

        Configuring AAA authentication login ensures proper authentication is enforced for all access methods.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Configure AAA authentication login:

            ```
            configure terminal
            aaa new-model
            aaa authentication login default group tacacs+ local
            ```

            The `local` fallback ensures access is maintained if AAA servers are unreachable.
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/ios-xml/ios/sec_usr_aaa/configuration/xe-16/sec-usr-aaa-xe-16-book/sec-cfg-authentification.html
        title: Cisco IOS-XE AAA Configuration Guide
  - uid: mondoo-cisco-iosxe-security-aaa-accounting-configured
    title: Ensure AAA accounting is configured
    impact: 90
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-16
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/bsi-c5-2022: bsi-c5-ops-13
      compliance/bsi-grundschutz-sys15: false
      compliance/cis-controls-8: cisc-13-6
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-308-a-1-ii-d-security-management-process-information-system-activity-review
      compliance/pci-dss-4: pcidss-requirement-10-7-1
      compliance/vda-isa-5: false
    mql: |
      cisco.iosxe.aaa.accountingRecords.length > 0
    docs:
      desc: |
        This check verifies that AAA accounting is configured to log user activity. Accounting records provide an audit trail of commands executed, sessions started, and system events.

        **Why this matters**

        Without AAA accounting, there is no record of administrative activity. If accounting is not configured:

        - There is no forensic evidence of commands executed during a security incident.
        - Compliance requirements for audit logging cannot be met.
        - Accountability for privileged operations is lost.

        Enabling AAA accounting ensures that all activity is logged for audit and compliance.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Configure AAA accounting:

            ```
            configure terminal
            aaa accounting exec default start-stop group tacacs+
            aaa accounting commands 15 default start-stop group tacacs+
            ```
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/ios-xml/ios/sec_usr_aaa/configuration/xe-16/sec-usr-aaa-xe-16-book/sec-cfg-acctng.html
        title: Cisco IOS-XE AAA Accounting Guide
  - uid: mondoo-cisco-iosxe-security-users-secret-not-password
    title: Ensure users use secret instead of password
    impact: 90
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-j
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-5
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-10
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/bsi-c5-2022: bsi-c5-idm-01
      compliance/bsi-grundschutz-sys15: false
      compliance/cis-controls-8: cisc-6-6
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-01
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-i-access-control-unique-user-identification
      compliance/pci-dss-4: pcidss-requirement-8-2-1
      compliance/vda-isa-5: vda-isa-5-4-1-2
    mql: |
      cisco.iosxe.users.all(
        credentialType == "secret"
      )
    docs:
      desc: |
        This check verifies that all local user accounts use `secret` rather than `password` for credential storage. The `secret` keyword uses a one-way hash (MD5, SHA-256, or SCRYPT) while `password` uses reversible Type 7 encryption that is trivially decoded.

        **Why this matters**

        Type 7 passwords can be decoded instantly using freely available tools. If users are configured with `password` instead of `secret`:

        - Credentials can be recovered in plain text from the running configuration.
        - Configuration backups expose all user passwords.
        - An attacker with read access to the configuration obtains all credentials.

        Using `secret` for all user accounts ensures that credentials are stored with a one-way hash.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Configure users with secret:

            ```
            configure terminal
            username <user> privilege <level> secret 0 <password>
            ```

            Use type 9 (SCRYPT) for the strongest hashing:

            ```
            username <user> privilege <level> secret 9 <scrypt-hash>
            ```
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/ios-xml/ios/sec_usr_aaa/configuration/xe-16/sec-usr-aaa-xe-16-book/sec-cfg-authentification.html
        title: Cisco IOS-XE User Configuration Guide
  - uid: mondoo-cisco-iosxe-security-enable-secret-configured
    title: Ensure enable secret is configured (not enable password)
    impact: 90
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-j
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-5
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-10
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/bsi-c5-2022: bsi-c5-idm-01
      compliance/bsi-grundschutz-sys15: false
      compliance/cis-controls-8: cisc-6-6
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-01
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-i-access-control-unique-user-identification
      compliance/pci-dss-4: pcidss-requirement-8-2-1
      compliance/vda-isa-5: vda-isa-5-4-1-2
    mql: |
      cisco.iosxe.configuration.enableSecret.type == "secret"
    docs:
      desc: |
        This check verifies that the privileged EXEC mode access is protected with `enable secret` rather than `enable password`. The `enable secret` uses a one-way hash, while `enable password` uses easily reversed Type 7 encryption.

        **Why this matters**

        The enable password controls access to privileged EXEC mode, which grants full administrative control. If `enable password` is used instead of `enable secret`:

        - The privileged mode credential is stored with reversible encryption.
        - An attacker can decode the password from the configuration.
        - Full administrative access to the device is compromised.

        Using `enable secret` ensures the privileged mode credential is protected with a one-way hash.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Configure enable secret:

            ```
            configure terminal
            no enable password
            enable secret 0 <strong-password>
            ```
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/ios-xml/ios/sec_usr_aaa/configuration/xe-16/sec-usr-aaa-xe-16-book/sec-cfg-authentification.html
        title: Cisco IOS-XE Password Configuration Guide
  - uid: mondoo-cisco-iosxe-security-service-password-encryption
    title: Ensure service password encryption is enabled
    impact: 80
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-11
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/bsi-c5-2022: bsi-c5-cry-01
      compliance/bsi-grundschutz-sys15: false
      compliance/cis-controls-8: cisc-3-11
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/pci-dss-4: pcidss-requirement-8-3-2
      compliance/vda-isa-5: vda-isa-5-5-1-1
    mql: |
      cisco.iosxe.configuration.service.passwordEncryptionEnabled == true
    docs:
      desc: |
        This check verifies that the `service password-encryption` command is enabled. While this provides only Type 7 encryption (which is reversible), it prevents passwords from being visible in plain text when viewing the configuration.

        **Why this matters**

        Without service password encryption, some passwords appear in clear text in the configuration. If password encryption is not enabled:

        - Passwords are visible to anyone who can view the running configuration.
        - Shoulder-surfing during configuration review exposes credentials.
        - Configuration backups contain clear-text passwords.

        Enabling service password encryption provides a basic layer of protection against casual observation.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Enable service password encryption:

            ```
            configure terminal
            service password-encryption
            ```
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/ios-xml/ios/sec_usr_aaa/configuration/xe-16/sec-usr-aaa-xe-16-book/sec-cfg-authentification.html
        title: Cisco IOS-XE Password Configuration Guide
  - uid: mondoo-cisco-iosxe-security-http-disabled
    title: Ensure HTTP server is disabled
    impact: 90
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/bsi-c5-2022: bsi-c5-cos-01
      compliance/bsi-grundschutz-sys15: false
      compliance/cis-controls-8: cisc-12-3
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/pci-dss-4: pcidss-requirement-2-2-7
      compliance/vda-isa-5: vda-isa-5-5-2-7
    mql: |
      cisco.iosxe.ip.httpEnabled == false
    docs:
      desc: |
        This check verifies that the HTTP server is disabled. HTTP transmits all data in clear text, making it unsuitable for device management.

        **Why this matters**

        The HTTP server provides a web-based management interface over an unencrypted connection. If HTTP is enabled:

        - All management traffic including credentials is transmitted in clear text.
        - Sessions can be hijacked through traffic interception.
        - The HTTP service increases the attack surface with potential web vulnerabilities.

        Disabling HTTP and using only HTTPS ensures that all web-based management is encrypted.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Disable the HTTP server:

            ```
            configure terminal
            no ip http server
            ```
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/ios-xml/ios/https/configuration/xe-16/https-xe-16-book/nm-https.html
        title: Cisco IOS-XE HTTP Configuration Guide
  - uid: mondoo-cisco-iosxe-security-https-enabled
    title: Ensure HTTPS server is enabled
    impact: 80
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/bsi-c5-2022: bsi-c5-cos-01
      compliance/bsi-grundschutz-sys15: false
      compliance/cis-controls-8: cisc-12-3
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/pci-dss-4: pcidss-requirement-2-2-7
      compliance/vda-isa-5: vda-isa-5-5-2-7
    mql: |
      cisco.iosxe.ip.httpsEnabled == true
    docs:
      desc: |
        This check verifies that the HTTPS server is enabled for secure web-based management. HTTPS provides TLS-encrypted management access when a web interface is required.

        **Why this matters**

        If web-based management is needed, HTTPS must be used to encrypt all traffic. Without HTTPS:

        - Web-based management is either unavailable or relies on unencrypted HTTP.
        - Compliance requirements for encrypted management interfaces cannot be met.

        Enabling HTTPS ensures that web-based management uses encrypted communications.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Enable the HTTPS server:

            ```
            configure terminal
            ip http secure-server
            ```
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/ios-xml/ios/https/configuration/xe-16/https-xe-16-book/nm-https.html
        title: Cisco IOS-XE HTTPS Configuration Guide
  - uid: mondoo-cisco-iosxe-security-cdp-disabled
    title: Ensure CDP is disabled
    impact: 75
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ac-3
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-6
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/bsi-c5-2022: bsi-c5-cos-01
      compliance/bsi-grundschutz-sys15: false
      compliance/cis-controls-8: cisc-12-3
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/pci-dss-4: pcidss-requirement-2-2-7
      compliance/vda-isa-5: vda-isa-5-5-2-7
    mql: |
      cisco.iosxe.cdp.enabled == false
    docs:
      desc: |
        This check verifies that Cisco Discovery Protocol (CDP) is disabled. CDP broadcasts detailed device information that can be exploited for network reconnaissance.

        **Why this matters**

        CDP operates at Layer 2 and sends information in clear text including hostname, IP address, platform, and software version. If CDP is not disabled:

        - Detailed device information is broadcast to all directly connected devices.
        - Attackers can passively collect network topology and software version data.
        - This information enables targeted attacks against specific platform vulnerabilities.

        Disabling CDP prevents unnecessary information disclosure.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Disable CDP globally:

            ```
            configure terminal
            no cdp run
            ```
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/ios-xml/ios/cdp/configuration/xe-16/cdp-xe-16-book/nm-cdp-discover.html
        title: Cisco IOS-XE CDP Configuration Guide
  - uid: mondoo-cisco-iosxe-security-bootp-disabled
    title: Ensure BOOTP service is disabled
    impact: 75
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ac-3
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-6
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/bsi-c5-2022: bsi-c5-cos-01
      compliance/bsi-grundschutz-sys15: false
      compliance/cis-controls-8: cisc-12-3
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/pci-dss-4: pcidss-requirement-2-2-7
      compliance/vda-isa-5: vda-isa-5-5-2-7
    mql: |
      cisco.iosxe.bootp.enabled == false
    docs:
      desc: |
        This check verifies that the Bootstrap Protocol (BOOTP) service is disabled. BOOTP is a legacy protocol for network bootstrapping that is rarely needed and increases the attack surface.

        **Why this matters**

        The BOOTP service allows the device to act as a BOOTP server. If enabled unnecessarily:

        - The service increases the attack surface with an unused network service.
        - It can be exploited for network reconnaissance or denial-of-service attacks.

        Disabling BOOTP removes an unnecessary service and reduces the attack surface.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Disable BOOTP:

            ```
            configure terminal
            no ip bootp server
            ```
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/ios-xml/ios/ipaddr_dhcp/configuration/xe-16/dhcp-xe-16-book.html
        title: Cisco IOS-XE DHCP/BOOTP Configuration Guide
  - uid: mondoo-cisco-iosxe-security-source-routing-disabled
    title: Ensure IP source routing is disabled
    impact: 85
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ac-3
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-6
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/bsi-c5-2022: bsi-c5-cos-01
      compliance/bsi-grundschutz-sys15: false
      compliance/cis-controls-8: cisc-12-3
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/pci-dss-4: pcidss-requirement-2-2-7
      compliance/vda-isa-5: vda-isa-5-5-2-7
    mql: |
      cisco.iosxe.ip.sourceRouteEnabled == false
    docs:
      desc: |
        This check verifies that IP source routing is disabled. Source routing allows a sender to specify the route a packet takes through the network, which can be abused to bypass security controls.

        **Why this matters**

        IP source routing enables attackers to specify routing paths that circumvent firewalls, ACLs, and other security controls. If source routing is enabled:

        - Attackers can route packets through paths that bypass security controls.
        - Spoofed packets can be directed to reach internal networks.
        - Network access controls can be circumvented.

        Disabling source routing prevents attackers from manipulating packet routing paths.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Disable IP source routing:

            ```
            configure terminal
            no ip source-route
            ```
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/ios-xml/ios/ipaddr_nat/configuration/xe-16/nat-xe-16-book.html
        title: Cisco IOS-XE IP Configuration Guide
  - uid: mondoo-cisco-iosxe-security-pad-disabled
    title: Ensure PAD service is disabled
    impact: 75
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ac-3
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-6
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/bsi-c5-2022: bsi-c5-cos-01
      compliance/bsi-grundschutz-sys15: false
      compliance/cis-controls-8: cisc-12-3
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/pci-dss-4: pcidss-requirement-2-2-7
      compliance/vda-isa-5: vda-isa-5-5-2-7
    mql: |
      cisco.iosxe.configuration.service.padEnabled == false
    docs:
      desc: |
        This check verifies that the X.25 Packet Assembler/Disassembler (PAD) service is disabled. PAD is a legacy service for X.25 networks that is no longer needed in modern networks and increases the attack surface.

        **Why this matters**

        The PAD service is a legacy protocol that has no place in modern network environments. If PAD is enabled:

        - An unnecessary service is exposed that could be exploited.
        - The attack surface is increased with a rarely monitored legacy service.

        Disabling PAD removes an unnecessary legacy service.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Disable PAD:

            ```
            configure terminal
            no service pad
            ```
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/ios-xml/ios/fundamentals/configuration/xe-16/fundamentals-xe-16-book.html
        title: Cisco IOS-XE Service Configuration Guide
  - uid: mondoo-cisco-iosxe-security-ntp-authentication-enabled
    title: Ensure NTP authentication is enabled
    impact: 80
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-17
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-6
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-7
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/bsi-c5-2022: false
      compliance/bsi-grundschutz-sys15: false
      compliance/cis-controls-8: cisc-8-4
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-06
      compliance/dora: false
      compliance/hipaa: false
      compliance/pci-dss-4: pcidss-requirement-10-6-1
      compliance/vda-isa-5: false
    mql: |
      cisco.iosxe.ntp.authenticate == true
    docs:
      desc: |
        This check verifies that NTP authentication is enabled to ensure the device only synchronizes time with trusted NTP servers.

        **Why this matters**

        Without NTP authentication, an attacker can manipulate the device's clock through NTP spoofing. If NTP authentication is not enabled:

        - Log timestamps become unreliable, undermining forensic investigations.
        - Certificate validation can be bypassed with manipulated time.
        - Time-sensitive security mechanisms can be compromised.

        Enabling NTP authentication ensures the device only accepts time updates from verified sources.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Configure NTP authentication:

            ```
            configure terminal
            ntp authenticate
            ntp authentication-key 1 md5 <key-value>
            ntp trusted-key 1
            ntp server <server-ip> key 1
            ```
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/ios-xml/ios/bsm/configuration/xe-16/bsm-xe-16-book/bsm-time-calendar-set.html
        title: Cisco IOS-XE NTP Configuration Guide
  - uid: mondoo-cisco-iosxe-security-ntp-servers-configured
    title: Ensure NTP servers are configured
    impact: 75
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-17
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-6
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-7
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/bsi-c5-2022: false
      compliance/bsi-grundschutz-sys15: false
      compliance/cis-controls-8: cisc-8-4
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-06
      compliance/dora: false
      compliance/hipaa: false
      compliance/pci-dss-4: pcidss-requirement-10-6-1
      compliance/vda-isa-5: false
    mql: |
      cisco.iosxe.ntp.servers.length > 0
    docs:
      desc: |
        This check verifies that at least one NTP server is configured. Accurate time is essential for log correlation, certificate validation, and security event analysis.

        **Why this matters**

        Without NTP servers configured, the device clock drifts over time. If NTP servers are not configured:

        - Log timestamps are inaccurate, making incident investigation unreliable.
        - Certificate expiration checks may malfunction.
        - Event correlation across multiple devices is impossible.

        Configuring NTP servers ensures accurate, synchronized time.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Configure NTP servers:

            ```
            configure terminal
            ntp server <ntp-server-ip-1>
            ntp server <ntp-server-ip-2>
            ```
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/ios-xml/ios/bsm/configuration/xe-16/bsm-xe-16-book/bsm-time-calendar-set.html
        title: Cisco IOS-XE NTP Configuration Guide
  - uid: mondoo-cisco-iosxe-security-logging-config-changes
    title: Ensure configuration change logging is enabled
    impact: 90
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-16
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/bsi-c5-2022: bsi-c5-ops-13
      compliance/bsi-grundschutz-sys15: false
      compliance/cis-controls-8: cisc-13-6
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-308-a-1-ii-d-security-management-process-information-system-activity-review
      compliance/pci-dss-4: pcidss-requirement-10-7-1
      compliance/vda-isa-5: false
    mql: |
      cisco.iosxe.logging.configurationChangesLoggingEnabled == true
    docs:
      desc: |
        This check verifies that logging of configuration changes is enabled. Configuration change logging records all modifications to the device configuration, providing an audit trail of who changed what and when.

        **Why this matters**

        Without configuration change logging, modifications to the device go unrecorded. If change logging is not enabled:

        - There is no record of configuration modifications.
        - Unauthorized changes cannot be detected.
        - Compliance requirements for change management cannot be met.

        Enabling configuration change logging provides visibility into all configuration modifications.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Enable configuration change logging:

            ```
            configure terminal
            archive
            log config
            logging enable
            ```
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/ios-xml/ios/config-mgmt/configuration/xe-16/config-mgmt-xe-16-book/cm-config-logger.html
        title: Cisco IOS-XE Configuration Change Logging Guide
  - uid: mondoo-cisco-iosxe-security-logging-hosts-configured
    title: Ensure remote logging hosts are configured
    impact: 85
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-16
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/bsi-c5-2022: bsi-c5-ops-13
      compliance/bsi-grundschutz-sys15: false
      compliance/cis-controls-8: cisc-13-6
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-308-a-1-ii-d-security-management-process-information-system-activity-review
      compliance/pci-dss-4: pcidss-requirement-10-7-1
      compliance/vda-isa-5: false
    mql: |
      cisco.iosxe.logging.hosts.length > 0
    docs:
      desc: |
        This check verifies that at least one remote logging host is configured. Sending logs to a remote server ensures data is preserved even if the device is compromised.

        **Why this matters**

        Logs stored only on the device are vulnerable to loss or tampering. If remote logging hosts are not configured:

        - Logs are lost when the device reboots or the buffer overflows.
        - An attacker who compromises the device can erase local logs.
        - Centralized log correlation is not possible.

        Configuring remote logging hosts ensures logs are preserved centrally.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Configure remote logging hosts:

            ```
            configure terminal
            logging host <syslog-server-ip>
            logging trap informational
            logging source-interface <interface>
            ```
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/ios-xml/ios/config-mgmt/configuration/xe-16/config-mgmt-xe-16-book/cm-config-logger.html
        title: Cisco IOS-XE Logging Configuration Guide
  - uid: mondoo-cisco-iosxe-security-logging-failed-logins
    title: Ensure failed login logging is enabled
    impact: 85
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-16
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
