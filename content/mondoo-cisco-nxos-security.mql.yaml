policies:
  - uid: mondoo-cisco-nxos-security
    name: Mondoo Cisco NX-OS Security
    version: 1.0.2
    license: BUSL-1.1
    tags:
      mondoo.com/category: security
      mondoo.com/platform: cisco-nx-os,networkdevice
    require:
      - provider: networkdevices
    authors:
      - name: Mondoo, Inc.
        email: hello@mondoo.com
    summary: Secure Cisco NX-OS switches
    docs:
      desc: |
        The Mondoo Cisco NX-OS Security policy identifies critical misconfigurations on Cisco Nexus switches running NX-OS that could leave your data-center network vulnerable to attackers. This policy helps organizations detect and remediate hardening gaps before they can be exploited, reducing the likelihood of unauthorized device access, east-west traffic interception, fabric tampering, and disruption of data-center workloads.

        This policy provides security checks across key areas of Cisco NX-OS configuration:

        - SSH key configuration and algorithm strength
        - Password strength checking and encryption
        - AAA authentication with TACACS+ or RADIUS integration
        - User account security and credential management
        - Logging configuration and remote log collection
        - SNMP security, including SNMPv3 enforcement
        - NTP time synchronization
        - Boot security, including POAP and boot order
        - Control Plane Policing (CoPP) configuration
        - VTY and console line security with ACLs and timeouts
        - Security banners
        - BGP and OSPF routing protocol authentication
        - Disabling source routing and unnecessary services

        Learn more about scanning Cisco NX-OS in the [cnspec Cisco NX-OS documentation](https://mondoo.com/docs/cnspec/network/cisco).

        Have suggestions for new checks in this policy? Visit our [cnspec repository](https://github.com/mondoohq/cnspec).

    groups:
      - title: SSH Security
        filters: asset.platform == "cisco-nxos"
        checks:
          - uid: mondoo-cisco-nxos-security-ssh-key-algorithm
          - uid: mondoo-cisco-nxos-security-ssh-key-size
          - uid: mondoo-cisco-nxos-security-ssh-login-attempts-limit
      - title: Authentication and Authorization (AAA)
        filters: asset.platform == "cisco-nxos"
        checks:
          - uid: mondoo-cisco-nxos-security-aaa-authentication-login-configured
          - uid: mondoo-cisco-nxos-security-aaa-group-servers-configured
      - title: User Account Security
        filters: asset.platform == "cisco-nxos"
        checks:
          - uid: mondoo-cisco-nxos-security-password-strength-check
          - uid: mondoo-cisco-nxos-security-encryption-service-enabled
          - uid: mondoo-cisco-nxos-security-users-encrypted-credentials
          - uid: mondoo-cisco-nxos-security-passphrase-min-length
          - uid: mondoo-cisco-nxos-security-system-login-block
      - title: NTP and Time Configuration
        filters: asset.platform == "cisco-nxos"
        checks:
          - uid: mondoo-cisco-nxos-security-ntp-servers-configured
          - uid: mondoo-cisco-nxos-security-timezone-configured
      - title: Logging and Auditing
        filters: asset.platform == "cisco-nxos"
        checks:
          - uid: mondoo-cisco-nxos-security-logging-remote-servers
          - uid: mondoo-cisco-nxos-security-logging-timestamp-configured
          - uid: mondoo-cisco-nxos-security-logging-source-interface
      - title: SNMP Security
        filters: asset.platform == "cisco-nxos"
        checks:
          - uid: mondoo-cisco-nxos-security-snmp-no-public-community
          - uid: mondoo-cisco-nxos-security-snmp-encryption-enforced
          - uid: mondoo-cisco-nxos-security-snmp-communities-acl
      - title: Boot and Platform Security
        filters: asset.platform == "cisco-nxos"
        checks:
          - uid: mondoo-cisco-nxos-security-poap-disabled
          - uid: mondoo-cisco-nxos-security-copp-profile-strict
      - title: Line and Access Security
        filters: asset.platform == "cisco-nxos"
        checks:
          - uid: mondoo-cisco-nxos-security-vty-exec-timeout
          - uid: mondoo-cisco-nxos-security-console-exec-timeout
          - uid: mondoo-cisco-nxos-security-vty-acl-configured
      - title: Access Control and Banners
        filters: asset.platform == "cisco-nxos"
        checks:
          - uid: mondoo-cisco-nxos-security-motd-banner-configured
          - uid: mondoo-cisco-nxos-security-exec-banner-configured
          - uid: mondoo-cisco-nxos-security-hostname-configured
      - title: Network Services
        filters: asset.platform == "cisco-nxos"
        checks:
          - uid: mondoo-cisco-nxos-security-source-routing-disabled
          - uid: mondoo-cisco-nxos-security-ip-directed-broadcast-disabled
      - title: Routing Protocol Security
        filters: asset.platform == "cisco-nxos"
        checks:
          - uid: mondoo-cisco-nxos-security-bgp-neighbor-passwords
          - uid: mondoo-cisco-nxos-security-bgp-log-neighbor-changes
          - uid: mondoo-cisco-nxos-security-ospf-authentication
    scoring_system: average
queries:
  - uid: mondoo-cisco-nxos-security-ssh-key-algorithm
    title: Ensure SSH key uses a strong algorithm
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-12
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-11
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-1
    mql: |
      cisco.nxos.ssh.algorithm.in(["rsa", "ecdsa"])
    docs:
      desc: |
        This check verifies that the SSH key uses a strong algorithm such as RSA or ECDSA. DSA keys are considered cryptographically weak and should not be used.

        **Why this matters**

        The SSH key algorithm determines the cryptographic strength of SSH sessions. If a weak algorithm like DSA is used:

        - The SSH host key is more vulnerable to compromise.
        - Compliance with modern cryptographic standards cannot be met.
        - Clients configured to reject weak algorithms cannot connect.

        Using RSA or ECDSA ensures SSH sessions are protected with strong cryptographic algorithms.
      audit: |-
        To verify that the SSH key uses a strong algorithm:

        1. Open an authenticated session to the device CLI.
        2. Display the SSH server key information:

           ```
           show ssh key
           ```

        The device passes when the host key is reported as RSA or ECDSA. A DSA key is a failing result.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Replacing the SSH host key requires temporarily disabling the SSH server. Perform this change from a console session, because disabling the SSH server drops all active SSH sessions.

            Generate an SSH key with a strong algorithm:

            ```
            configure terminal
            no feature ssh
            ssh key rsa 2048 force
            feature ssh
            ```

            Or for ECDSA:

            ```
            configure terminal
            no feature ssh
            ssh key ecdsa 256 force
            feature ssh
            ```

            The new host key invalidates cached host keys on SSH clients. Update known hosts entries on management stations after the change.

            NX-OS does not automatically persist running-config changes. Save the configuration so the change survives a reload:

            ```
            copy running-config startup-config
            ```
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/dcn/nx-os/nexus9000/105x/security/cisco-nexus-9000-nx-os-security-configuration-guide-105x/m-configuring-ssh-scp.html
        title: Cisco NX-OS SSH Configuration Guide
  - uid: mondoo-cisco-nxos-security-ssh-key-size
    title: Ensure SSH RSA key is at least 2048 bits
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-12
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-11
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-1
    mql: |
      if (cisco.nxos.ssh.algorithm == "rsa") {
        cisco.nxos.ssh.keySize >= 2048
      }
    docs:
      desc: |
        This check verifies that RSA SSH keys have a modulus of at least 2048 bits. Keys smaller than 2048 bits are considered cryptographically weak.

        **Why this matters**

        RSA keys with fewer than 2048 bits can be factored with current computing resources. If the key size is insufficient:

        - The SSH host key can potentially be compromised.
        - Compliance with NIST and other standards requiring minimum 2048-bit keys cannot be met.

        Using RSA keys of at least 2048 bits ensures adequate cryptographic strength for SSH sessions.
      audit: |-
        To verify the SSH RSA key modulus size:

        1. Open an authenticated session to the device CLI.
        2. Display the SSH server key information:

           ```
           show ssh key
           ```

        The device passes when the RSA host key reports a modulus of 2048 bits or larger. An RSA modulus smaller than 2048 bits is a failing result.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Replacing the SSH host key requires temporarily disabling the SSH server. Perform this change from a console session, because disabling the SSH server drops all active SSH sessions.

            Generate a 2048-bit RSA key:

            ```
            configure terminal
            no feature ssh
            ssh key rsa 2048 force
            feature ssh
            ```

            The new host key invalidates cached host keys on SSH clients. Update known hosts entries on management stations after the change.

            NX-OS does not automatically persist running-config changes. Save the configuration so the change survives a reload:

            ```
            copy running-config startup-config
            ```
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/dcn/nx-os/nexus9000/105x/security/cisco-nexus-9000-nx-os-security-configuration-guide-105x/m-configuring-ssh-scp.html
        title: Cisco NX-OS SSH Configuration Guide
  - uid: mondoo-cisco-nxos-security-ssh-login-attempts-limit
    title: Ensure SSH login attempts limit is configured
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-j
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-8
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-3
    mql: |
      cisco.nxos.sshLoginAttemptsLimit > 0
      cisco.nxos.sshLoginAttemptsLimit <= 3
    docs:
      desc: |
        This check verifies that the SSH login attempts limit is configured to restrict the number of failed authentication attempts. The limit should be 3 or fewer to mitigate brute-force attacks.

        **Why this matters**

        Without a login attempts limit, attackers can make unlimited authentication attempts. If the limit is not configured:

        - Brute-force password attacks can proceed indefinitely.
        - Dictionary attacks against user accounts are not throttled.
        - The device is more susceptible to credential-guessing attacks.

        Configuring an SSH login attempts limit slows down brute-force attacks.
      audit: |-
        To verify that an SSH login attempts limit is configured:

        1. Open an authenticated session to the device CLI.
        2. Display the effective SSH login attempts limit, including default values:

           ```
           show running-config security all | include "ssh login-attempts"
           ```

        The device passes when `ssh login-attempts` is set to a value greater than 0 and 3 or fewer. The NX-OS default of 3 passes. A limit of 0 or greater than 3 is a failing result.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Configure SSH login attempts limit:

            ```
            configure terminal
            ssh login-attempts 3
            ```

            NX-OS does not automatically persist running-config changes. Save the configuration so the change survives a reload:

            ```
            copy running-config startup-config
            ```
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/dcn/nx-os/nexus9000/105x/security/cisco-nexus-9000-nx-os-security-configuration-guide-105x/m-configuring-ssh-scp.html
        title: Cisco NX-OS SSH Configuration Guide
  - uid: mondoo-cisco-nxos-security-aaa-authentication-login-configured
    title: Ensure AAA authentication login is configured
    impact: 95
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-j
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-3
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-3
    mql: |
      cisco.nxos.runAaaAuthenticationLogin.length > 0
    docs:
      desc: |
        This check verifies that AAA authentication login method lists are configured. AAA authentication enables centralized identity management through TACACS+ or RADIUS servers.

        **Why this matters**

        Without AAA authentication configured, the device relies solely on local credentials. If AAA is not configured:

        - Centralized identity management cannot be leveraged.
        - User authentication is not enforced consistently across the network.
        - Audit trails for authentication events are incomplete.
        - Compliance with security frameworks requiring centralized authentication cannot be met.

        Configuring AAA authentication login ensures centralized, scalable authentication.
      audit: |-
        To verify that AAA authentication login method lists are configured:

        1. Open an authenticated session to the device CLI.
        2. Display the running configuration for AAA authentication login:

           ```
           show running-config aaa | include authentication login
           ```

        The device passes when at least one `aaa authentication login` method list is listed. Empty output is a failing result.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Configure AAA authentication to use a TACACS+ or RADIUS server group with local fallback. The server group must already exist. For RADIUS, the predefined group named `radius` contains all globally configured RADIUS servers. For TACACS+, first enable `feature tacacs+` and create a named server group with `aaa group server tacacs+`. Keeping `local` as a fallback method and `local` on the console line prevents a lockout if the AAA servers become unreachable.

            ```
            configure terminal
            aaa authentication login default group <server-group-name> local
            aaa authentication login console local
            ```

            Verify the configuration from a second session before closing your current one:

            ```
            show running-config aaa | include "authentication login"
            ```

            NX-OS does not automatically persist running-config changes. Once you have confirmed access still works, save the configuration so the change survives a reload:

            ```
            copy running-config startup-config
            ```
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/dcn/nx-os/nexus9000/105x/security/cisco-nexus-9000-nx-os-security-configuration-guide-105x/m-configuring-aaa.html
        title: Cisco NX-OS AAA Configuration Guide
  - uid: mondoo-cisco-nxos-security-aaa-group-servers-configured
    title: Ensure AAA group servers are configured
    impact: 85
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-j
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-3
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-3
    mql: |
      cisco.nxos.runAaaGroupsServerTacacs.length > 0 ||
      cisco.nxos.runAaaGroupsServerRadius.length > 0
    docs:
      desc: |
        This check verifies that at least one AAA group server (TACACS+ or RADIUS) is configured. AAA group servers define the external authentication servers used for centralized identity management.

        **Why this matters**

        Without AAA group servers, the device cannot delegate authentication to centralized servers. If no group servers are configured:

        - Authentication fallback to centralized servers is not possible.
        - Centralized user management, access control, and auditing cannot be implemented.

        Configuring AAA group servers enables centralized authentication and authorization.
      audit: |-
        To verify that AAA group servers are configured:

        1. Open an authenticated session to the device CLI.
        2. Display the configured AAA server groups:

           ```
           show aaa groups
           ```

        The device passes when at least one TACACS+ or RADIUS server group is listed. Empty output is a failing result.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Enable the TACACS+ feature, define the server, and create a server group. The `feature tacacs+` command must come first; NX-OS rejects all TACACS+ configuration while the feature is disabled.

            ```
            configure terminal
            feature tacacs+
            tacacs-server host <server-ip> key <shared-secret>
            aaa group server tacacs+ <group-name>
              server <server-ip>
              use-vrf management
              source-interface mgmt0
            ```

            Adjust the VRF and source interface to match how the device reaches the TACACS+ server.

            NX-OS does not automatically persist running-config changes. Save the configuration so the change survives a reload:

            ```
            copy running-config startup-config
            ```
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/dcn/nx-os/nexus9000/105x/security/cisco-nexus-9000-nx-os-security-configuration-guide-105x/m-configuring-aaa.html
        title: Cisco NX-OS AAA Configuration Guide
  - uid: mondoo-cisco-nxos-security-password-strength-check
    title: Ensure password strength check is enabled
    impact: 85
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-j
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-5
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-7
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-3
    mql: |
      cisco.nxos.passwordStrengthCheck == true
    docs:
      desc: |
        This check verifies that password strength checking is enabled. When enabled, NX-OS validates that passwords meet minimum complexity requirements before accepting them.

        **Why this matters**

        Without password strength checking, users can set weak or trivially guessable passwords. If strength checking is disabled:

        - Short or simple passwords can be configured.
        - Common dictionary words can be used as passwords.
        - The overall security posture of the device is weakened.

        Enabling password strength checking ensures all passwords meet minimum complexity requirements.
      audit: |-
        To verify that password strength checking is enabled:

        1. Open an authenticated session to the device CLI.
        2. Display the running configuration for the password setting:

           ```
           show running-config | include password strength-check
           ```

        The device passes when the output contains `password strength-check`. A `no password strength-check` line or empty output is a failing result.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Enable password strength checking:

            ```
            configure terminal
            password strength-check
            ```

            NX-OS does not automatically persist running-config changes. Save the configuration so the change survives a reload:

            ```
            copy running-config startup-config
            ```
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/dcn/nx-os/nexus9000/105x/security/cisco-nexus-9000-nx-os-security-configuration-guide-105x/m-configuring-user-accounts-and-rbac.html
        title: Cisco NX-OS User Account Configuration Guide
  - uid: mondoo-cisco-nxos-security-encryption-service-enabled
    title: Ensure encryption service is enabled
    impact: 85
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-11
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-1
    mql: |
      cisco.nxos.encryptionService.enabled == true
      cisco.nxos.encryptionService.masterKeyConfigured == true
    docs:
      desc: |
        This check verifies that the encryption service is enabled with a master key configured. The encryption service provides Type 6 AES encryption for passwords stored in the configuration, replacing weak Type 7 encryption.

        **Why this matters**

        Without the encryption service, passwords in the configuration are protected only by easily reversed Type 7 encryption. If the encryption service is not enabled:

        - RADIUS and TACACS+ shared secrets are inadequately protected.
        - An attacker with configuration access can decode all Type 7 passwords.
        - Compliance with encryption requirements cannot be met.

        Enabling the encryption service with a master key ensures strong AES encryption for stored passwords.
      audit: |-
        To verify that the encryption service is enabled with a master key:

        1. Open an authenticated session to the device CLI.
        2. Display the password encryption status:

           ```
           show encryption service stat
           ```

        The device passes when AES encryption is enabled and a master key is configured. A disabled service or missing master key is a failing result.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Configure a master key and enable the AES password encryption feature. The `key config-key ascii` command prompts for the master key interactively; the key is not entered on the command line.

            ```
            configure terminal
            key config-key ascii
            feature password encryption aes
            ```

            To convert existing Type 7 encrypted secrets in the configuration to Type 6 AES encryption:

            ```
            encryption re-encrypt obfuscated
            ```

            NX-OS does not automatically persist running-config changes. Save the configuration so the change survives a reload:

            ```
            copy running-config startup-config
            ```
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/dcn/nx-os/nexus9000/105x/security/cisco-nexus-9000-nx-os-security-configuration-guide-105x/m-configuring-user-accounts-and-rbac.html
        title: Cisco NX-OS Encryption Configuration Guide
  - uid: mondoo-cisco-nxos-security-users-encrypted-credentials
    title: Ensure all users have encrypted credentials
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-j
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-5
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-10
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-3
    mql: |
      cisco.nxos.users.all(
        creds.all(encryptionType != "0")
      )
    docs:
      desc: |
        This check verifies that all local user accounts have encrypted credentials. Credentials stored with encryption type 0 (clear text) are visible in the device configuration.

        **Why this matters**

        Clear-text credentials in the configuration are exposed to anyone who can view it. If credentials are not encrypted:

        - Passwords are visible in plain text in show commands and configuration backups.
        - An attacker with read access to the configuration obtains all credentials.
        - Configuration files in version control or backups expose passwords.

        Ensuring all users have encrypted credentials protects them from exposure.
      audit: |-
        To verify that all local users have encrypted credentials:

        1. Open an authenticated session to the device CLI.
        2. Display the configured user accounts:

           ```
           show running-config | include ^username
           ```

        The device passes when every `username` credential uses a non-clear-text encryption type. A user with a type 0 (clear text) password is a failing result.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Reset the password for any user whose credential is stored in clear text. Enter the password in plain text; NX-OS hashes it before storing it in the configuration.

            ```
            configure terminal
            username <user> password <strong-password> role <role>
            ```

            Verify that no credential is stored with encryption type 0:

            ```
            show running-config | include ^username
            ```

            NX-OS does not automatically persist running-config changes. Save the configuration so the change survives a reload:

            ```
            copy running-config startup-config
            ```
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/dcn/nx-os/nexus9000/105x/security/cisco-nexus-9000-nx-os-security-configuration-guide-105x/m-configuring-user-accounts-and-rbac.html
        title: Cisco NX-OS User Account Configuration Guide
  - uid: mondoo-cisco-nxos-security-passphrase-min-length
    title: Ensure minimum passphrase length is configured
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-j
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-5
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-7
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-3
    mql: |
      cisco.nxos.passphraseLength.minLength >= 8
    docs:
      desc: |
        This check verifies that the minimum passphrase length is set to at least 8 characters. Short passwords are significantly easier to crack through brute-force or dictionary attacks.

        **Why this matters**

        Without an adequate minimum length, users can create trivially short passwords. If the minimum length is too low:

        - Short passwords are vulnerable to brute-force attacks.
        - Password security policies cannot be enforced.
        - Compliance with password length requirements cannot be met.

        Setting a minimum passphrase length of at least 8 characters (15+ recommended) ensures passwords have adequate complexity.
      audit: |-
        To verify that the minimum passphrase length is configured:

        1. Open an authenticated session to the device CLI.
        2. Display the running configuration for the passphrase setting:

           ```
           show running-config | include userpassphrase
           ```

        The device passes when `userpassphrase min-length` is set to 8 or greater. A minimum length below 8 or no setting is a failing result.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Configure minimum passphrase length:

            ```
            configure terminal
            userpassphrase min-length 15 max-length 127
            ```

            NX-OS does not automatically persist running-config changes. Save the configuration so the change survives a reload:

            ```
            copy running-config startup-config
            ```
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/dcn/nx-os/nexus9000/105x/security/cisco-nexus-9000-nx-os-security-configuration-guide-105x/m-configuring-user-accounts-and-rbac.html
        title: Cisco NX-OS User Account Configuration Guide
  - uid: mondoo-cisco-nxos-security-system-login-block
    title: Ensure system login block is configured
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-j
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-8
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-3
    mql: |
      cisco.nxos.systemLogin.blockFor > 0
      cisco.nxos.systemLogin.attempts > 0
    docs:
      desc: |
        This check verifies that the system login block feature is configured to temporarily block login attempts after a series of failures. This mitigates brute-force attacks by introducing a lockout period.

        **Why this matters**

        Without login blocking, attackers can make unlimited rapid authentication attempts. If login blocking is not configured:

        - Brute-force attacks proceed without any throttling.
        - Automated credential-guessing tools can operate at full speed.
        - The device is more susceptible to password-cracking attacks.

        Configuring system login blocking introduces a delay after failed attempts, significantly slowing brute-force attacks.
      audit: |-
        To verify that the system login block feature is configured:

        1. Open an authenticated session to the device CLI.
        2. Display the running configuration for the login block setting:

           ```
           show running-config | include system login block-for
           ```

        The device passes when a `system login block-for` entry with a non-zero block period and attempt count is configured. Empty output is a failing result.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Configure login blocking:

            ```
            configure terminal
            system login block-for 60 attempts 3 within 60
            ```

            This blocks logins for 60 seconds after 3 failed attempts within 60 seconds. During the block period the device denies all login attempts, which an attacker can abuse to lock out administrators. Permit trusted management hosts during the quiet period with an ACL:

            ```
            ip access-list LOGIN-QUIET-MODE
              permit tcp <management-subnet> any eq 22
            exit
            system login quiet-mode access-class LOGIN-QUIET-MODE
            ```

            NX-OS does not automatically persist running-config changes. Save the configuration so the change survives a reload:

            ```
            copy running-config startup-config
            ```
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/dcn/nx-os/nexus9000/105x/security/cisco-nexus-9000-nx-os-security-configuration-guide-105x/m-configuring-user-accounts-and-rbac.html
        title: Cisco NX-OS Login Configuration Guide
  - uid: mondoo-cisco-nxos-security-ntp-servers-configured
    title: Ensure NTP servers are configured
    impact: 75
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-17
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-6
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-7
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    mql: |
      cisco.nxos.ntp.servers.length > 0
    docs:
      desc: |
        This check verifies that at least one NTP server is configured. Accurate time synchronization is essential for log correlation, certificate validation, and security event analysis.

        **Why this matters**

        Without NTP servers, the device clock drifts over time. If NTP is not configured:

        - Log timestamps are inaccurate, making incident investigation unreliable.
        - Certificate expiration checks may malfunction.
        - Event correlation across devices is impossible.

        Configuring NTP servers ensures accurate, synchronized time.
      audit: |-
        To verify that NTP servers are configured:

        1. Open an authenticated session to the device CLI.
        2. Display the configured NTP peers:

           ```
           show ntp peers
           ```

        The device passes when at least one NTP server is listed. Empty output is a failing result.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Configure NTP servers:

            ```
            configure terminal
            ntp server <ntp-server-ip-1> use-vrf management
            ntp server <ntp-server-ip-2> use-vrf management
            ```

            NX-OS does not automatically persist running-config changes. Save the configuration so the change survives a reload:

            ```
            copy running-config startup-config
            ```
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/dcn/nx-os/nexus9000/105x/system-management/cisco-nexus-9000-nx-os-system-management-configuration-guide-105x/m-configuring-ntp.html
        title: Cisco NX-OS NTP Configuration Guide
  - uid: mondoo-cisco-nxos-security-timezone-configured
    title: Ensure timezone is configured
    impact: 65
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-17
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-6
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-7
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    mql: |
      cisco.nxos.clock.timezone != ""
    docs:
      desc: |
        This check verifies that a timezone is configured on the device. A properly configured timezone ensures log timestamps are meaningful and correlate correctly with events in other systems.

        **Why this matters**

        Without a timezone configured, log timestamps default to UTC which may not align with local operations. If the timezone is not set:

        - Log analysis is complicated by unclear time references.
        - Correlation with physical events or local schedules is difficult.

        Configuring the timezone ensures timestamps are clear and operationally relevant.
      audit: |-
        To verify that a timezone is configured:

        1. Open an authenticated session to the device CLI.
        2. Display the running configuration for the clock timezone:

           ```
           show running-config | include clock timezone
           ```

        The device passes when a `clock timezone` entry is configured. Empty output is a failing result.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Configure the timezone:

            ```
            configure terminal
            clock timezone EST -5 0
            ```

            NX-OS does not automatically persist running-config changes. Save the configuration so the change survives a reload:

            ```
            copy running-config startup-config
            ```
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/dcn/nx-os/nexus9000/105x/system-management/cisco-nexus-9000-nx-os-system-management-configuration-guide-105x/m-configuring-ntp.html
        title: Cisco NX-OS Clock Configuration Guide
  - uid: mondoo-cisco-nxos-security-logging-remote-servers
    title: Ensure remote logging servers are configured
    impact: 85
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-16
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    mql: |
      cisco.nxos.logging.serverEnabled == true
      cisco.nxos.logging.remoteServers.length > 0
    docs:
      desc: |
        This check verifies that remote logging is enabled and at least one remote syslog server is configured. Sending logs to a remote server preserves data even if the device is compromised.

        **Why this matters**

        Logs stored only on the device are vulnerable to loss or tampering. If remote logging is not configured:

        - Logs are lost when the device reboots.
        - An attacker who compromises the device can erase local logs.
        - Centralized log correlation and SIEM integration is not possible.

        Configuring remote logging ensures logs are preserved centrally.
      audit: |-
        To verify that remote logging servers are configured:

        1. Open an authenticated session to the device CLI.
        2. Display the configured logging servers:

           ```
           show logging server
           ```

        The device passes when remote logging is enabled and at least one syslog server is listed. No configured server is a failing result.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Configure remote logging:

            ```
            configure terminal
            logging server <syslog-server-ip> 6 use-vrf management
            logging source-interface mgmt0
            ```

            NX-OS does not automatically persist running-config changes. Save the configuration so the change survives a reload:

            ```
            copy running-config startup-config
            ```
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/dcn/nx-os/nexus9000/105x/system-management/cisco-nexus-9000-nx-os-system-management-configuration-guide-105x/m-configuring-system-message-logging.html
        title: Cisco NX-OS Logging Configuration Guide
  - uid: mondoo-cisco-nxos-security-logging-timestamp-configured
    title: Ensure logging timestamps are configured
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-16
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-7
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    mql: |
      cisco.nxos.logging.timestampFormat == "MilliSeconds" ||
      cisco.nxos.logging.timestampFormat == "MicroSeconds"
    docs:
      desc: |
        This check verifies that logging timestamps use millisecond or microsecond precision. Higher precision timestamps improve the accuracy of log correlation and forensic analysis.

        **Why this matters**

        Second-level timestamps may not provide sufficient granularity for correlating events. If timestamps lack precision:

        - Events occurring within the same second cannot be properly ordered.
        - Forensic analysis of rapid event sequences is impaired.

        Configuring millisecond or microsecond timestamps ensures precise event ordering.
      audit: |-
        To verify that logging timestamps use high precision:

        1. Open an authenticated session to the device CLI.
        2. Display the logging timestamp setting:

           ```
           show logging timestamp
           ```

        The device passes when the timestamp format is reported as milliseconds or microseconds. A seconds-precision format is a failing result.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Configure millisecond timestamps:

            ```
            configure terminal
            logging timestamp milliseconds
            ```

            NX-OS does not automatically persist running-config changes. Save the configuration so the change survives a reload:

            ```
            copy running-config startup-config
            ```
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/dcn/nx-os/nexus9000/105x/system-management/cisco-nexus-9000-nx-os-system-management-configuration-guide-105x/m-configuring-system-message-logging.html
        title: Cisco NX-OS Logging Configuration Guide
  - uid: mondoo-cisco-nxos-security-logging-source-interface
    title: Ensure logging source interface is configured
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-16
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    mql: |
      cisco.nxos.logging.srcInterfaceName != ""
    docs:
      desc: |
        This check verifies that a source interface is configured for logging. Setting a consistent source interface ensures that syslog messages always originate from the same IP address, simplifying log management and ACL configuration on syslog servers.

        **Why this matters**

        Without a source interface, syslog messages may originate from different IP addresses depending on the routing path. If the source interface is not set:

        - Syslog server ACLs must permit multiple source addresses.
        - Log correlation by source IP is unreliable.
        - Syslog messages may be dropped if the egress interface changes.

        Configuring a source interface ensures consistent, reliable log delivery.
      audit: |-
        To verify that a logging source interface is configured:

        1. Open an authenticated session to the device CLI.
        2. Display the running configuration for the logging source interface:

           ```
           show running-config | include logging source-interface
           ```

        The device passes when a `logging source-interface` entry is configured. Empty output is a failing result.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Configure logging source interface:

            ```
            configure terminal
            logging source-interface mgmt0
            ```

            NX-OS does not automatically persist running-config changes. Save the configuration so the change survives a reload:

            ```
            copy running-config startup-config
            ```
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/dcn/nx-os/nexus9000/105x/system-management/cisco-nexus-9000-nx-os-system-management-configuration-guide-105x/m-configuring-system-message-logging.html
        title: Cisco NX-OS Logging Configuration Guide
  - uid: mondoo-cisco-nxos-security-snmp-no-public-community
    title: Ensure SNMP does not use default community strings
    impact: 95
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-j
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-5
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-10
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-3
    mql: |
      cisco.nxos.snmp.communities.none(name == "public")
      cisco.nxos.snmp.communities.none(name == "private")
    docs:
      desc: |
        This check verifies that the default SNMP community strings "public" and "private" are not in use. These well-known defaults are the first values attackers try.

        **Why this matters**

        Default SNMP community strings are universally known and actively scanned for. If defaults are used:

        - Anyone can read device data using "public".
        - "private" may allow unauthorized configuration changes.
        - Automated scanning tools will immediately exploit default strings.

        Removing default community strings ensures SNMP access is properly restricted.
      audit: |-
        To verify that default SNMP community strings are not in use:

        1. Open an authenticated session to the device CLI.
        2. Display the configured SNMP community strings:

           ```
           show snmp community
           ```

        The device passes when no community named `public` or `private` is listed. A `public` or `private` community string is a failing result.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Remove default community strings:

            ```
            configure terminal
            no snmp-server community public
            no snmp-server community private
            snmp-server community <unique-string> group network-operator
            ```

            NX-OS does not automatically persist running-config changes. Save the configuration so the change survives a reload:

            ```
            copy running-config startup-config
            ```
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/dcn/nx-os/nexus9000/105x/system-management/cisco-nexus-9000-nx-os-system-management-configuration-guide-105x/m-configuring-snmp.html
        title: Cisco NX-OS SNMP Configuration Guide
  - uid: mondoo-cisco-nxos-security-snmp-encryption-enforced
    title: Ensure SNMPv3 encryption is enforced globally
    impact: 85
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    mql: |
      cisco.nxos.snmp.settings.encryptionEnforced == true
    docs:
      desc: |
        This check verifies that SNMPv3 encryption is enforced globally for all SNMP users. Enforcing encryption ensures that all SNMP communications use authentication and privacy (encryption).

        **Why this matters**

        Without global encryption enforcement, individual SNMP users may be configured without encryption. If encryption is not enforced:

        - SNMP credentials and data can be transmitted in clear text.
        - Individual users may accidentally be configured without encryption.
        - Compliance with standards requiring encrypted management protocols cannot be met.

        Enforcing SNMPv3 encryption globally ensures all SNMP communications are authenticated and encrypted.
      audit: |-
        To verify that SNMPv3 encryption is enforced globally:

        1. Open an authenticated session to the device CLI.
        2. Display the running configuration for the SNMP privacy setting:

           ```
           show running-config | include snmp-server globalEnforcePriv
           ```

        The device passes when the output contains `snmp-server globalEnforcePriv`. Empty output is a failing result.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Before enforcing global privacy, make sure at least one SNMPv3 user is configured with both authentication and privacy. Global privacy enforcement requires every SNMP request to use SNMPv3 with encryption, so it silently stops all SNMPv1 and SNMPv2c community access. If no SNMPv3 auth and priv user exists when you enforce this, SNMP management of the device breaks entirely.

            Create an SNMPv3 user with SHA authentication and AES-128 privacy, then enforce global privacy:

            ```
            configure terminal
            snmp-server user <username> network-operator auth sha <auth-password> priv aes-128 <priv-password>
            snmp-server globalEnforcePriv
            ```

            The `snmp-server globalEnforcePriv` token is valid NX-OS syntax. Migrate any monitoring systems that still rely on v2c community strings to SNMPv3 before applying this change.

            NX-OS does not automatically persist running-config changes. Save the configuration so the change survives a reload:

            ```
            copy running-config startup-config
            ```
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/dcn/nx-os/nexus9000/105x/system-management/cisco-nexus-9000-nx-os-system-management-configuration-guide-105x/m-configuring-snmp.html
        title: Cisco NX-OS SNMP Configuration Guide
  - uid: mondoo-cisco-nxos-security-snmp-communities-acl
    title: Ensure SNMP communities have ACLs applied
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ac-3
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-4
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-4-1-1
    mql: |
      if (cisco.nxos.snmp.communities.length > 0) {
        cisco.nxos.snmp.communities.all(
          ipv4Acl != "" || ipv6Acl != ""
        )
      }
    docs:
      desc: |
        This check verifies that all SNMP community strings have IPv4 or IPv6 ACLs applied to restrict which hosts can query the device.

        **Why this matters**

        SNMP without ACL restrictions allows any network host to query the device. If ACLs are not applied:

        - Any device on the network can query SNMP data.
        - Unauthorized SNMP polling exposes configuration and operational information.

        Applying ACLs restricts SNMP access to authorized management stations.
      audit: |-
        To verify that SNMP communities have ACLs applied:

        1. Open an authenticated session to the device CLI.
        2. Display the configured SNMP community strings:

           ```
           show snmp community
           ```

        The device passes when every community string has an IPv4 or IPv6 ACL applied. Any community with no ACL is a failing result.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            The preferred fix is to migrate SNMP management to SNMPv3, which provides per-user authentication and encryption rather than shared community strings. Applying ACLs to v2c communities is a stopgap that limits which hosts can poll the device but does not encrypt the traffic or authenticate individual users. See the check that enforces SNMPv3 encryption globally for the SNMPv3 migration path.

            If you must keep v2c communities in the interim, create an ACL that permits only authorized management stations, then bind it to each SNMP community. The ACL must exist before it is referenced. Include every monitoring system in the ACL; any station not permitted loses SNMP access to the device as soon as the ACL is applied.

            ```
            configure terminal
            ip access-list SNMP-MGMT
              permit ip <nms-ip>/32 any
            exit
            snmp-server community <community> use-ipv4acl SNMP-MGMT
            ```

            NX-OS does not automatically persist running-config changes. Save the configuration so the change survives a reload:

            ```
            copy running-config startup-config
            ```
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/dcn/nx-os/nexus9000/105x/system-management/cisco-nexus-9000-nx-os-system-management-configuration-guide-105x/m-configuring-snmp.html
        title: Cisco NX-OS SNMP Configuration Guide
  - uid: mondoo-cisco-nxos-security-poap-disabled
    title: Ensure POAP is disabled
    impact: 85
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ccc-06
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ac-3
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-6
      compliance/pci-dss-4: pcidss-requirement-2-2-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-1
    mql: |
      cisco.nxos.boot.poapEnabled == false
    docs:
      desc: |
        This check verifies that Power-On Auto Provisioning (POAP) is disabled. POAP automatically downloads and executes a configuration script when the switch boots without a startup configuration, which can be exploited to load a malicious configuration.

        **Why this matters**

        POAP can be exploited if an attacker sets up a rogue DHCP/TFTP server on the network. If POAP is enabled:

        - An attacker can serve a malicious configuration or script to the device during boot.
        - The device can be reconfigured without authentication during the provisioning process.
        - A compromised device can be reprovisioned with an attacker-controlled configuration.

        Disabling POAP prevents unauthorized auto-provisioning during device boot.
      audit: |-
        To verify that POAP is disabled:

        1. Open an authenticated session to the device CLI.
        2. Display the running configuration for the boot POAP setting:

           ```
           show running-config | include boot poap
           ```

        The device passes when the output contains `no boot poap enable` or no `boot poap enable` line at all. A `boot poap enable` line is a failing result.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Disable POAP:

            ```
            configure terminal
            no boot poap enable
            ```

            NX-OS does not automatically persist running-config changes. Save the configuration so the change survives a reload:

            ```
            copy running-config startup-config
            ```
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/dcn/nx-os/nexus9000/105x/fundamentals/cisco-nexus-9000-nx-os-fundamentals-configuration-guide-105x/m-using-poap.html
        title: Cisco NX-OS POAP Configuration Guide
  - uid: mondoo-cisco-nxos-security-copp-profile-strict
    title: Ensure CoPP uses a strict profile
    impact: 85
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ac-3
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-5
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-6
    mql: |
      cisco.nxos.copp.profile != "lenient"
      cisco.nxos.copp.profile != ""
    docs:
      desc: |
        This check verifies that Control Plane Policing (CoPP) is configured with a profile other than "lenient." CoPP protects the control plane from denial-of-service attacks by rate-limiting traffic destined to the CPU.

        **Why this matters**

        The "lenient" CoPP profile provides minimal protection. If the CoPP profile is too permissive:

        - The control plane is vulnerable to denial-of-service attacks.
        - Excessive traffic can overwhelm the CPU, causing routing protocol failures.
        - Management access may become unavailable during an attack.

        Using a strict or moderate CoPP profile ensures the control plane is adequately protected.
      audit: |-
        To verify that CoPP uses a non-lenient profile:

        1. Open an authenticated session to the device CLI.
        2. Display the active CoPP profile:

           ```
           show copp status
           ```

        The device passes when the active CoPP profile is `strict`, `moderate`, or `dense`. A `lenient` profile or no profile is a failing result.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Configure CoPP with a strict profile:

            ```
            configure terminal
            copp profile strict
            ```

            NX-OS does not automatically persist running-config changes. Save the configuration so the change survives a reload:

            ```
            copy running-config startup-config
            ```
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/dcn/nx-os/nexus9000/105x/security/cisco-nexus-9000-nx-os-security-configuration-guide-105x/m-configuring-copp.html
        title: Cisco NX-OS CoPP Configuration Guide
  - uid: mondoo-cisco-nxos-security-vty-exec-timeout
    title: Ensure VTY exec timeout is configured
    impact: 75
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-1
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-12
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-10
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-3
    mql: |
      cisco.nxos.lineConfigs.where(type == "vty").all(
        execTimeout > 0
      )
    docs:
      desc: |
        This check verifies that VTY lines have an exec timeout configured to disconnect idle sessions. The exec timeout reduces the risk of unauthorized access through unattended terminals.

        **Why this matters**

        Without an exec timeout, idle VTY sessions remain open indefinitely. If exec timeouts are not configured:

        - Forgotten sessions can be exploited by unauthorized users.
        - Connection resources are consumed by idle sessions.
        - Compliance requirements for session management cannot be met.

        Configuring exec timeouts on VTY lines ensures idle sessions are terminated.
      audit: |-
        To verify that VTY lines have an exec timeout configured:

        1. Open an authenticated session to the device CLI.
        2. Display the effective VTY line configuration, including default values:

           ```
           show running-config all | section "line vty"
           ```

        The device passes when the VTY line reports a non-zero `exec-timeout`. The NX-OS default of 30 minutes passes. A VTY line with `exec-timeout 0` is a failing result because a value of 0 disables the timeout.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Configure VTY exec timeout (10 minutes recommended):

            ```
            configure terminal
            line vty
            exec-timeout 10
            ```

            NX-OS does not automatically persist running-config changes. Save the configuration so the change survives a reload:

            ```
            copy running-config startup-config
            ```
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/dcn/nx-os/nexus9000/105x/security/cisco-nexus-9000-nx-os-security-configuration-guide-105x/m-configuring-user-accounts-and-rbac.html
        title: Cisco NX-OS Line Configuration Guide
  - uid: mondoo-cisco-nxos-security-console-exec-timeout
    title: Ensure console exec timeout is configured
    impact: 75
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-1
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-12
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-10
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-3
    mql: |
      cisco.nxos.lineConfigs.where(type == "console").all(
        execTimeout > 0
      )
    docs:
      desc: |
        This check verifies that the console line has an exec timeout configured to disconnect idle sessions automatically.

        **Why this matters**

        Without a console timeout, an idle session remains open indefinitely. If the timeout is not set:

        - An unattended console connection can be used for unauthorized changes.
        - Physical access security requirements cannot be met.

        Configuring a console exec timeout ensures idle console sessions are terminated.
      audit: |-
        To verify that the console line has an exec timeout configured:

        1. Open an authenticated session to the device CLI.
        2. Display the effective console line configuration, including default values:

           ```
           show running-config all | section "line console"
           ```

        The device passes when the console line reports a non-zero `exec-timeout`. The NX-OS default of 30 minutes passes. A console line with `exec-timeout 0` is a failing result because a value of 0 disables the timeout.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Configure console exec timeout (10 minutes recommended):

            ```
            configure terminal
            line console
            exec-timeout 10
            ```

            NX-OS does not automatically persist running-config changes. Save the configuration so the change survives a reload:

            ```
            copy running-config startup-config
            ```
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/dcn/nx-os/nexus9000/105x/security/cisco-nexus-9000-nx-os-security-configuration-guide-105x/m-configuring-user-accounts-and-rbac.html
        title: Cisco NX-OS Line Configuration Guide
  - uid: mondoo-cisco-nxos-security-vty-acl-configured
    title: Ensure VTY lines have ACLs configured
    impact: 85
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ac-3
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-4
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-4-1-1
    mql: |
      cisco.nxos.lineConfigs.where(type == "vty").all(
        accessClassInName != ""
      )
    docs:
      desc: |
        This check verifies that VTY lines have inbound ACLs configured to restrict which IP addresses can establish remote management sessions.

        **Why this matters**

        VTY lines without ACLs allow connection attempts from any source. If ACLs are not configured:

        - Any host can attempt brute-force attacks against the device.
        - Management access cannot be restricted to trusted networks.

        Applying ACLs to VTY lines restricts access to authorized management stations.
      audit: |-
        To verify that VTY lines have an inbound ACL configured:

        1. Open an authenticated session to the device CLI.
        2. Display the running configuration for the VTY line:

           ```
           show running-config | section "line vty"
           ```

        The device passes when the VTY line reports an `access-class <acl> in` entry. A VTY line with no inbound access class is a failing result.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Create the ACL before applying it to the VTY lines and make sure it permits the management hosts you connect from. Applying an inbound access class that does not match your management stations immediately cuts off remote SSH access, including the session you are working in. Keep a console session available until you have verified remote access still works.

            ```
            configure terminal
            ip access-list VTY-MGMT
              permit tcp <management-subnet> any eq 22
            exit
            line vty
              access-class VTY-MGMT in
            ```

            From a permitted management station, open a new SSH session to confirm access before closing your existing one.

            NX-OS does not automatically persist running-config changes. Once you have confirmed remote access still works, save the configuration so the change survives a reload:

            ```
            copy running-config startup-config
            ```
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/dcn/nx-os/nexus9000/105x/security/cisco-nexus-9000-nx-os-security-configuration-guide-105x/m-configuring-user-accounts-and-rbac.html
        title: Cisco NX-OS Line Configuration Guide
  - uid: mondoo-cisco-nxos-security-motd-banner-configured
    title: Ensure MOTD banner is configured
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-9
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-3
    mql: |
      cisco.nxos.motdBanner != ""
    docs:
      desc: |
        This check verifies that a Message of the Day (MOTD) banner is configured. The MOTD banner provides legal notice to users before authentication.

        **Why this matters**

        Without a MOTD banner, there is no legal warning before access. If the banner is not configured:

        - Legal proceedings against unauthorized access may be weakened.
        - Users are not informed of acceptable use policies.
        - Compliance requirements for access warnings cannot be met.

        Configuring a MOTD banner ensures users receive legal notice before accessing the device.
      audit: |-
        To verify that a Message of the Day banner is configured:

        1. Open an authenticated session to the device CLI.
        2. Display the running configuration for the MOTD banner:

           ```
           show running-config | include banner motd
           ```

        The device passes when a `banner motd` entry with text is configured. Empty output is a failing result.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Configure a MOTD banner:

            ```
            configure terminal
            banner motd @Authorized access only. All activity is monitored and logged.@
            ```

            NX-OS does not automatically persist running-config changes. Save the configuration so the change survives a reload:

            ```
            copy running-config startup-config
            ```
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/dcn/nx-os/nexus9000/105x/fundamentals/cisco-nexus-9000-nx-os-fundamentals-configuration-guide-105x.html
        title: Cisco NX-OS Banner Configuration Guide
  - uid: mondoo-cisco-nxos-security-exec-banner-configured
    title: Ensure exec banner is configured
    impact: 65
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-9
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-3
    mql: |
      cisco.nxos.execBanner != ""
    docs:
      desc: |
        This check verifies that an exec banner is configured. The exec banner is displayed after successful authentication and can provide additional security reminders or policy information.

        **Why this matters**

        The exec banner provides an opportunity to display post-login security reminders. If not configured:

        - Users are not reminded of security policies after login.
        - There is no post-authentication notice about monitoring or acceptable use.

        Configuring an exec banner reinforces security awareness after authentication.
      audit: |-
        To verify that an exec banner is configured:

        1. Open an authenticated session to the device CLI.
        2. Display the running configuration for the exec banner:

           ```
           show running-config | include banner exec
           ```

        The device passes when a `banner exec` entry with text is configured. Empty output is a failing result.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Configure an exec banner:

            ```
            configure terminal
            banner exec @This system is for authorized use only. All activity is logged.@
            ```

            NX-OS does not automatically persist running-config changes. Save the configuration so the change survives a reload:

            ```
            copy running-config startup-config
            ```
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/dcn/nx-os/nexus9000/105x/fundamentals/cisco-nexus-9000-nx-os-fundamentals-configuration-guide-105x.html
        title: Cisco NX-OS Banner Configuration Guide
  - uid: mondoo-cisco-nxos-security-hostname-configured
    title: Ensure hostname is configured
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    mql: |
      cisco.nxos.hostname != ""
      cisco.nxos.hostname.downcase != "switch"
      cisco.nxos.hostname.downcase != "nexus"
    docs:
      desc: |
        This check verifies that a unique, descriptive hostname is configured. A meaningful hostname is essential for identifying the device in logs, alerts, and management systems.

        **Why this matters**

        Without a unique hostname, the device uses a generic default name. If the hostname is not configured:

        - The device cannot be identified in logs or management platforms.
        - Log correlation across multiple devices is unreliable.
        - Network topology documentation is incomplete.

        Setting a descriptive hostname ensures the device is identifiable across all workflows.
      audit: |-
        To verify that a unique, descriptive hostname is configured:

        1. Open an authenticated session to the device CLI.
        2. Display the configured hostname:

           ```
           show running-config | include ^hostname
           ```

        The device passes when a hostname is set and is not the generic value `switch` or `nexus`. An empty or generic hostname is a failing result.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Configure a descriptive hostname:

            ```
            configure terminal
            hostname <unique-descriptive-name>
            ```

            NX-OS does not automatically persist running-config changes. Save the configuration so the change survives a reload:

            ```
            copy running-config startup-config
            ```
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/dcn/nx-os/nexus9000/105x/fundamentals/cisco-nexus-9000-nx-os-fundamentals-configuration-guide-105x.html
        title: Cisco NX-OS System Configuration Guide
  - uid: mondoo-cisco-nxos-security-source-routing-disabled
    title: Ensure IP source routing is disabled
    impact: 85
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ccc-06
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ac-3
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-6
      compliance/pci-dss-4: pcidss-requirement-2-2-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-1
    mql: |
      cisco.nxos.ip.sourceRouteEnabled == false
    docs:
      desc: |
        This check verifies that IP source routing is disabled. Source routing allows a sender to specify the route a packet takes, which can be abused to bypass security controls.

        **Why this matters**

        IP source routing enables attackers to specify routing paths that circumvent firewalls and ACLs. If source routing is enabled:

        - Attackers can route packets through paths that bypass security controls.
        - Spoofed packets can reach internal networks.

        Disabling source routing prevents attackers from manipulating packet routing paths.
      audit: |-
        To verify that IP source routing is disabled:

        1. Open an authenticated session to the device CLI.
        2. Display the running configuration for the source-route setting:

           ```
           show running-config all | include ip source-route
           ```

        The device passes when the output contains `no ip source-route`. An `ip source-route` line is a failing result.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Disable IP source routing:

            ```
            configure terminal
            no ip source-route
            ```

            NX-OS does not automatically persist running-config changes. Save the configuration so the change survives a reload:

            ```
            copy running-config startup-config
            ```
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/dcn/nx-os/nexus9000/105x/security/cisco-nexus-9000-nx-os-security-configuration-guide-105x.html
        title: Cisco NX-OS Security Configuration Guide
  - uid: mondoo-cisco-nxos-security-ip-directed-broadcast-disabled
    title: Ensure IP directed broadcast is disabled on interfaces
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ac-3
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-5
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-6
    mql: |
      cisco.nxos.runInterfaces.all(
        ipDirectedBroadcast == false
      )
    docs:
      desc: |
        This check verifies that IP directed broadcast is disabled on all interfaces. Directed broadcasts can be used as amplification vectors for denial-of-service attacks (Smurf attacks).

        **Why this matters**

        IP directed broadcasts allow a single packet to be broadcast to all hosts on a subnet. If directed broadcast is enabled:

        - The interface can be used as a Smurf attack amplifier.
        - Denial-of-service attacks can be amplified through the device.

        Disabling directed broadcast on all interfaces prevents amplification attacks.
      audit: |-
        To verify that IP directed broadcast is disabled on all interfaces:

        1. Open an authenticated session to the device CLI.
        2. Display the interface configuration:

           ```
           show running-config interface
           ```

        The device passes when no interface has `ip directed-broadcast` configured. Any interface with `ip directed-broadcast` enabled is a failing result.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Apply this change to every routed interface flagged by the audit, not just one. The check fails while any interface still has `ip directed-broadcast` enabled, so repeat the interface block for each affected interface.

            Disable IP directed broadcast on interfaces:

            ```
            configure terminal
            interface <interface>
            no ip directed-broadcast
            ```

            NX-OS does not automatically persist running-config changes. Save the configuration so the change survives a reload:

            ```
            copy running-config startup-config
            ```
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/dcn/nx-os/nexus9000/105x/security/cisco-nexus-9000-nx-os-security-configuration-guide-105x.html
        title: Cisco NX-OS Security Configuration Guide
  - uid: mondoo-cisco-nxos-security-bgp-neighbor-passwords
    title: Ensure BGP neighbors have authentication configured
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    mql: |
      if (cisco.nxos.bgp.length > 0) {
        cisco.nxos.bgp.all(
          neighbors.all(key != "")
        )
      }
    docs:
      desc: |
        This check verifies that all BGP neighbors have MD5 authentication configured. BGP authentication prevents unauthorized peers from injecting routes.

        **Why this matters**

        Without BGP authentication, an attacker can establish rogue BGP sessions. If authentication is not configured:

        - Malicious routes can be injected, redirecting or black-holing traffic.
        - BGP sessions can be disrupted through TCP reset attacks.

        Configuring authentication on BGP neighbors ensures only authorized peers establish sessions.
      audit: |-
        To verify that BGP neighbors have authentication configured:

        1. Open an authenticated session to the device CLI.
        2. Display the BGP configuration:

           ```
           show running-config bgp
           ```

        The device passes when every configured `neighbor` has a `password` entry. A BGP neighbor with no password is a failing result.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Coordinate this change with the operator of the remote peer. Setting a password on an established neighbor tears the BGP session down until the same password is configured on both sides, which interrupts routing through that peer.

            Configure BGP neighbor authentication:

            ```
            configure terminal
            router bgp <as-number>
              neighbor <neighbor-ip>
                password <shared-secret>
            ```

            Enter the password in plain text; NX-OS stores it in encrypted form in the configuration. Verify the session returns to the established state:

            ```
            show bgp sessions
            ```

            NX-OS does not automatically persist running-config changes. Save the configuration so the change survives a reload:

            ```
            copy running-config startup-config
            ```
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/dcn/nx-os/nexus9000/105x/unicast-routing/cisco-nexus-9000-nx-os-unicast-routing-configuration-guide-105x/m-configuring-bgp.html
        title: Cisco NX-OS BGP Configuration Guide
  - uid: mondoo-cisco-nxos-security-bgp-log-neighbor-changes
    title: Ensure BGP log neighbor changes is enabled
    impact: 75
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-16
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    mql: |
      if (cisco.nxos.bgp.length > 0) {
        cisco.nxos.bgp.all(logNeighborChanges == true)
      }
    docs:
      desc: |
        This check verifies that BGP neighbor change logging is enabled. Logging BGP peer state changes provides visibility into routing stability and potential security events.

        **Why this matters**

        Without BGP neighbor change logging, routing disruptions may go unnoticed. If logging is not enabled:

        - BGP session flaps and resets are not recorded.
        - Unauthorized BGP peering attempts are not logged.
        - Routing stability issues cannot be diagnosed from historical data.

        Enabling BGP log neighbor changes ensures routing events are captured for monitoring and troubleshooting.
      audit: |-
        To verify that BGP neighbor change logging is enabled:

        1. Open an authenticated session to the device CLI.
        2. Display the BGP configuration:

           ```
           show running-config bgp
           ```

        The device passes when every configured BGP instance has `log-neighbor-changes` set. A BGP instance without it is a failing result.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Enable BGP neighbor change logging:

            ```
            configure terminal
            router bgp <as-number>
            log-neighbor-changes
            ```

            NX-OS does not automatically persist running-config changes. Save the configuration so the change survives a reload:

            ```
            copy running-config startup-config
            ```
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/dcn/nx-os/nexus9000/105x/unicast-routing/cisco-nexus-9000-nx-os-unicast-routing-configuration-guide-105x/m-configuring-bgp.html
        title: Cisco NX-OS BGP Configuration Guide
  - uid: mondoo-cisco-nxos-security-ospf-authentication
    title: Ensure OSPF interfaces use authentication
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    mql: |
      if (cisco.nxos.ospf.length > 0) {
        cisco.nxos.ospf.all(
          interfaces.all(
            md5AuthenticationEnabled == true || authKeychain != ""
          )
        )
      }
    docs:
      desc: |
        This check verifies that all OSPF interfaces have authentication configured using either MD5 or a key chain. OSPF authentication prevents unauthorized routers from injecting routes.

        **Why this matters**

        Without OSPF authentication, any device on the segment can participate in OSPF routing. If authentication is not configured:

        - Rogue routers can inject false routes.
        - OSPF adjacencies can be disrupted.
        - Man-in-the-middle attacks via route injection are possible.

        Configuring OSPF interface authentication ensures only authorized routers participate in the routing domain.
      audit: |-
        To verify that OSPF interfaces use authentication:

        1. Open an authenticated session to the device CLI.
        2. Display the OSPF configuration:

           ```
           show running-config ospf
           ```

        The device passes when every OSPF-enabled interface has message-digest authentication or an authentication key chain configured. An OSPF interface with no authentication is a failing result.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Enabling authentication on a live OSPF interface drops the adjacency until the neighboring router is configured with the same key. Schedule this change together with the neighbor or during a maintenance window.

            Configure OSPF interface authentication with message digest keys:

            ```
            configure terminal
            interface <interface>
              ip ospf authentication message-digest
              ip ospf message-digest-key 1 md5 <key>
            ```

            Or create a key chain and reference it on the interface:

            ```
            configure terminal
            key chain <keychain-name>
              key 1
                key-string <key>
            exit
            interface <interface>
              ip ospf authentication key-chain <keychain-name>
            ```

            Verify the adjacency reforms:

            ```
            show ip ospf neighbors
            ```

            NX-OS does not automatically persist running-config changes. Once the adjacency has reformed, save the configuration so the change survives a reload:

            ```
            copy running-config startup-config
            ```
    refs:
      - url: https://www.cisco.com/c/en/us/td/docs/dcn/nx-os/nexus9000/105x/unicast-routing/cisco-nexus-9000-nx-os-unicast-routing-configuration-guide-105x/m-configuring-ospfv2.html
        title: Cisco NX-OS OSPF Configuration Guide
