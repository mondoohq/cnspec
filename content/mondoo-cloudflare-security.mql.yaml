policies:
  - uid: mondoo-cloudflare-security
    name: Mondoo Cloudflare Security
    version: 1.1.2
    license: BUSL-1.1
    tags:
      mondoo.com/category: security
      mondoo.com/platform: cloudflare,saas
    require:
      - provider: cloudflare
    authors:
      - name: Mondoo, Inc.
        email: hello@mondoo.com
    summary: Secure Cloudflare zones, DNS, and account settings
    docs:
      desc: |
        The Mondoo Cloudflare Security policy identifies critical misconfigurations in Cloudflare zones and accounts that could weaken your edge security posture and expose origin infrastructure to attackers. This policy helps organizations detect and remediate weaknesses before they can be exploited, reducing the likelihood of man-in-the-middle attacks, data interception, account compromise, and unauthorized changes to DNS and routing.

        This policy provides security checks across key Cloudflare areas:

        - SSL/TLS encryption mode and certificate handling
        - HTTPS enforcement and HSTS
        - Web Application Firewall (WAF) and managed rule enablement
        - Browser integrity checks and bot mitigation
        - Account-level two-factor authentication and access controls

        Learn more about scanning Cloudflare in the [cnspec Cloudflare documentation](https://mondoo.com/docs/cnspec/saas/cloudflare).

        Have suggestions for new checks in this policy? Visit our [cnspec repository](https://github.com/mondoohq/cnspec).
    groups:
      - title: Zone Security
        checks:
          - uid: mondoo-cloudflare-security-ssl-not-off
          - uid: mondoo-cloudflare-security-ssl-strict
          - uid: mondoo-cloudflare-security-always-use-https
          - uid: mondoo-cloudflare-security-min-tls-1-2
          - uid: mondoo-cloudflare-security-tls-1-3-enabled
          - uid: mondoo-cloudflare-security-automatic-https-rewrites
          - uid: mondoo-cloudflare-security-waf-enabled
          - uid: mondoo-cloudflare-security-security-level-not-off
          - uid: mondoo-cloudflare-security-browser-check
          - uid: mondoo-cloudflare-security-email-obfuscation
          - uid: mondoo-cloudflare-security-hotlink-protection
          - uid: mondoo-cloudflare-security-opportunistic-encryption
          - uid: mondoo-cloudflare-security-dnssec-active
          - uid: mondoo-cloudflare-security-hsts-enabled
          - uid: mondoo-cloudflare-security-hsts-max-age-one-year
          - uid: mondoo-cloudflare-security-hsts-include-subdomains
          - uid: mondoo-cloudflare-security-hsts-preload
      - title: Account Security
        checks:
          - uid: mondoo-cloudflare-security-enforce-two-factor
          - uid: mondoo-cloudflare-security-members-have-two-factor
          - uid: mondoo-cloudflare-security-r2-buckets-not-public
          - uid: mondoo-cloudflare-security-api-tokens-have-expiration
          - uid: mondoo-cloudflare-security-api-tokens-have-ip-allowlist
          - uid: mondoo-cloudflare-security-api-tokens-not-older-than-365-days
    scoring_system: highest impact
queries:
  - uid: mondoo-cloudflare-security-ssl-not-off
    title: Ensure SSL/TLS encryption is not disabled
    impact: 100
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-2-ii-transmission-security-encryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    variants:
      - uid: mondoo-cloudflare-security-ssl-not-off-cloudflare
        tags:
          mondoo.com/filter-title: Cloudflare Zone
          mondoo.com/filter-icon: cloudflare
      - uid: mondoo-cloudflare-security-ssl-not-off-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-cloudflare-security-ssl-not-off-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-cloudflare-security-ssl-not-off-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that the Cloudflare zone is configured to use SSL/TLS encryption rather than leaving it disabled. By default, newly created zones may inherit settings that leave SSL/TLS turned off, transmitting all traffic between visitors and the origin in plaintext.

        **Why this matters**

        - **Data exposure:** Plaintext HTTP traffic exposes credentials, session tokens, and personal information to anyone on the network path.
        - **Man-in-the-middle risk:** Without encryption, on-path attackers can intercept and modify both requests and responses without detection.
        - **Session hijacking:** Cookies and authentication tokens sent over unencrypted connections can be stolen and replayed by adversaries.
        - **Regulatory exposure:** Most security and privacy frameworks require encryption in transit; disabled SSL/TLS is a direct violation of those controls.

        **Risk mitigation**

        - **Credential theft prevention:** Enabling any SSL/TLS mode encrypts the visitor-to-Cloudflare path, preventing passive interception of authentication material.
        - **Trust signal:** Browsers display security warnings for non-HTTPS pages, harming user trust and flagging the site as unsafe before any attack occurs.
      audit: |
        ### Audit via Dashboard

        1. Log in to the Cloudflare dashboard and select the zone.
        2. Navigate to **SSL/TLS** > **Overview**.
        3. Inspect the **Your SSL/TLS encryption mode** panel.

        A passing zone shows any mode other than **Off** (e.g., Flexible, Full, or Full (Strict)). A failing zone shows **Off**.

        ### Audit via API

        1. Retrieve the `ssl` zone setting:

        ```bash
        curl -s -X GET "https://api.cloudflare.com/client/v4/zones/<zone-id>/settings/ssl" \
          -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN"
        ```

        A passing zone returns `"value": "flexible"`, `"value": "full"`, or `"value": "strict"`. A failing zone returns `"value": "off"`.
      remediation:
        - id: console
          desc: |
            To fix this in the Cloudflare dashboard:

            1. Log in and select the affected zone.
            2. Navigate to **SSL/TLS** > **Overview**.
            3. Set the encryption mode to **Full (Strict)**. This is the only mode that encrypts and authenticates both the visitor-to-Cloudflare and the Cloudflare-to-origin hops, matching the target enforced by the `ssl-strict` check.
            4. If your origin does not yet have a valid certificate, set the mode to **Full** as an interim step while you install an origin certificate, then move to **Full (Strict)**.

            Avoid the **Flexible** mode. It leaves the Cloudflare-to-origin hop in plaintext, so an on-path attacker at the origin can read and modify traffic even though visitors see HTTPS. Cloudflare has deprecated Flexible for new zones.
        - id: cli
          desc: |
            To fix this on the command line using the Cloudflare API, set the `ssl` zone setting to `strict`, which corresponds to Full (Strict) mode. This is the target end state and matches the `ssl-strict` check.

            ```bash
            curl -X PATCH "https://api.cloudflare.com/client/v4/zones/<zone-id>/settings/ssl" \
              -H "Authorization: Bearer <api-token>" \
              -H "Content-Type: application/json" \
              --data '{"value":"strict"}'
            ```

            If your origin does not yet have a valid certificate, set `value` to `full` as an interim step while you install an origin certificate, then switch to `strict`. Do not use `flexible`: it leaves the Cloudflare-to-origin hop in plaintext and is deprecated by Cloudflare for new zones.
        - id: terraform
          desc: |
            To enable SSL/TLS encryption with Terraform, manage the zone's `ssl` setting with the `cloudflare_zone_setting` resource and set `value` to `strict`, which corresponds to Full (Strict) mode. This is the target end state and matches the `ssl-strict` check.

            ```hcl
            resource "cloudflare_zone_setting" "ssl" {
              zone_id    = var.zone_id
              setting_id = "ssl"
              value      = "strict"
            }
            ```

            If your origin does not yet have a valid certificate, set `value` to `full` as an interim step while you install an origin certificate, then switch to `strict`. Avoid `flexible`: it leaves the Cloudflare-to-origin hop in plaintext and is deprecated by Cloudflare for new zones.
    refs:
      - url: https://developers.cloudflare.com/ssl/origin-configuration/ssl-modes/
        title: Cloudflare SSL/TLS encryption modes
  - uid: mondoo-cloudflare-security-ssl-strict
    title: Ensure SSL/TLS encryption mode is Full (Strict)
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-2-ii-transmission-security-encryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    variants:
      - uid: mondoo-cloudflare-security-ssl-strict-cloudflare
        tags:
          mondoo.com/filter-title: Cloudflare Zone
          mondoo.com/filter-icon: cloudflare
      - uid: mondoo-cloudflare-security-ssl-strict-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-cloudflare-security-ssl-strict-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-cloudflare-security-ssl-strict-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that the Cloudflare zone's SSL/TLS encryption mode is set to Full (Strict), which requires a valid, trusted certificate on the origin server for all connections. Lower modes such as Flexible or Full leave part of the connection chain either unencrypted or unauthenticated, creating exploitable gaps even when the visitor-facing connection appears secure.

        **Why this matters**

        - **End-to-end certificate validation:** Full (Strict) is the only mode that verifies the origin certificate against a trusted authority, preventing origin-level impersonation.
        - **Flexible mode gap:** In Flexible mode, traffic between Cloudflare and the origin travels in plaintext, making the origin connection as vulnerable as if no encryption existed.
        - **Full mode gap:** Full mode encrypts the origin connection but accepts self-signed certificates, leaving the channel open to man-in-the-middle attacks at the origin hop.
        - **Architectural hygiene:** Requiring a valid origin certificate ensures the certificate lifecycle is actively managed, reducing the risk of undetected certificate expiry on the origin.

        **Risk mitigation**

        - **Origin impersonation prevention:** Certificate validation stops an attacker from substituting their own server at the origin without detection.
        - **Compliance alignment:** Full (Strict) satisfies the end-to-end encryption requirements that Flexible and Full mode alone do not meet.
      audit: |
        ### Audit via Dashboard

        1. Log in to the Cloudflare dashboard and select the zone.
        2. Navigate to **SSL/TLS** > **Overview**.
        3. Inspect the **Your SSL/TLS encryption mode** panel.

        A passing zone shows **Full (Strict)**. A failing zone shows any mode other than Full (Strict) (e.g., Off, Flexible, or Full).

        ### Audit via API

        1. Retrieve the `ssl` zone setting:

        ```bash
        curl -s -X GET "https://api.cloudflare.com/client/v4/zones/<zone-id>/settings/ssl" \
          -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN"
        ```

        A passing zone returns `"value": "strict"`. A failing zone returns any value other than `strict`, such as `off`, `flexible`, or `full`.
      remediation:
        - id: console
          desc: |
            To fix this in the Cloudflare dashboard:

            1. Log in and select the affected zone.
            2. Navigate to **SSL/TLS** > **Overview**.
            3. Set the encryption mode to "Full (Strict)".
            4. Ensure your origin server has a valid SSL certificate from a trusted CA or a Cloudflare Origin CA certificate.
            5. If using a self-signed certificate, replace it with a Cloudflare Origin CA certificate or a certificate from a public CA.
        - id: cli
          desc: |
            To fix this on the command line using the Cloudflare API, set the `ssl` zone setting to `strict`:

            ```bash
            curl -X PATCH "https://api.cloudflare.com/client/v4/zones/<zone-id>/settings/ssl" \
              -H "Authorization: Bearer <api-token>" \
              -H "Content-Type: application/json" \
              --data '{"value":"strict"}'
            ```
        - id: terraform
          desc: |
            To set the SSL/TLS encryption mode to Full (Strict) with Terraform, manage the zone's `ssl` setting with the `cloudflare_zone_setting` resource and set `value` to `strict`:

            ```hcl
            resource "cloudflare_zone_setting" "ssl" {
              zone_id    = var.zone_id
              setting_id = "ssl"
              value      = "strict"
            }
            ```
    refs:
      - url: https://developers.cloudflare.com/ssl/origin-configuration/ssl-modes/full-strict/
        title: Full (Strict) SSL/TLS encryption mode
  - uid: mondoo-cloudflare-security-always-use-https
    title: Ensure Always Use HTTPS is enabled
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-2-ii-transmission-security-encryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    variants:
      - uid: mondoo-cloudflare-security-always-use-https-cloudflare
        tags:
          mondoo.com/filter-title: Cloudflare Zone
          mondoo.com/filter-icon: cloudflare
      - uid: mondoo-cloudflare-security-always-use-https-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-cloudflare-security-always-use-https-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-cloudflare-security-always-use-https-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that the Cloudflare zone is configured to redirect all plaintext HTTP requests to HTTPS automatically. By default, Cloudflare zones do not redirect HTTP traffic unless this setting is explicitly enabled, meaning visitors who type a bare domain name or follow an HTTP bookmark reach the site over an unencrypted connection.

        **Why this matters**

        - **Encryption enforcement:** Automatic redirection ensures no visitor session begins over plaintext, regardless of how the user or client initiated the connection.
        - **Downgrade attack prevention:** Without forced HTTPS, on-path attackers can intercept the initial HTTP request before any redirect is served and keep the session in plaintext for its duration.
        - **Cookie and session protection:** Session cookies transmitted over HTTP can be read by any observer on the network; HTTPS redirection prevents that window from opening.
        - **Mixed-origin risk reduction:** Forcing HTTPS at the zone level is the foundation on which other HTTPS controls such as HSTS and HSTS preload operate effectively.

        **Risk mitigation**

        - **First-request interception:** Redirecting at the Cloudflare edge closes the window between the client's initial HTTP request and the server's redirect response, eliminating the data visible in that exchange.
        - **Browser security indicator:** HTTPS pages display the expected secure indicator; HTTP pages display warnings that erode user confidence and can deter legitimate traffic.
      audit: |
        ### Audit via Dashboard

        1. Log in to the Cloudflare dashboard and select the zone.
        2. Navigate to **SSL/TLS** > **Edge Certificates**.
        3. Locate the **Always Use HTTPS** toggle.

        A passing zone shows the toggle **On**. A failing zone shows the toggle **Off**.

        ### Audit via API

        1. Retrieve the `always_use_https` zone setting:

        ```bash
        curl -s -X GET "https://api.cloudflare.com/client/v4/zones/<zone-id>/settings/always_use_https" \
          -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN"
        ```

        A passing zone returns `"value": "on"`. A failing zone returns `"value": "off"`.
      remediation:
        - id: console
          desc: |
            To fix this in the Cloudflare dashboard:

            1. Log in and select the affected zone.
            2. Navigate to **SSL/TLS** > **Edge Certificates**.
            3. Enable the "Always Use HTTPS" toggle.
            4. Verify that your site loads correctly over HTTPS and there are no mixed-content issues.
        - id: cli
          desc: |
            To fix this on the command line using the Cloudflare API, enable the `always_use_https` zone setting:

            ```bash
            curl -X PATCH "https://api.cloudflare.com/client/v4/zones/<zone-id>/settings/always_use_https" \
              -H "Authorization: Bearer <api-token>" \
              -H "Content-Type: application/json" \
              --data '{"value":"on"}'
            ```
        - id: terraform
          desc: |
            To enable Always Use HTTPS with Terraform, manage the zone's `always_use_https` setting with the `cloudflare_zone_setting` resource and set `value` to `on`:

            ```hcl
            resource "cloudflare_zone_setting" "always_use_https" {
              zone_id    = var.zone_id
              setting_id = "always_use_https"
              value      = "on"
            }
            ```
    refs:
      - url: https://developers.cloudflare.com/ssl/edge-certificates/additional-options/always-use-https/
        title: Always Use HTTPS
  - uid: mondoo-cloudflare-security-min-tls-1-2
    title: Ensure minimum TLS version is 1.2 or higher
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-2-ii-transmission-security-encryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-cloudflare-security-min-tls-1-2-cloudflare
        tags:
          mondoo.com/filter-title: Cloudflare Zone
          mondoo.com/filter-icon: cloudflare
      - uid: mondoo-cloudflare-security-min-tls-1-2-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-cloudflare-security-min-tls-1-2-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-cloudflare-security-min-tls-1-2-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that the Cloudflare zone accepts no TLS connections below version 1.2. Cloudflare's default minimum allows TLS 1.0 and 1.1 for compatibility with older clients, but both versions contain well-documented cryptographic vulnerabilities that render connections negotiated with them untrustworthy.

        **Why this matters**

        - **Known protocol weaknesses:** TLS 1.0 and 1.1 are vulnerable to attacks such as BEAST, POODLE, and SWEET32 that allow an attacker to decrypt or tamper with encrypted traffic.
        - **Industry deprecation:** The IETF formally deprecated TLS 1.0 and 1.1 in RFC 8996, and major browsers, PCI DSS, and NIST all prohibit their use in environments handling sensitive data.
        - **Cipher suite hygiene:** TLS 1.0 and 1.1 support cipher suites that are no longer considered secure; raising the minimum version eliminates those suites from negotiation without requiring per-cipher configuration.
        - **Forward secrecy:** TLS 1.2 with modern cipher suites supports ephemeral key exchange, ensuring past sessions cannot be decrypted if a long-term key is later compromised.

        **Risk mitigation**

        - **Downgrade negotiation prevention:** Setting a floor of TLS 1.2 prevents clients and servers from negotiating a weaker version even if both sides claim to support it.
        - **Scope reduction:** Removing support for deprecated protocol versions reduces the attack surface an adversary can target during the TLS handshake.
      audit: |
        ### Audit via Dashboard

        1. Log in to the Cloudflare dashboard and select the zone.
        2. Navigate to **SSL/TLS** > **Edge Certificates**.
        3. Locate the **Minimum TLS Version** dropdown.

        A passing zone shows **TLS 1.2** or **TLS 1.3**. A failing zone shows **TLS 1.0** or **TLS 1.1**.

        ### Audit via API

        1. Retrieve the `min_tls_version` zone setting:

        ```bash
        curl -s -X GET "https://api.cloudflare.com/client/v4/zones/<zone-id>/settings/min_tls_version" \
          -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN"
        ```

        A passing zone returns `"value": "1.2"` or `"value": "1.3"`. A failing zone returns `"value": "1.0"` or `"value": "1.1"`.
      remediation:
        - id: console
          desc: |
            To fix this in the Cloudflare dashboard:

            1. Log in and select the affected zone.
            2. Navigate to **SSL/TLS** > **Edge Certificates**.
            3. Set the "Minimum TLS Version" to 1.2. Raise it to 1.3 if your audience supports it.
            4. TLS 1.2 client support is effectively universal today, so the compatibility impact of this change is minimal. To confirm before and after the change, review the TLS version breakdown in Cloudflare's SSL/TLS analytics under **Analytics & Logs** for the zone.
        - id: cli
          desc: |
            To fix this on the command line using the Cloudflare API, set the `min_tls_version` zone setting to `1.2`:

            ```bash
            curl -X PATCH "https://api.cloudflare.com/client/v4/zones/<zone-id>/settings/min_tls_version" \
              -H "Authorization: Bearer <api-token>" \
              -H "Content-Type: application/json" \
              --data '{"value":"1.2"}'
            ```
        - id: terraform
          desc: |
            To raise the minimum TLS version with Terraform, manage the zone's `min_tls_version` setting with the `cloudflare_zone_setting` resource and set `value` to `1.2` (or `1.3`):

            ```hcl
            resource "cloudflare_zone_setting" "min_tls_version" {
              zone_id    = var.zone_id
              setting_id = "min_tls_version"
              value      = "1.2"
            }
            ```
    refs:
      - url: https://developers.cloudflare.com/ssl/edge-certificates/additional-options/minimum-tls/
        title: Minimum TLS version
      - url: https://blog.pcisecuritystandards.org/are-you-ready-for-30-june-2018-sayin-goodbye-to-ssl-early-tls
        title: PCI DSS TLS requirements
