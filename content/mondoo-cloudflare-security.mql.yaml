        tags:
          mondoo.com/filter-title: Cloudflare Account
          mondoo.com/filter-icon: cloudflare
      - uid: mondoo-cloudflare-security-r2-buckets-not-public-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-cloudflare-security-r2-buckets-not-public-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-cloudflare-security-r2-buckets-not-public-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that no Cloudflare R2 bucket has the managed public access path enabled. When public access is turned on, every object in the bucket is reachable at an unauthenticated r2.dev URL with no access controls applied, making the bucket functionally equivalent to an open S3 bucket.

        **Why this matters**

        - **Unrestricted data exposure:** All objects in a publicly accessible R2 bucket are world-readable; buckets accumulate logs, backups, user uploads, and temporary data that were never intended for public distribution.
        - **Enumerable URL pattern:** The r2.dev URL scheme is predictable; once one object URL is known, other objects in the bucket can be discovered through filename guessing, search-engine indexing, or referrer header leakage.
        - **Development-to-production drift:** Public access is commonly enabled for a single asset during development and never disabled when the bucket is repurposed or promoted to production use.
        - **Missing access controls:** The managed r2.dev public path does not support rate limiting, audit logging, or signed URL patterns that are available when a Worker or custom domain fronts the bucket.

        **Risk mitigation**

        - **Accidental data exposure prevention:** Disabling the public access path ensures that objects stored in the bucket cannot be read by unauthenticated parties, regardless of what the bucket contains.
        - **Access control enforcement:** Routing public content through a Cloudflare Worker or custom domain enables authentication, rate limiting, and audit logging that the managed public access path cannot provide.
      audit: |
        ### Audit via Dashboard

        1. Log in to the Cloudflare dashboard and select the account.
        2. Navigate to **R2**.
        3. For each bucket, select the bucket, open **Settings** > **Public access**, and inspect the **r2.dev subdomain** row.

        A passing bucket shows **Access Disallowed** under r2.dev subdomain. A failing bucket shows **Access Allowed**.

        ### Audit via API

        1. List all R2 buckets for the account:

        ```bash
        curl -s -X GET "https://api.cloudflare.com/client/v4/accounts/<account-id>/r2/buckets" \
          -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN"
        ```

        2. For each bucket, retrieve its managed domain configuration:

        ```bash
        curl -s -X GET "https://api.cloudflare.com/client/v4/accounts/<account-id>/r2/buckets/<bucket-name>/domains/managed" \
          -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN"
        ```

        A passing bucket returns `"enabled": false`. A failing bucket returns `"enabled": true`.
      remediation:
        - id: console
          desc: |
            To disable the managed `r2.dev` public access path in the Cloudflare dashboard:

            1. Log in and select the affected account.
            2. Navigate to **R2** > select the bucket.
            3. Open **Settings** > **Public access**.
            4. Under **r2.dev subdomain**, click **Disallow Access**.
            5. If the bucket needs to remain internet-accessible, configure a custom domain with a Cloudflare Worker or signed URL pattern instead.
        - id: cli
          desc: |
            To disable the managed `r2.dev` public domain via the Cloudflare API:

            ```bash
            curl -X PUT "https://api.cloudflare.com/client/v4/accounts/<account-id>/r2/buckets/<bucket-name>/domains/managed" \
              -H "Authorization: Bearer <api-token>" \
              -H "Content-Type: application/json" \
              --data '{"enabled":false}'
            ```
        - id: terraform
          desc: |
            To disable the managed `r2.dev` public access path with Terraform, manage the bucket's managed domain with the `cloudflare_r2_managed_domain` resource and set `enabled` to `false`:

            ```hcl
            resource "cloudflare_r2_managed_domain" "example" {
              account_id  = var.account_id
              bucket_name = "example-bucket"
              enabled     = false
            }
            ```
    refs:
      - url: https://developers.cloudflare.com/r2/buckets/public-buckets/
        title: Cloudflare R2 public buckets
  - uid: mondoo-cloudflare-security-api-tokens-have-expiration
    title: Ensure API tokens have an expiration set
    impact: 75
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-10
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-5-17
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-5
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-6
      compliance/pci-dss-4: pcidss-requirement-8-6-3
      compliance/soc2-2017: soc2-control-cc6-1-9
      compliance/vda-isa-5: vda-isa-5-4-1-1
    variants:
      - uid: mondoo-cloudflare-security-api-tokens-have-expiration-cloudflare
        tags:
          mondoo.com/filter-title: Cloudflare Account
          mondoo.com/filter-icon: cloudflare
      - uid: mondoo-cloudflare-security-api-tokens-have-expiration-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-cloudflare-security-api-tokens-have-expiration-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-cloudflare-security-api-tokens-have-expiration-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that every active Cloudflare API token has an expiration date set. Tokens without an expiration remain valid indefinitely unless manually revoked, meaning that credentials leaked in configuration files, CI logs, or operator terminals retain their full access permissions forever without any automatic remediation.

        **Why this matters**

        - **Persistent credential exposure:** A non-expiring token that is leaked once remains a valid attack vector until it is discovered and manually revoked; detection and revocation are rarely prompt enough to prevent abuse.
        - **Scope accumulation:** Tokens are often issued for a specific task and then retained; over time, the token holder's role changes, but the token's permissions do not, leaving stale entitlements in place.
        - **Secrets sprawl:** Tokens that never expire appear in more places over time as they are copied into new automation, documentation, and secret stores, increasing the leak surface with each copy.
        - **Audit simplification:** Tokens with a known expiration have a defined lifecycle that can be tracked and reported; non-expiring tokens require continuous manual auditing to confirm they are still in authorized use.

        **Risk mitigation**

        - **Leaked credential lifetime cap:** An expiration date converts a leaked token from a permanent access grant into a time-limited one, bounding the damage from any single credential disclosure.
        - **Forced review cadence:** Expiration requires intentional renewal, creating a regular opportunity to verify that the token's scope is still appropriate for its current use.
      audit: |
        ### Audit via Dashboard

        1. Log in to the Cloudflare dashboard.
        2. Navigate to **My Profile** > **API Tokens**.
        3. For each active token, inspect the **Expiration** column.

        A passing token shows a specific expiration date in the **Expiration** column. A failing token shows **No Expiration** or a blank expiration field.

        ### Audit via API

        1. List all API tokens for the user:

        ```bash
        curl -s -X GET "https://api.cloudflare.com/client/v4/user/tokens" \
          -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN"
        ```

        A passing result shows every token with `"status": "active"` also has a non-null `"expires_on"` value. A failing result contains at least one active token where `"expires_on"` is `null` or absent.
      remediation:
        - id: console
          desc: |
            To set an expiration on an existing token in the Cloudflare dashboard:

            1. Log in and open **My Profile** > **API Tokens**.
            2. Identify tokens whose **Expiration** column shows no expiration.
            3. For each, choose **Edit**, scroll to the **TTL** section, and set a finite end date, typically one year out.
            4. Save the token. The token secret is unchanged, so consumers do not need to rotate.
        - id: cli
          desc: |
            The token update endpoint replaces the full token definition, so retrieve the current token, add `expires_on`, and send the complete object back. Compute the expiration relative to the current date so the example never produces an already-expired token. The literal you send must be a future RFC 3339 timestamp:

            ```bash
            EXPIRES_ON=$(date -u -d '+1 year' +%Y-%m-%dT%H:%M:%SZ)

            curl -s -X GET "https://api.cloudflare.com/client/v4/user/tokens/<token-id>" \
              -H "Authorization: Bearer <api-token>" \
              | jq --arg expires_on "$EXPIRES_ON" '.result | {name, policies, condition, status, expires_on: $expires_on}' \
              > token.json

            curl -X PUT "https://api.cloudflare.com/client/v4/user/tokens/<token-id>" \
              -H "Authorization: Bearer <api-token>" \
              -H "Content-Type: application/json" \
              --data @token.json
            ```

            On macOS or BSD, the equivalent date command is `date -u -v+1y +%Y-%m-%dT%H:%M:%SZ`.
        - id: terraform
          desc: |
            For tokens managed with the `cloudflare_api_token` resource, set the `expires_on` attribute to a finite timestamp so the token cannot remain valid indefinitely:

            ```hcl
            resource "cloudflare_api_token" "example" {
              name = "ci-deploy-token"

              policies = [{
                effect = "allow"
                permission_groups = [{
                  id = "1a71c399035b4950a1bd1466b1e4f420"
                }]
                resources = {
                  "com.cloudflare.api.account.0123456789abcdef0123456789abcdef" = "*"
                }
              }]

              expires_on = "2027-01-01T00:00:00Z"
            }
            ```
    refs:
      - url: https://developers.cloudflare.com/fundamentals/api/get-started/create-token/
        title: Cloudflare API Tokens
  - uid: mondoo-cloudflare-security-api-tokens-have-ip-allowlist
    title: Ensure API tokens have an IP allowlist configured
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-16
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-3
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-17
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-12
      compliance/pci-dss-4: pcidss-requirement-7-2-5
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-2-1
    variants:
      - uid: mondoo-cloudflare-security-api-tokens-have-ip-allowlist-cloudflare
        tags:
          mondoo.com/filter-title: Cloudflare Account
          mondoo.com/filter-icon: cloudflare
      - uid: mondoo-cloudflare-security-api-tokens-have-ip-allowlist-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-cloudflare-security-api-tokens-have-ip-allowlist-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-cloudflare-security-api-tokens-have-ip-allowlist-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that every active Cloudflare API token has an IP allowlist configured. An IP allowlist constrains which source addresses can authenticate with the token; requests from any address outside the configured CIDRs are rejected before the token's permissions are evaluated.

        **Why this matters**

        - **Leaked token usability reduction:** A token with an IP allowlist can only be used from the specified source ranges; an attacker who obtains the token from a different network cannot authenticate with it.
        - **Automation scope enforcement:** API tokens used by CI systems, Kubernetes operators, and other automation have predictable source IPs; binding the token to those ranges ensures it cannot be abused from unexpected locations.
        - **Defense-in-depth with expiration:** IP allowlisting and token expiration address different threat models; combining them ensures that a leaked token is constrained by both origin and time.
        - **Incident response signal:** Attempts to use a token from an address outside its allowlist generate authentication failures that can be detected and alerted on, providing early warning of credential theft.

        **Risk mitigation**

        - **Exfiltration prevention:** Tokens stolen from CI logs or configuration files cannot be replayed by attackers operating from arbitrary internet addresses when an IP allowlist is in place.
        - **Lateral movement containment:** An IP allowlist ensures that a compromised automation credential cannot be used from an attacker's staging environment, limiting the ability to pivot using stolen tokens.
      audit: |
        ### Audit via Dashboard

        1. Log in to the Cloudflare dashboard.
        2. Navigate to **My Profile** > **API Tokens**.
        3. Select each active token and expand its settings to inspect **Client IP Address Filtering**.

        A passing token shows at least one CIDR or IP address under **Is in** for Client IP Address Filtering. A failing token shows no IP address filtering configured.

        ### Audit via API

        1. List all API tokens for the user:

        ```bash
        curl -s -X GET "https://api.cloudflare.com/client/v4/user/tokens" \
          -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN"
        ```

        A passing result shows every active token with a non-empty `"condition": { "request_ip": { "in": [...] } }` array. A failing result contains at least one active token where `condition.request_ip.in` is absent, null, or an empty array.
      remediation:
        - id: console
          desc: |
            To add an IP allowlist to an existing token in the Cloudflare dashboard:

            1. Log in and open **My Profile** > **API Tokens**.
            2. Select the token to edit.
            3. Under **Client IP Address Filtering**, choose **Is in** and add the CIDRs from which the token should be usable, typically the calling system's egress NAT or VPN ranges.
            4. Save.
        - id: cli
          desc: |
            The token update endpoint replaces the full token definition, so retrieve the current token, add the `condition.request_ip.in` allowlist, and send the complete object back. The `in` array accepts CIDRs:

            ```bash
            curl -s -X GET "https://api.cloudflare.com/client/v4/user/tokens/<token-id>" \
              -H "Authorization: Bearer <api-token>" \
              | jq '.result | {name, policies, status, expires_on, condition: {request_ip: {in: ["198.51.100.0/24", "203.0.113.10/32"]}}}' \
              > token.json

            curl -X PUT "https://api.cloudflare.com/client/v4/user/tokens/<token-id>" \
              -H "Authorization: Bearer <api-token>" \
              -H "Content-Type: application/json" \
              --data @token.json
            ```
        - id: terraform
          desc: |
            For tokens managed with the `cloudflare_api_token` resource, populate the `condition.request_ip.in` list with the CIDRs from which the token should be usable:

            ```hcl
            resource "cloudflare_api_token" "example" {
              name = "ci-deploy-token"

              policies = [{
                effect = "allow"
                permission_groups = [{
                  id = "1a71c399035b4950a1bd1466b1e4f420"
                }]
                resources = {
                  "com.cloudflare.api.account.0123456789abcdef0123456789abcdef" = "*"
                }
              }]

              condition = {
                request_ip = {
                  in = ["198.51.100.0/24", "203.0.113.10/32"]
                }
              }
            }
            ```
    refs:
      - url: https://developers.cloudflare.com/fundamentals/api/how-to/secure-api-tokens-with-restrictive-permissions/
        title: Cloudflare API token IP filtering
  # No Terraform variants: the check inspects each accepted member's twoFactorAuthenticationEnabled flag, which is per-user account state managed by the underlying Cloudflare user — not configuration declared by cloudflare_account_member HCL.
  - uid: mondoo-cloudflare-security-members-have-two-factor
    filters: asset.platform == "cloudflare-account"
    title: Ensure every account member has two-factor authentication enabled
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-14
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-j
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-3
      compliance/pci-dss-4: pcidss-requirement-8-4-2
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-2
    mql: |
      cloudflare.account.members.where(status == "accepted").all(twoFactorAuthenticationEnabled)
    docs:
      desc: |
        This check ensures that every accepted member of the Cloudflare account has two-factor authentication enabled on their underlying Cloudflare user. The account-level **Enforce two-factor authentication** toggle prevents new sign-ins without 2FA, but it does not retroactively confirm that every existing member has actually configured a second factor on their personal account; sessions established before enforcement and accounts that bypass the toggle can remain single-factor.

        **Why this matters**

        - **Per-user gap behind the account toggle:** The account-level enforcement setting prevents future password-only sign-ins, but members who joined before enforcement or who held active sessions at the time of the change may still authenticate without a second factor. Verifying the per-user flag closes that gap.
        - **Credential compromise scope:** Each member with broad account permissions can modify DNS, SSL/TLS, WAF, and access policies for every zone. A single compromised password without a second factor allows an attacker the same blast radius as the member's role.
        - **Phishing and credential stuffing:** Reused or phished passwords are the most common entry point into cloud accounts. A second factor stops these attacks even after a password leak.
        - **Compliance evidence:** Frameworks that require MFA on privileged access expect proof that each individual identity carries the factor, not only that the account-level toggle is on.

        **Risk mitigation**

        - **Account takeover prevention:** Confirming that every accepted member has 2FA configured ensures that knowing a password is insufficient to gain account access, regardless of when the member joined.
        - **Drift detection:** Catches members who joined while enforcement was off, who disabled 2FA on their personal account, or who were invited under an account configuration that did not require it.
      audit: |
        ### Audit via Dashboard

        1. Log in to the Cloudflare dashboard and select the account.
        2. Navigate to **Manage Account** > **Members**.
        3. For each member with **Status: Active**, confirm the **Two-Factor Authentication** column shows **Enabled**.

        A passing account shows 2FA enabled for every active member. A failing account shows at least one active member with 2FA disabled.

        ### Audit via API

        1. List members for the account:

        ```bash
        curl -s -X GET "https://api.cloudflare.com/client/v4/accounts/<account-id>/members" \
          -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN"
        ```

        2. For each entry where `status` is `accepted`, confirm `user.two_factor_authentication_enabled` is `true`.

        A passing account returns `true` for every accepted member. A failing account returns `false` for at least one accepted member.
      remediation:
        - id: console
          desc: |
            To bring every member into compliance from the Cloudflare dashboard:

            1. Log in and select the account.
            2. Open the account members list under Manage Account. The exact menu path varies by dashboard version, so use the in-dashboard search for "members" if you cannot find it.
            3. Identify each active member whose **Two-Factor Authentication** column is **Disabled**.
            4. Contact each member and have them enable 2FA on their personal Cloudflare account under **My Profile** > **Authentication** by configuring a TOTP authenticator app or security key.
            5. With 2FA in place for every member, enable the account-level **Enforce two-factor authentication** toggle so new members must configure 2FA before joining. The authoritative control is the account `settings.enforce_twofactor` field, set via `PUT /accounts/{account_id}`; see the enforce-two-factor check for details.
        - id: cli
          desc: |
            The per-user 2FA enrollment cannot be performed by an account administrator through the API; each affected member must enroll on their own Cloudflare user account. After contacting affected members, verify their state with the members list endpoint:

            ```bash
            curl -s -X GET "https://api.cloudflare.com/client/v4/accounts/<account-id>/members" \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              | jq '.result[] | select(.status == "accepted" and .user.two_factor_authentication_enabled == false) | .user.email'
            ```

            Repeat until the query returns no email addresses. With every member compliant, set the account-level enforcement so future joiners cannot bypass the requirement:

            ```bash
            curl -X PUT "https://api.cloudflare.com/client/v4/accounts/<account-id>" \
              -H "Authorization: Bearer <api-token>" \
              -H "Content-Type: application/json" \
              --data '{"name":"<account-name>","settings":{"enforce_twofactor":true}}'
            ```
        # No Terraform remediation: per-user two-factor enrollment is owned by each Cloudflare user account, not by account-membership configuration. The cloudflare_account_member resource grants role membership but does not declare or enforce the underlying user's 2FA state, so there is no HCL change that can remediate this finding.
    refs:
      - url: https://developers.cloudflare.com/fundamentals/setup/account/account-security/2fa/
        title: Cloudflare two-factor authentication
      - url: https://developers.cloudflare.com/api/operations/account-members-list-members
        title: Cloudflare API - List account members
  # No Terraform variants: the check inspects each token's modifiedOn timestamp (when its secret was last rotated), which is runtime telemetry with no analog in cloudflare_api_token HCL — Terraform expresses desired token configuration, not the age of the current secret.
  - uid: mondoo-cloudflare-security-api-tokens-not-older-than-365-days
    filters: asset.platform == "cloudflare-account"
    title: Ensure active API tokens have been rotated within the last 365 days
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-12
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-5-17
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-5
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-6
      compliance/pci-dss-4: pcidss-requirement-8-6-3
      compliance/soc2-2017: soc2-control-cc6-1-9
      compliance/vda-isa-5: vda-isa-5-4-1-1
    mql: |
      cloudflare.apiTokens.where(status == "active").all(time.now - modifiedOn < 365 * time.day)
    docs:
      desc: |
        This check ensures that every active Cloudflare API token has been rotated within the last 365 days, measured against the token's modifiedOn timestamp. Tokens that have not been rotated for more than a year have typically been copied into multiple systems and pipelines, compounding the potential leak surface over time.

        **Why this matters**

        - **Accumulated exposure:** The longer a token's current secret is in service, the more places its plaintext value has been read, cached, or logged; a token issued two years ago has typically passed through pipelines and terminals that are no longer auditable.
        - **Role and scope drift:** Token holders change roles or leave the organization; a token issued for a specific project is often inherited by successors without a fresh review of whether the original scope is still appropriate.
        - **Log retention limits:** Security log retention windows rarely span the original issuance of a long-lived token, making it impossible to compare current usage against a historical baseline when investigating anomalous activity.
        - **Forcing function for hygiene:** Regular rotation requires consumers to update credentials on a defined cadence, reinforcing secrets management discipline and ensuring that token access is actively maintained rather than passively inherited.

        **Risk mitigation**

        - **Historic leak surface reduction:** Rotating a token invalidates every copy of the previous secret, rendering any credential that was silently leaked over the past year immediately useless.
        - **Ownership revalidation:** The rotation process requires the current token owner to actively claim the credential and review its permissions, catching scope drift and orphaned tokens before they become a persistent risk.
      audit: |
        ### Audit via Dashboard

        1. Log in to the Cloudflare dashboard.
        2. Navigate to **My Profile** > **API Tokens**.
        3. For each active token, inspect the **Last Modified** date.

        A passing token shows a **Last Modified** date within the past 365 days. A failing token shows a **Last Modified** date older than 365 days.

        ### Audit via API

        1. List all API tokens for the user:

        ```bash
        curl -s -X GET "https://api.cloudflare.com/client/v4/user/tokens" \
          -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN"
        ```

        A passing result shows every active token with a `"modified_on"` timestamp within the past 365 days. A failing result contains at least one active token where `"modified_on"` is older than 365 days from today.
      remediation:
        - id: console
          desc: |
            To rotate a long-lived token in the Cloudflare dashboard:

            1. Log in and open **My Profile** > **API Tokens**.
            2. Find tokens issued more than 365 days ago.
            3. For each, choose **Roll** to issue a fresh secret while preserving the token's policies.
            4. Update consumers with the new value, then revoke the prior version once they have rotated.
        - id: cli
          desc: |
            Roll the token's secret to a fresh value via the Cloudflare API. The roll operation invalidates the old secret immediately and returns a new one with the same policies, so coordinate the change with every consumer of the token. The endpoint requires an empty JSON string as the request body:

            ```bash
            curl -X PUT "https://api.cloudflare.com/client/v4/user/tokens/<token-id>/value" \
              -H "Authorization: Bearer <api-token>" \
              -H "Content-Type: application/json" \
              --data '""'
            ```
        # No Terraform remediation: rotating a token's secret is an imperative API operation (POST .../tokens/{id}/value) with no representation in cloudflare_api_token HCL — the resource declares token configuration, not a rotation action.
    refs:
      - url: https://developers.cloudflare.com/fundamentals/api/how-to/manage-api-tokens/
        title: Cloudflare API token management
  - uid: mondoo-cloudflare-security-ssl-not-off-cloudflare
    filters: |
      asset.platform == "cloudflare-zone"
    mql: |
      cloudflare.zone.settings.ssl != "off"
  - uid: mondoo-cloudflare-security-ssl-not-off-terraform-hcl
