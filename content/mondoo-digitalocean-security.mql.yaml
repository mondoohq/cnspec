  - uid: mondoo-digitalocean-security-spaces-key-has-scoped-grants
    title: Ensure Spaces access keys are scoped with bucket grants
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-5
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-2-1
    variants:
      - uid: mondoo-digitalocean-security-spaces-key-has-scoped-grants-digitalocean
        tags:
          mondoo.com/filter-title: DigitalOcean
          mondoo.com/filter-icon: digitalocean
      - uid: mondoo-digitalocean-security-spaces-key-has-scoped-grants-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-digitalocean-security-spaces-key-has-scoped-grants-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-digitalocean-security-spaces-key-has-scoped-grants-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that every Spaces access key has at least one bucket grant defined, scoping the key to specific buckets and operations. A key with no grants has unrestricted account-level access to every Spaces bucket in the account.

        **Why this matters**

        - **Blast radius minimization:** An unscoped Spaces key that leaks provides full read and write access to every bucket in the account; grant-scoped keys limit the damage to exactly the bucket and permissions the key was issued for.
        - **Least-privilege enforcement:** Each application or service that accesses Spaces should hold a key restricted to only the buckets and operations it requires, not an account-wide credential.
        - **Credential compromise containment:** A scoped key accidentally committed to source control, logged by an application, or embedded in a binary exposes only the designated bucket, not the entire object storage environment.

        **Risk mitigation**

        - **Exfiltration scope limitation:** An attacker who obtains a scoped key can access only the granted buckets and operations, preventing full account data exfiltration through a single credential.
        - **Audit and rotation granularity:** Scoped keys can be individually rotated or revoked for a specific integration without disrupting other services, enabling precise incident response.
      audit: |
        ### Audit via Console

        1. Sign in to the DigitalOcean [Cloud Control Panel](https://cloud.digitalocean.com/).
        2. Navigate to **API** > **Spaces Keys**.
        3. Review each access key and check whether it has bucket grants listed under its permissions.

        A passing Spaces key shows one or more bucket-level grants. A failing Spaces key shows no grants, indicating full account-level access to all buckets.

        ### Audit via CLI

        1. List all Spaces keys and inspect their grants:

        ```bash
        doctl spaces keys list
        ```

        A passing key returns one or more entries in its `Grants` field. A failing key returns an empty `Grants` field.
      remediation:
        - id: console
          desc: |
            To fix this in the DigitalOcean Cloud Control Panel:

            1. Navigate to **API** > **Spaces Keys**.
            2. Create a replacement key with specific bucket grants, for example read-only access to a single bucket.
            3. Update every application that used the unscoped key to use the new scoped key.
            4. Delete the unscoped key.
        - id: cli
          desc: |
            To fix this on the command line using the `doctl` CLI, create a scoped replacement key first:

            ```bash
            doctl spaces keys create "<new-name>" \
              --grants "bucket=<bucket-name>;permission=read"
            ```

            Update every application that used the unscoped key, then delete it by its access key ID:

            ```bash
            doctl spaces keys delete "<old-access-key-id>"
            ```
        - id: terraform
          desc: |
            To scope a Spaces access key in Terraform, declare one or more `grant` blocks on the `digitalocean_spaces_key` resource, each naming a specific bucket and permission:

            ```hcl
            resource "digitalocean_spaces_key" "example" {
              name = "example-key"

              grant {
                bucket     = "example-bucket"
                permission = "read"
              }
            }
            ```
    refs:
      - url: https://docs.digitalocean.com/products/spaces/how-to/manage-access/
        title: Manage Spaces access keys and grants

  - uid: mondoo-digitalocean-security-spaces-key-has-scoped-grants-digitalocean
    filters: asset.platform == "digitalocean"
    mql: |
      digitalocean.spacesKeys.all(grants != empty)
  - uid: mondoo-digitalocean-security-spaces-key-has-scoped-grants-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "digitalocean_spaces_key")
    mql: |
      terraform.resources("digitalocean_spaces_key").all(blocks.where(type == "grant") != empty)
  - uid: mondoo-digitalocean-security-spaces-key-has-scoped-grants-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "digitalocean_spaces_key")
    mql: |
      terraform.plan.resourceChanges.where(type == "digitalocean_spaces_key").all(change.after["grant"] != empty)
  - uid: mondoo-digitalocean-security-spaces-key-has-scoped-grants-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "digitalocean_spaces_key")
    mql: |
      terraform.state.resources.where(type == "digitalocean_spaces_key").all(values["grant"] != empty)

  - uid: mondoo-digitalocean-security-spaces-bucket-not-publicly-readable
    title: Ensure Spaces buckets do not grant anonymous read access
    impact: 100
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-2-1
    variants:
      - uid: mondoo-digitalocean-security-spaces-bucket-not-publicly-readable-digitalocean
        tags:
          mondoo.com/filter-title: DigitalOcean
          mondoo.com/filter-icon: digitalocean
      - uid: mondoo-digitalocean-security-spaces-bucket-not-publicly-readable-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-digitalocean-security-spaces-bucket-not-publicly-readable-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-digitalocean-security-spaces-bucket-not-publicly-readable-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that no Spaces bucket grants the `READ` permission to the `AllUsers` group, which would make every object in the bucket readable by anyone on the internet without authentication. DigitalOcean Spaces is S3-compatible, so the same `public-read` ACL semantics as Amazon S3 apply: a single grant turns the bucket into an open object store.

        **Why this matters**

        - **Unauthenticated exposure:** A `public-read` bucket allows any client to enumerate object keys and download contents over the predictable `https://<bucket>.<region>.digitaloceanspaces.com/` URL pattern, requiring no DigitalOcean account or credentials.
        - **Accidental data leak:** Buckets created for development or one-off asset hosting commonly inherit `public-read` and accumulate logs, backups, customer uploads, or build artifacts that were never reviewed for public release.
        - **Compliance breach:** Frameworks that govern customer data, PII, or cardholder data prohibit storage in world-readable locations; a single `public-read` Spaces bucket creates an audit finding regardless of bucket contents.
        - **Crawler and indexing exposure:** Search engines and security scanners actively index publicly readable Spaces buckets, increasing the speed at which leaked content is discovered and reused.

        **Risk mitigation**

        - **Authenticated access only:** Removing the anonymous `READ` grant forces every retrieval through Spaces access keys or pre-signed URLs, restoring auditability and access control.
        - **CDN-fronted distribution:** When content genuinely needs to be public, serving it through a DigitalOcean CDN endpoint or a custom signed-URL pattern provides rate limiting, access logs, and revocation that the raw bucket URL cannot.
      audit: |
        ### Audit via Console

        1. Sign in to the DigitalOcean [Cloud Control Panel](https://cloud.digitalocean.com/).
        2. Navigate to **Spaces Object Storage** and open each bucket.
        3. On the **Settings** tab, inspect the **File Listing** section.

        A passing bucket shows **Restricted (Signed URLs only)**. A failing bucket shows **Enabled (Public)** or any indication that listing is allowed without authentication.

        ### Audit via CLI

        1. List the buckets and use `s3cmd` or the AWS CLI against the Spaces endpoint to inspect each bucket's ACL:

        ```bash
        doctl spaces buckets list
        AWS_ACCESS_KEY_ID=<spaces-key> AWS_SECRET_ACCESS_KEY=<spaces-secret> \
          aws s3api get-bucket-acl --bucket <bucket> \
            --endpoint-url https://<region>.digitaloceanspaces.com
        ```

        A passing bucket returns grants only to the bucket owner. A failing bucket returns a grant where `Grantee.URI` is `http://acs.amazonaws.com/groups/global/AllUsers` and `Permission` is `READ` or `FULL_CONTROL`.
      remediation:
        - id: console
          desc: |
            This finding is about the bucket's `public-read` ACL, which is a different control from the **File Listing** toggle in the Cloud Control Panel. The File Listing setting only governs anonymous directory browsing; it does not remove a `public-read` ACL grant, so objects can still be downloaded by anyone even after File Listing is restricted. The ACL is changed through the S3-compatible API or `s3cmd`, not the panel.

            To remove anonymous read access:

            1. Set the bucket ACL to private using `s3cmd setacl s3://<bucket> --acl-private` or the equivalent `aws s3api put-bucket-acl --acl private` call shown in the CLI remediation. This is the change that clears the finding.
            2. Reset any individual objects that carry their own public ACLs to private, since a private bucket ACL does not override per-object grants.
            3. In the Cloud Control Panel, navigate to **Spaces Object Storage**, open the bucket, and on the **Settings** tab set **File Listing** to **Restricted (Signed URLs only)** as defense in depth.
            4. If the bucket must serve public content, route requests through a DigitalOcean CDN endpoint or a pattern that enforces auth or rate limits.
        - id: cli
          desc: |
            DigitalOcean Spaces is S3-compatible, so you manage its ACLs with the AWS CLI or `s3cmd` pointed at the Spaces endpoint rather than with `doctl`. The `<spaces-key>` and `<spaces-secret>` are a Spaces access key pair generated on the **Spaces Keys** page in the API section of the control panel; they are not the DigitalOcean API token. Install the AWS CLI first, and set `<region>` to the Spaces region slug such as `nyc3`.

            To remove anonymous read access using the S3-compatible API:

            ```bash
            AWS_ACCESS_KEY_ID=<spaces-key> AWS_SECRET_ACCESS_KEY=<spaces-secret> \
              aws s3api put-bucket-acl --bucket <bucket> --acl private \
                --endpoint-url https://<region>.digitaloceanspaces.com
            ```

            For per-object public ACLs left over from previous configuration, iterate and reset:

            ```bash
            AWS_ACCESS_KEY_ID=<spaces-key> AWS_SECRET_ACCESS_KEY=<spaces-secret> \
              aws s3 ls s3://<bucket> --recursive --endpoint-url https://<region>.digitaloceanspaces.com \
              | awk '{print $4}' \
              | xargs -I{} aws s3api put-object-acl --bucket <bucket> --key {} --acl private \
                  --endpoint-url https://<region>.digitaloceanspaces.com
            ```
        - id: terraform
          desc: |
            To declare the bucket as private with Terraform, set `acl = "private"` on `digitalocean_spaces_bucket` (the default) and avoid any `digitalocean_spaces_bucket_policy` or `_acl` resource that grants `AllUsers` read:

            ```hcl
            resource "digitalocean_spaces_bucket" "example" {
              name   = "example-bucket"
              region = "nyc3"
              acl    = "private"
            }
            ```
    refs:
      - url: https://docs.digitalocean.com/products/spaces/how-to/manage-access/
        title: Manage Spaces bucket access
      - url: https://docs.digitalocean.com/products/spaces/reference/s3-compatibility/
        title: Spaces S3 compatibility reference

  - uid: mondoo-digitalocean-security-spaces-bucket-not-publicly-readable-digitalocean
    filters: asset.platform == "digitalocean-spaces-bucket"
    mql: |
      digitalocean.spacesBucket.publicReadAcl == false
  - uid: mondoo-digitalocean-security-spaces-bucket-not-publicly-readable-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "digitalocean_spaces_bucket")
    mql: |
      terraform.resources("digitalocean_spaces_bucket").all(arguments.acl.notIn(["public-read", "public-read-write"]))
  - uid: mondoo-digitalocean-security-spaces-bucket-not-publicly-readable-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "digitalocean_spaces_bucket")
    mql: |
      terraform.plan.resourceChanges.where(type == "digitalocean_spaces_bucket").all(change.after.acl.notIn(["public-read", "public-read-write"]))
  - uid: mondoo-digitalocean-security-spaces-bucket-not-publicly-readable-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "digitalocean_spaces_bucket")
    mql: |
      terraform.state.resources.where(type == "digitalocean_spaces_bucket").all(values.acl.notIn(["public-read", "public-read-write"]))

  # No Terraform variants: the DigitalOcean Terraform provider's `digitalocean_spaces_bucket.acl` argument exposes only `"private"` and `"public-read"` — the S3-compatible `public-read-write` ACL must be applied through the runtime S3 API, so there is no HCL surface to inspect for it. The runtime variant catches buckets where it was set out of band.
  - uid: mondoo-digitalocean-security-spaces-bucket-not-publicly-writable
    filters: asset.platform == "digitalocean-spaces-bucket"
    title: Ensure Spaces buckets do not grant anonymous write access
    impact: 100
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-2-1
    mql: |
      digitalocean.spacesBucket.publicWriteAcl == false
    docs:
      desc: |
        This check ensures that no Spaces bucket grants the `WRITE` permission to the `AllUsers` group. An anonymously writable bucket lets any unauthenticated caller upload, overwrite, or delete objects, turning the bucket into a free hosting and laundering point for malicious payloads.

        **Why this matters**

        - **Malicious content hosting:** Writable buckets are routinely abused to stage phishing pages, malware downloads, and command-and-control payloads under a legitimate-looking domain that customers and security tools may trust.
        - **Object replacement and tampering:** An attacker who can write the bucket can overwrite legitimate assets (configuration files, JavaScript bundles, signed artifacts) and serve modified versions to every consumer.
        - **Billing and quota abuse:** Anonymous writes accumulate uncontrolled storage and bandwidth charges that are billed to the bucket owner; high-volume abuse can also push the account against service quotas.
        - **No legitimate use case:** Unlike `public-read`, which has legitimate static-hosting patterns, `public-read-write` essentially has no defensible reason to exist on a production bucket; its presence is almost always a misconfiguration.

        **Risk mitigation**

        - **Authenticated writes only:** Removing the anonymous `WRITE` grant forces every upload through Spaces access keys or pre-signed URLs, restoring accountability.
        - **Per-object policies:** When third parties must upload content, gate the workflow through short-lived pre-signed PUT URLs issued by application code instead of a permanently writable bucket.
      audit: |
        ### Audit via Console

        1. Sign in to the DigitalOcean [Cloud Control Panel](https://cloud.digitalocean.com/).
        2. Open the affected bucket under **Spaces Object Storage**.
        3. Inspect the **Settings** tab and review any bucket policy attached to the bucket for a statement granting `s3:PutObject` to `Principal: "*"`.

        A passing bucket has no bucket policy or no policy statement granting write to anonymous callers. A failing bucket grants `s3:PutObject` (or equivalent) to `*`.

        ### Audit via CLI

        1. Retrieve the bucket ACL and policy with the S3-compatible API:

        ```bash
        AWS_ACCESS_KEY_ID=<spaces-key> AWS_SECRET_ACCESS_KEY=<spaces-secret> \
          aws s3api get-bucket-acl --bucket <bucket> \
            --endpoint-url https://<region>.digitaloceanspaces.com
        ```

        A passing bucket returns no grant with `Grantee.URI = http://acs.amazonaws.com/groups/global/AllUsers` and `Permission` in (`WRITE`, `WRITE_ACP`, `FULL_CONTROL`). A failing bucket returns at least one such grant.
      remediation:
        - id: console
          desc: |
            To remove anonymous write access from the Cloud Control Panel:

            1. Open the bucket under **Spaces Object Storage**.
            2. Inspect the **Settings** tab for any bucket policy and remove statements that grant `s3:PutObject`, `s3:DeleteObject`, or `s3:*` to `Principal: "*"`.
            3. If the bucket genuinely needs third-party uploads, replace the anonymous policy with a workflow that issues pre-signed `PUT` URLs from application code.
        - id: cli
          desc: |
            To remove anonymous write access using the S3-compatible API:

            ```bash
            AWS_ACCESS_KEY_ID=<spaces-key> AWS_SECRET_ACCESS_KEY=<spaces-secret> \
              aws s3api put-bucket-acl --bucket <bucket> --acl private \
                --endpoint-url https://<region>.digitaloceanspaces.com
            ```

            If a bucket policy grants writes to `*`, delete it:

            ```bash
            AWS_ACCESS_KEY_ID=<spaces-key> AWS_SECRET_ACCESS_KEY=<spaces-secret> \
              aws s3api delete-bucket-policy --bucket <bucket> \
                --endpoint-url https://<region>.digitaloceanspaces.com
            ```
        # No Terraform remediation: the DigitalOcean Terraform provider's `digitalocean_spaces_bucket.acl` argument accepts only `"private"` and `"public-read"`. Anonymous writes are configured through the runtime S3 API (`PutBucketPolicy` granting `s3:PutObject` to `Principal: "*"`), which has no Terraform analog.
    refs:
      - url: https://docs.digitalocean.com/products/spaces/how-to/manage-access/
        title: Manage Spaces bucket access

  # No Terraform variants: the DigitalOcean Terraform provider's `digitalocean_spaces_bucket` resource does not expose server-side encryption configuration. SSE is configured through the runtime S3-compatible `PutBucketEncryption` call, which Terraform does not currently model.
  - uid: mondoo-digitalocean-security-spaces-bucket-encryption-enabled
    filters: asset.platform == "digitalocean-spaces-bucket"
    title: Ensure Spaces buckets have server-side encryption enabled
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    mql: |
      digitalocean.spacesBucket.encryptionEnabled
    docs:
      desc: |
        This check ensures that every Spaces bucket has a default server-side encryption configuration set. When default encryption is configured, every object written to the bucket is encrypted at rest by the platform, removing the need for clients to remember to apply per-request encryption.

        **Why this matters**

        - **Encryption-at-rest guarantee:** Without a default encryption configuration, individual `PutObject` callers can write unencrypted objects whenever they forget the per-request encryption header, leaving sensitive data on disk in plaintext.
        - **Defense in depth:** Bucket-level default encryption is the last line of defense if access controls fail and an attacker gains read access to underlying storage media or backups.
        - **Audit and compliance evidence:** Frameworks that mandate encryption at rest expect a single platform-enforced control rather than a per-call discipline that depends on developer behavior.
        - **Lifecycle and replication safety:** Objects produced by lifecycle transitions, replication, and multipart uploads inherit the bucket default; without a configured default these derived objects also land unencrypted.

        **Risk mitigation**

        - **Plaintext-on-disk prevention:** A bucket with default encryption configured encrypts every new object server-side, so a future media exposure does not equal a content exposure.
        - **Operational simplicity:** Centralising the encryption decision at the bucket removes the per-call configuration burden from every client SDK and CI pipeline.
      audit: |
        ### Audit via Console

        1. Sign in to the DigitalOcean [Cloud Control Panel](https://cloud.digitalocean.com/).
        2. Open the affected bucket under **Spaces Object Storage**.
        3. Inspect the **Settings** tab for the **Default Encryption** section.

        A passing bucket shows **AES-256** (or a configured KMS algorithm). A failing bucket shows **Not configured**.

        ### Audit via CLI

        1. Use the S3-compatible API to query the bucket's encryption configuration:

        ```bash
        AWS_ACCESS_KEY_ID=<spaces-key> AWS_SECRET_ACCESS_KEY=<spaces-secret> \
          aws s3api get-bucket-encryption --bucket <bucket> \
            --endpoint-url https://<region>.digitaloceanspaces.com
        ```

        A passing bucket returns a `ServerSideEncryptionConfiguration` document. A failing bucket returns `ServerSideEncryptionConfigurationNotFoundError`.
      remediation:
        - id: console
          desc: |
            Spaces does not expose default-encryption configuration in the Cloud Control Panel for every region. Apply the configuration with the CLI or S3-compatible API instead; see the CLI remediation below.
        - id: cli
          desc: |
            Spaces is S3-compatible, so use the AWS CLI pointed at the Spaces endpoint. The `<spaces-key>` and `<spaces-secret>` come from the **Spaces Keys** page in the API section of the control panel, not the DigitalOcean API token, and `<region>` is the Spaces region slug such as `nyc3`.

            Apply a bucket-level default encryption configuration with the S3-compatible API:

            ```bash
            AWS_ACCESS_KEY_ID=<spaces-key> AWS_SECRET_ACCESS_KEY=<spaces-secret> \
              aws s3api put-bucket-encryption \
                --bucket <bucket> \
                --endpoint-url https://<region>.digitaloceanspaces.com \
                --server-side-encryption-configuration '{
                  "Rules": [{
                    "ApplyServerSideEncryptionByDefault": { "SSEAlgorithm": "AES256" }
                  }]
                }'
            ```

            Re-encrypt existing objects so they pick up the new default:

            ```bash
            AWS_ACCESS_KEY_ID=<spaces-key> AWS_SECRET_ACCESS_KEY=<spaces-secret> \
              aws s3 cp s3://<bucket>/ s3://<bucket>/ \
                --recursive --sse AES256 \
                --endpoint-url https://<region>.digitaloceanspaces.com
            ```
        # No Terraform remediation: the digitalocean_spaces_bucket resource has no server_side_encryption_configuration argument; Spaces SSE must be applied at runtime via the S3-compatible PutBucketEncryption call.
    refs:
      - url: https://docs.digitalocean.com/products/spaces/reference/s3-compatibility/
        title: Spaces S3 compatibility reference

  # No Terraform variants: the DigitalOcean Terraform provider's digitalocean_spaces_bucket
  # resource exposes only the acl argument ("private"/"public-read") and models no
  # public-access-block configuration. The block-public-acls/block-public-policy/
  # ignore-public-acls/restrict-public-buckets settings are applied through the runtime
  # S3-compatible PutPublicAccessBlock call, so there is no HCL surface to inspect.
  - uid: mondoo-digitalocean-security-spaces-bucket-public-access-blocked
    filters: asset.platform == "digitalocean-spaces-bucket"
    title: Ensure Spaces buckets enable the Public Access Block
    impact: 95
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-2-1
    mql: |
      digitalocean.spacesBucket.publicAccessBlocked
    docs:
      desc: |
        This check ensures that every Spaces bucket has the Public Access Block fully enabled, so that no ACL or bucket policy can grant public access regardless of how it is written. The Public Access Block is a bucket-level guardrail that blocks public ACLs, blocks public bucket policies, ignores any public ACLs already present, and restricts public bucket policies. By default a bucket has no Public Access Block, so a single misconfigured ACL or policy can expose its contents to the entire internet.

        **Why this matters**

        - **Defense against accidental exposure:** The Public Access Block overrides any public grant, so a developer mistake in an ACL or policy cannot silently make objects world-readable or world-writable.
        - **Single enforceable guardrail:** Rather than auditing every ACL and policy for public principals, one bucket-level control makes public access structurally impossible.
        - **Protection from policy drift:** Automation, third-party tools, or console changes can reintroduce a public grant over time; the Public Access Block neutralizes them all until it is explicitly removed.
        - **Data breach prevention:** Publicly readable object storage is one of the most common sources of large-scale data leaks, and a writable bucket lets attackers stage malware or ransom the contents.

        **Risk mitigation**

        - **Exposure containment:** With the Public Access Block enabled, an errant public ACL or policy has no effect, so the bucket's contents remain private even under misconfiguration.
        - **Reduced audit burden:** A single passing guardrail replaces per-object and per-policy review, shrinking the surface an auditor must continuously verify.
      audit: |
        ### Audit via Console

        1. Sign in to the DigitalOcean [Cloud Control Panel](https://cloud.digitalocean.com/).
        2. Open the affected bucket under **Spaces Object Storage** and review the **Settings** tab for any public access indicators on the ACL and policy sections.
        3. Because the Cloud Control Panel does not surface the Public Access Block state directly, confirm the configuration with the S3-compatible API in the CLI step below.

        A passing bucket has all four block settings enabled. A failing bucket has one or more of them disabled or no configuration at all.

        ### Audit via CLI

        1. Spaces is S3-compatible, so use the AWS CLI pointed at the Spaces endpoint to read the bucket's Public Access Block:

        ```bash
        AWS_ACCESS_KEY_ID=<spaces-key> AWS_SECRET_ACCESS_KEY=<spaces-secret> \
          aws s3api get-public-access-block --bucket <bucket> \
            --endpoint-url https://<region>.digitaloceanspaces.com
        ```

        A passing bucket returns a `PublicAccessBlockConfiguration` with `BlockPublicAcls`, `BlockPublicPolicy`, `IgnorePublicAcls`, and `RestrictPublicBuckets` all `true`. A failing bucket returns `NoSuchPublicAccessBlockConfiguration` or a configuration with any of these set to `false`.
      remediation:
        - id: console
          desc: |
            The Cloud Control Panel does not expose the Public Access Block for every region. Apply the configuration with the CLI or S3-compatible API instead; see the CLI remediation below.
        - id: cli
          desc: |
            Spaces is S3-compatible, so use the AWS CLI pointed at the Spaces endpoint. The `<spaces-key>` and `<spaces-secret>` come from the **Spaces Keys** page in the API section of the control panel, not the DigitalOcean API token, and `<region>` is the Spaces region slug such as `nyc3`.

            Enable all four Public Access Block settings on the bucket:

            ```bash
            AWS_ACCESS_KEY_ID=<spaces-key> AWS_SECRET_ACCESS_KEY=<spaces-secret> \
              aws s3api put-public-access-block \
                --bucket <bucket> \
                --endpoint-url https://<region>.digitaloceanspaces.com \
                --public-access-block-configuration \
                  BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true
            ```

            Confirm the guardrail is in place:

            ```bash
            AWS_ACCESS_KEY_ID=<spaces-key> AWS_SECRET_ACCESS_KEY=<spaces-secret> \
              aws s3api get-public-access-block --bucket <bucket> \
                --endpoint-url https://<region>.digitaloceanspaces.com
            ```
        # No Terraform remediation: the digitalocean_spaces_bucket resource has no public-access-block argument; the block-public-acls/block-public-policy/ignore-public-acls/restrict-public-buckets guardrail must be applied at runtime via the S3-compatible PutPublicAccessBlock call.
    refs:
      - url: https://docs.digitalocean.com/products/spaces/reference/s3-compatibility/
        title: Spaces S3 compatibility reference

  - uid: mondoo-digitalocean-security-spaces-bucket-versioning-enabled
    title: Ensure Spaces buckets have object versioning enabled
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-bcr-08
      compliance/dora: dora-art-12
      compliance/hipaa: hipaa-security-ss164-308-a-7-ii-a-contingency-plan-data-backup-plan
      compliance/iso-27001-2022: iso-27001-2022-a-8-13
      compliance/nis-2: nis-2-21-2-c
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cp-9
      compliance/nist-sp-800-171: false
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc9-1-1
      compliance/vda-isa-5: vda-isa-5-3-1-2
    variants:
      - uid: mondoo-digitalocean-security-spaces-bucket-versioning-enabled-digitalocean
        tags:
          mondoo.com/filter-title: DigitalOcean
          mondoo.com/filter-icon: digitalocean
      - uid: mondoo-digitalocean-security-spaces-bucket-versioning-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-digitalocean-security-spaces-bucket-versioning-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-digitalocean-security-spaces-bucket-versioning-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that every Spaces bucket has object versioning enabled. Versioning preserves every revision of an object — including deletions, which become delete markers — so that accidental overwrites or ransomware-style mass deletes can be reversed by reading the prior version.

        **Why this matters**

        - **Accidental overwrite recovery:** A misconfigured deployment that pushes an empty file to the wrong key still leaves the previous version recoverable, turning what would be a data-loss incident into a roll-back.
        - **Ransomware containment:** Attackers who obtain Spaces credentials and re-encrypt the contents of a bucket cannot remove the prior versions with a simple `DELETE`; versioned buckets force them to also issue per-version deletes, slowing exfiltration and increasing forensic evidence.
        - **Auditability of changes:** Versioning provides a tamper-resistant record of every change to an object, which downstream compliance evidence and incident response rely on.
        - **Replication and lifecycle dependencies:** Cross-region replication and certain lifecycle transitions on S3-compatible storage require versioning to be enabled; turning it on early avoids re-architecting later.

        **Risk mitigation**

        - **Data-loss recovery:** Enabling versioning means that single-object recovery is a `GET` of the prior version rather than a restore from external backups.
        - **Defense against credential abuse:** A leaked write-capable key cannot quietly empty the bucket; the operator can roll forward to the prior versions while the credential is rotated.
      audit: |
        ### Audit via Console

        1. Sign in to the DigitalOcean [Cloud Control Panel](https://cloud.digitalocean.com/).
        2. Open the affected bucket under **Spaces Object Storage**.
        3. Inspect the **Settings** tab for the **Versioning** section.

        A passing bucket shows **Enabled**. A failing bucket shows **Disabled** or **Suspended**.

        ### Audit via CLI

        1. Query the bucket's versioning state via the S3-compatible API:

        ```bash
        AWS_ACCESS_KEY_ID=<spaces-key> AWS_SECRET_ACCESS_KEY=<spaces-secret> \
          aws s3api get-bucket-versioning --bucket <bucket> \
            --endpoint-url https://<region>.digitaloceanspaces.com
        ```

        A passing bucket returns `"Status": "Enabled"`. A failing bucket returns no status, `"Suspended"`, or an empty response.
      remediation:
        - id: console
          desc: |
            To enable versioning from the Cloud Control Panel:

            1. Open the bucket under **Spaces Object Storage**.
            2. Open the **Settings** tab.
            3. Under **Versioning**, switch the setting to **Enabled**.
            4. Pair versioning with a lifecycle rule that expires noncurrent versions after a defined retention window so the bucket does not grow unbounded.
        - id: cli
          desc: |
            Spaces is S3-compatible, so use the AWS CLI pointed at the Spaces endpoint. The `<spaces-key>` and `<spaces-secret>` come from the **Spaces Keys** page in the API section of the control panel, not the DigitalOcean API token, and `<region>` is the Spaces region slug such as `nyc3`.

            To enable versioning using the S3-compatible API:

            ```bash
            AWS_ACCESS_KEY_ID=<spaces-key> AWS_SECRET_ACCESS_KEY=<spaces-secret> \
              aws s3api put-bucket-versioning --bucket <bucket> \
                --versioning-configuration Status=Enabled \
                --endpoint-url https://<region>.digitaloceanspaces.com
            ```

            Verify the new state:

            ```bash
            AWS_ACCESS_KEY_ID=<spaces-key> AWS_SECRET_ACCESS_KEY=<spaces-secret> \
              aws s3api get-bucket-versioning --bucket <bucket> \
                --endpoint-url https://<region>.digitaloceanspaces.com
            ```
        - id: terraform
          desc: |
            To enable versioning with Terraform, declare a `versioning` block on `digitalocean_spaces_bucket` with `enabled = true`:

            ```hcl
            resource "digitalocean_spaces_bucket" "example" {
              name   = "example-bucket"
              region = "nyc3"
              acl    = "private"

              versioning {
                enabled = true
              }
            }
            ```
    refs:
      - url: https://docs.digitalocean.com/products/spaces/how-to/enable-versioning/
        title: Enable Spaces bucket versioning
      - url: https://docs.digitalocean.com/products/spaces/reference/s3-compatibility/
        title: Spaces S3 compatibility reference

  - uid: mondoo-digitalocean-security-spaces-bucket-versioning-enabled-digitalocean
    filters: asset.platform == "digitalocean-spaces-bucket"
    mql: |
      digitalocean.spacesBucket.versioningStatus == "Enabled"
  - uid: mondoo-digitalocean-security-spaces-bucket-versioning-enabled-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "digitalocean_spaces_bucket")
    mql: |
      terraform.resources("digitalocean_spaces_bucket").all(blocks.where(type == "versioning").any(arguments.enabled == true))
  - uid: mondoo-digitalocean-security-spaces-bucket-versioning-enabled-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "digitalocean_spaces_bucket")
    mql: |
      terraform.plan.resourceChanges.where(type == "digitalocean_spaces_bucket").all(change.after["versioning"] != null && change.after["versioning"].any(_["enabled"] == true))
  - uid: mondoo-digitalocean-security-spaces-bucket-versioning-enabled-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "digitalocean_spaces_bucket")
    mql: |
      terraform.state.resources.where(type == "digitalocean_spaces_bucket").all(values["versioning"] != null && values["versioning"].any(_["enabled"] == true))

  # No Terraform variants: the AuthenticatedUsers ACL grant is applied through the
  # S3-compatible API; the digitalocean_spaces_bucket.acl argument exposes only
  # "private" and "public-read", so there is no HCL surface for the authenticated-read
  # grant. The runtime variant catches buckets where it was set out of band.
  - uid: mondoo-digitalocean-security-spaces-bucket-not-authenticated-readable
    title: Ensure Spaces buckets do not grant read access to all authenticated users
    impact: 80
    filters: asset.platform == "digitalocean-spaces-bucket"
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-2-1
    mql: |
      digitalocean.spacesBucket.authenticatedReadAcl == false
    docs:
      desc: |
        This check ensures that no Spaces bucket grants the `READ` permission to the `AuthenticatedUsers` group. In the S3-compatible ACL model that DigitalOcean Spaces implements, `AuthenticatedUsers` is not limited to the bucket owner's account — it covers every authenticated S3-compatible principal, including any DigitalOcean or AWS account on the internet. A bucket with this grant is effectively listable and readable by anyone willing to authenticate.

        **Why this matters**

        - **Near-public exposure:** The `AuthenticatedUsers` group is satisfied by any valid S3-compatible credential, so an `authenticated-read` grant exposes object listings and contents to essentially the entire authenticated internet, not to a trusted subset.
        - **Misleading ACL label:** Operators often read `authenticated-read` as "only my account," when it actually means "any authenticated account," making it a quietly over-permissive setting that survives review.
        - **Data leak path:** Logs, backups, and uploads accumulated in such a bucket are reachable by outside accounts without any per-bucket authorization, the same exposure class as a fully public bucket but harder to spot.

        **Risk mitigation**

        - **Owner-scoped access:** Removing the `AuthenticatedUsers` grant restores access to the bucket owner and explicitly granted principals only, forcing all other retrieval through scoped Spaces access keys or pre-signed URLs.
        - **Reviewable intent:** A private bucket ACL makes any future grant an explicit, auditable decision rather than a label that hides cross-account reach.
      audit: |
        ### Audit via Console

        1. Sign in to the DigitalOcean [Cloud Control Panel](https://cloud.digitalocean.com/).
        2. Navigate to **Spaces Object Storage** and open each bucket.
        3. Spaces does not surface the `AuthenticatedUsers` ACL grant in the panel; inspect it with the S3-compatible API in the CLI step below.

        ### Audit via CLI

        1. Retrieve the bucket ACL with the S3-compatible API and look for an `AuthenticatedUsers` grantee:

        ```bash
        doctl spaces buckets list
        AWS_ACCESS_KEY_ID=<spaces-key> AWS_SECRET_ACCESS_KEY=<spaces-secret> \
          aws s3api get-bucket-acl --bucket <bucket> \
            --endpoint-url https://<region>.digitaloceanspaces.com
        ```

        A passing bucket returns grants only to the bucket owner. A failing bucket returns a grant where `Grantee.URI` is `http://acs.amazonaws.com/groups/global/AuthenticatedUsers` and `Permission` is `READ` or `FULL_CONTROL`.
      remediation:
        - id: console
          desc: |
            Spaces does not expose the `AuthenticatedUsers` grant in the Cloud Control Panel; reset the ACL to private with the S3-compatible API shown in the CLI remediation below, then confirm the bucket no longer carries the grant.
        - id: cli
          desc: |
            DigitalOcean Spaces is S3-compatible, so manage its ACLs with the AWS CLI pointed at the Spaces endpoint. The `<spaces-key>` and `<spaces-secret>` come from the **Spaces Keys** page in the API section of the control panel, not the DigitalOcean API token, and `<region>` is the Spaces region slug such as `nyc3`.

            ```bash
            AWS_ACCESS_KEY_ID=<spaces-key> AWS_SECRET_ACCESS_KEY=<spaces-secret> \
              aws s3api put-bucket-acl --bucket <bucket> --acl private \
                --endpoint-url https://<region>.digitaloceanspaces.com
            ```

            If specific accounts genuinely need access, grant them individually with `--grant-read id=<canonical-id>` rather than re-applying the `authenticated-read` group grant.
        # No Terraform remediation: the digitalocean_spaces_bucket.acl argument accepts only "private" and "public-read"; the authenticated-read group grant is applied through the runtime S3 API and has no Terraform analog.
    refs:
      - url: https://docs.digitalocean.com/products/spaces/reference/s3-compatibility/
        title: Spaces S3 compatibility reference

  # No Terraform variants: a bucket policy is declared in a separate
  # digitalocean_spaces_bucket_policy resource whose `policy` is a free-form JSON
  # document keyed to the bucket by name, so asserting "no policy grants public access"
  # requires parsing that JSON and correlating it back to each bucket — awkward to do
  # reliably in MQL on Terraform sources. The runtime variant inspects the resolved
  # policy document directly.
  - uid: mondoo-digitalocean-security-spaces-bucket-policy-not-public
    title: Ensure Spaces bucket policies do not grant public access
    impact: 90
    filters: asset.platform == "digitalocean-spaces-bucket"
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-2-1
    mql: |
      digitalocean.spacesBucket.policy == null ||
      digitalocean.spacesBucket.policy["Statement"].where(_["Effect"] == "Allow").all(_["Principal"] != "*")
    docs:
      desc: |
        This check ensures that no Spaces bucket policy contains an `Allow` statement whose `Principal` is the anonymous wildcard `"*"`. A bucket policy is evaluated independently of the bucket ACL, so a policy that allows `"*"` grants unauthenticated access to every caller even when the ACL is private. This is the bucket-policy counterpart to the ACL-based public-read and public-write checks.

        **Why this matters**

        - **ACL-independent exposure:** Access controls on Spaces come from both the ACL and the bucket policy; a wildcard-principal policy statement opens the bucket to anyone regardless of how restrictive the ACL is.
        - **Broad action grants:** Policy statements often grant `s3:GetObject`, `s3:ListBucket`, or `s3:*`; with `Principal: "*"` these actions become available to the entire internet without credentials.
        - **Easy to overlook:** Because the policy is a separate JSON document from the ACL, a public policy can be present on a bucket whose ACL review came back clean, leaving a gap that ACL-only checks miss.

        **Risk mitigation**

        - **Principal scoping:** Replacing `"*"` with specific account or Spaces-key principals confines policy-granted access to known identities.
        - **Layered review:** Auditing the policy alongside the ACL closes the most common path by which a bucket ends up effectively public despite a private ACL.
      audit: |
        ### Audit via Console

        1. Sign in to the DigitalOcean [Cloud Control Panel](https://cloud.digitalocean.com/).
        2. Open the affected bucket under **Spaces Object Storage**.
        3. On the **Settings** tab, review any attached bucket policy for a statement whose `Principal` is `"*"` with `Effect: "Allow"`.

        A passing bucket has no policy, or no `Allow` statement with a `"*"` principal. A failing bucket has an `Allow` statement granting access to `"*"`.

        ### Audit via CLI

        1. Retrieve the bucket policy with the S3-compatible API and inspect its statements:

        ```bash
        AWS_ACCESS_KEY_ID=<spaces-key> AWS_SECRET_ACCESS_KEY=<spaces-secret> \
          aws s3api get-bucket-policy --bucket <bucket> \
            --endpoint-url https://<region>.digitaloceanspaces.com \
          | jq -r '.Policy | fromjson | .Statement[] | [.Effect, (.Principal|tostring)] | @tsv'
        ```

        A passing bucket returns `NoSuchBucketPolicy` or no `Allow` statement with a `"*"` principal. A failing bucket returns an `Allow` statement whose principal is `"*"`.
      remediation:
        - id: console
          desc: |
            Spaces bucket policies are managed through the S3-compatible API rather than the Cloud Control Panel. Use the CLI remediation below to remove or scope the public statement, then confirm the change on the bucket's **Settings** tab.
        - id: cli
          desc: |
            DigitalOcean Spaces is S3-compatible, so manage its policy with the AWS CLI pointed at the Spaces endpoint. The `<spaces-key>` and `<spaces-secret>` come from the **Spaces Keys** page in the API section of the control panel, not the DigitalOcean API token, and `<region>` is the Spaces region slug such as `nyc3`.

            If the bucket does not need a policy at all, delete it:

            ```bash
            AWS_ACCESS_KEY_ID=<spaces-key> AWS_SECRET_ACCESS_KEY=<spaces-secret> \
              aws s3api delete-bucket-policy --bucket <bucket> \
                --endpoint-url https://<region>.digitaloceanspaces.com
            ```

            If a policy is required, re-apply it with each statement's `Principal` scoped to specific account or Spaces-key identities instead of `"*"`:

            ```bash
            AWS_ACCESS_KEY_ID=<spaces-key> AWS_SECRET_ACCESS_KEY=<spaces-secret> \
              aws s3api put-bucket-policy --bucket <bucket> \
                --endpoint-url https://<region>.digitaloceanspaces.com \
                --policy file://scoped-policy.json
            ```
        # No Terraform remediation: the bucket policy lives in a separate digitalocean_spaces_bucket_policy resource holding a free-form JSON document; an HCL snippet cannot assert that an arbitrary bucket's policy omits a wildcard principal.
    refs:
      - url: https://docs.digitalocean.com/products/spaces/reference/s3-compatibility/
        title: Spaces S3 compatibility reference

  # No Terraform variants: MFA delete is enabled through the S3-compatible
  # PutBucketVersioning call with an MFA serial and code; the digitalocean_spaces_bucket
  # resource has no argument for it, so there is no HCL surface to inspect.
  - uid: mondoo-digitalocean-security-spaces-bucket-mfa-delete-enabled
    title: Ensure Spaces buckets require MFA to delete object versions
    impact: 50
    filters: asset.platform == "digitalocean-spaces-bucket"
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-bcr-08
      compliance/dora: dora-art-12
      compliance/hipaa: hipaa-security-ss164-308-a-7-ii-a-contingency-plan-data-backup-plan
      compliance/iso-27001-2022: iso-27001-2022-a-8-13
      compliance/nis-2: nis-2-21-2-c
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cp-9
      compliance/nist-sp-800-171: false
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc9-1-1
      compliance/vda-isa-5: vda-isa-5-4-1-2
    mql: |
      digitalocean.spacesBucket.mfaDeleteEnabled == true
    docs:
      desc: |
        This check ensures that every Spaces bucket requires multi-factor authentication to permanently delete object versions or to suspend versioning. MFA delete hardens a versioned bucket so that a leaked or compromised access key alone cannot erase the retained version history that versioning is meant to protect.

        **Why this matters**

        - **Tamper resistance for backups:** Object versioning preserves prior revisions, but without MFA delete a single compromised key can still issue per-version deletes; MFA delete forces a second factor before any version is permanently removed.
        - **Ransomware and insider resilience:** Requiring an MFA code to delete versions or disable versioning closes the path by which an attacker with stolen credentials destroys the recovery copies before exfiltration or extortion.
        - **Defense in depth for retention:** MFA delete complements versioning and lifecycle retention, ensuring the controls that guarantee recoverability cannot be silently undone with key access alone.

        **Risk mitigation**

        - **Protected version history:** With MFA delete enabled, the version history remains available for recovery even if a write-capable key is compromised.
        - **Higher bar for destructive actions:** The second factor requirement means permanently destructive operations require interactive, authenticated action rather than an automated API call with a leaked key.
      audit: |
        ### Audit via Console

        1. Sign in to the DigitalOcean [Cloud Control Panel](https://cloud.digitalocean.com/).
        2. Spaces does not surface MFA delete state in the panel; inspect it with the S3-compatible API in the CLI step below.

        ### Audit via CLI

        1. Query the bucket's versioning configuration, which reports the MFA delete state:

        ```bash
        AWS_ACCESS_KEY_ID=<spaces-key> AWS_SECRET_ACCESS_KEY=<spaces-secret> \
          aws s3api get-bucket-versioning --bucket <bucket> \
            --endpoint-url https://<region>.digitaloceanspaces.com
        ```

        A passing bucket returns `"MFADelete": "Enabled"`. A failing bucket returns `"MFADelete": "Disabled"` or omits the field.
      remediation:
        - id: console
          desc: |
            MFA delete cannot be configured from the Cloud Control Panel; it is set through the S3-compatible API using the root account's MFA device, as shown in the CLI remediation below.
        - id: cli
          desc: |
            MFA delete is enabled through the S3-compatible `PutBucketVersioning` call and requires the serial number of the account's MFA device together with the current code. The `<spaces-key>` and `<spaces-secret>` come from the **Spaces Keys** page, and `<region>` is the Spaces region slug such as `nyc3`.

            ```bash
            AWS_ACCESS_KEY_ID=<spaces-key> AWS_SECRET_ACCESS_KEY=<spaces-secret> \
              aws s3api put-bucket-versioning --bucket <bucket> \
                --versioning-configuration Status=Enabled,MFADelete=Enabled \
                --mfa "<mfa-serial> <mfa-code>" \
                --endpoint-url https://<region>.digitaloceanspaces.com
            ```

            Versioning must be enabled for MFA delete to apply. Verify the new state with `aws s3api get-bucket-versioning`.
        # No Terraform remediation: MFA delete requires an interactive MFA serial and code on the PutBucketVersioning call; the digitalocean_spaces_bucket resource models no such argument, so there is no Terraform analog.
    refs:
      - url: https://docs.digitalocean.com/products/spaces/reference/s3-compatibility/
        title: Spaces S3 compatibility reference

  - uid: mondoo-digitalocean-security-spaces-bucket-cors-no-wildcard-origin
    title: Ensure Spaces bucket CORS rules do not allow all origins
    impact: 50
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-2-1
    variants:
      - uid: mondoo-digitalocean-security-spaces-bucket-cors-no-wildcard-origin-digitalocean
        tags:
          mondoo.com/filter-title: DigitalOcean
          mondoo.com/filter-icon: digitalocean
      - uid: mondoo-digitalocean-security-spaces-bucket-cors-no-wildcard-origin-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-digitalocean-security-spaces-bucket-cors-no-wildcard-origin-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-digitalocean-security-spaces-bucket-cors-no-wildcard-origin-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that no Spaces bucket has a CORS rule whose allowed origins include the wildcard `"*"`. A wildcard origin lets any website instruct a visitor's browser to issue cross-origin requests against the bucket, weakening the same-origin protections that normally isolate web applications from each other.

        **Why this matters**

        - **Cross-origin data reach:** A `"*"` allowed origin permits scripts on any site to read responses from the bucket in the browser context, which can expose objects intended only for a specific application's front end.
        - **Credentialed request risk:** Combined with permissive methods, a wildcard origin broadens the set of sites that can drive authenticated browser requests against the bucket, expanding the surface for cross-site abuse.
        - **Overly broad by default:** Wildcard origins are frequently copied from quick-start examples and left in place, granting far wider browser access than the single front-end domain the bucket actually serves.

        **Risk mitigation**

        - **Origin allowlisting:** Restricting allowed origins to the specific scheme-and-host front ends that need browser access confines cross-origin requests to trusted applications.
        - **Least-privilege CORS:** Pairing a narrow origin list with only the required methods and headers keeps the bucket's browser-accessible surface limited to its intended use.
      audit: |
        ### Audit via Console

        1. Sign in to the DigitalOcean [Cloud Control Panel](https://cloud.digitalocean.com/).
        2. Open the affected bucket under **Spaces Object Storage**.
        3. On the **Settings** tab, review the **CORS Configurations** and check whether any rule's **Origin** is `*`.

        A passing bucket has no CORS rule with a `*` origin. A failing bucket has at least one CORS rule whose allowed origin is `*`.

        ### Audit via CLI

        1. Retrieve the bucket CORS configuration with the S3-compatible API:

        ```bash
        AWS_ACCESS_KEY_ID=<spaces-key> AWS_SECRET_ACCESS_KEY=<spaces-secret> \
          aws s3api get-bucket-cors --bucket <bucket> \
            --endpoint-url https://<region>.digitaloceanspaces.com
        ```

        A passing bucket returns no rule with `"AllowedOrigins": ["*"]`. A failing bucket returns at least one rule whose `AllowedOrigins` contains `*`.
      remediation:
        - id: console
          desc: |
            To fix this in the DigitalOcean Cloud Control Panel:

            1. Open the bucket under **Spaces Object Storage** and go to the **Settings** tab.
            2. Edit each CORS configuration whose **Origin** is `*` and replace it with the specific scheme-and-host origins that need browser access, for example `https://app.example.com`.
            3. Save the configuration.
        - id: cli
          desc: |
            DigitalOcean Spaces is S3-compatible, so manage CORS with the AWS CLI pointed at the Spaces endpoint. The `<spaces-key>` and `<spaces-secret>` come from the **Spaces Keys** page, and `<region>` is the Spaces region slug such as `nyc3`. Re-apply the CORS configuration with explicit origins instead of `*`:

            ```bash
            AWS_ACCESS_KEY_ID=<spaces-key> AWS_SECRET_ACCESS_KEY=<spaces-secret> \
              aws s3api put-bucket-cors --bucket <bucket> \
                --endpoint-url https://<region>.digitaloceanspaces.com \
                --cors-configuration '{
                  "CORSRules": [{
                    "AllowedOrigins": ["https://app.example.com"],
                    "AllowedMethods": ["GET"],
                    "AllowedHeaders": ["*"]
                  }]
                }'
            ```
        - id: terraform
          desc: |
            To scope CORS in Terraform, set `allowed_origins` on each `cors_rule` block of `digitalocean_spaces_bucket` to specific origins instead of `*`:

            ```hcl
            resource "digitalocean_spaces_bucket" "example" {
              name   = "example-bucket"
              region = "nyc3"
              acl    = "private"

              cors_rule {
                allowed_origins = ["https://app.example.com"]
                allowed_methods = ["GET"]
                allowed_headers = ["*"]
                max_age_seconds = 3000
              }
            }
            ```
    refs:
      - url: https://docs.digitalocean.com/products/spaces/reference/s3-compatibility/
        title: Spaces S3 compatibility reference

  - uid: mondoo-digitalocean-security-spaces-bucket-cors-no-wildcard-origin-digitalocean
    filters: asset.platform == "digitalocean-spaces-bucket"
    mql: |
      digitalocean.spacesBucket.corsRules.none(_["allowedOrigins"].contains("*"))
  - uid: mondoo-digitalocean-security-spaces-bucket-cors-no-wildcard-origin-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "digitalocean_spaces_bucket")
    mql: |
      terraform.resources("digitalocean_spaces_bucket").all(
        blocks.where(type == "cors_rule").none(arguments["allowed_origins"].contains("*"))
      )
  - uid: mondoo-digitalocean-security-spaces-bucket-cors-no-wildcard-origin-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "digitalocean_spaces_bucket")
    mql: |
      terraform.plan.resourceChanges.where(type == "digitalocean_spaces_bucket").all(
        change.after["cors_rule"] == empty ||
        change.after["cors_rule"].none(_["allowed_origins"].contains("*"))
      )
  - uid: mondoo-digitalocean-security-spaces-bucket-cors-no-wildcard-origin-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "digitalocean_spaces_bucket")
    mql: |
      terraform.state.resources.where(type == "digitalocean_spaces_bucket").all(
        values["cors_rule"] == empty ||
        values["cors_rule"].none(_["allowed_origins"].contains("*"))
      )

  # No Terraform variants: this check inspects the scheme of each app's live_url,
  # which is a read-only computed attribute. App Platform always provisions managed
  # TLS, so an HTTP live_url reflects a misconfigured custom domain at runtime — a
  # condition the digitalocean_app resource has no argument to express, and that is
  # absent from HCL and from a terraform plan before apply.
  - uid: mondoo-digitalocean-security-app-platform-https
    filters: asset.platform == "digitalocean"
    title: Ensure App Platform apps are served over HTTPS
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-2-ii-transmission-security-encryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    mql: |
      digitalocean.apps.where(liveUrl != "").all(liveUrl == /^https:\/\//)
    docs:
      desc: |
        This check ensures that every DigitalOcean App Platform application with a public live URL serves requests over HTTPS. App Platform automatically provisions managed TLS certificates for app URLs, so an HTTP live URL indicates a misconfigured custom domain or an incorrectly deployed application.

        **Why this matters**

        - **Request and response protection:** An app served over HTTP exposes every request and response to interception and modification, including authentication flows, session tokens, and API payloads.
        - **Managed TLS availability:** App Platform provides managed TLS certificates for all `ondigitalocean.app` URLs at no additional cost, so there is no technical barrier to serving apps over HTTPS.
        - **Misconfiguration signal:** An HTTP live URL is a reliable indicator of a custom domain configuration error that, if uncorrected, will also prevent certificate issuance for that domain.

        **Risk mitigation**

        - **Eavesdropping prevention:** HTTPS ensures all traffic between end users and the App Platform edge is encrypted, removing the ability for passive network observers to read application data.
        - **Session hijacking prevention:** Serving session cookies and authentication tokens only over HTTPS prevents them from being captured by network-level attackers and reused to impersonate authenticated users.
      audit: |
        ### Audit via Console

        1. Sign in to the DigitalOcean [Cloud Control Panel](https://cloud.digitalocean.com/).
        2. Navigate to **App Platform** and review the **Live URL** column for each app.
        3. Confirm that every live URL begins with `https://`.

        A passing app shows a live URL that starts with `https://`. A failing app shows a live URL that starts with `http://`.

        ### Audit via CLI

        1. List all apps and inspect their live URLs:

        ```bash
        doctl apps list --output json | jq -r '.[] | [.id, .live_url] | @tsv'
        ```

        A passing app returns a `live_url` that begins with `https://`. A failing app returns a `live_url` that begins with `http://`.
      remediation:
        - id: console
          desc: |
            To fix this in the DigitalOcean Cloud Control Panel:

            1. Navigate to **App Platform** and open the affected app.
            2. Go to **Settings** > **Domains**.
            3. Remove or correct any custom domain without a managed certificate, and verify that the generated app URL on `ondigitalocean.app` is reachable over HTTPS.
            4. Trigger a new deployment if needed.
        - id: cli
          desc: |
            App Platform serves managed TLS certificates automatically, so an HTTP `liveUrl` almost always means a custom domain is misconfigured. Pull the spec, fix the broken domain, and reapply.

            1. Locate the affected app and pull its spec:

                ```bash
                doctl apps list --output json | jq -r '.[] | [.id, .live_url, .spec.name] | @tsv'
                doctl apps spec get "<app-id>" > app.yaml
                ```

            2. Edit `app.yaml` to remove or correct the misconfigured custom domain. Each entry under `domains:` must point at a domain whose CNAME or A record resolves to the app's `ondigitalocean.app` ingress so App Platform can issue a managed cert. If the custom domain is no longer needed, drop the entry; the default `*.ondigitalocean.app` URL is always served over HTTPS.

                ```yaml
                domains:
                  - domain: app.example.com
                    type: PRIMARY
                ```

            3. Validate the spec, push it, and trigger a fresh deployment so the cert is reissued:

                ```bash
                doctl apps spec validate app.yaml
                doctl apps update <app-id> --spec app.yaml
                doctl apps create-deployment <app-id>
                ```

            4. Confirm the live URL is now HTTPS:

                ```bash
                doctl apps get "<app-id>" --output json | jq -r '.[0].live_url'
                ```
        # No Terraform remediation: an HTTP live_url is caused by a custom domain
        # whose DNS does not resolve to the app's ingress, which Terraform cannot
        # fix — the domain block in digitalocean_app does not control certificate
        # issuance or the resulting URL scheme.
    refs:
      - url: https://docs.digitalocean.com/products/app-platform/how-to/manage-domains/
        title: Manage App Platform domains and certificates
  # No Terraform variants: this check inspects the findings of the most recent
  # DigitalOcean-managed security scan — runtime telemetry produced by the platform
  # scanner. The digitalocean Terraform provider has no resource representing a scan
  # or its findings, so there is nothing to assert against in HCL, plan, or state.
  - uid: mondoo-digitalocean-security-scan-no-critical-findings
    filters: asset.platform == "digitalocean"
    title: Ensure the DigitalOcean security scan reports no critical findings
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-tvm-07
      compliance/dora: dora-art-25
      compliance/hipaa: hipaa-security-ss164-308-a-1-ii-b-security-management-process-risk-management
      compliance/iso-27001-2022: iso-27001-2022-a-8-8
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-id-ra-1
      compliance/nist-csf-2: nist-csf-2-id-ra-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ra-5
      compliance/nist-sp-800-171: nist-sp-800-171--3-11-2
      compliance/pci-dss-4: pcidss-requirement-11-3-1
      compliance/soc2-2017: soc2-control-cc7-1-5
      compliance/vda-isa-5: vda-isa-5-5-2-5
    mql: |
      digitalocean.latestSecurityScan != null && digitalocean.latestSecurityScan.findings.none(severity == "critical")
    docs:
      desc: |
        This check ensures that a DigitalOcean managed security scan has run and that its most recent results report no findings with a severity of `critical`. The DigitalOcean security scanner inspects account resources for misconfigurations and weaknesses; a critical finding represents a vulnerability that should be remediated promptly.

        **Why this matters**

        - **Vulnerability visibility:** A critical finding flags a concrete, high-severity weakness in the account's resources that an attacker could exploit.
        - **Scan coverage:** The absence of any scan means the account has no automated assurance that its resources have been assessed for known weaknesses.
        - **Remediation tracking:** Resolving critical findings and keeping the latest scan clean demonstrates that high-severity issues are being addressed rather than accumulating.

        **Risk mitigation**

        - **Reduced exposure window:** Promptly clearing critical findings limits the time a known weakness remains exploitable.
        - **Continuous assurance:** Keeping a recent, clean scan provides ongoing evidence that the account's posture has been evaluated.
      audit: |
        ### Audit via Console

        1. Sign in to the DigitalOcean [Cloud Control Panel](https://cloud.digitalocean.com/).
        2. Open the security scanning area and review the most recent scan.
        3. Confirm the scan has completed and that it lists no findings with a **critical** severity.

        A passing account shows a completed scan with no critical findings. A failing account has no scan, or its latest scan lists one or more critical findings.

        The `doctl` CLI has no command for managed security scans, so this check has no CLI audit step; review the latest scan in the control panel.
      remediation:
        - id: console
          desc: |
            To resolve critical security-scan findings using the DigitalOcean Cloud Control Panel:

            1. Sign in to the DigitalOcean [Cloud Control Panel](https://cloud.digitalocean.com/).
            2. Open the security scanning area and select the most recent scan.
            3. For each critical finding, follow the listed mitigation steps to remediate the affected resource.
            4. Re-run the scan and confirm the critical findings are cleared.
        # No CLI remediation: remediation is per-finding and resource-specific — the
        # `doctl` CLI exposes no command to act on security-scan findings; follow the
        # mitigation steps surfaced for each finding in the control panel.
        # No Terraform remediation: security-scan findings are runtime telemetry with
        # no Terraform resource; remediate the underlying resource each finding identifies.
    refs:
      - url: https://docs.digitalocean.com/products/
        title: DigitalOcean product documentation
  # No Terraform variants: GradientAI agents are managed through the GradientAI API and
  # control panel; the digitalocean Terraform provider has no resource representing a
  # GradientAI agent or its deployment visibility, so there is nothing to assert in HCL,
  # plan, or state.
  - uid: mondoo-digitalocean-security-gradientai-agent-not-publicly-deployed
    filters: asset.platform == "digitalocean-gradientai-agent"
    title: Ensure GradientAI agents are not deployed with public visibility
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-2-1
    mql: |
      digitalocean.gradientai.agent.deploymentVisibility != "VISIBILITY_PUBLIC"
    docs:
      desc: |
        This check ensures that no GradientAI agent is deployed with public visibility. An agent deployed with `VISIBILITY_PUBLIC` exposes its chat endpoint to anyone with the URL, with no authentication, allowing unauthenticated users to interact with the agent and the data and tools it can reach.

        **Why this matters**

        - **Unauthenticated access:** A public agent can be queried by anyone on the internet, exposing its system prompt behavior, connected knowledge bases, and any functions it can call.
        - **Data leakage:** Agents grounded on private knowledge bases can surface that content to anonymous users when deployed publicly.
        - **Abuse and cost:** Public agents are subject to unrestricted prompting, enabling prompt-injection attempts and consumption-driven cost abuse.

        **Risk mitigation**

        - **Restrict visibility:** Deploy agents with private or organization-scoped visibility so only authenticated principals can reach them.
        - **Front with authentication:** Where external access is required, place the agent behind an authenticating proxy or application rather than exposing it directly.
        - **Review guardrails:** Ensure agents that must be public have guardrails and citation settings appropriate for an untrusted audience.
      audit: |
        ### Audit via Console

        1. Sign in to the DigitalOcean [Cloud Control Panel](https://cloud.digitalocean.com/).
        2. Open the **GradientAI** platform and review each agent's deployment settings.
        3. Confirm no agent has its deployment visibility set to **Public**.

        A passing account has every agent deployed with non-public visibility. A failing account has one or more agents with public deployment visibility.

        ### Audit via CLI

        1. List the GradientAI agents and review their deployment visibility:

        ```bash
        doctl genai agent list --output json | jq -r '.[] | [.name, .uuid, .deployment.visibility] | @tsv'
        ```

        A passing account returns no agent with a public deployment visibility. A failing account returns one or more agents whose visibility is `VISIBILITY_PUBLIC`.
      remediation:
        - id: console
          desc: |
            To restrict a GradientAI agent's deployment visibility using the DigitalOcean Cloud Control Panel:

            1. Sign in to the DigitalOcean [Cloud Control Panel](https://cloud.digitalocean.com/).
            2. Open the **GradientAI** platform and select the agent.
            3. Edit the deployment settings and change the visibility from **Public** to a private or organization-scoped option.
            4. Redeploy the agent.
        - id: cli
          desc: |
            Switch the agent deployment to private:

            ```bash
            doctl genai agent update-visibility "<agent-uuid>" --visibility VISIBILITY_PRIVATE
            ```

            Confirm the change by listing the agents again and checking that the deployment visibility is no longer `VISIBILITY_PUBLIC`.
        # No Terraform remediation: GradientAI agents have no digitalocean Terraform resource.
    refs:
      - url: https://docs.digitalocean.com/products/gradientai-platform/
        title: DigitalOcean GradientAI platform
  # No Terraform variants: GradientAI agents are managed through the GradientAI API and control
  # panel; the digitalocean Terraform provider has no resource representing an agent or its
  # attached guardrails, so there is nothing to assert in HCL, plan, or state.
  - uid: mondoo-digitalocean-security-gradientai-agent-has-guardrails
    filters: asset.platform == "digitalocean-gradientai-agent"
    title: Ensure GradientAI agents have a content guardrail attached
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: false
      compliance/dora: false
      compliance/hipaa: false
      compliance/iso-27001-2022: false
      compliance/nis-2: false
      compliance/nist-csf-1: false
      compliance/nist-csf-2: false
      compliance/nist-sp-800-53-rev5: false
      compliance/nist-sp-800-171: false
      compliance/pci-dss-4: false
      compliance/soc2-2017: false
      compliance/vda-isa-5: false
    mql: |
      digitalocean.gradientai.agent.guardrails.where(isAttached == true).length > 0
    docs:
      desc: |
        This check ensures that every GradientAI agent has at least one content guardrail attached. Guardrails inspect the prompts an agent receives and the responses it returns, blocking content that violates the configured policy and returning a canned response instead. An agent with no attached guardrail applies no content filtering to its inputs or outputs.

        **Why this matters**

        - **Prompt-injection resistance:** A guardrail can intercept adversarial prompts that attempt to override the agent's instructions or extract its system prompt and connected data.
        - **Output safety:** Guardrails keep an agent from returning sensitive, unsafe, or policy-violating content to its users.
        - **Consistent enforcement:** Attaching a guardrail enforces content policy at the platform layer rather than relying on the agent's instruction text alone, which a determined user can work around.

        **Risk mitigation**

        - **Data leakage:** A guardrail reduces the chance that an agent grounded on private knowledge bases discloses that content in response to a crafted prompt.
        - **Abuse:** Filtering inputs and outputs limits how an exposed agent can be misused for harmful generation.

        Agents that are intentionally unfiltered for a trusted internal audience can be exempted from this check.
      audit: |
        ### Audit via Console

        1. Sign in to the DigitalOcean [Cloud Control Panel](https://cloud.digitalocean.com/).
        2. Open the **GradientAI** platform and select each agent.
        3. Review the agent's **Guardrails** configuration.

        A passing account has every agent with at least one attached guardrail. A failing account has one or more agents with no guardrail attached.

        ### Audit via CLI

        1. List the GradientAI agents and review their attached guardrails:

        ```bash
        doctl genai agent list --output json | jq -r '.[] | [.name, .uuid, ([.guardrails[]? | select(.is_attached)] | length)] | @tsv'
        ```

        A passing account returns an attached-guardrail count of at least 1 for every agent. A failing account returns `0` for one or more agents.
      remediation:
        - id: console
          desc: |
            To attach a content guardrail using the DigitalOcean Cloud Control Panel:

            1. Sign in to the DigitalOcean [Cloud Control Panel](https://cloud.digitalocean.com/).
            2. Open the **GradientAI** platform and select the agent.
            3. Open the **Guardrails** configuration, attach an appropriate guardrail, and set its default response.
            4. Redeploy the agent so the guardrail takes effect.
        # No CLI remediation: doctl genai exposes agent lifecycle operations but no command to
        # attach a guardrail to an agent; guardrail attachment is performed through the GradientAI
        # control panel or the GradientAI API.
        # No Terraform remediation: GradientAI agents have no digitalocean Terraform resource, so
        # guardrail attachment cannot be expressed in Terraform.
    refs:
      - url: https://docs.digitalocean.com/products/gradientai-platform/
        title: DigitalOcean GradientAI platform

  # No Terraform variants: GradientAI knowledge bases are managed through the GradientAI
  # API and control panel; the digitalocean Terraform provider has no resource representing
  # a knowledge base or its public flag, so there is nothing to assert in HCL, plan, or state.
  - uid: mondoo-digitalocean-security-gradientai-knowledge-base-not-public
    filters: asset.platform == "digitalocean"
    title: Ensure GradientAI knowledge bases are not public
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-2-1
    mql: |
      digitalocean.gradientai.knowledgeBases.all(isPublic == false)
    docs:
      desc: |
        This check ensures that no GradientAI knowledge base is marked public. A public knowledge base makes its indexed content readable beyond the account, exposing the source documents used to ground agents — which frequently include proprietary or sensitive material.

        **Why this matters**

        - **Data exposure:** A public knowledge base can expose the documents, embeddings, and source data it indexes to parties outside the account.
        - **Grounding leakage:** Agents retrieve from knowledge bases at query time; a public base widens who can reach that content indirectly through any connected agent.
        - **Intellectual property:** Knowledge bases commonly hold internal documentation, support content, or other proprietary data that should not be publicly readable.

        **Risk mitigation**

        - **Keep knowledge bases private:** Leave the public flag disabled unless the indexed content is explicitly intended for public consumption.
        - **Classify before publishing:** Review the source data of any knowledge base before making it public to confirm it contains no sensitive material.
        - **Audit periodically:** Re-check knowledge base visibility as their source data changes over time.
      audit: |
        ### Audit via Console

        1. Sign in to the DigitalOcean [Cloud Control Panel](https://cloud.digitalocean.com/).
        2. Open the **GradientAI** platform and review each knowledge base.
        3. Confirm no knowledge base is marked **Public**.

        A passing account has every knowledge base set to non-public. A failing account has one or more public knowledge bases.

        ### Audit via CLI

        1. List the GradientAI knowledge bases and review their public flag:

        ```bash
        doctl genai knowledge-base list
        ```

        A passing account returns no knowledge base with a public flag set to true. A failing account returns one or more public knowledge bases.
      remediation:
        - id: console
          desc: |
            To make a GradientAI knowledge base private using the DigitalOcean Cloud Control Panel:

            1. Sign in to the DigitalOcean [Cloud Control Panel](https://cloud.digitalocean.com/).
            2. Open the **GradientAI** platform and select the knowledge base.
            3. Disable the **Public** setting.
            4. Save the change.
        # No CLI remediation: `doctl genai` exposes knowledge-base listing but no stable
        # command to toggle the public flag on an existing knowledge base; use the control panel above.
        # No Terraform remediation: GradientAI knowledge bases have no digitalocean Terraform resource.
    refs:
      - url: https://docs.digitalocean.com/products/gradientai-platform/
        title: DigitalOcean GradientAI platform

  # No Terraform variants: DigitalOcean Functions are deployed imperatively via
  # `doctl serverless deploy` and a project.yml manifest; there is no digitalocean
  # Terraform resource for a serverless function, so the web-export and API-key
  # annotations cannot be evaluated from Terraform HCL, plan, or state.
  - uid: mondoo-digitalocean-security-function-requires-api-key
    title: Ensure web-accessible Functions require an API key
    impact: 85
    filters: asset.platform == "digitalocean"
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-14
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-2
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-2
    mql: |
      digitalocean.functionNamespaces.all(functions.where(webExported == true).all(requiresApiKey == true))
    docs:
      desc: |
        This check ensures that every DigitalOcean Function published as a web-accessible HTTP endpoint requires an API key. A function marked web-accessible is reachable over the internet at its namespace URL; unless it also requires an API key, anyone who learns or guesses the URL can invoke it without credentials.

        **Why this matters**

        - **Unauthenticated invocation:** A web-accessible function without an API key runs its code for any anonymous caller, exposing whatever data access, downstream services, and secrets the function holds.
        - **Abuse and cost:** Open endpoints are targets for automated abuse — scraping, data injection, and invocation floods that run up compute charges.
        - **Bypassed access controls:** Functions frequently sit in front of databases, object storage, or third-party APIs. An unauthenticated function becomes an open proxy to those backends.

        **Risk mitigation**

        - **Anonymous access:** Requiring an API key ensures only callers presenting a valid credential can execute the function.
        - **Attack surface:** Endpoints that reject unauthenticated requests are not usable by opportunistic internet scanners probing for open functions.

        Functions that are intentionally public, such as a health check that returns no sensitive data, should be reviewed and documented as exceptions rather than left unauthenticated by default.
      audit: |
        ### Audit via Console

        1. Sign in to the DigitalOcean [Cloud Control Panel](https://cloud.digitalocean.com/).
        2. Navigate to **Functions** and open each namespace.
        3. For each function, review whether it is web-accessible and whether it requires authentication.

        A passing function is either not web-accessible or requires an API key. A failing function is web-accessible and allows unauthenticated access.

        ### Audit via CLI

        1. List the functions in the namespace and inspect each function's metadata:

        ```bash
        doctl serverless functions list
        doctl serverless functions get <function-name>
        ```

        A passing web-accessible function shows that an API key (secured web access) is required. A failing function shows web access enabled with no authentication requirement.
      remediation:
        - id: console
          desc: |
            To require authentication on a web-accessible function in the DigitalOcean Cloud Control Panel:

            1. Navigate to **Functions** and open the affected function.
            2. Under the function's web settings, enable the option that requires an API key for web invocation (secured web access), or disable web invocation entirely if the function does not need to be reachable over HTTP.
            3. Save the change and confirm that legitimate callers now present the API key.
        - id: cli
          desc: |
            DigitalOcean Functions are deployed from a `project.yml` manifest. Mark the function as requiring authenticated web access and redeploy it with the `doctl` CLI.

            In `project.yml`, secure the function's web access:

            ```yaml
            packages:
              - name: default
                functions:
                  - name: my-function
                    web: true
                    webSecure: true
            ```

            Then redeploy the project:

            ```bash
            doctl serverless deploy <project-directory>
            ```

            Setting `webSecure: true` requires callers to present the function's API key. Set `web: false` instead if the function does not need to be reachable over HTTP.
        # No Terraform remediation: DigitalOcean Functions have no digitalocean
        # Terraform resource; they are managed only through project.yml and doctl.
    refs:
      - url: https://docs.digitalocean.com/products/functions/how-to/create-functions/
        title: DigitalOcean Functions overview
      - url: https://docs.digitalocean.com/products/functions/reference/project-configuration/
        title: Functions project configuration reference

  # No Terraform variants: the key algorithm is parsed from the SSH public-key
  # material. In Terraform, digitalocean_ssh_key.public_key is almost always a
  # file() or variable reference rather than a literal, so the algorithm cannot be
  # read from the source, and a weak key is remediated by generating a new key
  # pair — not by changing a Terraform argument.
  - uid: mondoo-digitalocean-security-ssh-key-no-dsa
    title: Ensure SSH keys do not use the deprecated DSA algorithm
    impact: 70
    filters: asset.platform == "digitalocean"
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-10
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-5
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-10
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc6-1-11
      compliance/vda-isa-5: vda-isa-5-5-1-1
    mql: |
      digitalocean.sshKeys.none(publicKey.split(" ")[0] == "ssh-dss")
    docs:
      desc: |
        This check ensures that no SSH key registered on the DigitalOcean account uses the DSA (`ssh-dss`) algorithm. DSA keys are capped at 1024 bits, rely on a signing scheme that is fragile to poor random-number generation, and have been disabled by default in OpenSSH since version 7.0.

        **Why this matters**

        - **Weak by construction:** DSA SSH keys are limited to 1024-bit strength, which is below the cryptographic strength recommended for authentication credentials.
        - **Fragile signing:** DSA signatures can leak the private key if the per-signature nonce is ever reused or predictable, a failure mode that has compromised real keys.
        - **Deprecated everywhere:** Modern SSH clients and servers reject `ssh-dss` by default, so a DSA key is both insecure and increasingly unusable.

        **Risk mitigation**

        - **Credential compromise:** Replacing DSA keys with Ed25519 or RSA (2048-bit or larger) keys removes a class of key that is realistically forgeable.
        - **Access continuity:** Migrating off deprecated algorithms avoids sudden lockout when a client or server drops `ssh-dss` support.

        Replace any DSA key with an Ed25519 key (preferred) or an RSA key of at least 2048 bits.
      audit: |
        ### Audit via Console

        1. Sign in to the DigitalOcean [Cloud Control Panel](https://cloud.digitalocean.com/).
        2. Navigate to **Settings** > **Security** and review the **SSH keys** list.
        3. Inspect each stored public key.

        A passing key begins with `ssh-ed25519`, `ssh-rsa`, or `ecdsa-sha2-*`. A failing key begins with `ssh-dss`.

        ### Audit via CLI

        1. List the SSH keys on the account and inspect each key's public-key material:

        ```bash
        doctl compute ssh-key list
        ```

        A passing key's public key begins with `ssh-ed25519`, `ssh-rsa`, or `ecdsa-sha2-*`. A failing key's public key begins with `ssh-dss`.
      remediation:
        - id: console
          desc: |
            To replace a DSA SSH key in the DigitalOcean Cloud Control Panel:

            1. Generate a new key locally, for example `ssh-keygen -t ed25519 -C "you@example.com"`.
            2. Navigate to **Settings** > **Security** > **SSH keys** and add the new public key.
            3. Update your Droplets and automation to trust the new key, then delete the `ssh-dss` key.
        - id: cli
          desc: |
            To replace a DSA SSH key using the `doctl` CLI:

            ```bash
            ssh-keygen -t ed25519 -f ~/.ssh/do_ed25519 -C "you@example.com"
            doctl compute ssh-key import my-ed25519-key --public-key-file ~/.ssh/do_ed25519.pub
            doctl compute ssh-key delete <dsa-key-id>
            ```

            Import the new key before deleting the old one so you do not lose access to Droplets that reference it.
        # No Terraform remediation: the key algorithm is a property of the key
        # material generated with ssh-keygen, not a digitalocean_ssh_key argument;
        # the fix is to generate and register a new key pair.
    refs:
      - url: https://docs.digitalocean.com/products/droplets/how-to/add-ssh-keys/
        title: Add SSH keys to DigitalOcean

  # No Terraform variants: DigitalOcean Functions have no digitalocean Terraform
  # resource, and lastUsedAt/createdAt are runtime observations of credential
  # activity that no Terraform source expresses.
  - uid: mondoo-digitalocean-security-function-access-key-not-stale
    title: Ensure Functions namespace access keys are not stale
    impact: 70
    filters: asset.platform == "digitalocean"
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-07
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-308-a-5-ii-d-security-awareness-training-and-tools-password-management
      compliance/iso-27001-2022: iso-27001-2022-a-5-17
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-5
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-6
      compliance/pci-dss-4: pcidss-requirement-8-6-3
      compliance/soc2-2017: soc2-control-cc6-2-2
      compliance/vda-isa-5: vda-isa-5-4-1-3
    mql: |
      digitalocean.functionNamespaces.all(accessKeys.all(lastUsedAt != empty && lastUsedAt > time.now - 90 * time.day || lastUsedAt == empty && createdAt > time.now - 90 * time.day))
    docs:
      desc: |
        This check ensures that every Functions namespace API access key has been used within the last 90 days (keys created within the window are exempt while they wait to be used first). An access key that has sat unused for months is almost always a forgotten credential — still valid, still able to deploy and invoke functions, but no longer watched by anyone.

        **Why this matters**

        - **Forgotten standing credentials:** A key nobody uses is a key nobody notices being abused. Dormant credentials are a favorite foothold because their misuse blends into the absence of legitimate activity.
        - **Larger credential inventory:** Every live key is an independent secret that can leak from a laptop, CI system, or backup. Retiring unused keys shrinks the set of secrets that must be protected and rotated.
        - **No expiration by default:** Namespace keys do not expire on their own, so without periodic cleanup they accumulate indefinitely.

        **Risk mitigation**

        - **Credential leakage:** Removing keys that are no longer in active use eliminates secrets whose compromise would otherwise go undetected.
        - **Least standing access:** Pruning dormant keys keeps the namespace's authorized credentials aligned with what is actually in use.

        Delete keys that are no longer needed, and rotate the keys that remain on a regular schedule.
      audit: |
        ### Audit via Console

        1. Sign in to the DigitalOcean [Cloud Control Panel](https://cloud.digitalocean.com/).
        2. Navigate to **Functions** and open each namespace's settings.
        3. Review the access keys and their last-used dates.

        A passing key has been used within the last 90 days or was created recently. A failing key has gone unused for more than 90 days.

        ### Audit via CLI

        1. Connect to the namespace and list its API access keys:

        ```bash
        doctl serverless connect
        doctl serverless namespaces list
        ```

        Review each key's last-used timestamp. A passing key was used within the last 90 days; a failing key has been idle longer.
      remediation:
        - id: console
          desc: |
            To remove stale Functions namespace access keys in the DigitalOcean Cloud Control Panel:

            1. Navigate to **Functions** and open the namespace's settings.
            2. Identify access keys that have not been used in over 90 days and confirm they are no longer needed.
            3. Delete the unused keys, and rotate the keys that remain.
        - id: cli
          desc: |
            Manage a namespace's access keys with the `doctl serverless` command group. After confirming a key is unused, delete it:

            ```bash
            doctl serverless connect
            doctl serverless namespaces list
            ```

            Remove the stale key through the namespace's key management, then rotate the remaining keys on a regular schedule.
        # No Terraform remediation: Functions namespace access keys have no
        # digitalocean Terraform resource; they are managed only through doctl and
        # the control panel.
    refs:
      - url: https://docs.digitalocean.com/products/functions/how-to/manage-namespaces/
        title: Manage Functions namespaces

  # No Terraform variants: image visibility is not an argument on
  # digitalocean_custom_image; publishing or unpublishing an image is a separate
  # imperative action, so the public flag cannot be evaluated from Terraform.
  - uid: mondoo-digitalocean-security-image-not-public
    title: Ensure custom images are not publicly shared
    impact: 80
    filters: asset.platform == "digitalocean"
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-2-1
    mql: |
      digitalocean.images.all(public == false)
    docs:
      desc: |
        This check ensures that no custom image, snapshot, or backup owned by the account is publicly shared. A public image can be listed and used by any DigitalOcean user, and disk images frequently carry embedded secrets, credentials, application source, and configuration baked in at build time.

        **Why this matters**

        - **Embedded secrets:** Golden images and snapshots routinely contain SSH keys, API tokens, database credentials, and application code that were present on the source system when the image was captured.
        - **Intellectual property exposure:** A public custom image exposes proprietary software, configuration, and architecture to anyone who launches it.
        - **Unintended distribution:** Once an image is public it can be copied by others, so the exposure persists even after the image is later made private.

        **Risk mitigation**

        - **Data leakage:** Keeping images private ensures their contents are reachable only by the account and the team members it authorizes.
        - **Supply-chain integrity:** Private images cannot be enumerated and used as an untrusted base by unrelated parties.

        Keep custom images private and share them explicitly with named accounts only when required. Rebuild any image that was public to rotate secrets it may have exposed.
      audit: |
        ### Audit via Console

        1. Sign in to the DigitalOcean [Cloud Control Panel](https://cloud.digitalocean.com/).
        2. Navigate to **Images** and review the **Custom Images** and **Snapshots** tabs.
        3. Check the visibility of each image.

        A passing image is private to the account. A failing image is marked public.

        ### Audit via CLI

        1. List the images owned by the account and review the **Public** column:

        ```bash
        doctl compute image list-user --format ID,Name,Public
        ```

        A passing image shows `Public` as `false`. A failing image shows `Public` as `true`.
      remediation:
        - id: console
          desc: |
            To stop sharing a custom image publicly in the DigitalOcean Cloud Control Panel:

            1. Navigate to **Images** and locate the public custom image or snapshot.
            2. Remove its public sharing so it is private to the account.
            3. If the image was public, rebuild it and rotate any secrets it may have contained, then delete the exposed image.
        - id: cli
          desc: |
            Custom image visibility cannot be toggled from the CLI. Review the account's images and delete an exposed image once a private replacement exists:

            ```bash
            doctl compute image list-user --format ID,Name,Public
            doctl compute image delete <image-id>
            ```

            Rebuild the image as private and rotate any secrets it may have exposed before deleting the public copy.
        # No Terraform remediation: image visibility is not a digitalocean_custom_image
        # argument; publishing and unpublishing are imperative actions outside Terraform.
    refs:
      - url: https://docs.digitalocean.com/products/images/custom-images/
        title: DigitalOcean custom images

  # No Terraform variants: the load balancer firewall is a nested block whose
  # allow entries are encoded with cidr:/ip: prefixes; the runtime check inspects
  # the normalized source list, and expressing the any-address refinement across
  # terraform-hcl/plan/state adds fragility for a narrow refinement.
  - uid: mondoo-digitalocean-security-lb-firewall-allowlist-not-open
    title: Ensure load balancer firewall allowlists are not open to all
    impact: 70
    filters: asset.platform == "digitalocean-loadbalancer"
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-7
    mql: |
      digitalocean.loadBalancer.firewallAllow == empty || digitalocean.loadBalancer.firewallAllow.all(_.contains("/0") == false)
    docs:
      desc: |
        This check ensures that when a DigitalOcean load balancer defines a source-IP firewall allowlist, that allowlist does not include an any-address entry with a `/0` mask such as `0.0.0.0/0` or `::/0`. A load balancer firewall allowlist is meant to restrict which source addresses can reach the balancer; an any-address entry defeats that purpose while giving the false impression that access is controlled.

        **Why this matters**

        - **False sense of restriction:** An allowlist containing `0.0.0.0/0` looks like a control in the console and in code review, but admits every host on the internet just as if no allowlist existed.
        - **Silent scope creep:** A specific allowlist that later has an any-address entry added — often as a temporary troubleshooting step — quietly reopens the load balancer to the world.
        - **Bypassed segmentation:** Load balancers front application backends; an unrestricted allowlist exposes those backends to internet-wide scanning and attack.

        **Risk mitigation**

        - **Attack surface:** Restricting the allowlist to the specific source ranges that need access removes the load balancer from opportunistic internet scanning.
        - **Auditable intent:** An allowlist without an any-address entry accurately reflects who is permitted to reach the balancer.

        Replace any-address entries with the specific administrative, client, or CDN source ranges that legitimately need to reach the load balancer. A load balancer that is intentionally public simply omits the allowlist rather than allowlisting `0.0.0.0/0`.
      audit: |
        ### Audit via Console

        1. Sign in to the DigitalOcean [Cloud Control Panel](https://cloud.digitalocean.com/).
        2. Navigate to **Networking** > **Load Balancers** and open each load balancer.
        3. On the **Settings** tab, review the firewall (allow/deny) rules.

        A passing load balancer either has no allow rules or lists only specific source ranges. A failing load balancer has an allow rule of `0.0.0.0/0` or `::/0`.

        ### Audit via CLI

        1. List the load balancers and inspect each one's firewall rules:

        ```bash
        doctl compute load-balancer list --format ID,Name,IP
        doctl compute load-balancer get <load-balancer-id>
        ```

        A passing load balancer's allow list is empty or contains only specific ranges. A failing load balancer's allow list contains `cidr:0.0.0.0/0` or `cidr:::/0`.
      remediation:
        - id: console
          desc: |
            To tighten a load balancer firewall allowlist in the DigitalOcean Cloud Control Panel:

            1. Navigate to **Networking** > **Load Balancers** and open the affected load balancer.
            2. On the **Settings** tab, edit the firewall rules and remove the `0.0.0.0/0` / `::/0` allow entry.
            3. Add the specific source ranges that need access, or remove the allowlist entirely if the load balancer is meant to be public.
        - id: cli
          desc: |
            To replace an any-address allowlist with specific source ranges using the `doctl` CLI:

            ```bash
            doctl compute load-balancer update <load-balancer-id> \
              --allow-list cidr:203.0.113.0/24,ip:198.51.100.10
            ```

            Provide the trusted source ranges that need access. Omit the allowlist entirely if the load balancer is intentionally public.
        # No Terraform remediation: the load balancer firewall is a nested block on
        # digitalocean_loadbalancer using cidr:/ip: encoded entries; fix it by editing
        # the firewall.allow list in that block to remove any-address entries.
    refs:
      - url: https://docs.digitalocean.com/products/networking/load-balancers/how-to/manage/
        title: Manage DigitalOcean load balancers
