  - uid: mondoo-digitalocean-security-firewall-no-all-ports-open
    title: Ensure no firewall allows unrestricted inbound on all ports
    impact: 100
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-digitalocean-security-firewall-no-all-ports-open-digitalocean
        tags:
          mondoo.com/filter-title: DigitalOcean
          mondoo.com/filter-icon: digitalocean
      - uid: mondoo-digitalocean-security-firewall-no-all-ports-open-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-digitalocean-security-firewall-no-all-ports-open-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-digitalocean-security-firewall-no-all-ports-open-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that no Cloud Firewall has an inbound rule opening the full port range (`0`, `all`, `1-65535`, or `0-65535`) from the public internet. Firewalls must only expose specific ports required by the workload.

        **Why this matters**

        - **Complete exposure:** An allow-all-ports-from-anywhere rule is functionally equivalent to having no firewall; every service on the Droplet is reachable from every host on the internet.
        - **Unknown service exposure:** Droplets often have services bound to non-standard ports during development or installed by packages; an all-ports rule exposes those unintended listeners alongside the intended ones.
        - **Firewall intent violation:** A firewall configured to allow everything provides zero protection and creates false confidence that traffic is being filtered.

        **Risk mitigation**

        - **Mandatory specificity:** Replacing all-ports rules with explicit per-port rules forces an explicit decision about each service that should be exposed, surfacing forgotten or unintended listeners.
        - **Blast radius reduction:** Even if one exposed service is compromised, specific port rules limit how an attacker can pivot to other services on the same host or adjacent hosts.
      audit: |
        ### Audit via Console

        1. Sign in to the DigitalOcean [Cloud Control Panel](https://cloud.digitalocean.com/).
        2. Navigate to **Networking** > **Firewalls**.
        3. Open each firewall and review the **Inbound Rules** table.
        4. Look for any rule that specifies **All ports** or the full port range (`0`, `1-65535`, `0-65535`) with a source of `All IPv4` or `All IPv6`.

        A passing firewall has no inbound rule allowing all ports from an unrestricted source. A failing firewall contains a catch-all inbound rule sourced from `0.0.0.0/0` or `::/0`.

        ### Audit via CLI

        1. List all firewalls and retrieve their inbound rules:

        ```bash
        doctl compute firewall list --format ID,Name
        doctl compute firewall get <firewall-id> --format InboundRules
        ```

        A passing firewall returns no inbound rule with `ports:0`, `ports:all`, `ports:1-65535`, or `ports:0-65535` paired with `address:0.0.0.0/0` or `address:::/0`. A failing firewall returns such a rule.
      remediation:
        - id: console
          desc: |
            To fix this in the DigitalOcean Cloud Control Panel:

            1. Navigate to **Networking** > **Firewalls** and open the affected firewall.
            2. Remove the wide-open rule (`All ports` or full port range with `All IPv4`/`All IPv6` source).
            3. Replace it with narrow rules that expose only the specific ports required by the workload, scoped to trusted source CIDRs, tags, or Droplet IDs.
            4. Save the firewall.
        - id: cli
          desc: |
            To fix this on the command line using the `doctl` CLI, first read the rule exactly as the firewall stores it, then remove it for both the IPv4 and IPv6 catch-all sources. Match the `ports` value the firewall reports, which may be `0`, `all`, `1-65535`, or `0-65535`, and repeat for `udp` rules if present:

            ```bash
            doctl compute firewall get "<firewall-id>" --format InboundRules
            doctl compute firewall remove-rules "<firewall-id>" \
              --inbound-rules "protocol:tcp,ports:all,address:0.0.0.0/0 protocol:tcp,ports:all,address:::/0"
            ```

            Replace the removed rule with narrow rules that expose only the specific ports required by the workload, scoped to trusted source CIDRs.
        - id: terraform
          desc: |
            To avoid a catch-all rule in Terraform, define `inbound_rule` blocks that name only the specific ports the workload needs instead of `port_range = "all"` (or the full range), and scope `source_addresses`:

            ```hcl
            resource "digitalocean_firewall" "example" {
              name = "example"

              inbound_rule {
                protocol         = "tcp"
                port_range       = "443"
                source_addresses = ["0.0.0.0/0", "::/0"]
              }
            }
            ```
    refs:
      - url: https://docs.digitalocean.com/products/networking/firewalls/how-to/configure-rules/
        title: Configure Cloud Firewall rules

  - uid: mondoo-digitalocean-security-firewall-no-all-ports-open-digitalocean
    filters: asset.platform == "digitalocean-firewall"
    mql: |
      digitalocean.firewall.ingressRules.where(openToInternet).none(ports.in(["0", "all", "1-65535", "0-65535"]))
  - uid: mondoo-digitalocean-security-firewall-no-all-ports-open-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "digitalocean_firewall")
    mql: |
      terraform.resources("digitalocean_firewall").all(
        blocks.where(type == "inbound_rule").none(
          arguments["port_range"] == /^(0|all|1-65535|0-65535)$/ &&
          arguments["source_addresses"].contains("0.0.0.0/0")
        ) &&
        blocks.where(type == "inbound_rule").none(
          arguments["port_range"] == /^(0|all|1-65535|0-65535)$/ &&
          arguments["source_addresses"].contains("::/0")
        )
      )
  - uid: mondoo-digitalocean-security-firewall-no-all-ports-open-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "digitalocean_firewall")
    mql: |
      terraform.plan.resourceChanges.where(type == "digitalocean_firewall").all(
        change.after["inbound_rule"] == empty ||
        change.after["inbound_rule"].none(_["port_range"] == /^(0|all|1-65535|0-65535)$/ && _["source_addresses"].contains("0.0.0.0/0")) &&
        change.after["inbound_rule"].none(_["port_range"] == /^(0|all|1-65535|0-65535)$/ && _["source_addresses"].contains("::/0"))
      )
  - uid: mondoo-digitalocean-security-firewall-no-all-ports-open-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "digitalocean_firewall")
    mql: |
      terraform.state.resources.where(type == "digitalocean_firewall").all(
        values["inbound_rule"] == empty ||
        values["inbound_rule"].none(_["port_range"] == /^(0|all|1-65535|0-65535)$/ && _["source_addresses"].contains("0.0.0.0/0")) &&
        values["inbound_rule"].none(_["port_range"] == /^(0|all|1-65535|0-65535)$/ && _["source_addresses"].contains("::/0"))
      )

  # No Terraform variants: this check requires cross-resource correlation between
  # digitalocean_database_cluster and digitalocean_database_firewall (matched by
  # cluster_id), which is awkward to express reliably in MQL on Terraform sources.
  # The runtime check reads the firewallRules collected per cluster server-side. This
  # is the same correlation limitation as mondoo-digitalocean-security-droplet-firewall-coverage.
  - uid: mondoo-digitalocean-security-db-firewall-configured
    filters: asset.platform == "digitalocean-database"
    title: Ensure managed databases restrict access via Trusted Sources
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-7
    mql: |
      digitalocean.database.firewallRules != empty
    docs:
      desc: |
        This check ensures that every managed database cluster has at least one Trusted Sources entry, restricting inbound connections to specific Droplets, tags, Kubernetes clusters, applications, or IP addresses. By default, a newly created managed database cluster accepts connections from any source that presents valid credentials.

        **Why this matters**

        - **Credential leak containment:** Without Trusted Sources, a database password that leaks from application logs, source control, or developer laptops can be used from any internet host to connect directly.
        - **Lateral movement prevention:** Trusted Sources ensure that even a fully compromised application server cannot be used as a pivot to reach databases that the compromised host was never authorized to access.
        - **Defense in depth:** Network-level restrictions complement database-level authentication; both layers must be defeated for an attacker to access database contents.

        **Risk mitigation**

        - **Credential compromise isolation:** Scoping access to specific Droplets, tags, or CIDRs means a leaked credential is only usable from the authorized infrastructure, not from arbitrary internet hosts.
        - **Audit clarity:** A Trusted Sources list provides an explicit inventory of every authorized client, making it straightforward to identify unauthorized access attempts in database logs.
      audit: |
        ### Audit via Console

        1. Sign in to the DigitalOcean [Cloud Control Panel](https://cloud.digitalocean.com/).
        2. Navigate to **Databases** and open each cluster.
        3. Go to **Settings** > **Trusted Sources**.
        4. Verify that at least one Trusted Sources entry is listed.

        A passing database cluster has one or more Trusted Sources entries. A failing database cluster shows an empty Trusted Sources list, meaning any source can attempt a connection.

        ### Audit via CLI

        1. List all database clusters, then retrieve the firewall rules for each:

        ```bash
        doctl databases list --format ID,Name,Engine,Region
        doctl databases firewalls list <database-id>
        ```

        A passing database returns one or more firewall rules. A failing database returns an empty list of firewall rules.
      remediation:
        - id: console
          desc: |
            To fix this in the DigitalOcean Cloud Control Panel:

            1. Navigate to **Databases** and open the affected cluster.
            2. Go to **Settings** > **Trusted Sources**.
            3. Add the Droplets, tags, apps, Kubernetes clusters, or specific IP addresses that need database access.
        - id: cli
          desc: |
            To fix this on the command line using the `doctl` CLI, append a Trusted Source rule for each Droplet or CIDR that needs access:

            ```bash
            doctl databases firewalls append <database-id> \
              --rule droplet:<droplet-id>
            doctl databases firewalls append <database-id> \
              --rule ip_addr:<cidr>
            ```
        # No Terraform remediation: the same cross-resource correlation limitation as the variants above. Trusted Sources are a separate digitalocean_database_firewall resource referencing cluster_id, so an HCL snippet cannot assert coverage of an arbitrary cluster.
    refs:
      - url: https://docs.digitalocean.com/products/databases/postgresql/how-to/secure/
        title: Secure a managed database cluster

  - uid: mondoo-digitalocean-security-db-in-private-network
    title: Ensure managed databases are attached to a private network
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-5
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-1-5
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-digitalocean-security-db-in-private-network-digitalocean
        tags:
          mondoo.com/filter-title: DigitalOcean
          mondoo.com/filter-icon: digitalocean
      - uid: mondoo-digitalocean-security-db-in-private-network-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-digitalocean-security-db-in-private-network-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-digitalocean-security-db-in-private-network-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that every managed database cluster is attached to a VPC private network. By default, managed databases receive a public connection string and must be connected over the internet unless a private network is configured at creation time.

        **Why this matters**

        - **Traffic confidentiality:** Without a private network, database traffic between applications and the cluster traverses public-facing endpoints, increasing the path length and number of hops where traffic can be observed.
        - **Reduced attack surface:** A database reachable only on private IPs is not directly accessible from the internet even if Trusted Sources are misconfigured, providing a second layer of protection.
        - **Application simplicity:** VPC-attached databases provide a private hostname that applications use without requiring per-connection TLS certificate pinning or public DNS.

        **Risk mitigation**

        - **Network isolation:** Private network attachment keeps all database traffic inside DigitalOcean's infrastructure, removing it from internet-facing routing paths entirely.
        - **Misconfiguration resilience:** A VPC-only database cannot be reached from the internet even if a firewall rule is accidentally opened, limiting the consequence of a separate misconfiguration.
      audit: |
        ### Audit via Console

        1. Sign in to the DigitalOcean [Cloud Control Panel](https://cloud.digitalocean.com/).
        2. Navigate to **Databases** and open each cluster.
        3. Go to **Overview** and check the **Network** section for a private network (VPC) assignment.

        A passing database cluster shows a VPC name under the Network section. A failing database cluster shows no private network or only a public endpoint.

        ### Audit via CLI

        1. List all database clusters and inspect each cluster's private network UUID:

        ```bash
        doctl databases list --output json | jq -r '.[] | [.id, .name, .engine, .private_network_uuid] | @tsv'
        ```

        A passing database cluster returns a non-empty `private_network_uuid`. A failing database cluster returns an empty value.
      remediation:
        - id: console
          desc: |
            DigitalOcean does not support moving an existing managed database into a VPC. The fix is a destructive cutover to a replacement cluster, so plan for downtime and treat it as a migration.

            A fork or new cluster does not inherit the source's Trusted Sources, database users, or connection pools, so you must re-apply them before cutover. A fork must be created in the same region as the source cluster.

            To fix this in the DigitalOcean Cloud Control Panel, create a fork or a new cluster in the desired VPC, migrate the data, and retire the original:

            1. Navigate to **Databases** and open the affected cluster.
            2. Create a fork, a point-in-time snapshot, and select a VPC under **Network** in the creation flow. Keep the fork in the same region as the source.
            3. Re-create the database users, connection pools, and Trusted Sources on the new cluster, since these are not carried over.
            4. Cut applications over to the new cluster's private endpoint and verify connectivity.
            5. Destroy the original cluster only after the replacement is confirmed healthy.
        - id: cli
          desc: |
            This fix is a destructive cutover to a replacement cluster, so plan for downtime. A new cluster created with `--private-network-uuid` is empty and does not inherit the source's Trusted Sources, database users, or connection pools, so you must migrate the data and re-apply those settings before cutover.

            To fix this on the command line using the `doctl` CLI, create a replacement cluster inside the target VPC and migrate data into it:

            ```bash
            doctl databases create <new-name> \
              --engine <engine> \
              --region <region> \
              --private-network-uuid <vpc-uuid>
            ```

            After the cluster is created, migrate the data, re-create the users and connection pools, re-apply the Trusted Sources, then cut applications over and destroy the original.
        - id: terraform
          desc: |
            To attach a managed database to a VPC in Terraform, set `private_network_uuid` on the `digitalocean_database_cluster` resource:

            ```hcl
            resource "digitalocean_database_cluster" "example" {
              name                 = "example"
              engine               = "pg"
              version              = "16"
              size                 = "db-s-1vcpu-1gb"
              region               = "nyc3"
              node_count           = 1
              private_network_uuid = digitalocean_vpc.example.id
            }
            ```
    refs:
      - url: https://docs.digitalocean.com/products/databases/postgresql/how-to/connect/
        title: Connect to a managed database cluster

  - uid: mondoo-digitalocean-security-db-in-private-network-digitalocean
    filters: asset.platform == "digitalocean-database"
    mql: |
      digitalocean.database.privateNetworkUuid != ""
  - uid: mondoo-digitalocean-security-db-in-private-network-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "digitalocean_database_cluster")
    mql: |
      terraform.resources("digitalocean_database_cluster").all(arguments.private_network_uuid != empty)
  - uid: mondoo-digitalocean-security-db-in-private-network-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "digitalocean_database_cluster")
    mql: |
      terraform.plan.resourceChanges.where(type == "digitalocean_database_cluster").all(change.after.private_network_uuid != empty)
  - uid: mondoo-digitalocean-security-db-in-private-network-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "digitalocean_database_cluster")
    mql: |
      terraform.state.resources.where(type == "digitalocean_database_cluster").all(values.private_network_uuid != empty)

  # No Terraform variants: internetReachable resolves the cluster's live public connection
  # endpoint against its effective trusted-source firewall rules. The digitalocean_database_cluster
  # Terraform resource exposes neither the resolved public reachability nor the evaluated
  # trusted-source decision, so there is nothing equivalent to assert in HCL, plan, or state.
  # The db-in-private-network and db-firewall-configured checks already cover the
  # Terraform-expressible posture.
  - uid: mondoo-digitalocean-security-db-not-internet-reachable
    title: Ensure managed databases are not reachable from the internet
    impact: 85
    filters: asset.platform == "digitalocean-database"
    mql: |
      digitalocean.database.internetReachable == false
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-06
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-5
      compliance/pci-dss-4: pcidss-requirement-1-4-1
      compliance/soc2-2017: soc2-control-cc6-1-5
      compliance/vda-isa-5: vda-isa-5-5-2-7
    docs:
      desc: |
        This check ensures that no managed database cluster is reachable from the public internet. `internetReachable` is true when the cluster has a public connection endpoint and its trusted-source firewall rules admit any address, including the case where no trusted sources are configured at all and the public endpoint is left open to every host. It is a higher-fidelity signal than the presence of a public endpoint alone because it accounts for whether the trusted-source rules actually restrict access.

        **Why this matters**

        - **Reduced attack surface:** A database that no internet host can reach is removed from the pool of targets for credential-stuffing and protocol-level attacks against the database engine.
        - **Misconfiguration resilience:** Correlating the public endpoint with the trusted-source rules catches the common failure where a cluster keeps its public endpoint and the trusted-source list is empty or world-open.
        - **Defense in depth:** Keeping the cluster private supplements engine authentication, so a weak or leaked credential is not directly exploitable from the internet.

        **Risk mitigation**

        - **Data exfiltration:** Removes the direct internet path an attacker would use to reach the database with stolen or brute-forced credentials.
        - **Internet-wide scanning:** Takes the database endpoint off the public scanning grid entirely.
      audit: |
        ### Audit via Console

        1. Sign in to the DigitalOcean [Cloud Control Panel](https://cloud.digitalocean.com/).
        2. Navigate to **Databases** and open each cluster.
        3. On the **Overview** tab, review the **Connection Details** for a public host, and on the **Settings** tab review the **Trusted Sources** list.

        A passing database cluster either exposes no public connection endpoint or restricts its trusted sources to specific resources or CIDRs. A failing database cluster exposes a public endpoint while its trusted sources admit any address or are empty.

        ### Audit via CLI

        1. List clusters and inspect each cluster's trusted-source firewall rules:

        ```bash
        doctl databases list --format ID,Name,Engine
        doctl databases firewalls list <database-id>
        ```

        A passing database cluster returns trusted-source rules that name specific droplets, tags, Kubernetes clusters, or narrow CIDRs. A failing database cluster returns an `ip_addr` rule of `0.0.0.0/0` or `::/0`, or no trusted-source rules at all while a public endpoint is in use.
      remediation:
        - id: console
          desc: |
            To close the internet-reachable path in the DigitalOcean Cloud Control Panel:

            1. Navigate to **Databases** and open the affected cluster.
            2. On the **Settings** tab, edit **Trusted Sources** and add the specific droplets, tags, Kubernetes clusters, or narrow CIDRs that need access.
            3. Remove any trusted-source entry of `0.0.0.0/0` or `::/0`, and confirm at least one restrictive trusted source remains so the public endpoint is no longer open to every host.
            4. Where the cluster does not need a public edge, attach it to a VPC and connect over the private endpoint instead.
        - id: cli
          desc: |
            To restrict the trusted sources on the command line using the `doctl` CLI, replace any world-open rule with specific sources:

            ```bash
            doctl databases firewalls append <database-id> --rule ip_addr:203.0.113.10
            doctl databases firewalls append <database-id> --rule droplet:<droplet-id>
            doctl databases firewalls list <database-id>
            ```

            After confirming the restrictive rules are in place, remove the world-open rule by re-applying the full rule set without it using `doctl databases firewalls replace <database-id> --rule ...`.
        # No Terraform remediation: internetReachable is a runtime correlation of the live
        # public endpoint with the effective trusted-source rules and has no single
        # configuration analog. Express the desired posture with the db-in-private-network
        # and db-firewall-configured Terraform remediations instead.
    refs:
      - url: https://docs.digitalocean.com/products/databases/postgresql/how-to/secure/
        title: Secure a managed database cluster

  - uid: mondoo-digitalocean-security-db-engine-supported-version
    title: Ensure managed database engines are not running an EOL version
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-tvm-03
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-8
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-12
      compliance/nist-csf-2: nist-csf-2-pr-ps-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-1
      compliance/pci-dss-4: pcidss-requirement-6-3-3
      compliance/soc2-2017: soc2-control-cc7-1-5
      compliance/vda-isa-5: vda-isa-5-5-2-5
    variants:
      - uid: mondoo-digitalocean-security-db-engine-supported-version-digitalocean
        tags:
          mondoo.com/filter-title: DigitalOcean
          mondoo.com/filter-icon: digitalocean
      - uid: mondoo-digitalocean-security-db-engine-supported-version-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-digitalocean-security-db-engine-supported-version-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-digitalocean-security-db-engine-supported-version-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that managed database clusters are not running a database engine version that has reached end of life or is no longer receiving security patches from its upstream maintainer or from DigitalOcean.

        **Why this matters**

        - **No security patches:** Databases on end-of-life versions do not receive patches for newly disclosed CVEs, meaning known vulnerabilities accumulate without remediation.
        - **Active exploitation:** Known-exploited CVEs in older PostgreSQL, MySQL, Redis, MongoDB, and other database releases are routinely weaponized in targeted and opportunistic attacks.
        - **Compliance exposure:** Most security frameworks require that software components receive vendor security support; end-of-life engines fail this requirement regardless of other controls in place.
        - **Feature gaps:** Supported versions include protocol-level security improvements such as stronger TLS defaults and authentication mechanisms that older versions lack.

        **Risk mitigation**

        - **Patch coverage restoration:** Migrating to a supported major version restores the flow of security patches, closing accumulating CVE exposure without requiring other configuration changes.
        - **Supported upgrade path:** DigitalOcean provides upgrade tooling for supported engine transitions; acting before a version reaches EOL avoids more disruptive cold-migration paths.
      audit: |
        ### Audit via Console

        Treat the versions that DigitalOcean currently offers as the authoritative list of supported versions. The set of EOL versions changes over time, so check the live `doctl databases options versions` output for each engine rather than relying on a static list. The version ranges below are examples that were EOL at the time of writing and may be incomplete now.

        1. Sign in to the DigitalOcean [Cloud Control Panel](https://cloud.digitalocean.com/).
        2. Navigate to **Databases** and review the **Engine Version** column for each cluster.
        3. Compare each engine and version against the versions DigitalOcean currently offers for that engine. Examples of versions that were EOL at the time of writing include PostgreSQL 9.x through 13, MySQL 5.6 and 5.7, Redis 4 through 6, MongoDB 3.6 through 5.0, Kafka 2.8 through 3.4, and OpenSearch 1.x. Confirm the current set with the CLI step below.

        A passing database cluster runs a version that DigitalOcean still offers for its engine. A failing database cluster runs a version absent from the current supported list.

        ### Audit via CLI

        1. List all clusters with their engine and version, then check the versions DigitalOcean currently supports. Treat this live output as authoritative, since the supported set changes as versions reach EOL:

        ```bash
        doctl databases list --format ID,Name,Engine,Version,Region
        doctl databases options versions --engine pg
        doctl databases options versions --engine mysql
        doctl databases options versions --engine redis
        doctl databases options versions --engine mongodb
        doctl databases options versions --engine kafka
        doctl databases options versions --engine opensearch
        ```

        A passing cluster shows a version in the current supported list for its engine. A failing cluster shows a version absent from that list.
      remediation:
        - id: console
          desc: |
            Major-version upgrades for managed databases on DigitalOcean require a migration path. First confirm the current supported target versions for your engine with `doctl databases options versions --engine <engine>`, since the supported set changes as versions reach EOL. Review the DigitalOcean upgrade documentation for your engine, run the upgrade in a non-production clone first, then cut over. To fix this in the DigitalOcean Cloud Control Panel:

            1. Navigate to **Databases** and open the affected cluster.
            2. Go to **Settings** > **Upgrade Major Version**. Availability depends on the engine.
            3. Follow the prompts. Otherwise, create a new cluster on a supported version and migrate data using `pg_dump`, `mysqldump`, or native replication.
        - id: cli
          desc: |
            `doctl` does not perform an in-place major-version upgrade; `doctl databases migrate` only changes regions. Spin up a replacement cluster on a supported version and cut over with engine-native tools.

            1. Identify affected clusters and list supported versions for each engine:

                ```bash
                doctl databases list --format ID,Name,Engine,Version,Region,Size
                doctl databases options versions --engine pg
                doctl databases options versions --engine mysql
                doctl databases options versions --engine redis
                doctl databases options versions --engine mongodb
                doctl databases options versions --engine kafka
                doctl databases options versions --engine opensearch
                ```

            2. Provision a replacement cluster on a supported version. Match the existing region, size, and node count:

                ```bash
                doctl databases create <new-name> \
                  --engine pg \
                  --version 16 \
                  --region <region> \
                  --size <size-slug> \
                  --num-nodes <count> \
                  --private-network-uuid <vpc-uuid>
                ```

            3. Pull connection info for the new cluster and migrate data with engine-native tools (`pg_dump | pg_restore`, `mysqldump`, `MIGRATE` for Redis, etc.):

                ```bash
                doctl databases connection <new-cluster-id> --format Host,Port,User,Password,Database
                ```

            4. Repoint applications, then delete the old cluster once migration is verified:

                ```bash
                doctl databases delete <old-cluster-id>
                ```
        - id: terraform
          desc: |
            Terraform manages the engine version through the `version` argument on `digitalocean_database_cluster`. Set it to a supported major version. Note that Terraform performs an in-place update only where the engine supports it; otherwise the resource is replaced, so review the plan and back up data first:

            ```hcl
            resource "digitalocean_database_cluster" "example" {
              name       = "example"
              engine     = "pg"
              version    = "16"
              size       = "db-s-1vcpu-1gb"
              region     = "nyc3"
              node_count = 1
            }
            ```
    refs:
      - url: https://docs.digitalocean.com/products/databases/postgresql/how-to/upgrade-major-version/
        title: Upgrade a managed database major version

  - uid: mondoo-digitalocean-security-db-engine-supported-version-digitalocean
