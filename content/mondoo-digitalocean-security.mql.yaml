  # No Terraform variants: this check inspects the scheme of each app's live_url,
  # which is a read-only computed attribute. App Platform always provisions managed
  # TLS, so an HTTP live_url reflects a misconfigured custom domain at runtime — a
  # condition the digitalocean_app resource has no argument to express, and that is
  # absent from HCL and from a terraform plan before apply.
  - uid: mondoo-digitalocean-security-app-platform-https
    title: Ensure App Platform apps are served over HTTPS
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-2-ii-transmission-security-encryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    mql: |
      digitalocean.apps.where(liveUrl != "").all(liveUrl == /^https:\/\//)
    docs:
      desc: |
        This check ensures that every DigitalOcean App Platform application with a public live URL serves requests over HTTPS. App Platform automatically provisions managed TLS certificates for app URLs, so an HTTP live URL indicates a misconfigured custom domain or an incorrectly deployed application.

        **Why this matters**

        - **Request and response protection:** An app served over HTTP exposes every request and response to interception and modification, including authentication flows, session tokens, and API payloads.
        - **Managed TLS availability:** App Platform provides managed TLS certificates for all `ondigitalocean.app` URLs at no additional cost, so there is no technical barrier to serving apps over HTTPS.
        - **Misconfiguration signal:** An HTTP live URL is a reliable indicator of a custom domain configuration error that, if uncorrected, will also prevent certificate issuance for that domain.

        **Risk mitigation**

        - **Eavesdropping prevention:** HTTPS ensures all traffic between end users and the App Platform edge is encrypted, removing the ability for passive network observers to read application data.
        - **Session hijacking prevention:** Serving session cookies and authentication tokens only over HTTPS prevents them from being captured by network-level attackers and reused to impersonate authenticated users.
      audit: |
        ### Audit via Console

        1. Sign in to the DigitalOcean [Cloud Control Panel](https://cloud.digitalocean.com/).
        2. Navigate to **App Platform** and review the **Live URL** column for each app.
        3. Confirm that every live URL begins with `https://`.

        A passing app shows a live URL that starts with `https://`. A failing app shows a live URL that starts with `http://`.

        ### Audit via CLI

        1. List all apps and inspect their live URLs:

        ```bash
        doctl apps list --format ID,DefaultIngress,LiveURL
        ```

        A passing app returns a `LiveURL` that begins with `https://`. A failing app returns a `LiveURL` that begins with `http://`.
      remediation:
        - id: console
          desc: |
            To fix this in the DigitalOcean Cloud Control Panel:

            1. Navigate to **App Platform** and open the affected app.
            2. Go to **Settings** > **Domains**.
            3. Remove or correct any custom domain without a managed certificate, and verify that the generated app URL on `ondigitalocean.app` is reachable over HTTPS.
            4. Trigger a new deployment if needed.
        - id: cli
          desc: |
            App Platform serves managed TLS certificates automatically, so an HTTP `liveUrl` almost always means a custom domain is misconfigured. Pull the spec, fix the broken domain, and reapply.

            1. Locate the affected app and pull its spec:

                ```bash
                doctl apps list --format ID,DefaultIngress,LiveURL,Spec.Name
                doctl apps spec get <app-id> > app.yaml
                ```

            2. Edit `app.yaml` to remove or correct the misconfigured custom domain. Each entry under `domains:` must point at a domain whose CNAME or A record resolves to the app's `ondigitalocean.app` ingress so App Platform can issue a managed cert. If the custom domain is no longer needed, drop the entry — the default `*.ondigitalocean.app` URL is always served over HTTPS.

                ```yaml
                domains:
                  - domain: app.example.com
                    type: PRIMARY
                ```

            3. Validate the spec, push it, and trigger a fresh deployment so the cert is reissued:

                ```bash
                doctl apps spec validate app.yaml
                doctl apps update <app-id> --spec app.yaml
                doctl apps create-deployment <app-id>
                ```

            4. Confirm the live URL is now HTTPS:

                ```bash
                doctl apps get <app-id> --format ID,LiveURL
                ```
        # No Terraform remediation: an HTTP live_url is caused by a custom domain
        # whose DNS does not resolve to the app's ingress, which Terraform cannot
        # fix — the domain block in digitalocean_app does not control certificate
        # issuance or the resulting URL scheme.
    refs:
      - url: https://docs.digitalocean.com/products/app-platform/how-to/manage-domains/
        title: Manage App Platform domains and certificates
