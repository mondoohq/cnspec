        values.version == /^1\.(3[0-9]|[4-9][0-9]|[1-9][0-9]{2})\./
      )

  # No Terraform variants: SSO configuration was added to the DigitalOcean godo
  # SDK in v1.187.0 and the digitalocean Terraform provider does not yet expose
  # an `sso` block on digitalocean_kubernetes_cluster. Revisit once the provider
  # adds the field.
  # No Terraform remediation: see above.
  - uid: mondoo-digitalocean-security-doks-sso-enabled
    title: Ensure DOKS clusters have SSO configured
    impact: 50
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-14
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-2
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-2
    mql: |
      digitalocean.kubernetesClusters.all(ssoEnabled == true)
    docs:
      desc: |
        This check ensures that every DOKS cluster has Single Sign-On (SSO) configured against an OIDC identity provider. Without SSO configured, cluster authentication relies entirely on static kubeconfig tokens with no identity-provider integration.

        **Why this matters**

        - **Centralized identity management:** SSO configuration connects the cluster to an authoritative identity provider, enabling user lifecycle events such as offboarding to propagate to cluster access automatically.
        - **MFA enablement:** Once SSO is configured, MFA policies defined in the identity provider apply to cluster authentication, raising the bar for credential-based attacks.
        - **Access visibility:** IdP-integrated authentication creates an audit trail in the identity provider that shows who authenticated to the cluster and when, which static tokens do not provide.

        **Risk mitigation**

        - **Stale access prevention:** Identity-provider integration enables revoking a user's cluster access by deprovisioning their IdP account, without requiring separate kubeconfig rotation for each cluster.
        - **Prerequisite for enforcement:** SSO must be configured before it can be required; establishing the integration is the necessary first step toward fully enforced IdP-based cluster authentication.
      audit: |
        ### Audit via Console

        1. Sign in to the DigitalOcean [Cloud Control Panel](https://cloud.digitalocean.com/).
        2. Navigate to **Kubernetes** and open each cluster.
        3. Go to **Settings** > **Single Sign-On** and check whether an OIDC identity provider is configured.

        A passing cluster shows an SSO configuration with an issuer URL and client ID. A failing cluster shows the SSO section as unconfigured.

        ### Audit via CLI

        1. Query the DOKS SSO configuration for each cluster using the DigitalOcean API:

        ```bash
        curl -s -H "Authorization: Bearer $DIGITALOCEAN_TOKEN" \
          https://api.digitalocean.com/v2/kubernetes/clusters/<cluster-id>/sso
        ```

        A passing cluster returns a response with `"enabled": true`. A failing cluster returns `"enabled": false` or an empty SSO configuration.
      remediation:
        - id: console
          desc: |
            To fix this in the DigitalOcean Cloud Control Panel:

            1. Navigate to **Kubernetes** and open the affected cluster.
            2. Go to **Settings** > **Single Sign-On**.
            3. Configure the OIDC identity provider (issuer URL, client ID, client secret).
            4. Save. Plan a follow-up to enable **Require SSO for cluster access** once users are migrated.
        - id: cli
          desc: |
            DOKS SSO configuration is managed through the DigitalOcean API and Cloud Control Panel; `doctl` does not expose `sso` flags on `kubernetes cluster update`. Configure SSO in the Cloud Control Panel as described above, or call the DigitalOcean API directly:

            ```bash
            curl -X PUT \
              -H "Authorization: Bearer $DIGITALOCEAN_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"enabled":true,"required":false,"issuer_url":"<oidc-issuer-url>","client_id":"<client-id>","client_secret":"<client-secret>"}' \
              https://api.digitalocean.com/v2/kubernetes/clusters/<cluster-id>/sso
            ```
    refs:
      - url: https://docs.digitalocean.com/products/kubernetes/how-to/manage-cluster-access/
        title: Manage DOKS cluster access

  # No Terraform variants: SSO configuration was added to the DigitalOcean godo
  # SDK in v1.187.0 and the digitalocean Terraform provider does not yet expose
  # an `sso` block on digitalocean_kubernetes_cluster. Revisit once the provider
  # adds the field.
  # No Terraform remediation: see above.
  - uid: mondoo-digitalocean-security-doks-sso-required
    title: Ensure DOKS clusters require SSO for cluster authentication
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-14
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-2
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-2
    mql: |
      digitalocean.kubernetesClusters.all(ssoRequired == true)
    docs:
      desc: |
        This check ensures that every DOKS cluster has SSO both configured and required for all cluster authentication, so that kubectl access is authenticated through the OIDC identity provider rather than through static tokens. Enabling SSO without requiring it leaves static-token paths active.

        **Why this matters**

        - **Static token elimination:** Requiring SSO disables static kubeconfig tokens as a valid authentication path, ensuring every user session is backed by a live IdP session that can be revoked.
        - **Joiner/mover/leaver enforcement:** With SSO required, deprovisioning a user in the identity provider immediately revokes their cluster access without requiring separate kubeconfig rotation.
        - **MFA coverage:** Required SSO ensures MFA policies in the IdP apply to every cluster authentication attempt, not only to users who happen to use the SSO flow voluntarily.

        **Risk mitigation**

        - **Revocation immediacy:** Revoking a user at the IdP takes effect at the next kubectl session, eliminating the window where a former employee or compromised account retains access via a pre-issued token.
        - **Credential theft impact reduction:** Even if a static kubeconfig token is exfiltrated, required SSO prevents its use because the API server will not accept non-IdP-issued credentials.
      audit: |
        ### Audit via Console

        1. Sign in to the DigitalOcean [Cloud Control Panel](https://cloud.digitalocean.com/).
        2. Navigate to **Kubernetes** and open each cluster.
        3. Go to **Settings** > **Single Sign-On** and check whether **Require SSO for cluster access** is enabled.

        A passing cluster shows **Require SSO for cluster access** as enabled. A failing cluster has SSO configured but the require toggle disabled, or has no SSO configured at all.

        ### Audit via CLI

        1. Query the DOKS SSO configuration for each cluster using the DigitalOcean API:

        ```bash
        curl -s -H "Authorization: Bearer $DIGITALOCEAN_TOKEN" \
          https://api.digitalocean.com/v2/kubernetes/clusters/<cluster-id>/sso
        ```

        A passing cluster returns a response with both `"enabled": true` and `"required": true`. A failing cluster returns `"required": false` or has no SSO configured.
      remediation:
        - id: console
          desc: |
            To fix this in the DigitalOcean Cloud Control Panel:

            1. Navigate to **Kubernetes** and open the affected cluster.
            2. Go to **Settings** > **Single Sign-On**.
            3. Configure the OIDC identity provider (issuer URL, client ID, client secret) if not already done.
            4. Enable **Require SSO for cluster access** so that token-based access is no longer permitted.
        - id: cli
          desc: |
            DOKS SSO configuration is managed through the DigitalOcean API and Cloud Control Panel; `doctl` does not expose `sso` flags on `kubernetes cluster update`. Configure SSO in the Cloud Control Panel as described above, or call the DigitalOcean API directly:

            ```bash
            curl -X PUT \
              -H "Authorization: Bearer $DIGITALOCEAN_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"enabled":true,"required":true,"issuer_url":"<oidc-issuer-url>","client_id":"<client-id>","client_secret":"<client-secret>"}' \
              https://api.digitalocean.com/v2/kubernetes/clusters/<cluster-id>/sso
            ```
    refs:
      - url: https://docs.digitalocean.com/products/kubernetes/how-to/manage-cluster-access/
        title: Manage DOKS cluster access

  # No Terraform variants: this check inspects the certificate's notAfter validity
  # window — runtime telemetry set at issuance, not a configuration field. The
  # digitalocean_certificate resource has no expiration argument (Let's Encrypt certs
  # auto-renew; custom certs carry the date inside the uploaded PEM), so expiry is
  # only observable through the live API.
  - uid: mondoo-digitalocean-security-cert-not-expired
    title: Ensure TLS certificates are not expired
    impact: 100
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-12
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-2-ii-transmission-security-encryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-12
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-10
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-1
    mql: |
      digitalocean.certificates.all(notAfter > time.now)
    docs:
      desc: |
        This check ensures that no TLS certificate stored in DigitalOcean has passed its `notAfter` expiration date. Expired certificates break the chain of trust that clients use to verify server identity.

        **Why this matters**

        - **Trust chain breakage:** An expired certificate causes browsers and API clients to reject the TLS handshake, generating certificate warnings or hard failures that directly affect application availability.
        - **Security warning fatigue:** Users trained to click through certificate warnings when an app expires may extend that behavior to legitimate man-in-the-middle attempts, where the same warning is the only defense signal.
        - **API client failures:** Many API clients fail closed on expired certificates and abort the connection, causing cascading failures in dependent services and making an expired certificate both a security failure and an availability incident.

        **Risk mitigation**

        - **Continuous trust:** Keeping certificates valid ensures clients can establish authenticated, encrypted connections without operator intervention and without warning users to bypass security checks.
        - **Monitoring prompt:** Catching expiration proactively via this check provides a remediation window before the certificate expires, avoiding both the security degradation and the availability incident.
      audit: |
        ### Audit via Console

        1. Sign in to the DigitalOcean [Cloud Control Panel](https://cloud.digitalocean.com/).
        2. Navigate to **Networking** > **Certificates**.
        3. Review the **Expiration** column for each certificate and check whether any date is in the past.

        A passing certificate shows an expiration date in the future. A failing certificate shows an expiration date that has already passed.

        ### Audit via CLI

        1. List all certificates and inspect their expiration dates:

        ```bash
        doctl compute certificate list --format ID,Name,NotAfter,State
        ```

        A passing certificate returns a `NotAfter` date that is later than today and a `State` of `verified`. A failing certificate returns a `NotAfter` date in the past or a `State` of `expired`.
      remediation:
        - id: console
          desc: |
            To fix this in the DigitalOcean Cloud Control Panel:

            1. Navigate to **Networking** > **Certificates**.
            2. Identify the expired certificate and either upload a renewed version or regenerate a Let's Encrypt certificate.
            3. Update any load balancers, CDN endpoints, or App Platform apps referencing the old certificate.
        - id: cli
          desc: |
            To fix this on the command line using the `doctl` CLI, create a renewed Let's Encrypt certificate and then update any consumers to reference it:

            ```bash
            doctl compute certificate create \
              --name <new-name> \
              --type lets_encrypt \
              --dns-names <domain>
            ```
        # No Terraform remediation: expiry is not a configurable field. A digitalocean_certificate resource can provision a replacement, but Terraform cannot express or assert the validity window of an issued certificate.
    refs:
      - url: https://docs.digitalocean.com/products/networking/certificates/
        title: DigitalOcean TLS certificates

  - uid: mondoo-digitalocean-security-cdn-has-certificate
    title: Ensure CDN endpoints with a custom domain have a TLS certificate attached
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-2-ii-transmission-security-encryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    variants:
      - uid: mondoo-digitalocean-security-cdn-has-certificate-digitalocean
        tags:
          mondoo.com/filter-title: DigitalOcean
          mondoo.com/filter-icon: digitalocean
      - uid: mondoo-digitalocean-security-cdn-has-certificate-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-digitalocean-security-cdn-has-certificate-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-digitalocean-security-cdn-has-certificate-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that every CDN endpoint configured with a custom domain has a TLS certificate attached. A CDN endpoint on a custom domain without a certificate cannot terminate HTTPS for that domain, forcing clients to use HTTP or encounter certificate errors.

        **Why this matters**

        - **HTTPS capability:** Without a certificate, the CDN endpoint cannot serve the custom domain over HTTPS; clients either receive certificate errors or fall back to unencrypted HTTP.
        - **Content injection risk:** HTTP-served CDN responses can be modified by any host on the network path between the user and the CDN, enabling content injection attacks against end users.
        - **Credential and cookie exposure:** Users authenticating through a custom-domain CDN endpoint over HTTP expose their credentials and session cookies to anyone who can observe the traffic path.

        **Risk mitigation**

        - **Transport encryption:** Attaching a valid TLS certificate enables HTTPS termination at the CDN edge, ensuring all user traffic to the custom domain is encrypted from client to CDN.
        - **Trust signal:** A valid certificate allows clients to verify the CDN endpoint's identity, preventing impersonation attacks that would otherwise succeed silently over HTTP.
      audit: |
        ### Audit via Console

        1. Sign in to the DigitalOcean [Cloud Control Panel](https://cloud.digitalocean.com/).
        2. Navigate to **Networking** > **CDN** and open each endpoint.
        3. Under **Custom subdomain**, check whether a TLS certificate is selected for any endpoint that has a custom domain configured.

        A passing CDN endpoint either has no custom domain or has a custom domain with a certificate assigned. A failing CDN endpoint has a custom domain configured but no certificate selected.

        ### Audit via CLI

        1. List all CDN endpoints and inspect the `CertificateID` and `CustomDomain` fields:

        ```bash
        doctl compute cdn list --format ID,Origin,CustomDomain,CertificateID
        ```

        A passing endpoint returns a non-empty `CertificateID` when `CustomDomain` is set, or has an empty `CustomDomain`. A failing endpoint returns a non-empty `CustomDomain` paired with an empty `CertificateID`.
      remediation:
        - id: console
          desc: |
            To fix this in the DigitalOcean Cloud Control Panel:

            1. Navigate to **Networking** > **CDN** and open the affected endpoint.
            2. Under **Custom subdomain**, select an existing certificate or create a new Let's Encrypt certificate for the domain.
            3. Save the CDN configuration.
        - id: cli
          desc: |
            To fix this on the command line using the `doctl` CLI, attach a certificate to the affected CDN endpoint:

            ```bash
            doctl compute cdn update <cdn-id> --certificate-id <cert-id>
            ```
        - id: terraform
          desc: |
            To attach a TLS certificate to a custom-domain CDN endpoint in Terraform, set `certificate_name` on the `digitalocean_cdn` resource alongside `custom_domain`:

            ```hcl
            resource "digitalocean_cdn" "example" {
              origin           = digitalocean_spaces_bucket.example.bucket_domain_name
              custom_domain    = "cdn.example.com"
              certificate_name = digitalocean_certificate.example.name
            }
            ```
    refs:
      - url: https://docs.digitalocean.com/products/networking/cdn/how-to/use-custom-subdomain/
        title: CDN custom subdomain and TLS

  - uid: mondoo-digitalocean-security-cdn-has-certificate-digitalocean
    filters: asset.platform == "digitalocean"
    mql: |
      digitalocean.cdnEndpoints.where(customDomain != "").all(certificateId != "")
  - uid: mondoo-digitalocean-security-cdn-has-certificate-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "digitalocean_cdn")
    mql: |
      terraform.resources.where(nameLabel == "digitalocean_cdn").where(arguments["custom_domain"] != empty).all(
        arguments["certificate_name"] != empty || arguments["certificate_id"] != empty
      )
  - uid: mondoo-digitalocean-security-cdn-has-certificate-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "digitalocean_cdn")
    mql: |
      terraform.plan.resourceChanges.where(type == "digitalocean_cdn").where(change.after["custom_domain"] != empty).all(
        change.after["certificate_name"] != empty || change.after["certificate_id"] != empty
      )
  - uid: mondoo-digitalocean-security-cdn-has-certificate-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "digitalocean_cdn")
    mql: |
      terraform.state.resources.where(type == "digitalocean_cdn").where(values["custom_domain"] != empty).all(
        values["certificate_name"] != empty || values["certificate_id"] != empty
      )

  - uid: mondoo-digitalocean-security-spaces-key-has-scoped-grants
    title: Ensure Spaces access keys are scoped with bucket grants
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-5
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-2-1
    variants:
      - uid: mondoo-digitalocean-security-spaces-key-has-scoped-grants-digitalocean
        tags:
          mondoo.com/filter-title: DigitalOcean
          mondoo.com/filter-icon: digitalocean
      - uid: mondoo-digitalocean-security-spaces-key-has-scoped-grants-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-digitalocean-security-spaces-key-has-scoped-grants-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-digitalocean-security-spaces-key-has-scoped-grants-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that every Spaces access key has at least one bucket grant defined, scoping the key to specific buckets and operations. A key with no grants has unrestricted account-level access to every Spaces bucket in the account.

        **Why this matters**

        - **Blast radius minimization:** An unscoped Spaces key that leaks provides full read and write access to every bucket in the account; grant-scoped keys limit the damage to exactly the bucket and permissions the key was issued for.
        - **Least-privilege enforcement:** Each application or service that accesses Spaces should hold a key restricted to only the buckets and operations it requires, not an account-wide credential.
        - **Credential compromise containment:** A scoped key accidentally committed to source control, logged by an application, or embedded in a binary exposes only the designated bucket, not the entire object storage environment.

        **Risk mitigation**

        - **Exfiltration scope limitation:** An attacker who obtains a scoped key can access only the granted buckets and operations, preventing full account data exfiltration through a single credential.
        - **Audit and rotation granularity:** Scoped keys can be individually rotated or revoked for a specific integration without disrupting other services, enabling precise incident response.
      audit: |
        ### Audit via Console

        1. Sign in to the DigitalOcean [Cloud Control Panel](https://cloud.digitalocean.com/).
        2. Navigate to **API** > **Spaces Keys**.
        3. Review each access key and check whether it has bucket grants listed under its permissions.

        A passing Spaces key shows one or more bucket-level grants. A failing Spaces key shows no grants, indicating full account-level access to all buckets.

        ### Audit via CLI

        1. List all Spaces keys and inspect their grants:

        ```bash
        doctl spaces keys list
        ```

        A passing key returns one or more entries in its `Grants` field. A failing key returns an empty `Grants` field.
      remediation:
        - id: console
          desc: |
            To fix this in the DigitalOcean Cloud Control Panel:

            1. Navigate to **API** > **Spaces Keys**.
            2. Delete the unscoped key and create a replacement with specific bucket grants (for example, read-only on a single bucket).
            3. Rotate the key in every application that consumed the old one.
        - id: cli
          desc: |
            To fix this on the command line using the `doctl` CLI, create a scoped replacement key and delete the unscoped one:

            ```bash
            doctl spaces keys create <new-name> \
              --grants "bucket=<bucket-name>;permission=read"
            doctl spaces keys delete <old-key>
            ```
        - id: terraform
          desc: |
            To scope a Spaces access key in Terraform, declare one or more `grant` blocks on the `digitalocean_spaces_key` resource, each naming a specific bucket and permission:

            ```hcl
            resource "digitalocean_spaces_key" "example" {
              name = "example-key"

              grant {
                bucket     = "example-bucket"
                permission = "read"
              }
            }
            ```
    refs:
      - url: https://docs.digitalocean.com/products/spaces/how-to/manage-access/
        title: Manage Spaces access keys and grants

  - uid: mondoo-digitalocean-security-spaces-key-has-scoped-grants-digitalocean
    filters: asset.platform == "digitalocean"
    mql: |
      digitalocean.spacesKeys.all(grants != empty)
  - uid: mondoo-digitalocean-security-spaces-key-has-scoped-grants-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "digitalocean_spaces_key")
    mql: |
      terraform.resources.where(nameLabel == "digitalocean_spaces_key").all(blocks.where(type == "grant") != empty)
  - uid: mondoo-digitalocean-security-spaces-key-has-scoped-grants-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "digitalocean_spaces_key")
    mql: |
      terraform.plan.resourceChanges.where(type == "digitalocean_spaces_key").all(change.after["grant"] != empty)
  - uid: mondoo-digitalocean-security-spaces-key-has-scoped-grants-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "digitalocean_spaces_key")
    mql: |
      terraform.state.resources.where(type == "digitalocean_spaces_key").all(values["grant"] != empty)

  - uid: mondoo-digitalocean-security-spaces-bucket-not-publicly-readable
    title: Ensure Spaces buckets do not grant anonymous read access
    impact: 100
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-2-1
    variants:
      - uid: mondoo-digitalocean-security-spaces-bucket-not-publicly-readable-digitalocean
        tags:
          mondoo.com/filter-title: DigitalOcean
          mondoo.com/filter-icon: digitalocean
      - uid: mondoo-digitalocean-security-spaces-bucket-not-publicly-readable-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-digitalocean-security-spaces-bucket-not-publicly-readable-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-digitalocean-security-spaces-bucket-not-publicly-readable-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that no Spaces bucket grants the `READ` permission to the `AllUsers` group, which would make every object in the bucket readable by anyone on the internet without authentication. DigitalOcean Spaces is S3-compatible, so the same `public-read` ACL semantics as Amazon S3 apply: a single grant turns the bucket into an open object store.

        **Why this matters**

        - **Unauthenticated exposure:** A `public-read` bucket allows any client to enumerate object keys and download contents over the predictable `https://<bucket>.<region>.digitaloceanspaces.com/` URL pattern, requiring no DigitalOcean account or credentials.
        - **Accidental data leak:** Buckets created for development or one-off asset hosting commonly inherit `public-read` and accumulate logs, backups, customer uploads, or build artifacts that were never reviewed for public release.
        - **Compliance breach:** Frameworks that govern customer data, PII, or cardholder data prohibit storage in world-readable locations; a single `public-read` Spaces bucket creates an audit finding regardless of bucket contents.
        - **Crawler and indexing exposure:** Search engines and security scanners actively index publicly readable Spaces buckets, increasing the speed at which leaked content is discovered and reused.

        **Risk mitigation**

        - **Authenticated access only:** Removing the anonymous `READ` grant forces every retrieval through Spaces access keys or pre-signed URLs, restoring auditability and access control.
        - **CDN-fronted distribution:** When content genuinely needs to be public, serving it through a DigitalOcean CDN endpoint or a custom signed-URL pattern provides rate limiting, access logs, and revocation that the raw bucket URL cannot.
      audit: |
        ### Audit via Console

        1. Sign in to the DigitalOcean [Cloud Control Panel](https://cloud.digitalocean.com/).
        2. Navigate to **Spaces Object Storage** and open each bucket.
        3. On the **Settings** tab, inspect the **File Listing** section.

        A passing bucket shows **Restricted (Signed URLs only)**. A failing bucket shows **Enabled (Public)** or any indication that listing is allowed without authentication.

        ### Audit via CLI

        1. List the buckets and use `s3cmd` or the AWS CLI against the Spaces endpoint to inspect each bucket's ACL:

        ```bash
        doctl spaces buckets list
        AWS_ACCESS_KEY_ID=<spaces-key> AWS_SECRET_ACCESS_KEY=<spaces-secret> \
          aws s3api get-bucket-acl --bucket <bucket> \
            --endpoint-url https://<region>.digitaloceanspaces.com
        ```

        A passing bucket returns grants only to the bucket owner. A failing bucket returns a grant where `Grantee.URI` is `http://acs.amazonaws.com/groups/global/AllUsers` and `Permission` is `READ` or `FULL_CONTROL`.
      remediation:
        - id: console
          desc: |
            To remove anonymous read access from the Cloud Control Panel:

            1. Navigate to **Spaces Object Storage** and open the affected bucket.
            2. Open the **Settings** tab.
            3. Under **File Listing**, switch the setting from **Enabled (Public)** to **Restricted (Signed URLs only)**.
            4. Audit existing objects that have individual public ACLs and reset them with the API or `s3cmd setacl --acl-private`.
            5. If the bucket must serve public content, route requests through a DigitalOcean CDN endpoint or a Worker-equivalent pattern that enforces auth or rate limits.
        - id: cli
          desc: |
            To remove anonymous read access using the S3-compatible API:

            ```bash
            AWS_ACCESS_KEY_ID=<spaces-key> AWS_SECRET_ACCESS_KEY=<spaces-secret> \
              aws s3api put-bucket-acl --bucket <bucket> --acl private \
                --endpoint-url https://<region>.digitaloceanspaces.com
            ```

            For per-object public ACLs left over from previous configuration, iterate and reset:

            ```bash
            AWS_ACCESS_KEY_ID=<spaces-key> AWS_SECRET_ACCESS_KEY=<spaces-secret> \
              aws s3 ls s3://<bucket> --recursive --endpoint-url https://<region>.digitaloceanspaces.com \
              | awk '{print $4}' \
              | xargs -I{} aws s3api put-object-acl --bucket <bucket> --key {} --acl private \
                  --endpoint-url https://<region>.digitaloceanspaces.com
            ```
        - id: terraform
          desc: |
            To declare the bucket as private with Terraform, set `acl = "private"` on `digitalocean_spaces_bucket` (the default) and avoid any `digitalocean_spaces_bucket_policy` or `_acl` resource that grants `AllUsers` read:

            ```hcl
            resource "digitalocean_spaces_bucket" "example" {
              name   = "example-bucket"
              region = "nyc3"
              acl    = "private"
            }
            ```
    refs:
      - url: https://docs.digitalocean.com/products/spaces/how-to/manage-access/
        title: Manage Spaces bucket access
      - url: https://docs.digitalocean.com/products/spaces/reference/s3-compatibility/
        title: Spaces S3 compatibility reference

  - uid: mondoo-digitalocean-security-spaces-bucket-not-publicly-readable-digitalocean
    filters: asset.platform == "digitalocean"
    mql: |
      digitalocean.spacesBuckets.none(publicReadAcl)
  - uid: mondoo-digitalocean-security-spaces-bucket-not-publicly-readable-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "digitalocean_spaces_bucket")
    mql: |
      terraform.resources.where(nameLabel == "digitalocean_spaces_bucket").all(arguments.acl != "public-read" && arguments.acl != "public-read-write")
  - uid: mondoo-digitalocean-security-spaces-bucket-not-publicly-readable-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "digitalocean_spaces_bucket")
    mql: |
      terraform.plan.resourceChanges.where(type == "digitalocean_spaces_bucket").all(change.after.acl != "public-read" && change.after.acl != "public-read-write")
  - uid: mondoo-digitalocean-security-spaces-bucket-not-publicly-readable-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "digitalocean_spaces_bucket")
    mql: |
      terraform.state.resources.where(type == "digitalocean_spaces_bucket").all(values.acl != "public-read" && values.acl != "public-read-write")

  # No Terraform variants: the DigitalOcean Terraform provider's `digitalocean_spaces_bucket.acl` argument exposes only `"private"` and `"public-read"` — the S3-compatible `public-read-write` ACL must be applied through the runtime S3 API, so there is no HCL surface to inspect for it. The runtime variant catches buckets where it was set out of band.
  - uid: mondoo-digitalocean-security-spaces-bucket-not-publicly-writable
    title: Ensure Spaces buckets do not grant anonymous write access
    impact: 100
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-2-1
    mql: |
      digitalocean.spacesBuckets.none(publicWriteAcl)
    docs:
      desc: |
        This check ensures that no Spaces bucket grants the `WRITE` permission to the `AllUsers` group. An anonymously writable bucket lets any unauthenticated caller upload, overwrite, or delete objects, turning the bucket into a free hosting and laundering point for malicious payloads.

        **Why this matters**

        - **Malicious content hosting:** Writable buckets are routinely abused to stage phishing pages, malware downloads, and command-and-control payloads under a legitimate-looking domain that customers and security tools may trust.
        - **Object replacement and tampering:** An attacker who can write the bucket can overwrite legitimate assets (configuration files, JavaScript bundles, signed artifacts) and serve modified versions to every consumer.
        - **Billing and quota abuse:** Anonymous writes accumulate uncontrolled storage and bandwidth charges that are billed to the bucket owner; high-volume abuse can also push the account against service quotas.
        - **No legitimate use case:** Unlike `public-read`, which has legitimate static-hosting patterns, `public-read-write` essentially has no defensible reason to exist on a production bucket; its presence is almost always a misconfiguration.

        **Risk mitigation**

        - **Authenticated writes only:** Removing the anonymous `WRITE` grant forces every upload through Spaces access keys or pre-signed URLs, restoring accountability.
        - **Per-object policies:** When third parties must upload content, gate the workflow through short-lived pre-signed PUT URLs issued by application code instead of a permanently writable bucket.
      audit: |
        ### Audit via Console

        1. Sign in to the DigitalOcean [Cloud Control Panel](https://cloud.digitalocean.com/).
        2. Open the affected bucket under **Spaces Object Storage**.
        3. Inspect the **Settings** tab and review any bucket policy attached to the bucket for a statement granting `s3:PutObject` to `Principal: "*"`.

        A passing bucket has no bucket policy or no policy statement granting write to anonymous callers. A failing bucket grants `s3:PutObject` (or equivalent) to `*`.

        ### Audit via CLI

        1. Retrieve the bucket ACL and policy with the S3-compatible API:

        ```bash
        AWS_ACCESS_KEY_ID=<spaces-key> AWS_SECRET_ACCESS_KEY=<spaces-secret> \
          aws s3api get-bucket-acl --bucket <bucket> \
            --endpoint-url https://<region>.digitaloceanspaces.com
        ```

        A passing bucket returns no grant with `Grantee.URI = http://acs.amazonaws.com/groups/global/AllUsers` and `Permission` in (`WRITE`, `WRITE_ACP`, `FULL_CONTROL`). A failing bucket returns at least one such grant.
      remediation:
        - id: console
          desc: |
            To remove anonymous write access from the Cloud Control Panel:

            1. Open the bucket under **Spaces Object Storage**.
            2. Inspect the **Settings** tab for any bucket policy and remove statements that grant `s3:PutObject`, `s3:DeleteObject`, or `s3:*` to `Principal: "*"`.
            3. If the bucket genuinely needs third-party uploads, replace the anonymous policy with a workflow that issues pre-signed `PUT` URLs from application code.
        - id: cli
          desc: |
            To remove anonymous write access using the S3-compatible API:

            ```bash
            AWS_ACCESS_KEY_ID=<spaces-key> AWS_SECRET_ACCESS_KEY=<spaces-secret> \
              aws s3api put-bucket-acl --bucket <bucket> --acl private \
                --endpoint-url https://<region>.digitaloceanspaces.com
            ```

            If a bucket policy grants writes to `*`, delete it:

            ```bash
            AWS_ACCESS_KEY_ID=<spaces-key> AWS_SECRET_ACCESS_KEY=<spaces-secret> \
              aws s3api delete-bucket-policy --bucket <bucket> \
                --endpoint-url https://<region>.digitaloceanspaces.com
            ```
        # No Terraform remediation: the DigitalOcean Terraform provider's `digitalocean_spaces_bucket.acl` argument accepts only `"private"` and `"public-read"`. Anonymous writes are configured through the runtime S3 API (`PutBucketPolicy` granting `s3:PutObject` to `Principal: "*"`), which has no Terraform analog.
    refs:
      - url: https://docs.digitalocean.com/products/spaces/how-to/manage-access/
        title: Manage Spaces bucket access

  # No Terraform variants: the DigitalOcean Terraform provider's `digitalocean_spaces_bucket` resource does not expose server-side encryption configuration. SSE is configured through the runtime S3-compatible `PutBucketEncryption` call, which Terraform does not currently model.
  - uid: mondoo-digitalocean-security-spaces-bucket-encryption-enabled
    title: Ensure Spaces buckets have server-side encryption enabled
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    mql: |
      digitalocean.spacesBuckets.all(encryptionEnabled)
    docs:
      desc: |
        This check ensures that every Spaces bucket has a default server-side encryption configuration set. When default encryption is configured, every object written to the bucket is encrypted at rest by the platform, removing the need for clients to remember to apply per-request encryption.

        **Why this matters**

        - **Encryption-at-rest guarantee:** Without a default encryption configuration, individual `PutObject` callers can write unencrypted objects whenever they forget the per-request encryption header, leaving sensitive data on disk in plaintext.
        - **Defense in depth:** Bucket-level default encryption is the last line of defense if access controls fail and an attacker gains read access to underlying storage media or backups.
        - **Audit and compliance evidence:** Frameworks that mandate encryption at rest expect a single platform-enforced control rather than a per-call discipline that depends on developer behavior.
        - **Lifecycle and replication safety:** Objects produced by lifecycle transitions, replication, and multipart uploads inherit the bucket default; without a configured default these derived objects also land unencrypted.

        **Risk mitigation**

        - **Plaintext-on-disk prevention:** A bucket with default encryption configured encrypts every new object server-side, so a future media exposure does not equal a content exposure.
        - **Operational simplicity:** Centralising the encryption decision at the bucket removes the per-call configuration burden from every client SDK and CI pipeline.
      audit: |
        ### Audit via Console

        1. Sign in to the DigitalOcean [Cloud Control Panel](https://cloud.digitalocean.com/).
        2. Open the affected bucket under **Spaces Object Storage**.
        3. Inspect the **Settings** tab for the **Default Encryption** section.

        A passing bucket shows **AES-256** (or a configured KMS algorithm). A failing bucket shows **Not configured**.

        ### Audit via CLI

        1. Use the S3-compatible API to query the bucket's encryption configuration:

        ```bash
        AWS_ACCESS_KEY_ID=<spaces-key> AWS_SECRET_ACCESS_KEY=<spaces-secret> \
          aws s3api get-bucket-encryption --bucket <bucket> \
            --endpoint-url https://<region>.digitaloceanspaces.com
        ```

        A passing bucket returns a `ServerSideEncryptionConfiguration` document. A failing bucket returns `ServerSideEncryptionConfigurationNotFoundError`.
      remediation:
        - id: console
          desc: |
            Spaces does not expose default-encryption configuration in the Cloud Control Panel for every region. Apply the configuration with the CLI or S3-compatible API instead; see the CLI remediation below.
        - id: cli
          desc: |
            Apply a bucket-level default encryption configuration with the S3-compatible API:

            ```bash
            AWS_ACCESS_KEY_ID=<spaces-key> AWS_SECRET_ACCESS_KEY=<spaces-secret> \
              aws s3api put-bucket-encryption \
                --bucket <bucket> \
                --endpoint-url https://<region>.digitaloceanspaces.com \
                --server-side-encryption-configuration '{
                  "Rules": [{
                    "ApplyServerSideEncryptionByDefault": { "SSEAlgorithm": "AES256" }
                  }]
                }'
            ```

            Re-encrypt existing objects so they pick up the new default:

            ```bash
            AWS_ACCESS_KEY_ID=<spaces-key> AWS_SECRET_ACCESS_KEY=<spaces-secret> \
              aws s3 cp s3://<bucket>/ s3://<bucket>/ \
                --recursive --sse AES256 \
                --endpoint-url https://<region>.digitaloceanspaces.com
            ```
        # No Terraform remediation: the digitalocean_spaces_bucket resource has no server_side_encryption_configuration argument; Spaces SSE must be applied at runtime via the S3-compatible PutBucketEncryption call.
    refs:
      - url: https://docs.digitalocean.com/products/spaces/reference/s3-compatibility/
        title: Spaces S3 compatibility reference

  - uid: mondoo-digitalocean-security-spaces-bucket-versioning-enabled
    title: Ensure Spaces buckets have object versioning enabled
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-bcr-08
      compliance/dora: dora-art-12
      compliance/hipaa: hipaa-security-ss164-308-a-7-ii-a-contingency-plan-data-backup-plan
      compliance/iso-27001-2022: iso-27001-2022-a-8-13
      compliance/nis-2: nis-2-21-2-c
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cp-9
      compliance/nist-sp-800-171: false
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc9-1-1
      compliance/vda-isa-5: false
    variants:
      - uid: mondoo-digitalocean-security-spaces-bucket-versioning-enabled-digitalocean
        tags:
          mondoo.com/filter-title: DigitalOcean
          mondoo.com/filter-icon: digitalocean
      - uid: mondoo-digitalocean-security-spaces-bucket-versioning-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-digitalocean-security-spaces-bucket-versioning-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-digitalocean-security-spaces-bucket-versioning-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that every Spaces bucket has object versioning enabled. Versioning preserves every revision of an object — including deletions, which become delete markers — so that accidental overwrites or ransomware-style mass deletes can be reversed by reading the prior version.

        **Why this matters**

        - **Accidental overwrite recovery:** A misconfigured deployment that pushes an empty file to the wrong key still leaves the previous version recoverable, turning what would be a data-loss incident into a roll-back.
        - **Ransomware containment:** Attackers who obtain Spaces credentials and re-encrypt the contents of a bucket cannot remove the prior versions with a simple `DELETE`; versioned buckets force them to also issue per-version deletes, slowing exfiltration and increasing forensic evidence.
        - **Auditability of changes:** Versioning provides a tamper-resistant record of every change to an object, which downstream compliance evidence and incident response rely on.
        - **Replication and lifecycle dependencies:** Cross-region replication and certain lifecycle transitions on S3-compatible storage require versioning to be enabled; turning it on early avoids re-architecting later.

        **Risk mitigation**

        - **Data-loss recovery:** Enabling versioning means that single-object recovery is a `GET` of the prior version rather than a restore from external backups.
        - **Defense against credential abuse:** A leaked write-capable key cannot quietly empty the bucket; the operator can roll forward to the prior versions while the credential is rotated.
      audit: |
        ### Audit via Console

        1. Sign in to the DigitalOcean [Cloud Control Panel](https://cloud.digitalocean.com/).
        2. Open the affected bucket under **Spaces Object Storage**.
        3. Inspect the **Settings** tab for the **Versioning** section.

        A passing bucket shows **Enabled**. A failing bucket shows **Disabled** or **Suspended**.

        ### Audit via CLI

        1. Query the bucket's versioning state via the S3-compatible API:

        ```bash
        AWS_ACCESS_KEY_ID=<spaces-key> AWS_SECRET_ACCESS_KEY=<spaces-secret> \
          aws s3api get-bucket-versioning --bucket <bucket> \
            --endpoint-url https://<region>.digitaloceanspaces.com
        ```

        A passing bucket returns `"Status": "Enabled"`. A failing bucket returns no status, `"Suspended"`, or an empty response.
      remediation:
        - id: console
          desc: |
            To enable versioning from the Cloud Control Panel:

            1. Open the bucket under **Spaces Object Storage**.
            2. Open the **Settings** tab.
            3. Under **Versioning**, switch the setting to **Enabled**.
            4. Pair versioning with a lifecycle rule that expires noncurrent versions after a defined retention window so the bucket does not grow unbounded.
        - id: cli
          desc: |
            To enable versioning using the S3-compatible API:

            ```bash
            AWS_ACCESS_KEY_ID=<spaces-key> AWS_SECRET_ACCESS_KEY=<spaces-secret> \
              aws s3api put-bucket-versioning --bucket <bucket> \
                --versioning-configuration Status=Enabled \
                --endpoint-url https://<region>.digitaloceanspaces.com
            ```

            Verify the new state:

            ```bash
            AWS_ACCESS_KEY_ID=<spaces-key> AWS_SECRET_ACCESS_KEY=<spaces-secret> \
              aws s3api get-bucket-versioning --bucket <bucket> \
                --endpoint-url https://<region>.digitaloceanspaces.com
            ```
        - id: terraform
          desc: |
            To enable versioning with Terraform, declare a `versioning` block on `digitalocean_spaces_bucket` with `enabled = true`:

            ```hcl
            resource "digitalocean_spaces_bucket" "example" {
              name   = "example-bucket"
              region = "nyc3"
              acl    = "private"

              versioning {
                enabled = true
              }
            }
            ```
    refs:
