      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-12
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-10
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-1
    mql: |
      digitalocean.databases.all(certificates(pem: caCertificate).all(notAfter > time.now))
    docs:
      desc: |
        This check ensures that every managed database cluster advertises a CA certificate whose validity window has not passed. Clients verify the cluster's TLS endpoint by pinning to this CA; once it expires, every connection that performs TLS verification fails its handshake.

        **Why this matters**

        - **Connection failure cascade:** A managed database whose CA has expired fails every TLS-verifying client at the handshake, taking the cluster offline from the application's perspective even though the cluster itself is healthy.
        - **Silent verification bypass:** Operators under pressure to restore service often disable TLS verification rather than rotate the CA, downgrading future connections to unauthenticated TLS that is vulnerable to man-in-the-middle interception.
        - **Audit and forensics gap:** A revoked or expired CA pinned in application configuration breaks the only signal that distinguishes a legitimate cluster endpoint from a replacement under an attacker's control.
        - **Renewal blind spot:** Managed database CA certificates are rotated by the platform on long cycles, so expiry is easy to miss in the operator's calendar; an automated check catches the renewal need before the outage.

        **Risk mitigation**

        - **Outage prevention:** Detecting CA expiry before it lapses gives operators time to pull the updated CA from the DigitalOcean Cloud Control Panel and distribute it to every client.
        - **TLS posture preservation:** Renewing rather than disabling verification keeps the cluster's authenticated TLS path intact, preventing operators from being pushed into a less-secure fallback.
      audit: |
        ### Audit via Console

        1. Sign in to the DigitalOcean [Cloud Control Panel](https://cloud.digitalocean.com/).
        2. Navigate to **Databases** and open each cluster.
        3. On the **Overview** tab, locate the **CA Certificate** download and inspect the certificate's **Valid Until** field.

        A passing cluster shows a future **Valid Until** date. A failing cluster shows a date that has already passed.

        ### Audit via CLI

        1. List clusters:

        ```bash
        doctl databases list --format ID,Name,Engine
        ```

        2. Download each cluster's CA and inspect the validity window with `openssl`:

        ```bash
        doctl databases get-ca <database-id> --format Certificate --no-header | base64 -d \
          | openssl x509 -noout -enddate
        ```

        A passing cluster prints a `notAfter=` date in the future. A failing cluster prints a date in the past.
      remediation:
        - id: console
          desc: |
            DigitalOcean rotates managed database CA certificates on the platform side; the operator action when a CA is approaching or past expiry is to fetch the new certificate and distribute it to every client:

            1. In the Cloud Control Panel, open the cluster's **Overview** tab.
            2. Click **Download CA Certificate** to retrieve the current `ca-certificate.crt`.
            3. Update every application configuration, Kubernetes secret, and CI pipeline that pins the old CA to use the new file.
            4. Restart connecting services so the new CA is loaded.

            If the download still returns an expired certificate, open a DigitalOcean support ticket from the cluster page so the platform can issue a replacement.
        - id: cli
          desc: |
            Pull the new CA with `doctl` and roll it out to every consumer:

            ```bash
            doctl databases get-ca <database-id> --format Certificate --no-header \
              | base64 -d > ca-certificate.crt
            ```

            Verify the new validity window before distribution:

            ```bash
            openssl x509 -in ca-certificate.crt -noout -enddate -subject
            ```

            Replace the certificate file in every client trust store, restart services, and confirm new connections succeed.
        # No Terraform remediation: the CA certificate is provisioned and rotated by DigitalOcean, not declared in digitalocean_database_cluster HCL. Terraform-managed clusters still pull the active CA via the runtime API; remediation is to refresh the trust store on consumers, which is a deployment-time concern outside Terraform.
    refs:
      - url: https://docs.digitalocean.com/products/databases/postgresql/how-to/secure-cluster/
        title: Secure a managed database cluster with TLS

  - uid: mondoo-digitalocean-security-lb-http-redirected-to-https
    title: Ensure load balancers redirect HTTP traffic to HTTPS
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-2-ii-transmission-security-encryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    variants:
      - uid: mondoo-digitalocean-security-lb-http-redirected-to-https-digitalocean
        tags:
          mondoo.com/filter-title: DigitalOcean
          mondoo.com/filter-icon: digitalocean
      - uid: mondoo-digitalocean-security-lb-http-redirected-to-https-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-digitalocean-security-lb-http-redirected-to-https-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-digitalocean-security-lb-http-redirected-to-https-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that any load balancer accepting inbound HTTP traffic has `redirectHttpToHttps` enabled, so clients are issued a 301 redirect to the HTTPS equivalent of their request. A load balancer that forwards HTTP without redirecting it allows plaintext sessions end-to-end.

        **Why this matters**

        - **Credential and session protection:** Plaintext HTTP exposes authentication tokens, session cookies, API keys, and form submissions to any host on the network path between the client and the load balancer.
        - **Downgrade attack prevention:** Without an enforced redirect, a passive attacker can strip HTTPS by intercepting the initial HTTP request before the client has a chance to use HTTPS.
        - **Client guidance:** A 301 redirect updates bookmarks and caches so clients use HTTPS for all future requests, not only when they happen to type the HTTPS URL.

        **Risk mitigation**

        - **Transport encryption enforcement:** Redirecting HTTP to HTTPS ensures all active sessions use TLS, so network-level interception cannot yield plaintext traffic.
        - **Consistent TLS posture:** Enabling the redirect at the load balancer enforces HTTPS for every backend regardless of whether individual application components handle the redirect themselves.
      audit: |
        ### Audit via Console

        1. Sign in to the DigitalOcean [Cloud Control Panel](https://cloud.digitalocean.com/).
        2. Navigate to **Networking** > **Load Balancers** and open each load balancer.
        3. Go to **Settings** > **Forwarding Rules**.
        4. Check whether **Redirect HTTP to HTTPS** is enabled.

        A passing load balancer either has no HTTP forwarding rule or has HTTP-to-HTTPS redirect enabled. A failing load balancer has an HTTP forwarding rule without the redirect enabled.

        ### Audit via CLI

        1. List all load balancers and inspect the `HttpRedirect` field:

        ```bash
        doctl compute load-balancer list --format ID,Name,HttpRedirect,ForwardingRules
        ```

        A passing load balancer returns `true` for `HttpRedirect` or has no HTTP forwarding rule. A failing load balancer returns `false` for `HttpRedirect` while an HTTP forwarding rule is present.
      remediation:
        - id: console
          desc: |
            To fix this in the DigitalOcean Cloud Control Panel:

            1. Navigate to **Networking** > **Load Balancers** and open the affected load balancer.
            2. Go to **Settings** > **Forwarding Rules**.
            3. Enable **Redirect HTTP to HTTPS**. Confirm that an HTTPS forwarding rule and TLS certificate are configured.
        - id: cli
          desc: |
            To fix this on the command line using the `doctl` CLI, enable the redirect on the affected load balancer:

            ```bash
            doctl compute load-balancer update <lb-id> \
              --redirect-http-to-https
            ```
        - id: terraform
          desc: |
            To enforce the HTTP-to-HTTPS redirect in Terraform, set `redirect_http_to_https = true` on the `digitalocean_loadbalancer` resource alongside an HTTPS forwarding rule:

            ```hcl
            resource "digitalocean_loadbalancer" "example" {
              name                   = "example-lb"
              region                 = "nyc3"
              redirect_http_to_https = true

              forwarding_rule {
                entry_port       = 443
                entry_protocol   = "https"
                target_port      = 80
                target_protocol  = "http"
                certificate_name = digitalocean_certificate.example.name
              }
            }
            ```
    refs:
      - url: https://docs.digitalocean.com/products/networking/load-balancers/how-to/ssl-termination/
        title: Load balancer SSL termination and redirect

  - uid: mondoo-digitalocean-security-lb-http-redirected-to-https-digitalocean
    filters: asset.platform == "digitalocean"
    mql: |
      digitalocean.loadBalancers.all(
        forwardingRules.none(_["entry_protocol"] == "http") || redirectHttpToHttps == true
      )
  - uid: mondoo-digitalocean-security-lb-http-redirected-to-https-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "digitalocean_loadbalancer")
    mql: |
      terraform.resources.where(nameLabel == "digitalocean_loadbalancer").all(
        blocks.where(type == "forwarding_rule").none(arguments["entry_protocol"] == "http") ||
        arguments["redirect_http_to_https"] == true
      )
  - uid: mondoo-digitalocean-security-lb-http-redirected-to-https-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "digitalocean_loadbalancer")
    mql: |
      terraform.plan.resourceChanges.where(type == "digitalocean_loadbalancer").all(
        change.after["forwarding_rule"] == empty ||
        change.after["forwarding_rule"].none(_["entry_protocol"] == "http") ||
        change.after.redirect_http_to_https == true
      )
  - uid: mondoo-digitalocean-security-lb-http-redirected-to-https-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "digitalocean_loadbalancer")
    mql: |
      terraform.state.resources.where(type == "digitalocean_loadbalancer").all(
        values["forwarding_rule"] == empty ||
        values["forwarding_rule"].none(_["entry_protocol"] == "http") ||
        values.redirect_http_to_https == true
      )

  - uid: mondoo-digitalocean-security-lb-in-vpc
    title: Ensure load balancers are deployed inside a VPC
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-1-5
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-digitalocean-security-lb-in-vpc-digitalocean
        tags:
          mondoo.com/filter-title: DigitalOcean
          mondoo.com/filter-icon: digitalocean
      - uid: mondoo-digitalocean-security-lb-in-vpc-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-digitalocean-security-lb-in-vpc-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-digitalocean-security-lb-in-vpc-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that every load balancer is attached to a Virtual Private Cloud (VPC). By default, load balancers can be created without VPC association, which forces backend communication through public-facing addresses.

        **Why this matters**

        - **Private backend connectivity:** A VPC-attached load balancer reaches its backend Droplets on private IPs, keeping intra-application traffic entirely within DigitalOcean's internal network.
        - **Reduced public attack surface:** Without VPC attachment, the load balancer must communicate with backends using public endpoints, adding unnecessary internet-reachable addresses to the infrastructure.
        - **Network segmentation:** Placing the load balancer and its backends in the same VPC enables other network controls such as private firewall rules and internal DNS resolution to function correctly.

        **Risk mitigation**

        - **Traffic isolation:** VPC-internal load balancer to backend traffic cannot be intercepted by hosts outside the VPC, eliminating the risk of man-in-the-middle attacks on the internal forwarding path.
        - **Segmentation enforcement:** VPC membership allows firewall rules to reference the VPC as a trusted source, making it straightforward to allow only load-balancer-originated traffic to backend ports.
      audit: |
        ### Audit via Console

        1. Sign in to the DigitalOcean [Cloud Control Panel](https://cloud.digitalocean.com/).
        2. Navigate to **Networking** > **Load Balancers** and open each load balancer.
        3. Check the **Network** section for a VPC assignment.

        A passing load balancer shows a named VPC in the Network section. A failing load balancer shows no VPC or only a public network assignment.

        ### Audit via CLI

        1. List all load balancers and inspect the `VPCUUID` field:

        ```bash
        doctl compute load-balancer list --format ID,Name,VPCUUID,Region
        ```

        A passing load balancer returns a non-empty `VPCUUID`. A failing load balancer returns an empty `VPCUUID`.
      remediation:
        - id: console
          desc: |
            DigitalOcean does not support moving a load balancer between VPCs after creation. To fix this in the Cloud Control Panel, create a replacement load balancer in the target VPC and cut traffic over:

            1. Navigate to **Networking** > **Load Balancers** and create a new load balancer.
            2. In the creation flow, select the target VPC under **Network**.
            3. Configure forwarding rules and attach the same Droplets (or the same tag).
            4. Update DNS to point at the new load balancer's IP, then delete the old one.
        - id: cli
          desc: |
            To fix this on the command line using the `doctl` CLI, create a replacement load balancer inside the target VPC:

            ```bash
            doctl compute load-balancer create \
              --name <new-name> \
              --region <region> \
              --vpc-uuid <vpc-uuid> \
              --droplet-ids <droplet-ids> \
              --forwarding-rules "entry_protocol:https,entry_port:443,target_protocol:http,target_port:80,certificate_id:<cert-id>"
            ```
        - id: terraform
          desc: |
            To deploy load balancers inside a VPC in Terraform, set `vpc_uuid` on the `digitalocean_loadbalancer` resource:

            ```hcl
            resource "digitalocean_loadbalancer" "example" {
              name     = "example-lb"
              region   = "nyc3"
              vpc_uuid = digitalocean_vpc.example.id

              forwarding_rule {
                entry_port       = 443
                entry_protocol   = "https"
                target_port      = 80
                target_protocol  = "http"
                certificate_name = digitalocean_certificate.example.name
              }

              droplet_ids = [digitalocean_droplet.example.id]
            }
            ```
    refs:
      - url: https://docs.digitalocean.com/products/networking/vpc/
        title: DigitalOcean VPC overview

  - uid: mondoo-digitalocean-security-lb-in-vpc-digitalocean
    filters: asset.platform == "digitalocean"
    mql: |
      digitalocean.loadBalancers.all(vpc != null)
  - uid: mondoo-digitalocean-security-lb-in-vpc-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "digitalocean_loadbalancer")
    mql: |
      terraform.resources.where(nameLabel == "digitalocean_loadbalancer").all(arguments.vpc_uuid != empty)
  - uid: mondoo-digitalocean-security-lb-in-vpc-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "digitalocean_loadbalancer")
    mql: |
      terraform.plan.resourceChanges.where(type == "digitalocean_loadbalancer").all(change.after.vpc_uuid != empty)
  - uid: mondoo-digitalocean-security-lb-in-vpc-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "digitalocean_loadbalancer")
    mql: |
      terraform.state.resources.where(type == "digitalocean_loadbalancer").all(values.vpc_uuid != empty)

  - uid: mondoo-digitalocean-security-doks-auto-upgrade-enabled
    title: Ensure DOKS clusters have auto-upgrade enabled
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-tvm-03
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-8
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-12
      compliance/nist-csf-2: nist-csf-2-pr-ps-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-1
      compliance/pci-dss-4: pcidss-requirement-6-3-3
      compliance/soc2-2017: soc2-control-cc7-1-5
      compliance/vda-isa-5: vda-isa-5-5-2-5
    variants:
      - uid: mondoo-digitalocean-security-doks-auto-upgrade-enabled-digitalocean
        tags:
          mondoo.com/filter-title: DigitalOcean
          mondoo.com/filter-icon: digitalocean
      - uid: mondoo-digitalocean-security-doks-auto-upgrade-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-digitalocean-security-doks-auto-upgrade-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-digitalocean-security-doks-auto-upgrade-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that every DigitalOcean Kubernetes Service (DOKS) cluster has automatic patch upgrades enabled. By default, auto-upgrade is not enabled on new clusters, leaving patch application as a manual operator responsibility.

        **Why this matters**

        - **Patch gap closure:** Kubernetes control-plane and node components receive regular patch releases that fix security vulnerabilities; clusters without auto-upgrade accumulate unpatched CVEs during the window between disclosure and manual action.
        - **Reduced operational burden:** Enabling auto-upgrade within a configured maintenance window removes the need for operators to track and manually apply each patch release, lowering the likelihood of a missed update.
        - **Consistent security posture:** Auto-upgrade ensures all clusters in the account receive patches on a predictable schedule rather than depending on per-cluster manual follow-through.

        **Risk mitigation**

        - **Exploit window reduction:** Automated patching closes known-exploited vulnerabilities within the maintenance window rather than leaving them open until an operator notices the available update.
        - **Human error elimination:** Automating patch application removes the operational step most likely to be delayed or skipped during periods of high workload.
      audit: |
        ### Audit via Console

        1. Sign in to the DigitalOcean [Cloud Control Panel](https://cloud.digitalocean.com/).
        2. Navigate to **Kubernetes** and open each cluster.
        3. Go to **Settings** > **Maintenance** and check whether **Automatically upgrade my cluster to patch releases** is enabled.

        A passing cluster shows auto-upgrade as enabled. A failing cluster shows auto-upgrade as disabled or unconfigured.

        ### Audit via CLI

        1. List all Kubernetes clusters and inspect the `AutoUpgrade` field:

        ```bash
        doctl kubernetes cluster list --format ID,Name,AutoUpgrade,Version,Region
        ```

        A passing cluster returns `true` for `AutoUpgrade`. A failing cluster returns `false`.
      remediation:
        - id: console
          desc: |
            To fix this in the DigitalOcean Cloud Control Panel:

            1. Navigate to **Kubernetes** and open the affected cluster.
            2. Go to **Settings** > **Maintenance**.
            3. Enable **Automatically upgrade my cluster to patch releases**.
        - id: cli
          desc: |
            To fix this on the command line using the `doctl` CLI, enable auto-upgrade on the affected cluster:

            ```bash
            doctl kubernetes cluster update <cluster-id> --auto-upgrade=true
            ```
        - id: terraform
          desc: |
            To enable automatic patch upgrades in Terraform, set `auto_upgrade = true` on the `digitalocean_kubernetes_cluster` resource (a `maintenance_policy` block is recommended to control the upgrade window):

            ```hcl
            resource "digitalocean_kubernetes_cluster" "example" {
              name         = "example"
              region       = "nyc3"
              version      = "1.31.1-do.0"
              auto_upgrade = true

              maintenance_policy {
                start_time = "04:00"
                day        = "sunday"
              }

              node_pool {
                name       = "default"
                size       = "s-1vcpu-2gb"
                node_count = 1
              }
            }
            ```
    refs:
      - url: https://docs.digitalocean.com/products/kubernetes/how-to/upgrade-cluster/
        title: Upgrade a DOKS cluster

  - uid: mondoo-digitalocean-security-doks-auto-upgrade-enabled-digitalocean
    filters: asset.platform == "digitalocean"
    mql: |
      digitalocean.kubernetesClusters.all(autoUpgrade == true)
  - uid: mondoo-digitalocean-security-doks-auto-upgrade-enabled-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "digitalocean_kubernetes_cluster")
    mql: |
      terraform.resources.where(nameLabel == "digitalocean_kubernetes_cluster").all(arguments["auto_upgrade"] == true)
  - uid: mondoo-digitalocean-security-doks-auto-upgrade-enabled-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "digitalocean_kubernetes_cluster")
    mql: |
      terraform.plan.resourceChanges.where(type == "digitalocean_kubernetes_cluster").all(change.after.auto_upgrade == true)
  - uid: mondoo-digitalocean-security-doks-auto-upgrade-enabled-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "digitalocean_kubernetes_cluster")
    mql: |
      terraform.state.resources.where(type == "digitalocean_kubernetes_cluster").all(values.auto_upgrade == true)

  - uid: mondoo-digitalocean-security-doks-supported-version
    title: Ensure DOKS clusters run a supported Kubernetes minor version
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-tvm-03
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-8
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-12
      compliance/nist-csf-2: nist-csf-2-pr-ps-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-1
      compliance/pci-dss-4: pcidss-requirement-6-3-3
      compliance/soc2-2017: soc2-control-cc7-1-5
      compliance/vda-isa-5: vda-isa-5-5-2-5
    variants:
      - uid: mondoo-digitalocean-security-doks-supported-version-digitalocean
        tags:
          mondoo.com/filter-title: DigitalOcean
          mondoo.com/filter-icon: digitalocean
      - uid: mondoo-digitalocean-security-doks-supported-version-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-digitalocean-security-doks-supported-version-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-digitalocean-security-doks-supported-version-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that every DOKS cluster runs Kubernetes version 1.30 or newer, staying within the three-minor-version support window that DigitalOcean maintains. Clusters on older minor versions no longer receive security patches from either the upstream Kubernetes community or DigitalOcean.

        **Why this matters**

        - **Security patch availability:** Upstream Kubernetes supports only the latest three minor versions; clusters on older minors do not receive fixes for newly disclosed CVEs in cluster components.
        - **Provider support boundary:** DigitalOcean aligns its support window with upstream; clusters outside that window may also lose access to critical managed-node updates and operational tooling.
        - **CVE accumulation:** Running an unsupported minor means a growing list of publicly known vulnerabilities exists in the cluster with no patch available, increasing the exploitability of the environment over time.

        **Risk mitigation**

        - **Restored patch coverage:** Upgrading to a supported minor version immediately restores the flow of security fixes from both the upstream community and DigitalOcean's managed node images.
        - **Reduced exposure window:** Supported clusters can apply patch releases promptly, closing CVEs within days rather than leaving them permanently unaddressed.
      audit: |
        ### Audit via Console

        1. Sign in to the DigitalOcean [Cloud Control Panel](https://cloud.digitalocean.com/).
        2. Navigate to **Kubernetes** and review the **Version** column for each cluster.
        3. Compare the version against the currently supported minor versions (1.30 and newer). A banner or badge indicating **Upgrade Available** confirms the cluster is on an unsupported minor.

        A passing cluster shows a version of 1.30 or newer with no upgrade warning. A failing cluster shows a version older than 1.30 or displays an unsupported-version warning.

        ### Audit via CLI

        1. List all clusters and compare their versions against the available supported versions:

        ```bash
        doctl kubernetes cluster list --format ID,Name,Version,Region
        doctl kubernetes options versions
        ```

        A passing cluster returns a version string that matches an entry in the supported versions list. A failing cluster returns a version not present in that list.
      remediation:
        - id: console
          desc: |
            To fix this in the DigitalOcean Cloud Control Panel:

            1. Navigate to **Kubernetes** and open the affected cluster.
            2. Go to **Overview** and click **Upgrade Available** if present.
            3. Select a supported version and confirm the upgrade.
        - id: cli
          desc: |
            To fix this on the command line using the `doctl` CLI, list the available versions and then upgrade the cluster:

            ```bash
            doctl kubernetes options versions
            doctl kubernetes cluster upgrade <cluster-id> --version <supported-version>
            ```
        - id: terraform
          desc: |
            Terraform manages the cluster version through the `version` argument on `digitalocean_kubernetes_cluster`. Set it to a supported minor release (1.30 or newer). Use the `digitalocean_kubernetes_versions` data source to resolve the latest patch for a prefix:

            ```hcl
            data "digitalocean_kubernetes_versions" "example" {
              version_prefix = "1.31."
            }

            resource "digitalocean_kubernetes_cluster" "example" {
              name    = "example"
              region  = "nyc3"
              version = data.digitalocean_kubernetes_versions.example.latest_version

              node_pool {
                name       = "default"
                size       = "s-1vcpu-2gb"
                node_count = 1
              }
            }
            ```
    refs:
      - url: https://docs.digitalocean.com/products/kubernetes/details/supported-releases/
        title: DOKS supported Kubernetes releases

  - uid: mondoo-digitalocean-security-doks-supported-version-digitalocean
    filters: asset.platform == "digitalocean"
    mql: |
      digitalocean.kubernetesClusters.all(
        version == /^1\.(3[0-9]|[4-9][0-9]|[1-9][0-9]{2})\./
      )
  - uid: mondoo-digitalocean-security-doks-supported-version-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "digitalocean_kubernetes_cluster")
    mql: |
      terraform.resources.where(nameLabel == "digitalocean_kubernetes_cluster").all(
        arguments["version"] == /^1\.(3[0-9]|[4-9][0-9]|[1-9][0-9]{2})\./
      )
  - uid: mondoo-digitalocean-security-doks-supported-version-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "digitalocean_kubernetes_cluster")
    mql: |
      terraform.plan.resourceChanges.where(type == "digitalocean_kubernetes_cluster").all(
        change.after.version == /^1\.(3[0-9]|[4-9][0-9]|[1-9][0-9]{2})\./
      )
  - uid: mondoo-digitalocean-security-doks-supported-version-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "digitalocean_kubernetes_cluster")
    mql: |
