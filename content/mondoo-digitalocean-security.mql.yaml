  # No Terraform variants: the check inspects the validity window of the CA certificate the cluster currently advertises — runtime telemetry that has no analog in digitalocean_database_cluster HCL. Terraform expresses desired cluster configuration; the CA is managed and rotated by DigitalOcean and only exposed by the live API.
  - uid: mondoo-digitalocean-security-db-ca-certificate-not-expired
    filters: asset.platform == "digitalocean-database"
    title: Ensure managed database CA certificates are not expired
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-12
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-2-ii-transmission-security-encryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-12
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-10
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-1
    mql: |
      digitalocean.database {
        certificates(pem: caCertificate).all(notAfter > time.now)
      }
    docs:
      desc: |
        This check ensures that every managed database cluster advertises a CA certificate whose validity window has not passed. Clients verify the cluster's TLS endpoint by pinning to this CA; once it expires, every connection that performs TLS verification fails its handshake.

        **Why this matters**

        - **Connection failure cascade:** A managed database whose CA has expired fails every TLS-verifying client at the handshake, taking the cluster offline from the application's perspective even though the cluster itself is healthy.
        - **Silent verification bypass:** Operators under pressure to restore service often disable TLS verification rather than rotate the CA, downgrading future connections to unauthenticated TLS that is vulnerable to man-in-the-middle interception.
        - **Audit and forensics gap:** A revoked or expired CA pinned in application configuration breaks the only signal that distinguishes a legitimate cluster endpoint from a replacement under an attacker's control.
        - **Renewal blind spot:** Managed database CA certificates are rotated by the platform on long cycles, so expiry is easy to miss in the operator's calendar; an automated check catches the renewal need before the outage.

        **Risk mitigation**

        - **Outage prevention:** Detecting CA expiry before it lapses gives operators time to pull the updated CA from the DigitalOcean Cloud Control Panel and distribute it to every client.
        - **TLS posture preservation:** Renewing rather than disabling verification keeps the cluster's authenticated TLS path intact, preventing operators from being pushed into a less-secure fallback.
      audit: |
        ### Audit via Console

        1. Sign in to the DigitalOcean [Cloud Control Panel](https://cloud.digitalocean.com/).
        2. Navigate to **Databases** and open each cluster.
        3. On the **Overview** tab, locate the **CA Certificate** download and inspect the certificate's **Valid Until** field.

        A passing cluster shows a future **Valid Until** date. A failing cluster shows a date that has already passed.

        ### Audit via CLI

        1. List clusters:

        ```bash
        doctl databases list --format ID,Name,Engine
        ```

        2. Download each cluster's CA and inspect the validity window with `openssl`:

        ```bash
        doctl databases get-ca "<database-id>" --format Certificate --no-header \
          | openssl x509 -noout -enddate
        ```

        A passing cluster prints a `notAfter=` date in the future. A failing cluster prints a date in the past.
      remediation:
        - id: console
          desc: |
            DigitalOcean rotates managed database CA certificates on the platform side; the operator action when a CA is approaching or past expiry is to fetch the new certificate and distribute it to every client:

            1. In the Cloud Control Panel, open the cluster's **Overview** tab.
            2. Click **Download CA Certificate** to retrieve the current `ca-certificate.crt`.
            3. Update every application configuration, Kubernetes secret, and CI pipeline that pins the old CA to use the new file.
            4. Restart connecting services so the new CA is loaded.

            If the download still returns an expired certificate, open a DigitalOcean support ticket from the cluster page so the platform can issue a replacement.
        - id: cli
          desc: |
            Pull the new CA with `doctl` and roll it out to every consumer. The command prints the PEM-encoded certificate directly:

            ```bash
            doctl databases get-ca "<database-id>" --format Certificate --no-header > ca-certificate.crt
            ```

            Verify the new validity window before distribution:

            ```bash
            openssl x509 -in ca-certificate.crt -noout -enddate -subject
            ```

            Replace the certificate file in every client trust store, restart services, and confirm new connections succeed.
        # No Terraform remediation: the CA certificate is provisioned and rotated by DigitalOcean, not declared in digitalocean_database_cluster HCL. Terraform-managed clusters still pull the active CA via the runtime API; remediation is to refresh the trust store on consumers, which is a deployment-time concern outside Terraform.
    refs:
      - url: https://docs.digitalocean.com/products/databases/postgresql/how-to/secure-cluster/
        title: Secure a managed database cluster with TLS

  # No Terraform variants: connectionSslEnabled reflects the SSL flag on the live
  # connection object returned by the DigitalOcean API, which the platform sets on
  # every managed cluster. digitalocean_database_cluster exposes no argument to enable
  # or disable TLS, so there is nothing to assert in HCL, plan, or state.
  - uid: mondoo-digitalocean-security-db-connection-ssl-enabled
    filters: asset.platform == "digitalocean-database"
    title: Ensure managed database connections enforce TLS/SSL
    impact: 85
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-2-ii-transmission-security-encryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-1
    mql: |
      digitalocean.database.connectionSslEnabled
    docs:
      desc: |
        This check ensures that every managed database cluster advertises a connection endpoint with TLS/SSL enabled, so that credentials and query data are encrypted in transit between clients and the cluster. A cluster whose connection object reports SSL disabled would accept plaintext connections that expose authentication and payload data to anyone on the network path.

        **Why this matters**

        - **Credential protection:** Database connections carry authentication material on every session; without TLS, usernames and passwords traverse the network in cleartext and can be captured by any host on the path.
        - **Payload confidentiality:** Query results and writes often contain the most sensitive data an organization holds, so an unencrypted connection exposes that data to passive interception.
        - **Man-in-the-middle resistance:** TLS binds the connection to the cluster's certificate, so an attacker cannot transparently proxy or tamper with traffic between the application and the database.
        - **Regulatory expectation:** Frameworks that govern regulated data require encryption of sensitive information whenever it crosses a network boundary, and database traffic is a primary carrier of that data.

        **Risk mitigation**

        - **Interception prevention:** An encrypted connection ensures that a network observer captures only ciphertext, keeping credentials and records confidential end to end.
        - **Integrity assurance:** TLS detects tampering in flight, so an attacker cannot silently modify queries or responses between the client and the cluster.
      audit: |
        ### Audit via Console

        1. Sign in to the DigitalOcean [Cloud Control Panel](https://cloud.digitalocean.com/).
        2. Navigate to **Databases** and open each cluster.
        3. On the **Overview** tab, inspect the **Connection Details** panel and confirm the connection string uses `sslmode=require` (PostgreSQL), `ssl-mode=REQUIRED` (MySQL), or the engine's equivalent TLS parameter.

        A passing cluster presents a TLS-enabled connection string. A failing cluster presents a connection string with SSL disabled.

        ### Audit via CLI

        1. List clusters, then inspect each cluster's connection details:

        ```bash
        doctl databases list --format ID,Name,Engine
        doctl databases connection <database-id> --format Host,Port,SSL
        ```

        A passing cluster reports `SSL` as `true`. A failing cluster reports `SSL` as `false`.
      remediation:
        - id: console
          desc: |
            DigitalOcean enables TLS/SSL on managed database connection endpoints by default and does not expose a toggle to disable it in the Cloud Control Panel. If a client is connecting without TLS, the fix is on the client side:

            1. In the Cloud Control Panel, open the cluster's **Overview** tab and copy the **Connection Details**.
            2. Update every application connection string to request TLS, for example `sslmode=require` for PostgreSQL or `ssl-mode=REQUIRED` for MySQL.
            3. Download the cluster's CA certificate and configure clients to verify against it for full certificate validation.
            4. Restart connecting services so the TLS-enabled configuration takes effect.
        - id: cli
          desc: |
            Retrieve the TLS-enabled connection details and roll them out to every client. The connection command returns the host, port, user, and SSL flag for the cluster:

            ```bash
            doctl databases connection <database-id> --format Host,Port,User,SSL
            ```

            Update each application's connection string to require TLS, such as appending `?sslmode=require` for PostgreSQL, then restart the connecting services and confirm sessions negotiate TLS.
        # No Terraform remediation: TLS on managed database connections is enforced by the DigitalOcean platform and is not a declarable argument on digitalocean_database_cluster. Requiring TLS is a client-side connection-string concern that lives outside the cluster's Terraform definition.
    refs:
      - url: https://docs.digitalocean.com/products/databases/postgresql/how-to/secure-cluster/
        title: Secure a managed database cluster with TLS

  - uid: mondoo-digitalocean-security-lb-http-redirected-to-https
    title: Ensure load balancers redirect HTTP traffic to HTTPS
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-2-ii-transmission-security-encryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    variants:
      - uid: mondoo-digitalocean-security-lb-http-redirected-to-https-digitalocean
        tags:
          mondoo.com/filter-title: DigitalOcean
          mondoo.com/filter-icon: digitalocean
      - uid: mondoo-digitalocean-security-lb-http-redirected-to-https-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-digitalocean-security-lb-http-redirected-to-https-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-digitalocean-security-lb-http-redirected-to-https-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that any load balancer accepting inbound HTTP traffic has `redirectHttpToHttps` enabled, so clients are issued a 301 redirect to the HTTPS equivalent of their request. A load balancer that forwards HTTP without redirecting it allows plaintext sessions end-to-end.

        **Why this matters**

        - **Credential and session protection:** Plaintext HTTP exposes authentication tokens, session cookies, API keys, and form submissions to any host on the network path between the client and the load balancer.
        - **Downgrade attack prevention:** Without an enforced redirect, a passive attacker can strip HTTPS by intercepting the initial HTTP request before the client has a chance to use HTTPS.
        - **Client guidance:** A 301 redirect updates bookmarks and caches so clients use HTTPS for all future requests, not only when they happen to type the HTTPS URL.

        **Risk mitigation**

        - **Transport encryption enforcement:** Redirecting HTTP to HTTPS ensures all active sessions use TLS, so network-level interception cannot yield plaintext traffic.
        - **Consistent TLS posture:** Enabling the redirect at the load balancer enforces HTTPS for every backend regardless of whether individual application components handle the redirect themselves.
      audit: |
        ### Audit via Console

        1. Sign in to the DigitalOcean [Cloud Control Panel](https://cloud.digitalocean.com/).
        2. Navigate to **Networking** > **Load Balancers** and open each load balancer.
        3. Go to **Settings** > **Forwarding Rules**.
        4. Check whether **Redirect HTTP to HTTPS** is enabled.

        A passing load balancer either has no HTTP forwarding rule or has HTTP-to-HTTPS redirect enabled. A failing load balancer has an HTTP forwarding rule without the redirect enabled.

        ### Audit via CLI

        1. List all load balancers and inspect the `RedirectHttpToHttps` field:

        ```bash
        doctl compute load-balancer list --format ID,Name,RedirectHttpToHttps,ForwardingRules
        ```

        A passing load balancer returns `true` for `RedirectHttpToHttps` or has no HTTP forwarding rule. A failing load balancer returns `false` for `RedirectHttpToHttps` while an HTTP forwarding rule is present.
      remediation:
        - id: console
          desc: |
            To fix this in the DigitalOcean Cloud Control Panel:

            1. Navigate to **Networking** > **Load Balancers** and open the affected load balancer.
            2. Go to **Settings** > **Forwarding Rules**.
            3. Enable **Redirect HTTP to HTTPS**. Confirm that an HTTPS forwarding rule and TLS certificate are configured.
        - id: cli
          desc: |
            The `doctl compute load-balancer update` command sends a full replacement of the load balancer configuration: any attribute you do not pass is reset to its default value. First read the current configuration, then repeat it in the update call together with the redirect flag:

            ```bash
            doctl compute load-balancer get "<lb-id>" \
              --format Name,Region,ForwardingRules,DropletIDs --no-header
            doctl compute load-balancer update "<lb-id>" \
              --name "<name>" \
              --region "<region>" \
              --forwarding-rules "<current-forwarding-rules>" \
              --droplet-ids "<droplet-ids>" \
              --redirect-http-to-https
            ```

            If the load balancer targets Droplets by tag, pass `--tag-name` instead of `--droplet-ids`.
        - id: terraform
          desc: |
            To enforce the HTTP-to-HTTPS redirect in Terraform, set `redirect_http_to_https = true` on the `digitalocean_loadbalancer` resource alongside an HTTPS forwarding rule:

            ```hcl
            resource "digitalocean_loadbalancer" "example" {
              name                   = "example-lb"
              region                 = "nyc3"
              redirect_http_to_https = true

              forwarding_rule {
                entry_port       = 443
                entry_protocol   = "https"
                target_port      = 80
                target_protocol  = "http"
                certificate_name = digitalocean_certificate.example.name
              }
            }
            ```
    refs:
      - url: https://docs.digitalocean.com/products/networking/load-balancers/how-to/ssl-termination/
        title: Load balancer SSL termination and redirect

  - uid: mondoo-digitalocean-security-lb-http-redirected-to-https-digitalocean
    filters: asset.platform == "digitalocean-loadbalancer"
    mql: |
      digitalocean.loadBalancer {
        forwardingRules.none(_["entry_protocol"] == "http") || redirectHttpToHttps == true
      }
  - uid: mondoo-digitalocean-security-lb-http-redirected-to-https-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "digitalocean_loadbalancer")
    mql: |
      terraform.resources("digitalocean_loadbalancer").all(
        blocks.where(type == "forwarding_rule").none(arguments["entry_protocol"] == "http") ||
        arguments["redirect_http_to_https"] == true
      )
  - uid: mondoo-digitalocean-security-lb-http-redirected-to-https-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "digitalocean_loadbalancer")
    mql: |
      terraform.plan.resourceChanges.where(type == "digitalocean_loadbalancer").all(
        change.after["forwarding_rule"] == empty ||
        change.after["forwarding_rule"].none(_["entry_protocol"] == "http") ||
        change.after.redirect_http_to_https == true
      )
  - uid: mondoo-digitalocean-security-lb-http-redirected-to-https-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "digitalocean_loadbalancer")
    mql: |
      terraform.state.resources.where(type == "digitalocean_loadbalancer").all(
        values["forwarding_rule"] == empty ||
        values["forwarding_rule"].none(_["entry_protocol"] == "http") ||
        values.redirect_http_to_https == true
      )

  # No Terraform variants: tlsCipherPolicy reflects the minimum TLS cipher policy resolved by
  # the DigitalOcean load balancer service. The digitalocean_loadbalancer Terraform resource
  # has no argument that selects between the DEFAULT and STRONG cipher policies, so the setting
  # cannot be asserted in HCL, plan, or state.
  - uid: mondoo-digitalocean-security-lb-strong-tls-cipher-policy
    title: Ensure TLS load balancers enforce the strong TLS cipher policy
    impact: 70
    filters: asset.platform == "digitalocean-loadbalancer"
    mql: |
      digitalocean.loadBalancer {
        forwardingRules.none(_["entry_protocol"] == "https" || _["entry_protocol"] == "tls") || tlsCipherPolicy == "STRONG"
      }
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-2-ii-transmission-security-encryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    docs:
      desc: |
        This check ensures that any load balancer terminating TLS uses the `STRONG` minimum TLS cipher policy rather than the `DEFAULT` policy. The `STRONG` policy negotiates only TLS 1.2 and later with a restricted set of modern, forward-secret cipher suites, whereas the default policy permits a broader, weaker set for backward compatibility.

        **Why this matters**

        - **Modern ciphers only:** The strong policy removes cipher suites that lack forward secrecy or rely on weaker primitives, so captured traffic cannot be decrypted later if a key is compromised.
        - **Downgrade resistance:** Restricting the negotiable protocol versions and ciphers narrows the room an attacker has to force a client onto a weaker connection.
        - **Compliance alignment:** Frameworks that require strong cryptography for data in transit are satisfied by the restricted policy but not by the permissive default.

        **Risk mitigation**

        - **Traffic interception:** Enforcing strong cipher suites keeps TLS sessions resistant to passive decryption and known cipher-level attacks.
        - **Standards drift:** Pinning the load balancer to the strong policy prevents weak ciphers from being negotiated as client populations change over time.
      audit: |
        ### Audit via Console

        1. Sign in to the DigitalOcean [Cloud Control Panel](https://cloud.digitalocean.com/).
        2. Navigate to **Networking** > **Load Balancers** and open each load balancer that has an HTTPS or TLS forwarding rule.
        3. Go to **Settings** and review the **TLS Cipher Policy** value.

        A passing load balancer terminating TLS shows the cipher policy set to **Strong**. A failing load balancer terminating TLS shows the **Default** cipher policy.

        ### Audit via CLI

        1. List load balancers and inspect the `tls_cipher_policy` field alongside the forwarding rules:

        ```bash
        doctl compute load-balancer list --output json | jq -r '.[] | [.id, .name, .tls_cipher_policy] | @tsv'
        ```

        A passing load balancer that terminates TLS returns `STRONG`. A failing load balancer that terminates TLS returns `DEFAULT` or an empty value.
      remediation:
        - id: console
          desc: |
            To enforce the strong cipher policy in the DigitalOcean Cloud Control Panel:

            1. Navigate to **Networking** > **Load Balancers** and open the affected load balancer.
            2. Go to **Settings** and set the **TLS Cipher Policy** to **Strong**.
            3. Confirm that clients still negotiate successfully, since the strong policy drops TLS 1.1 and older and legacy ciphers.
        - id: cli
          desc: |
            The `doctl compute load-balancer update` command replaces the full load balancer configuration, so any attribute you do not pass is reset to its default. Read the current configuration first, then re-apply it together with the strong cipher policy:

            ```bash
            doctl compute load-balancer get "<lb-id>" \
              --format Name,Region,ForwardingRules,DropletIDs --no-header
            doctl compute load-balancer update "<lb-id>" \
              --name "<name>" \
              --region "<region>" \
              --forwarding-rules "<current-forwarding-rules>" \
              --droplet-ids "<droplet-ids>" \
              --tls-cipher-policy strong
            ```
        # No Terraform remediation: the digitalocean_loadbalancer resource has no argument for the
        # minimum TLS cipher policy, so the STRONG policy cannot be set through Terraform.
    refs:
      - url: https://docs.digitalocean.com/products/networking/load-balancers/how-to/ssl-termination/
        title: Load balancer SSL termination

  - uid: mondoo-digitalocean-security-lb-in-vpc
    title: Ensure load balancers are deployed inside a VPC
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-1-5
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-digitalocean-security-lb-in-vpc-digitalocean
        tags:
          mondoo.com/filter-title: DigitalOcean
          mondoo.com/filter-icon: digitalocean
      - uid: mondoo-digitalocean-security-lb-in-vpc-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-digitalocean-security-lb-in-vpc-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-digitalocean-security-lb-in-vpc-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that every load balancer is attached to a Virtual Private Cloud (VPC). By default, load balancers can be created without VPC association, which forces backend communication through public-facing addresses.

        **Why this matters**

        - **Private backend connectivity:** A VPC-attached load balancer reaches its backend Droplets on private IPs, keeping intra-application traffic entirely within DigitalOcean's internal network.
        - **Reduced public attack surface:** Without VPC attachment, the load balancer must communicate with backends using public endpoints, adding unnecessary internet-reachable addresses to the infrastructure.
        - **Network segmentation:** Placing the load balancer and its backends in the same VPC enables other network controls such as private firewall rules and internal DNS resolution to function correctly.

        **Risk mitigation**

        - **Traffic isolation:** VPC-internal load balancer to backend traffic cannot be intercepted by hosts outside the VPC, eliminating the risk of man-in-the-middle attacks on the internal forwarding path.
        - **Segmentation enforcement:** VPC membership allows firewall rules to reference the VPC as a trusted source, making it straightforward to allow only load-balancer-originated traffic to backend ports.
      audit: |
        ### Audit via Console

        1. Sign in to the DigitalOcean [Cloud Control Panel](https://cloud.digitalocean.com/).
        2. Navigate to **Networking** > **Load Balancers** and open each load balancer.
        3. Check the **Network** section for a VPC assignment.

        A passing load balancer shows a named VPC in the Network section. A failing load balancer shows no VPC or only a public network assignment.

        ### Audit via CLI

        1. List all load balancers and inspect the `VPCUUID` field:

        ```bash
        doctl compute load-balancer list --format ID,Name,VPCUUID,Region
        ```

        A passing load balancer returns a non-empty `VPCUUID`. A failing load balancer returns an empty `VPCUUID`.
      remediation:
        - id: console
          desc: |
            DigitalOcean does not support moving a load balancer between VPCs after creation. To fix this in the Cloud Control Panel, create a replacement load balancer in the target VPC and cut traffic over:

            1. Navigate to **Networking** > **Load Balancers** and create a new load balancer.
            2. In the creation flow, select the target VPC under **Network**.
            3. Configure forwarding rules and attach the same Droplets (or the same tag).
            4. Update DNS to point at the new load balancer's IP, then delete the old one.
        - id: cli
          desc: |
            To fix this on the command line using the `doctl` CLI, create a replacement load balancer inside the target VPC:

            ```bash
            doctl compute load-balancer create \
              --name <new-name> \
              --region <region> \
              --vpc-uuid <vpc-uuid> \
              --droplet-ids <droplet-ids> \
              --forwarding-rules "entry_protocol:https,entry_port:443,target_protocol:http,target_port:80,certificate_id:<cert-id>"
            ```
        - id: terraform
          desc: |
            To deploy load balancers inside a VPC in Terraform, set `vpc_uuid` on the `digitalocean_loadbalancer` resource:

            ```hcl
            resource "digitalocean_loadbalancer" "example" {
              name     = "example-lb"
              region   = "nyc3"
              vpc_uuid = digitalocean_vpc.example.id

              forwarding_rule {
                entry_port       = 443
                entry_protocol   = "https"
                target_port      = 80
                target_protocol  = "http"
                certificate_name = digitalocean_certificate.example.name
              }

              droplet_ids = [digitalocean_droplet.example.id]
            }
            ```
    refs:
      - url: https://docs.digitalocean.com/products/networking/vpc/
        title: DigitalOcean VPC overview

  - uid: mondoo-digitalocean-security-lb-in-vpc-digitalocean
    filters: asset.platform == "digitalocean-loadbalancer"
    mql: |
      digitalocean.loadBalancer.vpc != null
  - uid: mondoo-digitalocean-security-lb-in-vpc-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "digitalocean_loadbalancer")
    mql: |
      terraform.resources("digitalocean_loadbalancer").all(arguments.vpc_uuid != empty)
  - uid: mondoo-digitalocean-security-lb-in-vpc-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "digitalocean_loadbalancer")
    mql: |
      terraform.plan.resourceChanges.where(type == "digitalocean_loadbalancer").all(change.after.vpc_uuid != empty)
  - uid: mondoo-digitalocean-security-lb-in-vpc-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "digitalocean_loadbalancer")
    mql: |
      terraform.state.resources.where(type == "digitalocean_loadbalancer").all(values.vpc_uuid != empty)

  - uid: mondoo-digitalocean-security-doks-auto-upgrade-enabled
    title: Ensure DOKS clusters have auto-upgrade enabled
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-tvm-03
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-8
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-12
      compliance/nist-csf-2: nist-csf-2-pr-ps-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-1
      compliance/pci-dss-4: pcidss-requirement-6-3-3
      compliance/soc2-2017: soc2-control-cc7-1-5
      compliance/vda-isa-5: vda-isa-5-5-2-5
    variants:
      - uid: mondoo-digitalocean-security-doks-auto-upgrade-enabled-digitalocean
        tags:
          mondoo.com/filter-title: DigitalOcean
          mondoo.com/filter-icon: digitalocean
      - uid: mondoo-digitalocean-security-doks-auto-upgrade-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-digitalocean-security-doks-auto-upgrade-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-digitalocean-security-doks-auto-upgrade-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that every DigitalOcean Kubernetes Service (DOKS) cluster has automatic patch upgrades enabled. By default, auto-upgrade is not enabled on new clusters, leaving patch application as a manual operator responsibility.

        **Why this matters**

        - **Patch gap closure:** Kubernetes control-plane and node components receive regular patch releases that fix security vulnerabilities; clusters without auto-upgrade accumulate unpatched CVEs during the window between disclosure and manual action.
        - **Reduced operational burden:** Enabling auto-upgrade within a configured maintenance window removes the need for operators to track and manually apply each patch release, lowering the likelihood of a missed update.
        - **Consistent security posture:** Auto-upgrade ensures all clusters in the account receive patches on a predictable schedule rather than depending on per-cluster manual follow-through.

        **Risk mitigation**

        - **Exploit window reduction:** Automated patching closes known-exploited vulnerabilities within the maintenance window rather than leaving them open until an operator notices the available update.
        - **Human error elimination:** Automating patch application removes the operational step most likely to be delayed or skipped during periods of high workload.
      audit: |
        ### Audit via Console

        1. Sign in to the DigitalOcean [Cloud Control Panel](https://cloud.digitalocean.com/).
        2. Navigate to **Kubernetes** and open each cluster.
        3. Go to **Settings** > **Maintenance** and check whether **Automatically upgrade my cluster to patch releases** is enabled.

        A passing cluster shows auto-upgrade as enabled. A failing cluster shows auto-upgrade as disabled or unconfigured.

        ### Audit via CLI

        1. List all Kubernetes clusters and inspect the `AutoUpgrade` field:

        ```bash
        doctl kubernetes cluster list --format ID,Name,AutoUpgrade,Version,Region
        ```

        A passing cluster returns `true` for `AutoUpgrade`. A failing cluster returns `false`.
      remediation:
        - id: console
          desc: |
            To fix this in the DigitalOcean Cloud Control Panel:

            1. Navigate to **Kubernetes** and open the affected cluster.
            2. Go to **Settings** > **Maintenance**.
            3. Enable **Automatically upgrade my cluster to patch releases**.
        - id: cli
          desc: |
            To fix this on the command line using the `doctl` CLI, enable auto-upgrade on the affected cluster:

            ```bash
            doctl kubernetes cluster update <cluster-id> --auto-upgrade=true
            ```
        - id: terraform
          desc: |
            To enable automatic patch upgrades in Terraform, set `auto_upgrade = true` on the `digitalocean_kubernetes_cluster` resource (a `maintenance_policy` block is recommended to control the upgrade window):

            ```hcl
            resource "digitalocean_kubernetes_cluster" "example" {
              name         = "example"
              region       = "nyc3"
              version      = "1.31.1-do.0"
              auto_upgrade = true

              maintenance_policy {
                start_time = "04:00"
                day        = "sunday"
              }

              node_pool {
                name       = "default"
                size       = "s-1vcpu-2gb"
                node_count = 1
              }
            }
            ```
    refs:
      - url: https://docs.digitalocean.com/products/kubernetes/how-to/upgrade-cluster/
        title: Upgrade a DOKS cluster

  - uid: mondoo-digitalocean-security-doks-auto-upgrade-enabled-digitalocean
    filters: asset.platform == "digitalocean-kubernetes-cluster"
    mql: |
      digitalocean.kubernetes.cluster.autoUpgrade == true
  - uid: mondoo-digitalocean-security-doks-auto-upgrade-enabled-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "digitalocean_kubernetes_cluster")
    mql: |
      terraform.resources("digitalocean_kubernetes_cluster").all(arguments["auto_upgrade"] == true)
  - uid: mondoo-digitalocean-security-doks-auto-upgrade-enabled-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "digitalocean_kubernetes_cluster")
    mql: |
      terraform.plan.resourceChanges.where(type == "digitalocean_kubernetes_cluster").all(change.after.auto_upgrade == true)
  - uid: mondoo-digitalocean-security-doks-auto-upgrade-enabled-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "digitalocean_kubernetes_cluster")
    mql: |
      terraform.state.resources.where(type == "digitalocean_kubernetes_cluster").all(values.auto_upgrade == true)

  - uid: mondoo-digitalocean-security-doks-supported-version
    title: Ensure DOKS clusters run a supported Kubernetes minor version
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-tvm-03
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-8
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-12
      compliance/nist-csf-2: nist-csf-2-pr-ps-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-1
      compliance/pci-dss-4: pcidss-requirement-6-3-3
      compliance/soc2-2017: soc2-control-cc7-1-5
      compliance/vda-isa-5: vda-isa-5-5-2-5
    variants:
      - uid: mondoo-digitalocean-security-doks-supported-version-digitalocean
        tags:
          mondoo.com/filter-title: DigitalOcean
          mondoo.com/filter-icon: digitalocean
      - uid: mondoo-digitalocean-security-doks-supported-version-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-digitalocean-security-doks-supported-version-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-digitalocean-security-doks-supported-version-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that every DOKS cluster runs Kubernetes version 1.30 or newer, staying within the three-minor-version support window that DigitalOcean maintains. Clusters on older minor versions no longer receive security patches from either the upstream Kubernetes community or DigitalOcean.

        **Why this matters**

        - **Security patch availability:** Upstream Kubernetes supports only the latest three minor versions; clusters on older minors do not receive fixes for newly disclosed CVEs in cluster components.
        - **Provider support boundary:** DigitalOcean aligns its support window with upstream; clusters outside that window may also lose access to critical managed-node updates and operational tooling.
        - **CVE accumulation:** Running an unsupported minor means a growing list of publicly known vulnerabilities exists in the cluster with no patch available, increasing the exploitability of the environment over time.

        **Risk mitigation**

        - **Restored patch coverage:** Upgrading to a supported minor version immediately restores the flow of security fixes from both the upstream community and DigitalOcean's managed node images.
        - **Reduced exposure window:** Supported clusters can apply patch releases promptly, closing CVEs within days rather than leaving them permanently unaddressed.
      audit: |
        ### Audit via Console

        1. Sign in to the DigitalOcean [Cloud Control Panel](https://cloud.digitalocean.com/).
        2. Navigate to **Kubernetes** and review the **Version** column for each cluster.
        3. Compare the version against the currently supported minor versions (1.30 and newer). A banner or badge indicating **Upgrade Available** confirms the cluster is on an unsupported minor.

        A passing cluster shows a version of 1.30 or newer with no upgrade warning. A failing cluster shows a version older than 1.30 or displays an unsupported-version warning.

        ### Audit via CLI

        1. List all clusters and compare their versions against the available supported versions:

        ```bash
        doctl kubernetes cluster list --format ID,Name,Version,Region
        doctl kubernetes options versions
        ```

        A passing cluster returns a version string that matches an entry in the supported versions list. A failing cluster returns a version not present in that list.
      remediation:
        - id: console
          desc: |
            To fix this in the DigitalOcean Cloud Control Panel:

            1. Navigate to **Kubernetes** and open the affected cluster.
            2. Go to **Overview** and click **Upgrade Available** if present.
            3. Select a supported version and confirm the upgrade.
        - id: cli
          desc: |
            To fix this on the command line using the `doctl` CLI, list the available versions and then upgrade the cluster:

            ```bash
            doctl kubernetes options versions
            doctl kubernetes cluster upgrade <cluster-id> --version <supported-version>
            ```
        - id: terraform
          desc: |
            Terraform manages the cluster version through the `version` argument on `digitalocean_kubernetes_cluster`. Use the `digitalocean_kubernetes_versions` data source to resolve the latest patch release for a minor version, and keep the prefix pointed at a release DigitalOcean still supports, 1.30 or newer:

            ```hcl
            data "digitalocean_kubernetes_versions" "example" {
              version_prefix = "1.31."
            }

            resource "digitalocean_kubernetes_cluster" "example" {
              name    = "example"
              region  = "nyc3"
              version = data.digitalocean_kubernetes_versions.example.latest_version

              node_pool {
                name       = "default"
                size       = "s-1vcpu-2gb"
                node_count = 1
              }
            }
            ```
    refs:
      - url: https://docs.digitalocean.com/products/kubernetes/details/supported-releases/
        title: DOKS supported Kubernetes releases

  - uid: mondoo-digitalocean-security-doks-supported-version-digitalocean
    filters: asset.platform == "digitalocean-kubernetes-cluster"
    mql: |
      digitalocean.kubernetes.cluster.version == /^1\.(3[0-9]|[4-9][0-9]|[1-9][0-9]{2})\./
  - uid: mondoo-digitalocean-security-doks-supported-version-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "digitalocean_kubernetes_cluster")
    mql: |
      terraform.resources("digitalocean_kubernetes_cluster").all(
        arguments["version"] == /^1\.(3[0-9]|[4-9][0-9]|[1-9][0-9]{2})\./
      )
  - uid: mondoo-digitalocean-security-doks-supported-version-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "digitalocean_kubernetes_cluster")
    mql: |
      terraform.plan.resourceChanges.where(type == "digitalocean_kubernetes_cluster").all(
        change.after.version == /^1\.(3[0-9]|[4-9][0-9]|[1-9][0-9]{2})\./
      )
  - uid: mondoo-digitalocean-security-doks-supported-version-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "digitalocean_kubernetes_cluster")
    mql: |
      terraform.state.resources.where(type == "digitalocean_kubernetes_cluster").all(
        values.version == /^1\.(3[0-9]|[4-9][0-9]|[1-9][0-9]{2})\./
      )

  # No Terraform variants: SSO configuration was added to the DigitalOcean godo
  # SDK in v1.187.0 and the digitalocean Terraform provider does not yet expose
  # an `sso` block on digitalocean_kubernetes_cluster. Revisit once the provider
  # adds the field.
  # No Terraform remediation: see above.
  - uid: mondoo-digitalocean-security-doks-sso-enabled
    filters: asset.platform == "digitalocean-kubernetes-cluster"
    title: Ensure DOKS clusters have SSO configured
    impact: 50
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-14
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-2
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-2
    mql: |
      digitalocean.kubernetes.cluster.ssoEnabled == true
    docs:
      desc: |
        This check ensures that every DOKS cluster has Single Sign-On (SSO) configured against an OIDC identity provider. Without SSO configured, cluster authentication relies entirely on static kubeconfig tokens with no identity-provider integration.

        **Why this matters**

        - **Centralized identity management:** SSO configuration connects the cluster to an authoritative identity provider, enabling user lifecycle events such as offboarding to propagate to cluster access automatically.
        - **MFA enablement:** Once SSO is configured, MFA policies defined in the identity provider apply to cluster authentication, raising the bar for credential-based attacks.
        - **Access visibility:** IdP-integrated authentication creates an audit trail in the identity provider that shows who authenticated to the cluster and when, which static tokens do not provide.

        **Risk mitigation**

        - **Stale access prevention:** Identity-provider integration enables revoking a user's cluster access by deprovisioning their IdP account, without requiring separate kubeconfig rotation for each cluster.
        - **Prerequisite for enforcement:** SSO must be configured before it can be required; establishing the integration is the necessary first step toward fully enforced IdP-based cluster authentication.
      audit: |
        ### Audit via Console

        1. Sign in to the DigitalOcean [Cloud Control Panel](https://cloud.digitalocean.com/).
        2. Navigate to **Kubernetes** and open each cluster.
        3. Go to **Settings** > **Single Sign-On** and check whether an OIDC identity provider is configured.

        A passing cluster shows an SSO configuration with an issuer URL and client ID. A failing cluster shows the SSO section as unconfigured.

        ### Audit via CLI

        1. Inspect the cluster's SSO configuration:

        ```bash
        doctl kubernetes cluster get "<cluster-id>" --output json | jq '.[0].sso'
        ```

        A passing cluster returns an `sso` object with `"enabled": true`. A failing cluster returns `"enabled": false` or no `sso` object.
      remediation:
        - id: console
          desc: |
            To fix this in the DigitalOcean Cloud Control Panel:

            1. Navigate to **Kubernetes** and open the affected cluster.
            2. Go to **Settings** > **Single Sign-On**.
            3. Configure the OIDC identity provider issuer URL and client ID.
            4. Save. Plan a follow-up to enable **Require SSO for cluster access** once users are migrated.
        - id: cli
          desc: |
            To fix this on the command line using the `doctl` CLI, configure the OIDC identity provider and enable SSO on the cluster:

            ```bash
            doctl kubernetes cluster update "<cluster-id>" \
              --sso-issuer-url "<oidc-issuer-url>" \
              --sso-client-id "<client-id>" \
              --sso-enabled
            ```
    refs:
      - url: https://docs.digitalocean.com/products/kubernetes/how-to/manage-cluster-access/
        title: Manage DOKS cluster access

  # No Terraform variants: SSO configuration was added to the DigitalOcean godo
  # SDK in v1.187.0 and the digitalocean Terraform provider does not yet expose
  # an `sso` block on digitalocean_kubernetes_cluster. Revisit once the provider
  # adds the field.
  # No Terraform remediation: see above.
  - uid: mondoo-digitalocean-security-doks-sso-required
    filters: asset.platform == "digitalocean-kubernetes-cluster"
    title: Ensure DOKS clusters require SSO for cluster authentication
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-14
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-2
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-2
    mql: |
      digitalocean.kubernetes.cluster.ssoRequired == true
    docs:
      desc: |
        This check ensures that every DOKS cluster has SSO both configured and required for all cluster authentication, so that kubectl access is authenticated through the OIDC identity provider rather than through static tokens. Enabling SSO without requiring it leaves static-token paths active.

        **Why this matters**

        - **Static token elimination:** Requiring SSO disables static kubeconfig tokens as a valid authentication path, ensuring every user session is backed by a live IdP session that can be revoked.
        - **Joiner/mover/leaver enforcement:** With SSO required, deprovisioning a user in the identity provider immediately revokes their cluster access without requiring separate kubeconfig rotation.
        - **MFA coverage:** Required SSO ensures MFA policies in the IdP apply to every cluster authentication attempt, not only to users who happen to use the SSO flow voluntarily.

        **Risk mitigation**

        - **Revocation immediacy:** Revoking a user at the IdP takes effect at the next kubectl session, eliminating the window where a former employee or compromised account retains access via a pre-issued token.
        - **Credential theft impact reduction:** Even if a static kubeconfig token is exfiltrated, required SSO prevents its use because the API server will not accept non-IdP-issued credentials.
      audit: |
        ### Audit via Console

        1. Sign in to the DigitalOcean [Cloud Control Panel](https://cloud.digitalocean.com/).
        2. Navigate to **Kubernetes** and open each cluster.
        3. Go to **Settings** > **Single Sign-On** and check whether **Require SSO for cluster access** is enabled.

        A passing cluster shows **Require SSO for cluster access** as enabled. A failing cluster has SSO configured but the require toggle disabled, or has no SSO configured at all.

        ### Audit via CLI

        1. Inspect the cluster's SSO configuration:

        ```bash
        doctl kubernetes cluster get "<cluster-id>" --output json | jq '.[0].sso'
        ```

        A passing cluster returns an `sso` object with both `"enabled": true` and `"required": true`. A failing cluster returns `"required": false` or has no SSO configured.
      remediation:
        - id: console
          desc: |
            To fix this in the DigitalOcean Cloud Control Panel:

            1. Navigate to **Kubernetes** and open the affected cluster.
            2. Go to **Settings** > **Single Sign-On**.
            3. Configure the OIDC identity provider issuer URL and client ID if not already done.
            4. Enable **Require SSO for cluster access** so that token-based access is no longer permitted.
        - id: cli
          desc: |
            To fix this on the command line using the `doctl` CLI, enable SSO and mark it as required so the cluster rejects non-SSO authentication:

            ```bash
            doctl kubernetes cluster update "<cluster-id>" \
              --sso-issuer-url "<oidc-issuer-url>" \
              --sso-client-id "<client-id>" \
              --sso-enabled \
              --sso-required
            ```
    refs:
      - url: https://docs.digitalocean.com/products/kubernetes/how-to/manage-cluster-access/
        title: Manage DOKS cluster access

  - uid: mondoo-digitalocean-security-doks-in-vpc
    title: Ensure DOKS clusters are deployed inside a VPC
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-1-5
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-digitalocean-security-doks-in-vpc-digitalocean
        tags:
          mondoo.com/filter-title: DigitalOcean
          mondoo.com/filter-icon: digitalocean
      - uid: mondoo-digitalocean-security-doks-in-vpc-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-digitalocean-security-doks-in-vpc-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-digitalocean-security-doks-in-vpc-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that every DigitalOcean Kubernetes (DOKS) cluster is deployed inside a Virtual Private Cloud (VPC). When a cluster is not assigned a VPC at creation time, its worker nodes communicate over the default network rather than an isolated private network boundary.

        **Why this matters**

        - **Network segmentation:** A VPC gives the cluster's worker nodes a private network boundary that contains intra-cluster and node-to-resource traffic instead of routing it across the shared default network.
        - **Private connectivity:** VPC membership lets the cluster reach managed databases, Droplets, and load balancers in the same VPC over private IPs, keeping that traffic off public addresses.
        - **Lateral movement containment:** A compromised node in a VPC-isolated cluster has a narrower reachable network than one on the default network, limiting how far an attacker can pivot.

        **Risk mitigation**

        - **Reduced attack surface:** Keeping node-to-resource traffic on a private network removes the exposure window that arises when those connections traverse public interfaces.
        - **Defense in depth:** VPC isolation supplements Kubernetes-level network policies and cloud firewalls, so a single misconfiguration in one layer does not immediately expose the cluster's internal traffic.
      audit: |
        ### Audit via Console

        1. Sign in to the DigitalOcean [Cloud Control Panel](https://cloud.digitalocean.com/).
        2. Navigate to **Kubernetes** and open each cluster.
        3. On the **Overview** tab, check the **VPC Network** assignment.

        A passing cluster shows a named VPC. A failing cluster shows no VPC or only the default network.

        ### Audit via CLI

        1. List all clusters and inspect each cluster's VPC UUID:

        ```bash
        doctl kubernetes cluster list --output json | jq -r '.[] | [.id, .name, .vpc_uuid] | @tsv'
        ```

        A passing cluster returns a non-empty `vpc_uuid`. A failing cluster returns an empty value.
      remediation:
        - id: console
          desc: |
            DigitalOcean does not support moving an existing DOKS cluster into a different VPC. The fix is to create a replacement cluster in the target VPC and migrate workloads, so plan for a cutover.

            1. Navigate to **Kubernetes** and create a new cluster.
            2. In the creation flow, select the target VPC under **VPC Network**.
            3. Re-deploy workloads (for example with `kubectl` or your GitOps pipeline) to the new cluster and verify connectivity.
            4. Repoint ingress and DNS, then delete the original cluster.
        - id: cli
          desc: |
            Create a replacement cluster inside the target VPC and migrate workloads, since the VPC cannot be changed in place:

            ```bash
            doctl kubernetes cluster create <new-name> \
              --region <region> \
              --vpc-uuid <vpc-uuid> \
              --node-pool "name=default;size=s-1vcpu-2gb;count=3"
            ```

            Migrate workloads to the new cluster, verify, then delete the original.
        - id: terraform
          desc: |
            To deploy a DOKS cluster inside a VPC in Terraform, set `vpc_uuid` on the `digitalocean_kubernetes_cluster` resource:

            ```hcl
            resource "digitalocean_kubernetes_cluster" "example" {
              name     = "example"
              region   = "nyc3"
              version  = "1.31.1-do.0"
              vpc_uuid = digitalocean_vpc.example.id

              node_pool {
                name       = "default"
                size       = "s-1vcpu-2gb"
                node_count = 3
              }
            }
            ```
    refs:
      - url: https://docs.digitalocean.com/products/networking/vpc/
        title: DigitalOcean VPC overview

  - uid: mondoo-digitalocean-security-doks-in-vpc-digitalocean
    filters: asset.platform == "digitalocean-kubernetes-cluster"
    mql: |
      digitalocean.kubernetes.cluster.vpc != null
  - uid: mondoo-digitalocean-security-doks-in-vpc-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "digitalocean_kubernetes_cluster")
    mql: |
      terraform.resources("digitalocean_kubernetes_cluster").all(arguments.vpc_uuid != empty)
  - uid: mondoo-digitalocean-security-doks-in-vpc-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "digitalocean_kubernetes_cluster")
    mql: |
      terraform.plan.resourceChanges.where(type == "digitalocean_kubernetes_cluster").all(change.after.vpc_uuid != empty)
  - uid: mondoo-digitalocean-security-doks-in-vpc-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "digitalocean_kubernetes_cluster")
    mql: |
      terraform.state.resources.where(type == "digitalocean_kubernetes_cluster").all(values.vpc_uuid != empty)

  # No Terraform variants: the control-plane firewall is enforced by the managed DOKS control
  # plane and surfaced as live posture. controlPlaneFirewallEnabled is null until the feature is
  # configured through the API, and the check correlates that flag with the resolved
  # allowed-address list to reject a world-open allowlist. Expressing both the null-until-set
  # state and the public-CIDR exclusion across digitalocean_kubernetes_cluster HCL, plan, and
  # state would be fragile, so this check is runtime-only.
  - uid: mondoo-digitalocean-security-doks-control-plane-firewall-enabled
    title: Ensure DOKS clusters restrict API server access with a firewall
    impact: 90
    filters: asset.platform == "digitalocean-kubernetes-cluster"
    mql: |
      digitalocean.kubernetes.cluster.controlPlaneFirewallEnabled == true
      digitalocean.kubernetes.cluster.controlPlaneFirewallAllowedAddresses == empty || digitalocean.kubernetes.cluster.controlPlaneFirewallAllowedAddresses.containsNone(["0.0.0.0/0", "::/0"])
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-06
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-5
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-1-5
      compliance/vda-isa-5: vda-isa-5-5-2-7
    docs:
      desc: |
        This check ensures that every DigitalOcean Kubernetes (DOKS) cluster enables the control-plane firewall and does not list `0.0.0.0/0` or `::/0` among its allowed addresses. The control-plane firewall restricts which source addresses can reach the cluster's Kubernetes API server. When it is disabled, the API server accepts connections from any internet host; when it is enabled but allows any address, the restriction is effectively removed.

        **Why this matters**

        - **The API server is the cluster's control surface:** Anyone who can reach the Kubernetes API server can attempt authentication, exploit an API-level vulnerability, or probe for misconfigurations that grant access to workloads and secrets.
        - **Authentication is not the only layer:** Even with strong authentication, an internet-reachable API server remains a target for credential attacks and for any future flaw in the API server itself.
        - **A scoped allowlist contains blast radius:** Restricting the API server to known administrative and CI/CD source ranges removes it from internet-wide scanning entirely.

        **Risk mitigation**

        - **Cluster takeover:** Limiting which sources can reach the API server cuts off the primary network path an attacker would use to compromise the control plane.
        - **Internet-wide scanning:** A firewalled API server is not discoverable by mass scanners probing for exposed Kubernetes endpoints.

        Administrative and CI/CD source ranges that legitimately need API access should be added to the allowed-address list rather than leaving the firewall open.
      audit: |
        ### Audit via Console

        1. Sign in to the DigitalOcean [Cloud Control Panel](https://cloud.digitalocean.com/).
        2. Navigate to **Kubernetes** and open each cluster.
        3. On the **Settings** tab, review the **Control plane firewall** configuration.

        A passing cluster has the control plane firewall enabled with the allowed addresses scoped to specific trusted CIDRs. A failing cluster has the firewall disabled, or enabled with `0.0.0.0/0` or `::/0` in the allowed addresses.

        ### Audit via CLI

        1. List clusters, then inspect each cluster's control-plane firewall settings:

        ```bash
        doctl kubernetes cluster list --format ID,Name
        doctl kubernetes cluster get <cluster-id> --output json | jq -r '.[] | [.name, .control_plane_firewall.enabled, (.control_plane_firewall.allowed_addresses | join(","))] | @tsv'
        ```

        A passing cluster returns `true` for the firewall with an allowed-address list that excludes `0.0.0.0/0` and `::/0`. A failing cluster returns `false`, or `true` with an unrestricted address in the list.
      remediation:
        - id: console
          desc: |
            To restrict API server access in the DigitalOcean Cloud Control Panel:

            1. Navigate to **Kubernetes** and open the affected cluster.
            2. On the **Settings** tab, enable the **Control plane firewall**.
            3. Add the specific administrative and CI/CD source CIDRs that need API access, and ensure neither `0.0.0.0/0` nor `::/0` is present.
            4. Confirm that your management tooling can still reach the cluster after the change.
        - id: cli
          desc: |
            To enable and scope the control-plane firewall on the command line using the `doctl` CLI:

            ```bash
            doctl kubernetes cluster update <cluster-id> \
              --enable-control-plane-firewall=true \
              --control-plane-firewall-allowed-addresses "203.0.113.0/24,198.51.100.10/32"
            ```

            Replace the addresses with the trusted source ranges that need API access. Verify connectivity from an allowed range afterward.
        # No Terraform remediation: controlPlaneFirewallEnabled is a managed control-plane posture
        # surfaced only by the live API; the digitalocean_kubernetes_cluster resource does not
        # express the control-plane firewall, so it cannot be remediated through Terraform.
    refs:
      - url: https://docs.digitalocean.com/products/kubernetes/how-to/configure-control-plane-firewall/
        title: Configure the DOKS control plane firewall

  # No Terraform variants: this check inspects the certificate's notAfter validity
  # window — runtime telemetry set at issuance, not a configuration field. The
  # digitalocean_certificate resource has no expiration argument (Let's Encrypt certs
  # auto-renew; custom certs carry the date inside the uploaded PEM), so expiry is
  # only observable through the live API.
  - uid: mondoo-digitalocean-security-cert-not-expired
    filters: asset.platform == "digitalocean"
    title: Ensure TLS certificates are not expired
    impact: 100
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-12
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-2-ii-transmission-security-encryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-12
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-10
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-1
    mql: |
      digitalocean.certificates.all(notAfter > time.now)
    docs:
      desc: |
        This check ensures that no TLS certificate stored in DigitalOcean has passed its `notAfter` expiration date. Expired certificates break the chain of trust that clients use to verify server identity.

        **Why this matters**

        - **Trust chain breakage:** An expired certificate causes browsers and API clients to reject the TLS handshake, generating certificate warnings or hard failures that directly affect application availability.
        - **Security warning fatigue:** Users trained to click through certificate warnings when an app expires may extend that behavior to legitimate man-in-the-middle attempts, where the same warning is the only defense signal.
        - **API client failures:** Many API clients fail closed on expired certificates and abort the connection, causing cascading failures in dependent services and making an expired certificate both a security failure and an availability incident.

        **Risk mitigation**

        - **Continuous trust:** Keeping certificates valid ensures clients can establish authenticated, encrypted connections without operator intervention and without warning users to bypass security checks.
        - **Monitoring prompt:** Catching expiration proactively via this check provides a remediation window before the certificate expires, avoiding both the security degradation and the availability incident.
      audit: |
        ### Audit via Console

        1. Sign in to the DigitalOcean [Cloud Control Panel](https://cloud.digitalocean.com/).
        2. Navigate to **Networking** > **Certificates**.
        3. Review the **Expiration** column for each certificate and check whether any date is in the past.

        A passing certificate shows an expiration date in the future. A failing certificate shows an expiration date that has already passed.

        ### Audit via CLI

        1. List all certificates and inspect their expiration dates:

        ```bash
        doctl compute certificate list --format ID,Name,NotAfter,State
        ```

        A passing certificate returns a `NotAfter` date that is later than today and a `State` of `verified`. A failing certificate returns a `NotAfter` date in the past or a `State` of `expired`.
      remediation:
        - id: console
          desc: |
            To fix this in the DigitalOcean Cloud Control Panel:

            1. Navigate to **Networking** > **Certificates**.
            2. Identify the expired certificate and either upload a renewed version or regenerate a Let's Encrypt certificate.
            3. Update any load balancers, CDN endpoints, or App Platform apps referencing the old certificate.
        - id: cli
          desc: |
            To fix this on the command line using the `doctl` CLI, create a renewed certificate and then update any consumers to reference it. Choose the variant that matches how the domain's DNS is hosted.

            If the domain's DNS is managed by DigitalOcean, create a Let's Encrypt certificate. The `--type lets_encrypt` flag only works when DigitalOcean controls the domain's DNS records, because DigitalOcean must publish the validation records itself:

            ```bash
            doctl compute certificate create \
              --name <new-name> \
              --type lets_encrypt \
              --dns-names <domain>
            ```

            If the domain's DNS is hosted elsewhere or the certificate was issued by an external CA, upload it as a custom certificate instead:

            ```bash
            doctl compute certificate create \
              --name <new-name> \
              --type custom \
              --leaf-certificate-path <cert.pem> \
              --certificate-chain-path <chain.pem> \
              --private-key-path <privkey.pem>
            ```

            After creating the replacement, update any load balancers, CDN endpoints, or App Platform apps to reference the new certificate.
        # No Terraform remediation: expiry is not a configurable field. A digitalocean_certificate resource can provision a replacement, but Terraform cannot express or assert the validity window of an issued certificate.
    refs:
      - url: https://docs.digitalocean.com/products/networking/certificates/
        title: DigitalOcean TLS certificates

  - uid: mondoo-digitalocean-security-cdn-has-certificate
    title: Ensure CDN endpoints with a custom domain have a TLS certificate attached
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-2-ii-transmission-security-encryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    variants:
      - uid: mondoo-digitalocean-security-cdn-has-certificate-digitalocean
        tags:
          mondoo.com/filter-title: DigitalOcean
          mondoo.com/filter-icon: digitalocean
      - uid: mondoo-digitalocean-security-cdn-has-certificate-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-digitalocean-security-cdn-has-certificate-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-digitalocean-security-cdn-has-certificate-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that every CDN endpoint configured with a custom domain has a TLS certificate attached. A CDN endpoint on a custom domain without a certificate cannot terminate HTTPS for that domain, forcing clients to use HTTP or encounter certificate errors.

        **Why this matters**

        - **HTTPS capability:** Without a certificate, the CDN endpoint cannot serve the custom domain over HTTPS; clients either receive certificate errors or fall back to unencrypted HTTP.
        - **Content injection risk:** HTTP-served CDN responses can be modified by any host on the network path between the user and the CDN, enabling content injection attacks against end users.
        - **Credential and cookie exposure:** Users authenticating through a custom-domain CDN endpoint over HTTP expose their credentials and session cookies to anyone who can observe the traffic path.

        **Risk mitigation**

        - **Transport encryption:** Attaching a valid TLS certificate enables HTTPS termination at the CDN edge, ensuring all user traffic to the custom domain is encrypted from client to CDN.
        - **Trust signal:** A valid certificate allows clients to verify the CDN endpoint's identity, preventing impersonation attacks that would otherwise succeed silently over HTTP.
      audit: |
        ### Audit via Console

        1. Sign in to the DigitalOcean [Cloud Control Panel](https://cloud.digitalocean.com/).
        2. Navigate to **Networking** > **CDN** and open each endpoint.
        3. Under **Custom subdomain**, check whether a TLS certificate is selected for any endpoint that has a custom domain configured.

        A passing CDN endpoint either has no custom domain or has a custom domain with a certificate assigned. A failing CDN endpoint has a custom domain configured but no certificate selected.

        ### Audit via CLI

        1. List all CDN endpoints and inspect the `CertificateID` and `CustomDomain` fields:

        ```bash
        doctl compute cdn list --format ID,Origin,CustomDomain,CertificateID
        ```

        A passing endpoint returns a non-empty `CertificateID` when `CustomDomain` is set, or has an empty `CustomDomain`. A failing endpoint returns a non-empty `CustomDomain` paired with an empty `CertificateID`.
      remediation:
        - id: console
          desc: |
            To fix this in the DigitalOcean Cloud Control Panel:

            1. Navigate to **Networking** > **CDN** and open the affected endpoint.
            2. Under **Custom subdomain**, select an existing certificate or create a new Let's Encrypt certificate for the domain.
            3. Save the CDN configuration.
        - id: cli
          desc: |
            To fix this on the command line using the `doctl` CLI, attach a certificate to the affected CDN endpoint. The certificate must be passed together with the custom domain it covers, because `doctl` updates the domain and certificate as a pair:

            ```bash
            doctl compute cdn update "<cdn-id>" \
              --domain "<custom-domain>" \
              --certificate-id "<cert-id>"
            ```
        - id: terraform
          desc: |
            To attach a TLS certificate to a custom-domain CDN endpoint in Terraform, set `certificate_name` on the `digitalocean_cdn` resource alongside `custom_domain`:

            ```hcl
            resource "digitalocean_cdn" "example" {
              origin           = digitalocean_spaces_bucket.example.bucket_domain_name
              custom_domain    = "cdn.example.com"
              certificate_name = digitalocean_certificate.example.name
            }
            ```
    refs:
      - url: https://docs.digitalocean.com/products/networking/cdn/how-to/use-custom-subdomain/
        title: CDN custom subdomain and TLS

  - uid: mondoo-digitalocean-security-cdn-has-certificate-digitalocean
