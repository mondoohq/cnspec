          - uid: mondoo-digitalocean-security-gradientai-agent-has-guardrails
          - uid: mondoo-digitalocean-security-gradientai-knowledge-base-not-public
    scoring_system: highest impact
queries:
  # No CLI remediation: email verification is a one-time interactive flow — the
  # legitimate user must click a confirmation link delivered to their inbox.
  # `doctl account` exposes only `get` and `ratelimit`; there is no API for
  # triggering or completing email verification.
  # No Terraform variants: this check reads account-wide state from
  # digitalocean.account; the digitalocean Terraform provider has no resource that
  # represents the account or its email-verification status, so there is nothing
  # to assert against in HCL, plan, or state.
  - uid: mondoo-digitalocean-security-account-email-verified
    filters: asset.platform == "digitalocean"
    title: Ensure the DigitalOcean account email is verified
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: false
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-5-16
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-12
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-1
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-3
    mql: |
      digitalocean.account.emailVerified == true
    docs:
      desc: |
        This check ensures that the DigitalOcean account has a verified email address. By default, accounts can operate without email verification, but DigitalOcean uses the account email for password resets and other account recovery workflows.

        **Why this matters**

        - **Account recovery integrity:** An unverified email cannot be trusted as the true owner's address, so the self-service recovery flow can be exploited by whoever controls an unverified address.
        - **Identity binding:** Verification demonstrates that the account holder demonstrably controls the mailbox, binding the account identity to a real owner.
        - **Credential reset protection:** Password reset links sent to an unverified address could reach an attacker who planted that address, enabling full account takeover.

        **Risk mitigation**

        - **Takeover prevention:** Without a verified email, an attacker who inserts an unverified address gains access to the account recovery flow without detection.
        - **Audit trail:** A verified email establishes a confirmed point of contact that supports incident response and ownership disputes.
      audit: |
        ### Audit via Console

        1. Sign in to the DigitalOcean [Cloud Control Panel](https://cloud.digitalocean.com/).
        2. Navigate to **Settings** > **Profile**.
        3. Check whether the email address shows a verification status badge.

        A passing account shows the email address as verified. A failing account shows the email address as unverified or displays a prompt to resend the verification email.

        ### Audit via CLI

        1. Retrieve the account details:

        ```bash
        doctl account get
        ```

        A passing account returns an `email_verified` value of `true`. A failing account returns `email_verified` as `false`.
      remediation:
        - id: console
          desc: |
            To fix this in the DigitalOcean Cloud Control Panel:

            1. Sign in to the DigitalOcean [Cloud Control Panel](https://cloud.digitalocean.com/).
            2. Navigate to **Settings** > **Profile**.
            3. If the email address shows as unverified, click **Resend verification email**.
            4. Open the verification email and follow the confirmation link.
        # No Terraform remediation: email verification is an interactive account-level
        # flow with no provider resource — the same limitation as the CLI above.
    refs:
      - url: https://docs.digitalocean.com/products/accounts/security/
        title: DigitalOcean account security

  - uid: mondoo-digitalocean-security-droplet-in-vpc
    title: Ensure Droplets are deployed inside a VPC
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-1-5
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-digitalocean-security-droplet-in-vpc-digitalocean
        tags:
          mondoo.com/filter-title: DigitalOcean
          mondoo.com/filter-icon: digitalocean
      - uid: mondoo-digitalocean-security-droplet-in-vpc-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-digitalocean-security-droplet-in-vpc-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-digitalocean-security-droplet-in-vpc-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that every Droplet is deployed inside a Virtual Private Cloud (VPC). By default, DigitalOcean places Droplets outside a named VPC unless one is selected at creation time, leaving them with only public-facing network interfaces.

        **Why this matters**

        - **Network segmentation:** VPCs provide a private layer-2 network boundary that contains traffic between resources and prevents it from traversing the public internet.
        - **Lateral movement containment:** A compromised Droplet outside a VPC has broader network reach across the account because there is no segmentation to limit its blast radius.
        - **Private connectivity:** VPC membership enables private-IP communication between Droplets, databases, and load balancers without routing through public addresses.

        **Risk mitigation**

        - **Reduced attack surface:** Keeping inter-resource traffic on private networks eliminates the exposure window that arises when every connection must traverse a public interface.
        - **Defense in depth:** VPC-level isolation supplements Cloud Firewalls and host-based firewall rules, so a misconfiguration in one layer does not immediately expose the resource.
      audit: |
        ### Audit via Console

        1. Sign in to the DigitalOcean [Cloud Control Panel](https://cloud.digitalocean.com/).
        2. Navigate to **Droplets** and open each Droplet.
        3. Select the **Networking** tab and check the **VPC** field.

        A passing Droplet shows a named VPC under the Networking tab. A failing Droplet shows no VPC or lists only the legacy default network.

        ### Audit via CLI

        1. List all Droplets and note any that lack a VPC UUID:

        ```bash
        doctl compute droplet list --format ID,Name,VPCUUID,Region
        ```

        A passing Droplet returns a non-empty `VPCUUID`. A failing Droplet returns an empty `VPCUUID` field.
      remediation:
        - id: console
          desc: |
            DigitalOcean does not support moving an existing Droplet into a VPC directly. The fix is a destructive cutover that replaces the Droplet, so plan for downtime and treat it as a migration rather than an in-place edit.

            To fix this in the DigitalOcean Cloud Control Panel, create a snapshot of the Droplet, create a replacement Droplet from the snapshot inside the target VPC, and retire the original:

            1. Power down the Droplet before snapshotting so the disk is in a consistent state. A snapshot of a running Droplet can capture an incomplete filesystem.
            2. Navigate to **Images** > **Snapshots** and take a snapshot of the affected Droplet.
            3. Create a new Droplet from the snapshot and select a VPC, not the default, in the **VPC Network** section.
            4. Update DNS, firewall rules, and monitoring to point at the new Droplet. The replacement Droplet receives a new public IP address, so anything that references the old IP must be updated.
            5. Verify the replacement is serving traffic before retiring the original.
            6. Destroy the original Droplet only after the replacement is confirmed healthy.
        - id: cli
          desc: |
            This fix is a destructive cutover that replaces the Droplet, so plan for downtime, keep the original until the replacement is verified, and note that the new Droplet receives a new public IP address.

            To fix this on the command line using the `doctl` CLI, power down the Droplet for a consistent snapshot, then create a replacement inside the target VPC:

            ```bash
            doctl compute droplet-action power-off <droplet-id> --wait
            doctl compute droplet-action snapshot <droplet-id> --snapshot-name <name> --wait
            doctl compute droplet create <new-name> \
              --image <snapshot-id> \
              --size <size> \
              --region <region> \
              --vpc-uuid <vpc-uuid>
            ```

            Verify the replacement is serving traffic, then destroy the original Droplet.
        - id: terraform
          desc: |
            To deploy Droplets inside a VPC in Terraform, set `vpc_uuid` on the `digitalocean_droplet` resource:

            ```hcl
            resource "digitalocean_droplet" "example" {
              name     = "example"
              image    = "ubuntu-22-04-x64"
              region   = "nyc3"
              size     = "s-1vcpu-1gb"
              vpc_uuid = digitalocean_vpc.example.id
            }
            ```
    refs:
      - url: https://docs.digitalocean.com/products/networking/vpc/
        title: DigitalOcean VPC overview

  - uid: mondoo-digitalocean-security-droplet-in-vpc-digitalocean
    filters: asset.platform == "digitalocean"
    mql: |
      digitalocean.droplets.all(vpc != null)
  - uid: mondoo-digitalocean-security-droplet-in-vpc-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "digitalocean_droplet")
    mql: |
      terraform.resources("digitalocean_droplet").all(arguments.vpc_uuid != empty)
  - uid: mondoo-digitalocean-security-droplet-in-vpc-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "digitalocean_droplet")
    mql: |
      terraform.plan.resourceChanges.where(type == "digitalocean_droplet").all(change.after.vpc_uuid != empty)
  - uid: mondoo-digitalocean-security-droplet-in-vpc-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "digitalocean_droplet")
    mql: |
      terraform.state.resources.where(type == "digitalocean_droplet").all(values.vpc_uuid != empty)

  # No Terraform variants: this check requires cross-resource correlation between
  # digitalocean_droplet and digitalocean_firewall (matched by id or by overlapping
  # tag), which is awkward to express reliably in MQL on Terraform sources. The
  # runtime check uses the digitalocean.droplet.missingFirewall helper, which does
  # the correlation server-side.
  # No Terraform remediation: see above.
  - uid: mondoo-digitalocean-security-droplet-firewall-coverage
    filters: asset.platform == "digitalocean"
    title: Ensure every Droplet is covered by a Cloud Firewall
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-7
    mql: |
      digitalocean.droplets.all(missingFirewall == false)
    docs:
      desc: |
        This check ensures that every Droplet is covered by at least one DigitalOcean Cloud Firewall, either attached directly by Droplet ID or through a matching tag. Without firewall coverage, all network traffic is filtered only by the host operating system's own firewall rules.

        **Why this matters**

        - **Default-open exposure:** A Droplet with no Cloud Firewall exposes every listening service directly to the network reachable from its IP addresses, including services bound to all interfaces by default.
        - **Continuous scanning:** Common default ports such as SSH on port 22 are continuously scanned by automated tools; uncovered Droplets are targeted within minutes of provisioning.
        - **Host firewall fragility:** Relying solely on iptables or nftables rules means a single misconfiguration or software install that opens a port bypasses all network-layer controls.
        - **Centralized policy enforcement:** Cloud Firewalls apply rules consistently across all covered Droplets, unlike per-host rules that drift independently.

        **Risk mitigation**

        - **Network-layer control:** Cloud Firewalls block unwanted traffic before it reaches the Droplet's network stack, providing a platform-enforced boundary that cannot be disabled by a compromised workload.
        - **Tag-based coverage:** Applying firewall rules through tags ensures new Droplets inherit the correct policy at creation time, preventing coverage gaps during scaling events.
      audit: |
        ### Audit via Console

        1. Sign in to the DigitalOcean [Cloud Control Panel](https://cloud.digitalocean.com/).
        2. Navigate to **Droplets** and open each Droplet.
        3. Select the **Networking** tab and look at the **Firewalls** section.

        A passing Droplet lists at least one Cloud Firewall in the Firewalls section. A failing Droplet shows no firewalls attached.

        ### Audit via CLI

        1. List all Cloud Firewalls and their associated Droplets and tags:

        ```bash
        doctl compute firewall list --format ID,Name,DropletIDs,Tags
        ```

        2. Cross-reference with the full list of Droplets:

        ```bash
        doctl compute droplet list --format ID,Name,Tags
        ```

        A passing Droplet appears in the `DropletIDs` field of at least one firewall, or carries a tag that at least one firewall targets. A failing Droplet is absent from every firewall's Droplet list and shares no tag with any firewall.
      remediation:
        - id: console
          desc: |
            To fix this in the DigitalOcean Cloud Control Panel:

            1. Navigate to **Networking** > **Firewalls** and open (or create) a firewall that should protect the Droplet.
            2. Under **Apply to Droplets**, add the Droplet by name or attach a tag the Droplet already carries.
            3. Save the firewall and verify the Droplet now lists the firewall under its **Networking** tab.
        - id: cli
          desc: |
            To fix this on the command line using the `doctl` CLI, attach the Droplet to an existing firewall:

            ```bash
            doctl compute firewall add-droplets <firewall-id> \
              --droplet-ids <droplet-id>
            ```

            Or, if you scope firewalls by tag, ensure the Droplet carries the tag the firewall targets:

            ```bash
            doctl compute droplet tag <droplet-id> --tag-name <firewall-tag>
            ```
    refs:
      - url: https://docs.digitalocean.com/products/networking/firewalls/
        title: DigitalOcean Cloud Firewalls overview

  # Security-only check (compliance mapping intentionally omitted per maintainer).
  # No Terraform variants: internetReachable is a runtime-computed exposure signal (IP + security group/firewall reachability) with no static config analog.
  - uid: mondoo-digitalocean-security-droplet-not-internet-reachable
    title: Ensure Droplets are not reachable from the internet
    impact: 85
    filters: asset.platform == "digitalocean"
    mql: |
      digitalocean.droplets.all( exposure.internetReachable == false )
    docs:
      desc: |
        This check ensures that no Droplet is reachable from the public internet. `internetReachable` combines a public IP with firewall ingress that actually admits inbound traffic from any address — including the case where no Cloud Firewall covers the Droplet at all — so it reports a Droplet as exposed only when both conditions hold. This is a higher-fidelity "actually exposed" signal than a public-IP flag alone.

        **Why this matters**

        - **Reduced attack surface:** A Droplet with no internet-reachable path keeps its listening services off the public scanning grid entirely.
        - **Defense in depth:** A public IP is harmless until a firewall rule (or a missing firewall) admits traffic to it; removing either side closes the path.
        - **Fewer false alarms:** Because the signal correlates the IP with the firewall ingress, it surfaces Droplets that are genuinely exposed rather than every Droplet that merely holds a public address.

        **Risk mitigation**

        - **Internet-wide exploitation:** Prevents listening services from being probed and attacked by arbitrary internet hosts.
        - **Lateral movement entry:** Removes a public foothold an attacker could use to reach the rest of the account's resources.

        Intentionally public hosts such as bastions and public web servers will fail this check and should be exempted.
      audit: |
        ### Audit via Console

        1. Sign in to the DigitalOcean [Cloud Control Panel](https://cloud.digitalocean.com/).
        2. Navigate to **Droplets**, open each Droplet, and check the **Networking** tab for an assigned public IPv4 or IPv6 address.
        3. In the same **Networking** tab, review the attached Cloud Firewalls and their inbound rules; a Droplet with no firewall admits all inbound traffic.

        A passing Droplet either has no public IP, or is covered by firewalls whose inbound rules admit no `0.0.0.0/0` or `::/0` source. A failing Droplet has a public IP and a firewall rule (or no firewall coverage) that admits traffic from any address.

        ### Audit via CLI

        1. List Droplets with their public addresses, then cross-reference the firewalls that cover each:

        ```bash
        doctl compute droplet list --format ID,Name,PublicIPv4,PublicIPv6
        doctl compute firewall list --format ID,Name,DropletIDs,Tags,InboundRules
        ```

        A passing Droplet either reports no public IP, or is covered by firewall inbound rules whose `address` values exclude `0.0.0.0/0` and `::/0`. A failing Droplet has a public IP combined with an inbound rule sourced from `0.0.0.0/0` or `::/0`, or no firewall coverage at all.
      remediation:
        - id: console
          desc: |
            To close the internet-reachable path in the DigitalOcean Cloud Control Panel:

            1. Navigate to **Networking** > **Firewalls** and open (or create and attach) a firewall covering the affected Droplet.
            2. Edit any inbound rule whose source is `All IPv4` (`0.0.0.0/0`) or `All IPv6` (`::/0`) and scope it to a specific trusted CIDR, tag, or Droplet ID.
            3. If the Droplet does not need a public edge, plan a VPC-only cutover so it is reachable solely over private networking.
        - id: cli
          desc: |
            To scope the world-open path on the command line using the `doctl` CLI, remove the unrestricted inbound rules and replace them with a trusted source. If the Droplet has no firewall, create one and attach it first:

            ```bash
            doctl compute firewall remove-rules "<firewall-id>" \
              --inbound-rules "protocol:tcp,ports:443,address:0.0.0.0/0 protocol:tcp,ports:443,address:::/0"
            doctl compute firewall add-rules "<firewall-id>" \
              --inbound-rules "protocol:tcp,ports:443,address:203.0.113.0/24"
            doctl compute firewall add-droplets "<firewall-id>" --droplet-ids <droplet-id>
            ```
        - id: terraform
          desc: |
            Keep Droplets off the public internet by covering them with a firewall whose `inbound_rule` blocks are scoped to trusted CIDRs rather than `0.0.0.0/0` or `::/0`:

            ```hcl
            resource "digitalocean_firewall" "scoped" {
              name        = "scoped"
              droplet_ids = [digitalocean_droplet.example.id]

              inbound_rule {
                protocol         = "tcp"
                port_range       = "443"
                source_addresses = ["203.0.113.0/24"]
              }
            }
            ```
    refs:
      - url: https://docs.digitalocean.com/products/networking/firewalls/how-to/configure-rules/
        title: Configure Cloud Firewall rules

