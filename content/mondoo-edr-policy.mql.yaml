policies:
  - uid: mondoo-edr-policy
    name: Mondoo Endpoint Detection and Response (EDR)
    version: 1.6.2
    license: BUSL-1.1
    tags:
      mondoo.com/category: security
      mondoo.com/platform: windows,linux,macos
    require:
      - provider: os
    authors:
      - name: Mondoo, Inc.
        email: hello@mondoo.com
    summary: Validate endpoint detection and response deployment
    docs:
      desc: |
        The Mondoo Endpoint Detection and Response (EDR) policy verifies that your EDR agents are present, running, and up to date across the endpoint fleet. EDR is only effective when its agents are actually deployed and operational. Gaps in coverage or stale signatures leave endpoints blind to active threats and create silent paths for attackers to gain a foothold and persist.

        This policy helps organizations confirm continuous EDR coverage so that endpoint telemetry, threat detection, and incident response work as designed, closing the visibility gaps that adversaries rely on for initial access, privilege escalation, and lateral movement.

        This policy provides checks across key EDR coverage areas:

        - Presence of supported EDR agents on Windows, Linux, and macOS endpoints
        - Operational status of the EDR agent and its services
        - Antivirus and EDR signature freshness
        - Coverage parity across operating systems and endpoint roles

        Have suggestions for new checks in this policy? Visit our [cnspec repository](https://github.com/mondoohq/cnspec).
    groups:
      - title: Endpoint Detection and Response (EDR)
        filters: |
          asset.platform == 'macos' || asset.family.contains("linux") || asset.family.contains('windows')
        checks:
          - uid: mondoo-edr-policy-ensure-edr-agent-is-installed
          - uid: mondoo-edr-policy-ensure-edr-agent-is-running
    scoring_system: highest impact
queries:
  - uid: mondoo-edr-policy-ensure-edr-agent-is-installed
    title: Ensure EDR Agent is installed
    impact: 100
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-uem-09
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-308-a-5-ii-b-security-awareness-training-and-tools-protection-from-malicious-software
      compliance/iso-27001-2022: iso-27001-2022-a-8-7
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-4
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-2
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-3
      compliance/pci-dss-4: pcidss-requirement-5-2-1
      compliance/soc2-2017: soc2-control-cc6-8-4
      compliance/vda-isa-5: vda-isa-5-5-2-3
    variants:
      - uid: mondoo-edr-policy-ensure-edr-agent-is-installed-macos
        tags:
          mondoo.com/filter-title: macOS
      - uid: mondoo-edr-policy-ensure-edr-agent-is-installed-linux
        tags:
          mondoo.com/filter-title: Linux
      - uid: mondoo-edr-policy-ensure-edr-agent-is-installed-windows
        tags:
          mondoo.com/filter-title: Windows
    docs:
      desc: |-
        A supported Endpoint Detection and Response (EDR) agent must be present on every Windows, Linux, and macOS endpoint. An endpoint with no EDR agent installed has no behavioral threat detection, no telemetry feeding the security operations team, and no path for automated containment.

        **Why this matters**

        - **Threat detection:** An installed EDR agent provides the real-time behavioral monitoring needed to identify malware, ransomware, and hands-on-keyboard activity.
        - **Incident response:** EDR telemetry gives responders the process, file, and network history required to scope and contain an intrusion.
        - **Coverage parity:** A single endpoint without an agent becomes a blind spot that adversaries can use for initial access and persistence.

        **Risk mitigation**

        - **Visibility gaps:** Installing an agent on every endpoint removes the silent paths attackers rely on to operate undetected.
        - **Compliance:** Demonstrable EDR deployment across the fleet satisfies malware-protection requirements in frameworks such as ISO 27001, NIST SP 800-53, and PCI DSS.
      audit: |-
        Confirm that a supported EDR agent is installed using the vendor's own management tooling.

        ### Audit via console

        1. Sign in to the management console for your EDR product (CrowdStrike Falcon, SentinelOne, ESET PROTECT, Microsoft Defender, Sophos Central, Cortex XDR, WatchGuard, Malwarebytes Nebula, or Wazuh).
        2. Open the endpoint or device inventory.
        3. Locate the asset by hostname and confirm it appears as an enrolled device.

        If the asset is listed as an enrolled endpoint, the check passes. If the asset is missing from the inventory, the check fails.

        ### Audit via CLI

        1. On the endpoint, list installed software and services.
        2. On Windows run `Get-Package` or `Get-Service`; on Linux run `rpm -qa` or `dpkg -l`; on macOS run `pkgutil --pkgs` or `systemextensionsctl list`.
        3. Search the output for the EDR product (for example `falcon-sensor`, `SentinelAgent`, `Cortex XDR`, or `WinDefend`).

        If a supported EDR package or service is present, the check passes. If no supported EDR product is found, the check fails.
      remediation:
        - id: gui
          desc: |-
            To install an EDR agent on a Windows or macOS endpoint:

            1. Download the agent installer package for the endpoint from your EDR vendor's management console.
            2. Run the installer on the endpoint and complete the guided installation.
            3. On macOS, approve the vendor's system extension and full disk access prompts in System Settings > Privacy & Security.
            4. Confirm the endpoint appears as enrolled in the vendor console.
        - id: console
          desc: |-
            To deploy an EDR agent from the vendor management console:

            1. Sign in to your EDR product's management console.
            2. Create or download a deployment package scoped to the target endpoint group.
            3. Push the package to the endpoint, or distribute the installer through your software-deployment tooling, and verify enrollment in the device inventory.
        - id: cli
          desc: |-
            To install an EDR agent from the command line, run the vendor's installer for the endpoint's platform. The CrowdStrike Falcon examples below use `FALCON_CID`, your Customer ID from the Falcon console under Host setup and management > Sensor downloads. The CID is tenant-specific and sensitive, so treat it as a secret and source it from a secure variable rather than hardcoding it.

            Other supported vendors use their own enrollment mechanism instead of a CID. For example, SentinelOne sensors enroll with a site or group token, and Microsoft Defender for Endpoint enrolls with the tenant onboarding package. Use the enrollment value your vendor documents.

            CrowdStrike Falcon examples:

            On Linux:

            ```bash
            sudo dnf install -y ./falcon-sensor.rpm
            sudo /opt/CrowdStrike/falconctl -s --cid="${FALCON_CID}"
            sudo systemctl enable --now falcon-sensor
            ```

            On macOS:

            ```bash
            sudo installer -pkg /tmp/FalconSensorMacOS.pkg -target /
            sudo /Applications/Falcon.app/Contents/Resources/falconctl license "${FALCON_CID}"
            ```

            On Windows:

            ```powershell
            Start-Process -FilePath .\WindowsSensor.exe -ArgumentList '/install', '/quiet', '/norestart', 'CID=ABCDEF1234567890ABCDEF1234567890-12' -Wait
            ```
        - id: ansible
          desc: |-
            To install an EDR agent with Ansible, distribute and install the vendor package across the fleet:

            ```yaml
            - name: Install CrowdStrike Falcon sensor
              ansible.builtin.package:
                name: falcon-sensor
                state: present

            - name: Enable and start the Falcon sensor service
              ansible.builtin.service:
                name: falcon-sensor
                state: started
                enabled: true
            ```
        - id: script
          desc: |-
            To install an EDR agent with a script, wrap the vendor installer in your configuration-management tooling:

            ```bash
            #!/usr/bin/env bash
            set -euo pipefail
            sudo dnf install -y /tmp/falcon-sensor.rpm
            sudo /opt/CrowdStrike/falconctl -s --cid="${FALCON_CID}"
            sudo systemctl enable --now falcon-sensor
            sudo systemctl is-active falcon-sensor
            ```
    refs:
      - url: https://www.nist.gov/publications/guide-endpoint-detection-and-response
        title: NIST Guide to EDR
  - uid: mondoo-edr-policy-ensure-edr-agent-is-installed-macos
    filters: asset.platform == 'macos'
    mql: |
      package('Falcon').installed ||
      package('SentinelOne Extensions').installed ||
      package('ESET Endpoint Security').installed ||
      file('/Library/Ossec').exists ||
      ['Cortex XDR', 'Cortex XDR Agent'].any(package(_).installed) ||
      file('/Library/Application Support/Malwarebytes').exists
  - uid: mondoo-edr-policy-ensure-edr-agent-is-installed-linux
    filters: asset.family.contains('linux')
    mql: |
      package('falcon-sensor').installed ||
      ['SentinelAgent', 'sentinelagent'].any(package(_).installed) ||
      file('/opt/eset/RemoteAdministrator/Agent').exists ||
      ['Cortex XDR', 'Cortex XDR Agent','cortex-agent'].any(package(_).installed) ||
      package('wazuh-agent').installed
  - uid: mondoo-edr-policy-ensure-edr-agent-is-installed-windows
    filters: asset.family.contains('windows')
    mql: |
      package('CrowdStrike Sensor Platform').installed ||
      package('Sentinel Agent').installed ||
      ['ESET Endpoint Security', 'ESET Server Security'].any(package(_).installed) ||
      service('WinDefend').installed ||
      package('Wazuh Agent').installed ||
      ['Sophos Endpoint Defense', 'Sophos Endpoint Agent'].all(package(_).installed) ||
      packages.where(name == /Cortex XDR/i).any(installed) ||
      package('WatchGuard EPDR').installed ||
      package('Malwarebytes Endpoint Agent').installed
  - uid: mondoo-edr-policy-ensure-edr-agent-is-running
    title: Ensure EDR Agent is running
    impact: 100
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-uem-09
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-308-a-5-ii-b-security-awareness-training-and-tools-protection-from-malicious-software
      compliance/iso-27001-2022: iso-27001-2022-a-8-7
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-4
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-2
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-3
      compliance/pci-dss-4: pcidss-requirement-5-3-5
      compliance/soc2-2017: soc2-control-cc6-8-4
      compliance/vda-isa-5: vda-isa-5-5-2-3
    variants:
      - uid: mondoo-edr-policy-ensure-crowdstrike-agent-is-running-macos
        tags:
          mondoo.com/filter-title: macOS
      - uid: mondoo-edr-policy-ensure-crowdstrike-agent-is-running-linux
        tags:
          mondoo.com/filter-title: Linux
      - uid: mondoo-edr-policy-ensure-crowdstrike-agent-is-running-windows
        tags:
          mondoo.com/filter-title: Windows
      - uid: mondoo-edr-policy-ensure-sentinelone-agent-is-running-macos
        tags:
          mondoo.com/filter-title: macOS
      - uid: mondoo-edr-policy-ensure-sentinelone-agent-is-running-linux
        tags:
          mondoo.com/filter-title: Linux
      - uid: mondoo-edr-policy-ensure-sentinelone-agent-is-running-windows
        tags:
          mondoo.com/filter-title: Windows
      - uid: mondoo-edr-policy-ensure-eset-agent-is-running-macos
        tags:
          mondoo.com/filter-title: macOS
      - uid: mondoo-edr-policy-ensure-eset-agent-is-running-linux
        tags:
          mondoo.com/filter-title: Linux
      - uid: mondoo-edr-policy-ensure-eset-agent-is-running-windows
        tags:
          mondoo.com/filter-title: Windows
      - uid: mondoo-edr-policy-ensure-defender-agent-is-running-and-updated-windows
        tags:
          mondoo.com/filter-title: Windows
      - uid: mondoo-edr-policy-ensure-wazuh-agent-is-running-macos
        tags:
          mondoo.com/filter-title: macOS
      - uid: mondoo-edr-policy-ensure-wazuh-agent-is-running-windows
        tags:
          mondoo.com/filter-title: Windows
      - uid: mondoo-edr-policy-ensure-sophos-endpoint-defense-is-running-windows
        tags:
          mondoo.com/filter-title: Windows
      - uid: mondoo-edr-policy-ensure-cortex-xdr-agent-is-running-macos
        tags:
          mondoo.com/filter-title: macOS
      - uid: mondoo-edr-policy-ensure-cortex-xdr-agent-is-running-linux
        tags:
          mondoo.com/filter-title: Linux
      - uid: mondoo-edr-policy-ensure-cortex-xdr-agent-is-running-windows
        tags:
          mondoo.com/filter-title: Windows
      - uid: mondoo-edr-policy-ensure-watchguard-agent-is-running-windows
        tags:
          mondoo.com/filter-title: Windows
      - uid: mondoo-edr-policy-ensure-malwarebytes-agent-is-running-macos
        tags:
          mondoo.com/filter-title: macOS
      - uid: mondoo-edr-policy-ensure-malwarebytes-agent-is-running-windows
        tags:
          mondoo.com/filter-title: Windows
    docs:
      desc: |-
        An installed EDR agent only protects an endpoint when its services are actively running and enabled to start at boot. A stopped or disabled agent leaves the endpoint unmonitored even though the software is present.

        **Why this matters**

        - **Real-time protection:** A running agent continuously inspects process, file, and network activity so threats are detected and contained as they happen.
        - **Endpoint visibility:** Active agent services stream telemetry to the security operations team, enabling swift incident response and forensic analysis.
        - **Compliance:** An operational agent demonstrates the continuous malware protection required by frameworks such as ISO 27001, NIST SP 800-53, and PCI DSS.

        **Risk mitigation**

        - **Delayed detection:** Keeping agent services running closes the window in which malicious activity could proceed unobserved.
        - **Persistence at boot:** Enabling the services ensures protection resumes automatically after a reboot, so an attacker cannot disable coverage by restarting the host.
      audit: |-
        Confirm that the EDR agent services are running and enabled using the vendor's own tooling.

        ### Audit via console

        1. Sign in to the management console for your EDR product.
        2. Open the endpoint or device inventory and locate the asset by hostname.
        3. Review the agent health or status field for the device.

        If the console reports the agent as healthy and actively reporting, the check passes. If the agent shows as offline, stale, or unprotected, the check fails.

        ### Audit via CLI

        1. On the endpoint, query the EDR service state.
        2. On Windows run `Get-Service <edr-service>`; on Linux run `systemctl status <edr-service>`; on macOS run `launchctl list` or `systemextensionsctl list`.
        3. Inspect whether the service is both active and configured to start at boot.

        If the EDR service is running and enabled, the check passes. If the service is stopped or disabled, the check fails.
      remediation:
        - id: gui
          desc: |-
            To start the EDR agent on a Windows or macOS endpoint:

            1. Open the Services console on Windows, or System Settings on macOS.
            2. Locate the EDR product's service or system extension.
            3. Start the service and set it to launch automatically, then approve any required system extension prompt under Privacy & Security.
        - id: console
          desc: |-
            To restore agent health from the vendor management console:

            1. Sign in to your EDR product's management console.
            2. Locate the affected endpoint in the device inventory.
            3. Use the console's repair, reactivate, or redeploy action to bring the agent back online.
        - id: cli
          desc: |-
            To start and enable the EDR agent service from the command line:

            On Linux (CrowdStrike Falcon example):

            ```bash
            sudo systemctl enable --now falcon-sensor
            systemctl is-active falcon-sensor
            ```

            On macOS (Wazuh example; system-extension products such as CrowdStrike Falcon and SentinelOne must instead be approved in System Settings > Privacy & Security):

            ```bash
            sudo launchctl bootstrap system /Library/LaunchDaemons/com.wazuh.agent.plist
            sudo launchctl print system/com.wazuh.agent
            ```

            On Windows (CrowdStrike Falcon example):

            ```powershell
            Set-Service -Name CSFalconService -StartupType Automatic
            Start-Service -Name CSFalconService
            ```
        - id: ansible
          desc: |-
            To ensure the EDR agent service is running with Ansible:

            ```yaml
            - name: Ensure the EDR agent service is running and enabled (Linux)
              ansible.builtin.service:
                name: falcon-sensor
                state: started
                enabled: true

            - name: Ensure the EDR agent service is running and enabled (Windows)
              ansible.windows.win_service:
                name: CSFalconService
                start_mode: auto
                state: started
            ```
        - id: script
          desc: |-
            To start and enable the EDR agent service with a script:

            ```bash
            #!/usr/bin/env bash
            set -euo pipefail
            sudo systemctl enable --now falcon-sensor
            sudo systemctl is-active falcon-sensor
            ```
    refs:
      - url: https://www.nist.gov/publications/guide-endpoint-detection-and-response
        title: NIST Guide to EDR
  - uid: mondoo-edr-policy-ensure-crowdstrike-agent-is-running-macos
    filters: |
      asset.platform == 'macos' &&
      package('Falcon').installed
    mql: |
      macos.systemExtensions.where(identifier == "com.crowdstrike.falcon.Agent").any(enabled == true && active == true && state == "activated_enabled")
  - uid: mondoo-edr-policy-ensure-crowdstrike-agent-is-running-linux
    filters: |
      asset.family.contains('linux') &&
      package('falcon-sensor').installed
    mql: |
      service('falcon-sensor').running
      service('falcon-sensor').enabled
  - uid: mondoo-edr-policy-ensure-crowdstrike-agent-is-running-windows
    filters: |
      asset.family.contains('windows') &&
      package('CrowdStrike Sensor Platform').installed
    mql: |
      service('CSFalconService').running
      service('CSFalconService').enabled
  - uid: mondoo-edr-policy-ensure-sentinelone-agent-is-running-macos
    filters: |
      asset.platform == 'macos' &&
      package('SentinelOne Extensions').installed
    mql: |
      service('com.sentinelone.sentineld-helper').running
      service('com.sentinelone.sentineld-helper').enabled
      service('com.sentinelone.sentineld-shell').enabled
      service('com.sentinelone.sentinel-extensions').running
      service('com.sentinelone.sentinel-extensions').enabled
      service('com.sentinelone.sentineld').running
      service('com.sentinelone.sentineld').enabled
      service('com.sentinelone.sentineld-guard').running
      service('com.sentinelone.sentineld-guard').enabled
  - uid: mondoo-edr-policy-ensure-sentinelone-agent-is-running-linux
    filters: |
      asset.family.contains('linux')
      package('SentinelAgent').installed || package('sentinelagent').installed
    mql: |
      service('sentinelone').running
      service('sentinelone').enabled
  - uid: mondoo-edr-policy-ensure-sentinelone-agent-is-running-windows
    filters: |
      asset.family.contains('windows') &&
      package('Sentinel Agent').installed
    mql: |
      services.where(name == /SentinelAgent/).any(running == true)
      services.where(name == /SentinelAgent/).any(enabled == true)
  - uid: mondoo-edr-policy-ensure-eset-agent-is-running-macos
    filters: |
      asset.platform == 'macos' &&
      package('ESET Endpoint Security').installed
    mql: |
      // The launchd provider reports enabled=true for every loaded label, so only running is meaningful on macOS
      services.where(name == /com\.eset\./).any(running == true)
  - uid: mondoo-edr-policy-ensure-eset-agent-is-running-linux
    filters: |
      asset.family.contains('linux') &&
      file('/opt/eset/RemoteAdministrator/Agent').exists
    mql: |
      service('eraagent').running
      service('eraagent').enabled
  - uid: mondoo-edr-policy-ensure-eset-agent-is-running-windows
    filters: |
      asset.family.contains('windows') &&
      ['ESET Endpoint Security', 'ESET Server Security'].any(package(_).installed)
    mql: |
      service('ekrn').running
      service('ekrn').enabled
  - uid: mondoo-edr-policy-ensure-defender-agent-is-running-and-updated-windows
    # Defender is often installed passively alongside third-party EDR.
    # Keep this exclusion list aligned with the supported Windows EDR variants.
    filters: |
      asset.family.contains('windows') &&
      service('WinDefend').installed &&
      packages.where(name == 'CrowdStrike Sensor Platform').length == 0 &&
      packages.where(name == 'Sentinel Agent').length == 0 &&
      packages.where(name == 'ESET Endpoint Security').length == 0 &&
      packages.where(name == 'ESET Server Security').length == 0 &&
      packages.where(name == 'Wazuh Agent').length == 0 &&
      packages.where(name == 'Sophos Endpoint Defense').length == 0 &&
      packages.where(name == 'Sophos Endpoint Agent').length == 0 &&
      # Cortex XDR package names vary across supported Windows releases.
      packages.where(name == /Cortex XDR/i).length == 0 &&
      packages.where(name == 'WatchGuard EPDR').length == 0 &&
      packages.where(name == 'Malwarebytes Endpoint Agent').length == 0
    mql: |
      service('WinDefend').running
      service('WinDefend').enabled
      // AntivirusSignatureAge is measured in days; age 1 is normal before the first signature update of the day
      parse.json(content: powershell("Get-MpComputerStatus | Select-Object -Property AntivirusSignatureAge | ConvertTo-JSON").stdout).params.AntivirusSignatureAge <= 1
  - uid: mondoo-edr-policy-ensure-wazuh-agent-is-running-macos
    filters: |
      asset.platform == "macos" &&
      file('/Library/Ossec').exists
    mql: |
      // The launchd provider reports enabled=true for every loaded label, so only running is meaningful on macOS
      service('com.wazuh.agent').running
  - uid: mondoo-edr-policy-ensure-wazuh-agent-is-running-windows
    filters: |
      asset.platform == "windows" &&
      package('Wazuh Agent').installed
    mql: |
      service('WazuhSvc').running
      service('WazuhSvc').enabled
  - uid: mondoo-edr-policy-ensure-sophos-endpoint-defense-is-running-windows
    filters: |
      asset.family.contains('windows') &&
      ['Sophos Endpoint Defense', 'Sophos Endpoint Agent'].all(package(_).installed)
    mql: |
      service('Sophos Endpoint Defense Service').running
      service('Sophos Endpoint Defense Service').enabled
      service('Sophos MCS Agent').running
      service('Sophos MCS Agent').enabled
  - uid: mondoo-edr-policy-ensure-cortex-xdr-agent-is-running-macos
    filters: |
      asset.platform == 'macos' &&
      ['Cortex XDR', 'Cortex XDR Agent'].any(package(_).installed)
    mql: |
      service('com.paloaltonetworks.cortex.agent').running
      service('com.paloaltonetworks.cortex.agent').enabled
  - uid: mondoo-edr-policy-ensure-cortex-xdr-agent-is-running-linux
    filters: |
      asset.family.contains('linux') &&
      ['Cortex XDR', 'Cortex XDR Agent','cortex-agent'].any(package(_).installed)
    mql: |
      service('traps_pmd').running
      service('traps_pmd').enabled
  - uid: mondoo-edr-policy-ensure-cortex-xdr-agent-is-running-windows
    filters: |
      asset.family.contains('windows') &&
      packages.where(name == /Cortex XDR/i).any(installed)
    mql: |
      service('cyserver').running
      service('cyserver').enabled
  - uid: mondoo-edr-policy-ensure-watchguard-agent-is-running-windows
    filters: |
      asset.family.contains('windows') &&
      package('WatchGuard EPDR').installed
    mql: |
      service('PandaAetherAgent').running
      service('PandaAetherAgent').enabled
  - uid: mondoo-edr-policy-ensure-malwarebytes-agent-is-running-macos
    filters: |
      asset.platform == 'macos' &&
      file('/Library/Application Support/Malwarebytes').exists
    mql: |
      processes.where(executable == /Malwarebytes/).any(state != "zombie")
  - uid: mondoo-edr-policy-ensure-malwarebytes-agent-is-running-windows
    filters: |
      asset.family.contains('windows') &&
      package('Malwarebytes Endpoint Agent').installed
    mql: |
      service('MBEndpointAgent').running
      service('MBEndpointAgent').enabled
