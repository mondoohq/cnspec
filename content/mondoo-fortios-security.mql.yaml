policies:
  - uid: mondoo-fortios-security
    name: Mondoo Fortinet FortiOS Security
    version: 1.0.2
    license: BUSL-1.1
    tags:
      mondoo.com/category: security
      mondoo.com/platform: fortios,networkdevice
    require:
      - provider: fortios
    authors:
      - name: Mondoo, Inc.
        email: hello@mondoo.com
    summary: Secure Fortinet FortiOS firewall and FortiGate appliance configurations
    docs:
      desc: |
        The Mondoo Fortinet FortiOS Security policy identifies critical misconfigurations on FortiGate firewalls and FortiOS appliances that could leave your perimeter and internal segmentation vulnerable to attackers. This policy helps organizations detect and remediate hardening gaps before they can be exploited, reducing the likelihood of unauthorized device access, policy bypass, traffic interception, and disruption of protected services.

        This policy provides security checks across key FortiOS areas:

        - **Firmware security**: GA status, maturity, and supported major version
        - **System hardening**: Admin session timeouts, non-default management ports, and HA configuration
        - **DNS and NTP**: DNS-over-TLS, NTP synchronization, and trusted server configuration
        - **Logging and monitoring**: Implicit deny logging, external log destinations, and extended log formats
        - **Firewall policy hygiene**: Restriction of overly permissive rules, UTM and SSL inspection, and traffic logging
        - **Network interfaces**: Management access restrictions on WAN and removal of telnet access
        - **Routing security**: BGP and OSPF neighbor change logging and graceful restart
        - **FortiGuard subscriptions**: Active antispam, web filter, and outbreak prevention subscriptions

        Learn more about scanning Fortinet FortiOS in the [cnspec Fortinet FortiOS documentation](https://mondoo.com/docs/cnspec/network/fortios).

        Have suggestions for new checks in this policy? Visit our [cnspec repository](https://github.com/mondoohq/cnspec).

    groups:
      - title: Firmware Security
        filters: asset.platform == "fortios"
        checks:
          - uid: mondoo-fortios-security-firmware-ga-release
          - uid: mondoo-fortios-security-firmware-mature-release
          - uid: mondoo-fortios-security-firmware-supported-major-version
      - title: System Hardening
        filters: asset.platform == "fortios"
        checks:
          - uid: mondoo-fortios-security-admin-timeout
          - uid: mondoo-fortios-security-admin-https-non-default-port
          - uid: mondoo-fortios-security-admin-ssh-non-default-port
          - uid: mondoo-fortios-security-admin-scp-disabled
          - uid: mondoo-fortios-security-ha-enabled
          - uid: mondoo-fortios-security-ha-session-pickup
      - title: DNS & NTP
        filters: asset.platform == "fortios"
        checks:
          - uid: mondoo-fortios-security-dns-over-tls
          - uid: mondoo-fortios-security-ntp-sync-enabled
          - uid: mondoo-fortios-security-ntp-servers-configured
      - title: Logging & Monitoring
        filters: asset.platform == "fortios"
        checks:
          - uid: mondoo-fortios-security-log-implicit-deny
          - uid: mondoo-fortios-security-log-local-in-denied-unicast
          - uid: mondoo-fortios-security-log-extended-format
          - uid: mondoo-fortios-security-log-no-user-anonymization
          - uid: mondoo-fortios-security-log-syslog-enabled
          - uid: mondoo-fortios-security-log-external-destination
          - uid: mondoo-fortios-security-log-fortianalyzer-encryption
          - uid: mondoo-fortios-security-log-fortianalyzer-reliable
      - title: Firewall Policy
        filters: asset.platform == "fortios"
        checks:
          - uid: mondoo-fortios-security-no-disabled-policies
          - uid: mondoo-fortios-security-no-allow-all-rule
          - uid: mondoo-fortios-security-policy-logging-enabled
          - uid: mondoo-fortios-security-policy-utm-enabled
          - uid: mondoo-fortios-security-policy-ssl-inspection
      - title: Network Interfaces
        filters: asset.platform == "fortios"
        checks:
          - uid: mondoo-fortios-security-wan-no-management-access
          - uid: mondoo-fortios-security-no-telnet-access
      - title: Routing Security
        filters: asset.platform == "fortios"
        checks:
          - uid: mondoo-fortios-security-bgp-log-neighbor-changes
          - uid: mondoo-fortios-security-bgp-graceful-restart
          - uid: mondoo-fortios-security-ospf-log-neighbor-changes
      - title: FortiGuard Subscriptions
        filters: asset.platform == "fortios"
        checks:
          - uid: mondoo-fortios-security-fortiguard-antispam-active
          - uid: mondoo-fortios-security-fortiguard-webfilter-active
          - uid: mondoo-fortios-security-fortiguard-outbreak-prevention-active
    scoring_system: highest impact
queries:
  - uid: mondoo-fortios-security-firmware-ga-release
    title: Ensure firmware is a General Availability release
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-tvm-03
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-8
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-12
      compliance/nist-csf-2: nist-csf-2-pr-ps-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-1
      compliance/pci-dss-4: pcidss-requirement-6-3-3
      compliance/soc2-2017: soc2-control-cc7-1-1
      compliance/vda-isa-5: vda-isa-5-5-2-5
    mql: fortios.system.firmware.current.releaseType == "GA"
    docs:
      desc: |
        This check verifies that the FortiOS device is running a General Availability (GA) firmware release rather than a pre-release, beta, or engineering build.

        **Why this matters**

        Pre-release firmware has not completed Fortinet's full quality assurance cycle. If the device is running non-GA firmware:

        - Security vulnerabilities discovered during testing may not yet be patched.
        - Stability issues can cause unexpected reboots or failovers, leaving the network unprotected.
        - Fortinet TAC support is limited or unavailable for pre-release builds.
        - Compliance frameworks require production systems to run vendor-supported, generally available software.

        Running GA firmware ensures the device benefits from Fortinet's full testing, security patching, and support processes.
      audit: |
        ### Audit via the FortiGate web interface

        1. Log in to the FortiGate web interface.
        2. Navigate to **System > Firmware & Registration**.
        3. Review the **Current version** and confirm the release type.

        A passing result shows a General Availability (GA) release. A failing result shows a beta, interim, or engineering build.

        ### Audit via FortiOS CLI

        1. Open an SSH or console session to the FortiGate.
        2. Run the following command:

           ```
           get system status
           ```

        3. Inspect the **Version** line and the build's release type.

        A passing result identifies the running firmware as a GA release. A failing result shows a non-GA build.
      remediation:
        - id: console
          desc: |
            **Using the FortiGate web interface**

            1. Navigate to **System > Firmware & Registration**
            2. Review the current firmware version and release type
            3. Select a GA release from the available firmware versions
            4. Click **Upgrade** and follow the prompts to install the GA firmware
            5. The device will reboot to complete the upgrade

            **Important**: Back up the device configuration before upgrading firmware. Navigate to **System > Configuration > Backups** and download the configuration file.
        - id: cli
          desc: |
            **Using the CLI**

            Check the current firmware version:

            ```
            get system status
            ```

            Back up the configuration before upgrading. `execute backup full-config` captures both user-specified and default settings, which gives you a complete restore point if the upgrade has to be rolled back:

            ```
            execute backup full-config tftp <filename> <tftp_server_ip>
            ```

            Download a GA firmware image from [Fortinet Support](https://support.fortinet.com), stage it on a TFTP server, and install it. **`execute restore image` reboots the device immediately with no confirmation prompt and interrupts all traffic until FortiOS comes back up, so run it only during a maintenance window.** If your current version is several releases behind the GA target, follow the [FortiOS upgrade path tool](https://docs.fortinet.com/upgrade-tool) and upgrade one hop at a time rather than jumping directly. Back up the configuration and verify the device is healthy after each hop before starting the next one:

            ```
            execute restore image tftp <filename> <tftp_server_ip>
            ```
    refs:
      - url: https://docs.fortinet.com/document/fortigate/latest/administration-guide/738610/firmware
        title: FortiOS firmware management
      - url: https://docs.fortinet.com/document/fortigate/latest/fortios-release-notes/
        title: FortiOS release notes

  - uid: mondoo-fortios-security-firmware-mature-release
    title: Ensure firmware has reached mature release status
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-tvm-03
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-8
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-12
      compliance/nist-csf-2: nist-csf-2-pr-ps-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-1
      compliance/pci-dss-4: pcidss-requirement-6-3-3
      compliance/soc2-2017: soc2-control-cc7-1-1
      compliance/vda-isa-5: vda-isa-5-5-2-5
    mql: fortios.system.firmware.current.maturity == "M"
    docs:
      desc: |
        This check verifies that the FortiOS firmware has reached Fortinet's "Mature" (M) maturity level rather than "Feature" (F) status. Mature releases have undergone extended field testing and are recommended for production environments that prioritize stability.

        **Why this matters**

        Fortinet classifies firmware maturity into stages, with "Feature" (F) releases receiving new features and "Mature" (M) releases focused on stability and bug fixes. If the device runs a Feature-stage release:

        - Newly introduced features may contain undiscovered bugs or security issues.
        - The firmware has had less time in production environments to surface edge-case defects.
        - Critical infrastructure benefits from the additional stability testing that Mature releases provide.

        For environments where stability is paramount, running a Mature release reduces the risk of unexpected issues. Environments that require the latest features may accept Feature-stage firmware with appropriate testing.
      audit: |
        ### Audit via the FortiGate web interface

        1. Log in to the FortiGate web interface.
        2. Navigate to **System > Firmware & Registration**.
        3. Review the current firmware version against the FortiOS release notes to determine its maturity level.

        A passing result shows a release that Fortinet classifies as "Mature" (M). A failing result shows a "Feature" (F) release.

        ### Audit via FortiOS CLI

        1. Open an SSH or console session to the FortiGate.
        2. Run the following command:

           ```
           get system status
           ```

        3. Compare the **Version** against the FortiOS release notes to determine its maturity level.

        A passing result shows a Mature (M) release. A failing result shows a Feature (F) release.
      remediation:
        - id: console
          desc: |
            **Using the FortiGate web interface**

            1. Back up the device configuration under **System > Configuration > Backups**
            2. Navigate to **System > Firmware & Registration**
            3. Review the available firmware versions and their maturity levels
            4. Select a firmware version with "Mature" maturity status
            5. Click **Upgrade** and follow the prompts; the device reboots to complete the upgrade

            Consult the [Fortinet firmware maturity documentation](https://docs.fortinet.com/document/fortigate/latest/administration-guide/738610/firmware) to identify which releases have reached Mature status for your platform.
        - id: cli
          desc: |
            **Using the CLI**

            Check the current firmware status:

            ```
            get system status
            ```

            Back up the configuration before upgrading. `execute backup full-config` captures both user-specified and default settings, which gives you a complete restore point if the upgrade has to be rolled back:

            ```
            execute backup full-config tftp <filename> <tftp_server_ip>
            ```

            Download a Mature release from [Fortinet Support](https://support.fortinet.com) and install it. **`execute restore image` reboots the device immediately with no confirmation prompt and interrupts all traffic until FortiOS comes back up, so run it only during a maintenance window.** If the target Mature release is several versions ahead, follow the [FortiOS upgrade path tool](https://docs.fortinet.com/upgrade-tool) and upgrade one hop at a time. Back up the configuration and verify the device is healthy after each hop before starting the next one:

            ```
            execute restore image tftp <filename> <tftp_server_ip>
            ```
    refs:
      - url: https://docs.fortinet.com/document/fortigate/latest/administration-guide/738610/firmware
        title: FortiOS firmware management
      - url: https://docs.fortinet.com/document/fortigate/latest/fortios-release-notes/
        title: FortiOS release notes

  - uid: mondoo-fortios-security-firmware-supported-major-version
    title: Ensure firmware is a supported major version
    impact: 95
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-tvm-03
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-8
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-id-ra-1
      compliance/nist-csf-2: nist-csf-2-id-ra-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-1
      compliance/pci-dss-4: pcidss-requirement-6-3-3
      compliance/soc2-2017: soc2-control-cc7-1-2
      compliance/vda-isa-5: vda-isa-5-5-2-5
    # Review annually — update when older major versions reach EOL
    mql: fortios.system.firmware.current.major >= 7
    docs:
      desc: |
        This check verifies that the FortiOS device is running a supported major firmware version. FortiOS versions below 7.x have reached or are approaching end of support and no longer receive security patches.

        **Why this matters**

        Fortinet maintains a defined product lifecycle for each FortiOS major version. When a version reaches end of engineering support or end of life:

        - No further security patches are released, leaving known vulnerabilities permanently unpatched.
        - FortiGuard services may stop providing updates for threat signatures and IPS rules.
        - Fortinet TAC support becomes limited or unavailable for end-of-life versions.
        - New features, protocol support, and performance improvements are only available in supported versions.
        - Compliance and cyber insurance requirements typically mandate running vendor-supported software.

        Upgrading to a supported major version ensures the device continues to receive critical security updates and vendor support.
      audit: |
        ### Audit via the FortiGate web interface

        1. Log in to the FortiGate web interface.
        2. Navigate to **System > Firmware & Registration**.
        3. Note the major version of the current firmware and check it against the [Fortinet product life cycle](https://support.fortinet.com/Information/ProductLifeCycle.aspx).

        A passing result shows a supported major version (7.x or later). A failing result shows a version that has reached end of engineering support or end of life.

        ### Audit via FortiOS CLI

        1. Open an SSH or console session to the FortiGate.
        2. Run the following command:

           ```
           get system status
           ```

        3. Read the major version from the **Version** line and check it against the Fortinet product life cycle.

        A passing result shows a supported major version (7.x or later). A failing result shows an unsupported major version.
      remediation:
        - id: console
          desc: |
            **Using the FortiGate web interface**

            1. Navigate to **System > Firmware & Registration**
            2. Review the available firmware versions for a supported major version (7.x or later)
            3. Plan the upgrade path carefully — Fortinet recommends upgrading through intermediate versions rather than skipping major releases
            4. Consult the [FortiOS upgrade path tool](https://docs.fortinet.com/upgrade-tool) to determine the recommended upgrade sequence
            5. Back up the configuration before each upgrade step
            6. Perform the upgrade during a maintenance window

            **Important**: Major version upgrades may introduce configuration changes. Review the release notes and migration guides for each version in the upgrade path.
        - id: cli
          desc: |
            **Using the CLI**

            Check the current firmware version:

            ```
            get system status
            ```

            Back up the configuration. `execute backup full-config` captures both user-specified and default settings, which gives you a complete restore point if an upgrade hop has to be rolled back:

            ```
            execute backup full-config tftp <filename> <tftp_server_ip>
            ```

            Follow the [FortiOS upgrade path tool](https://docs.fortinet.com/upgrade-tool) and upgrade through each required intermediate version. **`execute restore image` reboots the device immediately with no confirmation prompt and interrupts all traffic until FortiOS comes back up, so run it only during a maintenance window.** Run the command once per hop in the supported sequence rather than jumping straight to the target version, because skipping intermediate releases can corrupt the configuration migration. Back up the configuration and verify the device is healthy after each hop before starting the next one:

            ```
            execute restore image tftp <filename> <tftp_server_ip>
            ```
    refs:
      - url: https://docs.fortinet.com/document/fortigate/latest/administration-guide/738610/firmware
        title: FortiOS firmware management
      - url: https://support.fortinet.com/Information/ProductLifeCycle.aspx
        title: Fortinet product life cycle
      - url: https://docs.fortinet.com/upgrade-tool
        title: FortiOS upgrade path tool

  - uid: mondoo-fortios-security-admin-timeout
    title: Ensure admin session timeout is 5 minutes or less
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-12
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-10
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-1-3
    mql: fortios.system.global.admintimeout > 0 && fortios.system.global.admintimeout <= 5
    docs:
      desc: |
        This check verifies that the FortiOS admin session timeout is set to 5 minutes or less. Idle admin sessions that remain open are an attack vector for unauthorized access.

        **Why this matters**

        If an administrator walks away from a management session without logging out, anyone with physical or remote access to the workstation can take full control of the firewall. Short timeouts ensure that:

        - Unattended sessions are terminated before an attacker can exploit them.
        - Compliance frameworks such as NIST 800-53 AC-12 require automatic session termination after a defined period of inactivity.
        - The blast radius of a compromised admin workstation is limited to the timeout window.
      audit: |
        ### Audit via the FortiGate web interface

        1. Log in to the FortiGate web interface.
        2. Navigate to **System > Settings**.
        3. Under **Administration Settings**, read the **Idle Timeout** value.

        A passing result shows an idle timeout of 5 minutes or less. A failing result shows a timeout greater than 5 minutes.

        ### Audit via FortiOS CLI

        1. Open an SSH or console session to the FortiGate.
        2. Run the following command:

           ```
           get system global | grep admintimeout
           ```

        A passing result reports `admintimeout` between 1 and 5. A failing result reports a value above 5 or 0 (no timeout).
      remediation:
        - id: console
          desc: |
            **Using the FortiGate web interface**

            1. Navigate to **System > Settings**
            2. Under **Administration Settings**, set **Idle Timeout** to 5 minutes or less
            3. Click **Apply**
        - id: cli
          desc: |
            **Using the CLI**

            On a multi-VDOM device, first run `config global`.

            ```
            config system global
                set admintimeout 5
            end
            ```
    refs:
      - url: https://docs.fortinet.com/document/fortigate/latest/administration-guide/995498/gui-idle-timeout
        title: FortiOS admin session timeout

  - uid: mondoo-fortios-security-admin-https-non-default-port
    title: Ensure HTTPS admin port is non-default
    impact: 30
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ccc-06
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-pt-3
      compliance/nist-csf-2: nist-csf-2-pr-ps-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-7
      compliance/pci-dss-4: pcidss-requirement-2-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-5-2-1
    mql: fortios.system.global.adminSport != 443
    docs:
      desc: |
        This check verifies that the HTTPS administrative interface is not running on the default port 443. Using a non-default port reduces exposure to automated scanners and bots that target well-known management ports.

        **Why this matters**

        Automated attack tools and botnets routinely scan for FortiOS management interfaces on port 443. Changing the admin HTTPS port:

        - Reduces the attack surface from automated reconnaissance and brute-force attempts.
        - Makes the management interface less likely to be discovered by opportunistic attackers.
        - Adds an additional layer of defense-in-depth alongside proper access controls.

        This is not a substitute for restricting management access to trusted networks, but it reduces noise and opportunistic attacks.
      audit: |
        ### Audit via the FortiGate web interface

        1. Log in to the FortiGate web interface.
        2. Navigate to **System > Settings**.
        3. Under **Administration Settings**, read the **HTTPS port** value.

        A passing result shows a non-default port. A failing result shows port 443.

        ### Audit via FortiOS CLI

        1. Open an SSH or console session to the FortiGate.
        2. Run the following command:

           ```
           get system global | grep admin-sport
           ```

        A passing result reports `admin-sport` set to any value other than 443. A failing result reports `admin-sport` of 443.
      remediation:
        - id: console
          desc: |
            **Using the FortiGate web interface**

            1. Navigate to **System > Settings**
            2. Under **Administration Settings**, change the **HTTPS port** to a non-standard port such as 8443
            3. Click **Apply**

            **Important**: Choose a port that does not overlap the SSL-VPN listening `port`, which commonly uses 443 or 8443. If the admin HTTPS port and the SSL-VPN port collide, one of the services fails to bind and either administrators or VPN users lose access. After you apply the change, the web session disconnects and you must reconnect to the new port, for example `https://<device-ip>:8443`. Inform all administrators of the new port and update any bookmarks or management tools accordingly.
        - id: cli
          desc: |
            **Using the CLI**

            On a multi-VDOM device, first run `config global`.

            Pick a port that does not overlap the SSL-VPN listening `port`, which commonly uses 443 or 8443. If `admin-sport` collides with the SSL-VPN port, one of the two services fails to bind and either administrators or VPN users lose access.

            ```
            config system global
                set admin-sport 8443
            end
            ```
    refs:
      - url: https://docs.fortinet.com/document/fortigate/latest/administration-guide/262062/changing-the-admin-ports
        title: Changing the FortiOS admin ports

  - uid: mondoo-fortios-security-admin-ssh-non-default-port
    title: Ensure SSH admin port is non-default
    impact: 30
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ccc-06
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-pt-3
      compliance/nist-csf-2: nist-csf-2-pr-ps-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-7
      compliance/pci-dss-4: pcidss-requirement-2-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-5-2-1
    mql: fortios.system.global.adminSshPort != 22
    docs:
      desc: |
        This check verifies that the SSH administrative interface is not running on the default port 22. Using a non-default SSH port reduces exposure to automated scanners targeting the management plane.

        **Why this matters**

        SSH brute-force attacks are among the most common automated attacks against network devices. A non-default SSH port:

        - Reduces the volume of automated brute-force attempts against the management interface.
        - Makes the SSH service less likely to appear in Shodan, Censys, or similar internet scanning databases.
        - Provides defense-in-depth alongside access control lists and trusted host restrictions.
      audit: |
        ### Audit via the FortiGate web interface

        1. Log in to the FortiGate web interface.
        2. Navigate to **System > Settings**.
        3. Under **Administration Settings**, read the **SSH port** value.

        A passing result shows a non-default port. A failing result shows port 22.

        ### Audit via FortiOS CLI

        1. Open an SSH or console session to the FortiGate.
        2. Run the following command:

           ```
           get system global | grep admin-ssh-port
           ```

        A passing result reports `admin-ssh-port` set to any value other than 22. A failing result reports `admin-ssh-port` of 22.
      remediation:
        - id: console
          desc: |
            **Using the FortiGate web interface**

            1. Navigate to **System > Settings**
            2. Under **Administration Settings**, change the **SSH port** to a non-standard port (e.g., 2222)
            3. Click **Apply**
        - id: cli
          desc: |
            **Using the CLI**

            On a multi-VDOM device, first run `config global`.

            ```
            config system global
                set admin-ssh-port 2222
            end
            ```
    refs:
      - url: https://docs.fortinet.com/document/fortigate/latest/administration-guide/262062/changing-the-admin-ports
        title: Changing the FortiOS admin ports

  - uid: mondoo-fortios-security-admin-scp-disabled
    title: Ensure SCP admin access is disabled
    impact: 50
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ccc-06
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-pt-3
      compliance/nist-csf-2: nist-csf-2-pr-ps-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-7
      compliance/pci-dss-4: pcidss-requirement-2-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-5-2-1
    mql: fortios.system.global.adminScp == "disable"
    docs:
      desc: |
        This check verifies that SCP (Secure Copy Protocol) admin access is disabled. SCP allows direct file transfer to and from the FortiOS device, which is rarely needed and increases the attack surface of the management plane.

        **Why this matters**

        When SCP is enabled, an attacker who compromises admin credentials can:

        - Download the full device configuration, including secrets, VPN keys, and firewall rules.
        - Upload malicious firmware or configuration files to take persistent control of the device.
        - Exfiltrate data without triggering web-based admin audit logs.

        SCP should only be enabled temporarily when needed for specific maintenance tasks and disabled afterward.
      audit: |
        ### Audit via the FortiGate web interface

        1. Log in to the FortiGate web interface.
        2. Navigate to **System > Settings**.
        3. Under **Administration Settings**, check the **SCP** toggle.

        A passing result shows SCP disabled. A failing result shows SCP enabled.

        ### Audit via FortiOS CLI

        1. Open an SSH or console session to the FortiGate.
        2. Run the following command:

           ```
           get system global | grep admin-scp
           ```

        A passing result reports `admin-scp` set to `disable`. A failing result reports `admin-scp` set to `enable`.
      remediation:
        - id: console
          desc: |
            **Using the FortiGate web interface**

            1. Navigate to **System > Settings**
            2. Under **Administration Settings**, ensure **SCP** is set to **Disabled**
            3. Click **Apply**
        - id: cli
          desc: |
            **Using the CLI**

            On a multi-VDOM device, first run `config global`.

            ```
            config system global
                set admin-scp disable
            end
            ```
    refs:
      - url: https://docs.fortinet.com/document/fortigate/latest/administration-guide/
        title: FortiOS administration guide

  - uid: mondoo-fortios-security-ha-enabled
    title: Ensure high availability mode is enabled
    impact: 50
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-bcr-08
      compliance/dora: dora-art-12
      compliance/hipaa: hipaa-security-ss164-308-a-7-ii-a-contingency-plan-data-backup-plan
      compliance/iso-27001-2022: iso-27001-2022-a-8-14
      compliance/nis-2: nis-2-21-2-c
      compliance/nist-csf-1: nist-csf-1-pr-pt-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cp-10
      compliance/nist-sp-800-171: nist-sp-800-171--3-6-1
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc9-1-1
      compliance/vda-isa-5: vda-isa-5-3-1-2
    mql: fortios.system.ha.mode != "standalone"
    docs:
      desc: |
        This check verifies that the FortiOS device is configured in a high availability (HA) cluster rather than running in standalone mode. HA ensures the firewall is not a single point of failure.

        **Why this matters**

        A firewall running in standalone mode has no failover capability. If the device fails due to hardware issues, software crashes, or an attack:

        - All network traffic protected by the firewall is disrupted until the device is restored.
        - Security inspection stops completely, leaving the network unprotected or disconnected.
        - Recovery time depends on manual intervention, which may take hours.

        HA configurations (active-passive or active-active) provide automatic failover, ensuring continuous network protection and availability.
      audit: |
        ### Audit via the FortiGate web interface

        1. Log in to the FortiGate web interface.
        2. Navigate to **System > HA**.
        3. Read the configured **Mode**.

        A passing result shows Active-Passive or Active-Active mode. A failing result shows Standalone mode.

        ### Audit via FortiOS CLI

        1. Open an SSH or console session to the FortiGate.
        2. Run the following command:

           ```
           get system ha | grep mode
           ```

        A passing result reports a `mode` of `a-p` or `a-a`. A failing result reports `standalone`.
      remediation:
        - id: console
          desc: |
            **Using the FortiGate web interface**

            1. Navigate to **System > HA**
            2. Set **Mode** to **Active-Passive** or **Active-Active** depending on your requirements
            3. Configure HA group settings, priorities, and heartbeat interfaces
            4. Click **Apply**

            **Important**: HA configuration requires a second FortiGate unit with matching hardware and firmware. Plan the deployment carefully and perform the configuration during a maintenance window.
        - id: cli
          desc: |
            **Using the CLI**

            **Important**: HA configuration requires a second FortiGate unit with matching hardware, firmware, and licenses. Forming a cluster renegotiates interfaces and can briefly interrupt traffic, so apply this change during a maintenance window from the console or a dedicated management interface. Set a cluster password so only authorized units can join.

            ```
            config system ha
                set mode a-p
                set group-name "fg-cluster"
                set password <cluster-password>
                set hbdev "port3" 50
                set priority 200
            end
            ```
    refs:
      - url: https://docs.fortinet.com/document/fortigate/latest/administration-guide/940498/ha
        title: FortiOS high availability

  - uid: mondoo-fortios-security-ha-session-pickup
    title: Ensure HA session pickup is enabled
    impact: 50
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-bcr-08
      compliance/dora: dora-art-12
      compliance/hipaa: hipaa-security-ss164-308-a-7-ii-a-contingency-plan-data-backup-plan
      compliance/iso-27001-2022: iso-27001-2022-a-8-14
      compliance/nis-2: nis-2-21-2-c
      compliance/nist-csf-1: nist-csf-1-pr-pt-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cp-10
      compliance/nist-sp-800-171: nist-sp-800-171--3-6-1
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc9-1-1
      compliance/vda-isa-5: vda-isa-5-3-1-2
    mql: fortios.system.ha.mode == "standalone" || fortios.system.ha.sessionPickup == "enable"
    docs:
      desc: |
        This check verifies that HA session pickup is enabled, ensuring active sessions are preserved during failover. Without session pickup, all connections are dropped when the primary device fails.

        **Why this matters**

        When the primary FortiGate fails over to the secondary device without session pickup:

        - All active TCP connections (VPN tunnels, web sessions, database connections) are terminated.
        - Stateful inspection state is lost, meaning return traffic for existing flows is dropped until new connections are established.
        - VoIP calls, video conferences, and long-lived connections are disrupted.
        - During the reconnection storm, the secondary device may miss traffic while thousands of connections re-establish simultaneously.

        Session pickup synchronizes the session table between HA peers so that existing connections continue seamlessly after failover.
      audit: |
        ### Audit via the FortiGate web interface

        1. Log in to the FortiGate web interface.
        2. Navigate to **System > HA**.
        3. Check whether **Session Pickup** is enabled.

        A passing result shows Session Pickup enabled, or the device running in Standalone mode. A failing result shows an HA cluster with Session Pickup disabled.

        ### Audit via FortiOS CLI

        1. Open an SSH or console session to the FortiGate.
        2. Run the following command:

           ```
           get system ha | grep session-pickup
           ```

        A passing result reports `session-pickup` set to `enable`, or the device in standalone mode. A failing result reports `session-pickup` set to `disable` on an HA cluster.
      remediation:
        - id: console
          desc: |
            **Using the FortiGate web interface**

            1. Navigate to **System > HA**
            2. Enable **Session Pickup**
            3. Click **Apply**
        - id: cli
          desc: |
            **Using the CLI**

            ```
            config system ha
                set session-pickup enable
            end
            ```
    refs:
      - url: https://docs.fortinet.com/document/fortigate/latest/administration-guide/940498/ha
        title: FortiOS high availability

  - uid: mondoo-fortios-security-dns-over-tls
    title: Ensure DNS-over-TLS is enabled
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-20
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-5-1-2
    mql: fortios.system.dns.dnsOverTls == "enable"
    docs:
      desc: |
        This check verifies that DNS-over-TLS (DoT) is enabled for the FortiOS device's DNS resolution. Plaintext DNS queries expose the device's resolution activity to eavesdropping and manipulation.

        **Why this matters**

        FortiOS uses DNS resolution for FQDN-based firewall address objects, FortiGuard updates, and certificate validation. If DNS traffic is unencrypted:

        - Attackers on the network path can observe which domains the firewall resolves, revealing security tool update patterns and policy configurations.
        - DNS spoofing attacks can redirect FQDN-based firewall address objects to attacker-controlled IPs, bypassing firewall policies.
        - FortiGuard update requests could be redirected to serve malicious signature databases.
        - Compliance frameworks increasingly require encryption of management-plane traffic.
      audit: |
        ### Audit via the FortiGate web interface

        1. Log in to the FortiGate web interface.
        2. Navigate to **Network > DNS**.
        3. Under **DNS Protocols**, check whether **DNS over TLS** is selected.

        A passing result shows DNS over TLS enabled. A failing result shows it disabled.

        ### Audit via FortiOS CLI

        1. Open an SSH or console session to the FortiGate.
        2. Run the following command:

           ```
           get system dns
           ```

        On FortiOS 7.0 and later, a passing result reports `protocol` set to `dot`. On FortiOS 6.4 and earlier, a passing result reports `dns-over-tls` set to `enable`. A failing result reports cleartext DNS resolution.
      remediation:
        - id: console
          desc: |
            **Using the FortiGate web interface**

            1. Navigate to **Network > DNS**
            2. Set **DNS servers** to **Specify**
            3. Under **DNS Protocols**, select **DNS over TLS**
            4. Ensure the configured DNS servers support DNS over TLS, such as Cloudflare 1.1.1.1 or Google 8.8.8.8
            5. Click **Apply**
        - id: cli
          desc: |
            **Using the CLI**

            On a multi-VDOM device, first run `config global`.

            FortiOS 7.0 and later select the DNS transport with the `protocol` option:

            ```
            config system dns
                set protocol dot
                set ssl-certificate "Fortinet_Factory"
            end
            ```

            FortiOS 6.4 and earlier use the `dns-over-tls` option:

            ```
            config system dns
                set dns-over-tls enable
            end
            ```
    refs:
      - url: https://docs.fortinet.com/document/fortigate/latest/administration-guide/391295/dns
        title: FortiOS DNS configuration

  - uid: mondoo-fortios-security-ntp-sync-enabled
    title: Ensure NTP synchronization is enabled
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-17
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-pt-1
      compliance/nist-csf-2: nist-csf-2-pr-ps-04
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-7
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    mql: fortios.system.ntp.ntpsync == "enable"
    docs:
      desc: |
        This check verifies that NTP synchronization is enabled on the FortiOS device. Accurate time is foundational for security operations, log correlation, and certificate validation.

        **Why this matters**

        If the system clock drifts due to lack of NTP synchronization:

        - Log timestamps become inaccurate, making incident response and forensic timelines unreliable.
        - TLS certificate validation may fail if the device clock is outside the certificate's validity period, breaking FortiGuard updates and HTTPS inspection.
        - TOTP-based two-factor authentication for admin access will fail if the clock is more than a few seconds off.
        - Kerberos authentication in AD-integrated environments has strict time tolerance (typically 5 minutes).
        - Correlation of events across firewalls, SIEM, and other security tools becomes impossible with clock skew.
      audit: |
        ### Audit via the FortiGate web interface

        1. Log in to the FortiGate web interface.
        2. Navigate to **System > Settings**.
        3. Under **Time**, check whether **Synchronize with NTP Server** is selected.

        A passing result shows NTP synchronization enabled. A failing result shows the system time set manually.

        ### Audit via FortiOS CLI

        1. Open an SSH or console session to the FortiGate.
        2. Run the following command:

           ```
           get system ntp | grep ntpsync
           ```

        A passing result reports `ntpsync` set to `enable`. A failing result reports `disable`.
      remediation:
        - id: console
          desc: |
            **Using the FortiGate web interface**

            1. Navigate to **System > Settings**
            2. Under **Time**, enable **NTP synchronization**
            3. Configure at least one reliable NTP server
            4. Click **Apply**
        - id: cli
          desc: |
            **Using the CLI**

            On a multi-VDOM device, first run `config global`.

            ```
            config system ntp
                set ntpsync enable
                set type custom
                config ntpserver
                    edit 1
                        set server "pool.ntp.org"
                    next
                end
            end
            ```
    refs:
      - url: https://docs.fortinet.com/document/fortigate/latest/administration-guide/867830/ntp
        title: FortiOS NTP configuration

  - uid: mondoo-fortios-security-ntp-servers-configured
    title: Ensure NTP servers are configured
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-17
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-pt-1
      compliance/nist-csf-2: nist-csf-2-pr-ps-04
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-7
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    mql: fortios.system.ntp.servers.length > 0
    docs:
      desc: |
        This check verifies that at least one NTP server is configured on the FortiOS device. NTP synchronization being enabled is meaningless without a time source to synchronize against.

        **Why this matters**

        Even with NTP sync enabled, the device cannot maintain accurate time without configured NTP servers:

        - The device clock will drift over time, degrading log accuracy and authentication reliability.
        - FortiGuard services, certificate validation, and time-based access policies depend on accurate system time.
        - Configuring multiple NTP servers provides redundancy in case the primary time source is unavailable.
      audit: |
        ### Audit via the FortiGate web interface

        1. Log in to the FortiGate web interface.
        2. Navigate to **System > Settings**.
        3. Under **Time**, review the list of configured NTP servers.

        A passing result shows at least one NTP server configured. A failing result shows no NTP servers configured.

        ### Audit via FortiOS CLI

        1. Open an SSH or console session to the FortiGate.
        2. Run the following command:

           ```
           show system ntp
           ```

        A passing result shows one or more entries under `config ntpserver`. A failing result shows an empty `ntpserver` table.
      remediation:
        - id: console
          desc: |
            **Using the FortiGate web interface**

            1. Navigate to **System > Settings**
            2. Under **Time**, ensure at least one NTP server is configured
            3. Recommended: configure two or more NTP servers for redundancy
            4. Click **Apply**
        - id: cli
          desc: |
            **Using the CLI**

            On a multi-VDOM device, first run `config global`.

            ```
            config system ntp
                set ntpsync enable
                set type custom
                config ntpserver
                    edit 1
                        set server "pool.ntp.org"
                    next
                    edit 2
                        set server "time.cloudflare.com"
                    next
                end
            end
            ```
    refs:
      - url: https://docs.fortinet.com/document/fortigate/latest/administration-guide/867830/ntp
        title: FortiOS NTP configuration

  - uid: mondoo-fortios-security-log-implicit-deny
    title: Ensure implicit deny traffic is logged
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    mql: fortios.log.setting.fwpolicyImplicitLog == "enable"
    docs:
      desc: |
        This check verifies that traffic hitting the implicit deny rule at the end of the firewall policy table is logged. By default, FortiOS silently drops traffic that does not match any explicit policy.

        **Why this matters**

        The implicit deny rule catches all traffic not matched by explicit policies. Without logging this traffic:

        - Reconnaissance attempts, port scans, and probing are invisible to security teams.
        - Policy gaps are undetectable — traffic that should be allowed by an explicit rule but is silently dropped causes hard-to-diagnose connectivity issues.
        - Blocked lateral movement attempts from compromised internal hosts go unnoticed.
        - Compliance frameworks such as PCI DSS and NIST 800-53 AU-2 require logging of denied access attempts.
      audit: |
        ### Audit via the FortiGate web interface

        1. Log in to the FortiGate web interface.
        2. Navigate to **Policy & Objects > Firewall Policy**.
        3. Locate the **Implicit Deny** policy at the bottom of the policy table and check whether **Log Violation Traffic** is enabled.

        A passing result shows implicit deny logging enabled. A failing result shows it disabled.

        ### Audit via FortiOS CLI

        1. Open an SSH or console session to the FortiGate.
        2. Run the following command:

           ```
           get log setting | grep fwpolicy-implicit-log
           ```

        A passing result reports `fwpolicy-implicit-log` set to `enable`. A failing result reports `disable`.
      remediation:
        - id: console
          desc: |
            **Using the FortiGate web interface**

            1. Navigate to **Policy & Objects > Firewall Policy**
            2. Locate the **Implicit Deny** policy at the bottom of the policy table and click **Edit**
            3. Enable **Log Violation Traffic**
            4. Click **OK**
        - id: cli
          desc: |
            **Using the CLI**

            On a multi-VDOM device, first run `config global`.

            ```
            config log setting
                set fwpolicy-implicit-log enable
            end
            ```
    refs:
      - url: https://docs.fortinet.com/document/fortigate/latest/administration-guide/239623/logging
        title: FortiOS logging configuration

  - uid: mondoo-fortios-security-log-local-in-denied-unicast
    title: Ensure denied local-in unicast traffic is logged
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    mql: fortios.log.setting.localInDenyUnicast == "enable"
    docs:
      desc: |
        This check verifies that denied unicast local-in traffic is logged. Local-in traffic is traffic destined for the FortiGate device itself, such as management access attempts, routing protocol packets, and VPN negotiation.

        **Why this matters**

        Local-in denied traffic reveals attempts to directly access or attack the firewall:

        - Brute-force attempts against the management interface (HTTPS, SSH) are captured.
        - Unauthorized VPN connection attempts are logged for investigation.
        - Port scanning against the firewall's own IP addresses is recorded.
        - Without this logging, attacks targeting the firewall itself are invisible, and the first sign of compromise may be the attacker already having access.
      audit: |
        ### Audit via the FortiGate web interface

        1. Log in to the FortiGate web interface.
        2. Navigate to **Log & Report > Log Settings**.
        3. On the **Global Settings** tab, check whether **Log denied unicast traffic** is enabled. The toggle is visible when **Local traffic logging** is set to **Specify**.

        A passing result shows local-in denied unicast logging enabled. A failing result shows it disabled.

        ### Audit via FortiOS CLI

        1. Open an SSH or console session to the FortiGate.
        2. Run the following command:

           ```
           get log setting | grep local-in-deny-unicast
           ```

        A passing result reports `local-in-deny-unicast` set to `enable`. A failing result reports `disable`.
      remediation:
        - id: console
          desc: |
            **Using the FortiGate web interface**

            1. Navigate to **Log & Report > Log Settings**
            2. On the **Global Settings** tab, set **Local traffic logging** to **Specify**
            3. Enable **Log denied unicast traffic**
            4. Click **Apply**
        - id: cli
          desc: |
            **Using the CLI**

            On a multi-VDOM device, first run `config global`.

            ```
            config log setting
                set local-in-deny-unicast enable
            end
            ```
    refs:
      - url: https://docs.fortinet.com/document/fortigate/latest/administration-guide/239623/logging
        title: FortiOS logging configuration

  - uid: mondoo-fortios-security-log-extended-format
    title: Ensure extended log format is enabled
    impact: 50
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-ae-3
      compliance/nist-csf-2: nist-csf-2-de-ae-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    mql: fortios.log.setting.extendedLog == "enable"
    docs:
      desc: |
        This check verifies that extended log format is enabled. Extended logs include additional detail such as application data, URL information, and threat context that are essential for security analysis.

        **Why this matters**

        Standard FortiOS logs contain basic session information (source, destination, action). Extended logs add:

        - Application-level detail needed to identify specific threats and attack techniques.
        - URL and web category information for investigating data exfiltration or policy violations.
        - Threat metadata that enables SIEM correlation rules and automated incident response.
        - Additional context that reduces mean-time-to-investigate during security incidents.

        The additional log volume is a worthwhile tradeoff for the improved visibility during investigations.
      audit: |
        The global extended log format option is not exposed in the FortiGate web interface. Audit it from the CLI.

        ### Audit via FortiOS CLI

        1. Open an SSH or console session to the FortiGate.
        2. Run the following command:

           ```
           get log setting | grep extended-log
           ```

        A passing result reports `extended-log` set to `enable`. A failing result reports `disable`.
      remediation:
        # No console remediation: the global extended-log option in "config log setting" is not exposed in the FortiGate web interface; it is configurable only in the CLI.
        - id: cli
          desc: |
            **Using the CLI**

            On a multi-VDOM device, first run `config global`.

            The global extended log format option is available only in the CLI:

            ```
            config log setting
                set extended-log enable
            end
            ```
    refs:
      - url: https://docs.fortinet.com/document/fortigate/latest/administration-guide/239623/logging
        title: FortiOS logging configuration

  - uid: mondoo-fortios-security-log-no-user-anonymization
    title: Ensure user anonymization is disabled in logs
    impact: 50
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-ae-3
      compliance/nist-csf-2: nist-csf-2-de-ae-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    mql: fortios.log.setting.userAnonymize == "disable"
    docs:
      desc: |
        This check verifies that user anonymization is disabled in log settings. When anonymization is enabled, usernames in log entries are replaced with anonymous identifiers, making incident response and forensic investigation impossible.

        **Why this matters**

        User attribution is essential for security operations:

        - Incident responders cannot identify which user account was compromised or misused.
        - Insider threat investigations require associating actions with specific users.
        - Compliance frameworks require audit trails that can attribute actions to individuals (NIST 800-53 AU-3, SOC 2 CC7.2).
        - SIEM correlation rules that match user behavior across systems cannot function with anonymized usernames.

        If privacy regulations require anonymization in certain contexts, implement it at the SIEM level with role-based access to deanonymize rather than at the source.
      audit: |
        The user-anonymize option is not exposed in the FortiGate web interface. Audit it from the CLI.

        ### Audit via FortiOS CLI

        1. Open an SSH or console session to the FortiGate.
        2. Run the following command:

           ```
           get log setting | grep user-anonymize
           ```

        A passing result reports `user-anonymize` set to `disable`. A failing result reports `enable`.
      remediation:
        # No console remediation: the user-anonymize option in "config log setting" is not exposed in the FortiGate web interface; it is configurable only in the CLI.
        - id: cli
          desc: |
            **Using the CLI**

            On a multi-VDOM device, first run `config global`.

            The user anonymization option is available only in the CLI:

            ```
            config log setting
                set user-anonymize disable
            end
            ```
    refs:
      - url: https://docs.fortinet.com/document/fortigate/latest/administration-guide/239623/logging
        title: FortiOS logging configuration

  - uid: mondoo-fortios-security-log-syslog-enabled
    title: Ensure syslog forwarding is enabled
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-4
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    mql: fortios.log.syslog.status == "enable"
    docs:
      desc: |
        This check verifies that syslog forwarding is enabled. Logs stored only on the firewall are vulnerable to loss if the device is compromised, fails, or is reset to factory defaults.

        **Why this matters**

        External log forwarding via syslog is critical for security operations:

        - If an attacker compromises the FortiGate, they can clear local logs to cover their tracks. External logs are preserved.
        - Device failures or factory resets destroy local log storage.
        - SIEM integration requires syslog forwarding to correlate firewall events with other security data sources.
        - Compliance frameworks universally require centralized, tamper-resistant log storage (PCI DSS 10.5, NIST 800-53 AU-4).
        - Incident response teams need historical logs that survive device replacement.
      audit: |
        ### Audit via the FortiGate web interface

        1. Log in to the FortiGate web interface.
        2. Navigate to **Log & Report > Log Settings**.
        3. Under **Remote Logging**, check whether **Send logs to syslog** is enabled and a server is configured.

        A passing result shows syslog forwarding enabled. A failing result shows it disabled.

        ### Audit via FortiOS CLI

        1. Open an SSH or console session to the FortiGate.
        2. Run the following command:

           ```
           get log syslogd setting | grep status
           ```

        A passing result reports `status` set to `enable`. A failing result reports `disable`.
      remediation:
        - id: console
          desc: |
            **Using the FortiGate web interface**

            1. Navigate to **Log & Report > Log Settings**
            2. Under **Remote Logging**, enable **Syslog**
            3. Configure the syslog server IP address and port
            4. Select the appropriate facility and log level
            5. Click **Apply**
        - id: cli
          desc: |
            **Using the CLI**

            On a multi-VDOM device, first run `config global`.

            ```
            config log syslogd setting
                set status enable
                set server "10.0.0.100"
                set port 514
                set facility local7
            end
            ```
    refs:
      - url: https://docs.fortinet.com/document/fortigate/latest/administration-guide/239623/logging
        title: FortiOS logging configuration

  - uid: mondoo-fortios-security-log-external-destination
    title: Ensure an external log destination is configured
    impact: 85
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-4
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    mql: |
      fortios.log.syslog.status == "enable" || fortios.log.fortianalyzer.status == "enable"
    docs:
      desc: |
        This check verifies that at least one external log destination (syslog or FortiAnalyzer) is configured and active. Relying solely on local log storage leaves the organization blind if the device is compromised or fails.

        **Why this matters**

        Without any external log destination:

        - An attacker who gains access to the FortiGate can erase all evidence of the breach.
        - Hardware failure destroys the only copy of security logs.
        - No SIEM integration is possible, preventing correlation with other security data.
        - Incident response is severely limited without historical log data.
        - Every major compliance framework requires centralized, off-device log retention.

        Either syslog or FortiAnalyzer satisfies this requirement. FortiAnalyzer provides additional FortiOS-specific analytics, while syslog integrates with any SIEM.
      audit: |
        ### Audit via the FortiGate web interface

        1. Log in to the FortiGate web interface.
        2. Navigate to **Log & Report > Log Settings**.
        3. Under **Remote Logging**, check the **Syslog** and **FortiAnalyzer** settings.

        A passing result shows at least one of syslog or FortiAnalyzer enabled with a server configured. A failing result shows both disabled.

        ### Audit via FortiOS CLI

        1. Open an SSH or console session to the FortiGate.
        2. Run the following commands:

           ```
           get log syslogd setting | grep status
           get log fortianalyzer setting | grep status
           ```

        A passing result reports `status` set to `enable` for at least one destination. A failing result reports `disable` for both.
      remediation:
        - id: console
          desc: |
            **Using the FortiGate web interface**

            Configure at least one external log destination:

            **Option 1: Syslog**
            1. Navigate to **Log & Report > Log Settings**
            2. Enable **Syslog** and configure the server address

            **Option 2: FortiAnalyzer**
            1. Navigate to **Log & Report > Log Settings**
            2. Enable **FortiAnalyzer** and configure the server address
        - id: cli
          desc: |
            **Using the CLI**

            On a multi-VDOM device, first run `config global`.

            **Option 1: Syslog**

            ```
            config log syslogd setting
                set status enable
                set server "10.0.0.100"
            end
            ```

            **Option 2: FortiAnalyzer**

            ```
            config log fortianalyzer setting
                set status enable
                set server "10.0.0.200"
            end
            ```
    refs:
      - url: https://docs.fortinet.com/document/fortigate/latest/administration-guide/239623/logging
        title: FortiOS logging configuration

  - uid: mondoo-fortios-security-log-fortianalyzer-encryption
    title: Ensure FortiAnalyzer uses strong encryption
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-5-1-2
    mql: |
      fortios.log.fortianalyzer.status != "enable" || fortios.log.fortianalyzer.encAlgorithm == "high"
    docs:
      desc: |
        This check verifies that when FortiAnalyzer logging is enabled, the encryption algorithm is set to "high" for maximum protection of log data in transit. This check passes if FortiAnalyzer is not enabled.

        **Why this matters**

        Log data contains sensitive information including IP addresses, usernames, URLs, and security events. If the FortiAnalyzer connection uses weak encryption:

        - Attackers on the network path can intercept and read log data, gaining intelligence about the network's security posture and active defenses.
        - Log data could be tampered with in transit, allowing an attacker to cover their tracks.
        - Weak encryption algorithms may have known vulnerabilities that allow decryption.
        - Compliance frameworks require strong encryption for data in transit (NIST 800-53 SC-8).
      audit: |
        ### Audit via the FortiGate web interface

        1. Log in to the FortiGate web interface.
        2. Navigate to **Log & Report > Log Settings**.
        3. Under **FortiAnalyzer** settings, review the **Encryption** algorithm.

        A passing result shows the encryption algorithm set to **High**, or FortiAnalyzer logging not enabled. A failing result shows FortiAnalyzer enabled with an encryption algorithm other than High.

        ### Audit via FortiOS CLI

        1. Open an SSH or console session to the FortiGate.
        2. Run the following command:

           ```
           get log fortianalyzer setting | grep -e status -e enc-algorithm
           ```

        A passing result reports `enc-algorithm` set to `high`, or `status` set to `disable`. A failing result reports `status` of `enable` with `enc-algorithm` other than `high`.
      remediation:
        - id: console
          desc: |
            **Using the FortiGate web interface**

            1. Navigate to **Log & Report > Log Settings**
            2. Under **FortiAnalyzer** settings, set **Encryption** to **High**
            3. Click **Apply**
        - id: cli
          desc: |
            **Using the CLI**

            On a multi-VDOM device, first run `config global`.

            ```
            config log fortianalyzer setting
                set enc-algorithm high
            end
            ```
    refs:
      - url: https://docs.fortinet.com/document/fortigate/latest/administration-guide/239623/logging
        title: FortiOS logging configuration

  - uid: mondoo-fortios-security-log-fortianalyzer-reliable
    title: Ensure FortiAnalyzer reliable logging is enabled
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-4
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    mql: |
      fortios.log.fortianalyzer.status != "enable" || fortios.log.fortianalyzer.reliable == "enable"
    docs:
      desc: |
        This check verifies that when FortiAnalyzer logging is enabled, reliable logging mode is active. Reliable mode uses TCP and buffers logs during network interruptions, preventing silent log loss. This check passes if FortiAnalyzer is not enabled.

        **Why this matters**

        Without reliable logging, FortiOS sends logs over UDP in a fire-and-forget manner:

        - Network congestion, packet loss, or brief outages cause permanent log loss with no notification.
        - An attacker who can cause network disruption between the FortiGate and FortiAnalyzer can selectively suppress log entries covering their activity.
        - Compliance audits may reveal gaps in log coverage that cannot be explained or recovered.
        - Reliable mode uses TCP with local buffering, ensuring logs are retransmitted until confirmed received.
      audit: |
        ### Audit via the FortiGate web interface

        1. Log in to the FortiGate web interface.
        2. Navigate to **Log & Report > Log Settings**.
        3. Under **FortiAnalyzer** settings, check whether **Reliable Logging** is enabled.

        A passing result shows reliable logging enabled, or FortiAnalyzer logging not enabled. A failing result shows FortiAnalyzer enabled with reliable logging disabled.

        ### Audit via FortiOS CLI

        1. Open an SSH or console session to the FortiGate.
        2. Run the following command:

           ```
           get log fortianalyzer setting | grep -e status -e reliable
           ```

        A passing result reports `reliable` set to `enable`, or `status` set to `disable`. A failing result reports `status` of `enable` with `reliable` set to `disable`.
      remediation:
        - id: console
          desc: |
            **Using the FortiGate web interface**

            1. Navigate to **Log & Report > Log Settings**
            2. Under **FortiAnalyzer** settings, enable **Reliable Logging**
            3. Click **Apply**
        - id: cli
          desc: |
            **Using the CLI**

            On a multi-VDOM device, first run `config global`.

            ```
            config log fortianalyzer setting
                set reliable enable
            end
            ```
    refs:
      - url: https://docs.fortinet.com/document/fortigate/latest/administration-guide/239623/logging
        title: FortiOS logging configuration

  - uid: mondoo-fortios-security-no-disabled-policies
    title: Ensure no firewall policies are disabled
    impact: 50
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-1
      compliance/nist-csf-2: nist-csf-2-pr-ps-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-2
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-5-2-6
    mql: fortios.firewall.policies.all(status == "enable")
    docs:
      desc: |
        This check verifies that no firewall policies are in a disabled state. Disabled policies are dead configuration that clutters the rule base and may be re-enabled accidentally.

        **Why this matters**

        Disabled firewall policies create operational and security risks:

        - A disabled "allow all" policy can be accidentally re-enabled, opening a massive security hole.
        - Dead policies obscure the effective rule set, making security audits and change management harder.
        - Administrators may lose track of why a policy was disabled, leading to uncertainty about whether it's safe to remove.
        - Policy table bloat increases the time required for packet classification and slows firewall throughput.

        Policies should either be active and documented or removed entirely. If a policy is needed for future use, document it in change management rather than leaving it disabled in production.
      audit: |
        ### Audit via the FortiGate web interface

        1. Log in to the FortiGate web interface.
        2. Navigate to **Policy & Objects > Firewall Policy**.
        3. Review the status indicator for each policy.

        A passing result shows every policy enabled. A failing result shows one or more policies in a disabled state.

        ### Audit via FortiOS CLI

        1. Open an SSH or console session to the FortiGate.
        2. Run the following command:

           ```
           show firewall policy
           ```

        A passing result shows no policy with `set status disable`. A failing result shows at least one policy with `set status disable`.
      remediation:
        - id: console
          desc: |
            **Using the FortiGate web interface**

            1. Navigate to **Policy & Objects > Firewall Policy**
            2. Identify any disabled policies (shown with a grey status indicator)
            3. For each disabled policy, either:
               - Delete it if it is no longer needed
               - Enable it if it should be active
            4. Document the rationale for any changes in your change management system
        - id: cli
          desc: |
            **Using the CLI**

            List all policies and their status:

            ```
            show firewall policy
            ```

            Delete an unused policy:

            ```
            config firewall policy
                delete <policy-id>
            end
            ```
    refs:
      - url: https://docs.fortinet.com/document/fortigate/latest/administration-guide/954936/firewall-policies
        title: FortiOS firewall policies

  - uid: mondoo-fortios-security-no-allow-all-rule
    title: Ensure no allow-all firewall rules exist
    impact: 95
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-4
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-3
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-5-2-6
    mql: |
      fortios.firewall.policies.none(
        action == "accept" &&
        srcaddr.contains("all") &&
        dstaddr.contains("all") &&
        service.contains("ALL")
      )
    docs:
      desc: |
        This check verifies that no firewall policy allows all source addresses, all destination addresses, and all services simultaneously. An any-any-any accept rule effectively turns the firewall into a router.

        **Why this matters**

        An allow-all rule is the most common and dangerous firewall misconfiguration:

        - The firewall provides no security value — all traffic passes uninspected.
        - Lateral movement from a compromised host is completely unrestricted.
        - Data exfiltration to any destination on any port is allowed.
        - The rule typically exists because it was created "temporarily" during troubleshooting and never removed.
        - Even with UTM profiles enabled, an any-any-any rule violates the principle of least privilege and makes the security posture fragile.

        Every firewall policy should specify the minimum required source, destination, and service scope.
      audit: |
        ### Audit via the FortiGate web interface

        1. Log in to the FortiGate web interface.
        2. Navigate to **Policy & Objects > Firewall Policy**.
        3. Inspect each accept policy for source, destination, and service all set to **all**/**ALL**.

        A passing result shows no policy that accepts all sources, all destinations, and all services. A failing result shows at least one any-any-any accept rule.

        ### Audit via FortiOS CLI

        1. Open an SSH or console session to the FortiGate.
        2. Run the following command:

           ```
           show firewall policy
           ```

        A passing result shows no accept policy combining `set srcaddr "all"`, `set dstaddr "all"`, and `set service "ALL"`. A failing result shows at least one policy that does.
      remediation:
        - id: console
          desc: |
            **Using the FortiGate web interface**

            1. Navigate to **Policy & Objects > Firewall Policy**
            2. Identify any policies where source, destination, and service are all set to "all" or "ALL"
            3. Replace the overly permissive rule with specific policies that allow only required traffic flows
            4. Test connectivity after making changes to ensure legitimate traffic is not disrupted
            5. Delete the allow-all rule once replacement policies are confirmed working
        - id: cli
          desc: |
            **Using the CLI**

            Review all policies:

            ```
            show firewall policy
            ```

            Modify the overly permissive policy to restrict scope:

            ```
            config firewall policy
                edit <policy-id>
                    set srcaddr "specific-source-group"
                    set dstaddr "specific-dest-group"
                    set service "HTTPS" "DNS" "SSH"
                next
            end
            ```
    refs:
      - url: https://docs.fortinet.com/document/fortigate/latest/best-practices/555436/firewall-policies
        title: FortiOS firewall policy best practices

  - uid: mondoo-fortios-security-policy-logging-enabled
    title: Ensure traffic logging is enabled on accept rules
    impact: 75
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    mql: |
      fortios.firewall.policies.where(action == "accept").all(logtraffic != "disable")
    docs:
      desc: |
        This check verifies that all firewall accept rules have traffic logging enabled. Accept rules without logging create blind spots where allowed traffic is invisible to security monitoring.

        **Why this matters**

        Firewall rules that allow traffic without logging it are a significant visibility gap:

        - Lateral movement through allowed paths is undetectable — the SIEM never sees the connections.
        - Data exfiltration through allowed services (HTTPS, DNS) leaves no trace.
        - Incident response teams cannot determine what traffic flowed through the firewall during a breach window.
        - Capacity planning and traffic analysis are impossible without flow data.
        - Compliance frameworks require comprehensive logging of network access (PCI DSS 10.2, NIST 800-53 AU-2).
      audit: |
        ### Audit via the FortiGate web interface

        1. Log in to the FortiGate web interface.
        2. Navigate to **Policy & Objects > Firewall Policy**.
        3. For each accept policy, open it and review **Logging Options**.

        A passing result shows every accept policy logging traffic (All Sessions or Security Events). A failing result shows at least one accept policy with logging disabled.

        ### Audit via FortiOS CLI

        1. Open an SSH or console session to the FortiGate.
        2. Run the following command:

           ```
           show firewall policy
           ```

        A passing result shows every accept policy with `set logtraffic` set to `all` or `utm`. A failing result shows an accept policy with `set logtraffic disable`.
      remediation:
        - id: console
          desc: |
            **Using the FortiGate web interface**

            1. Navigate to **Policy & Objects > Firewall Policy**
            2. For each accept policy, click **Edit**
            3. Under **Logging Options**, set **Log Allowed Traffic** to **All Sessions** or **Security Events**
            4. Click **OK**
        - id: cli
          desc: |
            **Using the CLI**

            ```
            config firewall policy
                edit <policy-id>
                    set logtraffic all
                next
            end
            ```
    refs:
      - url: https://docs.fortinet.com/document/fortigate/latest/administration-guide/954936/firewall-policies
        title: FortiOS firewall policies

  - uid: mondoo-fortios-security-policy-utm-enabled
    title: Ensure UTM profiles are enabled on accept rules
    impact: 85
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-23
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-de-cm-4
      compliance/nist-csf-2: nist-csf-2-de-cm-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-5-2-6
    mql: |
      fortios.firewall.policies.where(action == "accept").all(utmStatus == "enable")
    docs:
      desc: |
        This check verifies that all firewall accept rules have UTM (Unified Threat Management) security profiles enabled. Without UTM profiles, allowed traffic passes through without antivirus, IPS, web filtering, or application control inspection.

        **Why this matters**

        A next-generation firewall without UTM profiles applied is functionally equivalent to a basic packet filter:

        - Malware delivered over allowed protocols (HTTP, HTTPS, SMTP) passes through uninspected.
        - Exploit attempts and known attack signatures are not detected by the IPS engine.
        - Users can access malicious or policy-violating websites through allowed web traffic.
        - Command-and-control traffic from compromised hosts blends in with legitimate traffic.
        - The organization is not getting the security value it paid for with the FortiGate NGFW platform.

        At minimum, each accept rule should have antivirus, IPS, and web filter profiles applied.
      audit: |
        ### Audit via the FortiGate web interface

        1. Log in to the FortiGate web interface.
        2. Navigate to **Policy & Objects > Firewall Policy**.
        3. For each accept policy, open it and review the **Security Profiles** section.

        A passing result shows every accept policy with security profiles enabled. A failing result shows at least one accept policy with no UTM profiles applied.

        ### Audit via FortiOS CLI

        1. Open an SSH or console session to the FortiGate.
        2. Run the following command:

           ```
           show firewall policy
           ```

        A passing result shows every accept policy with `set utm-status enable`. A failing result shows an accept policy with `set utm-status disable` or no `utm-status` line.
      remediation:
        - id: console
          desc: |
            **Using the FortiGate web interface**

            1. Navigate to **Policy & Objects > Firewall Policy**
            2. For each accept policy, click **Edit**
            3. Under **Security Profiles**, enable the relevant profiles:
               - **AntiVirus**: Select an appropriate AV profile
               - **IPS**: Select an appropriate IPS sensor
               - **Web Filter**: Select an appropriate web filter profile
               - **Application Control**: Select an appropriate application list
            4. Click **OK**
        - id: cli
          desc: |
            **Using the CLI**

            Setting `utm-status enable` without an `ssl-ssh-profile` leaves the policy with no SSL/SSH inspection, so the antivirus, IPS, and web filter profiles never see inside encrypted sessions and the UTM stack is effectively bypassed for HTTPS and other TLS traffic. Always pair the UTM profiles with an inspection profile:

            ```
            config firewall policy
                edit <policy-id>
                    set utm-status enable
                    set ssl-ssh-profile "certificate-inspection"
                    set av-profile "default"
                    set ips-sensor "default"
                    set webfilter-profile "default"
                    set application-list "default"
                next
            end
            ```

            The `certificate-inspection` profile reads only the certificate metadata and works without further setup. The `deep-inspection` profile decrypts and re-encrypts TLS sessions and catches threats hidden inside encrypted payloads, but it requires deploying the FortiGate CA certificate to every client's trust store first, otherwise users get certificate warnings.
    refs:
      - url: https://docs.fortinet.com/document/fortigate/latest/administration-guide/178074/security-profiles
        title: FortiOS security profiles

  - uid: mondoo-fortios-security-policy-ssl-inspection
    title: Ensure SSL/SSH inspection is set on accept rules
    impact: 75
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-23
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-de-cm-4
      compliance/nist-csf-2: nist-csf-2-de-cm-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-5-2-6
    mql: |
      fortios.firewall.policies.where(action == "accept").all(sslSshProfile != "" && sslSshProfile != "no-inspection")
    docs:
      desc: |
        This check verifies that all firewall accept rules have an SSL/SSH inspection profile configured. Without SSL inspection, encrypted traffic bypasses all UTM security profiles.

        **Why this matters**

        The majority of internet traffic is now encrypted with TLS. Without SSL inspection:

        - Antivirus scanning cannot inspect encrypted file transfers — malware delivered over HTTPS is invisible.
        - IPS signatures cannot match against encrypted payloads — exploits tunneled over TLS evade detection.
        - Web filtering is limited to SNI/certificate-based decisions — URL-level filtering and content inspection are impossible.
        - Command-and-control traffic commonly uses HTTPS to blend in with legitimate traffic.
        - All UTM profiles are effectively bypassed for encrypted sessions, rendering the NGFW equivalent to a basic stateful firewall.

        Deploy at minimum certificate inspection, and where feasible, full deep inspection with appropriate certificate deployment.
      audit: |
        ### Audit via the FortiGate web interface

        1. Log in to the FortiGate web interface.
        2. Navigate to **Policy & Objects > Firewall Policy**.
        3. For each accept policy, open it and review the **SSL/SSH Inspection** setting.

        A passing result shows every accept policy with an SSL/SSH inspection profile assigned other than the built-in **no-inspection** profile. A failing result shows at least one accept policy with no inspection profile or with **no-inspection**.

        ### Audit via FortiOS CLI

        1. Open an SSH or console session to the FortiGate.
        2. Run the following command:

           ```
           show firewall policy
           ```

        A passing result shows every accept policy with `set ssl-ssh-profile` set to a profile other than `no-inspection`. A failing result shows an accept policy with no `ssl-ssh-profile` assigned or with the `no-inspection` profile.
      remediation:
        - id: console
          desc: |
            **Using the FortiGate web interface**

            1. Navigate to **Policy & Objects > Firewall Policy**
            2. For each accept policy, click **Edit**
            3. Under **Security Profiles**, set **SSL/SSH Inspection** to an appropriate profile:
               - **certificate-inspection**: Inspects certificate metadata without decrypting (lower impact)
               - **deep-inspection**: Full decryption and inspection (requires CA certificate deployment)
            4. Click **OK**
        - id: cli
          desc: |
            **Using the CLI**

            ```
            config firewall policy
                edit <policy-id>
                    set ssl-ssh-profile "certificate-inspection"
                next
            end
            ```
    refs:
      - url: https://docs.fortinet.com/document/fortigate/latest/administration-guide/88976/ssl-ssh-inspection
        title: FortiOS SSL/SSH inspection

  - uid: mondoo-fortios-security-wan-no-management-access
    title: Ensure WAN interfaces restrict management access
    impact: 95
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-5-2-6
    mql: |
      fortios.network.interfaces.where(role == "wan").all(
        allowaccess != /\bhttp\b/ && allowaccess != /https/ && allowaccess != /ssh/ && allowaccess != /telnet/ && allowaccess != /snmp/
      )
    docs:
      desc: |
        This check verifies that WAN-facing interfaces do not allow management access protocols (HTTP, HTTPS, SSH, telnet, SNMP). Exposing the management plane on internet-facing interfaces is the leading cause of FortiOS compromises.

        **Why this matters**

        Multiple critical FortiOS vulnerabilities have been exploited via management interfaces exposed to the internet:

        - CVE-2024-55591, CVE-2023-27997, CVE-2022-42475 — all exploited FortiOS management or VPN services accessible from the WAN.
        - Automated botnets continuously scan for FortiGate admin interfaces on public IPs.
        - HTTPS admin access on WAN allows brute-force attacks against admin credentials from anywhere on the internet.
        - SNMP on WAN interfaces leaks device configuration details, firmware versions, and network topology to attackers.

        Management access should be restricted to dedicated management interfaces or internal networks, protected by access control lists, and accessed via VPN when remote administration is required.
      audit: |
        ### Audit via the FortiGate web interface

        1. Log in to the FortiGate web interface.
        2. Navigate to **Network > Interfaces**.
        3. For each WAN-role interface, open it and review **Administrative Access**.

        A passing result shows no WAN interface permitting HTTP, HTTPS, SSH, Telnet, or SNMP. A failing result shows a WAN interface with one of those management protocols allowed.

        ### Audit via FortiOS CLI

        1. Open an SSH or console session to the FortiGate.
        2. Run the following command:

           ```
           show system interface
           ```

        A passing result shows no WAN-role interface with `http`, `https`, `ssh`, `telnet`, or `snmp` in its `set allowaccess` list. A failing result shows a WAN interface that allows one of those protocols.
      remediation:
        - id: console
          desc: |
            **Using the FortiGate web interface**

            **Warning**: Do not make this change while connected through the WAN interface you are editing. Removing management protocols from that interface ends your session immediately and can lock you out. Connect through an internal interface, a dedicated management interface, or the serial console first.

            1. Navigate to **Network > Interfaces**
            2. For each WAN interface, click **Edit**
            3. Under **Administrative Access**, remove **HTTPS**, **HTTP**, **SSH**, **Telnet**, and **SNMP**
            4. Only allow **Ping** if needed for monitoring, and **FMG-Access** if managed by FortiManager
            5. Click **OK**

            For remote management, configure VPN access and manage the device through an internal interface after connecting via VPN.
        - id: cli
          desc: |
            **Using the CLI**

            **Warning**: Run these commands from the console or from a session that enters through an internal interface. Replacing the access list on the interface that carries your current session disconnects you immediately. Keep `fgfm` in the list if the device is managed by FortiManager.

            Repeat for every WAN interface:

            ```
            config system interface
                edit "wan1"
                    set allowaccess ping
                next
            end
            ```
    refs:
      - url: https://docs.fortinet.com/document/fortigate/latest/administration-guide/552515/interfaces
        title: FortiOS interface configuration
      - url: https://www.fortiguard.com/psirt
        title: FortiGuard PSIRT advisories

  - uid: mondoo-fortios-security-no-telnet-access
    title: Ensure no interfaces allow telnet access
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ccc-06
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-2-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-5-2-1
    mql: fortios.network.interfaces.all(allowaccess != /telnet/)
    docs:
      desc: |
        This check verifies that no network interface on the FortiOS device allows telnet access. Telnet transmits all data, including credentials, in plaintext and must not be used for device management.

        **Why this matters**

        Telnet is an inherently insecure protocol:

        - Admin credentials are transmitted in cleartext, allowing any network observer to capture usernames and passwords.
        - Session content including configuration commands is visible to anyone performing packet capture on the network path.
        - There is no encryption, integrity checking, or authentication of the server — man-in-the-middle attacks are trivial.
        - SSH provides identical functionality with full encryption and should be used in all cases where CLI access is needed.
        - Compliance frameworks universally prohibit cleartext management protocols (PCI DSS 2.3, NIST 800-53 SC-8).
      audit: |
        ### Audit via the FortiGate web interface

        1. Log in to the FortiGate web interface.
        2. Navigate to **Network > Interfaces**.
        3. For each interface, open it and review **Administrative Access**.

        A passing result shows no interface permitting Telnet. A failing result shows at least one interface with Telnet allowed.

        ### Audit via FortiOS CLI

        1. Open an SSH or console session to the FortiGate.
        2. Run the following command:

           ```
           show system interface
           ```

        A passing result shows no interface with `telnet` in its `set allowaccess` list. A failing result shows at least one interface that allows `telnet`.
      remediation:
        - id: console
          desc: |
            **Using the FortiGate web interface**

            1. Navigate to **Network > Interfaces**
            2. For each interface, click **Edit**
            3. Under **Administrative Access**, uncheck **Telnet**
            4. Ensure **SSH** is enabled on management interfaces as a replacement
            5. Click **OK**
        - id: cli
          desc: |
            **Using the CLI**

            List the interfaces that currently allow telnet:

            ```
            show system interface
            ```

            Remove only the telnet option from each affected interface. The `unselect` keyword removes a single option from a multi-option field without touching the others:

            ```
            config system interface
                edit "mgmt"
                    unselect allowaccess telnet
                next
            end
            ```

            Alternatively, set the complete list of allowed protocols without telnet:

            ```
            config system interface
                edit "mgmt"
                    set allowaccess ping https ssh
                next
            end
            ```

            Do not use `unset` to remove telnet. The `unset` keyword takes no protocol argument: `unset allowaccess` resets the whole field, removing every management protocol from the interface, including the session you may be using to administer the device.
    refs:
      - url: https://docs.fortinet.com/document/fortigate/latest/administration-guide/552515/interfaces
        title: FortiOS interface configuration

  - uid: mondoo-fortios-security-bgp-log-neighbor-changes
    title: Ensure BGP neighbor changes are logged
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-12
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    mql: fortios.router.bgp.neighbors.length == 0 || fortios.router.bgp.logNeighbourChanges == "enable"
    docs:
      desc: |
        This check verifies that BGP neighbor state changes are logged. BGP peering changes can indicate route hijacking attempts, network instability, or unauthorized devices on the network.

        **Why this matters**

        BGP is the routing protocol that determines how traffic flows between networks. Unlogged neighbor changes are a blind spot:

        - Route hijacking attacks involve establishing unauthorized BGP peerings to redirect traffic — without logging, these go undetected.
        - Neighbor flaps (repeated up/down transitions) indicate network instability that can affect security zone isolation.
        - Unauthorized BGP peers on the network can advertise routes that redirect traffic through attacker-controlled paths.
        - Post-incident investigation of routing-related outages requires historical neighbor state change data.
      audit: |
        ### Audit via the FortiGate web interface

        1. Log in to the FortiGate web interface.
        2. Navigate to **Network > BGP**.
        3. Check whether **Log Neighbor Changes** is enabled.

        A passing result shows BGP neighbor change logging enabled, or no BGP neighbors configured. A failing result shows BGP neighbors configured with neighbor change logging disabled.

        ### Audit via FortiOS CLI

        1. Open an SSH or console session to the FortiGate.
        2. Run the following command:

           ```
           get router bgp | grep log-neighbour-changes
           ```

        A passing result reports `log-neighbour-changes` set to `enable`, or no BGP neighbors configured. A failing result reports `disable` with BGP neighbors present.
      remediation:
        - id: console
          desc: |
            **Using the FortiGate web interface**

            1. Navigate to **Network > BGP**
            2. Enable **Log Neighbor Changes**
            3. Click **Apply**
        - id: cli
          desc: |
            **Using the CLI**

            ```
            config router bgp
                set log-neighbour-changes enable
            end
            ```
    refs:
      - url: https://docs.fortinet.com/document/fortigate/latest/administration-guide/247086/bgp
        title: FortiOS BGP configuration

  - uid: mondoo-fortios-security-bgp-graceful-restart
    title: Ensure BGP graceful restart is enabled
    impact: 50
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-bcr-08
      compliance/dora: dora-art-12
      compliance/hipaa: hipaa-security-ss164-308-a-7-ii-a-contingency-plan-data-backup-plan
      compliance/iso-27001-2022: iso-27001-2022-a-8-14
      compliance/nis-2: nis-2-21-2-c
      compliance/nist-csf-1: nist-csf-1-pr-pt-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cp-10
      compliance/nist-sp-800-171: nist-sp-800-171--3-6-1
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc9-1-1
      compliance/vda-isa-5: vda-isa-5-3-1-2
    mql: fortios.router.bgp.neighbors.length == 0 || fortios.router.bgp.gracefulRestart == "enable"
    docs:
      desc: |
        This check verifies that BGP graceful restart is enabled. Without graceful restart, a BGP process restart or HA failover causes full route withdrawal, potentially black-holing traffic and disrupting security zones.

        **Why this matters**

        During a BGP process restart or HA failover without graceful restart:

        - All BGP routes are withdrawn from the routing table, causing traffic to be dropped or rerouted.
        - Security zones that depend on specific routing paths may be bypassed during the convergence period.
        - Traffic may be black-holed for the duration of the BGP session re-establishment (potentially 90+ seconds with default timers).
        - Adjacent routers must fully reconverge, amplifying the disruption across the network.

        Graceful restart allows the forwarding plane to continue using existing routes while the control plane restarts, minimizing traffic disruption.
      audit: |
        ### Audit via the FortiGate web interface

        1. Log in to the FortiGate web interface.
        2. Navigate to **Network > BGP**.
        3. Check whether **Graceful Restart** is enabled.

        A passing result shows BGP graceful restart enabled, or no BGP neighbors configured. A failing result shows BGP neighbors configured with graceful restart disabled.

        ### Audit via FortiOS CLI

        1. Open an SSH or console session to the FortiGate.
        2. Run the following command:

           ```
           get router bgp | grep graceful-restart
           ```

        A passing result reports `graceful-restart` set to `enable`, or no BGP neighbors configured. A failing result reports `disable` with BGP neighbors present.
      remediation:
        - id: console
          desc: |
            **Using the FortiGate web interface**

            **Important**: Graceful restart is negotiated when a BGP session is established, so enabling it resets existing BGP sessions. Apply this change during a maintenance window.

            1. Navigate to **Network > BGP**
            2. Enable **Graceful Restart**
            3. Configure appropriate restart and stalepath timers for your environment
            4. Click **Apply**
        - id: cli
          desc: |
            **Using the CLI**

            **Important**: Enabling graceful restart resets established BGP sessions while the new capability is negotiated. Apply this change during a maintenance window.

            ```
            config router bgp
                set graceful-restart enable
                set graceful-restart-time 120
                set graceful-stalepath-time 360
            end
            ```
    refs:
      - url: https://docs.fortinet.com/document/fortigate/latest/administration-guide/247086/bgp
        title: FortiOS BGP configuration

  - uid: mondoo-fortios-security-ospf-log-neighbor-changes
    title: Ensure OSPF neighbor changes are logged
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-12
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    mql: fortios.router.ospf.areas.length == 0 || fortios.router.ospf.logNeighbourChanges == "enable"
    docs:
      desc: |
        This check verifies that OSPF neighbor state changes are logged. OSPF adjacency changes can indicate rogue devices on the network, link failures, or link-state injection attacks.

        **Why this matters**

        OSPF operates within the internal network and changes to neighbor adjacencies can signal serious issues:

        - A rogue device advertising OSPF routes can redirect internal traffic through an attacker-controlled path.
        - Link-state advertisement (LSA) injection attacks can manipulate the routing topology to intercept or disrupt traffic.
        - Repeated adjacency changes indicate network instability that may affect the reliability of security zone isolation.
        - Without logging, the first indication of a routing attack may be when users report connectivity issues or data is exfiltrated.
      audit: |
        ### Audit via the FortiGate web interface

        1. Log in to the FortiGate web interface.
        2. Navigate to **Network > OSPF**.
        3. Check whether **Log Neighbor Changes** is enabled.

        A passing result shows OSPF neighbor change logging enabled, or no OSPF areas configured. A failing result shows OSPF areas configured with neighbor change logging disabled.

        ### Audit via FortiOS CLI

        1. Open an SSH or console session to the FortiGate.
        2. Run the following command:

           ```
           get router ospf | grep log-neighbour-changes
           ```

        A passing result reports `log-neighbour-changes` set to `enable`, or no OSPF areas configured. A failing result reports `disable` with OSPF areas present.
      remediation:
        - id: console
          desc: |
            **Using the FortiGate web interface**

            1. Navigate to **Network > OSPF**
            2. Enable **Log Neighbor Changes**
            3. Click **Apply**
        - id: cli
          desc: |
            **Using the CLI**

            ```
            config router ospf
                set log-neighbour-changes enable
            end
            ```
    refs:
      - url: https://docs.fortinet.com/document/fortigate/latest/administration-guide/933988/ospf
        title: FortiOS OSPF configuration

  - uid: mondoo-fortios-security-fortiguard-antispam-active
    title: Ensure FortiGuard antispam subscription is active
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-tvm-03
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-8
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-de-cm-4
      compliance/nist-csf-2: nist-csf-2-de-cm-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-2
      compliance/pci-dss-4: pcidss-requirement-6-3-3
      compliance/soc2-2017: soc2-control-cc7-1-1
      compliance/vda-isa-5: vda-isa-5-5-2-1
    mql: fortios.system.fortiGuard.antispamLicense != 0 && fortios.system.fortiGuard.antispamExpiration > time.now.unix
    docs:
      desc: |
        This check verifies that the FortiGuard antispam subscription has not expired. An expired subscription stops receiving spam signature updates, degrading email security.

        **Why this matters**

        FortiGuard antispam protection relies on continuously updated spam signatures and reputation databases:

        - New spam campaigns and phishing attacks emerge daily — stale signatures miss current threats.
        - Spear-phishing emails are a primary initial access vector for targeted attacks.
        - Without current signatures, the antispam engine's detection rate degrades significantly over time.
        - Email-borne malware that would be caught by current signatures passes through to users.
      audit: |
        ### Audit via the FortiGate web interface

        1. Log in to the FortiGate web interface.
        2. Navigate to **System > FortiGuard**.
        3. Review the **AntiSpam** license status and expiration date.

        A passing result shows the antispam license active with a future expiration date. A failing result shows an expired or missing antispam subscription.

        ### Audit via FortiOS CLI

        1. Open an SSH or console session to the FortiGate.
        2. Run the following command:

           ```
           diagnose autoupdate versions
           ```

        A passing result shows the antispam contract with a future expiration date. A failing result shows an expired contract.
      remediation:
        - id: console
          desc: |
            **Using the FortiGate web interface**

            1. Navigate to **System > FortiGuard**
            2. Review the antispam license status and expiration date
            3. If expired, renew the FortiGuard subscription through your Fortinet reseller or the [Fortinet Support Portal](https://support.fortinet.com)
            4. After renewal, verify the license is active under **System > FortiGuard**
        - id: cli
          desc: |
            **Using the CLI**

            Check the current FortiGuard license status:

            ```
            get system fortiguard
            diagnose autoupdate status
            ```

            Once a valid contract is registered, refresh the FortiGuard packages:

            ```
            execute update-now
            ```

            `execute update-now` only pulls fresh packages when the device already has a registered, unexpired contract. It does not renew or register a license, so an expired subscription must be renewed and re-registered with Fortinet first, after which the device picks up the new entitlement and the updates succeed.
    refs:
      - url: https://docs.fortinet.com/document/fortigate/latest/administration-guide/584498/fortiguard
        title: FortiOS FortiGuard configuration
      - url: https://support.fortinet.com
        title: Fortinet support portal

