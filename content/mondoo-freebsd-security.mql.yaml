  - uid: mondoo-freebsd-security-mail-transfer-agent-is-configured-for-local-only-mode
    title: Ensure mail transfer agent is configured for local-only mode
    impact: 85
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ccc-06
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-1
      compliance/nist-csf-2: nist-csf-2-pr-ps-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-6
      compliance/pci-dss-4: pcidss-requirement-2-2-1
      compliance/soc2-2017: soc2-control-cc6-8-1
      compliance/vda-isa-5: vda-isa-5-5-2-1
    filters: |
      package("postfix").installed
    mql: |
      postfix.inetInterfaces.containsOnly(["localhost", "loopback-only", "127.0.0.1", "::1"])
    docs:
      refs:
        - url: https://docs.freebsd.org/en/books/handbook/network-servers/
          title: FreeBSD Handbook - Network Servers
      desc: |
        This check verifies that Postfix, if installed, is configured to only process local mail by setting `inet_interfaces` to `localhost`.

        **Why this matters**

        A mail transfer agent that listens on all network interfaces can be used as an open relay for spam or as an attack vector. Unless the system is intended to be a mail server, the MTA should only accept mail from the local system.
      audit: |
        To verify that Postfix processes only local mail, inspect its configuration:

        ```bash
        postconf inet_interfaces
        ```

        If `inet_interfaces` is set to `localhost` (or `loopback-only`), the MTA processes only local mail and the check passes. If it is set to `all` or a routable address, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Edit `/usr/local/etc/postfix/main.cf` and set:

            ```ini
            inet_interfaces = localhost
            ```

            Then restart Postfix:

            ```bash
            service postfix restart
            ```
        - id: sh
          desc: |
            **Using a Shell Script**

            ```sh
            #!/bin/sh
            set -e

            POSTFIX_CONF="/usr/local/etc/postfix/main.cf"

            if [ ! -f "$POSTFIX_CONF" ]; then
              echo "Postfix configuration not found at $POSTFIX_CONF. Skipping."
              exit 0
            fi

            echo "Configuring Postfix for local-only mode..."
            if grep -q '^inet_interfaces' "$POSTFIX_CONF" 2>/dev/null; then
              sed -i '' 's/^inet_interfaces.*/inet_interfaces = localhost/' "$POSTFIX_CONF"
            else
              echo 'inet_interfaces = localhost' >> "$POSTFIX_CONF"
            fi

            service postfix restart 2>/dev/null || true

            echo "Postfix configured for local-only mode."
            ```
        - id: ansible
          desc: |
            To configure Postfix for local-only mode using Ansible:

            1. Add the following tasks to a playbook targeting the FreeBSD host.
            2. Run the playbook.

            ```yaml
            - name: Restrict Postfix to local interfaces
              ansible.builtin.lineinfile:
                path: /usr/local/etc/postfix/main.cf
                regexp: '^inet_interfaces'
                line: 'inet_interfaces = localhost'
              notify: restart postfix

            handlers:
              - name: restart postfix
                ansible.builtin.service:
                  name: postfix
                  state: restarted
            ```
  - uid: mondoo-freebsd-security-permissions-on-sshd-config-are-configured
    title: Ensure permissions on /etc/ssh/sshd_config are configured
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-2
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-1-1
    mql: |
      file("/etc/ssh/sshd_config") {
        user.name == 'root'
        group.name == 'wheel'
        permissions.group_readable == false
        permissions.group_writeable == false
        permissions.group_executable == false
        permissions.other_readable == false
        permissions.other_writeable == false
        permissions.other_executable == false
      }
    docs:
      refs:
        - url: https://www.openssh.com/cgi-bin/man.cgi?query=sshd_config
          title: OpenSSH sshd_config(5)
      desc: |
        This check verifies that `/etc/ssh/sshd_config` is owned by `root:wheel` and is not readable by group or other users.

        **Why this matters**

        The SSH daemon configuration file controls how remote access to the system is handled. If this file is readable by unauthorized users, they can learn about the system's SSH configuration and potentially identify weaknesses. If writable, an attacker could weaken the SSH configuration.
      audit: |
        To verify the ownership and permissions of the SSH daemon configuration file, run the following command:

        ```bash
        ls -l /etc/ssh/sshd_config
        ```

        If the file is owned by `root:wheel` and is not readable, writable, or executable by group or other, the check passes. If group or other have any access, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Set the correct ownership and permissions:

            ```bash
            chown root:wheel /etc/ssh/sshd_config
            chmod 0600 /etc/ssh/sshd_config
            ```
        - id: sh
          desc: |
            **Using a Shell Script**

            ```sh
            #!/bin/sh
            set -e

            echo "Setting permissions on /etc/ssh/sshd_config..."
            chown root:wheel /etc/ssh/sshd_config
            chmod 0600 /etc/ssh/sshd_config

            echo "Permissions on /etc/ssh/sshd_config configured."
            ```
        - id: ansible
          desc: |
            To set the correct ownership and permissions using Ansible:

            1. Add the following task to a playbook targeting the FreeBSD host.
            2. Run the playbook.

            ```yaml
            - name: Secure sshd_config permissions
              ansible.builtin.file:
                path: /etc/ssh/sshd_config
                owner: root
                group: wheel
                mode: '0600'
            ```
