                path: /etc/ssh/sshd_config
                regexp: '^#?IgnoreRhosts'
                line: 'IgnoreRhosts yes'
              notify: restart sshd

            handlers:
              - name: restart sshd
                ansible.builtin.service:
                  name: sshd
                  state: restarted
            ```
  - uid: mondoo-freebsd-security-ssh-maxauthtries-is-set-to-4-or-less
