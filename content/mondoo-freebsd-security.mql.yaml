            **Using the CLI**

            Edit `/etc/ssh/sshd_config` and set:

            ```
            KexAlgorithms sntrup761x25519-sha512@openssh.com,curve25519-sha256@libssh.org,curve25519-sha256,diffie-hellman-group18-sha512,diffie-hellman-group16-sha512
            ```

