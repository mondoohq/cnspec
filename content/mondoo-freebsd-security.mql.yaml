  - uid: mondoo-freebsd-security-only-strong-ciphers-are-used
    title: Ensure only strong ciphers are used
    impact: 100
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ccc-06
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-1
      compliance/nist-csf-2: nist-csf-2-pr-ps-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-2
      compliance/pci-dss-4: pcidss-requirement-2-2-1
      compliance/soc2-2017: soc2-control-cc7-1-1
      compliance/vda-isa-5: vda-isa-5-5-2-1
    mql: |
      sshd.config.ciphers != empty
      sshd.config.ciphers.containsOnly(["chacha20-poly1305@openssh.com","aes256-gcm@openssh.com","aes128-gcm@openssh.com","aes256-ctr","aes192-ctr","aes128-ctr"])
    docs:
      refs:
        - url: https://www.openssh.com/cgi-bin/man.cgi?query=sshd_config
          title: OpenSSH sshd_config(5)
      desc: |
        This check verifies that the SSH server is configured to use only strong, modern ciphers and that no weak ciphers such as 3DES, Blowfish, CAST128, or CBC-mode AES are permitted.

        **Why this matters**

        Weak ciphers can be exploited to decrypt SSH traffic. CBC-mode ciphers are vulnerable to plaintext recovery attacks, and legacy ciphers like 3DES have insufficient key lengths for modern security requirements. Only authenticated encryption modes (GCM) and strong stream ciphers (CTR, ChaCha20) should be used.
      audit: |
        To verify the SSH ciphers in effect, run the following command:

        ```bash
        sshd -T | grep -i '^ciphers'
        ```

        If only strong ciphers (`chacha20-poly1305`, AES-GCM, and AES-CTR variants) are listed, the check passes. If any weak cipher such as 3DES, Blowfish, CAST128, or a CBC-mode cipher appears, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Edit `/etc/ssh/sshd_config` and set:

            ```
            Ciphers chacha20-poly1305@openssh.com,aes256-gcm@openssh.com,aes128-gcm@openssh.com,aes256-ctr,aes192-ctr,aes128-ctr
            ```

            Then restart the SSH daemon:

            ```bash
            service sshd restart
            ```
        - id: sh
          desc: |
            **Using a Shell Script**

            ```sh
            #!/bin/sh
            set -e

            SSHD_CONFIG="/etc/ssh/sshd_config"
            CIPHERS="chacha20-poly1305@openssh.com,aes256-gcm@openssh.com,aes128-gcm@openssh.com,aes256-ctr,aes192-ctr,aes128-ctr"

            echo "Configuring strong SSH ciphers..."
            if grep -q '^Ciphers' "$SSHD_CONFIG" 2>/dev/null; then
              sed -i '' "s/^Ciphers.*/Ciphers ${CIPHERS}/" "$SSHD_CONFIG"
            else
              echo "Ciphers ${CIPHERS}" >> "$SSHD_CONFIG"
            fi

            service sshd restart

            echo "Strong SSH ciphers configured."
            ```
        - id: ansible
          desc: |
            To restrict SSH to strong ciphers using Ansible:

            1. Add the following task to a playbook targeting the FreeBSD host.
            2. Run the playbook.

            ```yaml
            - name: Configure strong SSH ciphers
              ansible.builtin.lineinfile:
                path: /etc/ssh/sshd_config
                regexp: '^#?Ciphers'
                line: 'Ciphers chacha20-poly1305@openssh.com,aes256-gcm@openssh.com,aes128-gcm@openssh.com,aes256-ctr,aes192-ctr,aes128-ctr'
              notify: restart sshd

            handlers:
              - name: restart sshd
                ansible.builtin.service:
                  name: sshd
                  state: restarted
            ```
