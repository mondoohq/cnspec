            service rpcbind stop
            ```
        - id: sh
          desc: |
            **Using a Shell Script**

            ```sh
            #!/bin/sh
            set -e

            echo "Disabling rpcbind..."
            sysrc rpcbind_enable="NO"
            service rpcbind onestop 2>/dev/null || true

