            - name: Set SSH LoginGraceTime
              ansible.builtin.lineinfile:
                path: /etc/ssh/sshd_config
                regexp: '^#?LoginGraceTime'
                line: 'LoginGraceTime 60'
              notify: restart sshd

            handlers:
              - name: restart sshd
                ansible.builtin.service:
                  name: sshd
                  state: restarted
            ```
  - uid: mondoo-freebsd-security-ssh-loglevel-is-appropriate
