  - uid: mondoo-freebsd-security-ssh-root-login-is-disabled
    title: Ensure SSH root login is disabled
    impact: 100
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-j
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-5
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-7
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-3
    mql: |
      sshd.config.params["PermitRootLogin"].in(["no", "prohibit-password", "without-password"])
    docs:
      refs:
        - url: https://www.openssh.com/cgi-bin/man.cgi?query=sshd_config
          title: OpenSSH sshd_config(5)
      desc: |
        This check verifies that direct root login via SSH is disabled or restricted to key-based authentication only.

        **Why this matters**

        Allowing direct root login over SSH provides attackers with a known username to target in brute force attacks. Disabling root login forces administrators to authenticate as individual users first and then escalate privileges, improving accountability and reducing the attack surface.
      audit: |
        To verify the SSH root login setting in effect, run the following command:

        ```bash
        sshd -T | grep -i '^permitrootlogin'
        ```

        If the value is `no`, `prohibit-password`, or `without-password`, the check passes. If the value is `yes`, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Edit `/etc/ssh/sshd_config` and set:

            ```
            PermitRootLogin no
            ```

            Then restart the SSH daemon:

            ```bash
            service sshd restart
            ```
        - id: sh
          desc: |
            **Using a Shell Script**

            ```sh
            #!/bin/sh
            set -e

            SSHD_CONFIG="/etc/ssh/sshd_config"

            echo "Disabling SSH root login..."
            if grep -q '^PermitRootLogin' "$SSHD_CONFIG" 2>/dev/null; then
              sed -i '' 's/^PermitRootLogin.*/PermitRootLogin no/' "$SSHD_CONFIG"
            elif grep -q '^#PermitRootLogin' "$SSHD_CONFIG" 2>/dev/null; then
              sed -i '' 's/^#PermitRootLogin.*/PermitRootLogin no/' "$SSHD_CONFIG"
            else
              echo 'PermitRootLogin no' >> "$SSHD_CONFIG"
            fi

            service sshd restart

            echo "SSH root login disabled."
            ```
        - id: ansible
          desc: |
            To disable SSH root login using Ansible:

            1. Add the following task to a playbook targeting the FreeBSD host.
            2. Run the playbook.

            ```yaml
            - name: Disable SSH root login
              ansible.builtin.lineinfile:
                path: /etc/ssh/sshd_config
                regexp: '^#?PermitRootLogin'
                line: 'PermitRootLogin no'
              notify: restart sshd

            handlers:
              - name: restart sshd
                ansible.builtin.service:
                  name: sshd
                  state: restarted
            ```
  - uid: mondoo-freebsd-security-ssh-permitemptypasswords-is-disabled
    title: Ensure SSH PermitEmptyPasswords is disabled
    impact: 70
