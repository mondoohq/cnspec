      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-j
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-5
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-7
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-3
    mql: |
      sshd.config.params["DisableForwarding"] == "yes"
    docs:
      refs:
        - url: https://www.openssh.com/cgi-bin/man.cgi?query=sshd_config
          title: OpenSSH sshd_config(5)
      desc: |
        This check verifies that SSH forwarding (X11, TCP, agent, and StreamLocal) is disabled.

        **Why this matters**

        SSH forwarding features can be used to tunnel traffic through the SSH server, potentially bypassing network security controls and firewalls. Disabling forwarding prevents the SSH server from being used as a proxy for unauthorized traffic and data exfiltration.
      audit: |
        To verify the SSH `DisableForwarding` setting in effect, run the following command:

        ```bash
        sshd -T | grep -i '^disableforwarding'
        ```

        If the value is `yes`, the check passes. If the value is `no`, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Edit `/etc/ssh/sshd_config` and set:

            ```
            DisableForwarding yes
            ```

            Then restart the SSH daemon:

            ```bash
            service sshd restart
            ```
        - id: sh
          desc: |
            **Using a Shell Script**

            ```sh
            #!/bin/sh
            set -e

            SSHD_CONFIG="/etc/ssh/sshd_config"

            echo "Enabling SSH DisableForwarding..."
            if grep -q '^DisableForwarding' "$SSHD_CONFIG" 2>/dev/null; then
              sed -i '' 's/^DisableForwarding.*/DisableForwarding yes/' "$SSHD_CONFIG"
            elif grep -q '^#DisableForwarding' "$SSHD_CONFIG" 2>/dev/null; then
              sed -i '' 's/^#DisableForwarding.*/DisableForwarding yes/' "$SSHD_CONFIG"
            else
              echo 'DisableForwarding yes' >> "$SSHD_CONFIG"
            fi

            service sshd restart

            echo "SSH DisableForwarding enabled."
            ```
        - id: ansible
          desc: |
            To enable SSH `DisableForwarding` using Ansible:

            1. Add the following task to a playbook targeting the FreeBSD host.
            2. Run the playbook.

            ```yaml
            - name: Enable SSH DisableForwarding
              ansible.builtin.lineinfile:
                path: /etc/ssh/sshd_config
                regexp: '^#?DisableForwarding'
                line: 'DisableForwarding yes'
              notify: restart sshd

            handlers:
              - name: restart sshd
                ansible.builtin.service:
                  name: sshd
                  state: restarted
            ```
