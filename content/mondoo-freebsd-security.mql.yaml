      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-1
      compliance/nist-csf-2: nist-csf-2-pr-ps-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-6
      compliance/pci-dss-4: pcidss-requirement-2-2-1
      compliance/soc2-2017: soc2-control-cc6-8-1
      compliance/vda-isa-5: vda-isa-5-5-2-1
    mql: |
      file("/etc/inetd.conf").exists == false || file("/etc/inetd.conf").content.lines.none(_ == /^ftp/)
    docs:
      refs:
        - url: https://man.freebsd.org/cgi/man.cgi?query=inetd&sektion=8
          title: FreeBSD inetd(8)
      desc: |
        This check verifies that FTP is not enabled in `/etc/inetd.conf`. FTP transmits authentication credentials and data in cleartext.

        **Why this matters**

        FTP is an insecure protocol that sends usernames, passwords, and file contents in plaintext over the network. Attackers with network access can trivially intercept credentials and data. Use SSH/SFTP or SCP for secure file transfers instead.
      audit: |
        To verify that FTP is not enabled, inspect `/etc/inetd.conf`:

        ```bash
        grep -E '^ftp' /etc/inetd.conf
        ```

        If the file does not exist or no uncommented `ftp` line is returned, the check passes. If an active `ftp` entry is present, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Comment out or remove FTP entries from `/etc/inetd.conf`:

            ```bash
            sed -i '' 's/^ftp/#ftp/' /etc/inetd.conf
            ```

            If `inetd` is not needed at all, disable it:

            ```bash
            sysrc inetd_enable="NO"
            service inetd stop
            ```
        - id: sh
          desc: |
            **Using a Shell Script**

            ```sh
            #!/bin/sh
            set -e

            echo "Disabling FTP server..."
            if [ -f /etc/inetd.conf ]; then
              sed -i '' 's/^ftp/#ftp/' /etc/inetd.conf
              echo "FTP entries commented out in /etc/inetd.conf."
            fi

            echo "FTP server disabled."
            ```
        - id: ansible
          desc: |
            To disable FTP using Ansible:

            1. Add the following task to a playbook targeting the FreeBSD host.
            2. Run the playbook.

            ```yaml
            - name: Comment out FTP entries in inetd.conf
              ansible.builtin.replace:
                path: /etc/inetd.conf
                regexp: '^ftp'
                replace: '#ftp'
            ```
