      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-1
      compliance/nist-csf-2: nist-csf-2-pr-ps-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-6
      compliance/pci-dss-4: pcidss-requirement-2-2-1
      compliance/soc2-2017: soc2-control-cc6-8-1
      compliance/vda-isa-5: vda-isa-5-5-2-1
    mql: |
      file("/etc/inetd.conf").exists == false || file("/etc/inetd.conf").content.lines.none(_ == /^tftp/)
    docs:
      refs:
        - url: https://man.freebsd.org/cgi/man.cgi?query=inetd&sektion=8
          title: FreeBSD inetd(8)
      desc: |
        This check verifies that TFTP is not enabled in `/etc/inetd.conf`. TFTP has no built-in encryption or authentication.

        **Why this matters**

        TFTP is a protocol designed for simplicity with no authentication or encryption. Any user on the network can read or write files via TFTP. Unless specifically required for network booting infrastructure, TFTP should be disabled.
      audit: |
        To verify that TFTP is not enabled, inspect `/etc/inetd.conf`:

        ```bash
        grep -E '^tftp' /etc/inetd.conf
        ```

        If the file does not exist or no uncommented `tftp` line is returned, the check passes. If an active `tftp` entry is present, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Comment out or remove TFTP entries from `/etc/inetd.conf`:

            ```bash
            sed -i '' 's/^tftp/#tftp/' /etc/inetd.conf
            ```
        - id: sh
          desc: |
            **Using a Shell Script**

            ```sh
            #!/bin/sh
            set -e

            echo "Disabling TFTP server..."
            if [ -f /etc/inetd.conf ]; then
              sed -i '' 's/^tftp/#tftp/' /etc/inetd.conf
              echo "TFTP entries commented out in /etc/inetd.conf."
            fi

            echo "TFTP server disabled."
            ```
        - id: ansible
          desc: |
            To disable TFTP using Ansible:

            1. Add the following task to a playbook targeting the FreeBSD host.
            2. Run the playbook.

            ```yaml
            - name: Comment out TFTP entries in inetd.conf
              ansible.builtin.replace:
                path: /etc/inetd.conf
                regexp: '^tftp'
                replace: '#tftp'
            ```
