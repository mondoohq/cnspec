  - uid: mondoo-gcp-security-dataflow-job-no-public-ips
    title: Ensure Dataflow jobs run on workers with no public IPs
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/pci-dss-4: pcidss-requirement-1-4-1
      compliance/soc2-2017: soc2-control-cc6-1-5
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-gcp-security-dataflow-job-no-public-ips-gcp
        tags:
          mondoo.com/filter-title: GCP Dataflow Job
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-dataflow-job-no-public-ips-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-dataflow-job-no-public-ips-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-dataflow-job-no-public-ips-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that every running, pending, or queued Dataflow job uses worker pools configured with private IP addresses (`WORKER_IP_PRIVATE`) rather than public IPs. Workers with public IPs bypass the egress controls implemented in the customer VPC and can initiate outbound connections to arbitrary internet destinations directly.

        **Why this matters**

        - **Uncontrolled data exfiltration path:** Dataflow workers process potentially sensitive data from storage, BigQuery, or Pub/Sub; public IPs allow worker code or a compromised dependency to exfiltrate data to external endpoints without passing through VPC firewall rules.
        - **Compliance network boundary violations:** Frameworks that require all data-plane traffic to remain on private networks are violated when worker traffic egresses through Google-managed external IPs rather than through the monitored customer VPC.
        - **VPC controls rendered ineffective:** Cloud NAT logging, firewall allow-lists, and egress rules configured in the consumer VPC only apply to traffic that routes through the VPC; workers with public IPs bypass all of these controls.
        - **Lateral movement from compromised dependencies:** Build or runtime dependencies that introduce malicious code have unrestricted outbound access for command and control when workers carry public IPs.

        **Risk mitigation**

        - **Submit all jobs with private workers:** Use `--disable-public-ips` (gcloud) or `usePublicIps=false` (SDK/templates) and ensure the worker subnetwork has Private Google Access enabled so workers can reach Google APIs.
        - **Enable Cloud NAT for controlled internet access:** If pipelines require external dependencies, route that traffic through a Cloud NAT gateway with logging rather than through worker public IPs.
      audit: |
        ### Audit via Console

        1. Go to **Dataflow > Jobs** in the Google Cloud Console.
        2. Select a running or pending job.
        3. Click the **Job info** tab and review the **Worker IP configuration** field under the job details.

        A passing job shows **Worker IP configuration: Private** or lists no external IP in its worker settings. A failing job shows **Worker IP configuration: Public** or does not display a private-only configuration.

        ### Audit via CLI

        1. List all running and pending Dataflow jobs:

        ```bash
        gcloud dataflow jobs list \
          --filter='state=JOB_STATE_RUNNING OR state=JOB_STATE_PENDING' \
          --format='value(id,name)'
        ```

        2. For each job, describe the environment to check the IP configuration:

        ```bash
        gcloud dataflow jobs describe JOB_ID \
          --region=REGION \
          --format='json(environment.workerPools)'
        ```

        A passing job returns `"ipConfiguration": "WORKER_IP_PRIVATE"` for all worker pools. A failing job returns `"ipConfiguration": "WORKER_IP_PUBLIC"` or shows no `ipConfiguration` field.
      remediation:
        - id: terraform
          desc: |
            For Dataflow jobs declared in HCL, set `ip_configuration` to `WORKER_IP_PRIVATE` and pin the worker subnetwork. The same field exists on `google_dataflow_flex_template_job`:

            ```hcl
            resource "google_dataflow_job" "pipeline" {
              name              = "stream-processor"
              template_gcs_path = "gs://dataflow-templates/latest/Stream"
              temp_gcs_location = "gs://my-bucket/tmp"
              region            = "us-central1"
              network           = google_compute_network.workers.name
              subnetwork        = google_compute_subnetwork.workers.self_link
              ip_configuration  = "WORKER_IP_PRIVATE"
            }
            ```
        - id: console
          desc: |
            Configure private workers when launching a Dataflow template from the console:

            1. Go to **Dataflow > Jobs** in the Google Cloud Console.
            2. Select **Create job from template**.
            3. Expand **Optional parameters** and clear **Use public IPs**.
            4. Pick a subnetwork in the customer VPC that has Private Google Access enabled.
            5. Submit the job.

            Cancel any running job that uses public workers and resubmit it with private workers; existing jobs cannot switch IP configuration in place.
        - id: cli
          desc: |
            Submit Dataflow jobs with private workers:

            ```bash
            gcloud dataflow jobs run JOB_NAME \
              --gcs-location=gs://path/to/template \
              --region=REGION \
              --network=NETWORK \
              --subnetwork=regions/REGION/subnetworks/SUBNET \
              --disable-public-ips
            ```

            For Beam Python pipelines pass `--no_use_public_ips` and `--subnetwork`.
    refs:
      - url: https://cloud.google.com/dataflow/docs/guides/routes-firewall#turn_off_external_ip_address
        title: Dataflow - Turn off external IP addresses
  - uid: mondoo-gcp-security-dataflow-job-no-public-ips-gcp
    filters: asset.platform == 'gcp'
    mql: |
      gcp.project.dataflowService.jobs.where(
        currentState == "JOB_STATE_RUNNING" || currentState == "JOB_STATE_PENDING" || currentState == "JOB_STATE_QUEUED"
      ).all(
        environment['workerPools'] != null &&
        environment['workerPools'].all(
          _['ipConfiguration'] == "WORKER_IP_PRIVATE"
        )
      )
  - uid: mondoo-gcp-security-dataflow-job-no-public-ips-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_dataflow_job') ||
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_dataflow_flex_template_job')
    mql: |
      terraform.resources('google_dataflow_job').all(
        arguments['ip_configuration'] == "WORKER_IP_PRIVATE"
      )
      terraform.resources('google_dataflow_flex_template_job').all(
        arguments['ip_configuration'] == "WORKER_IP_PRIVATE"
      )
  - uid: mondoo-gcp-security-dataflow-job-no-public-ips-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_dataflow_job') ||
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_dataflow_flex_template_job')
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_dataflow_job').all(
        change.after['ip_configuration'] == "WORKER_IP_PRIVATE"
      )
      terraform.plan.resourceChanges.where(type == 'google_dataflow_flex_template_job').all(
        change.after['ip_configuration'] == "WORKER_IP_PRIVATE"
      )
