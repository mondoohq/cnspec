  - uid: mondoo-gcp-security-compute-instances-ip-forwarding-disabled
    title: Ensure IP forwarding is not enabled on compute instances
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-gcp-security-compute-instances-ip-forwarding-disabled-gcp
        tags:
          mondoo.com/filter-title: GCP Compute Instance
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-compute-instances-ip-forwarding-disabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-compute-instances-ip-forwarding-disabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-compute-instances-ip-forwarding-disabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that IP forwarding is disabled on Compute Engine instances that do not serve as explicit network gateways, NAT devices, or routers. By default, IP forwarding is disabled on GCE instances; enabling it is a deliberate configuration that should be restricted to network appliance roles.

        **Why this matters**

        - **Traffic interception:** An instance with IP forwarding enabled can accept packets destined for other hosts, allowing a compromised workload to intercept, inspect, or modify traffic flowing through the VPC.
        - **Man-in-the-middle positioning:** IP forwarding enables a compromised instance to impersonate other hosts on the network, making it possible to redirect connections and steal credentials or session data from other workloads.
        - **Lateral movement:** Attackers who gain control of an IP-forwarding instance can use it to route traffic into otherwise unreachable network segments, extending their reach within the environment.
        - **Least-function principle:** Enabling a capability that is not required for the instance's stated workload violates the principle of least functionality and increases the potential damage from any future compromise.

        **Risk mitigation**

        - **Disable at instance creation:** Set can_ip_forward to false (the default) for all instances that do not serve as routers or NAT gateways, since this setting cannot be changed after creation.
        - **Restrict by design:** Limit IP-forwarding-enabled instances to a dedicated network appliance tier and document the business justification for each.
        - **Replace non-compliant instances:** For existing instances with IP forwarding enabled unnecessarily, create replacement instances with it disabled and migrate workloads before decommissioning the originals.
      audit: |
        ### Audit via Console

        1. In the Google Cloud Console, navigate to **Compute Engine > VM instances**.
        2. Click the instance name to open its details.
        3. On the **Details** tab, scroll to the **Networking** section and find the **IP forwarding** field.

        A passing instance shows **IP forwarding: Off**. A failing instance shows **IP forwarding: On**.

        ### Audit via CLI

        1. Check the IP forwarding setting for an instance:

        ```bash
        gcloud compute instances describe INSTANCE_NAME \
          --zone=ZONE \
          --format='get(canIpForward)'
        ```

        A passing instance returns `False` or no output (the field defaults to disabled). A failing instance returns `True`.
      remediation:
        - id: terraform
          desc: |
            To ensure IP forwarding is not enabled on compute instances in Terraform:

            ```hcl
            resource "google_compute_instance" "example" {
              name         = "example-instance"
              machine_type = "e2-medium"
              zone         = "us-central1-a"

              # Ensure IP forwarding is disabled (default)
              can_ip_forward = false

              boot_disk {
                initialize_params {
                  image = "debian-cloud/debian-12"
                }
              }

              network_interface {
                network = "default"
              }
            }
            ```
        - id: console
          desc: |
            To ensure IP forwarding is not enabled on compute instances using the Google Cloud Console, IP forwarding can only be set at instance creation time and cannot be changed on a running instance. To disable it:

            1. Note the configuration of the existing instance.
            2. Create a new instance with **IP forwarding** set to **Off** in the **Networking** section.
            3. Migrate workloads from the old instance to the new one.
            4. Delete the old instance.
        - id: cli
          desc: |
            To ensure IP forwarding is not enabled on compute instances using the Google Cloud CLI, IP forwarding is set at creation time. To verify an instance's setting:

            ```bash
            gcloud compute instances describe INSTANCE_NAME --zone=ZONE --format='get(canIpForward)'
            ```

            If it returns `True`, the instance has IP forwarding enabled. To remediate, create a replacement instance without the `--can-ip-forward` flag.
    refs:
      - url: https://cloud.google.com/vpc/docs/using-routes#canipforward
        title: Google Cloud VPC - IP Forwarding
      - url: https://cloud.google.com/compute/docs/instances/create-start-instance
        title: Google Compute Engine Instance Documentation
  - uid: mondoo-gcp-security-compute-instances-ip-forwarding-disabled-gcp
    filters: asset.platform == 'gcp-compute-instance'
    mql: |
      gcp.compute.instance.canIpForward == false
  - uid: mondoo-gcp-security-compute-instances-ip-forwarding-disabled-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' &&
        terraform.resources('google_compute_instance') != empty
    mql: |
      terraform.resources('google_compute_instance').all(
        arguments.can_ip_forward != true
      )
  - uid: mondoo-gcp-security-compute-instances-ip-forwarding-disabled-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_compute_instance')
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_compute_instance').all(
        change.after.can_ip_forward != true
      )
  - uid: mondoo-gcp-security-compute-instances-ip-forwarding-disabled-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'google_compute_instance')
    mql: |
      terraform.state.resources.where(type == 'google_compute_instance').all(
        values.can_ip_forward != true
      )
  - uid: mondoo-gcp-security-compute-instances-serial-port-disabled
    title: Ensure interactive serial port access is disabled on compute instances
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-c-1-integrity
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-pt-3
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-7
      compliance/pci-dss-4: pcidss-requirement-2-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-gcp-security-compute-instances-serial-port-disabled-gcp
        tags:
          mondoo.com/filter-title: GCP Compute Instance
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-compute-instances-serial-port-disabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-compute-instances-serial-port-disabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-compute-instances-serial-port-disabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that the interactive serial console is disabled on Compute Engine instances. By default, GCP does not enable serial console access, but when enabled via the serial-port-enable metadata key, the serial console becomes accessible from any IP address on the internet, bypassing VPC firewall rules entirely.

        **Why this matters**

        - **Firewall bypass:** Serial console connections are not subject to VPC network firewall rules, meaning an attacker with valid credentials can reach the console even when all normal network paths to the instance are blocked.
        - **Reduced audit visibility:** Unlike SSH sessions, serial console interactions are not automatically recorded by the OS audit subsystem, making it difficult to reconstruct what actions were taken during a console session.
        - **Credential exposure surface:** The serial console accepts OS-level credentials and can be used to access or modify the instance outside of normal monitoring channels, increasing the value of stolen credentials.
        - **Vendor default is safe:** Serial port access is disabled by default; any instance where it is enabled represents a deliberate or accidental deviation that should be reviewed.

        **Risk mitigation**

        - **Remove serial-port-enable metadata:** Set the serial-port-enable metadata key to false or remove it entirely on all instances where serial console access is not actively required for troubleshooting.
        - **Enforce via organization policy:** Apply the compute.disableSerialPortAccess organization policy constraint to prevent serial port enablement across all projects and instances in the organization.
        - **Use structured access for troubleshooting:** Replace ad hoc serial console use with OS Login, IAP tunneling, or structured breakglass procedures that provide auditability.
      audit: |
        ### Audit via Console

        1. In the Google Cloud Console, navigate to **Compute Engine > VM instances**.
        2. Click the instance name to open its details.
        3. On the **Details** tab, scroll to **Remote access** and check the **Serial port connections** field.

        A passing instance shows serial port connections as **Disabled**. A failing instance shows serial port connections as **Enabled**.

        ### Audit via CLI

        1. Retrieve the metadata for an instance and check the `serial-port-enable` key:

        ```bash
        gcloud compute instances describe INSTANCE_NAME \
          --zone=ZONE \
          --format='get(metadata.items)'
        ```

        A passing instance returns metadata where `serial-port-enable` is absent, set to `false`, or set to `0`. A failing instance returns `serial-port-enable=true` or `serial-port-enable=1`.
      remediation:
        - id: terraform
          desc: |
            To ensure interactive serial port access is disabled on compute instances in Terraform:

            ```hcl
            resource "google_compute_instance" "example" {
              name         = "example-instance"
              machine_type = "e2-medium"
              zone         = "us-central1-a"

              metadata = {
                serial-port-enable = "false"
              }

              boot_disk {
                initialize_params {
                  image = "debian-cloud/debian-12"
                }
              }

              network_interface {
                network = "default"
              }
            }
            ```
        - id: console
          desc: |
            To ensure interactive serial port access is disabled on compute instances using the Google Cloud Console:

            1. Go to the **VM instances** page: [https://console.cloud.google.com/compute/instances](https://console.cloud.google.com/compute/instances).
            2. Select the instance name.
            3. Select **Edit**.
            4. Under **Remote access**, uncheck **Enable connecting to serial ports**.
            5. Select **Save**.

            **Prevention:**
            Enforce the `constraints/compute.disableSerialPortAccess` Organization Policy to prevent serial port access across your organization: [https://console.cloud.google.com/iam-admin/orgpolicies/compute-disableSerialPortAccess](https://console.cloud.google.com/iam-admin/orgpolicies/compute-disableSerialPortAccess).
        - id: cli
          desc: |
            To ensure interactive serial port access is disabled on compute instances using the Google Cloud CLI, remove or set the serial port metadata to false:

            ```bash
            gcloud compute instances add-metadata INSTANCE_NAME --zone=ZONE --metadata=serial-port-enable=false
            ```
    refs:
      - url: https://cloud.google.com/compute/docs/troubleshooting/troubleshooting-using-serial-console
        title: Google Cloud - Troubleshooting using the serial console
      - url: https://cloud.google.com/compute/docs/instances/interacting-with-serial-console
        title: Google Cloud - Interacting with the serial console
  - uid: mondoo-gcp-security-compute-instances-serial-port-disabled-gcp
    filters: asset.platform == 'gcp-compute-instance'
    mql: |
      gcp.compute.instance.metadata['serial-port-enable'] != "true" && gcp.compute.instance.metadata['serial-port-enable'] != "1"
  - uid: mondoo-gcp-security-compute-instances-serial-port-disabled-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' &&
        terraform.resources('google_compute_instance') != empty
    mql: |
      terraform.resources('google_compute_instance').all(
        arguments['metadata'] == empty || arguments['metadata']['serial-port-enable'] != "true"
      )
      terraform.resources('google_compute_instance').all(
        arguments['metadata'] == empty || arguments['metadata']['serial-port-enable'] != "1"
      )
  - uid: mondoo-gcp-security-compute-instances-serial-port-disabled-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_compute_instance')
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_compute_instance').all(
        change.after['metadata'] == empty ||
        change.after['metadata']['serial-port-enable'] != "true"
      )
      terraform.plan.resourceChanges.where(type == 'google_compute_instance').all(
        change.after['metadata'] == empty ||
        change.after['metadata']['serial-port-enable'] != "1"
      )
  - uid: mondoo-gcp-security-compute-instances-serial-port-disabled-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'google_compute_instance')
    mql: |
      terraform.state.resources.where(type == 'google_compute_instance').all(
        values['metadata'] == empty ||
        values['metadata']['serial-port-enable'] != "true"
      )
      terraform.state.resources.where(type == 'google_compute_instance').all(
        values['metadata'] == empty ||
        values['metadata']['serial-port-enable'] != "1"
      )
  - uid: mondoo-gcp-security-compute-disk-cmek-encryption
    title: Ensure Compute Engine disks are encrypted with CMEK
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-gcp-security-compute-disk-cmek-encryption-gcp
        tags:
          mondoo.com/filter-title: GCP
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-compute-disk-cmek-encryption-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-compute-disk-cmek-encryption-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-compute-disk-cmek-encryption-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Compute Engine persistent disks are encrypted using customer-managed encryption keys (CMEK) through Cloud KMS rather than the default Google-managed encryption keys. By default, GCP encrypts all disk data at rest with Google-managed keys, which provides baseline protection but leaves the key lifecycle entirely under Google's control.

        **Why this matters**

        - **Key lifecycle ownership:** CMEK grants the organization independent control over encryption key rotation, suspension, and destruction, ensuring that data can be rendered inaccessible without relying on Google to revoke access.
        - **Crypto shredding capability:** Destroying the Cloud KMS key used to encrypt a disk makes the disk data permanently irrecoverable, satisfying regulatory requirements for verifiable data destruction when a disk is decommissioned.
        - **Separation of duties:** Decoupling key custody from the cloud provider reduces the risk that a provider-side incident could expose disk data without the customer's knowledge or participation.
        - **Audit trail for key usage:** Cloud KMS logs every encrypt and decrypt operation against a CMEK key, providing a comprehensive record of disk-level data access for compliance and forensic investigations.

        **Risk mitigation**

        - **Provision CMEK keys before disk creation:** Create Cloud KMS key rings and keys in advance, since CMEK must be configured at disk creation time and cannot be applied to existing disks.
        - **Restrict KMS key access:** Limit IAM bindings on the Cloud KMS keys used for disk encryption to the compute service account and designated key administrators only.
        - **Migrate existing disks:** For disks that currently use Google-managed encryption, create CMEK-encrypted replacement disks and copy data before decommissioning the originals.
      audit: |
        ### Audit via Console

        1. In the Google Cloud Console, navigate to **Compute Engine > Disks**.
        2. Click each disk name to open its details.
        3. On the **Details** tab, review the **Encryption** field.

        A passing disk shows **Encryption: Customer-managed encryption key** with a Cloud KMS key resource path. A failing disk shows **Encryption: Google-managed encryption key**.

        ### Audit via CLI

        1. List all disks and their encryption key information:

        ```bash
        gcloud compute disks list \
          --format="table(name,zone,diskEncryptionKey.kmsKeyName)"
        ```

        A passing disk returns a non-empty `kmsKeyName` value in the `diskEncryptionKey` column. A failing disk returns an empty or absent `kmsKeyName`.
      remediation:
        - id: terraform
          desc: |
            To ensure Compute Engine disks are encrypted with CMEK in Terraform:

            ```hcl
            resource "google_compute_disk" "example" {
              name = "example-disk"
              type = "pd-ssd"
              zone = "us-central1-a"
              size = 50

              disk_encryption_key {
                kms_key_self_link = google_kms_crypto_key.disk_key.id
              }
            }
            ```
        - id: console
          desc: |
            To ensure Compute Engine disks are encrypted with CMEK using the Google Cloud Console:

            1. Go to the **Disks** page: [https://console.cloud.google.com/compute/disks](https://console.cloud.google.com/compute/disks).
            2. Select **Create disk**.
            3. Under **Encryption**, select **Customer-managed encryption key**.
            4. Select or create a Cloud KMS key.
            5. Complete the disk creation.

            Note: Existing disks cannot be converted to CMEK. Create a new CMEK-encrypted disk and copy data from the existing disk.
        - id: cli
          desc: |
            To ensure Compute Engine disks are encrypted with CMEK using the Google Cloud CLI:

            ```bash
            gcloud compute disks create DISK_NAME \
              --zone=ZONE \
              --kms-key=projects/PROJECT/locations/LOCATION/keyRings/RING/cryptoKeys/KEY
            ```
    refs:
      - url: https://cloud.google.com/compute/docs/disks/customer-managed-encryption
        title: Protecting resources with Cloud KMS keys
  - uid: mondoo-gcp-security-compute-disk-cmek-encryption-gcp
