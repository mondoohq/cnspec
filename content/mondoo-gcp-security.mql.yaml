          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-cloud-storage-bucket-not-anonymously-publicly-accessible-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-storage-bucket-not-anonymously-publicly-accessible-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-storage-bucket-not-anonymously-publicly-accessible-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Cloud Storage buckets do not have IAM bindings or ACLs that grant access to `allUsers` or `allAuthenticatedUsers`. These special principals represent unauthenticated access from the public internet and authenticated access by any Google account holder respectively, which can expose data to a far wider audience than intended.

        **Why this matters**

        - **Unintended public data exposure:** A single IAM binding or object ACL granting `allUsers` access makes every object in the bucket readable by anyone on the internet without any credentials.
        - **Non-attributable access:** Reads by `allUsers` or `allAuthenticatedUsers` are not tied to a specific identity, making it impossible to determine who accessed sensitive data after the fact.
        - **Data compliance violations:** Regulatory frameworks governing personal data, financial records, and health information require access to be restricted to identified, authorized principals.
        - **Automated mass exfiltration:** Publicly accessible buckets are routinely discovered and scraped by automated scanners within minutes of misconfiguration.

        **Risk mitigation**

        - **Audit IAM policies and ACLs:** Regularly scan all buckets for bindings containing `allUsers` or `allAuthenticatedUsers` and remove them immediately.
        - **Enable Public Access Prevention:** Set `publicAccessPrevention` to `enforced` on all buckets to block any future configuration that would introduce public access, regardless of IAM changes.
        - **Apply organization-level constraints:** Use the `constraints/storage.publicAccessPrevention` org policy to enforce public access prevention across all projects by default.
      audit: |
        ### Audit via Console

        1. In the Google Cloud console, go to the **Cloud Storage** > **Buckets** page.
        2. For each bucket, look for the **Public access** column. A value of **Not public** indicates no public access is granted.
        3. To inspect a specific bucket, select its name, go to the **Permissions** tab, and review the list of principals.
        4. Confirm no entries for `allUsers` or `allAuthenticatedUsers` appear in the IAM bindings.

        A passing bucket shows **Not public** in the Public access column and no `allUsers` or `allAuthenticatedUsers` principals in its IAM policy. A failing bucket shows **Public to internet** or lists `allUsers` or `allAuthenticatedUsers` as principals.

        ### Audit via CLI

        1. List the IAM policy for a specific bucket:

        ```bash
        gcloud storage buckets get-iam-policy gs://BUCKET_NAME
        ```

        2. Check all buckets in the project for public members:

        ```bash
        gcloud storage buckets list --format="get(name)" | while read bucket; do
          echo "=== $bucket ==="
          gcloud storage buckets get-iam-policy "gs://$bucket" --format="json" | grep -E 'allUsers|allAuthenticatedUsers' || echo "No public access"
        done
        ```

        A passing bucket returns no bindings containing `allUsers` or `allAuthenticatedUsers`. A failing bucket returns one or more IAM bindings with `allUsers` or `allAuthenticatedUsers` as members.
      remediation:
        - id: terraform
          desc: |
            To ensure Cloud Storage buckets are not anonymously or publicly accessible in Terraform, update public access configuration using Terraform, ensure `allUsers` and `allAuthenticatedUsers` are not set:

            ```hcl
            resource "google_storage_bucket_iam_binding" "binding" {
              bucket = google_storage_bucket.default.name
              role   = "roles/storage.admin"
              members = [
                "user:jane@example.com",
              ]
            }
            ```

            ```hcl
            resource "google_storage_bucket_iam_member" "member" {
              bucket = google_storage_bucket.default.name
              role   = "roles/storage.admin"
              member = "user:jane@example.com"
            }
            ```
        - id: console
          desc: |
            To ensure Cloud Storage buckets are not anonymously or publicly accessible using the Google Cloud Console:

            1. In the Google Cloud console, go to the **Cloud Storage Bucket** page.
            2. For the bucket you want to enforce public access prevention on, select the more actions menu.
            3. Select **Edit access** from the drop-down menu.
            4. In the Public access card, select **Prevent public access** to enforce public access prevention.
            5. Select **Confirm**.
        - id: cli
          desc: |
            To ensure Cloud Storage buckets are not anonymously or publicly accessible using the Google Cloud CLI, update public access configuration using the `gcloud` cli, ensure `allUsers` and `allAuthenticatedUsers` are not set by removing them:

            ```bash
            # Example: Remove allUsers binding for objectViewer role
            gcloud storage buckets remove-iam-policy-binding gs://BUCKET_NAME --member=allUsers --role=roles/storage.objectViewer

            # Example: Remove allAuthenticatedUsers binding for objectViewer role
            gcloud storage buckets remove-iam-policy-binding gs://BUCKET_NAME --member=allAuthenticatedUsers --role=roles/storage.objectViewer
            ```
    refs:
      - url: https://cloud.google.com/storage/docs/best-practices#security
        title: Cloud Storage Security Best Practices
  - uid: mondoo-gcp-security-cloud-storage-bucket-not-anonymously-publicly-accessible-gcp
    filters: asset.platform == 'gcp-storage-bucket'
    mql: |
      gcp.storage.bucket.iamPolicy.all(members.none(_ == 'allUsers'))
      gcp.storage.bucket.iamPolicy.all(members.none(_ == 'allAuthenticatedUsers'))
  - uid: mondoo-gcp-security-cloud-storage-bucket-not-anonymously-publicly-accessible-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_storage_bucket_iam_binding' || nameLabel == 'google_storage_bucket_iam_member')
    mql: |
      terraform.resources('google_storage_bucket_iam_binding').all(
        arguments.members.none(member: member == 'allUsers' || member == 'allAuthenticatedUsers')
      )
      terraform.resources('google_storage_bucket_iam_member').all(
        arguments.member != 'allUsers' && arguments.member != 'allAuthenticatedUsers'
      )
  - uid: mondoo-gcp-security-cloud-storage-bucket-not-anonymously-publicly-accessible-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_storage_bucket_iam_binding' || type == 'google_storage_bucket_iam_member')
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_storage_bucket_iam_binding').all(
        change.after.members.none(_ == 'allUsers' || _ == 'allAuthenticatedUsers')
      )
      terraform.plan.resourceChanges.where(type == 'google_storage_bucket_iam_member').all(
        change.after.member != 'allUsers' && change.after.member != 'allAuthenticatedUsers'
      )
  - uid: mondoo-gcp-security-cloud-storage-bucket-not-anonymously-publicly-accessible-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'google_storage_bucket_iam_binding' || type == 'google_storage_bucket_iam_member')
    mql: |
      terraform.state.resources.where(type == 'google_storage_bucket_iam_binding').all(
        values.members.none(_ == 'allUsers' || _ == 'allAuthenticatedUsers')
      )
      terraform.state.resources.where(type == 'google_storage_bucket_iam_member').all(
        values.member != 'allUsers' && values.member != 'allAuthenticatedUsers'
      )
  - uid: mondoo-gcp-security-cloud-storage-buckets-have-uniform-bucket-level-access-enabled
    title: Ensure that Cloud Storage buckets have uniform bucket-level access enabled
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-16
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-3-3
      compliance/vda-isa-5: vda-isa-5-4-2-1
    variants:
      - uid: mondoo-gcp-security-cloud-storage-buckets-have-uniform-bucket-level-access-enabled-gcp
        tags:
          mondoo.com/filter-title: GCP Cloud Storage Bucket
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-cloud-storage-buckets-have-uniform-bucket-level-access-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-storage-buckets-have-uniform-bucket-level-access-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-storage-buckets-have-uniform-bucket-level-access-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Cloud Storage buckets are configured with uniform bucket-level access enabled, which disables object-level ACLs and makes IAM the sole mechanism for controlling access. By default, Cloud Storage supports both IAM policies and per-object ACLs simultaneously, and either system can independently grant access to bucket contents.

        **Why this matters**

        - **Shadow permissions via object ACLs:** When both IAM and ACLs are active, a user needs permission from only one system, so an object ACL can grant access that an IAM deny policy is intended to block.
        - **Inconsistent visibility:** IAM policies are visible in a single place and auditable centrally, while per-object ACLs must be inspected individually, making comprehensive access reviews impractical at scale.
        - **Policy bypass risk:** An attacker or misconfigured automation that can set object ACLs can grant themselves or others access to specific objects even if bucket-level IAM is correctly restricted.
        - **Simplified governance:** Uniform access means IAM is the single authoritative source for who can access what, enabling consistent enforcement of least privilege across all objects.

        **Risk mitigation**

        - **Enable uniform bucket-level access:** Set `uniform_bucket_level_access = true` on all buckets so that IAM is the only access control mechanism, eliminating the ACL-based bypass path.
        - **Review existing ACLs before enabling:** Audit current object-level ACLs and convert any legitimate access grants to equivalent IAM bindings before activating uniform access.
        - **Enforce via org policy:** Use the `constraints/storage.uniformBucketLevelAccess` organization policy to require uniform access on all newly created buckets across the organization.
      audit: |
        ### Audit via Console

        1. In the Google Cloud console, go to the **Cloud Storage** > **Buckets** page.
        2. For each bucket, select its name to open the details page.
        3. Select the **Permissions** tab.
        4. Under **Access control**, confirm the model shows **Uniform** rather than **Fine-grained**.

        A passing bucket shows **Uniform** as the access control model. A failing bucket shows **Fine-grained** access control.

        ### Audit via CLI

        1. Describe a specific bucket and check the uniform bucket-level access setting:

        ```bash
        gcloud storage buckets describe gs://BUCKET_NAME \
          --format="get(iamConfiguration.uniformBucketLevelAccess.enabled)"
        ```

        2. List all buckets and their uniform access setting:

        ```bash
        gcloud storage buckets list \
          --format="table(name,iamConfiguration.uniformBucketLevelAccess.enabled)"
        ```

        A passing bucket returns `True` for `uniformBucketLevelAccess.enabled`. A failing bucket returns `False` or an empty value.
      remediation:
        - id: terraform
          desc: |
            To ensure that Cloud Storage buckets have uniform bucket-level access enabled in Terraform:

            ```hcl
            resource "google_storage_bucket" "example" {
              name                        = "test-bucket"
              # Enable uniform bucket-level access
              uniform_bucket_level_access = true
            }
            ```
        - id: console
          desc: |
            To ensure that Cloud Storage buckets have uniform bucket-level access enabled using the Google Cloud Console:

            1. In the Google Cloud console, go to the **Cloud Storage Buckets** page.
            2. In the list of buckets, select the name of the desired bucket.
            3. Select the **Permissions** tab near the top of the page.
            4. In the **Access control** model section, select **Uniform**.
            5. In the pop-up menu that appears, select **Save**.
        - id: cli
          desc: |
            To ensure that Cloud Storage buckets have uniform bucket-level access enabled using the Google Cloud CLI:

            ```bash
            # Enable uniform bucket-level access
            gcloud storage buckets update gs://BUCKET_NAME --uniform-bucket-level-access

            # Alternatively using gsutil
            gsutil uniformbucketlevelaccess set on gs://BUCKET_NAME
            ```
    refs:
      - url: https://cloud.google.com/storage/docs/best-practices#security
        title: Cloud Storage Security Best Practices
  - uid: mondoo-gcp-security-cloud-storage-buckets-have-uniform-bucket-level-access-enabled-gcp
    filters: asset.platform == 'gcp-storage-bucket'
    mql: gcp.storage.bucket.iamConfiguration.uniformBucketLevelAccess.enabled == true
  - uid: mondoo-gcp-security-cloud-storage-buckets-have-uniform-bucket-level-access-enabled-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' &&
        terraform.resources.contains(nameLabel == 'google_storage_bucket')
    mql: |
      terraform.resources('google_storage_bucket').all(
        arguments.uniform_bucket_level_access == true
      )
  - uid: mondoo-gcp-security-cloud-storage-buckets-have-uniform-bucket-level-access-enabled-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_storage_bucket')
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_storage_bucket').all(
        change.after.uniform_bucket_level_access == true
      )
