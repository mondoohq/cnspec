  - uid: mondoo-gcp-security-dataflow-job-cmek-encryption
    title: Ensure Cloud Dataflow jobs are encrypted with CMEK
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-gcp-security-dataflow-job-cmek-encryption-gcp
        tags:
          mondoo.com/filter-title: GCP Dataflow Job
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-dataflow-job-cmek-encryption-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-dataflow-job-cmek-encryption-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-dataflow-job-cmek-encryption-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Cloud Dataflow jobs, including both `google_dataflow_job` and `google_dataflow_flex_template_job` resources, are configured with a customer-managed encryption key (CMEK). Dataflow's CMEK setting encrypts the intermediate shuffle data, staging bucket contents, and worker state that the job materializes during execution.

        **Why this matters**

        - **Intermediate data mirrors pipeline inputs:** Streaming and batch pipelines write serialized copies of the data they process to staging and temp locations; without CMEK, that intermediate state is encrypted with Google-managed keys that organizations cannot independently revoke.
        - **Pipelines often process regulated data:** Dataflow jobs frequently handle payment records, clickstream events, healthcare data, and other sensitive content that flows through the worker nodes and into shuffle storage during processing.
        - **CMEK provides a single revocation path:** Disabling or destroying the Cloud KMS key blocks further decryption of all intermediate state written by the job, enabling a controlled response to a key-compromise incident.
        - **Staging and temp buckets also need CMEK:** The Cloud Storage buckets passed to the job as staging and temporary locations should be encrypted with the same CMEK key so the entire data path is covered.

        **Risk mitigation**

        - **Set `kms_key_name` on every Dataflow job resource:** Configure the CMEK key on both `google_dataflow_job` and `google_dataflow_flex_template_job` resources to a Cloud KMS key in the same region as the job.
        - **Grant service-agent roles on the key:** The Dataflow and Compute Engine service agents both require `roles/cloudkms.cryptoKeyEncrypterDecrypter` on the key before a CMEK-encrypted job can run.
        - **Encrypt staging and temp buckets with the same key:** Ensure the Cloud Storage buckets specified as `temp_gcs_location` and staging locations are themselves CMEK-encrypted with the same key so intermediate data is fully protected.
      audit: |
        ### Audit via Console

        1. In the Google Cloud Console, go to **Dataflow > Jobs**.
        2. Select a running or pending job to open its detail page.
        3. Click the **Job info** tab and expand **Optional parameters** or **Encryption** to check whether a **Customer-managed encryption key (CMEK)** is configured.

        A passing Dataflow job shows a Cloud KMS key name in its encryption settings. A failing job shows no encryption key, indicating Google-managed encryption is in use.

        ### Audit via CLI

        1. List all running and pending Dataflow jobs:

        ```bash
        gcloud dataflow jobs list \
          --filter='state=JOB_STATE_RUNNING OR state=JOB_STATE_PENDING' \
          --region=REGION \
          --format='value(id,name)'
        ```

        2. For each job, describe it to inspect the KMS key setting:

        ```bash
        gcloud dataflow jobs describe JOB_ID \
          --region=REGION \
          --format='value(environment.serviceKmsKeyName)'
        ```

        A passing job returns a non-empty Cloud KMS key resource name. A failing job returns an empty value, indicating it is running without a customer-managed encryption key.
      remediation:
        - id: terraform
          desc: |
            To require CMEK on Dataflow jobs in Terraform, set `kms_key_name` on the job resource:

            ```hcl
            resource "google_dataflow_job" "default" {
              name              = "pipeline"
              template_gcs_path = "gs://dataflow-templates/latest/Word_Count"
              temp_gcs_location = "gs://staging-bucket/tmp"
              kms_key_name      = google_kms_crypto_key.dataflow.id
            }

            resource "google_dataflow_flex_template_job" "flex" {
              name                    = "flex-pipeline"
              container_spec_gcs_path = "gs://templates/flex-spec.json"
              kms_key_name            = google_kms_crypto_key.dataflow.id
            }
            ```
        - id: console
          desc: |
            To require CMEK on a Dataflow job using the Google Cloud Console:

            1. In the Google Cloud Console, go to **Dataflow** > **Jobs**.
            2. Select **Create job from template** or **Create job from flex template**.
            3. Expand **Optional parameters** > **Encryption**.
            4. Select **Customer-managed encryption key (CMEK)** and pick the Cloud KMS key.
            5. Submit the job.
        - id: cli
          desc: |
            To run a Dataflow job with CMEK using the Google Cloud CLI:

            ```bash
            gcloud dataflow jobs run JOB_NAME \
              --gcs-location=gs://dataflow-templates/latest/Word_Count \
              --region=REGION \
              --dataflow-kms-key=projects/PROJECT/locations/REGION/keyRings/RING/cryptoKeys/KEY
            ```
    refs:
      - url: https://cloud.google.com/dataflow/docs/guides/customer-managed-encryption-keys
        title: Use customer-managed encryption keys with Dataflow
