  - uid: mondoo-gcp-security-cloud-functions-docker-repository-configured
    title: Ensure Cloud Functions use a user-managed Artifact Registry repository
    impact: 50
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ais-06
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-3
      compliance/nist-csf-2: nist-csf-2-pr-ps-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-3
      compliance/pci-dss-4: pcidss-requirement-2-2-1
      compliance/soc2-2017: soc2-control-cc6-8-1
      compliance/vda-isa-5: false
    variants:
      - uid: mondoo-gcp-security-cloud-functions-docker-repository-configured-gcp
        tags:
          mondoo.com/filter-title: GCP Cloud Function
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-cloud-functions-docker-repository-configured-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-functions-docker-repository-configured-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-functions-docker-repository-configured-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Cloud Functions are configured to use a user-managed Artifact Registry repository for storing built container images, rather than the default Google-managed repository. By default, Cloud Functions stores built images in a Google-managed Container Registry bucket, which does not support CMEK encryption or fine-grained access controls.

        **Why this matters**

        - **CMEK support:** User-managed Artifact Registry repositories can be configured with a customer-managed encryption key, ensuring that built function container images are encrypted with an organization-controlled key.
        - **Vulnerability scanning:** Artifact Registry supports automated vulnerability scanning for container images, enabling detection of known CVEs in function runtime images without additional tooling.
        - **Access control granularity:** A user-managed repository allows IAM policies to be applied independently from function deployment permissions, supporting the principle of least privilege for image storage.
        - **Legacy repository deprecation:** The default Google-managed Container Registry is deprecated; relying on it creates a dependency on infrastructure that will eventually be removed.

        **Risk mitigation**

        - **Create a dedicated repository:** Provision an Artifact Registry Docker repository in the same region as the Cloud Functions deployment, optionally with CMEK enabled, before deploying functions.
        - **Set the repository at deployment time:** Configure the `dockerRepository` or `build_config.docker_repository` field in the function definition so all image builds are directed to the user-managed registry.
        - **Enable vulnerability scanning:** Activate Artifact Analysis on the Artifact Registry repository to receive continuous CVE reports for function images as new vulnerabilities are disclosed.
      audit: |
        ### Audit via Console

        1. In the Google Cloud Console, navigate to **Cloud Functions**.
        2. Click a function name to open its details.
        3. Click **Edit**, then navigate to **Runtime, build, connections and security settings**.
        4. Under the **Security and Image Repo** section, review the **Image repository** field.

        A passing function shows a user-managed Artifact Registry repository path (for example, `us-central1-docker.pkg.dev/PROJECT/REPO`). A failing function shows a Google-managed default repository or an empty repository field.

        ### Audit via CLI

        1. Describe the Cloud Function and inspect the Docker repository setting:

        ```bash
        gcloud functions describe FUNCTION_NAME \
          --region=REGION \
          --format="json(dockerRepository)"
        ```

        A passing function returns a non-empty `dockerRepository` value pointing to an Artifact Registry repository. A failing function returns an empty or absent `dockerRepository` field.
      remediation:
        - id: terraform
          desc: |
            To ensure Cloud Functions use a user-managed Artifact Registry repository in Terraform:

            ```hcl
            resource "google_artifact_registry_repository" "functions" {
              location      = "us-central1"
              repository_id = "cloud-functions"
              format        = "DOCKER"

              kms_key_name = google_kms_crypto_key.ar_key.id
            }

            resource "google_cloudfunctions2_function" "example" {
              name     = "example-function"
              location = "us-central1"

              build_config {
                runtime          = "python312"
                entry_point      = "main"
                docker_repository = google_artifact_registry_repository.functions.id
              }
            }
            ```
        - id: console
          desc: |
            To ensure Cloud Functions use a user-managed Artifact Registry repository using the Google Cloud Console:

            1. First, create an Artifact Registry Docker repository if one does not exist.
            2. Navigate to **Cloud Functions** in the Google Cloud Console.
            3. Select the function or select **Create function**.
            4. Under **Runtime, build, connections and security settings**, go to **Security and Image Repo**.
            5. Under **Image repository**, select your Artifact Registry repository.
            6. Deploy the function.
        - id: cli
          desc: |
            To ensure Cloud Functions use a user-managed Artifact Registry repository using the Google Cloud CLI, deploy the function with a user-managed Artifact Registry repository:

            ```bash
            gcloud functions deploy FUNCTION_NAME \
              --docker-repository=projects/PROJECT/locations/LOCATION/repositories/REPOSITORY
            ```
    refs:
      - url: https://cloud.google.com/functions/docs/building#docker-repo
        title: Cloud Functions - Specifying a Docker repository
  - uid: mondoo-gcp-security-cloud-functions-docker-repository-configured-gcp
    filters: asset.platform == 'gcp-cloud-function'
    mql: |
      gcp.project.cloudFunction.dockerRepository != empty
  - uid: mondoo-gcp-security-cloud-functions-docker-repository-configured-terraform-hcl
