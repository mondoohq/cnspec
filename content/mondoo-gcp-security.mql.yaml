    mql: |
      terraform.state.resources.where(type == 'google_binary_authorization_policy').all(
        values.global_policy_evaluation_mode == "ENABLE"
      )
  - uid: mondoo-gcp-security-api-keys-api-restrictions-configured
    title: Ensure API keys have API target restrictions configured
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-16
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-2
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-2-1
    variants:
      - uid: mondoo-gcp-security-api-keys-api-restrictions-configured-gcp
        tags:
          mondoo.com/filter-title: GCP API Key
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-api-keys-api-restrictions-configured-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-api-keys-api-restrictions-configured-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-api-keys-api-restrictions-configured-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that API keys are configured with API target restrictions that limit which Google Cloud APIs the key may call. By default, a newly created API key has no API restrictions and can be used to invoke any API enabled in the project, giving a leaked key broad access to project services.

        **Why this matters**

        - **Blast radius reduction:** API restrictions confine a compromised key to only the APIs it was intended to call, limiting the damage an attacker can do with a leaked key.
        - **Least privilege for API access:** Restricting a key to specific APIs mirrors the principle of least privilege for programmatic access, ensuring keys carry only the permissions their use case requires.
        - **Abuse cost control:** Unrestricted keys can be used to generate API calls against any enabled service; restrictions prevent unexpected usage that could exhaust quotas or incur large charges.
        - **Audit clarity:** A key restricted to specific APIs makes it immediately clear during a security review what the key is intended to access, simplifying detection of keys that exceed their intended scope.

        **Risk mitigation**

        - **Restrict every key to its minimum required API set:** Edit each API key to enable the Restrict key option and list only the specific service endpoints the key is used to call.
        - **Replace keys with service accounts where possible:** For server-side or automated workloads, prefer service accounts with OAuth 2.0 over API keys, as service accounts support fine-grained IAM roles and do not require API-level restrictions to be set manually.
        - **Review key permissions on a schedule:** Audit API key restrictions periodically to confirm they still reflect current usage and that no key has had its restrictions removed or broadened.
      audit: |
        ### Audit via Console

        1. Open the [Google Cloud Console](https://console.cloud.google.com) and navigate to **APIs & Services > Credentials**.
        2. In the **API keys** section, click each key name to view its details.
        3. Under **API restrictions**, verify that **Restrict key** is selected and one or more specific APIs are listed.
        4. Repeat for all API keys in the project.

        A passing API key shows **Restrict key** selected with at least one API target listed under **API restrictions**. A failing API key shows **Don't restrict key** selected or no API targets configured.

        ### Audit via CLI

        1. List all API keys in the project and check their restrictions:

        ```bash
        gcloud services api-keys list --project=PROJECT_ID --format=json
        ```

        For each key, inspect the `restrictions.apiTargets` field. A passing API key returns a non-empty `apiTargets` array with at least one service listed. A failing API key returns an empty or absent `apiTargets` field in its `restrictions`.
      remediation:
        - id: terraform
          desc: |
            To ensure API keys have API target restrictions configured in Terraform:

            ```hcl
            resource "google_apikeys_key" "example" {
              name         = "example-key"
              display_name = "Example API Key"
              project      = var.project_id

              restrictions {
                api_targets {
                  service = "maps-backend.googleapis.com"
                }
              }
            }
            ```
        - id: console
          desc: |
            To ensure API keys have API target restrictions configured using the Google Cloud Console:

            1. Navigate to **APIs & Services > Credentials** in the Google Cloud Console.
            2. Select the API key to update.
            3. Under **API restrictions**, select **Restrict key**.
            4. Select the specific APIs the key should be able to call.
            5. Select **Save**.
        - id: cli
          desc: |
            To ensure API keys have API target restrictions configured using the Google Cloud CLI:

            ```bash
            gcloud services api-keys update KEY_ID \
              --api-target=service=maps-backend.googleapis.com
            ```
    refs:
      - url: https://cloud.google.com/docs/authentication/api-keys
        title: API keys overview
      - url: https://cloud.google.com/docs/authentication/api-keys#api_key_restrictions
        title: API key restrictions
  - uid: mondoo-gcp-security-api-keys-api-restrictions-configured-gcp
    filters: asset.platform == 'gcp-apikey'
    mql: |
      gcp.project.apiKey.restrictions.apiTargets.length > 0
  - uid: mondoo-gcp-security-api-keys-api-restrictions-configured-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_apikeys_key')
    mql: |
      terraform.resources('google_apikeys_key').all(
        blocks.where(type == 'restrictions').all(
          blocks.where(type == 'api_targets') != empty
        )
      )
  - uid: mondoo-gcp-security-api-keys-api-restrictions-configured-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_apikeys_key')
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_apikeys_key').all(
