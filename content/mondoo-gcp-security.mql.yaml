    mql: |
      terraform.plan.resourceChanges.where(type == 'google_redis_instance').all(
        change.after.customer_managed_key != empty &&
        change.after.customer_managed_key != ""
      )
      terraform.plan.resourceChanges.where(type == 'google_redis_cluster').all(
        change.after.customer_managed_key != empty &&
        change.after.customer_managed_key != ""
      )
  - uid: mondoo-gcp-security-cloud-redis-cmek-configured-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'google_redis_instance' || type == 'google_redis_cluster')
    mql: |
      terraform.state.resources.where(type == 'google_redis_instance').all(
