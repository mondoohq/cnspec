        tags:
          mondoo.com/filter-title: GCP Firestore Database
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-firestore-cmek-encryption-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-firestore-cmek-encryption-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-firestore-cmek-encryption-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Firestore databases are configured to use customer-managed encryption keys (CMEK) rather than Google-managed default keys. By default, Firestore encrypts data at rest using keys that Google controls, giving organizations no ability to independently manage key rotation, revocation, or usage auditing.

        **Why this matters**

        - **Key control:** CMEK gives organizations direct control over the encryption key lifecycle, including custom rotation schedules that cannot be achieved with Google-managed keys.
        - **Revocability:** Disabling or destroying the Cloud KMS key immediately prevents access to encrypted Firestore data, an option unavailable with Google-managed encryption.
        - **Audit visibility:** Key usage events are recorded in Cloud Audit Logs for Cloud KMS, providing a detailed access trail that Google-managed keys do not expose.
        - **Compliance alignment:** Many regulatory frameworks require organizations to retain control over encryption keys protecting sensitive stored data.

        **Risk mitigation**

        - **Insider threat:** CMEK allows organizations to revoke database access by destroying the key, a control that is impossible when Google holds the only key.
        - **Breach containment:** If database credentials are compromised, disabling the KMS key can stop data extraction even before credentials are rotated.
      audit: |
        ### Audit via Console

        1. Go to the **Firestore** page in the Google Cloud Console.
        2. Select each database and review the **Encryption** section in the database details.
        3. Verify that the encryption type is set to **Customer-managed encryption key (CMEK)**.

        A passing Firestore database shows a CMEK key name under the Encryption section. A failing database shows **Google-managed encryption key** or no CMEK configuration.

        ### Audit via CLI

        1. List all Firestore databases and their CMEK configuration:

        ```bash
        gcloud firestore databases list --format="table(name,type,locationId,cmekConfig.kmsKeyName)"
        ```

        A passing Firestore database returns a non-empty value in the `KMS_KEY_NAME` column. A failing database returns an empty `KMS_KEY_NAME`.
      remediation:
        - id: terraform
          desc: |
            To ensure Firestore databases are encrypted with CMEK in Terraform, note: CMEK must be configured at database creation time.

            ```hcl
            resource "google_firestore_database" "database" {
              project     = "my-project"
              name        = "my-database"
              location_id = "us-central1"
              type        = "FIRESTORE_NATIVE"

              cmek_config {
                kms_key_name = google_kms_crypto_key.firestore_key.id
              }
            }
            ```
        - id: console
          desc: |
            To ensure Firestore databases are encrypted with CMEK using the Google Cloud Console, note: CMEK must be configured at database creation time and cannot be added to existing databases.

            1. Go to the **Firestore** page in the Google Cloud Console.
            2. Select **Create Database**.
            3. Under **Encryption**, select **Customer-managed encryption key (CMEK)**.
            4. Select or create a Cloud KMS key.
            5. Complete the database creation.
        - id: cli
          desc: |
            To ensure Firestore databases are encrypted with CMEK using the Google Cloud CLI, note: CMEK must be configured at database creation time.

            ```bash
            gcloud firestore databases create \
              --database=DATABASE_ID \
              --location=LOCATION \
              --type=firestore-native \
              --kms-key-name=projects/PROJECT/locations/LOCATION/keyRings/RING/cryptoKeys/KEY
            ```
    refs:
      - url: https://cloud.google.com/firestore/docs/cmek
        title: Customer-managed encryption keys (CMEK) for Firestore
  - uid: mondoo-gcp-security-firestore-cmek-encryption-gcp
    filters: asset.platform == 'gcp-firestore-database'
    mql: |
      gcp.firestore.database.cmekConfig != empty
  - uid: mondoo-gcp-security-firestore-cmek-encryption-terraform-hcl
    filters: |
