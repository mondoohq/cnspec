      - uid: mondoo-gcp-security-instances-are-not-configured-use-default-service-account-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-instances-are-not-configured-use-default-service-account-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-instances-are-not-configured-use-default-service-account-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Compute Engine instances are configured to use a custom service account rather than the default Compute Engine service account. By default, new instances are assigned the default service account, which carries the broad Editor role across the project and is shared by every instance that does not specify otherwise.

        **Why this matters**

        - **Excess permissions by default:** The default service account holds project-wide Editor rights, far more than any individual workload needs, making it a high-value target if an instance is compromised.
        - **Shared identity across workloads:** Every instance using the default account shares the same credential, so a breach of one workload can expose resources belonging to unrelated workloads in the same project.
        - **No workload-level auditability:** Cloud Audit Logs attribute actions to the shared account rather than to a specific instance, making it difficult to trace which workload accessed which resource.
        - **Difficult revocation:** Revoking or restricting the default account affects all instances using it, complicating incident response.
        - **Lateral movement risk:** Broad permissions enable an attacker to traverse GCP services and escalate privileges after gaining access to a single instance.

        **Risk mitigation**

        - **Dedicated custom service accounts:** Create a separate service account per workload with only the IAM roles that workload requires, enforcing least privilege.
        - **Regular permission audits:** Periodically review service account bindings to confirm each account's roles remain appropriate as workloads evolve.
        - **Organization policy enforcement:** Apply the `iam.disableServiceAccountKeyCreation` and related org policies to prevent default account misuse in new deployments.
      audit: |
        ### Audit via Console

        1. Log in to the Google Cloud Console at https://console.cloud.google.com.
        2. Navigate to **Compute Engine** > **VM instances**.
        3. For each instance, select its name to open the details page.
        4. Under **API and identity management**, review the **Service account** field.
        5. Confirm the service account shown is not the default Compute Engine service account, which follows the pattern `PROJECT_NUMBER-compute@developer.gserviceaccount.com`.

        A passing instance shows a custom service account email that does not match the default pattern. A failing instance shows a service account email matching `PROJECT_NUMBER-compute@developer.gserviceaccount.com` or `PROJECT_NUMBER-cloudservices@developer.gserviceaccount.com`.

        ### Audit via CLI

        1. List all instances and their service accounts:

        ```bash
        gcloud compute instances list \
          --format="table(name,zone,serviceAccounts[].email)"
        ```

        2. For each instance, describe it to confirm the service account email:

        ```bash
        gcloud compute instances describe INSTANCE_NAME \
          --zone=ZONE \
          --format="get(serviceAccounts[].email)"
        ```

        A passing instance returns a service account email that does not match `PROJECT_NUMBER-compute@developer.gserviceaccount.com`. A failing instance returns that default pattern.
      remediation:
        - id: terraform
          desc: |
            To ensure that instances are not configured to use the default service account in Terraform, provision or update a compute instance with a custom service account:

            ```hcl
            resource "google_compute_instance" "default" {
              name         = "secure-instance"
              machine_type = var.machine_type
              zone         = var.zone
              tags = ["terraform"]

              service_account {
                email  = "example@example.com"
                scopes = ["user-email", "compute-ro", "storage-ro"]
              }
            }
            ```
        - id: console
          desc: |
            To ensure that instances are not configured to use the default service account using the Google Cloud Console, change the policy using the GCP Console, follow these steps:

            1. Log in to the GCP Console at https://console.cloud.google.com.
            2. Select the Organization and Project where the instance you want to update is running.
            3. Navigate to **Compute Engine**.
            4. Select the compute instance that you want to update.
            5. If the instance is not stopped, select **Stop**. Wait for the instance to stop.
            6. Select **Edit**.
            7. Scroll down to the Service Account section.
            8. Select a different service account.
            9. Select **Save**.
            10. Select **START**.
        - id: cli
          desc: |
            To ensure that instances are not configured to use the default service account using the Google Cloud CLI, update the service account using the `gcloud` CLI:

            1. Stop the instance:

              ```bash
              gcloud compute instances stop INSTANCE_NAME
              ```

            2. Update the instance:

              ```bash
              gcloud compute instances set-service-account INSTANCE_NAME --service-account=SERVICE_ACCOUNT --scopes [SCOPE1,SCOPE2...]
              ```

            3. Restart the instance:

              ```bash
              gcloud compute instances start INSTANCE_NAME
              ```
    refs:
      - url: https://cloud.google.com/compute/docs/instances/create-start-instance
        title: Google Compute Engine Instance Documentation
      - url: https://cloud.google.com/compute/docs/security
        title: Google Compute Engine Security
  - uid: mondoo-gcp-security-instances-are-not-configured-use-default-service-account-gcp
    filters: |
      asset.platform == 'gcp-compute-instance'
      gcp.compute.instance.name != /^gke-/
    mql: |
      gcp.compute.instance.serviceAccounts.none(
        email == /^\d{12}-(compute|cloudservices)@developer\.gserviceaccount\.com$|^[a-z][a-z0-9\-]{4,28}@appspot\.gserviceaccount\.com$/
      )
  - uid: mondoo-gcp-security-instances-are-not-configured-use-default-service-account-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_compute_instance')
    mql: |
      # Check that service_account block exists on all compute instances and no service_account uses default service account email
      terraform.resources('google_compute_instance').all(
        blocks.where(type == 'service_account') != empty &&
        blocks.where(type == 'service_account').none(
          arguments.email == /^\d{12}-(compute|cloudservices)@developer\.gserviceaccount\.com$|^[a-z][a-z0-9\-]{4,28}@appspot\.gserviceaccount\.com$/
        )
      )
  - uid: mondoo-gcp-security-instances-are-not-configured-use-default-service-account-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_compute_instance')
    mql: |
      terraform.plan.resourceChanges.where(
        type == 'google_compute_instance'
      ).all(
        change.after.service_account.none(
          email == /^\d{12}-(compute|cloudservices)@developer\.gserviceaccount\.com$|^[a-z][a-z0-9\-]{4,28}@appspot\.gserviceaccount\.com$/
        )
      )
  - uid: mondoo-gcp-security-instances-are-not-configured-use-default-service-account-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'google_compute_instance')
    mql: |
      terraform.state.resources.where(
        type == 'google_compute_instance'
      ).all(
        values.service_account.none(
          email == /^\d{12}-(compute|cloudservices)@developer\.gserviceaccount\.com$|^[a-z][a-z0-9\-]{4,28}@appspot\.gserviceaccount\.com$/
        )
      )
  - uid: mondoo-gcp-security-instances-not-configured-with-default-service-account-full-access-cloud-api
    title: Ensure instances do not use default service account with full API access
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-2
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-5
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-3-3
      compliance/vda-isa-5: vda-isa-5-4-1-3
    variants:
      - uid: mondoo-gcp-security-instances-not-configured-with-default-service-account-full-access-cloud-api-gcp
        tags:
          mondoo.com/filter-title: GCP Compute Instance
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-instances-not-configured-with-default-service-account-full-access-cloud-api-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-instances-not-configured-with-default-service-account-full-access-cloud-api-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-instances-not-configured-with-default-service-account-full-access-cloud-api-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Compute Engine instances using the default service account are not configured with the full `cloud-platform` API scope, which grants unrestricted access to all Google Cloud APIs. By default, the console presents an option to allow full access to all Cloud APIs, and users may accept it without understanding the scope of permissions being granted.

        **Why this matters**

        - **Unrestricted API surface:** The `cloud-platform` scope paired with the default service account allows the instance to interact with virtually every GCP API, far beyond what most workloads require.
        - **Privilege escalation path:** An attacker who gains code execution on such an instance can use the metadata server to obtain credentials and then pivot to any GCP service in the project.
        - **Obscured audit trails:** When one credential set has access to many services, audit logs from different products reference the same identity, making it hard to isolate suspicious behavior to a specific workload.
        - **Blast radius amplification:** A single compromised instance with full API access can be used to exfiltrate data, create new IAM bindings, or modify infrastructure across the entire project.

        **Risk mitigation**

        - **Replace default with custom accounts:** Assign a dedicated service account per workload and grant only the specific IAM roles that workload needs, removing the reliance on broad API scopes entirely.
        - **Scope API access explicitly:** When custom accounts are not immediately feasible, restrict scopes to the minimum set of OAuth scopes required by the workload.
        - **Enforce with org policies:** Use organization policies to block the assignment of the `cloud-platform` scope to the default service account in new instance deployments.
      audit: |
        ### Audit via Console

        1. Log in to the Google Cloud Console at https://console.cloud.google.com.
        2. Navigate to **Compute Engine** > **VM instances**.
        3. For each instance using the default Compute Engine service account, select its name to open the details page.
        4. Under **API and identity management**, review the **Access scopes** setting.
        5. Confirm the scope is not set to **Allow full access to all Cloud APIs** (`https://www.googleapis.com/auth/cloud-platform`).

        A passing instance shows access scopes limited to specific APIs rather than full cloud-platform access. A failing instance shows the scope `https://www.googleapis.com/auth/cloud-platform` combined with use of the default service account.

        ### Audit via CLI

        1. List all instances with their service accounts and scopes:

        ```bash
        gcloud compute instances list \
          --format="table(name,zone,serviceAccounts[].email,serviceAccounts[].scopes[])"
        ```

        2. For a specific instance, describe it to inspect scopes:

        ```bash
        gcloud compute instances describe INSTANCE_NAME \
          --zone=ZONE \
          --format="get(serviceAccounts[].scopes[])"
        ```

        A passing instance returns scopes that do not include `https://www.googleapis.com/auth/cloud-platform` when using the default service account. A failing instance returns `https://www.googleapis.com/auth/cloud-platform` as a scope on the default service account.
      remediation:
        - id: terraform
          desc: |
            To ensure instances do not use default service account with full API access in Terraform, provision or update a compute instance with Terraform:

            ```hcl
            resource "google_service_account" "default" {
              account_id   = "my-custom-sa"
              display_name = "Custom SA for VM Instance"
            }

            resource "google_compute_instance" "default" {
              name         = "secure-instance"
              machine_type = var.machine_type
              zone         = var.zone
              tags = ["terraform"]

              service_account {
                # Google recommends custom service accounts with cloud-platform scope and permissions granted via IAM Roles.
                email  = google_service_account.default.email
                scopes = ["cloud-platform"]
              }
            }
            ```
        - id: console
          desc: |
            To ensure instances do not use default service account with full API access using the Google Cloud Console, change the policy using the Google Cloud Console:

            1. Log in to the GCP Console at https://console.cloud.google.com.
            2. Select the Organization and Project where the instance you want to update is running.
            3. Navigate to **Compute Engine**.
            4. Select the compute instance that you want to update.
            5. If the instance is not stopped, select **Stop**. Wait for the instance to stop.
            6. Select **Edit**.
            7. Scroll down to the Service Account section.
            8. Select a different service account or ensure Allow full access to all Cloud APIs is not selected.
            9. Select **Save**.
            10. Select **START**.
        - id: cli
          desc: |
            To ensure instances do not use default service account with full API access using the Google Cloud CLI, update the service account using the `gcloud` CLI:

            1. Stop the instance:

              ```bash
              gcloud compute instances stop INSTANCE_NAME
              ```

            2. Update the instance:

              ```bash
              gcloud compute instances set-service-account INSTANCE_NAME --service-account=SERVICE_ACCOUNT --scopes [SCOPE1,SCOPE2...]
              ```

            3. Restart the instance:

              ```bash
              gcloud compute instances start INSTANCE_NAME
              ```
    refs:
      - url: https://cloud.google.com/compute/docs/instances/create-start-instance
        title: Google Compute Engine Instance Documentation
      - url: https://cloud.google.com/compute/docs/security
        title: Google Compute Engine Security
  - uid: mondoo-gcp-security-instances-not-configured-with-default-service-account-full-access-cloud-api-gcp
    filters: |
      asset.platform == 'gcp-compute-instance'
      gcp.compute.instance.serviceAccounts.contains( email == /^\d{12}-(compute|cloudservices)@developer\.gserviceaccount\.com$|^[a-z][a-z0-9\-]{4,28}@appspot\.gserviceaccount\.com$/ )
      gcp.compute.instance.name != /^gke-/
    mql: |
      gcp.compute.instance.serviceAccounts.none(
        scopes == 'https://www.googleapis.com/auth/cloud-platform'
      )
  - uid: mondoo-gcp-security-instances-not-configured-with-default-service-account-full-access-cloud-api-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_compute_instance')
    mql: |
      terraform.resources('google_compute_instance').all(
        blocks.where(type == 'service_account') != empty &&
        blocks.where(
          type == 'service_account' &&
          arguments.email.contains(/^(default|\d{12}-compute@developer\.gserviceaccount\.com)$/)
        ).all(
          arguments.scopes.none(
            _ == /(https?:\/\/www\.googleapis\.com\/auth\/)?cloud-platform/
          )
        )
      )
  - uid: mondoo-gcp-security-instances-not-configured-with-default-service-account-full-access-cloud-api-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_compute_instance')
    mql: |
      terraform.plan.resourceChanges.where(
        type == 'google_compute_instance'
      ).all(
        change.after.service_account.none(
          email == /^(default|\d{12}-compute@developer\.gserviceaccount\.com)$/ &&
          scopes.contains(/(https?:\/\/www\.googleapis\.com\/auth\/)?cloud-platform/)
        )
      )
  - uid: mondoo-gcp-security-instances-not-configured-with-default-service-account-full-access-cloud-api-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'google_compute_instance')
    mql: |
      terraform.state.resources.where(
        type == 'google_compute_instance'
      ).all(
        values.service_account.none(
          email == /^(default|\d{12}-compute@developer\.gserviceaccount\.com)$/ &&
          scopes.contains(/(https?:\/\/www\.googleapis\.com\/auth\/)?cloud-platform/)
        )
      )
  - uid: mondoo-gcp-security-compute-instances-oslogin-enabled
    title: Ensure oslogin is enabled for compute instances
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-14
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-j
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-3
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-2
    variants:
      - uid: mondoo-gcp-security-compute-instances-oslogin-enabled-gcp
        tags:
          mondoo.com/filter-title: GCP Compute Instance
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-compute-instances-oslogin-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-compute-instances-oslogin-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-compute-instances-oslogin-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Compute Engine instances are configured with OS Login enabled, which ties SSH access to IAM identities instead of manually managed SSH keys stored in project or instance metadata. By default, GCP Compute Engine uses metadata-based SSH keys, which must be managed individually and offer no integration with centralized identity governance.

        **Why this matters**

        - **Centralized access control:** OS Login links SSH authentication to a user's Google identity, so access can be granted or revoked instantly through IAM role assignments without touching instance metadata.
        - **Automatic key lifecycle:** When a user is removed from an IAM role, their SSH access is revoked immediately, eliminating the risk of orphaned keys that persist after offboarding.
        - **Attributable audit trail:** Login events are recorded in Cloud Audit Logs with the authenticated Google identity, giving a clear view of who accessed which instance and when.
        - **MFA enforcement:** OS Login can be combined with two-factor verification to require an additional authentication factor before allowing SSH sessions.

        **Risk mitigation**

        - **Enable at the project level:** Setting `enable-oslogin=TRUE` in project metadata applies the setting to all instances by default, ensuring new instances inherit it without individual configuration.
        - **Use scoped IAM roles:** Grant `roles/compute.osLogin` or `roles/compute.osAdminLogin` only to users or groups that require SSH access, rather than broad project-level roles.
        - **Audit login activity regularly:** Review Cloud Audit Log entries for OS Login events to detect unusual access patterns or unauthorized login attempts.
      audit: |
        ### Audit via Console

        1. Log in to the Google Cloud Console at https://console.cloud.google.com.
        2. Navigate to **Compute Engine** > **Metadata** to check the project-level setting.
        3. Review the metadata entries for a key named `enable-oslogin` and confirm its value is `TRUE`.
        4. To check individual instances, navigate to **Compute Engine** > **VM instances**, select an instance, and review its **Custom metadata** section for `enable-oslogin = TRUE`.

        A passing project or instance shows `enable-oslogin` set to `TRUE` in metadata. A failing project or instance either lacks the `enable-oslogin` key or has it set to a value other than `TRUE`.

        ### Audit via CLI

        1. Check project-level OS Login metadata:

        ```bash
        gcloud compute project-info describe \
          --format="get(commonInstanceMetadata.items[key='enable-oslogin'].value)"
        ```

        2. Check a specific instance's OS Login metadata:

        ```bash
        gcloud compute instances describe INSTANCE_NAME \
          --zone=ZONE \
          --format="get(metadata.items[key='enable-oslogin'].value)"
        ```

        A passing project or instance returns `TRUE`. A failing project or instance returns nothing, `FALSE`, or any value other than `TRUE`.
      remediation:
        - id: terraform
          desc: |
            To ensure oslogin is enabled for compute instances in Terraform, configure OS Login for a project:

            ```hcl
            resource "google_compute_project_metadata" "default" {
              metadata = {
                enable-oslogin = "TRUE"
              }
            }
            ```

            To provision or update a compute instance with Terraform:

            ```hcl
            resource "google_compute_instance" "default" {
              name         = "secure-instance"
              machine_type = var.machine_type
              zone         = var.zone
              tags = ["terraform"]

              metadata = {
                "enable-oslogin" = "true"
              }
            }
            ```
        - id: console
          desc: |
            To ensure oslogin is enabled for compute instances using the Google Cloud Console, configure OS Login for a project via Google Cloud Console:

            1. In the Google Cloud console, go to the **Metadata** page.
            2. Select **EDIT**.
            3. Add a metadata entry, setting the key to `enable-oslogin` and the value to `TRUE`.
            4. Select **SAVE** to apply the changes.

            To configure OS Login for an existing instance:

            1. In the Google Cloud console, go to the **Compute Engine**.
            2. Select the name of the instance that you want to enable OS Login on.
            3. On the instance details page, select **EDIT**.
            4. Under **Custom metadata**, add a metadata entry, setting the key to `enable-oslogin` and the value to `TRUE`.
            5. Select **SAVE**.
        - id: cli
          desc: |
            To ensure oslogin is enabled for compute instances using the Google Cloud CLI, update OS Login for a project using the `gcloud` CLI:

            ```bash
            gcloud compute project-info add-metadata --metadata enable-oslogin=TRUE
            ```

            To update OS Login for an existing instance using the `gcloud` CLI:

            ```bash
            gcloud compute instances add-metadata INSTANCE_NAME --metadata enable-oslogin=TRUE
            ```
    refs:
      - url: https://cloud.google.com/compute/docs/instances/create-start-instance
        title: Google Compute Engine Instance Documentation
      - url: https://cloud.google.com/compute/docs/security
        title: Google Compute Engine Security
  - uid: mondoo-gcp-security-compute-instances-oslogin-enabled-gcp
    filters: asset.platform == 'gcp-compute-instance'
    mql: gcp.compute.instance.metadata['enable-oslogin'] == true
  - uid: mondoo-gcp-security-compute-instances-oslogin-enabled-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_compute_instance' || nameLabel == 'google_compute_project_metadata')
    mql: |
      terraform.resources('google_compute_instance').all(
        arguments.metadata != empty &&
        arguments.metadata['enable-oslogin'] == /true/i
      )
  - uid: mondoo-gcp-security-compute-instances-oslogin-enabled-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_compute_instance' || type == 'google_compute_project_metadata')
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_compute_instance').all(
        change.after.metadata['enable-oslogin'] == /true/i
      )
  - uid: mondoo-gcp-security-compute-instances-oslogin-enabled-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'google_compute_instance' || type == 'google_compute_project_metadata')
    mql: |
      terraform.state.resources.where(type == 'google_compute_instance').all(
        values.metadata['enable-oslogin'] == /true/i
      )
