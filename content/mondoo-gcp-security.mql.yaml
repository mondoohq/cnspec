    docs:
      desc: |
        This check ensures that at least one VPC Service Controls access policy is defined for the GCP organization. An access policy is the top-level container for VPC Service Controls and is a required prerequisite before any service perimeters or access levels can be configured to protect GCP resources from data exfiltration.

        **Why this matters**

        - **Prerequisite for protection:** Without an access policy, no service perimeters or access levels can be defined, leaving all GCP services unprotected by VPC Service Controls regardless of IAM configuration.
        - **Data exfiltration defense:** VPC Service Controls restrict access to GCP services such as BigQuery, Cloud Storage, and Cloud KMS from outside the defined perimeter, even for principals that hold valid IAM permissions.
        - **Boundary protection:** Access policies provide the organizational anchor for network boundary controls that many security frameworks require for sensitive data processing environments.
        - **Zero-trust foundation:** Access policies enable the layered zero-trust model by separating identity permissions from network-context permissions, requiring both to be satisfied before access is granted.

        **Risk mitigation**

        - **Exfiltration barrier:** An access policy makes it possible to configure perimeters that block data from leaving a controlled environment even when credentials are compromised.
        - **Defense in depth beyond IAM:** Service Controls add a network-context layer that IAM alone cannot provide, blocking requests from unauthorized networks even when the caller presents a valid token.
        - **Compliance prerequisite:** Establishing an access policy is the first step toward satisfying boundary protection controls required by frameworks such as NIST SP 800-53 SC-7.
      audit: |
        ### Audit via Console

        1. Navigate to **Security** > **VPC Service Controls** in the Google Cloud Console.
        2. Ensure you have selected the correct organization at the top of the page.
        3. Select **Manage Policies** and review the list of access policies.

        A passing organization shows at least one access policy listed. A failing organization shows an empty list with no access policies defined.

        ### Audit via CLI

        1. List access policies for the organization:

        ```bash
        gcloud access-context-manager policies list \
          --organization=<organization-id>
        ```

        A passing organization returns one or more access policy entries. A failing organization returns an empty list or a message indicating no policies exist.
      remediation:
        - id: console
          desc: |
            To create a VPC Service Controls access policy using the Google Cloud Console:

            1. Navigate to **Security > VPC Service Controls** in the Google Cloud Console.
            2. If prompted, select the organization.
            3. Select **Manage Policies**.
            4. Select **Create** to create a new access policy.
            5. Enter a title for the access policy.
            6. Select **Create Access Policy**.
        - id: cli
          desc: |
            To create a VPC Service Controls access policy using the Google Cloud CLI:

            ```bash
            gcloud access-context-manager policies create \
              --organization=ORGANIZATION_ID \
              --title="POLICY_TITLE"
            ```

            Replace `ORGANIZATION_ID` with your GCP organization ID and `POLICY_TITLE` with a descriptive name for the policy.
        - id: terraform
          desc: |
            To create a VPC Service Controls access policy using Terraform:

            ```hcl
            resource "google_access_context_manager_access_policy" "example" {
              parent = "organizations/ORGANIZATION_ID"
              title  = "example-access-policy"
            }
            ```

            Replace `ORGANIZATION_ID` with your GCP organization ID.
    refs:
      - url: https://cloud.google.com/vpc-service-controls/docs/overview
        title: VPC Service Controls overview
      - url: https://cloud.google.com/vpc-service-controls/docs/create-access-levels
        title: Create access levels
  - uid: mondoo-gcp-security-vpc-sc-access-policies-defined-gcp
    filters: asset.platform == 'gcp'
    mql: |
      gcp.organization.accessPolicies.length > 0
  - uid: mondoo-gcp-security-vpc-sc-service-perimeters
    title: Ensure VPC Service Controls service perimeters exist
    impact: 70
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/pci-dss-4: pcidss-requirement-1-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-gcp-security-vpc-sc-service-perimeters-gcp
        tags:
          mondoo.com/filter-title: GCP Organization
          mondoo.com/filter-icon: gcp
    docs:
      desc: |
        This check ensures that at least one VPC Service Controls service perimeter is defined within an organization's access policy. Service perimeters are the core enforcement mechanism of VPC Service Controls, creating a security boundary around specified GCP services and projects that restricts how data moves across that boundary.

        **Why this matters**

        - **Core enforcement mechanism:** Without service perimeters, even a well-configured access policy provides no actual data protection, because perimeters are the objects that block or allow requests based on network context.
        - **Service-level access restriction:** Perimeters restrict access to GCP services such as BigQuery, Cloud Storage, and Cloud KMS to only authorized networks and identities, blocking exfiltration paths that IAM alone cannot close.
        - **Defense beyond IAM:** Service perimeters enforce boundary protection even when a principal has valid IAM permissions, adding a context-aware control layer that reduces the blast radius of compromised credentials.
        - **Exfiltration prevention:** Perimeters block the common exfiltration pattern of using authorized credentials from an unauthorized network to copy data out of the controlled environment.

        **Risk mitigation**

        - **Network-context enforcement:** Requests from outside the perimeter are denied even when the caller presents valid IAM credentials, eliminating exfiltration via compromised tokens used outside the corporate network.
        - **Explicit ingress and egress control:** Perimeter ingress and egress rules make all authorized cross-boundary data flows explicit and auditable rather than implicit.
        - **Segmentation enforcement:** Placing projects with different sensitivity levels in separate perimeters limits lateral data movement between environments in the event of a compromise.
      audit: |
        ### Audit via Console

        1. Sign in to the Google Cloud Console and navigate to **Security** > **VPC Service Controls**.
        2. Select the access policy for your organization.
        3. Review the list of service perimeters in the **Perimeters** tab.

        A passing organization shows at least one service perimeter listed. A failing organization shows an empty perimeter list.

        ### Audit via CLI

        1. Identify the access policy ID for your organization, then list all service perimeters:

        ```bash
        gcloud access-context-manager policies list --organization=ORGANIZATION_ID

        gcloud access-context-manager perimeters list --policy=POLICY_ID
        ```

        A passing organization returns one or more perimeter entries. A failing organization returns an empty list.
      remediation:
        - id: console
          desc: |
            To create a VPC Service Controls service perimeter using the Google Cloud Console:

            1. Navigate to **Security > VPC Service Controls** in the Google Cloud Console.
            2. Select the access policy.
            3. Select **New Perimeter**.
            4. Enter a title for the perimeter.
            5. Under **Perimeter Type**, select **Regular** for an enforced perimeter.
            6. Under **Projects**, add the projects to protect.
            7. Under **Restricted Services**, add the GCP services to restrict.
            8. Configure ingress and egress rules as needed.
            9. Select **Create Perimeter**.
        - id: cli
          desc: |
            To create a VPC Service Controls service perimeter using the Google Cloud CLI:

            ```bash
            gcloud access-context-manager perimeters create PERIMETER_NAME \
              --policy=POLICY_ID \
              --title="PERIMETER_TITLE" \
              --resources="projects/PROJECT_NUMBER" \
              --restricted-services="storage.googleapis.com,bigquery.googleapis.com" \
              --perimeter-type=regular
            ```

            Replace `PERIMETER_NAME` with a name for the perimeter, `POLICY_ID` with the access policy ID, `PROJECT_NUMBER` with the project number to protect, and adjust the restricted services list as needed.
        - id: terraform
          desc: |
            To create a VPC Service Controls service perimeter using Terraform:

            ```hcl
            resource "google_access_context_manager_service_perimeter" "example" {
              parent = "accessPolicies/POLICY_ID"
              name   = "accessPolicies/POLICY_ID/servicePerimeters/example_perimeter"
              title  = "example-perimeter"

              status {
                restricted_services = [
                  "storage.googleapis.com",
                  "bigquery.googleapis.com",
                ]
                resources = ["projects/PROJECT_NUMBER"]
              }
            }
            ```

            Replace `POLICY_ID` with the access policy ID and `PROJECT_NUMBER` with the project number to protect.
    refs:
      - url: https://cloud.google.com/vpc-service-controls/docs/service-perimeters
        title: Service perimeters overview
      - url: https://cloud.google.com/vpc-service-controls/docs/create-service-perimeters
        title: Create a service perimeter
  - uid: mondoo-gcp-security-vpc-sc-service-perimeters-gcp
    filters: asset.platform == 'gcp'
    mql: |
      gcp.organization.accessPolicies.any(servicePerimeters.length > 0)
  - uid: mondoo-gcp-security-vpc-sc-perimeter-enforced
    title: Ensure VPC Service Controls perimeters are enforced
    impact: 60
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/pci-dss-4: pcidss-requirement-1-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-gcp-security-vpc-sc-perimeter-enforced-gcp
        tags:
          mondoo.com/filter-title: GCP Organization
          mondoo.com/filter-icon: gcp
    docs:
      desc: |
        This check ensures that VPC Service Controls service perimeters are operating in enforced mode rather than dry-run mode. When `useExplicitDryRunSpec` is enabled on a perimeter, it logs policy violations but does not block unauthorized access, providing monitoring without actual data protection.

        **Why this matters**

        - **Dry-run provides no protection:** In dry-run mode, VPC Service Controls only produce audit log entries for policy violations without blocking the access, meaning sensitive services remain fully accessible despite appearing to have perimeter controls in place.
        - **False security posture:** Perimeters left in dry-run mode indefinitely create a misleading appearance of boundary protection in compliance dashboards and security reviews while providing none of the actual enforcement.
        - **Exfiltration window:** Attackers who know a perimeter is in dry-run mode can exfiltrate data freely through services the perimeter is meant to restrict, generating only log entries that may not be monitored in real time.
        - **Regulatory requirements:** Compliance frameworks that require active boundary protection controls do not accept monitoring-only controls as satisfying the enforcement requirement.

        **Risk mitigation**

        - **Active enforcement:** Transitioning a perimeter to enforced mode converts logged violations into blocked requests, closing the gap between detected and prevented data access.
        - **Controlled promotion path:** Reviewing dry-run logs before enforcement identifies legitimate access patterns that need explicit ingress rules, reducing the risk of business disruption when enforcement is enabled.
        - **Audit completeness:** Enforced perimeters produce both allow and deny audit records, giving security teams a complete picture of access attempts rather than only those that would have been denied.
      audit: |
        ### Audit via Console

        1. Sign in to the Google Cloud Console and navigate to **Security** > **VPC Service Controls**.
        2. Select the access policy.
        3. For each service perimeter, open it and check whether a **Dry Run Configuration** section is present and active.

        A passing perimeter has no active dry-run configuration (or the dry-run configuration has been promoted to the enforced status). A failing perimeter shows a **Dry Run Configuration** section that is still active, meaning `useExplicitDryRunSpec` is enabled.

        ### Audit via CLI

        1. List all perimeters and inspect each for the `useExplicitDryRunSpec` field:

        ```bash
        gcloud access-context-manager perimeters list \
          --policy=POLICY_ID \
          --format="table(name,status.resources,useExplicitDryRunSpec)"
        ```

        A passing perimeter shows `useExplicitDryRunSpec` as `False` or absent. A failing perimeter shows `useExplicitDryRunSpec` as `True`.
      remediation:
        - id: console
          desc: |
            To enforce a VPC Service Controls perimeter using the Google Cloud Console:

            1. Navigate to **Security > VPC Service Controls** in the Google Cloud Console.
            2. Select the access policy containing the perimeter.
            3. Select the perimeter to modify.
            4. Review the **Dry Run Configuration** section.
            5. If the perimeter has a dry-run configuration, select **Enforce** to promote it to the enforced configuration.
            6. Select **Save**.
        - id: cli
          desc: |
            To enforce a VPC Service Controls perimeter using the Google Cloud CLI, update the perimeter to remove the dry-run specification:

            ```bash
            gcloud access-context-manager perimeters dry-run enforce PERIMETER_NAME \
              --policy=POLICY_ID
            ```

            Replace `PERIMETER_NAME` with the perimeter name and `POLICY_ID` with the access policy ID. This promotes the dry-run configuration to the enforced configuration.
        - id: terraform
          desc: |
            To enforce a VPC Service Controls perimeter using Terraform, configure only the `status` block without a `spec` block and set `use_explicit_dry_run_spec` to `false`:

            ```hcl
            resource "google_access_context_manager_service_perimeter" "example" {
              parent = "accessPolicies/POLICY_ID"
              name   = "accessPolicies/POLICY_ID/servicePerimeters/example_perimeter"
              title  = "example-perimeter"

              use_explicit_dry_run_spec = false

              status {
                restricted_services = [
                  "storage.googleapis.com",
                  "bigquery.googleapis.com",
                ]
                resources = ["projects/PROJECT_NUMBER"]
              }
            }
            ```

            Remove any `spec` block to ensure the perimeter is not in dry-run mode.
    refs:
      - url: https://cloud.google.com/vpc-service-controls/docs/dry-run-mode
        title: VPC Service Controls dry-run mode
      - url: https://cloud.google.com/vpc-service-controls/docs/manage-perimeters
        title: Manage service perimeters
  - uid: mondoo-gcp-security-vpc-sc-perimeter-enforced-gcp
    filters: asset.platform == 'gcp'
    mql: |
      gcp.organization.accessPolicies.all(servicePerimeters.all(useExplicitDryRunSpec == false))
  - uid: mondoo-gcp-security-vpc-sc-access-levels-defined
    title: Ensure VPC Service Controls access levels are defined
    impact: 60
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/pci-dss-4: pcidss-requirement-1-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-gcp-security-vpc-sc-access-levels-defined-gcp
        tags:
          mondoo.com/filter-title: GCP Organization
          mondoo.com/filter-icon: gcp
    docs:
      desc: |
        This check ensures that at least one VPC Service Controls access level is defined within the organization's access policy. Access levels specify the conditions under which a request is permitted to reach resources protected by a service perimeter, such as trusted IP ranges, managed device attributes, or identity requirements, enabling context-aware access decisions beyond simple IAM authorization.

        **Why this matters**

        - **Context-aware access:** Without access levels, perimeter ingress rules cannot distinguish between trusted corporate traffic and requests from arbitrary external networks, forcing administrators to choose between overly broad access or blocking legitimate use cases.
        - **Zero-trust enablement:** Access levels evaluate request context such as source IP, device posture, and identity before granting access, implementing the zero-trust principle of verifying both who and where before allowing access to sensitive resources.
        - **Granular ingress control:** Access levels allow fine-grained policies that permit only managed devices or approved corporate IP ranges to cross perimeter boundaries, significantly reducing the risk from credential theft.
        - **Reduced reliance on IAM alone:** Combining access levels with IAM means that even a valid credential used from an untrusted network is denied at the perimeter before it reaches the service.

        **Risk mitigation**

        - **Credential theft mitigation:** Stolen credentials used from an unauthorized network are rejected at the perimeter because the access level conditions are not satisfied, even if the token is valid.
        - **Device-based control:** Access levels tied to device policy ensure only managed, compliant endpoints can access sensitive GCP services, blocking access from personal or compromised devices.
        - **Auditable access decisions:** Every access level evaluation is recorded in Cloud Audit Logs, giving security teams visibility into which conditions permitted or denied each cross-perimeter request.
      audit: |
        ### Audit via Console

        1. Sign in to the Google Cloud Console and navigate to **Security** > **VPC Service Controls**.
        2. Select the access policy.
        3. Select **Access Levels** and review the list.

        A passing organization shows at least one access level defined. A failing organization shows an empty access levels list.

        ### Audit via CLI

        1. List all access levels defined in the access policy:

        ```bash
        gcloud access-context-manager levels list --policy=POLICY_ID
        ```

        A passing organization returns one or more access level entries. A failing organization returns an empty list.
      remediation:
        - id: console
          desc: |
            To create a VPC Service Controls access level using the Google Cloud Console:

            1. Navigate to **Security > VPC Service Controls** in the Google Cloud Console.
            2. Select the access policy.
            3. Select **Access Levels**.
            4. Select **Create Access Level**.
            5. Enter a title for the access level.
            6. Under **Conditions**, configure the desired conditions (IP subnetworks, device policy, members, regions).
            7. Select **Save**.
        - id: cli
          desc: |
            To create a VPC Service Controls access level using the Google Cloud CLI:

            ```bash
            gcloud access-context-manager levels create ACCESS_LEVEL_NAME \
              --policy=POLICY_ID \
              --title="ACCESS_LEVEL_TITLE" \
              --basic-level-spec=CONDITION_FILE.yaml
            ```

            Replace `ACCESS_LEVEL_NAME` with a name, `POLICY_ID` with the access policy ID, and `CONDITION_FILE.yaml` with a YAML file defining the access level conditions. Example condition file:

            ```yaml
            - ipSubnetworks:
                - "203.0.113.0/24"
                - "198.51.100.0/24"
            ```
        - id: terraform
          desc: |
            To create a VPC Service Controls access level using Terraform:

            ```hcl
            resource "google_access_context_manager_access_level" "example" {
              parent = "accessPolicies/POLICY_ID"
              name   = "accessPolicies/POLICY_ID/accessLevels/example_level"
              title  = "example-access-level"

              basic {
                conditions {
                  ip_subnetworks = [
                    "203.0.113.0/24",
                    "198.51.100.0/24",
                  ]
                }
              }
            }
            ```

            Replace `POLICY_ID` with the access policy ID and adjust the IP ranges to match your trusted networks.
    refs:
      - url: https://cloud.google.com/vpc-service-controls/docs/access-levels
        title: Access levels overview
      - url: https://cloud.google.com/vpc-service-controls/docs/create-access-levels
        title: Create an access level
  - uid: mondoo-gcp-security-vpc-sc-access-levels-defined-gcp
    filters: asset.platform == 'gcp'
    mql: |
      gcp.organization.accessPolicies.any(accessLevels.length > 0)
  - uid: mondoo-gcp-security-cloud-storage-bucket-soft-delete-enabled
    title: Ensure Cloud Storage buckets have soft delete retention enabled
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-bcr-08
      compliance/dora: dora-art-12
      compliance/hipaa: hipaa-security-ss164-308-a-7-ii-a-contingency-plan-data-backup-plan
      compliance/iso-27001-2022: iso-27001-2022-a-8-13
      compliance/nis-2: nis-2-21-2-c
      compliance/nist-csf-1: nist-csf-1-pr-ip-4
      compliance/nist-csf-2: nist-csf-2-pr-ds-11
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cp-9
      compliance/nist-sp-800-171: nist-sp-800-171--3-8-9
      compliance/pci-dss-4: false
      compliance/soc2-2017: false
      compliance/vda-isa-5: vda-isa-5-3-1-2
    variants:
      - uid: mondoo-gcp-security-cloud-storage-bucket-soft-delete-enabled-gcp
        tags:
          mondoo.com/filter-title: GCP Cloud Storage
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-cloud-storage-bucket-soft-delete-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-storage-bucket-soft-delete-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-storage-bucket-soft-delete-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that every Cloud Storage bucket has soft delete retention configured with a positive retention duration. Soft delete retains deleted objects for a configurable period during which they can be restored, providing a recovery window against ransomware, accidental deletion, and malicious insiders. By default, newly created buckets have a 7-day soft delete period, but this can be set to zero, effectively disabling the feature.

        **Why this matters**

        - **Ransomware recovery:** Ransomware playbooks specifically target backup and archive buckets, deleting objects before or alongside encryption to eliminate recovery options; soft delete ensures deleted objects survive the attack window.
        - **Accidental deletion protection:** A misconfigured IaC pipeline or a compromised service account can wipe a production bucket in seconds; soft delete provides a time-bounded path to restore objects without relying on out-of-band backups.
        - **Hard delete coverage:** Object versioning protects against overwrites but does not prevent permanent deletion; soft delete is the dedicated control for the hard-delete threat.
        - **Incident response window:** Typical detection and response timelines exceed 24 hours; a retention period shorter than 7 days may not provide enough time to discover and recover from a deletion event.

        **Risk mitigation**

        - **Time-bounded recovery path:** Deleted objects remain restorable for the configured duration, giving incident responders a concrete window to act before data is permanently lost.
        - **Unified deletion protection:** Soft delete covers both accidental and malicious deletions with the same control, requiring no additional infrastructure such as cross-region replication.
        - **Minimal operational overhead:** Enabling soft delete requires setting a single retention parameter and imposes no changes to write paths or application code.
      audit: |
        ### Audit via Console

        1. Sign in to the Google Cloud Console and navigate to **Cloud Storage** > **Buckets**.
        2. Select a bucket, then go to the **Protection** tab.
        3. Under **Soft delete**, verify that a retention duration is configured (greater than zero).
        4. Repeat for each bucket in the project.

        A passing bucket shows a soft delete retention duration set to a positive value. A failing bucket shows soft delete as disabled or the retention duration as zero.

        ### Audit via CLI

        1. List all buckets in the project and inspect the soft delete policy for each:

        ```bash
        gcloud storage buckets list --format="table(name)"

        gcloud storage buckets describe gs://BUCKET_NAME \
          --format="table(name,softDeletePolicy)"
        ```

        A passing bucket returns a `softDeletePolicy` with a `retentionDurationSeconds` value greater than zero. A failing bucket returns a `softDeletePolicy` with `retentionDurationSeconds` of zero or a null soft delete policy.
      remediation:
        - id: terraform
          desc: |
            ```hcl
            resource "google_storage_bucket" "data" {
              name     = "my-bucket"
              location = "US"

              soft_delete_policy {
                # 14 days, expressed in seconds
                retention_duration_seconds = 1209600
              }
            }
            ```
        - id: console
          desc: |
            Enable soft delete on the bucket:

            1. Open **Cloud Storage** → **Buckets** → select the bucket → **Protection**.
            2. Under **Soft delete**, set a retention duration (default is 7 days; consider 14-30 days for production buckets).
            3. Save. Deleted objects are retained for the configured duration before permanent removal.
        - id: cli
          desc: |
            Enable soft delete via `gcloud`:

            ```bash
            gcloud storage buckets update gs://<bucket> --soft-delete-duration=14d
            ```
    refs:
      - url: https://cloud.google.com/storage/docs/soft-delete
        title: Cloud Storage - Soft delete
  - uid: mondoo-gcp-security-cloud-storage-bucket-soft-delete-enabled-gcp
    filters: asset.platform == 'gcp'
    mql: |
      gcp.project.storageService.buckets.all(
        softDeletePolicy != null &&
        softDeletePolicy['retentionDurationSeconds'] != null &&
        softDeletePolicy['retentionDurationSeconds'].to_int > 0
      )
  - uid: mondoo-gcp-security-cloud-storage-bucket-soft-delete-enabled-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_storage_bucket')
    mql: |
      terraform.resources('google_storage_bucket').all(
        blocks.where(type == 'soft_delete_policy') != empty &&
        blocks.where(type == 'soft_delete_policy').all(arguments.retention_duration_seconds > 0)
      )
  - uid: mondoo-gcp-security-cloud-storage-bucket-soft-delete-enabled-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_storage_bucket')
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_storage_bucket').all(
        change.after['soft_delete_policy'] != empty &&
        change.after['soft_delete_policy'].any(_['retention_duration_seconds'] > 0)
      )
  - uid: mondoo-gcp-security-cloud-storage-bucket-soft-delete-enabled-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'google_storage_bucket')
    mql: |
      terraform.state.resources.where(type == 'google_storage_bucket').all(
        values['soft_delete_policy'] != empty &&
        values['soft_delete_policy'].any(_['retention_duration_seconds'] > 0)
      )
  # No Terraform variants: the runtime check inspects bucket-level objectRetentionMode
  # (per-object retention feature). Terraform only exposes enable_object_retention (bool)
  # at bucket creation; per-object lock state is set via the API/CLI after upload and is
  # not expressible in HCL/plan/state. The bucket-level retention_policy.is_locked
  # behavior is a separate feature and already covered by
  # mondoo-gcp-security-cloud-storage-bucket-retention-policy-locked.
  - uid: mondoo-gcp-security-cloud-storage-bucket-object-retention-locked
    title: Ensure Cloud Storage buckets with object retention have it locked
    impact: 70
    filters: asset.platform == 'gcp'
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-bcr-08
      compliance/dora: dora-art-12
      compliance/hipaa: hipaa-security-ss164-308-a-7-ii-a-contingency-plan-data-backup-plan
      compliance/iso-27001-2022: iso-27001-2022-a-8-13
      compliance/nis-2: nis-2-21-2-c
      compliance/nist-csf-1: nist-csf-1-pr-ip-4
      compliance/nist-csf-2: nist-csf-2-pr-ds-11
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cp-9
      compliance/nist-sp-800-171: nist-sp-800-171--3-8-9
      compliance/pci-dss-4: false
      compliance/soc2-2017: false
      compliance/vda-isa-5: false
    mql: |
      gcp.project.storageService.buckets.where(objectRetentionMode != "").all(
        objectRetentionMode == "Enabled"
      )
    docs:
      desc: |
        This check ensures that Cloud Storage buckets with object retention enabled have that retention mode set to `Enabled` (locked). An unlocked object-retention configuration can be removed or shortened by any principal with bucket-admin permissions, defeating the write-once-read-many guarantee the bucket is intended to enforce. Buckets without object retention configured at all are out of scope for this check.

        **Why this matters**

        - **Admin-tier ransomware resistance:** Ransomware actors routinely escalate to bucket-admin permissions before destroying data; locked object retention is enforced by the service and cannot be shortened or removed even by a full project owner.
        - **Regulatory WORM integrity:** A retention policy implemented as an unlockable metadata flag provides only procedural, not technical, write-once guarantees; it can be edited away by the same principal that could delete objects, making it useless against active attackers.
        - **Compliance enforcement:** Regulations such as SEC Rule 17a-4 and HIPAA backup integrity requirements mandate technically enforced retention that survives administrative compromise, not just a policy setting that can be toggled.
        - **Recovery guarantees:** Locked retention means that objects within their retention period cannot be deleted by any API call, providing a concrete guarantee that complements soft delete and versioning.

        **Risk mitigation**

        - **Compromise-resistant retention:** Locked retention enforced at the service level survives full compromise of the bucket's administrative identity, giving incident responders access to unmodified objects even after an attack.
        - **Regulatory safe harbor:** Technically enforced WORM satisfies retention obligations in regulatory frameworks that require immutability that cannot be waived by an administrator.
        - **Ransomware recovery guarantee:** Objects protected by locked retention remain accessible and restorable regardless of what an attacker does to the bucket's metadata, access controls, or retention settings.
      audit: |
        ### Audit via Console

        1. Sign in to the Google Cloud Console and navigate to **Cloud Storage** > **Buckets**.
        2. Select a bucket, then go to the **Protection** tab.
        3. Under **Object retention**, check whether the mode is set to **Enabled** (locked).
        4. Repeat for each bucket that has object retention configured.

        A passing bucket with object retention shows the mode as **Enabled** (locked). A failing bucket shows object retention present but in an unlocked or removable state.

        ### Audit via CLI

        1. Describe the bucket and inspect the `objectRetentionMode` field:

        ```bash
        gcloud storage buckets describe gs://BUCKET_NAME \
          --format="table(name,objectRetentionMode)"
        ```

        A passing bucket with object retention returns `objectRetentionMode: Enabled`. A failing bucket returns an `objectRetentionMode` that is present but not `Enabled`, meaning the retention is not locked.
      remediation:
        - id: terraform
          desc: |
            Enable per-object retention at bucket creation (cannot be added to an existing bucket):

            ```hcl
            resource "google_storage_bucket" "archive" {
              name                     = "my-archive"
              location                 = "US"
              enable_object_retention  = true
            }
            ```

            Lock retention is configured per-object via the API/CLI after upload. Set `retention.mode = "Locked"` on the relevant objects to prevent shortening or removal.
        - id: console
          desc: |
            Enable and lock object retention at bucket creation time (object retention cannot be added to an existing bucket):

            1. Create a replacement bucket with **Object retention** enabled.
            2. Migrate objects via `gcloud storage cp -r gs://<old>/* gs://<new>/`.
            3. Lock the retention via the API (locked retention cannot be shortened or disabled).
            4. Delete the old bucket once traffic has cut over.
        - id: cli
          desc: |
            Create a bucket with object retention enabled:

            ```bash
            gcloud storage buckets create gs://<bucket> --enable-per-object-retention
            ```
    refs:
      - url: https://cloud.google.com/storage/docs/object-lock
        title: Cloud Storage - Object retention (Bucket Lock)
  - uid: mondoo-gcp-security-cloud-kms-key-access-justifications-strict
    title: Ensure KMS key access justifications exclude customer-initiated support
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-10
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-11
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-gcp-security-cloud-kms-key-access-justifications-strict-gcp
        tags:
          mondoo.com/filter-title: GCP Cloud KMS
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-cloud-kms-key-access-justifications-strict-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-kms-key-access-justifications-strict-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-kms-key-access-justifications-strict-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that no Cloud KMS crypto key includes `CUSTOMER_INITIATED_SUPPORT` in its Key Access Justifications allowed access reasons. Key Access Justifications require every key access request to include a business reason code; allowing `CUSTOMER_INITIATED_SUPPORT` means that opening a Google support case implicitly pre-authorizes Google support staff to access key material without a more specific per-request approval from the customer.

        **Why this matters**

        - **Implicit access grant:** `CUSTOMER_INITIATED_SUPPORT` is the broadest allowed reason; including it means any open support case creates an implicit authorization for key access, bypassing the explicit per-operation approval model that Key Access Justifications are designed to enforce.
        - **Data sovereignty risk:** Organizations operating under HIPAA, GDPR, or EU data sovereignty requirements often prohibit third-party access to encryption key material outside of explicit, logged, per-request customer approval; this reason code undermines that commitment.
        - **Operational transparency:** Removing this reason does not prevent Google from providing support; it requires Google engineers to obtain explicit customer approval when key access is genuinely needed for a support case, producing a logged and traceable event.
        - **Principle of least privilege for key access:** Restricting allowed justifications to narrower reasons such as `CUSTOMER_INITIATED_ACCESS` and `GOOGLE_INITIATED_SYSTEM_OPERATION` ensures every decryption is tied to a specific, auditable purpose.

        **Risk mitigation**

        - **Narrow, auditable access:** Every key access attempt is matched to a precise justification code, making it possible to detect and investigate any access that does not correspond to a known business event.
        - **Explicit approval for support escalations:** Requiring explicit customer approval when key access is needed for support creates a traceable record that the customer was aware of and consented to the specific decryption.
        - **Regulatory alignment:** Excluding implicit support access reasons aligns the KMS posture with data sovereignty commitments and regulatory requirements that mandate customer control over encryption key access.
      audit: |
        ### Audit via Console

        1. Sign in to the Google Cloud Console and navigate to **Security** > **Key Management**.
        2. Select a key ring, then select a crypto key.
        3. View the key details and locate the **Access justifications policy** section.
        4. Check whether `CUSTOMER_INITIATED_SUPPORT` appears in the allowed access reasons list.
        5. Repeat for every key ring and crypto key in the project.

        A passing key either has no Key Access Justifications policy configured, or has a policy that does not include `CUSTOMER_INITIATED_SUPPORT` in its allowed reasons. A failing key has `CUSTOMER_INITIATED_SUPPORT` listed as an allowed access reason.

        ### Audit via CLI

        1. List all key rings, then describe each crypto key to inspect its access justifications policy:

        ```bash
        gcloud kms keyrings list --location=LOCATION

        gcloud kms keys describe KEY_NAME \
          --keyring=KEYRING_NAME \
          --location=LOCATION \
          --format="table(name,keyAccessJustificationsPolicy)"
        ```

        A passing key returns a `keyAccessJustificationsPolicy` that omits `CUSTOMER_INITIATED_SUPPORT` from `allowedAccessReasons`, or returns no policy at all. A failing key returns `allowedAccessReasons` that includes `CUSTOMER_INITIATED_SUPPORT`.
      remediation:
        - id: terraform
          desc: |
            Set the key's `key_access_justifications_policy` allowed reasons explicitly, omitting `CUSTOMER_INITIATED_SUPPORT`:

            ```hcl
            resource "google_kms_crypto_key" "key" {
              name     = "my-key"
              key_ring = google_kms_key_ring.keyring.id

              key_access_justifications_policy {
                allowed_access_reasons = [
                  "CUSTOMER_INITIATED_ACCESS",
                  "GOOGLE_INITIATED_SYSTEM_OPERATION",
                ]
              }
            }
            ```
        - id: console
          desc: |
            Remove `CUSTOMER_INITIATED_SUPPORT` from the key's allowed access reasons:

            1. Open **Security** → **Key Management** → select the keyring → the crypto key.
            2. **Edit key** → **Access justifications policy**.
            3. Remove `CUSTOMER_INITIATED_SUPPORT` from the allowed list. Retain only reasons your governance model pre-approves (typically `CUSTOMER_INITIATED_ACCESS` and `GOOGLE_INITIATED_SYSTEM_OPERATION`).
            4. Save.
        - id: cli
          desc: |
            Update a KMS key's access justifications policy:

            ```bash
            gcloud kms keys update <key> \
              --keyring=<keyring> \
              --location=<region> \
              --allowed-access-reasons=CUSTOMER_INITIATED_ACCESS,GOOGLE_INITIATED_SYSTEM_OPERATION
            ```
    refs:
      - url: https://cloud.google.com/kms/docs/key-access-justifications
        title: Cloud KMS - Key Access Justifications
  - uid: mondoo-gcp-security-cloud-kms-key-access-justifications-strict-gcp
    filters: asset.platform == 'gcp'
    mql: |
      gcp.project.kmsService.keyrings.all(
        cryptokeys.all(
          keyAccessJustificationsPolicy == null ||
          keyAccessJustificationsPolicy['allowedAccessReasons'] == null ||
          keyAccessJustificationsPolicy['allowedAccessReasons'].none(_ == "CUSTOMER_INITIATED_SUPPORT")
        )
      )
