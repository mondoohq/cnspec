          mondoo.com/filter-title: GCP BigQuery Dataset
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-bigquery-models-cmek-encryption-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-bigquery-models-cmek-encryption-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-bigquery-models-cmek-encryption-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that all BigQuery ML models within a dataset are encrypted with a customer-managed encryption key (CMEK) by verifying that the parent dataset is configured with a CMEK default, under which models inherit encryption. By default, BigQuery ML models are encrypted with Google-managed keys; models inherit CMEK only when the dataset's `defaultEncryptionConfiguration` specifies a Cloud KMS key.

        **Why this matters**

        - **Sensitive data embedded in models:** ML models trained on PII, financial data, or health records may expose sensitive information through predictions, embeddings, or model parameters; CMEK ensures this data remains under organizational key control.
        - **Consistent encryption posture:** Encrypting datasets and tables with CMEK while leaving models on Google-managed keys creates an encryption gap that undermines the organization's overall data protection strategy.
        - **Key revocation coverage:** Disabling the CMEK key on a dataset prevents access to CMEK-encrypted models, giving the organization a hard revocation path for all BigQuery resources including trained models.
        - **Compliance audit completeness:** Compliance frameworks that require CMEK for data at rest typically extend this requirement to all data artifacts; models holding trained weights represent a class of artifact that auditors will examine.

        **Risk mitigation**

        - **Set a dataset-level CMEK default:** Configuring `defaultEncryptionConfiguration.kmsKeyName` on the parent dataset ensures all models created within that dataset automatically inherit CMEK.
        - **Re-create models in CMEK-protected datasets:** Existing models trained before a CMEK default was set must be re-trained or re-created within the CMEK-protected dataset to receive customer-managed encryption.
        - **Monitor for new models without CMEK:** Continuously scan for models lacking a CMEK key and alert when new models are created outside of CMEK-enabled datasets.
      audit: |
        ### Audit via Console

        1. In the Google Cloud console, go to the **BigQuery** page.
        2. In the Explorer panel, expand your project and dataset, then select a model.
        3. Review the model details to inspect the encryption configuration.
        4. Confirm the encryption type shows **Customer-managed** with a Cloud KMS key name.

        A passing model shows customer-managed encryption with a Cloud KMS key name. A failing model shows Google-managed encryption with no CMEK configured.

        ### Audit via CLI

        1. List models in a dataset:

        ```bash
        bq ls --models PROJECT_ID:DATASET_ID
        ```

        2. Show the details of a specific model:

        ```bash
        bq show --format=prettyjson --model PROJECT_ID:DATASET_ID.MODEL_ID
        ```

        3. Review the `encryptionConfiguration` field in the output for a `kmsKeyName` value.

        A passing model returns an `encryptionConfiguration` object with a non-empty `kmsKeyName` field. A failing model returns no `encryptionConfiguration` field or an empty `kmsKeyName`.
      remediation:
        - id: terraform
          desc: |
            To ensure all BigQuery models are encrypted with CMEK in Terraform, configure CMEK encryption on the BigQuery dataset so all models inherit customer-managed encryption:

            ```hcl
            resource "google_bigquery_dataset" "example" {
              dataset_id = "example_dataset"
              location   = "US"

              default_encryption_configuration {
                kms_key_name = google_kms_crypto_key.example.id
              }
            }

            resource "google_kms_crypto_key" "example" {
              name     = "example-key"
              key_ring = google_kms_key_ring.example.id
            }

            resource "google_kms_key_ring" "example" {
              name     = "example-keyring"
              location = "US"
            }
            ```
        - id: console
          desc: |
            To ensure all BigQuery models are encrypted with CMEK using the Google Cloud Console:

            1. In the Google Cloud console, go to the **BigQuery** page.
            2. Navigate to the dataset containing the model.
            3. Review the model's encryption configuration.
            4. If the model uses Google-managed encryption, recreate the model with a CMEK-encrypted dataset default or specify CMEK during model creation.
        - id: cli
          desc: |
            To ensure all BigQuery models are encrypted with CMEK using the Google Cloud CLI:

            1. Ensure the dataset has a default CMEK configured so all new models inherit it:

            ```bash
            bq update --default_kms_key=projects/PROJECT_ID/locations/LOCATION/keyRings/KEY_RING/cryptoKeys/KEY PROJECT_ID:DATASET_ID
            ```

            2. Recreate existing models within the CMEK-protected dataset to ensure they use customer-managed encryption.
    refs:
      - url: https://cloud.google.com/bigquery/docs/best-practices-security
        title: BigQuery Security Best Practices
