  - uid: mondoo-gcp-security-iam-no-user-managed-service-account-keys
    title: Ensure user-managed service account keys are not created
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-06
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-5-17
      compliance/nis-2: nis-2-21-2-g
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-5
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-10
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-9
      compliance/vda-isa-5: vda-isa-5-4-1-3
    variants:
      - uid: mondoo-gcp-security-iam-no-user-managed-service-account-keys-gcp
        tags:
          mondoo.com/filter-title: GCP IAM Service Account
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-iam-no-user-managed-service-account-keys-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-iam-no-user-managed-service-account-keys-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-iam-no-user-managed-service-account-keys-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that user-managed service account keys are not created in the Google Cloud project. Google-managed keys and Workload Identity Federation are the safer alternatives because user-managed keys are long-lived static credentials that, once leaked, give an attacker persistent and hard-to-revoke access.

        **Why this matters**

        - **Persistent credential exposure:** Unlike Google-managed keys, user-managed keys do not automatically rotate and have no built-in expiration, so a stolen key remains valid indefinitely.
        - **Wide blast radius:** Compromised keys grant full access to all resources the service account can reach, and revocation requires discovering every copy of the key.
        - **Common exfiltration target:** Keys are frequently leaked through source code repositories, container images, CI/CD logs, or error messages.
        - **Audit opacity:** Key-based authentication is indistinguishable from legitimate use, making unauthorized access difficult to detect.

        **Risk mitigation**

        - **Use Workload Identity Federation:** Replace user-managed keys with federated credentials for external workloads so no long-lived key material is ever created.
        - **Attach service accounts directly:** For GCP workloads, use attached service accounts with Google-managed keys instead of exporting key files.
        - **Monitor key creation events:** Set up Cloud Audit Log alerts for any new user-managed key creation so exceptions are detected immediately.
      audit: |
        ### Audit via Console

        1. Sign in to the [Google Cloud Console](https://console.cloud.google.com) and open the target project.
        2. Navigate to **IAM & Admin > Service Accounts**.
        3. For each service account, select the account and open the **Keys** tab.
        4. Review the list of keys and check the **Key type** column.

        A passing service account has no keys with **User managed** as the key type. A failing service account has one or more **User managed** keys listed.

        ### Audit via CLI

        1. List all service accounts, then check each for user-managed keys:

        ```bash
        gcloud iam service-accounts list --format="value(email)" | while read SA; do
          gcloud iam service-accounts keys list --iam-account="$SA" --managed-by=user --format="table(name,keyType,validAfterTime)"
        done
        ```

        A passing service account returns no rows when filtered by `--managed-by=user`. A failing service account returns one or more key entries.
      remediation:
        - id: terraform
          desc: |
            To ensure user-managed service account keys are not created in Terraform, avoid creating `google_service_account_key` resources. Instead, use attached service accounts:

            ```hcl
            resource "google_service_account" "example" {
              account_id   = "my-custom-sa"
              display_name = "Custom SA"
            }

            resource "google_compute_instance" "example" {
              name         = "example-instance"
              machine_type = "e2-medium"
              zone         = "us-central1-a"

              service_account {
                email  = google_service_account.example.email
                scopes = ["cloud-platform"]
              }

              boot_disk {
                initialize_params {
                  image = "debian-cloud/debian-11"
                }
              }

              network_interface {
                network = "default"
              }
            }
            ```

            Remove any existing `google_service_account_key` resources from your Terraform configuration.
        - id: console
          desc: |
            To ensure user-managed service account keys are not created using the Google Cloud Console:

            1. Navigate to **IAM & Admin > Service Accounts** in the Google Cloud Console.
            2. Select each service account and go to the **Keys** tab.
            3. Identify and delete any user-managed keys.
            4. Migrate workloads to use attached service accounts or Workload Identity Federation.
        - id: cli
          desc: |
            To ensure user-managed service account keys are not created using the Google Cloud CLI, list all user-managed keys for a service account:

            ```bash
            gcloud iam service-accounts keys list --iam-account=SA_EMAIL --managed-by=user
            ```

            Delete a user-managed key:

            ```bash
            gcloud iam service-accounts keys delete KEY_ID --iam-account=SA_EMAIL
            ```
    refs:
      - url: https://cloud.google.com/iam/docs/best-practices-for-managing-service-account-keys
        title: Best practices for managing service account keys
      - url: https://cloud.google.com/iam/docs/service-account-overview
        title: Service account overview
  - uid: mondoo-gcp-security-iam-no-user-managed-service-account-keys-gcp
    filters: asset.platform == 'gcp-iam-service-account'
    mql: |
      gcp.project.iam.serviceAccount.keys.where(keyType == "USER_MANAGED").length == 0
  - uid: mondoo-gcp-security-iam-no-user-managed-service-account-keys-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl'
    mql: |
      terraform.resources.where(nameLabel == 'google_service_account_key').length == 0
