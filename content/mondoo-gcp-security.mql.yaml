        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Bigtable clusters are configured to use customer-managed encryption keys (CMEK) for all data stored in the cluster. By default, Bigtable encrypts data at rest with Google-managed keys, which organizations cannot rotate on a custom schedule or revoke independently.

        **Why this matters**

        - **Key control:** CMEK gives organizations authority over the encryption key lifecycle, including the ability to set rotation policies that align with internal security requirements rather than Google's defaults.
        - **Revocability:** Disabling or destroying the Cloud KMS key immediately blocks access to all data in the cluster, providing a rapid containment mechanism unavailable with Google-managed encryption.
        - **Audit visibility:** Key usage is recorded in Cloud Audit Logs for Cloud KMS, enabling organizations to trace every encryption and decryption operation on cluster data.
        - **Compliance alignment:** Analytical and operational data stores containing sensitive information often fall under regulatory requirements that mandate customer-controlled encryption keys.

        **Risk mitigation**

        - **Data exfiltration:** Revoking the CMEK key terminates data access even when database credentials remain active, providing a containment lever that outpaces credential rotation.
        - **Insider threat:** Separating key management from data access means that compromise of Bigtable credentials alone is insufficient to decrypt stored data.
      audit: |
        ### Audit via Console

        1. Go to the **Bigtable** page in the Google Cloud Console.
        2. Select an instance and navigate to the **Clusters** tab.
        3. For each cluster, review the **Encryption** column and verify it shows a customer-managed key.

        A passing Bigtable cluster shows a CMEK key name in the Encryption column. A failing cluster shows **Google-managed** or no custom key configured.

        ### Audit via CLI

        1. List Bigtable instances, then describe each instance to review cluster encryption:

        ```bash
        gcloud bigtable instances list --format="table(name,displayName,state)"
        ```

        2. For each instance, describe the clusters to check for CMEK:

        ```bash
        gcloud bigtable clusters list --instances=INSTANCE_ID \
          --format="table(name,zone,state,encryptionInfo.kmsKeyName)"
        ```

        A passing Bigtable cluster returns a non-empty `KMS_KEY_NAME`. A failing cluster returns an empty `KMS_KEY_NAME`.
      remediation:
        - id: terraform
          desc: |
            To ensure Bigtable clusters are encrypted with CMEK in Terraform, note: CMEK must be configured at cluster creation time.

            ```hcl
            resource "google_bigtable_instance" "instance" {
              name = "my-instance"

              cluster {
                cluster_id   = "my-cluster"
                zone         = "us-central1-a"
                num_nodes    = 3
                storage_type = "SSD"
                kms_key_name = google_kms_crypto_key.bigtable_key.id
              }
            }
            ```
        - id: console
          desc: |
            To ensure Bigtable clusters are encrypted with CMEK using the Google Cloud Console, note: CMEK must be configured at cluster creation time.

            1. Go to the **Bigtable** page in the Google Cloud Console.
            2. Select **Create Instance**.
            3. Under **Encryption**, select **Customer-managed encryption key (CMEK)**.
            4. Select or create a Cloud KMS key for each cluster.
            5. Complete the instance creation.
        - id: cli
          desc: |
            To ensure Bigtable clusters are encrypted with CMEK using the Google Cloud CLI, note: CMEK must be configured at cluster creation time.

            ```bash
            cbt createinstance INSTANCE_ID DISPLAY_NAME \
              CLUSTER_ID ZONE NUM_NODES SSD \
              --kms-key=projects/PROJECT/locations/LOCATION/keyRings/RING/cryptoKeys/KEY
            ```
