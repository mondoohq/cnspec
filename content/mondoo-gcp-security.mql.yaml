  - uid: mondoo-gcp-security-appengine-iap-or-vpc-only-ingress
    title: Ensure App Engine apps require IAP or internal-only ingress
    impact: 30
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-gcp-security-appengine-iap-or-vpc-only-ingress-gcp
        tags:
          mondoo.com/filter-title: GCP App Engine
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-appengine-iap-or-vpc-only-ingress-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-appengine-iap-or-vpc-only-ingress-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-appengine-iap-or-vpc-only-ingress-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that App Engine workloads are protected from arbitrary internet access by requiring either Identity-Aware Proxy (IAP) to be enabled or the service's ingress setting to be restricted to internal-only or internal-and-load-balancer traffic. By default, App Engine services are reachable from the public internet with no network-level access control.

        **Why this matters**

        - **Default exposure is broad:** New App Engine services accept traffic from any host on the internet unless ingress is explicitly restricted, making them immediately reachable by scanners, crawlers, and attack tooling.
        - **Back-office workloads should not be public:** Many App Engine deployments serve internal dashboards, partner integrations, or API backends that have no legitimate need for direct internet exposure.
        - **IAP enforces identity before the application:** Enabling IAP places a Google-managed authentication gate in front of the service so only verified principals from the organization can reach it, regardless of application-level auth.
        - **Ingress restriction eliminates the network path entirely:** Setting ingress to `INGRESS_TRAFFIC_ALLOWED_INTERNAL_ONLY` or `INGRESS_TRAFFIC_ALLOWED_INTERNAL_AND_LB` removes direct internet reachability at the infrastructure level, complementing application-layer controls.

        **Risk mitigation**

        - **Enable IAP for identity-gated access:** Configure IAP on the App Engine application and grant the `IAP-secured Web App User` role only to the principals that legitimately need access.
        - **Restrict ingress for internal workloads:** For services that should never accept internet traffic, set the ingress control to `INGRESS_TRAFFIC_ALLOWED_INTERNAL_ONLY` so that only traffic originating from the VPC can reach the service.
        - **Layer controls:** Combine network-level ingress restriction with strong application authentication and authorization so that a misconfiguration in one layer does not create a full exposure.
      audit: |
        ### Audit via Console

        1. In the Google Cloud Console, go to **App Engine > Services**.
        2. For each service, review the **Ingress** column or open the service and check **Network ingress controls**.
        3. Verify that ingress is set to **Internal only** or **Internal and Cloud Load Balancing**.
        4. Alternatively, go to **Security > Identity-Aware Proxy**, locate the App Engine application, and confirm that IAP is toggled on.

        A passing App Engine service shows an ingress setting of **Internal only** or **Internal and Cloud Load Balancing**, or has IAP enabled. A failing service shows **All** ingress with IAP disabled.

        ### Audit via CLI

        1. Check the IAP status for the App Engine application:

        ```bash
        gcloud iap settings get \
          --resource-type=app-engine \
          --project=PROJECT_ID
        ```

        2. Check the ingress configuration for each App Engine service:

        ```bash
        gcloud app services describe SERVICE_NAME \
          --format='value(networkSettings.ingressTrafficAllowed)'
        ```

        A passing service returns `INGRESS_TRAFFIC_ALLOWED_INTERNAL_ONLY` or `INGRESS_TRAFFIC_ALLOWED_INTERNAL_AND_LB` from the ingress check, or shows IAP enabled. A failing service returns `INGRESS_TRAFFIC_ALLOWED_ALL` with IAP disabled.
      remediation:
        - id: terraform
          desc: |
            To restrict App Engine ingress in Terraform, set `ingress_traffic_allowed` on the service network settings:

            ```hcl
            resource "google_app_engine_service_network_settings" "internal" {
              service = "default"

              network_settings {
                ingress_traffic_allowed = "INGRESS_TRAFFIC_ALLOWED_INTERNAL_ONLY"
              }
            }
            ```

            `INGRESS_TRAFFIC_ALLOWED_INTERNAL_AND_LB` is also acceptable when an internal load balancer is required.
        - id: console
          desc: |
            To restrict App Engine ingress using the Google Cloud Console:

            1. In the Google Cloud Console, go to **App Engine** > **Services**.
            2. Select the service that should not be publicly reachable.
            3. Open **Network ingress controls**.
            4. Set ingress to **Internal only** or **Internal and Cloud Load Balancing**.
            5. Save.

            To enable IAP for App Engine:

            1. In the Google Cloud Console, go to **Security** > **Identity-Aware Proxy**.
            2. Locate the App Engine application and toggle IAP on.
            3. Grant the **IAP-secured Web App User** role only to the principals that should reach the app.
        - id: cli
          desc: |
            To restrict App Engine ingress using the Google Cloud CLI:

            ```bash
            gcloud app services update SERVICE_NAME --ingress=internal-only
            ```

            `internal-and-cloud-load-balancing` is also acceptable when an internal load balancer is required.
    refs:
      - url: https://cloud.google.com/appengine/docs/standard/application-security
        title: App Engine application security
      - url: https://cloud.google.com/iap/docs/enabling-app-engine
        title: Enabling IAP for App Engine
