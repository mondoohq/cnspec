    mql: |
      terraform.state.resources.where(type == 'google_logging_project_bucket_config').all(
        values.locked == true
      )
  - uid: mondoo-gcp-security-logging-bucket-cmek-encryption
    title: Ensure Cloud Logging log buckets are encrypted with CMEK
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-gcp-security-logging-bucket-cmek-encryption-gcp
        tags:
          mondoo.com/filter-title: GCP Logging Bucket
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-logging-bucket-cmek-encryption-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-logging-bucket-cmek-encryption-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-logging-bucket-cmek-encryption-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Cloud Logging log buckets are encrypted using customer-managed encryption keys (CMEK) rather than default Google-managed keys. Google-managed encryption is applied automatically, but it does not give the organization control over key rotation, access, or revocation.

        **Why this matters**

        - **Key lifecycle control:** CMEK lets the organization rotate, restrict, or revoke the encryption key independently, allowing access to log data to be terminated even after logs are written.
        - **Compliance requirements:** Frameworks such as PCI DSS, HIPAA, and SOC 2 may require customer-managed encryption for sensitive data at rest, including audit logs.
        - **Encryption auditability:** All CMEK key usage operations are recorded in Cloud KMS audit logs, providing a verifiable record of who accessed encrypted log data and when.
        - **Separation of duties:** Storing the encryption key in Cloud KMS under a separate IAM policy from the log bucket supports separation of duties between log administrators and key administrators.

        **Risk mitigation**

        - **Configure CMEK on sensitive buckets:** Prioritize CMEK for buckets storing compliance-relevant or security-critical logs where key revocation capability matters.
        - **Manage keys with appropriate IAM:** Apply least-privilege IAM policies on the Cloud KMS key so that only authorized principals can use or manage the key.
        - **Monitor key usage:** Enable Cloud KMS audit logs and alert on unexpected key operations to detect unauthorized decryption attempts.
      audit: |
        ### Audit via Console

        1. Sign in to the [Google Cloud Console](https://console.cloud.google.com) and open the target project.
        2. Navigate to **Logging > Logs Storage**.
        3. Select each log bucket and review the **Encryption** section in the bucket details.
        4. Check whether a **Customer-managed encryption key** is configured.

        A passing log bucket displays a Cloud KMS key resource name in the encryption section. A failing log bucket shows no customer-managed key (Google-managed encryption only).

        ### Audit via CLI

        1. Describe each log bucket and check for the `cmekSettings` field:

        ```bash
        gcloud logging buckets describe BUCKET_ID --location=LOCATION \
          --format="value(cmekSettings.kmsKeyName)"
        ```

        A passing log bucket returns a non-empty Cloud KMS key resource name. A failing log bucket returns an empty value.
      remediation:
        - id: terraform
          desc: |
            To ensure Cloud Logging log buckets are encrypted with CMEK in Terraform:

            ```hcl
            resource "google_logging_project_bucket_config" "example" {
              project        = var.project_id
              location       = "global"
              bucket_id      = "my-log-bucket"
              retention_days = 30

              cmek_settings {
                kms_key_name = google_kms_crypto_key.example.id
              }
            }
            ```
        - id: console
          desc: |
            To ensure Cloud Logging log buckets are encrypted with CMEK using the Google Cloud Console:

            1. Navigate to **Logging > Logs Storage** in the Google Cloud Console.
            2. Select the log bucket to update.
            3. Select **Edit**.
            4. Under **Encryption**, select **Customer-managed encryption key**.
            5. Select or create a Cloud KMS key.
            6. Select **Update bucket**.
        - id: cli
          desc: |
            To ensure Cloud Logging log buckets are encrypted with CMEK using the Google Cloud CLI, update a log bucket with CMEK:

            ```bash
            gcloud logging buckets update BUCKET_ID \
              --location=LOCATION \
              --cmek-kms-key-name=projects/PROJECT/locations/LOCATION/keyRings/RING/cryptoKeys/KEY
            ```
    refs:
      - url: https://cloud.google.com/logging/docs/routing/managed-encryption-storage
        title: Customer-managed encryption keys for Cloud Logging
  - uid: mondoo-gcp-security-logging-bucket-cmek-encryption-gcp
    filters: asset.platform == 'gcp-logging-bucket'
    mql: |
      gcp.project.loggingservice.bucket.kmsKey != null
  - uid: mondoo-gcp-security-logging-bucket-cmek-encryption-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_logging_project_bucket_config')
    mql: |
      terraform.resources('google_logging_project_bucket_config').all(
        blocks.where(type == 'cmek_settings') != empty &&
        blocks.where(type == 'cmek_settings').all(arguments.kms_key_name != empty)
      )
  - uid: mondoo-gcp-security-logging-bucket-cmek-encryption-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_logging_project_bucket_config')
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_logging_project_bucket_config').all(
        change.after.cmek_settings != empty
      )
  - uid: mondoo-gcp-security-logging-bucket-cmek-encryption-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'google_logging_project_bucket_config')
    mql: |
      terraform.state.resources.where(type == 'google_logging_project_bucket_config').all(
        values.cmek_settings != empty
      )
  - uid: mondoo-gcp-security-logging-sinks-configured
    title: Ensure Cloud Logging has at least one sink configured for log export
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-07
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-pr-pt-1
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    variants:
      - uid: mondoo-gcp-security-logging-sinks-configured-gcp
        tags:
          mondoo.com/filter-title: GCP
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-logging-sinks-configured-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-logging-sinks-configured-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-logging-sinks-configured-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that at least one Cloud Logging sink is configured in the project to export logs to an external destination. Without a sink, logs are only available within Cloud Logging for the default retention period, making long-term retention, centralized analysis, and SIEM integration impossible.

        **Why this matters**

        - **Retention beyond defaults:** Default log retention of 30 days is insufficient for forensic investigations and many compliance requirements, and sinks are required to preserve logs beyond that window.
        - **Cross-project correlation:** Centralized log analysis across multiple GCP projects depends on sinks routing logs to a shared destination such as BigQuery or a central log bucket.
        - **SIEM integration:** Security Information and Event Management platforms receive GCP log data exclusively through log sinks; without them, security monitoring has no visibility into GCP activity.
        - **Real-time threat detection:** Sinks to Pub/Sub enable streaming of logs to automated detection and response pipelines.

        **Risk mitigation**

        - **Configure at least one sink:** Route security-critical logs to Cloud Storage, BigQuery, or Pub/Sub to establish a baseline export configuration.
        - **Prefer organization-level sinks:** Use aggregated sinks at the organization or folder level to provide consistent log export across all projects without per-project configuration.
        - **Monitor sink health:** Verify that sink destinations remain accessible and that the sink is not silently dropping log data due to permission or capacity issues.
      audit: |
        ### Audit via Console

        1. Sign in to the [Google Cloud Console](https://console.cloud.google.com) and open the target project.
        2. Navigate to **Logging > Log Router**.
        3. Review the list of sinks, excluding the system-managed `_Required` and `_Default` sinks.

        A passing project has at least one custom log sink configured and active. A failing project has no custom log sinks, showing only the built-in system sinks.

        ### Audit via CLI

        1. List all log sinks in the project:

        ```bash
        gcloud logging sinks list --format="table(name,destination,filter)"
        ```

        A passing project returns at least one sink with a name other than `_Required` or `_Default`. A failing project returns no rows, or only system-managed sinks.
      remediation:
        - id: terraform
          desc: |
            To ensure Cloud Logging has at least one sink configured for log export in Terraform, configure a log sink:

            ```hcl
            resource "google_logging_project_sink" "audit_sink" {
              name                   = "audit-log-sink"
              destination            = "storage.googleapis.com/${google_storage_bucket.audit_logs.name}"
              filter                 = "logName:\"cloudaudit.googleapis.com\""
              unique_writer_identity = true
            }
            ```
        - id: console
          desc: |
            To ensure Cloud Logging has at least one sink configured for log export using the Google Cloud Console:

            1. Navigate to **Logging > Log Router** in the Google Cloud Console.
            2. Select **Create Sink**.
            3. Enter a sink name and optional description.
            4. Select a destination (Cloud Storage, BigQuery, Pub/Sub, or another project's log bucket).
            5. Optionally add an inclusion or exclusion filter.
            6. Select **Create Sink**.
        - id: cli
          desc: |
            To ensure Cloud Logging has at least one sink configured for log export using the Google Cloud CLI, create a log sink to Cloud Storage:

            ```bash
            gcloud logging sinks create SINK_NAME storage.googleapis.com/BUCKET_NAME \
              --log-filter='logName:"cloudaudit.googleapis.com"'
            ```
    refs:
      - url: https://cloud.google.com/logging/docs/export
        title: Routing and storage overview
      - url: https://cloud.google.com/logging/docs/export/configure_export_v2
        title: Configure log sinks
  - uid: mondoo-gcp-security-logging-sinks-configured-gcp
    filters: asset.platform == 'gcp'
    mql: |
      gcp.project.loggingservice.sinks().where(id != "_Required" && id != "_Default").length > 0
  - uid: mondoo-gcp-security-logging-sinks-configured-terraform-hcl
    filters: asset.platform == 'terraform-hcl'
    mql: |
      terraform.resources('google_logging_project_sink').length > 0
  - uid: mondoo-gcp-security-logging-sinks-configured-terraform-plan
    filters: asset.platform == 'terraform-plan'
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_logging_project_sink').length > 0
  - uid: mondoo-gcp-security-logging-sinks-configured-terraform-state
    filters: asset.platform == 'terraform-state'
    mql: |
      terraform.state.resources.where(type == 'google_logging_project_sink').length > 0
  - uid: mondoo-gcp-security-pubsub-topic-cmek-encryption
    title: Ensure Pub/Sub topics are encrypted with CMEK
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-gcp-security-pubsub-topic-cmek-encryption-gcp
        tags:
          mondoo.com/filter-title: GCP Pub/Sub Topic
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-pubsub-topic-cmek-encryption-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-pubsub-topic-cmek-encryption-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-pubsub-topic-cmek-encryption-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Pub/Sub topics are encrypted using customer-managed encryption keys (CMEK) rather than default Google-managed keys. Google-managed encryption protects data at rest automatically, but it does not give the organization control over key rotation, access, or revocation for message data.

        **Why this matters**

        - **Key revocation capability:** CMEK allows the organization to disable or destroy the encryption key to immediately terminate access to stored message data, a capability absent with Google-managed keys.
        - **Compliance alignment:** Frameworks such as PCI DSS, HIPAA, and SOC 2 may require customer-managed encryption for sensitive data at rest, including data transiting message queues.
        - **Encryption auditability:** All Cloud KMS key usage operations are logged, providing a verifiable record of encryption and decryption activity on topic message data.
        - **Separation of duties:** Managing the encryption key in Cloud KMS under its own IAM policy separates key administration from topic administration.

        **Risk mitigation**

        - **Apply CMEK to sensitive topics:** Prioritize topics that carry regulated data, PII, or security-relevant events where key revocation capability is operationally required.
        - **Assign the Cloud KMS Encrypter/Decrypter role:** Grant the Pub/Sub service account the `roles/cloudkms.cryptoKeyEncrypterDecrypter` role on the key so topic operations succeed after CMEK is configured.
        - **Monitor key access:** Enable Cloud KMS audit logs and alert on unexpected key operations to detect unauthorized access to encrypted message data.
      audit: |
        ### Audit via Console

        1. Sign in to the [Google Cloud Console](https://console.cloud.google.com) and open the target project.
        2. Navigate to **Pub/Sub > Topics**.
        3. Select each topic and review the **Encryption** section in the topic details.
        4. Check whether a **Customer-managed encryption key** is configured.

