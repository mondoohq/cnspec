      - uid: mondoo-gcp-security-firewall-no-ingress-rdp-from-internet-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that GCP compute firewall rules do not allow unrestricted RDP access on TCP port 3389 from all internet addresses (0.0.0.0/0 or ::/0). RDP provides full graphical remote desktop access to Windows instances and should only be reachable from specific trusted networks, never from the general internet.

        **Why this matters**

        - **High-value attack target:** RDP is one of the most frequently targeted protocols for brute-force attacks, credential stuffing, and exploitation; exposed RDP ports attract automated attack traffic within minutes of becoming reachable.
        - **Known critical vulnerabilities:** Flaws such as BlueKeep and DejaBlue have demonstrated that unauthenticated remote code execution is possible against unpatched RDP implementations, making internet-exposed RDP a critical risk even before credential attacks are considered.
        - **Ransomware entry point:** Internet-exposed RDP is among the most common initial access vectors for ransomware operators, who exploit weak credentials or unpatched vulnerabilities to gain persistent access.

        **Risk mitigation**

        - **Restrict source ranges to trusted CIDRs:** Replace 0.0.0.0/0 source ranges with specific corporate VPN ranges or bastion host IPs so RDP is only reachable by authorized users on controlled networks.
        - **Route RDP through IAP or VPN:** Use Identity-Aware Proxy TCP forwarding or a VPN gateway to provide controlled entry points for RDP sessions, eliminating the need to expose port 3389 to the internet.
        - **Audit and remove overly permissive rules:** Regularly review all ingress firewall rules that reference TCP port 3389 to confirm source ranges are intentionally restricted and no open-internet rules exist.
      audit: |
        ### Audit via Console

        1. Sign in to the [Google Cloud Console](https://console.cloud.google.com).
        2. Navigate to **VPC Network** > **Firewall**.
        3. Review each firewall rule with **Direction** set to `Ingress`.
        4. Check whether any rule allows TCP port 3389 (or all ports on TCP) with a **Source IP range** of `0.0.0.0/0` or `::/0`.

        A passing firewall configuration shows no ingress rules that allow TCP port 3389 from `0.0.0.0/0` or `::/0`. A failing configuration shows one or more ingress rules permitting RDP from any source IP.

        ### Audit via CLI

        1. List ingress firewall rules that allow TCP port 3389 from the internet:

        ```bash
        gcloud compute firewall-rules list \
          --filter="direction=INGRESS AND allowed.ports:3389 AND sourceRanges:0.0.0.0/0" \
          --format="table(name,direction,allowed,sourceRanges)"
        ```

        Also check for rules with all-port TCP access:

        ```bash
        gcloud compute firewall-rules list \
          --filter="direction=INGRESS AND allowed.IPProtocol=tcp AND sourceRanges:0.0.0.0/0" \
          --format="table(name,direction,allowed,sourceRanges)"
        ```

        A passing configuration returns no results for rules permitting port 3389 from the internet. A failing configuration returns one or more firewall rules with `0.0.0.0/0` or `::/0` source ranges allowing TCP port 3389.
      remediation:
        - id: terraform
          desc: |
            To ensure RDP access is restricted from the internet in Terraform, restrict RDP access to a specific IP range:

            ```hcl
            resource "google_compute_firewall" "allow_rdp" {
              name    = "allow-rdp-restricted"
              network = google_compute_network.default.name

              allow {
                protocol = "tcp"
                ports    = ["3389"]
              }

              # Restrict to trusted IP ranges instead of 0.0.0.0/0
              source_ranges = ["10.0.0.0/8"]
            }
            ```
        - id: console
          desc: |
            To ensure RDP access is restricted from the internet using the Google Cloud Console:

            1. Log in to the GCP Console at https://console.cloud.google.com.
            2. Navigate to **VPC Network** > **Firewall**.
            3. Identify any firewall rules that allow TCP port 3389 with a source range of 0.0.0.0/0 or ::/0.
            4. Select the rule and select **Edit**.
            5. Under **Source IPv4 ranges**, replace 0.0.0.0/0 with your trusted CIDR ranges.
            6. Select **Save**.
        - id: cli
          desc: |
            To ensure RDP access is restricted from the internet using the Google Cloud CLI, update a firewall rule to restrict RDP access:

            ```bash
            gcloud compute firewall-rules update RULE_NAME \
              --source-ranges=TRUSTED_CIDR_RANGE
            ```

            For example, to restrict to a corporate VPN range:

            ```bash
            gcloud compute firewall-rules update allow-rdp \
              --source-ranges=10.0.0.0/8
            ```
