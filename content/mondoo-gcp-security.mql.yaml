  - uid: mondoo-gcp-security-gke-legacy-client-auth-disabled
    title: Ensure GKE legacy client authentication is disabled
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-14
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-2
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-2
    variants:
      - uid: mondoo-gcp-security-gke-legacy-client-auth-disabled-gcp
        tags:
          mondoo.com/filter-title: GCP GKE Cluster
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-gke-legacy-client-auth-disabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-gke-legacy-client-auth-disabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-gke-legacy-client-auth-disabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that GKE clusters do not use legacy authentication methods: static basic authentication credentials or client certificate issuance. Both mechanisms produce cluster-wide, permanent credentials that cannot be individually revoked and do not integrate with Cloud Audit Logging.

        **Why this matters**

        - **Non-revocable access:** Basic auth passwords and client certificates cannot be selectively revoked; a leaked credential provides persistent cluster access until the entire control plane is rotated.
        - **No audit trail:** Legacy authentication methods bypass Cloud Audit Logging, making it impossible to attribute API calls to specific individuals or identify when leaked credentials are used.
        - **Excessive privilege:** Static credentials typically grant full cluster-admin access, giving an attacker who obtains them unrestricted control over the cluster.
        - **Modern alternatives:** OAuth tokens, Workload Identity, and IAM-based authentication provide auditable, short-lived, revocable access that obsoletes the need for legacy credentials.

        **Risk mitigation**

        - **Disable at cluster creation:** For GKE 1.19 and later, omit the `--enable-basic-auth` and `--issue-client-certificate` flags when creating clusters, as legacy auth is disabled by default.
        - **Rotate older clusters:** Use `gcloud container clusters update --no-enable-basic-auth` on existing clusters still configured with basic auth.
      audit: |
        ### Audit via Console

        1. Go to the **Kubernetes Engine > Clusters** page in the Google Cloud Console.
        2. Click the cluster name to open its details.
        3. Select the **Details** tab.
        4. Under **Security**, review the **Legacy authorization** or **Authentication** fields.

        A passing cluster shows basic authentication and client certificate issuance as disabled (both username and password are empty, and client certificate issuance is set to `false`). A failing cluster shows a username or password configured, or has client certificate issuance enabled.

        ### Audit via CLI

        1. Describe the GKE cluster and check the master authentication settings:

        ```bash
        gcloud container clusters describe CLUSTER_NAME \
          --location=LOCATION \
          --format="value(masterAuth.username,masterAuth.password,masterAuth.clientCertificateConfig.issueClientCertificate)"
        ```

        A passing cluster returns empty values for `username` and `password`, and returns `False` or an empty value for `issueClientCertificate`. A failing cluster returns a non-empty username or password, or returns `True` for `issueClientCertificate`.
      remediation:
        - id: console
          desc: |
            To ensure GKE legacy client authentication is disabled using the Google Cloud Console, for GKE 1.19 and later, basic authentication and client certificate UI elements have been removed from the GCP Console, and these legacy authentication methods are disabled by default. No Console action is required for current GKE versions.

            For older clusters still using legacy authentication, use the gcloud CLI to disable basic auth:

            ```bash
            gcloud container clusters update <cluster-name> \
              --no-enable-basic-auth
            ```
        - id: cli
          desc: |
            To ensure GKE legacy client authentication is disabled using the gcloud CLI, disable basic auth and client certificates on an existing cluster:

            ```bash
            gcloud container clusters update <cluster-name> \
              --no-enable-basic-auth
            ```

            For new clusters:

            ```bash
            gcloud container clusters create <cluster-name> \
              --no-enable-basic-auth \
              --no-issue-client-certificate
            ```
        - id: terraform
          desc: |
            To ensure GKE legacy client authentication is disabled in Terraform, disable legacy authentication in your GKE cluster:

            ```hcl
            resource "google_container_cluster" "example" {
              name     = "example-cluster"
              location = "us-central1"

              master_auth {
                # Leave username and password empty to disable basic auth
                client_certificate_config {
                  issue_client_certificate = false
                }
              }
            }
            ```
    refs:
      - url: https://cloud.google.com/kubernetes-engine/docs/how-to/api-server-authentication
        title: Google Cloud Documentation - Authenticating to the Kubernetes API server
  - uid: mondoo-gcp-security-gke-legacy-client-auth-disabled-gcp
    filters: asset.platform == 'gcp-gke-cluster'
    mql: |
      gcp.project.gkeService.cluster.masterAuth['username'] == ""
      gcp.project.gkeService.cluster.masterAuth['password'] == ""
      gcp.project.gkeService.cluster.masterAuth['clientCertificateConfig']['issueClientCertificate'] != true
  - uid: mondoo-gcp-security-gke-legacy-client-auth-disabled-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_container_cluster')
    mql: |
