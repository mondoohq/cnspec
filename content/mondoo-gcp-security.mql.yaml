    variants:
      - uid: mondoo-gcp-security-cloud-dns-dnssec-nsec3-enabled-gcp
        tags:
          mondoo.com/filter-title: GCP Cloud DNS Managed Zone
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-cloud-dns-dnssec-nsec3-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-dns-dnssec-nsec3-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-dns-dnssec-nsec3-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that DNSSEC is enabled and configured to use NSEC3 for authenticated denial-of-existence on public Cloud DNS managed zones. NSEC3 is Cloud DNS's default denial-of-existence mechanism; the alternative, NSEC, exposes all zone record names in plaintext, allowing any internet user to enumerate every hostname in a zone by walking the NSEC chain.

        **Why this matters**

        - **Zone enumeration prevention:** NSEC includes the plaintext names of adjacent records in signed responses, enabling attackers to enumerate every record in a zone without triggering rate limits or authentication requirements; NSEC3 replaces those plaintext names with cryptographic hashes, raising the effort required significantly.
        - **Internal hostname confidentiality:** DNS zones often contain records for internal services, staging environments, and infrastructure components that are not intended to be publicly discoverable; NSEC-based enumeration exposes these details to any external observer.
        - **Reconnaissance reduction:** Zone enumeration via NSEC walking provides attackers with a complete target list for subsequent scanning and exploitation; NSEC3 removes this easy reconnaissance path.

        **Risk mitigation**

        - **Configure NSEC3 as the denial-of-existence mechanism:** Set `nonExistence` to `nsec3` when enabling or reconfiguring DNSSEC on public zones; this matches Cloud DNS's documented default and ensures zone contents are not trivially enumerable.
        - **Re-enable DNSSEC with NSEC3 on affected zones:** To change the denial-of-existence setting on a zone where DNSSEC is already enabled, disable DNSSEC, then re-enable it with `--denial-of-existence nsec3` to apply the NSEC3 configuration.
      audit: |
        **Using Google Cloud CLI**

        Check the `nonExistence` property in the DNSSEC configuration for each managed zone:

        ```bash
        gcloud dns managed-zones describe ZONE_NAME --format="json(dnsName,dnssecConfig.state,dnssecConfig.nonExistence)"
        ```

        The `nonExistence` value should be `nsec3`.
      remediation:
        - id: console
          desc: |
            To ensure DNSSEC uses NSEC3 for authenticated denial-of-existence using the Google Cloud Console:

            1. Navigate to **Network services > Cloud DNS** in the Google Cloud Console.
            2. Select the managed zone you want to configure.
            3. Select **DNSSEC** and then **Manage DNSSEC**.
            4. If DNSSEC is already enabled, first set it to **Off** and save.
            5. Re-enable DNSSEC by setting it to **On**.
            6. Under **Denial of existence**, select **NSEC3**.
            7. Select **Save** to apply the new configuration.
        - id: cli
          desc: |
            To ensure DNSSEC uses NSEC3 for authenticated denial-of-existence using the Google Cloud CLI:

            1. To change DNSSEC settings on an already enabled managed zone, first disable it:

            ```bash
            gcloud dns managed-zones update ZONE_NAME --dnssec-state off
            ```

            2. Then, re-enable it with the NSEC3 denial-of-existence setting:

            ```bash
            gcloud dns managed-zones update ZONE_NAME --dnssec-state on --denial-of-existence nsec3
            ```
        - id: terraform
          desc: |
            To ensure DNSSEC uses NSEC3 for authenticated denial-of-existence in Terraform, configure NSEC3 as the denial-of-existence mechanism in your DNSSEC configuration:

            ```hcl
            resource "google_dns_managed_zone" "example" {
              name         = "example-zone"
              dns_name     = "example.com."
              description  = "Example managed zone"
              visibility   = "public"

              dnssec_config {
                state         = "on"
                non_existence = "nsec3"
                default_key_specs {
                  algorithm  = "rsasha256"
                  key_length = 2048
                  key_type   = "keySigning"
                }
                default_key_specs {
                  algorithm  = "rsasha256"
                  key_length = 2048
                  key_type   = "zoneSigning"
                }
              }
            }
            ```

            **Prevention:**

            Always set `non_existence = "nsec3"` in your Terraform DNSSEC configurations for public zones. Use Terraform validation rules or policy-as-code tools to ensure NSEC3 is consistently applied.
