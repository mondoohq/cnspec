  # No Terraform variants: Vertex AI custom training jobs are imperative API operations with no Terraform resource analog (no google_vertex_ai_custom_job exists).
  # No Terraform remediation: Vertex AI custom training jobs are imperative API operations with no Terraform resource analog; the fix lives in the submission tooling.
  - uid: mondoo-gcp-security-vertexai-custom-job-no-default-service-account
    title: Ensure Vertex AI custom jobs do not run as the default Compute Engine SA
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-2
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-5
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-3-3
      compliance/vda-isa-5: vda-isa-5-4-2-1
    filters: asset.platform == 'gcp'
    mql: |
      gcp.project.vertexaiService.customJobs.where(
        state == "JOB_STATE_RUNNING" || state == "JOB_STATE_PENDING" || state == "JOB_STATE_QUEUED"
      ).all(
        jobSpec['serviceAccount'] != null &&
        jobSpec['serviceAccount'] != "" &&
        jobSpec['serviceAccount'] != /^\d+-compute@developer\.gserviceaccount\.com$/
      )
    docs:
      desc: |
        This check ensures that Vertex AI custom training jobs are configured to use a dedicated service account rather than the project's default Compute Engine service account. By default, jobs that omit an explicit service account identity run as the default Compute Engine SA, which carries the Editor role and is shared across all workloads in the project.

        **Why this matters**

        - **Overprivilege by default:** The default Compute Engine service account holds the Editor role project-wide, so any code running inside the job inherits the ability to read, write, and delete most project resources.
        - **Blast-radius amplification:** Training jobs execute arbitrary code that can pull third-party packages and containers; a compromised dependency can immediately abuse the Editor-level identity to exfiltrate data or persist access.
        - **Shared identity obscures attribution:** The default SA is used by many unrelated compute workloads, making it impossible to isolate Vertex AI training activity in audit logs or revoke access without disrupting other services.
        - **Dedicated accounts enable least privilege:** A purpose-built training SA can be scoped to only the IAM roles required to read training data and write model artifacts, limiting what any compromise can touch.

        **Risk mitigation**

        - **Provision a dedicated SA:** Create a service account for Vertex AI training with only the permissions required by the training code, and set it on every custom job submission.
        - **Reject default-SA submissions:** Enforce a pipeline guard or Organization Policy that rejects job submissions that omit `serviceAccount` or that resolve to the default Compute Engine SA pattern.
        - **Revoke broad roles on the default SA:** Once no workloads depend on the default Compute Engine service account's Editor role, remove or restrict that role binding to reduce the ambient risk across the project.
      audit: |
        ### Audit via Console

        1. Go to **Vertex AI > Training > Custom jobs** in the Google Cloud Console.
        2. For each running or pending job, select the job to open its detail page.
        3. Under the **Job spec** or **Advanced options** section, locate the **Service account** field.
        4. Verify that the service account is set and does not match the pattern `PROJECT_NUMBER-compute@developer.gserviceaccount.com`.

        A passing job shows a dedicated service account that is not the default Compute Engine account. A failing job shows no service account or the default Compute Engine service account.

        ### Audit via CLI

        1. List all running, pending, or queued Vertex AI custom jobs:

        ```bash
        gcloud ai custom-jobs list \
          --region=REGION \
          --filter='state:JOB_STATE_RUNNING OR state:JOB_STATE_PENDING OR state:JOB_STATE_QUEUED' \
          --format='value(name,jobSpec.serviceAccount)'
        ```

        A passing job returns a non-empty service account email that does not end with `-compute@developer.gserviceaccount.com`. A failing job returns an empty service account or one matching the default Compute Engine service account pattern.
      remediation:
        - id: console
          desc: |
            Configure a dedicated service account for Vertex AI custom jobs:

            1. Provision the service account in **IAM & Admin > Service accounts** with the narrow roles needed by the training code.
            2. When launching a custom job from **Vertex AI > Training**, set **Service account** under the advanced options to the dedicated SA.
            3. Update any SDK-based submissions to pass the dedicated `service_account` in `worker_pool_specs`.
        - id: cli
          desc: |
            Submit a custom job with an explicit, dedicated service account:

            ```bash
            gcloud ai custom-jobs create \
              --region=REGION \
              --display-name=train-X \
              --service-account=vertex-training@PROJECT.iam.gserviceaccount.com \
              --config=config.yaml
            ```
    refs:
      - url: https://cloud.google.com/vertex-ai/docs/general/custom-service-account
        title: Vertex AI - Use a custom service account
  - uid: mondoo-gcp-security-essential-contacts-security-category-configured
    title: Ensure Essential Contacts cover the SECURITY notification category
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-sef-08
      compliance/dora: dora-art-17
      compliance/hipaa: hipaa-security-ss164-308-a-6-ii-security-incident-procedures-response-and-reporting
      compliance/iso-27001-2022: iso-27001-2022-a-5-24
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-rs-co-2
      compliance/nist-csf-2: nist-csf-2-rs-co-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ir-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-6-1
      compliance/pci-dss-4: pcidss-requirement-12-10-1
      compliance/soc2-2017: soc2-control-cc7-4-6
      compliance/vda-isa-5: vda-isa-5-1-6-1
    variants:
      - uid: mondoo-gcp-security-essential-contacts-security-category-configured-gcp
        tags:
          mondoo.com/filter-title: GCP Project
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-essential-contacts-security-category-configured-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-essential-contacts-security-category-configured-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-essential-contacts-security-category-configured-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that the GCP project has at least one Essential Contact registered for the `SECURITY` notification category, either explicitly or through the `ALL` category. Essential Contacts is the only channel Google Cloud uses to deliver time-sensitive security notifications such as pre-disclosure vulnerability advisories, account-compromise alerts, and policy violation warnings.

        **Why this matters**

        - **Security teams are bypassed by default:** Without a dedicated security contact, Google routes outreach to billing or legal contacts who may not monitor for or respond to security incidents.
        - **Pre-disclosure advisories are missed:** Google notifies Essential Contacts with advance warning before public vulnerability disclosures, giving organizations time to patch or mitigate before exploits are widely available.
        - **Incident response windows shrink:** Delayed notification of account-takeover or data-access anomalies means attackers have longer dwell time before the security team can respond.
        - **Compliance posture is weakened:** Many frameworks require a documented, monitored security notification address; a project with no security contact is treated as non-compliant by auditors.

        **Risk mitigation**

        - **Register a monitored distribution list:** Use a shared security team address rather than an individual's inbox so notifications are seen even during personnel changes or out-of-office periods.
        - **Set contacts at the organization or folder level:** Contacts configured at higher scope are inherited by child projects, ensuring consistent coverage without per-project configuration.
        - **Validate contact addresses promptly:** Google treats unvalidated addresses as non-authoritative; confirm the validation email as soon as a contact is registered.
      audit: |
        ### Audit via Console

        1. Go to **IAM & Admin > Essential Contacts** in the Google Cloud Console.
        2. Review the list of contacts and their assigned **Notification categories**.
        3. Verify that at least one contact has the **Security** (or **All**) category assigned.

        A passing project shows at least one contact subscribed to the **Security** or **All** notification category. A failing project shows no contacts, or all contacts are assigned only non-security categories such as **Billing**, **Legal**, or **Technical**.

        ### Audit via CLI

        1. List all Essential Contacts for the project:

        ```bash
        gcloud essential-contacts list \
          --project=PROJECT_ID \
          --format='table(email,notificationCategorySubscriptions)'
        ```

        A passing project returns at least one contact whose `notificationCategorySubscriptions` includes `SECURITY` or `ALL`. A failing project returns no contacts or shows only contacts with categories that do not include `SECURITY` or `ALL`.
      remediation:
        - id: terraform
          desc: |
            Declare a `google_essential_contacts_contact` whose `notification_category_subscriptions` includes `SECURITY` (or `ALL`):

            ```hcl
            resource "google_essential_contacts_contact" "security" {
              parent                              = "projects/my-project"
              email                               = "security-team@example.com"
              language_tag                        = "en"
              notification_category_subscriptions = ["SECURITY"]
            }
            ```

            Place the resource at organization or folder scope instead of project scope to inherit the contact across child projects.
        - id: console
          desc: |
            Register a security contact:

            1. Go to **IAM & Admin > Essential Contacts** in the Google Cloud Console.
            2. Select **Add Contact**.
            3. Enter the security distribution list email.
            4. Under **Notification categories**, select **Security**.
            5. Save the contact and confirm the validation email.
        - id: cli
          desc: |
            Register a security contact for the project:

            ```bash
            gcloud essential-contacts create \
              --email=security-team@example.com \
              --notification-categories=SECURITY \
              --project=PROJECT_ID
            ```

            Set the contact at the organization or folder level instead of the project for shared coverage:

            ```bash
            gcloud essential-contacts create \
              --email=security-team@example.com \
              --notification-categories=SECURITY \
              --organization=ORG_ID
            ```
    refs:
      - url: https://cloud.google.com/resource-manager/docs/managing-notification-contacts
        title: Manage Essential Contacts
  - uid: mondoo-gcp-security-essential-contacts-security-category-configured-gcp
    filters: asset.platform == 'gcp'
    mql: |
      gcp.project.essentialContacts.any(
        notificationCategories.any(_ == "SECURITY" || _ == "ALL")
      )
  - uid: mondoo-gcp-security-essential-contacts-security-category-configured-terraform-hcl
    filters: |
