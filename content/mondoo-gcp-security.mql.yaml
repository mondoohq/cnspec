  - uid: mondoo-gcp-security-cloud-run-ingress-restricted
    title: Ensure Cloud Run services do not allow all ingress traffic
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-gcp-security-cloud-run-ingress-restricted-gcp
        tags:
          mondoo.com/filter-title: GCP Cloud Run Service
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-cloud-run-ingress-restricted-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-run-ingress-restricted-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-run-ingress-restricted-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Cloud Run services are configured to deny all ingress traffic from the public internet, restricting inbound requests to internal VPC sources or traffic routed through Google Cloud Load Balancing. By default, newly deployed Cloud Run services accept traffic from all sources, making them immediately reachable from the internet.

        **Why this matters**

        - **Reduced attack surface:** Restricting ingress to internal or load-balancer traffic prevents attackers from directly probing service endpoints for vulnerabilities without passing through a perimeter control.
        - **Data protection:** Services that handle sensitive payloads are shielded from direct internet-originating requests, reducing the risk of unauthorized data access.
        - **WAF and DDoS integration:** Routing external traffic through Cloud Load Balancing enables Cloud Armor WAF rules and DDoS protection that cannot be applied to directly exposed services.
        - **Compliance posture:** Many frameworks require that workloads processing regulated data not be directly accessible from untrusted networks.

        **Risk mitigation**

        - **Set ingress to internal or load-balancer only:** Configure the `ingress` setting to `INGRESS_TRAFFIC_INTERNAL_ONLY` or `INGRESS_TRAFFIC_INTERNAL_LOAD_BALANCER` for all services.
        - **Use Cloud Armor for external-facing traffic:** Place a Global HTTPS load balancer with Cloud Armor security policies in front of any service that legitimately requires public access.
        - **Require IAM authentication:** Combine ingress restrictions with IAM-based authentication so that even internal callers must present valid credentials.
      audit: |
        ### Audit via Console

        1. Sign in to the [Google Cloud Console](https://console.cloud.google.com) and select the project.
        2. Navigate to **Cloud Run**.
        3. Select a service name to open its details page.
        4. Click the **Networking** tab.
        5. Check the **Ingress** setting.
        6. Repeat for each service.

        A passing service shows **Internal** or **Internal and Cloud Load Balancing**. A failing service shows **All** (allowing all ingress traffic from the internet).

        ### Audit via CLI

        1. List all Cloud Run services and their ingress settings:

        ```bash
        gcloud run services list --format="table(metadata.name,metadata.annotations.'run.googleapis.com/ingress',region)"
        ```

        A passing service returns `internal` or `internal-and-cloud-load-balancing` in the ingress annotation. A failing service returns `all`.
      remediation:
        - id: terraform
          desc: |
            To ensure Cloud Run services do not allow all ingress traffic in Terraform:

            ```hcl
            resource "google_cloud_run_v2_service" "example" {
              name     = "example-service"
              location = "us-central1"
              ingress  = "INGRESS_TRAFFIC_INTERNAL_ONLY"

              template {
                containers {
                  image = "us-docker.pkg.dev/cloudrun/container/hello"
                }
              }
            }
            ```
        - id: console
          desc: |
            To ensure Cloud Run services do not allow all ingress traffic using the Google Cloud Console:

            1. Navigate to **Cloud Run** in the Google Cloud Console.
            2. Select the service to update.
            3. Select **Edit & Deploy New Revision**.
            4. Under **Networking**, set **Ingress** to **Internal** or **Internal and Cloud Load Balancing**.
            5. Select **Deploy**.
        - id: cli
          desc: |
            To ensure Cloud Run services do not allow all ingress traffic using the Google Cloud CLI:

            ```bash
            gcloud run services update SERVICE_NAME \
              --ingress=internal \
              --region=REGION
            ```
    refs:
      - url: https://cloud.google.com/run/docs/securing/ingress
        title: Restricting ingress for Cloud Run
  - uid: mondoo-gcp-security-cloud-run-ingress-restricted-gcp
    filters: asset.platform == 'gcp-cloudrun-service'
    mql: |
      gcp.project.cloudRunService.service.ingress != "INGRESS_TRAFFIC_ALL"
  - uid: mondoo-gcp-security-cloud-run-ingress-restricted-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_cloud_run_v2_service')
    mql: |
      terraform.resources('google_cloud_run_v2_service').all(
        arguments.ingress != "INGRESS_TRAFFIC_ALL" && arguments.ingress != empty
      )
  - uid: mondoo-gcp-security-cloud-run-ingress-restricted-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_cloud_run_v2_service')
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_cloud_run_v2_service').all(
        change.after.ingress != "INGRESS_TRAFFIC_ALL"
      )
  - uid: mondoo-gcp-security-cloud-run-ingress-restricted-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'google_cloud_run_v2_service')
    mql: |
      terraform.state.resources.where(type == 'google_cloud_run_v2_service').all(
        values.ingress != "INGRESS_TRAFFIC_ALL"
      )
  - uid: mondoo-gcp-security-cloud-run-cmek-encryption
    title: Ensure Cloud Run services use customer-managed encryption keys (CMEK)
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-gcp-security-cloud-run-cmek-encryption-gcp
        tags:
          mondoo.com/filter-title: GCP Cloud Run Service
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-cloud-run-cmek-encryption-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-run-cmek-encryption-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-run-cmek-encryption-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Cloud Run services are configured to encrypt container images and data at rest using customer-managed encryption keys (CMEK) rather than Google-managed keys. By default, Cloud Run encrypts data with keys that Google manages internally; CMEK transfers that control to the organization.

        **Why this matters**

        - **Independent key control:** Organizations can rotate, disable, or destroy the encryption key without relying on Google to act, enabling immediate revocation of access to service data.
        - **Regulatory data sovereignty:** Industries subject to strict data-residency and key-custody requirements can satisfy those requirements by holding their own keys in Cloud KMS.
        - **Audit trail:** All encryption and decryption operations against a CMEK key are logged in Cloud KMS, providing evidence of access patterns for compliance reporting.
        - **Blast radius limitation:** If a Cloud Run service is compromised, destroying the CMEK key renders all associated encrypted artifacts unreadable to an attacker.

        **Risk mitigation**

        - **Apply CMEK to sensitive services:** Prioritize enabling CMEK for services that process personal data, financial records, or other regulated content.
        - **Restrict key access:** Grant the Cloud Run service agent only the minimum KMS roles required to use the key, and audit IAM bindings regularly.
        - **Enable automatic rotation:** Configure key rotation in Cloud KMS to reduce the window of exposure for any single key version.
      audit: |
        ### Audit via Console

        1. Sign in to the [Google Cloud Console](https://console.cloud.google.com) and select the project.
        2. Navigate to **Cloud Run**.
        3. Select a service name to open its details page.
        4. Click the **Security** tab.
        5. Check the **Encryption key** field.
        6. Repeat for each service.

        A passing service shows a Cloud KMS key resource name under **Encryption key**. A failing service shows no customer-managed encryption key configured.

        ### Audit via CLI

        1. Describe each Cloud Run service and check for an encryption key in the revision template:

        ```bash
        gcloud run services describe SERVICE_NAME \
          --region=REGION \
          --format="value(spec.template.metadata.annotations.'run.googleapis.com/encryption-key')"
        ```

        A passing service returns a non-empty Cloud KMS key resource name. A failing service returns an empty or absent encryption key value.
      remediation:
        - id: terraform
          desc: |
            To ensure Cloud Run services use customer-managed encryption keys (CMEK) in Terraform:

            ```hcl
            resource "google_cloud_run_v2_service" "example" {
              name     = "example-service"
              location = "us-central1"

              template {
                encryption_key = google_kms_crypto_key.example.id

                containers {
                  image = "us-docker.pkg.dev/cloudrun/container/hello"
                }
              }
            }
            ```
        - id: console
          desc: |
            To ensure Cloud Run services use customer-managed encryption keys (CMEK) using the Google Cloud Console:

            1. Navigate to **Cloud Run** in the Google Cloud Console.
            2. Select the service or select **Create Service**.
            3. Under **Security**, select **Customer-managed encryption key**.
            4. Choose or create a Cloud KMS key.
            5. Deploy the service.
        - id: cli
          desc: |
            To ensure Cloud Run services use customer-managed encryption keys (CMEK) using the Google Cloud CLI:

            ```bash
            gcloud run services update SERVICE_NAME \
              --key=projects/PROJECT/locations/LOCATION/keyRings/RING/cryptoKeys/KEY \
              --region=REGION
            ```
    refs:
      - url: https://cloud.google.com/run/docs/securing/using-cmek
        title: Using customer-managed encryption keys with Cloud Run
  - uid: mondoo-gcp-security-cloud-run-cmek-encryption-gcp
    filters: asset.platform == 'gcp-cloudrun-service'
    mql: |
      gcp.project.cloudRunService.service.template.encryptionKey != ""
  - uid: mondoo-gcp-security-cloud-run-cmek-encryption-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_cloud_run_v2_service')
    mql: |
      terraform.resources('google_cloud_run_v2_service').all(
        blocks.where(type == 'template').all(
          arguments.encryption_key != empty
        )
      )
  - uid: mondoo-gcp-security-cloud-run-cmek-encryption-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_cloud_run_v2_service')
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_cloud_run_v2_service').all(
        change.after.template != empty &&
        change.after.template.all(_['encryption_key'] != empty)
