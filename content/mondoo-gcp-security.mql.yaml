  - uid: mondoo-gcp-security-cloud-dns-dnssec-enabled
    title: Ensure That DNSSEC Is Enabled for Cloud DNS
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-09
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-21
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-15
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    variants:
      - uid: mondoo-gcp-security-cloud-dns-dnssec-enabled-gcp
        tags:
          mondoo.com/filter-title: GCP Cloud DNS Managed Zone
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-cloud-dns-dnssec-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-dns-dnssec-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-dns-dnssec-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that DNSSEC is enabled for public Cloud DNS managed zones by verifying that `dnssecConfig.state` is set to `on`. By default, new Cloud DNS managed zones are created without DNSSEC; without it, an attacker can forge DNS responses to redirect users to attacker-controlled infrastructure through DNS cache poisoning.

        **Why this matters**

        - **DNS spoofing prevention:** Without DNSSEC, resolvers cannot verify whether a DNS response is authentic; attackers can return forged records that redirect traffic to phishing sites, malware distribution points, or credential harvesting servers.
        - **Man-in-the-middle defense:** DNSSEC signs DNS records so that any tampering with a response in transit is detectable, protecting users from silent traffic redirection even when on untrusted networks.
        - **Trust chain integrity:** DNSSEC establishes a cryptographic chain of trust from the root DNS zone down to the leaf record, ensuring resolvers only accept responses that can be validated against published public keys.

        **Risk mitigation**

        - **Enable DNSSEC on all public zones:** Set `dnssecConfig.state` to `on` for every public managed zone; private zones are not exposed to external resolvers and are out of scope for this control.
        - **Use strong signing algorithms:** When enabling DNSSEC, select algorithms such as RSASHA256 or ECDSAP256SHA256 for both key-signing and zone-signing keys to ensure the cryptographic protection is meaningful.
      audit: |
        **Using Google Cloud Console**

        1. Go to `Cloud DNS` by navigating to [https://console.cloud.google.com/net-services/dns/zones](https://console.cloud.google.com/net-services/dns/zones).
        2. For each zone of `Type` `Public`, make sure that `DNSSEC` is set to `On`.

        **Using Google Cloud CLI**

        1. List all Managed Zones in a project:

        ```bash
        gcloud dns managed-zones list
        ```

        2. For each zone of `VISIBILITY` `public`, describe its metadata:

        ```bash
        gcloud dns managed-zones describe ZONE_NAME
        ```

        3. Make sure that `dnssecConfig.state` property is `on`.
      remediation:
        - id: console
          desc: |
            To ensure That DNSSEC Is Enabled for Cloud DNS using the Google Cloud Console:

            1. Go to `Cloud DNS` by navigating to [https://console.cloud.google.com/net-services/dns/zones](https://console.cloud.google.com/net-services/dns/zones).
            2. For each zone of `Type` `Public`, switch `DNSSEC` to `On`.
        - id: cli
          desc: |
            To ensure That DNSSEC Is Enabled for Cloud DNS using the Google Cloud CLI, use the below command to enable `DNSSEC` for Cloud DNS Zone Name:
            ```bash
            gcloud dns managed-zones update ZONE_NAME --dnssec-state on
            ```
        - id: terraform
          desc: |
            To ensure That DNSSEC Is Enabled for Cloud DNS in Terraform, enable DNSSEC for managed DNS zones by setting the `dnssec_config` block with `state = "on"`:

            ```hcl
            resource "google_dns_managed_zone" "example" {
              name         = "example-zone"
              dns_name     = "example.com."
              description  = "Example managed zone"
              visibility   = "public"

              dnssec_config {
                state = "on"
                default_key_specs {
                  algorithm  = "rsasha256"
                  key_length = 2048
                  key_type   = "keySigning"
                }
                default_key_specs {
                  algorithm  = "rsasha256"
                  key_length = 2048
                  key_type   = "zoneSigning"
                }
              }
            }
            ```

            **Prevention:**

            Always configure DNSSEC for public DNS zones in your Terraform configurations. Use Terraform validation rules or policy-as-code tools to ensure DNSSEC is enabled for all public zones. Regularly audit your Terraform configurations to ensure compliance.
