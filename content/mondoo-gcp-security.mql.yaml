          mondoo.com/filter-title: GCP Cloud SQL PostgreSQL Instance
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-cloud-sql-postgres-log-lock-waits-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-sql-postgres-log-lock-waits-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-sql-postgres-log-lock-waits-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Cloud SQL for PostgreSQL instances are configured to enable the `log_lock_waits` database flag. By default, this flag is disabled, meaning PostgreSQL does not log events when a session waits longer than `deadlock_timeout` to acquire a lock. Enabling this flag produces log entries that are essential for detecting and investigating lock-based attacks and database degradation.

        **Why this matters**

        - **Denial-of-service detection:** An attacker can deliberately hold exclusive locks on critical tables to block all other transactions, effectively taking the database offline; lock wait logs are the primary signal that reveals this pattern.
        - **SQL injection forensics:** Slow SQL injection attacks that acquire and hold locks create distinctive wait patterns in the logs, helping identify the attack queries and the affected tables.
        - **Threat hunting:** Without lock wait logging, defenders cannot distinguish normal contention from deliberate lock-based attacks, allowing sustained database degradation to go undetected.
        - **Operational visibility:** Lock wait logs also expose unintentional contention in application code, providing value beyond security use cases.

        **Risk mitigation**

        - **Attack visibility:** Lock wait events provide early warning of both denial-of-service attempts and application-layer attacks that rely on lock contention.
        - **Faster incident response:** Log entries include the waiting session, the holding session, and the relation involved, shortening investigation time significantly.
        - **Low overhead:** The flag logs only when waits exceed `deadlock_timeout`; the performance impact on healthy workloads is negligible.
      audit: |
        ### Audit via Console

        1. Navigate to **SQL** > **Instances**.
        2. Select the PostgreSQL instance.
        3. Select **Edit** and scroll to the **Flags** section.
        4. Look for the `log_lock_waits` flag and its value.

        A passing instance shows the `log_lock_waits` flag set to `on`. A failing instance shows the flag set to `off` or the flag is absent.

        ### Audit via CLI

        1. Describe the Cloud SQL instance and inspect the database flags:

        ```bash
        gcloud sql instances describe <instance-name> \
          --format="value(settings.databaseFlags)"
        ```

        A passing instance returns a flag entry with `name: log_lock_waits` and `value: on`. A failing instance returns a value of `off` or no entry for the flag.
      remediation:
        - id: console
          desc: |
            To ensure 'log_lock_waits' is enabled for Cloud SQL PostgreSQL using the Google Cloud Console:

            1. Navigate to **SQL** > **Instances**.
            2. Select the PostgreSQL instance.
            3. Select **Edit**.
            4. Under **Flags**, add or update the `log_lock_waits` flag to `on`.
            5. Select **Save**.
        - id: cli
          desc: |
            To ensure 'log_lock_waits' is enabled for Cloud SQL PostgreSQL using the gcloud CLI:

            ```bash
            gcloud sql instances patch <instance-name> \
              --database-flags=log_lock_waits=on
            ```
        - id: terraform
          desc: |
            To ensure 'log_lock_waits' is enabled for Cloud SQL PostgreSQL in Terraform, set the database flag in the settings block:

            ```hcl
            resource "google_sql_database_instance" "postgres" {
              name             = "postgres-instance"
              database_version = "POSTGRES_15"
              region           = "us-central1"

              settings {
                tier = "db-f1-micro"

                database_flags {
                  name  = "log_lock_waits"
                  value = "on"
                }
              }
            }
            ```
    refs:
      - url: https://cloud.google.com/sql/docs/postgres/flags
        title: Google Cloud Documentation - Configuring database flags for PostgreSQL
  - uid: mondoo-gcp-security-cloud-sql-postgres-log-lock-waits-enabled-gcp
