    docs:
      desc: |
        This check ensures that Cloud Functions do not have their ingress settings set to `ALLOW_ALL`. By default new functions may be deployed with unrestricted ingress, meaning any internet source can send HTTP requests to the function; ingress should be restricted to internal VPC traffic or internal traffic plus Cloud Load Balancing.

        **Why this matters**

        - **Direct internet exposure:** Functions with `ALLOW_ALL` ingress can be invoked from any source on the internet, making every HTTP endpoint a potential entry point for unauthorized access or abuse.
        - **Denial-of-service risk:** Publicly reachable function endpoints are trivially targeted for high-volume invocation attacks that exhaust quota and generate unexpected costs.
        - **Defense-in-depth:** Even when function endpoints require authentication, restricting ingress to internal traffic removes the network exposure layer entirely and limits lateral movement if credentials are compromised.
        - **Data exfiltration path:** Functions with access to internal databases or secrets become exfiltration vectors when invocable from the public internet.

        **Risk mitigation**

        - **Set ingress to internal-only:** Configure `ALLOW_INTERNAL_ONLY` for functions that serve only internal callers, so the function is unreachable from outside the VPC.
        - **Use Cloud Load Balancing for external access:** Route externally accessible functions through Cloud Load Balancing with Cloud Armor to apply WAF rules and DDoS protection before traffic reaches the function.
        - **Monitor invocation patterns:** Review Cloud Functions invocation logs for unexpected source IPs or call volumes that might indicate unauthorized access attempts.
      audit: |
        ### Audit via Console

        1. Sign in to the [Google Cloud Console](https://console.cloud.google.com) and select the project.
        2. Navigate to **Cloud Functions**.
        3. Select a function name to open its details page.
        4. Click the **Networking** tab (or review the function details panel).
        5. Check the **Ingress settings** value.
        6. Repeat for each function.

        A passing function shows **Allow internal traffic only** or **Allow internal traffic and traffic from Cloud Load Balancing**. A failing function shows **Allow all traffic**.

        ### Audit via CLI

        1. List all functions and their ingress settings:

        ```bash
        gcloud functions list --format="table(name,serviceConfig.ingressSettings)"
        ```

        A passing function returns `ALLOW_INTERNAL_ONLY` or `ALLOW_INTERNAL_AND_GCLB` in the `INGRESS_SETTINGS` column. A failing function returns `ALLOW_ALL`.
      remediation:
        - id: terraform
          desc: |
            To ensure Cloud Functions do not allow all ingress traffic in Terraform:

            ```hcl
            resource "google_cloudfunctions_function" "example" {
              name        = "example-function"
              runtime     = "python312"
              entry_point = "main"

              ingress_settings = "ALLOW_INTERNAL_ONLY"

              source_archive_bucket = google_storage_bucket.source.name
              source_archive_object = google_storage_bucket_object.archive.name
            }
            ```
        - id: console
          desc: |
            To ensure Cloud Functions do not allow all ingress traffic using the Google Cloud Console:

            1. Navigate to **Cloud Functions** in the Google Cloud Console.
            2. Select the function to update.
            3. Select **Edit**.
            4. Under **Networking**, set **Ingress settings** to **Allow internal traffic only** or **Allow internal traffic and traffic from Cloud Load Balancing**.
            5. Select **Next** and then **Deploy**.
        - id: cli
          desc: |
            To ensure Cloud Functions do not allow all ingress traffic using the Google Cloud CLI, update ingress settings:

            ```bash
            gcloud functions deploy FUNCTION_NAME \
              --ingress-settings=internal-only
            ```
    refs:
      - url: https://cloud.google.com/functions/docs/networking/network-settings
        title: Cloud Functions networking settings
