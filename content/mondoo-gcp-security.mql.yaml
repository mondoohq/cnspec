  - uid: mondoo-gcp-security-compute-snapshot-iam-no-public-principals
    title: Ensure Compute Engine snapshot IAM has no public principals
    impact: 100
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-5-15
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-2-1
    variants:
      - uid: mondoo-gcp-security-compute-snapshot-iam-no-public-principals-gcp
        tags:
          mondoo.com/filter-title: GCP
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-compute-snapshot-iam-no-public-principals-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-compute-snapshot-iam-no-public-principals-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-compute-snapshot-iam-no-public-principals-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that every Compute Engine snapshot IAM policy contains no bindings to `allUsers` or `allAuthenticatedUsers`. By default, snapshots are private, but resource-level IAM allows operators to grant public access directly on a snapshot without affecting the project policy, making these bindings easy to overlook and difficult to audit.

        **Why this matters**

        - **Full disk contents exposed:** A snapshot is a point-in-time copy of an entire disk; anyone who can create a disk from it gains access to every file, including SSH keys, service-account credentials, application secrets, and customer data.
        - **No interactive session required:** An attacker does not need to compromise a running VM; they simply create a disk from the snapshot in a project they control and mount it locally.
        - **Resource-level IAM bypasses project hardening:** Snapshot IAM is set on the resource itself, so project-level deny policies and org constraints do not automatically prevent a snapshot-specific public binding.
        - **Persistent exposure from temporary grants:** Snapshots shared publicly for a one-off restore and never revoked remain exposed indefinitely and are consistently cited in real GCP breach reports.

        **Risk mitigation**

        - **Restrict access to named principals:** Bind only specific users, groups, or service accounts with the narrowest role needed, such as `roles/compute.storageAdmin`.
        - **Audit snapshot IAM regularly:** Enumerate snapshot IAM policies on a schedule and alert on any binding that includes `allUsers` or `allAuthenticatedUsers`.
        - **Remove stale grants immediately:** Treat any public snapshot binding as an incident; revoke the binding and investigate whether data was accessed.
      audit: |
        ### Audit via Console

        1. Go to **Compute Engine > Snapshots** in the Google Cloud Console.
        2. Select each snapshot.
        3. Open the **Permissions** panel.
        4. Review all IAM bindings and confirm that no principal listed is `allUsers` or `allAuthenticatedUsers`.

        A passing snapshot shows no bindings to `allUsers` or `allAuthenticatedUsers` in its IAM policy. A failing snapshot shows at least one binding granting access to `allUsers` or `allAuthenticatedUsers`.

        ### Audit via CLI

        1. List all snapshots in the project, then retrieve the IAM policy for each:

        ```bash
        gcloud compute snapshots list \
          --format="table(name,creationTimestamp,status)"

        gcloud compute snapshots get-iam-policy SNAPSHOT_NAME \
          --format="json"
        ```

        A passing snapshot returns an IAM policy with no binding whose `members` array contains `allUsers` or `allAuthenticatedUsers`. A failing snapshot returns a binding that includes `allUsers` or `allAuthenticatedUsers` in the `members` array.
      remediation:
        - id: terraform
          desc: |
            Manage snapshot IAM only via `google_compute_snapshot_iam_member` (or `_binding`) with explicit principals — never with `allUsers` or `allAuthenticatedUsers`:

            ```hcl
            resource "google_compute_snapshot_iam_member" "restorer" {
              project  = var.project_id
              snapshot = google_compute_snapshot.app_disk.name
              role     = "roles/compute.storageAdmin"
              member   = "group:platform-restore@example.com" # never allUsers / allAuthenticatedUsers
            }
            ```

            Audit existing bindings: import the snapshot's IAM policy with `terraform import google_compute_snapshot_iam_policy.snapshot projects/PROJECT/global/snapshots/SNAPSHOT`, then remove any public-principal members in the source HCL and re-apply.
        - id: console
          desc: |
            Remove any public principal from the snapshot IAM policy:

            1. Open **Compute Engine** → **Snapshots**.
            2. Select the flagged snapshot.
            3. Open the **Permissions** panel (or the info pane → **Permissions**).
            4. Locate any binding whose principal is `allUsers` or `allAuthenticatedUsers` and remove it.
            5. Add specific principals (users, groups, service accounts) that need restore access, using the narrowest appropriate role.
            6. Save and verify the policy no longer lists the public principals.
        - id: cli
          desc: |
            Remove public bindings from the snapshot:

            ```bash
            gcloud compute snapshots remove-iam-policy-binding SNAPSHOT_NAME \
              --member=allUsers \
              --role=ROLE_NAME

            gcloud compute snapshots remove-iam-policy-binding SNAPSHOT_NAME \
              --member=allAuthenticatedUsers \
              --role=ROLE_NAME
            ```
    refs:
      - url: https://cloud.google.com/compute/docs/access/iam
        title: Compute Engine - IAM roles and permissions
      - url: https://cloud.google.com/iam/docs/overview#allusers
        title: IAM - Public principals (allUsers, allAuthenticatedUsers)
  - uid: mondoo-gcp-security-compute-snapshot-iam-no-public-principals-gcp
