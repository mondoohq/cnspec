        values['vpc_peering_config'].all(
          _['vpc'] != empty &&
          _['vpc'] != "" &&
          _['vpc'].find(/networks\/default$/) == []
        )
      )
  - uid: mondoo-gcp-security-memcache-instance-not-default-vpc
    title: Ensure Memorystore for Memcached instances are not on the default VPC
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-1-5
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-gcp-security-memcache-instance-not-default-vpc-gcp
        tags:
          mondoo.com/filter-title: GCP Memorystore for Memcached
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-memcache-instance-not-default-vpc-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-memcache-instance-not-default-vpc-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-memcache-instance-not-default-vpc-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Memorystore for Memcached instances are attached to a purpose-built VPC rather than the auto-created `default` network. Memcached has no native authentication and no native in-transit encryption, making network isolation the primary and often only access control.

        **Why this matters**

        - **No native auth:** Because Memcached does not authenticate clients, any workload that can reach port 11211 can read or modify the entire keyspace without credentials.
        - **Permissive default rules:** The default VPC ships with allow-internal firewall rules that span the entire VPC CIDR and allow ingress from `0.0.0.0/0` on common ports, providing minimal isolation for a cache with no auth.
        - **Unrelated workload access:** Attaching Memcached to the default VPC means test VMs, contractor sandboxes, and other development workloads share a network with the cache and can access it without restriction.
        - **Lateral movement:** An attacker who compromises any workload on the default VPC gains immediate access to Memcached and can exfiltrate cached session tokens, user data, or application secrets.

        **Risk mitigation**

        - **Dedicated network isolation:** Attaching Memcached to a purpose-built VPC with explicit firewall rules restricting port 11211 access to only the application tier is the primary defense given Memcached's lack of native authentication.
        - **Minimal blast radius:** A dedicated VPC limits who can reach the cache in the event of a workload compromise, preventing the cache from becoming a lateral movement path across the broader environment.
      audit: |
        ### Audit via Console

        1. Go to **Memorystore for Memcached** in the Google Cloud Console.
        2. Select each Memcached instance.
        3. Under the **Details** tab, inspect the **Authorized network** field.
        4. Confirm the authorized network is not the `default` network.

        A passing Memcached instance shows a dedicated, non-default VPC as the authorized network. A failing instance shows `default` as the authorized network.

        ### Audit via CLI

        1. List all Memcached instances and inspect the authorized network:

        ```bash
        gcloud memcache instances list \
          --region=REGION \
          --format="table(name,createTime,state)"

        gcloud memcache instances describe INSTANCE_ID \
          --region=REGION \
          --format="value(authorizedNetwork)"
        ```

        A passing instance returns an authorized network resource path that does not end in `/networks/default`. A failing instance returns a path ending in `/networks/default`.
      remediation:
        - id: terraform
          desc: |
            ```hcl
            resource "google_compute_network" "memcache_vpc" {
              name                    = "memcache-private"
              auto_create_subnetworks = false
            }

            resource "google_memcache_instance" "cache" {
              name           = "my-memcache"
              region         = "us-central1"
              authorized_network = google_compute_network.memcache_vpc.id
              node_count     = 1
              node_config {
                cpu_count      = 1
                memory_size_mb = 1024
              }
            }
            ```
        - id: console
          desc: |
            VPC attachment is fixed at instance creation. Recreate the Memcached instance attached to a dedicated VPC.
        - id: cli
          desc: |
            ```bash
            gcloud memcache instances create INSTANCE_ID \
              --region=REGION \
              --authorized-network=projects/PROJECT/global/networks/MY_VPC \
              --node-count=1 \
              --node-cpu=1 \
              --node-memory=1GB
            ```
    refs:
      - url: https://cloud.google.com/memorystore/docs/memcached/networking
        title: Memorystore for Memcached - Networking
  - uid: mondoo-gcp-security-memcache-instance-not-default-vpc-gcp
    filters: asset.platform == 'gcp'
    mql: |
      gcp.memcache.instances.all(network.name != "default")
  - uid: mondoo-gcp-security-memcache-instance-not-default-vpc-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_memcache_instance')
    mql: |
      terraform.resources('google_memcache_instance').all(
        arguments.authorized_network != empty &&
        arguments.authorized_network != "" &&
        arguments.authorized_network.find(/networks\/default$/) == []
      )
  - uid: mondoo-gcp-security-memcache-instance-not-default-vpc-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_memcache_instance')
    mql: |
