  - uid: mondoo-gcp-security-gke-cluster-master-authorized-networks-enabled
    title: Ensure master authorized networks are enabled on GKE clusters
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-gcp-security-gke-cluster-master-authorized-networks-enabled-gcp
        tags:
          mondoo.com/filter-title: GCP GKE Cluster
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-gke-cluster-master-authorized-networks-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-gke-cluster-master-authorized-networks-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-gke-cluster-master-authorized-networks-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that master authorized networks are configured on GKE clusters, restricting access to the Kubernetes API server to a defined set of trusted CIDR ranges. By default, the GKE control plane endpoint is reachable from any IP address on the internet, meaning any client with valid credentials can interact with the API server from anywhere.

        **Why this matters**

        - **Exposed control plane:** An unrestricted API server endpoint allows attackers anywhere on the internet to target it with credential-stuffing, brute-force, or zero-day exploit attempts.
        - **Credential misuse from any location:** If credentials are compromised, the attacker can leverage them from any IP address rather than needing to be on a trusted network.
        - **Increased blast radius:** Direct public reachability of the API server means a single credential compromise can immediately result in full cluster control.
        - **Network segmentation requirement:** Restricting API access to known networks such as corporate VPNs or bastion hosts is a foundational network hardening expectation in CIS benchmarks and security frameworks.

        **Risk mitigation**

        - **Define authorized CIDR ranges:** Configure `masterAuthorizedNetworksConfig` with the minimum set of IP ranges that legitimately need API access.
        - **Use private endpoints where possible:** Combine master authorized networks with private cluster configuration to further restrict control plane reachability.
        - **Keep ranges current:** Review and update authorized CIDR blocks when network topology changes to avoid both gaps and unnecessary exposure.
      audit: |
        ### Audit via Console

        1. Sign in to the [Google Cloud Console](https://console.cloud.google.com).
        2. Navigate to **Kubernetes Engine** > **Clusters**.
        3. Select a cluster and click the **Details** tab.
        4. Under the **Networking** section, check the value of **Control plane authorized networks**.

        A passing cluster shows **Control plane authorized networks: Enabled** with one or more CIDR blocks listed. A failing cluster shows the feature as disabled.

        ### Audit via CLI

        1. Describe the cluster and inspect the master authorized networks configuration:

        ```bash
        gcloud container clusters describe CLUSTER_NAME \
          --zone ZONE \
          --format="value(masterAuthorizedNetworksConfig.enabled)"
        ```

        A passing cluster returns `True`. A failing cluster returns `False` or no output.
      remediation:
        - id: terraform
          desc: |
            To ensure master authorized networks are enabled on GKE clusters in Terraform, enable master authorized networks in your GKE cluster configuration:

            ```hcl
            resource "google_container_cluster" "example" {
              name     = "example-cluster"
              location = "us-central1"

              master_authorized_networks_config {
                cidr_blocks {
                  cidr_block   = "10.0.0.0/8"
                  display_name = "Corporate network"
                }
              }
            }
            ```
        - id: console
          desc: |
            To ensure master authorized networks are enabled on GKE clusters using the Google Cloud Console:

            1. In the Google Cloud console, go to the **Kubernetes Engine > Clusters** page.
            2. Select the cluster you want to configure.
            3. Select **Edit**.
            4. In the **Networking** section, enable **Control plane authorized networks**.
            5. Add the CIDR blocks for authorized networks.
            6. Select **Save**.
        - id: cli
          desc: |
            To ensure master authorized networks are enabled on GKE clusters using the Google Cloud CLI:

            ```bash
            gcloud container clusters update CLUSTER_NAME --zone ZONE --enable-master-authorized-networks --master-authorized-networks CIDR1,CIDR2
            ```
    refs:
      - url: https://cloud.google.com/kubernetes-engine/docs/concepts/security-overview
        title: GKE Security Overview
  - uid: mondoo-gcp-security-gke-cluster-master-authorized-networks-enabled-gcp
    filters: asset.platform == "gcp-gke-cluster"
    mql: gcp.project.gkeService.cluster.masterAuthorizedNetworksConfig['enabled'] == true
  - uid: mondoo-gcp-security-gke-cluster-master-authorized-networks-enabled-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' &&
        terraform.resources.contains(nameLabel == 'google_container_cluster')
    mql: |
