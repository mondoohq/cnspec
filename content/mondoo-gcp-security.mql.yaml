      - uid: mondoo-gcp-security-spanner-backup-schedule-cmek-encryption-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that every backup schedule attached to a Cloud Spanner instance produces backups encrypted with a customer-managed encryption key, using either `CUSTOMER_MANAGED_ENCRYPTION` or `USE_DATABASE_ENCRYPTION`. Backup schedules that default to `GOOGLE_DEFAULT_ENCRYPTION` create copies of the database outside the customer's key management boundary.

        **Why this matters**

        - **Independent backup surface:** CMEK governs live database data, but backup schedules are a separate configuration surface that can diverge from the database's encryption setting after key rotations or API-level changes.
        - **Key revocation gap:** Revoking the database's CMEK does not prevent restoring from a scheduled backup encrypted with a Google-managed key, undermining the core revocation guarantee.
        - **Audit trail inconsistency:** Cloud KMS key-usage logs do not cover scheduled backup operations that used Google-managed encryption, creating gaps that auditors use to challenge compliance attestations.
        - **Restore compliance risk:** Restoring from a Google-managed-key backup re-materializes data under a different encryption regime, potentially violating data sovereignty or contractual encryption requirements.

        **Risk mitigation**

        - **Use `USE_DATABASE_ENCRYPTION` as the default:** This setting causes backup schedules to track whatever the database is encrypted with, preventing drift even after key rotations.
        - **Audit existing schedules:** Enumerate all backup schedules with `gcloud spanner backup-schedules list` and update any that return `GOOGLE_DEFAULT_ENCRYPTION` in the `ENCRYPTION_TYPE` column.
        - **Include encryption config in infrastructure-as-code:** Manage `google_spanner_backup_schedule` resources in Terraform with an explicit `encryption_config` block so that the setting is captured in version control and cannot be omitted by accident.
      audit: |
        ### Audit via Console

        1. Open the [Google Cloud Console](https://console.cloud.google.com/) and navigate to **Spanner**.
        2. Select the instance, then select a database.
        3. In the left navigation, click **Backup schedules**.
        4. For each schedule, review the **Encryption** column. Verify the value is **Use database encryption** or **Customer-managed encryption key**.

        A passing backup schedule shows **Use database encryption** or **Customer-managed encryption key** in the **Encryption** column. A failing backup schedule shows **Google-managed encryption key**.

        ### Audit via CLI

        1. List backup schedules for a database:

        ```bash
        gcloud spanner backup-schedules list \
          --instance=INSTANCE_ID \
          --database=DATABASE_ID \
          --format="table(name,encryptionConfig.encryptionType)"
        ```

        A passing schedule returns `CUSTOMER_MANAGED_ENCRYPTION` or `USE_DATABASE_ENCRYPTION` in the `ENCRYPTION_TYPE` column. A failing schedule returns `GOOGLE_DEFAULT_ENCRYPTION`.
      remediation:
        - id: terraform
          desc: |
            Set `encryption_config` on each `google_spanner_backup_schedule` — `USE_DATABASE_ENCRYPTION` is usually the safest default:

            ```hcl
            resource "google_spanner_backup_schedule" "daily" {
              instance      = google_spanner_instance.app.name
              database      = google_spanner_database.app.name
              name          = "daily-backup"
              retention_duration = "604800s"

              encryption_config {
                encryption_type = "USE_DATABASE_ENCRYPTION"
              }

              full_backup_spec {}
              spec {
                cron_spec {
                  text = "0 2 * * *"
                }
              }
            }
            ```
        - id: console
          desc: |
            Update each flagged backup schedule to use customer-managed encryption:

            1. Open **Spanner** → select the instance → select the affected database.
            2. Open **Backup schedules** and select the schedule.
            3. Under **Encryption**, select **Use database encryption** (recommended) or **Customer-managed encryption** and point at a Cloud KMS key.
            4. Save. New backups produced by the schedule will use the selected encryption.
        - id: cli
          desc: |
            Update the schedule to inherit the database's encryption:

            ```bash
            gcloud spanner backup-schedules update SCHEDULE_ID \
              --instance=INSTANCE_ID \
              --database=DATABASE_ID \
              --encryption-type=USE_DATABASE_ENCRYPTION
            ```

            Or pin it to an explicit CMEK key:

            ```bash
            gcloud spanner backup-schedules update SCHEDULE_ID \
              --instance=INSTANCE_ID \
              --database=DATABASE_ID \
              --encryption-type=CUSTOMER_MANAGED_ENCRYPTION \
              --kms-key=projects/PROJECT/locations/LOCATION/keyRings/RING/cryptoKeys/KEY
            ```
    refs:
      - url: https://cloud.google.com/spanner/docs/cmek
        title: Customer-managed encryption keys (CMEK) for Cloud Spanner
      - url: https://cloud.google.com/spanner/docs/backup-schedules
        title: Cloud Spanner - Backup schedules
  - uid: mondoo-gcp-security-spanner-backup-schedule-cmek-encryption-gcp
