  # No runtime variant: the cnquery gcp provider does not expose API Gateway resources. Cloud Endpoints (google_endpoints_service) is a related concern that is not covered here; this check focuses on API Gateway.
  - uid: mondoo-gcp-security-apigateway-config-requires-authentication
    title: Ensure API Gateway configs reference at least one OpenAPI document
    impact: 50
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-2
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-2
    variants:
      - uid: mondoo-gcp-security-apigateway-config-requires-authentication-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-apigateway-config-requires-authentication-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-apigateway-config-requires-authentication-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that every API Gateway API config references at least one OpenAPI document. The OpenAPI document is the contract that defines authentication requirements, authorization rules, and request validation for API Gateway; a config with no OpenAPI document has no enforceable security definitions and leaves the backend effectively unauthenticated.

        **Why this matters**

        - **Authentication is defined in the spec:** API Gateway enforces caller authentication through `securityDefinitions` and `security` requirements declared inside the OpenAPI document; without the document those definitions cannot exist.
        - **Missing spec equals unauthenticated backend:** An API Gateway config with no OpenAPI document passes all requests to the backend without any identity check, exposing the backend service to the open internet.
        - **Unauthenticated API surface is a leading cause of cloud data leaks:** Public, unauthenticated APIs are among the most frequently exploited entry points in cloud environments.
        - **The spec is a prerequisite for further controls:** Rate limiting, quota enforcement, and per-operation authorization all depend on the OpenAPI spec being present and correctly structured.

        **Risk mitigation**

        - **Attach an OpenAPI document to every API config:** Ensure every `google_api_gateway_api_config` resource includes at least one `openapi_documents` entry before deployment.
        - **Declare security schemes on every operation:** Inside the referenced OpenAPI spec, define `securityDefinitions` or `components.securitySchemes` and attach a `security` requirement to every operation path.
        - **Enforce defense in depth at the backend:** Configure Cloud Run, Cloud Functions, or other backends to reject unauthenticated requests independently of API Gateway so a misconfigured gateway does not expose the backend.
      audit: |
        ### Audit via Console

        1. In the Google Cloud Console, go to **API Gateway**.
        2. Select an API and then select the associated API config.
        3. Review the config details to confirm that an **OpenAPI specification** is attached.
        4. Download or view the OpenAPI specification and verify that it declares `securityDefinitions` (OpenAPI 2) or `components.securitySchemes` (OpenAPI 3) with a `security` requirement applied to each operation.

        A passing API config shows an attached OpenAPI document that includes security definitions on all operations. A failing API config shows no OpenAPI document attached or shows an OpenAPI document with no security definitions.

        ### Audit via CLI

        1. List all API configs for a given API:

        ```bash
        gcloud api-gateway api-configs list \
          --api=API_ID \
          --format='table(name,createTime)'
        ```

        2. Describe each config and inspect the `openapiDocuments` field:

        ```bash
        gcloud api-gateway api-configs describe CONFIG_ID \
          --api=API_ID \
          --format='value(openapiDocuments)'
        ```

        A passing API config returns a non-empty `openapiDocuments` list. A failing API config returns an empty list or no `openapiDocuments` field.
      remediation:
        - id: terraform
          desc: |
            To ensure an API Gateway config has an attached OpenAPI document in Terraform:

            ```hcl
            resource "google_api_gateway_api_config" "default" {
              api           = google_api_gateway_api.default.api_id
              api_config_id = "my-config"

              openapi_documents {
                document {
                  path     = "spec.yaml"
                  contents = filebase64("${path.module}/openapi.yaml")
                }
              }
            }
            ```

            Inside the referenced `openapi.yaml`, declare `securityDefinitions` and attach a `security` requirement to every operation.
        - id: console
          desc: |
            To attach an OpenAPI document to an API Gateway config using the Google Cloud Console:

            1. In the Google Cloud Console, go to **API Gateway**.
            2. Open the API and select **Create gateway** or edit the existing config.
            3. Upload the OpenAPI specification that defines `securityDefinitions` and per-operation `security` requirements.
            4. Save and deploy.
        - id: cli
          desc: |
            To create an API Gateway config with an OpenAPI document using the Google Cloud CLI:

            ```bash
            gcloud api-gateway api-configs create CONFIG_ID \
              --api=API_ID \
              --openapi-spec=openapi.yaml
            ```

            Ensure the supplied `openapi.yaml` declares `securityDefinitions` and applies a `security` requirement to every operation.
    refs:
      - url: https://cloud.google.com/api-gateway/docs/authentication-method
        title: API Gateway authentication methods
      - url: https://cloud.google.com/api-gateway/docs/openapi-overview
        title: API Gateway OpenAPI overview
  - uid: mondoo-gcp-security-apigateway-config-requires-authentication-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_api_gateway_api_config')
    mql: |
      terraform.resources('google_api_gateway_api_config').all(
        blocks.where(type == 'openapi_documents') != empty
