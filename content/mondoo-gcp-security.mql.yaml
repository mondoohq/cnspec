      - uid: mondoo-gcp-security-bigquery-dataset-no-domain-wide-access-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-bigquery-dataset-no-domain-wide-access-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-bigquery-dataset-no-domain-wide-access-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that BigQuery dataset access controls do not contain domain-type entries, which grant access to every member of an entire Google Workspace or Cloud Identity domain. By default, BigQuery allows domain-wide access entries to be added to a dataset's access list, which can be convenient but violates the principle of least privilege by granting access to all domain users regardless of their individual need.

        **Why this matters**

        - **Blanket access to all domain users:** A domain access entry grants every person with a `@example.com` account access to the dataset, including contractors, temporary staff, and accounts that were recently provisioned or not yet offboarded.
        - **Audit impracticality at domain scale:** When access is granted at the domain level, access reviews cannot meaningfully track which specific users accessed the dataset; any of thousands of accounts may have queried data.
        - **Need-to-know violation:** Compliance frameworks require that access to sensitive data be granted based on demonstrated business need, not on organizational membership; domain grants cannot satisfy this requirement.
        - **Breach impact amplification:** If any account in the domain is compromised, the attacker immediately inherits dataset access, widening the blast radius of credential theft across the entire domain membership.

        **Risk mitigation**

        - **Replace domain grants with group grants:** Create purpose-specific Google Groups containing only the users who require access, and grant those groups the necessary BigQuery roles on the dataset.
        - **Audit all datasets for domain access entries:** Use the `bq show` command to inspect the `access` array of every dataset and remove any entries that contain a `domain` field.
        - **Enforce fine-grained access in new datasets:** Adopt a Terraform module standard for dataset creation that explicitly excludes domain-type access entries, and review access blocks in code review before datasets are provisioned.
      audit: |
        ### Audit via Console

        1. In the Google Cloud console, go to the **BigQuery** page.
        2. In the Explorer panel, expand your project and select a dataset.
        3. Select **Sharing** and then **Permissions**.
        4. Review the list of principals and identify any entries that represent an entire domain such as `example.com`.
        5. Confirm no domain-type access entries are present.

        A passing dataset shows no domain-wide principals in its permissions list. A failing dataset lists one or more domain entries such as `example.com` with a role assigned.

        ### Audit via CLI

        1. Show the access configuration of a specific dataset:

        ```bash
        bq show --format=prettyjson PROJECT_ID:DATASET_ID
        ```

        2. Review the `access` array in the output for entries containing a `"domain"` field.

        A passing dataset returns an `access` array with no objects containing a `domain` key. A failing dataset returns one or more access entries with a `"domain"` field set to a domain name.
      remediation:
        - id: terraform
          desc: |
            To ensure that BigQuery datasets do not grant domain-wide access in Terraform, remove any `access` blocks that use the `domain` field and replace them with specific user or group grants:

            ```hcl
            resource "google_bigquery_dataset" "example" {
              dataset_id = "example_dataset"
              location   = "US"

              access {
                role          = "OWNER"
                user_by_email = google_service_account.bqowner.email
              }

              access {
                role           = "READER"
                group_by_email = "data-analysts@example.com"
              }
            }
            ```
        - id: console
          desc: |
            To ensure that BigQuery datasets do not grant domain-wide access using the Google Cloud Console:

            1. In the Google Cloud console, go to the **BigQuery** page.
            2. Select the dataset you want to configure.
            3. Select **Sharing** and then **Permissions**.
            4. Review the list of principals and identify any entries granted to an entire domain such as `example.com`.
            5. Remove domain-wide entries and replace them with specific Google Groups or individual users.
            6. Select **Done**.
        - id: cli
          desc: |
            To ensure that BigQuery datasets do not grant domain-wide access using the Google Cloud CLI:

            1. Retrieve the current dataset access configuration:

            ```bash
            bq show --format=prettyjson PROJECT_ID:DATASET_ID
            ```

            2. Review the `access` array and identify entries with `"domain"` fields.

            3. Remove domain-wide access entries and replace them with specific group or user access. Save the modified configuration and update:

            ```bash
            bq update --source=dataset.json PROJECT_ID:DATASET_ID
            ```
    refs:
      - url: https://cloud.google.com/bigquery/docs/best-practices-security
        title: BigQuery Security Best Practices
  - uid: mondoo-gcp-security-bigquery-dataset-no-domain-wide-access-gcp
    filters: asset.platform == "gcp-bigquery-dataset"
    mql: gcp.bigquery.dataset.access.none(entityType == "DOMAIN")
  - uid: mondoo-gcp-security-bigquery-dataset-no-domain-wide-access-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' &&
        terraform.resources.contains(nameLabel == 'google_bigquery_dataset')
    mql: |
      terraform.resources('google_bigquery_dataset').all(
        blocks.where(type == 'access').none(arguments.domain != empty)
      )
  - uid: mondoo-gcp-security-bigquery-dataset-no-domain-wide-access-terraform-plan
    filters: |
      asset.platform == 'terraform-plan'
      terraform.plan.resourceChanges.contains(type == 'google_bigquery_dataset')
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_bigquery_dataset').all(
        change.after['access'] == empty ||
        change.after['access'].none(_['domain'] != empty)
      )
  - uid: mondoo-gcp-security-bigquery-dataset-no-domain-wide-access-terraform-state
    filters: |
      asset.platform == 'terraform-state'
      terraform.state.resources.contains(type == 'google_bigquery_dataset')
    mql: |
      terraform.state.resources.where(type == 'google_bigquery_dataset').all(
        values['access'] == empty ||
        values['access'].none(_['domain'] != empty)
      )
  - uid: mondoo-gcp-security-cloud-sql-mysql-instances-not-publicly-exposed
    title: Ensure Cloud SQL MySQL instances are not publicly exposed
    impact: 100
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-gcp-security-cloud-sql-mysql-instances-not-publicly-exposed-gcp
        tags:
          mondoo.com/filter-title: GCP Cloud SQL for MySQL
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-cloud-sql-mysql-instances-not-publicly-exposed-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-sql-mysql-instances-not-publicly-exposed-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-sql-mysql-instances-not-publicly-exposed-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Cloud SQL MySQL instances are configured with private IP addresses only and do not have a public IP address assigned, which would expose the database endpoint to the open internet. By default, Cloud SQL instances can be created with a public IP address enabled, making the MySQL port reachable by any host that can route to GCP's public infrastructure.

        **Why this matters**

        - **Direct internet exposure:** A public IP address puts the MySQL endpoint within reach of automated scanners, brute-force tools, and exploit frameworks without requiring any network compromise first.
        - **Credential attack surface:** Publicly exposed MySQL instances are continuously probed for weak passwords and default credentials; successful brute-force attacks lead directly to database compromise.
        - **CVE exploitation window:** Unpatched MySQL vulnerabilities can be exploited remotely when a public IP is present, even before a patch is available or applied.
        - **Compliance network segmentation requirements:** Most data protection frameworks require databases containing sensitive data to reside in private network segments with no direct public internet access.

        **Risk mitigation**

        - **Switch to private IP networking:** Configure instances with a private IP address in a VPC network and remove the public IP, isolating the database from direct internet access while maintaining connectivity for authorized internal clients.
        - **Use Cloud SQL Auth Proxy for external access:** When developers or applications outside the VPC need to connect, route connections through the Cloud SQL Auth Proxy, which uses IAM for authentication rather than exposing the database port directly.
        - **Apply the `restrictPublicIp` organization policy:** Enable `constraints/sql.restrictPublicIp` to prevent any Cloud SQL instance in the organization from being created or modified to include a public IP address.
      audit: |
        **Using Google Cloud Console**

          1. Navigate to the Cloud SQL Instances page within the Google Cloud Console: https://console.cloud.google.com/sql/instances
          2. Review each MySQL instance listed. For every primary (non-replica) Second Generation instance, examine its networking details to confirm that a Private IP address is assigned and that no Public IP address is present.

        **Using Google Cloud CLI**

          1. Obtain a list of all your Cloud SQL instances:

            ```bash
            gcloud sql instances list
            ```

          2. For each instance identified as `backendType: SECOND_GEN` and `instanceType: CLOUD_SQL_INSTANCE` (primary instance), retrieve its full configuration details. Read replicas (`instanceType: READ_REPLICA_INSTANCE`) inherit network settings, and First Generation instances do not support private IPs, so they can be skipped for this check.

            ```bash
            gcloud sql instances describe INSTANCE_NAME
            ```

          3. Inspect the `ipAddresses` section in the output for the instance. Verify that an entry exists with `type: PRIVATE`. Crucially, ensure there is no entry with `type: PRIMARY`, as this indicates a public IP address. While an instance can technically possess both during transitions, the secure state is having only the `PRIVATE` type assigned.
      remediation:
        - id: terraform
          desc: |
            To ensure Cloud SQL MySQL instances are not publicly exposed in Terraform:

            ```hcl
            resource "google_sql_database_instance" "example" {
              name             = "example-instance"
              database_version = "MYSQL_8_0"  # Or your preferred version
              region           = "us-central1"  # Replace with your region

              settings {
                tier = "db-f1-micro"

                # Remove public IP by setting ip_configuration.ipv4_enabled to false
                ip_configuration {
                  ipv4_enabled    = false
                  private_network = "projects/PROJECT_ID/global/networks/VPC_NETWORK_NAME"
                }
              }
            }
            ```
        - id: console
          desc: |
            To ensure Cloud SQL MySQL instances are not publicly exposed using the Google Cloud Console:

            1.  Access the Cloud SQL Instances overview page in the Google Cloud Console: https://console.cloud.google.com/sql/instances
            2.  Select the name of the target instance to view its configuration details.
            3.  Navigate to the **Connections** settings tab.
            4.  Under the **Networking** section, locate and uncheck the box labeled **Public IP**.
            5.  Confirm the modification by selecting the **Save** button.

            **Prevention:**

            To proactively enforce that new Cloud SQL instances are not created with public IP addresses, implement the `Restrict Public IP access on Cloud SQL instances` Organization Policy. You can configure this policy at: https://console.cloud.google.com/iam-admin/orgpolicies/sql-restrictPublicIp
        - id: cli
          desc: |
            To ensure Cloud SQL MySQL instances are not publicly exposed using the Google Cloud CLI:

            1.  Modify the target instance to remove its public IP address and ensure it's associated with a VPC network for private IP access. Replace `INSTANCE_NAME` with the actual instance name and `VPC_NETWORK_NAME` with the desired VPC network name:
                ```bash
                gcloud sql instances patch INSTANCE_NAME --network=VPC_NETWORK_NAME --no-assign-ip
                ```
                *Note: If the instance is already associated with the correct VPC network for private IP, you might only need the `--no-assign-ip` flag.*
            2.  Verify that the public IP address has been removed by inspecting the instance's configuration:
                ```bash
                gcloud sql instances describe INSTANCE_NAME
                ```
                Check the `ipAddresses` section in the output to confirm the absence of an entry with `type: PRIMARY`.
    refs:
      - url: https://cloud.google.com/sql/docs/mysql/best-practices
        title: Cloud SQL Best Practices
  - uid: mondoo-gcp-security-cloud-sql-mysql-instances-not-publicly-exposed-gcp
    filters: asset.platform == 'gcp-sql-mysql'
    mql: |
      gcp.sql.instance.ipAddresses != empty &&
      gcp.sql.instance.ipAddresses.all(type != "PRIMARY")
  - uid: mondoo-gcp-security-cloud-sql-mysql-instances-not-publicly-exposed-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_sql_database_instance' && arguments.database_version.contains("MYSQL"))
    mql: |
      # Check that settings block with ip_configuration exists and  ipv4_enabled is set to false (no public IP) on all SQL instances
      terraform.resources("google_sql_database_instance").where(arguments.database_version.contains("MYSQL")).all(
         blocks.where(type == 'settings') != empty &&
        blocks.where(type == 'settings').all(blocks.where(type == 'ip_configuration') != empty) &&
        blocks.where(type == "settings").all(
          blocks.where(type == "ip_configuration").all(arguments.ipv4_enabled == false)
        )
      )
  - uid: mondoo-gcp-security-cloud-sql-mysql-instances-not-publicly-exposed-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' &&
        terraform.plan.resourceChanges.contains(type == 'google_sql_database_instance' && change.after.database_version.contains('MYSQL'))
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_sql_database_instance' && change.after.database_version.contains('MYSQL')).all(
        change.after['settings'].all(
          _['ip_configuration'].all(_['ipv4_enabled'] == false)
        )
      )
  - uid: mondoo-gcp-security-cloud-sql-mysql-instances-not-publicly-exposed-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'google_sql_database_instance' && values.database_version.contains('MYSQL'))
    mql: |
      terraform.state.resources.where(type == 'google_sql_database_instance' && values.database_version.contains('MYSQL')).all(
        values['settings'].all(
          _['ip_configuration'].all(_['ipv4_enabled'] == false)
        )
      )
  - uid: mondoo-gcp-security-cloud-sql-mysql-connections-require-ssl-tls
    title: Ensure Cloud SQL MySQL connections require SSL/TLS
    impact: 100
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    variants:
      - uid: mondoo-gcp-security-cloud-sql-mysql-connections-require-ssl-tls-gcp
        tags:
          mondoo.com/filter-title: GCP Cloud SQL for MySQL
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-cloud-sql-mysql-connections-require-ssl-tls-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-sql-mysql-connections-require-ssl-tls-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-sql-mysql-connections-require-ssl-tls-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Cloud SQL MySQL instances are configured to require SSL/TLS for all incoming connections. By default, Cloud SQL allows unencrypted connections, which means data transmitted between applications and the database server can be intercepted. Setting `sslMode` to `ENCRYPTED_ONLY` forces all clients to use encrypted transport, protecting credentials and query results in transit.

        **Why this matters**

        - **Data confidentiality:** Encrypting connections prevents network eavesdroppers from reading SQL queries, results, and credentials as they cross the wire.
        - **Man-in-the-middle protection:** TLS certificate verification blocks attackers from silently inserting themselves between the application and the database.
        - **Compliance alignment:** Many regulatory frameworks require encryption of data in transit, making this setting a prerequisite for meeting those obligations.
        - **Defense in depth:** Even on internal VPC networks, lateral movement by a compromised workload can intercept unencrypted database traffic without SSL/TLS.

        **Risk mitigation**

        - **Credential theft prevention:** Requiring TLS ensures database usernames and passwords cannot be captured in plaintext by anyone with network access.
        - **Regulatory exposure reduction:** Enforcing encrypted-only connections closes a common finding in security audits and compliance assessments covering data-in-transit protections.
      audit: |
        **Using Google Cloud Console**

        1.  Navigate to the Cloud SQL Instances page: https://console.cloud.google.com/sql/instances
        2.  Select the name of the MySQL instance you want to audit.
        3.  Select the **Connections** tab.
        4.  Go to the **Security** sub-tab.
        5.  Verify that the checkbox for **Allow only SSL connections** is checked.

        **Using Google Cloud CLI**

        1.  Retrieve the configuration details for the instance:
            ```bash
            gcloud sql instances describe INSTANCE_NAME
            ```
        2.  Inspect the output and locate the `settings.ipConfiguration` section.
        3.  Ensure the value for `sslMode` is set to `ENCRYPTED_ONLY`.

            Example relevant output snippet:
            ```yaml
            settings:
              ipConfiguration:
                sslMode: ENCRYPTED_ONLY
            ```
      remediation:
        - id: console
          desc: |
            To ensure Cloud SQL MySQL connections require SSL/TLS using the Google Cloud Console:

            1.  Access the Cloud SQL Instances overview page: https://console.cloud.google.com/sql/instances
            2.  Select the name of the target MySQL instance.
            3.  Navigate to the **Connections** tab, then the **Security** sub-tab.
            4.  Check the box labeled **Allow only SSL connections**.
            5.  Select **Save** to apply the change. *Note: This may trigger an instance restart.*

            **Prevention:**

            Always configure new Cloud SQL MySQL instances with the "Allow only SSL connections" option enabled during creation via the Console. Regularly audit instances to ensure compliance.
        - id: cli
          desc: |
            To ensure Cloud SQL MySQL connections require SSL/TLS using the Google Cloud CLI:

            1.  Enable the SSL Mode to be "ENCRYPTED_ONLY":
                ```bash
                gcloud sql instances patch INSTANCE_NAME --ssl-mode=ENCRYPTED_ONLY
                ```
                *Note: This command may cause the instance to restart.*

            **Prevention:**

            Always configure new Cloud SQL MySQL instances with the `--ssl-mode=ENCRYPTED_ONLY` flag during creation via the CLI. Regularly audit instances to ensure compliance.
        - id: terraform
          desc: |
            To ensure Cloud SQL MySQL connections require SSL/TLS in Terraform, ensure the `ssl_mode` attribute within the `ip_configuration` block is set to `ENCRYPTED_ONLY`:

            ```hcl
            resource "google_sql_database_instance" "default" {
              name             = "my-mysql-instance"
              database_version = "MYSQL_8_0"
              region           = "us-central1"

              settings {
                tier = "db-f1-micro"
                ip_configuration {
                  ipv4_enabled = true
                  ssl_mode     = "ENCRYPTED_ONLY"
                }
              }
            }
            ```

            **Prevention:**

            Always configure new Cloud SQL MySQL instances with `ssl_mode = "ENCRYPTED_ONLY"` during creation via Terraform. Regularly audit instances to ensure compliance.
    refs:
      - url: https://cloud.google.com/sql/docs/mysql/best-practices
        title: Cloud SQL Best Practices
  - uid: mondoo-gcp-security-cloud-sql-mysql-connections-require-ssl-tls-gcp
    filters: asset.platform == 'gcp-sql-mysql'
    mql: |
      gcp.sql.instance.settings.ipConfiguration.sslMode == "ENCRYPTED_ONLY"
  - uid: mondoo-gcp-security-cloud-sql-mysql-connections-require-ssl-tls-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' &&
        terraform.resources('google_sql_database_instance') != empty
    mql: |
      # Check that ip_configuration block with ssl_mode exists and ssl_mode is set to ENCRYPTED_ONLY on all MySQL instances
      terraform.resources('google_sql_database_instance').where(arguments['database_version'].contains('MYSQL')).all(
        blocks.where(type == 'settings') != empty &&
        blocks.where(type == 'settings').all(blocks.where(type == 'ip_configuration') != empty) &&
        blocks.where(type == 'settings').all(
          blocks.where(type == 'ip_configuration').all(
            arguments.ssl_mode == "ENCRYPTED_ONLY"
          )
        )
      )
  - uid: mondoo-gcp-security-cloud-sql-mysql-connections-require-ssl-tls-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_sql_database_instance' && change.after.database_version.contains('MYSQL'))
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_sql_database_instance' && change.after.database_version.contains('MYSQL')).all(
        change.after['settings'].all(
          _['ip_configuration'].all(
            _['ssl_mode'] == 'ENCRYPTED_ONLY'
          )
        )
      )
  - uid: mondoo-gcp-security-cloud-sql-mysql-connections-require-ssl-tls-terraform-state
    filters: |
      asset.platform == 'terraform-state' &&  terraform.state.resources.contains(type == 'google_sql_database_instance' && values.database_version.contains('MYSQL'))
    mql: |
      terraform.state.resources.where(type == 'google_sql_database_instance' && values.database_version.contains('MYSQL')).all(
        values['settings'].all(
          _['ip_configuration'].all(
            _['ssl_mode'] == 'ENCRYPTED_ONLY'
          )
        )
      )
  - uid: mondoo-gcp-security-cloud-sql-mysql-skip-show-database-enabled
    title: Ensure 'skip_show_database' flag is enabled for Cloud SQL MySQL
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-2
      compliance/pci-dss-4: pcidss-requirement-2-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-2-1
    variants:
      - uid: mondoo-gcp-security-cloud-sql-mysql-skip-show-database-enabled-gcp
        tags:
          mondoo.com/filter-title: GCP Cloud SQL for MySQL
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-cloud-sql-mysql-skip-show-database-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-sql-mysql-skip-show-database-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-sql-mysql-skip-show-database-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Cloud SQL MySQL instances are configured with the `skip_show_database` flag set to `on`. By default, any MySQL user can run `SHOW DATABASES` and discover the names of all databases they have any privilege on, which leaks schema information that can assist an attacker in targeting specific databases. Enabling this flag restricts `SHOW DATABASES` output to users who have been explicitly granted the `SHOW DATABASES` privilege.

        **Why this matters**

        - **Schema enumeration prevention:** Restricting `SHOW DATABASES` stops low-privilege users and compromised accounts from mapping out the full database landscape.
        - **Least-privilege enforcement:** Only accounts that genuinely need to enumerate databases receive that capability, reducing the blast radius of a compromised credential.
        - **Reconnaissance reduction:** Denying visibility into database names removes a low-effort reconnaissance step that attackers use to identify high-value targets.

        **Risk mitigation**

        - **Compromised account containment:** A credential obtained through phishing or credential stuffing cannot use `SHOW DATABASES` to immediately identify which databases are worth targeting.
        - **Insider threat limitation:** Employees or service accounts with minimal database roles cannot casually enumerate all databases, reducing opportunistic data access.
      audit: |
        **Using Google Cloud Console**

        1.  Navigate to the Cloud SQL Instances page: [https://console.cloud.google.com/sql/instances](https://console.cloud.google.com/sql/instances).
        2.  Select a MySQL instance to view its details.
        3.  In the **Configuration** section, find the **Database flags** area.
        4.  Verify that the `skip_show_database` flag is listed and its value is set to `on`.

        **Using Google Cloud CLI**

        1.  List your Cloud SQL instances:
            ```bash
            gcloud sql instances list
            ```
        2.  For each MySQL instance, check the flag's value:
            ```bash
            gcloud sql instances describe INSTANCE_NAME --format=json | jq '.settings.databaseFlags[] | select(.name=="skip_show_database")|.value'
            ```
            Ensure the output for each MySQL instance is `"on"`.
      remediation:
        - id: console
          desc: |
            To ensure 'skip_show_database' flag is enabled for Cloud SQL MySQL using the Google Cloud Console:

            1.  Navigate to the Cloud SQL Instances page: [https://console.cloud.google.com/sql/instances](https://console.cloud.google.com/sql/instances).
            2.  Select the target MySQL instance.
            3.  Select **Edit**.
            4.  Scroll down to the **Flags** section.
            5.  If the flag isn't present, select **Add item**.
            6.  Choose `skip_show_database` from the dropdown and set its value to `on`. If the flag exists but is `off`, change its value to `on`.
            7.  Select **Save**. Review the **Flags** section on the instance overview page to confirm.
        - id: cli
          desc: |
            To ensure 'skip_show_database' flag is enabled for Cloud SQL MySQL using the Google Cloud CLI, update the flag for a specific MySQL instance:
            ```bash
            gcloud sql instances patch INSTANCE_NAME --database-flags skip_show_database=on
            ```
            *Note: This command overwrites all existing flags. To preserve other flags, you must include them in the `--database-flags` argument (e.g., `--database-flags skip_show_database=on,other_flag=value`).*
        - id: terraform
          desc: |
            To ensure 'skip_show_database' flag is enabled for Cloud SQL MySQL in Terraform, ensure the `database_flags` block within your `google_sql_database_instance` resource includes the setting:
            ```hcl
            resource "google_sql_database_instance" "mysql_instance" {
              name             = "my-mysql-instance"
              database_version = "MYSQL_8_0"
              region           = "us-central1"
              settings {
                tier = "db-f1-micro"
                database_flags {
                  name  = "skip_show_database"
                  value = "on"
                }
                # Include other settings and flags as needed
              }
            }
            ```
