  - uid: mondoo-gcp-security-cloud-redis-standard-ha-tier
    title: Ensure Cloud Redis instances use the Standard HA tier
    impact: 40
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-bcr-08
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-308-a-7-ii-a-contingency-plan-data-backup-plan
      compliance/iso-27001-2022: iso-27001-2022-a-8-14
      compliance/nis-2: nis-2-21-2-c
      compliance/nist-csf-1: nist-csf-1-pr-ip-4
      compliance/nist-csf-2: nist-csf-2-pr-ir-04
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cp-9
      compliance/nist-sp-800-171: false
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc9-1-1
      compliance/vda-isa-5: false
    variants:
      - uid: mondoo-gcp-security-cloud-redis-standard-ha-tier-memorystore-redis
        tags:
          mondoo.com/filter-title: GCP Memorystore Redis
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-cloud-redis-standard-ha-tier-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-redis-standard-ha-tier-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-redis-standard-ha-tier-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Cloud Memorystore for Redis instances use the Standard tier rather than the Basic tier. The Basic tier offers no data replication or automatic failover, making it a single point of failure for any application that depends on Redis for security-critical state.

        **Why this matters**

        - **Session token availability:** Redis instances commonly store session tokens and authentication state; a Basic tier failure instantly invalidates all active user sessions, creating a window for session fixation or forced reauthentication attacks.
        - **Rate-limiting integrity:** Applications that use Redis for rate limiting or brute-force protection lose that protection entirely when a Basic tier instance fails, temporarily opening the door to credential stuffing and API abuse.
        - **Cache stampede risk:** When a Basic tier instance is lost, all cached data must be rebuilt from backing systems simultaneously, potentially overloading authentication services and creating a secondary denial-of-service condition.
        - **No automatic recovery:** The Basic tier has no standby replica, so recovery requires manual intervention and data reconstruction, extending the duration of any security impact.

        **Risk mitigation**

        - **Use Standard tier for production:** Deploy the Standard HA tier for all Redis instances that store session tokens, authentication state, rate-limiting counters, or other security-relevant data.
        - **Reserve Basic tier for non-production:** Accept the Basic tier only in development or test environments where data loss carries no security or compliance consequence.
        - **Monitor failover events:** Configure alerts on Redis instance health so that failover events are detected and investigated promptly.
      audit: |
        ### Audit via Console

        1. Open the [Google Cloud Console](https://console.cloud.google.com) and navigate to **Memorystore > Redis**.
        2. In the instance list, review the **Tier** column for each instance.
        3. Verify that each instance shows **Standard** (not **Basic**) as its tier.

        A passing Redis instance shows a tier of **Standard** in the instance list or instance details. A failing instance shows a tier of **Basic**.

        ### Audit via CLI

        1. List all Redis instances and check their tier:

        ```bash
        gcloud redis instances list --format="table(name,region,tier,memorySizeGb,state)"
        ```

        A passing Redis instance returns `STANDARD_HA` in the `TIER` column. A failing instance returns `BASIC`.
      remediation:
        - id: terraform
          desc: |
            To ensure Cloud Redis instances use the Standard HA tier in Terraform:

            ```hcl
            resource "google_redis_instance" "cache" {
              name           = "my-redis-instance"
              tier           = "STANDARD_HA"
              memory_size_gb = 1
              region         = "us-central1"
            }
            ```
        - id: console
          desc: |
            To ensure Cloud Redis instances use the Standard HA tier using the Google Cloud Console, note: The tier cannot be changed after instance creation.

            1. Navigate to **Memorystore > Redis** in the Google Cloud Console.
            2. Select **Create Instance**.
            3. Under **Tier**, select **Standard**.
            4. Complete instance creation.
        - id: cli
          desc: |
            To ensure Cloud Redis instances use the Standard HA tier using the Google Cloud CLI, note: The tier cannot be changed after instance creation.

            ```bash
            gcloud redis instances create INSTANCE_NAME \
              --region=REGION \
              --tier=STANDARD_HA \
              --size=1
            ```
    refs:
      - url: https://cloud.google.com/memorystore/docs/redis/redis-tiers
        title: Memorystore for Redis tiers
  - uid: mondoo-gcp-security-cloud-redis-standard-ha-tier-memorystore-redis
