  - uid: mondoo-gcp-security-spanner-iam-no-public-principals
    title: Ensure Spanner IAM has no public or anonymous principals
    impact: 100
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-5-15
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-2-1
    variants:
      - uid: mondoo-gcp-security-spanner-iam-no-public-principals-gcp
        tags:
          mondoo.com/filter-title: GCP Spanner
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-spanner-iam-no-public-principals-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-spanner-iam-no-public-principals-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-spanner-iam-no-public-principals-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that no IAM binding on a Cloud Spanner instance or any of its databases grants access to `allUsers` or `allAuthenticatedUsers`. Either principal effectively publishes the Spanner resource to anyone on the internet or anyone with a Google account, bypassing every other access control the organization relies on.

        **Why this matters**

        - **Unrestricted data exposure:** A single binding to `allUsers` opens the database to any caller on the internet without authentication, regardless of VPC-SC perimeters or organizational policies.
        - **Transactional data at risk:** Spanner typically holds customer records, financial ledgers, or session state; public exposure of this data violates data protection obligations and erodes user trust.
        - **Perimeter bypass:** Public principals override VPC Service Controls, Private Google Access configurations, and other perimeter controls that are otherwise effective.
        - **Accidental misconfiguration:** Bindings to `allUsers` or `allAuthenticatedUsers` are almost always the result of a broad script or UI error, not an intentional decision, yet the impact is immediate and total.

        **Risk mitigation**

        - **Remove public principal bindings immediately:** Use `gcloud spanner instances remove-iam-policy-binding` at both the instance and database level to eliminate any binding that includes `allUsers` or `allAuthenticatedUsers`.
        - **Replace with specific principals:** After removing the public binding, add the narrowest specific principal that satisfies the access need, using a service account, user, or group with an appropriate Spanner predefined role.
        - **Enable organization-level constraints:** Apply the `constraints/iam.allowedPolicyMemberDomains` organization policy to prevent future bindings to public principals across all projects in the organization.
      audit: |
        ### Audit via Console

        1. Open the [Google Cloud Console](https://console.cloud.google.com/) and navigate to **Spanner**.
        2. Select the instance and click **Permissions** in the left navigation.
        3. Scan each binding for the principals `allUsers` or `allAuthenticatedUsers`.
        4. For each database in the instance, select the database, click **Permissions**, and repeat the check.

        A passing instance and its databases show no bindings with `allUsers` or `allAuthenticatedUsers` as a member. A failing instance or database shows at least one public-principal binding.

        ### Audit via CLI

        1. Check the instance-level IAM policy:

        ```bash
        gcloud spanner instances get-iam-policy INSTANCE_ID \
          --format="json(bindings)" \
          | jq '.bindings[] | select(.members[] | test("^allUsers$|^allAuthenticatedUsers$"))'
        ```

        2. Check each database-level IAM policy:

        ```bash
        gcloud spanner databases get-iam-policy DATABASE_ID \
          --instance=INSTANCE_ID \
          --format="json(bindings)" \
          | jq '.bindings[] | select(.members[] | test("^allUsers$|^allAuthenticatedUsers$"))'
        ```

        A passing instance and database return no output from the `jq` filter. A failing instance or database returns one or more bindings that include `allUsers` or `allAuthenticatedUsers`.
      remediation:
        - id: terraform
          desc: |
            Manage Spanner IAM only via `google_spanner_*_iam_member` resources with explicit principals — never with `allUsers` or `allAuthenticatedUsers`:

            ```hcl
            resource "google_spanner_instance_iam_member" "reader" {
              instance = google_spanner_instance.app.name
              role     = "roles/spanner.databaseReader"
              member   = "group:analytics@example.com" # never allUsers / allAuthenticatedUsers
            }
            ```

            Audit existing bindings: import `google_spanner_instance_iam_policy` into state if the policy is managed elsewhere, then remove any public-principal members in the source HCL and re-apply.
        - id: console
          desc: |
            Remove any public principal from the Spanner IAM policy:

            1. Open **Spanner** → select the instance (and, if flagged, the database).
            2. Select **Permissions**.
            3. Locate any binding whose principal is `allUsers` or `allAuthenticatedUsers` and remove it.
            4. Add specific principals (users, groups, service accounts) that need the access, using the narrowest appropriate role (for example `Cloud Spanner Database Reader` for read-only workloads).
            5. Save and verify the policy no longer lists the public principals.
        - id: cli
          desc: |
            Remove the public bindings from the instance:

            ```bash
            gcloud spanner instances remove-iam-policy-binding INSTANCE_ID \
              --member=allUsers \
              --role=ROLE_NAME

            gcloud spanner instances remove-iam-policy-binding INSTANCE_ID \
              --member=allAuthenticatedUsers \
              --role=ROLE_NAME
            ```

            Repeat at the database scope for every flagged database:

            ```bash
            gcloud spanner databases remove-iam-policy-binding DATABASE_ID \
              --instance=INSTANCE_ID \
              --member=allUsers \
              --role=ROLE_NAME
            ```
    refs:
      - url: https://cloud.google.com/spanner/docs/iam
        title: Cloud Spanner - IAM roles and permissions
