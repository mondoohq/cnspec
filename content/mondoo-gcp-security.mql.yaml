        values['network_settings'] != empty &&
        values['network_settings'].all(
          _['ingress_traffic_allowed'] == 'INGRESS_TRAFFIC_ALLOWED_INTERNAL_ONLY' ||
          _['ingress_traffic_allowed'] == 'INGRESS_TRAFFIC_ALLOWED_INTERNAL_AND_LB'
