  - uid: mondoo-gcp-security-firewall-no-egress-all-ports
    title: Ensure egress firewall rules do not allow all ports
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-2
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-gcp-security-firewall-no-egress-all-ports-gcp
        tags:
          mondoo.com/filter-title: GCP Compute Firewall
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-firewall-no-egress-all-ports-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-firewall-no-egress-all-ports-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-firewall-no-egress-all-ports-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that GCP egress firewall rules targeting the entire internet (0.0.0.0/0 or ::/0) specify explicit port restrictions rather than allowing traffic on all ports. Permitting all ports on internet-facing egress rules gives compromised workloads unrestricted outbound communication channels.

        **Why this matters**

        - **Data exfiltration channels:** Attackers can tunnel exfiltrated data over any port, including DNS (53), HTTPS (443), or arbitrary high ports, when egress is unrestricted.
        - **Protocol abuse:** Without port restrictions, compromised instances can use non-standard ports to evade network monitoring that focuses on common service ports.
        - **Defense in depth:** Restricting egress ports narrows the outbound attack surface and forces attackers to operate within monitored and expected traffic patterns.

        **Risk mitigation**

        - **Port-specific rules:** Replace all-port egress rules with rules that enumerate only the TCP and UDP ports required for legitimate outbound traffic.
        - **Regular review:** Periodically audit internet-facing egress rules to confirm that allowed ports still reflect operational requirements and have not drifted to over-permissive defaults.
      audit: |
        ### Audit via Console

        1. In the Google Cloud Console, navigate to **VPC Network > Firewall**.
        2. Review the list of firewall rules.
        3. For each rule with **Direction** set to **Egress**, check the **Destination IP ranges** and **Protocols and ports** columns.
        4. Identify any egress rules where **Destination IP ranges** includes `0.0.0.0/0` or `::/0` and **Protocols and ports** allows traffic without explicit port restrictions.

        A passing egress firewall rule targeting `0.0.0.0/0` specifies explicit protocols and ports (for example, `tcp:443`). A failing rule allows all ports or uses protocol `all` to `0.0.0.0/0` or `::/0`.

        ### Audit via CLI

        1. List egress firewall rules targeting the internet and review their allowed protocols and ports:

        ```bash
        gcloud compute firewall-rules list \
          --filter="direction=EGRESS AND destinationRanges=0.0.0.0/0" \
          --format="table(name,network,destinationRanges,allowed)"
        ```

        A passing firewall rule returns explicit port restrictions in the `ALLOW` column (for example, `tcp:443`). A failing rule returns `all` as the protocol or no port restrictions.
      remediation:
        - id: console
          desc: |
            To ensure egress firewall rules do not allow all ports using the Google Cloud Console:

            1. Navigate to **VPC Network** > **Firewall**.
            2. Identify egress rules with destination range `0.0.0.0/0` that allow traffic without port restrictions.
            3. Edit the rule to specify explicit ports, such as TCP 443 for HTTPS.
        - id: cli
          desc: |
            To ensure egress firewall rules do not allow all ports using the gcloud CLI, list internet-facing egress rules:

            ```bash
            gcloud compute firewall-rules list \
              --filter="direction=EGRESS AND destinationRanges=0.0.0.0/0" \
              --format="table(name, network, allowed)"
            ```

            Update a rule to restrict to specific ports:

            ```bash
            gcloud compute firewall-rules update <rule-name> \
              --allow=tcp:443
            ```

            Or delete the overly permissive rule entirely:

            ```bash
            gcloud compute firewall-rules delete <rule-name>
            ```
        - id: terraform
          desc: |
            To ensure egress firewall rules do not allow all ports in Terraform, ensure egress rules specify explicit protocols and ports:

            ```hcl
            resource "google_compute_firewall" "allow_egress" {
              name    = "allow-specific-egress"
              network = google_compute_network.default.id

              direction = "EGRESS"

              allow {
                protocol = "tcp"
                ports    = ["443"]
              }

              destination_ranges = ["0.0.0.0/0"]
            }
            ```
    refs:
      - url: https://cloud.google.com/vpc/docs/firewalls
        title: Google Cloud Documentation - VPC firewall rules
  - uid: mondoo-gcp-security-firewall-no-egress-all-ports-gcp
    filters: |
      asset.platform == 'gcp-compute-firewall'
      gcp.compute.firewall.direction == "EGRESS"
      gcp.compute.firewall.destinationRanges.any(_ == "0.0.0.0/0" || _ == "::/0")
    mql: |
      gcp.compute.firewall.allowed.none(ipProtocol == "all")
      gcp.compute.firewall.allowed.where(ipProtocol != "icmp").all(_['ports'] != empty && _['ports'].length > 0)
