  # Terraform variants intentionally check google_sql_user resources directly without
  # filtering by parent instance database_version. The runtime check exempts "sqlserver"
  # as a system user; Cloud SQL Server does not support CLOUD_IAM_* user types, so any
  # custom users on SQL Server instances are unavoidably BUILT_IN and will fail the
  # Terraform variants. This matches the runtime check's behavior for non-system
  # SQL Server users.
  - uid: mondoo-gcp-security-cloud-sql-users-use-iam-auth
    title: Ensure Cloud SQL users authenticate via Cloud IAM, not built-in passwords
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-14
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-2
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-8
      compliance/vda-isa-5: vda-isa-5-4-1-2
    variants:
      - uid: mondoo-gcp-security-cloud-sql-users-use-iam-auth-gcp
        tags:
          mondoo.com/filter-title: GCP Cloud SQL
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-cloud-sql-users-use-iam-auth-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-sql-users-use-iam-auth-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-sql-users-use-iam-auth-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Cloud SQL instance user accounts authenticate via Cloud IAM rather than with built-in password authentication. GCP creates a small number of engine-managed system accounts by default; any additional user accounts beyond those system accounts should be Cloud IAM-backed rather than using static passwords.

        **Why this matters**

        - **Long-lived static credentials:** Built-in Cloud SQL passwords rarely rotate; once leaked they remain valid until an operator manually changes them.
        - **Audit log blind spot:** Built-in users are invisible to IAM audit logs and organization policies, making it impossible to centrally track or review database access.
        - **Offboarding gaps:** Revoking database access for a departing employee requires a coordinated action at the Cloud SQL layer that is routinely missed when IAM is revoked but the built-in DB credential is not.
        - **No automatic key rotation:** IAM-backed Cloud SQL users inherit short-lived tokens and automatic rotation; none of those protections apply to built-in passwords.

        **Risk mitigation**

        - **Centralized access governance:** Routing database authentication through IAM ties Cloud SQL access to the same review and lifecycle controls used for every other GCP resource.
        - **Eliminated static secrets:** Replacing built-in passwords with IAM removes the class of long-lived credential that most often appears in breach reports.
        - **Unified offboarding:** Revoking an IAM principal automatically terminates database access, closing the operational gap where built-in DB users persist after role removal.
      audit: |
        ### Audit via Console

        1. Sign in to the Google Cloud Console and navigate to **Cloud SQL**.
        2. Select an instance, then go to the **Users** tab.
        3. Review each user account listed. Verify that all non-system users (excluding `root`, `postgres`, and `sqlserver`) show a type of **Cloud IAM** rather than **Built-in**.
        4. Repeat for every Cloud SQL instance in the project.

        A passing instance shows all non-system users as Cloud IAM users. A failing instance shows one or more non-system users as built-in (password-authenticated) users.

        ### Audit via CLI

        1. List all Cloud SQL instances, then list the users for each and check their type:

        ```bash
        gcloud sql instances list --format="table(name)"

        gcloud sql users list \
          --instance=INSTANCE_NAME \
          --format="table(name,type)"
        ```

        A passing instance returns all non-system users with a `type` of `CLOUD_IAM_USER`, `CLOUD_IAM_SERVICE_ACCOUNT`, or another IAM-backed type. A failing instance returns one or more users with `type: BUILT_IN` whose names are not `root`, `postgres`, or `sqlserver`.
      remediation:
        - id: terraform
          desc: |
            Define DB users via `google_sql_user` with `type = "CLOUD_IAM_USER"` (or `CLOUD_IAM_SERVICE_ACCOUNT`):

            ```hcl
            resource "google_sql_user" "app_iam_user" {
              instance = google_sql_database_instance.app.name
              name     = "app-user@my-project.iam"
              type     = "CLOUD_IAM_USER"
            }

            resource "google_sql_user" "ci_sa" {
              instance = google_sql_database_instance.app.name
              name     = google_service_account.ci.email
              type     = "CLOUD_IAM_SERVICE_ACCOUNT"
            }
            ```
        - id: console
          desc: |
            Replace built-in users with IAM users:

            1. Open **Cloud SQL** → the instance → **Users**.
            2. For each non-system built-in user, create an equivalent IAM user (`Add user account` → **Cloud IAM**) and grant it the appropriate DB-level roles.
            3. Migrate application connections to use the IAM-authenticated user (typically via the Cloud SQL Auth Proxy in IAM auth mode).
            4. Delete the built-in user once the new IAM user is confirmed working.
        - id: cli
          desc: |
            Add a Cloud IAM user and delete the built-in replacement:

            ```bash
            gcloud sql users create <iam-user>@<project>.iam \
              --instance=<instance> \
              --type=CLOUD_IAM_USER

            gcloud sql users delete <legacy-user> --instance=<instance>
            ```
    refs:
      - url: https://cloud.google.com/sql/docs/mysql/iam-authentication
        title: Cloud SQL - IAM database authentication
  - uid: mondoo-gcp-security-cloud-sql-users-use-iam-auth-gcp
    filters: asset.platform == 'gcp'
    mql: |
      gcp.project.sqlService.instances.all(
        users.all(type != "BUILT_IN" || name == "root" || name == "postgres" || name == "sqlserver")
      )
  - uid: mondoo-gcp-security-cloud-sql-users-use-iam-auth-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_sql_user')
    mql: |
      terraform.resources('google_sql_user').all(
        arguments['type'] != null && arguments['type'] != "BUILT_IN" ||
        arguments['name'] == "root" ||
        arguments['name'] == "postgres" ||
        arguments['name'] == "sqlserver"
      )
  - uid: mondoo-gcp-security-cloud-sql-users-use-iam-auth-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_sql_user')
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_sql_user').all(
        change.after['type'] != null && change.after['type'] != "BUILT_IN" ||
        change.after['name'] == "root" ||
        change.after['name'] == "postgres" ||
        change.after['name'] == "sqlserver"
      )
  - uid: mondoo-gcp-security-cloud-sql-users-use-iam-auth-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'google_sql_user')
    mql: |
      terraform.state.resources.where(type == 'google_sql_user').all(
        values['type'] != null && values['type'] != "BUILT_IN" ||
        values['name'] == "root" ||
        values['name'] == "postgres" ||
        values['name'] == "sqlserver"
      )
  - uid: mondoo-gcp-security-target-ssl-proxy-has-explicit-policy
    title: Ensure Target SSL proxies have an explicit SSL policy attached
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    variants:
      - uid: mondoo-gcp-security-target-ssl-proxy-has-explicit-policy-gcp
        tags:
          mondoo.com/filter-title: GCP Compute (Target SSL Proxy)
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-target-ssl-proxy-has-explicit-policy-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-target-ssl-proxy-has-explicit-policy-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-target-ssl-proxy-has-explicit-policy-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that every Target SSL Proxy has an explicit SSL policy attached. When no SSL policy is attached, GCP falls back to the `COMPATIBLE` profile, which permits TLS 1.0, TLS 1.1, and cipher suites that include 3DES and CBC-only algorithms; this is GCP's intentionally permissive compatibility default, not a security baseline.

        **Why this matters**

        - **Weak default TLS profile:** The `COMPATIBLE` profile allows deprecated protocol versions and weak cipher suites that expose connections to downgrade attacks.
        - **Edge exposure:** Target SSL proxies terminate internet-facing traffic, making weak TLS at this layer directly exploitable by a network-positioned attacker.
        - **Policy gap not caught by SSL policy checks:** Checks that validate SSL policy settings only apply to defined policies; a proxy with no attached policy inherits the `COMPATIBLE` default without triggering those existing checks.

        **Risk mitigation**

        - **Deliberate TLS enforcement:** Requiring an explicit SSL policy ensures every proxy enforces a chosen minimum TLS version and cipher suite profile rather than silently inheriting a weak default.
        - **Defense in depth:** Combining this check with SSL policy content checks guarantees end-to-end strong TLS from configuration definition through proxy attachment.
        - **Eliminated configuration gap:** Catching proxies with no attached policy closes the blind spot that SSL policy content checks alone cannot detect.
      audit: |
        ### Audit via Console

        1. Sign in to the Google Cloud Console and navigate to **Network services** > **Load balancing**.
        2. For each SSL proxy load balancer, open the frontend configuration.
        3. Check the **SSL policy** field to verify that an explicit SSL policy is attached.

        A passing target SSL proxy shows a named SSL policy attached. A failing target SSL proxy shows no SSL policy attached (blank or default).

        ### Audit via CLI

        1. List all target SSL proxies and inspect the `sslPolicy` field for each:

        ```bash
        gcloud compute target-ssl-proxies list \
          --format="table(name,sslPolicy)"
        ```

        A passing proxy returns a non-empty `sslPolicy` URL. A failing proxy returns an empty or absent `sslPolicy` field.
      remediation:
        - id: terraform
          desc: |
            Bind the proxy to a strong SSL policy via `ssl_policy`:

            ```hcl
            resource "google_compute_ssl_policy" "modern" {
              name            = "modern-tls"
              profile         = "MODERN"
              min_tls_version = "TLS_1_2"
            }

            resource "google_compute_target_ssl_proxy" "tls" {
              name             = "my-tls-proxy"
              backend_service  = google_compute_backend_service.svc.id
              ssl_certificates = [google_compute_ssl_certificate.cert.id]
              ssl_policy       = google_compute_ssl_policy.modern.id
            }
            ```
        - id: console
          desc: |
            Attach a strong SSL policy to the proxy:

            1. Open **Network services** → **Load balancing** → locate the SSL proxy.
            2. Edit the proxy's frontend configuration.
            3. Under **SSL policy**, select or create a policy with `MODERN` or `RESTRICTED` profile and minimum TLS version `TLS_1_2`.
            4. Save.
        - id: cli
          desc: |
            Attach an SSL policy to an existing target SSL proxy:

            ```bash
            gcloud compute target-ssl-proxies update <proxy> --ssl-policy=<policy>
            ```
    refs:
      - url: https://cloud.google.com/load-balancing/docs/ssl-policies-concepts
        title: GCP - SSL policies
  - uid: mondoo-gcp-security-target-ssl-proxy-has-explicit-policy-gcp
    filters: asset.platform == 'gcp'
    mql: |
      gcp.project.computeService.targetSslProxies.all(sslPolicyUrl != "")
  - uid: mondoo-gcp-security-target-ssl-proxy-has-explicit-policy-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_compute_target_ssl_proxy')
    mql: |
      terraform.resources('google_compute_target_ssl_proxy').all(
        arguments['ssl_policy'] != null && arguments['ssl_policy'] != ""
      )
  - uid: mondoo-gcp-security-target-ssl-proxy-has-explicit-policy-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_compute_target_ssl_proxy')
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_compute_target_ssl_proxy').all(
        change.after['ssl_policy'] != null && change.after['ssl_policy'] != ""
      )
  - uid: mondoo-gcp-security-target-ssl-proxy-has-explicit-policy-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'google_compute_target_ssl_proxy')
    mql: |
      terraform.state.resources.where(type == 'google_compute_target_ssl_proxy').all(
        values['ssl_policy'] != null && values['ssl_policy'] != ""
      )
  - uid: mondoo-gcp-security-gke-network-policy-provider-specified
    title: Ensure GKE network policy has a provider specified
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-1-5
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-gcp-security-gke-network-policy-provider-specified-gcp
        tags:
          mondoo.com/filter-title: GCP GKE Cluster
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-gke-network-policy-provider-specified-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-gke-network-policy-provider-specified-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-gke-network-policy-provider-specified-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that every GKE cluster with network policy enabled also has a concrete network-policy provider specified, such as `CALICO`. A cluster can have `networkPolicy.enabled == true` with `networkPolicy.provider == "PROVIDER_UNSPECIFIED"`, which means the API server accepts NetworkPolicy objects but never enforces them, leaving pod-to-pod traffic completely unrestricted despite the cluster appearing to have network policy active.

        **Why this matters**

        - **Silent non-enforcement:** Without a concrete provider, NetworkPolicy resources are accepted by the Kubernetes API server but have no enforcer acting on them, so every pod can reach every other pod.
        - **Lateral movement risk:** A compromised pod in a cluster with unspecified network policy provider can freely communicate with any other workload, allowing an attacker to pivot across namespaces and services without restriction.
        - **Misleading compliance posture:** Dashboards and checks that only verify `enabled == true` show the cluster as compliant even though no enforcement is occurring, creating a false sense of security.

        **Risk mitigation**

        - **Guaranteed enforcement:** Specifying a concrete provider such as `CALICO` ensures that NetworkPolicy resources are actually processed and applied, not silently ignored.
        - **Lateral movement containment:** Enforced pod-to-pod network segmentation limits the blast radius of a compromised workload to only the pods that policy explicitly allows it to reach.
        - **Accurate compliance signal:** Verifying both the enabled flag and the provider ensures that compliance reporting reflects real enforcement state rather than configuration intent alone.
      audit: |
        ### Audit via Console

        1. Sign in to the Google Cloud Console and navigate to **Kubernetes Engine** > **Clusters**.
        2. Select a cluster and go to the **Details** tab.
        3. Under **Networking**, locate the **Network policy** row and verify that both a provider (such as **Calico**) and enabled status are shown.
        4. Repeat for every cluster in the project.

        A passing cluster shows a network policy provider of **Calico** (or another concrete provider) when network policy is enabled. A failing cluster shows network policy as enabled but with no provider specified (provider unspecified).

        ### Audit via CLI

        1. Describe each cluster and inspect the `networkPolicy` field:

        ```bash
        gcloud container clusters list --format="table(name,location)"

        gcloud container clusters describe CLUSTER_NAME \
          --zone=ZONE \
          --format="table(networkPolicy)"
        ```

        A passing cluster returns `networkPolicy.provider` set to `CALICO` or another concrete provider, or returns `networkPolicy.enabled: false` (policy not in use). A failing cluster returns `networkPolicy.enabled: true` with `networkPolicy.provider: PROVIDER_UNSPECIFIED`.
      remediation:
        - id: terraform
          desc: |
            Set `network_policy.provider = "CALICO"` (or another concrete provider) on the cluster, with `enabled = true`:

            ```hcl
            resource "google_container_cluster" "primary" {
              name     = "my-cluster"
              location = "us-central1"

              network_policy {
                enabled  = true
                provider = "CALICO"
              }

              # Calico requires the network-policy addon to be enabled too.
              addons_config {
                network_policy_config {
                  disabled = false
                }
              }
            }
            ```
        - id: console
          desc: |
            Enable network policy with Calico as the provider:

            1. Open **Kubernetes Engine** → **Clusters** → select the cluster → **Edit**.
            2. Under **Networking** → **Network policy**, select **Calico (Kubernetes network policy)** as the provider.
            3. Save. The add-on will be deployed and enforcement starts immediately.
        - id: cli
          desc: |
            Update the cluster to use Calico for network policy enforcement:

            ```bash
            gcloud container clusters update <cluster> \
              --zone=<zone> \
              --enable-network-policy
            ```
    refs:
      - url: https://cloud.google.com/kubernetes-engine/docs/how-to/network-policy
        title: GKE - Configuring network policy
  - uid: mondoo-gcp-security-gke-network-policy-provider-specified-gcp
    filters: asset.platform == "gcp-gke-cluster"
    mql: |
      gcp.project.gkeService.cluster.networkPolicy == null ||
      gcp.project.gkeService.cluster.networkPolicy.enabled == false ||
      gcp.project.gkeService.cluster.networkPolicy.provider != "PROVIDER_UNSPECIFIED"
  - uid: mondoo-gcp-security-gke-network-policy-provider-specified-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_container_cluster')
    mql: |
      terraform.resources('google_container_cluster').all(
        blocks.where(type == 'network_policy') == empty ||
        blocks.where(type == 'network_policy').all(
          arguments['enabled'] == false ||
          arguments['provider'] != empty && arguments['provider'] != "PROVIDER_UNSPECIFIED"
        )
      )
  - uid: mondoo-gcp-security-gke-network-policy-provider-specified-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_container_cluster')
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_container_cluster').all(
        change.after['network_policy'] == empty ||
        change.after['network_policy'].all(
          _['enabled'] == false ||
          _['provider'] != empty && _['provider'] != "PROVIDER_UNSPECIFIED"
        )
      )
  - uid: mondoo-gcp-security-gke-network-policy-provider-specified-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'google_container_cluster')
    mql: |
      terraform.state.resources.where(type == 'google_container_cluster').all(
        values['network_policy'] == empty ||
        values['network_policy'].all(
          _['enabled'] == false ||
          _['provider'] != empty && _['provider'] != "PROVIDER_UNSPECIFIED"
        )
      )
  # No Terraform variants: this check correlates the notification topic's
  # projectId against the cluster's projectId. In Terraform HCL the topic is
  # almost always a resource reference (google_pubsub_topic.x.id) that does not
