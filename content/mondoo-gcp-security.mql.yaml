  - uid: mondoo-gcp-security-dataproc-cluster-shielded-vms
    title: Ensure Dataproc clusters have Shielded VM features enabled
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-c-1-integrity
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ds-6
      compliance/nist-csf-2: nist-csf-2-pr-ps-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-1
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc6-8-2
      compliance/vda-isa-5: false
    variants:
      - uid: mondoo-gcp-security-dataproc-cluster-shielded-vms-gcp
        tags:
          mondoo.com/filter-title: GCP Dataproc Cluster
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-dataproc-cluster-shielded-vms-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-dataproc-cluster-shielded-vms-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-dataproc-cluster-shielded-vms-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Dataproc clusters are configured with all three Shielded VM features enabled: Secure Boot, vTPM, and integrity monitoring. By default, Dataproc cluster nodes are not Shielded VMs, meaning the boot process and runtime integrity of each node are not cryptographically verified.

        **Why this matters**

        - **Boot integrity verification:** Secure Boot uses cryptographic signatures to ensure only trusted, vendor-signed firmware and OS components load during startup, blocking bootkits from persisting across node restarts.
        - **Hardware root of trust:** The virtual Trusted Platform Module (vTPM) provides a tamper-resistant hardware anchor for measuring and attesting the boot state of each node.
        - **Runtime tamper detection:** Integrity monitoring compares the measured boot state against a known-good baseline and surfaces any deviation, enabling rapid detection of rootkits or unauthorized kernel modifications.
        - **Persistent threat prevention:** Without Shielded VM protections, an attacker who achieves node-level access can install malware that survives reboots and is invisible to OS-level security tooling.

        **Risk mitigation**

        - **Enable all three features at cluster creation:** Secure Boot, vTPM, and integrity monitoring must be specified when the cluster is created and cannot be enabled on existing clusters without recreating them.
        - **Monitor integrity validation events:** Subscribe to integrity monitoring alerts in Cloud Monitoring so that any boot-sequence deviation triggers an investigation.
        - **Use Shielded VM-compatible images:** Confirm that the Dataproc image version selected for the cluster supports Shielded VM features before enabling them.
      audit: |
        ### Audit via Console

        1. Open the [Google Cloud Console](https://console.cloud.google.com) and navigate to **Dataproc > Clusters**.
        2. Select each cluster and click the cluster name to view its details.
        3. Click the **Configuration** tab.
        4. Under **VM configuration**, inspect the **Shielded VM** section.
        5. Verify that **Secure Boot**, **vTPM**, and **Integrity Monitoring** are all listed as enabled.

        A passing cluster shows all three Shielded VM features (Secure Boot, vTPM, Integrity Monitoring) enabled. A failing cluster shows one or more features disabled or absent from the configuration.

        ### Audit via CLI

        1. List all Dataproc clusters in a region and inspect their Shielded VM configuration:

        ```bash
        gcloud dataproc clusters describe CLUSTER_NAME \
          --region=REGION \
          --format="json(config.gceClusterConfig.shieldedInstanceConfig)"
        ```

        A passing cluster returns a `shieldedInstanceConfig` object with `enableSecureBoot: true`, `enableVtpm: true`, and `enableIntegrityMonitoring: true`. A failing cluster returns one or more of those fields set to `false` or returns an empty `shieldedInstanceConfig`.
      remediation:
        - id: terraform
          desc: |
            To ensure Dataproc clusters have Shielded VM features enabled in Terraform:

            ```hcl
            resource "google_dataproc_cluster" "example" {
              name   = "example-cluster"
              region = "us-central1"

              cluster_config {
                gce_cluster_config {
                  shielded_instance_config {
                    enable_secure_boot          = true
                    enable_vtpm                 = true
                    enable_integrity_monitoring = true
                  }
                }
              }
            }
            ```
        - id: console
          desc: |
            To ensure Dataproc clusters have Shielded VM features enabled using the Google Cloud Console:

            1. Navigate to **Dataproc > Clusters** in the Google Cloud Console.
            2. Select **Create Cluster**.
            3. Under **Manage security**, expand **Shielded VMs**.
            4. Enable **Secure Boot**, **vTPM**, and **Integrity Monitoring**.
            5. Complete cluster creation.
        - id: cli
          desc: |
            To ensure Dataproc clusters have Shielded VM features enabled using the Google Cloud CLI:

            ```bash
            gcloud dataproc clusters create CLUSTER_NAME \
              --region=REGION \
              --shielded-secure-boot \
              --shielded-vtpm \
              --shielded-integrity-monitoring
            ```
    refs:
      - url: https://cloud.google.com/dataproc/docs/concepts/configuring-clusters/shielded-vms
        title: Shielded VMs in Dataproc
  - uid: mondoo-gcp-security-dataproc-cluster-shielded-vms-gcp
    filters: asset.platform == 'gcp-dataproc-cluster'
    mql: |
      gcp.project.dataprocService.cluster.config.gceCluster.shieldedInstanceConfig.enableSecureBoot == true
      gcp.project.dataprocService.cluster.config.gceCluster.shieldedInstanceConfig.enableVtpm == true
      gcp.project.dataprocService.cluster.config.gceCluster.shieldedInstanceConfig.enableIntegrityMonitoring == true
  - uid: mondoo-gcp-security-dataproc-cluster-shielded-vms-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_dataproc_cluster')
    mql: |
      terraform.resources('google_dataproc_cluster').all(
        blocks.where(type == 'cluster_config').all(
          blocks.where(type == 'gce_cluster_config').all(
            blocks.where(type == 'shielded_instance_config').all(
              arguments.enable_secure_boot == true &&
              arguments.enable_vtpm == true &&
              arguments.enable_integrity_monitoring == true
            )
          )
        )
      )
  - uid: mondoo-gcp-security-dataproc-cluster-shielded-vms-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_dataproc_cluster')
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_dataproc_cluster').all(
        change.after.cluster_config != empty &&
        change.after.cluster_config.all(
          _['gce_cluster_config'] != empty &&
          _['gce_cluster_config'].all(
            _['shielded_instance_config'] != empty &&
            _['shielded_instance_config'].all(
              _['enable_secure_boot'] == true &&
              _['enable_vtpm'] == true &&
              _['enable_integrity_monitoring'] == true
            )
          )
        )
      )
  - uid: mondoo-gcp-security-dataproc-cluster-shielded-vms-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'google_dataproc_cluster')
    mql: |
      terraform.state.resources.where(type == 'google_dataproc_cluster').all(
        values.cluster_config != empty &&
        values.cluster_config.all(
          _['gce_cluster_config'] != empty &&
          _['gce_cluster_config'].all(
            _['shielded_instance_config'] != empty &&
            _['shielded_instance_config'].all(
              _['enable_secure_boot'] == true &&
              _['enable_vtpm'] == true &&
              _['enable_integrity_monitoring'] == true
            )
          )
        )
      )
  - uid: mondoo-gcp-security-dataproc-cluster-no-default-service-account
    title: Ensure Dataproc clusters do not use the default service account
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-5
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-9
      compliance/vda-isa-5: vda-isa-5-4-1-3
    variants:
      - uid: mondoo-gcp-security-dataproc-cluster-no-default-service-account-gcp
        tags:
          mondoo.com/filter-title: GCP Dataproc Cluster
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-dataproc-cluster-no-default-service-account-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-dataproc-cluster-no-default-service-account-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-dataproc-cluster-no-default-service-account-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Dataproc clusters are configured to use a dedicated custom service account rather than the default Compute Engine service account. The default Compute Engine service account is automatically granted the Editor role at the project level, giving any cluster node that uses it broad read-write access to project resources.

        **Why this matters**

        - **Least privilege enforcement:** A custom service account bound to only the roles the cluster workload needs prevents cluster nodes from accessing unrelated project resources.
        - **Lateral movement prevention:** A compromised cluster node running under the Editor-role default account can pivot to any project resource; a node running under a scoped custom account is confined to only the explicitly granted permissions.
        - **Workload identity traceability:** Dedicated service accounts produce Cloud Audit Log entries that clearly identify which cluster performed each action, simplifying incident response.
        - **Compliance alignment:** Assigning minimum-privilege identities to compute workloads is a core requirement across major security frameworks.

        **Risk mitigation**

        - **Create a cluster-specific service account before provisioning:** Define a service account with only the IAM roles the Dataproc workload requires, such as Dataproc Worker and Storage Object Viewer, and assign it at cluster creation.
        - **Audit existing clusters:** Check all running Dataproc clusters to confirm none are using the default Compute Engine service account, and recreate any that are.
        - **Enforce via Organization Policy:** Use the `constraints/dataproc.requireCustomServiceAccount` constraint to prevent cluster creation without an explicitly specified custom service account.
      audit: |
        ### Audit via Console

        1. Open the [Google Cloud Console](https://console.cloud.google.com) and navigate to **Dataproc > Clusters**.
        2. Click a cluster name to view its details.
        3. Click the **Configuration** tab.
        4. Under **Project access**, note the **Service account** field.
        5. Verify the service account is not the default Compute Engine service account, which takes the form `PROJECT_NUMBER-compute@developer.gserviceaccount.com`.

        A passing cluster shows a custom service account email that does not match the `PROJECT_NUMBER-compute@developer.gserviceaccount.com` pattern. A failing cluster shows the default Compute Engine service account or an empty service account field.

        ### Audit via CLI

        1. Describe the cluster and inspect its service account configuration:

        ```bash
        gcloud dataproc clusters describe CLUSTER_NAME \
          --region=REGION \
          --format="json(config.gceClusterConfig.serviceAccount)"
        ```

        A passing cluster returns a service account that is not empty and does not match `PROJECT_NUMBER-compute@developer.gserviceaccount.com`. A failing cluster returns the default Compute Engine service account email or an empty value.
      remediation:
        - id: terraform
          desc: |
            To ensure Dataproc clusters do not use the default service account in Terraform:

            ```hcl
            resource "google_service_account" "dataproc_sa" {
              account_id   = "dataproc-sa"
              display_name = "Dataproc Service Account"
            }

            resource "google_dataproc_cluster" "example" {
              name   = "example-cluster"
              region = "us-central1"

              cluster_config {
                gce_cluster_config {
                  service_account = google_service_account.dataproc_sa.email
                }
              }
            }
            ```
        - id: console
          desc: |
            To ensure Dataproc clusters do not use the default service account using the Google Cloud Console:

            1. Navigate to **Dataproc > Clusters** in the Google Cloud Console.
            2. Select **Create Cluster**.
            3. Under **Manage security**, expand **Project access**.
            4. Select a custom service account instead of the default.
            5. Complete cluster creation.
        - id: cli
          desc: |
            To ensure Dataproc clusters do not use the default service account using the Google Cloud CLI:

            ```bash
            gcloud dataproc clusters create CLUSTER_NAME \
              --region=REGION \
              --service-account=CUSTOM_SA_EMAIL
            ```
    refs:
      - url: https://cloud.google.com/dataproc/docs/concepts/configuring-clusters/service-accounts
        title: Dataproc service accounts
  - uid: mondoo-gcp-security-dataproc-cluster-no-default-service-account-gcp
    filters: asset.platform == 'gcp-dataproc-cluster'
    mql: |
      gcp.project.dataprocService.cluster.config.gceCluster.serviceAccountEmail != ""
      gcp.project.dataprocService.cluster.config.gceCluster.serviceAccountEmail != /^\d+-compute@developer\.gserviceaccount\.com$/
  - uid: mondoo-gcp-security-dataproc-cluster-no-default-service-account-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_dataproc_cluster')
    mql: |
      terraform.resources('google_dataproc_cluster').all(
        blocks.where(type == 'cluster_config').all(
          blocks.where(type == 'gce_cluster_config').all(arguments.service_account != empty)
        )
      )
  - uid: mondoo-gcp-security-dataproc-cluster-no-default-service-account-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_dataproc_cluster')
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_dataproc_cluster').all(
        change.after.cluster_config != empty &&
        change.after.cluster_config.all(
          _['gce_cluster_config'] != empty &&
          _['gce_cluster_config'].all(_['service_account'] != empty)
        )
      )
  - uid: mondoo-gcp-security-dataproc-cluster-no-default-service-account-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'google_dataproc_cluster')
    mql: |
      terraform.state.resources.where(type == 'google_dataproc_cluster').all(
        values.cluster_config != empty &&
        values.cluster_config.all(
          _['gce_cluster_config'] != empty &&
          _['gce_cluster_config'].all(
            _['service_account'] != empty &&
            _['service_account'] != /^\d+-compute@developer\.gserviceaccount\.com$/ &&
            _['service_account'] != /^[a-z0-9\-]+@appspot\.gserviceaccount\.com$/
          )
        )
      )
  - uid: mondoo-gcp-security-binary-authorization-default-rule-not-allow-all
    title: Ensure Binary Authorization default rule does not allow all images
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ais-06
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ds-6
      compliance/nist-csf-2: nist-csf-2-pr-ps-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-3
      compliance/pci-dss-4: pcidss-requirement-2-2-1
      compliance/soc2-2017: soc2-control-cc6-8-1
      compliance/vda-isa-5: vda-isa-5-5-3-1
    variants:
      - uid: mondoo-gcp-security-binary-authorization-default-rule-not-allow-all-gcp
        tags:
          mondoo.com/filter-title: GCP Binary Authorization Policy
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-binary-authorization-default-rule-not-allow-all-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-binary-authorization-default-rule-not-allow-all-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-binary-authorization-default-rule-not-allow-all-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that the Binary Authorization policy's default admission rule is not set to `ALWAYS_ALLOW`. When the default rule is `ALWAYS_ALLOW`, any container image can be deployed to GKE without attestation or verification, completely defeating the deploy-time security control that Binary Authorization is designed to provide.

        **Why this matters**

        - **Supply chain integrity:** A non-permissive default rule forces every container deployment through attestation verification, ensuring images have passed the defined security review steps before running in the cluster.
        - **Defense against arbitrary code execution:** Requiring attestation prevents an attacker who gains deploy access from running arbitrary container images without first compromising the attestor signing key.
        - **Catch-all enforcement:** The default admission rule applies whenever no more specific cluster or namespace rule matches, making it the final gatekeeper for all unaccounted deployment paths.
        - **Regulatory and policy compliance:** Container security standards require that only verified images from trusted registries run in production environments.

        **Risk mitigation**

        - **Set the default rule to `ALWAYS_DENY` or `REQUIRE_ATTESTATION`:** Choose `ALWAYS_DENY` for strict environments and supplement with per-cluster rules that allow attestation-verified images; choose `REQUIRE_ATTESTATION` when a blanket attestation policy is appropriate.
        - **Create and protect attestors:** Define attestors in CI/CD pipelines to sign images after security scans, code review, and build verification; protect signing keys with strict IAM bindings.
        - **Audit policy changes:** Enable Cloud Audit Logs for Binary Authorization policy modifications and alert on any change that relaxes the default rule.
      audit: |
        ### Audit via Console

        1. Open the [Google Cloud Console](https://console.cloud.google.com) and navigate to **Security > Binary Authorization**.
        2. Select the **Policy** tab.
        3. Under **Default rule**, review the **Evaluation mode** setting.
        4. Verify that the evaluation mode is not set to **Allow all images**.

        A passing policy shows an evaluation mode of **Require attestations** or **Disallow all images** for the default rule. A failing policy shows **Allow all images** as the default rule evaluation mode.

        ### Audit via CLI

        1. Export and inspect the Binary Authorization policy:

        ```bash
        gcloud container binauthz policy export --format=json
        ```

        A passing policy returns a `defaultAdmissionRule.evaluationMode` value of `REQUIRE_ATTESTATION` or `ALWAYS_DENY`. A failing policy returns `defaultAdmissionRule.evaluationMode: "ALWAYS_ALLOW"`.
      remediation:
        - id: terraform
          desc: |
            To ensure Binary Authorization default rule does not allow all images in Terraform:

            ```hcl
            resource "google_binary_authorization_policy" "policy" {
              default_admission_rule {
                evaluation_mode  = "REQUIRE_ATTESTATION"
                enforcement_mode = "ENFORCED_BLOCK_AND_AUDIT_LOG"
                require_attestations_by = [
                  google_binary_authorization_attestor.attestor.name
                ]
              }
            }
            ```
        - id: console
          desc: |
            To ensure Binary Authorization default rule does not allow all images using the Google Cloud Console:

            1. Navigate to **Security > Binary Authorization** in the Google Cloud Console.
            2. Select **Edit Policy**.
            3. Under **Default rule**, change the evaluation mode from **Allow all images** to **Require attestations** or **Disallow all images**.
            4. If using attestations, configure the required attestors.
            5. Select **Save Policy**.
        - id: cli
          desc: |
            To ensure Binary Authorization default rule does not allow all images using the Google Cloud CLI, export the current policy:

            ```bash
            gcloud container binauthz policy export > policy.yaml
            ```

            Edit `policy.yaml` to change the `defaultAdmissionRule.evaluationMode` from `ALWAYS_ALLOW` to `REQUIRE_ATTESTATION`, then import:

            ```bash
            gcloud container binauthz policy import policy.yaml
            ```
    refs:
      - url: https://cloud.google.com/binary-authorization/docs/overview
        title: Binary Authorization overview
      - url: https://cloud.google.com/binary-authorization/docs/configuring-policy-cli
        title: Configuring a Binary Authorization policy
  - uid: mondoo-gcp-security-binary-authorization-default-rule-not-allow-all-gcp
