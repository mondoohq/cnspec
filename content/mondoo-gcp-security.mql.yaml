    docs:
      desc: |
        This check ensures that the DNSSEC zone-signing key (ZSK) for public Cloud DNS managed zones does not use the RSASHA1 algorithm. RSASHA1 is cryptographically weak and deprecated by Google, NIST, and the IETF; using it for zone signing undermines the cryptographic integrity of DNS records even when the key-signing key uses a stronger algorithm.

        **Why this matters**

        - **Cryptographic weakness of SHA-1:** SHA-1 collision attacks are practically feasible; a ZSK using RSASHA1 can potentially be forged, allowing an attacker to construct valid-looking DNSSEC signatures for malicious DNS records.
        - **Zone record integrity:** The ZSK signs individual DNS resource records in the zone; if the ZSK algorithm is weak, the signatures on A, CNAME, MX, and other records provide inadequate protection against forgery.
        - **Regulatory and framework compliance:** NIST, PCI DSS, and Google's own guidance require strong cryptographic algorithms; continued use of SHA-1 creates audit findings and indicates a zone is operating below accepted security baselines.

        **Risk mitigation**

        - **Replace RSASHA1 ZSKs with stronger algorithms:** Use RSASHA256, RSASHA512, ECDSAP256SHA256, or ECDSAP384SHA384 for zone signing; to update DNSSEC settings on a live zone, disable DNSSEC first, then re-enable it with the updated algorithm.
        - **Apply consistent algorithm choices:** Use the same strong algorithm for both the KSK and ZSK to simplify operational management and ensure the entire DNSSEC configuration meets current cryptographic standards.
      audit: |
        **Using Google Cloud CLI**

        Ensure the property algorithm for keyType zoneSigning is not using `RSASHA1`:

        ```bash
        gcloud dns managed-zones describe ZONE_NAME --format="json(dnsName,dnssecConfig.state,dnssecConfig.defaultKeySpecs)"
        ```
