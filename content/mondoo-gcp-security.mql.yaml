  - uid: mondoo-gcp-security-compute-subnetwork-private-google-access-enabled
    title: Ensure Private Google Access is enabled on subnetworks
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-gcp-security-compute-subnetwork-private-google-access-enabled-gcp
        tags:
          mondoo.com/filter-title: GCP Compute Subnetwork
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-compute-subnetwork-private-google-access-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-compute-subnetwork-private-google-access-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-compute-subnetwork-private-google-access-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Private Google Access is enabled on GCP subnetworks, allowing VM instances without external IP addresses to reach Google APIs and services over Google's internal network. By default, Private Google Access is disabled when a subnetwork is created; without it, VMs that lack external IPs cannot reach Google services unless an external IP is assigned.

        **Why this matters**

        - **Reduced external IP exposure:** Without Private Google Access, VMs that need to call Google APIs such as Cloud Storage or BigQuery must have external IPs assigned, expanding the publicly reachable surface of the environment.
        - **Traffic stays within Google:** With Private Google Access enabled, API traffic to Google services travels over Google's private network rather than the public internet, reducing exposure to network-level interception.
        - **Enables internal-only architectures:** Private Google Access is the enabler for building subnets where no VM requires an external IP, which is a foundational pattern for hardened VPC designs.
        - **Supports compliance segmentation:** Regulatory frameworks that require sensitive workloads to avoid direct internet connectivity benefit from Private Google Access ensuring Google API calls do not break that isolation.

        **Risk mitigation**

        - **Enable at the subnet level:** Set `private_ip_google_access = true` on each subnet that hosts VMs without external IPs, or on all subnets as a default posture.
        - **Combine with firewall egress rules:** Use VPC egress firewall rules to restrict outbound traffic to only the Google API address ranges, ensuring Private Google Access is the only permitted path to Google services.
        - **Audit external IP assignments:** Regularly review VM instances for external IP assignments; subnets with Private Google Access enabled should have no VMs that require external IPs for API access.
      audit: |
        ### Audit via Console

        1. Sign in to the [Google Cloud Console](https://console.cloud.google.com) and open the target project.
        2. Navigate to **VPC network > VPC networks**.
        3. Select a network, then open the **Subnets** tab.
        4. For each subnet, check the **Private Google access** column.

        A passing subnet shows **On** for Private Google access. A failing subnet shows **Off**.

        ### Audit via CLI

        1. List all subnetworks and their Private Google Access status:

        ```bash
        gcloud compute networks subnets list --format="table(name,region,privateIpGoogleAccess)"
        ```

        A passing subnetwork returns `True` in the `PRIVATE_IP_GOOGLE_ACCESS` column. A failing subnetwork returns `False` or an empty value.
      remediation:
        - id: terraform
          desc: |
            To ensure Private Google Access is enabled on subnetworks in Terraform, enable Private Google Access on subnetworks:

            ```hcl
            resource "google_compute_subnetwork" "example" {
              name                     = "example-subnet"
              ip_cidr_range            = "10.0.0.0/24"
              region                   = "us-central1"
              network                  = google_compute_network.example.id
              private_ip_google_access = true
            }
            ```
        - id: console
          desc: |
            To ensure Private Google Access is enabled on subnetworks using the Google Cloud Console:

            1. In the Google Cloud console, go to the **VPC network > VPC networks** page.
            2. Select the network containing the subnet.
            3. Select the subnet you want to configure.
            4. Select **Edit**.
            5. Under **Private Google Access**, select **On**.
            6. Select **Save**.
        - id: cli
          desc: |
            To ensure Private Google Access is enabled on subnetworks using the Google Cloud CLI:

            ```bash
            gcloud compute networks subnets update SUBNET_NAME --region=REGION --enable-private-ip-google-access
            ```
    refs:
