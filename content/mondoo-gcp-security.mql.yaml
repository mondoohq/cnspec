      )
  - uid: mondoo-gcp-security-vertexai-pipeline-job-vpc-network
    title: Ensure Vertex AI pipeline jobs use a VPC network
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-1-5
      compliance/vda-isa-5: vda-isa-5-5-2-7
    # NOTE (2026-03-29): Terraform variants not included because Vertex AI pipeline jobs have no
    # corresponding Terraform resource (google_vertex_ai_pipeline_job does not exist in the
    # Terraform Google provider). Pipeline jobs are created via API/SDK only.
    variants:
      - uid: mondoo-gcp-security-vertexai-pipeline-job-vpc-network-gcp
        tags:
          mondoo.com/filter-title: GCP Vertex AI
          mondoo.com/filter-icon: gcp
    docs:
      desc: |
        This check ensures that Vertex AI pipeline jobs are configured to run within a VPC network. By default, pipeline jobs may communicate over the public internet; attaching a VPC network confines all inter-component traffic to the Google Cloud private network and enables VPC Service Controls.

        **Why this matters**

        - **Private data paths:** Routing pipeline traffic through a VPC prevents training data and model artifacts from traversing the public internet between pipeline stages.
        - **Network isolation:** A VPC boundary limits which external systems can initiate connections to pipeline workers, reducing the attack surface.
        - **VPC Service Controls support:** Pipeline jobs attached to a VPC can be enclosed in a VPC Service Controls perimeter, blocking data exfiltration at the API level.
        - **Compliance alignment:** Frameworks such as PCI DSS and HIPAA require transmission security controls that network-isolated pipelines provide.

        **Risk mitigation**

        - **Exfiltration prevention:** Confining pipeline traffic to a VPC makes it subject to VPC firewall rules and Cloud NAT, limiting unauthorized outbound data paths.
        - **Lateral movement restriction:** Network-level isolation prevents a compromised pipeline worker from reaching unrelated cloud services or external attacker infrastructure.
      audit: |
        ### Audit via Console

        1. In the Google Cloud Console, navigate to **Vertex AI > Pipelines**.
        2. Click each pipeline run to open its details.
        3. Under the pipeline job details, review the **Network** field.

        A passing pipeline job shows a VPC network name under **Network**. A failing pipeline job shows no network configured.

        ### Audit via CLI

        1. List pipeline jobs and inspect their network configuration using the Vertex AI REST API:

        ```bash
        curl -s \
          -H "Authorization: Bearer $(gcloud auth print-access-token)" \
          "https://REGION-aiplatform.googleapis.com/v1/projects/PROJECT/locations/REGION/pipelineJobs" \
          | python3 -c "import sys,json; jobs=json.load(sys.stdin).get('pipelineJobs',[]); [print(j.get('name'), j.get('network','NOT SET')) for j in jobs]"
        ```

        A passing pipeline job returns a VPC network path (for example, `projects/PROJECT/global/networks/VPC_NAME`). A failing pipeline job returns `NOT SET` or an empty value.
      remediation:
        - id: terraform
          desc: |
            To ensure Vertex AI pipeline jobs use a VPC network in Terraform, vertex AI pipeline jobs are not directly managed as Terraform resources. Use `google_vertex_ai_custom_job` for Terraform-managed ML jobs with VPC networking, or submit pipeline jobs via the gcloud CLI or API with a network configured:

            ```hcl
            resource "google_vertex_ai_custom_job" "example" {
              display_name = "example-custom-job"
              location     = "us-central1"
              project      = var.project_id

              job_spec {
                network = google_compute_network.example.id

                worker_pool_specs {
                  replica_count = 1
                  machine_spec {
                    machine_type = "n1-standard-4"
                  }
                  container_spec {
                    image_uri = "gcr.io/PROJECT/IMAGE:latest"
                  }
                }
              }
            }

            resource "google_compute_network" "example" {
              name                    = "example-network"
              auto_create_subnetworks = false
            }
            ```
        - id: console
          desc: |
            To ensure Vertex AI pipeline jobs use a VPC network using the Google Cloud Console:

            1. Go to the **Vertex AI** page in the Google Cloud Console.
            2. Navigate to **Pipelines**.
            3. When creating a pipeline run, expand **Network**.
            4. Select a VPC network for the pipeline job.
            5. Submit the pipeline run.
        - id: cli
          desc: |
            The `gcloud ai pipelines create` command is not available in the gcloud CLI. Use the Vertex AI REST API to create a pipeline job with a VPC network:

            ```bash
            curl -X POST \
              -H "Authorization: Bearer $(gcloud auth print-access-token)" \
              -H "Content-Type: application/json" \
              "https://REGION-aiplatform.googleapis.com/v1/projects/PROJECT/locations/REGION/pipelineJobs" \
              -d '{
                "displayName": "PIPELINE_JOB_NAME",
                "network": "projects/PROJECT/global/networks/VPC_NAME"
              }'
            ```
    refs:
      - url: https://cloud.google.com/vertex-ai/docs/general/vpc-peering
        title: VPC Network Peering for Vertex AI
  - uid: mondoo-gcp-security-vertexai-pipeline-job-vpc-network-gcp
    filters: asset.platform == 'gcp-project'
    mql: |
      gcp.project.vertexai.pipelineJobs.all(
        network != ""
      )
  - uid: mondoo-gcp-security-vertexai-pipeline-job-no-default-service-account
    title: Ensure Vertex AI pipeline jobs don't use default SA
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-2
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-5
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-3-3
      compliance/vda-isa-5: vda-isa-5-4-2-1
    # NOTE (2026-03-29): Terraform variants not included because Vertex AI pipeline jobs have no
    # corresponding Terraform resource (google_vertex_ai_pipeline_job does not exist in the
    # Terraform Google provider). Pipeline jobs are created via API/SDK only.
    variants:
      - uid: mondoo-gcp-security-vertexai-pipeline-job-no-default-service-account-gcp
        tags:
          mondoo.com/filter-title: GCP Vertex AI
          mondoo.com/filter-icon: gcp
    docs:
      desc: |
        This check ensures that Vertex AI pipeline jobs use a dedicated service account rather than the default Compute Engine service account. The default account carries the Editor role, giving any pipeline job broad read and write access to nearly all project resources.

        **Why this matters**

        - **Excessive permissions:** The default Compute Engine service account holds project-wide Editor-level access, far beyond what any ML pipeline requires to read data and write results.
        - **Blast radius:** A pipeline job that is compromised or misconfigured can access, modify, or delete storage buckets, databases, and other project resources when running as the default account.
        - **Least privilege:** A purpose-built service account can be granted only the roles the pipeline needs, such as reading from a specific bucket and writing to a model registry.
        - **Auditability:** IAM bindings on a dedicated account make it straightforward to audit and revoke exactly what access a pipeline uses.

        **Risk mitigation**

        - **Scope reduction:** Custom service accounts limit a compromised pipeline to only the resources it is explicitly authorized to access.
        - **Independent revocation:** A dedicated service account can be disabled or deleted without affecting other workloads in the project.
      audit: |
        ### Audit via Console

        1. In the Google Cloud Console, navigate to **Vertex AI > Pipelines**.
        2. Click each pipeline run to open its details.
        3. Under the pipeline job details, review the **Service account** field.

        A passing pipeline job shows a custom service account (not the default Compute Engine service account, which ends with `-compute@developer.gserviceaccount.com`). A failing pipeline job shows the default Compute Engine service account or an App Engine default service account.

        ### Audit via CLI

        1. List pipeline jobs and inspect their service account using the Vertex AI REST API:

        ```bash
        curl -s \
          -H "Authorization: Bearer $(gcloud auth print-access-token)" \
          "https://REGION-aiplatform.googleapis.com/v1/projects/PROJECT/locations/REGION/pipelineJobs" \
          | python3 -c "import sys,json; jobs=json.load(sys.stdin).get('pipelineJobs',[]); [print(j.get('name'), j.get('serviceAccount','NOT SET')) for j in jobs]"
        ```

        A passing pipeline job returns a custom service account email that does not match the pattern `PROJECT_NUMBER-compute@developer.gserviceaccount.com`. A failing pipeline job returns the default Compute Engine or App Engine service account.
      remediation:
        - id: terraform
          desc: |
            To ensure Vertex AI pipeline jobs don't use default SA in Terraform, vertex AI pipeline jobs are not directly managed as Terraform resources. Use `google_vertex_ai_custom_job` for Terraform-managed ML jobs with a custom service account, or submit pipeline jobs via the gcloud CLI or API with a custom service account configured:

            ```hcl
            resource "google_vertex_ai_custom_job" "example" {
              display_name = "example-custom-job"
              location     = "us-central1"
              project      = var.project_id

              job_spec {
                service_account = google_service_account.pipeline_sa.email

                worker_pool_specs {
                  replica_count = 1
                  machine_spec {
                    machine_type = "n1-standard-4"
                  }
                  container_spec {
                    image_uri = "gcr.io/PROJECT/IMAGE:latest"
                  }
                }
              }
            }

            resource "google_service_account" "pipeline_sa" {
              account_id   = "vertex-pipeline-sa"
              display_name = "Vertex AI Pipeline Service Account"
            }

            resource "google_project_iam_member" "pipeline_sa_roles" {
              project = var.project_id
              role    = "roles/aiplatform.customCodeServiceAgent"
              member  = "serviceAccount:${google_service_account.pipeline_sa.email}"
            }
            ```
        - id: console
          desc: |
            To ensure Vertex AI pipeline jobs don't use default SA using the Google Cloud Console:

            1. Go to the **Vertex AI** page in the Google Cloud Console.
            2. Navigate to **Pipelines**.
            3. When creating a pipeline run, expand **Advanced options**.
            4. Under **Service account**, select a custom service account.
            5. Submit the pipeline run.
        - id: cli
          desc: |
            The `gcloud ai pipelines create` command is not available in the gcloud CLI. Use the Vertex AI REST API to create a pipeline job with a custom service account:

            ```bash
            curl -X POST \
              -H "Authorization: Bearer $(gcloud auth print-access-token)" \
              -H "Content-Type: application/json" \
              "https://REGION-aiplatform.googleapis.com/v1/projects/PROJECT/locations/REGION/pipelineJobs" \
              -d '{
                "displayName": "PIPELINE_JOB_NAME",
                "serviceAccount": "CUSTOM_SA_EMAIL"
              }'
            ```
    refs:
      - url: https://cloud.google.com/vertex-ai/docs/pipelines/configure-project#service-account
        title: Configure a service account for Vertex AI Pipelines
  - uid: mondoo-gcp-security-vertexai-pipeline-job-no-default-service-account-gcp
    filters: asset.platform == 'gcp-project'
    mql: |
      gcp.project.vertexai.pipelineJobs.all(
        serviceAccount != "" &&
        serviceAccount != /^\d+-compute@developer\.gserviceaccount\.com$/ &&
        serviceAccount != /^[a-z0-9\-]+@appspot\.gserviceaccount\.com$/
      )
  - uid: mondoo-gcp-security-vertexai-feature-online-store-cmek-encryption
    title: Ensure Vertex AI feature online stores use CMEK
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-gcp-security-vertexai-feature-online-store-cmek-encryption-gcp
        tags:
          mondoo.com/filter-title: GCP Vertex AI
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-vertexai-feature-online-store-cmek-encryption-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-vertexai-feature-online-store-cmek-encryption-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-vertexai-feature-online-store-cmek-encryption-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Vertex AI feature online stores are encrypted using customer-managed encryption keys (CMEK). By default, feature store data is encrypted with Google-managed keys; CMEK transfers key custody to the organization and enables independent access revocation for the stored feature values.

        **Why this matters**

        - **Key control:** Organizations can disable or destroy the CMEK key to immediately prevent access to all feature data without relying on Google.
        - **Sensitive feature data:** Feature stores often contain aggregated customer behavior, transaction patterns, or other derived signals that are valuable targets for exfiltration.
        - **Real-time serving protection:** Feature online stores back production ML inference endpoints; protecting them with CMEK ensures that serving data is encrypted under organizationally controlled keys.
        - **Compliance alignment:** Frameworks such as HIPAA and PCI DSS require customer-controlled encryption for stores serving production systems that process regulated data.

        **Risk mitigation**

        - **Immediate access revocation:** Disabling the CMEK key prevents all reads from the feature store, isolating the data if the serving system is compromised.
        - **Separation of duties:** Placing the KMS key in a dedicated project enforces a boundary between feature store operators and key administrators.
      audit: |
        ### Audit via Console

        1. In the Google Cloud Console, navigate to **Vertex AI > Feature Store**.
        2. Select **Online Stores** from the left menu.
        3. Click each online store name to open its details.
        4. Under the store details, look for the **Encryption** field.

        A passing feature online store shows a Cloud KMS key name under **Encryption**. A failing store shows no encryption key configured or only Google-managed encryption.

        ### Audit via CLI

        1. List feature online stores and inspect their encryption specification using the Vertex AI REST API:

        ```bash
        curl -s \
          -H "Authorization: Bearer $(gcloud auth print-access-token)" \
          "https://REGION-aiplatform.googleapis.com/v1/projects/PROJECT/locations/REGION/featureOnlineStores" \
          | python3 -c "import sys,json; stores=json.load(sys.stdin).get('featureOnlineStores',[]); [print(s.get('name'), s.get('encryptionSpec',{}).get('kmsKeyName','NOT SET')) for s in stores]"
        ```

        A passing feature online store returns a KMS key name. A failing store returns `NOT SET` or an empty encryption specification.
      remediation:
        - id: terraform
          desc: |
            To ensure Vertex AI feature online stores use CMEK in Terraform, configure CMEK encryption when creating a Vertex AI feature online store:

            ```hcl
            resource "google_vertex_ai_feature_online_store" "example" {
              name     = "example-feature-store"
              region   = "us-central1"

              bigtable {
                auto_scaling {
                  min_node_count         = 1
                  max_node_count         = 3
                  cpu_utilization_target = 50
                }
              }

              encryption_spec {
                kms_key_name = google_kms_crypto_key.example.id
              }
            }

            resource "google_kms_crypto_key" "example" {
              name     = "example-key"
              key_ring = google_kms_key_ring.example.id
            }

            resource "google_kms_key_ring" "example" {
              name     = "example-keyring"
              location = "us-central1"
            }
            ```
        - id: console
          desc: |
            To ensure Vertex AI feature online stores use CMEK using the Google Cloud Console, note: CMEK must be configured at feature online store creation time.

            1. Go to the **Vertex AI** page in the Google Cloud Console.
            2. Navigate to **Feature Store > Online Stores**.
            3. Select **Create Online Store**.
            4. Under **Encryption**, select **Customer-managed encryption key (CMEK)**.
            5. Select or create a Cloud KMS key.
            6. Complete the store creation.
        - id: cli
          desc: |
            The `gcloud ai feature-online-stores create` command is not available in the gcloud CLI. Use the Vertex AI REST API to create a feature online store with CMEK:

            ```bash
            curl -X POST \
              -H "Authorization: Bearer $(gcloud auth print-access-token)" \
              -H "Content-Type: application/json" \
              "https://REGION-aiplatform.googleapis.com/v1/projects/PROJECT/locations/REGION/featureOnlineStores?featureOnlineStoreId=STORE_NAME" \
              -d '{
                "encryptionSpec": {
                  "kmsKeyName": "projects/PROJECT/locations/LOCATION/keyRings/RING/cryptoKeys/KEY"
                }
              }'
            ```
    refs:
      - url: https://cloud.google.com/vertex-ai/docs/general/cmek
        title: Customer-managed encryption keys for Vertex AI
  - uid: mondoo-gcp-security-vertexai-feature-online-store-cmek-encryption-gcp
    filters: asset.platform == 'gcp-project'
    mql: |
      gcp.project.vertexai.featureOnlineStores.all(
        encryptionSpec != empty
      )
  - uid: mondoo-gcp-security-vertexai-feature-online-store-cmek-encryption-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_vertex_ai_feature_online_store')
    mql: |
