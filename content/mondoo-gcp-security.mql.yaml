    mql: |
      terraform.state.resources.where(type == 'google_storage_bucket').all(
        values.uniform_bucket_level_access == true
      )
  - uid: mondoo-gcp-security-cloud-storage-bucket-public-access-prevention
    title: Ensure that Cloud Storage buckets enforce public access prevention
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-2-1
    variants:
      - uid: mondoo-gcp-security-cloud-storage-bucket-public-access-prevention-gcp
        tags:
          mondoo.com/filter-title: GCP Cloud Storage Bucket
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-cloud-storage-bucket-public-access-prevention-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-storage-bucket-public-access-prevention-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-storage-bucket-public-access-prevention-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Cloud Storage buckets have public access prevention set to `enforced`, which categorically blocks any IAM policy or ACL change that would grant public access to the bucket or its objects. By default, buckets inherit a setting of `inherited`, which means existing and future IAM changes can still introduce public access if they include `allUsers` or `allAuthenticatedUsers`.

        **Why this matters**

        - **Defense-in-depth against misconfiguration:** Even with correct IAM policies today, a future change by a team member unfamiliar with the bucket's sensitivity could inadvertently expose data; `enforced` prevention blocks such changes at the API level.
        - **Override of existing bindings:** When `enforced` is set, GCP overrides any existing IAM or ACL bindings that grant public access, closing exposures that may have been introduced previously.
        - **Protection against object-level ACL bypass:** Object ACLs that would otherwise grant `allUsers` access are blocked when public access prevention is enforced, even when uniform bucket-level access is not enabled.
        - **Organizational posture assurance:** Enforcing this setting at the bucket level provides a safety net independent of which team member or automation tool manages the bucket's IAM policy.

        **Risk mitigation**

        - **Set `enforced` on all sensitive buckets:** Update the `publicAccessPrevention` setting to `enforced` for any bucket holding internal data, logs, backups, or regulated information.
        - **Apply the org-level constraint:** Enable `constraints/storage.publicAccessPrevention` to automatically enforce public access prevention on all new buckets created in the organization or folder.
        - **Audit inherited buckets:** Identify buckets still using the `inherited` setting and migrate them to `enforced`, validating that no legitimate public serving use case is disrupted.
      audit: |
        ### Audit via Console

        1. In the Google Cloud console, go to the **Cloud Storage** > **Buckets** page.
        2. For each bucket, check the **Public access** column for the value **Not public (enforced)**.
        3. To inspect a specific bucket, select its name, go to the **Permissions** tab, and review the **Public access** section.
        4. Confirm **Public access prevention** is set to **Enforced**.

        A passing bucket shows **Not public (enforced)** or indicates that public access prevention is **Enforced**. A failing bucket shows **Not public** (inherited but not enforced) or any public access status.

        ### Audit via CLI

        1. Describe a specific bucket and check the public access prevention setting:

        ```bash
        gcloud storage buckets describe gs://BUCKET_NAME \
          --format="get(iamConfiguration.publicAccessPrevention)"
        ```

        2. List all buckets and their public access prevention status:

        ```bash
        gcloud storage buckets list \
          --format="table(name,iamConfiguration.publicAccessPrevention)"
        ```

        A passing bucket returns `enforced`. A failing bucket returns `inherited` or any value other than `enforced`.
      remediation:
        - id: terraform
          desc: |
            To ensure that Cloud Storage buckets enforce public access prevention in Terraform, set the `public_access_prevention` property to `enforced` in your bucket configuration:

            ```hcl
            resource "google_storage_bucket" "example" {
              name                        = "example-bucket"
              location                    = "US"
              public_access_prevention    = "enforced"
            }
            ```
        - id: console
          desc: |
            To ensure that Cloud Storage buckets enforce public access prevention using the Google Cloud Console:

            1. In the Google Cloud console, go to the **Cloud Storage Buckets** page.
            2. Select the name of the bucket you want to configure.
            3. Select the **Permissions** tab.
            4. In the **Public access** section, select **Prevent public access**.
            5. Select **Confirm**.
        - id: cli
          desc: |
            To ensure that Cloud Storage buckets enforce public access prevention using the Google Cloud CLI:

            ```bash
            gcloud storage buckets update gs://BUCKET_NAME --public-access-prevention
            ```
    refs:
      - url: https://cloud.google.com/storage/docs/best-practices#security
        title: Cloud Storage Security Best Practices
  - uid: mondoo-gcp-security-cloud-storage-bucket-public-access-prevention-gcp
    filters: asset.platform == 'gcp-storage-bucket'
    mql: gcp.storage.bucket.iamConfiguration['publicAccessPrevention'] == "enforced"
  - uid: mondoo-gcp-security-cloud-storage-bucket-public-access-prevention-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' &&
        terraform.resources.contains(nameLabel == 'google_storage_bucket')
    mql: |
      terraform.resources('google_storage_bucket').all(
        arguments.public_access_prevention == "enforced"
      )
  - uid: mondoo-gcp-security-cloud-storage-bucket-public-access-prevention-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_storage_bucket')
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_storage_bucket').all(
        change.after.public_access_prevention == "enforced"
      )
  - uid: mondoo-gcp-security-cloud-storage-bucket-public-access-prevention-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'google_storage_bucket')
    mql: |
      terraform.state.resources.where(type == 'google_storage_bucket').all(
        values.public_access_prevention == "enforced"
      )
  - uid: mondoo-gcp-security-cloud-storage-bucket-cmek-encryption
    title: Ensure Cloud Storage buckets are encrypted with CMEK
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-gcp-security-cloud-storage-bucket-cmek-encryption-gcp
        tags:
          mondoo.com/filter-title: GCP Cloud Storage Bucket
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-cloud-storage-bucket-cmek-encryption-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-storage-bucket-cmek-encryption-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-storage-bucket-cmek-encryption-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Cloud Storage buckets are configured with a customer-managed encryption key (CMEK) as the default encryption key, so all objects written to the bucket are encrypted under a key the organization controls. By default, GCP encrypts all Cloud Storage data at rest using Google-managed keys, which do not provide the organization with the ability to control key rotation, revocation, or separation of duties.

        **Why this matters**

        - **Key lifecycle control:** With CMEK, the organization controls when keys are created, rotated, and destroyed, ensuring encryption stays aligned with internal key management policies.
        - **Data access revocation:** Disabling or destroying the Cloud KMS key immediately renders all CMEK-encrypted objects inaccessible, providing a hard revocation mechanism that Google-managed keys cannot offer.
        - **Separation of duties:** CMEK separates the cloud provider's role (storing data) from the organization's role (controlling the encryption key), satisfying compliance requirements that mandate customer-controlled cryptography.
        - **Auditability of key usage:** Every encryption and decryption operation performed with the KMS key appears in Cloud Audit Logs, providing a record of when bucket data was accessed at the cryptographic layer.

        **Risk mitigation**

        - **Set a default KMS key on each bucket:** Configure `defaultKmsKeyName` on buckets containing sensitive data so all new objects are automatically encrypted with the designated CMEK.
        - **Grant the GCS service account KMS rights:** Ensure the Cloud Storage service account has the `roles/cloudkms.cryptoKeyEncrypterDecrypter` role on the key, otherwise write operations will fail.
        - **Monitor key health:** Set up alerts for key disablement or destruction events to avoid unintended data inaccessibility in production systems.
      audit: |
        ### Audit via Console

        1. In the Google Cloud console, go to the **Cloud Storage** > **Buckets** page.
        2. Select the name of the bucket you want to inspect.
        3. Select the **Configuration** tab.
        4. Under **Encryption type**, confirm the value shows **Customer-managed** with a Cloud KMS key name.

        A passing bucket shows **Customer-managed** encryption with a Cloud KMS key name specified. A failing bucket shows **Google-managed** encryption with no customer-managed key configured.

        ### Audit via CLI

        1. Describe a specific bucket and check its default encryption key:

        ```bash
        gcloud storage buckets describe gs://BUCKET_NAME \
          --format="get(encryption.defaultKmsKeyName)"
        ```

        2. List all buckets and their default KMS key:

        ```bash
        gcloud storage buckets list \
          --format="table(name,encryption.defaultKmsKeyName)"
        ```

        A passing bucket returns a Cloud KMS key resource name such as `projects/PROJECT_ID/locations/LOCATION/keyRings/KEY_RING/cryptoKeys/KEY`. A failing bucket returns an empty value.
      remediation:
        - id: terraform
          desc: |
            To ensure Cloud Storage buckets are encrypted with CMEK in Terraform, configure a Cloud KMS key and set it as the default encryption key for the bucket:

            ```hcl
            resource "google_kms_key_ring" "example" {
              name     = "example-keyring"
              location = "us"
            }

            resource "google_kms_crypto_key" "example" {
              name     = "example-key"
              key_ring = google_kms_key_ring.example.id
            }

            resource "google_storage_bucket" "example" {
              name     = "example-bucket"
              location = "US"

              encryption {
                default_kms_key_name = google_kms_crypto_key.example.id
              }
            }
            ```
        - id: console
          desc: |
            To ensure Cloud Storage buckets are encrypted with CMEK using the Google Cloud Console:

            1. In the Google Cloud console, go to the **Cloud Storage Buckets** page.
            2. Select the name of the bucket you want to configure.
            3. Select the **Configuration** tab.
            4. Under **Encryption type**, select **Edit**.
            5. Select **Customer-managed encryption key**.
            6. Search for or enter the name of the Cloud KMS key you want to use.
            7. Select **Save**.
        - id: cli
          desc: |
            To ensure Cloud Storage buckets are encrypted with CMEK using the Google Cloud CLI:

            ```bash
            gcloud storage buckets update gs://BUCKET_NAME --default-encryption-key=projects/PROJECT_ID/locations/LOCATION/keyRings/KEY_RING/cryptoKeys/KEY
            ```
    refs:
