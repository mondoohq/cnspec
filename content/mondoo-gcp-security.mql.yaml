  - uid: mondoo-gcp-security-cloud-functions-cmek-encryption
    title: Ensure Cloud Functions use customer-managed encryption keys (CMEK)
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-gcp-security-cloud-functions-cmek-encryption-gcp
        tags:
          mondoo.com/filter-title: GCP Cloud Function
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-cloud-functions-cmek-encryption-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-functions-cmek-encryption-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-functions-cmek-encryption-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Cloud Functions are configured to use customer-managed encryption keys (CMEK) rather than Google-managed keys. By default, Google manages encryption keys on behalf of the organization, but CMEK gives teams independent control over key rotation, access policies, and revocation for function source code and data at rest.

        **Why this matters**

        - **Key lifecycle control:** CMEK lets organizations rotate, disable, or destroy keys independently of Google, giving direct control over when encrypted data becomes inaccessible.
        - **Revocation capability:** Disabling or destroying a CMEK key immediately revokes access to all encrypted function data without waiting for Google-side action.
        - **Auditability:** Every use of a CMEK key is recorded in Cloud KMS audit logs, providing a verifiable trail of encryption operations.
        - **Regulatory alignment:** Many data protection frameworks require organizations to maintain custody of their own encryption keys for sensitive workloads.

        **Risk mitigation**

        - **Restrict key access:** Apply narrow IAM bindings on the Cloud KMS key so only the Cloud Functions service agent can use it for encryption and decryption.
        - **Enable key rotation:** Configure automatic rotation on the KMS key to limit the window of exposure if a key version is compromised.
        - **Monitor key usage:** Set up alerts in Cloud KMS and Cloud Audit Logs for anomalous key operation patterns.
      audit: |
        ### Audit via Console

        1. Sign in to the [Google Cloud Console](https://console.cloud.google.com) and select the project.
        2. Navigate to **Cloud Functions**.
        3. Select a function name to open its details page.
        4. Under **Runtime, build, connections and security settings**, expand the **Security** section.
        5. Check the **Customer-managed encryption key** field.
        6. Repeat for each function.

        A passing function shows a Cloud KMS key resource name under **Customer-managed encryption key**. A failing function shows no customer-managed encryption key configured (Google-managed encryption only).

        ### Audit via CLI

        1. Describe each function and check the `kmsKeyName` field:

        ```bash
        gcloud functions describe FUNCTION_NAME --format="value(kmsKeyName)"
        ```

        A passing function returns a non-empty Cloud KMS key resource name. A failing function returns an empty or absent `kmsKeyName` value.
      remediation:
        - id: terraform
          desc: |
            To ensure Cloud Functions use customer-managed encryption keys (CMEK) in Terraform:

            ```hcl
            resource "google_cloudfunctions2_function" "example" {
              name     = "example-function"
              location = "us-central1"

              build_config {
                runtime     = "python312"
                entry_point = "main"
              }

              kms_key_name = google_kms_crypto_key.example.id
            }
            ```
        - id: console
          desc: |
            To ensure Cloud Functions use customer-managed encryption keys (CMEK) using the Google Cloud Console:

            1. Navigate to **Cloud Functions** in the Google Cloud Console.
            2. Select the function or select **Create Function**.
            3. Under **Runtime, build, connections and security settings**, expand **Security**.
            4. Select **Customer-managed encryption key**.
            5. Choose or create a Cloud KMS key.
            6. Deploy the function.
        - id: cli
          desc: |
            To ensure Cloud Functions use customer-managed encryption keys (CMEK) using the Google Cloud CLI, deploy a function with CMEK:

            ```bash
            gcloud functions deploy FUNCTION_NAME \
              --kms-key=projects/PROJECT/locations/LOCATION/keyRings/RING/cryptoKeys/KEY
            ```
    refs:
      - url: https://cloud.google.com/functions/docs/securing/cmek
        title: Customer-managed encryption keys for Cloud Functions
