  - uid: mondoo-gcp-security-cloud-functions-vpc-connector-configured
    title: Ensure Cloud Functions have a VPC connector configured
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-1-5
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-gcp-security-cloud-functions-vpc-connector-configured-gcp
        tags:
          mondoo.com/filter-title: GCP Cloud Function
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-cloud-functions-vpc-connector-configured-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-functions-vpc-connector-configured-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-functions-vpc-connector-configured-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Cloud Functions have a Serverless VPC Access connector configured to enable secure communication with resources inside a VPC network. Without a VPC connector, functions that need to reach internal services must route traffic through the public internet, exposing that communication to interception.

        **Why this matters**

        - **Traffic exposed to the internet:** Functions without VPC connectors must contact internal services such as databases, caches, and internal APIs over public paths, making credentials and data in transit visible to anyone positioned to intercept the traffic.
        - **Man-in-the-middle risk:** Public routing paths lack the network-level trust guarantees of private VPC connectivity, increasing susceptibility to eavesdropping and traffic manipulation.
        - **Firewall enforcement gap:** VPC connectors allow firewall rules to control exactly which resources a function can reach; without a connector, granular egress control through network-level policies is unavailable.
        - **Compliance requirement:** Data protection standards that mandate encrypted internal communication paths often require private connectivity rather than reliance on application-layer TLS alone.

        **Risk mitigation**

        - **Configure a VPC connector for each function:** Create a Serverless VPC Access connector in the same region as the function and associate it with the function's configuration.
        - **Control egress with connector settings:** Set `vpc_connector_egress_settings` to route only private-range traffic through the connector, or route all traffic through it, depending on the function's network requirements.
        - **Apply firewall rules to connector traffic:** Restrict the connector's VPC traffic to only the specific internal resources the function is permitted to reach.
      audit: |
        ### Audit via Console

        1. Sign in to the [Google Cloud Console](https://console.cloud.google.com) and select the project.
        2. Navigate to **Cloud Functions**.
        3. Select a function name to open its details page.
        4. Click the **Networking** tab.
        5. Under **Egress settings**, check whether a VPC connector is configured.
        6. Repeat for each function.

        A passing function shows a VPC connector name under **Egress settings**. A failing function shows no VPC connector configured.

        ### Audit via CLI

        1. List all functions and their VPC connector setting:

        ```bash
        gcloud functions list --format="table(name,serviceConfig.vpcConnector)"
        ```

        A passing function returns a non-empty VPC connector resource name in the `VPC_CONNECTOR` column. A failing function returns an empty or absent `VPC_CONNECTOR` value.
      remediation:
        - id: terraform
          desc: |
            To ensure Cloud Functions have a VPC connector configured in Terraform:

            ```hcl
            resource "google_vpc_access_connector" "connector" {
              name          = "function-connector"
              region        = "us-central1"
              ip_cidr_range = "10.8.0.0/28"
              network       = "default"
            }

            resource "google_cloudfunctions_function" "example" {
              name                  = "example-function"
              runtime               = "python312"
              entry_point           = "main"
              vpc_connector         = google_vpc_access_connector.connector.id
              vpc_connector_egress_settings = "ALL_TRAFFIC"

              source_archive_bucket = google_storage_bucket.source.name
              source_archive_object = google_storage_bucket_object.archive.name
            }
            ```
        - id: console
          desc: |
            To ensure Cloud Functions have a VPC connector configured using the Google Cloud Console:

            1. Navigate to **Cloud Functions** in the Google Cloud Console.
            2. Select the function to update.
            3. Select **Edit**.
            4. Under **Runtime, build, connections and security settings**, expand **Connections**.
            5. Under **Egress settings**, select a VPC connector or create a new one.
            6. Select **Next** and then **Deploy**.
        - id: cli
          desc: |
            To ensure Cloud Functions have a VPC connector configured using the Google Cloud CLI:

            ```bash
            gcloud functions deploy FUNCTION_NAME \
              --vpc-connector=projects/PROJECT/locations/REGION/connectors/CONNECTOR_NAME \
              --egress-settings=all
            ```
    refs:
      - url: https://cloud.google.com/functions/docs/networking/connecting-vpc
        title: Connecting to a VPC network
