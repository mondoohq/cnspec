  - uid: mondoo-gcp-security-cloud-kms-encrypt-decrypt-keys-rotation-configured
    title: Ensure KMS ENCRYPT_DECRYPT crypto keys have automatic rotation configured
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-12
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-12
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-10
      compliance/pci-dss-4: pcidss-requirement-3-7-4
      compliance/soc2-2017: soc2-control-cc6-1-11
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-gcp-security-cloud-kms-encrypt-decrypt-keys-rotation-configured-gcp
        tags:
          mondoo.com/filter-title: GCP Cloud KMS Keyring
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-cloud-kms-encrypt-decrypt-keys-rotation-configured-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-kms-encrypt-decrypt-keys-rotation-configured-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-kms-encrypt-decrypt-keys-rotation-configured-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Cloud KMS crypto keys with the `ENCRYPT_DECRYPT` purpose and an enabled primary key version have automatic rotation configured. Without a rotation period set, a single key version protects data indefinitely; configuring automatic rotation causes Cloud KMS to generate new primary key versions on a regular schedule without manual intervention.

        **Why this matters**

        - **Bounded blast radius:** Automatic rotation limits how much data is encrypted under any single key version, so a compromised key version exposes only the data encrypted during its rotation period rather than every object ever encrypted with that key.
        - **Persistent access prevention:** A stolen key version without rotation remains valid forever, giving an attacker indefinite ability to decrypt historical data; rotation invalidates that advantage by making new versions the default for encryption.
        - **Defense against undetected compromise:** Key material may be exfiltrated silently long before detection; rotation ensures that even an undetected compromise has a bounded shelf life.

        **Risk mitigation**

        - **Enable automatic rotation:** Set a `rotationPeriod` on all `ENCRYPT_DECRYPT` keys; the CIS Google Cloud Platform Foundations Benchmark and NIST 800-57 recommend 90 days or less as a baseline.
        - **Monitor rotation schedule adherence:** Configure alerting for keys whose `nextRotationTime` is overdue or whose rotation period is not set, so gaps are detected before they become compliance findings.
        - **Handle import-only keys separately:** Keys with import-only key material cannot use automatic rotation and require a manual rotation process; document and track these keys explicitly.
      audit: |
        ### Audit via Console

        1. Sign in to the [Google Cloud Console](https://console.cloud.google.com).
        2. Navigate to **Security** > **Key Management**.
        3. Select a key ring, then click on a crypto key.
        4. Check the **Rotation period** column for each key with purpose `ENCRYPT_DECRYPT`.

        A passing key shows a rotation period configured (for example, `90 days`). A failing key shows **Rotation period: None** or no rotation period set.

        ### Audit via CLI

        1. List all crypto keys within a key ring and check for a rotation period:

        ```bash
        gcloud kms keys list \
          --keyring=KEY_RING_NAME \
          --location=LOCATION \
          --format="table(name,purpose,rotationPeriod,nextRotationTime)"
        ```

        A passing key returns a value in the `ROTATION_PERIOD` column (for example, `7776000s`) for keys with purpose `ENCRYPT_DECRYPT`. A failing key returns an empty `ROTATION_PERIOD` field.
      remediation:
        - id: terraform
          desc: |
            To ensure KMS ENCRYPT_DECRYPT crypto keys have automatic rotation configured in Terraform, configure automatic rotation for ENCRYPT_DECRYPT crypto keys:

            ```hcl
            resource "google_kms_crypto_key" "example" {
              name     = "example-key"
              key_ring = google_kms_key_ring.example.id
              purpose  = "ENCRYPT_DECRYPT"

              # Rotate every 90 days
              rotation_period = "7776000s"

              lifecycle {
                prevent_destroy = true
              }
            }
            ```
        - id: console
          desc: |
            To ensure KMS ENCRYPT_DECRYPT crypto keys have automatic rotation configured using the Google Cloud Console:

            1. Navigate to **Security** > **Key Management** in the GCP Console.
            2. Select the key ring containing the target crypto key.
            3. Click the three-dot menu for the crypto key and select **Edit rotation period**.
            4. Set a rotation period such as 90 days and a starting date.
            5. Select **Save**.
        - id: cli
          desc: |
            To ensure KMS ENCRYPT_DECRYPT crypto keys have automatic rotation configured using the Google Cloud CLI, configure automatic rotation for an existing crypto key:

            ```bash
            gcloud kms keys update KEY_NAME \
              --keyring=KEY_RING \
              --location=LOCATION \
              --rotation-period=90d \
              --next-rotation-time=$(date -u -v+90d +%Y-%m-%dT%H:%M:%SZ)
            ```

            For new keys, set rotation at creation time:

            ```bash
            gcloud kms keys create KEY_NAME \
              --keyring=KEY_RING \
              --location=LOCATION \
              --purpose=encryption \
              --rotation-period=90d \
              --next-rotation-time=$(date -u -v+90d +%Y-%m-%dT%H:%M:%SZ)
            ```
    refs:
      - url: https://cloud.google.com/kms/docs/reference
        title: Cloud KMS Documentation
