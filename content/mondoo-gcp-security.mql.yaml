  - uid: mondoo-gcp-security-alloydb-no-public-ip
    title: Ensure AlloyDB instances do not have public IP addresses
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-gcp-security-alloydb-no-public-ip-gcp
        tags:
          mondoo.com/filter-title: GCP AlloyDB
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-alloydb-no-public-ip-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-alloydb-no-public-ip-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-alloydb-no-public-ip-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that AlloyDB instances do not have public IP addresses assigned, keeping database traffic off the public internet. By default, AlloyDB instances can be configured with public IP addresses, which directly exposes the database endpoint to the entire internet and significantly increases the attack surface.

        **Why this matters**

        - **Reduced attack surface:** Removing public IP addresses eliminates the database from internet-wide scanning and brute-force attacks that routinely target exposed database ports.
        - **Network isolation:** Accessing AlloyDB through Private Service Connect, private IP, or the AlloyDB Auth Proxy keeps all traffic within the Google Cloud network and under VPC controls.
        - **Defense in depth:** Firewall rules and authorized networks alone cannot provide the same assurance as the absence of a public IP, since misconfigurations or overly broad rules can expose the database.
        - **Least exposure principle:** Databases should only be reachable by the application services that need them, not by anyone with an internet connection.

        **Risk mitigation**

        - **Unauthorized access:** Without a public IP, attackers cannot directly reach the database port even if they possess valid credentials, requiring them to first compromise an internal system.
        - **Credential attacks:** Removing public IP exposure eliminates the threat of internet-sourced credential stuffing and brute-force attacks against AlloyDB's authentication layer.
      audit: |
        ### Audit via Console

        1. Go to the **AlloyDB** page in the Google Cloud Console.
        2. Select a cluster, then select each instance within the cluster.
        3. In the instance details, review the **Connectivity** section and check whether **Public IP** is enabled.

        A passing AlloyDB instance shows **Public IP** as disabled or not configured. A failing instance shows **Public IP** as enabled with an assigned address.

        ### Audit via CLI

        1. List AlloyDB clusters to find cluster names and regions:

        ```bash
        gcloud alloydb clusters list --region=- --format="table(name,region)"
        ```

        2. For each cluster, list instances and check for public IP assignments:

        ```bash
        gcloud alloydb instances list \
          --cluster=CLUSTER_ID \
          --region=REGION \
          --format="table(name,instanceType,state,publicIpAddress)"
        ```

        A passing AlloyDB instance returns an empty `PUBLIC_IP_ADDRESS`. A failing instance returns a non-empty public IP address.
      remediation:
        - id: terraform
          desc: |
            To ensure AlloyDB instances do not have public IP addresses in Terraform, ensure `enable_public_ip` is not set to `true` in the instance configuration:

            ```hcl
            resource "google_alloydb_instance" "primary" {
              cluster       = google_alloydb_cluster.cluster.name
              instance_id   = "my-instance"
              instance_type = "PRIMARY"

              network_config {
                enable_public_ip = false
              }
            }
            ```
        - id: console
          desc: |
            To ensure AlloyDB instances do not have public IP addresses using the Google Cloud Console:

            1. Go to the **AlloyDB** page in the Google Cloud Console.
            2. Select the cluster and instance.
            3. Select **Edit**.
            4. Under **Connectivity**, ensure **Enable public IP** is unchecked.
            5. Select **Update Instance**.
        - id: cli
          desc: |
            To ensure AlloyDB instances do not have public IP addresses using the Google Cloud CLI:

            ```bash
            gcloud alloydb instances update INSTANCE_ID \
              --cluster=CLUSTER_ID \
              --region=REGION \
              --assign-inbound-public-ip=ASSIGN_INBOUND_PUBLIC_IP_DISABLED
            ```
    refs:
      - url: https://cloud.google.com/alloydb/docs/connect-overview
        title: AlloyDB connectivity overview
      - url: https://cloud.google.com/alloydb/docs/connect-public-ip
        title: Connect using public IP
  - uid: mondoo-gcp-security-alloydb-no-public-ip-gcp
    filters: asset.platform == 'gcp-alloydb-cluster'
    mql: |
      gcp.project.alloydbService.cluster.instances().all(publicIpAddress == "")
  - uid: mondoo-gcp-security-alloydb-no-public-ip-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_alloydb_instance')
    mql: |
      terraform.resources('google_alloydb_instance').all(
        blocks.where(type == 'network_config') == empty ||
        blocks.where(type == 'network_config').all(
          arguments.enable_public_ip != true
        )
      )
  - uid: mondoo-gcp-security-alloydb-no-public-ip-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_alloydb_instance')
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_alloydb_instance').all(
        change.after['network_config'] == empty ||
        change.after['network_config'].all(_['enable_public_ip'] != true)
      )
  - uid: mondoo-gcp-security-alloydb-no-public-ip-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'google_alloydb_instance')
    mql: |
      terraform.state.resources.where(type == 'google_alloydb_instance').all(
        values['network_config'] == empty ||
        values['network_config'].all(_['enable_public_ip'] != true)
      )
  - uid: mondoo-gcp-security-gke-security-posture-enabled
    title: Ensure GKE clusters have Security Posture enabled
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-tvm-07
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-8
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-de-cm-8
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ra-5
      compliance/nist-sp-800-171: nist-sp-800-171--3-11-2
      compliance/pci-dss-4: pcidss-requirement-6-3-3
      compliance/soc2-2017: soc2-control-cc7-1-5
      compliance/vda-isa-5: vda-isa-5-5-2-5
    variants:
      - uid: mondoo-gcp-security-gke-security-posture-enabled-gcp
        tags:
          mondoo.com/filter-title: GCP GKE Cluster
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-gke-security-posture-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-gke-security-posture-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-gke-security-posture-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that GKE clusters have Security Posture enabled with vulnerability scanning active, so that known CVEs in container workloads are detected automatically. By default, Security Posture may be disabled or set to a mode that does not include vulnerability scanning, leaving container images unchecked for known weaknesses between manual scans.

        **Why this matters**

        - **Continuous vulnerability detection:** Automated vulnerability scanning identifies known CVEs in running container images without requiring manual intervention, closing the gap between deployments and awareness.
        - **Proactive remediation:** Early detection of exploitable vulnerabilities gives security teams time to rebuild and redeploy affected images before attackers can take advantage of them.
        - **Security recommendations:** Security Posture surfaces actionable hardening guidance aligned with GKE best practices, going beyond raw CVE lists to reduce overall cluster risk.
        - **Compliance coverage:** Continuous vulnerability management is a requirement in many security frameworks, and disabling Security Posture creates a gap that manual processes cannot reliably fill.

        **Risk mitigation**

        - **CVE exploitation window:** Automated scanning reduces the time between a vulnerability being published and the team becoming aware of it in their workloads, shrinking the window available to attackers.
        - **Incident response:** Security Posture findings give responders a current view of vulnerabilities at the time of an incident, accelerating triage and containment.
      audit: |
        ### Audit via Console

        1. Go to the **Kubernetes Engine > Clusters** page in the Google Cloud Console.
        2. Select a cluster and navigate to the **Security** tab.
        3. Review the **Security posture** setting and the **Workload vulnerability scanning** setting.

        A passing GKE cluster shows Security posture as **Standard** or **Enterprise** and workload vulnerability scanning as enabled. A failing cluster shows Security posture as **Disabled** or workload vulnerability scanning as disabled.

        ### Audit via CLI

        1. List GKE clusters and their security posture configuration:

        ```bash
        gcloud container clusters list \
          --format="table(name,location,securityPostureConfig.mode,securityPostureConfig.vulnerabilityMode)"
        ```

        A passing GKE cluster returns a `MODE` value other than `DISABLED` and a `VULNERABILITY_MODE` value other than `VULNERABILITY_DISABLED`. A failing cluster returns `DISABLED` for either field.
      remediation:
        - id: terraform
          desc: |
            To ensure GKE clusters have Security Posture enabled in Terraform, enable Security Posture with vulnerability scanning:

            ```hcl
            resource "google_container_cluster" "example" {
              name     = "example-cluster"
              location = "us-central1"

              security_posture_config {
                mode               = "BASIC"
                vulnerability_mode = "VULNERABILITY_BASIC"
              }
            }
            ```
        - id: console
          desc: |
            To ensure GKE clusters have Security Posture enabled using the Google Cloud Console:

            1. Go to the **Kubernetes Engine > Clusters** page in the Google Cloud Console.
            2. Select the cluster you want to configure.
            3. Select **Edit**.
            4. Under **Security**, find **Security posture**.
            5. Set the mode to **Basic** or **Enterprise**.
            6. Enable **Workload vulnerability scanning**.
            7. Select **Save**.
        - id: cli
          desc: |
            To ensure GKE clusters have Security Posture enabled using the Google Cloud CLI, enable Security Posture on an existing cluster:

            ```bash
            gcloud container clusters update CLUSTER_NAME \
              --location=LOCATION \
              --security-posture=standard \
              --workload-vulnerability-scanning=standard
            ```
    refs:
      - url: https://cloud.google.com/kubernetes-engine/docs/concepts/about-security-posture-dashboard
        title: GKE Security Posture overview
      - url: https://cloud.google.com/kubernetes-engine/docs/how-to/protect-workload-configuration
        title: Protect workload configuration
  - uid: mondoo-gcp-security-gke-security-posture-enabled-gcp
    filters: asset.platform == 'gcp-gke-cluster'
    mql: |
      gcp.project.gkeService.cluster.securityPostureConfig.mode != "DISABLED"
      gcp.project.gkeService.cluster.securityPostureConfig.vulnerabilityMode != "VULNERABILITY_DISABLED"
  - uid: mondoo-gcp-security-gke-security-posture-enabled-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_container_cluster')
    mql: |
      terraform.resources('google_container_cluster').all(
        blocks.where(type == 'security_posture_config') != empty &&
        blocks.where(type == 'security_posture_config').all(
          arguments.mode != "DISABLED" &&
          arguments.vulnerability_mode != "VULNERABILITY_DISABLED"
        )
      )
  - uid: mondoo-gcp-security-gke-security-posture-enabled-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_container_cluster')
    mql: |
