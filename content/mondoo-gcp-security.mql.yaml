    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_pubsub_topic_iam_binding' || type == 'google_pubsub_topic_iam_member')
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_pubsub_topic_iam_binding').all(
