  - uid: mondoo-gcp-security-gke-release-channel-configured
    title: Ensure GKE clusters use a release channel for version management
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-tvm-03
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-8
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-12
      compliance/nist-csf-2: nist-csf-2-pr-ps-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-1
      compliance/pci-dss-4: pcidss-requirement-6-3-3
      compliance/soc2-2017: soc2-control-cc7-1-2
      compliance/vda-isa-5: vda-isa-5-5-2-5
    variants:
      - uid: mondoo-gcp-security-gke-release-channel-configured-gcp
        tags:
          mondoo.com/filter-title: GCP GKE Cluster
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-gke-release-channel-configured-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-gke-release-channel-configured-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-gke-release-channel-configured-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that GKE clusters are enrolled in a release channel (Rapid, Regular, or Stable) so that Google manages cluster version upgrades automatically. Clusters not enrolled in a release channel require manual version selection and upgrade; in practice this leads to deferred upgrades and prolonged exposure to known vulnerabilities in Kubernetes components.

        **Why this matters**

        - **Delayed security patches:** Clusters on no release channel depend on operators to notice, test, and apply each new Kubernetes version; security fixes in the Kubernetes control plane and node binaries are routinely deferred.
        - **Upgrade errors:** Manual version management is error-prone, and mistakes during upgrades can leave clusters in degraded states where security controls are partially applied.
        - **Missed tested upgrade paths:** Google validates upgrade paths between versions for each release channel; clusters that upgrade outside channels may skip intermediate versions required for safe migration.
        - **Version staleness visibility:** Release channel enrollment surfaces the cluster's position relative to the latest tested version, making it easy to identify clusters that are falling behind.

        **Risk mitigation**

        - **Enroll all production clusters:** Configure a `release_channel` block with `channel = "REGULAR"` (or `RAPID` for teams that need features sooner) so that upgrades are applied automatically on a validated schedule.
        - **Use maintenance windows:** Set maintenance window and exclusion policies to control when automated upgrades are applied, balancing security timeliness with operational stability.
        - **Review channel suitability:** Match the channel to workload requirements: Stable for maximum predictability, Regular for a balance of new features and stability, and Rapid for earliest access to new Kubernetes versions.
      audit: |
        ### Audit via Console

        1. Sign in to the [Google Cloud Console](https://console.cloud.google.com) and open the target project.
        2. Navigate to **Kubernetes Engine > Clusters**.
        3. Select each cluster and review the **Cluster basics** panel.
        4. Check the **Release channel** field under the node pool or cluster configuration section.

        A passing cluster shows a release channel of **Rapid**, **Regular**, or **Stable**. A failing cluster shows **No channel** or **Unspecified**.

        ### Audit via CLI

        1. List all GKE clusters and their release channels:

        ```bash
        gcloud container clusters list --format="table(name,location,releaseChannel.channel)"
        ```

        A passing cluster returns a `CHANNEL` value of `RAPID`, `REGULAR`, or `STABLE`. A failing cluster returns an empty value or `UNSPECIFIED`.
      remediation:
        - id: terraform
          desc: |
            To ensure GKE clusters use a release channel for version management in Terraform:

            ```hcl
            resource "google_container_cluster" "primary" {
              name     = "my-cluster"
              location = "us-central1"

              release_channel {
                channel = "REGULAR"
              }
            }
            ```
        - id: console
          desc: |
            To ensure GKE clusters use a release channel for version management using the Google Cloud Console:

            1. Go to the **Kubernetes Engine > Clusters** page in the Google Cloud Console.
            2. Select the cluster you want to update.
            3. Select **Cluster basics**.
            4. Under **Release channel**, select **Edit**.
            5. Choose a release channel (Rapid, Regular, or Stable).
            6. Select **Save**.
        - id: cli
          desc: |
            To ensure GKE clusters use a release channel for version management using the Google Cloud CLI:

            ```bash
            gcloud container clusters update CLUSTER_NAME \
              --release-channel=regular \
              --zone ZONE
            ```
    refs:
      - url: https://cloud.google.com/kubernetes-engine/docs/concepts/release-channels
        title: GKE Release channels documentation
  - uid: mondoo-gcp-security-gke-release-channel-configured-gcp
    filters: asset.platform == 'gcp-gke-cluster'
    mql: |
      gcp.project.gkeService.cluster.releaseChannel != ""
      gcp.project.gkeService.cluster.releaseChannel != "unspecified"
