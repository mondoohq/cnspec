    mql: |
      terraform.state.resources.where(type == 'google_compute_snapshot_iam_member').all(
        values['member'] != "allUsers" &&
        values['member'] != "allAuthenticatedUsers"
      )
      terraform.state.resources.where(type == 'google_compute_snapshot_iam_binding').all(
        values['members'].none(_ == "allUsers" || _ == "allAuthenticatedUsers")
      )
  - uid: mondoo-gcp-security-compute-snapshot-iam-no-primitive-roles
    title: Ensure Compute Engine snapshot IAM grants no primitive roles
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-2
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-5
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-3-3
      compliance/vda-isa-5: vda-isa-5-4-2-1
    variants:
      - uid: mondoo-gcp-security-compute-snapshot-iam-no-primitive-roles-gcp
        tags:
          mondoo.com/filter-title: GCP
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-compute-snapshot-iam-no-primitive-roles-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-compute-snapshot-iam-no-primitive-roles-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-compute-snapshot-iam-no-primitive-roles-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that the IAM policy on every Compute Engine snapshot contains no bindings to the primitive roles `roles/owner`, `roles/editor`, or `roles/viewer`. Compute Engine provides purpose-built predefined roles such as `roles/compute.storageAdmin` that scope access precisely to snapshot operations; the primitive roles carry sweeping cross-resource permissions that far exceed what any snapshot workflow requires.

        **Why this matters**

        - **Excessive permissions on a single resource:** Assigning `roles/owner` or `roles/editor` on a snapshot grants the holder rights over many resource types, not just snapshot access, enabling lateral movement and privilege escalation.
        - **IAM modification rights via Owner:** A principal holding `roles/owner` on a snapshot can modify the snapshot's own IAM policy, allowing them to add further bindings including public principals.
        - **Bypasses project-level hardening:** Snapshot IAM is evaluated at the resource level; a primitive-role binding on a single snapshot gives a principal capabilities that project-level IAM tightening cannot revoke.
        - **Audit noise:** Primitive roles make it impossible to distinguish legitimate snapshot access from broader project access in Cloud Audit Logs, complicating incident investigation.

        **Risk mitigation**

        - **Replace primitives with predefined roles:** Assign `roles/compute.storageAdmin` for restore workflows and `roles/compute.viewer` for read-only inspection, rather than Owner, Editor, or Viewer.
        - **Audit and remediate existing bindings:** Retrieve each snapshot's IAM policy, identify primitive-role bindings, and re-grant principals with the narrowest appropriate Compute role.
      audit: |
        ### Audit via Console

        1. Go to **Compute Engine > Snapshots** in the Google Cloud Console.
        2. Select each snapshot.
        3. Open the **Permissions** panel.
        4. Review all IAM bindings and confirm that no binding uses the primitive roles `Owner`, `Editor`, or `Viewer`.

        A passing snapshot shows no bindings to `roles/owner`, `roles/editor`, or `roles/viewer` in its IAM policy. A failing snapshot shows at least one binding using a primitive role.

        ### Audit via CLI

        1. Retrieve the IAM policy for each snapshot and inspect the role assignments:

        ```bash
        gcloud compute snapshots get-iam-policy SNAPSHOT_NAME \
          --format="json(bindings)"
        ```

        A passing snapshot returns an IAM policy where no binding has a `role` value of `roles/owner`, `roles/editor`, or `roles/viewer`. A failing snapshot returns at least one binding with one of those primitive roles.
      remediation:
        - id: terraform
          desc: |
            Manage snapshot IAM via `google_compute_snapshot_iam_member` (or `_binding`), granting only narrow Compute roles — not `roles/owner`, `roles/editor`, or `roles/viewer`:

            ```hcl
            resource "google_compute_snapshot_iam_member" "restorer" {
              project  = var.project_id
              snapshot = google_compute_snapshot.app_disk.name
              role     = "roles/compute.storageAdmin"
              member   = "group:platform-restore@example.com"
            }
            ```
        - id: console
          desc: |
            Replace each primitive-role binding with a fine-grained Compute role:

            1. Open **Compute Engine** → **Snapshots**.
            2. Select the flagged snapshot and open **Permissions**.
            3. For each principal bound to Owner / Editor / Viewer, remove the primitive grant and add the narrow role that matches the principal's actual use (for example `Compute Storage Admin`).
            4. Save. Confirm with the principal that their workflow still works.
        - id: cli
          desc: |
            Remove a primitive role binding from a snapshot and grant the fine-grained equivalent:

            ```bash
            gcloud compute snapshots remove-iam-policy-binding SNAPSHOT_NAME \
              --member=user:alice@example.com \
              --role=roles/editor

            gcloud compute snapshots add-iam-policy-binding SNAPSHOT_NAME \
              --member=user:alice@example.com \
              --role=roles/compute.storageAdmin
