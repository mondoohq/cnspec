      - uid: mondoo-gcp-security-gke-node-auto-repair-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that GKE node pools have automatic repair enabled. Node auto-repair monitors node health and automatically recreates unhealthy nodes, replacing them with fresh instances that have intact security controls and the current node image.

        **Why this matters**

        - **Degraded security controls:** An unhealthy node may have disabled or corrupted security mechanisms such as AppArmor profiles, seccomp filters, or security agents, creating conditions where container isolation is weakened.
        - **Attacker exploitation:** An adversary can deliberately trigger node instability through resource exhaustion to force a node into an unhealthy state and then exploit the degraded security posture for container escape or lateral movement.
        - **Patch integrity:** Auto-repair replaces unhealthy nodes with fresh instances built from the current node image, automatically restoring the latest security patches and hardened configurations.

        **Risk mitigation**

        - **Consistent baseline:** Auto-repair ensures that every node in a pool converges back to the expected, hardened state rather than persisting in a degraded condition.
        - **Reduced response time:** Automated remediation of unhealthy nodes eliminates the window between detection and manual intervention that an attacker could exploit.
      audit: |
        ### Audit via Console

        1. Navigate to **Kubernetes Engine** > **Clusters**.
        2. Select the cluster and click the **Nodes** tab.
        3. For each node pool, click the node pool name to view its details.
        4. Check the **Management** section for the **Auto-repair** setting.

        A passing node pool shows **Auto-repair: Enabled**. A failing node pool shows **Auto-repair: Disabled** or the setting is absent.

        ### Audit via CLI

        1. List all node pools in the cluster and inspect their management configuration:

        ```bash
        gcloud container node-pools list \
          --cluster=<cluster-name> \
          --format="table(name, management.autoRepair)"
        ```

        A passing node pool returns `autoRepair: True`. A failing node pool returns `autoRepair: False` or an empty value.
      remediation:
        - id: console
          desc: |
            To ensure GKE node auto-repair is enabled using the Google Cloud Console:

            1. Navigate to **Kubernetes Engine** > **Clusters**.
            2. Select the cluster.
            3. Click the **Nodes** tab and select the node pool.
            4. Select **Edit**.
            5. Under **Management**, enable **Auto-repair**.
            6. Select **Save**.
        - id: cli
          desc: |
            To ensure GKE node auto-repair is enabled using the gcloud CLI, enable auto-repair on a node pool:

            ```bash
            gcloud container node-pools update <pool-name> \
              --cluster=<cluster-name> \
              --enable-autorepair
            ```
        - id: terraform
          desc: |
            To ensure GKE node auto-repair is enabled in Terraform, enable auto-repair in the node pool management block:

            ```hcl
            resource "google_container_node_pool" "example" {
              name    = "example-pool"
              cluster = google_container_cluster.example.name

              management {
                auto_repair = true
              }
            }
            ```
    refs:
      - url: https://cloud.google.com/kubernetes-engine/docs/how-to/node-auto-repair
        title: Google Cloud Documentation - Node auto-repair
  - uid: mondoo-gcp-security-gke-node-auto-repair-enabled-gcp
    filters: asset.platform == 'gcp-gke-cluster'
    mql: |
      gcp.project.gkeService.cluster.nodePools.all(
        management["autoRepair"] == true
      )
  - uid: mondoo-gcp-security-gke-node-auto-repair-enabled-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_container_node_pool')
    mql: |
      terraform.resources('google_container_node_pool').all(
        blocks.where(type == 'management') != empty &&
