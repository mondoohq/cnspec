  - uid: mondoo-gcp-security-dataproc-cluster-encryption-configured
    title: Ensure Dataproc clusters have disk encryption configured with CMEK
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-gcp-security-dataproc-cluster-encryption-configured-gcp
        tags:
          mondoo.com/filter-title: GCP Dataproc Cluster
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-dataproc-cluster-encryption-configured-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-dataproc-cluster-encryption-configured-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-dataproc-cluster-encryption-configured-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Dataproc clusters are configured with a customer-managed encryption key (CMEK) for persistent disk encryption. By default, Dataproc encrypts node disks with Google-managed keys; CMEK replaces those with keys the organization holds and controls in Cloud KMS.

        **Why this matters**

        - **Data access revocation:** The organization can immediately revoke access to all data stored on cluster disks by disabling or destroying the CMEK key, without waiting for any action from Google.
        - **Regulatory key custody:** Frameworks that require organizations to maintain independent control over encryption keys for data processing environments are satisfied only when customer-managed keys are in use.
        - **Encryption audit trail:** Cloud KMS records every disk encryption and decryption operation, supporting forensic investigation and compliance reporting.
        - **Defense against cloud-side compromise:** Keys held outside Google infrastructure reduce the impact of a hypothetical breach of Google-managed key material.

        **Risk mitigation**

        - **Specify a KMS key at cluster creation:** The CMEK key must be specified when the cluster is created; it cannot be changed on an existing cluster without recreating it.
        - **Apply IAM on the KMS key:** Grant only the Dataproc service account the role needed to use the key for disk encryption, and revoke access for any identity that no longer requires it.
        - **Enable automatic rotation:** Configure annual or more frequent key rotation in Cloud KMS to limit the exposure window for any given key version.
      audit: |
        ### Audit via Console

        1. Sign in to the [Google Cloud Console](https://console.cloud.google.com) and select the project.
        2. Navigate to **Dataproc > Clusters**.
        3. Select a cluster name to open its details page.
        4. Click the **Configuration** tab.
        5. Under **Encryption**, check the **Customer-managed encryption key** field.
        6. Repeat for each cluster.

        A passing cluster shows a Cloud KMS key resource name under **Customer-managed encryption key**. A failing cluster shows **Google-managed key** or no customer-managed encryption key configured.

        ### Audit via CLI

        1. Describe each Dataproc cluster and check the encryption configuration:

        ```bash
        gcloud dataproc clusters describe CLUSTER_NAME \
          --region=REGION \
          --format="value(config.encryptionConfig.gcePdKmsKeyName)"
        ```

        A passing cluster returns a non-empty Cloud KMS key resource name. A failing cluster returns an empty or absent `gcePdKmsKeyName` value.
      remediation:
        - id: terraform
          desc: |
            To ensure Dataproc clusters have disk encryption configured with CMEK in Terraform:

            ```hcl
            resource "google_dataproc_cluster" "example" {
              name   = "example-cluster"
              region = "us-central1"

              cluster_config {
                encryption_config {
                  kms_key_name = google_kms_crypto_key.example.id
                }
              }
            }
            ```
        - id: console
          desc: |
            To ensure Dataproc clusters have disk encryption configured with CMEK using the Google Cloud Console:

            1. Navigate to **Dataproc > Clusters** in the Google Cloud Console.
            2. Select **Create Cluster**.
            3. Under **Manage security**, expand **Encryption**.
            4. Select **Customer-managed key** and choose a Cloud KMS key.
            5. Complete cluster creation.
        - id: cli
          desc: |
            To ensure Dataproc clusters have disk encryption configured with CMEK using the Google Cloud CLI:

            ```bash
            gcloud dataproc clusters create CLUSTER_NAME \
              --region=REGION \
              --gce-pd-kms-key=projects/PROJECT/locations/LOCATION/keyRings/RING/cryptoKeys/KEY
            ```
    refs:
      - url: https://cloud.google.com/dataproc/docs/concepts/configuring-clusters/customer-managed-encryption
        title: Customer-managed encryption keys for Dataproc
  - uid: mondoo-gcp-security-dataproc-cluster-encryption-configured-gcp
    filters: asset.platform == 'gcp-dataproc-cluster'
    mql: |
      gcp.project.dataprocService.cluster.config.encryption['gcePdKmsKeyName'] != empty
  - uid: mondoo-gcp-security-dataproc-cluster-encryption-configured-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_dataproc_cluster')
    mql: |
      terraform.resources('google_dataproc_cluster').all(
        blocks.where(type == 'cluster_config').all(
          blocks.where(type == 'encryption_config') != empty &&
          blocks.where(type == 'encryption_config').all(arguments.kms_key_name != empty)
        )
      )
  - uid: mondoo-gcp-security-dataproc-cluster-encryption-configured-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_dataproc_cluster')
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_dataproc_cluster').all(
