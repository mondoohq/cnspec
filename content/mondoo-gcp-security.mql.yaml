  - uid: mondoo-gcp-security-memorystore-iam-auth-enabled
    title: Ensure Memorystore (Valkey/Redis) instances require IAM authentication
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-14
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-1-2
    variants:
      - uid: mondoo-gcp-security-memorystore-iam-auth-enabled-gcp
        tags:
          mondoo.com/filter-title: GCP Memorystore (Valkey/Redis)
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-memorystore-iam-auth-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-memorystore-iam-auth-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-memorystore-iam-auth-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that every Google Cloud Memorystore instance on the unified Memorystore service is configured with IAM authentication by setting `authorization_mode` to `IAM_AUTH`. When `AUTH_DISABLED` is used, any client that can reach the instance over the network can read and write all keys without proving identity.

        **Why this matters**

        - **Unauthenticated access risk:** Without IAM auth, a compromised workload, a contractor on the VPN, or any process that has gained network access to the instance's address can read or overwrite the entire keyspace with no further authentication.
        - **No per-caller attribution:** When authentication is disabled, Cloud Audit Logs cannot distinguish between legitimate callers and attackers, making detection and forensic investigation impossible.
        - **Firewall insufficiency alone:** A misconfigured firewall rule or an unexpected VPC peering path converts a network-level mistake into total cache compromise when there is no second authentication factor.
        - **Revocation simplicity:** IAM authentication binds access to a Google Cloud identity, so revoking access is an IAM binding removal rather than a shared-secret rotation coordinated across all clients.

        **Risk mitigation**

        - **Set `authorization_mode = IAM_AUTH` at creation:** IAM authentication can only be configured when the Memorystore instance is created; plan the setting before provisioning and enforce it via Terraform or organization policy.
        - **Grant the minimum required role:** Assign only `roles/memorystore.dbConnectionUser` or an equivalent scoped role to service accounts that need cache access, rather than broader project-level roles.
        - **Migrate existing `AUTH_DISABLED` instances:** Create a new Memorystore instance with IAM auth enabled, migrate cached data and client configuration, then delete the legacy instance.
      audit: |
        ### Audit via Console

        1. Open the [Google Cloud Console](https://console.cloud.google.com/) and navigate to **Memorystore > Instances**.
        2. Select each instance.
        3. On the instance details page, locate the **Security** section and review the **Authorization mode** field.

        A passing instance shows **IAM authentication** as the authorization mode. A failing instance shows **Auth disabled**.

        ### Audit via CLI

        1. List all Memorystore instances and their authorization modes:

        ```bash
        gcloud memorystore instances list \
          --location=LOCATION \
          --format="table(name,authorizationMode)"
        ```

        A passing instance returns `IAM_AUTH` in the `AUTHORIZATION_MODE` column. A failing instance returns `AUTH_DISABLED`.
      remediation:
        - id: terraform
          desc: |
            Configure IAM auth on a `google_memorystore_instance`:

            ```hcl
            resource "google_memorystore_instance" "cache" {
              instance_id        = "my-instance"
              location           = "us-central1"
              shard_count        = 3
              authorization_mode = "IAM_AUTH"
            }
            ```
        - id: console
          desc: |
            IAM authentication can only be set at instance creation time on Memorystore. To remediate an existing `AUTH_DISABLED` instance, create a new instance with IAM auth enabled and migrate data:

            1. Go to **Memorystore > Instances** in the Google Cloud Console.
            2. Select **Create Instance**.
            3. In the **Security** section, set **Authorization mode** to **IAM authentication**.
            4. Complete instance creation, migrate data from the legacy instance, and delete the legacy instance.
        - id: cli
          desc: |
            IAM auth must be configured at creation time:

            ```bash
            gcloud memorystore instances create INSTANCE_ID \
              --location=LOCATION \
              --shard-count=3 \
              --authorization-mode=IAM_AUTH
            ```
    refs:
      - url: https://cloud.google.com/memorystore/docs/valkey/about-iam-auth
        title: Memorystore IAM authentication overview
  - uid: mondoo-gcp-security-memorystore-iam-auth-enabled-gcp
    filters: asset.platform == 'gcp'
    mql: |
      gcp.memorystore.instances.all(authorizationMode == "IAM_AUTH")
  - uid: mondoo-gcp-security-memorystore-iam-auth-enabled-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_memorystore_instance')
    mql: |
      terraform.resources('google_memorystore_instance').all(
        arguments.authorization_mode == "IAM_AUTH"
      )
  - uid: mondoo-gcp-security-memorystore-iam-auth-enabled-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_memorystore_instance')
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_memorystore_instance').all(
        change.after['authorization_mode'] == "IAM_AUTH"
      )
  - uid: mondoo-gcp-security-memorystore-iam-auth-enabled-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'google_memorystore_instance')
    mql: |
