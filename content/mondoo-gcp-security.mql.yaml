      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-5
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-9
      compliance/vda-isa-5: vda-isa-5-4-1-3
    variants:
      - uid: mondoo-gcp-security-cloud-functions-no-default-service-account-gcp
        tags:
          mondoo.com/filter-title: GCP Cloud Function
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-cloud-functions-no-default-service-account-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-functions-no-default-service-account-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-functions-no-default-service-account-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Cloud Functions are not configured to use the default Compute Engine or App Engine service account. Default service accounts carry the Editor role and grant overly broad access to most project resources; each function should run under a dedicated service account with only the permissions it requires.

        **Why this matters**

        - **Editor-level over-privilege:** The default Compute Engine service account (`PROJECT_NUMBER-compute@developer.gserviceaccount.com`) has the Editor role, granting the ability to read, write, or delete most project resources.
        - **Privilege escalation path:** A compromised or vulnerable function running under a default service account gives an attacker Editor-level access to the entire project, not just the function's resources.
        - **Large blast radius:** Because multiple services may share the same default account, a single function compromise can impact all of them simultaneously.
        - **Audit opacity:** Actions taken by the default account cannot be attributed to a specific function, obscuring the source of unauthorized operations in audit logs.

        **Risk mitigation**

        - **Create dedicated service accounts:** Provision a separate service account for each function and grant only the IAM roles that function requires to operate.
        - **Assign at deploy time:** Specify the custom service account explicitly during function deployment so the default is never used, even temporarily.
        - **Audit function identities regularly:** Review the service account assigned to each function and revoke unused roles to ensure permissions stay aligned with current requirements.
      audit: |
        ### Audit via Console

        1. Sign in to the [Google Cloud Console](https://console.cloud.google.com) and select the project.
        2. Navigate to **Cloud Functions**.
        3. Select a function name to open its details page.
        4. Under **Runtime, build, connections and security settings**, locate the **Runtime service account** field.
        5. Check whether the service account matches the pattern `PROJECT_NUMBER-compute@developer.gserviceaccount.com` or `PROJECT_ID@appspot.gserviceaccount.com`.
        6. Repeat for each function.

        A passing function shows a custom dedicated service account. A failing function shows the default Compute Engine service account (`PROJECT_NUMBER-compute@developer.gserviceaccount.com`) or the default App Engine service account (`PROJECT_ID@appspot.gserviceaccount.com`).

        ### Audit via CLI

        1. List all functions and their service account email:

        ```bash
        gcloud functions list --format="table(name,serviceConfig.serviceAccountEmail)"
        ```

        A passing function returns a custom service account email that does not match the patterns `*-compute@developer.gserviceaccount.com` or `*@appspot.gserviceaccount.com`. A failing function returns a service account matching one of those default patterns.
      remediation:
        - id: terraform
          desc: |
            To ensure Cloud Functions do not use the default service account in Terraform:

            ```hcl
            resource "google_service_account" "function_sa" {
              account_id   = "function-sa"
              display_name = "Cloud Function Service Account"
            }

            resource "google_cloudfunctions_function" "example" {
              name                  = "example-function"
              runtime               = "python312"
              entry_point           = "main"
              service_account_email = google_service_account.function_sa.email

              source_archive_bucket = google_storage_bucket.source.name
              source_archive_object = google_storage_bucket_object.archive.name
            }
            ```
        - id: console
          desc: |
            To ensure Cloud Functions do not use the default service account using the Google Cloud Console:

            1. Navigate to **Cloud Functions** in the Google Cloud Console.
            2. Select the function to update.
            3. Select **Edit**.
            4. Under **Runtime, build, connections and security settings**, expand **Runtime service account**.
            5. Select a custom service account instead of the default.
            6. Select **Next** and then **Deploy**.
        - id: cli
          desc: |
            To ensure Cloud Functions do not use the default service account using the Google Cloud CLI:

            ```bash
            gcloud functions deploy FUNCTION_NAME \
              --service-account=CUSTOM_SA_EMAIL
            ```
    refs:
      - url: https://cloud.google.com/functions/docs/securing/function-identity
        title: Cloud Functions identity
