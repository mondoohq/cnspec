        )
      )
  - uid: mondoo-gcp-security-compute-route-no-internet-gateway-to-sensitive-subnets
    title: Ensure no custom routes send 0.0.0.0/0 to the default internet gateway
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/pci-dss-4: pcidss-requirement-1-3-2
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-gcp-security-compute-route-no-internet-gateway-to-sensitive-subnets-gcp
        tags:
          mondoo.com/filter-title: GCP VPC Routes
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-compute-route-no-internet-gateway-to-sensitive-subnets-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-compute-route-no-internet-gateway-to-sensitive-subnets-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-compute-route-no-internet-gateway-to-sensitive-subnets-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that custom VPC routes with a destination of `0.0.0.0/0` do not point to the default internet gateway. GCP automatically creates a system-generated default route for each VPC; additional custom routes to the same next hop are typically configuration mistakes or deliberate egress bypasses that attackers plant to exfiltrate data around Cloud NAT logging.

        **Why this matters**

        - **Unlogged egress path:** A custom internet-gateway route in a subnet hosting private workloads creates a direct egress path that bypasses Cloud NAT and VPC flow log aggregation.
        - **Attacker persistence:** Adversaries with IAM route-management permissions can plant a broad default route to exfiltrate data through a channel that monitoring tools do not watch.
        - **Configuration drift:** Extra internet-gateway routes added during incidents or testing are rarely cleaned up, leaving persistent egress holes long after the original reason is forgotten.

        **Risk mitigation**

        - **Enforced egress paths:** Removing custom internet-gateway routes forces all outbound traffic through approved channels such as Cloud NAT with logging enabled.
        - **Reduced lateral exfiltration surface:** Narrowing egress to managed proxies limits what an attacker can reach after gaining a foothold inside the VPC.
        - **Persistent-route prevention:** Regular evaluation catches stale routes before they become long-lived, unmonitored egress holes.
      audit: |
        ### Audit via Console

        1. Sign in to the Google Cloud Console and navigate to **VPC network** > **Routes**.
        2. Filter the route list by **Destination IP range** = `0.0.0.0/0`.
        3. For each route whose **Next hop** column shows **Default internet gateway**, verify whether it is a system-generated default route or a custom route added by an administrator.

        A passing project shows only system-generated `0.0.0.0/0` routes pointing to the default internet gateway. A failing project has one or more custom (non-system) `0.0.0.0/0` routes with next hop set to the default internet gateway.

        ### Audit via CLI

        1. List all custom routes with a destination of `0.0.0.0/0` and check whether any use the default internet gateway as the next hop:

        ```bash
        gcloud compute routes list \
          --filter="destRange=0.0.0.0/0" \
          --format="table(name,destRange,nextHopGateway,nextHopIp)"
        ```

        A passing project returns no routes, or returns only routes where `nextHopGateway` is empty. A failing project returns one or more routes where `nextHopGateway` is set to the default internet gateway URL.
      remediation:
        - id: terraform
          desc: |
            Remove any custom `google_compute_route` whose `next_hop_gateway` is the default internet gateway, and replace internet egress with Cloud NAT:

            ```hcl
            # Replace the offending custom route with one that funnels egress
            # through Cloud NAT (logged + auditable), or remove it entirely if
            # internet egress is not required.
            resource "google_compute_router" "egress" {
              name    = "egress-router"
              region  = "us-central1"
              network = google_compute_network.app.id
            }

            resource "google_compute_router_nat" "egress" {
              name                               = "egress-nat"
              router                             = google_compute_router.egress.name
              region                             = "us-central1"
              nat_ip_allocate_option             = "AUTO_ONLY"
              source_subnetwork_ip_ranges_to_nat = "ALL_SUBNETWORKS_ALL_IP_RANGES"
              log_config {
                enable = true
                filter = "ALL"
              }
            }
            ```
        - id: console
          desc: |
            Remove redundant or attacker-planted internet-gateway routes:

            1. Open **VPC network** → **Routes**.
            2. Filter by **Destination IP range** = `0.0.0.0/0`.
            3. For each non-system route whose **Next hop** is **Default internet gateway**, review whether it is legitimately required. If not, delete it.
            4. Where internet egress is required, route through a **Cloud NAT** gateway with logging enabled instead.
        - id: cli
          desc: |
            Delete a custom default-gateway route:

            ```bash
            gcloud compute routes delete <route-name>
            ```
    refs:
      - url: https://cloud.google.com/vpc/docs/routes
        title: GCP VPC Routes
  - uid: mondoo-gcp-security-compute-route-no-internet-gateway-to-sensitive-subnets-gcp
    filters: asset.platform == 'gcp'
    mql: |
      gcp.project.computeService.routes.where(destRange == "0.0.0.0/0").all(
        nextHopGateway == "" || nextHopGateway == null
      )
  - uid: mondoo-gcp-security-compute-route-no-internet-gateway-to-sensitive-subnets-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_compute_route')
    mql: |
      terraform.resources('google_compute_route').where(arguments['dest_range'] == "0.0.0.0/0").all(
        arguments['next_hop_gateway'] == null || arguments['next_hop_gateway'] == ""
      )
  - uid: mondoo-gcp-security-compute-route-no-internet-gateway-to-sensitive-subnets-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_compute_route')
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_compute_route' && change.after['dest_range'] == "0.0.0.0/0").all(
        change.after['next_hop_gateway'] == null || change.after['next_hop_gateway'] == ""
      )
  - uid: mondoo-gcp-security-compute-route-no-internet-gateway-to-sensitive-subnets-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'google_compute_route')
