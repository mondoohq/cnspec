  - uid: mondoo-gcp-security-gke-dedicated-service-account
    title: Ensure GKE nodes use a dedicated service account
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-2
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-5
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-3-3
      compliance/vda-isa-5: vda-isa-5-4-2-1
    variants:
      - uid: mondoo-gcp-security-gke-dedicated-service-account-gcp
        tags:
          mondoo.com/filter-title: GCP GKE Cluster
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-gke-dedicated-service-account-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-gke-dedicated-service-account-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-gke-dedicated-service-account-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that GKE node pools use a dedicated service account rather than the Compute Engine default service account. The default service account carries the Editor role on the project, giving any workload running on the node broad access to GCP resources far beyond what GKE requires.

        **Why this matters**

        - **Excessive permissions:** The Compute Engine default service account has Editor-level access to most project resources; any pod that reaches the node metadata service inherits these permissions.
        - **Container blast radius:** A compromised container on a node using the default account can access storage buckets, databases, and other project resources without any additional privilege escalation.
        - **Least privilege:** A dedicated service account can be granted only the roles GKE nodes legitimately need, such as writing logs, reporting metrics, and pulling container images.

        **Risk mitigation**

        - **Scope containment:** Assigning a purpose-built service account limits the impact of a compromised container to only the resources explicitly granted to that account.
        - **Workload Identity pairing:** Combine dedicated node accounts with Workload Identity so individual pods authenticate as their own service accounts, further reducing shared credential exposure.
      audit: |
        ### Audit via Console

        1. Navigate to **Kubernetes Engine** > **Clusters**.
        2. Select the cluster and click the **Nodes** tab.
        3. For each node pool, click the node pool name and review the **Security** section.
        4. Check the **Service account** field for each node pool.

        A passing node pool shows a dedicated, non-default service account (not ending in `-compute@developer.gserviceaccount.com`). A failing node pool shows the Compute Engine default service account (in the form `<project-number>-compute@developer.gserviceaccount.com`).

        ### Audit via CLI

        1. List node pools and their service account configuration:

        ```bash
        gcloud container node-pools list \
          --cluster=<cluster-name> \
          --format="table(name, config.serviceAccount)"
        ```

        A passing node pool returns a dedicated service account email. A failing node pool returns `default` or an address matching `<project-number>-compute@developer.gserviceaccount.com`.
      remediation:
        - id: console
          desc: |
            To ensure GKE nodes use a dedicated service account using the Google Cloud Console:

            1. Create a dedicated service account in **IAM & Admin** > **Service Accounts**.
            2. Grant the service account only the roles needed for GKE nodes, such as `roles/logging.logWriter`, `roles/monitoring.metricWriter`, and `roles/artifactregistry.reader`.
            3. When creating a new node pool, specify the dedicated service account under **Security** > **Service account**.

            **Note:** Existing node pools cannot have their service account changed. You must create a new node pool with the dedicated service account, migrate workloads to the new pool, and then delete the old node pool.
        - id: cli
          desc: |
            To ensure GKE nodes use a dedicated service account using the gcloud CLI, create a dedicated service account and use it when creating a node pool (the service account cannot be changed on existing node pools):

            ```bash
            gcloud iam service-accounts create gke-nodes \
              --display-name="GKE Node Pool Service Account"

            gcloud container node-pools create <pool-name> \
              --cluster=<cluster-name> \
              --service-account=gke-nodes@<project>.iam.gserviceaccount.com
            ```
        - id: terraform
          desc: |
            To ensure GKE nodes use a dedicated service account in Terraform, specify a dedicated service account in the node config:

            ```hcl
            resource "google_container_cluster" "example" {
              name     = "example-cluster"
              location = "us-central1"

              node_config {
                service_account = google_service_account.gke_nodes.email
              }
            }
            ```
    refs:
      - url: https://cloud.google.com/kubernetes-engine/docs/how-to/hardening-your-cluster#use_least_privilege_sa
        title: Google Cloud Documentation - Use least privilege service accounts for nodes
  - uid: mondoo-gcp-security-gke-dedicated-service-account-gcp
    filters: asset.platform == 'gcp-gke-cluster'
    mql: |
      gcp.project.gkeService.cluster.nodePools.all(
        config.serviceAccount.email != /^\d+-compute@developer\.gserviceaccount\.com$/
      )
  - uid: mondoo-gcp-security-gke-dedicated-service-account-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_container_cluster')
    mql: |
      terraform.resources('google_container_cluster').all(
        blocks.where(type == 'node_config').any(
          arguments.service_account != empty &&
          arguments.service_account != "default"
        )
      )
  - uid: mondoo-gcp-security-gke-dedicated-service-account-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_container_cluster')
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_container_cluster').all(
        change.after.node_config != empty &&
        change.after.node_config.any(
          _['service_account'] != empty &&
          _['service_account'] != "default"
        )
      )
  - uid: mondoo-gcp-security-gke-dedicated-service-account-terraform-state
