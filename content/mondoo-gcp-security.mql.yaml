  - uid: mondoo-gcp-security-datastream-no-forward-ssh-connectivity
    title: Ensure Datastream connection profiles do not use forward SSH connectivity
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-5-17
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-3
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-5
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-4-1-2
    variants:
      - uid: mondoo-gcp-security-datastream-no-forward-ssh-connectivity-gcp
        tags:
          mondoo.com/filter-title: GCP Datastream
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-datastream-no-forward-ssh-connectivity-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-datastream-no-forward-ssh-connectivity-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-datastream-no-forward-ssh-connectivity-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Datastream connection profiles do not use forward SSH connectivity to reach the source database. Forward SSH tunnels credentials, including SSH private keys or passwords, on the connection profile resource and route replication traffic through an intermediate SSH bastion host.

        **Why this matters**

        - **Credential exposure:** SSH private keys and passwords stored on the connection profile are accessible to any principal with the `datastream.connectionProfiles.get` permission and are difficult to rotate without recreating the profile.
        - **Single point of compromise:** If the SSH bastion is breached, an attacker gains a pivot point into the source database using credentials already stored on the connection profile.
        - **Long-lived bastion drift:** SSH bastions are commonly hand-managed VMs that accumulate configuration drift, outdated packages, and unreviewed access over time.
        - **Transitional technology misuse:** Forward SSH was designed for staged migrations and should not become a permanent connectivity method, yet it often persists indefinitely once initially configured.

        **Risk mitigation**

        - **Private connectivity replacement:** Migrating to `privateConnectivity` with a VPC-peered private connection removes the bastion from the data path and eliminates stored SSH credentials from the connection profile.
        - **Credential centralization:** Using private connectivity alongside Secret Manager for database passwords eliminates all long-lived credentials from the connection profile resource itself.
      audit: |
        ### Audit via Console

        1. Open the [Google Cloud Console](https://console.cloud.google.com/) and navigate to **Datastream > Connection profiles**.
        2. Select each connection profile.
        3. On the profile details page, locate the **Connectivity method** field and confirm it is not set to **Forward-SSH tunnel**.

        A passing connection profile shows a connectivity method other than **Forward-SSH tunnel**. A failing connection profile shows **Forward-SSH tunnel** as the connectivity method.

        ### Audit via CLI

        1. List all connection profiles and check their connectivity type:

        ```bash
        gcloud datastream connection-profiles list \
          --location=LOCATION \
          --format="table(name,connectivityType)"
        ```

        A passing connection profile returns a `CONNECTIVITY_TYPE` value other than `FORWARD_SSH_CONNECTIVITY`. A failing connection profile returns `FORWARD_SSH_CONNECTIVITY`.
      remediation:
        - id: terraform
          desc: |
            Replace `forward_ssh_connectivity` with `private_connectivity` (see the staticServiceIp remediation for an example).
        - id: console
          desc: |
            Recreate the connection profile with **Private connectivity** selected and decommission the SSH bastion.
        - id: cli
          desc: |
            ```bash
            gcloud datastream connection-profiles create PROFILE_ID \
              --location=LOCATION \
              --display-name=DISPLAY_NAME \
              --type=mysql \
              --mysql-hostname=HOST --mysql-username=USER --mysql-password=PWD \
              --private-connection=PRIVATE_CONNECTION_ID
            ```
    refs:
      - url: https://cloud.google.com/datastream/docs/network-connectivity-options
        title: Datastream network connectivity options
