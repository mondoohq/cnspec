  - uid: mondoo-gcp-security-https-lb-ssl-policy-min-tls-1-2
    title: Ensure HTTPS load balancer target proxies attach a strong SSL policy
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    variants:
      - uid: mondoo-gcp-security-https-lb-ssl-policy-min-tls-1-2-gcp
        tags:
          mondoo.com/filter-title: GCP Compute (Target HTTPS Proxy)
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-https-lb-ssl-policy-min-tls-1-2-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-https-lb-ssl-policy-min-tls-1-2-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-https-lb-ssl-policy-min-tls-1-2-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that every HTTPS load balancer target proxy has an SSL policy explicitly attached that enforces a minimum TLS version of 1.2 or higher and uses a profile of `MODERN` or `RESTRICTED`. When a target HTTPS proxy has no SSL policy attached, GCP falls back to a permissive default that permits TLS 1.0, TLS 1.1, and weak cipher suites including 3DES.

        **Why this matters**

        - **GCP's default SSL settings are not safe for production:** The default behavior for an unattached SSL policy permits TLS 1.0 and TLS 1.1, which are deprecated by IETF RFC 8996 and explicitly forbidden by PCI DSS and NIST SP 800-52 Rev 2.
        - **Weak ciphers enable downgrade and padding-oracle attacks:** The `COMPATIBLE` profile retains cipher suites such as 3DES and CBC-only constructions that have known exploitable weaknesses and can be forced through downgrade attacks.
        - **No practical compatibility reason exists for TLS below 1.2:** All modern browsers and clients support TLS 1.2 or higher; allowing older versions provides no real interoperability benefit while expanding the attack surface for automated vulnerability tooling.
        - **An unattached policy is equivalent to choosing the weakest settings:** The SSL policy is the only per-proxy configuration knob that governs cipher and protocol negotiation; an absent policy means the proxy silently inherits GCP's most permissive defaults.

        **Risk mitigation**

        - **Attach an SSL policy to every HTTPS target proxy:** Ensure no `google_compute_target_https_proxy` resource has an empty or absent `ssl_policy` reference; treat an unattached proxy as a deployment defect.
        - **Define SSL policies with TLS 1.2 or higher and a strong profile:** Create `google_compute_ssl_policy` resources with `min_tls_version = "TLS_1_2"` and `profile = "MODERN"` or `RESTRICTED`, and reference them from every target proxy.
        - **Audit for proxies added without a policy:** Include SSL policy attachment in the infrastructure review checklist and CI pipeline checks so new HTTPS proxies cannot reach production without a verified strong SSL policy.
      audit: |
        ### Audit via Console

        1. In the Google Cloud Console, go to **Network services** > **Load balancing**.
        2. Select an HTTPS load balancer from the list.
        3. In the frontend configuration, locate the target HTTPS proxy and review the **SSL policy** field.
        4. Select the attached SSL policy and verify that **Minimum TLS version** is set to **TLS 1.2** or higher, and that the **Profile** is **Modern** or **Restricted**.

        A passing target HTTPS proxy has an SSL policy attached with minimum TLS 1.2 and a profile of Modern or Restricted. A failing target HTTPS proxy has no SSL policy attached, or the attached policy permits TLS 1.0 or TLS 1.1, or uses the Compatible profile.

        ### Audit via CLI

        1. List all target HTTPS proxies and check for an attached SSL policy:

        ```bash
        gcloud compute target-https-proxies list \
          --format="table(name,sslPolicy)"
        ```

        2. For each proxy that has an SSL policy, describe the policy to verify its settings:

        ```bash
        gcloud compute ssl-policies describe POLICY_NAME \
          --format="table(name,minTlsVersion,profile)"
        ```

        A passing target HTTPS proxy has a non-empty `SSL_POLICY` value, and the referenced policy shows `minTlsVersion` of `TLS_1_2` (or `TLS_1_3`) and `profile` of `MODERN` or `RESTRICTED`. A failing target HTTPS proxy has an empty `SSL_POLICY` field, or the policy shows `minTlsVersion` of `TLS_1_0` or `TLS_1_1`, or `profile` of `COMPATIBLE`.
      remediation:
        - id: terraform
          desc: |
            Bind every target HTTPS proxy to a strong SSL policy via `ssl_policy`:

            ```hcl
            resource "google_compute_ssl_policy" "modern" {
              name            = "modern-tls"
              profile         = "MODERN"
              min_tls_version = "TLS_1_2"
            }

            resource "google_compute_target_https_proxy" "https" {
              name             = "my-https-proxy"
              url_map          = google_compute_url_map.default.id
              ssl_certificates = [google_compute_ssl_certificate.cert.id]
              ssl_policy       = google_compute_ssl_policy.modern.id
            }
            ```
        - id: console
          desc: |
            Attach a strong SSL policy to each HTTPS load balancer frontend:

            1. Open **Network services** > **Load balancing** and select the HTTPS load balancer.
            2. Edit the frontend configuration that holds the target HTTPS proxy.
            3. Under **SSL policy**, select or create a policy with profile **Modern** or **Restricted** and minimum TLS version **TLS 1.2**.
            4. Save the frontend and apply changes.
        - id: cli
          desc: |
            Attach an SSL policy to an existing target HTTPS proxy:

            ```bash
            gcloud compute target-https-proxies update PROXY_NAME \
              --ssl-policy=POLICY_NAME
            ```

            Create a strong SSL policy first, if one does not already exist:

            ```bash
            gcloud compute ssl-policies create POLICY_NAME \
              --profile=MODERN \
              --min-tls-version=1.2
            ```
    refs:
      - url: https://cloud.google.com/load-balancing/docs/ssl-policies-concepts
        title: GCP - SSL policies concepts
      - url: https://cloud.google.com/load-balancing/docs/use-ssl-policies
        title: GCP - Using SSL policies
  - uid: mondoo-gcp-security-https-lb-ssl-policy-min-tls-1-2-gcp
    filters: asset.platform == 'gcp'
    mql: |
      gcp.project.computeService.targetHttpsProxies.all(
        sslPolicyUrl != "" &&
        sslPolicy.minTlsVersion == "TLS_1_2" &&
        sslPolicy.profile != "COMPATIBLE" &&
        sslPolicy.profile != "CUSTOM"
      )
  - uid: mondoo-gcp-security-https-lb-ssl-policy-min-tls-1-2-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_compute_target_https_proxy')
    mql: |
      terraform.resources('google_compute_target_https_proxy').all(
        arguments['ssl_policy'] != null && arguments['ssl_policy'] != ""
      )
      terraform.resources('google_compute_ssl_policy').all(
