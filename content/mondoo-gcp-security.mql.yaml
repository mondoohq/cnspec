          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that GCP compute firewall rules do not allow ingress traffic on all protocols and ports from all internet addresses (0.0.0.0/0 or ::/0). A firewall rule that permits `IPProtocol: all` from the open internet effectively disables network-level access control for every service running on matching instances, which is never appropriate for production environments.

        **Why this matters**

        - **Complete network exposure:** Every service running on the matched instance becomes reachable from the internet, including debugging endpoints, internal APIs, caches, and management interfaces that are not designed to accept external traffic.
        - **Elimination of defense-in-depth:** Network-level access control is the outermost layer of defense; a rule permitting all traffic bypasses it entirely, leaving application vulnerabilities as the only barrier against external exploitation.
        - **Broad attack surface for exploitation:** Attackers who discover an all-protocols ingress rule can probe and exploit every network service without restriction, dramatically increasing the likelihood of successful compromise.

        **Risk mitigation**

        - **Apply the principle of least privilege:** Replace all-protocol ingress rules with targeted rules that allow only the specific protocol and port combinations required by each workload, sourced from only the required CIDR ranges.
        - **Delete or disable overly permissive rules immediately:** Remove any firewall rule that combines `IPProtocol: all` with a source range of `0.0.0.0/0` or `::/0`; if traffic is needed, create scoped replacement rules before removing the existing ones.
        - **Enforce through continuous monitoring:** Set up alerts for any firewall rule creation or modification that introduces an all-protocol ingress rule from internet source ranges.
      audit: |
        ### Audit via Console

        1. Sign in to the [Google Cloud Console](https://console.cloud.google.com).
        2. Navigate to **VPC Network** > **Firewall**.
        3. Review each firewall rule with **Direction** set to `Ingress`.
        4. Check whether any rule has **Protocols and ports** set to `Allow all` with a **Source IP range** of `0.0.0.0/0` or `::/0`.

        A passing firewall configuration shows no ingress rules that allow all protocols from `0.0.0.0/0` or `::/0`. A failing configuration shows one or more ingress rules with all-protocol access from any source IP.

        ### Audit via CLI

        1. List ingress firewall rules that allow all protocols from the internet:

        ```bash
        gcloud compute firewall-rules list \
          --filter="direction=INGRESS AND allowed.IPProtocol=all AND sourceRanges:0.0.0.0/0" \
          --format="table(name,direction,allowed,sourceRanges)"
        ```

        A passing configuration returns no results. A failing configuration returns one or more firewall rules with `IPProtocol: all` and source ranges of `0.0.0.0/0` or `::/0`.
      remediation:
        - id: terraform
          desc: |
            To ensure firewall rules do not allow unrestricted ingress on all protocols in Terraform, instead of allowing all protocols, create targeted rules for specific services:

            ```hcl
            resource "google_compute_firewall" "allow_https" {
              name    = "allow-https"
              network = google_compute_network.default.name

              allow {
                protocol = "tcp"
                ports    = ["443"]
              }

              source_ranges = ["0.0.0.0/0"]
            }
            ```

            Remove or modify any rules that use `protocol = "all"` with `source_ranges = ["0.0.0.0/0"]`.
        - id: console
          desc: |
            To ensure firewall rules do not allow unrestricted ingress on all protocols using the Google Cloud Console:

            1. Log in to the GCP Console at https://console.cloud.google.com.
            2. Navigate to **VPC Network** > **Firewall**.
            3. Identify any firewall rules that allow all protocols with a source range of 0.0.0.0/0 or ::/0.
            4. Select the rule and select **Edit**.
            5. Change the **Protocols and ports** setting to specify only the required protocols and ports.
            6. Restrict the **Source IPv4 ranges** to trusted CIDR ranges where possible.
            7. Select **Save**.
        - id: cli
          desc: |
            To ensure firewall rules do not allow unrestricted ingress on all protocols using the Google Cloud CLI, delete an overly permissive firewall rule:

            ```bash
            gcloud compute firewall-rules delete RULE_NAME
            ```

            To create a replacement rule with specific protocols and ports:

            ```bash
            gcloud compute firewall-rules create RULE_NAME \
              --direction=INGRESS \
              --priority=1000 \
              --network=NETWORK_NAME \
              --action=ALLOW \
              --rules=tcp:443 \
              --source-ranges=TRUSTED_CIDR_RANGE
            ```
    refs:
      - url: https://cloud.google.com/vpc/docs/firewalls
        title: VPC Firewall Rules
