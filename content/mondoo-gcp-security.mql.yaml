  - uid: mondoo-gcp-security-cloud-storage-bucket-retention-policy-locked
    title: Ensure that Cloud Storage buckets have a locked retention policy configured
    impact: 50
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-bcr-08
      compliance/dora: dora-art-12
      compliance/hipaa: hipaa-security-ss164-308-a-7-ii-a-contingency-plan-data-backup-plan
      compliance/iso-27001-2022: iso-27001-2022-a-5-33
      compliance/nis-2: nis-2-21-2-c
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-11
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: false
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc6-1-7
      compliance/vda-isa-5: false
    variants:
      - uid: mondoo-gcp-security-cloud-storage-bucket-retention-policy-locked-gcp
        tags:
          mondoo.com/filter-title: GCP Cloud Storage Bucket
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-cloud-storage-bucket-retention-policy-locked-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-storage-bucket-retention-policy-locked-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-storage-bucket-retention-policy-locked-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Cloud Storage buckets are configured with a locked retention policy that specifies a minimum retention period and cannot be shortened or removed. By default, buckets have no retention policy, meaning objects can be deleted or overwritten at any time by anyone with sufficient permissions.

        **Why this matters**

        - **Immutability against insider threats:** A locked retention policy prevents even bucket owners and project administrators from deleting objects before the retention period expires, protecting critical records from insider deletion.
        - **Evidence preservation:** Security logs, audit trails, and compliance records must remain intact through an investigation; a locked policy ensures they cannot be tampered with or destroyed after a breach.
        - **Regulatory compliance:** Frameworks such as SEC Rule 17a-4(f), CFTC Rule 1.31, and FINRA require WORM storage for financial records; a locked retention policy satisfies this requirement on GCP.
        - **Ransomware resilience:** Attackers who compromise cloud credentials cannot delete or overwrite protected objects, preserving backup and recovery data needed to restore operations.

        **Risk mitigation**

        - **Lock the retention policy after setting a period:** Setting a retention period alone is not sufficient; the policy must also be locked to prevent it from being reduced or removed by a compromised account.
        - **Size the retention period to regulatory requirements:** Align the retention duration with the most stringent applicable regulation for the data stored in the bucket, erring on the side of longer retention.
        - **Apply to log sinks and backup buckets first:** Prioritize locking retention policies on buckets that receive audit log exports and backup data, as these are the highest-value targets for deletion after a compromise.
      audit: |
        ### Audit via Console

        1. In the Google Cloud console, go to the **Cloud Storage** > **Buckets** page.
        2. Select the name of the bucket you want to inspect.
        3. Select the **Protection** tab.
        4. Under **Retention policy**, confirm a retention period is configured and the policy status shows **Locked**.

        A passing bucket shows a configured retention period with the status **Locked**. A failing bucket either has no retention policy configured or has a retention policy that is **Unlocked**.

        ### Audit via CLI

        1. Describe a specific bucket and check its retention policy:

        ```bash
        gcloud storage buckets describe gs://BUCKET_NAME \
          --format="get(retentionPolicy)"
        ```

        2. List all buckets and their retention policy details:

        ```bash
        gcloud storage buckets list \
          --format="table(name,retentionPolicy.retentionPeriod,retentionPolicy.isLocked)"
        ```

        A passing bucket returns a `retentionPeriod` greater than zero and `isLocked` set to `True`. A failing bucket returns an empty `retentionPolicy`, a `retentionPeriod` of zero, or `isLocked` set to `False`.
      remediation:
        - id: terraform
          desc: |
            To ensure that Cloud Storage buckets have a locked retention policy configured in Terraform, configure a retention policy on the bucket. Note that locking a retention policy is an irreversible action:

            ```hcl
            resource "google_storage_bucket" "example" {
              name     = "example-bucket"
              location = "US"

              retention_policy {
                is_locked        = true
                retention_period = 86400  # Retention period in seconds (e.g., 1 day = 86400)
              }
            }
            ```
        - id: console
          desc: |
            To ensure that Cloud Storage buckets have a locked retention policy configured using the Google Cloud Console:

            1. In the Google Cloud console, go to the **Cloud Storage Buckets** page.
            2. Select the name of the bucket you want to configure.
            3. Select the **Protection** tab.
            4. Under **Retention policy**, select **Add a retention policy** if none exists.
            5. Enter the desired retention period.
            6. Select **Save**.
            7. To lock the policy, select **Lock** and confirm. Note that this action is irreversible.
        - id: cli
          desc: |
            To ensure that Cloud Storage buckets have a locked retention policy configured using the Google Cloud CLI:

            1. Set a retention policy on the bucket:

            ```bash
            gcloud storage buckets update gs://BUCKET_NAME --retention-period=DURATION
            ```

            2. Lock the retention policy (this is irreversible):

            ```bash
            gcloud storage buckets update gs://BUCKET_NAME --lock-retention-period
            ```
    refs:
      - url: https://cloud.google.com/storage/docs/best-practices#security
        title: Cloud Storage Security Best Practices
  - uid: mondoo-gcp-security-cloud-storage-bucket-retention-policy-locked-gcp
    filters: asset.platform == 'gcp-storage-bucket'
    mql: |
      gcp.storage.bucket.retentionPolicy['retentionPeriod'] > 0
      gcp.storage.bucket.retentionPolicy['isLocked'] == true
  - uid: mondoo-gcp-security-cloud-storage-bucket-retention-policy-locked-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' &&
        terraform.resources.contains(nameLabel == 'google_storage_bucket')
    mql: |
      terraform.resources('google_storage_bucket').all(
        blocks.where(type == 'retention_policy') != empty &&
        blocks.where(type == 'retention_policy').all(arguments.is_locked == true && arguments.retention_period > 0)
      )
  - uid: mondoo-gcp-security-cloud-storage-bucket-retention-policy-locked-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_storage_bucket')
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_storage_bucket').all(
        change.after['retention_policy'] != empty &&
        change.after['retention_policy'].any(_['is_locked'] == true && _['retention_period'] > 0)
      )
  - uid: mondoo-gcp-security-cloud-storage-bucket-retention-policy-locked-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'google_storage_bucket')
    mql: |
      terraform.state.resources.where(type == 'google_storage_bucket').all(
        values['retention_policy'] != empty &&
        values['retention_policy'].any(_['is_locked'] == true && _['retention_period'] > 0)
      )
  - uid: mondoo-gcp-security-bigquery-dataset-not-publicly-accessible
    title: Ensure that BigQuery datasets are not anonymously or publicly accessible
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-2-1
    variants:
      - uid: mondoo-gcp-security-bigquery-dataset-not-publicly-accessible-gcp
        tags:
          mondoo.com/filter-title: GCP BigQuery Dataset
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-bigquery-dataset-not-publicly-accessible-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-bigquery-dataset-not-publicly-accessible-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-bigquery-dataset-not-publicly-accessible-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that BigQuery datasets do not grant access to `allUsers` or `allAuthenticatedUsers` in their dataset access controls. These special group values expose the dataset to the public internet or to any Google account holder respectively, making sensitive analytics data available without meaningful access controls.

        **Why this matters**

        - **Bulk data exfiltration without credentials:** Any user on the internet can enumerate tables and export entire datasets when `allUsers` access is granted, requiring no authentication or GCP account.
        - **PII and regulated data exposure:** BigQuery datasets frequently contain business intelligence, customer records, and financial data; public access places this information in direct reach of anyone who discovers the dataset.
        - **Non-attributable queries:** Queries by `allUsers` or `allAuthenticatedUsers` cannot be tied to a specific individual, preventing meaningful investigation of suspicious access patterns.
        - **Compliance violations:** Data protection regulations require that access to sensitive data be restricted to identified, authorized users on a need-to-know basis, which blanket public access directly contradicts.

        **Risk mitigation**

        - **Remove public access entries immediately:** Audit the `access` array of all datasets and delete any entries with `specialGroup: allAuthenticatedUsers` or `iamMember: allUsers`, replacing them with specific user, group, or service account grants.
        - **Enforce organization policies:** Apply `constraints/iam.allowedPolicyMemberDomains` to restrict IAM bindings to known domain identities, blocking public members at the policy evaluation level.
        - **Enable dataset-level audit logging:** Ensure Data Access audit logs are enabled for BigQuery so all read and query operations are captured and attributable to specific identities.
      audit: |
        ### Audit via Console

        1. In the Google Cloud console, go to the **BigQuery** page.
        2. In the Explorer panel, expand your project and select a dataset.
        3. Select **Sharing** and then **Permissions**.
        4. Review the list of principals and confirm no entries for `allUsers` or `allAuthenticatedUsers` are present.

        A passing dataset shows no `allUsers` or `allAuthenticatedUsers` entries in its permissions. A failing dataset lists `allUsers` or `allAuthenticatedUsers` as principals with any role.

        ### Audit via CLI

        1. Show the access configuration of a specific dataset:

        ```bash
        bq show --format=prettyjson PROJECT_ID:DATASET_ID
        ```

        2. Review the `access` array in the output for entries containing `"specialGroup": "allAuthenticatedUsers"` or `"iamMember": "allUsers"`.

        A passing dataset returns an `access` array with no `allUsers` or `allAuthenticatedUsers` entries. A failing dataset returns one or more access entries with `"specialGroup": "allAuthenticatedUsers"` or `"iamMember": "allUsers"`.
      remediation:
        - id: terraform
          desc: |
            To ensure that BigQuery datasets are not anonymously or publicly accessible in Terraform, ensure the `access` block in your BigQuery dataset does not include `allUsers` or `allAuthenticatedUsers`:

            ```hcl
            resource "google_bigquery_dataset" "example" {
              dataset_id = "example_dataset"
              location   = "US"

              access {
                role          = "OWNER"
                user_by_email = google_service_account.bqowner.email
              }

              access {
                role   = "READER"
                domain = "example.com"
              }
            }
            ```

            Also ensure that IAM bindings do not include public members:

            ```hcl
            resource "google_bigquery_dataset_iam_binding" "reader" {
              dataset_id = google_bigquery_dataset.example.dataset_id
              role       = "roles/bigquery.dataViewer"
              members = [
                "user:analyst@example.com",
              ]
            }
            ```
        - id: console
          desc: |
            To ensure that BigQuery datasets are not anonymously or publicly accessible using the Google Cloud Console:

            1. In the Google Cloud console, go to the **BigQuery** page.
            2. Select the dataset you want to configure.
            3. Select **Sharing** and then **Permissions**.
            4. Review the list of principals and remove any entries for `allUsers` or `allAuthenticatedUsers`.
            5. Select **Done**.
        - id: cli
          desc: |
            To ensure that BigQuery datasets are not anonymously or publicly accessible using the Google Cloud CLI:

            1. Retrieve the current dataset access configuration:

            ```bash
            bq show --format=prettyjson PROJECT_ID:DATASET_ID
            ```

            2. Review the `access` array in the output and identify entries with `"specialGroup": "allAuthenticatedUsers"` or `"iamMember": "allUsers"`.

            3. Remove the public access entries and update the dataset:

            ```bash
            bq update --source=dataset.json PROJECT_ID:DATASET_ID
            ```
    refs:
      - url: https://cloud.google.com/bigquery/docs/best-practices-security
        title: BigQuery Security Best Practices
  - uid: mondoo-gcp-security-bigquery-dataset-not-publicly-accessible-gcp
    filters: asset.platform == "gcp-bigquery-dataset"
    mql: |
      gcp.bigquery.dataset.access.none(entity == "allAuthenticatedUsers")
      gcp.bigquery.dataset.access.none(entity == "allUsers")
  - uid: mondoo-gcp-security-bigquery-dataset-not-publicly-accessible-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' &&
        terraform.resources.contains(nameLabel == 'google_bigquery_dataset')
    mql: |
      terraform.resources('google_bigquery_dataset').all(
        blocks.where(type == 'access').none(arguments.special_group == 'allAuthenticatedUsers') &&
        blocks.where(type == 'access').none(arguments.special_group == 'allUsers') &&
        blocks.where(type == 'access').none(arguments.iam_member == 'allAuthenticatedUsers') &&
        blocks.where(type == 'access').none(arguments.iam_member == 'allUsers')
      )
      if (terraform.resources.where(nameLabel == 'google_bigquery_dataset_iam_binding') != empty) {
        terraform.resources('google_bigquery_dataset_iam_binding').all(
          arguments.members.none(member: member == 'allUsers' || member == 'allAuthenticatedUsers')
        )
      }
      if (terraform.resources.where(nameLabel == 'google_bigquery_dataset_iam_member') != empty) {
        terraform.resources('google_bigquery_dataset_iam_member').all(
          arguments.member != 'allUsers' && arguments.member != 'allAuthenticatedUsers'
        )
      }
  - uid: mondoo-gcp-security-bigquery-dataset-not-publicly-accessible-terraform-plan
    filters: |
      asset.platform == 'terraform-plan'
      terraform.plan.resourceChanges.contains(type == 'google_bigquery_dataset')
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_bigquery_dataset').all(
        change.after['access'] == empty ||
        change.after['access'].none(
          _['special_group'] == 'allAuthenticatedUsers' ||
          _['special_group'] == 'allUsers' ||
          _['iam_member'] == 'allAuthenticatedUsers' ||
          _['iam_member'] == 'allUsers'
        )
      )
  - uid: mondoo-gcp-security-bigquery-dataset-not-publicly-accessible-terraform-state
    filters: |
      asset.platform == 'terraform-state'
      terraform.state.resources.contains(type == 'google_bigquery_dataset')
    mql: |
      terraform.state.resources.where(type == 'google_bigquery_dataset').all(
        values['access'] == empty ||
        values['access'].none(
          _['special_group'] == 'allAuthenticatedUsers' ||
          _['special_group'] == 'allUsers' ||
          _['iam_member'] == 'allAuthenticatedUsers' ||
          _['iam_member'] == 'allUsers'
        )
      )
  - uid: mondoo-gcp-security-bigquery-dataset-cmek-encryption
    title: Ensure a default CMEK is specified for all BigQuery datasets
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-gcp-security-bigquery-dataset-cmek-encryption-gcp
        tags:
          mondoo.com/filter-title: GCP BigQuery Dataset
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-bigquery-dataset-cmek-encryption-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-bigquery-dataset-cmek-encryption-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-bigquery-dataset-cmek-encryption-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that BigQuery datasets are configured with a default customer-managed encryption key (CMEK) so that all tables created within the dataset inherit encryption under a key the organization controls. By default, BigQuery encrypts all data at rest using Google-managed keys, which provide no organizational control over key rotation, access revocation, or cryptographic separation of duties.

        **Why this matters**

        - **Organizational control over key lifecycle:** CMEK gives the organization authority over when keys are created, rotated, disabled, and destroyed, independent of Google's internal key management practices.
        - **Hard revocation of data access:** Disabling the Cloud KMS key associated with a dataset immediately prevents any further decryption of the dataset's contents, providing a definitive access termination mechanism.
        - **Compliance with key management mandates:** Frameworks such as PCI DSS, HIPAA, and FedRAMP require organizations to maintain control over the encryption keys protecting regulated data.
        - **Visibility into data access at the cryptographic layer:** KMS audit logs record every encrypt and decrypt call, providing evidence of when dataset contents were accessed beyond what BigQuery data access logs alone capture.

        **Risk mitigation**

        - **Set a default KMS key on every dataset:** Configuring `defaultEncryptionConfiguration.kmsKeyName` at the dataset level ensures all subsequently created tables automatically inherit CMEK without requiring per-table configuration.
        - **Grant BigQuery the required KMS role:** The BigQuery service account must hold `roles/cloudkms.cryptoKeyEncrypterDecrypter` on the key, or write operations and table creation will fail.
        - **Rotate keys on a defined schedule:** Establish a key rotation policy in Cloud KMS aligned with organizational or regulatory requirements, and test that rotation does not disrupt active queries.
      audit: |
        ### Audit via Console

        1. In the Google Cloud console, go to the **BigQuery** page.
        2. In the Explorer panel, expand your project and select a dataset.
        3. Select **Edit Details** and expand the **Advanced options** section.
        4. Under **Encryption**, confirm the value shows **Customer-managed encryption key (CMEK)** with a Cloud KMS key name.

        A passing dataset shows a Customer-managed encryption key configured. A failing dataset shows **Google-managed encryption key** with no CMEK configured.

        ### Audit via CLI

        1. Show the details of a specific dataset and check the default encryption configuration:

        ```bash
        bq show --format=prettyjson PROJECT_ID:DATASET_ID
        ```

        2. Review the `defaultEncryptionConfiguration` field in the output. A configured CMEK shows a `kmsKeyName` value.

        A passing dataset returns a `defaultEncryptionConfiguration` object with a non-empty `kmsKeyName` field. A failing dataset returns no `defaultEncryptionConfiguration` field or a `kmsKeyName` with an empty value.
      remediation:
        - id: terraform
          desc: |
            To ensure a default CMEK is specified for all BigQuery datasets in Terraform, configure a Cloud KMS key as the default encryption key for the BigQuery dataset:

            ```hcl
            resource "google_kms_key_ring" "example" {
              name     = "example-keyring"
              location = "us"
            }

            resource "google_kms_crypto_key" "example" {
              name     = "example-key"
              key_ring = google_kms_key_ring.example.id
            }

            resource "google_bigquery_dataset" "example" {
              dataset_id = "example_dataset"
              location   = "US"

              default_encryption_configuration {
                kms_key_name = google_kms_crypto_key.example.id
              }
            }
            ```
        - id: console
          desc: |
            To ensure a default CMEK is specified for all BigQuery datasets using the Google Cloud Console:

            1. In the Google Cloud console, go to the **BigQuery** page.
            2. Select the dataset you want to configure.
            3. Select **Edit Details**.
            4. Under **Advanced options**, expand **Encryption**.
            5. Select **Customer-managed encryption key (CMEK)**.
            6. Select or enter the Cloud KMS key to use.
            7. Select **Save**.
        - id: cli
          desc: |
            To ensure a default CMEK is specified for all BigQuery datasets using the Google Cloud CLI:

            ```bash
            bq update --default_kms_key=projects/PROJECT_ID/locations/LOCATION/keyRings/KEY_RING/cryptoKeys/KEY PROJECT_ID:DATASET_ID
            ```
    refs:
      - url: https://cloud.google.com/bigquery/docs/best-practices-security
        title: BigQuery Security Best Practices
  - uid: mondoo-gcp-security-bigquery-dataset-cmek-encryption-gcp
    filters: asset.platform == "gcp-bigquery-dataset"
    mql: gcp.bigquery.dataset.kmsKey != null
  - uid: mondoo-gcp-security-bigquery-dataset-cmek-encryption-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' &&
        terraform.resources.contains(nameLabel == 'google_bigquery_dataset')
    mql: |
      terraform.resources('google_bigquery_dataset').all(
        blocks.where(type == 'default_encryption_configuration') != empty &&
