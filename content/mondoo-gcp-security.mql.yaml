          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-firewall-no-ingress-database-ports-from-internet-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-firewall-no-ingress-database-ports-from-internet-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-firewall-no-ingress-database-ports-from-internet-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that GCP compute firewall rules do not allow unrestricted ingress to common database ports from all internet addresses (0.0.0.0/0 or ::/0). The ports checked are TCP 3306 (MySQL), 5432 (PostgreSQL), 1433 (SQL Server), and 27017 (MongoDB). Database services are designed for internal access by application servers and administrators, not for direct exposure to the internet.

        **Why this matters**

        - **High-value data exposure:** Databases store credentials, personal information, financial records, and other sensitive data; direct internet access eliminates every network-layer barrier between attackers and that data.
        - **Automated exploitation:** Attackers continuously scan for open database ports; tools specifically target default credentials, authentication bypass vulnerabilities, and known CVEs in database engines, often within minutes of a port becoming reachable.
        - **Ransomware and data destruction:** Internet-exposed databases are frequent targets for ransomware operators who encrypt or delete database contents and demand payment; the attack chain from discovery to encryption can complete in under an hour.

        **Risk mitigation**

        - **Restrict source ranges to internal CIDR blocks:** Limit database firewall rules to allow access only from application server subnets or VPC-internal CIDR ranges, removing all internet source ranges.
        - **Use Cloud SQL Auth Proxy or Private Service Connect:** For Cloud SQL instances, replace direct network connectivity with the Cloud SQL Auth Proxy or Private Service Connect, which authenticate at the identity layer and never expose database ports directly.
        - **Place databases in private subnets:** Ensure database instances do not have public IP addresses, and use VPN or IAP tunnels for any administrative access that requires connectivity from outside the VPC.
      audit: |
        ### Audit via Console

        1. Sign in to the [Google Cloud Console](https://console.cloud.google.com).
        2. Navigate to **VPC Network** > **Firewall**.
        3. Review each firewall rule with **Direction** set to `Ingress`.
        4. Check whether any rule allows TCP ports 3306 (MySQL), 5432 (PostgreSQL), 1433 (SQL Server), or 27017 (MongoDB) with a **Source IP range** of `0.0.0.0/0` or `::/0`.

        A passing firewall configuration shows no ingress rules exposing database ports to `0.0.0.0/0` or `::/0`. A failing configuration shows one or more ingress rules allowing internet access to one or more of those database ports.

        ### Audit via CLI

        1. Check for each database port individually. For MySQL (port 3306):

        ```bash
        gcloud compute firewall-rules list \
          --filter="direction=INGRESS AND allowed.ports:3306 AND sourceRanges:0.0.0.0/0" \
          --format="table(name,direction,allowed,sourceRanges)"
        ```

        Repeat with `allowed.ports:5432`, `allowed.ports:1433`, and `allowed.ports:27017` to check the other database ports.

        A passing configuration returns no results for any database port check. A failing configuration returns one or more firewall rules with `0.0.0.0/0` or `::/0` source ranges allowing access to a database port.
      remediation:
        - id: terraform
          desc: |
            To ensure firewall rules block internet ingress to database ports in Terraform, restrict database access to internal networks only:

            ```hcl
            resource "google_compute_firewall" "allow_mysql" {
              name    = "allow-mysql-internal"
              network = google_compute_network.default.name

              allow {
                protocol = "tcp"
                ports    = ["3306"]
              }

              # Only allow from internal application servers
              source_ranges = ["10.0.0.0/8"]
            }
            ```

            For Cloud SQL instances, prefer using Cloud SQL Auth Proxy or private IP connectivity instead of firewall rules.
        - id: console
          desc: |
            To ensure firewall rules block internet ingress to database ports using the Google Cloud Console:

            1. Log in to the GCP Console at https://console.cloud.google.com.
            2. Navigate to **VPC Network** > **Firewall**.
            3. Identify any firewall rules that allow TCP ports 3306, 5432, 1433, or 27017 with a source range of 0.0.0.0/0 or ::/0.
            4. Select the rule and select **Edit**.
            5. Under **Source IPv4 ranges**, replace 0.0.0.0/0 with your internal network CIDR ranges such as 10.0.0.0/8.
            6. Select **Save**.
        - id: cli
          desc: |
            To ensure firewall rules block internet ingress to database ports using the Google Cloud CLI, update a firewall rule to restrict database port access:

            ```bash
            gcloud compute firewall-rules update RULE_NAME \
              --source-ranges=INTERNAL_CIDR_RANGE
            ```

            For example, to restrict MySQL access to an internal network:

            ```bash
            gcloud compute firewall-rules update allow-mysql \
              --source-ranges=10.0.0.0/8
            ```
    refs:
      - url: https://cloud.google.com/vpc/docs/firewalls
        title: VPC Firewall Rules
