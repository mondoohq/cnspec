        This check ensures that Pub/Sub subscriptions do not have IAM bindings that grant access to `allUsers` or `allAuthenticatedUsers`. These principals represent unauthenticated internet access and any Google-authenticated user access respectively, which can expose subscription message streams to unauthorized parties.

        **Why this matters**

