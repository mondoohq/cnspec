  - uid: mondoo-gcp-security-cloud-run-vpc-access-configured
    title: Ensure Cloud Run services have VPC access configured
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-1-5
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-gcp-security-cloud-run-vpc-access-configured-gcp
        tags:
          mondoo.com/filter-title: GCP Cloud Run Service
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-cloud-run-vpc-access-configured-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-run-vpc-access-configured-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-run-vpc-access-configured-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Cloud Run services are configured with VPC access, enabling them to communicate with resources in a VPC network over private IP addresses rather than through the public internet. By default, Cloud Run services route all egress traffic over the internet even when the destination is a resource inside the project VPC.

        **Why this matters**

        - **Private connectivity:** VPC access keeps traffic to databases, caches, and internal APIs on Google's private network fabric, removing the public internet from the data path.
        - **Interception prevention:** Traffic that never traverses the internet cannot be intercepted by an adversary performing man-in-the-middle attacks on external network paths.
        - **Network-level access controls:** Once connected to a VPC, firewall rules and VPC Service Controls can restrict which internal resources the service may reach, providing defense-in-depth beyond IAM alone.
        - **Compliance support:** Many data protection standards require that internal service-to-service communication occur over private or encrypted channels isolated from the public internet.

        **Risk mitigation**

        - **Configure Direct VPC egress or a Serverless VPC Access connector:** Enable one of the two VPC access mechanisms for any service that communicates with VPC-hosted resources.
        - **Restrict egress destinations:** Apply firewall egress rules to limit outbound traffic from VPC-connected Cloud Run services to only the destinations required.
        - **Combine with ingress restrictions:** Pair VPC access with restricted ingress settings so both inbound and outbound traffic flows remain private.
      audit: |
        ### Audit via Console

        1. Sign in to the [Google Cloud Console](https://console.cloud.google.com) and select the project.
        2. Navigate to **Cloud Run**.
        3. Select a service name to open its details page.
        4. Click the **Networking** tab.
        5. Under **VPC**, check whether a VPC connector or Direct VPC egress is configured.
        6. Repeat for each service.

        A passing service shows a configured VPC connector or Direct VPC egress setting. A failing service shows no VPC network access configured.

        ### Audit via CLI

        1. Describe each Cloud Run service and check for VPC access configuration in the revision template:

        ```bash
        gcloud run services describe SERVICE_NAME \
          --region=REGION \
          --format="value(spec.template.metadata.annotations.'run.googleapis.com/vpc-access-connector')"
        ```

        A passing service returns a non-empty VPC connector resource name or shows Direct VPC egress configuration. A failing service returns an empty or absent VPC access value.
      remediation:
        - id: terraform
          desc: |
            To ensure Cloud Run services have VPC access configured in Terraform:

            ```hcl
            resource "google_cloud_run_v2_service" "example" {
              name     = "example-service"
              location = "us-central1"

              template {
                vpc_access {
                  connector = google_vpc_access_connector.connector.id
                  egress    = "ALL_TRAFFIC"
                }

                containers {
                  image = "us-docker.pkg.dev/cloudrun/container/hello"
                }
              }
            }
            ```
        - id: console
          desc: |
            To ensure Cloud Run services have VPC access configured using the Google Cloud Console:

            1. Navigate to **Cloud Run** in the Google Cloud Console.
            2. Select the service to update.
            3. Select **Edit & Deploy New Revision**.
            4. Under **Networking**, configure **VPC** access with a connector or Direct VPC egress.
            5. Select **Deploy**.
        - id: cli
          desc: |
            To ensure Cloud Run services have VPC access configured using the Google Cloud CLI:

            ```bash
            gcloud run services update SERVICE_NAME \
              --vpc-connector=projects/PROJECT/locations/REGION/connectors/CONNECTOR_NAME \
              --vpc-egress=all-traffic \
              --region=REGION
            ```
    refs:
      - url: https://cloud.google.com/run/docs/configuring/vpc-connectors
        title: Connecting to a VPC network from Cloud Run
