  - uid: mondoo-gcp-security-cloud-sql-postgres-connections-require-ssl-tls
    title: Ensure Cloud SQL PostgreSQL connections require SSL/TLS
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    variants:
      - uid: mondoo-gcp-security-cloud-sql-postgres-connections-require-ssl-tls-gcp
        tags:
          mondoo.com/filter-title: GCP Cloud SQL for PostgreSQL
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-cloud-sql-postgres-connections-require-ssl-tls-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-sql-postgres-connections-require-ssl-tls-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-sql-postgres-connections-require-ssl-tls-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Cloud SQL PostgreSQL instances are configured to require SSL/TLS for all incoming connections. By default, Cloud SQL accepts both encrypted and unencrypted connections; requiring SSL/TLS forces all clients to use encrypted channels so data in transit cannot be intercepted.

        **Why this matters**

        - **Data confidentiality in transit:** Unencrypted database connections expose query results, credentials, and application data to anyone on the network path between the client and the server.
        - **Protection against eavesdropping:** Network-level attackers or cloud infrastructure with access to packet traffic can silently capture plaintext database traffic if encryption is not enforced.
        - **Integrity assurance:** TLS prevents in-flight modification of database commands or results, protecting against injection attacks that exploit unencrypted channels.
        - **Credential protection:** Authentication credentials sent over unencrypted connections can be captured and replayed by attackers without triggering any server-side alert.

        **Risk mitigation**

        - **Enforce encrypted-only mode:** Set `sslMode` to `ENCRYPTED_ONLY` on the instance, which causes the server to reject any non-TLS connection attempt at the transport layer.
        - **Client configuration alignment:** Update application connection strings and service accounts to supply valid client certificates or at minimum connect over TLS so no unencrypted path exists.
      audit: |
        **Using Google Cloud Console**

        1.  Navigate to the Cloud SQL Instances page: https://console.cloud.google.com/sql/instances
        2.  Select the name of the PostgreSQL instance you want to audit.
        3.  Select the **Connections** tab.
        4.  Go to the **Security** sub-tab.
        5.  Verify that the checkbox for **Allow only SSL connections** is checked.

        **Using Google Cloud CLI**

        1.  Retrieve the configuration details for the instance:
            ```bash
            gcloud sql instances describe INSTANCE_NAME
            ```
        2.  Inspect the output and locate the `settings.ipConfiguration` section.
        3.  Ensure the value for `sslMode` is set to `ENCRYPTED_ONLY`.

            Example relevant output snippet:
            ```yaml
            settings:
              ipConfiguration:
                sslMode: ENCRYPTED_ONLY
            ```
      remediation:
        - id: console
          desc: |
            To ensure Cloud SQL PostgreSQL connections require SSL/TLS using the Google Cloud Console:

            1.  Access the Cloud SQL Instances overview page: https://console.cloud.google.com/sql/instances
            2.  Select the name of the target PostgreSQL instance.
            3.  Navigate to the **Connections** tab, then the **Security** sub-tab.
            4.  Check the box labeled **Allow only SSL connections**.
            5.  Select **Save** to apply the change. *Note: This may trigger an instance restart.*

            **Prevention:**

            Always configure new Cloud SQL PostgreSQL instances with the "Allow only SSL connections" option enabled during creation via the Console. Regularly audit instances to ensure compliance.
        - id: cli
          desc: |
            To ensure Cloud SQL PostgreSQL connections require SSL/TLS using the Google Cloud CLI:

            1.  Enable the SSL Mode to be "ENCRYPTED_ONLY":
                ```bash
                gcloud sql instances patch INSTANCE_NAME --ssl-mode=ENCRYPTED_ONLY
                ```
                *Note: This command may cause the instance to restart.*

            **Prevention:**

            Always configure new Cloud SQL PostgreSQL instances with the `--ssl-mode=ENCRYPTED_ONLY` flag during creation via the CLI. Regularly audit instances to ensure compliance.
        - id: terraform
          desc: |
            To ensure Cloud SQL PostgreSQL connections require SSL/TLS in Terraform, ensure the `ssl_mode` attribute within the `ip_configuration` block is set to `ENCRYPTED_ONLY`:

            ```hcl
            resource "google_sql_database_instance" "default" {
              name             = "my-postgres-instance"
              database_version = "POSTGRES_15"
              region           = "us-central1"

              settings {
                tier = "db-f1-micro"
                ip_configuration {
                  ipv4_enabled = true
                  ssl_mode     = "ENCRYPTED_ONLY"
                }
              }
            }
            ```

            **Prevention:**

            Always configure new Cloud SQL PostgreSQL instances with `ssl_mode = "ENCRYPTED_ONLY"` during creation via Terraform. Regularly audit instances to ensure compliance.
    refs:
      - url: https://cloud.google.com/sql/docs/mysql/best-practices
        title: Cloud SQL Best Practices
