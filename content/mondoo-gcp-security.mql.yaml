  - uid: mondoo-gcp-security-ssl-certificate-not-expired
    title: Ensure SSL certificates are not expired or expiring within 30 days
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-17
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-4-1-1
    variants:
      - uid: mondoo-gcp-security-ssl-certificate-not-expired-gcp
        tags:
          mondoo.com/filter-title: GCP SSL Certificate
          mondoo.com/filter-icon: gcp
    docs:
      desc: |
        This check ensures that self-managed SSL certificates registered with Google Cloud are not already expired and are not within 30 days of expiration. Google-managed certificates renew automatically; self-managed certificates require manual renewal, making them prone to expiration if lifecycle monitoring is not in place.

        **Why this matters**

        - **Encryption gap:** An expired certificate breaks TLS for all clients that enforce strict certificate validation, potentially causing service outages or driving clients to connect without encryption.
        - **MITM opportunity:** Clients and systems trained to accept certificate warnings during an expiration incident become vulnerable to accepting fraudulent certificates presented by a man-in-the-middle attacker.
        - **Automated downgrade risk:** Some automation and SDK clients silently disable certificate verification or fall back to HTTP when TLS validation fails, exposing data in transit.
        - **Lifecycle management signal:** Certificate expiration indicates a gap in certificate lifecycle tooling; the same gap that missed renewal may also miss revocation or compromise response.

        **Risk mitigation**

        - **Automate renewal alerts:** Configure certificate expiration monitoring with alerts at 60, 30, and 14 days before expiration to ensure renewal is completed well before the deadline.
        - **Prefer Google-managed certificates:** Where possible, migrate from self-managed certificates to Google-managed SSL certificates, which renew automatically and eliminate the manual renewal risk.
        - **Rotate before expiration:** When renewing a self-managed certificate, create the new certificate resource and update the target HTTPS proxy before the old certificate expires to avoid any service interruption.
      audit: |
        ### Audit via Console

        1. Go to the **Certificate Manager** page or navigate to **Network Services > Load Balancing > SSL Certificates** in the Google Cloud Console.
        2. For each self-managed certificate, review the **Expires** column.
        3. Identify any certificates that are already expired or whose expiration date is within 30 days.

        A passing certificate shows an expiration date more than 30 days in the future. A failing certificate shows an expiration date that has passed or is within 30 days.

        ### Audit via CLI

        1. List all SSL certificates and their expiration times:

        ```bash
        gcloud compute ssl-certificates list --format="table(name,type,expireTime,managed.status)"
        ```

        A passing self-managed certificate returns an `EXPIRE_TIME` more than 30 days from today. A failing certificate returns an `EXPIRE_TIME` that is past or within 30 days of today.
      remediation:
        - id: terraform
          desc: |
            To ensure SSL certificates are not expired or expiring within 30 days in Terraform, use Google-managed SSL certificates for automatic renewal, or manage self-managed certificates with Terraform:

            ```hcl
            # Option 1: Google-managed certificate (recommended - auto-renews)
            resource "google_compute_managed_ssl_certificate" "example" {
              name = "example-managed-cert"

              managed {
                domains = ["example.com"]
              }
            }

            # Option 2: Self-managed certificate
            variable "ssl_private_key" {
              type      = string
              sensitive = true
            }

            resource "google_compute_ssl_certificate" "example" {
              name        = "example-cert"
              private_key = var.ssl_private_key
              certificate = file("path/to/certificate.crt")

              lifecycle {
                create_before_destroy = true
              }
            }
            ```

            Note: For self-managed certificates, pass the private key via a sensitive variable or secrets manager rather than reading it from a file in version control. Update the certificate before it expires and run `terraform apply` to deploy the renewal.
        - id: console
          desc: |
            To ensure SSL certificates are not expired or expiring within 30 days using the Google Cloud Console:

            1. Go to the **Certificate Manager** page or **Load Balancing > SSL Certificates** page.
            2. Identify certificates that are expired or expiring within 30 days.
            3. Upload a renewed certificate or switch to Google-managed certificates for automatic renewal.
            4. Update the target HTTPS proxy to use the new certificate.
        - id: cli
          desc: |
            To ensure SSL certificates are not expired or expiring within 30 days using the Google Cloud CLI, create a new self-managed certificate with the renewed key and certificate:

            ```bash
            gcloud compute ssl-certificates create NEW_CERT_NAME \
              --certificate=PATH_TO_CERT \
              --private-key=PATH_TO_KEY

            gcloud compute target-https-proxies update PROXY_NAME \
              --ssl-certificates=NEW_CERT_NAME
            ```

            Consider switching to Google-managed certificates:

            ```bash
            gcloud compute ssl-certificates create CERT_NAME \
              --domains=DOMAIN_NAME \
              --global
            ```
    refs:
      - url: https://cloud.google.com/load-balancing/docs/ssl-certificates-concepts
        title: SSL certificates overview
  - uid: mondoo-gcp-security-ssl-certificate-not-expired-gcp
    filters: asset.platform == 'gcp'
    mql: |
      gcp.project.computeService.sslCertificates.where(type == "SELF_MANAGED").all(
        parse.date(expireTime) > time.now + 30 * time.day
      )
  - uid: mondoo-gcp-security-cloud-nat-no-endpoint-independent-mapping
    title: Ensure Cloud NAT does not use endpoint-independent mapping
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-gcp-security-cloud-nat-no-endpoint-independent-mapping-gcp
        tags:
          mondoo.com/filter-title: GCP Cloud NAT
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-cloud-nat-no-endpoint-independent-mapping-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-nat-no-endpoint-independent-mapping-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-nat-no-endpoint-independent-mapping-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Cloud NAT gateways are configured to disable endpoint-independent mapping. When endpoint-independent mapping is enabled, the NAT gateway assigns the same external IP and port for all outbound connections from a given internal source regardless of the destination, making NAT behavior predictable and exploitable for NAT traversal and reflection attacks.

        **Why this matters**

        - **Predictable NAT mapping:** Endpoint-independent mapping creates stable, destination-independent NAT bindings that external parties can discover and exploit to initiate inbound connections to internal resources through the NAT gateway.
        - **Reflection attack vector:** Because the external port assignment does not vary by destination, an attacker can induce a reflection that routes unsolicited traffic to an internal host via the predictable mapping.
        - **Vendor recommendation:** Google Cloud explicitly recommends disabling endpoint-independent mapping for Cloud NAT gateways used in production environments.
        - **Dynamic port allocation incompatibility:** Endpoint-independent mapping is incompatible with dynamic port allocation, which is the recommended approach for efficient NAT port utilization.

        **Risk mitigation**

        - **Disable endpoint-independent mapping:** Set `enable_endpoint_independent_mapping` to `false` on all Cloud NAT gateways; this is the Google-recommended default for security-conscious deployments.
        - **Enable dynamic port allocation:** Combine disabled endpoint-independent mapping with `enable_dynamic_port_allocation: true` to improve both security and port efficiency.
        - **Review NAT configurations across routers:** Audit all Cloud Routers in each region to confirm that every NAT configuration attached to the router has endpoint-independent mapping disabled.
      audit: |
        ### Audit via Console

        1. Go to the **Network Services > Cloud NAT** page in the Google Cloud Console.
        2. Select a NAT gateway, then select **Edit**.
        3. Expand **Advanced configurations** and review the **Endpoint-Independent Mapping** setting.

        A passing NAT gateway shows **Endpoint-Independent Mapping** as disabled. A failing NAT gateway shows **Endpoint-Independent Mapping** as enabled.

        ### Audit via CLI

        1. List all Cloud Routers, then describe each NAT configuration to check the endpoint-independent mapping setting:

        ```bash
        gcloud compute routers list --format="table(name,region)"
        ```

        2. For each router, describe its NAT configuration:

        ```bash
        gcloud compute routers describe ROUTER_NAME \
          --region=REGION \
          --format="json(nats[].name,nats[].enableEndpointIndependentMapping)"
        ```

        A passing NAT gateway returns `enableEndpointIndependentMapping: false` or the field is absent. A failing NAT gateway returns `enableEndpointIndependentMapping: true`.
      remediation:
        - id: terraform
          desc: |
            To ensure Cloud NAT does not use endpoint-independent mapping in Terraform:

            ```hcl
            resource "google_compute_router_nat" "nat" {
              name                               = "my-nat-gateway"
              router                             = google_compute_router.router.name
              region                             = "us-central1"
              nat_ip_allocate_option             = "AUTO_ONLY"
              source_subnetwork_ip_ranges_to_nat = "ALL_SUBNETWORKS_ALL_IP_RANGES"

              enable_endpoint_independent_mapping = false
              enable_dynamic_port_allocation      = true
            }
            ```
        - id: console
          desc: |
            To ensure Cloud NAT does not use endpoint-independent mapping using the Google Cloud Console:

            1. Go to the **Network services > Cloud NAT** page.
            2. Select the NAT gateway.
            3. Select **Edit**.
            4. Under **Advanced configurations**, disable **Endpoint-Independent Mapping**.
            5. Select **Save**.
        - id: cli
          desc: |
            To ensure Cloud NAT does not use endpoint-independent mapping using the Google Cloud CLI:

            ```bash
            gcloud compute routers nats update NAT_NAME \
              --router=ROUTER_NAME \
              --region=REGION \
              --no-enable-endpoint-independent-mapping
            ```
    refs:
      - url: https://cloud.google.com/nat/docs/overview
        title: Cloud NAT overview
      - url: https://cloud.google.com/nat/docs/ports-and-addresses
        title: Cloud NAT ports and addresses
  - uid: mondoo-gcp-security-cloud-nat-no-endpoint-independent-mapping-gcp
    filters: asset.platform == 'gcp'
    mql: |
      gcp.project.computeService.routers.all(
        natServices.all(enableEndpointIndependentMapping == false)
      )
  - uid: mondoo-gcp-security-cloud-nat-no-endpoint-independent-mapping-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_compute_router_nat')
    mql: |
      terraform.resources('google_compute_router_nat').all(
        arguments.enable_endpoint_independent_mapping != true
      )
  - uid: mondoo-gcp-security-cloud-nat-no-endpoint-independent-mapping-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_compute_router_nat')
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_compute_router_nat').all(
        change.after['enable_endpoint_independent_mapping'] != true
      )
  - uid: mondoo-gcp-security-cloud-nat-no-endpoint-independent-mapping-terraform-state
