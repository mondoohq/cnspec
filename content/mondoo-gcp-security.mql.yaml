  - uid: mondoo-gcp-security-cloud-redis-auth-enabled
    title: Ensure authentication is enabled for Cloud Redis instances
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-14
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-2
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-2
    variants:
      - uid: mondoo-gcp-security-cloud-redis-auth-enabled-memorystore-redis
        tags:
          mondoo.com/filter-title: GCP Memorystore Redis
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-cloud-redis-auth-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-redis-auth-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-redis-auth-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Redis AUTH is enabled on Cloud Memorystore for Redis instances, requiring clients to present a valid authentication string before executing any commands. By default, Cloud Memorystore for Redis instances are created without AUTH enabled, relying solely on network-level access controls such as VPC firewalls and authorized networks to limit who can connect.

        **Why this matters**

        - **No credential barrier:** Without AUTH, any client that can reach the Redis instance's IP and port over the network can immediately execute any Redis command, including reads, writes, and cache flushes.
        - **Lateral movement enablement:** Compromised workloads within the same VPC or subnet can silently read cached session tokens, API credentials, or other sensitive data stored in Redis without any authentication challenge.
        - **Defense-in-depth gap:** Network controls alone are not sufficient; AUTH provides an independent credential check that remains effective even if firewall rules are misconfigured or a network peer is compromised.
        - **Common attack target:** Redis instances without authentication are frequently targeted in cloud environments by automated scanners that probe for open Redis ports and extract or overwrite data.

        **Risk mitigation**

        - **Enable AUTH on all instances:** Set `auth_enabled = true` when creating or updating Cloud Redis instances so that all client connections must present the AUTH string.
        - **Protect the AUTH string:** Store the AUTH string in Secret Manager rather than in application configuration files or environment variables, and grant only the necessary workloads access to the secret.
        - **Rotate the AUTH string regularly:** Establish a rotation schedule that meets organizational or compliance requirements, and verify that dependent applications are updated before the old string is revoked.
      audit: |
        ### Audit via Console

        1. Sign in to the [Google Cloud Console](https://console.cloud.google.com) and open the target project.
        2. Navigate to **Memorystore > Redis**.
        3. Select each Redis instance.
        4. In the instance details, check the **AUTH** field under the Security section.

        A passing instance shows **Enabled** for AUTH. A failing instance shows **Disabled**.

        ### Audit via CLI

        1. List all Redis instances and their AUTH status:

        ```bash
        gcloud redis instances list --format="table(name,region,authEnabled)"
        ```

        A passing instance returns `True` in the `AUTH_ENABLED` column. A failing instance returns `False` or an empty value.
      remediation:
        - id: terraform
          desc: |
            To ensure authentication is enabled for Cloud Redis instances in Terraform:

            ```hcl
            resource "google_redis_instance" "cache" {
              name           = "my-redis-instance"
              tier           = "STANDARD_HA"
              memory_size_gb = 1
              region         = "us-central1"

              auth_enabled = true
            }
            ```
        - id: console
          desc: |
            To ensure authentication is enabled for Cloud Redis instances using the Google Cloud Console:

            1. Go to the **Memorystore > Redis** page in the Google Cloud Console.
            2. Select the instance you want to update.
            3. Select **Edit**.
            4. Enable **AUTH**.
            5. Select **Save**.
        - id: cli
          desc: |
            To ensure authentication is enabled for Cloud Redis instances using the Google Cloud CLI:

            ```bash
            gcloud redis instances update INSTANCE_NAME \
              --enable-auth \
              --region=REGION
            ```
    refs:
      - url: https://cloud.google.com/memorystore/docs/redis/auth-overview
        title: Cloud Memorystore Redis AUTH documentation
  - uid: mondoo-gcp-security-cloud-redis-auth-enabled-memorystore-redis
    filters: asset.platform == "gcp-memorystore-redis"
    mql: |
      gcp.project.redisService.instance.authEnabled == true
  - uid: mondoo-gcp-security-cloud-redis-auth-enabled-terraform-hcl
    filters: |
