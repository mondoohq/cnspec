  - uid: mondoo-gcp-security-cloud-redis-transit-encryption-enabled
    title: Ensure in-transit encryption is enabled for Cloud Memorystore for Redis
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    variants:
      - uid: mondoo-gcp-security-cloud-redis-transit-encryption-enabled-memorystore-redis
        tags:
          mondoo.com/filter-title: GCP Memorystore Redis
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-cloud-redis-transit-encryption-enabled-memorystore-rediscluster
        tags:
          mondoo.com/filter-title: GCP Memorystore Redis Cluster
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-cloud-redis-transit-encryption-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-redis-transit-encryption-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-redis-transit-encryption-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that in-transit encryption is enabled for Cloud Memorystore for Redis instances and clusters. By default, newly created Redis instances may have in-transit encryption disabled, meaning all data exchanged between client applications and the Redis endpoint travels as plaintext over the network.

        **Why this matters**

        - **Data confidentiality:** Without TLS, sensitive cached data including session tokens, application secrets, and user information is readable by any party with access to the network path between client and server.
        - **Man-in-the-middle risk:** Unencrypted connections can be intercepted and modified in transit, enabling cache poisoning or injection of malicious data into the application.
        - **Network boundary assumptions:** Even within a VPC, traffic can traverse shared infrastructure; TLS ensures confidentiality regardless of where the connection physically travels.
        - **Compliance requirements:** Regulatory frameworks covering sensitive data categories require encryption of data in transit for all services that handle that data.

        **Risk mitigation**

        - **Enable TLS at creation:** Configure transit_encryption_mode to SERVER_AUTHENTICATION when creating Redis instances or clusters, since this setting cannot be changed after creation.
        - **Update client configuration:** Ensure all application clients are configured to connect using TLS after enabling in-transit encryption.
        - **Pair with network controls:** Combine in-transit encryption with VPC-level access controls and IAM authentication for defense-in-depth.
      audit: |
        ### Audit via Console

        1. Open the [Google Cloud Console](https://console.cloud.google.com) and navigate to **Memorystore > Redis**.
        2. Click each Redis instance name to view its details.
        3. Under **Security**, check the **In-transit encryption** field.
        4. Repeat for any Redis Clusters under **Memorystore > Redis Cluster**, checking the **Transit encryption** setting.

        A passing Redis instance or cluster shows **In-transit encryption** as enabled (SERVER_AUTHENTICATION). A failing instance shows **Disabled** or no in-transit encryption setting.

        ### Audit via CLI

        1. For Redis instances, describe the instance and check the transit encryption mode:

        ```bash
        gcloud redis instances describe INSTANCE_NAME \
          --region=REGION \
          --format="json(transitEncryptionMode)"
        ```

        2. For Redis Clusters, describe the cluster:

        ```bash
        gcloud redis clusters describe CLUSTER_NAME \
          --region=REGION \
          --format="json(transitEncryptionMode)"
        ```

        A passing Redis instance returns `"transitEncryptionMode": "SERVER_AUTHENTICATION"`. A failing instance returns `"transitEncryptionMode": "DISABLED"` or omits the field.
      remediation:
        - id: terraform
          desc: |
            To ensure in-transit encryption is enabled for Cloud Memorystore for Redis in Terraform, for Cloud Memorystore for Redis instances:

            ```hcl
            resource "google_redis_instance" "cache" {
              name           = "my-redis-instance"
              tier           = "STANDARD_HA"
              memory_size_gb = 1
              region         = "us-central1"

              transit_encryption_mode = "SERVER_AUTHENTICATION"
            }
            ```
        - id: console
          desc: |
            To ensure in-transit encryption is enabled for Cloud Memorystore for Redis using the Google Cloud Console, note: In-transit encryption must be configured at instance creation time and cannot be changed on an existing instance.

            1. Go to the **Memorystore > Redis** page in the Google Cloud Console.
            2. Select **Create Instance**.
            3. In the **Security** section, select **Enable in-transit encryption**.
            4. Complete the instance creation.
        - id: cli
          desc: |
            To ensure in-transit encryption is enabled for Cloud Memorystore for Redis using the Google Cloud CLI, note: In-transit encryption must be configured at instance creation time.

            For Cloud Memorystore for Redis instances:

            ```bash
            gcloud redis instances create INSTANCE_NAME \
              --region=REGION \
              --transit-encryption-mode=SERVER_AUTHENTICATION
            ```
    refs:
      - url: https://cloud.google.com/memorystore/docs/redis/in-transit-encryption
        title: Cloud Memorystore for Redis in-transit encryption documentation
