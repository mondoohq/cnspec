  - uid: mondoo-gcp-security-vertex-ai-job-cmek-encryption
    title: Ensure Vertex AI training and runtime assets are encrypted with CMEK
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-gcp-security-vertex-ai-job-cmek-encryption-gcp
        tags:
          mondoo.com/filter-title: GCP Vertex AI
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-vertex-ai-job-cmek-encryption-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-vertex-ai-job-cmek-encryption-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-vertex-ai-job-cmek-encryption-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Vertex AI Tensorboards, custom training jobs, indexes, index endpoints, metadata stores, and the legacy Feature Store are each encrypted with a customer-managed encryption key (CMEK). Vertex AI's CMEK contract is per-resource; each resource type carries its own `encryption_spec` block, and a missing block silently falls back to Google-managed encryption.

        **Why this matters**

        - **Each resource type independently controls its encryption:** There is no project-wide CMEK toggle for Vertex AI; every Tensorboard, index, metadata store, and featurestore must be explicitly configured with a CMEK key or it uses Google-managed encryption.
        - **These resources hold sensitive ML artifacts:** Tensorboards store training metrics that can disclose dataset characteristics; indexes encode embeddings of potentially sensitive content; metadata stores hold pipeline lineage across the project; the Feature Store backs online prediction with stored feature values.
        - **Custom training jobs persist intermediate artifacts:** Jobs write model checkpoints and intermediate files to a staging bucket whose encryption is set at job submission time, making per-job CMEK configuration necessary.
        - **Google-managed keys cannot be independently revoked:** Without CMEK, none of these resources can have their encryption keys disabled or destroyed in response to a security incident, limiting incident response options.

        **Risk mitigation**

        - **Set `encryption_spec.kms_key_name` on every covered resource type:** Configure CMEK on `google_vertex_ai_tensorboard`, `google_vertex_ai_metadata_store`, `google_vertex_ai_featurestore`, `google_vertex_ai_index`, and `google_vertex_ai_index_endpoint` resources, using a Cloud KMS key in the same region as each resource.
        - **Submit custom training jobs with an explicit CMEK key:** Pass the `--kms-key` flag or equivalent SDK argument when submitting custom training jobs so that intermediate artifacts are encrypted with the organization-managed key.
        - **Grant the Vertex AI service agent the required role:** The Vertex AI service agent needs `roles/cloudkms.cryptoKeyEncrypterDecrypter` on the key for each resource type that uses CMEK.
      audit: |
        ### Audit via Console

        1. In the Google Cloud Console, go to **Vertex AI**.
        2. Check each of the following resource types: **Experiments** > **Tensorboards**, **Training** > **Custom jobs**, **Vector Search** > **Indexes**, **Vector Search** > **Index Endpoints**, and **Feature Store**.
        3. Select each resource and review its details page for an **Encryption** or **CMEK** field.

        A passing resource shows a Cloud KMS key configured under the encryption settings. A failing resource shows no CMEK or shows Google-managed encryption.

        ### Audit via CLI

        1. List Vertex AI Tensorboards and check encryption settings:

        ```bash
        gcloud ai tensorboards list \
          --region=REGION \
          --format="table(name,encryptionSpec.kmsKeyName)"
        ```

        2. List custom training jobs and check encryption settings:

        ```bash
        gcloud ai custom-jobs list \
          --region=REGION \
          --format="table(name,encryptionSpec.kmsKeyName)"
        ```

        3. List indexes and check encryption settings:

        ```bash
        gcloud ai indexes list \
          --region=REGION \
          --format="table(name,encryptionSpec.kmsKeyName)"
        ```

        A passing resource returns a non-empty value in the `KMS_KEY_NAME` column. A failing resource returns an empty `KMS_KEY_NAME` column.
      remediation:
        - id: terraform
          desc: |
            To require CMEK on Vertex AI training and runtime assets in Terraform, set `encryption_spec` on each resource type:

            ```hcl
            resource "google_vertex_ai_tensorboard" "default" {
              display_name = "tensorboard"
              region       = "us-central1"

              encryption_spec {
                kms_key_name = google_kms_crypto_key.vertex.id
              }
            }

            resource "google_vertex_ai_metadata_store" "default" {
              name     = "metadata-store"
              region   = "us-central1"

              encryption_spec {
                kms_key_name = google_kms_crypto_key.vertex.id
              }
            }

            resource "google_vertex_ai_featurestore" "default" {
              name   = "featurestore"
              region = "us-central1"

              encryption_spec {
                kms_key_name = google_kms_crypto_key.vertex.id
              }
            }
            ```

            `google_vertex_ai_index` and `google_vertex_ai_index_endpoint` accept the same `encryption_spec` block.
        - id: console
          desc: |
            To require CMEK on Vertex AI training and runtime assets using the Google Cloud Console, CMEK must be set at creation time on each resource:

            1. In the Google Cloud Console, go to **Vertex AI** and select the resource type (Tensorboards, Training, Indexes, Feature Store, Metadata).
            2. Select **Create** for the resource.
            3. Under **Encryption**, select **Customer-managed encryption key (CMEK)** and pick the Cloud KMS key.
            4. Complete creation.
        - id: cli
          desc: |
            To submit a Vertex AI custom training job with CMEK using the Google Cloud CLI:

            ```bash
            gcloud ai custom-jobs create \
              --region=REGION \
              --display-name=JOB_NAME \
              --kms-key=projects/PROJECT/locations/REGION/keyRings/RING/cryptoKeys/KEY \
              --config=config.yaml
            ```

            For Tensorboards:

            ```bash
            gcloud ai tensorboards create \
              --region=REGION \
              --display-name=TENSORBOARD_NAME \
              --kms-key=projects/PROJECT/locations/REGION/keyRings/RING/cryptoKeys/KEY
            ```
    refs:
      - url: https://cloud.google.com/vertex-ai/docs/general/cmek
        title: Customer-managed encryption keys for Vertex AI
