  - uid: mondoo-gcp-security-pubsub-subscription-expiration-configured
    title: Ensure Pub/Sub subscriptions have an expiration policy configured
    impact: 40
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-dsp-16
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ip-1
      compliance/nist-csf-2: nist-csf-2-id-am-08
      compliance/nist-sp-800-53-rev5: false
      compliance/nist-sp-800-171: false
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc7-1-1
      compliance/vda-isa-5: false
    variants:
      - uid: mondoo-gcp-security-pubsub-subscription-expiration-configured-gcp
        tags:
          mondoo.com/filter-title: GCP Pub/Sub Subscription
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-pubsub-subscription-expiration-configured-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-pubsub-subscription-expiration-configured-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-pubsub-subscription-expiration-configured-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Pub/Sub subscriptions have an expiration policy configured to prevent orphaned subscriptions from persisting indefinitely. Without an expiration policy, forgotten subscriptions accumulate unacknowledged messages that remain readable, giving any party who gains subscription access a retroactive window into message history.

        **Why this matters**

        - **Retroactive data exposure:** An attacker who discovers or compromises an abandoned subscription can read all unacknowledged messages, which may span weeks or months of sensitive data depending on how long the subscription was idle.
        - **Dormant access paths:** Orphaned subscriptions with overly permissive IAM bindings persist as dormant entry points that are easy to overlook during access reviews.
        - **Expanded attack surface:** Accumulated forgotten subscriptions increase the number of access paths to topic data without providing any operational benefit.

        **Risk mitigation**

        - **Set expiration policies on all subscriptions:** Configure a TTL on every subscription so inactive ones are automatically removed before unacknowledged messages accumulate; the default Google-recommended TTL is 31 days of inactivity.
        - **Tune TTL to data sensitivity:** Reduce the expiration window for subscriptions carrying regulated or sensitive data so the exposure window is as short as operationally feasible.
        - **Audit subscription usage regularly:** Review active subscriptions and remove any that are no longer attached to live consumers rather than relying solely on expiration policies.
      audit: |
        ### Audit via Console

        1. Sign in to the [Google Cloud Console](https://console.cloud.google.com) and select the project.
        2. Navigate to **Pub/Sub > Subscriptions**.
        3. For each subscription in the list, select its name to open the details page.
        4. Review the **Expiration** field under **Subscription details**.

        A passing subscription shows an expiration policy TTL (for example, `31 days`). A failing subscription shows **Never expires** or no expiration policy configured.

        ### Audit via CLI

        1. List all subscriptions and inspect the `expirationPolicy` field:

        ```bash
        gcloud pubsub subscriptions list --format="table(name,expirationPolicy.ttl)"
        ```

        A passing subscription returns a non-empty TTL value in the `EXPIRATION_POLICY_TTL` column. A failing subscription returns an empty or absent `EXPIRATION_POLICY_TTL` value.
      remediation:
        - id: terraform
          desc: |
            To ensure Pub/Sub subscriptions have an expiration policy configured in Terraform:

            ```hcl
            resource "google_pubsub_subscription" "example" {
              name  = "example-subscription"
              topic = google_pubsub_topic.example.id

              expiration_policy {
                ttl = "2678400s"  # 31 days
              }
            }
            ```
        - id: console
          desc: |
            To ensure Pub/Sub subscriptions have an expiration policy configured using the Google Cloud Console:

            1. Navigate to **Pub/Sub > Subscriptions** in the Google Cloud Console.
            2. Select the subscription to update.
            3. Select **Edit**.
            4. Configure the **Expiration** policy with an appropriate TTL.
            5. Select **Update**.
        - id: cli
          desc: |
            To ensure Pub/Sub subscriptions have an expiration policy configured using the Google Cloud CLI:

            ```bash
            gcloud pubsub subscriptions update SUBSCRIPTION_NAME \
              --expiration-period=31d
            ```
    refs:
      - url: https://cloud.google.com/pubsub/docs/subscription-properties
        title: Subscription properties
  - uid: mondoo-gcp-security-pubsub-subscription-expiration-configured-gcp
    filters: asset.platform == 'gcp-pubsub-subscription'
    mql: |
      gcp.project.pubsubService.subscription.config().expirationPolicy != empty
  - uid: mondoo-gcp-security-pubsub-subscription-expiration-configured-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_pubsub_subscription')
    mql: |
      terraform.resources('google_pubsub_subscription').all(
        blocks.where(type == 'expiration_policy') != empty
      )
  - uid: mondoo-gcp-security-pubsub-subscription-expiration-configured-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_pubsub_subscription')
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_pubsub_subscription').all(
        change.after.expiration_policy != empty
      )
  - uid: mondoo-gcp-security-pubsub-subscription-expiration-configured-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'google_pubsub_subscription')
    mql: |
      terraform.state.resources.where(type == 'google_pubsub_subscription').all(
        values.expiration_policy != empty
      )
  - uid: mondoo-gcp-security-pubsub-topic-not-publicly-accessible
    title: Ensure Pub/Sub topics are not anonymously or publicly accessible
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-2-1
    variants:
      - uid: mondoo-gcp-security-pubsub-topic-not-publicly-accessible-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-pubsub-topic-not-publicly-accessible-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-pubsub-topic-not-publicly-accessible-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Pub/Sub topics do not have IAM bindings that grant access to `allUsers` or `allAuthenticatedUsers`. These principals represent unauthenticated internet access and any Google-authenticated user access respectively, exposing topic data and processing pipelines to unauthorized parties.

        **Why this matters**

        - **Unauthenticated message injection:** When `allUsers` holds publisher access, any internet user can inject malicious messages into processing pipelines, potentially triggering code execution, data corruption, or privilege escalation in downstream consumers.
        - **Broad subscriber exposure:** Granting `allAuthenticatedUsers` allows any Google account holder to subscribe and consume messages, regardless of organizational membership or authorization.
        - **Sensitive data exfiltration:** A subscriber with unauthorized access can silently drain event streams containing PII, inter-service messages, or business-critical data.
        - **Deserialization exploit surface:** Consumers that implicitly trust topic messages can be exploited when untrusted input is injected via a publicly accessible topic.

        **Risk mitigation**

        - **Remove public principals immediately:** Revoke any IAM bindings for `allUsers` or `allAuthenticatedUsers` on all topics and replace them with specific service accounts, groups, or users.
        - **Apply least-privilege roles:** Grant only `roles/pubsub.publisher` or `roles/pubsub.subscriber` to the minimum set of principals that require access.
        - **Layer with VPC Service Controls:** Restrict topic access to authorized VPC networks to provide network-level enforcement in addition to IAM controls.
      audit: |
        ### Audit via Console

        1. Sign in to the [Google Cloud Console](https://console.cloud.google.com) and select the project.
        2. Navigate to **Pub/Sub > Topics**.
        3. Select a topic name to open its details page.
        4. Click the **Permissions** tab.
        5. Review all IAM bindings and check whether any principal is `allUsers` or `allAuthenticatedUsers`.
        6. Repeat for each topic.

        A passing topic shows no bindings for `allUsers` or `allAuthenticatedUsers`. A failing topic shows one or more IAM bindings that include `allUsers` or `allAuthenticatedUsers`.

        ### Audit via CLI

        1. Retrieve the IAM policy for each topic and inspect the members:

        ```bash
        gcloud pubsub topics get-iam-policy TOPIC_NAME --format=json
        ```

        A passing topic returns a policy whose `bindings[].members` arrays contain no `allUsers` or `allAuthenticatedUsers` entries. A failing topic returns at least one binding that lists `allUsers` or `allAuthenticatedUsers` as a member.
      remediation:
        - id: terraform
          desc: |
            To ensure Pub/Sub topics are not anonymously or publicly accessible in Terraform, ensure IAM bindings do not include public members:

            ```hcl
            resource "google_pubsub_topic_iam_binding" "example" {
              topic = google_pubsub_topic.example.name
              role  = "roles/pubsub.publisher"

              members = [
                "serviceAccount:my-sa@my-project.iam.gserviceaccount.com",
              ]
            }
            ```
        - id: console
          desc: |
            To ensure Pub/Sub topics are not anonymously or publicly accessible using the Google Cloud Console:

            1. Navigate to **Pub/Sub > Topics** in the Google Cloud Console.
            2. Select the topic to update.
            3. Click the **Permissions** tab.
            4. Review all IAM bindings and remove any that include `allUsers` or `allAuthenticatedUsers`.
            5. Select **Save**.
        - id: cli
          desc: |
            To ensure Pub/Sub topics are not anonymously or publicly accessible using the Google Cloud CLI, remove public access from a topic:

            ```bash
            gcloud pubsub topics remove-iam-policy-binding TOPIC_NAME \
              --member="allUsers" \
              --role="ROLE_NAME"

            gcloud pubsub topics remove-iam-policy-binding TOPIC_NAME \
              --member="allAuthenticatedUsers" \
              --role="ROLE_NAME"
            ```
    refs:
      - url: https://cloud.google.com/pubsub/docs/access-control
        title: Pub/Sub access control
  - uid: mondoo-gcp-security-pubsub-topic-not-publicly-accessible-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_pubsub_topic_iam_binding' || nameLabel == 'google_pubsub_topic_iam_member')
    mql: |
      terraform.resources('google_pubsub_topic_iam_binding').all(
        arguments.members.none(_ == 'allUsers' || _ == 'allAuthenticatedUsers')
      )
      terraform.resources('google_pubsub_topic_iam_member').all(
        arguments.member != 'allUsers' && arguments.member != 'allAuthenticatedUsers'
      )
