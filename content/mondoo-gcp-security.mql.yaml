      - uid: mondoo-gcp-security-gke-node-pool-upgrade-strategy-configured-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that GKE node pools have an explicit upgrade strategy configured, either SURGE or BLUE_GREEN, so that security patches are applied without disrupting security controls. By default, node pools may have no upgrade strategy set, which can cause uncoordinated upgrades that temporarily remove security agents, network policies, or admission controllers from the cluster.

        **Why this matters**

        - **Security continuity during upgrades:** A surge or blue-green strategy keeps a minimum number of healthy nodes active at all times, ensuring network policies, admission webhooks, and security agents remain in place throughout the upgrade process.
        - **Reduced patching aversion:** Teams are more willing to apply security patches promptly when the upgrade process is predictable and non-disruptive, closing vulnerability windows faster.
        - **Controlled rollout:** The BLUE_GREEN strategy validates the new node pool before draining the old one, preventing scenarios where security controls are absent during an incomplete upgrade.
        - **Consistent posture:** Defining an upgrade strategy across all node pools eliminates unpredictable gaps in security posture that arise from ad-hoc or default upgrade behavior.

        **Risk mitigation**

        - **Deferred patching:** A reliable upgrade strategy removes the operational risk that discourages teams from applying security patches promptly, shortening the window of exposure to known CVEs.
        - **Security control gaps:** Controlled upgrades prevent situations where all nodes in a pool are simultaneously unavailable, leaving workloads running without admission control or network policy enforcement.
      audit: |
        ### Audit via Console

        1. Go to the **Kubernetes Engine > Clusters** page in the Google Cloud Console.
        2. Select the cluster to inspect.
        3. Click the **Nodes** tab.
        4. For each node pool listed, click the node pool name to view its details.
        5. Review the **Upgrade strategy** field.

        A passing node pool shows **Surge upgrade** or **Blue-green upgrade** as the upgrade strategy. A failing node pool shows no upgrade strategy configured or an empty value.

        ### Audit via CLI

        1. List all GKE clusters in the project:

        ```bash
        gcloud container clusters list --format="table(name,location)"
        ```

        2. For each cluster, describe its node pools and review the upgrade settings:

        ```bash
        gcloud container node-pools list \
          --cluster=CLUSTER_NAME \
          --location=LOCATION \
          --format="table(name,upgradeSettings.strategy,upgradeSettings.maxSurge,upgradeSettings.maxUnavailable)"
        ```

        A passing node pool returns a non-empty value in the `UPGRADE_STRATEGY` column (for example, `SURGE` or `BLUE_GREEN`). A failing node pool returns an empty or unset value in that column.
      remediation:
        - id: terraform
          desc: |
            To ensure GKE node pools have an upgrade strategy configured in Terraform, configure a surge upgrade strategy for node pools:

            ```hcl
            resource "google_container_node_pool" "example" {
              name    = "example-pool"
              cluster = google_container_cluster.example.name

              upgrade_settings {
                strategy        = "SURGE"
                max_surge       = 1
                max_unavailable = 0
              }
            }
            ```

            For blue-green upgrades:

            ```hcl
            resource "google_container_node_pool" "example" {
              name    = "example-pool"
              cluster = google_container_cluster.example.name

              upgrade_settings {
                strategy = "BLUE_GREEN"

                blue_green_settings {
                  node_pool_soak_duration = "3600s"

                  standard_rollout_policy {
                    batch_percentage    = 0.5
                    batch_soak_duration = "60s"
                  }
                }
              }
            }
            ```
        - id: console
          desc: |
            To ensure GKE node pools have an upgrade strategy configured using the Google Cloud Console:

            1. Go to the **Kubernetes Engine > Clusters** page in the Google Cloud Console.
            2. Select the cluster containing the node pool.
            3. Click the **Nodes** tab.
            4. Select the node pool to configure.
            5. Select **Edit**.
            6. Under **Upgrade strategy**, select **Surge upgrade** or **Blue-green upgrade**.
            7. Configure the strategy parameters (max surge, max unavailable, or batch settings).
            8. Select **Save**.
        - id: cli
          desc: |
            To ensure GKE node pools have an upgrade strategy configured using the Google Cloud CLI, configure a surge upgrade strategy:

            ```bash
            gcloud container node-pools update NODE_POOL_NAME \
              --cluster=CLUSTER_NAME \
              --location=LOCATION \
              --max-surge-upgrade=1 \
              --max-unavailable-upgrade=0
            ```

            Configure a blue-green upgrade strategy:

            ```bash
            gcloud container node-pools update NODE_POOL_NAME \
              --cluster=CLUSTER_NAME \
              --location=LOCATION \
              --enable-blue-green-upgrade \
              --node-pool-soak-duration=3600s
            ```
    refs:
      - url: https://cloud.google.com/kubernetes-engine/docs/concepts/node-pool-upgrade-strategies
        title: Node pool upgrade strategies
      - url: https://cloud.google.com/kubernetes-engine/docs/how-to/upgrading-a-cluster
        title: Upgrading a cluster
  - uid: mondoo-gcp-security-gke-node-pool-upgrade-strategy-configured-gcp
    filters: asset.platform == 'gcp-gke-cluster'
    mql: |
      gcp.project.gkeService.cluster.nodePools.all(
        upgradeSettings.strategy != ""
      )
  - uid: mondoo-gcp-security-gke-node-pool-upgrade-strategy-configured-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_container_cluster')
    mql: |
      terraform.resources('google_container_cluster').all(
        blocks.where(type == 'node_pool').all(
          blocks.where(type == 'upgrade_settings') != empty &&
          blocks.where(type == 'upgrade_settings').all(
            arguments.strategy != empty
          )
        )
      )
  - uid: mondoo-gcp-security-gke-node-pool-upgrade-strategy-configured-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_container_cluster')
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_container_cluster').all(
        change.after['node_pool'] == empty ||
        change.after['node_pool'].all(
          _['upgrade_settings'] != empty &&
          _['upgrade_settings'].any(_['strategy'] != empty)
        )
      )
  - uid: mondoo-gcp-security-gke-node-pool-upgrade-strategy-configured-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'google_container_cluster')
    mql: |
      terraform.state.resources.where(type == 'google_container_cluster').all(
        values['node_pool'] == empty ||
        values['node_pool'].all(
          _['upgrade_settings'] != empty &&
          _['upgrade_settings'].any(_['strategy'] != empty)
        )
      )
  - uid: mondoo-gcp-security-cloud-sql-connector-enforcement
    title: Ensure Cloud SQL instances require Cloud SQL connectors for all connections
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-4-1-2
    variants:
      - uid: mondoo-gcp-security-cloud-sql-connector-enforcement-gcp-mysql
        tags:
          mondoo.com/filter-title: GCP Cloud SQL for MySQL
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-cloud-sql-connector-enforcement-gcp-postgresql
        tags:
          mondoo.com/filter-title: GCP Cloud SQL for PostgreSQL
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-cloud-sql-connector-enforcement-gcp-sqlserver
        tags:
          mondoo.com/filter-title: GCP Cloud SQL for SQL Server
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-cloud-sql-connector-enforcement-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-sql-connector-enforcement-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-sql-connector-enforcement-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Cloud SQL instances have connector enforcement set to REQUIRED, so that all database connections must use the Cloud SQL Auth Proxy or Cloud SQL Language Connectors rather than direct IP-based connections. By default, connector enforcement is not required, allowing clients to connect directly via IP using database passwords, which bypasses IAM-based authentication and automatic TLS management.

        **Why this matters**

        - **IAM-based authentication:** Connector enforcement ensures all connections carry an IAM identity, replacing password-only authentication with a cryptographically verified principal that can be audited and revoked.
        - **Automatic TLS management:** Cloud SQL connectors handle certificate lifecycle automatically, eliminating the risk of expired or misconfigured TLS certificates on direct IP connections.
        - **Authorized network drift:** Direct IP connections require maintaining authorized CIDR ranges that tend to grow over time and are rarely pruned, whereas connectors scope access to IAM identities instead.
        - **Audit completeness:** Connections through Cloud SQL connectors include IAM identity context in audit logs, making it possible to attribute database access to specific service accounts and users.

        **Risk mitigation**

        - **Credential-only attacks:** Requiring connectors means that a stolen database password alone is insufficient to connect; the attacker also needs a valid IAM identity with the Cloud SQL Client role.
        - **Plaintext exposure:** Direct IP connections may transmit data in plaintext if SSL is not separately enforced; connector enforcement eliminates this risk by mandating encrypted connector paths for all connections.
      audit: |
        ### Audit via Console

        1. Go to the **SQL** page in the Google Cloud Console.
        2. Click the instance name to open its details.
        3. Select the **Connections** tab.
        4. Review the **Cloud SQL connector enforcement** setting.

        A passing instance shows **Required** for Cloud SQL connector enforcement. A failing instance shows **Not required** or no enforcement configured.

        ### Audit via CLI

        1. List all Cloud SQL instances and their connector enforcement setting:

        ```bash
        gcloud sql instances list \
          --format="table(name,settings.connectorEnforcement)"
        ```

        A passing instance returns `REQUIRED` in the `CONNECTOR_ENFORCEMENT` column. A failing instance returns `NOT_REQUIRED` or an empty value.
      remediation:
        - id: terraform
          desc: |
            To ensure Cloud SQL instances require Cloud SQL connectors for all connections in Terraform, set connector enforcement to REQUIRED:

            ```hcl
            resource "google_sql_database_instance" "example" {
              name             = "example-instance"
              database_version = "POSTGRES_15"
              region           = "us-central1"

              settings {
                tier = "db-custom-2-8192"
                ip_configuration {
                  connector_enforcement = "REQUIRED"
                }
              }
            }
            ```
        - id: console
          desc: |
            To ensure Cloud SQL instances require Cloud SQL connectors for all connections using the Google Cloud Console:

            1. Go to the **SQL** page in the Google Cloud Console.
            2. Select the instance you want to configure.
            3. Select **Edit**.
            4. Under **Connections**, find **Cloud SQL connector enforcement**.
            5. Select **Required** to enforce connector use for all connections.
            6. Select **Save**.
        - id: cli
          desc: |
            To ensure Cloud SQL instances require Cloud SQL connectors for all connections using the Google Cloud CLI, enable connector enforcement on an existing instance:

            ```bash
            gcloud sql instances patch INSTANCE_NAME \
              --connector-enforcement=REQUIRED
            ```

            Note: Ensure all applications are using Cloud SQL connectors before enabling enforcement, as direct IP connections will be rejected.
    refs:
      - url: https://cloud.google.com/sql/docs/mysql/connect-auth-proxy
        title: Connect using the Cloud SQL Auth Proxy
      - url: https://cloud.google.com/sql/docs/mysql/connect-connectors
        title: Connect using Cloud SQL Language Connectors
  - uid: mondoo-gcp-security-cloud-sql-connector-enforcement-gcp-mysql
    filters: asset.platform == 'gcp-sql-mysql'
    mql: |
      gcp.sql.instance.settings.connectorEnforcement == "REQUIRED"
  - uid: mondoo-gcp-security-cloud-sql-connector-enforcement-gcp-postgresql
    filters: asset.platform == 'gcp-sql-postgresql'
    mql: |
      gcp.sql.instance.settings.connectorEnforcement == "REQUIRED"
  - uid: mondoo-gcp-security-cloud-sql-connector-enforcement-gcp-sqlserver
    filters: asset.platform == 'gcp-sql-sqlserver'
    mql: |
      gcp.sql.instance.settings.connectorEnforcement == "REQUIRED"
  - uid: mondoo-gcp-security-cloud-sql-connector-enforcement-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_sql_database_instance')
    mql: |
      terraform.resources('google_sql_database_instance').all(
        blocks.where(type == 'settings') != empty &&
        blocks.where(type == 'settings').all(
          blocks.where(type == 'ip_configuration') != empty &&
          blocks.where(type == 'ip_configuration').all(
            arguments.connector_enforcement == "REQUIRED"
          )
        )
      )
  - uid: mondoo-gcp-security-cloud-sql-connector-enforcement-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_sql_database_instance')
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_sql_database_instance').all(
        change.after['settings'].all(
          _['ip_configuration'].all(
            _['connector_enforcement'] == "REQUIRED"
          )
        )
      )
  - uid: mondoo-gcp-security-cloud-sql-connector-enforcement-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'google_sql_database_instance')
    mql: |
      terraform.state.resources.where(type == 'google_sql_database_instance').all(
        values['settings'].all(
          _['ip_configuration'].all(
            _['connector_enforcement'] == "REQUIRED"
          )
        )
      )
  - uid: mondoo-gcp-security-backupdr-vault-access-restricted
    title: Ensure Backup & DR vault access is restricted
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-c
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-5
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-2-1
    variants:
      - uid: mondoo-gcp-security-backupdr-vault-access-restricted-gcp
        tags:
          mondoo.com/filter-title: GCP Backup & DR
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-backupdr-vault-access-restricted-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-backupdr-vault-access-restricted-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-backupdr-vault-access-restricted-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Backup and DR backup vaults have access restrictions configured to limit which projects can store backups in the vault. By default, vaults may be created without access restrictions, allowing any project to interact with backup data and increasing the risk that compromised credentials in one project can tamper with recovery data.

        **Why this matters**

        - **Blast radius containment:** Restricting vault access to specific projects means that a credential compromise in an unrelated project cannot be used to delete or corrupt backup data.
        - **Data residency control:** Access restrictions also limit which regions can interact with the vault, helping enforce data residency requirements and preventing backups from being accessed from unauthorized locations.
        - **Recovery integrity:** Backup vaults are the last line of defense in a ransomware or destructive attack scenario; unrestricted access allows an attacker who has compromised any project to target recovery assets.
        - **Principle of least privilege:** Limiting vault access to the projects that own the protected workloads reduces the number of principals with the ability to modify or delete critical backup data.

        **Risk mitigation**

        - **Ransomware protection:** Restricting vault access ensures that an attacker who gains control of one project cannot immediately destroy backups, preserving recovery options.
        - **Insider threat:** Scoping vault access to specific projects limits which internal teams and service accounts can interact with backup data, reducing the opportunity for accidental or malicious deletion.
      audit: |
        ### Audit via Console

        1. In the Google Cloud Console, navigate to **Backup and DR Service**.
        2. In the left menu, select **Backup vaults**.
        3. For each vault listed, click the vault name.
        4. Review the **Access restriction** field on the vault details page.

        A passing vault shows an access restriction other than **Unrestricted** (for example, **Within project** or **Within organization**). A failing vault shows **Unrestricted** or no restriction configured.

        ### Audit via CLI

        1. List all Backup DR vaults and their access restriction setting:

        ```bash
        gcloud backup-dr backup-vaults list \
          --location=- \
          --format="table(name,accessRestriction)"
        ```

        A passing vault returns `WITHIN_PROJECT`, `WITHIN_ORG`, or another restricted value in the `ACCESS_RESTRICTION` column. A failing vault returns `UNRESTRICTED` or `ACCESS_RESTRICTION_UNSPECIFIED`.
      remediation:
        - id: terraform
          desc: |
            To ensure Backup & DR vault access is restricted in Terraform, configure the backup vault with access restrictions:

            ```hcl
            resource "google_backup_dr_backup_vault" "example" {
              location                          = "us-central1"
              backup_vault_id                   = "example-vault"
              access_restriction                = "WITHIN_PROJECT"
              backup_minimum_enforced_retention_duration = "86400s"
            }
            ```
        - id: console
          desc: |
            To ensure Backup & DR vault access is restricted using the Google Cloud Console:

            1. Go to the **Backup and DR** page in the Google Cloud Console.
            2. Select **Backup Vaults**.
            3. Click the vault to modify.
            4. Review the **Access Restriction** setting.
            5. Ensure access restrictions are not set to **Unrestricted**.
        - id: cli
          desc: |
            To ensure Backup & DR vault access is restricted using the Google Cloud CLI:

            ```bash
            gcloud backup-dr backup-vaults update VAULT_NAME \
              --location=LOCATION \
              --access-restriction=WITHIN_PROJECT
            ```
    refs:
      - url: https://cloud.google.com/backup-disaster-recovery/docs/concepts/backup-vault
        title: Backup vaults overview
  - uid: mondoo-gcp-security-backupdr-vault-access-restricted-gcp
    filters: asset.platform == 'gcp-project'
    mql: |
      gcp.project.backupdr.backupVaults.all(
        accessRestriction != "UNRESTRICTED" &&
        accessRestriction != "ACCESS_RESTRICTION_UNSPECIFIED"
      )
  - uid: mondoo-gcp-security-backupdr-vault-access-restricted-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_backup_dr_backup_vault')
    mql: |
      terraform.resources('google_backup_dr_backup_vault').all(
        arguments.access_restriction != empty &&
        arguments.access_restriction != "UNRESTRICTED" &&
        arguments.access_restriction != "ACCESS_RESTRICTION_UNSPECIFIED"
      )
  - uid: mondoo-gcp-security-backupdr-vault-access-restricted-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_backup_dr_backup_vault')
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_backup_dr_backup_vault').all(
        change.after['access_restriction'] != empty &&
        change.after['access_restriction'] != "UNRESTRICTED" &&
        change.after['access_restriction'] != "ACCESS_RESTRICTION_UNSPECIFIED"
      )
  - uid: mondoo-gcp-security-backupdr-vault-access-restricted-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'google_backup_dr_backup_vault')
    mql: |
      terraform.state.resources.where(type == 'google_backup_dr_backup_vault').all(
        values['access_restriction'] != empty &&
        values['access_restriction'] != "UNRESTRICTED" &&
        values['access_restriction'] != "ACCESS_RESTRICTION_UNSPECIFIED"
      )
  - uid: mondoo-gcp-security-vertexai-endpoint-cmek-encryption
    title: Ensure Vertex AI endpoints are encrypted with CMEK
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-gcp-security-vertexai-endpoint-cmek-encryption-gcp
        tags:
          mondoo.com/filter-title: GCP Vertex AI
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-vertexai-endpoint-cmek-encryption-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-vertexai-endpoint-cmek-encryption-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-vertexai-endpoint-cmek-encryption-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Vertex AI endpoints are configured to use customer-managed encryption keys (CMEK) rather than Google-managed default keys. By default, Vertex AI encrypts endpoint data with keys that Google controls, giving organizations no ability to independently revoke access or audit key usage for potentially sensitive prediction workloads.

        **Why this matters**

        - **Key control:** CMEK gives organizations direct authority over the key lifecycle for endpoint data, including the ability to set custom rotation policies independent of Google's defaults.
        - **Revocability:** Disabling or destroying the Cloud KMS key immediately prevents access to encrypted endpoint data, providing a rapid containment option unavailable with Google-managed encryption.
        - **Audit visibility:** Key usage events are recorded in Cloud Audit Logs for Cloud KMS, giving organizations a traceable record of all encryption operations on endpoint artifacts.
        - **Compliance alignment:** AI and ML workloads that process regulated data often fall under frameworks requiring customer-controlled encryption for stored artifacts.

        **Risk mitigation**

        - **Data exfiltration:** Revoking the CMEK key terminates access to endpoint data even when other credentials remain active, providing a containment lever that does not depend on credential rotation speed.
        - **Insider threat:** Separating key management from endpoint access means that a compromised Vertex AI credential alone is insufficient to decrypt protected endpoint artifacts.
      audit: |
        ### Audit via Console

        1. In the Google Cloud Console, navigate to **Vertex AI > Online prediction > Endpoints**.
        2. Click each endpoint name to open its details.
        3. Under the **Details** section, look for the **Encryption** field.

        A passing endpoint shows a Cloud KMS key name under **Encryption** (customer-managed encryption key). A failing endpoint shows no encryption key configured or shows only Google-managed encryption.

        ### Audit via CLI

        1. List all Vertex AI endpoints and their encryption specification:

        ```bash
        gcloud ai endpoints list \
          --region=REGION \
          --format="table(name,displayName,encryptionSpec.kmsKeyName)"
        ```

        A passing endpoint returns a KMS key name in the `KMS_KEY_NAME` column. A failing endpoint returns an empty value in that column.
      remediation:
        - id: terraform
          desc: |
            To ensure Vertex AI endpoints are encrypted with CMEK in Terraform, configure CMEK encryption when creating a Vertex AI endpoint:

            ```hcl
            resource "google_vertex_ai_endpoint" "example" {
              name         = "example-endpoint"
              display_name = "Example Endpoint"
              location     = "us-central1"

              encryption_spec {
                kms_key_name = google_kms_crypto_key.example.id
              }
            }

            resource "google_kms_crypto_key" "example" {
              name     = "example-key"
