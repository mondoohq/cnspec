  - uid: mondoo-gcp-security-cloud-kms-keyring-not-global-location
    title: Ensure KMS keyrings are not in the global location
    impact: 40
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: false
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-12
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-10
      compliance/pci-dss-4: pcidss-requirement-3-6-1
      compliance/soc2-2017: soc2-control-cc6-1-11
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-gcp-security-cloud-kms-keyring-not-global-location-gcp
        tags:
          mondoo.com/filter-title: GCP Cloud KMS Keyring
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-cloud-kms-keyring-not-global-location-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-kms-keyring-not-global-location-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-kms-keyring-not-global-location-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Cloud KMS keyrings are created in a specific regional location rather than the `global` location. The `global` location allows cryptographic operations to be performed in any Google Cloud region, which makes it impossible to guarantee that key material is processed within a specific geographic boundary required by data residency regulations.

        **Why this matters**

        - **Data residency compliance:** Regulations such as GDPR, industry-specific frameworks, and contractual obligations may require that cryptographic operations occur within defined geographic jurisdictions; `global` keyrings cannot satisfy these requirements.
        - **Reduced audit surface:** Regional keyrings provide a clear, verifiable boundary for where keys are stored and where encrypt and decrypt operations execute, which simplifies compliance audits and evidence collection.
        - **Sovereignty controls:** Organizations operating in regulated industries or government sectors often must demonstrate that key material never leaves approved regions; this is only possible with regional keyrings.

        **Risk mitigation**

        - **Use regional keyrings for all new keys:** When creating KMS keyrings, always specify a concrete regional location such as `us-central1` or `europe-west1` instead of `global`.
        - **Migrate existing global keyrings:** Because keyring location cannot be changed after creation, create new regional keyrings and keys, then re-encrypt data with the regional keys and schedule the old global key versions for destruction once migration is complete.
        - **Enforce via organization policy:** Apply the `constraints/gcp.resourceLocations` organization policy to restrict allowed KMS resource locations to only approved regions, preventing future global keyring creation.
      audit: |
        ### Audit via Console

        1. Sign in to the [Google Cloud Console](https://console.cloud.google.com).
        2. Navigate to **Security** > **Key Management**.
        3. For each key ring listed, check the **Location** column.

        A passing key ring shows a specific regional location such as `us-central1` or `europe-west1`. A failing key ring shows `global` as the location.

        ### Audit via CLI

        1. List all key rings across all locations and check their location field:

        ```bash
        gcloud kms keyrings list --location=global --format="table(name,location)"
        ```

        To list key rings in a specific region for comparison:

        ```bash
        gcloud kms keyrings list --location=us-central1 --format="table(name,location)"
        ```

        A passing key ring returns a specific regional location such as `us-central1`. A failing key ring returns `global` as the location.
      remediation:
        - id: terraform
          desc: |
            To ensure KMS keyrings are not in the global location in Terraform, create keyrings in a specific regional location:

            ```hcl
            resource "google_kms_key_ring" "example" {
              name     = "example-keyring"
              location = "us-central1"  # Use a specific region, not "global"
            }
            ```
        - id: console
          desc: |
            To ensure KMS keyrings are not in the global location using the Google Cloud Console, KMS keyring location cannot be changed after creation. To create a properly located keyring:

            1. Navigate to **Security** > **Key Management** in the GCP Console.
            2. Select **Create Key Ring**.
            3. Under **Key ring location**, select a specific region such as us-central1 instead of 'global'.
            4. Complete the key ring creation.
            5. For existing global keyrings, create a new regional keyring, create new keys, and re-encrypt data with the new keys.
        - id: cli
          desc: |
            To ensure KMS keyrings are not in the global location using the Google Cloud CLI, create a keyring in a specific regional location:

            ```bash
            gcloud kms keyrings create KEY_RING_NAME \
              --location=us-central1
            ```

            Avoid using `--location=global`. For existing global keyrings, create a new regional keyring and migrate:

            ```bash
            # Create new regional keyring
            gcloud kms keyrings create NEW_KEY_RING \
              --location=us-central1

            # Create new key in regional keyring
            gcloud kms keys create NEW_KEY \
              --keyring=NEW_KEY_RING \
              --location=us-central1 \
              --purpose=encryption \
              --rotation-period=7776000s
            ```
    refs:
      - url: https://cloud.google.com/kms/docs/reference
        title: Cloud KMS Documentation
