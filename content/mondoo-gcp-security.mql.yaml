  - uid: mondoo-gcp-security-bigquery-views-no-legacy-sql
    title: Ensure that BigQuery views do not use Legacy SQL
    impact: 40
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: false
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-ps-01
      compliance/nist-sp-800-53-rev5: false
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-2
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc7-1-1
      compliance/vda-isa-5: false
    variants:
      - uid: mondoo-gcp-security-bigquery-views-no-legacy-sql-gcp
        tags:
          mondoo.com/filter-title: GCP BigQuery Dataset
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-bigquery-views-no-legacy-sql-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-bigquery-views-no-legacy-sql-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-bigquery-views-no-legacy-sql-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that BigQuery views are defined using GoogleSQL (standard SQL) rather than Legacy SQL, which is identified by the `useLegacySql` field being `false`. By default, new views created through the BigQuery API and console use GoogleSQL, but views created through older tooling or migrated from legacy systems may still use Legacy SQL.

        **Why this matters**

        - **Column-level security requires GoogleSQL:** Policy tag-based column security is only enforceable on views defined with GoogleSQL; Legacy SQL views bypass fine-grained column access controls, potentially exposing sensitive fields to unauthorized readers.
        - **Row-level security incompatibility:** Row access policies cannot be applied to or through Legacy SQL views, leaving data-level access control ineffective for users querying via those views.
        - **Dynamic data masking blocked:** The data masking feature that restricts sensitive column values based on caller identity requires GoogleSQL; Legacy SQL views expose unmasked data to any user with view access.
        - **SQL injection surface:** Legacy SQL has limited support for parameterized queries, increasing the risk of injection vulnerabilities in application code that constructs queries against Legacy SQL views.

        **Risk mitigation**

        - **Migrate Legacy SQL views to GoogleSQL:** Recreate affected views using GoogleSQL syntax, validate query equivalence against test data, and drop the Legacy SQL originals.
        - **Audit views regularly for `useLegacySql: true`:** Use the `bq show` command or the INFORMATION_SCHEMA to identify all views in a project that still use Legacy SQL and prioritize them for migration.
        - **Enforce GoogleSQL in new view creation:** Establish a development standard or Terraform module that always sets `use_legacy_sql = false`, preventing new Legacy SQL views from being introduced.
      audit: |
        ### Audit via Console

        1. In the Google Cloud console, go to the **BigQuery** page.
        2. In the Explorer panel, expand your project and dataset, then select a view (identified by the view icon).
        3. Select the **Details** tab.
        4. Under **View query**, confirm the **SQL dialect** shows **Standard SQL** (GoogleSQL).

        A passing view shows **Standard SQL** as the SQL dialect. A failing view shows **Legacy SQL** as the dialect.

        ### Audit via CLI

        1. Show the details of a specific view:

        ```bash
        bq show --format=prettyjson PROJECT_ID:DATASET_ID.VIEW_ID
        ```

        2. Review the `view` object in the output and check the `useLegacySql` field.

        A passing view returns `"useLegacySql": false` in the view definition. A failing view returns `"useLegacySql": true`.
      remediation:
        - id: terraform
          desc: |
            To ensure that BigQuery views do not use Legacy SQL in Terraform, ensure the `use_legacy_sql` attribute is set to `false` in the `view` block of your BigQuery table resource:

            ```hcl
            resource "google_bigquery_table" "example" {
              dataset_id = google_bigquery_dataset.example.dataset_id
              table_id   = "example_view"

              view {
                query          = "SELECT column1, column2 FROM `project.dataset.table`"
                use_legacy_sql = false
              }
            }
            ```
        - id: console
          desc: |
            To ensure that BigQuery views do not use Legacy SQL using the Google Cloud Console:

            1. In the Google Cloud console, go to the **BigQuery** page.
            2. Navigate to the dataset and select the view.
            3. Select **Details** and check whether the view uses Legacy SQL.
            4. If it does, recreate the view using GoogleSQL (standard SQL) syntax.
        - id: cli
          desc: |
            To ensure that BigQuery views do not use Legacy SQL using the Google Cloud CLI:

            1. Check the view definition:

            ```bash
            bq show --format=prettyjson PROJECT_ID:DATASET_ID.VIEW_ID
            ```

            2. If `useLegacySql` is `true`, recreate the view with standard SQL:

            ```bash
            bq mk --use_legacy_sql=false --view "SELECT column1, column2 FROM \`project.dataset.table\`" PROJECT_ID:DATASET_ID.VIEW_ID
            ```
    refs:
      - url: https://cloud.google.com/bigquery/docs/reference/standard-sql/migrating-from-legacy-sql
        title: Migrating from Legacy SQL to GoogleSQL
  - uid: mondoo-gcp-security-bigquery-views-no-legacy-sql-gcp
    filters: asset.platform == "gcp-bigquery-dataset"
    mql: gcp.bigquery.dataset.tables.where(type == "VIEW").all(useLegacySQL == false)
  - uid: mondoo-gcp-security-bigquery-views-no-legacy-sql-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' &&
        terraform.resources.contains(nameLabel == 'google_bigquery_table')
    mql: |
      terraform.resources('google_bigquery_table').where(
        blocks.where(type == 'view') != empty
      ).all(
        blocks.where(type == 'view').all(arguments.use_legacy_sql == false)
      )
  - uid: mondoo-gcp-security-bigquery-views-no-legacy-sql-terraform-plan
    filters: |
      asset.platform == 'terraform-plan'
      terraform.plan.resourceChanges.contains(type == 'google_bigquery_table')
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_bigquery_table').where(
        change.after['view'] != empty
      ).all(
        change.after['view'].all(_['use_legacy_sql'] == false)
      )
  - uid: mondoo-gcp-security-bigquery-views-no-legacy-sql-terraform-state
    filters: |
      asset.platform == 'terraform-state'
      terraform.state.resources.contains(type == 'google_bigquery_table')
    mql: |
      terraform.state.resources.where(type == 'google_bigquery_table').where(
        values['view'] != empty
      ).all(
        values['view'].all(_['use_legacy_sql'] == false)
      )
