  - uid: mondoo-gcp-security-bigquery-tables-cmek-encryption
    title: Ensure all BigQuery tables are encrypted with CMEK
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-gcp-security-bigquery-tables-cmek-encryption-gcp
        tags:
          mondoo.com/filter-title: GCP BigQuery Dataset
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-bigquery-tables-cmek-encryption-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-bigquery-tables-cmek-encryption-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-bigquery-tables-cmek-encryption-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that all individual BigQuery tables within a dataset are encrypted with a customer-managed encryption key (CMEK), confirming comprehensive encryption coverage at the table level. Tables created before a dataset-level CMEK default was configured, or tables explicitly provisioned with a different encryption setting, may use Google-managed keys even when the parent dataset has a CMEK default.

        **Why this matters**

        - **Encryption gaps from preexisting tables:** Tables created before a dataset CMEK default was applied retain Google-managed encryption unless explicitly re-encrypted; checking each table independently closes this gap.
        - **Override vulnerabilities:** Individual table creation can specify an encryption key that overrides the dataset default, potentially using a weaker key or no CMEK at all if misconfigured.
        - **Compliance audit scope:** Compliance audits for CMEK often require verification at the resource level, not just the container; a compliant dataset with non-compliant tables still fails a thorough audit.
        - **Key revocation effectiveness:** Revoking a dataset-level CMEK key does not affect tables encrypted with their own individual keys, so table-level verification ensures revocation is comprehensive.

        **Risk mitigation**

        - **Audit all tables for CMEK coverage:** Enumerate every table in each dataset and verify the `encryptionConfiguration.kmsKeyName` field is populated with a customer-managed key.
        - **Re-encrypt legacy tables:** For tables lacking CMEK, copy them to new table definitions that specify the appropriate Cloud KMS key, then delete the original unencrypted table.
        - **Enforce CMEK via dataset defaults going forward:** Ensure every dataset has a `defaultEncryptionConfiguration` so all tables created after that point automatically inherit CMEK without requiring individual configuration.
      audit: |
        ### Audit via Console

        1. In the Google Cloud console, go to the **BigQuery** page.
        2. In the Explorer panel, expand your project and dataset, then select a table.
        3. Select the **Details** tab.
        4. Under **Table info**, review the **Encryption** field to confirm it shows **Customer-managed** with a Cloud KMS key name.

        A passing table shows a customer-managed encryption key in the Encryption field. A failing table shows **Google-managed** encryption with no CMEK specified.

        ### Audit via CLI

        1. Show the details of a specific table and check its encryption configuration:

        ```bash
        bq show --format=prettyjson PROJECT_ID:DATASET_ID.TABLE_ID
        ```

        2. Review the `encryptionConfiguration` field in the output for a `kmsKeyName` value.

        A passing table returns an `encryptionConfiguration` object with a non-empty `kmsKeyName` field. A failing table returns no `encryptionConfiguration` field or a `kmsKeyName` with an empty value.
      remediation:
        - id: terraform
          desc: |
            To ensure all BigQuery tables are encrypted with CMEK in Terraform, configure CMEK encryption on individual BigQuery tables:

            ```hcl
            resource "google_bigquery_table" "example" {
              dataset_id = google_bigquery_dataset.example.dataset_id
              table_id   = "example_table"

              encryption_configuration {
                kms_key_name = google_kms_crypto_key.example.id
              }

              schema = <<EOF
              [
                {
                  "name": "column1",
                  "type": "STRING"
                }
              ]
              EOF
            }
            ```

            Alternatively, ensure the dataset has a default CMEK configured so all new tables inherit it:

            ```hcl
            resource "google_bigquery_dataset" "example" {
              dataset_id = "example_dataset"
              location   = "US"

              default_encryption_configuration {
                kms_key_name = google_kms_crypto_key.example.id
              }
            }
            ```
        - id: console
          desc: |
            To ensure all BigQuery tables are encrypted with CMEK using the Google Cloud Console:

            1. In the Google Cloud console, go to the **BigQuery** page.
            2. Navigate to the dataset and select the table.
            3. Select **Details** and review the **Encryption** section.
            4. If the table uses Google-managed encryption, recreate it with CMEK or set a dataset-level default CMEK and copy the data.
        - id: cli
          desc: |
            To ensure all BigQuery tables are encrypted with CMEK using the Google Cloud CLI:

            1. Check the encryption configuration of a table:

            ```bash
            bq show --format=prettyjson PROJECT_ID:DATASET_ID.TABLE_ID
            ```

            2. To copy a table with CMEK encryption:

            ```bash
            bq cp --destination_kms_key=projects/PROJECT_ID/locations/LOCATION/keyRings/KEY_RING/cryptoKeys/KEY PROJECT_ID:DATASET_ID.SOURCE_TABLE PROJECT_ID:DATASET_ID.DEST_TABLE
            ```
    refs:
      - url: https://cloud.google.com/bigquery/docs/best-practices-security
        title: BigQuery Security Best Practices
