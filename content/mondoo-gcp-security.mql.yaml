    filters: asset.platform == 'gcp-project'
    mql: |
      gcp.project.modelArmor.templates.all(
        filterConfig['maliciousUriFilterSettings']['filterEnforcement'] == "ENABLED"
      )
  - uid: mondoo-gcp-security-model-armor-rai-filters
    title: Ensure Model Armor templates have RAI filters configured
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: false
      compliance/dora: false
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-26
      compliance/nis-2: false
      compliance/nist-csf-1: nist-csf-1-pr-ds-5
      compliance/nist-csf-2: nist-csf-2-pr-ds-10
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-10
      compliance/nist-sp-800-171: false
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc7-1-2
      compliance/vda-isa-5: false
    variants:
      - uid: mondoo-gcp-security-model-armor-rai-filters-gcp
        tags:
          mondoo.com/filter-title: GCP Project
          mondoo.com/filter-icon: gcp
    docs:
      desc: |
        This check ensures that Google Cloud Model Armor templates have at least one Responsible AI (RAI) filter category configured to detect harmful content. RAI filters screen for harmful content categories including sexually explicit material, hate speech, harassment, and dangerous content in both prompts and model responses.

        **Why this matters**

        - **Unmoderated harmful output:** Without RAI filters, LLM applications may generate or pass through harmful content that violates organizational policies, regulatory requirements, or terms of service.
        - **Reputational and legal risk:** Harmful content in LLM responses, including hate speech or dangerous instructions, creates direct reputational damage and potential legal liability for the organization operating the application.
        - **User safety:** End users of LLM applications have a reasonable expectation that the application will not produce content that harasses, demeans, or puts them at risk.
        - **No default filtering:** RAI filters are not enabled in Model Armor templates by default; each content category must be explicitly configured.

        **Risk mitigation**

        - **Content policy enforcement:** Configuring all four RAI filter categories provides comprehensive automated content moderation that enforces organizational acceptable-use policies at the AI gateway layer.
        - **Regulatory coverage:** Enabled RAI filters provide a documented, auditable content safety control that supports compliance with AI governance frameworks and sector-specific regulations.
        - **Defense in depth:** RAI filters operate alongside prompt injection and URI filters, ensuring that Model Armor templates address the full spectrum of LLM-specific content and input risks.
      audit: |
        ### Audit via Console

        1. In the Google Cloud Console, navigate to **Security** > **Model Armor**.
        2. Select **Templates** and open each template.
        3. Under **Filter Configuration**, review the **Responsible AI Filters** section.
        4. Verify that filters are configured for each harmful content category: sexually explicit, hate speech, harassment, and dangerous content.

        A passing template shows at least one RAI filter category configured in the Responsible AI Filters section. A failing template shows no RAI filters configured.

        ### Audit via CLI

        1. List all Model Armor templates in the project:

        ```bash
        gcloud model-armor templates list --location=LOCATION --format=json
        ```

        2. For each template, review the `filterConfig.raiSettings.raiFilters` array. The array must be non-empty and should include entries for `SEXUALLY_EXPLICIT`, `HATE_SPEECH`, `HARASSMENT`, and `DANGEROUS`.

        A passing template returns a non-empty `raiFilters` array. A failing template returns an empty `raiFilters` array or omits the `raiSettings` block entirely.
      remediation:
        - id: terraform
          desc: |
            Configure all four RAI filter categories on the template:

            ```hcl
            resource "google_model_armor_template" "secure" {
              template_id = "secure-template"
              location    = "us-central1"

              filter_config {
                rai_settings {
                  rai_filters {
                    filter_type      = "SEXUALLY_EXPLICIT"
                    confidence_level = "MEDIUM_AND_ABOVE"
                  }
                  rai_filters {
                    filter_type      = "HATE_SPEECH"
                    confidence_level = "MEDIUM_AND_ABOVE"
                  }
                  rai_filters {
                    filter_type      = "HARASSMENT"
                    confidence_level = "MEDIUM_AND_ABOVE"
                  }
                  rai_filters {
                    filter_type      = "DANGEROUS"
                    confidence_level = "MEDIUM_AND_ABOVE"
                  }
                }
              }
            }
            ```
        - id: console
          desc: |
            To configure RAI filters using the Google Cloud Console:

            1. Navigate to **Security > Model Armor** in the Google Cloud Console.
            2. Select the template to edit, or create a new template.
            3. Under **Filter Configuration**, enable **Responsible AI Filters**.
            4. Configure filters for all categories: sexually explicit, hate speech, harassment, and dangerous content.
            5. Set appropriate confidence levels for each category.
            6. Save the template.
        - id: cli
          desc: |
            To configure RAI filters using the Google Cloud CLI:

            ```bash
            gcloud model-armor templates update TEMPLATE_ID \
              --location=LOCATION \
              --rai-settings-filters='[{"filterType": "SEXUALLY_EXPLICIT", "confidenceLevel": "MEDIUM_AND_ABOVE"}, {"filterType": "HATE_SPEECH", "confidenceLevel": "MEDIUM_AND_ABOVE"}, {"filterType": "HARASSMENT", "confidenceLevel": "MEDIUM_AND_ABOVE"}, {"filterType": "DANGEROUS", "confidenceLevel": "MEDIUM_AND_ABOVE"}]'
            ```
    refs:
      - url: https://cloud.google.com/security/products/model-armor
        title: Google Cloud Model Armor overview
  - uid: mondoo-gcp-security-model-armor-rai-filters-gcp
    filters: asset.platform == 'gcp-project'
    mql: |
      gcp.project.modelArmor.templates.all(
        filterConfig['raiSettings']['raiFilters'] != empty
      )
  - uid: mondoo-gcp-security-model-armor-sdp-enabled
    title: Ensure Model Armor templates have Sensitive Data Protection
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-dsp-17
      compliance/dora: false
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-12
      compliance/nis-2: false
      compliance/nist-csf-1: nist-csf-1-pr-ds-5
      compliance/nist-csf-2: nist-csf-2-pr-ds-10
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-4
      compliance/nist-sp-800-171: false
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc6-7-1
      compliance/vda-isa-5: vda-isa-5-7-1-2
    variants:
      - uid: mondoo-gcp-security-model-armor-sdp-enabled-gcp
        tags:
          mondoo.com/filter-title: GCP Project
          mondoo.com/filter-icon: gcp
    docs:
      desc: |
        This check ensures that all Google Cloud Model Armor templates are configured with Sensitive Data Protection (SDP) enabled. By default SDP is not required on new templates, leaving LLM prompts and responses without automated detection or redaction of sensitive information.

        **Why this matters**

        - **Data leakage prevention:** Users may inadvertently include credit card numbers, SSNs, or API keys in prompts that reach an LLM without any interception.
        - **Response filtering:** LLMs can surface sensitive information from their context window or training data, which SDP can detect and redact before delivery.
        - **Regulatory alignment:** Processing personally identifiable information, financial data, or health records through an LLM without content filtering creates exposure under multiple data-protection regimes.
        - **Audit trail:** SDP enforcement produces log events for flagged content, giving security teams visibility into what sensitive patterns are flowing through LLM applications.
        - **Defense in depth:** SDP supplements network controls and IAM by operating at the content layer, where traditional perimeter controls have no visibility.

        **Risk mitigation**

        - **Enable SDP on every template:** Configure each template with at least Basic mode so that well-known sensitive patterns are caught automatically.
        - **Prefer Advanced mode for regulated data:** Bind a Cloud DLP inspect template to the SDP configuration so organization-specific patterns and classifiers are applied in addition to the built-in detectors.
        - **Pair with blocking mode:** SDP filtering has no protective effect if the template's enforcement type is set to INSPECT_ONLY; combine SDP with INSPECT_AND_BLOCK to stop flagged content.
      audit: |
        ### Audit via Console

        1. In the Google Cloud Console, navigate to **Security** > **Model Armor**.
        2. Select **Templates** and open each template.
        3. Under **Filter Configuration**, review the **Sensitive Data Protection** section.
        4. Verify that Sensitive Data Protection is enabled, using either Basic or Advanced mode.

        A passing template shows Sensitive Data Protection enabled with either Basic or Advanced configuration. A failing template shows Sensitive Data Protection as disabled or not configured.

        ### Audit via CLI

        1. List all Model Armor templates in the project:

        ```bash
        gcloud model-armor templates list --location=LOCATION --format=json
        ```

        2. For each template, review the `filterConfig.sdpSettings` field. The field must be present and non-empty, containing either a `basicConfig` or `advancedConfig` block.

        A passing template returns a non-empty `sdpSettings` object in `filterConfig`. A failing template returns an empty or absent `sdpSettings` field.
      remediation:
        - id: terraform
          desc: |
            Enable SDP basic mode (or advanced if you want to bind your own DLP templates):

            ```hcl
            resource "google_model_armor_template" "secure" {
              template_id = "secure-template"
              location    = "us-central1"

              filter_config {
                sdp_settings {
                  basic_config {
                    filter_enforcement = "ENABLED"
                  }
                  # For advanced mode, replace basic_config with:
                  # advanced_config {
                  #   inspect_template    = google_data_loss_prevention_inspect_template.creds.id
                  #   deidentify_template = google_data_loss_prevention_deidentify_template.t.id
                  # }
                }
              }
            }
            ```
        - id: console
          desc: |
            To enable Sensitive Data Protection using the Google Cloud Console:

            1. Navigate to **Security > Model Armor** in the Google Cloud Console.
            2. Select the template to edit, or create a new template.
            3. Under **Filter Configuration**, enable **Sensitive Data Protection**.
            4. Choose either **Basic** mode (automatic detection) or **Advanced** mode (custom DLP inspect/deidentify templates).
            5. Save the template.
        - id: cli
          desc: |
            To enable Sensitive Data Protection using the Google Cloud CLI:

            ```bash
            gcloud model-armor templates update TEMPLATE_ID \
              --location=LOCATION \
              --basic-config-filter-enforcement=enabled
            ```
    refs:
      - url: https://cloud.google.com/security/products/model-armor
        title: Google Cloud Model Armor overview
  - uid: mondoo-gcp-security-model-armor-sdp-enabled-gcp
    filters: asset.platform == 'gcp-project'
    mql: |
      gcp.project.modelArmor.templates.all(
        filterConfig['sdpSettings'] != empty
      )
  - uid: mondoo-gcp-security-model-armor-blocking-mode
    title: Ensure Model Armor templates enforce blocking mode
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: false
      compliance/dora: false
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-26
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-pt-4
      compliance/nist-csf-2: nist-csf-2-pr-ds-10
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-10
      compliance/nist-sp-800-171: false
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc7-1-2
      compliance/vda-isa-5: vda-isa-5-5-2-3
    variants:
      - uid: mondoo-gcp-security-model-armor-blocking-mode-gcp
        tags:
          mondoo.com/filter-title: GCP Project
          mondoo.com/filter-icon: gcp
    docs:
      desc: |
        This check ensures that every Google Cloud Model Armor template is configured to block harmful content rather than only log it. Templates operate in either INSPECT_ONLY mode, which records detections but lets content through, or INSPECT_AND_BLOCK mode, which actively stops flagged requests and responses.

        **Why this matters**

        - **Passive detection provides no protection:** INSPECT_ONLY produces visibility into threats but allows prompt injections, malicious URIs, and sensitive data to reach the LLM or the end user unimpeded.
        - **Production risk:** Templates left in inspect-only mode after an evaluation period retain zero protective value, yet signal to auditors that controls are in place.
        - **Attack surface:** Detected threats that are not blocked remain exploitable; the detection record simply documents the breach rather than preventing it.
        - **Compliance posture:** Many security frameworks require controls to actively prevent unauthorized data processing, not merely detect it.

        **Risk mitigation**

        - **Switch templates to INSPECT_AND_BLOCK:** Set `templateMetadata.enforcementType` to `INSPECT_AND_BLOCK` on every production template to activate active blocking.
        - **Reserve INSPECT_ONLY for pre-production:** Use inspect-only mode only during initial filter tuning in non-production environments, then promote to blocking before go-live.
        - **Review detections regularly:** Even in blocking mode, review logged detection events to calibrate filter sensitivity and reduce false positives over time.
      audit: |
        ### Audit via Console

        1. In the Google Cloud Console, navigate to **Security** > **Model Armor**.
        2. Select **Templates** and open each template.
        3. Under **Template Metadata**, review the **Enforcement Type** setting.
        4. Verify that the enforcement type is set to **Inspect and Block**, not **Inspect Only**.

        A passing template shows an enforcement type of **Inspect and Block**. A failing template shows an enforcement type of **Inspect Only**.

        ### Audit via CLI

        1. Retrieve the template details via the REST API to check the enforcement type (`gcloud model-armor templates describe` does not expose `templateMetadata.enforcementType` in all SDK versions):

        ```bash
        curl -s \
          -H "Authorization: Bearer $(gcloud auth print-access-token)" \
          "https://modelarmor.googleapis.com/v1/projects/PROJECT_ID/locations/LOCATION/templates/TEMPLATE_ID"
        ```

        2. Review the `templateMetadata.enforcementType` field in the response. The value must not be `INSPECT_ONLY`.

        A passing template returns an `enforcementType` of `INSPECT_AND_BLOCK` or omits the field (which defaults to blocking). A failing template returns `"enforcementType": "INSPECT_ONLY"`.
      remediation:
        - id: terraform
          desc: |
            ```hcl
            resource "google_model_armor_template" "secure" {
              template_id = "secure-template"
              location    = "us-central1"

              template_metadata {
                enforcement_type = "INSPECT_AND_BLOCK"
              }
            }
            ```
        - id: console
          desc: |
            To set the enforcement type to blocking mode using the Google Cloud Console:

            1. Navigate to **Security > Model Armor** in the Google Cloud Console.
            2. Select the template to edit.
            3. Under **Template Metadata**, set **Enforcement Type** to **Inspect and Block**.
            4. Save the template.
        - id: cli
          desc: |
            `gcloud model-armor templates update` does not expose an `enforcementType` flag, so use the REST API or Terraform (above):

            ```bash
            curl -X PATCH \
              -H "Authorization: Bearer $(gcloud auth print-access-token)" \
              -H "Content-Type: application/json" \
              -d '{"templateMetadata":{"enforcementType":"INSPECT_AND_BLOCK"}}' \
              "https://modelarmor.googleapis.com/v1/projects/PROJECT/locations/LOCATION/templates/TEMPLATE_ID?updateMask=templateMetadata.enforcementType"
            ```
    refs:
      - url: https://cloud.google.com/security/products/model-armor
        title: Google Cloud Model Armor overview
  - uid: mondoo-gcp-security-model-armor-blocking-mode-gcp
    filters: asset.platform == 'gcp-project'
    mql: |
      gcp.project.modelArmor.templates.all(
        templateMetadata['enforcementType'] != "INSPECT_ONLY"
      )
  - uid: mondoo-gcp-security-model-armor-sanitize-logging
    title: Ensure Model Armor templates log sanitize operations
    impact: 50
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-pr-pt-1
      compliance/nist-csf-2: nist-csf-2-pr-ps-04
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    variants:
      - uid: mondoo-gcp-security-model-armor-sanitize-logging-gcp
        tags:
          mondoo.com/filter-title: GCP Project
          mondoo.com/filter-icon: gcp
    docs:
      desc: |
        This check ensures that every Google Cloud Model Armor template has sanitize operation logging enabled. By default, `logSanitizeOperations` is not set to true on new templates, meaning content that Model Armor flags, modifies, or blocks is not recorded to Cloud Logging.

        **Why this matters**

        - **Incident response:** Without sanitize logs, security teams have no record of what content was detected or blocked, making post-incident investigation impossible.
        - **Filter effectiveness:** Log data reveals which filter categories trigger most frequently, enabling teams to tune confidence thresholds and reduce false positives.
        - **Compliance evidence:** Audit logs that demonstrate content filtering was active and effective are required evidence under frameworks that mandate security-event logging.
        - **Forensic attribution:** Sanitize logs correlate blocked content with the caller identity and timestamp, providing the data needed to investigate abuse patterns.

        **Risk mitigation**

        - **Enable logging on all templates:** Set `logSanitizeOperations = true` in `templateMetadata` on every Model Armor template, including those used in development.
        - **Route logs to a secure sink:** Export Model Armor logs to Cloud Logging with a log sink backed by tamper-resistant storage so that detection events cannot be deleted after a breach.
        - **Alert on high-volume detections:** Create log-based alerts so that a sudden spike in blocked content triggers an investigation before it indicates a sustained attack.
      audit: |
        ### Audit via Console

        1. In the Google Cloud Console, navigate to **Security** > **Model Armor**.
        2. Select **Templates** and open each template.
        3. Under **Template Metadata**, review the **Log Sanitize Operations** setting.
        4. Verify that the setting is enabled.

        A passing template shows **Log Sanitize Operations** as enabled. A failing template shows it as disabled or not configured.

        ### Audit via CLI

        1. List all Model Armor templates in the project:

        ```bash
        gcloud model-armor templates list --location=LOCATION --format=json
        ```

        2. For each template, review the `templateMetadata.logSanitizeOperations` field. The value must be `true`.

        A passing template returns `"logSanitizeOperations": true` in the `templateMetadata` block. A failing template returns `"logSanitizeOperations": false` or omits the field.
      remediation:
        - id: terraform
          desc: |
            ```hcl
            resource "google_model_armor_template" "secure" {
              template_id = "secure-template"
              location    = "us-central1"

              template_metadata {
                log_sanitize_operations = true
              }
            }
            ```
        - id: console
          desc: |
            To enable sanitize operation logging using the Google Cloud Console:

            1. Navigate to **Security > Model Armor** in the Google Cloud Console.
            2. Select the template to edit.
            3. Under **Template Metadata**, enable **Log Sanitize Operations**.
            4. Save the template.
        - id: cli
          desc: |
            To enable sanitize operation logging using the Google Cloud CLI:

            ```bash
            gcloud model-armor templates update TEMPLATE_ID \
              --location=LOCATION \
              --template-metadata-log-sanitize-operations
            ```
    refs:
      - url: https://cloud.google.com/security/products/model-armor
        title: Google Cloud Model Armor overview
  - uid: mondoo-gcp-security-model-armor-sanitize-logging-gcp
    filters: asset.platform == 'gcp-project'
    mql: |
      gcp.project.modelArmor.templates.all(
        templateMetadata['logSanitizeOperations'] == true
      )
  - uid: mondoo-gcp-security-model-armor-rai-confidence
    title: Ensure Model Armor RAI filters use adequate confidence
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: false
      compliance/dora: false
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-26
      compliance/nis-2: false
      compliance/nist-csf-1: nist-csf-1-pr-ds-5
      compliance/nist-csf-2: nist-csf-2-pr-ds-10
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-10
      compliance/nist-sp-800-171: false
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc7-1-2
      compliance/vda-isa-5: false
    variants:
      - uid: mondoo-gcp-security-model-armor-rai-confidence-gcp
        tags:
          mondoo.com/filter-title: GCP Project
          mondoo.com/filter-icon: gcp
    docs:
      desc: |
        This check ensures that every Responsible AI (RAI) filter configured in a Google Cloud Model Armor template uses a confidence level of LOW_AND_ABOVE or MEDIUM_AND_ABOVE, not HIGH. The HIGH confidence level catches only the most obvious violations, allowing borderline harmful content to pass undetected.

        **Why this matters**

        - **Narrow coverage:** HIGH confidence is tuned for precision over recall; it accepts false negatives as a design trade-off, leaving a large class of harmful content unblocked.
        - **Nuanced harm escapes:** Subtle forms of hate speech, veiled harassment, and indirect dangerous instructions are the categories most likely to pass a HIGH-only filter.
        - **Application reputation risk:** A single harmful output reaching an end user can damage user trust and expose the organization to regulatory or legal action.
        - **Layered defense gap:** RAI filters at LOW_AND_ABOVE or MEDIUM_AND_ABOVE provide significantly broader coverage with manageable false-positive rates for most production workloads.

        **Risk mitigation**

        - **Set confidence to MEDIUM_AND_ABOVE as a baseline:** This balances protection against false-positive noise for the majority of production use cases.
        - **Tune per category if needed:** Lower-risk categories may tolerate MEDIUM_AND_ABOVE while high-risk categories warrant LOW_AND_ABOVE; avoid using HIGH for any RAI filter type.
        - **Monitor false positive rates:** Review sanitize operation logs after lowering confidence levels and adjust thresholds based on observed traffic before full rollout.
      audit: |
        ### Audit via Console

        1. In the Google Cloud Console, navigate to **Security** > **Model Armor**.
        2. Select **Templates** and open each template.
        3. Under **Filter Configuration** > **Responsible AI Filters**, review the **Confidence Level** setting for each filter category.
        4. Verify that no filter category is set to **High** confidence only. Acceptable values are **Low and above** or **Medium and above**.

        A passing template shows each configured RAI filter at a confidence level of **Low and above** or **Medium and above**. A failing template shows one or more RAI filters set to **High** confidence only.

        ### Audit via CLI

        1. List all Model Armor templates in the project:

        ```bash
        gcloud model-armor templates list --location=LOCATION --format=json
        ```

        2. For each template, review the `filterConfig.raiSettings.raiFilters` array. For each entry, check the `confidenceLevel` field. The value must not be `HIGH`.

        A passing template returns `raiFilters` entries with `confidenceLevel` set to `LOW_AND_ABOVE` or `MEDIUM_AND_ABOVE`. A failing template returns at least one `raiFilters` entry with `confidenceLevel` set to `HIGH`.
      remediation:
        - id: terraform
          desc: |
            Set every RAI filter's `confidence_level` to `LOW_AND_ABOVE` or `MEDIUM_AND_ABOVE`, not `HIGH`:

            ```hcl
            resource "google_model_armor_template" "secure" {
              template_id = "secure-template"
              location    = "us-central1"

              filter_config {
                rai_settings {
                  rai_filters {
                    filter_type      = "SEXUALLY_EXPLICIT"
                    confidence_level = "MEDIUM_AND_ABOVE"
                  }
                  rai_filters {
                    filter_type      = "HATE_SPEECH"
                    confidence_level = "MEDIUM_AND_ABOVE"
                  }
                  rai_filters {
                    filter_type      = "HARASSMENT"
                    confidence_level = "MEDIUM_AND_ABOVE"
                  }
                  rai_filters {
                    filter_type      = "DANGEROUS"
                    confidence_level = "MEDIUM_AND_ABOVE"
                  }
                }
              }
            }
            ```
        - id: console
          desc: |
            To adjust RAI filter confidence levels using the Google Cloud Console:

            1. Navigate to **Security > Model Armor** in the Google Cloud Console.
            2. Select the template to edit.
            3. Under **Filter Configuration > Responsible AI Filters**, review each filter's confidence level.
            4. Set confidence levels to **Low and above** or **Medium and above** for broader coverage.
            5. Save the template.
        - id: cli
          desc: |
            To adjust RAI filter confidence levels, update the template with appropriate confidence settings:

            ```bash
            gcloud model-armor templates update TEMPLATE_ID \
              --location=LOCATION \
              --rai-settings-filters='[{"filterType": "SEXUALLY_EXPLICIT", "confidenceLevel": "MEDIUM_AND_ABOVE"}, {"filterType": "HATE_SPEECH", "confidenceLevel": "MEDIUM_AND_ABOVE"}, {"filterType": "HARASSMENT", "confidenceLevel": "MEDIUM_AND_ABOVE"}, {"filterType": "DANGEROUS", "confidenceLevel": "MEDIUM_AND_ABOVE"}]'
            ```

            Set `confidenceLevel` to `MEDIUM_AND_ABOVE` or `LOW_AND_ABOVE` for each RAI filter type.
    refs:
      - url: https://cloud.google.com/security/products/model-armor
        title: Google Cloud Model Armor overview
  - uid: mondoo-gcp-security-model-armor-rai-confidence-gcp
    filters: asset.platform == 'gcp-project'
    mql: |
      gcp.project.modelArmor.templates.all(
        filterConfig['raiSettings']['raiFilters'].all(
          _['confidenceLevel'] != "HIGH"
        )
      )
  - uid: mondoo-gcp-security-scc-notification-configs
    title: Ensure SCC notification configs are configured
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-03
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-16
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-ae-3
      compliance/nist-csf-2: nist-csf-2-de-ae-06
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-4
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-6
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-1-6-1
    variants:
      - uid: mondoo-gcp-security-scc-notification-configs-gcp
        tags:
          mondoo.com/filter-title: GCP Organization
          mondoo.com/filter-icon: gcp
    docs:
      desc: |
        This check ensures that at least one Google Cloud Security Command Center (SCC) notification configuration is defined at the organization level. Without a notification config, SCC findings accumulate silently and require manual console review to discover.

        **Why this matters**

        - **Timely detection:** Real-time forwarding of SCC findings to a Pub/Sub topic enables security teams to act on critical issues within minutes rather than during the next scheduled review cycle.
        - **Automated response:** Pub/Sub delivery unlocks automated workflows such as ticket creation, Slack alerts, and Cloud Function remediation triggers that cannot operate on console-only findings.
        - **Reduced dwell time:** Threats that go unnoticed until manual review give attackers more time to move laterally, exfiltrate data, or establish persistence.
        - **Audit coverage:** Notification configs create a verifiable record that findings are being actively monitored, which is a prerequisite for several compliance attestations.

        **Risk mitigation**

        - **Create at minimum one notification config:** Configure a Pub/Sub topic and attach it to an SCC notification config filtered to at least ACTIVE CRITICAL and HIGH findings.
        - **Verify end-to-end delivery:** After creating the config, confirm that a test finding or manual notification reaches the downstream subscriber without error.
        - **Scope notifications appropriately:** Use filters to direct different finding categories to different teams, preventing alert fatigue from routing all findings to a single channel.
      audit: |
        ### Audit via Console

        1. In the Google Cloud Console, navigate to **Security** > **Security Command Center**.
        2. Select **Settings** > **Notifications**.
        3. Verify that at least one notification configuration is listed.

        A passing organization shows one or more notification configs in the list. A failing organization shows no notification configs configured.

        ### Audit via CLI

        1. List all SCC notification configurations for the organization:

        ```bash
        gcloud scc notifications list ORGANIZATION_ID
        ```

        2. Review the output. At least one notification config must be present.

        A passing organization returns one or more notification config entries. A failing organization returns an empty list.
      remediation:
        - id: terraform
          desc: |
            ```hcl
            resource "google_pubsub_topic" "scc_findings" {
              project = "my-project"
              name    = "scc-findings"
            }

            resource "google_scc_notification_config" "active_critical" {
              config_id    = "active-critical"
              organization = var.organization_id
              description  = "Active critical findings"
              pubsub_topic = google_pubsub_topic.scc_findings.id

              streaming_config {
                filter = "state = \"ACTIVE\" AND severity = \"CRITICAL\""
              }
            }
            ```
        - id: console
          desc: |
            To configure SCC notifications using the Google Cloud Console:

            1. Navigate to **Security > Security Command Center** in the Google Cloud Console.
            2. Select **Settings > Notifications**.
            3. Select **Create Notification Config**.
            4. Enter a name and select a Pub/Sub topic for notification delivery.
            5. Optionally configure a filter to receive only specific finding types or severities.
            6. Save the notification config.
        - id: cli
          desc: |
            To configure SCC notifications using the Google Cloud CLI:

            ```bash
            gcloud scc notifications create NOTIFICATION_NAME \
              --organization=ORGANIZATION_ID \
              --pubsub-topic=projects/PROJECT_ID/topics/TOPIC_NAME \
              --filter='state="ACTIVE" AND severity="CRITICAL"'
            ```
    refs:
      - url: https://cloud.google.com/security-command-center/docs/how-to-notifications
        title: Setting up finding notifications
  - uid: mondoo-gcp-security-scc-notification-configs-gcp
    filters: asset.platform == 'gcp'
    mql: |
      gcp.organization.sccNotificationConfigs.length > 0
  - uid: mondoo-gcp-security-scc-bigquery-exports
    title: Ensure SCC BigQuery exports are configured
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-ae-3
      compliance/nist-csf-2: nist-csf-2-de-ae-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-4
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    variants:
      - uid: mondoo-gcp-security-scc-bigquery-exports-gcp
        tags:
          mondoo.com/filter-title: GCP Organization
          mondoo.com/filter-icon: gcp
    docs:
      desc: |
        This check ensures that at least one Google Cloud Security Command Center (SCC) BigQuery export is configured at the organization level. Without a BigQuery export, SCC findings are available only through the API and console, with limited long-term retention and no capacity for advanced analytics.

        **Why this matters**

        - **Long-term retention:** SCC's native retention period is insufficient for forensic investigations and compliance audits that require months or years of security event history.
        - **Advanced analytics:** BigQuery enables trend analysis, cross-correlation with other log sources, and custom dashboards that are not possible within the SCC console alone.
        - **Regulatory evidence:** Many compliance frameworks mandate that security events be retained for defined periods, often one year or more, which BigQuery exports support natively.
        - **Incident investigation:** Historical findings data stored in BigQuery allows analysts to reconstruct attack timelines long after the SCC console no longer surfaces the original finding.

        **Risk mitigation**

        - **Configure at least one BigQuery export:** Create an SCC BigQuery export targeting a dataset in a dedicated security project, filtered to at minimum ACTIVE findings.
        - **Protect the dataset:** Apply object-level IAM on the target BigQuery dataset to restrict who can query or delete findings, and consider enabling table-level access controls for sensitive finding categories.
        - **Set an appropriate table expiration:** Align the dataset's default table expiration with the organization's data-retention policy so findings are available for the required audit window.
      audit: |
        ### Audit via Console

        1. In the Google Cloud Console, navigate to **Security** > **Security Command Center**.
        2. Select **Settings** > **Continuous Exports**.
        3. Verify that at least one BigQuery export configuration is listed.

        A passing organization shows one or more BigQuery export configs in the Continuous Exports list. A failing organization shows no BigQuery export configs configured.

        ### Audit via CLI

        1. List all SCC BigQuery export configurations for the organization:

        ```bash
        gcloud scc bqexports list --organization=ORGANIZATION_ID
        ```

        2. Review the output. At least one BigQuery export config must be present.

        A passing organization returns one or more BigQuery export entries. A failing organization returns an empty list.
      remediation:
        - id: terraform
          desc: |
            ```hcl
            resource "google_bigquery_dataset" "scc_findings" {
              dataset_id  = "scc_findings"
              location    = "US"
              project     = "my-project"
              description = "Long-term retention of SCC findings"
            }

            resource "google_scc_v2_organization_scc_big_query_export" "active" {
              big_query_export_id = "active-findings"
              organization        = var.organization_id
              location            = "global"
              description         = "Active findings export"
              dataset             = google_bigquery_dataset.scc_findings.id
              filter              = "state = \"ACTIVE\""
            }
            ```
        - id: console
          desc: |
            To configure SCC BigQuery exports using the Google Cloud Console:

            1. Navigate to **Security > Security Command Center** in the Google Cloud Console.
            2. Select **Settings > Continuous Exports**.
            3. Select **Create BigQuery Export**.
            4. Enter a name and select a BigQuery dataset for export.
            5. Optionally configure a filter for specific finding types.
            6. Save the export configuration.
        - id: cli
          desc: |
            To configure SCC BigQuery exports using the Google Cloud CLI:

            ```bash
            gcloud scc bqexports create EXPORT_NAME \
              --organization=ORGANIZATION_ID \
              --dataset=projects/PROJECT_ID/datasets/DATASET_NAME \
              --filter='state="ACTIVE"'
            ```
    refs:
      - url: https://cloud.google.com/security-command-center/docs/how-to-export-data-bigquery
        title: Exporting findings to BigQuery
  - uid: mondoo-gcp-security-scc-bigquery-exports-gcp
    filters: asset.platform == 'gcp'
    mql: |
      gcp.organization.sccBigQueryExports.length > 0
  - uid: mondoo-gcp-security-alloydb-audit-logging-flags
    title: Ensure AlloyDB instances have audit logging database flags enabled
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-pr-pt-1
      compliance/nist-csf-2: nist-csf-2-pr-ps-04
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-12
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    variants:
      - uid: mondoo-gcp-security-alloydb-audit-logging-flags-gcp
        tags:
          mondoo.com/filter-title: GCP AlloyDB
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-alloydb-audit-logging-flags-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-alloydb-audit-logging-flags-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-alloydb-audit-logging-flags-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that every AlloyDB instance is configured with the database flags `log_connections = on`, `log_disconnections = on`, and `log_min_duration_statement` set to a non-negative value. By default, PostgreSQL-compatible engines omit these flags in favor of performance, leaving no per-session or slow-query audit trail.

        **Why this matters**

        - **Session invisibility:** Without `log_connections`, successful logins produce no log record, making it impossible to distinguish legitimate from attacker-controlled connections after a breach.
        - **Duration blind spot:** A `log_min_duration_statement` that is unset or set to `-1` means queries that exfiltrate large datasets generate no corresponding log event.
        - **Session correlation loss:** `log_disconnections` records session duration, which security teams use to correlate activity bursts with specific accounts; without it, that link is broken.
        - **Compliance gap:** SOC 2 CC7.2 and PCI DSS 10.2 require logging of database access events, which these three flags collectively satisfy.

        **Risk mitigation**

        - **Enable session logging:** Set `log_connections = on` and `log_disconnections = on` so every authentication event appears in Cloud Logging with caller identity and timestamp.
        - **Configure slow-query logging:** Set `log_min_duration_statement` to a threshold appropriate for the workload, such as 1000 ms, to capture queries that may indicate data exfiltration or misconfigured applications.
        - **Ship logs to a secure sink:** Route AlloyDB database logs to a Cloud Logging sink backed by immutable storage so the audit record cannot be modified or deleted after a security event.
      audit: |
        ### Audit via Console

        1. In the Google Cloud Console, navigate to **Databases** > **AlloyDB for PostgreSQL**.
        2. Select a cluster and then an instance.
        3. Click **Edit** and scroll to **Database flags**.
        4. Verify that the following flags are set: `log_connections = on`, `log_disconnections = on`, and `log_min_duration_statement` is set to a non-negative, non-empty value (not `-1` and not blank).

        A passing instance shows `log_connections = on`, `log_disconnections = on`, and a positive value for `log_min_duration_statement`. A failing instance is missing one or more of these flags or has `log_min_duration_statement` set to `-1` or empty.

        ### Audit via CLI

        1. Describe each AlloyDB instance and review its database flags:

        ```bash
        gcloud alloydb instances describe INSTANCE_ID \
          --cluster=CLUSTER_ID \
          --region=REGION \
          --format="value(databaseFlags)"
        ```

        2. Verify that the output includes `log_connections=on`, `log_disconnections=on`, and a `log_min_duration_statement` value that is not `-1` or empty.

        A passing instance returns database flags that include `log_connections=on`, `log_disconnections=on`, and a configured `log_min_duration_statement`. A failing instance is missing one or more of these flags or shows `log_min_duration_statement=-1`.
      remediation:
        - id: console
          desc: |
            Enable audit flags on each AlloyDB instance:

            1. Open **Databases** → **AlloyDB** → select the cluster → select the flagged instance → **Edit**.
            2. Under **Database flags**, add:
               - `log_connections` = `on`
               - `log_disconnections` = `on`
               - `log_min_duration_statement` = `1000` (or a value appropriate for your workload)
            3. Save. The instance will restart to apply the flags.
        - id: cli
          desc: |
            Update the AlloyDB instance with the audit flags:

            ```bash
            gcloud alloydb instances update <instance-id> \
              --cluster=<cluster-id> \
              --region=<region> \
              --database-flags=log_connections=on,log_disconnections=on,log_min_duration_statement=1000
            ```
        - id: terraform
          desc: |
            Ensure the AlloyDB instance in Terraform declares the required flags:

            ```hcl
            resource "google_alloydb_instance" "primary" {
              cluster       = google_alloydb_cluster.cluster.name
              instance_id   = "my-instance"
              instance_type = "PRIMARY"

              database_flags = {
                log_connections             = "on"
                log_disconnections          = "on"
                log_min_duration_statement  = "1000"
              }
            }
            ```
    refs:
      - url: https://cloud.google.com/alloydb/docs/reference/database-flags
        title: AlloyDB database flags
      - url: https://www.postgresql.org/docs/current/runtime-config-logging.html
        title: PostgreSQL - runtime logging configuration
  - uid: mondoo-gcp-security-alloydb-audit-logging-flags-gcp
    filters: asset.platform == 'gcp-alloydb-cluster'
    mql: |
      gcp.project.alloydbService.cluster.instances.all(
        databaseFlags['log_connections'] == 'on' &&
        databaseFlags['log_disconnections'] == 'on' &&
        databaseFlags['log_min_duration_statement'] != '' &&
        databaseFlags['log_min_duration_statement'] != null &&
        databaseFlags['log_min_duration_statement'] != '-1'
      )
  - uid: mondoo-gcp-security-alloydb-audit-logging-flags-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_alloydb_instance')
    mql: |
      terraform.resources('google_alloydb_instance').all(
        arguments['database_flags']['log_connections'] == 'on' &&
        arguments['database_flags']['log_disconnections'] == 'on' &&
        arguments['database_flags']['log_min_duration_statement'] != empty &&
        arguments['database_flags']['log_min_duration_statement'] != '' &&
        arguments['database_flags']['log_min_duration_statement'] != '-1'
      )
  - uid: mondoo-gcp-security-alloydb-audit-logging-flags-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_alloydb_instance')
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_alloydb_instance').all(
        change.after['database_flags']['log_connections'] == 'on' &&
        change.after['database_flags']['log_disconnections'] == 'on' &&
        change.after['database_flags']['log_min_duration_statement'] != empty &&
        change.after['database_flags']['log_min_duration_statement'] != '' &&
        change.after['database_flags']['log_min_duration_statement'] != '-1'
      )
  - uid: mondoo-gcp-security-alloydb-audit-logging-flags-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'google_alloydb_instance')
    mql: |
      terraform.state.resources.where(type == 'google_alloydb_instance').all(
        values['database_flags']['log_connections'] == 'on' &&
        values['database_flags']['log_disconnections'] == 'on' &&
        values['database_flags']['log_min_duration_statement'] != empty &&
        values['database_flags']['log_min_duration_statement'] != '' &&
        values['database_flags']['log_min_duration_statement'] != '-1'
      )
  # No Terraform variants: this check inspects historical Cloud SQL backupRuns for
  # CMEK drift (a backup run that pre-dates the instance's CMEK configuration).
  # Backup runs are operational telemetry produced by the API, not Terraform
  # resources, so there is no analog to evaluate at plan/apply time. The
  # instance-level CMEK configuration is already covered by
  # mondoo-gcp-security-cloud-sql-cmek-encryption.
  - uid: mondoo-gcp-security-cloud-sql-backup-cmek-encryption
    title: Ensure Cloud SQL backup runs inherit the instance CMEK key
    impact: 70
    filters: |
      asset.platform == 'gcp-sql-mysql' || asset.platform == 'gcp-sql-postgresql' || asset.platform == 'gcp-sql-sqlserver'
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    mql: |
      if (gcp.sql.instance.diskEncryptionConfiguration['kmsKeyName'] != empty) {
        gcp.sql.instance.backupRuns.all(
          diskEncryptionConfiguration['kmsKeyName'] != empty
        )
      }
    docs:
      desc: |
        This check ensures that every backup run on a CMEK-encrypted Cloud SQL instance is also encrypted with a customer-managed key. Cloud SQL backups are expected to inherit the instance's disk encryption key, but key rotations, instance migrations, or API-level configuration changes can introduce drift that leaves historical backups protected only by Google-managed keys.

        **Why this matters**

        - **CMEK guarantee erosion:** Revoking the instance's CMEK does not prevent restoring from a backup that was never encrypted with it, undermining the core value of customer key control.
        - **Audit log gap:** Cloud KMS key-usage logs do not reflect backup operations that used a Google-managed key, creating gaps in the encryption audit trail that auditors rely on.
        - **Compliance inaccuracy:** Attestations that claim all Cloud SQL data is encrypted with customer-managed keys become inaccurate when even one backup run slips to Google-managed encryption.
        - **Restore risk:** A restored instance from a non-CMEK backup re-materializes data outside the intended key management boundary, potentially violating data residency and control requirements.

        **Risk mitigation**

        - **Set CMEK at instance creation:** Configure `encryption_key_name` on a new Cloud SQL instance before any data is written; CMEK cannot be added to an existing instance without recreation.
        - **Delete pre-CMEK backups:** After confirming the instance is CMEK-encrypted, remove backup runs that predate the key configuration and create a fresh backup to establish a clean baseline.
        - **Monitor backup encryption status:** Periodically audit backup runs with `gcloud sql backups list` to verify that every backup in the retention window carries a non-empty `diskEncryptionConfiguration.kmsKeyName`.
      audit: |
        ### Audit via Console

        1. In the Google Cloud Console, navigate to **SQL** and select the Cloud SQL instance.
        2. On the instance **Overview** page, confirm that **Customer-managed encryption key** is shown under **Configuration**.
        3. Select **Backups** from the left navigation.
        4. For each listed backup run, verify that the **Encryption** column shows a customer-managed key (CMEK), not **Google-managed encryption**.

        A passing instance shows all backup runs encrypted with a customer-managed key. A failing instance shows one or more backup runs encrypted with a Google-managed key even though the instance itself is CMEK-configured.

        ### Audit via CLI

        1. List backup runs for the instance and review their disk encryption configuration:

        ```bash
        gcloud sql backups list --instance=INSTANCE_NAME --format=json
        ```

        2. In the JSON output, check the `diskEncryptionConfiguration.kmsKeyName` field for each backup run. If the instance has a CMEK configured, every backup run must also have a non-empty `kmsKeyName`.

        A passing instance returns backup runs where every entry has a non-empty `diskEncryptionConfiguration.kmsKeyName`. A failing instance returns one or more backup runs where `diskEncryptionConfiguration.kmsKeyName` is absent or empty despite the instance having a CMEK configured.
      remediation:
        - id: terraform
          desc: |
            Cloud SQL backups inherit the instance's disk encryption key. Set `encryption_key_name` on the instance at creation time. CMEK cannot be added to an existing instance:

            ```hcl
            resource "google_sql_database_instance" "app" {
              name                = "app-db"
              region              = "us-central1"
              database_version    = "POSTGRES_15"
              encryption_key_name = google_kms_crypto_key.sql_key.id

              settings {
                tier = "db-custom-2-7680"
                backup_configuration {
                  enabled                        = true
                  point_in_time_recovery_enabled = true
                }
              }
            }
            ```

            After applying, delete pre-CMEK backup runs and let the next scheduled backup inherit the new key.
        - id: console
          desc: |
            Cloud SQL backups inherit the instance's disk encryption key. If backups on a CMEK-encrypted instance are missing `kmsKeyName`, the instance's CMEK configuration itself is the source of the drift:

            1. In the Google Cloud console, open **SQL** and select the affected instance.
            2. Confirm that **Customer-managed encryption key** is configured on the instance.
            3. If the instance is not CMEK-encrypted but must be, you must re-create the instance with CMEK, since CMEK cannot be applied to an existing instance, and migrate data.
            4. Delete backup runs that pre-date the CMEK configuration and create a fresh CMEK-encrypted backup from **Backups** → **Create backup**.
        - id: cli
          desc: |
            Create a fresh on-demand backup after confirming the instance has a CMEK configured. Any new backup run will inherit the instance's CMEK:

            ```bash
            gcloud sql backups create --instance=INSTANCE_NAME
            ```

            List existing backup runs to identify ones that pre-date CMEK:

            ```bash
            gcloud sql backups list --instance=INSTANCE_NAME
            ```
    refs:
      - url: https://cloud.google.com/sql/docs/mysql/cmek
        title: Cloud SQL - Using customer-managed encryption keys
      - url: https://cloud.google.com/sql/docs/mysql/backup-recovery/backups
        title: Cloud SQL - About backups
  - uid: mondoo-gcp-security-bigquery-aws-azure-connections-use-identity-federation
    title: Ensure BigQuery AWS and Azure connections use identity federation
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-14
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-5
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-2
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-9
      compliance/vda-isa-5: vda-isa-5-4-1-2
    variants:
      - uid: mondoo-gcp-security-bigquery-aws-azure-connections-use-identity-federation-gcp
        tags:
          mondoo.com/filter-title: GCP BigQuery
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-bigquery-aws-azure-connections-use-identity-federation-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-bigquery-aws-azure-connections-use-identity-federation-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-bigquery-aws-azure-connections-use-identity-federation-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that every BigQuery connection of type AWS or AZURE is configured with identity federation rather than a static, long-lived credential. For AWS connections, federation is expressed as an IAM role ARN; for Azure connections, it is expressed as a federated application client ID bound to the organization's Azure AD tenant.

        **Why this matters**

        - **No static secret exposure:** Federated connections mint short-lived tokens per query, so there is no persistent credential stored in BigQuery metadata that an over-privileged principal can extract and replay.
        - **Immediate revocation:** Removing an IAM role trust policy in AWS or an Azure application assignment immediately severs access; there is no static key that continues to work after the IAM change.
        - **Cross-cloud audit correlation:** Each federated query logs an identity in both GCP and the target cloud, enabling analysts to correlate BigQuery query logs with AWS CloudTrail or Azure Monitor records.
        - **Blast radius containment:** Static keys stolen from BigQuery grant access indefinitely and broadly; federated tokens are scoped to the federated role's permissions and expire automatically.

        **Risk mitigation**

        - **Recreate static-credential connections with federation:** Delete any AWS or Azure BigQuery connection that uses stored access keys or a client secret and replace it with a federation-based connection using a role ARN or a federated application client ID.
        - **Restrict federated role permissions:** Grant the AWS IAM role or Azure application only the minimum permissions required for the BigQuery queries it serves, following least-privilege principles.
        - **Audit connections regularly:** Periodically list BigQuery connections and verify that no AWS or Azure connection has reverted to static credentials after an API-level update.
      audit: |
        ### Audit via Console

        1. In the Google Cloud Console, navigate to **BigQuery** and select **External connections** (or open the BigQuery Studio and click **+ Add** > **Connections to external data sources**).
        2. For each connection of type **Amazon S3 (AWS)** or **Azure Blob Storage**, open the connection details.
        3. Under **Authentication**, verify that the connection uses an AWS IAM role ARN or an Azure federated application client ID rather than static access keys or a client secret.

        A passing connection shows an AWS IAM role ARN or an Azure federated application client ID in the Authentication section. A failing connection shows static access keys or a client secret instead of federated credentials.

        ### Audit via CLI

        1. List BigQuery connections and inspect their properties:

        ```bash
        bq ls --connection --project_id=PROJECT_ID --location=LOCATION --format=json
        ```

        2. For each connection where `type` is `AWS`, verify that `properties.accessRole.iamRoleId` is present and non-empty. For each connection where `type` is `AZURE`, verify that `properties.federatedApplicationClientId` is present and non-empty.

        A passing AWS connection returns a non-empty `iamRoleId` in `accessRole`. A failing AWS connection returns an empty or absent `iamRoleId`. A passing Azure connection returns a non-empty `federatedApplicationClientId`. A failing Azure connection returns an empty or absent `federatedApplicationClientId`.
      remediation:
        - id: terraform
          desc: |
            Configure the connection with the federation block (AWS) or Azure tenant binding:

            ```hcl
            resource "google_bigquery_connection" "aws" {
              connection_id = "aws-omni"
              location      = "aws-us-east-1"
              aws {
                access_role {
                  iam_role_id = "arn:aws:iam::AWS_ACCOUNT_ID:role/ROLE_NAME"
                }
              }
            }

            resource "google_bigquery_connection" "azure" {
              connection_id = "azure-omni"
              location      = "azure-eastus2"
              azure {
                customer_tenant_id = "AZURE_TENANT_ID"
              }
            }
            ```
        - id: console
          desc: |
            Recreate the connection using identity federation:

            1. Open **BigQuery** → **External connections** → select the connection.
            2. If the connection type is **Amazon S3 (AWS)** or **Azure Blob Storage**, confirm the **Authentication** section shows an AWS IAM role or Azure federated application.
            3. If the connection still shows stored access keys or a client secret, select **Create connection**, choose the same external source, and follow the federation setup wizard. Delete the legacy connection after the federated replacement is in use.
            4. Update queries that referenced the old connection to use the new connection id.
        - id: cli
          desc: |
            Create an AWS connection that uses a role ARN (identity federation):

            ```bash
            bq mk --connection \
              --connection_type=AWS \
              --iam_role_id=arn:aws:iam::AWS_ACCOUNT_ID:role/ROLE_NAME \
              --location=LOCATION \
              CONNECTION_ID
            ```

            Create an Azure connection bound to your tenant (identity federation):

            ```bash
            bq mk --connection \
              --connection_type=AZURE \
              --tenant_id=AZURE_TENANT_ID \
              --location=LOCATION \
              CONNECTION_ID
            ```
    refs:
      - url: https://cloud.google.com/bigquery/docs/omni-aws-create-connection
        title: BigQuery Omni - Create AWS connection with identity federation
      - url: https://cloud.google.com/bigquery/docs/omni-azure-create-connection
        title: BigQuery Omni - Create Azure connection with identity federation
