  - uid: mondoo-gcp-security-firewall-no-ingress-ssh-from-internet
    title: Ensure SSH access is restricted from the internet
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-gcp-security-firewall-no-ingress-ssh-from-internet-gcp
        tags:
          mondoo.com/filter-title: GCP Compute Firewall
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-firewall-no-ingress-ssh-from-internet-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-firewall-no-ingress-ssh-from-internet-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-firewall-no-ingress-ssh-from-internet-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that GCP compute firewall rules do not allow unrestricted SSH access on TCP port 22 from all internet addresses (0.0.0.0/0 or ::/0). Firewall rules should restrict SSH access to specific trusted CIDR ranges or route SSH connections through Identity-Aware Proxy rather than exposing the port directly to the internet.

        **Why this matters**

        - **Brute-force attack surface:** An SSH port open to the entire internet is continuously probed by automated scanners; attackers attempt credential stuffing, weak password guessing, and key theft against any reachable SSH service.
        - **Credential compromise amplification:** If SSH credentials or key material are compromised, unrestricted internet access means the attacker can exploit them from any location without any network-level barrier.
        - **Lateral movement enablement:** Unauthorized SSH access to one instance gives attackers a foothold from which to probe internal networks, escalate privileges, and move laterally to other resources.

        **Risk mitigation**

        - **Restrict source ranges to trusted CIDRs:** Replace 0.0.0.0/0 source ranges on SSH firewall rules with specific corporate VPN ranges, bastion host IPs, or other trusted CIDR blocks.
        - **Use Identity-Aware Proxy for SSH:** Configure IAP TCP forwarding for SSH so that access is gated on Google identity authentication rather than network-level IP allowlisting, eliminating the need to expose port 22 at all.
        - **Audit firewall rules regularly:** Periodically review all ingress rules allowing TCP port 22 to confirm source ranges remain intentionally restricted and no new open rules have been introduced.
      audit: |
        ### Audit via Console

        1. Sign in to the [Google Cloud Console](https://console.cloud.google.com).
        2. Navigate to **VPC Network** > **Firewall**.
        3. Review each firewall rule with **Direction** set to `Ingress`.
        4. Check whether any rule allows TCP port 22 (or all ports on TCP) with a **Source IP range** of `0.0.0.0/0` or `::/0`.

        A passing firewall configuration shows no ingress rules that allow TCP port 22 from `0.0.0.0/0` or `::/0`. A failing configuration shows one or more ingress rules permitting SSH from any source IP.

        ### Audit via CLI

        1. List ingress firewall rules that allow TCP and check for SSH exposure:

        ```bash
        gcloud compute firewall-rules list \
          --filter="direction=INGRESS AND allowed.ports:22 AND sourceRanges:0.0.0.0/0" \
          --format="table(name,direction,allowed,sourceRanges)"
        ```

        Also check for rules with all-port TCP access:

        ```bash
        gcloud compute firewall-rules list \
          --filter="direction=INGRESS AND allowed.IPProtocol=tcp AND sourceRanges:0.0.0.0/0" \
          --format="table(name,direction,allowed,sourceRanges)"
        ```

        A passing configuration returns no results for rules permitting port 22 from the internet. A failing configuration returns one or more firewall rules with `0.0.0.0/0` or `::/0` source ranges allowing TCP port 22.
      remediation:
        - id: terraform
          desc: |
            To ensure SSH access is restricted from the internet in Terraform, restrict SSH access to a specific IP range:

            ```hcl
            resource "google_compute_firewall" "allow_ssh" {
              name    = "allow-ssh-restricted"
              network = google_compute_network.default.name

              allow {
                protocol = "tcp"
                ports    = ["22"]
              }

              # Restrict to trusted IP ranges instead of 0.0.0.0/0
              source_ranges = ["10.0.0.0/8"]
            }
            ```

            Alternatively, use IAP for SSH access:

            ```hcl
            resource "google_compute_firewall" "allow_ssh_iap" {
              name    = "allow-ssh-iap"
              network = google_compute_network.default.name

              allow {
                protocol = "tcp"
                ports    = ["22"]
              }

              # IAP's IP range
              source_ranges = ["35.235.240.0/20"]
            }
            ```
        - id: console
          desc: |
            To ensure SSH access is restricted from the internet using the Google Cloud Console:

            1. Log in to the GCP Console at https://console.cloud.google.com.
            2. Navigate to **VPC Network** > **Firewall**.
            3. Identify any firewall rules that allow TCP port 22 with a source range of 0.0.0.0/0 or ::/0.
            4. Select the rule and select **Edit**.
            5. Under **Source IPv4 ranges**, replace 0.0.0.0/0 with your trusted CIDR ranges.
            6. Select **Save**.
        - id: cli
          desc: |
            To ensure SSH access is restricted from the internet using the Google Cloud CLI, update a firewall rule to restrict SSH access:

            ```bash
            gcloud compute firewall-rules update RULE_NAME \
              --source-ranges=TRUSTED_CIDR_RANGE
            ```

            For example, to restrict to a corporate VPN range:

            ```bash
            gcloud compute firewall-rules update allow-ssh \
              --source-ranges=10.0.0.0/8
            ```
    refs:
      - url: https://cloud.google.com/vpc/docs/firewalls
        title: VPC Firewall Rules
