        - **Grant only subscriber role:** Assign `roles/pubsub.subscriber` to the minimum set of authorized consumers and avoid broader roles that include subscription management.
        - **Layer with VPC Service Controls:** Restrict subscription access to authorized VPC networks to enforce network-level boundaries alongside IAM controls.
