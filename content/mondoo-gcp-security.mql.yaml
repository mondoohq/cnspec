          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that every Cloud Logging project log bucket provisioned through `google_logging_project_bucket_config` is encrypted with a customer-managed encryption key (CMEK). Log buckets are the destination for logging sinks and routinely store audit logs, data-access logs, and policy-violation logs that are valuable to both attackers and compliance auditors.

        **Why this matters**

        - **Log data reveals security-sensitive activity:** Audit logs record IAM changes, data access events, and configuration modifications; an attacker who can read or destroy logs can cover their tracks or discover high-value targets.
        - **Google-managed keys cannot be independently revoked:** Without CMEK, log bucket contents are encrypted with Google-managed keys that organizations cannot disable or destroy in response to a key-compromise event.
        - **CMEK provides a revocation path for log data:** Disabling or destroying the Cloud KMS key blocks further decryption of the log bucket contents, enabling a controlled response to an incident involving the key.
        - **Custom log buckets are not CMEK-protected by default:** The `_Default` and `_Required` buckets use Google-managed keys unless explicitly overridden; custom log buckets created to receive sink output are also not CMEK-protected unless the setting is configured.

        **Risk mitigation**

        - **Set CMEK on every project log bucket:** Configure `cmek_settings.kms_key_name` on every `google_logging_project_bucket_config` resource in the project to ensure all log data at rest is covered.
        - **Grant the Cloud Logging service agent the required role:** The Cloud Logging service agent needs `roles/cloudkms.cryptoKeyEncrypterDecrypter` on the key before it can write encrypted log entries to the bucket.
        - **Apply the check to the project that owns the destination bucket:** For organization or folder-level sinks routing to a log bucket in a child project, ensure this check runs against the project that owns the destination bucket.
      audit: |
        ### Audit via Console

        1. In the Google Cloud Console, go to **Logging** > **Logs Storage**.
        2. Select a log bucket from the list.
        3. On the bucket details page, review the **Encryption** field.

        A passing log bucket shows **Customer-managed encryption key (CMEK)** with a Cloud KMS key name. A failing log bucket shows **Google-managed encryption key** or no CMEK configured.

        ### Audit via CLI

        1. List all log buckets in the project and check their CMEK configuration:

        ```bash
        gcloud logging buckets list \
          --project=PROJECT_ID \
          --location=- \
          --format="table(name,cmekSettings.kmsKeyName)"
        ```

        A passing log bucket returns a non-empty value in the `KMS_KEY_NAME` column. A failing log bucket returns an empty `KMS_KEY_NAME` column.
      remediation:
        - id: terraform
          desc: |
            To require CMEK on every Cloud Logging project log bucket in Terraform:

            ```hcl
            resource "google_logging_project_bucket_config" "default" {
              project        = var.project_id
              location       = "global"
              bucket_id      = "audit-bucket"
              retention_days = 400

              cmek_settings {
                kms_key_name = google_kms_crypto_key.logging.id
              }
            }
            ```
        - id: console
          desc: |
            To require CMEK on a Cloud Logging log bucket using the Google Cloud Console:

            1. In the Google Cloud Console, go to **Logging** > **Logs Storage**.
            2. Select the log bucket to update.
            3. Select **Edit bucket**.
            4. Under **Encryption**, select **Customer-managed encryption key (CMEK)** and pick the Cloud KMS key.
            5. Select **Update bucket**.
        - id: cli
          desc: |
            To require CMEK on a Cloud Logging log bucket using the Google Cloud CLI:

            ```bash
            gcloud logging buckets update BUCKET_ID \
              --location=LOCATION \
              --cmek-kms-key-name=projects/PROJECT/locations/LOCATION/keyRings/RING/cryptoKeys/KEY
            ```
    refs:
      - url: https://cloud.google.com/logging/docs/routing/managed-encryption-storage
        title: Customer-managed encryption keys for Cloud Logging
