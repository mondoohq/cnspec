      )
  - uid: mondoo-gcp-security-artifact-registry-repository-vulnerability-scanning-enabled-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_artifact_registry_repository' && change.after['format'] == 'DOCKER')
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_artifact_registry_repository' && change.after['format'] == 'DOCKER').all(
        change.after['vulnerability_scanning_config'] == null ||
        change.after['vulnerability_scanning_config'].all(
          _['enablement_config'] != "SCANNING_DISABLED"
        )
      )
  - uid: mondoo-gcp-security-artifact-registry-repository-vulnerability-scanning-enabled-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'google_artifact_registry_repository' && values['format'] == 'DOCKER')
    mql: |
      terraform.state.resources.where(type == 'google_artifact_registry_repository' && values['format'] == 'DOCKER').all(
        values['vulnerability_scanning_config'] == null ||
        values['vulnerability_scanning_config'].all(
          _['enablement_config'] != "SCANNING_DISABLED"
        )
      )
  - uid: mondoo-gcp-security-cloud-build-trigger-no-plaintext-secrets-in-substitutions
    title: Ensure Cloud Build triggers do not store plaintext secrets in substitutions
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-dsp-17
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-5-17
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-5
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-10
      compliance/pci-dss-4: pcidss-requirement-8-6-2
      compliance/soc2-2017: soc2-control-cc6-1-9
      compliance/vda-isa-5: vda-isa-5-4-1-3
    variants:
      - uid: mondoo-gcp-security-cloud-build-trigger-no-plaintext-secrets-in-substitutions-gcp
        tags:
          mondoo.com/filter-title: GCP Cloud Build Trigger
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-cloud-build-trigger-no-plaintext-secrets-in-substitutions-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-build-trigger-no-plaintext-secrets-in-substitutions-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-build-trigger-no-plaintext-secrets-in-substitutions-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Cloud Build trigger substitution variable keys do not carry names that indicate secret or credential material, such as `_PASSWORD`, `_API_KEY`, `_SECRET`, or `_ACCESS_TOKEN`. Cloud Build provides a first-class Secret Manager integration through `availableSecrets` that exposes credentials to build steps at runtime without persisting them in trigger configuration; plaintext substitutions are an anti-pattern that should be replaced with that mechanism.

        **Why this matters**

        - **Substitutions are persisted with the trigger:** Trigger configuration, including all substitution key-value pairs, is stored in Cloud Build and is readable by anyone with `cloudbuild.builds.get` on the project, exposing credentials to a broad set of project principals.
        - **Credentials appear in audit logs and exports:** Trigger update events, Terraform state, and any backup that captures the trigger definition will include the substitution values, creating multiple durable copies of the secret outside of the secret management system.
        - **Independent rotation is impossible:** A credential stored in a substitution can only be rotated by updating the trigger and redeploying every consumer; Secret Manager secrets can be rotated independently with no trigger change.
        - **Heuristic detection, actionable signal:** This check matches substitution key names against credential-related patterns; a match is a strong signal to audit whether the value contains sensitive material and migrate it to Secret Manager.

        **Risk mitigation**

        - **Remove credential-shaped substitution variables:** Delete any substitution key whose name indicates it holds a secret and reference the secret through `availableSecrets.secretManager` in the build configuration instead.
        - **Rotate any secret that has been stored in a substitution:** Treat a flagged trigger as a potential exposure and rotate the affected credential in the upstream system.
      audit: |
        ### Audit via Console

        1. Go to **Cloud Build > Triggers** in the Google Cloud Console.
        2. Select each trigger.
        3. Under the **Substitution variables** section, review all variable key names.
        4. Flag any key whose name matches credential-related patterns such as `_PASSWORD`, `_SECRET`, `_API_KEY`, `_PRIVATE_KEY`, `_ACCESS_TOKEN`, `_AUTH_TOKEN`, `_CREDENTIALS`, or `_CONNECTION_STRING`.

        A passing trigger shows no substitution variable keys with credential-related naming patterns. A failing trigger shows one or more substitution variable keys that indicate the variable holds a secret or credential.

        ### Audit via CLI

        1. List all triggers and inspect their substitution variable keys:

        ```bash
        gcloud builds triggers list \
          --format="table(name,createTime,github.name)"

        gcloud builds triggers describe TRIGGER_NAME \
          --format="json(substitutions)"
        ```

        A passing trigger returns a `substitutions` map with no keys matching patterns like `PASSWORD`, `SECRET`, `API_KEY`, `PRIVATE_KEY`, `ACCESS_TOKEN`, `AUTH_TOKEN`, `CREDENTIALS`, or `CONNECTION_STRING`. A failing trigger returns a `substitutions` map containing one or more keys that match those patterns.
      remediation:
        - id: terraform
          desc: |
            Remove credential-shaped keys from the trigger's `substitutions` map and consume secrets through Secret Manager via `available_secrets` in the build configuration:

            ```hcl
            resource "google_cloudbuild_trigger" "deploy" {
              name        = "deploy-app"
              location    = "us-central1"
              filename    = "cloudbuild.yaml"

              substitutions = {
                _ENVIRONMENT = "prod"
                _IMAGE_TAG   = "v1.2.3"
              }
            }
            ```

            Reference secrets from `cloudbuild.yaml` instead:

            ```yaml
            availableSecrets:
              secretManager:
                - versionName: projects/$PROJECT_ID/secrets/api-token/versions/latest
                  env: API_TOKEN
            ```
        - id: console
          desc: |
            Replace plaintext substitution secrets with a Secret Manager reference:

            1. Go to **Cloud Build > Triggers** in the Google Cloud Console.
            2. Select the trigger and open its configuration.
            3. Under **Substitution variables**, remove any variable that holds a credential.
            4. Update the build configuration (`cloudbuild.yaml`) to declare the secret under `availableSecrets.secretManager` and consume it from a build step's `secretEnv`.
            5. Save the trigger and rotate the leaked credential in the upstream system.
        - id: cli
          desc: |
            Update the trigger and rewrite the build configuration. Example `cloudbuild.yaml` snippet:

            ```yaml
            steps:
              - name: gcr.io/cloud-builders/gcloud
                entrypoint: bash
                args: ["-c", "deploy --token $$API_TOKEN"]
                secretEnv: ["API_TOKEN"]
            availableSecrets:
              secretManager:
                - versionName: projects/PROJECT/secrets/API_TOKEN/versions/latest
                  env: API_TOKEN
            ```

            Then describe the trigger, remove the credential-shaped substitution from the YAML, and re-import:

            ```bash
            gcloud builds triggers describe TRIGGER_NAME --format=yaml > trigger.yaml
            # edit trigger.yaml to remove plaintext secret substitutions
            gcloud builds triggers import --source=trigger.yaml
            ```
    refs:
      - url: https://cloud.google.com/build/docs/securing-builds/use-secrets
        title: Cloud Build - Use secrets from Secret Manager
  - uid: mondoo-gcp-security-cloud-build-trigger-no-plaintext-secrets-in-substitutions-gcp
    filters: asset.platform == 'gcp'
