  - uid: mondoo-gcp-security-forwarding-rule-not-all-ports
    title: Ensure external forwarding rules do not forward all ports
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-gcp-security-forwarding-rule-not-all-ports-gcp
        tags:
          mondoo.com/filter-title: GCP
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-forwarding-rule-not-all-ports-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-forwarding-rule-not-all-ports-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-forwarding-rule-not-all-ports-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that external-facing forwarding rules do not forward traffic on all ports. When a forwarding rule is configured with allPorts enabled, every port on the backend instances becomes reachable through the load balancer from the internet, exposing services that were intended for internal use only.

        **Why this matters**

        - **Attack surface expansion:** All-ports forwarding eliminates the natural segmentation provided by explicit port selection, making every listening service on backend instances externally reachable regardless of whether it was designed for public exposure.
        - **Inadvertent service exposure:** Management interfaces, debugging endpoints, and internal APIs that happen to be running on a backend may be unintentionally exposed when all ports are forwarded.
        - **Vulnerability blast radius:** If any service on the backend contains a vulnerability, all-ports forwarding ensures that the vulnerable port is reachable from the internet, removing network distance as a mitigating factor.
        - **Internal load balancers excluded:** The all-ports configuration has legitimate uses for internal load balancers handling east-west traffic; this check is specifically scoped to external forwarding rules where internet exposure is the concern.

        **Risk mitigation**

        - **Specify explicit port ranges:** Replace allPorts with a port_range or ports attribute that enumerates only the ports required for the intended public-facing service.
        - **Audit external forwarding rules regularly:** Periodically review all forwarding rules with EXTERNAL or EXTERNAL_MANAGED load balancing schemes to confirm that no all-ports configuration has been introduced.
        - **Apply firewall defense-in-depth:** Even with explicit port forwarding, maintain backend firewall rules that restrict inbound connections to the minimum necessary source ranges and ports.
      audit: |
        ### Audit via Console

        1. In the Google Cloud Console, navigate to **Network services > Load balancing**.
        2. Click the **Frontends** tab or navigate to each forwarding rule.
        3. For each external forwarding rule (load balancing scheme of EXTERNAL or EXTERNAL_MANAGED), review the **Ports** configuration.

        A passing forwarding rule shows a specific port or port range (for example, 80, 443, or 8080-8090). A failing forwarding rule shows **All ports** enabled.

        ### Audit via CLI

        1. List external forwarding rules and check for all-ports configuration:

        ```bash
        gcloud compute forwarding-rules list \
          --filter="loadBalancingScheme:(EXTERNAL OR EXTERNAL_MANAGED)" \
          --format="table(name,region,loadBalancingScheme,allPorts,portRange)"
        ```

        A passing forwarding rule returns `False` or empty for `allPorts`. A failing forwarding rule returns `True` for `allPorts`.
      remediation:
        - id: terraform
          desc: |
            To ensure external forwarding rules do not forward all ports in Terraform:

            ```hcl
            resource "google_compute_forwarding_rule" "example" {
              name       = "example-forwarding-rule"
              target     = google_compute_target_pool.example.id
              port_range = "80-443"

              # Do not set all_ports = true
            }
            ```
        - id: console
          desc: |
            To ensure external forwarding rules do not forward all ports using the Google Cloud Console:

            1. Go to the **Load balancing** page: [https://console.cloud.google.com/net-services/loadbalancing](https://console.cloud.google.com/net-services/loadbalancing).
            2. Select the load balancer associated with the forwarding rule.
            3. Edit the frontend configuration.
            4. Specify explicit port or port range instead of **All ports**.
            5. Save the configuration.
        - id: cli
          desc: |
            To ensure external forwarding rules do not forward all ports using the Google Cloud CLI, forwarding rules cannot be modified in place. Create a new forwarding rule with specific ports:

            ```bash
            gcloud compute forwarding-rules create NEW_RULE_NAME \
              --ports=80,443 \
              --target-pool=TARGET_POOL
            ```

            Then delete the old rule:

            ```bash
            gcloud compute forwarding-rules delete OLD_RULE_NAME
            ```
    refs:
      - url: https://cloud.google.com/load-balancing/docs/forwarding-rule-concepts
        title: Google Cloud - Forwarding rule concepts
  - uid: mondoo-gcp-security-forwarding-rule-not-all-ports-gcp
    filters: asset.platform == 'gcp'
    mql: |
      gcp.project.computeService.forwardingRules.where(
        loadBalancingScheme == "EXTERNAL" || loadBalancingScheme == "EXTERNAL_MANAGED"
      ).all(allPorts != true)
