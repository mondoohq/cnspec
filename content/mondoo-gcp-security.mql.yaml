  # No Terraform variants: this check evaluates the connection's `modified`
  # timestamp (last edit/rotation time) to enforce a 90-day rotation window.
  # Modification timestamps are operational telemetry produced by the
  # BigQuery API on every update — there is no equivalent field in the
  # google_bigquery_connection Terraform resource that would let us evaluate
  # when the credential was last rotated against an absolute clock.
  - uid: mondoo-gcp-security-bigquery-cloudsql-connection-credentials-rotated-90-days
    title: Ensure BigQuery Cloud SQL connection credentials rotated within 90 days
    impact: 60
    filters: asset.platform == 'gcp-bigquery-dataset'
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-15
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-5-17
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-5
      compliance/nist-sp-800-171: false
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-9
      compliance/vda-isa-5: vda-isa-5-4-1-3
    mql: |
      gcp.project.bigqueryService.connections.where(type == "CLOUD_SQL").all(
        modified != null && modified > time.now - 90 * time.day
      )
    docs:
      desc: |
        This check ensures that every BigQuery Cloud SQL connection has been modified within the last 90 days. Cloud SQL connections store a database username and password directly in BigQuery metadata, and there is no automatic rotation mechanism, making the connection's last-modified timestamp the primary indicator of credential freshness.

        **Why this matters**

        - **Credential aging:** A password that has not been rotated in months is more likely to have been captured in a log, exported via an over-privileged audit export, or compromised in a credential dump.
        - **Undetected drift:** When the underlying Cloud SQL user password is rotated but the BigQuery connection is not updated, queries may silently fail or, worse, continue to use the old credential if the database accepted it.
        - **No native expiration:** Unlike OAuth tokens or IAM conditions, Cloud SQL connection passwords have no built-in expiration, so periodic rotation must be enforced operationally.
        - **Reduced exposure window:** A 90-day rotation ceiling limits the time an attacker can leverage a compromised credential before it is invalidated.

        **Risk mitigation**

        - **Establish a rotation schedule:** Treat BigQuery Cloud SQL connections as service credentials and include them in the organization's credential rotation runbooks, aligned to the same cycle used for the underlying Cloud SQL user.
        - **Automate the update step:** Use Terraform or a CI/CD pipeline to update the connection's password field on each rotation cycle so the `modified` timestamp advances automatically.
        - **Prefer federated connections for new workloads:** Where Cloud SQL supports IAM database authentication, prefer an IAM-authenticated connection over a username/password connection to eliminate the rotation requirement entirely.
      audit: |
        ### Audit via Console

        1. Open the [Google Cloud Console](https://console.cloud.google.com/) and navigate to **BigQuery**.
        2. In the Explorer panel, click **External connections** (under the project node).
        3. For each connection whose **Type** is **Cloud SQL**, note the **Last modified** date shown in the connection details pane.
        4. Compare the last-modified date to today. Any connection not modified within the last 90 days requires a password update.

        A passing connection shows a **Last modified** date within the last 90 days. A failing connection shows a **Last modified** date older than 90 days.

        ### Audit via CLI

        1. List all BigQuery connections and filter for Cloud SQL type:

        ```bash
        bq ls --connection --location=LOCATION --format=prettyjson --project_id=PROJECT_ID
        ```

        2. Inspect the `modified` field on each connection whose `type` is `CLOUD_SQL`:

        ```bash
        bq show --connection --location=LOCATION --format=prettyjson PROJECT_ID.LOCATION.CONNECTION_ID
        ```

        A passing connection returns a `modified` timestamp within the last 90 days. A failing connection returns a `modified` timestamp older than 90 days.
      remediation:
        - id: terraform
          desc: |
            Update the connection's `cloud_sql.credential` block with the rotated password and apply. Each `terraform apply` updates the connection's `modified` timestamp:

            ```hcl
            resource "google_bigquery_connection" "cloudsql" {
              connection_id = "cloudsql-fed"
              location      = "us-central1"
              cloud_sql {
                instance_id = google_sql_database_instance.app.connection_name
                database    = "appdb"
                type        = "POSTGRES"
                credential {
                  username = "bq_reader"
                  password = var.bq_reader_password # rotated >= every 90 days
                }
              }
            }
            ```
        - id: console
          desc: |
            Rotate the underlying database user and update the BigQuery connection:

            1. In Cloud SQL, rotate the password for the database user used by the BigQuery connection.
            2. Open **BigQuery** → **External connections** → select the flagged connection.
            3. Select **Edit**, paste the new password, and save. Saving updates the connection's `modified` timestamp.
            4. Re-run a dependent query to confirm the connection is healthy.
        - id: cli
          desc: |
            Update the connection with the new password:

            ```bash
            bq update --connection \
              --connection_credential='{"username":"DB_USER","password":"NEW_PASSWORD"}' \
              --location=LOCATION \
              CONNECTION_ID
            ```
    refs:
      - url: https://cloud.google.com/bigquery/docs/cloud-sql-federated-queries
        title: BigQuery - Cloud SQL federated queries
      - url: https://cloud.google.com/sql/docs/mysql/create-manage-users
        title: Cloud SQL - Managing users
  # No Terraform variants: BigQuery's google_bigquery_connection cloud_resource
  # block has no input field for service_account_id — the delegated SA is
  # auto-provisioned by the BigQuery API (computed output) and surfaced in
  # the Terraform state's `cloud_resource.service_account_id` attribute. Users
  # cannot configure or pin the delegated SA via Terraform, so HCL/plan have no
  # field to evaluate and a state-only variant would not catch the drift this
  # check is designed to surface (an operator manually rebinding the connection
  # in the API to a default SA after creation).
  - uid: mondoo-gcp-security-bigquery-cloud-resource-connection-sa-no-default
    title: Ensure BigQuery Cloud Resource connection SAs are not default SAs
    impact: 80
    filters: asset.platform == 'gcp-bigquery-dataset'
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-2
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-5
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-3-3
      compliance/vda-isa-5: vda-isa-5-4-2-1
    mql: |
      gcp.project.bigqueryService.connections.where(type == "CLOUD_RESOURCE").all(
        properties['serviceAccountId'] == null ||
        properties['serviceAccountId'].contains("-compute@developer.gserviceaccount.com") == false
      )
      gcp.project.bigqueryService.connections.where(type == "CLOUD_RESOURCE").all(
        properties['serviceAccountId'] == null ||
        properties['serviceAccountId'].contains("@appspot.gserviceaccount.com") == false
      )
    docs:
      desc: |
        This check ensures that no BigQuery Cloud Resource connection delegates its identity to the default Compute Engine service account or the default App Engine service account. These default accounts are auto-provisioned with the broad `roles/editor` primitive role, meaning any workload using such a connection effectively operates with project-editor access.

        **Why this matters**

        - **Excessive privilege:** The default Compute Engine service account holds `roles/editor` at the project level, which grants write access to nearly every resource type in the project, far beyond what any single BigQuery integration should need.
        - **Lateral movement risk:** A prompt injection, a malicious remote function, or a misconfigured `EXTERNAL_QUERY` call that runs under a default SA can read secrets, modify storage, or deploy new resources across the entire project.
        - **Blast radius:** If the default SA's credentials are compromised or misused through the connection, the impact extends to every project resource, not just the data the connection was meant to access.
        - **Audit opacity:** Default SAs are used by many workloads simultaneously; actions taken via a Cloud Resource connection are indistinguishable from other workloads using the same SA in audit logs.

        **Risk mitigation**

        - **Create a dedicated service account per connection:** Provision a purpose-built SA for each Cloud Resource connection and grant it only the roles required for that connection's specific use case.
        - **Remove the default SA's editor role:** After migrating connections to dedicated SAs, remove or restrict the default Compute Engine SA's `roles/editor` grant to limit residual exposure.
        - **Apply the principle of least privilege:** For connections that read from Cloud Storage, grant `roles/storage.objectViewer` on the specific bucket; for Vertex AI connections, grant `roles/aiplatform.user` scoped to the relevant model, not a project-wide role.
      audit: |
        ### Audit via Console

        1. Open the [Google Cloud Console](https://console.cloud.google.com/) and navigate to **BigQuery**.
        2. In the Explorer panel, click **External connections**.
        3. For each connection whose **Type** is **Cloud Resource**, open the connection details and locate the **Service account** field.
        4. Verify the service account does not end with `-compute@developer.gserviceaccount.com` (default Compute Engine SA) or `@appspot.gserviceaccount.com` (default App Engine SA).

        A passing connection shows a dedicated, purpose-built service account in the **Service account** field. A failing connection shows a default Compute Engine or App Engine service account.

        ### Audit via CLI

        1. List Cloud Resource connections:

        ```bash
        bq ls --connection --location=LOCATION --format=prettyjson --project_id=PROJECT_ID
        ```

        2. For each connection whose `type` is `CLOUD_RESOURCE`, inspect the delegated service account:

        ```bash
        bq show --connection --location=LOCATION --format=prettyjson PROJECT_ID.LOCATION.CONNECTION_ID
        ```

        A passing connection returns a `cloudResource.serviceAccountId` that does not contain `-compute@developer.gserviceaccount.com` or `@appspot.gserviceaccount.com`. A failing connection returns one of those default service account addresses.
      remediation:
        - id: terraform
          desc: |
            Bind the connection to a dedicated service account, not the default Compute or App Engine SAs:

            ```hcl
            resource "google_service_account" "bq_cloud_resource" {
              account_id   = "bq-cloud-resource-sa"
              display_name = "BigQuery Cloud Resource SA"
            }

            resource "google_bigquery_connection" "cloud_resource" {
              connection_id = "cloud-resource"
              location      = "us-central1"
              cloud_resource {
                service_account_id = google_service_account.bq_cloud_resource.email
              }
            }

            # Grant only the narrow roles the connection needs:
            resource "google_storage_bucket_iam_member" "cloud_resource_reader" {
              bucket = google_storage_bucket.data.name
              role   = "roles/storage.objectViewer"
              member = "serviceAccount:${google_service_account.bq_cloud_resource.email}"
            }
            ```
        - id: console
          desc: |
            Repoint the connection at a purpose-built service account:

            1. Create a new service account in **IAM & Admin** → **Service Accounts**, such as `bq-cloud-resource-<feature>`.
            2. Grant the new SA only the roles required for this connection's work — for example, `roles/storage.objectViewer` on a specific bucket or `roles/aiplatform.user` on a specific model.
            3. Open **BigQuery** → **External connections** → select the flagged connection → **Edit**.
            4. Replace the delegated service account with the new one. Save.
            5. Remove the `roles/editor` grant from the default SA, or disable the default SA entirely if no other workload depends on it.
        - id: cli
          desc: |
            `bq mk --connection --connection_type=CLOUD_RESOURCE` auto-provisions a Google-managed delegated service account; you grant narrow roles to that SA rather than supplying your own.

            Create (or recreate) the connection and read back the auto-provisioned SA:

            ```bash
            bq mk --connection \
              --connection_type=CLOUD_RESOURCE \
              --location=LOCATION \
              CONNECTION_ID

            bq show --connection --location=LOCATION --format=prettyjson \
              PROJECT_ID.LOCATION.CONNECTION_ID
            ```

            The `cloudResource.serviceAccountId` field in the output is the delegated SA. Grant it only the narrow roles the connection needs (example for Cloud Storage):

            ```bash
            DELEGATE_SA=$(bq show --connection --location=LOCATION --format=json \
              PROJECT_ID.LOCATION.CONNECTION_ID \
              | jq -r '.cloudResource.serviceAccountId')

            gcloud storage buckets add-iam-policy-binding gs://BUCKET_NAME \
              --member="serviceAccount:${DELEGATE_SA}" \
              --role=roles/storage.objectViewer
            ```
    refs:
      - url: https://cloud.google.com/bigquery/docs/connect-to-resource
        title: BigQuery - Cloud Resource connections
      - url: https://cloud.google.com/iam/docs/service-account-overview#default
        title: Default service accounts - security considerations
