  - uid: mondoo-gcp-security-vertexai-endpoint-private-service-connect
    title: Ensure Vertex AI endpoints use Private Service Connect
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-1-6
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-gcp-security-vertexai-endpoint-private-service-connect-gcp
        tags:
          mondoo.com/filter-title: GCP Vertex AI
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-vertexai-endpoint-private-service-connect-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-vertexai-endpoint-private-service-connect-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-vertexai-endpoint-private-service-connect-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Vertex AI endpoints have Private Service Connect enabled so that prediction traffic does not traverse the public internet. By default, Vertex AI endpoints may be accessible over public routes, which exposes model prediction requests and responses to potential interception between the client and the Google Cloud network boundary.

        **Why this matters**

        - **In-transit protection:** Private Service Connect keeps all prediction traffic within the Google Cloud network, removing the segment where traffic would otherwise be exposed to internet-level interception.
        - **Reduced attack surface:** Endpoints without Private Service Connect are reachable from the public internet, making them susceptible to direct attack even when authentication is required.
        - **VPC integration:** Private endpoints participate in VPC network controls, enabling firewall rules, VPC Service Controls, and flow logs to govern all model prediction traffic.
        - **Compliance coverage:** Data-in-transit requirements in many regulatory frameworks are more easily satisfied when traffic between clients and prediction endpoints never leaves a private network boundary.

        **Risk mitigation**

        - **Traffic interception:** Routing prediction requests through Private Service Connect removes the internet path where an adversary could intercept input data or prediction results.
        - **Unauthorized access:** Private Service Connect limits endpoint reachability to specific VPC networks and allowlisted projects, preventing access from arbitrary internet sources even with valid credentials.
      audit: |
        ### Audit via Console

        1. In the Google Cloud Console, navigate to **Vertex AI > Online prediction > Endpoints**.
        2. Click each endpoint name to open its details.
        3. Under the **Network** section, review the **Private Service Connect** or **Network** field.

        A passing endpoint shows Private Service Connect enabled or a VPC network configured. A failing endpoint shows no network configured and Private Service Connect disabled.

        ### Audit via CLI

        1. List all Vertex AI endpoints and their network and Private Service Connect configuration:

        ```bash
        gcloud ai endpoints list \
          --region=REGION \
          --format="table(name,displayName,network,privateServiceConnectConfig.enablePrivateServiceConnect)"
        ```

        A passing endpoint returns a VPC network name or `True` for `enablePrivateServiceConnect`. A failing endpoint returns empty values for both fields.
      remediation:
        - id: terraform
          desc: |
            To ensure Vertex AI endpoints use Private Service Connect in Terraform, configure Private Service Connect when creating a Vertex AI endpoint:

            ```hcl
            resource "google_vertex_ai_endpoint" "example" {
              name         = "example-endpoint"
              display_name = "Example Endpoint"
              location     = "us-central1"
              network      = google_compute_network.example.id

              private_service_connect_config {
                enable_private_service_connect = true
                project_allowlist              = [var.project_id]
              }
            }

            resource "google_compute_network" "example" {
              name                    = "example-network"
              auto_create_subnetworks = false
            }
            ```
        - id: console
          desc: |
            To ensure Vertex AI endpoints use Private Service Connect using the Google Cloud Console, note: Private Service Connect must be configured at endpoint creation time.

            1. Go to the **Vertex AI** page in the Google Cloud Console.
            2. Navigate to **Online prediction > Endpoints**.
            3. Select **Create Endpoint**.
            4. Under **Network**, enable **Private Service Connect**.
            5. Configure the network and subnetwork settings.
            6. Complete the endpoint creation.
        - id: cli
          desc: |
            To ensure Vertex AI endpoints use a VPC network using the Google Cloud CLI, note: the network must be configured at endpoint creation time. Use the `--network` flag to specify a VPC for private connectivity.

            ```bash
            gcloud ai endpoints create \
              --display-name=ENDPOINT_NAME \
              --region=REGION \
              --network=projects/PROJECT/global/networks/VPC_NAME
            ```
    refs:
      - url: https://cloud.google.com/vertex-ai/docs/predictions/using-private-service-connect
        title: Using Private Service Connect with Vertex AI
  - uid: mondoo-gcp-security-vertexai-endpoint-private-service-connect-gcp
    filters: asset.platform == 'gcp-project'
    mql: |
      gcp.project.vertexai.endpoints.all(
        enablePrivateServiceConnect == true
      )
  - uid: mondoo-gcp-security-vertexai-endpoint-private-service-connect-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_vertex_ai_endpoint')
    mql: |
      terraform.resources('google_vertex_ai_endpoint').all(
        arguments.network != empty ||
        blocks.where(type == 'private_service_connect_config') != empty
      )
  - uid: mondoo-gcp-security-vertexai-endpoint-private-service-connect-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_vertex_ai_endpoint')
    mql: |
