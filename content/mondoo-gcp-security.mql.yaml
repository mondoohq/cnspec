  - uid: mondoo-gcp-security-artifact-registry-repository-cmek-encryption
    title: Ensure Artifact Registry repositories are encrypted with CMEK
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-gcp-security-artifact-registry-repository-cmek-encryption-gcp
        tags:
          mondoo.com/filter-title: GCP Artifact Registry Repository
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-artifact-registry-repository-cmek-encryption-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-artifact-registry-repository-cmek-encryption-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-artifact-registry-repository-cmek-encryption-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that every Artifact Registry repository is encrypted with a customer-managed encryption key (CMEK). By default, repositories use Google-managed keys, which do not provide tenant-scoped key control, independent revocation, or per-operation audit trails tied to keys the organization owns.

        **Why this matters**

        - **Key revocation capability:** CMEK lets an organization immediately revoke Artifact Registry's ability to decrypt stored artifacts by disabling or destroying the Cloud KMS key, providing a last-resort data-destruction mechanism that Google-managed keys do not offer.
        - **Proprietary code protection:** Repositories store container images and language packages that frequently contain proprietary source code, build provenance metadata, and embedded configuration that must be protected at rest under organizational key control.
        - **Audit trail per operation:** Every wrap and unwrap operation against a CMEK key is logged in Cloud Audit Logs for the KMS project, providing a cryptographic access trail that Google-managed encryption does not produce.
        - **Regulatory alignment:** Many frameworks require customer-controlled encryption keys for stored software supply-chain artifacts, and CMEK is the mechanism GCP provides to meet those requirements.

        **Risk mitigation**

        - **Create new repositories with CMEK:** Configure `kms_key_name` at repository creation time, since existing repositories cannot be re-encrypted in place.
        - **Scope key access tightly:** Grant `roles/cloudkms.cryptoKeyEncrypterDecrypter` only to the Artifact Registry service agent and approved key administrators on the KMS key.
      audit: |
        ### Audit via Console

        1. Go to **Artifact Registry > Repositories** in the Google Cloud Console.
        2. Select each repository.
        3. Under the **Details** tab, inspect the **Encryption** field.
        4. Confirm the encryption type shows **Customer-managed key** with a Cloud KMS key reference, not **Google-managed key**.

        A passing repository shows a customer-managed encryption key (CMEK) configured under the Encryption field. A failing repository shows Google-managed encryption or no CMEK key reference.

        ### Audit via CLI

        1. List all repositories and inspect the KMS key configuration for each:

        ```bash
        gcloud artifacts repositories list \
          --format="table(name,format,location,encryptionConfig.kmsKeyName)"
        ```

        A passing repository returns a non-empty `encryptionConfig.kmsKeyName` value. A failing repository returns an empty or absent `kmsKeyName` field.
      remediation:
        - id: terraform
          desc: |
            Create a CMEK-protected Artifact Registry repository. The KMS key must live in the same region as the repository, and the Artifact Registry service agent needs `roles/cloudkms.cryptoKeyEncrypterDecrypter` on the key:

            ```hcl
            resource "google_artifact_registry_repository" "cmek" {
              location      = "us-central1"
              repository_id = "secure-images"
              format        = "DOCKER"
              kms_key_name  = google_kms_crypto_key.artifact_registry.id
            }
            ```
        - id: console
          desc: |
            Configure CMEK on a new Artifact Registry repository:

            1. Go to **Artifact Registry > Repositories** in the Google Cloud Console.
            2. Select **Create Repository**.
            3. Under **Encryption**, choose **Customer-managed encryption key (CMEK)**.
            4. Select an existing key or create a new key in the same region as the repository.
            5. Complete the repository configuration and select **Create**.

            Existing repositories cannot be re-encrypted in place. Create a new CMEK-protected repository, copy artifacts over, then delete the unprotected repository.
        - id: cli
          desc: |
            Create a CMEK-protected Artifact Registry repository:

            ```bash
            gcloud artifacts repositories create REPOSITORY \
              --repository-format=docker \
              --location=LOCATION \
              --kms-key=projects/KMS_PROJECT/locations/LOCATION/keyRings/KEYRING/cryptoKeys/KEY
            ```
    refs:
