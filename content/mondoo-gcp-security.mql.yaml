  - uid: mondoo-gcp-security-cloud-run-job-no-default-service-account
    title: Ensure Cloud Run jobs do not use the default service account
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-5
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-9
      compliance/vda-isa-5: vda-isa-5-4-1-3
    variants:
      - uid: mondoo-gcp-security-cloud-run-job-no-default-service-account-gcp
        tags:
          mondoo.com/filter-title: GCP Cloud Run Job
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-cloud-run-job-no-default-service-account-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-run-job-no-default-service-account-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-run-job-no-default-service-account-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Cloud Run jobs are configured to use a dedicated custom service account rather than the default Compute Engine service account. The default Compute Engine service account carries the Editor role at the project level, giving any job that runs under it broad access to nearly every resource in the project.

        **Why this matters**

        - **Least privilege:** A custom service account scoped to only the permissions a job needs prevents unnecessary access to other project resources during job execution.
        - **Blast radius limitation:** If a job container is compromised, an attacker operating under the default Editor-role account can read, modify, or delete any project resource; a scoped account confines the damage.
        - **Identity traceability:** Dedicated service accounts link Cloud Audit Log entries to a specific job, making it possible to reconstruct exactly what actions were taken and by which workload.
        - **Separation of duties:** Each job having its own identity prevents credential sharing across workloads that have different data access requirements.

        **Risk mitigation**

        - **Create job-specific service accounts:** Provision a separate service account for each Cloud Run job and bind only the IAM roles that job requires.
        - **Remove default account bindings:** Verify in IAM that the default Compute Engine service account is not assigned to any Cloud Run job task templates.
        - **Review on a schedule:** Periodically audit Cloud Run job configurations to confirm that no job has drifted back to using the default service account.
      audit: |
        ### Audit via Console

        1. Sign in to the [Google Cloud Console](https://console.cloud.google.com) and select the project.
        2. Navigate to **Cloud Run > Jobs**.
        3. Select a job name to open its details page.
        4. Click the **Security** tab.
        5. Check the **Service account** field.
        6. Verify it does not match the pattern `PROJECT_NUMBER-compute@developer.gserviceaccount.com` or `PROJECT_ID@appspot.gserviceaccount.com`.
        7. Repeat for each job.

        A passing job shows a custom dedicated service account. A failing job shows the default Compute Engine service account (`PROJECT_NUMBER-compute@developer.gserviceaccount.com`) or the default App Engine service account.

        ### Audit via CLI

        1. List all Cloud Run jobs and their service account:

        ```bash
        gcloud run jobs list --format="table(metadata.name,spec.template.template.spec.serviceAccountName,region)"
        ```

        A passing job returns a custom service account email that does not match the default patterns `*-compute@developer.gserviceaccount.com` or `*@appspot.gserviceaccount.com`. A failing job returns a service account matching one of those default patterns.
      remediation:
        - id: terraform
          desc: |
            To ensure Cloud Run jobs do not use the default service account in Terraform:

            ```hcl
            resource "google_service_account" "job_sa" {
              account_id   = "cloud-run-job-sa"
              display_name = "Cloud Run Job Service Account"
            }

            resource "google_cloud_run_v2_job" "example" {
              name     = "example-job"
              location = "us-central1"

              template {
                template {
                  service_account = google_service_account.job_sa.email

                  containers {
                    image = "us-docker.pkg.dev/cloudrun/container/job"
                  }
                }
              }
            }
            ```
        - id: console
          desc: |
            To ensure Cloud Run jobs do not use the default service account using the Google Cloud Console:

            1. Navigate to **Cloud Run > Jobs** in the Google Cloud Console.
            2. Select the job to update.
            3. Select **Edit**.
            4. Under **Security**, select a custom service account from the **Service account** dropdown.
            5. Select **Save**.
        - id: cli
          desc: |
            To ensure Cloud Run jobs do not use the default service account using the Google Cloud CLI:

            ```bash
            gcloud run jobs update JOB_NAME \
              --service-account=CUSTOM_SA_EMAIL \
              --region=REGION
            ```
    refs:
      - url: https://cloud.google.com/run/docs/securing/service-identity
        title: Cloud Run service identity
  - uid: mondoo-gcp-security-cloud-run-job-no-default-service-account-gcp
    filters: asset.platform == 'gcp-cloudrun-job'
    mql: |
      gcp.project.cloudRunService.job.template.template.serviceAccountEmail != ""
      gcp.project.cloudRunService.job.template.template.serviceAccountEmail != /^\d+-compute@developer\.gserviceaccount\.com$/
      gcp.project.cloudRunService.job.template.template.serviceAccountEmail != /^[a-z0-9\-]+@appspot\.gserviceaccount\.com$/
  - uid: mondoo-gcp-security-cloud-run-job-no-default-service-account-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_cloud_run_v2_job')
    mql: |
      terraform.resources('google_cloud_run_v2_job').all(
        blocks.where(type == 'template').all(
          blocks.where(type == 'template').all(
            arguments.service_account != empty &&
            arguments.service_account != /^\d+-compute@developer\.gserviceaccount\.com$/ &&
            arguments.service_account != /^[a-z0-9\-]+@appspot\.gserviceaccount\.com$/
          )
        )
      )
  - uid: mondoo-gcp-security-cloud-run-job-no-default-service-account-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_cloud_run_v2_job')
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_cloud_run_v2_job').all(
        change.after.template != empty &&
        change.after.template.all(
          _['template'] != empty &&
          _['template'].all(
            _['service_account'] != empty &&
            _['service_account'] != /^\d+-compute@developer\.gserviceaccount\.com$/ &&
            _['service_account'] != /^[a-z0-9\-]+@appspot\.gserviceaccount\.com$/
          )
        )
      )
  - uid: mondoo-gcp-security-cloud-run-job-no-default-service-account-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'google_cloud_run_v2_job')
    mql: |
      terraform.state.resources.where(type == 'google_cloud_run_v2_job').all(
        values.template != empty &&
        values.template.all(
          _['template'] != empty &&
          _['template'].all(
            _['service_account'] != empty &&
            _['service_account'] != /^\d+-compute@developer\.gserviceaccount\.com$/ &&
            _['service_account'] != /^[a-z0-9\-]+@appspot\.gserviceaccount\.com$/
          )
        )
      )
  - uid: mondoo-gcp-security-cloud-run-job-cmek-encryption
    title: Ensure Cloud Run jobs use customer-managed encryption keys (CMEK)
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-gcp-security-cloud-run-job-cmek-encryption-gcp
        tags:
          mondoo.com/filter-title: GCP Cloud Run Job
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-cloud-run-job-cmek-encryption-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-run-job-cmek-encryption-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-run-job-cmek-encryption-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Cloud Run jobs are configured to encrypt container images and task data at rest using customer-managed encryption keys (CMEK) rather than Google-managed keys. By default, Cloud Run manages encryption internally; CMEK shifts that control to the organization through Cloud KMS.

        **Why this matters**

        - **Key sovereignty:** Holding encryption keys in Cloud KMS gives the organization the ability to revoke data access instantly by disabling or destroying a key, independent of any Google-side process.
        - **Regulatory compliance:** Workloads that process personal data or other regulated content may be required by applicable frameworks to use encryption keys that the organization owns and controls.
        - **Encryption operation auditing:** Cloud KMS records every encrypt and decrypt call in Cloud Audit Logs, providing a verifiable record for security monitoring and compliance audits.
        - **Post-compromise data protection:** If a job container or its artifacts are exfiltrated, destroying the CMEK key renders the encrypted data unreadable without access to the key material.

        **Risk mitigation**

        - **Scope key access tightly:** Grant the Cloud Run service agent the minimum Cloud KMS role needed to use the key, and review that binding regularly.
        - **Enable automatic key rotation:** Configure rotation on the KMS key to limit the period during which any single key version is valid.
        - **Monitor key usage anomalies:** Set up alerts in Cloud Monitoring for unexpected spikes or off-hours use of the encryption key.
      audit: |
        ### Audit via Console

        1. Sign in to the [Google Cloud Console](https://console.cloud.google.com) and select the project.
        2. Navigate to **Cloud Run > Jobs**.
        3. Select a job name to open its details page.
        4. Click the **Security** tab.
        5. Check the **Encryption key** field.
        6. Repeat for each job.

        A passing job shows a Cloud KMS key resource name under **Encryption key**. A failing job shows no customer-managed encryption key configured.

        ### Audit via CLI

        1. Describe each Cloud Run job and check for an encryption key in the task template:

        ```bash
        gcloud run jobs describe JOB_NAME \
          --region=REGION \
          --format="value(spec.template.template.metadata.annotations.'run.googleapis.com/encryption-key')"
        ```

        A passing job returns a non-empty Cloud KMS key resource name. A failing job returns an empty or absent encryption key value.
      remediation:
        - id: terraform
          desc: |
            To ensure Cloud Run jobs use customer-managed encryption keys (CMEK) in Terraform:

            ```hcl
            resource "google_cloud_run_v2_job" "example" {
              name     = "example-job"
              location = "us-central1"

              template {
                template {
                  encryption_key = google_kms_crypto_key.example.id

                  containers {
                    image = "us-docker.pkg.dev/cloudrun/container/job"
                  }
                }
              }
            }
            ```
        - id: console
          desc: |
            To ensure Cloud Run jobs use customer-managed encryption keys (CMEK) using the Google Cloud Console:

            1. Navigate to **Cloud Run > Jobs** in the Google Cloud Console.
            2. Select the job or select **Create Job**.
            3. Under **Security**, select **Customer-managed encryption key**.
            4. Choose or create a Cloud KMS key.
            5. Save the job.
        - id: cli
          desc: |
            To ensure Cloud Run jobs use customer-managed encryption keys (CMEK) using the Google Cloud CLI:

            ```bash
            gcloud run jobs update JOB_NAME \
              --key=projects/PROJECT/locations/LOCATION/keyRings/RING/cryptoKeys/KEY \
              --region=REGION
            ```
    refs:
      - url: https://cloud.google.com/run/docs/securing/using-cmek
        title: Using customer-managed encryption keys with Cloud Run
