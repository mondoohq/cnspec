        values.restrictions != empty &&
        values.restrictions.all(_['api_targets'] != empty)
      )
  - uid: mondoo-gcp-security-api-keys-application-restrictions-configured
    title: Ensure API keys have application restrictions configured
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-16
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-6
      compliance/vda-isa-5: vda-isa-5-4-2-1
    variants:
      - uid: mondoo-gcp-security-api-keys-application-restrictions-configured-gcp
        tags:
          mondoo.com/filter-title: GCP API Key
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-api-keys-application-restrictions-configured-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-api-keys-application-restrictions-configured-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-api-keys-application-restrictions-configured-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that API keys are configured with application restrictions that limit which applications or network locations may use the key. By default, an API key has no application restrictions and can be used from any HTTP origin, IP address, Android app, or iOS app, meaning a leaked key is immediately usable from any location by any caller.

        **Why this matters**

        - **Source-based access control:** Application restrictions enforce that keys only function when called from authorized origins, providing a second layer of defense if a key is exposed in source code, logs, or client bundles.
        - **Credential theft mitigation:** A key extracted from a mobile app binary or intercepted in transit cannot be replayed from an attacker-controlled server if IP or app-identity restrictions are in place.
        - **Quota and cost protection:** Restricting a key to specific referrers or IP ranges prevents unauthorized callers from consuming API quota and generating unexpected charges.
        - **Defense in depth:** Application restrictions complement API target restrictions; together they constrain both what the key may call and where it may be called from.

        **Risk mitigation**

        - **Match restriction type to deployment context:** Use IP address restrictions for server-side keys, HTTP referrer restrictions for browser-based keys, and Android or iOS app restrictions for mobile keys.
        - **Avoid overly broad restriction values:** Set the narrowest possible IP ranges or referrer patterns; wildcards that cover large address blocks or domains reduce the effectiveness of the restriction.
        - **Rotate keys that lack restrictions:** If existing keys cannot immediately have restrictions applied, treat them as high-priority items for rotation or replacement with service account credentials.
      audit: |
        ### Audit via Console

        1. Open the [Google Cloud Console](https://console.cloud.google.com) and navigate to **APIs & Services > Credentials**.
        2. In the **API keys** section, click each key name to view its details.
        3. Under **Application restrictions**, verify that a restriction type other than **None** is selected (HTTP referrers, IP addresses, Android apps, or iOS apps).
        4. Confirm that restriction values are configured for the selected type.
        5. Repeat for all API keys in the project.

        A passing API key shows an application restriction type of HTTP referrers, IP addresses, Android apps, or iOS apps with at least one value configured. A failing API key shows **None** selected for application restrictions.

        ### Audit via CLI

        1. List all API keys in the project and check their restrictions:

        ```bash
        gcloud services api-keys list --project=PROJECT_ID --format=json
        ```

        For each key, inspect the `restrictions` object for a non-empty `browserKeyRestrictions`, `serverKeyRestrictions`, `androidKeyRestrictions`, or `iosKeyRestrictions` field. A passing API key returns at least one of those restriction blocks with configured values. A failing API key returns a `restrictions` object with none of those blocks present.
      remediation:
        - id: terraform
          desc: |
            To ensure API keys have application restrictions configured in Terraform:

            ```hcl
            resource "google_apikeys_key" "example" {
              name         = "example-key"
              display_name = "Example API Key"
              project      = var.project_id

              restrictions {
                server_key_restrictions {
                  allowed_ips = ["10.0.0.0/8"]
                }
                api_targets {
                  service = "maps-backend.googleapis.com"
                }
              }
            }
            ```
        - id: console
          desc: |
            To ensure API keys have application restrictions configured using the Google Cloud Console:

            1. Navigate to **APIs & Services > Credentials** in the Google Cloud Console.
            2. Select the API key to update.
            3. Under **Application restrictions**, select the appropriate restriction type:
               - **HTTP referrers** for browser applications
               - **IP addresses** for server applications
               - **Android apps** or **iOS apps** for mobile applications
            4. Configure the restriction values.
            5. Select **Save**.
        - id: cli
          desc: |
            To ensure API keys have application restrictions configured using the Google Cloud CLI, add IP restrictions:

            ```bash
            gcloud services api-keys update KEY_ID \
              --allowed-ips=10.0.0.0/8
            ```

            Add HTTP referrer restrictions:

            ```bash
            gcloud services api-keys update KEY_ID \
              --allowed-referrers=https://example.com/*
            ```
    refs:
      - url: https://cloud.google.com/docs/authentication/api-keys#api_key_restrictions
        title: API key restrictions
  - uid: mondoo-gcp-security-api-keys-application-restrictions-configured-gcp
    filters: asset.platform == 'gcp-apikey'
    mql: |
      gcp.project.apiKey.restrictions.browserKeyRestrictions != empty ||
      gcp.project.apiKey.restrictions.serverKeyRestrictions != empty ||
      gcp.project.apiKey.restrictions.androidKeyRestrictions != empty ||
      gcp.project.apiKey.restrictions.iosKeyRestrictions != empty
  - uid: mondoo-gcp-security-api-keys-application-restrictions-configured-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_apikeys_key')
    mql: |
      terraform.resources('google_apikeys_key').all(
        blocks.where(type == 'restrictions').all(
          blocks.where(type == 'server_key_restrictions' || type == 'browser_key_restrictions' || type == 'android_key_restrictions' || type == 'ios_key_restrictions') != empty
        )
      )
  - uid: mondoo-gcp-security-api-keys-application-restrictions-configured-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_apikeys_key')
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_apikeys_key').all(
        change.after.restrictions != empty &&
        change.after.restrictions.any(
          _['server_key_restrictions'] != empty ||
          _['browser_key_restrictions'] != empty ||
          _['android_key_restrictions'] != empty ||
          _['ios_key_restrictions'] != empty
        )
      )
  - uid: mondoo-gcp-security-api-keys-application-restrictions-configured-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'google_apikeys_key')
    mql: |
      terraform.state.resources.where(type == 'google_apikeys_key').all(
        values.restrictions != empty &&
        values.restrictions.any(
          _['server_key_restrictions'] != empty ||
          _['browser_key_restrictions'] != empty ||
          _['android_key_restrictions'] != empty ||
          _['ios_key_restrictions'] != empty
        )
      )
  - uid: mondoo-gcp-security-api-keys-not-stale
    title: Ensure API keys have been rotated within 90 days
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-12
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-5-17
      compliance/nis-2: nis-2-21-2-g
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-5
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-10
      compliance/pci-dss-4: pcidss-requirement-8-6-3
      compliance/soc2-2017: soc2-control-cc6-1-9
      compliance/vda-isa-5: vda-isa-5-4-1-3
    variants:
      - uid: mondoo-gcp-security-api-keys-not-stale-gcp
        tags:
          mondoo.com/filter-title: GCP API Key
          mondoo.com/filter-icon: gcp
    docs:
      desc: |
        This check ensures that API keys have been rotated within the last 90 days. By default, GCP does not enforce any rotation schedule on API keys, so keys can remain unchanged indefinitely, increasing the risk that a leaked or compromised credential continues to grant access long after the exposure occurred.

        **Why this matters**

        - **Exposure window:** The longer a key exists unchanged, the greater the chance it has been leaked through logs, repositories, or third-party integrations.
        - **Revocation gap:** A key that is never rotated remains valid even after the workload or team member that originally used it is decommissioned.
        - **Credential hygiene:** Regular rotation is a foundational practice for limiting the blast radius of any individual credential compromise.
        - **Audit accountability:** Key rotation creates a clear record showing that credential management is actively maintained.

        **Risk mitigation**

        - **Rotation schedule:** Rotate all API keys on a cadence of 90 days or less, and automate the process where possible.
        - **Stale key cleanup:** Delete keys that are no longer in use rather than leaving them to age beyond the rotation window.
        - **Usage monitoring:** Track key last-used timestamps and alert on keys that approach or exceed the 90-day threshold.
      audit: |
        ### Audit via Console

        1. Open the [Google Cloud Console](https://console.cloud.google.com) and navigate to **APIs & Services > Credentials**.
        2. In the **API keys** section, review the **Last used** or creation date for each key.
        3. Identify any keys that have not been created or updated within the last 90 days.

        A passing API key shows a creation or last-updated date within the past 90 days. A failing API key shows a creation date older than 90 days with no recent update.

        ### Audit via CLI

        1. List all API keys in the project with their creation and update timestamps:

        ```bash
        gcloud services api-keys list --project=PROJECT_ID --format="table(uid,displayName,createTime,updateTime)"
        ```

        A passing API key returns a `createTime` or `updateTime` within the past 90 days. A failing API key returns a `createTime` and `updateTime` both older than 90 days.
      remediation:
        - id: terraform
          desc: |
            To ensure API keys have been rotated within 90 days in Terraform, use Terraform to manage API keys with restrictions. To rotate a stale key, update the resource to force recreation:

            ```hcl
            resource "google_apikeys_key" "example" {
              name         = "example-key"
              display_name = "Example API Key"
              project      = var.project_id

              restrictions {
                api_targets {
                  service = "maps-backend.googleapis.com"
                }
              }
            }
            ```

            Note: To rotate the key, use `terraform apply -replace=google_apikeys_key.example` to force recreation. Ensure all consumers are updated to use the new key value.
        - id: console
          desc: |
            To ensure API keys have been rotated within 90 days using the Google Cloud Console:

            1. Navigate to **APIs & Services > Credentials** in the Google Cloud Console.
            2. Identify API keys that have not been updated recently.
            3. For each stale key, create a new key with the same restrictions.
            4. Update all consumers to use the new key.
            5. Delete the old key.
        - id: cli
          desc: |
            To ensure API keys have been rotated within 90 days using the Google Cloud CLI, list API keys and their creation dates:

            ```bash
            gcloud services api-keys list --project=PROJECT_ID
            ```

            Create a new key:

            ```bash
            gcloud services api-keys create --display-name="Rotated Key" --project=PROJECT_ID
            ```

            Delete the old key after updating consumers:

            ```bash
            gcloud services api-keys delete KEY_ID --project=PROJECT_ID
            ```
    refs:
      - url: https://cloud.google.com/docs/authentication/api-keys
        title: API keys overview
  - uid: mondoo-gcp-security-api-keys-not-stale-gcp
    filters: asset.platform == 'gcp-apikey'
    mql: |
      gcp.project.apiKey.updated > time.now - 90 * time.day || gcp.project.apiKey.created > time.now - 90 * time.day
  - uid: mondoo-gcp-security-compute-network-default-deleted
    title: Ensure the default network does not exist in the project
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-1-5
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-gcp-security-compute-network-default-deleted-gcp
        tags:
          mondoo.com/filter-title: GCP Compute Network
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-compute-network-default-deleted-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-compute-network-default-deleted-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-compute-network-default-deleted-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that the default VPC network has been removed from the project. GCP automatically creates a default network in every new project, pre-configured with permissive firewall rules that allow SSH, RDP, and ICMP from any source IP address on the internet.

        **Why this matters**

        - **Open remote access:** The default-allow-ssh and default-allow-rdp rules permit inbound connections from 0.0.0.0/0, creating immediate remote-access exposure for any instance deployed without explicit firewall scoping.
        - **Accidental deployment risk:** Developers and automation tools may inadvertently launch resources into the default network, inheriting its permissive rules without realizing the security impact.
        - **Weak segmentation:** The default network spans all regions with auto-mode subnetting, making it difficult to enforce isolation between workloads, environments, or security zones.
        - **Compliance posture:** Retaining the default network conflicts with CIS GCP Foundations Benchmark and many organizational network security baselines that require explicitly designed VPC topologies.

        **Risk mitigation**

        - **Delete the default network:** Remove the default VPC and all its associated firewall rules from every project as part of project bootstrapping.
        - **Custom network policy:** Use organization policy constraints (compute.skipDefaultNetworkCreation) to prevent the default network from being created in new projects automatically.
        - **Explicit network design:** Create purpose-built VPCs with custom subnets and narrowly scoped firewall rules for each workload tier.
      audit: |
        ### Audit via Console

        1. Open the [Google Cloud Console](https://console.cloud.google.com) and navigate to **VPC network > VPC networks**.
        2. Review the list of VPC networks in the project.
        3. Check whether a network named **default** appears in the list.

        A passing project shows no network named `default` in the VPC networks list. A failing project shows a network named `default` present in the list.

        ### Audit via CLI

        1. List all VPC networks and check for one named `default`:

        ```bash
        gcloud compute networks list --filter="name=default" --format="table(name,autoCreateSubnetworks,routingConfig.routingMode)"
        ```

        A passing project returns no results (empty output). A failing project returns a row showing the `default` network.
      remediation:
        - id: terraform
          desc: |
            To ensure the default network does not exist in the project in Terraform, prevent default network creation and create a custom network:

            ```hcl
            resource "google_compute_network" "custom" {
              name                    = "custom-network"
              auto_create_subnetworks = false
            }

            # Use an org policy to prevent default network creation
            resource "google_project_organization_policy" "no_default_network" {
              project    = var.project_id
              constraint = "compute.skipDefaultNetworkCreation"

              boolean_policy {
                enforced = true
              }
            }
            ```
        - id: console
          desc: |
            To ensure the default network does not exist in the project using the Google Cloud Console:

            1. Navigate to **VPC network > VPC networks** in the Google Cloud Console.
            2. Select the **default** network.
            3. Select **Delete VPC network**.
            4. Confirm the deletion. This will also delete all associated firewall rules and subnets.
            5. Create a custom VPC network with explicit subnet and firewall configurations.
        - id: cli
          desc: |
            To ensure the default network does not exist in the project using the Google Cloud CLI, delete the default network:

            ```bash
            gcloud compute networks delete default
            ```

            Create a custom network:

            ```bash
            gcloud compute networks create custom-network \
              --subnet-mode=custom
            ```
    refs:
      - url: https://cloud.google.com/vpc/docs/vpc#default-network
        title: Default network
      - url: https://cloud.google.com/resource-manager/docs/organization-policy/org-policy-constraints
        title: Organization policy constraints
  - uid: mondoo-gcp-security-compute-network-default-deleted-gcp
    filters: asset.platform == 'gcp-compute-network'
    mql: |
      gcp.compute.network.name != "default"
  - uid: mondoo-gcp-security-compute-network-default-deleted-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_compute_network')
    mql: |
      terraform.resources('google_compute_network').none(
        arguments.name == "default"
      )
  - uid: mondoo-gcp-security-compute-network-default-deleted-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_compute_network')
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_compute_network').none(
        change.after['name'] == "default"
      )
  - uid: mondoo-gcp-security-compute-network-default-deleted-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'google_compute_network')
    mql: |
      terraform.state.resources.where(type == 'google_compute_network').none(
        values['name'] == "default"
      )
  - uid: mondoo-gcp-security-compute-network-dns-logging-enabled
    title: Ensure DNS logging is enabled for VPC networks
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-07
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    variants:
      - uid: mondoo-gcp-security-compute-network-dns-logging-enabled-gcp
        tags:
          mondoo.com/filter-title: GCP
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-compute-network-dns-logging-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-compute-network-dns-logging-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-compute-network-dns-logging-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that a Cloud DNS policy with logging enabled is applied to all VPC networks in the project. By default, GCP does not log DNS queries made by resources within a VPC, leaving a significant visibility gap for threat detection and incident response.

        **Why this matters**

        - **Threat detection:** DNS queries reveal which external domains resources are communicating with, enabling detection of command-and-control activity, newly registered domains, and known malicious infrastructure.
        - **Exfiltration visibility:** DNS tunneling is a common data exfiltration technique that can only be detected through analysis of DNS query logs.
        - **Incident response:** DNS logs are essential during a security incident to determine the scope of a compromise, identify affected systems, and reconstruct attacker activity.
        - **Threat intelligence correlation:** Many threat intelligence feeds are DNS-based and require a log stream to match against indicators of compromise.

        **Risk mitigation**

        - **Enable DNS logging:** Create a Cloud DNS policy with enableLogging set to true and attach it to all VPC networks in the project.
        - **Forward to SIEM:** Route DNS logs to your security information and event management platform for correlation and alerting.
        - **Alert on anomalies:** Configure alerts for queries to known malicious domains, unusually high query rates, or long subdomain strings that indicate potential DNS tunneling.
      audit: |
        ### Audit via Console

        1. Open the [Google Cloud Console](https://console.cloud.google.com) and navigate to **Network services > Cloud DNS**.
        2. Select the **DNS Server Policies** tab.
        3. Review all DNS server policies and verify that at least one policy has **Logging** set to **On** and is applied to each VPC network in the project.

        A passing project shows DNS server policies with logging enabled applied to all VPC networks. A failing project shows no DNS server policies, or policies with logging disabled.

        ### Audit via CLI

        1. List all DNS server policies and check whether logging is enabled:

        ```bash
        gcloud dns policies list --format="table(name,enableLogging,networks.networkUrl.list())"
        ```

        A passing project returns at least one policy with `enableLogging: True` that covers all relevant VPC networks. A failing project returns no policies, or all policies show `enableLogging: False`.
      remediation:
        - id: terraform
          desc: |
            To ensure DNS logging is enabled for VPC networks in Terraform:

            ```hcl
            resource "google_dns_policy" "logging" {
              name           = "dns-logging-policy"
              enable_logging = true

              networks {
                network_url = google_compute_network.example.id
              }
            }
            ```
        - id: console
          desc: |
            To ensure DNS logging is enabled for VPC networks using the Google Cloud Console:

            1. Navigate to **Network services > Cloud DNS** in the Google Cloud Console.
            2. Select **DNS Server Policies** tab.
            3. Select **Create Policy**.
            4. Enable **Logging**.
            5. Select the VPC networks to apply the policy to.
            6. Select **Create**.
        - id: cli
          desc: |
            To ensure DNS logging is enabled for VPC networks using the Google Cloud CLI:

            ```bash
            gcloud dns policies create dns-logging-policy \
              --enable-logging \
              --networks=NETWORK_NAME
            ```
    refs:
      - url: https://cloud.google.com/dns/docs/monitoring
        title: Cloud DNS logging and monitoring
  - uid: mondoo-gcp-security-compute-network-dns-logging-enabled-gcp
    filters: asset.platform == 'gcp'
    mql: |
      gcp.project.dnsService.policies().length > 0
      gcp.project.dnsService.policies().all(enableLogging == true)
  - uid: mondoo-gcp-security-compute-network-dns-logging-enabled-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_dns_policy')
    mql: |
      terraform.resources('google_dns_policy').all(
        arguments.enable_logging == true
      )
  - uid: mondoo-gcp-security-compute-network-dns-logging-enabled-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_dns_policy')
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_dns_policy').all(
        change.after.enable_logging == true
      )
  - uid: mondoo-gcp-security-compute-network-dns-logging-enabled-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'google_dns_policy')
    mql: |
      terraform.state.resources.where(type == 'google_dns_policy').all(
        values.enable_logging == true
      )
  - uid: mondoo-gcp-security-compute-subnetwork-not-overly-broad-cidr
    title: Ensure subnetworks do not use overly broad IP CIDR ranges
    impact: 50
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-1-5
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-gcp-security-compute-subnetwork-not-overly-broad-cidr-gcp
        tags:
          mondoo.com/filter-title: GCP Compute Subnetwork
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-compute-subnetwork-not-overly-broad-cidr-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-compute-subnetwork-not-overly-broad-cidr-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-compute-subnetwork-not-overly-broad-cidr-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that VPC subnetworks do not use IP CIDR ranges broader than /16 (prefix length of 15 or less). Excessively large subnets place too many resources in the same broadcast domain, undermining network segmentation and making it harder to contain the impact of a security incident.

        **Why this matters**

        - **Segmentation effectiveness:** Large subnets such as /8 or /15 put thousands of hosts in a single network segment, reducing the ability to isolate compromised workloads from other systems.
        - **Firewall rule precision:** Firewall rules scoped to subnet ranges become far less precise when the subnet spans a very large address block, widening the effective scope of each rule.
        - **Blast radius:** A misconfiguration or compromised host in an oversized subnet can interact with a much larger population of peer resources than a properly scoped subnet would allow.
        - **GKE secondary ranges:** Overly large primary subnets constrain the design of secondary IP ranges needed for GKE pod and service CIDRs, limiting cluster growth options.

        **Risk mitigation**

        - **Right-size subnets:** Define subnets with the smallest CIDR range that meets current and near-term operational requirements, using /24 or smaller for most workload tiers.
        - **Workload isolation:** Use separate subnets for each workload type, environment (production, staging, development), and security zone.
        - **Review and remediate:** Audit existing subnets for overly broad ranges and migrate resources to correctly sized replacements where feasible.
      audit: |
        ### Audit via Console

        1. Open the [Google Cloud Console](https://console.cloud.google.com) and navigate to **VPC network > VPC networks**.
        2. Click each VPC network and review the **Subnets** tab.
        3. For each subnet, inspect the **IP address range** column.
        4. Flag any subnet whose CIDR prefix length is /15 or smaller (such as /8, /10, /12, /15), which indicates an overly broad range.

        A passing subnet shows an IP CIDR range with a prefix length of /16 or greater (such as `/24`, `/20`). A failing subnet shows a CIDR prefix of /15 or smaller.

        ### Audit via CLI

        1. List all subnets and their IP CIDR ranges:

        ```bash
        gcloud compute networks subnets list --format="table(name,region,ipCidrRange,network.basename())"
        ```

        A passing subnet returns an `ipCidrRange` with a prefix length of /16 or greater. A failing subnet returns an `ipCidrRange` with a prefix length of /15 or smaller (for example, `10.0.0.0/8` or `10.0.0.0/15`).
      remediation:
        - id: console
          desc: |
            To ensure subnetworks do not use overly broad IP CIDR ranges using the Google Cloud Console:

            1. Navigate to **VPC network > VPC networks** in the Google Cloud Console.
            2. Review each subnet's IP address range.
            3. For subnets with overly broad ranges, create new subnets with appropriately sized CIDR ranges.
            4. Migrate resources to the new subnets.
            5. Delete the oversized subnets.
        - id: cli
          desc: |
            To ensure subnetworks do not use overly broad IP CIDR ranges using the Google Cloud CLI, list subnets and their CIDR ranges:

            ```bash
            gcloud compute networks subnets list --format="table(name,region,ipCidrRange)"
            ```

            Create a properly sized subnet:

            ```bash
            gcloud compute networks subnets create NEW_SUBNET \
              --network=NETWORK \
              --region=REGION \
              --range=10.0.0.0/24
            ```
        - id: terraform
          desc: |
            To ensure subnetworks do not use overly broad IP CIDR ranges in Terraform, define subnets with appropriately sized CIDR ranges:

            ```hcl
            resource "google_compute_subnetwork" "example" {
              name          = "example-subnet"
              ip_cidr_range = "10.0.0.0/24"
              region        = "us-central1"
              network       = google_compute_network.example.id
            }
            ```

            Avoid using CIDR ranges of /15 or larger (broader than /16) for individual subnets. Use separate subnets for different workloads and environments to maintain proper network segmentation.
    refs:
      - url: https://cloud.google.com/vpc/docs/subnets
        title: Subnets overview
  - uid: mondoo-gcp-security-compute-subnetwork-not-overly-broad-cidr-gcp
    filters: |
      asset.platform == "gcp-compute-subnetwork"
      gcp.compute.subnetwork.purpose == "PRIVATE" || gcp.compute.subnetwork.purpose == ""
    mql: gcp.compute.subnetwork.ipCidrRange != /^\d+\.\d+\.\d+\.\d+\/(([0-9]|1[0-5]))$/
  - uid: mondoo-gcp-security-compute-subnetwork-not-overly-broad-cidr-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_compute_subnetwork')
    mql: |
      terraform.resources('google_compute_subnetwork').all(
        arguments.ip_cidr_range != /^\d+\.\d+\.\d+\.\d+\/(([0-9]|1[0-5]))$/
      )
  - uid: mondoo-gcp-security-compute-subnetwork-not-overly-broad-cidr-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_compute_subnetwork')
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_compute_subnetwork').all(
        change.after['ip_cidr_range'] != /^\d+\.\d+\.\d+\.\d+\/(([0-9]|1[0-5]))$/
      )
