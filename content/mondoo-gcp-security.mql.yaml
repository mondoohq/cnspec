  - uid: mondoo-gcp-security-memorystore-transit-encryption-enabled
    title: Ensure Memorystore (Valkey/Redis) instances enable in-transit encryption
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    variants:
      - uid: mondoo-gcp-security-memorystore-transit-encryption-enabled-gcp
        tags:
          mondoo.com/filter-title: GCP Memorystore (Valkey/Redis)
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-memorystore-transit-encryption-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-memorystore-transit-encryption-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-memorystore-transit-encryption-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Memorystore (Valkey/Redis) instances are configured to require in-transit encryption. By default, new instances can be created with `transit_encryption_mode` set to `TRANSIT_ENCRYPTION_DISABLED`, allowing traffic between clients and the cache to travel in cleartext within the VPC.

        **Why this matters**

        - **VPC-internal eavesdropping:** Any process with permission to capture packets on the same subnet, such as a debug sidecar or compromised neighbor, can read keys, tokens, and cached personal data from cleartext traffic.
        - **Inadvertent disclosure:** Mirror sessions, packet captures for troubleshooting, and VPC Flow Logs with payload sampling can become inadvertent disclosures of sensitive cached content.
        - **Cross-boundary exposure:** Cross-region peerings and Private Service Connect endpoints can carry unencrypted traffic across network boundaries the application owner does not control.
        - **Compliance requirements:** Regulatory frameworks such as PCI-DSS and HIPAA require encryption of cardholder data and PHI in transit, including on internal networks.

        **Risk mitigation**

        - **Server authentication:** Setting `transit_encryption_mode` to `SERVER_AUTHENTICATION` requires clients to establish TLS connections, preventing passive interception of cache traffic.
        - **Defense in depth:** Combining TLS with private PSC endpoints and IAM authentication creates layered access controls that each independently limit exposure.
      audit: |
        ### Audit via Console

        1. Open the [Google Cloud Console](https://console.cloud.google.com/) and navigate to **Memorystore > Instances**.
        2. Select each instance.
        3. On the instance details page, locate the **Security** section and review the **In-transit encryption** field.

        A passing instance shows **Server authentication (TLS)** for in-transit encryption. A failing instance shows **Disabled** or **None**.

        ### Audit via CLI

        1. List all instances and their transit encryption modes:

        ```bash
        gcloud memorystore instances list \
          --location=LOCATION \
          --format="table(name,transitEncryptionMode)"
        ```

        A passing instance returns `SERVER_AUTHENTICATION` in the `TRANSIT_ENCRYPTION_MODE` column. A failing instance returns `TRANSIT_ENCRYPTION_DISABLED`.
      remediation:
        - id: terraform
          desc: |
            ```hcl
            resource "google_memorystore_instance" "cache" {
              instance_id             = "my-instance"
              location                = "us-central1"
              shard_count             = 3
              transit_encryption_mode = "SERVER_AUTHENTICATION"
            }
            ```
        - id: console
          desc: |
            In-transit encryption mode can only be set at instance creation. Recreate the instance with TLS enabled:

            1. Go to **Memorystore > Instances**.
            2. Select **Create Instance**.
            3. Under **Security**, set **In-transit encryption** to **Server authentication (TLS)**.
            4. Migrate data and delete the unencrypted instance.
        - id: cli
          desc: |
            ```bash
            gcloud memorystore instances create INSTANCE_ID \
              --location=LOCATION \
              --shard-count=3 \
              --transit-encryption-mode=SERVER_AUTHENTICATION
            ```
    refs:
      - url: https://cloud.google.com/memorystore/docs/valkey/about-in-transit-encryption
        title: Memorystore in-transit encryption overview
  - uid: mondoo-gcp-security-memorystore-transit-encryption-enabled-gcp
    filters: asset.platform == 'gcp'
    mql: |
      gcp.memorystore.instances.all(transitEncryptionMode == "SERVER_AUTHENTICATION")
  - uid: mondoo-gcp-security-memorystore-transit-encryption-enabled-terraform-hcl
    filters: |
