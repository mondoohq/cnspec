      compliance/vda-isa-5: vda-isa-5-5-1-2
    variants:
      - uid: mondoo-gcp-security-cloud-sql-sql-server-connections-require-ssl-tls-gcp
        tags:
          mondoo.com/filter-title: GCP Cloud SQL for SQL Server
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-cloud-sql-sql-server-connections-require-ssl-tls-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-sql-sql-server-connections-require-ssl-tls-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-sql-sql-server-connections-require-ssl-tls-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Cloud SQL for SQL Server instances are configured to require SSL/TLS for all incoming connections. By default, Cloud SQL accepts both encrypted and unencrypted connections; requiring SSL/TLS forces all clients to encrypt data in transit, preventing interception between the client and the SQL Server instance.

        **Why this matters**

        - **Data confidentiality in transit:** SQL Server instances often handle sensitive business data; plaintext connections expose query results, credentials, and application data to network-level observers.
        - **Protection against eavesdropping:** Any party on the network path between the application and the database, including cloud infrastructure components, can capture unencrypted traffic.
        - **Integrity assurance:** TLS prevents in-transit modification of SQL commands or result sets, guarding against attacks that tamper with database payloads.
        - **Credential protection:** Login credentials sent over unencrypted connections can be captured and replayed without detection.

        **Risk mitigation**

        - **Enforce encrypted-only mode:** Set `sslMode` to `ENCRYPTED_ONLY` so the server rejects any connection attempt that does not use TLS at the transport layer.
        - **Client configuration alignment:** Update application connection strings and service accounts to connect over TLS so no unencrypted path to the SQL Server instance remains available.
      audit: |
        **Using Google Cloud Console**

        1.  Navigate to the Cloud SQL Instances page: https://console.cloud.google.com/sql/instances
        2.  Select the name of the SQL Server instance you want to audit.
        3.  Select the **Connections** tab.
        4.  Go to the **Security** sub-tab.
        5.  Verify that the checkbox for **Allow only SSL connections** is checked.

        **Using Google Cloud CLI**

        1.  Retrieve the configuration details for the instance:
            ```bash
            gcloud sql instances describe INSTANCE_NAME
            ```
        2.  Inspect the output and locate the `settings.ipConfiguration` section.
        3.  Ensure the value for `sslMode` is set to `ENCRYPTED_ONLY`.

            Example relevant output snippet:
            ```yaml
            settings:
              ipConfiguration:
                sslMode: ENCRYPTED_ONLY
            ```
      remediation:
        - id: console
          desc: |
            To ensure Cloud SQL for SQL Server connections require SSL/TLS using the Google Cloud Console:

            1.  Access the Cloud SQL Instances overview page: https://console.cloud.google.com/sql/instances
            2.  Select the name of the target SQL Server instance.
            3.  Navigate to the **Connections** tab, then the **Security** sub-tab.
            4.  Check the box labeled **Allow only SSL connections**.
            5.  Select **Save** to apply the change. *Note: This may trigger an instance restart.*

            **Prevention:**

            Always configure new Cloud SQL for SQL Server instances with the "Allow only SSL connections" option enabled during creation via the Console. Regularly audit instances to ensure compliance.
        - id: cli
          desc: |
            To ensure Cloud SQL for SQL Server connections require SSL/TLS using the Google Cloud CLI:

            1.  Enable the SSL Mode to be "ENCRYPTED_ONLY":
                ```bash
                gcloud sql instances patch INSTANCE_NAME --ssl-mode=ENCRYPTED_ONLY
                ```
                *Note: This command may cause the instance to restart.*

            **Prevention:**

            Always configure new Cloud SQL for SQL Server instances with the `--ssl-mode=ENCRYPTED_ONLY` flag during creation via the CLI. Regularly audit instances to ensure compliance.
        - id: terraform
          desc: |
            To ensure Cloud SQL for SQL Server connections require SSL/TLS in Terraform, ensure the `ssl_mode` attribute within the `ip_configuration` block is set to `"ENCRYPTED_ONLY"`:

            ```hcl
            resource "google_sql_database_instance" "default" {
              name             = "my-sql-server-instance"
              database_version = "SQLSERVER_2019_STANDARD"
              region           = "us-central1"

              settings {
                tier = "db-f1-micro"
                ip_configuration {
                  ipv4_enabled = true
                  ssl_mode     = "ENCRYPTED_ONLY"
                }
              }
            }
            ```

            **Prevention:**

            Always configure new Cloud SQL for SQL Server instances with `ssl_mode = "ENCRYPTED_ONLY"` during creation via Terraform. Regularly audit instances to ensure compliance.
    refs:
      - url: https://cloud.google.com/sql/docs/mysql/best-practices
        title: Cloud SQL Best Practices
  - uid: mondoo-gcp-security-cloud-sql-sql-server-connections-require-ssl-tls-gcp
    filters: |
      asset.platform == 'gcp-sql-sqlserver'
    mql: |
      gcp.sql.instance.settings.ipConfiguration.sslMode == "ENCRYPTED_ONLY"
  - uid: mondoo-gcp-security-cloud-sql-sql-server-connections-require-ssl-tls-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' &&
        terraform.resources('google_sql_database_instance').where(arguments['database_version'].contains('SQLSERVER')) != empty
    mql: |
      # Check that ip_configuration block with ssl_mode exists and ssl_mode is set to ENCRYPTED_ONLY on all SQL Server instances
      terraform.resources('google_sql_database_instance').where(arguments['database_version'].contains('SQLSERVER')).all(
        blocks.where(type == 'settings') != empty &&
        blocks.where(type == 'settings').all(blocks.where(type == 'ip_configuration') != empty) &&
        blocks.where(type == 'settings').all(
          blocks.where(type == 'ip_configuration').all(
            arguments.ssl_mode == "ENCRYPTED_ONLY"
          )
        )
      )
  - uid: mondoo-gcp-security-cloud-sql-sql-server-connections-require-ssl-tls-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_sql_database_instance' && change.after.database_version.contains('SQLSERVER'))
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_sql_database_instance' && change.after.database_version.contains('SQLSERVER')).all(
        change.after['settings'].all(
          _['ip_configuration'].all(
            _['ssl_mode'] == 'ENCRYPTED_ONLY'
          )
        )
      )
  - uid: mondoo-gcp-security-cloud-sql-sql-server-connections-require-ssl-tls-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'google_sql_database_instance' && values.database_version.contains('SQLSERVER'))
    mql: |
      terraform.state.resources.where(type == 'google_sql_database_instance' && values.database_version.contains('SQLSERVER')).all(
        values['settings'].all(
          _['ip_configuration'].all(
            _['ssl_mode'] == 'ENCRYPTED_ONLY'
          )
        )
      )
  - uid: mondoo-gcp-security-cloud-kms-cryptokeys-not-publicly-accessible
    title: Ensure That Cloud KMS Cryptokeys Are Not Anonymously or Publicly Accessible
    impact: 100
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-12
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-10
      compliance/pci-dss-4: pcidss-requirement-3-6-1
      compliance/soc2-2017: soc2-control-cc6-1-11
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-gcp-security-cloud-kms-cryptokeys-not-publicly-accessible-gcp
        tags:
          mondoo.com/filter-title: GCP Cloud KMS Keyring
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-cloud-kms-cryptokeys-not-publicly-accessible-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-kms-cryptokeys-not-publicly-accessible-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-kms-cryptokeys-not-publicly-accessible-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Cloud KMS cryptokeys are not accessible to anonymous users or the general public by verifying that neither `allUsers` nor `allAuthenticatedUsers` appears in any cryptokey IAM policy binding. Google Cloud KMS does not restrict these principals by default at the IAM level, so explicit review is required to prevent inadvertent public key exposure.

        **Why this matters**

        - **Key material exposure:** A publicly accessible cryptokey allows any internet user to invoke encrypt or decrypt operations, potentially exposing the plaintext of data protected by that key.
        - **Lateral movement risk:** An attacker who can call KMS decrypt operations can unwrap data encryption keys and gain access to the data those keys protect, bypassing application-layer controls.
        - **IAM blast radius:** Granting `allAuthenticatedUsers` appears narrower than `allUsers` but applies to every Google account globally, including attacker-controlled accounts created for free.
        - **Compliance obligations:** Regulatory frameworks require that cryptographic keys be accessible only to explicitly authorized identities, never to the general public.

        **Risk mitigation**

        - **Remove public bindings immediately:** Audit all cryptokey IAM policies and remove any binding that includes `allUsers` or `allAuthenticatedUsers` as a member.
        - **Apply least-privilege IAM:** Grant KMS roles only to specific service accounts or user principals that have a documented need to perform encrypt or decrypt operations.
        - **Audit continuously:** Implement organization policies or continuous monitoring to alert whenever a KMS resource IAM policy is modified to include a public principal.
      audit: |
        **Using Google Cloud Console**

        1.  Navigate to the Cloud KMS Keys page: https://console.cloud.google.com/security/kms/keys
        2.  Select a key ring to view its cryptokeys.
        3.  For each cryptokey, click the **Permissions** tab.
        4.  Verify that neither `allUsers` nor `allAuthenticatedUsers` appears in the member list.

        **Using Google Cloud CLI**

        1. List all Cloud KMS `Cryptokeys`:
        ```bash
        gcloud kms keys list --keyring=[key_ring_name] --location=global --format=json | jq '.[].name'
        ```
        2. Ensure the below command's output does not contain `allUsers` or `allAuthenticatedUsers`:
        ```bash
        gcloud kms keys get-iam-policy [key_name] --keyring=[key_ring_name] --location=global --format=json | jq '.bindings[].members[]'
        ```
      remediation:
        - id: console
          desc: |
            To ensure That Cloud KMS Cryptokeys Are Not Anonymously or Publicly Accessible using the Google Cloud Console:

            1.  Navigate to the Cloud KMS Keys page: https://console.cloud.google.com/security/kms/keys
            2.  Select the key ring containing the target cryptokey.
            3.  Click on the cryptokey name to view its details.
            4.  Navigate to the **Permissions** tab.
            5.  For any binding that includes `allUsers` or `allAuthenticatedUsers`:
                - Click the **Edit** (pencil) icon for that binding.
                - Remove `allUsers` and/or `allAuthenticatedUsers` from the members list.
                - Select **Save** to apply the changes.

            **Prevention:**

            When creating new cryptokeys or modifying IAM policies, ensure that `allUsers` and `allAuthenticatedUsers` are never added as members. Regularly audit cryptokey permissions to ensure compliance.
        - id: cli
          desc: |
            To ensure That Cloud KMS Cryptokeys Are Not Anonymously or Publicly Accessible using the Google Cloud CLI:

            1. List all Cloud KMS `Cryptokeys`:
            ```bash
            gcloud kms keys list --keyring=[key_ring_name] --location=global --format=json | jq '.[].name'
            ```
            2. Remove IAM policy binding for a KMS key to remove access to `allUsers` and `allAuthenticatedUsers`:
            ```bash
            gcloud kms keys remove-iam-policy-binding [key_name] --keyring=[key_ring_name] --location=global --member='allAuthenticatedUsers' --role='[role]'

            gcloud kms keys remove-iam-policy-binding [key_name] --keyring=[key_ring_name] --location=global --member='allUsers' --role='[role]'
            ```

            **Prevention:**

            When creating new cryptokeys or modifying IAM policies via CLI, ensure that `allUsers` and `allAuthenticatedUsers` are never included in policy bindings. Regularly audit cryptokey permissions to ensure compliance.
        - id: terraform
          desc: |
            To ensure That Cloud KMS Cryptokeys Are Not Anonymously or Publicly Accessible in Terraform, ensure that IAM policy resources for KMS crypto keys do not include `allUsers` or `allAuthenticatedUsers` as members:

            ```hcl
            # Good example - specific users/service accounts only
            resource "google_kms_crypto_key_iam_binding" "crypto_key" {
              crypto_key_id = google_kms_crypto_key.key.id
              role          = "roles/cloudkms.cryptoKeyEncrypter"

              members = [
                "user:jane@example.com",
                "serviceAccount:my-service@project.iam.gserviceaccount.com",
              ]
            }

            # Avoid - public access
            resource "google_kms_crypto_key_iam_binding" "crypto_key_bad" {
              crypto_key_id = google_kms_crypto_key.key.id
              role          = "roles/cloudkms.cryptoKeyEncrypter"

              members = [
                "allUsers",                    # Remove this
                "allAuthenticatedUsers",       # Remove this
                "user:jane@example.com",
              ]
            }
            ```

            **Prevention:**

            Always review IAM policies for KMS crypto keys during code reviews. Use Terraform validation rules or policy-as-code tools to prevent public access grants. Regularly audit your Terraform configurations to ensure compliance.
    refs:
      - url: https://cloud.google.com/kms/docs/reference
        title: Cloud KMS Documentation
  - uid: mondoo-gcp-security-cloud-kms-cryptokeys-not-publicly-accessible-gcp
    filters: asset.platform == "gcp-kms-keyring"
    mql: |
      gcp.project.kms.keyring.cryptokeys.all(
        iamPolicy.all(
          members.none(_ == "allUsers" || _ == "allAuthenticatedUsers")
        )
      )
  - uid: mondoo-gcp-security-cloud-kms-cryptokeys-not-publicly-accessible-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' &&
        terraform.resources.where( nameLabel.in(['google_kms_crypto_key_iam_policy', 'google_kms_crypto_key_iam_binding','google_kms_crypto_key_iam_member'])) != empty
    mql: |
      terraform.resources.where(nameLabel == 'google_kms_crypto_key_iam_policy' || nameLabel == 'google_kms_crypto_key_iam_binding')
        .all(
          arguments.members == empty || arguments.members.none(_ == 'allUsers' || _ == 'allAuthenticatedUsers')
        )
      terraform.resources('google_kms_crypto_key_iam_member').all(
        arguments.member != 'allUsers' && arguments.member != 'allAuthenticatedUsers'
      )
  - uid: mondoo-gcp-security-cloud-kms-cryptokeys-not-publicly-accessible-terraform-plan
    filters: |
      asset.platform == 'terraform-plan'
      terraform.plan.resourceChanges.contains(type == 'google_kms_crypto_key_iam_policy') ||
      terraform.plan.resourceChanges.contains(type == 'google_kms_crypto_key_iam_binding') ||
      terraform.plan.resourceChanges.contains(type == 'google_kms_crypto_key_iam_member')
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_kms_crypto_key_iam_policy' || type == 'google_kms_crypto_key_iam_binding')
        .all(
          change.after.members == empty || change.after.members.none(_ == 'allUsers' || _ == 'allAuthenticatedUsers')
        )
      terraform.plan.resourceChanges.where(type == 'google_kms_crypto_key_iam_member').all(
        change.after.member != 'allUsers' && change.after.member != 'allAuthenticatedUsers'
      )
  - uid: mondoo-gcp-security-cloud-kms-cryptokeys-not-publicly-accessible-terraform-state
    filters: |
      asset.platform == 'terraform-state'
      terraform.state.resources.contains(type == 'google_kms_crypto_key_iam_policy') ||
      terraform.state.resources.contains(type == 'google_kms_crypto_key_iam_binding') ||
      terraform.state.resources.contains(type == 'google_kms_crypto_key_iam_member')
    mql: |
      terraform.state.resources.where(type == 'google_kms_crypto_key_iam_policy' || type == 'google_kms_crypto_key_iam_binding')
        .all(
          values.members == empty || values.members.none(_ == 'allUsers' || _ == 'allAuthenticatedUsers')
        )
      terraform.state.resources.where(type == 'google_kms_crypto_key_iam_member').all(
        values.member != 'allUsers' && values.member != 'allAuthenticatedUsers'
      )
  - uid: mondoo-gcp-security-cloud-kms-keys-rotated-90-days
    title: Ensure KMS Encryption Keys Are Rotated Within a Period of 90 Days
    impact: 30
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-12
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-12
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-10
      compliance/pci-dss-4: pcidss-requirement-3-7-4
      compliance/soc2-2017: soc2-control-cc6-1-11
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-gcp-security-cloud-kms-keys-rotated-90-days-gcp
        tags:
          mondoo.com/filter-title: GCP Cloud KMS Keyring
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-cloud-kms-keys-rotated-90-days-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-kms-keys-rotated-90-days-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-kms-keys-rotated-90-days-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Cloud KMS cryptokeys with a primary key version in the `ENABLED` state are configured with a rotation period of 90 days or less. By default, Cloud KMS does not automatically rotate keys; without an explicit rotation schedule, a single key version may protect data indefinitely, extending the window of exposure if that key material is ever compromised.

        **Why this matters**

        - **Limited exposure window:** Regular rotation caps the amount of data encrypted under any single key version, so a compromised key version only exposes data from its active rotation period rather than the entire history.
        - **Forward secrecy for stored data:** Each rotation creates a new primary key version, so future encryption uses fresh key material even if an older version was leaked.
        - **Cryptographic hygiene:** Periodic key rotation is a baseline cryptographic practice recommended by NIST, PCI DSS, and other frameworks to reduce the likelihood that key material has been silently exfiltrated.

        **Risk mitigation**

        - **Configure automatic rotation:** Set a `rotationPeriod` of `7776000s` (90 days) or less on all enabled cryptokeys so Cloud KMS creates new primary key versions on schedule without manual intervention.
        - **Monitor rotation events:** Audit Cloud KMS key rotation logs to verify rotations are occurring as scheduled and alert on any key that is overdue.
        - **Retain older versions appropriately:** After rotation, previous key versions remain available to decrypt data that was encrypted with them; disable and schedule destruction only after confirming no data is still encrypted under those versions.
      audit: |
        **Using Google Cloud Console**

        1. Navigate to the Cryptographic Keys section of the Google Cloud Console by visiting: [https://console.cloud.google.com/security/kms](https://console.cloud.google.com/security/kms).

        2. Select each key ring sequentially. Within each key ring, verify that every key's "Next Rotation" is scheduled to occur within 90 days from the current date.

        **Using Google Cloud CLI**

        1. To confirm that a rotation schedule is configured for each key, including both the ROTATION_PERIOD and NEXT_ROTATION_TIME, use the following command:

        ```bash
        gcloud kms keys list --keyring=<KEY_RING> --location=<LOCATION> --format='value(rotationPeriod)'
        ```

        Ensure the returned values for rotationPeriod and nextRotationTime adhere to the following criteria:

        - `rotationPeriod` must not exceed 129600m (minutes).
        - `rotationPeriod` must not exceed 7776000s (seconds).
        - `rotationPeriod` must not exceed 2160h (hours).
        - `rotationPeriod` must not exceed 90d (days).
        - `nextRotationTime` must be scheduled within 90 days from the current date.
      remediation:
        - id: console
          desc: |
            To ensure KMS Encryption Keys Are Rotated Within a Period of 90 Days using the Google Cloud Console:

            1. Access the `Cryptographic Keys` page: [https://console.cloud.google.com/security/kms](https://console.cloud.google.com/security/kms).
            2. Select the desired key ring.
            3. From the list of keys, locate and click the three-dot menu icon on the right side of the specific key.
            4. Choose "Edit rotation period" from the options.
            5. In the pop-up window, set a new rotation period (in days) to be less than 90 days, and specify a "Starting on" date for the rotation to begin.
        - id: cli
          desc: |
            To ensure KMS Encryption Keys Are Rotated Within a Period of 90 Days using the Google Cloud CLI, update and schedule rotation by `ROTATION_PERIOD` and `NEXT_ROTATION_TIME` for each key:

            ```bash
            gcloud kms keys update KEY_NAME --keyring=KEY_RING --location=LOCATION --next-rotation-time=NEXT_ROTATION_TIME --rotation-period=ROTATION_PERIOD
            ```
        - id: terraform
          desc: |
            To ensure KMS Encryption Keys Are Rotated Within a Period of 90 Days in Terraform, configure automatic key rotation for your KMS cryptokeys by setting a rotation period of 90 days or less:

            ```hcl
            resource "google_kms_crypto_key" "example" {
              name     = "example-key"
              key_ring = google_kms_key_ring.example.id

              # Rotate every 90 days (maximum)
              rotation_period = "7776000s"  # 90 days in seconds

              lifecycle {
                prevent_destroy = true
              }
            }

            resource "google_kms_key_ring" "example" {
              name     = "example-keyring"
              location = "global"
            }
            ```

            **Prevention:**

            Always configure key rotation periods in your Terraform KMS configurations. Use Terraform validation rules or policy-as-code tools to ensure rotation periods are set to 90 days or less. Regularly audit your Terraform configurations to ensure compliance with key rotation requirements.
    refs:
      - url: https://cloud.google.com/kms/docs/reference
        title: Cloud KMS Documentation
  - uid: mondoo-gcp-security-cloud-kms-keys-rotated-90-days-gcp
    filters: asset.platform == "gcp-kms-keyring"
    mql: |
      gcp.project.kms.keyring.cryptokeys.where(primary.state == "ENABLED").all(rotationPeriod.seconds <= 7776000)
  - uid: mondoo-gcp-security-cloud-kms-keys-rotated-90-days-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' &&
        terraform.resources('google_kms_crypto_key') != empty
    mql: |
      terraform.resources('google_kms_crypto_key').all(
        arguments['rotation_period'] != empty &&
        arguments['rotation_period'] == /^([0-9]{1,6}|[1-6][0-9]{6}|7[0-6][0-9]{5}|77[0-6][0-9]{4}|777[0-5][0-9]{3}|7776000)s$/
      )
  - uid: mondoo-gcp-security-cloud-kms-keys-rotated-90-days-terraform-plan
    filters: |
      asset.platform == 'terraform-plan'
      terraform.plan.resourceChanges.contains(type == 'google_kms_crypto_key')
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_kms_crypto_key').all(
        change.after['rotation_period'] != empty &&
        change.after['rotation_period'] == /^([0-9]{1,6}|[1-6][0-9]{6}|7[0-6][0-9]{5}|77[0-6][0-9]{4}|777[0-5][0-9]{3}|7776000)s$/
      )
  - uid: mondoo-gcp-security-cloud-kms-keys-rotated-90-days-terraform-state
    filters: |
      asset.platform == 'terraform-state'
      terraform.state.resources.contains(type == 'google_kms_crypto_key')
    mql: |
      terraform.state.resources.where(type == 'google_kms_crypto_key').all(
        values['rotation_period'] != empty &&
        values['rotation_period'] == /^([0-9]{1,6}|[1-6][0-9]{6}|7[0-6][0-9]{5}|77[0-6][0-9]{4}|777[0-5][0-9]{3}|7776000)s$/
      )
  - uid: mondoo-gcp-security-cloud-kms-keys-destroy-scheduled-duration
    title: Ensure KMS crypto keys have a destroy scheduled duration of 24h+
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-14
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-12
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-10
      compliance/pci-dss-4: pcidss-requirement-3-7-5
      compliance/soc2-2017: soc2-control-cc6-1-11
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-gcp-security-cloud-kms-keys-destroy-scheduled-duration-gcp
        tags:
          mondoo.com/filter-title: GCP Cloud KMS Keyring
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-cloud-kms-keys-destroy-scheduled-duration-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-kms-keys-destroy-scheduled-duration-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-kms-keys-destroy-scheduled-duration-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Cloud KMS crypto keys have a destroy scheduled duration of at least 24 hours (86400 seconds). When a key version is scheduled for destruction, it enters the `DESTROY_SCHEDULED` state for the configured duration before being permanently deleted; a minimum of 24 hours gives security teams a recovery window to cancel accidental or malicious destruction requests.

        **Why this matters**

        - **Accidental deletion protection:** Administrative mistakes or automated scripts with overly broad permissions can trigger key destruction; a mandatory waiting period provides time to detect and reverse the action before data becomes irrecoverable.
        - **Malicious destruction defense:** An attacker with brief IAM access can schedule key destruction as a sabotage vector; a longer window allows defenders to detect the scheduled destruction event and cancel it before permanent loss occurs.
        - **Irreversibility of key destruction:** Once a Cloud KMS key version is permanently destroyed, all data encrypted solely with that version is unrecoverable; no backup or restore mechanism exists at the infrastructure level.

        **Risk mitigation**

        - **Set destroy scheduled duration at creation:** Configure `destroyScheduledDuration` to at least `86400s` when creating each crypto key, as this value cannot be changed after creation.
        - **Consider longer windows for critical keys:** Keys protecting regulated or business-critical data should use a 30-day or longer destroy scheduled duration to allow compliance review processes to complete before destruction.
        - **Alert on destruction events:** Configure Cloud Monitoring or Pub/Sub notifications for KMS `CryptoKeyVersion` state change events so security teams can review and cancel scheduled destructions before they finalize.
      audit: |
        ### Audit via Console

        1. In the Google Cloud console, navigate to **Security** > **Key Management**.
        2. Select a key ring to view its crypto keys.
        3. For each crypto key, select its name to open the key details.
        4. Under **Key details**, review the **Scheduled for destruction duration** field.
        5. Confirm the value is at least **24 hours** (86400 seconds).

        A passing crypto key shows a destruction duration of 24 hours or more. A failing crypto key shows a destruction duration shorter than 24 hours, such as the default of 24 hours if configured shorter.

        ### Audit via CLI

        1. List all key rings in a location:

        ```bash
        gcloud kms keyrings list --location=LOCATION
        ```

        2. List all crypto keys in a key ring and check the destroy scheduled duration:

        ```bash
        gcloud kms keys list \
          --keyring=KEY_RING \
          --location=LOCATION \
          --format="table(name,destroyScheduledDuration)"
        ```

        3. Describe a specific key to inspect its destroy scheduled duration:

        ```bash
        gcloud kms keys describe KEY_NAME \
          --keyring=KEY_RING \
          --location=LOCATION \
          --format="get(destroyScheduledDuration)"
        ```

        A passing crypto key returns a `destroyScheduledDuration` value of `86400s` or greater. A failing crypto key returns a value less than `86400s`.
      remediation:
        - id: terraform
          desc: |
            To ensure KMS crypto keys have a destroy scheduled duration of 24h+ in Terraform, configure the destroy scheduled duration when creating crypto keys:

            ```hcl
            resource "google_kms_crypto_key" "example" {
              name     = "example-key"
              key_ring = google_kms_key_ring.example.id

              # At least 24 hours (86400 seconds)
              destroy_scheduled_duration = "86400s"

              rotation_period = "7776000s"

              lifecycle {
                prevent_destroy = true
              }
            }
            ```
        - id: console
          desc: |
            To ensure KMS crypto keys have a destroy scheduled duration of 24h+ using the Google Cloud Console, the destroy scheduled duration is set at key creation time and cannot be modified after creation. To ensure compliance:

            1. Navigate to **Security** > **Key Management** in the GCP Console.
            2. When creating a new crypto key, expand **Advanced settings**.
            3. Set the **Scheduled for destruction duration** to at least 24 hours.
            4. For existing keys with insufficient duration, create a new key with the correct duration and re-encrypt data with the new key.
        - id: cli
          desc: |
            To ensure KMS crypto keys have a destroy scheduled duration of 24h+ using the Google Cloud CLI, set the destroy scheduled duration when creating a new crypto key:

            ```bash
            gcloud kms keys create KEY_NAME \
              --keyring=KEY_RING \
              --location=LOCATION \
              --purpose=encryption \
              --destroy-scheduled-duration=24h
            ```

            For existing keys, the destroy scheduled duration cannot be changed. Create a new key with the correct duration and migrate encrypted data.
    refs:
      - url: https://cloud.google.com/kms/docs/reference
        title: Cloud KMS Documentation
