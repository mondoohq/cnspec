    docs:
      desc: |
        This check ensures that Vertex AI datasets are encrypted using customer-managed encryption keys (CMEK). By default, Google encrypts dataset contents with Google-managed keys, but CMEK gives organizations direct control over key lifecycle and the ability to revoke access independent of GCP.

        **Why this matters**

        - **Key control:** Organizations can revoke access to all dataset contents at any time by disabling or destroying the CMEK key, without relying on Google.
        - **Sensitive data protection:** Training and evaluation datasets frequently contain PII, financial records, or health data that regulated industries must encrypt with customer-controlled keys.
        - **Compliance alignment:** Frameworks such as HIPAA and PCI DSS require demonstrable control over encryption keys for stores holding regulated data.
        - **Auditability:** CMEK usage is visible in Cloud KMS audit logs, providing a verifiable record of key access for dataset operations.

        **Risk mitigation**

        - **Access revocation:** Disabling the CMEK key immediately prevents all new reads and writes to the dataset, limiting exposure after a security incident.
        - **Separation of duties:** Storing keys in a separate KMS project from the dataset enforces a boundary between data operators and key custodians.
      audit: |
        ### Audit via Console

        1. In the Google Cloud Console, navigate to **Vertex AI > Datasets**.
        2. Click each dataset name to open its details.
        3. Under the **Dataset details** section, look for the **Encryption** field.

        A passing dataset shows a Cloud KMS key name under **Encryption**. A failing dataset shows no encryption key configured or only Google-managed encryption.

        ### Audit via CLI

        1. List all Vertex AI datasets and their encryption specification:

        ```bash
        gcloud ai datasets list \
          --region=REGION \
          --format="table(name,displayName,encryptionSpec.kmsKeyName)"
        ```

        A passing dataset returns a KMS key name in the `KMS_KEY_NAME` column. A failing dataset returns an empty value in that column.
      remediation:
        - id: terraform
          desc: |
            To ensure Vertex AI datasets are encrypted with CMEK in Terraform, configure CMEK encryption when creating a Vertex AI dataset:

            ```hcl
            resource "google_vertex_ai_dataset" "example" {
              display_name        = "example-dataset"
              metadata_schema_uri = "gs://google-cloud-aiplatform/schema/dataset/metadata/image_1.0.0.yaml"
              region              = "us-central1"

              encryption_spec {
                kms_key_name = google_kms_crypto_key.example.id
              }
            }

            resource "google_kms_crypto_key" "example" {
              name     = "example-key"
              key_ring = google_kms_key_ring.example.id
            }

            resource "google_kms_key_ring" "example" {
              name     = "example-keyring"
              location = "us-central1"
            }
            ```
        - id: console
          desc: |
            To ensure Vertex AI datasets are encrypted with CMEK using the Google Cloud Console, note: CMEK must be configured at dataset creation time.

            1. Go to the **Vertex AI** page in the Google Cloud Console.
            2. Navigate to **Datasets**.
            3. Select **Create Dataset**.
            4. Under **Encryption**, select **Customer-managed encryption key (CMEK)**.
            5. Select or create a Cloud KMS key.
            6. Complete the dataset creation.
        - id: cli
          desc: |
            The `gcloud ai datasets create` command does not support specifying a CMEK encryption key directly. Use the Vertex AI REST API to create a dataset with CMEK:

            ```bash
            curl -X POST \
              -H "Authorization: Bearer $(gcloud auth print-access-token)" \
              -H "Content-Type: application/json" \
              "https://REGION-aiplatform.googleapis.com/v1/projects/PROJECT/locations/REGION/datasets" \
              -d '{
                "displayName": "DATASET_NAME",
                "encryptionSpec": {
                  "kmsKeyName": "projects/PROJECT/locations/LOCATION/keyRings/RING/cryptoKeys/KEY"
                }
              }'
            ```
    refs:
