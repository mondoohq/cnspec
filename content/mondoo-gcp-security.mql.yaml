  - uid: mondoo-gcp-security-vertexai-pipeline-job-cmek-encryption
    title: Ensure Vertex AI pipeline jobs are encrypted with CMEK
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    # NOTE (2026-03-29): Terraform variants not included because Vertex AI pipeline jobs have no
    # corresponding Terraform resource (google_vertex_ai_pipeline_job does not exist in the
    # Terraform Google provider). Pipeline jobs are created via API/SDK only.
    variants:
      - uid: mondoo-gcp-security-vertexai-pipeline-job-cmek-encryption-gcp
        tags:
          mondoo.com/filter-title: GCP Vertex AI
          mondoo.com/filter-icon: gcp
    docs:
      desc: |
        This check ensures that Vertex AI pipeline jobs are encrypted using customer-managed encryption keys (CMEK). By default, pipeline job artifacts and intermediate data are encrypted with Google-managed keys; CMEK transfers key custody to the organization and allows independent revocation of access.

        **Why this matters**

        - **Key control:** Organizations retain the ability to disable or destroy the CMEK key to immediately cut off access to all data produced during pipeline execution.
        - **Data sensitivity:** ML pipelines commonly process training data, model weights, and evaluation outputs that may contain regulated or proprietary information.
        - **End-to-end encryption governance:** CMEK ensures that every stage of a multi-step pipeline writes outputs under keys the organization controls.
        - **Compliance alignment:** Frameworks such as HIPAA and DORA require customer-controlled encryption for data processing workloads handling sensitive information.

        **Risk mitigation**

        - **Incident containment:** Revoking the CMEK key stops access to all pipeline artifacts without requiring deletion of individual resources.
        - **Separation of duties:** Managing encryption keys in a dedicated KMS project isolates key administration from pipeline operators.
      audit: |
        ### Audit via Console

        1. In the Google Cloud Console, navigate to **Vertex AI > Pipelines**.
        2. Click each pipeline run to open its details.
        3. Under the pipeline job details, look for the **Encryption** field.

        A passing pipeline job shows a Cloud KMS key name under **Encryption**. A failing pipeline job shows no encryption key configured or only Google-managed encryption.

        ### Audit via CLI

        1. List pipeline jobs and inspect their encryption specification using the Vertex AI REST API:

        ```bash
        curl -s \
          -H "Authorization: Bearer $(gcloud auth print-access-token)" \
          "https://REGION-aiplatform.googleapis.com/v1/projects/PROJECT/locations/REGION/pipelineJobs" \
          | python3 -c "import sys,json; jobs=json.load(sys.stdin).get('pipelineJobs',[]); [print(j.get('name'), j.get('encryptionSpec',{}).get('kmsKeyName','NOT SET')) for j in jobs]"
        ```

        A passing pipeline job returns a KMS key name. A failing pipeline job returns `NOT SET` or an empty encryption specification.
      remediation:
        - id: terraform
          desc: |
            To ensure Vertex AI pipeline jobs are encrypted with CMEK in Terraform, vertex AI pipeline jobs are not directly managed as Terraform resources. Use `google_vertex_ai_custom_job` for Terraform-managed ML jobs with CMEK encryption, or submit pipeline jobs via the gcloud CLI or API with CMEK configured:

            ```hcl
            resource "google_vertex_ai_custom_job" "example" {
              display_name = "example-custom-job"
              location     = "us-central1"
              project      = var.project_id

              job_spec {
                worker_pool_specs {
                  replica_count = 1
                  machine_spec {
                    machine_type = "n1-standard-4"
                  }
                  container_spec {
                    image_uri = "gcr.io/PROJECT/IMAGE:latest"
                  }
                }
              }

              encryption_spec {
                kms_key_name = google_kms_crypto_key.example.id
              }
            }

            resource "google_kms_crypto_key" "example" {
              name     = "example-key"
              key_ring = google_kms_key_ring.example.id
            }

            resource "google_kms_key_ring" "example" {
              name     = "example-keyring"
              location = "us-central1"
            }
            ```
        - id: console
          desc: |
            To ensure Vertex AI pipeline jobs are encrypted with CMEK using the Google Cloud Console, note: CMEK must be configured at pipeline job creation time.

            1. Go to the **Vertex AI** page in the Google Cloud Console.
            2. Navigate to **Pipelines**.
            3. When creating a pipeline run, expand **Encryption**.
            4. Select **Customer-managed encryption key (CMEK)**.
            5. Select or create a Cloud KMS key.
            6. Submit the pipeline run.
        - id: cli
          desc: |
            The `gcloud ai pipelines create` command is not available in the gcloud CLI. Use the Vertex AI REST API to create a pipeline job with CMEK:

            ```bash
            curl -X POST \
              -H "Authorization: Bearer $(gcloud auth print-access-token)" \
              -H "Content-Type: application/json" \
              "https://REGION-aiplatform.googleapis.com/v1/projects/PROJECT/locations/REGION/pipelineJobs" \
              -d '{
                "displayName": "PIPELINE_JOB_NAME",
                "encryptionSpec": {
                  "kmsKeyName": "projects/PROJECT/locations/LOCATION/keyRings/RING/cryptoKeys/KEY"
                }
              }'
            ```
    refs:
      - url: https://cloud.google.com/vertex-ai/docs/general/cmek
        title: Customer-managed encryption keys for Vertex AI
