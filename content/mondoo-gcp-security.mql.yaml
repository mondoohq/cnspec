  - uid: mondoo-gcp-security-artifact-registry-repository-iam-no-public-principals
    title: Ensure Artifact Registry repositories are not publicly accessible
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-5-15
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-2-1
    variants:
      - uid: mondoo-gcp-security-artifact-registry-repository-iam-no-public-principals-gcp
        tags:
          mondoo.com/filter-title: GCP Artifact Registry Repository
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-artifact-registry-repository-iam-no-public-principals-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-artifact-registry-repository-iam-no-public-principals-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-artifact-registry-repository-iam-no-public-principals-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that no Artifact Registry repository IAM policy grants access to `allUsers` or `allAuthenticatedUsers`. By default, repositories are private, but IAM bindings can be added at the repository level that expose images and packages to anyone on the internet or to any Google-authenticated account, regardless of their relationship to the project.

        **Why this matters**

        - **Proprietary code and secrets exposed:** Container images and language packages in a repository typically contain proprietary application code, embedded build-time configuration, and occasionally credentials that should never be publicly accessible.
        - **Malicious image injection via public write access:** Public write bindings allow any authenticated Google user to push images into the repository; downstream clusters that pull from the repository by tag may execute attacker-controlled code.
        - **Bypass of workload identity controls:** Public repository access circumvents the short-lived credential and workload identity controls that protect the rest of the project, because no authentication tied to the project is required.
        - **Supply-chain enumeration:** Attackers with anonymous read access can enumerate every image tag and layer digest, mapping the organization's software components and identifying targets for dependency confusion or version-pinning attacks.

        **Risk mitigation**

        - **Remove all public principal bindings:** Delete every IAM binding that includes `allUsers` or `allAuthenticatedUsers` from each repository's IAM policy.
        - **Use workload identity for pull access:** Bind specific service accounts or workload identity pools to repository reader roles rather than granting broad or public access.
      audit: |
        ### Audit via Console

        1. Go to **Artifact Registry > Repositories** in the Google Cloud Console.
        2. Select each repository.
        3. Open the **Permissions** tab.
        4. Review all IAM bindings and confirm that no principal listed is `allUsers` or `allAuthenticatedUsers`.

        A passing repository shows no bindings to `allUsers` or `allAuthenticatedUsers` in its IAM policy. A failing repository shows at least one binding granting access to `allUsers` or `allAuthenticatedUsers`.

        ### Audit via CLI

        1. List all repositories, then retrieve the IAM policy for each:

        ```bash
        gcloud artifacts repositories list \
          --format="table(name,format,location)"

        gcloud artifacts repositories get-iam-policy REPOSITORY \
          --location=LOCATION \
          --format="json"
        ```

        A passing repository returns an IAM policy with no binding whose `members` array contains `allUsers` or `allAuthenticatedUsers`. A failing repository returns a binding that includes `allUsers` or `allAuthenticatedUsers`.
      remediation:
        - id: terraform
          desc: |
            Manage Artifact Registry repository IAM with `google_artifact_registry_repository_iam_member` resources whose `member` is a specific identity, not `allUsers` or `allAuthenticatedUsers`:

            ```hcl
            resource "google_artifact_registry_repository_iam_member" "reader" {
              project    = "my-project"
              location   = google_artifact_registry_repository.cmek.location
              repository = google_artifact_registry_repository.cmek.name
              role       = "roles/artifactregistry.reader"
              member     = "serviceAccount:gke-puller@my-project.iam.gserviceaccount.com"
            }
            ```

            Audit any `google_artifact_registry_repository_iam_binding` and `google_artifact_registry_repository_iam_policy` resources for public-principal members and remove them at the source.
        - id: console
          desc: |
            Remove public principals from a repository's IAM policy:

            1. Go to **Artifact Registry > Repositories** in the Google Cloud Console.
            2. Select the repository.
            3. Open the **Permissions** tab.
            4. Locate any binding that lists **allUsers** or **allAuthenticatedUsers** as a principal.
            5. Select **Remove access** and confirm.
        - id: cli
          desc: |
            Remove public principals from a repository:

            ```bash
            gcloud artifacts repositories remove-iam-policy-binding REPOSITORY \
              --location=LOCATION \
              --member=allUsers \
              --role=roles/artifactregistry.reader

            gcloud artifacts repositories remove-iam-policy-binding REPOSITORY \
              --location=LOCATION \
              --member=allAuthenticatedUsers \
              --role=roles/artifactregistry.reader
            ```

            Repeat the command for any other roles bound to public principals (`roles/artifactregistry.writer`, `roles/artifactregistry.admin`, etc.).
    refs:
      - url: https://cloud.google.com/artifact-registry/docs/access-control
        title: Artifact Registry - Access control with IAM
  - uid: mondoo-gcp-security-artifact-registry-repository-iam-no-public-principals-gcp
    filters: asset.platform == 'gcp'
    mql: |
      gcp.project.artifactRegistryService.repositories.all(
        iamPolicy.all(
          members.none(_ == "allUsers" || _ == "allAuthenticatedUsers")
        )
      )
  - uid: mondoo-gcp-security-artifact-registry-repository-iam-no-public-principals-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_artifact_registry_repository_iam_member') ||
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_artifact_registry_repository_iam_binding')
    mql: |
      terraform.resources('google_artifact_registry_repository_iam_member').all(
        arguments['member'] != "allUsers" &&
        arguments['member'] != "allAuthenticatedUsers"
      )
      terraform.resources('google_artifact_registry_repository_iam_binding').all(
        arguments['members'].none(_ == "allUsers" || _ == "allAuthenticatedUsers")
      )
  - uid: mondoo-gcp-security-artifact-registry-repository-iam-no-public-principals-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_artifact_registry_repository_iam_member') ||
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_artifact_registry_repository_iam_binding')
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_artifact_registry_repository_iam_member').all(
        change.after['member'] != "allUsers" &&
        change.after['member'] != "allAuthenticatedUsers"
      )
      terraform.plan.resourceChanges.where(type == 'google_artifact_registry_repository_iam_binding').all(
        change.after['members'].none(_ == "allUsers" || _ == "allAuthenticatedUsers")
      )
  - uid: mondoo-gcp-security-artifact-registry-repository-iam-no-public-principals-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'google_artifact_registry_repository_iam_member') ||
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'google_artifact_registry_repository_iam_binding')
    mql: |
      terraform.state.resources.where(type == 'google_artifact_registry_repository_iam_member').all(
        values['member'] != "allUsers" &&
        values['member'] != "allAuthenticatedUsers"
      )
      terraform.state.resources.where(type == 'google_artifact_registry_repository_iam_binding').all(
        values['members'].none(_ == "allUsers" || _ == "allAuthenticatedUsers")
      )
  - uid: mondoo-gcp-security-artifact-registry-repository-vulnerability-scanning-enabled
    title: Ensure container repositories have vulnerability scanning enabled
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-tvm-07
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-8
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-de-cm-8
      compliance/nist-csf-2: nist-csf-2-id-ra-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ra-5
      compliance/nist-sp-800-171: nist-sp-800-171--3-11-2
      compliance/pci-dss-4: pcidss-requirement-11-3-1
      compliance/soc2-2017: soc2-control-cc7-1-5
      compliance/vda-isa-5: vda-isa-5-5-2-5
    variants:
      - uid: mondoo-gcp-security-artifact-registry-repository-vulnerability-scanning-enabled-gcp
        tags:
          mondoo.com/filter-title: GCP Artifact Registry Repository
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-artifact-registry-repository-vulnerability-scanning-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-artifact-registry-repository-vulnerability-scanning-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-artifact-registry-repository-vulnerability-scanning-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that every Docker-format Artifact Registry repository has vulnerability scanning enabled rather than explicitly disabled. By default, repositories inherit the project-level Container Scanning API setting, which when the API is enabled causes scans to run automatically on newly pushed images; explicitly setting `enablementConfig` to `DISABLED` suppresses scans even when the API is active.

        **Why this matters**

        - **Automated CVE detection at the registry:** Vulnerability scanning surfaces known CVEs in operating system packages and language dependencies inside container images so that maintainers receive findings without running separate scanners on every pull.
        - **Binary Authorization integration:** Scan results feed Container Analysis, which downstream Binary Authorization policies and Cloud Build attestations can require before allowing an image to be deployed to production.
        - **Continuous coverage for new disclosures:** Scanning runs on push and re-evaluates images when new vulnerability data is published, providing ongoing coverage rather than a point-in-time gate at build time.
        - **Compliance data source:** Frameworks that require continuous vulnerability identification for software in production rely on registry scan findings as the primary data source; disabling scanning removes that evidence.

        **Risk mitigation**

        - **Leave scanning at the default INHERITED setting or set it to SCANNING_ENABLED:** Never set `enablementConfig` to `SCANNING_DISABLED` on a shared registry unless a compensating control with equivalent coverage is in place.
        - **Wire findings into the team's triage process:** Route high and critical Container Analysis findings to Security Command Center and the engineering on-call workflow so that affected images are rebuilt and redeployed promptly.
      audit: |
        ### Audit via Console

        1. Go to **Artifact Registry > Repositories** in the Google Cloud Console.
        2. Select each Docker-format repository.
        3. Open the **Settings** tab.
        4. Under **Vulnerability scanning**, confirm the configuration is set to **Inherited** or **Enabled**, not **Disabled**.
        5. Also confirm that the **Container Scanning API** is enabled on the project under **APIs & Services > Enabled APIs**.

        A passing repository shows vulnerability scanning set to Inherited or Enabled. A failing repository shows vulnerability scanning explicitly set to Disabled.

        ### Audit via CLI

        1. List all repositories and check their vulnerability scanning configuration:

        ```bash
        gcloud artifacts repositories list \
          --format="table(name,format,location,vulnerabilityScanningConfig.enablementConfig,vulnerabilityScanningConfig.enablementState)"
        ```

        A passing repository returns `enablementConfig` of `INHERITED` or `SCANNING_ENABLED` and `enablementState` of `SCANNING_ACTIVE` or `PROJECT_SCANNING_DISABLED_BY_DEFAULT`. A failing repository returns `enablementConfig` of `SCANNING_DISABLED` or `enablementState` of `SCANNING_DISABLED`.
      remediation:
        - id: terraform
          desc: |
            Leave the repository's `vulnerability_scanning_config.enablement_config` at the default `INHERITED` (which honors the project Container Scanning API setting), or set it to `SCANNING_ENABLED`. Never set it to `SCANNING_DISABLED`. Pair the repository with the Container Scanning API enabled at the project:

            ```hcl
            resource "google_project_service" "container_scanning" {
              service            = "containerscanning.googleapis.com"
              disable_on_destroy = false
            }

            resource "google_artifact_registry_repository" "scanned" {
              location      = "us-central1"
              repository_id = "scanned-images"
              format        = "DOCKER"

              vulnerability_scanning_config {
                enablement_config = "SCANNING_ENABLED"
              }
            }
            ```
        - id: console
          desc: |
            Re-enable vulnerability scanning on a repository:

            1. Go to **Artifact Registry > Repositories** in the Google Cloud Console.
            2. Select the repository.
            3. Open the **Settings** tab.
            4. Under **Vulnerability scanning**, set the configuration to **Inherited** or **Enabled**.
            5. Save the configuration.

            Confirm the **Container Scanning API** is enabled on the project so scan findings are produced.
        - id: cli
          desc: |
            Enable the Container Scanning API and reset the repository scan configuration:

            ```bash
            gcloud services enable containerscanning.googleapis.com

            gcloud artifacts repositories update REPOSITORY \
              --location=LOCATION \
              --allow-vulnerability-scanning
            ```
    refs:
      - url: https://cloud.google.com/artifact-analysis/docs/container-scanning-overview
        title: Container scanning overview
  - uid: mondoo-gcp-security-artifact-registry-repository-vulnerability-scanning-enabled-gcp
    filters: asset.platform == 'gcp'
    mql: |
      gcp.project.artifactRegistryService.repositories.where(format == "DOCKER").all(
        vulnerabilityScanningConfig.enablementConfig != "DISABLED" &&
        vulnerabilityScanningConfig.enablementState != "SCANNING_DISABLED"
      )
  - uid: mondoo-gcp-security-artifact-registry-repository-vulnerability-scanning-enabled-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_artifact_registry_repository' && arguments['format'] == 'DOCKER')
    mql: |
      terraform.resources('google_artifact_registry_repository').where(arguments['format'] == 'DOCKER').all(
        blocks.where(type == 'vulnerability_scanning_config').all(
          arguments['enablement_config'] != "SCANNING_DISABLED"
