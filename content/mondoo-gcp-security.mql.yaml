  - uid: mondoo-gcp-security-gke-cluster-stackdriver-logging-enabled
    title: Ensure Stackdriver Kubernetes Engine Monitoring is enabled on GKE clusters
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-pr-ps-04
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    variants:
      - uid: mondoo-gcp-security-gke-cluster-stackdriver-logging-enabled-gcp
        tags:
          mondoo.com/filter-title: GCP GKE Cluster
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-gke-cluster-stackdriver-logging-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-gke-cluster-stackdriver-logging-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-gke-cluster-stackdriver-logging-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that GKE clusters use Cloud Logging (the Kubernetes-native logging endpoint `logging.googleapis.com/kubernetes`) so that system and workload logs are captured in a central, managed service. By default, new GKE clusters are created with Cloud Logging enabled, but it can be explicitly disabled or configured to use the legacy non-Kubernetes logging endpoint, which provides less structured data.

        **Why this matters**

        - **Security visibility:** API server activity, authentication events, and resource modifications are only visible to defenders when cluster logs flow to a centralized logging service.
        - **Incident investigation:** Forensic analysis of a cluster compromise requires comprehensive log data; without it, the scope and timeline of an attack cannot be reconstructed.
        - **Anomaly detection:** Security operations tools that alert on suspicious cluster activity depend on receiving structured Kubernetes audit logs.
        - **Compliance requirement:** Centralized, tamper-evident audit logs are required by PCI DSS, HIPAA, NIST 800-53, and other frameworks for environments handling sensitive data.

        **Risk mitigation**

        - **Use the Kubernetes-native endpoint:** Configure `logging_service = "logging.googleapis.com/kubernetes"` to ensure structured system and workload logs are captured, not just legacy VM-level logs.
        - **Protect log retention:** Set appropriate retention periods and export logs to Cloud Storage or BigQuery for long-term forensic availability.
        - **Alert on log gaps:** Monitor for periods where log ingestion drops or stops, which may indicate tampering or misconfiguration.
      audit: |
        ### Audit via Console

        1. Sign in to the [Google Cloud Console](https://console.cloud.google.com).
        2. Navigate to **Kubernetes Engine** > **Clusters**.
        3. Select a cluster and click the **Details** tab.
        4. Under the **Features** section, check the value of **Cloud Logging**.

        A passing cluster shows **Cloud Logging: System and workload logging** (or equivalent enabled state). A failing cluster shows **Cloud Logging: Disabled** or a non-Kubernetes logging service.

        ### Audit via CLI

        1. Describe the cluster and check the logging service setting:

        ```bash
        gcloud container clusters describe CLUSTER_NAME \
          --zone ZONE \
          --format="value(loggingService)"
        ```

        A passing cluster returns `logging.googleapis.com/kubernetes`. A failing cluster returns `none` or `logging.googleapis.com` (the legacy non-Kubernetes logging endpoint).
      remediation:
        - id: terraform
          desc: |
            To ensure Stackdriver Kubernetes Engine Monitoring is enabled on GKE clusters in Terraform, enable Cloud Logging in your GKE cluster configuration:

            ```hcl
            resource "google_container_cluster" "example" {
              name     = "example-cluster"
              location = "us-central1"

              logging_service = "logging.googleapis.com/kubernetes"
            }
            ```
        - id: console
          desc: |
            To ensure Stackdriver Kubernetes Engine Monitoring is enabled on GKE clusters using the Google Cloud Console:

            1. In the Google Cloud console, go to the **Kubernetes Engine > Clusters** page.
            2. Select the cluster you want to configure.
            3. Select **Edit**.
            4. In the **Features** section, ensure **Cloud Logging** is enabled with **System and workload logging**.
            5. Select **Save**.
        - id: cli
          desc: |
            To ensure Stackdriver Kubernetes Engine Monitoring is enabled on GKE clusters using the Google Cloud CLI:

            ```bash
            gcloud container clusters update CLUSTER_NAME --zone ZONE --logging=SYSTEM,WORKLOAD
            ```
    refs:
      - url: https://cloud.google.com/kubernetes-engine/docs/concepts/security-overview
        title: GKE Security Overview
  - uid: mondoo-gcp-security-gke-cluster-stackdriver-logging-enabled-gcp
    filters: asset.platform == "gcp-gke-cluster"
    mql: gcp.project.gkeService.cluster.loggingService == "logging.googleapis.com/kubernetes"
  - uid: mondoo-gcp-security-gke-cluster-stackdriver-logging-enabled-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' &&
        terraform.resources.contains(nameLabel == 'google_container_cluster')
