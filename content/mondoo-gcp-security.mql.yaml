    docs:
      desc: |
        This check ensures that Cloud Spanner databases are configured to use customer-managed encryption keys (CMEK) rather than Google-managed default keys. By default, Spanner encrypts data at rest using keys that Google controls, providing no mechanism for organizations to independently revoke access or audit key usage.

        **Why this matters**

        - **Key control:** CMEK gives organizations direct authority over the encryption key lifecycle, enabling custom rotation schedules independent of Google's default key management.
        - **Revocability:** Disabling or destroying the Cloud KMS key immediately denies access to all Spanner data encrypted under it, a capability unavailable with Google-managed encryption.
        - **Audit visibility:** All key usage events appear in Cloud Audit Logs for Cloud KMS, providing granular insight into who accessed encryption operations and when.
        - **Compliance alignment:** Regulatory frameworks that govern financial and transactional data frequently require organizations to control the keys protecting that data.

        **Risk mitigation**

        - **Data exfiltration:** If access credentials are compromised, revoking the CMEK key stops further data extraction without requiring immediate credential rotation.
        - **Insider threat:** Organizations can restrict and audit who can use the KMS key, adding an access control layer beyond Spanner IAM permissions.
