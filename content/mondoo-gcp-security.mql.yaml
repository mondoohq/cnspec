  - uid: mondoo-gcp-security-cloud-build-worker-pool-private
    title: Ensure Cloud Build worker pools run privately with no public egress
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/pci-dss-4: pcidss-requirement-1-4-1
      compliance/soc2-2017: soc2-control-cc6-1-5
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-gcp-security-cloud-build-worker-pool-private-gcp
        tags:
          mondoo.com/filter-title: GCP Cloud Build Worker Pool
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-cloud-build-worker-pool-private-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-build-worker-pool-private-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-build-worker-pool-private-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that every Cloud Build private worker pool is peered to a customer VPC and configured with `NO_PUBLIC_EGRESS`. Worker pools without a peered network, or with public egress enabled, allow build steps to initiate outbound connections to arbitrary internet endpoints, bypassing the egress controls that the customer VPC implements.

        **Why this matters**

        - **Unrestricted outbound exfiltration path:** When worker pools can reach the public internet directly, a compromised build step or a malicious dependency can exfiltrate source code, secrets, or build artifacts to attacker-controlled infrastructure.
        - **Supply-chain attack vector for command and control:** Malicious packages introduced through compromised dependencies have unrestricted outbound network access for command and control callbacks when workers use public egress.
        - **VPC egress controls are bypassed:** Firewall rules and Cloud NAT logging configured in the consumer VPC only apply to traffic that routes through the VPC; workers with public egress route directly to the internet, invisible to those controls.
        - **Build service account credentials at risk:** Build steps run with the trigger's service account identity; unrestricted egress allows any step to exfiltrate the service account's access token to external infrastructure.

        **Risk mitigation**

        - **Configure peered network and NO_PUBLIC_EGRESS:** Set `peeredNetwork` and `egressOption: NO_PUBLIC_EGRESS` on every private worker pool, then route controlled internet access through Cloud NAT in the peered VPC with logging enabled.
        - **Migrate existing pools with public egress:** Recreate any pool that cannot be updated in place with private-only configuration and re-run affected builds against the new pool.
      audit: |
        ### Audit via Console

        1. Go to **Cloud Build > Settings > Worker pools** in the Google Cloud Console.
        2. For each worker pool listed, select the pool and review its **Network configuration** section.
        3. Verify that the **Peered network** field is populated with a customer VPC and that **Egress** is set to **No public egress**.

        A passing worker pool shows a peered network and egress set to **No public egress**. A failing worker pool shows no peered network or egress set to **Public egress**.

        ### Audit via CLI

        1. List all worker pools for a project and region:

        ```bash
        gcloud builds worker-pools list --region=REGION --format=json
        ```

        2. For each pool, inspect the `networkConfig` field:

        ```bash
        gcloud builds worker-pools describe POOL_NAME \
          --region=REGION \
          --format='value(networkConfig.peeredNetwork, networkConfig.egressOption)'
        ```

        A passing worker pool returns a non-empty peered network value and `NO_PUBLIC_EGRESS` for the egress option. A failing worker pool returns an empty peered network or `PUBLIC_EGRESS`.
      remediation:
        - id: terraform
          desc: |
            Configure the worker pool with a peered customer VPC and `NO_PUBLIC_EGRESS`. The peered network must be a Service Networking peering of a VPC in the host project:

            ```hcl
            resource "google_cloudbuild_worker_pool" "private" {
              name     = "private-pool"
              location = "us-central1"

              worker_config {
                disk_size_gb   = 100
                machine_type   = "e2-medium"
                no_external_ip = true
              }

              network_config {
                peered_network          = "projects/HOST_PROJECT/global/networks/VPC_NAME"
                peered_network_ip_range = "/24"
                egress_option           = "NO_PUBLIC_EGRESS"
              }
            }
            ```
        - id: console
          desc: |
            Reconfigure a worker pool to use the customer VPC with no public egress:

            1. Go to **Cloud Build > Settings > Worker pools** in the Google Cloud Console.
            2. Select the worker pool.
            3. Under **Network configuration**, peer the worker pool to a customer VPC.
            4. Set **Egress** to **No public egress**.
            5. Save the configuration and route controlled internet access through Cloud NAT in the peered VPC if external dependencies are required.
        - id: cli
          desc: |
            Disable public egress on an existing worker pool, or recreate it with a peered VPC. Updating the peered network on an existing pool is not supported, so VPC peering must be configured at creation:

            ```bash
            gcloud builds worker-pools update POOL_NAME \
              --region=REGION \
              --no-public-egress
            ```

            To peer a worker pool to a VPC, recreate it:

            ```bash
            gcloud builds worker-pools create POOL_NAME \
              --region=REGION \
              --peered-network=projects/HOST_PROJECT/global/networks/VPC_NAME \
              --no-public-egress
            ```
    refs:
      - url: https://cloud.google.com/build/docs/private-pools/private-pools-overview
        title: Cloud Build - Private pools overview
  - uid: mondoo-gcp-security-cloud-build-worker-pool-private-gcp
    filters: asset.platform == 'gcp'
    mql: |
