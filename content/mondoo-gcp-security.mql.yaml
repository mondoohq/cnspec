      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-5
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-3-3
      compliance/vda-isa-5: vda-isa-5-4-2-1
    variants:
      - uid: mondoo-gcp-security-compute-image-iam-no-primitive-roles-gcp
        tags:
          mondoo.com/filter-title: GCP
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-compute-image-iam-no-primitive-roles-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-compute-image-iam-no-primitive-roles-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-compute-image-iam-no-primitive-roles-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that the IAM policy on every Compute Engine custom image contains no bindings to the primitive roles `roles/owner`, `roles/editor`, or `roles/viewer`. Compute Engine provides fine-grained predefined roles such as `roles/compute.imageUser` for launching VMs from an image and `roles/compute.storageAdmin` for managing images; the primitive roles carry sweeping cross-resource permissions that far exceed what any image workflow requires.

        **Why this matters**

        - **Broad cross-resource access from a single image binding:** Primitive roles grant rights across many GCP resource types, not just compute images, so a principal bound to Owner or Editor on an image inherits project-wide capabilities.
        - **Supply-chain integrity risk from Editor:** A principal with `roles/editor` on an image can delete or replace it, allowing an attacker who compromises that identity to substitute a backdoored image used by downstream automation.
        - **IAM modification rights via Owner:** `roles/owner` allows the holder to modify the image's IAM policy and add further bindings, including public principals.
        - **Resource-level bypass:** Image IAM is evaluated at the resource level; a primitive-role binding on a single custom image is invisible to project-level IAM audits unless policies explicitly enumerate resource bindings.

        **Risk mitigation**

        - **Replace primitive roles with predefined Compute roles:** Use `roles/compute.imageUser` for teams that launch VMs from the image and `roles/compute.storageAdmin` for teams that manage images.
        - **Enumerate and remediate existing bindings:** Retrieve each image's IAM policy, identify primitive-role bindings, and re-grant principals with the narrowest appropriate Compute role.
      audit: |
        ### Audit via Console

        1. Go to **Compute Engine > Images** in the Google Cloud Console.
        2. Filter to **Custom images**.
        3. Select each custom image.
        4. Open the **Permissions** panel.
        5. Review all IAM bindings and confirm that no binding uses the primitive roles `Owner`, `Editor`, or `Viewer`.

        A passing custom image shows no bindings to `roles/owner`, `roles/editor`, or `roles/viewer` in its IAM policy. A failing custom image shows at least one binding using a primitive role.

        ### Audit via CLI

        1. Retrieve the IAM policy for each custom image and inspect the role assignments:

        ```bash
        gcloud compute images get-iam-policy IMAGE_NAME \
          --format="json(bindings)"
        ```

        A passing image returns an IAM policy where no binding has a `role` value of `roles/owner`, `roles/editor`, or `roles/viewer`. A failing image returns at least one binding with one of those primitive roles.
      remediation:
        - id: terraform
          desc: |
            Manage image IAM via `google_compute_image_iam_member` (or `_binding`), granting only narrow Compute roles — not `roles/owner`, `roles/editor`, or `roles/viewer`:

            ```hcl
            resource "google_compute_image_iam_member" "launchers" {
              project = var.project_id
              image   = google_compute_image.app_baseline.name
              role    = "roles/compute.imageUser"
              member  = "group:platform-eng@example.com"
            }
            ```
        - id: console
          desc: |
            Replace each primitive-role binding with a fine-grained Compute role:

            1. Open **Compute Engine** → **Images** (filter to **Custom images**).
            2. Select the flagged image and open **Permissions**.
            3. For each principal bound to Owner / Editor / Viewer, remove the primitive grant and add the narrow role that matches the principal's actual use (typically `Compute Image User` for launchers).
            4. Save. Confirm with the principal that their workflow still works.
        - id: cli
          desc: |
            Remove a primitive role binding from an image and grant the fine-grained equivalent:

            ```bash
            gcloud compute images remove-iam-policy-binding IMAGE_NAME \
              --member=user:alice@example.com \
              --role=roles/editor

            gcloud compute images add-iam-policy-binding IMAGE_NAME \
              --member=user:alice@example.com \
              --role=roles/compute.imageUser
            ```
    refs:
      - url: https://cloud.google.com/compute/docs/access/iam
        title: Compute Engine - IAM roles and permissions
      - url: https://cloud.google.com/iam/docs/understanding-roles#basic
        title: IAM - Basic (primitive) roles
