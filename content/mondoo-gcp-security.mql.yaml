    mql: |
      terraform.state.resources.where(type == 'google_service_account_key').length == 0
  - uid: mondoo-gcp-security-iam-default-service-accounts-disabled
    title: Ensure default Compute Engine and App Engine service accounts are disabled
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-5
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-5
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-9
      compliance/vda-isa-5: vda-isa-5-4-1-3
    variants:
      - uid: mondoo-gcp-security-iam-default-service-accounts-disabled-gcp
        tags:
          mondoo.com/filter-title: GCP IAM Service Account
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-iam-default-service-accounts-disabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-iam-default-service-accounts-disabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-iam-default-service-accounts-disabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that the default Compute Engine and App Engine service accounts are disabled when not needed. By default these accounts are automatically created with the Editor role, granting overly broad access to most project resources; custom service accounts following the principle of least privilege should be used instead.

        **Why this matters**

        - **Excessive default permissions:** The default Compute Engine service account (`PROJECT_NUMBER-compute@developer.gserviceaccount.com`) and the default App Engine service account (`PROJECT_ID@appspot.gserviceaccount.com`) both carry the Editor role, which covers almost all project resources.
        - **Large blast radius:** Compromising any workload that runs under a default service account grants an attacker Editor-level access to the entire project.
        - **Implicit usage:** These accounts are used automatically unless explicitly overridden during deployment, creating hidden over-privilege.
        - **Audit complexity:** Many services sharing the same overly privileged identity makes it difficult to trace which service performed a given action.

        **Risk mitigation**

        - **Replace with custom accounts:** Create dedicated service accounts with narrowly scoped IAM roles for each workload before disabling default accounts.
        - **Enforce via organization policy:** Apply the `iam.automaticIamGrantsForDefaultServiceAccounts` constraint to prevent default accounts from receiving Editor-level bindings automatically.
        - **Audit regularly:** Review service account usage and permissions periodically to confirm no workload has drifted back to a default account.
      audit: |
        ### Audit via Console

        1. Sign in to the [Google Cloud Console](https://console.cloud.google.com) and open the target project.
        2. Navigate to **IAM & Admin > Service Accounts**.
        3. Locate the default Compute Engine service account (`PROJECT_NUMBER-compute@developer.gserviceaccount.com`) and the default App Engine service account (`PROJECT_ID@appspot.gserviceaccount.com`).
        4. Check the **Status** column for each account.

        A passing project shows those default service accounts as **Disabled** or absent. A failing project shows one or more default service accounts with an **Enabled** status.

        ### Audit via CLI

        1. Check the status of the default Compute Engine service account:

        ```bash
        gcloud iam service-accounts describe PROJECT_NUMBER-compute@developer.gserviceaccount.com --format="value(disabled)"
        ```

        2. Check the status of the default App Engine service account:

        ```bash
        gcloud iam service-accounts describe PROJECT_ID@appspot.gserviceaccount.com --format="value(disabled)"
        ```

        A passing account returns `True` for the `disabled` field. A failing account returns `False` or an empty value.
      remediation:
        - id: console
          desc: |
            To ensure default Compute Engine and App Engine service accounts are disabled using the Google Cloud Console:

            1. Navigate to **IAM & Admin > Service Accounts** in the Google Cloud Console.
            2. Identify the default Compute Engine service account (`PROJECT_NUMBER-compute@developer.gserviceaccount.com`) and App Engine service account (`PROJECT_ID@appspot.gserviceaccount.com`).
            3. Select the service account, then select **Disable service account**.
            4. Ensure all workloads have been migrated to custom service accounts before disabling.
        - id: cli
          desc: |
            To ensure default Compute Engine and App Engine service accounts are disabled using the Google Cloud CLI, disable the default Compute Engine service account:

            ```bash
            gcloud iam service-accounts disable PROJECT_NUMBER-compute@developer.gserviceaccount.com
            ```

            Disable the default App Engine service account:

            ```bash
            gcloud iam service-accounts disable PROJECT_ID@appspot.gserviceaccount.com
            ```
        - id: terraform
          desc: |
            To ensure default Compute Engine and App Engine service accounts are disabled in Terraform, use custom service accounts for your workloads instead of default service accounts. Create dedicated service accounts with minimal permissions:

            ```hcl
            resource "google_service_account" "custom" {
              account_id   = "custom-sa"
              display_name = "Custom Service Account"
              project      = "PROJECT_ID"
            }

            resource "google_project_iam_member" "custom_role" {
              project = "PROJECT_ID"
              role    = "roles/viewer"
              member  = "serviceAccount:${google_service_account.custom.email}"
            }
            ```

            To enforce that default service accounts cannot be used, apply an organization policy:

            ```hcl
            resource "google_project_organization_policy" "disable_default_sa" {
              project    = "PROJECT_ID"
              constraint = "iam.automaticIamGrantsForDefaultServiceAccounts"

              boolean_policy {
                enforced = true
              }
            }
            ```
    refs:
      - url: https://cloud.google.com/iam/docs/service-account-types#default
        title: Default service accounts
      - url: https://cloud.google.com/iam/docs/best-practices-service-accounts
        title: Best practices for service accounts
  - uid: mondoo-gcp-security-iam-default-service-accounts-disabled-gcp
    filters: |
      asset.platform == 'gcp-iam-service-account'
      gcp.project.iam.serviceAccount.email == /^\d+-compute@developer\.gserviceaccount\.com$/ || gcp.project.iam.serviceAccount.email == /^[a-z0-9\-]+@appspot\.gserviceaccount\.com$/
    mql: |
      gcp.project.iam.serviceAccount.disabled == true
  # Two-branch alternation: google_project_organization_policy is the legacy v1 resource (uses a
  # boolean_policy block), google_org_policy_policy is the v2 successor (uses spec.rules.enforce).
  # The check passes when either form enforces iam.automaticIamGrantsForDefaultServiceAccounts.
  - uid: mondoo-gcp-security-iam-default-service-accounts-disabled-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_project_organization_policy' || nameLabel == 'google_org_policy_policy')
    mql: |
      terraform.resources.where(
        nameLabel == 'google_project_organization_policy' &&
        arguments['constraint'] == 'iam.automaticIamGrantsForDefaultServiceAccounts'
      ).any(
        blocks.where(type == 'boolean_policy').any(arguments['enforced'] == true)
      ) ||
      terraform.resources.where(
        nameLabel == 'google_org_policy_policy' &&
        arguments['name'].contains('iam.automaticIamGrantsForDefaultServiceAccounts')
      ).any(
        blocks.where(type == 'spec').any(
          blocks.where(type == 'rules').any(arguments['enforce'] == 'TRUE' || arguments['enforce'] == true)
        )
      )
  - uid: mondoo-gcp-security-iam-default-service-accounts-disabled-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_project_organization_policy' || type == 'google_org_policy_policy')
    mql: |
      terraform.plan.resourceChanges.where(
        type == 'google_project_organization_policy' &&
        change.after.constraint == 'iam.automaticIamGrantsForDefaultServiceAccounts'
      ).any(
        change.after.boolean_policy != null &&
        change.after.boolean_policy.any(_['enforced'] == true)
      ) ||
      terraform.plan.resourceChanges.where(
        type == 'google_org_policy_policy' &&
        change.after.name != null &&
        change.after.name.contains('iam.automaticIamGrantsForDefaultServiceAccounts')
      ).any(
        change.after.spec != null &&
        change.after.spec.any(
          _['rules'] != null &&
          _['rules'].any(_['enforce'] == 'TRUE' || _['enforce'] == true)
        )
      )
  - uid: mondoo-gcp-security-iam-default-service-accounts-disabled-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'google_project_organization_policy' || type == 'google_org_policy_policy')
    mql: |
      terraform.state.resources.where(
        type == 'google_project_organization_policy' &&
        values.constraint == 'iam.automaticIamGrantsForDefaultServiceAccounts'
      ).any(
        values.boolean_policy != null &&
        values.boolean_policy.any(_['enforced'] == true)
      ) ||
      terraform.state.resources.where(
        type == 'google_org_policy_policy' &&
        values.name != null &&
        values.name.contains('iam.automaticIamGrantsForDefaultServiceAccounts')
      ).any(
        values.spec != null &&
        values.spec.any(
          _['rules'] != null &&
          _['rules'].any(_['enforce'] == 'TRUE' || _['enforce'] == true)
        )
      )
  - uid: mondoo-gcp-security-iam-service-account-keys-rotated-90-days
    title: Ensure service account keys are rotated within 90 days
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-12
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-5-17
      compliance/nis-2: nis-2-21-2-g
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-5
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-10
      compliance/pci-dss-4: pcidss-requirement-8-6-3
      compliance/soc2-2017: soc2-control-cc6-1-9
      compliance/vda-isa-5: vda-isa-5-4-1-3
    variants:
      - uid: mondoo-gcp-security-iam-service-account-keys-rotated-90-days-gcp
        tags:
          mondoo.com/filter-title: GCP IAM Service Account
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-iam-service-account-keys-rotated-90-days-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-iam-service-account-keys-rotated-90-days-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-iam-service-account-keys-rotated-90-days-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that user-managed service account keys are rotated at least every 90 days. Long-lived credentials that are not regularly rotated extend the window during which a compromised key can be exploited without detection.

        **Why this matters**

        - **Prolonged exposure window:** Compromised keys remain valid indefinitely unless manually revoked, allowing persistent unauthorized access across the lifetime of the key.
        - **Accumulating exposure risk:** The longer a key exists, the more likely it has been exposed through accidental sharing, repository commits, or insecure storage.
        - **Rotation limits damage:** Regular rotation constrains the useful lifetime of any compromised key material, reducing the impact of an undetected breach.
        - **Compliance requirement:** Many security frameworks require periodic rotation of credentials as part of access management controls.

        **Risk mitigation**

        - **Automate rotation:** Implement automated key rotation processes that generate replacement keys and retire old ones within 90 days to eliminate manual gaps.
        - **Prefer alternatives:** Use Workload Identity Federation or Google-managed keys to remove the rotation burden entirely by eliminating user-managed key material.
        - **Track creation dates:** Maintain an inventory of all service account keys with their creation dates so approaching deadlines are visible before keys go stale.
      audit: |
        ### Audit via Console

        1. Sign in to the [Google Cloud Console](https://console.cloud.google.com) and open the target project.
        2. Navigate to **IAM & Admin > Service Accounts**.
        3. For each service account, select the account and open the **Keys** tab.
        4. Review the **Created** date for each user-managed key and confirm none are older than 90 days.

        A passing service account has all user-managed keys created within the last 90 days. A failing service account has one or more user-managed keys with a creation date older than 90 days.

        ### Audit via CLI

        1. List all service accounts, then check each for key age:

        ```bash
        gcloud iam service-accounts list --format="value(email)" | while read SA; do
          gcloud iam service-accounts keys list --iam-account="$SA" --managed-by=user \
            --format="table(name,keyType,validAfterTime)"
        done
        ```

        A passing service account shows all keys with a `validAfterTime` within the last 90 days. A failing service account shows at least one key with a `validAfterTime` older than 90 days.
      remediation:
        - id: terraform
          desc: |
            To ensure service account keys are rotated within 90 days in Terraform, use `time_rotating` with a `replace_triggered_by` lifecycle meta-argument to ensure service account keys are rotated within 90 days:

            ```hcl
            resource "time_rotating" "sa_key_rotation" {
              rotation_days = 90
            }

            resource "google_service_account_key" "example" {
              service_account_id = google_service_account.example.name

              lifecycle {
                replace_triggered_by = [time_rotating.sa_key_rotation]
              }
            }

            resource "google_service_account" "example" {
              account_id   = "example-sa"
              display_name = "Example Service Account"
            }
            ```

            Note: When the `time_rotating` resource triggers, Terraform will destroy the old key and create a new one on the next apply. Ensure consumers are updated to use the new key.
        - id: console
          desc: |
            To ensure service account keys are rotated within 90 days using the Google Cloud Console:

            1. Navigate to **IAM & Admin > Service Accounts** in the Google Cloud Console.
            2. For each service account, select the **Keys** tab.
            3. Identify any keys with a creation date older than 90 days.
            4. Create a new key, update all consumers, then delete the old key.
        - id: cli
          desc: |
            To ensure service account keys are rotated within 90 days using the Google Cloud CLI, list keys and their creation dates:

            ```bash
            gcloud iam service-accounts keys list --iam-account=SA_EMAIL --managed-by=user
            ```

            Create a new key:

            ```bash
            gcloud iam service-accounts keys create ~/key.json --iam-account=SA_EMAIL
            ```

            Delete the old key after updating consumers:

            ```bash
            gcloud iam service-accounts keys delete OLD_KEY_ID --iam-account=SA_EMAIL
            ```
    refs:
      - url: https://cloud.google.com/iam/docs/best-practices-for-managing-service-account-keys
        title: Best practices for managing service account keys
  - uid: mondoo-gcp-security-iam-service-account-keys-rotated-90-days-gcp
    filters: asset.platform == 'gcp-iam-service-account'
    mql: |
      gcp.project.iam.serviceAccount.keys.where(keyType == "USER_MANAGED").all(
        validAfterTime > time.now - 90 * time.day
      )
  # Loose correlation: when any google_service_account_key is declared, we require a time_rotating
  # resource whose name suggests a service-account-key purpose AND whose rotation_days <= 90. The
  # name filter (sa_key, service_account, key_rotation substrings) catches the documented
  # remediation pattern (resource "time_rotating" "sa_key_rotation" { ... }) and common name
  # choices, so an unrelated time_rotating for certificate or token rotation does not satisfy this
  # check. Users with non-conforming names will see false negatives — see the desc note.
  # rotation_days is a number per the time provider schema, so <= 90 is well-defined. The GCP
  # runtime check inspects the actual validAfterTime and is authoritative.
  - uid: mondoo-gcp-security-iam-service-account-keys-rotated-90-days-terraform-hcl
    filters: asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_service_account_key')
    mql: |
      terraform.resources.where(
        nameLabel == 'time_rotating' &&
        labels[1] == /(sa_key|service_account|key_rotation)/
      ).any(
        arguments['rotation_days'] != null && arguments['rotation_days'] <= 90
      )
  - uid: mondoo-gcp-security-iam-service-account-keys-rotated-90-days-terraform-plan
    filters: asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_service_account_key')
    mql: |
      terraform.plan.resourceChanges.where(
        type == 'time_rotating' &&
        name == /(sa_key|service_account|key_rotation)/
      ).any(
        change.after.rotation_days != null && change.after.rotation_days <= 90
      )
  - uid: mondoo-gcp-security-iam-service-account-keys-rotated-90-days-terraform-state
    filters: asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'google_service_account_key')
    mql: |
      terraform.state.resources.where(
        type == 'time_rotating' &&
        name == /(sa_key|service_account|key_rotation)/
      ).any(
        values.rotation_days != null && values.rotation_days <= 90
      )
  - uid: mondoo-gcp-security-iam-no-disabled-service-account-keys
    title: Ensure there are no disabled service account keys left undeleted
    impact: 50
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-07
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-5-17
      compliance/nis-2: nis-2-21-2-g
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-5
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-10
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-2-2
      compliance/vda-isa-5: vda-isa-5-4-1-3
    variants:
      - uid: mondoo-gcp-security-iam-no-disabled-service-account-keys-gcp
        tags:
          mondoo.com/filter-title: GCP IAM Service Account
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-iam-no-disabled-service-account-keys-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-iam-no-disabled-service-account-keys-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-iam-no-disabled-service-account-keys-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that disabled service account keys are deleted rather than left in a disabled state. Disabled keys represent unnecessary credential material that can be re-enabled by anyone with sufficient IAM permissions, restoring access that was intentionally revoked.

        **Why this matters**

        - **Re-enablement risk:** A disabled key can be re-enabled by anyone with the `iam.serviceAccountKeys.enable` permission, potentially restoring access that was deliberately removed.
        - **Audit confusion:** Leaving disabled keys creates uncertainty about which credentials are actively managed versus abandoned, making access reviews unreliable.
        - **Expanded credential surface:** Each unnecessary key increases the credential inventory that must be tracked and audited during security reviews.

        **Risk mitigation**

        - **Delete promptly:** Remove disabled keys as soon as no active workloads depend on them, rather than leaving them in a disabled state as a rollback option.
        - **Automate hygiene:** Implement periodic automation to detect and delete disabled keys as part of routine credential management.
        - **Prefer managed alternatives:** Migrate workloads to Workload Identity Federation or attached service accounts to eliminate user-managed key material entirely.
      audit: |
        ### Audit via Console

        1. Sign in to the [Google Cloud Console](https://console.cloud.google.com) and open the target project.
        2. Navigate to **IAM & Admin > Service Accounts**.
        3. For each service account, select the account and open the **Keys** tab.
        4. Review the **Status** column for any keys marked as **Disabled**.

        A passing service account has no keys with a **Disabled** status. A failing service account has one or more keys listed as **Disabled** rather than deleted.

        ### Audit via CLI

        1. List all user-managed keys for each service account and review their status:

        ```bash
        gcloud iam service-accounts keys list --iam-account=SA_EMAIL --managed-by=user \
          --format="table(name,keyType,validAfterTime,validBeforeTime)"
        ```

        A passing result shows no keys with a `validBeforeTime` in the past that remain in a disabled state. A failing result shows keys that have been disabled but not removed.
      remediation:
        - id: console
          desc: |
            To ensure there are no disabled service account keys left undeleted using the Google Cloud Console:

            1. Navigate to **IAM & Admin > Service Accounts** in the Google Cloud Console.
            2. For each service account, select the **Keys** tab.
            3. Identify any disabled keys.
            4. Select the disabled key and select **Delete**.
        - id: cli
          desc: |
            To ensure there are no disabled service account keys left undeleted using the Google Cloud CLI, list keys and identify disabled ones:

            ```bash
            gcloud iam service-accounts keys list --iam-account=SA_EMAIL --managed-by=user
            ```

            Delete a disabled key:

            ```bash
            gcloud iam service-accounts keys delete KEY_ID --iam-account=SA_EMAIL
            ```
        - id: terraform
          desc: |
            To ensure there are no disabled service account keys left undeleted in Terraform, terraform manages service account keys declaratively. To ensure disabled keys are removed, avoid managing keys outside of Terraform. If you use the `google_service_account_key` resource, Terraform will track the key lifecycle:

            ```hcl
            resource "google_service_account_key" "example" {
              service_account_id = google_service_account.example.name
            }
            ```

            If a key needs to be decommissioned, remove the corresponding `google_service_account_key` resource from your configuration and run `terraform apply`. This ensures the key is fully deleted rather than left in a disabled state.

            To avoid user-managed keys entirely, use Workload Identity Federation instead:

            ```hcl
            resource "google_service_account_iam_member" "workload_identity" {
              service_account_id = google_service_account.example.name
              role               = "roles/iam.workloadIdentityUser"
              member             = "principalSet://iam.googleapis.com/projects/PROJECT_NUMBER/locations/global/workloadIdentityPools/POOL_ID/attribute.repository/REPO"
            }
            ```
    refs:
      - url: https://cloud.google.com/iam/docs/creating-managing-service-account-keys
        title: Creating and managing service account keys
  - uid: mondoo-gcp-security-iam-no-disabled-service-account-keys-gcp
    filters: asset.platform == 'gcp-iam-service-account'
    mql: |
      gcp.project.iam.serviceAccount.keys.none(disabled == true)
  - uid: mondoo-gcp-security-iam-no-disabled-service-account-keys-terraform-hcl
    filters: asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_service_account_key')
    mql: |
      terraform.resources.where(nameLabel == 'google_service_account_key').all(
        arguments['disabled'] == null || arguments['disabled'] == false
      )
  - uid: mondoo-gcp-security-iam-no-disabled-service-account-keys-terraform-plan
    filters: asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_service_account_key')
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_service_account_key').all(
        change.after.disabled == null || change.after.disabled == false
      )
  - uid: mondoo-gcp-security-iam-no-disabled-service-account-keys-terraform-state
    filters: asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'google_service_account_key')
    mql: |
      terraform.state.resources.where(type == 'google_service_account_key').all(
        values.disabled == null || values.disabled == false
      )
  - uid: mondoo-gcp-security-logging-bucket-retention-30-days
    title: Ensure Cloud Logging log buckets have at least 30-day retention
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-02
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-pr-pt-1
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-11
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-5-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    variants:
      - uid: mondoo-gcp-security-logging-bucket-retention-30-days-gcp
        tags:
          mondoo.com/filter-title: GCP Logging Bucket
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-logging-bucket-retention-30-days-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-logging-bucket-retention-30-days-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-logging-bucket-retention-30-days-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Cloud Logging log buckets have a retention period of at least 30 days. By default, the `_Default` log bucket retains logs for 30 days, but custom buckets can be misconfigured with shorter periods; adequate retention is required for incident response, forensic investigation, and regulatory compliance.

        **Why this matters**

        - **Incident discovery lag:** Security incidents are frequently discovered weeks or months after the initial compromise, requiring access to historical log data that may already have been purged.
        - **Forensic evidence:** Critical audit trail data deleted before an investigation concludes can prevent root cause analysis and evidence collection.
        - **Compliance mandates:** Many regulatory frameworks require minimum log retention periods, and failing to meet them constitutes a direct compliance violation.
        - **Threat hunting:** Short retention windows impede proactive threat detection and trend analysis that depends on historical baselines.

        **Risk mitigation**

        - **Set minimum 30-day retention:** Configure all log buckets to retain data for at least 30 days and extend that period for logs subject to regulatory requirements.
        - **Export to long-term storage:** Route logs through sinks to Cloud Storage or BigQuery for extended retention beyond what managed log buckets provide.
        - **Use locked retention:** Apply locked retention policies on compliance-critical buckets to guarantee logs cannot be deleted before the retention period expires.
      audit: |
        ### Audit via Console

        1. Sign in to the [Google Cloud Console](https://console.cloud.google.com) and open the target project.
        2. Navigate to **Logging > Logs Storage**.
        3. Review the **Retention** column for each log bucket.

        A passing log bucket shows a retention period of **30 days** or greater. A failing log bucket shows a retention period of fewer than 30 days.

        ### Audit via CLI

        1. List all log buckets and their retention periods:

        ```bash
        gcloud logging buckets list --format="table(name,location,retentionDays)"
        ```

        A passing log bucket returns a `RETENTION_DAYS` value of `30` or higher. A failing log bucket returns a value less than `30`.
      remediation:
        - id: terraform
          desc: |
            To ensure Cloud Logging log buckets have at least 30-day retention in Terraform, configure log bucket retention:

            ```hcl
            resource "google_logging_project_bucket_config" "example" {
              project        = var.project_id
              location       = "global"
              bucket_id      = "my-log-bucket"
              retention_days = 30
            }
            ```
        - id: console
          desc: |
            To ensure Cloud Logging log buckets have at least 30-day retention using the Google Cloud Console:

            1. Navigate to **Logging > Logs Storage** in the Google Cloud Console.
            2. Select the log bucket you want to configure.
            3. Select **Edit** and set the retention period to at least 30 days.
            4. Select **Update bucket** to save.
        - id: cli
          desc: |
            To ensure Cloud Logging log buckets have at least 30-day retention using the Google Cloud CLI, update the retention period for a log bucket:

            ```bash
            gcloud logging buckets update BUCKET_ID --location=LOCATION --retention-days=30
            ```
