  - uid: mondoo-gcp-security-cloud-redis-cluster-iam-auth-enabled
    title: Ensure IAM authentication is enabled for Memorystore Redis Cluster
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-14
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-2
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-2
    variants:
      - uid: mondoo-gcp-security-cloud-redis-cluster-iam-auth-enabled-memorystore-rediscluster
        tags:
          mondoo.com/filter-title: GCP Memorystore Redis Cluster
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-cloud-redis-cluster-iam-auth-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-redis-cluster-iam-auth-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-redis-cluster-iam-auth-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that IAM authentication is enabled on Cloud Memorystore for Redis Cluster instances. By default, Redis Cluster may be created without IAM authentication, relying solely on network-level controls to restrict access, which means any workload that can reach the cluster endpoint can issue commands without identity verification.

        **Why this matters**

        - **Identity-based access control:** Without IAM authentication, network adjacency is the only access barrier; any compromised workload in the same VPC can read or write cluster data without providing credentials.
        - **Audit trail:** IAM authentication produces audit log entries for each access attempt, enabling security monitoring, incident investigation, and compliance reporting.
        - **Least privilege enforcement:** IAM roles allow granular permission grants so different service accounts receive only the Redis access level they actually require.
        - **Lateral movement containment:** Requiring identity verification prevents a compromised workload from pivoting to the Redis cluster and extracting cached secrets or session tokens.

        **Risk mitigation**

        - **Enable IAM auth at cluster creation:** Set the authorization mode to AUTH_MODE_IAM_AUTH when creating Redis Cluster instances, since this is the point at which access model decisions are most straightforward to enforce.
        - **Assign scoped IAM roles:** Grant the minimum necessary Redis IAM roles to specific service accounts rather than using project-level permissions.
        - **Monitor authentication logs:** Review Cloud Audit Logs for Redis Cluster authentication events to detect unusual access patterns.
      audit: |
        ### Audit via Console

        1. Open the [Google Cloud Console](https://console.cloud.google.com) and navigate to **Memorystore > Redis Cluster**.
        2. Click each cluster name to view its details.
        3. Under **Security**, review the **Authorization mode** field.
        4. Verify that the authorization mode is set to **IAM auth**.

        A passing Redis Cluster shows **Authorization mode: IAM auth**. A failing cluster shows **Authorization mode: Disabled** or no IAM auth setting.

        ### Audit via CLI

        1. Describe each Redis Cluster and check its authorization mode:

        ```bash
        gcloud redis clusters describe CLUSTER_NAME \
          --region=REGION \
          --format="json(authorizationMode)"
        ```

        A passing Redis Cluster returns `"authorizationMode": "AUTH_MODE_IAM_AUTH"`. A failing cluster returns `"authorizationMode": "AUTH_MODE_DISABLED"` or omits the field.
      remediation:
        - id: terraform
          desc: |
            To ensure IAM authentication is enabled for Memorystore Redis Cluster in Terraform:

            ```hcl
            resource "google_redis_cluster" "cluster" {
              name        = "my-redis-cluster"
              region      = "us-central1"
              shard_count = 3

              authorization_mode = "AUTH_MODE_IAM_AUTH"
            }
            ```
        - id: console
          desc: |
            To ensure IAM authentication is enabled for Memorystore Redis Cluster using the Google Cloud Console:

            1. Go to the **Memorystore > Redis Cluster** page in the Google Cloud Console.
            2. Select **Create Cluster**.
            3. In the **Security** section, select **IAM Auth** as the authorization mode.
            4. Complete the cluster creation.

            For existing clusters, update the authorization mode in the cluster settings.
        - id: cli
          desc: |
            To ensure IAM authentication is enabled for Memorystore Redis Cluster using the Google Cloud CLI:

            ```bash
            gcloud redis clusters create CLUSTER_NAME \
              --region=REGION \
              --shard-count=3 \
              --auth-mode=iam-auth
            ```
    refs:
      - url: https://cloud.google.com/memorystore/docs/cluster/about-iam-auth
        title: Cloud Memorystore for Redis Cluster IAM authentication documentation
  - uid: mondoo-gcp-security-cloud-redis-cluster-iam-auth-enabled-memorystore-rediscluster
    filters: asset.platform == "gcp-memorystore-rediscluster"
    mql: |
      gcp.project.redisService.cluster.authorizationMode == "AUTH_MODE_IAM_AUTH"
  - uid: mondoo-gcp-security-cloud-redis-cluster-iam-auth-enabled-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_redis_cluster')
    mql: |
      terraform.resources('google_redis_cluster').all(
        arguments.authorization_mode == "AUTH_MODE_IAM_AUTH"
      )
  - uid: mondoo-gcp-security-cloud-redis-cluster-iam-auth-enabled-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_redis_cluster')
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_redis_cluster').all(
