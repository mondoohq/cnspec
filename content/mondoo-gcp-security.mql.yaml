    docs:
      desc: |
        This check ensures that Cloud SQL PostgreSQL instances are configured with the `log_disconnections` flag set to `on`. By default, PostgreSQL does not log when user sessions end or how long they lasted. Enabling this flag records session termination events including session duration, providing the complementary end-of-session data that, together with `log_connections`, gives a complete picture of each database access event.

        **Why this matters**

        - **Session lifecycle visibility:** Knowing when sessions end and how long they lasted helps identify abnormally long-running sessions that could indicate data exfiltration or interactive attacker activity.
        - **Forensic completeness:** Pairing disconnection logs with connection logs enables security teams to reconstruct the full timeline of a session during a post-incident investigation.
        - **Compliance coverage:** Audit frameworks that require database access logging typically expect both connection and disconnection events to be captured.

        **Risk mitigation**

        - **Exfiltration detection:** Unusually long session durations captured in disconnection logs can indicate that an attacker or insider is conducting a slow data extraction.
        - **Incident scoping:** Disconnection timestamps allow investigators to bound the window of potentially malicious activity within a compromised session, reducing the scope of data that must be reviewed.
