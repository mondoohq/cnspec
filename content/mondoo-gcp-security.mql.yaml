  - uid: mondoo-gcp-security-healthcare-dataset-cmek-encryption
    title: Ensure Cloud Healthcare datasets are encrypted with CMEK
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-gcp-security-healthcare-dataset-cmek-encryption-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-healthcare-dataset-cmek-encryption-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-healthcare-dataset-cmek-encryption-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Cloud Healthcare datasets are encrypted with a customer-managed encryption key (CMEK). A Healthcare dataset is the container for DICOM stores, FHIR stores, and HL7v2 stores, and the dataset-level CMEK key flows down to every store inside it, providing coordinated encryption control over all protected health information (PHI) in the dataset.

        **Why this matters**

        - **Healthcare data is the most sensitive category in GCP:** Datasets hold DICOM imaging studies, FHIR clinical resources, and HL7v2 messaging traffic that are subject to strict regulatory requirements and are highly valuable to attackers.
        - **Google-managed keys cannot be independently revoked:** Without CMEK, every DICOM image, FHIR resource, and HL7v2 message is encrypted with a Google-managed key that organizations cannot disable, rotate, or destroy in response to a security incident.
        - **CMEK enables coordinated revocation across all stores:** Disabling or destroying the Cloud KMS key blocks decryption across all DICOM, FHIR, and HL7v2 stores in the dataset simultaneously, providing a complete and rapid containment mechanism.
        - **Key control supports regulatory accountability:** Maintaining independent key custody allows organizations to demonstrate control over PHI encryption and decryption mechanisms required under healthcare data protection regulations.

        **Risk mitigation**

        - **Set the CMEK key at dataset creation:** Configure `encryption_spec.kms_key_name` on every `google_healthcare_dataset` to a Cloud KMS key in the same region as the dataset; this setting cannot be changed after creation.
        - **Grant the Healthcare service agent the required role:** The Cloud Healthcare service agent needs `roles/cloudkms.cryptoKeyEncrypterDecrypter` on the key before the dataset can be created or used.
        - **Restrict key access with IAM:** Limit the principals that can use, modify, or destroy the Cloud KMS key to the Healthcare service agents and authorized administrators to prevent unauthorized access to the encryption layer.
      audit: |
        ### Audit via Console

        1. In the Google Cloud Console, go to **Healthcare** > **Datasets**.
        2. Select a dataset from the list.
        3. On the dataset details page, locate the **Encryption** section.
        4. Review the encryption type displayed.

        A passing dataset shows **Customer-managed encryption key (CMEK)** with a Cloud KMS key name. A failing dataset shows **Google-managed encryption key** or no encryption key configured.

        ### Audit via CLI

        1. List all Healthcare datasets in the project and region:

        ```bash
        gcloud healthcare datasets list \
          --location=REGION \
          --format="table(name,encryptionSpec.kmsKeyName)"
        ```

        A passing dataset returns a non-empty value in the `KMS_KEY_NAME` column. A failing dataset returns an empty `KMS_KEY_NAME` column.
      remediation:
        - id: terraform
          desc: |
            To require CMEK on a Cloud Healthcare dataset in Terraform:

            ```hcl
            resource "google_healthcare_dataset" "default" {
              name     = "phi-dataset"
              location = "us-central1"

              encryption_spec {
                kms_key_name = google_kms_crypto_key.healthcare.id
              }
            }
            ```
        - id: console
          desc: |
            To require CMEK on a Cloud Healthcare dataset using the Google Cloud Console:

            1. In the Google Cloud Console, go to **Healthcare** > **Datasets**.
            2. Select **Create dataset** (CMEK is set at creation time).
            3. Under **Encryption**, select **Customer-managed encryption key (CMEK)** and pick the Cloud KMS key.
            4. Select **Create**.
        - id: cli
          desc: |
            To create a Cloud Healthcare dataset with CMEK using the Google Cloud CLI:

            ```bash
            gcloud healthcare datasets create DATASET_ID \
              --location=REGION \
              --encryption-key=projects/PROJECT/locations/REGION/keyRings/RING/cryptoKeys/KEY
            ```
    refs:
      - url: https://cloud.google.com/healthcare-api/docs/how-tos/cmek
        title: Configure Cloud Healthcare API with CMEK
