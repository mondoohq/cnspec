  - uid: mondoo-gcp-security-cloud-redis-cluster-deletion-protection-enabled
    title: Ensure deletion protection is enabled for Memorystore Redis Cluster
    impact: 50
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-bcr-08
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-308-a-7-ii-a-contingency-plan-data-backup-plan
      compliance/iso-27001-2022: iso-27001-2022-a-8-14
      compliance/nis-2: nis-2-21-2-c
      compliance/nist-csf-1: nist-csf-1-pr-ip-4
      compliance/nist-csf-2: nist-csf-2-pr-ds-11
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cp-9
      compliance/nist-sp-800-171: false
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc9-1-1
      compliance/vda-isa-5: false
    variants:
      - uid: mondoo-gcp-security-cloud-redis-cluster-deletion-protection-enabled-memorystore-rediscluster
        tags:
          mondoo.com/filter-title: GCP Memorystore Redis Cluster
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-cloud-redis-cluster-deletion-protection-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-redis-cluster-deletion-protection-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-redis-cluster-deletion-protection-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that deletion protection is enabled on Cloud Memorystore for Redis Cluster instances. Without deletion protection, any principal with sufficient IAM permissions can permanently destroy a cluster in a single API call, instantly eliminating all cached security data that applications depend on.

        **Why this matters**

        - **Sabotage prevention:** A compromised service account or a malicious insider with delete permissions could destroy the cluster to wipe session tokens, authentication cache, and rate-limiting state as a destructive attack.
        - **Forced insecure fallback:** Applications that lose Redis connectivity may fall back to less secure mechanisms for session management or rate limiting, creating a window of elevated risk.
        - **Accidental deletion:** Automation pipelines and infrastructure-as-code changes that carry overly broad permissions can inadvertently delete production clusters, producing the same security impact as a deliberate attack.
        - **Two-step requirement:** Deletion protection requires an explicit disable step before deletion can proceed, giving security monitoring an opportunity to detect and block the operation.

        **Risk mitigation**

        - **Enable deletion protection on all production clusters:** Set deletionProtectionEnabled to true on every Redis Cluster instance that holds security-relevant data.
        - **Restrict protection changes:** Use IAM policies to limit which principals can disable deletion protection, ensuring that only authorized change-management workflows can modify this setting.
        - **Alert on protection changes:** Configure Cloud Audit Log alerts for any attempt to disable deletion protection so that suspicious activity is flagged in real time.
      audit: |
        ### Audit via Console

        1. Open the [Google Cloud Console](https://console.cloud.google.com) and navigate to **Memorystore > Redis Cluster**.
        2. Click each cluster name to view its details.
        3. Under the cluster configuration, review the **Deletion protection** field.
        4. Verify that deletion protection is enabled.

        A passing Redis Cluster shows **Deletion protection: Enabled**. A failing cluster shows **Deletion protection: Disabled** or no deletion protection setting.

        ### Audit via CLI

        1. Describe each Redis Cluster and check deletion protection:

        ```bash
        gcloud redis clusters describe CLUSTER_NAME \
          --region=REGION \
          --format="json(deletionProtectionEnabled)"
        ```

        A passing Redis Cluster returns `"deletionProtectionEnabled": true`. A failing cluster returns `"deletionProtectionEnabled": false` or omits the field.
      remediation:
        - id: terraform
          desc: |
            To ensure deletion protection is enabled for Memorystore Redis Cluster in Terraform:

            ```hcl
            resource "google_redis_cluster" "cluster" {
              name        = "my-redis-cluster"
              region      = "us-central1"
              shard_count = 3

              deletion_protection_enabled = true
            }
            ```
        - id: console
          desc: |
            To ensure deletion protection is enabled for Memorystore Redis Cluster using the Google Cloud Console:

            1. Go to the **Memorystore > Redis Cluster** page in the Google Cloud Console.
            2. Select the cluster you want to update.
            3. Select **Edit**.
            4. Enable **Deletion protection**.
            5. Select **Save**.
        - id: cli
          desc: |
            To ensure deletion protection is enabled for Memorystore Redis Cluster using the Google Cloud CLI:

            ```bash
            gcloud redis clusters update CLUSTER_NAME \
              --region=REGION \
              --deletion-protection
            ```
