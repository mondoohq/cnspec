        values['auto_create_subnetworks'] != empty
      )
  - uid: mondoo-gcp-security-compute-subnetwork-flow-logs-enabled
    title: Ensure VPC Flow Logs are enabled on subnetworks
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    variants:
      - uid: mondoo-gcp-security-compute-subnetwork-flow-logs-enabled-gcp
        tags:
          mondoo.com/filter-title: GCP Compute Subnetwork
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-compute-subnetwork-flow-logs-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-compute-subnetwork-flow-logs-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-compute-subnetwork-flow-logs-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that VPC Flow Logs are enabled on GCP subnetworks, capturing a sample of network flows to and from VM instances in each subnet. Flow logs are disabled by default when a subnetwork is created; without them, all network-level activity in the subnet is invisible to defenders.

        **Why this matters**

        - **Lateral movement detection:** An attacker who compromises a VM can move to other resources within the VPC undetected when no flow logs exist to surface anomalous internal traffic patterns.
        - **Command-and-control visibility:** Outbound connections to attacker-controlled infrastructure and data exfiltration to external IPs cannot be identified without network flow records that reveal unusual egress destinations.
        - **Forensic evidence:** Reconstructing the timeline and scope of a breach requires network traffic data; flow logs are the primary source of that evidence at the VPC level.
        - **Compliance requirement:** Network traffic monitoring and logging are required by PCI DSS, HIPAA, NIST 800-53, and the CIS GCP Benchmark for subnetworks in scope for regulated data.

        **Risk mitigation**

        - **Enable flow logs with meaningful sampling:** Configure a `log_config` block with an aggregation interval of five seconds and a flow sampling rate of at least 0.5 to capture sufficient traffic for security analysis without excessive cost.
        - **Export to a SIEM:** Route flow logs to a Security Information and Event Management system or to BigQuery for automated anomaly detection and long-term retention.
        - **Alert on suspicious patterns:** Define alerts for unexpected cross-subnet traffic, high-volume egress to unfamiliar IPs, and connections on non-standard ports that may indicate compromise or exfiltration.
      audit: |
        ### Audit via Console

        1. Sign in to the [Google Cloud Console](https://console.cloud.google.com) and open the target project.
        2. Navigate to **VPC network > VPC networks**.
        3. Select a network, then open the **Subnets** tab.
        4. For each subnet, check the **Flow logs** column.

        A passing subnet shows **On** in the Flow logs column. A failing subnet shows **Off**.

        ### Audit via CLI

        1. List all subnetworks and their flow log status:

        ```bash
        gcloud compute networks subnets list --format="table(name,region,enableFlowLogs)"
        ```

        A passing subnetwork returns `True` in the `ENABLE_FLOW_LOGS` column. A failing subnetwork returns `False` or an empty value.
      remediation:
        - id: terraform
          desc: |
            To ensure VPC Flow Logs are enabled on subnetworks in Terraform, enable VPC Flow Logs on subnetworks:

            ```hcl
            resource "google_compute_subnetwork" "example" {
              name          = "example-subnet"
              ip_cidr_range = "10.0.0.0/24"
              region        = "us-central1"
              network       = google_compute_network.example.id

              log_config {
                aggregation_interval = "INTERVAL_5_SEC"
                flow_sampling        = 0.5
                metadata             = "INCLUDE_ALL_METADATA"
              }
            }
            ```
        - id: console
          desc: |
            To ensure VPC Flow Logs are enabled on subnetworks using the Google Cloud Console:

            1. In the Google Cloud console, go to the **VPC network > VPC networks** page.
            2. Select the network containing the subnet.
            3. Select the subnet you want to configure.
            4. Select **Edit**.
            5. Under **Flow logs**, select **On**.
            6. Configure the aggregation interval, sampling rate, and metadata settings.
            7. Select **Save**.
        - id: cli
          desc: |
            To ensure VPC Flow Logs are enabled on subnetworks using the Google Cloud CLI:

            ```bash
            gcloud compute networks subnets update SUBNET_NAME --region=REGION --enable-flow-logs --logging-aggregation-interval=interval-5-sec --logging-flow-sampling=0.5 --logging-metadata=include-all
            ```
    refs:
      - url: https://cloud.google.com/vpc/docs/vpc
        title: Google Cloud VPC Documentation
  - uid: mondoo-gcp-security-compute-subnetwork-flow-logs-enabled-gcp
    filters: asset.platform == "gcp-compute-subnetwork"
    mql: gcp.compute.subnetwork.enableFlowLogs == true
  - uid: mondoo-gcp-security-compute-subnetwork-flow-logs-enabled-terraform-hcl
