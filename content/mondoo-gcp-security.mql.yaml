  - uid: mondoo-gcp-security-cloud-build-trigger-no-default-service-account
    title: Ensure Cloud Build triggers do not run as the default Compute Engine SA
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-2
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-5
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-3-3
      compliance/vda-isa-5: vda-isa-5-4-2-1
    variants:
      - uid: mondoo-gcp-security-cloud-build-trigger-no-default-service-account-gcp
        tags:
          mondoo.com/filter-title: GCP Cloud Build Trigger
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-cloud-build-trigger-no-default-service-account-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-build-trigger-no-default-service-account-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-build-trigger-no-default-service-account-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that every Cloud Build trigger is configured to run under an explicit, dedicated service account rather than falling back to the default Compute Engine service account. Triggers without a configured `serviceAccount` use the legacy Cloud Build service account or the default Compute Engine service account depending on project age, both of which carry broad project-wide permissions.

        **Why this matters**

        - **Editor role by default:** The default Compute Engine service account holds `roles/editor` on the project by default, meaning any build step can read, modify, or delete most project resources including secrets, storage buckets, and other service configurations.
        - **Supply-chain attacks inherit broad permissions:** Build steps frequently execute code from external dependencies; a compromised package inherits the service account's permissions and can pivot to other project resources without additional exploitation.
        - **No per-trigger blast radius scoping:** Sharing the default SA across all triggers means a vulnerability in one build pipeline can affect every resource the default SA can reach, rather than only the resources the specific pipeline needs.
        - **Indistinguishable audit trail:** When multiple triggers share the default SA, Cloud Audit Logs cannot attribute actions to a specific pipeline, complicating incident response and forensic analysis.

        **Risk mitigation**

        - **Create a dedicated service account per trigger or pipeline:** Provision a service account with only the IAM roles required for that pipeline's source, sink, and intermediate resources, then set it as the trigger's `serviceAccount`.
        - **Remove broad roles from the default Compute Engine SA:** Once dedicated SAs are in place, strip the Editor role from the default Compute Engine service account and consider disabling it.
      audit: |
        ### Audit via Console

        1. Go to **Cloud Build > Triggers** in the Google Cloud Console.
        2. For each trigger, open the trigger and scroll to **Advanced > Service account**.
        3. Verify that the service account is set and does not match the default Compute Engine service account pattern (`PROJECT_NUMBER-compute@developer.gserviceaccount.com`).

        A passing trigger shows a dedicated, explicitly configured service account that is not the default Compute Engine account. A failing trigger shows no service account or the default Compute Engine service account.

        ### Audit via CLI

        1. List all triggers and inspect their service accounts:

        ```bash
        gcloud builds triggers list \
          --format='table(name,serviceAccount)'
        ```

        2. For each trigger, describe it to check the full service account field:

        ```bash
        gcloud builds triggers describe TRIGGER_NAME \
          --format='value(serviceAccount)'
        ```

        A passing trigger returns a service account email that is not empty and does not end with `-compute@developer.gserviceaccount.com`. A failing trigger returns an empty service account or one matching the default Compute Engine service account pattern.
      remediation:
        - id: terraform
          desc: |
            Set `service_account` on `google_cloudbuild_trigger` to a dedicated service account whose IAM grants are scoped to the build's needs:

            ```hcl
            resource "google_service_account" "cloudbuild_runner" {
              account_id   = "cloudbuild-runner"
              display_name = "Cloud Build trigger runner"
            }

            resource "google_cloudbuild_trigger" "deploy" {
              name            = "deploy-app"
              location        = "us-central1"
              filename        = "cloudbuild.yaml"
              service_account = google_service_account.cloudbuild_runner.id
            }
            ```
        - id: console
          desc: |
            Assign a dedicated service account to a trigger:

            1. Create a service account scoped to the trigger's required permissions in **IAM & Admin > Service accounts**.
            2. Go to **Cloud Build > Triggers** and open the trigger.
            3. Under **Advanced > Service account**, choose the dedicated service account.
            4. Save the trigger and rerun a build to confirm the new identity has the required permissions.
        - id: cli
          desc: |
            Update the trigger to use a dedicated service account. The flag belongs to the trigger source subcommand (`github`, `manual`, `pubsub`, or `webhook`):

            ```bash
            gcloud builds triggers update github TRIGGER_NAME \
              --service-account=projects/PROJECT/serviceAccounts/cloudbuild-runner@PROJECT.iam.gserviceaccount.com
            ```
    refs:
      - url: https://cloud.google.com/build/docs/cloud-build-service-account
        title: Cloud Build service account
  - uid: mondoo-gcp-security-cloud-build-trigger-no-default-service-account-gcp
