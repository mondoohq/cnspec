  - uid: mondoo-gcp-security-ssl-policy-modern-or-restricted-profile
    title: Ensure SSL policies use MODERN or RESTRICTED profile
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    variants:
      - uid: mondoo-gcp-security-ssl-policy-modern-or-restricted-profile-gcp
        tags:
          mondoo.com/filter-title: GCP SSL Policy
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-ssl-policy-modern-or-restricted-profile-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-ssl-policy-modern-or-restricted-profile-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-ssl-policy-modern-or-restricted-profile-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that SSL policies use the MODERN or RESTRICTED cipher profile rather than COMPATIBLE or CUSTOM, controlling which cipher suites are available for TLS negotiation. The COMPATIBLE profile retains support for older, weaker cipher suites to maximize backward compatibility, while MODERN and RESTRICTED profiles limit negotiation to cipher suites with proven security properties.

        **Why this matters**

        - **Weak cipher exposure:** The COMPATIBLE profile includes cipher suites that are considered weak or vulnerable, such as those without forward secrecy or with short key lengths, expanding the attack surface for session decryption.
        - **CUSTOM profile risk:** Custom profiles require careful manual management; administrators may inadvertently include deprecated ciphers or omit cipher-suite hardening best practices.
        - **Forward secrecy:** Both MODERN and RESTRICTED profiles prioritize ECDHE key exchange, ensuring that the compromise of a server's private key does not retroactively expose previously captured session traffic.
        - **Standards alignment:** MODERN and RESTRICTED profiles are aligned with current federal and industry cryptographic guidance, reducing the need for manual cipher-suite maintenance as recommendations evolve.

        **Risk mitigation**

        - **Adopt MODERN as the default:** Use the MODERN profile for internet-facing load balancers to balance security with broad client compatibility; switch to RESTRICTED only for environments where all clients support the narrower cipher set.
        - **Avoid CUSTOM unless necessary:** If a CUSTOM profile is required, document the rationale, review it against current cryptographic guidance, and audit the cipher list periodically as recommendations change.
        - **Combine with minimum TLS version:** Pair the MODERN or RESTRICTED profile setting with a minimum TLS version of 1.2 to address both protocol version and cipher suite attack surfaces.
      audit: |
        ### Audit via Console

        1. Go to the **Network Security > SSL Policies** page in the Google Cloud Console.
        2. For each SSL policy listed, select the policy and review the **Profile** field.

        A passing SSL policy shows a profile of **MODERN** or **RESTRICTED**. A failing SSL policy shows **COMPATIBLE** or **CUSTOM**.

        ### Audit via CLI

        1. List all SSL policies and their profiles:

        ```bash
        gcloud compute ssl-policies list --format="table(name,profile,minTlsVersion)"
        ```

        A passing SSL policy returns `MODERN` or `RESTRICTED` in the `PROFILE` column. A failing SSL policy returns `COMPATIBLE` or `CUSTOM`.
      remediation:
        - id: terraform
          desc: |
            To ensure SSL policies use MODERN or RESTRICTED profile in Terraform:

            ```hcl
            resource "google_compute_ssl_policy" "modern" {
              name            = "modern-ssl-policy"
              min_tls_version = "TLS_1_2"
              profile         = "MODERN"
            }
            ```
        - id: console
          desc: |
            To ensure SSL policies use MODERN or RESTRICTED profile using the Google Cloud Console:

            1. Go to the **Network Security > SSL Policies** page.
            2. Select the SSL policy.
            3. Set **Profile** to **Modern** or **Restricted**.
            4. Select **Save**.
        - id: cli
          desc: |
            To ensure SSL policies use MODERN or RESTRICTED profile using the Google Cloud CLI:

            ```bash
            gcloud compute ssl-policies update SSL_POLICY_NAME \
              --profile=MODERN
            ```
    refs:
      - url: https://cloud.google.com/load-balancing/docs/ssl-policies-concepts
        title: SSL policies concepts
  - uid: mondoo-gcp-security-ssl-policy-modern-or-restricted-profile-gcp
    filters: asset.platform == 'gcp'
    mql: |
      gcp.project.computeService.sslPolicies.all(
        profile == "MODERN" || profile == "RESTRICTED"
      )
  - uid: mondoo-gcp-security-ssl-policy-modern-or-restricted-profile-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_compute_ssl_policy')
    mql: |
      terraform.resources('google_compute_ssl_policy').all(
        arguments.profile == "MODERN" || arguments.profile == "RESTRICTED"
      )
  - uid: mondoo-gcp-security-ssl-policy-modern-or-restricted-profile-terraform-plan
    filters: |
