          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-binary-authorization-global-policy-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-binary-authorization-global-policy-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-binary-authorization-global-policy-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Binary Authorization is configured with global policy evaluation mode enabled. Global policy evaluation applies Google-maintained system policies that automatically authorize well-known GKE system images such as kube-proxy and metrics-server, preventing operational disruptions when those images are deployed without explicit per-project allowlisting.

        **Why this matters**

        - **Operational safety:** Without global evaluation, GKE system images must be manually allowlisted; missing an entry can cause cluster upgrades or system pod restarts to fail with policy-denial errors.
        - **Google-verified system image trust:** Google's maintained system policies verify that GKE infrastructure images are authentic and unmodified before they are permitted to run.
        - **Reduced allowlist sprawl:** Global evaluation eliminates the need to maintain a long, manually managed list of system image digests, reducing the risk of an overly broad allowlist pattern that inadvertently permits untrusted images.
        - **Layered security:** Combining global evaluation for system images with project-specific attestation policies for application images provides defense-in-depth without sacrificing usability.

        **Risk mitigation**

        - **Enable global policy evaluation in the Binary Authorization policy:** Set `globalPolicyEvaluationMode` to `ENABLE` alongside a non-permissive default admission rule so that system images pass automatically while application images still require attestation.
        - **Pair with attestor-based rules:** Define per-cluster or per-namespace rules requiring attestation for application image namespaces, reserving global evaluation only for system namespaces.
        - **Monitor policy evaluation logs:** Review Binary Authorization audit logs after cluster upgrades to confirm that system image deployments are passing via global policy and not being blocked.
      audit: |
        ### Audit via Console

        1. Open the [Google Cloud Console](https://console.cloud.google.com) and navigate to **Security > Binary Authorization**.
        2. Select the **Policy** tab.
        3. Under **Google-maintained system policy**, check whether global policy evaluation is enabled.
        4. Verify that the setting is turned on.

        A passing policy shows global policy evaluation as **Enabled**. A failing policy shows it as **Disabled** or not configured.

        ### Audit via CLI

        1. Export and inspect the Binary Authorization policy:

        ```bash
        gcloud container binauthz policy export --format=json
        ```

        A passing policy returns `"globalPolicyEvaluationMode": "ENABLE"`. A failing policy returns `"globalPolicyEvaluationMode": "DISABLE"` or omits the field entirely.
      remediation:
        - id: terraform
          desc: |
            To ensure Binary Authorization global policy evaluation is enabled in Terraform:

            ```hcl
            resource "google_binary_authorization_policy" "policy" {
              global_policy_evaluation_mode = "ENABLE"

              default_admission_rule {
                evaluation_mode  = "REQUIRE_ATTESTATION"
                enforcement_mode = "ENFORCED_BLOCK_AND_AUDIT_LOG"
                require_attestations_by = [
                  google_binary_authorization_attestor.attestor.name
                ]
              }
            }
            ```
        - id: console
          desc: |
            To ensure Binary Authorization global policy evaluation is enabled using the Google Cloud Console:

            1. Navigate to **Security > Binary Authorization** in the Google Cloud Console.
            2. Select **Edit Policy**.
            3. Under **Google-maintained system policy**, enable the global policy evaluation.
            4. Select **Save Policy**.
        - id: cli
          desc: |
            To ensure Binary Authorization global policy evaluation is enabled using the Google Cloud CLI, export the current policy:

            ```bash
            gcloud container binauthz policy export > policy.yaml
            ```

            Edit `policy.yaml` to set `globalPolicyEvaluationMode: ENABLE`, then import:

            ```bash
            gcloud container binauthz policy import policy.yaml
            ```
    refs:
      - url: https://cloud.google.com/binary-authorization/docs/overview
        title: Binary Authorization overview
  - uid: mondoo-gcp-security-binary-authorization-global-policy-enabled-gcp
    filters: asset.platform == 'gcp'
    mql: |
      gcp.project.binaryAuthorizationControl.policy.globalPolicyEvaluationMode == "ENABLE"
  - uid: mondoo-gcp-security-binary-authorization-global-policy-enabled-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_binary_authorization_policy')
    mql: |
      terraform.resources('google_binary_authorization_policy').all(
        arguments.global_policy_evaluation_mode == "ENABLE"
      )
  - uid: mondoo-gcp-security-binary-authorization-global-policy-enabled-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_binary_authorization_policy')
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_binary_authorization_policy').all(
        change.after.global_policy_evaluation_mode == "ENABLE"
      )
  - uid: mondoo-gcp-security-binary-authorization-global-policy-enabled-terraform-state
