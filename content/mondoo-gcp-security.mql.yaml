  - uid: mondoo-gcp-security-cloud-cdn-backend-signed-urls-required
    title: Ensure CDN-enabled backend services require signed URLs
    impact: 40
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-2-1
    variants:
      - uid: mondoo-gcp-security-cloud-cdn-backend-signed-urls-required-gcp
        tags:
          mondoo.com/filter-title: GCP Cloud CDN
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-cloud-cdn-backend-signed-urls-required-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-cdn-backend-signed-urls-required-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-cdn-backend-signed-urls-required-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that backend services with Cloud CDN enabled require signed URLs or signed cookies by enforcing a non-zero `signed_url_cache_max_age_sec` on the CDN policy. When CDN is enabled in front of a private origin without signed-URL enforcement, cached content is reachable by anyone who knows or guesses the URL, even after the original authenticated session has ended.

        **Why this matters**

        - **Cached content outlives authenticated sessions:** CDN edge nodes serve cached responses to any client that requests them; without signed URLs, a cached response is effectively public for its entire cache lifetime.
        - **Leaked URLs provide indefinite access:** A single URL shared or logged outside the intended audience can be replayed by anyone until the cache entry expires, with no way to revoke access to the cached copy.
        - **Private content requires token-bound access:** Signed URLs and signed cookies bind each response to a short-lived, cryptographically verifiable token so only authorized callers can fetch the cached content.
        - **CDN presence does not imply access control:** Enabling Cloud CDN improves performance but does not add any authentication layer; access control must be configured explicitly through signed-URL enforcement.

        **Risk mitigation**

        - **Set a non-zero signed URL cache max age:** Configure `cdn_policy.signed_url_cache_max_age_sec` to a value appropriate for the content's sensitivity and access pattern on every CDN-enabled backend service that fronts private content.
        - **Provision and rotate signing keys:** Create signing keys with the `google_compute_backend_service_signed_url_key` resource and rotate them on a regular schedule to limit the exposure window of any compromised key.
        - **Document intentionally public backends:** For workloads serving genuinely public content, verify the CDN cache contains no sensitive data and record the explicit exception in the environment's security documentation.
      audit: |
        ### Audit via Console

        1. In the Google Cloud Console, go to **Network services > Cloud CDN**.
        2. For each backend service with CDN enabled, select the backend and open the **CDN configuration** details.
        3. Under **Signed URLs**, verify that at least one signing key is configured and that a non-zero **Signed URL cache max age** is set.

        A passing CDN-enabled backend service shows at least one signing key and a signed URL cache max age greater than zero. A failing backend service shows no signing keys or a signed URL cache max age of zero.

        ### Audit via CLI

        1. List all backend services that have CDN enabled:

        ```bash
        gcloud compute backend-services list \
          --filter='enableCDN=true' \
          --format='table(name,enableCDN)'
        ```

        2. For each CDN-enabled backend service, inspect the CDN policy:

        ```bash
        gcloud compute backend-services describe BACKEND_SERVICE_NAME \
          --global \
          --format='value(cdnPolicy.signedUrlCacheMaxAgeSec,cdnPolicy.signedUrlKeyNames)'
        ```

        A passing backend service returns a `signedUrlCacheMaxAgeSec` value greater than zero and at least one entry in `signedUrlKeyNames`. A failing backend service returns a `signedUrlCacheMaxAgeSec` of zero or null, or an empty `signedUrlKeyNames` list.
      remediation:
        - id: terraform
          desc: |
            To require signed URLs on a CDN-enabled backend service in Terraform:

            ```hcl
            resource "google_compute_backend_service" "default" {
              name        = "cdn-backend"
              protocol    = "HTTP"
              port_name   = "http"
              timeout_sec = 10
              enable_cdn  = true

              cdn_policy {
                cache_mode                   = "CACHE_ALL_STATIC"
                signed_url_cache_max_age_sec = 7200
              }
            }

            resource "google_compute_backend_service_signed_url_key" "default" {
              backend_service = google_compute_backend_service.default.name
              name            = "signing-key"
              key_value       = var.signing_key_value
            }
            ```
        - id: console
          desc: |
            To require signed URLs on a CDN-enabled backend service using the Google Cloud Console:

            1. In the Google Cloud Console, go to **Network services** > **Cloud CDN**.
            2. Select the CDN-enabled backend service.
            3. Under **Signed URLs**, add a signing key and set a non-zero signed URL cache max age.
            4. Save.
        - id: cli
          desc: |
            To add a signed URL key and enable signed-URL caching on a backend service using the Google Cloud CLI:

            ```bash
            gcloud compute backend-services add-signed-url-key BACKEND_SERVICE_NAME \
              --key-name=KEY_NAME \
              --key-file=KEY_FILE

            gcloud compute backend-services update BACKEND_SERVICE_NAME \
              --signed-url-cache-max-age=7200s
            ```
    refs:
      - url: https://cloud.google.com/cdn/docs/using-signed-urls
        title: Using signed URLs with Cloud CDN
      - url: https://cloud.google.com/cdn/docs/using-signed-cookies
        title: Using signed cookies with Cloud CDN
  - uid: mondoo-gcp-security-cloud-cdn-backend-signed-urls-required-gcp
    filters: asset.platform == 'gcp'
    mql: |
      gcp.project.computeService.backendServices.where(enableCDN == true).all(
        cdnPolicy.signedUrlCacheMaxAgeSec > 0
      )
  - uid: mondoo-gcp-security-cloud-cdn-backend-signed-urls-required-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_compute_backend_service')
    mql: |
      terraform.resources('google_compute_backend_service').where(
        arguments.enable_cdn == true
      ).all(
        blocks.where(type == 'cdn_policy') != empty &&
        blocks.where(type == 'cdn_policy').all(
          arguments.signed_url_cache_max_age_sec != null &&
          arguments.signed_url_cache_max_age_sec != 0
        )
      )
  - uid: mondoo-gcp-security-cloud-cdn-backend-signed-urls-required-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_compute_backend_service')
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_compute_backend_service').where(
        change.after['enable_cdn'] == true
      ).all(
        change.after['cdn_policy'] != empty &&
        change.after['cdn_policy'].all(
          _['signed_url_cache_max_age_sec'] != null &&
          _['signed_url_cache_max_age_sec'] != 0
        )
      )
  - uid: mondoo-gcp-security-cloud-cdn-backend-signed-urls-required-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'google_compute_backend_service')
    mql: |
      terraform.state.resources.where(type == 'google_compute_backend_service').where(
        values['enable_cdn'] == true
      ).all(
        values['cdn_policy'] != empty &&
        values['cdn_policy'].all(
          _['signed_url_cache_max_age_sec'] != null &&
          _['signed_url_cache_max_age_sec'] != 0
        )
      )
  # No runtime variant: the cnquery gcp provider does not expose Cloud Workstations resources.
  - uid: mondoo-gcp-security-workstations-cluster-private-cluster
    title: Ensure Cloud Workstations clusters use a private endpoint
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-gcp-security-workstations-cluster-private-cluster-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-workstations-cluster-private-cluster-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-workstations-cluster-private-cluster-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Cloud Workstations clusters are provisioned with a private endpoint by setting `private_cluster_config.enable_private_endpoint` to `true`. Clusters without a private endpoint are reachable directly from the public internet, exposing what is effectively a managed developer workstation with access to source code, credentials, and downstream cloud services.

        **Why this matters**

        - **Developer environments are high-value targets:** Workstation instances commonly hold IDE extensions, Git credentials, cloud service account keys, and source checkouts that are attractive to credential-theft and supply-chain attacks.
        - **Public endpoints expand the attack surface:** With a public endpoint, the cluster control plane is reachable from any host on the internet, enabling brute-force, scanning, and vulnerability exploitation without needing internal network access.
        - **Private endpoints enforce network-level isolation:** Setting `enable_private_endpoint = true` requires callers to be on the connected network via VPN, Cloud Interconnect, or IAP TCP forwarding, eliminating direct internet reachability.
        - **The setting is immutable after cluster creation:** Private endpoint configuration cannot be changed on an existing cluster without recreating it, so catching this at provisioning time avoids costly remediation later.

        **Risk mitigation**

        - **Enable private endpoints at cluster creation:** Set `private_cluster_config.enable_private_endpoint = true` on every `google_workstations_workstation_cluster` resource before the cluster is deployed.
        - **Use secure access paths:** Reach workstations through Cloud VPN, Cloud Interconnect, or IAP TCP forwarding rather than direct internet access so network-level controls are always in the path.
        - **Restrict the connected VPC:** Apply firewall rules and VPC Service Controls to the VPC connected to the workstations cluster to further limit lateral movement from a compromised workstation.
      audit: |
        ### Audit via Console

        1. In the Google Cloud Console, go to **Cloud Workstations > Cluster management**.
        2. For each workstation cluster, select the cluster to open its detail page.
        3. Under the **Network** section, verify that **Private cluster** is enabled.

        A passing workstation cluster shows **Private cluster: Enabled**, indicating that the cluster uses a private endpoint. A failing cluster shows **Private cluster: Disabled** or does not display the private cluster setting.

        ### Audit via CLI

        1. List all workstation clusters:

        ```bash
        gcloud workstations clusters list \
          --region=REGION \
          --format='table(name,uid)'
        ```

        2. For each cluster, describe it to inspect the private cluster configuration:

        ```bash
        gcloud workstations clusters describe CLUSTER_ID \
          --region=REGION \
          --format='value(privateClusterConfig.enablePrivateEndpoint)'
        ```

        A passing cluster returns `True` for `enablePrivateEndpoint`. A failing cluster returns `False` or no value.
      remediation:
        - id: terraform
          desc: |
            To require a private endpoint on a Cloud Workstations cluster in Terraform:

            ```hcl
            resource "google_workstations_workstation_cluster" "default" {
              workstation_cluster_id = "private-cluster"
              network                = google_compute_network.default.id
              subnetwork             = google_compute_subnetwork.default.id
              location               = "us-central1"

              private_cluster_config {
                enable_private_endpoint = true
              }
            }
            ```
        - id: console
          desc: |
            To require a private endpoint on a Cloud Workstations cluster using the Google Cloud Console:

            1. In the Google Cloud Console, go to **Cloud Workstations** > **Cluster management**.
            2. Create a new cluster (the private endpoint setting cannot be flipped on an existing cluster).
            3. Under **Network**, enable **Private cluster** so the cluster uses a private endpoint.
            4. Select **Create**.
        - id: cli
          desc: |
            To create a Cloud Workstations cluster with a private endpoint using the Google Cloud CLI:

            ```bash
            gcloud workstations clusters create CLUSTER_ID \
              --region=REGION \
              --network=projects/PROJECT_ID/global/networks/NETWORK \
              --subnetwork=projects/PROJECT_ID/regions/REGION/subnetworks/SUBNETWORK \
              --enable-private-endpoint
            ```
    refs:
      - url: https://cloud.google.com/workstations/docs/configure-private-cluster
        title: Configure a private Cloud Workstations cluster
  - uid: mondoo-gcp-security-workstations-cluster-private-cluster-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_workstations_workstation_cluster')
    mql: |
      terraform.resources('google_workstations_workstation_cluster').all(
        blocks.where(type == 'private_cluster_config') != empty &&
        blocks.where(type == 'private_cluster_config').all(
          arguments.enable_private_endpoint == true
        )
      )
  - uid: mondoo-gcp-security-workstations-cluster-private-cluster-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_workstations_workstation_cluster')
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_workstations_workstation_cluster').all(
        change.after['private_cluster_config'] != empty &&
        change.after['private_cluster_config'].all(_['enable_private_endpoint'] == true)
      )
  - uid: mondoo-gcp-security-workstations-cluster-private-cluster-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'google_workstations_workstation_cluster')
    mql: |
      terraform.state.resources.where(type == 'google_workstations_workstation_cluster').all(
        values['private_cluster_config'] != empty &&
        values['private_cluster_config'].all(_['enable_private_endpoint'] == true)
      )
  # No runtime variant: the cnquery gcp provider does not expose Vertex AI Workbench (google_workbench_instance) or legacy Notebooks (google_notebooks_instance) resources.
  - uid: mondoo-gcp-security-vertex-ai-workbench-no-public-ip
    title: Ensure Vertex AI Workbench instances do not have public IP addresses
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-gcp-security-vertex-ai-workbench-no-public-ip-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-vertex-ai-workbench-no-public-ip-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-vertex-ai-workbench-no-public-ip-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Vertex AI Workbench instances, including both current `google_workbench_instance` resources and legacy `google_notebooks_instance` resources, are provisioned without a public IP address. Workbench instances are managed Jupyter environments that hold notebooks, model artifacts, training data references, and cloud credentials, making them high-value targets that should not accept connections directly from the internet.

        **Why this matters**

        - **Public IPs expose Jupyter to the open internet:** Even when the JupyterLab proxy requires IAM authentication, a public IP makes the instance reachable by scanners, brute-force tooling, and vulnerability exploits targeting the underlying VM.
        - **Compromise yields broad cloud access:** A successful attack on a Workbench instance typically yields Google Cloud credentials with broad access to BigQuery, Cloud Storage, and Vertex AI training resources used by the data science workflow.
        - **Private-only instances reduce the attack surface to zero from the internet:** Disabling the public IP forces all access through Private Google Access or IAP TCP forwarding, both of which require valid IAM credentials before a network connection is established.
        - **The setting is fixed at provisioning time:** Public IP assignment cannot be changed on an existing instance without recreating it, making correct initial configuration essential.

        **Risk mitigation**

        - **Disable public IP at instance creation:** Set `disable_public_ip = true` on `google_workbench_instance` resources, or `no_public_ip = true` on legacy `google_notebooks_instance` resources, before the instance is deployed.
        - **Access instances through Private Google Access or IAP:** Use IAP TCP forwarding or a private VPC peer so that network access is always gated by IAM without requiring a public IP.
        - **Apply network tags and firewall rules:** Restrict ingress to the instance's VPC interface with firewall rules that allow only the access paths required by authorized users and services.
      audit: |
        ### Audit via Console

        1. In the Google Cloud Console, go to **Vertex AI > Workbench**.
        2. For each instance, select the instance to open its detail page.
        3. Under the **System information** or **Networking** section, check whether an **External IP** address is assigned.

        A passing Workbench instance shows no external IP address assigned. A failing instance shows an external IP address under its networking configuration.

        ### Audit via CLI

        1. List all Vertex AI Workbench instances:

        ```bash
        gcloud workbench instances list \
          --location=LOCATION \
          --format='table(name,state)'
        ```

        2. For each instance, describe it to check the public IP setting:

        ```bash
        gcloud workbench instances describe INSTANCE_NAME \
          --location=LOCATION \
          --format='value(gceSetup.disablePublicIp)'
        ```

        A passing instance returns `True` for `disablePublicIp`. A failing instance returns `False` or no value, indicating a public IP is assigned.
      remediation:
        - id: terraform
          desc: |
            To provision a Vertex AI Workbench instance without a public IP in Terraform, use the current `google_workbench_instance` resource:

            ```hcl
            resource "google_workbench_instance" "default" {
              name     = "workbench-private"
              location = "us-central1-a"

              gce_setup {
                disable_public_ip = true
              }
            }
            ```

            For the legacy `google_notebooks_instance` resource:

            ```hcl
            resource "google_notebooks_instance" "default" {
              name         = "notebook-private"
              location     = "us-central1-a"
              machine_type = "e2-medium"

              no_public_ip = true
            }
            ```
        - id: console
          desc: |
            To disable the public IP on a Vertex AI Workbench instance using the Google Cloud Console:

            1. In the Google Cloud Console, go to **Vertex AI** > **Workbench**.
            2. Create a new instance (the public-IP setting is set at creation time).
            3. Expand **Networking** > **Advanced options**.
            4. Clear **Enable external IP address**.
            5. Select **Create**.
        - id: cli
          desc: |
            To create a Vertex AI Workbench instance without a public IP using the Google Cloud CLI:

            ```bash
            gcloud workbench instances create INSTANCE_NAME \
              --location=LOCATION \
              --disable-public-ip
            ```
    refs:
      - url: https://cloud.google.com/vertex-ai/docs/workbench/instances/create
        title: Create a Vertex AI Workbench instance
      - url: https://cloud.google.com/vertex-ai/docs/workbench/instances/manage-network
        title: Manage Vertex AI Workbench network options
  - uid: mondoo-gcp-security-vertex-ai-workbench-no-public-ip-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_workbench_instance' || nameLabel == 'google_notebooks_instance')
    mql: |
      terraform.resources('google_workbench_instance').all(
        blocks.where(type == 'gce_setup') != empty &&
        blocks.where(type == 'gce_setup').all(arguments.disable_public_ip == true)
      )
      terraform.resources('google_notebooks_instance').all(
        arguments.no_public_ip == true
      )
