      - uid: mondoo-gcp-security-ssl-policy-min-tls-1-2-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that SSL policies attached to Google Cloud load balancers are configured to enforce a minimum TLS version of 1.2. TLS 1.0 and TLS 1.1 have known cryptographic weaknesses and have been deprecated by IETF RFC 8996; permitting these versions exposes encrypted traffic to downgrade and protocol attacks.

        **Why this matters**

        - **Known protocol vulnerabilities:** TLS 1.0 is susceptible to the BEAST and POODLE attacks; TLS 1.1 lacks support for AEAD cipher suites, limiting it to older, less secure constructions.
        - **Deprecated by standards bodies:** IETF RFC 8996 formally deprecated TLS 1.0 and 1.1 in 2021; major compliance frameworks and federal security guidelines prohibit these versions for systems handling sensitive data.
        - **Minimal client impact:** Modern browsers and HTTP clients have supported TLS 1.2 since 2014; the realistic population of legitimate clients unable to negotiate TLS 1.2 is negligible for most applications.
        - **Downgrade attack risk:** Permitting older protocol versions allows attackers to force a downgrade from TLS 1.3 or 1.2 to a vulnerable version through man-in-the-middle interference.

        **Risk mitigation**

        - **Set minTlsVersion to TLS_1_2:** Update the SSL policy `min_tls_version` field to `TLS_1_2` and attach the updated policy to all target HTTPS proxies and SSL proxies.
        - **Prefer MODERN or RESTRICTED profiles:** Combine the minimum version setting with a MODERN or RESTRICTED cipher profile to further reduce the negotiable cipher surface.
        - **Audit unattached load balancers:** Confirm that every HTTPS and SSL load balancer has an explicit SSL policy attached; load balancers without an attached policy use a permissive default that allows TLS 1.0.
      audit: |
        ### Audit via Console

        1. Go to the **Network Security > SSL Policies** page in the Google Cloud Console.
        2. For each SSL policy listed, select the policy and review the **Minimum TLS version** field.

        A passing SSL policy shows a minimum TLS version of **TLS 1.2**. A failing SSL policy shows **TLS 1.0** or **TLS 1.1**.

        ### Audit via CLI

        1. List all SSL policies and their minimum TLS version:

        ```bash
        gcloud compute ssl-policies list --format="table(name,minTlsVersion,profile)"
        ```

        A passing SSL policy returns `TLS_1_2` in the `MIN_TLS_VERSION` column. A failing SSL policy returns `TLS_1_0` or `TLS_1_1`.
      remediation:
        - id: terraform
          desc: |
            To ensure SSL policies enforce a minimum TLS version of 1.2 in Terraform:

            ```hcl
            resource "google_compute_ssl_policy" "modern" {
              name            = "modern-ssl-policy"
              min_tls_version = "TLS_1_2"
              profile         = "MODERN"
            }
            ```
        - id: console
          desc: |
            To ensure SSL policies enforce a minimum TLS version of 1.2 using the Google Cloud Console:

            1. Go to the **Network Security > SSL Policies** page.
            2. Select the SSL policy or select **Create SSL Policy**.
            3. Set **Minimum TLS version** to **TLS 1.2**.
            4. Select **Save** or **Create**.
            5. Attach the policy to your target HTTPS proxy or SSL proxy.
        - id: cli
          desc: |
            To ensure SSL policies enforce a minimum TLS version of 1.2 using the Google Cloud CLI:

            ```bash
            gcloud compute ssl-policies update SSL_POLICY_NAME \
              --min-tls-version=1.2
            ```
    refs:
      - url: https://cloud.google.com/load-balancing/docs/ssl-policies-concepts
        title: SSL policies concepts
      - url: https://cloud.google.com/load-balancing/docs/use-ssl-policies
        title: Using SSL policies
