  - uid: mondoo-gcp-security-compute-image-iam-no-public-principals
    title: Ensure Compute Engine custom image IAM has no public principals
    impact: 100
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-5-15
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-2-1
    variants:
      - uid: mondoo-gcp-security-compute-image-iam-no-public-principals-gcp
        tags:
          mondoo.com/filter-title: GCP
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-compute-image-iam-no-public-principals-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-compute-image-iam-no-public-principals-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-compute-image-iam-no-public-principals-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that no IAM binding on a Compute Engine custom image grants access to `allUsers` or `allAuthenticatedUsers`. By default, custom images are private, but resource-level IAM allows operators to attach public principals directly to an image, and those bindings persist indefinitely unless explicitly removed.

        **Why this matters**

        - **Bootable disk template exposed to the internet:** A custom image contains every artifact baked in during creation, including SSH keys, internal CA certificates, license keys, agent configurations, and any credentials embedded during bootstrapping.
        - **No interactive access needed to exfiltrate data:** An attacker with `allUsers` access to the image can launch a VM from it in any project they control and read every file without touching the source environment.
        - **Images serve as supply-chain artifacts:** Downstream automation that pulls the image and launches VMs trusts its contents; a public image can be observed and reverse-engineered to map internal infrastructure.
        - **Resource-level binding bypasses org-level controls:** Custom image IAM is scoped to the resource itself, so organization policies and project-level deny rules do not automatically catch public bindings on individual images.

        **Risk mitigation**

        - **Restrict to named principals:** Bind only specific users, groups, or service accounts with `roles/compute.imageUser` for VM launch or `roles/compute.storageAdmin` for image management.
        - **Audit image IAM periodically:** List every custom image's IAM policy and alert on any binding that includes `allUsers` or `allAuthenticatedUsers`.
        - **Treat any public image binding as an incident:** Revoke the binding immediately and audit whether unauthorized parties created VMs from the exposed image.
      audit: |
        ### Audit via Console

        1. Go to **Compute Engine > Images** in the Google Cloud Console.
        2. Filter to **Custom images**.
        3. Select each custom image.
        4. Open the **Permissions** panel.
        5. Review all IAM bindings and confirm that no principal listed is `allUsers` or `allAuthenticatedUsers`.

        A passing custom image shows no bindings to `allUsers` or `allAuthenticatedUsers` in its IAM policy. A failing custom image shows at least one binding granting access to `allUsers` or `allAuthenticatedUsers`.

        ### Audit via CLI

        1. List all custom images in the project, then retrieve the IAM policy for each:

        ```bash
        gcloud compute images list \
          --no-standard-images \
          --format="table(name,family,status)"

        gcloud compute images get-iam-policy IMAGE_NAME \
          --format="json"
        ```

        A passing image returns an IAM policy with no binding whose `members` array contains `allUsers` or `allAuthenticatedUsers`. A failing image returns a binding that includes `allUsers` or `allAuthenticatedUsers` in the `members` array.
      remediation:
        - id: terraform
          desc: |
            Manage custom image IAM only via `google_compute_image_iam_member` (or `_binding`) with explicit principals — never with `allUsers` or `allAuthenticatedUsers`:

            ```hcl
            resource "google_compute_image_iam_member" "platform_users" {
              project = var.project_id
              image   = google_compute_image.app_baseline.name
              role    = "roles/compute.imageUser"
              member  = "group:platform-eng@example.com" # never allUsers / allAuthenticatedUsers
            }
            ```

            Audit existing bindings: import the image's IAM policy with `terraform import google_compute_image_iam_policy.image projects/PROJECT/global/images/IMAGE`, then remove any public-principal members in the source HCL and re-apply.
        - id: console
          desc: |
            Remove any public principal from the image IAM policy:

            1. Open **Compute Engine** → **Images**.
            2. Select the flagged image (filter to **Custom images** if needed).
            3. Open the **Permissions** panel.
            4. Locate any binding whose principal is `allUsers` or `allAuthenticatedUsers` and remove it.
            5. Add specific principals that need to launch VMs from the image, using `roles/compute.imageUser` (the narrowest appropriate role).
            6. Save and verify the policy no longer lists the public principals.
        - id: cli
          desc: |
            Remove public bindings from the image:

            ```bash
            gcloud compute images remove-iam-policy-binding IMAGE_NAME \
              --member=allUsers \
              --role=ROLE_NAME

            gcloud compute images remove-iam-policy-binding IMAGE_NAME \
              --member=allAuthenticatedUsers \
              --role=ROLE_NAME
            ```
    refs:
      - url: https://cloud.google.com/compute/docs/access/iam
        title: Compute Engine - IAM roles and permissions
      - url: https://cloud.google.com/iam/docs/overview#allusers
        title: IAM - Public principals (allUsers, allAuthenticatedUsers)
