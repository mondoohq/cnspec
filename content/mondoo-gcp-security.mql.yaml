  - uid: mondoo-gcp-security-secretmanager-cmek-encryption
    title: Ensure Secret Manager secrets are encrypted with CMEK
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-gcp-security-secretmanager-cmek-encryption-gcp
        tags:
          mondoo.com/filter-title: GCP Secret Manager Secret
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-secretmanager-cmek-encryption-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-secretmanager-cmek-encryption-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-secretmanager-cmek-encryption-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Secret Manager secrets are encrypted using customer-managed encryption keys (CMEK) rather than the default Google-managed keys. By default, GCP encrypts secrets at rest with Google-managed keys, which provides baseline protection but gives the organization no independent control over the key lifecycle.

        **Why this matters**

        - **Key lifecycle control:** CMEK allows the organization to rotate, disable, or destroy the encryption key independently of Google, enabling a cryptographic kill switch that immediately renders all encrypted secret data inaccessible.
        - **Separation of duties:** Separating key custody from the cloud provider means that a Google-side incident or insider threat cannot expose secret data without the customer's key material.
        - **Crypto shredding:** Destroying a CMEK key permanently and irreversibly eliminates all data encrypted with it, satisfying data-deletion requirements under regulations that mandate verifiable destruction.
        - **Key usage audit trail:** All encryption and decryption operations against a CMEK key are logged in Cloud KMS audit logs, providing a complete record of secret access for compliance and forensic purposes.

        **Risk mitigation**

        - **Provision CMEK keys before secret creation:** Create Cloud KMS key rings and keys in advance, since CMEK must be configured at secret creation time and cannot be applied to existing secrets.
        - **Restrict KMS key access:** Use Cloud KMS IAM policies to limit who can use, manage, or destroy the encryption keys that protect secrets.
        - **Monitor key usage:** Enable KMS audit logging and alert on unexpected key usage patterns that may indicate unauthorized secret access.
      audit: |
        ### Audit via Console

        1. Open the [Google Cloud Console](https://console.cloud.google.com) and navigate to **Security > Secret Manager**.
        2. Click each secret name to view its details.
        3. Under the **Overview** tab, review the **Encryption** section.
        4. Verify that the encryption type shows **Customer-managed encryption key (CMEK)** with a Cloud KMS key reference, not **Google-managed encryption key**.

        A passing secret shows a customer-managed encryption key (CMEK) with a Cloud KMS key resource name listed. A failing secret shows **Google-managed encryption key** or no encryption key configured.

        ### Audit via CLI

        1. Describe each secret and check its KMS key configuration:

        ```bash
        gcloud secrets describe SECRET_ID \
          --format="json(replication)"
        ```

        A passing secret returns a `replication` object containing `userManaged.replicas[].customerManagedEncryption.kmsKeyName` with a non-empty Cloud KMS key resource name. A failing secret returns a `replication` object with no `customerManagedEncryption` field, or uses `automatic` replication without a KMS key.
      remediation:
        - id: terraform
          desc: |
            To ensure Secret Manager secrets are encrypted with CMEK in Terraform, configure a Cloud KMS key and set it as the encryption key for the secret:

            ```hcl
            resource "google_kms_key_ring" "example" {
              name     = "example-keyring"
              location = "global"
            }

            resource "google_kms_crypto_key" "example" {
              name     = "example-key"
              key_ring = google_kms_key_ring.example.id
            }

            resource "google_secret_manager_secret" "example" {
              secret_id = "example-secret"

              replication {
                user_managed {
                  replicas {
                    location = "us-central1"
                    customer_managed_encryption {
                      kms_key_name = google_kms_crypto_key.example.id
                    }
                  }
                }
              }
            }
            ```
        - id: console
          desc: |
            To ensure Secret Manager secrets are encrypted with CMEK using the Google Cloud Console:

            1. Navigate to **Security > Secret Manager** in the Google Cloud Console.
            2. Select **Create Secret** or select an existing secret.
            3. Under **Encryption**, select **Customer-managed encryption key (CMEK)**.
            4. Select or create a Cloud KMS key for each replication location.
            5. Select **Create Secret** or **Update**.

            Note: Encryption configuration is set at secret creation time. To change encryption on an existing secret, you must create a new secret with CMEK and migrate the secret versions.
        - id: cli
          desc: |
            To ensure Secret Manager secrets are encrypted with CMEK using the Google Cloud CLI, create a secret with CMEK encryption:

            ```bash
            gcloud secrets create SECRET_ID \
              --replication-policy=user-managed \
              --locations=LOCATION \
              --kms-key-name=projects/PROJECT/locations/LOCATION/keyRings/RING/cryptoKeys/KEY
            ```

            Note: CMEK must be configured at secret creation time. To migrate an existing secret, create a new CMEK-encrypted secret and add the secret data as a new version.
    refs:
      - url: https://cloud.google.com/secret-manager/docs/cmek
        title: Customer-managed encryption keys for Secret Manager
      - url: https://cloud.google.com/secret-manager/docs/creating-and-accessing-secrets
        title: Creating and accessing secrets
  - uid: mondoo-gcp-security-secretmanager-cmek-encryption-gcp
    filters: asset.platform == 'gcp-secretmanager-secret'
    mql: gcp.project.secretmanager.secret.kmsKeys != empty
  - uid: mondoo-gcp-security-secretmanager-cmek-encryption-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_secret_manager_secret')
    mql: |
      terraform.resources('google_secret_manager_secret').all(
        blocks.one(type == 'replication') &&
        blocks.where(type == 'replication').all(
          blocks.one(type == 'user_managed') &&
          blocks.where(type == 'user_managed').all(
            blocks.where(type == 'replicas').all(
              blocks.one(type == 'customer_managed_encryption')
            )
          )
        )
      )
  - uid: mondoo-gcp-security-secretmanager-cmek-encryption-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_secret_manager_secret')
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_secret_manager_secret').all(
        change.after['replication'] != empty &&
        change.after['replication']['user_managed'] != empty &&
        change.after['replication']['user_managed']['replicas'] != empty &&
        change.after['replication']['user_managed']['replicas'].all(
          _['customer_managed_encryption'] != empty
        )
      )
  - uid: mondoo-gcp-security-secretmanager-cmek-encryption-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'google_secret_manager_secret')
    mql: |
      terraform.state.resources.where(type == 'google_secret_manager_secret').all(
        values['replication'] != empty &&
        values['replication']['user_managed'] != empty &&
        values['replication']['user_managed']['replicas'] != empty &&
        values['replication']['user_managed']['replicas'].all(
          _['customer_managed_encryption'] != empty
        )
      )
  - uid: mondoo-gcp-security-secretmanager-rotation-configured
    title: Ensure Secret Manager secrets have rotation configured
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-12
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-5-17
      compliance/nis-2: nis-2-21-2-g
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-5
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-10
      compliance/pci-dss-4: pcidss-requirement-8-6-3
      compliance/soc2-2017: soc2-control-cc6-1-9
      compliance/vda-isa-5: vda-isa-5-4-1-3
    variants:
      - uid: mondoo-gcp-security-secretmanager-rotation-configured-gcp
        tags:
          mondoo.com/filter-title: GCP Secret Manager Secret
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-secretmanager-rotation-configured-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-secretmanager-rotation-configured-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-secretmanager-rotation-configured-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Secret Manager secrets have a rotation policy configured with a rotation period and a next rotation time. By default, secrets in Secret Manager have no rotation schedule, meaning credentials can remain unchanged indefinitely after initial creation.

        **Why this matters**

        - **Exposure window limitation:** A secret that is rotated regularly limits the useful lifetime of any credential that was leaked, logged, or intercepted before the compromise was discovered.
        - **Persistent unauthorized access:** Without rotation, a compromised credential remains valid until it is manually revoked, allowing an attacker to maintain persistent access that may go undetected for months or years.
        - **Incident response readiness:** A rotation workflow that exists before a breach provides a tested, rehearsed path to quickly invalidate compromised credentials rather than scrambling under pressure.
        - **Compliance alignment:** Periodic rotation of credentials and cryptographic secrets is a requirement in several security frameworks that organizations must satisfy to meet audit obligations.

        **Risk mitigation**

        - **Configure rotation on all secrets:** Set a rotation period and next rotation time on every Secret Manager secret, choosing an interval proportional to the sensitivity of the stored credential.
        - **Automate the rotation handler:** Connect a Pub/Sub topic to the secret and implement a Cloud Function that creates and activates a new secret version when the rotation event fires.
        - **Monitor rotation events:** Track Cloud Audit Logs for rotation activity and alert when a secret's scheduled rotation time passes without a new version being created.
      audit: |
        ### Audit via Console

        1. In the Google Cloud Console, navigate to **Security > Secret Manager**.
        2. For each secret, click the secret name to open its details.
        3. Review the **Rotation** section to confirm a rotation period and next rotation time are configured.

        A passing secret shows a configured rotation period (for example, 90 days) and a scheduled next rotation time. A failing secret shows no rotation period configured or an empty Rotation section.

        ### Audit via CLI

        1. List all secrets and inspect their rotation configuration:

        ```bash
        gcloud secrets list --format="table(name,rotation.rotationPeriod,rotation.nextRotationTime)"
        ```

        2. For a specific secret:

        ```bash
        gcloud secrets describe SECRET_ID --format="json(rotation)"
        ```

        A passing secret returns a `rotation` object with both `rotationPeriod` and `nextRotationTime` populated. A failing secret returns an empty or missing `rotation` field.
      remediation:
        - id: terraform
          desc: |
            To ensure Secret Manager secrets have rotation configured in Terraform, configure rotation on a Secret Manager secret with a Pub/Sub topic for rotation notifications:

            ```hcl
            resource "google_pubsub_topic" "rotation" {
              name = "secret-rotation-topic"
            }

            resource "google_secret_manager_secret" "example" {
              secret_id = "example-secret"

              replication {
                auto {}
              }

              rotation {
                rotation_period    = "7776000s"  # 90 days
                next_rotation_time = "2024-12-01T00:00:00Z"
              }

              topics {
                name = google_pubsub_topic.rotation.id
              }
            }
            ```
        - id: console
          desc: |
            To ensure Secret Manager secrets have rotation configured using the Google Cloud Console:

            1. Navigate to **Security > Secret Manager** in the Google Cloud Console.
            2. Select the secret you want to configure.
            3. Select **Edit Secret**.
            4. Under **Rotation**, select **Set rotation period**.
            5. Configure the rotation period (for example, 90 days).
            6. Set the next rotation time.
            7. Configure a Pub/Sub topic to receive rotation notifications.
            8. Select **Update Secret**.
        - id: cli
          desc: |
            To ensure Secret Manager secrets have rotation configured using the Google Cloud CLI, configure rotation on an existing secret:

            ```bash
            gcloud secrets update SECRET_ID \
              --next-rotation-time="2024-12-01T00:00:00Z" \
              --rotation-period="7776000s" \
              --add-topics=projects/PROJECT/topics/ROTATION_TOPIC
            ```

            Note: A Pub/Sub topic must be configured on the secret to receive rotation notifications. The rotation period is specified in seconds (for example, 7776000s for 90 days).
    refs:
      - url: https://cloud.google.com/secret-manager/docs/secret-rotation
        title: Secret rotation in Secret Manager
      - url: https://cloud.google.com/secret-manager/docs/creating-and-accessing-secrets
        title: Creating and accessing secrets
  - uid: mondoo-gcp-security-secretmanager-rotation-configured-gcp
    filters: asset.platform == 'gcp-secretmanager-secret'
    mql: |
      gcp.project.secretmanager.secret.rotation != empty
  - uid: mondoo-gcp-security-secretmanager-rotation-configured-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_secret_manager_secret')
    mql: |
      terraform.resources('google_secret_manager_secret').all(
        blocks.where(type == 'rotation') != empty &&
        blocks.where(type == 'rotation').all(
          arguments.rotation_period != empty
        )
      )
  - uid: mondoo-gcp-security-secretmanager-rotation-configured-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_secret_manager_secret')
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_secret_manager_secret').all(
        change.after.rotation != empty
      )
  - uid: mondoo-gcp-security-secretmanager-rotation-configured-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'google_secret_manager_secret')
    mql: |
      terraform.state.resources.where(type == 'google_secret_manager_secret').all(
        values.rotation != empty
      )
  - uid: mondoo-gcp-security-secretmanager-not-publicly-accessible
    title: Ensure Secret Manager secrets do not have overly permissive IAM policies
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-2-1
    variants:
      - uid: mondoo-gcp-security-secretmanager-not-publicly-accessible-gcp
        tags:
          mondoo.com/filter-title: GCP Secret Manager Secret
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-secretmanager-not-publicly-accessible-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-secretmanager-not-publicly-accessible-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-secretmanager-not-publicly-accessible-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Secret Manager secrets do not have IAM bindings that grant access to allUsers or allAuthenticatedUsers. Granting either of these principals access to a secret makes the stored credentials available to unauthenticated internet users or any holder of a Google account respectively, which represents an immediate and critical exposure.

        **Why this matters**

        - **Unauthenticated access:** The allUsers principal requires no authentication whatsoever; any request from the internet can retrieve the secret value without presenting any credential.
        - **Broadly authenticated exposure:** The allAuthenticatedUsers principal extends access to every personal Gmail account in addition to organizational identities, vastly exceeding any intended audience.
        - **Cascading compromise:** Secrets typically contain credentials for databases, APIs, and other systems; exposing a single secret can provide an attacker with keys to compromise multiple downstream services simultaneously.
        - **No revocation granularity:** Once a secret is exposed to the public internet, it is not possible to determine who accessed it or revoke access to specific individuals after the fact.

        **Risk mitigation**

        - **Audit IAM bindings immediately:** Review the IAM policy of every secret to confirm that neither allUsers nor allAuthenticatedUsers appears in any binding, and remove those principals if found.
        - **Replace with specific identities:** Grant access only to named service accounts, groups, or users that have a documented operational need, using the secretmanager.secretAccessor role at minimum privilege.
        - **Enforce via organization policy:** Apply organization-level policies to prevent allUsers and allAuthenticatedUsers from being granted any IAM binding on Secret Manager resources across all projects.
      audit: |
        ### Audit via Console

        1. In the Google Cloud Console, navigate to **Security > Secret Manager**.
        2. For each secret, click the secret name, then click the **Permissions** tab.
        3. Review all IAM role bindings and confirm that neither `allUsers` nor `allAuthenticatedUsers` appears as a member in any binding.

        A passing secret shows only specific service accounts, groups, or user identities as members. A failing secret shows `allUsers` or `allAuthenticatedUsers` listed under one or more role bindings.

        ### Audit via CLI

        1. Retrieve the IAM policy for a secret:

        ```bash
        gcloud secrets get-iam-policy SECRET_ID
        ```

        A passing secret returns bindings that contain no `allUsers` or `allAuthenticatedUsers` members. A failing secret returns a binding with `members` containing `allUsers` or `allAuthenticatedUsers`.
      remediation:
        - id: terraform
          desc: |
            To ensure Secret Manager secrets do not have overly permissive IAM policies in Terraform, ensure that IAM policy resources for Secret Manager secrets do not include `allUsers` or `allAuthenticatedUsers` as members:

            ```hcl
            # Correct - specific service accounts only
            resource "google_secret_manager_secret_iam_binding" "binding" {
              secret_id = google_secret_manager_secret.example.secret_id
              role      = "roles/secretmanager.secretAccessor"

              members = [
                "serviceAccount:my-service@project.iam.gserviceaccount.com",
              ]
            }
            ```
        - id: console
          desc: |
            To ensure Secret Manager secrets do not have overly permissive IAM policies using the Google Cloud Console:

            1. Navigate to **Security > Secret Manager** in the Google Cloud Console.
            2. Select the secret you want to review.
            3. Click the **Permissions** tab.
            4. Review all IAM bindings for the secret.
            5. For any binding that includes `allUsers` or `allAuthenticatedUsers`:
                - Select **Edit** for that binding.
                - Remove `allUsers` and/or `allAuthenticatedUsers` from the members list.
                - Select **Save** to apply the changes.
            6. Replace removed principals with specific identities that require access.
        - id: cli
          desc: |
            To ensure Secret Manager secrets do not have overly permissive IAM policies using the Google Cloud CLI:

            1. List the IAM policy for a secret:

            ```bash
            gcloud secrets get-iam-policy SECRET_ID
            ```

            2. Remove public access bindings:

            ```bash
            gcloud secrets remove-iam-policy-binding SECRET_ID \
              --member='allUsers' \
              --role='ROLE'

            gcloud secrets remove-iam-policy-binding SECRET_ID \
              --member='allAuthenticatedUsers' \
              --role='ROLE'
            ```

            3. Grant access to specific identities instead:

            ```bash
            gcloud secrets add-iam-policy-binding SECRET_ID \
              --member='serviceAccount:SA_EMAIL' \
              --role='roles/secretmanager.secretAccessor'
            ```
    refs:
      - url: https://cloud.google.com/secret-manager/docs/access-control
        title: Secret Manager access control with IAM
      - url: https://cloud.google.com/secret-manager/docs/creating-and-accessing-secrets
        title: Creating and accessing secrets
  - uid: mondoo-gcp-security-secretmanager-not-publicly-accessible-gcp
    filters: asset.platform == 'gcp-secretmanager-secret'
    mql: |
      gcp.project.secretmanager.secret.iamPolicy.all(
        members.none(_ == "allUsers" || _ == "allAuthenticatedUsers")
      )
  - uid: mondoo-gcp-security-secretmanager-not-publicly-accessible-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' &&
        terraform.resources.where(nameLabel.in(['google_secret_manager_secret_iam_policy', 'google_secret_manager_secret_iam_binding', 'google_secret_manager_secret_iam_member'])) != empty
    mql: |
      terraform.resources.where(nameLabel == 'google_secret_manager_secret_iam_policy' || nameLabel == 'google_secret_manager_secret_iam_binding')
        .all(
          arguments.members == empty || arguments.members.none(_ == 'allUsers' || _ == 'allAuthenticatedUsers')
        )
      terraform.resources('google_secret_manager_secret_iam_member').all(
        arguments.member != 'allUsers' && arguments.member != 'allAuthenticatedUsers'
      )
  - uid: mondoo-gcp-security-secretmanager-not-publicly-accessible-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' &&
        terraform.plan.resourceChanges.where(type.in(['google_secret_manager_secret_iam_policy', 'google_secret_manager_secret_iam_binding', 'google_secret_manager_secret_iam_member'])) != empty
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_secret_manager_secret_iam_policy' || type == 'google_secret_manager_secret_iam_binding').all(
        change.after.members == empty ||
          change.after.members.none(_ == 'allUsers' || _ == 'allAuthenticatedUsers')
      )
      terraform.plan.resourceChanges.where(type == 'google_secret_manager_secret_iam_member').all(
        change.after.member != 'allUsers' && change.after.member != 'allAuthenticatedUsers'
      )
  - uid: mondoo-gcp-security-secretmanager-not-publicly-accessible-terraform-state
    filters: |
      asset.platform == 'terraform-state' &&
        terraform.state.resources.where(type.in(['google_secret_manager_secret_iam_policy', 'google_secret_manager_secret_iam_binding', 'google_secret_manager_secret_iam_member'])) != empty
    mql: |
      terraform.state.resources.where(type == 'google_secret_manager_secret_iam_policy' || type == 'google_secret_manager_secret_iam_binding').all(
        values.members == empty ||
          values.members.none(_ == 'allUsers' || _ == 'allAuthenticatedUsers')
      )
      terraform.state.resources.where(type == 'google_secret_manager_secret_iam_member').all(
        values.member != 'allUsers' && values.member != 'allAuthenticatedUsers'
