      terraform.state.resources.where(type == 'google_cloud_run_v2_service').all(
        values.template != empty &&
        values.template.all(_['encryption_key'] != empty)
      )
  - uid: mondoo-gcp-security-cloud-run-no-default-service-account
    title: Ensure Cloud Run services do not use the default service account
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-5
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-9
      compliance/vda-isa-5: vda-isa-5-4-1-3
    variants:
      - uid: mondoo-gcp-security-cloud-run-no-default-service-account-gcp
        tags:
          mondoo.com/filter-title: GCP Cloud Run Service
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-cloud-run-no-default-service-account-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-run-no-default-service-account-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-run-no-default-service-account-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Cloud Run services are configured to use a dedicated custom service account rather than the default Compute Engine service account. The default service account is automatically granted the Editor role at the project level, giving any service that uses it broad read-write access to nearly every resource in the project.

        **Why this matters**

        - **Least privilege enforcement:** A custom service account can be bound to only the IAM roles the service actually needs, shrinking the permissions available to an attacker who compromises the service.
        - **Blast radius reduction:** A compromised container running under the default Editor-role account can modify or delete any project resource; a compromised container running under a scoped custom account can only affect the resources explicitly granted to it.
        - **Identity traceability:** Dedicated service accounts create a clear audit trail linking Cloud Audit Log entries to a specific service, making incident investigation faster and more accurate.
        - **Compliance alignment:** Least-privilege identity assignment is a foundational requirement in most major security frameworks.

        **Risk mitigation**

        - **Create purpose-built service accounts:** Define one service account per Cloud Run service and bind only the roles that service requires to function.
        - **Audit existing bindings:** Periodically review all Cloud Run service account assignments to confirm no service is still using the default Compute Engine account.
        - **Monitor for privilege escalation:** Alert on IAM policy changes that grant elevated roles to Cloud Run service accounts.
      audit: |
        ### Audit via Console

        1. Sign in to the [Google Cloud Console](https://console.cloud.google.com) and select the project.
        2. Navigate to **Cloud Run**.
        3. Select a service name to open its details page.
        4. Click the **Security** tab.
        5. Check the **Service account** field.
        6. Verify it does not match the pattern `PROJECT_NUMBER-compute@developer.gserviceaccount.com` or `PROJECT_ID@appspot.gserviceaccount.com`.
        7. Repeat for each service.

        A passing service shows a custom dedicated service account. A failing service shows the default Compute Engine service account (`PROJECT_NUMBER-compute@developer.gserviceaccount.com`) or the default App Engine service account.

        ### Audit via CLI

        1. List all Cloud Run services and their service account:

        ```bash
        gcloud run services list --format="table(metadata.name,spec.template.spec.serviceAccountName,region)"
        ```

        A passing service returns a custom service account email that does not match the default patterns `*-compute@developer.gserviceaccount.com` or `*@appspot.gserviceaccount.com`. A failing service returns a service account matching one of those default patterns.
      remediation:
        - id: terraform
          desc: |
            To ensure Cloud Run services do not use the default service account in Terraform:

            ```hcl
            resource "google_service_account" "run_sa" {
              account_id   = "cloud-run-sa"
              display_name = "Cloud Run Service Account"
            }

            resource "google_cloud_run_v2_service" "example" {
              name     = "example-service"
              location = "us-central1"

              template {
                service_account = google_service_account.run_sa.email

                containers {
                  image = "us-docker.pkg.dev/cloudrun/container/hello"
                }
              }
            }
            ```
        - id: console
          desc: |
            To ensure Cloud Run services do not use the default service account using the Google Cloud Console:

            1. Navigate to **Cloud Run** in the Google Cloud Console.
            2. Select the service to update.
            3. Select **Edit & Deploy New Revision**.
            4. Under **Security**, select a custom service account from the **Service account** dropdown.
            5. Select **Deploy**.
        - id: cli
          desc: |
            To ensure Cloud Run services do not use the default service account using the Google Cloud CLI:

            ```bash
            gcloud run services update SERVICE_NAME \
              --service-account=CUSTOM_SA_EMAIL \
              --region=REGION
            ```
    refs:
      - url: https://cloud.google.com/run/docs/securing/service-identity
        title: Cloud Run service identity
  - uid: mondoo-gcp-security-cloud-run-no-default-service-account-gcp
    filters: asset.platform == 'gcp-cloudrun-service'
