      compliance/soc2-2017: soc2-control-cc6-3-3
      compliance/vda-isa-5: vda-isa-5-4-2-1
    variants:
      - uid: mondoo-gcp-security-gke-cluster-legacy-abac-disabled-gcp
        tags:
          mondoo.com/filter-title: GCP GKE Cluster
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-gke-cluster-legacy-abac-disabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-gke-cluster-legacy-abac-disabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-gke-cluster-legacy-abac-disabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that legacy Attribute-Based Access Control (ABAC) is disabled on GKE clusters. ABAC is a coarse-grained authorization mechanism that predates Role-Based Access Control (RBAC); GKE clusters still have it available but Google recommends it remain off, as RBAC provides the fine-grained, auditable access control that modern clusters require.

        **Why this matters**

        - **Coarse permissions:** ABAC policies cannot express the resource-level granularity that RBAC provides, making least-privilege enforcement impossible.
        - **Unintended access:** With ABAC active, authenticated users may gain broader cluster access than intended through attribute matches that were never anticipated.
        - **Weak audit trail:** RBAC decisions are logged with structured context; ABAC authorization events are harder to correlate during incident investigations.
        - **Benchmark non-compliance:** The CIS GKE Benchmark explicitly requires ABAC to be disabled, and most regulatory frameworks expect RBAC as the cluster authorization model.

        **Risk mitigation**

        - **Disable at creation time:** Set `enable_legacy_abac = false` in cluster configuration so ABAC is never active on new clusters.
        - **Remediate existing clusters:** For clusters where ABAC is currently on, update the cluster with `--no-enable-legacy-authorization` and review RBAC role bindings to ensure proper access is preserved.
        - **Audit role bindings:** After disabling ABAC, verify that all required workload and user access is correctly expressed through RBAC ClusterRoles and RoleBindings.
      audit: |
        ### Audit via Console

        1. Sign in to the [Google Cloud Console](https://console.cloud.google.com).
        2. Navigate to **Kubernetes Engine** > **Clusters**.
        3. Select a cluster and click the **Details** tab.
        4. Under the **Security** section, check the value of **Legacy authorization**.

        A passing cluster shows **Legacy authorization: Disabled**. A failing cluster shows **Legacy authorization: Enabled**.

        ### Audit via CLI

        1. Describe the cluster and inspect the legacy ABAC setting:

        ```bash
        gcloud container clusters describe CLUSTER_NAME \
          --zone ZONE \
          --format="value(legacyAbac.enabled)"
        ```

        A passing cluster returns no output or `False`. A failing cluster returns `True`.
      remediation:
        - id: terraform
          desc: |
            To ensure legacy authorization (ABAC) is disabled on GKE clusters in Terraform, disable legacy ABAC in your GKE cluster configuration:

            ```hcl
            resource "google_container_cluster" "example" {
              name     = "example-cluster"
              location = "us-central1"

              # Disable legacy ABAC
              enable_legacy_abac = false
            }
            ```
        - id: console
          desc: |
            To ensure legacy authorization (ABAC) is disabled on GKE clusters using the Google Cloud Console:

            1. In the Google Cloud console, go to the **Kubernetes Engine > Clusters** page.
            2. Select the cluster you want to configure.
            3. Select **Edit**.
            4. In the **Security** section, ensure **Legacy authorization** is disabled.
            5. Select **Save**.
        - id: cli
          desc: |
            To ensure legacy authorization (ABAC) is disabled on GKE clusters using the Google Cloud CLI:

            ```bash
            gcloud container clusters update CLUSTER_NAME --zone ZONE --no-enable-legacy-authorization
            ```
    refs:
      - url: https://cloud.google.com/kubernetes-engine/docs/concepts/security-overview
        title: GKE Security Overview
