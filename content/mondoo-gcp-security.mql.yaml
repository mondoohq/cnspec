      gcp.project.cloudRunService.service.template.serviceAccountEmail != ""
      gcp.project.cloudRunService.service.template.serviceAccountEmail != /^\d+-compute@developer\.gserviceaccount\.com$/
      gcp.project.cloudRunService.service.template.serviceAccountEmail != /^[a-z0-9\-]+@appspot\.gserviceaccount\.com$/
  - uid: mondoo-gcp-security-cloud-run-no-default-service-account-terraform-hcl
