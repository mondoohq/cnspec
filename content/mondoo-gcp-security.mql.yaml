  # No runtime variant: the cnquery gcp provider does not expose per-handler app.yaml configuration on App Engine standard versions. Revisit if gcp.project.appEngineService.version gains a handlers field.
  - uid: mondoo-gcp-security-appengine-handler-secure-always
    title: Ensure App Engine standard version handlers require HTTPS
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    variants:
      - uid: mondoo-gcp-security-appengine-handler-secure-always-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-appengine-handler-secure-always-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-appengine-handler-secure-always-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that every URL handler on a `google_app_engine_standard_app_version` is configured with `security_level = "SECURE_ALWAYS"` so that App Engine refuses plain HTTP requests and requires TLS for all traffic. By default, App Engine standard handlers use `SECURE_DEFAULT` or `SECURE_OPTIONAL`, both of which accept HTTP alongside HTTPS.

        **Why this matters**

        - **Default handler settings permit plaintext HTTP:** `SECURE_OPTIONAL` and `SECURE_DEFAULT` allow clients that initiate HTTP connections to complete their session over HTTP with no redirect to HTTPS, leaving credentials, session cookies, and request bodies unprotected in transit.
        - **`SECURE_ALWAYS` is the only guarantee:** It is the only handler setting that actively refuses HTTP connections and forces clients onto TLS; all other settings leave at least some code path that serves unencrypted traffic.
        - **Session cookies and auth tokens are intercepted over HTTP:** Any application that uses cookie-based authentication is vulnerable to session hijacking when handlers permit HTTP, because the cookie travels in the clear on the initial request.
        - **App Engine versions are immutable:** Handler `security_level` is set at deployment time in `app.yaml` and cannot be changed in place; a failing version must be redeployed, making correct initial configuration especially important.

        **Risk mitigation**

        - **Set `security_level = "SECURE_ALWAYS"` on every handler block:** Apply this setting to every `handlers` block in every `google_app_engine_standard_app_version` resource before the version is deployed.
        - **Redeploy versions with corrected handlers:** Because App Engine standard versions are immutable, update `app.yaml` with `secure: always` on all handler entries and deploy a new version, then migrate traffic to the corrected version.
        - **Pair with ingress controls:** Combine handler-level HTTPS enforcement with the `appengine-iap-or-vpc-only-ingress` control so that workloads restrict both the transport protocol and the network origins that can reach the HTTPS endpoint.
      audit: |
        ### Audit via Console

        1. In the Google Cloud Console, go to **App Engine** > **Versions**.
        2. Select a version to view its details.
        3. Review the deployed `app.yaml` configuration, accessible via **View** in the version details, and look at each handler's `secure` setting.

        A passing version shows `secure: always` on every URL handler. A failing version shows `secure: optional`, `secure: never`, `secure: default`, or no `secure` field on one or more handlers.

        ### Audit via CLI

        1. List all App Engine versions for each service and retrieve the handler configuration:

        ```bash
        gcloud app versions describe VERSION_ID \
          --service=SERVICE_NAME \
          --format="yaml(handlers)"
        ```

        A passing version returns every handler block with `securityLevel: SECURE_ALWAYS`. A failing version returns one or more handler blocks with `securityLevel` set to `SECURE_NEVER`, `SECURE_OPTIONAL`, `SECURE_DEFAULT`, or with no `securityLevel` field present.
      remediation:
        - id: terraform
          desc: |
            Require HTTPS on every App Engine standard handler:

            ```hcl
            resource "google_app_engine_standard_app_version" "default" {
              version_id = "v1"
              service    = "default"
              runtime    = "python39"

              entrypoint {
                shell = "gunicorn -b :$PORT main:app"
              }

              deployment {
                zip {
                  source_url = "https://storage.googleapis.com/${var.bucket}/${var.object}"
                }
              }

              handlers {
                url_regex      = ".*"
                security_level = "SECURE_ALWAYS"

                script {
                  script_path = "auto"
                }
              }
            }
            ```

            App Engine versions are immutable; deploy a new version with corrected handlers and migrate traffic to it rather than trying to update handlers on an existing version.
        - id: console
          desc: |
            App Engine standard handler `security_level` is set in `app.yaml` at deploy time and cannot be edited from the Google Cloud Console:

            1. Edit `app.yaml` for the service and set `secure: always` on every handler.
            2. Redeploy the service with `gcloud app deploy` (see the CLI remediation).
            3. In the Google Cloud Console, go to **App Engine** > **Versions** and migrate traffic to the new version.
            4. Stop or delete the old, insecure version once traffic has shifted.
        - id: cli
          desc: |
            Add `secure: always` to every handler in `app.yaml` and redeploy:

            ```yaml
            runtime: python39

            handlers:
              - url: /.*
                secure: always
                script: auto
            ```

            ```bash
            gcloud app deploy app.yaml
            gcloud app services set-traffic SERVICE_NAME --splits=NEW_VERSION=1
            ```
    refs:
      - url: https://cloud.google.com/appengine/docs/standard/reference/app-yaml
        title: App Engine - app.yaml reference
      - url: https://registry.terraform.io/providers/hashicorp/google/latest/docs/resources/app_engine_standard_app_version
        title: Terraform - google_app_engine_standard_app_version
