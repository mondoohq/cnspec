  # No runtime variant: the cnquery gcp provider does not expose Cloud Composer (google_composer_environment) resources.
  - uid: mondoo-gcp-security-composer-environment-cmek-encryption
    title: Ensure Cloud Composer environments are encrypted with CMEK
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-gcp-security-composer-environment-cmek-encryption-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-composer-environment-cmek-encryption-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-composer-environment-cmek-encryption-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Cloud Composer environments are encrypted with a customer-managed encryption key (CMEK). The environment-level CMEK key propagates to the Composer-managed Cloud Storage bucket, the GKE persistent disks, and the Cloud SQL database that back the Airflow control plane and DAG state, giving organizations a single revocation lever over all of that data.

        **Why this matters**

        - **Composer stores sensitive orchestration data:** DAG files, Airflow Variables, and connection strings stored in Composer often contain credentials, service account keys, and database connection URIs that are valuable to attackers.
        - **Google-managed keys cannot be independently revoked:** Without CMEK, the bucket, disks, and database are encrypted with Google-managed keys that remain in effect regardless of changes to the organization's security posture.
        - **CMEK provides coordinated revocation:** Disabling or destroying the Cloud KMS key blocks decryption across the bucket, GKE disks, and Cloud SQL instance simultaneously, enabling a rapid and complete response to a key-compromise event.
        - **CMEK must be set at environment creation:** The encryption configuration cannot be changed on an existing Composer environment; it must be specified before deployment to avoid requiring a full environment recreation.

        **Risk mitigation**

        - **Set the CMEK key at environment creation:** Configure `config.encryption_config.kms_key_name` on every `google_composer_environment` to a Cloud KMS key in the same region as the environment.
        - **Grant the required service-agent roles:** The Composer, Storage, Compute Engine, and Cloud SQL service agents each need `roles/cloudkms.cryptoKeyEncrypterDecrypter` on the key before the environment can be created.
        - **Restrict key access with IAM:** Limit who can use, modify, or destroy the Cloud KMS key to authorized administrators and the Composer service agents, preventing unauthorized key operations.
      audit: |
        ### Audit via Console

        1. In the Google Cloud Console, go to **Composer > Environments**.
        2. For each environment, select the environment name to open its detail page.
        3. Under the **Environment configuration** or **Encryption** section, verify that a **Customer-managed encryption key (CMEK)** is configured.

        A passing Composer environment shows a Cloud KMS key name under its encryption configuration. A failing environment shows **Google-managed key** or no encryption key listed.

        ### Audit via CLI

        1. List all Composer environments:

        ```bash
        gcloud composer environments list \
          --locations=REGION \
          --format='table(name,location,state)'
        ```

        2. For each environment, describe it to inspect the encryption config:

        ```bash
        gcloud composer environments describe ENV_NAME \
          --location=REGION \
          --format='value(config.encryptionConfig.kmsKeyName)'
        ```

        A passing environment returns a non-empty Cloud KMS key resource name. A failing environment returns an empty value, indicating it relies on Google-managed encryption.
      remediation:
        - id: terraform
          desc: |
            To require CMEK on a Cloud Composer environment in Terraform, set `config.encryption_config.kms_key_name`:

            ```hcl
            resource "google_composer_environment" "default" {
              name   = "composer-cmek"
              region = "us-central1"

              config {
                software_config {
                  image_version = "composer-2-airflow-2"
                }

                encryption_config {
                  kms_key_name = google_kms_crypto_key.composer.id
                }
              }
            }
            ```
        - id: console
          desc: |
            To require CMEK on a Cloud Composer environment using the Google Cloud Console:

            1. In the Google Cloud Console, go to **Composer** > **Environments**.
            2. Select **Create environment** (CMEK is set at creation time).
            3. Under **Encryption**, select **Customer-managed encryption key (CMEK)** and pick the Cloud KMS key.
            4. Complete environment creation.
        - id: cli
          desc: |
            To create a Cloud Composer environment with CMEK using the Google Cloud CLI:

            ```bash
            gcloud composer environments create ENV_NAME \
              --location=REGION \
              --image-version=composer-2-airflow-2 \
              --kms-key=projects/PROJECT/locations/REGION/keyRings/RING/cryptoKeys/KEY
            ```
    refs:
      - url: https://cloud.google.com/composer/docs/composer-2/configure-cmek-encryption
        title: Configure CMEK encryption for Cloud Composer
  - uid: mondoo-gcp-security-composer-environment-cmek-encryption-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_composer_environment')
    mql: |
      terraform.resources('google_composer_environment').all(
        blocks.where(type == 'config') != empty &&
        blocks.where(type == 'config').all(
          blocks.where(type == 'encryption_config') != empty &&
          blocks.where(type == 'encryption_config').all(arguments.kms_key_name != empty)
        )
      )
