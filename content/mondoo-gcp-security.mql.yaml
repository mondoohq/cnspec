      - uid: mondoo-gcp-security-audit-logging-enabled-all-services-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that the GCP project is configured with a default audit logging policy covering all services, with at least ADMIN_READ log type enabled. Without an `allServices` audit configuration, newly enabled GCP services will not generate audit logs by default, creating blind spots in activity monitoring.

        **Why this matters**

        - **Default logging gap:** An `allServices` audit config is the only way to ensure that newly enabled APIs and services automatically generate audit logs without requiring per-service configuration changes.
        - **Incident detection:** Admin activity logs capture IAM policy changes, resource creation and deletion, and configuration modifications; these are the events most commonly associated with unauthorized access and lateral movement.
        - **Forensic completeness:** During incident response, gaps in audit logging for specific services can prevent investigators from reconstructing the attacker's actions or determining the full scope of compromise.
        - **Compliance coverage:** Comprehensive, continuous audit logging is a baseline requirement across major security frameworks for cloud environments handling sensitive data.

        **Risk mitigation**

        - **Configure allServices at the project level:** Add a `google_project_iam_audit_config` resource with `service = "allServices"` and enable at minimum ADMIN_READ, DATA_READ, and DATA_WRITE log types.
        - **Centralize log export:** Export audit logs to a dedicated Cloud Storage bucket or BigQuery dataset in a separate project to prevent log tampering by compromised project-level identities.
        - **Alert on log configuration changes:** Create a log-based metric and alert for modifications to the project IAM audit configuration so that any attempt to disable audit logging is immediately detected.
      audit: |
        ### Audit via Console

        1. Go to the **IAM & Admin > Audit Logs** page in the Google Cloud Console.
        2. In the **Default Audit Config** section at the top of the page, verify that audit logging is configured for **All Services**.
        3. Confirm that **Admin Read** is enabled at a minimum.

        A passing project shows an audit configuration for **All Services** with at least **Admin Read** enabled. A failing project shows no default audit config, or has the `allServices` entry missing.

        ### Audit via CLI

        1. Retrieve the project IAM policy and inspect the `auditConfigs` section:

        ```bash
        gcloud projects get-iam-policy PROJECT_ID \
          --format="json(auditConfigs)"
        ```

        A passing project returns an `auditConfigs` entry with `service: allServices` that includes at least `logType: ADMIN_READ`. A failing project returns an empty `auditConfigs` array or an entry missing the `allServices` service.
      remediation:
        - id: terraform
          desc: |
            To ensure audit logging is enabled for all services in Terraform:

            ```hcl
            resource "google_project_iam_audit_config" "all_services" {
              project = "my-project"
              service = "allServices"

              audit_log_config {
                log_type = "ADMIN_READ"
              }

              audit_log_config {
                log_type = "DATA_READ"
              }

              audit_log_config {
                log_type = "DATA_WRITE"
              }
            }
            ```
        - id: console
          desc: |
            To ensure audit logging is enabled for all services using the Google Cloud Console:

            1. Go to the **IAM & Admin > Audit Logs** page.
            2. In the **Default Audit Config** section at the top, ensure that **Admin Read**, **Data Read**, and **Data Write** are enabled for all services.
            3. Select **Save**.
        - id: cli
          desc: |
            To ensure audit logging is enabled for all services using the Google Cloud CLI, get the current IAM policy:

            ```bash
            gcloud projects get-iam-policy PROJECT_ID --format=json > policy.json
            ```

            Add the audit config to the policy JSON:

            ```json
            {
              "auditConfigs": [
                {
                  "service": "allServices",
                  "auditLogConfigs": [
                    { "logType": "ADMIN_READ" },
                    { "logType": "DATA_READ" },
                    { "logType": "DATA_WRITE" }
                  ]
                }
              ]
            }
            ```

            Apply the updated policy:

            ```bash
            gcloud projects set-iam-policy PROJECT_ID policy.json
            ```
    refs:
      - url: https://cloud.google.com/logging/docs/audit
        title: Cloud Audit Logs overview
      - url: https://cloud.google.com/logging/docs/audit/configure-data-access
        title: Configure Data Access audit logs
  - uid: mondoo-gcp-security-audit-logging-enabled-all-services-gcp
    filters: asset.platform == 'gcp'
    mql: |
      gcp.project.auditConfig.where(service == "allServices").length > 0
      gcp.project.auditConfig.where(service == "allServices").all(
        auditLogConfigs.where(logType == "ADMIN_READ").length > 0
      )
  - uid: mondoo-gcp-security-audit-logging-enabled-all-services-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_project_iam_audit_config')
    mql: |
      terraform.resources('google_project_iam_audit_config').where(arguments.service == "allServices").length > 0
  - uid: mondoo-gcp-security-audit-logging-enabled-all-services-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_project_iam_audit_config')
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_project_iam_audit_config').where(
        change.after['service'] == "allServices"
      ).length > 0
  - uid: mondoo-gcp-security-audit-logging-enabled-all-services-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'google_project_iam_audit_config')
    mql: |
      terraform.state.resources.where(type == 'google_project_iam_audit_config').where(
        values['service'] == "allServices"
      ).length > 0
  - uid: mondoo-gcp-security-org-policy-vm-external-ip-restricted
    title: Ensure VM external IP access is restricted via organization policy
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-gcp-security-org-policy-vm-external-ip-restricted-gcp
        tags:
          mondoo.com/filter-title: GCP Project
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-org-policy-vm-external-ip-restricted-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-org-policy-vm-external-ip-restricted-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-org-policy-vm-external-ip-restricted-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that the `constraints/compute.vmExternalIpAccess` organization policy is configured at the project level to restrict which Compute Engine instances are permitted to have external IP addresses. Without this constraint, any identity with compute permissions can create internet-facing VMs, expanding the project's attack surface without requiring explicit approval.

        **Why this matters**

        - **Preventive network control:** The organization policy enforces the restriction at resource creation time rather than detecting violations after VMs are already internet-exposed, closing the gap that detective-only controls leave open.
        - **Unrestricted internet exposure:** VMs with external IPs are directly reachable from the entire internet and are continuously targeted by automated scanners for vulnerability exploitation and credential brute force.
        - **Privilege escalation path:** A compromised project IAM binding that includes compute permissions could be used to spin up an internet-facing VM as a pivot point, bypassing network-level perimeter controls.
        - **Complements instance-level checks:** Organization policy enforcement acts as a preventive guardrail that supplements instance-level network interface checks, ensuring the control operates before resources are created.

        **Risk mitigation**

        - **Enforce deny-all or an explicit allowlist:** Set the policy to `DENY` all values, or provide an explicit `allowedValues` list of specific VM instances that are authorized to have external IPs, and review the list regularly.
        - **Route egress through Cloud NAT:** Migrate workloads that need internet access to use Cloud NAT for outbound connectivity without requiring a public IP on the VM itself.
        - **Apply at the folder or organization level:** For maximum coverage, enforce the policy at the folder or organization node rather than per-project so it applies to all current and future projects automatically.
      audit: |
        ### Audit via Console

        1. Go to the **IAM & Admin > Organization Policies** page in the Google Cloud Console.
        2. Search for the policy **Define allowed external IPs for VM instances** (`compute.vmExternalIpAccess`).
        3. Select the policy and review its enforcement status and rules.

        A passing project shows the `compute.vmExternalIpAccess` constraint configured with **Deny All** or an explicit allow list. A failing project shows the policy as **Not configured** or set to allow all values.

        ### Audit via CLI

        1. Describe the `compute.vmExternalIpAccess` organization policy for the project:

        ```bash
        gcloud resource-manager org-policies describe compute.vmExternalIpAccess \
          --project=PROJECT_ID
        ```

        A passing project returns a policy with `listPolicy.allValues: DENY` or a non-empty `listPolicy.allowedValues` list. A failing project returns `NOT_FOUND` or a policy with no restriction configured.
      remediation:
        - id: terraform
          desc: |
            To ensure VM external IP access is restricted via organization policy in Terraform:

            ```hcl
            resource "google_org_policy_policy" "vm_external_ip" {
              name   = "projects/PROJECT_ID/policies/compute.vmExternalIpAccess"
              parent = "projects/PROJECT_ID"

              spec {
                rules {
                  deny_all = "TRUE"
                }
              }
            }
            ```

            To allow specific VMs, use an allow list:

            ```hcl
            resource "google_org_policy_policy" "vm_external_ip" {
              name   = "projects/PROJECT_ID/policies/compute.vmExternalIpAccess"
              parent = "projects/PROJECT_ID"

              spec {
                rules {
                  values {
                    allowed_values = ["projects/PROJECT_ID/zones/ZONE/instances/INSTANCE_NAME"]
                  }
                }
              }
            }
            ```
        - id: console
          desc: |
            To ensure VM external IP access is restricted via organization policy using the Google Cloud Console:

            1. Go to the **IAM & Admin > Organization Policies** page.
            2. Search for **Define allowed external IPs for VM instances** (`compute.vmExternalIpAccess`).
            3. Click the policy and select **Manage Policy**.
            4. Set the policy to **Deny All** or configure an allow list of specific VM instances.
            5. Select **Set Policy**.
        - id: cli
          desc: |
            To ensure VM external IP access is restricted via organization policy using the Google Cloud CLI, create a policy file (`policy.yaml`) that denies all values:

            ```yaml
            constraint: constraints/compute.vmExternalIpAccess
            listPolicy:
              allValues: DENY
            ```

            Then apply it:

            ```bash
            gcloud resource-manager org-policies set-policy policy.yaml \
              --project=PROJECT_ID
            ```
    refs:
      - url: https://cloud.google.com/compute/docs/ip-addresses/reserve-static-external-ip-address
        title: External IP addresses
      - url: https://cloud.google.com/resource-manager/docs/organization-policy/org-policy-constraints
        title: Organization policy constraints
  - uid: mondoo-gcp-security-org-policy-vm-external-ip-restricted-gcp
    filters: asset.platform == 'gcp'
    mql: |
      gcp.project.orgPolicies.where(constraintName == "constraints/compute.vmExternalIpAccess").length > 0
  - uid: mondoo-gcp-security-org-policy-vm-external-ip-restricted-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_org_policy_policy')
    mql: |
      terraform.resources('google_org_policy_policy').where(
        arguments.name.contains("compute.vmExternalIpAccess")
      ).length > 0
  - uid: mondoo-gcp-security-org-policy-vm-external-ip-restricted-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_org_policy_policy')
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_org_policy_policy').where(
        change.after['name'] != empty && change.after['name'].contains("compute.vmExternalIpAccess")
      ).length > 0
  - uid: mondoo-gcp-security-org-policy-vm-external-ip-restricted-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'google_org_policy_policy')
    mql: |
      terraform.state.resources.where(type == 'google_org_policy_policy').where(
        values['name'] != empty && values['name'].contains("compute.vmExternalIpAccess")
      ).length > 0
  - uid: mondoo-gcp-security-org-policy-serial-port-disabled
    title: Ensure serial port access is disabled via organization policy
    impact: 70
