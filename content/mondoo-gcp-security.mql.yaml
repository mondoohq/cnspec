  - uid: mondoo-gcp-security-filestore-instance-cmek-encryption
    title: Ensure Filestore instances are encrypted with CMEK
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-gcp-security-filestore-instance-cmek-encryption-gcp
        tags:
          mondoo.com/filter-title: GCP Filestore Instance
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-filestore-instance-cmek-encryption-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-filestore-instance-cmek-encryption-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-filestore-instance-cmek-encryption-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that every Filestore instance is encrypted with a customer-managed encryption key (CMEK). By default, Filestore instances use Google-managed encryption keys, which do not provide tenant-scoped key control, independent revocation, or cryptographic audit trails under the organization's own Cloud KMS project.

        **Why this matters**

        - **Key revocation capability:** CMEK lets an organization immediately disable Filestore's ability to decrypt stored data by disabling or destroying the Cloud KMS key, providing a last-resort data protection mechanism that Google-managed keys cannot offer.
        - **Sensitive file share data:** Filestore shares frequently hold home directories, application working sets, and cross-pod state for GKE and Compute Engine workloads, all of which may contain regulated or confidential data that requires customer-controlled encryption.
        - **Per-operation audit trail:** Every Cloud KMS wrap and unwrap operation against a CMEK key is recorded in Cloud Audit Logs for the KMS project, providing a cryptographic access trail separate from Filestore's own data access logs.
        - **Regulatory alignment:** Frameworks that mandate customer-controlled encryption keys for stored data require CMEK or an equivalent mechanism; Google-managed keys do not satisfy those controls.

        **Risk mitigation**

        - **Create new instances with CMEK from the start:** Specify `kms_key_name` at instance creation since existing Filestore instances cannot be re-encrypted in place; plan migration to CMEK-protected instances during scheduled maintenance.
        - **Scope key access tightly:** Grant `roles/cloudkms.cryptoKeyEncrypterDecrypter` only to the Filestore service agent on the encryption key, and monitor Cloud KMS audit logs for unexpected access patterns.
      audit: |
        ### Audit via Console

        1. Go to **Filestore > Instances** in the Google Cloud Console.
        2. For each instance, select the instance to open its detail page.
        3. Under the **Details** section, locate the **Encryption** field and check whether it shows a customer-managed encryption key (CMEK).

        A passing instance shows **Encryption: Customer-managed key** with a Cloud KMS key name. A failing instance shows **Encryption: Google-managed key** or no encryption key is listed.

        ### Audit via CLI

        1. List all Filestore instances:

        ```bash
        gcloud filestore instances list \
          --format='table(name,location,tier)'
        ```

        2. For each instance, describe it to inspect the KMS key name:

        ```bash
        gcloud filestore instances describe INSTANCE_NAME \
          --location=LOCATION \
          --format='value(kmsKeyName)'
        ```

        A passing instance returns a non-empty Cloud KMS key resource name. A failing instance returns an empty value, indicating Google-managed encryption.
      remediation:
        - id: terraform
          desc: |
            Configure `kms_key_name` on `google_filestore_instance` and grant the Filestore service agent `roles/cloudkms.cryptoKeyEncrypterDecrypter` on the key:

            ```hcl
            resource "google_filestore_instance" "secure" {
              name     = "secure-share"
              location = "us-central1"
              tier     = "ENTERPRISE"

              file_shares {
                name        = "share1"
                capacity_gb = 1024
              }

              networks {
                network = "default"
                modes   = ["MODE_IPV4"]
              }

              kms_key_name = google_kms_crypto_key.filestore.id
            }
            ```
        - id: console
          desc: |
            Create a CMEK-protected Filestore instance:

            1. Go to **Filestore > Instances** in the Google Cloud Console.
            2. Select **Create Instance**.
            3. Under **Encryption**, choose **Customer-managed encryption key (CMEK)**.
            4. Select an existing key in the same region or create a new key.
            5. Complete the instance configuration and select **Create**.

            Existing Filestore instances cannot be re-encrypted in place. Migrate file share contents to a new CMEK-protected instance, then delete the unprotected instance.
        - id: cli
          desc: |
            Create a CMEK-protected Filestore instance:

            ```bash
            gcloud filestore instances create INSTANCE_NAME \
              --tier=ENTERPRISE \
              --location=LOCATION \
              --file-share=name=share1,capacity=1TB \
              --network=name=NETWORK \
              --kms-key=projects/KMS_PROJECT/locations/LOCATION/keyRings/KEYRING/cryptoKeys/KEY
            ```
    refs:
      - url: https://cloud.google.com/filestore/docs/cmek
        title: Filestore - Customer-managed encryption keys
  - uid: mondoo-gcp-security-filestore-instance-cmek-encryption-gcp
    filters: asset.platform == 'gcp'
    mql: |
      gcp.project.filestoreService.instances.all(
        kmsKeyName != ""
      )
  - uid: mondoo-gcp-security-filestore-instance-cmek-encryption-terraform-hcl
    filters: |
