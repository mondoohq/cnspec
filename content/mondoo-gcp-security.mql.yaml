      - uid: mondoo-gcp-security-gke-cluster-alpha-disabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-gke-cluster-alpha-disabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-gke-cluster-alpha-disabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Kubernetes alpha features are not enabled on GKE clusters. Alpha clusters expose experimental Kubernetes APIs and features that are not covered by the GKE SLA, cannot be upgraded to newer Kubernetes versions, and are automatically deleted after 30 days, making them unsuitable for any workload that requires security patching or operational continuity.

        **Why this matters**

        - **Unpatched vulnerabilities:** Alpha features are experimental and may contain bugs or security vulnerabilities that will never receive backported fixes, since alpha clusters cannot be upgraded.
        - **No security update path:** The inability to upgrade alpha clusters means known CVEs in the Kubernetes control plane or node components cannot be remediated by version upgrade.
        - **Automatic deletion risk:** Alpha clusters expire and are deleted after 30 days, causing unplanned outages for any workloads that were placed on them inadvertently.
        - **Weaker security controls:** Experimental APIs in alpha clusters may not have the same access controls, validation webhooks, or audit logging as stable Kubernetes APIs.

        **Risk mitigation**

        - **Never enable in production:** Ensure `enable_kubernetes_alpha` is absent or explicitly `false` in all cluster definitions that host production or long-lived workloads.
        - **Migrate existing alpha clusters:** Create replacement clusters without alpha features, migrate workloads, and decommission the alpha cluster before it is automatically deleted.
        - **Use static channels instead:** For early access to new Kubernetes features, use the Rapid release channel, which provides validated pre-release versions with full upgrade and SLA support.
      audit: |
        ### Audit via Console

        1. Sign in to the [Google Cloud Console](https://console.cloud.google.com).
        2. Navigate to **Kubernetes Engine** > **Clusters**.
        3. For each cluster, check whether the cluster name or labels indicate it is an alpha cluster. Alpha clusters are identified by an **Alpha** badge in the cluster list.
        4. Alternatively, select the cluster and review the **Details** tab for any indication of alpha features.

        A passing cluster shows no alpha cluster indicator. A failing cluster displays an **Alpha** badge or label indicating alpha features are enabled.

        ### Audit via CLI

        1. Describe the cluster and check for the Kubernetes alpha setting:

        ```bash
        gcloud container clusters describe CLUSTER_NAME \
          --zone ZONE \
          --format="value(enableKubernetesAlpha)"
        ```

        A passing cluster returns `False` or no output. A failing cluster returns `True`.
      remediation:
        - id: terraform
          desc: |
            To ensure Kubernetes alpha features are disabled on GKE clusters in Terraform, ensure alpha features are not enabled in your GKE cluster configuration:

            ```hcl
            resource "google_container_cluster" "example" {
              name     = "example-cluster"
              location = "us-central1"

              # Do not set enable_kubernetes_alpha = true
            }
            ```

            Note: Alpha features cannot be disabled on an existing cluster. You must create a new cluster without alpha features and migrate your workloads.
        - id: console
          desc: |
            To ensure Kubernetes alpha features are disabled on GKE clusters using the Google Cloud Console, alpha features cannot be disabled on an existing cluster. To remediate:

            1. Create a new GKE cluster without alpha features enabled.
            2. Migrate your workloads to the new cluster.
            3. Delete the alpha cluster.
        - id: cli
          desc: |
            To ensure Kubernetes alpha features are disabled on GKE clusters using the Google Cloud CLI, alpha features cannot be disabled on an existing cluster. Create a new cluster without the `--enable-kubernetes-alpha` flag:

            ```bash
            gcloud container clusters create CLUSTER_NAME --zone ZONE
            ```
    refs:
      - url: https://cloud.google.com/kubernetes-engine/docs/concepts/security-overview
        title: GKE Security Overview
  - uid: mondoo-gcp-security-gke-cluster-alpha-disabled-gcp
    filters: asset.platform == "gcp-gke-cluster"
    mql: gcp.project.gkeService.cluster.enableKubernetesAlpha == false
  - uid: mondoo-gcp-security-gke-cluster-alpha-disabled-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' &&
        terraform.resources.contains(nameLabel == 'google_container_cluster')
    mql: |
