    mql: |
      terraform.plan.resourceChanges.where(
        type == 'google_compute_firewall' &&
        change.after['direction'] == "EGRESS" &&
        change.after['destination_ranges'] != empty &&
        change.after['destination_ranges'].any(_ == "0.0.0.0/0" || _ == "::/0")
      ).all(
        change.after['allow'].none(_['protocol'] == "all") &&
        change.after['allow'].all(_['ports'] != empty && _['ports'].length > 0)
      )
  - uid: mondoo-gcp-security-firewall-no-egress-all-ports-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'google_compute_firewall')
    mql: |
      terraform.state.resources.where(
        type == 'google_compute_firewall' &&
        values['direction'] == "EGRESS" &&
        values['destination_ranges'] != empty &&
        values['destination_ranges'].any(_ == "0.0.0.0/0" || _ == "::/0")
      ).all(
        values['allow'].none(_['protocol'] == "all") &&
        values['allow'].all(_['ports'] != empty && _['ports'].length > 0)
      )
  - uid: mondoo-gcp-security-gke-legacy-metadata-disabled
    title: Ensure legacy metadata endpoints are disabled on GKE nodes
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-04
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-1
      compliance/nist-csf-2: nist-csf-2-pr-ps-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-2
      compliance/pci-dss-4: pcidss-requirement-2-2-1
      compliance/soc2-2017: soc2-control-cc7-1-1
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-gcp-security-gke-legacy-metadata-disabled-gcp
        tags:
          mondoo.com/filter-title: GCP GKE Cluster
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-gke-legacy-metadata-disabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-gke-legacy-metadata-disabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-gke-legacy-metadata-disabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that the legacy instance metadata API endpoints (v0.1 and v1beta1) are disabled on all GKE node pools. The legacy endpoints do not enforce metadata concealment, allowing any pod on the node to query the node service account token and escalate privileges.

        **Why this matters**

        - **Credential theft:** Any pod running on a node can call the legacy metadata endpoint to retrieve the node's service account token and use it to access GCP APIs with node-level permissions.
        - **No metadata concealment:** The v1 metadata endpoint supports GKE's metadata concealment feature; the legacy endpoints do not, making concealment controls ineffective when they are enabled.
        - **Container escape path:** An attacker who compromises a container can use the metadata service as a pivot to obtain credentials and move laterally within the project.

        **Risk mitigation**

        - **Disable at node pool creation:** Set `disable-legacy-endpoints=true` in node pool metadata when creating node pools, as this setting cannot be changed on existing pools.
        - **Workload Identity:** Pair legacy endpoint disablement with Workload Identity so pods use their own service accounts rather than the node account for GCP API access.
      audit: |
        ### Audit via Console

        1. Go to the **Kubernetes Engine > Clusters** page in the Google Cloud Console.
        2. Click the cluster name to open its details.
        3. Select the **Nodes** tab.
        4. Click each node pool name to view its configuration.
        5. Under **Node configuration**, review the **Metadata** section and check whether `disable-legacy-endpoints` is set to `true`.

        A passing node pool shows `disable-legacy-endpoints=true` in its metadata configuration. A failing node pool does not have this metadata key set or has it set to `false`.

        ### Audit via CLI

        1. List all GKE clusters:

        ```bash
        gcloud container clusters list --format="table(name,location)"
        ```

        2. For each cluster, describe its node pools and check the metadata for `disable-legacy-endpoints`:

        ```bash
        gcloud container node-pools describe NODE_POOL_NAME \
          --cluster=CLUSTER_NAME \
          --location=LOCATION \
          --format="value(config.metadata)"
        ```

        A passing node pool returns a metadata map containing `disable-legacy-endpoints: 'true'`. A failing node pool returns a map where that key is absent or set to `false`.
      remediation:
        - id: console
          desc: |
            To ensure legacy metadata endpoints are disabled on GKE nodes using the Google Cloud Console, the legacy metadata endpoint setting cannot be directly edited via the GCP Console. Use the gcloud CLI or Terraform to configure this setting on node pools.
        - id: cli
          desc: |
            To ensure legacy metadata endpoints are disabled on GKE nodes using the gcloud CLI, create a node pool with legacy endpoints disabled (this setting cannot be changed on existing node pools):

            ```bash
            gcloud container node-pools create <pool-name> \
              --cluster=<cluster-name> \
              --metadata disable-legacy-endpoints=true
            ```
        - id: terraform
          desc: |
            To ensure legacy metadata endpoints are disabled on GKE nodes in Terraform, disable legacy metadata endpoints in the node config:

            ```hcl
            resource "google_container_cluster" "example" {
              name     = "example-cluster"
              location = "us-central1"

              node_config {
                metadata = {
                  disable-legacy-endpoints = "true"
                }
              }
            }
            ```
    refs:
      - url: https://cloud.google.com/kubernetes-engine/docs/how-to/protecting-cluster-metadata
        title: Google Cloud Documentation - Protecting cluster metadata
  - uid: mondoo-gcp-security-gke-legacy-metadata-disabled-gcp
    filters: asset.platform == 'gcp-gke-cluster'
    mql: |
      gcp.project.gkeService.cluster.nodePools.all(
        config.metadata["disable-legacy-endpoints"] == "true"
