  - uid: mondoo-gcp-security-cloud-sql-postgres-log-error-verbosity-default-verbose
    title: Ensure Cloud SQL PostgreSQL 'log_error_verbosity' is DEFAULT or verbose
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-pr-ps-04
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    variants:
      - uid: mondoo-gcp-security-cloud-sql-postgres-log-error-verbosity-default-verbose-gcp
        tags:
          mondoo.com/filter-title: GCP Cloud SQL for PostgreSQL
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-cloud-sql-postgres-log-error-verbosity-default-verbose-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-sql-postgres-log-error-verbosity-default-verbose-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-sql-postgres-log-error-verbosity-default-verbose-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Cloud SQL PostgreSQL instances are configured with the `log_error_verbosity` flag set to `default` or `verbose`. When set to `terse`, PostgreSQL omits SQL state codes and source-file context from error messages, leaving administrators with insufficient detail to diagnose security-relevant events and application errors. The `default` setting provides standard detail, and `verbose` adds source file, function name, and line number for maximum diagnostic context.

        **Why this matters**

        - **Incident investigation quality:** Detailed error messages allow security teams to correlate database errors with attack patterns and reconstruct attacker activity during a post-incident review.
        - **Troubleshooting efficiency:** Adequate verbosity reduces mean-time-to-resolution for application errors by preserving SQL state codes and error context that `terse` mode drops.
        - **Audit completeness:** Regulators and auditors often require that database error logs contain enough detail to reconstruct events; `terse` mode can result in an incomplete audit trail.

        **Risk mitigation**

        - **Anomaly detection support:** Sufficient log detail makes it easier to detect SQL injection attempts, authentication failures, and other suspicious patterns through log analysis or SIEM integration.
        - **Compliance gap prevention:** Setting verbosity to `default` or `verbose` satisfies logging-detail requirements found in common security frameworks without requiring additional tooling.
      audit: |
        **Using Google Cloud Console**

        1.  Navigate to the Cloud SQL Instances page: [https://console.cloud.google.com/sql/instances](https://console.cloud.google.com/sql/instances).
        2.  Select a PostgreSQL instance to view its details.
        3.  In the **Configuration** section, find the **Database flags** area.
        4.  Verify that the `log_error_verbosity` flag is listed and its value is set to `default` or `verbose`.

        **Using Google Cloud CLI**

        1.  List your Cloud SQL instances:
            ```bash
            gcloud sql instances list
            ```
        2.  For each PostgreSQL instance, check the flag's value:
            ```bash
            # This command shows the value, verify it's "default" or "verbose"
            gcloud sql instances describe INSTANCE_NAME --format=json | jq '.settings.databaseFlags[] | select(.name=="log_error_verbosity")|.value'
            ```
            Ensure the output for each PostgreSQL instance is `"default"` or `"verbose"`.
      remediation:
        - id: console
          desc: |
            To ensure Cloud SQL PostgreSQL 'log_error_verbosity' is DEFAULT or verbose using the Google Cloud Console:

            1.  Navigate to the Cloud SQL Instances page: [https://console.cloud.google.com/sql/instances](https://console.cloud.google.com/sql/instances).
            2.  Select the target PostgreSQL instance.
            3.  Select **Edit**.
            4.  Scroll down to the **Flags** section.
            5.  If the flag isn't present, select **Add item**.
            6.  Choose `log_error_verbosity` from the dropdown and set its value to `default` or `verbose`. If the flag exists but is set to `terse`, change its value.
            7.  Select **Save**. Review the **Flags** section on the instance overview page to confirm.
        - id: cli
          desc: |
            To ensure Cloud SQL PostgreSQL 'log_error_verbosity' is DEFAULT or verbose using the Google Cloud CLI, update the flag for a specific PostgreSQL instance (choose `default` or `verbose`):
            ```bash
            # Example using default
            gcloud sql instances patch INSTANCE_NAME --database-flags log_error_verbosity=default

            # Example using VERBOSE
            gcloud sql instances patch INSTANCE_NAME --database-flags log_error_verbosity=verbose
            ```
            *Note: This command overwrites all existing flags. To preserve other flags, you must include them in the `--database-flags` argument (e.g., `--database-flags log_error_verbosity=default,other_flag=value`).*
        - id: terraform
          desc: |
            To ensure Cloud SQL PostgreSQL 'log_error_verbosity' is DEFAULT or verbose in Terraform, ensure the `database_flags` block within your `google_sql_database_instance` resource includes the setting (choose `default` or `verbose`):
            ```hcl
            resource "google_sql_database_instance" "postgres_instance" {
              name             = "my-postgres-instance"
              database_version = "POSTGRES_15"
              region           = "us-central1"
              settings {
                tier = "db-f1-micro"
                database_flags {
                  name  = "log_error_verbosity"
                  # Choose either "default" or "verbose"
                  value = "default"
                }
                # Include other settings and flags as needed
              }
            }
            ```
    refs:
      - url: https://cloud.google.com/sql/docs/postgres/flags
        title: Configure database flags for Cloud SQL for PostgreSQL
