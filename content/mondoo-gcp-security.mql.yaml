      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: false
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ps-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: false
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc6-7-1
      compliance/vda-isa-5: false
    mql: |
      gcp.project.gkeService.cluster.notificationConfig == null ||
      gcp.project.gkeService.cluster.notificationConfig.pubsubEnabled == false ||
      gcp.project.gkeService.cluster.notificationConfig.topic == null ||
      gcp.project.gkeService.cluster.notificationConfig.topic.projectId == gcp.project.gkeService.cluster.projectId
    docs:
      desc: |
        This check ensures that, when GKE cluster notifications are enabled, the Pub/Sub topic receiving those notifications resides in the same GCP project as the cluster. A cross-project notification topic ships cluster events such as security bulletins, control-plane upgrade announcements, and node pool changes to a project outside the cluster's administrative boundary.

        **Why this matters**

        - **Security posture exposure:** Security bulletins delivered to a foreign project reveal which CVEs affect the cluster's node images to principals who may not have a legitimate need to know.
        - **Version information disclosure:** Upgrade-available events expose control-plane version details that attackers can use to time exploits around known-vulnerable versions.
        - **Expanded IAM surface:** Cross-project delivery expands the set of IAM principals who can observe the cluster's operational state, beyond the team that manages the cluster.

        **Risk mitigation**

        - **Administrative boundary enforcement:** Keeping the notification topic in the same project ensures that Pub/Sub subscriber permissions align with the cluster's own IAM boundary.
        - **Reduced information leakage:** Limiting event delivery to the cluster's project prevents operational metadata from flowing to less-trusted or unrelated projects.
        - **Simplified access review:** Co-locating the topic with the cluster means a single IAM review covers both cluster administration and notification subscribers.
      audit: |
        ### Audit via Console

        1. Sign in to the Google Cloud Console and navigate to **Kubernetes Engine** > **Clusters**.
        2. Select a cluster and go to the **Details** tab.
        3. Under **Cluster notifications**, note the Pub/Sub topic path.
        4. Verify that the project ID segment in the topic path (`projects/PROJECT_ID/topics/TOPIC`) matches the project ID of the cluster itself.

        A passing cluster shows a notification topic whose project ID matches the cluster's project. A failing cluster shows a notification topic that references a different project.

        ### Audit via CLI

        1. Describe the cluster and inspect the `notificationConfig` field:

        ```bash
        gcloud container clusters describe CLUSTER_NAME \
          --zone=ZONE \
          --format="table(notificationConfig)"
        ```

        A passing cluster returns a `notificationConfig.pubsub.topic` where the embedded project ID matches the cluster's project, or returns `pubsubEnabled: false`. A failing cluster returns a `notificationConfig.pubsub.topic` path containing a different project ID.
      remediation:
        - id: terraform
          desc: |
            Bind the cluster's `notification_config.pubsub.topic` to a topic created in the same project:

            ```hcl
            resource "google_pubsub_topic" "gke_notifications" {
              project = "my-project"
              name    = "gke-notifications"
            }

            resource "google_container_cluster" "primary" {
              name     = "my-cluster"
              project  = "my-project"
              location = "us-central1"

              notification_config {
                pubsub {
                  enabled = true
                  topic   = google_pubsub_topic.gke_notifications.id
                }
              }
            }
            ```
        - id: console
          desc: |
            Point notifications at a topic in the cluster's own project:

            1. Create a Pub/Sub topic in the same project as the cluster.
            2. Open **Kubernetes Engine** → the cluster → **Edit** → **Cluster notifications**.
            3. Set the topic to the newly-created in-project topic.
            4. Save.
        - id: cli
          desc: |
            Update the cluster's notification config to an in-project topic:

            ```bash
            gcloud container clusters update <cluster> \
              --zone=<zone> \
              --notification-config=pubsub=ENABLED,pubsub-topic=projects/<project>/topics/<topic>
            ```
    refs:
      - url: https://cloud.google.com/kubernetes-engine/docs/how-to/cluster-notifications
        title: GKE - Cluster notifications
  # No Terraform variants: the runtime check confirms presence of any active
  # google_gke_backup_backup_plan but does not correlate plans to specific clusters.
  # A Terraform variant would silently inherit that gap (a plan in any project would
  # satisfy a check on any cluster). Resolve the per-cluster correlation in the
  # runtime check before shipping a Terraform variant.
  - uid: mondoo-gcp-security-gke-backup-plan-exists
    title: Ensure every GKE cluster is protected by at least one backup plan
    impact: 70
    filters: asset.platform == 'gcp'
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-bcr-08
      compliance/dora: dora-art-12
      compliance/hipaa: hipaa-security-ss164-308-a-7-ii-a-contingency-plan-data-backup-plan
      compliance/iso-27001-2022: iso-27001-2022-a-8-13
      compliance/nis-2: nis-2-21-2-c
      compliance/nist-csf-1: nist-csf-1-pr-ip-4
      compliance/nist-csf-2: nist-csf-2-pr-ds-11
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cp-9
      compliance/nist-sp-800-171: false
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc9-1-1
      compliance/vda-isa-5: vda-isa-5-3-1-2
    mql: |
      gcp.project.gkeService.clusters.length == 0 ||
      gcp.project.gkeBackupService.backupPlans.where(
        deactivated == false && state == "READY"
      ).length > 0
    docs:
      desc: |
        This check ensures that every GKE project with running clusters has at least one active, ready GKE Backup plan in place. Without a backup plan, a cluster cannot be restored after ransomware, accidental namespace deletion, or control-plane compromise; standard infrastructure-as-code tooling can recreate the cluster topology but cannot restore live application state.

        **Why this matters**

        - **Ransomware recovery gap:** Ransomware operators increasingly target Kubernetes clusters because compromising the control plane simultaneously compromises every workload; a cluster with no backup plan has no offline recovery path.
        - **Data-plane state loss:** IaC tools recreate the cluster shape but not the live application state including persistent volumes, config maps, and secrets as they existed before the incident.
        - **Single-point failure:** A cluster without a backup plan means any large-scale operator error or supply-chain attack that corrupts etcd is unrecoverable without manual reconstruction.

        **Risk mitigation**

        - **Structured recovery path:** An active backup plan captures both API objects and persistent volume data, providing a complete restore point that IaC alone cannot supply.
        - **Ransomware headroom:** Retaining backups for at least 30 days gives incident responders time to identify the compromise timeline before the earliest clean backup ages out.
        - **Operator error protection:** Scheduled backups at a known cadence bound the maximum data loss window for accidental namespace or resource deletion.
      audit: |
        ### Audit via Console

        1. Sign in to the Google Cloud Console and navigate to **Kubernetes Engine** > **Backup for GKE** > **Backup plans**.
        2. Review the list of backup plans and confirm that at least one plan is in the **Active** state.
        3. Compare the list of clusters in the project against the clusters referenced in backup plans to verify that each cluster is covered.

        A passing project shows at least one active, non-deactivated backup plan for the clusters present. A failing project shows no backup plans, or all backup plans are deactivated or in an error state.

        ### Audit via CLI

        1. List GKE backup plans for the project and check for active, ready plans:

        ```bash
        gcloud beta container backup-restore backup-plans list \
          --project=PROJECT_ID \
          --location=- \
          --format="table(name,state,cluster,deactivated)"
        ```

        A passing project returns at least one backup plan with `state: READY` and `deactivated: False`. A failing project returns no results, or all results show `deactivated: True` or a non-ready state.
      remediation:
        - id: terraform
          desc: |
            Create a `google_gke_backup_backup_plan` for each cluster, scheduled and retained:

            ```hcl
            resource "google_gke_backup_backup_plan" "daily" {
              name     = "daily-backup"
              cluster  = google_container_cluster.primary.id
              location = "us-central1"

              backup_schedule {
                cron_schedule = "0 3 * * *"
              }
              retention_policy {
                backup_delete_lock_days = 7
                backup_retain_days      = 30
              }
              backup_config {
                all_namespaces       = true
                include_volume_data  = true
                include_secrets      = true
              }
            }
            ```
        - id: console
          desc: |
            Create a backup plan for each unprotected cluster:

            1. Open **Kubernetes Engine** → **Backup for GKE** → **Backup plans** → **Create**.
            2. Select the target cluster and backup scope (All namespaces, or a curated list of namespaces).
            3. Configure the schedule (daily is a common baseline) and retention (at least 30 days for ransomware recovery headroom).
            4. Save. The first backup runs at the next scheduled time; trigger manually via **Run a backup now** if needed.
        - id: cli
          desc: |
            Create a GKE backup plan for a cluster:

            ```bash
            gcloud beta container backup-restore backup-plans create <plan> \
              --project=<project> \
              --location=<region> \
              --cluster=projects/<project>/locations/<zone>/clusters/<cluster> \
              --all-namespaces \
              --include-volume-data \
              --cron-schedule="0 3 * * *" \
              --backup-retain-days=30
            ```
    refs:
      - url: https://cloud.google.com/kubernetes-engine/docs/add-on/backup-for-gke/concepts/backup-for-gke
        title: Backup for GKE overview
  - uid: mondoo-gcp-security-vertexai-index-endpoint-not-public
    title: Ensure Vertex AI index endpoints are not publicly accessible
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-gcp-security-vertexai-index-endpoint-not-public-gcp
        tags:
          mondoo.com/filter-title: GCP Vertex AI
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-vertexai-index-endpoint-not-public-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-vertexai-index-endpoint-not-public-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-vertexai-index-endpoint-not-public-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that every Vertex AI index endpoint has its public endpoint disabled. Vertex AI Vector Search index endpoints hold the embedding-based search index of whatever text, image, or multimodal content an organization has loaded; exposing one publicly makes that entire embedding space queryable by anyone on the internet.

        **Why this matters**

        - **Embedding inversion risk:** Carefully crafted queries against a public endpoint can reconstruct or enumerate the source documents that were used to build the index.
        - **Membership inference attacks:** A public endpoint allows attackers to probe whether specific documents or PII were included in the index's training data.
        - **Indirect data exposure:** For indexes built from PII or confidential documents, a public endpoint is functionally equivalent to publishing those documents through an indirect channel.
        - **Private alternative available:** Vertex AI supports private Service Connect endpoints, so there is almost always a viable private architecture that eliminates the public surface entirely.

        **Risk mitigation**

        - **VPC-bounded access:** Disabling the public endpoint and using VPC peering or Private Service Connect keeps embedding queries internal to the project's network perimeter.
        - **Inference attack prevention:** Removing public query access eliminates the vector through which embedding-inversion and membership-inference attacks are mounted.
        - **Network posture consistency:** Placing ML infrastructure behind the same private-endpoint boundary as production databases ensures AI workloads inherit organizational network security controls.
      audit: |
        ### Audit via Console

        1. Sign in to the Google Cloud Console and navigate to **Vertex AI** > **Vector Search** > **Index endpoints**.
        2. For each index endpoint, review the **Access type** or **Public endpoint** column.
        3. Verify that no index endpoint has its public endpoint enabled.

        A passing index endpoint shows **Private** access or no public endpoint enabled. A failing index endpoint shows **Public endpoint enabled**.

        ### Audit via CLI

        1. List all Vertex AI index endpoints and inspect the `publicEndpointEnabled` field:

        ```bash
        gcloud ai index-endpoints list \
          --region=REGION \
          --format="table(name,displayName,publicEndpointEnabled)"
        ```

        A passing index endpoint returns `publicEndpointEnabled: False` or the field absent. A failing index endpoint returns `publicEndpointEnabled: True`.
      remediation:
        - id: terraform
          desc: |
            Recreate the endpoint with VPC peering or PSC instead of the public endpoint:

            ```hcl
            resource "google_vertex_ai_index_endpoint" "private" {
              display_name = "private-vector-search"
              region       = "us-central1"
              network      = "projects/${var.project_number}/global/networks/${var.private_vpc}"
              # Do not set public_endpoint_enabled = true.
            }
            ```
        - id: console
          desc: |
            Redeploy the index endpoint as private:

            1. Open **Vertex AI** → **Vector Search** → **Index endpoints**.
            2. Delete the public endpoint (the `publicEndpointEnabled` flag is set at creation and cannot be changed in place).
            3. **Create index endpoint** with **Access type: Private Service Connect** or **Enable VPC Peering** and attach to a private VPC.
            4. Redeploy the index on the new private endpoint.
        - id: cli
          desc: |
            Create a private index endpoint:

            ```bash
            gcloud ai index-endpoints create \
              --region=<region> \
              --display-name=<name> \
              --network=projects/<project>/global/networks/<vpc>
            ```
    refs:
      - url: https://cloud.google.com/vertex-ai/docs/vector-search/setup/setup-index-endpoint
        title: Vertex AI - Setup index endpoint
  - uid: mondoo-gcp-security-vertexai-index-endpoint-not-public-gcp
    filters: asset.platform == 'gcp'
    mql: |
      gcp.project.vertexaiService.indexEndpoints.all(
        publicEndpointEnabled == false
      )
  - uid: mondoo-gcp-security-vertexai-index-endpoint-not-public-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_vertex_ai_index_endpoint')
    mql: |
      terraform.resources('google_vertex_ai_index_endpoint').all(
        arguments['public_endpoint_enabled'] != true
      )
  - uid: mondoo-gcp-security-vertexai-index-endpoint-not-public-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_vertex_ai_index_endpoint')
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_vertex_ai_index_endpoint').all(
        change.after['public_endpoint_enabled'] != true
      )
  - uid: mondoo-gcp-security-vertexai-index-endpoint-not-public-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'google_vertex_ai_index_endpoint')
    mql: |
      terraform.state.resources.where(type == 'google_vertex_ai_index_endpoint').all(
        values['public_endpoint_enabled'] != true
      )
  # No Terraform variants: Vertex AI custom jobs are short-lived imperative API calls
  # invoked via the Python/JS SDKs or `gcloud ai custom-jobs create`. The Terraform
  # provider does not expose a google_vertex_ai_custom_job resource, so there is
  # nothing in HCL/plan/state to evaluate.
  - uid: mondoo-gcp-security-vertexai-custom-job-has-explicit-service-account
    title: Ensure Vertex AI custom jobs run under an explicit service account
    impact: 80
    filters: asset.platform == 'gcp'
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-2
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-5
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-3-3
      compliance/vda-isa-5: vda-isa-5-4-2-1
    mql: |
      gcp.project.vertexaiService.customJobs.where(
        state == "JOB_STATE_RUNNING" || state == "JOB_STATE_PENDING" || state == "JOB_STATE_QUEUED"
      ).all(
        jobSpec['serviceAccount'] != null && jobSpec['serviceAccount'] != ""
      )
    docs:
      desc: |
        This check ensures that every running, pending, or queued Vertex AI custom job has an explicit service account configured in its job specification. Without an explicit service account, custom jobs inherit the project's default Compute Engine service account, which carries broad project-level permissions far beyond what any individual training job actually needs.

        **Why this matters**

        - **Supply-chain blast radius:** Custom jobs execute arbitrary training code that may pull third-party packages, Git repositories, and containers; a compromised dependency runs under the job's service account and inherits all of its permissions.
        - **Default SA over-privilege:** The default Compute Engine service account has broad project access by design; using it for training jobs effectively grants every training container those same wide-reaching permissions.
        - **Audit opacity:** Jobs running under the default SA cannot be distinguished in IAM audit logs from other resources using that same account, making per-workload access review impossible.

        **Risk mitigation**

        - **Least-privilege isolation:** A dedicated service account scoped only to the storage buckets and APIs the training job legitimately needs limits what a compromised training container can access.
        - **Separation of duties:** Explicit per-workload service accounts enable independent IAM audits, rotation policies, and permission reviews for each class of training job.
        - **Default SA decoupling:** Removing reliance on the default Compute SA ensures that changes to that account's permissions do not accidentally affect ML training workloads.
      audit: |
        ### Audit via Console

        1. Sign in to the Google Cloud Console and navigate to **Vertex AI** > **Training** > **Custom jobs**.
        2. For each job in a running, pending, or queued state, select the job and view its details.
        3. Under the worker pool specification, verify that a **Service account** is explicitly specified.

        A passing custom job shows an explicit, non-default service account in its job specification. A failing custom job shows no service account set (inheriting the project's default Compute Engine service account).

        ### Audit via CLI

        1. List running, pending, or queued custom jobs and inspect the `serviceAccount` field in each job's spec:

        ```bash
        gcloud ai custom-jobs list \
          --region=REGION \
          --filter="state:(JOB_STATE_RUNNING OR JOB_STATE_PENDING OR JOB_STATE_QUEUED)" \
          --format="table(name,state,jobSpec.serviceAccount)"
        ```

        A passing custom job returns a non-empty `serviceAccount` value in `jobSpec`. A failing custom job returns an empty or absent `serviceAccount` in `jobSpec`.
      remediation:
        - id: terraform
          desc: |
            Custom jobs are typically submitted via SDK / pipeline, not as long-lived Terraform resources. Provision the dedicated service account in Terraform and require all submissions to reference it; reject SDK submissions that omit `service_account`:

            ```hcl
            resource "google_service_account" "vertex_training" {
              account_id   = "vertex-training"
              display_name = "Vertex AI training jobs"
            }

            # Grant only the narrow roles the training code needs:
            resource "google_storage_bucket_iam_member" "training_data" {
              bucket = google_storage_bucket.training_data.name
              role   = "roles/storage.objectViewer"
              member = "serviceAccount:${google_service_account.vertex_training.email}"
            }
            ```

            Reference the SA email at job submission time (Python SDK example):

            ```python
            aiplatform.CustomJob(
                display_name="train-X",
                worker_pool_specs=[...],
            ).run(service_account="vertex-training@PROJECT.iam.gserviceaccount.com")
            ```
        - id: console
          desc: |
            Configure a dedicated service account for Vertex AI custom jobs:

            1. Create a service account scoped to only the GCS buckets, Vertex AI resources, and Cloud Storage objects the training code needs.
            2. When launching custom jobs, set **Service account** in the advanced options to the dedicated SA.
            3. Update any SDK-based submissions to pass `service_account` explicitly in the `worker_pool_specs`.
        - id: cli
          desc: |
            Submit a custom job with an explicit service account:

            ```bash
            gcloud ai custom-jobs create \
              --region=<region> \
              --display-name=<job> \
              --service-account=<sa>@<project>.iam.gserviceaccount.com \
              --config=config.yaml
            ```
    refs:
      - url: https://cloud.google.com/vertex-ai/docs/general/custom-service-account
        title: Vertex AI - Use a custom service account
  - uid: mondoo-gcp-security-iap-tunnel-dest-group-no-broad-cidr
    title: Ensure IAP tunnel destination groups do not use overly broad CIDR ranges
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-gcp-security-iap-tunnel-dest-group-no-broad-cidr-gcp
        tags:
          mondoo.com/filter-title: GCP IAP (Tunnel destination groups)
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-iap-tunnel-dest-group-no-broad-cidr-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-iap-tunnel-dest-group-no-broad-cidr-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-iap-tunnel-dest-group-no-broad-cidr-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that no Identity-Aware Proxy (IAP) tunnel destination group contains a CIDR with a prefix length of `/15` or shorter. IAP tunnels provide a bastion-like path to internal resources; destination groups with ranges such as `/8` or `/10` authorize an authenticated user to reach a vast range of private IPs, well beyond the specific hosts any individual workflow should need.

        **Why this matters**

        - **Enterprise-wide lateral reach:** A destination group with `10.0.0.0/8` grants an IAP-authorized user tunnel access to every private IP in the enterprise VPC fabric, effectively making IAP a broad internal VPN with no per-destination review.
        - **Session compromise amplification:** Any IAP user whose session is phished or stolen inherits the destination group's full CIDR scope; wide ranges maximize the damage from a single credential compromise.
        - **Intent-to-scope mismatch:** Broad CIDRs are typically set for convenience during initial setup and are never narrowed, turning an emergency access mechanism into a permanently over-scoped standing path.

        **Risk mitigation**

        - **Scoped tunnel grants:** Restricting destination groups to `/16` or narrower CIDRs limits each IAP grant to the specific subnets a user's role legitimately requires.
        - **Lateral movement containment:** Narrow destination ranges prevent an attacker who compromises an IAP session from pivoting freely across the internal network.
        - **Deliberate scope expansion:** Requiring explicit, reviewed CIDRs ensures that any future expansion of a destination group's reach goes through an intentional configuration change rather than inheriting a preexisting broad range.
      audit: |
        ### Audit via Console

        1. In the Google Cloud Console, navigate to **Security** > **Identity-Aware Proxy**.
        2. Select the **TCP forwarding** tab, then click **Destination groups**.
        3. For each destination group, review the list of CIDRs.
        4. Check whether any CIDR has a prefix length of `/15` or shorter (e.g., `/8`, `/10`, `/15`).

        A passing destination group shows only narrow CIDRs, all with a prefix length of `/16` or longer (e.g., `/24`). A failing destination group shows at least one CIDR with a prefix length of `/15` or shorter.

        ### Audit via CLI

        1. List all IAP tunnel destination groups across all regions:

        ```bash
        gcloud iap tcp dest-groups list --project=PROJECT_ID --format=json
        ```

        2. Review the `cidrs` field in each returned group. Any value matching a prefix of `/15` or fewer bits (such as `/8`, `/10`, or `/15`) is a finding.

        A passing destination group returns a `cidrs` list containing only narrow ranges (e.g., `10.20.5.0/24`). A failing destination group returns a `cidrs` list containing a broad range such as `10.0.0.0/8` or `10.0.0.0/15`.
      remediation:
        - id: terraform
          desc: |
            Constrain the destination group's CIDRs to specific subnets, not enterprise-wide ranges:

            ```hcl
            resource "google_iap_tunnel_dest_group" "bastion" {
              region   = "us-central1"
              group_name = "bastion-targets"
              cidrs    = [
                "10.20.5.0/24",
                "10.20.6.0/24",
              ]
              # Avoid /15 or broader.
            }
            ```
        - id: console
          desc: |
            Narrow the destination group's CIDR list:

            1. Open **Security** → **Identity-Aware Proxy** → **TCP forwarding** → **Destination groups**.
            2. Edit the destination group.
            3. Remove any CIDR of `/15` or larger. Replace with specific subnets (ideally `/24` or smaller) that match the intended hosts.
            4. Save. Existing sessions to removed ranges drop immediately.
        - id: cli
          desc: |
            Replace an IAP destination group's CIDRs with narrow ranges:

            ```bash
            gcloud iap tcp dest-groups update <group> \
              --region=<region> \
              --ip-range-list=10.20.5.0/24,10.20.6.0/24
            ```
    refs:
      - url: https://cloud.google.com/iap/docs/tcp-by-host
        title: IAP - TCP forwarding with destination groups
