        )
      )
  - uid: mondoo-gcp-security-vpn-tunnels-use-ikev2
    title: Ensure VPN tunnels use IKE version 2
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    variants:
      - uid: mondoo-gcp-security-vpn-tunnels-use-ikev2-gcp
        tags:
          mondoo.com/filter-title: GCP VPN Tunnel
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-vpn-tunnels-use-ikev2-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-vpn-tunnels-use-ikev2-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-vpn-tunnels-use-ikev2-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Cloud VPN tunnels are configured to use IKE version 2 rather than the older IKEv1 protocol. By default, GCP supports both versions, and IKEv1 tunnels may exist in environments that have not been reviewed or updated since the newer protocol became available.

        **Why this matters**

        - **Stronger cryptographic negotiation:** IKEv2 provides a more robust negotiation process with fewer round trips, reducing the window during which a man-in-the-middle attack could interfere with tunnel establishment.
        - **Built-in NAT traversal:** IKEv2 natively supports NAT traversal without requiring workarounds that can introduce security gaps present in IKEv1 deployments.
        - **Dead peer detection:** IKEv2 includes built-in mechanisms for detecting failed tunnel peers, ensuring tunnels are promptly re-established rather than leaving traffic unprotected.
        - **Downgrade resistance:** IKEv1 weak mode negotiation is susceptible to downgrade attacks on cipher suites; IKEv2 enforces stronger algorithm selection during key exchange.

        **Risk mitigation**

        - **Tunnel interception:** IKEv2's improved negotiation security reduces the risk that an attacker observing the tunnel establishment phase can obtain key material.
        - **Service disruption:** Dead peer detection in IKEv2 ensures failed tunnels are detected and re-established quickly, reducing the window where encrypted traffic might fall back to unprotected channels.
      audit: |
        ### Audit via Console

        1. Go to the **Network Connectivity > VPN** page in the Google Cloud Console.
        2. Select the **Cloud VPN tunnels** tab.
        3. For each VPN tunnel, review the **IKE version** column.

        A passing VPN tunnel shows **IKEv2** in the IKE version column. A failing tunnel shows **IKEv1**.

        ### Audit via CLI

        1. List all VPN tunnels and their IKE version:

        ```bash
        gcloud compute vpn-tunnels list \
          --format="table(name,region,ikeVersion,status)"
        ```

        A passing VPN tunnel returns `2` in the `IKE_VERSION` column. A failing tunnel returns `1`.
      remediation:
        - id: terraform
          desc: |
            To ensure VPN tunnels use IKE version 2 in Terraform, set the IKE version to 2 on VPN tunnels:

            ```hcl
            resource "google_compute_vpn_tunnel" "example" {
              name          = "example-tunnel"
              peer_ip       = "203.0.113.1"
              shared_secret = var.vpn_shared_secret
              ike_version   = 2

              target_vpn_gateway = google_compute_vpn_gateway.example.id
            }
            ```
        - id: console
          desc: |
            To ensure VPN tunnels use IKE version 2 using the Google Cloud Console, IKE version cannot be changed on an existing VPN tunnel. To use IKEv2:

            1. Go to the **Network Connectivity > VPN** page in the Google Cloud Console.
            2. Select **Create VPN tunnel** or recreate the existing tunnel.
            3. Under **IKE version**, select **IKEv2**.
            4. Complete the tunnel configuration and select **Create**.
            5. Delete the old IKEv1 tunnel after verifying the new tunnel is operational.
        - id: cli
          desc: |
            To ensure VPN tunnels use IKE version 2 using the Google Cloud CLI, create a VPN tunnel with IKEv2:

            ```bash
            gcloud compute vpn-tunnels create TUNNEL_NAME \
              --region=REGION \
              --peer-address=PEER_IP \
              --shared-secret=SHARED_SECRET \
              --ike-version=2 \
              --target-vpn-gateway=VPN_GATEWAY_NAME
            ```

            Note: IKE version cannot be updated on existing tunnels. You must delete and recreate the tunnel.
    refs:
      - url: https://cloud.google.com/network-connectivity/docs/vpn/concepts/overview
        title: Cloud VPN overview
      - url: https://cloud.google.com/network-connectivity/docs/vpn/how-to/creating-vpn-dynamic-routes
        title: Creating VPN tunnels
  - uid: mondoo-gcp-security-vpn-tunnels-use-ikev2-gcp
    filters: asset.platform == 'gcp'
    mql: |
      gcp.project.computeService.vpnTunnels.all(
        ikeVersion == 2
      )
  - uid: mondoo-gcp-security-vpn-tunnels-use-ikev2-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_compute_vpn_tunnel')
    mql: |
      terraform.resources('google_compute_vpn_tunnel').all(
        arguments.ike_version == 2
      )
  - uid: mondoo-gcp-security-vpn-tunnels-use-ikev2-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_compute_vpn_tunnel')
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_compute_vpn_tunnel').all(
        change.after['ike_version'] == 2
      )
  - uid: mondoo-gcp-security-vpn-tunnels-use-ikev2-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'google_compute_vpn_tunnel')
    mql: |
      terraform.state.resources.where(type == 'google_compute_vpn_tunnel').all(
        values['ike_version'] == 2
      )
