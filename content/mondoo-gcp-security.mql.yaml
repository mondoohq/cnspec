  - uid: mondoo-gcp-security-gke-database-encryption-enabled
    title: Ensure GKE cluster has application-layer secrets encryption enabled
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-gcp-security-gke-database-encryption-enabled-gcp
        tags:
          mondoo.com/filter-title: GCP GKE Cluster
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-gke-database-encryption-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-gke-database-encryption-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-gke-database-encryption-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that GKE clusters are configured with application-layer secrets encryption, providing a second envelope of encryption for Kubernetes Secrets stored in etcd using a Cloud KMS key. By default, GKE encrypts etcd data at rest using Google-managed disk-level encryption, but Kubernetes Secrets such as API keys, certificates, and passwords receive no additional protection above that layer.

        **Why this matters**

        - **Defense in depth for secrets:** Application-layer encryption adds a customer-managed KMS layer on top of disk encryption, so a compromise of the underlying storage does not directly expose Secret values.
        - **Key revocation:** Because Secrets are encrypted with a customer-controlled KMS key, disabling the key immediately prevents decryption of all cluster Secrets, enabling a rapid response to key compromise.
        - **Separation of responsibilities:** Storing the encryption key in Cloud KMS, separate from the cluster, allows key management to be governed independently from cluster operations.
        - **Audit trail:** Cloud KMS logs every use of the encryption key, providing evidence of when and by whom cluster Secrets were decrypted.

        **Risk mitigation**

        - **Enforce ENCRYPTED state:** Confirm the `databaseEncryption.state` is set to `ENCRYPTED` with a non-empty `keyName`; a `DECRYPTED` state means the feature is disabled regardless of disk encryption status.
        - **Apply IAM to the KMS key:** Grant the GKE service account only the `cloudkms.cryptoKeyEncrypterDecrypter` role on the specific key, not broader KMS access.
        - **Enable automatic key rotation:** Configure a rotation schedule on the Cloud KMS key to limit the cryptographic exposure window without requiring manual re-encryption.
      audit: |
        ### Audit via Console

        1. In the Google Cloud Console, navigate to **Kubernetes Engine > Clusters**.
        2. Click the cluster name to open its details.
        3. On the **Details** tab, scroll to the **Security** section and look for **Application-layer secrets encryption**.

        A passing cluster shows application-layer secrets encryption enabled with a Cloud KMS key name. A failing cluster shows application-layer secrets encryption as disabled or not configured.

        ### Audit via CLI

        1. Describe the GKE cluster and inspect the database encryption configuration:

        ```bash
        gcloud container clusters describe CLUSTER_NAME \
          --zone=ZONE \
          --format="json(databaseEncryption)"
        ```

        A passing cluster returns `{"state": "ENCRYPTED", "keyName": "..."}` with a non-empty key name. A failing cluster returns `{"state": "DECRYPTED"}` or an absent `databaseEncryption` field.
      remediation:
        - id: terraform
          desc: |
            To ensure GKE cluster has application-layer secrets encryption enabled in Terraform:

            ```hcl
            resource "google_container_cluster" "primary" {
              name     = "my-cluster"
              location = "us-central1"

              database_encryption {
                state    = "ENCRYPTED"
                key_name = google_kms_crypto_key.gke_secrets.id
              }
            }
            ```
        - id: console
          desc: |
            To ensure GKE cluster has application-layer secrets encryption enabled using the Google Cloud Console:

            1. Go to the **Kubernetes Engine > Clusters** page.
            2. Select the cluster.
            3. Select **Edit**.
            4. Under **Security**, enable **Application-layer secrets encryption**.
            5. Select or create a Cloud KMS key.
            6. Save the changes.
        - id: cli
          desc: |
            To ensure GKE cluster has application-layer secrets encryption enabled using the Google Cloud CLI:

            ```bash
            gcloud container clusters update CLUSTER_NAME \
              --zone=ZONE \
              --database-encryption-key=projects/PROJECT/locations/LOCATION/keyRings/RING/cryptoKeys/KEY
            ```
    refs:
      - url: https://cloud.google.com/kubernetes-engine/docs/how-to/encrypting-secrets
        title: GKE - Application-layer secrets encryption
  - uid: mondoo-gcp-security-gke-database-encryption-enabled-gcp
    filters: asset.platform == 'gcp-gke-cluster'
    mql: |
      gcp.project.gkeService.cluster.databaseEncryption['state'] == "ENCRYPTED"
  - uid: mondoo-gcp-security-gke-database-encryption-enabled-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_container_cluster')
    mql: |
      terraform.resources('google_container_cluster').all(
        blocks.where(type == 'database_encryption') != empty &&
        blocks.where(type == 'database_encryption').all(
          arguments.state == "ENCRYPTED"
        )
      )
  - uid: mondoo-gcp-security-gke-database-encryption-enabled-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_container_cluster')
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_container_cluster').all(
        change.after['database_encryption'] != empty &&
        change.after['database_encryption'].any(_['state'] == "ENCRYPTED")
      )
  - uid: mondoo-gcp-security-gke-database-encryption-enabled-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'google_container_cluster')
    mql: |
      terraform.state.resources.where(type == 'google_container_cluster').all(
        values['database_encryption'] != empty &&
        values['database_encryption'].any(_['state'] == "ENCRYPTED")
      )
  - uid: mondoo-gcp-security-gke-node-pool-secure-boot-enabled
    title: Ensure GKE cluster node pools have Secure Boot enabled
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-c-1-integrity
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ds-6
      compliance/nist-csf-2: nist-csf-2-pr-ps-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-1
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc6-8-2
      compliance/vda-isa-5: false
    variants:
      - uid: mondoo-gcp-security-gke-node-pool-secure-boot-enabled-gcp
        tags:
          mondoo.com/filter-title: GCP GKE Cluster
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-gke-node-pool-secure-boot-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-gke-node-pool-secure-boot-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-gke-node-pool-secure-boot-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that every GKE cluster node pool is configured with Secure Boot enabled in the shielded instance configuration. Secure Boot verifies the cryptographic signature of each boot component (bootloader, kernel, and kernel modules) before execution, blocking bootkits and rootkits that modify the boot chain. By default, Secure Boot is disabled on GKE node pools.

        **Why this matters**

        - **Boot-chain integrity:** Without Secure Boot, an attacker who gains node-level access can persist a rootkit in the bootloader or kernel that survives pod restarts and node reimaging.
        - **Per-pool enforcement:** Node pools can be created with independent shielded instance configurations; a cluster that passes a cluster-level check can still contain individual pools with Secure Boot disabled.
        - **Rootkit invisibility:** Boot-level malware executes before the OS and can hide from container runtime security tools and host-based intrusion detection systems.
        - **Preventive control:** Secure Boot blocks the execution of unsigned or tampered boot components before they run, unlike detection-based approaches that identify compromise after the fact.

        **Risk mitigation**

        - **Apply to all node pools:** Enable Secure Boot on every node pool in the cluster, including autopilot node pools and any pools added in the future, not just the initial default pool.
        - **Enforce via organization policy:** Use the `constraints/compute.requireShieldedVm` organization policy to prevent the creation of unshielded nodes across all projects.
        - **Monitor integrity failures:** Enable integrity monitoring alongside Secure Boot and alert on validation failures, which may indicate a boot-chain tampering attempt.
      audit: |
        ### Audit via Console

        1. In the Google Cloud Console, navigate to **Kubernetes Engine > Clusters**.
        2. Click the cluster name, then navigate to the **Nodes** tab.
        3. Click each node pool name and review the **Shielded options** section.
        4. Verify that **Secure Boot** is enabled for each node pool.

        A passing node pool shows **Secure Boot: Enabled**. A failing node pool shows **Secure Boot: Disabled**.

        ### Audit via CLI

        1. Describe each node pool in the cluster and check the shielded instance configuration:

        ```bash
        gcloud container node-pools describe NODE_POOL_NAME \
          --cluster=CLUSTER_NAME \
          --zone=ZONE \
          --format="json(config.shieldedInstanceConfig)"
        ```

        A passing node pool returns `{"enableSecureBoot": true}`. A failing node pool returns `{"enableSecureBoot": false}` or an absent `shieldedInstanceConfig` field.
      remediation:
        - id: terraform
          desc: |
            To ensure GKE cluster node pools have Secure Boot enabled in Terraform:

            ```hcl
            resource "google_container_cluster" "primary" {
              name     = "my-cluster"
              location = "us-central1"

              node_pool {
                name = "default-pool"

                node_config {
                  shielded_instance_config {
                    enable_secure_boot          = true
                    enable_integrity_monitoring = true
                  }
                }
              }
            }
            ```
        - id: console
          desc: |
            To ensure GKE cluster node pools have Secure Boot enabled using the Google Cloud Console:

            1. Go to the **Kubernetes Engine > Clusters** page.
            2. Select the cluster.
            3. Navigate to the **Nodes** tab and select a node pool.
            4. Select **Edit**.
            5. Under **Shielded options**, enable **Secure Boot**.
            6. Save the changes.

            Note: Changing Shielded VM settings on a node pool requires re-creating nodes.
        - id: cli
          desc: |
            To ensure GKE cluster node pools have Secure Boot enabled using the Google Cloud CLI, create a node pool with Secure Boot enabled (this setting cannot be changed on existing node pools):

            ```bash
            gcloud container node-pools create NODE_POOL_NAME \
              --cluster=CLUSTER_NAME \
              --zone=ZONE \
              --shielded-secure-boot
            ```
    refs:
      - url: https://cloud.google.com/kubernetes-engine/docs/how-to/shielded-gke-nodes
        title: GKE - Shielded GKE Nodes
  - uid: mondoo-gcp-security-gke-node-pool-secure-boot-enabled-gcp
    filters: asset.platform == 'gcp-gke-cluster'
    mql: |
      gcp.project.gkeService.cluster.nodePools.all(
        config.shieldedInstanceConfig.enableSecureBoot == true
      )
  - uid: mondoo-gcp-security-gke-node-pool-secure-boot-enabled-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_container_cluster')
    mql: |
      terraform.resources('google_container_cluster').all(
        blocks.where(type == 'node_pool').all(
          blocks.where(type == 'node_config') != empty &&
          blocks.where(type == 'node_config').all(
            blocks.where(type == 'shielded_instance_config') != empty &&
            blocks.where(type == 'shielded_instance_config').all(
              arguments.enable_secure_boot == true
            )
          )
        )
      )
  - uid: mondoo-gcp-security-gke-node-pool-secure-boot-enabled-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_container_cluster')
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_container_cluster').all(
        change.after['node_pool'] == empty ||
        change.after['node_pool'].all(
          _['node_config'].any(
            _['shielded_instance_config'] != empty &&
            _['shielded_instance_config'].any(_['enable_secure_boot'] == true)
          )
        )
      )
  - uid: mondoo-gcp-security-gke-node-pool-secure-boot-enabled-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'google_container_cluster')
    mql: |
      terraform.state.resources.where(type == 'google_container_cluster').all(
        values['node_pool'] == empty ||
        values['node_pool'].all(
          _['node_config'].any(
            _['shielded_instance_config'] != empty &&
            _['shielded_instance_config'].any(_['enable_secure_boot'] == true)
          )
        )
      )
  - uid: mondoo-gcp-security-cloud-functions-no-plaintext-secrets-in-env-vars
    title: Ensure Cloud Functions do not store secrets in plaintext env vars
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-dsp-17
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ds-5
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-8-6-2
      compliance/soc2-2017: soc2-control-cc6-1-9
      compliance/vda-isa-5: vda-isa-5-4-1-3
    variants:
      - uid: mondoo-gcp-security-cloud-functions-no-plaintext-secrets-in-env-vars-gcp
        tags:
          mondoo.com/filter-title: GCP Cloud Function
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-cloud-functions-no-plaintext-secrets-in-env-vars-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-functions-no-plaintext-secrets-in-env-vars-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-functions-no-plaintext-secrets-in-env-vars-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Cloud Functions are configured to avoid storing secrets as plaintext runtime environment variables by detecting environment variable keys that match common secret-naming patterns such as `PASSWORD`, `API_KEY`, `SECRET`, and `ACCESS_TOKEN`. Secrets passed this way are stored in the function configuration in plaintext and should instead be stored in Secret Manager and referenced through Cloud Functions native secret integration.

        **Why this matters**

        - **Broad read access:** Runtime environment variables are readable by any principal with the `cloudfunctions.functions.get` IAM permission, which is routinely granted to developers and CI systems.
        - **Leak surface:** Plaintext secret values appear in deployment logs, Terraform state files, and infrastructure-as-code repositories, multiplying the number of places where the secret can be inadvertently exposed.
        - **No audit trail:** Access to secrets embedded in environment variables is not logged; Secret Manager references generate an audit log entry for every secret access.
        - **Rotation friction:** Rotating a secret stored in an environment variable requires redeploying the function; Secret Manager references allow transparent rotation by updating the secret version without touching the function configuration.

        **Risk mitigation**

        - **Migrate to Secret Manager:** Store secrets in Secret Manager and reference them using Cloud Functions `secretEnvironmentVariables` or `secretVolumes` configuration, which injects values at runtime without embedding them in the function definition.
        - **Audit existing functions:** Review all Cloud Function environment variable keys for secret-like naming patterns and migrate identified secrets before revoking plaintext access.
        - **Restrict deployment permissions:** Limit the `cloudfunctions.functions.update` and `cloudfunctions.functions.create` permissions to trusted CI identities to reduce the risk of secrets being introduced by unauthorized actors.
      audit: |
        ### Audit via Console

        1. In the Google Cloud Console, navigate to **Cloud Functions**.
        2. Click a function name to open its details.
        3. Click **Edit**, then navigate to **Runtime, build, connections and security settings**.
        4. Under **Runtime environment variables**, review the environment variable key names for any that resemble secrets (for example, `PASSWORD`, `API_KEY`, `SECRET`, `PRIVATE_KEY`, `ACCESS_TOKEN`, `AUTH_TOKEN`, `CREDENTIALS`, `CONNECTION_STRING`).

        A passing function shows no runtime environment variable keys matching common secret naming patterns. A failing function shows one or more environment variable keys with secret-like names.

        ### Audit via CLI

        1. Describe the Cloud Function and inspect environment variable keys:

        ```bash
        gcloud functions describe FUNCTION_NAME \
          --region=REGION \
          --format="json(environmentVariables)"
        ```

        A passing function returns no environment variable keys matching patterns such as `password`, `secret`, `api_key`, `private_key`, `access_token`, `auth_token`, `credentials`, or `connection_string`. A failing function returns one or more keys with those naming patterns.
      remediation:
        - id: terraform
          desc: |
            To ensure Cloud Functions do not store secrets in plaintext env vars in Terraform, replace plaintext environment variables with Secret Manager references:

            ```hcl
            resource "google_cloudfunctions2_function" "example" {
              name     = "example-function"
              location = "us-central1"

              build_config {
                runtime     = "python312"
                entry_point = "main"
              }

              service_config {
                # Use secret environment variables instead of plaintext
                secret_environment_variables {
                  key        = "API_KEY"
                  project_id = "my-project"
                  secret     = "my-api-key-secret"
                  version    = "latest"
                }
              }
            }
            ```
        - id: console
          desc: |
            To ensure Cloud Functions do not store secrets in plaintext env vars using the Google Cloud Console:

            1. Navigate to **Cloud Functions** in the Google Cloud Console.
            2. Select the function.
            3. Select **Edit**.
            4. Under **Runtime, build, connections and security settings**, go to **Security and Image Repo**.
            5. Remove any secrets from the **Runtime environment variables** section.
            6. Add them as **Secret references** instead, selecting the corresponding Secret Manager secret.
            7. Deploy the function.
        - id: cli
          desc: |
            To ensure Cloud Functions do not store secrets in plaintext env vars using the Google Cloud CLI, remove the plaintext environment variable and add a Secret Manager reference:

            ```bash
            gcloud functions deploy FUNCTION_NAME \
              --remove-env-vars=API_KEY \
              --set-secrets=API_KEY=projects/PROJECT/secrets/SECRET_NAME:latest
            ```
    refs:
      - url: https://cloud.google.com/functions/docs/configuring/secrets
        title: Cloud Functions - Using secrets
  - uid: mondoo-gcp-security-cloud-functions-no-plaintext-secrets-in-env-vars-gcp
    filters: asset.platform == 'gcp-cloud-function'
    mql: |
      gcp.project.cloudFunction.envVars.keys.none(
        _ == /(?i)(password|secret|api[_-]?key|private[_-]?key|access[_-]?token|auth[_-]?token|credentials|connection[_-]?string)/
      )
  - uid: mondoo-gcp-security-cloud-functions-no-plaintext-secrets-in-env-vars-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_cloudfunctions_function' || nameLabel == 'google_cloudfunctions2_function')
    mql: |
      terraform.resources.where(nameLabel == 'google_cloudfunctions_function').all(
        arguments['environment_variables'] == empty ||
        arguments['environment_variables'].keys.none(
          _ == /(?i)(password|secret|api[_-]?key|private[_-]?key|access[_-]?token|auth[_-]?token|credentials|connection[_-]?string)/
        )
      )
      terraform.resources.where(nameLabel == 'google_cloudfunctions2_function').all(
        blocks.where(type == 'service_config').all(
          arguments['environment_variables'] == empty ||
          arguments['environment_variables'].keys.none(
            _ == /(?i)(password|secret|api[_-]?key|private[_-]?key|access[_-]?token|auth[_-]?token|credentials|connection[_-]?string)/
          )
        )
      )
  - uid: mondoo-gcp-security-cloud-functions-no-plaintext-secrets-in-env-vars-terraform-plan
    filters: |
