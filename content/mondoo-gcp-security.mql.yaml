        ```

        A passing topic returns a non-empty Cloud KMS key resource name. A failing topic returns an empty value.
      remediation:
        - id: terraform
          desc: |
            To ensure Pub/Sub topics are encrypted with CMEK in Terraform:

            ```hcl
