  - uid: mondoo-gcp-security-dataproc-cluster-internal-ip-only
    title: Ensure Dataproc clusters use internal IP addresses only
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-gcp-security-dataproc-cluster-internal-ip-only-gcp
        tags:
          mondoo.com/filter-title: GCP Dataproc Cluster
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-dataproc-cluster-internal-ip-only-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-dataproc-cluster-internal-ip-only-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-dataproc-cluster-internal-ip-only-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Dataproc clusters are configured with internal IP addresses only, preventing cluster nodes from being assigned external IP addresses that are reachable from the public internet. By default, Dataproc assigns external IPs to cluster nodes unless the `internalIpOnly` flag is explicitly set.

        **Why this matters**

        - **Attack surface reduction:** Nodes without external IPs cannot be directly reached from the internet, eliminating the most direct path for brute-force SSH attacks, port scanning, and exploitation of unpatched services.
        - **Data processing environment protection:** Dataproc clusters commonly process sensitive or regulated data; removing internet reachability reduces the risk of data exfiltration through a compromised node.
        - **Network segmentation:** Internal-only clusters stay entirely within the VPC, where firewall rules and VPC Service Controls can constrain east-west movement and limit communication to authorized internal services.
        - **Private Google Access compatibility:** Clusters using internal IPs can still reach Google APIs through Private Google Access on the subnet, preserving full functionality without a public IP.

        **Risk mitigation**

        - **Enable internal IP only at creation time:** Set `internalIpOnly: true` in the cluster's GCE cluster configuration; this setting cannot be changed after a cluster is created.
        - **Configure Private Google Access on the subnet:** Ensure the VPC subnet used by the cluster has Private Google Access enabled so nodes can reach Google APIs without external addresses.
        - **Use Cloud NAT for required outbound internet access:** If job code must fetch data from external sources, provision a Cloud NAT gateway on the subnet rather than assigning external IPs.
      audit: |
        ### Audit via Console

        1. Sign in to the [Google Cloud Console](https://console.cloud.google.com) and select the project.
        2. Navigate to **Dataproc > Clusters**.
        3. Select a cluster name to open its details page.
        4. Click the **Configuration** tab.
        5. Under **Network configuration**, check the **Internal IP only** setting.
        6. Repeat for each cluster.

        A passing cluster shows **Internal IP only** enabled. A failing cluster shows **Internal IP only** disabled or not set, meaning cluster nodes have external IP addresses.

        ### Audit via CLI

        1. Describe each Dataproc cluster and check the internal IP only setting:

        ```bash
        gcloud dataproc clusters describe CLUSTER_NAME \
          --region=REGION \
          --format="value(config.gceClusterConfig.internalIpOnly)"
        ```

        A passing cluster returns `True`. A failing cluster returns `False` or an empty value.
      remediation:
        - id: terraform
          desc: |
            To ensure Dataproc clusters use internal IP addresses only in Terraform:

            ```hcl
            resource "google_dataproc_cluster" "example" {
              name   = "example-cluster"
              region = "us-central1"

              cluster_config {
                gce_cluster_config {
                  internal_ip_only = true
                  subnetwork       = google_compute_subnetwork.example.id
                }
              }
            }
            ```
        - id: console
          desc: |
            To ensure Dataproc clusters use internal IP addresses only using the Google Cloud Console:

            1. Navigate to **Dataproc > Clusters** in the Google Cloud Console.
            2. Select **Create Cluster**.
            3. Under **Configure nodes**, expand **Network configuration**.
            4. Enable **Internal IP only**.
            5. Complete cluster creation.
        - id: cli
          desc: |
            To ensure Dataproc clusters use internal IP addresses only using the Google Cloud CLI:

            ```bash
            gcloud dataproc clusters create CLUSTER_NAME \
              --region=REGION \
              --no-address \
              --subnet=SUBNET_NAME
            ```
    refs:
      - url: https://cloud.google.com/dataproc/docs/concepts/configuring-clusters/network
        title: Dataproc cluster network configuration
