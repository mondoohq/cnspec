  - uid: mondoo-gcp-security-gke-cluster-network-policy-enabled
    title: Ensure network policy is enabled on GKE clusters
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-1-5
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-gcp-security-gke-cluster-network-policy-enabled-gcp
        tags:
          mondoo.com/filter-title: GCP GKE Cluster
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-gke-cluster-network-policy-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-gke-cluster-network-policy-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-gke-cluster-network-policy-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Kubernetes network policy enforcement is enabled on GKE clusters, allowing fine-grained control over pod-to-pod and pod-to-external traffic. By default, all pods in a Kubernetes cluster can communicate freely with every other pod in the cluster without restriction, which violates the principle of least privilege.

        **Why this matters**

        - **Unrestricted lateral movement:** Without network policies, a compromised pod can connect to any other pod or service in the cluster, turning a single breach into a full cluster compromise.
        - **Sensitive workload exposure:** Databases, internal APIs, and privileged services are reachable by every workload on the cluster unless network policies explicitly restrict that access.
        - **Zero-trust impossible:** Network policy enforcement is the prerequisite for implementing zero-trust networking within a cluster; without it, implicit trust between all pods cannot be removed.
        - **Isolation boundary erosion:** Multi-tenant clusters that place workloads of different trust levels in the same cluster cannot provide meaningful isolation without network policy.

        **Risk mitigation**

        - **Enable network policy enforcement:** Set the `network_policy` block with `enabled = true` and `provider = "CALICO"` so that NetworkPolicy objects are enforced at the data plane level.
        - **Write default-deny policies:** After enabling enforcement, deploy NetworkPolicy resources that deny all ingress and egress by default, then explicitly allow only required traffic flows.
        - **Audit existing policies:** Review deployed NetworkPolicy objects regularly to ensure they reflect the minimum required connectivity for each workload.
      audit: |
        ### Audit via Console

        1. Sign in to the [Google Cloud Console](https://console.cloud.google.com).
        2. Navigate to **Kubernetes Engine** > **Clusters**.
        3. Select a cluster and click the **Details** tab.
        4. Under the **Networking** section, check the value of **Network policy enforcement**.

        A passing cluster shows **Network policy enforcement: Enabled**. A failing cluster shows **Network policy enforcement: Disabled**.

        ### Audit via CLI

        1. Describe the cluster and check the network policy addon status:

        ```bash
        gcloud container clusters describe CLUSTER_NAME \
          --zone ZONE \
          --format="value(addonsConfig.networkPolicyConfig.disabled)"
        ```

        A passing cluster returns `False` or no output (indicating the addon is not disabled). A failing cluster returns `True`.
      remediation:
        - id: terraform
          desc: |
            To ensure network policy is enabled on GKE clusters in Terraform, enable network policy in your GKE cluster configuration:

            ```hcl
            resource "google_container_cluster" "example" {
              name     = "example-cluster"
              location = "us-central1"

              network_policy {
                enabled  = true
                provider = "CALICO"
              }

              addons_config {
                network_policy_config {
                  disabled = false
                }
              }
            }
            ```
        - id: console
          desc: |
            To ensure network policy is enabled on GKE clusters using the Google Cloud Console:

            1. In the Google Cloud console, go to the **Kubernetes Engine > Clusters** page.
            2. Select the cluster you want to configure.
            3. Select **Edit**.
            4. In the **Networking** section, enable **Network policy enforcement**.
            5. Select **Save**.
        - id: cli
          desc: |
            To ensure network policy is enabled on GKE clusters using the Google Cloud CLI:

            ```bash
            gcloud container clusters update CLUSTER_NAME --zone ZONE --update-addons=NetworkPolicy=ENABLED
            gcloud container clusters update CLUSTER_NAME --zone ZONE --enable-network-policy
            ```
    refs:
      - url: https://cloud.google.com/kubernetes-engine/docs/concepts/security-overview
        title: GKE Security Overview
  - uid: mondoo-gcp-security-gke-cluster-network-policy-enabled-gcp
    filters: asset.platform == "gcp-gke-cluster"
    mql: gcp.project.gkeService.cluster.addonsConfig.networkPolicyConfig['disabled'] != true
  - uid: mondoo-gcp-security-gke-cluster-network-policy-enabled-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' &&
        terraform.resources.contains(nameLabel == 'google_container_cluster')
    mql: |
      terraform.resources('google_container_cluster').all(
        blocks.where(type == 'network_policy').any(arguments.enabled == true)
      )
  - uid: mondoo-gcp-security-gke-cluster-network-policy-enabled-terraform-plan
    filters: |
      asset.platform == 'terraform-plan'
      terraform.plan.resourceChanges.contains(type == 'google_container_cluster')
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_container_cluster').all(
        change.after['network_policy'] != empty &&
        change.after['network_policy'].any(_['enabled'] == true)
      )
