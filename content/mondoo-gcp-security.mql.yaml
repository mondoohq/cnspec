  - uid: mondoo-gcp-security-spanner-iam-no-primitive-roles
    title: Ensure Spanner instance and database IAM grant no primitive roles
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-2
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-5
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-3-3
      compliance/vda-isa-5: vda-isa-5-4-2-1
    variants:
      - uid: mondoo-gcp-security-spanner-iam-no-primitive-roles-gcp
        tags:
          mondoo.com/filter-title: GCP Spanner
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-spanner-iam-no-primitive-roles-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-spanner-iam-no-primitive-roles-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-spanner-iam-no-primitive-roles-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that no IAM binding on a Cloud Spanner instance or any of its databases grants the primitive roles `roles/owner`, `roles/editor`, or `roles/viewer`. Spanner provides fine-grained predefined roles such as `roles/spanner.databaseAdmin`, `roles/spanner.databaseUser`, and `roles/spanner.databaseReader` that should replace any primitive grant.

        **Why this matters**

        - **Scope creep by design:** Primitive roles grant permissions across every resource type in the project, not just Spanner, so an `roles/editor` binding on a Spanner instance silently covers Cloud Storage, Compute, and dozens of other services.
        - **Automatic privilege expansion:** Google adds new Spanner features to primitive roles over time; a principal bound to `roles/editor` today gains permissions to new Spanner capabilities tomorrow without any administrator action.
        - **Owner risk:** `roles/owner` carries IAM-modification rights, meaning the holder can grant themselves or others any additional role on the Spanner resource.
        - **Viewer oversharing:** `roles/viewer` exposes database schemas, row-level data, and backup metadata to principals that may only need to see aggregate summaries.

        **Risk mitigation**

        - **Replace primitives with Spanner predefined roles:** Audit each binding and substitute the narrowest Spanner role that covers the principal's actual use case, such as `roles/spanner.databaseReader` for read-only workloads.
        - **Manage IAM via infrastructure-as-code:** Define Spanner IAM bindings in Terraform using `google_spanner_instance_iam_member` or `google_spanner_database_iam_member` resources, which make role assignments explicit and reviewable in pull requests.
        - **Conduct periodic access reviews:** Schedule quarterly reviews of Spanner IAM policies to identify and remove stale or overly broad bindings before they become a liability.
      audit: |
        ### Audit via Console

        1. Open the [Google Cloud Console](https://console.cloud.google.com/) and navigate to **Spanner**.
        2. Select the instance and click **Permissions** in the left navigation.
        3. Review each binding in the IAM policy. Confirm no principal is granted `Owner`, `Editor`, or `Viewer`.
        4. For each database in the instance, select the database, click **Permissions**, and repeat the review.

        A passing instance and its databases show no bindings to `roles/owner`, `roles/editor`, or `roles/viewer`. A failing instance or database shows at least one primitive-role binding.

        ### Audit via CLI

        1. Check the instance-level IAM policy:

        ```bash
        gcloud spanner instances get-iam-policy INSTANCE_ID \
          --format="json(bindings)" \
          | jq '.bindings[] | select(.role == "roles/owner" or .role == "roles/editor" or .role == "roles/viewer")'
        ```

        2. Check each database-level IAM policy:

        ```bash
        gcloud spanner databases get-iam-policy DATABASE_ID \
          --instance=INSTANCE_ID \
          --format="json(bindings)" \
          | jq '.bindings[] | select(.role == "roles/owner" or .role == "roles/editor" or .role == "roles/viewer")'
        ```

        A passing instance and database return no output from the `jq` filter. A failing instance or database returns one or more bindings containing a primitive role.
      remediation:
        - id: terraform
          desc: |
            Manage Spanner IAM via the dedicated `google_spanner_instance_iam_*` and `google_spanner_database_iam_*` resources, granting only the narrow Spanner roles — not `roles/owner`, `roles/editor`, or `roles/viewer`:

            ```hcl
            resource "google_spanner_instance_iam_member" "db_admin" {
              instance = google_spanner_instance.app.name
              role     = "roles/spanner.databaseAdmin"
              member   = "group:db-admins@example.com"
            }

            resource "google_spanner_database_iam_member" "app_reader" {
              instance = google_spanner_instance.app.name
              database = google_spanner_database.app.name
              role     = "roles/spanner.databaseReader"
              member   = "serviceAccount:reporting@my-project.iam.gserviceaccount.com"
            }
            ```
        - id: console
          desc: |
            Replace each primitive-role binding with a fine-grained Spanner role:

            1. Open **Spanner** → select the instance (and, if needed, the database).
            2. Select **Permissions**.
            3. For each principal bound to Owner / Editor / Viewer, remove the primitive grant and add the narrow role that matches the principal's actual use (for example `Cloud Spanner Database Admin`, `Cloud Spanner Database User`, or `Cloud Spanner Database Reader`).
            4. Save. Confirm with the principal that their workflow still works.
        - id: cli
          desc: |
            Remove a primitive role binding from an instance and grant the fine-grained equivalent:

            ```bash
            gcloud spanner instances remove-iam-policy-binding INSTANCE_ID \
              --member=user:alice@example.com \
              --role=roles/editor

            gcloud spanner instances add-iam-policy-binding INSTANCE_ID \
              --member=user:alice@example.com \
              --role=roles/spanner.databaseUser
            ```

            Repeat for each database as needed:

            ```bash
            gcloud spanner databases remove-iam-policy-binding DATABASE_ID \
              --instance=INSTANCE_ID \
              --member=user:alice@example.com \
              --role=roles/viewer
            ```
    refs:
      - url: https://cloud.google.com/spanner/docs/iam
        title: Cloud Spanner - IAM roles and permissions
      - url: https://cloud.google.com/iam/docs/understanding-roles#basic
        title: IAM - Basic (primitive) roles
