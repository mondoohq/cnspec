  - uid: mondoo-gcp-security-datastream-no-static-service-ip-connectivity
    title: Ensure Datastream profiles avoid static service IP connectivity
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-1-5
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-gcp-security-datastream-no-static-service-ip-connectivity-gcp
        tags:
          mondoo.com/filter-title: GCP Datastream
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-datastream-no-static-service-ip-connectivity-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-datastream-no-static-service-ip-connectivity-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-datastream-no-static-service-ip-connectivity-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Datastream connection profiles are not configured to use static service IP connectivity. Static service IP connectivity requires the source database to allowlist Datastream's published, project-shared public IP ranges, effectively exposing the source to inbound connections from public addresses controlled by Google but shared across many customers.

        **Why this matters**

        - **Public internet exposure:** The source database must accept inbound connections from Datastream's public IP ranges, removing the VPC boundary as a protective control.
        - **Shared IP space:** Datastream's static service IPs are shared across multiple Google customers and published publicly, so the allowlist does not restrict access to a specific account or identity.
        - **Credential-only defense:** Without a VPC-level boundary, the only protection against unauthorized access to the source database is credential verification, which is a single control point.
        - **No egress isolation:** There is no VPC-level firewall or service perimeter separating Datastream traffic from the source database network when static service IPs are used.

        **Risk mitigation**

        - **Private connectivity:** Using `privateConnectivity` with a VPC-peered private connection moves all Datastream-to-source traffic off the public internet and into a network boundary the organization controls.
        - **Access scope reduction:** Private connectivity limits which identities and workloads can reach the source database to only those with access to the peered VPC, reducing the attack surface significantly.
      audit: |
        ### Audit via Console

        1. Open the [Google Cloud Console](https://console.cloud.google.com/) and navigate to **Datastream > Connection profiles**.
        2. Select each source connection profile.
        3. On the profile details page, locate the **Connectivity method** field and confirm it is not set to **IP allowlisting** (static service IP).

        A passing connection profile shows **Private connectivity** as the connectivity method. A failing connection profile shows **IP allowlisting** (static service IP).

        ### Audit via CLI

        1. List all connection profiles and inspect their connectivity type:

        ```bash
        gcloud datastream connection-profiles list \
          --location=LOCATION \
          --format="table(name,connectivityType)"
        ```

        A passing connection profile returns a `CONNECTIVITY_TYPE` value other than `STATIC_SERVICE_IP_CONNECTIVITY`. A failing connection profile returns `STATIC_SERVICE_IP_CONNECTIVITY`.
      remediation:
        - id: terraform
          desc: |
            Replace `static_service_ip_connectivity` with `private_connectivity`:

            ```hcl
            resource "google_datastream_private_connection" "pc" {
              private_connection_id = "my-private-connection"
              location              = "us-central1"
              display_name          = "my-private-connection"

              vpc_peering_config {
                vpc    = google_compute_network.source_vpc.id
                subnet = "10.0.0.0/29"
              }
            }

            resource "google_datastream_connection_profile" "src" {
              connection_profile_id = "src"
              location              = "us-central1"
              display_name          = "src"

              mysql_profile {
                hostname = "10.0.0.10"
                username = "datastream"
                password = "<set via secret_manager_stored_password>"
              }

              private_connectivity {
                private_connection = google_datastream_private_connection.pc.id
              }
            }
            ```
        - id: console
          desc: |
            Connectivity type is fixed at connection-profile creation. Recreate the source profile with **Private connectivity** selected, after creating a private connection that peers Datastream into the source's VPC.
        - id: cli
          desc: |
            Recreate the source connection profile with `--private-connection`:

            ```bash
            gcloud datastream connection-profiles create PROFILE_ID \
              --location=LOCATION \
              --display-name=DISPLAY_NAME \
              --type=mysql \
              --mysql-hostname=HOST --mysql-username=USER --mysql-password=PWD \
              --private-connection=PRIVATE_CONNECTION_ID
            ```
    refs:
      - url: https://cloud.google.com/datastream/docs/network-connectivity-options
        title: Datastream network connectivity options
