          mondoo.com/filter-title: GCP Cloud DNS Managed Zone
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-cloud-dns-rsasha1-ksk-not-used-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-dns-rsasha1-ksk-not-used-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-dns-rsasha1-ksk-not-used-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that the DNSSEC key-signing key (KSK) for public Cloud DNS managed zones does not use the RSASHA1 algorithm. RSASHA1 is considered cryptographically weak; Google has deprecated it and requires a support contract and allowlisting to use, reflecting that the algorithm no longer meets modern security standards for protecting DNS zone authentication.

        **Why this matters**

        - **Cryptographic weakness:** SHA-1 collision attacks are practically feasible with sufficient compute resources; a KSK signed with RSASHA1 can potentially be forged, undermining the entire DNSSEC trust chain for the zone.
        - **Deprecation by major authorities:** NIST, IETF, and Google have all deprecated SHA-1 for cryptographic signing purposes; continued use creates compliance gaps and signals poor cryptographic hygiene to auditors.
        - **DNSSEC chain-of-trust integrity:** The KSK signs the DNSKEY record set and anchors the zone's trust chain; if the KSK algorithm is weak, the entire DNSSEC protection for the zone is weakened regardless of how strong the zone-signing key is.

        **Risk mitigation**

        - **Migrate to stronger algorithms:** Replace RSASHA1 KSKs with RSASHA256, RSASHA512, ECDSAP256SHA256, or ECDSAP384SHA384; to change DNSSEC settings on an already-enabled zone, disable DNSSEC first, then re-enable it with the new algorithm configuration.
        - **Standardize on ECDSA where possible:** ECDSAP256SHA256 and ECDSAP384SHA384 provide strong security with shorter key lengths and are the preferred algorithms for modern DNSSEC deployments.
      audit: |
        **Using Google Cloud CLI**

        Ensure the property algorithm for keyType keySigning is not using `RSASHA1`:

        ```bash
        gcloud dns managed-zones describe ZONE_NAME --format="json(dnsName,dnssecConfig.state,dnssecConfig.defaultKeySpecs)"
        ```
      remediation:
        - id: console
          desc: |
            To ensure That RSASHA1 Is Not Used for the Key-Signing Key in Cloud DNS DNSSEC using the Google Cloud Console:

            1. Navigate to **Network services > Cloud DNS** in the Google Cloud Console.
            2. Select the managed zone you want to configure.
            3. Select **DNSSEC** and then **Manage DNSSEC**.
            4. If DNSSEC is already enabled, first set it to **Off** and save.
            5. Re-enable DNSSEC by setting it to **On**.
            6. Under **Key-signing key algorithm**, select a strong algorithm such as **RSASHA256**, **ECDSAP256SHA256**, or **ECDSAP384SHA384**.
            7. Select **Save** to apply the new configuration.
        - id: cli
          desc: |
            To ensure That RSASHA1 Is Not Used for the Key-Signing Key in Cloud DNS DNSSEC using the Google Cloud CLI:

            1. To change DNSSEC settings on an already enabled managed zone, first disable it:

            ```bash
            gcloud dns managed-zones update ZONE_NAME --dnssec-state off
            ```

            2. Then, re-enable it with the desired key-signing and denial-of-existence settings:

            ```bash
            gcloud dns managed-zones update ZONE_NAME --dnssec-state on --ksk-algorithm KSK_ALGORITHM --ksk-key-length KSK_KEY_LENGTH --zsk-algorithm ZSK_ALGORITHM --zsk-key-length ZSK_KEY_LENGTH --denial-of-existence DENIAL_OF_EXISTENCE
            ```

            **Supported algorithm options and key lengths:**

            | Algorithm | KSK Length | ZSK Length |
            |-----------|------------|------------|
            | RSASHA1 | 1024,2048 | 1024,2048 |
            | RSASHA256 | 1024,2048 | 1024,2048 |
            | RSASHA512 | 1024,2048 | 1024,2048 |
            | ECDSAP256SHA256 | 256 | 256 |
            | ECDSAP384SHA384 | 384 | 384 |
        - id: terraform
          desc: |
            To ensure That RSASHA1 Is Not Used for the Key-Signing Key in Cloud DNS DNSSEC in Terraform, avoid using RSASHA1 for key-signing keys in your DNSSEC configuration. Use stronger algorithms like RSASHA256, RSASHA512, or ECDSA variants:

            ```hcl
            resource "google_dns_managed_zone" "example" {
              name         = "example-zone"
              dns_name     = "example.com."
              description  = "Example managed zone"
              visibility   = "public"

              dnssec_config {
                state = "on"
                # Use RSASHA256 instead of RSASHA1 for key-signing
                default_key_specs {
                  algorithm  = "rsasha256"  # Not rsasha1
                  key_length = 2048
                  key_type   = "keySigning"
                }
                default_key_specs {
                  algorithm  = "rsasha256"
                  key_length = 2048
                  key_type   = "zoneSigning"
                }
              }
            }
            ```

            **Prevention:**

            Always use strong cryptographic algorithms in your Terraform DNSSEC configurations. Avoid RSASHA1 and prefer RSASHA256, RSASHA512, or ECDSA algorithms. Use Terraform validation rules to prevent weak algorithms from being deployed.
