  - uid: mondoo-gcp-security-logging-bucket-locked
    title: Ensure Cloud Logging log buckets are locked to prevent tampering
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-09
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-pr-pt-1
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-9
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-8
      compliance/pci-dss-4: pcidss-requirement-10-3-2
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    variants:
      - uid: mondoo-gcp-security-logging-bucket-locked-gcp
        tags:
          mondoo.com/filter-title: GCP Logging Bucket
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-logging-bucket-locked-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-logging-bucket-locked-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-logging-bucket-locked-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that custom Cloud Logging log buckets are locked to prevent modification or deletion; the system-managed `_Default` and `_Required` buckets are excluded from this requirement because they are protected by Google. Locking a bucket makes its retention period immutable and prevents the bucket from being deleted, providing a tamper-proof audit trail.

        **Why this matters**

        - **Tamper prevention:** A locked bucket cannot have its retention period reduced or be deleted, preventing attackers who gain project access from covering their tracks by erasing log evidence.
        - **Immutable audit trail:** Compliance frameworks that require tamper-proof records demand that log integrity be guaranteed beyond access controls alone.
        - **Irreversible guarantee:** Because a bucket cannot be unlocked once locked, the protection is permanent and cannot be bypassed even by a future privileged actor.
        - **Forensic integrity:** Security investigations and regulatory audits depend on log data that has not been altered since the events were recorded.

        **Risk mitigation**

        - **Lock before retention expires:** Verify and finalize retention settings before locking a bucket, since the retention period cannot be reduced after locking.
        - **Use the `_Required` bucket for critical logs:** Admin activity and system event logs routed to `_Required` are automatically protected by Google and need not be re-locked manually.
        - **Layer with export sinks:** Send logs to additional locked storage destinations for defense-in-depth in case bucket-level protections are insufficient.
      audit: |
        ### Audit via Console

        1. Sign in to the [Google Cloud Console](https://console.cloud.google.com) and open the target project.
        2. Navigate to **Logging > Logs Storage**.
        3. For each custom log bucket (excluding `_Default` and `_Required`), check the **Locked** column or open the bucket details to view the locked status.

        A passing log bucket shows **Locked: true** in the bucket details. A failing log bucket shows **Locked: false**.

        ### Audit via CLI

        1. List all log buckets and check the locked field:

        ```bash
        gcloud logging buckets list --format="table(name,location,retentionDays,locked)"
        ```

        A passing log bucket returns `True` in the `LOCKED` column. A failing log bucket returns `False` or an empty value.
      remediation:
        - id: terraform
          desc: |
            To ensure Cloud Logging log buckets are locked to prevent tampering in Terraform, configure a locked log bucket:

            ```hcl
            resource "google_logging_project_bucket_config" "example" {
              project        = var.project_id
              location       = "global"
              bucket_id      = "my-audit-bucket"
              retention_days = 365
              locked         = true
            }
            ```

            Note: Once a bucket is locked, it cannot be unlocked or deleted.
        - id: console
          desc: |
            To ensure Cloud Logging log buckets are locked to prevent tampering using the Google Cloud Console:

            1. Navigate to **Logging > Logs Storage** in the Google Cloud Console.
            2. Select the log bucket you want to lock.
            3. Select **Edit** and enable the **Lock bucket** option.
            4. Confirm the action. Note: This action is irreversible.
        - id: cli
          desc: |
            To ensure Cloud Logging log buckets are locked to prevent tampering using the Google Cloud CLI, lock a log bucket:

            ```bash
            gcloud logging buckets update BUCKET_ID --location=LOCATION --locked
            ```

            Note: This action is irreversible. Ensure retention settings are correct before locking.
    refs:
      - url: https://cloud.google.com/logging/docs/buckets
        title: Cloud Logging buckets overview
      - url: https://cloud.google.com/logging/docs/storage#locked-bucket
        title: Locked log buckets
  - uid: mondoo-gcp-security-logging-bucket-locked-gcp
    filters: |
      asset.platform == 'gcp-logging-bucket'
      gcp.project.loggingservice.bucket.name != "_Default"
      gcp.project.loggingservice.bucket.name != "_Required"
    mql: |
      gcp.project.loggingservice.bucket.locked == true
  - uid: mondoo-gcp-security-logging-bucket-locked-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_logging_project_bucket_config')
    mql: |
      terraform.resources('google_logging_project_bucket_config').all(
        arguments.locked == true
      )
  - uid: mondoo-gcp-security-logging-bucket-locked-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_logging_project_bucket_config')
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_logging_project_bucket_config').all(
        change.after.locked == true
      )
  - uid: mondoo-gcp-security-logging-bucket-locked-terraform-state
