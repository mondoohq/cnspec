      )
  - uid: mondoo-gcp-security-compute-service-attachment-consumer-reviewed
    title: Ensure PSC service attachments do not accept connections automatically
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-16
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-5
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-4-2-1
    variants:
      - uid: mondoo-gcp-security-compute-service-attachment-consumer-reviewed-gcp
        tags:
          mondoo.com/filter-title: GCP Private Service Connect
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-compute-service-attachment-consumer-reviewed-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-compute-service-attachment-consumer-reviewed-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-compute-service-attachment-consumer-reviewed-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that every Private Service Connect (PSC) service attachment either requires manual connection approval or restricts consumers via an explicit accept list. By default, a service attachment can be configured with `ACCEPT_AUTOMATIC` and no consumer restrictions, which makes the backing service reachable by any consumer project in the GCP organization without producer-side review.

        **Why this matters**

        - **Unreviewed consumer access:** An attachment set to `ACCEPT_AUTOMATIC` with an empty consumer accept list allows any project that knows the attachment target to consume it, with no notification to the service producer.
        - **Broken tenant segmentation:** Organizations that segment environments or tenants rely on the accept list to enforce boundaries; automatic acceptance bypasses that segmentation entirely.
        - **Unintended data exposure:** The backing service may be a database, internal API, or sensitive tool designed for a known, bounded set of consumers, not open organizational consumption.
        - **Supply chain risk:** An adversary who gains access to any project in the organization can connect to automatic-accept attachments and probe internal service APIs.

        **Risk mitigation**

        - **Producer-controlled connections:** Requiring manual approval or an explicit accept list gives the service team visibility and control over every new consumer.
        - **Preserved identity boundary:** Maintaining an allowlist ensures that consumer identity remains a meaningful security boundary.
        - **Cross-tenant isolation:** Preventing automatic acceptance eliminates accidental cross-project or cross-tenant data access through PSC.
      audit: |
        ### Audit via Console

        1. Sign in to the Google Cloud Console and navigate to **Network services** > **Private Service Connect** > **Published services**.
        2. For each service attachment, check the **Connection preference** column.
        3. If **Connection preference** is **Accept connections automatically**, verify that an explicit **Consumer accept list** with specific project IDs or network entries is configured.

        A passing service attachment either shows **Accept manual connections** as the preference, or shows **Accept connections automatically** with a non-empty consumer accept list. A failing service attachment shows **Accept connections automatically** with no consumer accept list entries.

        ### Audit via CLI

        1. List all service attachments and inspect their connection preference and consumer accept lists:

        ```bash
        gcloud compute service-attachments list \
          --format="table(name,region,connectionPreference,consumerAcceptLists)"
        ```

        A passing service attachment returns `connectionPreference: ACCEPT_MANUAL` or returns `connectionPreference: ACCEPT_AUTOMATIC` with a non-empty `consumerAcceptLists`. A failing service attachment returns `connectionPreference: ACCEPT_AUTOMATIC` with an empty `consumerAcceptLists`.
      remediation:
        - id: terraform
          desc: |
            Set `connection_preference` to `ACCEPT_MANUAL`, or use `ACCEPT_AUTOMATIC` only with an explicit `consumer_accept_lists`:

            ```hcl
            resource "google_compute_service_attachment" "svc" {
              name                  = "my-svc"
              region                = "us-central1"
              target_service        = google_compute_forwarding_rule.psc.id
              nat_subnets           = [google_compute_subnetwork.psc_nat.id]
              connection_preference = "ACCEPT_MANUAL"
              # Or: connection_preference = "ACCEPT_AUTOMATIC" with an explicit list:
              # consumer_accept_lists {
              #   project_id_or_num = "consumer-project-id"
              #   connection_limit  = 10
              # }
            }
            ```
        - id: console
          desc: |
            Tighten the service attachment's consumer policy:

            1. Open **Network services** → **Private Service Connect** → **Published services**.
            2. Edit the service attachment.
            3. Set **Connection preference** to **Accept connections for selected projects and networks** and populate the accept list with specific consumer project IDs / networks, **OR** set it to **Accept manual connections** to require per-connection approval.
        - id: cli
          desc: |
            Switch an existing service attachment to manual-accept:

            ```bash
            gcloud compute service-attachments update <attachment> \
              --region=<region> \
              --connection-preference=ACCEPT_MANUAL
            ```
    refs:
