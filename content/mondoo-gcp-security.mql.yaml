  - uid: mondoo-gcp-security-cloud-armor-rules-not-preview-only
    title: Ensure Cloud Armor security policy rules are not in preview-only mode
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-3
    variants:
      - uid: mondoo-gcp-security-cloud-armor-rules-not-preview-only-gcp
        tags:
          mondoo.com/filter-title: GCP Cloud Armor
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-cloud-armor-rules-not-preview-only-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-armor-rules-not-preview-only-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-armor-rules-not-preview-only-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Cloud Armor security policy rules are configured in enforcement mode rather than preview mode, so that matching requests are actually allowed or denied rather than merely logged. When a rule has `preview: true`, it generates log entries for matching traffic but takes no enforcement action, leaving the protected backend completely unprotected against the threats the rule is intended to block.

        **Why this matters**

        - **No actual enforcement:** Preview mode rules log matching requests but allow them through unconditionally; the backend receives every request regardless of the rule's configured action.
        - **False sense of security:** Operators reviewing the security policy may believe rules are active when they are only observing, creating a gap between perceived and actual protection.
        - **Preview is a test state:** Cloud Armor preview mode is intended for short-term validation before enabling enforcement; leaving rules in preview indefinitely defeats the purpose of deploying a WAF or DDoS policy.
        - **Attack exploitation window:** Threat actors who probe for WAF bypasses may discover that preview-mode policies are not enforced and exploit the unprotected endpoints.

        **Risk mitigation**

        - **Disable preview on all production rules:** Set `preview: false` (or omit the field) on every rule in production security policies; use dedicated staging environments for rule testing.
        - **Review before promoting:** Validate rule behavior in a pre-production environment using preview mode, then remove the preview flag before deploying the policy to production load balancers.
        - **Alert on preview-mode rule creation:** Use Cloud Monitoring or Event Threat Detection to notify the security team when a security policy rule is created or modified with preview mode enabled.
      audit: |
        ### Audit via Console

        1. In the Google Cloud Console, navigate to **Network Security > Cloud Armor policies**.
        2. Click each security policy name to open its details.
        3. Review the **Rules** list and check the **Preview** column for each rule.

        A passing security policy shows no rules with preview mode enabled (all rules show **Preview: Off**). A failing security policy shows one or more rules with **Preview: On**.

        ### Audit via CLI

        1. List all security policies and describe each to inspect rule preview settings:

        ```bash
        gcloud compute security-policies describe POLICY_NAME \
          --format="json(rules[].preview,rules[].priority,rules[].action)"
        ```

        A passing security policy returns no rule entries where `preview` is `true`. A failing security policy returns one or more rules where `preview` is `true`.
      remediation:
        - id: terraform
          desc: |
            To ensure Cloud Armor security policy rules are not in preview-only mode in Terraform, set `preview` to `false` on all security policy rules:

            ```hcl
            resource "google_compute_security_policy" "policy" {
              name = "my-policy"

              rule {
                action   = "deny(403)"
                priority = 1000
                preview  = false

                match {
                  versioned_expr = "SRC_IPS_V1"
                  config {
                    src_ip_ranges = ["0.0.0.0/0"]
                  }
                }
              }
            }
            ```
        - id: console
          desc: |
            To ensure Cloud Armor security policy rules are not in preview-only mode using the Google Cloud Console:

            1. Go to the **Network Security > Cloud Armor policies** page.
            2. Select the security policy.
            3. For each rule in preview mode, select **Edit**.
            4. Uncheck **Enable preview mode**.
            5. Select **Update**.
        - id: cli
          desc: |
            To ensure Cloud Armor security policy rules are not in preview-only mode using the Google Cloud CLI:

            ```bash
            gcloud compute security-policies rules update PRIORITY \
              --security-policy=POLICY_NAME \
              --no-preview
            ```
    refs:
      - url: https://cloud.google.com/armor/docs/security-policy-overview
        title: Cloud Armor security policies overview
      - url: https://cloud.google.com/armor/docs/configure-security-policies
        title: Configure Cloud Armor security policies
  - uid: mondoo-gcp-security-cloud-armor-rules-not-preview-only-gcp
    filters: asset.platform == 'gcp'
    mql: |
      gcp.project.computeService.securityPolicies.all(
        rules().none(preview == true)
      )
  - uid: mondoo-gcp-security-cloud-armor-rules-not-preview-only-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_compute_security_policy')
    mql: |
      terraform.resources('google_compute_security_policy').all(
        blocks.where(type == 'rule').all(
          arguments.preview != true
        )
      )
  - uid: mondoo-gcp-security-cloud-armor-rules-not-preview-only-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_compute_security_policy')
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_compute_security_policy').all(
