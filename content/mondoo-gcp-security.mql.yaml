  - uid: mondoo-gcp-security-cloud-redis-cmek-configured
    title: Ensure Cloud Redis instances are encrypted with CMEK
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-gcp-security-cloud-redis-cmek-configured-memorystore-redis
        tags:
          mondoo.com/filter-title: GCP Memorystore Redis
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-cloud-redis-cmek-configured-memorystore-rediscluster
        tags:
          mondoo.com/filter-title: GCP Memorystore Redis Cluster
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-cloud-redis-cmek-configured-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-redis-cmek-configured-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-redis-cmek-configured-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Cloud Memorystore for Redis instances are encrypted using customer-managed encryption keys (CMEK) configured through Cloud KMS, rather than the default Google-managed keys. By default, Google Cloud encrypts all Memorystore data at rest with Google-managed keys, which provides baseline protection but gives the organization no control over key lifecycle, rotation schedule, or access revocation.

        **Why this matters**

        - **No independent key control:** Google-managed encryption keys cannot be rotated on a custom schedule, and the organization cannot revoke access to its own encrypted data by disabling or destroying the key.
        - **Audit log gaps:** Key usage events for Google-managed keys are not surfaced to the customer; CMEK provides Cloud Audit Logs for all encrypt and decrypt operations, enabling monitoring and compliance reporting.
        - **Data access revocation:** With CMEK, an organization can immediately prevent all access to Redis data by disabling or destroying the KMS key, a capability that is essential for incident response and data subject deletion requirements.
        - **Compliance requirements:** PCI DSS, HIPAA, and SOC 2 assessments for sensitive data stores often require organizations to demonstrate control over encryption key management, which Google-managed keys cannot satisfy.

        **Risk mitigation**

        - **Configure CMEK at instance creation:** Specify the `customer_managed_key` field when creating a Redis instance, as CMEK cannot be added to an existing instance; plan key configuration before provisioning.
        - **Apply least-privilege key access:** Grant Cloud Memorystore the `cloudkms.cryptoKeyEncrypterDecrypter` role on the specific KMS key rather than on the entire key ring or project.
        - **Enable automatic key rotation:** Configure a rotation period on the KMS key that meets organizational or regulatory requirements, and monitor Cloud Audit Logs for key usage anomalies.
      audit: |
        ### Audit via Console

        1. Sign in to the [Google Cloud Console](https://console.cloud.google.com) and open the target project.
        2. Navigate to **Memorystore > Redis**.
        3. Select each Redis instance.
        4. In the instance details, review the **Encryption** section for the **Customer-managed key** field.

        A passing instance shows a Cloud KMS key resource name in the encryption section. A failing instance shows no customer-managed key (Google-managed encryption only).

        ### Audit via CLI

        1. Describe each Redis instance and check for the `customerManagedKey` field:

        ```bash
        gcloud redis instances describe INSTANCE_NAME --region=REGION --format="value(customerManagedKey)"
        ```

        A passing instance returns a non-empty Cloud KMS key resource name. A failing instance returns an empty value.
      remediation:
        - id: terraform
          desc: |
            To ensure Cloud Redis instances are encrypted with CMEK in Terraform:

            ```hcl
            resource "google_redis_instance" "cache" {
              name           = "my-redis-instance"
              tier           = "STANDARD_HA"
              memory_size_gb = 1
              region         = "us-central1"

              customer_managed_key = google_kms_crypto_key.redis_key.id
            }

            resource "google_kms_crypto_key" "redis_key" {
              name     = "redis-encryption-key"
              key_ring = google_kms_key_ring.redis_ring.id
            }
            ```
        - id: console
          desc: |
            To ensure Cloud Redis instances are encrypted with CMEK using the Google Cloud Console, note: CMEK must be configured at instance creation time and cannot be added to an existing instance.

            1. Go to the **Memorystore > Redis** page in the Google Cloud Console.
            2. Select **Create Instance**.
            3. In the **Encryption** section, select **Customer-managed key**.
            4. Select or create a Cloud KMS key.
            5. Complete the instance creation.
        - id: cli
          desc: |
            To ensure Cloud Redis instances are encrypted with CMEK using the Google Cloud CLI, note: CMEK must be configured at instance creation time.

            ```bash
            gcloud redis instances create INSTANCE_NAME \
              --region=REGION \
              --tier=STANDARD_HA \
              --size=1 \
              --customer-managed-key=projects/PROJECT/locations/LOCATION/keyRings/RING/cryptoKeys/KEY
            ```
    refs:
      - url: https://cloud.google.com/memorystore/docs/redis/about-cmek
        title: Cloud Memorystore Redis CMEK documentation
  - uid: mondoo-gcp-security-cloud-redis-cmek-configured-memorystore-redis
    filters: asset.platform == "gcp-memorystore-redis"
    mql: |
      gcp.project.redisService.instance.kmsKey != empty
  - uid: mondoo-gcp-security-cloud-redis-cmek-configured-memorystore-rediscluster
