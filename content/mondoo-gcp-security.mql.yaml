  - uid: mondoo-gcp-security-vertexai-feature-online-store-cmek-encryption-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'google_vertex_ai_feature_online_store')
    mql: |
      terraform.state.resources.where(type == 'google_vertex_ai_feature_online_store').all(
        values.encryption_spec != empty
      )
  - uid: mondoo-gcp-security-firewall-no-unrestricted-egress
    title: Ensure firewall rules do not allow unrestricted egress
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-2
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-gcp-security-firewall-no-unrestricted-egress-gcp
        tags:
          mondoo.com/filter-title: GCP Compute Firewall
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-firewall-no-unrestricted-egress-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-firewall-no-unrestricted-egress-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-firewall-no-unrestricted-egress-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that GCP firewall rules do not allow egress traffic on all protocols to all destinations (0.0.0.0/0 or ::/0). By default, GCP includes an implied allow-all egress rule; explicit allow-all egress rules on all protocols maximize the channels available to an attacker after initial compromise.

        **Why this matters**

        - **Data exfiltration:** A compromised instance with unrestricted egress can freely send data to any external host using any protocol, bypassing monitoring that inspects only common ports.
        - **Command-and-control:** Malware can establish outbound connections to attacker-controlled infrastructure on any port or protocol without firewall interference.
        - **Blast radius:** Unrestricted protocol and destination access gives attackers maximum flexibility to pivot from a compromised workload to external targets.
        - **Defense in depth:** Explicit egress restrictions complement ingress controls by limiting what a compromised instance can do even after it is breached.

        **Risk mitigation**

        - **Explicit allow-list:** Replace broad egress rules with targeted rules that permit only the specific protocols, ports, and destinations required by each workload.
        - **Egress audit:** Regularly review egress rules with `gcloud compute firewall-rules list --filter="direction=EGRESS"` to identify and remove overly permissive entries.
      audit: |
        ### Audit via Console

        1. In the Google Cloud Console, navigate to **VPC Network > Firewall**.
        2. Review the list of firewall rules.
        3. For each rule with **Direction** set to **Egress**, check the **Destination IP ranges** column.
        4. Identify any rules where **Protocols and ports** is set to **Allow all** and **Destination IP ranges** includes `0.0.0.0/0` or `::/0`.

        A passing firewall rule has egress restricted to specific destination ranges rather than `0.0.0.0/0` or `::/0` when the protocol is `all`. A failing rule allows all protocols to `0.0.0.0/0` or `::/0`.

        ### Audit via CLI

        1. List egress firewall rules that allow all protocols and inspect their destination ranges:

        ```bash
        gcloud compute firewall-rules list \
          --filter="direction=EGRESS AND allowed[0].IPProtocol=all" \
          --format="table(name,network,destinationRanges,allowed)"
        ```

        A passing firewall rule returns destination ranges that do not include `0.0.0.0/0` or `::/0`. A failing rule returns `0.0.0.0/0` or `::/0` in the destination ranges.
      remediation:
        - id: console
          desc: |
            To ensure firewall rules do not allow unrestricted egress using the Google Cloud Console:

            1. Navigate to **VPC Network** > **Firewall**.
            2. Identify egress rules with destination range `0.0.0.0/0` and protocol `all`.
            3. Edit or delete the rule to restrict to specific destinations and protocols.
            4. Create targeted egress rules that allow only required outbound traffic.
        - id: cli
          desc: |
            To ensure firewall rules do not allow unrestricted egress using the gcloud CLI, list unrestricted egress rules:

            ```bash
            gcloud compute firewall-rules list \
              --filter="direction=EGRESS AND allowed[0].IPProtocol=all AND destinationRanges=0.0.0.0/0" \
              --format="table(name, network, destinationRanges, allowed)"
            ```

            Delete or update the rule:

            ```bash
            gcloud compute firewall-rules delete <rule-name>
            ```
        - id: terraform
          desc: |
            To ensure firewall rules do not allow unrestricted egress in Terraform, ensure egress rules specify restricted destinations and protocols:

            ```hcl
            resource "google_compute_firewall" "allow_egress" {
              name    = "allow-specific-egress"
              network = google_compute_network.default.id

              direction = "EGRESS"

              allow {
                protocol = "tcp"
                ports    = ["443"]
              }

              destination_ranges = ["10.0.0.0/8"]
            }
            ```
    refs:
      - url: https://cloud.google.com/vpc/docs/firewalls
        title: Google Cloud Documentation - VPC firewall rules
