  - uid: mondoo-gcp-security-vertexai-model-cmek-encryption
    title: Ensure Vertex AI models are encrypted with CMEK
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-gcp-security-vertexai-model-cmek-encryption-gcp
        tags:
          mondoo.com/filter-title: GCP Vertex AI
          mondoo.com/filter-icon: gcp
    docs:
      desc: |
        This check ensures that Vertex AI models are configured to use customer-managed encryption keys (CMEK) for model artifacts rather than Google-managed default keys. By default, Vertex AI encrypts model data with keys that Google controls, offering organizations no ability to independently revoke access, set custom rotation schedules, or audit key usage for potentially sensitive model artifacts.

        **Why this matters**

        - **Key control:** CMEK gives organizations direct authority over the encryption key protecting model artifacts, enabling rotation policies and access constraints beyond what Google-managed keys allow.
        - **Revocability:** Disabling or destroying the Cloud KMS key immediately prevents access to all encrypted model artifacts, providing a containment mechanism unavailable with Google-managed encryption.
        - **Implicit data sensitivity:** Trained models may encode patterns from sensitive training data; encrypting them under customer-controlled keys ensures that access to model artifacts can be revoked independently of training data access.
        - **Audit visibility:** Key usage events appear in Cloud Audit Logs for Cloud KMS, providing an auditable record of who accessed encryption operations on model artifacts.

        **Risk mitigation**

        - **Intellectual property protection:** CMEK allows organizations to revoke access to proprietary model artifacts immediately if a credential compromise is detected, limiting the window for unauthorized model extraction.
        - **Data leakage via models:** If model artifacts implicitly encode sensitive training patterns, revoking the CMEK key prevents those patterns from being extracted even when other access paths remain open.
      audit: |
        ### Audit via Console

        1. In the Google Cloud Console, navigate to **Vertex AI > Model Registry**.
        2. Click each model name to open its details.
        3. Under the **Model details** section, look for the **Encryption** field.

        A passing model shows a Cloud KMS key name under **Encryption**. A failing model shows no encryption key configured or only Google-managed encryption.

        ### Audit via CLI

        1. List all Vertex AI models and their encryption specification:

        ```bash
        gcloud ai models list \
          --region=REGION \
          --format="table(name,displayName,encryptionSpec.kmsKeyName)"
        ```

        A passing model returns a KMS key name in the `KMS_KEY_NAME` column. A failing model returns an empty value in that column.
      remediation:
        - id: terraform
          desc: |
            Note: Vertex AI models cannot be created via Terraform. Use the Google Cloud Console or gcloud CLI to upload models with CMEK encryption:

            ```bash
            gcloud ai models upload \
              --region=REGION \
              --display-name=MODEL_NAME \
              --encryption-kms-key-name=projects/PROJECT/locations/LOCATION/keyRings/KEYRING/cryptoKeys/KEY \
              --container-image-uri=IMAGE_URI
            ```
        - id: console
          desc: |
            To ensure Vertex AI models are encrypted with CMEK using the Google Cloud Console, note: CMEK must be configured at model upload time.

            1. Go to the **Vertex AI** page in the Google Cloud Console.
            2. Navigate to **Model Registry**.
            3. When uploading a model, expand **Encryption**.
            4. Select **Customer-managed encryption key (CMEK)**.
            5. Select or create a Cloud KMS key.
            6. Complete the model upload.
        - id: cli
          desc: |
            The `gcloud ai models upload` command does not support specifying a CMEK encryption key directly. Use the Vertex AI REST API to upload a model with CMEK:

            ```bash
            curl -X POST \
              -H "Authorization: Bearer $(gcloud auth print-access-token)" \
              -H "Content-Type: application/json" \
              "https://REGION-aiplatform.googleapis.com/v1/projects/PROJECT/locations/REGION/models:upload" \
              -d '{
                "model": {
                  "displayName": "MODEL_NAME",
                  "containerSpec": {
                    "imageUri": "IMAGE_URI"
                  },
                  "encryptionSpec": {
                    "kmsKeyName": "projects/PROJECT/locations/LOCATION/keyRings/RING/cryptoKeys/KEY"
                  }
                }
              }'
            ```
    refs:
      - url: https://cloud.google.com/vertex-ai/docs/general/cmek
        title: Customer-managed encryption keys for Vertex AI
  - uid: mondoo-gcp-security-vertexai-model-cmek-encryption-gcp
    filters: asset.platform == 'gcp-project'
    mql: |
      gcp.project.vertexai.models.all(
        encryptionSpec != empty
      )
