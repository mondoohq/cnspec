        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-org-policy-serial-port-disabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-org-policy-serial-port-disabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that the `constraints/compute.disableSerialPortAccess` organization policy is enforced, preventing interactive serial console access on all VM instances within the project. By default this constraint is not enforced, allowing any project member with sufficient permissions to enable serial port access on individual instances.

        **Why this matters**

        - **Bypasses network controls:** Serial console access operates outside VPC firewall rules and network restrictions, creating a backdoor that network-level defenses cannot block.
        - **Organization-wide prevention:** Enforcing this at the organization policy level prevents any project member from re-enabling serial port access on individual instances, unlike instance-level metadata settings which can be overridden.
        - **Defense in depth:** Combining this organization policy with instance-level serial port checks ensures serial access cannot be restored through either configuration surface.
        - **Reduced attack surface:** An attacker who compromises credentials with VM access cannot pivot through the serial console to bypass perimeter controls.

        **Risk mitigation**

        - **Credential compromise:** Restricting serial port access limits what an attacker can do with stolen credentials by removing a privileged interactive access path.
        - **Lateral movement:** Blocking console access prevents attackers from using serial sessions to install tools, modify configurations, or pivot to other systems without leaving network-visible traces.
      audit: |
        ### Audit via Console

        1. Go to the **IAM & Admin > Organization Policies** page in the Google Cloud Console.
        2. Search for the policy **Disable VM serial port access** (`compute.disableSerialPortAccess`).
        3. Select the policy and review its enforcement status.

        A passing project shows the `compute.disableSerialPortAccess` constraint with enforcement set to **On**. A failing project shows the policy as **Not configured** or enforcement set to **Off**.

        ### Audit via CLI

        1. Describe the `compute.disableSerialPortAccess` organization policy for the project:

        ```bash
        gcloud resource-manager org-policies describe compute.disableSerialPortAccess \
          --project=PROJECT_ID
        ```

        A passing project returns a policy with `booleanPolicy.enforced: true`. A failing project returns `NOT_FOUND` or a policy without `booleanPolicy.enforced: true`.
      remediation:
        - id: terraform
          desc: |
            To ensure serial port access is disabled via organization policy in Terraform:

            ```hcl
            resource "google_org_policy_policy" "disable_serial_port" {
              name   = "projects/PROJECT_ID/policies/compute.disableSerialPortAccess"
              parent = "projects/PROJECT_ID"

              spec {
                rules {
                  enforce = "TRUE"
                }
              }
            }
            ```
        - id: console
          desc: |
            To ensure serial port access is disabled via organization policy using the Google Cloud Console:

            1. Go to the **IAM & Admin > Organization Policies** page.
            2. Search for **Disable VM serial port access** (`compute.disableSerialPortAccess`).
            3. Click the policy and select **Manage Policy**.
            4. Set the enforcement to **On**.
            5. Select **Set Policy**.
        - id: cli
          desc: |
            To ensure serial port access is disabled via organization policy using the Google Cloud CLI:

            ```bash
            gcloud resource-manager org-policies enable-enforce \
              compute.disableSerialPortAccess --project=PROJECT_ID
            ```
    refs:
      - url: https://cloud.google.com/compute/docs/instances/interacting-with-serial-console
        title: Interacting with the serial console
      - url: https://cloud.google.com/resource-manager/docs/organization-policy/org-policy-constraints
        title: Organization policy constraints
  - uid: mondoo-gcp-security-org-policy-serial-port-disabled-gcp
    filters: asset.platform == 'gcp'
    mql: |
      gcp.project.orgPolicies.where(constraintName == "constraints/compute.disableSerialPortAccess").any(
        spec['rules'].any(_['enforce'] == true)
      )
  - uid: mondoo-gcp-security-org-policy-serial-port-disabled-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_org_policy_policy')
