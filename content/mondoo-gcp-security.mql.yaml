  - uid: mondoo-gcp-security-datastream-source-uses-secret-manager-password
    title: Ensure Datastream source profiles store credentials in Secret Manager
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-15
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-5-17
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-5
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-10
      compliance/pci-dss-4: pcidss-requirement-8-6-2
      compliance/soc2-2017: soc2-control-cc6-1-9
      compliance/vda-isa-5: vda-isa-5-4-1-3
    variants:
      - uid: mondoo-gcp-security-datastream-source-uses-secret-manager-password-gcp
        tags:
          mondoo.com/filter-title: GCP Datastream
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-datastream-source-uses-secret-manager-password-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-datastream-source-uses-secret-manager-password-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-datastream-source-uses-secret-manager-password-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Datastream source connection profiles for MySQL, PostgreSQL, SQL Server, and Oracle databases reference credentials stored in Secret Manager via `secretManagerStoredPassword` rather than a plaintext password field embedded in the profile resource.

        **Why this matters**

        - **Embedded credential risk:** Although the Datastream API redacts the `password` field on read, the credential still lives inside Datastream's storage layer and cannot be audited, version-controlled, or rotated without recreating the profile.
        - **Rotation complexity:** Plaintext passwords embedded in connection profiles must be updated by recreating or editing the profile, which is a higher-friction operation than rotating a Secret Manager version.
        - **No audit trail:** Access to a plaintext password on the connection profile does not produce an audit log entry, so credential use is not attributable or detectable.
        - **IAM scope mismatch:** Granting `datastream.connectionProfiles.get` to a user implicitly exposes the embedded credential; Secret Manager allows independent IAM policies on the secret itself.

        **Risk mitigation**

        - **Centralized secret lifecycle:** Secret Manager provides versioning, IAM-controlled access, and automatic rotation integration, enabling credential management independent of the Datastream connection profile.
        - **Revocation without recreation:** Disabling or destroying the Secret Manager secret version immediately prevents Datastream from re-authenticating to the source database without any changes to the connection profile itself.
      audit: |
        ### Audit via Console

        1. Go to **Datastream > Connection profiles** in the Google Cloud Console.
        2. Select each source connection profile (MySQL, PostgreSQL, SQL Server, or Oracle type).
        3. Open the profile details and inspect the **Connection details** section.
        4. Check whether the credential is configured via the **Secret Manager** option rather than a plaintext **Password** field.

        A passing connection profile shows a Secret Manager secret reference in the credentials section. A failing connection profile shows a plaintext password field populated instead of a Secret Manager reference.

        ### Audit via CLI

        1. List all Datastream connection profiles in each location and inspect the credential configuration for database source profiles:

        ```bash
        gcloud datastream connection-profiles list \
          --location=LOCATION \
          --format="table(name,displayName,createTime)"

        gcloud datastream connection-profiles describe PROFILE_ID \
          --location=LOCATION \
          --format="json(mysqlProfile,postgresqlProfile,oracleProfile,sqlServerProfile)"
        ```

        A passing connection profile returns a `secretManagerStoredPassword` field populated with a Secret Manager secret resource name in the relevant engine profile block. A failing connection profile returns a `password` field in the profile block or an empty `secretManagerStoredPassword`.
      remediation:
        - id: terraform
          desc: |
            ```hcl
            resource "google_datastream_connection_profile" "src" {
              connection_profile_id = "src"
              location              = "us-central1"
              display_name          = "src"

              postgresql_profile {
                hostname                       = "10.0.0.10"
                username                       = "datastream"
                secret_manager_stored_password = google_secret_manager_secret_version.src_pwd.name
                database                       = "appdb"
              }

              private_connectivity {
                private_connection = google_datastream_private_connection.pc.id
              }
            }
            ```
        - id: console
          desc: |
            1. In Secret Manager, create or identify a secret containing the source database password and grant the Datastream service agent the `roles/secretmanager.secretAccessor` role on it.
            2. Go to **Datastream > Connection profiles** and select the source profile.
            3. Select **Edit**, scroll to the **Connection details** section, and replace the **Password** field with the **Secret Manager** option.
            4. Choose the secret and version, save, and verify the connection still passes the **Run test** check.
        - id: cli
          desc: |
            The `--<engine>-secret-manager-stored-password` flag prefix varies by source engine. Use the variant that matches your profile type:

            ```bash
            # MySQL profile
            gcloud datastream connection-profiles update PROFILE_ID \
              --location=LOCATION \
              --mysql-secret-manager-stored-password=projects/PROJECT/secrets/SECRET_NAME/versions/VERSION

            # PostgreSQL profile
            gcloud datastream connection-profiles update PROFILE_ID \
              --location=LOCATION \
              --postgresql-secret-manager-stored-password=projects/PROJECT/secrets/SECRET_NAME/versions/VERSION

            # SQL Server profile
            gcloud datastream connection-profiles update PROFILE_ID \
              --location=LOCATION \
              --sqlserver-secret-manager-stored-password=projects/PROJECT/secrets/SECRET_NAME/versions/VERSION

            # Oracle profile
            gcloud datastream connection-profiles update PROFILE_ID \
              --location=LOCATION \
              --oracle-secret-manager-stored-password=projects/PROJECT/secrets/SECRET_NAME/versions/VERSION
            ```
    refs:
      - url: https://cloud.google.com/datastream/docs/configure-your-source-database
        title: Configure your Datastream source database (Secret Manager)
