      )
  - uid: mondoo-gcp-security-memorystore-cmek-encryption
    title: Ensure Memorystore (Valkey/Redis) instances are encrypted with CMEK
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-gcp-security-memorystore-cmek-encryption-gcp
        tags:
          mondoo.com/filter-title: GCP Memorystore (Valkey/Redis)
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-memorystore-cmek-encryption-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-memorystore-cmek-encryption-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-memorystore-cmek-encryption-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Memorystore (Valkey/Redis) instances are encrypted with a customer-managed encryption key (CMEK) rather than the Google-managed default. By default, Memorystore encrypts data at rest using Google-managed keys, which means the organization cannot independently control key rotation schedules or revoke access by destroying the key.

        **Why this matters**

        - **Key lifecycle control:** CMEK allows the organization to set custom rotation schedules and retire old key versions on its own timeline, independent of Google's key management.
        - **Cryptographic revocation:** Disabling or destroying the CMEK immediately and irrevocably cuts off access to the encrypted data, which is not possible with Google-managed keys.
        - **Auditability:** Cloud KMS logs every key use, making cache decryption auditable in a way that Google-managed encryption does not support.
        - **Compliance scope:** Frameworks such as PCI-DSS, HIPAA, and SOC 2 commonly require customer-managed encryption for stores that hold authenticators or personally identifiable information.

        **Risk mitigation**

        - **Data containment:** If a storage medium leaves the customer's logical control, disabling the CMEK renders the data unreadable without additional remediation steps.
        - **Separation of duties:** Storing the key in Cloud KMS with its own IAM policy separates key management permissions from data access permissions.
      audit: |
        ### Audit via Console

        1. Open the [Google Cloud Console](https://console.cloud.google.com/) and navigate to **Memorystore > Instances**.
        2. Select each instance.
        3. On the instance details page, locate the **Encryption** section and review the **Encryption key** field.

        A passing instance shows a customer-managed Cloud KMS key path in the **Encryption key** field. A failing instance shows **Google-managed key** or no key reference.

        ### Audit via CLI

        1. Describe each instance and inspect the `kmsKey` field:

        ```bash
        gcloud memorystore instances describe INSTANCE_ID \
          --location=LOCATION \
          --format="value(kmsKey)"
        ```

        A passing instance returns a Cloud KMS key resource path such as `projects/PROJECT/locations/LOCATION/keyRings/RING/cryptoKeys/KEY`. A failing instance returns an empty value.
      remediation:
        - id: terraform
          desc: |
            ```hcl
            resource "google_memorystore_instance" "cache" {
              instance_id = "my-instance"
              location    = "us-central1"
              shard_count = 3
              kms_key     = google_kms_crypto_key.memorystore_key.id
            }
            ```
        - id: console
          desc: |
            CMEK must be configured at instance creation time.

            1. Go to **Memorystore > Instances**.
            2. Select **Create Instance**.
            3. Under **Encryption**, select **Customer-managed key** and choose a Cloud KMS key in the same region.
            4. Complete instance creation.
        - id: cli
          desc: |
            ```bash
            gcloud memorystore instances create INSTANCE_ID \
              --location=LOCATION \
              --shard-count=3 \
              --kms-key=projects/PROJECT/locations/LOCATION/keyRings/RING/cryptoKeys/KEY
            ```
    refs:
      - url: https://cloud.google.com/memorystore/docs/valkey/about-cmek
        title: Memorystore CMEK overview
  - uid: mondoo-gcp-security-memorystore-cmek-encryption-gcp
    filters: asset.platform == 'gcp'
    mql: |
      gcp.memorystore.instances.all(kmsKey != null)
  - uid: mondoo-gcp-security-memorystore-cmek-encryption-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_memorystore_instance')
    mql: |
      terraform.resources('google_memorystore_instance').all(
        arguments.kms_key != empty && arguments.kms_key != ""
      )
  - uid: mondoo-gcp-security-memorystore-cmek-encryption-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_memorystore_instance')
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_memorystore_instance').all(
        change.after['kms_key'] != empty &&
        change.after['kms_key'] != ""
      )
  - uid: mondoo-gcp-security-memorystore-cmek-encryption-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'google_memorystore_instance')
    mql: |
      terraform.state.resources.where(type == 'google_memorystore_instance').all(
        values['kms_key'] != empty &&
        values['kms_key'] != ""
      )
  # No Terraform variants: backup-collection CMEK is not a top-level field on
  # google_memorystore_instance — backup collections inherit the instance's
  # `kms_key`, which is already covered by
  # mondoo-gcp-security-memorystore-cmek-encryption. Adding a separate Terraform
  # variant here would either duplicate that check or evaluate a field that is
  # not user-configurable in Terraform.
  - uid: mondoo-gcp-security-memorystore-backup-cmek-encryption
    title: Ensure Memorystore backup collections are encrypted with CMEK
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    docs:
      desc: |
        This check ensures that Memorystore backup collections are encrypted with a customer-managed encryption key (CMEK). Backup collections inherit the CMEK of their source instance, so an instance provisioned without CMEK produces backups that are also encrypted only with Google-managed keys.

        **Why this matters**

        - **Complete snapshot exposure:** A backup is a compact, portable copy of the entire cache keyspace, making it the most efficient path for exfiltrating data if storage access controls fail.
        - **Cryptographic revocation gap:** Without CMEK, disabling or destroying a key does not render existing backups unreadable, leaving data accessible as long as backup files exist.
        - **Audit trail gap:** Google-managed encryption does not produce key-use entries in Cloud KMS audit logs, so decryption of backup data is not attributable or detectable.
        - **Compliance inheritance:** Regulations that require customer-managed cryptography for primary data stores typically extend the same requirement to backup copies.

        **Risk mitigation**

        - **Source instance CMEK:** Configuring CMEK on the source instance at creation time propagates the key to all backup collections automatically, ensuring backups inherit the same protection.
        - **Key-based retention enforcement:** Destroying the CMEK at the end of a retention period is the only cryptographic primitive that enforces data deletion for backup data stored in managed infrastructure.
      audit: |
        ### Audit via Console

        1. Open the [Google Cloud Console](https://console.cloud.google.com/) and navigate to **Memorystore > Instances**.
        2. Select each instance and open the **Backups** tab.
        3. Review the backup collection details. Verify that the **Encryption key** field references a customer-managed Cloud KMS key.

        A passing backup collection shows a Cloud KMS key path in the **Encryption key** field. A failing backup collection shows **Google-managed key** or no key reference.

        ### Audit via CLI

        1. List backup collections for a location and inspect their KMS key:

        ```bash
        gcloud memorystore backup-collections list \
          --location=LOCATION \
          --format="table(name,kmsKey)"
        ```

        A passing backup collection returns a Cloud KMS key resource path in the `KMS_KEY` column. A failing backup collection returns an empty value.
      remediation:
        - id: console
          desc: |
            Backup-collection CMEK is determined by the source instance. To remediate, recreate the source instance with CMEK enabled (see the instance CMEK check above) and let the backup collection inherit the key.
        - id: cli
          desc: |
            Confirm the source instance is created with `--kms-key=...`. Cnspec verifies the resolved `backupCollection.kmsKey` is set:

            ```bash
            gcloud memorystore instances create INSTANCE_ID \
              --location=LOCATION \
              --shard-count=3 \
              --kms-key=projects/PROJECT/locations/LOCATION/keyRings/RING/cryptoKeys/KEY
            ```
    refs:
      - url: https://cloud.google.com/memorystore/docs/valkey/backup-and-restore
        title: Memorystore backup and restore
    filters: asset.platform == 'gcp'
    mql: |
      gcp.memorystore.backupCollections.all(kmsKey != null)
  # No Terraform variants: google_memorystore_instance only exposes
  # `psc_auto_connections` (private PSC) as a configurable input. The runtime
  # check evaluates `pscAttachmentDetails[].connectionType == "PUBLIC_ENDPOINT"`,
  # which is API-side telemetry not driven by a user-settable Terraform field.
  # A Terraform variant would be vacuously true and silently miss public-PSC
  # attachments configured outside Terraform.
  - uid: mondoo-gcp-security-memorystore-no-public-psc
    title: Ensure Memorystore Private Service Connect endpoints are not public
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-1-5
      compliance/vda-isa-5: vda-isa-5-5-2-7
    docs:
      desc: |
        This check ensures that Memorystore instances do not expose a Private Service Connect (PSC) endpoint with a connection type of `PUBLIC_ENDPOINT`. All PSC attachments should terminate inside a consumer VPC using the `PRIVATE_SERVICE_CONNECT` connection type.

        **Why this matters**

        - **Internet reachability:** A `PUBLIC_ENDPOINT` PSC connection makes the cache reachable from the public internet, dramatically expanding the attack surface beyond the intended consumer VPC.
        - **Credential-based attacks:** Even with IAM authentication enabled, public exposure subjects the cache to credential-stuffing, brute-force, and protocol-level attacks from any source on the internet.
        - **Unauthenticated risk amplification:** Combined with permissive auth settings or network ACLs, a public endpoint provides a direct unauthenticated path to read or modify cached data.
        - **Denial of service:** Cache endpoints exposed to the internet are reachable by volumetric attack traffic that can exhaust connection limits even if data access is not achieved.

        **Risk mitigation**

        - **Private endpoint enforcement:** Configuring only private PSC endpoints within consumer VPCs ensures Memorystore is reachable only from workloads with explicit network access in the correct VPC.
        - **VPC boundary controls:** Private endpoints allow firewall rules and VPC Service Controls to govern access at the network perimeter rather than relying solely on application-layer authentication.
      audit: |
        ### Audit via Console

        1. Open the [Google Cloud Console](https://console.cloud.google.com/) and navigate to **Memorystore > Instances**.
        2. Select each instance.
        3. On the instance details page, locate the **Connectivity** section. Review each listed **Private Service Connect** endpoint and confirm that no endpoint has **Connection type: Public endpoint**.

        A passing instance shows only **Private Service Connect** endpoints with **Connection type: Private**. A failing instance shows at least one endpoint with **Connection type: Public endpoint**.

        ### Audit via CLI

        1. Describe each instance and inspect its PSC attachment details:

        ```bash
        gcloud memorystore instances describe INSTANCE_ID \
          --location=LOCATION \
          --format="json(pscAutoConnections)"
        ```

        A passing instance returns PSC connections where no entry contains `"connectionType": "PUBLIC_ENDPOINT"`. A failing instance returns at least one entry with `"connectionType": "PUBLIC_ENDPOINT"`.
      remediation:
        - id: terraform
          desc: |
            Configure the instance with `psc_auto_connections` (private) only — never use public-endpoint variants:

            ```hcl
            resource "google_memorystore_instance" "cache" {
              instance_id = "my-instance"
              location    = "us-central1"
              shard_count = 3

              psc_auto_connections {
                network    = google_compute_network.consumer_vpc.id
                project_id = var.consumer_project_id
              }
            }
            ```
        - id: console
          desc: |
            Public-endpoint PSC connections must be replaced — they cannot be edited in place.

            1. Go to **Memorystore > Instances** and select the affected instance.
            2. Under **Connectivity**, identify any endpoint with **Connection type: Public endpoint**.
            3. Create a new private PSC connection in the consumer VPC (`Private Service Connect`).
            4. Migrate clients to the new endpoint and remove the public endpoint.
        - id: cli
          desc: |
            ```bash
            gcloud memorystore instances describe INSTANCE_ID \
              --location=LOCATION \
              --format="value(pscAutoConnections)"
            ```

            Recreate the instance without the public endpoint variant if any auto-connection has `connectionType: PUBLIC_ENDPOINT`.
    refs:
      - url: https://cloud.google.com/memorystore/docs/valkey/about-private-service-connect
        title: Memorystore and Private Service Connect
    filters: asset.platform == 'gcp'
    mql: |
      gcp.memorystore.instances.all(
        pscAttachmentDetails.all(connectionType != "PUBLIC_ENDPOINT")
      )
  - uid: mondoo-gcp-security-memorystore-engine-config-protected-mode
    title: Ensure Memorystore engineConfigs keep protected-mode enabled
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ip-1
      compliance/nist-csf-2: nist-csf-2-pr-ps-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-2
      compliance/pci-dss-4: pcidss-requirement-2-2-1
      compliance/soc2-2017: soc2-control-cc7-1-1
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-gcp-security-memorystore-engine-config-protected-mode-gcp
        tags:
          mondoo.com/filter-title: GCP Memorystore (Valkey/Redis)
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-memorystore-engine-config-protected-mode-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-memorystore-engine-config-protected-mode-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-memorystore-engine-config-protected-mode-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Memorystore instance `engineConfigs` does not set `protected-mode` to `"no"`. Protected mode is the Redis and Valkey safety mechanism that rejects connections from clients on non-loopback interfaces when no authentication is configured.

        **Why this matters**

        - **Unauthenticated access:** Disabling protected mode allows any client on the network segment to connect to the cache endpoint without presenting credentials, bypassing the primary access control.
        - **Known attacker tradecraft:** Disabling protected mode is a well-documented technique used after initial access to a Redis instance, enabling persistence and lateral movement without authentication barriers.
        - **Configuration drift:** The setting originates from on-premises Redis deployments where loopback-only binding was assumed; carrying it into a cloud deployment where the instance is VPC-bound creates an unexpected trust boundary.
        - **Defense-in-depth erosion:** Protected mode acts as a last-resort safeguard when IAM auth or TLS are misconfigured, so removing it eliminates a layer of defense.

        **Risk mitigation**

        - **Default safe state:** Removing the `protected-mode = no` engine config entry restores the default safe behavior without requiring any other configuration change.
        - **Auth and TLS pairing:** Relying on IAM authentication and TLS for access control, while keeping protected mode enabled, provides independent layers that each block unauthenticated access.
      audit: |
        ### Audit via Console

        1. Open the [Google Cloud Console](https://console.cloud.google.com/) and navigate to **Memorystore > Instances**.
        2. Select each instance.
        3. On the instance details page, locate **Configuration > Engine config**.
        4. Check whether a `protected-mode` key is present. If it is, verify its value is not `no`.

        A passing instance shows no `protected-mode` entry in the engine config, or shows `protected-mode = yes`. A failing instance shows `protected-mode = no`.

        ### Audit via CLI

        1. Describe the instance and inspect `engineConfigs`:

        ```bash
        gcloud memorystore instances describe INSTANCE_ID \
          --location=LOCATION \
          --format="value(engineConfigs)"
        ```

        A passing instance returns engine configs that do not contain `protected-mode: no`. A failing instance returns engine configs that include `protected-mode: no`.
      remediation:
        - id: terraform
          desc: |
            Remove `protected-mode = "no"` from `engine_configs`:

            ```hcl
            resource "google_memorystore_instance" "cache" {
              instance_id = "my-instance"
              location    = "us-central1"
              shard_count = 3

              # Do not include "protected-mode" = "no".
              engine_configs = {
                "maxmemory-policy" = "allkeys-lru"
              }
            }
            ```
        - id: console
          desc: |
            1. Go to **Memorystore > Instances** and select the instance.
            2. Under **Configuration > Engine config**, remove any `protected-mode` entry whose value is `no`.
            3. Save changes.
        - id: cli
          desc: |
            Update `engine-configs` to remove the unsafe entry. The `--engine-configs` flag replaces the entire config map, so include all values you want to keep:

            ```bash
            gcloud memorystore instances update INSTANCE_ID \
              --location=LOCATION \
              --engine-configs=maxmemory-policy=allkeys-lru
            ```
    refs:
      - url: https://cloud.google.com/memorystore/docs/valkey/supported-instance-configurations
        title: Supported Memorystore instance configurations
  - uid: mondoo-gcp-security-memorystore-engine-config-protected-mode-gcp
    filters: asset.platform == 'gcp'
    mql: |
      gcp.memorystore.instances.all(
        engineConfigs["protected-mode"] != "no"
      )
  - uid: mondoo-gcp-security-memorystore-engine-config-protected-mode-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_memorystore_instance')
    mql: |
      terraform.resources('google_memorystore_instance').all(
        arguments['engine_configs']['protected-mode'] != "no"
      )
  - uid: mondoo-gcp-security-memorystore-engine-config-protected-mode-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_memorystore_instance')
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_memorystore_instance').all(
        change.after['engine_configs']['protected-mode'] != "no"
      )
  - uid: mondoo-gcp-security-memorystore-engine-config-protected-mode-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'google_memorystore_instance')
    mql: |
      terraform.state.resources.where(type == 'google_memorystore_instance').all(
        values['engine_configs']['protected-mode'] != "no"
      )
  # No Terraform variants: this check evaluates engineVersion strings such as
  # `redis-7.0` reported by the Memorystore API, while the
  # google_memorystore_instance Terraform resource accepts engine versions in a
  # different enum format (`REDIS_7_0`, `VALKEY_8_0`). The two value spaces are
  # not directly comparable, so a Terraform variant would either silently miss
  # vulnerable versions or false-positive on supported ones until the deny-list
  # is maintained in two parallel formats. Revisit when the Terraform provider
  # exposes a normalized engine-version field.
  - uid: mondoo-gcp-security-memorystore-engine-version-supported
    title: Ensure Memorystore engine version is not a known-vulnerable release
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-tvm-03
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-8
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-12
      compliance/nist-csf-2: nist-csf-2-pr-ps-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-1
      compliance/pci-dss-4: pcidss-requirement-6-3-3
      compliance/soc2-2017: soc2-control-cc7-1-1
      compliance/vda-isa-5: vda-isa-5-5-2-5
    docs:
      desc: |
        This check ensures that Memorystore instances do not run an engine version with publicly disclosed vulnerabilities. Memorystore is a managed service, but major-version upgrades are not applied automatically, so operators who pin to an older release can be running a build with known CVEs for extended periods.

        **Why this matters**

        - **Known exploit availability:** Publicly disclosed CVEs for older Redis versions include remote code execution and denial-of-service vulnerabilities that are well-understood by attackers.
        - **No automatic major-version upgrades:** Memorystore applies minor patches within a major version but does not force major-version upgrades, requiring operators to plan and trigger the upgrade themselves.
        - **Client library lag:** Engineers often defer engine upgrades because a client library has not been re-tested against the newer version, leaving the cache on a vulnerable release longer than intended.
        - **Defense gap:** Even with network isolation in place, a vulnerable engine version can be exploited by any workload with legitimate access to the cache.

        **Risk mitigation**

        - **Upgrade planning:** Scheduling engine-version upgrades during low-traffic maintenance windows reduces the blast radius of the upgrade while eliminating the CVE exposure.
        - **Version tracking:** Monitoring upstream Valkey and Redis security advisories alongside the Memorystore release notes enables prompt identification of when an upgrade is required.
      audit: |
        ### Audit via Console

        1. Open the [Google Cloud Console](https://console.cloud.google.com/) and navigate to **Memorystore > Instances**.
        2. For each instance, note the **Engine version** shown on the instance details page.
        3. Confirm the version is not one of the known-vulnerable releases: `redis-6.0`, `redis-6.2`, or `redis-7.0`.

        A passing instance shows an engine version that is not in the known-vulnerable list. A failing instance shows `redis-6.0`, `redis-6.2`, or `redis-7.0`.

        ### Audit via CLI

        1. List all instances and their engine versions:

        ```bash
        gcloud memorystore instances list \
          --location=LOCATION \
          --format="table(name,engineVersion)"
        ```

        A passing instance returns an engine version that is not `redis-6.0`, `redis-6.2`, or `redis-7.0`. A failing instance returns one of those denied engine versions.
      remediation:
        - id: terraform
          desc: |
            Pin a current engine version on the instance resource and apply during a maintenance window:

            ```hcl
            resource "google_memorystore_instance" "cache" {
              instance_id    = "my-instance"
              location       = "us-central1"
              shard_count    = 3
              engine_version = "VALKEY_8_0"
            }
            ```
        - id: console
          desc: |
            Plan a maintenance window and upgrade the engine version:

            1. Go to **Memorystore > Instances** and select the instance.
            2. Select **Upgrade** and choose the latest supported engine version.
            3. Confirm and trigger the upgrade during a low-traffic window.
        - id: cli
          desc: |
            ```bash
            gcloud memorystore instances update INSTANCE_ID \
              --location=LOCATION \
              --engine-version=VALKEY_8_0
            ```
    refs:
      - url: https://cloud.google.com/memorystore/docs/valkey/release-notes
        title: Memorystore release notes
      - url: https://valkey.io/security/
        title: Valkey security advisories
      - url: https://redis.io/security/
        title: Redis security advisories
    filters: asset.platform == 'gcp'
    mql: |
      # Memorystore for Valkey starts at valkey-7.2 (forked from Redis 7.2.4),
      # so no Valkey-specific releases are denied here. Update this list when
      # Valkey ships a release with disclosed CVEs that Memorystore has not patched.
      gcp.memorystore.instances.all(
        engineVersion != "redis-6.0" &&
        engineVersion != "redis-6.2" &&
        engineVersion != "redis-7.0"
      )
  - uid: mondoo-gcp-security-datastream-stream-cmek-encryption
    title: Ensure Datastream streams are encrypted with CMEK
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-gcp-security-datastream-stream-cmek-encryption-gcp
        tags:
          mondoo.com/filter-title: GCP Datastream
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-datastream-stream-cmek-encryption-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-datastream-stream-cmek-encryption-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-datastream-stream-cmek-encryption-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Datastream streams are configured to encrypt replicated data with a customer-managed encryption key (CMEK). By default, Datastream encrypts stream data using Google-managed keys, meaning the organization has no independent control over key rotation or cryptographic revocation of the replicated data.

        **Why this matters**

        - **High-value data in transit:** Datastream streams typically replicate production OLTP rows, customer records, and financial data, making them attractive targets if the staging infrastructure is compromised.
        - **Staging data exposure:** Even if the source database and BigQuery destination are individually CMEK-encrypted, data buffered inside Datastream's staging infrastructure is protected only by Google-managed keys unless a stream-level CMEK is set.
        - **Key lifecycle control:** CMEK on the stream allows the organization to rotate and revoke the encryption key independently of Google's schedule, matching the lifecycle of the source and destination key management.
        - **Auditability:** Cloud KMS logs every use of a customer-managed key, making stream-data decryption attributable and detectable in audit logs.

        **Risk mitigation**

        - **Revocation capability:** Disabling or destroying the CMEK immediately renders the stream's staged data unreadable, providing a fast response path if unauthorized access is detected.
        - **Consistent encryption posture:** Applying CMEK at the stream level ensures the encryption posture of replicated data matches that of the source database and destination store.
      audit: |
        ### Audit via Console

        1. Open the [Google Cloud Console](https://console.cloud.google.com/) and navigate to **Datastream > Streams**.
        2. Select each stream.
        3. On the stream details page, locate the **Encryption** section and review the **Encryption key** field.

        A passing stream shows a customer-managed Cloud KMS key path in the **Encryption key** field. A failing stream shows **Google-managed key** or no key reference.

        ### Audit via CLI

        1. List all streams and inspect their CMEK setting:

        ```bash
        gcloud datastream streams list \
          --location=LOCATION \
          --format="table(name,customerManagedEncryptionKey)"
        ```

        A passing stream returns a Cloud KMS key resource path in the `CUSTOMER_MANAGED_ENCRYPTION_KEY` column. A failing stream returns an empty value.
      remediation:
        - id: terraform
          desc: |
            ```hcl
            resource "google_datastream_stream" "stream" {
              stream_id                       = "my-stream"
              location                        = "us-central1"
              display_name                    = "my-stream"
              customer_managed_encryption_key = google_kms_crypto_key.datastream_key.id
              # ... source_config / destination_config ...
            }
            ```
        - id: console
          desc: |
            CMEK can only be set at stream creation time.

            1. Go to **Datastream > Streams** and select **Create Stream**.
            2. Under **Encryption**, select **Customer-managed key** and choose a Cloud KMS key in the same region.
            3. Complete the wizard and migrate any consumers from the legacy stream.
        - id: cli
          desc: |
            The `gcloud datastream` CLI does not currently expose a `--customer-managed-encryption-key` flag for `streams create`. Use the Datastream REST API or Terraform (above) to set it at creation time:

            ```bash
            curl -X POST \
              "https://datastream.googleapis.com/v1/projects/PROJECT/locations/LOCATION/streams?streamId=STREAM_ID" \
              -H "Authorization: Bearer $(gcloud auth print-access-token)" \
              -H "Content-Type: application/json" \
              -d @- <<'EOF'
            {
              "displayName": "STREAM_ID",
              "customerManagedEncryptionKey": "projects/PROJECT/locations/LOCATION/keyRings/RING/cryptoKeys/KEY",
              "sourceConfig": {"sourceConnectionProfile": "projects/PROJECT/locations/LOCATION/connectionProfiles/SOURCE"},
              "destinationConfig": {"destinationConnectionProfile": "projects/PROJECT/locations/LOCATION/connectionProfiles/DEST"}
            }
            EOF
            ```
    refs:
      - url: https://cloud.google.com/datastream/docs/use-cmek
        title: Use CMEK with Datastream
  - uid: mondoo-gcp-security-datastream-stream-cmek-encryption-gcp
    filters: asset.platform == 'gcp'
    mql: |
      gcp.datastream.streams.all(kmsKey != null)
  - uid: mondoo-gcp-security-datastream-stream-cmek-encryption-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_datastream_stream')
    mql: |
      terraform.resources('google_datastream_stream').all(
        arguments.customer_managed_encryption_key != empty &&
        arguments.customer_managed_encryption_key != ""
      )
  - uid: mondoo-gcp-security-datastream-stream-cmek-encryption-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_datastream_stream')
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_datastream_stream').all(
        change.after['customer_managed_encryption_key'] != empty &&
        change.after['customer_managed_encryption_key'] != ""
      )
