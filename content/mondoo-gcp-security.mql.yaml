      - uid: mondoo-gcp-security-cloud-sql-postgres-log-connections-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Cloud SQL PostgreSQL instances are configured with the `log_connections` flag set to `on`. By default, PostgreSQL does not log connection attempts or successful client authentications, leaving no record of who connected to the database and when. Enabling this flag causes the server to record each attempted connection and successful authentication, creating an audit trail of database access events.

        **Why this matters**

        - **Access audit trail:** A record of every connection attempt and successful authentication provides the evidence needed to investigate unauthorized access or credential abuse.
        - **Anomaly detection:** Unexpected connection sources, unusual times of access, or sudden spikes in connection attempts are only visible when connections are logged.
        - **Compliance requirements:** Many security frameworks require that database access events be logged to demonstrate accountability and support forensic investigations.

        **Risk mitigation**

        - **Unauthorized access detection:** Logging connections enables security teams to spot accounts connecting from unexpected IP addresses or at unusual hours, triggering alerts or investigations.
        - **Credential misuse evidence:** When a compromised credential is used to access the database, connection logs provide timestamps and source addresses that are essential for scoping the breach.
      audit: |
        **Using Google Cloud Console**

        1.  Navigate to the Cloud SQL Instances page: [https://console.cloud.google.com/sql/instances](https://console.cloud.google.com/sql/instances).
        2.  Select a PostgreSQL instance to view its details.
        3.  In the **Configuration** section, find the **Database flags** area.
        4.  Verify that the `log_connections` flag is listed and its value is set to `on`.

        **Using Google Cloud CLI**

        1.  List your Cloud SQL instances:
            ```bash
            gcloud sql instances list
            ```
        2.  For each PostgreSQL instance, check the flag's value:
            ```bash
            gcloud sql instances describe INSTANCE_NAME --format=json | jq '.settings.databaseFlags[] | select(.name=="log_connections")|.value'
            ```
            Ensure the output for each PostgreSQL instance is `"on"`.
      remediation:
        - id: console
          desc: |
            To ensure 'log_connections' flag is enabled for Cloud SQL PostgreSQL using the Google Cloud Console:

            1.  Navigate to the Cloud SQL Instances page: [https://console.cloud.google.com/sql/instances](https://console.cloud.google.com/sql/instances).
            2.  Select the target PostgreSQL instance.
            3.  Select **Edit**.
            4.  Scroll down to the **Flags** section.
            5.  If the flag isn't present, select **Add item**.
            6.  Choose `log_connections` from the dropdown and set its value to `on`. If the flag exists but is `off`, change its value to `on`.
            7.  Select **Save**. Review the **Flags** section on the instance overview page to confirm.
        - id: cli
          desc: |
            To ensure 'log_connections' flag is enabled for Cloud SQL PostgreSQL using the Google Cloud CLI, update the flag for a specific PostgreSQL instance:
            ```bash
            gcloud sql instances patch INSTANCE_NAME --database-flags log_connections=on
            ```
            *Note: This command overwrites all existing flags. To preserve other flags, you must include them in the `--database-flags` argument (e.g., `--database-flags log_connections=on,other_flag=value`).*
        - id: terraform
          desc: |
            To ensure 'log_connections' flag is enabled for Cloud SQL PostgreSQL in Terraform, ensure the `database_flags` block within your `google_sql_database_instance` resource includes the setting:
            ```hcl
            resource "google_sql_database_instance" "postgres_instance" {
              name             = "my-postgres-instance"
              database_version = "POSTGRES_15"
              region           = "us-central1"
              settings {
                tier = "db-f1-micro"
                database_flags {
                  name  = "log_connections"
                  value = "on"
                }
                # Include other settings and flags as needed
              }
            }
            ```
