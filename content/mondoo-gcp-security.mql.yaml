  - uid: mondoo-gcp-security-model-armor-pi-jailbreak-filter
    title: Ensure Model Armor templates enable prompt injection filtering
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: false
      compliance/dora: false
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-26
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ds-5
      compliance/nist-csf-2: nist-csf-2-pr-ds-10
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-10
      compliance/nist-sp-800-171: false
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc7-1-2
      compliance/vda-isa-5: vda-isa-5-5-2-3
    variants:
      - uid: mondoo-gcp-security-model-armor-pi-jailbreak-filter-gcp
        tags:
          mondoo.com/filter-title: GCP Project
          mondoo.com/filter-icon: gcp
    docs:
      desc: |
        This check ensures that Google Cloud Model Armor templates have prompt injection and jailbreak filtering enabled. Prompt injection is consistently ranked as the top attack vector against LLM applications, where adversarial inputs manipulate model behavior to bypass safety guardrails, extract sensitive data, or produce harmful outputs that would otherwise be blocked.

        **Why this matters**

        - **Direct instruction override:** Prompt injection attacks can cause an LLM to ignore its system prompt, substituting attacker-controlled instructions that produce unauthorized or harmful behavior.
        - **Data exfiltration path:** Injection attacks frequently target system prompt contents, enabling attackers to extract confidential instructions, business logic, or embedded credentials.
        - **Jailbreak persistence:** Systematic jailbreak techniques bypass content moderation controls, allowing attackers to generate policy-violating outputs at scale without being blocked.
        - **No-filter default:** Model Armor templates do not enable prompt injection filtering by default; without explicit configuration, every LLM application behind the template is exposed.

        **Risk mitigation**

        - **Automated attack detection:** Enabling the filter intercepts known prompt injection and jailbreak patterns before they reach the underlying model, reducing successful attack rate.
        - **System prompt protection:** Filtering adversarial inputs prevents attackers from extracting or overriding the system prompt that encodes application-specific safety and business rules.
        - **Regulatory alignment:** Enabling LLM-specific input validation controls addresses emerging AI security requirements in frameworks that cover application integrity and input handling.
      audit: |
        ### Audit via Console

        1. In the Google Cloud Console, navigate to **Security** > **Model Armor**.
        2. Select **Templates** and open each template.
        3. Under **Filter Configuration**, review the **Prompt Injection & Jailbreak Filter** section.
        4. Verify that the filter enforcement is set to **Enabled**.

        A passing template shows **Prompt Injection & Jailbreak Filter** set to **Enabled**. A failing template shows the filter as **Disabled** or not configured.

        ### Audit via CLI

        1. List all Model Armor templates in the project:

        ```bash
        gcloud model-armor templates list --location=LOCATION --format=json
        ```

        2. For each template, review the `filterConfig.piAndJailbreakFilterSettings.filterEnforcement` field. The value must be `ENABLED`.

        A passing template returns `"filterEnforcement": "ENABLED"` in the `piAndJailbreakFilterSettings` block. A failing template returns `"filterEnforcement": "DISABLED"` or omits the field entirely.
      remediation:
        - id: terraform
          desc: |
            ```hcl
            resource "google_model_armor_template" "secure" {
              template_id = "secure-template"
              location    = "us-central1"

              filter_config {
                pi_and_jailbreak_filter_settings {
                  filter_enforcement = "ENABLED"
                  confidence_level   = "LOW_AND_ABOVE"
                }
              }
            }
            ```
        - id: console
          desc: |
            To enable prompt injection and jailbreak filtering using the Google Cloud Console:

            1. Navigate to **Security > Model Armor** in the Google Cloud Console.
            2. Select the template to edit, or create a new template.
            3. Under **Filter Configuration**, enable **Prompt Injection & Jailbreak Filter**.
            4. Set the **Confidence Level** to an appropriate threshold (LOW_AND_ABOVE recommended).
            5. Save the template.
        - id: cli
          desc: |
            To enable prompt injection and jailbreak filtering using the Google Cloud CLI:

            ```bash
            gcloud model-armor templates update TEMPLATE_ID \
              --location=LOCATION \
              --pi-and-jailbreak-filter-settings-enforcement=enabled \
              --pi-and-jailbreak-filter-settings-confidence-level=low-and-above
            ```
    refs:
      - url: https://cloud.google.com/security/products/model-armor
        title: Google Cloud Model Armor overview
  - uid: mondoo-gcp-security-model-armor-pi-jailbreak-filter-gcp
    filters: asset.platform == 'gcp-project'
    mql: |
      gcp.project.modelArmor.templates.all(
        filterConfig['piAndJailbreakFilterSettings']['filterEnforcement'] == "ENABLED"
      )
  - uid: mondoo-gcp-security-model-armor-malicious-uri-filter
    title: Ensure Model Armor templates enable malicious URI filtering
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: false
      compliance/dora: false
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-23
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-pt-4
      compliance/nist-csf-2: nist-csf-2-pr-ds-10
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-2
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc6-8-4
      compliance/vda-isa-5: vda-isa-5-5-2-3
    variants:
      - uid: mondoo-gcp-security-model-armor-malicious-uri-filter-gcp
        tags:
          mondoo.com/filter-title: GCP Project
          mondoo.com/filter-icon: gcp
    docs:
      desc: |
        This check ensures that Google Cloud Model Armor templates have malicious URI filtering enabled. LLM responses can contain URLs sourced from training data, retrieved context, or adversarially crafted prompts; without URI filtering, these links are delivered to end users without being checked against threat intelligence.

        **Why this matters**

        - **Phishing delivery via LLM:** Attackers can craft prompts that cause models to include known-malicious URLs in generated responses, turning the LLM interface into a phishing delivery mechanism.
        - **Malware distribution:** LLMs that echo or synthesize URLs from unchecked sources can direct users to malware download sites embedded in otherwise helpful-looking responses.
        - **No native model awareness:** LLMs have no built-in ability to determine whether a URL is malicious at inference time; URI filtering against threat intelligence is the only automated control at the response layer.
        - **Safe Browsing integration:** Model Armor's URI filter checks against Google Safe Browsing and additional threat intelligence feeds, providing real-time URL reputation evaluation.

        **Risk mitigation**

        - **Threat intelligence at the response layer:** Blocking known-malicious URIs before they reach the user prevents the LLM application from becoming an inadvertent malware or phishing distribution point.
        - **Prompt injection containment:** URI filtering catches cases where injection attacks embed malicious links in model output, adding a second layer of defense behind prompt injection filtering.
        - **User protection:** Intercepting dangerous URLs in LLM responses protects end users who may trust LLM-generated content and follow links without independent verification.
      audit: |
        ### Audit via Console

        1. In the Google Cloud Console, navigate to **Security** > **Model Armor**.
        2. Select **Templates** and open each template.
        3. Under **Filter Configuration**, review the **Malicious URI Filter** section.
        4. Verify that the filter enforcement is set to **Enabled**.

        A passing template shows **Malicious URI Filter** set to **Enabled**. A failing template shows the filter as **Disabled** or not configured.

        ### Audit via CLI

        1. List all Model Armor templates in the project:

        ```bash
        gcloud model-armor templates list --location=LOCATION --format=json
        ```

        2. For each template, review the `filterConfig.maliciousUriFilterSettings.filterEnforcement` field. The value must be `ENABLED`.

        A passing template returns `"filterEnforcement": "ENABLED"` in the `maliciousUriFilterSettings` block. A failing template returns `"filterEnforcement": "DISABLED"` or omits the field entirely.
      remediation:
        - id: terraform
          desc: |
            ```hcl
            resource "google_model_armor_template" "secure" {
              template_id = "secure-template"
              location    = "us-central1"

              filter_config {
                malicious_uri_filter_settings {
                  filter_enforcement = "ENABLED"
                }
              }
            }
            ```
        - id: console
          desc: |
            To enable malicious URI filtering using the Google Cloud Console:

            1. Navigate to **Security > Model Armor** in the Google Cloud Console.
            2. Select the template to edit, or create a new template.
            3. Under **Filter Configuration**, enable **Malicious URI Filter**.
            4. Save the template.
        - id: cli
          desc: |
            To enable malicious URI filtering using the Google Cloud CLI:

            ```bash
            gcloud model-armor templates update TEMPLATE_ID \
              --location=LOCATION \
              --malicious-uri-filter-settings-enforcement=enabled
            ```
    refs:
      - url: https://cloud.google.com/security/products/model-armor
        title: Google Cloud Model Armor overview
