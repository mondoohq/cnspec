  - uid: mondoo-gcp-security-firewall-no-large-port-range
    title: Ensure firewall rules do not allow full port range access
    impact: 40
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-gcp-security-firewall-no-large-port-range-gcp
        tags:
          mondoo.com/filter-title: GCP Compute Firewall
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-firewall-no-large-port-range-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-firewall-no-large-port-range-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-firewall-no-large-port-range-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that GCP firewall rules allowing ingress from the internet do not open port ranges that span nearly all available ports. Rules with allowed port ranges ending at 65530 or higher effectively expose every service running on an instance to the public internet, including development servers, debug endpoints, and internal APIs not intended for external access.

        **Why this matters**

        - **Excessive exposure:** Large port ranges make every service on a host reachable from the internet, far exceeding the network access any production workload legitimately requires.
        - **Service discovery:** Attackers can scan an open port range to enumerate running services and their versions, then target known vulnerabilities without any credential.
        - **Least privilege:** Firewall rules should specify only the ports a service actually needs rather than opening broad ranges as a convenience shortcut.
        - **Defense in depth:** Restricting inbound ports reduces the number of attack paths available even when application-layer defenses fail.

        **Risk mitigation**

        - **Reduced attack surface:** Allowing only specific required ports eliminates the network path to services that are not intended to be internet-reachable.
        - **Lateral movement barrier:** Limiting ingress to known ports prevents attackers from reaching administrative interfaces, debug endpoints, or inter-service APIs directly from the internet.
        - **Easier auditing:** Narrow, purpose-labeled firewall rules are easier to review and reason about than catch-all port ranges.
      audit: |
        ### Audit via Console

        1. Navigate to **VPC Network** > **Firewall**.
        2. Filter for rules with **Direction: Ingress** and review the **Source IP ranges** and **Protocols / ports** columns.
        3. For any rule with source range `0.0.0.0/0` or `::/0`, check whether the allowed port range spans nearly all ports (for example, `0-65535` or similar wide ranges ending at 65530 or above).

        A passing firewall rule allows only specific ports or modest port ranges. A failing firewall rule allows an ingress port range ending at 65530 or higher from any source IP.

        ### Audit via CLI

        1. List ingress firewall rules open to the internet and review their allowed configurations:

        ```bash
        gcloud compute firewall-rules list \
          --filter="direction=INGRESS AND sourceRanges:(0.0.0.0/0)"\
          --format="table(name, allowed, sourceRanges)"
        ```

        A passing firewall rule shows port values limited to specific ports or small ranges. A failing firewall rule shows a port range ending at 65530 or higher (for example, `tcp:0-65535`).
      remediation:
        - id: console
          desc: |
            To ensure firewall rules do not allow full port range access using the Google Cloud Console:

            1. Navigate to **VPC Network** > **Firewall**.
            2. Identify rules with source range `0.0.0.0/0` or `::/0` that allow large port ranges.
            3. Edit the rule to restrict to only the specific ports required, such as `80` or `443`.
        - id: cli
          desc: |
            To ensure firewall rules do not allow full port range access using the gcloud CLI, list internet-facing ingress rules:

            ```bash
            gcloud compute firewall-rules list \
              --filter="direction=INGRESS AND sourceRanges=0.0.0.0/0" \
              --format="table(name, allowed)"
            ```

            Update a rule to use specific ports:

            ```bash
            gcloud compute firewall-rules update <rule-name> \
              --allow=tcp:80,tcp:443
            ```
        - id: terraform
          desc: |
            To ensure firewall rules do not allow full port range access in Terraform, ensure firewall rules use specific ports instead of large ranges:

            ```hcl
            resource "google_compute_firewall" "allow_web" {
              name    = "allow-web-traffic"
              network = google_compute_network.default.id

              allow {
                protocol = "tcp"
                ports    = ["80", "443"]
              }

              source_ranges = ["0.0.0.0/0"]
            }
            ```
    refs:
      - url: https://cloud.google.com/vpc/docs/firewalls
        title: Google Cloud Documentation - VPC firewall rules
  - uid: mondoo-gcp-security-firewall-no-large-port-range-gcp
    filters: |
      asset.platform == 'gcp-compute-firewall'
      gcp.compute.firewall.direction == "INGRESS"
      gcp.compute.firewall.sourceRanges.any(_ == "0.0.0.0/0" || _ == "::/0")
    mql: |
      gcp.compute.firewall.allowed.none(_['ports'].any(_ == /^\d{1,4}-6553[0-5]$/))

  - uid: mondoo-gcp-security-firewall-no-large-port-range-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_compute_firewall')
    mql: |
      terraform.resources('google_compute_firewall').where(
        arguments.direction != "EGRESS" &&
        arguments['source_ranges'] != empty &&
        arguments['source_ranges'].any(_ == "0.0.0.0/0" || _ == "::/0")
      ).all(
        blocks.where(type == 'allow').all(
          arguments['ports'] == empty || arguments['ports'].none(_ == /^\d{1,4}-6553[0-5]$/)
        )
      )
  - uid: mondoo-gcp-security-firewall-no-large-port-range-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_compute_firewall')
    mql: |
      terraform.plan.resourceChanges.where(
        type == 'google_compute_firewall' &&
        change.after['direction'] != "EGRESS" &&
        change.after['source_ranges'] != empty &&
        change.after['source_ranges'].any(_ == "0.0.0.0/0" || _ == "::/0")
      ).all(
        change.after['allow'].all(
          _['ports'] == empty || _['ports'].none(_ == /^\d{1,4}-6553[0-5]$/)
        )
      )
  - uid: mondoo-gcp-security-firewall-no-large-port-range-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'google_compute_firewall')
    mql: |
      terraform.state.resources.where(
        type == 'google_compute_firewall' &&
        values['direction'] != "EGRESS" &&
        values['source_ranges'] != empty &&
        values['source_ranges'].any(_ == "0.0.0.0/0" || _ == "::/0")
      ).all(
        values['allow'].all(
          _['ports'] == empty || _['ports'].none(_ == /^\d{1,4}-6553[0-5]$/)
        )
      )
  - uid: mondoo-gcp-security-firewall-default-rules-restricted
    title: Ensure default network firewall rules are restricted
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-gcp-security-firewall-default-rules-restricted-gcp
        tags:
          mondoo.com/filter-title: GCP Compute Firewall
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-firewall-default-rules-restricted-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-firewall-default-rules-restricted-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-firewall-default-rules-restricted-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that the auto-created default firewall rules in a GCP VPC network are disabled or replaced with more restrictive controls. When a default VPC is created, GCP automatically generates permissive rules such as `default-allow-internal`, `default-allow-ssh`, `default-allow-rdp`, and `default-allow-icmp` that apply broadly to all instances in the network.

        **Why this matters**

        - **Overly permissive defaults:** The `default-allow-internal` rule allows all traffic between instances in the network, violating network segmentation principles and enabling lateral movement after a single host is compromised.
        - **Internet exposure of management ports:** `default-allow-ssh` and `default-allow-rdp` permit connections from `0.0.0.0/0`, exposing management interfaces to the entire internet by default.
        - **Unintended blast radius:** Default rules apply to every instance in the network, including newly provisioned instances that may not yet have workload-specific rules in place.
        - **Implicit trust:** Leaving default-allow rules active creates a network security model based on implicit trust rather than explicit, least-privilege rules.

        **Risk mitigation**

        - **Explicit access control:** Replacing default rules with named, purpose-specific rules makes the intended access model auditable and reviewable.
        - **Segmentation:** Disabling `default-allow-internal` forces teams to define explicit inter-service communication rules, limiting lateral movement after a compromise.
        - **Management port protection:** Replacing or disabling `default-allow-ssh` and `default-allow-rdp` with source-restricted rules dramatically reduces the attack surface for brute-force and exploitation of management protocols.
      audit: |
        ### Audit via Console

        1. Navigate to **VPC Network** > **Firewall**.
        2. Filter the firewall rules list by name prefix `default-allow`.
        3. For each `default-allow-*` rule, check the **Enforcement** column.

        A passing firewall rule named `default-allow-*` shows **Enforcement: Disabled**. A failing rule shows **Enforcement: Active** (enabled).

        ### Audit via CLI

        1. List all firewall rules whose names start with `default-allow`:

        ```bash
        gcloud compute firewall-rules list \
          --filter="name~'^default-allow'" \
          --format="table(name, disabled, sourceRanges, allowed)"
        ```

        A passing rule returns `disabled: True`. A failing rule returns `disabled: False` or an empty value in the disabled column.
      remediation:
        - id: console
          desc: |
            To ensure default network firewall rules are restricted using the Google Cloud Console:

            1. Navigate to **VPC Network** > **Firewall**.
            2. Identify rules named `default-allow-*`.
            3. Either delete these rules or disable them by editing the rule and toggling **Enforcement** to **Disabled**.
            4. Create replacement rules that allow only the specific traffic required.
        - id: cli
          desc: |
            To ensure default network firewall rules are restricted using the gcloud CLI, list default rules:

            ```bash
            gcloud compute firewall-rules list --filter="name~'^default-allow'"
            ```

            Disable a default rule:

            ```bash
            gcloud compute firewall-rules update default-allow-ssh --disabled
            ```

            Or delete it:

            ```bash
            gcloud compute firewall-rules delete default-allow-ssh
            ```
        - id: terraform
          desc: |
            To ensure default network firewall rules are restricted in Terraform, avoid using the default network and its auto-created rules. Create a custom VPC with explicit firewall rules:

            ```hcl
            resource "google_compute_network" "custom" {
              name                    = "custom-network"
              auto_create_subnetworks = false
            }

            resource "google_compute_firewall" "allow_internal" {
              name    = "allow-internal"
              network = google_compute_network.custom.id

              allow {
                protocol = "tcp"
                ports    = ["22", "443"]
              }

              source_ranges = ["10.0.0.0/8"]
            }
            ```
    refs:
      - url: https://cloud.google.com/vpc/docs/firewalls#default_firewall_rules
        title: Google Cloud Documentation - Default firewall rules
  - uid: mondoo-gcp-security-firewall-default-rules-restricted-gcp
