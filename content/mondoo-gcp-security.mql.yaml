  - uid: mondoo-gcp-security-firestore-project-iam-no-public-datastore-roles
    title: Ensure project IAM does not grant Datastore roles to public principals
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-5-15
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-2-1
    variants:
      - uid: mondoo-gcp-security-firestore-project-iam-no-public-datastore-roles-gcp
        tags:
          mondoo.com/filter-title: GCP Project
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-firestore-project-iam-no-public-datastore-roles-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-firestore-project-iam-no-public-datastore-roles-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-firestore-project-iam-no-public-datastore-roles-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that no project-level IAM binding grants any `roles/datastore.*` role to `allUsers` or `allAuthenticatedUsers`. Firestore in Native mode and Datastore mode both authorize API access through the project IAM policy; public bindings on Datastore roles expose every database collection in the project to anonymous internet users or to any Google-authenticated account without any project affiliation required.

        **Why this matters**

        - **Full database read or write access:** A public `roles/datastore.viewer` or `roles/datastore.user` binding grants anyone on the internet the ability to enumerate and read every collection and document in every Firestore database in the project.
        - **Destructive write access at scale:** A public `roles/datastore.owner` binding allows arbitrary attackers to modify indexes, delete documents, and corrupt data with no authentication beyond possessing a Google account.
        - **Application security rules are bypassed:** Project IAM grants operate at the API layer; they bypass any application-layer access controls, meaning even well-designed Firestore Security Rules do not block access granted through project IAM.
        - **Scope includes all databases in the project:** A single public IAM binding at the project level exposes every Firestore database and collection, not just the one the operator may have intended to share.

        **Risk mitigation**

        - **Remove all public Datastore role bindings immediately:** Delete every `roles/datastore.*` binding that includes `allUsers` or `allAuthenticatedUsers` from the project IAM policy and treat the discovery as a potential data exposure incident.
        - **Replace with workload service accounts:** Bind only the specific service accounts used by application backends and data pipelines to the narrowest Datastore role they require, such as `roles/datastore.user` rather than `roles/datastore.owner`.
      audit: |
        ### Audit via Console

        1. Go to **IAM & Admin > IAM** in the Google Cloud Console.
        2. In the principals table, filter or search for entries with roles containing **Datastore** (such as `roles/datastore.viewer`, `roles/datastore.user`, or `roles/datastore.owner`).
        3. Check whether any of those bindings include **allUsers** or **allAuthenticatedUsers** as a principal.

        A passing project shows no Datastore role bindings for `allUsers` or `allAuthenticatedUsers`. A failing project shows at least one IAM binding that grants a `roles/datastore.*` role to `allUsers` or `allAuthenticatedUsers`.

        ### Audit via CLI

        1. Retrieve the project IAM policy and filter for Datastore roles bound to public principals:

        ```bash
        gcloud projects get-iam-policy PROJECT_ID \
          --format=json \
          | python3 -c "
        import json, sys
        policy = json.load(sys.stdin)
        for b in policy.get('bindings', []):
          if b['role'].startswith('roles/datastore.'):
            for m in b.get('members', []):
              if m in ('allUsers', 'allAuthenticatedUsers'):
                print(b['role'], m)
        "
        ```

        A passing project produces no output. A failing project prints one or more lines showing which Datastore role is bound to a public principal.
      remediation:
        - id: terraform
          desc: |
            Manage project Datastore role bindings with `google_project_iam_member` resources whose `member` is a specific identity, not a public principal:

            ```hcl
            resource "google_project_iam_member" "datastore_user" {
              project = "my-project"
              role    = "roles/datastore.user"
              member  = "serviceAccount:app@my-project.iam.gserviceaccount.com"
            }
            ```

            Audit any `google_project_iam_binding` resources whose `role` matches `roles/datastore.*` and remove `allUsers` and `allAuthenticatedUsers` from `members`.
        - id: console
          desc: |
            Remove public Datastore role bindings from the project:

            1. Go to **IAM & Admin > IAM** in the Google Cloud Console.
            2. Filter by **Role** and search for any `roles/datastore.*` role.
            3. For each binding that includes **allUsers** or **allAuthenticatedUsers**, select the binding and remove the public principal.
            4. Replace the public binding with explicit principals where access is still required.
        - id: cli
          desc: |
            Remove public principals from project-level Datastore role bindings:

            ```bash
            for role in roles/datastore.viewer roles/datastore.user roles/datastore.owner; do
              gcloud projects remove-iam-policy-binding PROJECT_ID \
                --member=allUsers \
                --role="$role" || true
              gcloud projects remove-iam-policy-binding PROJECT_ID \
                --member=allAuthenticatedUsers \
                --role="$role" || true
            done
            ```
    refs:
      - url: https://cloud.google.com/datastore/docs/access/iam
        title: Firestore in Datastore mode - Identity and Access Management
  - uid: mondoo-gcp-security-firestore-project-iam-no-public-datastore-roles-gcp
    filters: asset.platform == 'gcp'
    mql: |
      gcp.project.iamPolicy.where(
        role == /^roles\/datastore\./
      ).all(
        members.none(_ == "allUsers" || _ == "allAuthenticatedUsers")
      )
  - uid: mondoo-gcp-security-firestore-project-iam-no-public-datastore-roles-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_project_iam_member' && arguments['role'] == /^roles\/datastore\./) ||
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_project_iam_binding' && arguments['role'] == /^roles\/datastore\./)
    mql: |
      terraform.resources('google_project_iam_member').where(arguments['role'] == /^roles\/datastore\./).all(
        arguments['member'] != "allUsers" &&
        arguments['member'] != "allAuthenticatedUsers"
      )
      terraform.resources('google_project_iam_binding').where(arguments['role'] == /^roles\/datastore\./).all(
        arguments['members'].none(_ == "allUsers" || _ == "allAuthenticatedUsers")
      )
  - uid: mondoo-gcp-security-firestore-project-iam-no-public-datastore-roles-terraform-plan
    filters: |
