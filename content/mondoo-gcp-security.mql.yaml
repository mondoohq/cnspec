      )
  - uid: mondoo-gcp-security-compute-network-not-legacy
    title: Ensure legacy networks do not exist in the project
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-1-5
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-gcp-security-compute-network-not-legacy-gcp
        tags:
          mondoo.com/filter-title: GCP Compute Network
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-compute-network-not-legacy-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-compute-network-not-legacy-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-compute-network-not-legacy-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that no legacy networks exist within the GCP project. Legacy networks predate GCP's VPC architecture and use a flat, non-subnetted design spanning the entire project; they do not support subnets, VPC Flow Logs, Private Google Access, or subnet-level firewall rules, and they cannot be converted to VPC networks.

        **Why this matters**

        - **No subnet-level segmentation:** Legacy networks can only apply firewall rules at the network level, making it impossible to isolate workloads in different subnet tiers or implement fine-grained traffic controls.
        - **No flow log support:** VPC Flow Logs, which are critical for detecting lateral movement and exfiltration, are unavailable on legacy networks, leaving defenders without network visibility.
        - **No Private Google Access:** Legacy networks cannot use Private Google Access, forcing VMs that need to reach Google APIs to have external IP addresses, which increases the public attack surface.
        - **Flat blast radius:** All instances in a legacy network share a single, undivided address space, so a compromised instance can probe every other instance in the project without crossing any network boundary.

        **Risk mitigation**

        - **Migrate to VPC networks:** Create a new VPC network in custom subnet mode, create subnets for each region and tier needed, migrate VMs and other resources, and delete the legacy network.
        - **Use custom subnet mode:** When creating VPC networks, use `auto_create_subnetworks = false` (custom mode) so that subnets are explicitly defined with appropriate CIDR ranges and security settings.
        - **Enable flow logs on new subnets:** After migrating to a VPC network, enable VPC Flow Logs on each subnet to restore the network visibility that was unavailable on the legacy network.
      audit: |
        ### Audit via Console

        1. Sign in to the [Google Cloud Console](https://console.cloud.google.com) and open the target project.
        2. Navigate to **VPC network > VPC networks**.
        3. Review the **Subnet creation mode** column for each network.

        A passing network shows **Auto** or **Custom** in the subnet mode column. A failing network shows **Legacy** in the mode column.

        ### Audit via CLI

        1. List all Compute Engine networks and their modes:

        ```bash
        gcloud compute networks list --format="table(name,x_gcloud_subnet_mode)"
        ```

        A passing network returns a subnet mode of `AUTO` or `CUSTOM`. A failing network returns `LEGACY`.
      remediation:
        - id: terraform
          desc: |
            To ensure legacy networks do not exist in the project in Terraform, always create VPC networks in custom subnet mode:

            ```hcl
            resource "google_compute_network" "example" {
              name                    = "example-network"
              auto_create_subnetworks = false  # custom subnet mode
            }
            ```

            Note: To migrate from a legacy network, create a new VPC network, migrate resources, and then delete the legacy network.
        - id: console
          desc: |
            To ensure legacy networks do not exist in the project using the Google Cloud Console, legacy networks cannot be converted to VPC networks. To remediate:

            1. Create a new VPC network in custom mode.
            2. Create subnets in the regions you need.
            3. Migrate VMs and other resources to the new network.
            4. Update firewall rules for the new network.
            5. Delete the legacy network.
        - id: cli
          desc: |
            To ensure legacy networks do not exist in the project using the Google Cloud CLI, create a new VPC network in custom mode and migrate resources:

            ```bash
            # Create a new VPC network
            gcloud compute networks create NEW_NETWORK_NAME --subnet-mode=custom

            # Create subnets
            gcloud compute networks subnets create SUBNET_NAME --network=NEW_NETWORK_NAME --region=REGION --range=CIDR_RANGE
            ```
    refs:
      - url: https://cloud.google.com/vpc/docs/vpc
        title: Google Cloud VPC Documentation
  - uid: mondoo-gcp-security-compute-network-not-legacy-gcp
    filters: asset.platform == "gcp-compute-network"
    mql: gcp.compute.network.mode != "legacy"
  - uid: mondoo-gcp-security-compute-network-not-legacy-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' &&
        terraform.resources.contains(nameLabel == 'google_compute_network')
