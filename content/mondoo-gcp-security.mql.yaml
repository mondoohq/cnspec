  - uid: mondoo-gcp-security-gke-ip-aliasing-enabled
    title: Ensure GKE clusters use VPC-native IP aliasing
    impact: 40
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-1-5
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-gcp-security-gke-ip-aliasing-enabled-gcp
        tags:
          mondoo.com/filter-title: GCP GKE Cluster
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-gke-ip-aliasing-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-gke-ip-aliasing-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-gke-ip-aliasing-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that GKE clusters operate in VPC-native mode with IP aliasing enabled. Routes-based clusters assign pod IPs outside the VPC subnet range, preventing VPC firewall rules, Cloud NAT, and VPC Service Controls from applying to pod-level traffic.

        **Why this matters**

        - **Firewall enforcement:** In VPC-native mode, pod IPs are routable within the VPC, allowing VPC firewall rules to target pod traffic directly rather than only node-level traffic.
        - **VPC Service Controls support:** VPC-native clusters are required to place workloads behind VPC Service Controls perimeters, enabling API-level data exfiltration prevention.
        - **Network policy compatibility:** GKE Dataplane V2 and certain network policy implementations require VPC-native networking to function correctly.
        - **Scalability:** Routes-based clusters are constrained by the VPC route quota, while VPC-native alias IP ranges scale to much larger pod counts without route exhaustion.

        **Risk mitigation**

        - **Enforce at creation:** VPC-native mode must be selected at cluster creation; existing routes-based clusters cannot be migrated, so enforcing this setting in infrastructure code prevents non-compliant clusters from being provisioned.
        - **Private cluster enablement:** VPC-native mode is a prerequisite for private GKE clusters, which remove public IP addresses from nodes and further limit attack surface.
      audit: |
        ### Audit via Console

        1. Navigate to **Kubernetes Engine** > **Clusters**.
        2. Select the cluster.
        3. In the cluster details, click the **Networking** tab.
        4. Check the **VPC-native traffic routing** field.

        A passing cluster shows **VPC-native traffic routing: Enabled**. A failing cluster shows **VPC-native traffic routing: Disabled** or the field is absent.

        ### Audit via CLI

        1. Describe the cluster and inspect the IP allocation policy:

        ```bash
        gcloud container clusters describe <cluster-name> \
          --format="value(ipAllocationPolicy.useIpAliases)"
        ```

        A passing cluster returns `True`. A failing cluster returns `False` or an empty value.
      remediation:
        - id: console
          desc: |
            To ensure GKE clusters use VPC-native IP aliasing using the Google Cloud Console, VPC-native mode must be set at cluster creation:

            1. Go to **Kubernetes Engine** > **Clusters** > **Create**.
            2. In the **Networking** section, ensure **VPC-native** is selected.
            3. Configure the pod and service CIDR ranges.
            4. Complete the cluster creation.

            **Note:** Existing non-VPC-native (routes-based) clusters cannot be migrated to VPC-native mode. You must create a new VPC-native cluster, migrate workloads, and decommission the old cluster.
        - id: cli
          desc: |
            To ensure GKE clusters use VPC-native IP aliasing using the gcloud CLI, VPC-native mode must be set at cluster creation and cannot be changed later:

            ```bash
            gcloud container clusters create <cluster-name> \
              --enable-ip-alias \
              --cluster-ipv4-cidr=/16 \
              --services-ipv4-cidr=/22
            ```
        - id: terraform
          desc: |
            To ensure GKE clusters use VPC-native IP aliasing in Terraform, enable VPC-native mode with an `ip_allocation_policy` block:

            ```hcl
            resource "google_container_cluster" "example" {
