  - uid: mondoo-gcp-security-gke-workload-identity-enabled
    title: Ensure Workload Identity is enabled on GKE clusters
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-14
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-j
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-1
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-8
      compliance/vda-isa-5: vda-isa-5-4-1-3
    variants:
      - uid: mondoo-gcp-security-gke-workload-identity-enabled-gcp
        tags:
          mondoo.com/filter-title: GCP GKE Cluster
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-gke-workload-identity-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-gke-workload-identity-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-gke-workload-identity-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Workload Identity is enabled on GKE clusters so that individual workloads can authenticate to Google Cloud services using dedicated IAM service accounts rather than sharing the node's service account. Without Workload Identity, all pods running on a node inherit the node's service account credentials via the instance metadata server, which violates the principle of least privilege.

        **Why this matters**

        - **Shared node identity:** When Workload Identity is disabled, every pod on a node can access the metadata server and obtain the node's service account token, meaning a compromised pod gains whatever GCP permissions the node has.
        - **No per-workload access control:** Without Workload Identity, it is impossible to grant one pod access to Cloud Storage while denying another pod on the same node; all pods share the same GCP identity.
        - **Key management burden eliminated:** Workload Identity replaces exported service account keys, which must be rotated, distributed, and protected, with short-lived tokens that are managed automatically.
        - **Blast radius reduction:** Binding each Kubernetes service account to a minimal IAM service account ensures that a compromised workload can only access the specific GCP resources it needs.

        **Risk mitigation**

        - **Enable at cluster level:** Configure `workload_identity_config` with the project workload pool (`PROJECT_ID.svc.id.goog`) to activate Workload Identity for the cluster.
        - **Bind Kubernetes service accounts:** For each workload, create a dedicated GCP service account with minimal IAM permissions and bind it to the Kubernetes service account using `iam.workloadIdentityUser`.
        - **Remove exported keys:** Audit and delete any exported service account key files that were previously used for pod-level GCP access.
      audit: |
        ### Audit via Console

        1. Sign in to the [Google Cloud Console](https://console.cloud.google.com).
        2. Navigate to **Kubernetes Engine** > **Clusters**.
        3. Select a cluster and click the **Details** tab.
        4. Under the **Security** section, check the value of **Workload Identity**.

        A passing cluster shows **Workload Identity: Enabled** with the workload pool listed (for example, `PROJECT_ID.svc.id.goog`). A failing cluster shows **Workload Identity: Disabled** or no workload pool configured.

        ### Audit via CLI

        1. Describe the cluster and check the workload identity configuration:

        ```bash
        gcloud container clusters describe CLUSTER_NAME \
          --zone ZONE \
          --format="value(workloadIdentityConfig.workloadPool)"
        ```

        A passing cluster returns the workload pool value such as `PROJECT_ID.svc.id.goog`. A failing cluster returns no output or an empty value.
      remediation:
        - id: terraform
          desc: |
            To ensure Workload Identity is enabled on GKE clusters in Terraform:

            ```hcl
            resource "google_container_cluster" "primary" {
              name     = "my-cluster"
              location = "us-central1"

              workload_identity_config {
                workload_pool = "${var.project_id}.svc.id.goog"
              }
            }
            ```
        - id: console
          desc: |
            To ensure Workload Identity is enabled on GKE clusters using the Google Cloud Console:

            1. Go to the **Kubernetes Engine > Clusters** page in the Google Cloud Console.
            2. Select the cluster you want to update.
            3. Select **Security**.
            4. In the **Workload Identity** section, select **Edit**.
            5. Enable **Workload Identity** and specify the workload pool.
            6. Select **Save**.
        - id: cli
          desc: |
            To ensure Workload Identity is enabled on GKE clusters using the Google Cloud CLI:

            ```bash
            gcloud container clusters update CLUSTER_NAME \
              --workload-pool=PROJECT_ID.svc.id.goog \
              --zone ZONE
            ```
    refs:
      - url: https://cloud.google.com/kubernetes-engine/docs/how-to/workload-identity
        title: GKE Workload Identity documentation
  - uid: mondoo-gcp-security-gke-workload-identity-enabled-gcp
    filters: asset.platform == 'gcp-gke-cluster'
    mql: |
      gcp.project.gkeService.cluster.workloadIdentityConfig['workloadPool'] != empty
      gcp.project.gkeService.cluster.workloadIdentityConfig['workloadPool'] != ""
  - uid: mondoo-gcp-security-gke-workload-identity-enabled-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_container_cluster')
    mql: |
      terraform.resources('google_container_cluster').all(
        blocks.where(type == 'workload_identity_config') != empty
      )
  - uid: mondoo-gcp-security-gke-workload-identity-enabled-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_container_cluster')
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_container_cluster').all(
        change.after.workload_identity_config != empty &&
        change.after.workload_identity_config != empty
      )
  - uid: mondoo-gcp-security-gke-workload-identity-enabled-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'google_container_cluster')
    mql: |
      terraform.state.resources.where(type == 'google_container_cluster').all(
        values.workload_identity_config != empty &&
        values.workload_identity_config != empty
      )
  - uid: mondoo-gcp-security-gke-private-cluster-enabled
    title: Ensure private cluster is enabled on GKE clusters
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-gcp-security-gke-private-cluster-enabled-gcp
        tags:
          mondoo.com/filter-title: GCP GKE Cluster
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-gke-private-cluster-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-gke-private-cluster-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-gke-private-cluster-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that GKE clusters are configured as private clusters, where node VMs are assigned only internal IP addresses and are not directly reachable from the public internet. By default, GKE cluster nodes receive both internal and external IP addresses, making them accessible from any location.

        **Why this matters**

        - **Reduced attack surface:** Nodes with external IP addresses can be directly targeted by port scanners, exploit kits, and brute-force tools from anywhere on the internet; private nodes remove that direct exposure.
        - **Lateral pivot prevention:** An attacker who reaches a public node can pivot to other cluster resources or the VPC; private nodes force attackers to first compromise an intermediary, adding meaningful friction.
        - **Data exfiltration control:** Nodes without external IPs cannot initiate direct outbound connections to attacker-controlled infrastructure, making data exfiltration harder without explicit egress controls via Cloud NAT.
        - **Defense-in-depth for credentials:** Even if a workload's GCP credentials are stolen, using them from an external IP becomes the primary signal for detection when all legitimate cluster traffic originates from internal addresses.

        **Risk mitigation**

        - **Enable private nodes at creation time:** Private cluster configuration cannot be changed on existing clusters; set `enable_private_nodes = true` in the `private_cluster_config` block when creating the cluster.
        - **Provide controlled egress:** Use Cloud NAT to allow outbound internet access where required, rather than assigning external IPs to individual nodes.
        - **Pair with master authorized networks:** Restrict control plane access to internal CIDR ranges in addition to removing external node IPs to eliminate all direct public exposure.
      audit: |
        ### Audit via Console

        1. Sign in to the [Google Cloud Console](https://console.cloud.google.com).
        2. Navigate to **Kubernetes Engine** > **Clusters**.
        3. Select a cluster and click the **Details** tab.
        4. Under the **Networking** section, check the value of **Private cluster** and **Private nodes**.

        A passing cluster shows **Private nodes: Enabled**, indicating nodes do not have external IP addresses. A failing cluster shows **Private nodes: Disabled**.

        ### Audit via CLI

        1. Describe the cluster and check the private cluster configuration:

        ```bash
        gcloud container clusters describe CLUSTER_NAME \
          --zone ZONE \
          --format="value(privateClusterConfig.enablePrivateNodes)"
        ```

        A passing cluster returns `True`. A failing cluster returns `False` or no output.
      remediation:
        - id: terraform
          desc: |
            To ensure private cluster is enabled on GKE clusters in Terraform:

            ```hcl
            resource "google_container_cluster" "primary" {
              name     = "my-cluster"
              location = "us-central1"

              private_cluster_config {
                enable_private_nodes    = true
                enable_private_endpoint = false
                master_ipv4_cidr_block  = "172.16.0.0/28"
              }
            }
            ```
        - id: console
          desc: |
            To ensure private cluster is enabled on GKE clusters using the Google Cloud Console, note: Private cluster configuration cannot be changed on an existing cluster. You must create a new cluster:

            1. Go to the **Kubernetes Engine > Clusters** page in the Google Cloud Console.
            2. Select **Create**.
            3. In the **Networking** section, select **Private cluster**.
            4. Enable **Access control plane using its external IP address** if needed.
            5. Configure the **Control plane IP range**.
            6. Complete the cluster creation.
        - id: cli
          desc: |
            To ensure private cluster is enabled on GKE clusters using the Google Cloud CLI:

            ```bash
            gcloud container clusters create CLUSTER_NAME \
              --enable-private-nodes \
              --master-ipv4-cidr=172.16.0.0/28 \
              --zone ZONE
            ```
    refs:
      - url: https://cloud.google.com/kubernetes-engine/docs/how-to/private-clusters
        title: GKE Private cluster documentation
  - uid: mondoo-gcp-security-gke-private-cluster-enabled-gcp
    filters: asset.platform == 'gcp-gke-cluster'
    mql: |
      gcp.project.gkeService.cluster.privateClusterConfig['enablePrivateNodes'] == true
  - uid: mondoo-gcp-security-gke-private-cluster-enabled-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_container_cluster')
    mql: |
      terraform.resources('google_container_cluster').all(
        blocks.where(type == 'private_cluster_config').any(arguments.enable_private_nodes == true)
      )
  - uid: mondoo-gcp-security-gke-private-cluster-enabled-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_container_cluster')
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_container_cluster').all(
        change.after.private_cluster_config != empty &&
        change.after.private_cluster_config.any(_['enable_private_nodes'] == true)
      )
  - uid: mondoo-gcp-security-gke-private-cluster-enabled-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'google_container_cluster')
    mql: |
      terraform.state.resources.where(type == 'google_container_cluster').all(
        values.private_cluster_config != empty &&
        values.private_cluster_config.any(_['enable_private_nodes'] == true)
      )
  - uid: mondoo-gcp-security-gke-shielded-nodes-enabled
    title: Ensure shielded GKE nodes are enabled
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-c-1-integrity
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ds-6
      compliance/nist-csf-2: nist-csf-2-pr-ps-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-1
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc6-8-2
      compliance/vda-isa-5: false
    variants:
      - uid: mondoo-gcp-security-gke-shielded-nodes-enabled-gcp
        tags:
          mondoo.com/filter-title: GCP GKE Cluster
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-gke-shielded-nodes-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-gke-shielded-nodes-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-gke-shielded-nodes-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Shielded GKE Nodes are enabled on clusters, providing hardware-rooted boot integrity verification for each node. Shielded Nodes use Secure Boot, a virtual Trusted Platform Module (vTPM), and integrity monitoring to detect and prevent boot-level and kernel-level attacks. By default, GKE clusters do not require shielded node configuration unless explicitly set.

        **Why this matters**

        - **Boot-level rootkit protection:** Without Shielded Nodes, a compromised node could load a rootkit or bootkit during the boot process that persists across restarts and evades OS-level detection.
        - **Node identity verification:** Shielded Nodes use vTPM-measured boot to provide a cryptographically verifiable node identity, preventing an attacker from spoofing a legitimate node to join the cluster.
        - **Kernel integrity assurance:** Integrity monitoring compares the measured boot sequence against a known-good baseline, alerting on unauthorized modifications to the kernel or early boot components.
        - **Supply chain attack resistance:** Secure Boot enforces that only trusted, signed software runs during the boot process, reducing the risk from compromised images or firmware.

        **Risk mitigation**

        - **Enable both Secure Boot and integrity monitoring:** Configure `enable_secure_boot = true` and `enable_integrity_monitoring = true` in `shielded_instance_config` within the node pool's `node_config`.
        - **Monitor integrity alerts:** Route Cloud Logging integrity validation failures to a SIEM or alerting system so that boot sequence anomalies trigger a security response.
        - **Combine with Binary Authorization:** Use Shielded Nodes alongside Binary Authorization to enforce that only verified container images run on verified nodes.
      audit: |
        ### Audit via Console

        1. Sign in to the [Google Cloud Console](https://console.cloud.google.com).
        2. Navigate to **Kubernetes Engine** > **Clusters**.
        3. Select a cluster and click the **Details** tab.
        4. Under the **Security** section, check the value of **Shielded GKE Nodes**.

        A passing cluster shows **Shielded GKE Nodes: Enabled**. A failing cluster shows **Shielded GKE Nodes: Disabled**.

        ### Audit via CLI

        1. Describe the cluster and check the shielded nodes configuration:

        ```bash
        gcloud container clusters describe CLUSTER_NAME \
          --zone ZONE \
          --format="value(shieldedNodes.enabled)"
        ```

        A passing cluster returns `True`. A failing cluster returns `False` or no output.
      remediation:
        - id: terraform
          desc: |
            To ensure shielded GKE nodes are enabled in Terraform:

            ```hcl
            resource "google_container_cluster" "primary" {
              name     = "my-cluster"
              location = "us-central1"

              node_config {
                shielded_instance_config {
                  enable_secure_boot          = true
                  enable_integrity_monitoring = true
                }
              }
            }
            ```
        - id: console
          desc: |
            To ensure shielded GKE nodes are enabled using the Google Cloud Console:

            1. Go to the **Kubernetes Engine > Clusters** page in the Google Cloud Console.
            2. Select the cluster you want to update.
            3. Select **Security**.
            4. Ensure that **Shielded GKE Nodes** is enabled.
        - id: cli
          desc: |
            To ensure shielded GKE nodes are enabled using the Google Cloud CLI:

            ```bash
            gcloud container clusters update CLUSTER_NAME \
              --enable-shielded-nodes \
              --zone ZONE
            ```
    refs:
      - url: https://cloud.google.com/kubernetes-engine/docs/how-to/shielded-gke-nodes
        title: GKE Shielded Nodes documentation
  - uid: mondoo-gcp-security-gke-shielded-nodes-enabled-gcp
    filters: asset.platform == 'gcp-gke-cluster'
    mql: |
      gcp.project.gkeService.cluster.shieldedNodesConfig['enabled'] == true
  - uid: mondoo-gcp-security-gke-shielded-nodes-enabled-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_container_cluster')
    mql: |
      terraform.resources('google_container_cluster').all(
        blocks.where(type == 'node_config').any(
          blocks.where(type == 'shielded_instance_config').any(
            arguments.enable_secure_boot == true && arguments.enable_integrity_monitoring == true
          )
        )
      )
  - uid: mondoo-gcp-security-gke-shielded-nodes-enabled-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_container_cluster')
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_container_cluster').all(
        change.after.node_config != empty &&
        change.after.node_config.any(
          _['shielded_instance_config'] != empty &&
          _['shielded_instance_config'].any(_['enable_secure_boot'] == true && _['enable_integrity_monitoring'] == true)
        )
      )
