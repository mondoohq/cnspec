  - uid: mondoo-gcp-security-compute-disk-csek-encryption
    title: Ensure Compute Engine disks are encrypted with CSEK
    impact: 30
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-gcp-security-compute-disk-csek-encryption-gcp
        tags:
          mondoo.com/filter-title: GCP Compute Disk
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-compute-disk-csek-encryption-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-compute-disk-csek-encryption-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-compute-disk-csek-encryption-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Compute Engine persistent disks are encrypted using Customer-Supplied Encryption Keys (CSEK). By default, GCP encrypts disks with Google-managed keys, meaning Google holds and manages the encryption material. With CSEK, the customer provides the key for every disk operation and Google never retains it at rest, giving the customer exclusive control over access to the encrypted data.

        **Why this matters**

        - **Maximum key control:** The encryption key never resides in Google's infrastructure at rest; Google uses it only in memory during the operation, so Google personnel have no standing access to the key material.
        - **Data sovereignty:** Organizations with strict regulatory or contractual requirements that prohibit a cloud provider from storing encryption keys can satisfy those requirements using CSEK.
        - **Key revocation:** Losing or destroying the CSEK immediately renders the disk data inaccessible to anyone, including Google, providing a hard guarantee of data destruction without deleting the disk.
        - **Separation of duties:** Storing the CSEK outside of GCP means that a full compromise of the GCP project does not automatically give an attacker access to disk contents.

        **Risk mitigation**

        - **Provider independence:** Data encrypted with CSEK is inaccessible to Google even under a lawful government request unless the customer's key is also obtained independently.
        - **Zero residual access:** Rotating or deleting the CSEK immediately revokes any party's ability to decrypt existing disk snapshots or images derived from that disk.
        - **Compliance alignment:** CSEK satisfies encryption-at-rest requirements in frameworks that mandate customer-controlled key material.
      audit: |
        ### Audit via Console

        1. Navigate to **Compute Engine** > **Disks**.
        2. Select a disk to view its details.
        3. In the **Encryption** section, check the **Encryption type** field.

        A passing disk shows **Encryption type: Customer-supplied**. A failing disk shows **Encryption type: Google-managed** or **Customer-managed**.

        ### Audit via CLI

        1. Describe the disk and inspect the encryption key field:

        ```bash
        gcloud compute disks describe <disk-name> \
          --zone=<zone> \
          --format="value(diskEncryptionKey)"
        ```

        A passing disk returns a `diskEncryptionKey` object containing a `sha256` hash (indicating a customer-supplied key was used). A failing disk returns an empty value or a `kmsKeyName` (indicating Google-managed or CMEK encryption).
      remediation:
        - id: console
          desc: |
            To ensure Compute Engine disks are encrypted with CSEK using the Google Cloud Console, CSEK must be specified at disk creation time and cannot be added to existing disks.

            1. Navigate to **Compute Engine** > **Disks** > **Create disk**.
            2. Under **Encryption**, select **Customer-supplied key**.
            3. Provide the 256-bit encryption key (base64-encoded).
            4. Select **Create**.
        - id: cli
          desc: |
            To ensure Compute Engine disks are encrypted with CSEK using the gcloud CLI, create a disk with a customer-supplied encryption key:

            ```bash
            gcloud compute disks create <disk-name> \
              --csek-key-file=<key-file.json> \
              --zone=<zone>
            ```

            The key file is a JSON file containing the base64-encoded 256-bit AES key.
        - id: terraform
          desc: |
            To ensure Compute Engine disks are encrypted with CSEK in Terraform, specify a customer-supplied encryption key when creating a disk:

            ```hcl
            resource "google_compute_disk" "example" {
              name = "example-disk"
              type = "pd-standard"
              zone = "us-central1-a"

              disk_encryption_key {
                raw_key = var.disk_encryption_key
              }
            }
            ```
    refs:
      - url: https://cloud.google.com/compute/docs/disks/customer-supplied-encryption
        title: Google Cloud Documentation - Customer-supplied encryption keys
  - uid: mondoo-gcp-security-compute-disk-csek-encryption-gcp
    filters: asset.platform == "gcp-compute-disk"
    mql: |
      gcp.compute.disk.diskEncryptionKey != empty
      gcp.compute.disk.diskEncryptionKey['sha256'] != empty
  - uid: mondoo-gcp-security-compute-disk-csek-encryption-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_compute_disk')
    mql: |
      terraform.resources('google_compute_disk').all(
        blocks.where(type == 'disk_encryption_key') != empty &&
        blocks.where(type == 'disk_encryption_key').all(
          arguments.raw_key != empty || arguments.sha256 != empty
        )
      )
  - uid: mondoo-gcp-security-compute-disk-csek-encryption-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_compute_disk')
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_compute_disk').all(
        change.after['disk_encryption_key'] != empty &&
        change.after['disk_encryption_key'].any(
          _['raw_key'] != empty || _['sha256'] != empty
        )
      )
  - uid: mondoo-gcp-security-compute-disk-csek-encryption-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'google_compute_disk')
    mql: |
      terraform.state.resources.where(type == 'google_compute_disk').all(
        values['disk_encryption_key'] != empty &&
        values['disk_encryption_key'].any(
          _['raw_key'] != empty || _['sha256'] != empty
        )
      )
  - uid: mondoo-gcp-security-gke-metadata-concealment-enabled
    title: Ensure GKE workload metadata concealment is enabled
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-1
      compliance/nist-csf-2: nist-csf-2-pr-ps-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-2
      compliance/pci-dss-4: pcidss-requirement-2-2-1
      compliance/soc2-2017: soc2-control-cc7-1-1
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-gcp-security-gke-metadata-concealment-enabled-gcp
        tags:
          mondoo.com/filter-title: GCP GKE Cluster
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-gke-metadata-concealment-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-gke-metadata-concealment-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-gke-metadata-concealment-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that GKE node pools are configured to use the GKE Metadata Server, which prevents workloads from accessing the underlying Compute Engine instance metadata. When the workload metadata mode is set to `GKE_METADATA`, pods interact with a GKE-specific metadata server that conceals the node's service account credentials and other sensitive instance attributes.

        **Why this matters**

        - **Credential theft prevention:** Without metadata concealment, any pod can query the instance metadata service at `169.254.169.254` and obtain the node's service account token, enabling privilege escalation to every resource that service account can access.
        - **Workload Identity prerequisite:** The GKE Metadata Server is required for Workload Identity, which maps Kubernetes service accounts to Google Cloud IAM service accounts for fine-grained, per-workload access control.
        - **Container escape hardening:** If a container escape occurs, the attacker cannot trivially obtain cloud credentials from the metadata service, limiting the impact of the compromise to the host rather than the entire GCP project.
        - **Defense in depth:** Metadata concealment reduces the value of any code execution gained inside a pod, making lateral movement from the container layer to the cloud control plane harder.

        **Risk mitigation**

        - **Blast radius containment:** Workloads running with metadata concealment cannot obtain credentials that exceed the permissions granted to their own Kubernetes service account.
        - **Least privilege enforcement:** Combined with Workload Identity, this setting gives each pod only the minimum GCP permissions it needs, with no ability to inherit broader node-level permissions.
        - **Incident response clarity:** When a pod is compromised, responders can be confident the attacker did not laterally escalate to the node's service account, simplifying scope assessment.
      audit: |
        ### Audit via Console

        1. Navigate to **Kubernetes Engine** > **Clusters**.
        2. Select the cluster and click the **Nodes** tab.
        3. For each node pool, click the node pool name and review the **Security** section.
        4. Check the **Workload Identity** or **Metadata server** setting.

        A passing node pool shows **GKE Metadata Server** enabled for workload metadata. A failing node pool shows **Expose all Compute Engine metadata to pods** or no GKE Metadata Server configuration.

        ### Audit via CLI

        1. Describe node pools and inspect the workload metadata configuration:

        ```bash
        gcloud container node-pools list \
          --cluster=<cluster-name> \
          --format="table(name, config.workloadMetadataConfig.mode)"
        ```

        A passing node pool returns `GKE_METADATA` as the workload metadata mode. A failing node pool returns `EXPOSE` or an empty value.
      remediation:
        - id: cli
          desc: |
            To ensure GKE workload metadata concealment is enabled using the gcloud CLI, update a node pool to use the GKE Metadata Server:

            ```bash
            gcloud container node-pools update <pool-name> \
              --cluster=<cluster-name> \
              --workload-metadata=GKE_METADATA
            ```

            For new node pools:

            ```bash
            gcloud container node-pools create <pool-name> \
              --cluster=<cluster-name> \
              --workload-metadata=GKE_METADATA
            ```
        - id: console
          desc: |
            To ensure GKE workload metadata concealment is enabled using the Google Cloud Console:

            1. Navigate to **Kubernetes Engine** > **Clusters**.
            2. Select the cluster and click the **Nodes** tab.
            3. Select the node pool and select **Edit**.
            4. Under **Security**, set **Workload Identity** to **GKE Metadata Server**.
            5. Select **Save**.
        - id: terraform
          desc: |
            To ensure GKE workload metadata concealment is enabled in Terraform, configure workload metadata mode in the node config:

            ```hcl
            resource "google_container_cluster" "example" {
              name     = "example-cluster"
              location = "us-central1"

              node_config {
                workload_metadata_config {
                  mode = "GKE_METADATA"
                }
              }
            }
            ```
    refs:
      - url: https://cloud.google.com/kubernetes-engine/docs/how-to/protecting-cluster-metadata
        title: Google Cloud Documentation - Protecting cluster metadata
  - uid: mondoo-gcp-security-gke-metadata-concealment-enabled-gcp
    filters: asset.platform == 'gcp-gke-cluster'
    mql: |
      gcp.project.gkeService.cluster.nodePools.all(
        config.workloadMetadataMode == "GKE_METADATA"
      )
  - uid: mondoo-gcp-security-gke-metadata-concealment-enabled-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_container_cluster')
    mql: |
      terraform.resources('google_container_cluster').all(
        blocks.where(type == 'node_config').any(
          blocks.where(type == 'workload_metadata_config') != empty &&
          blocks.where(type == 'workload_metadata_config').all(
            arguments.mode == "GKE_METADATA"
          )
        )
      )
  - uid: mondoo-gcp-security-gke-metadata-concealment-enabled-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_container_cluster')
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_container_cluster').all(
        change.after.node_config != empty &&
        change.after.node_config.any(
          _['workload_metadata_config'] != empty &&
          _['workload_metadata_config'].any(_['mode'] == "GKE_METADATA")
        )
      )
  - uid: mondoo-gcp-security-gke-metadata-concealment-enabled-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'google_container_cluster')
    mql: |
      terraform.state.resources.where(type == 'google_container_cluster').all(
        values.node_config != empty &&
        values.node_config.any(
          _['workload_metadata_config'] != empty &&
          _['workload_metadata_config'].any(_['mode'] == "GKE_METADATA")
        )
      )
  - uid: mondoo-gcp-security-gke-control-plane-private-endpoint
    title: Ensure GKE control plane uses a private endpoint
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-gcp-security-gke-control-plane-private-endpoint-gcp
        tags:
          mondoo.com/filter-title: GCP GKE Cluster
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-gke-control-plane-private-endpoint-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-gke-control-plane-private-endpoint-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-gke-control-plane-private-endpoint-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that the GKE cluster API server is accessible only through a private endpoint within the VPC and not through a public IP address. By default, GKE clusters expose the control plane via a public endpoint, making the Kubernetes API server reachable from the internet and subject to brute-force attacks, credential stuffing, and exploitation of API server vulnerabilities.

        **Why this matters**

        - **Reduced attack surface:** A private-only control plane endpoint eliminates all internet-based attack paths against the Kubernetes API server, including unauthenticated probing and zero-day exploitation attempts.
        - **Stronger than authorized networks alone:** Master authorized networks restrict which IPs can reach a public endpoint, but the endpoint still exists and is still subject to bypass if network controls are misconfigured; a private endpoint removes the exposure entirely.
        - **Management plane isolation:** Restricting API server access to the VPC ensures that all cluster administration must originate from within the trusted network boundary, through a bastion, or over VPN.
        - **Compliance alignment:** Many security frameworks require that management interfaces for production systems be accessible only from private networks, not directly from the internet.

        **Risk mitigation**

        - **No public API exposure:** Removing the public endpoint eliminates the class of attacks that depend on reaching the API server from outside the VPC.
        - **Forced use of secure access paths:** All cluster management must traverse the VPC, requiring principals to first authenticate to and connect via an approved access path such as Cloud VPN or Cloud Interconnect.
        - **Defense in depth:** Even if node or workload credentials are compromised, an attacker outside the VPC cannot reach the API server to exploit those credentials.
      audit: |
        ### Audit via Console

        1. Navigate to **Kubernetes Engine** > **Clusters**.
        2. Select the cluster and click the **Networking** tab.
        3. Look for the **Private cluster** and **Control plane endpoint access** settings.
        4. Check whether **Access control plane using its internal IP address only** is enabled.

        A passing cluster shows the control plane configured with only a private endpoint. A failing cluster shows that the control plane has a public endpoint enabled.

        ### Audit via CLI

        1. Describe the cluster and inspect the private cluster configuration:

        ```bash
        gcloud container clusters describe <cluster-name> \
          --format="value(privateClusterConfig.enablePrivateEndpoint)"
        ```

        A passing cluster returns `True`. A failing cluster returns `False` or an empty value.
      remediation:
        - id: cli
          desc: |
            To ensure GKE control plane uses a private endpoint using the gcloud CLI, enable private endpoint on an existing cluster:

            ```bash
            gcloud container clusters update <cluster-name> \
              --enable-private-endpoint
            ```

            For new clusters:

            ```bash
            gcloud container clusters create <cluster-name> \
              --enable-private-nodes \
              --enable-private-endpoint \
              --master-ipv4-cidr=172.16.0.0/28
            ```

            Note: Enabling the private endpoint requires that all API access come from within the VPC or through authorized networks.
        - id: console
          desc: |
            To ensure GKE control plane uses a private endpoint using the Google Cloud Console, private endpoint can be configured at cluster creation or enabled on an existing cluster:

            **For new clusters:**

            1. Go to **Kubernetes Engine** > **Clusters** > **Create**.
            2. In the **Networking** section, enable **Private cluster**.
            3. Check **Access control plane using its internal IP address only**.
            4. Complete the cluster creation.

            **For existing clusters:**

            1. Go to **Kubernetes Engine** > **Clusters** and select the cluster.
            2. Select **Edit** and navigate to the **Networking** section.
            3. Enable **Access control plane using its internal IP address only**.
            4. Select **Save**.

            **Warning:** Enabling the private endpoint on an existing cluster will remove public API access. Ensure all API clients can reach the control plane via the VPC before making this change.
        - id: terraform
          desc: |
            To ensure GKE control plane uses a private endpoint in Terraform, enable the private endpoint in the private cluster config:

            ```hcl
            resource "google_container_cluster" "example" {
              name     = "example-cluster"
              location = "us-central1"

              private_cluster_config {
                enable_private_nodes    = true
                enable_private_endpoint = true
                master_ipv4_cidr_block  = "172.16.0.0/28"
              }
            }
            ```
    refs:
      - url: https://cloud.google.com/kubernetes-engine/docs/how-to/private-clusters
        title: Google Cloud Documentation - Private clusters
  - uid: mondoo-gcp-security-gke-control-plane-private-endpoint-gcp
    filters: asset.platform == 'gcp-gke-cluster'
    mql: |
      gcp.project.gkeService.cluster.privateClusterConfig['enablePrivateEndpoint'] == true
  - uid: mondoo-gcp-security-gke-control-plane-private-endpoint-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_container_cluster')
    mql: |
      terraform.resources('google_container_cluster').all(
        blocks.where(type == 'private_cluster_config').any(arguments.enable_private_endpoint == true)
      )
  - uid: mondoo-gcp-security-gke-control-plane-private-endpoint-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_container_cluster')
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_container_cluster').all(
        change.after.private_cluster_config != empty &&
        change.after.private_cluster_config.any(_['enable_private_endpoint'] == true)
      )
  - uid: mondoo-gcp-security-gke-control-plane-private-endpoint-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'google_container_cluster')
    mql: |
      terraform.state.resources.where(type == 'google_container_cluster').all(
        values.private_cluster_config != empty &&
        values.private_cluster_config.any(_['enable_private_endpoint'] == true)
      )
