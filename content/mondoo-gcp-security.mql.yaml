    docs:
      desc: |
        This check ensures that the `constraints/storage.uniformBucketLevelAccess` organization policy is enforced, requiring all Cloud Storage buckets to use IAM-only access control instead of legacy ACLs. By default this constraint is not enforced, allowing buckets to mix IAM policies and object-level ACLs, which can produce conflicting and overly permissive access configurations.

        **Why this matters**

        - **Consistent authorization model:** Uniform bucket-level access removes object-level ACLs and routes all access decisions through IAM, making permissions easier to audit and reason about.
        - **Eliminates ACL drift:** Legacy ACLs applied at the object level can inadvertently expose individual objects even when bucket-level IAM policies are restrictive, creating undetected data exposure.
        - **Organization-wide enforcement:** Configuring this at the organization policy level prevents any project member from creating new buckets with legacy ACLs enabled, removing a common misconfiguration path.
        - **Audit completeness:** IAM-only access ensures all access events appear in Cloud Audit Logs under a single authorization model, simplifying forensic investigations.

        **Risk mitigation**

        - **Data exposure:** Removing object-level ACLs eliminates the risk of individual files being publicly readable while the bucket appears properly secured at the IAM level.
        - **Permission sprawl:** Centralizing access control in IAM makes it practical to regularly review and revoke excess permissions across all storage objects.
      audit: |
        ### Audit via Console

        1. Go to the **IAM & Admin > Organization Policies** page in the Google Cloud Console.
        2. Search for the policy **Enforce uniform bucket-level access** (`storage.uniformBucketLevelAccess`).
        3. Select the policy and review its enforcement status.

        A passing project shows the `storage.uniformBucketLevelAccess` constraint with enforcement set to **On**. A failing project shows the policy as **Not configured** or enforcement set to **Off**.

        ### Audit via CLI

        1. Describe the `storage.uniformBucketLevelAccess` organization policy for the project:

        ```bash
        gcloud resource-manager org-policies describe storage.uniformBucketLevelAccess \
          --project=PROJECT_ID
        ```

        A passing project returns a policy with `booleanPolicy.enforced: true`. A failing project returns `NOT_FOUND` or a policy without `booleanPolicy.enforced: true`.
      remediation:
        - id: terraform
          desc: |
            To ensure uniform bucket-level access is enforced via organization policy in Terraform:

            ```hcl
            resource "google_org_policy_policy" "uniform_bucket_access" {
              name   = "projects/PROJECT_ID/policies/storage.uniformBucketLevelAccess"
              parent = "projects/PROJECT_ID"

              spec {
                rules {
                  enforce = "TRUE"
                }
              }
            }
            ```
        - id: console
          desc: |
            To ensure uniform bucket-level access is enforced via organization policy using the Google Cloud Console:

            1. Go to the **IAM & Admin > Organization Policies** page.
            2. Search for **Enforce uniform bucket-level access** (`storage.uniformBucketLevelAccess`).
            3. Click the policy and select **Manage Policy**.
            4. Set the enforcement to **On**.
            5. Select **Set Policy**.
        - id: cli
          desc: |
            To ensure uniform bucket-level access is enforced via organization policy using the Google Cloud CLI:

            ```bash
            gcloud resource-manager org-policies enable-enforce \
              storage.uniformBucketLevelAccess --project=PROJECT_ID
            ```
    refs:
