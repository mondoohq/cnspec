  - uid: mondoo-gcp-security-firewall-no-overly-permissive-ingress
    title: Ensure firewall rules do not allow unrestricted internet ingress
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-gcp-security-firewall-no-overly-permissive-ingress-gcp
        tags:
          mondoo.com/filter-title: GCP Compute Firewall
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-firewall-no-overly-permissive-ingress-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-firewall-no-overly-permissive-ingress-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-firewall-no-overly-permissive-ingress-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that GCP firewall rules allowing ingress from the entire internet (0.0.0.0/0 or ::/0) specify explicit port restrictions rather than leaving all ports open. By default, GCP permits creating firewall rules that allow a protocol such as TCP without listing any ports, which silently opens all 65,535 ports to the internet.

        **Why this matters**

        - **Unlimited attack surface:** A protocol-only allow rule exposes every service listening on any port to the public internet, including internal tools and management interfaces never intended to be public.
        - **Invisible exposure creep:** Any new process that binds to a port on the instance immediately becomes reachable from the internet without any additional firewall change.
        - **Exploitation risk:** Broad port exposure dramatically increases the likelihood of discovering and exploiting vulnerable or misconfigured services.
        - **Compliance gaps:** Least-privilege network access is a foundational requirement across major security frameworks; unrestricted port exposure fails that requirement.
        - **Audit opacity:** Without port constraints, it is impossible to reason clearly about what network surface is actually exposed.

        **Risk mitigation**

        - **Explicit port scoping:** Always specify port numbers in firewall allow rules so the permitted traffic is unambiguous and minimal.
        - **Per-service rules:** Create separate firewall rules for each service with only the ports it requires, rather than sharing broad rules across services.
        - **Targeted application:** Use network tags or service accounts to apply rules to the specific instances that need them, not the entire network.
      audit: |
        ### Audit via Console

        1. Sign in to the [Google Cloud Console](https://console.cloud.google.com).
        2. Navigate to **VPC Network** > **Firewall**.
        3. Review each firewall rule with **Direction** set to `Ingress` and a **Source IP range** of `0.0.0.0/0` or `::/0`.
        4. For each such rule, check the **Protocols and ports** column. Verify that every allowed protocol specifies explicit port numbers rather than allowing all ports.

        A passing firewall rule that allows internet ingress specifies explicit port numbers for each protocol (for example, `tcp:80,443`). A failing rule allows internet ingress with a protocol but no port restrictions (for example, `tcp` with no ports listed), or allows all protocols.

        ### Audit via CLI

        1. List all ingress firewall rules that allow traffic from the internet:

        ```bash
        gcloud compute firewall-rules list \
          --filter="direction=INGRESS AND sourceRanges:0.0.0.0/0" \
          --format="table(name,direction,allowed,sourceRanges)"
        ```

        Review the `ALLOW` column output. A passing rule shows `tcp:80` or similar entries with explicit port numbers. A failing rule shows `tcp` with no port numbers, or `all`, in the `ALLOW` column alongside a source range of `0.0.0.0/0` or `::/0`.
      remediation:
        - id: terraform
          desc: |
            To ensure firewall rules do not allow unrestricted internet ingress in Terraform, always specify explicit ports in firewall allow rules:

            ```hcl
            resource "google_compute_firewall" "allow_web" {
              name    = "allow-web"
              network = google_compute_network.default.name

              allow {
                protocol = "tcp"
                ports    = ["80", "443"]  # Always specify explicit ports
              }

              source_ranges = ["0.0.0.0/0"]
            }
            ```

            Avoid configurations like this:

            ```hcl
            # BAD: No ports specified means all ports are open
            allow {
              protocol = "tcp"
              # Missing ports = all TCP ports allowed
            }
            ```
        - id: console
          desc: |
            To ensure firewall rules do not allow unrestricted internet ingress using the Google Cloud Console:

            1. Log in to the GCP Console at https://console.cloud.google.com.
            2. Navigate to **VPC Network** > **Firewall**.
            3. Identify any firewall rules that allow traffic from 0.0.0.0/0 or ::/0 without specific port restrictions.
            4. Select the rule and select **Edit**.
            5. Under **Protocols and ports**, change from **Allow all** to **Specified protocols and ports**.
            6. Enter only the specific ports required, such as tcp:80,443.
            7. Select **Save**.
        - id: cli
          desc: |
            To ensure firewall rules do not allow unrestricted internet ingress using the Google Cloud CLI, update a firewall rule to specify explicit ports:

            ```bash
            gcloud compute firewall-rules update RULE_NAME \
              --rules=tcp:80,tcp:443
            ```
