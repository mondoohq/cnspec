  - uid: mondoo-gcp-security-gke-node-auto-upgrade-enabled
    title: Ensure GKE node auto-upgrade is enabled
    impact: 40
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-tvm-03
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-8
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-12
      compliance/nist-csf-2: nist-csf-2-pr-ps-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-1
      compliance/pci-dss-4: pcidss-requirement-6-3-3
      compliance/soc2-2017: soc2-control-cc7-1-1
      compliance/vda-isa-5: vda-isa-5-5-2-5
    variants:
      - uid: mondoo-gcp-security-gke-node-auto-upgrade-enabled-gcp
        tags:
          mondoo.com/filter-title: GCP GKE Cluster
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-gke-node-auto-upgrade-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-gke-node-auto-upgrade-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-gke-node-auto-upgrade-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that GKE node pools have automatic upgrade enabled. Node auto-upgrade keeps nodes aligned with a supported, patched Kubernetes version, closing the window of exposure to known vulnerabilities that accumulates when upgrades are managed manually.

        **Why this matters**

        - **Unpatched vulnerabilities:** Without auto-upgrade, nodes remain on older Kubernetes releases that may contain publicly disclosed CVEs long after patches are available.
        - **Version skew:** Manual upgrade cycles frequently lag behind control plane upgrades, creating a version gap that limits the use of newer security features and can violate Kubernetes support policy.
        - **Operational reliability:** Delayed manual upgrades are a common source of emergency patching events; automated upgrades eliminate the accumulating risk that makes emergency patches necessary.

        **Risk mitigation**

        - **Enable per node pool:** Set `management.auto_upgrade = true` on every node pool, including default node pools, to ensure no pool is left behind during cluster upgrades.
        - **Maintenance windows:** Configure a maintenance window to constrain when auto-upgrades apply, balancing patch timeliness with workload disruption tolerance.
      audit: |
        ### Audit via Console

        1. Navigate to **Kubernetes Engine** > **Clusters**.
        2. Select the cluster and click the **Nodes** tab.
        3. For each node pool, click the node pool name to view its details.
        4. Check the **Management** section for the **Auto-upgrade** setting.

        A passing node pool shows **Auto-upgrade: Enabled**. A failing node pool shows **Auto-upgrade: Disabled** or the setting is absent.

        ### Audit via CLI

        1. List all node pools in the cluster and inspect their management configuration:

        ```bash
        gcloud container node-pools list \
          --cluster=<cluster-name> \
          --format="table(name, management.autoUpgrade)"
        ```

        A passing node pool returns `autoUpgrade: True`. A failing node pool returns `autoUpgrade: False` or an empty value.
      remediation:
        - id: console
          desc: |
            To ensure GKE node auto-upgrade is enabled using the Google Cloud Console:

            1. Navigate to **Kubernetes Engine** > **Clusters**.
            2. Select the cluster.
            3. Click the **Nodes** tab and select the node pool.
            4. Select **Edit**.
            5. Under **Management**, enable **Auto-upgrade**.
            6. Select **Save**.
        - id: cli
          desc: |
            To ensure GKE node auto-upgrade is enabled using the gcloud CLI, enable auto-upgrade on a node pool:

            ```bash
            gcloud container node-pools update <pool-name> \
              --cluster=<cluster-name> \
              --enable-autoupgrade
            ```
        - id: terraform
          desc: |
            To ensure GKE node auto-upgrade is enabled in Terraform, enable auto-upgrade in the node pool management block:

            ```hcl
            resource "google_container_node_pool" "example" {
              name    = "example-pool"
              cluster = google_container_cluster.example.name

              management {
                auto_upgrade = true
              }
            }
            ```
    refs:
      - url: https://cloud.google.com/kubernetes-engine/docs/how-to/node-auto-upgrades
        title: Google Cloud Documentation - Node auto-upgrades
  - uid: mondoo-gcp-security-gke-node-auto-upgrade-enabled-gcp
    filters: asset.platform == 'gcp-gke-cluster'
    mql: |
      gcp.project.gkeService.cluster.nodePools.all(
        management["autoUpgrade"] == true
      )
  - uid: mondoo-gcp-security-gke-node-auto-upgrade-enabled-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_container_node_pool')
    mql: |
      terraform.resources('google_container_node_pool').all(
        blocks.where(type == 'management') != empty &&
        blocks.where(type == 'management').all(arguments.auto_upgrade == true)
      )
  - uid: mondoo-gcp-security-gke-node-auto-upgrade-enabled-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_container_node_pool')
