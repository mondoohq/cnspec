    docs:
      desc: |
        This check ensures that Cloud SQL MySQL instances are configured with the `local_infile` flag set to `off`. By default, MySQL may permit clients to use the `LOAD DATA LOCAL INFILE` statement, which allows the server to read files from the client machine or, in certain attack scenarios, allows a malicious server to request arbitrary files from a connected client. Disabling this flag eliminates a class of file-reading vulnerabilities that exist at the MySQL protocol level.

        **Why this matters**

        - **Client file exposure prevention:** With `local_infile` enabled, a malicious or compromised server can instruct a connecting client to send local files, potentially leaking sensitive data from the application host.
        - **Attack surface reduction:** Disabling the feature removes a MySQL-level vector that attackers have exploited to read configuration files, credentials, and other sensitive data from application servers.
        - **Defense in depth:** Even when network-level controls are in place, disabling unnecessary MySQL features reduces the consequences of a successful SQL injection or server compromise.

        **Risk mitigation**

        - **Credential exfiltration prevention:** Disabling `local_infile` blocks an attacker who has gained partial control of a MySQL session from reading application credentials or other sensitive files off the client host.
        - **Reduced impact of SQL injection:** SQL injection that achieves server-side query execution cannot leverage `LOAD DATA LOCAL INFILE` to pivot into file-system access when the flag is off.
      audit: |
        **Using Google Cloud Console**

        1.  Navigate to the Cloud SQL Instances page: [https://console.cloud.google.com/sql/instances](https://console.cloud.google.com/sql/instances).
        2.  Select a MySQL instance to view its details.
        3.  In the **Configuration** section, find the **Database flags** area.
        4.  Verify that the `local_infile` flag is listed and its value is set to `off`.

        **Using Google Cloud CLI**

        1.  List your Cloud SQL instances:
            ```bash
            gcloud sql instances list
            ```
        2.  For each MySQL instance, check the flag's value:
            ```bash
            gcloud sql instances describe INSTANCE_NAME --format=json | jq '.settings.databaseFlags[] | select(.name=="local_infile")|.value'
            ```
            Ensure the output for each MySQL instance is `"off"`.
      remediation:
        - id: console
          desc: |
            To ensure 'local_infile' flag is disabled for Cloud SQL MySQL using the Google Cloud Console:

            1.  Navigate to the Cloud SQL Instances page: [https://console.cloud.google.com/sql/instances](https://console.cloud.google.com/sql/instances).
            2.  Select the target MySQL instance.
            3.  Select **Edit**.
            4.  Scroll down to the **Flags** section.
            5.  If the flag isn't present, select **Add item**.
            6.  Choose `local_infile` from the dropdown and set its value to `off`. If the flag exists but is `on`, change its value to `off`.
            7.  Select **Save**. Review the **Flags** section on the instance overview page to confirm.
        - id: cli
          desc: |
            To ensure 'local_infile' flag is disabled for Cloud SQL MySQL using the Google Cloud CLI, update the flag for a specific MySQL instance:
            ```bash
            gcloud sql instances patch INSTANCE_NAME --database-flags local_infile=off
            ```
            *Note: This command overwrites all existing flags. To preserve other flags, you must include them in the `--database-flags` argument (e.g., `--database-flags local_infile=off,other_flag=value`).*
        - id: terraform
          desc: |
            To ensure 'local_infile' flag is disabled for Cloud SQL MySQL in Terraform, ensure the `database_flags` block within your `google_sql_database_instance` resource includes the setting:
            ```hcl
            resource "google_sql_database_instance" "mysql_instance" {
              name             = "my-mysql-instance"
              database_version = "MYSQL_8_0"
              region           = "us-central1"
              settings {
                tier = "db-f1-micro"
                database_flags {
                  name  = "local_infile"
                  value = "off"
                }
                # Include other settings and flags as needed
              }
            }
            ```
