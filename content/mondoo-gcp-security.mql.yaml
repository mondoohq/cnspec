        change.after['security_posture_config'] != empty &&
        change.after['security_posture_config'].any(
          _['mode'] != "DISABLED" &&
          _['vulnerability_mode'] != "VULNERABILITY_DISABLED"
        )
      )
  - uid: mondoo-gcp-security-gke-security-posture-enabled-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'google_container_cluster')
    mql: |
