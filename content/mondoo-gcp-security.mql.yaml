  - uid: mondoo-gcp-security-gke-cos-node-image
    title: Ensure GKE nodes use Container-Optimized OS
    impact: 40
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-04
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-1
      compliance/nist-csf-2: nist-csf-2-pr-ps-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-2
      compliance/pci-dss-4: pcidss-requirement-2-2-1
      compliance/soc2-2017: soc2-control-cc7-1-1
      compliance/vda-isa-5: vda-isa-5-5-2-3
    variants:
      - uid: mondoo-gcp-security-gke-cos-node-image-gcp
        tags:
          mondoo.com/filter-title: GCP GKE Cluster
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-gke-cos-node-image-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-gke-cos-node-image-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-gke-cos-node-image-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that GKE node pools use Container-Optimized OS (COS or COS_CONTAINERD) as their node image. COS is a Google-maintained, minimal operating system purpose-built for running containers, with a significantly smaller attack surface than general-purpose Linux distributions.

        **Why this matters**

        - **Reduced attack surface:** COS includes only the packages necessary to run containers, eliminating the libraries, tools, and services present in general-purpose OS images that would otherwise be available to an attacker who escapes a container.
        - **Read-only root filesystem:** COS boots with a verified, read-only root filesystem, preventing persistent rootkit installation even if an attacker achieves kernel-level access.
        - **Security hardening:** COS ships with SSH disabled by default, locked-down system services, and kernel security features enabled, requiring no additional hardening steps.
        - **Automatic patching:** Google releases COS updates frequently and GKE auto-upgrade applies them, keeping nodes on patched images without manual intervention.

        **Risk mitigation**

        - **Default image enforcement:** Specifying `COS_CONTAINERD` in node pool configuration through infrastructure as code prevents teams from accidentally selecting less-hardened images such as Ubuntu.
        - **Verified boot:** COS's verified boot process detects tampering with the OS partition at startup, providing an integrity check that general-purpose images do not offer.
      audit: |
        ### Audit via Console

        1. Navigate to **Kubernetes Engine** > **Clusters**.
        2. Select the cluster and click the **Nodes** tab.
        3. For each node pool, click the node pool name and review the **Node image** field.

        A passing node pool shows an image type of **Container-Optimized OS with containerd (cos_containerd)** or **Container-Optimized OS (cos)**. A failing node pool shows a different image type such as **Ubuntu** or **Windows Server**.

        ### Audit via CLI

        1. List node pools and their image types:

        ```bash
        gcloud container node-pools list \
          --cluster=<cluster-name> \
          --format="table(name, config.imageType)"
        ```

        A passing node pool returns `COS_CONTAINERD` or `COS` as the image type. A failing node pool returns a different value such as `UBUNTU` or `WINDOWS_SAC`.
      remediation:
        - id: console
          desc: |
            To ensure GKE nodes use Container-Optimized OS using the Google Cloud Console:

            1. Navigate to **Kubernetes Engine** > **Clusters**.
            2. Select the cluster and click the **Nodes** tab.
            3. Select the node pool and select **Edit**.
            4. Under **Image type**, select **Container-Optimized OS with containerd (cos_containerd)**.
            5. Select **Save**.
        - id: cli
          desc: |
            To ensure GKE nodes use Container-Optimized OS using the gcloud CLI, create a node pool with COS (the image type cannot be changed on existing node pools):

            ```bash
            gcloud container node-pools create <pool-name> \
              --cluster=<cluster-name> \
              --image-type=COS_CONTAINERD
            ```
        - id: terraform
          desc: |
            To ensure GKE nodes use Container-Optimized OS in Terraform, specify COS as the image type in the node config:

            ```hcl
            resource "google_container_cluster" "example" {
              name     = "example-cluster"
              location = "us-central1"

              node_config {
                image_type = "COS_CONTAINERD"
              }
            }
            ```
    refs:
      - url: https://cloud.google.com/container-optimized-os/docs
        title: Google Cloud Documentation - Container-Optimized OS
  - uid: mondoo-gcp-security-gke-cos-node-image-gcp
    filters: asset.platform == 'gcp-gke-cluster'
    mql: |
      gcp.project.gkeService.cluster.nodePools.all(
        config.imageType == "COS_CONTAINERD" || config.imageType == "COS"
      )
  - uid: mondoo-gcp-security-gke-cos-node-image-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_container_cluster')
    mql: |
      terraform.resources('google_container_cluster').all(
        blocks.where(type == 'node_config') == empty ||
        blocks.where(type == 'node_config').all(
          arguments.image_type == empty ||
          arguments.image_type == "COS_CONTAINERD" || arguments.image_type == "COS"
        )
      )
  - uid: mondoo-gcp-security-gke-cos-node-image-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_container_cluster')
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_container_cluster').all(
        change.after.node_config == empty ||
        change.after.node_config.all(
          _['image_type'] == empty ||
          _['image_type'] == "COS_CONTAINERD" || _['image_type'] == "COS"
        )
      )
  - uid: mondoo-gcp-security-gke-cos-node-image-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'google_container_cluster')
    mql: |
      terraform.state.resources.where(type == 'google_container_cluster').all(
        values.node_config == empty ||
        values.node_config.all(
          _['image_type'] == empty ||
          _['image_type'] == "COS_CONTAINERD" || _['image_type'] == "COS"
        )
      )
  - uid: mondoo-gcp-security-cloud-sql-automated-backups-enabled
    title: Ensure Cloud SQL instances have automated backups enabled
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-bcr-08
      compliance/dora: dora-art-12
      compliance/hipaa: hipaa-security-ss164-308-a-7-ii-a-contingency-plan-data-backup-plan
      compliance/iso-27001-2022: iso-27001-2022-a-8-13
      compliance/nis-2: nis-2-21-2-c
      compliance/nist-csf-1: nist-csf-1-pr-ip-4
      compliance/nist-csf-2: nist-csf-2-pr-ds-11
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cp-9
      compliance/nist-sp-800-171: false
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc9-1-1
      compliance/vda-isa-5: vda-isa-5-3-1-2
    variants:
      - uid: mondoo-gcp-security-cloud-sql-automated-backups-enabled-gcp
        tags:
          mondoo.com/filter-title: GCP Cloud SQL Instance
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-cloud-sql-automated-backups-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-sql-automated-backups-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-sql-automated-backups-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Cloud SQL instances have automated backups enabled. By default, Cloud SQL instances do not enable automated backups; without them, there is no recovery path for accidental data deletion, schema corruption, or data destruction from a security incident.

        **Why this matters**

        - **Data loss protection:** Automated backups are the only recovery mechanism for accidental deletion, application bugs that corrupt data, or ransomware that destroys database contents.
        - **Disaster recovery foundation:** Point-in-time recovery depends on a continuous backup chain; a gap in that chain can make it impossible to restore the database to a state before an incident occurred.
        - **Compliance requirements:** Most regulatory frameworks, including HIPAA, ISO 27001, and DORA, mandate regular automated backups of production databases holding regulated data.

        **Risk mitigation**

        - **Recovery time reduction:** Enabling automated backups with a configured backup window ensures a recent restore point is always available, minimizing data loss in recovery scenarios.
        - **Ransomware resilience:** Regular backups stored separately from the production instance provide a clean restore point that is unaffected by data destruction targeting the live database.
      audit: |
        ### Audit via Console

        1. Navigate to **SQL** > **Instances**.
        2. Select the Cloud SQL instance.
        3. Click the **Backups** tab.
        4. Check whether automated backups are listed as enabled.

        A passing instance shows **Automated backups: Enabled** with a configured backup window. A failing instance shows **Automated backups: Disabled**.

        ### Audit via CLI

        1. Describe the Cloud SQL instance and inspect the backup configuration:

        ```bash
        gcloud sql instances describe <instance-name> \
          --format="value(settings.backupConfiguration.enabled)"
        ```

        A passing instance returns `True`. A failing instance returns `False` or an empty value.
      remediation:
        - id: console
          desc: |
            To ensure Cloud SQL instances have automated backups enabled using the Google Cloud Console:

            1. Navigate to **SQL** > **Instances**.
            2. Select the instance.
            3. Select **Edit**.
            4. Under **Data protection**, enable **Automated backups**.
            5. Configure backup window and retention as needed.
            6. Select **Save**.
        - id: cli
          desc: |
            To ensure Cloud SQL instances have automated backups enabled using the gcloud CLI, enable automated backups:

            ```bash
            gcloud sql instances patch <instance-name> \
              --backup-start-time=02:00
            ```
        - id: terraform
          desc: |
            To ensure Cloud SQL instances have automated backups enabled in Terraform, enable automated backups in the settings block:

            ```hcl
            resource "google_sql_database_instance" "example" {
              name             = "example-instance"
              database_version = "MYSQL_8_0"
              region           = "us-central1"

              settings {
                tier = "db-f1-micro"

                backup_configuration {
                  enabled    = true
                  start_time = "02:00"
                }
              }
            }
            ```
    refs:
      - url: https://cloud.google.com/sql/docs/mysql/backup-recovery/backing-up
        title: Google Cloud Documentation - Backing up and restoring Cloud SQL
  - uid: mondoo-gcp-security-cloud-sql-automated-backups-enabled-gcp
    filters: asset.platform == "gcp-sql"
    mql: |
      gcp.sql.instance.settings.backupConfiguration.enabled == true
  - uid: mondoo-gcp-security-cloud-sql-automated-backups-enabled-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_sql_database_instance')
    mql: |
      terraform.resources('google_sql_database_instance').all(
        blocks.where(type == 'settings') != empty &&
        blocks.where(type == 'settings').all(
          blocks.where(type == 'backup_configuration') != empty &&
          blocks.where(type == 'backup_configuration').all(arguments.enabled == true)
        )
      )
  - uid: mondoo-gcp-security-cloud-sql-automated-backups-enabled-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_sql_database_instance')
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_sql_database_instance').all(
        change.after['settings'].all(
          _['backup_configuration'] != empty &&
          _['backup_configuration'].all(_['enabled'] == true)
        )
      )
  - uid: mondoo-gcp-security-cloud-sql-automated-backups-enabled-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'google_sql_database_instance')
    mql: |
      terraform.state.resources.where(type == 'google_sql_database_instance').all(
        values['settings'].all(
          _['backup_configuration'] != empty &&
          _['backup_configuration'].all(_['enabled'] == true)
        )
      )
  - uid: mondoo-gcp-security-cloud-sql-sqlserver-cross-db-ownership-chaining-disabled
    title: Ensure cross-database ownership chaining is disabled
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-1
      compliance/nist-csf-2: nist-csf-2-pr-ps-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-2
      compliance/pci-dss-4: pcidss-requirement-2-2-1
      compliance/soc2-2017: soc2-control-cc7-1-1
      compliance/vda-isa-5: vda-isa-5-4-2-1
    variants:
      - uid: mondoo-gcp-security-cloud-sql-sqlserver-cross-db-ownership-chaining-disabled-gcp
        tags:
          mondoo.com/filter-title: GCP Cloud SQL SQL Server Instance
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-cloud-sql-sqlserver-cross-db-ownership-chaining-disabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-sql-sqlserver-cross-db-ownership-chaining-disabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-sql-sqlserver-cross-db-ownership-chaining-disabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Cloud SQL for SQL Server instances are configured to disable cross-database ownership chaining. By default, the `cross db ownership chaining` flag is set to `on`, which allows stored procedures in one database to access objects in another database without the caller holding explicit permissions on the target database.

        **Why this matters**

        - **Privilege escalation:** Cross-database ownership chaining can allow users to access data in databases they should not reach, bypassing database-level permission boundaries.
        - **Lateral movement:** An attacker who compromises one database can use ownership chaining to read or modify data in other databases on the same instance.
        - **Defense in depth:** Disabling this feature ensures each database's permission model is enforced independently, limiting the blast radius of a compromise.
        - **Minimal use cases:** Ownership chaining across databases is rarely needed in modern application designs, making the safer default almost always the right choice.

        **Risk mitigation**

        - **Permission isolation:** Each database enforces its own access controls without relying on ownership inheritance from other databases.
        - **Reduced attack surface:** Disabling cross-database chaining removes a class of privilege escalation paths available to both external attackers and malicious insiders.
        - **Auditability:** Access across database boundaries requires explicit grants, making entitlements easier to review and reason about.
      audit: |
        ### Audit via Console

        1. Navigate to **SQL** > **Instances**.
        2. Select the SQL Server instance.
        3. Select **Edit** and scroll to the **Flags** section.
        4. Look for the `cross db ownership chaining` flag and its value.

        A passing instance shows the `cross db ownership chaining` flag set to `off`. A failing instance shows the flag set to `on` or the flag is absent (which defaults to `on`).

        ### Audit via CLI

        1. Describe the Cloud SQL instance and inspect the database flags:

        ```bash
        gcloud sql instances describe <instance-name> \
          --format="value(settings.databaseFlags)"
        ```

        A passing instance returns a flag entry with `name: cross db ownership chaining` and `value: off`. A failing instance returns a value of `on` or no entry for the flag.
      remediation:
        - id: console
          desc: |
            To ensure cross-database ownership chaining is disabled using the Google Cloud Console:

            1. Navigate to **SQL** > **Instances**.
            2. Select the SQL Server instance.
            3. Select **Edit**.
            4. Under **Flags**, add or update the `cross db ownership chaining` flag to `off`.
            5. Select **Save**.
        - id: cli
          desc: |
            To ensure cross-database ownership chaining is disabled using the gcloud CLI:

            ```bash
            gcloud sql instances patch <instance-name> \
              --database-flags="cross db ownership chaining=off"
            ```
        - id: terraform
          desc: |
            To ensure cross-database ownership chaining is disabled in Terraform, set the database flag in the settings block:

            ```hcl
            resource "google_sql_database_instance" "sqlserver" {
              name             = "sqlserver-instance"
              database_version = "SQLSERVER_2019_STANDARD"
              region           = "us-central1"

              settings {
                tier = "db-custom-2-7680"

                database_flags {
                  name  = "cross db ownership chaining"
                  value = "off"
                }
              }
            }
            ```
    refs:
      - url: https://cloud.google.com/sql/docs/sqlserver/flags
        title: Google Cloud Documentation - Configuring database flags for SQL Server
  - uid: mondoo-gcp-security-cloud-sql-sqlserver-cross-db-ownership-chaining-disabled-gcp
    filters: |
      asset.platform == 'gcp-sql-sqlserver'
    mql: |
      gcp.sql.instance.settings.databaseFlags["cross db ownership chaining"] == "off"
  - uid: mondoo-gcp-security-cloud-sql-sqlserver-cross-db-ownership-chaining-disabled-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_sql_database_instance' && arguments['database_version'].contains('SQLSERVER'))
    mql: |
      # Require a 'cross db ownership chaining' flag to exist and be set to 'off' on every settings block of all SQL Server instances.
      # Without the existence guard, .all() over a .where() that filters down to zero matches is vacuously true and the check would silently pass when the flag is omitted.
      terraform.resources('google_sql_database_instance').where(arguments['database_version'].contains('SQLSERVER')).all(
        blocks.where(type == 'settings') != empty &&
        blocks.where(type == 'settings').all(
          blocks.where(type == 'database_flags').where(arguments['name'] == 'cross db ownership chaining') != empty &&
          blocks.where(type == 'database_flags').where(arguments['name'] == 'cross db ownership chaining').all(
            arguments['value'] == 'off'
          )
        )
      )
  - uid: mondoo-gcp-security-cloud-sql-sqlserver-cross-db-ownership-chaining-disabled-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_sql_database_instance' && change.after.database_version.contains('SQLSERVER'))
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_sql_database_instance' && change.after.database_version.contains('SQLSERVER')).all(
        change.after['settings'].all(
          _['database_flags'].contains(name == 'cross db ownership chaining') &&
          _['database_flags'].where(name == 'cross db ownership chaining').all(
            _['value'] == 'off'
          )
        )
      )
  - uid: mondoo-gcp-security-cloud-sql-sqlserver-cross-db-ownership-chaining-disabled-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'google_sql_database_instance' && values.database_version.contains('SQLSERVER'))
    mql: |
      terraform.state.resources.where(type == 'google_sql_database_instance' && values.database_version.contains('SQLSERVER')).all(
        values['settings'].all(
          _['database_flags'].contains(name == 'cross db ownership chaining')
        ) &&
        values['settings'].all(
          _['database_flags'].where(name == 'cross db ownership chaining').all(
            _['value'] == 'off'
          )
        )
      )
  - uid: mondoo-gcp-security-cloud-sql-sqlserver-contained-db-auth-disabled
    title: Ensure contained database authentication is disabled
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-1
      compliance/nist-csf-2: nist-csf-2-pr-ps-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-2
      compliance/pci-dss-4: pcidss-requirement-2-2-1
      compliance/soc2-2017: soc2-control-cc7-1-1
      compliance/vda-isa-5: vda-isa-5-4-1-2
    variants:
      - uid: mondoo-gcp-security-cloud-sql-sqlserver-contained-db-auth-disabled-gcp
        tags:
          mondoo.com/filter-title: GCP Cloud SQL SQL Server Instance
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-cloud-sql-sqlserver-contained-db-auth-disabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-sql-sqlserver-contained-db-auth-disabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-sql-sqlserver-contained-db-auth-disabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Cloud SQL for SQL Server instances are configured to disable contained database authentication. By default, the `contained database authentication` flag is set to `on`, which allows SQL Server to authenticate users against credentials stored inside individual databases rather than requiring the caller to authenticate at the instance level first.

        **Why this matters**

        - **Authentication bypass:** Any principal with `ALTER DATABASE` permission can create contained database users, bypassing instance-level authentication controls and password policies.
        - **Credential sprawl:** Contained databases store password hashes locally inside the database, making them portable and difficult to audit centrally.
        - **Persistence risk:** An attacker with write access to a contained database can create new authentication identities to maintain access even after instance-level credentials are rotated.
        - **Microsoft guidance:** Microsoft recommends disabling contained database authentication unless specifically required, noting it introduces security complexities that are difficult to manage.

        **Risk mitigation**

        - **Centralized credential management:** Disabling contained auth forces all authentication to flow through the instance-level login model, where rotation and revocation are centrally controlled.
        - **Policy enforcement:** Instance-level logins are subject to the global password and lockout policies configured on the SQL Server instance.
        - **Reduced persistence vectors:** Removing the ability to create contained users eliminates a common credential-planting technique used to maintain access after incident response.
      audit: |
        ### Audit via Console

        1. Navigate to **SQL** > **Instances**.
        2. Select the SQL Server instance.
        3. Select **Edit** and scroll to the **Flags** section.
        4. Look for the `contained database authentication` flag and its value.

        A passing instance shows the `contained database authentication` flag set to `off`. A failing instance shows the flag set to `on` or the flag is absent (which defaults to `on`).

        ### Audit via CLI

        1. Describe the Cloud SQL instance and inspect the database flags:

        ```bash
        gcloud sql instances describe <instance-name> \
          --format="value(settings.databaseFlags)"
        ```

        A passing instance returns a flag entry with `name: contained database authentication` and `value: off`. A failing instance returns a value of `on` or no entry for the flag.
      remediation:
        - id: console
          desc: |
            To ensure contained database authentication is disabled using the Google Cloud Console:

            1. Navigate to **SQL** > **Instances**.
            2. Select the SQL Server instance.
            3. Select **Edit**.
            4. Under **Flags**, add or update the `contained database authentication` flag to `off`.
            5. Select **Save**.
        - id: cli
          desc: |
            To ensure contained database authentication is disabled using the gcloud CLI:

            ```bash
            gcloud sql instances patch <instance-name> \
              --database-flags="contained database authentication=off"
            ```
        - id: terraform
          desc: |
            To ensure contained database authentication is disabled in Terraform, set the database flag in the settings block:

            ```hcl
            resource "google_sql_database_instance" "sqlserver" {
              name             = "sqlserver-instance"
              database_version = "SQLSERVER_2019_STANDARD"
              region           = "us-central1"

              settings {
                tier = "db-custom-2-7680"

                database_flags {
                  name  = "contained database authentication"
                  value = "off"
                }
              }
            }
            ```
    refs:
      - url: https://cloud.google.com/sql/docs/sqlserver/flags
        title: Google Cloud Documentation - Configuring database flags for SQL Server
  - uid: mondoo-gcp-security-cloud-sql-sqlserver-contained-db-auth-disabled-gcp
    filters: |
      asset.platform == 'gcp-sql-sqlserver'
    mql: |
      gcp.sql.instance.settings.databaseFlags["contained database authentication"] == "off"
  - uid: mondoo-gcp-security-cloud-sql-sqlserver-contained-db-auth-disabled-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_sql_database_instance' && arguments['database_version'].contains('SQLSERVER'))
    mql: |
      # Require a 'contained database authentication' flag to exist and be set to 'off' on every settings block of all SQL Server instances.
      # Without the existence guard, .all() over a .where() that filters down to zero matches is vacuously true and the check would silently pass when the flag is omitted.
      terraform.resources('google_sql_database_instance').where(arguments['database_version'].contains('SQLSERVER')).all(
        blocks.where(type == 'settings') != empty &&
        blocks.where(type == 'settings').all(
          blocks.where(type == 'database_flags').where(arguments['name'] == 'contained database authentication') != empty &&
          blocks.where(type == 'database_flags').where(arguments['name'] == 'contained database authentication').all(
            arguments['value'] == 'off'
          )
        )
      )
  - uid: mondoo-gcp-security-cloud-sql-sqlserver-contained-db-auth-disabled-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_sql_database_instance' && change.after.database_version.contains('SQLSERVER'))
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_sql_database_instance' && change.after.database_version.contains('SQLSERVER')).all(
        change.after['settings'].all(
          _['database_flags'].contains(name == 'contained database authentication') &&
          _['database_flags'].where(name == 'contained database authentication').all(
            _['value'] == 'off'
          )
        )
      )
  - uid: mondoo-gcp-security-cloud-sql-sqlserver-contained-db-auth-disabled-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'google_sql_database_instance' && values.database_version.contains('SQLSERVER'))
    mql: |
      terraform.state.resources.where(type == 'google_sql_database_instance' && values.database_version.contains('SQLSERVER')).all(
        values['settings'].all(
          _['database_flags'].contains(name == 'contained database authentication')
        ) &&
        values['settings'].all(
          _['database_flags'].where(name == 'contained database authentication').all(
            _['value'] == 'off'
          )
        )
      )
  - uid: mondoo-gcp-security-cloud-sql-postgres-log-lock-waits-enabled
    title: Ensure 'log_lock_waits' is enabled for Cloud SQL PostgreSQL
    impact: 50
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-pr-pt-1
      compliance/nist-csf-2: nist-csf-2-pr-ps-04
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-12
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    variants:
