        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-dataflow-job-no-default-service-account-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that every running, pending, or queued Dataflow job specifies an explicit worker service account that is not the project's default Compute Engine service account. Jobs that omit `serviceAccountEmail` inherit the default Compute SA, which holds the Editor role by default and is shared across all workloads that fail to specify a dedicated identity.

        **Why this matters**

        - **Editor role grants near-unlimited project access:** The default Compute Engine SA's broad Editor binding allows any pipeline code, including compromised dependencies, to read from and write to nearly every resource in the project.
        - **Shared identity obscures the audit trail:** When multiple pipelines use the same default SA, Cloud Audit Logs cannot distinguish which pipeline performed a given action, making it impossible to attribute data access or resource modifications to a specific job.
        - **No per-pipeline blast radius scoping:** A vulnerability or misconfiguration in one Dataflow pipeline can affect every resource accessible to the default SA rather than being contained to the specific source, sink, and intermediates that pipeline actually needs.
        - **Rotation and revocation are coarse:** Rotating or revoking the default Compute SA affects all workloads that use it; dedicated per-pipeline SAs allow targeted rotation and revocation without disrupting unrelated jobs.

        **Risk mitigation**

        - **Create a dedicated worker service account per pipeline:** Provision a service account with only the IAM roles needed for the specific source, sink, and intermediate resources, then submit jobs with `--service-account-email` or `service_account_email` set to that SA.
        - **Tighten the default Compute Engine SA:** Strip the Editor role from the default Compute Engine service account once dedicated SAs are in place, reducing the blast radius of any future misconfiguration.
      audit: |
        ### Audit via Console

        1. Go to **Dataflow > Jobs** in the Google Cloud Console.
        2. Select a running or pending job.
        3. Review the **Job info** tab and locate the **Service account** field under worker configuration.

        A passing job shows a dedicated service account email that is not the default Compute Engine service account. A failing job shows no service account or the default Compute Engine service account (ending in `-compute@developer.gserviceaccount.com`).

        ### Audit via CLI

        1. List all running and pending Dataflow jobs:

        ```bash
        gcloud dataflow jobs list \
          --filter='state=JOB_STATE_RUNNING OR state=JOB_STATE_PENDING' \
          --format='value(id,name)'
        ```

        2. For each job, inspect the service account in the environment:

        ```bash
        gcloud dataflow jobs describe JOB_ID \
          --region=REGION \
          --format='value(environment.serviceAccountEmail)'
        ```

        A passing job returns a non-empty service account email that does not end with `-compute@developer.gserviceaccount.com`. A failing job returns an empty value or the default Compute Engine service account email.
      remediation:
        - id: terraform
          desc: |
            Set `service_account_email` on `google_dataflow_job` (or `google_dataflow_flex_template_job`) to a dedicated worker service account scoped to the source, sink, and intermediate resources the pipeline touches:

            ```hcl
            resource "google_service_account" "dataflow_worker" {
              account_id   = "dataflow-worker"
              display_name = "Dataflow worker"
            }

            resource "google_dataflow_job" "pipeline" {
              name                  = "stream-processor"
              template_gcs_path     = "gs://dataflow-templates/latest/Stream"
              temp_gcs_location     = "gs://my-bucket/tmp"
              region                = "us-central1"
              service_account_email = google_service_account.dataflow_worker.email
            }
            ```
        - id: console
          desc: |
            Submit a Dataflow template with a dedicated worker service account:

            1. Provision the dedicated service account in **IAM & Admin > Service accounts**.
            2. Grant the service account the narrow roles needed for the source and sink resources.
            3. Go to **Dataflow > Jobs > Create job from template**.
            4. Under **Optional parameters > Service account email**, enter the dedicated SA email.
            5. Submit the job and confirm it transitions to `JOB_STATE_RUNNING`.
        - id: cli
          desc: |
            Submit Dataflow jobs with an explicit worker service account:

            ```bash
            gcloud dataflow jobs run JOB_NAME \
              --gcs-location=gs://path/to/template \
              --region=REGION \
              --service-account-email=dataflow-worker@PROJECT.iam.gserviceaccount.com
            ```

            For Beam Python pipelines pass `--service_account_email`.
    refs:
      - url: https://cloud.google.com/dataflow/docs/concepts/security-and-permissions#worker_service_account
        title: Dataflow - Worker service account
  - uid: mondoo-gcp-security-dataflow-job-no-default-service-account-gcp
    filters: asset.platform == 'gcp'
    mql: |
      gcp.project.dataflowService.jobs.where(
        currentState == "JOB_STATE_RUNNING" || currentState == "JOB_STATE_PENDING" || currentState == "JOB_STATE_QUEUED"
      ).all(
        environment['serviceAccountEmail'] != null &&
        environment['serviceAccountEmail'] != "" &&
        environment['serviceAccountEmail'] != /^\d+-compute@developer\.gserviceaccount\.com$/
      )
