  # No Terraform variants: this check evaluates the runtime status of the most
  # recent job execution (latestJobs[].state == "DONE"), which is operational
  # telemetry returned by the API at runtime, not configuration. Job execution
  # state is not expressible in HCL/plan/state.
  - uid: mondoo-gcp-security-dlp-job-trigger-healthy
    title: Ensure Cloud DLP job triggers are healthy and not stale
    impact: 70
    filters: asset.platform == 'gcp'
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-dsp-17
      compliance/dora: false
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-5-12
      compliance/nis-2: false
      compliance/nist-csf-1: nist-csf-1-pr-ds-5
      compliance/nist-csf-2: false
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ra-5
      compliance/nist-sp-800-171: nist-sp-800-171--3-11-2
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc7-2-4
      compliance/vda-isa-5: vda-isa-5-7-1-2
    mql: |
      gcp.project.dlpService.jobTriggers.none(
        status != "HEALTHY" ||
        updated == null ||
        time.now - updated > 30 * time.day
      )
    docs:
      desc: |
        This check ensures that every Cloud DLP job trigger is in `HEALTHY` status and has been updated within the last 30 days. DLP job triggers run on a schedule to scan BigQuery tables, Cloud Storage buckets, and Datastore kinds for PII, credentials, and other sensitive data; a paused or silently stalled trigger means sensitive data accumulates without classification.

        **Why this matters**

        - **Silent scanning gaps:** A `PAUSED` trigger is usually paused temporarily for a reason that is later forgotten, and it never gets resumed; new data in the target resource goes unscanned indefinitely.
        - **IAM-induced failures:** A trigger whose `updated` timestamp is stale despite appearing `HEALTHY` often indicates an upstream IAM removal or quota failure that stopped execution without surfacing an error.
        - **Classification dependency chain:** Downstream controls such as de-identification pipelines, access controls based on data labels, and audit reports all depend on classification being current; stale triggers silently break that chain.

        **Risk mitigation**

        - **Current sensitive-data visibility:** Active, recently-run triggers ensure that classification data used by downstream controls reflects the actual state of storage resources.
        - **Failure detection:** Flagging triggers with stale update timestamps surfaces silent execution failures before they grow into extended blind spots.
        - **Scan pipeline integrity:** Verifying trigger health keeps the DLP scanning pipeline functioning as an effective continuous control rather than a configuration artifact that stopped working.
      audit: |
        ### Audit via Console

        1. In the Google Cloud Console, navigate to **Security** > **Sensitive Data Protection**.
        2. Select **Inspection** > **Job triggers**.
        3. For each trigger, review the **Status** column and the **Last run** timestamp.
        4. A trigger is non-compliant if its status is not `HEALTHY`, or if its last run timestamp is more than 30 days ago.

        A passing job trigger shows a status of `HEALTHY` and a last-run date within the past 30 days. A failing job trigger shows a status other than `HEALTHY` (such as `PAUSED` or `CANCELLED`), or shows a last-run date older than 30 days.

        ### Audit via CLI

        1. List all DLP job triggers and their status and last-updated timestamps via the REST API (Cloud DLP has no `gcloud` CLI surface):

        ```bash
        curl -s \
          -H "Authorization: Bearer $(gcloud auth print-access-token)" \
          "https://dlp.googleapis.com/v2/projects/PROJECT_ID/jobTriggers"
        ```

        2. In the response, review the `status` and `updateTime` fields for each trigger. A trigger is non-compliant if `status` is not `HEALTHY` or if `updateTime` is more than 30 days in the past.

        A passing job trigger returns `"status": "HEALTHY"` and an `updateTime` within the last 30 days. A failing job trigger returns a status other than `HEALTHY` or an `updateTime` older than 30 days.
      remediation:
        - id: terraform
          desc: |
            Manage the trigger declaratively so its status is enforced; ensure `status = "HEALTHY"` and a recurring schedule are present:

            ```hcl
            resource "google_data_loss_prevention_job_trigger" "weekly" {
              parent       = "projects/my-project"
              display_name = "weekly-bucket-scan"
              status       = "HEALTHY"

              triggers {
                schedule {
                  recurrence_period_duration = "604800s" # weekly
                }
              }

              inspect_job {
                inspect_template_name = google_data_loss_prevention_inspect_template.creds.id
                storage_config {
                  cloud_storage_options {
                    file_set {
                      url = "gs://my-bucket/**"
                    }
                  }
                }
                actions {
                  save_findings {
                    output_config {
                      table {
                        project_id = "my-project"
                        dataset_id = google_bigquery_dataset.dlp_findings.dataset_id
                      }
                    }
                  }
                }
              }
            }
            ```
        - id: console
          desc: |
            Investigate and resume the flagged trigger:

            1. Open **Security** → **Sensitive Data Protection** → **Inspection** → **Job triggers**.
            2. Select the flagged trigger.
            3. If status is `PAUSED`, review why it was paused and either resume via **Resume** or delete it if no longer needed.
            4. If status is `HEALTHY` but `updated` is stale, check the trigger's schedule and IAM bindings on the target bucket / dataset; a missing `dlp.jobs.create` permission will silently prevent runs.
            5. Use **Run now** to verify the trigger executes end-to-end.
        - id: cli
          desc: |
            Resume a paused DLP job trigger via the REST API (DLP has no gcloud CLI surface):

            ```bash
            curl -X PATCH \
              -H "Authorization: Bearer $(gcloud auth print-access-token)" \
              -H "Content-Type: application/json" \
              -d '{"jobTrigger":{"status":"HEALTHY"},"updateMask":"status"}' \
              "https://dlp.googleapis.com/v2/projects/<project>/jobTriggers/<trigger-id>"
            ```
    refs:
      - url: https://cloud.google.com/sensitive-data-protection/docs/creating-job-triggers
        title: DLP - Creating job triggers
  - uid: mondoo-gcp-security-dlp-inspect-template-covers-credential-info-types
    title: Ensure DLP inspect templates include common credential info types
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-dsp-17
      compliance/dora: false
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-5-12
      compliance/nis-2: false
      compliance/nist-csf-1: nist-csf-1-pr-ds-5
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ra-5
      compliance/nist-sp-800-171: nist-sp-800-171--3-11-2
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc6-7-1
      compliance/vda-isa-5: vda-isa-5-4-1-3
    variants:
      - uid: mondoo-gcp-security-dlp-inspect-template-covers-credential-info-types-gcp
        tags:
          mondoo.com/filter-title: GCP DLP (Sensitive Data Protection)
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-dlp-inspect-template-covers-credential-info-types-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-dlp-inspect-template-covers-credential-info-types-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-dlp-inspect-template-covers-credential-info-types-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that every Cloud DLP inspect template includes the built-in credential detectors: `AWS_CREDENTIALS`, `GCP_CREDENTIALS`, `JSON_WEB_TOKEN`, and `BASIC_AUTH_HEADER`. Templates that scan for traditional PII but omit these credential info types miss the highest-impact class of sensitive data in most environments.

        **Why this matters**

        - **Immediate access grants:** An AWS access key found in a BigQuery table or Cloud Storage object gives an attacker cross-cloud access the moment they retrieve it, with no further steps required.
        - **GCP-admin-level exposure:** A leaked GCP service-account key is a high-privilege credential; missing it in a DLP scan is a high-magnitude blind spot that can persist undetected indefinitely.
        - **Ubiquitous credential formats:** JWTs and Basic Auth headers appear regularly in application logs, backup archives, and analytics exports and commonly grant access to internal services.
        - **Zero incremental cost:** These are free built-in DLP detectors that run in the same scanning pass as PII detectors; omitting them is purely configuration oversight.

        **Risk mitigation**

        - **Credential leak detection:** Including all four credential info types ensures that secrets accidentally written to storage surfaces are flagged in the same DLP scan that identifies PII.
        - **Comprehensive coverage:** Covering AWS, GCP, JWT, and Basic Auth formats addresses the most common accidental-leak shapes across multi-cloud and web application environments.
        - **Unified finding workflow:** Credential findings flow through the same DLP alert and de-identification workflows as PII findings, enabling consistent incident response.
      audit: |
        ### Audit via Console

        1. In the Google Cloud Console, navigate to **Security** > **Sensitive Data Protection**.
        2. Select **Inspection** > **Templates**.
        3. Open each template and review the **InfoTypes** list.
        4. Verify that all four of the following are present: `AWS_CREDENTIALS`, `GCP_CREDENTIALS`, `JSON_WEB_TOKEN`, and `BASIC_AUTH_HEADER`.

        A passing template shows all four credential info types in its InfoTypes list. A failing template is missing one or more of `AWS_CREDENTIALS`, `GCP_CREDENTIALS`, `JSON_WEB_TOKEN`, or `BASIC_AUTH_HEADER`.

        ### Audit via CLI

        1. Retrieve the inspect template definitions via the REST API (Cloud DLP has no `gcloud` CLI surface):

        ```bash
        curl -s \
          -H "Authorization: Bearer $(gcloud auth print-access-token)" \
          "https://dlp.googleapis.com/v2/projects/PROJECT_ID/inspectTemplates"
        ```

        2. For each template, inspect the `inspectConfig.infoTypes` array and confirm it contains objects with `name` equal to `AWS_CREDENTIALS`, `GCP_CREDENTIALS`, `JSON_WEB_TOKEN`, and `BASIC_AUTH_HEADER`.

        A passing template returns an `infoTypes` array that includes all four credential detector names. A failing template returns an `infoTypes` array that is missing one or more of the required credential detectors.
      remediation:
        - id: terraform
          desc: |
            Include the credential detectors as `info_types` on the inspect template:

            ```hcl
            resource "google_data_loss_prevention_inspect_template" "creds" {
              parent       = "projects/my-project"
              display_name = "credentials-and-pii"

              inspect_config {
                info_types { name = "AWS_CREDENTIALS" }
                info_types { name = "GCP_CREDENTIALS" }
                info_types { name = "JSON_WEB_TOKEN" }
                info_types { name = "BASIC_AUTH_HEADER" }
                # Combine with PII detectors as needed:
                info_types { name = "EMAIL_ADDRESS" }
              }
            }
            ```
        - id: console
          desc: |
            Add credential detectors to existing inspect templates:

            1. Open **Security** → **Sensitive Data Protection** → **Inspection** → **Templates**.
            2. Edit each template.
            3. Under **InfoTypes**, add `AWS_CREDENTIALS`, `GCP_CREDENTIALS`, `JSON_WEB_TOKEN`, and `BASIC_AUTH_HEADER` (plus any cloud-specific ones like `AZURE_AUTH_TOKEN`).
            4. Save.
        - id: cli
          desc: |
            Update a DLP inspect template to include credential detectors via the REST API (DLP has no gcloud CLI surface). Save the template body as `inspect-template.json`:

            ```json
            {
              "inspectTemplate": {
                "inspectConfig": {
                  "infoTypes": [
                    {"name": "AWS_CREDENTIALS"},
                    {"name": "GCP_CREDENTIALS"},
                    {"name": "JSON_WEB_TOKEN"},
                    {"name": "BASIC_AUTH_HEADER"}
                  ]
                }
              },
              "updateMask": "inspectConfig.infoTypes"
            }
            ```

            Then PATCH it:

            ```bash
            curl -X PATCH \
              -H "Authorization: Bearer $(gcloud auth print-access-token)" \
              -H "Content-Type: application/json" \
              -d @inspect-template.json \
              "https://dlp.googleapis.com/v2/projects/<project>/inspectTemplates/<template-id>"
            ```
    refs:
      - url: https://cloud.google.com/sensitive-data-protection/docs/infotypes-reference
        title: DLP - InfoTypes reference
  - uid: mondoo-gcp-security-dlp-inspect-template-covers-credential-info-types-gcp
