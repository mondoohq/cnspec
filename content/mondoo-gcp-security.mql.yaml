  - uid: mondoo-gcp-security-cloud-sql-no-overly-permissive-authorized-networks
    title: Ensure Cloud SQL authorized networks are not overly permissive
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-gcp-security-cloud-sql-no-overly-permissive-authorized-networks-gcp-mysql
        tags:
          mondoo.com/filter-title: GCP Cloud SQL for MySQL
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-cloud-sql-no-overly-permissive-authorized-networks-gcp-postgresql
        tags:
          mondoo.com/filter-title: GCP Cloud SQL for PostgreSQL
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-cloud-sql-no-overly-permissive-authorized-networks-gcp-sqlserver
        tags:
          mondoo.com/filter-title: GCP Cloud SQL for SQL Server
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-cloud-sql-no-overly-permissive-authorized-networks-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-sql-no-overly-permissive-authorized-networks-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-sql-no-overly-permissive-authorized-networks-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Cloud SQL instances are configured to restrict authorized networks to specific IP addresses or narrow CIDR ranges, preventing the use of `0.0.0.0/0` or `::/0` which would expose the database to the entire internet. By default, Cloud SQL instances have no authorized networks and require explicit configuration, but administrators sometimes use broad ranges for convenience, creating a serious network-level exposure.

        **Why this matters**

        - **Expanded attack surface:** Authorizing `0.0.0.0/0` makes the database reachable from any IP on the internet, enabling brute-force and credential stuffing attacks from anywhere.
        - **No network-layer defense:** Even with SSL/TLS required, accepting connections from all IPs removes the network perimeter layer and relies entirely on credential security.
        - **Vulnerability exploitation risk:** Publicly reachable database ports are scanned continuously by automated tools; known database CVEs can be targeted without needing to first compromise another resource.
        - **Incident frequency:** Overly permissive authorized networks are a common root cause in cloud database breach incidents involving unauthorized data exfiltration.
        - **Compliance exposure:** Many frameworks require network-level access controls for data stores holding sensitive or regulated information.

        **Risk mitigation**

        - **Restrict to known CIDRs:** Limit authorized networks to the specific IP addresses or ranges of application servers and administrators that require direct database connectivity.
        - **Use Private IP:** Prefer Private IP connectivity over authorized networks entirely, routing database traffic through VPC peering rather than the public internet.
        - **Audit regularly:** Review and remove authorized network entries that are no longer needed as infrastructure changes over time.
      audit: |
        ### Audit via Console

        1. In the Google Cloud Console, navigate to **SQL** and select an instance.
        2. Click the **Connections** tab.
        3. Under **Authorized networks**, review each entry for the CIDR value.

        A passing instance shows no authorized network entries with the value `0.0.0.0/0` or `::/0`. A failing instance shows an authorized network with the value `0.0.0.0/0` or `::/0`.

        ### Audit via CLI

        1. Retrieve the authorized networks for a Cloud SQL instance:

        ```bash
        gcloud sql instances describe INSTANCE_NAME \
          --format="json(settings.ipConfiguration.authorizedNetworks)"
        ```

        A passing instance returns no network entries with a `value` of `0.0.0.0/0` or `::/0`. A failing instance returns one or more entries where `value` is `0.0.0.0/0` or `::/0`.
      remediation:
        - id: terraform
          desc: |
            To ensure Cloud SQL authorized networks are not overly permissive in Terraform:

            ```hcl
            resource "google_sql_database_instance" "example" {
              name             = "example-instance"
              database_version = "MYSQL_8_0"
              region           = "us-central1"

              settings {
                tier = "db-f1-micro"

                ip_configuration {
                  # Use specific CIDR ranges instead of 0.0.0.0/0
                  authorized_networks {
                    name  = "office"
                    value = "203.0.113.0/24"
                  }
                }
              }
            }
            ```
        - id: console
          desc: |
            To ensure Cloud SQL authorized networks are not overly permissive using the Google Cloud Console:

            1. Navigate to the Cloud SQL Instances page: [https://console.cloud.google.com/sql/instances](https://console.cloud.google.com/sql/instances).
            2. Select the instance.
            3. Go to the **Connections** tab.
            4. Under **Authorized networks**, remove any entry with the value `0.0.0.0/0` or `::/0`.
            5. Add specific IP ranges that require access.
            6. Select **Save**.
        - id: cli
          desc: |
            To ensure Cloud SQL authorized networks are not overly permissive using the Google Cloud CLI, update the authorized networks to use specific CIDR ranges:

            ```bash
            gcloud sql instances patch INSTANCE_NAME \
              --authorized-networks=203.0.113.0/24
            ```

            *Note: This overwrites all existing authorized networks. Include all required networks in a comma-separated list.*
    refs:
      - url: https://cloud.google.com/sql/docs/mysql/authorize-networks
        title: Cloud SQL - Authorize with authorized networks
  - uid: mondoo-gcp-security-cloud-sql-no-overly-permissive-authorized-networks-gcp-mysql
    filters: asset.platform == 'gcp-sql-mysql'
    mql: |
      gcp.sql.instance.settings.ipConfiguration.authorizedNetworks.none(
        _['value'] == "0.0.0.0/0" || _['value'] == "::/0"
      )
  - uid: mondoo-gcp-security-cloud-sql-no-overly-permissive-authorized-networks-gcp-postgresql
    filters: asset.platform == 'gcp-sql-postgresql'
    mql: |
      gcp.sql.instance.settings.ipConfiguration.authorizedNetworks.none(
        _['value'] == "0.0.0.0/0" || _['value'] == "::/0"
      )
  - uid: mondoo-gcp-security-cloud-sql-no-overly-permissive-authorized-networks-gcp-sqlserver
    filters: asset.platform == 'gcp-sql-sqlserver'
    mql: |
      gcp.sql.instance.settings.ipConfiguration.authorizedNetworks.none(
        _['value'] == "0.0.0.0/0" || _['value'] == "::/0"
      )
  - uid: mondoo-gcp-security-cloud-sql-no-overly-permissive-authorized-networks-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_sql_database_instance')
    mql: |
      terraform.resources('google_sql_database_instance').all(
        blocks.where(type == 'settings').all(
          blocks.where(type == 'ip_configuration').all(
            blocks.where(type == 'authorized_networks').all(
              arguments['value'] != '0.0.0.0/0' &&
              arguments['value'] != '::/0'
            )
          )
        )
      )
  - uid: mondoo-gcp-security-cloud-sql-no-overly-permissive-authorized-networks-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_sql_database_instance')
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_sql_database_instance').all(
        change.after['settings'].all(
          _['ip_configuration'].all(
            _['authorized_networks'] == empty ||
            _['authorized_networks'].none(
              _['value'] == '0.0.0.0/0' || _['value'] == '::/0'
            )
          )
        )
      )
  - uid: mondoo-gcp-security-cloud-sql-no-overly-permissive-authorized-networks-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'google_sql_database_instance')
    mql: |
      terraform.state.resources.where(type == 'google_sql_database_instance').all(
        values['settings'].all(
          _['ip_configuration'].all(
            _['authorized_networks'] == empty ||
            _['authorized_networks'].none(
              _['value'] == '0.0.0.0/0' || _['value'] == '::/0'
            )
          )
        )
      )
  - uid: mondoo-gcp-security-cloud-sql-password-policy-enabled
    title: Ensure Cloud SQL instances have a password policy enabled
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-5
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-7
      compliance/pci-dss-4: pcidss-requirement-8-3-6
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-3
    variants:
      - uid: mondoo-gcp-security-cloud-sql-password-policy-enabled-gcp-mysql
        tags:
          mondoo.com/filter-title: GCP Cloud SQL for MySQL
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-cloud-sql-password-policy-enabled-gcp-postgresql
        tags:
          mondoo.com/filter-title: GCP Cloud SQL for PostgreSQL
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-cloud-sql-password-policy-enabled-gcp-sqlserver
        tags:
          mondoo.com/filter-title: GCP Cloud SQL for SQL Server
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-cloud-sql-password-policy-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-sql-password-policy-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-sql-password-policy-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Cloud SQL instances are configured with a password validation policy that enforces minimum complexity and strength requirements for database user accounts. By default, Cloud SQL does not enforce any password policy, allowing users to set arbitrarily weak passwords.

        **Why this matters**

        - **Brute-force vulnerability:** Without minimum length and complexity requirements, accounts are susceptible to dictionary and brute-force attacks, especially for instances with public or authorized-network access.
        - **Credential stuffing risk:** Permitting simple or reused passwords increases the likelihood that a credential leaked from another breach can be used against the database.
        - **No native rotation enforcement:** Without a policy enforcing password change intervals, stale credentials may persist indefinitely, expanding the window of exposure for any compromised account.
        - **Audit trail gaps:** Password policy enforcement generates log events for policy violations, providing visibility into attempts to set weak credentials.

        **Risk mitigation**

        - **Enforce minimum length and complexity:** Configure the policy to require at least eight characters with mixed case, numeric, and special characters to resist automated guessing.
        - **Disallow username substrings:** Enable the `disallow_username_substring` setting so that database usernames cannot appear as part of the password, closing a common weak-credential pattern.
        - **Combine with network controls:** Use password policy alongside authorized network restrictions and SSL enforcement so that multiple independent controls protect database access.
      audit: |
        ### Audit via Console

        1. In the Google Cloud Console, navigate to **SQL** and select an instance.
        2. Click **Edit**.
        3. Under **Password policy**, verify that the password policy is enabled and review the configured requirements.

        A passing instance shows the password policy enabled with configured complexity settings. A failing instance shows the password policy disabled or not configured.

        ### Audit via CLI

        1. Describe the Cloud SQL instance and inspect the password validation policy:

        ```bash
        gcloud sql instances describe INSTANCE_NAME \
          --format="json(settings.passwordValidationPolicy)"
        ```

        A passing instance returns a `passwordValidationPolicy` object where `enabledPasswordPolicy` is `true`. A failing instance returns `enabledPasswordPolicy: false` or an absent `passwordValidationPolicy` block.
      remediation:
        - id: terraform
          desc: |
            To ensure Cloud SQL instances have a password policy enabled in Terraform:

            ```hcl
            resource "google_sql_database_instance" "example" {
              name             = "example-instance"
              database_version = "MYSQL_8_0"
              region           = "us-central1"

              settings {
                tier = "db-f1-micro"

                password_validation_policy {
                  enable_password_policy      = true
                  min_length                  = 8
                  complexity                  = "COMPLEXITY_DEFAULT"
                  disallow_username_substring = true
                }
              }
            }
            ```
        - id: console
          desc: |
            To ensure Cloud SQL instances have a password policy enabled using the Google Cloud Console:

            1. Navigate to the Cloud SQL Instances page: [https://console.cloud.google.com/sql/instances](https://console.cloud.google.com/sql/instances).
            2. Select the instance.
            3. Select **Edit**.
            4. Under **Password policy**, enable the password policy.
            5. Configure the minimum length, complexity, and other requirements.
            6. Select **Save**.
        - id: cli
          desc: |
            To ensure Cloud SQL instances have a password policy enabled using the Google Cloud CLI:

            ```bash
            gcloud sql instances patch INSTANCE_NAME \
              --enable-password-policy \
              --password-policy-min-length=8 \
              --password-policy-complexity=COMPLEXITY_DEFAULT \
              --password-policy-disallow-username-substring
            ```
    refs:
      - url: https://cloud.google.com/sql/docs/mysql/built-in-authentication
        title: Cloud SQL - Built-in database authentication
  - uid: mondoo-gcp-security-cloud-sql-password-policy-enabled-gcp-mysql
    filters: asset.platform == 'gcp-sql-mysql'
    mql: |
      gcp.sql.instance.settings.passwordValidationPolicy.enabledPasswordPolicy == true
  - uid: mondoo-gcp-security-cloud-sql-password-policy-enabled-gcp-postgresql
    filters: asset.platform == 'gcp-sql-postgresql'
    mql: |
      gcp.sql.instance.settings.passwordValidationPolicy.enabledPasswordPolicy == true
  - uid: mondoo-gcp-security-cloud-sql-password-policy-enabled-gcp-sqlserver
    filters: asset.platform == 'gcp-sql-sqlserver'
    mql: |
      gcp.sql.instance.settings.passwordValidationPolicy.enabledPasswordPolicy == true
  - uid: mondoo-gcp-security-cloud-sql-password-policy-enabled-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'google_sql_database_instance')
    mql: |
      terraform.resources('google_sql_database_instance').all(
        blocks.where(type == 'settings') != empty &&
        blocks.where(type == 'settings').all(
          blocks.where(type == 'password_validation_policy') != empty &&
          blocks.where(type == 'password_validation_policy').all(
            arguments.enable_password_policy == true
          )
        )
      )
  - uid: mondoo-gcp-security-cloud-sql-password-policy-enabled-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'google_sql_database_instance')
    mql: |
      terraform.plan.resourceChanges.where(type == 'google_sql_database_instance').all(
        change.after.settings != empty &&
        change.after.settings[0].password_validation_policy != empty &&
        change.after.settings[0].password_validation_policy[0].enable_password_policy == true
      )
  - uid: mondoo-gcp-security-cloud-sql-password-policy-enabled-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'google_sql_database_instance')
    mql: |
      terraform.state.resources.where(type == 'google_sql_database_instance').all(
        values.settings != empty &&
        values.settings[0].password_validation_policy != empty &&
        values.settings[0].password_validation_policy[0].enable_password_policy == true
      )
  - uid: mondoo-gcp-security-cloud-sql-cmek-encryption
    title: Ensure Cloud SQL instances are encrypted with CMEK
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-gcp-security-cloud-sql-cmek-encryption-gcp-mysql
        tags:
          mondoo.com/filter-title: GCP Cloud SQL for MySQL
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-cloud-sql-cmek-encryption-gcp-postgresql
        tags:
          mondoo.com/filter-title: GCP Cloud SQL for PostgreSQL
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-cloud-sql-cmek-encryption-gcp-sqlserver
        tags:
          mondoo.com/filter-title: GCP Cloud SQL for SQL Server
          mondoo.com/filter-icon: gcp
      - uid: mondoo-gcp-security-cloud-sql-cmek-encryption-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-sql-cmek-encryption-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gcp-security-cloud-sql-cmek-encryption-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Cloud SQL instances are configured to use customer-managed encryption keys (CMEK) through Cloud KMS rather than the default Google-managed encryption. By default, Cloud SQL encrypts data at rest using Google-managed keys, giving Google full control over the encryption lifecycle.

        **Why this matters**

        - **Key lifecycle control:** CMEK gives the organization authority over key creation, rotation, and destruction, independent of Google's internal key management processes.
        - **Revocable access:** Disabling or destroying the Cloud KMS key immediately renders all encrypted database data inaccessible, providing a reliable kill switch if a project is compromised or decommissioned.
        - **Separation of duties:** Storing encryption keys in Cloud KMS, managed by a dedicated key administrator, separates data access from key management responsibilities.
        - **Audit visibility:** All Cloud KMS key operations generate audit log entries, giving organizations a complete record of who accessed or managed the encryption key.

        **Risk mitigation**

        - **Plan before provisioning:** CMEK must be configured at instance creation time and cannot be added to an existing instance; include CMEK in the initial infrastructure design for sensitive databases.
        - **Protect the KMS key:** Apply least-privilege IAM bindings to the KMS key so that only the Cloud SQL service account and authorized key administrators can use or manage it.
        - **Enable automatic key rotation:** Configure a rotation period on the Cloud KMS key so that the data encryption key is periodically re-wrapped without requiring manual intervention.
      audit: |
        ### Audit via Console

        1. In the Google Cloud Console, navigate to **SQL** and select an instance.
        2. On the **Overview** tab, scroll to the **Configuration** section and find the **Encryption** field.

        A passing instance shows **Encryption: Customer-managed encryption key** with a Cloud KMS key name. A failing instance shows **Encryption: Google-managed encryption key**.

        ### Audit via CLI

        1. Describe the Cloud SQL instance and check the disk encryption configuration:

        ```bash
        gcloud sql instances describe INSTANCE_NAME \
          --format="json(diskEncryptionConfiguration)"
        ```

        A passing instance returns a `diskEncryptionConfiguration` object with a non-empty `kmsKeyName` field. A failing instance returns an empty or absent `diskEncryptionConfiguration`.
      remediation:
        - id: terraform
          desc: |
            To ensure Cloud SQL instances are encrypted with CMEK in Terraform:

            ```hcl
            resource "google_sql_database_instance" "example" {
              name             = "example-instance"
              database_version = "MYSQL_8_0"
              region           = "us-central1"

              encryption_key_name = google_kms_crypto_key.sql_key.id

              settings {
                tier = "db-f1-micro"
              }
            }
            ```
        - id: console
          desc: |
            To ensure Cloud SQL instances are encrypted with CMEK using the Google Cloud Console, note: CMEK must be configured at instance creation time.

            1. Go to the **Cloud SQL Instances** page: [https://console.cloud.google.com/sql/instances](https://console.cloud.google.com/sql/instances).
            2. Select **Create instance**.
            3. Under **Customize your instance > Data protection**, select **Customer-managed encryption key**.
            4. Select or create a Cloud KMS key.
            5. Complete instance creation.
        - id: cli
          desc: |
            To ensure Cloud SQL instances are encrypted with CMEK using the Google Cloud CLI, note: CMEK must be configured at instance creation time.

            ```bash
            gcloud sql instances create INSTANCE_NAME \
              --database-version=MYSQL_8_0 \
              --tier=db-f1-micro \
              --region=us-central1 \
              --disk-encryption-key=projects/PROJECT/locations/LOCATION/keyRings/RING/cryptoKeys/KEY
            ```
    refs:
      - url: https://cloud.google.com/sql/docs/mysql/configure-cmek
        title: Cloud SQL - Using customer-managed encryption keys
