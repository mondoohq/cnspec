policies:
  - uid: mondoo-github-repository-best-practices
    name: Mondoo GitHub Repository Best Practices
    version: 1.2.0
    license: BUSL-1.1
    tags:
      mondoo.com/category: best-practices
      mondoo.com/platform: github
    require:
      - provider: github
    authors:
      - name: Mondoo, Inc.
        email: hello@mondoo.com
    summary: Validate GitHub repo quality and collaboration practices
    docs:
      desc: |
        The Mondoo GitHub Repository Best Practices policy identifies GitHub repositories that don't follow operational best practices for sustainable, collaborative software development. This policy helps organizations maintain code quality, smooth onboarding, and predictable contribution workflows, reducing confusion, lost contributions, and the operational drag that comes with unmaintained or under-documented repositories.

        This policy provides checks across key repository configuration areas:

        - README presence and completeness
        - License files
        - Code of conduct
        - Contributing guidelines
        - Issue and pull request templates
        - Support documentation

        Learn more about scanning GitHub in the [cnspec GitHub documentation](https://mondoo.com/docs/cnspec/saas/github).

        Have suggestions for new checks in this policy? Visit our [cnspec repository](https://github.com/mondoohq/cnspec).
    groups:
      - title: GitHub Repo
        filters: |
          asset.platform == "github-repo"
        checks:
          - uid: mondoo-github-repository-best-practices-code-of-conduct
          - uid: mondoo-github-repository-best-practices-description
          - uid: mondoo-github-repository-best-practices-gitignore
          - uid: mondoo-github-repository-best-practices-include-authors
          - uid: mondoo-github-repository-best-practices-license
          - uid: mondoo-github-repository-best-practices-readme
          - uid: mondoo-github-repository-best-practices-readme-getting-started
          - uid: mondoo-github-repository-best-practices-support-resources
    scoring_system: highest impact
queries:
  - uid: mondoo-github-repository-best-practices-support-resources
    title: Ensure repository has a support policy
    impact: 30
    mql: |
      // if a .github repo exists, then check if the SUPPORT.md is there
      if ( github.organization.repositories.one(name == ".github") ) {
        github.organization.repositories.where( name == ".github").all(
          supportFile.exists
        ) || github.repository.supportFile.exists
      } else {
          github.repository.supportFile.exists
      }
    docs:
      desc: |
        Repositories should include a SUPPORT.md file to let people know how to get help with the project.

        **Why this matters**

        - **Faster help:** A documented support path directs users to the right channels instead of opening misrouted issues.
        - **Maintainer focus:** Clear support resources reduce repetitive questions and let maintainers concentrate on the project.
        - **Discoverability:** When someone creates an issue, GitHub surfaces a link to the SUPPORT.md file so help is one click away.
      audit: |
        ### Audit via Console

        1. Navigate to the repository on GitHub.
        2. Look for a `SUPPORT.md` file in the repository root, the `docs` directory, or the `.github` directory.
        3. Check the organization's `.github` repository for a shared `SUPPORT.md` that applies to all repositories.

        If a `SUPPORT.md` file is present in any of these locations, the check passes. If none exists, the check fails.

        ### Audit via CLI

        1. Query the repository contents for a support file:

           ```bash
           gh api /repos/OWNER/REPO/contents/SUPPORT.md --jq '.name'
           ```

        If the command returns `SUPPORT.md`, the check passes. If it returns a `Not Found` error, the check fails.
      remediation:
        - id: github
          desc: |
            **Using the GitHub web UI**

            1. Navigate to your repository on GitHub.
            2. Click on the "Add file" button.
            3. Select "Create new file".
            4. Name the file `SUPPORT.md`.
            5. Add the content of the support resources you want to include.
            6. Commit the changes to your repository.

            The SUPPORT.md file should include information about how to get help with the project, such as:

            - Links to documentation
            - Contact information for maintainers
            - Links to community forums or chat channels
            - Information about how to report issues or bugs

            For more details, see [Adding support resources to your project](https://docs.github.com/en/communities/setting-up-your-project-for-healthy-contributions/adding-support-resources-to-your-project).
        - id: terraform
          desc: |
            **Using Terraform**

            Manage the support file with the `github_repository_file` resource:

            ```hcl
            resource "github_repository_file" "support" {
              repository     = github_repository.example.name
              file           = "SUPPORT.md"
              content        = "# Support\n\nFor help, open an issue or contact support@example.com\n"
              commit_message = "Add support resources"
            }
            ```
        - id: cli
          desc: |
            **Using GitHub CLI**

            ```bash
            gh api --method PUT /repos/OWNER/REPO/contents/SUPPORT.md \
              -f message="Add support resources" \
              -f content="$(cat <<'CONTENT' | base64
            # Support

            For help, open an issue or contact support@example.com
            CONTENT
            )"
            ```
    refs:
      - url: https://docs.github.com/en/communities/setting-up-your-project-for-healthy-contributions/adding-support-resources-to-your-project
        title: Adding support resources to your project
  - uid: mondoo-github-repository-best-practices-code-of-conduct
    title: Ensure repository has a CODE_OF_CONDUCT.md policy
    impact: 30
    mql: |
      // if a .github repo exists, then check if the CODE_OF_CONDUCT.md is there
      if ( github.organization.repositories.one(name == ".github") ) {
        github.organization.repositories.where( name == ".github").all(
          codeOfConductFile.exists
        ) || github.repository.codeOfConductFile.exists
      } else {
        github.repository.codeOfConductFile.exists
      }
    docs:
      desc: |
        Open source repositories should publish a CODE_OF_CONDUCT.md so contributors understand the standards of behavior expected in the project.

        **Why this matters**

        - **Shared expectations:** A code of conduct clarifies the project's values and the behavior expected of every participant.
        - **Inclusive community:** Documented standards help maintain a welcoming environment that attracts and retains contributors.
        - **Clear enforcement:** It establishes how unacceptable behavior is reported and handled, reducing ambiguity during disputes.
      audit: |
        ### Audit via Console

        1. Navigate to the repository on GitHub.
        2. Look for a `CODE_OF_CONDUCT.md` file in the repository root, the `docs` directory, or the `.github` directory.
        3. Check the organization's `.github` repository for a shared `CODE_OF_CONDUCT.md` that applies to all repositories.

        If a `CODE_OF_CONDUCT.md` file is present in any of these locations, the check passes. If none exists, the check fails.

        ### Audit via CLI

        1. Query the repository contents for a code of conduct file:

           ```bash
           gh api /repos/OWNER/REPO/contents/CODE_OF_CONDUCT.md --jq '.name'
           ```

        If the command returns `CODE_OF_CONDUCT.md`, the check passes. If it returns a `Not Found` error, the check fails.
      remediation:
        - id: github
          desc: |
            **Using the GitHub web UI**

            1. Navigate to your repository on GitHub.
            2. Click on the "Add file" button.
            3. Select "Create new file".
            4. Name the file `CODE_OF_CONDUCT.md`.
            5. Add the content of the code of conduct you want to use.
            6. Commit the changes to your repository.

            The CODE_OF_CONDUCT.md file should include the project's values and principles.
        - id: terraform
          desc: |
            **Using Terraform**

            Manage the code of conduct file with the `github_repository_file` resource:

            ```hcl
            resource "github_repository_file" "code_of_conduct" {
              repository     = github_repository.example.name
              file           = "CODE_OF_CONDUCT.md"
              content        = "# Code of Conduct\n\nThis project follows the Contributor Covenant Code of Conduct.\n"
              commit_message = "Add code of conduct"
            }
            ```
        - id: cli
          desc: |
            **Using GitHub CLI**

            ```bash
            gh api --method PUT /repos/OWNER/REPO/contents/CODE_OF_CONDUCT.md \
              -f message="Add code of conduct" \
              -f content="$(cat <<'CONTENT' | base64
            # Code of Conduct

            This project follows the Contributor Covenant Code of Conduct.
            CONTENT
            )"
            ```
    refs:
      - url: https://docs.github.com/en/communities/setting-up-your-project-for-healthy-contributions/adding-a-code-of-conduct-to-your-project
        title: Adding a CODE_OF_CONDUCT.md to your project
  - uid: mondoo-github-repository-best-practices-description
    title: Ensure repository has a description
    impact: 30
    mql: github.repository.description.length > 0
    docs:
      desc: |
        Repositories should set a description so users can understand the purpose of the project at a glance.

        **Why this matters**

        - **Discoverability:** The description appears in search results and on the repository's main page, helping users find relevant projects.
        - **Faster evaluation:** A concise summary lets potential users and contributors quickly decide whether the project fits their needs.
        - **API consumers:** Tooling that lists repositories through the API surfaces the description, improving inventory and catalog views.
      audit: |
        ### Audit via Console

        1. Navigate to the repository on GitHub.
        2. Look at the "About" section on the right side of the repository page.

        If a description is shown, the check passes. If the "About" section has no description text, the check fails.

        ### Audit via CLI

        1. Query the repository description:

           ```bash
           gh repo view OWNER/REPO --json description --jq '.description'
           ```

        If the command returns a non-empty string, the check passes. If it returns an empty value, the check fails.
      remediation:
        - id: github
          desc: |
            **Using the GitHub web UI**

            1. Navigate to your repository on GitHub.
            2. Click the gear icon next to the "About" section on the right side of the repository page.
            3. Enter a description for the repository.
            4. Click "Save changes".

            The description should be a brief summary of the project's purpose, functionality, or goals. For example: "A command-line tool for managing cloud infrastructure" or "React component library for building accessible web applications".
        - id: terraform
          desc: |
            **Using Terraform**

            ```hcl
            resource "github_repository" "example" {
              name        = "example"
              description = "A brief description of the repository"
            }
            ```
        - id: cli
          desc: |
            **Using GitHub CLI**

            ```bash
            gh repo edit OWNER/REPO --description "A brief description of the repository"
            ```
    refs:
      - url: https://docs.github.com/en/repositories/managing-your-repositorys-settings-and-features/customizing-your-repository/about-repositories
        title: About repositories
  - uid: mondoo-github-repository-best-practices-gitignore
    title: Ensure repository has a .gitignore file
    impact: 30
    mql: github.repository.files.one( name == ".gitignore" )
    docs:
      desc: |
        Repositories should include a .gitignore file so unintended files are not committed to version control.

        **Why this matters**

        - **Repository hygiene:** Build artifacts, dependency directories, and OS-specific files are kept out of the repository, preventing bloat.
        - **Cleaner diffs:** Excluding generated and editor files removes noise from pull requests and makes review faster.
        - **Fewer conflicts:** Ignoring IDE and environment files avoids merge conflicts between contributors using different toolchains.
      audit: |
        ### Audit via Console

        1. Navigate to the repository on GitHub.
        2. Look for a `.gitignore` file in the repository root.

        If a `.gitignore` file is present, the check passes. If it is absent, the check fails.

        ### Audit via CLI

        1. Query the repository contents for a `.gitignore` file:

           ```bash
           gh api /repos/OWNER/REPO/contents/.gitignore --jq '.name'
           ```

        If the command returns `.gitignore`, the check passes. If it returns a `Not Found` error, the check fails.
      remediation:
        - id: github
          desc: |
            **Using the GitHub web UI**

            1. Navigate to your repository on GitHub.
            2. Click on the "Add file" button.
            3. Select "Create new file".
            4. Name the file `.gitignore`.
            5. Add patterns for files and directories to ignore.
            6. Commit the changes to your repository.

            GitHub provides a collection of `.gitignore` templates for various programming languages and frameworks. When creating a new repository, you can select a template from the "Add .gitignore" dropdown menu.

            For more details, see [Ignoring files](https://docs.github.com/en/get-started/getting-started-with-git/ignoring-files).
        - id: terraform
          desc: |
            **Using Terraform**

            Create a repository with a .gitignore template:

            ```hcl
            resource "github_repository" "example" {
              name               = "example"
              gitignore_template = "Go"
            }
            ```
        - id: cli
          desc: |
            **Using GitHub CLI**

            Create a .gitignore file in an existing repository:

            ```bash
            gh api --method PUT /repos/OWNER/REPO/contents/.gitignore \
              -f message="Add .gitignore" \
              -f content="$(gh api /gitignore/templates/Go --jq '.source' | base64)"
            ```
    refs:
      - url: https://docs.github.com/en/get-started/getting-started-with-git/ignoring-files
        title: Ignoring files
  - uid: mondoo-github-repository-best-practices-include-authors
    title: Ensure the README.md includes authors
    impact: 20
    mql: |
      github.repository.files.where(name.downcase  == "readme.md") {
        content == /Authors/i
      }
    docs:
      desc: |
        The README file should name the people or teams responsible for the project.

        **Why this matters**

        - **Transparency:** Naming authors tells users who built the project before they adopt it in their environments.
        - **Accountability:** Listed authors give users and contributors a clear point of contact for questions and ownership.
        - **Trust:** Attribution signals an actively stewarded project, which increases confidence for downstream consumers.
      audit: |
        ### Audit via Console

        1. Navigate to the repository on GitHub.
        2. Open the rendered `README.md` on the repository main page.
        3. Look for an authors or maintainers section.

        If the README names the project's authors, the check passes. If no authors section is present, the check fails.

        ### Audit via CLI

        1. Fetch the README and search it for an authors section:

           ```bash
           gh api /repos/OWNER/REPO/contents/README.md \
             --jq '.content' | base64 -d | grep -i 'authors'
           ```

        If the command prints a matching line, the check passes. If it prints nothing, the check fails.
      remediation:
        - id: github
          desc: |
            **Using the GitHub web UI**

            Update your repository's README.md with information about the project's authors.
        - id: cli
          desc: |
            **Using GitHub CLI**

            Fetch the current README, add an authors section, and update:

            ```bash
            # Get current content and SHA
            README=$(gh api /repos/OWNER/REPO/contents/README.md)
            SHA=$(echo "$README" | jq -r '.sha')
            CONTENT=$(echo "$README" | jq -r '.content' | base64 -d)

            # Append authors section and update
            gh api --method PUT /repos/OWNER/REPO/contents/README.md \
              -f message="Add authors section" \
              -f sha="$SHA" \
              -f content="$(echo "${CONTENT}

            ## Authors

            - Author Name
            " | base64)"
            ```
    refs:
      - url: https://docs.github.com/en/repositories/creating-and-managing-repositories/best-practices-for-repositories
        title: GitHub Repository Best Practices
  - uid: mondoo-github-repository-best-practices-readme
    title: Ensure repository has a README
    impact: 30
    mql: github.repository.files.one( name.downcase == "readme.md" )
    docs:
      desc: |
        Repositories should include a README.md file that provides the essential information needed to understand and use the project.

        **Why this matters**

        - **First impression:** The README is the first file most visitors see and serves as the primary documentation for the project.
        - **Adoption:** Explaining what the project does and how to install and use it helps users decide whether to adopt it.
        - **Contribution:** Documenting how to contribute lowers the barrier for new contributors to get involved.
      audit: |
        ### Audit via Console

        1. Navigate to the repository on GitHub.
        2. Check the repository main page for a rendered README below the file list.

        If a `README.md` file is present and rendered, the check passes. If no README is shown, the check fails.

        ### Audit via CLI

        1. Query the repository for a README:

           ```bash
           gh api /repos/OWNER/REPO/readme --jq '.name'
           ```

        If the command returns a README file name, the check passes. If it returns a `Not Found` error, the check fails.
      remediation:
        - id: github
          desc: |
            **Using the GitHub web UI**

            1. Navigate to your repository on GitHub.
            2. Click on the "Add file" button.
            3. Select "Create new file".
            4. Name the file `README.md`.
            5. Add content describing the project, including what it does, how to install and use it, and how to contribute.
            6. Commit the changes to your repository.

            For more details, see [About READMEs](https://docs.github.com/en/repositories/managing-your-repositorys-settings-and-features/customizing-your-repository/about-readmes).
        - id: terraform
          desc: |
            **Using Terraform**

            Manage the README file with the `github_repository_file` resource:

            ```hcl
            resource "github_repository_file" "readme" {
              repository     = github_repository.example.name
              file           = "README.md"
              content        = "# Project Name\n\nA brief description of the project.\n"
              commit_message = "Add README"
            }
            ```
        - id: cli
          desc: |
            **Using GitHub CLI**

            ```bash
            gh api --method PUT /repos/OWNER/REPO/contents/README.md \
              -f message="Add README" \
              -f content="$(cat <<'CONTENT' | base64
            # Project Name

            A brief description of the project.
            CONTENT
            )"
            ```
    refs:
      - url: https://docs.github.com/en/repositories/managing-your-repositorys-settings-and-features/customizing-your-repository/about-readmes
        title: About READMEs
  - uid: mondoo-github-repository-best-practices-readme-getting-started
    title: Ensure the README.md includes a getting started guide
    impact: 30
    mql: |
      github.repository.files.where(name.downcase  == "readme.md") {
        content == /Getting started/i
      }
    docs:
      desc: |
        The README file should contain a getting started guide that walks new users through installing and using the project.

        **Why this matters**

        - **Onboarding:** A getting started guide gives new users a clear, repeatable path from clone to first successful run.
        - **Reduced support load:** Documented setup steps cut down on repetitive setup questions for maintainers.
        - **Adoption:** Users are more likely to adopt a project when the initial experience is well documented and frictionless.
      audit: |
        ### Audit via Console

        1. Navigate to the repository on GitHub.
        2. Open the rendered `README.md` on the repository main page.
        3. Look for a getting started or quick start section.

        If the README includes a getting started section, the check passes. If none is present, the check fails.

        ### Audit via CLI

        1. Fetch the README and search it for a getting started section:

           ```bash
           gh api /repos/OWNER/REPO/contents/README.md \
             --jq '.content' | base64 -d | grep -i 'getting started'
           ```

        If the command prints a matching line, the check passes. If it prints nothing, the check fails.
      remediation:
        - id: github
          desc: |
            **Using the GitHub web UI**

            Update the README.md with a getting started guide. The getting started guide should include:
            - A description of the project
            - How to install the project
            - How to use the project
            - How to contribute to the project
        - id: cli
          desc: |
            **Using GitHub CLI**

            Verify that the README includes a getting started section:

            ```bash
            gh api /repos/OWNER/REPO/contents/README.md \
              --jq '.content' | base64 -d | grep -i 'getting started'
            ```

            If missing, clone the repository and add a getting started section to README.md manually.
    refs:
      - url: https://docs.github.com/en/repositories/creating-and-managing-repositories/best-practices-for-repositories
        title: GitHub Repository Best Practices
  - uid: mondoo-github-repository-best-practices-license
    title: Ensure repository declares a license
    impact: 30
    mql: github.repository.files.one( name == /LICENSE/ )
    docs:
      desc: |
        Repositories should publish a license file so users know how the source code may be used, modified, and redistributed.

        **Why this matters**

        - **Legal clarity:** A license tells users how the source code may or may not be used, removing legal ambiguity.
        - **Adoption:** Without a license, potential users face legal risk and many organizations will not adopt the project.
        - **Review and audit:** The absence of a license impedes security review or audit of the codebase by third parties.
      audit: |
        ### Audit via Console

        1. Navigate to the repository on GitHub.
        2. Look for a license file such as `LICENSE`, `LICENSE.txt`, or `LICENSE.md` in the repository root.

        If a license file following common conventions is present, the check passes. If none exists, the check fails.

        ### Audit via CLI

        1. Query the repository for a license:

           ```bash
           gh api /repos/OWNER/REPO/license --jq '.license.spdx_id'
           ```

        If the command returns a license identifier, the check passes. If it returns a `Not Found` error, the check fails.
      remediation:
        - id: github
          desc: |
            **Using the GitHub web UI**

            1. Navigate to your repository on GitHub.
            2. Click on the "Add file" button.
            3. Select "Create new file".
            4. Name the file according to common license conventions, such as `LICENSE`, `LICENSE.txt`, or `LICENSE.md`.
            5. Add the content of the license you want to use.
            6. Commit the changes to your repository.

            The license should be chosen based on the project's goals and the intended audience. For example, if the project is intended for commercial use, a permissive license such as MIT or Apache 2.0 may be appropriate. If the project is intended for open source use, a copyleft license such as GPL may be appropriate.
        - id: terraform
          desc: |
            **Using Terraform**

            ```hcl
            resource "github_repository" "example" {
              name             = "example"
              license_template = "apache-2.0"
            }
            ```
        - id: cli
          desc: |
            **Using GitHub CLI**

            Check if a license exists:

            ```bash
            gh api /repos/OWNER/REPO/license
            ```

            To add a license file:

            ```bash
            gh api --method PUT /repos/OWNER/REPO/contents/LICENSE \
              -f message="Add license" \
              -f content="$(gh api /licenses/apache-2.0 --jq '.body' | base64)"
            ```
    refs:
      - url: https://docs.github.com/en/code-security/getting-started/adding-a-security-policy-to-your-repository
        title: GitHub Docs - Adding a security policy to your repository
