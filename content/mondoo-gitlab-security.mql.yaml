  # No Terraform variants: the runtime check inspects the legacy project-level
  # approvalSettings.approvalsBeforeMerge integer (from GET /projects/:id/approvals). The
  # gitlabhq/gitlab provider (v19.x) does not expose that field — neither gitlab_project nor
  # gitlab_project_level_mr_approvals carries an approvals_before_merge count. The modern
  # Terraform pattern is to declare gitlab_project_approval_rule resources with
  # approvals_required, which is a different semantic (named rules with specific approvers)
  # and would not 1:1 mirror the runtime check. The existing terraform remediation below
  # correctly shows the rule-based pattern as the recommended fix.
  - uid: mondoo-gitlab-security-approvals-required
    title: Ensure merge request approvals are required
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: false
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-c-1-integrity
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-2
      compliance/nist-csf-2: nist-csf-2-pr-ps-06
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-1
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc6-8-2
      compliance/vda-isa-5: false
    filters: gitlab.namespace.plan != "free"
    mql: |
      gitlab.project.approvalSettings.approvalsBeforeMerge >= 1
    docs:
      desc: |
        This check ensures that at least one approval is required before a merge request can be merged. Without required approvals, any developer with merge access can push code changes directly without peer review.

        **Why this matters**

        Merge request approvals are a fundamental code review control:

          - Without required approvals, a single compromised account can push malicious code directly to production branches.
          - Code review catches bugs, security vulnerabilities, and logic errors before they reach production.
          - Required approvals create an audit trail of who reviewed and approved each change.
          - Many compliance frameworks require separation of duties for code changes.

        **Risk mitigation**

          - Require at least one approval on all projects.
          - For critical projects, consider requiring two or more approvals.
          - Combine with protected branches to enforce approval requirements.
      audit: |
        ### Audit via Console

        1. In GitLab, navigate to your project.
        2. Go to **Settings** > **Merge requests**.
        3. Under **Merge request approvals**, note the value of **Approvals required**.

        A passing project has **Approvals required** set to 1 or more. A failing project has it set to 0.

        ### Audit via CLI

        Query the project approval configuration with the `glab` CLI:

        ```bash
        glab api projects/PROJECT_ID/approvals | jq '.approvals_before_merge'
        ```

        A passing project returns a value of 1 or greater. A failing project returns 0.
      remediation:
        - id: gitlab
          desc: |
            Merge request approval rules require a GitLab Premium or Ultimate subscription. On the Free tier the **Approvals required** setting is not available, so this control cannot be configured there.

            To require merge request approvals using the GitLab web UI:

            1. Navigate to your project.
            2. Go to **Settings** > **Merge requests**.
            3. Under **Merge request approvals**, edit the **All eligible users** rule, or click **Add approval rule** if no rule exists.
            4. Set **Approvals required** to at least 1.
            5. Click **Save changes**.

            For more details, see [Merge request approval rules](https://docs.gitlab.com/user/project/merge_requests/approvals/rules.html).
        - id: cli
          desc: |
            Merge request approval rules require a GitLab Premium or Ultimate subscription. The commands below have no effect on the Free tier, where this control is unavailable.

            To require merge request approvals using the `glab` CLI:

            Create an approval rule that requires at least one approval. The rule-based approval API is the supported way to set the requirement, because the project-level `approvals_before_merge` field on the `/approvals` endpoint is read-only and no longer accepts updates:

            ```bash
            glab api --method POST projects/PROJECT_ID/approval_rules \
              -f name=Default -f approvals_required=1
            ```

            For more details, see the [Merge request approvals API](https://docs.gitlab.com/api/merge_request_approvals.html#create-project-level-rule).
        - id: terraform
          desc: |
            To require merge request approvals using Terraform:

            ```hcl
            resource "gitlab_project_approval_rule" "example" {
              project            = gitlab_project.example.id
              name               = "default"
              approvals_required = 1
            }
            ```

            For more details, see the Terraform [GitLab Provider](https://registry.terraform.io/providers/gitlabhq/gitlab/latest/docs/resources/project_approval_rule).
    refs:
      - url: https://docs.gitlab.com/user/project/merge_requests/approvals/
        title: GitLab Merge Request Approvals
      - url: https://docs.gitlab.com/user/project/settings/
        title: GitLab Project Settings
