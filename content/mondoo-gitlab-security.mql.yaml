      - uid: mondoo-gitlab-security-group-prevent-forking-outside-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that the GitLab group prevents members from forking projects to namespaces outside the group. Without this restriction, users can fork private repositories to personal namespaces where group-level security controls do not apply.

        **Why this matters**

        Unrestricted forking allows code to escape group-level security controls:

          - **Data exfiltration**: Members can fork private repositories to personal namespaces, effectively exporting proprietary source code outside organizational control.
          - **Security control bypass**: Forked repositories outside the group do not inherit group-level branch protection, approval rules, or push rules.
          - **Visibility changes**: Forks outside the group could be made public, exposing private code to the internet.
          - **Compliance violations**: Regulatory requirements for data handling and access control may be violated when code leaves the controlled group namespace.
          - **Intellectual property risk**: Former members retain access to their personal forks even after leaving the organization.

        Restrict forking to within the group to maintain consistent security controls and prevent unauthorized code distribution.
      audit: |
        ### Audit via Console

        1. In GitLab, navigate to your group.
        2. Go to **Settings** > **General**.
        3. Expand the **Permissions and group features** section.
        4. Check the state of **Prevent project forking outside current group**.

        A passing group has **Prevent project forking outside current group** checked. A failing group has it unchecked.

        ### Audit via CLI

        Query the forking restriction with the `glab` CLI:

        ```bash
        glab api groups/GROUP_ID | jq '.prevent_forking_outside_group'
        ```

        A passing group returns `true`. A failing group returns `false`.
      remediation:
        - id: gitlab
          desc: |
            To prevent forking projects outside the group using the GitLab web UI:

            1. Navigate to your group in GitLab.
            2. Go to **Settings** > **General**.
            3. Expand the **Permissions and group features** section.
            4. Check **Prevent project forking outside current group**.
            5. Click **Save changes**.

            For more details, see [Prevent project forking outside group](https://docs.gitlab.com/user/group/access_and_permissions/#prevent-project-forking-outside-group).
        - id: cli
          desc: |
            To prevent forking projects outside the group using the `glab` CLI:

            ```bash
            glab api --method PUT groups/GROUP_ID \
              -f prevent_forking_outside_group=true
            ```

            For more details, see the [Groups API](https://docs.gitlab.com/api/groups.html#update-group).
        - id: terraform
          desc: |
            To prevent forking projects outside the group using Terraform:

            ```hcl
            resource "gitlab_group" "example" {
              name                          = "example"
              path                          = "example"
              prevent_forking_outside_group = true
            }
            ```

            For more details, see the Terraform [GitLab Provider](https://registry.terraform.io/providers/gitlabhq/gitlab/latest/docs/resources/group).
    refs:
      - url: https://docs.gitlab.com/user/group/
        title: GitLab Group Settings
      - url: https://docs.gitlab.com/administration/settings/visibility_and_access_controls.html
        title: GitLab Visibility and Access Controls
