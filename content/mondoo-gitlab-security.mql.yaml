policies:
  - uid: mondoo-gitlab-security
    name: Mondoo GitLab Security
    version: 1.7.0
    license: BUSL-1.1
    tags:
      mondoo.com/category: security
      mondoo.com/platform: gitlab
    require:
      - provider: gitlab
    authors:
      - name: Mondoo, Inc.
        email: hello@mondoo.com
    summary: Secure GitLab groups, projects, and CI/CD pipelines
    docs:
      desc: |
        The Mondoo GitLab Security policy identifies misconfigurations that could expose your GitLab groups and projects to supply chain attacks, unauthorized code changes, and data breaches. Improperly secured GitLab environments can allow attackers to access private repositories, inject malicious code, or exfiltrate sensitive data.

        This policy validates critical security controls including group and project visibility settings, two-factor authentication requirements, and access control configurations.

        ### Prerequisites

        Remote scans of GitLab require a [personal access token](https://docs.gitlab.com/user/profile/personal_access_tokens.html) with access to the group and projects you plan to scan.

        ### Scan a GitLab group and projects

        To scan a GitLab group, set your personal access token and run a scan:

        ```bash
        export GITLAB_TOKEN=<your personal access token>
        cnspec scan gitlab --group <group_name>
        ```

        ### Scan a single GitLab project

        To scan a GitLab project, set your personal access token and run a scan:

        ```bash
        export GITLAB_TOKEN=<your personal access token>
        cnspec scan gitlab --group <group_name> --project <project_name>
        ```

        Have suggestions for new checks in this policy? Visit our [cnspec repository](https://github.com/mondoohq/cnspec).
    groups:
      - title: Group
        filters: asset.platform == "gitlab-group"
        checks:
          - uid: mondoo-gitlab-security-private-group
          - uid: mondoo-gitlab-security-private-projects
          - uid: mondoo-gitlab-security-require-two-factor
          - uid: mondoo-gitlab-security-group-prevent-forking-outside
          - uid: mondoo-gitlab-security-group-access-tokens-have-expiry
      - title: Project
        filters: asset.platform == "gitlab-project"
        checks:
          - uid: mondoo-gitlab-security-private-project
      - title: Merge Request Security
        filters: asset.platform == "gitlab-project"
        checks:
          - uid: mondoo-gitlab-security-approvals-required
          - uid: mondoo-gitlab-security-no-author-approval
          - uid: mondoo-gitlab-security-reset-approvals-on-push
          - uid: mondoo-gitlab-security-no-committer-approval
          - uid: mondoo-gitlab-security-pipeline-must-succeed
      - title: Branch Protection
        filters: asset.platform == "gitlab-project"
        checks:
          - uid: mondoo-gitlab-security-no-force-push-default-branch
      - title: Token and Key Security
        filters: asset.platform == "gitlab-project"
        checks:
          - uid: mondoo-gitlab-security-project-access-tokens-have-expiry
          - uid: mondoo-gitlab-security-deploy-keys-no-push-access
      - title: Security Scanning
        filters: asset.platform == "gitlab-project"
        checks:
          - uid: mondoo-gitlab-security-continuous-vulnerability-scanning
    scoring_system: highest impact
queries:
  - uid: mondoo-gitlab-security-private-group
    title: Ensure the group is private
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/soc2-2017: soc2-control-cc6-1-3
    mql: gitlab.group.visibility != "public"
    docs:
      desc: |
        This check verifies that the GitLab group visibility is set to private or internal, not public.

        **Why this matters**

        Public GitLab groups expose all contained projects and their contents to anyone on the internet:

          - **Source code exposure**: Public groups allow anyone to clone repositories and view proprietary source code.
          - **Secret leakage**: Hardcoded credentials, API keys, or configuration files may be exposed in public repositories.
          - **Supply chain attacks**: Public visibility enables attackers to analyze code for vulnerabilities before they're patched.
          - **Intellectual property theft**: Competitors or malicious actors can access and copy proprietary algorithms and business logic.
          - **Reconnaissance**: Public groups provide attackers with information about your technology stack and infrastructure.

        Set group visibility to private unless there is an explicit business requirement for public access, and regularly audit group visibility settings.
      remediation:
        - id: gitlab
          desc: |
            **Using GitLab UI**

            To make the visibility of a GitLab group private:

            1. In GitLab, navigate to your group.
            2. Go to **Settings** > **General**.
            3. Expand the **Visibility, project features, permissions** section.
            4. Under **Visibility level**, select **Private**.
            5. Click **Save changes**.

            For more details, see [Change group visibility](https://docs.gitlab.com/user/public_access.html#change-group-visibility).
        - id: terraform
          desc: |
            **Using Terraform**

            To make the visibility of a GitLab group private using Terraform, you can use the following configuration:

            ```hcl
            resource "gitlab_group" "example" {
              name        = "example"
              path        = "example"
              visibility  = "private"
            }
            ```

            For more details, see the Terraform [GitLab Provider](https://registry.terraform.io/providers/gitlabhq/gitlab/latest/docs/resources/group).
        - id: cli
          desc: |
            **Using GitLab CLI**

            ```bash
            glab api --method PUT groups/GROUP_ID -f visibility=private
            ```

            For more details, see the [Groups API](https://docs.gitlab.com/api/groups.html#update-group).
    refs:
      - url: https://docs.gitlab.com/user/group/
        title: GitLab Group Settings
      - url: https://docs.gitlab.com/administration/settings/visibility_and_access_controls.html
        title: GitLab Visibility and Access Controls
  - uid: mondoo-gitlab-security-require-two-factor
    title: Ensure two-factor authentication is required
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-j
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-3
      compliance/soc2-2017: soc2-control-cc6-1-4
    mql: gitlab.group.requireTwoFactorAuthentication == true
    docs:
      desc: |
        This check verifies that two-factor authentication is required for all members of the GitLab group.

        **Why this matters**

        GitLab accounts are high-value targets for attackers seeking to compromise software supply chains:

          - **Source code tampering**: Compromised accounts can push malicious code that gets deployed to production.
          - **Credential theft protection**: Even if passwords are phished or leaked, attackers cannot access accounts without the second factor.
          - **CI/CD pipeline access**: Attackers with GitLab access can modify pipelines to inject malicious build steps.
          - **Secrets and variables**: GitLab projects often contain CI/CD variables with deployment credentials and API keys.
          - **Supply chain attacks**: Software supply chain compromises often begin with compromised developer accounts.

        Require 2FA at the group level to ensure all members are protected, and set a reasonable grace period for compliance.
      remediation:
        - id: gitlab
          desc: |
            **Using GitLab UI**

            To require two-factor authentication for all users in a GitLab group:

            1. In GitLab, navigate to your group.
            2. Go to **Settings** > **General**.
            3. Expand the **Permissions and group features** section.
            4. Under **Require two-factor authentication**, check the box.
            5. Click **Save changes**.

            For more details, see [Enforce two-factor authentication](https://docs.gitlab.com/ee/security/two_factor_authentication.html).
        - id: terraform
          desc: |
            **Using Terraform**

            To require two-factor authentication for all users in a GitLab group using Terraform, you can use the following configuration:

            ```hcl
            resource "gitlab_group" "example" {
              name        = "example"
              path        = "example"
              require_two_factor_authentication = true
            }
            ```

            For more details, see the Terraform [GitLab Provider](https://registry.terraform.io/providers/gitlabhq/gitlab/latest/docs/resources/group).
        - id: cli
          desc: |
            **Using GitLab CLI**

            ```bash
            glab api --method PUT groups/GROUP_ID \
              -f require_two_factor_authentication=true \
              -f two_factor_grace_period=48
            ```

            For more details, see the [Groups API](https://docs.gitlab.com/api/groups.html#update-group).
    refs:
      - url: https://docs.gitlab.com/user/profile/account/two_factor_authentication.html
        title: GitLab Two-Factor Authentication
      - url: https://docs.gitlab.com/user/group/
        title: GitLab Group Settings
  - uid: mondoo-gitlab-security-private-projects
    title: Ensure all projects are private
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/soc2-2017: soc2-control-cc6-1-3
    mql: gitlab.group.projects.none(visibility == "public")
    docs:
      desc: |
        This check verifies that no projects within the GitLab group have public visibility.

        **Why this matters**

        Even when a group is private, individual projects can be set to public, exposing their contents:

          - **Inconsistent security**: Public projects in an otherwise private group create gaps in access control.
          - **Accidental exposure**: Developers may inadvertently set projects to public without understanding the implications.
          - **Data leakage**: Public projects expose code, issues, merge requests, and wiki content to the internet.
          - **Configuration drift**: Over time, project visibility settings may deviate from intended security posture.
          - **Compliance violations**: Regulatory requirements may prohibit public exposure of certain types of code or data.

        Enforce private visibility as the default for new projects and regularly audit all projects for visibility settings.
      remediation:
        - id: gitlab
          desc: |
            **Using GitLab UI**

            This check fails when any existing project in the group has public visibility. You must change each public project to private individually.

            **Step 1: Change existing public projects to private**

            For each public project in the group:

            1. In GitLab, navigate to the project.
            2. Go to **Settings** > **General**.
            3. Expand the **Visibility, project features, permissions** section.
            4. Under **Project visibility**, select **Private**.
            5. Click **Save changes**.

            **Step 2: Set the default visibility for new projects**

            To prevent future projects from being created as public:

            1. In GitLab, navigate to your group.
            2. Go to **Settings** > **General**.
            3. Expand the **Visibility, project features, permissions** section.
            4. Under **Default project visibility**, select **Private**.
            5. Click **Save changes**.

            For more details, see [Change project visibility](https://docs.gitlab.com/user/public_access.html#change-project-visibility).
        - id: terraform
          desc: |
            **Using Terraform**

            This check fails when any existing project has public visibility. You must set each project's visibility to private.

            To make individual projects private:

            ```hcl
            resource "gitlab_project" "example" {
              name         = "example"
              path         = "example"
              visibility   = "private"
              namespace_id = gitlab_group.example.id
            }
            ```

            To set the default visibility for new projects in a group:

            ```hcl
            resource "gitlab_group" "example" {
              name                      = "example"
              path                      = "example"
              default_branch_protection = 2
              project_creation_level    = "maintainer"
              subgroup_creation_level   = "maintainer"
              visibility_level          = "private"
            }
            ```

            For more details, see the Terraform [GitLab Provider](https://registry.terraform.io/providers/gitlabhq/gitlab/latest/docs/resources/project).
        - id: cli
          desc: |
            **Using GitLab CLI**

            Update each public project to private:

            ```bash
            glab api --method PUT projects/PROJECT_ID -f visibility=private
            ```

            For more details, see the [Projects API](https://docs.gitlab.com/api/projects.html#edit-project).
    refs:
      - url: https://docs.gitlab.com/administration/settings/visibility_and_access_controls.html
        title: GitLab Visibility and Access Controls
      - url: https://docs.gitlab.com/user/project/settings/
        title: GitLab Project Settings
  - uid: mondoo-gitlab-security-private-project
    title: Ensure the project is private
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/soc2-2017: soc2-control-cc6-1-3
    mql: gitlab.project.visibility != "public"
    docs:
      desc: |
        This check verifies that the individual GitLab project visibility is set to private or internal, not public.

        **Why this matters**

        Public project visibility exposes the entire repository contents and metadata to anyone on the internet:

          - **Complete code exposure**: All source code, including historical commits, is accessible to anyone.
          - **Issue and MR visibility**: Bug reports, security issues, and code review discussions are publicly readable.
          - **CI/CD job logs**: Build and deployment logs may contain sensitive information or credentials.
          - **Dependency information**: Lock files and manifests reveal your technology stack and potential vulnerabilities.
          - **Contributor information**: Git history exposes developer names, emails, and work patterns.

        Set project visibility to private unless there is a documented business requirement for public access.
      remediation:
        - id: gitlab
          desc: |
            **Using GitLab UI**

            To make the visibility of an individual GitLab project private:

            1. In GitLab, navigate to your project.
            2. Go to **Settings** > **General**.
            3. Expand the **Visibility, project features, permissions** section.
            4. Under **Project visibility**, select **Private**.
            5. Click **Save changes**.

            For more details, see [Change project visibility](https://docs.gitlab.com/user/public_access.html#change-project-visibility).
        - id: terraform
          desc: |
            **Using Terraform**

            To make an individual GitLab project private using Terraform, you can use the following configuration:

            ```hcl
            resource "gitlab_project" "example" {
              name         = "example"
              path         = "example"
              visibility   = "private"
              namespace_id = gitlab_group.example.id
            }
            ```

            For more details, see the Terraform [GitLab Provider](https://registry.terraform.io/providers/gitlabhq/gitlab/latest/docs/resources/project).
        - id: cli
          desc: |
            **Using GitLab CLI**

            ```bash
            glab api --method PUT projects/PROJECT_ID -f visibility=private
            ```

            For more details, see the [Projects API](https://docs.gitlab.com/api/projects.html#edit-project).
    refs:
      - url: https://docs.gitlab.com/user/project/settings/
        title: GitLab Project Settings
      - url: https://docs.gitlab.com/administration/settings/visibility_and_access_controls.html
        title: GitLab Visibility and Access Controls
  - uid: mondoo-gitlab-security-approvals-required
    title: Ensure merge request approvals are required
    impact: 90
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-2
      compliance/nist-csf-2: nist-csf-2-pr-ps-06
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-1
      compliance/soc2-2017: soc2-control-cc6-8-2
    filters: gitlab.namespace.plan != "free"
    mql: |
      gitlab.project.approvalSettings.approvalsBeforeMerge >= 1
    docs:
      desc: |
        This check ensures that at least one approval is required before a merge request can be merged. Without required approvals, any developer with merge access can push code changes directly without peer review.

        **Why this matters**

        Merge request approvals are a fundamental code review control:
          - Without required approvals, a single compromised account can push malicious code directly to production branches.
          - Code review catches bugs, security vulnerabilities, and logic errors before they reach production.
          - Required approvals create an audit trail of who reviewed and approved each change.
          - Many compliance frameworks (SOC 2, ISO 27001) require separation of duties for code changes.

        Risk mitigation:
          - Require at least one approval on all projects.
          - For critical projects, consider requiring two or more approvals.
          - Combine with protected branches to enforce approval requirements.
      remediation:
        - id: gitlab
          desc: |
            **Using GitLab UI**

            1. Navigate to your project.
            2. Go to **Settings** > **Merge requests**.
            3. Under **Merge request approvals**, set **Approvals required** to at least 1.
            4. Click **Save changes**.

            For more details, see [Merge request approval rules](https://docs.gitlab.com/user/project/merge_requests/approvals/rules.html).
        - id: terraform
          desc: |
            **Using Terraform**

            ```hcl
            resource "gitlab_project_level_mr_approvals" "example" {
              project = gitlab_project.example.id
            }

            resource "gitlab_project_approval_rule" "example" {
              project            = gitlab_project.example.id
              name               = "default"
              approvals_required = 1
            }
            ```

            For more details, see the Terraform [GitLab Provider](https://registry.terraform.io/providers/gitlabhq/gitlab/latest/docs/resources/project_level_mr_approvals).
        - id: cli
          desc: |
            **Using GitLab CLI**

            ```bash
            glab api --method POST projects/PROJECT_ID/approval_rules \
              -f name=Default -f approvals_required=1
            ```

            For more details, see the [Merge request approvals API](https://docs.gitlab.com/api/merge_request_approvals.html).
    refs:
      - url: https://docs.gitlab.com/user/project/merge_requests/approvals/
        title: GitLab Merge Request Approvals
      - url: https://docs.gitlab.com/user/project/settings/
        title: GitLab Project Settings
  - uid: mondoo-gitlab-security-no-author-approval
    title: Ensure merge request authors cannot approve their own requests
    impact: 90
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-2
      compliance/nist-csf-2: nist-csf-2-pr-ps-06
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-1
      compliance/soc2-2017: soc2-control-cc6-8-2
    filters: gitlab.namespace.plan != "free"
    mql: |
      gitlab.project.approvalSettings.mergeRequestsAuthorApproval == false
    docs:
      desc: |
        This check ensures that merge request authors cannot approve their own merge requests. Allowing self-approval defeats the purpose of code review and eliminates the separation of duties control.

        **Why this matters**

        Self-approval of merge requests undermines code review integrity:
          - A compromised developer account can both create and approve malicious changes.
          - Self-approval eliminates the independent verification of code changes.
          - Regulatory and compliance frameworks require separation of duties between code authors and reviewers.
          - Supply chain attacks often exploit the ability to self-approve changes.

        Risk mitigation:
          - Disable author approval for all projects.
          - Combine with required approvals to ensure independent review.
          - Monitor merge request activity for unusual approval patterns.
      remediation:
        - id: gitlab
          desc: |
            **Using GitLab UI**

            1. Navigate to your project.
            2. Go to **Settings** > **Merge requests**.
            3. Under **Merge request approvals**, uncheck **Allow author approval**.
            4. Click **Save changes**.

            For more details, see [Merge request approval settings](https://docs.gitlab.com/user/project/merge_requests/approvals/settings.html).
        - id: terraform
          desc: |
            **Using Terraform**

            ```hcl
            resource "gitlab_project_level_mr_approvals" "example" {
              project                        = gitlab_project.example.id
              merge_requests_author_approval  = false
            }
            ```

            For more details, see the Terraform [GitLab Provider](https://registry.terraform.io/providers/gitlabhq/gitlab/latest/docs/resources/project_level_mr_approvals).
        - id: cli
          desc: |
            **Using GitLab CLI**

            ```bash
            glab api --method PUT projects/PROJECT_ID/approval_settings \
              -f merge_requests_author_approval=false
            ```

            For more details, see the [Merge request approvals API](https://docs.gitlab.com/api/merge_request_approvals.html#change-configuration).
    refs:
      - url: https://docs.gitlab.com/user/project/merge_requests/approvals/
        title: GitLab Merge Request Approvals
      - url: https://docs.gitlab.com/user/project/settings/
        title: GitLab Project Settings
  - uid: mondoo-gitlab-security-reset-approvals-on-push
    title: Ensure approvals are reset when new commits are pushed
    impact: 80
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-2
      compliance/nist-csf-2: nist-csf-2-pr-ps-06
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-1
      compliance/soc2-2017: soc2-control-cc6-8-2
    filters: gitlab.namespace.plan != "free"
    mql: |
      gitlab.project.approvalSettings.resetApprovalsOnPush == true
    docs:
      desc: |
        This check ensures that merge request approvals are reset when new commits are pushed to the source branch. Without this setting, a developer could get a merge request approved and then add unapproved changes before merging.

        **Why this matters**

        Stale approvals on modified merge requests create a security gap:
          - An attacker can get a benign change approved, then add malicious code before merging.
          - Reviewers may not notice additional commits pushed after their approval.
          - This bypasses the intent of code review by allowing unapproved code to be merged.
          - Compliance requirements for code review are not met if approved code is modified post-approval.

        Risk mitigation:
          - Enable reset approvals on push for all projects.
          - Combine with required approvals and branch protection rules.
          - Educate developers to re-review merge requests after new commits are pushed.
      remediation:
        - id: gitlab
          desc: |
            **Using GitLab UI**

            1. Navigate to your project.
            2. Go to **Settings** > **Merge requests**.
            3. Under **Merge request approvals**, check **Remove all approvals when commits are added to the source branch**.
            4. Click **Save changes**.

            For more details, see [Merge request approval settings](https://docs.gitlab.com/user/project/merge_requests/approvals/settings.html).
        - id: terraform
          desc: |
            **Using Terraform**

            ```hcl
            resource "gitlab_project_level_mr_approvals" "example" {
              project                  = gitlab_project.example.id
              reset_approvals_on_push  = true
            }
            ```

            For more details, see the Terraform [GitLab Provider](https://registry.terraform.io/providers/gitlabhq/gitlab/latest/docs/resources/project_level_mr_approvals).
        - id: cli
          desc: |
            **Using GitLab CLI**

            ```bash
            glab api --method PUT projects/PROJECT_ID/approval_settings \
              -f reset_approvals_on_push=true
            ```

            For more details, see the [Merge request approvals API](https://docs.gitlab.com/api/merge_request_approvals.html#change-configuration).
    refs:
      - url: https://docs.gitlab.com/user/project/merge_requests/approvals/
        title: GitLab Merge Request Approvals
      - url: https://docs.gitlab.com/user/project/settings/
        title: GitLab Project Settings
  - uid: mondoo-gitlab-security-no-committer-approval
    title: Ensure committers cannot approve merge requests they contributed to
    impact: 80
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-2
      compliance/nist-csf-2: nist-csf-2-pr-ps-06
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-1
      compliance/soc2-2017: soc2-control-cc6-8-2
    filters: gitlab.namespace.plan != "free"
    mql: |
      gitlab.project.approvalSettings.mergeRequestsDisableCommittersApproval == true
    docs:
      desc: |
        This check ensures that users who have committed to a merge request cannot also approve it. This enforces separation between contributors and reviewers for each change.

        **Why this matters**

        Allowing committers to approve their own contributions weakens code review:
          - A developer who contributed code to a merge request has a conflict of interest when reviewing it.
          - Committer approval allows a single person to both write and approve code in collaboration scenarios.
          - This setting closes a gap where multiple contributors to a branch could approve each other's changes without independent review.
          - Strengthens the audit trail by ensuring approvals come from independent reviewers.

        Risk mitigation:
          - Disable committer approval for all projects.
          - Combine with author approval restrictions for comprehensive separation of duties.
          - Use code owner approvals for additional review requirements on critical paths.
      remediation:
        - id: gitlab
          desc: |
            **Using GitLab UI**

            1. Navigate to your project.
            2. Go to **Settings** > **Merge requests**.
            3. Under **Merge request approvals**, check **Prevent approvals by users who add commits**.
            4. Click **Save changes**.

            For more details, see [Merge request approval settings](https://docs.gitlab.com/user/project/merge_requests/approvals/settings.html).
        - id: terraform
          desc: |
            **Using Terraform**

            ```hcl
            resource "gitlab_project_level_mr_approvals" "example" {
              project                                     = gitlab_project.example.id
              merge_requests_disable_committers_approval   = true
            }
            ```

            For more details, see the Terraform [GitLab Provider](https://registry.terraform.io/providers/gitlabhq/gitlab/latest/docs/resources/project_level_mr_approvals).
        - id: cli
          desc: |
            **Using GitLab CLI**

            ```bash
            glab api --method PUT projects/PROJECT_ID/approval_settings \
              -f merge_requests_disable_committers_approval=true
            ```

            For more details, see the [Merge request approvals API](https://docs.gitlab.com/api/merge_request_approvals.html#change-configuration).
    refs:
      - url: https://docs.gitlab.com/user/project/merge_requests/approvals/
        title: GitLab Merge Request Approvals
      - url: https://docs.gitlab.com/user/project/settings/
        title: GitLab Project Settings
  - uid: mondoo-gitlab-security-no-force-push-default-branch
    title: Ensure force push is disabled on the default branch
    impact: 90
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-2
      compliance/nist-csf-2: nist-csf-2-pr-ps-06
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-1
      compliance/soc2-2017: soc2-control-cc6-8-2
    mql: |
      gitlab.project.protectedBranches.where(defaultBranch == true).all(allowForcePush == false)
    docs:
      desc: |
        This check ensures that force push is disabled on the default (protected) branch. Force pushing allows rewriting Git history, which can be used to remove audit trails, overwrite security fixes, or inject malicious code.

        **Why this matters**

        Force push to the default branch is a high-severity risk:
          - An attacker can rewrite Git history to inject malicious code that appears to have always been present.
          - Force pushing can remove commits that contain security fixes or audit trails.
          - History rewriting makes incident investigation and forensic analysis extremely difficult.
          - Accidental force pushes can cause data loss and disrupt development workflows.

        Risk mitigation:
          - Disable force push on all protected branches, especially the default branch.
          - Use branch protection rules to enforce this at the project level.
          - Monitor for any changes to branch protection settings.
      remediation:
        - id: gitlab
          desc: |
            **Using GitLab UI**

            1. Navigate to your project.
            2. Go to **Settings** > **Repository**.
            3. Expand the **Protected branches** section.
            4. For the default branch, ensure **Allowed to force push** is disabled.
            5. Click **Protect** or **Save changes**.

            For more details, see [Protected branches](https://docs.gitlab.com/user/project/protected_branches.html).
        - id: terraform
          desc: |
            **Using Terraform**

            ```hcl
            resource "gitlab_branch_protection" "default" {
              project            = gitlab_project.example.id
              branch             = "main"
              allow_force_push   = false
              push_access_level  = "maintainer"
              merge_access_level = "maintainer"
            }
            ```

            For more details, see the Terraform [GitLab Provider](https://registry.terraform.io/providers/gitlabhq/gitlab/latest/docs/resources/branch_protection).
        - id: cli
          desc: |
            **Using GitLab CLI**

            ```bash
            glab api --method PATCH projects/PROJECT_ID/protected_branches/main \
              -f allow_force_push=false
            ```

            For more details, see the [Protected branches API](https://docs.gitlab.com/api/protected_branches.html#update-a-protected-branch).
    refs:
      - url: https://docs.gitlab.com/user/project/settings/
        title: GitLab Project Settings
      - url: https://docs.gitlab.com/administration/settings/visibility_and_access_controls.html
        title: GitLab Visibility and Access Controls
  - uid: mondoo-gitlab-security-pipeline-must-succeed
    title: Ensure pipeline must succeed before merging
    impact: 80
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-1
      compliance/nist-csf-2: nist-csf-2-pr-ps-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-1
      compliance/soc2-2017: soc2-control-cc7-1-1
    mql: |
      gitlab.project.onlyAllowMergeIfPipelineSucceeds == true
    docs:
      desc: |
        This check ensures that merge requests can only be merged when the CI/CD pipeline succeeds. Without this requirement, code that fails tests, security scans, or other automated checks can be merged into protected branches.

        **Why this matters**

        Bypassing CI/CD pipeline requirements undermines automated security controls:
          - Security scanning tools (SAST, DAST, dependency scanning) in the pipeline are bypassed.
          - Failed tests may indicate bugs or regressions that reach production.
          - Compliance checks and policy validations in the pipeline are skipped.
          - Attackers can merge malicious code that would otherwise be caught by automated checks.

        Risk mitigation:
          - Require pipeline success on all projects with CI/CD pipelines.
          - Include security scanning jobs in your pipeline configuration.
          - Combine with the "don't allow merge on skipped pipeline" setting.
          - Monitor for projects that have this setting disabled.
      remediation:
        - id: gitlab
          desc: |
            **Using GitLab UI**

            1. Navigate to your project.
            2. Go to **Settings** > **Merge requests**.
            3. Under **Merge checks**, check **Pipelines must succeed**.
            4. Click **Save changes**.

            For more details, see [Merge request checks](https://docs.gitlab.com/user/project/merge_requests/merge_when_pipeline_succeeds.html).
        - id: terraform
          desc: |
            **Using Terraform**

            ```hcl
            resource "gitlab_project" "example" {
              name                                  = "example"
              only_allow_merge_if_pipeline_succeeds = true
            }
            ```

            For more details, see the Terraform [GitLab Provider](https://registry.terraform.io/providers/gitlabhq/gitlab/latest/docs/resources/project).
        - id: cli
          desc: |
            **Using GitLab CLI**

            ```bash
            glab api --method PUT projects/PROJECT_ID \
              -f only_allow_merge_if_pipeline_succeeds=true
            ```

            For more details, see the [Projects API](https://docs.gitlab.com/api/projects.html#edit-project).
    refs:
      - url: https://docs.gitlab.com/ci/security/
        title: GitLab CI/CD Security
      - url: https://docs.gitlab.com/user/project/settings/
        title: GitLab Project Settings
  - uid: mondoo-gitlab-security-group-prevent-forking-outside
    title: Ensure group prevents forking projects outside the group
    impact: 80
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/soc2-2017: soc2-control-cc6-1-3
    filters: gitlab.namespace.plan != "free"
    mql: |
      gitlab.group.preventForkingOutsideGroup == true
    docs:
      desc: |
        This check ensures that the GitLab group prevents members from forking projects to namespaces outside the group. Without this restriction, users can fork private repositories to personal namespaces where group-level security controls do not apply.

        **Why this matters**

        Unrestricted forking allows code to escape group-level security controls:

          - **Data exfiltration**: Members can fork private repositories to personal namespaces, effectively exporting proprietary source code outside organizational control.
          - **Security control bypass**: Forked repositories outside the group do not inherit group-level branch protection, approval rules, or push rules.
          - **Visibility changes**: Forks outside the group could be made public, exposing private code to the internet.
          - **Compliance violations**: Regulatory requirements for data handling and access control may be violated when code leaves the controlled group namespace.
          - **Intellectual property risk**: Former members retain access to their personal forks even after leaving the organization.

        Restrict forking to within the group to maintain consistent security controls and prevent unauthorized code distribution.
      remediation:
        - id: gitlab
          desc: |
            **Using GitLab UI**

            1. Navigate to your group in GitLab.
            2. Go to **Settings** > **General**.
            3. Expand the **Permissions and group features** section.
            4. Check **Prevent forking outside of the group**.
            5. Click **Save changes**.

            For more details, see [Prevent forking outside the group](https://docs.gitlab.com/user/group/#prevent-forking-outside-the-group).
        - id: terraform
          desc: |
            **Using Terraform**

            ```hcl
            resource "gitlab_group" "example" {
              name                          = "example"
              path                          = "example"
              prevent_forking_outside_group = true
            }
            ```

            For more details, see the Terraform [GitLab Provider](https://registry.terraform.io/providers/gitlabhq/gitlab/latest/docs/resources/group).
        - id: cli
          desc: |
            **Using GitLab CLI**

            ```bash
            glab api --method PUT groups/GROUP_ID \
              -f prevent_forking_outside_group=true
            ```

            For more details, see the [Groups API](https://docs.gitlab.com/api/groups.html#update-group).
    refs:
      - url: https://docs.gitlab.com/user/group/
        title: GitLab Group Settings
      - url: https://docs.gitlab.com/administration/settings/visibility_and_access_controls.html
        title: GitLab Visibility and Access Controls
  - uid: mondoo-gitlab-security-project-access-tokens-have-expiry
    title: Ensure project access tokens have expiration dates
    impact: 80
    tags:
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-4
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nis-2: nis-2-21-2-j
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
    mql: |
      gitlab.project.accessTokens.where(active == true && revoked == false).all(expiresAt != null)
    docs:
      desc: |
        This check ensures that all active project access tokens have expiration dates configured. Tokens without expiration dates provide indefinite access to the project, increasing the risk of unauthorized access if the token is compromised.

        **Why this matters**

        Non-expiring access tokens create persistent security risks:

        - **Indefinite access**: Tokens without expiration dates provide permanent access, even if the original need has passed.
        - **Credential sprawl**: Over time, non-expiring tokens accumulate and become difficult to track and manage.
        - **Compromised token risk**: If a non-expiring token is leaked, it remains valid until manually revoked.
        - **Compliance violations**: Security frameworks require periodic credential rotation and expiration enforcement.
        - **Least privilege**: Non-expiring tokens violate the principle of least privilege by granting access beyond what is needed.

        Set expiration dates on all project access tokens and implement a process to rotate them before expiration.
      remediation:
        - id: gitlab
          desc: |
            **Using GitLab UI**

            1. Navigate to your project in GitLab.
            2. Go to **Settings** > **Access Tokens**.
            3. Review all active tokens and note those without expiration dates.
            4. Revoke tokens that have no expiration date.
            5. Create replacement tokens with appropriate expiration dates (recommended: 90 days or less).
            6. Update any integrations using the old tokens.

            For more details, see [Project access tokens](https://docs.gitlab.com/user/project/settings/project_access_tokens.html).
        - id: terraform
          desc: |
            **Using Terraform**

            Ensure project access tokens are created with an expiration date:

            ```hcl
            resource "gitlab_project_access_token" "example" {
              project    = gitlab_project.example.id
              name       = "example-token"
              expires_at = "2026-06-24"
              scopes     = ["api"]

              access_level = "maintainer"
            }
            ```

            For more details, see the Terraform [GitLab Provider](https://registry.terraform.io/providers/gitlabhq/gitlab/latest/docs/resources/project_access_token).
        - id: cli
          desc: |
            **Using GitLab CLI**

            Create a new project access token with an expiration date:

            ```bash
            glab api --method POST projects/PROJECT_ID/access_tokens \
              -f name=example-token -f "scopes[]=api" \
              -f expires_at=2026-06-24 -f access_level=30
            ```

            Revoke existing tokens without expiration and replace them with expiring tokens.

            For more details, see the [Project access tokens API](https://docs.gitlab.com/api/project_access_tokens.html).
    refs:
      - url: https://docs.gitlab.com/user/project/settings/project_access_tokens.html
        title: GitLab Project Access Tokens
      - url: https://docs.gitlab.com/user/project/settings/
        title: GitLab Project Settings
  - uid: mondoo-gitlab-security-group-access-tokens-have-expiry
    title: Ensure group access tokens have expiration dates
    impact: 80
    tags:
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-4
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nis-2: nis-2-21-2-j
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
    mql: |
      gitlab.group.accessTokens.where(active == true && revoked == false).all(expiresAt != null)
    docs:
      desc: |
        This check ensures that all active group access tokens have expiration dates configured. Group tokens provide access to all projects within the group, making non-expiring tokens an even greater risk.

        **Why this matters**

        Non-expiring group access tokens pose an elevated risk compared to project tokens:

        - **Broad access scope**: Group tokens grant access to all projects within the group, amplifying the impact of a compromise.
        - **Indefinite validity**: Without expiration, compromised tokens remain valid until manually discovered and revoked.
        - **Operational risk**: Teams that created tokens may leave the organization without transferring token management responsibility.
        - **Audit challenges**: Non-expiring tokens are harder to include in periodic access reviews.
        - **Compliance requirements**: Security frameworks require time-bound credentials with regular rotation.

        Set expiration dates on all group access tokens and implement a rotation schedule.
      remediation:
        - id: gitlab
          desc: |
            **Using GitLab UI**

            1. Navigate to your group in GitLab.
            2. Go to **Settings** > **Access Tokens**.
            3. Review all active tokens and note those without expiration dates.
            4. Revoke tokens that have no expiration date.
            5. Create replacement tokens with appropriate expiration dates (recommended: 90 days or less).
            6. Update any integrations using the old tokens.

            For more details, see [Group access tokens](https://docs.gitlab.com/user/group/settings/group_access_tokens.html).
        - id: terraform
          desc: |
            **Using Terraform**

            Ensure group access tokens are created with an expiration date:

            ```hcl
            resource "gitlab_group_access_token" "example" {
              group      = gitlab_group.example.id
              name       = "example-token"
              expires_at = "2026-06-24"
              scopes     = ["api"]

              access_level = "maintainer"
            }
            ```

            For more details, see the Terraform [GitLab Provider](https://registry.terraform.io/providers/gitlabhq/gitlab/latest/docs/resources/group_access_token).
        - id: cli
          desc: |
            **Using GitLab CLI**

            Create a new group access token with an expiration date:

            ```bash
            glab api --method POST groups/GROUP_ID/access_tokens \
              -f name=example-token -f "scopes[]=api" \
              -f expires_at=2026-06-24 -f access_level=30
            ```

            Revoke existing tokens without expiration and replace them with expiring tokens.

            For more details, see the [Group access tokens API](https://docs.gitlab.com/api/group_access_tokens.html).
    refs:
      - url: https://docs.gitlab.com/user/group/settings/group_access_tokens.html
        title: GitLab Group Access Tokens
      - url: https://docs.gitlab.com/user/group/
        title: GitLab Group Settings
  - uid: mondoo-gitlab-security-deploy-keys-no-push-access
    title: Ensure project deploy keys do not have push access
    impact: 80
    tags:
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-5
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
    mql: |
      gitlab.project.deployKeys.all(canPush == false)
    docs:
      desc: |
        This check ensures that deploy keys configured for the project do not have push (write) access. Deploy keys with push access can be used to modify repository contents, which violates the principle of least privilege.

        **Why this matters**

        Deploy keys with push access create unnecessary write access to repositories:

        - **Least privilege violation**: Deploy keys are typically used for read-only CI/CD operations; push access exceeds the required permission.
        - **Unauthorized code changes**: A compromised deploy key with push access allows an attacker to modify repository contents directly.
        - **Bypass controls**: Push access via deploy keys bypasses branch protection rules, merge request requirements, and code review processes.
        - **Audit trail gaps**: Changes pushed via deploy keys may not have the same audit trail as changes made through merge requests.
        - **Lateral movement**: Deploy keys are often stored in CI/CD systems, which may have weaker security controls.

        Configure deploy keys with read-only access and use personal access tokens or project access tokens for write operations that require authentication.
      remediation:
        - id: gitlab
          desc: |
            **Using GitLab UI**

            1. Navigate to your project in GitLab.
            2. Go to **Settings** > **Repository**.
            3. Expand the **Deploy keys** section.
            4. For each deploy key with write access (indicated by a pencil icon), click **Edit**.
            5. Uncheck **Grant write permissions to this key**.
            6. Click **Save changes**.

            For more details, see [Deploy keys](https://docs.gitlab.com/user/project/deploy_keys/).
        - id: terraform
          desc: |
            **Using Terraform**

            Ensure deploy keys are created without push access:

            ```hcl
            resource "gitlab_deploy_key" "example" {
              project  = gitlab_project.example.id
              title    = "example-deploy-key"
              key      = "ssh-ed25519 AAAA..."
              can_push = false
            }
            ```

            For more details, see the Terraform [GitLab Provider](https://registry.terraform.io/providers/gitlabhq/gitlab/latest/docs/resources/deploy_key).
        - id: cli
          desc: |
            **Using GitLab CLI**

            Update an existing deploy key to remove push access:

            ```bash
            glab api --method PUT projects/PROJECT_ID/deploy_keys/KEY_ID \
              -f can_push=false
            ```

            For more details, see the [Deploy keys API](https://docs.gitlab.com/api/deploy_keys.html#update-deploy-key).
    refs:
      - url: https://docs.gitlab.com/user/project/deploy_keys/
        title: GitLab Deploy Keys
      - url: https://docs.gitlab.com/user/project/settings/
        title: GitLab Project Settings
  - uid: mondoo-gitlab-security-continuous-vulnerability-scanning
    title: Ensure continuous vulnerability scanning is enabled
    impact: 80
    tags:
      compliance/soc2-2017: soc2-control-cc7-1-1
      compliance/iso-27001-2022: iso-27001-2022-a-8-8
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ra-5
      compliance/nist-sp-800-171: nist-sp-800-171--3-11-2
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-de-cm-8
    filters: gitlab.namespace.plan == "ultimate"
    mql: |
      gitlab.project.securitySettings.continuousVulnerabilityScansEnabled == true
    docs:
      desc: |
        This check ensures that continuous vulnerability scanning is enabled for the project. Continuous scanning monitors for newly disclosed vulnerabilities in your project's dependencies between pipeline runs. This feature requires a GitLab Ultimate subscription.

        **Why this matters**

        Without continuous vulnerability scanning, new vulnerabilities go undetected between pipeline runs:

        - **Detection gap**: Traditional pipeline-only scanning only checks for vulnerabilities when code is committed, not when new CVEs are published.
        - **Zero-day response**: Continuous scanning detects newly disclosed vulnerabilities in existing dependencies without requiring a new commit.
        - **Risk window**: The time between vulnerability disclosure and next pipeline run represents a window of undetected risk.
        - **Dependency monitoring**: Projects with infrequent commits may go weeks without a vulnerability scan.
        - **Compliance coverage**: Continuous monitoring aligns with compliance requirements for ongoing vulnerability management.

        Enable continuous vulnerability scanning to detect newly disclosed vulnerabilities in your project's dependencies as they are published.
      remediation:
        - id: gitlab
          desc: |
            **Using GitLab UI**

            1. Navigate to your project in GitLab.
            2. Go to **Secure** > **Security configuration**.
            3. Under **Continuous Vulnerability Scanning**, toggle the feature to **Enabled**.
            4. Alternatively, navigate to **Settings** > **Security & Compliance** and enable the feature.

            Continuous vulnerability scanning requires GitLab Ultimate.

            For more details, see [Continuous vulnerability scanning](https://docs.gitlab.com/user/application_security/continuous_vulnerability_scanning/).
        - id: terraform
          desc: |
            **Using Terraform**

            Enable continuous vulnerability scanning on the project:

            ```hcl
            resource "gitlab_project" "example" {
              name                              = "example"
              continuous_vulnerability_scans_enabled = true
            }
            ```

            Note: This setting requires a GitLab Ultimate subscription.

            For more details, see the Terraform [GitLab Provider](https://registry.terraform.io/providers/gitlabhq/gitlab/latest/docs/resources/project).
        - id: cli
          desc: |
            **Using GitLab CLI**

            ```bash
            glab api --method PUT projects/PROJECT_ID \
              -f continuous_vulnerability_scans_enabled=true
            ```

            Note: This setting requires a GitLab Ultimate subscription.

            For more details, see the [Projects API](https://docs.gitlab.com/api/projects.html#edit-project).
    refs:
      - url: https://docs.gitlab.com/user/application_security/continuous_vulnerability_scanning/
        title: GitLab Continuous Vulnerability Scanning
      - url: https://docs.gitlab.com/user/application_security/
        title: GitLab Application Security
