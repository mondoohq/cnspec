          mondoo.com/filter-icon: gitlab
      - uid: mondoo-gitlab-security-group-access-tokens-have-expiry-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gitlab-security-group-access-tokens-have-expiry-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gitlab-security-group-access-tokens-have-expiry-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that all active group access tokens have expiration dates configured. Group tokens provide access to all projects within the group, making non-expiring tokens an even greater risk.

        **Why this matters**

        Non-expiring group access tokens pose an elevated risk compared to project tokens:

        - **Broad access scope**: Group tokens grant access to all projects within the group, amplifying the impact of a compromise.
        - **Indefinite validity**: Without expiration, compromised tokens remain valid until manually discovered and revoked.
        - **Operational risk**: Teams that created tokens may leave the organization without transferring token management responsibility.
        - **Audit challenges**: Non-expiring tokens are harder to include in periodic access reviews.
        - **Compliance requirements**: Security frameworks require time-bound credentials with regular rotation.

        Set expiration dates on all group access tokens and implement a rotation schedule.
      audit: |
        ### Audit via Console

        1. In GitLab, navigate to your group.
        2. Go to **Settings** > **Access Tokens**.
        3. Review the **Expiration** column for every active token.

        A passing group has an expiration date set on every active token. A failing group has at least one active token with no expiration date.

        ### Audit via CLI

        List the expiration dates of every active group access token with the `glab` CLI:

        ```bash
        glab api "groups/GROUP_ID/access_tokens" | jq '.[] | select(.active == true) | {name: .name, expires_at: .expires_at}'
        ```

        A passing group returns a non-null `expires_at` for every active token. A failing group returns `null` for one or more active tokens.
      remediation:
        - id: gitlab
          desc: |
            To set expiration dates on group access tokens using the GitLab web UI:

            1. Navigate to your group in GitLab.
            2. Go to **Settings** > **Access Tokens**.
            3. Review all active tokens and note those without expiration dates.
            4. Revoke tokens that have no expiration date.
            5. Create replacement tokens with appropriate expiration dates of 90 days or less.
            6. Update any integrations using the old tokens.

            For more details, see [Group access tokens](https://docs.gitlab.com/user/group/settings/group_access_tokens.html).
        - id: cli
          desc: |
            To create a group access token with an expiration date using the `glab` CLI:

            ```bash
            glab api --method POST groups/GROUP_ID/access_tokens \
              -f name=example-token -f "scopes[]=api" \
              -f expires_at=YYYY-MM-DD -f access_level=30
            ```

            Revoke existing tokens without expiration and replace them with expiring tokens.

            For more details, see the [Group access tokens API](https://docs.gitlab.com/api/group_access_tokens.html).
        - id: terraform
          desc: |
            To create group access tokens with an expiration date using Terraform:

            ```hcl
            resource "gitlab_group_access_token" "example" {
              group      = gitlab_group.example.id
              name       = "example-token"
              expires_at = "YYYY-MM-DD"
              scopes     = ["api"]

              access_level = "maintainer"
            }
            ```

            For more details, see the Terraform [GitLab Provider](https://registry.terraform.io/providers/gitlabhq/gitlab/latest/docs/resources/group_access_token).
    refs:
      - url: https://docs.gitlab.com/user/group/settings/group_access_tokens.html
        title: GitLab Group Access Tokens
      - url: https://docs.gitlab.com/user/group/
        title: GitLab Group Settings
  - uid: mondoo-gitlab-security-group-access-tokens-have-expiry-gitlab
    filters: asset.platform == "gitlab-group"
    mql: |
      gitlab.group.accessTokens.where(active == true && revoked == false).all(expiresAt != null)
  - uid: mondoo-gitlab-security-group-access-tokens-have-expiry-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "gitlab_group_access_token")
    mql: |
      terraform.resources("gitlab_group_access_token").all(arguments["expires_at"] != empty)
  - uid: mondoo-gitlab-security-group-access-tokens-have-expiry-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "gitlab_group_access_token")
    mql: |
      terraform.plan.resourceChanges.where(type == "gitlab_group_access_token").all(change.after.expires_at != empty)
  - uid: mondoo-gitlab-security-group-access-tokens-have-expiry-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "gitlab_group_access_token")
    mql: |
      terraform.state.resources.where(type == "gitlab_group_access_token").all(values.expires_at != empty)
  - uid: mondoo-gitlab-security-deploy-keys-no-push-access
    title: Ensure project deploy keys do not have push access
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-5
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-1-1
    variants:
      - uid: mondoo-gitlab-security-deploy-keys-no-push-access-gitlab
        tags:
          mondoo.com/filter-title: GitLab Project
          mondoo.com/filter-icon: gitlab
      - uid: mondoo-gitlab-security-deploy-keys-no-push-access-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gitlab-security-deploy-keys-no-push-access-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gitlab-security-deploy-keys-no-push-access-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that deploy keys configured for the project do not have push (write) access. Deploy keys with push access can be used to modify repository contents, which violates the principle of least privilege.

        **Why this matters**

        Deploy keys with push access create unnecessary write access to repositories:

        - **Least privilege violation**: Deploy keys are typically used for read-only CI/CD operations; push access exceeds the required permission.
        - **Unauthorized code changes**: A compromised deploy key with push access allows an attacker to modify repository contents directly.
        - **Bypass controls**: Push access via deploy keys bypasses branch protection rules, merge request requirements, and code review processes.
        - **Audit trail gaps**: Changes pushed via deploy keys may not have the same audit trail as changes made through merge requests.
        - **Lateral movement**: Deploy keys are often stored in CI/CD systems, which may have weaker security controls.

        Configure deploy keys with read-only access and use personal access tokens or project access tokens for write operations that require authentication.
      audit: |
        ### Audit via Console

        1. In GitLab, navigate to your project.
        2. Go to **Settings** > **Repository**.
        3. Expand the **Deploy keys** section.
        4. Review each deploy key for write access, indicated by a pencil icon.

        A passing project has no deploy key with write access. A failing project has at least one deploy key with write access.

        ### Audit via CLI

        List the push access of every deploy key with the `glab` CLI:

        ```bash
        glab api "projects/PROJECT_ID/deploy_keys" | jq '.[] | {title: .title, can_push: .can_push}'
        ```

        A passing project returns `can_push: false` for every deploy key. A failing project returns `can_push: true` for one or more keys.
      remediation:
        - id: gitlab
          desc: |
            To remove push access from deploy keys using the GitLab web UI:

            1. Navigate to your project in GitLab.
            2. Go to **Settings** > **Repository**.
            3. Expand the **Deploy keys** section.
            4. For each deploy key with write access, indicated by a pencil icon, click **Edit**.
            5. Uncheck **Grant write permissions to this key**.
            6. Click **Save changes**.

            For more details, see [Deploy keys](https://docs.gitlab.com/user/project/deploy_keys/).
        - id: cli
          desc: |
            To remove push access from a deploy key using the `glab` CLI:

            ```bash
            glab api --method PUT projects/PROJECT_ID/deploy_keys/KEY_ID \
              -f can_push=false
            ```

            For more details, see the [Deploy keys API](https://docs.gitlab.com/api/deploy_keys.html#update-deploy-key).
        - id: terraform
          desc: |
            To create deploy keys without push access using Terraform:

            ```hcl
            resource "gitlab_deploy_key" "example" {
              project  = gitlab_project.example.id
              title    = "example-deploy-key"
              key      = "ssh-ed25519 AAAA..."
              can_push = false
            }
            ```

            For more details, see the Terraform [GitLab Provider](https://registry.terraform.io/providers/gitlabhq/gitlab/latest/docs/resources/deploy_key).
    refs:
      - url: https://docs.gitlab.com/user/project/deploy_keys/
        title: GitLab Deploy Keys
      - url: https://docs.gitlab.com/user/project/settings/
        title: GitLab Project Settings
  - uid: mondoo-gitlab-security-deploy-keys-no-push-access-gitlab
    filters: asset.platform == "gitlab-project"
    mql: |
      gitlab.project.deployKeys.all(canPush == false)
  - uid: mondoo-gitlab-security-deploy-keys-no-push-access-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "gitlab_deploy_key")
    mql: |
      terraform.resources("gitlab_deploy_key").all(arguments["can_push"] != true)
  - uid: mondoo-gitlab-security-deploy-keys-no-push-access-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "gitlab_deploy_key")
    mql: |
      terraform.plan.resourceChanges.where(type == "gitlab_deploy_key").all(change.after.can_push != true)
  - uid: mondoo-gitlab-security-deploy-keys-no-push-access-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "gitlab_deploy_key")
    mql: |
      terraform.state.resources.where(type == "gitlab_deploy_key").all(values.can_push != true)
  # No Terraform variants: the gitlabhq/gitlab provider (v19.x) does not expose
  # continuous_vulnerability_scans_enabled on any resource — there is no
  # gitlab_project_security_setting resource and no equivalent argument on gitlab_project.
  # The setting can be configured via the GitLab UI, the GraphQL API, or by attaching a
  # security policy project; none of these surface as a Terraform-declared field that an
  # HCL/plan/state variant could evaluate.
  - uid: mondoo-gitlab-security-continuous-vulnerability-scanning
    title: Ensure continuous vulnerability scanning is enabled
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-tvm-03
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-8
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-de-cm-8
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ra-5
      compliance/nist-sp-800-171: nist-sp-800-171--3-11-2
      compliance/pci-dss-4: pcidss-requirement-6-3-3
      compliance/soc2-2017: soc2-control-cc7-1-1
      compliance/vda-isa-5: vda-isa-5-5-2-1
    filters: gitlab.namespace.plan == "ultimate"
    mql: |
      gitlab.project.securitySettings.continuousVulnerabilityScansEnabled == true
    docs:
      desc: |
        This check ensures that continuous vulnerability scanning is enabled for the project. Continuous scanning monitors for newly disclosed vulnerabilities in your project's dependencies between pipeline runs. This feature requires a GitLab Ultimate subscription.

        **Why this matters**

        Without continuous vulnerability scanning, new vulnerabilities go undetected between pipeline runs:

        - **Detection gap**: Traditional pipeline-only scanning only checks for vulnerabilities when code is committed, not when new CVEs are published.
        - **Zero-day response**: Continuous scanning detects newly disclosed vulnerabilities in existing dependencies without requiring a new commit.
        - **Risk window**: The time between vulnerability disclosure and next pipeline run represents a window of undetected risk.
        - **Dependency monitoring**: Projects with infrequent commits may go weeks without a vulnerability scan.
        - **Compliance coverage**: Continuous monitoring aligns with compliance requirements for ongoing vulnerability management.

        Enable continuous vulnerability scanning to detect newly disclosed vulnerabilities in your project's dependencies as they are published.
      audit: |
        ### Audit via Console

        1. In GitLab, navigate to your project.
        2. Go to **Secure** > **Security configuration**.
        3. Check the state of the **Continuous Vulnerability Scanning** toggle.

        A passing project has **Continuous Vulnerability Scanning** enabled. A failing project has it disabled.

        ### Audit via CLI

        Query the security settings with the `glab` CLI:

        ```bash
        glab api projects/PROJECT_ID/security_settings | jq '.continuous_vulnerability_scans_enabled'
        ```

        A passing project returns `true`. A failing project returns `false`.
      remediation:
        - id: gitlab
          desc: |
            To enable continuous vulnerability scanning using the GitLab web UI:

            1. Navigate to your project in GitLab.
            2. Go to **Secure** > **Security configuration**.
            3. Under **Continuous Vulnerability Scanning**, turn on the toggle.

            Continuous vulnerability scanning requires GitLab Ultimate. For results to appear, a dependency scanning job must also run at least once on the default branch so GitLab has an SBOM to compare against new security advisories.

            For more details, see [Continuous vulnerability scanning](https://docs.gitlab.com/user/application_security/continuous_vulnerability_scanning/).
        - id: cli
          desc: |
            To enable continuous vulnerability scanning using the `glab` CLI:

            The REST API does not support updating this setting, so use the GraphQL API. Replace GROUP/PROJECT with the full path of your project:

            ```bash
            glab api graphql -f query='
              mutation {
                projectSetContinuousVulnerabilityScanning(
                  input: { projectPath: "GROUP/PROJECT", enable: true }
                ) {
                  continuousVulnerabilityScanningEnabled
                  errors
                }
              }'
            ```

            This setting requires a GitLab Ultimate subscription.

            For more details, see the [GraphQL API reference](https://docs.gitlab.com/api/graphql/reference/#mutationprojectsetcontinuousvulnerabilityscanning).
        # No Terraform remediation: the GitLab Terraform provider exposes no resource for the project security setting that toggles continuous vulnerability scanning.
    refs:
      - url: https://docs.gitlab.com/user/application_security/continuous_vulnerability_scanning/
        title: GitLab Continuous Vulnerability Scanning
      - url: https://docs.gitlab.com/user/application_security/
        title: GitLab Application Security
  - uid: mondoo-gitlab-security-push-rule-prevent-secrets
    title: Ensure push rules reject files containing secrets
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-dsp-17
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-12
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ds-5
      compliance/nist-csf-2: false
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-5
      compliance/nist-sp-800-171: false
      compliance/pci-dss-4: pcidss-requirement-8-6-2
      compliance/soc2-2017: false
      compliance/vda-isa-5: false
    variants:
      - uid: mondoo-gitlab-security-push-rule-prevent-secrets-gitlab
        tags:
          mondoo.com/filter-title: GitLab Project
          mondoo.com/filter-icon: gitlab
      - uid: mondoo-gitlab-security-push-rule-prevent-secrets-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gitlab-security-push-rule-prevent-secrets-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gitlab-security-push-rule-prevent-secrets-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that the project's push rules block commits that add files matching well-known secret patterns, such as private keys and credential files. Secret prevention on push stops sensitive material from ever entering Git history. Push rules require a GitLab Premium or Ultimate subscription.

        **Why this matters**

        Secrets committed to a repository are difficult to fully remove and are frequently harvested by attackers:

        - **Permanent exposure**: Once a secret is committed, it remains in Git history even after deletion, and anyone with repository access can recover it.
        - **Automated harvesting**: Attackers continuously scan repositories and forks for leaked credentials, often within minutes of a push.
        - **Supply chain compromise**: Leaked CI/CD or cloud credentials give attackers a foothold to tamper with builds and deployments.
        - **Broad blast radius**: A single leaked deploy key or API token can expose infrastructure far beyond the repository it was committed to.

        **Risk mitigation**

        - **Block at the source**: Rejecting secrets on push prevents the credential from ever reaching the remote, avoiding costly history rewrites and rotation.
        - **Defense in depth**: Combine push-rule secret prevention with secret push protection and post-commit secret detection scanning.
      audit: |
        ### Audit via Console

        1. In GitLab, navigate to your project.
        2. Go to **Settings** > **Repository**.
        3. Expand the **Push rules** section.
        4. Check the state of **Prevent pushing secret files**.

        A passing project has **Prevent pushing secret files** checked. A failing project has it unchecked.

        ### Audit via CLI

        Query the push rule with the `glab` CLI:

        ```bash
        glab api projects/PROJECT_ID/push_rule | jq '.prevent_secrets'
        ```

        A passing project returns `true`. A failing project returns `false` or has no push rule configured.
      remediation:
        - id: gitlab
          desc: |
            Push rules require a GitLab Premium or Ultimate subscription. On the Free tier the **Push rules** section is not available, so this control cannot be configured there.

            To reject files containing secrets using the GitLab web UI:

            1. Navigate to your project in GitLab.
            2. Go to **Settings** > **Repository**.
            3. Expand the **Push rules** section.
            4. Check **Prevent pushing secret files**.
            5. Click **Save push rules**.

            For more details, see [Push rules](https://docs.gitlab.com/user/project/repository/push_rules/).
        - id: cli
          desc: |
            Push rules require a GitLab Premium or Ultimate subscription. The command below has no effect on the Free tier, where this control is unavailable.

            To reject files containing secrets using the `glab` CLI:

            ```bash
            glab api --method PUT projects/PROJECT_ID/push_rule \
              -f prevent_secrets=true
            ```

            For more details, see the [Push rules API](https://docs.gitlab.com/api/projects.html#edit-project-push-rule).
        - id: terraform
          desc: |
            To reject files containing secrets using Terraform:

            ```hcl
            resource "gitlab_project_push_rules" "example" {
              project         = gitlab_project.example.id
              prevent_secrets = true
            }
            ```

            For more details, see the Terraform [GitLab Provider](https://registry.terraform.io/providers/gitlabhq/gitlab/latest/docs/resources/project_push_rules).
    refs:
      - url: https://docs.gitlab.com/user/project/repository/push_rules/
        title: GitLab Push Rules
      - url: https://docs.gitlab.com/user/application_security/secret_detection/
        title: GitLab Secret Detection
  - uid: mondoo-gitlab-security-push-rule-prevent-secrets-gitlab
    filters: asset.platform == "gitlab-project" && gitlab.namespace.plan != "free"
    mql: |
      gitlab.project.pushRules.preventSecrets == true
  - uid: mondoo-gitlab-security-push-rule-prevent-secrets-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "gitlab_project_push_rules")
    mql: |
      terraform.resources("gitlab_project_push_rules").all(arguments["prevent_secrets"] == true)
  - uid: mondoo-gitlab-security-push-rule-prevent-secrets-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "gitlab_project_push_rules")
    mql: |
      terraform.plan.resourceChanges.where(type == "gitlab_project_push_rules").all(change.after.prevent_secrets == true)
  - uid: mondoo-gitlab-security-push-rule-prevent-secrets-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "gitlab_project_push_rules")
    mql: |
      terraform.state.resources.where(type == "gitlab_project_push_rules").all(values.prevent_secrets == true)
  - uid: mondoo-gitlab-security-push-rule-reject-unsigned-commits
    title: Ensure push rules reject unsigned commits
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: false
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-c-1-integrity
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-2
      compliance/nist-csf-2: nist-csf-2-pr-ps-06
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-1
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc6-8-2
      compliance/vda-isa-5: false
    variants:
      - uid: mondoo-gitlab-security-push-rule-reject-unsigned-commits-gitlab
        tags:
          mondoo.com/filter-title: GitLab Project
          mondoo.com/filter-icon: gitlab
      - uid: mondoo-gitlab-security-push-rule-reject-unsigned-commits-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gitlab-security-push-rule-reject-unsigned-commits-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gitlab-security-push-rule-reject-unsigned-commits-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that the project's push rules reject commits that are not signed with a verified GPG or SSH key. Requiring signed commits establishes cryptographic proof of each commit's author. Push rules require a GitLab Premium or Ultimate subscription.

        **Why this matters**

        Unsigned commits can be attributed to any name and email, making commit authorship trivial to forge:

        - **Author spoofing**: Without signatures, an attacker can craft commits that appear to come from a trusted maintainer.
        - **Non-repudiation**: Signed commits provide verifiable evidence of who authored a change, which is essential for incident investigation.
        - **Supply chain integrity**: Enforcing signatures raises the bar for injecting malicious commits under a stolen or spoofed identity.
        - **Tamper evidence**: A signature is invalidated if commit contents are altered after signing, exposing history rewrites.

        **Risk mitigation**

        - **Require verified signatures**: Reject unsigned commits so only cryptographically attributable changes enter the repository.
        - **Distribute keys**: Ensure contributors register GPG or SSH signing keys with GitLab so their commits verify.
      audit: |
        ### Audit via Console

        1. In GitLab, navigate to your project.
        2. Go to **Settings** > **Repository**.
        3. Expand the **Push rules** section.
        4. Check the state of **Reject unsigned commits**.

        A passing project has **Reject unsigned commits** checked. A failing project has it unchecked.

        ### Audit via CLI

        Query the push rule with the `glab` CLI:

        ```bash
        glab api projects/PROJECT_ID/push_rule | jq '.reject_unsigned_commits'
        ```

        A passing project returns `true`. A failing project returns `false` or has no push rule configured.
      remediation:
        - id: gitlab
          desc: |
            Push rules require a GitLab Premium or Ultimate subscription. On the Free tier the **Push rules** section is not available, so this control cannot be configured there.

            To reject unsigned commits using the GitLab web UI:

            1. Navigate to your project in GitLab.
            2. Go to **Settings** > **Repository**.
            3. Expand the **Push rules** section.
            4. Check **Reject unsigned commits**.
            5. Click **Save push rules**.

