policies:
  - uid: mondoo-gitlab-security
    name: Mondoo GitLab Security
    version: 1.9.0
    license: BUSL-1.1
    tags:
      mondoo.com/category: security
      mondoo.com/platform: gitlab
    require:
      - provider: gitlab
    authors:
      - name: Mondoo, Inc.
        email: hello@mondoo.com
    summary: Secure GitLab groups, projects, and CI/CD pipelines
    docs:
      desc: |
        The Mondoo GitLab Security policy identifies critical misconfigurations in GitLab groups and projects that could expose your software development lifecycle to supply chain attacks, unauthorized code changes, and source code theft. This policy helps organizations detect and remediate weaknesses before attackers can exploit them to access private repositories, inject malicious code, or exfiltrate sensitive data and secrets.

        This policy provides security checks across key GitLab areas:

        - Group and project visibility settings
        - Two-factor authentication requirements
        - Member access and role assignments
        - Branch protection and merge request controls
        - Repository sharing and forking restrictions

        Learn more about scanning GitLab in the [cnspec GitLab documentation](https://mondoo.com/docs/cnspec/saas/gitlab).

        Have suggestions for new checks in this policy? Visit our [cnspec repository](https://github.com/mondoohq/cnspec).
    groups:
      - title: Group
        checks:
          - uid: mondoo-gitlab-security-private-group
          - uid: mondoo-gitlab-security-private-projects
          - uid: mondoo-gitlab-security-require-two-factor
          - uid: mondoo-gitlab-security-group-prevent-forking-outside
          - uid: mondoo-gitlab-security-group-access-tokens-have-expiry
      - title: Project
        checks:
          - uid: mondoo-gitlab-security-private-project
      - title: Merge Request Security
        checks:
          - uid: mondoo-gitlab-security-approvals-required
          - uid: mondoo-gitlab-security-no-author-approval
          - uid: mondoo-gitlab-security-reset-approvals-on-push
          - uid: mondoo-gitlab-security-no-committer-approval
          - uid: mondoo-gitlab-security-pipeline-must-succeed
          - uid: mondoo-gitlab-security-no-merge-on-skipped-pipeline
          - uid: mondoo-gitlab-security-discussions-resolved
      - title: Branch Protection
        checks:
          - uid: mondoo-gitlab-security-no-force-push-default-branch
      - title: Push Rules
        checks:
          - uid: mondoo-gitlab-security-push-rule-prevent-secrets
          - uid: mondoo-gitlab-security-push-rule-reject-unsigned-commits
          - uid: mondoo-gitlab-security-push-rule-committer-check
          - uid: mondoo-gitlab-security-push-rule-member-check
      - title: CI/CD Security
        checks:
          - uid: mondoo-gitlab-security-ci-variables-masked
          - uid: mondoo-gitlab-security-ci-variables-protected
          - uid: mondoo-gitlab-security-job-token-scope-enabled
          - uid: mondoo-gitlab-security-webhook-ssl-verification
          - uid: mondoo-gitlab-security-no-public-jobs
      - title: Token and Key Security
        checks:
          - uid: mondoo-gitlab-security-project-access-tokens-have-expiry
          - uid: mondoo-gitlab-security-deploy-keys-no-push-access
      - title: Security Scanning
        checks:
          - uid: mondoo-gitlab-security-continuous-vulnerability-scanning
          - uid: mondoo-gitlab-security-secret-push-protection
    scoring_system: highest impact
queries:
  - uid: mondoo-gitlab-security-private-group
    title: Ensure the group is private
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-1-1
    variants:
      - uid: mondoo-gitlab-security-private-group-gitlab
        tags:
          mondoo.com/filter-title: GitLab Group
          mondoo.com/filter-icon: gitlab
      - uid: mondoo-gitlab-security-private-group-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gitlab-security-private-group-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gitlab-security-private-group-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check verifies that the GitLab group visibility is set to private or internal, not public.

        **Why this matters**

        Public GitLab groups expose all contained projects and their contents to anyone on the internet:

          - **Source code exposure**: Public groups allow anyone to clone repositories and view proprietary source code.
          - **Secret leakage**: Hardcoded credentials, API keys, or configuration files may be exposed in public repositories.
          - **Supply chain attacks**: Public visibility enables attackers to analyze code for vulnerabilities before they're patched.
          - **Intellectual property theft**: Competitors or malicious actors can access and copy proprietary algorithms and business logic.
          - **Reconnaissance**: Public groups provide attackers with information about your technology stack and infrastructure.

        Set group visibility to private unless there is an explicit business requirement for public access, and regularly audit group visibility settings.
      audit: |
        ### Audit via Console

        1. In GitLab, navigate to your group.
        2. Go to **Settings** > **General**.
        3. Expand the **Naming, description, visibility** section.
        4. Note the selected **Visibility level**.

        A passing group has the visibility level set to **Private** or **Internal**. A failing group has the visibility level set to **Public**.

        ### Audit via CLI

        Query the group visibility with the `glab` CLI:

        ```bash
        glab api groups/GROUP_ID | jq '.visibility'
        ```

        A passing group returns `private` or `internal`. A failing group returns `public`.
      remediation:
        - id: gitlab
          desc: |
            To make the visibility of a GitLab group private using the GitLab web UI:

            1. In GitLab, navigate to your group.
            2. Go to **Settings** > **General**.
            3. Expand the **Naming, description, visibility** section.
            4. Under **Visibility level**, select **Private**.
            5. Click **Save changes**.

            GitLab rejects the change while any project or subgroup in the group has a higher visibility level. Change those to private or internal first.

            For more details, see [Change group visibility](https://docs.gitlab.com/user/public_access.html#change-group-visibility).
        - id: cli
          desc: |
            To make the visibility of a GitLab group private using the `glab` CLI:

            ```bash
            glab api --method PUT groups/GROUP_ID -f visibility=private
            ```

            The request fails while any project or subgroup in the group has a higher visibility level. Change those to private or internal first.

            For more details, see the [Groups API](https://docs.gitlab.com/api/groups.html#update-group).
        - id: terraform
          desc: |
            To make the visibility of a GitLab group private using Terraform:

            ```hcl
            resource "gitlab_group" "example" {
              name             = "example"
              path             = "example"
              visibility_level = "private"
            }
            ```

            For more details, see the Terraform [GitLab Provider](https://registry.terraform.io/providers/gitlabhq/gitlab/latest/docs/resources/group).
    refs:
      - url: https://docs.gitlab.com/user/group/
        title: GitLab Group Settings
      - url: https://docs.gitlab.com/administration/settings/visibility_and_access_controls.html
        title: GitLab Visibility and Access Controls
  - uid: mondoo-gitlab-security-private-group-gitlab
    filters: asset.platform == "gitlab-group"
    mql: gitlab.group.visibility != "public"
  - uid: mondoo-gitlab-security-private-group-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "gitlab_group")
    mql: |
      terraform.resources("gitlab_group").all(arguments["visibility_level"] != "public")
  - uid: mondoo-gitlab-security-private-group-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "gitlab_group")
    mql: |
      terraform.plan.resourceChanges.where(type == "gitlab_group").all(change.after.visibility_level != "public")
  - uid: mondoo-gitlab-security-private-group-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "gitlab_group")
    mql: |
      terraform.state.resources.where(type == "gitlab_group").all(values.visibility_level != "public")
  - uid: mondoo-gitlab-security-require-two-factor
    title: Ensure two-factor authentication is required
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-j
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-3
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-3
    variants:
      - uid: mondoo-gitlab-security-require-two-factor-gitlab
        tags:
          mondoo.com/filter-title: GitLab Group
          mondoo.com/filter-icon: gitlab
      - uid: mondoo-gitlab-security-require-two-factor-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gitlab-security-require-two-factor-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gitlab-security-require-two-factor-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check verifies that two-factor authentication is required for all members of the GitLab group.

        **Why this matters**

        GitLab accounts are high-value targets for attackers seeking to compromise software supply chains:

          - **Source code tampering**: Compromised accounts can push malicious code that gets deployed to production.
          - **Credential theft protection**: Even if passwords are phished or leaked, attackers cannot access accounts without the second factor.
          - **CI/CD pipeline access**: Attackers with GitLab access can modify pipelines to inject malicious build steps.
          - **Secrets and variables**: GitLab projects often contain CI/CD variables with deployment credentials and API keys.
          - **Supply chain attacks**: Software supply chain compromises often begin with compromised developer accounts.

        Require 2FA at the group level to ensure all members are protected, and set a reasonable grace period for compliance.
      audit: |
        ### Audit via Console

        1. In GitLab, navigate to your group.
        2. Go to **Settings** > **General**.
        3. Expand the **Permissions and group features** section.
        4. Check whether **All users in this group must set up two-factor authentication** is selected.

        A passing group has **All users in this group must set up two-factor authentication** enabled. A failing group has it disabled.

        ### Audit via CLI

        Query the two-factor requirement with the `glab` CLI:

        ```bash
        glab api groups/GROUP_ID | jq '.require_two_factor_authentication'
        ```

        A passing group returns `true`. A failing group returns `false`.
      remediation:
        - id: gitlab
          desc: |
            To require two-factor authentication for all users in a GitLab group using the GitLab web UI:

            1. In GitLab, navigate to your group.
            2. Go to **Settings** > **General**.
            3. Expand the **Permissions and group features** section.
            4. Check **All users in this group must set up two-factor authentication**.
            5. Optionally, set **Delay 2FA enforcement (hours)** to give members a grace period.
            6. Click **Save changes**.

            For more details, see [Enforce two-factor authentication](https://docs.gitlab.com/security/two_factor_authentication/).
        - id: cli
          desc: |
            To require two-factor authentication for all users in a GitLab group using the `glab` CLI:

            ```bash
            glab api --method PUT groups/GROUP_ID \
              -f require_two_factor_authentication=true \
              -f two_factor_grace_period=48
            ```

            For more details, see the [Groups API](https://docs.gitlab.com/api/groups.html#update-group).
        - id: terraform
          desc: |
            To require two-factor authentication for all users in a GitLab group using Terraform:

            ```hcl
            resource "gitlab_group" "example" {
              name                              = "example"
              path                              = "example"
              require_two_factor_authentication = true
            }
            ```

            For more details, see the Terraform [GitLab Provider](https://registry.terraform.io/providers/gitlabhq/gitlab/latest/docs/resources/group).
    refs:
      - url: https://docs.gitlab.com/user/profile/account/two_factor_authentication.html
        title: GitLab Two-Factor Authentication
      - url: https://docs.gitlab.com/user/group/
        title: GitLab Group Settings
  - uid: mondoo-gitlab-security-require-two-factor-gitlab
    filters: asset.platform == "gitlab-group"
    mql: gitlab.group.requireTwoFactorAuthentication == true
  - uid: mondoo-gitlab-security-require-two-factor-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "gitlab_group")
    mql: |
      terraform.resources("gitlab_group").all(arguments["require_two_factor_authentication"] == true)
  - uid: mondoo-gitlab-security-require-two-factor-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "gitlab_group")
    mql: |
      terraform.plan.resourceChanges.where(type == "gitlab_group").all(change.after.require_two_factor_authentication == true)
  - uid: mondoo-gitlab-security-require-two-factor-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "gitlab_group")
    mql: |
      terraform.state.resources.where(type == "gitlab_group").all(values.require_two_factor_authentication == true)
  - uid: mondoo-gitlab-security-private-projects
    title: Ensure all projects are private
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-1-1
    variants:
      - uid: mondoo-gitlab-security-private-projects-gitlab
        tags:
          mondoo.com/filter-title: GitLab Group
          mondoo.com/filter-icon: gitlab
      - uid: mondoo-gitlab-security-private-projects-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gitlab-security-private-projects-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gitlab-security-private-projects-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check verifies that no projects within the GitLab group have public visibility.

        **Why this matters**

        Even when a group is private, individual projects can be set to public, exposing their contents:

          - **Inconsistent security**: Public projects in an otherwise private group create gaps in access control.
          - **Accidental exposure**: Developers may inadvertently set projects to public without understanding the implications.
          - **Data leakage**: Public projects expose code, issues, merge requests, and wiki content to the internet.
          - **Configuration drift**: Over time, project visibility settings may deviate from intended security posture.
          - **Compliance violations**: Regulatory requirements may prohibit public exposure of certain types of code or data.

        Enforce private visibility as the default for new projects and regularly audit all projects for visibility settings.
      audit: |
        ### Audit via Console

        1. In GitLab, navigate to your group.
        2. Go to the group **Projects** list.
        3. Review the visibility badge shown next to each project.

        A passing group has no project with the **Public** visibility badge. A failing group has at least one project marked **Public**.

        ### Audit via CLI

        List the visibility of every project in the group with the `glab` CLI:

        ```bash
        glab api "groups/GROUP_ID/projects?per_page=100" | jq '.[] | {path: .path, visibility: .visibility}'
        ```

        A passing group returns `private` or `internal` for every project. A failing group returns `public` for one or more projects.
      remediation:
        - id: gitlab
          desc: |
            To set every project in the group to private using the GitLab web UI:

            This check fails when any existing project in the group has public visibility. You must change each public project to private individually.

            **Step 1: Change existing public projects to private**

            For each public project in the group:

            1. In GitLab, navigate to the project.
            2. Go to **Settings** > **General**.
            3. Expand the **Visibility, project features, permissions** section.
            4. Under **Project visibility**, select **Private**.
            5. Click **Save changes**.

            **Step 2: Prevent future public projects**

            Setting the group visibility to **Private** prevents any project in the group from being public, because a project cannot be more visible than its group:

            1. In GitLab, navigate to your group.
            2. Go to **Settings** > **General**.
            3. Expand the **Naming, description, visibility** section.
            4. Under **Visibility level**, select **Private**.
            5. Click **Save changes**.

            On self-managed instances, administrators can also set **Default project visibility** to **Private** under **Admin area** > **Settings** > **General** > **Visibility and access controls**.

            For more details, see [Change project visibility](https://docs.gitlab.com/user/public_access.html#change-project-visibility).
        - id: cli
          desc: |
            To set a public project to private using the `glab` CLI:

            Update each public project to private:

            ```bash
            glab api --method PUT projects/PROJECT_ID -f visibility=private
            ```

            For more details, see the [Projects API](https://docs.gitlab.com/api/projects.html#edit-project).
        - id: terraform
          desc: |
            To set every project in the group to private using Terraform:

            This check fails when any existing project has public visibility. You must set each project's visibility to private.

            To make individual projects private:

            ```hcl
            resource "gitlab_project" "example" {
              name             = "example"
              path             = "example"
              visibility_level = "private"
              namespace_id     = gitlab_group.example.id
            }
            ```

            To make the group private so that no project inside it can be public:

            ```hcl
            resource "gitlab_group" "example" {
              name             = "example"
              path             = "example"
              visibility_level = "private"
            }
            ```

            For more details, see the Terraform [GitLab Provider](https://registry.terraform.io/providers/gitlabhq/gitlab/latest/docs/resources/project).
    refs:
      - url: https://docs.gitlab.com/administration/settings/visibility_and_access_controls.html
        title: GitLab Visibility and Access Controls
      - url: https://docs.gitlab.com/user/project/settings/
        title: GitLab Project Settings
  - uid: mondoo-gitlab-security-private-projects-gitlab
    filters: asset.platform == "gitlab-group"
    mql: gitlab.group.projects.none(visibility == "public")
  - uid: mondoo-gitlab-security-private-projects-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "gitlab_project")
    mql: |
      terraform.resources("gitlab_project").all(arguments["visibility_level"] != "public")
  - uid: mondoo-gitlab-security-private-projects-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "gitlab_project")
    mql: |
      terraform.plan.resourceChanges.where(type == "gitlab_project").all(change.after.visibility_level != "public")
  - uid: mondoo-gitlab-security-private-projects-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "gitlab_project")
    mql: |
      terraform.state.resources.where(type == "gitlab_project").all(values.visibility_level != "public")
  - uid: mondoo-gitlab-security-private-project
    title: Ensure the project is private
    impact: 90
    tags:
