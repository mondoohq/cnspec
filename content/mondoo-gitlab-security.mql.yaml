  - uid: mondoo-gitlab-security-project-access-tokens-have-expiry
    title: Ensure project access tokens have expiration dates
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-j
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-4
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-1
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-3
    variants:
      - uid: mondoo-gitlab-security-project-access-tokens-have-expiry-gitlab
        tags:
          mondoo.com/filter-title: GitLab Project
          mondoo.com/filter-icon: gitlab
      - uid: mondoo-gitlab-security-project-access-tokens-have-expiry-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gitlab-security-project-access-tokens-have-expiry-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gitlab-security-project-access-tokens-have-expiry-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that all active project access tokens have expiration dates configured. Tokens without expiration dates provide indefinite access to the project, increasing the risk of unauthorized access if the token is compromised.

        **Why this matters**

        Non-expiring access tokens create persistent security risks:

        - **Indefinite access**: Tokens without expiration dates provide permanent access, even if the original need has passed.
        - **Credential sprawl**: Over time, non-expiring tokens accumulate and become difficult to track and manage.
        - **Compromised token risk**: If a non-expiring token is leaked, it remains valid until manually revoked.
        - **Compliance violations**: Security frameworks require periodic credential rotation and expiration enforcement.
        - **Least privilege**: Non-expiring tokens violate the principle of least privilege by granting access beyond what is needed.

        Set expiration dates on all project access tokens and implement a process to rotate them before expiration.
      audit: |
        ### Audit via Console

        1. In GitLab, navigate to your project.
        2. Go to **Settings** > **Access Tokens**.
        3. Review the **Expiration** column for every active token.

        A passing project has an expiration date set on every active token. A failing project has at least one active token with no expiration date.

        ### Audit via CLI

        List the expiration dates of every active project access token with the `glab` CLI:

        ```bash
        glab api "projects/PROJECT_ID/access_tokens" | jq '.[] | select(.active == true) | {name: .name, expires_at: .expires_at}'
        ```

        A passing project returns a non-null `expires_at` for every active token. A failing project returns `null` for one or more active tokens.
      remediation:
        - id: gitlab
          desc: |
            To set expiration dates on project access tokens using the GitLab web UI:

            1. Navigate to your project in GitLab.
            2. Go to **Settings** > **Access Tokens**.
            3. Review all active tokens and note those without expiration dates.
            4. Revoke tokens that have no expiration date.
            5. Create replacement tokens with appropriate expiration dates of 90 days or less.
            6. Update any integrations using the old tokens.

            For more details, see [Project access tokens](https://docs.gitlab.com/user/project/settings/project_access_tokens.html).
        - id: cli
          desc: |
            To create a project access token with an expiration date using the `glab` CLI:

            ```bash
            glab api --method POST projects/PROJECT_ID/access_tokens \
              -f name=example-token -f "scopes[]=api" \
              -f expires_at=YYYY-MM-DD -f access_level=30
            ```

            Revoke existing tokens without expiration and replace them with expiring tokens.

            For more details, see the [Project access tokens API](https://docs.gitlab.com/api/project_access_tokens.html).
        - id: terraform
          desc: |
            To create project access tokens with an expiration date using Terraform:

            ```hcl
            resource "gitlab_project_access_token" "example" {
              project    = gitlab_project.example.id
              name       = "example-token"
              expires_at = "YYYY-MM-DD"
              scopes     = ["api"]

              access_level = "maintainer"
            }
            ```

            For more details, see the Terraform [GitLab Provider](https://registry.terraform.io/providers/gitlabhq/gitlab/latest/docs/resources/project_access_token).
    refs:
      - url: https://docs.gitlab.com/user/project/settings/project_access_tokens.html
        title: GitLab Project Access Tokens
      - url: https://docs.gitlab.com/user/project/settings/
        title: GitLab Project Settings
  - uid: mondoo-gitlab-security-project-access-tokens-have-expiry-gitlab
    filters: asset.platform == "gitlab-project"
    mql: |
      gitlab.project.accessTokens.where(active == true && revoked == false).all(expiresAt != null)
  - uid: mondoo-gitlab-security-project-access-tokens-have-expiry-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "gitlab_project_access_token")
    mql: |
      terraform.resources("gitlab_project_access_token").all(arguments["expires_at"] != empty)
  - uid: mondoo-gitlab-security-project-access-tokens-have-expiry-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "gitlab_project_access_token")
    mql: |
      terraform.plan.resourceChanges.where(type == "gitlab_project_access_token").all(change.after.expires_at != empty)
  - uid: mondoo-gitlab-security-project-access-tokens-have-expiry-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "gitlab_project_access_token")
    mql: |
      terraform.state.resources.where(type == "gitlab_project_access_token").all(values.expires_at != empty)
