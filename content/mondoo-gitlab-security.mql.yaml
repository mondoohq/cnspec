      - uid: mondoo-gitlab-security-no-force-push-default-branch-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-gitlab-security-no-force-push-default-branch-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that force push is disabled on the default (protected) branch. Force pushing allows rewriting Git history, which can be used to remove audit trails, overwrite security fixes, or inject malicious code.

        **Why this matters**

        Force push to the default branch is a high-severity risk:

          - An attacker can rewrite Git history to inject malicious code that appears to have always been present.
          - Force pushing can remove commits that contain security fixes or audit trails.
          - History rewriting makes incident investigation and forensic analysis extremely difficult.
          - Accidental force pushes can cause data loss and disrupt development workflows.

        **Risk mitigation**

          - Disable force push on all protected branches, especially the default branch.
          - Use branch protection rules to enforce this at the project level.
          - Monitor for any changes to branch protection settings.
      audit: |
        ### Audit via Console

        1. In GitLab, navigate to your project.
        2. Go to **Settings** > **Repository**.
        3. Expand the **Protected branches** section.
        4. For the default branch, check the **Allowed to force push** column.

        A passing project has **Allowed to force push** disabled for the default branch. A failing project has it enabled.

        ### Audit via CLI

        Query the force-push setting for the default protected branch with the `glab` CLI. Replace BRANCH_NAME with the name of the project's default branch, because not every project uses `main` and querying the wrong name returns a misleading 404:

        ```bash
        glab api projects/PROJECT_ID/protected_branches/BRANCH_NAME | jq '.allow_force_push'
        ```

        A passing project returns `false`. A failing project returns `true`.
      remediation:
        - id: gitlab
          desc: |
            To disable force push on the default branch using the GitLab web UI:

            1. Navigate to your project.
            2. Go to **Settings** > **Repository**.
            3. Expand the **Protected branches** section.
            4. For the default branch, ensure **Allowed to force push** is disabled.
            5. Click **Protect** or **Save changes**.

            For more details, see [Protected branches](https://docs.gitlab.com/user/project/protected_branches.html).
        - id: cli
          desc: |
            To disable force push on the default branch using the `glab` CLI:

            If the default branch is already protected, update its protection. Replace BRANCH_NAME with the name of the project's default branch:

            ```bash
            glab api --method PATCH projects/PROJECT_ID/protected_branches/BRANCH_NAME \
              -f allow_force_push=false
            ```

            If the default branch is not protected yet, protect it with force push disabled:

            ```bash
            glab api --method POST projects/PROJECT_ID/protected_branches \
              -f name=BRANCH_NAME -f allow_force_push=false
            ```

            For more details, see the [Protected branches API](https://docs.gitlab.com/api/protected_branches.html#update-a-protected-branch).
        - id: terraform
          desc: |
            To disable force push on the default branch using Terraform:

            ```hcl
            resource "gitlab_branch_protection" "default" {
              project            = gitlab_project.example.id
              branch             = "main"
              allow_force_push   = false
              push_access_level  = "maintainer"
              merge_access_level = "maintainer"
            }
            ```

            For more details, see the Terraform [GitLab Provider](https://registry.terraform.io/providers/gitlabhq/gitlab/latest/docs/resources/branch_protection).
    refs:
      - url: https://docs.gitlab.com/user/project/settings/
        title: GitLab Project Settings
      - url: https://docs.gitlab.com/administration/settings/visibility_and_access_controls.html
        title: GitLab Visibility and Access Controls
  - uid: mondoo-gitlab-security-no-force-push-default-branch-gitlab
    filters: asset.platform == "gitlab-project"
    mql: |
      gitlab.project.protectedBranches.where(defaultBranch == true).all(allowForcePush == false)
  - uid: mondoo-gitlab-security-no-force-push-default-branch-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "gitlab_branch_protection")
    mql: |
      terraform.resources("gitlab_branch_protection").all(arguments["allow_force_push"] != true)
  - uid: mondoo-gitlab-security-no-force-push-default-branch-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "gitlab_branch_protection")
    mql: |
      terraform.plan.resourceChanges.where(type == "gitlab_branch_protection").all(change.after.allow_force_push != true)
  - uid: mondoo-gitlab-security-no-force-push-default-branch-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "gitlab_branch_protection")
    mql: |
      terraform.state.resources.where(type == "gitlab_branch_protection").all(values.allow_force_push != true)
  - uid: mondoo-gitlab-security-pipeline-must-succeed
    title: Ensure pipeline must succeed before merging
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ccc-06
      compliance/dora: dora-art-9
