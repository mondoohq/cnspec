policies:
  - uid: mondoo-hetzner-security
    name: Mondoo Hetzner Cloud Security
    version: 2.2.1
    license: BUSL-1.1
    tags:
      mondoo.com/category: security
      mondoo.com/platform: hetzner,cloud
    require:
      - provider: hetzner
    authors:
      - name: Mondoo, Inc.
        email: hello@mondoo.com
    summary: Secure Hetzner Cloud servers, firewalls, load balancers, certificates, and IP addresses
    docs:
      desc: |
        The Mondoo Hetzner Cloud Security policy identifies critical misconfigurations that could leave your Hetzner Cloud project vulnerable to attackers. This policy focuses on security-relevant controls and helps organizations harden against unauthorized network access, data exposure in transit, weak cryptography, and exposure to known CVEs through end-of-life software.

        This policy provides security checks across key Hetzner Cloud resources:

        - Cloud Servers
        - Firewalls
        - Load Balancers
        - TLS Certificates
        - Floating IPs and Primary IPs

        Learn more about scanning Hetzner Cloud in the [cnspec Hetzner Cloud documentation](https://mondoo.com/docs/cnspec/cloud/hetzner).

        Have suggestions for new checks in this policy? Visit our [cnspec repository](https://github.com/mondoohq/cnspec).
    groups:
      - title: Servers
        checks:
          - uid: mondoo-hetzner-security-server-in-private-network
          - uid: mondoo-hetzner-security-server-has-firewall
          - uid: mondoo-hetzner-security-server-image-not-deprecated
          - uid: mondoo-hetzner-security-server-not-internet-reachable
      - title: Firewalls
        checks:
          - uid: mondoo-hetzner-security-firewall-no-unrestricted-ssh
          - uid: mondoo-hetzner-security-firewall-no-unrestricted-rdp
          - uid: mondoo-hetzner-security-firewall-no-unrestricted-db-ports
          - uid: mondoo-hetzner-security-firewall-no-all-ports-open
          - uid: mondoo-hetzner-security-firewall-no-unrestricted-egress
          - uid: mondoo-hetzner-security-firewall-has-rules
      - title: Load Balancers
        checks:
          - uid: mondoo-hetzner-security-lb-http-redirected-to-https
          - uid: mondoo-hetzner-security-lb-https-service-has-certificate
          - uid: mondoo-hetzner-security-lb-in-private-network
      - title: TLS Certificates
        checks:
          - uid: mondoo-hetzner-security-cert-not-expired
      - title: IP Addresses
        checks:
          - uid: mondoo-hetzner-security-floating-ip-not-blocked
          - uid: mondoo-hetzner-security-primary-ip-not-blocked
    scoring_system: highest impact
queries:
  - uid: mondoo-hetzner-security-server-in-private-network
    title: Ensure servers are attached to a private network
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-06
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-5
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-1-5
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-hetzner-security-server-in-private-network-hetzner
        tags:
          mondoo.com/filter-title: Hetzner Cloud
          mondoo.com/filter-icon: hetzner
      - uid: mondoo-hetzner-security-server-in-private-network-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-hetzner-security-server-in-private-network-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-hetzner-security-server-in-private-network-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that every Hetzner Cloud server is attached to at least one private network. By default, servers communicate over the public internet even when exchanging traffic with other resources inside the same project, because Hetzner does not create or assign a private network automatically.

        **Why this matters**

        - **Lateral movement containment:** A server with no private network has no network boundary between it and other project resources, making it easier for an attacker who compromises one server to reach others.
        - **Reduced internet exposure:** Private-network-only traffic between resources never traverses the public internet, eliminating the opportunity for interception or manipulation of intra-project communication.
        - **Network segmentation:** Assigning servers to private networks enables subnet-level access controls that cannot be expressed with cloud firewall rules alone.
        - **Defense in depth:** Even if a cloud firewall rule is misconfigured, private-network isolation limits the blast radius of that misconfiguration to hosts on the same network.

        **Risk mitigation**

        - **Intra-project isolation:** Servers on a private network can reach each other over RFC-1918 space, keeping sensitive traffic off the public internet by design.
        - **Prerequisite for stricter controls:** Private network attachment is a prerequisite for further network segmentation such as dedicated subnets per tier and private-only service endpoints.
      audit: |
        ### Audit via Console

        1. Log in to the [Hetzner Cloud Console](https://console.hetzner.cloud) and select the project.
        2. Navigate to **Servers** and open each server.
        3. Click the **Networking** tab.
        4. Review the **Private Networks** section.

        A passing server shows at least one private network listed under **Private Networks**. A failing server shows an empty **Private Networks** section.

        ### Audit via CLI

        1. List all servers and inspect their private network attachments:

        ```bash
        hcloud server list -o columns=id,name
        hcloud server describe <server> -o json | grep -A5 'private_net'
        ```

        A passing server returns a non-empty `private_net` array in the JSON output. A failing server returns an empty `private_net` array (`[]`).
      remediation:
        - id: console
          desc: |
            1. Navigate to **Networks** and create a network if one does not already exist.
            2. Open the affected server and go to **Networking**.
            3. Click **Attach to Network** and select the target network.
        - id: cli
          desc: |
            ```bash
            hcloud server attach-to-network <server> --network <network>
            ```
        - id: terraform
          desc: |
            Define a `hcloud_network` with at least one `hcloud_network_subnet` and reference it from a `network` block on every `hcloud_server`. Use the inline `network` block rather than a separate `hcloud_server_network` resource, because only the inline form is recognized when this check evaluates Terraform code:

            ```hcl
            resource "hcloud_network" "main" {
              name     = "main"
              ip_range = "10.0.0.0/16"
            }

            resource "hcloud_network_subnet" "main" {
              network_id   = hcloud_network.main.id
              type         = "cloud"
              network_zone = "eu-central"
              ip_range     = "10.0.1.0/24"
            }

            resource "hcloud_server" "example" {
              name        = "example"
              image       = "ubuntu-24.04"
              server_type = "cx22"
              location    = "nbg1"

              network {
                network_id = hcloud_network.main.id
              }

              depends_on = [hcloud_network_subnet.main]
            }
            ```
    refs:
      - url: https://docs.hetzner.com/cloud/networks/overview/
        title: Hetzner Cloud Networks overview

  - uid: mondoo-hetzner-security-server-in-private-network-hetzner
    filters: asset.platform == "hetzner-project"
    mql: |
      hetzner.servers.all(privateNet != empty)
  - uid: mondoo-hetzner-security-server-in-private-network-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "hcloud_server")
    mql: |
      terraform.resources("hcloud_server").all(
        blocks.where(type == "network") != empty
      )
  - uid: mondoo-hetzner-security-server-in-private-network-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "hcloud_server")
    mql: |
      terraform.plan.resourceChanges.where(type == "hcloud_server").all(
        change.after.network != null && change.after.network != empty
      )
  - uid: mondoo-hetzner-security-server-in-private-network-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "hcloud_server")
    mql: |
      terraform.state.resources.where(type == "hcloud_server").all(
        values.network != null && values.network != empty
      )

  - uid: mondoo-hetzner-security-server-has-firewall
    title: Ensure servers have at least one firewall applied
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-hetzner-security-server-has-firewall-hetzner
        tags:
          mondoo.com/filter-title: Hetzner Cloud
          mondoo.com/filter-icon: hetzner
      - uid: mondoo-hetzner-security-server-has-firewall-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-hetzner-security-server-has-firewall-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-hetzner-security-server-has-firewall-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that every Hetzner Cloud server has at least one Hetzner Cloud Firewall applied. Hetzner does not attach a firewall to new servers by default, so every port bound on the server's public network interface is reachable from the internet until a firewall rule explicitly restricts access.

        **Why this matters**

        - **Default-allow posture:** Without a Cloud Firewall, Hetzner servers accept connections on every listening port from the entire internet, including debug endpoints, internal admin tools, and misconfigured services.
        - **OS firewall gap:** A Cloud Firewall enforces restrictions at the network edge, so even if the in-guest OS firewall is misconfigured or disabled, unauthorized ports remain unreachable.
        - **Attack surface reduction:** Firewall rules reduce the exposed service footprint to only the ports required by the workload, limiting the opportunity for exploitation of any vulnerability in a running service.
        - **Incident containment:** A firewall provides a fast, centralized control plane to block traffic to a compromised server without requiring in-guest access.

        **Risk mitigation**

        - **Principle of least privilege for network access:** An explicit allowlist of required ports prevents unintentional services from ever being reachable, regardless of what software is installed or started on the server.
        - **Centralized enforcement:** Cloud Firewall rules apply before traffic reaches the server, making them impossible to bypass through guest-level misconfiguration.
      audit: |
        ### Audit via Console

        1. Log in to the [Hetzner Cloud Console](https://console.hetzner.cloud) and select the project.
        2. Navigate to **Servers** and open each server.
        3. Click the **Firewalls** tab.
        4. Review the list of applied firewalls.

        A passing server shows at least one firewall listed. A failing server shows no firewalls applied.

        ### Audit via CLI

        1. List all servers and inspect each server's firewall assignments:

        ```bash
        hcloud server list -o columns=id,name
        hcloud server describe <server> -o json | grep -A5 'firewall'
        ```

        A passing server returns a non-empty `public_net.firewalls` or `firewall_ids` array. A failing server returns an empty or absent firewall list.
      remediation:
        - id: console
          desc: |
            1. Navigate to **Firewalls** and create a firewall with rules appropriate for the server's role.
            2. Open the firewall and go to **Apply to**.
            3. Add the affected server (or a label selector that matches it).
        - id: cli
          desc: |
            ```bash
            hcloud firewall apply-to-resource <firewall> --type server --server <server>
            ```
        - id: terraform
          desc: |
            Reference at least one `hcloud_firewall` from `firewall_ids` on every `hcloud_server`. Use the `firewall_ids` attribute rather than a separate `hcloud_firewall_attachment` resource or an `apply_to` block on the firewall, because only the `firewall_ids` form is recognized when this check evaluates Terraform code:

            ```hcl
            resource "hcloud_firewall" "default" {
              name = "default"

              rule {
                direction  = "in"
                protocol   = "tcp"
                port       = "22"
                source_ips = ["10.0.0.0/16"]
              }
            }

            resource "hcloud_server" "example" {
              name         = "example"
              image        = "ubuntu-24.04"
              server_type  = "cx22"
              location     = "nbg1"
              firewall_ids = [hcloud_firewall.default.id]
            }
            ```
    refs:
      - url: https://docs.hetzner.com/cloud/firewalls/overview/
        title: Hetzner Cloud Firewalls overview

  - uid: mondoo-hetzner-security-server-has-firewall-hetzner
    filters: asset.platform == "hetzner-project"
    mql: |
      hetzner.servers.all(firewalls != empty)
  - uid: mondoo-hetzner-security-server-has-firewall-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "hcloud_server")
    mql: |
      terraform.resources("hcloud_server").all(
        arguments['firewall_ids'] != null && arguments['firewall_ids'] != []
      )
  - uid: mondoo-hetzner-security-server-has-firewall-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "hcloud_server")
    mql: |
      terraform.plan.resourceChanges.where(type == "hcloud_server").all(
        change.after.firewall_ids != null && change.after.firewall_ids != []
      )
  - uid: mondoo-hetzner-security-server-has-firewall-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "hcloud_server")
    mql: |
      terraform.state.resources.where(type == "hcloud_server").all(
        values.firewall_ids != null && values.firewall_ids != []
      )

  # No Terraform variants: image deprecation is runtime metadata set by Hetzner on the image (`image.deprecated` timestamp), not a configurable field on `hcloud_server`. Terraform configs only carry the image name string, with no signal whether Hetzner has marked it deprecated.
  - uid: mondoo-hetzner-security-server-image-not-deprecated
    title: Ensure servers do not run a deprecated OS image
    impact: 70
    filters: asset.platform == "hetzner-project"
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-tvm-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-308-a-1-ii-b-security-management-process-risk-management
      compliance/iso-27001-2022: iso-27001-2022-a-8-8
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-12
      compliance/nist-csf-2: nist-csf-2-pr-ps-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-1
      compliance/pci-dss-4: pcidss-requirement-6-3-3
      compliance/soc2-2017: soc2-control-cc7-1-5
      compliance/vda-isa-5: vda-isa-5-5-2-5
    mql: |
      hetzner.servers.where(image != null).all(image.deprecated == null || image.deprecated > time.now)
    docs:
      desc: |
        This check ensures that no Hetzner Cloud server was created from a system image whose deprecation date has passed. Hetzner marks an image deprecated when the upstream operating system reaches end of life or when Hetzner plans to retire the image; once the deprecation timestamp is in the past, the image is no longer supported.

        **Why this matters**

        - **No security patches:** A deprecated image is tied to an end-of-life OS that no longer receives upstream security fixes, so known-exploited CVEs accumulate without any remediation path.
        - **Unsupported software stack:** Beyond the OS kernel, user-space packages and system libraries on a deprecated image are also beyond end of life, widening the vulnerability surface.
        - **Compliance risk:** Many frameworks require running software on vendor-supported versions; a deprecated image creates a gap that auditors and regulators will flag.

        **Risk mitigation**

        - **Reduced CVE exposure:** Rebuilding from a current, supported image ensures the server starts with all upstream security patches applied, closing the gap created by end-of-life software.
        - **Maintainability:** A supported image baseline makes future patching and image-refresh workflows predictable and vendor-supported.
      audit: |
        ### Audit via Console

        1. Log in to the [Hetzner Cloud Console](https://console.hetzner.cloud) and select the project.
        2. Navigate to **Servers** and open each server.
        3. On the **Overview** tab, check the **Image** field.
        4. A deprecated image is noted with a deprecation warning or end-of-life indicator in the image name or description.

        A passing server shows a current, non-deprecated image. A failing server shows an image flagged as deprecated or end-of-life.

        ### Audit via CLI

        1. Retrieve the image details for each server and check the `deprecated` field:

        ```bash
        hcloud server describe <server> -o json | grep -A5 '"image"'
        hcloud image describe <image-id> -o json | grep 'deprecated'
        ```

        A passing server returns `"deprecated": null` or a `deprecated` date in the future. A failing server returns a `deprecated` date that is in the past.
      remediation:
        - id: console
          desc: |
            Rebuilding a server from a new image erases all data on its disk. Back up or migrate any data you need before you start. For stateful workloads, prefer provisioning a replacement server and migrating the workload.

            To rebuild in place:

            1. Navigate to **Servers** and open the affected server.
            2. Go to **Rebuild**, select a current, supported OS image, and confirm.
            3. Restore data and configuration from your backup.

            To migrate to a replacement server instead:

            1. Note the affected server's configuration, including server type, location, networks, firewalls, and SSH keys.
            2. Provision a replacement server using a current OS image.
            3. Migrate data and configuration to the new server.
            4. Update DNS, monitoring, and dependent services to point at the new server.
            5. Delete the original server. The finding clears only once no server runs a deprecated image.
        - id: cli
          desc: |
            Rebuilding erases all data on the server's disk; back up anything you need first:

            ```bash
            hcloud server rebuild <server> --image <current-image>
            ```

            To migrate to a replacement server instead, create the new server, move the workload, then delete the original server so the deprecated image is no longer in use:

            ```bash
            hcloud server create \
              --name <new-name> \
              --type <server-type> \
              --image <current-image> \
              --location <location> \
              --network <network> \
              --firewall <firewall> \
              --ssh-key <ssh-key>
            hcloud server delete <old-server>
            ```
        - id: terraform
          desc: |
            Pin `image` on every `hcloud_server` resource to a current, supported OS image. Changing `image` forces server replacement, so plan a data migration before applying:

            ```hcl
            resource "hcloud_server" "example" {
              name        = "example"
              server_type = "cx22"
              location    = "nbg1"
              image       = "ubuntu-24.04"
            }
            ```
    refs:
      - url: https://docs.hetzner.com/cloud/servers/faq/#what-does-it-mean-when-an-image-is-deprecated
        title: Hetzner image deprecation policy

  # Security-only check (compliance mapping intentionally omitted per maintainer).
  # No Terraform variants: internetReachable is a runtime-computed exposure signal (IP + security group/firewall reachability) with no static config analog.
  - uid: mondoo-hetzner-security-server-not-internet-reachable
    title: Ensure servers are not reachable from the internet
    impact: 85
    filters: asset.platform == "hetzner-project"
    mql: |
      hetzner.servers.all( exposure.internetReachable == false )
    docs:
      desc: |
        This check ensures that no Hetzner Cloud server is reachable from the public internet. `internetReachable` combines a public IP with firewall ingress that actually admits inbound traffic from any address — including the case where no firewall is attached at all — so it reports a server as exposed only when both conditions hold. This is a higher-fidelity "actually exposed" signal than a public-IP flag alone.

        **Why this matters**

        - **Reduced attack surface:** A server with no internet-reachable path keeps its listening services off the public scanning grid entirely.
        - **Defense in depth:** A public IP is harmless until a firewall rule (or a missing firewall) admits traffic to it; removing either side closes the path.
        - **Fewer false alarms:** Because the signal correlates the IP with the firewall ingress, it surfaces servers that are genuinely exposed rather than every server that merely holds a public address.

        **Risk mitigation**

        - **Internet-wide exploitation:** Prevents listening services from being probed and attacked by arbitrary internet hosts.
        - **Lateral movement entry:** Removes a public foothold an attacker could use to reach the rest of the project network.

        Intentionally public hosts such as bastions and public web servers will fail this check and should be exempted.
      audit: |
        ### Audit via Console

        1. Log in to the [Hetzner Cloud Console](https://console.hetzner.cloud) and select the project.
        2. Navigate to **Servers** and open each server, then review the **Networking** tab for an assigned public IPv4 or IPv6 address.
        3. Open the **Firewalls** tab and review the inbound rules of every applied firewall; a server with no firewall admits all inbound traffic.

        A passing server either has no public IP, or has firewalls whose inbound rules admit no `0.0.0.0/0` or `::/0` source. A failing server has a public IP and a firewall rule (or absent firewall) that admits traffic from any address.

        ### Audit via CLI

        1. List servers and inspect each server's public IP and applied firewalls:

        ```bash
        hcloud server list -o columns=id,name,ipv4,ipv6
        hcloud server describe <server> -o json | grep -A5 'firewall'
        hcloud firewall describe <firewall> -o json
        ```

        A passing server either reports no public IP, or has firewall inbound rules whose `source_ips` exclude `0.0.0.0/0` and `::/0`. A failing server has a public IP combined with an inbound rule sourced from `0.0.0.0/0` or `::/0`, or no firewall applied.
      remediation:
        - id: console
          desc: |
            Close the internet-reachable path by restricting the firewall or removing the public edge.

            1. Navigate to **Firewalls** and open the firewall applied to the affected server (create one and apply it first if the server has none).
            2. Edit any inbound rule whose source is `Any IPv4` (`0.0.0.0/0`) or `Any IPv6` (`::/0`) and scope it to a specific trusted CIDR.
            3. If the server does not need a public IP at all, open the server's **Networking** tab and remove its public IPv4/IPv6, reaching it over a private network or a bastion instead.
        - id: cli
          desc: |
            Scope every world-open inbound rule on the applied firewall to a trusted CIDR. If the server has no firewall, create one and apply it first:

            ```bash
            hcloud firewall delete-rule <firewall> \
              --direction in --protocol tcp --port 443 --source-ips 0.0.0.0/0
            hcloud firewall add-rule <firewall> \
              --direction in --protocol tcp --port 443 --source-ips 203.0.113.0/24
            hcloud firewall apply-to-resource <firewall> --type server --server <server>
            ```

            A public IP cannot be detached from a running server in place; to remove the public edge entirely, rebuild the server with the public interface disabled (Terraform below).
        - id: terraform
          desc: |
            Keep servers off the public internet by attaching a firewall whose inbound rules are scoped to trusted CIDRs, and disabling the public interface where it is not needed:

            ```hcl
            resource "hcloud_firewall" "scoped" {
              name = "scoped"

              rule {
                direction  = "in"
                protocol   = "tcp"
                port       = "443"
                source_ips = ["203.0.113.0/24"]
              }
            }

            resource "hcloud_server" "example" {
              name         = "example"
              image        = "ubuntu-24.04"
              server_type  = "cx22"
              location     = "nbg1"
              firewall_ids = [hcloud_firewall.scoped.id]

              public_net {
                ipv4_enabled = false
                ipv6_enabled = false
              }

              network {
                network_id = hcloud_network.main.id
              }

              depends_on = [hcloud_network_subnet.main]
            }
            ```
    refs:
      - url: https://docs.hetzner.com/cloud/firewalls/overview/
        title: Hetzner Cloud Firewalls overview

  - uid: mondoo-hetzner-security-firewall-no-unrestricted-ssh
    title: Ensure no firewall allows unrestricted inbound SSH (port 22)
    impact: 100
    tags:
