        values.rule != null && values.rule != []
      )

  - uid: mondoo-hetzner-security-lb-http-redirected-to-https
    title: Ensure load balancers redirect HTTP traffic to HTTPS
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-2-ii-transmission-security-encryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    variants:
      - uid: mondoo-hetzner-security-lb-http-redirected-to-https-hetzner
        tags:
          mondoo.com/filter-title: Hetzner Cloud
          mondoo.com/filter-icon: hetzner
      - uid: mondoo-hetzner-security-lb-http-redirected-to-https-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-hetzner-security-lb-http-redirected-to-https-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-hetzner-security-lb-http-redirected-to-https-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that every Hetzner Cloud load balancer redirects plaintext HTTP requests to HTTPS instead of serving a plain HTTP service. Hetzner implements the redirect as an option of the HTTPS service: when it is enabled, the load balancer answers port 80 with a 301 redirect to the HTTPS equivalent. Without this redirect, clients that initiate HTTP connections receive responses over an unencrypted channel.

        **Why this matters**

        - **Credential and session exposure:** HTTP traffic is plaintext; any credential, session cookie, or API token transmitted over HTTP is readable by any host on the network path between the client and the load balancer.
        - **Downgrade attack surface:** A load balancer that silently serves HTTP responses gives attackers a window to intercept and strip the TLS layer before the client upgrades, a technique known as SSL stripping.
        - **Cookie security bypass:** Cookies without the `Secure` attribute can be sent over HTTP; even when set over HTTPS they can be intercepted if the client makes an initial HTTP request before redirecting.

        **Risk mitigation**

        - **Force encrypted channels:** A 301 redirect from HTTP to HTTPS ensures that all subsequent requests in the same session use TLS, closing the window for interception and downgrade.
        - **Client-side caching via HSTS:** Once clients receive the redirect, pairing it with an HSTS header prevents future HTTP requests from ever leaving the client, eliminating the initial plaintext window entirely.
      audit: |
        ### Audit via Console

        1. Log in to the [Hetzner Cloud Console](https://console.hetzner.cloud) and select the project.
        2. Navigate to **Load Balancers** and open each load balancer.
        3. Click the **Services** tab.
        4. Verify that no plain HTTP service is configured and that the HTTPS service has **Redirect HTTP to HTTPS** enabled.

        A passing load balancer has no plain HTTP service and shows **Redirect HTTP to HTTPS** toggled on for its HTTPS service. A failing load balancer has a plain HTTP service, or none of its HTTPS services has the redirect enabled.

        ### Audit via CLI

        1. List all load balancers and inspect their services:

        ```bash
        hcloud load-balancer list -o columns=id,name
        hcloud load-balancer describe <lb> -o json
        ```

        In the `services` array, verify that no entry has `protocol` set to `http`, and that on a load balancer with HTTPS services at least one of them has `http.redirect_http` set to `true`.

        A passing load balancer has no `http` service and returns `"redirect_http": true` on an HTTPS service. A failing load balancer has a service with `protocol` set to `http`, or HTTPS services that all return `"redirect_http": false`.
      remediation:
        - id: console
          desc: |
            Hetzner exposes the redirect as an option of the HTTPS service, not the HTTP service. When the redirect is enabled, the load balancer answers port 80 itself with a redirect to HTTPS, so a separate plain HTTP service is no longer needed.

            1. Navigate to **Load Balancers** and open the affected load balancer.
            2. Go to **Services** and delete the plain HTTP service listening on port 80.
            3. Edit the HTTPS service and enable **Redirect HTTP to HTTPS**. If no HTTPS service exists yet, create one on port 443 with a certificate and enable the redirect on it.

            Plain HTTP requests go unanswered for the short interval between deleting the HTTP service and enabling the redirect.
        - id: cli
          desc: |
            The redirect option belongs to the HTTPS service. Delete the plain HTTP service on port 80, then enable the redirect on the HTTPS service:

            ```bash
            hcloud load-balancer delete-service <lb> --listen-port 80
            hcloud load-balancer update-service <lb> \
              --listen-port 443 --http-redirect-http=true
            ```
        - id: terraform
          desc: |
            The `redirect_http` option is only supported on services with `protocol = "https"`. Remove any plain HTTP service on port 80 and enable the redirect on the HTTPS service instead:

            ```hcl
            resource "hcloud_load_balancer_service" "https" {
              load_balancer_id = hcloud_load_balancer.example.id
              protocol         = "https"
              listen_port      = 443
              destination_port = 80

              http {
                certificates  = [hcloud_managed_certificate.example.id]
                redirect_http = true
              }
            }
            ```
    refs:
      - url: https://docs.hetzner.com/cloud/load-balancers/overview/
        title: Hetzner Cloud Load Balancers overview

  - uid: mondoo-hetzner-security-lb-http-redirected-to-https-hetzner
    filters: asset.platform == "hetzner-loadbalancer"
    mql: |
      hetzner.loadBalancer.services.none(protocol == "http")
      hetzner.loadBalancer.services.where(protocol == "https").all(http["redirectHttp"] == true)
  - uid: mondoo-hetzner-security-lb-http-redirected-to-https-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "hcloud_load_balancer_service")
    mql: |
      terraform.resources("hcloud_load_balancer_service").all(arguments['protocol'] != "http")
      terraform.resources("hcloud_load_balancer_service").where(arguments['protocol'] == "https").all(
        blocks.where(type == "http").all(arguments['redirect_http'] == true)
      )
  - uid: mondoo-hetzner-security-lb-http-redirected-to-https-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "hcloud_load_balancer_service")
    mql: |
      terraform.plan.resourceChanges.where(type == "hcloud_load_balancer_service").all(
        change.after.protocol != "http"
      )
      terraform.plan.resourceChanges.where(type == "hcloud_load_balancer_service" && change.after.protocol == "https").all(
        change.after.http.all(_['redirect_http'] == true)
      )
  - uid: mondoo-hetzner-security-lb-http-redirected-to-https-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "hcloud_load_balancer_service")
    mql: |
      terraform.state.resources.where(type == "hcloud_load_balancer_service").all(
        values.protocol != "http"
      )
      terraform.state.resources.where(type == "hcloud_load_balancer_service" && values.protocol == "https").all(
        values.http.all(_['redirect_http'] == true)
      )

  - uid: mondoo-hetzner-security-lb-https-service-has-certificate
    title: Ensure HTTPS load balancer services have a TLS certificate attached
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-2-ii-transmission-security-encryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    variants:
      - uid: mondoo-hetzner-security-lb-https-service-has-certificate-hetzner
        tags:
          mondoo.com/filter-title: Hetzner Cloud
          mondoo.com/filter-icon: hetzner
      - uid: mondoo-hetzner-security-lb-https-service-has-certificate-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-hetzner-security-lb-https-service-has-certificate-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-hetzner-security-lb-https-service-has-certificate-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that every Hetzner Cloud load balancer service configured for HTTPS has at least one TLS certificate attached. An HTTPS listener with no certificate cannot complete a TLS handshake, causing clients to receive certificate errors or fall back to unencrypted connections.

        **Why this matters**

        - **TLS termination failure:** Without a certificate, the load balancer cannot establish a valid TLS session; clients receive certificate errors that degrade trust and may cause them to bypass security warnings.
        - **Fail-open downgrade risk:** Some client configurations fall back to HTTP when HTTPS fails, which silently removes encryption from the connection and exposes traffic to interception.
        - **Service availability impact:** Certificate-related TLS failures often surface as hard-to-diagnose connectivity errors that disrupt users and dependent services, making a missing certificate both a security and an availability concern.

        **Risk mitigation**

        - **Valid TLS termination:** Attaching a certificate to the HTTPS service ensures the load balancer can complete TLS handshakes and deliver encrypted sessions to all clients.
        - **Automated renewal with managed certificates:** Using Hetzner-managed certificates removes the operational burden of tracking expiry dates, as renewal is handled automatically through Let's Encrypt.
      audit: |
        ### Audit via Console

        1. Log in to the [Hetzner Cloud Console](https://console.hetzner.cloud) and select the project.
        2. Navigate to **Load Balancers** and open each load balancer.
        3. Click the **Services** tab.
        4. Find any service configured for HTTPS (port 443) and verify that at least one certificate is listed under **Certificates**.

        A passing load balancer shows at least one certificate attached to every HTTPS service. A failing load balancer shows an HTTPS service with no certificates attached.

        ### Audit via CLI

        1. List all load balancers and inspect their services:

        ```bash
        hcloud load-balancer list -o columns=id,name
        hcloud load-balancer describe <lb> -o json
        ```

        In the `services` array, find entries where `protocol` is `https` and check whether `http.certificates` is a non-empty array.

        A passing load balancer returns a non-empty `certificates` array for every HTTPS service. A failing load balancer returns an empty `certificates` array (`[]`) for an HTTPS service.
      remediation:
        - id: console
          desc: |
            1. Navigate to **Load Balancers** and open the affected load balancer.
            2. Go to **Services** and edit the HTTPS service.
            3. Under **Certificates**, attach an existing certificate or create a Hetzner-managed certificate for the domain.
        - id: cli
          desc: |
            The check fails when an HTTPS service already exists but has no certificate attached. Use `update-service` to attach a certificate to that existing listener; `add-service` would attempt to create a second service on the same listen port and fail because the listener already exists.

            ```bash
            hcloud load-balancer update-service <lb> \
              --listen-port 443 \
              --http-certificates <certificate>
            ```

            The service is identified by its listen port, so `--listen-port` must match the existing HTTPS service. Use `add-service` only when no HTTPS service exists yet on that port.
        - id: terraform
          desc: |
            Attach at least one certificate to every HTTPS `hcloud_load_balancer_service` via `http.certificates`:

            ```hcl
            resource "hcloud_managed_certificate" "example" {
              name         = "example"
              domain_names = ["example.com"]
            }

            resource "hcloud_load_balancer_service" "https" {
              load_balancer_id = hcloud_load_balancer.example.id
              protocol         = "https"
              listen_port      = 443
              destination_port = 80

              http {
                certificates = [hcloud_managed_certificate.example.id]
              }
            }
            ```
    refs:
      - url: https://docs.hetzner.com/cloud/load-balancers/overview/
        title: Hetzner Cloud Load Balancers overview

  - uid: mondoo-hetzner-security-lb-https-service-has-certificate-hetzner
    filters: asset.platform == "hetzner-loadbalancer"
    mql: |
      hetzner.loadBalancer.services.where(protocol == "https").all(certificates != empty)
  - uid: mondoo-hetzner-security-lb-https-service-has-certificate-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "hcloud_load_balancer_service")
    mql: |
      terraform.resources("hcloud_load_balancer_service").all(
        arguments['protocol'] != "https" ||
        blocks.where(type == "http").any(arguments['certificates'] != null && arguments['certificates'] != [])
      )
  - uid: mondoo-hetzner-security-lb-https-service-has-certificate-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "hcloud_load_balancer_service")
    mql: |
      terraform.plan.resourceChanges.where(type == "hcloud_load_balancer_service").all(
        change.after.protocol != "https" ||
        change.after.http.any(_['certificates'] != null && _['certificates'] != [])
      )
  - uid: mondoo-hetzner-security-lb-https-service-has-certificate-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "hcloud_load_balancer_service")
    mql: |
      terraform.state.resources.where(type == "hcloud_load_balancer_service").all(
        values.protocol != "https" ||
        values.http.any(_['certificates'] != null && _['certificates'] != [])
      )

  # No Terraform variants: a load balancer's private-network attachment is expressed
  # by a separate `hcloud_load_balancer_network` resource keyed by `load_balancer_id`,
  # not by an argument on `hcloud_load_balancer`. Asserting "every load balancer has an
  # attachment" requires correlating that separate resource back to each load balancer,
  # which is awkward to express reliably in MQL on Terraform sources. The runtime variant
  # reads the resolved private-network attachments directly. Terraform remediation is
  # still provided below because the fix is a self-contained resource.
  - uid: mondoo-hetzner-security-lb-in-private-network
    title: Ensure load balancers are attached to a private network
    impact: 70
    filters: asset.platform == "hetzner-loadbalancer"
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-06
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-5
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-1-5
      compliance/vda-isa-5: vda-isa-5-5-2-7
    mql: |
      hetzner.loadBalancer.privateNet != empty
    docs:
      desc: |
        This check ensures that every Hetzner Cloud load balancer is attached to at least one private network. When a load balancer reaches its targets only over the public network, traffic between the load balancer and the backend servers traverses public-facing interfaces instead of staying on an isolated RFC-1918 network.

        **Why this matters**

        - **Private backend path:** A load balancer on a private network forwards to its targets over private IPs, keeping the load-balancer-to-backend hop entirely inside the project's private network rather than on public addresses.
        - **Reduced public exposure:** Without a private network attachment, backend servers must expose the forwarded ports on their public interface for the load balancer to reach them, widening the internet-facing surface.
        - **Network segmentation:** Shared private-network membership lets firewall rules treat the load balancer and its backends as an internal trust zone, which is not possible when the forwarding path is public.

        **Risk mitigation**

        - **Traffic isolation:** Keeping load-balancer-to-target traffic on a private network removes it from public routing paths, eliminating the interception opportunity that a public forwarding path creates.
        - **Tighter backend firewalls:** With a private path in place, backend servers can restrict the forwarded ports to the private network range instead of accepting them from the internet.
      audit: |
        ### Audit via Console

        1. Log in to the [Hetzner Cloud Console](https://console.hetzner.cloud) and select the project.
        2. Navigate to **Load Balancers** and open each load balancer.
        3. Click the **Networking** tab and review the **Private Networks** section.

        A passing load balancer shows at least one private network attached. A failing load balancer shows an empty **Private Networks** section.

        ### Audit via CLI

        1. List all load balancers and inspect their private network attachments:

        ```bash
        hcloud load-balancer list -o columns=id,name
        hcloud load-balancer describe <lb> -o json | grep -A5 'private_net'
        ```

        A passing load balancer returns a non-empty `private_net` array. A failing load balancer returns an empty `private_net` array (`[]`).
      remediation:
        - id: console
          desc: |
            1. Navigate to **Networks** and create a network if one does not already exist.
            2. Open the affected load balancer and go to **Networking**.
            3. Click **Attach to Network** and select the target network. Enable **Use private IP for targets** so forwarding uses the private path.
        - id: cli
          desc: |
            ```bash
            hcloud load-balancer attach-to-network <lb> --network <network>
            ```
        - id: terraform
          desc: |
            Attach every `hcloud_load_balancer` to a network with an `hcloud_load_balancer_network` resource. Set `use_private_ip = true` on the load balancer's targets so forwarding uses the private path:

            ```hcl
            resource "hcloud_network" "main" {
              name     = "main"
              ip_range = "10.0.0.0/16"
            }

            resource "hcloud_network_subnet" "main" {
              network_id   = hcloud_network.main.id
              type         = "cloud"
              network_zone = "eu-central"
              ip_range     = "10.0.1.0/24"
            }

            resource "hcloud_load_balancer" "example" {
              name               = "example"
              load_balancer_type = "lb11"
              location           = "nbg1"
            }

            resource "hcloud_load_balancer_network" "example" {
              load_balancer_id = hcloud_load_balancer.example.id
              network_id       = hcloud_network.main.id
              depends_on       = [hcloud_network_subnet.main]
            }
            ```
    refs:
      - url: https://docs.hetzner.com/cloud/load-balancers/overview/
        title: Hetzner Cloud Load Balancers overview

  # No Terraform variants: certificate expiration (`notValidAfter`) is runtime metadata derived from the certificate material, not a configurable field on `hcloud_managed_certificate` / `hcloud_uploaded_certificate`. The Terraform config carries no signal about the current expiry date.
  - uid: mondoo-hetzner-security-cert-not-expired
    title: Ensure TLS certificates are not expired
    impact: 100
    filters: asset.platform == "hetzner-project"
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-2-ii-transmission-security-encryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-17
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-10
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-1
    mql: |
      hetzner.certificates.all(notValidAfter > time.now)
    docs:
      desc: |
        This check ensures that no TLS certificate managed in Hetzner Cloud has passed its `notValidAfter` expiration date. An expired certificate is rejected by standard TLS clients and breaks the trust chain that encrypted connections rely on.

        **Why this matters**

        - **Broken trust chain:** Once a certificate expires, TLS clients reject the handshake and users see certificate warnings; the encrypted channel is no longer established as intended.
        - **Normalized bypass behavior:** Repeated certificate warnings train users to click through security errors, undermining the protective value of TLS warnings when a real attack occurs.
        - **Dependent service failures:** API clients and service-to-service integrations typically fail closed on certificate errors rather than falling back, so an expired certificate becomes an availability incident in addition to a security failure.

        **Risk mitigation**

        - **Automated renewal:** Using Hetzner-managed certificates delegates renewal to Hetzner via Let's Encrypt, eliminating the manual tracking that leads to missed expirations.
        - **Proactive monitoring:** Monitoring certificate expiry and triggering renewal well before the `notValidAfter` date prevents the interruption window that an expired certificate creates.
      audit: |
        ### Audit via Console

        1. Log in to the [Hetzner Cloud Console](https://console.hetzner.cloud) and select the project.
        2. Navigate to **Certificates**.
        3. Review the **Expires** column for each certificate.

        A passing certificate shows an expiry date in the future. A failing certificate shows an expiry date that has already passed.

        ### Audit via CLI

        1. List all certificates and check the expiry date for each:

        ```bash
        hcloud certificate list -o columns=id,name,not_valid_after
        ```

        A passing certificate shows a `not_valid_after` date that is later than today. A failing certificate shows a `not_valid_after` date that is in the past.
      remediation:
        - id: console
          desc: |
            1. Navigate to **Certificates** and create a replacement. For managed certificates, create a new managed certificate for the affected domains; for uploaded certificates, upload the renewed certificate and key.
            2. Navigate to **Load Balancers** and update every HTTPS service that references the expired certificate to use the replacement.
            3. Delete the expired certificate so it no longer exists in the project.

            Managed certificates normally renew automatically through Let's Encrypt. If one expired, investigate why renewal failed before re-creating it; a common cause is the domain's DNS no longer pointing at the load balancer.
        - id: cli
          desc: |
            Create a replacement certificate, repoint every load balancer service that uses the expired certificate, then delete the expired certificate:

            ```bash
            hcloud certificate create \
              --type managed \
              --name <new-name> \
              --domain <domain>
            hcloud load-balancer update-service <lb> \
              --listen-port 443 --http-certificates <new-certificate>
            hcloud certificate delete <expired-certificate>
            ```
        - id: terraform
          desc: |
            Prefer `hcloud_managed_certificate` so Hetzner auto-renews via Let's Encrypt and certificates do not silently expire:

            ```hcl
            resource "hcloud_managed_certificate" "example" {
              name         = "example"
              domain_names = ["example.com", "*.example.com"]
            }
            ```

            For uploaded certificates, replace the certificate material before expiry:

            ```hcl
            resource "hcloud_uploaded_certificate" "example" {
              name        = "example"
              certificate = file("${path.module}/cert.pem")
              private_key = file("${path.module}/key.pem")
            }
            ```
    refs:
      - url: https://docs.hetzner.com/cloud/certificates/overview/
        title: Hetzner Cloud Certificates overview

  # No Terraform variants: the `blocked` flag is set by Hetzner's abuse team based on observed traffic; it is not a configurable field on `hcloud_floating_ip` and Terraform carries no signal about it.
  - uid: mondoo-hetzner-security-floating-ip-not-blocked
    title: Ensure floating IPs are not blocked by Hetzner abuse
    impact: 70
    filters: asset.platform == "hetzner-project"
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: false
      compliance/dora: false
      compliance/hipaa: false
      compliance/iso-27001-2022: false
      compliance/nis-2: false
      compliance/nist-csf-1: false
      compliance/nist-csf-2: false
      compliance/nist-sp-800-53-rev5: false
      compliance/nist-sp-800-171: false
      compliance/pci-dss-4: false
      compliance/soc2-2017: false
      compliance/vda-isa-5: false
    mql: |
      hetzner.floatingIps.all(blocked == false)
    docs:
      desc: |
        This check ensures that no floating IP in the Hetzner Cloud project is in a `blocked` state. Hetzner sets the `blocked` flag on a floating IP when its abuse team has determined that the IP is originating malicious traffic such as outbound attacks, spam, scanning, or malware distribution.

        **Why this matters**

        - **Compromise indicator:** A blocked floating IP is a strong signal that the workload attached to it is compromised, misconfigured to emit abusive traffic, or being actively misused by a threat actor.
        - **Ongoing harm to third parties:** While the IP remains blocked, the underlying workload may continue to generate abusive traffic, causing harm to external recipients and accruing further abuse history against the project.
        - **Reputational and operational impact:** A blocked IP cannot deliver outbound traffic normally; services relying on the IP for egress or inbound reachability are degraded until the underlying issue is resolved and Hetzner lifts the block.

        **Risk mitigation**

        - **Incident investigation:** Treating a blocked IP as a confirmed incident, rather than an inconvenience to be unblocked, ensures the underlying compromise or misconfiguration is identified and remediated.
        - **Credential rotation:** If the investigation reveals a compromised workload, rotating all credentials the server held prevents the attacker from retaining access after the server is rebuilt.
      audit: |
        ### Audit via Console

        1. Log in to the [Hetzner Cloud Console](https://console.hetzner.cloud) and select the project.
        2. Navigate to **Floating IPs**.
        3. Review each floating IP for a blocked or suspended status indicator.

        A passing floating IP shows a normal active status with no blocked indicator. A failing floating IP shows a blocked status, typically surfaced by a warning or abuse notice from Hetzner.

        ### Audit via CLI

        1. List all floating IPs and inspect the `blocked` field for each:

        ```bash
        hcloud floating-ip list -o columns=id,name,ip,server
        hcloud floating-ip describe <floating-ip> -o json | grep '"blocked"'
        ```

        A passing floating IP returns `"blocked": false`. A failing floating IP returns `"blocked": true`.
      remediation:
        - id: console
          desc: |
            Investigate before unblocking.

            1. Identify the server the floating IP is attached to and review recent logs, outbound traffic, and authentication events for signs of compromise.
            2. If the workload is compromised, rebuild the server from a known-good image and rotate any credentials it held.
            3. Contact Hetzner support to discuss the abuse case and request unblocking once the underlying issue is remediated.
        # No CLI remediation: the `blocked` flag is set and cleared only by Hetzner's abuse team; neither the hcloud CLI nor the API can modify it.
        # No Terraform remediation: the `blocked` flag is set by Hetzner's abuse team based on observed traffic; it is not a configurable field on `hcloud_floating_ip`. The fix is investigation and remediation of the underlying workload, then a support request.
    refs:
      - url: https://docs.hetzner.com/cloud/floating-ips/overview/
        title: Hetzner Cloud Floating IPs overview

  # No Terraform variants: the `blocked` flag is set by Hetzner's abuse team based on observed traffic; it is not a configurable field on `hcloud_primary_ip` and Terraform carries no signal about it.
