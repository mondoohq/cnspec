  - uid: mondoo-hetzner-security-firewall-no-all-ports-open
    title: Ensure no firewall allows unrestricted inbound on all ports
    impact: 100
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-hetzner-security-firewall-no-all-ports-open-hetzner
        tags:
          mondoo.com/filter-title: Hetzner Cloud
          mondoo.com/filter-icon: hetzner
      - uid: mondoo-hetzner-security-firewall-no-all-ports-open-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-hetzner-security-firewall-no-all-ports-open-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-hetzner-security-firewall-no-all-ports-open-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that no Hetzner Cloud Firewall has an inbound rule that permits traffic on all ports (`any`, `1-65535`, or `0-65535`) from the public internet (source `0.0.0.0/0` or `::/0`). A rule that opens every port from everywhere is equivalent to having no firewall at all.

        **Why this matters**

        - **No effective perimeter:** With all ports open to the internet, every service listening on the server, whether intentional or not, is reachable by every host on the internet.
        - **Shadow service exposure:** Servers accumulate listening services over time; an all-ports rule means a forgotten debug endpoint, an unintended management interface, or a misconfigured application port is immediately internet-accessible.
        - **Highest-severity misconfiguration:** This is the most permissive possible firewall state and represents a complete failure of the network access control layer.

        **Risk mitigation**

        - **Replace with per-service rules:** Defining explicit narrow rules for only the ports required by the workload ensures that every other port is implicitly denied, regardless of what is running on the server.
        - **Scoped source CIDRs:** Combining port-specific rules with source IP restrictions further reduces the effective attack surface to only the hosts that legitimately need access.
      audit: |
        ### Audit via Console

        1. Log in to the [Hetzner Cloud Console](https://console.hetzner.cloud) and select the project.
        2. Navigate to **Firewalls** and open each firewall.
        3. Review the **Rules** tab, focusing on inbound rules.
        4. Check whether any inbound rule has the port set to `Any`, `1-65535`, or `0-65535` with a source of `Any IPv4` (`0.0.0.0/0`) or `Any IPv6` (`::/0`).

        A passing firewall shows no inbound rule permitting the full port range from the public internet. A failing firewall shows an inbound rule with an unrestricted port range and an unrestricted source.

        ### Audit via CLI

        1. List all firewalls and inspect their rules:

        ```bash
        hcloud firewall list -o columns=id,name
        hcloud firewall describe <firewall> -o json
        ```

        Review the `rules` array for entries where `direction` is `in`, `port` is `any`, `1-65535`, or `0-65535`, and `source_ips` contains `0.0.0.0/0` or `::/0`.

        A passing firewall returns no such rule. A failing firewall returns at least one inbound rule that opens the full port range from an unrestricted source.
      remediation:
        - id: console
          desc: |
            1. Navigate to **Firewalls** and open the affected firewall.
            2. On the **Rules** tab, first add narrow inbound rules for only the ports the workload requires, scoped to trusted source CIDRs.
            3. Delete the inbound rule that allows the full port range from `Any IPv4` or `Any IPv6`.
            4. Save the firewall.

            Add the narrow rules before deleting the wide-open rule. Hetzner firewalls deny all other inbound traffic by default, so removing the only inbound rule immediately blocks every connection to the attached servers.
        - id: cli
          desc: |
            `delete-rule` removes one rule at a time, matched by direction, protocol, port, and source. Because the check fails on any inbound all-ports rule, you must repeat the deletion for every protocol that has a wide-open rule and for every unrestricted source, including IPv6. Removing only the `tcp` and `0.0.0.0/0` rule leaves UDP, ICMP, and `::/0` rules in place, so the firewall still fails the check.

            Run `hcloud firewall describe <firewall> -o json` first to enumerate the offending rules, then delete each one:

            ```bash
            hcloud firewall describe <firewall> -o json
            hcloud firewall add-rule <firewall> \
              --direction in --protocol tcp --port 443 \
              --source-ips 0.0.0.0/0,::/0
            hcloud firewall delete-rule <firewall> \
              --direction in --protocol tcp --port any --source-ips 0.0.0.0/0
            hcloud firewall delete-rule <firewall> \
              --direction in --protocol tcp --port any --source-ips ::/0
            hcloud firewall delete-rule <firewall> \
              --direction in --protocol udp --port any --source-ips 0.0.0.0/0
            hcloud firewall delete-rule <firewall> \
              --direction in --protocol udp --port any --source-ips ::/0
            hcloud firewall delete-rule <firewall> \
              --direction in --protocol icmp --source-ips 0.0.0.0/0
            hcloud firewall delete-rule <firewall> \
              --direction in --protocol icmp --source-ips ::/0
            ```

            Adjust the `--port` value to match the rule actually in place (`any`, `1-65535`, or `0-65535`); `--port` is omitted for `icmp`. After deleting the wide-open rules, add narrow per-service rules that expose only the required ports.
        - id: terraform
          desc: |
            Never declare an inbound `rule` whose `port` is `any`, `1-65535`, or `0-65535` with `source_ips` of `0.0.0.0/0` or `::/0`. Replace it with narrow per-service rules:

            ```hcl
            resource "hcloud_firewall" "default" {
              name = "default"

              rule {
                direction  = "in"
                protocol   = "tcp"
                port       = "443"
                source_ips = ["0.0.0.0/0", "::/0"]
              }

              rule {
                direction  = "in"
                protocol   = "tcp"
                port       = "22"
                source_ips = ["203.0.113.0/24"]
              }
            }
            ```
    refs:
      - url: https://docs.hetzner.com/cloud/firewalls/overview/
        title: Hetzner Cloud Firewalls overview

