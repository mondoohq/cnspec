policies:
  - uid: mondoo-junos-security
    name: Mondoo Juniper Junos Security
    version: 1.1.2
    license: BUSL-1.1
    tags:
      mondoo.com/category: security
      mondoo.com/platform: junos,networkdevice
    require:
      - provider: junos
    authors:
      - name: Mondoo, Inc.
        email: hello@mondoo.com
    summary: Secure Juniper Junos routers, switches, and firewalls
    docs:
      desc: |
        The Mondoo Juniper Junos Security policy identifies critical misconfigurations on Juniper devices running Junos OS that could leave your network and security infrastructure vulnerable to attackers. This policy helps organizations detect and remediate hardening gaps before they can be exploited, reducing the likelihood of unauthorized device access, traffic interception, route manipulation, and disruption of protected zones.

        This policy provides security checks across key Junos OS areas:

        - Root login restrictions, cryptographic algorithm validation, and brute-force protection
        - Authentication enforcement and privilege restriction
        - Removal of cleartext protocols including Telnet, FTP, and finger
        - SNMP hardening, including default community removal, access restrictions, and read-only enforcement
        - Centralized syslog with secure transport for tamper-resistant audit trails
        - Policy logging, screen profile enforcement, and untrust zone lockdown
        - Protection against SYN floods, land attacks, teardrop, and other network attacks
        - Validity of security feature licenses

        Learn more about scanning Juniper Junos in the [cnspec Juniper Junos documentation](https://mondoo.com/docs/cnspec/network/junos).

        Have suggestions for new checks in this policy? Visit our [cnspec repository](https://github.com/mondoohq/cnspec).

    groups:
      - title: SSH Hardening
        filters: asset.platform == "junos"
        checks:
          - uid: mondoo-junos-security-ssh-root-login-disabled
          - uid: mondoo-junos-security-ssh-no-weak-ciphers
          - uid: mondoo-junos-security-ssh-no-weak-macs
          - uid: mondoo-junos-security-ssh-no-weak-key-exchanges
          - uid: mondoo-junos-security-ssh-tcp-forwarding-disabled
          - uid: mondoo-junos-security-ssh-connection-limit
          - uid: mondoo-junos-security-ssh-rate-limit
      - title: User Account Security
        filters: asset.platform == "junos"
        checks:
          - uid: mondoo-junos-security-all-users-have-credentials
          - uid: mondoo-junos-security-no-super-user-class-overuse
      - title: Insecure Service Elimination
        filters: asset.platform == "junos"
        checks:
          - uid: mondoo-junos-security-telnet-disabled
          - uid: mondoo-junos-security-ftp-disabled
          - uid: mondoo-junos-security-finger-disabled
      - title: SNMP Security
        filters: |
          asset.platform == "junos"
          junos.snmpCommunities != empty
        checks:
          - uid: mondoo-junos-security-snmp-no-default-communities
          - uid: mondoo-junos-security-snmp-no-read-write
          - uid: mondoo-junos-security-snmp-client-lists
      - title: Logging and Auditing
        filters: asset.platform == "junos"
        checks:
          - uid: mondoo-junos-security-syslog-host-configured
          - uid: mondoo-junos-security-syslog-secure-transport
      - title: Security Zone Hardening
        filters: |
          asset.platform == "junos"
          junos.securityPolicies != empty
        checks:
          - uid: mondoo-junos-security-policy-logging-enabled
          - uid: mondoo-junos-security-zones-have-screens
          - uid: mondoo-junos-security-untrust-zone-minimal-services
      - title: IDS/IPS Screen Profiles
        filters: |
          asset.platform == "junos"
          junos.screenProfiles != empty
        checks:
          - uid: mondoo-junos-security-screen-syn-flood
          - uid: mondoo-junos-security-screen-icmp-ping-death
          - uid: mondoo-junos-security-screen-ip-source-route
          - uid: mondoo-junos-security-screen-tcp-land
          - uid: mondoo-junos-security-screen-ip-tear-drop
          - uid: mondoo-junos-security-screen-tcp-winnuke
      - title: License Compliance
        filters: |
          asset.platform == "junos"
          junos.licenses != empty
        checks:
          - uid: mondoo-junos-security-no-expired-licenses
    scoring_system: average
queries:
  # ==========================================
  # SSH Hardening
  # ==========================================
  - uid: mondoo-junos-security-ssh-root-login-disabled
    title: Ensure root login via SSH is denied
    impact: 95
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-2
      compliance/nis-2: nis-2-21-2-d
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-5
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-1-1
    mql: |
      junos.sshConfig.rootLogin == "deny" || junos.sshConfig.rootLogin == "deny-password"
    docs:
      desc: |
        This check verifies that root login via SSH is denied on the Junos device. Denying root login ensures that administrators authenticate with individual accounts and only escalate privileges when needed.

        **Why this matters**

        The root account has unrestricted access to the entire device. If direct root login via SSH is permitted:

        - Attackers can target the root account directly with brute-force attacks, since it is a well-known username on every device.
        - Successful logins cannot be attributed to individual administrators, undermining audit trails and accountability.
        - All role-based access controls are bypassed, granting full device control without any privilege separation.
        - The principle of least privilege is violated, increasing the blast radius of a compromised credential.

        By denying root login, organizations enforce individual accountability and reduce the risk of unauthorized privileged access to the device.
      audit: |
        To verify the root login setting from the Junos CLI:

        1. Open an SSH session to the device and enter operational mode.
        2. Display the SSH service configuration:

           ```
           show configuration system services ssh
           ```

        3. Inspect the `root-login` statement in the output.

        If `root-login` is set to `deny` or `deny-password`, the check passes. If `root-login` is set to `allow` or the statement is absent (the configuration defaults to allowing root login), the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Before denying root login, verify that at least one named account with the super-user class exists and that you can open an SSH session with it. Denying root login while root is the only usable account cuts off remote management.

            Enter configuration mode, disable root login via SSH, and commit with automatic rollback in case access is lost:

            ```
            configure
            set system services ssh root-login deny
            commit confirmed 5
            ```

            Or allow key-based root login only:

            ```
            configure
            set system services ssh root-login deny-password
            commit confirmed 5
            ```

            Open a new SSH session as a named user to confirm access still works, then make the change permanent:

            ```
            commit
            ```
    refs:
      - url: https://www.juniper.net/documentation/us/en/software/junos/user-access/topics/ref/statement/root-login-edit-system-services-ssh.html
        title: Junos SSH Root Login Configuration

  - uid: mondoo-junos-security-ssh-no-weak-ciphers
    title: Ensure weak SSH ciphers are not configured
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-13
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-11
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-1
      compliance/vda-isa-5: vda-isa-5-5-1-2
    mql: |
      junos.sshConfig.ciphers.containsNone(["arcfour", "arcfour128", "arcfour256", "3des-cbc", "blowfish-cbc", "cast128-cbc"])
    docs:
      desc: |
        This check verifies that no weak or deprecated SSH ciphers are configured on the Junos device. Using only strong ciphers protects the confidentiality of SSH sessions against cryptographic attacks.

        **Why this matters**

        SSH ciphers protect the confidentiality of management sessions to the device. If weak ciphers are configured:

        - RC4 (arcfour) ciphers have known keystream biases that make them cryptographically weak and susceptible to plaintext recovery.
        - 3DES has a limited 64-bit block size that is vulnerable to Sweet32 birthday attacks, allowing data recovery from long-lived sessions.
        - Blowfish and CAST128 share similar 64-bit block size weaknesses that expose them to the same class of attacks.
        - Modern security standards and compliance frameworks require AES-128 or stronger encryption for management traffic.

        By restricting SSH to strong ciphers, organizations ensure that management sessions remain confidential and resistant to known cryptographic attacks.
      audit: |
        To verify the configured SSH ciphers from the Junos CLI:

        1. Open an SSH session to the device and enter operational mode.
        2. Display the SSH service configuration:

           ```
           show configuration system services ssh
           ```

        3. Inspect the `ciphers` statements in the output.

        If no `ciphers` statement lists `arcfour`, `arcfour128`, `arcfour256`, `3des-cbc`, `blowfish-cbc`, or `cast128-cbc`, the check passes. If any of these weak ciphers is configured, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Enter configuration mode with `configure exclusive` so no other administrator can commit a conflicting change mid-session. The `set` command appends to the existing cipher list, so first remove the current list including any weak entries, then configure only strong ciphers. Commit with automatic rollback so a cipher mismatch with your SSH client cannot lock you out:

            ```
            configure exclusive
            delete system services ssh ciphers
            set system services ssh ciphers aes256-gcm@openssh.com
            set system services ssh ciphers aes128-gcm@openssh.com
            set system services ssh ciphers chacha20-poly1305@openssh.com
            set system services ssh ciphers aes256-ctr
            set system services ssh ciphers aes128-ctr
            commit confirmed 5
            ```

            Open a new SSH session to confirm connectivity, then make the change permanent:

            ```
            commit
            ```
    refs:
      - url: https://www.juniper.net/documentation/us/en/software/junos/user-access/topics/ref/statement/ciphers-edit-system-services-ssh.html
        title: Junos SSH Ciphers Configuration

  - uid: mondoo-junos-security-ssh-no-weak-macs
    title: Ensure weak SSH MACs are not configured
    impact: 85
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-13
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-11
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-1
      compliance/vda-isa-5: vda-isa-5-5-1-2
    mql: |
      junos.sshConfig.macs.containsNone(["hmac-md5", "hmac-md5-96", "hmac-sha1-96", "hmac-md5-etm@openssh.com", "hmac-md5-96-etm@openssh.com"])
    docs:
      desc: |
        This check verifies that no weak SSH message authentication codes (MACs) are configured. Strong MACs ensure that SSH session data has not been modified in transit.

        **Why this matters**

        MACs protect the integrity of data exchanged during SSH sessions. If weak MACs are allowed:

        - MD5-based MACs rely on a cryptographically broken hash function that is vulnerable to collision attacks, allowing potential session tampering.
        - Truncated 96-bit MAC variants provide reduced security compared to their full-length counterparts, making forgery more feasible.
        - Compromised integrity checks could allow attackers to modify commands or data within an SSH session without detection.
        - NIST and industry standards require SHA-256 or stronger algorithms for integrity verification.

        By configuring only strong MACs, organizations protect the integrity of management sessions and meet compliance requirements for cryptographic controls.
      audit: |
        To verify the configured SSH MACs from the Junos CLI:

        1. Open an SSH session to the device and enter operational mode.
        2. Display the SSH service configuration:

           ```
           show configuration system services ssh
           ```

        3. Inspect the `macs` statements in the output.

        If no `macs` statement lists `hmac-md5`, `hmac-md5-96`, `hmac-sha1-96`, `hmac-md5-etm@openssh.com`, or `hmac-md5-96-etm@openssh.com`, the check passes. If any of these weak MACs is configured, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Enter configuration mode with `configure exclusive` so no other administrator can commit a conflicting change mid-session. The `set` command appends to the existing MAC list, so first remove the current list including any weak entries, then configure only strong MACs. Commit with automatic rollback so a MAC mismatch with your SSH client cannot lock you out:

            ```
            configure exclusive
            delete system services ssh macs
            set system services ssh macs hmac-sha2-256
            set system services ssh macs hmac-sha2-512
            set system services ssh macs hmac-sha2-256-etm@openssh.com
            set system services ssh macs hmac-sha2-512-etm@openssh.com
            commit confirmed 5
            ```

            Open a new SSH session to confirm connectivity, then make the change permanent:

            ```
            commit
            ```
    refs:
      - url: https://www.juniper.net/documentation/us/en/software/junos/user-access/topics/ref/statement/macs-edit-system-services-ssh.html
        title: Junos SSH MACs Configuration

  - uid: mondoo-junos-security-ssh-no-weak-key-exchanges
    title: Ensure weak SSH key exchange algorithms are not configured
    impact: 85
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-13
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-11
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-1
      compliance/vda-isa-5: vda-isa-5-5-1-2
    mql: |
      junos.sshConfig.keyExchanges.containsNone(["diffie-hellman-group1-sha1", "diffie-hellman-group-exchange-sha1"])
    docs:
      desc: |
        This check verifies that weak SSH key exchange algorithms are not configured. Strong key exchange algorithms ensure that session keys are securely negotiated and that past sessions remain protected.

        **Why this matters**

        Key exchange algorithms establish the shared secret used to encrypt SSH sessions. If weak algorithms are permitted:

        - DH Group 1 uses only 768-bit parameters, which are far too small for modern security and can be broken with current computing resources.
        - SHA-1 based exchanges rely on a hash function with known collision vulnerabilities, weakening the key exchange process.
        - Small Diffie-Hellman groups are vulnerable to Logjam precomputation attacks that can compromise session keys.
        - Without strong key exchange, forward secrecy is undermined, meaning past sessions could be decrypted if long-term keys are later compromised.

        By restricting key exchange to strong algorithms, organizations ensure secure session negotiation and maintain forward secrecy for all management connections.
      audit: |
        To verify the configured SSH key exchange algorithms from the Junos CLI:

        1. Open an SSH session to the device and enter operational mode.
        2. Display the SSH service configuration:

           ```
           show configuration system services ssh
           ```

        3. Inspect the `key-exchange` statements in the output.

        If no `key-exchange` statement lists `diffie-hellman-group1-sha1` or `diffie-hellman-group-exchange-sha1`, the check passes. If either of these weak algorithms is configured, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Enter configuration mode with `configure exclusive` so no other administrator can commit a conflicting change mid-session. The `set` command appends to the existing key-exchange list, so first remove the current list including any weak entries, then configure only strong algorithms. The `group-exchange-sha2` keyword selects the SHA-256 variant of Diffie-Hellman group exchange, which replaces the weak SHA-1 `group-exchange-sha1` that this check flags. Commit with automatic rollback so an algorithm mismatch with your SSH client cannot lock you out:

            ```
            configure exclusive
            delete system services ssh key-exchange
            set system services ssh key-exchange curve25519-sha256
            set system services ssh key-exchange ecdh-sha2-nistp256
            set system services ssh key-exchange ecdh-sha2-nistp384
            set system services ssh key-exchange ecdh-sha2-nistp521
            set system services ssh key-exchange group-exchange-sha2
            commit confirmed 5
            ```

            Open a new SSH session to confirm connectivity, then make the change permanent:

            ```
            commit
            ```
    refs:
      - url: https://www.juniper.net/documentation/us/en/software/junos/user-access/topics/ref/statement/key-exchange-edit-system-services-ssh.html
        title: Junos SSH Key Exchange Configuration

  - uid: mondoo-junos-security-ssh-tcp-forwarding-disabled
    title: Ensure SSH TCP forwarding is disabled
    impact: 75
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ccc-06
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-d
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-6
      compliance/pci-dss-4: pcidss-requirement-2-2-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-1
    mql: |
      junos.sshConfig.tcpForwarding == false
    docs:
      desc: |
        This check verifies that SSH TCP forwarding (port forwarding) is disabled on the Junos device. Disabling TCP forwarding prevents the SSH service from being used as a proxy to tunnel unauthorized traffic through the device.

        **Why this matters**

        SSH TCP forwarding allows users to create encrypted tunnels through the device. If this feature is enabled:

        - Users can tunnel arbitrary traffic through the device, effectively bypassing firewall rules and security policies.
        - Attackers can use the encrypted tunnels to exfiltrate sensitive data without detection by network monitoring tools.
        - Compromised accounts can be leveraged to pivot through the network device and reach otherwise isolated network segments.

        By disabling TCP forwarding, organizations prevent the SSH service from being misused as a network proxy and maintain the integrity of their firewall and segmentation controls.
      audit: |
        To verify the SSH TCP forwarding setting from the Junos CLI:

        1. Open an SSH session to the device and enter operational mode.
        2. Display the SSH service configuration:

           ```
           show configuration system services ssh
           ```

        3. Inspect the output for the `no-tcp-forwarding` statement.

        If the `no-tcp-forwarding` statement is present, the check passes. If it is absent (the configuration defaults to permitting TCP forwarding), the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Enter configuration mode and disable SSH TCP forwarding:

            ```
            configure
            set system services ssh no-tcp-forwarding
            commit
            ```
    refs:
      - url: https://www.juniper.net/documentation/us/en/software/junos/user-access/topics/ref/statement/no-tcp-forwarding-edit-system-services-ssh.html
        title: Junos SSH TCP Forwarding Configuration

  - uid: mondoo-junos-security-ssh-connection-limit
    title: Ensure SSH connection limit is configured
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-6
      compliance/nis-2: nis-2-21-2-d
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-10
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-10
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-1-1
    mql: |
      junos.sshConfig.connectionLimit > 0
    docs:
      desc: |
        This check verifies that a limit is configured for unauthenticated SSH connections, mitigating brute-force and denial-of-service attacks against the SSH service.

        **Why this matters**

        The SSH connection limit controls how many unauthenticated sessions can be pending at once. Without a connection limit configured:

        - Attackers can open a large number of concurrent unauthenticated sessions, enabling rapid brute-force credential guessing.
        - Connection floods can exhaust device resources such as memory and CPU, degrading overall device performance.
        - Legitimate administrators may be unable to connect to the device during an active attack due to resource exhaustion.

        By setting a connection limit, organizations ensure that the SSH service remains available to authorized users even during brute-force or denial-of-service attempts.
      audit: |
        To verify the SSH connection limit from the Junos CLI:

        1. Open an SSH session to the device and enter operational mode.
        2. Display the SSH service configuration:

           ```
           show configuration system services ssh
           ```

        3. Inspect the output for the `connection-limit` statement.

        If the `connection-limit` statement is present with a value greater than zero, the check passes. If it is absent, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Enter configuration mode and configure an SSH connection limit:

            ```
            configure
            set system services ssh connection-limit 5
            commit
            ```
    refs:
      - url: https://www.juniper.net/documentation/us/en/software/junos/user-access/topics/ref/statement/connection-limit-edit-system-services-ssh.html
        title: Junos SSH Connection Limit Configuration

  - uid: mondoo-junos-security-ssh-rate-limit
    title: Ensure SSH rate limit is configured
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-6
      compliance/nis-2: nis-2-21-2-d
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-10
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-10
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-1-1
    mql: |
      junos.sshConfig.rateLimit > 0
    docs:
      desc: |
        This check verifies that a rate limit is configured for SSH authentication attempts, slowing down automated credential guessing attacks.

        **Why this matters**

        The SSH rate limit controls how many authentication attempts are allowed per connection per minute. Without a rate limit:

        - Automated credential guessing tools can attempt thousands of password combinations in a short time.
        - The SSH service may become degraded under sustained brute-force attacks, affecting availability for legitimate users.
        - Attackers face no throttling penalty, making brute-force attacks significantly more likely to succeed.

        By configuring a rate limit, organizations slow down automated attacks and reduce the likelihood of successful credential compromise while keeping the SSH service responsive for authorized administrators.
      audit: |
        To verify the SSH rate limit from the Junos CLI:

        1. Open an SSH session to the device and enter operational mode.
        2. Display the SSH service configuration:

           ```
           show configuration system services ssh
           ```

        3. Inspect the output for the `rate-limit` statement.

        If the `rate-limit` statement is present with a value greater than zero, the check passes. If it is absent, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Enter configuration mode and configure an SSH rate limit:

            ```
            configure
            set system services ssh rate-limit 4
            commit
            ```
    refs:
      - url: https://www.juniper.net/documentation/us/en/software/junos/user-access/topics/ref/statement/rate-limit-edit-system-services-ssh.html
        title: Junos SSH Rate Limit Configuration

  # ==========================================
  # User Account Security
  # ==========================================
  - uid: mondoo-junos-security-all-users-have-credentials
    title: Ensure all local users have authentication credentials
    impact: 95
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-d
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-5
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-7
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-1-3
    mql: |
      junos.users.all(hasPassword == true || sshKeys.length > 0)
    docs:
      desc: |
        This check verifies that every local user account has either a password or SSH keys configured for authentication. Accounts without credentials represent a serious security gap that can be exploited for unauthorized access.

        **Why this matters**

        Local user accounts are a primary means of authenticating to the device. If any account lacks authentication credentials:

        - The account can be accessed without providing any form of authentication, allowing anyone with network access to log in.
        - All security frameworks and compliance standards require proper authentication for every account on network infrastructure.
        - Credentialless accounts are trivial targets that require no effort for an attacker to exploit.

        By ensuring every account has credentials, organizations close a fundamental authentication gap and prevent unauthorized access through unprotected accounts.
      audit: |
        To verify that every local user has authentication credentials from the Junos CLI:

        1. Open an SSH session to the device and enter operational mode.
        2. Display the login configuration:

           ```
           show configuration system login
           ```

        3. For each `user` block, confirm an `authentication` statement is present with either an `encrypted-password` or one or more SSH public keys.

        If every user account has a password or SSH key configured, the check passes. If any user account has no `authentication` statement, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Enter configuration mode, then set a password interactively. Junos prompts for the password and stores only the hash:

            ```
            configure
            set system login user <username> authentication plain-text-password
            commit
            ```

            Or supply a pre-computed password hash directly:

            ```
            configure
            set system login user <username> authentication encrypted-password "<hash>"
            commit
            ```

            Or configure SSH key authentication:

            ```
            configure
            set system login user <username> authentication ssh-ed25519 "<public-key>"
            commit
            ```

            If the account is no longer needed, remove it instead of adding credentials:

            ```
            configure
            delete system login user <username>
            commit
            ```
    refs:
      - url: https://www.juniper.net/documentation/us/en/software/junos/user-access/topics/topic-map/user-access-authentication.html
        title: Junos User Authentication Configuration

  - uid: mondoo-junos-security-no-super-user-class-overuse
    title: Ensure minimal number of users have super-user privileges
    impact: 85
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-2
      compliance/nis-2: nis-2-21-2-d
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-5
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-3-1
      compliance/vda-isa-5: vda-isa-5-4-1-1
    mql: |
      junos.users.where(class == "super-user").length <= 3
    docs:
      desc: |
        This check verifies that no more than three user accounts are assigned the super-user login class. Limiting the number of privileged accounts reduces the attack surface and potential impact of credential compromise.

        **Why this matters**

        The super-user login class grants unrestricted access to the device. If too many accounts have this privilege level:

        - Each super-user account is a potential target for credential compromise, and more accounts mean a larger attack surface.
        - Most administrators do not need full super-user access to perform their daily tasks, violating the principle of least privilege.
        - A compromised super-user account gives an attacker complete control over the device, and limiting these accounts reduces that exposure.

        By restricting the number of super-user accounts, organizations minimize the risk of privileged credential compromise and enforce least-privilege access across their network infrastructure.
      audit: |
        To verify how many users hold the super-user login class from the Junos CLI:

        1. Open an SSH session to the device and enter operational mode.
        2. Display the login configuration:

           ```
           show configuration system login
           ```

        3. Count the `user` blocks whose `class` statement is set to `super-user`.

        If three or fewer accounts are assigned the `super-user` class, the check passes. If more than three accounts hold the `super-user` class, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Do not demote the account you are currently logged in with, and always keep at least one working super-user account. The `operator` class cannot enter configuration mode, so accounts moved to it lose the ability to change the device configuration.

            Enter configuration mode with `configure exclusive` so no other administrator can commit a conflicting change mid-session, then reassign users who do not need full access to a more restrictive login class, committing with automatic rollback:

            ```
            configure exclusive
            set system login user <username> class operator
            commit confirmed 5
            ```

            Or create a custom login class with targeted permissions:

            ```
            configure exclusive
            set system login class limited-admin permissions configure
            set system login class limited-admin permissions view
            set system login user <username> class limited-admin
            commit confirmed 5
            ```

            Confirm that affected users retain the access they need and that a super-user session still works, then make the change permanent:

            ```
            commit
            ```
    refs:
      - url: https://www.juniper.net/documentation/us/en/software/junos/user-access/topics/topic-map/user-access-login-classes.html
        title: Junos Login Classes Configuration

  # ==========================================
  # Insecure Service Elimination
  # ==========================================
  - uid: mondoo-junos-security-telnet-disabled
    title: Ensure Telnet service is disabled
    impact: 95
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-6
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-1
      compliance/vda-isa-5: vda-isa-5-5-1-2
    mql: |
      junos.services.none(name == "telnet")
    docs:
      desc: |
        This check verifies that the Telnet service is not enabled. Telnet transmits all data including credentials in clear text and should be replaced with SSH for all remote management access.

        **Why this matters**

        Telnet is an inherently insecure protocol with no encryption or integrity protection. If Telnet is enabled on the device:

        - Usernames and passwords are sent in plain text and can be captured by anyone with access to a packet sniffer on the network path.
        - Active Telnet sessions can be intercepted and hijacked, allowing an attacker to take over an administrative session.
        - Data transmitted over Telnet has no integrity verification, meaning commands and responses can be silently altered in transit.

        By disabling Telnet and using SSH exclusively, organizations protect management credentials and session data from interception and tampering.
      audit: |
        To verify that the Telnet service is disabled from the Junos CLI:

        1. Open an SSH session to the device and enter operational mode.
        2. Display the configured system services:

           ```
           show configuration system services
           ```

        3. Inspect the output for a `telnet` statement.

        If no `telnet` statement is present, the check passes. If `telnet` appears under `system services`, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Before removing Telnet, ensure SSH is enabled and verify that you can open an SSH session to the device. If Telnet is your only working management path, removing it without a tested SSH login cuts off remote access.

            Enter configuration mode and enable SSH if it is not already configured:

            ```
            configure
            set system services ssh
            commit
            ```

            Open an SSH session to confirm access, then enter configuration mode and remove Telnet with automatic rollback:

            ```
            configure
            delete system services telnet
            commit confirmed 5
            ```

            Confirm that your SSH session still works, then make the change permanent:

            ```
            commit
            ```
    refs:
      - url: https://www.juniper.net/documentation/us/en/software/junos/user-access/topics/topic-map/junos-software-remote-access-overview.html
        title: Junos Remote Access Configuration

  - uid: mondoo-junos-security-ftp-disabled
    title: Ensure FTP service is disabled
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-6
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-1
      compliance/vda-isa-5: vda-isa-5-5-1-2
    mql: |
      junos.services.none(name == "ftp")
    docs:
      desc: |
        This check verifies that the FTP service is not enabled. FTP transmits credentials and data in plain text and should be replaced with SCP or SFTP for secure file transfers.

        **Why this matters**

        FTP is an unencrypted file transfer protocol with well-known security weaknesses. If FTP is enabled on the device:

        - Authentication credentials are transmitted in clear text and can be easily intercepted by any observer on the network.
        - File transfers are completely unencrypted, allowing sensitive configuration data or firmware images to be captured in transit.
        - FTP server implementations have a long history of exploitable vulnerabilities that can provide an additional attack vector.

        By disabling FTP and using SCP instead, organizations ensure that file transfers to and from the device are encrypted and authenticated.
      audit: |
        To verify that the FTP service is disabled from the Junos CLI:

        1. Open an SSH session to the device and enter operational mode.
        2. Display the configured system services:

           ```
           show configuration system services
           ```

        3. Inspect the output for an `ftp` statement.

        If no `ftp` statement is present, the check passes. If `ftp` appears under `system services`, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            SCP is automatically available when SSH is enabled. First, from operational mode, verify SSH is configured so you retain a secure file-transfer path after FTP is removed:

            ```
            show configuration system services ssh
            ```

            Then enter configuration mode, disable FTP, and commit:

            ```
            configure
            delete system services ftp
            commit
            ```

            To transfer files using SCP from an external host:

            ```
            scp <file> <user>@<junos-device>:/var/tmp/
            ```
    refs:
      - url: https://www.juniper.net/documentation/us/en/software/junos/user-access/topics/topic-map/junos-software-remote-access-overview.html
        title: Junos Remote Access Configuration

  - uid: mondoo-junos-security-finger-disabled
    title: Ensure finger service is disabled
    impact: 85
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ccc-06
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-6
      compliance/pci-dss-4: pcidss-requirement-2-2-1
      compliance/soc2-2017: soc2-control-cc6-7-1
      compliance/vda-isa-5: vda-isa-5-5-2-1
    mql: |
      junos.services.none(name == "finger")
    docs:
      desc: |
        This check verifies that the finger service is not enabled. The finger protocol exposes user account information without any authentication, aiding attacker reconnaissance efforts.

        **Why this matters**

        The finger protocol was designed for user information lookup but has no security mechanisms. If the finger service is enabled:

        - It reveals usernames, login times, and idle times to any unauthenticated user who queries the service.
        - Attackers use finger to enumerate valid user accounts, which are then targeted in brute-force authentication attacks.
        - The protocol provides no authentication or access controls, meaning anyone with network access can query it.

        By disabling the finger service, organizations eliminate an unnecessary information disclosure vector and reduce the data available for attacker reconnaissance.
      audit: |
        To verify that the finger service is disabled from the Junos CLI:

        1. Open an SSH session to the device and enter operational mode.
        2. Display the configured system services:

           ```
           show configuration system services
           ```

        3. Inspect the output for a `finger` statement.

        If no `finger` statement is present, the check passes. If `finger` appears under `system services`, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Enter configuration mode and disable the finger service:

            ```
            configure
            delete system services finger
            commit
            ```
    refs:
      - url: https://www.juniper.net/documentation/us/en/software/junos/user-access/topics/topic-map/junos-software-remote-access-overview.html
        title: Junos Remote Access Configuration

  # ==========================================
  # SNMP Security
  # ==========================================
  - uid: mondoo-junos-security-snmp-no-default-communities
    title: Ensure SNMP default community strings are not used
    impact: 95
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-d
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-5
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-7
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-1-3
    mql: |
      junos.snmpCommunities.none(name.in(["public", "private"]))
    docs:
      desc: |
        This check verifies that default SNMP community strings ("public" and "private") are not configured. Default community strings are universally known and are the first credentials attackers attempt when probing SNMP services.

        **Why this matters**

        SNMP community strings act as passwords for accessing device information. If default strings remain configured:

        - The strings "public" and "private" are universally known and are included in every automated scanning tool, making the device trivially accessible.
        - An attacker with read access through SNMP can extract device configuration details, routing tables, interface data, and other sensitive information.
        - If a default read-write community string is present, attackers can remotely modify the device configuration to create backdoors or disable security features.

        By replacing default community strings with unique, complex values, organizations prevent trivial unauthorized access to device information through SNMP.
      audit: |
        To verify that default SNMP community strings are not configured from the Junos CLI:

        1. Open an SSH session to the device and enter operational mode.
        2. Display the SNMP configuration:

           ```
           show configuration snmp
           ```

        3. Inspect each `community` statement for the names `public` and `private`.

        If no community is named `public` or `private`, the check passes. If either default community name is configured, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Enter configuration mode, remove default communities, and configure unique strings:

            ```
            configure
            delete snmp community public
            delete snmp community private
            set snmp community <unique-string> authorization read-only
            set snmp community <unique-string> clients <management-network>/24
            commit
            ```
    refs:
      - url: https://www.juniper.net/documentation/us/en/software/junos/network-mgmt/topics/topic-map/configuring-snmpv3.html
        title: Junos SNMP Configuration

  - uid: mondoo-junos-security-snmp-no-read-write
    title: Ensure SNMP communities do not have read-write access
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-2
      compliance/nis-2: nis-2-21-2-d
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-5
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-3-1
      compliance/vda-isa-5: vda-isa-5-4-1-1
    mql: |
      junos.snmpCommunities.all(authorization == "read-only")
    docs:
      desc: |
        This check verifies that no SNMP community is configured with read-write access. Read-write SNMP allows remote configuration changes via SNMP SET operations, which poses a significant risk to device integrity.

        **Why this matters**

        SNMP read-write access grants the ability to modify device configuration remotely. If any community has read-write authorization:

        - Attackers who obtain the community string can modify the device configuration via SNMP SET operations, potentially disabling security features or creating backdoors.
        - SNMP write access enables configuration tampering that may go unnoticed, since changes made through SNMP may not generate the same audit trail as CLI changes.
        - SNMPv1 and v2c community strings are transmitted in clear text, meaning read-write credentials can be captured from network traffic.

        By restricting all SNMP communities to read-only access, organizations prevent unauthorized remote configuration changes and limit the impact of a compromised community string.
      audit: |
        To verify the authorization level of each SNMP community from the Junos CLI:

        1. Open an SSH session to the device and enter operational mode.
        2. Display the SNMP configuration:

           ```
           show configuration snmp
           ```

        3. Inspect the `authorization` statement under each `community` block.

        If every community has `authorization` set to `read-only`, the check passes. If any community has `authorization read-write`, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Removing read-write access stops any management system that relies on SNMP SET operations from making changes through this community, so confirm no orchestration or monitoring tooling depends on write access first. Enter configuration mode, change the community to read-only, and commit with automatic rollback so a loss of expected management access can be recovered:

            ```
            configure
            set snmp community <community-name> authorization read-only
            commit confirmed 5
            ```

            Confirm that monitoring still works as expected, then make the change permanent:

            ```
            commit
            ```
    refs:
      - url: https://www.juniper.net/documentation/us/en/software/junos/network-mgmt/topics/topic-map/configuring-snmpv3.html
        title: Junos SNMP Configuration

  - uid: mondoo-junos-security-snmp-client-lists
    title: Ensure SNMP communities restrict client access
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-d
      compliance/nist-csf-1: nist-csf-1-pr-ac-3
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-4
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-3
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-4-1-1
    mql: |
      junos.snmpCommunities.all(clients.length > 0)
    docs:
      desc: |
        This check verifies that all SNMP communities have client address restrictions configured, limiting which hosts can query the device via SNMP.

        **Why this matters**

        SNMP client lists control which IP addresses are allowed to communicate with the SNMP service. Without client restrictions:

        - Any host on the network can query the device for sensitive information, greatly increasing the exposure of the SNMP service.
        - Application-level access control lists provide an important defense-in-depth layer that complements network firewall rules.
        - Unrestricted access makes it easier for attackers to conduct brute-force community string guessing from any location on the network.

        By restricting SNMP access to specific management hosts or networks, organizations reduce the attack surface and add a layer of access control beyond perimeter firewalls.
      audit: |
        To verify that SNMP communities restrict client access from the Junos CLI:

        1. Open an SSH session to the device and enter operational mode.
        2. Display the SNMP configuration:

           ```
           show configuration snmp
           ```

        3. Inspect each `community` block for `clients` statements that list permitted source addresses or prefixes.

        If every community has at least one `clients` entry, the check passes. If any community has no `clients` restriction, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            A client list blocks every source address that is not explicitly permitted, so include all of your existing SNMP pollers or they will stop receiving data. Enter configuration mode, restrict the community to specific client addresses, and commit with automatic rollback so a missed poller can be recovered:

            ```
            configure
            set snmp community <community-name> clients <management-host>/32
            set snmp community <community-name> clients <management-network>/24
            commit confirmed 5
            ```

            Confirm that all expected pollers still reach the device, then make the change permanent:

            ```
            commit
            ```
    refs:
      - url: https://www.juniper.net/documentation/us/en/software/junos/network-mgmt/topics/topic-map/configuring-snmpv3.html
        title: Junos SNMP Configuration

  # ==========================================
  # Logging and Auditing
  # ==========================================
  - uid: mondoo-junos-security-syslog-host-configured
    title: Ensure remote syslog host is configured
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-4
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    mql: |
      junos.syslogHosts.length > 0
    docs:
      desc: |
        This check verifies that at least one remote syslog host is configured. Remote logging ensures that audit records are preserved even if the device is compromised or fails.

        **Why this matters**

        Centralized remote logging is a critical component of security monitoring and incident response. Without a remote syslog host configured:

        - An attacker who compromises the device can destroy all local log evidence of the intrusion, eliminating the audit trail.
        - Local logs are lost if the device experiences a hardware failure, is wiped, or runs out of storage space.
        - Security teams cannot correlate events across multiple devices, reducing their ability to detect coordinated attacks.
        - Integration with SIEM platforms and security monitoring tools is not possible without remote log forwarding.

        By configuring remote syslog, organizations create a tamper-resistant audit trail that supports threat detection, incident response, and compliance requirements.
      audit: |
        To verify that a remote syslog host is configured from the Junos CLI:

        1. Open an SSH session to the device and enter operational mode.
        2. Display the syslog configuration:

           ```
           show configuration system syslog
           ```

        3. Inspect the output for one or more `host` statements.

        If at least one `host` statement is present under `system syslog`, the check passes. If no `host` statement is configured, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Enter configuration mode and configure a remote syslog host:

            ```
            configure
            set system syslog host <syslog-server> any notice
            set system syslog host <syslog-server> authorization info
            set system syslog host <syslog-server> interactive-commands info
            commit
            ```
    refs:
      - url: https://www.juniper.net/documentation/us/en/software/junos/network-mgmt/topics/topic-map/syslog-messages-configuring.html
        title: Junos Syslog Configuration

  - uid: mondoo-junos-security-syslog-secure-transport
    title: Ensure syslog uses secure transport
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-1
      compliance/vda-isa-5: vda-isa-5-5-1-2
    mql: |
      junos.syslogHosts.all(transport == "tcp" || transport == "tls")
    docs:
      desc: |
        This check verifies that all syslog hosts use TCP or TLS transport instead of UDP. Reliable and encrypted transport ensures that security-critical log data is delivered intact and protected from eavesdropping.

        **Why this matters**

        The transport protocol determines the reliability and confidentiality of log delivery. If UDP syslog is used:

        - UDP provides no delivery guarantee, meaning security-critical log messages can be silently dropped during network congestion without any indication of loss.
        - Log data is transmitted in clear text, exposing sensitive information such as usernames, IP addresses, and security events to anyone monitoring the network.
        - UDP syslog messages can be spoofed by an attacker to inject false log entries, potentially masking malicious activity or triggering false alerts.
        - TLS transport provides both encryption and reliable delivery, addressing all of these concerns.

        By requiring TCP or TLS transport for syslog, organizations ensure that audit data is delivered reliably and protected from interception or manipulation.
      audit: |
        To verify the transport protocol of each syslog host from the Junos CLI:

        1. Open an SSH session to the device and enter operational mode.
        2. Display the syslog configuration:

           ```
           show configuration system syslog
           ```

        3. Inspect the `transport` statement under each `host` block.

        If every syslog host uses `transport tcp` or `transport tls`, the check passes. If any host uses UDP transport (the default when no `transport` statement is present), the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Confirm the collector is listening for syslog on the chosen transport and port before you commit. If the device sends to a transport the collector does not accept, log delivery stops silently and you lose audit visibility.

            Enter configuration mode and configure TLS transport for encrypted and reliable log delivery. The collector must accept syslog over TLS, which conventionally uses port 6514. Commit with automatic rollback so a transport mismatch can be recovered:

            ```
            configure
            set system syslog host <syslog-server> transport tls
            set system syslog host <syslog-server> port 6514
            commit confirmed 5
            ```

            If the collector does not support TLS, configure TCP transport instead. TCP provides reliable delivery but does not encrypt log data in transit:

            ```
            configure
            set system syslog host <syslog-server> transport tcp
            commit confirmed 5
            ```

            Confirm the collector is receiving logs over the new transport, then make the change permanent:

            ```
            commit
            ```
    refs:
      - url: https://www.juniper.net/documentation/us/en/software/junos/network-mgmt/topics/topic-map/syslog-messages-configuring.html
        title: Junos Syslog Configuration

  # ==========================================
  # Security Zone Hardening
  # ==========================================
  - uid: mondoo-junos-security-policy-logging-enabled
    title: Ensure security policies have session logging enabled
    impact: 85
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-16
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    mql: |
      junos.securityPolicies.all(logInit == true || logClose == true)
    docs:
      desc: |
        This check verifies that all security policies have at least session-init or session-close logging enabled. Policy logging provides essential visibility into the traffic flowing through the firewall.

        **Why this matters**

        Security policy logs record which traffic is permitted or denied by the firewall. Without policy logging enabled:

        - There is no visibility into what traffic the firewall is permitting or denying, making it impossible to verify that policies are working as intended.
        - Unusual traffic patterns and potential threats cannot be detected because there is no record of firewall decisions to analyze.
        - Incident response efforts are severely hampered without policy logs that show attack attempts, lateral movement, and data exfiltration.
        - Forensic reconstruction of attack timelines requires session logs that document the sequence of permitted and denied connections.

        By enabling session logging on all security policies, organizations gain the visibility needed for threat detection, incident response, and compliance auditing.
      audit: |
        To verify that security policies have session logging enabled from the Junos CLI:

        1. Open an SSH session to the device and enter operational mode.
        2. Display the security policy configuration:

           ```
           show configuration security policies
           ```

        3. Inspect the `then` action of each policy for a `log session-init` or `log session-close` statement.

        If every policy has at least `session-init` or `session-close` logging configured, the check passes. If any policy has no logging statement, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Enter configuration mode and enable logging on security policies:

            ```
            configure
            set security policies from-zone <src> to-zone <dst> policy <name> then log session-init
            set security policies from-zone <src> to-zone <dst> policy <name> then log session-close
            commit
            ```
    refs:
      - url: https://www.juniper.net/documentation/us/en/software/junos/security-policies/topics/topic-map/security-policy-logging.html
        title: Junos Security Policy Logging

  - uid: mondoo-junos-security-zones-have-screens
    title: Ensure untrust security zones have screen profiles applied
    impact: 85
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: nis-2-21-2-c
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-6
    mql: |
      junos.securityZones.where(name == "untrust").all(screen != "")
    docs:
      desc: |
        This check verifies that untrust security zones have IDS/IPS screen profiles applied. Screen profiles inspect packets before security policies are evaluated, providing an efficient first line of defense against network attacks.

        **Why this matters**

        Screen profiles provide packet-level inspection at the perimeter before policy evaluation occurs. Without screen profiles on untrust zones:

        - The device has no protection against denial-of-service attacks such as SYN floods, ICMP floods, and UDP floods that can overwhelm device resources.
        - Reconnaissance techniques including IP sweeps, port scans, and OS fingerprinting go undetected and unblocked.
        - Malformed packets and protocol violations pass through to internal systems without any anomaly detection.
        - Attack traffic that could be efficiently dropped at the perimeter instead consumes resources during full policy evaluation.

        By applying screen profiles to untrust zones, organizations establish a high-performance first line of defense that mitigates common network attacks before they reach the policy engine.
      audit: |
        To verify that untrust security zones have a screen profile applied from the Junos CLI:

        1. Open an SSH session to the device and enter operational mode.
        2. Display the security zone configuration:

           ```
           show configuration security zones
           ```

        3. Inspect the `untrust` zone block for a `screen` statement.

        If every zone named `untrust` has a `screen` profile assigned, the check passes. If an untrust zone has no `screen` statement, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Enter configuration mode, then create and apply a screen profile to the untrust zone:

            ```
            configure
            set security screen ids-option untrust-screen icmp ping-death
            set security screen ids-option untrust-screen ip source-route-option
            set security screen ids-option untrust-screen tcp syn-flood
            set security screen ids-option untrust-screen tcp land
            set security zones security-zone untrust screen untrust-screen
            commit
            ```
    refs:
      - url: https://www.juniper.net/documentation/us/en/software/junos/security-policies/topics/topic-map/security-screen-ids.html
        title: Junos Screen IDS Configuration

  - uid: mondoo-junos-security-untrust-zone-minimal-services
    title: Ensure untrust zone does not expose insecure host-inbound services
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ccc-06
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-d
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-6
      compliance/pci-dss-4: pcidss-requirement-2-2-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-1
    mql: |
      junos.securityZones.where(name == "untrust").all(
        hostInboundServices.containsNone(["telnet", "ftp", "finger", "http", "snmp", "all"])
      )
    docs:
      desc: |
        This check verifies that the untrust zone does not allow insecure or unnecessary host-inbound services. Exposing management services to untrusted networks gives attackers direct access to the device control plane.

        **Why this matters**

        Host-inbound services determine which management protocols are accessible from a given security zone. If insecure services are exposed on the untrust zone:

        - Each enabled service is a potential entry point for attackers coming from untrusted networks, expanding the device's attack surface.
        - Insecure protocols like Telnet, FTP, finger, and HTTP transmit data in clear text and should never be exposed to untrusted networks.
        - Enabling SNMP on untrusted zones allows external attackers to perform device reconnaissance and potentially modify the configuration.
        - Using the "all" keyword enables every host-inbound service, including insecure ones, creating maximum exposure.

        By restricting host-inbound services on the untrust zone to only essential encrypted protocols, organizations minimize the control plane attack surface exposed to untrusted networks.
      audit: |
        To verify the host-inbound services on the untrust zone from the Junos CLI:

        1. Open an SSH session to the device and enter operational mode.
        2. Display the security zone configuration:

           ```
           show configuration security zones
           ```

        3. Inspect the `host-inbound-traffic system-services` statements under the `untrust` zone block.

        If the untrust zone exposes none of `telnet`, `ftp`, `finger`, `http`, `snmp`, or `all`, the check passes. If any of these insecure services is permitted, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            If the device is managed through the untrust zone, removing the `all` keyword also removes SSH and every other inbound service. The removals and the explicit re-add of SSH must be staged and committed together in a single commit, or a commit between the deletes and the re-add will cut off management access. Enter configuration mode with `configure exclusive` so no other administrator can commit a partial change, and end with `commit confirmed 5` so access is automatically restored if the change locks you out.

            Remove the `all` keyword and the insecure host-inbound services, re-add only the secure services you still need such as SSH or IKE, and commit the whole change atomically with automatic rollback:

            ```
            configure exclusive
            delete security zones security-zone untrust host-inbound-traffic system-services all
            delete security zones security-zone untrust host-inbound-traffic system-services telnet
            delete security zones security-zone untrust host-inbound-traffic system-services ftp
            delete security zones security-zone untrust host-inbound-traffic system-services finger
            delete security zones security-zone untrust host-inbound-traffic system-services http
            delete security zones security-zone untrust host-inbound-traffic system-services snmp
            set security zones security-zone untrust host-inbound-traffic system-services ssh
            commit confirmed 5
            ```

            Verify management access still works, then make the change permanent:

            ```
            commit
            ```
    refs:
      - url: https://www.juniper.net/documentation/us/en/software/junos/security-policies/topics/topic-map/security-zone-configuration.html
        title: Junos Security Zone Configuration

  # ==========================================
  # IDS/IPS Screen Profiles
  # ==========================================
  - uid: mondoo-junos-security-screen-syn-flood
    title: Ensure screen profiles have TCP SYN flood protection enabled
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: nis-2-21-2-c
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-5
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-6
    mql: |
      junos.screenProfiles.all(tcpSynFlood == true)
    docs:
      desc: |
        This check verifies that all screen profiles have TCP SYN flood protection enabled. SYN flood attacks exhaust device connection tables with half-open connections, disrupting legitimate traffic.

        **Why this matters**

        TCP SYN flood attacks are among the most common denial-of-service techniques targeting network devices. Without SYN flood protection:

        - Attackers can fill the device connection table with half-open connections, preventing legitimate traffic from being processed.
        - Critical services behind the firewall become unavailable when the connection table is exhausted, causing widespread disruption.
        - SYN floods remain one of the most prevalent and effective denial-of-service techniques used against network infrastructure.
        - Junos SYN flood protection uses SYN proxy to validate connections before committing device resources, efficiently mitigating these attacks.

        By enabling SYN flood protection, organizations defend against a common and effective denial-of-service attack vector while ensuring continued availability of critical services.
      audit: |
        To verify that screen profiles have TCP SYN flood protection from the Junos CLI:

        1. Open an SSH session to the device and enter operational mode.
        2. Display the screen configuration:

           ```
           show configuration security screen
           ```

        3. Inspect each `ids-option` block for a `tcp syn-flood` statement.

        If every screen profile has `tcp syn-flood` protection configured, the check passes. If any screen profile omits it, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Enter configuration mode and enable SYN flood protection:

            ```
            configure
            set security screen ids-option <screen-name> tcp syn-flood alarm-threshold 1024
            set security screen ids-option <screen-name> tcp syn-flood attack-threshold 200
            set security screen ids-option <screen-name> tcp syn-flood timeout 20
            commit
            ```
    refs:
      - url: https://www.juniper.net/documentation/us/en/software/junos/security-policies/topics/topic-map/security-screen-ids.html
        title: Junos Screen IDS Configuration

  - uid: mondoo-junos-security-screen-icmp-ping-death
    title: Ensure screen profiles have ICMP ping-of-death protection enabled
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: nis-2-21-2-c
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-5
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-6
    mql: |
      junos.screenProfiles.all(icmpPingDeath == true)
    docs:
      desc: |
        This check verifies that all screen profiles have ICMP ping-of-death protection enabled. Ping-of-death attacks use oversized ICMP packets to cause buffer overflows and system instability in vulnerable systems.

        **Why this matters**

        Oversized ICMP packets exploit buffer handling weaknesses in network stacks. Without ping-of-death protection enabled:

        - Oversized ICMP packets can trigger buffer overflows that cause system crashes or instability on vulnerable devices and hosts.
        - Malicious ICMP traffic can destabilize routers and firewalls along the packet path, causing cascading network disruptions.
        - An entire class of ICMP-based attacks is left unmitigated at the perimeter, allowing them to reach internal systems.

        By enabling ping-of-death protection, organizations block oversized ICMP packets at the perimeter and protect internal systems from this class of attacks.
      audit: |
        To verify that screen profiles have ICMP ping-of-death protection from the Junos CLI:

        1. Open an SSH session to the device and enter operational mode.
        2. Display the screen configuration:

           ```
           show configuration security screen
           ```

        3. Inspect each `ids-option` block for an `icmp ping-death` statement.

        If every screen profile has `icmp ping-death` protection configured, the check passes. If any screen profile omits it, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Enter configuration mode and enable ping-of-death protection:

            ```
            configure
            set security screen ids-option <screen-name> icmp ping-death
            commit
            ```
    refs:
      - url: https://www.juniper.net/documentation/us/en/software/junos/security-policies/topics/topic-map/security-screen-ids.html
        title: Junos Screen IDS Configuration

  - uid: mondoo-junos-security-screen-ip-source-route
    title: Ensure screen profiles have IP source route option protection enabled
    impact: 85
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: nis-2-21-2-c
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-6
    mql: |
      junos.screenProfiles.all(ipSourceRoute == true)
    docs:
      desc: |
        This check verifies that all screen profiles block IP packets with the source route option set. Source routing allows senders to specify the route a packet takes through the network, which attackers exploit to bypass security controls.

        **Why this matters**

        IP source routing is a legacy feature with no legitimate use in modern networks. If source-routed packets are allowed:

        - Attackers can use source routing to circumvent firewall rules and routing policies by specifying a path that avoids security inspection points.
        - Source routing enables IP spoofing by making packets appear to originate from trusted network segments.
        - Traffic can be redirected through attacker-controlled devices, enabling man-in-the-middle attacks on otherwise secure communications.
        - There is no legitimate use case for source routing in modern production networks, so blocking it carries no operational impact.

        By blocking source-routed packets, organizations eliminate an attack technique that can bypass firewalls and enable spoofing, with no impact on legitimate traffic.
      audit: |
        To verify that screen profiles block the IP source route option from the Junos CLI:

        1. Open an SSH session to the device and enter operational mode.
        2. Display the screen configuration:

           ```
           show configuration security screen
           ```

        3. Inspect each `ids-option` block for an `ip source-route-option` statement.

        If every screen profile has `ip source-route-option` protection configured, the check passes. If any screen profile omits it, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Enter configuration mode and enable source route option protection:

            ```
            configure
            set security screen ids-option <screen-name> ip source-route-option
            commit
            ```
    refs:
      - url: https://www.juniper.net/documentation/us/en/software/junos/security-policies/topics/topic-map/security-screen-ids.html
        title: Junos Screen IDS Configuration

  - uid: mondoo-junos-security-screen-tcp-land
    title: Ensure screen profiles have TCP land attack protection enabled
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: nis-2-21-2-c
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-5
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-6
    mql: |
      junos.screenProfiles.all(tcpLand == true)
    docs:
      desc: |
        This check verifies that all screen profiles have TCP land attack protection enabled. Land attacks send TCP packets where the source and destination addresses are identical, causing the device to enter a processing loop.

        **Why this matters**

        Land attacks exploit TCP stack behavior by creating self-referencing connections. Without land attack protection:

        - The device is forced to continuously process self-addressed packets, consuming CPU resources and degrading performance.
        - Sustained land attacks can cause CPU exhaustion and service degradation, potentially taking the device offline.
        - Land attacks are a well-known and easily executed attack type that should be blocked at the perimeter as a basic security measure.

        By enabling land attack protection, organizations block a well-known denial-of-service technique and prevent unnecessary resource consumption on their network devices.
      audit: |
        To verify that screen profiles have TCP land attack protection from the Junos CLI:

        1. Open an SSH session to the device and enter operational mode.
        2. Display the screen configuration:

           ```
           show configuration security screen
           ```

        3. Inspect each `ids-option` block for a `tcp land` statement.

        If every screen profile has `tcp land` protection configured, the check passes. If any screen profile omits it, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Enter configuration mode and enable land attack protection:

            ```
            configure
            set security screen ids-option <screen-name> tcp land
            commit
            ```
    refs:
      - url: https://www.juniper.net/documentation/us/en/software/junos/security-policies/topics/topic-map/security-screen-ids.html
        title: Junos Screen IDS Configuration

  - uid: mondoo-junos-security-screen-ip-tear-drop
    title: Ensure screen profiles have IP teardrop protection enabled
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: nis-2-21-2-c
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-5
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-6
    mql: |
      junos.screenProfiles.all(ipTearDrop == true)
    docs:
      desc: |
        This check verifies that all screen profiles have IP teardrop attack protection enabled. Teardrop attacks use malformed fragmented IP packets with overlapping offsets that crash systems during packet reassembly.

        **Why this matters**

        Teardrop attacks exploit IP fragment reassembly logic in network stacks. Without teardrop protection:

        - Overlapping IP fragments can crash operating systems or network devices during the reassembly process, causing service outages.
        - Some systems experience kernel panics when processing the malformed fragment offsets used in teardrop attacks.
        - Leaving this protection disabled allows an entire class of IP fragmentation attacks to pass through the perimeter unmitigated.

        By enabling teardrop protection, organizations block malformed fragmented packets at the perimeter and prevent fragmentation-based attacks from reaching internal systems.
      audit: |
        To verify that screen profiles have IP teardrop protection from the Junos CLI:

        1. Open an SSH session to the device and enter operational mode.
        2. Display the screen configuration:

           ```
           show configuration security screen
           ```

        3. Inspect each `ids-option` block for an `ip tear-drop` statement.

        If every screen profile has `ip tear-drop` protection configured, the check passes. If any screen profile omits it, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Enter configuration mode and enable teardrop protection:

            ```
            configure
            set security screen ids-option <screen-name> ip tear-drop
            commit
            ```
    refs:
      - url: https://www.juniper.net/documentation/us/en/software/junos/security-policies/topics/topic-map/security-screen-ids.html
        title: Junos Screen IDS Configuration

  - uid: mondoo-junos-security-screen-tcp-winnuke
    title: Ensure screen profiles have TCP WinNuke protection enabled
    impact: 75
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: nis-2-21-2-c
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-5
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-6
    mql: |
      junos.screenProfiles.all(tcpWinNuke == true)
    docs:
      desc: |
        This check verifies that all screen profiles have TCP WinNuke attack protection enabled. WinNuke attacks send out-of-band TCP data to port 139, which can crash vulnerable systems running NetBIOS services.

        **Why this matters**

        WinNuke attacks target the TCP out-of-band data handling in network stacks. Without WinNuke protection:

        - Legacy systems can crash when they receive out-of-band TCP data on port 139, causing service disruptions.
        - NetBIOS services on vulnerable systems behind the firewall may be affected, leading to system instability or denial of service.
        - An entire class of OOB-based TCP attacks passes through the perimeter unblocked, potentially affecting any vulnerable internal system.

        By enabling WinNuke protection, organizations block out-of-band TCP attacks at the perimeter and protect internal systems from this class of exploits.
      audit: |
        To verify that screen profiles have TCP WinNuke protection from the Junos CLI:

        1. Open an SSH session to the device and enter operational mode.
        2. Display the screen configuration:

           ```
           show configuration security screen
           ```

        3. Inspect each `ids-option` block for a `tcp winnuke` statement.

        If every screen profile has `tcp winnuke` protection configured, the check passes. If any screen profile omits it, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Enter configuration mode and enable WinNuke protection:

            ```
            configure
            set security screen ids-option <screen-name> tcp winnuke
            commit
            ```
    refs:
      - url: https://www.juniper.net/documentation/us/en/software/junos/security-policies/topics/topic-map/security-screen-ids.html
        title: Junos Screen IDS Configuration

  # ==========================================
  # License Compliance
  # ==========================================
  - uid: mondoo-junos-security-no-expired-licenses
    title: Ensure no security feature licenses are expired
    impact: 85
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: false
      compliance/dora: false
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-5-22
      compliance/nis-2: nis-2-21-2-a
      compliance/nist-csf-1: nist-csf-1-id-am-2
      compliance/nist-csf-2: nist-csf-2-id-am-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-1
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc3-1-1
      compliance/vda-isa-5: false
    mql: |
      junos.licenses.all(state != "expired")
    docs:
      desc: |
        This check verifies that no installed feature licenses have expired. Expired licenses can silently disable critical security features, leaving the device with reduced protection.

        **Why this matters**

        Junos feature licenses control access to advanced security capabilities. If licenses are allowed to expire:

        - Critical security features such as IPS, UTM, application identification, and URL filtering may be disabled without warning.
        - The device may silently fall back to basic packet forwarding without the advanced security capabilities that were part of the security architecture.
        - Security features required for regulatory compliance may stop functioning, creating compliance gaps that go unnoticed until the next audit.

        By monitoring license status and renewing before expiration, organizations ensure that all licensed security features remain active and the device continues to provide the expected level of protection.
      audit: |
        To verify the status of installed feature licenses from the Junos CLI:

        1. Open an SSH session to the device and enter operational mode.
        2. Display the installed licenses and their state:

           ```
           show system license
           ```

        3. Inspect the state reported for each license entry.

        If no license is reported as `expired`, the check passes. If any license shows an expired state, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            These are operational mode commands and require no commit.

            Check license status and identify expired entries:

            ```
            show system license
            ```

            Obtain renewed license keys from the Juniper Agile Licensing portal, then install them by pasting at the terminal:

            ```
            request system license add terminal
            ```

            Paste the license key text and press Ctrl+D to finish. Alternatively, install from a file or URL:

            ```
            request system license add <filename-or-url>
            ```

            Verify the new license state:

            ```
            show system license
            ```
    refs:
      - url: https://www.juniper.net/documentation/us/en/software/junos/system-mgmt/topics/topic-map/license-management.html
        title: Junos License Management
