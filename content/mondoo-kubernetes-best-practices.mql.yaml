      - url: https://kubernetes.io/docs/concepts/configuration/overview/#services
        title: 'Kubernetes Configuration Best Practices: hostPort'
  - uid: mondoo-kubernetes-best-practices-statefulset-ports-hostport
    title: StatefulSets should not bind to a host port
    impact: 40
    mql: |
      k8s.statefulset.podSpec {
        _['containers'] {
          _['name']
          _['ports'] == null || _['ports'].all(_['hostPort'] == null)
        }
      }
    docs:
      desc: |
        This check verifies that containers do not bind to host ports, which directly exposes the container on the node's network interface.

        **Why this matters**

        Using host ports creates security and operational risks that undermine Kubernetes' networking model:

          - **Network exposure**: Host ports bypass Kubernetes Services and expose containers directly to the network, potentially to external traffic.
          - **Scheduling constraints**: Only one Pod can use a specific host port per node, severely limiting scheduling flexibility and horizontal scaling.
          - **Port conflicts**: Multiple applications competing for the same host ports can cause deployment failures and unpredictable behavior.
          - **Security boundary bypass**: Host ports allow direct network access to containers, circumventing network policies and service mesh controls.
          - **Audit complexity**: Traffic to host ports is harder to monitor, log, and trace through standard Kubernetes observability tools.

        Use Kubernetes Services (ClusterIP, NodePort, or LoadBalancer) instead of host ports to properly manage network access and maintain security boundaries.
      audit: |
        Check to ensure no StatefulSets are binding any of their containers to a host port:

        ```bash
        kubectl get statefulsets -A -o json | jq -r '.items[] | select( (.spec.template.spec.containers[].ports | . != empty and any(.[].hostPort; . != empty)  ) ) | .metadata.namespace + "/" + .metadata.name'  | uniq
        ```
      remediation: |
        For any StatefulSets that bind to a host port, update the StatefulSets to ensure they do not bind to a host port:

        ```yaml
        apiVersion: apps/v1
        kind: StatefulSet
        metadata:
          name: example
          namespace: example-namespace
        spec:
          template:
            spec:
              containers:
                - ports:
                  - containerPort: 80 # <-- ensure no 'hostPort' is defined in any entries of the port configurations
                    name: http
                    protocol: TCP
                  - containerPort: 443
                    name: https
                    protocol: TCP
        ```
    refs:
      - url: https://kubernetes.io/docs/concepts/configuration/overview/#services
        title: 'Kubernetes Configuration Best Practices: hostPort'
  - uid: mondoo-kubernetes-best-practices-cronjob-ports-hostport
    title: CronJobs should not bind to a host port
    impact: 40
    mql: |
      k8s.cronjob.podSpec {
        _['containers'] {
          _['name']
          _['ports'] == null || _['ports'].all(_['hostPort'] == null)
        }
      }
    docs:
      desc: |
        This check verifies that containers do not bind to host ports, which directly exposes the container on the node's network interface.

        **Why this matters**

        Using host ports creates security and operational risks that undermine Kubernetes' networking model:

          - **Network exposure**: Host ports bypass Kubernetes Services and expose containers directly to the network, potentially to external traffic.
          - **Scheduling constraints**: Only one Pod can use a specific host port per node, severely limiting scheduling flexibility and horizontal scaling.
          - **Port conflicts**: Multiple applications competing for the same host ports can cause deployment failures and unpredictable behavior.
          - **Security boundary bypass**: Host ports allow direct network access to containers, circumventing network policies and service mesh controls.
          - **Audit complexity**: Traffic to host ports is harder to monitor, log, and trace through standard Kubernetes observability tools.

        Use Kubernetes Services (ClusterIP, NodePort, or LoadBalancer) instead of host ports to properly manage network access and maintain security boundaries.
      audit: |
        Check to ensure no CronJobs are binding any of their containers to a host port:

        ```bash
        kubectl get cronjobs -A -o json | jq -r '.items[] | select( (.spec.jobTemplate.spec.template.spec.containers[].ports | . != empty and any(.[].hostPort; . != empty)  ) ) | .metadata.namespace + "/" + .metadata.name'  | uniq
        ```
      remediation: |
        For any CronJobs that bind to a host port, update the CronJobs to ensure they do not bind to a host port:

        ```yaml
        apiVersion: batch/v1
        kind: CronJob
        metadata:
          name: example
          namespace: example-namespace
        spec:
          jobTemplate:
            spec:
              template:
                spec:
                  containers:
                    - ports:
                      - containerPort: 80 # <-- ensure no 'hostPort' is defined in any entries of the port configurations
                        name: http
                        protocol: TCP
                      - containerPort: 443
                        name: https
                        protocol: TCP
        ```
    refs:
      - url: https://kubernetes.io/docs/concepts/configuration/overview/#services
        title: 'Kubernetes Configuration Best Practices: hostPort'
  - uid: mondoo-kubernetes-best-practices-ingress-cert-expiration
    title: Ingress certificates less than 15 days from expiration
    impact: 40
    mql: |
      k8s.ingress.tls.all(
        certificates.all(
          expiresIn.days > 15
        )
      )
    docs:
      desc: |
        This check verifies that TLS certificates used by Ingress resources have more than 15 days remaining before expiration.

        **Why this matters**

        Expired or soon-to-expire TLS certificates cause immediate service disruptions and security risks:

          - **Service outages**: When certificates expire, browsers and clients refuse connections, causing complete service unavailability for HTTPS traffic.
          - **Security warnings**: Users encounter browser security warnings that damage trust and may lead them to bypass important security protections.
          - **Compliance violations**: Many security standards require valid TLS certificates; expired certificates can trigger audit failures.
          - **Emergency remediation**: Certificate renewals done under time pressure are error-prone and may cause additional outages during replacement.
          - **Man-in-the-middle exposure**: Users accustomed to ignoring certificate warnings become vulnerable to interception attacks.

        Implement automated certificate management (such as cert-manager) and monitor certificate expiration dates to ensure timely renewal well before expiration.
      audit: |
        Check to ensure no Ingress Secrets contain TLS certificates near expiration:

        Display all Ingress resources with TLS Secret data:

        ```bash
        kubectl get ingress -A -o json | jq -r '.items[] | select(.spec.tls != empty) | .metadata.namespace + "/" + .metadata.name'
        ```

        For each Ingress resource, check the certificate expiration dates in the Secrets (under `.spec.tls[].secretName`). Ensure that the expiration dates don't expire soon:

        ```bash
        kubectl get secret --namespace NAMESPACE_OF_INGRESS NAME_OF_SECRET -o json | jq -r '.data["tls.crt"]' | base64 -d | openssl x509 -noout -text | grep "Not After"
        ```
      remediation: |
        Renew the certificate, then replace the data in the Secret referenced by the Ingress under `spec.tls[].secretName`:

        ```bash
        kubectl create secret tls <secret-name> --cert=tls.crt --key=tls.key -n <namespace> --dry-run=client -o yaml | kubectl apply -f -
        ```

        To avoid manual renewals, deploy cert-manager to issue and rotate Ingress certificates automatically.
    refs:
      - url: https://kubernetes.io/docs/concepts/services-networking/ingress/#tls
        title: Kubernetes Ingress TLS
      - url: https://cert-manager.io/docs/
        title: cert-manager Documentation
  - uid: mondoo-kubernetes-best-practices-service-no-nodeport
    title: Services should not use NodePort
    impact: 50
    mql: |
      k8s.service.type != "NodePort"
    docs:
      desc: |
        This check verifies that Kubernetes Services do not use the `NodePort` type.

        **Why this matters**

        NodePort exposes a Service on a port across every node in the cluster. This can bypass normal ingress controls, makes exposure harder to inventory, and may leave workloads reachable from networks that were not intended to access them.
      audit: |
        List Services that use NodePort:

        ```bash
        kubectl get services -A --field-selector spec.type=NodePort
        ```
      remediation: |
        Replace NodePort Services with an Ingress, Gateway, ClusterIP Service, or a controlled LoadBalancer pattern that is covered by your platform networking controls.
    refs:
      - url: https://kubernetes.io/docs/concepts/services-networking/service/#type-nodeport
        title: Kubernetes Service type NodePort
  - uid: mondoo-kubernetes-best-practices-service-ports-approved-range
    title: NodePort Services should use the approved 32000-33000 node port range
    impact: 30
    mql: |
      k8s.service.type != "NodePort" || k8s.service.ports.all(_['nodePort'] == null || _['nodePort'] >= 32000 && _['nodePort'] <= 33000)
    docs:
      desc: |
        This check verifies that NodePort Service `spec.ports[].nodePort` values are within the approved 32000-33000 range.

        **Why this matters**

        Restricting NodePort exposure to an agreed range makes external firewall rules, ownership, and collision avoidance easier to manage while avoiding false positives on ordinary ClusterIP, LoadBalancer, or Ingress-backed Services that serve common ports such as 80 or 443.
      audit: |
        List NodePort Services with explicit node ports outside the approved range:

        ```bash
        kubectl get services -A -o json | jq -r '.items[] | select(.spec.type == "NodePort" and any(.spec.ports[]?; .nodePort != null and (.nodePort < 32000 or .nodePort > 33000))) | .metadata.namespace + "/" + .metadata.name'
        ```
      remediation: |
        Change each NodePort Service `spec.ports[].nodePort` to an approved value between 32000 and 33000, or replace the NodePort Service with an Ingress, Gateway, ClusterIP Service, or controlled LoadBalancer pattern.
    refs:
      - url: https://kubernetes.io/docs/concepts/services-networking/service/#field-spec-ports
        title: Kubernetes Service ports
  - uid: mondoo-kubernetes-best-practices-service-no-loadbalancer
    title: Services should not use LoadBalancer
    impact: 40
    mql: |
      k8s.service.type != "LoadBalancer"
    docs:
      desc: |
        This check verifies that Kubernetes Services do not use the `LoadBalancer` type.

        **Why this matters**

        LoadBalancer Services can create cloud load balancers and public exposure without the review and guardrails normally attached to platform ingress paths. Uncontrolled use can increase cost, expand attack surface, and make ownership harder to track.
      audit: |
        List Services that use LoadBalancer:

        ```bash
        kubectl get services -A --field-selector spec.type=LoadBalancer
        ```
      remediation: |
        Route external traffic through the approved ingress or gateway layer, or document and approve the specific LoadBalancer Service when direct exposure is required.
    refs:
      - url: https://kubernetes.io/docs/concepts/services-networking/service/#loadbalancer
        title: Kubernetes Service type LoadBalancer
  - uid: mondoo-kubernetes-best-practices-service-no-external-ips
    title: Services should not use externalIPs
    impact: 60
    mql: |
      k8s.service.externalIPs.length == 0
    docs:
      desc: |
        This check verifies that Kubernetes Services do not set `spec.externalIPs`.

        **Why this matters**

        Service `externalIPs` can redirect traffic for arbitrary external addresses to cluster workloads. If users can create or modify Services, this field can be abused for traffic interception or unintended exposure.
      audit: |
        List Services that set external IPs:

        ```bash
        kubectl get services -A -o json | jq -r '.items[] | select(.spec.externalIPs != null and (.spec.externalIPs | length > 0)) | .metadata.namespace + "/" + .metadata.name'
        ```
      remediation: |
        Remove `spec.externalIPs` and use an approved ingress, gateway, or load balancer configuration for external traffic.
    refs:
      - url: https://kubernetes.io/docs/concepts/services-networking/service/#external-ips
        title: Kubernetes Service external IPs
      - url: https://github.com/kubernetes/kubernetes/issues/97076
        title: Kubernetes issue CVE-2020-8554
  - uid: mondoo-kubernetes-best-practices-service-no-externalname-localhost
    title: ExternalName Services should not point to localhost
    impact: 50
    mql: |
      k8s.service.type != "ExternalName" || k8s.service.externalName != "localhost"
    docs:
      desc: |
        This check verifies that ExternalName Services do not resolve to `localhost`.

        **Why this matters**

        An ExternalName Service that points to localhost can interact badly with some ingress controllers and proxies, causing requests to be redirected back to local control-plane or proxy processes instead of an intended external endpoint.
      audit: |
        List ExternalName Services that target localhost:

        ```bash
        kubectl get services -A -o json | jq -r '.items[] | select(.spec.type == "ExternalName" and .spec.externalName == "localhost") | .metadata.namespace + "/" + .metadata.name'
        ```
      remediation: |
        Replace the ExternalName target with the intended DNS name and avoid localhost loopback targets in cluster Service definitions.
    refs:
      - url: https://kubernetes.io/docs/concepts/services-networking/service/#externalname
        title: Kubernetes Service type ExternalName
  - uid: mondoo-kubernetes-best-practices-ingress-approved-class-annotation
    title: Ingresses should use an approved class
    impact: 30
    mql: |
      legacyIngressClass = k8s.ingress.annotations["kubernetes.io/ingress.class"]
      defaultIngressClasses = k8s.ingressClasses.where(annotations["ingressclass.kubernetes.io/is-default-class"] == "true")
      if (k8s.ingress.ingressClassName != "") {
        k8s.ingress.ingressClassName.in(["HAProxy", "nginx"])
      } else if (legacyIngressClass != empty && legacyIngressClass != "") {
        legacyIngressClass.in(["HAProxy", "nginx"])
      } else {
        defaultIngressClasses.length == 1 && defaultIngressClasses.all(name.in(["HAProxy", "nginx"]))
      }
    docs:
      desc: |
        This check verifies that Ingress resources resolve to an approved class, either through `spec.ingressClassName`, `metadata.annotations["kubernetes.io/ingress.class"]`, or a single default IngressClass set to `HAProxy` or `nginx`.

        **Why this matters**

        Ingress classes route an Ingress to a controller. Unknown or unsupported class names can leave routes unserved or send traffic through an unintended controller. `spec.ingressClassName` is the modern Kubernetes field and takes precedence when present; the legacy annotation is still accepted for clusters that have not fully migrated. When neither is present, Kubernetes can route the Ingress through a cluster default IngressClass, which must also be approved.
      audit: |
        List Ingresses without an approved class:

        ```bash
        kubectl get ingress -A -o json | jq -r '.items[] | select((.spec.ingressClassName // .metadata.annotations["kubernetes.io/ingress.class"] // "") as $class | ($class != "HAProxy" and $class != "nginx")) | .metadata.namespace + "/" + .metadata.name'
        kubectl get ingressclass -o json | jq -r '.items[] | select(.metadata.annotations["ingressclass.kubernetes.io/is-default-class"] == "true") | .metadata.name'
        ```
      remediation: |
        Set `spec.ingressClassName` to `HAProxy` or `nginx`. Use `metadata.annotations["kubernetes.io/ingress.class"]` only for legacy controllers that still require it. If relying on a default IngressClass, keep exactly one default class and use an approved class name.
    refs:
      - url: https://kubernetes.io/docs/concepts/services-networking/ingress/#deprecated-annotation
        title: Kubernetes Ingress deprecated annotation
  - uid: mondoo-kubernetes-best-practices-ingress-no-default-backend
    title: Ingresses should not define a default backend
    impact: 40
    mql: |
      k8s.ingress.manifest['spec']['defaultBackend'] == null
    docs:
      desc: |
        This check verifies that Ingress resources do not define `spec.defaultBackend`.

        **Why this matters**

        A default backend catches traffic that does not match an explicit host or path. In multi-tenant clusters this can route unrelated traffic to an application-controlled backend and bypass explicit routing ownership.
      audit: |
        List Ingresses with a default backend:

        ```bash
        kubectl get ingress -A -o json | jq -r '.items[] | select(.spec.defaultBackend != null) | .metadata.namespace + "/" + .metadata.name'
        ```
      remediation: |
        Remove `spec.defaultBackend` and define explicit host and path rules for every route the Ingress should serve.
    refs:
      - url: https://kubernetes.io/docs/concepts/services-networking/ingress/#default-backend
        title: Kubernetes Ingress default backend
  - uid: mondoo-kubernetes-best-practices-ingress-hosts-not-empty
    title: Ingress rules should define host names
    impact: 30
    mql: |
      k8s.ingress.rules.all(host != "")
    docs:
      desc: |
        This check verifies that every Ingress rule defines a non-empty host name.

        **Why this matters**

        Rules without host names can match wider traffic than intended. Explicit hosts make ownership, TLS coverage, and routing behavior easier to review and reason about.
      audit: |
        List Ingresses with hostless rules:

        ```bash
        kubectl get ingress -A -o json | jq -r '.items[] | select(any(.spec.rules[]?; (.host // "") == "")) | .metadata.namespace + "/" + .metadata.name'
        ```
      remediation: |
        Set `spec.rules[].host` to the DNS name each Ingress rule should serve.
    refs:
      - url: https://kubernetes.io/docs/concepts/services-networking/ingress/#ingress-rules
        title: Kubernetes Ingress rules
  - uid: mondoo-kubernetes-best-practices-ingress-hosts-no-wildcard
    title: Ingress host names should not use wildcards
    impact: 40
    mql: |
      k8s.ingress.rules.all(host == "" || host.contains("*") == false)
    docs:
      desc: |
        This check verifies that Ingress host names do not contain wildcard characters.

        **Why this matters**

        Wildcard Ingress hosts can route traffic for many names through one rule. This can hide ownership boundaries, accidentally expose services, or capture traffic intended for other applications.
      audit: |
        List Ingresses with wildcard hosts:

        ```bash
        kubectl get ingress -A -o json | jq -r '.items[] | select(any(.spec.rules[]?; (.host // "") | contains("*"))) | .metadata.namespace + "/" + .metadata.name'
        ```
      remediation: |
        Replace wildcard hosts with explicit host names for each route the application should serve.
    refs:
      - url: https://kubernetes.io/docs/concepts/services-networking/ingress/#hostname-wildcards
        title: Kubernetes Ingress hostname wildcards
  - uid: mondoo-kubernetes-best-practices-ingress-require-https
    title: Ingresses should require HTTPS
    impact: 60
    mql: |
      k8s.ingress.annotations["kubernetes.io/ingress.allow-http"] == "false" && k8s.ingress.tls != empty
    docs:
      desc: |
        This check verifies that Ingress resources disable HTTP with the `kubernetes.io/ingress.allow-http: "false"` annotation and define TLS settings.

        **Why this matters**

        Ingress resources that allow HTTP or omit TLS can expose application traffic in cleartext. Requiring TLS and disabling HTTP keeps traffic encrypted at the edge and avoids accidental downgrade paths.
      audit: |
        List Ingresses that do not disable HTTP or do not define TLS:

        ```bash
        kubectl get ingress -A -o json | jq -r '.items[] | select(.metadata.annotations["kubernetes.io/ingress.allow-http"] != "false" or (.spec.tls == null or (.spec.tls | length == 0))) | .metadata.namespace + "/" + .metadata.name'
        ```
      remediation: |
        Add TLS configuration under `spec.tls` and set `metadata.annotations["kubernetes.io/ingress.allow-http"]` to `"false"` when supported by your ingress controller.
    refs:
      - url: https://kubernetes.io/docs/concepts/services-networking/ingress/#tls
        title: Kubernetes Ingress TLS
  - uid: mondoo-kubernetes-best-practices-ingress-tls-hosts-match-rules
    title: Ingress rule hosts should be covered by TLS hosts
    impact: 40
    mql: |
      tlsHosts = k8s.ingress.tls.map(hosts).flat
      k8s.ingress.rules.map(host).where(_ != "").all(tlsHosts.contains(_))
    docs:
      desc: |
        This check verifies that every named Ingress rule host is also listed in the Ingress TLS hosts.

        **Why this matters**

        Ingress rules can route requests for a host that is not covered by the configured TLS certificate. That mismatch can cause routing failures, client certificate errors, and accidental cleartext fallback when paired with permissive controller settings.
      audit: |
        List Ingresses where a rule host is missing from `spec.tls[].hosts`:

        ```bash
        kubectl get ingress -A -o json | jq -r '.items[] | select(any(.spec.rules[]?; (.host // "") != "" and ([.spec.tls[]?.hosts[]?] | index(.host) | not))) | .metadata.namespace + "/" + .metadata.name'
        ```
      remediation: |
        Add every named `spec.rules[].host` to the appropriate `spec.tls[].hosts` entry and ensure the referenced TLS Secret contains a matching certificate.
    refs:
      - url: https://kubernetes.io/docs/concepts/services-networking/ingress/#tls
        title: Kubernetes Ingress TLS
  - uid: mondoo-kubernetes-best-practices-deployment-multiple-replicas
    title: Deployments should have multiple replicas
    impact: 30
    mql: |
      k8s.deployment.desiredReplicas > 1
    docs:
      desc: |
        This check verifies that Deployments define more than one desired replica.

        **Why this matters**

        A single-replica Deployment has no workload redundancy. Node maintenance, Pod eviction, or a single container crash can interrupt the application until Kubernetes starts a replacement.
      audit: |
        List Deployments with one or fewer desired replicas:

        ```bash
        kubectl get deployments -A -o json | jq -r '.items[] | select((.spec.replicas // 1) <= 1) | .metadata.namespace + "/" + .metadata.name'
        ```
      remediation: |
        Increase `spec.replicas` to at least two for workloads that need availability during Pod or node disruption.
    refs:
      - url: https://kubernetes.io/docs/concepts/workloads/controllers/deployment/
        title: Kubernetes Deployments
  - uid: mondoo-kubernetes-best-practices-statefulset-storageclass
    title: StatefulSet volume claim templates should define a StorageClass
    impact: 30
    mql: |
      k8s.statefulset.manifest['spec']['volumeClaimTemplates'] == null || k8s.statefulset.manifest['spec']['volumeClaimTemplates'].all(_['spec']['storageClassName'] != empty)
    docs:
      desc: |
        This check verifies that every StatefulSet `volumeClaimTemplates` entry defines `spec.storageClassName`.

        **Why this matters**

        Explicit StorageClasses make StatefulSet storage provisioning predictable and reviewable, especially in multi-tenant clusters where different classes have different cost, performance, retention, or encryption characteristics.
      audit: |
        List StatefulSets with volume claim templates that omit a StorageClass:

        ```bash
        kubectl get statefulsets -A -o json | jq -r '.items[] | select(any(.spec.volumeClaimTemplates[]?; (.spec.storageClassName // "") == "")) | .metadata.namespace + "/" + .metadata.name'
        ```
      remediation: |
        Set `spec.volumeClaimTemplates[].spec.storageClassName` to the approved StorageClass for the workload.
    refs:
      - url: https://kubernetes.io/docs/concepts/workloads/controllers/statefulset/#stable-storage
        title: Kubernetes StatefulSet stable storage
      - url: https://kubernetes.io/docs/concepts/storage/storage-classes/
        title: Kubernetes StorageClasses
  - uid: mondoo-kubernetes-best-practices-pvc-storageclass
    title: PersistentVolumeClaims should define a StorageClass
    impact: 30
    mql: |
      k8s.persistentvolumeclaim.storageClassName != ""
    docs:
      desc: |
        This check verifies that PersistentVolumeClaims define `spec.storageClassName`.

        **Why this matters**

        Explicit StorageClasses avoid ambiguous provisioning behavior and make storage cost, performance, backup, and encryption posture easier to govern in shared clusters.
      audit: |
        List PersistentVolumeClaims that omit a StorageClass:

        ```bash
        kubectl get pvc -A -o json | jq -r '.items[] | select((.spec.storageClassName // "") == "") | .metadata.namespace + "/" + .metadata.name'
        ```
      remediation: |
        Set `spec.storageClassName` to the approved StorageClass for each PersistentVolumeClaim.
    refs:
      - url: https://kubernetes.io/docs/concepts/storage/persistent-volumes/#class
        title: Kubernetes PersistentVolumeClaim class
      - url: https://kubernetes.io/docs/concepts/storage/storage-classes/
        title: Kubernetes StorageClasses
  - uid: mondoo-kubernetes-best-practices-storageclass-reclaim-policy-delete
    title: StorageClasses should delete released PersistentVolumes
    impact: 30
    mql: |
      k8s.storageclass.reclaimPolicy == "Delete"
    docs:
      desc: |
        This check verifies that StorageClasses set `reclaimPolicy` to `Delete`.

        **Why this matters**

        A `Delete` reclaim policy prevents dynamically provisioned PersistentVolumes from being reused across namespaces after their PersistentVolumeClaim is deleted. This is especially important in multi-tenant clusters where retained volumes can carry stale tenant data.
      audit: |
        List StorageClasses that do not use the `Delete` reclaim policy:

        ```bash
        kubectl get storageclass -o json | jq -r '.items[] | select(.reclaimPolicy != "Delete") | .metadata.name'
        ```
      remediation: |
        Set `reclaimPolicy` to `Delete` on shared StorageClasses.
    refs:
      - url: https://kyverno.io/policies/other/restrict-storageclass/restrict-storageclass/
        title: Kyverno Restrict StorageClass policy
      - url: https://kubernetes.io/docs/concepts/storage/storage-classes/#reclaim-policy
        title: Kubernetes StorageClass reclaim policy
  - uid: mondoo-kubernetes-best-practices-pvc-readwriteoncepod
    title: PersistentVolumeClaims should use ReadWriteOncePod access mode
    impact: 30
    mql: |
      k8s.persistentvolumeclaim.accessModes.contains("ReadWriteOncePod")
    docs:
      desc: |
        This check verifies that PersistentVolumeClaims use the `ReadWriteOncePod` access mode.

        **Why this matters**

        `ReadWriteOncePod` restricts a volume so only one Pod in the cluster can mount it for read-write access. For stateful workloads that cannot tolerate concurrent writers, this makes the intended exclusivity explicit in the PVC.
      audit: |
        List PersistentVolumeClaims that do not include `ReadWriteOncePod`:

        ```bash
        kubectl get pvc -A -o json | jq -r '.items[] | select((.spec.accessModes // []) | index("ReadWriteOncePod") | not) | .metadata.namespace + "/" + .metadata.name'
        ```
      remediation: |
        Set `spec.accessModes` to include `ReadWriteOncePod` for PVCs that must be mounted read-write by only one Pod.
    refs:
      - url: https://kubernetes.io/docs/concepts/storage/persistent-volumes/#access-modes
        title: Kubernetes PersistentVolume Access Modes
  - uid: mondoo-kubernetes-best-practices-networkpolicy-podselector-not-empty
    title: NetworkPolicies should not use an empty podSelector
    impact: 30
    mql: |
      k8s.networkpolicy.name == "default-deny" || k8s.networkpolicy.podSelector['matchLabels'] != empty || k8s.networkpolicy.podSelector['matchExpressions'] != empty
    docs:
      desc: |
        This check verifies that NetworkPolicies use a non-empty `spec.podSelector`, except for policies named `default-deny`.

        **Why this matters**

        An empty podSelector applies to all Pods in the namespace. That can be intentional for a default deny policy, but for other NetworkPolicies it can make traffic controls broader than intended and harder to reason about.
      audit: |
        List NetworkPolicies with empty podSelectors, excluding `default-deny`:

        ```bash
        kubectl get networkpolicies -A -o json | jq -r '.items[] | select(.metadata.name != "default-deny" and ((.spec.podSelector.matchLabels // {}) | length) == 0 and ((.spec.podSelector.matchExpressions // []) | length) == 0) | .metadata.namespace + "/" + .metadata.name'
        ```
      remediation: |
        Add `matchLabels` or `matchExpressions` to scope the NetworkPolicy to the intended Pods, or rename intentional namespace-wide deny policies to `default-deny`.
    refs:
      - url: https://kubernetes.io/docs/concepts/services-networking/network-policies/
        title: Kubernetes Network Policies
  - uid: mondoo-kubernetes-best-practices-namespace-resourcequota
    title: Namespaces should have a ResourceQuota
    impact: 30
    mql: |
      k8s.namespace.name == "kube-system" || k8s.namespace.name == "kube-public" || k8s.namespace.name == "kube-node-lease" || k8s.namespace.resourceQuotas.length > 0
    docs:
      desc: |
        This check verifies that each non-system Namespace has at least one ResourceQuota.

        **Why this matters**

        ResourceQuotas help bound tenant resource consumption and prevent one namespace from exhausting shared cluster capacity.
      audit: |
        List non-system Namespaces without ResourceQuotas:

        ```bash
        for ns in $(kubectl get ns -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' | grep -Ev '^(kube-system|kube-public|kube-node-lease)$'); do kubectl get resourcequota -n "$ns" --no-headers 2>/dev/null | grep -q . || echo "$ns"; done
        ```
      remediation: |
        Create a ResourceQuota in each application or tenant Namespace that reflects the allowed CPU, memory, storage, and object counts.
    refs:
      - url: https://kubernetes.io/docs/concepts/policy/resource-quotas/
        title: Kubernetes Resource Quotas
  - uid: mondoo-kubernetes-best-practices-namespace-limitrange
    title: Namespaces should have a LimitRange
    impact: 30
    mql: |
      k8s.namespace.name == "kube-system" || k8s.namespace.name == "kube-public" || k8s.namespace.name == "kube-node-lease" || k8s.namespace.limitRanges.length > 0
    docs:
      desc: |
        This check verifies that each non-system Namespace has at least one LimitRange.

        **Why this matters**

        LimitRanges set default and bounded resource expectations for Pods and containers in a Namespace. They help prevent workloads from running without practical CPU or memory defaults when teams omit explicit requests or limits.
      audit: |
        List non-system Namespaces without LimitRanges:

        ```bash
        for ns in $(kubectl get ns -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' | grep -Ev '^(kube-system|kube-public|kube-node-lease)$'); do kubectl get limitrange -n "$ns" --no-headers 2>/dev/null | grep -q . || echo "$ns"; done
        ```
      remediation: |
        Create a LimitRange in each application or tenant Namespace that defines the default and maximum resource settings expected for workloads in that Namespace.
    refs:
      - url: https://kyverno.io/policies/best-practices/add-ns-quota/add-ns-quota/
        title: Kyverno Add Quota policy
      - url: https://kubernetes.io/docs/concepts/policy/limit-range/
        title: Kubernetes Limit Ranges
  - uid: mondoo-kubernetes-best-practices-namespace-default-deny-networkpolicy
    title: Namespaces should have a default deny NetworkPolicy
    impact: 50
    mql: |
      k8s.namespace.name == "kube-system" || k8s.namespace.name == "kube-public" || k8s.namespace.name == "kube-node-lease" || k8s.namespace.networkPolicies.where(name == "default-deny" && podSelector['matchLabels'] == empty && podSelector['matchExpressions'] == empty && policyTypes.contains("Ingress") && policyTypes.contains("Egress") && ingress == empty && egress == empty).length > 0
    docs:
      desc: |
        This check verifies that each non-system Namespace has a `default-deny` NetworkPolicy that selects all Pods and denies ingress and egress by default.

        **Why this matters**

        Kubernetes allows Pod-to-Pod traffic unless NetworkPolicies restrict it. A default-deny policy gives every Namespace a closed baseline so application teams can add explicit allow rules for required traffic.
      audit: |
        List non-system Namespaces without a default-deny NetworkPolicy:

        ```bash
        for ns in $(kubectl get ns -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' | grep -Ev '^(kube-system|kube-public|kube-node-lease)$'); do kubectl get networkpolicy default-deny -n "$ns" -o json 2>/dev/null | jq -e '.spec.podSelector == {} and ((.spec.policyTypes // []) | index("Ingress")) and ((.spec.policyTypes // []) | index("Egress")) and ((.spec.ingress // []) | length == 0) and ((.spec.egress // []) | length == 0)' >/dev/null || echo "$ns"; done
        ```
      remediation: |
        Create a `default-deny` NetworkPolicy in each application or tenant Namespace, then add narrower allow policies for required ingress and egress traffic.
    refs:
      - url: https://kyverno.io/policies/best-practices/add-network-policy/add-network-policy/
        title: Kyverno Add Network Policy policy
      - url: https://kubernetes.io/docs/concepts/services-networking/network-policies/
        title: Kubernetes Network Policies
  - uid: mondoo-kubernetes-best-practices-namespace-egress-default-deny-networkpolicy
    title: Namespaces should have an egress default deny NetworkPolicy
    impact: 40
    mql: |
      k8s.namespace.name == "kube-system" || k8s.namespace.name == "kube-public" || k8s.namespace.name == "kube-node-lease" || k8s.namespace.networkPolicies.where(podSelector['matchLabels'] == empty && podSelector['matchExpressions'] == empty && policyTypes.contains("Egress") && egress == empty).length > 0
    docs:
      desc: |
        This check verifies that each non-system Namespace has a NetworkPolicy that selects all Pods and denies egress by default.

        **Why this matters**

        Egress default-deny policies reduce uncontrolled outbound traffic from workloads. They provide a restrictive baseline for existing Namespaces while teams add explicit allow policies for required destinations.
      audit: |
        List non-system Namespaces without an egress default-deny NetworkPolicy:

        ```bash
        for ns in $(kubectl get ns -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' | grep -Ev '^(kube-system|kube-public|kube-node-lease)$'); do kubectl get networkpolicy -n "$ns" -o json | jq -e 'any(.items[]?; .spec.podSelector == {} and ((.spec.policyTypes // []) | index("Egress")) and ((.spec.egress // []) | length == 0))' >/dev/null || echo "$ns"; done
        ```
      remediation: |
        Create an egress default-deny NetworkPolicy in each application or tenant Namespace, then add narrower allow policies for required egress traffic.
    refs:
      - url: https://kyverno.io/policies/other/generate-networkpolicy-existing/generate-networkpolicy-existing/
        title: Kyverno Generate NetworkPolicy to Existing Namespaces policy
      - url: https://kubernetes.io/docs/concepts/services-networking/network-policies/
        title: Kubernetes Network Policies
  - uid: mondoo-kubernetes-best-practices-namespace-allow-dns-networkpolicy
    title: Namespaces should allow DNS egress through a NetworkPolicy
    impact: 30
    mql: |
      k8s.namespace.name == "kube-system" || k8s.namespace.name == "kube-public" || k8s.namespace.name == "kube-node-lease" || k8s.namespace.networkPolicies.where(name == "allow-dns" && podSelector['matchLabels'] == empty && podSelector['matchExpressions'] == empty && policyTypes.contains("Egress") && egress.where(_['ports'].where(_['protocol'] == "UDP" && _['port'] == 53).length > 0 && _['to'].where(_['namespaceSelector']['matchLabels']['name'] == "kube-system" || _['namespaceSelector']['matchLabels']['kubernetes.io/metadata.name'] == "kube-system").length > 0).length > 0).length > 0
    docs:
      desc: |
        This check verifies that each non-system Namespace has an `allow-dns` NetworkPolicy that selects all Pods and allows UDP/53 egress to the `kube-system` Namespace.

        **Why this matters**

        Namespaces that use egress default-deny policies still need controlled DNS resolution. A dedicated DNS allow policy keeps the default egress posture restrictive while permitting required name lookups.
      audit: |
        List non-system Namespaces without an allow-dns NetworkPolicy:

        ```bash
        for ns in $(kubectl get ns -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' | grep -Ev '^(kube-system|kube-public|kube-node-lease)$'); do kubectl get networkpolicy allow-dns -n "$ns" -o json 2>/dev/null | jq -e '.spec.podSelector == {} and ((.spec.policyTypes // []) | index("Egress")) and any(.spec.egress[]?; any(.ports[]?; .protocol == "UDP" and .port == 53) and any(.to[]?; (.namespaceSelector.matchLabels.name == "kube-system") or (.namespaceSelector.matchLabels["kubernetes.io/metadata.name"] == "kube-system")))' >/dev/null || echo "$ns"; done
        ```
      remediation: |
        Create an `allow-dns` NetworkPolicy in each application or tenant Namespace that permits DNS egress to the cluster DNS namespace while keeping other egress controlled by explicit allow policies.
    refs:
      - url: https://kyverno.io/policies/best-practices/add-networkpolicy-dns/add-networkpolicy-dns/
        title: Kyverno Add Network Policy for DNS policy
      - url: https://kubernetes.io/docs/concepts/services-networking/network-policies/
        title: Kubernetes Network Policies
  - uid: mondoo-kubernetes-best-practices-namespace-networkpolicy
    title: Namespaces should have a NetworkPolicy
    impact: 40
    mql: |
      k8s.namespace.name == "kube-system" || k8s.namespace.name == "kube-public" || k8s.namespace.name == "kube-node-lease" || k8s.namespace.networkPolicies.length > 0
    docs:
      desc: |
        This check verifies that each non-system Namespace has at least one NetworkPolicy.

        **Why this matters**

        Namespaces without NetworkPolicies usually allow unrestricted Pod-to-Pod traffic. Requiring at least one policy gives platform teams a baseline for tenant isolation and namespace readiness.
      audit: |
        List non-system Namespaces without NetworkPolicies:

        ```bash
        for ns in $(kubectl get ns -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' | grep -Ev '^(kube-system|kube-public|kube-node-lease)$'); do kubectl get networkpolicy -n "$ns" --no-headers 2>/dev/null | grep -q . || echo "$ns"; done
        ```
      remediation: |
        Create a namespace baseline NetworkPolicy, such as an explicit default deny policy plus the allowed ingress and egress rules for the workloads.
    refs:
      - url: https://kubernetes.io/docs/concepts/services-networking/network-policies/
        title: Kubernetes Network Policies
  - uid: mondoo-kubernetes-best-practices-control-plane-taint
    title: Control plane nodes should have a NoSchedule taint
    impact: 60
    mql: |
      k8s.nodes
        .where(labels["node-role.kubernetes.io/control-plane"] != null)
        .all(taints.any(effect == "NoSchedule"))
    docs:
      desc: |
        This check verifies that all control plane nodes have a `NoSchedule` taint to prevent regular workloads from being scheduled on them.

        **Why this matters**

        Control plane nodes run critical cluster components such as the API server, etcd, controller manager, and scheduler. Allowing user workloads on these nodes creates several risks:

        - **Resource contention**: User workloads can consume CPU and memory needed by control plane components, destabilizing the entire cluster.
        - **Blast radius**: A misbehaving or compromised user pod on a control plane node has closer proximity to sensitive components like etcd, which stores all cluster state and secrets.
        - **Availability risk**: If a user workload causes a control plane node to become unresponsive, cluster management operations (scaling, deployments, self-healing) stop working.
        - **Security boundary**: Separating control plane from data plane is a fundamental Kubernetes security principle that limits the impact of workload-level compromises.
        - **Operational clarity**: Taints make scheduling behavior explicit, preventing accidental placement of workloads on control plane nodes.

        Ensure all control plane nodes have at least a `NoSchedule` taint to keep user workloads on dedicated worker nodes.
      audit: |
        Check control plane node taints:

        ```bash
        kubectl get nodes -l node-role.kubernetes.io/control-plane -o json | jq '.items[] | {name: .metadata.name, taints: .spec.taints}'
        ```
      remediation: |
        Add a `NoSchedule` taint to control plane nodes:

        ```bash
        kubectl taint nodes <control-plane-node> node-role.kubernetes.io/control-plane:NoSchedule
        ```

        Most Kubernetes distributions, including kubeadm, EKS, GKE, and AKS, apply this taint by default. If it has been removed, re-apply it and migrate any user workloads to worker nodes.

        Adding the taint immediately evicts any running pods that do not tolerate it, so plan for a brief disruption to those workloads. Do not apply this on single-node clusters such as kind, minikube, or k3s. On a single node the control plane and your workloads share the same machine, and the taint would make everything unschedulable.
    refs:
      - url: https://kubernetes.io/docs/concepts/scheduling-eviction/taint-and-toleration/
        title: Kubernetes Taints and Tolerations
      - url: https://kubernetes.io/docs/setup/production-environment/tools/kubeadm/create-cluster-kubeadm/#control-plane-node-isolation
        title: Kubernetes Control Plane Node Isolation
  - uid: mondoo-kubernetes-best-practices-hpa-min-replicas
    title: HorizontalPodAutoscalers should have at least 2 minimum replicas
    impact: 40
    mql: |
      k8s.horizontalPodAutoscalers.all(spec["minReplicas"] != null && spec["minReplicas"] >= 2)
    docs:
      desc: |
        This check ensures that all HorizontalPodAutoscalers (HPAs) are configured with a minimum replica count of at least 2.

        **Why this matters**

        An HPA with `minReplicas: 1` means the autoscaler can scale a workload down to a single replica, eliminating high availability:

        - **Single point of failure**: With one replica, any pod disruption (node failure, OOM kill, deployment rollout) causes complete service downtime.
        - **Rolling update gaps**: During deployments, the single replica is terminated before or during replacement, causing a brief outage.
        - **Node maintenance**: Voluntary disruptions like node drains cannot gracefully migrate traffic when only one replica exists.
        - **Scale-up latency**: Scaling from 1 to 2 replicas takes time (metrics collection, cooldown periods). During this window, the single replica handles all traffic and may become overloaded.
        - **Pod Disruption Budgets**: PDBs cannot provide meaningful protection with only one replica, since there is no redundancy to preserve.

        Set `minReplicas` to at least 2 for any workload that requires availability, ensuring there is always redundancy even at minimum scale.
      audit: |
        Check HPA minimum replica settings:

        ```bash
        kubectl get hpa -A -o json | jq '.items[] | {namespace: .metadata.namespace, name: .metadata.name, minReplicas: .spec.minReplicas}'
        ```
      remediation: |
        Update the HPA to set `minReplicas` to at least 2:

        ```yaml
        apiVersion: autoscaling/v2
        kind: HorizontalPodAutoscaler
        metadata:
          name: my-app
        spec:
          scaleTargetRef:
            apiVersion: apps/v1
            kind: Deployment
            name: my-app
          minReplicas: 2
          maxReplicas: 10
          metrics:
            - type: Resource
              resource:
                name: cpu
                target:
                  type: Utilization
                  averageUtilization: 70
        ```

        For workloads that intentionally run as singletons (e.g., leader-elected controllers), consider excluding them from this check or documenting the exception.
    refs:
      - url: https://kubernetes.io/docs/tasks/run-application/horizontal-pod-autoscale/
        title: Kubernetes Horizontal Pod Autoscaling
      - url: https://kubernetes.io/docs/concepts/workloads/pods/disruptions/
        title: Kubernetes Pod Disruptions
  - uid: mondoo-kubernetes-best-practices-hpa-scale-target-kind
    title: HorizontalPodAutoscalers should target supported workload kinds
    impact: 30
    mql: |
      k8s.horizontalPodAutoscalers.all(scaleTargetKind.in(["Deployment", "StatefulSet", "ReplicaSet"]))
    docs:
      desc: |
        This check verifies that HorizontalPodAutoscalers target one of the workload kinds normally supported for autoscaling: Deployment, StatefulSet, or ReplicaSet.

        **Why this matters**

        HPAs rely on a scale target reference. Misspelled or unexpected target kinds prevent clear autoscaling intent and make duplicate-target governance unreliable.
      audit: |
        List HPAs with unsupported target kinds:

        ```bash
        kubectl get hpa -A -o json | jq -r '.items[] | select(.spec.scaleTargetRef.kind as $k | ["Deployment","StatefulSet","ReplicaSet"] | index($k) | not) | .metadata.namespace + "/" + .metadata.name + " -> " + .spec.scaleTargetRef.kind'
        ```
      remediation: |
        Update `spec.scaleTargetRef.kind` to the correct scalable workload kind for each HPA.
    refs:
      - url: https://kubernetes.io/docs/tasks/run-application/horizontal-pod-autoscale/
        title: Kubernetes Horizontal Pod Autoscaling
  - uid: mondoo-kubernetes-best-practices-hpa-no-duplicate-targets
    title: HorizontalPodAutoscalers should not duplicate scale targets
    impact: 40
    mql: |
      k8s.horizontalPodAutoscalers.map([namespace, scaleTargetKind, scaleTargetName].join("/")).duplicates().length == 0
    docs:
      desc: |
        This check verifies that no two HorizontalPodAutoscalers in the same namespace target the same workload kind and name.

        **Why this matters**

        Duplicate HPAs can fight over the same scale subresource and produce confusing or unstable scaling behavior. Each workload should have a single authoritative HPA.
      audit: |
        List duplicate HPA targets:

        ```bash
        kubectl get hpa -A -o json | jq -r '.items[] | [.metadata.namespace, .spec.scaleTargetRef.kind, .spec.scaleTargetRef.name, .metadata.name] | @tsv' | sort | awk 'BEGIN{FS=OFS="\t"} {key=$1 "/" $2 "/" $3; count[key]++; names[key]=names[key] " " $4} END{for (key in count) if (count[key] > 1) print key, names[key]}'
        ```
      remediation: |
        Keep one HPA for each namespace/kind/name scale target and remove or retarget duplicates.
    refs:
      - url: https://kubernetes.io/docs/tasks/run-application/horizontal-pod-autoscale/
        title: Kubernetes Horizontal Pod Autoscaling
  - uid: mondoo-kubernetes-best-practices-workloads-have-hpa
    title: Scalable workloads should have a HorizontalPodAutoscaler
    impact: 30
    mql: |
      k8s {
        hpaTargets = horizontalPodAutoscalers.map([namespace, scaleTargetKind, scaleTargetName].join("/"))

        deployments.map([namespace, "Deployment", name].join("/")).all(hpaTargets.contains(_))
        replicasets.where(ownerReferences.none(kind == "Deployment" && controller == true)).map([namespace, "ReplicaSet", name].join("/")).all(hpaTargets.contains(_))
        statefulsets.map([namespace, "StatefulSet", name].join("/")).all(hpaTargets.contains(_))
      }
    docs:
      desc: |
        This check verifies that every Deployment, standalone ReplicaSet, and StatefulSet has a HorizontalPodAutoscaler in the same namespace that targets the workload kind and name.

        **Why this matters**

        Workloads without an HPA cannot scale automatically when demand changes. This can lead to resource pressure during spikes or wasted capacity when traffic drops.
      audit: |
        List HPA scale targets and compare them to scalable workloads in each namespace:

        ```bash
        kubectl get hpa -A -o json | jq -r '.items[] | [.metadata.namespace, .spec.scaleTargetRef.kind, .spec.scaleTargetRef.name] | @tsv'
        kubectl get deployments,replicasets,statefulsets -A
        ```
      remediation: |
        Create an HPA for each scalable workload that should respond to load changes, or document an exception for workloads intentionally managed by another scaling mechanism.
    refs:
      - url: https://kubernetes.io/docs/tasks/run-application/horizontal-pod-autoscale/
        title: Kubernetes Horizontal Pod Autoscaling
  - uid: mondoo-kubernetes-best-practices-pdb-maxunavailable-nonzero
    title: PodDisruptionBudgets should not set maxUnavailable to zero
    impact: 40
    mql: |
      k8s.podDisruptionBudgets.all(manifest['spec']['maxUnavailable'] == null || manifest['spec']['maxUnavailable'] != 0 && manifest['spec']['maxUnavailable'] != "0" && manifest['spec']['maxUnavailable'] != "0%")
    docs:
      desc: |
        This check verifies that PodDisruptionBudgets do not set `spec.maxUnavailable` to zero.

        **Why this matters**

        A PDB with `maxUnavailable: 0` can block voluntary disruptions such as node drains. That can make planned maintenance and cluster upgrades harder to complete safely.
      audit: |
        List PDBs with `maxUnavailable` set to zero:

        ```bash
        kubectl get pdb -A -o json | jq -r '.items[] | select((.spec.maxUnavailable // null) == 0 or (.spec.maxUnavailable // "") == "0" or (.spec.maxUnavailable // "") == "0%") | .metadata.namespace + "/" + .metadata.name'
        ```
      remediation: |
        Remove `spec.maxUnavailable` or set it to a value greater than zero that still preserves the workload's availability target.
    refs:
      - url: https://kubernetes.io/docs/tasks/run-application/configure-pdb/
        title: Kubernetes PodDisruptionBudgets
