  - uid: mondoo-kubernetes-best-practices-pod-port-name
    title: Pod container ports should be named
    impact: 30
    mql: |
      k8s.pod.containers.all(ports.all(_['name'] != null && _['name'] != ""))
    docs:
      desc: |
        This check verifies that every declared container port in a Pod has a name. Named ports make Service definitions and other references more stable because callers can refer to the port name instead of hard-coding the number.
      remediation: |
        Add a non-empty `name` to every entry in `containers[].ports`.
    refs:
      - url: https://kubernetes.io/docs/concepts/services-networking/service/#field-spec-ports
