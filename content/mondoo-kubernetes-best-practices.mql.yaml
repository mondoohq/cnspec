queries:
  - uid: mondoo-kubernetes-best-practices-pod-no-owner
    title: Pods should have an owner
    impact: 50
    mql: |
      k8s.pod {
        manifest['metadata']['ownerReferences'] != empty && manifest['metadata']['ownerReferences'].length > 0
      }
    docs:
      desc: |
        This check verifies that Pods have the `ownerReferences` metadata field populated, which indicates they were created by a controller (such as a Deployment, ReplicaSet, DaemonSet, StatefulSet, or Job) rather than directly.

        **Why this matters**

        The `ownerReferences` metadata field establishes the relationship between a Pod and its managing controller. Pods without this metadata are typically "orphaned" or manually created, which creates operational risks:

          - **No automatic recovery**: Without a controller tracking the Pod, Kubernetes will not recreate it if it crashes or the node fails.
          - **No garbage collection**: Orphaned Pods are not automatically cleaned up when their parent resources are deleted.
          - **Manual lifecycle management**: Updates, scaling, and deletion must be handled manually for each Pod.
          - **Cluster maintenance risks**: During node drains or upgrades, Pods without owner references may be lost permanently.

        Ensure Pods are created through controllers like Deployments, which set the `ownerReferences` field automatically and provide lifecycle management.
      audit: |
        Check for Pods without an owner reference. Any line of output starting with '0' will indicate a Pod that has no owner:

        ```bash
        kubectl get pods -A -o json | jq -r '.items[] | [(.metadata.ownerReferences | length), .metadata.namespace, .metadata.name] | @tsv'
        ```
      remediation: |
        Recreate the Pod through a workload controller such as a Deployment, which sets `ownerReferences` automatically and manages the Pod lifecycle:

        ```yaml
        ---
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: example-app
          namespace: example-namespace
        spec:
          replicas: 1
          selector:
            matchLabels:
              app: example-app
          template:
            metadata:
              labels:
                app: example-app
            spec:
              containers:
                - name: app
                  image: images.my-company.example/app:v1
        ```

        Give the Deployment a `selector` and pod labels that do not collide with the standalone Pod's labels. If they match, the new controller may adopt or fight over the existing Pod instead of creating its own.

        After the controller-managed Pod is running, delete the standalone Pod:

        ```bash
        kubectl delete pod <pod-name> -n <namespace>
        ```

        If the standalone Pod was serving traffic, expect a brief gap while the controller-managed Pod takes over.
    refs:
      - url: https://kubernetes.io/docs/concepts/workloads/controllers/
        title: Kubernetes Workload Resources
  - uid: mondoo-kubernetes-best-practices-pod-priorityclassname
    title: Pods should define a priorityClassName
    impact: 30
    mql: |
      k8s.pod.priorityClassName != ""
    docs:
      desc: |
        This check verifies that Pods define `spec.priorityClassName`.

        **Why this matters**

        PriorityClasses let platform teams express scheduling importance and preemption behavior explicitly. In multi-tenant clusters, requiring a priority class helps prevent workloads from silently falling into the default priority tier and makes scheduling guarantees easier to review.
      audit: |
        List Pods that do not set a priority class:

        ```bash
        kubectl get pods -A -o json | jq -r '.items[] | select((.spec.priorityClassName // "") == "") | .metadata.namespace + "/" + .metadata.name'
        ```
      remediation: |
        Set `spec.priorityClassName` to an approved PriorityClass in the Pod template for the workload controller.
    refs:
      - url: https://kubernetes.io/docs/concepts/scheduling-eviction/pod-priority-preemption/
        title: Kubernetes Pod Priority and Preemption
  - uid: mondoo-kubernetes-best-practices-pod-label-app-name
    title: Pods should define the recommended app name label
    impact: 20
    mql: |
      k8s.pod.labels["app.kubernetes.io/name"] != empty && k8s.pod.labels["app.kubernetes.io/name"] != ""
    docs:
      desc: |
        This check verifies that Pods define the recommended `app.kubernetes.io/name` label.

        **Why this matters**

        The Kubernetes recommended app labels make ownership, selection, inventory, and troubleshooting consistent across controllers and tooling. Without a stable application name label, platform teams have to rely on inconsistent local conventions when grouping workloads.
      audit: |
        List Pods missing the recommended application name label:

        ```bash
        kubectl get pods -A -o json | jq -r '.items[] | select((.metadata.labels["app.kubernetes.io/name"] // "") == "") | .metadata.namespace + "/" + .metadata.name'
        ```
      remediation: |
        Add `metadata.labels["app.kubernetes.io/name"]` to Pods through the controller template that creates them.
    refs:
      - url: https://kubernetes.io/docs/concepts/overview/working-with-objects/common-labels/
        title: Kubernetes Recommended Labels
  - uid: mondoo-kubernetes-best-practices-pod-max-four-containers
    title: Pods should run no more than four containers
    impact: 30
    mql: |
      k8s.pod.containers.length <= 4
    docs:
      desc: |
        This check verifies that Pods run no more than four regular containers.

        **Why this matters**

        Pods are intended to group tightly coupled containers that share lifecycle and networking. A high number of containers in a single Pod makes ownership, resource allocation, rollout behavior, and troubleshooting harder to reason about. Keeping Pods small encourages clearer workload boundaries and makes policy results easier to map back to the responsible application component.
      audit: |
        List Pods with more than four regular containers:

        ```bash
        kubectl get pods -A -o json | jq -r '.items[] | select((.spec.containers | length) > 4) | .metadata.namespace + "/" + .metadata.name'
        ```
      remediation: |
        Split loosely coupled containers into separate workloads, or move helper behavior into a dedicated sidecar only when it must share the Pod lifecycle.
    refs:
      - url: https://kubernetes.io/docs/concepts/workloads/pods/
        title: Kubernetes Pods
  - uid: mondoo-kubernetes-best-practices-pod-not-besteffort
    title: Pods should avoid BestEffort resource posture
    impact: 30
    mql: |
      k8s.pod.containers.any(resources['requests'] != null || resources['limits'] != null)
    docs:
      desc: |
        This check verifies that at least one regular container in a Pod defines `resources.requests` or `resources.limits`.

        **Why this matters**

        Pods without any resource requests or limits are treated as BestEffort. BestEffort Pods are the first candidates for eviction under resource pressure and make capacity planning less predictable. Defining at least one request or limit moves the Pod out of the lowest resource posture and gives schedulers and operators clearer resource intent.
      audit: |
        List Pods where no regular container defines requests or limits:

        ```bash
        kubectl get pods -A -o json | jq -r '.items[] | select(all(.spec.containers[]?; (.resources.requests == null and .resources.limits == null))) | .metadata.namespace + "/" + .metadata.name'
        ```
      remediation: |
        Define `resources.requests` or `resources.limits` for at least one regular container in the Pod, preferably through the workload controller template.
    refs:
      - url: https://kubernetes.io/docs/concepts/workloads/pods/pod-qos/
        title: Kubernetes Pod Quality of Service Classes
  - uid: mondoo-kubernetes-best-practices-pod-no-cpu-limits
    title: Pods should not define CPU limits
    impact: 30
    mql: |
      k8s.pod.containers.all(resources['limits']['cpu'] == empty)
    docs:
      desc: |
        This check verifies that regular containers in a Pod do not define CPU limits.

        **Why this matters**

        CPU limits can throttle workloads even when spare CPU capacity exists on the node. Some platform teams prefer to define CPU requests for scheduling while leaving CPU limits unset so latency-sensitive applications can use available CPU headroom without artificial throttling.
      audit: |
        List Pods where at least one regular container defines a CPU limit:

        ```bash
        kubectl get pods -A -o json | jq -r '.items[] | select(any(.spec.containers[]?; .resources.limits.cpu != null)) | .metadata.namespace + "/" + .metadata.name'
        ```
      remediation: |
        Remove `resources.limits.cpu` from regular containers when your cluster resource policy allows CPU bursting. Keep CPU requests defined so the scheduler still has a capacity signal.
    refs:
      - url: https://kyverno.io/policies/other/forbid-cpu-limits/forbid-cpu-limits/
        title: Kyverno - Forbid CPU Limits
      - url: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
        title: Kubernetes Resource Management for Pods and Containers
  - uid: mondoo-kubernetes-best-practices-cronjob-no-cpu-limits
    title: CronJobs should not define CPU limits
    impact: 30
    mql: |
      k8s.cronjob.containers.all(resources['limits']['cpu'] == empty)
    docs:
      desc: |
        This check verifies that regular containers in a CronJob Pod template do not define CPU limits. CPU limits can throttle workloads even when spare CPU capacity exists on the node.
      audit: |
        List CronJobs where at least one regular container defines a CPU limit:

        ```bash
        kubectl get cronjobs -A -o json | jq -r '.items[] | select(any(.spec.jobTemplate.spec.template.spec.containers[]?; .resources.limits.cpu != null)) | .metadata.namespace + "/" + .metadata.name'
        ```
      remediation: |
        Remove `resources.limits.cpu` from regular containers in the CronJob Pod template when your cluster resource policy allows CPU bursting. Keep CPU requests defined so the scheduler still has a capacity signal.
    refs:
