  - uid: mondoo-kubernetes-best-practices-job-ttl-after-finished
    title: Direct Jobs should define ttlSecondsAfterFinished
    impact: 30
    mql: |
      k8s.job.ownerReferences.length > 0 || k8s.job.manifest['spec'].keys.contains('ttlSecondsAfterFinished')
    docs:
      desc: |
        This check verifies that directly created Jobs define `spec.ttlSecondsAfterFinished`. Jobs created by a CronJob are excluded because the CronJob controller owns their lifecycle.
      audit: |
        List directly created Jobs without `ttlSecondsAfterFinished`:

        ```bash
        kubectl get jobs -A -o json | jq -r '.items[] | select(((.metadata.ownerReferences // []) | length) == 0 and (.spec.ttlSecondsAfterFinished == null)) | .metadata.namespace + "/" + .metadata.name'
        ```
      remediation: |
        Set `spec.ttlSecondsAfterFinished` on directly created Jobs so completed Jobs are cleaned up automatically.
    refs:
