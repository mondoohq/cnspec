  - uid: mondoo-kubernetes-best-practices-pod-no-node-selector
    title: Pods should not use nodeSelector
    impact: 30
    mql: |
      k8s.pod.nodeSelector == empty
    docs:
      desc: |
        This check verifies that Pods do not set `spec.nodeSelector`.

        **Why this matters**

        Pod-level node selectors let workloads bypass normal scheduling placement and pin themselves to specific node labels. That can undermine capacity planning, availability, and workload isolation policies.
      audit: |
        List Pods that set `spec.nodeSelector`:

        ```bash
        kubectl get pods -A -o json | jq -r '.items[] | select((.spec.nodeSelector // {}) | length > 0) | .metadata.namespace + "/" + .metadata.name'
        ```
      remediation: |
        Remove `spec.nodeSelector` from Pods unless the placement is explicitly approved and managed by platform policy.
    refs:
      - url: https://kyverno.io/policies/other/restrict-node-selection/restrict-node-selection/
        title: Kyverno Restrict node selection policy
      - url: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/
        title: Assigning Pods to Nodes
  - uid: mondoo-kubernetes-best-practices-pod-emptydir-size-limit
    title: Pods should set size limits on emptyDir volumes
    impact: 40
    mql: |
      k8s.pod.podSpec['volumes'] == null || k8s.pod.podSpec['volumes'].where(_.keys.contains('emptyDir')).all(_['emptyDir'].keys.contains('sizeLimit'))
    docs:
      desc: |
        This check verifies that every Pod `emptyDir` volume defines `emptyDir.sizeLimit`.

        **Why this matters**

        Unbounded `emptyDir` volumes can consume node-local storage until the node experiences disk pressure. Setting a size limit bounds the volume and makes local storage consumption easier to plan and enforce.
      audit: |
        List Pods with `emptyDir` volumes that do not define `sizeLimit`:

        ```bash
        kubectl get pods -A -o json | jq -r '.items[] | select(any((.spec.volumes // [])[]?; has("emptyDir") and (.emptyDir.sizeLimit == null))) | .metadata.namespace + "/" + .metadata.name'
        ```
      remediation: |
        Set `emptyDir.sizeLimit` for each `emptyDir` volume, or replace the volume with storage that has an appropriate quota.
    refs:
      - url: https://kyverno.io/policies/other/add-emptydir-sizelimit/add-emptydir-sizelimit/
        title: Kyverno Add emptyDir sizeLimit policy
      - url: https://kubernetes.io/docs/concepts/storage/volumes/#emptydir
        title: Kubernetes emptyDir volumes
  - uid: mondoo-kubernetes-best-practices-pod-emptydir-ephemeral-storage-resources
    title: Containers mounting unbounded emptyDir volumes should request and limit ephemeral storage
    impact: 40
    mql: |
      k8s.pod {
        if (podSpec['volumes'] != empty) {
          unboundedEmptyDirVolumes = podSpec['volumes'].where(_.keys.contains('emptyDir') && _['emptyDir'].keys.contains('sizeLimit') == false).map(_['name'])
          initContainers.all(volumeMounts == empty || volumeMounts.where(unboundedEmptyDirVolumes.contains(_['name'])) == empty || resources['requests']['ephemeral-storage'] != empty && resources['limits']['ephemeral-storage'] != empty)
          containers.all(volumeMounts == empty || volumeMounts.where(unboundedEmptyDirVolumes.contains(_['name'])) == empty || resources['requests']['ephemeral-storage'] != empty && resources['limits']['ephemeral-storage'] != empty)
        } else {
          true
        }
      }
    docs:
      desc: |
        This check verifies that containers and init containers mounting `emptyDir` volumes without `sizeLimit` define both `ephemeral-storage` requests and limits.

        **Why this matters**

        When an `emptyDir` volume is unbounded, container-level ephemeral-storage requests and limits provide the scheduler and kubelet with resource expectations that reduce the risk of node-local storage exhaustion.
      audit: |
        List Pods with containers that mount unbounded `emptyDir` volumes without ephemeral-storage requests and limits:

        ```bash
        kubectl get pods -A -o json | jq -r '.items[] | [.spec.volumes[]? | select(has("emptyDir") and (.emptyDir.sizeLimit == null)) | .name] as $emptydirs | select($emptydirs | length > 0) | select(any((.spec.initContainers // []) + (.spec.containers // [])[]?; any((.volumeMounts // [])[]?; $emptydirs | index(.name)) and ((.resources.requests["ephemeral-storage"] // "") == "" or (.resources.limits["ephemeral-storage"] // "") == ""))) | .metadata.namespace + "/" + .metadata.name'
        ```
      remediation: |
        Either set `emptyDir.sizeLimit` on the mounted volume or define both `resources.requests["ephemeral-storage"]` and `resources.limits["ephemeral-storage"]` on each container that mounts it.
    refs:
      - url: https://kyverno.io/policies/other/require-emptydir-requests-limits/require-emptydir-requests-limits/
        title: Kyverno Require Requests and Limits for emptyDir policy
      - url: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/#local-ephemeral-storage
        title: Kubernetes local ephemeral storage resources
  - uid: mondoo-kubernetes-best-practices-deployment-default-namespace
    title: Deployments should not run in the default namespace
    impact: 20
    mql: |
      k8s.deployment {
        namespace != "default"
      }
    docs:
      desc: |
        This check verifies that workloads are deployed to a namespace other than `default`, ensuring proper organization and security isolation within the cluster.

        **Why this matters**

        The default namespace lacks the security controls and resource isolation that dedicated namespaces provide:

          - **No access controls**: Resources in default cannot be easily restricted with RBAC policies, allowing any user with cluster access to view or modify workloads.
          - **No resource isolation**: Without namespace-specific Resource Quotas and Limit Ranges, workloads compete for cluster resources without constraints.
          - **Network exposure**: Network Policies cannot effectively isolate traffic when workloads share the default namespace with other applications.
          - **Operational confusion**: Mixed workloads in default make it difficult to track ownership, apply consistent policies, or audit resources.
          - **Accidental access**: Developers may inadvertently access or modify production workloads if everything runs in default.

        Deploying workloads to dedicated namespaces enables fine-grained RBAC, resource quotas, network segmentation, and clearer organizational boundaries.
      audit: |
        Check to ensure no workloads are running in the default Namespace. this command should return no Deployments:

        ```yaml
        kubectl get deployments -n default
        ```
      remediation: |
        For any Deployments running in the default Namespace, update/redeploy the Deployments to a non-default Namespace:

        ```yaml
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: exampleDeployment
          namespace: deployment-namespace # <--- Define a namespace for workloads
        ```
    refs:
      - url: https://cloud.google.com/blog/products/containers-kubernetes/kubernetes-best-practices-organizing-with-namespaces
        title: 'Kubernetes best practices: Organizing with Namespaces'
      - url: https://kubernetes.io/docs/concepts/services-networking/network-policies/
        title: Kubernetes Network Policies
      - url: https://kubernetes.io/docs/concepts/policy/limit-range/
        title: Kubernetes Limit Ranges
