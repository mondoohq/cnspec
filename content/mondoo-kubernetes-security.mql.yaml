  - uid: mondoo-kubernetes-security-pod-non-root-groups
    title: Pods should use non-root group IDs
    impact: 80
    mql: |
      podGroupConfigured = k8s.pod.podSpec['securityContext']['runAsGroup'] != null && k8s.pod.podSpec['securityContext']['runAsGroup'] > 0
      containersUnsetOrNonRoot = k8s.pod.containers.all(runAsGroup == empty || runAsGroup > 0)
      initContainersUnsetOrNonRoot = k8s.pod.initContainers.all(runAsGroup == empty || runAsGroup > 0)
      ephemeralContainersUnsetOrNonRoot = k8s.pod.ephemeralContainers.all(runAsGroup == empty || runAsGroup > 0)
      containersSetNonRoot = k8s.pod.containers.all(runAsGroup > 0)
      initContainersSetNonRoot = k8s.pod.initContainers.all(runAsGroup > 0)
      ephemeralContainersSetNonRoot = k8s.pod.ephemeralContainers.all(runAsGroup > 0)
      podGroupConfigured && containersUnsetOrNonRoot && initContainersUnsetOrNonRoot && ephemeralContainersUnsetOrNonRoot || containersSetNonRoot && initContainersSetNonRoot && ephemeralContainersSetNonRoot
      k8s.pod.podSpec['securityContext']['supplementalGroups'] == null || k8s.pod.podSpec['securityContext']['supplementalGroups'].all(_ > 0)
      k8s.pod.podSpec['securityContext']['fsGroup'] == null || k8s.pod.podSpec['securityContext']['fsGroup'] > 0
    docs:
      desc: |
        This check ensures Pods do not run with root group IDs. Pod-level `runAsGroup`, container-level `runAsGroup`, `supplementalGroups`, and `fsGroup` values must be unset where Kubernetes treats that as safe, or set to a value greater than zero.
      audit: |
        Review the Pod security context and every container security context. Group ID values of `0` fail this check.
      remediation: |
        Set `runAsGroup`, `supplementalGroups`, and `fsGroup` to non-zero values, or remove optional group settings when they are not required.
    refs:
      - url: https://kubernetes.io/docs/tasks/configure-pod-container/security-context/
        title: Configure a Security Context for a Pod or Container
