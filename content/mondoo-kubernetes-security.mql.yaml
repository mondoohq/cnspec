  - uid: mondoo-kubernetes-security-statefulset-no-flux-v1-annotations
    title: StatefulSets should not use Flux v1 annotations
    impact: 60
    mql: |
      k8s.statefulset.annotations.keys.none(_ == /^fluxcd\.io\//)
    docs:
      desc: |
        This check verifies that StatefulSets do not define annotation keys with the legacy `fluxcd.io/` prefix. These annotations are reserved for Flux v1-era automation and should not be set on workloads unless explicitly allowed.
      audit: |
