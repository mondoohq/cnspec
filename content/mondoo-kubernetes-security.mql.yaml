  - uid: mondoo-kubernetes-security-pod-readonlyrootfilesystem
    title: Container should use an immutable root filesystem
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ccc-06
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-1
      compliance/nist-csf-2: nist-csf-2-pr-ps-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-2
      compliance/pci-dss-4: pcidss-requirement-2-2-1
      compliance/soc2-2017: soc2-control-cc7-1-1
      compliance/vda-isa-5: vda-isa-5-5-2-1
    mql: |
      k8s.pod.hasWritableRootFilesystem == false
    docs:
      desc: |
        This check ensures that containers are configured to use an immutable (read-only) root filesystem. This configuration prevents processes within the container from modifying the filesystem at runtime, reducing the risk of unauthorized changes or persistence by attackers.

        **Why this matters**

        Allowing containers to write to the root filesystem can introduce significant security risks:

        - Attackers or compromised processes may modify binaries or configuration files, enabling privilege escalation or persistence.
        - Malicious changes to the filesystem can go undetected, making incident response and recovery more difficult.
        - Compliance with security best practices and organizational policies may be compromised.

        By ensuring that containers use a read-only root filesystem, organizations can strengthen workload isolation, reduce the attack surface, and maintain a secure Kubernetes environment.
      audit: |
        Each container's `securityContext` should set `readOnlyRootFilesystem: true`. The manifest below shows the required configuration:

        ```yaml
        ---
        apiVersion: v1
        kind: Pod
        spec:
          containers:
            - name: container-name
              image: index.docker.io/yournamespace/repository
              securityContext:
                readOnlyRootFilesystem: true
        ```
      remediation: |
        Set `readOnlyRootFilesystem` to `true` in each container's `securityContext`. The manifest below shows the required configuration:

        Test this in staging first. Applying it rolls the workload's pods, and any process that writes to the container filesystem will fail once the root filesystem is read-only. Mount an `emptyDir`, or another writable volume, at each path the application needs to write, such as a cache, scratch, or temp directory, before enforcing this setting. Update the source manifest and apply it with `kubectl apply -f <file>.yaml`, or run `kubectl edit <kind>/<name>` to edit the live object.

        The corrected manifest:

        ```yaml
        ---
        apiVersion: v1
        kind: Pod
        spec:
          containers:
            - name: container-name
              image: index.docker.io/yournamespace/repository
              securityContext:
                readOnlyRootFilesystem: true
        ```
    refs:
      - url: https://kubernetes.io/docs/tasks/configure-pod-container/security-context/
        title: Configure a Security Context for a Pod or Container
