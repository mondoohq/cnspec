  - uid: mondoo-kubernetes-security-pod-apparmor-profile
    title: Pods should use allowed AppArmor profiles
    impact: 60
    mql: |
      k8s.pod.annotations.keys
        .where(_ == /^container\.apparmor\.security\.beta\.kubernetes\.io\//)
        .none(k8s.pod.annotations[_] != "runtime/default" && k8s.pod.annotations[_] != /^localhost\//)
      k8s.pod.podSpec['securityContext']['appArmorProfile']['type'] == null || k8s.pod.podSpec['securityContext']['appArmorProfile']['type'].in(["RuntimeDefault", "Localhost"])
      k8s.pod.ephemeralContainers.all(securityContext['appArmorProfile']['type'] == null || securityContext['appArmorProfile']['type'].in(["RuntimeDefault", "Localhost"]))
      k8s.pod.initContainers.all(securityContext['appArmorProfile']['type'] == null || securityContext['appArmorProfile']['type'].in(["RuntimeDefault", "Localhost"]))
      k8s.pod.containers.all(securityContext['appArmorProfile']['type'] == null || securityContext['appArmorProfile']['type'].in(["RuntimeDefault", "Localhost"]))
    docs:
      desc: |
        This check verifies that Pod AppArmor annotations and `securityContext.appArmorProfile` settings, when set, use either the runtime default or a local profile.
      audit: |
        List Pods with AppArmor annotations outside the allowed values:

        ```bash
        kubectl get pods -A -o json | jq -r '.items[] | select((.metadata.annotations // {}) | to_entries | any(.key | startswith("container.apparmor.security.beta.kubernetes.io/"); (.value != "runtime/default" and (.value | startswith("localhost/") | not)))) | .metadata.namespace + "/" + .metadata.name'
        ```
      remediation: |
        Remove disallowed AppArmor annotations, set them to `runtime/default`, or point them at an approved local profile with the `localhost/` prefix.
    refs:
