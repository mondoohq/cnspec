  - uid: mondoo-kubernetes-security-deployment-no-flux-v1-annotations
    title: Deployments should not use Flux v1 annotations
    impact: 60
    mql: |
      k8s.deployment.annotations.keys.none(_ == /^fluxcd\.io\//)
    docs:
      desc: |
