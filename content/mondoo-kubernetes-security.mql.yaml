      audit: |
        Review CronJob metadata annotations for keys that begin with `fluxcd.io/`.
      remediation: |
        Remove `fluxcd.io/` annotations from CronJob metadata or migrate the workflow to supported Flux annotations.
    refs:
      - url: https://kyverno.io/policies/other/restrict-annotations/restrict-annotations/
        title: Kyverno Restrict Annotations policy
  - uid: mondoo-kubernetes-security-job-no-flux-v1-annotations
    title: Jobs should not use Flux v1 annotations
    impact: 60
    mql: |
      k8s.job.annotations.keys.none(_ == /^fluxcd\.io\//)
    docs:
      desc: |
        This check verifies that Jobs do not define annotation keys with the legacy `fluxcd.io/` prefix. These annotations are reserved for Flux v1-era automation and should not be set on workloads unless explicitly allowed.
      audit: |
        Review Job metadata annotations for keys that begin with `fluxcd.io/`.
      remediation: |
        Remove `fluxcd.io/` annotations from Job metadata or migrate the workflow to supported Flux annotations.
    refs:
      - url: https://kyverno.io/policies/other/restrict-annotations/restrict-annotations/
        title: Kyverno Restrict Annotations policy
  - uid: mondoo-kubernetes-security-job-created-by-cronjob
    title: Jobs should be created by CronJobs
    impact: 60
    mql: |
      k8s.job.ownerReferences.length > 0 && k8s.job.ownerReferences[0].kind == "CronJob" && k8s.job.ownerReferences[0].controller == true
    docs:
      desc: |
        This check verifies that Jobs are owned by a CronJob controller. Directly created Jobs can bypass CronJob scheduling and lifecycle controls when an environment expects Jobs to be spawned only by CronJobs.
      audit: |
        Review Jobs whose first owner reference is not a CronJob.
      remediation: |
        Create scheduled Jobs through CronJobs or remove directly created Jobs that are not approved.
    refs:
      - url: https://kyverno.io/policies/other/restrict-jobs/restrict-jobs/
        title: Kyverno Restrict Jobs policy
  - uid: mondoo-kubernetes-security-daemonset-no-flux-v1-annotations
    title: DaemonSets should not use Flux v1 annotations
    impact: 60
    mql: |
      k8s.daemonset.annotations.keys.none(_ == /^fluxcd\.io\//)
    docs:
      desc: |
