        stat -c "%U:%G" /etc/kubernetes/pki
        ```

        If your PKI/SSL directory is located elsewhere, adjust the path accordingly. If the output is `root:root`, the check passes. If the directory is owned by any other user or group, the check fails.
      remediation:
        - id: cli
          desc: |
            **Using CLI**

            Ensure that the PKI/SSL directory is owned by `root:root` by running the following command on the Control Plane node:

            ```bash
            chown -R root:root /etc/kubernetes/pki/
            ```

            or if your PKI/SSL directory is located elsewhere, adjust the path accordingly such as:

            ```bash
            chown -R root:root /etc/kubernetes/ssl/
            ```
    refs:
      - url: https://kubernetes.io/docs/setup/best-practices/certificates/
        title: PKI certificates and requirements
  - uid: mondoo-kubernetes-security-https-api-server
    title: Ensure the kube-apiserver is not listening on an insecure HTTP port
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    mql: |
      processes.where(executable == /kube-apiserver/).list {
        flags["insecure-port"] == 0
      }
    docs:
      desc: |
        This check ensures that the kube-apiserver is not listening on an insecure HTTP port. Disabling the insecure port enforces encrypted communication and prevents sensitive data from being transmitted in plaintext.

        **Why this matters**

        The Kubernetes API server is the central management point for the cluster. If it listens on an insecure HTTP port:

        - Unencrypted traffic can be intercepted, exposing sensitive cluster data and credentials.
        - Attackers may exploit the insecure port to gain unauthorized access or disrupt cluster operations.
        - Compliance with security best practices and regulatory requirements may be violated.

        By ensuring the kube-apiserver does not listen on an insecure HTTP port, organizations can protect sensitive data in transit and maintain a strong security posture for their Kubernetes clusters.
      audit: |
        Inspect the API server arguments on each control plane node:

        1. List the running kube-apiserver process and its arguments:

           ```bash
           ps -ef | grep kube-apiserver
           ```

        2. On kubeadm clusters, you can also read the static pod manifest:

           ```bash
           kubectl -n kube-system get pod -l component=kube-apiserver -o yaml | grep insecure-port
           ```

        If `--insecure-port` is set to `0` (or the argument is absent on a Kubernetes version where the insecure port has been removed), the check passes. If `--insecure-port` is set to any non-zero value, the check fails.
      remediation: |
        This applies to self-managed control planes only. On managed services such as EKS, GKE, and AKS the control plane is provider-managed and this is handled for you.

        The `--insecure-port` and `--insecure-bind-address` flags were removed in Kubernetes 1.20, and the insecure port no longer exists on supported clusters. On 1.20 and later, no action is needed beyond confirming you are on a supported version.

        On a self-managed cluster older than 1.20, back up and edit `/etc/kubernetes/manifests/kube-apiserver.yaml`, ensure no `--insecure-port` (set it to `0`) and no `--insecure-bind-address` remain, then save the file so the kubelet restarts the static pod. The strongest fix is to upgrade to a supported Kubernetes version where the insecure port is gone entirely.
    refs:
      - url: https://kubernetes.io/docs/concepts/security/controlling-access/#transport-security
        title: Controlling Access to the Kubernetes API - Transport security
  - uid: mondoo-kubernetes-security-api-server-no-anonymous-auth
    title: Ensure the kube-apiserver does not allow anonymous authentication
    impact: 100
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-j
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-5
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-7
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-3
    mql: |
      processes.where(executable == /kube-apiserver/).list {
        flags["anonymous-auth"] == "false"
      }
    docs:
      desc: |
        This check ensures that the kube-apiserver does not allow anonymous authentication. Disabling anonymous authentication enforces proper access control and prevents unauthenticated users from accessing the Kubernetes API server.

        **Why this matters**

        The Kubernetes API server is the central management point for the cluster. If anonymous authentication is enabled:

        - Unauthenticated users may gain access to sensitive cluster resources and information.
        - Attackers could exploit this access to perform unauthorized actions or escalate privileges.
        - Compliance with security standards and best practices may be compromised.

        By ensuring that anonymous authentication is disabled, organizations can maintain strong access controls and protect the security and integrity of their Kubernetes clusters.
      audit: |
        Inspect the API server arguments on each control plane node:

        1. List the running kube-apiserver process and its arguments:

           ```bash
           ps -ef | grep kube-apiserver
           ```

        2. On kubeadm clusters, you can also read the static pod manifest:

           ```bash
           kubectl -n kube-system get pod -l component=kube-apiserver -o yaml | grep anonymous-auth
           ```

        If `--anonymous-auth` is set to `false`, the check passes. If it is set to `true` or is absent, the check fails.
      remediation: |
        These flags apply to self-managed control planes only. On managed services such as EKS, GKE, and AKS the control plane is provider-managed and these flags cannot be changed. On kubeadm clusters the API server runs as a static pod: back up and edit `/etc/kubernetes/manifests/kube-apiserver.yaml`, and the kubelet automatically restarts the static pod when you save the file. Do not run `kubectl rollout restart` for the API server. After saving, watch `kubectl -n kube-system get pod -l component=kube-apiserver` or `crictl ps` to confirm it comes back, because a bad flag can stop the API server from starting and lock you out of the cluster.

        Set `--anonymous-auth=false` on the API server so unauthenticated requests are rejected.
    refs:
      - url: https://kubernetes.io/docs/reference/access-authn-authz/authentication/#anonymous-requests
        title: Anonymous requests
  - uid: mondoo-kubernetes-security-pod-docker-socket
    title: Container should not mount the Docker socket
    impact: 100
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-2
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-2-1
    mql: |
      k8s.pod {
        podSpec['volumes'] == null || podSpec['volumes'].where(_['hostPath'] != empty).all(_['hostPath']['path'] != '/var/run/docker.sock')
      }
    docs:
      desc: |
        This check ensures that containers do not mount the Docker socket (`/var/run/docker.sock`). Mounting the Docker socket into a container provides direct access to the container runtime, bypassing Kubernetes security controls and authentication.

        **Why this matters**

        Allowing containers to access the Docker socket can lead to significant security risks:

        - Containers can create or control other containers on the host, potentially escalating privileges.
        - Attackers may gain access to the host file system or create containers that are not visible to the Kubernetes API.
        - Sensitive information and credentials may be exposed, and compliance with security best practices may be violated.

        By ensuring that containers do not mount the Docker socket, organizations can prevent privilege escalation, maintain workload isolation, and protect the integrity of the Kubernetes environment.
      audit: |
        A pod `volumes` list that mounts `/var/run/docker.sock` as a `hostPath` triggers this check, as shown in the manifest below:

        ```yaml
        ---
        apiVersion: v1
        kind: Pod
        spec:
          volumes:
            - name: vol
              hostPath:
                - path: /var/run/docker.sock
          containers:
            - name: app
              image: images.my-company.example/app:v1.2.3
              volumeMounts:
                - mountPath: /var/run/docker.sock
                  name: vol
        ```
      remediation: |
        Remove any `hostPath` volume that mounts `/var/run/docker.sock` from the pod's `volumes` list. The manifest below marks the entry that must be deleted:

        ```yaml
        ---
        apiVersion: v1
        kind: Pod
        spec:
          volumes:
            - name: vol
              hostPath:
                - path: /var/run/docker.sock  # <--- this shouldn't be there
        ```
    refs:
      - url: https://cheatsheetseries.owasp.org/cheatsheets/Docker_Security_Cheat_Sheet.html#rule-1-do-not-expose-the-docker-daemon-socket-even-to-the-containers
        title: Docker security
