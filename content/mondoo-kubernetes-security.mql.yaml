  - uid: mondoo-kubernetes-security-pod-selinux-type
    title: Pods should only use allowed SELinux types
    impact: 80
    mql: |
      k8s.pod.podSpec['securityContext']['seLinuxOptions']['type'] == null || k8s.pod.podSpec['securityContext']['seLinuxOptions']['type'].in(["container_t", "container_init_t", "container_kvm_t"])
      k8s.pod.ephemeralContainers.all(securityContext['seLinuxOptions']['type'] == null || securityContext['seLinuxOptions']['type'].in(["container_t", "container_init_t", "container_kvm_t"]))
      k8s.pod.initContainers.all(securityContext['seLinuxOptions']['type'] == null || securityContext['seLinuxOptions']['type'].in(["container_t", "container_init_t", "container_kvm_t"]))
      k8s.pod.containers.all(securityContext['seLinuxOptions']['type'] == null || securityContext['seLinuxOptions']['type'].in(["container_t", "container_init_t", "container_kvm_t"]))
    docs:
      desc: |
        This check verifies that Pod SELinux type settings are unset or use one of the Kubernetes Pod Security Standards baseline values: `container_t`, `container_init_t`, or `container_kvm_t`.

        SELinux type settings outside the baseline allow list can weaken workload isolation. Keeping the type unset or restricted to the allow list aligns workloads with the baseline profile.
      audit: |
        List Pods with SELinux types outside the baseline allow list:

        ```bash
        kubectl get pods -A -o json | jq -r '.items[] | select((.spec.securityContext.seLinuxOptions.type? // "") as $t | ($t != "" and (["container_t","container_init_t","container_kvm_t"] | index($t) | not))) | .metadata.namespace + "/" + .metadata.name'
        ```
      remediation: |
        Remove `securityContext.seLinuxOptions.type` or set it to `container_t`, `container_init_t`, or `container_kvm_t` on the Pod and all containers.
    refs:
      - url: https://kubernetes.io/docs/concepts/security/pod-security-standards/#baseline
        title: Kubernetes Pod Security Standards baseline profile
