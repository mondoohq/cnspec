    docs:
      desc: |
        This check verifies that Pod containers do not change the default `/proc` mount behavior.

        Kubernetes masks selected `/proc` paths by default to reduce container attack surface. Setting `procMount` to a non-default value can expose additional host process information to a container.
      audit: |
        List Pods with non-default procMount settings:

        ```bash
        kubectl get pods -A -o json | jq -r '.items[] | select(any((.spec.containers + (.spec.initContainers // []) + (.spec.ephemeralContainers // []))[]?; (.securityContext.procMount? // "Default") != "Default")) | .metadata.namespace + "/" + .metadata.name'
        ```
      remediation: |
        Remove `securityContext.procMount` or set it to `Default` on every container, init container, and ephemeral container.
