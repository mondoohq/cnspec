  - uid: mondoo-kubernetes-security-pod-proc-mount
    title: Pods should only use the default proc mount
    impact: 80
    mql: |
      k8s.pod.ephemeralContainers.all(securityContext['procMount'] == null || securityContext['procMount'] == "Default")
      k8s.pod.initContainers.all(securityContext['procMount'] == null || securityContext['procMount'] == "Default")
