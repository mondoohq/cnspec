  - uid: mondoo-kubernetes-security-pod-sysctls-no-cr8escape-values
    title: Pods should not use cr8escape sysctl values
    impact: 80
    mql: |
      k8s.pod.podSpec['securityContext']['sysctls'] == null || k8s.pod.podSpec['securityContext']['sysctls'].all(_['value'] == null || _['value'].contains("+") == false && _['value'].contains("=") == false)
    docs:
