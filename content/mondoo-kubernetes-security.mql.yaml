  - uid: mondoo-kubernetes-security-pod-safe-sysctls
    title: Pods should only use safe sysctls
    impact: 60
    mql: |
      k8s.pod.podSpec['securityContext']['sysctls'] == null || k8s.pod.podSpec['securityContext']['sysctls'].all(_['name'].in(["kernel.shm_rmid_forced", "net.ipv4.ip_local_port_range", "net.ipv4.ip_unprivileged_port_start", "net.ipv4.tcp_syncookies", "net.ipv4.ping_group_range"]))
    docs:
      desc: |
        This check verifies that Pods only configure sysctls from the Kubernetes Pod Security Standards safe list.

        Unsafe sysctls can disable kernel security mechanisms or affect other Pods on the same node. Limiting workloads to the safe list preserves node isolation.
      audit: |
        List Pods with sysctls outside the safe list:

        ```bash
        kubectl get pods -A -o json | jq -r '.items[] | select(any(.spec.securityContext.sysctls[]?; .name as $n | ["kernel.shm_rmid_forced","net.ipv4.ip_local_port_range","net.ipv4.ip_unprivileged_port_start","net.ipv4.tcp_syncookies","net.ipv4.ping_group_range"] | index($n) | not)) | .metadata.namespace + "/" + .metadata.name'
        ```
      remediation: |
        Remove unsafe entries from `spec.securityContext.sysctls` and keep only names from the Kubernetes safe sysctl list.
    refs:
      - url: https://kubernetes.io/docs/concepts/security/pod-security-standards/#baseline
        title: Kubernetes Pod Security Standards baseline profile
