    props:
      - uid: mondooKubernetesSecurityExcludedByFixedImages
        title: Exclude containers from the check when using fixed images using hash values.
        mql: |
          # Add a list of container images in the format <image-name>@<digest>, such as: return ['image@sha256:45b23dee08af5e43a7fea6c4cf9c25ccf269ee113168c19722f87876677c5cb2', 'image@sha256:12a23dee08af5e43a7fea6c4cf9c25ccf269ee113168c19722f87876677c5123']
          return ['']
    mql: |
      k8s.pod.ephemeralContainers
        .where(imageName.in(props.mondooKubernetesSecurityExcludedByFixedImages) != true)
        .all(imagePullPolicy == 'Always')
      k8s.pod.ephemeralContainers
        .where(imageName.in(props.mondooKubernetesSecurityExcludedByFixedImages) != true)
        .all(imageName != /:latest/)
      k8s.pod.ephemeralContainers
        .where(imageName.in(props.mondooKubernetesSecurityExcludedByFixedImages) != true)
        .all(imageName == /(^|\/)[^\/:@]+:[^\/:@]+$/ || imageName.contains('@sha256:') == true)
      k8s.pod.initContainers
        .where(imageName.in(props.mondooKubernetesSecurityExcludedByFixedImages) != true)
        .all(imagePullPolicy == 'Always')
      k8s.pod.initContainers
        .where(imageName.in(props.mondooKubernetesSecurityExcludedByFixedImages) != true)
        .all(imageName != /:latest/)
      k8s.pod.initContainers
        .where(imageName.in(props.mondooKubernetesSecurityExcludedByFixedImages) != true)
        .all(imageName == /(^|\/)[^\/:@]+:[^\/:@]+$/ || imageName.contains('@sha256:') == true)
      k8s.pod.containers
        .where(imageName.in(props.mondooKubernetesSecurityExcludedByFixedImages) != true)
        .all(imagePullPolicy == 'Always')
      k8s.pod.containers
        .where(imageName.in(props.mondooKubernetesSecurityExcludedByFixedImages) != true)
        .all(imageName != /:latest/)
      k8s.pod.containers
        .where(imageName.in(props.mondooKubernetesSecurityExcludedByFixedImages) != true)
        .all(imageName == /(^|\/)[^\/:@]+:[^\/:@]+$/ || imageName.contains('@sha256:') == true)
    docs:
      desc: |
        It's important that each time a pod is started the same container is pulled, so that services across pods behave the same. To ensure the same container is always used, manifests should set `imagePullPolicy: Always` and the `image` configuration should pull either a tag or a digest (SHA).
        Avoid using rolling tags like `latest` or `master` as they can change over time.
      audit: |
        Each container should set `imagePullPolicy: Always` and reference `image` by a specific tag or SHA digest. The manifest below shows the required configuration:

        ```yaml
        ---
        apiVersion: v1
        kind: Pod
        spec:
          containers:
            - name: app
              image: images.my-company.example/app:v1.2.3
              imagePullPolicy: Always
        ```
      remediation: |
        For true consistency, pin each `image` to an immutable digest with `repo@sha256:...`. A digest always resolves to the exact same image, so every node and every restart runs identical bytes. A mutable tag can be repointed to different content over time, so it does not guarantee the same image.

        Setting `imagePullPolicy: Always` is about freshness, not determinism. It makes the node re-check the registry on every start instead of serving a cached layer, but if the `image` is a mutable tag, `Always` can pull a different digest than before. Use `Always` together with digest pinning when you want the node to confirm the pinned image is present without trusting its local cache.

        The manifest below pins a tag and sets `imagePullPolicy: Always`. For the strongest guarantee, replace the tag with a digest, for example `images.my-company.example/app@sha256:<digest>`:

        ```yaml
        ---
        apiVersion: v1
        kind: Pod
        spec:
          containers:
            - name: app
              image: images.my-company.example/app:v1.2.3
              imagePullPolicy: Always
        ```
    refs:
      - url: https://kubernetes.io/docs/concepts/containers/images/#image-pull-policy
        title: Image pull policy
