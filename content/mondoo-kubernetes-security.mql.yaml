        ```

        On kubeadm clusters you can also run `ps -ef | grep kube-apiserver`. If `EventRateLimit` appears in the `--enable-admission-plugins` list, the check passes. If it is missing, the check fails.
      remediation: |
        These flags apply to self-managed control planes only. On managed services such as EKS, GKE, and AKS the control plane is provider-managed and these flags cannot be changed. On kubeadm clusters the API server runs as a static pod: back up and edit `/etc/kubernetes/manifests/kube-apiserver.yaml`, and the kubelet automatically restarts the static pod when you save the file. Do not run `kubectl rollout restart` for the API server. After saving, watch `kubectl -n kube-system get pod -l component=kube-apiserver` or `crictl ps` to confirm it comes back, because a bad flag can stop the API server from starting and lock you out of the cluster.

        Add `EventRateLimit` to the API server `--enable-admission-plugins` flag and supply a configuration file via `--admission-control-config-file`.
    refs:
      - url: https://kubernetes.io/docs/reference/access-authn-authz/admission-controllers/#eventratelimit
        title: Kubernetes - EventRateLimit Admission Controller
  - uid: mondoo-kubernetes-security-api-server-audit-log-path
    title: Ensure the kube-apiserver writes audit logs to a file
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-pr-pt-1
      compliance/nist-csf-2: nist-csf-2-de-cm-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    mql: |
      processes.where(executable == /kube-apiserver/).list {
        flags["audit-log-path"] != null
        flags["audit-log-path"] != ""
      }
    docs:
      desc: |
        This check ensures that the kube-apiserver writes audit events to disk via `--audit-log-path`. Audit logs record every API request, providing the forensic evidence needed for incident response and compliance reporting.

        **Why this matters**

        Without an audit log path, the cluster has no record of who created, modified, or deleted resources, making it impossible to detect or investigate intrusions, privilege abuse, or misconfiguration.
      audit: |
        Inspect the API server `--audit-log-path` argument on each control plane node:

        ```bash
        kubectl -n kube-system get pod -l component=kube-apiserver -o yaml | grep audit-log-path
        ```

        On kubeadm clusters you can also run `ps -ef | grep kube-apiserver`. If `--audit-log-path` is set to a non-empty file location, the check passes. If the argument is absent or empty, the check fails.
      remediation: |
        These flags apply to self-managed control planes only. On managed services such as EKS, GKE, and AKS the control plane is provider-managed and these flags cannot be changed. On kubeadm clusters the API server runs as a static pod: back up and edit `/etc/kubernetes/manifests/kube-apiserver.yaml`, and the kubelet automatically restarts the static pod when you save the file. Do not run `kubectl rollout restart` for the API server. After saving, watch `kubectl -n kube-system get pod -l component=kube-apiserver` or `crictl ps` to confirm it comes back, because a bad flag can stop the API server from starting and lock you out of the cluster.

        Set the API server `--audit-log-path` flag to a writable file location such as `/var/log/kubernetes/audit.log` and save the file so the kubelet restarts the static pod.
    refs:
      - url: https://kubernetes.io/docs/tasks/debug/debug-cluster/audit/
        title: Kubernetes - Auditing
  - uid: mondoo-kubernetes-security-api-server-audit-policy-file
    title: Ensure the kube-apiserver loads an audit policy file
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-pr-pt-1
      compliance/nist-csf-2: nist-csf-2-pr-ps-04
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    mql: |
      processes.where(executable == /kube-apiserver/).list {
        flags["audit-policy-file"] != null
        flags["audit-policy-file"] != ""
      }
    docs:
      desc: |
        This check ensures that the kube-apiserver is started with an `--audit-policy-file`. An audit policy declares which events are recorded and at what level (`None`, `Metadata`, `Request`, `RequestResponse`).

        **Why this matters**

        Without a policy file, the audit log either is silent or records every event at maximum verbosity, causing valuable signals to be missed or drowned in noise. A tuned policy ensures security-relevant events such as authentication failures, RBAC changes, and Secret access are captured.
      audit: |
        Inspect the API server `--audit-policy-file` argument on each control plane node:

        ```bash
        kubectl -n kube-system get pod -l component=kube-apiserver -o yaml | grep audit-policy-file
        ```

        On kubeadm clusters you can also run `ps -ef | grep kube-apiserver`. If `--audit-policy-file` is set to a non-empty path, the check passes. If the argument is absent or empty, the check fails.
      remediation: |
        These flags apply to self-managed control planes only. On managed services such as EKS, GKE, and AKS the control plane is provider-managed and these flags cannot be changed. On kubeadm clusters the API server runs as a static pod: back up and edit `/etc/kubernetes/manifests/kube-apiserver.yaml`, and the kubelet automatically restarts the static pod when you save the file. Do not run `kubectl rollout restart` for the API server. After saving, watch `kubectl -n kube-system get pod -l component=kube-apiserver` or `crictl ps` to confirm it comes back, because a bad flag can stop the API server from starting and lock you out of the cluster.

        Create an audit policy YAML and pass it to the API server via `--audit-policy-file=/etc/kubernetes/audit-policy.yaml`. Save the manifest so the kubelet restarts the static pod after the file is in place.
    refs:
      - url: https://kubernetes.io/docs/tasks/debug/debug-cluster/audit/#audit-policy
        title: Kubernetes - Audit policy
  - uid: mondoo-kubernetes-security-api-server-audit-log-maxage
    title: Ensure the kube-apiserver retains audit logs for at least 30 days
    impact: 50
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-pr-pt-1
      compliance/nist-csf-2: nist-csf-2-pr-ps-04
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-11
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    mql: |
      processes.where(executable == /kube-apiserver/).list {
        flags["audit-log-maxage"] != null
        int(flags["audit-log-maxage"]) >= 30
      }
    docs:
      desc: |
        This check ensures that the kube-apiserver retains audit logs locally for at least 30 days via `--audit-log-maxage`. Most incident response timelines exceed two weeks, so shorter retention destroys evidence before investigators can review it.

        **Why this matters**

        Audit logs are the primary forensic record of activity in the cluster. Truncated retention windows make breach detection and root-cause analysis impossible after the fact.
      audit: |
        Inspect the API server `--audit-log-maxage` argument on each control plane node:

        ```bash
        kubectl -n kube-system get pod -l component=kube-apiserver -o yaml | grep audit-log-maxage
        ```

        On kubeadm clusters you can also run `ps -ef | grep kube-apiserver`. If `--audit-log-maxage` is set to `30` or higher, the check passes. If the argument is absent or set to a value below `30`, the check fails.
      remediation: |
        These flags apply to self-managed control planes only. On managed services such as EKS, GKE, and AKS the control plane is provider-managed and these flags cannot be changed. On kubeadm clusters the API server runs as a static pod: back up and edit `/etc/kubernetes/manifests/kube-apiserver.yaml`, and the kubelet automatically restarts the static pod when you save the file. Do not run `kubectl rollout restart` for the API server. After saving, watch `kubectl -n kube-system get pod -l component=kube-apiserver` or `crictl ps` to confirm it comes back, because a bad flag can stop the API server from starting and lock you out of the cluster.

        Set the API server `--audit-log-maxage=30` (or a higher value matching your retention policy) and save the file so the kubelet restarts the static pod. Forward audit logs to a long-term store such as a SIEM in addition to local retention.
    refs:
      - url: https://kubernetes.io/docs/tasks/debug/debug-cluster/audit/#log-backend
        title: Kubernetes - Audit log backend options
  - uid: mondoo-kubernetes-security-api-server-encryption-provider-config
    title: Ensure the kube-apiserver encrypts secrets at rest in etcd
    impact: 100
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-1
      compliance/vda-isa-5: vda-isa-5-5-1-1
    mql: |
      processes.where(executable == /kube-apiserver/).list {
        flags["encryption-provider-config"] != null
        flags["encryption-provider-config"] != ""
      }
    docs:
      desc: |
        This check ensures that the kube-apiserver is configured with `--encryption-provider-config`, which enables encryption at rest for Kubernetes Secrets and other sensitive resources stored in etcd.

        **Why this matters**

        By default, etcd stores Kubernetes Secrets, ConfigMaps, and tokens in plaintext. An attacker with read access to etcd files or backups can recover every credential in the cluster. Encryption at rest defends against offline disclosure of these stores.
      audit: |
        Inspect the API server `--encryption-provider-config` argument on each control plane node:

        ```bash
        kubectl -n kube-system get pod -l component=kube-apiserver -o yaml | grep encryption-provider-config
        ```

        On kubeadm clusters you can also run `ps -ef | grep kube-apiserver`. If `--encryption-provider-config` is set to a non-empty path, the check passes. If the argument is absent or empty, the check fails.
      remediation: |
        These flags apply to self-managed control planes only. On managed services such as EKS, GKE, and AKS the control plane is provider-managed and these flags cannot be changed. On kubeadm clusters the API server runs as a static pod: back up and edit `/etc/kubernetes/manifests/kube-apiserver.yaml`, and the kubelet automatically restarts the static pod when you save the file. Do not run `kubectl rollout restart` for the API server. After saving, watch `kubectl -n kube-system get pod -l component=kube-apiserver` or `crictl ps` to confirm it comes back, because a bad flag can stop the API server from starting and lock you out of the cluster.

        Create an `EncryptionConfiguration` file specifying a strong provider (`aescbc`, `kms`, or `secretbox`) and pass it to the API server with `--encryption-provider-config=/etc/kubernetes/enc/enc.yaml`. Prefer a KMS provider in production. Re-write existing secrets so they are encrypted with the new keys:

        ```bash
        kubectl get secrets --all-namespaces -o json | kubectl replace -f -
        ```
    refs:
      - url: https://kubernetes.io/docs/tasks/administer-cluster/encrypt-data/
        title: Kubernetes - Encrypting Confidential Data at Rest
  - uid: mondoo-kubernetes-security-api-server-tls-min-version
    title: Ensure the kube-apiserver enforces TLS 1.2 or higher
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    mql: |
      processes.where(executable == /kube-apiserver/).list {
        flags["tls-min-version"] == null ||
        flags["tls-min-version"] == "VersionTLS12" ||
        flags["tls-min-version"] == "VersionTLS13"
      }
    docs:
      desc: |
        This check ensures that the kube-apiserver does not negotiate TLS versions older than 1.2. Earlier versions (TLS 1.0/1.1, SSLv3) contain known cryptographic weaknesses and are deprecated by every major standards body.

        **Why this matters**

        Allowing TLS 1.0/1.1 leaves API server connections vulnerable to BEAST, downgrade, and renegotiation attacks. Modern Kubernetes clients all support TLS 1.2+, so requiring it does not reduce compatibility.
      audit: |
        Inspect the API server `--tls-min-version` argument on each control plane node:

        ```bash
        kubectl -n kube-system get pod -l component=kube-apiserver -o yaml | grep tls-min-version
        ```

        On kubeadm clusters you can also run `ps -ef | grep kube-apiserver`. If `--tls-min-version` is set to `VersionTLS12` or `VersionTLS13`, or the argument is absent on a version that defaults to TLS 1.2, the check passes. If it is set to `VersionTLS10` or `VersionTLS11`, the check fails.
      remediation: |
        These flags apply to self-managed control planes only. On managed services such as EKS, GKE, and AKS the control plane is provider-managed and these flags cannot be changed. On kubeadm clusters the API server runs as a static pod: back up and edit `/etc/kubernetes/manifests/kube-apiserver.yaml`, and the kubelet automatically restarts the static pod when you save the file. Do not run `kubectl rollout restart` for the API server. After saving, watch `kubectl -n kube-system get pod -l component=kube-apiserver` or `crictl ps` to confirm it comes back, because a bad flag can stop the API server from starting and lock you out of the cluster.

        Set the API server `--tls-min-version=VersionTLS12` (or `VersionTLS13` if your client population supports it) and save the file so the kubelet restarts the static pod.
    refs:
      - url: https://kubernetes.io/docs/reference/command-line-tools-reference/kube-apiserver/
        title: kube-apiserver - Reference
  - uid: mondoo-kubernetes-security-api-server-strong-cipher-suites
    title: Ensure the kube-apiserver only negotiates strong TLS cipher suites
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-13
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    mql: |
      processes.where(executable == /kube-apiserver/).list {
        flags["tls-cipher-suites"] != null
        flags["tls-cipher-suites"].contains("TLS_RSA_WITH_3DES") == false
        flags["tls-cipher-suites"].contains("TLS_RSA_WITH_RC4") == false
        flags["tls-cipher-suites"].contains("TLS_ECDHE_RSA_WITH_RC4") == false
        flags["tls-cipher-suites"].contains("TLS_ECDHE_ECDSA_WITH_RC4") == false
      }
    docs:
      desc: |
        This check ensures that the kube-apiserver explicitly enumerates an allowlist of TLS cipher suites via `--tls-cipher-suites` and that the list excludes weak ciphers (RC4, 3DES). Without an explicit allowlist, the Go default may include ciphers that are no longer considered safe.

        **Why this matters**

        Weak cipher suites such as RC4 and 3DES have known practical attacks. Restricting the API server to AEAD ciphers with PFS (e.g., `TLS_ECDHE_*_WITH_AES_*_GCM_*`, `TLS_CHACHA20_POLY1305_*`) removes that attack surface.
      audit: |
        Inspect the API server `--tls-cipher-suites` argument on each control plane node:

        ```bash
        kubectl -n kube-system get pod -l component=kube-apiserver -o yaml | grep tls-cipher-suites
        ```

        On kubeadm clusters you can also run `ps -ef | grep kube-apiserver`. If `--tls-cipher-suites` is set and contains no RC4 or 3DES ciphers (`TLS_RSA_WITH_3DES`, `TLS_RSA_WITH_RC4`, `TLS_ECDHE_RSA_WITH_RC4`, `TLS_ECDHE_ECDSA_WITH_RC4`), the check passes. If the argument is absent or includes any of those weak ciphers, the check fails.
      remediation: |
        These flags apply to self-managed control planes only. On managed services such as EKS, GKE, and AKS the control plane is provider-managed and these flags cannot be changed. On kubeadm clusters the API server runs as a static pod: back up and edit `/etc/kubernetes/manifests/kube-apiserver.yaml`, and the kubelet automatically restarts the static pod when you save the file. Do not run `kubectl rollout restart` for the API server. After saving, watch `kubectl -n kube-system get pod -l component=kube-apiserver` or `crictl ps` to confirm it comes back, because a bad flag can stop the API server from starting and lock you out of the cluster.

        Set `--tls-cipher-suites` to a hardened list, for example:

        ```text
        --tls-cipher-suites=TLS_AES_128_GCM_SHA256,TLS_AES_256_GCM_SHA384,TLS_CHACHA20_POLY1305_SHA256,TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256,TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384,TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305_SHA256,TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256,TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384,TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305_SHA256
        ```
    refs:
      - url: https://kubernetes.io/docs/reference/command-line-tools-reference/kube-apiserver/
        title: kube-apiserver - Reference
  - uid: mondoo-kubernetes-security-api-server-client-ca-file
    title: Ensure the kube-apiserver verifies clients with a CA certificate
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-5
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-2
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-3
    mql: |
      processes.where(executable == /kube-apiserver/).list {
        flags["client-ca-file"] != null
        flags["client-ca-file"] != ""
      }
    docs:
      desc: |
        This check ensures that the kube-apiserver loads a `--client-ca-file` so that incoming client certificates are validated against a trusted CA.

        **Why this matters**

        Without a client CA file, certificate-based authentication for users and components (such as kubelets and admin clients) is disabled or accepts unverified certificates, weakening cluster authentication.
      audit: |
        Inspect the API server `--client-ca-file` argument on each control plane node:

        ```bash
        kubectl -n kube-system get pod -l component=kube-apiserver -o yaml | grep client-ca-file
        ```

        On kubeadm clusters you can also run `ps -ef | grep kube-apiserver`. If `--client-ca-file` is set to a non-empty path, the check passes. If the argument is absent or empty, the check fails.
      remediation: |
        These flags apply to self-managed control planes only. On managed services such as EKS, GKE, and AKS the control plane is provider-managed and these flags cannot be changed. On kubeadm clusters the API server runs as a static pod: back up and edit `/etc/kubernetes/manifests/kube-apiserver.yaml`, and the kubelet automatically restarts the static pod when you save the file. Do not run `kubectl rollout restart` for the API server. After saving, watch `kubectl -n kube-system get pod -l component=kube-apiserver` or `crictl ps` to confirm it comes back, because a bad flag can stop the API server from starting and lock you out of the cluster.

        Set the API server `--client-ca-file` to the path of the cluster CA bundle (typically `/etc/kubernetes/pki/ca.crt` on kubeadm clusters) and save the file so the kubelet restarts the static pod.
    refs:
      - url: https://kubernetes.io/docs/reference/access-authn-authz/authentication/#x509-client-certs
        title: Kubernetes - X.509 client certs
  - uid: mondoo-kubernetes-security-api-server-kubelet-client-cert
    title: Ensure the kube-apiserver uses a client certificate for kubelets
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-1
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-3
    mql: |
      processes.where(executable == /kube-apiserver/).list {
        flags["kubelet-client-certificate"] != null
        flags["kubelet-client-certificate"] != ""
        flags["kubelet-client-key"] != null
        flags["kubelet-client-key"] != ""
      }
    docs:
      desc: |
        This check ensures that the kube-apiserver presents a client certificate (`--kubelet-client-certificate` and `--kubelet-client-key`) when connecting to kubelets. This enables mutual TLS between the API server and each kubelet.

        **Why this matters**

        Kubelets accept exec, logs, and port-forward requests from the API server. Without mTLS, an attacker who can intercept this traffic could impersonate the API server or extract sensitive workload data.
      audit: |
        Inspect the API server kubelet client certificate arguments on each control plane node:

        ```bash
        kubectl -n kube-system get pod -l component=kube-apiserver -o yaml | grep -E 'kubelet-client-certificate|kubelet-client-key'
        ```

        On kubeadm clusters you can also run `ps -ef | grep kube-apiserver`. If both `--kubelet-client-certificate` and `--kubelet-client-key` are set to non-empty paths, the check passes. If either argument is absent or empty, the check fails.
      remediation: |
        These flags apply to self-managed control planes only. On managed services such as EKS, GKE, and AKS the control plane is provider-managed and these flags cannot be changed. On kubeadm clusters the API server runs as a static pod: back up and edit `/etc/kubernetes/manifests/kube-apiserver.yaml`, and the kubelet automatically restarts the static pod when you save the file. Do not run `kubectl rollout restart` for the API server. After saving, watch `kubectl -n kube-system get pod -l component=kube-apiserver` or `crictl ps` to confirm it comes back, because a bad flag can stop the API server from starting and lock you out of the cluster.

        Generate an API-server client cert/key signed by the cluster CA and pass them via `--kubelet-client-certificate` and `--kubelet-client-key`. Save the file so the kubelet restarts the static pod.
    refs:
      - url: https://kubernetes.io/docs/concepts/architecture/control-plane-node-communication/#apiserver-to-kubelet
        title: Control Plane to Node communication
  - uid: mondoo-kubernetes-security-api-server-kubelet-https
    title: Ensure the kube-apiserver communicates with kubelets over HTTPS
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    mql: |
      processes.where(executable == /kube-apiserver/).list {
        flags["kubelet-https"] == null || flags["kubelet-https"] == "true"
      }
    docs:
      desc: |
        This check ensures that the kube-apiserver communicates with kubelets over HTTPS (`--kubelet-https=true`). The default is `true`; this check fails if it has been explicitly disabled.

        **Why this matters**

        Plaintext API-server-to-kubelet traffic exposes exec session contents, log streams, and resource metadata to anyone on the management network.
      audit: |
        Inspect the API server `--kubelet-https` argument on each control plane node:

        ```bash
        kubectl -n kube-system get pod -l component=kube-apiserver -o yaml | grep kubelet-https
        ```

        On kubeadm clusters you can also run `ps -ef | grep kube-apiserver`. If `--kubelet-https` is absent (the default is `true`) or set to `true`, the check passes. If it is explicitly set to `false`, the check fails.
      remediation: |
        These flags apply to self-managed control planes only. On managed services such as EKS, GKE, and AKS the control plane is provider-managed and these flags cannot be changed. On kubeadm clusters the API server runs as a static pod: back up and edit `/etc/kubernetes/manifests/kube-apiserver.yaml`, and the kubelet automatically restarts the static pod when you save the file. Do not run `kubectl rollout restart` for the API server. After saving, watch `kubectl -n kube-system get pod -l component=kube-apiserver` or `crictl ps` to confirm it comes back, because a bad flag can stop the API server from starting and lock you out of the cluster.

        Remove any `--kubelet-https=false` argument from the API server configuration and save the file so the kubelet restarts the static pod.
    refs:
      - url: https://kubernetes.io/docs/concepts/architecture/control-plane-node-communication/
        title: Control Plane Node communication
  - uid: mondoo-kubernetes-security-api-server-kubelet-ca
    title: Ensure the kube-apiserver verifies kubelet certificates with a CA bundle
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-17
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-1
    mql: |
      processes.where(executable == /kube-apiserver/).list {
        flags["kubelet-certificate-authority"] != null
        flags["kubelet-certificate-authority"] != ""
      }
    docs:
      desc: |
        This check ensures that the kube-apiserver validates kubelet TLS certificates against a known CA via `--kubelet-certificate-authority`. Without a CA, the API server cannot detect a forged kubelet cert presented by a man-in-the-middle.

        **Why this matters**

        Skipping kubelet certificate verification allows a node-level adversary on the network path to impersonate a kubelet and intercept exec, logs, or port-forward traffic.
      audit: |
        Inspect the API server `--kubelet-certificate-authority` argument on each control plane node:

        ```bash
        kubectl -n kube-system get pod -l component=kube-apiserver -o yaml | grep kubelet-certificate-authority
        ```

        On kubeadm clusters you can also run `ps -ef | grep kube-apiserver`. If `--kubelet-certificate-authority` is set to a non-empty path, the check passes. If the argument is absent or empty, the check fails.
      remediation: |
        These flags apply to self-managed control planes only. On managed services such as EKS, GKE, and AKS the control plane is provider-managed and these flags cannot be changed. On kubeadm clusters the API server runs as a static pod: back up and edit `/etc/kubernetes/manifests/kube-apiserver.yaml`, and the kubelet automatically restarts the static pod when you save the file. Do not run `kubectl rollout restart` for the API server. After saving, watch `kubectl -n kube-system get pod -l component=kube-apiserver` or `crictl ps` to confirm it comes back, because a bad flag can stop the API server from starting and lock you out of the cluster.

        Pass `--kubelet-certificate-authority=/etc/kubernetes/pki/ca.crt`, or the cluster's kubelet CA bundle, to the API server.
    refs:
      - url: https://kubernetes.io/docs/concepts/architecture/control-plane-node-communication/#apiserver-to-kubelet
        title: API server to kubelet
  - uid: mondoo-kubernetes-security-api-server-etcd-cert-files
    title: Ensure the kube-apiserver uses TLS client certificates for etcd
    impact: 100
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    mql: |
      processes.where(executable == /kube-apiserver/).list {
        flags["etcd-cafile"] != null && flags["etcd-cafile"] != ""
        flags["etcd-certfile"] != null && flags["etcd-certfile"] != ""
        flags["etcd-keyfile"] != null && flags["etcd-keyfile"] != ""
      }
    docs:
      desc: |
        This check ensures that the kube-apiserver provides `--etcd-cafile`, `--etcd-certfile`, and `--etcd-keyfile` so that connections to etcd are mutually authenticated over TLS.

        **Why this matters**

        etcd contains every Secret, ConfigMap, and resource definition in the cluster. Unauthenticated or unencrypted access permits direct read/write of the entire cluster state, completely bypassing Kubernetes authorization.
      audit: |
        Inspect the API server etcd TLS arguments on each control plane node:

        ```bash
        kubectl -n kube-system get pod -l component=kube-apiserver -o yaml | grep -E 'etcd-cafile|etcd-certfile|etcd-keyfile'
        ```

        On kubeadm clusters you can also run `ps -ef | grep kube-apiserver`. If `--etcd-cafile`, `--etcd-certfile`, and `--etcd-keyfile` are all set to non-empty paths, the check passes. If any of the three arguments is absent or empty, the check fails.
      remediation: |
        These flags apply to self-managed control planes only. On managed services such as EKS, GKE, and AKS the control plane is provider-managed and these flags cannot be changed. On kubeadm clusters the API server runs as a static pod: back up and edit `/etc/kubernetes/manifests/kube-apiserver.yaml`, and the kubelet automatically restarts the static pod when you save the file. Do not run `kubectl rollout restart` for the API server. After saving, watch `kubectl -n kube-system get pod -l component=kube-apiserver` or `crictl ps` to confirm it comes back, because a bad flag can stop the API server from starting and lock you out of the cluster.

        Generate API-server-to-etcd certs from the etcd CA and pass them as `--etcd-cafile`, `--etcd-certfile`, and `--etcd-keyfile`. Confirm etcd is configured with the matching peer/server certificates.
    refs:
      - url: https://kubernetes.io/docs/setup/best-practices/certificates/
        title: Kubernetes - PKI certificates and requirements
  - uid: mondoo-kubernetes-security-api-server-service-account-lookup
    title: Ensure the kube-apiserver validates ServiceAccount tokens against the API
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-2
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-2
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-2-1
    mql: |
      processes.where(executable == /kube-apiserver/).list {
        flags["service-account-lookup"] == null || flags["service-account-lookup"] == "true"
      }
    docs:
      desc: |
        This check ensures that the kube-apiserver verifies ServiceAccount tokens against the live API state via `--service-account-lookup=true`. With lookup disabled, deleted ServiceAccounts and revoked tokens may continue to authenticate.

        **Why this matters**

        Long-lived ServiceAccount tokens that survive deletion become attractive targets. Lookup is the mechanism that makes "delete the ServiceAccount" actually revoke its tokens; without it, deleted accounts remain functional until their signing key rotates.
      audit: |
        Inspect the API server `--service-account-lookup` argument on each control plane node:

        ```bash
        kubectl -n kube-system get pod -l component=kube-apiserver -o yaml | grep service-account-lookup
        ```

        On kubeadm clusters you can also run `ps -ef | grep kube-apiserver`. If `--service-account-lookup` is absent (the default is `true`) or set to `true`, the check passes. If it is explicitly set to `false`, the check fails.
      remediation: |
        These flags apply to self-managed control planes only. On managed services such as EKS, GKE, and AKS the control plane is provider-managed and these flags cannot be changed. On kubeadm clusters the API server runs as a static pod: back up and edit `/etc/kubernetes/manifests/kube-apiserver.yaml`, and the kubelet automatically restarts the static pod when you save the file. Do not run `kubectl rollout restart` for the API server. After saving, watch `kubectl -n kube-system get pod -l component=kube-apiserver` or `crictl ps` to confirm it comes back, because a bad flag can stop the API server from starting and lock you out of the cluster.

        Either remove the `--service-account-lookup=false` argument or set `--service-account-lookup=true` explicitly, and save the file so the kubelet restarts the static pod.
    refs:
      - url: https://kubernetes.io/docs/reference/access-authn-authz/service-accounts-admin/
        title: Managing Service Accounts
  - uid: mondoo-kubernetes-security-api-server-service-account-key-file
    title: Ensure the kube-apiserver loads a dedicated ServiceAccount signing key
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-5
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-2
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-9
      compliance/vda-isa-5: vda-isa-5-4-1-3
    mql: |
      processes.where(executable == /kube-apiserver/).list {
        flags["service-account-key-file"] != null
        flags["service-account-key-file"] != ""
      }
    docs:
      desc: |
        This check ensures that the kube-apiserver verifies ServiceAccount tokens with a dedicated public key supplied via `--service-account-key-file`. Without it, the API server falls back to the TLS serving key, conflating two distinct trust roots.

        **Why this matters**

        Using a separate key pair lets operators rotate the ServiceAccount signing key without re-issuing the API server's TLS cert, and keeps the ServiceAccount trust root scoped to one purpose.
      audit: |
        Inspect the API server `--service-account-key-file` argument on each control plane node:

        ```bash
        kubectl -n kube-system get pod -l component=kube-apiserver -o yaml | grep service-account-key-file
        ```

        On kubeadm clusters you can also run `ps -ef | grep kube-apiserver`. If `--service-account-key-file` is set to a non-empty path, the check passes. If the argument is absent or empty, the check fails.
      remediation: |
        These flags apply to self-managed control planes only. On managed services such as EKS, GKE, and AKS the control plane is provider-managed and these flags cannot be changed. On kubeadm clusters the API server runs as a static pod: back up and edit `/etc/kubernetes/manifests/kube-apiserver.yaml`, and the kubelet automatically restarts the static pod when you save the file. Do not run `kubectl rollout restart` for the API server. After saving, watch `kubectl -n kube-system get pod -l component=kube-apiserver` or `crictl ps` to confirm it comes back, because a bad flag can stop the API server from starting and lock you out of the cluster.

        Configure `--service-account-key-file=/etc/kubernetes/pki/sa.pub` (kubeadm default) and the matching `--service-account-signing-key-file=/etc/kubernetes/pki/sa.key` on the API server, then restart it.
    refs:
      - url: https://kubernetes.io/docs/reference/access-authn-authz/service-accounts-admin/#service-account-signing-key
        title: ServiceAccount signing key
  - uid: mondoo-kubernetes-security-api-server-profiling-disabled
    title: Ensure the kube-apiserver disables the profiling endpoint
    impact: 50
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ccc-06
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-pt-3
      compliance/nist-csf-2: nist-csf-2-pr-ps-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-6
      compliance/pci-dss-4: pcidss-requirement-2-2-1
      compliance/soc2-2017: soc2-control-cc7-1-1
      compliance/vda-isa-5: vda-isa-5-5-2-1
    mql: |
      processes.where(executable == /kube-apiserver/).list {
        flags["profiling"] == "false"
      }
    docs:
      desc: |
        This check ensures that the kube-apiserver runs with `--profiling=false`. The Go pprof endpoint is intended for debugging and exposes detailed runtime data that an attacker can use to fingerprint the cluster or extract sensitive memory contents.

        **Why this matters**

        pprof responses can leak goroutine stacks, heap allocations, and request data. Production clusters have no need for the endpoint, and its presence increases the API server's attack surface.
      audit: |
        Inspect the API server `--profiling` argument on each control plane node:

        ```bash
        kubectl -n kube-system get pod -l component=kube-apiserver -o yaml | grep profiling
        ```

        On kubeadm clusters you can also run `ps -ef | grep kube-apiserver`. If `--profiling` is set to `false`, the check passes. If it is set to `true` or is absent, the check fails.
      remediation: |
        These flags apply to self-managed control planes only. On managed services such as EKS, GKE, and AKS the control plane is provider-managed and these flags cannot be changed. On kubeadm clusters the API server runs as a static pod: back up and edit `/etc/kubernetes/manifests/kube-apiserver.yaml`, and the kubelet automatically restarts the static pod when you save the file. Do not run `kubectl rollout restart` for the API server. After saving, watch `kubectl -n kube-system get pod -l component=kube-apiserver` or `crictl ps` to confirm it comes back, because a bad flag can stop the API server from starting and lock you out of the cluster.

        Set `--profiling=false` on the API server.
    refs:
      - url: https://kubernetes.io/docs/reference/command-line-tools-reference/kube-apiserver/
        title: kube-apiserver - Reference
  - uid: mondoo-kubernetes-security-api-server-no-token-auth-file
    title: Ensure the kube-apiserver does not use a static token authentication file
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-5
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-2
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-3
    mql: |
      processes.where(executable == /kube-apiserver/).list {
        flags["token-auth-file"] == null || flags["token-auth-file"] == ""
      }
    docs:
      desc: |
        This check ensures that the kube-apiserver is not started with a `--token-auth-file`. Static token files contain unrotated bearer tokens stored in plaintext on disk and are intended only for development.

        **Why this matters**

        Tokens in `--token-auth-file` cannot be revoked without restarting the API server, are visible to anyone who can read the file, and predate modern authenticators (OIDC, ServiceAccount, x509).
      audit: |
        Inspect the API server `--token-auth-file` argument on each control plane node:

        ```bash
        kubectl -n kube-system get pod -l component=kube-apiserver -o yaml | grep token-auth-file
        ```

        On kubeadm clusters you can also run `ps -ef | grep kube-apiserver`. If `--token-auth-file` is absent or empty, the check passes. If the argument is set to a file path, the check fails.
      remediation: |
        These flags apply to self-managed control planes only. On managed services such as EKS, GKE, and AKS the control plane is provider-managed and these flags cannot be changed. On kubeadm clusters the API server runs as a static pod: back up and edit `/etc/kubernetes/manifests/kube-apiserver.yaml`, and the kubelet automatically restarts the static pod when you save the file. Do not run `kubectl rollout restart` for the API server. After saving, watch `kubectl -n kube-system get pod -l component=kube-apiserver` or `crictl ps` to confirm it comes back, because a bad flag can stop the API server from starting and lock you out of the cluster.

        Remove the `--token-auth-file` argument from the API server configuration and migrate users to OIDC, ServiceAccount tokens, or x509 client certificates.
    refs:
      - url: https://kubernetes.io/docs/reference/access-authn-authz/authentication/#static-token-file
        title: Kubernetes - Static token file
  - uid: mondoo-kubernetes-security-serviceaccount-no-cluster-admin
    title: Service accounts should not be bound to cluster-admin
    impact: 100
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-2
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-5
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-3-1
      compliance/vda-isa-5: vda-isa-5-4-2-1
    props:
      - uid: mondooKubernetesSecurityExcludedNamespaces
        title: Namespaces to exclude from RBAC and Pod Security checks
        mql: |
          return ["kube-system", "kube-public", "kube-node-lease"]
    mql: |
      k8s.serviceaccounts.where( namespace.in(props.mondooKubernetesSecurityExcludedNamespaces) == false ).all( isClusterAdmin == false )
    docs:
      desc: |
        This check ensures that no service account is granted the built-in `cluster-admin` role, or an equivalent role that grants unrestricted access through wildcard verbs, API groups, and resources. Service accounts are non-human identities consumed by workloads, and a workload that runs as a cluster-admin service account holds full control of every resource in the cluster.

        **Why this matters**

        A service account with cluster-admin access removes every authorization boundary for the pods that use it:

        - **Full cluster compromise:** anyone who compromises a single pod inherits its token and can read every Secret, create privileged pods on any node, and modify or delete any resource in the cluster.
        - **Lateral movement and persistence:** an attacker can create new bindings, deploy backdoors, and disable security controls cluster-wide.
        - **No blast-radius containment:** the principle of least privilege is the primary defense against a compromised workload; a cluster-admin service account defeats it entirely.

        Workloads should be granted only the specific permissions they need, scoped to the namespaces they operate in.
      audit: |
        List the subjects bound to the `cluster-admin` ClusterRole and look for any `ServiceAccount` entries:

        ```bash
        kubectl get clusterrolebindings -o json | jq -r '.items[] | select(.roleRef.name == "cluster-admin") | .subjects[]? | select(.kind == "ServiceAccount") | "\(.namespace)/\(.name)"'
        ```

        You can also test a specific service account directly:

        ```bash
        kubectl auth can-i '*' '*' --as=system:serviceaccount:<namespace>:<name> --all-namespaces
        ```

        If `kubectl auth can-i` returns `yes` for `'*' '*'`, the service account is cluster-admin and the check fails. The check passes when no service account outside the excluded system namespaces resolves to cluster-admin.
      remediation:
        - id: kubectl
          desc: |
            Remove the cluster-admin grant from the service account and replace it with a narrowly scoped Role bound only in the namespaces the workload uses:

            ```bash
            # Remove the offending binding
            kubectl delete clusterrolebinding <binding-name>

            # Grant only the permissions the workload needs, scoped to its namespace
            kubectl create role app-reader --verb=get,list,watch --resource=pods,configmaps -n <namespace>
            kubectl create rolebinding app-reader-binding --role=app-reader --serviceaccount=<namespace>:<name> -n <namespace>
            ```
        - id: manifest
          desc: |
            Define a least-privilege Role and bind the service account to it instead of `cluster-admin`. Apply the manifest with `kubectl apply -f <file>.yaml`:

            ```yaml
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: Role
            metadata:
              name: app-reader
              namespace: my-namespace
            rules:
              - apiGroups: [""]
                resources: ["pods", "configmaps"]
                verbs: ["get", "list", "watch"]
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: RoleBinding
            metadata:
              name: app-reader-binding
              namespace: my-namespace
            roleRef:
              apiGroup: rbac.authorization.k8s.io
              kind: Role
              name: app-reader
            subjects:
              - kind: ServiceAccount
                name: my-app
                namespace: my-namespace
            ```
    refs:
      - url: https://kubernetes.io/docs/reference/access-authn-authz/rbac/
        title: Kubernetes - Using RBAC Authorization
      - url: https://kubernetes.io/docs/concepts/security/rbac-good-practices/
        title: Kubernetes - RBAC Good Practices
  - uid: mondoo-kubernetes-security-serviceaccount-no-privilege-escalation
    title: Service accounts should not be able to escalate RBAC privileges
    impact: 95
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-2
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-5
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-3-1
      compliance/vda-isa-5: vda-isa-5-4-2-1
    props:
      - uid: mondooKubernetesSecurityExcludedNamespaces
        title: Namespaces to exclude from RBAC and Pod Security checks
        mql: |
          return ["kube-system", "kube-public", "kube-node-lease"]
    mql: |
      k8s.serviceaccounts.where( namespace.in(props.mondooKubernetesSecurityExcludedNamespaces) == false ).all( canEscalatePrivileges == false )
    docs:
      desc: |
        This check ensures that no service account is bound to a role that allows RBAC privilege escalation. The `escalate` and `bind` verbs on roles and bindings, and the `impersonate` verb on users, groups, or service accounts, let a subject grant itself more privileges than it currently holds — bypassing the protections that normally stop a user from creating a role more powerful than their own.

        **Why this matters**

        Privilege-escalation verbs turn a limited foothold into full control:

        - **`escalate`** lets a subject create or edit a Role or ClusterRole containing permissions it does not already have, defeating the built-in escalation prevention.
        - **`bind`** lets a subject bind any existing role — including `cluster-admin` — to itself or another identity.
        - **`impersonate`** lets a subject act as any other user, group, or service account, including cluster administrators.

        A workload holding any of these verbs is effectively one step away from cluster-admin, so they should never be granted to application service accounts.
      audit: |
        Inspect the Roles and ClusterRoles bound to your service accounts for the `escalate`, `bind`, or `impersonate` verbs:

        ```bash
        kubectl get clusterroles,roles -A -o json | jq -r '.items[] | select(.rules[]? | (.verbs[]? | test("^(escalate|bind|impersonate|\\*)$"))) | "\(.kind) \(.metadata.namespace // "-")/\(.metadata.name)"'
        ```

        Then confirm which service accounts are bound to those roles with `kubectl get rolebindings,clusterrolebindings -A`. The check fails when a service account outside the excluded namespaces is bound to a role granting any of these verbs, and passes otherwise.
      remediation:
        - id: kubectl
          desc: |
            Remove the `escalate`, `bind`, and `impersonate` verbs (and any wildcard `*` verb that covers them) from the roles bound to the service account, then re-grant only the concrete verbs the workload needs:

            ```bash
            kubectl edit clusterrole <role-name>   # remove escalate/bind/impersonate and wildcard verbs
            # or rebind the service account to a purpose-built least-privilege role
            kubectl create role app-role --verb=get,list,watch --resource=pods -n <namespace>
            kubectl create rolebinding app-binding --role=app-role --serviceaccount=<namespace>:<name> -n <namespace>
            ```
        - id: manifest
          desc: |
            Define roles that enumerate only the concrete verbs a workload needs and never include `escalate`, `bind`, `impersonate`, or wildcard verbs. Apply the manifest with `kubectl apply -f <file>.yaml`:

            ```yaml
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: Role
            metadata:
              name: app-role
              namespace: my-namespace
            rules:
              - apiGroups: [""]
                resources: ["pods"]
                verbs: ["get", "list", "watch"]
            ```
    refs:
      - url: https://kubernetes.io/docs/reference/access-authn-authz/rbac/#privilege-escalation-prevention-and-bootstrapping
        title: Kubernetes - Privilege Escalation Prevention
      - url: https://kubernetes.io/docs/concepts/security/rbac-good-practices/
        title: Kubernetes - RBAC Good Practices
  - uid: mondoo-kubernetes-security-rbac-no-wildcard-rules
    title: Roles and cluster roles should not use wildcard permissions
    impact: 85
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-2
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-5
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-3-1
      compliance/vda-isa-5: vda-isa-5-4-2-1
    props:
      - uid: mondooKubernetesSecurityExcludedNamespaces
        title: Namespaces to exclude from RBAC and Pod Security checks
        mql: |
          return ["kube-system", "kube-public", "kube-node-lease"]
      - uid: mondooKubernetesSecurityExcludedClusterRoles
        title: Cluster roles to exclude from RBAC checks
        mql: |
          # Built-in cluster roles that use wildcards by design, such as cluster-admin
          return ["cluster-admin"]
    mql: |
      k8s.clusterroles.where( name != /^system:/ && name.in(props.mondooKubernetesSecurityExcludedClusterRoles) == false ).all( hasWildcardRule == false )
      k8s.roles.where( namespace.in(props.mondooKubernetesSecurityExcludedNamespaces) == false ).all( hasWildcardRule == false )
    docs:
      desc: |
        This check ensures that Roles and ClusterRoles do not use the wildcard `*` for verbs, API groups, or resources. A wildcard rule grants every current and future permission in its scope, which almost always exceeds what a workload or user actually needs and silently expands as new APIs are added to the cluster.

        **Why this matters**

        Wildcard rules break the principle of least privilege in ways that are hard to reason about:

        - **Unbounded access:** `resources: ["*"]` and `verbs: ["*"]` grant access to Secrets, RBAC objects, and every other resource, including ones that did not exist when the role was written.
        - **Hidden escalation paths:** a wildcard over `rbac.authorization.k8s.io` includes the `escalate` and `bind` verbs, opening a path to cluster-admin.
        - **Audit blindness:** reviewers cannot tell from a wildcard rule what the workload actually uses, so over-grants go unnoticed.

        Roles should enumerate the specific API groups, resources, and verbs a subject requires.
      audit: |
        List the Roles and ClusterRoles that contain a wildcard in their verbs, API groups, or resources:

        ```bash
        kubectl get clusterroles,roles -A -o json | jq -r '.items[] | select(.rules[]? | (.verbs[]? == "*") or (.apiGroups[]? == "*") or (.resources[]? == "*")) | "\(.kind) \(.metadata.namespace // "-")/\(.metadata.name)"'
        ```

        Built-in `system:` roles and the default `cluster-admin` role are expected to contain wildcards and are excluded. The check fails when any other Role or ClusterRole uses a wildcard rule.
      remediation:
        - id: kubectl
          desc: |
            Replace wildcard rules with explicit API groups, resources, and verbs. Inspect the role, determine what the workload actually calls, and rewrite it:

            ```bash
            kubectl edit clusterrole <role-name>   # replace "*" with concrete verbs/resources/apiGroups
            ```
        - id: manifest
          desc: |
            Enumerate the concrete permissions instead of using `*`. Apply the manifest with `kubectl apply -f <file>.yaml`:

            ```yaml
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: ClusterRole
            metadata:
              name: app-role
            rules:
              - apiGroups: ["apps"]
                resources: ["deployments"]
                verbs: ["get", "list", "watch"]
            ```
    refs:
      - url: https://kubernetes.io/docs/concepts/security/rbac-good-practices/#least-privilege
        title: Kubernetes - RBAC Good Practices (Least Privilege)
      - url: https://kubernetes.io/docs/reference/access-authn-authz/rbac/
        title: Kubernetes - Using RBAC Authorization
  - uid: mondoo-kubernetes-security-rbac-restrict-cluster-admin-bindings
    title: Cluster role bindings should not grant cluster-admin
    impact: 100
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-2
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-5
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-3-1
      compliance/vda-isa-5: vda-isa-5-4-2-1
    props:
      - uid: mondooKubernetesSecurityExcludedClusterRoleBindings
        title: Cluster role bindings to exclude from RBAC checks
        mql: |
          # Built-in bindings that grant cluster-admin by design, such as the cluster-admin binding to system:masters
          return ["cluster-admin"]
    mql: |
      k8s.clusterrolebindings.where( name != /^system:/ && name.in(props.mondooKubernetesSecurityExcludedClusterRoleBindings) == false ).all( grantsClusterAdmin == false )
    docs:
      desc: |
        This check ensures that ClusterRoleBindings do not grant the `cluster-admin` role — or any ClusterRole with wildcard verbs, API groups, and resources — to users, groups, or service accounts. A cluster-admin binding hands its subjects unrestricted control of every resource in the cluster.

        **Why this matters**

        Cluster-admin bindings are the single largest concentration of privilege in a cluster:

        - **Unrestricted control:** subjects can read every Secret, schedule privileged pods on any node, and modify or delete any resource.
        - **Large attack surface:** every user, group, or service account in the binding becomes a path to full cluster compromise.
        - **Hard to revoke quietly:** broad bindings accumulate over time and are rarely reviewed, so stale admin grants persist long after they are needed.

        Cluster-admin should be reserved for a small, deliberately managed set of break-glass identities, not granted through everyday bindings.
      audit: |
        List the ClusterRoleBindings that reference `cluster-admin` or another role granting unrestricted access, along with their subjects:

        ```bash
        kubectl get clusterrolebindings -o json | jq -r '.items[] | select(.roleRef.name == "cluster-admin") | "\(.metadata.name): \(.subjects // [] | map("\(.kind)/\(.name)") | join(", "))"'
        ```

        The built-in `cluster-admin` and `system:` bindings are expected and excluded. The check fails when any other ClusterRoleBinding grants cluster-admin to a subject.
      remediation:
        - id: kubectl
          desc: |
            Delete the over-broad binding and replace it with a binding to a least-privilege role, or scope the access to specific namespaces with a RoleBinding:

            ```bash
            kubectl delete clusterrolebinding <binding-name>
            # Grant scoped access where it is actually needed
            kubectl create rolebinding app-binding --clusterrole=view --serviceaccount=<namespace>:<name> -n <namespace>
            ```
        - id: manifest
          desc: |
            Bind subjects to a narrowly scoped role rather than `cluster-admin`. Apply the manifest with `kubectl apply -f <file>.yaml`:

            ```yaml
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: RoleBinding
            metadata:
              name: app-binding
              namespace: my-namespace
            roleRef:
              apiGroup: rbac.authorization.k8s.io
              kind: ClusterRole
              name: view
            subjects:
              - kind: ServiceAccount
                name: my-app
                namespace: my-namespace
            ```
    refs:
      - url: https://kubernetes.io/docs/concepts/security/rbac-good-practices/#least-privilege
        title: Kubernetes - RBAC Good Practices (Least Privilege)
      - url: https://kubernetes.io/docs/reference/access-authn-authz/rbac/#user-facing-roles
        title: Kubernetes - User-facing Roles
  - uid: mondoo-kubernetes-security-rbac-no-cluster-wide-secret-read
    title: Cluster roles should not grant cluster-wide read access to secrets
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-2
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-5
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-3-1
      compliance/vda-isa-5: vda-isa-5-4-2-1
    props:
      - uid: mondooKubernetesSecurityExcludedClusterRoles
        title: Cluster roles to exclude from RBAC checks
        mql: |
          # Built-in cluster roles that read secrets by design, such as cluster-admin
          return ["cluster-admin"]
    mql: |
      k8s.clusterroles.where( name != /^system:/ && name.in(props.mondooKubernetesSecurityExcludedClusterRoles) == false ).all( canReadSecrets == false )
    docs:
      desc: |
        This check ensures that no ClusterRole grants read access (`get`, `list`, or `watch`) to Secrets across the whole cluster. A ClusterRole applies to every namespace, so cluster-wide Secret read access exposes credentials, tokens, and keys belonging to every team and workload in the cluster.

        **Why this matters**

        Secrets hold the cluster's most sensitive data, and broad read access undermines every secret-based control:

        - **Credential theft:** `list` and `watch` on Secrets return the decoded values, so a subject can harvest database passwords, TLS private keys, and service-account tokens cluster-wide.
        - **Token replay:** stolen service-account tokens let an attacker authenticate as other workloads and move laterally.
        - **Need-to-know violation:** a workload almost never needs Secrets outside its own namespace; cluster-wide read access is far broader than required.

        Secret access should be granted with namespaced Roles, scoped to the specific Secrets a workload consumes.
      audit: |
        List the ClusterRoles that grant read verbs on Secrets:

        ```bash
        kubectl get clusterroles -o json | jq -r '.items[] | select(.rules[]? | ((.resources[]? == "secrets" or .resources[]? == "*") and (.verbs[]? | test("^(get|list|watch|\\*)$")))) | .metadata.name'
        ```

        Built-in `system:` ClusterRoles and `cluster-admin` are expected and excluded. The check fails when any other ClusterRole grants cluster-wide read access to Secrets.
      remediation:
        - id: kubectl
          desc: |
            Remove Secret read access from the ClusterRole and grant it instead through a namespaced Role scoped to the Secrets the workload actually uses:

            ```bash
            kubectl edit clusterrole <role-name>   # remove the secrets read rule
            kubectl create role secret-reader --verb=get --resource=secrets --resource-name=<secret-name> -n <namespace>
            kubectl create rolebinding secret-reader-binding --role=secret-reader --serviceaccount=<namespace>:<name> -n <namespace>
            ```
        - id: manifest
          desc: |
            Scope Secret access to a namespaced Role and, where possible, to specific Secret names with `resourceNames`. Apply the manifest with `kubectl apply -f <file>.yaml`:

            ```yaml
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: Role
            metadata:
              name: secret-reader
              namespace: my-namespace
            rules:
              - apiGroups: [""]
                resources: ["secrets"]
                resourceNames: ["my-app-secret"]
                verbs: ["get"]
            ```
    refs:
      - url: https://kubernetes.io/docs/concepts/security/rbac-good-practices/#secrets
        title: Kubernetes - RBAC Good Practices (Secrets)
      - url: https://kubernetes.io/docs/concepts/configuration/secret/
        title: Kubernetes - Secrets
  - uid: mondoo-kubernetes-security-namespace-enforces-pod-security
    title: Namespaces should enforce Pod Security Standards admission
    impact: 100
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-2
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-5
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-3-1
      compliance/vda-isa-5: vda-isa-5-4-2-1
    props:
      - uid: mondooKubernetesSecurityExcludedNamespaces
        title: Namespaces to exclude from RBAC and Pod Security checks
        mql: |
          return ["kube-system", "kube-public", "kube-node-lease"]
    mql: |
      k8s.namespace.name.in(props.mondooKubernetesSecurityExcludedNamespaces) || k8s.namespace.enforcesPodSecurity == true
    docs:
      desc: |
        This check ensures that each namespace enforces a non-privileged Pod Security Standards level by setting the `pod-security.kubernetes.io/enforce` label to `baseline` or `restricted`. Pod Security admission rejects pods that violate the configured level at creation time; a namespace without an enforce label admits any pod, including privileged ones.

        **Why this matters**

        Per-workload security controls only help if something stops insecure pods from being created in the first place:

        - **Defense at admission:** an enforced baseline or restricted level blocks privileged containers, host namespace sharing, and dangerous capabilities before the pod ever runs.
        - **Closes the bypass:** without enforcement, the `audit` and `warn` modes only log or warn, so a violating pod is still admitted and runs.
        - **Consistent guardrails:** namespace-level enforcement applies to every current and future workload in the namespace, regardless of who deploys it.

        Set the enforce label on every workload namespace; reserve the `privileged` level for system namespaces that genuinely require it.
      audit: |
        List the Pod Security enforce label on every namespace:

        ```bash
        kubectl get namespaces -o custom-columns='NAME:.metadata.name,ENFORCE:.metadata.labels.pod-security\.kubernetes\.io/enforce'
        ```

        A namespace passes when the enforce label is `baseline` or `restricted`. It fails when the label is absent, empty, or set to `privileged`. System namespaces listed in the exclusion property are not evaluated.
      remediation:
        - id: kubectl
          desc: |
            Apply the Pod Security enforce label to the namespace. Start with `baseline` and move to `restricted` once workloads comply:

            ```bash
            kubectl label namespace <namespace> pod-security.kubernetes.io/enforce=baseline --overwrite
            ```
        - id: manifest
          desc: |
            Set the Pod Security Standards labels in the namespace definition. Apply the manifest with `kubectl apply -f <file>.yaml`:

            ```yaml
            ---
            apiVersion: v1
            kind: Namespace
            metadata:
              name: my-namespace
              labels:
                pod-security.kubernetes.io/enforce: baseline
                pod-security.kubernetes.io/audit: restricted
                pod-security.kubernetes.io/warn: restricted
            ```
    refs:
      - url: https://kubernetes.io/docs/concepts/security/pod-security-admission/
        title: Kubernetes - Pod Security Admission
      - url: https://kubernetes.io/docs/concepts/security/pod-security-standards/
        title: Kubernetes - Pod Security Standards
