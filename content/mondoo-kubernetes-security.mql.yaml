  - uid: mondoo-kubernetes-security-pod-capability-drop-all
    title: Pods should drop ALL capabilities
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ccc-06
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-1
      compliance/nist-csf-2: nist-csf-2-pr-ps-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-2
      compliance/pci-dss-4: pcidss-requirement-2-2-1
      compliance/soc2-2017: soc2-control-cc7-1-1
      compliance/vda-isa-5: vda-isa-5-5-2-1
    mql: |
      k8s.pod.dropsAllCapabilities == true
    docs:
      desc: |
        This check ensures that all containers in pods explicitly drop ALL Linux capabilities. The Kubernetes Pod Security Standards Restricted profile requires containers to drop all capabilities and only add back specific ones that are needed.

        **Why this matters**

        Linux capabilities grant specific privileged operations to processes. By default, container runtimes assign a set of capabilities to containers that most workloads do not need. Failing to drop all capabilities means containers run with unnecessary privileges:

        - Containers retain default capabilities like NET_RAW, CHOWN, DAC_OVERRIDE, FOWNER, FSETID, KILL, SETGID, SETUID, SETPCAP, NET_BIND_SERVICE, SYS_CHROOT, MKNOD, and AUDIT_WRITE.
        - Attackers who compromise a container can leverage these capabilities to escalate privileges, manipulate files, or perform network attacks.
        - The principle of least privilege is violated, increasing the blast radius of any container compromise.
        - Compliance with the Kubernetes Pod Security Standards Restricted profile requires dropping ALL capabilities.

        By ensuring that pods drop ALL capabilities, organizations enforce the principle of least privilege, reduce the attack surface, and align with Kubernetes security best practices.
      audit: |
        Check to ensure all Pods drop ALL capabilities:

        ```bash
        kubectl get pods -A -o json | jq -r '.items[] | select( .spec.containers[].securityContext.capabilities.drop | . == null or ( any(.[] ; ascii_upcase == "ALL") | not ) ) | .metadata.namespace + "/" + .metadata.name' | uniq
        ```
      remediation: |
        Update Pods (or the Deployments/DaemonSets/CronJobs/etc that produced the Pods) to drop ALL capabilities, then add back only the specific capabilities required. Test this in staging first, because dropping every capability can break applications that rely on one. For example, binding to a port below 1024 needs `NET_BIND_SERVICE`, and changing file ownership needs `CHOWN`. If the workload fails after the change, identify the missing capability and add only that one back rather than restoring `ALL`. Applying the change also rolls the workload's pods.

        Example manifest:

        ```yaml
        apiVersion: v1
        kind: Pod
        metadata:
          name: example
          namespace: example-namespace
        spec:
          containers:
            - securityContext:
                capabilities:
                  drop: ["ALL"]
                  add: ["NET_BIND_SERVICE"] # <-- only add back specific capabilities that are needed
        ```
    refs:
      - url: https://kubernetes.io/docs/concepts/security/pod-security-standards/#restricted
        title: 'Kubernetes Pod Security Standards: Restricted'
