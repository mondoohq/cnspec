  - uid: mondoo-kubernetes-security-pod-runasnonroot
    title: Container should not run as root
    impact: 100
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-2
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-5
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-3-1
      compliance/vda-isa-5: vda-isa-5-4-2-1
    filters: k8s.pod.annotations['policies.k8s.mondoo.com/mondoo-kubernetes-security-pod-runasnonroot'] != 'ignore'
    mql: |
      k8s.pod.runsAsRoot == false
    docs:
      desc: |
        This check ensures that containers do not run as the root user by requiring `runAsNonRoot: true` in the security context. This configuration enforces that containers run with a non-root user, reducing the risk of privilege escalation and unauthorized access.

        **Why this matters**

        Running containers as the root user grants them the same privileges as root on the host system. If containers run as root:

        - Attackers or compromised processes may gain elevated privileges, increasing the risk of container escapes or host compromise.
        - Security boundaries between workloads are weakened, making it easier to access sensitive resources.
        - Compliance with security best practices and organizational policies may be violated.

        By ensuring that containers run as non-root, organizations can strengthen workload isolation, reduce the attack surface, and maintain a secure Kubernetes environment.
      audit: |
        Each container's `securityContext` should set `runAsNonRoot: true`. The manifest below shows the required configuration:

        ```yaml
        ---
        apiVersion: v1
        kind: Pod
        spec:
          containers:
            - name: container-name
              image: index.docker.io/yournamespace/repository
              securityContext:
                runAsNonRoot: true
        ```

        The same setting can also be applied to every container at the pod level. The manifest below shows that variation:

        ```yaml
        ---
        apiVersion: v1
        kind: Pod
        spec:
          securityContext:
            runAsNonRoot: true
          containers:
            - name: container-name
              image: index.docker.io/yournamespace/repository
        ```
      remediation: |
        Set `runAsNonRoot` to `true` in each container's `securityContext`. The manifest below shows the required configuration.

        Update the source manifest and apply it with `kubectl apply -f <file>.yaml`, or run `kubectl edit <kind>/<name>` to edit the live object. Applying the change rolls the workload's pods, which causes a brief disruption. The image must run as a non-root user, or the pods will fail to start, so confirm the image's user or set `runAsUser` to a non-zero UID.

        The corrected manifest:

        ```yaml
        ---
        apiVersion: v1
        kind: Pod
        spec:
          containers:
            - name: container-name
              image: index.docker.io/yournamespace/repository
              securityContext:
                runAsNonRoot: true
        ```

        The same setting can also be applied to every container at the pod level. The manifest below shows that variation:

        ```yaml
        ---
        apiVersion: v1
        kind: Pod
        spec:
          securityContext:
            runAsNonRoot: true
          containers:
            - name: container-name
              image: index.docker.io/yournamespace/repository
        ```
    refs:
      - url: https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.25/#securitycontext-v1-core
        title: Configure a Security Context for a Pod or Container
