  - uid: mondoo-kubernetes-security-pod-serviceaccount
    title: Pod should not run with the default service account
    impact: 30
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-2
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-2-1
    mql: |
      k8s.pod.podSpec['serviceAccount'] == null || k8s.pod.podSpec['serviceAccount'] == k8s.pod.serviceAccountName
      k8s.pod.serviceAccountName != '' || k8s.pod.automountServiceAccountToken == false
      k8s.pod.serviceAccountName != 'default' || k8s.pod.automountServiceAccountToken == false
    docs:
      desc: |
        Pods that interact with the Kubernetes API using a ServiceAccount should use specific ServiceAccounts.
        These ServiceAccounts should only have the permissions necessary.
        The Pods should not use the default ServiceAccount (named 'default') that is included in every Namespace.
        The only valid use for the default ServiceAccount is for Pods that set '.spec.automountServiceAccountToken' to 'false'.
        In this case, the Pod explicitly asks for no ServiceAccount to be mounted into the Pod's filesystem, and the Pod is therefore a ServiceAccount-less Pod.
        When every Pods uses the default ServiceAccount and the ServiceAccount's privileges get extended, all Pods get these permissions.
        When a Pod is compromised, the attacker has access to the API using the default ServiceAccount.
      audit: |
        Check that Pods do not set the legacy '.spec.serviceAccount':

        ```yaml
        apiVersion: v1
        kind: Pod
        spec:
          serviceAccount: some-account
          containers:
            - name: example-app
              image: index.docker.io/yournamespace/repository
        ```

        Check that Pods do not set the '.spec.serviceAccountName' to the empty string (which is interpreted as 'default'), or to 'default'.

        ```yaml
        apiVersion: v1
        kind: Pod
        spec:
          serviceAccountName: ""
          containers:
            - name: example-app
              image: index.docker.io/yournamespace/repository
        ```

        Even when the deprecated field '.spec.serviceAccount' is not specified, it will get populated by Kubernetes inside the cluster when a manifest is applied.
        Because of that, we also need to check for the field.
      remediation: |
        Create a ServiceAccount specifically for the Pod with only the permissions it needs when interacting with the Kubernetes API. Update the Pod's `spec.serviceAccountName` to the name of the ServiceAccount created for the Pod. For example:

        ```yaml
        apiVersion: v1
        kind: Pod
        metadata:
          name: example-app
        spec:
          serviceAccountName: some-account <-- Set the name of the ServiceAccount created for the Pod
          containers:
            - name: example-app
              image: index.docker.io/yournamespace/repository
        ```

        Or if the Pod doesn't interact with the Kubernetes API, set the Pod's `.spec.automountServiceAccountToken` field to false so that no ServiceAccount is available to the Pod. For example:

        ```yaml
        apiVersion: v1
        kind: Pod
        metadata:
          name: example-app
        spec:
          automountServiceAccountToken: false
          containers:
            - name: example-app
              image: index.docker.io/yournamespace/repository
        ```
    refs:
      - url: https://kubernetes.io/docs/concepts/security/service-accounts/
        title: Kubernetes Service Accounts
      - url: https://kubernetes.io/docs/concepts/security/pod-security-standards/
        title: Kubernetes Pod Security Standards
  - uid: mondoo-kubernetes-security-serviceaccount-no-long-lived-secrets
    title: ServiceAccounts should not reference long-lived Secrets
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-2
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-1-1
    mql: |
      k8s.serviceaccount.secrets.length == 0
    docs:
      desc: |
        This check ensures ServiceAccounts do not reference long-lived Secret-based API tokens. Modern Kubernetes workloads should use projected, short-lived ServiceAccount tokens instead of static token Secrets tied to the ServiceAccount.
      audit: |
        A ServiceAccount fails this check when the `secrets` field contains any entries. The manifest below shows the violating configuration:

        ```yaml
        apiVersion: v1
        kind: ServiceAccount
        metadata:
          name: legacy-token-sa
        secrets:
          - name: legacy-token
        ```
      remediation: |
        Remove long-lived token Secret references from the ServiceAccount and use projected ServiceAccount tokens for workloads that need Kubernetes API access.
    refs:
      - url: https://kubernetes.io/docs/concepts/security/service-accounts/
        title: Kubernetes Service Accounts
      - url: https://kubernetes.io/docs/concepts/configuration/secret/#serviceaccount-token-secrets
        title: ServiceAccount token Secrets
  - uid: mondoo-kubernetes-security-secret-no-service-account-token
    title: Secrets should not use the ServiceAccount token type
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-2
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-1-1
    mql: |
      k8s.secret.type != "kubernetes.io/service-account-token"
    docs:
      desc: |
        This check ensures Secrets do not use the legacy `kubernetes.io/service-account-token` type. These token Secrets are long-lived credentials and should be replaced with projected ServiceAccount tokens.
      audit: |
        A Secret fails this check when `type` is set to `kubernetes.io/service-account-token`, as shown in the manifest below:

        ```yaml
        apiVersion: v1
        kind: Secret
        metadata:
          name: legacy-token
          annotations:
            kubernetes.io/service-account.name: legacy-token-sa
        type: kubernetes.io/service-account-token
        ```
      remediation: |
        Remove manually created ServiceAccount token Secrets and use projected, short-lived ServiceAccount tokens for workloads that need Kubernetes API access.
    refs:
      - url: https://kubernetes.io/docs/concepts/configuration/secret/#serviceaccount-token-secrets
        title: ServiceAccount token Secrets
      - url: https://kubernetes.io/docs/concepts/security/service-accounts/
        title: Kubernetes Service Accounts
  - uid: mondoo-kubernetes-security-pod-no-secret-env-vars
    title: Pod containers should not use Secrets as environment variables
    impact: 70
    mql: |
      k8s.pod.containers.all(env.all(_['valueFrom']['secretKeyRef'] == null))
      k8s.pod.containers.all(envFrom.all(_['secretRef'] == null))
      k8s.pod.initContainers.all(env.all(_['valueFrom']['secretKeyRef'] == null))
      k8s.pod.initContainers.all(envFrom.all(_['secretRef'] == null))
      k8s.pod.ephemeralContainers.all(env.all(_['valueFrom']['secretKeyRef'] == null))
      k8s.pod.ephemeralContainers.all(envFrom.all(_['secretRef'] == null))
    docs:
      desc: |
        This check ensures Pod containers do not consume Secrets through environment variables. Secret values exposed through `env` or `envFrom` can leak through process dumps, debug output, logs, and application error reporting.
      remediation: |
        Mount Secrets as volumes or use another approved secret delivery mechanism instead of `env[].valueFrom.secretKeyRef` or `envFrom[].secretRef`.
    refs:
      - url: https://kubernetes.io/docs/concepts/configuration/secret/#using-secrets-as-environment-variables
