  - uid: mondoo-kubernetes-security-pod-privilegedcontainer
    title: Container should not run as a privileged container
    impact: 100
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-2
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-5
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-3-1
      compliance/vda-isa-5: vda-isa-5-4-2-1
    mql: |
      k8s.pod.runsPrivileged == false
    docs:
      desc: |
        This check ensures that containers are not running as privileged containers. Privileged containers have the same capabilities as the host, including unrestricted access to all devices and the host's network, which can undermine Kubernetes security controls.

        **Why this matters**

        Running containers as privileged grants them elevated permissions that can be exploited to compromise the host or other workloads. If containers are allowed to run as privileged:

        - Attackers may gain access to sensitive host resources or escalate privileges outside the container.
        - The isolation between workloads is weakened, increasing the risk of container escapes.
        - Compliance with security best practices and organizational policies may be compromised.

        By ensuring that containers do not run as privileged, organizations can maintain strong workload isolation and reduce the risk of privilege escalation or host compromise.
      audit: |
        A container's `securityContext` that sets `privileged: true` triggers this check, as shown in the manifest below:

        ```yaml
        ---
        apiVersion: v1
        kind: Pod
        spec:
          containers:
            - name: container-name
              image: index.docker.io/yournamespace/repository
              securityContext:
                privileged: true
        ```
      remediation: |
        Remove the `privileged` setting from each container's `securityContext`. The manifest below shows the corrected configuration.

        Update the source manifest and apply it with `kubectl apply -f <file>.yaml`, or run `kubectl edit <kind>/<name>` to edit the live object. Applying the change rolls the workload's pods, which causes a brief disruption.

        ```yaml
        ---
        apiVersion: v1
        kind: Pod
        spec:
          containers:
            - name: container-name
              image: index.docker.io/yournamespace/repository
        ```

        Alternatively, set `privileged` to `false` explicitly. The manifest below shows that configuration:

        ```yaml
        ---
        apiVersion: v1
        kind: Pod
        spec:
          containers:
            - name: container-name
              image: index.docker.io/yournamespace/repository
              securityContext:
                privileged: false
        ```
    refs:
      - url: https://kubernetes.io/docs/tasks/configure-pod-container/security-context/
        title: Configure a Security Context for a Pod or Container
  - uid: mondoo-kubernetes-security-pod-no-ephemeral-containers
    title: Pods should not use ephemeral containers
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-2
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-5
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-3-1
      compliance/vda-isa-5: vda-isa-5-4-1-1
    mql: |
      k8s.pod.ephemeralContainers.length == 0
    docs:
      desc: |
        This check ensures Pods do not define ephemeral containers. Ephemeral containers are typically added for debugging and can attach a temporary container to an existing Pod, which may expose running workload data or bypass normal workload review paths.
      audit: |
        A Pod fails this check when `spec.ephemeralContainers` contains any entries. The following manifest shows the violating configuration:

        ```yaml
        ---
        apiVersion: v1
        kind: Pod
        spec:
          ephemeralContainers:
            - name: debugger
              image: busybox:latest
        ```
      remediation: |
        Remove all entries from `spec.ephemeralContainers`. Use approved debugging workflows that do not attach ephemeral containers to production Pods.
    refs:
      - url: https://kubernetes.io/docs/concepts/workloads/pods/ephemeral-containers/
        title: Kubernetes Ephemeral Containers
