  - uid: mondoo-kubernetes-security-no-hostpath-persistent-volumes
    title: Ensure PersistentVolumes do not use hostPath
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ccc-06
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-1
      compliance/nist-csf-2: nist-csf-2-pr-ps-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-2
      compliance/pci-dss-4: pcidss-requirement-2-2-1
      compliance/soc2-2017: soc2-control-cc7-1-1
      compliance/vda-isa-5: vda-isa-5-5-2-1
    mql: |
      k8s.persistentVolumes.none(spec["hostPath"] != null)
    docs:
      desc: |
        This check ensures that no PersistentVolumes in the cluster use hostPath as a volume source.

        **Why this matters**

        hostPath PersistentVolumes mount directories from the host node's filesystem directly into pods, creating significant security risks:

        - **Container escape**: Pods with access to the host filesystem can read or modify sensitive host files, including credentials, configuration, and container runtime sockets.
        - **Cross-pod data access**: Any pod that mounts the same hostPath can access data belonging to other pods or the host, breaking namespace isolation.
        - **Privilege escalation**: Write access to host paths such as `/etc`, `/var/run`, or `/var/lib/kubelet` can be chained with other vulnerabilities to escalate to host-level root access.
        - **Node compromise**: A compromised container with hostPath access can modify host binaries, install backdoors, or tamper with kubelet configuration.
        - **Multi-tenant risk**: In shared clusters, hostPath volumes bypass all namespace-level isolation boundaries.

        Use cloud-native storage provisioners, CSI drivers, or network-attached storage instead of hostPath for persistent data.
      audit: |
        List all PersistentVolumes that use a `hostPath` volume source:

        ```bash
        kubectl get pv -o json | jq -r '.items[] | select(.spec.hostPath != null) | .metadata.name'
        ```

        If the command returns no output, the check passes. If any PersistentVolume name is listed, that volume uses `hostPath` and the check fails.
      remediation: |
        Replace hostPath PersistentVolumes with a proper storage backend:

        ```yaml
        # Instead of:
        apiVersion: v1
        kind: PersistentVolume
        metadata:
          name: example-pv
        spec:
          hostPath:
            path: /data/app

        # Use a CSI driver or cloud storage:
        apiVersion: v1
        kind: PersistentVolume
        metadata:
          name: example-pv
        spec:
          csi:
            driver: ebs.csi.aws.com
            volumeHandle: vol-0123456789abcdef0
          capacity:
            storage: 10Gi
          accessModes:
            - ReadWriteOnce
        ```

        If hostPath is required for development, use Pod Security Admission or OPA/Gatekeeper policies to restrict it to specific namespaces.
    refs:
      - url: https://kubernetes.io/docs/concepts/storage/volumes/#hostpath
        title: Kubernetes Volumes - hostPath
      - url: https://kubernetes.io/docs/concepts/security/pod-security-standards/
        title: Kubernetes Pod Security Standards
  - uid: mondoo-kubernetes-security-api-server-authorization-mode
    title: Ensure the kube-apiserver enforces Node and RBAC authorization
    impact: 100
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-2
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-2
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-2-1
    mql: |
      processes.where(executable == /kube-apiserver/).list {
        flags["authorization-mode"] != null
        flags["authorization-mode"].contains("Node")
        flags["authorization-mode"].contains("RBAC")
        flags["authorization-mode"].contains("AlwaysAllow") == false
      }
    docs:
      desc: |
        This check ensures that the kube-apiserver `--authorization-mode` flag includes both `Node` and `RBAC` and excludes `AlwaysAllow`. Without RBAC, every authenticated request is permitted; without `Node`, kubelets can read or modify resources unrelated to their own node; `AlwaysAllow` disables authorization entirely and must never be set on a production cluster.

        **Why this matters**

        - `AlwaysAllow` makes every request succeed regardless of identity, allowing complete cluster takeover with any valid (or anonymous) credential.
        - Missing `Node` lets a compromised kubelet read Secrets, ConfigMaps, and Pods from other nodes, expanding lateral-movement opportunities.
        - Missing `RBAC` removes the role-based access control plane that limits what tokens, users, and ServiceAccounts can do.
      audit: |
        Inspect the API server `--authorization-mode` argument on each control plane node:

        ```bash
        kubectl -n kube-system get pod -l component=kube-apiserver -o yaml | grep authorization-mode
        ```

        On kubeadm clusters you can also run `ps -ef | grep kube-apiserver`. If `--authorization-mode` includes both `Node` and `RBAC` and does not include `AlwaysAllow`, the check passes. If `Node` or `RBAC` is missing, or `AlwaysAllow` is present, the check fails.
      remediation: |
        These flags apply to self-managed control planes only. On managed services such as EKS, GKE, and AKS the control plane is provider-managed and these flags cannot be changed. On kubeadm clusters the API server runs as a static pod: back up and edit `/etc/kubernetes/manifests/kube-apiserver.yaml`, and the kubelet automatically restarts the static pod when you save the file. Do not run `kubectl rollout restart` for the API server. After saving, watch `kubectl -n kube-system get pod -l component=kube-apiserver` or `crictl ps` to confirm it comes back, because a bad flag can stop the API server from starting and lock you out of the cluster.

        Set the API server `--authorization-mode` flag so it includes `Node,RBAC` and never includes `AlwaysAllow`:

        ```bash
        --authorization-mode=Node,RBAC
        ```

        Edit `/etc/kubernetes/manifests/kube-apiserver.yaml` (kubeadm) or your distribution's API server configuration and save the file so the kubelet restarts the static pod.
    refs:
      - url: https://kubernetes.io/docs/reference/access-authn-authz/authorization/
        title: Kubernetes Authorization Overview
      - url: https://kubernetes.io/docs/reference/access-authn-authz/node/
        title: Using Node Authorization
  - uid: mondoo-kubernetes-security-api-server-no-always-admit
    title: Ensure the kube-apiserver does not enable the AlwaysAdmit admission plugin
    impact: 95
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ccc-06
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-pt-3
      compliance/nist-csf-2: nist-csf-2-pr-ps-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-6
      compliance/pci-dss-4: pcidss-requirement-2-2-1
      compliance/soc2-2017: soc2-control-cc7-1-1
      compliance/vda-isa-5: vda-isa-5-5-2-1
    mql: |
      processes.where(executable == /kube-apiserver/).list {
        flags["enable-admission-plugins"] == null ||
        flags["enable-admission-plugins"].contains("AlwaysAdmit") == false
      }
    docs:
      desc: |
        This check ensures that the `AlwaysAdmit` admission plugin is not enabled on the kube-apiserver. `AlwaysAdmit` accepts every admission request, bypassing all admission validation and security policy enforcement performed by other plugins.

        **Why this matters**

        Admission controllers are the last line of defense before objects are persisted in etcd. Enabling `AlwaysAdmit` voids policy controls such as `PodSecurity`, `NodeRestriction`, and `ResourceQuota`, allowing privileged or non-compliant workloads to be created.
      audit: |
        Inspect the API server `--enable-admission-plugins` argument on each control plane node:

        ```bash
        kubectl -n kube-system get pod -l component=kube-apiserver -o yaml | grep enable-admission-plugins
        ```

        On kubeadm clusters you can also run `ps -ef | grep kube-apiserver`. If `AlwaysAdmit` does not appear in the `--enable-admission-plugins` list, the check passes. If `AlwaysAdmit` is present, the check fails.
      remediation: |
        These flags apply to self-managed control planes only. On managed services such as EKS, GKE, and AKS the control plane is provider-managed and these flags cannot be changed. On kubeadm clusters the API server runs as a static pod: back up and edit `/etc/kubernetes/manifests/kube-apiserver.yaml`, and the kubelet automatically restarts the static pod when you save the file. Do not run `kubectl rollout restart` for the API server. After saving, watch `kubectl -n kube-system get pod -l component=kube-apiserver` or `crictl ps` to confirm it comes back, because a bad flag can stop the API server from starting and lock you out of the cluster.

        Remove `AlwaysAdmit` from the API server `--enable-admission-plugins` flag and save the file so the kubelet restarts the static pod.
    refs:
      - url: https://kubernetes.io/docs/reference/access-authn-authz/admission-controllers/#alwaysadmit
        title: Kubernetes - AlwaysAdmit Admission Controller
  - uid: mondoo-kubernetes-security-api-server-admission-node-restriction
    title: Ensure the kube-apiserver enables the NodeRestriction admission plugin
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-2
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-5
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-2-1
    mql: |
      processes.where(executable == /kube-apiserver/).list {
        flags["enable-admission-plugins"] != null
        flags["enable-admission-plugins"].contains("NodeRestriction")
      }
    docs:
      desc: |
        This check ensures that the `NodeRestriction` admission plugin is enabled on the kube-apiserver. `NodeRestriction` limits a kubelet to modifying only its own Node and Pod objects, preventing a compromised kubelet from tampering with workloads on other nodes.

        **Why this matters**

        Without `NodeRestriction`, an attacker who compromises a single node can use the node's kubelet credentials to read or modify Pods, Secrets, and Nodes across the entire cluster.
      audit: |
        Inspect the API server `--enable-admission-plugins` argument on each control plane node:

        ```bash
        kubectl -n kube-system get pod -l component=kube-apiserver -o yaml | grep enable-admission-plugins
        ```

        On kubeadm clusters you can also run `ps -ef | grep kube-apiserver`. If `NodeRestriction` appears in the `--enable-admission-plugins` list, the check passes. If it is missing, the check fails.
      remediation: |
        These flags apply to self-managed control planes only. On managed services such as EKS, GKE, and AKS the control plane is provider-managed and these flags cannot be changed. On kubeadm clusters the API server runs as a static pod: back up and edit `/etc/kubernetes/manifests/kube-apiserver.yaml`, and the kubelet automatically restarts the static pod when you save the file. Do not run `kubectl rollout restart` for the API server. After saving, watch `kubectl -n kube-system get pod -l component=kube-apiserver` or `crictl ps` to confirm it comes back, because a bad flag can stop the API server from starting and lock you out of the cluster.

