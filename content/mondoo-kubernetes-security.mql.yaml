queries:
  - uid: mondoo-kubernetes-security-namespace-psa-labels
    title: Namespaces should define Pod Security Admission labels
    impact: 80
    mql: |
      k8s.namespace.labels.keys.any(_ == /^pod-security\.kubernetes\.io\/.+/ && k8s.namespace.labels[_] != "")
    docs:
      desc: |
        This check verifies that Namespaces define at least one non-empty Pod Security Admission label using the `pod-security.kubernetes.io/` prefix. Namespace PSA labels let Kubernetes enforce, warn, or audit against Pod Security Standards levels.
      audit: |
        List Namespaces without a non-empty Pod Security Admission label:

        ```bash
        kubectl get namespaces -o json | jq -r '.items[] | select(((.metadata.labels // {}) | to_entries | any(.key | startswith("pod-security.kubernetes.io/")) and ((.metadata.labels // {}) | to_entries | any(.key | startswith("pod-security.kubernetes.io/") and .value != ""))) | not) | .metadata.name'
        ```
      remediation: |
        Add an appropriate Pod Security Admission label such as `pod-security.kubernetes.io/enforce=baseline`, `pod-security.kubernetes.io/warn=restricted`, or your organization's selected PSA mode and profile.
    refs:
      - url: https://kubernetes.io/docs/concepts/security/pod-security-admission/
        title: Kubernetes - Pod Security Admission
      - url: https://kyverno.io/policies/psa/add-psa-namespace-reporting/add-psa-namespace-reporting/
        title: Kyverno - Add PSA Namespace Reporting
  - uid: mondoo-kubernetes-security-namespace-psa-enforce-warn-labels
    title: Namespaces should define Pod Security Admission enforce and warn labels
    impact: 80
    mql: |
      k8s.namespace.labels["pod-security.kubernetes.io/enforce"] != null
      k8s.namespace.labels["pod-security.kubernetes.io/warn"] != null
    docs:
      desc: |
        This check verifies that Namespaces define Pod Security Admission `enforce` and `warn` labels. These labels select the Pod Security Standards profile enforced by the API server and the stricter profile surfaced as warnings.
      audit: |
        List Namespaces missing the PSA `enforce` or `warn` labels:

        ```bash
        kubectl get namespaces -o json | jq -r '.items[] | select(((.metadata.labels // {})["pod-security.kubernetes.io/enforce"] == null) or ((.metadata.labels // {})["pod-security.kubernetes.io/warn"] == null)) | .metadata.name'
        ```
      remediation: |
        Add PSA `enforce` and `warn` labels to each Namespace. A common default is `pod-security.kubernetes.io/enforce=baseline` with `pod-security.kubernetes.io/warn=restricted`, adjusted for namespaces that require a different Pod Security Standards profile.
    refs:
      - url: https://kubernetes.io/docs/concepts/security/pod-security-admission/
        title: Kubernetes - Pod Security Admission
      - url: https://kyverno.io/policies/psa/add-psa-labels/add-psa-labels/
        title: Kyverno - Add PSA Labels
  - uid: mondoo-kubernetes-security-namespace-psa-enforce-not-privileged
    title: Namespaces should not enforce the privileged Pod Security Admission profile
    impact: 80
    mql: |
      k8s.namespace.labels["pod-security.kubernetes.io/enforce"] == null || k8s.namespace.labels["pod-security.kubernetes.io/enforce"] != "privileged"
    docs:
      desc: |
        This check verifies that Namespaces do not set `pod-security.kubernetes.io/enforce=privileged`. A privileged PSA enforce label bypasses the baseline and restricted Pod Security Standards for workloads in that Namespace.
      audit: |
        List Namespaces that enforce the privileged PSA profile:

        ```bash
        kubectl get namespaces -o json | jq -r '.items[] | select((.metadata.labels // {})["pod-security.kubernetes.io/enforce"] == "privileged") | .metadata.name'
        ```
      remediation: |
        Change the Namespace PSA enforce label to `baseline` or `restricted`, or remove it when a cluster-wide Pod Security Admission configuration already sets the intended default.
    refs:
      - url: https://kubernetes.io/docs/concepts/security/pod-security-admission/
        title: Kubernetes - Pod Security Admission
      - url: https://kyverno.io/policies/psa/deny-privileged-profile/deny-privileged-profile/
        title: Kyverno - Deny Privileged Profile
  - uid: mondoo-kubernetes-security-configmap-ingress-nginx-snippet-annotations-disabled
    title: ingress-nginx ConfigMaps should disable snippet annotations
    impact: 80
    mql: |
      k8s.configmap.data["allow-snippet-annotations"] == null || k8s.configmap.data["allow-snippet-annotations"] == "false"
    docs:
      desc: |
        This check verifies that ConfigMaps do not enable ingress-nginx snippet annotations. Enabling `allow-snippet-annotations` lets Ingress authors inject custom NGINX configuration and can expose cluster secrets through CVE-2021-25742-style abuse.
      audit: |
        Review ConfigMaps that define the `allow-snippet-annotations` key and confirm the value is `false`.
      remediation: |
        Set `allow-snippet-annotations` to `false` in ingress-nginx configuration ConfigMaps, or remove the key when snippets are not intentionally enabled.
    refs:
      - url: https://github.com/kubernetes/ingress-nginx/issues/7837
        title: ingress-nginx CVE-2021-25742 issue
      - url: https://kubernetes.github.io/ingress-nginx/user-guide/nginx-configuration/configmap/#allow-snippet-annotations
        title: ingress-nginx allow-snippet-annotations
  - uid: mondoo-kubernetes-security-ingress-nginx-no-custom-snippets
    title: Ingress resources should not use ingress-nginx custom snippets
    impact: 80
    mql: |
      k8s.ingress.annotations.keys.none(_ == /-snippet$/)
    docs:
      desc: |
        This check verifies that Ingress resources do not define annotation keys ending in `-snippet`. ingress-nginx custom snippet annotations can allow users who control Ingress objects to inject NGINX configuration and access sensitive cluster data.
      audit: |
        List Ingresses with snippet annotations:

        ```bash
        kubectl get ingress -A -o json | jq -r '.items[] | select(((.metadata.annotations // {}) | keys | any(endswith("-snippet")))) | .metadata.namespace + "/" + .metadata.name'
        ```
      remediation: |
        Remove `*-snippet` annotations from Ingress resources and keep snippet support disabled in the ingress-nginx controller configuration.
    refs:
      - url: https://github.com/kubernetes/ingress-nginx/issues/7837
        title: ingress-nginx CVE-2021-25742 issue
      - url: https://kubernetes.github.io/ingress-nginx/user-guide/nginx-configuration/annotations/#configuration-snippet
        title: ingress-nginx snippet annotations
  - uid: mondoo-kubernetes-security-ingress-nginx-no-sensitive-paths
    title: Ingress paths should not expose sensitive filesystem locations
    impact: 80
    mql: |
      k8s.ingress.rules.all(
        httpPaths.all(
          path.contains("/etc") == false &&
          path.contains("/var/run/secrets") == false &&
          path.contains("/root") == false &&
          path.contains("/var/run/kubernetes/serviceaccount") == false &&
          path.contains("/etc/kubernetes/admin.conf") == false
        )
      )
    docs:
      desc: |
        This check verifies that Ingress HTTP paths do not contain sensitive filesystem locations such as `/etc`, `/root`, service account token paths, or Kubernetes admin configuration paths.

        **Why this matters**

        Some ingress-nginx path handling vulnerabilities allowed crafted Ingress paths to expose sensitive files from the controller environment. Blocking paths that reference sensitive locations reduces the chance that an Ingress object can be abused to read secrets or configuration files through the controller.
      audit: |
        List Ingresses with paths that reference sensitive filesystem locations:

        ```bash
        kubectl get ingress -A -o json | jq -r '.items[] | select(any(.spec.rules[]?.http.paths[]?.path // ""; contains("/etc") or contains("/var/run/secrets") or contains("/root") or contains("/var/run/kubernetes/serviceaccount") or contains("/etc/kubernetes/admin.conf"))) | .metadata.namespace + "/" + .metadata.name'
        ```
      remediation: |
        Remove path rules that reference sensitive filesystem locations and upgrade ingress-nginx to a fixed version.
    refs:
      - url: https://kyverno.io/policies/nginx-ingress/restrict-ingress-paths/restrict-ingress-paths/
        title: Kyverno Restrict NGINX Ingress path values policy
      - url: https://nvd.nist.gov/vuln/detail/cve-2021-25745
        title: CVE-2021-25745
  - uid: mondoo-kubernetes-security-ingress-nginx-no-dangerous-annotation-values
    title: Ingress annotations should not contain dangerous ingress-nginx directives
    impact: 80
    mql: |
      k8s.ingress.annotations.values.none(
        _ == /\s*alias\s*.*;/ ||
        _ == /\s*root\s*.*;/ ||
        _ == /\/etc\/(passwd|shadow|group|nginx|ingress-controller)/ ||
        _ == /\/var\/run\/secrets/ ||
        _ == /.*_by_lua.*/
      )
    docs:
      desc: |
        This check verifies that Ingress annotation values do not contain dangerous ingress-nginx directives or references to sensitive filesystem locations.

        **Why this matters**

        ingress-nginx annotation values can influence generated NGINX configuration. Dangerous directives such as `alias`, `root`, Lua hooks, or paths under `/etc` and `/var/run/secrets` can expose controller credentials or sensitive files when accepted by vulnerable controller versions.
      audit: |
        List Ingresses with dangerous annotation values:

        ```bash
        kubectl get ingress -A -o json | jq -r '.items[] | select((.metadata.annotations // {}) | to_entries | any(.value | test("\\s*alias\\s*.*;|\\s*root\\s*.*;|/etc/(passwd|shadow|group|nginx|ingress-controller)|/var/run/secrets|.*_by_lua.*"))) | .metadata.namespace + "/" + .metadata.name'
        ```
      remediation: |
        Remove dangerous directives and sensitive filesystem references from Ingress annotation values, configure the ingress-nginx annotation value word blocklist, and upgrade ingress-nginx to a fixed version.
    refs:
      - url: https://kyverno.io/policies/nginx-ingress/restrict-annotations/restrict-annotations/
        title: Kyverno Restrict NGINX Ingress annotation values policy
      - url: https://nvd.nist.gov/vuln/detail/cve-2021-25746
        title: CVE-2021-25746
  - uid: mondoo-kubernetes-security-pod-no-flux-v1-annotations
    title: Pods should not use Flux v1 annotations
    impact: 60
    mql: |
      k8s.pod.annotations.keys.none(_ == /^fluxcd\.io\//)
    docs:
      desc: |
        This check verifies that Pods do not define annotation keys with the legacy `fluxcd.io/` prefix. These annotations are reserved for Flux v1-era automation and should not be set on workloads unless explicitly allowed.
      audit: |
        Review Pod metadata annotations for keys that begin with `fluxcd.io/`.
      remediation: |
        Remove `fluxcd.io/` annotations from Pod metadata or migrate the workflow to supported Flux annotations.
    refs:
      - url: https://kyverno.io/policies/other/restrict-annotations/restrict-annotations/
        title: Kyverno Restrict Annotations policy
  - uid: mondoo-kubernetes-security-cronjob-no-flux-v1-annotations
    title: CronJobs should not use Flux v1 annotations
    impact: 60
    mql: |
      k8s.cronjob.annotations.keys.none(_ == /^fluxcd\.io\//)
    docs:
      desc: |
