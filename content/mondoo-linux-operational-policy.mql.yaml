policies:
  - uid: linux-operational-policy
    name: Linux Server Operational Policy
    version: 1.1.0
    license: BUSL-1.1
    tags:
      mondoo.com/category: best-practices
      mondoo.com/platform: linux
    require:
      - provider: os
    authors:
      - name: Mondoo, Inc.
        email: hello@mondoo.com
    summary: Validate Linux server reliability and operations
    docs:
      desc: |
        The Mondoo Linux Server Operational Policy identifies operational health issues on Linux servers that could lead to service disruption, data corruption, and unplanned outages. This policy helps operations teams catch resource exhaustion and capacity problems before they cascade into application crashes, dropped writes, and emergency on-call work.

        This policy provides checks across key Linux server health indicators:

        - Disk usage thresholds across mounted filesystems
        - Memory utilization and swap pressure
        - Filesystem inode availability

        Learn more about scanning Linux in the [cnspec Linux documentation](https://mondoo.com/docs/cnspec/os/linux).

        Have suggestions for new checks in this policy? Visit our [cnspec repository](https://github.com/mondoohq/cnspec).
    groups:
      - filters: asset.family.contains("linux")
        checks:
          - uid: linux-operational-policy-disk-usage
          - uid: linux-operational-policy-memory-usage
queries:
  - uid: linux-operational-policy-disk-usage
    title: Ensure disk usage is under 80%
    impact: 60
    mql: |
      mount.list.where(fstype != "tmpfs" && fstype != "devtmpfs" && device != "udev" && device != /^loop/).where(size > 0).all(used * 100 / size < 80)
    docs:
      desc: |
        This check verifies that every mounted persistent filesystem is using less than 80 percent of its capacity. Pseudo-filesystems such as `tmpfs`, `devtmpfs`, and loopback mounts are excluded.

        **Why this matters**

        A filesystem that fills up causes write failures that cascade into application crashes, dropped data, and emergency outages. Catching high usage early gives operations teams time to act before a disk reaches capacity.

        - **Prevents data loss:** Free space ensures new data and logs can be written without failure.
        - **Maintains performance:** A filesystem that is not near capacity avoids the slowdowns caused by fragmentation and constrained allocation.
        - **Supports capacity planning:** Tracking usage trends surfaces growth before it becomes an outage.
        - **Keeps services available:** Headroom on system and log volumes keeps critical daemons running.
      audit: |
        Run this command to inspect filesystem usage:

        ```bash
        df -hP -x tmpfs -x devtmpfs
        ```

        A passing result shows every persistent filesystem with a `Use%` value below 80 percent. A failing result shows one or more filesystems at 80 percent or higher.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Identify large files and directories consuming disk space:

            ```bash
            du -sh /* 2>/dev/null | sort -rh | head -20
            ```

            Clean up common sources of disk usage:

            ```bash
            # Remove old journal logs older than 7 days
            journalctl --vacuum-time=7d

            # Clean package manager cache (Debian/Ubuntu)
            apt-get clean

            # Clean package manager cache (RHEL/CentOS)
            yum clean all

            # Remove old temporary files
            find /tmp -type f -atime +7 -delete
            ```
        - id: ansible
          desc: |
            **Using Ansible**

            Free disk space by cleaning up common sources of usage with the following Ansible playbook:

            ```yaml
            ---
            - name: Reduce disk usage below 80%
              hosts: all
              become: true

              tasks:
                - name: Remove old journal logs older than 7 days
                  ansible.builtin.command: journalctl --vacuum-time=7d
                  changed_when: true

                - name: Clean apt cache (Debian/Ubuntu)
                  ansible.builtin.apt:
                    autoclean: true
                    autoremove: true
                  when: ansible_os_family == "Debian"

                - name: Clean yum cache (RHEL/CentOS)
                  ansible.builtin.command: yum clean all
                  changed_when: true
                  when: ansible_os_family == "RedHat"

                - name: Remove temporary files older than 7 days
                  ansible.builtin.find:
                    paths: /tmp
                    age: 7d
                    file_type: file
                  register: old_tmp_files

                - name: Delete old temporary files
                  ansible.builtin.file:
                    path: "{{ item.path }}"
                    state: absent
                  loop: "{{ old_tmp_files.files }}"
            ```
  - uid: linux-operational-policy-memory-usage
    title: Ensure memory usage is under 80%
    impact: 60
    mql: |
      command("free | grep Mem | awk '{print $3/$2 * 100.0}'").stdout.trim < 80.0
    docs:
      desc: |
        This check verifies that the system is using less than 80 percent of its total physical memory.

        **Why this matters**

        When a host exhausts physical memory it falls back to slower swap or triggers the out-of-memory killer, both of which degrade or interrupt service. Watching memory headroom surfaces pressure before it causes an outage.

        - **Maintains performance:** Free memory keeps the system from thrashing on slow swap-backed virtual memory.
        - **Avoids crashes:** Headroom prevents the kernel out-of-memory killer from terminating critical processes.
        - **Surfaces memory leaks:** Rising utilization over time reveals processes that fail to release memory.
        - **Informs resource allocation:** Knowing which workloads consume memory guides right-sizing decisions.
      audit: |
        Run this command to inspect memory utilization:

        ```bash
        free -m
        ```

        A passing result shows used memory below 80 percent of the total. A failing result shows used memory at or above 80 percent of the total.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Identify the processes consuming the most memory:

            ```bash
            ps -eo pid,user,%mem,%cpu,rss,command --sort=-%mem | head -20
            ```

            Inspect memory and swap usage at a glance:

            ```bash
            free -h
            ```

            Free up memory by addressing the largest consumers:

            ```bash
            # Restart a memory-leaking service to release retained memory
            systemctl restart <service-name>

            # Drop cached pages, dentries, and inodes (kernel will repopulate as needed)
            sync && echo 3 > /proc/sys/vm/drop_caches

            # Stop or remove non-essential workloads pinning memory
            systemctl stop <service-name>
            ```

            For persistent pressure, right-size the workload. Tune service memory limits with `MemoryHigh=` and `MemoryMax=` in systemd unit files, add swap, or scale the host's RAM.
