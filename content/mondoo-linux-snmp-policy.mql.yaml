policies:
  - uid: linux-snmp-policy
    name: Linux Server SNMP Policy
    version: 1.1.1
    license: BUSL-1.1
    tags:
      mondoo.com/category: best-practices
      mondoo.com/platform: linux
    require:
      - provider: os
    authors:
      - name: Mondoo, Inc.
        email: hello@mondoo.com
    summary: Secure Linux SNMP community strings and access controls
    docs:
      desc: |
        The Mondoo Linux Server SNMP Policy identifies insecure SNMP configurations on Linux hosts that could expose system information and enable unauthorized network management access. This policy helps organizations detect and remediate SNMP weaknesses before attackers can exploit them to gather reconnaissance, modify configurations, or pivot through network infrastructure.

        This policy provides security checks across key SNMP configuration areas:

        - Authentication requirements and SNMPv3 enforcement
        - Community string strength and exposure
        - Access control and source restrictions
        - File permissions on SNMP credential and configuration files

        Learn more about scanning Linux in the [cnspec Linux documentation](https://mondoo.com/docs/cnspec/os/linux).

        Have suggestions for new checks in this policy? Visit our [cnspec repository](https://github.com/mondoohq/cnspec).
    groups:
      - title: SNMP Server Configuration
        filters: |
          asset.family.contains("linux")
          packages.contains(name == /snmpd/)
        checks:
          - uid: linux-snmp-v3-user-file-protected
          - uid: linux-snmp-contains-no-read-write-community-strings
          - uid: linux-snmp-no-unauthenticated-access
queries:
  - uid: linux-snmp-v3-user-file-protected
    title: Ensure the file containing SNMP user hashes is secured
    impact: 70
    mql: |
      file("/var/lib/snmp/snmpd.conf") {
        user.name == 'Debian-snmp'
        group.name == 'Debian-snmp'
        permissions.user_executable == false
        permissions.group_writeable == false
        permissions.group_readable == false
        permissions.group_executable == false
        permissions.other_writeable == false
        permissions.other_executable == false
        permissions.other_readable == false
      }
    docs:
      desc: |
        This check verifies that `/var/lib/snmp/snmpd.conf` is owned by the `Debian-snmp` user and group and is not readable, writable, or executable by group or other users. This check applies to Debian-based distributions.

        **Why this matters**

        The file `/var/lib/snmp/snmpd.conf` stores SNMPv3 user password hashes, which can use algorithms as weak as MD5. If the file is readable by unprivileged users, those hashes can be extracted and cracked offline.

        - **Protects credential hashes:** Restricting access prevents disclosure of SNMPv3 authentication secrets.
        - **Limits offline cracking:** Keeping the file private denies attackers the material needed to brute-force weak hashes.
        - **Reduces local attack surface:** Hardened permissions ensure only the SNMP daemon and root can read the file.
      audit: |
        Run this command to inspect the ownership and permissions of the SNMP user file:

        ```bash
        stat -c '%U %G %A' /var/lib/snmp/snmpd.conf
        ```

        A passing result shows the file owned by `Debian-snmp:Debian-snmp` with no group or other access. A failing result shows different ownership or any group or other access.
      remediation:
        - id: cli
          desc: |
            **Using CLI**

            The file `/var/lib/snmp/snmpd.conf` should be owned by the `Debian-snmp` user and group, and should only be readable by the owner (no group or other access).

            Run these commands to set proper permissions on your `/var/lib/snmp/snmpd.conf` file:

            ```bash
            chown Debian-snmp:Debian-snmp /var/lib/snmp/snmpd.conf
            chmod 600 /var/lib/snmp/snmpd.conf
            ```
        - id: bash
          desc: |
            **Using a Bash Script**

            To set the proper permissions on your `/var/lib/snmp/snmpd.conf` file, you can use this bash script:

            ```bash
            #!/bin/bash
            set -e

            echo "Setting permissions on /var/lib/snmp/snmpd.conf"
            chown Debian-snmp:Debian-snmp /var/lib/snmp/snmpd.conf
            chmod 600 /var/lib/snmp/snmpd.conf
            ```
        - id: ansible
          desc: |
            **Using Ansible**

            To set the proper permissions on `/var/lib/snmp/snmpd.conf` use the following Ansible playbook:

            ```yaml
            ---
            - name: Ensure SNMP user file is secured
              hosts: all
              become: true

              tasks:
                - name: Ensure /var/lib/snmp/snmpd.conf has correct permissions
                  ansible.builtin.file:
                    path: /var/lib/snmp/snmpd.conf
                    owner: Debian-snmp
                    group: Debian-snmp
                    mode: '0600'
            ```
  - uid: linux-snmp-contains-no-read-write-community-strings
    title: Ensure SNMP config does not contain read-write community strings
    impact: 100
    mql: |
      snmpd.config.rwCommunities.length == 0
    docs:
      desc: |
        This check verifies that `/etc/snmp/snmpd.conf` and any files under `/etc/snmp/snmpd.conf.d` contain no `rwcommunity` or `rwcommunity6` directives.

        **Why this matters**

        A read-write community string grants full SNMP write access to anyone who knows it. Because SNMPv1 and v2c community strings travel in plaintext and are often left at well-known defaults, an attacker who learns one can reconfigure the host, alter system settings, or disrupt monitored services.

        - **Prevents unauthorized changes:** Removing write community strings blocks SNMP-based modification of the system.
        - **Eliminates plaintext write credentials:** No read-write community string can be sniffed off the network.
        - **Forces stronger access models:** Removing these directives pushes management toward authenticated SNMPv3.
      audit: |
        Run this command to search for read-write community string directives:

        ```bash
        grep -rE '^\s*(rwcommunity|rwcommunity6)\s' /etc/snmp/snmpd.conf /etc/snmp/snmpd.conf.d/
        ```

        A passing result returns no output. A failing result lists one or more `rwcommunity` or `rwcommunity6` directives.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Remove the `rwcommunity` or `rwcommunity6` strings from your SNMP configuration files:

            ```bash
            sed -i '/^\s*\(rwcommunity\|rwcommunity6\)\s/d' /etc/snmp/snmpd.conf
            find /etc/snmp/snmpd.conf.d -type f -exec sed -i '/^\s*\(rwcommunity\|rwcommunity6\)\s/d' {} +
            systemctl restart snmpd
            ```
        - id: ansible
          desc: |
            **Using Ansible**

            Remove read-write community strings from SNMP configuration files using the following Ansible playbook:

            ```yaml
            ---
            - name: Remove SNMP read-write community strings
              hosts: all
              become: true

              tasks:
                - name: Remove rwcommunity lines from /etc/snmp/snmpd.conf
                  ansible.builtin.lineinfile:
                    path: /etc/snmp/snmpd.conf
                    regexp: '^\s*(rwcommunity|rwcommunity6)\s'
                    state: absent
                  notify: Restart snmpd

                - name: Find files in /etc/snmp/snmpd.conf.d
                  ansible.builtin.find:
                    paths: /etc/snmp/snmpd.conf.d
                    file_type: file
                  register: snmp_conf_files

                - name: Remove rwcommunity lines from snmpd.conf.d files
                  ansible.builtin.lineinfile:
                    path: "{{ item.path }}"
                    regexp: '^\s*(rwcommunity|rwcommunity6)\s'
                    state: absent
                  loop: "{{ snmp_conf_files.files }}"
                  notify: Restart snmpd

              handlers:
                - name: Restart snmpd
                  ansible.builtin.service:
                    name: snmpd
                    state: restarted
            ```
  - uid: linux-snmp-no-unauthenticated-access
    title: Ensure unauthenticated access to SNMP is not allowed
    impact: 100
    mql: |-
      snmpd.config.content.lines.none(/^\s*rwuser\s+(-s\s+\S+\s+)?\S+\s+noauth\b/)
    docs:
      desc: |
        This check verifies that `/etc/snmp/snmpd.conf` and any files under `/etc/snmp/snmpd.conf.d` contain no `rwuser` directives that specify the `noauth` security level. This check applies to Debian-based distributions.

        **Why this matters**

        An `rwuser ... noauth` directive grants SNMPv3 write access without requiring authentication. This effectively exposes full management control of the host to any network peer that can reach the SNMP port.

        - **Requires authentication:** Removing `noauth` directives ensures every SNMPv3 write request is authenticated.
        - **Prevents unauthorized control:** Authenticated access blocks anonymous peers from reconfiguring the system.
        - **Enforces SNMPv3 best practice:** Using `authNoPriv` or `authPriv` keeps SNMP management aligned with secure configuration guidance.
      audit: |
        Run this command to search for unauthenticated SNMP write directives:

        ```bash
        grep -rE '^\s*rwuser\s+(-s\s+\S+\s+)?\S+\s+noauth' /etc/snmp/snmpd.conf /etc/snmp/snmpd.conf.d/
        ```

        A passing result returns no output. A failing result lists one or more `rwuser` directives that specify the `noauth` security level.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Remove or reconfigure any `rwuser` directives that specify `noauth` security level in `/etc/snmp/snmpd.conf` or files in `/etc/snmp/snmpd.conf.d/`. Either delete these lines or change them to use `authNoPriv` or `authPriv` security levels which require authentication.

            ```bash
            sed -i '/^\s*rwuser\s\+\(-s\s\+\S\+\s\+\)\?\S\+\s\+noauth/d' /etc/snmp/snmpd.conf
            find /etc/snmp/snmpd.conf.d -type f -exec sed -i '/^\s*rwuser\s\+\(-s\s\+\S\+\s\+\)\?\S\+\s\+noauth/d' {} +
            systemctl restart snmpd
            ```
        - id: ansible
          desc: |
            **Using Ansible**

            Remove unauthenticated SNMP access using the following Ansible playbook:

            ```yaml
            ---
            - name: Remove unauthenticated SNMP access
              hosts: all
              become: true

              tasks:
                - name: Remove rwuser noauth lines from /etc/snmp/snmpd.conf
                  ansible.builtin.lineinfile:
                    path: /etc/snmp/snmpd.conf
                    regexp: '^\s*rwuser\s+(-s\s+\S+\s+)?\S+\s+noauth'
                    state: absent
                  notify: Restart snmpd

                - name: Find files in /etc/snmp/snmpd.conf.d
                  ansible.builtin.find:
                    paths: /etc/snmp/snmpd.conf.d
                    file_type: file
                  register: snmp_conf_files

                - name: Remove rwuser noauth lines from snmpd.conf.d files
                  ansible.builtin.lineinfile:
                    path: "{{ item.path }}"
                    regexp: '^\s*rwuser\s+(-s\s+\S+\s+)?\S+\s+noauth'
                    state: absent
                  loop: "{{ snmp_conf_files.files }}"
                  notify: Restart snmpd

              handlers:
                - name: Restart snmpd
                  ansible.builtin.service:
                    name: snmpd
                    state: restarted
            ```
