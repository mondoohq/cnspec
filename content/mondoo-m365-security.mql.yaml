  # No Terraform variants: the security defaults toggle has no azuread Terraform resource and can only be changed through the Graph API or portal.
  - uid: mondoo-m365-security-ensure-security-defaults-is-disabled-on-azure-active-directory
    title: Ensure Security Defaults is disabled on Azure Active Directory
    impact: 80
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-01
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: false
      compliance/nist-csf-1: nist-csf-1-pr-ip-1
      compliance/nist-csf-2: nist-csf-2-pr-ps-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-2
      compliance/pci-dss-4: pcidss-requirement-2-2-1
      compliance/soc2-2017: soc2-control-cc7-1-1
      compliance/vda-isa-5: vda-isa-5-4-1-3
    mql: |
      microsoft.policies.identitySecurityDefaultsEnforcementPolicy.isEnabled == false
    docs:
      desc: |
        This check ensures that Microsoft Entra ID Security Defaults are disabled, allowing the organization to enforce access controls through custom Conditional Access policies instead. Security Defaults are enabled by default in new tenants and provide a baseline level of protection, but they prevent organizations from configuring the more granular, risk-based, and role-scoped policies required by mature security programs.

        **Why this matters**

        - **Policy granularity:** Security Defaults apply a single fixed set of controls across the entire tenant and cannot be scoped by user, group, application, or risk level, making them unsuitable for organizations with differentiated access requirements.
        - **Legacy authentication blocking:** Security Defaults block some legacy protocols, but a custom Conditional Access policy provides explicit, auditable enforcement with per-client-app-type granularity that satisfies compliance evidence requirements.
        - **Risk-based access control:** Custom Conditional Access policies can integrate Entra ID Protection sign-in risk and user risk signals, which Security Defaults do not support.
        - **Break-glass account support:** Custom policies allow explicit exclusions for emergency access accounts, whereas Security Defaults offer no such override mechanism.

        **Risk mitigation**

        - **Configuration drift:** Replacing Security Defaults with explicit Conditional Access policies makes the organization's authentication requirements visible, versioned, and auditable rather than relying on an opaque Microsoft-managed baseline.
        - **Compliance gap:** Several frameworks require evidence of specific, documented authentication controls; a named Conditional Access policy provides that evidence in a way that a vendor-managed default cannot.
      audit: |
        ### Audit via Console

        1. Sign in to the Microsoft Entra admin center at `https://entra.microsoft.com`.
        2. Go to **Identity** > **Overview** > **Properties**.
        3. Select **Manage security defaults** and review the **Security defaults** setting.

        A passing tenant has security defaults set to **Disabled**, with Conditional Access policies providing equivalent or stronger controls. A failing tenant has security defaults **Enabled**.

        ### Audit via PowerShell

        1. Connect to Microsoft Graph and read the security defaults policy:

        ```powershell
        Connect-MgGraph -Scopes "Policy.Read.All"
        Get-MgPolicyIdentitySecurityDefaultEnforcementPolicy | Select-Object IsEnabled
        ```

        A passing tenant returns `IsEnabled : False`. A failing tenant returns `IsEnabled : True`.
      remediation:
        - id: console
          desc: |
            **To disable security defaults:**

            1. Navigate to the `Microsoft Entra admin center` https://entra.microsoft.com.
            2. Select to expand `Identity` select `Overview`
            3. Select `Properties`.
            4. Select `Manage security defaults`.
            5. Set the `Security defaults` dropdown to `Disabled`.
            6. Select Save.

            **WARNING:** It is recommended not to disable security defaults until you are ready to implement conditional access rules in the benchmark. Rules such as requiring MFA for all users and blocking legacy protocols are required in CA in order to make up the gap by disabling defaults. Plan accordingly. See the reference section for more details on what coverage Security Defaults provide.
        - id: powershell
          desc: |
            **Using Microsoft Graph PowerShell**

            1. Connect to the Microsoft Graph service:

            ```powershell
            Connect-MgGraph -Scopes "Policy.ReadWrite.ConditionalAccess"
            ```

            2. Disable security defaults:

            ```powershell
            $params = @{ IsEnabled = $false }
            Update-MgPolicyIdentitySecurityDefaultEnforcementPolicy -BodyParameter $params
            ```

            **WARNING:** Ensure you have Conditional Access policies in place before disabling security defaults.
        # No Terraform remediation: the security defaults toggle has no azuread Terraform resource and can only be changed through the Graph API or portal.
    refs:
      - url: https://learn.microsoft.com/en-us/entra/identity/conditional-access/overview
        title: Microsoft Entra Conditional Access
      - url: https://learn.microsoft.com/en-us/entra/fundamentals/security-defaults
        title: Microsoft Entra Security Defaults
  # No Terraform variants: this check counts live Global Administrator assignments, which Terraform source cannot enumerate because portal-created assignments are invisible to it.
  - uid: mondoo-m365-security-ensure-that-between-two-and-four-global-admins-are-designated
    title: Ensure that between two and four global admins are designated
    impact: 80
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-2
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-5
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-3-1
      compliance/vda-isa-5: vda-isa-5-4-2-1
    mql: |
      microsoft.roles.where(displayName == "Global Administrator").all(assignments.length.inRange(1,4))
    docs:
      desc: |
        This check ensures that the Global Administrator role is assigned to between two and four accounts. By default Microsoft 365 imposes no upper or lower bound on Global Administrator assignments, so tenants frequently end up either with a single point of failure or with an excessively large group of unrestricted privileged accounts.

        **Why this matters**

        - **Redundancy:** At least two Global Administrators ensure that critical administrative tasks can continue if one account is unavailable, locked, or compromised.
        - **Blast-radius control:** Capping assignments at four limits how many accounts can perform tenant-wide destructive actions, reducing the damage a compromised credential can cause.
        - **Auditability:** A small, bounded set of privileged accounts is easier to monitor, review, and audit than an unbounded list.
        - **Separation from operational accounts:** Keeping the count low encourages administrators to use role-specific, least-privilege roles for everyday tasks instead of relying on Global Administrator for convenience.

        **Risk mitigation**

        - **Credential compromise:** Fewer Global Administrator accounts reduce the number of high-value targets an attacker can pursue through phishing or credential stuffing.
        - **Insider threat:** Limiting the role to a small named set of individuals makes unauthorized privilege escalation more visible during periodic access reviews.
        - **Availability:** Requiring at least two assignments prevents a single account lockout or departure from blocking emergency administrative access to the tenant.
      audit: |
        ### Audit via Console

        1. Sign in to the Microsoft Entra admin center at `https://entra.microsoft.com`.
        2. Go to **Identity** > **Roles & admins** > **Roles**.
        3. Select the **Global Administrator** role and review its **Assignments**.

        A passing tenant has between two and four accounts assigned the Global Administrator role. A failing tenant has fewer than two or more than four.

        ### Audit via PowerShell

        1. Connect to Microsoft Graph and list the Global Administrator role members:

        ```powershell
        Connect-MgGraph -Scopes "RoleManagement.Read.Directory"
        $role = Get-MgDirectoryRole -Filter "displayName eq 'Global Administrator'"
        Get-MgDirectoryRoleMember -DirectoryRoleId $role.Id
        ```

        A passing tenant returns between two and four members. A failing tenant returns fewer than two or more than four.
      remediation:
        - id: console
          desc: |
            **To correct the number of global tenant administrators:**

            1. Navigate to the `Microsoft 365 admin center` https://admin.microsoft.com
            2. Select `Users` > `Active Users`.
            3. In the `Search` field enter the name of the user to be made a Global Administrator.
            4. To create a new Global Admin:
              1. Select the user's name.
              2. A window will appear to the right.
              3. Select `Manage roles`.
              4. Select `Admin center access`.
              5. Check `Global Administrator`.
              6. Select `Save changes`.
            5. To remove Global Admins:
              1. Select User.
              2. Under `Roles` select `Manage roles`
              3. De-Select the appropriate role.
              4. Select `Save changes`.
        - id: powershell
          desc: |
            **Using Microsoft Graph PowerShell**

            1. Connect to Microsoft Graph with the required scopes:

            ```powershell
            Connect-MgGraph -Scopes "RoleManagement.ReadWrite.Directory", "User.Read.All"
            ```

            2. Get the Global Administrator role:

            ```powershell
            $globalAdminRole = Get-MgDirectoryRole -Filter "displayName eq 'Global Administrator'"
            ```

            3. List current Global Administrators:

            ```powershell
            Get-MgDirectoryRoleMember -DirectoryRoleId $globalAdminRole.Id | ForEach-Object {
                Get-MgUser -UserId $_.Id | Select-Object DisplayName, UserPrincipalName
            }
            ```

            4. To add a user as Global Administrator:

            ```powershell
            $user = Get-MgUser -Filter "userPrincipalName eq 'user@domain.com'"
            $params = @{
                "@odata.id" = "https://graph.microsoft.com/v1.0/directoryObjects/$($user.Id)"
            }
            New-MgDirectoryRoleMemberByRef -DirectoryRoleId $globalAdminRole.Id -BodyParameter $params
            ```

            5. To remove a user from Global Administrator:

            ```powershell
            $user = Get-MgUser -Filter "userPrincipalName eq 'user@domain.com'"
            Remove-MgDirectoryRoleMemberByRef -DirectoryRoleId $globalAdminRole.Id -DirectoryObjectId $user.Id
            ```
        - id: terraform
          desc: |
            **Using Terraform (azuread provider)**

            Declare each Global Administrator assignment explicitly so the count is reviewable in source control:

            ```hcl
            locals {
              global_admin_template_id = "62e90394-69f5-4237-9190-012177145e10"
            }

            resource "azuread_directory_role_assignment" "global_admins" {
              for_each = toset([
                azuread_user.admin_one.object_id,
                azuread_user.admin_two.object_id,
              ])
              role_id             = local.global_admin_template_id
              principal_object_id = each.value
            }
            ```

            For more details, see [azuread_directory_role_assignment](https://registry.terraform.io/providers/hashicorp/azuread/latest/docs/resources/directory_role_assignment) in the Terraform Registry.
    refs:
      - url: https://learn.microsoft.com/en-us/entra/identity/role-based-access-control/permissions-reference
        title: Microsoft Entra Built-in Roles
  # No Terraform variants: Intune device configuration profiles have no resource in the azuread Terraform provider.
  - uid: mondoo-m365-security-ensure-that-mobile-device-encryption-is-enabled-to-prevent-unauthorized-access-to-mobile-data
    title: Ensure that Android mobile device encryption is enabled
    impact: 80
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-uem-08
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-3-1-4
    mql: |
      microsoft.devicemanagement.deviceConfigurations.where( properties['@odata.type'] == "#microsoft.graph.androidGeneralDeviceConfiguration").all(properties.storageRequireDeviceEncryption == true)
    docs:
      desc: |
        This check ensures that Android device configuration profiles in Microsoft Intune are configured to require storage encryption. By default Intune does not enforce device encryption in newly created Android profiles, so organizations must explicitly set `storageRequireDeviceEncryption` to require it.

        **Why this matters**

        - **Data protection at rest:** Encryption renders the data stored on a device unreadable without the correct decryption key, protecting it if the device is lost or stolen.
        - **Breach containment:** An encrypted device limits an attacker's ability to extract sensitive corporate data even after gaining physical access.
        - **Compliance readiness:** Many regulatory frameworks require encryption of data on mobile endpoints, and an explicit Intune policy provides auditable evidence of enforcement.

        **Risk mitigation**

        - **Lost or stolen devices:** Without encryption a lost Android device exposes all locally cached email, files, and credentials to anyone who finds it.
        - **Unauthorized physical access:** Encryption prevents data extraction through direct device access methods such as connecting to a computer or removing storage media.
      audit: |
        ### Audit via Console

        1. Sign in to the Microsoft Intune admin center at `https://intune.microsoft.com`.
        2. Go to **Devices** > **Configuration**.
        3. Open each device configuration profile and confirm that storage encryption is required.

        A passing tenant has every applicable device configuration profile requiring device storage encryption. A failing tenant has a profile that does not require encryption.

        ### Audit via PowerShell

        1. Connect to Microsoft Graph and list device configuration profiles:

        ```powershell
        Connect-MgGraph -Scopes "DeviceManagementConfiguration.Read.All"
        Get-MgDeviceManagementDeviceConfiguration
        ```

        A passing tenant returns profiles that require storage encryption. A failing tenant returns a profile with encryption not required.
      remediation:
        - id: console
          desc: |
            **Using Microsoft 365 Console**

            To update via the Microsoft 365 portal:
            1. Log in to the Microsoft 365 portal at https://admin.microsoft.com
            2. Endpoint Manager --> Devices --> Policy --> Configuration profiles
            3. Ensure that a profile exists for Android with following conditions:
               * Password section --> Device restrictions --> Encryption is set to require
        - id: powershell
          desc: |
            **Using Microsoft Graph PowerShell**

            1. Connect to Microsoft Graph with Intune scopes:

            ```powershell
            Connect-MgGraph -Scopes "DeviceManagementConfiguration.ReadWrite.All"
            ```

            2. Create or update an Android device configuration policy requiring encryption:

            ```powershell
            $params = @{
                "@odata.type" = "#microsoft.graph.androidGeneralDeviceConfiguration"
                displayName = "Android Security Policy - Require Encryption"
                description = "Requires device encryption on Android devices"
                storageRequireDeviceEncryption = $true
            }

            # Create new policy
            New-MgDeviceManagementDeviceConfiguration -BodyParameter $params

            # Or update existing policy
            # Update-MgDeviceManagementDeviceConfiguration -DeviceConfigurationId <policy-id> -BodyParameter $params
            ```

            3. Assign the policy to a group:

            ```powershell
            $assignment = @{
                target = @{
                    "@odata.type" = "#microsoft.graph.allDevicesAssignmentTarget"
                }
            }
            New-MgDeviceManagementDeviceConfigurationAssignment -DeviceConfigurationId <policy-id> -BodyParameter $assignment
            ```
        # No Terraform remediation: Intune device configuration has no resource in the azuread Terraform provider.
    refs:
      - url: https://learn.microsoft.com/en-us/mem/intune/configuration/device-restrictions-android
        title: Android Device Restriction Settings in Microsoft Intune
  # No Terraform variants: Intune device configuration profiles have no resource in the azuread Terraform provider.
  - uid: mondoo-m365-security-ensure-that-mobile-devices-require-a-minimum-password-length-to-prevent-brute-force-attacks
    title: Ensure minimum password length is set to prevent brute force
    impact: 80
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-5-17
      compliance/nis-2: false
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-5
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-7
      compliance/pci-dss-4: pcidss-requirement-8-3-6
      compliance/soc2-2017: soc2-control-cc6-1-8
      compliance/vda-isa-5: vda-isa-5-4-1-3
    mql: |
      microsoft.devicemanagement.deviceConfigurations.where( properties["@odata.type"] == "#microsoft.graph.windows10GeneralConfiguration").all(properties.passwordMinimumLength >= 8)
      microsoft.devicemanagement.deviceConfigurations.where( properties["@odata.type"] == "#microsoft.graph.macOSGeneralDeviceConfiguration").all(properties.passwordMinimumLength >= 8)
      microsoft.devicemanagement.deviceConfigurations.where( properties["@odata.type"] == "#microsoft.graph.iosGeneralDeviceConfiguration").all(properties.passcodeMinimumLength >= 8)
      microsoft.devicemanagement.deviceConfigurations.where( properties["@odata.type"] == "#microsoft.graph.androidGeneralDeviceConfiguration").all(properties.passwordMinimumLength >= 8)
      microsoft.devicemanagement.deviceConfigurations.where( properties["@odata.type"] == "#microsoft.graph.androidWorkProfileGeneralDeviceConfiguration").all(properties['passwordMinimumLength'] >= 8)
    docs:
      desc: |
        This check ensures that Microsoft Intune device configuration profiles are configured to require a minimum password or passcode length of at least eight characters across all managed device platforms. By default Intune does not enforce a minimum length in newly created profiles, leaving it up to the device default or the user's choice.

        **Why this matters**

        - **Brute-force resistance:** Longer passwords expand the search space an attacker must exhaust, making automated guessing attacks substantially more expensive.
        - **Alignment with security standards:** NIST SP 800-63B recommends a minimum of eight characters for memorized secrets, and enforcing this through MDM policy provides consistent coverage across Windows, macOS, iOS, and Android devices.
        - **Consistent enforcement:** Centrally managed password-length requirements through Intune remove reliance on users to choose adequately long passwords on their own.

        **Risk mitigation**

        - **Unauthorized device access:** A minimum eight-character password significantly reduces the likelihood of a successful brute-force or opportunistic login on a lost or unattended device.
        - **Credential reuse:** Requiring a meaningful minimum length discourages the use of trivially guessable PINs or short passwords that users might reuse across personal and corporate accounts.
      audit: |
        ### Audit via Console

        1. Sign in to the Microsoft Intune admin center at `https://intune.microsoft.com`.
        2. Go to **Devices** > **Configuration**.
        3. Open each device configuration profile and confirm the minimum password or passcode length is set to at least 8 characters.

        A passing tenant has every applicable device configuration profile enforcing a minimum password length of 8 or more. A failing tenant has a profile with a shorter or unset minimum length.

        ### Audit via PowerShell

        1. Connect to Microsoft Graph and list device configuration profiles:

        ```powershell
        Connect-MgGraph -Scopes "DeviceManagementConfiguration.Read.All"
        Get-MgDeviceManagementDeviceConfiguration
        ```

        A passing tenant returns profiles enforcing a minimum password length of 8 or more. A failing tenant returns a profile with a shorter or unset value.
      remediation:
        - id: console
          desc: |
            **Using Microsoft 365 Console**

            To update via the Microsoft 365 portal:

            1. Log in as to the Microsoft 365 portal at https://admin.microsoft.com
            2. Endpoint Manager --> Devices --> Policy --> Configuration profiles
            3. Ensure that a profile exists for each Platform with following conditions:
               * Password section --> Device restrictions --> Minimum password length is set to 8
        - id: powershell
          desc: |
            **Using Microsoft Graph PowerShell**

            1. Connect to Microsoft Graph with Intune scopes:

            ```powershell
            Connect-MgGraph -Scopes "DeviceManagementConfiguration.ReadWrite.All"
            ```

            2. Create device configuration policies for each platform:

            **For Windows 10:**
            ```powershell
            $windowsParams = @{
                "@odata.type" = "#microsoft.graph.windows10GeneralConfiguration"
                displayName = "Windows 10 Password Policy"
                passwordMinimumLength = 8
            }
            New-MgDeviceManagementDeviceConfiguration -BodyParameter $windowsParams
            ```

            **For macOS:**
            ```powershell
            $macosParams = @{
                "@odata.type" = "#microsoft.graph.macOSGeneralDeviceConfiguration"
                displayName = "macOS Password Policy"
                passwordMinimumLength = 8
            }
            New-MgDeviceManagementDeviceConfiguration -BodyParameter $macosParams
            ```

            **For iOS:**
            ```powershell
            $iosParams = @{
                "@odata.type" = "#microsoft.graph.iosGeneralDeviceConfiguration"
                displayName = "iOS Password Policy"
                passcodeMinimumLength = 8
            }
            New-MgDeviceManagementDeviceConfiguration -BodyParameter $iosParams
            ```

            **For Android:**
            ```powershell
            $androidParams = @{
                "@odata.type" = "#microsoft.graph.androidGeneralDeviceConfiguration"
                displayName = "Android Password Policy"
                passwordMinimumLength = 8
            }
            New-MgDeviceManagementDeviceConfiguration -BodyParameter $androidParams
            ```

            3. Assign policies to appropriate device groups.
        # No Terraform remediation: Intune device configuration has no resource in the azuread Terraform provider.
    refs:
      - url: https://learn.microsoft.com/en-us/entra/identity/authentication/concept-password-ban-bad
        title: Microsoft Entra Password Protection
      - url: https://learn.microsoft.com/en-us/mem/intune/configuration/device-restrictions-configure
        title: Configure Device Restriction Settings in Microsoft Intune
  # No Terraform variants: per-domain password validity has no azuread Terraform resource and is set only through the Graph API.
  - uid: mondoo-m365-security-ensure-that-ms-365-passwords-are-not-set-to-expire
    title: Ensure password expiration policy is set to never expire
    impact: 60
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-5-17
      compliance/nis-2: false
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-5
      compliance/nist-sp-800-171: false
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc6-1-8
      compliance/vda-isa-5: vda-isa-5-4-1-3
    mql: |
      microsoft.domains.all(passwordValidityPeriodInDays == 2147483647)
    docs:
      desc: |
        This check ensures that all Microsoft 365 domains are configured so that user passwords never expire, reflected by a `passwordValidityPeriodInDays` value of `2147483647`. By default Microsoft 365 sets passwords to expire after 90 days, a practice that modern security research has shown to weaken rather than strengthen credential hygiene.

        **Why this matters**

        - **Eliminates predictable rotation patterns:** Users forced to change passwords on a fixed schedule frequently make minor, predictable modifications to their existing passwords, which attackers exploit using password-spraying techniques that account for common incremental changes.
        - **Encourages strong initial choices:** When users know a password is permanent, they are more motivated to choose a long, unique, randomly generated credential and store it in a password manager rather than selecting something easily memorable and therefore guessable.
        - **Aligns with current NIST guidance:** NIST SP 800-63B explicitly recommends against periodic password rotation except after a confirmed compromise, and Microsoft's own security baselines reflect this shift.
        - **Complements MFA:** Organizations that enforce multi-factor authentication gain a second layer of protection that makes the age of a password largely irrelevant to its security, making forced rotation an unnecessary burden.

        **Risk mitigation**

        - **Phishing and credential stuffing:** Removing rotation pressure leads users to adopt longer, unique passwords that are far harder to guess or reuse across breached credential databases.
        - **Help-desk and user friction:** Eliminating expiration-driven password resets reduces support load and the social-engineering opportunities that arise when users are trained to expect reset prompts.
      audit: |
        ### Audit via Console

        1. Sign in to the Microsoft 365 admin center at `https://admin.microsoft.com`.
        2. Go to **Settings** > **Org settings** > **Security & privacy**.
        3. Select **Password expiration policy** and review the setting.

        A passing tenant has **Set passwords to never expire** selected. A failing tenant has a finite password expiration period configured.

        ### Audit via PowerShell

        1. Connect to Microsoft Graph and read the password validity period for every domain:

        ```powershell
        Connect-MgGraph -Scopes "Domain.Read.All"
        Get-MgDomain | Select-Object Id, PasswordValidityPeriodInDays
        ```

        A passing tenant returns `PasswordValidityPeriodInDays : 2147483647` for every domain. A failing tenant returns a smaller value.
      remediation:
        - id: console
          desc: |
            **To set Microsoft 365 passwords to never expire:**

            1. Navigate to the `Microsoft 365 admin center` at https://admin.microsoft.com.
            2. Go to `Settings` > `Org settings`.
            3. Under the `Security & privacy` tab, locate and select `Password expiration policy`.
            4. Check the box for `Set passwords to never expire (recommended)`.
            5. Select `Save changes`.
        - id: powershell
          desc: |
            **Using Microsoft Graph PowerShell**

            1. Connect to the Microsoft Graph service:

            ```powershell
            Connect-MgGraph -Scopes "Domain.ReadWrite.All"
            ```

            2. Set passwords to never expire for each domain:

            ```powershell
            # Get all domains
            $domains = Get-MgDomain

            # Set password policy for each domain
            foreach ($domain in $domains) {
                Update-MgDomain -DomainId $domain.Id `
                    -PasswordValidityPeriodInDays 2147483647 `
                    -PasswordNotificationWindowInDays 30
            }
            ```

            Or for a specific domain:

            ```powershell
            Update-MgDomain -DomainId "contoso.com" `
                -PasswordValidityPeriodInDays 2147483647 `
                -PasswordNotificationWindowInDays 30
            ```
        # No Terraform remediation: per-domain password validity has no azuread Terraform resource and is set only through the Graph API.
    refs:
      - url: https://learn.microsoft.com/en-us/entra/identity/authentication/concept-password-ban-bad
        title: Microsoft Entra Password Protection
