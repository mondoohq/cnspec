policies:
  - uid: mondoo-m365-security
    name: Mondoo Microsoft 365 Security
    version: 2.3.0
    license: BUSL-1.1
    tags:
      mondoo.com/category: security
      mondoo.com/platform: microsoft365,saas
    require:
      - provider: ms365
      - provider: terraform
    authors:
      - name: Mondoo, Inc.
        email: hello@mondoo.com
    summary: Secure Microsoft 365 identity, email, and data sharing
    docs:
      desc: |
        The Mondoo Microsoft 365 Security policy identifies critical misconfigurations in Microsoft 365 tenants that could expose your organization to account takeover, data breaches, and unauthorized access across email, documents, and collaboration services. As the productivity hub for many organizations, M365 misconfigurations give attackers a path to corporate data, customer information, and identity-based access to dozens of downstream Microsoft and third-party services.

        This policy provides security checks across key Microsoft 365 areas:

        - Multi-factor authentication enforcement
        - Conditional Access policies
        - Password and authentication policies
        - Identity Protection and risk-based controls
        - Administrative access and role management
        - Exchange Online and Defender for Office 365 settings
        - SharePoint and OneDrive sharing policies
        - Microsoft Teams security and external access

        Learn more about scanning Microsoft 365 in the [cnspec Microsoft 365 documentation](https://mondoo.com/docs/cnspec/saas/m365).

        Have suggestions for new checks in this policy? Visit our [cnspec repository](https://github.com/mondoohq/cnspec).
    groups:
      - title: Identity & Access Protection
        filters: |
          asset.platform == "microsoft365"
        checks:
          - uid: mondoo-m365-security-enable-azure-ad-identity-protection-sign-in-risk-policies
          - uid: mondoo-m365-security-enable-azure-ad-identity-protection-user-risk-policies
      - title: Authentication & Access Control
        filters: |
          asset.platform == "microsoft365"
        checks:
          - uid: mondoo-m365-security-enable-conditional-access-policies-to-block-legacy-authentication
          - uid: mondoo-m365-security-ensure-multifactor-authentication-is-enabled-for-all-users-in-administrative-roles
          - uid: mondoo-m365-security-ensure-multifactor-authentication-is-enabled-for-all-users-in-all-roles
          - uid: mondoo-m365-security-ensure-security-defaults-is-disabled-on-azure-active-directory
          - uid: mondoo-m365-security-ensure-that-between-two-and-four-global-admins-are-designated
      - title: Password Policies
        filters: |
          asset.platform == "microsoft365"
        checks:
          - uid: mondoo-m365-security-ensure-that-ms-365-passwords-are-not-set-to-expire
      - title: Mobile Device Security
        filters: |
          asset.platform == "microsoft365"
        checks:
          - uid: mondoo-m365-security-ensure-that-mobile-device-encryption-is-enabled-to-prevent-unauthorized-access-to-mobile-data
          - uid: mondoo-m365-security-ensure-that-mobile-devices-require-a-minimum-password-length-to-prevent-brute-force-attacks
      - title: Email Security
        filters: |
          asset.platform == "microsoft365"
        checks:
          - uid: mondoo-m365-security-ensure-that-spf-records-are-published-for-all-exchange-domains
          - uid: mondoo-m365-security-ensure-dkim-signing-enabled-for-all-exchange-domains
          - uid: mondoo-m365-security-ensure-safe-links-policies-configured
          - uid: mondoo-m365-security-ensure-safe-attachments-policies-configured
          - uid: mondoo-m365-security-ensure-anti-phishing-policies-enabled
          - uid: mondoo-m365-security-ensure-transport-rules-enforce-tls
      - title: Application Security
        filters: |
          asset.platform == "microsoft365"
        checks:
          - uid: mondoo-m365-security-ensure-third-party-integrated-applications-are-not-allowed
      - title: SharePoint Security
        filters: |
          asset.platform == "microsoft365"
        checks:
          - uid: mondoo-m365-security-ensure-sharepoint-external-sharing-restricted
    scoring_system: highest impact
queries:
  - uid: mondoo-m365-security-enable-azure-ad-identity-protection-sign-in-risk-policies
    title: Enable Azure AD Identity Protection sign-in risk policies
    impact: 80
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-03
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-16
      compliance/nis-2: false
      compliance/nist-csf-1: nist-csf-1-de-cm-3
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-10
      compliance/nist-sp-800-171: false
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-4-1-2
    variants:
      - uid: mondoo-m365-security-enable-azure-ad-identity-protection-sign-in-risk-policies-microsoft365
        tags:
          mondoo.com/filter-title: Microsoft 365
          mondoo.com/filter-icon: microsoft
      - uid: mondoo-m365-security-enable-azure-ad-identity-protection-sign-in-risk-policies-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-m365-security-enable-azure-ad-identity-protection-sign-in-risk-policies-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-m365-security-enable-azure-ad-identity-protection-sign-in-risk-policies-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Microsoft Entra ID Protection is configured to detect and respond to risky sign-in events in real time and offline. By default, no sign-in risk Conditional Access policy is created, leaving the tenant dependent on after-the-fact log review to spot suspicious authentication activity.

        **Why this matters**

        - **Real-time threat response:** Sign-in risk policies trigger MFA or block access the moment a suspicious pattern is detected, stopping attackers before they establish a session.
        - **Coverage of novel attack vectors:** Risk signals include anonymous IP addresses, atypical travel, malware-linked IPs, and unfamiliar sign-in properties, providing protection beyond simple password checks.
        - **Reduced dwell time:** Automated policy enforcement closes the window between credential compromise and unauthorized access far faster than manual investigation.
        - **Defense in depth:** Layering risk-based access controls on top of MFA means that even a successfully phished second factor is not enough to complete a high-risk sign-in.

        **Risk mitigation**

        - **Account takeover:** Requiring MFA or blocking access on medium and high sign-in risk stops stolen credentials from granting immediate entry.
        - **Lateral movement:** Blocking suspicious sign-ins prevents attackers from pivoting across services and escalating privileges once inside the tenant.
        - **Data exfiltration:** Cutting off a session at the sign-in stage limits the attacker's ability to reach sensitive data, even when credentials are already compromised.
      audit: |
        ### Audit via Console

        1. Sign in to the Microsoft Entra admin center at `https://entra.microsoft.com`.
        2. Go to **Protection** > **Conditional Access** > **Policies**.
        3. Look for a policy that, under **Conditions**, sets **Sign-in risk** to one or more levels and, under **Grant**, requires multifactor authentication.

        A passing tenant has at least one enabled policy that targets sign-in risk and requires MFA. A failing tenant has no such policy, or the policy is in **Report-only** or **Off** state.

        ### Audit via PowerShell

        1. Connect to Microsoft Graph and list Conditional Access policies:

        ```powershell
        Connect-MgGraph -Scopes "Policy.Read.All"
        Get-MgIdentityConditionalAccessPolicy |
          Where-Object { $_.State -eq "enabled" -and $_.Conditions.SignInRiskLevels }
        ```

        A passing tenant returns at least one policy. A failing tenant returns nothing.
      remediation:
        - id: console
          desc: |
            **To configure a Sign-In risk policy, use the following steps:**

            1. Navigate to the `Microsoft Entra admin center` https://entra.microsoft.com.
            2. Select expand `Protection` > `Conditional Access` select `Policies`.
            3. Create a new policy by selecting `New policy`.
            4. Set the following conditions within the policy.
              - Under `Users or workload identities` choose `All users`
              - Under `Cloud apps or actions` choose `All cloud apps`
              - Under `Conditions` choose `Sign-in risk` then `Yes` and check the risk level boxes `High` and `Medium`
              - Under `Access Controls` select `Grant` then in the right pane select `Grant access` then select `Require multifactor authentication`.
              - Under `Session` select `Sign-in Frequency` and set to `Every time`.
            5. Select `Select`
            6. You may opt to begin in a state of `Report Only` as you step through implementation however, the policy will need to be set to `On` to be in effect.
            7. Select `Create`.

            **NOTE:** for more information regarding risk levels refer to [Microsoft's Identity Protection & Risk Doc](https://docs.microsoft.com/en-us/azure/active-directory/identity-protection/concept-identity-protection-risks)
        - id: powershell
          desc: |
            **Using Microsoft Graph PowerShell**

            1. Connect to Microsoft Graph with the required scopes:

            ```powershell
            Connect-MgGraph -Scopes "Policy.ReadWrite.ConditionalAccess", "Policy.Read.All", "Application.Read.All"
            ```

            2. Create a new Conditional Access policy for sign-in risk:

            ```powershell
            $params = @{
                displayName = "Sign-in risk policy - Require MFA for medium and high risk"
                state = "enabled"
                conditions = @{
                    users = @{
                        includeUsers = @("All")
                    }
                    applications = @{
                        includeApplications = @("All")
                    }
                    signInRiskLevels = @("high", "medium")
                }
                grantControls = @{
                    operator = "OR"
                    builtInControls = @("mfa")
                }
                sessionControls = @{
                    signInFrequency = @{
                        value = 1
                        type = "hours"
                        isEnabled = $true
                        authenticationType = "primaryAndSecondaryAuthentication"
                        frequencyInterval = "everyTime"
                    }
                }
            }
            New-MgIdentityConditionalAccessPolicy -BodyParameter $params
            ```
        - id: terraform
          desc: |
            **Using Terraform (azuread provider)**

            ```hcl
            resource "azuread_conditional_access_policy" "sign_in_risk_policy" {
              display_name = "Sign-in risk policy - Require MFA for medium and high risk"
              state        = "enabled"

              conditions {
                users {
                  included_users = ["All"]
                }
                applications {
                  included_applications = ["All"]
                }
                sign_in_risk_levels = ["high", "medium"]
              }

              grant_controls {
                operator          = "OR"
                built_in_controls = ["mfa"]
              }

              session_controls {
                sign_in_frequency        = 0
                sign_in_frequency_period = "hours"
              }
            }
            ```

            For more details, see [azuread_conditional_access_policy](https://registry.terraform.io/providers/hashicorp/azuread/latest/docs/resources/conditional_access_policy) in the Terraform Registry.
    refs:
      - url: https://learn.microsoft.com/en-us/entra/identity/conditional-access/overview
        title: Microsoft Entra Conditional Access
      - url: https://learn.microsoft.com/en-us/entra/id-protection/overview-identity-protection
        title: Microsoft Entra ID Protection Overview
  - uid: mondoo-m365-security-enable-azure-ad-identity-protection-sign-in-risk-policies-microsoft365
    filters: |
      asset.platform == "microsoft365"
    mql: |
      microsoft.security.latestSecureScores.controlScores.where(controlName == 'SigninRiskPolicy').all(_['score'] == 7)
  - uid: mondoo-m365-security-enable-azure-ad-identity-protection-sign-in-risk-policies-terraform-hcl
    filters: |
      asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == 'azuread_conditional_access_policy')
    mql: |
      terraform.resources('azuread_conditional_access_policy').any(
        arguments['state'] == 'enabled' &&
        blocks.where(type == 'conditions').any(arguments['sign_in_risk_levels'] != empty) &&
        blocks.where(type == 'grant_controls').any(arguments['built_in_controls'].contains('mfa'))
      )
  - uid: mondoo-m365-security-enable-azure-ad-identity-protection-sign-in-risk-policies-terraform-plan
    filters: |
      asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == 'azuread_conditional_access_policy')
    mql: |
      terraform.plan.resourceChanges.where(type == 'azuread_conditional_access_policy').any(
        change.after['state'] == 'enabled' &&
        change.after['conditions'].any(_['sign_in_risk_levels'] != empty) &&
        change.after['grant_controls'].any(_['built_in_controls'].contains('mfa'))
      )
  - uid: mondoo-m365-security-enable-azure-ad-identity-protection-sign-in-risk-policies-terraform-state
    filters: |
      asset.platform == "terraform-state" && terraform.state.resources.contains(type == 'azuread_conditional_access_policy')
    mql: |
      terraform.state.resources.where(type == 'azuread_conditional_access_policy').any(
        values['state'] == 'enabled' &&
        values['conditions'].any(_['sign_in_risk_levels'] != empty) &&
        values['grant_controls'].any(_['built_in_controls'].contains('mfa'))
      )
  - uid: mondoo-m365-security-enable-azure-ad-identity-protection-user-risk-policies
    title: Enable Azure AD Identity Protection user risk policies
    impact: 100
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-03
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
