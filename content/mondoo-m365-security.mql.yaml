      compliance/nist-csf-1: nist-csf-1-de-cm-3
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-10
      compliance/nist-sp-800-171: false
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-4-1-2
    variants:
      - uid: mondoo-m365-security-enable-azure-ad-identity-protection-user-risk-policies-microsoft365
        tags:
          mondoo.com/filter-title: Microsoft 365
          mondoo.com/filter-icon: microsoft
      - uid: mondoo-m365-security-enable-azure-ad-identity-protection-user-risk-policies-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-m365-security-enable-azure-ad-identity-protection-user-risk-policies-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-m365-security-enable-azure-ad-identity-protection-user-risk-policies-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Microsoft Entra ID Protection is configured with a Conditional Access policy that acts automatically when user risk reaches a high level. By default, no user-risk policy is created, so accounts flagged as likely compromised continue to operate without interruption unless an administrator manually investigates the alert.

        **Why this matters**

        - **Automated remediation:** A user-risk policy forces a password change or blocks access the moment Entra ID Protection classifies an account as high risk, reducing attacker dwell time.
        - **Coverage of credential leak signals:** User risk aggregates intelligence from leaked credential databases, anomalous behavior patterns, and dark-web feeds, detecting compromise that password-based controls alone would miss.
        - **Privileged account protection:** Compromised accounts with elevated permissions can cause outsized damage; automatic risk-based blocking limits the blast radius before manual review completes.
        - **Reduced incident response burden:** Automated policy enforcement reduces the volume of manual remediation tasks that security teams must handle after a credential compromise event.

        **Risk mitigation**

        - **Credential compromise:** Requiring a password change on high user risk invalidates stolen credentials and forces re-authentication with a fresh secret before the attacker can act.
        - **Lateral movement:** Blocking high-risk accounts prevents attackers from pivoting to other services and escalating privileges within the tenant.
        - **Data exfiltration:** Cutting access at the identity layer stops an attacker from reaching sensitive data even when they already hold valid credentials.
      audit: |
        ### Audit via Console

        1. Sign in to the Microsoft Entra admin center at `https://entra.microsoft.com`.
        2. Go to **Protection** > **Conditional Access** > **Policies**.
        3. Look for a policy that, under **Conditions**, sets **User risk** to one or more levels and, under **Grant**, requires multifactor authentication.

        A passing tenant has at least one enabled policy that targets user risk and requires MFA. A failing tenant has no such policy, or the policy is in **Report-only** or **Off** state.

        ### Audit via PowerShell

        1. Connect to Microsoft Graph and list Conditional Access policies:

        ```powershell
        Connect-MgGraph -Scopes "Policy.Read.All"
        Get-MgIdentityConditionalAccessPolicy |
          Where-Object { $_.State -eq "enabled" -and $_.Conditions.UserRiskLevels }
        ```

        A passing tenant returns at least one policy. A failing tenant returns nothing.
      remediation:
        - id: console
          desc: |
            **To configure a User risk policy, use the following steps:**

            1. Navigate to the `Microsoft Entra admin center` https://entra.microsoft.com.
            2. Select expand `Protection` > `Conditional Access` select `Policies`.
            3. Create a new policy by selecting `New policy`.
            4. Set the following conditions within the policy:
              - Under `Users or workload identities` choose `All users`
              - Under `Cloud apps or actions` choose `All cloud apps`
              - Under `Conditions` choose `User risk` then `Yes` and select the user risk level `High`.
              - Under `Access Controls` select `Grant` then in the right pane select `Grant access` then select `Require multifactor authentication` and `Require password change`.
              - Under `Session` ensure `Sign-in frequency` is set to `Every time`.
            5. Select `Select`.
            6. You may opt to begin in a state of `Report Only` as you step through implementation however, the policy will need to be set to `On` to be in effect.
            7. Select `Create`.

            **NOTE:** for more information regarding risk levels refer to [Microsoft's Identity Protection & Risk Doc](https://docs.microsoft.com/en-us/azure/active-directory/identity-protection/concept-identity-protection-risks)
        - id: powershell
          desc: |
            **Using Microsoft Graph PowerShell**

            1. Connect to Microsoft Graph with the required scopes:

            ```powershell
            Connect-MgGraph -Scopes "Policy.ReadWrite.ConditionalAccess", "Policy.Read.All"
            ```

            2. Create a new Conditional Access policy for user risk:

            ```powershell
            $params = @{
                displayName = "User risk policy - Require MFA and password change for high risk users"
                state = "enabled"
                conditions = @{
                    users = @{
                        includeUsers = @("All")
                    }
                    applications = @{
                        includeApplications = @("All")
                    }
                    userRiskLevels = @("high")
                }
                grantControls = @{
                    operator = "AND"
                    builtInControls = @("mfa", "passwordChange")
                }
                sessionControls = @{
                    signInFrequency = @{
                        isEnabled = $true
                        frequencyInterval = "everyTime"
                    }
                }
            }
            New-MgIdentityConditionalAccessPolicy -BodyParameter $params
            ```
        - id: terraform
          desc: |
            **Using Terraform (azuread provider)**

            ```hcl
            resource "azuread_conditional_access_policy" "user_risk_policy" {
              display_name = "User risk policy - Require MFA and password change for high risk"
              state        = "enabled"

              conditions {
                users {
                  included_users = ["All"]
                }
                applications {
                  included_applications = ["All"]
                }
                user_risk_levels = ["high"]
              }

              grant_controls {
                operator          = "AND"
                built_in_controls = ["mfa", "passwordChange"]
              }

              session_controls {
                sign_in_frequency        = 0
                sign_in_frequency_period = "hours"
              }
            }
            ```

            For more details, see [azuread_conditional_access_policy](https://registry.terraform.io/providers/hashicorp/azuread/latest/docs/resources/conditional_access_policy) in the Terraform Registry.
