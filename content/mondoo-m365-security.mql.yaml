  - uid: mondoo-m365-security-ensure-multifactor-authentication-is-enabled-for-all-users-in-administrative-roles
    title: Ensure MFA is enabled for all users in administrative roles
    impact: 100
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-14
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-j
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-3
      compliance/pci-dss-4: pcidss-requirement-8-4-1
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-2
    variants:
      - uid: mondoo-m365-security-ensure-multifactor-authentication-is-enabled-for-all-users-in-administrative-roles-microsoft365
        tags:
          mondoo.com/filter-title: Microsoft 365
          mondoo.com/filter-icon: microsoft
      - uid: mondoo-m365-security-ensure-multifactor-authentication-is-enabled-for-all-users-in-administrative-roles-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-m365-security-ensure-multifactor-authentication-is-enabled-for-all-users-in-administrative-roles-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-m365-security-ensure-multifactor-authentication-is-enabled-for-all-users-in-administrative-roles-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that a Conditional Access policy is in place requiring multifactor authentication for all users assigned to privileged directory roles in the Microsoft 365 tenant. By default, no such policy is created, leaving administrative accounts protected only by a password and making them prime targets for credential-based attacks.

        **Why this matters**

        - **Privileged account protection:** Administrative roles carry permissions that can modify tenant configuration, access all user data, and grant additional privileges, so a single compromised admin account can lead to full tenant takeover.
        - **Phishing resistance:** MFA forces an attacker who has stolen an admin password to also defeat a second factor, significantly raising the cost of a successful attack.
        - **Blast radius reduction:** Even when credentials are phished, MFA prevents the attacker from completing the sign-in and stops the compromise from escalating beyond the initial credential theft.
        - **Regulatory alignment:** MFA for privileged users is an explicit requirement in multiple security frameworks, and a Conditional Access policy provides auditable proof of enforcement.

        **Risk mitigation**

        - **Credential compromise:** Requiring a second factor for every administrative sign-in means that stolen passwords alone cannot be used to access the tenant's highest-privilege accounts.
        - **Insider threat containment:** MFA creates an additional verification step that limits the window during which a disgruntled or inattentive administrator can perform unauthorized actions with a shared or reused credential.
      audit: |
        ### Audit via Console

        1. Sign in to the Microsoft Entra admin center at `https://entra.microsoft.com`.
        2. Go to **Protection** > **Conditional Access** > **Policies**.
        3. Look for an enabled policy whose **Users** assignment targets administrative directory roles and whose **Grant** control requires multifactor authentication.

        A passing tenant has at least one enabled policy that requires MFA for administrators. A failing tenant has no such policy, or it is in **Report-only** or **Off** state.

        ### Audit via PowerShell

        1. Connect to Microsoft Graph and list Conditional Access policies:

        ```powershell
        Connect-MgGraph -Scopes "Policy.Read.All"
        Get-MgIdentityConditionalAccessPolicy |
          Where-Object { $_.State -eq "enabled" -and $_.Conditions.Users.IncludeRoles }
        ```

        A passing tenant returns at least one policy scoped to administrative roles. A failing tenant returns nothing.
      remediation:
        - id: console
          desc: |
            **To enable multi-factor authentication (MFA) for administrators:**

            1. Navigate to the `Microsoft Entra admin center` https://entra.microsoft.com.
            2. Select expand `Protection` > `Conditional Access` select `Policies`.
            3. Select `New policy`.
            4. Go to `Assignments` > `Users and groups` > `Include` > `Select users and groups` > check `Directory roles`.
            5. At a minimum, select the `Directory roles listed` below in this section of the document.
            6. Go to `Cloud apps or actions` > `Cloud apps` > `Include` > select `All cloud apps (and don't exclude any apps)`.
            7. Under `Access controls` > `Grant` > select `Grant access` > check `Require multi-factor authentication` (and nothing else).
            8. Leave all other conditions blank.
            9. Make sure the policy is enabled.
            10. Create.

            **At minimum these directory roles should be included for MFA:**

            - Application administrator
            - Authentication administrator
            - Billing administrator
            - Cloud application administrator
            - Conditional Access administrator
            - Exchange administrator
            - Global administrator
            - Global reader
            - Helpdesk administrator
            - Password administrator
            - Privileged authentication administrator
            - Privileged role administrator
            - Security administrator
            - SharePoint administrator
            - User administrator
        - id: powershell
          desc: |
            **Using Microsoft Graph PowerShell**

            1. Connect to Microsoft Graph with the required scopes:

            ```powershell
            Connect-MgGraph -Scopes "Policy.ReadWrite.ConditionalAccess", "Policy.Read.All", "RoleManagement.Read.Directory"
            ```

            2. Get the role template IDs for administrative roles:

            ```powershell
            $adminRoles = @(
                "9b895d92-2cd3-44c7-9d02-a6ac2d5ea5c3",  # Application Administrator
                "c4e39bd9-1100-46d3-8c65-fb160da0071f",  # Authentication Administrator
                "b0f54661-2d74-4c50-afa3-1ec803f12efe",  # Billing Administrator
                "158c047a-c907-4556-b7ef-446551a6b5f7",  # Cloud Application Administrator
                "b1be1c3e-b65d-4f19-8427-f6fa0d97feb9",  # Conditional Access Administrator
                "29232cdf-9323-42fd-ade2-1d097af3e4de",  # Exchange Administrator
                "62e90394-69f5-4237-9190-012177145e10",  # Global Administrator
                "f2ef992c-3afb-46b9-b7cf-a126ee74c451",  # Global Reader
                "729827e3-9c14-49f7-bb1b-9608f156bbb8",  # Helpdesk Administrator
                "966707d0-3269-4727-9be2-8c3a10f19b9d",  # Password Administrator
                "7be44c8a-adaf-4e2a-84d6-ab2649e08a13",  # Privileged Authentication Administrator
                "e8611ab8-c189-46e8-94e1-60213ab1f814",  # Privileged Role Administrator
                "194ae4cb-b126-40b2-bd5b-6091b380977d",  # Security Administrator
                "f28a1f50-f6e7-4571-818b-6a12f2af6b6c",  # SharePoint Administrator
                "fe930be7-5e62-47db-91af-98c3a49a38b1"   # User Administrator
            )
            ```

            3. Create a Conditional Access policy for admin MFA:

            ```powershell
            $params = @{
                displayName = "Require MFA for administrative roles"
                state = "enabled"
                conditions = @{
                    users = @{
                        includeRoles = $adminRoles
                    }
                    applications = @{
                        includeApplications = @("All")
                    }
                }
                grantControls = @{
                    operator = "OR"
                    builtInControls = @("mfa")
                }
            }
            New-MgIdentityConditionalAccessPolicy -BodyParameter $params
            ```
        - id: terraform
          desc: |
            **Using Terraform (azuread provider)**

            ```hcl
            data "azuread_directory_roles" "admin_roles" {
              # Fetch all directory roles
            }

            locals {
              admin_role_names = [
                "Application Administrator",
                "Authentication Administrator",
                "Billing Administrator",
                "Cloud Application Administrator",
                "Conditional Access Administrator",
                "Exchange Administrator",
                "Global Administrator",
                "Global Reader",
                "Helpdesk Administrator",
                "Password Administrator",
                "Privileged Authentication Administrator",
                "Privileged Role Administrator",
                "Security Administrator",
                "SharePoint Administrator",
                "User Administrator"
              ]
            }

            resource "azuread_conditional_access_policy" "admin_mfa" {
              display_name = "Require MFA for administrative roles"
              state        = "enabled"

              conditions {
                users {
                  included_roles = [for role in data.azuread_directory_roles.admin_roles.roles : role.template_id if contains(local.admin_role_names, role.display_name)]
                }
                applications {
                  included_applications = ["All"]
                }
              }

              grant_controls {
                operator          = "OR"
                built_in_controls = ["mfa"]
              }
            }
            ```

            For more details, see [azuread_conditional_access_policy](https://registry.terraform.io/providers/hashicorp/azuread/latest/docs/resources/conditional_access_policy) in the Terraform Registry.
