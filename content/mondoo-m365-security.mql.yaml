  - uid: mondoo-m365-security-enable-conditional-access-policies-to-block-legacy-authentication
    title: Enable Conditional Access policies to block legacy authentication
    impact: 80
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-14
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-j
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-3
      compliance/pci-dss-4: pcidss-requirement-8-4-2
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-2
    variants:
      - uid: mondoo-m365-security-enable-conditional-access-policies-to-block-legacy-authentication-microsoft365
        tags:
          mondoo.com/filter-title: Microsoft 365
          mondoo.com/filter-icon: microsoft
      - uid: mondoo-m365-security-enable-conditional-access-policies-to-block-legacy-authentication-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-m365-security-enable-conditional-access-policies-to-block-legacy-authentication-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-m365-security-enable-conditional-access-policies-to-block-legacy-authentication-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that a Conditional Access policy is in place to block legacy authentication client types, including Exchange ActiveSync clients and other legacy protocols such as POP and IMAP. By default, Microsoft 365 tenants permit these older protocols, which cannot enforce multifactor authentication and are routinely targeted in credential-stuffing and password-spray campaigns.

        **Why this matters**

        - **MFA bypass prevention:** Legacy authentication protocols bypass Conditional Access MFA requirements entirely, meaning an attacker with a valid password can authenticate without a second factor.
        - **Reduced credential-stuffing exposure:** Blocking these protocols eliminates the most common automated attack surface used to test large volumes of stolen credentials against Exchange and other Microsoft services.
        - **Smaller attack surface:** Disabling client app types that the organization does not need removes an entire class of authentication pathways that cannot be made more secure without replacing the protocol.
        - **Enforcement consistency:** A Conditional Access block policy applies uniformly across all users, preventing individual exemptions that could leave gaps in coverage.

        **Risk mitigation**

        - **Account compromise:** Attackers lose the ability to authenticate to Exchange ActiveSync and IMAP endpoints using stolen passwords alone, since those endpoints can no longer complete a sign-in.
        - **Compliance posture:** Blocking legacy authentication satisfies explicit requirements in frameworks that mandate strong authentication, closing the gap created by MFA-incapable protocols.
      audit: |
        ### Audit via Console

        1. Sign in to the Microsoft Entra admin center at `https://entra.microsoft.com`.
        2. Go to **Protection** > **Conditional Access** > **Policies**.
        3. Look for an enabled policy whose **Conditions** > **Client apps** targets the legacy authentication client apps, Exchange ActiveSync and other clients, and whose **Grant** control is set to **Block access**.

        A passing tenant has at least one enabled policy that blocks legacy authentication. A failing tenant has no such policy, or it is in **Report-only** or **Off** state.

        ### Audit via PowerShell

        1. Connect to Microsoft Graph and list Conditional Access policies:

        ```powershell
        Connect-MgGraph -Scopes "Policy.Read.All"
        Get-MgIdentityConditionalAccessPolicy |
          Where-Object { $_.State -eq "enabled" -and $_.GrantControls.BuiltInControls -contains "block" }
        ```

        A passing tenant returns at least one policy that blocks legacy authentication client app types. A failing tenant returns nothing.
      remediation:
        - id: console
          desc: |
            **To setup a conditional access policy to block legacy authentication, use the following steps:**

            1. Navigate to the `Microsoft Entra admin center` https://entra.microsoft.com.
            2. Select expand `Protection` > `Conditional Access` select `Policies`.
            3. Create a new policy by selecting `New policy`.
            4. Set the following conditions within the policy.
              - Select `Conditions` then `Client apps` enable the settings for and `Exchange ActiveSync clients` and `other clients`.
              - Under `Access controls` set the `Grant` section to `Block access`
              - Under `Assignments` enable `All users`
              - Under `Assignments` and `Users and groups` set the `Exclude` to be at least one low risk account or directory role. This is required as a best practice.
        - id: powershell
          desc: |
            **Using Microsoft Graph PowerShell**

            1. Connect to Microsoft Graph with the required scopes:

            ```powershell
            Connect-MgGraph -Scopes "Policy.ReadWrite.ConditionalAccess", "Policy.Read.All"
            ```

            2. Create a Conditional Access policy to block legacy authentication:

            ```powershell
            $params = @{
                displayName = "Block legacy authentication"
                state = "enabled"
                conditions = @{
                    users = @{
                        includeUsers = @("All")
                        excludeUsers = @("<breakglass-account-id>")  # Replace with break-glass account
                    }
                    applications = @{
                        includeApplications = @("All")
                    }
                    clientAppTypes = @("exchangeActiveSync", "other")
                }
                grantControls = @{
                    operator = "OR"
                    builtInControls = @("block")
                }
            }
            New-MgIdentityConditionalAccessPolicy -BodyParameter $params
            ```
        - id: terraform
          desc: |
            **Using Terraform (azuread provider)**

            ```hcl
            resource "azuread_conditional_access_policy" "block_legacy_auth" {
              display_name = "Block legacy authentication"
              state        = "enabled"

              conditions {
                users {
                  included_users = ["All"]
                  excluded_users = [azuread_user.breakglass.object_id]  # Break-glass account
                }
                applications {
                  included_applications = ["All"]
                }
                client_app_types = ["exchangeActiveSync", "other"]
              }

              grant_controls {
                operator          = "OR"
                built_in_controls = ["block"]
              }
            }
            ```

            For more details, see [azuread_conditional_access_policy](https://registry.terraform.io/providers/hashicorp/azuread/latest/docs/resources/conditional_access_policy) in the Terraform Registry.
