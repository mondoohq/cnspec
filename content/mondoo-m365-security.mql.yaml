  - uid: mondoo-m365-security-ensure-that-spf-records-are-published-for-all-exchange-domains
    title: Ensure that SPF records are published for all Exchange Domains
    impact: 60
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: false
      compliance/pci-dss-4: pcidss-requirement-5-4-1
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-1-2
    mql: |
      microsoft.domains.all(serviceConfigurationRecords.where(supportedService == "Email" && recordType == "Txt") != empty)
      microsoft.domains.all(serviceConfigurationRecords.where(supportedService == "Email" && recordType == "Txt").all(properties.text == "v=spf1 include:spf.protection.outlook.com -all"))
    docs:
      desc: |
        This check ensures that every Exchange Online domain has a published SPF (Sender Policy Framework) TXT record that explicitly authorizes Microsoft's mail servers. By default no SPF record is created automatically when a domain is added to Microsoft 365; it must be published manually at the DNS provider.

        **Why this matters**

        - **Anti-spoofing protection:** SPF lets receiving mail servers confirm that inbound messages claiming to be from your domain actually originate from a server you have authorized, blocking the most common form of sender impersonation.
        - **Phishing defense:** Without an SPF record, attackers can send email that appears to come from your domain's address with no technical barrier, making your brand a convenient cover for phishing campaigns targeting your customers, partners, or employees.
        - **Deliverability and reputation:** Receiving servers and spam filters use SPF pass or fail results as a strong signal when deciding whether to deliver, quarantine, or reject email, so a missing record can cause legitimate outbound mail to be flagged as suspicious.

        **Risk mitigation**

        - **Domain impersonation:** A valid SPF record with a hard-fail policy (`-all`) causes receiving servers to reject messages sent from unauthorized sources, directly preventing spoofed email from reaching recipients.
        - **Cascading email-authentication failures:** SPF is a prerequisite for effective DMARC enforcement; without a passing SPF result, DMARC cannot reliably align and reject spoofed messages, undermining the entire email authentication chain.
      audit: |
        Verify that every Exchange domain publishes an SPF record by querying its DNS TXT records:

        ```bash
        dig +short TXT example.com
        ```

        A passing domain returns a TXT record beginning with `v=spf1`. A failing domain returns no `v=spf1` record.
      remediation:
        - id: console
          desc: |
            **To setup SPF records for Exchange Online accepted domains, perform the following steps:**

            1. If all email in your domain is sent from and received by Exchange Online, add the following TXT record for each Accepted Domain:

            ```text
            v=spf1 include:spf.protection.outlook.com -all
            ```

            2. If there are other systems that send email in the environment, ensure the SPF record includes all authorized email-sending systems. For example:

            ```text
            v=spf1 include:spf.protection.outlook.com include:<other-system> -all
            ```

            3. Use the Microsoft 365 Defender portal to validate your SPF record configuration. Refer to this article for detailed guidance: [https://learn.microsoft.com/en-us/microsoft-365/security/office-365-security/how-office-365-uses-spf-to-prevent-spoofing](https://learn.microsoft.com/en-us/microsoft-365/security/office-365-security/how-office-365-uses-spf-to-prevent-spoofing).
        - id: cli
          desc: |
            **Using CLI tools**

            SPF records must be configured at your DNS provider. Use these CLI examples based on your provider:

            **Using Azure DNS CLI:**
            ```bash
            az network dns record-set txt add-record \
              --resource-group <resource-group> \
              --zone-name <domain.com> \
              --record-set-name "@" \
              --value "v=spf1 include:spf.protection.outlook.com -all"
            ```

            **Using AWS Route 53 CLI:**
            ```bash
            aws route53 change-resource-record-sets \
              --hosted-zone-id <zone-id> \
              --change-batch '{
                "Changes": [{
                  "Action": "UPSERT",
                  "ResourceRecordSet": {
                    "Name": "domain.com",
                    "Type": "TXT",
                    "TTL": 3600,
                    "ResourceRecords": [{"Value": "\"v=spf1 include:spf.protection.outlook.com -all\""}]
                  }
                }]
              }'
            ```

            **Using Google Cloud DNS:**
            ```bash
            gcloud dns record-sets create @ \
              --zone=<zone-name> \
              --type=TXT \
              --ttl=3600 \
              --rrdatas="v=spf1 include:spf.protection.outlook.com -all"
            ```
        - id: terraform
          desc: |
            **Using Terraform**

            Configure SPF records at your DNS provider:

            **Azure DNS:**
            ```hcl
            resource "azurerm_dns_txt_record" "spf" {
              name                = "@"
              zone_name           = azurerm_dns_zone.example.name
              resource_group_name = azurerm_resource_group.example.name
              ttl                 = 3600

              record {
                value = "v=spf1 include:spf.protection.outlook.com -all"
              }
            }
            ```

            **AWS Route 53:**
            ```hcl
            resource "aws_route53_record" "spf" {
              zone_id = aws_route53_zone.example.zone_id
              name    = "example.com"
              type    = "TXT"
              ttl     = 3600
              records = ["v=spf1 include:spf.protection.outlook.com -all"]
            }
            ```

            **Google Cloud DNS:**
            ```hcl
            resource "google_dns_record_set" "spf" {
              name         = "example.com."
              managed_zone = google_dns_managed_zone.example.name
              type         = "TXT"
              ttl          = 3600
              rrdatas      = ["v=spf1 include:spf.protection.outlook.com -all"]
            }
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/defender-office-365/email-authentication-about
        title: Email Authentication in Microsoft 365
      - url: https://learn.microsoft.com/en-us/exchange/security-and-compliance/security-and-compliance
        title: Exchange Online Security and Compliance
  # No Terraform variants: the tenant authorization policy has no resource in the azuread Terraform provider.
  - uid: mondoo-m365-security-ensure-third-party-integrated-applications-are-not-allowed
    title: Ensure that no third party integrated applications are allowed
    impact: 80
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-uem-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-19
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-ps-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-3
      compliance/pci-dss-4: pcidss-requirement-2-2-1
      compliance/soc2-2017: soc2-control-cc6-8-1
      compliance/vda-isa-5: vda-isa-5-1-3-3
    mql: microsoft.policies.authorizationPolicy.defaultUserRolePermissions.allowedToCreateApps == false
    docs:
      desc: |
        This check ensures that non-administrator users are blocked from registering third-party applications in Microsoft Entra ID by verifying that the tenant authorization policy sets `allowedToCreateApps` to `false`. By default Microsoft Entra allows any user to register applications, meaning any account in the tenant can grant an external application access to Microsoft 365 data without administrator review or approval.

        **Why this matters**

        - **Supply-chain risk reduction:** Restricting app registration to administrators ensures that every OAuth application connected to the tenant has been reviewed and approved, eliminating the risk of users silently connecting malicious or unvetted third-party tools.
        - **Data exfiltration prevention:** Third-party applications registered by end users can request broad Microsoft Graph permissions, including access to email, files, and calendar data, without visibility to the security team.
        - **Attack-surface control:** Each registered application is a potential attack vector; limiting who can create them reduces the number of OAuth tokens in circulation and the scope of any single compromised application.

        **Risk mitigation**

        - **OAuth phishing:** Attackers commonly use consent-phishing campaigns that trick users into granting a malicious application persistent access to their mailbox or OneDrive; removing the ability to register apps blocks this technique at its source.
        - **Unmanaged shadow integrations:** Without enforcement, users can connect personal productivity tools or automation scripts that process corporate data outside the organization's data-governance and DLP policies.
      audit: |
        ### Audit via Console

        1. Sign in to the Microsoft Entra admin center at `https://entra.microsoft.com`.
        2. Go to **Identity** > **Users** > **User settings**.
        3. Review the **Users can register applications** setting.

        A passing tenant has **Users can register applications** set to **No**. A failing tenant has it set to **Yes**.

        ### Audit via PowerShell

        1. Connect to Microsoft Graph and read the tenant authorization policy:

        ```powershell
        Connect-MgGraph -Scopes "Policy.Read.All"
        (Get-MgPolicyAuthorizationPolicy).DefaultUserRolePermissions | Select-Object AllowedToCreateApps
        ```

        A passing tenant returns `AllowedToCreateApps : False`. A failing tenant returns `AllowedToCreateApps : True`.
      remediation:
        - id: console
          desc: |
            **Using Microsoft 365 Console**

            To update via the Microsoft 365 portal:
            1. Log in as Global Administrator to the Microsoft 365 portal at https://admin.microsoft.com.
            2. Navigate to "Azure Active Directory" in the "Admin Centers."
            3. Go to "Users" > "User settings."
            4. Under "App registrations," set "Users can register applications" to "No."
            5. Save your changes.
        - id: powershell
          desc: |
            **Using Microsoft Graph PowerShell**

            1. Connect to Microsoft Graph with the required scopes:

            ```powershell
            Connect-MgGraph -Scopes "Policy.ReadWrite.Authorization"
            ```

            2. Update the authorization policy to prevent users from creating apps:

            ```powershell
            $params = @{
                defaultUserRolePermissions = @{
                    allowedToCreateApps = $false
                }
            }
            Update-MgPolicyAuthorizationPolicy -BodyParameter $params
            ```

            3. Verify the change:

            ```powershell
            (Get-MgPolicyAuthorizationPolicy).DefaultUserRolePermissions.AllowedToCreateApps
            ```
        # No Terraform remediation: the tenant authorization policy has no resource in the azuread Terraform provider.
    refs:
      - url: https://learn.microsoft.com/en-us/entra/identity/enterprise-apps/what-is-application-management
        title: Microsoft Entra Application Management
  # No Terraform variants: Exchange Online configuration has no Terraform provider.
  - uid: mondoo-m365-security-ensure-dkim-signing-enabled-for-all-exchange-domains
    title: Ensure DKIM signing is enabled for all Exchange domains
    impact: 70
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-2-i-transmission-security-integrity-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: false
      compliance/pci-dss-4: pcidss-requirement-5-4-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    mql: |
      ms365.exchangeonline.dkimSigningConfig.all(_['enabled'] == true)
    docs:
      desc: |
        This check ensures that Exchange Online is configured to enable DKIM signing for every domain. By default, Microsoft 365 provides a base-level DKIM signature, but custom per-domain signing is not enabled automatically; enabling it adds a cryptographic signature that receiving servers use to verify that a message originated from an authorized source and was not altered in transit.

        **Why this matters**

        - **Email authentication:** DKIM allows receiving mail servers to verify that outbound messages genuinely originated from your domain and were not tampered with.
        - **Spoofing deterrence:** Domains with DKIM signatures are significantly harder for attackers to impersonate because forged messages fail cryptographic verification.
        - **Deliverability protection:** Major mail providers factor DKIM pass/fail into spam scoring, so unsigned domains are more likely to have legitimate mail rejected or quarantined.
        - **DMARC readiness:** DKIM alignment is a prerequisite for a complete DMARC policy, which provides the strongest email authentication posture available.
        - **Brand reputation:** Consistent DKIM signing signals to the broader email ecosystem that your domain is well-administered, reducing the likelihood of being blocklisted.

        **Risk mitigation**

        - **Prevents domain impersonation:** A valid DKIM signature makes it computationally infeasible for an attacker to craft a message that passes authentication as your domain.
        - **Reduces business email compromise exposure:** Attackers who rely on spoofed sender addresses lose their primary delivery mechanism when DKIM is enforced across all domains.
      audit: |
        ### Audit via Console

        1. Sign in to the Microsoft Defender portal at `https://security.microsoft.com`.
        2. Go to **Email & collaboration** > **Policies & rules** > **Threat policies** > **Email authentication settings**.
        3. Select the **DKIM** tab and review each domain.

        A passing tenant has DKIM signing enabled for every domain. A failing tenant has a domain with DKIM disabled.

        ### Audit via PowerShell

        1. Connect to Exchange Online and list the DKIM signing configuration:

        ```powershell
        Connect-ExchangeOnline
        Get-DkimSigningConfig | Select-Object Domain, Enabled
        ```

        A passing tenant returns `Enabled : True` for every domain. A failing tenant returns `Enabled : False` for a domain.
      remediation:
        - id: console
          desc: |
            **To enable DKIM signing:**

            1. Navigate to the [Microsoft 365 Defender portal](https://security.microsoft.com).
            2. Go to **Email & collaboration** > **Policies & rules** > **Threat policies**.
            3. Select **Email authentication settings** > **DKIM**.
            4. For each domain, select the domain and toggle **Sign messages for this domain with DKIM signatures** to **Enabled**.
            5. If DKIM keys have not been created, follow the prompts to publish the required CNAME records in your DNS.
        - id: powershell
          desc: |
            **Using Exchange Online PowerShell**

            ```powershell
            Connect-ExchangeOnline

            # List DKIM signing configuration for all domains
            Get-DkimSigningConfig

            # Enable DKIM signing for a specific domain
            Set-DkimSigningConfig -Identity "example.com" -Enabled $true
            ```
        # No Terraform remediation: Exchange Online configuration has no Terraform provider.
    refs:
      - url: https://learn.microsoft.com/en-us/microsoft-365/security/office-365-security/email-authentication-dkim-configure
        title: Configure DKIM signing in Microsoft 365
      - url: https://learn.microsoft.com/en-us/microsoft-365/security/office-365-security/email-authentication-about
        title: Email authentication in Microsoft 365
  # No Terraform variants: Exchange Online Safe Links policies have no Terraform provider.
  - uid: mondoo-m365-security-ensure-safe-links-policies-configured
    title: Ensure Safe Links policies are configured
    impact: 80
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-tvm-02
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-308-a-5-ii-b-security-awareness-training-and-tools-protection-from-malicious-software
      compliance/iso-27001-2022: iso-27001-2022-a-8-7
      compliance/nis-2: false
      compliance/nist-csf-1: nist-csf-1-de-cm-4
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-2
      compliance/pci-dss-4: pcidss-requirement-5-4-1
      compliance/soc2-2017: soc2-control-cc6-8-4
      compliance/vda-isa-5: vda-isa-5-5-2-3
    mql: |
      ms365.exchangeonline.safeLinksPolicy.length > 0
    docs:
      desc: |
        This check ensures that Microsoft Defender for Office 365 is configured with at least one Safe Links policy. By default, no custom Safe Links policies exist in a new tenant; without them, URLs in email and Office documents are delivered to users without real-time scanning or rewriting.

        **Why this matters**

        - **Time-of-click scanning:** Safe Links checks URLs at the moment a user clicks, catching links that were benign at delivery but became malicious after the email arrived.
        - **Zero-day URL protection:** Behavioral analysis at click time identifies newly discovered malicious URLs that have not yet been added to static blocklists.
        - **Internal email coverage:** Safe Links can be applied to messages sent within the organization, not only to inbound external mail.
        - **Threat visibility:** Click tracking and reporting surface targeted users and recurring attack patterns that would otherwise go undetected.
        - **Office application protection:** When configured to cover Office apps, Safe Links extends coverage beyond email to links embedded in Word, Excel, and PowerPoint files.

        **Risk mitigation**

        - **Blocks post-delivery link activation:** Attackers who send benign-looking URLs that redirect to malicious content after delivery are stopped at click time rather than after compromise.
        - **Reduces successful phishing outcomes:** Removing direct access to malicious URLs interrupts the initial access phase of phishing campaigns that rely on user clicks.
      audit: |
        ### Audit via Console

        1. Sign in to the Microsoft Defender portal at `https://security.microsoft.com`.
        2. Go to **Email & collaboration** > **Policies & rules** > **Threat policies** > **Safe Links**.
        3. Review the configured Safe Links policies.

        A passing tenant has at least one Safe Links policy configured. A failing tenant has none.

        ### Audit via PowerShell

        1. Connect to Exchange Online and list Safe Links policies:

        ```powershell
        Connect-ExchangeOnline
        Get-SafeLinksPolicy
        ```

        A passing tenant returns at least one policy. A failing tenant returns nothing.
      remediation:
        - id: console
          desc: |
            **To configure Safe Links policies:**

            1. Navigate to the [Microsoft 365 Defender portal](https://security.microsoft.com).
            2. Go to **Email & collaboration** > **Policies & rules** > **Threat policies**.
            3. Select **Safe Links**.
            4. Click **Create** to create a new policy.
            5. Configure the policy:
               - Name the policy and add a description.
               - Under **Users and domains**, add all users or specific groups.
               - Under **URL & click protection settings**, enable **On: Safe Links checks a list of known, malicious links when users click links in email**.
               - Enable **Apply Safe Links to email messages sent within the organization**.
               - Enable **Do not let users click through to the original URL**.
            6. Click **Submit** to save the policy.
        - id: powershell
          desc: |
            **Using Exchange Online PowerShell**

            ```powershell
            Connect-ExchangeOnline

            # Create a Safe Links policy
            New-SafeLinksPolicy -Name "Organization Safe Links Policy" `
              -EnableSafeLinksForEmail $true `
              -EnableSafeLinksForTeams $true `
              -EnableSafeLinksForOffice $true `
              -TrackClicks $true `
              -AllowClickThrough $false

            # Create a Safe Links rule to apply the policy
            New-SafeLinksRule -Name "Organization Safe Links Rule" `
              -SafeLinksPolicy "Organization Safe Links Policy" `
              -RecipientDomainIs "example.com"
            ```
        # No Terraform remediation: Exchange Online Safe Links policies have no Terraform provider.
    refs:
      - url: https://learn.microsoft.com/en-us/microsoft-365/security/office-365-security/safe-links-about
        title: Safe Links in Microsoft Defender for Office 365
      - url: https://learn.microsoft.com/en-us/microsoft-365/security/office-365-security/safe-links-policies-configure
        title: Set up Safe Links policies
  # No Terraform variants: Exchange Online Safe Attachments policies have no Terraform provider.
  - uid: mondoo-m365-security-ensure-safe-attachments-policies-configured
    title: Ensure Safe Attachments policies are configured
    impact: 80
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-tvm-02
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-308-a-5-ii-b-security-awareness-training-and-tools-protection-from-malicious-software
      compliance/iso-27001-2022: iso-27001-2022-a-8-7
      compliance/nis-2: false
      compliance/nist-csf-1: nist-csf-1-de-cm-4
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-2
      compliance/pci-dss-4: pcidss-requirement-5-4-1
      compliance/soc2-2017: soc2-control-cc6-8-4
      compliance/vda-isa-5: vda-isa-5-5-2-3
    mql: |
      ms365.exchangeonline.safeAttachmentPolicy.length > 0
    docs:
      desc: |
        This check ensures that Microsoft Defender for Office 365 is configured with at least one Safe Attachments policy. By default, a new tenant has no custom Safe Attachments policies; without them, email attachments are delivered based on traditional antivirus signatures alone, with no sandboxed behavioral analysis.

        **Why this matters**

        - **Sandbox detonation:** Safe Attachments opens attachments in an isolated virtual environment and observes their behavior, detecting threats that have no known signature.
        - **Ransomware prevention:** Blocking malicious attachments before they reach the endpoint interrupts ransomware delivery before any files are encrypted.
        - **Novel malware coverage:** Behavioral detonation catches newly crafted malware variants that evade signature-based detection engines.
        - **SharePoint and OneDrive scanning:** When enabled for collaboration workloads, Safe Attachments also scans files uploaded to SharePoint and OneDrive, not only email.
        - **Dynamic delivery:** Safe Attachments can release the message body immediately while the attachment is scanned, minimizing user impact without sacrificing protection.

        **Risk mitigation**

        - **Stops weaponized documents:** Malicious Office files, PDFs, and archives that carry exploit payloads are quarantined or blocked before reaching user mailboxes.
        - **Limits dwell time:** Catching malware at the email gateway prevents the initial foothold that attackers need to establish persistence and move laterally.
      audit: |
        ### Audit via Console

        1. Sign in to the Microsoft Defender portal at `https://security.microsoft.com`.
        2. Go to **Email & collaboration** > **Policies & rules** > **Threat policies** > **Safe Attachments**.
        3. Review the configured Safe Attachments policies.

        A passing tenant has at least one Safe Attachments policy configured. A failing tenant has none.

        ### Audit via PowerShell

        1. Connect to Exchange Online and list Safe Attachments policies:

        ```powershell
        Connect-ExchangeOnline
        Get-SafeAttachmentPolicy
        ```

        A passing tenant returns at least one policy. A failing tenant returns nothing.
      remediation:
        - id: console
          desc: |
            **To configure Safe Attachments policies:**

            1. Navigate to the [Microsoft 365 Defender portal](https://security.microsoft.com).
            2. Go to **Email & collaboration** > **Policies & rules** > **Threat policies**.
            3. Select **Safe Attachments**.
            4. Click **Create** to create a new policy.
            5. Configure the policy:
               - Name the policy and add a description.
               - Under **Users and domains**, add all users or specific groups.
               - Under **Settings**, select **Dynamic Delivery** or **Block** as the Safe Attachments unknown malware response.
               - Enable **Redirect attachment on detection** and specify a security admin email for review.
            6. Click **Submit** to save the policy.
        - id: powershell
          desc: |
            **Using Exchange Online PowerShell**

            ```powershell
            Connect-ExchangeOnline

            # Create a Safe Attachments policy
            New-SafeAttachmentPolicy -Name "Organization Safe Attachments Policy" `
              -Enable $true `
              -Action Block `
              -Redirect $true `
              -RedirectAddress "secadmin@example.com"

            # Create a Safe Attachments rule to apply the policy
            New-SafeAttachmentRule -Name "Organization Safe Attachments Rule" `
              -SafeAttachmentPolicy "Organization Safe Attachments Policy" `
              -RecipientDomainIs "example.com"
            ```
        # No Terraform remediation: Exchange Online Safe Attachments policies have no Terraform provider.
    refs:
      - url: https://learn.microsoft.com/en-us/microsoft-365/security/office-365-security/safe-attachments-about
        title: Safe Attachments in Microsoft Defender for Office 365
      - url: https://learn.microsoft.com/en-us/microsoft-365/security/office-365-security/safe-attachments-policies-configure
        title: Set up Safe Attachments policies
  # No Terraform variants: Exchange Online anti-phishing policies have no Terraform provider.
  - uid: mondoo-m365-security-ensure-anti-phishing-policies-enabled
    title: Ensure anti-phishing policies are enabled
    impact: 80
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-tvm-02
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-308-a-5-ii-b-security-awareness-training-and-tools-protection-from-malicious-software
      compliance/iso-27001-2022: iso-27001-2022-a-8-7
      compliance/nis-2: false
      compliance/nist-csf-1: nist-csf-1-de-cm-4
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-4
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-2
      compliance/pci-dss-4: pcidss-requirement-5-4-1
      compliance/soc2-2017: soc2-control-cc6-8-4
      compliance/vda-isa-5: vda-isa-5-5-2-3
    mql: |
      ms365.exchangeonline.antiPhishPolicy.length > 0
    docs:
      desc: |
        This check ensures that Microsoft Defender for Office 365 is configured with at least one anti-phishing policy. By default, a new tenant has no custom anti-phishing policies; without them, inbound mail receives only basic anti-spoofing checks and lacks impersonation protection for high-value users and trusted domains.

        **Why this matters**

        - **Impersonation detection:** Anti-phishing policies identify messages that impersonate specific protected users or domains, such as executives and trusted partner organizations.
        - **Spoof intelligence:** Built-in spoof intelligence analyzes sending infrastructure to flag messages that falsely claim to originate from legitimate domains.
        - **Mailbox intelligence:** Machine learning models communication patterns for each user and flags messages from senders that deviate from established behavior.
        - **Business email compromise protection:** Impersonation protection targets the executive and financial-staff accounts most frequently used in BEC fraud campaigns.
        - **First-contact safety tips:** Users are warned when they receive email from an address they have never interacted with, reducing the chance of acting on a spoofed message.

        **Risk mitigation**

        - **Disrupts BEC attack chains:** Quarantining impersonation attempts before they reach inboxes removes the social-engineering messages that initiate wire-transfer fraud and credential theft.
        - **Reduces spear-phishing success rates:** Targeted phishing campaigns that rely on domain or user impersonation are surfaced and blocked before users can act on them.
      audit: |
        ### Audit via Console

        1. Sign in to the Microsoft Defender portal at `https://security.microsoft.com`.
        2. Go to **Email & collaboration** > **Policies & rules** > **Threat policies** > **Anti-phishing**.
        3. Review the configured anti-phishing policies.

        A passing tenant has at least one anti-phishing policy configured. A failing tenant has none.

        ### Audit via PowerShell

        1. Connect to Exchange Online and list anti-phishing policies:

        ```powershell
        Connect-ExchangeOnline
        Get-AntiPhishPolicy
        ```

        A passing tenant returns at least one policy. A failing tenant returns nothing.
      remediation:
        - id: console
          desc: |
            **To configure anti-phishing policies:**

            1. Navigate to the [Microsoft 365 Defender portal](https://security.microsoft.com).
            2. Go to **Email & collaboration** > **Policies & rules** > **Threat policies**.
            3. Select **Anti-phishing**.
            4. Click **Create** to create a new policy (or edit the default policy).
            5. Configure the policy:
               - Under **Users and domains**, add users and domains to protect.
               - Under **Phishing threshold & protection**, set the phishing email threshold.
               - Enable **User impersonation protection** and add high-value users (executives, finance).
               - Enable **Domain impersonation protection** and add trusted domains.
               - Enable **Mailbox intelligence** and **Intelligence for impersonation protection**.
            6. Configure actions for detected impersonation attempts (quarantine recommended).
            7. Click **Submit** to save the policy.
        - id: powershell
          desc: |
            **Using Exchange Online PowerShell**

            ```powershell
            Connect-ExchangeOnline

            # Create an anti-phishing policy
            New-AntiPhishPolicy -Name "Organization Anti-Phishing Policy" `
              -EnableMailboxIntelligence $true `
              -EnableMailboxIntelligenceProtection $true `
              -EnableSpoofIntelligence $true `
              -EnableFirstContactSafetyTips $true `
              -PhishThresholdLevel 2

            # Create an anti-phishing rule to apply the policy
            New-AntiPhishRule -Name "Organization Anti-Phishing Rule" `
              -AntiPhishPolicy "Organization Anti-Phishing Policy" `
              -RecipientDomainIs "example.com"
            ```
        # No Terraform remediation: Exchange Online anti-phishing policies have no Terraform provider.
    refs:
      - url: https://learn.microsoft.com/en-us/microsoft-365/security/office-365-security/anti-phishing-policies-about
        title: Anti-phishing policies in Microsoft 365
      - url: https://learn.microsoft.com/en-us/microsoft-365/security/office-365-security/anti-phishing-policies-mdo-configure
        title: Configure anti-phishing policies
  # No Terraform variants: SharePoint Online tenant settings have no Terraform provider.
  - uid: mondoo-m365-security-ensure-sharepoint-external-sharing-restricted
    title: Ensure SharePoint external sharing is restricted
    impact: 80
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-2-1
    mql: |
      ms365.sharepointonline.spoTenant['SharingCapability'] != "ExternalUserAndGuestSharing"
    docs:
      desc: |
        This check ensures that SharePoint Online is configured to restrict external sharing to a level more restrictive than the most permissive default. The most permissive setting, ExternalUserAndGuestSharing, allows any user to generate anonymous "Anyone" links that grant access to files and folders without requiring the recipient to authenticate, which means there is no record of who accessed the content.

        **Why this matters**

        - **Uncontrolled data distribution:** Anonymous sharing links allow recipients to forward access to any third party, removing all organizational control over who views or downloads the content.
        - **Data exfiltration pathway:** Any internal user who can create an Anyone link can silently exfiltrate documents to external parties without leaving an identity trail.
        - **Guest account sprawl:** Permissive sharing settings generate large numbers of unmanaged guest accounts that may retain access to content long after a collaboration ends.
        - **Compliance risk:** Most regulatory frameworks require demonstrable controls over access to sensitive data, and unauthenticated sharing links make access-control attestation impossible.
        - **Audit gap:** Without authentication requirements, access logs show a link was clicked but cannot attribute the access to a specific identity.

        **Risk mitigation**

        - **Enforces identity-based access:** Restricting sharing to authenticated guests ensures every access event is tied to a verifiable identity that can be reviewed and revoked.
        - **Limits insider-driven exfiltration:** Requiring guest authentication and scoping sharing to existing or approved guests closes the anonymous link pathway most commonly exploited by malicious insiders.
      audit: |
        ### Audit via Console

        1. Sign in to the SharePoint admin center at `https://admin.microsoft.com/sharepoint`.
        2. Go to **Policies** > **Sharing**.
        3. Review the **External sharing** setting for SharePoint and OneDrive.

        A passing tenant has external sharing set to a level more restrictive than **Anyone**, so sharing does not allow both external users and anonymous guest links. A failing tenant allows **Anyone** links.

        ### Audit via PowerShell

        1. Connect to SharePoint Online and read the tenant sharing capability:

        ```powershell
        Connect-SPOService -Url https://contoso-admin.sharepoint.com
        Get-SPOTenant | Select-Object SharingCapability
        ```

        A passing tenant returns a `SharingCapability` other than `ExternalUserAndGuestSharing`. A failing tenant returns `ExternalUserAndGuestSharing`.
      remediation:
        - id: console
          desc: |
            **To restrict SharePoint external sharing:**

            1. Navigate to the [SharePoint admin center](https://admin.microsoft.com/sharepoint).
            2. Go to **Policies** > **Sharing**.
            3. Under **External sharing**, adjust the SharePoint slider to a more restrictive level:
               - **New and existing guests**: Requires authentication but allows sharing with anyone who signs in.
               - **Existing guests**: Only allows sharing with guests already in your directory.
               - **Only people in your organization**: Disables external sharing entirely.
            4. Click **Save**.

            For most organizations, "New and existing guests" provides a good balance of collaboration and security.
        - id: powershell
          desc: |
            **Using SharePoint Online PowerShell**

            ```powershell
            Connect-SPOService -Url https://yourtenant-admin.sharepoint.com

            # Set sharing to "New and existing guests" (ExternalUserSharingOnly)
            Set-SPOTenant -SharingCapability ExternalUserSharingOnly

            # Or set to "Existing guests" only
            Set-SPOTenant -SharingCapability ExistingExternalUserSharingOnly

            # Or disable external sharing entirely
            Set-SPOTenant -SharingCapability Disabled
            ```
        # No Terraform remediation: SharePoint Online tenant settings have no Terraform provider.
    refs:
      - url: https://learn.microsoft.com/en-us/sharepoint/turn-external-sharing-on-or-off
        title: Manage sharing settings for SharePoint and OneDrive
      - url: https://learn.microsoft.com/en-us/sharepoint/external-sharing-overview
        title: Overview of external sharing in SharePoint and OneDrive
  # No Terraform variants: Exchange Online transport rules have no Terraform provider.
  - uid: mondoo-m365-security-ensure-transport-rules-enforce-tls
    title: Ensure Exchange transport rules enforce TLS for external email
    impact: 70
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-2-ii-transmission-security-encryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    mql: |
      ms365.exchangeonline.transportRule.any(_['state'] == "Enabled" && _['routeMessageOutboundRequireTls'] == true)
    docs:
      desc: |
        This check ensures that Exchange Online is configured with at least one enabled transport rule that requires TLS encryption for outbound email. Exchange Online attempts TLS opportunistically by default but does not enforce it; without an explicit transport rule, messages can fall back to unencrypted SMTP delivery when the receiving server does not advertise TLS support.

        **Why this matters**

        - **Encryption in transit:** A transport rule that mandates TLS prevents Exchange from delivering messages over an unencrypted SMTP connection, regardless of the receiving server's configuration.
        - **Data confidentiality:** Email content and attachments transmitted without encryption can be captured and read by anyone with access to network traffic along the delivery path.
        - **Protection against downgrade attacks:** Without enforcement, an attacker who can manipulate DNS or SMTP negotiation can strip TLS and force plaintext delivery; a transport rule blocks the fallback.
        - **Sensitive-message coverage:** Notifications containing credentials, financial data, or personal information are protected from interception when TLS is required at the mail-flow layer.
        - **Auditability:** Transport rules provide a documented, enforceable control that can be cited in security assessments and compliance reviews as evidence of encryption-in-transit requirements.

        **Risk mitigation**

        - **Prevents opportunistic downgrade:** Enforcing TLS at the transport-rule level removes the possibility of a receiving server negotiating an unencrypted session, closing the most common path to plaintext email interception.
        - **Reduces man-in-the-middle exposure:** Requiring a verified TLS session before message delivery makes passive eavesdropping and active session hijacking computationally impractical for on-path attackers.
      audit: |
        ### Audit via Console

        1. Sign in to the Exchange admin center at `https://admin.exchange.microsoft.com`.
        2. Go to **Mail flow** > **Rules**.
        3. Review the enabled rules for one that requires TLS on outbound messages.

        A passing tenant has at least one enabled transport rule that requires outbound TLS. A failing tenant has none.

        ### Audit via PowerShell

        1. Connect to Exchange Online and list transport rules:

        ```powershell
        Connect-ExchangeOnline
        Get-TransportRule | Where-Object { $_.State -eq "Enabled" -and $_.RouteMessageOutboundRequireTls }
        ```

        A passing tenant returns at least one enabled rule that requires outbound TLS. A failing tenant returns nothing.
      remediation:
        - id: console
          desc: |
            **To configure a transport rule requiring TLS:**

            1. Navigate to the [Exchange admin center](https://admin.exchange.microsoft.com).
            2. Go to **Mail flow** > **Rules**.
            3. Click **Add a rule** > **Create a new rule**.
            4. Name the rule (e.g., "Require TLS for outbound email").
            5. Under **Apply this rule if**, select **The recipient is external/internal** > **Outside the organization**.
            6. Under **Do the following**, select **Modify the message security** > **Require TLS encryption**.
            7. Click **Save**.
        - id: powershell
          desc: |
            **Using Exchange Online PowerShell**

            ```powershell
            Connect-ExchangeOnline

            # Create a transport rule requiring TLS for outbound email
            New-TransportRule -Name "Require TLS for outbound email" `
              -SentToScope NotInOrganization `
              -RouteMessageOutboundRequireTls $true `
              -Priority 0
            ```
        # No Terraform remediation: Exchange Online transport rules have no Terraform provider.
    refs:
      - url: https://learn.microsoft.com/en-us/exchange/security-and-compliance/mail-flow-rules/mail-flow-rules
        title: Mail flow rules in Exchange Online
      - url: https://learn.microsoft.com/en-us/purview/exchange-online-uses-tls-to-secure-email-connections
        title: How Exchange Online uses TLS
