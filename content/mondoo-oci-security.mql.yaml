      - uid: mondoo-oci-security-vcn-no-unrestricted-rdp-ingress-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/icon: terraform
    docs:
      desc: |
        This check ensures that OCI VCN security lists do not allow RDP (TCP port 3389) ingress from any source (0.0.0.0/0). Remote Desktop Protocol access from the internet is a high-risk attack vector frequently targeted by ransomware operators.

        **Why this matters**

        Unrestricted RDP access from the internet exposes Windows instances to:
          •  Brute-force and credential stuffing attacks against Windows accounts.
          •  Exploitation of RDP vulnerabilities (e.g., BlueKeep, DejaBlue).
          •  Ransomware delivery — RDP is the top initial access vector for ransomware gangs.
          •  Session hijacking and man-in-the-middle attacks.

        If RDP is open to 0.0.0.0/0, it can lead to:
          •  Full instance compromise and ransomware deployment.
          •  Lateral movement across the VCN to other Windows systems.
          •  Data encryption and extortion.
          •  Non-compliance with CIS OCI Foundations Benchmark.

        Risk mitigation
          •  Restrict RDP source CIDR blocks to known trusted IP ranges.
          •  Use OCI Bastion service for secure remote desktop access.
          •  Enable Network Level Authentication (NLA) on all Windows instances.
          •  Consider using VPN or jump boxes instead of direct RDP exposure.
      remediation:
        - id: console
          desc: |
            To restrict RDP ingress in a VCN security list using the OCI Console:

            1. Navigate to **Networking > Virtual Cloud Networks**.
            2. Select the VCN.
            3. Select **Security Lists**.
            4. Select the security list with the RDP rule.
            5. Edit the TCP ingress rule for port 3389 from 0.0.0.0/0 to use a specific trusted source CIDR block.
        - id: cli
          desc: |
            To restrict RDP ingress in a VCN security list using the OCI CLI, update the security list with a rule that restricts the source CIDR:

            ```bash
            oci network security-list update --security-list-id SECURITY_LIST_OCID \
              --ingress-security-rules '[{"source":"10.0.0.0/24","protocol":"6","tcpOptions":{"destinationPortRange":{"min":3389,"max":3389}},"isStateless":false}]'
            ```
        - id: terraform
          desc: |
            To restrict RDP ingress in a VCN security list in Terraform, specify a trusted source CIDR instead of 0.0.0.0/0:

            ```hcl
            resource "oci_core_security_list" "example" {
              compartment_id = var.compartment_ocid
              vcn_id         = oci_core_vcn.example.id
              display_name   = "example-security-list"

              ingress_security_rules {
                protocol  = "6" # TCP
                source    = "10.0.0.0/24" # Management subnet only
                stateless = false

                tcp_options {
                  min = 3389
                  max = 3389
                }
              }
            }
            ```
    refs:
      - url: https://docs.oracle.com/en-us/iaas/Content/Network/Concepts/securitylists.htm
        title: CIS OCI Foundations Benchmark 2.4
