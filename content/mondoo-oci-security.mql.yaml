        signatureAlgorithm.in([
          "SHA256_WITH_RSA",
          "SHA384_WITH_RSA",
          "SHA512_WITH_RSA",
          "SHA256_WITH_ECDSA",
          "SHA384_WITH_ECDSA",
          "SHA512_WITH_ECDSA"
        ])
      )
  - uid: mondoo-oci-security-certificates-strong-signature-algorithms-terraform-hcl
