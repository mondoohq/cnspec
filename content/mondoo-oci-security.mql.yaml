  - uid: mondoo-oci-security-object-storage-buckets-event-logging-enabled
    title: Ensure Object Storage buckets have event logging enabled
    impact: 60
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/soc2-2017: soc2-control-cc7-2-1
    variants:
      - uid: mondoo-oci-security-object-storage-buckets-event-logging-enabled-oci
        tags:
          mondoo.com/filter-title: OCI
          mondoo.com/filter-icon: oci
      - uid: mondoo-oci-security-object-storage-buckets-event-logging-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-oci-security-object-storage-buckets-event-logging-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-oci-security-object-storage-buckets-event-logging-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that object event logging is enabled on OCI Object Storage buckets. Event logging emits events when objects are created, updated, or deleted, enabling audit trails and automated responses.

        **Why this matters**

        Without event logging, there is no visibility into object-level operations:
          •  Unauthorized data access or modification goes undetected.
          •  Incident response is hampered by lack of activity records.
          •  Compliance audits cannot verify data access patterns.

        Event logging provides:
          •  Visibility into all object operations for security monitoring.
          •  Integration with OCI Events and Notifications for automated alerting.
          •  Audit trail for compliance requirements.

        Risk mitigation
          •  Enable object events on all buckets.
          •  Configure event rules to alert on suspicious activity.
          •  Integrate events with SIEM or logging platforms.
      remediation:
        - id: console
          desc: |
            To enable object event logging on an Object Storage bucket using the OCI Console:

            1. Navigate to **Object Storage > Buckets**.
            2. Select the bucket identified in this finding.
            3. Select **Edit**.
            4. Enable **Emit Object Events**.
            5. Select **Save Changes**.
        - id: cli
          desc: |
            To enable object event logging on an Object Storage bucket using the OCI CLI, update the bucket's event setting:

            ```bash
            oci os bucket update --bucket-name BUCKET_NAME --object-events-enabled true
            ```
        - id: terraform
          desc: |
            To enable object event logging on an Object Storage bucket in Terraform, set the `object_events_enabled` attribute to `true`:

            ```hcl
            resource "oci_objectstorage_bucket" "example" {
              compartment_id        = var.compartment_ocid
              namespace             = var.namespace
              name                  = "example-bucket"
              object_events_enabled = true
            }
            ```
    refs:
      - url: https://docs.oracle.com/en-us/iaas/Content/Object/Tasks/managingbuckets.htm
        title: OCI Object Storage events documentation
  - uid: mondoo-oci-security-object-storage-buckets-event-logging-enabled-oci
    filters: asset.platform == 'oci'
    mql: |
      oci.objectStorage.buckets.all(objectEventsEnabled == true)
  - uid: mondoo-oci-security-object-storage-buckets-event-logging-enabled-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "oci_objectstorage_bucket")
    mql: |
      terraform.resources.where(nameLabel == "oci_objectstorage_bucket").all(
        arguments.object_events_enabled == true
      )
  - uid: mondoo-oci-security-object-storage-buckets-event-logging-enabled-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "oci_objectstorage_bucket")
    mql: |
