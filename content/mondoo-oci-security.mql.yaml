  - uid: mondoo-oci-security-vcn-no-unrestricted-egress-all-tcp-ports
    title: Ensure VCN security lists block unrestricted TCP egress
    impact: 70
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/soc2-2017: soc2-control-cc6-6-4
    variants:
      - uid: mondoo-oci-security-vcn-no-unrestricted-egress-all-tcp-ports-oci
        tags:
          mondoo.com/filter-title: OCI
          mondoo.com/icon: oci
      - uid: mondoo-oci-security-vcn-no-unrestricted-egress-all-tcp-ports-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/icon: terraform
      - uid: mondoo-oci-security-vcn-no-unrestricted-egress-all-tcp-ports-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/icon: terraform
      - uid: mondoo-oci-security-vcn-no-unrestricted-egress-all-tcp-ports-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/icon: terraform
    docs:
      desc: |
        This check ensures that OCI VCN security lists do not contain TCP egress rules to 0.0.0.0/0 that allow all TCP ports. When a TCP egress rule has no port restrictions, compromised instances can communicate with any service on the internet.

        **Why this matters**

        Unrestricted TCP egress to the internet enables compromised instances to:
          •  Exfiltrate data to arbitrary internet destinations on any TCP port.
          •  Establish command-and-control (C2) channels on non-standard ports to evade detection.
          •  Download additional malware, tools, or payloads.
          •  Tunnel traffic through commonly allowed ports (e.g., 443) to bypass monitoring.

        Risk mitigation
          •  Always specify destination port ranges in TCP egress rules.
          •  Restrict destination CIDR blocks to known required endpoints.
          •  Use a proxy or NAT gateway for controlled internet access.
          •  Monitor outbound traffic for anomalous connections.
      remediation:
        - id: console
          desc: |
            To restrict unrestricted TCP egress rules in a VCN security list using the OCI Console:

            1. Navigate to **Networking > Virtual Cloud Networks**.
            2. Select the VCN.
            3. Select **Security Lists**.
            4. Select the security list.
            5. Edit TCP egress rules to 0.0.0.0/0 to specify destination port ranges, allowing only the ports required for your workload (e.g., 443 for HTTPS).
        - id: cli
          desc: |
            To restrict unrestricted TCP egress rules in a VCN security list using the OCI CLI, update the security list with rules that include specific port ranges:

            ```bash
            oci network security-list update --security-list-id SECURITY_LIST_OCID \
              --egress-security-rules '[{"destination":"0.0.0.0/0","protocol":"6","tcpOptions":{"destinationPortRange":{"min":443,"max":443}},"isStateless":false}]'
            ```
        - id: terraform
          desc: |
            To restrict unrestricted TCP egress in a VCN security list in Terraform, always specify `tcp_options` with explicit port ranges:

            ```hcl
            resource "oci_core_security_list" "example" {
              compartment_id = var.compartment_ocid
              vcn_id         = oci_core_vcn.example.id
              display_name   = "example-security-list"

              egress_security_rules {
                protocol    = "6" # TCP
                destination = "0.0.0.0/0"
                stateless   = false

                tcp_options {
                  min = 443
                  max = 443
                }
              }
            }
            ```
    refs:
      - url: https://docs.oracle.com/en-us/iaas/Content/Network/Concepts/securitylists.htm
        title: OCI security list documentation
  - uid: mondoo-oci-security-vcn-no-unrestricted-egress-all-tcp-ports-oci
    filters: asset.platform == 'oci'
    mql: |
      oci.network.securityLists.all(
        egressSecurityRules.where(_['destination'] == "0.0.0.0/0" && _['protocol'] == "6").none(_['tcpOptions'] == empty)
      )
  - uid: mondoo-oci-security-vcn-no-unrestricted-egress-all-tcp-ports-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "oci_core_security_list")
    mql: |
      terraform.resources.where(nameLabel == "oci_core_security_list").all(
        blocks.where(type == "egress_security_rules" && arguments.destination == "0.0.0.0/0" && arguments.protocol == "6").all(
          blocks.where(type == "tcp_options") != empty
        )
      )
  - uid: mondoo-oci-security-vcn-no-unrestricted-egress-all-tcp-ports-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "oci_core_security_list")
    mql: |
      terraform.plan.resourceChanges.where(type == "oci_core_security_list").all(
        change.after.egress_security_rules.where(_['destination'] == "0.0.0.0/0" && _['protocol'] == "6").none(_['tcp_options'] == empty)
      )
  - uid: mondoo-oci-security-vcn-no-unrestricted-egress-all-tcp-ports-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "oci_core_security_list")
    mql: |
      terraform.state.resources.where(type == "oci_core_security_list").all(
        values.egress_security_rules.where(_['destination'] == "0.0.0.0/0" && _['protocol'] == "6").none(_['tcp_options'] == empty)
      )
  - uid: mondoo-oci-security-compute-instance-tagging
    title: Ensure compute instances have freeform tags applied
    impact: 50
    filters: asset.platform == 'oci'
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-5-9
      compliance/nis-2: nis-2-21-2-a
      compliance/nist-csf-1: nist-csf-1-id-am-1
      compliance/nist-csf-2: nist-csf-2-id-am-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-1
      compliance/soc2-2017: soc2-control-cc6-1-1
    mql: |
      oci.compute.instances.where(state == "RUNNING").all(
        freeformTags != empty
      )
    docs:
      desc: |
        This check ensures that all running OCI compute instances have at least one freeform tag applied. Tags are essential for resource identification, cost allocation, access control, and operational management.

        **Why this matters**

        Untagged compute instances create governance and security gaps:
          •  Resources cannot be attributed to teams, projects, or cost centers.
          •  IAM policies that rely on tag-based access control cannot be enforced.
          •  Security incident response is slower when instance ownership is unknown.
          •  Compliance audits require resource classification that tags provide.
          •  Orphaned or unauthorized instances are harder to detect without tags.

        Risk mitigation
          •  Establish a mandatory tagging policy (e.g., Owner, Environment, Project, CostCenter).
          •  Apply tags at instance creation time using Terraform or launch templates.
          •  Regularly audit instances for missing or incomplete tags.
          •  Use tag-based IAM policies to enforce access boundaries.
      remediation:
        - id: console
          desc: |
            To add tags to a compute instance using the OCI Console:

            1. Navigate to **Compute > Instances**.
            2. Select the untagged instance.
            3. Under **More Actions**, select **Add Tags**.
            4. Add freeform tags following your organization's tagging policy (e.g., `Owner`, `Environment`, `Project`).
            5. Select **Add Tags**.
        - id: cli
          desc: |
            To add freeform tags to a compute instance using the OCI CLI:

            ```bash
            oci compute instance update --instance-id INSTANCE_OCID \
              --freeform-tags '{"Owner":"team-name","Environment":"production","Project":"my-project"}'
            ```
        - id: terraform
          desc: |
            To ensure compute instances have tags in Terraform, set the `freeform_tags` attribute:

            ```hcl
            resource "oci_core_instance" "example" {
              compartment_id      = var.compartment_ocid
              availability_domain = var.availability_domain
              shape               = "VM.Standard.E4.Flex"
              display_name        = "example-instance"

              freeform_tags = {
                Owner       = "team-name"
                Environment = "production"
                Project     = "my-project"
              }

              # ... other configuration
            }
            ```
    refs:
      - url: https://docs.oracle.com/en-us/iaas/Content/Tagging/Concepts/taggingoverview.htm
        title: OCI tagging documentation
