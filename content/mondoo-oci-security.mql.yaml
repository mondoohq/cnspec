  - uid: mondoo-oci-security-container-instances-approved-registry
    title: Ensure container instances pull images from the tenancy's OCIR registry
    impact: 70
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: false
      compliance/dora: false
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-5-21
      compliance/nis-2: nis-2-21-2-d
      compliance/nist-csf-1: nist-csf-1-id-sc-2
      compliance/nist-csf-2: nist-csf-2-id-ra-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sr-3
      compliance/nist-sp-800-171: false
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc9-2-2
      compliance/vda-isa-5: false
    variants:
      - uid: mondoo-oci-security-container-instances-approved-registry-oci
        tags:
          mondoo.com/filter-title: OCI
          mondoo.com/filter-icon: oci
      - uid: mondoo-oci-security-container-instances-approved-registry-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-oci-security-container-instances-approved-registry-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-oci-security-container-instances-approved-registry-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check verifies that every container in every OCI Container Instance pulls its image from an OCIR (Oracle Cloud Infrastructure Registry) host. An `imageUrl` not pointing at `*.ocir.io` means the container is pulling from Docker Hub, GitHub Container Registry, or another external registry that the tenancy does not control — creating a direct supply-chain path into production.

        **Why this matters**

        External registries are outside your organization's security controls:

        - A typo-squatted or maliciously-updated public image runs with whatever permissions the container instance's resource principal or injected credentials provide.
        - Public registries have been successfully poisoned: `linuxkit/kubelet` impersonators, crypto-mining payloads in popular base images, compromised CI pipelines pushing malicious tags.
        - OCIR supports vulnerability scanning, signing, and immutable tags; external registries may not.
        - Pulling from external registries also couples production availability to a third party's uptime.

        **Risk mitigation**

        - Forces images to go through the tenancy's OCIR pipeline, which integrates with signing and vulnerability scanning.
        - Reduces exposure to supply-chain compromises of third-party registries.
        - Creates an auditable chain of custody for every image running in production.
      remediation:
        - id: console
          desc: |
            Mirror external images into OCIR and update container specs:

            1. Mirror the required image into OCIR: `docker pull <external>:<tag> && docker tag ... <region>.ocir.io/<namespace>/<repo>:<tag> && docker push ...`.
            2. Scan the mirrored image via OCIR's integrated vulnerability scanning.
            3. In the container instance spec, change the `imageUrl` to the OCIR path.
            4. Recreate the container instance with the updated spec.
        - id: cli
          desc: |
            Recreate the container instance pointing at the OCIR copy:

            ```bash
            oci container-instances container-instance create \
              --compartment-id <compartment-ocid> \
              --display-name <name> \
              --availability-domain <ad> \
              --shape CI.Standard.E4.Flex \
              --shape-config '{"ocpus":1,"memoryInGBs":2}' \
              --containers '[{"displayName":"app","imageUrl":"<region>.ocir.io/<namespace>/<repo>:<tag>"}]'
            ```
        - id: terraform
          desc: |
            Set every `containers` block's `image_url` to a path under `<region>.ocir.io/<namespace>/<repo>:<tag>` rather than a public registry such as Docker Hub or GHCR:

            ```hcl
            resource "oci_container_instances_container_instance" "app" {
              compartment_id      = var.compartment_ocid
              display_name        = "app"
              availability_domain = var.ad
              shape               = "CI.Standard.E4.Flex"

              shape_config {
                ocpus         = 1
                memory_in_gbs = 2
              }

              vnics {
                subnet_id = oci_core_subnet.app.id
              }

              containers {
                display_name = "app"
                image_url    = "${var.region_key}.ocir.io/${var.tenancy_namespace}/app:${var.app_version}"
              }
            }
            ```
    refs:
      - url: https://docs.oracle.com/en-us/iaas/Content/container-instances/overview.htm
        title: OCI Container Instances Overview
      - url: https://docs.oracle.com/en-us/iaas/Content/Registry/Concepts/registryoverview.htm
        title: OCI Registry (OCIR)
  - uid: mondoo-oci-security-container-instances-approved-registry-oci
    filters: asset.platform == 'oci'
    mql: |
      oci.containerInstances.instances.all(
