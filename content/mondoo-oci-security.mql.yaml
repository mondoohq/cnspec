          mondoo.com/filter-title: Terraform HCL
          mondoo.com/icon: terraform
      - uid: mondoo-oci-security-object-storage-archive-buckets-versioning-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/icon: terraform
      - uid: mondoo-oci-security-object-storage-archive-buckets-versioning-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/icon: terraform
    docs:
      desc: |
        This check ensures that OCI Object Storage buckets using the Archive storage tier have versioning enabled. Archive buckets typically store long-term retention data such as backups, compliance records, and historical logs. Without versioning, deleted or overwritten archive objects are permanently lost.

        **Why this matters**

        Archive-tier buckets hold data intended for long-term preservation:
          •  Accidental deletion of archive objects cannot be undone without versioning.
          •  Compliance and legal hold requirements often mandate immutable or version-controlled storage.
          •  Restoring archive objects from backups is slow and expensive compared to version recovery.
          •  Ransomware or insider threats can permanently destroy archived data.

        Risk mitigation
          •  Enable versioning on all archive-tier buckets.
          •  Configure lifecycle policies to manage version retention costs.
          •  Consider enabling Object Lock for compliance-critical archives.
      remediation:
        - id: console
          desc: |
            To enable versioning on an archive-tier bucket using the OCI Console:

            1. Navigate to **Object Storage > Buckets**.
            2. Select the archive-tier bucket identified in this finding.
            3. Select **Edit Versioning**.
            4. Enable versioning.
            5. Select **Save Changes**.
        - id: cli
          desc: |
            To enable versioning on an archive-tier bucket using the OCI CLI:

            ```bash
            oci os bucket update --bucket-name BUCKET_NAME --versioning Enabled
            ```
        - id: terraform
          desc: |
            To enable versioning on an archive-tier bucket in Terraform, set the `versioning` attribute:

            ```hcl
            resource "oci_objectstorage_bucket" "archive" {
              compartment_id = var.compartment_ocid
              namespace      = var.namespace
              name           = "archive-bucket"
              storage_tier   = "Archive"
              versioning     = "Enabled"
            }
            ```
    refs:
      - url: https://docs.oracle.com/en-us/iaas/Content/Object/Tasks/usingversioning.htm
        title: OCI Object Storage versioning documentation
  - uid: mondoo-oci-security-object-storage-archive-buckets-versioning-oci
    filters: asset.platform == 'oci'
    mql: |
      oci.objectStorage.buckets.where(storageTier == "Archive").all(versioning == "Enabled")
  - uid: mondoo-oci-security-object-storage-archive-buckets-versioning-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "oci_objectstorage_bucket")
    mql: |
