  - uid: mondoo-oci-security-vcn-no-unrestricted-egress-all-protocols
    title: Ensure VCN security lists block unrestricted egress to 0.0.0.0/0
    impact: 70
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-6
    variants:
      - uid: mondoo-oci-security-vcn-no-unrestricted-egress-all-protocols-oci
        tags:
          mondoo.com/filter-title: OCI
          mondoo.com/filter-icon: oci
      - uid: mondoo-oci-security-vcn-no-unrestricted-egress-all-protocols-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-oci-security-vcn-no-unrestricted-egress-all-protocols-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-oci-security-vcn-no-unrestricted-egress-all-protocols-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that OCI VCN security lists do not contain egress rules that allow all outbound traffic to any destination. Unrestricted egress rules can facilitate data exfiltration and command-and-control communications from compromised instances.

        **Why this matters**

        Unrestricted egress to the internet allows compromised instances to:
          •  Exfiltrate sensitive data to attacker-controlled servers.
          •  Communicate with command-and-control (C2) infrastructure.
          •  Download additional malware or tools.
          •  Participate in DDoS attacks or cryptocurrency mining.

        Risk mitigation
          •  Restrict egress rules to specific destination CIDR blocks and protocols.
          •  Use a NAT gateway or proxy for controlled internet access.
          •  Monitor outbound traffic for anomalies.
          •  Apply the principle of least privilege to egress rules.
      remediation:
        - id: console
          desc: |
            To restrict unrestricted egress rules in a VCN security list using the OCI Console:

            1. Navigate to **Networking > Virtual Cloud Networks**.
            2. Select the VCN.
            3. Select **Security Lists**.
            4. Select the security list.
            5. Edit egress rules to specify destination CIDR blocks and protocols, replacing any rule that allows all traffic to 0.0.0.0/0.
        - id: cli
          desc: |
            To restrict unrestricted egress rules in a VCN security list using the OCI CLI, update the security list with scoped rules that specify destinations and protocols:

            ```bash
            oci network security-list update --security-list-id SECURITY_LIST_OCID \
              --egress-security-rules '<updated-rules-json>'
            ```
        - id: terraform
          desc: |
            To restrict unrestricted egress in a VCN security list in Terraform, define egress rules with specific destination CIDR blocks and protocols instead of allowing all traffic to 0.0.0.0/0:

            ```hcl
            resource "oci_core_security_list" "example" {
              compartment_id = var.compartment_ocid
              vcn_id         = oci_core_vcn.example.id
              display_name   = "example-security-list"

              egress_security_rules {
                protocol    = "6" # TCP
                destination = "10.0.0.0/16"
                stateless   = false

                tcp_options {
                  min = 443
                  max = 443
                }
              }
            }
            ```
    refs:
      - url: https://docs.oracle.com/en-us/iaas/Content/Network/Concepts/securitylists.htm
        title: OCI security list documentation
