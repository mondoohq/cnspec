      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-1-1
    variants:
      - uid: mondoo-oci-security-object-storage-buckets-not-publicly-accessible-oci
        tags:
          mondoo.com/filter-title: OCI
          mondoo.com/filter-icon: oci
      - uid: mondoo-oci-security-object-storage-buckets-not-publicly-accessible-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-oci-security-object-storage-buckets-not-publicly-accessible-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-oci-security-object-storage-buckets-not-publicly-accessible-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that OCI Object Storage buckets do not allow public access. Public buckets can be accessed by anyone on the internet, which significantly increases the risk of data exposure.

        **Why this matters**

        Publicly accessible buckets expose stored data to the internet:
          •  Sensitive data such as PII, credentials, backups, or application data can be accessed by unauthorized parties.
          •  Automated scanners continuously search for publicly accessible cloud storage.
          •  Public access may be set accidentally and go unnoticed without regular audits.

        If buckets are publicly accessible, it can lead to:
          •  Data breaches and regulatory violations (GDPR, HIPAA, PCI DSS).
          •  Exposure of internal application data, configuration files, or database backups.
          •  Non-compliance with CIS OCI Foundations Benchmark.

        Risk mitigation
          •  Set all buckets to `NoPublicAccess` unless there is an explicit, documented business requirement.
          •  Use IAM policies and pre-authenticated requests for controlled access.
          •  Regularly audit bucket access types.
      remediation:
        - id: console
          desc: |
            To restrict public access on an Object Storage bucket using the OCI Console:

            1. Navigate to **Object Storage > Buckets**.
            2. Select the bucket identified in this finding.
            3. Select **Edit Visibility**.
            4. Set visibility to **Private**.
            5. Select **Save Changes**.
        - id: cli
          desc: |
            To restrict public access on an Object Storage bucket using the OCI CLI, set the access type to `NoPublicAccess`:

            ```bash
            oci os bucket update --bucket-name BUCKET_NAME --public-access-type NoPublicAccess
            ```
        - id: terraform
          desc: |
            To restrict public access on an Object Storage bucket in Terraform, set the `access_type` to `NoPublicAccess`:

            ```hcl
            resource "oci_objectstorage_bucket" "example" {
              compartment_id = var.compartment_ocid
              namespace      = var.namespace
              name           = "example-bucket"
              access_type    = "NoPublicAccess"
            }
            ```
    refs:
      - url: https://docs.oracle.com/en-us/iaas/Content/Object/Tasks/managingbuckets.htm
        title: CIS OCI Foundations Benchmark 4.1.1
  - uid: mondoo-oci-security-object-storage-buckets-not-publicly-accessible-oci
    filters: asset.platform == "oci-objectstorage-bucket"
    mql: |
      oci.objectStorage.bucket.publicAccessType == "NoPublicAccess"
  - uid: mondoo-oci-security-object-storage-buckets-not-publicly-accessible-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "oci_objectstorage_bucket")
    mql: |
      terraform.resources.where(nameLabel == "oci_objectstorage_bucket").all(
        arguments.access_type == "NoPublicAccess" || arguments.access_type == empty
      )
  - uid: mondoo-oci-security-object-storage-buckets-not-publicly-accessible-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "oci_objectstorage_bucket")
    mql: |
      terraform.plan.resourceChanges.where(type == "oci_objectstorage_bucket").all(
