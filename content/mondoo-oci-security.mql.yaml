      )
  - uid: mondoo-oci-security-database-backups-customer-managed-encryption-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'oci_database_autonomous_database') ||
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'oci_database_database')
    mql: |
      terraform.state.resources.where(type == 'oci_database_autonomous_database').all(
        values['kms_key_id'] != null && values['kms_key_id'] != ""
      )
      terraform.state.resources.where(type == 'oci_database_database').all(
        values['database'].all(
          _['kms_key_id'] != null && _['kms_key_id'] != ""
        )
      )
  - uid: mondoo-oci-security-apigateway-deployment-no-anonymous-access
    title: Ensure API Gateway deployments do not allow anonymous access
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-16
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-5-15
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-2
    variants:
      - uid: mondoo-oci-security-apigateway-deployment-no-anonymous-access-oci
        tags:
          mondoo.com/filter-title: OCI
          mondoo.com/filter-icon: oci
      - uid: mondoo-oci-security-apigateway-deployment-no-anonymous-access-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-oci-security-apigateway-deployment-no-anonymous-access-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-oci-security-apigateway-deployment-no-anonymous-access-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that OCI API Gateway deployments are configured with anonymous access disabled (`isAnonymousAccessAllowed` set to false or absent). By default, a deployment can be created with `is_anonymous_access_allowed = true`, which allows requests without credentials to pass through even when an authentication policy is attached, turning the auth policy into an optional rather than enforced control.

        **Why this matters**

        - **Optional authentication anti-pattern:** When anonymous access is enabled alongside an authentication policy, the policy is bypassed for unauthenticated clients, eliminating the protection it was intended to provide.
        - **Development debt:** Anonymous access is typically enabled for a single public route during development and left in place when the deployment is promoted, silently removing authentication requirements from all routes.
        - **Downstream assumption breakage:** WAF rules, rate-limiting policies, and authorization middleware downstream all assume an authenticated principal; anonymous traffic invalidates every assumption these layers were designed around.
        - **Audit attribution loss:** Anonymous requests produce audit log entries with no principal identity, making it impossible to attribute actions or detect abuse patterns.

        **Risk mitigation**

        - **Enforced authentication:** Disabling anonymous access forces every request through the configured authentication policy, ensuring that only authenticated callers reach upstream backends.
        - **Attribution restoration:** With anonymous access disabled, every request carries an authenticated identity, restoring the audit trail and rate-limiting key that downstream controls depend on.
      audit: |
        ### Audit via Console

        1. Open the OCI Console and navigate to **Developer Services** > **API Gateway** > **Deployments**.
        2. For each deployment, select it and open **API Request Policies** > **Authentication**.
        3. Check whether **Enable anonymous access** is toggled on. If enabled, the deployment allows requests to bypass the authentication policy.

        A passing deployment shows **Enable anonymous access** set to off (or the option is absent because no anonymous access is permitted). A failing deployment shows **Enable anonymous access** toggled on.

        ### Audit via CLI

        1. List all API Gateway deployments:

        ```bash
        oci api-gateway deployment list \
          --compartment-id <compartment-ocid> \
          --all \
          --query 'data.items[].{Name:"display-name", OCID:id}' \
          --output table
        ```

        2. For each deployment, retrieve its specification and check the anonymous access flag:

        ```bash
        oci api-gateway deployment get \
          --deployment-id <deployment-ocid> \
          --query 'data.specification."request-policies".authentication."is-anonymous-access-allowed"' \
          --output json
        ```

        A passing deployment returns `false` or `null` for `is-anonymous-access-allowed`. A failing deployment returns `true`.
      remediation:
        - id: console
          desc: |
            Disable anonymous access on the deployment's authentication policy:

            1. Open **Developer Services** → **API Gateway** → **Deployments** → select the deployment.
            2. Open **API Request Policies** → **Authentication**.
            3. Clear **Enable anonymous access** (or set it to off).
            4. Save and deploy.
        - id: cli
          desc: |
            Update a deployment's specification with `is_anonymous_access_allowed: false` in the authentication block:

            ```bash
            oci api-gateway deployment update \
              --deployment-id <deployment-ocid> \
              --specification file://specification.json
            ```

            Where `specification.json` sets the authentication block to `"isAnonymousAccessAllowed": false`.
        - id: terraform
          desc: |
            Set `is_anonymous_access_allowed = false` on every `authentication` block in every deployment specification:

            ```hcl
            resource "oci_apigateway_deployment" "app" {
              compartment_id = var.compartment_ocid
              gateway_id     = oci_apigateway_gateway.app.id
              path_prefix    = "/v1"

              specification {
                request_policies {
                  authentication {
                    type                        = "JWT_AUTHENTICATION"
                    is_anonymous_access_allowed = false
                    issuers                     = ["https://idp.example.com/"]
                    audiences                   = ["api.example.com"]

                    public_keys {
                      type                       = "REMOTE_JWKS"
                      uri                        = "https://idp.example.com/.well-known/jwks.json"
                      max_cache_duration_in_hours = 1
                    }
                  }
                }
                routes {
                  path    = "/orders"
                  methods = ["GET", "POST"]
                  backend {
                    type = "HTTP_BACKEND"
                    url  = "https://backend.internal/orders"
                  }
                }
              }
            }
            ```
    refs:
      - url: https://docs.oracle.com/en-us/iaas/Content/APIGateway/Tasks/apigatewayusingauthenticationpolicies.htm
        title: OCI - API Gateway Authentication Policies
  - uid: mondoo-oci-security-apigateway-deployment-no-anonymous-access-oci
    filters: asset.platform == "oci-apigateway-deployment"
    mql: |
      oci.apigateway.deployment.isAnonymousAccessAllowed != true
  - uid: mondoo-oci-security-apigateway-deployment-no-anonymous-access-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'oci_apigateway_deployment')
    mql: |
      terraform.resources('oci_apigateway_deployment').all(
        blocks.where(type == 'specification').all(
          blocks.where(type == 'request_policies').all(
            blocks.where(type == 'authentication').all(
              arguments['is_anonymous_access_allowed'] != true
            )
          )
        )
      )
  - uid: mondoo-oci-security-apigateway-deployment-no-anonymous-access-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'oci_apigateway_deployment')
    mql: |
      terraform.plan.resourceChanges.where(type == 'oci_apigateway_deployment').all(
        change.after['specification'].all(
          _['request_policies'].all(
            _['authentication'].all(
              _['is_anonymous_access_allowed'] != true
            )
          )
        )
      )
  - uid: mondoo-oci-security-apigateway-deployment-no-anonymous-access-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'oci_apigateway_deployment')
    mql: |
      terraform.state.resources.where(type == 'oci_apigateway_deployment').all(
        values['specification'].all(
          _['request_policies'].all(
            _['authentication'].all(
              _['is_anonymous_access_allowed'] != true
            )
          )
        )
      )
  - uid: mondoo-oci-security-apigateway-deployment-authentication-configured
    title: Ensure API Gateway deployments require authentication
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-14
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-5-15
      compliance/nis-2: nis-2-21-2-i
