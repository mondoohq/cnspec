  - uid: mondoo-oci-security-object-storage-buckets-versioning-enabled
    title: Ensure Object Storage buckets have versioning enabled
    impact: 70
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-bcr-08
      compliance/dora: dora-art-12
      compliance/hipaa: hipaa-security-ss164-308-a-7-ii-a-contingency-plan-data-backup-plan
      compliance/iso-27001-2022: iso-27001-2022-a-8-14
      compliance/nis-2: nis-2-21-2-c
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc6-1-7
      compliance/vda-isa-5: false
    variants:
      - uid: mondoo-oci-security-object-storage-buckets-versioning-enabled-oci
        tags:
          mondoo.com/filter-title: OCI
          mondoo.com/filter-icon: oci
      - uid: mondoo-oci-security-object-storage-buckets-versioning-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-oci-security-object-storage-buckets-versioning-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-oci-security-object-storage-buckets-versioning-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that object versioning is enabled on OCI Object Storage buckets. Versioning preserves, retrieves, and restores every version of every object in a bucket, providing protection against accidental deletion or overwriting.

        **Why this matters**

        Without versioning, deleted or overwritten objects are permanently lost:
          •  Accidental deletions cannot be recovered.
          •  Ransomware or malicious actors can permanently destroy data.
          •  There is no audit trail of object modifications.

        Versioning provides:
          •  Recovery from accidental deletions and overwrites.
          •  An audit trail of all object changes.
          •  Protection against ransomware that attempts to encrypt or destroy data.

        Risk mitigation
          •  Enable versioning on all buckets containing important data.
          •  Configure lifecycle policies to manage version retention and storage costs.
          •  Regularly test recovery from versioned objects.
      remediation:
        - id: console
          desc: |
            To enable versioning on an Object Storage bucket using the OCI Console:

            1. Navigate to **Object Storage > Buckets**.
            2. Select the bucket identified in this finding.
            3. Select **Edit Versioning**.
            4. Enable versioning.
            5. Select **Save Changes**.
        - id: cli
          desc: |
            To enable versioning on an Object Storage bucket using the OCI CLI, update the bucket's versioning setting:

            ```bash
            oci os bucket update --bucket-name BUCKET_NAME --versioning Enabled
            ```
        - id: terraform
          desc: |
            To enable versioning on an Object Storage bucket in Terraform, set the `versioning` attribute to `Enabled`:

            ```hcl
            resource "oci_objectstorage_bucket" "example" {
              compartment_id = var.compartment_ocid
              namespace      = var.namespace
              name           = "example-bucket"
              versioning     = "Enabled"
            }
            ```
    refs:
      - url: https://docs.oracle.com/en-us/iaas/Content/Object/Tasks/usingversioning.htm
        title: OCI Object Storage versioning documentation
  - uid: mondoo-oci-security-object-storage-buckets-versioning-enabled-oci
    filters: asset.platform == "oci-objectstorage-bucket"
    mql: |
      oci.objectStorage.bucket.versioning == "Enabled"
  - uid: mondoo-oci-security-object-storage-buckets-versioning-enabled-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "oci_objectstorage_bucket")
    mql: |
      terraform.resources.where(nameLabel == "oci_objectstorage_bucket").all(
        arguments.versioning == "Enabled"
      )
  - uid: mondoo-oci-security-object-storage-buckets-versioning-enabled-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "oci_objectstorage_bucket")
    mql: |
      terraform.plan.resourceChanges.where(type == "oci_objectstorage_bucket").all(
        change.after.versioning == "Enabled"
      )
  - uid: mondoo-oci-security-object-storage-buckets-versioning-enabled-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "oci_objectstorage_bucket")
    mql: |
      terraform.state.resources.where(type == "oci_objectstorage_bucket").all(
        values.versioning == "Enabled"
      )
  - uid: mondoo-oci-security-object-storage-buckets-event-logging-enabled
    title: Ensure Object Storage buckets have event logging enabled
    impact: 60
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    variants:
      - uid: mondoo-oci-security-object-storage-buckets-event-logging-enabled-oci
        tags:
          mondoo.com/filter-title: OCI
          mondoo.com/filter-icon: oci
      - uid: mondoo-oci-security-object-storage-buckets-event-logging-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-oci-security-object-storage-buckets-event-logging-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-oci-security-object-storage-buckets-event-logging-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that object event logging is enabled on OCI Object Storage buckets. Event logging emits events when objects are created, updated, or deleted, enabling audit trails and automated responses.

        **Why this matters**

        Without event logging, there is no visibility into object-level operations:
          •  Unauthorized data access or modification goes undetected.
          •  Incident response is hampered by lack of activity records.
          •  Compliance audits cannot verify data access patterns.

        Event logging provides:
          •  Visibility into all object operations for security monitoring.
          •  Integration with OCI Events and Notifications for automated alerting.
          •  Audit trail for compliance requirements.

        Risk mitigation
          •  Enable object events on all buckets.
          •  Configure event rules to alert on suspicious activity.
          •  Integrate events with SIEM or logging platforms.
      remediation:
        - id: console
          desc: |
            To enable object event logging on an Object Storage bucket using the OCI Console:

            1. Navigate to **Object Storage > Buckets**.
            2. Select the bucket identified in this finding.
            3. Select **Edit**.
            4. Enable **Emit Object Events**.
            5. Select **Save Changes**.
        - id: cli
          desc: |
            To enable object event logging on an Object Storage bucket using the OCI CLI, update the bucket's event setting:

            ```bash
            oci os bucket update --bucket-name BUCKET_NAME --object-events-enabled true
            ```
        - id: terraform
          desc: |
            To enable object event logging on an Object Storage bucket in Terraform, set the `object_events_enabled` attribute to `true`:

            ```hcl
            resource "oci_objectstorage_bucket" "example" {
              compartment_id        = var.compartment_ocid
              namespace             = var.namespace
              name                  = "example-bucket"
              object_events_enabled = true
            }
            ```
    refs:
      - url: https://docs.oracle.com/en-us/iaas/Content/Object/Tasks/managingbuckets.htm
        title: OCI Object Storage events documentation
  - uid: mondoo-oci-security-object-storage-buckets-event-logging-enabled-oci
    filters: asset.platform == "oci-objectstorage-bucket"
    mql: |
      oci.objectStorage.bucket.objectEventsEnabled == true
  - uid: mondoo-oci-security-object-storage-buckets-event-logging-enabled-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "oci_objectstorage_bucket")
    mql: |
      terraform.resources.where(nameLabel == "oci_objectstorage_bucket").all(
        arguments.object_events_enabled == true
      )
  - uid: mondoo-oci-security-object-storage-buckets-event-logging-enabled-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "oci_objectstorage_bucket")
    mql: |
