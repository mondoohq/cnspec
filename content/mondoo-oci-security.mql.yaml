queries:
  # No Terraform variants: MFA activation is operational telemetry exposed by the IAM API at runtime; the `oci_identity_user` Terraform resource has no field that toggles or evidences MFA enrollment.
  - uid: mondoo-oci-security-iam-mfa-enabled-for-active-users
    title: Ensure MFA is enabled for all active IAM users
    impact: 90
    filters: asset.platform == "oci-identity-user" && oci.identity.user.state == "ACTIVE"
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-j
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-3
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-3
    mql: |
      oci.identity.user.mfaActivated == true
    docs:
      desc: |
        This check ensures that multi-factor authentication (MFA) is enabled for all active IAM users in the OCI tenancy. MFA adds an additional layer of security beyond passwords, requiring users to provide a second authentication factor when signing in.

        **Why this matters**

        Without MFA, user accounts are protected only by passwords, which are vulnerable to:
          •  Brute-force and credential stuffing attacks.
          •  Phishing attacks that trick users into revealing passwords.
          •  Password reuse across multiple services.

        If MFA is not enabled, it can lead to:
          •  Unauthorized access to the OCI console and APIs.
          •  Privilege escalation if an administrator account is compromised.
          •  Non-compliance with CIS OCI Foundations Benchmark, NIST 800-53, and PCI DSS.

        Risk mitigation
          •  Enable MFA for all active IAM users, especially those with administrative privileges.
          •  Use TOTP-based authenticator apps for the second factor.
          •  Regularly audit MFA enrollment status.
      remediation:
        - id: console
          desc: |
            To enable MFA for IAM users using the OCI Console:

            1. Navigate to **Identity & Security > Users**.
            2. Select the user.
            3. Under **Resources**, select **Multi-Factor Authentication**.
            4. Select **Enable Multi-Factor Authentication** and follow the setup instructions.
            5. Repeat for each active user that does not have MFA enabled.
        - id: cli
          desc: |
            MFA must be enabled by each user through the Console. To identify users without MFA using the OCI CLI, list their MFA status:

            ```bash
            oci iam user list --query "data[?\"is-mfa-activated\"==\`false\`].{Name:name, MFA:\"is-mfa-activated\"}" --output table
            ```

            Contact each listed user and direct them to enable MFA through their OCI Console profile settings.
    refs:
      - url: https://docs.oracle.com/en-us/iaas/Content/Identity/Tasks/usingmfa.htm
        title: CIS OCI Foundations Benchmark 1.7
  # No Terraform variants: email verification is end-user-driven runtime state on the IAM identity; the `oci_identity_user` Terraform resource sets the email but cannot express whether it has been verified.
  - uid: mondoo-oci-security-iam-user-emails-verified
    title: Ensure IAM user email addresses are verified
    impact: 60
    filters: asset.platform == "oci-identity-user" && oci.identity.user.state == "ACTIVE" && oci.identity.user.email != ""
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-j
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-1
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-8
      compliance/vda-isa-5: vda-isa-5-4-1-3
    mql: |
      oci.identity.user.emailVerified == true
    docs:
      desc: |
        This check ensures that all active IAM users with email addresses have verified their email. Unverified emails may indicate misconfigured accounts or accounts that were never properly set up.

        **Why this matters**

        Unverified email addresses create security and operational risks:
          •  Password reset and account recovery notifications may not reach the intended user.
          •  Security alerts about suspicious account activity cannot be delivered.
          •  Unverified accounts may indicate orphaned or misconfigured user identities.

        Risk mitigation
          •  Require email verification for all IAM users during account creation.
          •  Periodically audit user accounts for unverified email addresses.
          •  Disable accounts with unverified emails that have not been resolved within a set time frame.
      remediation:
        - id: console
          desc: |
            To verify IAM user email addresses using the OCI Console:

            1. Navigate to **Identity & Security > Users**.
            2. Identify users with unverified email addresses.
            3. Contact those users and ask them to verify their email through their user profile settings.
        - id: cli
          desc: |
            To identify users with unverified email addresses using the OCI CLI, list their verification status:

            ```bash
            oci iam user list --query "data[?\"lifecycle-state\"=='ACTIVE' && \"email-verified\"==\`false\` && email!=null].{Name:name, Email:email, Verified:\"email-verified\"}" --output table
            ```

            Contact each listed user and ask them to verify their email through the OCI Console.
    refs:
      - url: https://docs.oracle.com/en-us/iaas/Content/Identity/Tasks/managingusers.htm
        title: OCI IAM user management
  - uid: mondoo-oci-security-iam-no-overly-permissive-policies
    title: Ensure no IAM policies grant manage all-resources in tenancy
    impact: 90
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-2
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-3-1
      compliance/vda-isa-5: vda-isa-5-4-1-1
    variants:
      - uid: mondoo-oci-security-iam-no-overly-permissive-policies-oci
        tags:
          mondoo.com/filter-title: OCI
          mondoo.com/filter-icon: oci
      - uid: mondoo-oci-security-iam-no-overly-permissive-policies-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-oci-security-iam-no-overly-permissive-policies-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-oci-security-iam-no-overly-permissive-policies-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that no IAM policies grant the `manage all-resources in tenancy` permission, which gives unrestricted administrative access to all resources in the entire tenancy.

        **Why this matters**

        The `manage all-resources in tenancy` statement is the most permissive policy possible in OCI:
          •  It grants full administrative control over every resource in every compartment.
          •  Groups assigned this policy can create, modify, and delete any resource including IAM configurations.
          •  A compromised user in such a group has unlimited blast radius across the entire tenancy.
          •  This violates the principle of least privilege and makes access auditing difficult.

        Risk mitigation
          •  Replace broad tenancy-level policies with compartment-scoped policies.
          •  Use specific resource types instead of `all-resources`.
          •  Grant only the minimum permissions required for each group's function.
          •  Regularly audit IAM policies for overly permissive statements.
      remediation:
        - id: console
          desc: |
            To replace overly permissive IAM policies with scoped policies using the OCI Console:

            1. Navigate to **Identity & Security > Policies**.
            2. Identify policies containing `manage all-resources in tenancy`.
            3. Replace with scoped policies that grant access to specific resource types in specific compartments:

            ```
            # Instead of:
            Allow group Admins to manage all-resources in tenancy

            # Use scoped policies:
            Allow group NetworkAdmins to manage virtual-network-family in compartment NetworkCompartment
            Allow group ComputeAdmins to manage instance-family in compartment ComputeCompartment
            ```
        - id: cli
          desc: |
            To identify and replace overly permissive IAM policies using the OCI CLI, start by listing all policies in the tenancy:

            ```bash
            oci iam policy list --compartment-id TENANCY_OCID --all --query "data[].{Name:name, Statements:statements}" --output table
            ```

            Review the output for any statements containing `manage all-resources in tenancy`. For each match, update the policy to use compartment-scoped statements with specific resource types:

            ```bash
            oci iam policy update --policy-id POLICY_OCID \
              --statements '["Allow group NetworkAdmins to manage virtual-network-family in compartment NetworkCompartment"]'
            ```
        - id: terraform
          desc: |
            To enforce scoped IAM policies in Terraform, define policies that grant access to specific resource types in specific compartments instead of `manage all-resources in tenancy`:

            ```hcl
            resource "oci_identity_policy" "network_admins" {
              compartment_id = var.tenancy_ocid
              name           = "NetworkAdminPolicy"
              description    = "Scoped policy for network admins"

              statements = [
                "Allow group NetworkAdmins to manage virtual-network-family in compartment NetworkCompartment",
              ]
            }

            resource "oci_identity_policy" "compute_admins" {
              compartment_id = var.tenancy_ocid
              name           = "ComputeAdminPolicy"
              description    = "Scoped policy for compute admins"

              statements = [
                "Allow group ComputeAdmins to manage instance-family in compartment ComputeCompartment",
              ]
            }
            ```
    refs:
      - url: https://docs.oracle.com/en-us/iaas/Content/Identity/Concepts/policies.htm
        title: CIS OCI Foundations Benchmark 1.1
  - uid: mondoo-oci-security-iam-no-overly-permissive-policies-oci
    filters: asset.platform == "oci-identity-policy"
    mql: |
      oci.identity.policy.statements.none(_ == /allow.*manage\s+all-resources\s+in\s+tenancy/i)
  - uid: mondoo-oci-security-iam-no-overly-permissive-policies-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "oci_identity_policy")
    mql: |
      terraform.resources.where(nameLabel == "oci_identity_policy").none(
        arguments.statements.any(_ == /allow.*manage\s+all-resources\s+in\s+tenancy/i)
      )
  - uid: mondoo-oci-security-iam-no-overly-permissive-policies-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "oci_identity_policy")
    mql: |
      terraform.plan.resourceChanges.where(type == "oci_identity_policy").none(
        change.after.statements.any(_ == /allow.*manage\s+all-resources\s+in\s+tenancy/i)
      )
  - uid: mondoo-oci-security-iam-no-overly-permissive-policies-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "oci_identity_policy")
    mql: |
      terraform.state.resources.where(type == "oci_identity_policy").none(
        values.statements.any(_ == /allow.*manage\s+all-resources\s+in\s+tenancy/i)
      )
  # No Terraform variants: requires correlating user lifecycle-state with API-key state, both of which are runtime-only — `oci_identity_api_key` has no `state` argument and `oci_identity_user` has no field that exposes ACTIVE/INACTIVE lifecycle.
  - uid: mondoo-oci-security-iam-inactive-users-no-active-api-keys
    title: Ensure inactive users have no active API keys
    impact: 80
    filters: asset.platform == "oci-identity-user" && oci.identity.user.state != "ACTIVE"
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-5-17
      compliance/nis-2: nis-2-21-2-g
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-12
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-10
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-2-2
      compliance/vda-isa-5: vda-isa-5-4-1-1
    mql: |
      oci.identity.user.apiKeys.none(state == "ACTIVE")
    docs:
      desc: |
        This check ensures that IAM users in an inactive state do not have active API keys. Active API keys on inactive accounts represent unused credentials that could be exploited if compromised.

        **Why this matters**

        API keys on inactive user accounts are a significant credential hygiene risk:
          •  Inactive users have left the organization or no longer need access, but their API keys may still function.
          •  Compromised API keys provide programmatic access to OCI resources.
          •  Orphaned credentials are a common vector in cloud security breaches.

        Risk mitigation
          •  Delete or deactivate API keys when user accounts are deactivated.
          •  Implement automated credential cleanup as part of user offboarding.
          •  Regularly audit API keys across all users for stale or unnecessary credentials.
      remediation:
        - id: console
          desc: |
            To remove active API keys from inactive users using the OCI Console:

            1. Navigate to **Identity & Security > Users**.
            2. Select the inactive user.
            3. Under **Resources**, select **API Keys**.
            4. Delete all active API keys associated with the user.
        - id: cli
          desc: |
            To remove active API keys from inactive users using the OCI CLI, start by listing the keys for the user:

            ```bash
            oci iam user api-key list --user-id USER_OCID
            ```

            For each key with an `ACTIVE` state, delete it by specifying its fingerprint:

            ```bash
            oci iam user api-key delete --user-id USER_OCID --fingerprint KEY_FINGERPRINT
            ```
    refs:
      - url: https://docs.oracle.com/en-us/iaas/Content/Identity/Tasks/managingcredentials.htm
        title: OCI API key management
  # No Terraform variants: requires correlating user lifecycle-state with auth-token state, both of which are runtime-only — `oci_identity_auth_token` has no `state` argument and `oci_identity_user` has no field that exposes ACTIVE/INACTIVE lifecycle.
  - uid: mondoo-oci-security-iam-inactive-users-no-active-auth-tokens
    title: Ensure inactive users have no active auth tokens
    impact: 80
    filters: asset.platform == "oci-identity-user" && oci.identity.user.state != "ACTIVE"
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-5-17
      compliance/nis-2: nis-2-21-2-g
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-12
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-10
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-2-2
      compliance/vda-isa-5: vda-isa-5-4-1-1
    mql: |
      oci.identity.user.authTokens.none(state == "ACTIVE")
    docs:
      desc: |
        This check ensures that IAM users in an inactive state do not have active authentication tokens. Active auth tokens on inactive accounts represent unused credentials that could be exploited if compromised.

        **Why this matters**

        Authentication tokens on inactive accounts pose a credential hygiene risk:
          •  Auth tokens provide access to OCI APIs and can be used independently of user account status.
          •  Orphaned tokens may go unnoticed during security audits if not linked to active user reviews.
          •  Compromised tokens allow unauthorized API access to OCI resources.

        Risk mitigation
          •  Delete auth tokens when user accounts are deactivated.
          •  Implement automated credential cleanup during user offboarding.
          •  Regularly audit auth tokens across all users.
      remediation:
        - id: console
          desc: |
            To remove active auth tokens from inactive users using the OCI Console:

            1. Navigate to **Identity & Security > Users**.
            2. Select the inactive user.
            3. Under **Resources**, select **Auth Tokens**.
            4. Delete all active auth tokens associated with the user.
        - id: cli
          desc: |
            To remove active auth tokens from inactive users using the OCI CLI, start by listing the tokens for the user:

            ```bash
            oci iam auth-token list --user-id USER_OCID
            ```

            For each token with an `ACTIVE` state, delete it:

            ```bash
            oci iam auth-token delete --user-id USER_OCID --auth-token-id TOKEN_OCID
            ```
    refs:
      - url: https://docs.oracle.com/en-us/iaas/Content/Identity/Tasks/managingcredentials.htm
        title: OCI auth token management
  - uid: mondoo-oci-security-object-storage-buckets-not-publicly-accessible
    title: Ensure Object Storage buckets are not publicly accessible
