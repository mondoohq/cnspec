      )
  - uid: mondoo-oci-security-iam-no-cross-tenant-policies
    title: Ensure no IAM policies grant cross-tenancy access via Endorse or Admit
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-5-19
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-id-sc-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-4
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-3
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc9-2-1
      compliance/vda-isa-5: vda-isa-5-5-3-4
    variants:
      - uid: mondoo-oci-security-iam-no-cross-tenant-policies-oci
        tags:
          mondoo.com/filter-title: OCI
          mondoo.com/filter-icon: oci
      - uid: mondoo-oci-security-iam-no-cross-tenant-policies-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-oci-security-iam-no-cross-tenant-policies-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-oci-security-iam-no-cross-tenant-policies-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that OCI IAM policies contain no `Endorse` or `Admit` statements that establish cross-tenancy trust relationships without explicit ongoing business justification. By default, OCI permits these statements, which extend the tenancy's trust boundary to external parties and are a common source of undiscovered data-sharing with vendor or partner tenancies.

        **Why this matters**

        - **Extended trust boundary:** An `Admit` statement allows principals from a remote tenancy to operate inside your tenancy, sometimes with broad permissions that were appropriate at onboarding but have since expanded or expired.
        - **Partner compromise equivalence:** An attacker who compromises a partner tenancy immediately inherits every `Admit` grant that points at it, gaining access to your resources without compromising your own tenancy.
        - **Audit path gap:** Cross-tenancy policy changes often arrive through vendor onboarding runbooks without security-team review, creating grants that are unknown to the team responsible for access governance.
        - **Endorsement risk:** `Endorse` statements export permissions from your tenancy to a partner; a partner's account compromise becomes your data-loss event.

        **Risk mitigation**

        - **Periodic grant review:** Inventorying and reviewing every `Endorse` and `Admit` statement on a regular cadence ensures that lapsed partnerships do not leave permanent access grants behind.
        - **Narrow scoping:** When cross-tenancy grants are genuinely required, limiting them to the narrowest possible resource type and action set reduces the impact of a partner compromise.
      audit: |
        ### Audit via Console

        1. Open the OCI Console and navigate to **Identity & Security** > **Policies**.
        2. Select each policy in the tenancy root compartment (cross-tenancy policies must live at the root).
        3. Read the policy statements. Flag any statement that begins with `Endorse` or `Admit`.

        A passing policy contains no `Endorse` or `Admit` statements, or those present have been reviewed and carry documented business justification. A failing policy contains at least one `Endorse` or `Admit` statement with no confirmed current business need.

        ### Audit via CLI

        1. List all tenancy-level policies and search for cross-tenancy statements:

        ```bash
        oci iam policy list \
          --compartment-id <tenancy-ocid> \
          --all \
          --query 'data[?contains(join(`" "`, statements), `Endorse`) || contains(join(`" "`, statements), `Admit`)].{Name:name, Statements:statements}' \
          --output json
        ```

        A passing tenancy returns an empty list. A failing tenancy returns one or more policies whose statements include `Endorse` or `Admit` verbs.
      remediation:
        - id: console
          desc: |
            Review and tighten cross-tenancy policy statements:

            1. Open **Identity & Security** → **Policies** → select the flagged policy.
            2. For each `Endorse` or `Admit` statement, confirm the remote tenancy OCID is still an active partner and the grant matches the current business need.
            3. Narrow the resource scope (prefer specific resource types over `all-resources`) and action set (prefer `read` or `inspect` over `manage`).
            4. Remove any statement whose business justification can no longer be demonstrated.
        - id: cli
          desc: |
            List policies and find cross-tenancy statements:

            ```bash
            oci iam policy list --compartment-id <tenancy-ocid> --all \
              --query "data[?contains(join(' ', statements), 'Endorse') || contains(join(' ', statements), 'Admit')].{Name:name, Statements:statements}" \
              --output json
            ```

            Replace with narrower statements as needed:

            ```bash
            oci iam policy update --policy-id <policy-ocid> \
              --statements '["Admit group PartnerReaders of tenancy <partner-tenancy-ocid> to read objects in compartment SharedData where target.bucket.name = '"'"'shared'"'"'"]'
            ```
        - id: terraform
          desc: |
            Avoid `Endorse` and `Admit` statements unless a specific cross-tenancy partnership requires them; when they are required, scope to a narrow resource and action set:

            ```hcl
            # Prefer in-tenancy grants:
            resource "oci_identity_policy" "in_tenancy" {
              compartment_id = var.tenancy_ocid
              name           = "AppReaders"
              description    = "Read access for the application team"

              statements = [
                "Allow group AppReaders to read objects in compartment AppData",
              ]
            }

            # If a cross-tenancy grant is required, narrow the resource and action:
            resource "oci_identity_policy" "partner_admit" {
              compartment_id = var.tenancy_ocid
              name           = "PartnerAdmit"
              description    = "Read-only access for vetted partner tenancy"

              statements = [
                "Admit group PartnerReaders of tenancy ${var.partner_tenancy_ocid} to read objects in compartment SharedData where target.bucket.name='shared'",
              ]
            }
            ```
    refs:
      - url: https://docs.oracle.com/en-us/iaas/Content/Identity/Concepts/policiesaccessingtenancies.htm
        title: OCI - Accessing Resources Across Tenancies
  - uid: mondoo-oci-security-iam-no-cross-tenant-policies-oci
    filters: asset.platform == "oci-identity-policy"
    mql: |
      oci.identity.policy.statements.none(_ == /^\s*(endorse|admit)\s+/i)
  - uid: mondoo-oci-security-iam-no-cross-tenant-policies-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "oci_identity_policy")
    mql: |
      terraform.resources("oci_identity_policy").none(
        arguments.statements.any(_ == /^\s*(endorse|admit)\s+/i)
      )
  - uid: mondoo-oci-security-iam-no-cross-tenant-policies-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "oci_identity_policy")
    mql: |
      terraform.plan.resourceChanges.where(type == "oci_identity_policy").none(
        change.after.statements.any(_ == /^\s*(endorse|admit)\s+/i)
      )
  - uid: mondoo-oci-security-iam-no-cross-tenant-policies-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "oci_identity_policy")
    mql: |
      terraform.state.resources.where(type == "oci_identity_policy").none(
        values.statements.any(_ == /^\s*(endorse|admit)\s+/i)
      )
  - uid: mondoo-oci-security-vcn-no-unrestricted-ingress-db-ports
    title: Ensure VCN security lists block database port ingress from 0.0.0.0/0
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-6
    variants:
      - uid: mondoo-oci-security-vcn-no-unrestricted-ingress-db-ports-oci
        tags:
          mondoo.com/filter-title: OCI
          mondoo.com/filter-icon: oci
      - uid: mondoo-oci-security-vcn-no-unrestricted-ingress-db-ports-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-oci-security-vcn-no-unrestricted-ingress-db-ports-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-oci-security-vcn-no-unrestricted-ingress-db-ports-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that VCN security lists are configured to block TCP ingress from the public internet (`0.0.0.0/0`) to common database listener ports, including Oracle (1521, 1522), SQL Server (1433), MySQL (3306), PostgreSQL (5432), Redis (6379), Elasticsearch (9200), and MongoDB (27017). By default, OCI security lists permit any traffic until explicitly restricted, and database ports opened to the internet are a high-value, frequently exploited target.

        **Why this matters**

        - **Mass exploitation campaigns:** Public MongoDB, Elasticsearch, and Redis instances have been the target of repeated mass-ransom campaigns since 2017; scanners identify and exploit these within hours of exposure.
        - **Brute-force credential attacks:** Open MySQL, PostgreSQL, MSSQL, and Oracle listeners allow credential brute-force against whatever accounts the database instance has, with poor or no logging of failed attempts.
        - **Schema and data leakage:** Even read-only exposure leaks schema structure, column names, and data samples that enable follow-up social engineering and more targeted attacks.
        - **Forensic blind spot:** Most database engines log failed authentication poorly, meaning attacks on an exposed listener leave minimal evidence for incident response.

        **Risk mitigation**

        - **Private network access only:** Database traffic should flow through a VPN, bastion, private subnet, or OCI Service Gateway, never through a public ingress rule in a security list.
        - **Incident signal treatment:** Any new security-list rule matching this pattern should be treated as an incident signal, not a routine policy violation, and investigated immediately.
      audit: |
        ### Audit via Console

        1. Open the OCI Console and navigate to **Networking** > **Virtual Cloud Networks**.
        2. For each VCN, open **Security Lists** and select each security list.
        3. Under **Ingress Rules**, look for any rule where **Source** is `0.0.0.0/0`, **Protocol** is `TCP`, and the **Destination Port Range** includes any of the following ports: 1433 (SQL Server), 1521-1522 (Oracle), 3306 (MySQL), 5432 (PostgreSQL), 6379 (Redis), 9200 (Elasticsearch), or 27017 (MongoDB).

        A passing security list has no ingress rule that allows `0.0.0.0/0` TCP access to any of the database ports listed above. A failing security list contains at least one such rule.

        ### Audit via CLI

        1. List all security lists in a compartment:

        ```bash
        oci network security-list list \
          --compartment-id <compartment-ocid> \
          --all \
          --query 'data[].{Name:"display-name", OCID:id}' \
          --output table
        ```

        2. For each security list, retrieve ingress rules and check for public DB port access:

        ```bash
        oci network security-list get \
          --security-list-id <security-list-ocid> \
          --query 'data."ingress-security-rules"[?source==`0.0.0.0/0` && protocol==`6`].{Source:source, MinPort:"tcp-options"."destination-port-range".min, MaxPort:"tcp-options"."destination-port-range".max}' \
          --output table
        ```

        A passing security list returns no TCP ingress rules from `0.0.0.0/0` whose port range covers 1433, 1521, 1522, 3306, 5432, 6379, 9200, or 27017. A failing security list returns at least one rule covering one of those ports.
      remediation:
        - id: console
          desc: |
            Remove public DB-port ingress rules from the security list:

            1. Open **Networking** → **Virtual Cloud Networks** → the parent VCN → **Security Lists** → select the flagged list.
            2. Under **Ingress Rules**, identify any rule whose source is `0.0.0.0/0`, protocol is TCP, and destination port covers one of the database ports above.
            3. Delete the rule, or restrict the source CIDR to the bastion / VPN network that legitimately needs DB access.
            4. If an application outside OCI needs DB access, provision an OCI Service Gateway, VPN, or FastConnect path rather than opening the port.
        - id: cli
          desc: |
            Replace the ingress rules on the security list with a scoped set:

            ```bash
            oci network security-list update --security-list-id <security-list-ocid> \
              --ingress-security-rules '[{"source":"10.10.0.0/16","protocol":"6","tcpOptions":{"destinationPortRange":{"min":5432,"max":5432}},"isStateless":false}]'
            ```
        - id: terraform
          desc: |
            Scope `ingress_security_rules` blocks so that no rule from `0.0.0.0/0` permits TCP ranges covering 1433, 1521, 1522, 3306, 5432, 6379, 9200, or 27017 — limit DB-port access to internal networks instead:

            ```hcl
            resource "oci_core_security_list" "db" {
              compartment_id = var.compartment_ocid
              vcn_id         = oci_core_vcn.main.id
              display_name   = "db-tier"

              ingress_security_rules {
                source      = "10.0.0.0/16"
                source_type = "CIDR_BLOCK"
                protocol    = "6"

                tcp_options {
                  destination_port_range {
                    min = 5432
                    max = 5432
                  }
                }
              }
            }
            ```
    refs:
      - url: https://docs.oracle.com/en-us/iaas/Content/Network/Concepts/securitylists.htm
        title: OCI - Security Lists
  - uid: mondoo-oci-security-vcn-no-unrestricted-ingress-db-ports-oci
    filters: asset.platform == "oci-network-securitylist"
    mql: |
      oci.network.securityList.ingressSecurityRules.where(
        _['source'] == "0.0.0.0/0" && _['protocol'] == "6" && _['tcpOptions'] != empty
      ).none(
        _['tcpOptions']['destinationPortRange']['min'] <= 1521 && _['tcpOptions']['destinationPortRange']['max'] >= 1521 ||
        _['tcpOptions']['destinationPortRange']['min'] <= 1522 && _['tcpOptions']['destinationPortRange']['max'] >= 1522 ||
        _['tcpOptions']['destinationPortRange']['min'] <= 1433 && _['tcpOptions']['destinationPortRange']['max'] >= 1433 ||
        _['tcpOptions']['destinationPortRange']['min'] <= 3306 && _['tcpOptions']['destinationPortRange']['max'] >= 3306 ||
        _['tcpOptions']['destinationPortRange']['min'] <= 5432 && _['tcpOptions']['destinationPortRange']['max'] >= 5432 ||
        _['tcpOptions']['destinationPortRange']['min'] <= 6379 && _['tcpOptions']['destinationPortRange']['max'] >= 6379 ||
        _['tcpOptions']['destinationPortRange']['min'] <= 9200 && _['tcpOptions']['destinationPortRange']['max'] >= 9200 ||
        _['tcpOptions']['destinationPortRange']['min'] <= 27017 && _['tcpOptions']['destinationPortRange']['max'] >= 27017
      )
  - uid: mondoo-oci-security-vcn-no-unrestricted-ingress-db-ports-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "oci_core_security_list")
    mql: |
      # A 0.0.0.0/0 TCP ingress rule with no tcp_options block opens every TCP port (including the DB ports below), so require the block to exist before scoping the port range.
      terraform.resources("oci_core_security_list").all(
        blocks.where(type == "ingress_security_rules" && arguments.source == "0.0.0.0/0" && arguments.protocol == "6").all(
          blocks.where(type == "tcp_options") != empty &&
          blocks.where(type == "tcp_options").all(
            blocks.where(type == "destination_port_range").none(
              arguments['min'] <= 1521 && arguments['max'] >= 1521 ||
              arguments['min'] <= 1522 && arguments['max'] >= 1522 ||
              arguments['min'] <= 1433 && arguments['max'] >= 1433 ||
              arguments['min'] <= 3306 && arguments['max'] >= 3306 ||
              arguments['min'] <= 5432 && arguments['max'] >= 5432 ||
              arguments['min'] <= 6379 && arguments['max'] >= 6379 ||
              arguments['min'] <= 9200 && arguments['max'] >= 9200 ||
              arguments['min'] <= 27017 && arguments['max'] >= 27017
            )
          )
        )
      )
  - uid: mondoo-oci-security-vcn-no-unrestricted-ingress-db-ports-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "oci_core_security_list")
    mql: |
      # An ingress rule with source 0.0.0.0/0 + protocol "6" (TCP) and no tcp_options opens every TCP port, so flag missing tcp_options as a failure in addition to overlapping DB port ranges.
      terraform.plan.resourceChanges.where(type == "oci_core_security_list").all(
        change.after.ingress_security_rules.where(_['source'] == "0.0.0.0/0" && _['protocol'] == "6").none(
          _['tcp_options'] == empty ||
          _['tcp_options']['destination_port_range']['min'] <= 1521 && _['tcp_options']['destination_port_range']['max'] >= 1521 ||
          _['tcp_options']['destination_port_range']['min'] <= 1522 && _['tcp_options']['destination_port_range']['max'] >= 1522 ||
          _['tcp_options']['destination_port_range']['min'] <= 1433 && _['tcp_options']['destination_port_range']['max'] >= 1433 ||
          _['tcp_options']['destination_port_range']['min'] <= 3306 && _['tcp_options']['destination_port_range']['max'] >= 3306 ||
          _['tcp_options']['destination_port_range']['min'] <= 5432 && _['tcp_options']['destination_port_range']['max'] >= 5432 ||
          _['tcp_options']['destination_port_range']['min'] <= 6379 && _['tcp_options']['destination_port_range']['max'] >= 6379 ||
          _['tcp_options']['destination_port_range']['min'] <= 9200 && _['tcp_options']['destination_port_range']['max'] >= 9200 ||
          _['tcp_options']['destination_port_range']['min'] <= 27017 && _['tcp_options']['destination_port_range']['max'] >= 27017
        )
      )
  - uid: mondoo-oci-security-vcn-no-unrestricted-ingress-db-ports-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "oci_core_security_list")
    mql: |
      # An ingress rule with source 0.0.0.0/0 + protocol "6" (TCP) and no tcp_options opens every TCP port, so flag missing tcp_options as a failure in addition to overlapping DB port ranges.
      terraform.state.resources.where(type == "oci_core_security_list").all(
        values.ingress_security_rules.where(_['source'] == "0.0.0.0/0" && _['protocol'] == "6").none(
          _['tcp_options'] == empty ||
          _['tcp_options']['destination_port_range']['min'] <= 1521 && _['tcp_options']['destination_port_range']['max'] >= 1521 ||
          _['tcp_options']['destination_port_range']['min'] <= 1522 && _['tcp_options']['destination_port_range']['max'] >= 1522 ||
          _['tcp_options']['destination_port_range']['min'] <= 1433 && _['tcp_options']['destination_port_range']['max'] >= 1433 ||
          _['tcp_options']['destination_port_range']['min'] <= 3306 && _['tcp_options']['destination_port_range']['max'] >= 3306 ||
          _['tcp_options']['destination_port_range']['min'] <= 5432 && _['tcp_options']['destination_port_range']['max'] >= 5432 ||
          _['tcp_options']['destination_port_range']['min'] <= 6379 && _['tcp_options']['destination_port_range']['max'] >= 6379 ||
          _['tcp_options']['destination_port_range']['min'] <= 9200 && _['tcp_options']['destination_port_range']['max'] >= 9200 ||
          _['tcp_options']['destination_port_range']['min'] <= 27017 && _['tcp_options']['destination_port_range']['max'] >= 27017
        )
      )
  - uid: mondoo-oci-security-vcn-no-unrestricted-ingress-legacy-admin-ports
    title: Ensure VCN security lists block legacy admin port ingress from 0.0.0.0/0
    impact: 80
    tags:
