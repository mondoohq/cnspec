  - uid: mondoo-oci-security-object-storage-retention-rules-locked
    title: Ensure object storage bucket retention rules are locked
    impact: 80
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-bcr-08
      compliance/dora: dora-art-12
      compliance/hipaa: hipaa-security-ss164-308-a-7-ii-a-contingency-plan-data-backup-plan
      compliance/iso-27001-2022: iso-27001-2022-a-8-13
      compliance/nis-2: nis-2-21-2-c
      compliance/nist-csf-1: nist-csf-1-pr-ip-4
      compliance/nist-csf-2: nist-csf-2-pr-ds-11
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cp-9
      compliance/nist-sp-800-171: nist-sp-800-171--3-8-9
      compliance/pci-dss-4: false
      compliance/soc2-2017: false
      compliance/vda-isa-5: false
    variants:
      - uid: mondoo-oci-security-object-storage-retention-rules-locked-oci
        tags:
          mondoo.com/filter-title: OCI
          mondoo.com/filter-icon: oci
      - uid: mondoo-oci-security-object-storage-retention-rules-locked-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-oci-security-object-storage-retention-rules-locked-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-oci-security-object-storage-retention-rules-locked-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check verifies that every retention rule on every Object Storage bucket has passed its lock time (`timeRuleLocked != null && <= now`). An unlocked retention rule can be modified or deleted by anyone with bucket-admin permissions, which means the "immutable" retention the bucket advertises is actually soft — useless against a ransomware operator or malicious insider who already has admin on the bucket.

        Scope note: buckets with zero retention rules pass this check vacuously (MQL's `.all()` on an empty list is `true`). The check's job is to validate *existing* retention rules are locked; whether a particular bucket needs retention at all is a separate policy decision (an organization may legitimately not require retention on working-set buckets). If you want to ensure specific buckets *do* carry retention, pair this check with a data-classification or tag-based policy that enforces retention presence on buckets tagged as backup / archive / regulated.

        **Why this matters**

        Retention rules are the WORM (write-once-read-many) guarantee for object storage:

        - The point of a retention rule is to survive a compromise of the account that stores the data; if the rule is deletable, a compromised admin can remove it before deleting the objects.
        - Ransomware operators specifically target backup stores — their first step is often to find and delete retention controls, then encrypt or delete the data.
        - An unlocked rule is indistinguishable at the object level from having no rule at all.
        - Once locked, a retention rule can only be shortened, never removed, and only during a narrow review window — which is the property that makes it a real security control.

        **Risk mitigation**

        - Ensures retention commitments survive admin-level account compromise.
        - Provides genuine WORM semantics for regulatory and ransomware-recovery scenarios.
        - Removes the ability of a single malicious admin to erase the retention control before data destruction.
      remediation:
        - id: console
          desc: |
            Lock retention rules on every bucket that stores data with retention requirements:

            1. Open **Storage** → **Buckets** → select the bucket → **Retention Rules**.
            2. For each unlocked rule, select **Edit** → set **Rule Locked Time** to a date no sooner than 14 days in the future (OCI enforces a 14-day grace period before the lock takes effect).
            3. Save. After the grace period passes, the rule becomes non-deletable for the duration of its lifetime.
            4. Plan retention carefully — after lock, the rule can be shortened but not removed.
        - id: cli
          desc: |
            Lock an existing retention rule:

            ```bash
            oci os retention-rule update \
              --namespace-name <namespace> \
              --bucket-name <bucket> \
              --retention-rule-id <rule-ocid> \
              --time-rule-locked 2026-05-01T00:00:00Z
            ```
        - id: terraform
          desc: |
            Set `time_rule_locked` on every `retention_rules` block to an RFC 3339 timestamp at least 14 days in the future so the rule transitions to a non-deletable lock. Use a fixed value committed in your repository. Do not use `timeadd(timestamp(), ...)` directly on this attribute, because `timestamp()` evaluates on every plan and would produce a perpetual diff. Update the value when you intentionally roll the lock, and add `lifecycle.ignore_changes = [retention_rules]` after the first apply if you want Terraform to stop tracking drift on the locked rule:

            ```hcl
            resource "oci_objectstorage_bucket" "backups" {
              compartment_id = var.compartment_ocid
              namespace      = var.namespace
              name           = "backups"
              access_type    = "NoPublicAccess"

              retention_rules {
                display_name     = "regulatory-90d"
                time_rule_locked = "2099-01-01T00:00:00Z" # set to a real future RFC 3339 timestamp ≥ 14 days from apply

                duration {
                  time_amount = 90
                  time_unit   = "DAYS"
                }
              }
            }
            ```
    refs:
      - url: https://docs.oracle.com/en-us/iaas/Content/Object/Tasks/usingretentionrules.htm
        title: OCI - Using Retention Rules
  - uid: mondoo-oci-security-object-storage-retention-rules-locked-oci
    filters: asset.platform == "oci-objectstorage-bucket"
    mql: |
      oci.objectStorage.bucket.retentionRules.all(
        timeRuleLocked != null && timeRuleLocked <= time.now
      )
  - uid: mondoo-oci-security-object-storage-retention-rules-locked-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'oci_objectstorage_bucket')
    mql: |
      # Every retention_rules block on the bucket must declare a non-null time_rule_locked. Terraform cannot evaluate "lock time has passed" at plan time, so this stricter variant requires the lock time to be set at all.
      terraform.resources('oci_objectstorage_bucket').all(
        blocks.where(type == 'retention_rules').all(
          arguments['time_rule_locked'] != null
        )
      )
  - uid: mondoo-oci-security-object-storage-retention-rules-locked-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'oci_objectstorage_bucket')
    mql: |
      terraform.plan.resourceChanges.where(type == 'oci_objectstorage_bucket').all(
        change.after['retention_rules'] == null ||
        change.after['retention_rules'].all(
          _['time_rule_locked'] != null
        )
      )
  - uid: mondoo-oci-security-object-storage-retention-rules-locked-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'oci_objectstorage_bucket')
    mql: |
      terraform.state.resources.where(type == 'oci_objectstorage_bucket').all(
        values['retention_rules'] == null ||
        values['retention_rules'].all(
          _['time_rule_locked'] != null
        )
      )
  - uid: mondoo-oci-security-object-storage-retention-duration-meets-minimum
    title: Ensure object storage retention rules are at least 30 days
    impact: 65
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-bcr-08
      compliance/dora: dora-art-12
      compliance/hipaa: hipaa-security-ss164-308-a-7-ii-a-contingency-plan-data-backup-plan
      compliance/iso-27001-2022: iso-27001-2022-a-8-13
      compliance/nis-2: nis-2-21-2-c
      compliance/nist-csf-1: nist-csf-1-pr-ip-4
      compliance/nist-csf-2: nist-csf-2-pr-ds-11
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cp-9
      compliance/nist-sp-800-171: nist-sp-800-171--3-8-9
      compliance/pci-dss-4: false
      compliance/soc2-2017: false
      compliance/vda-isa-5: false
    variants:
      - uid: mondoo-oci-security-object-storage-retention-duration-meets-minimum-oci
        tags:
          mondoo.com/filter-title: OCI
          mondoo.com/filter-icon: oci
      - uid: mondoo-oci-security-object-storage-retention-duration-meets-minimum-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-oci-security-object-storage-retention-duration-meets-minimum-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-oci-security-object-storage-retention-duration-meets-minimum-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check verifies that every retention rule on every Object Storage bucket has a duration of at least 30 days (or 1 year for year-denominated rules). A retention rule with a sub-30-day duration cannot meaningfully serve as a ransomware-recovery control: most ransomware dwell times exceed 14 days, and many attackers specifically wait for short retention windows to expire before executing destructive actions.

        Scope note: buckets with zero retention rules pass this check vacuously. This check validates the duration of *existing* rules; it does not require retention to exist. Use the companion `object-storage-retention-rules-locked` check plus a tag-based policy if you need to enforce retention presence on specific bucket classes.

        **Why this matters**

        Retention rules that are too short create a false sense of protection:

        - Attackers who gain persistence often wait out short retention windows — the rule is a nuisance, not a control.
        - Legitimate recovery scenarios (storage corruption, accidental deletion discovered late) often need more than a week's worth of backup retention to resolve.
        - Short retention also amplifies the impact of a single bad change that corrupts objects and only gets caught after rollback is no longer possible.
        - Most regulatory retention requirements (HIPAA, SOX, PCI) specify months-to-years retention, not days.

        **Risk mitigation**

        - Ensures retention windows outlast typical ransomware dwell times.
        - Provides meaningful recovery headroom for accidental data loss.
        - Aligns retention with common regulatory expectations.
      remediation:
        - id: console
          desc: |
            Extend short retention durations:

            1. Open **Storage** → **Buckets** → select the bucket → **Retention Rules**.
            2. Edit the rule and set **Duration** to at least 30 days (or longer per your data-retention policy).
            3. Save and, where possible, lock the rule (`timeRuleLocked`) so the longer duration cannot be reverted.
        - id: cli
          desc: |
            Extend an existing retention rule:

            ```bash
            oci os retention-rule update \
              --namespace-name <namespace> \
              --bucket-name <bucket> \
              --retention-rule-id <rule-ocid> \
              --time-amount 30 \
              --time-unit DAYS
            ```
        - id: terraform
          desc: |
            Declare every `retention_rules.duration` block with at least 30 days, or 1 year for year-denominated rules. Set `time_rule_locked` to a fixed RFC 3339 timestamp committed in your repository. Do not use `timeadd(timestamp(), ...)` on this attribute, because `timestamp()` evaluates on every plan and would produce a perpetual diff. Update the value when you intentionally roll the lock, and add `lifecycle.ignore_changes = [retention_rules]` after the first apply if you want Terraform to stop tracking drift on the locked rule:

            ```hcl
            resource "oci_objectstorage_bucket" "backups" {
              compartment_id = var.compartment_ocid
              namespace      = var.namespace
              name           = "backups"
              access_type    = "NoPublicAccess"

              retention_rules {
                display_name     = "regulatory-90d"
                time_rule_locked = "2099-01-01T00:00:00Z" # set to a real future RFC 3339 timestamp ≥ 14 days from apply

                duration {
                  time_amount = 90
                  time_unit   = "DAYS"
                }
              }
            }
            ```
    refs:
      - url: https://docs.oracle.com/en-us/iaas/Content/Object/Tasks/usingretentionrules.htm
        title: OCI - Using Retention Rules
  - uid: mondoo-oci-security-object-storage-retention-duration-meets-minimum-oci
    filters: asset.platform == "oci-objectstorage-bucket"
    mql: |
      oci.objectStorage.bucket.retentionRules.all(
        durationTimeUnit == "DAYS" && durationAmount >= 30 ||
        durationTimeUnit == "YEARS" && durationAmount >= 1
      )
  - uid: mondoo-oci-security-object-storage-retention-duration-meets-minimum-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'oci_objectstorage_bucket')
    mql: |
      # Each retention_rules block must declare a duration block whose time_unit/time_amount meet the minimum (>=30 DAYS or >=1 YEARS).
      terraform.resources('oci_objectstorage_bucket').all(
        blocks.where(type == 'retention_rules').all(
          blocks.where(type == 'duration') != empty &&
          blocks.where(type == 'duration').all(
            arguments['time_unit'] == 'DAYS' && arguments['time_amount'] >= 30 ||
            arguments['time_unit'] == 'YEARS' && arguments['time_amount'] >= 1
          )
        )
      )
  - uid: mondoo-oci-security-object-storage-retention-duration-meets-minimum-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'oci_objectstorage_bucket')
    mql: |
      terraform.plan.resourceChanges.where(type == 'oci_objectstorage_bucket').all(
        change.after['retention_rules'] == null ||
        change.after['retention_rules'].all(
          _['duration'] != null && _['duration'].length > 0 &&
          _['duration'].all(
            _['time_unit'] == 'DAYS' && _['time_amount'] >= 30 ||
            _['time_unit'] == 'YEARS' && _['time_amount'] >= 1
          )
        )
      )
  - uid: mondoo-oci-security-object-storage-retention-duration-meets-minimum-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'oci_objectstorage_bucket')
    mql: |
      terraform.state.resources.where(type == 'oci_objectstorage_bucket').all(
        values['retention_rules'] == null ||
        values['retention_rules'].all(
          _['duration'] != null && _['duration'].length > 0 &&
          _['duration'].all(
            _['time_unit'] == 'DAYS' && _['time_amount'] >= 30 ||
            _['time_unit'] == 'YEARS' && _['time_amount'] >= 1
          )
        )
      )
  - uid: mondoo-oci-security-iam-no-any-user-policies
    title: Ensure no IAM policies grant access to any-user
    impact: 95
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-2
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-3-1
      compliance/vda-isa-5: vda-isa-5-4-1-1
    variants:
      - uid: mondoo-oci-security-iam-no-any-user-policies-oci
        tags:
          mondoo.com/filter-title: OCI
          mondoo.com/filter-icon: oci
      - uid: mondoo-oci-security-iam-no-any-user-policies-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-oci-security-iam-no-any-user-policies-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-oci-security-iam-no-any-user-policies-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check flags OCI IAM policies whose statements grant permissions to `any-user` — OCI's wildcard principal that includes every identity in the tenancy plus unauthenticated callers when combined with certain service grants. An `Allow any-user …` statement bypasses group-based access control entirely: anyone who reaches the API endpoint (including unauthenticated instance principals that Oracle rotates through `any-user`) is covered by the grant.

        **Why this matters**

        `any-user` is almost never the right principal for a production grant:

        - It breaks the audit story — there is no group membership to attribute actions to.
        - It defeats the purpose of IAM groups — the policy applies regardless of who the caller is.
        - Combined with a broad resource scope (e.g., `read all-resources in tenancy`), `any-user` turns the tenancy into an open-read target.
        - Service-principal narrowings like `Allow service analytics to manage buckets` are legitimate uses; a bare `Allow any-user …` or `Allow any-user to read …` usually is not.

        **Risk mitigation**

        - Replace `any-user` grants with group- or dynamic-group-scoped statements that identify the actual consumers.
        - Where service principals are required, use `Allow service <service-name> …` — a narrower form that restricts the grant to a specific OCI service.
        - Audit any statement that combines `any-user` with `manage`, `use`, or `read all-resources` as an immediate high-severity finding.
      remediation:
        - id: console
          desc: |
            Remove or scope-down `any-user` grants:

            1. Open **Identity & Security** → **Policies** → select the flagged policy.
            2. Identify every statement beginning with `Allow any-user …`.
            3. Replace with a group-scoped statement (`Allow group <group-name> …`) or a service-principal statement (`Allow service <service-name> …`) matching the legitimate consumer.
            4. Remove the `any-user` statement entirely if no legitimate consumer can be identified.
        - id: cli
          desc: |
            List every policy in the tenancy and inspect statements:

            ```bash
            oci iam policy list --compartment-id <tenancy-ocid> --all --query "data[].{Name:name, Statements:statements}" --output json
            ```

            Replace the statements on each offending policy:

            ```bash
            oci iam policy update --policy-id <policy-ocid> \
              --statements '["Allow group <group-name> to read buckets in compartment <compartment-name>"]'
            ```
        - id: terraform
          desc: |
            Scope every `oci_identity_policy` statement to a specific group, dynamic group, or service principal — never the bare `any-user` principal:

            ```hcl
            resource "oci_identity_policy" "ops_readers" {
              compartment_id = var.tenancy_ocid
              name           = "OpsReaders"
              description    = "Read access for the operations team"

              statements = [
                "Allow group OpsReaders to read all-resources in compartment Workloads",
                "Allow service objectstorage-${var.region} to manage object-family in compartment Backups",
              ]
            }
            ```
    refs:
      - url: https://docs.oracle.com/en-us/iaas/Content/Identity/Concepts/policysyntax.htm
        title: OCI - Policy Syntax
  - uid: mondoo-oci-security-iam-no-any-user-policies-oci
    filters: asset.platform == "oci-identity-policy"
    mql: |
      oci.identity.policy.statements.none(_ == /\ballow\s+(dynamic-group\s+|service\s+)?any-user\b/i)
  - uid: mondoo-oci-security-iam-no-any-user-policies-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "oci_identity_policy")
    mql: |
      terraform.resources.where(nameLabel == "oci_identity_policy").none(
        arguments.statements.any(_ == /\ballow\s+(dynamic-group\s+|service\s+)?any-user\b/i)
      )
  - uid: mondoo-oci-security-iam-no-any-user-policies-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "oci_identity_policy")
    mql: |
      terraform.plan.resourceChanges.where(type == "oci_identity_policy").none(
        change.after.statements.any(_ == /\ballow\s+(dynamic-group\s+|service\s+)?any-user\b/i)
      )
  - uid: mondoo-oci-security-iam-no-any-user-policies-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "oci_identity_policy")
    mql: |
      terraform.state.resources.where(type == "oci_identity_policy").none(
        values.statements.any(_ == /\ballow\s+(dynamic-group\s+|service\s+)?any-user\b/i)
      )
