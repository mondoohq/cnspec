  - uid: mondoo-oci-security-iam-stale-active-users
    title: Ensure active IAM users have logged in within the last 90 days
    impact: 70
    filters: asset.platform == "oci-identity-user" && oci.identity.user.state == "ACTIVE" && oci.identity.user.lastLogin != empty
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-5-17
      compliance/nis-2: nis-2-21-2-g
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-10
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-2-2
      compliance/vda-isa-5: vda-isa-5-4-1-1
    mql: |
      oci.identity.user.lastLogin > time.now - 90 * time.day
    docs:
      desc: |
        This check ensures that all active IAM users have logged in within the last 90 days. Accounts that remain active but unused may indicate orphaned identities that increase the attack surface.

        **Why this matters**

        Stale active accounts pose significant security risks:
          •  Unused accounts may have been forgotten during employee offboarding.
          •  Dormant accounts with valid credentials are prime targets for attackers.
          •  Compromised stale accounts may go unnoticed for extended periods.
          •  Regular login activity is an indicator of account legitimacy and active ownership.

        Risk mitigation
          •  Disable or delete IAM user accounts that have not been used within 90 days.
          •  Implement automated account lifecycle management.
          •  Regularly review user login activity and investigate dormant accounts.
          •  Establish an offboarding process that includes IAM account deactivation.
      remediation:
        - id: console
          desc: |
            To identify and remediate stale active users using the OCI Console:

            1. Navigate to **Identity & Security > Users**.
            2. Review the **Last Sign-In** column for each active user.
            3. For users who have not signed in within 90 days, select the user.
            4. Select **Disable** or **Delete** depending on your organization's offboarding policy.
        - id: cli
          desc: |
            To identify stale active users using the OCI CLI, list users and filter by login activity:

            ```bash
            oci iam user list --compartment-id TENANCY_OCID --all --query "data[?\"lifecycle-state\"=='ACTIVE'].{Name:name, LastLogin:\"last-successful-login-time\"}" --output table
            ```

            Review the output for users whose last login exceeds 90 days. Disable stale accounts:

            ```bash
            oci iam user update --user-id USER_OCID --defined-tags '{"Operations": {"Status": "PendingReview"}}'
            ```

            NOTE: The OCI CLI does not support disabling users directly. Disable or delete stale users through the OCI Console or by removing all credentials (API keys, auth tokens, passwords) via the CLI.
    refs:
      - url: https://docs.oracle.com/en-us/iaas/Content/Identity/Tasks/managingusers.htm
        title: CIS OCI Foundations Benchmark 1.13
  - uid: mondoo-oci-security-iam-no-broad-compartment-policies
    title: Ensure no IAM policies grant manage all-resources in compartment
    impact: 80
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-2
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-3-1
      compliance/vda-isa-5: vda-isa-5-4-1-1
    variants:
      - uid: mondoo-oci-security-iam-no-broad-compartment-policies-oci
        tags:
          mondoo.com/filter-title: OCI
          mondoo.com/icon: oci
      - uid: mondoo-oci-security-iam-no-broad-compartment-policies-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/icon: terraform
      - uid: mondoo-oci-security-iam-no-broad-compartment-policies-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/icon: terraform
      - uid: mondoo-oci-security-iam-no-broad-compartment-policies-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/icon: terraform
    docs:
      desc: |
        This check ensures that no IAM policies grant `manage all-resources` at the compartment level. While compartment-scoped policies are less dangerous than tenancy-level policies, granting full management access to all resources within a compartment still violates the principle of least privilege.

        **Why this matters**

        The `manage all-resources in compartment` permission grants unrestricted control within a compartment:
          •  Users can create, modify, and delete any resource type in the compartment.
          •  A compromised account with this permission has full blast radius within the compartment.
          •  It bypasses fine-grained access control and makes auditing difficult.
          •  Lateral movement within the compartment is unrestricted once access is obtained.

        Risk mitigation
          •  Use specific resource types instead of `all-resources` (e.g., `manage instance-family`, `manage virtual-network-family`).
          •  Grant only the minimum permissions required for each group's function.
          •  Use multiple policies with narrow scope instead of a single broad policy.
          •  Regularly audit IAM policies for overly permissive statements.
      remediation:
        - id: console
          desc: |
            To replace overly permissive compartment policies using the OCI Console:

            1. Navigate to **Identity & Security > Policies**.
            2. Identify policies containing `manage all-resources in compartment`.
            3. Replace with scoped policies that grant access to specific resource types:

            ```
            # Instead of:
            Allow group DevOps to manage all-resources in compartment Production

            # Use scoped policies:
            Allow group DevOps to manage instance-family in compartment Production
            Allow group DevOps to manage virtual-network-family in compartment Production
            ```
        - id: cli
          desc: |
            To identify and replace overly permissive compartment policies using the OCI CLI, list all policies:

            ```bash
            oci iam policy list --compartment-id TENANCY_OCID --all --query "data[].{Name:name, Statements:statements}" --output table
            ```

            Review for statements containing `manage all-resources in compartment`. Update each policy to use specific resource types:

            ```bash
            oci iam policy update --policy-id POLICY_OCID \
              --statements '["Allow group DevOps to manage instance-family in compartment Production"]'
            ```
        - id: terraform
          desc: |
            To enforce scoped compartment policies in Terraform, use specific resource types instead of `all-resources`:

            ```hcl
            resource "oci_identity_policy" "devops" {
              compartment_id = var.tenancy_ocid
              name           = "DevOpsPolicy"
              description    = "Scoped policy for DevOps team"

              statements = [
                "Allow group DevOps to manage instance-family in compartment Production",
                "Allow group DevOps to manage virtual-network-family in compartment Production",
              ]
            }
            ```
    refs:
      - url: https://docs.oracle.com/en-us/iaas/Content/Identity/Concepts/policies.htm
        title: CIS OCI Foundations Benchmark 1.2
  - uid: mondoo-oci-security-iam-no-broad-compartment-policies-oci
