  - uid: mondoo-oci-security-vcn-no-unrestricted-icmp-ingress
    title: Ensure VCN security lists block unrestricted ICMP ingress from 0.0.0.0/0
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-6
    variants:
      - uid: mondoo-oci-security-vcn-no-unrestricted-icmp-ingress-oci
        tags:
          mondoo.com/filter-title: OCI
          mondoo.com/filter-icon: oci
      - uid: mondoo-oci-security-vcn-no-unrestricted-icmp-ingress-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-oci-security-vcn-no-unrestricted-icmp-ingress-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-oci-security-vcn-no-unrestricted-icmp-ingress-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that VCN security lists are configured to restrict ICMP ingress from the public internet (`0.0.0.0/0`) to specific type/code values rather than permitting all ICMP types without an `icmpOptions` filter. By default, OCI allows ICMP rules to be created without type and code restrictions, which enables attackers to perform host discovery and OS fingerprinting across the entire VCN.

        **Why this matters**

        - **Reconnaissance acceleration:** Unrestricted ICMP echo-reply, timestamp, and netmask probes reveal which IP addresses are live and identify the OS family running on each host, shortening the time between network exposure and exploitation.
        - **Automated enumeration feeding:** Fingerprinting data from unrestricted ICMP feeds automated tooling that escalates from enumeration to exploit attempts within minutes of discovering a live host.
        - **Cloud asset indexing:** Large-scale internet scanners rely on ICMP to build cloud asset inventories; open ICMP ingress ensures the VCN appears in these indexes.
        - **PMTU compatibility:** Specific ICMP types such as type 3 code 4 (Destination Unreachable: Fragmentation Needed) are required for Path MTU discovery and should remain permitted, which is why this check only flags rules with no `icmpOptions` filter at all.

        **Risk mitigation**

        - **Type/code scoping:** Restricting ICMP ingress to only the types workloads actually need, typically type 3 code 4 for PMTU discovery, eliminates host discovery and fingerprinting without breaking legitimate network behavior.
        - **Source CIDR tightening:** Where broader ICMP access is needed for monitoring or troubleshooting, limiting the source CIDR to trusted NOC subnets prevents public enumeration.
      audit: |
        ### Audit via Console

        1. Open the OCI Console and navigate to **Networking** > **Virtual Cloud Networks**.
        2. For each VCN, open **Security Lists** and select each security list.
        3. Under **Ingress Rules**, look for any rule where **Source** is `0.0.0.0/0`, **Protocol** is `ICMP`, and no **ICMP Type/Code** filter is configured (the type and code fields are blank or allow all).

        A passing security list has no unrestricted ICMP ingress rule from `0.0.0.0/0` — either ICMP ingress is absent, scoped to a non-public source CIDR, or restricted to specific ICMP type/code values. A failing security list contains an ICMP ingress rule from `0.0.0.0/0` with no type or code restriction.

        ### Audit via CLI

        1. Retrieve ingress rules and check for unfiltered ICMP from `0.0.0.0/0`:

        ```bash
        oci network security-list get \
          --security-list-id <security-list-ocid> \
          --query 'data."ingress-security-rules"[?source==`0.0.0.0/0` && (protocol==`1` || protocol==`58` || protocol==`all`)].{Source:source, Protocol:protocol, ICMPOptions:"icmp-options"}' \
          --output json
        ```

        A passing security list returns no entries where `ICMPOptions` is null or empty for rules sourced from `0.0.0.0/0`. A failing security list returns one or more ICMP rules from `0.0.0.0/0` with no `icmp-options` type/code filter.
      remediation:
        - id: console
          desc: |
            Scope or remove unrestricted ICMP ingress:

            1. Open **Networking** → **Virtual Cloud Networks** → the parent VCN → **Security Lists** → select the flagged list.
            2. Edit the flagged ICMP rule: either delete it, or set an `icmpOptions` type/code filter (commonly type 3 for Destination Unreachable) and tighten the source CIDR.
            3. For monitoring use cases, limit the source to your NOC / monitoring subnet rather than `0.0.0.0/0`.
        - id: cli
          desc: |
            Update the security list with a scoped ICMP rule:

            ```bash
            oci network security-list update --security-list-id <security-list-ocid> \
              --ingress-security-rules '[{"source":"10.0.0.0/8","protocol":"1","icmpOptions":{"type":3,"code":4},"isStateless":false}]'
            ```
        - id: terraform
          desc: |
            Add an `icmp_options` block that scopes the ICMP type/code on every `0.0.0.0/0` ingress rule that uses ICMP (protocol `1`), ICMPv6 (`58`), or `all` protocols:

            ```hcl
            resource "oci_core_security_list" "main" {
              compartment_id = var.compartment_ocid
              vcn_id         = oci_core_vcn.main.id
              display_name   = "main"

              # PMTU discovery - allow only ICMP type 3 code 4 from anywhere
              ingress_security_rules {
                source      = "0.0.0.0/0"
                source_type = "CIDR_BLOCK"
                protocol    = "1"

                icmp_options {
                  type = 3
                  code = 4
                }
              }
            }
            ```
    refs:
      - url: https://docs.oracle.com/en-us/iaas/Content/Network/Concepts/securitylists.htm
        title: OCI - Security Lists
      - url: https://datatracker.ietf.org/doc/html/rfc792
        title: RFC 792 - Internet Control Message Protocol
  - uid: mondoo-oci-security-vcn-no-unrestricted-icmp-ingress-oci
    filters: asset.platform == "oci-network-securitylist"
    mql: |
      oci.network.securityList.ingressSecurityRules.where(
        _['source'] == "0.0.0.0/0" && _['icmpOptions'] == empty
      ).none(
        _['protocol'].in(["1", "58", "all"])
      )
  - uid: mondoo-oci-security-vcn-no-unrestricted-icmp-ingress-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "oci_core_security_list")
    mql: |
      # An ingress rule from 0.0.0.0/0 that uses ICMP (protocol 1 or 58) or all-protocols must declare an icmp_options block scoping the type/code.
      terraform.resources("oci_core_security_list").all(
        blocks.where(type == "ingress_security_rules" && arguments.source == "0.0.0.0/0").all(
          arguments.protocol != "1" && arguments.protocol != "58" && arguments.protocol != "all" ||
          blocks.where(type == "icmp_options") != empty
        )
      )
  - uid: mondoo-oci-security-vcn-no-unrestricted-icmp-ingress-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "oci_core_security_list")
    mql: |
      terraform.plan.resourceChanges.where(type == "oci_core_security_list").all(
        change.after.ingress_security_rules.where(_['source'] == "0.0.0.0/0" && _['icmp_options'] == empty).none(
          _['protocol'].in(["1", "58", "all"])
        )
      )
  - uid: mondoo-oci-security-vcn-no-unrestricted-icmp-ingress-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "oci_core_security_list")
    mql: |
      terraform.state.resources.where(type == "oci_core_security_list").all(
        values.ingress_security_rules.where(_['source'] == "0.0.0.0/0" && _['icmp_options'] == empty).none(
          _['protocol'].in(["1", "58", "all"])
        )
      )
  - uid: mondoo-oci-security-vcn-no-unrestricted-ipv6-ingress
    title: Ensure VCN security lists block unrestricted IPv6 ingress from ::/0
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-6
    variants:
      - uid: mondoo-oci-security-vcn-no-unrestricted-ipv6-ingress-oci
        tags:
          mondoo.com/filter-title: OCI
          mondoo.com/filter-icon: oci
      - uid: mondoo-oci-security-vcn-no-unrestricted-ipv6-ingress-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-oci-security-vcn-no-unrestricted-ipv6-ingress-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-oci-security-vcn-no-unrestricted-ipv6-ingress-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that VCN security lists are configured to restrict IPv6 ingress from the public internet (`::/0`) with the same controls applied to IPv4 ingress, blocking all-protocol rules, unscoped TCP rules that cover SSH (22) or RDP (3389), and unscoped UDP rules. By default, organizations frequently apply IPv4 hardening while leaving IPv6 rules unreviewed, creating a parallel attack surface that bypasses IPv4-focused controls.

        **Why this matters**

        - **IPv4-only monitoring blind spot:** Many network defenses, log pipelines, and IDS signatures are built around IPv4; IPv6 traffic can bypass controls that appear complete on paper but only inspect one address family.
        - **Deliberate bypass technique:** Attackers specifically probe `::/0` rules as a bypass around tightly monitored IPv4 ACLs, knowing that security teams pay less attention to IPv6 traffic.
        - **Retrofit oversight:** OCI VCNs that enable IPv6 after initial deployment inherit the same exposure patterns as IPv4 unless security lists are explicitly updated, a step that is routinely missed.
        - **Growing scanner coverage:** Cloud vulnerability scanners now routinely enumerate the IPv6 address space and find fewer controls than on IPv4, making IPv6 a higher-yield target.

        **Risk mitigation**

        - **Symmetric rule management:** Every time an ingress rule permits `0.0.0.0/0`, the corresponding `::/0` rule should be audited for the same restrictions.
        - **IPv6 elimination option:** Disabling IPv6 on VCNs that have no workload requiring it removes the parallel exposure surface entirely.
      audit: |
        ### Audit via Console

        1. Open the OCI Console and navigate to **Networking** > **Virtual Cloud Networks**.
        2. For each IPv6-enabled VCN, open **Security Lists** and select each security list.
        3. Under **Ingress Rules**, look for any rule where **Source** is `::/0` (IPv6 default route) and the protocol is `All Protocols`, or where the protocol is `TCP` with no port-range restriction or a port range covering SSH (22) or RDP (3389), or where the protocol is `UDP` with no port-range restriction.

        A passing security list has no ingress rule permitting all-protocol, unrestricted-TCP, or unrestricted-UDP traffic from `::/0`. A failing security list contains at least one such rule.

        ### Audit via CLI

        1. Retrieve ingress rules and filter for `::/0` source entries:

        ```bash
        oci network security-list get \
          --security-list-id <security-list-ocid> \
          --query 'data."ingress-security-rules"[?source==`::/0`].{Source:source, Protocol:protocol, TCPOptions:"tcp-options", UDPOptions:"udp-options"}' \
          --output json
        ```

        A passing security list returns no rules from `::/0` with `protocol` equal to `all`, and no TCP rules from `::/0` without port restrictions, and no UDP rules from `::/0` without port restrictions. A failing security list returns at least one rule matching any of those patterns.
      remediation:
        - id: console
          desc: |
            Remove or scope IPv6 ingress rules:

            1. Open **Networking** → **Virtual Cloud Networks** → the parent VCN → **Security Lists** → select the flagged list.
            2. Identify each ingress rule whose source is `::/0` and that allows SSH/RDP, all TCP ports, all UDP ports, or all protocols.
            3. Delete the rule, or restrict the source to a specific IPv6 CIDR (e.g., your corporate IPv6 transit prefix) and/or tighten the port range.
            4. Consider disabling IPv6 entirely on the VCN if no workload on it uses IPv6.
        - id: cli
          desc: |
            Replace the ingress rules with a scoped IPv6 set:

            ```bash
            oci network security-list update --security-list-id <security-list-ocid> \
              --ingress-security-rules '[{"source":"2001:db8:abcd::/48","protocol":"6","tcpOptions":{"destinationPortRange":{"min":443,"max":443}},"isStateless":false}]'
            ```
        - id: terraform
          desc: |
            Apply the same scoping rules to `::/0` ingress that the IPv4 ingress checks require: never `protocol = "all"`, always declare `tcp_options` / `udp_options`, and exclude SSH (22) and RDP (3389) from public TCP rules:

            ```hcl
            resource "oci_core_security_list" "main" {
              compartment_id = var.compartment_ocid
              vcn_id         = oci_core_vcn.main.id
              display_name   = "main"

              # IPv6: HTTPS from anywhere - explicit tcp_options scoped to 443
              ingress_security_rules {
                source      = "::/0"
                source_type = "CIDR_BLOCK"
                protocol    = "6"

                tcp_options {
                  destination_port_range {
                    min = 443
                    max = 443
                  }
                }
              }

              # IPv6: SSH only from a trusted IPv6 prefix
              ingress_security_rules {
                source      = "2001:db8:abcd::/48" # RFC 3849 documentation prefix - replace with your trusted IPv6 prefix
                source_type = "CIDR_BLOCK"
                protocol    = "6"

                tcp_options {
                  destination_port_range {
                    min = 22
                    max = 22
                  }
                }
              }
            }
            ```
    refs:
      - url: https://docs.oracle.com/en-us/iaas/Content/Network/Concepts/securitylists.htm
        title: OCI - Security Lists
      - url: https://docs.oracle.com/en-us/iaas/Content/Network/Concepts/ipv6.htm
        title: OCI - IPv6 Addressing
  - uid: mondoo-oci-security-vcn-no-unrestricted-ipv6-ingress-oci
    filters: asset.platform == "oci-network-securitylist"
    mql: |
      oci.network.securityList.ingressSecurityRules.where(_['source'] == "::/0").none(
        _['protocol'] == "all" ||
        _['protocol'] == "6" && _['tcpOptions'] == empty ||
        _['protocol'] == "6" && _['tcpOptions']['destinationPortRange']['min'] <= 22 && _['tcpOptions']['destinationPortRange']['max'] >= 22 ||
        _['protocol'] == "6" && _['tcpOptions']['destinationPortRange']['min'] <= 3389 && _['tcpOptions']['destinationPortRange']['max'] >= 3389 ||
        _['protocol'] == "17" && _['udpOptions'] == empty
      )
  - uid: mondoo-oci-security-vcn-no-unrestricted-ipv6-ingress-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "oci_core_security_list")
    mql: |
      # Three separate datapoints, one per failure mode: no all-protocol IPv6 rule, all-UDP IPv6 rules must scope udp_options, and TCP IPv6 rules must scope tcp_options away from ports 22/3389.
      terraform.resources("oci_core_security_list").all(
        blocks.where(type == "ingress_security_rules" && arguments.source == "::/0").none(arguments.protocol == "all")
      )
      terraform.resources("oci_core_security_list").all(
        blocks.where(type == "ingress_security_rules" && arguments.source == "::/0" && arguments.protocol == "17").all(
          blocks.where(type == "udp_options") != empty
        )
      )
      terraform.resources("oci_core_security_list").all(
        blocks.where(type == "ingress_security_rules" && arguments.source == "::/0" && arguments.protocol == "6").all(
          blocks.where(type == "tcp_options") != empty &&
          blocks.where(type == "tcp_options").all(
            blocks.where(type == "destination_port_range").none(
              arguments['min'] <= 22 && arguments['max'] >= 22 ||
              arguments['min'] <= 3389 && arguments['max'] >= 3389
            )
          )
        )
      )
  - uid: mondoo-oci-security-vcn-no-unrestricted-ipv6-ingress-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "oci_core_security_list")
    mql: |
      terraform.plan.resourceChanges.where(type == "oci_core_security_list").all(
        change.after.ingress_security_rules.where(_['source'] == "::/0").none(
          _['protocol'] == "all" ||
          _['protocol'] == "6" && _['tcp_options'] == empty ||
          _['protocol'] == "6" && _['tcp_options']['destination_port_range']['min'] <= 22 && _['tcp_options']['destination_port_range']['max'] >= 22 ||
          _['protocol'] == "6" && _['tcp_options']['destination_port_range']['min'] <= 3389 && _['tcp_options']['destination_port_range']['max'] >= 3389 ||
          _['protocol'] == "17" && _['udp_options'] == empty
        )
      )
  - uid: mondoo-oci-security-vcn-no-unrestricted-ipv6-ingress-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "oci_core_security_list")
    mql: |
      terraform.state.resources.where(type == "oci_core_security_list").all(
        values.ingress_security_rules.where(_['source'] == "::/0").none(
          _['protocol'] == "all" ||
          _['protocol'] == "6" && _['tcp_options'] == empty ||
          _['protocol'] == "6" && _['tcp_options']['destination_port_range']['min'] <= 22 && _['tcp_options']['destination_port_range']['max'] >= 22 ||
          _['protocol'] == "6" && _['tcp_options']['destination_port_range']['min'] <= 3389 && _['tcp_options']['destination_port_range']['max'] >= 3389 ||
          _['protocol'] == "17" && _['udp_options'] == empty
        )
      )
  - uid: mondoo-oci-security-database-backups-customer-managed-encryption
    title: Ensure database backups are encrypted with customer-managed keys
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-12
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-11
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-12
      compliance/nist-sp-800-171: nist-sp-800-171--3-8-9
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-oci-security-database-backups-customer-managed-encryption-oci
        tags:
          mondoo.com/filter-title: OCI
          mondoo.com/filter-icon: oci
      - uid: mondoo-oci-security-database-backups-customer-managed-encryption-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-oci-security-database-backups-customer-managed-encryption-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-oci-security-database-backups-customer-managed-encryption-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that OCI database backups, both VM/BM DB system backups and Autonomous Database backups, are encrypted with customer-managed KMS keys rather than Oracle-managed default keys. By default, OCI uses Oracle-managed encryption for database backups, which means the decryption capability lives entirely within Oracle's infrastructure without tenant-controlled revocation.

        **Why this matters**

        - **Extended blast radius:** Backups carry the same data sensitivity as the live database but have longer retention and wider distribution paths, including Object Storage destinations that may be shared or cross-region.
        - **Oracle-side compromise path:** A backup encrypted only with Oracle-managed keys can be decrypted by any compromise that reaches Oracle's key management infrastructure, without the tenant being able to revoke access.
        - **Key revocation capability:** A customer-managed key provides the option to permanently revoke access to all historical backups by disabling or deleting the key, a capability that Oracle-managed keys do not offer.
        - **Long-term retention risk:** Backups outlive the original database; without CMK, encryption posture cannot be independently verified or strengthened after the backup is created.

        **Risk mitigation**

        - **Tenant-controlled decryption:** Customer-managed KMS keys ensure that only principals with access to the customer's vault can decrypt backup data, independent of Oracle's internal key management.
        - **Revocation path:** Disabling or deleting the CMK immediately invalidates every backup encrypted with it, providing a hard stop for data access in breach scenarios.
      audit: |
        ### Audit via Console

        1. Open the OCI Console and navigate to **Oracle Database** > **Autonomous Databases** (or **DB Systems** for VM/BM databases).
        2. Select each database and view its **Encryption** settings.
        3. Confirm that **Customer-Managed Key** is shown under the encryption configuration and that a vault and KMS key OCID are populated.
        4. Repeat for backups by navigating to **Backups** for each database and verifying the backup encryption key is listed.

        A passing database shows a customer-managed KMS key associated with the database (and therefore its backups). A failing database shows Oracle-managed encryption with no customer KMS key configured.

        ### Audit via CLI

        1. List Autonomous Database backups and check their KMS key association:

        ```bash
        oci db autonomous-database-backup list \
          --compartment-id <compartment-ocid> \
          --all \
          --query 'data[].{Name:"display-name", DBID:"autonomous-database-id", KMSKey:"kms-key-id"}' \
          --output table
        ```

        2. List DB System database backups:

        ```bash
        oci db backup list \
          --compartment-id <compartment-ocid> \
          --all \
          --query 'data[].{Name:"display-name", DatabaseID:"database-id", KMSKey:"kms-key-id"}' \
          --output table
        ```

        A passing result shows a non-null `KMSKey` value for every backup entry. A failing result shows at least one backup entry where `KMSKey` is `None` or empty.
      remediation:
        - id: console
          desc: |
            Assign a customer-managed KMS key to the parent database so future backups inherit it:

            1. Open **Oracle Database** → **Autonomous Database** (or **DB Systems** → the database) → select the database.
            2. Under **Encryption**, select **Edit** and choose **Encrypt using a customer-managed key**.
            3. Select the vault and master encryption key, then save.
            4. Subsequent automatic and on-demand backups inherit the new key. Existing backups remain encrypted with the previous key — re-create critical long-term backups after the rotation.
        - id: cli
          desc: |
            Rotate an Autonomous Database to a new version of its customer-managed KMS key. The vault association must already exist; if the database was created with Oracle-managed keys, recreate it from a backup with `--kms-key-id` and `--vault-id` set at create time.

            ```bash
            oci db autonomous-database rotate-key \
              --autonomous-database-id <adb-ocid> \
              --key-version-id <key-version-ocid>
            ```

            Rotate the encryption key for a database within a DB system:

            ```bash
            oci db database rotate-vault-key \
              --database-id <database-ocid>
            ```
        - id: terraform
          desc: |
            Set `kms_key_id` (and `vault_id` for autonomous databases) on every database resource so its backups inherit customer-managed encryption:

            ```hcl
            resource "oci_kms_vault" "app" {
              compartment_id = var.compartment_ocid
              display_name   = "app-vault"
              vault_type     = "DEFAULT"
            }

            resource "oci_kms_key" "app" {
              compartment_id      = var.compartment_ocid
              display_name        = "app-db-key"
              management_endpoint = oci_kms_vault.app.management_endpoint

              key_shape {
                algorithm = "AES"
                length    = 32
              }
            }

            resource "oci_database_autonomous_database" "app" {
              compartment_id           = var.compartment_ocid
              db_name                  = "appdb"
              admin_password           = var.adb_admin_password
              cpu_core_count           = 1
              data_storage_size_in_tbs = 1

              kms_key_id = oci_kms_key.app.id
              vault_id   = oci_kms_vault.app.id
            }

            resource "oci_database_database" "app" {
              db_home_id = oci_database_db_home.app.id
              source     = "NONE"

              database {
                admin_password = var.db_admin_password
                db_name        = "APPDB"
                kms_key_id     = oci_kms_key.app.id
              }
            }
            ```
    refs:
      - url: https://docs.oracle.com/en-us/iaas/Content/Database/Concepts/adbsecurity.htm
        title: OCI - Autonomous Database Encryption
      - url: https://docs.oracle.com/en-us/iaas/Content/Database/Tasks/managingbackups.htm
        title: OCI - Managing Database Backups
  - uid: mondoo-oci-security-database-backups-customer-managed-encryption-oci
    filters: asset.platform == 'oci'
    mql: |
      oci.database.backups.all(kmsKey != null)
      oci.database.autonomousDatabaseBackups.all(kmsKey != null)
  - uid: mondoo-oci-security-database-backups-customer-managed-encryption-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'oci_database_autonomous_database') ||
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'oci_database_database')
    mql: |
      terraform.resources('oci_database_autonomous_database').all(
        arguments['kms_key_id'] != null && arguments['kms_key_id'] != ""
      )
      terraform.resources('oci_database_database').all(
        blocks.where(type == 'database').all(
          arguments['kms_key_id'] != null && arguments['kms_key_id'] != ""
        )
      )
  - uid: mondoo-oci-security-database-backups-customer-managed-encryption-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'oci_database_autonomous_database') ||
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'oci_database_database')
    mql: |
      terraform.plan.resourceChanges.where(type == 'oci_database_autonomous_database').all(
        change.after['kms_key_id'] != null && change.after['kms_key_id'] != ""
      )
      terraform.plan.resourceChanges.where(type == 'oci_database_database').all(
