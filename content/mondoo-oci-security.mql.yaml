          values['ssl_configuration'].all(
            _['cipher_suite_name'] != null &&
            _['cipher_suite_name'].downcase == /^oci-modern-ssl-cipher-suite-v1$|^oci-tls-1-2-[a-z0-9-]+$|^oci-tls-1-3-[a-z0-9-]+$|^oci-default-ssl-cipher-suite-v1$/
          )
        )
  # No Terraform variants: this is a per-load-balancer existence check (each LB with an HTTP listener must also have an HTTPS / HTTP2 listener) that requires aggregating `oci_load_balancer_listener` resources by their `load_balancer_id` reference. Cross-resource grouping is fragile in HCL/plan/state and unsupported by the patterns used elsewhere in this file.
  - uid: mondoo-oci-security-loadbalancer-http-listener-has-https
    title: Ensure load balancers that run HTTP listeners also expose HTTPS
    impact: 75
    filters: asset.platform == 'oci'
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    mql: |
      oci.loadBalancer.loadBalancers.where(
        listeners.any(protocol == "HTTP")
      ).all(
        listeners.any(protocol == "HTTPS" || protocol == "HTTP2")
      )
    docs:
      desc: |
        This check flags load balancers that expose an HTTP listener but do not also expose an HTTPS / HTTP/2 listener. Pure-HTTP load balancers mean there is no TLS path to the same service, so any traffic a client is redirected to — including authenticated sessions, form posts, and cookies — travels in the clear.

        Scope note: this check confirms the LB exposes *some* HTTPS listener alongside HTTP; it does not verify that the HTTP and HTTPS listeners serve the same backend, run on paired ports (80/443), or that the HTTP listener issues a 301 redirect. A load balancer hosting an HTTP service on port 80 and an unrelated HTTPS service on port 8443 would pass this check while still leaking the port-80 service in the clear. Pair with application-layer HSTS / redirect configuration to close that gap.

        **Why this matters**

        A public HTTP listener with no HTTPS companion is an active risk, not a legacy compatibility artifact:

        - Credentials, session cookies, and form data sent to the HTTP endpoint are recoverable by anyone on the path (coffee-shop WiFi, ISP, transit network).
        - Redirecting HTTP → HTTPS at the application layer is impossible if no HTTPS listener exists; the load balancer cannot send a client to a URL it does not itself serve.
        - Attackers can inject content into the HTTP response and perform classic MITM payload-injection attacks (BeEF hooks, miner scripts).
        - Search engines and browsers increasingly flag HTTP-only endpoints, degrading user trust and SEO.

        **Risk mitigation**

        - Ensures every public-facing load balancer has a TLS path for the same service.
        - Enables application-layer redirect-to-HTTPS or HSTS enforcement.
        - Eliminates passive sniffing of authenticated sessions.
      remediation:
        - id: console
          desc: |
            Add an HTTPS listener to the load balancer:

            1. Open **Networking** → **Load Balancers** → select the LB → **Listeners**.
            2. Select **Create Listener** → **Protocol: HTTPS** → **Port: 443**.
            3. Attach an SSL certificate (BYO certificate or Oracle Certificate Authority).
            4. Select a modern SSL configuration (TLS 1.2+, `oci-modern-ssl-cipher-suite-v1`).
            5. Route to the same backend set as the HTTP listener, or add an application-layer redirect to HTTPS.
        - id: cli
          desc: |
            Create an HTTPS listener on the existing load balancer:

            ```bash
            oci lb listener create \
              --load-balancer-id <lb-ocid> \
              --name https-listener \
              --protocol HTTPS \
              --port 443 \
              --default-backend-set-name <backend> \
              --ssl-certificate-name <cert-name> \
              --cipher-suite-name oci-modern-ssl-cipher-suite-v1 \
              --protocols '["TLSv1.2","TLSv1.3"]'
            ```
    refs:
      - url: https://docs.oracle.com/en-us/iaas/Content/Balance/Tasks/managinglisteners.htm
        title: OCI - Managing Listeners
  - uid: mondoo-oci-security-oke-public-endpoint-disabled
    title: Ensure OKE cluster Kubernetes API endpoints are not exposed to the internet
    impact: 90
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: false
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-6
    variants:
      - uid: mondoo-oci-security-oke-public-endpoint-disabled-oci
        tags:
          mondoo.com/filter-title: OCI
          mondoo.com/filter-icon: oci
      - uid: mondoo-oci-security-oke-public-endpoint-disabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-oci-security-oke-public-endpoint-disabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-oci-security-oke-public-endpoint-disabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check verifies that every OKE (Oracle Kubernetes Engine) cluster has its Kubernetes API endpoint configured as private only. A publicly-exposed API endpoint means the cluster's control plane is reachable from the internet, making the cluster a direct target for Kubernetes CVEs, credential brute force, and scanning.

        **Why this matters**

        The Kubernetes API server is the single most privileged endpoint of any OKE cluster:

        - A valid kubeconfig (or a working exploit against the API) grants full control of every workload in every namespace.
        - Kubernetes CVEs — including auth bypass, SSRF, and privilege escalation bugs — regularly surface. A public endpoint turns each into a potential RCE.
        - Even with strong authentication, continuous scanning generates alert noise and consumes control-plane capacity.
        - Private endpoints combined with VPN / OCI Bastion keep the API reachable only from managed networks.

        **Risk mitigation**

        - Removes the Kubernetes API from public scanning surface.
        - Forces administrative access through controlled network paths (VPN, bastion, Service Gateway).
        - Significantly reduces blast radius of any future Kubernetes API CVE.
      remediation:
        - id: console
          desc: |
            Private endpoints must be configured at cluster creation — an existing public-endpoint cluster must be recreated:

            1. Create a replacement OKE cluster with the same node pools but **Private API endpoint** selected under **Kubernetes API endpoint**.
            2. Migrate workloads to the new cluster.
            3. Delete the public-endpoint cluster once traffic has cut over.
            4. Access the private endpoint via OCI Bastion, a VPN gateway, or a service gateway from peered VCNs.
        - id: cli
          desc: |
            Create a replacement OKE cluster with a private API endpoint:

            ```bash
            oci ce cluster create \
              --compartment-id <compartment-ocid> \
              --name <cluster> \
              --vcn-id <vcn-ocid> \
              --kubernetes-version <version> \
              --endpoint-subnet-id <private-subnet-ocid> \
              --endpoint-public-ip-enabled false
            ```
        - id: terraform
          desc: |
            Declare an `endpoint_config` block on every `oci_containerengine_cluster` and set `is_public_ip_enabled = false`, with the endpoint anchored in a private subnet:

            ```hcl
            resource "oci_containerengine_cluster" "main" {
              compartment_id     = var.compartment_ocid
              name               = "prod"
              vcn_id             = oci_core_vcn.main.id
              kubernetes_version = "v1.30.1"

              endpoint_config {
                subnet_id            = oci_core_subnet.api_endpoint_private.id
                is_public_ip_enabled = false
                nsg_ids              = [oci_core_network_security_group.api_endpoint.id]
              }
            }
            ```
    refs:
      - url: https://docs.oracle.com/en-us/iaas/Content/ContEng/Concepts/contengnetworkconfig.htm
        title: OCI - OKE Network Configuration
  - uid: mondoo-oci-security-oke-public-endpoint-disabled-oci
    filters: asset.platform == 'oci'
    mql: |
      oci.oke.clusters.all(isPublicEndpointEnabled == false)
  - uid: mondoo-oci-security-oke-public-endpoint-disabled-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'oci_containerengine_cluster')
    mql: |
      # Cluster must declare an endpoint_config block with is_public_ip_enabled = false. Without the existence guard, clusters that omit endpoint_config (Oracle defaults to a public endpoint) would silently pass.
      terraform.resources('oci_containerengine_cluster').all(
        blocks.where(type == 'endpoint_config') != empty &&
        blocks.where(type == 'endpoint_config').all(
          arguments['is_public_ip_enabled'] == false
        )
      )
  - uid: mondoo-oci-security-oke-public-endpoint-disabled-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'oci_containerengine_cluster')
    mql: |
      terraform.plan.resourceChanges.where(type == 'oci_containerengine_cluster').all(
        change.after['endpoint_config'] != null && change.after['endpoint_config'].length > 0 &&
        change.after['endpoint_config'].all(
          _['is_public_ip_enabled'] == false
        )
      )
  - uid: mondoo-oci-security-oke-public-endpoint-disabled-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'oci_containerengine_cluster')
    mql: |
      terraform.state.resources.where(type == 'oci_containerengine_cluster').all(
        values['endpoint_config'] != null && values['endpoint_config'].length > 0 &&
        values['endpoint_config'].all(
          _['is_public_ip_enabled'] == false
        )
      )
  # No Terraform variants: `availableKubernetesUpgrades` is runtime telemetry derived from Oracle's supported-version list at scan time; no `oci_containerengine_cluster` argument exposes the count of pending upgrades.
  - uid: mondoo-oci-security-oke-supported-kubernetes-version
    title: Ensure OKE clusters run a supported Kubernetes version
    impact: 75
    filters: asset.platform == 'oci'
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: false
      compliance/dora: false
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-5-21
      compliance/nis-2: nis-2-21-2-d
      compliance/nist-csf-1: nist-csf-1-id-sc-2
      compliance/nist-csf-2: nist-csf-2-id-ra-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sr-3
      compliance/nist-sp-800-171: false
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc9-2-2
      compliance/vda-isa-5: false
    mql: |
      oci.oke.clusters.all(availableKubernetesUpgrades.length < 3)
    docs:
      desc: |
        This check flags OKE clusters with three or more available Kubernetes version upgrades pending — a proxy signal that the cluster is running a version that is two or more releases behind current. Kubernetes drops support for older releases on a fixed cadence, so a cluster with many available upgrades is probably running an EOL version with unpatched CVEs.

        The threshold of three is a heuristic, not a guarantee: Oracle occasionally ships several patch versions at once, so a freshly-patched cluster can briefly show three pending upgrades without being EOL. A more precise check would compare `kubernetesVersion` against a maintained list of Oracle-supported minor versions, which is out of scope here. Treat a failure of this check as a signal to review the cluster's version against Oracle's support matrix, not as proof the cluster is EOL.

        **Why this matters**

        Oracle's OKE support policy, and Kubernetes upstream, drop security patches for old minor versions:

        - Every release cycle backports a fresh batch of CVEs to the supported versions; an EOL version stays vulnerable to every CVE disclosed after its drop date.
        - Many Kubernetes CVEs are auth-bypass or privilege-escalation class (CVE-2024-9042, CVE-2025-1974, etc.) — unpatched production clusters are direct tenant-to-tenant pivot risks.
        - Major version skews between node pools and the control plane cause subtle feature breakage in addition to security exposure.
        - OKE's `availableKubernetesUpgrades` field counts every patch and minor release the cluster is behind; three or more is a strong indicator of an EOL state.

        **Risk mitigation**

        - Ensures clusters receive ongoing security patches.
        - Keeps the cluster within Oracle's support window.
        - Prevents the gradual accumulation of known CVEs in the control plane.
      remediation:
        - id: console
          desc: |
            Upgrade OKE clusters to a supported version:

            1. Open **Developer Services** → **Kubernetes Clusters (OKE)** → select the cluster.
            2. **Upgrade Available** → review the target version and upgrade path.
            3. Upgrade the control plane first, then each node pool (recreate nodes or use blue/green rollout).
            4. Re-run the check to confirm `availableKubernetesUpgrades` length is at most two.
        - id: cli
          desc: |
            Upgrade the OKE control plane:

            ```bash
            oci ce cluster update --cluster-id <cluster-ocid> --kubernetes-version <new-version>
            ```
    refs:
      - url: https://docs.oracle.com/en-us/iaas/Content/ContEng/Concepts/contengupgradingk8smasternode.htm
        title: OCI - Upgrading Kubernetes on a Cluster
  - uid: mondoo-oci-security-oke-image-policy-enabled
    title: Ensure OKE clusters enable container image signature verification
    impact: 70
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: false
      compliance/dora: false
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-5-21
      compliance/nis-2: nis-2-21-2-d
      compliance/nist-csf-1: nist-csf-1-id-sc-2
      compliance/nist-csf-2: nist-csf-2-id-ra-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sr-3
      compliance/nist-sp-800-171: false
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc9-2-2
      compliance/vda-isa-5: false
    variants:
      - uid: mondoo-oci-security-oke-image-policy-enabled-oci
        tags:
          mondoo.com/filter-title: OCI
          mondoo.com/filter-icon: oci
      - uid: mondoo-oci-security-oke-image-policy-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-oci-security-oke-image-policy-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-oci-security-oke-image-policy-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check verifies that every OKE cluster has image signature verification enabled. With the image policy enabled, OKE refuses to run container images that are not signed by a trusted key, blocking the most common supply-chain attack path — a malicious or tampered image being pulled by a cluster.

        **Why this matters**

        Without image policy enforcement, a cluster pulls whatever image the pod spec requests with no authenticity check:

        - A compromised container registry, typo-squatted image name, or MITM in the image-pull path can substitute a malicious image.
        - Public base images regularly get supply-chain compromised (event-stream, ua-parser-js, Codecov).
        - An attacker who can modify a Helm chart or Kustomize overlay can swap image references without needing cluster-admin.
        - The image policy adds a cryptographic gate that every one of these attack paths has to bypass.

        **Risk mitigation**

        - Blocks unsigned or unrecognized images from running in the cluster.
        - Forces supply-chain attacks to break or steal a signing key rather than just rewrite a manifest.
        - Aligns with NIST SP 800-204D and SLSA supply-chain guidance.
      remediation:
        - id: console
          desc: |
            Enable image policy on the cluster and configure signing keys:

            1. Open **Developer Services** → **Kubernetes Clusters (OKE)** → select the cluster → **Image Verification Policies**.
            2. Toggle **Enable image verification**.
            3. Add at least one **Key Management (KMS) master encryption key** from an approved signing authority.
            4. Verify by attempting to deploy an unsigned image — OKE should reject the pod.
        - id: cli
          desc: |
            Update the cluster to enable image policy and attach signing keys:

            ```bash
            oci ce cluster update \
              --cluster-id <cluster-ocid> \
              --image-policy-config '{"isPolicyEnabled":true,"keyDetails":[{"kmsKeyId":"<kms-key-ocid>"}]}'
            ```
        - id: terraform
          desc: |
            Declare an `image_policy_config` block with `is_policy_enabled = true` and at least one signing key:

            ```hcl
            resource "oci_containerengine_cluster" "main" {
              compartment_id     = var.compartment_ocid
              name               = "prod"
              vcn_id             = oci_core_vcn.main.id
              kubernetes_version = "v1.30.1"

              image_policy_config {
                is_policy_enabled = true

                key_details {
                  kms_key_id = oci_kms_key.image_signing.id
                }
              }
            }
            ```
    refs:
      - url: https://docs.oracle.com/en-us/iaas/Content/ContEng/Tasks/contengsigningimages_topic-Signing_Container_Images_Using_OCI_Registry.htm
        title: OCI - Signing Container Images
  - uid: mondoo-oci-security-oke-image-policy-enabled-oci
    filters: asset.platform == 'oci'
    mql: |
      oci.oke.clusters.all(isImagePolicyEnabled == true)
  - uid: mondoo-oci-security-oke-image-policy-enabled-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'oci_containerengine_cluster')
    mql: |
      # Cluster must declare an image_policy_config block with is_policy_enabled = true. Without the existence guard, clusters that omit image_policy_config would silently pass.
      terraform.resources('oci_containerengine_cluster').all(
        blocks.where(type == 'image_policy_config') != empty &&
        blocks.where(type == 'image_policy_config').all(
          arguments['is_policy_enabled'] == true
        )
      )
  - uid: mondoo-oci-security-oke-image-policy-enabled-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'oci_containerengine_cluster')
    mql: |
      terraform.plan.resourceChanges.where(type == 'oci_containerengine_cluster').all(
        change.after['image_policy_config'] != null && change.after['image_policy_config'].length > 0 &&
        change.after['image_policy_config'].all(
          _['is_policy_enabled'] == true
        )
      )
  - uid: mondoo-oci-security-oke-image-policy-enabled-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'oci_containerengine_cluster')
    mql: |
      terraform.state.resources.where(type == 'oci_containerengine_cluster').all(
        values['image_policy_config'] != null && values['image_policy_config'].length > 0 &&
        values['image_policy_config'].all(
          _['is_policy_enabled'] == true
        )
      )
  # No Terraform variants: requires cross-resource lookup from `oci_containerengine_node_pool` to its referenced `oci_core_subnet` to read `prohibit_public_ip_on_vnic`. Cross-resource graph traversal is fragile in HCL/plan/state and unsupported by the patterns used elsewhere in this file.
  - uid: mondoo-oci-security-oke-node-pool-private-subnets
    title: Ensure OKE node pool worker nodes are placed in private subnets
    impact: 80
    filters: asset.platform == 'oci'
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: false
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-6
    mql: |
      oci.oke.clusters.all(
        nodePools.all(
          subnets.all(prohibitPublicIpOnVnic == true)
        )
      )
    docs:
      desc: |
        This check verifies that every OKE node pool places its worker nodes in subnets that prohibit public IPs on VNICs. A node pool subnet without `prohibitPublicIpOnVnic == true` allows worker nodes to be assigned a public IP and become directly reachable from the internet — exposing the kubelet, the container runtime, and every workload pod's host networking to internet scanning.

        The OKE control-plane endpoint check (`mondoo-oci-security-oke-public-endpoint-disabled`) only covers the Kubernetes API server. Worker placement is a separate hardening dimension: a cluster with a private API endpoint can still have all of its worker nodes in a public subnet.

        **Why this matters**

        Worker nodes run the workloads, store ephemeral secrets in memory, and have privileged access to the cluster's networking:

        - A worker with a public IP exposes kubelet (port 10250), the container runtime, and any `hostPort` or `hostNetwork` pod to the internet.
        - Compromise of a single worker node typically yields service-account tokens, in-memory secrets, and lateral movement into the cluster.
        - `prohibitPublicIpOnVnic: true` on the subnet provides a structural guarantee that worker nodes cannot accidentally be given a public IP.
        - Public-IP workers also bypass the egress controls (NAT gateway, service gateway) that route private-subnet traffic through inspectable choke points.

        **Risk mitigation**

        - Removes internet reachability of worker nodes and their kubelets.
        - Forces all node-to-internet traffic through a NAT or service gateway, where it can be logged and filtered.
        - Prevents accidental exposure if a node pool is reconfigured.
      remediation:
        - id: console
          desc: |
            Move the node pool to private subnets:

            1. Identify or create subnets with **Prohibit public IP on VNIC** set to **Yes** in the cluster's VCN.
            2. Open **Developer Services** → **Kubernetes Clusters (OKE)** → select the cluster → **Node Pools** → select the node pool.
            3. Node pool subnets cannot be changed in place — create a replacement node pool that targets the private subnets.
            4. Cordon and drain the existing node pool, then delete it once workloads have rescheduled.
        - id: cli
          desc: |
            Provision a replacement node pool in a private subnet, then drain and delete the public one:

            ```bash
            # Create a replacement node pool in a private subnet
            oci ce node-pool create \
              --cluster-id <cluster-ocid> \
              --compartment-id <compartment-ocid> \
              --name <node-pool-name>-private \
              --kubernetes-version <version> \
              --node-shape <shape> \
              --placement-configs '[{"availabilityDomain":"<AD>","subnetId":"<private-subnet-ocid>"}]' \
              --size <count>

            # Drain and delete the original (public-subnet) node pool
            oci ce node-pool delete --node-pool-id <old-node-pool-ocid> --force
            ```
        - id: terraform
          desc: |
            Place node pool workers in subnets that prohibit public IPs on VNICs:

            ```hcl
            resource "oci_core_subnet" "workers_private" {
              compartment_id             = var.compartment_ocid
              vcn_id                     = oci_core_vcn.cluster.id
              cidr_block                 = "10.0.10.0/24"
              prohibit_public_ip_on_vnic = true
              prohibit_internet_ingress  = true
            }

            resource "oci_containerengine_node_pool" "app" {
              cluster_id         = oci_containerengine_cluster.app.id
              compartment_id     = var.compartment_ocid
              kubernetes_version = var.k8s_version
              name               = "app-pool"
              node_shape         = "VM.Standard.E4.Flex"

              node_config_details {
                placement_configs {
                  availability_domain = var.availability_domain
                  subnet_id           = oci_core_subnet.workers_private.id
                }
                size = 3
              }
            }
            ```
    refs:
      - url: https://docs.oracle.com/en-us/iaas/Content/ContEng/Concepts/contengnetworkconfig.htm
        title: OCI - Network resource configuration for Kubernetes clusters
  - uid: mondoo-oci-security-oke-node-pool-nsgs-attached
    title: Ensure OKE node pool worker nodes have NSGs attached
    impact: 60
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: false
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-6
    variants:
      - uid: mondoo-oci-security-oke-node-pool-nsgs-attached-oci
        tags:
          mondoo.com/filter-title: OCI
          mondoo.com/filter-icon: oci
      - uid: mondoo-oci-security-oke-node-pool-nsgs-attached-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-oci-security-oke-node-pool-nsgs-attached-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-oci-security-oke-node-pool-nsgs-attached-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check verifies that every OKE node pool has at least one Network Security Group attached to its worker node VNICs. Without NSGs, node traffic is governed only by the subnet's security lists — a coarser, harder-to-reason-about model that applies to every resource in the subnet rather than just the node pool.

        **Why this matters**

        NSGs provide explicit, resource-level network access control that scopes naturally to the workload:

        - Security lists apply uniformly to every VNIC in the subnet, including non-OKE resources, making least-privilege rules hard to express.
        - NSGs allow the node pool's traffic policy to be tightened independently of unrelated workloads in the same subnet.
        - NSG rules can reference other NSGs (e.g., "allow from the load balancer NSG"), keeping rules stable as IP ranges change.
        - With no NSG attached, a misconfigured subnet security list silently widens the node pool's exposure.

        **Risk mitigation**

        - Provides a per-node-pool firewall layer independent of subnet-level rules.
        - Enables NSG-to-NSG references so node pool rules don't depend on IP ranges that drift over time.
        - Closes the "subnet security list is the only gate" failure mode where a single overly-permissive rule exposes every workload in the subnet.
      remediation:
        - id: console
          desc: |
            Attach an NSG to the node pool:

            1. Open **Developer Services** → **Kubernetes Clusters (OKE)** → select the cluster → **Node Pools** → select the node pool.
            2. Click **Edit** → expand **Advanced options** → **Network security groups**.
            3. Select an existing NSG (or create one) that defines the desired ingress and egress rules for worker nodes.
            4. Save. New nodes provisioned by the pool inherit the NSG; existing nodes pick up the NSG on the next cycle.
        - id: cli
          desc: |
            Attach an NSG to the node pool. New nodes provisioned by the pool inherit the NSG; existing nodes pick up the NSG on the next cycle.

            ```bash
            oci ce node-pool update \
              --node-pool-id <node-pool-ocid> \
              --nsg-ids '["<nsg-ocid>"]'
            ```
        - id: terraform
          desc: |
            Configure each `oci_containerengine_node_pool` with `nsg_ids` inside `node_config_details`:

            ```hcl
            resource "oci_core_network_security_group" "oke_workers" {
              compartment_id = var.compartment_ocid
              vcn_id         = oci_core_vcn.cluster.id
              display_name   = "oke-workers"
            }

            resource "oci_containerengine_node_pool" "app" {
              cluster_id         = oci_containerengine_cluster.app.id
              compartment_id     = var.compartment_ocid
              kubernetes_version = var.k8s_version
              name               = "app-pool"
              node_shape         = "VM.Standard.E4.Flex"

              node_config_details {
                placement_configs {
                  availability_domain = var.availability_domain
                  subnet_id           = oci_core_subnet.workers_private.id
                }
                nsg_ids = [oci_core_network_security_group.oke_workers.id]
                size    = 3
              }
            }
            ```
    refs:
      - url: https://docs.oracle.com/en-us/iaas/Content/ContEng/Concepts/contengnetworkconfig.htm
        title: OCI - Network resource configuration for Kubernetes clusters
  - uid: mondoo-oci-security-oke-node-pool-nsgs-attached-oci
    filters: asset.platform == 'oci'
    mql: |
      oci.oke.clusters.all(
        nodePools.all(networkSecurityGroups.length > 0)
      )
  - uid: mondoo-oci-security-oke-node-pool-nsgs-attached-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'oci_containerengine_node_pool')
    mql: |
      # Node pool must declare a node_config_details block whose nsg_ids is a non-empty list. Without the existence guard, node pools that omit node_config_details would silently pass.
      terraform.resources('oci_containerengine_node_pool').all(
        blocks.where(type == 'node_config_details') != empty &&
        blocks.where(type == 'node_config_details').all(
          arguments['nsg_ids'] != null && arguments['nsg_ids'].length > 0
        )
      )
  - uid: mondoo-oci-security-oke-node-pool-nsgs-attached-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'oci_containerengine_node_pool')
    mql: |
      terraform.plan.resourceChanges.where(type == 'oci_containerengine_node_pool').all(
        change.after['node_config_details'] != null && change.after['node_config_details'].length > 0 &&
        change.after['node_config_details'].all(
          _['nsg_ids'] != null && _['nsg_ids'].length > 0
        )
      )
  - uid: mondoo-oci-security-oke-node-pool-nsgs-attached-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'oci_containerengine_node_pool')
    mql: |
      terraform.state.resources.where(type == 'oci_containerengine_node_pool').all(
        values['node_config_details'] != null && values['node_config_details'].length > 0 &&
        values['node_config_details'].all(
          _['nsg_ids'] != null && _['nsg_ids'].length > 0
        )
      )
  - uid: mondoo-oci-security-adb-mtls-or-restricted
    title: Ensure Autonomous Databases require mTLS or restrict access via ACL / NSG
    impact: 90
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: false
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-6
    variants:
      - uid: mondoo-oci-security-adb-mtls-or-restricted-oci
        tags:
          mondoo.com/filter-title: OCI
          mondoo.com/filter-icon: oci
      - uid: mondoo-oci-security-adb-mtls-or-restricted-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-oci-security-adb-mtls-or-restricted-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-oci-security-adb-mtls-or-restricted-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check verifies that every Autonomous Database either requires mutual TLS (`isMtlsConnectionRequired == true`) or restricts access via a private endpoint, IP allowlist, or attached NSGs. An ADB reachable over the public internet with mTLS disabled and no network ACL is effectively accepting any wallet-authenticated connection from any source — a far weaker posture than Oracle's documented secure baseline.

        **Why this matters**

        mTLS on ADB protects the connection with client-certificate authentication on top of the usual username/password:

        - Without mTLS, leaked DB credentials are sufficient for any attacker on the internet to connect.
        - ADB wallets (`ewallet.p12`) that are required for TLS-only mode are regularly committed to repos or shared in support tickets — mTLS turns that leak into "need credentials AND need the wallet."
        - IP ACLs (`whitelistedIps`) and NSGs provide a second-layer network gate even if credentials and wallets leak.
        - A database that has none of (mTLS required, private endpoint, ACL, NSG) is the single weakest configuration the service allows.

        **Risk mitigation**

        - Closes the "credentials-only" path to the database.
        - Forces attackers to compromise client-side wallet material in addition to any leaked password.
        - Aligns with Oracle's recommended production posture for Autonomous Database.
      remediation:
        - id: console
          desc: |
            Harden the Autonomous Database's network posture:

            1. Open **Oracle Database** → **Autonomous Database** → select the DB.
            2. Pick the most restrictive network path that still meets application requirements:
               - **Secure access from everywhere with mTLS**: require mTLS (`Require mutual TLS (mTLS) authentication`).
               - **Allow secure access from specified IPs and VCNs**: configure an IP / NSG allowlist.
               - **Private endpoint access only**: attach a private endpoint in a dedicated subnet.
            3. Save. Applications that were relying on TLS-only mode must switch to mTLS wallets.
        - id: cli
          desc: |
            Require mTLS on an existing ADB:

            ```bash
            oci db autonomous-database update \
              --autonomous-database-id <adb-ocid> \
              --is-mtls-connection-required true
            ```
        - id: terraform
          desc: |
            Configure each Autonomous Database with at least one of `is_mtls_connection_required = true`, a private endpoint, an IP allowlist, or attached NSGs:

            ```hcl
            resource "oci_database_autonomous_database" "app" {
              compartment_id           = var.compartment_ocid
              db_name                  = "appdb"
              admin_password           = var.adb_admin_password
              cpu_core_count           = 1
              data_storage_size_in_tbs = 1

              # Option A: require mTLS for public-network access
              is_mtls_connection_required = true

              # Option B: confine to a private endpoint (alternative to public + mTLS)
              # subnet_id  = oci_core_subnet.adb_private.id
              # nsg_ids    = [oci_core_network_security_group.adb.id]

              # Option C: ACL the public listener to known networks
              # whitelisted_ips = ["10.0.0.0/16"]
            }
            ```
    refs:
      - url: https://docs.oracle.com/en-us/iaas/autonomous-database-serverless/doc/network-access-types.html
        title: OCI - Autonomous Database Network Access
  - uid: mondoo-oci-security-adb-mtls-or-restricted-oci
    filters: asset.platform == 'oci'
    mql: |
      oci.database.autonomousDatabases.all(
        isMtlsConnectionRequired == true ||
        privateEndpointIp != null ||
        whitelistedIps.length > 0 ||
        nsgIds.length > 0
      )
  - uid: mondoo-oci-security-adb-mtls-or-restricted-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'oci_database_autonomous_database')
    mql: |
      terraform.resources('oci_database_autonomous_database').all(
        arguments['is_mtls_connection_required'] == true ||
        arguments['private_endpoint_ip'] != null ||
        arguments['whitelisted_ips'] != null && arguments['whitelisted_ips'].length > 0 ||
        arguments['nsg_ids'] != null && arguments['nsg_ids'].length > 0
      )
  - uid: mondoo-oci-security-adb-mtls-or-restricted-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'oci_database_autonomous_database')
    mql: |
      terraform.plan.resourceChanges.where(type == 'oci_database_autonomous_database').all(
        change.after['is_mtls_connection_required'] == true ||
        change.after['private_endpoint_ip'] != null ||
        change.after['whitelisted_ips'] != null && change.after['whitelisted_ips'].length > 0 ||
        change.after['nsg_ids'] != null && change.after['nsg_ids'].length > 0
      )
  - uid: mondoo-oci-security-adb-mtls-or-restricted-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'oci_database_autonomous_database')
    mql: |
      terraform.state.resources.where(type == 'oci_database_autonomous_database').all(
        values['is_mtls_connection_required'] == true ||
        values['private_endpoint_ip'] != null ||
        values['whitelisted_ips'] != null && values['whitelisted_ips'].length > 0 ||
        values['nsg_ids'] != null && values['nsg_ids'].length > 0
      )
  - uid: mondoo-oci-security-adb-no-public-management-urls
    title: Ensure Autonomous Databases do not expose public management URLs
    impact: 85
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: false
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-6
    variants:
      - uid: mondoo-oci-security-adb-no-public-management-urls-oci
        tags:
          mondoo.com/filter-title: OCI
          mondoo.com/filter-icon: oci
      - uid: mondoo-oci-security-adb-no-public-management-urls-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-oci-security-adb-no-public-management-urls-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-oci-security-adb-no-public-management-urls-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check verifies that every Autonomous Database is provisioned with a private endpoint, with no publicly reachable management URLs surfaced. An ADB outside private-endpoint mode publishes a set of management web URLs — APEX, SQL Developer Web, ORDS, GraphStudio, MongoDB API, Machine Learning Notebooks, Database Transforms — that are reachable over the public internet, even when an IP allowlist or NSG is applied.

        This is a stricter posture than `mondoo-oci-security-adb-mtls-or-restricted`, which permits a public ADB as long as mTLS, an ACL, or an NSG is configured. Those controls protect the *database listener*; they do not remove the *management web surface*. Pre-authentication CVEs in ORDS or APEX, credential-stuffing against the management UIs, and accidental enrollment of a developer's IP into the allowlist all become non-issues only when the ADB has no public URLs at all.

        **Why this matters**

        The Autonomous Database management web surface is broad and historically attacked:

        - APEX and ORDS have shipped pre-authentication CVEs that let an unauthenticated attacker on the internet enumerate or exploit the database without any credentials.
        - SQL Developer Web and the ML Notebook UI accept username/password authentication and are credential-stuffing targets.
        - IP allowlists rot — networks change, VPN exit IPs are reassigned to other tenants, and `0.0.0.0/0` slips in as a "temporary" debugging step.
        - A private-endpoint ADB has no public URLs at all; the management surface only exists inside the VCN.

        **Risk mitigation**

        - Removes the entire public management web surface, not just the SQL listener.
        - Eliminates exposure to pre-authentication CVEs in the ADB management stack.
        - Closes the "allowlist drift" failure mode where an over-broad CIDR silently exposes the management UIs.
      remediation:
        - id: console
          desc: |
            Re-provision the ADB with private endpoint access:

            1. Open **Oracle Database** → **Autonomous Database** → select the database.
            2. Network access mode cannot be changed in place from public to private endpoint — provision a replacement ADB and migrate.
            3. When provisioning the replacement, choose **Private endpoint access only** and select a subnet with **Prohibit public IP on VNIC** enabled.
            4. Migrate using Data Pump or a refreshable clone, then terminate the original.
        - id: cli
          desc: |
            Provision a replacement ADB in private-endpoint mode:

            ```bash
            oci db autonomous-database create \
              --compartment-id <compartment-ocid> \
              --db-name appdb \
              --display-name "appdb" \
              --admin-password "$ADB_ADMIN_PASSWORD" \
              --cpu-core-count 1 \
              --data-storage-size-in-tbs 1 \
              --subnet-id <private-subnet-ocid> \
              --nsg-ids '["<nsg-ocid>"]'
            ```

            Migrate data with Data Pump or a refreshable clone, then delete the original public-mode ADB.
        - id: terraform
          desc: |
            Provision Autonomous Databases with `subnet_id` set so the ADB is created in private-endpoint mode and surfaces no public management URLs:

            ```hcl
            resource "oci_database_autonomous_database" "app" {
              compartment_id           = var.compartment_ocid
              db_name                  = "appdb"
              admin_password           = var.adb_admin_password
              cpu_core_count           = 1
              data_storage_size_in_tbs = 1

              # Private endpoint mode — no public connection URLs are surfaced
              subnet_id = oci_core_subnet.adb_private.id
              nsg_ids   = [oci_core_network_security_group.adb.id]
            }
            ```
    refs:
      - url: https://docs.oracle.com/en-us/iaas/autonomous-database-serverless/doc/network-access-types.html
        title: OCI - Autonomous Database Network Access
      - url: https://docs.oracle.com/en-us/iaas/autonomous-database-serverless/doc/private-endpoint-overview.html
        title: OCI - Configure Private Endpoint Access
  - uid: mondoo-oci-security-adb-no-public-management-urls-oci
    filters: asset.platform == 'oci'
    mql: |
      # The OCI provider populates `connectionUrls` only when the underlying ADB has a non-nil ConnectionUrls struct, which Oracle returns when public or NSG-allowed access is enabled. Private-endpoint ADBs return a nil ConnectionUrls and therefore a null `connectionUrls` in MQL — see https://github.com/mondoohq/mql/pull/7337.
      oci.database.autonomousDatabases.all(connectionUrls == null)
  - uid: mondoo-oci-security-adb-no-public-management-urls-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'oci_database_autonomous_database')
    mql: |
      terraform.resources('oci_database_autonomous_database').all(
        arguments['subnet_id'] != null
      )
  - uid: mondoo-oci-security-adb-no-public-management-urls-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'oci_database_autonomous_database')
    mql: |
      terraform.plan.resourceChanges.where(type == 'oci_database_autonomous_database').all(
        change.after['subnet_id'] != null
      )
  - uid: mondoo-oci-security-adb-no-public-management-urls-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'oci_database_autonomous_database')
    mql: |
      terraform.state.resources.where(type == 'oci_database_autonomous_database').all(
        values['subnet_id'] != null
      )
  # No Terraform variants: requires cross-resource lookup from `oci_database_db_system` to its referenced `oci_core_subnet` to read `prohibit_public_ip_on_vnic`. Cross-resource graph traversal is fragile in HCL/plan/state and unsupported by the patterns used elsewhere in this file.
  - uid: mondoo-oci-security-dbsystem-private-subnet
    title: Ensure DB systems are deployed in subnets that prohibit public IPs on VNICs
    impact: 90
    filters: asset.platform == 'oci'
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: false
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-6
    mql: |
      oci.database.dbSystems.all(
        subnet.prohibitPublicIpOnVnic == true
      )
    docs:
      desc: |
        This check verifies that every OCI DB System is deployed in a subnet that prohibits public IP assignment on VNICs. A DB system whose VNIC carries a public IP is directly reachable from the internet — this is the most exposed possible posture and conflicts with Oracle's deployment guidance.

        **Why this matters**

        DB systems hold the organization's most sensitive data and expect to operate behind a controlled network boundary:

        - A public-IP DB listener is scanned constantly from the internet for Oracle-specific CVEs and brute-force targets.
        - DB systems lack WAF, DDoS, and rate-limiting protections that typically front internet-facing applications.
        - Access from applications should be via the subnet route / VCN peering, not the internet.
        - `prohibitPublicIpOnVnic: true` on the subnet provides a structural guarantee that the DB system cannot accidentally be given a public IP.

        **Risk mitigation**

        - Removes internet reachability of database services.
        - Forces application-to-DB traffic through controlled VCN paths.
        - Prevents accidental exposure through VNIC reconfiguration.
      remediation:
        - id: console
          desc: |
            Move the DB system to a private subnet:

            1. Identify or create a subnet with **Prohibit public IP on VNIC** set to **Yes**.
            2. Since DB system subnet cannot be changed after creation, provision a replacement DB system in the private subnet.
            3. Migrate data to the replacement via Data Pump, Data Guard, or RMAN.
            4. Terminate the DB system in the public subnet once traffic has cut over.
        - id: cli
          desc: |
            Create a private subnet that DB systems can use:

            ```bash
            oci network subnet create \
              --compartment-id <compartment-ocid> \
              --vcn-id <vcn-ocid> \
              --cidr-block 10.0.10.0/24 \
              --prohibit-public-ip-on-vnic true \
              --display-name private-db-subnet
            ```
    refs:
      - url: https://docs.oracle.com/en-us/iaas/Content/Database/Concepts/databaseoverview.htm
        title: OCI - Database Service Overview
  # No Terraform variants: requires walking from `oci_database_db_system` to its subnet to that subnet's `oci_core_route_table` and inspecting route rules for an internet-gateway target. Three-hop cross-resource traversal is fragile in HCL/plan/state and unsupported by the patterns used elsewhere in this file.
  - uid: mondoo-oci-security-dbsystem-subnet-no-internet-gateway
    title: Ensure DB system subnets have no route to an internet gateway
    impact: 85
    filters: asset.platform == 'oci'
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: false
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-6
    mql: |
      oci.database.dbSystems.all(
        subnet.routeTable.routeRules.none(
          _['destination'] == "0.0.0.0/0" && _['networkEntityId'].contains("internetgateway")
        )
      )
    docs:
      desc: |
        This check verifies that DB system subnets have no route rule that sends the default route (`0.0.0.0/0`) to an internet gateway. Even if the DB system has no public IP, a subnet with an IGW route means any compromise on the DB host can freely exfiltrate data to any address on the internet — the network provides no egress boundary.

        **Why this matters**

        Egress controls matter as much as ingress for data-storage systems:

        - Attackers who gain a foothold on a DB host (via RCE in the listener, a compromised user process, or a maintenance backdoor) can stream data out to any address.
        - Ransomware actors rely on egress to exfiltrate before encrypting, turning a backup-heavy tenancy into a "pay or we publish" scenario.
        - A NAT gateway with audit logging is an acceptable egress path for patch downloads; a direct IGW route is not.
        - The existence of an IGW in the subnet route table is a structural decision that outlives the current DB system and must be deliberately owned.

        **Risk mitigation**

        - Prevents direct data exfiltration from compromised DB hosts.
        - Forces egress traffic through managed paths (NAT gateway with logging, service gateway for OCI services).
        - Enables detection of unusual outbound traffic patterns.
      remediation:
        - id: console
          desc: |
            Remove the internet gateway route from the DB subnet:

            1. Open **Networking** → **Virtual Cloud Networks** → the DB subnet's VCN → **Route Tables** → the route table associated with the DB subnet.
            2. Delete any route rule whose **Destination** is `0.0.0.0/0` and whose **Target Type** is **Internet Gateway**.
            3. If egress is required for patching or integrations, replace with a route to a NAT gateway or service gateway.
            4. Verify the DB continues to reach OCI services through the service gateway.
        - id: cli
          desc: |
            Update the route table to drop the IGW default route:

            ```bash
            oci network route-table update \
              --rt-id <route-table-ocid> \
              --route-rules '[{"destination":"all-<region>-services-in-oracle-services-network","destinationType":"SERVICE_CIDR_BLOCK","networkEntityId":"<service-gateway-ocid>"}]'
            ```
    refs:
      - url: https://docs.oracle.com/en-us/iaas/Content/Network/Tasks/managingroutetables.htm
        title: OCI - Managing Route Tables
  - uid: mondoo-oci-security-vault-secrets-rotation-enabled
    title: Ensure OCI Vault secrets older than a year have scheduled rotation enabled
    impact: 70
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-5-17
      compliance/nis-2: false
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-5
      compliance/nist-sp-800-171: false
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-9
      compliance/vda-isa-5: vda-isa-5-4-1-3
    variants:
      - uid: mondoo-oci-security-vault-secrets-rotation-enabled-oci
        tags:
          mondoo.com/filter-title: OCI
          mondoo.com/filter-icon: oci
      - uid: mondoo-oci-security-vault-secrets-rotation-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-oci-security-vault-secrets-rotation-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-oci-security-vault-secrets-rotation-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check verifies that every active OCI Vault secret older than 365 days has scheduled rotation enabled. Long-lived secrets without rotation are a classic persistent-credential risk: any leak — historical, current, or future — is effective until an operator manually rotates the secret.

        **Why this matters**

        Vault secrets without scheduled rotation behave like shared static passwords:

        - A secret that has never rotated is as strong as its weakest moment of exposure over its entire lifetime.
        - Offboarded employees who once had access to the plaintext retain that access implicitly.
        - Compromised CI pipelines, development machines, and third-party tools that ever read the secret remain effective forever.
        - Scheduled rotation flips this: any leak is useful only until the next rotation window, typically days or weeks.

        **Risk mitigation**

        - Caps the useful lifetime of any leaked secret.
        - Reduces the impact of historical exposures that predate current tooling.
        - Forces the consuming applications to stay wired to Vault instead of caching plaintext.
      remediation:
        - id: console
          desc: |
            Enable scheduled rotation on secrets that have lived for more than a year:

            1. Open **Identity & Security** → **Vault** → the parent vault → **Secrets** → select the secret.
            2. Under **Secret Generation and Rotation**, select **Edit**.
            3. Enable **Auto-Generation** and configure **Scheduled Rotation** with an interval appropriate for the secret (P30D = 30 days for API tokens, P90D for database passwords, etc.).
            4. Provide a rotation target (e.g., database auth function) that Vault invokes on the rotation schedule.
        - id: cli
          desc: |
            Enable scheduled rotation on an existing Vault secret:

            ```bash
            oci vault secret update \
              --secret-id <secret-ocid> \
              --secret-rules '[{"ruleType":"SECRET_EXPIRY_RULE","secretVersionExpiryInterval":"P90D","isSecretContentRetrievalBlockedOnExpiry":true}]'
            ```
        - id: terraform
          desc: |
            Declare a `rotation_config` block on each Vault secret with `is_scheduled_rotation_enabled = true` and a rotation function target:

            ```hcl
            resource "oci_vault_secret" "db_password" {
              compartment_id = var.compartment_ocid
              vault_id       = oci_kms_vault.app.id
              key_id         = oci_kms_key.app.id
              secret_name    = "db-password"

              secret_content {
                content_type = "BASE64"
                content      = base64encode(var.initial_db_password)
              }

              rotation_config {
                is_scheduled_rotation_enabled = true
                rotation_interval             = "P90D"

                target_system_details {
                  target_system_type = "FUNCTION"
                  function_id        = oci_functions_function.rotate_db_password.id
                }
              }
            }
            ```
    refs:
      - url: https://docs.oracle.com/en-us/iaas/Content/KeyManagement/Tasks/managingsecrets.htm
        title: OCI - Managing Secrets
  - uid: mondoo-oci-security-vault-secrets-rotation-enabled-oci
    filters: asset.platform == 'oci'
    mql: |
      oci.vault.secrets.where(
        state == "ACTIVE" &&
        time.now - created > 365 * time.day
      ).all(isScheduledRotationEnabled == true)
  - uid: mondoo-oci-security-vault-secrets-rotation-enabled-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'oci_vault_secret')
    mql: |
      # Terraform cannot tell whether a secret is older than 365 days, so this stricter variant requires every managed `oci_vault_secret` to declare a rotation_config block with is_scheduled_rotation_enabled = true.
      terraform.resources('oci_vault_secret').all(
        blocks.where(type == 'rotation_config') != empty &&
        blocks.where(type == 'rotation_config').all(
          arguments['is_scheduled_rotation_enabled'] == true
        )
      )
  - uid: mondoo-oci-security-vault-secrets-rotation-enabled-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'oci_vault_secret')
    mql: |
      terraform.plan.resourceChanges.where(type == 'oci_vault_secret').all(
        change.after['rotation_config'] != null && change.after['rotation_config'].length > 0 &&
        change.after['rotation_config'].all(
          _['is_scheduled_rotation_enabled'] == true
        )
      )
  - uid: mondoo-oci-security-vault-secrets-rotation-enabled-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'oci_vault_secret')
    mql: |
      terraform.state.resources.where(type == 'oci_vault_secret').all(
        values['rotation_config'] != null && values['rotation_config'].length > 0 &&
        values['rotation_config'].all(
          _['is_scheduled_rotation_enabled'] == true
        )
      )
  # No Terraform variants: `timeOfCurrentVersionExpiry` is runtime telemetry on the current secret version; the `oci_vault_secret` Terraform resource has no field that exposes whether the active version is past its expiry time.
  - uid: mondoo-oci-security-vault-secrets-not-expired
    title: Ensure OCI Vault active secret versions are not past their expiry time
    impact: 65
    filters: asset.platform == 'oci'
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-5-17
      compliance/nis-2: false
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-5
      compliance/nist-sp-800-171: false
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-9
      compliance/vda-isa-5: vda-isa-5-4-1-3
    mql: |
      oci.vault.secrets.where(state == "ACTIVE").all(
        timeOfCurrentVersionExpiry == null ||
        timeOfCurrentVersionExpiry > time.now
      )
    docs:
      desc: |
        This check flags active OCI Vault secrets whose current version has an expiry in the past. A secret past its `timeOfCurrentVersionExpiry` is either in an un-rotated state (the rotation schedule failed) or the consuming application is still reading a version that the operator intended to be dead — either way, an operational-turned-security problem that must be resolved.

        **Why this matters**

        Expired secret versions signal a broken trust assumption:

        - The secret's planned rotation did not complete, leaving dependents on an out-of-policy version.
        - Monitoring that treats "Vault has the secret" as sufficient does not notice the version drift.
        - Applications silently continue to authenticate with the expired credential until it is forcibly invalidated, masking the problem.
        - The intended rotation cadence — which is often designed around compliance requirements — is not being met.

        **Risk mitigation**

        - Surfaces broken rotation pipelines before the expired credential is abused or invalidated.
        - Ensures the secret lifecycle reflected in Vault matches what dependents actually use.
        - Creates a forcing function to wire rotation destinations correctly.
      remediation:
        - id: console
          desc: |
            Investigate and repair expired secret versions:

            1. Open **Identity & Security** → **Vault** → the parent vault → **Secrets** → select the expired secret.
            2. Under **Versions**, confirm which version is current and why its expiry has passed.
            3. Trigger a rotation (either manually or by waiting for the scheduled rotation function to run).
            4. Verify consumers pick up the new version; update downstream systems that cache the old version.
        - id: cli
          desc: |
            Rotate an expired Vault secret:

            ```bash
            oci vault secret rotate --secret-id <secret-ocid>
            ```
    refs:
      - url: https://docs.oracle.com/en-us/iaas/Content/KeyManagement/Tasks/rotatingsecrets.htm
        title: OCI - Rotating Secrets
  - uid: mondoo-oci-security-functions-config-no-credentials
    title: Ensure OCI Functions applications do not store credentials in config
    impact: 90
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-5-17
      compliance/nis-2: false
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-5
      compliance/nist-sp-800-171: false
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-9
      compliance/vda-isa-5: vda-isa-5-4-1-3
    variants:
      - uid: mondoo-oci-security-functions-config-no-credentials-oci
        tags:
          mondoo.com/filter-title: OCI
          mondoo.com/filter-icon: oci
      - uid: mondoo-oci-security-functions-config-no-credentials-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-oci-security-functions-config-no-credentials-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-oci-security-functions-config-no-credentials-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check flags OCI Functions applications whose `config` environment variables look like they carry credentials. Four patterns are detected:

        1. **Suspicious key names** — `aws_access_key_id`, `aws_secret_access_key`, `aws_session_token`, `oci_api_key`, `oci_secret`, `db_password`, `api_token`, `bearer_token`, `private_key` (case-insensitive, exact match).
        2. **AWS access key IDs in values** — strings matching the documented AWS access-key-ID prefixes.
        3. **PEM private keys in values** — values containing `-----BEGIN` and `PRIVATE KEY-----` markers.
        4. **JWT tokens in values** — three base64url segments separated by dots, starting with `eyJ`.

        Function configuration is passed to every function invocation as environment variables and is readable by anyone with `functions-application:read` permission.

        **Why this matters**

        Functions `config` is a convenient but exposed location for credentials:

        - The config map is returned by `GetApplication` and visible to every IAM principal with read access to the compartment.
        - Environment variables are inherited by every function in the application, so a per-function secret requirement leaks across unrelated functions.
        - Vault secrets accessed through the resource principal provide the same convenience with proper access logging, rotation, and KMS encryption.
        - Credentials in env vars survive container rebuilds and are snapshotted into every logging and observability backend that captures environment metadata.

        **Risk mitigation**

        - Eliminates a common credential-leak channel for serverless workloads.
        - Forces functions to authenticate via the resource principal or fetch from Vault at runtime.
        - Provides an auditable access path (Vault + KMS + CloudTrail) for every credential read.
      remediation:
        - id: console
          desc: |
            Move credentials out of Functions application config:

            1. Rotate any credentials found in `config` immediately — assume they are compromised.
            2. Open **Developer Services** → **Functions** → the application → **Configuration**.
            3. Remove the credential key-value pair.
            4. In the function code, fetch the secret from Vault at startup using the function's resource principal:
               ```python
               import oci
               signer = oci.auth.signers.get_resource_principals_signer()
               vault = oci.vault.VaultsClient(config={}, signer=signer)
               ```
        - id: cli
          desc: |
            Clear a sensitive key from a Functions application config:

            ```bash
            oci fn application update --application-id <app-ocid> --config '{}'
            ```

            Repopulate with only non-sensitive keys via subsequent updates.
        - id: terraform
          desc: |
            Keep the Functions application `config` map free of credential-named keys and credential-shaped values; reference Vault secret OCIDs and let function code resolve them at runtime via the resource principal:

            ```hcl
            resource "oci_functions_application" "app" {
              compartment_id = var.compartment_ocid
              display_name   = "app"
              subnet_ids     = [oci_core_subnet.private.id]

              config = {
                # Do NOT place credentials here. Reference the Vault secret OCID instead:
                DB_PASSWORD_SECRET_OCID = oci_vault_secret.db_password.id
                LOG_LEVEL               = "info"
              }
            }
            ```
    refs:
      - url: https://docs.oracle.com/en-us/iaas/Content/Functions/Tasks/functionsusingconfigparams.htm
        title: OCI - Passing Custom Configuration Parameters to Functions
      - url: https://docs.oracle.com/en-us/iaas/Content/Functions/Tasks/functionsaccessingociresources.htm
        title: OCI - Accessing OCI Resources from Running Functions
  - uid: mondoo-oci-security-functions-config-no-credentials-oci
    filters: asset.platform == 'oci'
    mql: |
      oci.functions.applications.all(
        config.keys.none(
          _.downcase == /^aws_access_key_id$|^aws_secret_access_key$|^aws_session_token$|^oci_api_key$|^oci_secret$|^api_token$|^bearer_token$|^db_password$|^private_key$|^password$|^passwd$|^secret$|^access_key$|^client_secret$|^connection_string$/
        ) &&
        config.values.none(
          _.find(/(A3T[A-Z0-9]|AKIA|AGPA|AIDA|AROA|AIPA|ANPA|ANVA|ASIA)[A-Z0-9]{16}/) != empty ||
          _.contains("-----BEGIN") && _.contains("PRIVATE KEY-----") ||
          _.find(/\beyJ[A-Za-z0-9_\-]{10,}\.[A-Za-z0-9_\-]{10,}\.[A-Za-z0-9_\-]{10,}\b/) != empty
        )
      )
  - uid: mondoo-oci-security-functions-config-no-credentials-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'oci_functions_application')
    mql: |
      # Two datapoints: applications with a config map must not have credential-named keys, and must not have credential-shaped values. Applications without a config map are filtered out by .where().
      terraform.resources('oci_functions_application').where(arguments['config'] != null).all(
        arguments['config'].keys.none(
          _.downcase == /^aws_access_key_id$|^aws_secret_access_key$|^aws_session_token$|^oci_api_key$|^oci_secret$|^api_token$|^bearer_token$|^db_password$|^private_key$|^password$|^passwd$|^secret$|^access_key$|^client_secret$|^connection_string$/
        )
      )
      terraform.resources('oci_functions_application').where(arguments['config'] != null).all(
        arguments['config'].values.none(
          _.find(/(A3T[A-Z0-9]|AKIA|AGPA|AIDA|AROA|AIPA|ANPA|ANVA|ASIA)[A-Z0-9]{16}/) != empty ||
          _.contains("-----BEGIN") && _.contains("PRIVATE KEY-----") ||
          _.find(/\beyJ[A-Za-z0-9_\-]{10,}\.[A-Za-z0-9_\-]{10,}\.[A-Za-z0-9_\-]{10,}\b/) != empty
        )
      )
  - uid: mondoo-oci-security-functions-config-no-credentials-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'oci_functions_application')
    mql: |
      terraform.plan.resourceChanges.where(type == 'oci_functions_application' && change.after['config'] != null).all(
        change.after['config'].keys.none(
          _.downcase == /^aws_access_key_id$|^aws_secret_access_key$|^aws_session_token$|^oci_api_key$|^oci_secret$|^api_token$|^bearer_token$|^db_password$|^private_key$|^password$|^passwd$|^secret$|^access_key$|^client_secret$|^connection_string$/
        )
      )
      terraform.plan.resourceChanges.where(type == 'oci_functions_application' && change.after['config'] != null).all(
        change.after['config'].values.none(
          _.find(/(A3T[A-Z0-9]|AKIA|AGPA|AIDA|AROA|AIPA|ANPA|ANVA|ASIA)[A-Z0-9]{16}/) != empty ||
          _.contains("-----BEGIN") && _.contains("PRIVATE KEY-----") ||
          _.find(/\beyJ[A-Za-z0-9_\-]{10,}\.[A-Za-z0-9_\-]{10,}\.[A-Za-z0-9_\-]{10,}\b/) != empty
        )
      )
  - uid: mondoo-oci-security-functions-config-no-credentials-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'oci_functions_application')
    mql: |
      terraform.state.resources.where(type == 'oci_functions_application' && values['config'] != null).all(
        values['config'].keys.none(
          _.downcase == /^aws_access_key_id$|^aws_secret_access_key$|^aws_session_token$|^oci_api_key$|^oci_secret$|^api_token$|^bearer_token$|^db_password$|^private_key$|^password$|^passwd$|^secret$|^access_key$|^client_secret$|^connection_string$/
        )
      )
      terraform.state.resources.where(type == 'oci_functions_application' && values['config'] != null).all(
        values['config'].values.none(
          _.find(/(A3T[A-Z0-9]|AKIA|AGPA|AIDA|AROA|AIPA|ANPA|ANVA|ASIA)[A-Z0-9]{16}/) != empty ||
          _.contains("-----BEGIN") && _.contains("PRIVATE KEY-----") ||
          _.find(/\beyJ[A-Za-z0-9_\-]{10,}\.[A-Za-z0-9_\-]{10,}\.[A-Za-z0-9_\-]{10,}\b/) != empty
