  - uid: mondoo-oci-security-vcn-no-unrestricted-udp-ingress
    title: Ensure VCN security lists block unrestricted UDP ingress
    impact: 80
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/soc2-2017: soc2-control-cc6-6-4
    variants:
      - uid: mondoo-oci-security-vcn-no-unrestricted-udp-ingress-oci
        tags:
          mondoo.com/filter-title: OCI
          mondoo.com/icon: oci
      - uid: mondoo-oci-security-vcn-no-unrestricted-udp-ingress-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/icon: terraform
      - uid: mondoo-oci-security-vcn-no-unrestricted-udp-ingress-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/icon: terraform
      - uid: mondoo-oci-security-vcn-no-unrestricted-udp-ingress-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/icon: terraform
    docs:
      desc: |
        This check ensures that OCI VCN security lists do not contain UDP ingress rules from 0.0.0.0/0 that allow all UDP ports. When a UDP ingress rule has no port restrictions, every UDP service on the instance is accessible from the internet.

        **Why this matters**

        Unrestricted UDP access from the internet exposes all UDP services:
          •  DNS (53), NTP (123), SNMP (161/162), and other UDP services become internet-accessible.
          •  UDP-based services are frequently exploited for DDoS amplification attacks.
          •  Connection-less nature of UDP makes abuse harder to detect and mitigate.
          •  Exposed SNMP services can leak sensitive infrastructure information.

        If unrestricted UDP ingress is allowed, it can lead to:
          •  DDoS amplification attacks using exposed UDP services.
          •  Information disclosure through SNMP or DNS zone transfer attacks.
          •  Exploitation of vulnerable UDP services.
          •  Non-compliance with CIS OCI Foundations Benchmark.

        Risk mitigation
          •  Always specify destination port ranges in UDP ingress rules.
          •  Restrict source CIDR blocks to known trusted IP ranges.
          •  Use the minimum set of UDP ports required for each workload.
          •  Prefer Network Security Groups (NSGs) for instance-level access control.
      remediation:
        - id: console
          desc: |
            To restrict unrestricted UDP ingress rules in a VCN security list using the OCI Console:

            1. Navigate to **Networking > Virtual Cloud Networks**.
            2. Select the VCN.
            3. Select **Security Lists**.
            4. Select the security list.
            5. Edit UDP ingress rules from 0.0.0.0/0 to specify destination port ranges, allowing only the ports required for your workload.
        - id: cli
          desc: |
            To restrict unrestricted UDP ingress rules in a VCN security list using the OCI CLI, update the security list with rules that include specific port ranges:

            ```bash
            oci network security-list update --security-list-id SECURITY_LIST_OCID \
              --ingress-security-rules '[{"source":"10.0.0.0/16","protocol":"17","udpOptions":{"destinationPortRange":{"min":53,"max":53}},"isStateless":false}]'
            ```
        - id: terraform
          desc: |
            To restrict unrestricted UDP ingress in a VCN security list in Terraform, always specify `udp_options` with explicit port ranges:

            ```hcl
            resource "oci_core_security_list" "example" {
              compartment_id = var.compartment_ocid
              vcn_id         = oci_core_vcn.example.id
              display_name   = "example-security-list"

              ingress_security_rules {
                protocol  = "17" # UDP
                source    = "10.0.0.0/16"
                stateless = false

                udp_options {
                  min = 53
                  max = 53
                }
              }
            }
            ```
    refs:
      - url: https://docs.oracle.com/en-us/iaas/Content/Network/Concepts/securitylists.htm
        title: CIS OCI Foundations Benchmark 2.5
  - uid: mondoo-oci-security-vcn-no-unrestricted-udp-ingress-oci
    filters: asset.platform == 'oci'
    mql: |
      oci.network.securityLists.all(
        ingressSecurityRules.where(_['source'] == "0.0.0.0/0" && _['protocol'] == "17").none(_['udpOptions'] == empty)
      )
  - uid: mondoo-oci-security-vcn-no-unrestricted-udp-ingress-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "oci_core_security_list")
    mql: |
      terraform.resources.where(nameLabel == "oci_core_security_list").all(
        blocks.where(type == "ingress_security_rules" && arguments.source == "0.0.0.0/0" && arguments.protocol == "17").all(
          blocks.where(type == "udp_options") != empty
        )
      )
  - uid: mondoo-oci-security-vcn-no-unrestricted-udp-ingress-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "oci_core_security_list")
    mql: |
      terraform.plan.resourceChanges.where(type == "oci_core_security_list").all(
        change.after.ingress_security_rules.where(_['source'] == "0.0.0.0/0" && _['protocol'] == "17").none(_['udp_options'] == empty)
      )
  - uid: mondoo-oci-security-vcn-no-unrestricted-udp-ingress-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "oci_core_security_list")
    mql: |
      terraform.state.resources.where(type == "oci_core_security_list").all(
        values.ingress_security_rules.where(_['source'] == "0.0.0.0/0" && _['protocol'] == "17").none(_['udp_options'] == empty)
      )
  - uid: mondoo-oci-security-vcn-no-stateless-ingress-from-internet
    title: Ensure VCN security lists have no stateless rules from internet
    impact: 70
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/soc2-2017: soc2-control-cc6-6-4
    variants:
      - uid: mondoo-oci-security-vcn-no-stateless-ingress-from-internet-oci
        tags:
          mondoo.com/filter-title: OCI
          mondoo.com/icon: oci
      - uid: mondoo-oci-security-vcn-no-stateless-ingress-from-internet-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/icon: terraform
      - uid: mondoo-oci-security-vcn-no-stateless-ingress-from-internet-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/icon: terraform
      - uid: mondoo-oci-security-vcn-no-stateless-ingress-from-internet-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/icon: terraform
    docs:
      desc: |
        This check ensures that OCI VCN security lists do not contain stateless ingress rules from 0.0.0.0/0. Stateless rules bypass connection tracking, meaning response traffic is not automatically allowed and every packet is evaluated independently. This creates a more permissive and harder-to-audit security posture for internet-facing rules.

        **Why this matters**

        Stateless ingress rules from the internet introduce additional risk:
          •  Connection tracking is disabled, so return traffic requires explicit egress rules.
          •  The lack of state tracking makes it harder to detect and block malicious traffic patterns.
          •  Stateless rules are more permissive by nature since they do not track connection context.
          •  Misconfigured stateless rules can inadvertently allow traffic that stateful rules would block.

        Risk mitigation
          •  Use stateful (non-stateless) rules for all internet-facing ingress rules.
          •  Reserve stateless rules for high-performance internal traffic where connection tracking overhead is a concern.
          •  Regularly audit security lists for unintended stateless rules.
      remediation:
        - id: console
          desc: |
            To convert stateless ingress rules to stateful using the OCI Console:

            1. Navigate to **Networking > Virtual Cloud Networks**.
            2. Select the VCN.
            3. Select **Security Lists**.
            4. Select the security list with the stateless internet-facing rule.
            5. Edit the ingress rule from 0.0.0.0/0 and uncheck **Stateless**.
            6. Select **Save Changes**.
        - id: cli
          desc: |
            To convert stateless ingress rules to stateful using the OCI CLI, update the security list with `isStateless` set to `false`:

            ```bash
            oci network security-list update --security-list-id SECURITY_LIST_OCID \
              --ingress-security-rules '<updated-rules-with-isStateless-false-json>'
            ```
        - id: terraform
          desc: |
            To ensure ingress rules from the internet are stateful in Terraform, set `stateless` to `false`:

            ```hcl
            resource "oci_core_security_list" "example" {
              compartment_id = var.compartment_ocid
              vcn_id         = oci_core_vcn.example.id
              display_name   = "example-security-list"

              ingress_security_rules {
                protocol  = "6" # TCP
                source    = "0.0.0.0/0"
                stateless = false

                tcp_options {
                  min = 443
                  max = 443
                }
              }
            }
            ```
    refs:
      - url: https://docs.oracle.com/en-us/iaas/Content/Network/Concepts/securitylists.htm
        title: OCI security list documentation
