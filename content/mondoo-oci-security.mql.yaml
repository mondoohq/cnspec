  - uid: mondoo-oci-security-object-storage-buckets-customer-managed-encryption
    title: Ensure Object Storage buckets use customer-managed encryption keys
    impact: 70
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/soc2-2017: soc2-control-cc6-1-10
    variants:
      - uid: mondoo-oci-security-object-storage-buckets-customer-managed-encryption-oci
        tags:
          mondoo.com/filter-title: OCI
          mondoo.com/filter-icon: oci
      - uid: mondoo-oci-security-object-storage-buckets-customer-managed-encryption-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-oci-security-object-storage-buckets-customer-managed-encryption-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-oci-security-object-storage-buckets-customer-managed-encryption-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that OCI Object Storage buckets are encrypted using customer-managed keys from the OCI Vault service (KMS) rather than Oracle-managed default encryption keys. Customer-managed keys provide greater control over the encryption lifecycle.

        **Why this matters**

        While OCI encrypts all Object Storage data at rest by default using Oracle-managed keys, customer-managed keys provide additional security controls:
          •  Full control over key creation, rotation, and deletion.
          •  Ability to revoke access to encrypted data by disabling or deleting the key.
          •  Compliance with regulations that require customer-controlled encryption (HIPAA, PCI DSS, FedRAMP).
          •  Separation of duties between data management and key management.

        Risk mitigation
          •  Create encryption keys in OCI Vault.
          •  Assign customer-managed keys to all Object Storage buckets.
          •  Configure key rotation policies.
          •  Monitor key usage through OCI Audit logs.
      remediation:
        - id: console
          desc: |
            To assign a customer-managed encryption key to an Object Storage bucket using the OCI Console:

            1. Navigate to **Object Storage > Buckets**.
            2. Select the bucket identified in this finding.
            3. Select **Assign** next to Encryption Key.
            4. Choose **Encrypt using customer-managed keys**.
            5. Select the vault, master encryption key, and key version.
            6. Select **Assign**.
        - id: cli
          desc: |
            To assign a customer-managed encryption key to an Object Storage bucket using the OCI CLI, update the bucket with the KMS key OCID:

            ```bash
            oci os bucket update --bucket-name BUCKET_NAME --kms-key-id KEY_OCID
            ```
        - id: terraform
          desc: |
            To assign a customer-managed encryption key to an Object Storage bucket in Terraform, create a vault and key, then reference the key in the bucket resource:

            ```hcl
            resource "oci_kms_vault" "example" {
              compartment_id = var.compartment_ocid
              display_name   = "example-vault"
              vault_type     = "DEFAULT"
            }

            resource "oci_kms_key" "example" {
              compartment_id = var.compartment_ocid
              display_name   = "example-bucket-key"
              management_endpoint = oci_kms_vault.example.management_endpoint

              key_shape {
                algorithm = "AES"
                length    = 32
              }
            }

            resource "oci_objectstorage_bucket" "example" {
              compartment_id = var.compartment_ocid
              namespace      = var.namespace
              name           = "example-bucket"
              kms_key_id     = oci_kms_key.example.id
            }
            ```
    refs:
      - url: https://docs.oracle.com/en-us/iaas/Content/Object/Tasks/managingbuckets_topic-Server_Side_Encryption_SSE.htm
        title: CIS OCI Foundations Benchmark 4.1.2
  - uid: mondoo-oci-security-object-storage-buckets-customer-managed-encryption-oci
    filters: asset.platform == 'oci'
    mql: |
      oci.objectStorage.buckets.all(kmsKeyId != "")
  - uid: mondoo-oci-security-object-storage-buckets-customer-managed-encryption-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "oci_objectstorage_bucket")
    mql: |
      terraform.resources.where(nameLabel == "oci_objectstorage_bucket").all(
        arguments.kms_key_id != empty
      )
  - uid: mondoo-oci-security-object-storage-buckets-customer-managed-encryption-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "oci_objectstorage_bucket")
    mql: |
      terraform.plan.resourceChanges.where(type == "oci_objectstorage_bucket").all(
        change.after.kms_key_id != empty
      )
  - uid: mondoo-oci-security-object-storage-buckets-customer-managed-encryption-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "oci_objectstorage_bucket")
    mql: |
      terraform.state.resources.where(type == "oci_objectstorage_bucket").all(
        values.kms_key_id != empty
      )
  - uid: mondoo-oci-security-vcn-no-unrestricted-ingress-all-protocols
    title: Ensure VCN security lists block unrestricted ingress from 0.0.0.0/0
    impact: 90
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/soc2-2017: soc2-control-cc6-6-4
    variants:
      - uid: mondoo-oci-security-vcn-no-unrestricted-ingress-all-protocols-oci
        tags:
          mondoo.com/filter-title: OCI
          mondoo.com/filter-icon: oci
      - uid: mondoo-oci-security-vcn-no-unrestricted-ingress-all-protocols-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-oci-security-vcn-no-unrestricted-ingress-all-protocols-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-oci-security-vcn-no-unrestricted-ingress-all-protocols-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that OCI VCN security lists do not contain ingress rules that allow all traffic (all protocols) from any source (0.0.0.0/0). Such rules effectively disable network-level access control for inbound traffic.

        **Why this matters**

        Allowing all inbound traffic from the internet exposes every service running on instances within the subnet:
          •  All ports and protocols are accessible from any IP address on the internet.
          •  Attackers can discover and exploit any vulnerable service.
          •  The security list provides no defense-in-depth against network-based attacks.

        If unrestricted ingress is allowed, it can lead to:
          •  Exploitation of vulnerable services running on compute instances.
          •  Unauthorized access to databases, management interfaces, and internal services.
          •  Non-compliance with CIS OCI Foundations Benchmark, PCI DSS, and NIST 800-53.

        Risk mitigation
          •  Remove or restrict overly permissive ingress rules.
          •  Use specific protocol and port ranges in security list rules.
          •  Restrict source CIDR blocks to known trusted IP ranges.
          •  Use Network Security Groups (NSGs) for fine-grained access control.
      remediation:
        - id: console
          desc: |
            To restrict unrestricted ingress rules in a VCN security list using the OCI Console:

            1. Navigate to **Networking > Virtual Cloud Networks**.
            2. Select the VCN.
            3. Select **Security Lists**.
            4. Select the security list with the overly permissive rule.
            5. Edit or remove the ingress rule that allows all protocols from 0.0.0.0/0, replacing it with rules for specific protocols, ports, and trusted source CIDR blocks.
        - id: cli
          desc: |
            To restrict unrestricted ingress rules in a VCN security list using the OCI CLI, update the security list with scoped rules that specify protocols, ports, and trusted source CIDR blocks:

            ```bash
            oci network security-list update --security-list-id SECURITY_LIST_OCID \
              --ingress-security-rules '<updated-rules-json>'
            ```
        - id: terraform
          desc: |
            To restrict unrestricted ingress in a VCN security list in Terraform, define ingress rules with specific protocols, port ranges, and restricted source CIDR blocks instead of allowing all traffic from 0.0.0.0/0:

            ```hcl
            resource "oci_core_security_list" "example" {
              compartment_id = var.compartment_ocid
              vcn_id         = oci_core_vcn.example.id
              display_name   = "example-security-list"

              ingress_security_rules {
                protocol  = "6" # TCP
                source    = "10.0.0.0/16"
                stateless = false

                tcp_options {
                  min = 443
                  max = 443
                }
              }
            }
            ```
    refs:
      - url: https://docs.oracle.com/en-us/iaas/Content/Network/Concepts/securitylists.htm
        title: CIS OCI Foundations Benchmark 2.1
  - uid: mondoo-oci-security-vcn-no-unrestricted-ingress-all-protocols-oci
    filters: asset.platform == 'oci'
    mql: |
      oci.network.securityLists.all(
        ingressSecurityRules.none(_['source'] == "0.0.0.0/0" && _['protocol'] == "all")
      )
  - uid: mondoo-oci-security-vcn-no-unrestricted-ingress-all-protocols-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "oci_core_security_list")
    mql: |
      terraform.resources.where(nameLabel == "oci_core_security_list").all(
        blocks.where(type == "ingress_security_rules").none(arguments.source == "0.0.0.0/0" && arguments.protocol == "all")
      )
  - uid: mondoo-oci-security-vcn-no-unrestricted-ingress-all-protocols-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "oci_core_security_list")
    mql: |
      terraform.plan.resourceChanges.where(type == "oci_core_security_list").all(
        change.after.ingress_security_rules.none(_['source'] == "0.0.0.0/0" && _['protocol'] == "all")
      )
  - uid: mondoo-oci-security-vcn-no-unrestricted-ingress-all-protocols-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "oci_core_security_list")
    mql: |
      terraform.state.resources.where(type == "oci_core_security_list").all(
        values.ingress_security_rules.none(_['source'] == "0.0.0.0/0" && _['protocol'] == "all")
      )
  - uid: mondoo-oci-security-vcn-no-unrestricted-ingress-all-tcp-ports
    title: Ensure VCN security lists block unrestricted TCP ingress
    impact: 80
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/soc2-2017: soc2-control-cc6-6-4
    variants:
      - uid: mondoo-oci-security-vcn-no-unrestricted-ingress-all-tcp-ports-oci
        tags:
          mondoo.com/filter-title: OCI
          mondoo.com/filter-icon: oci
      - uid: mondoo-oci-security-vcn-no-unrestricted-ingress-all-tcp-ports-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-oci-security-vcn-no-unrestricted-ingress-all-tcp-ports-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-oci-security-vcn-no-unrestricted-ingress-all-tcp-ports-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that OCI VCN security lists do not contain TCP ingress rules from 0.0.0.0/0 that allow all TCP ports. When a TCP ingress rule has no port restrictions, every TCP service on the instance is accessible from the internet.

        **Why this matters**

        Unrestricted TCP access from the internet exposes all TCP services:
          •  SSH (22), RDP (3389), databases, and management interfaces become internet-accessible.
          •  Automated scanners continuously probe all ports, exploiting any vulnerable service.
          •  The broad exposure makes it difficult to maintain a secure attack surface.

        If unrestricted TCP ingress is allowed, it can lead to:
          •  Brute-force attacks against SSH, RDP, and other authentication services.
          •  Exploitation of unpatched or misconfigured services.
          •  Data exfiltration through exposed database or application ports.
          •  Non-compliance with CIS OCI Foundations Benchmark.

        Risk mitigation
          •  Always specify destination port ranges in TCP ingress rules.
          •  Restrict source CIDR blocks to known trusted IP ranges.
          •  Use the minimum set of ports required for each workload.
          •  Prefer Network Security Groups (NSGs) for instance-level access control.
      remediation:
        - id: console
          desc: |
            To restrict unrestricted TCP ingress rules in a VCN security list using the OCI Console:

            1. Navigate to **Networking > Virtual Cloud Networks**.
            2. Select the VCN.
            3. Select **Security Lists**.
            4. Select the security list.
            5. Edit TCP ingress rules from 0.0.0.0/0 to specify destination port ranges, allowing only the ports required for your workload.
        - id: cli
          desc: |
            To restrict unrestricted TCP ingress rules in a VCN security list using the OCI CLI, update the security list with rules that include specific port ranges:

            ```bash
            oci network security-list update --security-list-id SECURITY_LIST_OCID \
              --ingress-security-rules '<updated-rules-with-port-ranges-json>'
            ```
        - id: terraform
          desc: |
            To restrict unrestricted TCP ingress in a VCN security list in Terraform, always specify `tcp_options` with explicit port ranges:

            ```hcl
            resource "oci_core_security_list" "example" {
              compartment_id = var.compartment_ocid
              vcn_id         = oci_core_vcn.example.id
              display_name   = "example-security-list"

              ingress_security_rules {
                protocol  = "6" # TCP
                source    = "0.0.0.0/0"
                stateless = false

                tcp_options {
                  min = 443
                  max = 443
                }
              }

              ingress_security_rules {
                protocol  = "6" # TCP
                source    = "10.0.0.0/16"
                stateless = false

                tcp_options {
                  min = 22
                  max = 22
                }
              }
            }
            ```
    refs:
      - url: https://docs.oracle.com/en-us/iaas/Content/Network/Concepts/securitylists.htm
        title: CIS OCI Foundations Benchmark 2.2
  - uid: mondoo-oci-security-vcn-no-unrestricted-ingress-all-tcp-ports-oci
    filters: asset.platform == 'oci'
    mql: |
      oci.network.securityLists.all(
        ingressSecurityRules.where(_['source'] == "0.0.0.0/0" && _['protocol'] == "6").none(_['tcpOptions'] == empty)
      )
  - uid: mondoo-oci-security-vcn-no-unrestricted-ingress-all-tcp-ports-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "oci_core_security_list")
    mql: |
      terraform.resources.where(nameLabel == "oci_core_security_list").all(
        blocks.where(type == "ingress_security_rules" && arguments.source == "0.0.0.0/0" && arguments.protocol == "6").all(
          blocks.where(type == "tcp_options") != empty
        )
      )
  - uid: mondoo-oci-security-vcn-no-unrestricted-ingress-all-tcp-ports-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "oci_core_security_list")
    mql: |
      terraform.plan.resourceChanges.where(type == "oci_core_security_list").all(
        change.after.ingress_security_rules.where(_['source'] == "0.0.0.0/0" && _['protocol'] == "6").none(_['tcp_options'] == empty)
      )
  - uid: mondoo-oci-security-vcn-no-unrestricted-ingress-all-tcp-ports-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "oci_core_security_list")
    mql: |
      terraform.state.resources.where(type == "oci_core_security_list").all(
        values.ingress_security_rules.where(_['source'] == "0.0.0.0/0" && _['protocol'] == "6").none(_['tcp_options'] == empty)
      )
  - uid: mondoo-oci-security-vcn-no-unrestricted-egress-all-protocols
    title: Ensure VCN security lists block unrestricted egress to 0.0.0.0/0
    impact: 70
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
