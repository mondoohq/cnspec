          arguments['signature_algorithm'].in([
            "SHA256_WITH_RSA",
            "SHA384_WITH_RSA",
            "SHA512_WITH_RSA",
            "SHA256_WITH_ECDSA",
            "SHA384_WITH_ECDSA",
            "SHA512_WITH_ECDSA"
          ])
