  - uid: mondoo-oci-security-vcn-no-stateless-ingress-from-internet
    title: Ensure VCN security lists have no stateless rules from internet
    impact: 70
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-6
    variants:
      - uid: mondoo-oci-security-vcn-no-stateless-ingress-from-internet-oci
        tags:
          mondoo.com/filter-title: OCI
          mondoo.com/icon: oci
      - uid: mondoo-oci-security-vcn-no-stateless-ingress-from-internet-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/icon: terraform
      - uid: mondoo-oci-security-vcn-no-stateless-ingress-from-internet-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/icon: terraform
      - uid: mondoo-oci-security-vcn-no-stateless-ingress-from-internet-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/icon: terraform
    docs:
      desc: |
        This check ensures that OCI VCN security lists do not contain stateless ingress rules from 0.0.0.0/0. Stateless rules bypass connection tracking, meaning response traffic is not automatically allowed and every packet is evaluated independently. This creates a more permissive and harder-to-audit security posture for internet-facing rules.

        **Why this matters**

        Stateless ingress rules from the internet introduce additional risk:
          •  Connection tracking is disabled, so return traffic requires explicit egress rules.
          •  The lack of state tracking makes it harder to detect and block malicious traffic patterns.
          •  Stateless rules are more permissive by nature since they do not track connection context.
          •  Misconfigured stateless rules can inadvertently allow traffic that stateful rules would block.

        Risk mitigation
          •  Use stateful (non-stateless) rules for all internet-facing ingress rules.
          •  Reserve stateless rules for high-performance internal traffic where connection tracking overhead is a concern.
          •  Regularly audit security lists for unintended stateless rules.
      remediation:
        - id: console
          desc: |
            To convert stateless ingress rules to stateful using the OCI Console:

            1. Navigate to **Networking > Virtual Cloud Networks**.
            2. Select the VCN.
            3. Select **Security Lists**.
            4. Select the security list with the stateless internet-facing rule.
            5. Edit the ingress rule from 0.0.0.0/0 and uncheck **Stateless**.
            6. Select **Save Changes**.
        - id: cli
          desc: |
            To convert stateless ingress rules to stateful using the OCI CLI, update the security list with `isStateless` set to `false`:

            ```bash
            oci network security-list update --security-list-id SECURITY_LIST_OCID \
              --ingress-security-rules '<updated-rules-with-isStateless-false-json>'
            ```
        - id: terraform
          desc: |
            To ensure ingress rules from the internet are stateful in Terraform, set `stateless` to `false`:

            ```hcl
            resource "oci_core_security_list" "example" {
              compartment_id = var.compartment_ocid
              vcn_id         = oci_core_vcn.example.id
              display_name   = "example-security-list"

              ingress_security_rules {
                protocol  = "6" # TCP
                source    = "0.0.0.0/0"
                stateless = false

                tcp_options {
                  min = 443
                  max = 443
                }
              }
            }
            ```
    refs:
      - url: https://docs.oracle.com/en-us/iaas/Content/Network/Concepts/securitylists.htm
        title: OCI security list documentation
