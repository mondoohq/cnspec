  - uid: mondoo-oci-security-loadbalancer-no-weak-cipher-suites
    title: Ensure load balancer listeners use a modern cipher suite
    impact: 70
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    variants:
      - uid: mondoo-oci-security-loadbalancer-no-weak-cipher-suites-oci
        tags:
          mondoo.com/filter-title: OCI
          mondoo.com/filter-icon: oci
      - uid: mondoo-oci-security-loadbalancer-no-weak-cipher-suites-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-oci-security-loadbalancer-no-weak-cipher-suites-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-oci-security-loadbalancer-no-weak-cipher-suites-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check verifies that HTTPS and HTTP/2 listeners on every OCI load balancer use an Oracle-managed modern cipher suite (`oci-modern-ssl-cipher-suite-v1`, `oci-tls-1-2-*`, `oci-tls-1-3-*`, or `oci-default-ssl-cipher-suite-v1`) rather than the `oci-compatible-ssl-cipher-suite-v1` suite or a custom suite that admits weak algorithms.

        **Why this matters**

        The "compatible" cipher suite is designed to maximize interoperability with legacy clients and therefore admits ciphers that are known weak:

        - RC4 and 3DES ciphers are vulnerable to cryptanalytic attacks (RC4 biases, Sweet32).
        - CBC-mode ciphers without the `AEAD` extension are vulnerable to padding-oracle and length-extension attacks.
        - Export-grade ciphers that appear in some "compatible" lists have effective key strengths below 64 bits.
        - Clients that actually need these weak ciphers are, by 2026, running software that should be patched rather than accommodated at the edge.

        **Risk mitigation**

        - Eliminates known-weak cipher suites as a fallback option during negotiation.
        - Forces forward-secret key exchange (ECDHE) and authenticated encryption (GCM/CHACHA20).
        - Aligns with modern crypto guidance (PCI DSS, NIST SP 800-52 Rev 2).
      remediation:
        - id: console
          desc: |
            Switch the listener to a modern cipher suite:

            1. Open **Networking** → **Load Balancers** → select the load balancer → **SSL Cipher Suites**.
            2. Change the listener's cipher suite to `oci-modern-ssl-cipher-suite-v1` (or the appropriate `oci-tls-1-2-*` / `oci-tls-1-3-*` variant for your compliance context).
            3. Test with a non-legacy client to confirm handshakes still succeed before rolling out broadly.
        - id: cli
          desc: |
            Update a listener to use a modern cipher suite:

            ```bash
            oci lb listener update \
              --load-balancer-id <lb-ocid> \
              --listener-name <listener-name> \
              --protocol HTTPS \
              --port 443 \
              --default-backend-set-name <backend> \
              --ssl-certificate-name <cert-name> \
              --cipher-suite-name oci-modern-ssl-cipher-suite-v1 \
              --protocols '["TLSv1.2","TLSv1.3"]'
            ```
        - id: terraform
          desc: |
            Set `cipher_suite_name` on every HTTPS / HTTP2 listener's `ssl_configuration` block to a modern Oracle-managed suite:

            ```hcl
            resource "oci_load_balancer_listener" "https" {
              load_balancer_id         = oci_load_balancer_load_balancer.app.id
              name                     = "https"
              default_backend_set_name = oci_load_balancer_backend_set.app.name
              protocol                 = "HTTPS"
              port                     = 443

              ssl_configuration {
                certificate_name  = oci_load_balancer_certificate.app.certificate_name
                cipher_suite_name = "oci-modern-ssl-cipher-suite-v1"
                protocols         = ["TLSv1.2", "TLSv1.3"]
              }
            }
            ```
    refs:
      - url: https://docs.oracle.com/en-us/iaas/Content/Balance/References/predefinedsslciphersuites.htm
        title: OCI - Predefined SSL Cipher Suites
  - uid: mondoo-oci-security-loadbalancer-no-weak-cipher-suites-oci
