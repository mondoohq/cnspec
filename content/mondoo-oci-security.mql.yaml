  - uid: mondoo-oci-security-vcn-no-unrestricted-ingress-all-tcp-ports
    title: Ensure VCN security lists block unrestricted TCP ingress
    impact: 80
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-6
    variants:
      - uid: mondoo-oci-security-vcn-no-unrestricted-ingress-all-tcp-ports-oci
        tags:
          mondoo.com/filter-title: OCI
          mondoo.com/filter-icon: oci
      - uid: mondoo-oci-security-vcn-no-unrestricted-ingress-all-tcp-ports-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-oci-security-vcn-no-unrestricted-ingress-all-tcp-ports-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-oci-security-vcn-no-unrestricted-ingress-all-tcp-ports-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that OCI VCN security lists do not contain TCP ingress rules from 0.0.0.0/0 that allow all TCP ports. When a TCP ingress rule has no port restrictions, every TCP service on the instance is accessible from the internet.

        **Why this matters**

        Unrestricted TCP access from the internet exposes all TCP services:
          •  SSH (22), RDP (3389), databases, and management interfaces become internet-accessible.
          •  Automated scanners continuously probe all ports, exploiting any vulnerable service.
          •  The broad exposure makes it difficult to maintain a secure attack surface.

        If unrestricted TCP ingress is allowed, it can lead to:
          •  Brute-force attacks against SSH, RDP, and other authentication services.
          •  Exploitation of unpatched or misconfigured services.
          •  Data exfiltration through exposed database or application ports.
          •  Non-compliance with CIS OCI Foundations Benchmark.

        Risk mitigation
          •  Always specify destination port ranges in TCP ingress rules.
          •  Restrict source CIDR blocks to known trusted IP ranges.
          •  Use the minimum set of ports required for each workload.
          •  Prefer Network Security Groups (NSGs) for instance-level access control.
      remediation:
        - id: console
          desc: |
            To restrict unrestricted TCP ingress rules in a VCN security list using the OCI Console:

            1. Navigate to **Networking > Virtual Cloud Networks**.
            2. Select the VCN.
            3. Select **Security Lists**.
            4. Select the security list.
            5. Edit TCP ingress rules from 0.0.0.0/0 to specify destination port ranges, allowing only the ports required for your workload.
        - id: cli
          desc: |
            To restrict unrestricted TCP ingress rules in a VCN security list using the OCI CLI, update the security list with rules that include specific port ranges:

            ```bash
            oci network security-list update --security-list-id SECURITY_LIST_OCID \
              --ingress-security-rules '<updated-rules-with-port-ranges-json>'
            ```
        - id: terraform
          desc: |
            To restrict unrestricted TCP ingress in a VCN security list in Terraform, always specify `tcp_options` with explicit port ranges:

            ```hcl
            resource "oci_core_security_list" "example" {
              compartment_id = var.compartment_ocid
              vcn_id         = oci_core_vcn.example.id
              display_name   = "example-security-list"

              ingress_security_rules {
                protocol  = "6" # TCP
                source    = "0.0.0.0/0"
                stateless = false

                tcp_options {
                  min = 443
                  max = 443
                }
              }

              ingress_security_rules {
                protocol  = "6" # TCP
                source    = "10.0.0.0/16"
                stateless = false

                tcp_options {
                  min = 22
                  max = 22
                }
              }
            }
            ```
    refs:
      - url: https://docs.oracle.com/en-us/iaas/Content/Network/Concepts/securitylists.htm
        title: CIS OCI Foundations Benchmark 2.2
  - uid: mondoo-oci-security-vcn-no-unrestricted-ingress-all-tcp-ports-oci
    filters: asset.platform == "oci-network-securitylist"
    mql: |
      oci.network.securityList.ingressSecurityRules.where(
        _['source'] == "0.0.0.0/0" && _['protocol'] == "6"
      ).none(_['tcpOptions'] == empty)
  - uid: mondoo-oci-security-vcn-no-unrestricted-ingress-all-tcp-ports-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "oci_core_security_list")
    mql: |
      terraform.resources.where(nameLabel == "oci_core_security_list").all(
        blocks.where(type == "ingress_security_rules" && arguments.source == "0.0.0.0/0" && arguments.protocol == "6").all(
          blocks.where(type == "tcp_options") != empty
        )
      )
  - uid: mondoo-oci-security-vcn-no-unrestricted-ingress-all-tcp-ports-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "oci_core_security_list")
    mql: |
