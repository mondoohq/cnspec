    docs:
      desc: |
        This check ensures that OCI VCN security lists do not contain UDP ingress rules from 0.0.0.0/0 that allow all UDP ports. When a UDP ingress rule has no port restrictions, every UDP service on the instance is accessible from the internet.

        **Why this matters**

        Unrestricted UDP access from the internet exposes all UDP services:
          •  DNS (53), NTP (123), SNMP (161/162), and other UDP services become internet-accessible.
          •  UDP-based services are frequently exploited for DDoS amplification attacks.
          •  Connection-less nature of UDP makes abuse harder to detect and mitigate.
          •  Exposed SNMP services can leak sensitive infrastructure information.

        If unrestricted UDP ingress is allowed, it can lead to:
          •  DDoS amplification attacks using exposed UDP services.
          •  Information disclosure through SNMP or DNS zone transfer attacks.
          •  Exploitation of vulnerable UDP services.
          •  Non-compliance with CIS OCI Foundations Benchmark.

        Risk mitigation
          •  Always specify destination port ranges in UDP ingress rules.
          •  Restrict source CIDR blocks to known trusted IP ranges.
          •  Use the minimum set of UDP ports required for each workload.
          •  Prefer Network Security Groups (NSGs) for instance-level access control.
      remediation:
        - id: console
          desc: |
            To restrict unrestricted UDP ingress rules in a VCN security list using the OCI Console:

            1. Navigate to **Networking > Virtual Cloud Networks**.
            2. Select the VCN.
            3. Select **Security Lists**.
            4. Select the security list.
            5. Edit UDP ingress rules from 0.0.0.0/0 to specify destination port ranges, allowing only the ports required for your workload.
        - id: cli
          desc: |
            To restrict unrestricted UDP ingress rules in a VCN security list using the OCI CLI, update the security list with rules that include specific port ranges:

            ```bash
            oci network security-list update --security-list-id SECURITY_LIST_OCID \
              --ingress-security-rules '[{"source":"10.0.0.0/16","protocol":"17","udpOptions":{"destinationPortRange":{"min":53,"max":53}},"isStateless":false}]'
            ```
        - id: terraform
          desc: |
            To restrict unrestricted UDP ingress in a VCN security list in Terraform, always specify `udp_options` with explicit port ranges:

            ```hcl
            resource "oci_core_security_list" "example" {
              compartment_id = var.compartment_ocid
              vcn_id         = oci_core_vcn.example.id
              display_name   = "example-security-list"

              ingress_security_rules {
                protocol  = "17" # UDP
                source    = "10.0.0.0/16"
                stateless = false

                udp_options {
                  min = 53
                  max = 53
                }
              }
            }
            ```
    refs:
      - url: https://docs.oracle.com/en-us/iaas/Content/Network/Concepts/securitylists.htm
        title: CIS OCI Foundations Benchmark 2.5
