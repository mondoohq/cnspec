  - uid: mondoo-oci-security-vcn-no-unrestricted-egress-all-tcp-ports
    title: Ensure VCN security lists block unrestricted TCP egress
    impact: 70
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-6
    variants:
      - uid: mondoo-oci-security-vcn-no-unrestricted-egress-all-tcp-ports-oci
        tags:
          mondoo.com/filter-title: OCI
          mondoo.com/icon: oci
      - uid: mondoo-oci-security-vcn-no-unrestricted-egress-all-tcp-ports-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/icon: terraform
      - uid: mondoo-oci-security-vcn-no-unrestricted-egress-all-tcp-ports-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/icon: terraform
      - uid: mondoo-oci-security-vcn-no-unrestricted-egress-all-tcp-ports-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/icon: terraform
    docs:
      desc: |
        This check ensures that OCI VCN security lists do not contain TCP egress rules to 0.0.0.0/0 that allow all TCP ports. When a TCP egress rule has no port restrictions, compromised instances can communicate with any service on the internet.

        **Why this matters**

        Unrestricted TCP egress to the internet enables compromised instances to:
          •  Exfiltrate data to arbitrary internet destinations on any TCP port.
          •  Establish command-and-control (C2) channels on non-standard ports to evade detection.
          •  Download additional malware, tools, or payloads.
          •  Tunnel traffic through commonly allowed ports (e.g., 443) to bypass monitoring.

        Risk mitigation
          •  Always specify destination port ranges in TCP egress rules.
          •  Restrict destination CIDR blocks to known required endpoints.
          •  Use a proxy or NAT gateway for controlled internet access.
          •  Monitor outbound traffic for anomalous connections.
      remediation:
        - id: console
          desc: |
            To restrict unrestricted TCP egress rules in a VCN security list using the OCI Console:

            1. Navigate to **Networking > Virtual Cloud Networks**.
            2. Select the VCN.
            3. Select **Security Lists**.
            4. Select the security list.
            5. Edit TCP egress rules to 0.0.0.0/0 to specify destination port ranges, allowing only the ports required for your workload (e.g., 443 for HTTPS).
        - id: cli
          desc: |
            To restrict unrestricted TCP egress rules in a VCN security list using the OCI CLI, update the security list with rules that include specific port ranges:

            ```bash
            oci network security-list update --security-list-id SECURITY_LIST_OCID \
              --egress-security-rules '[{"destination":"0.0.0.0/0","protocol":"6","tcpOptions":{"destinationPortRange":{"min":443,"max":443}},"isStateless":false}]'
            ```
        - id: terraform
          desc: |
            To restrict unrestricted TCP egress in a VCN security list in Terraform, always specify `tcp_options` with explicit port ranges:

            ```hcl
            resource "oci_core_security_list" "example" {
              compartment_id = var.compartment_ocid
              vcn_id         = oci_core_vcn.example.id
              display_name   = "example-security-list"

              egress_security_rules {
                protocol    = "6" # TCP
                destination = "0.0.0.0/0"
                stateless   = false

                tcp_options {
                  min = 443
                  max = 443
                }
              }
            }
            ```
    refs:
      - url: https://docs.oracle.com/en-us/iaas/Content/Network/Concepts/securitylists.htm
        title: OCI security list documentation
