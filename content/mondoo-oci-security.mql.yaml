  - uid: mondoo-oci-security-vcn-no-unrestricted-ingress-legacy-admin-ports-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "oci_core_security_list")
    mql: |
      # An ingress rule with source 0.0.0.0/0 + protocol "6" (TCP) and no tcp_options opens every TCP port, so flag missing tcp_options as a failure in addition to overlapping legacy admin port ranges.
      terraform.state.resources.where(type == "oci_core_security_list").all(
        values.ingress_security_rules.where(_['source'] == "0.0.0.0/0" && _['protocol'] == "6").none(
          _['tcp_options'] == empty ||
          _['tcp_options']['destination_port_range']['min'] <= 21 && _['tcp_options']['destination_port_range']['max'] >= 21 ||
          _['tcp_options']['destination_port_range']['min'] <= 23 && _['tcp_options']['destination_port_range']['max'] >= 23 ||
          _['tcp_options']['destination_port_range']['min'] <= 135 && _['tcp_options']['destination_port_range']['max'] >= 135 ||
          _['tcp_options']['destination_port_range']['min'] <= 137 && _['tcp_options']['destination_port_range']['max'] >= 137 ||
          _['tcp_options']['destination_port_range']['min'] <= 138 && _['tcp_options']['destination_port_range']['max'] >= 138 ||
          _['tcp_options']['destination_port_range']['min'] <= 139 && _['tcp_options']['destination_port_range']['max'] >= 139 ||
          _['tcp_options']['destination_port_range']['min'] <= 445 && _['tcp_options']['destination_port_range']['max'] >= 445
        )
      )
  - uid: mondoo-oci-security-vcn-no-unrestricted-icmp-ingress
    title: Ensure VCN security lists block unrestricted ICMP ingress from 0.0.0.0/0
    impact: 60
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-6
    variants:
      - uid: mondoo-oci-security-vcn-no-unrestricted-icmp-ingress-oci
        tags:
          mondoo.com/filter-title: OCI
          mondoo.com/filter-icon: oci
      - uid: mondoo-oci-security-vcn-no-unrestricted-icmp-ingress-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-oci-security-vcn-no-unrestricted-icmp-ingress-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-oci-security-vcn-no-unrestricted-icmp-ingress-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check flags VCN security-list ingress rules that permit unrestricted ICMP (IPv4 protocol 1 or IPv6 protocol 58) from the public internet without an `icmpOptions` type/code filter. Permitting all ICMP types from anywhere enables host discovery and OS fingerprinting, which accelerates attacker reconnaissance even when no services are yet exposed.

        **Why this matters**

        Open ICMP is a reconnaissance multiplier, not a breach primitive by itself — but it reliably shortens the time between network exposure and attempted exploitation:

        - ICMP echo-reply / timestamp / netmask probes reveal which IPs are live and what OS family runs on them.
        - Fingerprinting data feeds automated tooling that moves from enumeration to exploit in minutes.
        - Large-scale mappers (Shodan, Censys, Zmap) rely on ICMP to build their cloud-asset inventories.
        - Allowing specific ICMP types (`Destination Unreachable: Fragmentation Needed`, type 3 code 4) is sometimes required for Path MTU discovery — that's why this check flags only rules with no `icmpOptions` filter.

        **Risk mitigation**

        - Restrict ICMP ingress to the types your workloads actually need (often only type 3 code 4 for PMTU discovery).
        - Scope ICMP source CIDR blocks to trusted networks for troubleshooting tools.
        - Combine with a security-monitoring tool that alerts on unusual ICMP volumes from new source IPs.
      remediation:
        - id: console
          desc: |
            Scope or remove unrestricted ICMP ingress:

            1. Open **Networking** → **Virtual Cloud Networks** → the parent VCN → **Security Lists** → select the flagged list.
            2. Edit the flagged ICMP rule: either delete it, or set an `icmpOptions` type/code filter (commonly type 3 for Destination Unreachable) and tighten the source CIDR.
            3. For monitoring use cases, limit the source to your NOC / monitoring subnet rather than `0.0.0.0/0`.
        - id: cli
          desc: |
            Update the security list with a scoped ICMP rule:

            ```bash
            oci network security-list update --security-list-id <security-list-ocid> \
              --ingress-security-rules '[{"source":"10.0.0.0/8","protocol":"1","icmpOptions":{"type":3,"code":4},"isStateless":false}]'
            ```
        - id: terraform
          desc: |
            Add an `icmp_options` block that scopes the ICMP type/code on every `0.0.0.0/0` ingress rule that uses ICMP (protocol `1`), ICMPv6 (`58`), or `all` protocols:

            ```hcl
            resource "oci_core_security_list" "main" {
              compartment_id = var.compartment_ocid
              vcn_id         = oci_core_vcn.main.id
              display_name   = "main"

              # PMTU discovery - allow only ICMP type 3 code 4 from anywhere
              ingress_security_rules {
                source      = "0.0.0.0/0"
                source_type = "CIDR_BLOCK"
                protocol    = "1"

                icmp_options {
                  type = 3
                  code = 4
                }
              }
            }
            ```
    refs:
      - url: https://docs.oracle.com/en-us/iaas/Content/Network/Concepts/securitylists.htm
        title: OCI - Security Lists
      - url: https://datatracker.ietf.org/doc/html/rfc792
        title: RFC 792 - Internet Control Message Protocol
  - uid: mondoo-oci-security-vcn-no-unrestricted-icmp-ingress-oci
    filters: asset.platform == "oci-network-securitylist"
    mql: |
      oci.network.securityList.ingressSecurityRules.where(
        _['source'] == "0.0.0.0/0" && _['icmpOptions'] == empty
      ).none(
        _['protocol'] == "1" || _['protocol'] == "58" || _['protocol'] == "all"
      )
  - uid: mondoo-oci-security-vcn-no-unrestricted-icmp-ingress-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "oci_core_security_list")
    mql: |
      # An ingress rule from 0.0.0.0/0 that uses ICMP (protocol 1 or 58) or all-protocols must declare an icmp_options block scoping the type/code.
      terraform.resources.where(nameLabel == "oci_core_security_list").all(
        blocks.where(type == "ingress_security_rules" && arguments.source == "0.0.0.0/0").all(
          arguments.protocol != "1" && arguments.protocol != "58" && arguments.protocol != "all" ||
          blocks.where(type == "icmp_options") != empty
        )
      )
  - uid: mondoo-oci-security-vcn-no-unrestricted-icmp-ingress-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "oci_core_security_list")
    mql: |
      terraform.plan.resourceChanges.where(type == "oci_core_security_list").all(
        change.after.ingress_security_rules.where(_['source'] == "0.0.0.0/0" && _['icmp_options'] == empty).none(
          _['protocol'] == "1" || _['protocol'] == "58" || _['protocol'] == "all"
        )
      )
  - uid: mondoo-oci-security-vcn-no-unrestricted-icmp-ingress-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "oci_core_security_list")
    mql: |
      terraform.state.resources.where(type == "oci_core_security_list").all(
        values.ingress_security_rules.where(_['source'] == "0.0.0.0/0" && _['icmp_options'] == empty).none(
          _['protocol'] == "1" || _['protocol'] == "58" || _['protocol'] == "all"
        )
      )
  - uid: mondoo-oci-security-vcn-no-unrestricted-ipv6-ingress
    title: Ensure VCN security lists block unrestricted IPv6 ingress from ::/0
    impact: 90
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-6
    variants:
      - uid: mondoo-oci-security-vcn-no-unrestricted-ipv6-ingress-oci
        tags:
          mondoo.com/filter-title: OCI
          mondoo.com/filter-icon: oci
      - uid: mondoo-oci-security-vcn-no-unrestricted-ipv6-ingress-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-oci-security-vcn-no-unrestricted-ipv6-ingress-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-oci-security-vcn-no-unrestricted-ipv6-ingress-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check mirrors the existing IPv4 `0.0.0.0/0` ingress checks for the IPv6 default route `::/0`. It flags unrestricted all-protocol ingress, unrestricted TCP ingress (including SSH port 22 and RDP port 3389), and unrestricted UDP ingress from IPv6 anywhere. Cloud workloads are frequently configured with IPv4 hardening but forget IPv6, leaving a parallel attack surface that bypasses the IPv4 controls entirely.

        **Why this matters**

        IPv6 exposure is a common blind spot that operates independently of IPv4 hardening:

        - Many org network defenses, log pipelines, and IDS signatures are IPv4-first; IPv6 traffic can evade controls that look fine on paper.
        - Attackers specifically probe IPv6 default routes (`::/0`) as a bypass around IPv4 ACLs that security teams monitor heavily.
        - OCI VCNs that enable IPv6 inherit the same exposure patterns as IPv4 unless security lists are explicitly updated — a common oversight when retrofitting IPv6 onto an existing VCN.
        - Cloud scanners (Shodan v6, Censys v6) now routinely enumerate the IPv6 space and find fewer controls than on IPv4.

        **Risk mitigation**

        - Every time an ingress rule permits `0.0.0.0/0`, audit whether an equivalent `::/0` rule exists — and if so, whether it's still appropriate.
        - Consider disabling IPv6 on a VCN entirely if no workload requires it; this eliminates the parallel exposure surface.
        - Apply the same port/protocol restrictions to `::/0` rules as to `0.0.0.0/0` rules.
      remediation:
        - id: console
          desc: |
            Remove or scope IPv6 ingress rules:

            1. Open **Networking** → **Virtual Cloud Networks** → the parent VCN → **Security Lists** → select the flagged list.
            2. Identify each ingress rule whose source is `::/0` and that allows SSH/RDP, all TCP ports, all UDP ports, or all protocols.
            3. Delete the rule, or restrict the source to a specific IPv6 CIDR (e.g., your corporate IPv6 transit prefix) and/or tighten the port range.
            4. Consider disabling IPv6 entirely on the VCN if no workload on it uses IPv6.
        - id: cli
          desc: |
            Replace the ingress rules with a scoped IPv6 set:

            ```bash
            oci network security-list update --security-list-id <security-list-ocid> \
              --ingress-security-rules '[{"source":"2001:db8:abcd::/48","protocol":"6","tcpOptions":{"destinationPortRange":{"min":443,"max":443}},"isStateless":false}]'
            ```
        - id: terraform
          desc: |
            Apply the same scoping rules to `::/0` ingress that the IPv4 ingress checks require: never `protocol = "all"`, always declare `tcp_options` / `udp_options`, and exclude SSH (22) and RDP (3389) from public TCP rules:

            ```hcl
            resource "oci_core_security_list" "main" {
              compartment_id = var.compartment_ocid
              vcn_id         = oci_core_vcn.main.id
              display_name   = "main"

              # IPv6: HTTPS from anywhere - explicit tcp_options scoped to 443
              ingress_security_rules {
                source      = "::/0"
                source_type = "CIDR_BLOCK"
                protocol    = "6"

                tcp_options {
                  destination_port_range {
                    min = 443
                    max = 443
                  }
                }
              }

              # IPv6: SSH only from a trusted IPv6 prefix
              ingress_security_rules {
                source      = "2001:db8:abcd::/48" # RFC 3849 documentation prefix - replace with your trusted IPv6 prefix
                source_type = "CIDR_BLOCK"
                protocol    = "6"

                tcp_options {
                  destination_port_range {
                    min = 22
                    max = 22
                  }
                }
              }
            }
            ```
    refs:
      - url: https://docs.oracle.com/en-us/iaas/Content/Network/Concepts/securitylists.htm
        title: OCI - Security Lists
      - url: https://docs.oracle.com/en-us/iaas/Content/Network/Concepts/ipv6.htm
        title: OCI - IPv6 Addressing
  - uid: mondoo-oci-security-vcn-no-unrestricted-ipv6-ingress-oci
    filters: asset.platform == "oci-network-securitylist"
    mql: |
      oci.network.securityList.ingressSecurityRules.where(_['source'] == "::/0").none(
        _['protocol'] == "all" ||
        _['protocol'] == "6" && _['tcpOptions'] == empty ||
        _['protocol'] == "6" && _['tcpOptions']['destinationPortRange']['min'] <= 22 && _['tcpOptions']['destinationPortRange']['max'] >= 22 ||
        _['protocol'] == "6" && _['tcpOptions']['destinationPortRange']['min'] <= 3389 && _['tcpOptions']['destinationPortRange']['max'] >= 3389 ||
        _['protocol'] == "17" && _['udpOptions'] == empty
      )
  - uid: mondoo-oci-security-vcn-no-unrestricted-ipv6-ingress-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "oci_core_security_list")
    mql: |
      # Three separate datapoints, one per failure mode: no all-protocol IPv6 rule, all-UDP IPv6 rules must scope udp_options, and TCP IPv6 rules must scope tcp_options away from ports 22/3389.
      terraform.resources.where(nameLabel == "oci_core_security_list").all(
        blocks.where(type == "ingress_security_rules" && arguments.source == "::/0").none(arguments.protocol == "all")
      )
      terraform.resources.where(nameLabel == "oci_core_security_list").all(
        blocks.where(type == "ingress_security_rules" && arguments.source == "::/0" && arguments.protocol == "17").all(
          blocks.where(type == "udp_options") != empty
        )
      )
      terraform.resources.where(nameLabel == "oci_core_security_list").all(
        blocks.where(type == "ingress_security_rules" && arguments.source == "::/0" && arguments.protocol == "6").all(
          blocks.where(type == "tcp_options") != empty &&
          blocks.where(type == "tcp_options").all(
            blocks.where(type == "destination_port_range").none(
              arguments['min'] <= 22 && arguments['max'] >= 22 ||
              arguments['min'] <= 3389 && arguments['max'] >= 3389
            )
          )
        )
      )
  - uid: mondoo-oci-security-vcn-no-unrestricted-ipv6-ingress-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "oci_core_security_list")
    mql: |
      terraform.plan.resourceChanges.where(type == "oci_core_security_list").all(
        change.after.ingress_security_rules.where(_['source'] == "::/0").none(
          _['protocol'] == "all" ||
          _['protocol'] == "6" && _['tcp_options'] == empty ||
          _['protocol'] == "6" && _['tcp_options']['destination_port_range']['min'] <= 22 && _['tcp_options']['destination_port_range']['max'] >= 22 ||
          _['protocol'] == "6" && _['tcp_options']['destination_port_range']['min'] <= 3389 && _['tcp_options']['destination_port_range']['max'] >= 3389 ||
          _['protocol'] == "17" && _['udp_options'] == empty
        )
      )
  - uid: mondoo-oci-security-vcn-no-unrestricted-ipv6-ingress-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "oci_core_security_list")
    mql: |
      terraform.state.resources.where(type == "oci_core_security_list").all(
        values.ingress_security_rules.where(_['source'] == "::/0").none(
          _['protocol'] == "all" ||
          _['protocol'] == "6" && _['tcp_options'] == empty ||
          _['protocol'] == "6" && _['tcp_options']['destination_port_range']['min'] <= 22 && _['tcp_options']['destination_port_range']['max'] >= 22 ||
          _['protocol'] == "6" && _['tcp_options']['destination_port_range']['min'] <= 3389 && _['tcp_options']['destination_port_range']['max'] >= 3389 ||
          _['protocol'] == "17" && _['udp_options'] == empty
        )
      )
  - uid: mondoo-oci-security-database-backups-customer-managed-encryption
    title: Ensure database backups are encrypted with customer-managed keys
    impact: 70
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-oci-security-database-backups-customer-managed-encryption-oci
        tags:
          mondoo.com/filter-title: OCI
          mondoo.com/filter-icon: oci
      - uid: mondoo-oci-security-database-backups-customer-managed-encryption-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-oci-security-database-backups-customer-managed-encryption-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-oci-security-database-backups-customer-managed-encryption-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check verifies that every OCI database backup — both `oci.database.backup` (VM/BM DB systems) and `oci.database.autonomousDatabaseBackup` — is encrypted with a customer-managed KMS key rather than Oracle-managed default keys. Backups inherit the parent database's KMS configuration, so this check effectively validates that every database has a customer-managed master key associated.

        **Why this matters**

        Backups carry the same data sensitivity as the live database, but live longer and travel further:

        - A backup encrypted only with Oracle-managed keys is decryptable by any Oracle-side compromise path.
        - Long-term backups outlive the original database; a CMK-encrypted backup retains the option to permanently revoke access by deleting or disabling the key.
        - Customer-managed keys are required by HIPAA, PCI DSS, and FedRAMP-aligned controls when sensitive data is at rest.
        - Backup destinations (Object Storage, DBRS, AWS S3) extend the blast radius — without CMK, the encryption boundary follows the Oracle tenancy by default.

        **Risk mitigation**

        - Restricts who can decrypt historical backup material to holders of the CMK.
        - Provides a key-revocation path that invalidates every backup encrypted with that key.
        - Aligns backup encryption with the same posture customers expect for the live database.
      remediation:
        - id: console
          desc: |
            Assign a customer-managed KMS key to the parent database so future backups inherit it:

            1. Open **Oracle Database** → **Autonomous Database** (or **DB Systems** → the database) → select the database.
            2. Under **Encryption**, select **Edit** and choose **Encrypt using a customer-managed key**.
            3. Select the vault and master encryption key, then save.
            4. Subsequent automatic and on-demand backups inherit the new key. Existing backups remain encrypted with the previous key — re-create critical long-term backups after the rotation.
        - id: cli
          desc: |
            Rotate an Autonomous Database to a new version of its customer-managed KMS key. The vault association must already exist; if the database was created with Oracle-managed keys, recreate it from a backup with `--kms-key-id` and `--vault-id` set at create time.

            ```bash
            oci db autonomous-database rotate-key \
              --autonomous-database-id <adb-ocid> \
              --key-version-id <key-version-ocid>
            ```

            Rotate the encryption key for a database within a DB system:

            ```bash
            oci db database rotate-vault-key \
              --database-id <database-ocid>
            ```
        - id: terraform
          desc: |
            Set `kms_key_id` (and `vault_id` for autonomous databases) on every database resource so its backups inherit customer-managed encryption:

            ```hcl
            resource "oci_kms_vault" "app" {
              compartment_id = var.compartment_ocid
              display_name   = "app-vault"
              vault_type     = "DEFAULT"
            }

            resource "oci_kms_key" "app" {
              compartment_id      = var.compartment_ocid
              display_name        = "app-db-key"
              management_endpoint = oci_kms_vault.app.management_endpoint

              key_shape {
                algorithm = "AES"
                length    = 32
              }
            }

            resource "oci_database_autonomous_database" "app" {
              compartment_id           = var.compartment_ocid
              db_name                  = "appdb"
              admin_password           = var.adb_admin_password
              cpu_core_count           = 1
              data_storage_size_in_tbs = 1

              kms_key_id = oci_kms_key.app.id
              vault_id   = oci_kms_vault.app.id
            }

            resource "oci_database_database" "app" {
              db_home_id = oci_database_db_home.app.id
              source     = "NONE"

              database {
                admin_password = var.db_admin_password
                db_name        = "APPDB"
                kms_key_id     = oci_kms_key.app.id
              }
            }
            ```
    refs:
      - url: https://docs.oracle.com/en-us/iaas/Content/Database/Concepts/adbsecurity.htm
        title: OCI - Autonomous Database Encryption
      - url: https://docs.oracle.com/en-us/iaas/Content/Database/Tasks/managingbackups.htm
        title: OCI - Managing Database Backups
  - uid: mondoo-oci-security-database-backups-customer-managed-encryption-oci
    filters: asset.platform == 'oci'
    mql: |
      oci.database.backups.all(kmsKey != null)
      oci.database.autonomousDatabaseBackups.all(kmsKey != null)
  - uid: mondoo-oci-security-database-backups-customer-managed-encryption-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'oci_database_autonomous_database') ||
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'oci_database_database')
    mql: |
      terraform.resources('oci_database_autonomous_database').all(
        arguments['kms_key_id'] != null && arguments['kms_key_id'] != ""
      )
      terraform.resources('oci_database_database').all(
        blocks.where(type == 'database').all(
          arguments['kms_key_id'] != null && arguments['kms_key_id'] != ""
        )
      )
  - uid: mondoo-oci-security-database-backups-customer-managed-encryption-terraform-plan
