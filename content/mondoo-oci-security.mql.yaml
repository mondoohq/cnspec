  - uid: mondoo-oci-security-object-storage-buckets-event-logging-enabled
    title: Ensure Object Storage buckets have event logging enabled
    impact: 60
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/soc2-2017: soc2-control-cc7-2-1
    variants:
      - uid: mondoo-oci-security-object-storage-buckets-event-logging-enabled-oci
        tags:
          mondoo.com/filter-title: OCI
          mondoo.com/icon: oci
      - uid: mondoo-oci-security-object-storage-buckets-event-logging-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/icon: terraform
      - uid: mondoo-oci-security-object-storage-buckets-event-logging-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/icon: terraform
      - uid: mondoo-oci-security-object-storage-buckets-event-logging-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/icon: terraform
    docs:
      desc: |
        This check ensures that object event logging is enabled on OCI Object Storage buckets. Event logging emits events when objects are created, updated, or deleted, enabling audit trails and automated responses.

        **Why this matters**

        Without event logging, there is no visibility into object-level operations:
          •  Unauthorized data access or modification goes undetected.
          •  Incident response is hampered by lack of activity records.
          •  Compliance audits cannot verify data access patterns.

        Event logging provides:
          •  Visibility into all object operations for security monitoring.
          •  Integration with OCI Events and Notifications for automated alerting.
          •  Audit trail for compliance requirements.

        Risk mitigation
          •  Enable object events on all buckets.
          •  Configure event rules to alert on suspicious activity.
          •  Integrate events with SIEM or logging platforms.
      remediation:
        - id: console
          desc: |
            To enable object event logging on an Object Storage bucket using the OCI Console:

            1. Navigate to **Object Storage > Buckets**.
            2. Select the bucket identified in this finding.
            3. Select **Edit**.
            4. Enable **Emit Object Events**.
            5. Select **Save Changes**.
        - id: cli
          desc: |
            To enable object event logging on an Object Storage bucket using the OCI CLI, update the bucket's event setting:

            ```bash
            oci os bucket update --bucket-name BUCKET_NAME --object-events-enabled true
            ```
        - id: terraform
          desc: |
            To enable object event logging on an Object Storage bucket in Terraform, set the `object_events_enabled` attribute to `true`:

            ```hcl
            resource "oci_objectstorage_bucket" "example" {
              compartment_id        = var.compartment_ocid
              namespace             = var.namespace
              name                  = "example-bucket"
              object_events_enabled = true
            }
            ```
    refs:
      - url: https://docs.oracle.com/en-us/iaas/Content/Object/Tasks/managingbuckets.htm
        title: OCI Object Storage events documentation
  - uid: mondoo-oci-security-object-storage-buckets-event-logging-enabled-oci
    filters: asset.platform == 'oci'
    mql: |
      oci.objectStorage.buckets.all(objectEventsEnabled == true)
  - uid: mondoo-oci-security-object-storage-buckets-event-logging-enabled-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "oci_objectstorage_bucket")
    mql: |
      terraform.resources.where(nameLabel == "oci_objectstorage_bucket").all(
        arguments.object_events_enabled == true
      )
  - uid: mondoo-oci-security-object-storage-buckets-event-logging-enabled-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "oci_objectstorage_bucket")
    mql: |
      terraform.plan.resourceChanges.where(type == "oci_objectstorage_bucket").all(
        change.after.object_events_enabled == true
      )
  - uid: mondoo-oci-security-object-storage-buckets-event-logging-enabled-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "oci_objectstorage_bucket")
    mql: |
      terraform.state.resources.where(type == "oci_objectstorage_bucket").all(
        values.object_events_enabled == true
      )
  - uid: mondoo-oci-security-object-storage-buckets-customer-managed-encryption
    title: Ensure Object Storage buckets use customer-managed encryption keys
    impact: 70
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/soc2-2017: soc2-control-cc6-1-10
    variants:
      - uid: mondoo-oci-security-object-storage-buckets-customer-managed-encryption-oci
        tags:
          mondoo.com/filter-title: OCI
          mondoo.com/icon: oci
      - uid: mondoo-oci-security-object-storage-buckets-customer-managed-encryption-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/icon: terraform
      - uid: mondoo-oci-security-object-storage-buckets-customer-managed-encryption-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/icon: terraform
      - uid: mondoo-oci-security-object-storage-buckets-customer-managed-encryption-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/icon: terraform
    docs:
      desc: |
        This check ensures that OCI Object Storage buckets are encrypted using customer-managed keys from the OCI Vault service (KMS) rather than Oracle-managed default encryption keys. Customer-managed keys provide greater control over the encryption lifecycle.

        **Why this matters**

        While OCI encrypts all Object Storage data at rest by default using Oracle-managed keys, customer-managed keys provide additional security controls:
          •  Full control over key creation, rotation, and deletion.
          •  Ability to revoke access to encrypted data by disabling or deleting the key.
          •  Compliance with regulations that require customer-controlled encryption (HIPAA, PCI DSS, FedRAMP).
          •  Separation of duties between data management and key management.

        Risk mitigation
          •  Create encryption keys in OCI Vault.
          •  Assign customer-managed keys to all Object Storage buckets.
          •  Configure key rotation policies.
          •  Monitor key usage through OCI Audit logs.
      remediation:
        - id: console
          desc: |
            To assign a customer-managed encryption key to an Object Storage bucket using the OCI Console:

            1. Navigate to **Object Storage > Buckets**.
            2. Select the bucket identified in this finding.
            3. Select **Assign** next to Encryption Key.
            4. Choose **Encrypt using customer-managed keys**.
            5. Select the vault, master encryption key, and key version.
            6. Select **Assign**.
        - id: cli
          desc: |
            To assign a customer-managed encryption key to an Object Storage bucket using the OCI CLI, update the bucket with the KMS key OCID:

            ```bash
            oci os bucket update --bucket-name BUCKET_NAME --kms-key-id KEY_OCID
            ```
        - id: terraform
          desc: |
            To assign a customer-managed encryption key to an Object Storage bucket in Terraform, create a vault and key, then reference the key in the bucket resource:

            ```hcl
            resource "oci_kms_vault" "example" {
              compartment_id = var.compartment_ocid
              display_name   = "example-vault"
              vault_type     = "DEFAULT"
            }

            resource "oci_kms_key" "example" {
              compartment_id = var.compartment_ocid
              display_name   = "example-bucket-key"
              management_endpoint = oci_kms_vault.example.management_endpoint

              key_shape {
                algorithm = "AES"
                length    = 32
              }
            }

            resource "oci_objectstorage_bucket" "example" {
              compartment_id = var.compartment_ocid
              namespace      = var.namespace
              name           = "example-bucket"
              kms_key_id     = oci_kms_key.example.id
            }
            ```
    refs:
      - url: https://docs.oracle.com/en-us/iaas/Content/Object/Tasks/managingbuckets_topic-Server_Side_Encryption_SSE.htm
        title: CIS OCI Foundations Benchmark 4.1.2
  - uid: mondoo-oci-security-object-storage-buckets-customer-managed-encryption-oci
    filters: asset.platform == 'oci'
    mql: |
      oci.objectStorage.buckets.all(kmsKeyId != "")
  - uid: mondoo-oci-security-object-storage-buckets-customer-managed-encryption-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "oci_objectstorage_bucket")
    mql: |
      terraform.resources.where(nameLabel == "oci_objectstorage_bucket").all(
        arguments.kms_key_id != empty
      )
  - uid: mondoo-oci-security-object-storage-buckets-customer-managed-encryption-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "oci_objectstorage_bucket")
    mql: |
      terraform.plan.resourceChanges.where(type == "oci_objectstorage_bucket").all(
        change.after.kms_key_id != empty
      )
  - uid: mondoo-oci-security-object-storage-buckets-customer-managed-encryption-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "oci_objectstorage_bucket")
    mql: |
      terraform.state.resources.where(type == "oci_objectstorage_bucket").all(
        values.kms_key_id != empty
      )
  - uid: mondoo-oci-security-vcn-no-unrestricted-ingress-all-protocols
    title: Ensure VCN security lists block unrestricted ingress from 0.0.0.0/0
    impact: 90
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/soc2-2017: soc2-control-cc6-6-4
    variants:
      - uid: mondoo-oci-security-vcn-no-unrestricted-ingress-all-protocols-oci
        tags:
          mondoo.com/filter-title: OCI
          mondoo.com/icon: oci
      - uid: mondoo-oci-security-vcn-no-unrestricted-ingress-all-protocols-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/icon: terraform
      - uid: mondoo-oci-security-vcn-no-unrestricted-ingress-all-protocols-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/icon: terraform
      - uid: mondoo-oci-security-vcn-no-unrestricted-ingress-all-protocols-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/icon: terraform
    docs:
      desc: |
        This check ensures that OCI VCN security lists do not contain ingress rules that allow all traffic (all protocols) from any source (0.0.0.0/0). Such rules effectively disable network-level access control for inbound traffic.

        **Why this matters**

        Allowing all inbound traffic from the internet exposes every service running on instances within the subnet:
          •  All ports and protocols are accessible from any IP address on the internet.
          •  Attackers can discover and exploit any vulnerable service.
          •  The security list provides no defense-in-depth against network-based attacks.

        If unrestricted ingress is allowed, it can lead to:
          •  Exploitation of vulnerable services running on compute instances.
          •  Unauthorized access to databases, management interfaces, and internal services.
          •  Non-compliance with CIS OCI Foundations Benchmark, PCI DSS, and NIST 800-53.

        Risk mitigation
          •  Remove or restrict overly permissive ingress rules.
          •  Use specific protocol and port ranges in security list rules.
          •  Restrict source CIDR blocks to known trusted IP ranges.
          •  Use Network Security Groups (NSGs) for fine-grained access control.
      remediation:
        - id: console
          desc: |
            To restrict unrestricted ingress rules in a VCN security list using the OCI Console:

            1. Navigate to **Networking > Virtual Cloud Networks**.
            2. Select the VCN.
            3. Select **Security Lists**.
            4. Select the security list with the overly permissive rule.
            5. Edit or remove the ingress rule that allows all protocols from 0.0.0.0/0, replacing it with rules for specific protocols, ports, and trusted source CIDR blocks.
        - id: cli
          desc: |
            To restrict unrestricted ingress rules in a VCN security list using the OCI CLI, update the security list with scoped rules that specify protocols, ports, and trusted source CIDR blocks:

            ```bash
            oci network security-list update --security-list-id SECURITY_LIST_OCID \
              --ingress-security-rules '<updated-rules-json>'
            ```
        - id: terraform
          desc: |
            To restrict unrestricted ingress in a VCN security list in Terraform, define ingress rules with specific protocols, port ranges, and restricted source CIDR blocks instead of allowing all traffic from 0.0.0.0/0:

            ```hcl
            resource "oci_core_security_list" "example" {
              compartment_id = var.compartment_ocid
              vcn_id         = oci_core_vcn.example.id
              display_name   = "example-security-list"

              ingress_security_rules {
                protocol  = "6" # TCP
                source    = "10.0.0.0/16"
                stateless = false

                tcp_options {
                  min = 443
                  max = 443
                }
              }
            }
            ```
    refs:
      - url: https://docs.oracle.com/en-us/iaas/Content/Network/Concepts/securitylists.htm
        title: CIS OCI Foundations Benchmark 2.1
  - uid: mondoo-oci-security-vcn-no-unrestricted-ingress-all-protocols-oci
    filters: asset.platform == 'oci'
    mql: |
      oci.network.securityLists.all(
        ingressSecurityRules.none(_['source'] == "0.0.0.0/0" && _['protocol'] == "all")
      )
  - uid: mondoo-oci-security-vcn-no-unrestricted-ingress-all-protocols-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "oci_core_security_list")
    mql: |
      terraform.resources.where(nameLabel == "oci_core_security_list").all(
        blocks.where(type == "ingress_security_rules").none(arguments.source == "0.0.0.0/0" && arguments.protocol == "all")
      )
  - uid: mondoo-oci-security-vcn-no-unrestricted-ingress-all-protocols-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "oci_core_security_list")
    mql: |
      terraform.plan.resourceChanges.where(type == "oci_core_security_list").all(
        change.after.ingress_security_rules.none(_['source'] == "0.0.0.0/0" && _['protocol'] == "all")
      )
  - uid: mondoo-oci-security-vcn-no-unrestricted-ingress-all-protocols-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "oci_core_security_list")
    mql: |
      terraform.state.resources.where(type == "oci_core_security_list").all(
        values.ingress_security_rules.none(_['source'] == "0.0.0.0/0" && _['protocol'] == "all")
      )
  - uid: mondoo-oci-security-vcn-no-unrestricted-ingress-all-tcp-ports
    title: Ensure VCN security lists block unrestricted TCP ingress
    impact: 80
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/soc2-2017: soc2-control-cc6-6-4
    variants:
      - uid: mondoo-oci-security-vcn-no-unrestricted-ingress-all-tcp-ports-oci
        tags:
          mondoo.com/filter-title: OCI
          mondoo.com/icon: oci
      - uid: mondoo-oci-security-vcn-no-unrestricted-ingress-all-tcp-ports-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/icon: terraform
      - uid: mondoo-oci-security-vcn-no-unrestricted-ingress-all-tcp-ports-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/icon: terraform
      - uid: mondoo-oci-security-vcn-no-unrestricted-ingress-all-tcp-ports-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/icon: terraform
    docs:
      desc: |
        This check ensures that OCI VCN security lists do not contain TCP ingress rules from 0.0.0.0/0 that allow all TCP ports. When a TCP ingress rule has no port restrictions, every TCP service on the instance is accessible from the internet.

        **Why this matters**

        Unrestricted TCP access from the internet exposes all TCP services:
          •  SSH (22), RDP (3389), databases, and management interfaces become internet-accessible.
          •  Automated scanners continuously probe all ports, exploiting any vulnerable service.
          •  The broad exposure makes it difficult to maintain a secure attack surface.

        If unrestricted TCP ingress is allowed, it can lead to:
          •  Brute-force attacks against SSH, RDP, and other authentication services.
          •  Exploitation of unpatched or misconfigured services.
          •  Data exfiltration through exposed database or application ports.
          •  Non-compliance with CIS OCI Foundations Benchmark.

        Risk mitigation
          •  Always specify destination port ranges in TCP ingress rules.
          •  Restrict source CIDR blocks to known trusted IP ranges.
          •  Use the minimum set of ports required for each workload.
          •  Prefer Network Security Groups (NSGs) for instance-level access control.
      remediation:
        - id: console
          desc: |
            To restrict unrestricted TCP ingress rules in a VCN security list using the OCI Console:

            1. Navigate to **Networking > Virtual Cloud Networks**.
            2. Select the VCN.
            3. Select **Security Lists**.
            4. Select the security list.
            5. Edit TCP ingress rules from 0.0.0.0/0 to specify destination port ranges, allowing only the ports required for your workload.
        - id: cli
          desc: |
            To restrict unrestricted TCP ingress rules in a VCN security list using the OCI CLI, update the security list with rules that include specific port ranges:

            ```bash
            oci network security-list update --security-list-id SECURITY_LIST_OCID \
              --ingress-security-rules '<updated-rules-with-port-ranges-json>'
            ```
        - id: terraform
          desc: |
            To restrict unrestricted TCP ingress in a VCN security list in Terraform, always specify `tcp_options` with explicit port ranges:

            ```hcl
            resource "oci_core_security_list" "example" {
              compartment_id = var.compartment_ocid
              vcn_id         = oci_core_vcn.example.id
              display_name   = "example-security-list"

              ingress_security_rules {
                protocol  = "6" # TCP
                source    = "0.0.0.0/0"
                stateless = false

                tcp_options {
                  min = 443
                  max = 443
                }
              }

              ingress_security_rules {
                protocol  = "6" # TCP
                source    = "10.0.0.0/16"
                stateless = false

                tcp_options {
                  min = 22
                  max = 22
                }
              }
            }
            ```
    refs:
      - url: https://docs.oracle.com/en-us/iaas/Content/Network/Concepts/securitylists.htm
        title: CIS OCI Foundations Benchmark 2.2
  - uid: mondoo-oci-security-vcn-no-unrestricted-ingress-all-tcp-ports-oci
    filters: asset.platform == 'oci'
    mql: |
      oci.network.securityLists.all(
        ingressSecurityRules.where(_['source'] == "0.0.0.0/0" && _['protocol'] == "6").none(_['tcpOptions'] == empty)
      )
  - uid: mondoo-oci-security-vcn-no-unrestricted-ingress-all-tcp-ports-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "oci_core_security_list")
    mql: |
      terraform.resources.where(nameLabel == "oci_core_security_list").all(
        blocks.where(type == "ingress_security_rules" && arguments.source == "0.0.0.0/0" && arguments.protocol == "6").all(
          blocks.where(type == "tcp_options") != empty
        )
      )
  - uid: mondoo-oci-security-vcn-no-unrestricted-ingress-all-tcp-ports-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "oci_core_security_list")
    mql: |
      terraform.plan.resourceChanges.where(type == "oci_core_security_list").all(
        change.after.ingress_security_rules.where(_['source'] == "0.0.0.0/0" && _['protocol'] == "6").none(_['tcp_options'] == empty)
      )
  - uid: mondoo-oci-security-vcn-no-unrestricted-ingress-all-tcp-ports-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "oci_core_security_list")
    mql: |
      terraform.state.resources.where(type == "oci_core_security_list").all(
        values.ingress_security_rules.where(_['source'] == "0.0.0.0/0" && _['protocol'] == "6").none(_['tcp_options'] == empty)
      )
  - uid: mondoo-oci-security-vcn-no-unrestricted-egress-all-protocols
    title: Ensure VCN security lists block unrestricted egress to 0.0.0.0/0
    impact: 70
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/soc2-2017: soc2-control-cc6-6-4
    variants:
      - uid: mondoo-oci-security-vcn-no-unrestricted-egress-all-protocols-oci
        tags:
          mondoo.com/filter-title: OCI
          mondoo.com/icon: oci
      - uid: mondoo-oci-security-vcn-no-unrestricted-egress-all-protocols-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/icon: terraform
      - uid: mondoo-oci-security-vcn-no-unrestricted-egress-all-protocols-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/icon: terraform
      - uid: mondoo-oci-security-vcn-no-unrestricted-egress-all-protocols-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/icon: terraform
    docs:
      desc: |
        This check ensures that OCI VCN security lists do not contain egress rules that allow all outbound traffic to any destination. Unrestricted egress rules can facilitate data exfiltration and command-and-control communications from compromised instances.

        **Why this matters**

        Unrestricted egress to the internet allows compromised instances to:
          •  Exfiltrate sensitive data to attacker-controlled servers.
          •  Communicate with command-and-control (C2) infrastructure.
          •  Download additional malware or tools.
          •  Participate in DDoS attacks or cryptocurrency mining.

        Risk mitigation
          •  Restrict egress rules to specific destination CIDR blocks and protocols.
          •  Use a NAT gateway or proxy for controlled internet access.
          •  Monitor outbound traffic for anomalies.
          •  Apply the principle of least privilege to egress rules.
      remediation:
        - id: console
          desc: |
            To restrict unrestricted egress rules in a VCN security list using the OCI Console:

            1. Navigate to **Networking > Virtual Cloud Networks**.
            2. Select the VCN.
            3. Select **Security Lists**.
            4. Select the security list.
            5. Edit egress rules to specify destination CIDR blocks and protocols, replacing any rule that allows all traffic to 0.0.0.0/0.
        - id: cli
          desc: |
            To restrict unrestricted egress rules in a VCN security list using the OCI CLI, update the security list with scoped rules that specify destinations and protocols:

            ```bash
            oci network security-list update --security-list-id SECURITY_LIST_OCID \
              --egress-security-rules '<updated-rules-json>'
            ```
        - id: terraform
          desc: |
            To restrict unrestricted egress in a VCN security list in Terraform, define egress rules with specific destination CIDR blocks and protocols instead of allowing all traffic to 0.0.0.0/0:

            ```hcl
            resource "oci_core_security_list" "example" {
              compartment_id = var.compartment_ocid
              vcn_id         = oci_core_vcn.example.id
              display_name   = "example-security-list"

              egress_security_rules {
                protocol    = "6" # TCP
                destination = "10.0.0.0/16"
                stateless   = false

                tcp_options {
                  min = 443
                  max = 443
                }
              }
            }
            ```
    refs:
      - url: https://docs.oracle.com/en-us/iaas/Content/Network/Concepts/securitylists.htm
        title: OCI security list documentation
  - uid: mondoo-oci-security-vcn-no-unrestricted-egress-all-protocols-oci
    filters: asset.platform == 'oci'
    mql: |
      oci.network.securityLists.all(
        egressSecurityRules.none(_['destination'] == "0.0.0.0/0" && _['protocol'] == "all")
      )
  - uid: mondoo-oci-security-vcn-no-unrestricted-egress-all-protocols-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "oci_core_security_list")
    mql: |
      terraform.resources.where(nameLabel == "oci_core_security_list").all(
        blocks.where(type == "egress_security_rules").none(arguments.destination == "0.0.0.0/0" && arguments.protocol == "all")
      )
  - uid: mondoo-oci-security-vcn-no-unrestricted-egress-all-protocols-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "oci_core_security_list")
    mql: |
      terraform.plan.resourceChanges.where(type == "oci_core_security_list").all(
        change.after.egress_security_rules.none(_['destination'] == "0.0.0.0/0" && _['protocol'] == "all")
      )
  - uid: mondoo-oci-security-vcn-no-unrestricted-egress-all-protocols-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "oci_core_security_list")
    mql: |
      terraform.state.resources.where(type == "oci_core_security_list").all(
        values.egress_security_rules.none(_['destination'] == "0.0.0.0/0" && _['protocol'] == "all")
      )
  - uid: mondoo-oci-security-iam-stale-active-users
    title: Ensure active IAM users have logged in within the last 90 days
    impact: 70
    filters: asset.platform == 'oci'
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-5-17
      compliance/nis-2: nis-2-21-2-g
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-10
      compliance/soc2-2017: soc2-control-cc6-2-2
    mql: |
      oci.identity.users.where(state == "ACTIVE" && lastLogin != empty).all(
        lastLogin > time.now - 90 * time.day
      )
    docs:
      desc: |
        This check ensures that all active IAM users have logged in within the last 90 days. Accounts that remain active but unused may indicate orphaned identities that increase the attack surface.

        **Why this matters**

        Stale active accounts pose significant security risks:
          •  Unused accounts may have been forgotten during employee offboarding.
          •  Dormant accounts with valid credentials are prime targets for attackers.
          •  Compromised stale accounts may go unnoticed for extended periods.
          •  Regular login activity is an indicator of account legitimacy and active ownership.

        Risk mitigation
          •  Disable or delete IAM user accounts that have not been used within 90 days.
          •  Implement automated account lifecycle management.
          •  Regularly review user login activity and investigate dormant accounts.
          •  Establish an offboarding process that includes IAM account deactivation.
      remediation:
        - id: console
          desc: |
            To identify and remediate stale active users using the OCI Console:

            1. Navigate to **Identity & Security > Users**.
            2. Review the **Last Sign-In** column for each active user.
            3. For users who have not signed in within 90 days, select the user.
            4. Select **Disable** or **Delete** depending on your organization's offboarding policy.
        - id: cli
          desc: |
            To identify stale active users using the OCI CLI, list users and filter by login activity:

            ```bash
            oci iam user list --compartment-id TENANCY_OCID --all --query "data[?\"lifecycle-state\"=='ACTIVE'].{Name:name, LastLogin:\"last-successful-login-time\"}" --output table
            ```

            Review the output for users whose last login exceeds 90 days. Disable stale accounts:

            ```bash
            oci iam user update --user-id USER_OCID --defined-tags '{"Operations": {"Status": "PendingReview"}}'
            ```

            NOTE: The OCI CLI does not support disabling users directly. Disable or delete stale users through the OCI Console or by removing all credentials (API keys, auth tokens, passwords) via the CLI.
    refs:
      - url: https://docs.oracle.com/en-us/iaas/Content/Identity/Tasks/managingusers.htm
        title: CIS OCI Foundations Benchmark 1.13
  - uid: mondoo-oci-security-iam-api-key-rotation
    title: Ensure active IAM user API keys are rotated within 90 days
    impact: 80
    filters: asset.platform == 'oci'
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-5-17
      compliance/nis-2: nis-2-21-2-g
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-10
      compliance/soc2-2017: soc2-control-cc6-2-2
    mql: |
      oci.identity.users.where(state == "ACTIVE").all(
        apiKeys.where(state == "ACTIVE").all(timeCreated > time.now - 90 * time.day)
      )
    docs:
      desc: |
        This check ensures that API keys for active IAM users have been created or rotated within the last 90 days. Long-lived API keys increase the risk of credential compromise.

        **Why this matters**

        API keys that are not regularly rotated pose significant risks:
          •  Older keys have had more time to be exposed through logs, configuration files, or code repositories.
          •  Compromised long-lived keys provide persistent access until manually revoked.
          •  Regular rotation limits the window of exposure if a key is compromised.
          •  Compliance frameworks (CIS, NIST, PCI DSS) require periodic credential rotation.

        Risk mitigation
          •  Rotate API keys every 90 days or sooner.
          •  Automate key rotation where possible.
          •  Monitor API key usage for anomalous activity.
          •  Delete unused API keys immediately.
      remediation:
        - id: console
          desc: |
            To rotate API keys for an IAM user using the OCI Console:

            1. Navigate to **Identity & Security > Users**.
            2. Select the user with the stale API key.
            3. Under **Resources**, select **API Keys**.
            4. Select **Add API Key** to generate or upload a new key.
            5. Update all applications using the old key to use the new key.
            6. Delete the old API key.
        - id: cli
          desc: |
            To rotate an API key using the OCI CLI, first list existing keys:

            ```bash
            oci iam user api-key list --user-id USER_OCID
            ```

            Upload a new API key:

            ```bash
            oci iam user api-key upload --user-id USER_OCID --key-file /path/to/new_public_key.pem
            ```

            After updating applications to use the new key, delete the old key:

            ```bash
            oci iam user api-key delete --user-id USER_OCID --fingerprint OLD_KEY_FINGERPRINT
            ```
    refs:
      - url: https://docs.oracle.com/en-us/iaas/Content/Identity/Tasks/managingcredentials.htm
        title: CIS OCI Foundations Benchmark 1.8
  - uid: mondoo-oci-security-iam-auth-token-rotation
    title: Ensure active IAM user auth tokens are rotated within 90 days
    impact: 80
    filters: asset.platform == 'oci'
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-5-17
      compliance/nis-2: nis-2-21-2-g
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-10
      compliance/soc2-2017: soc2-control-cc6-2-2
    mql: |
      oci.identity.users.where(state == "ACTIVE").all(
        authTokens.where(state == "ACTIVE").all(timeCreated > time.now - 90 * time.day)
      )
    docs:
      desc: |
        This check ensures that authentication tokens for active IAM users have been created or rotated within the last 90 days. Auth tokens are used for third-party API authentication and should be rotated regularly.

        **Why this matters**

        Long-lived authentication tokens increase security risk:
          •  Auth tokens provide access to OCI-compatible APIs (e.g., Swift-compatible Object Storage).
          •  Tokens that are not rotated accumulate exposure time.
          •  Compromised tokens can be used to access resources without triggering password-based security controls.
          •  Regular rotation reduces the impact of undetected credential theft.

        Risk mitigation
          •  Rotate auth tokens every 90 days or sooner.
          •  Delete auth tokens that are no longer needed.
          •  Monitor token usage through OCI Audit logs.
          •  Automate token rotation in CI/CD pipelines and service integrations.
      remediation:
        - id: console
          desc: |
            To rotate auth tokens for an IAM user using the OCI Console:

            1. Navigate to **Identity & Security > Users**.
            2. Select the user with the stale auth token.
            3. Under **Resources**, select **Auth Tokens**.
            4. Select **Generate Token** to create a new token.
            5. Update all applications using the old token to use the new token.
            6. Delete the old auth token.
        - id: cli
          desc: |
            To rotate an auth token using the OCI CLI, first list existing tokens:

            ```bash
            oci iam auth-token list --user-id USER_OCID
            ```

            Create a new auth token:

            ```bash
            oci iam auth-token create --user-id USER_OCID --description "Rotated token"
            ```

            After updating applications to use the new token, delete the old token:

            ```bash
            oci iam auth-token delete --user-id USER_OCID --auth-token-id OLD_TOKEN_OCID
            ```
    refs:
      - url: https://docs.oracle.com/en-us/iaas/Content/Identity/Tasks/managingcredentials.htm
        title: CIS OCI Foundations Benchmark 1.9
  - uid: mondoo-oci-security-iam-no-broad-compartment-policies
    title: Ensure no IAM policies grant manage all-resources in compartment
    impact: 80
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-2
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/soc2-2017: soc2-control-cc6-3-1
    variants:
      - uid: mondoo-oci-security-iam-no-broad-compartment-policies-oci
        tags:
          mondoo.com/filter-title: OCI
          mondoo.com/icon: oci
      - uid: mondoo-oci-security-iam-no-broad-compartment-policies-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/icon: terraform
      - uid: mondoo-oci-security-iam-no-broad-compartment-policies-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/icon: terraform
      - uid: mondoo-oci-security-iam-no-broad-compartment-policies-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/icon: terraform
    docs:
      desc: |
        This check ensures that no IAM policies grant `manage all-resources` at the compartment level. While compartment-scoped policies are less dangerous than tenancy-level policies, granting full management access to all resources within a compartment still violates the principle of least privilege.

        **Why this matters**

        The `manage all-resources in compartment` permission grants unrestricted control within a compartment:
          •  Users can create, modify, and delete any resource type in the compartment.
          •  A compromised account with this permission has full blast radius within the compartment.
          •  It bypasses fine-grained access control and makes auditing difficult.
          •  Lateral movement within the compartment is unrestricted once access is obtained.

        Risk mitigation
          •  Use specific resource types instead of `all-resources` (e.g., `manage instance-family`, `manage virtual-network-family`).
          •  Grant only the minimum permissions required for each group's function.
          •  Use multiple policies with narrow scope instead of a single broad policy.
          •  Regularly audit IAM policies for overly permissive statements.
      remediation:
        - id: console
          desc: |
            To replace overly permissive compartment policies using the OCI Console:

            1. Navigate to **Identity & Security > Policies**.
            2. Identify policies containing `manage all-resources in compartment`.
            3. Replace with scoped policies that grant access to specific resource types:

            ```
            # Instead of:
            Allow group DevOps to manage all-resources in compartment Production

            # Use scoped policies:
            Allow group DevOps to manage instance-family in compartment Production
            Allow group DevOps to manage virtual-network-family in compartment Production
            ```
        - id: cli
          desc: |
            To identify and replace overly permissive compartment policies using the OCI CLI, list all policies:

            ```bash
            oci iam policy list --compartment-id TENANCY_OCID --all --query "data[].{Name:name, Statements:statements}" --output table
            ```

            Review for statements containing `manage all-resources in compartment`. Update each policy to use specific resource types:

            ```bash
            oci iam policy update --policy-id POLICY_OCID \
              --statements '["Allow group DevOps to manage instance-family in compartment Production"]'
            ```
        - id: terraform
          desc: |
            To enforce scoped compartment policies in Terraform, use specific resource types instead of `all-resources`:

            ```hcl
            resource "oci_identity_policy" "devops" {
              compartment_id = var.tenancy_ocid
              name           = "DevOpsPolicy"
              description    = "Scoped policy for DevOps team"

              statements = [
                "Allow group DevOps to manage instance-family in compartment Production",
                "Allow group DevOps to manage virtual-network-family in compartment Production",
              ]
            }
            ```
    refs:
      - url: https://docs.oracle.com/en-us/iaas/Content/Identity/Concepts/policies.htm
        title: CIS OCI Foundations Benchmark 1.2
  - uid: mondoo-oci-security-iam-no-broad-compartment-policies-oci
    filters: asset.platform == 'oci'
    mql: |
      oci.identity.policies.none(
        statements.any(_ == /allow.*manage\s+all-resources\s+in\s+compartment/i)
      )
  - uid: mondoo-oci-security-iam-no-broad-compartment-policies-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "oci_identity_policy")
    mql: |
      terraform.resources.where(nameLabel == "oci_identity_policy").none(
        arguments.statements.any(_ == /allow.*manage\s+all-resources\s+in\s+compartment/i)
      )
  - uid: mondoo-oci-security-iam-no-broad-compartment-policies-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "oci_identity_policy")
    mql: |
      terraform.plan.resourceChanges.where(type == "oci_identity_policy").none(
        change.after.statements.any(_ == /allow.*manage\s+all-resources\s+in\s+compartment/i)
      )
  - uid: mondoo-oci-security-iam-no-broad-compartment-policies-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "oci_identity_policy")
    mql: |
      terraform.state.resources.where(type == "oci_identity_policy").none(
        values.statements.any(_ == /allow.*manage\s+all-resources\s+in\s+compartment/i)
      )
  - uid: mondoo-oci-security-object-storage-buckets-replication-enabled
    title: Ensure Object Storage buckets have replication enabled
    impact: 60
    tags:
      compliance/iso-27001-2022: iso-27001-2022-a-8-14
      compliance/nis-2: nis-2-21-2-c
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cp-9
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/soc2-2017: soc2-control-a1-2-1
    variants:
      - uid: mondoo-oci-security-object-storage-buckets-replication-enabled-oci
        tags:
          mondoo.com/filter-title: OCI
          mondoo.com/icon: oci
      - uid: mondoo-oci-security-object-storage-buckets-replication-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/icon: terraform
      - uid: mondoo-oci-security-object-storage-buckets-replication-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/icon: terraform
      - uid: mondoo-oci-security-object-storage-buckets-replication-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/icon: terraform
    docs:
      desc: |
        This check ensures that OCI Object Storage buckets have cross-region replication enabled. Replication automatically copies objects to a bucket in a different region, providing disaster recovery and business continuity protection.

        **Why this matters**

        Without replication, data is stored in a single region and vulnerable to regional failures:
          •  Regional outages or disasters can make data unavailable or cause permanent data loss.
          •  Recovery from a single-region failure requires manual restoration from backups, increasing downtime.
          •  Compliance frameworks often require geographic redundancy for critical data.

        Replication provides:
          •  Automatic, asynchronous copying of objects to a destination bucket in another region.
          •  Protection against regional failures and disasters.
          •  Reduced recovery time objectives (RTO) for business continuity.

        Risk mitigation
          •  Enable replication for buckets containing critical or regulated data.
          •  Choose a destination region that meets your compliance and latency requirements.
          •  Monitor replication status to ensure objects are being copied successfully.
      remediation:
        - id: console
          desc: |
            To enable replication on an Object Storage bucket using the OCI Console:

            1. Navigate to **Object Storage > Buckets**.
            2. Select the bucket identified in this finding.
            3. Under **Resources**, select **Replication Policy**.
            4. Select **Create Policy**.
            5. Choose the destination region and destination bucket.
            6. Select **Create**.
        - id: cli
          desc: |
            To enable replication on an Object Storage bucket using the OCI CLI, create a replication policy:

            ```bash
            oci os replication create-replication-policy --bucket-name SOURCE_BUCKET_NAME \
              --destination-bucket DESTINATION_BUCKET_NAME \
              --destination-region DESTINATION_REGION \
              --name "cross-region-replication"
            ```
        - id: terraform
          desc: |
            To enable replication on an Object Storage bucket in Terraform, create a replication policy resource:

            ```hcl
            resource "oci_objectstorage_replication_policy" "example" {
              bucket           = oci_objectstorage_bucket.source.name
              namespace        = var.namespace
              name             = "cross-region-replication"
              destination_bucket_name   = oci_objectstorage_bucket.destination.name
              destination_region_name   = var.destination_region
            }
            ```
    refs:
      - url: https://docs.oracle.com/en-us/iaas/Content/Object/Tasks/usingreplication.htm
        title: OCI Object Storage replication documentation
  - uid: mondoo-oci-security-object-storage-buckets-replication-enabled-oci
    filters: asset.platform == 'oci'
    mql: |
      oci.objectStorage.buckets.all(replicationEnabled == true)
  - uid: mondoo-oci-security-object-storage-buckets-replication-enabled-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "oci_objectstorage_bucket")
    mql: |
      terraform.resources.where(nameLabel == "oci_objectstorage_bucket").all(name =>
        terraform.resources.where(nameLabel == "oci_objectstorage_replication_policy").any(
          arguments.bucket == name
        )
      )
  - uid: mondoo-oci-security-object-storage-buckets-replication-enabled-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "oci_objectstorage_bucket")
    mql: |
      terraform.plan.resourceChanges.where(type == "oci_objectstorage_bucket").all(name =>
        terraform.plan.resourceChanges.where(type == "oci_objectstorage_replication_policy").any(
          change.after.bucket == name
        )
      )
  - uid: mondoo-oci-security-object-storage-buckets-replication-enabled-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "oci_objectstorage_bucket")
    mql: |
      terraform.state.resources.where(type == "oci_objectstorage_bucket").all(name =>
        terraform.state.resources.where(type == "oci_objectstorage_replication_policy").any(
          values.bucket == name
        )
      )
