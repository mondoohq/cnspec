  - uid: mondoo-oci-security-vcn-no-unrestricted-ssh-ingress
    title: Ensure VCN security lists block SSH ingress from 0.0.0.0/0
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-6
    variants:
      - uid: mondoo-oci-security-vcn-no-unrestricted-ssh-ingress-oci
        tags:
          mondoo.com/filter-title: OCI
          mondoo.com/icon: oci
      - uid: mondoo-oci-security-vcn-no-unrestricted-ssh-ingress-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/icon: terraform
      - uid: mondoo-oci-security-vcn-no-unrestricted-ssh-ingress-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/icon: terraform
      - uid: mondoo-oci-security-vcn-no-unrestricted-ssh-ingress-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/icon: terraform
    docs:
      desc: |
        This check ensures that OCI VCN security lists are configured to block SSH (TCP port 22) ingress from any source (0.0.0.0/0). SSH exposed to the entire internet is one of the most common initial-access vectors for cloud infrastructure attacks, and automated scanners discover open port 22 within minutes of a new instance receiving a public IP.

        **Why this matters**

        - **Brute-force exposure:** An internet-accessible SSH port receives continuous credential-stuffing and password-spray attempts from botnets scanning the entire IPv4 address space.
        - **Vulnerability exploitation:** Unpatched SSH daemons are periodically affected by remote-code-execution CVEs; unrestricted access allows exploitation without any prior credential.
        - **Lateral movement:** A compromised instance reachable via public SSH becomes a pivot point for moving deeper into the VCN and reaching internal resources.
        - **Data exfiltration path:** Attackers who gain SSH access have an encrypted, interactive channel to exfiltrate data that is difficult to distinguish from legitimate management traffic.

        **Risk mitigation**

        - **Restrict SSH to trusted source CIDRs:** Replace the 0.0.0.0/0 source with specific CIDR ranges for your corporate VPN, bastion subnet, or jump-box IP.
        - **Use OCI Bastion service:** Route administrative SSH through the OCI Bastion service so that port 22 never needs to be exposed directly on production instances.
        - **Enforce key-based authentication:** Disable password authentication in the SSH daemon configuration to eliminate brute-force credential attacks even if the port is temporarily accessible.
      audit: |
        ### Audit via Console

        1. Sign in to the OCI Console and navigate to **Networking > Virtual Cloud Networks**.
        2. Select the VCN you want to inspect.
        3. Select **Security Lists** from the left-hand resources menu.
        4. For each security list, select it and review the **Ingress Rules** tab.
        5. Look for any rule where the **Source** is `0.0.0.0/0`, the **Protocol** is TCP, and the **Destination Port Range** includes port 22.

        A passing security list has no ingress rule allowing TCP port 22 from `0.0.0.0/0`. A failing security list has at least one such rule.

        ### Audit via CLI

        1. List all security lists in the VCN:

        ```bash
        oci network security-list list --compartment-id <compartment-ocid> --vcn-id <vcn-ocid> --all --query 'data[*].{id: id, name: "display-name", ingress: "ingress-security-rules"[?source==`0.0.0.0/0` && protocol==`6`]}'
        ```

        2. For any returned security list, inspect whether the ingress rules for `0.0.0.0/0` TCP cover port 22:

        ```bash
        oci network security-list get --security-list-id <security-list-ocid> --query 'data."ingress-security-rules"[?source==`0.0.0.0/0` && protocol==`6`]'
        ```

        A passing security list returns no rules that include port 22 in the destination port range from `0.0.0.0/0`. A failing security list returns one or more rules where the destination port range covers port 22.
      remediation:
        - id: console
          desc: |
            To restrict SSH ingress in a VCN security list using the OCI Console:

            1. Navigate to **Networking > Virtual Cloud Networks**.
            2. Select the VCN.
            3. Select **Security Lists**.
            4. Select the security list with the SSH rule.
            5. Edit the TCP ingress rule for port 22 from 0.0.0.0/0 to use a specific trusted source CIDR block (e.g., your corporate network or bastion subnet).
        - id: cli
          desc: |
            To restrict SSH ingress in a VCN security list using the OCI CLI, update the security list with a rule that restricts the source CIDR:

            ```bash
            oci network security-list update --security-list-id SECURITY_LIST_OCID \
              --ingress-security-rules '[{"source":"10.0.0.0/24","protocol":"6","tcpOptions":{"destinationPortRange":{"min":22,"max":22}},"isStateless":false}]'
            ```
        - id: terraform
          desc: |
            To restrict SSH ingress in a VCN security list in Terraform, specify a trusted source CIDR instead of 0.0.0.0/0:

            ```hcl
            resource "oci_core_security_list" "example" {
              compartment_id = var.compartment_ocid
              vcn_id         = oci_core_vcn.example.id
              display_name   = "example-security-list"

              ingress_security_rules {
                protocol  = "6" # TCP
                source    = "10.0.0.0/24" # Bastion subnet only
                stateless = false

                tcp_options {
                  min = 22
                  max = 22
                }
              }
            }
            ```
    refs:
      - url: https://docs.oracle.com/en-us/iaas/Content/Network/Concepts/securitylists.htm
        title: CIS OCI Foundations Benchmark 2.3
  - uid: mondoo-oci-security-vcn-no-unrestricted-ssh-ingress-oci
    filters: asset.platform == "oci-network-securitylist"
    mql: |
      oci.network.securityList.ingressSecurityRules.where(
        _['source'] == "0.0.0.0/0" && _['protocol'] == "6"
      ).none(
        _['tcpOptions'] == empty || _['tcpOptions']['destinationPortRange']['min'] <= 22 && _['tcpOptions']['destinationPortRange']['max'] >= 22
      )
  - uid: mondoo-oci-security-vcn-no-unrestricted-ssh-ingress-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "oci_core_security_list")
    mql: |
      terraform.resources("oci_core_security_list").all(
        blocks.where(type == "ingress_security_rules" && arguments.source == "0.0.0.0/0" && arguments.protocol == "6").none(
          blocks.where(type == "tcp_options") == empty ||
          blocks.where(type == "tcp_options").any(
            arguments.min == 22 || arguments.max == 22 ||
            arguments.min <= 22 && arguments.max >= 22
          )
        )
      )
  - uid: mondoo-oci-security-vcn-no-unrestricted-ssh-ingress-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "oci_core_security_list")
    mql: |
      terraform.plan.resourceChanges.where(type == "oci_core_security_list").all(
        change.after.ingress_security_rules.where(_['source'] == "0.0.0.0/0" && _['protocol'] == "6").none(
          _['tcp_options'] == empty || _['tcp_options'].any(
            _['destination_port_range'].any(_['min'] <= 22 && _['max'] >= 22)
          )
        )
      )
  - uid: mondoo-oci-security-vcn-no-unrestricted-ssh-ingress-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "oci_core_security_list")
    mql: |
      terraform.state.resources.where(type == "oci_core_security_list").all(
        values.ingress_security_rules.where(_['source'] == "0.0.0.0/0" && _['protocol'] == "6").none(
          _['tcp_options'] == empty || _['tcp_options'].any(
            _['destination_port_range'].any(_['min'] <= 22 && _['max'] >= 22)
          )
        )
      )
