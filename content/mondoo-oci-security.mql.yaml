policies:
  - uid: mondoo-oci-security
    name: Mondoo Oracle Cloud Infrastructure (OCI) Security
    version: 4.0.0
    license: BUSL-1.1
    tags:
      mondoo.com/category: security
      mondoo.com/platform: oci,cloud
    require:
      - provider: oci
      - provider: terraform
    authors:
      - name: Mondoo, Inc.
        email: hello@mondoo.com
    summary: Secure OCI compute, networking, storage, and IAM
    docs:
      desc: |
        The Mondoo Oracle Cloud Infrastructure (OCI) Security policy identifies critical misconfigurations that could leave your OCI tenancy vulnerable to attackers. This policy helps organizations detect and remediate security risks before they can be exploited, reducing the likelihood of unauthorized access, data breaches, privilege escalation, and operational disruptions.

        This policy provides security checks across key OCI services, uncovering misconfigurations that could put critical resources at risk:

        - Identity and Access Management (IAM)
        - Object Storage
        - Virtual Cloud Network (VCN)

        Have suggestions for new checks in this policy? Visit our [cnspec repository](https://github.com/mondoohq/cnspec).
    groups:
      - title: Identity and Access Management
        checks:
          - uid: mondoo-oci-security-iam-mfa-enabled-for-active-users
          - uid: mondoo-oci-security-iam-user-emails-verified
          - uid: mondoo-oci-security-iam-no-overly-permissive-policies
          - uid: mondoo-oci-security-iam-inactive-users-no-active-api-keys
          - uid: mondoo-oci-security-iam-inactive-users-no-active-auth-tokens
          - uid: mondoo-oci-security-iam-stale-active-users
          - uid: mondoo-oci-security-iam-no-broad-compartment-policies
          - uid: mondoo-oci-security-iam-auth-tokens-short-lived
          - uid: mondoo-oci-security-iam-admin-group-membership-limited
          - uid: mondoo-oci-security-iam-no-any-user-policies
          - uid: mondoo-oci-security-iam-no-cross-tenant-policies
      - title: Object Storage
        checks:
