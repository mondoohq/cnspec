        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check flags OCI compute instances whose `metadata` key-value pairs look like they carry credentials. Four patterns are detected:

        1. **Suspicious key names** — cloud credential names (`aws_access_key_id`, `aws_secret_access_key`, `aws_session_token`, `oci_api_key`, `oci_secret`) and generic credential names (`password`, `passwd`, `secret`, `access_key`, `client_secret`, `connection_string`, `api_token`, `bearer_token`, `db_password`, `private_key`). Case-insensitive, exact match only — a key named `my_password_backup` would not match.
        2. **AWS access key IDs in values** — matches the documented AWS access-key-ID prefixes (`AKIA…`, `ASIA…`, etc.).
        3. **PEM private keys in values** — values containing `-----BEGIN` and `PRIVATE KEY-----` markers.
        4. **JWT tokens in values** — three base64url segments separated by dots, starting with `eyJ` (the base64 encoding of `{"`).

        Instance `metadata` is readable by anyone with `compute-instance:read` permission and by every process running on the instance via the IMDS endpoints — it is the OCI analog of AWS's EC2 user-data leak pattern.

        **Why this matters**

        Developers frequently pass credentials via instance metadata to bootstrap applications:

        - Metadata returned by `GetInstance` and the IMDS endpoints persists for the entire life of the instance.
        - Any user with IAM read access to the compartment can retrieve the metadata with a single API call.
        - Every process running on the instance — including any compromised application — can read metadata via `169.254.169.254`.
        - Rotating a credential requires deleting and recreating the instance; short of that the old value stays exposed.

        **Risk mitigation**

        - Eliminates a well-known credential-leak channel.
        - Forces use of Vault secrets or resource principal authentication instead of hardcoded values.
        - Reduces the blast radius of any single-host compromise.
      remediation:
        - id: console
          desc: |
            Remove credentials from instance metadata:

            1. Rotate any credentials that appeared in metadata immediately — assume they are compromised.
            2. Open **Compute** → **Instances** → select the instance → **Metadata**.
            3. Remove the credential key-value pair. If the metadata field cannot be cleared in place, recreate the instance without the offending metadata.
            4. Replace the usage with Vault-backed configuration or a resource principal, neither of which leaves values visible in `GetInstance`.
        - id: cli
          desc: |
            Rotate any exposed credential and remove it from metadata via instance update:

            ```bash
            oci compute instance update --instance-id <instance-ocid> --metadata '{}'
            ```

            (Passing an empty metadata map clears user-supplied keys; existing OCI-managed keys like `ssh_authorized_keys` are preserved.)
        - id: terraform
          desc: |
            Keep the `metadata` map free of credential-named keys and credential-shaped values; fetch secrets at runtime via the resource principal and OCI Vault instead of pinning them into the instance definition:

            ```hcl
            resource "oci_core_instance" "app" {
              compartment_id      = var.compartment_ocid
              availability_domain = var.ad
              shape               = "VM.Standard.E4.Flex"

              metadata = {
                ssh_authorized_keys = file("~/.ssh/id_rsa.pub")
                # Do NOT place credentials here. Read secrets from OCI Vault at boot:
                vault_secret_ocid = oci_vault_secret.db_password.id
              }

              source_details {
                source_type = "image"
                source_id   = var.image_ocid
              }
            }
            ```
    refs:
      - url: https://docs.oracle.com/en-us/iaas/Content/Compute/Tasks/gettingmetadata.htm
        title: OCI - Instance Metadata
      - url: https://docs.oracle.com/en-us/iaas/Content/KeyManagement/Concepts/keyoverview.htm
        title: OCI Vault
  - uid: mondoo-oci-security-compute-metadata-no-secrets-oci
    filters: asset.platform == 'oci'
    mql: |
      oci.compute.instances.all(
        metadata.keys.none(
          _.downcase == /^aws_access_key_id$|^aws_secret_access_key$|^aws_session_token$|^oci_api_key$|^oci_secret$|^api_token$|^bearer_token$|^db_password$|^private_key$|^password$|^passwd$|^secret$|^access_key$|^client_secret$|^connection_string$/
        ) &&
        metadata.values.none(
          _.find(/(A3T[A-Z0-9]|AKIA|AGPA|AIDA|AROA|AIPA|ANPA|ANVA|ASIA)[A-Z0-9]{16}/) != empty ||
          _.contains("-----BEGIN") && _.contains("PRIVATE KEY-----") ||
          _.find(/\beyJ[A-Za-z0-9_\-]{10,}\.[A-Za-z0-9_\-]{10,}\.[A-Za-z0-9_\-]{10,}\b/) != empty
        )
      )
