    mql: |
      terraform.state.resources.where(type == 'oci_core_instance').all(
        values['freeform_tags'] != empty
      )
  # No Terraform variants: auth-token expiry/created timestamps are runtime-only — `oci_identity_auth_token` exposes neither `expires` nor `time_created` as configurable arguments.
  - uid: mondoo-oci-security-iam-auth-tokens-short-lived
    title: Ensure IAM auth tokens have an expiry no more than 90 days after creation
    impact: 75
    filters: asset.platform == "oci-identity-user"
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-5-17
      compliance/nis-2: false
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-5
      compliance/nist-sp-800-171: false
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-9
      compliance/vda-isa-5: vda-isa-5-4-1-3
    mql: |
      oci.identity.user.authTokens.where(state == "ACTIVE").all(
        expires != null && created != null && expires - created <= 90 * time.day
      )
    docs:
      desc: |
        This check verifies that every active OCI auth token has an expiry set and the expiry is no more than 90 days after the token was created. Auth tokens authenticate to Oracle Cloud Infrastructure APIs and non-console services (Container Registry, Autonomous Database SQL Developer, etc.), and long-lived tokens behave as long-lived static credentials.

        **Why this matters**

        Long-lived auth tokens make credential rotation impossible in practice and extend the window in which a leaked token is useful to an attacker:

        - Tokens without expiry persist until an administrator manually revokes them — easily years after they stop being needed.
        - Offboarded employees' tokens stay valid indefinitely if not explicitly deleted.
        - Tokens leaked into Git, CI logs, or third-party services remain usable for the entire remaining lifetime.
        - The older the token, the more places a copy of it may exist, so the blast radius grows over time.

        A bounded 90-day lifetime caps exposure and forces a regular rotation cadence.

        **Risk mitigation**

        - Caps the useful lifetime of any leaked or stolen token.
        - Forces developers to rotate tokens on a predictable cadence.
        - Reduces the window of persistence for offboarded users.
      remediation:
        - id: console
          desc: |
            Revoke and reissue long-lived tokens with an explicit expiry:

            1. Open **Identity & Security** → **Users** → select the user → **Auth Tokens**.
            2. **Delete** any token whose expiry is unset or more than 90 days out.
            3. Generate a replacement with an **expiration date** within 90 days of today.
            4. Distribute the new token to the owning system and verify it works before deletion.
        - id: cli
          desc: |
            Delete long-lived auth tokens via the OCI CLI:

            ```bash
            oci iam auth-token delete --user-id <user-ocid> --auth-token-id <token-ocid>
            ```

            Issue a replacement with an expiry set by the admin-defined tenancy policy:

            ```bash
            oci iam auth-token create --user-id <user-ocid> --description "Rotated <date>"
            ```
    refs:
      - url: https://docs.oracle.com/en-us/iaas/Content/Identity/Tasks/managingcredentials.htm
        title: OCI - Managing User Credentials
  # No Terraform variants: counting members of an admin-named group requires aggregating across all `oci_identity_user_group_membership` resources that reference each group, which has no clean equivalent in HCL/plan/state without cross-resource graph traversal.
  - uid: mondoo-oci-security-iam-admin-group-membership-limited
    title: Ensure IAM groups with admin-style names have a limited number of members
    impact: 75
    filters: asset.platform == 'oci'
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-2
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-5
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-3-3
      compliance/vda-isa-5: vda-isa-5-4-1-1
    mql: |
      oci.identity.groups.where(
        name.downcase == /^admins?$|^administrators?$|^tenancy[-_]?admins?$|^root[-_]?admins?$|^super[-_]?users?$/
      ).all(members.length <= 5)
    docs:
      desc: |
        This check verifies that OCI IAM groups whose names suggest tenancy-wide privileges (matching `admin`, `root`, `tenancy-admin`, or `super-user`) contain no more than five members. OCI's default `Administrators` group, and any custom group that inherits similar privilege, should be kept small to contain the impact of a single compromised account.

        **Why this matters**

        Every member of a tenancy-admin-tier group can attach policies, create keys, and access every resource in the tenancy:

        - A phishing or credential-theft attack against any admin member results in full tenancy compromise.
        - Large admin groups accumulate former-employee memberships that are never cleaned up.
        - Privilege creep: granting admin access "temporarily" rarely gets revoked.
        - Audit trails that rely on attribution to a specific admin become hard to interpret when many admins share the privilege.

        Holding the admin population to five or fewer active members keeps the exposure surface small and enforces a deliberate approval step for new admin additions.

        **Risk mitigation**

        - Limits the blast radius of any single compromised admin credential.
        - Forces periodic review of who still needs tenancy-wide access.
        - Aligns group membership with the principle of least privilege.
      remediation:
        - id: console
          desc: |
            Trim the admin group to the minimum set of required members:

            1. Open **Identity & Security** → **Groups** → select the flagged group.
            2. Review each member against a documented list of personnel who require admin access.
            3. **Remove user from group** for every member who no longer needs the privilege.
            4. For users who only need occasional admin access, move them to a break-glass workflow (separate account activated only when needed).
        - id: cli
          desc: |
            Remove a user from an over-populated admin group:

            ```bash
            oci iam group remove-user --user-id <user-ocid> --group-id <group-ocid>
            ```
    refs:
      - url: https://docs.oracle.com/en-us/iaas/Content/Identity/Tasks/managinggroups.htm
        title: OCI - Managing Groups
  - uid: mondoo-oci-security-nsg-no-unrestricted-admin-ports
    title: Ensure NSGs do not permit SSH or RDP ingress from 0.0.0.0/0
    impact: 90
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: false
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-6
    variants:
      - uid: mondoo-oci-security-nsg-no-unrestricted-admin-ports-oci
        tags:
          mondoo.com/filter-title: OCI
          mondoo.com/filter-icon: oci
      - uid: mondoo-oci-security-nsg-no-unrestricted-admin-ports-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-oci-security-nsg-no-unrestricted-admin-ports-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-oci-security-nsg-no-unrestricted-admin-ports-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check extends the existing VCN security-list SSH/RDP ingress checks to Network Security Groups (NSGs), and covers both IPv4 (`0.0.0.0/0`) and IPv6 (`::/0`) unrestricted sources. NSGs apply to individual VNICs and are the modern replacement for subnet-level security lists — misconfigured NSGs can expose instances to SSH (TCP 22) or RDP (TCP 3389) from the internet even when the subnet's security lists are locked down.

        **Why this matters**

        SSH and RDP exposed to `0.0.0.0/0` are the two most-targeted cloud attack surfaces:

        - Automated internet-wide scans find exposed SSH/RDP within minutes of a new VNIC getting a public IP.
        - Password spray, credential stuffing, and brute-force attacks are trivial to run at scale against internet-exposed admin ports.
        - Unpatched SSH/RDP servers regularly have RCE-class CVEs exploited in the wild.
        - NSGs are attached per-VNIC, so an over-permissive NSG on a single instance bypasses otherwise-strict subnet controls.

        **Risk mitigation**

        - Closes the most common cloud-to-VM attack surface.
        - Forces admin access through bastion hosts, Session Manager, or VPN tunnels.
        - Aligns NSG posture with the existing security-list ingress checks.
      remediation:
        - id: console
          desc: |
            Tighten NSG rules to remove internet-wide admin access:

            1. Open **Networking** → **Network Security Groups** → select the flagged NSG.
            2. Under **Security Rules**, select the over-permissive ingress rule (source `0.0.0.0/0`, protocol TCP, destination port 22 or 3389).
            3. Either delete it or restrict the source to specific bastion / VPN CIDR ranges.
            4. For administrative access, route through OCI Bastion or an approved VPN instead of opening SSH/RDP to the world.
        - id: cli
          desc: |
            Remove an over-permissive ingress rule from an NSG:

            ```bash
            oci network nsg rules remove \
              --nsg-id <nsg-ocid> \
              --security-rule-ids '["<rule-id>"]'
            ```
        - id: terraform
          desc: |
            Define NSG ingress rules with `tcp_options.destination_port_range` blocks that exclude SSH (22) and RDP (3389), or restrict the source to a trusted CIDR rather than `0.0.0.0/0` / `::/0`:

            ```hcl
            resource "oci_core_network_security_group_security_rule" "https_in" {
              network_security_group_id = oci_core_network_security_group.app.id
              direction                 = "INGRESS"
              protocol                  = "6"
              source                    = "0.0.0.0/0"
              source_type               = "CIDR_BLOCK"

              tcp_options {
                destination_port_range {
                  min = 443
                  max = 443
                }
              }
            }

            resource "oci_core_network_security_group_security_rule" "ssh_from_bastion" {
              network_security_group_id = oci_core_network_security_group.app.id
              direction                 = "INGRESS"
              protocol                  = "6"
              source                    = "10.0.0.0/16"
              source_type               = "CIDR_BLOCK"

              tcp_options {
                destination_port_range {
                  min = 22
                  max = 22
                }
              }
            }
            ```
    refs:
      - url: https://docs.oracle.com/en-us/iaas/Content/Network/Concepts/networksecuritygroups.htm
        title: OCI - Network Security Groups
      - url: https://docs.oracle.com/en-us/iaas/Content/Bastion/Concepts/bastionoverview.htm
        title: OCI Bastion Service
  - uid: mondoo-oci-security-nsg-no-unrestricted-admin-ports-oci
    filters: asset.platform == 'oci'
    mql: |
      oci.network.networkSecurityGroups.all(
        ingressSecurityRules.where(
          _['source'] == "0.0.0.0/0" || _['source'] == "::/0"
        ).where(_['protocol'] == "6").none(_['tcpOptions'] == empty)
        &&
        ingressSecurityRules.where(
          _['source'] == "0.0.0.0/0" || _['source'] == "::/0"
        ).where(_['protocol'] == "6" && _['tcpOptions'] != empty).none(
          _['tcpOptions']['destinationPortRange']['min'] <= 22 && _['tcpOptions']['destinationPortRange']['max'] >= 22
        )
        &&
        ingressSecurityRules.where(
          _['source'] == "0.0.0.0/0" || _['source'] == "::/0"
        ).where(_['protocol'] == "6" && _['tcpOptions'] != empty).none(
          _['tcpOptions']['destinationPortRange']['min'] <= 3389 && _['tcpOptions']['destinationPortRange']['max'] >= 3389
        )
      )
  - uid: mondoo-oci-security-nsg-no-unrestricted-admin-ports-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'oci_core_network_security_group_security_rule')
    mql: |
      # An ingress rule from 0.0.0.0/0 or ::/0 over TCP must declare a tcp_options block with a destination_port_range that excludes both 22 and 3389 (range entirely below 22, between 22 and 3389 exclusive, or above 3389).
      terraform.resources('oci_core_network_security_group_security_rule')
        .where(arguments['direction'] == 'INGRESS')
        .where(arguments['protocol'] == '6')
        .where(arguments['source'] == '0.0.0.0/0' || arguments['source'] == '::/0')
        .all(
          blocks.where(type == 'tcp_options') != empty &&
          blocks.where(type == 'tcp_options').all(
            blocks.where(type == 'destination_port_range') != empty &&
            blocks.where(type == 'destination_port_range').all(
              arguments['max'] < 22 ||
              arguments['min'] > 22 && arguments['max'] < 3389 ||
              arguments['min'] > 3389
            )
          )
        )
  - uid: mondoo-oci-security-nsg-no-unrestricted-admin-ports-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'oci_core_network_security_group_security_rule')
    mql: |
      terraform.plan.resourceChanges
        .where(type == 'oci_core_network_security_group_security_rule')
        .where(change.after['direction'] == 'INGRESS')
        .where(change.after['protocol'] == '6')
        .where(change.after['source'] == '0.0.0.0/0' || change.after['source'] == '::/0')
        .all(
          change.after['tcp_options'] != null && change.after['tcp_options'].length > 0 &&
          change.after['tcp_options'].all(
            _['destination_port_range'] != null && _['destination_port_range'].length > 0 &&
            _['destination_port_range'].all(
              _['max'] < 22 ||
              _['min'] > 22 && _['max'] < 3389 ||
              _['min'] > 3389
            )
          )
        )
  - uid: mondoo-oci-security-nsg-no-unrestricted-admin-ports-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'oci_core_network_security_group_security_rule')
    mql: |
      terraform.state.resources
        .where(type == 'oci_core_network_security_group_security_rule')
        .where(values['direction'] == 'INGRESS')
        .where(values['protocol'] == '6')
        .where(values['source'] == '0.0.0.0/0' || values['source'] == '::/0')
        .all(
          values['tcp_options'] != null && values['tcp_options'].length > 0 &&
          values['tcp_options'].all(
            _['destination_port_range'] != null && _['destination_port_range'].length > 0 &&
            _['destination_port_range'].all(
              _['max'] < 22 ||
              _['min'] > 22 && _['max'] < 3389 ||
              _['min'] > 3389
            )
          )
        )
  - uid: mondoo-oci-security-public-vnic-has-nsg
    title: Ensure compute VNICs with a public IP have at least one NSG attached
    impact: 80
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: false
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-6
    variants:
      - uid: mondoo-oci-security-public-vnic-has-nsg-oci
        tags:
          mondoo.com/filter-title: OCI
          mondoo.com/filter-icon: oci
      - uid: mondoo-oci-security-public-vnic-has-nsg-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-oci-security-public-vnic-has-nsg-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-oci-security-public-vnic-has-nsg-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check verifies that every compute VNIC with a public IP has at least one Network Security Group attached. A VNIC that is reachable from the internet with no NSG relies entirely on the subnet's security lists for ingress filtering — which, on OCI, default to very permissive rules and are often inherited from shared subnets.

        **Why this matters**

        A public-IP VNIC with zero NSGs provides no VNIC-level ingress control:

        - Every port reachable through the subnet security list is reachable from the internet.
        - Security teams typically treat NSG membership as the primary per-host allowlist; absence of an NSG means there is no per-host filter at all.
        - A shared subnet with relaxed rules (common for "DMZ" networks) means every public VNIC on that subnet is exposed.
        - The failure is silent — an operator who forgets to attach an NSG produces an internet-exposed host that passes most "VCN security list" checks.

        **Risk mitigation**

        - Guarantees a per-VNIC ingress filter exists for every public-facing host.
        - Forces explicit review of which public services each host is allowed to expose.
        - Reduces reliance on broad subnet-level security lists.
      remediation:
        - id: console
          desc: |
            Attach an NSG to the flagged VNIC:

            1. Open **Compute** → **Instances** → select the instance → **Attached VNICs** → select the VNIC.
            2. **Edit VNIC** → **Network Security Groups** → **Add Network Security Group**.
            3. Pick an NSG whose ingress rules match the services the host should expose.
            4. Save. If no appropriate NSG exists, create one first scoped to the workload.
        - id: cli
          desc: |
            Attach an NSG to a VNIC:

            ```bash
            oci network vnic update --vnic-id <vnic-ocid> --nsg-ids '["<nsg-ocid>"]'
            ```
        - id: terraform
          desc: |
            Whenever the instance assigns a public IP, populate `nsg_ids` on the `create_vnic_details` block:

            ```hcl
            resource "oci_core_instance" "web" {
              compartment_id      = var.compartment_ocid
              availability_domain = var.ad
              shape               = "VM.Standard.E4.Flex"

              create_vnic_details {
                subnet_id        = oci_core_subnet.public.id
                assign_public_ip = true
                nsg_ids          = [oci_core_network_security_group.web.id]
              }

              source_details {
                source_type = "image"
                source_id   = var.image_ocid
              }
            }
            ```
    refs:
      - url: https://docs.oracle.com/en-us/iaas/Content/Network/Concepts/networksecuritygroups.htm
        title: OCI - Network Security Groups
  - uid: mondoo-oci-security-public-vnic-has-nsg-oci
    filters: asset.platform == 'oci'
    mql: |
      oci.compute.instances.all(
        vnics.where(publicIp != "" && publicIp != null).all(
          nsgIds.length > 0
        )
      )
  - uid: mondoo-oci-security-public-vnic-has-nsg-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'oci_core_instance')
    mql: |
      # When create_vnic_details has assign_public_ip = true (or omits it — default is true on a public subnet), nsg_ids must be a non-empty list.
      terraform.resources('oci_core_instance').all(
        blocks.where(type == 'create_vnic_details').all(
          arguments['assign_public_ip'] == false ||
          arguments['nsg_ids'] != null && arguments['nsg_ids'].length > 0
        )
      )
  - uid: mondoo-oci-security-public-vnic-has-nsg-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'oci_core_instance')
    mql: |
      terraform.plan.resourceChanges.where(type == 'oci_core_instance').all(
        change.after['create_vnic_details'] == null ||
        change.after['create_vnic_details'].all(
          _['assign_public_ip'] == false ||
          _['nsg_ids'] != null && _['nsg_ids'].length > 0
        )
      )
  - uid: mondoo-oci-security-public-vnic-has-nsg-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'oci_core_instance')
    mql: |
      terraform.state.resources.where(type == 'oci_core_instance').all(
        values['create_vnic_details'] == null ||
        values['create_vnic_details'].all(
          _['assign_public_ip'] == false ||
          _['nsg_ids'] != null && _['nsg_ids'].length > 0
        )
      )
  - uid: mondoo-oci-security-compute-imds-v2-only
    title: Ensure compute instances have the legacy IMDSv1 endpoints disabled
    impact: 85
    tags:
      compliance/bsi-grundschutz-sys15: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-2
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-5
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-3-3
      compliance/vda-isa-5: vda-isa-5-4-1-1
    variants:
      - uid: mondoo-oci-security-compute-imds-v2-only-oci
        tags:
          mondoo.com/filter-title: OCI
          mondoo.com/filter-icon: oci
      - uid: mondoo-oci-security-compute-imds-v2-only-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-oci-security-compute-imds-v2-only-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-oci-security-compute-imds-v2-only-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check verifies that every OCI compute instance has the legacy Instance Metadata Service v1 (IMDSv1) endpoints disabled in its `instanceOptions`. IMDSv1 does not require the caller to prove it can receive a response, so any server-side-request-forgery (SSRF) bug in an application running on the instance can be used to read the instance principal token and any other metadata directly.

        **Why this matters**

        IMDSv1 is the exact same class of vulnerability that led to the Capital One / AWS IMDS breach:

        - Any HTTP client running on the instance — including a vulnerable web app or a poisoned library — can fetch instance principal tokens via `169.254.169.254` without authentication.
        - Server-side request forgery (SSRF) in the instance's applications becomes a credential-theft primitive.
        - Legacy endpoints return values even when requests originate from application containers running inside the instance, multiplying the affected surface.
        - IMDSv2 requires a session token obtained via PUT, which most SSRF payloads cannot produce.

        Disabling IMDSv1 does not break legitimate workloads that use the OCI SDK, which uses IMDSv2 by default.

        **Risk mitigation**

        - Neutralizes SSRF-to-credential-theft attack chains on compute instances.
        - Forces the instance metadata client path through the authenticated v2 API.
        - Closes the most impactful cloud-pivot primitive that an attacker in a compromised instance process has.
      remediation:
        - id: console
          desc: |
            Disable legacy IMDS endpoints on the instance:

            1. Open **Compute** → **Instances** → select the instance.
            2. **More Actions** → **Edit** → expand **Show advanced options** → **Security**.
            3. Set **Legacy MetaData service endpoint** to **Disabled**.
            4. Save. The setting applies without rebooting, but reboot is required for any running application using IMDSv1 to re-initialize via IMDSv2.
        - id: cli
          desc: |
            Disable legacy IMDS endpoints via the OCI CLI:

            ```bash
            oci compute instance update \
              --instance-id <instance-ocid> \
              --instance-options '{"areLegacyImdsEndpointsDisabled": true}'
            ```
        - id: terraform
          desc: |
            Declare an `instance_options` block on every `oci_core_instance` and set `are_legacy_imds_endpoints_disabled = true`:

            ```hcl
            resource "oci_core_instance" "app" {
              compartment_id      = var.compartment_ocid
              availability_domain = var.ad
              shape               = "VM.Standard.E4.Flex"

              instance_options {
                are_legacy_imds_endpoints_disabled = true
              }

              source_details {
                source_type = "image"
                source_id   = var.image_ocid
              }
            }
            ```
    refs:
      - url: https://docs.oracle.com/en-us/iaas/Content/Compute/Tasks/gettingmetadata.htm
        title: OCI - Getting Instance Metadata (IMDS v1 and v2)
  - uid: mondoo-oci-security-compute-imds-v2-only-oci
    filters: asset.platform == 'oci'
    mql: |
      oci.compute.instances.all(
        instanceOptions['areLegacyImdsEndpointsDisabled'] == true
      )
  - uid: mondoo-oci-security-compute-imds-v2-only-terraform-hcl
    filters: |
      asset.platform == 'terraform-hcl' && terraform.resources.contains(nameLabel == 'oci_core_instance')
    mql: |
      # Require an instance_options block declaring are_legacy_imds_endpoints_disabled = true. Without the existence guard, instances that omit instance_options would silently pass.
      terraform.resources('oci_core_instance').all(
        blocks.where(type == 'instance_options') != empty &&
        blocks.where(type == 'instance_options').all(
          arguments['are_legacy_imds_endpoints_disabled'] == true
        )
      )
  - uid: mondoo-oci-security-compute-imds-v2-only-terraform-plan
    filters: |
      asset.platform == 'terraform-plan' && terraform.plan.resourceChanges.contains(type == 'oci_core_instance')
    mql: |
      terraform.plan.resourceChanges.where(type == 'oci_core_instance').all(
        change.after['instance_options'] != null && change.after['instance_options'].length > 0 &&
        change.after['instance_options'].all(
          _['are_legacy_imds_endpoints_disabled'] == true
        )
      )
  - uid: mondoo-oci-security-compute-imds-v2-only-terraform-state
    filters: |
      asset.platform == 'terraform-state' && terraform.state.resources.contains(type == 'oci_core_instance')
    mql: |
      terraform.state.resources.where(type == 'oci_core_instance').all(
        values['instance_options'] != null && values['instance_options'].length > 0 &&
        values['instance_options'].all(
          _['are_legacy_imds_endpoints_disabled'] == true
        )
