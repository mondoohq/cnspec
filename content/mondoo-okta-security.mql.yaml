policies:
  - uid: mondoo-okta-security
    name: Mondoo Okta Organization Security
    version: 2.3.5
    license: BUSL-1.1
    tags:
      mondoo.com/category: security
      mondoo.com/platform: okta-org,saas
    require:
      - provider: okta
    authors:
      - name: Mondoo, Inc.
        email: hello@mondoo.com
    summary: Secure Okta MFA, policies, and identity configurations
    docs:
      desc: |
        The Mondoo Okta Organization Security policy identifies critical misconfigurations in Okta organizations that could enable unauthorized access, account takeover, and identity-based attacks. As the central identity provider for many organizations, Okta misconfigurations have outsized blast radius, since a single weakness can expose every connected application and downstream service to compromise.

        This policy provides security checks across key Okta areas, with support for both live Okta organizations and infrastructure managed with the [Okta Terraform provider](https://registry.terraform.io/providers/okta/okta/latest/docs):

        - Multi-factor authentication policies and factor strength
        - Password policies and lifecycle controls
        - Session management and timeout settings
        - API token security and rate limiting
        - Administrative access and role management
        - Application sign-on and authentication policies
        - Threat insight and behavior detection

        Learn more about scanning Okta in the [cnspec Okta documentation](https://mondoo.com/docs/cnspec/identity/okta).

        Have suggestions for new checks in this policy? Visit our [cnspec repository](https://github.com/mondoohq/cnspec).
    groups:
      - title: Access Control & Administration
        checks:
          - uid: mondoo-okta-security-limit-super-admins
          - uid: mondoo-okta-security-limit-org-admins
      - title: Threat Detection & Security Monitoring
        checks:
          - uid: mondoo-okta-security-threatinsight-block-suspicious-ip-addresses
          - uid: mondoo-okta-security-threatinsight-action-block
          - uid: mondoo-okta-security-enable-suspicious-activity-reporting
      - title: Multi-Factor Authentication (MFA)
        checks:
          - uid: mondoo-okta-security-okta-mfa-access
          - uid: mondoo-okta-security-disable-weaker-mfa-factors-in-factor-enrollment-policies
          - uid: mondoo-okta-security-enable-okta-verify-with-push-for-mfa
          - uid: mondoo-okta-security-signon-requires-mfa
      - title: Session Management
        checks:
          - uid: mondoo-okta-security-okta-enforce-session-lifetime
      - title: Application Authentication
        checks:
          - uid: mondoo-okta-security-okta-auth-openid-saml
      - title: Trusted Origins
        checks:
          - uid: mondoo-okta-security-trusted-origins-https
      - title: User Notifications
        checks:
          - uid: mondoo-okta-security-sign-on-notifications-for-end-users
          - uid: mondoo-okta-security-factor-enrollment-notifications
          - uid: mondoo-okta-security-factor-reset-notifications-for-end-users
          - uid: mondoo-okta-security-password-changed-notifications-for-end-users
      - title: Password Policies
        checks:
          - uid: mondoo-okta-security-password-settings-minimum-length
          - uid: mondoo-okta-security-password-settings-min-lowercase
          - uid: mondoo-okta-security-password-settings-min-number
          - uid: mondoo-okta-security-password-settings-min-symbols
          - uid: mondoo-okta-security-password-settings-min-age
          - uid: mondoo-okta-security-password-settings-exclude-username
          - uid: mondoo-okta-security-password-settings-exclude-first-name
          - uid: mondoo-okta-security-password-settings-exclude-last-name
          - uid: mondoo-okta-security-password-settings-dictionary-lookup
          - uid: mondoo-okta-security-password-settings-max-age
          - uid: mondoo-okta-security-password-settings-expire-warning
          - uid: mondoo-okta-security-password-settings-history-count
          - uid: mondoo-okta-security-password-settings-max-lockout-attempts
          - uid: mondoo-okta-security-password-settings-password-auto-unlock-minutes
          - uid: mondoo-okta-security-password-settings-password-show-lockout-failures
          - uid: mondoo-okta-security-password-settings-password-email-recovery
          - uid: mondoo-okta-security-password-settings-password-sms-recovery
          - uid: mondoo-okta-security-password-settings-password-question-recovery
    scoring_system: highest impact
queries:
  # No Terraform variants: counts SUPER_ADMIN role assignments across the org.
  # Per-user `okta_user_admin_roles` HCL would only see TF-managed grants and
  # miss assignments made via the API or Admin Console — the runtime check
  # against the live tenant is the source of truth.
  # No Terraform remediation: same reason — guidance limited to TF-managed
  # users would be misleading.
  - uid: mondoo-okta-security-limit-super-admins
    title: Limit the number of super admins
    impact: 100
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-10
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-2
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-3-1
      compliance/vda-isa-5: vda-isa-5-4-2-1
    props:
      - uid: mondooOktaSecurityMaxOktaSuperAdmins
        title: Maximum number of Okta Super Admins
        mql: return 15
    variants:
      - uid: mondoo-okta-security-limit-super-admins-api
        tags:
          mondoo.com/filter-title: Okta Organization
          mondoo.com/filter-icon: okta
    docs:
      desc: |
        This check ensures that the number of super admins in your Okta org is kept to the minimum required for operations. The super admin role holds the highest permissions of any admin role, so a large pool of super admins greatly widens the blast radius of a compromised account.

        **Why this matters**

        - **Least privilege:** Restricting super admin assignments keeps broad control of the org in the hands of only those who genuinely need it.
        - **Reduced attack surface:** Fewer super admin accounts means fewer high-value targets for attackers to phish or take over.
        - **Clear accountability:** A small, well-defined set of super admins makes it easier to audit who can change critical org settings.
        - **Containment:** Most administrative tasks can be performed with scoped roles, leaving super admin access reserved for exceptional needs.

        **Risk mitigation**

        - **Limit super admin assignments:** Grant super admin only to users who require it, and assign all other admins the narrowest role their job demands.
        - **Review regularly:** Run a recurring assessment of all admin privileges so unneeded super admin grants are revoked promptly.
      audit: |
        ### Audit via Admin Console

        1. In the Admin Console, go to **Security > Administrators**.
        2. Under **Admin Roles**, apply the **Super** filter to display only super administrators.
        3. Count the users shown and compare against your organization's approved limit.

        A passing result shows a small number of super administrators within the approved threshold; a failing result shows more super admins than allowed or super admins who no longer need that level of access.

        ### Audit via API

        Query the Okta API and inspect the result:

        ```bash
        curl -s -H "Authorization: SSWS $OKTA_API_TOKEN" \
          "https://$OKTA_ORG.okta.com/api/v1/users"
        ```

        For each returned user, fetch their assigned roles with `GET /api/v1/users/{id}/roles` and count entries where `type` is `SUPER_ADMIN`. A passing response keeps that count within the approved limit; a failing response returns more `SUPER_ADMIN` assignments than permitted.
      remediation:
        - id: console
          desc: |
            ### Reduce the number of super administrators

            Super admin access in Okta can be granted to individual users and to groups. This check evaluates groups that hold the super admin role, so pay particular attention to group-based assignments. Keeping the super admin pool small limits the blast radius if one of those high-value accounts is phished or taken over.

            Before you remove any super admin grant, confirm that at least one other verified super admin retains working access, and confirm your own continued access before revoking your own grant. Removing the last super admin, or revoking your own without a tested alternative, can leave the org without full administrative control.

            1. In the Admin Console, open the administrators area. In the current Admin Console the exact navigation label varies, so look for the administrators or admin-roles section under Security.
            2. Filter the admin list by the super administrator role to see every user and group that grants super admin access.
            3. For each group that grants super admin, open the group and review who holds it. Note that removing a member from the group is not the same as removing the group's admin-role assignment: as long as the group still carries the super admin role, remaining and future members inherit it. To stop a group from granting super admin entirely, remove the admin-role assignment from the group rather than emptying its membership.
            4. For users who still need administrative rights, assign a narrower standard role scoped to their job instead of super admin. Confirm the exact role names available in your org, since admin-role labels have changed across Okta releases.
            5. Review super admin assignments on a recurring schedule so unneeded grants are revoked promptly.
    refs:
      - url: https://help.okta.com/en-us/Content/Topics/Security/healthinsight/healthinsight-security-task-recomendations.htm
        title: HealthInsight tasks and recommendations
      - url: https://help.okta.com/en-us/Content/Topics/Security/network/network-zones.htm
        title: Network Zones
      - url: https://help.okta.com/en-us/Content/Topics/Security/threat-insight/configure-threatinsight.htm
        title: Configure Okta ThreatInsight
      - url: https://help.okta.com/en-us/Content/Topics/Security/Administrators.htm
        title: Administrators
      - url: https://help.okta.com/en-us/Content/Topics/Security/administrators-super-admin.htm
        title: Super Administrators
  - uid: mondoo-okta-security-limit-super-admins-api
    filters: asset.platform == "okta-org"
    mql: okta.groups.where(roles.one(type =="SUPER_ADMIN")).all(members.length < props.mondooOktaSecurityMaxOktaSuperAdmins )
  - uid: mondoo-okta-security-threatinsight-block-suspicious-ip-addresses
    title: Enable Okta ThreatInsight to block suspicious IP addresses
    impact: 100
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-09
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-6
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-4-1-2
    variants:
      - uid: mondoo-okta-security-threatinsight-block-suspicious-ip-addresses-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-okta-security-threatinsight-block-suspicious-ip-addresses-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-okta-security-threatinsight-block-suspicious-ip-addresses-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
      - uid: mondoo-okta-security-threatinsight-block-suspicious-ip-addresses-api
        tags:
          mondoo.com/filter-title: Okta Organization
          mondoo.com/filter-icon: okta
    docs:
      desc: |
        This check ensures that your Okta org has at least one network zone configured as a blocklist with defined IP gateways. Okta evaluates blocklisted addresses before any policy runs, so requests from those addresses are rejected before they reach an authentication flow.

        **Why this matters**

        - **Early enforcement:** Blocklisted IP addresses are denied before policy evaluation, stopping malicious traffic at the edge of your org.
        - **Reduced exposure:** Known untrusted networks, locations, and proxy servers lose the ability to reach any of your org's URLs.
        - **Defense in depth:** Network blocklisting complements MFA and sign-on policies by removing hostile sources from the picture entirely.

        **Risk mitigation**

        - **Maintain a blocklist zone:** Configure a network zone with `usage` set to blocklist and populate it with known malicious IP ranges.
        - **Block anonymizing infrastructure:** Add Tor anonymizer proxies and other untrusted locations so attackers cannot hide their origin.
      audit: |
        ### Audit via Admin Console

        1. In the Admin Console, go to **Security > Networks**.
        2. Review the list of network zones and identify any zone whose usage is set to block access.
        3. Open each blocklist zone and confirm it contains defined IP gateways or dynamic conditions.

        A passing result shows at least one active blocklist zone with populated gateways; a failing result shows no blocklist zone or a blocklist zone with no gateways defined.

        ### Audit via API

        Query the Okta API and inspect the result:

        ```bash
        curl -s -H "Authorization: SSWS $OKTA_API_TOKEN" \
          "https://$OKTA_ORG.okta.com/api/v1/zones"
        ```

        Network zones are returned by `GET /api/v1/zones`. A passing response includes at least one zone with `usage` set to `BLOCKLIST` and a non-empty `gateways` array; a failing response has no blocklist zone or a blocklist zone with no gateways.
      remediation:
        - id: terraform
          desc: |
            ```hcl
            resource "okta_network_zone" "example_blocklist" {
              name     = "myBlockList"
              type     = "IP"
              usage    = "BLOCKLIST"
              gateways = ["1.2.3.4/24", "2.3.4.5-2.3.4.15"]
            }
            ```

            Proxy entries describe trusted forwarding for policy zones and are not accepted on blocklist zones, so omit the proxies argument.
        - id: console
          desc: |
            ### Add blocked IP addresses to a blocklist network zone

            This control configures a manually maintained network-zone blocklist: a list of IP addresses and ranges you explicitly choose to deny. It is distinct from Okta ThreatInsight, which automatically scores and acts on IP addresses based on Okta's threat reputation data. The two features are complementary and configured in different places, so enabling ThreatInsight does not populate a blocklist zone, and a blocklist zone does not replace ThreatInsight.

            1. In the Admin Console, go to **Security > Networks**.
            2. Open the default **BlockedIpZone**, or select **Add Zone > IP Zone** to create a dedicated blocklist zone.
            3. In the **Gateway IPs** field, enter the IP addresses, CIDR ranges, or IP ranges to block.
            4. Confirm the zone is set to block access from IPs matching the conditions listed in the zone.
            5. Select **Save**.

            Dynamic zones that block locations or Tor anonymizer proxies add useful defense in depth, but at least one blocklist zone must contain explicit gateway IP entries to satisfy this control.
    refs:
      - url: https://help.okta.com/en-us/content/topics/security/threat-insight/ti-index.htm
        title: Okta ThreatInsight
      - url: https://help.okta.com/en-us/content/topics/security/security-home.htm
        title: Okta Security Administration
  - uid: mondoo-okta-security-threatinsight-block-suspicious-ip-addresses-api
    filters: asset.platform == "okta-org"
    mql: |
      okta.networks.any( usage == "BLOCKLIST" && gateways.length > 0 )
  - uid: mondoo-okta-security-threatinsight-block-suspicious-ip-addresses-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.providers.any( nameLabel == "okta" )
    mql: |
      terraform.resources("okta_network_zone").one( arguments['usage'] == "BLOCKLIST" )
      terraform.resources("okta_network_zone").where(arguments['usage'] == "BLOCKLIST" ).all( arguments['gateways'].length > 0 )
  - uid: mondoo-okta-security-threatinsight-block-suspicious-ip-addresses-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains( providerName == /okta/ )
    mql: |
      terraform.plan.resourceChanges.where( type == "okta_network_zone" ).one( change.after['usage'] == "BLOCKLIST" )
      terraform.plan.resourceChanges.where( type == "okta_network_zone" && change.after['usage'] == "BLOCKLIST" ).all( change.after['gateways'].length > 0 )
  - uid: mondoo-okta-security-threatinsight-block-suspicious-ip-addresses-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains( type == /okta_network_zone/ )
    mql: |
      terraform.state.resources.where( type == 'okta_network_zone' ).contains( values['usage'] == "BLOCKLIST" )
      terraform.state.resources.where( type == 'okta_network_zone' ).contains( values['usage'] == "BLOCKLIST" && values['gateways'].length > 0 )
  - uid: mondoo-okta-security-disable-weaker-mfa-factors-in-factor-enrollment-policies
    title: Disable weaker MFA factors in factor enrollment policies
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-14
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-j
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-3
      compliance/pci-dss-4: pcidss-requirement-8-5-1
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-2
    variants:
      - uid: mondoo-okta-security-disable-weaker-mfa-factors-in-factor-enrollment-policies-api
        tags:
          mondoo.com/filter-title: Okta Organization
          mondoo.com/filter-icon: okta
      - uid: mondoo-okta-security-disable-weaker-mfa-factors-in-factor-enrollment-policies-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-okta-security-disable-weaker-mfa-factors-in-factor-enrollment-policies-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-okta-security-disable-weaker-mfa-factors-in-factor-enrollment-policies-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that weaker authentication factors such as email, SMS, and voice are not available for self-enrollment in factor enrollment policies. These factors are vulnerable to phishing and adversary-in-the-middle attacks, so stronger factors should be used instead.

        **Why this matters**

        - **Phishing resistance:** Removing email, SMS, and voice factors steers users toward factors that resist credential interception.
        - **Stronger assurance:** Push-based and hardware-backed factors provide far higher confidence in a user's identity than one-time codes sent over insecure channels.
        - **Consistent posture:** Disabling weak factors org-wide prevents users from quietly choosing a weaker option during enrollment.

        **Risk mitigation**

        - **Disable weak factors:** Set email, SMS, and phone factors so they cannot be self-enrolled in any factor enrollment policy.
        - **Promote strong factors:** Enable Okta Verify with push, Google Authenticator, and WebAuthn as the primary enrollment options.
      audit: |
        ### Audit via Admin Console

        1. In the Admin Console, go to **Security > Multifactor**.
        2. Select **Factor Enrollment** and open each policy.
        3. Confirm that email, SMS, and voice or phone factors are set to disabled rather than optional or required.

        A passing result shows weak factors disabled in every factor enrollment policy; a failing result shows email, SMS, or phone factors set to optional or required.

        ### Audit via API

        Query the Okta API and inspect the result:

        ```bash
        curl -s -H "Authorization: SSWS $OKTA_API_TOKEN" \
          "https://$OKTA_ORG.okta.com/api/v1/policies?type=MFA_ENROLL"
        ```

        For each policy, inspect `settings.factors`. A passing response shows the `okta_email`, `okta_sms`, and `phone_number` factors with self-enrollment neither optional nor required; a failing response shows any of those factors available for self-enrollment.
      remediation:
        - id: console
          desc: |
            ### Disable weak factors in factor enrollment policies

            1. On Okta Identity Engine orgs, go to **Security > Authenticators** and select the **Enrollment** tab. On Okta Classic Engine orgs, go to **Security > Multifactor** and select **Factor Enrollment**.
            2. For each enrollment policy, select **Edit**.
            3. Set the **Email**, **SMS**, and **Phone** or **Voice Call** factors to **Disabled** so users cannot self-enroll them.
            4. Keep stronger factors such as Okta Verify and WebAuthn set to **Required** or **Optional**.
            5. Select **Update Policy**.
        - id: terraform
          desc: |
            For orgs on Okta Identity Engine:

            ```hcl
            resource "okta_policy_mfa_default" "oie_example" {
              is_oie = true

              okta_password = {
                enroll = "REQUIRED"
              }

              okta_verify = {
                enroll = "REQUIRED"
              }

              okta_email = {
                enroll = "NOT_ALLOWED"
              }

              phone_number = {
                enroll = "NOT_ALLOWED"
              }
            }
            ```

            For orgs on Okta Classic Engine:

            ```hcl
            resource "okta_policy_mfa_default" "classic_example" {
              is_oie = false

              okta_otp = {
                enroll = "REQUIRED"
              }

              okta_email = {
                enroll = "NOT_ALLOWED"
              }

              okta_sms = {
                enroll = "NOT_ALLOWED"
              }
            }
            ```
    refs:
      - url: https://help.okta.com/en-us/Content/Topics/Security/healthinsight/strong-factors.htm
        title: Disable weaker MFA factors in factor enrollment policies
      - url: https://registry.terraform.io/providers/okta/okta/latest/docs/resources/policy_mfa_default
        title: Terraform Registry - okta_policy_mfa_default
  - uid: mondoo-okta-security-disable-weaker-mfa-factors-in-factor-enrollment-policies-api
    filters: asset.platform == "okta-org"
    mql: |
      okta.policies.mfaEnroll.all( _.settings['factors']['okta_email']['enroll']['self'] != /(OPTIONAL|REQUIRED)/ )
      okta.policies.mfaEnroll.all( _.settings['factors']['okta_sms']['enroll']['self'] != /(OPTIONAL|REQUIRED)/ )
      okta.policies.mfaEnroll.all( _.settings['factors']['phone_number']['enroll']['self'] != /(OPTIONAL|REQUIRED)/ )
  - uid: mondoo-okta-security-disable-weaker-mfa-factors-in-factor-enrollment-policies-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.providers.any( nameLabel == "okta" )
    mql: |
      terraform.resources("okta_policy_mfa_default").all( arguments['okta_sms']['enroll'] != /(OPTIONAL|REQUIRED)/)
      terraform.resources("okta_policy_mfa_default").all( arguments['okta_email']['enroll'] != /(OPTIONAL|REQUIRED)/)
      terraform.resources("okta_policy_mfa_default").all( arguments['phone_number']['enroll'] != /(OPTIONAL|REQUIRED)/)
  - uid: mondoo-okta-security-disable-weaker-mfa-factors-in-factor-enrollment-policies-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains( providerName == /okta/ )
    mql: |
      terraform.plan.resourceChanges.where( type == "okta_policy_mfa_default" ).all( change.after['okta_email']['enroll'] != /(OPTIONAL|REQUIRED)/ )
      terraform.plan.resourceChanges.where( type == "okta_policy_mfa_default" ).all( change.after['okta_sms']['enroll'] != /(OPTIONAL|REQUIRED)/ )
      terraform.plan.resourceChanges.where( type == "okta_policy_mfa_default" ).all( change.after['phone_number']['enroll'] != /(OPTIONAL|REQUIRED)/ )
  - uid: mondoo-okta-security-disable-weaker-mfa-factors-in-factor-enrollment-policies-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains( type == /okta_policy_mfa_default/ )
    mql: |
      terraform.state.resources.where( type == 'okta_policy_mfa_default' ).all( values['okta_sms']['enroll'] != /(OPTIONAL|REQUIRED)/ )
      terraform.state.resources.where( type == 'okta_policy_mfa_default' ).all( values['okta_email']['enroll'] != /(OPTIONAL|REQUIRED)/ )
      terraform.state.resources.where( type == 'okta_policy_mfa_default' ).all( values['phone_number']['enroll'] != /(OPTIONAL|REQUIRED)/ )
  - uid: mondoo-okta-security-enable-okta-verify-with-push-for-mfa
    title: Enable Okta Verify (with Push if available) for MFA
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
