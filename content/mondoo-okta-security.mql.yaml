      - uid: mondoo-okta-security-password-settings-max-lockout-attempts-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-okta-security-password-settings-max-lockout-attempts-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that every password policy limits the number of invalid password attempts before an account is locked. Capping failed attempts protects accounts against brute-force and password-spraying attacks.

        **Why this matters**

        - **Brute-force defense:** Locking accounts after a few failed attempts stops automated password guessing.
        - **Spraying resistance:** A lockout threshold limits how many guesses an attacker can make against each account.
        - **Consistent baseline:** Applying the limit to every policy ensures no group of users is left without lockout protection.

        **Risk mitigation**

        - **Set a lockout threshold:** Configure each password policy to lock accounts after a small number of invalid attempts.
        - **Balance usability:** Choose a threshold that blocks attacks while allowing for occasional legitimate mistyped passwords.
      audit: |
        ### Audit via Admin Console

        1. In the Admin Console, go to **Security > Authentication**.
        2. Select the **Password** tab and open each policy.
        3. Confirm the **Lock out** setting limits invalid attempts to your approved maximum.

        A passing result shows every password policy enforcing a lockout threshold within the limit; a failing result shows a policy with no lockout or too high a threshold.

        ### Audit via API

        Query the Okta API and inspect the result:

        ```bash
        curl -s -H "Authorization: SSWS $OKTA_API_TOKEN" \
          "https://$OKTA_ORG.okta.com/api/v1/policies?type=PASSWORD"
        ```

        For each policy, inspect `settings.password.lockout.maxAttempts`. A passing response shows that value at or below your approved maximum for every policy; a failing response shows a policy exceeding it.
      remediation:
        - id: console
          desc: |
            ### Limit failed sign-in attempts before lockout

            1. On Okta Identity Engine orgs, go to **Security > Authenticators** and select **Password**. On Okta Classic Engine orgs, go to **Security > Authentication** and select the **Password** tab.
            2. Locate the policy and select **Edit**.
            3. Under **Password settings**, in **Lock out**, enable the option to lock out users after unsuccessful attempts and set the limit to 5 or fewer. Do not leave the value at 0, which disables lockout entirely.
            4. Select **Update Policy**.
        - id: terraform
          desc: |
            Set this attribute inside your single, consolidated `okta_policy_password_default` resource alongside your other password settings. The snippet below shows only the attribute relevant to this check. Applying a standalone resource that defines just this one attribute resets every other password setting on the default policy back to the Terraform provider defaults, so merge it with your existing definition rather than applying it on its own.

            ```hcl
            resource "okta_policy_password_default" "default" {
              password_max_lockout_attempts = 5
            }
            ```
    refs:
      - url: https://help.okta.com/en-us/content/topics/security/policies/configure-password-policies.htm
        title: Okta Password Policies
  - uid: mondoo-okta-security-password-settings-max-lockout-attempts-api
    filters: asset.platform == "okta-org"
    mql: |
      okta.policies.password.all( settings['password']['lockout']['maxAttempts'] > 0 && settings['password']['lockout']['maxAttempts'] <= 5 )
  - uid: mondoo-okta-security-password-settings-max-lockout-attempts-terraform-hcl
