  - uid: mondoo-okta-security-enable-suspicious-activity-reporting
    title: Enable Suspicious Activity Reporting
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-03
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-6-8
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-3
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-7
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    variants:
      - uid: mondoo-okta-security-enable-suspicious-activity-reporting-api
        tags:
          mondoo.com/filter-title: Okta Organization
          mondoo.com/filter-icon: okta
      - uid: mondoo-okta-security-enable-suspicious-activity-reporting-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-okta-security-enable-suspicious-activity-reporting-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-okta-security-enable-suspicious-activity-reporting-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Suspicious Activity Reporting is enabled so end users can flag unrecognized account activity. When a user reports suspicious activity, admins gain additional System Log events and actions to investigate the incident.

        **Why this matters**

        - **Early detection:** End users often notice unfamiliar sign-ins before automated systems, and reporting turns that awareness into actionable signal.
        - **Richer telemetry:** Reports generate System Log events that give admins detail needed to investigate.
        - **Faster response:** Surfacing suspicious activity quickly lets security teams contain account compromise sooner.

        **Risk mitigation**

        - **Enable reporting:** Turn on Suspicious Activity Reporting so users have a built-in channel to flag unrecognized activity.
        - **Act on reports:** Review reported events in the System Log and respond to potential account takeover.
      audit: |
        ### Audit via Admin Console

        1. In the Admin Console, locate the security notification email settings. The exact location varies in the current Admin Console and has historically lived under **Settings > Account**, so if it is not there look under the other Settings sections or search the console for "notification emails".
        2. Review the **Report Suspicious Activity** option.
        3. Confirm the option is enabled.

        A passing result shows Suspicious Activity Reporting enabled; a failing result shows the option turned off.

        ### Audit via API

        Query the Okta API and inspect the result:

        ```bash
        curl -s -H "Authorization: SSWS $OKTA_API_TOKEN" \
          "https://$OKTA_ORG.okta.com/api/v1/org/settings"
        ```

        The org security notification email settings expose a `reportSuspiciousActivityEnabled` field. A passing response shows that field set to `true`; a failing response shows it set to `false`. This setting is also visible in the Admin Console under Settings.
      remediation:
        - id: console
          desc: |
            ### Enable suspicious activity reporting

            1. In the Admin Console, open the security notification email settings. The exact location varies in the current Admin Console and has historically lived under **Settings > Account**, so if it is not there look under the other Settings sections or search the console for "notification emails".
            2. Scroll to the **Security notification emails** section and select **Edit**.
            3. Set **Report suspicious activity via email** to **Enabled**. This adds a Report Suspicious Activity button to the new sign-on, authenticator enrolled, authenticator reset, and password changed notification emails.
            4. Select **Save**.

            When an end user selects the button, Okta records a `user.account.report_suspicious_activity_by_enduser` event in the System Log and surfaces it in the Admin Console for review.
        - id: terraform
          desc: |
            ```hcl
            resource "okta_security_notification_emails" "example" {
              report_suspicious_activity_enabled       = true
              send_email_for_factor_enrollment_enabled = true
              send_email_for_factor_reset_enabled      = true
              send_email_for_new_device_enabled        = true
              send_email_for_password_changed_enabled  = true
            }
            ```
    refs:
      - url: https://help.okta.com/en-us/content/topics/security/threat-insight/ti-index.htm
        title: Okta ThreatInsight
      - url: https://help.okta.com/en-us/content/topics/security/security-home.htm
