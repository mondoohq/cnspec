      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-8
      compliance/pci-dss-4: pcidss-requirement-8-3-4
      compliance/soc2-2017: soc2-control-cc6-1-8
      compliance/vda-isa-5: vda-isa-5-4-1-3
    props:
      - uid: mondooOktaSecurityOktaPasswordAutoUnlock
        title: Number of minutes before a locked account is unlocked
        mql: "30"
    variants:
      - uid: mondoo-okta-security-password-settings-auto-unlock-minutes-api
        tags:
          mondoo.com/filter-title: Okta Organization
          mondoo.com/filter-icon: okta
      - uid: mondoo-okta-security-password-settings-auto-unlock-minutes-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-okta-security-password-settings-auto-unlock-minutes-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-okta-security-password-settings-auto-unlock-minutes-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that password policies keep a locked account locked for at least 30 minutes before it unlocks automatically. The automatic unlock delay controls how long a user must wait after exceeding the failed sign-in limit.

        **Why this matters**

        - **Attack slowdown:** A long lockout window forces an attacker to pause between rounds of guessing, sharply reducing their attempt rate.
        - **Detection time:** Extended lockouts give security teams a wider window to notice and respond to an account under attack.
        - **Deterrence:** A meaningful delay makes automated guessing too slow to be worthwhile.

        **Risk mitigation**

        - **Brute force resilience:** A 30 minute minimum caps how many password guesses an attacker can make per hour against an account.
        - **Credential stuffing resilience:** Sustained lockouts blunt high-volume attacks that replay stolen credentials across many accounts.
      audit: |
        ### Audit via Admin Console

        1. In the Admin Console, go to **Security > Authentication**.
        2. Open the **Password** tab and select the password policy to review.
        3. Under **Password settings**, locate the **Lock out** section and read the **Automatically unlock account after** value.

        A passing result shows an automatic unlock delay of 30 minutes or more for every policy; a failing result shows a shorter delay.

        ### Audit via API

        Query the Okta API and inspect the result:

        ```bash
        curl -s -H "Authorization: SSWS $OKTA_API_TOKEN" \
          "https://$OKTA_ORG.okta.com/api/v1/policies?type=PASSWORD"
        ```

        A passing response has `settings.password.lockout.autoUnlockMinutes` of 30 or greater for every policy; a failing response has a value below 30.
      remediation:
        - id: console
          desc: |
            ### Delay automatic account unlock

            1. On Okta Identity Engine orgs, go to **Security > Authenticators** and select **Password**. On Okta Classic Engine orgs, go to **Security > Authentication** and select the **Password** tab.
            2. Locate the policy and select **Edit**.
            3. Under **Password settings**, in **Lock out**, enable automatic unlocking and set the unlock delay to at least 30 minutes.
            4. Select **Update Policy**.
        - id: terraform
          desc: |
            Set this attribute inside your single, consolidated `okta_policy_password_default` resource alongside your other password settings. The snippet below shows only the attribute relevant to this check. Applying a standalone resource that defines just this one attribute resets every other password setting on the default policy back to the Terraform provider defaults, so merge it with your existing definition rather than applying it on its own.

            ```hcl
            resource "okta_policy_password_default" "default" {
              password_auto_unlock_minutes = 30
            }
            ```
    refs:
      - url: https://help.okta.com/en-us/content/topics/security/policies/configure-password-policies.htm
        title: Okta Password Policies
  - uid: mondoo-okta-security-password-settings-auto-unlock-minutes-api
    filters: asset.platform == "okta-org"
    mql: |
      okta.policies.password.all( settings['password']['lockout']['autoUnlockMinutes'] >= 30 )
  - uid: mondoo-okta-security-password-settings-auto-unlock-minutes-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.providers.any( nameLabel == "okta" )
    mql: |
      terraform.resources(/okta_policy_password/).all( arguments['password_auto_unlock_minutes'] == /var/ || arguments['password_auto_unlock_minutes'] >= 30 )
