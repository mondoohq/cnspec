      - uid: mondoo-okta-security-password-settings-sms-recovery-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-okta-security-password-settings-sms-recovery-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-okta-security-password-settings-sms-recovery-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that password policies keep SMS disabled as a password recovery factor. SMS messages travel over a channel that is exposed to interception and SIM-swap attacks.

        **Why this matters**

        - **Channel weakness:** SMS lacks end-to-end protection and can be intercepted or redirected by an attacker.
        - **SIM-swap risk:** An attacker who hijacks a phone number can receive recovery codes meant for the legitimate user.
        - **Stronger alternatives:** Email and app-based recovery factors offer better assurance than text messages.

        **Risk mitigation**

        - **Account takeover resilience:** Disabling SMS recovery removes a path attackers exploit through SIM swaps and number porting.
        - **Reduced interception risk:** Recovery that avoids SMS keeps reset codes off a network channel known to leak.
      audit: |
        ### Audit via Admin Console

        1. In the Admin Console, go to **Security > Authentication**.
        2. Open the **Password** tab and select the password policy to review.
        3. Under **Recovery settings**, confirm that **SMS** is not enabled as a recovery factor.

        A passing result shows SMS recovery inactive for every policy; a failing result shows it active.

        ### Audit via API

        Query the Okta API and inspect the result:

        ```bash
        curl -s -H "Authorization: SSWS $OKTA_API_TOKEN" \
          "https://$OKTA_ORG.okta.com/api/v1/policies?type=PASSWORD"
        ```

        A passing response has `settings.recovery.factors.okta_sms.status` set to `INACTIVE` for every policy; a failing response shows it as `ACTIVE`.
      remediation:
        - id: console
          desc: |
            ### Disable SMS as a recovery factor

            1. On Okta Identity Engine orgs, go to **Security > Authenticators** and select **Password**. On Okta Classic Engine orgs, go to **Security > Authentication** and select the **Password** tab.
            2. Locate the policy and select **Edit**.
            3. In the **Account recovery** section, clear the **SMS** option so text messages cannot be used to recover a password.
            4. Confirm a stronger recovery option such as email remains enabled so users are not locked out of self-service recovery.
            5. Select **Update Policy**.
        - id: terraform
          desc: |
            Set this attribute inside your single, consolidated `okta_policy_password_default` resource alongside your other password settings. The snippet below shows only the attribute relevant to this check. Applying a standalone resource that defines just this one attribute resets every other password setting on the default policy back to the Terraform provider defaults, so merge it with your existing definition rather than applying it on its own.

            ```hcl
            resource "okta_policy_password_default" "default" {
              sms_recovery = "INACTIVE"
            }
            ```
    refs:
      - url: https://help.okta.com/en-us/content/topics/security/policies/configure-password-policies.htm
        title: Okta Password Policies
  - uid: mondoo-okta-security-password-settings-sms-recovery-api
    filters: asset.platform == "okta-org"
    mql: |
      okta.policies.password.all( settings['recovery']['factors']['okta_sms']['status'] == "INACTIVE" )
  - uid: mondoo-okta-security-password-settings-sms-recovery-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.providers.any( nameLabel == "okta" )
    mql: |
      terraform.resources(/okta_policy_password/).all( arguments['sms_recovery'] == /var/ || arguments['sms_recovery'] == "INACTIVE" )
  - uid: mondoo-okta-security-password-settings-sms-recovery-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains( providerName == /okta/ )
    mql: |
