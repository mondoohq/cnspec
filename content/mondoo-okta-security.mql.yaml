    mql: |
      terraform.state.resources.where( type == 'okta_policy_mfa_default' ).any( values['okta_otp']['enroll'] == /REQUIRED/ )
  - uid: mondoo-okta-security-okta-mfa-access
    title: Require at least one factor in every MFA enrollment policy
    impact: 100
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-14
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-j
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-3
      compliance/pci-dss-4: pcidss-requirement-8-4-2
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-2
    variants:
      - uid: mondoo-okta-security-okta-mfa-access-api
        tags:
          mondoo.com/filter-title: Okta Organization
          mondoo.com/filter-icon: okta
      - uid: mondoo-okta-security-okta-mfa-access-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-okta-security-okta-mfa-access-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-okta-security-okta-mfa-access-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that at least one active factor enrollment policy applies to the Everyone group with a required factor. Requiring a factor for all users guarantees that every end user is enrolled in MFA before they can sign in.

        **Why this matters**

        - **Universal coverage:** Applying a required factor to the Everyone group leaves no user without MFA.
        - **No gaps:** A required factor must be enrolled before sign-in, so users cannot defer or skip MFA setup.
        - **Baseline assurance:** Mandatory MFA establishes a consistent minimum authentication standard across the org.

        **Risk mitigation**

        - **Require a factor:** Set at least one factor to required in an active factor enrollment policy that includes the Everyone group.
        - **Prompt for enrollment:** Use a sign-on policy rule to prompt users to enroll in the required factor at next sign-in.
      audit: |
        ### Audit via Admin Console

        1. In the Admin Console, go to **Security > Multifactor**.
        2. Select **Factor Enrollment** and review the policy list.
        3. Confirm that an active policy applies to the Everyone group and has at least one factor set to required.

        A passing result shows an active enrollment policy covering all users with a required factor; a failing result shows no such policy or a policy with only optional factors.

        ### Audit via API

        Query the Okta API and inspect the result:

        ```bash
        curl -s -H "Authorization: SSWS $OKTA_API_TOKEN" \
          "https://$OKTA_ORG.okta.com/api/v1/policies?type=MFA_ENROLL"
        ```

        A passing response includes a policy with `status` of `ACTIVE` whose `conditions.people.groups.include` contains the Everyone group ID and whose settings require a factor; a failing response has no active policy meeting those conditions.
      remediation:
        - id: console
          desc: |
            ### Set a required factor in an MFA enrollment policy
            1. In the Admin Console, go to **Security > Multifactor**. The **Factor Types** page appears.
            2. Select **Factor Enrollment** to switch to factor enrollment policies and rules.
            3. Select a policy and select **Edit** to modify it.
            4. From the list of eligible factors, set at least one factor to **Required**.
            5. Select **Update Policy**.

            ### Prompt an end user to enroll in a required factor
            To prompt an end user to enroll in a required factor, you may do one of the following:

            - Set an Okta sign-on policy rule that prompts a user for factor enrollment.
            - Set a factor enrollment policy rule that allows a user to enroll in a factor when challenged for MFA.
            - Set a factor enrollment policy rule that prompts the user to enroll in a factor the first time they sign in to their org.

            ### Create an Okta sign-on policy rule that prompts for factor enrollment
            1. From the Admin Console menu, select Security > Authentication. The Authentication policies page appears.
            2. Select Sign On to access Sign-On Policies.
            3. Select the policy and from the list of associated rules, select Edit to start modifying an existing policy rule. You can also create a rule.
            4. From the Edit Rule window, select Prompt for Factor.
            5. Select **Update Rule**.

            ### Create a factor enrollment policy rule that allows users to enroll in a factor when challenged for MFA
            1. In the Admin Console, go to **Security > Multifactor**. The **Factor Types** page appears.
            2. Select **Factor Enrollment**.
            3. Choose one of the active policy rules in the list and select Edit. The Edit Rule dialog appears.
            4. Under the condition THEN Enroll in multi-factor, select the first time a user is challenged for MFA.
            5. Select **Update Rule**.

            ### Create a factor enrollment policy rule that prompts new users to enroll in a factor the first time they sign in to their org
            1. In the Admin Console, go to **Security > Multifactor**. The **Factor Types** page appears.
            2. Select **Factor Enrollment**.
            3. Choose one of the active policy rules in the list and select Edit. The Edit Rule dialog appears.
            4. Under the condition THEN Enroll in multi-factor, select the first time a user signs in.
            5. Select **Update Rule**.
        - id: terraform
          desc: |
            ```hcl
            resource "okta_policy_mfa_default" "default" {
              is_oie = true

              okta_otp = {
                enroll = "REQUIRED"
              }
            }
            ```
    refs:
      - url: https://help.okta.com/en-us/content/topics/security/mfa/mfa-home.htm
        title: Okta Multifactor Authentication
      - url: https://help.okta.com/en-us/content/topics/security/policies/policies-home.htm
        title: Okta Security Policies
  - uid: mondoo-okta-security-okta-mfa-access-api
    filters: asset.platform == "okta-org"
    mql: |
      everyoneGroupId = okta.groups.where( profile['name'] == "Everyone" ).map(id)[0]
      okta.policies.mfaEnroll.one( status == "ACTIVE" && conditions['people']['groups']['include'].contains(everyoneGroupId) )
  - uid: mondoo-okta-security-okta-mfa-access-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.providers.any( nameLabel == "okta" )
    mql: |
      terraform.resources.where( nameLabel == "okta_policy_mfa_default" ).any( arguments['okta_otp']['enroll'] == /REQUIRED/ || arguments['okta_verify']['enroll'] == /REQUIRED/ || arguments['fido_webauthn']['enroll'] == /REQUIRED/ || arguments['webauthn']['enroll'] == /REQUIRED/ || arguments['google_otp']['enroll'] == /REQUIRED/ )
  - uid: mondoo-okta-security-okta-mfa-access-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains( providerName == /okta/ )
    mql: |
      terraform.plan.resourceChanges.where( type == "okta_policy_mfa_default" ).any( change.after['okta_otp']['enroll'] == /REQUIRED/ || change.after['okta_verify']['enroll'] == /REQUIRED/ || change.after['fido_webauthn']['enroll'] == /REQUIRED/ || change.after['webauthn']['enroll'] == /REQUIRED/ || change.after['google_otp']['enroll'] == /REQUIRED/ )
  - uid: mondoo-okta-security-okta-mfa-access-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains( type == /okta_policy_mfa_default/ )
    mql: |
      terraform.state.resources.where( type == "okta_policy_mfa_default" ).any( values['okta_otp']['enroll'] == /REQUIRED/ || values['okta_verify']['enroll'] == /REQUIRED/ || values['fido_webauthn']['enroll'] == /REQUIRED/ || values['webauthn']['enroll'] == /REQUIRED/ || values['google_otp']['enroll'] == /REQUIRED/ )
  - uid: mondoo-okta-security-okta-enforce-session-lifetime
    title: Enforce a limited session lifetime for all policies
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-14
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iii-access-control-automatic-logoff
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-12
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-11
      compliance/pci-dss-4: pcidss-requirement-8-2-8
      compliance/soc2-2017: soc2-control-cc6-1-8
      compliance/vda-isa-5: vda-isa-5-4-1-2
    variants:
      - uid: mondoo-okta-security-okta-enforce-session-lifetime-api
        tags:
          mondoo.com/filter-title: Okta Organization
          mondoo.com/filter-icon: okta
      - uid: mondoo-okta-security-okta-enforce-session-lifetime-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-okta-security-okta-enforce-session-lifetime-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-okta-security-okta-enforce-session-lifetime-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that every active sign-on policy rule enforces a limited session idle time and session lifetime. The Okta default session lifetime is two hours, and shorter limits reduce the window in which a hijacked session can be abused.

        **Why this matters**

        - **Reduced exposure:** Shorter session lifetimes shrink the time an attacker can use a stolen or abandoned session.
        - **Reauthentication:** Idle and lifetime limits force users to sign in again, re-verifying their identity periodically.
        - **Consistent enforcement:** Applying limits to every active rule ensures no policy leaves sessions open indefinitely.

        **Risk mitigation**

        - **Bound session lifetime:** Set session lifetime to two hours or less in every active sign-on policy rule.
        - **Limit idle time:** Configure a session idle timeout so unattended sessions expire without user action.
      audit: |
        ### Audit via Admin Console

        1. In the Admin Console, go to **Security > Authentication**.
        2. Select **Sign On** and open each policy.
        3. Review each active rule and confirm the **Session expires after** value is within your approved limit.

        A passing result shows every active sign-on rule with a bounded session lifetime and idle timeout; a failing result shows a rule with an excessive or unset session lifetime.

        ### Audit via API

        Query the Okta API and inspect the result:

        ```bash
        curl -s -H "Authorization: SSWS $OKTA_API_TOKEN" \
          "https://$OKTA_ORG.okta.com/api/v1/policies?type=OKTA_SIGN_ON"
        ```

        For each policy, fetch its rules with `GET /api/v1/policies/{policyId}/rules` and inspect `actions.signon.session`. A passing response shows `maxSessionIdleMinutes` and `maxSessionLifetimeMinutes` within the approved limits for every active rule; a failing response shows a rule exceeding those limits.
      remediation:
        - id: console
          desc: |
            ### Set the session lifetime for a policy
            1. In the Admin Console, go to **Security > Authentication**.
            2. Select **Sign On**.
            3. Select **Add Rule** or **Edit** to modify an existing policy rule.
            4. Under **Session expires after**, set the session lifetime duration in minutes, hours, or days.
            5. Select **Create Rule** or **Save Rule** once your changes have been made.
        - id: terraform
          desc: |
            ```hcl
            resource "okta_policy_rule_signon" "default" {
              policy_id        = okta_policy_signon.default.id
              name             = "Require MFA"
              status           = "ACTIVE"
              session_idle     = 120
              session_lifetime = 1440
            }
            ```
    refs:
      - url: https://help.okta.com/en-us/content/topics/security/policies/configure-signon-policies.htm
        title: Okta Sign-On Policies
      - url: https://help.okta.com/en-us/content/topics/security/policies/policies-home.htm
        title: Okta Security Policies
  - uid: mondoo-okta-security-okta-enforce-session-lifetime-api
    filters: asset.platform == "okta-org"
    props:
      - uid: mondooOktaSecurityMaxSessionIdleMinutes
        title: Okta Security - SignOn mondooOktaSecurityMaxSessionIdleMinutes
        mql: return 120
      - uid: mondooOktaSecurityMaxSessionLifetimeMinutes
        title: Okta Security - Max session lifetime minutes
        mql: return 1440
    mql: |
      okta.policies.signOn.where(_.rules.all(status == "ACTIVE")).all(_.rules.all(actions["signon"]["session"]["mondooOktaSecurityMaxSessionIdleMinutes"] <= props.mondooOktaSecurityMaxSessionIdleMinutes ))
      okta.policies.signOn.where(_.rules.all(status == "ACTIVE")).all(_.rules.all(actions["signon"]["session"]["mondooOktaSecurityMaxSessionLifetimeMinutes"] <= props.mondooOktaSecurityMaxSessionLifetimeMinutes ))
  # The HCL variant accepts a `var.something` reference for session_idle /
  # session_lifetime as a static-analysis pass-through — the resolved value
  # isn't known at HCL-parse time. Plan and state variants below evaluate the
  # resolved value, so they don't need the escape hatch and intentionally
  # omit it.
  - uid: mondoo-okta-security-okta-enforce-session-lifetime-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.providers.any( nameLabel == "okta" )
    mql: |
      terraform.resources.where( nameLabel == "okta_policy_rule_signon" ).all( arguments['session_idle'] == /^var\./ || arguments['session_idle'] <= 120 )
      terraform.resources.where( nameLabel == "okta_policy_rule_signon" ).all( arguments['session_lifetime'] == /^var\./ || arguments['session_lifetime'] <= 1440 )
  - uid: mondoo-okta-security-okta-enforce-session-lifetime-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains( providerName == /okta/ )
    mql: |
      terraform.plan.resourceChanges.where( type == "okta_policy_rule_signon" ).all( change.after['session_idle'] <= 120 )
      terraform.plan.resourceChanges.where( type == "okta_policy_rule_signon" ).all( change.after['session_lifetime'] <= 1440 )
  - uid: mondoo-okta-security-okta-enforce-session-lifetime-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains( type == /okta_policy_rule_signon/ )
    mql: |
      terraform.state.resources.where( type == "okta_policy_rule_signon" ).all( values['session_idle'] <= 120 )
      terraform.state.resources.where( type == "okta_policy_rule_signon" ).all( values['session_lifetime'] <= 1440 )
  - uid: mondoo-okta-security-okta-auth-openid-saml
    title: Enable SAML or OIDC authentication for supported apps
    impact: 100
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-14
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-2
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-2
    variants:
      - uid: mondoo-okta-security-okta-auth-openid-saml-api
        tags:
          mondoo.com/filter-title: Okta Organization
          mondoo.com/filter-icon: okta
      - uid: mondoo-okta-security-okta-auth-openid-saml-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-okta-security-okta-auth-openid-saml-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that active applications using a supported sign-on mode are configured to authenticate with SAML or OIDC rather than password-based methods such as SWA. With SAML and OIDC, user credentials never leave Okta, unlike SWA where the username and password are passed to the third-party app.

        **Why this matters**

        - **Credential isolation:** SAML and OIDC keep user credentials within Okta instead of forwarding them to third-party apps.
        - **Federated trust:** Standard protocols let otherwise different systems share authentication state securely.
        - **Reduced password risk:** Moving away from SWA lowers reliance on stored passwords that can be leaked or reused.

        **Risk mitigation**

        - **Adopt SAML or OIDC:** Configure supported applications to use SAML 2.0 or OpenID Connect for sign-on.
        - **Retire SWA where possible:** Replace SWA integrations with federated sign-on so credentials are not passed to external apps.
      audit: |
        ### Audit via Admin Console

        1. In the Admin Console, go to **Applications > Applications**.
        2. Review each active application and note its sign-on method.
        3. Confirm that supported apps use SAML or OIDC rather than SWA.

        A passing result shows active, supported applications configured for SAML or OIDC; a failing result shows a supported app still using SWA.

        ### Audit via API

        Query the Okta API and inspect the result:

        ```bash
        curl -s -H "Authorization: SSWS $OKTA_API_TOKEN" \
          "https://$OKTA_ORG.okta.com/api/v1/apps"
        ```

        For each active application, inspect the `signOnMode` field. A passing response shows supported apps with `signOnMode` of `SAML_2_0` or `OPENID_CONNECT`; a failing response shows a supported app using a password-based sign-on mode.
      remediation:
        - id: console
          desc: |
            ### Use the Okta Admin Console

            1. Log into the organization as an administrator.
            2. Select **Applications > Applications**.
            3. Select **Create App Integration** or **Browse App Catalog** to see the available apps.
            4. Assign OIDC or SAML.
        - id: terraform
          desc: |
            ### Configure a SAML application with Terraform

            >Note: If you receive the error `You do not have permission to access the feature you are requesting` contact support and request feature flag `ADVANCED_SSO` be applied to your org.

            ```hcl
            resource "okta_app_saml" "example" {
              label                    = "example"
              sso_url                  = "https://example.com"
              recipient                = "https://example.com"
              destination              = "https://example.com"
              audience                 = "https://example.com/audience"
              subject_name_id_template = "$${user.userName}"
              subject_name_id_format   = "urn:oasis:names:tc:SAML:1.1:nameid-format:emailAddress"
              response_signed          = true
              signature_algorithm      = "RSA_SHA256"
              digest_algorithm         = "SHA256"
              honor_force_authn        = false
              authn_context_class_ref  = "urn:oasis:names:tc:SAML:2.0:ac:classes:PasswordProtectedTransport"

              attribute_statements {
                type         = "GROUP"
                name         = "groups"
                filter_type  = "REGEX"
                filter_value = ".*"
              }
            }
            ```

            ### Configure an OIDC provider with Terraform

            ```hcl
            resource "okta_idp_oidc" "example" {
              name                  = "example"
              authorization_url     = "https://idp.example.com/authorize"
              authorization_binding = "HTTP-REDIRECT"
              token_url             = "https://idp.example.com/token"
              token_binding         = "HTTP-POST"
              user_info_url         = "https://idp.example.com/userinfo"
              user_info_binding     = "HTTP-REDIRECT"
              jwks_url              = "https://idp.example.com/keys"
              jwks_binding          = "HTTP-REDIRECT"
              scopes                = ["openid"]
              client_id             = "efg456"
              client_secret         = "efg456"
              issuer_url            = "https://id.example.com"
