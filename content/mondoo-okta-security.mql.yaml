  - uid: mondoo-okta-security-okta-enforce-session-lifetime
    title: Enforce a limited session lifetime for all policies
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-14
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iii-access-control-automatic-logoff
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-12
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-11
      compliance/pci-dss-4: pcidss-requirement-8-2-8
      compliance/soc2-2017: soc2-control-cc6-1-8
      compliance/vda-isa-5: vda-isa-5-4-1-2
    variants:
      - uid: mondoo-okta-security-okta-enforce-session-lifetime-api
        tags:
          mondoo.com/filter-title: Okta Organization
          mondoo.com/filter-icon: okta
      - uid: mondoo-okta-security-okta-enforce-session-lifetime-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-okta-security-okta-enforce-session-lifetime-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-okta-security-okta-enforce-session-lifetime-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that every active sign-on policy rule enforces a limited session idle time and session lifetime. The Okta default session lifetime is two hours, and shorter limits reduce the window in which a hijacked session can be abused.

        **Why this matters**

        - **Reduced exposure:** Shorter session lifetimes shrink the time an attacker can use a stolen or abandoned session.
        - **Reauthentication:** Idle and lifetime limits force users to sign in again, re-verifying their identity periodically.
        - **Consistent enforcement:** Applying limits to every active rule ensures no policy leaves sessions open indefinitely.

        **Risk mitigation**

        - **Bound session lifetime:** Set session lifetime to two hours or less in every active sign-on policy rule.
        - **Limit idle time:** Configure a session idle timeout so unattended sessions expire without user action.
      audit: |
        ### Audit via Admin Console

        1. In the Admin Console, go to **Security > Authentication**.
        2. Select **Sign On** and open each policy.
        3. Review each active rule and confirm the **Session expires after** value is within your approved limit.

        A passing result shows every active sign-on rule with a bounded session lifetime and idle timeout; a failing result shows a rule with an excessive or unset session lifetime.

        ### Audit via API

        Query the Okta API and inspect the result:

        ```bash
        curl -s -H "Authorization: SSWS $OKTA_API_TOKEN" \
          "https://$OKTA_ORG.okta.com/api/v1/policies?type=OKTA_SIGN_ON"
        ```

        For each policy, fetch its rules with `GET /api/v1/policies/{policyId}/rules` and inspect `actions.signon.session`. A passing response shows `maxSessionIdleMinutes` and `maxSessionLifetimeMinutes` within the approved limits for every active rule; a failing response shows a rule exceeding those limits.
      remediation:
        - id: console
          desc: |
            ### Limit session idle time and session lifetime

            This check evaluates the global sign-on policy, which controls the Okta session itself. On Okta Identity Engine this is the Global Session Policy, the correct surface for session idle time and session lifetime. Shorter limits reduce the window in which a hijacked or abandoned session can be abused.

            1. On Okta Identity Engine orgs, go to **Security > Global Session Policy**. On Okta Classic Engine orgs, go to **Security > Authentication** and select the **Sign On** tab.
            2. For each active policy rule, select **Edit**.
            3. Set the maximum session idle time to 2 hours or less.
            4. Set the maximum session lifetime to 24 hours or less.
            5. Select **Update Rule**.

            An aggressive idle timeout forces more frequent re-authentication and will interrupt active admin sessions, so choose a limit that balances exposure against operational friction.
        - id: terraform
          desc: |
            ```hcl
            resource "okta_policy_rule_signon" "default" {
              policy_id        = okta_policy_signon.default.id
              name             = "Limit session lifetime"
              status           = "ACTIVE"
              session_idle     = 120
              session_lifetime = 1440
            }
            ```
    refs:
      - url: https://help.okta.com/en-us/content/topics/security/policies/configure-signon-policies.htm
        title: Okta Sign-On Policies
      - url: https://help.okta.com/en-us/content/topics/security/policies/policies-home.htm
        title: Okta Security Policies
  - uid: mondoo-okta-security-okta-enforce-session-lifetime-api
    filters: asset.platform == "okta-org"
    props:
      - uid: mondooOktaSecurityMaxSessionIdleMinutes
        title: Okta Security - SignOn mondooOktaSecurityMaxSessionIdleMinutes
        mql: return 120
      - uid: mondooOktaSecurityMaxSessionLifetimeMinutes
        title: Okta Security - Max session lifetime minutes
        mql: return 1440
    mql: |
      okta.policies.signOn.where(_.rules.all(status == "ACTIVE")).all(_.rules.all(actions["signon"]["session"]["maxSessionIdleMinutes"] <= props.mondooOktaSecurityMaxSessionIdleMinutes ))
      okta.policies.signOn.where(_.rules.all(status == "ACTIVE")).all(_.rules.all(actions["signon"]["session"]["maxSessionLifetimeMinutes"] <= props.mondooOktaSecurityMaxSessionLifetimeMinutes ))
  # The HCL variant accepts a `var.something` reference for session_idle /
  # session_lifetime as a static-analysis pass-through — the resolved value
  # isn't known at HCL-parse time. Plan and state variants below evaluate the
  # resolved value, so they don't need the escape hatch and intentionally
  # omit it.
  - uid: mondoo-okta-security-okta-enforce-session-lifetime-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.providers.any( nameLabel == "okta" )
    mql: |
      terraform.resources("okta_policy_rule_signon").all( arguments['session_idle'] == /^var\./ || arguments['session_idle'] <= 120 )
      terraform.resources("okta_policy_rule_signon").all( arguments['session_lifetime'] == /^var\./ || arguments['session_lifetime'] <= 1440 )
  - uid: mondoo-okta-security-okta-enforce-session-lifetime-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains( providerName == /okta/ )
    mql: |
      terraform.plan.resourceChanges.where( type == "okta_policy_rule_signon" ).all( change.after['session_idle'] <= 120 )
      terraform.plan.resourceChanges.where( type == "okta_policy_rule_signon" ).all( change.after['session_lifetime'] <= 1440 )
  - uid: mondoo-okta-security-okta-enforce-session-lifetime-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains( type == /okta_policy_rule_signon/ )
    mql: |
      terraform.state.resources.where( type == "okta_policy_rule_signon" ).all( values['session_idle'] <= 120 )
      terraform.state.resources.where( type == "okta_policy_rule_signon" ).all( values['session_lifetime'] <= 1440 )
  - uid: mondoo-okta-security-okta-auth-openid-saml
    title: Enable SAML or OIDC authentication for supported apps
    impact: 100
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-14
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-2
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-2
    variants:
      - uid: mondoo-okta-security-okta-auth-openid-saml-api
        tags:
          mondoo.com/filter-title: Okta Organization
          mondoo.com/filter-icon: okta
      - uid: mondoo-okta-security-okta-auth-openid-saml-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-okta-security-okta-auth-openid-saml-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that active applications using a supported sign-on mode are configured to authenticate with SAML or OIDC rather than password-based methods such as SWA. With SAML and OIDC, user credentials never leave Okta, unlike SWA where the username and password are passed to the third-party app.

        **Why this matters**

        - **Credential isolation:** SAML and OIDC keep user credentials within Okta instead of forwarding them to third-party apps.
        - **Federated trust:** Standard protocols let otherwise different systems share authentication state securely.
        - **Reduced password risk:** Moving away from SWA lowers reliance on stored passwords that can be leaked or reused.

        **Risk mitigation**

        - **Adopt SAML or OIDC:** Configure supported applications to use SAML 2.0 or OpenID Connect for sign-on.
        - **Retire SWA where possible:** Replace SWA integrations with federated sign-on so credentials are not passed to external apps.
      audit: |
        ### Audit via Admin Console

        1. In the Admin Console, go to **Applications > Applications**.
        2. Review each active application and note its sign-on method.
        3. Confirm that supported apps use SAML or OIDC rather than SWA.

        A passing result shows active, supported applications configured for SAML or OIDC; a failing result shows a supported app still using SWA.

        ### Audit via API

        Query the Okta API and inspect the result:

        ```bash
        curl -s -H "Authorization: SSWS $OKTA_API_TOKEN" \
          "https://$OKTA_ORG.okta.com/api/v1/apps"
        ```

        For each active application, inspect the `signOnMode` field. A passing response shows supported apps with `signOnMode` of `SAML_2_0` or `OPENID_CONNECT`; a failing response shows a supported app using a password-based sign-on mode.
      remediation:
        - id: console
          desc: |
            ### Replace SWA integrations with SAML or OIDC

            1. In the Admin Console, go to **Applications > Applications** and identify active apps whose sign-on method is SWA.
            2. For each such app, check the **Okta Integration Network** with **Browse App Catalog** for a SAML 2.0 or OIDC version of the integration, or select **Create App Integration** and choose **SAML 2.0** or **OIDC - OpenID Connect** for a custom app.
            3. Configure the new integration with the application vendor, assign the same users and groups, and verify sign-in works.
            4. Deactivate the old SWA integration once users have migrated.
        - id: terraform
          desc: |
            ### Configure a SAML application with Terraform

            >Note: If you receive the error `You do not have permission to access the feature you are requesting`, contact support and request the feature flag `ADVANCED_SSO` for your org.

            ```hcl
            resource "okta_app_saml" "example" {
              label                    = "example"
              sso_url                  = "https://example.com"
              recipient                = "https://example.com"
              destination              = "https://example.com"
              audience                 = "https://example.com/audience"
              subject_name_id_template = "$${user.userName}"
              subject_name_id_format   = "urn:oasis:names:tc:SAML:1.1:nameid-format:emailAddress"
              response_signed          = true
              signature_algorithm      = "RSA_SHA256"
              digest_algorithm         = "SHA256"
              honor_force_authn        = false
              authn_context_class_ref  = "urn:oasis:names:tc:SAML:2.0:ac:classes:PasswordProtectedTransport"
            }
            ```

            ### Configure an OIDC application with Terraform

            ```hcl
            resource "okta_app_oauth" "example" {
              label          = "example"
              type           = "web"
              grant_types    = ["authorization_code"]
              redirect_uris  = ["https://app.example.com/oauth2/callback"]
              response_types = ["code"]
            }
            ```
