  - uid: mondoo-okta-security-trusted-origins-https
    title: Ensure all active trusted origins use HTTPS
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    variants:
      - uid: mondoo-okta-security-trusted-origins-https-api
        tags:
          mondoo.com/filter-title: Okta Organization
          mondoo.com/filter-icon: okta
      - uid: mondoo-okta-security-trusted-origins-https-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-okta-security-trusted-origins-https-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-okta-security-trusted-origins-https-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that all active trusted origins in Okta are configured to use HTTPS rather than HTTP. Trusted origins define which URLs are allowed for cross-origin resource sharing requests and redirect URIs, and these origins handle sensitive authentication tokens, session cookies, and authorization codes.

        **Why this matters**

        - **Token interception:** HTTP origins transmit authentication tokens in plaintext, allowing network attackers to capture OAuth tokens, session identifiers, and authorization codes.
        - **Session hijacking:** Cookies sent to HTTP origins can be captured and replayed, giving attackers access to authenticated sessions.
        - **Credential exposure:** Cross-origin requests to HTTP endpoints can leak sensitive authentication data to anyone observing the network path.

        **Risk mitigation**

        - **Man-in-the-middle resilience:** Requiring HTTPS encrypts authentication traffic so attackers cannot read or alter tokens in transit.
        - **Replay attack defense:** Encrypted transport keeps session cookies and authorization codes from being intercepted and reused.
      audit: |
        ### Audit via Admin Console

        1. In the Admin Console, go to **Security > API**.
        2. Open the **Trusted Origins** tab.
        3. Review each active trusted origin and read its URL.

        A passing result shows every active trusted origin URL beginning with `https://`; a failing result shows one or more origins beginning with `http://`.

        ### Audit via API

        Query the Okta API and inspect the result:

        ```bash
        curl -s -H "Authorization: SSWS $OKTA_API_TOKEN" \
          "https://$OKTA_ORG.okta.com/api/v1/trustedOrigins"
        ```

        A passing response has every active entry with an `origin` value starting with `https://`; a failing response has at least one active `origin` starting with `http://`.
      remediation:
        - id: console
          desc: |
            ### Update trusted origins to use HTTPS

            1. In the Admin Console, go to **Security > API**.
            2. Select the **Trusted Origins** tab.
            3. Review each active trusted origin. For any origin using `http://`:
               a. Select **Edit** next to the origin.
               b. Update the **Origin URL** to use `https://` instead of `http://`.
               c. Select **Save**.
            4. If the underlying application does not yet support HTTPS, configure TLS on the application first, then update the trusted origin.
        - id: terraform
          desc: |
            ```hcl
            resource "okta_trusted_origin" "example" {
              active = true
              name   = "Example Origin"
              origin = "https://app.example.com"
              scopes = ["CORS", "REDIRECT"]
            }
            ```
    refs:
      - url: https://help.okta.com/en-us/Content/Topics/Security/API_Trusted-Origins.htm
        title: Trusted Origins
  - uid: mondoo-okta-security-trusted-origins-https-api
    filters: asset.platform == "okta-org"
    mql: okta.trustedOrigins.where(status == "ACTIVE").all(origin == /^https:\/\//)
  - uid: mondoo-okta-security-trusted-origins-https-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.providers.any( nameLabel == "okta" )
    mql: |
      terraform.resources("okta_trusted_origin").all( arguments['origin'] == /^https:\/\// )
  - uid: mondoo-okta-security-trusted-origins-https-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains( providerName == /okta/ )
    mql: |
      terraform.plan.resourceChanges.where( type == "okta_trusted_origin" ).all( change.after['origin'] == /^https:\/\// )
  - uid: mondoo-okta-security-trusted-origins-https-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains( type == /okta_trusted_origin/ )
    mql: |
      terraform.state.resources.where( type == "okta_trusted_origin" ).all( values['origin'] == /^https:\/\// )
  - uid: mondoo-okta-security-signon-requires-mfa
    title: Ensure sign-on policy rules require MFA
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-14
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-j
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-3
      compliance/pci-dss-4: pcidss-requirement-8-4-2
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-2
    variants:
      - uid: mondoo-okta-security-signon-requires-mfa-api
        tags:
          mondoo.com/filter-title: Okta Organization
          mondoo.com/filter-icon: okta
      - uid: mondoo-okta-security-signon-requires-mfa-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-okta-security-signon-requires-mfa-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-okta-security-signon-requires-mfa-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that active sign-on policy rules require multi-factor authentication for user sign-in. Sign-on policies control the authentication requirements when users access Okta, and each rule can independently enable or disable the MFA requirement, so MFA enrollment alone does not guarantee it is enforced.

        **Why this matters**

        - **Password-only access:** Without MFA enforced in sign-on rules, a compromised password grants full access to Okta and every connected application.
        - **Enrollment is not enforcement:** Enrollment policies make users register factors, but only sign-on rules require those factors at sign-in.
        - **Per-rule gaps:** A single rule that omits the factor requirement creates an authentication path that bypasses MFA entirely.

        **Risk mitigation**

        - **Account takeover resilience:** Requiring a second factor blocks attackers who hold only a stolen or guessed password.
        - **Phishing resilience:** MFA at sign-in stops credential phishing from converting directly into account access.
      audit: |
        ### Audit via Admin Console

        1. In the Admin Console, go to **Security > Authentication**.
        2. Open the **Sign On** tab and select each active sign-on policy.
        3. Review each active rule other than the catch-all rule and confirm it requires a second factor.

        A passing result shows every active rule requiring multi-factor authentication; a failing result shows at least one active rule that does not require a factor.

        ### Audit via API

        Query the Okta API and inspect the result:

        ```bash
        curl -s -H "Authorization: SSWS $OKTA_API_TOKEN" \
          "https://$OKTA_ORG.okta.com/api/v1/policies?type=OKTA_SIGN_ON"
        ```

        For each active policy, retrieve its rules with `GET /api/v1/policies/{id}/rules`. A passing response has every active rule with `actions.signon.requireFactor` set to `true`; a failing response has at least one active rule with it set to `false`.
      remediation:
        - id: console
          desc: |
            ### Require MFA in sign-on policy rules

            This check evaluates the global sign-on policy, which on Okta Identity Engine is the Global Session Policy. That policy establishes the Okta session itself. On Identity Engine, per-app MFA at access time is enforced separately by Authentication Policies, so harden both surfaces for complete coverage.

            On Okta Identity Engine orgs:

            1. Go to **Security > Global Session Policy**.
            2. For each active rule, select **Edit** and set **Establish the user session with** to require a password and another factor, then select **Update Rule**.
            3. Go to **Security > Authentication Policies** to enforce MFA at the point each application is accessed. Open each policy, edit its rules, and require a second factor for app access.

            On Okta Classic Engine orgs:

            1. Go to **Security > Authentication** and select the **Sign On** tab.
            2. For each active policy, review its rules and select **Edit** on each rule.
            3. Select **Prompt for Factor** and choose how often users are prompted, then select **Update Rule**.

            Repeat for all active rules so no rule allows password-only sign-in. Requiring a second factor blocks an attacker who holds only a stolen or guessed password.
        - id: terraform
          desc: |
            ```hcl
            resource "okta_policy_rule_signon" "require_mfa" {
              policy_id    = okta_policy_signon.default.id
              name         = "Require MFA"
              status       = "ACTIVE"
              mfa_required = true
            }
            ```
    refs:
      - url: https://help.okta.com/en-us/Content/Topics/Security/policies/configure-signon-policy.htm
        title: Configure Sign-On Policies
  - uid: mondoo-okta-security-signon-requires-mfa-api
    filters: asset.platform == "okta-org"
    mql: |
      okta.policies.signOn.where(status == "ACTIVE").all(
        rules.where(status == "ACTIVE" && name != "Catch-all Rule").all(actions["signon"]["requireFactor"] == true)
      )
  - uid: mondoo-okta-security-signon-requires-mfa-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.providers.any( nameLabel == "okta" )
    mql: |
      terraform.resources("okta_policy_rule_signon").all( arguments['mfa_required'] == /^var\./ || arguments['mfa_required'] == true || arguments['factor_required'] == true )
  - uid: mondoo-okta-security-signon-requires-mfa-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains( providerName == /okta/ )
    mql: |
      terraform.plan.resourceChanges.where( type == "okta_policy_rule_signon" ).all( change.after['mfa_required'] == true || change.after['factor_required'] == true )
  - uid: mondoo-okta-security-signon-requires-mfa-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains( type == /okta_policy_rule_signon/ )
    mql: |
      terraform.state.resources.where( type == "okta_policy_rule_signon" ).all( values['mfa_required'] == true || values['factor_required'] == true )
  # No Terraform variants: counts ORG_ADMIN role assignments across the org.
  # Per-user `okta_user_admin_roles` HCL would only see TF-managed grants and
  # miss assignments made via the API or Admin Console — the runtime check
  # against the live tenant is the source of truth.
  # No Terraform remediation: same reason — guidance limited to TF-managed
  # users would be misleading.
  - uid: mondoo-okta-security-limit-org-admins
    title: Limit the number of organization admins
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-10
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-2
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-3-1
      compliance/vda-isa-5: vda-isa-5-4-2-1
    props:
      - uid: maxOrgAdmins
        title: Maximum number of Okta Organization Admins
        mql: return 15
    variants:
      - uid: mondoo-okta-security-limit-org-admins-api
        tags:
          mondoo.com/filter-title: Okta Organization
          mondoo.com/filter-icon: okta
    docs:
      desc: |
        This check ensures that the number of users holding the Organization Administrator role stays within a safe threshold. The Organization Administrator role grants nearly the same access as the Super Administrator, covering management of users, groups, applications, and most organizational settings.

        **Why this matters**

        - **Broad access:** Org admins can modify user accounts, reset credentials, assign applications, and change group memberships across the whole organization.
        - **High-value targets:** The breadth of org admin access makes these accounts attractive targets for attackers seeking maximum impact.
        - **Lateral movement:** A compromised org admin account lets an attacker escalate privileges and create backdoor accounts.

        **Risk mitigation**

        - **Reduced attack surface:** Keeping the count of org admins low limits the number of accounts that can grant an attacker far-reaching control.
        - **Least privilege enforcement:** Restricting the role to those who genuinely need it contains the blast radius of any single compromised account.
      audit: |
        ### Audit via Admin Console

        1. In the Admin Console, go to **Security > Administrators**.
        2. Filter the administrator list by the **Organization Administrator** role.
        3. Count the users assigned that role.

        A passing result shows the org admin count within the approved threshold; a failing result shows more org admins than the threshold allows.

        ### Audit via API

        Query the Okta API and inspect the result:

        ```bash
        curl -s -H "Authorization: SSWS $OKTA_API_TOKEN" \
          "https://$OKTA_ORG.okta.com/api/v1/users"
        ```

        For each user, retrieve assigned roles with `GET /api/v1/users/{id}/roles`. A passing response has the number of users with a role `type` of `ORG_ADMIN` within the threshold; a failing response has more than the threshold.
      remediation:
        - id: console
          desc: |
            ### Reduce the number of organization admins

            Organization admin access in Okta can be granted to individual users and to groups. This check evaluates groups that hold the role, so pay particular attention to group-based assignments.

            1. In the Admin Console, go to **Security > Administrators**.
            2. Filter the admin list by the **Organization Administrator** role to see every user and group that grants the role.
            3. For each group that grants the role, go to **Directory > Groups**, open the group, and remove members who do not require full org admin access.
            4. For users who still need administrative rights, assign a more specific role such as Help Desk Admin, Application Admin, or Read-Only Admin based on their actual responsibilities.
            5. Periodically review org admin assignments to keep the role aligned with least privilege.
    refs:
      - url: https://help.okta.com/en-us/Content/Topics/Security/Administrators.htm
        title: Administrators
      - url: https://help.okta.com/en-us/Content/Topics/Security/administrators-admin-comparison.htm
        title: Administrator Role Comparison
  - uid: mondoo-okta-security-limit-org-admins-api
    filters: asset.platform == "okta-org"
    mql: okta.groups.where(roles.contains(type == "ORG_ADMIN")).all(members.length < props.maxOrgAdmins)
