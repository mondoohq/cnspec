      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-openstack-security-port-security-enabled-openstack
        tags:
          mondoo.com/filter-title: OpenStack Project
          mondoo.com/filter-icon: openstack
      - uid: mondoo-openstack-security-port-security-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-openstack-security-port-security-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-openstack-security-port-security-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Neutron ports owned by compute instances have port security enabled, identified by a `device_owner` value beginning with `compute:`. Port security is what makes security groups and anti-spoofing filters enforceable on a port.

        **Why this matters**

        - **Security groups depend on it:** With port security disabled, the attached instance can bypass its security group entirely.
        - **Anti-spoofing enforcement:** Port security blocks an instance from sourcing traffic with arbitrary MAC or IP addresses.
        - **Tenant isolation foundation:** The allowed-address-pairs allow-list and the rest of Neutron's isolation rely on port security being on.

        **Risk mitigation**

        - **Tenant impersonation:** Prevents an instance from impersonating other tenants on the same network.
        - **Firewall bypass:** Stops an instance from evading its assigned security group rules.
      audit: |
        ### Audit via Horizon

        1. Sign in to the OpenStack Horizon dashboard as a project member.
        2. Open **Network** then **Networks**, select a network, and open the **Ports** tab.
        3. Select each compute port and review the **Port Security Enabled** attribute.

        A passing result shows **Port Security Enabled** set to **True** for every compute port; a failing result shows a compute port with port security disabled.

        ### Audit via CLI

        Run the OpenStack CLI and inspect the result:

        ```bash
        openstack port show <id>
        ```

        A passing result shows `port_security_enabled` set to `True` for ports with a `device_owner` beginning with `compute:`; a failing result shows `port_security_enabled` set to `False`.
      remediation:
        - id: console
          desc: |
            1. Navigate to **Network → Networks** in Horizon, open the network, then edit the port.
            2. In the same edit, attach the security groups the port needs and re-enable **Port Security**. A port with port security on and no security group drops all traffic.
            3. If the workload legitimately sends traffic from additional addresses, for example a VRRP virtual IP, add those addresses as allowed address pairs before saving.
        - id: cli
          desc: |
            ```bash
            # Attach a security group in the same call that re-enables port security;
            # a port with port security on and no security group drops all traffic
            openstack port set --security-group app-sg --enable-port-security 9c4ad8a0-2b7e-4d61-b8a4-3f1e5c6d7a8b
            ```
        - id: terraform
          desc: |
            Either omit `port_security_enabled` on `openstack_networking_port_v2` (the default is `true`) or set it explicitly, and always pair it with the security groups the port needs:

            ```hcl
            resource "openstack_networking_port_v2" "app" {
              name                  = "app"
              network_id            = openstack_networking_network_v2.private.id
              port_security_enabled = true
              security_group_ids    = [openstack_networking_secgroup_v2.app.id]
            }
            ```
    refs:
      - url: https://docs.openstack.org/neutron/latest/admin/config-portsecurity.html
        title: OpenStack Neutron port security

  - uid: mondoo-openstack-security-port-security-enabled-openstack
    filters: asset.platform == "openstack-project"
    mql: |
      openstack.ports.where(deviceOwner == /^compute:/).all(portSecurityEnabled == true)
  - uid: mondoo-openstack-security-port-security-enabled-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "openstack_networking_port_v2")
    mql: |
