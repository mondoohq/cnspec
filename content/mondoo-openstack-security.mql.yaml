  - uid: mondoo-openstack-security-server-has-security-group
    title: Ensure compute servers have at least one security group attached
    impact: 90
    tags:
      compliance/bsi-sys-1-5: bsi-sys-1-5-a4
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-openstack-security-server-has-security-group-openstack
        tags:
          mondoo.com/filter-title: OpenStack Project
          mondoo.com/filter-icon: openstack
      - uid: mondoo-openstack-security-server-has-security-group-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-openstack-security-server-has-security-group-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-openstack-security-server-has-security-group-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that every Nova compute server has at least one Neutron security group applied. A server with no security group inherits whatever default policy the underlying network applies, which on many OpenStack clouds is fully open.

        **Why this matters**

        - **Per-VM firewall:** A security group gives the instance an enforceable firewall instead of leaving its exposure to the network plane.
        - **Tenant network isolation:** An explicit least-privilege group is the minimum bar for keeping instances isolated from untrusted peers.
        - **Predictable exposure:** Without a group, every service the instance exposes is reachable from any host the network connects it to.

        **Risk mitigation**

        - **Unintended exposure:** Prevents services from being reachable simply because no firewall policy was applied.
        - **Lateral movement:** Limits the network paths an attacker can use to reach the instance from other hosts on the network.
      audit: |
        ### Audit via Horizon

        1. Sign in to the OpenStack Horizon dashboard as a project member.
        2. Open **Compute** then **Instances**.
        3. Select each instance and review the **Security Groups** section on its overview tab.

        A passing result shows at least one security group attached to every instance; a failing result shows an instance with no security groups.

        ### Audit via CLI

        Run the OpenStack CLI and inspect the result:

        ```bash
        openstack server show <id>
        ```

        A passing result shows one or more entries under `security_groups`; a failing result shows an empty `security_groups` list.
      remediation:
        - id: console
          desc: |
            Attaching a security group gives the instance an enforceable per-VM firewall instead of leaving its exposure to whatever the network plane defaults to. Pick a group scoped to the instance's role so it only opens the ports that role needs.

            1. Navigate to **Compute → Instances** in Horizon.
            2. From the instance's action menu, select **Edit Security Groups**.
            3. Add the security group that matches the instance's role and save.
        - id: cli
          desc: |
            ```bash
            openstack server add security group web-01 app-sg
            ```
        - id: terraform
          desc: |
            Always set `security_groups` on `openstack_compute_instance_v2`, or attach security groups via `openstack_networking_port_v2` and reference that port from the instance:

            ```hcl
            resource "openstack_networking_secgroup_v2" "web" {
              name        = "web"
              description = "Allow HTTPS from the internet"
            }

            resource "openstack_compute_instance_v2" "app" {
              name            = "app"
              image_id        = data.openstack_images_image_v2.ubuntu.id
              flavor_id       = data.openstack_compute_flavor_v2.standard.id
              key_pair        = openstack_compute_keypair_v2.ops.name
              security_groups = [openstack_networking_secgroup_v2.web.name]
            }
            ```
    refs:
      - url: https://docs.openstack.org/nova/latest/admin/security-groups.html
        title: OpenStack Nova security groups

  - uid: mondoo-openstack-security-server-has-security-group-openstack
    filters: asset.platform == "openstack-project"
    mql: |
      openstack.servers.all(securityGroups.length > 0)
  - uid: mondoo-openstack-security-server-has-security-group-terraform-hcl
