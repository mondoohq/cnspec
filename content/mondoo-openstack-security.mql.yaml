  # No Terraform variants: terraform-provider-openstack does not expose Cinder volume-level encryption directly — encryption is inherited from the volume type's Cinder encryption-type configuration, which itself has no first-class Terraform resource. Re-evaluate if openstack_blockstorage_volume_type_encryption_v3 or an equivalent resource is added upstream.
  # No Terraform remediation: see above.
  - uid: mondoo-openstack-security-volume-encrypted
    title: Ensure Cinder block-storage volumes are encrypted at rest
    impact: 80
    tags:
      compliance/bsi-sys-1-5: bsi-sys-1-5-a28
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    filters: asset.platform == "openstack-project"
    mql: |
      openstack.volumes.all(encrypted == true)
    docs:
      desc: |
        This check ensures that every Cinder block-storage volume reports `encrypted = true`. An unencrypted volume's blocks sit in plaintext on the storage backend and on any media that backend rotates through.

        **Why this matters**

        - **Protects data at rest:** Encryption keeps volume contents unreadable on the underlying SAN LUNs and replicated copies.
        - **Backups and snapshots:** Encrypted volumes carry their protection into snapshots and backup media derived from them.
        - **Out-of-band exposure:** Volumes back instances, databases, and persistent state, so plaintext storage leaks data without anyone touching the workload.

        **Risk mitigation**

        - **Lost or stolen media:** Prevents data disclosure if a physical disk leaves the data center unsecured.
        - **Misrouted copies:** Keeps a misrouted snapshot or under-secured backup from exposing readable data.
      audit: |
        ### Audit via Horizon

        1. Sign in to the OpenStack Horizon dashboard as a project member.
        2. Open **Volumes** then **Volumes**.
        3. Select each volume and review the **Encrypted** attribute on its overview tab.

        A passing result shows **Encrypted** set to **Yes** for every volume; a failing result shows a volume with **Encrypted** set to **No**.

        ### Audit via CLI

        Run the OpenStack CLI and inspect the result:

        ```bash
        openstack volume show <id>
        ```

        A passing result shows `encrypted` set to `True`; a failing result shows `encrypted` set to `False`. Volume types backed by encryption can be confirmed with `openstack volume type list --long`.
      remediation:
        - id: console
          desc: |
            Encryption can only be applied by moving the volume onto an encryption-capable volume type, because the type is what binds the volume to a key. The retype copies the data to encrypted storage, so plan for the volume to be offline during the migration.

            1. Confirm with your cloud administrator which volume types provide encryption.
            2. Navigate to **Volumes → Volumes** in Horizon and detach the volume from its server if it is attached.
            3. From the volume's action menu, select **Change Volume Type**, choose the encrypted type, and set **Migration Policy** to **On Demand**.
            4. Reattach the volume once the retype completes.
        - id: cli
          desc: |
            ```bash
            # Confirm which volume types are encrypted
            openstack volume type list --long

            # Detach if needed, then retype the volume onto an encrypted type with data migration
            openstack server remove volume web-01 data-volume
            openstack volume set --type encrypted-lvm --migration-policy on-demand data-volume
            openstack server add volume web-01 data-volume
            ```

            If the backend rejects the retype, migrate the data manually. Treat this as a data-loss-prone operation and keep the original intact until the copy is verified:

            ```bash
            # 1. Create a new, empty volume of the same size on the encrypted type
            openstack volume create --type encrypted-lvm --size 50 data-volume-enc

            # 2. Stop writes to the source so the copy is consistent, then attach both
            #    volumes to a helper instance
            openstack server add volume helper-01 data-volume
            openstack server add volume helper-01 data-volume-enc

            # 3. Copy the data at the operating system level on the helper instance,
            #    for example `dd` or `rsync` between the two block devices
            ```

            After the copy completes, mount the encrypted volume and verify the data is complete and readable. Delete the unencrypted original only after this verification succeeds; if anything looks wrong, keep the original and retry the copy.
    refs:
      - url: https://docs.openstack.org/cinder/latest/configuration/block-storage/volume-encryption.html
        title: OpenStack Cinder volume encryption

  - uid: mondoo-openstack-security-image-not-public
    title: Ensure project-owned Glance images are not publicly visible
    impact: 75
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-16
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-22
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-2-1
    variants:
      - uid: mondoo-openstack-security-image-not-public-openstack
        tags:
          mondoo.com/filter-title: OpenStack Project
          mondoo.com/filter-icon: openstack
      - uid: mondoo-openstack-security-image-not-public-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-openstack-security-image-not-public-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-openstack-security-image-not-public-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Glance images owned by the scoped project do not have `visibility = "public"`. Vendor cloud images published by the operator are excluded because they belong to the cloud admin project rather than the scanned tenant.

        **Why this matters**

        - **Images carry sensitive data:** Tenant-uploaded images often embed credentials, internal CA bundles, license keys, and proprietary software.
        - **Public visibility is broad:** A public image is discoverable and downloadable by every project on the cloud.
        - **Safe defaults:** Tenant-published images should default to `private` and move to `shared` only with explicit members.

        **Risk mitigation**

        - **Data disclosure:** Prevents secrets and datasets baked into images from leaking to other tenants.
        - **Intellectual property loss:** Keeps proprietary software and golden-image content from being copied cloud-wide.
      audit: |
        ### Audit via Horizon

        1. Sign in to the OpenStack Horizon dashboard as a project member.
        2. Open **Compute** then **Images**.
        3. Select each project-owned image and review its **Visibility** attribute.

        A passing result shows project-owned images set to **Private** or **Shared**; a failing result shows a project-owned image set to **Public**.

        ### Audit via CLI

        Run the OpenStack CLI and inspect the result:

        ```bash
        openstack image show <id>
        ```

        A passing result shows `visibility` as `private` or `shared` for project-owned images; a failing result shows `visibility` as `public`.
      remediation:
        - id: console
          desc: |
            1. Navigate to **Compute → Images** in Horizon.
            2. Open the affected image and change **Visibility** to **Private** (or **Shared** with explicit member projects).
            3. If the image was already downloaded by other tenants, rotate the secret material it carries.
        - id: cli
          desc: |
            ```bash
            openstack image set --private <image>
            # or, to share with a specific project:
            openstack image set --shared <image>
            openstack image add project <image> <member-project>
            ```

            Making the image private stops new downloads but does not recall copies already taken. While it was public, any other tenant could have downloaded or cached it, so rotate any secret material the image carries (embedded credentials, keys, tokens) after restricting visibility.
        - id: terraform
          desc: |
            Either omit `visibility` on `openstack_images_image_v2` (the default is `private`) or set it explicitly to `private` or `shared`:

            ```hcl
            resource "openstack_images_image_v2" "golden_app" {
              name             = "golden-app"
              image_source_url = "https://images.internal.example.com/golden-app-1.4.qcow2"
              container_format = "bare"
              disk_format      = "qcow2"
              visibility       = "private"
            }
            ```
    refs:
      - url: https://docs.openstack.org/glance/latest/admin/manage-images.html
        title: OpenStack Glance image visibility

  - uid: mondoo-openstack-security-image-not-public-openstack
    filters: asset.platform == "openstack-project"
    mql: |
      openstack.images.where(owner.id == openstack.projectId).all(visibility != "public")
  - uid: mondoo-openstack-security-image-not-public-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "openstack_images_image_v2")
    mql: |
      terraform.resources("openstack_images_image_v2").all(
        arguments['visibility'] != "public"
      )
  - uid: mondoo-openstack-security-image-not-public-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "openstack_images_image_v2")
    mql: |
      terraform.plan.resourceChanges.where(type == "openstack_images_image_v2").all(
        change.after.visibility != "public"
      )
  - uid: mondoo-openstack-security-image-not-public-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "openstack_images_image_v2")
    mql: |
      terraform.state.resources.where(type == "openstack_images_image_v2").all(
        values.visibility != "public"
      )

  - uid: mondoo-openstack-security-image-signed
    title: Ensure project-owned Glance images carry signature properties
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-c-1-integrity
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-6
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-7
      compliance/nist-sp-800-171: false
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc6-8-2
      compliance/vda-isa-5: vda-isa-5-5-1-1
    variants:
      - uid: mondoo-openstack-security-image-signed-openstack
        tags:
          mondoo.com/filter-title: OpenStack Project
          mondoo.com/filter-icon: openstack
      - uid: mondoo-openstack-security-image-signed-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-openstack-security-image-signed-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-openstack-security-image-signed-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that every active Glance image owned by the scoped project carries the `img_signature` property, the field Nova verifies at boot when image signature verification is enabled. A Glance image is the code that compute instances run.

        **Why this matters**

        - **Boot-time integrity:** A signature lets Nova reject any image whose data does not match the operator-issued signature.
        - **Tamper detection:** Signing detects modification between image upload and instance boot.
        - **Verification prerequisite:** The signature must be present on the image record before Nova can verify it at all.

        **Risk mitigation**

        - **Malicious images:** Prevents a compromised registry mirror or unauthorized upload from booting tampered workloads.
        - **Supply-chain compromise:** Confirms the image data matches a trusted signature backed by a Barbican-stored certificate.
      audit: |
        ### Audit via Horizon

        1. Sign in to the OpenStack Horizon dashboard as a project member.
        2. Open **Compute** then **Images**.
        3. Select each active project-owned image and review its custom properties for `img_signature`.

        A passing result shows the `img_signature` property present on every active project-owned image; a failing result shows an active image missing it.

        ### Audit via CLI

        Run the OpenStack CLI and inspect the result:

        ```bash
        openstack image show <id>
        ```

        A passing result shows an `img_signature` property in the image properties; a failing result shows no `img_signature` property.
      remediation:
        - id: console
          desc: |
            Horizon does not expose signature upload directly. Use the CLI procedure below, which builds the certificate, signature, and image properties in order.
        - id: cli
          desc: |
            Image signing has a prerequisite: the signing certificate must live in Barbican so Nova can fetch it at boot to verify the signature. Build the chain in order so the `img_signature_certificate_uuid` you attach to the image actually resolves to the certificate that signed the image data.

            ```bash
            # 1. Generate a signing key and a self-signed certificate (or use one
            #    issued by your CA) that will validate the image signature
            openssl genrsa -out signing.key 3072
            openssl req -new -x509 -key signing.key -out signing.cert -days 365 \
              -subj "/CN=image-signing"

            # 2. Store the certificate in Barbican and capture its secret UUID; this
            #    UUID is what Nova uses to verify the signature at boot time
            openstack secret store --name image-signing-cert \
              --algorithm RSA --secret-type certificate \
              --payload-content-type "application/octet-stream" \
              --payload-content-encoding base64 \
              --payload "$(base64 -w0 signing.cert)"
            # Note the "Secret href" / UUID returned by the command above

            # 3. Sign the image data with the matching private key and base64-encode it
            openssl dgst -sha256 -sign signing.key \
              -sigopt rsa_padding_mode:pss -sigopt rsa_pss_saltlen:-1 \
              -out image.sig golden-app.qcow2
            base64 -w0 image.sig > image.sig.b64

            # 4. Attach the signature properties to the image record, pointing
            #    img_signature_certificate_uuid at the Barbican secret from step 2
            openstack image set <image> \
              --property img_signature="$(cat image.sig.b64)" \
              --property img_signature_hash_method="SHA-256" \
              --property img_signature_key_type="RSA-PSS" \
              --property img_signature_certificate_uuid="<barbican-cert-uuid>"
            ```

            See the Glance image signature verification docs for the full procedure, including how to enable signature verification in Nova so the attached signature is enforced at boot.
        - id: terraform
          desc: |
            Set the `properties` map on `openstack_images_image_v2` so the signature fields ship with the image record:

            ```hcl
            resource "openstack_images_image_v2" "golden_app" {
              name             = "golden-app"
              image_source_url = "https://images.internal.example.com/golden-app-1.4.qcow2"
              container_format = "bare"
              disk_format      = "qcow2"
              visibility       = "private"

              properties = {
                img_signature                  = file("${path.module}/golden-app-1.4.sig.b64")
                img_signature_hash_method      = "SHA-256"
                img_signature_key_type         = "RSA-PSS"
                img_signature_certificate_uuid = var.signing_cert_barbican_uuid
              }
            }
            ```
    refs:
      - url: https://docs.openstack.org/glance/latest/user/signature.html
        title: OpenStack Glance image signature verification

  - uid: mondoo-openstack-security-image-signed-openstack
    filters: asset.platform == "openstack-project"
    mql: |
      openstack.images.where(status == "active" && owner.id == openstack.projectId).all(
        imageSignature != ""
      )
  - uid: mondoo-openstack-security-image-signed-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "openstack_images_image_v2")
    mql: |
      terraform.resources("openstack_images_image_v2").all(
        arguments['properties'] != null && arguments['properties']['img_signature'] != null
      )
  - uid: mondoo-openstack-security-image-signed-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "openstack_images_image_v2")
    mql: |
      terraform.plan.resourceChanges.where(type == "openstack_images_image_v2").all(
        change.after.properties != null && change.after.properties['img_signature'] != null
      )
  - uid: mondoo-openstack-security-image-signed-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "openstack_images_image_v2")
    mql: |
      terraform.state.resources.where(type == "openstack_images_image_v2").all(
        values.properties != null && values.properties['img_signature'] != null
      )

  - uid: mondoo-openstack-security-container-not-public
    title: Ensure Swift containers are not publicly readable
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-16
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-22
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-2-1
    variants:
      - uid: mondoo-openstack-security-container-not-public-openstack
        tags:
          mondoo.com/filter-title: OpenStack Project
          mondoo.com/filter-icon: openstack
      - uid: mondoo-openstack-security-container-not-public-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-openstack-security-container-not-public-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-openstack-security-container-not-public-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that no Swift object-storage container has an `X-Container-Read` ACL containing `.r:*`, which grants unauthenticated read access to every object in the container. Swift containers commonly hold backups, logs, build artifacts, and user uploads.

        **Why this matters**

        - **Sensitive asset classes:** Backups, logs, and uploads frequently carry material that should never be public.
        - **Direct download exposure:** An ACL of `.r:*` makes every object downloadable by anyone who can guess or scrape the URL.
        - **Common breach pattern:** Cloud-storage exposure of this shape is a routine source of high-impact data breaches.

        **Risk mitigation**

        - **Unauthenticated access:** Prevents anonymous users on the public internet from reading container contents.
        - **Data leakage:** Keeps logs, artifacts, and uploads from being exposed unless the container is genuinely meant for public distribution.
      audit: |
        ### Audit via Horizon

        1. Sign in to the OpenStack Horizon dashboard as a project member.
        2. Open **Object Store** then **Containers**.
        3. Select each container and review whether **Public Access** is enabled.

        A passing result shows **Public Access** disabled for every container; a failing result shows a container with public read access enabled.

        ### Audit via CLI

        Run the OpenStack CLI and inspect the result:

        ```bash
        openstack container show <name>
        ```

        A passing result shows no `.r:*` entry in the container read ACL; a failing result shows `.r:*` in the read ACL, which can also be confirmed with `swift stat <container>`.
      remediation:
        - id: console
          desc: |
            1. Navigate to **Object Store → Containers** in Horizon.
            2. Select the affected container and clear the **Public Access** checkbox.
        - id: cli
          desc: |
            ```bash
            # Clear the read ACL entirely
            swift post backups -r ""
            # Or restrict to the project's authenticated users only
            swift post backups -r "f47ac10b58cc4372a5670e02b2c3d479:*"
            ```
        - id: terraform
          desc: |
            Never set `container_read = ".r:*"` on `openstack_objectstorage_container_v1`. Omit `container_read` to keep the container private, or scope it to the project:

            ```hcl
            resource "openstack_objectstorage_container_v1" "backups" {
              name           = "backups"
              container_read = "${var.project_id}:*"
            }
            ```
    refs:
      - url: https://docs.openstack.org/swift/latest/overview_acl.html
        title: OpenStack Swift container ACLs

  - uid: mondoo-openstack-security-container-not-public-openstack
    filters: asset.platform == "openstack-project"
    mql: |
      openstack.objectStorageContainers.all(public == false)
  - uid: mondoo-openstack-security-container-not-public-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "openstack_objectstorage_container_v1")
    mql: |
      terraform.resources("openstack_objectstorage_container_v1").all(
        arguments['container_read'] == null || arguments['container_read'].contains(".r:*") == false
