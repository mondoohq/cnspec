        values.security_groups != null && values.security_groups.length > 0
      )

  # Security-only check (compliance mapping intentionally omitted per maintainer).
  # No Terraform variants: internetReachable is a runtime-computed exposure signal (IP + security group/firewall reachability) with no static config analog.
  - uid: mondoo-openstack-security-server-not-internet-reachable
    title: Ensure compute servers are not reachable from the internet
    impact: 85
    filters: asset.platform == "openstack-project"
    mql: |
      openstack.servers.all( exposure.internetReachable == false )
    docs:
      desc: |
        This check ensures that no Nova compute server is reachable from the public internet. `internetReachable` combines a public edge (a floating IP or a port on an external network) with a security-group rule that actually permits inbound traffic from a public source, so it reports a server as exposed only when both conditions hold — a higher-fidelity "actually exposed" signal than a public-IP flag alone.

        **Why this matters**

        - **Reduced attack surface:** A server with no internet-reachable path keeps its listening services off the public scanning grid entirely.
        - **Defense in depth:** Combining a public IP with a permissive security-group rule is what turns a reachable address into an exploitable one; removing either side closes the path.
        - **Fewer false alarms:** Because the signal correlates the IP and the security-group rules, it surfaces servers that are genuinely exposed rather than every server that merely holds a floating IP.

        **Risk mitigation**

        - **Internet-wide exploitation:** Prevents listening services from being probed and attacked by arbitrary internet hosts.
        - **Lateral movement entry:** Removes a public foothold an attacker could use to reach the rest of the project network.

        Intentionally public hosts such as bastions and public web servers will fail this check and should be exempted.
      audit: |
        ### Audit via Horizon

        1. Sign in to the OpenStack Horizon dashboard as a project member.
        2. Open **Compute** then **Instances** and review each instance's **IP Address** and floating IP assignment.
        3. Open **Network** then **Security Groups** and review the ingress rules of the groups attached to each reachable instance.

        A passing result shows that any instance with a floating IP or an external-network port has no security-group ingress rule permitting traffic from `0.0.0.0/0` or `::/0`; a failing result shows an instance that has both a public edge and a permissive ingress rule.

        ### Audit via CLI

        Run the OpenStack CLI and inspect the result:

        ```bash
        openstack server list --long
        openstack security group rule list <group>
        ```

        A passing result shows no server that combines a floating IP (or external-network port) with an ingress rule open to `0.0.0.0/0` or `::/0`; a failing result shows a server that has both.
      remediation:
        - id: console
          desc: |
            Close the internet-reachable path by tightening the security group or removing the public edge. Keep management access while you do it.

            1. Navigate to **Network → Security Groups** in Horizon and open the group attached to the affected instance.
            2. Replace any ingress rule sourced from `0.0.0.0/0` or `::/0` with a rule scoped to a specific trusted CIDR, then confirm legitimate clients still reach the service.
            3. If the server does not need a public edge at all, navigate to **Compute → Instances**, open the instance, and disassociate its floating IP under the action menu.
        - id: cli
          desc: |
            ```bash
            # Scope the world-open ingress rule to a trusted CIDR
            openstack security group rule create app-sg \
              --ingress --protocol tcp --dst-port 443 --remote-ip 203.0.113.0/24
            openstack security group rule delete 4a4ee176-43e6-4b48-8bcf-5acd1c403fbf
            # Or, if the server needs no public edge, remove its floating IP
            openstack server remove floating ip web-01 203.0.113.50
            ```
    refs:
      - url: https://docs.openstack.org/security-guide/networking.html
        title: OpenStack Neutron security groups

  - uid: mondoo-openstack-security-no-unrestricted-ssh
    title: Ensure no security group allows unrestricted inbound SSH (port 22)
    impact: 100
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-openstack-security-no-unrestricted-ssh-openstack
        tags:
          mondoo.com/filter-title: OpenStack Project
          mondoo.com/filter-icon: openstack
      - uid: mondoo-openstack-security-no-unrestricted-ssh-openstack-security-group
        tags:
          mondoo.com/filter-title: OpenStack Security Group
          mondoo.com/filter-icon: openstack
      - uid: mondoo-openstack-security-no-unrestricted-ssh-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-openstack-security-no-unrestricted-ssh-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-openstack-security-no-unrestricted-ssh-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that no Neutron security group has an ingress rule that allows TCP traffic on port 22 from the public internet at `0.0.0.0/0` or `::/0`. SSH exposed to the entire internet is a primary target for automated attacks against the SSH daemon.

        **Why this matters**

        - **Reduced attack surface:** Restricting SSH keeps the daemon from being a globally reachable target for credential stuffing and brute-force attempts.
        - **CVE containment:** Limiting reachable SSH listeners reduces exposure to any future SSH server vulnerability.
        - **Defense beyond keys:** Even with key-based authentication, an open SSH port still exposes the daemon itself as an attack surface.

        **Risk mitigation**

        - **Brute-force compromise:** Confines SSH access to trusted CIDRs, a bastion host, or a VPN so login attempts come only from known sources.
        - **Internet-wide scanning:** Removes the listener from mass-scanning campaigns that probe every reachable SSH port.
      audit: |
        ### Audit via Horizon

        1. Sign in to the OpenStack Horizon dashboard as a project member.
        2. Open **Network** then **Security Groups**.
        3. For each security group, open **Manage Rules** and review the ingress rules.

        A passing result shows no ingress rule allowing TCP port 22 from `0.0.0.0/0` or `::/0`; a failing result shows such a rule.

        ### Audit via CLI

        Run the OpenStack CLI and inspect the result:

        ```bash
        openstack security group rule list <group>
        ```

        A passing result shows no ingress TCP rule covering port 22 with a remote IP prefix of `0.0.0.0/0` or `::/0`; a failing result shows one.
      remediation:
        - id: console
          desc: |
            1. Navigate to **Network → Security Groups** in Horizon and open the affected security group.
            2. Add a new ingress rule for TCP port 22 with **CIDR** set to a specific trusted range.
            3. Confirm you can still reach the affected instances from the trusted range, then delete the rule open to `0.0.0.0/0` or `::/0`. Removing the open rule drops live SSH sessions that arrived through it.
        - id: cli
          desc: |
            ```bash
            # Add the scoped rule first so management access survives the change
            openstack security group rule create web-sg \
              --ingress --protocol tcp --dst-port 22 --remote-ip 203.0.113.0/24
            # Then remove the world-open rule; live sessions through it are dropped
            openstack security group rule delete 4a4ee176-43e6-4b48-8bcf-5acd1c403fbf
            ```
        - id: terraform
          desc: |
            Scope inbound SSH `remote_ip_prefix` to a specific trusted CIDR, never `0.0.0.0/0` or `::/0`:

            ```hcl
            resource "openstack_networking_secgroup_rule_v2" "ssh" {
              direction         = "ingress"
              ethertype         = "IPv4"
              protocol          = "tcp"
              port_range_min    = 22
              port_range_max    = 22
              remote_ip_prefix  = "203.0.113.0/24"
              security_group_id = openstack_networking_secgroup_v2.web.id
            }
            ```
    refs:
      - url: https://docs.openstack.org/security-guide/networking.html
        title: OpenStack Neutron security groups

  - uid: mondoo-openstack-security-no-unrestricted-ssh-openstack
    filters: asset.platform == "openstack-project"
    mql: |
      openstack.securityGroups.all(
        rules.where(direction == "ingress").where(remoteIpPrefix == "0.0.0.0/0" || remoteIpPrefix == "::/0").where(protocol == "tcp" || protocol == "").none(
          portRangeMin <= 22 && portRangeMax >= 22
        )
      )
  - uid: mondoo-openstack-security-no-unrestricted-ssh-openstack-security-group
    filters: asset.platform == "openstack-security-group"
    mql: |
      openstack.securityGroup.rules.where(direction == "ingress").where(remoteIpPrefix == "0.0.0.0/0" || remoteIpPrefix == "::/0").where(protocol == "tcp" || protocol == "").none(
        portRangeMin <= 22 && portRangeMax >= 22
      )
  - uid: mondoo-openstack-security-no-unrestricted-ssh-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "openstack_networking_secgroup_rule_v2")
    mql: |
      terraform.resources("openstack_networking_secgroup_rule_v2").where(arguments['direction'] == "ingress").where(arguments['remote_ip_prefix'] == "0.0.0.0/0" || arguments['remote_ip_prefix'] == "::/0").where(arguments['protocol'] == "tcp" || arguments['protocol'] == "").none(
        arguments['port_range_min'] <= 22 && arguments['port_range_max'] >= 22
      )
  - uid: mondoo-openstack-security-no-unrestricted-ssh-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "openstack_networking_secgroup_rule_v2")
    mql: |
      terraform.plan.resourceChanges.where(type == "openstack_networking_secgroup_rule_v2").where(change.after.direction == "ingress").where(change.after.remote_ip_prefix == "0.0.0.0/0" || change.after.remote_ip_prefix == "::/0").where(change.after.protocol == "tcp" || change.after.protocol == "").none(
        change.after.port_range_min <= 22 && change.after.port_range_max >= 22
      )
  - uid: mondoo-openstack-security-no-unrestricted-ssh-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "openstack_networking_secgroup_rule_v2")
    mql: |
      terraform.state.resources.where(type == "openstack_networking_secgroup_rule_v2").where(values.direction == "ingress").where(values.remote_ip_prefix == "0.0.0.0/0" || values.remote_ip_prefix == "::/0").where(values.protocol == "tcp" || values.protocol == "").none(
        values.port_range_min <= 22 && values.port_range_max >= 22
      )

  - uid: mondoo-openstack-security-firewall-policy-audited
    title: Ensure FWaaS firewall policies have been audited
    impact: 40
