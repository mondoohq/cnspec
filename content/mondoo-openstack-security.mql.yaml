  - uid: mondoo-openstack-security-no-unrestricted-db-ports
    title: Ensure no security group allows unrestricted inbound database ports
    impact: 95
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-openstack-security-no-unrestricted-db-ports-openstack
        tags:
          mondoo.com/filter-title: OpenStack Project
          mondoo.com/filter-icon: openstack
      - uid: mondoo-openstack-security-no-unrestricted-db-ports-openstack-security-group
        tags:
          mondoo.com/filter-title: OpenStack Security Group
          mondoo.com/filter-icon: openstack
      - uid: mondoo-openstack-security-no-unrestricted-db-ports-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-openstack-security-no-unrestricted-db-ports-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-openstack-security-no-unrestricted-db-ports-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that no Neutron security group has an ingress rule that allows traffic from the public internet at `0.0.0.0/0` or `::/0` to common database ports, covering MySQL and MariaDB on 3306, PostgreSQL on 5432, MongoDB on 27017, Redis on 6379, Memcached on 11211, Elasticsearch on 9200, Microsoft SQL Server on 1433, and Oracle on 1521. Database services assume a private network for their authentication, encryption defaults, and patching cadence.

        **Why this matters**

        - **Designed for private networks:** Database authentication and encryption defaults are not built for direct internet exposure.
        - **High-value target:** A publicly reachable database port invites credential-stuffing and version-specific exploits.
        - **Tiered architecture:** Database tiers belong behind an application tier, accepting connections only from that tier or trusted internal CIDRs.

        **Risk mitigation**

        - **Data exfiltration:** Prevents accidental data leaks from databases reachable over the internet with weak authentication.
        - **Targeted exploitation:** Removes database ports from internet-wide scanning that probes for known vulnerable versions.
      audit: |
        ### Audit via Horizon

        1. Sign in to the OpenStack Horizon dashboard as a project member.
        2. Open **Network** then **Security Groups**.
        3. For each security group, open **Manage Rules** and review the ingress rules.

        A passing result shows no ingress rule allowing a database port such as 3306, 5432, 27017, 6379, 11211, 9200, 1433, or 1521 from `0.0.0.0/0` or `::/0`; a failing result shows such a rule.

        ### Audit via CLI

        Run the OpenStack CLI and inspect the result:

        ```bash
        openstack security group rule list <group>
        ```

        A passing result shows no ingress rule covering a common database port with a remote IP prefix of `0.0.0.0/0` or `::/0`; a failing result shows one.
      remediation:
        - id: console
          desc: |
            1. Navigate to **Network → Security Groups** in Horizon and open the affected security group.
            2. Add a replacement ingress rule for the database port with **CIDR** scoped to a specific trusted range, or a **Remote Security Group** rule that allows only the application tier's security group.
            3. Confirm the application tier can still reach the database, then delete the rule open to `0.0.0.0/0` or `::/0`. Removing the open rule drops connections established through it.
        - id: cli
          desc: |
            ```bash
            # Add the scoped rule first so the application tier keeps its database access
            openstack security group rule create db-sg \
              --ingress --protocol tcp --dst-port 3306 --remote-group app-sg
            # Then remove the world-open rule; connections established through it are dropped
            openstack security group rule delete 4a4ee176-43e6-4b48-8bcf-5acd1c403fbf
            ```
        - id: terraform
          desc: |
            Constrain database ingress with `remote_group_id` or a private `remote_ip_prefix`:

            ```hcl
            resource "openstack_networking_secgroup_rule_v2" "db_from_app" {
              direction         = "ingress"
              ethertype         = "IPv4"
              protocol          = "tcp"
              port_range_min    = 3306
              port_range_max    = 3306
              remote_group_id   = openstack_networking_secgroup_v2.app.id
              security_group_id = openstack_networking_secgroup_v2.db.id
            }
            ```
