  - uid: mondoo-openstack-security-server-uses-keypair
    title: Ensure compute servers are launched with an SSH keypair
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-14
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-2
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-3
    variants:
      - uid: mondoo-openstack-security-server-uses-keypair-openstack
        tags:
          mondoo.com/filter-title: OpenStack Project
          mondoo.com/filter-icon: openstack
      - uid: mondoo-openstack-security-server-uses-keypair-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-openstack-security-server-uses-keypair-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-openstack-security-server-uses-keypair-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that every Nova compute server was launched with an SSH keypair through the `key_name` attribute. A server booted without an injected keypair falls back on whatever credentials are baked into the source image.

        **Why this matters**

        - **Controlled initial access:** Injecting a keypair binds the server's first login to a per-user public key the project administrator controls.
        - **No reliance on image defaults:** Servers launched without a keypair depend on baked-in passwords, disabled access, or forgotten operator accounts.
        - **Foundation for hardening:** A known keypair is the starting point for further SSH hardening such as disabled password authentication, bastion hosts, and MFA.

        **Risk mitigation**

        - **Default credentials:** Prevents reliance on well-known image passwords that attackers routinely try.
        - **Unmanaged accounts:** Eliminates dependence on backdoor accounts an operator added once and never removed.
      audit: |
        ### Audit via Horizon

        1. Sign in to the OpenStack Horizon dashboard as a project member.
        2. Open **Compute** then **Instances**.
        3. Select each instance and review the **Key Pair** field on its overview tab.

        A passing result shows a key pair name assigned to every instance; a failing result shows an instance with no key pair.

        ### Audit via CLI

        Run the OpenStack CLI and inspect the result:

        ```bash
        openstack server show <id>
        ```

        A passing result shows a populated `key_name` value; a failing result shows `key_name` as empty or `None`.
      remediation:
        - id: console
          desc: |
            1. Navigate to **Compute → Instances** in Horizon.
            2. The keypair cannot be added to an existing server. Snapshot the workload, then launch a replacement with **Key Pair** set to a managed keypair. An instance snapshot captures the root disk only, so it may not include data on attached Cinder volumes; those volumes migrate separately in the next step.
            3. Move any floating IPs and attached volumes to the replacement, then confirm you can log in to the replacement over SSH with the new keypair.
            4. Delete the original instance only after SSH access to the replacement is verified. Deleting it first risks locking you out if the new keypair was not injected correctly. The check keeps failing while the keyless server exists.
        - id: cli
          desc: |
            ```bash
            # Boot a replacement instance with a keypair injected at launch
            openstack server create replacement \
              --image ubuntu-24.04 --flavor m1.small --network app-net \
              --key-name ops-key
            # Move floating IPs and volumes over, then confirm SSH access to the
            # replacement with the new keypair before deleting the original
            openstack server delete original-server
            ```
        - id: terraform
          desc: |
            Always set `key_pair` on `openstack_compute_instance_v2`:

            ```hcl
            resource "openstack_compute_keypair_v2" "ops" {
              name       = "ops"
              public_key = file("~/.ssh/id_ed25519.pub")
            }

            resource "openstack_compute_instance_v2" "app" {
              name      = "app"
              image_id  = data.openstack_images_image_v2.ubuntu.id
              flavor_id = data.openstack_compute_flavor_v2.standard.id
              key_pair  = openstack_compute_keypair_v2.ops.name
            }
            ```
    refs:
      - url: https://docs.openstack.org/nova/latest/user/manage-ip-addresses.html
        title: OpenStack Nova compute instance access

