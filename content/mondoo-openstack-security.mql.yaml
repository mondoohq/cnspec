  - uid: mondoo-openstack-security-no-all-ports-open
    title: Ensure no security group allows unrestricted inbound traffic to all ports
    impact: 100
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-openstack-security-no-all-ports-open-openstack
        tags:
          mondoo.com/filter-title: OpenStack Project
          mondoo.com/filter-icon: openstack
      - uid: mondoo-openstack-security-no-all-ports-open-openstack-security-group
        tags:
          mondoo.com/filter-title: OpenStack Security Group
          mondoo.com/filter-icon: openstack
      - uid: mondoo-openstack-security-no-all-ports-open-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-openstack-security-no-all-ports-open-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-openstack-security-no-all-ports-open-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that no Neutron security group has an ingress rule that allows the full port range from the public internet at `0.0.0.0/0` or `::/0`. In Neutron, leaving `port_range_min` and `port_range_max` unset means the rule matches every port.

        **Why this matters**

        - **Equivalent to no firewall:** An allow-all-ports rule is functionally the same as having no security group at all.
        - **Total service exposure:** Every service on the instance, intended or forgotten, becomes reachable from every host on the internet.
        - **Highest-severity misconfiguration:** This pattern offers no network isolation and undermines every other control on the instance.

        **Risk mitigation**

        - **Broad attack surface:** Prevents exposure of services the operator never intended to publish.
        - **Forgotten listeners:** Removes internet reach to legacy or debugging services left running on unexpected ports.
      audit: |
        ### Audit via Horizon

        1. Sign in to the OpenStack Horizon dashboard as a project member.
        2. Open **Network** then **Security Groups**.
        3. For each security group, open **Manage Rules** and review the ingress rules.

        A passing result shows no ingress rule covering all ports from `0.0.0.0/0` or `::/0`; a failing result shows an all-ports rule open to the internet.

        ### Audit via CLI

        Run the OpenStack CLI and inspect the result:

        ```bash
        openstack security group rule list <group>
        ```

        A passing result shows no ingress rule with an empty port range and a remote IP prefix of `0.0.0.0/0` or `::/0`; a failing result shows one.
      remediation:
        - id: console
          desc: |
            1. Navigate to **Network → Security Groups** in Horizon and open the affected security group.
            2. Add narrow per-service ingress rules scoped to the specific ports and source CIDRs the workload needs, including the port you manage the instance over.
            3. Confirm the services and your management path still work, then delete the allow-all rule. Removing it drops every connection that was admitted through it.
        - id: cli
          desc: |
            ```bash
            # Add the narrow per-service rules first
            openstack security group rule create web-sg \
              --ingress --protocol tcp --dst-port 443 --remote-ip 0.0.0.0/0
            openstack security group rule create web-sg \
              --ingress --protocol tcp --dst-port 22 --remote-ip 203.0.113.0/24
            # Then remove the allow-all rule; connections admitted through it are dropped
            openstack security group rule delete 4a4ee176-43e6-4b48-8bcf-5acd1c403fbf
            ```
        - id: terraform
          desc: |
            Never declare a security group rule whose ingress range covers all ports from `0.0.0.0/0` or `::/0`. Use narrow per-service rules:

            ```hcl
            resource "openstack_networking_secgroup_rule_v2" "https" {
              direction         = "ingress"
              ethertype         = "IPv4"
              protocol          = "tcp"
              port_range_min    = 443
              port_range_max    = 443
              remote_ip_prefix  = "0.0.0.0/0"
              security_group_id = openstack_networking_secgroup_v2.web.id
            }
            ```
    refs:
      - url: https://docs.openstack.org/security-guide/networking.html
        title: OpenStack Neutron security groups

