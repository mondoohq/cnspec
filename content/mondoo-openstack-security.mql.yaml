  - uid: mondoo-openstack-security-share-no-world-access
    title: Ensure Manila shares are not exported to all source IP addresses
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-openstack-security-share-no-world-access-openstack
        tags:
          mondoo.com/filter-title: OpenStack Project
          mondoo.com/filter-icon: openstack
      - uid: mondoo-openstack-security-share-no-world-access-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-openstack-security-share-no-world-access-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-openstack-security-share-no-world-access-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that no Manila share has an IP-based access rule whose `access_to` is `0.0.0.0/0` or `::/0`. An access rule covering every source address lets any host that can route to the share server mount the export, subject only to the protocol's own (often weak) authentication.

        **Why this matters**

        - **NFS trusts the network:** NFS access rules grant mount rights by source address, so an all-addresses rule effectively removes the access control entirely.
        - **Designed for known clients:** Share access rules are meant to enumerate specific client CIDRs, not to publish the export to everything that can reach it.
        - **Read-write exposure:** A world-scoped rule that grants read-write turns the export into shared, attacker-writable storage.

        **Risk mitigation**

        - **Unauthorized mounts:** Confines mount rights to the specific client networks that need the share.
        - **Data tampering:** Stops untrusted hosts from reading or overwriting the contents of the export.
      audit: |
        ### Audit via Horizon

        1. Sign in to the OpenStack Horizon dashboard as a project member.
        2. Open **Share** then **Shares**.
        3. Select each share, open its **Rules** tab, and review the IP access rules.

        A passing result shows no IP access rule with **Access to** set to `0.0.0.0/0` or `::/0`; a failing result shows such a rule.

        ### Audit via CLI

        Run the OpenStack CLI and inspect the result:

        ```bash
        openstack share access list <share>
        ```

        A passing result shows no `ip` access rule whose **Access To** is `0.0.0.0/0` or `::/0`; a failing result shows one.
      remediation:
        - id: console
          desc: |
            1. Navigate to **Share → Shares** in Horizon and open the share's **Rules** tab.
            2. Add a replacement rule scoped to the specific client CIDR that needs the share, with the access level those clients require.
            3. Confirm the clients can still reach the share, then delete the rule whose **Access to** is `0.0.0.0/0` or `::/0`. Removing it cuts off any client still relying on it.
        - id: cli
          desc: |
            ```bash
            # Grant the scoped rule first so existing clients keep access;
            # match the access level the clients actually need
            openstack share access create data-share ip 203.0.113.0/24 --access-level rw
            # Then remove the world-open rule
            openstack share access delete data-share 4a4ee176-43e6-4b48-8bcf-5acd1c403fbf
            ```
        - id: terraform
          desc: |
            Scope `access_to` on `openstack_sharedfilesystem_share_access_v2` to a specific trusted CIDR, never `0.0.0.0/0` or `::/0`:

            ```hcl
            resource "openstack_sharedfilesystem_share_access_v2" "clients" {
              share_id     = openstack_sharedfilesystem_share_v2.data.id
              access_type  = "ip"
              access_to    = "203.0.113.0/24"
              access_level = "ro"
            }
            ```
    refs:
      - url: https://docs.openstack.org/manila/latest/user/share-management.html
        title: OpenStack Manila share access rules

  - uid: mondoo-openstack-security-share-no-world-access-openstack
    filters: asset.platform == "openstack-project"
    mql: |
      openstack.shares.all(
        accessRules.where(accessType == "ip").none(accessTo == "0.0.0.0/0" || accessTo == "::/0")
      )
  - uid: mondoo-openstack-security-share-no-world-access-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "openstack_sharedfilesystem_share_access_v2")
    mql: |
      terraform.resources("openstack_sharedfilesystem_share_access_v2").where(arguments['access_type'] == "ip").none(
        arguments['access_to'] == "0.0.0.0/0" || arguments['access_to'] == "::/0"
      )
  - uid: mondoo-openstack-security-share-no-world-access-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "openstack_sharedfilesystem_share_access_v2")
    mql: |
      terraform.plan.resourceChanges.where(type == "openstack_sharedfilesystem_share_access_v2").where(change.after.access_type == "ip").none(
        change.after.access_to == "0.0.0.0/0" || change.after.access_to == "::/0"
      )
  - uid: mondoo-openstack-security-share-no-world-access-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "openstack_sharedfilesystem_share_access_v2")
    mql: |
      terraform.state.resources.where(type == "openstack_sharedfilesystem_share_access_v2").where(values.access_type == "ip").none(
        values.access_to == "0.0.0.0/0" || values.access_to == "::/0"
      )

  - uid: mondoo-openstack-security-cluster-template-tls-enabled
    title: Ensure Magnum cluster templates do not disable control plane TLS
    impact: 95
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-2-ii-transmission-security-encryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    variants:
      - uid: mondoo-openstack-security-cluster-template-tls-enabled-openstack
        tags:
          mondoo.com/filter-title: OpenStack Project
          mondoo.com/filter-icon: openstack
      - uid: mondoo-openstack-security-cluster-template-tls-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-openstack-security-cluster-template-tls-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-openstack-security-cluster-template-tls-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that no Magnum cluster template sets `tls_disabled = true`. With TLS disabled, the cluster's orchestration API — the Kubernetes API server on a Kubernetes cluster — accepts unauthenticated, unencrypted connections, and every cluster built from the template inherits that posture.

        **Why this matters**

        - **The control plane is the keys to the cluster:** An unauthenticated orchestration API lets anyone who can reach it schedule workloads, read secrets, and take over every node.
        - **Plaintext credentials:** Without TLS, client certificates and bearer tokens cross the network in the clear and can be captured on the path.
        - **Template inheritance:** A single insecure template silently weakens every cluster created from it, so the fix belongs at the template.

        **Risk mitigation**

        - **Cluster takeover:** Prevents an attacker from issuing API calls against an unauthenticated control plane.
        - **Credential interception:** Keeps API traffic encrypted so tokens and certificates cannot be sniffed in transit.
      audit: |
        ### Audit via Horizon

        1. Sign in to the OpenStack Horizon dashboard as a project member.
        2. Open **Container Infra** then **Cluster Templates**.
        3. Select each template and review whether **Disable TLS** is set.

        A passing result shows **Disable TLS** unset for every template; a failing result shows a template with TLS disabled.

        ### Audit via CLI

        Run the OpenStack CLI and inspect the result:

        ```bash
        openstack coe cluster template show <template>
        ```

        A passing result shows `tls_disabled` set to `False`; a failing result shows `tls_disabled` set to `True`.
      remediation:
        - id: console
          desc: |
            1. Open **Container Infra → Cluster Templates** in Horizon.
            2. If no cluster references the template, fix it in place with the CLI, since Horizon does not expose template patching.
            3. If clusters reference the template, create a replacement template with **Disable TLS** left unset. Existing clusters cannot switch templates: rebuild each cluster from the new template, move its workloads, then delete the old cluster and template.
        - id: cli
          desc: |
            Magnum locks a cluster template once any cluster references it: a referenced template cannot be updated or deleted until every cluster built from it is gone. In-place patching therefore only works on templates that no cluster references yet. Even then, the docs do not enumerate which attributes accept a patch, so a `tls_disabled` update may be rejected; if it is, fall back to creating a replacement template.

            ```bash
            # Confirm no cluster references the template before attempting a patch
            openstack coe cluster list

            # Patch the template in place only while it is unreferenced; this may be
            # rejected if Magnum treats tls_disabled as non-updatable
            openstack coe cluster template update secure-template replace tls_disabled=false

            # If clusters reference it (or the patch is rejected), create a
            # TLS-enabled replacement (tls_disabled defaults to false) and rebuild
            # clusters from it, then retire the old clusters and template
            openstack coe cluster template create secure-template-v2 \
              --image fedora-coreos-38 --keypair ops-key \
              --external-network public --coe kubernetes \
              --flavor m1.small --docker-volume-size 10
            ```
        - id: terraform
          desc: |
            Either omit `tls_disabled` on `openstack_containerinfra_clustertemplate_v1` (the default is `false`) or set it explicitly:

            ```hcl
            resource "openstack_containerinfra_clustertemplate_v1" "k8s" {
              name                  = "k8s"
              image                 = "fedora-coreos"
              coe                   = "kubernetes"
              external_network_id   = openstack_networking_network_v2.public.id
              tls_disabled          = false
            }
            ```
    refs:
      - url: https://docs.openstack.org/magnum/latest/user/index.html
        title: OpenStack Magnum cluster templates

  - uid: mondoo-openstack-security-cluster-template-tls-enabled-openstack
    filters: asset.platform == "openstack-project"
    mql: |
      openstack.clusterTemplates.all(tlsDisabled == false)
  - uid: mondoo-openstack-security-cluster-template-tls-enabled-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "openstack_containerinfra_clustertemplate_v1")
    mql: |
      terraform.resources("openstack_containerinfra_clustertemplate_v1").all(
        arguments['tls_disabled'] != true
      )
  - uid: mondoo-openstack-security-cluster-template-tls-enabled-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "openstack_containerinfra_clustertemplate_v1")
    mql: |
      terraform.plan.resourceChanges.where(type == "openstack_containerinfra_clustertemplate_v1").all(
        change.after.tls_disabled != true
      )
  - uid: mondoo-openstack-security-cluster-template-tls-enabled-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "openstack_containerinfra_clustertemplate_v1")
    mql: |
      terraform.state.resources.where(type == "openstack_containerinfra_clustertemplate_v1").all(
        values.tls_disabled != true
      )

  - uid: mondoo-openstack-security-cluster-template-no-floating-ip
    title: Ensure Magnum cluster templates do not enable floating IPs
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-06
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-5
      compliance/pci-dss-4: pcidss-requirement-1-4-1
      compliance/soc2-2017: soc2-control-cc6-1-5
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-openstack-security-cluster-template-no-floating-ip-openstack
        tags:
          mondoo.com/filter-title: OpenStack Project
          mondoo.com/filter-icon: openstack
      - uid: mondoo-openstack-security-cluster-template-no-floating-ip-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-openstack-security-cluster-template-no-floating-ip-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-openstack-security-cluster-template-no-floating-ip-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that no Magnum cluster template sets `floating_ip_enabled = true`. When floating IPs are enabled, cluster nodes including the control plane are assigned public addresses at creation time, placing the Kubernetes API server and the nodes directly on the internet. Every cluster built from the template inherits that posture.

        **Why this matters**

        - **Control plane on the internet:** A control-plane node with a floating IP exposes the Kubernetes API server to the public internet, where it becomes a target for credential attacks and API-level exploits.
        - **Node exposure:** Worker nodes with public addresses widen the attack surface to every service that binds to a node interface.
        - **Template inheritance:** A single template with floating IPs enabled silently exposes every cluster created from it, so the fix belongs at the template.

        **Risk mitigation**

        - **Cluster takeover:** Keeping nodes on the private network removes the direct internet path to the control plane.
        - **Reduced attack surface:** Without floating IPs, the cluster is reachable only through a deliberately placed load balancer or bastion rather than on every node.

        Clusters that genuinely require public node addressing should front the API server with a load balancer and restrict access there rather than assigning floating IPs to every node.
      audit: |
        ### Audit via Horizon

        1. Sign in to the OpenStack Horizon dashboard as a project member.
        2. Open **Container Infra** then **Cluster Templates**.
        3. Select each template and review whether **Enable Floating IP** is set.

        A passing result shows floating IPs disabled for every template; a failing result shows a template with floating IPs enabled.

        ### Audit via CLI

        Run the OpenStack CLI and inspect the result:

        ```bash
        openstack coe cluster template show <template>
        ```

        A passing result shows `floating_ip_enabled` set to `False`; a failing result shows it set to `True`.
      remediation:
        - id: console
          desc: |
            1. Open **Container Infra → Cluster Templates** in Horizon.
            2. If no cluster references the template, fix it with the CLI, since Horizon does not expose template patching.
            3. If clusters reference the template, create a replacement template with **Enable Floating IP** left unset, rebuild each cluster from it, move workloads, then delete the old clusters and template.
        - id: cli
          desc: |
            Magnum locks a cluster template once any cluster references it, so a referenced template cannot be changed in place. Create a replacement template with floating IPs disabled and rebuild clusters from it:

            ```bash
            # A referenced template cannot be patched; create a replacement with floating IPs disabled
            openstack coe cluster template create secure-template-v2 \
              --image fedora-coreos-38 --keypair ops-key \
              --external-network public --coe kubernetes \
              --flavor m1.small --docker-volume-size 10 \
              --master-lb-enabled --floating-ip-disabled
            ```

            Rebuild clusters from the new template, move workloads, then retire the old clusters and template.
        - id: terraform
          desc: |
            Either omit `floating_ip_enabled` on `openstack_containerinfra_clustertemplate_v1` (the default is `false`) or set it explicitly, and front the API server with a load balancer:

            ```hcl
            resource "openstack_containerinfra_clustertemplate_v1" "k8s" {
              name                = "k8s"
              image               = "fedora-coreos"
              coe                 = "kubernetes"
              external_network_id = openstack_networking_network_v2.public.id
              floating_ip_enabled = false
              master_lb_enabled   = true
            }
            ```
    refs:
      - url: https://docs.openstack.org/magnum/latest/user/index.html
        title: OpenStack Magnum cluster templates

  - uid: mondoo-openstack-security-cluster-template-no-floating-ip-openstack
    filters: asset.platform == "openstack-project"
    mql: |
      openstack.clusterTemplates.all(floatingIpEnabled == false)
  - uid: mondoo-openstack-security-cluster-template-no-floating-ip-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "openstack_containerinfra_clustertemplate_v1")
    mql: |
      terraform.resources("openstack_containerinfra_clustertemplate_v1").all(
        arguments['floating_ip_enabled'] != true
      )
  - uid: mondoo-openstack-security-cluster-template-no-floating-ip-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "openstack_containerinfra_clustertemplate_v1")
    mql: |
      terraform.plan.resourceChanges.where(type == "openstack_containerinfra_clustertemplate_v1").all(
        change.after.floating_ip_enabled != true
      )
  - uid: mondoo-openstack-security-cluster-template-no-floating-ip-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "openstack_containerinfra_clustertemplate_v1")
    mql: |
      terraform.state.resources.where(type == "openstack_containerinfra_clustertemplate_v1").all(
        values.floating_ip_enabled != true
      )

