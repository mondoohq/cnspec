policies:
  - uid: mondoo-openstack-security
    name: Mondoo OpenStack Security
    version: 1.5.1
    license: BUSL-1.1
    tags:
      mondoo.com/category: security
      mondoo.com/platform: openstack,cloud
    require:
      - provider: openstack
    authors:
      - name: Mondoo, Inc.
        email: hello@mondoo.com
    summary: Secure OpenStack projects across Keystone, Nova, Neutron, VPNaaS, Cinder, Glance, Swift, Octavia, Manila, Magnum, and Trove
    docs:
      desc: |
        The Mondoo OpenStack Security policy identifies critical misconfigurations that could leave your OpenStack project exposed to attackers. The policy focuses on security-relevant controls and helps organizations harden against unauthorized network access, weak credentials, unencrypted data, and accidental exposure of project-owned assets.

        This policy provides security checks across the following OpenStack services:

        - Keystone (identity, users, application credentials, trusts, service catalog endpoints)
        - Nova (compute servers and keypairs)
        - Neutron (networks, ports, security groups)
        - Neutron VPNaaS (IKE/IPsec site-to-site VPN policies)
        - Cinder (block-storage volumes)
        - Glance (images)
        - Swift (object-storage containers)
        - Octavia (load balancers and TLS termination)
        - Manila (shared file systems)
        - Magnum (container infrastructure clusters)
        - Trove (managed databases)

        Learn more about scanning OpenStack in the [cnspec OpenStack documentation](https://mondoo.com/docs/cnspec/cloud/openstack).

        Have suggestions for new checks in this policy? Visit our [cnspec repository](https://github.com/mondoohq/cnspec).
    groups:
      - title: Identity (Keystone)
        checks:
          - uid: mondoo-openstack-security-app-credentials-restricted
          - uid: mondoo-openstack-security-app-credentials-have-expiry
          - uid: mondoo-openstack-security-trust-impersonation-expiry
          - uid: mondoo-openstack-security-user-mfa-enabled
          - uid: mondoo-openstack-security-user-lockout-not-bypassed
          - uid: mondoo-openstack-security-app-credential-no-admin
          - uid: mondoo-openstack-security-endpoints-use-https
      - title: Compute (Nova)
        checks:
          - uid: mondoo-openstack-security-server-uses-keypair
          - uid: mondoo-openstack-security-server-has-security-group
          - uid: mondoo-openstack-security-server-not-internet-reachable
      - title: Network (Neutron)
        checks:
          - uid: mondoo-openstack-security-no-unrestricted-ssh
          - uid: mondoo-openstack-security-no-unrestricted-rdp
          - uid: mondoo-openstack-security-no-unrestricted-winrm
          - uid: mondoo-openstack-security-no-unrestricted-db-ports
          - uid: mondoo-openstack-security-no-unrestricted-mgmt-ports
          - uid: mondoo-openstack-security-no-all-ports-open
          - uid: mondoo-openstack-security-port-security-enabled
          - uid: mondoo-openstack-security-port-no-wide-address-pairs
          - uid: mondoo-openstack-security-firewall-policy-audited
      - title: Block Storage (Cinder)
        checks:
          - uid: mondoo-openstack-security-volume-encrypted
      - title: Images (Glance)
        checks:
          - uid: mondoo-openstack-security-image-not-public
          - uid: mondoo-openstack-security-image-signed
      - title: Object Storage (Swift)
        checks:
          - uid: mondoo-openstack-security-container-not-public
          - uid: mondoo-openstack-security-container-no-wildcard-write
      - title: Load Balancers (Octavia)
        checks:
          - uid: mondoo-openstack-security-listener-modern-tls
          - uid: mondoo-openstack-security-listener-no-plaintext-internet
          - uid: mondoo-openstack-security-listener-restricts-source-cidrs
      - title: VPN (VPNaaS)
        checks:
          - uid: mondoo-openstack-security-ipsec-policy-encrypts
          - uid: mondoo-openstack-security-vpn-no-weak-encryption
      - title: Shared File Systems (Manila)
        checks:
          - uid: mondoo-openstack-security-share-not-public
          - uid: mondoo-openstack-security-share-no-world-access
      - title: Container Infrastructure (Magnum)
        checks:
          - uid: mondoo-openstack-security-cluster-template-tls-enabled
          - uid: mondoo-openstack-security-cluster-template-no-insecure-registry
          - uid: mondoo-openstack-security-cluster-template-no-floating-ip
      - title: Databases (Trove)
        checks:
          - uid: mondoo-openstack-security-database-not-public
          - uid: mondoo-openstack-security-database-supported-version
    scoring_system: highest impact
queries:
  - uid: mondoo-openstack-security-app-credentials-restricted
    title: Ensure application credentials are not unrestricted
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-5-17
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-5
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-5
      compliance/pci-dss-4: pcidss-requirement-7-2-2
      compliance/soc2-2017: soc2-control-cc6-1-9
      compliance/vda-isa-5: vda-isa-5-4-1-2
    variants:
      - uid: mondoo-openstack-security-app-credentials-restricted-openstack
        tags:
          mondoo.com/filter-title: OpenStack Project
          mondoo.com/filter-icon: openstack
      - uid: mondoo-openstack-security-app-credentials-restricted-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-openstack-security-app-credentials-restricted-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-openstack-security-app-credentials-restricted-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Keystone application credentials are created with `unrestricted = false`. By default an unrestricted application credential can create further application credentials and trusts, which lets a single leaked secret spawn additional long-lived access.

        **Why this matters**

        - **Bounded blast radius:** A restricted credential cannot mint new credentials, so a leak is limited to the access the credential was originally issued for.
        - **Rotation is enforceable:** Unrestricted credentials defeat rotation because anyone holding one can quietly re-issue replacements before the original is revoked.
        - **Automation safety:** CI runners and service principals use these long-lived bearer secrets, and restricting them keeps a compromised pipeline from escalating across the project.

        **Risk mitigation**

        - **Privilege escalation:** Prevents a stolen credential from being used to create additional credentials and trusts that survive remediation.
        - **Persistence:** Removes an attacker's ability to establish durable footholds by chaining credential creation.
      audit: |
        ### Audit via Horizon

        1. Sign in to the OpenStack Horizon dashboard as a project member.
        2. Open **Identity** then **Application Credentials**.
        3. Select each application credential and review its details.

        A passing result shows every application credential with the **Unrestricted** attribute set to **False**; a failing result shows one or more credentials marked **Unrestricted: True**.

        ### Audit via CLI

        Run the OpenStack CLI and inspect the result:

        ```bash
        openstack application credential list --long
        ```

        A passing result lists every credential with `Unrestricted` set to `False`; a failing result shows a credential with `Unrestricted` set to `True`.
      remediation:
        - id: console
          desc: |
            1. Navigate to **Identity → Application Credentials** in Horizon.
            2. Create a replacement credential and leave **Unrestricted** unchecked.
            3. Update every automation consumer to use the replacement credential.
            4. Delete the unrestricted credential once nothing depends on it.
        - id: cli
          desc: |
            ```bash
            # Create a restricted replacement first, cut consumers over, then revoke the old credential
            openstack application credential create automation-job \
              --role member --expiration 2026-12-31T00:00:00
            openstack application credential delete old-automation-job
            ```
        - id: terraform
          desc: |
            Never set `unrestricted = true` on an `openstack_identity_application_credential_v3` resource. Either omit the argument (the default is `false`) or set it explicitly:

            ```hcl
            resource "openstack_identity_application_credential_v3" "automation" {
              name         = "automation-job"
              description  = "Used by CI pipeline"
              expires_at   = "2026-12-31T00:00:00Z"
              unrestricted = false
            }
            ```
    refs:
      - url: https://docs.openstack.org/keystone/latest/user/application_credentials.html
        title: OpenStack Keystone application credentials

  - uid: mondoo-openstack-security-app-credentials-restricted-openstack
    filters: asset.platform == "openstack-project"
    mql: |
      openstack.users.all(applicationCredentials.all(unrestricted == false))
  - uid: mondoo-openstack-security-app-credentials-restricted-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "openstack_identity_application_credential_v3")
    mql: |
      terraform.resources("openstack_identity_application_credential_v3").all(
        arguments['unrestricted'] != true
      )
  - uid: mondoo-openstack-security-app-credentials-restricted-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "openstack_identity_application_credential_v3")
    mql: |
      terraform.plan.resourceChanges.where(type == "openstack_identity_application_credential_v3").all(
        change.after.unrestricted != true
      )
  - uid: mondoo-openstack-security-app-credentials-restricted-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "openstack_identity_application_credential_v3")
    mql: |
      terraform.state.resources.where(type == "openstack_identity_application_credential_v3").all(
        values.unrestricted != true
      )

  - uid: mondoo-openstack-security-user-mfa-enabled
    title: Ensure Keystone users have multi-factor authentication enabled
    impact: 85
    tags:
      compliance/bsi-sys-1-5: bsi-sys-1-5-a5
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-14
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-j
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-3
      compliance/pci-dss-4: pcidss-requirement-8-4-2
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-2
    variants:
      - uid: mondoo-openstack-security-user-mfa-enabled-openstack
        tags:
          mondoo.com/filter-title: OpenStack Project
          mondoo.com/filter-icon: openstack
      - uid: mondoo-openstack-security-user-mfa-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-openstack-security-user-mfa-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-openstack-security-user-mfa-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that every Keystone user has `multi_factor_auth_enabled` set to true. Without multi-factor authentication, a single password is the only barrier to a user's access, so a phished, reused, or brute-forced password grants an attacker the full set of roles the account holds.

        **Why this matters**

        - **Password compromise is common:** Credential phishing, reuse, and brute force routinely defeat single-factor authentication, and a privileged Keystone account is a high-value target.
        - **Roles travel with the account:** A compromised user inherits every project and domain role assigned to it, so the blast radius of a stolen password can be large.
        - **Defense beyond the password:** Requiring a second factor means a leaked password alone is not enough to authenticate.

        **Risk mitigation**

        - **Account takeover:** A second factor blocks an attacker who has only obtained the user's password.
        - **Lateral movement:** Containing account compromise at the authentication step limits an attacker's ability to assume the account's roles across projects.

        Service accounts that authenticate with application credentials rather than interactive logins may be exempted where MFA does not apply to their flow.
      audit: |
        ### Audit via Horizon

        1. Sign in to the OpenStack Horizon dashboard as an administrator.
        2. Open **Identity** then **Users**.
        3. Select each user and review whether multi-factor authentication is enabled.

        A passing result shows multi-factor authentication enabled for every user; a failing result shows one or more users without it.

        ### Audit via CLI

        Run the OpenStack CLI and inspect the result:

        ```bash
        openstack user show <user> -f json
        ```

        A passing result shows the `options` field with `multi_factor_auth_enabled` set to `true`; a failing result shows it absent or `false`.
      remediation:
        - id: console
          desc: |
            1. Navigate to **Identity → Users** in Horizon as an administrator.
            2. Edit each user and enable multi-factor authentication.
            3. Configure the required authentication rules and confirm the user can still authenticate with the second factor before relying on the change.
        - id: cli
          desc: |
            Enable MFA on the user and define the rule set that the user must satisfy. The rule below requires a password plus a TOTP code:

            ```bash
            openstack user set <user> \
              --multi-factor-auth-enabled \
              --multi-factor-auth-rule password,totp
            ```
        - id: terraform
          desc: |
            Set `multi_factor_auth_enabled = true` and define `multi_factor_auth_rule` on the `openstack_identity_user_v3` resource:

            ```hcl
            resource "openstack_identity_user_v3" "operator" {
              name                     = "operator"
              default_project_id       = openstack_identity_project_v3.ops.id
              multi_factor_auth_enabled = true

              multi_factor_auth_rule {
                rule = ["password", "totp"]
              }
            }
            ```
    refs:
      - url: https://docs.openstack.org/keystone/latest/admin/configure-mfa.html
        title: OpenStack Keystone multi-factor authentication

  - uid: mondoo-openstack-security-user-mfa-enabled-openstack
    filters: asset.platform == "openstack-project"
    mql: |
      openstack.users.all(multiFactorAuthEnabled == true)
  - uid: mondoo-openstack-security-user-mfa-enabled-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "openstack_identity_user_v3")
    mql: |
      terraform.resources("openstack_identity_user_v3").all(
        arguments['multi_factor_auth_enabled'] == true
      )
  - uid: mondoo-openstack-security-user-mfa-enabled-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "openstack_identity_user_v3")
    mql: |
      terraform.plan.resourceChanges.where(type == "openstack_identity_user_v3").all(
        change.after.multi_factor_auth_enabled == true
      )
  - uid: mondoo-openstack-security-user-mfa-enabled-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "openstack_identity_user_v3")
    mql: |
      terraform.state.resources.where(type == "openstack_identity_user_v3").all(
        values.multi_factor_auth_enabled == true
      )

  - uid: mondoo-openstack-security-user-lockout-not-bypassed
    title: Ensure Keystone users are not exempt from account lockout
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: false
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: false
      compliance/nist-csf-1: false
      compliance/nist-csf-2: false
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-8
      compliance/pci-dss-4: pcidss-requirement-8-3-4
      compliance/soc2-2017: false
      compliance/vda-isa-5: false
    variants:
      - uid: mondoo-openstack-security-user-lockout-not-bypassed-openstack
        tags:
          mondoo.com/filter-title: OpenStack Project
          mondoo.com/filter-icon: openstack
      - uid: mondoo-openstack-security-user-lockout-not-bypassed-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-openstack-security-user-lockout-not-bypassed-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-openstack-security-user-lockout-not-bypassed-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that no Keystone user has `ignore_lockout_failure_attempts` set to true. When that option is set, the account is exempt from the lockout that normally suspends a user after a configured number of failed authentication attempts, leaving it open to unlimited password guessing.

        **Why this matters**

        - **Brute-force exposure:** An account exempt from lockout can be subjected to unlimited online password-guessing attempts with no automatic throttle.
        - **Silent weakening:** The exemption is a per-user override that quietly removes a domain-wide protection for that account, which is easy to miss in a review.
        - **High-value targets:** Operators sometimes set the exemption on automation or admin accounts, which are exactly the accounts an attacker most wants to brute force.

        **Risk mitigation**

        - **Credential guessing:** Keeping lockout in force ensures repeated failed attempts suspend the account rather than continuing indefinitely.
        - **Consistent policy:** Removing the override re-applies the domain's account-lockout protection uniformly across users.
      audit: |
        ### Audit via Horizon

        1. Sign in to the OpenStack Horizon dashboard as an administrator.
        2. Open **Identity** then **Users**.
        3. Review each user's options for a lockout-exemption setting.

        A passing result shows no user exempt from lockout; a failing result shows a user with the lockout exemption set.

        ### Audit via CLI

        Run the OpenStack CLI and inspect the result:

        ```bash
        openstack user show <user> -f json
        ```

        A passing result shows the `options` field with `ignore_lockout_failure_attempts` absent or `false`; a failing result shows it set to `true`.
      remediation:
        - id: console
          desc: |
            1. Navigate to **Identity → Users** in Horizon as an administrator.
            2. Edit each affected user and clear the lockout-exemption option so standard account-lockout applies.
            3. Confirm the lockout policy is configured at the domain or deployment level so the account is now protected.
        - id: cli
          desc: |
            Clear the exemption so the user is subject to the configured lockout policy:

            ```bash
            openstack user set <user> --ignore-lockout-failure-attempts False
            ```
        - id: terraform
          desc: |
            Either omit `ignore_lockout_failure_attempts` on the `openstack_identity_user_v3` resource (the default is `false`) or set it explicitly:

            ```hcl
            resource "openstack_identity_user_v3" "operator" {
              name                            = "operator"
              default_project_id              = openstack_identity_project_v3.ops.id
              ignore_lockout_failure_attempts = false
            }
            ```
    refs:
      - url: https://docs.openstack.org/keystone/latest/admin/configuration.html
        title: OpenStack Keystone security compliance and lockout

  - uid: mondoo-openstack-security-user-lockout-not-bypassed-openstack
    filters: asset.platform == "openstack-project"
    mql: |
      openstack.users.all(ignoreLockoutFailureAttempts == false)
  - uid: mondoo-openstack-security-user-lockout-not-bypassed-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "openstack_identity_user_v3")
    mql: |
      terraform.resources("openstack_identity_user_v3").all(
        arguments['ignore_lockout_failure_attempts'] != true
      )
  - uid: mondoo-openstack-security-user-lockout-not-bypassed-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "openstack_identity_user_v3")
    mql: |
      terraform.plan.resourceChanges.where(type == "openstack_identity_user_v3").all(
        change.after.ignore_lockout_failure_attempts != true
      )
  - uid: mondoo-openstack-security-user-lockout-not-bypassed-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "openstack_identity_user_v3")
    mql: |
      terraform.state.resources.where(type == "openstack_identity_user_v3").all(
        values.ignore_lockout_failure_attempts != true
      )

  - uid: mondoo-openstack-security-app-credentials-have-expiry
    title: Ensure application credentials have an expiration set
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-10
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-5-17
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-5
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-2
      compliance/pci-dss-4: pcidss-requirement-8-2-6
      compliance/soc2-2017: soc2-control-cc6-1-9
      compliance/vda-isa-5: vda-isa-5-4-1-1
    variants:
      - uid: mondoo-openstack-security-app-credentials-have-expiry-openstack
        tags:
          mondoo.com/filter-title: OpenStack Project
          mondoo.com/filter-icon: openstack
      - uid: mondoo-openstack-security-app-credentials-have-expiry-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-openstack-security-app-credentials-have-expiry-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-openstack-security-app-credentials-have-expiry-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that every Keystone application credential has an `expires_at` timestamp set. Application credentials are created without an expiration unless one is supplied, leaving them valid indefinitely.

        **Why this matters**

        - **Forced renewal cycle:** An expiration date pushes credentials through a renewal process where stale or unowned secrets naturally fall off.
        - **Offboarding hygiene:** Non-expiring credentials survive employee departures and project handoffs, leaving access nobody owns.
        - **Rotation alignment:** A fixed lifetime keeps credentials consistent with any future credential-rotation policy instead of living forever.

        **Risk mitigation**

        - **Persistent backdoor:** Prevents a leaked credential from acting as a permanent entry point into the project until someone notices and deletes it.
        - **Credential sprawl:** Limits the accumulation of forgotten, untracked secrets across the project over time.
      audit: |
        ### Audit via Horizon

        1. Sign in to the OpenStack Horizon dashboard as a project member.
        2. Open **Identity** then **Application Credentials**.
        3. Select each application credential and review its **Expires At** value.

        A passing result shows every credential with a future **Expires At** timestamp; a failing result shows a credential with no expiration set.

        ### Audit via CLI

        Run the OpenStack CLI and inspect the result:

        ```bash
        openstack application credential list --long
        ```

        A passing result shows a populated `Expires At` value for every credential; a failing result shows an empty `Expires At` field.
      remediation:
        - id: console
          desc: |
            1. Navigate to **Identity → Application Credentials** in Horizon.
            2. Create a replacement credential with an **Expiration** value that matches your rotation policy.
            3. Update every automation consumer to use the replacement credential.
            4. Delete the non-expiring credential once nothing depends on it.
        - id: cli
          desc: |
            ```bash
            # Re-issue with an explicit expiration, cut consumers over, then revoke the old credential
            openstack application credential create automation-job \
              --role member --expiration 2026-12-31T00:00:00
            openstack application credential delete old-automation-job
            ```
        - id: terraform
          desc: |
