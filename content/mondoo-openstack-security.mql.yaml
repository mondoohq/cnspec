  - uid: mondoo-openstack-security-no-unrestricted-rdp
    title: Ensure no security group allows unrestricted inbound RDP (port 3389)
    impact: 100
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-openstack-security-no-unrestricted-rdp-openstack
        tags:
          mondoo.com/filter-title: OpenStack Project
          mondoo.com/filter-icon: openstack
      - uid: mondoo-openstack-security-no-unrestricted-rdp-openstack-security-group
        tags:
          mondoo.com/filter-title: OpenStack Security Group
          mondoo.com/filter-icon: openstack
      - uid: mondoo-openstack-security-no-unrestricted-rdp-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-openstack-security-no-unrestricted-rdp-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-openstack-security-no-unrestricted-rdp-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that no Neutron security group has an ingress rule that allows TCP traffic on port 3389 from the public internet at `0.0.0.0/0` or `::/0`. RDP exposed to the entire internet is one of the most actively exploited remote-management surfaces.

        **Why this matters**

        - **High-value target:** Mass-scanning campaigns spray known credentials against any reachable RDP listener.
        - **Rapid escalation:** Attackers pivot from a compromised RDP session to ransomware deployment within minutes.
        - **Reduced attack surface:** Keeping RDP off the open internet removes it from automated exploitation entirely.

        **Risk mitigation**

        - **Credential attacks:** Confines RDP access to trusted CIDRs, a bastion host, or a VPN so connections come only from known sources.
        - **Ransomware entry:** Removes a common initial-access vector that leads directly to data encryption and extortion.
      audit: |
        ### Audit via Horizon

        1. Sign in to the OpenStack Horizon dashboard as a project member.
        2. Open **Network** then **Security Groups**.
        3. For each security group, open **Manage Rules** and review the ingress rules.

        A passing result shows no ingress rule allowing TCP port 3389 from `0.0.0.0/0` or `::/0`; a failing result shows such a rule.

        ### Audit via CLI

        Run the OpenStack CLI and inspect the result:

        ```bash
        openstack security group rule list <group>
        ```

        A passing result shows no ingress TCP rule covering port 3389 with a remote IP prefix of `0.0.0.0/0` or `::/0`; a failing result shows one.
      remediation:
        - id: console
          desc: |
            1. Navigate to **Network → Security Groups** in Horizon and open the affected security group.
            2. Add a new ingress rule for TCP port 3389 with **CIDR** set to a specific trusted range.
            3. Confirm RDP still works from the trusted range, then delete the rule open to `0.0.0.0/0` or `::/0`. Removing the open rule drops live RDP sessions that arrived through it.
        - id: cli
          desc: |
            ```bash
            # Add the scoped rule first so management access survives the change
            openstack security group rule create windows-sg \
              --ingress --protocol tcp --dst-port 3389 --remote-ip 203.0.113.0/24
            # Then remove the world-open rule; live sessions through it are dropped
            openstack security group rule delete 4a4ee176-43e6-4b48-8bcf-5acd1c403fbf
            ```
        - id: terraform
          desc: |
            Scope inbound RDP `remote_ip_prefix` to a specific trusted CIDR, never `0.0.0.0/0` or `::/0`:

            ```hcl
            resource "openstack_networking_secgroup_rule_v2" "rdp" {
              direction         = "ingress"
              ethertype         = "IPv4"
              protocol          = "tcp"
              port_range_min    = 3389
              port_range_max    = 3389
              remote_ip_prefix  = "203.0.113.0/24"
              security_group_id = openstack_networking_secgroup_v2.windows.id
            }
            ```
    refs:
      - url: https://docs.openstack.org/security-guide/networking.html
        title: OpenStack Neutron security groups

  - uid: mondoo-openstack-security-no-unrestricted-rdp-openstack
    filters: asset.platform == "openstack-project"
    mql: |
      openstack.securityGroups.all(
        rules.where(direction == "ingress").where(remoteIpPrefix == "0.0.0.0/0" || remoteIpPrefix == "::/0").where(protocol == "tcp" || protocol == "").none(
          portRangeMin <= 3389 && portRangeMax >= 3389
        )
      )
