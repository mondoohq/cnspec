policies:
  - uid: phoenix-plcnext
    name: Phoenix PLCnext Security Policy
    version: 1.1.2
    license: BUSL-1.1
    tags:
      benchmark: Mondoo Phoenix PLCnext
      date: "2023-02-11"
      mondoo.com/category: security
      mondoo.com/platform: plcnext
      profile: PLCnext base security
    require:
      - provider: os
    authors:
      - name: Mondoo Inc.
        email: hello@mondoo.com
    summary: Secure Phoenix PLCnext industrial controllers
    docs:
      desc: |
        The Mondoo Phoenix Contact PLCnext Security policy identifies critical misconfigurations on PLCnext industrial automation controllers that could expose operational technology (OT) infrastructure to attackers. This policy helps organizations detect and remediate hardening gaps before they can be exploited, reducing the likelihood of unauthorized device access, process manipulation, and disruption of physical processes that depend on PLC reliability.

        This policy provides security checks across key PLCnext areas:

        - Secure device configuration
        - Firmware version and supported releases
        - Authentication and access controls
        - System hardening and exposed services

        Have suggestions for new checks in this policy? Visit our [cnspec repository](https://github.com/mondoohq/cnspec).
    groups:
      - title: System Configuration
        filters: |
          asset.family.contains("linux")
          asset.arch == "armv7l"
          file("/opt/plcnext").exists
        checks:
          - uid: phoenix-plcnext-01
          - uid: phoenix-plcnext-02
          - uid: phoenix-plcnext-03
      - title: SSH Access Control & Authentication
        filters: |
          asset.family.contains("linux")
          asset.arch == "armv7l"
          file("/opt/plcnext").exists
        checks:
          - uid: phoenix-plcnext-04
          - uid: phoenix-plcnext-05
          - uid: phoenix-plcnext-06
          - uid: phoenix-plcnext-07
          - uid: phoenix-plcnext-08
          - uid: phoenix-plcnext-09
          - uid: phoenix-plcnext-10
          - uid: phoenix-plcnext-11
          - uid: phoenix-plcnext-12
          - uid: phoenix-plcnext-13
          - uid: phoenix-plcnext-14
      - title: SSH Cryptographic Settings
        filters: |
          asset.family.contains("linux")
          asset.arch == "armv7l"
          file("/opt/plcnext").exists
        checks:
          - uid: phoenix-plcnext-15
          - uid: phoenix-plcnext-16
          - uid: phoenix-plcnext-17
      - title: SSH File Permissions
        filters: |
          asset.family.contains("linux")
          asset.arch == "armv7l"
          file("/opt/plcnext").exists
        checks:
          - uid: phoenix-plcnext-18
          - uid: phoenix-plcnext-19
          - uid: phoenix-plcnext-20
          - uid: phoenix-plcnext-21
          - uid: phoenix-plcnext-22
    scoring_system: highest impact
queries:
  - uid: phoenix-plcnext-01
    title: Ensure latest PLCnext Firmware is installed
    mql: |
      // A missing or malformed arpversion file fails cleanly via the else
      // branch instead of erroring inside version(null).
      if (file("/etc/plcnext/arpversion").content.find(/\d+\.\d+\.\d+/) != empty) {
        version(file("/etc/plcnext/arpversion").content.find(/\d+\.\d+\.\d+/).first) >= version("23.0.0")
      } else {
        false
      }
    docs:
      desc: |
        Installing the latest firmware is important for several reasons:

        - Security: Firmware updates often include security patches to address vulnerabilities in the system, making it less susceptible to hacking or other security threats.
        - Bug fixes: Updates often include fixes for bugs and other software issues, which can improve the performance and stability of the device.
        - New features: Updates may add new features or functionality to the device, making it more versatile and improving its overall performance.
        - Compatibility: Installing the latest firmware can ensure compatibility with other devices or systems, preventing conflicts or connectivity issues.
        - Performance: Firmware updates can improve the overall performance of the device, such as improving processing speed, battery life, or other key metrics.

        By installing the latest firmware, you can ensure that your device is secure, performs optimally, and is fully compatible with other systems. This can help reduce downtime, improve productivity, and extend the lifespan of your device.
      audit: |
        Run the `cat /etc/plcnext/arpversion` command and verify that the reported firmware version is 23.0.0 or later.
      remediation: |-
        Update the device firmware using the Web-based Management interface:

        1. Download the latest firmware update file for your controller model from the Phoenix Contact product page.
        2. Back up the device configuration and your PLCnext Engineer project before you start.
        3. Log in to the WBM at `https://<device-ip>/wbm` with an administrative account.
        4. Navigate to **Administration > Firmware Update**.
        5. Upload the firmware update file and start the update.
        6. Wait for the device to install the update and reboot, then verify the new version with `cat /etc/plcnext/arpversion`.

        For details, follow the Phoenix Contact guide [Firmware Update](https://www.plcnext.help/te/WBM/Administration_Firmware_Update.htm).

        Do not treat a fixed version number as the target. Check Phoenix Contact's current supported-release list for your controller model on the product page and install the latest release the vendor still supports, because older firmware that once met a benchmark may now be out of support and missing recent security fixes.

        > **Warning:** The firmware update reboots the controller and stops the running PLC program. Outputs change to their configured fail-safe state during the reboot. Perform the update only during a planned maintenance window after confirming the automation process is in a safe state.
    refs:
      - url: https://www.phoenixcontact.com/en-pc/products/controller-axc-f-2152-2404267#firmware-link-target
        title: PLCnext Firmware download page
      - url: https://www.plcnext-runtime.com/ch02-04-firmware.html#firmware
        title: The PLCnext Runtime
  - uid: phoenix-plcnext-02
    title: Ensure Firewall is active
    mql: |
      nftables.tables.contains(name == "plcnext_filter")
      nftables.tables.contains(name == "plcnext_ip6_filter")
    docs:
      desc: |
        The hazards in public and even private networks are omnipresent, and nowadays no private user would come up with the idea to put a computer on the network without a proper firewall setting. So how would that be different when working with a PLC?

        PLCnext Technology  relies on the proven and commonly used Linux® firewall nftables. On the PLCnext Control, you don't need to configure the firewall rules via cryptic Linux shell commands: Just log on to the Web-based Management and choose from the predefined basic rules, or add your own rules to the set.

        In addition to the PLCnext Technology filter table, you can activate other filter tables. This might be necessary if you require certain functions that are not supported by the firewall configuration via the WBM.

        This additional configuration is implemented via independent filter tables. You have to create the required functions via nftables commands. For this, you can edit a rule set in Linux using a text editor or load the file to the PC and change it.

        For detailed information on this Linux feature, refer to the nftables documentation.

        Here you see a set of firewall filter files that is present in the /etc/nftables directory on a PLCnext Control
      audit: |
        Run the `nft list tables` and `nft list table <table>` command and verify that output.
      remediation: |-
        Activate the firewall using the Web-based Management interface:

        1. Log in to the WBM at `https://<device-ip>/wbm` with an administrative account.
        2. Navigate to **Security > Firewall**.
        3. Select **Activate Firewall**.
        4. Review the basic rules and confirm that required connections such as PLCnext Engineer, HMI clients, and SSH management access are still permitted.
        5. Apply the configuration and verify with `nft list tables` on the device shell that the `plcnext_filter` and `plcnext_ip6_filter` tables are present.

        For details, follow the Phoenix Contact guide [Firewall configuration](https://www.plcnext.help/te/WBM/Security_Firewall.htm).

        > **Warning:** Activating the firewall with an incomplete rule set can cut off engineering stations, HMIs, and other clients that communicate with the controller. Verify the rules before applying them, perform the change during a maintenance window, and keep local access to the device available so you can revert the change if needed.
    refs:
      - url: https://www.plcnext.help/te/WBM/Security_Firewall.htm
        title: PLCnext Firewall configuration
      - url: https://www.plcnext.help/te/Security/Security_nftables.htm
        title: Additional firewall filters via nftables
  - uid: phoenix-plcnext-03
    title: Ensure only strong Key Exchange algorithms are used
    props:
      - uid: PLCKexAlgos
        title: Define the hardened key exchange algorithms for all SSH configurations
        mql: |
          return ["sntrup761x25519-sha512@openssh.com","curve25519-sha256@libssh.org","diffie-hellman-group-exchange-sha256"]
    mql: |
      sshd.config.kexs != empty
      sshd.config.kexs.containsOnly(props.PLCKexAlgos)
    docs:
      desc: Key exchange is any method in cryptography by which cryptographic keys are exchanged between two parties, allowing use of a cryptographic algorithm. If the sender and receiver wish to exchange encrypted messages, each must be equipped to encrypt messages to be sent and decrypt messages received
      remediation: |-
        Edit the `/etc/ssh/sshd_config` file to add or modify the `KexAlgorithms` parameter so that it contains a comma-separated list of the site approved key exchange algorithms:

        ```
        KexAlgorithms sntrup761x25519-sha512@openssh.com,curve25519-sha256@libssh.org,diffie-hellman-group-exchange-sha256
        ```

        Run `ssh -Q kex` on the controller first and include only algorithm names the device firmware supports. Validate the configuration with `sshd -t`, then restart the SSH service to apply the change. Restarting SSH ends active shell sessions but does not affect the running PLC program.

        > **Warning:** An unsupported algorithm name prevents the SSH daemon from starting, which cuts off shell access to the controller. Always validate with `sshd -t` before restarting and keep your current session open until you confirm a new login works.
    refs:
      - url: https://www.plcnext.help/te/About/Home.htm
        title: PLCnext Technology Documentation
      - url: https://csrc.nist.gov/publications/detail/sp/800-82/rev-3/final
        title: NIST SP 800-82 Rev. 3 - Guide to OT Security
  - uid: phoenix-plcnext-04
    title: Ensure only strong MAC algorithms are used
    props:
      - uid: PLCMacAlgos
        title: Define the accepted MAC algorithms
        mql: |
          return ["hmac-sha2-512-etm@openssh.com","hmac-sha2-256-etm@openssh.com","umac-128-etm@openssh.com","hmac-sha2-512","hmac-sha2-256"]
    mql: |
      sshd.config.macs != empty
      sshd.config.macs.containsOnly(props.PLCMacAlgos)
    docs:
      desc: This variable limits the types of MAC algorithms that SSH can use during communication.
      remediation: |-
        Edit the `/etc/ssh/sshd_config` file to add or modify the `MACs` parameter so that it contains a comma-separated list of the site approved MACs:

        ```
        MACs hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com,umac-128-etm@openssh.com,hmac-sha2-512,hmac-sha2-256
        ```

        Run `ssh -Q mac` on the controller first and include only algorithm names the device firmware supports. Validate the configuration with `sshd -t`, then restart the SSH service to apply the change. Restarting SSH ends active shell sessions but does not affect the running PLC program.

        > **Warning:** An unsupported algorithm name prevents the SSH daemon from starting, which cuts off shell access to the controller. Always validate with `sshd -t` before restarting and keep your current session open until you confirm a new login works.
    refs:
      - url: https://www.plcnext.help/te/About/Home.htm
        title: PLCnext Technology Documentation
      - url: https://csrc.nist.gov/publications/detail/sp/800-82/rev-3/final
        title: NIST SP 800-82 Rev. 3 - Guide to OT Security
  - uid: phoenix-plcnext-05
    title: Ensure only strong ciphers are used
    props:
      - uid: PLCSshdCiphers
        title: Define the hardened ciphers for all SSH configurations
        mql: |
          return ["chacha20-poly1305@openssh.com","aes256-gcm@openssh.com","aes128-gcm@openssh.com","aes256-ctr","aes192-ctr","aes128-ctr"]
    mql: |
      sshd.config.ciphers != empty
      sshd.config.ciphers.containsOnly(props.PLCSshdCiphers)
    docs:
      desc: This variable limits the ciphers that SSH can use during communication.
      remediation: |-
        Edit the `/etc/ssh/sshd_config` file to add or modify the `Ciphers` parameter so that it contains a comma-separated list of the site approved ciphers:

        ```
        Ciphers chacha20-poly1305@openssh.com,aes256-gcm@openssh.com,aes128-gcm@openssh.com,aes256-ctr,aes192-ctr,aes128-ctr
        ```

        Run `ssh -Q cipher` on the controller first and include only cipher names the device firmware supports. Validate the configuration with `sshd -t`, then restart the SSH service to apply the change. Restarting SSH ends active shell sessions but does not affect the running PLC program.

        > **Warning:** An unsupported cipher name prevents the SSH daemon from starting, which cuts off shell access to the controller. Always validate with `sshd -t` before restarting and keep your current session open until you confirm a new login works.
    refs:
      - url: https://www.plcnext.help/te/About/Home.htm
        title: PLCnext Technology Documentation
      - url: https://csrc.nist.gov/publications/detail/sp/800-82/rev-3/final
        title: NIST SP 800-82 Rev. 3 - Guide to OT Security
  - uid: phoenix-plcnext-06
    title: Ensure current system time is synchronized
    mql: |
      processes.any(executable == /ntpd/)
      file("/etc/ntp.conf").content == /(server|pool)\s+\S+/
    docs:
      desc: |
        A system's time should be synchronized between all systems in an environment. This is usually done by setting up an authoritative time server with which all systems in an environment synchronize their clocks.
      audit: |
        Run the `ntpq -p` command and verify that an NTP peer is listed and selected. Inspect the `/etc/ntp.conf` file and verify that at least one `server` or `pool` entry is configured.
      remediation: |-
        Configure NTP time synchronization on the controller:

        1. Log in to the controller over SSH with an administrative account.
        2. Edit the `/etc/ntp.conf` file and add at least one reachable time server from your OT network:

           ```text
           server 192.0.2.10 iburst
           ```

        3. Restart the NTP service so the daemon picks up the new configuration.
        4. Confirm synchronization with `ntpq -p` and verify that a peer is selected.

        For details, follow the Phoenix Contact guide [System time](https://www.plcnext.help/te/Operating_System/System_time.htm).

        > **Warning:** Large clock corrections can affect time-stamped process data, alarm ordering, and certificate validation. Apply time changes during a planned maintenance window.
    refs:
      - url: https://www.plcnext.help/te/Operating_System/System_time.htm
        title: PLCnext System Time Configuration
      - url: https://www.cisa.gov/topics/industrial-control-systems
        title: CISA Industrial Control Systems Security
  - uid: phoenix-plcnext-07
    title: Ensure secure permissions on SSH private host key files are set
    mql: |
      files.
        find(from: "/etc/ssh", type: "file").
        where(path == /ssh_host_.*key$/).list {
          permissions.user_executable == false
          permissions.group_readable == false
          permissions.group_writeable == false
          permissions.group_executable == false
          permissions.other_readable == false
          permissions.other_writeable == false
          permissions.other_executable == false
        }
    docs:
      desc: An SSH private key is one of two files used in SSH public key authentication. In this authentication method, The possession of the private key is proof of identity. Only a private key corresponding to a public key can authenticate successfully. The private keys need to be stored and handled carefully, and no copies of the private key should be distributed.
      remediation:
        - id: cli
          desc: |
            Run this command to set restrictive permissions and root ownership on the SSH host private key files:

            ```bash
            find /etc/ssh -xdev -type f -name 'ssh_host_*_key' -exec chmod 0600 {} \; -exec chown root:root {} \;
            ```
    refs:
      - url: https://www.plcnext.help/te/About/Home.htm
        title: PLCnext Technology Documentation
      - url: https://csrc.nist.gov/publications/detail/sp/800-82/rev-3/final
        title: NIST SP 800-82 Rev. 3 - Guide to OT Security
  - uid: phoenix-plcnext-08
    title: Ensure secure permissions on SSH public host key files are set
    mql: |
      files.
        find(from: "/etc/ssh", type: "file").
        where(path == /ssh_host_.*key\.pub$/).list {
          permissions.user_executable == false
          permissions.group_writeable == false
          permissions.group_executable == false
          permissions.other_writeable == false
          permissions.other_executable == false
        }
    docs:
      desc: An SSH public key is one of two files used in SSH public key authentication. In this authentication method, a public key is a key that can be used for verifying digital signatures generated using a corresponding private key. Only a public key corresponding to a private key can authenticate successfully.
      remediation: |-
        Run this command to set permissions and ownership on the SSH host public key files:

        ```bash
        find /etc/ssh -xdev -type f -name 'ssh_host_*_key.pub' -exec chmod 0644 {} \; -exec chown root:root {} \;
        ```
    refs:
      - url: https://www.plcnext.help/te/About/Home.htm
        title: PLCnext Technology Documentation
      - url: https://csrc.nist.gov/publications/detail/sp/800-82/rev-3/final
        title: NIST SP 800-82 Rev. 3 - Guide to OT Security
  - uid: phoenix-plcnext-09
    title: Ensure SSH Protocol is set to 2
    mql: |
      sshd.config.params["Protocol"] == 2
    docs:
      desc: 'SSH supports two different and incompatible protocols: SSH1 and SSH2. SSH1 was the original protocol and was subject to security issues. SSH2 is more advanced and secure.'
      remediation: |-
        Edit the `/etc/ssh/sshd_config` file to set the `Protocol` parameter as follows:

        ```
        Protocol 2
        ```

        SSH protocol 1 had cryptographic weaknesses that allowed traffic to be decrypted or tampered with, so only protocol 2 is considered safe. OpenSSH 7.4 and later only implement protocol version 2 and treat this directive as deprecated, so on current firmware this setting documents the requirement rather than changing behavior. On those versions the daemon may reject the `Protocol` keyword, so validate the file with `sshd -t` and remove the line if validation reports it as unsupported. After validation passes, restart the SSH service to apply the change. Keep your current session open until you confirm a new login works, so a configuration error does not lock you out of the controller.
    refs:
      - url: https://www.plcnext.help/te/About/Home.htm
        title: PLCnext Technology Documentation
      - url: https://www.cisa.gov/topics/industrial-control-systems
        title: CISA Industrial Control Systems Security
  - uid: phoenix-plcnext-10
    title: Ensure SSH LogLevel is appropriate
    mql: |
      sshd.config.params["LogLevel"] == /INFO|VERBOSE/
    docs:
      desc: |-
        `INFO` level is the basic level that only records the login activity of SSH users. In many situations, such as incident response, it is important to determine when a particular user was active on a system. The logout record can eliminate those users who disconnected, which helps narrow the field.

        `VERBOSE` level specifies that login and logout activity as well as the key fingerprint for any SSH key used for login will be logged. This information is important for SSH key management, especially in legacy environments.
      remediation: |-
        Edit the `/etc/ssh/sshd_config` file to set the `LogLevel` parameter as follows:

        ```
        LogLevel VERBOSE
        ```

        or

        ```
        LogLevel INFO
        ```

        A useful log level matters because without a record of who logged in and when, you cannot reconstruct what happened to the controller after a security incident. Validate the configuration with `sshd -t`, then restart the SSH service to apply the change. Restarting SSH ends active shell sessions but does not affect the running PLC program. Keep your current session open until you confirm a new login works.
    refs:
      - url: https://www.plcnext.help/te/About/Home.htm
        title: PLCnext Technology Documentation
      - url: https://csrc.nist.gov/publications/detail/sp/800-82/rev-3/final
        title: NIST SP 800-82 Rev. 3 - Guide to OT Security
  - uid: phoenix-plcnext-11
    title: Ensure SSH X11 forwarding is disabled
    mql: |
      sshd.config.params["X11Forwarding"] == "no"
    docs:
      desc: The X11Forwarding parameter allows tunneling X11 traffic through the connection to enable remote graphic connections.
      remediation: |-
        Edit the `/etc/ssh/sshd_config` file to set the `X11Forwarding` parameter as follows:

        ```
        X11Forwarding no
        ```

        A controller has no graphical desktop, so X11 forwarding serves no legitimate purpose here and only adds an attack surface that a graphical session could be tunneled through. Validate the configuration with `sshd -t`, then restart the SSH service to apply the change. Restarting SSH ends active shell sessions but does not affect the running PLC program. Keep your current session open until you confirm a new login works.
    refs:
      - url: https://www.plcnext.help/te/About/Home.htm
        title: PLCnext Technology Documentation
      - url: https://csrc.nist.gov/publications/detail/sp/800-82/rev-3/final
        title: NIST SP 800-82 Rev. 3 - Guide to OT Security
  - uid: phoenix-plcnext-12
    title: Ensure SSH MaxAuthTries is set to 4 or less
    mql: |
      sshd.config.params["MaxAuthTries"] <= 4
    docs:
      desc: The `MaxAuthTries` parameter specifies the maximum number of authentication attempts permitted per connection. When the login failure count reaches half this maximum value, error messages will be written to the `syslog` file detailing the login failure.
      remediation: |-
        Edit the `/etc/ssh/sshd_config` file to set the `MaxAuthTries` parameter as follows:

        ```
        MaxAuthTries 4
        ```

        Limiting the number of authentication attempts per connection slows down password-guessing and brute-force attacks, because each new guess forces the attacker to open a fresh connection. Avoid setting the value too low. A very small limit can lock out a legitimate operator who mistypes a passphrase during maintenance or an incident, when fast access to the controller matters most. Validate the configuration with `sshd -t`, then restart the SSH service to apply the change. Restarting SSH ends active shell sessions but does not affect the running PLC program. Keep your current session open until you confirm a new login works.
    refs:
      - url: https://www.plcnext.help/te/About/Home.htm
        title: PLCnext Technology Documentation
      - url: https://www.cisa.gov/topics/industrial-control-systems
        title: CISA Industrial Control Systems Security
  - uid: phoenix-plcnext-13
    title: Ensure SSH IgnoreRhosts is enabled
    mql: |
      sshd.config.params["IgnoreRhosts"] == "yes"
    docs:
      desc: The `IgnoreRhosts` parameter tells the SSH daemon to ignore `.rhosts` and `.shosts` files when deciding whether to authenticate a user. Those files are part of host-based authentication, an obsolete mechanism that trusts a remote host's claim about which user is connecting. That trust is easily spoofed, so disabling it removes a weak path into the controller.
      remediation: |-
        Setting `IgnoreRhosts yes` stops the SSH daemon from honoring per-user `.rhosts` and `.shosts` trust files, which closes off an old and easily spoofed way to bypass real authentication. Modern OpenSSH usually defaults to this already, so on current firmware this setting often just confirms the secure behavior rather than changing it.

        Edit the `/etc/ssh/sshd_config` file to set the `IgnoreRhosts` parameter as follows:

        ```
        IgnoreRhosts yes
        ```

        Validate the configuration with `sshd -t`, then restart the SSH service to apply the change. Restarting SSH ends active shell sessions but does not affect the running PLC program. Keep your current session open until you confirm a new login works.
    refs:
      - url: https://www.plcnext.help/te/About/Home.htm
        title: PLCnext Technology Documentation
      - url: https://csrc.nist.gov/publications/detail/sp/800-82/rev-3/final
        title: NIST SP 800-82 Rev. 3 - Guide to OT Security
  - uid: phoenix-plcnext-14
    title: Ensure SSH HostbasedAuthentication is disabled
    mql: |
      sshd.config.params["HostbasedAuthentication"] == "no"
    docs:
      desc: The `HostbasedAuthentication` parameter controls whether the SSH daemon will accept a login based on the remote host vouching for the user, using files such as `.rhosts` or `/etc/hosts.equiv`. This trusts a remote host's claim about who the user is, which is easily spoofed and is considered obsolete, so it should stay disabled.
      remediation: |-
        Setting `HostbasedAuthentication no` ensures every login is authenticated by the user's own credentials, such as an SSH key, instead of trusting a remote host to vouch for the user. Host-based trust is easily spoofed and obsolete, so disabling it removes a weak way into the controller. Modern OpenSSH usually defaults to this already, so on current firmware this setting often just confirms the secure behavior rather than changing it.

        Edit the `/etc/ssh/sshd_config` file to set the `HostbasedAuthentication` parameter as follows:

        ```
        HostbasedAuthentication no
        ```

        Validate the configuration with `sshd -t`, then restart the SSH service to apply the change. Restarting SSH ends active shell sessions but does not affect the running PLC program. Keep your current session open until you confirm a new login works.
    refs:
      - url: https://www.plcnext.help/te/About/Home.htm
        title: PLCnext Technology Documentation
      - url: https://www.cisa.gov/topics/industrial-control-systems
        title: CISA Industrial Control Systems Security
  - uid: phoenix-plcnext-15
    title: Ensure SSH root login is disabled or set to prohibit-password
    mql: |
      sshd.config.params["PermitRootLogin"] == "no" || sshd.config.params["PermitRootLogin"] == "prohibit-password"
    docs:
      desc: The `PermitRootLogin` parameter specifies if the root user can log in using ssh(1). Blocking direct root login over SSH means an attacker must first compromise a named account before they can reach the most powerful account on the controller, and it ties every privileged action to an individual login for accountability.
      remediation: |-
        Disabling direct root SSH login forces administrators to log in as a named user and then elevate, which both adds a barrier for attackers and creates an audit trail of who did what. Setting `prohibit-password` is a middle ground that still allows root login by SSH key while blocking password-based root login.

        On many OT controllers root is the primary administrative account, so confirm a working non-root admin login first. If you disable root SSH access without another account that can log in and gain administrative rights, you can lock yourself out of the controller.

        1. Create or confirm a non-root administrative account, and verify from a separate session that you can log in with it and elevate privileges.
        2. Edit the `/etc/ssh/sshd_config` file to set the `PermitRootLogin` parameter as follows:

           ```
           PermitRootLogin no
           ```

           or

           ```
           PermitRootLogin prohibit-password
           ```

        3. Validate the configuration with `sshd -t`, then restart the SSH service to apply the change. Restarting SSH ends active shell sessions but does not affect the running PLC program.

        > **Warning:** Keep your current session open until you confirm that the non-root administrative account can log in and elevate. Closing your only working session before verifying the replacement login can leave you locked out of the controller.
    refs:
      - url: https://www.plcnext.help/te/About/Home.htm
        title: PLCnext Technology Documentation
      - url: https://csrc.nist.gov/publications/detail/sp/800-82/rev-3/final
        title: NIST SP 800-82 Rev. 3 - Guide to OT Security
  - uid: phoenix-plcnext-16
    title: Ensure SSH PermitEmptyPasswords is disabled
    mql: |
      sshd.config.params["PermitEmptyPasswords"] == "no"
    docs:
      desc: The `PermitEmptyPasswords` parameter specifies if the SSH server allows login to accounts with empty password strings.
      remediation: |-
        Edit the `/etc/ssh/sshd_config` file to set the `PermitEmptyPasswords` parameter as follows:

        ```
        PermitEmptyPasswords no
        ```

        An account with a blank password lets anyone who knows the user name log in with no credential at all, so blocking empty passwords closes an open door into the controller. Validate the configuration with `sshd -t`, then restart the SSH service to apply the change. Restarting SSH ends active shell sessions but does not affect the running PLC program. Keep your current session open until you confirm a new login works.
    refs:
      - url: https://www.plcnext.help/te/About/Home.htm
        title: PLCnext Technology Documentation
      - url: https://www.cisa.gov/topics/industrial-control-systems
        title: CISA Industrial Control Systems Security
  - uid: phoenix-plcnext-17
    title: Ensure SSH PermitUserEnvironment is disabled
    mql: |
      sshd.config.params["PermitUserEnvironment"] == "no"
    docs:
      desc: The `PermitUserEnvironment` option allows users to present environment options to the `ssh` daemon.
      remediation: |-
        Edit the `/etc/ssh/sshd_config` file to set the `PermitUserEnvironment` parameter as follows:

        ```
        PermitUserEnvironment no
        ```

        Allowing users to set environment options at login lets a user influence how their session runs, which can be abused to load unexpected libraries or override paths and weaken other protections. A controller is administered by a small set of operators and has no need for this, so leaving it off keeps the login environment predictable. Validate the configuration with `sshd -t`, then restart the SSH service to apply the change. Restarting SSH ends active shell sessions but does not affect the running PLC program. Keep your current session open until you confirm a new login works.
    refs:
      - url: https://www.plcnext.help/te/About/Home.htm
        title: PLCnext Technology Documentation
      - url: https://csrc.nist.gov/publications/detail/sp/800-82/rev-3/final
        title: NIST SP 800-82 Rev. 3 - Guide to OT Security
  - uid: phoenix-plcnext-18
    title: Ensure SSH Idle Timeout Interval is configured
    mql: |
      sshd.config.params {
        _["ClientAliveInterval"] >= 1
        _["ClientAliveInterval"] <= 300
        _["ClientAliveCountMax"] <= 3
      }
    docs:
      desc: The two options `ClientAliveInterval` and `ClientAliveCountMax` control the timeout of ssh sessions. When the `ClientAliveInterval` variable is set, ssh sessions that have no activity for the specified length of time are terminated. When the `ClientAliveCountMax` variable is set, `sshd` will send client alive messages at every `ClientAliveInterval` interval. When the number of consecutive client alive messages are sent with no response from the client, the `ssh` session is terminated. For example, if the `ClientAliveInterval` is set to 15 seconds and the `ClientAliveCountMax` is set to 3, the client `ssh` session will be terminated after 45 seconds of idle time.
      remediation: |-
        Edit the `/etc/ssh/sshd_config` file to set the `ClientAliveInterval` and `ClientAliveCountMax` parameters according to site policy:

        ```
        ClientAliveInterval 300
        ClientAliveCountMax 3
        ```

        Closing idle sessions matters because an unattended logged-in terminal, for example an operator who walked away, is an open path for anyone with physical access to the engineering station. Do not set `ClientAliveCountMax` to 0. OpenSSH treats 0 as disabling the keepalive termination mechanism, so idle sessions would never be closed. Validate the configuration with `sshd -t`, then restart the SSH service to apply the change. Restarting SSH ends active shell sessions but does not affect the running PLC program. Keep your current session open until you confirm a new login works.
    refs:
      - url: https://www.plcnext.help/te/About/Home.htm
        title: PLCnext Technology Documentation
      - url: https://www.cisa.gov/topics/industrial-control-systems
        title: CISA Industrial Control Systems Security
  - uid: phoenix-plcnext-19
    title: Ensure SSH LoginGraceTime is set to one minute or less
    mql: |
      sshd.config.params {
        _["LoginGraceTime"] >= 1
        _["LoginGraceTime"] <= 60
      }
    docs:
      desc: The `LoginGraceTime` parameter specifies the time allowed for successful authentication to the SSH server. The longer the grace period is, the more open unauthenticated connections can exist. Like other session controls, the grace period should be limited to appropriate organizational limits to ensure the service is available for needed access.
      remediation: |-
        Edit the `/etc/ssh/sshd_config` file to set the `LoginGraceTime` parameter as follows:

        ```
        LoginGraceTime 60
        ```

        A shorter grace period means each unauthenticated connection is held open for less time, which limits how many half-open sessions an attacker can pile up to exhaust the daemon or stall legitimate logins. Validate the configuration with `sshd -t`, then restart the SSH service to apply the change. Restarting SSH ends active shell sessions but does not affect the running PLC program. Keep your current session open until you confirm a new login works.
    refs:
      - url: https://www.plcnext.help/te/About/Home.htm
        title: PLCnext Technology Documentation
      - url: https://csrc.nist.gov/publications/detail/sp/800-82/rev-3/final
        title: NIST SP 800-82 Rev. 3 - Guide to OT Security
  - uid: phoenix-plcnext-20
    title: Ensure SSH access is limited
    mql: |
      sshd.config.params["AllowUsers"] != empty || sshd.config.params["AllowGroups"] != empty || sshd.config.params["DenyUsers"] != empty || sshd.config.params["DenyGroups"] != empty
    docs:
      desc: |-
        There are several options available to limit which users and groups can access the system via SSH. It is recommended that at least one of the following options be leveraged: `AllowUsers`

        The `AllowUsers` variable gives the system administrator the option of allowing specific users to `ssh` into the system. The list consists of space-separated user names. Numeric user IDs are not recognized with this variable. If a system administrator wants to restrict user access further by only allowing the allowed users to log in from a particular host, the entry can be specified in the form of user@host. `AllowGroups`

        The `AllowGroups` variable gives the system administrator the option of allowing specific groups of users to `ssh` into the system. The list consists of space-separated group names. Numeric group IDs are not recognized with this variable. `DenyUsers`

        The `DenyUsers` variable gives the system administrator the option of denying specific users to `ssh` into the system. The list consists of space-separated user names. Numeric user IDs are not recognized with this variable. If a system administrator wants to restrict user access further by specifically denying user access from a particular host, the entry can be specified in the form of user@host. `DenyGroups`

        The `DenyGroups` variable gives the system administrator the option of denying specific groups of users to `ssh` into the system. The list consists of space-separated group names. Numeric group IDs are not recognized with this variable.
      remediation: |-
        Edit the `/etc/ssh/sshd_config` file and add at least one of these parameters:

        ```text
        AllowUsers <userlist>
        AllowGroups <grouplist>

        DenyUsers <userlist>
        DenyGroups <grouplist>
        ```

        Restricting SSH to a named set of users or groups means a stolen or default credential for any other account cannot be used to reach the controller over SSH. Validate the configuration with `sshd -t`, then restart the SSH service to apply the change.

        > **Warning:** Once `AllowUsers` or `AllowGroups` is set, every account not on the list loses SSH access to the controller. Make sure the list includes the administrative account you use to manage the device, and keep your current SSH session open while you verify that a new login still succeeds.
    refs:
      - url: https://www.plcnext.help/te/About/Home.htm
        title: PLCnext Technology Documentation
      - url: https://www.cisa.gov/topics/industrial-control-systems
        title: CISA Industrial Control Systems Security
  - uid: phoenix-plcnext-21
    title: Ensure SSH warning banner is configured
    mql: |
      sshd.config.params["Banner"] != empty
      sshd.config.params["Banner"] != "none"
    docs:
      desc: The `Banner` parameter specifies a file whose contents must be sent to the remote user before authentication is permitted. By default, no banner is displayed. A login banner states the system is restricted and use is monitored, which supports legal action against unauthorized access and warns casual intruders off before they authenticate.
      remediation: |-
        Create a banner file containing your organization's system use notification, then point the SSH daemon at it:

        1. Write the notification text to `/opt/plcnext/config/System/Um/SystemUseNotification.txt`. Do not include details about the device, firmware, or network in the banner, because that information helps an attacker. On PLCnext this notification text may also be managed through the Web-based Management interface, so confirm which source is authoritative before editing the file directly.
        2. Edit the `/etc/ssh/sshd_config` file to set the `Banner` parameter:

           ```text
           Banner /opt/plcnext/config/System/Um/SystemUseNotification.txt
           ```

        3. Validate the configuration with `sshd -t`, then restart the SSH service to apply the change. Restarting SSH ends active shell sessions but does not affect the running PLC program. Keep your current session open until you confirm a new login works.
    refs:
      - url: https://www.plcnext.help/te/About/Home.htm
        title: PLCnext Technology Documentation
      - url: https://csrc.nist.gov/publications/detail/sp/800-82/rev-3/final
        title: NIST SP 800-82 Rev. 3 - Guide to OT Security
  - uid: phoenix-plcnext-22
    title: Ensure SSH password authentication is disabled
    mql: |
      sshd.config.params["PasswordAuthentication"] == "no"
      sshd.config.params["PubkeyAuthentication"] == "yes"
    docs:
      desc: |
        Using SSH key authentication is considered to be a more secure method of logging into a remote system than using passwords. Here are some reasons why you might want to consider using only SSH key authentication:

        - Increased security: SSH key authentication uses public-key cryptography to secure the connection, which is considered to be much more secure than using passwords. Passwords can be guessed or cracked, whereas an SSH key must be physically acquired by an attacker to be used to gain unauthorized access.

        - Convenience: Once you have set up an SSH key pair, logging into a remote system is faster and more convenient than typing a password every time.

        - Improved audit trail: SSH key authentication provides a more detailed audit trail, making it easier to detect and respond to unauthorized access attempts.

        - Automation: SSH key authentication can be automated, making it easier to automate tasks and access remote systems without human intervention.

        While there are benefits to using only SSH key authentication, it is important to ensure that your SSH keys are managed properly, with strong passwords, and are backed up in case of loss or corruption.

        In summary, allowing only SSH key authentication can provide a more secure and convenient way to access remote systems, but it is important to manage your keys properly to ensure that the increased security is not compromised.
      remediation: |-
        Set up key-based authentication for your administrative account before disabling password authentication. If you disable password authentication without a working key, you lose SSH access to the controller.

        1. Generate an SSH key pair on your engineering workstation and install the public key for the management account on the controller:

           ```bash
           mkdir -p /home/admin/.ssh
           chmod 700 /home/admin/.ssh
           echo 'ssh-ed25519 AAAA...your-public-key... user@workstation' >> /home/admin/.ssh/authorized_keys
           chmod 600 /home/admin/.ssh/authorized_keys
           chown -R admin /home/admin/.ssh
           ```

        2. From a new terminal, confirm that key-based login works while keeping your current session open.
        3. Edit the `/etc/ssh/sshd_config` file to set the `PasswordAuthentication` and `PubkeyAuthentication` parameters:

           ```text
           PasswordAuthentication no
           PubkeyAuthentication yes
           ```

        4. Validate the configuration with `sshd -t`, restart the SSH service, and verify key-based login again before closing your session.

        > **Warning:** Applying `PasswordAuthentication no` without a tested key locks all users out of SSH on the controller. Keep an active session open until you confirm key-based access works.
    refs:
      - url: https://pxc1.esc-eu-central-1.empolisservices.com/service-express/portal/project1_p/document/en-so-30b315c3-3e44-4292-97d4-6883672cd34c?context=%7B%7D
        title: How to set up key-based SSH authentication to a PLCnext Control device
