policies:
  - uid: mondoo-proxmox-security
    name: Mondoo Proxmox VE Security
    version: 1.1.3
    license: BUSL-1.1
    tags:
      mondoo.com/category: security
      mondoo.com/platform: linux,debian,proxmox
    authors:
      - name: Nico Pfeifer
        email: 99395643+langen1x@users.noreply.github.com
    require:
      - provider: os
    summary: Secure Proxmox Virtual Environment hypervisor, VM, and container configurations
    docs:
      desc: |
        The Mondoo Proxmox VE Security policy identifies critical misconfigurations on Proxmox Virtual Environment hypervisors that could leave your virtualization platform vulnerable to attackers. This policy helps organizations detect and remediate hardening gaps before they can be exploited, reducing the likelihood of unauthorized hypervisor access, VM and container escape, lateral movement across guests, and disruption of every workload running on the host.

        This policy runs alongside the [Mondoo Linux Security](mondoo-linux-security.mql.yaml) policy, which covers the underlying Debian OS hardening. Checks already covered by the Linux baseline are not duplicated here.

        This policy provides security checks across key Proxmox VE areas:

        - **Proxmox access control**: Two-factor authentication, Administrator role assignment, `user.cfg` permissions, Proxmox-adapted SSH root login
        - **Account security**: Empty password detection, UID 0 account validation
        - **Proxmox firewall**: Cluster firewall enablement, default DROP policy, per-node firewall, rule presence
        - **TLS certificates**: Self-signed certificate detection, expiration monitoring
        - **LXC container security**: Unprivileged containers, nesting, AppArmor, per-interface firewall, mknod and FUSE restrictions, resource limits
        - **QEMU/KVM VM security**: Spectre and Meltdown mitigations, per-interface firewall, raw QEMU argument restrictions
        - **Cluster and migration**: Corosync encryption, live migration encryption
        - **Network segmentation**: VLAN usage across VMs and containers
        - **Storage and backup encryption**: Proxmox Backup Server encryption, master key configuration
        - **Proxmox-specific hardening**: KSM disable, PCI ACS override prevention, IOMMU, auditd watches on `/etc/pve/`
        - **ANSSI-BP-028 kernel hardening**: Unprivileged BPF, `kexec_load`, `perf_event_paranoid`, TTY line discipline autoload, TCP RFC 1337, user namespaces
        - **Password policy**: `login.defs` extensions including PASS_MAX_DAYS, PASS_MIN_DAYS, and ENCRYPT_METHOD
        - **Cron security**: Permissions on `/etc/crontab`, `/etc/cron.d`, `/etc/cron.hourly`

        ## References

        - [CIS Debian Linux Benchmark](https://www.cisecurity.org/benchmark/debian_linux)
        - [ANSSI-BP-028 Linux Hardening Guide](https://cyber.gouv.fr/sites/default/files/document/linux_configuration-en-v2.0.pdf)
        - [BSI SYS.1.5 Virtualisation](https://www.bsi.bund.de/)
        - [Proxmox VE Administration Guide](https://pve.proxmox.com/pve-docs/pve-admin-guide.html)
        - [Proxmox VE Firewall Documentation](https://pve.proxmox.com/wiki/Firewall)

        Learn more about scanning Proxmox VE in the [cnspec Proxmox VE documentation](https://mondoo.com/docs/cnspec/cloud/proxmox).

        Have suggestions for new checks in this policy? Visit our [cnspec repository](https://github.com/mondoohq/cnspec).
    scoring_system: highest impact

    groups:
      - title: "Proxmox Access Control"
        filters: |
          file("/etc/pve/datacenter.cfg").exists
        checks:
          - uid: mondoo-proxmox-security-tfa-is-configured
          - uid: mondoo-proxmox-security-admin-role-is-not-overused
          - uid: mondoo-proxmox-security-user-cfg-permissions
          - uid: mondoo-proxmox-security-ssh-root-login-is-key-only
          - uid: mondoo-proxmox-security-ssh-password-auth-is-disabled

      - title: "Account Security"
        filters: |
          file("/etc/shadow").exists
        checks:
          - uid: mondoo-proxmox-security-no-uid-zero-aside-from-root
          - uid: mondoo-proxmox-security-no-empty-passwords

      - title: "Proxmox Firewall"
        filters: |
          file("/etc/pve/datacenter.cfg").exists
        checks:
          - uid: mondoo-proxmox-security-cluster-firewall-is-enabled
          - uid: mondoo-proxmox-security-firewall-default-policy-is-drop
          - uid: mondoo-proxmox-security-node-firewall-is-enabled
          - uid: mondoo-proxmox-security-firewall-has-rules

      - title: "Proxmox TLS Certificates"
        filters: |
          file("/etc/pve/local/pve-ssl.pem").exists
        checks:
          - uid: mondoo-proxmox-security-cert-is-not-selfsigned
          - uid: mondoo-proxmox-security-cert-is-not-expiring

      - title: "LXC Container Security"
        filters: |
          file("/etc/pve/lxc").exists
        checks:
          - uid: mondoo-proxmox-security-ct-all-unprivileged
          - uid: mondoo-proxmox-security-ct-nesting-is-disabled
          - uid: mondoo-proxmox-security-ct-apparmor-is-enforced
          - uid: mondoo-proxmox-security-ct-firewall-is-enabled
          - uid: mondoo-proxmox-security-ct-no-mknod
          - uid: mondoo-proxmox-security-ct-no-fuse
          - uid: mondoo-proxmox-security-ct-memory-limit-is-set

      - title: "QEMU/KVM VM Security"
        filters: |
          file("/etc/pve/qemu-server").exists
        checks:
          - uid: mondoo-proxmox-security-vm-spectre-mitigations
          - uid: mondoo-proxmox-security-vm-firewall-is-enabled
          - uid: mondoo-proxmox-security-vm-no-raw-qemu-args

      - title: "Cluster & Migration"
        filters: |
          file("/etc/pve/corosync.conf").exists
        checks:
          - uid: mondoo-proxmox-security-corosync-is-encrypted
          - uid: mondoo-proxmox-security-migration-is-encrypted

      - title: "Network Segmentation"
        filters: |
          file("/etc/pve/qemu-server").exists || file("/etc/pve/lxc").exists
        checks:
          - uid: mondoo-proxmox-security-vlans-are-in-use

      - title: "Storage & Backup Encryption"
        filters: |
          file("/etc/pve/storage.cfg").exists
        checks:
          - uid: mondoo-proxmox-security-pbs-encryption-is-enabled
          - uid: mondoo-proxmox-security-pbs-master-key-is-configured

      - title: "Proxmox-specific Hardening"
        filters: |
          file("/etc/pve/datacenter.cfg").exists
        checks:
          - uid: mondoo-proxmox-security-ksm-is-disabled
          - uid: mondoo-proxmox-security-no-pci-acs-override
          - uid: mondoo-proxmox-security-iommu-is-enabled
          - uid: mondoo-proxmox-security-auditd-watches-pve-directory
          - uid: mondoo-proxmox-security-update-repo-is-configured
          - uid: mondoo-proxmox-security-automatic-updates-are-enabled

      - title: "ANSSI-BP-028 Kernel Hardening"
        filters: |
          file("/etc/pve/datacenter.cfg").exists
        checks:
          - uid: mondoo-proxmox-security-unprivileged-bpf-disabled
          - uid: mondoo-proxmox-security-kexec-load-disabled
          - uid: mondoo-proxmox-security-perf-event-paranoid
          - uid: mondoo-proxmox-security-tty-ldisc-autoload-disabled
          - uid: mondoo-proxmox-security-tcp-rfc1337-enabled
          - uid: mondoo-proxmox-security-user-namespace-unprivileged

      - title: "Password Policy"
        filters: |
          file("/etc/login.defs").exists
        checks:
          - uid: mondoo-proxmox-security-login-defs-pass-max-days
          - uid: mondoo-proxmox-security-login-defs-pass-min-days
          - uid: mondoo-proxmox-security-login-defs-encrypt-method

      - title: "Cron Security"
        filters: |
          file("/etc/crontab").exists
        checks:
          - uid: mondoo-proxmox-security-crontab-permissions
          - uid: mondoo-proxmox-security-cron-d-permissions
          - uid: mondoo-proxmox-security-cron-hourly-permissions

queries:
  # =================================================================
  # Proxmox Access Control
  # =================================================================

  - uid: mondoo-proxmox-security-tfa-is-configured
    title: Ensure two-factor authentication is configured
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-14
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-j
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-3
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-2
      compliance/pci-dss-4: pcidss-requirement-8-4-1
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-2
    refs:
      - title: CWE-308 Use of Single-factor Authentication
        url: https://cwe.mitre.org/data/definitions/308.html
      - title: Proxmox VE Two-Factor Authentication
        url: https://pve.proxmox.com/wiki/User_Management#pveum_tfa_auth
    mql: |
      file("/etc/pve/priv/tfa.cfg") {
        exists
        size > 10
      }
    docs:
      desc: |
        This check ensures that two-factor authentication is configured for administrative access to the Proxmox VE cluster. A fresh Proxmox install enforces only a single password factor, leaving accounts exposed if credentials are guessed or stolen.

        **Why this matters**

        - **Credential theft:** A second factor blocks an attacker who has obtained a valid password from phishing, reuse, or a breach.
        - **Hypervisor blast radius:** Compromising a Proxmox login exposes every guest VM and container running on the cluster.
        - **Compliance:** Multiple frameworks require multi-factor authentication for access to systems holding sensitive workloads.

        **Risk mitigation**

        - **Brute-force resistance:** TOTP, WebAuthn, or YubiKey factors defeat automated password-guessing campaigns.
        - **Account assurance:** Enforcing a second factor at the realm level guarantees every user must enroll a token before they can authenticate.
      audit: |
        ### Audit via Web UI

        1. Log in to the Proxmox VE web interface.
        2. Go to Datacenter, then Permissions, then Two Factor.
        3. Confirm that administrative users have an enrolled TOTP, WebAuthn, or YubiKey factor.
        4. Go to Datacenter, then Permissions, then Realms, open each realm, and confirm a required TFA type is set.

        A passing result shows enrolled second factors for administrators and a TFA requirement on the realm; a failing result shows no enrolled factors and no realm-level TFA enforcement.

        ### Audit via CLI

        Run the command on a cluster node:

        ```bash
        test -s /etc/pve/priv/tfa.cfg && wc -c /etc/pve/priv/tfa.cfg
        ```

        A passing result shows the file exists with more than 10 bytes of content; an empty or missing file means no two-factor authentication is configured.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Require a time-based one-time password factor on each authentication
            realm so every user must enrol a token at their next login.

            **Verify the command surface for your PVE 8.x version first.** The
            realm-level `--tfa type=oath` form and the per-user TFA verbs have
            changed across Proxmox VE releases. Before applying, confirm the
            exact flags and subcommands for your version with
            `pveum realm modify --help` and `pveum user --help` (and check the
            `/access/tfa` API path with `pvesh ls /access/tfa`). Substitute the
            verified commands for the examples below if they differ:

            ```bash
            pveum realm modify pam --tfa type=oath
            pveum realm modify pve --tfa type=oath
            ```

            Realm enforcement alone does not create any token. Each user must
            enrol a factor, which writes an entry to `/etc/pve/priv/tfa.cfg`.
            Enrolment is done in the web interface: open Datacenter, then
            Permissions, then Two Factor, select Add, then TOTP, and scan the
            QR code with an authenticator app. To list enrolled factors, use the
            verb confirmed for your PVE 8.x version (for example query the TFA
            API with `pvesh get /access/tfa`):

            ```bash
            pvesh get /access/tfa
            ```
        - id: bash
          desc: |
            **Using a Bash Script**

            Enforce TOTP enrolment on every authentication realm and verify the
            resulting `tfa.cfg`:

            ```bash
            #!/bin/bash
            set -e

            while IFS= read -r realm; do
              echo "Requiring TOTP enrolment on realm $realm"
              pveum realm modify "$realm" --tfa type=oath
            done < <(pveum realm list --output-format json | jq -r '.[].realm')

            if [ ! -s /etc/pve/priv/tfa.cfg ]; then
              echo "WARNING: /etc/pve/priv/tfa.cfg is empty - users must still enrol TFA tokens in the web interface" >&2
            fi
            ```
        - id: ansible
          desc: |
            **Using Ansible**

            Use this Ansible playbook to require TOTP enrolment on every realm.
            Users must still enrol their individual tokens in the web interface:

            ```yaml
            ---
            - name: Enforce two-factor authentication on Proxmox realms
              hosts: proxmox
              become: true

              tasks:
                - name: List Proxmox realms
                  ansible.builtin.command: pveum realm list --output-format json
                  register: pve_realms
                  changed_when: false

                - name: Require TOTP enrolment on each realm
                  ansible.builtin.command: "pveum realm modify {{ item.realm }} --tfa type=oath"
                  loop: "{{ pve_realms.stdout | from_json }}"
                  loop_control:
                    label: "{{ item.realm }}"
            ```

  - uid: mondoo-proxmox-security-admin-role-is-not-overused
    title: Ensure the Administrator role is assigned sparingly
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-2
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-5
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-6
      compliance/pci-dss-4: pcidss-requirement-7-2-2
      compliance/soc2-2017: soc2-control-cc6-3-3
      compliance/vda-isa-5: vda-isa-5-4-2-1
    refs:
      - title: CWE-269 Improper Privilege Management
        url: https://cwe.mitre.org/data/definitions/269.html
      - title: Proxmox VE User Management
        url: https://pve.proxmox.com/wiki/User_Management
    mql: |
      file("/etc/pve/user.cfg").content.lines.where(_ == /Administrator/).length <= 3
    docs:
      desc: |
        This check ensures that the built-in Administrator role is granted to as few principals as possible across the cluster access control list. The Administrator role conveys unrestricted control of the datacenter, so widespread assignment erodes least-privilege boundaries.

        **Why this matters**

        - **Unrestricted access:** The Administrator role bypasses every scoped permission and grants full control of all nodes, storage, and guests.
        - **Expanded attack surface:** Each Administrator account is a path to total cluster compromise if its credentials are stolen.
        - **Accountability:** Broad use of one all-powerful role makes it hard to attribute changes or contain a misused account.

        **Risk mitigation**

        - **Least privilege:** Scoped roles such as PVEVMAdmin, PVEDatastoreAdmin, and PVEAuditor limit each operator to the resources they actually manage.
        - **Containment:** Fewer Administrator holders means a single compromised account cannot reach the entire cluster.
      audit: |
        ### Audit via Web UI

        1. Log in to the Proxmox VE web interface.
        2. Go to Datacenter, then Permissions.
        3. Review each access control entry and note which principals hold the Administrator role.

        A passing result shows the Administrator role assigned to a small number of trusted principals; a failing result shows the role granted broadly where scoped roles would suffice.

        ### Audit via CLI

        Run the command on a cluster node:

        ```bash
        pveum acl list
        ```

        A passing result lists at most a few entries that grant the Administrator role; a failing result shows many subjects holding it instead of least-privilege roles.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            List existing ACL entries and the principals that hold the
            `Administrator` role:

            ```bash
            pveum acl list
            grep -E '[:,]Administrator[,:]' /etc/pve/user.cfg
            ```

            Replace `Administrator` with a least-privilege role for a given
            subject by deleting the over-broad ACL and re-adding a scoped role:

            ```bash
            pveum acl delete / --users <user>@<realm> --roles Administrator
            pveum acl modify /vms --users <user>@<realm> --roles PVEVMAdmin
            ```
        - id: bash
          desc: |
            **Using a Bash Script**

            Print every ACL entry that grants `Administrator` so an operator can
            review and downgrade them:

            ```bash
            #!/bin/bash
            set -e

            echo "Subjects holding the Administrator role:"
            grep -E '[:,]Administrator[,:]' /etc/pve/user.cfg || echo "  (none)"

            cat <<'EOF'

            Review each entry above. For every subject that does not need full
            cluster-wide control, delete the Administrator ACL and replace it
            with a scoped role such as PVEVMAdmin, PVEDatastoreAdmin, or PVEAuditor:

              pveum acl delete <path> --users <user>@<realm> --roles Administrator
              pveum acl modify <scoped-path> --users <user>@<realm> --roles <scoped-role>
            EOF
            ```
        - id: ansible
          desc: |
            **Using Ansible**

            Use this Ansible playbook to revoke the `Administrator` role from a
            specific user and grant a scoped replacement:

            ```yaml
            ---
            - name: Reduce Proxmox Administrator role usage
              hosts: proxmox
              become: true
              vars:
                pve_user: "alice@pve"
                pve_scope: "/vms"
                pve_scoped_role: "PVEVMAdmin"

              tasks:
                - name: Revoke Administrator on the cluster root
                  ansible.builtin.command: "pveum acl delete / --users {{ pve_user }} --roles Administrator"
                  register: revoke
                  changed_when: revoke.rc == 0
                  failed_when: revoke.rc not in [0, 2]

                - name: Grant a scoped role instead
                  ansible.builtin.command: "pveum acl modify {{ pve_scope }} --users {{ pve_user }} --roles {{ pve_scoped_role }}"
            ```

  - uid: mondoo-proxmox-security-user-cfg-permissions
    title: Ensure /etc/pve/user.cfg is not world-readable
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-16
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-3
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-2
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/pci-dss-4: pcidss-requirement-2-2-6
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-1-3
    refs:
      - title: CWE-732 Incorrect Permission Assignment for Critical Resource
        url: https://cwe.mitre.org/data/definitions/732.html
    mql: |
      mount.list.one(path == "/etc/pve")
      file("/etc/pve/user.cfg") {
        permissions.other_readable == false
      }
    docs:
      desc: |
        This check ensures that the cluster user database at /etc/pve/user.cfg is not readable by unprivileged accounts. This file enumerates every user, group, and access control entry, so exposing it to all local accounts hands attackers a map of the cluster's identity model.

        **Why this matters**

        - **Reconnaissance:** A world-readable user database tells any local account which principals and roles exist and which are worth targeting.
        - **Privilege escalation:** Knowing the full ACL layout helps an attacker plan a path toward Administrator-level access.
        - **Sensitive metadata:** The file may include token identifiers and group memberships that should stay confidential.

        **Risk mitigation**

        - **Access control:** Mode 0640 with root and www-data ownership restricts reads to root and the Proxmox API service.
        - **Reduced exposure:** Removing world-read access prevents low-privilege users from enumerating the cluster identity model.
      audit: |
        ### Audit via CLI

        Run the command on a cluster node:

        ```bash
        stat -c '%U:%G %a' /etc/pve/user.cfg
        ```

        A passing result shows ownership root:www-data and a mode such as 640 with no read bit for other; a failing result shows a mode whose final digit grants read access, for example 644.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            The Proxmox cluster filesystem mounted at `/etc/pve` enforces
            ownership root:www-data and mode 0640 on `user.cfg` and does not
            allow those permissions to be changed. A failing result therefore
            means `/etc/pve` is not mounted by the cluster filesystem and the
            scanner saw a plain directory on the root filesystem. Restore the
            cluster filesystem service:

            ```bash
            findmnt /etc/pve
            systemctl enable --now pve-cluster
            stat -c '%U:%G %a' /etc/pve/user.cfg
            ```
        - id: bash
          desc: |
            **Using a Bash Script**

            Verify the cluster filesystem is mounted and start it when it is not:

            ```bash
            #!/bin/bash
            set -e

            if findmnt /etc/pve >/dev/null; then
              echo "/etc/pve is mounted by pmxcfs; permissions are enforced as root:www-data 0640."
              exit 0
            fi

            echo "/etc/pve is not a pmxcfs mount; starting pve-cluster"
            systemctl enable --now pve-cluster
            findmnt /etc/pve
            stat -c '%U:%G %a %n' /etc/pve/user.cfg
            ```
        - id: ansible
          desc: |
            **Using Ansible**

            Use this Ansible playbook to ensure the cluster filesystem service
            is running, which enforces the correct permissions on `user.cfg`:

            ```yaml
            ---
            - name: Ensure the Proxmox cluster filesystem is mounted
              hosts: proxmox
              become: true

              tasks:
                - name: Ensure pve-cluster is enabled and running
                  ansible.builtin.systemd:
                    name: pve-cluster
                    state: started
                    enabled: true

                - name: Verify /etc/pve is a pmxcfs mount
                  ansible.builtin.command: findmnt /etc/pve
                  changed_when: false
            ```

  - uid: mondoo-proxmox-security-ssh-root-login-is-key-only
    title: Ensure SSH root login is key-only (Proxmox-adapted)
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-14
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-3
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-3
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-5
      compliance/pci-dss-4: pcidss-requirement-2-2-6
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-2
    refs:
      - title: CWE-522 Insufficiently Protected Credentials
        url: https://cwe.mitre.org/data/definitions/522.html
      - title: Proxmox VE Cluster SSH Requirements
        url: https://pve.proxmox.com/wiki/Cluster_Manager#_preparation
    mql: |
      sshd.config.params["PermitRootLogin"].in(["prohibit-password", "without-password", "forced-commands-only"])
    docs:
      desc: |
        This check ensures that SSH root login on Proxmox nodes is permitted only with a key and never with a password. Proxmox VE relies on root SSH access for cluster operations and live migration, so the standard Linux baseline value of PermitRootLogin no would break the cluster, while prohibit-password keeps key-based access working safely.

        **Why this matters**

        - **Cluster operation:** Proxmox needs working root SSH for corosync, live migration, and node management, so root login cannot simply be disabled.
        - **Password attacks:** Allowing password-based root login exposes the hypervisor to brute-force and credential-stuffing attempts.
        - **Strong authentication:** Key-only root login requires possession of a private key that cannot be guessed.

        **Risk mitigation**

        - **Brute-force resistance:** Setting prohibit-password, without-password, or forced-commands-only refuses every password-based root login attempt.
        - **Operational compatibility:** Key-only root access preserves the cluster functions Proxmox depends on while closing the password attack path.
      audit: |
        ### Audit via CLI

        Run the command on a cluster node:

        ```bash
        sshd -T | grep -i permitrootlogin
        ```

        A passing result shows permitrootlogin set to prohibit-password, without-password, or forced-commands-only; a failing result shows yes, which allows password-based root login.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Set `PermitRootLogin prohibit-password` and reload sshd. Make sure
            you have a working SSH key for root before reloading or you will
            lock yourself out:

            ```bash
            sed -i -E 's|^[#[:space:]]*PermitRootLogin[[:space:]].*|PermitRootLogin prohibit-password|' /etc/ssh/sshd_config
            grep -q '^PermitRootLogin' /etc/ssh/sshd_config || echo 'PermitRootLogin prohibit-password' >> /etc/ssh/sshd_config
            sshd -t
            systemctl reload ssh
            ```
        - id: bash
          desc: |
            **Using a Bash Script**

            Enforce `PermitRootLogin prohibit-password`, validate the resulting
            config, and reload sshd:

            ```bash
            #!/bin/bash
            set -e

            config=/etc/ssh/sshd_config
            if grep -qE '^[#[:space:]]*PermitRootLogin' "$config"; then
              sed -i -E 's|^[#[:space:]]*PermitRootLogin[[:space:]].*|PermitRootLogin prohibit-password|' "$config"
            else
              echo 'PermitRootLogin prohibit-password' >> "$config"
            fi

            sshd -t
            systemctl reload ssh
            ```
        - id: ansible
          desc: |
            **Using Ansible**

            Use this Ansible playbook to set `PermitRootLogin prohibit-password`
            and reload sshd:

            ```yaml
            ---
            - name: Set Proxmox-compatible SSH root login policy
              hosts: proxmox
              become: true

              tasks:
                - name: Set PermitRootLogin to prohibit-password
                  ansible.builtin.lineinfile:
                    path: /etc/ssh/sshd_config
                    regexp: '^[#\s]*PermitRootLogin\s+'
                    line: 'PermitRootLogin prohibit-password'
                    validate: '/usr/sbin/sshd -t -f %s'
                  notify: Reload sshd

              handlers:
                - name: Reload sshd
                  ansible.builtin.service:
                    name: ssh
                    state: reloaded
            ```

  - uid: mondoo-proxmox-security-ssh-password-auth-is-disabled
    title: Ensure SSH password authentication is disabled
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-14
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-3
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-3
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-5
      compliance/pci-dss-4: pcidss-requirement-2-2-6
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-2
    refs:
      - title: CWE-521 Weak Password Requirements
        url: https://cwe.mitre.org/data/definitions/521.html
    mql: |
      sshd.config.params["PasswordAuthentication"] == "no"
    docs:
      desc: |
        This check ensures that SSH password authentication is disabled on Proxmox nodes so that only key-based logins are accepted. Password authentication is enabled by default on Debian-based systems, leaving the hypervisor's SSH service open to brute-force credential attacks.

        **Why this matters**

        - **Brute-force exposure:** A password-accepting SSH service can be attacked with automated guessing against any known account.
        - **Credential reuse:** Stolen or reused passwords let an attacker log in directly without a key.
        - **Hypervisor compromise:** SSH access to a Proxmox node grants control of every guest it hosts.

        **Risk mitigation**

        - **Key-only access:** Setting PasswordAuthentication no rejects all password logins and requires a private key.
        - **Attack surface reduction:** Removing the password path eliminates brute-force and credential-stuffing as a route into the hypervisor.
      audit: |
        ### Audit via CLI

        Run the command on a cluster node:

        ```bash
        sshd -T | grep -i passwordauthentication
        ```

        A passing result shows passwordauthentication no; a failing result shows passwordauthentication yes.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Disable password authentication and reload sshd. Verify SSH key
            login works for every administrator before reloading:

            ```bash
            sed -i -E 's|^[#[:space:]]*PasswordAuthentication[[:space:]].*|PasswordAuthentication no|' /etc/ssh/sshd_config
            grep -q '^PasswordAuthentication' /etc/ssh/sshd_config || echo 'PasswordAuthentication no' >> /etc/ssh/sshd_config
            sshd -t
            systemctl reload ssh
            ```
        - id: bash
          desc: |
            **Using a Bash Script**

            Set `PasswordAuthentication no` and reload sshd after validating the config:

            ```bash
            #!/bin/bash
            set -e

            config=/etc/ssh/sshd_config
            if grep -qE '^[#[:space:]]*PasswordAuthentication' "$config"; then
              sed -i -E 's|^[#[:space:]]*PasswordAuthentication[[:space:]].*|PasswordAuthentication no|' "$config"
            else
              echo 'PasswordAuthentication no' >> "$config"
            fi

            sshd -t
            systemctl reload ssh
            ```
        - id: ansible
          desc: |
            **Using Ansible**

            Use this Ansible playbook to disable SSH password authentication:

            ```yaml
            ---
            - name: Disable SSH password authentication
              hosts: proxmox
              become: true

              tasks:
                - name: Set PasswordAuthentication to no
                  ansible.builtin.lineinfile:
                    path: /etc/ssh/sshd_config
                    regexp: '^[#\s]*PasswordAuthentication\s+'
                    line: 'PasswordAuthentication no'
                    validate: '/usr/sbin/sshd -t -f %s'
                  notify: Reload sshd

              handlers:
                - name: Reload sshd
                  ansible.builtin.service:
                    name: ssh
                    state: reloaded
            ```

  # =================================================================
  # Account Security
  # =================================================================

  - uid: mondoo-proxmox-security-no-uid-zero-aside-from-root
    title: Ensure root is the only UID 0 account
    impact: 100
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-i-access-control-unique-user-identification
      compliance/iso-27001-2022: iso-27001-2022-a-8-2
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-5
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-6
      compliance/pci-dss-4: pcidss-requirement-7-2-2
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-2-1
    refs:
      - title: CWE-250 Execution with Unnecessary Privileges
        url: https://cwe.mitre.org/data/definitions/250.html
    mql: |
      users.where(uid == 0).list.all(name == "root")
    docs:
      desc: |
        This check ensures that root is the only account on a Proxmox node with UID 0. Any additional UID 0 account holds full superuser authority, so a clean system should expose exactly one such account.

        **Why this matters**

        - **Hidden superusers:** A second UID 0 account silently grants complete root authority and is a common backdoor technique.
        - **Bypassed controls:** A UID 0 account ignores file permissions and every other access restriction on the host.
        - **Auditing gaps:** Multiple root-equivalent accounts make it hard to attribute privileged actions to a single identity.

        **Risk mitigation**

        - **Single superuser:** Keeping root as the only UID 0 account gives one well-known, well-monitored privileged identity.
        - **Backdoor removal:** Reassigning or deleting extra UID 0 accounts closes a stealthy persistence path.
      audit: |
        ### Audit via CLI

        Run the command on a cluster node:

        ```bash
        awk -F: '($3 == 0) {print $1}' /etc/passwd
        ```

        A passing result lists only root; a failing result lists any additional account name with UID 0.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Identify offending accounts and reassign or delete them:

            ```bash
            awk -F: '($3 == 0 && $1 != "root") {print $1}' /etc/passwd

            # Reassign to an unused UID:
            usermod -u <new-uid> <username>
            chown -R <new-uid> /home/<username>

            # Or remove the account entirely if it is unused:
            userdel <username>
            ```
        - id: bash
          desc: |
            **Using a Bash Script**

            Locate every non-root UID 0 account and prompt an operator to
            reassign or delete each one:

            ```bash
            #!/bin/bash
            set -e

            mapfile -t offenders < <(awk -F: '($3 == 0 && $1 != "root") {print $1}' /etc/passwd)
            if [ ${#offenders[@]} -eq 0 ]; then
              echo "No non-root UID 0 accounts found."
              exit 0
            fi

            echo "Non-root UID 0 accounts detected:"
            printf '  - %s\n' "${offenders[@]}"
            echo
            echo "Run 'usermod -u <new-uid> <name>' to reassign or 'userdel <name>' to remove."
            ```
        - id: ansible
          desc: |
            **Using Ansible**

            Use this Ansible playbook to fail when any non-root UID 0 account
            exists, so the runbook stops before any user is removed by mistake:

            ```yaml
            ---
            - name: Detect non-root UID 0 accounts
              hosts: proxmox
              become: true

              tasks:
                - name: Find non-root UID 0 accounts
                  ansible.builtin.shell: |
                    set -o pipefail
                    awk -F: '$3 == 0 && $1 != "root" {print $1}' /etc/passwd
                  register: uid_zero_accounts
                  changed_when: false

                - name: Fail if non-root UID 0 accounts exist
                  ansible.builtin.fail:
                    msg: "Non-root UID 0 accounts found: {{ uid_zero_accounts.stdout_lines }} - reassign or remove them"
                  when: uid_zero_accounts.stdout_lines | length > 0
            ```

  - uid: mondoo-proxmox-security-no-empty-passwords
    title: Ensure no password field is empty in /etc/shadow
    impact: 100
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-15
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-2
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-5
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-3
    refs:
      - title: CWE-258 Empty Password in Configuration File
        url: https://cwe.mitre.org/data/definitions/258.html
    mql: |
      file("/etc/shadow").content.lines.none(_ == /^[^:]+::/)
    docs:
      desc: |
        This check ensures that no account in /etc/shadow has an empty password field on a Proxmox node. An empty hash lets the account authenticate with no credential at all, which is one of the most direct routes onto a host.

        **Why this matters**

        - **Credential-free login:** An account with an empty password field can be accessed without supplying any secret.
        - **Lateral movement:** An attacker who reaches the host can use such an account to gain an interactive session immediately.
        - **Hypervisor exposure:** Any foothold on a Proxmox node threatens every guest VM and container it runs.

        **Risk mitigation**

        - **Account lockdown:** Locking or assigning a strong password to each affected account closes the credential-free login path.
        - **Authentication assurance:** Requiring a valid secret for every account restores a baseline of access control on the host.
      audit: |
        ### Audit via CLI

        Run the command on a cluster node:

        ```bash
        awk -F: '($2 == "") {print $1}' /etc/shadow
        ```

        A passing result prints nothing; a failing result prints the name of any account whose password field is empty.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Identify accounts with an empty password field and lock them:

            ```bash
            awk -F: '($2 == "") {print $1}' /etc/shadow

            for user in $(awk -F: '($2 == "") {print $1}' /etc/shadow); do
              passwd -l "$user"
            done
            ```
        - id: bash
          desc: |
            **Using a Bash Script**

            Lock every account whose `/etc/shadow` password field is empty:

            ```bash
            #!/bin/bash
            set -e

            mapfile -t empty < <(awk -F: '($2 == "") {print $1}' /etc/shadow)
            if [ ${#empty[@]} -eq 0 ]; then
              echo "No accounts with empty passwords."
              exit 0
            fi

            for user in "${empty[@]}"; do
              echo "Locking account: $user"
              passwd -l "$user"
            done
            ```
        - id: ansible
          desc: |
            **Using Ansible**

            Use this Ansible playbook to lock every account that has an empty
            `/etc/shadow` password field:

            ```yaml
            ---
            - name: Lock accounts with empty passwords
              hosts: proxmox
              become: true

              tasks:
                - name: Find accounts with empty password fields
                  ansible.builtin.shell: |
                    set -o pipefail
                    awk -F: '($2 == "") {print $1}' /etc/shadow
                  register: empty_password_accounts
                  changed_when: false

                - name: Lock each empty-password account
                  ansible.builtin.user:
                    name: "{{ item }}"
                    password_lock: true
                  loop: "{{ empty_password_accounts.stdout_lines }}"
                  when: empty_password_accounts.stdout_lines | length > 0
            ```

  # =================================================================
  # Proxmox Firewall
  # =================================================================

  - uid: mondoo-proxmox-security-cluster-firewall-is-enabled
    title: Ensure cluster firewall is enabled
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/pci-dss-4: pcidss-requirement-1-4-1
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-7
    refs:
      - title: CWE-693 Protection Mechanism Failure
        url: https://cwe.mitre.org/data/definitions/693.html
      - title: Proxmox VE Firewall
        url: https://pve.proxmox.com/wiki/Firewall
    mql: |
      file("/etc/pve/firewall/cluster.fw") {
        exists
        content.lines.any(_ == /^enable:\s*1/)
      }
    docs:
      desc: |
        This check ensures that the cluster-wide Proxmox firewall is enabled. The cluster firewall is off by default, and until it is enabled no per-node, per-VM, or per-container rule takes effect.

        **Why this matters**

        - **Master switch:** The cluster firewall is the top-level toggle that activates all lower-level firewall rules.
        - **Default exposure:** With the firewall disabled, management interfaces and guest networks accept traffic without filtering.
        - **Defense in depth:** A disabled cluster firewall leaves the hypervisor reliant on external network controls alone.

        **Risk mitigation**

        - **Policy enforcement:** Enabling the cluster firewall lets node, VM, and container rules actually filter traffic.
        - **Network segmentation:** An active firewall allows inbound services to be restricted to trusted sources.
      audit: |
        ### Audit via Web UI

        1. Log in to the Proxmox VE web interface.
        2. Go to Datacenter, then Firewall, then Options.
        3. Confirm that Firewall is set to Yes.

        A passing result shows the cluster firewall enabled; a failing result shows it disabled.

        ### Audit via CLI

        Run the command on a cluster node:

        ```bash
        pvesh get /cluster/firewall/options --output-format json
        ```

        A passing result shows enable set to 1; a failing result shows enable set to 0 or absent.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Create enabled allow rules for your management networks first.
            Enabling the cluster firewall blocks inbound traffic to all hosts,
            with a built-in exception for the web UI and SSH from the local
            subnet only, so administrators on other networks are cut off
            without these rules.

            **Lockout warning:** Replace the `10.0.0.0/24` placeholder below
            with the real CIDR of the network you administer the cluster from
            before you run these commands. If you allow the wrong source and
            then enable the firewall, you lose web UI and SSH access to every
            node. Keep an existing session open until you confirm the new
            rules work.

            ```bash
            # Replace 10.0.0.0/24 with YOUR management network CIDR.
            pvesh create /cluster/firewall/rules \
              --type in --action ACCEPT --proto tcp --dport 22 \
              --source 10.0.0.0/24 --enable 1 --comment "Allow SSH from management"
            pvesh create /cluster/firewall/rules \
              --type in --action ACCEPT --proto tcp --dport 8006 \
              --source 10.0.0.0/24 --enable 1 --comment "Allow PVE Web UI from management"

            pvesh set /cluster/firewall/options --enable 1
            ```
        - id: bash
          desc: |
            **Using a Bash Script**

            Seed enabled management allow rules, then enable the cluster
            firewall and verify it is active. Pass your real management CIDR as
            the first argument; the `10.0.0.0/24` default is only a placeholder
            and will lock out administrators on other networks if left
            unchanged:

            ```bash
            #!/bin/bash
            set -e

            mgmt_net="${1:-10.0.0.0/24}"

            pvesh create /cluster/firewall/rules \
              --type in --action ACCEPT --proto tcp --dport 22 \
              --source "$mgmt_net" --enable 1 --comment "Allow SSH from management"
            pvesh create /cluster/firewall/rules \
              --type in --action ACCEPT --proto tcp --dport 8006 \
              --source "$mgmt_net" --enable 1 --comment "Allow PVE Web UI from management"

            pvesh set /cluster/firewall/options --enable 1
            pvesh get /cluster/firewall/options --output-format json | jq '.enable'
            ```
        - id: ansible
          desc: |
            **Using Ansible**

            Use this Ansible playbook to create enabled management allow rules
            and then enable the cluster firewall:

            ```yaml
            ---
            - name: Enable Proxmox cluster firewall
              hosts: proxmox
              become: true
              run_once: true
              vars:
                management_cidr: "10.0.0.0/24"

              tasks:
                - name: Allow SSH from management network
                  ansible.builtin.command: >-
                    pvesh create /cluster/firewall/rules
                    --type in --action ACCEPT --proto tcp --dport 22
                    --source {{ management_cidr }} --enable 1
                    --comment "Allow SSH from management"
                  register: ssh_rule
                  changed_when: ssh_rule.rc == 0
                  failed_when: ssh_rule.rc not in [0, 2]

                - name: Allow PVE Web UI from management network
                  ansible.builtin.command: >-
                    pvesh create /cluster/firewall/rules
                    --type in --action ACCEPT --proto tcp --dport 8006
                    --source {{ management_cidr }} --enable 1
                    --comment "Allow PVE Web UI from management"
                  register: gui_rule
                  changed_when: gui_rule.rc == 0
                  failed_when: gui_rule.rc not in [0, 2]

                - name: Enable cluster firewall via pvesh
                  ansible.builtin.command: pvesh set /cluster/firewall/options --enable 1
                  changed_when: true
            ```

  - uid: mondoo-proxmox-security-firewall-default-policy-is-drop
    title: Ensure firewall default input policy is DROP
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-7
    refs:
      - title: CWE-284 Improper Access Control
        url: https://cwe.mitre.org/data/definitions/284.html
    mql: |
      file("/etc/pve/firewall/cluster.fw") {
        exists
        content.lines.any(_ == /^policy_in:\s*DROP/)
      }
    docs:
      desc: |
        This check ensures that the cluster firewall denies inbound traffic by default. A default-deny input policy means only explicitly allowed services are reachable, rather than everything that is not explicitly blocked.

        **Why this matters**

        - **Default-allow risk:** An ACCEPT input policy exposes every listening service on the hypervisor unless a rule blocks it.
        - **Forgotten services:** Default-deny ensures a newly opened or overlooked port is not reachable until a rule is added on purpose.
        - **Predictable posture:** An explicit deny baseline makes the firewall's effective behavior easy to reason about.

        **Risk mitigation**

        - **Allowlist model:** Setting policy_in to DROP forces every inbound service to be opened deliberately with a rule.
        - **Attack surface reduction:** Unrequested inbound connections are dropped before they reach any service.
      audit: |
        ### Audit via Web UI

        1. Log in to the Proxmox VE web interface.
        2. Go to Datacenter, then Firewall, then Options.
        3. Confirm that Input Policy is set to DROP.

        A passing result shows the input policy set to DROP; a failing result shows ACCEPT.

        ### Audit via CLI

        Run the command on a cluster node:

        ```bash
        pvesh get /cluster/firewall/options --output-format json
        ```

        A passing result shows policy_in set to DROP; a failing result shows policy_in set to ACCEPT or absent.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Create enabled allow rules for management traffic first, then set
            the default input policy to `DROP`. Setting `DROP` without enabled
            allow rules cuts off SSH and web UI access from non-local networks.

            **Lockout warning:** This is the most dangerous firewall change in
            this policy. Once the input policy is `DROP`, anything not covered
            by an enabled allow rule is silently dropped, including your own
            management session. Replace the `10.0.0.0/24` placeholder below
            with the real CIDR of the network you administer the cluster from,
            confirm the allow rules are present and enabled, and keep a working
            session open until you have verified access still works after the
            switch to `DROP`. If you are locked out, you must recover through
            the node console or IPMI.

            ```bash
            # Replace 10.0.0.0/24 with YOUR management network CIDR.
            pvesh create /cluster/firewall/rules \
              --type in --action ACCEPT --proto tcp --dport 22 \
              --source 10.0.0.0/24 --enable 1 --comment "Allow SSH from management"
            pvesh create /cluster/firewall/rules \
              --type in --action ACCEPT --proto tcp --dport 8006 \
              --source 10.0.0.0/24 --enable 1 --comment "Allow PVE Web UI from management"

            pvesh set /cluster/firewall/options --policy_in DROP
            ```
        - id: bash
          desc: |
            **Using a Bash Script**

            Add explicit, enabled allow rules for management traffic, then flip
            the default policy to `DROP`. Pass your real management CIDR as the
            first argument; the `10.0.0.0/24` default is only a placeholder and
            will lock out administrators on other networks once the policy is
            `DROP`:

            ```bash
            #!/bin/bash
            set -e

            mgmt_net="${1:-10.0.0.0/24}"

            pvesh create /cluster/firewall/rules \
              --type in --action ACCEPT --proto tcp --dport 22 \
              --source "$mgmt_net" --enable 1 --comment "Allow SSH from management"
            pvesh create /cluster/firewall/rules \
              --type in --action ACCEPT --proto tcp --dport 8006 \
              --source "$mgmt_net" --enable 1 --comment "Allow PVE Web UI from management"

            pvesh set /cluster/firewall/options --policy_in DROP
            ```
        - id: ansible
          desc: |
            **Using Ansible**

            Use this Ansible playbook to set the default input policy to `DROP`
            after creating enabled management allow rules:

            ```yaml
            ---
            - name: Set Proxmox cluster firewall default-deny inbound
              hosts: proxmox
              become: true
              run_once: true
              vars:
                management_cidr: "10.0.0.0/24"

              tasks:
                - name: Allow SSH from management network
                  ansible.builtin.command: >-
                    pvesh create /cluster/firewall/rules
                    --type in --action ACCEPT --proto tcp --dport 22
                    --source {{ management_cidr }} --enable 1
                    --comment "Allow SSH from management"
                  register: ssh_rule
                  changed_when: ssh_rule.rc == 0
                  failed_when: ssh_rule.rc not in [0, 2]

                - name: Allow PVE Web UI from management network
                  ansible.builtin.command: >-
                    pvesh create /cluster/firewall/rules
                    --type in --action ACCEPT --proto tcp --dport 8006
                    --source {{ management_cidr }} --enable 1
                    --comment "Allow PVE Web UI from management"
                  register: gui_rule
                  changed_when: gui_rule.rc == 0
                  failed_when: gui_rule.rc not in [0, 2]

                - name: Set default input policy to DROP
                  ansible.builtin.command: pvesh set /cluster/firewall/options --policy_in DROP
                  changed_when: true
            ```

  - uid: mondoo-proxmox-security-node-firewall-is-enabled
    title: Ensure host firewall is enabled on each node
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/pci-dss-4: pcidss-requirement-1-4-1
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-7
    mql: |
      files.find(from: "/etc/pve/nodes", regex: "host.fw$", type: "file").list.all(
        file(_.path).content.lines.any(_ == /^enable:\s*1/)
      )
    docs:
      desc: |
        This check ensures that the host firewall is enabled on every node in the Proxmox cluster. The per-node firewall is configured independently of the cluster firewall, so a single node left unprotected becomes the weak link.

        **Why this matters**

        - **Per-node scope:** Each node carries its own host firewall setting, and enabling it on one node does not cover the others.
        - **Inconsistent posture:** A node with its firewall off accepts traffic that peer nodes correctly filter.
        - **Lateral movement:** An unprotected node gives an attacker an easier pivot point into the rest of the cluster.

        **Risk mitigation**

        - **Uniform enforcement:** Enabling the host firewall on every node applies consistent inbound filtering across the cluster.
        - **Reduced exposure:** Each protected node drops unrequested traffic to its management and service ports.
      audit: |
        ### Audit via Web UI

        1. Log in to the Proxmox VE web interface.
        2. For each node, select it, then go to Firewall, then Options.
        3. Confirm that Firewall is set to Yes.

        A passing result shows the firewall enabled on every node; a failing result shows it disabled on one or more nodes.

        ### Audit via CLI

        Run the command on a cluster node:

        ```bash
        for node in $(pvesh get /nodes --output-format json | jq -r '.[].node'); do echo -n "$node: "; pvesh get /nodes/$node/firewall/options --output-format json | jq '.enable'; done
        ```

        A passing result shows enable set to 1 for every node; a failing result shows 0 or null for any node.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Enable the host firewall on every node in the cluster:

            ```bash
            for node in $(pvesh get /nodes --output-format json | jq -r '.[].node'); do
              pvesh set /nodes/$node/firewall/options --enable 1
            done
            ```
        - id: bash
          desc: |
            **Using a Bash Script**

            Enable the host firewall on each cluster node and verify the
            resulting state:

            ```bash
            #!/bin/bash
            set -e

            for node in $(pvesh get /nodes --output-format json | jq -r '.[].node'); do
              echo "Enabling host firewall on $node"
              pvesh set "/nodes/$node/firewall/options" --enable 1
              pvesh get "/nodes/$node/firewall/options" --output-format json | jq '{node: "'"$node"'", enable: .enable}'
            done
            ```
        - id: ansible
          desc: |
            **Using Ansible**

            Use this Ansible playbook to enable the host firewall on every node:

            ```yaml
            ---
            - name: Enable Proxmox per-node host firewall
              hosts: proxmox
              become: true

              tasks:
                - name: Enable host firewall on this node
                  ansible.builtin.command: "pvesh set /nodes/{{ ansible_hostname }}/firewall/options --enable 1"
                  changed_when: true
            ```

  - uid: mondoo-proxmox-security-firewall-has-rules
    title: Ensure at least one firewall rule is configured
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-7
    mql: |
      file("/etc/pve/firewall/cluster.fw") {
        exists
        content.lines.any(_ == /^(IN|OUT|GROUP)/)
      }
    docs:
      desc: |
        This check ensures that the cluster firewall has at least one explicit IN, OUT, or GROUP rule defined. A firewall with no rules has no meaningful policy of its own and falls back entirely on default behavior.

        **Why this matters**

        - **Empty policy:** A firewall without rules neither permits nor restricts services on purpose, so its behavior is undefined by intent.
        - **Default reliance:** With no rules, traffic handling depends solely on default policies that may not match the environment.
        - **Operational intent:** Explicit rules document which services are meant to be reachable and from where.

        **Risk mitigation**

        - **Deliberate access:** Defining IN, OUT, or GROUP rules makes allowed traffic an explicit, reviewable decision.
        - **Coverage:** A populated rule set ensures management, cluster, and application traffic are each handled intentionally.
      audit: |
        ### Audit via Web UI

        1. Log in to the Proxmox VE web interface.
        2. Go to Datacenter, then Firewall.
        3. Confirm that the Rules and Security Group lists contain at least one defined rule.

        A passing result shows one or more configured rules; a failing result shows an empty rule set.

        ### Audit via CLI

        Run the command on a cluster node:

        ```bash
        pvesh get /cluster/firewall/rules --output-format json | jq 'length'
        ```

        A passing result shows a count greater than 0; a failing result shows 0.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Create at least one explicit, enabled rule. Rules created without
            `--enable 1` are stored disabled and do not filter traffic. Adjust
            to match your environment:

            ```bash
            pvesh create /cluster/firewall/rules \
              --type in --action ACCEPT --proto tcp --dport 22 \
              --source 10.0.0.0/24 --enable 1 --comment "Allow SSH from management"

            pvesh create /cluster/firewall/rules \
              --type in --action ACCEPT --proto tcp --dport 8006 \
              --source 10.0.0.0/24 --enable 1 --comment "Allow PVE Web UI from management"
            ```
        - id: bash
          desc: |
            **Using a Bash Script**

            Seed a baseline of enabled rules if none exists:

            ```bash
            #!/bin/bash
            set -e

            mgmt_net="${1:-10.0.0.0/24}"

            existing=$(pvesh get /cluster/firewall/rules --output-format json | jq 'length')
            if [ "$existing" -gt 0 ]; then
              echo "Cluster firewall already has $existing rule(s); leaving alone."
              exit 0
            fi

            pvesh create /cluster/firewall/rules \
              --type in --action ACCEPT --proto tcp --dport 22 \
              --source "$mgmt_net" --enable 1 --comment "Allow SSH from management"

            pvesh create /cluster/firewall/rules \
              --type in --action ACCEPT --proto tcp --dport 8006 \
              --source "$mgmt_net" --enable 1 --comment "Allow PVE Web UI from management"
            ```
        - id: ansible
          desc: |
            **Using Ansible**

            Use this Ansible playbook to create enabled baseline cluster
            firewall rules:

            ```yaml
            ---
            - name: Seed Proxmox cluster firewall rules
              hosts: proxmox
              become: true
              run_once: true
              vars:
                management_cidr: "10.0.0.0/24"

              tasks:
                - name: Allow SSH from management network
                  ansible.builtin.command: >-
                    pvesh create /cluster/firewall/rules
                    --type in --action ACCEPT --proto tcp --dport 22
                    --source {{ management_cidr }} --enable 1
                    --comment "Allow SSH from management"
                  register: ssh_rule
                  changed_when: ssh_rule.rc == 0
                  failed_when: ssh_rule.rc not in [0, 2]

                - name: Allow PVE Web UI from management network
                  ansible.builtin.command: >-
                    pvesh create /cluster/firewall/rules
                    --type in --action ACCEPT --proto tcp --dport 8006
                    --source {{ management_cidr }} --enable 1
                    --comment "Allow PVE Web UI from management"
                  register: gui_rule
                  changed_when: gui_rule.rc == 0
                  failed_when: gui_rule.rc not in [0, 2]
            ```

  # =================================================================
  # Proxmox TLS Certificates
  # =================================================================

  - uid: mondoo-proxmox-security-cert-is-not-selfsigned
    title: Ensure PVE uses a trusted TLS certificate (not cluster-internal CA)
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    refs:
      - title: CWE-295 Improper Certificate Validation
        url: https://cwe.mitre.org/data/definitions/295.html
      - title: Proxmox VE Certificate Management
        url: https://pve.proxmox.com/wiki/Certificate_Management
    mql: |
      file("/etc/pve/local/pveproxy-ssl.pem").exists
      command("openssl x509 -in /etc/pve/local/pveproxy-ssl.pem -noout -issuer").stdout.contains("Proxmox Virtual Environment") == false
    docs:
      desc: |
        This check ensures that the Proxmox web interface presents a TLS certificate issued by a trusted authority rather than the cluster-internal Proxmox CA. A default install ships a certificate signed by the internal CA named Proxmox Virtual Environment, which no browser or external client trusts.

        **Why this matters**

        - **Trust failure:** Browsers warn on the cluster-internal CA, training operators to click through certificate errors.
        - **Interception risk:** Users conditioned to ignore TLS warnings cannot distinguish a real warning from a man-in-the-middle attack.
        - **Integration friction:** External tooling and API clients reject the untrusted certificate or require trust to be disabled.

        **Risk mitigation**

        - **Verified identity:** A certificate from a public CA, for example via ACME, lets clients confirm they are connecting to the genuine node.
        - **Clean trust chain:** Replacing the internal-CA certificate removes routine TLS warnings so genuine ones stand out.
      audit: |
        ### Audit via Web UI

        1. Log in to the Proxmox VE web interface.
        2. For a node, go to System, then Certificates.
        3. Inspect the certificate used for the API/web service and review its issuer.

        A passing result shows an issuer from a trusted public CA; a failing result shows an issuer of Proxmox Virtual Environment.

        ### Audit via CLI

        Run the command on a cluster node:

        ```bash
        openssl x509 -in /etc/pve/local/pve-ssl.pem -noout -issuer
        ```

        A passing result shows an issuer that does not contain Proxmox Virtual Environment; a failing result shows that string in the issuer.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Register an ACME account and order a Let's Encrypt certificate for
            this node.

            **Verify the ACME flag syntax for your PVE 8.x version first.** The
            way ACME domains are set on `pvenode config set` has drifted across
            Proxmox VE releases. Confirm the documented form for your version
            with `pvenode config set --help`; on current builds the per-domain
            flag form `pvenode config set -acmedomain0=<fqdn>` is documented.
            Substitute the verified flag below:

            ```bash
            pvenode acme account register default <email>
            pvenode config set --acme domains=<fqdn>
            pvenode acme cert order
            ```
        - id: bash
          desc: |
            **Using a Bash Script**

            Drive the ACME workflow end to end:

            ```bash
            #!/bin/bash
            set -e

            email="${1:?usage: $0 <email> <fqdn>}"
            fqdn="${2:?usage: $0 <email> <fqdn>}"

            if ! pvenode acme account info default >/dev/null 2>&1; then
              pvenode acme account register default "$email"
            fi

            pvenode config set --acme "domains=$fqdn"
            pvenode acme cert order
            ```
        - id: ansible
          desc: |
            **Using Ansible**

            Use this Ansible playbook to register an ACME account and order a
            certificate per node:

            ```yaml
            ---
            - name: Issue ACME TLS certificate for Proxmox nodes
              hosts: proxmox
              become: true
              vars:
                acme_email: "ops@example.com"
                acme_fqdn: "{{ ansible_fqdn }}"

              tasks:
                - name: Register the default ACME account (idempotent)
                  ansible.builtin.shell: |
                    set -e
                    if ! pvenode acme account info default >/dev/null 2>&1; then
                      pvenode acme account register default "{{ acme_email }}"
                    fi
                  register: register_acct
                  changed_when: "'registered' in register_acct.stdout"

                - name: Configure ACME domains for this node
                  ansible.builtin.command: "pvenode config set --acme domains={{ acme_fqdn }}"

                - name: Order the TLS certificate
                  ansible.builtin.command: pvenode acme cert order
                  changed_when: true
            ```

  - uid: mondoo-proxmox-security-cert-is-not-expiring
    title: Ensure TLS certificate does not expire within 30 days
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-12
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    refs:
      - title: CWE-298 Improper Validation of Certificate Expiration
        url: https://cwe.mitre.org/data/definitions/298.html
    mql: |
      command("openssl x509 -in /etc/pve/local/pve-ssl.pem -checkend 2592000 -noout >/dev/null 2>&1 && echo valid || echo expiring").stdout.trim == "valid"
    docs:
      desc: |
        This check ensures that the Proxmox node TLS certificate is not within 30 days of expiry. An expired certificate breaks the web interface and API for clients and can interrupt cluster management.

        **Why this matters**

        - **Service disruption:** An expired certificate causes hard TLS failures that block access to the web UI and API.
        - **Short notice:** Without monitoring, expiry is often discovered only when connections start failing.
        - **Warning fatigue:** A near-expired or expired certificate pushes operators toward bypassing TLS validation.

        **Risk mitigation**

        - **Renewal lead time:** A 30-day buffer gives operators time to renew before any outage occurs.
        - **Automated renewal:** ACME-issued certificates can be renewed automatically so expiry never reaches the warning window.
      audit: |
        ### Audit via Web UI

        1. Log in to the Proxmox VE web interface.
        2. For a node, go to System, then Certificates.
        3. Review the valid-until date of the active API/web certificate.

        A passing result shows an expiry date more than 30 days away; a failing result shows expiry within 30 days or already passed.

        ### Audit via CLI

        Run the command on a cluster node:

        ```bash
        openssl x509 -in /etc/pve/local/pve-ssl.pem -checkend 2592000 -noout && echo valid || echo expiring
        ```

        A passing result prints valid; a failing result prints expiring.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Regenerate the cluster-CA-issued node certificate, which is the
            certificate this check inspects, and restart the API proxy:

            ```bash
            pvecm updatecerts --force
            systemctl restart pveproxy
            ```

            If the node also serves an ACME certificate that is close to
            expiry, renew it as well.

            **Verify the ACME renew subcommand for your PVE 8.x version first.**
            `pvenode acme cert renew` is not present on every PVE 8.x build.
            Confirm the available verbs with `pvenode acme help`; if `renew` is
            absent, re-order the certificate instead with
            `pvenode acme cert order --force`. Substitute the verified command:

            ```bash
            pvenode acme cert renew --force
            ```
        - id: bash
          desc: |
            **Using a Bash Script**

            Regenerate the node certificate when it is within 30 days of
            expiry, and renew any ACME certificate in the same window:

            ```bash
            #!/bin/bash
            set -e

            cert=/etc/pve/local/pve-ssl.pem

            if openssl x509 -in "$cert" -checkend 2592000 -noout >/dev/null 2>&1; then
              echo "Node certificate not yet within the renewal window."
            else
              echo "Node certificate expires within 30 days; regenerating via the cluster CA"
              pvecm updatecerts --force
              systemctl restart pveproxy
            fi

            proxy_cert=/etc/pve/local/pveproxy-ssl.pem
            if [ -s "$proxy_cert" ] && ! openssl x509 -in "$proxy_cert" -checkend 2592000 -noout >/dev/null 2>&1; then
              echo "Custom certificate expires within 30 days; renewing via ACME"
              pvenode acme cert renew --force
            fi
            ```
        - id: ansible
          desc: |
            **Using Ansible**

            Use this Ansible playbook to regenerate the node certificate when
            it is within 30 days of expiry:

            ```yaml
            ---
            - name: Renew expiring Proxmox TLS certificate
              hosts: proxmox
              become: true

              tasks:
                - name: Check whether pve-ssl.pem is within 30 days of expiry
                  ansible.builtin.command: openssl x509 -in /etc/pve/local/pve-ssl.pem -checkend 2592000 -noout
                  register: cert_check
                  failed_when: false
                  changed_when: false

                - name: Regenerate the node certificate via the cluster CA
                  ansible.builtin.command: pvecm updatecerts --force
                  when: cert_check.rc != 0
                  changed_when: true

                - name: Restart pveproxy to pick up the new certificate
                  ansible.builtin.systemd:
                    name: pveproxy
                    state: restarted
                  when: cert_check.rc != 0
            ```

  # =================================================================
  # LXC Container Security
  # =================================================================

  - uid: mondoo-proxmox-security-ct-all-unprivileged
    title: Ensure all LXC containers are unprivileged
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-ps-01
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-5
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-6
      compliance/pci-dss-4: pcidss-requirement-2-2-3
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-5-2-3
    refs:
      - title: CWE-250 Execution with Unnecessary Privileges
        url: https://cwe.mitre.org/data/definitions/250.html
      - title: Proxmox VE Linux Container Security
        url: https://pve.proxmox.com/wiki/Linux_Container#_security_considerations
      - title: NIST SP 800-190 Container Security
        url: https://csrc.nist.gov/publications/detail/sp/800-190/final
    mql: |
      files.find(from: "/etc/pve/lxc", regex: "[0-9]+.conf$", type: "file").list.all(
        file(_.path).content.contains("unprivileged: 1")
      )
    docs:
      desc: |
        This check ensures that every LXC container on a Proxmox node is unprivileged. Containers are privileged whenever the unprivileged directive is missing, so each container config must explicitly set unprivileged: 1.

        **Why this matters**

        - **Default privilege:** Without an explicit unprivileged setting, a Proxmox container runs privileged by default.
        - **Host root mapping:** A privileged container maps its root user to host root, so a container escape becomes host compromise.
        - **Project guidance:** The LXC project itself considers privileged containers unsafe for untrusted workloads.

        **Risk mitigation**

        - **UID isolation:** An unprivileged container maps container root to an unprivileged host UID, containing an escape attempt.
        - **Reduced impact:** Setting unprivileged: 1 ensures a compromised container cannot wield host root capabilities.
      audit: |
        ### Audit via Web UI

        1. Log in to the Proxmox VE web interface.
        2. For each container, select it, then go to Options.
        3. Confirm that Unprivileged container is set to Yes.

        A passing result shows every container marked unprivileged; a failing result shows one or more privileged containers.

        ### Audit via CLI

        Run the command on a cluster node:

        ```bash
        for conf in /etc/pve/lxc/[0-9]*.conf; do grep -q '^unprivileged: 1' "$conf" || echo "privileged: $conf"; done
        ```

        A passing result prints nothing; a failing result names each container config that lacks unprivileged: 1.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Recreate any privileged container as unprivileged. There is no
            in-place conversion - back up, then restore with `--unprivileged 1`:

            ```bash
            vzdump <ctid> --storage local --compress zstd
            pct restore <new-ctid> /var/lib/vz/dump/vzdump-lxc-<ctid>-*.tar.zst \
              --unprivileged 1 --storage local-lvm
            pct start <new-ctid>
            ```
        - id: bash
          desc: |
            **Using a Bash Script**

            Print the IDs of every privileged container so an operator can
            schedule recreation. The script is intentionally non-destructive:

            ```bash
            #!/bin/bash
            set -e

            shopt -s nullglob
            for conf in /etc/pve/lxc/[0-9]*.conf; do
              ctid=$(basename "$conf" .conf)
              if ! grep -q '^unprivileged: 1' "$conf"; then
                echo "Container $ctid is privileged. Recreate it with:"
                echo "  vzdump $ctid --storage local --compress zstd"
                echo "  pct restore <new-ctid> <backup> --unprivileged 1 --storage <storage>"
              fi
            done
            ```
        - id: ansible
          desc: |
            **Using Ansible**

            Use this Ansible playbook to fail the run when any privileged
            container is detected, so the conversion can be scheduled
            explicitly per container:

            ```yaml
            ---
            - name: Detect privileged Proxmox LXC containers
              hosts: proxmox
              become: true

              tasks:
                - name: Find LXC config files
                  ansible.builtin.find:
                    paths: /etc/pve/lxc
                    patterns: "*.conf"
                  register: lxc_confs

                - name: Identify privileged containers
                  ansible.builtin.shell: |
                    if ! grep -q '^unprivileged: 1' "{{ item.path }}"; then
                      basename "{{ item.path }}" .conf
                    fi
                  loop: "{{ lxc_confs.files }}"
                  register: privileged_check
                  changed_when: false

                - name: Fail when any container is privileged
                  ansible.builtin.fail:
                    msg: "Privileged container detected: {{ item.stdout }} - back up and re-restore with --unprivileged 1"
                  loop: "{{ privileged_check.results }}"
                  when: item.stdout | length > 0
            ```

  - uid: mondoo-proxmox-security-ct-nesting-is-disabled
    title: Ensure container nesting is disabled
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-04
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-pt-3
      compliance/nist-csf-2: nist-csf-2-pr-ps-01
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-6
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-7
      compliance/pci-dss-4: pcidss-requirement-2-2-4
      compliance/soc2-2017: soc2-control-cc7-1-1
      compliance/vda-isa-5: vda-isa-5-5-2-3
    refs:
      - title: CWE-653 Improper Isolation or Compartmentalization
        url: https://cwe.mitre.org/data/definitions/653.html
    mql: |
      files.find(from: "/etc/pve/lxc", regex: "[0-9]+.conf$", type: "file").list.all(
        file(_.path).content.contains("nesting=1") == false
      )
    docs:
      desc: |
        This check ensures that LXC container nesting is disabled across all containers on a Proxmox node. Nesting lets a container run further containers or Docker inside itself, which widens the kernel surface exposed to the guest.

        **Why this matters**

        - **Expanded surface:** The nesting feature exposes additional kernel interfaces and mount capabilities to the guest.
        - **Weaker isolation:** Running nested containers inside a guest complicates the isolation model and its security boundaries.
        - **Unneeded capability:** Most workloads do not require nesting, so leaving it on grants capability for no benefit.

        **Risk mitigation**

        - **Minimal surface:** Removing nesting=1 keeps the container restricted to the minimum kernel interfaces it needs.
        - **Stronger boundary:** Disabling nesting preserves a simpler, more defensible isolation model for each guest.
      audit: |
        ### Audit via Web UI

        1. Log in to the Proxmox VE web interface.
        2. For each container, select it, then go to Options, then Features.
        3. Confirm that Nesting is not enabled.

        A passing result shows nesting disabled on every container; a failing result shows it enabled on one or more.

        ### Audit via CLI

        Run the command on a cluster node:

        ```bash
        grep -l 'nesting=1' /etc/pve/lxc/[0-9]*.conf
        ```

        A passing result prints nothing; a failing result names each container config whose features line includes nesting=1.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Inspect the current feature list, then remove the option entirely
            when nesting was the only feature, or re-set the list without
            `nesting=1`. Restart the container to apply the change:

            ```bash
            pct config <ctid> | grep '^features:'

            # nesting was the only feature:
            pct set <ctid> --delete features

            # other features must be kept, for example keyctl:
            pct set <ctid> --features keyctl=1

            pct reboot <ctid>
            ```
        - id: bash
          desc: |
            **Using a Bash Script**

            Rebuild the feature list of every container without `nesting=1`,
            using the supported `pct` interface:

            ```bash
            #!/bin/bash
            set -e

            shopt -s nullglob
            for conf in /etc/pve/lxc/[0-9]*.conf; do
              ctid=$(basename "$conf" .conf)
              features=$(awk -F': ' '/^features:/ {print $2}' "$conf")
              case ",$features," in
                *,nesting=1,*) ;;
                *) continue ;;
              esac
              new=$(printf '%s\n' "$features" | tr ',' '\n' | grep -v '^nesting=1$' | paste -sd, -)
              if [ -z "$new" ]; then
                pct set "$ctid" --delete features
              else
                pct set "$ctid" --features "$new"
              fi
              echo "Removed nesting=1 from container $ctid; restart it to apply"
            done
            ```
        - id: ansible
          desc: |
            **Using Ansible**

            Use this Ansible playbook to find every LXC config that enables
            nesting and rewrite the `features:` line without it:

            ```yaml
            ---
            - name: Disable nesting on Proxmox LXC containers
              hosts: proxmox
              become: true

              tasks:
                - name: Find LXC config files
                  ansible.builtin.find:
                    paths: /etc/pve/lxc
                    patterns: "*.conf"
                    contains: 'nesting=1'
                  register: nested_confs

                - name: Strip ",nesting=1" when it follows another feature
                  ansible.builtin.replace:
                    path: "{{ item.path }}"
                    regexp: '(^features:.*),nesting=1\b'
                    replace: '\1'
                  loop: "{{ nested_confs.files }}"

                - name: Strip "nesting=1," when it leads the features list
                  ansible.builtin.replace:
                    path: "{{ item.path }}"
                    regexp: '^(features:\s*)nesting=1,'
                    replace: '\1'
                  loop: "{{ nested_confs.files }}"

                - name: Remove an empty features line if nesting=1 was the only feature
                  ansible.builtin.lineinfile:
                    path: "{{ item.path }}"
                    regexp: '^features:\s*nesting=1\s*$'
                    state: absent
                  loop: "{{ nested_confs.files }}"
            ```

  - uid: mondoo-proxmox-security-ct-apparmor-is-enforced
    title: Ensure containers do not disable AppArmor
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-04
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-pt-3
      compliance/nist-csf-2: nist-csf-2-pr-ps-01
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-2
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-7
      compliance/pci-dss-4: pcidss-requirement-2-2-6
      compliance/soc2-2017: soc2-control-cc7-1-1
      compliance/vda-isa-5: vda-isa-5-5-2-3
    refs:
      - title: CWE-653 Improper Isolation or Compartmentalization
        url: https://cwe.mitre.org/data/definitions/653.html
    mql: |
      files.find(from: "/etc/pve/lxc", regex: "[0-9]+.conf$", type: "file").list.all(
        file(_.path).content.contains("apparmor.profile: unconfined") == false
      )
    docs:
      desc: |
        This check ensures that no LXC container on a Proxmox node disables its AppArmor profile. Setting lxc.apparmor.profile to unconfined removes the in-kernel mandatory access control sandbox that the container relies on.

        **Why this matters**

        - **Lost sandbox:** An unconfined profile removes the AppArmor confinement that restricts a container's syscalls and file access.
        - **Escape risk:** Without AppArmor, a process inside the container has a far wider path to attack the host kernel.
        - **Silent weakening:** The directive lives in a config file and can disable a key control without obvious signs.

        **Risk mitigation**

        - **Mandatory access control:** Keeping the default LXC AppArmor profile constrains container processes to a vetted set of operations.
        - **Defense in depth:** Removing the unconfined directive restores a kernel-enforced isolation layer around each container.
      audit: |
        ### Audit via CLI

        Run the command on a cluster node:

        ```bash
        grep -l '^lxc.apparmor.profile:[[:space:]]*unconfined' /etc/pve/lxc/[0-9]*.conf
        ```

        A passing result prints nothing; a failing result names each container config that sets the AppArmor profile to unconfined.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Edit each `/etc/pve/lxc/<ctid>.conf` and delete any line that sets
            `lxc.apparmor.profile: unconfined`, then restart the container:

            ```bash
            sed -i '/^lxc\.apparmor\.profile:[[:space:]]*unconfined$/d' /etc/pve/lxc/<ctid>.conf
            pct reboot <ctid>
            ```
        - id: bash
          desc: |
            **Using a Bash Script**

            Strip the unconfined profile directive from every container config
            and restart the affected containers:

            ```bash
            #!/bin/bash
            set -e

            shopt -s nullglob
            for conf in /etc/pve/lxc/[0-9]*.conf; do
              ctid=$(basename "$conf" .conf)
              if grep -q '^lxc\.apparmor\.profile:[[:space:]]*unconfined' "$conf"; then
                sed -i '/^lxc\.apparmor\.profile:[[:space:]]*unconfined$/d' "$conf"
                echo "Restored AppArmor profile on container $ctid"
                pct reboot "$ctid" || true
              fi
            done
            ```
        - id: ansible
          desc: |
            **Using Ansible**

            Use this Ansible playbook to remove `lxc.apparmor.profile:
            unconfined` from any container config:

            ```yaml
            ---
            - name: Re-enable AppArmor on Proxmox LXC containers
              hosts: proxmox
              become: true

              tasks:
                - name: Find LXC config files that disable AppArmor
                  ansible.builtin.find:
                    paths: /etc/pve/lxc
                    patterns: "*.conf"
                    contains: '^lxc\.apparmor\.profile:\s*unconfined'
                    use_regex: true
                  register: apparmor_confs

                - name: Remove unconfined AppArmor directive
                  ansible.builtin.lineinfile:
                    path: "{{ item.path }}"
                    regexp: '^lxc\.apparmor\.profile:\s*unconfined$'
                    state: absent
                  loop: "{{ apparmor_confs.files }}"
            ```

  - uid: mondoo-proxmox-security-ct-firewall-is-enabled
    title: Ensure container network interfaces have firewall enabled
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/pci-dss-4: pcidss-requirement-1-4-1
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-7
    mql: |
      files.find(from: "/etc/pve/lxc", regex: "[0-9]+.conf$", type: "file").list.all(
        file(_.path).content.lines.where(_ == /^net[0-9]+:/).all(_.contains("firewall=1"))
      )
    docs:
      desc: |
        This check ensures that every `netN` interface on an LXC container is configured to enforce the per-interface Proxmox firewall through the `firewall=1` flag. Proxmox does not enable the firewall on a guest interface unless the flag is set, so traffic to and from that interface bypasses cluster and per-VM rules.

        **Why this matters**

        - **Rule enforcement:** Without `firewall=1` the cluster, node, and per-guest firewall rules never apply to the container's traffic.
        - **Lateral movement:** An unfiltered interface lets a compromised container reach other guests and host services unimpeded.
        - **Inconsistent posture:** Mixed firewall states across containers make the overall security stance hard to reason about and audit.

        **Risk mitigation**

        - **Defense in depth:** Per-interface filtering adds an enforcement point close to the workload, independent of upstream network controls.
        - **Containment:** Enforced rules confine a breached container and limit the blast radius of an incident.
      audit: |
        ### Audit via Web UI

        1. Sign in to the Proxmox VE web interface.
        2. Select a container in the resource tree, then open its **Network** panel.
        3. Inspect each network device and confirm the **Firewall** column or device dialog shows the firewall enabled.

        A passing result shows every container network device with the firewall enabled; a failing result shows one or more devices with the firewall disabled.

        ### Audit via CLI

        Run the command on a cluster node:

        ```bash
        for c in /etc/pve/lxc/[0-9]*.conf; do echo "== $c =="; grep '^net[0-9]*:' "$c"; done
        ```

        A passing result shows `firewall=1` on every `netN` line; a failing result shows a `netN` line without `firewall=1` or with `firewall=0`.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Re-set every interface with `firewall=1`. Replace `<ctid>` and
            `<netN>` with real values, and keep all of the other parameters
            (bridge, hwaddr, name, ip, vlan tag) intact:

            ```bash
            pct config <ctid> | grep '^net'
            pct set <ctid> -<netN> name=eth0,bridge=vmbr0,hwaddr=...,firewall=1
            ```
        - id: bash
          desc: |
            **Using a Bash Script**

            Iterate over every container interface and re-issue `pct set` with
            `firewall=1` appended:

            ```bash
            #!/bin/bash
            set -e

            shopt -s nullglob
            for conf in /etc/pve/lxc/[0-9]*.conf; do
              ctid=$(basename "$conf" .conf)
              while IFS= read -r line; do
                netname=${line%%:*}
                spec=${line#*: }
                if [[ "$spec" != *firewall=1* ]]; then
                  if [[ "$spec" == *firewall=0* ]]; then
                    new=${spec//firewall=0/firewall=1}
                  else
                    new="$spec,firewall=1"
                  fi
                  echo "Enabling firewall on container $ctid $netname"
                  pct set "$ctid" "-$netname" "$new"
                fi
              done < <(grep '^net[0-9]\+:' "$conf")
            done
            ```
        - id: ansible
          desc: |
            **Using Ansible**

            Use this Ansible playbook to add `firewall=1` to every LXC `netN`
            line that is missing it:

            ```yaml
            ---
            - name: Enable per-interface firewall on Proxmox LXC containers
              hosts: proxmox
              become: true

              tasks:
                - name: Find LXC config files
                  ansible.builtin.find:
                    paths: /etc/pve/lxc
                    patterns: "*.conf"
                  register: lxc_confs

                - name: Replace firewall=0 with firewall=1
                  ansible.builtin.replace:
                    path: "{{ item.path }}"
                    regexp: '(^net\d+:.*?)firewall=0'
                    replace: '\1firewall=1'
                  loop: "{{ lxc_confs.files }}"

                - name: Append firewall=1 to interfaces missing the directive
                  ansible.builtin.replace:
                    path: "{{ item.path }}"
                    regexp: '^(net\d+:(?!.*firewall=).*)$'
                    replace: '\1,firewall=1'
                  loop: "{{ lxc_confs.files }}"
            ```

  - uid: mondoo-proxmox-security-ct-no-mknod
    title: Ensure containers do not allow mknod
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-04
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-pt-3
      compliance/nist-csf-2: nist-csf-2-pr-ps-01
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-6
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-7
      compliance/pci-dss-4: pcidss-requirement-2-2-4
      compliance/soc2-2017: soc2-control-cc7-1-1
      compliance/vda-isa-5: vda-isa-5-5-2-3
    mql: |
      files.find(from: "/etc/pve/lxc", regex: "[0-9]+.conf$", type: "file").list.all(
        file(_.path).content.contains("mknod=1") == false
      )
    docs:
      desc: |
        This check ensures that LXC containers are configured without the `mknod=1` feature so they cannot create device nodes. Proxmox leaves the `mknod` feature off by default, and enabling it gives a container a primitive that can be used to escape unprivileged confinement.

        **Why this matters**

        - **Container escape:** The ability to create device nodes is a known path for breaking out of unprivileged container isolation.
        - **Host device exposure:** A container that can craft device nodes may reach host block, character, or kernel devices it should never touch.
        - **Excess privilege:** Most workloads never need `mknod`, so leaving it enabled grants capability with no operational benefit.

        **Risk mitigation**

        - **Reduced attack surface:** Removing the feature eliminates a device-node escape vector from the container.
        - **Least privilege:** Containers run with only the capabilities their workload actually requires.
      audit: |
        ### Audit via Web UI

        1. Sign in to the Proxmox VE web interface.
        2. Select a container in the resource tree, then open its **Options** panel.
        3. Review the **Features** row and confirm `mknod` is not listed.

        A passing result shows the **Features** value without `mknod`; a failing result shows `mknod=1` among the enabled features.

        ### Audit via CLI

        Run the command on a cluster node:

        ```bash
        grep -l 'mknod=1' /etc/pve/lxc/[0-9]*.conf
        ```

        A passing result returns no output; a failing result lists container config files that enable `mknod=1`.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Inspect the current feature list, then remove the option entirely
            when mknod was the only feature, or re-set the list without
            `mknod=1`. Restart the container to apply the change:

            ```bash
            pct config <ctid> | grep '^features:'

            # mknod was the only feature:
            pct set <ctid> --delete features

            # other features must be kept, for example keyctl:
            pct set <ctid> --features keyctl=1

            pct reboot <ctid>
            ```
        - id: bash
          desc: |
            **Using a Bash Script**

            Rebuild the feature list of every container without `mknod=1`,
            using the supported `pct` interface:

            ```bash
            #!/bin/bash
            set -e

            shopt -s nullglob
            for conf in /etc/pve/lxc/[0-9]*.conf; do
              ctid=$(basename "$conf" .conf)
              features=$(awk -F': ' '/^features:/ {print $2}' "$conf")
              case ",$features," in
                *,mknod=1,*) ;;
                *) continue ;;
              esac
              new=$(printf '%s\n' "$features" | tr ',' '\n' | grep -v '^mknod=1$' | paste -sd, -)
              if [ -z "$new" ]; then
                pct set "$ctid" --delete features
              else
                pct set "$ctid" --features "$new"
              fi
              echo "Removed mknod=1 from container $ctid; restart it to apply"
            done
            ```
        - id: ansible
          desc: |
            **Using Ansible**

            Use this Ansible playbook to remove `mknod=1` from container
            feature lists:

            ```yaml
            ---
            - name: Disable mknod on Proxmox LXC containers
              hosts: proxmox
              become: true

              tasks:
                - name: Find LXC config files with mknod enabled
                  ansible.builtin.find:
                    paths: /etc/pve/lxc
                    patterns: "*.conf"
                    contains: 'mknod=1'
                  register: mknod_confs

                - name: Strip ",mknod=1" when it follows another feature
                  ansible.builtin.replace:
                    path: "{{ item.path }}"
                    regexp: '(^features:.*),mknod=1\b'
                    replace: '\1'
                  loop: "{{ mknod_confs.files }}"

                - name: Strip "mknod=1," when it leads the features list
                  ansible.builtin.replace:
                    path: "{{ item.path }}"
                    regexp: '^(features:\s*)mknod=1,'
                    replace: '\1'
                  loop: "{{ mknod_confs.files }}"

                - name: Remove an empty features line if mknod=1 was the only feature
                  ansible.builtin.lineinfile:
                    path: "{{ item.path }}"
                    regexp: '^features:\s*mknod=1\s*$'
                    state: absent
                  loop: "{{ mknod_confs.files }}"
            ```

  - uid: mondoo-proxmox-security-ct-no-fuse
    title: Ensure containers do not allow FUSE mounts
    impact: 60
