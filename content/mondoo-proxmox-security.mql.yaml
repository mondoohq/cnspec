  # Network Segmentation
  # =================================================================

  - uid: mondoo-proxmox-security-vlans-are-in-use
    title: Ensure VLAN segmentation is used
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-06
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/pci-dss-4: pcidss-requirement-1-4-1
      compliance/soc2-2017: soc2-control-cc6-1-5
      compliance/vda-isa-5: vda-isa-5-5-2-7
    refs:
      - title: CWE-923 Improper Restriction of Communication Channel
        url: https://cwe.mitre.org/data/definitions/923.html
      - title: BSI SYS.1.5 Virtualisation
        url: https://www.bsi.bund.de/SharedDocs/Downloads/DE/BSI/Grundschutz/IT-GS-Kompendium/IT_Grundschutz_Kompendium_Edition2023.pdf
    mql: |
      files.find(from: "/etc/pve/qemu-server", regex: "[0-9]+.conf$", type: "file").list.any(
        file(_.path).content.contains("tag=")
      ) ||
      files.find(from: "/etc/pve/lxc", regex: "[0-9]+.conf$", type: "file").list.any(
        file(_.path).content.contains("tag=")
      )
    docs:
      desc: |
        This check ensures that guest network interfaces are configured with VLAN tags so the underlying bridge enforces layer 2 segmentation. Proxmox places untagged guests on a flat network by default, which exposes every guest to every other guest at the link layer.

        **Why this matters**

        - **Flat network exposure:** Without VLAN tags all guests share a single broadcast domain and can reach one another directly.
        - **Lateral movement:** A flat layer 2 network gives a compromised guest unrestricted reach to neighboring workloads.
        - **Weak tenancy boundaries:** Workloads of differing trust levels are not separated when no segmentation is applied.

        **Risk mitigation**

        - **Segmentation:** VLAN tags isolate guests into separate broadcast domains enforced by the bridge.
        - **Containment:** Layer 2 separation limits how far an attacker can pivot from a breached guest.
      audit: |
        ### Audit via Web UI

        1. Sign in to the Proxmox VE web interface.
        2. Select a VM or container in the resource tree, then open its **Hardware** or **Network** panel.
        3. Review each network device and confirm a **VLAN Tag** is assigned where segmentation is intended.

        A passing result shows guest network devices carrying VLAN tags; a failing result shows guests with no VLAN tags applied.

        ### Audit via CLI

        Run the command on a cluster node:

        ```bash
        grep -lE 'tag=[0-9]+' /etc/pve/qemu-server/[0-9]*.conf /etc/pve/lxc/[0-9]*.conf
        ```

        A passing result lists guest config files that include a `tag=` value; a failing result returns no output, indicating no VLAN segmentation is in use.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Read the current interface definition first, then re-set it with
            all existing values kept and `tag=<vlan>` appended. Reusing the
            existing MAC address is essential, because a new MAC disrupts the
            guest's network configuration:

            ```bash
            qm config <vmid> | grep '^net'
            qm set <vmid> --net0 virtio=<current-mac>,bridge=vmbr0,firewall=1,tag=<vlan>

            pct config <ctid> | grep '^net'
            pct set <ctid> --net0 name=eth0,bridge=vmbr0,hwaddr=<current-mac>,firewall=1,tag=<vlan>
            ```

            Make sure the underlying bridge is configured as VLAN-aware in
            `/etc/network/interfaces`.
        - id: bash
          desc: |
            **Using a Bash Script**

            Print every untagged VM and container interface so an operator can
            assign the correct VLAN per workload:

            ```bash
            #!/bin/bash
            set -e

            shopt -s nullglob
            echo "Untagged VM interfaces:"
            for conf in /etc/pve/qemu-server/[0-9]*.conf; do
              vmid=$(basename "$conf" .conf)
              while IFS= read -r line; do
                if [[ "$line" != *tag=* ]]; then
                  echo "  VM $vmid: $line"
                fi
              done < <(grep '^net[0-9]\+:' "$conf")
            done

            echo "Untagged container interfaces:"
            for conf in /etc/pve/lxc/[0-9]*.conf; do
              ctid=$(basename "$conf" .conf)
              while IFS= read -r line; do
                if [[ "$line" != *tag=* ]]; then
                  echo "  CT $ctid: $line"
                fi
              done < <(grep '^net[0-9]\+:' "$conf")
            done
            ```
        - id: ansible
          desc: |
            **Using Ansible**

            Use this Ansible playbook to append a VLAN tag to a specific guest
            interface while keeping every existing setting, including the MAC
            address. Apply it per workload with the VLAN ID that matches your
            network design:

            ```yaml
            ---
            - name: Apply a VLAN tag to a Proxmox guest interface
              hosts: proxmox
              become: true
              vars:
                vmid: 100
                interface: net0
                vlan_tag: 20

              tasks:
                - name: Append the VLAN tag to the existing interface settings
                  ansible.builtin.shell: |
                    set -e
                    spec=$(qm config {{ vmid }} | awk -F': ' '/^{{ interface }}:/ {print $2}')
                    case "$spec" in
                      *tag=*) exit 0 ;;
                    esac
                    qm set {{ vmid }} --{{ interface }} "$spec,tag={{ vlan_tag }}"
                  changed_when: true
            ```

  # =================================================================
  # Storage & Backup Encryption
  # =================================================================

  - uid: mondoo-proxmox-security-pbs-encryption-is-enabled
    title: Ensure PBS backups are encrypted
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-12
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-11
      compliance/nist-sp-800-171: nist-sp-800-171--3-8-9
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    refs:
      - title: CWE-311 Missing Encryption of Sensitive Data
        url: https://cwe.mitre.org/data/definitions/311.html
      - title: Proxmox Backup Server Encryption
        url: https://pbs.proxmox.com/docs/backup-client.html#encryption
    mql: |
      file("/etc/pve/storage.cfg").content.contains("pbs:") == false ||
      files.find(from: "/etc/pve/priv/storage", regex: ".enc$", type: "file").list.length > 0
    docs:
      desc: |
        This check ensures that when a Proxmox Backup Server datastore is attached, it is configured with a client-side encryption key so every backup written to it is encrypted. The key is held at `/etc/pve/priv/storage/<storage-id>.enc`, and Proxmox does not encrypt PBS backups unless such a key is assigned.

        **Why this matters**

        - **Data at rest:** Unencrypted backups expose guest disk and memory contents to anyone who can read the backup store.
        - **Offsite risk:** PBS datastores are often remote or offsite, widening the set of parties who could access raw backup data.
        - **Compliance exposure:** Backups frequently contain regulated data that must be protected with encryption.

        **Risk mitigation**

        - **Confidentiality:** Client-side encryption renders backup contents unreadable without the key.
        - **Reduced blast radius:** A compromised or stolen datastore yields only ciphertext, not usable data.
      audit: |
        ### Audit via Web UI

        1. Sign in to the Proxmox VE web interface.
        2. Open **Datacenter**, then select **Storage** and choose the Proxmox Backup Server entry.
        3. Confirm an encryption key is configured for the storage in its **Encryption** settings.

        A passing result shows an encryption key assigned to every PBS storage; a failing result shows a PBS storage with no encryption key.

        ### Audit via CLI

        Run the command on a cluster node:

        ```bash
        for s in $(awk '/^pbs:/ {print $2}' /etc/pve/storage.cfg); do test -s "/etc/pve/priv/storage/$s.enc" && echo "$s: encrypted" || echo "$s: NO KEY"; done
        ```

        A passing result reports an existing `.enc` key file for every PBS storage; a failing result reports a PBS storage with no key file.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Let Proxmox generate and attach a client-side encryption key for
            the PBS storage. The key is created without a passphrase, which is
            required for unattended backups, and stored at
            `/etc/pve/priv/storage/<storage>.enc`:

            ```bash
            pvesm set <storage> --encryption-key autogen
            ```

            Back up the generated key file somewhere safe. Without the key,
            existing backups are unrecoverable.
        - id: bash
          desc: |
            **Using a Bash Script**

            Generate and attach an encryption key for every PBS storage that
            does not have one:

            ```bash
            #!/bin/bash
            set -e

            while IFS= read -r storage; do
              key="/etc/pve/priv/storage/${storage}.enc"
              if [ -s "$key" ]; then
                echo "$storage already has an encryption key at $key"
                continue
              fi
              echo "Generating encryption key for storage $storage"
              pvesm set "$storage" --encryption-key autogen
            done < <(awk '/^pbs:/ {print $2}' /etc/pve/storage.cfg)

            echo "Back up every key under /etc/pve/priv/storage/ offline; without a key its backups are unrecoverable."
            ```
        - id: ansible
          desc: |
            **Using Ansible**

            Use this Ansible playbook to ensure every PBS storage has an
            encryption key generated by Proxmox itself:

            ```yaml
            ---
            - name: Ensure PBS storages use client-side encryption
              hosts: proxmox
              become: true

              tasks:
                - name: Read PBS storage IDs
                  ansible.builtin.shell: awk '/^pbs:/ {print $2}' /etc/pve/storage.cfg
                  register: pbs_storages
                  changed_when: false

                - name: Generate an encryption key per storage when missing
                  ansible.builtin.shell: |
                    set -e
                    key=/etc/pve/priv/storage/{{ item }}.enc
                    if [ ! -s "$key" ]; then
                      pvesm set {{ item }} --encryption-key autogen
                    fi
                  loop: "{{ pbs_storages.stdout_lines }}"
            ```

  - uid: mondoo-proxmox-security-pbs-master-key-is-configured
    title: Ensure PBS master key is configured
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-20
      compliance/dora: dora-art-12
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-11
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-10
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-12
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-11
      compliance/vda-isa-5: vda-isa-5-5-1-1
    mql: |
      file("/etc/pve/storage.cfg").content.contains("pbs:") == false ||
      files.find(from: "/etc/pve/priv/storage", regex: ".master.pem$", type: "file").list.length > 0
    docs:
      desc: |
        This check ensures that when a Proxmox Backup Server datastore is attached, an RSA master key is configured so a backup operator can decrypt restored backups without the original client encryption key. The master public key is stored at `/etc/pve/priv/storage/<storage-id>.master.pem` and the private half belongs in offline storage.

        **Why this matters**

        - **Recovery dependency:** Without a master key, losing the client encryption key makes every encrypted backup permanently unrecoverable.
        - **Operational continuity:** Restores must remain possible even when the original key holder is unavailable.
        - **Key custody:** A master key separates day-to-day backup encryption from a safeguarded recovery path.

        **Risk mitigation**

        - **Disaster recovery:** A master key provides an independent route to decrypt backups during incident response.
        - **Resilience:** Backups stay restorable despite loss or corruption of the primary encryption key.
      audit: |
        ### Audit via Web UI

        1. Sign in to the Proxmox VE web interface.
        2. Open **Datacenter**, then select **Storage** and choose the Proxmox Backup Server entry.
        3. Review the **Encryption** settings and confirm a master public key is configured.

        A passing result shows a master key assigned to every PBS storage; a failing result shows a PBS storage with no master key.

        ### Audit via CLI

        Run the command on a cluster node:

        ```bash
        for s in $(awk '/^pbs:/ {print $2}' /etc/pve/storage.cfg); do test -s "/etc/pve/priv/storage/$s.master.pem" && echo "$s: master key set" || echo "$s: NO MASTER KEY"; done
        ```

        A passing result reports an existing `.master.pem` file for every PBS storage; a failing result reports a PBS storage with no master key file.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Create a master key pair and attach the public half. The key files
            are written to the current directory.

            The `proxmox-backup-client` command is not installed on a base PVE
            node. Install it first with
            `apt-get update && apt-get install -y proxmox-backup-client`, or
            create the master key on the PBS host and copy only the public half
            to the PVE node:

            ```bash
            cd /root || exit
            proxmox-backup-client key create-master-key
            pvesm set <storage> --master-pubkey /root/master-public.pem
            ```

            Move `/root/master-private.pem` to offline storage and then delete
            it from the node. It is required to recover encrypted backups.
        - id: bash
          desc: |
            **Using a Bash Script**

            Generate the master key pair once and install the public half on
            every PBS storage that lacks one. The private key is kept on disk
            until the operator moves it offline:

            ```bash
            #!/bin/bash
            set -e

            keydir=/root/pbs-master-key
            mkdir -p "$keydir"
            chmod 0700 "$keydir"

            if [ ! -s "$keydir/master-public.pem" ]; then
              (cd "$keydir" && proxmox-backup-client key create-master-key)
            fi

            while IFS= read -r storage; do
              dest="/etc/pve/priv/storage/${storage}.master.pem"
              if [ -s "$dest" ]; then
                echo "$storage already has a master pubkey at $dest"
                continue
              fi
              pvesm set "$storage" --master-pubkey "$keydir/master-public.pem"
              echo "Installed master pubkey for $storage"
            done < <(awk '/^pbs:/ {print $2}' /etc/pve/storage.cfg)

            echo
            echo "Move $keydir/master-private.pem to offline storage and then delete it from this node."
            ```
        - id: ansible
          desc: |
            **Using Ansible**

            Use this Ansible playbook to register a previously generated master
            public key with every PBS storage. The corresponding private key
            must already live offline; it is never created by Ansible. The
            `pvesm` command writes the key into `/etc/pve/priv/storage/` with
            the correct ownership itself:

            ```yaml
            ---
            - name: Attach PBS master public key to every PBS storage
              hosts: proxmox
              become: true
              vars:
                master_pubkey_path: /root/master-public.pem

              tasks:
                - name: Read PBS storage IDs
                  ansible.builtin.shell: awk '/^pbs:/ {print $2}' /etc/pve/storage.cfg
                  register: pbs_storages
                  changed_when: false

                - name: Register master public key with each PBS storage
                  ansible.builtin.command: >-
                    pvesm set {{ item }} --master-pubkey {{ master_pubkey_path }}
                  loop: "{{ pbs_storages.stdout_lines }}"
                  changed_when: true
            ```

  # =================================================================
  # Proxmox-specific Hardening
  # =================================================================

  - uid: mondoo-proxmox-security-ksm-is-disabled
    title: Ensure Kernel Samepage Merging (KSM) is disabled
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-04
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-pt-3
      compliance/nist-csf-2: nist-csf-2-pr-ds-10
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-6
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-4
      compliance/pci-dss-4: pcidss-requirement-2-2-4
      compliance/soc2-2017: soc2-control-cc7-1-1
      compliance/vda-isa-5: vda-isa-5-5-2-1
    refs:
      - title: CWE-200 Exposure of Sensitive Information
        url: https://cwe.mitre.org/data/definitions/200.html
      - title: Side-channel attacks on KSM
        url: https://www.usenix.org/system/files/conference/usenixsecurity15/sec15-paper-razavi.pdf
    mql: |
      file("/sys/kernel/mm/ksm/run").content.trim == "0"
    docs:
      desc: |
        This check ensures that Kernel Samepage Merging is disabled on the hypervisor by confirming `/sys/kernel/mm/ksm/run` holds `0`. KSM deduplicates identical memory pages across VMs to save RAM, but that shared-page behavior creates a timing side channel that an attacker can use to infer the memory contents of other tenants.

        **Why this matters**

        - **Side-channel leakage:** Page-merge timing differences let one VM probe whether another VM holds specific data.
        - **Cross-tenant exposure:** On multi-tenant hosts, KSM weakens the memory isolation between unrelated workloads.
        - **Marginal benefit:** The memory savings rarely justify the information-disclosure risk on security-sensitive hosts.

        **Risk mitigation**

        - **Closed side channel:** Disabling KSM removes the memory deduplication timing channel between VMs.
        - **Stronger isolation:** Each VM keeps its own memory pages, preserving tenant separation.
      audit: |
        ### Audit via CLI

        Run the command on a cluster node:

        ```bash
        cat /sys/kernel/mm/ksm/run
        systemctl is-enabled ksmtuned ksm 2>/dev/null
        ```

        A passing result shows `/sys/kernel/mm/ksm/run` reporting `0`; a failing result shows a non-zero value or the `ksmtuned` or `ksm` units enabled to re-activate it on boot.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Stop the KSM services so they cannot re-enable merging, unmerge
            all currently shared pages, and leave KSM stopped.

            On most Proxmox installs only `ksmtuned.service` exists; a bare
            `ksm.service` may be absent, so the `systemctl` calls below tolerate
            a missing unit with `2>/dev/null || true`. The authoritative control
            is writing to `/sys/kernel/mm/ksm/run`: writing `2` unmerges already
            shared pages, and `0` leaves KSM stopped:

            ```bash
            systemctl stop ksmtuned ksm 2>/dev/null || true
            systemctl disable ksmtuned ksm 2>/dev/null || true
            echo 2 > /sys/kernel/mm/ksm/run
            echo 0 > /sys/kernel/mm/ksm/run
            ```
        - id: bash
          desc: |
            **Using a Bash Script**

            Disable KSM at runtime and on boot, including unmerging pages that
            are already shared. The script is idempotent:

            ```bash
            #!/bin/bash
            set -e

            for unit in ksmtuned ksm; do
              if systemctl list-unit-files | awk '{print $1}' | grep -qx "${unit}.service"; then
                systemctl stop "$unit" || true
                systemctl disable "$unit" || true
              fi
            done

            echo 2 > /sys/kernel/mm/ksm/run
            echo 0 > /sys/kernel/mm/ksm/run

            cat /sys/kernel/mm/ksm/run
            ```
        - id: ansible
          desc: |
            **Using Ansible**

            Use this Ansible playbook to stop and disable KSM and unmerge
            already-shared pages:

            ```yaml
            ---
            - name: Disable Kernel Samepage Merging on Proxmox hosts
              hosts: proxmox
              become: true

              tasks:
                - name: Stop and disable KSM systemd units
                  ansible.builtin.systemd:
                    name: "{{ item }}"
                    state: stopped
                    enabled: false
                  loop:
                    - ksmtuned
                    - ksm
                  failed_when: false

                - name: Unmerge shared pages and stop KSM
                  ansible.builtin.shell: |
                    set -e
                    echo 2 > /sys/kernel/mm/ksm/run
                    echo 0 > /sys/kernel/mm/ksm/run
                  changed_when: true
            ```

  - uid: mondoo-proxmox-security-no-pci-acs-override
    title: Ensure PCI ACS override is not enabled
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-pt-3
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-4
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-4
      compliance/pci-dss-4: pcidss-requirement-2-2-3
      compliance/soc2-2017: soc2-control-cc7-1-1
      compliance/vda-isa-5: vda-isa-5-5-2-1
    refs:
      - title: CWE-284 Improper Access Control
        url: https://cwe.mitre.org/data/definitions/284.html
      - title: Proxmox PCI Passthrough IOMMU Groups
        url: https://pve.proxmox.com/wiki/PCI_Passthrough#_verify_iommu_isolation
    mql: |
      file("/proc/cmdline").content.contains("pcie_acs_override") == false
    docs:
      desc: |
        This check ensures that the kernel command line is configured without the `pcie_acs_override` parameter. That option forces the kernel to treat PCI devices as isolated when the hardware does not actually support Access Control Services, breaking the IOMMU group boundaries that confine passthrough devices.

        **Why this matters**

        - **Broken isolation:** The override splits IOMMU groups that the hardware cannot truly separate, defeating PCI passthrough isolation.
        - **Cross-VM DMA:** A passthrough device in a falsely isolated group can perform DMA into memory belonging to other VMs or the host.
        - **Silent risk:** The override is often added for convenience and then forgotten, leaving a serious gap in production.

        **Risk mitigation**

        - **Hardware-enforced isolation:** Removing the override keeps IOMMU groups aligned with real hardware boundaries.
        - **Memory protection:** Passthrough devices stay confined to their assigned VM, preventing cross-tenant DMA access.
      audit: |
        ### Audit via CLI

        Run the command on a cluster node:

        ```bash
        grep -o 'pcie_acs_override[^ ]*' /proc/cmdline /etc/default/grub /etc/kernel/cmdline 2>/dev/null
        ```

        A passing result returns no output, confirming the override is absent from the running kernel command line and the persisted boot configuration; a failing result shows a `pcie_acs_override` entry.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Remove `pcie_acs_override=...` from the kernel command line, then
            rebuild the bootloader and reboot:

            ```bash
            sed -i -E 's/[[:space:]]*pcie_acs_override=[^[:space:]"]+//g' /etc/default/grub
            sed -i -E 's/[[:space:]]*pcie_acs_override=[^[:space:]"]+//g' /etc/kernel/cmdline 2>/dev/null || true
            update-grub
            command -v proxmox-boot-tool >/dev/null && proxmox-boot-tool refresh
            echo 'Reboot required for the change to take effect.'
            ```
        - id: bash
          desc: |
            **Using a Bash Script**

            Strip the override from every place Proxmox might persist kernel
            arguments and refresh the boot loader:

            ```bash
            #!/bin/bash
            set -e

            files=(/etc/default/grub /etc/kernel/cmdline)
            changed=0
            for f in "${files[@]}"; do
              [ -f "$f" ] || continue
              if grep -q 'pcie_acs_override' "$f"; then
                sed -i -E 's/[[:space:]]*pcie_acs_override=[^[:space:]"]+//g' "$f"
                echo "Removed pcie_acs_override from $f"
                changed=1
              fi
            done

            if [ "$changed" -eq 1 ]; then
              if command -v update-grub >/dev/null; then
                update-grub
              fi
              if command -v proxmox-boot-tool >/dev/null; then
                proxmox-boot-tool refresh
              fi
              echo "Reboot required for the change to take effect."
            fi
            ```
        - id: ansible
          desc: |
            **Using Ansible**

            Use this Ansible playbook to strip the override from grub and the
            Proxmox kernel cmdline file:

            ```yaml
            ---
            - name: Remove pcie_acs_override from kernel cmdline
              hosts: proxmox
              become: true

              tasks:
                - name: Strip pcie_acs_override from /etc/default/grub
                  ansible.builtin.replace:
                    path: /etc/default/grub
                    regexp: '\s*pcie_acs_override=[^\s"]+'
                    replace: ''
                  notify: Refresh boot loader

                - name: Strip pcie_acs_override from /etc/kernel/cmdline
                  ansible.builtin.replace:
                    path: /etc/kernel/cmdline
                    regexp: '\s*pcie_acs_override=[^\s"]+'
                    replace: ''
                  failed_when: false
                  notify: Refresh boot loader

              handlers:
                - name: Refresh boot loader
                  ansible.builtin.shell: |
                    set -e
                    if command -v update-grub >/dev/null; then update-grub; fi
                    if command -v proxmox-boot-tool >/dev/null; then proxmox-boot-tool refresh; fi
            ```

  - uid: mondoo-proxmox-security-iommu-is-enabled
    title: Ensure IOMMU is enabled for PCI passthrough isolation
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-pt-3
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-4
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-4
      compliance/pci-dss-4: pcidss-requirement-2-2-3
      compliance/soc2-2017: soc2-control-cc7-1-1
      compliance/vda-isa-5: vda-isa-5-5-2-1
    mql: |
      file("/proc/cmdline").content.contains("intel_iommu=on") ||
      file("/proc/cmdline").content.contains("amd_iommu=on") ||
      file("/proc/cmdline").content.contains("iommu=pt")
    docs:
      desc: |
        This check ensures that the kernel command line is configured to enable IOMMU through `intel_iommu=on`, `amd_iommu=on`, or `iommu=pt`. IOMMU places PCI passthrough devices into independent DMA groups, and without it a passthrough device can perform unrestricted direct memory access across VM and host memory.

        **Why this matters**

        - **DMA isolation:** IOMMU restricts a passthrough device to the memory of its assigned VM rather than the whole system.
        - **Passthrough safety:** Without IOMMU, assigning a device to a guest exposes host and other-guest memory to that device.
        - **Group integrity:** IOMMU groups are the foundation Proxmox relies on to validate safe passthrough configurations.

        **Risk mitigation**

        - **Memory protection:** Hardware DMA remapping confines passthrough devices to their owning VM.
        - **Tenant isolation:** Enabled IOMMU preserves the boundary between guests that share the same host hardware.
      audit: |
        ### Audit via CLI

        Run the command on a cluster node:

        ```bash
        grep -oE '(intel_iommu=on|amd_iommu=on|iommu=pt)' /proc/cmdline
        ```

        A passing result shows at least one IOMMU flag on the running kernel command line; a failing result returns no output, indicating IOMMU is not enabled.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Add the appropriate IOMMU flag to the kernel command line. For an
            Intel system booting with GRUB:

            ```bash
            sed -i -E 's|^(GRUB_CMDLINE_LINUX_DEFAULT=")(.*)"$|\1\2 intel_iommu=on iommu=pt"|' /etc/default/grub
            update-grub
            echo 'Reboot required for the change to take effect.'
            ```

            For an Intel system booting with systemd-boot, which Proxmox uses
            for ZFS root on UEFI, the arguments live in `/etc/kernel/cmdline`:

            ```bash
            sed -i 's|$| intel_iommu=on iommu=pt|' /etc/kernel/cmdline
            proxmox-boot-tool refresh
            echo 'Reboot required for the change to take effect.'
            ```

            For AMD, replace `intel_iommu=on` with `amd_iommu=on`.
        - id: bash
          desc: |
            **Using a Bash Script**

            Detect the CPU vendor, append the right flag to both possible boot
            configurations, and refresh the boot loader:

            ```bash
            #!/bin/bash
            set -e

            vendor=$(awk -F: '/vendor_id/ {print $2; exit}' /proc/cpuinfo | tr -d ' ')
            case "$vendor" in
              GenuineIntel) flag="intel_iommu=on iommu=pt";;
              AuthenticAMD) flag="amd_iommu=on iommu=pt";;
              *) echo "Unknown CPU vendor: $vendor" >&2; exit 1;;
            esac

            changed=0

            if [ -f /etc/default/grub ] && ! grep -qE 'intel_iommu=on|amd_iommu=on' /etc/default/grub; then
              sed -i -E "s|^(GRUB_CMDLINE_LINUX_DEFAULT=\")(.*)\"$|\\1\\2 ${flag}\"|" /etc/default/grub
              changed=1
            fi

            if [ -f /etc/kernel/cmdline ] && ! grep -qE 'intel_iommu=on|amd_iommu=on' /etc/kernel/cmdline; then
              sed -i "s|\$| ${flag}|" /etc/kernel/cmdline
              changed=1
            fi

            if [ "$changed" -eq 1 ]; then
              if command -v update-grub >/dev/null; then update-grub; fi
              if command -v proxmox-boot-tool >/dev/null; then proxmox-boot-tool refresh; fi
              echo "Reboot required for IOMMU change to take effect."
            fi
            ```
        - id: ansible
          desc: |
            **Using Ansible**

            Use this Ansible playbook to add the right IOMMU flag to both GRUB
            and systemd-boot configurations based on CPU vendor:

            ```yaml
            ---
            - name: Enable IOMMU on Proxmox hosts
              hosts: proxmox
              become: true

              tasks:
                - name: Determine CPU vendor
                  ansible.builtin.shell: |
                    awk -F: '/vendor_id/ {print $2; exit}' /proc/cpuinfo | tr -d ' '
                  register: cpu_vendor
                  changed_when: false

                - name: Set IOMMU flag fact
                  ansible.builtin.set_fact:
                    iommu_flag: >-
                      {{ 'intel_iommu=on iommu=pt' if cpu_vendor.stdout == 'GenuineIntel'
                         else 'amd_iommu=on iommu=pt' }}

                - name: Add IOMMU flag to GRUB_CMDLINE_LINUX_DEFAULT
                  ansible.builtin.replace:
                    path: /etc/default/grub
                    regexp: '^(GRUB_CMDLINE_LINUX_DEFAULT="(?:(?!{{ iommu_flag }}).)*)"$'
                    replace: '\1 {{ iommu_flag }}"'
                  register: grub_change
                  failed_when: false

                - name: Add IOMMU flag to /etc/kernel/cmdline for systemd-boot
                  ansible.builtin.replace:
                    path: /etc/kernel/cmdline
                    regexp: '^((?:(?!{{ iommu_flag }}).)*)$'
                    replace: '\1 {{ iommu_flag }}'
                  register: cmdline_change
                  failed_when: false

                - name: Refresh boot loader if anything changed
                  ansible.builtin.shell: |
                    set -e
                    if command -v update-grub >/dev/null; then update-grub; fi
                    if command -v proxmox-boot-tool >/dev/null; then proxmox-boot-tool refresh; fi
                  when: (grub_change.changed | default(false)) or (cmdline_change.changed | default(false))
            ```

  - uid: mondoo-proxmox-security-auditd-watches-pve-directory
    title: Ensure audit rules monitor /etc/pve/ changes
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-pr-pt-1
      compliance/nist-csf-2: nist-csf-2-pr-ps-04
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-2
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-1-3
      compliance/vda-isa-5: vda-isa-5-5-2-4
    props:
      - uid: mondooProxmoxSecurityAuditFiles
        title: Return the content from all /etc/audit/rules.d and /etc/audit/audit.rules
        mql: |
          mondooProxmoxSecurityAuditFiles = files.find(from: "/etc/audit/rules.d", regex: '.*\.rules$', type: "file").list.map(path) + ["/etc/audit/audit.rules"]
          return mondooProxmoxSecurityAuditFiles.where(file(_).exists).map(file(_).content.lines.where(_ == /^[^#]/))
    mql: |
      props.mondooProxmoxSecurityAuditFiles.any(_.any(_ == /^\s*-w\s+\/etc\/pve/))
    docs:
      desc: |
        This check ensures that the audit subsystem is configured with a watch rule that records every write and attribute change to `/etc/pve/`. This directory is the central configuration tree for the cluster, and without a watch rule any tampering with it goes unrecorded.

        **Why this matters**

        - **Cluster integrity:** `/etc/pve/` defines storage, firewall, user, and virtual machine configuration for the entire cluster, so unauthorized edits can compromise every node.
        - **Tamper evidence:** An audit watch produces a durable record of who changed cluster configuration and when, which is essential for investigating incidents.
        - **Change accountability:** Recording configuration changes ties them to a user and process, deterring unsanctioned modification.

        **Risk mitigation**

        - **Detection of unauthorized changes:** Audit events let operators spot configuration drift or malicious edits that would otherwise pass silently.
        - **Forensic support:** Retained audit logs give incident responders a timeline of cluster configuration activity.
      audit: |
        ### Audit via CLI

        Run the command on a cluster node:

        ```bash
        auditctl -l | grep '/etc/pve'
        ```

        The check passes when a watch rule covering `/etc/pve/` is listed; it fails when no matching rule is returned.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Add an audit rule and reload the audit subsystem:

            ```bash
            cat > /etc/audit/rules.d/pve.rules <<'EOF'
            -w /etc/pve/ -p wa -k pve-config
            EOF
            augenrules --load
            systemctl restart auditd
            ```
        - id: bash
          desc: |
            **Using a Bash Script**

            Install auditd if needed, drop the rule, and reload:

            ```bash
            #!/bin/bash
            set -e

            if ! command -v auditctl >/dev/null; then
              apt-get update
              apt-get install -y auditd
            fi

            install -d -m 0750 /etc/audit/rules.d
            cat > /etc/audit/rules.d/pve.rules <<'EOF'
            -w /etc/pve/ -p wa -k pve-config
            EOF

            augenrules --load
            systemctl restart auditd
            auditctl -l | grep '/etc/pve'
            ```
        - id: ansible
          desc: |
            **Using Ansible**

            Use this Ansible playbook to install the rule and reload auditd:

            ```yaml
            ---
            - name: Audit /etc/pve/ for unexpected changes
              hosts: proxmox
              become: true

              tasks:
                - name: Ensure auditd is installed
                  ansible.builtin.apt:
                    name: auditd
                    state: present
                    update_cache: true

                - name: Install /etc/pve/ watch rule
                  ansible.builtin.copy:
                    dest: /etc/audit/rules.d/pve.rules
                    owner: root
                    group: root
                    mode: '0640'
                    content: |
                      -w /etc/pve/ -p wa -k pve-config
                  notify: Reload audit rules

              handlers:
                - name: Reload audit rules
                  ansible.builtin.shell: augenrules --load && systemctl restart auditd
            ```

  - uid: mondoo-proxmox-security-update-repo-is-configured
    title: Ensure a PVE update repository is configured
    impact: 50
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-tvm-03
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-8
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-12
      compliance/nist-csf-2: nist-csf-2-pr-ps-02
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-1
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-2
      compliance/pci-dss-4: pcidss-requirement-6-3-3
      compliance/soc2-2017: soc2-control-cc7-1-5
      compliance/vda-isa-5: vda-isa-5-5-2-5
    mql: |
      file("/etc/apt/sources.list.d/pve-enterprise.list").exists ||
      file("/etc/apt/sources.list.d/pve-no-subscription.list").exists ||
      file("/etc/apt/sources.list.d/pve-enterprise.sources").exists ||
      file("/etc/apt/sources.list.d/proxmox.sources").exists
    docs:
      desc: |
        This check ensures that the node has a Proxmox VE apt source configured so that security updates for PVE packages can be installed. Without a PVE-specific repository the host cannot receive fixes for the hypervisor stack, and the enterprise repository is used with an active subscription while the no-subscription repository is used otherwise.

        **Why this matters**

        - **Patch availability:** PVE packages are not part of the standard Debian repositories, so a dedicated source is required to obtain them.
        - **Vulnerability exposure:** A node with no PVE repository stays on the installed package versions indefinitely, including any known vulnerabilities.
        - **Operational consistency:** A configured repository keeps every cluster node on the same supported package stream.

        **Risk mitigation**

        - **Timely remediation:** A working repository lets administrators apply security fixes as soon as they are released.
        - **Reduced attack surface:** Keeping the hypervisor packages current closes publicly disclosed flaws before they can be exploited.
      audit: |
        ### Audit via CLI

        Run the command on a cluster node:

        ```bash
        cat /etc/apt/sources.list.d/pve-enterprise.list /etc/apt/sources.list.d/pve-no-subscription.list 2>/dev/null
        ```

        The check passes when either file exists with a `deb` line for the PVE repository; it fails when neither file is present.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Configure either the enterprise repository, which requires a
            subscription, or the no-subscription repository. On Proxmox VE 8
            use the one-line list format:

            ```bash
            codename=$(awk -F= '$1 == "VERSION_CODENAME" {print $2}' /etc/os-release)

            cat > /etc/apt/sources.list.d/pve-no-subscription.list <<EOF
            deb http://download.proxmox.com/debian/pve $codename pve-no-subscription
            EOF

            apt-get update
            ```

            On Proxmox VE 9 and later use the deb822 format:

            ```bash
            codename=$(awk -F= '$1 == "VERSION_CODENAME" {print $2}' /etc/os-release)

            cat > /etc/apt/sources.list.d/proxmox.sources <<EOF
            Types: deb
            URIs: http://download.proxmox.com/debian/pve
            Suites: $codename
            Components: pve-no-subscription
            Signed-By: /usr/share/keyrings/proxmox-archive-keyring.gpg
            EOF

            apt-get update
            ```

            For the enterprise repository, use
            `https://enterprise.proxmox.com/debian/pve` with component
            `pve-enterprise` and the file name `pve-enterprise.list` or
            `pve-enterprise.sources` respectively.
        - id: bash
          desc: |
            **Using a Bash Script**

            Add a repository if none is present, choosing the format that
            matches the installed release. Pass `enterprise` or
            `no-subscription` as the first argument:

            ```bash
            #!/bin/bash
            set -e

            mode=${1:-no-subscription}
            codename=$(awk -F= '$1 == "VERSION_CODENAME" {print $2}' /etc/os-release)

            if compgen -G '/etc/apt/sources.list.d/pve-*' >/dev/null || [ -f /etc/apt/sources.list.d/proxmox.sources ]; then
              echo "A PVE repository is already configured."
              exit 0
            fi

            if [ "$codename" = bookworm ]; then
              if [ "$mode" = enterprise ]; then
                cat > /etc/apt/sources.list.d/pve-enterprise.list <<EOF
            deb https://enterprise.proxmox.com/debian/pve $codename pve-enterprise
            EOF
              else
                cat > /etc/apt/sources.list.d/pve-no-subscription.list <<EOF
            deb http://download.proxmox.com/debian/pve $codename pve-no-subscription
            EOF
              fi
            else
              if [ "$mode" = enterprise ]; then
                cat > /etc/apt/sources.list.d/pve-enterprise.sources <<EOF
            Types: deb
            URIs: https://enterprise.proxmox.com/debian/pve
            Suites: $codename
            Components: pve-enterprise
            Signed-By: /usr/share/keyrings/proxmox-archive-keyring.gpg
            EOF
              else
                cat > /etc/apt/sources.list.d/proxmox.sources <<EOF
            Types: deb
            URIs: http://download.proxmox.com/debian/pve
            Suites: $codename
            Components: pve-no-subscription
            Signed-By: /usr/share/keyrings/proxmox-archive-keyring.gpg
            EOF
              fi
            fi

            apt-get update
            ```
        - id: ansible
          desc: |
            **Using Ansible**

            Use this Ansible playbook to install the no-subscription repository
            when no PVE repository is present, in the format matching the
            installed release:

            ```yaml
            ---
            - name: Ensure a Proxmox VE apt repository is configured
              hosts: proxmox
              become: true

              tasks:
                - name: Get Debian codename
                  ansible.builtin.shell: awk -F= '$1 == "VERSION_CODENAME" {print $2}' /etc/os-release
                  register: codename
                  changed_when: false

                - name: Detect existing PVE repository files
                  ansible.builtin.find:
                    paths: /etc/apt/sources.list.d
                    patterns:
                      - "pve-*.list"
                      - "pve-*.sources"
                      - "proxmox.sources"
                  register: repo_files

                - name: Write one-line repo on Proxmox VE 8
                  ansible.builtin.copy:
                    dest: /etc/apt/sources.list.d/pve-no-subscription.list
                    mode: '0644'
                    content: |
                      deb http://download.proxmox.com/debian/pve {{ codename.stdout }} pve-no-subscription
                  when:
                    - repo_files.matched == 0
                    - codename.stdout == 'bookworm'

                - name: Write deb822 repo on Proxmox VE 9 and later
                  ansible.builtin.copy:
                    dest: /etc/apt/sources.list.d/proxmox.sources
                    mode: '0644'
                    content: |
                      Types: deb
                      URIs: http://download.proxmox.com/debian/pve
                      Suites: {{ codename.stdout }}
                      Components: pve-no-subscription
                      Signed-By: /usr/share/keyrings/proxmox-archive-keyring.gpg
                  when:
                    - repo_files.matched == 0
                    - codename.stdout != 'bookworm'

                - name: Refresh apt cache
                  ansible.builtin.apt:
                    update_cache: true
            ```

  - uid: mondoo-proxmox-security-automatic-updates-are-enabled
    title: Ensure unattended-upgrades is installed
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-tvm-03
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-8
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-12
      compliance/nist-csf-2: nist-csf-2-pr-ps-02
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-1
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-2
      compliance/pci-dss-4: pcidss-requirement-6-3-3
      compliance/soc2-2017: soc2-control-cc7-1-5
      compliance/vda-isa-5: vda-isa-5-5-2-5
    mql: |
      package("unattended-upgrades").installed
    docs:
      desc: |
        This check ensures that the `unattended-upgrades` package is installed so the node can apply Debian security updates without manual intervention. Automatic application of security updates limits how long the host remains exposed to known vulnerabilities.

        **Why this matters**

        - **Reduced exposure window:** Automated updates shorten the time between a fix being published and it being applied.
        - **Consistent patching:** Unattended upgrades apply security fixes even when an administrator is unavailable to do so manually.
        - **Operational reliability:** Routine, automated patching prevents nodes from drifting onto unsupported package versions.

        **Risk mitigation**

        - **Faster vulnerability remediation:** Security updates are installed promptly rather than waiting for a maintenance window.
        - **Lower human error:** Removing the manual step avoids missed or forgotten patch cycles.
      audit: |
        ### Audit via CLI

        Run the command on a cluster node:

        ```bash
        dpkg-query -W -f='${Status}\n' unattended-upgrades
        ```

        The check passes when the status reports `install ok installed`; it fails when the package is not installed.

        To confirm the service is active, also run:

        ```bash
        systemctl is-enabled unattended-upgrades
        ```
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Install and enable unattended-upgrades:

            ```bash
            apt-get update
            apt-get install -y unattended-upgrades
            dpkg-reconfigure -f noninteractive unattended-upgrades
            ```
        - id: bash
          desc: |
            **Using a Bash Script**

            Idempotently install and enable unattended-upgrades:

            ```bash
            #!/bin/bash
            set -e

            export DEBIAN_FRONTEND=noninteractive

            apt-get update
            apt-get install -y unattended-upgrades

            cat > /etc/apt/apt.conf.d/20auto-upgrades <<'EOF'
            APT::Periodic::Update-Package-Lists "1";
            APT::Periodic::Unattended-Upgrade "1";
            EOF

            systemctl enable --now unattended-upgrades
            ```
        - id: ansible
          desc: |
            **Using Ansible**

            Use this Ansible playbook to install and enable unattended-upgrades:

            ```yaml
            ---
            - name: Enable unattended security upgrades on Proxmox hosts
              hosts: proxmox
              become: true

              tasks:
                - name: Install unattended-upgrades
                  ansible.builtin.apt:
                    name: unattended-upgrades
                    state: present
                    update_cache: true

                - name: Enable periodic update / upgrade
                  ansible.builtin.copy:
                    dest: /etc/apt/apt.conf.d/20auto-upgrades
                    owner: root
                    group: root
                    mode: '0644'
                    content: |
                      APT::Periodic::Update-Package-Lists "1";
                      APT::Periodic::Unattended-Upgrade "1";

                - name: Ensure unattended-upgrades service is running
                  ansible.builtin.systemd:
                    name: unattended-upgrades
                    state: started
                    enabled: true
            ```

