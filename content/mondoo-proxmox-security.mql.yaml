            ```
        - id: ansible
          desc: |
            **Using Ansible**

            Use this Ansible playbook to remove `fuse=1` from container
            feature lists:

            ```yaml
            ---
            - name: Disable FUSE on Proxmox LXC containers
              hosts: proxmox
              become: true

              tasks:
                - name: Find LXC config files with FUSE enabled
                  ansible.builtin.find:
                    paths: /etc/pve/lxc
                    patterns: "*.conf"
                    contains: 'fuse=1'
                  register: fuse_confs

                - name: Strip ",fuse=1" when it follows another feature
                  ansible.builtin.replace:
                    path: "{{ item.path }}"
                    regexp: '(^features:.*),fuse=1\b'
                    replace: '\1'
                  loop: "{{ fuse_confs.files }}"

                - name: Strip "fuse=1," when it leads the features list
                  ansible.builtin.replace:
                    path: "{{ item.path }}"
                    regexp: '^(features:\s*)fuse=1,'
                    replace: '\1'
                  loop: "{{ fuse_confs.files }}"

                - name: Remove an empty features line if fuse=1 was the only feature
                  ansible.builtin.lineinfile:
                    path: "{{ item.path }}"
                    regexp: '^features:\s*fuse=1\s*$'
                    state: absent
                  loop: "{{ fuse_confs.files }}"
            ```

  - uid: mondoo-proxmox-security-ct-memory-limit-is-set
    title: Ensure all containers have a memory limit
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-02
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-6
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ds-4
      compliance/nist-csf-2: nist-csf-2-pr-ir-04
      compliance/nist-sp-800-171: false
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-7
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc7-1-1
      compliance/vda-isa-5: false
    refs:
      - title: CWE-400 Uncontrolled Resource Consumption
        url: https://cwe.mitre.org/data/definitions/400.html
    mql: |
      files.find(from: "/etc/pve/lxc", regex: "[0-9]+.conf$", type: "file").list.all(
        file(_.path).content.lines.any(_ == /^memory:/)
      )
    docs:
      desc: |
        This check ensures that every LXC container is configured with a `memory:` directive that caps how much host memory it can consume. A container without an explicit limit can let a runaway process starve the host and neighboring guests of memory.

        **Why this matters**

        - **Resource exhaustion:** An unbounded container can consume all host memory and trigger the kernel out-of-memory killer against unrelated workloads.
        - **Noisy neighbor:** One uncapped guest degrades the performance and stability of every other guest on the node.
        - **Availability impact:** Memory starvation on the host can disrupt cluster services and management functions.

        **Risk mitigation**

        - **Fault containment:** A memory cap confines a runaway process to its own container rather than the whole node.
        - **Predictable capacity:** Explicit limits make node capacity planning and density decisions reliable.
      audit: |
        ### Audit via Web UI

        1. Sign in to the Proxmox VE web interface.
        2. Select a container in the resource tree, then open its **Resources** panel.
        3. Confirm the **Memory** entry shows a defined value rather than being unset.

        A passing result shows a configured memory value for every container; a failing result shows a container with no memory limit assigned.

        ### Audit via CLI

        Run the command on a cluster node:

        ```bash
        for c in /etc/pve/lxc/[0-9]*.conf; do grep -q '^memory:' "$c" || echo "no memory limit: $c"; done
        ```

        A passing result returns no output; a failing result lists container config files that lack a `memory:` directive.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Set an appropriate memory limit per container (in MiB):

            ```bash
            pct set <ctid> --memory 1024
            ```
        - id: bash
          desc: |
            **Using a Bash Script**

            Apply a default memory cap of 1 GiB to every container that has no
            limit configured:

            ```bash
            #!/bin/bash
            set -e

            default_memory_mib=${1:-1024}

            shopt -s nullglob
            for conf in /etc/pve/lxc/[0-9]*.conf; do
              ctid=$(basename "$conf" .conf)
              if ! grep -q '^memory:' "$conf"; then
                echo "Setting memory=${default_memory_mib} on container $ctid"
                pct set "$ctid" --memory "$default_memory_mib"
              fi
            done
            ```
        - id: ansible
          desc: |
            **Using Ansible**

            Use this Ansible playbook to apply a default memory limit to any
            container that does not have one:

            ```yaml
            ---
            - name: Enforce memory limits on Proxmox LXC containers
              hosts: proxmox
              become: true
              vars:
                default_memory_mib: 1024

              tasks:
                - name: Find LXC config files
                  ansible.builtin.find:
                    paths: /etc/pve/lxc
                    patterns: "*.conf"
                  register: lxc_confs

                - name: Detect missing memory directive
                  ansible.builtin.shell: |
                    grep -q '^memory:' "{{ item.path }}" || basename "{{ item.path }}" .conf
                  loop: "{{ lxc_confs.files }}"
                  register: missing_memory
                  changed_when: false

                - name: Apply default memory limit
                  ansible.builtin.command: "pct set {{ item.stdout }} --memory {{ default_memory_mib }}"
                  loop: "{{ missing_memory.results }}"
                  when: item.stdout | length > 0
            ```

  # =================================================================
  # QEMU/KVM VM Security
  # =================================================================

  - uid: mondoo-proxmox-security-vm-spectre-mitigations
    title: Ensure VMs have Spectre/Meltdown CPU mitigations
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-04
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-8
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-pt-3
      compliance/nist-csf-2: nist-csf-2-pr-ps-01
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-1
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-16
      compliance/pci-dss-4: pcidss-requirement-2-2-1
      compliance/soc2-2017: soc2-control-cc7-1-1
      compliance/vda-isa-5: vda-isa-5-5-2-5
    refs:
      - title: CVE-2017-5753 Spectre Variant 1
        url: https://nvd.nist.gov/vuln/detail/CVE-2017-5753
      - title: CVE-2017-5715 Spectre Variant 2
        url: https://nvd.nist.gov/vuln/detail/CVE-2017-5715
      - title: CVE-2018-3639 Speculative Store Bypass
        url: https://nvd.nist.gov/vuln/detail/CVE-2018-3639
    mql: |
      files.find(from: "/etc/pve/qemu-server", regex: "[0-9]+.conf$", type: "file").list.all(
        file(_.path).content.lines.where(_ == /^cpu:/).all(
          _ == /[,=;]\+?spec-ctrl\b/ || _ == /[,=;]\+?ssbd\b/
        )
      )
    docs:
      desc: |
        This check ensures that each QEMU VM is configured to expose Spectre and Meltdown CPU mitigations to the guest through the `+spec-ctrl` or `+ssbd` CPU flags. Unless these flags are present on the `cpu:` line, the guest kernel cannot detect the mitigation capability and cannot apply the matching software defenses.

        **Why this matters**

        - **Speculative execution attacks:** Spectre and Meltdown class flaws allow code in one context to read memory it should not, including across guest boundaries.
        - **Guest blindness:** Without the CPU flags the guest kernel believes the hardware lacks mitigation support and leaves itself unprotected.
        - **Cross-tenant exposure:** On shared hosts, an unmitigated guest increases the risk of information leakage between tenants.

        **Risk mitigation**

        - **Defense activation:** Exposing the flags lets the guest enable kernel-level mitigations for known speculative side channels.
        - **Tenant isolation:** Consistent mitigation reduces the chance of memory disclosure across VMs on the same processor.
      audit: |
        ### Audit via Web UI

        1. Sign in to the Proxmox VE web interface.
        2. Select a VM in the resource tree, then open its **Hardware** panel.
        3. Open the **Processors** entry and review the configured CPU type and extra flags for `+spec-ctrl` or `+ssbd`.

        A passing result shows the CPU configuration including `+spec-ctrl` or `+ssbd`; a failing result shows a CPU configuration without either mitigation flag.

        ### Audit via CLI

        Run the command on a cluster node:

        ```bash
        for c in /etc/pve/qemu-server/[0-9]*.conf; do echo "== $c =="; grep '^cpu:' "$c"; done
        ```

        A passing result shows every `cpu:` line containing `+spec-ctrl` or `+ssbd`; a failing result shows a `cpu:` line missing both flags.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Append the mitigation flags to the VM's existing CPU type. Quote
            the value so the shell does not split it at the semicolon, and
            restart the VM cleanly for the change to take effect.

            First read the VM's current `cpu:` value, then substitute it for
            `<existing-cpu-type>` below. Do not paste `kvm64` blindly; that would
            overwrite a `host` or custom CPU type the VM already uses. If the
            VM has no `cpu:` line it defaults to `kvm64`, so use `kvm64` only in
            that case:

            ```bash
            # Read the VM's current CPU type and copy the value after "cpu:".
            qm config <vmid> | grep '^cpu:'

            # Replace <existing-cpu-type> with that value (for example host, x86-64-v2-AES, or kvm64).
            qm set <vmid> --cpu '<existing-cpu-type>,flags=+spec-ctrl;+ssbd'
            qm shutdown <vmid>
            qm start <vmid>
            ```

            Keep the CPU type the VM already uses and only add the flags. Use
            `host` only when all cluster nodes share the same CPU model.
        - id: bash
          desc: |
            **Using a Bash Script**

            Append the mitigation flags to every VM while preserving the
            configured CPU type:

            ```bash
            #!/bin/bash
            set -e

            shopt -s nullglob
            for conf in /etc/pve/qemu-server/[0-9]*.conf; do
              vmid=$(basename "$conf" .conf)
              cpu_spec=$(awk -F': ' '/^cpu:/ {print $2}' "$conf")
              case "$cpu_spec" in
                *spec-ctrl*|*ssbd*) continue ;;
              esac
              if [ -z "$cpu_spec" ]; then
                new="kvm64,flags=+spec-ctrl;+ssbd"
              elif [ "${cpu_spec#*flags=}" != "$cpu_spec" ]; then
                new=${cpu_spec/flags=/flags=+spec-ctrl;+ssbd;}
              else
                new="$cpu_spec,flags=+spec-ctrl;+ssbd"
              fi
              echo "Setting CPU mitigations on VM $vmid"
              qm set "$vmid" --cpu "$new"
              echo "Restart VM $vmid cleanly to apply: qm shutdown $vmid && qm start $vmid"
            done
            ```
        - id: ansible
          desc: |
            **Using Ansible**

            Use this Ansible playbook to add the mitigation flags while keeping
            each VM's configured CPU type:

            ```yaml
            ---
            - name: Apply Spectre/Meltdown mitigations to Proxmox VMs
              hosts: proxmox
              become: true

              tasks:
                - name: Find QEMU VM config files
                  ansible.builtin.find:
                    paths: /etc/pve/qemu-server
                    patterns: "*.conf"
                  register: vm_confs

                - name: Add mitigation flags while keeping the configured CPU type
                  ansible.builtin.shell: |
                    set -e
                    vmid=$(basename "{{ item.path }}" .conf)
                    cpu_spec=$(awk -F': ' '/^cpu:/ {print $2}' "{{ item.path }}")
                    case "$cpu_spec" in
                      *spec-ctrl*|*ssbd*) exit 0 ;;
                    esac
                    if [ -z "$cpu_spec" ]; then
                      new="kvm64,flags=+spec-ctrl;+ssbd"
                    elif [ "${cpu_spec#*flags=}" != "$cpu_spec" ]; then
                      new=$(printf '%s' "$cpu_spec" | sed 's/flags=/flags=+spec-ctrl;+ssbd;/')
                    else
                      new="$cpu_spec,flags=+spec-ctrl;+ssbd"
                    fi
                    qm set "$vmid" --cpu "$new"
                  loop: "{{ vm_confs.files }}"
                  changed_when: true
            ```

  - uid: mondoo-proxmox-security-vm-firewall-is-enabled
    title: Ensure VM network interfaces have firewall enabled
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/pci-dss-4: pcidss-requirement-1-4-1
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-7
    mql: |
      files.find(from: "/etc/pve/qemu-server", regex: "[0-9]+.conf$", type: "file").list.all(
        file(_.path).content.lines.where(_ == /^net[0-9]+:/).all(_.contains("firewall=1"))
      )
    docs:
      desc: |
        This check ensures that every `netN` interface on a QEMU VM is configured to enforce the per-interface Proxmox firewall through the `firewall=1` flag. Proxmox does not filter a VM interface unless the flag is set, so traffic on that interface bypasses cluster, node, and per-VM rules.

        **Why this matters**

        - **Rule enforcement:** Without `firewall=1` the cluster, node, and per-guest firewall rules never apply to the VM's traffic.
        - **Lateral movement:** An unfiltered interface lets a compromised VM reach other guests and host services unimpeded.
        - **Inconsistent posture:** Mixed firewall states across VMs make the overall security stance hard to reason about and audit.

        **Risk mitigation**

        - **Defense in depth:** Per-interface filtering adds an enforcement point close to the workload, independent of upstream network controls.
        - **Containment:** Enforced rules confine a breached VM and limit the blast radius of an incident.
      audit: |
        ### Audit via Web UI

        1. Sign in to the Proxmox VE web interface.
        2. Select a VM in the resource tree, then open its **Hardware** panel.
        3. Open each **Network Device** entry and confirm the **Firewall** checkbox is selected.

        A passing result shows every VM network device with the firewall enabled; a failing result shows one or more devices with the firewall disabled.

        ### Audit via CLI

        Run the command on a cluster node:

        ```bash
        for c in /etc/pve/qemu-server/[0-9]*.conf; do echo "== $c =="; grep '^net[0-9]*:' "$c"; done
        ```

        A passing result shows `firewall=1` on every `netN` line; a failing result shows a `netN` line without `firewall=1` or with `firewall=0`.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Re-set each VM interface with `firewall=1`. Keep all of the other
            parameters (model, bridge, MAC, VLAN tag) intact:

            ```bash
            qm config <vmid> | grep '^net'
            qm set <vmid> -<netN> virtio=...,bridge=vmbr0,firewall=1
            ```
        - id: bash
          desc: |
            **Using a Bash Script**

            Add `firewall=1` to every VM interface that is missing it:

            ```bash
            #!/bin/bash
            set -e

            shopt -s nullglob
            for conf in /etc/pve/qemu-server/[0-9]*.conf; do
              vmid=$(basename "$conf" .conf)
              while IFS= read -r line; do
                netname=${line%%:*}
                spec=${line#*: }
                if [[ "$spec" != *firewall=1* ]]; then
                  if [[ "$spec" == *firewall=0* ]]; then
                    new=${spec//firewall=0/firewall=1}
                  else
                    new="$spec,firewall=1"
                  fi
                  echo "Enabling firewall on VM $vmid $netname"
                  qm set "$vmid" "-$netname" "$new"
                fi
              done < <(grep '^net[0-9]\+:' "$conf")
            done
            ```
        - id: ansible
          desc: |
            **Using Ansible**

            Use this Ansible playbook to enforce `firewall=1` on every VM
            `netN` line:

            ```yaml
            ---
            - name: Enable per-interface firewall on Proxmox VMs
              hosts: proxmox
              become: true

              tasks:
                - name: Find QEMU VM config files
                  ansible.builtin.find:
                    paths: /etc/pve/qemu-server
                    patterns: "*.conf"
                  register: vm_confs

                - name: Replace firewall=0 with firewall=1
                  ansible.builtin.replace:
                    path: "{{ item.path }}"
                    regexp: '(^net\d+:.*?)firewall=0'
                    replace: '\1firewall=1'
                  loop: "{{ vm_confs.files }}"

                - name: Append firewall=1 to interfaces missing the directive
                  ansible.builtin.replace:
                    path: "{{ item.path }}"
                    regexp: '^(net\d+:(?!.*firewall=).*)$'
                    replace: '\1,firewall=1'
                  loop: "{{ vm_confs.files }}"
            ```

  - uid: mondoo-proxmox-security-vm-no-raw-qemu-args
    title: Ensure VMs do not use raw QEMU arguments
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-04
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-pt-3
      compliance/nist-csf-2: nist-csf-2-pr-ps-01
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-6
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-7
      compliance/pci-dss-4: pcidss-requirement-2-2-4
      compliance/soc2-2017: soc2-control-cc7-1-1
      compliance/vda-isa-5: vda-isa-5-5-2-3
    refs:
      - title: CWE-94 Improper Control of Generation of Code
        url: https://cwe.mitre.org/data/definitions/94.html
    mql: |
      files.find(from: "/etc/pve/qemu-server", regex: "[0-9]+.conf$", type: "file").list.all(
        file(_.path).content.lines.none(_ == /^args:/)
      )
    docs:
      desc: |
        This check ensures that QEMU VMs are configured without the `args:` directive, which injects raw command-line flags directly into the QEMU process. Proxmox does not validate the contents of `args:`, so it bypasses the platform's configuration controls and can quietly disable security features.

        **Why this matters**

        - **Validation bypass:** Raw arguments skip the checks Proxmox normally applies to VM configuration.
        - **Security regression:** Hand-passed flags can turn off hardening QEMU options or expose unsafe devices.
        - **Hidden behavior:** Settings in `args:` are easy to overlook during review and drift from the documented configuration.

        **Risk mitigation**

        - **Managed configuration:** Keeping all settings in supported Proxmox options preserves validation and auditability.
        - **Predictable VMs:** Removing raw arguments eliminates undocumented runtime behavior that can undermine isolation.
      audit: |
        ### Audit via Web UI

        1. Sign in to the Proxmox VE web interface.
        2. Select a VM in the resource tree, then open its **Options** panel.
        3. Confirm there is no value set under the raw QEMU arguments entry, since the web UI exposes `args:` only as a manual override.

        A passing result shows no raw QEMU arguments configured; a failing result shows an `args:` value present in the VM configuration.

        ### Audit via CLI

        Run the command on a cluster node:

        ```bash
        grep -l '^args:' /etc/pve/qemu-server/[0-9]*.conf
        ```

        A passing result returns no output; a failing result lists VM config files that contain an `args:` directive.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Remove the `args:` directive, then restart the VM cleanly so the
            change takes effect:

            ```bash
            qm set <vmid> --delete args
            qm shutdown <vmid>
            qm start <vmid>
            ```
        - id: bash
          desc: |
            **Using a Bash Script**

            Print every VM that uses raw QEMU arguments and remove the
            `args:` directive from each. Run on a host where you have already
            audited the existing `args:` lines:

            ```bash
            #!/bin/bash
            set -e

            shopt -s nullglob
            for conf in /etc/pve/qemu-server/[0-9]*.conf; do
              vmid=$(basename "$conf" .conf)
              if grep -q '^args:' "$conf"; then
                echo "VM $vmid uses raw QEMU args:"
                grep '^args:' "$conf"
                echo "  -> running 'qm set $vmid --delete args'"
                qm set "$vmid" --delete args
                echo "  -> restart VM $vmid cleanly to apply: qm shutdown $vmid && qm start $vmid"
              fi
            done
            ```
        - id: ansible
          desc: |
            **Using Ansible**

            Use this Ansible playbook to remove `args:` from every VM config:

            ```yaml
            ---
            - name: Remove raw QEMU args from Proxmox VMs
              hosts: proxmox
              become: true

              tasks:
                - name: Find VM configs that contain raw args
                  ansible.builtin.find:
                    paths: /etc/pve/qemu-server
                    patterns: "*.conf"
                    contains: '^args:'
                    use_regex: true
                  register: arg_confs

                - name: Delete args via qm set --delete args
                  ansible.builtin.command: "qm set {{ item.path | basename | regex_replace('\\.conf$', '') }} --delete args"
                  loop: "{{ arg_confs.files }}"
                  changed_when: true
            ```

  # =================================================================
  # Cluster & Migration
  # =================================================================

  - uid: mondoo-proxmox-security-corosync-is-encrypted
    title: Ensure Corosync cluster communication is encrypted
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/pci-dss-4: pcidss-requirement-2-2-6
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    refs:
      - title: CWE-319 Cleartext Transmission of Sensitive Information
        url: https://cwe.mitre.org/data/definitions/319.html
    mql: |
      file("/etc/pve/corosync.conf").content.contains("transport: knet") ||
      file("/etc/pve/corosync.conf").content.contains("secauth: on")
    docs:
      desc: |
        This check ensures that Corosync cluster communication is configured to use encrypted transport, either the `transport: knet` setting or legacy authenticated multicast via `secauth: on`. Corosync carries cluster membership and quorum traffic, and since Proxmox VE 6 the encrypted knet transport is the default.

        **Why this matters**

        - **Cleartext exposure:** Unencrypted cluster traffic lets a network observer read membership and quorum messages.
        - **Spoofing risk:** Without authenticated transport, an attacker on the cluster network can inject or forge corosync messages.
        - **Cluster integrity:** Tampered quorum traffic can disrupt fencing decisions and split-brain protection.

        **Risk mitigation**

        - **Confidentiality:** Encrypted transport keeps cluster control traffic unreadable on the wire.
        - **Authenticity:** Cryptographic protection blocks injection and replay of forged corosync messages.
      audit: |
        ### Audit via CLI

        Run the command on a cluster node:

        ```bash
        grep -E 'transport:|secauth:|crypto_' /etc/pve/corosync.conf
        ```

        A passing result shows `transport: knet` or `secauth: on` within the `totem` block; a failing result shows neither, indicating unencrypted cluster communication.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Edit a working copy outside `/etc/pve`, then activate it in a
            single step so the cluster never sees a partial configuration.

            **Quorum-loss warning:** Overwriting the live
            `/etc/pve/corosync.conf` is the riskiest operation in this policy.
            A bad edit, a stale `config_version`, or a node that fails to reload
            can drop quorum and freeze the cluster. Only do this while the
            cluster is healthy and quorate. Confirm quorum first with
            `pvecm status` (or `corosync-cfgtool -s`), make the change, then
            re-run `corosync-cfgtool -s` on each node to confirm every link is
            connected and corosync reloaded cleanly. If quorum drops, restore
            the backup with `cp /root/corosync.conf.bak /etc/pve/corosync.conf`.

            ```bash
            cp /etc/pve/corosync.conf /root/corosync.conf.bak
            cp /etc/pve/corosync.conf /root/corosync.conf.new

            # Confirm the cluster is quorate before changing anything.
            corosync-cfgtool -s

            # Edit /root/corosync.conf.new. Inside the totem { } block ensure:
            #   transport: knet
            #   crypto_cipher: aes256
            #   crypto_hash: sha256
            # and increment config_version by 1.

            cp /root/corosync.conf.new /etc/pve/corosync.conf

            # Verify every node reloaded and links are connected.
            corosync-cfgtool -s
            ```

            The file replicates automatically across the cluster and corosync
            reloads when it sees the higher config_version. If a node does not
            come back, roll back from `/root/corosync.conf.bak`.
        - id: bash
          desc: |
            **Using a Bash Script**

            Patch a working copy of `corosync.conf`, bump `config_version`,
            and activate the result with one copy. Run on a single node.

            **Quorum-loss warning:** This rewrites the live
            `/etc/pve/corosync.conf` and can drop cluster quorum if the result
            is wrong. Run it only on a healthy, quorate cluster. The script
            keeps a backup at `/root/corosync.conf.bak`; if quorum drops after
            the change, restore it with
            `cp /root/corosync.conf.bak /etc/pve/corosync.conf`. After it runs,
            confirm every node with `corosync-cfgtool -s`:

            ```bash
            #!/bin/bash
            set -e

            src=/etc/pve/corosync.conf
            work=/root/corosync.conf.new

            cp "$src" /root/corosync.conf.bak
            cp "$src" "$work"

            current=$(awk '/^[[:space:]]*config_version:/ {print $2}' "$work")
            next=$((current + 1))

            python3 - "$work" "$next" <<'PY'
            import re, sys
            path, next_ver = sys.argv[1], sys.argv[2]
            with open(path) as fh:
                text = fh.read()
            for key, value in (('transport', 'knet'), ('crypto_cipher', 'aes256'), ('crypto_hash', 'sha256')):
                if re.search(rf'^\s*{key}:', text, re.M):
                    text = re.sub(rf'^\s*{key}:.*$', f'  {key}: {value}', text, flags=re.M)
                else:
                    text = re.sub(r'(totem\s*\{)', rf'\1\n  {key}: {value}', text, count=1)
            text = re.sub(r'^(\s*)config_version:.*$', rf'\g<1>config_version: {next_ver}', text, flags=re.M)
            with open(path, 'w') as fh:
                fh.write(text)
            PY

            cp "$work" "$src"
            echo "Updated config_version to $next; corosync reloads and replicates the change."
            echo "Verify every node reloaded and links are connected:"
            corosync-cfgtool -s
            ```
        - id: ansible
          desc: |
            **Using Ansible**

            Use this Ansible playbook to stage the change in a working copy and
            activate it in one step (run once against any node).

            **Quorum-loss warning:** This task overwrites the live
            `/etc/pve/corosync.conf` on a running cluster, which can drop quorum
            if the result is invalid. Run it only against a healthy, quorate
            cluster, and after the run confirm each node with
            `corosync-cfgtool -s`. The playbook saves a backup at
            `/root/corosync.conf.bak` so you can roll back with
            `cp /root/corosync.conf.bak /etc/pve/corosync.conf` if a node fails
            to rejoin:

            ```yaml
            ---
            - name: Enforce Corosync knet encryption
              hosts: proxmox[0]
              become: true

              tasks:
                - name: Back up the live corosync.conf for rollback
                  ansible.builtin.copy:
                    src: /etc/pve/corosync.conf
                    dest: /root/corosync.conf.bak
                    remote_src: true

                - name: Stage a working copy of corosync.conf
                  ansible.builtin.copy:
                    src: /etc/pve/corosync.conf
                    dest: /root/corosync.conf.new
                    remote_src: true

                - name: Read current config_version
                  ansible.builtin.shell: awk '/^\s*config_version:/ {print $2}' /root/corosync.conf.new
                  register: config_version
                  changed_when: false

                - name: Set encrypted knet transport in the working copy
                  ansible.builtin.lineinfile:
                    path: /root/corosync.conf.new
                    regexp: '^\s*transport:'
                    line: '  transport: knet'
                    insertafter: 'totem \{'

                - name: Set crypto cipher in the working copy
                  ansible.builtin.lineinfile:
                    path: /root/corosync.conf.new
                    regexp: '^\s*crypto_cipher:'
                    line: '  crypto_cipher: aes256'
                    insertafter: '^\s*transport:'

                - name: Set crypto hash in the working copy
                  ansible.builtin.lineinfile:
                    path: /root/corosync.conf.new
                    regexp: '^\s*crypto_hash:'
                    line: '  crypto_hash: sha256'
                    insertafter: '^\s*crypto_cipher:'

                - name: Bump config_version in the working copy
                  ansible.builtin.replace:
                    path: /root/corosync.conf.new
                    regexp: '^(\s*config_version:\s*).*$'
                    replace: '\g<1>{{ (config_version.stdout | int) + 1 }}'

                - name: Activate the new configuration in one step
                  ansible.builtin.command: cp /root/corosync.conf.new /etc/pve/corosync.conf
                  changed_when: true
            ```

  - uid: mondoo-proxmox-security-migration-is-encrypted
    title: Ensure live migration traffic is encrypted
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/pci-dss-4: pcidss-requirement-2-2-6
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    refs:
      - title: CWE-319 Cleartext Transmission of Sensitive Information
        url: https://cwe.mitre.org/data/definitions/319.html
    mql: |
      file("/etc/pve/datacenter.cfg").content.contains("type=secure") ||
      file("/etc/pve/datacenter.cfg").content.contains("migration: secure")
    docs:
      desc: |
        This check ensures that live migration is configured to send VM memory over an encrypted SSH tunnel by setting `migration: type=secure` in the datacenter configuration. Proxmox VE 8 and later use secure migration when the setting is absent, but earlier releases do not, so the value should be set explicitly for consistent behavior across versions.

        **Why this matters**

        - **Memory in transit:** Live migration streams the full contents of guest RAM, which can include secrets and credentials.
        - **Cleartext interception:** Insecure migration exposes that memory stream to anyone monitoring the migration network.
        - **Version drift:** Relying on defaults leaves older nodes transmitting migration data unencrypted without obvious indication.

        **Risk mitigation**

        - **Confidentiality:** Secure migration tunnels guest memory through SSH so it cannot be read on the wire.
        - **Consistent enforcement:** An explicit setting guarantees the same protection regardless of the Proxmox VE version.
      audit: |
        ### Audit via Web UI

        1. Sign in to the Proxmox VE web interface.
        2. Open **Datacenter**, then select the **Options** panel.
        3. Review the **Migration Settings** entry and confirm the type is set to **secure**.

        A passing result shows the migration type set to secure; a failing result shows it set to insecure or left unset.

        ### Audit via CLI

        Run the command on a cluster node:

        ```bash
        pvesh get /cluster/options --output-format json | grep -i migration
        ```

        A passing result shows the migration type reported as `secure`; a failing result shows `insecure` or no explicit migration type.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Force secure migration cluster-wide:

            ```bash
            pvesh set /cluster/options --migration type=secure
            ```
        - id: bash
          desc: |
            **Using a Bash Script**

            Set the option and verify the resulting datacenter configuration:

            ```bash
            #!/bin/bash
            set -e

            pvesh set /cluster/options --migration type=secure
            grep -E '^migration:' /etc/pve/datacenter.cfg
            ```
        - id: ansible
          desc: |
            **Using Ansible**

            Use this Ansible playbook to enforce secure migration:

            ```yaml
            ---
            - name: Enforce encrypted live migration
              hosts: proxmox
              become: true
              run_once: true

              tasks:
                - name: Set migration type to secure
                  ansible.builtin.command: pvesh set /cluster/options --migration type=secure
                  changed_when: true
            ```

