policies:
  - uid: mondoo-shodan
    name: Mondoo Shodan Security
    version: 1.1.1
    license: BUSL-1.1
    tags:
      mondoo.com/category: security
      mondoo.com/platform: shodan,saas
    require:
      - provider: shodan
    authors:
      - name: Mondoo, Inc
        email: hello@mondoo.com
    docs:
      desc: |-
        The Mondoo Shodan Security policy provides security guidelines for hosts, networks, and IP addresses that are scanned by Shodan, a search engine for internet-connected devices. It confirms Shodan membership status and checks Shodan findings for vulnerabilities and open ports.

        ## Join the community!

        Our goal is to build policies that are simple to deploy, accurate, and actionable.

        If you have any suggestions for how to improve this policy, or if you need support, [join the community](https://github.com/orgs/mondoohq/discussions) in GitHub Discussions.
    groups:
      - title: IP address checks
        filters: asset.platform == "shodan-host"
        checks:
          - uid: mondoo-shodan-no-port
          - uid: mondoo-shodan-vulnerabilities
      - title: Shodan organization checks
        filters: asset.platform == "shodan-org"
        checks:
          - uid: mondoo-shodan-membership
    scoring_system: average
queries:
  - uid: mondoo-shodan-membership
    title: Verify Shodan membership
    impact: 50
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: false
      compliance/dora: false
      compliance/hipaa: false
      compliance/iso-27001-2022: false
      compliance/nis-2: false
      compliance/nist-csf-1: false
      compliance/nist-csf-2: false
      compliance/nist-sp-800-53-rev5: false
      compliance/nist-sp-800-171: false
      compliance/pci-dss-4: false
      compliance/soc2-2017: false
      compliance/vda-isa-5: false
    filters: asset.platform == "shodan-org"
    mql: shodan.profile.member == true
    docs:
      desc: |
        This check verifies that the Shodan account used to assess the organization holds an active membership. Shodan offers free and paid membership tiers, and most scanning, monitoring, and API capabilities depend on an active paid membership.

        **Why this matters**

        - **Continuous visibility:** An active membership keeps network monitoring and on-demand scans available, so changes in exposure are detected promptly.
        - **API access:** Automated security workflows that query Shodan rely on the API access that membership provides.
        - **Scan capacity:** Membership grants the query and scan credits needed to assess the full external footprint rather than a sampled subset.

        **Risk mitigation**

        - **Avoids monitoring gaps:** A lapsed membership silently disables scanning and monitoring, leaving new exposures undetected.
        - **Sustains coverage:** Maintaining the appropriate tier keeps the organization's entire internet-facing estate in scope.
      audit: |-
        Verify your organization's Shodan membership status using Shodan's own tooling:

        ### Audit via the Shodan website

        1. Log in to your account at [shodan.io](https://www.shodan.io/).
        2. Open your [account overview](https://account.shodan.io/).
        3. Review the **Account Type** and any displayed query and scan credits.

        A passing account shows an active membership tier; a failing account shows a free or expired plan.

        ### Audit via the Shodan API

        1. Run the following command with your API key:

        ```bash
        curl -s "https://api.shodan.io/account/profile?key=$SHODAN_API_KEY"
        ```

        2. Review the `member` field in the JSON response.

        A passing account returns `"member": true`; a failing account returns `"member": false`.
      remediation:
        - id: console
          desc: |
            **Using the Shodan website**

            Verify and maintain your organization's Shodan membership:

            1. Log in to your Shodan account at [shodan.io](https://www.shodan.io/).
            2. Navigate to your account settings and verify that your membership is active.
            3. Confirm that the membership tier provides the features your organization requires, such as API access, scanning credits, and network monitoring.
            4. If the membership has expired, renew it through the Shodan billing portal.
            5. If no membership exists, purchase an appropriate plan based on your organization's security monitoring needs.
    refs:
      - url: https://www.shodan.io/
        title: Shodan
  - uid: mondoo-shodan-no-port
    title: Ensure no ports are open
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: false
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-7
      compliance/pci-dss-4: pcidss-requirement-2-2-4
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: false
    filters: |
      asset.platform == "shodan-host" &&
      shodan.host.ip == regex.ipv4
    mql: shodan.host.ports == empty
    docs:
      desc: |
        This check ensures that Shodan observes no open ports on the host. Every port reachable from the internet is a potential entry point, and a host that exposes no ports presents no network-facing attack surface to opportunistic scanning.

        **Why this matters**

        - **Reduced attack surface:** Each closed port removes a service an attacker could probe, fingerprint, or exploit.
        - **Lower exposure to scanning:** Internet-wide scanners such as Shodan continuously catalog open ports, and a host with none does not appear as a target.
        - **Defense in depth:** Closing unused ports limits the blast radius if a single service is later found vulnerable.

        **Risk mitigation**

        - **Prevents unauthorized access:** Closed ports block direct connections to services that should not be publicly reachable.
        - **Limits data exposure:** Restricting network entry points reduces the paths available for data exfiltration or unauthorized transfer.
      audit: |-
        Check the ports Shodan has observed on the host using Shodan's own tooling:

        ### Audit via the Shodan website

        1. Browse to `https://www.shodan.io/host/<ip-address>`, replacing `<ip-address>` with the host's public IP address.
        2. Review the **Ports** panel for any reachable services.

        A passing host shows no record or no listed ports; a failing host lists one or more reachable services.

        ### Audit via the Shodan CLI

        1. Run `shodan host <ip-address>`.
        2. Review the `Ports:` line in the output.

        A passing host shows no ports; a failing host lists one or more ports reachable from the internet.
      remediation:
        - id: host
          desc: |
            **On the affected host**

            Review the open ports identified by Shodan and close any exposure that is not required:

            1. Identify the service listening on each open port, for example with `ss -tlnp` on Linux.
            2. Stop and disable services that are not required, and block their ports at the host or network firewall so they are no longer reachable from the internet.
            3. For required services, restrict access to trusted source networks using firewall rules or a VPN, and enforce authentication and encryption.
            4. Verify from an external network that the ports no longer accept connections.
            5. Request an on-demand Shodan re-scan, which consumes a scan credit, or wait for Shodan's next crawl:

            ```bash
            shodan scan submit 198.51.100.7
            ```

            This check reads Shodan's cached view of the host, so it continues to fail until Shodan re-scans the host and its records reflect the closed ports.
    refs:
      - url: https://www.shodan.io/
        title: Shodan
  - uid: mondoo-shodan-vulnerabilities
    title: Ensure no vulnerabilities are detected
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-tvm-03
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-8
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-id-ra-1
      compliance/nist-csf-2: nist-csf-2-id-ra-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-1
      compliance/pci-dss-4: pcidss-requirement-6-3-3
      compliance/soc2-2017: soc2-control-cc7-1-5
      compliance/vda-isa-5: vda-isa-5-5-2-5
    filters: |
      asset.platform == "shodan-host" &&
      shodan.host.ip == regex.ipv4
    mql: shodan.host.vulns == empty
    docs:
      desc: |
        This check ensures that Shodan associates no known vulnerabilities with the host. Shodan correlates the service banners it observes against published CVEs, so a flagged host is very likely running software with a documented weakness.

        **Why this matters**

        - **Known exploit paths:** Vulnerabilities surfaced by Shodan are public, so attackers can find and target the host with readily available exploit code.
        - **Internet-wide visibility:** A vulnerability visible to Shodan is visible to every other scanner, making the host an easy opportunistic target.
        - **Patch hygiene:** A clean result indicates that exposed services are running supported, up-to-date software.

        **Risk mitigation**

        - **Prevents exploitation:** Remediating flagged CVEs closes the documented paths attackers use to gain access or disrupt service.
        - **Improves resilience:** Keeping internet-facing software current reduces the window between disclosure and patching.
      audit: |-
        Check the vulnerabilities Shodan has associated with the host using Shodan's own tooling:

        ### Audit via the Shodan website

        1. Browse to `https://www.shodan.io/host/<ip-address>`, replacing `<ip-address>` with the host's public IP address.
        2. Review the **Vulnerabilities** section for any listed CVEs.

        A passing host shows no Vulnerabilities section; a failing host lists one or more CVEs.

        ### Audit via the Shodan CLI

        1. Run `shodan host <ip-address>`.
        2. Review the output for a `Vulnerabilities:` section.

        A passing host shows no `Vulnerabilities:` section; a failing host lists one or more CVEs.
      remediation:
        - id: host
          desc: |
            **On the affected host**

            Review the vulnerabilities identified by Shodan and remediate them at the source:

            1. Cross-reference the detected CVEs with vendor advisories and the National Vulnerability Database (NVD).
            2. Apply available patches or upgrade the affected services to a fixed release. Shodan derives most findings from the version string in the service banner, so the fix must change the version the service reports. Backported fixes that keep the old version string can leave Shodan reporting the CVE even after the host is patched.
            3. If patches are not available, implement compensating controls such as restricting the service to trusted networks or placing it behind a web application firewall.
            4. If the vulnerable service is not required, stop and disable it and block its port at the firewall.
            5. Request an on-demand Shodan re-scan, which consumes a scan credit, or wait for Shodan's next crawl:

            ```bash
            shodan scan submit 198.51.100.7
            ```

            This check reads Shodan's cached view of the host, so it continues to fail until Shodan re-scans the host and its records reflect the remediated services.
    refs:
      - url: https://www.shodan.io/
        title: Shodan
      - url: https://nvd.nist.gov/
        title: National Vulnerability Database (NVD)
