      compliance/nist-sp-800-171: false
      compliance/pci-dss-4: pcidss-requirement-8-3-9
      compliance/soc2-2017: soc2-control-cc6-1-8
      compliance/vda-isa-5: vda-isa-5-4-1-3
    variants:
      - uid: mondoo-snowflake-security-password-policy-max-age-configured-snowflake
        tags:
          mondoo.com/filter-title: Snowflake
          mondoo.com/filter-icon: snowflake
      - uid: mondoo-snowflake-security-password-policy-max-age-configured-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-snowflake-security-password-policy-max-age-configured-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-snowflake-security-password-policy-max-age-configured-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that every Snowflake password policy is configured to enforce a maximum password age of no more than 90 days. Regular rotation limits how long a compromised credential remains usable.

        **Why this matters**

        - **Bounds credential exposure:** Without a maximum age, a compromised password stays valid until the user voluntarily changes it.
        - **Reduces breach-list risk:** Stale, long-lived passwords are more likely to surface in credential dumps and breach databases.
        - **Forces refresh:** Regular rotation ensures that even an undetected compromise has a limited useful lifetime.

        **Risk mitigation**

        - **Cap the age:** Set the maximum password age to 90 days or less.
        - **Layer with MFA:** Combine password rotation with multi-factor authentication for defense in depth.
        - **Track rotation:** Notify users ahead of expiration and monitor for users who have not rotated passwords on schedule.
      audit: |
        ### Audit via SQL

        Run the query in a Snowsight worksheet or with SnowSQL:

        ```sql
        SHOW PASSWORD POLICIES;
        ```

        For the policy attached to the account, run `DESC PASSWORD POLICY <policy_name>`: a passing result shows `PASSWORD_MAX_AGE_DAYS` between 1 and 90, while a failing result shows 0, a value above 90, or no password policy configured.
      remediation:
        # No console remediation: Snowsight has no password policy editor. Password policies are schema-level objects managed entirely through SQL; use the SQL method in a Snowsight worksheet.
        - id: sql
          desc: |
            Run as `ACCOUNTADMIN` in a Snowsight worksheet, via SnowSQL, or with the Snowflake CLI.

            > **Important:** A Snowflake account attaches **at most one** password policy. Prefer `ALTER PASSWORD POLICY` on the existing policy. Do not blindly `CREATE OR REPLACE`, because that overwrites settings other policy checks may have already configured.

            1. Find the policy currently attached to the account:

                ```sql
                SHOW PASSWORD POLICIES;
                SHOW PARAMETERS LIKE 'PASSWORD_POLICY' IN ACCOUNT;
                ```

            2. Update the existing policy:

                ```sql
                ALTER PASSWORD POLICY <policy_name> SET PASSWORD_MAX_AGE_DAYS = 90;
                ```

            3. If no policy is attached yet, create one and attach it. Subsequent password-policy checks should `ALTER` this same policy:

                ```sql
                CREATE PASSWORD POLICY IF NOT EXISTS <policy_name>
                  PASSWORD_MAX_AGE_DAYS = 90;
                ALTER ACCOUNT SET PASSWORD POLICY <policy_name>;
                ```
        - id: terraform
          desc: |
            With the `snowflakedb/snowflake` provider, set `max_age_days` to a value between 1 and 90 on the `snowflake_password_policy` resource, then attach the policy to the account. Both resources are preview features, so enable them in the provider configuration first:

            ```hcl
            provider "snowflake" {
              preview_features_enabled = [
                "snowflake_password_policy_resource",
                "snowflake_account_password_policy_attachment_resource",
              ]
            }

            resource "snowflake_password_policy" "account" {
              database     = "SECURITY"
              schema       = "POLICIES"
              name         = "ACCOUNT_PASSWORD_POLICY"
              max_age_days = 90
            }

            resource "snowflake_account_password_policy_attachment" "account" {
              password_policy = snowflake_password_policy.account.fully_qualified_name
            }
            ```
    refs:
      - url: https://docs.snowflake.com/en/sql-reference/sql/create-password-policy
        title: Snowflake password policy documentation
  - uid: mondoo-snowflake-security-password-policy-history-configured
    title: Ensure password policies enforce password history
    impact: 60
    tags:
