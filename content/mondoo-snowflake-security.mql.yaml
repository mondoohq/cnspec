        tags:
          mondoo.com/filter-title: Snowflake
          mondoo.com/filter-icon: snowflake
      - uid: mondoo-snowflake-security-password-policy-max-age-configured-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
