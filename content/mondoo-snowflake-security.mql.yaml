queries:
  # No Terraform variants: the runtime check inspects each user's observed Duo enrollment flag (ext_authn_duo), which the snowflake_user resource exposes only as read-only show_output and never as a configurable argument. Per-user MFA enrollment is runtime identity state with no faithful Terraform analog.
  - uid: mondoo-snowflake-security-mfa-enabled-for-active-users
    title: Ensure MFA is enabled for all active users
    impact: 90
    filters: asset.platform == 'snowflake'
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-14
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-j
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-3
      compliance/pci-dss-4: pcidss-requirement-8-4-2
      compliance/soc2-2017: soc2-control-cc6-6-3
      compliance/vda-isa-5: vda-isa-5-4-1-2
    mql: |
      snowflake.account.users.where(disabled == false && hasPassword == true).all(extAuthnDuo == true)
    docs:
      desc: |
        This check ensures that every active user who can sign in with a password is configured with Duo multi-factor authentication enrolled. By default Snowflake does not require MFA, so a password alone is enough to authenticate unless an administrator enforces additional factors.

        **Scope of this check**

        The evaluation targets active users that have a password set, and deliberately excludes users with no password such as service users that rely on key-pair authentication or OAuth, since those identities cannot enroll in Duo and would otherwise produce false positives. It inspects the Duo enrollment flag and does not yet detect TOTP or SAML-based MFA enforced through an authentication policy. If your account enforces MFA through an authentication policy instead of or in addition to Duo, also confirm that an MFA-required policy is attached account-wide:

        ```sql
        SHOW PARAMETERS LIKE 'AUTHENTICATION_POLICY' IN ACCOUNT;
        DESC AUTHENTICATION POLICY <policy_name>;
        ```

        **Why this matters**

        - **Resists credential attacks:** Credential stuffing and brute-force attempts cannot succeed against an account that requires a second factor.
        - **Defeats phishing:** A stolen password is not enough to sign in, so phishing campaigns fail to grant attackers warehouse access.
        - **Limits breach impact:** A compromised account without MFA can access, exfiltrate, or modify sensitive data across the entire Snowflake account.
        - **Addresses a proven attack path:** Snowflake has been the target of high-profile breaches where stolen credentials were used to reach customer data, and MFA would have blocked many of them.

        **Risk mitigation**

        - **Enforce MFA broadly:** Enroll Duo MFA for every user who can authenticate with a password, or attach an authentication policy that requires MFA at the account level.
        - **Prioritize privileged users:** Make MFA mandatory first for users holding ACCOUNTADMIN, SECURITYADMIN, and SYSADMIN roles.
        - **Use stronger auth for services:** Configure service users with key-pair authentication or OAuth instead of passwords, and audit MFA enrollment status regularly.
      audit: |
        ### Audit via Snowsight

        1. Sign in to Snowsight as a user with the ACCOUNTADMIN or SECURITYADMIN role.
        2. Go to **Governance & security** » **Users & roles**.
        3. Review the **MFA** column for each active user that signs in with a password.

        A passing result shows every active password-based user marked as enrolled in MFA; a failing result shows one or more active password-based users with MFA not enrolled.

        ### Audit via SQL

        Run the query in a Snowsight worksheet or with SnowSQL:

        ```sql
        SHOW USERS;
        ```

        A passing result shows `ext_authn_duo` set to true for every row where `has_password` is true and `disabled` is false; a failing result shows at least one such user with `ext_authn_duo` set to false.
      remediation:
        - id: console
          desc: |
            **Enroll MFA in Snowsight for each user**

            Each Snowflake user must enroll in MFA from their own settings.
            Have affected users:

            1. Sign in to Snowsight.
            2. Open the user menu and select **Settings**.
            3. Select **Authentication**.
            4. In the **Multi-factor authentication** section, select **Add new authentication method** and follow the prompts. Choose Duo if your organization standardizes on it; passkey and authenticator app enrollment satisfy Snowflake MFA but do not set the Duo enrollment flag that this check inspects.

            Administrators can monitor enrollment from **Governance & security** » **Users & roles**, where the **MFA** column shows enrolled vs not enrolled.

            Note: this check reads the Duo MFA flag specifically, so a user who enrolls a non-Duo factor such as TOTP or a passkey still fails it. To enforce those factors and satisfy the check, pair this step with the SQL authentication-policy remediation, which requires MFA regardless of the enrollment method.
        - id: sql
          desc: |
            Run as `ACCOUNTADMIN` in a Snowsight worksheet, via SnowSQL, or with the Snowflake CLI.

            **Enforce MFA via an authentication policy**

            Authentication policies are the supported way to require MFA. A Snowflake account attaches at most one authentication policy, so inspect existing policies first:

            ```sql
            SHOW AUTHENTICATION POLICIES;
            ```

            Create or update a policy that requires MFA, then attach it at the account level:

            ```sql
            CREATE AUTHENTICATION POLICY IF NOT EXISTS require_mfa_policy
              AUTHENTICATION_METHODS = ('PASSWORD', 'SAML')
              MFA_ENROLLMENT         = 'REQUIRED'
              COMMENT                = 'Require MFA enrollment on every login';

            ALTER ACCOUNT SET AUTHENTICATION POLICY require_mfa_policy;
            ```

            Snowflake has no account parameter that toggles MFA on its own. Enforcement comes entirely from the authentication policy above, so the `MFA_ENROLLMENT` setting is what requires users to register and use a second factor.

            When `MFA_ENROLLMENT = 'REQUIRED'` is set, the policy's `CLIENT_TYPES` must include `SNOWFLAKE_UI`, because Snowsight is where users complete enrollment. The default of `ALL` satisfies this.

            The policy forces users to enroll at their next sign-in. It does not retroactively log out sessions that authenticated before the policy was attached. Users who enroll with a passkey or an authenticator app satisfy the policy but do not set the Duo enrollment flag that this check inspects, so confirm enrollment afterward with `SHOW USERS` and review the `ext_authn_duo` column.
        - id: terraform
          desc: |
            The `snowflakedb/snowflake` provider cannot set a per-user Duo enrollment flag, but it can enforce MFA account-wide with an authentication policy. Both resources are preview features, so enable them in the provider configuration first:

            ```hcl
            provider "snowflake" {
              preview_features_enabled = [
                "snowflake_authentication_policy_resource",
                "snowflake_account_authentication_policy_attachment_resource",
              ]
            }

            resource "snowflake_authentication_policy" "require_mfa" {
              database               = "SECURITY"
              schema                 = "POLICIES"
              name                   = "REQUIRE_MFA_POLICY"
              authentication_methods = ["PASSWORD", "SAML"]
              mfa_enrollment         = "REQUIRED"
              comment                = "Require MFA enrollment on every login"
            }

            resource "snowflake_account_authentication_policy_attachment" "account" {
              authentication_policy = snowflake_authentication_policy.require_mfa.fully_qualified_name
            }
            ```
    refs:
      - url: https://docs.snowflake.com/en/user-guide/security-mfa
        title: Snowflake MFA documentation
  # No Terraform variants: the runtime check counts the total number of users granted the ACCOUNTADMIN role account-wide. ACCOUNTADMIN grants are expressed as individual snowflake_grant_account_role resources, so a Terraform configuration only ever describes the grants it manages — it cannot observe the account-wide total and a count-based assertion would be vacuous.
  - uid: mondoo-snowflake-security-accountadmin-role-limited
    title: Ensure the ACCOUNTADMIN role is assigned to a limited number of users
    impact: 80
    filters: asset.platform == 'snowflake'
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-2
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-5
      compliance/pci-dss-4: pcidss-requirement-7-2-2
      compliance/soc2-2017: soc2-control-cc6-3-3
      compliance/vda-isa-5: vda-isa-5-4-2-1
    mql: |
      snowflake.account.roles.where(name == "ACCOUNTADMIN").all(assignedToUsers <= 3)
    docs:
      desc: |
        This check ensures that the ACCOUNTADMIN role is configured to be granted to no more than three users. ACCOUNTADMIN holds the highest privilege level in Snowflake, so keeping its membership small enforces the principle of least privilege and shrinks the attack surface.

        **Why this matters**

        - **Reduces high-value targets:** Each user holding ACCOUNTADMIN is a prime target for attackers, so fewer holders means fewer paths to total account compromise.
        - **Limits blast radius:** ACCOUNTADMIN can manage every object, user, role, and account setting, so excessive assignments increase the risk of accidental or malicious misuse.
        - **Strengthens accountability:** A small, well-known set of administrators makes audit and attribution of privileged actions far easier to maintain.

        **Risk mitigation**

        - **Cap membership:** Limit ACCOUNTADMIN to two or three trusted administrators and use SECURITYADMIN and SYSADMIN for day-to-day administration.
        - **Protect the holders:** Ensure every remaining ACCOUNTADMIN user has MFA enabled.
        - **Review regularly:** Periodically review and prune ACCOUNTADMIN role assignments to remove access that is no longer required.
      audit: |
        ### Audit via Snowsight

        1. Sign in to Snowsight as a user with the ACCOUNTADMIN or SECURITYADMIN role.
        2. Go to **Governance & security** » **Users & roles** and select the **Roles** tab.
        3. Open the `ACCOUNTADMIN` role and review the **Granted to** list of users.

        A passing result shows three or fewer users granted the role; a failing result shows four or more.

        ### Audit via SQL

        Run the query in a Snowsight worksheet or with SnowSQL:

        ```sql
        SHOW GRANTS OF ROLE ACCOUNTADMIN;
        ```

        A passing result shows three or fewer rows where `granted_to` is `USER`; a failing result shows four or more such rows.
      remediation:
        - id: console
          desc: |
            **Using Snowsight**

            1. In Snowsight, go to **Governance & security** » **Users & roles**.
            2. Select the **Roles** tab and open `ACCOUNTADMIN` to review which users hold the role.
            3. Snowsight does not support revoking a role grant from the role page, so for every user that does not need full account control, revoke the grant in a worksheet and assign a least-privilege role such as `SYSADMIN` or `SECURITYADMIN` instead:

                ```sql
                REVOKE ROLE ACCOUNTADMIN FROM USER <user_name>;
                GRANT ROLE SYSADMIN TO USER <user_name>;
                ```

            4. Keep at least two named users with `ACCOUNTADMIN` so the account cannot be locked out if one break-glass account becomes unavailable.
        - id: sql
          desc: |
            Run as `ACCOUNTADMIN` or `SECURITYADMIN` in a Snowsight worksheet, via SnowSQL, or with the Snowflake CLI.

            1. List both directions of `ACCOUNTADMIN`: who has been granted the role, and what privileges the role itself holds:

                ```sql
                SHOW GRANTS OF ROLE ACCOUNTADMIN;
                SHOW GRANTS TO ROLE ACCOUNTADMIN;
                ```

            2. For each user that does not need full account control, revoke `ACCOUNTADMIN` and grant a least-privilege role instead. Common day-to-day roles are `SYSADMIN` for object and warehouse management and `SECURITYADMIN` for user and role management:

                ```sql
                REVOKE ROLE ACCOUNTADMIN FROM USER <user_name>;
                GRANT ROLE SYSADMIN TO USER <user_name>;
                ```

            3. Keep at least two named users with `ACCOUNTADMIN` so the account cannot be locked out if one break-glass account becomes unavailable.
        # No Terraform remediation: capping ACCOUNTADMIN membership means removing grants, but Terraform can only manage the snowflake_grant_account_role resources declared in its configuration. It cannot enforce an account-wide ceiling on a role's total membership.
    refs:
      - url: https://docs.snowflake.com/en/user-guide/security-access-control-overview
        title: Snowflake access control overview
  - uid: mondoo-snowflake-security-no-users-pending-password-change
    title: Ensure no active users have a pending forced password change
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-15
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-308-a-5-ii-d-security-awareness-training-and-tools-password-management
      compliance/iso-27001-2022: iso-27001-2022-a-5-17
      compliance/nis-2: nis-2-21-2-g
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-5
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-9
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc6-1-8
      compliance/vda-isa-5: vda-isa-5-4-1-3
    variants:
      - uid: mondoo-snowflake-security-no-users-pending-password-change-snowflake
        tags:
          mondoo.com/filter-title: Snowflake
          mondoo.com/filter-icon: snowflake
      - uid: mondoo-snowflake-security-no-users-pending-password-change-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-snowflake-security-no-users-pending-password-change-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-snowflake-security-no-users-pending-password-change-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that no active user is configured with the must-change-password flag still set, which indicates the user is relying on a temporary or initial password that has not yet been updated. A pending password change means an unverified credential is still valid for sign-in.

        **Why this matters**

        - **Temporary passwords leak:** Initial passwords are frequently shared over insecure channels such as email or chat, where they can be intercepted.
        - **Initial passwords are weak:** Administrator-set starting passwords often follow predictable patterns that are easy to guess.
        - **Signals stale accounts:** A user who never completed their password change may be an inactive or orphaned account that should be disabled.
        - **Extends the exposure window:** An attacker who obtains a temporary password retains access until that password is finally changed.

        **Risk mitigation**

        - **Follow up promptly:** Contact users who have not changed their initial password and require them to complete the change.
        - **Bound the lifetime:** Set expiration policies for temporary passwords so they cannot remain valid indefinitely.
        - **Disable abandoned accounts:** Disable accounts that have not completed initial setup within a reasonable time frame.
      audit: |
        ### Audit via Snowsight

        1. Sign in to Snowsight as a user with the ACCOUNTADMIN or SECURITYADMIN role.
        2. Go to **Governance & security** » **Users & roles**.
        3. Open each active user and check whether the account is still flagged to require a password change.

        A passing result shows no active user with a pending forced password change; a failing result shows one or more active users still flagged.

        ### Audit via SQL

        Run the query in a Snowsight worksheet or with SnowSQL:

        ```sql
        SHOW USERS;
        ```

        A passing result shows `must_change_password` set to false for every row where `disabled` is false; a failing result shows at least one active user with `must_change_password` set to true.
      remediation:
        - id: console
          desc: |
            **Using Snowsight**

            1. In Snowsight, go to **Governance & security** » **Users & roles**.
            2. Identify users still flagged "must change password", also visible on the user detail page.
            3. Notify each affected user to log in and complete their password change.
            4. For accounts that have not logged in for an extended period, open the user's more options menu and select **Disable User** instead of leaving the password change pending indefinitely.
        - id: sql
          desc: |
            Run as `ACCOUNTADMIN` or `SECURITYADMIN` in a Snowsight worksheet, via SnowSQL, or with the Snowflake CLI.

            1. Identify the affected users, those still flagged "must change password" and not disabled:

                ```sql
                SELECT NAME, CREATED_ON, LAST_SUCCESS_LOGIN, MUST_CHANGE_PASSWORD
                FROM SNOWFLAKE.ACCOUNT_USAGE.USERS
                WHERE MUST_CHANGE_PASSWORD = TRUE
                  AND DISABLED = FALSE;
                ```

                `ACCOUNT_USAGE` views can lag the live state by up to about 3 hours. For an authoritative snapshot, run `SHOW USERS;` and inspect the `must_change_password` column.

            2. Ask each affected user to log in and complete their password change. For accounts that have not logged in for an extended period, disable them instead:

                ```sql
                ALTER USER <user_name> SET DISABLED = TRUE;
                ```

            3. After a rotation cycle, re-run the query in step 1. The result should be empty.
        - id: terraform
          desc: |
            With the `snowflakedb/snowflake` provider, set `must_change_password` to `"false"` on every `snowflake_user` resource so a forced password change is not left pending. The provider models this field as a string. Once the user has completed initial setup, keeping the flag at `"false"` prevents Terraform from re-arming it on the next apply:

            ```hcl
            resource "snowflake_user" "analyst" {
              name                 = "ANALYST"
              must_change_password = "false"
            }
            ```
    refs:
      - url: https://docs.snowflake.com/en/sql-reference/sql/create-user
        title: Snowflake user management documentation
  - uid: mondoo-snowflake-security-password-policy-minimum-length
    title: Ensure password policies enforce a minimum length of at least 14 characters
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-308-a-5-ii-d-security-awareness-training-and-tools-password-management
      compliance/iso-27001-2022: iso-27001-2022-a-5-17
      compliance/nis-2: nis-2-21-2-g
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-5
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-7
      compliance/pci-dss-4: pcidss-requirement-8-3-6
      compliance/soc2-2017: soc2-control-cc6-1-8
      compliance/vda-isa-5: vda-isa-5-4-1-3
    variants:
      - uid: mondoo-snowflake-security-password-policy-minimum-length-snowflake
        tags:
          mondoo.com/filter-title: Snowflake
          mondoo.com/filter-icon: snowflake
      - uid: mondoo-snowflake-security-password-policy-minimum-length-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-snowflake-security-password-policy-minimum-length-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-snowflake-security-password-policy-minimum-length-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that every Snowflake password policy is configured to require a minimum password length of at least 14 characters. Longer passwords are dramatically more resistant to brute-force and credential-cracking attacks than the shorter defaults users tend to choose.

        **Why this matters**

        - **Defeats fast cracking:** Passwords shorter than 14 characters can be cracked quickly with modern hardware.
        - **Blunts credential stuffing:** Short, commonly used passwords are far more likely to appear in breach lists used by credential stuffing tools.
        - **Exceeds the baseline:** NIST SP 800-63B sets a floor of 8 characters, but a 14-character minimum provides substantially stronger protection.
        - **Protects sensitive data:** Snowflake accounts with weak passwords are prime targets for data exfiltration.

        **Risk mitigation**

        - **Raise the minimum:** Set the minimum password length to 14 or more characters in every password policy.
        - **Encourage passphrases:** Promote the use of passphrases so users can satisfy length requirements while keeping passwords memorable.
        - **Layer with MFA:** Combine length requirements with multi-factor authentication for defense in depth.
      audit: |
        ### Audit via SQL

        Run the query in a Snowsight worksheet or with SnowSQL:

        ```sql
        SHOW PASSWORD POLICIES;
        ```

        For the policy attached to the account, run `DESC PASSWORD POLICY <policy_name>`: a passing result shows `PASSWORD_MIN_LENGTH` of 14 or greater, while a failing result shows a lower value or no password policy configured.
      remediation:
        # No console remediation: Snowsight has no password policy editor. Password policies are schema-level objects managed entirely through SQL; use the SQL method in a Snowsight worksheet.
        - id: sql
          desc: |
            Run as `ACCOUNTADMIN` in a Snowsight worksheet, via SnowSQL, or with the Snowflake CLI.

            > **Important:** A Snowflake account attaches **at most one** password policy. Prefer `ALTER PASSWORD POLICY` on the existing policy. Do not blindly `CREATE OR REPLACE`, because that overwrites settings other policy checks may have already configured.

            1. Find the policy currently attached to the account:

                ```sql
                SHOW PASSWORD POLICIES;
                SHOW PARAMETERS LIKE 'PASSWORD_POLICY' IN ACCOUNT;
                ```

            2. Update the existing policy:

                ```sql
                ALTER PASSWORD POLICY <policy_name> SET PASSWORD_MIN_LENGTH = 14;
                ```

            3. If no policy is attached yet, create one and attach it. Subsequent password-policy checks should `ALTER` this same policy:

                ```sql
                CREATE PASSWORD POLICY IF NOT EXISTS <policy_name>
                  PASSWORD_MIN_LENGTH = 14;
                ALTER ACCOUNT SET PASSWORD POLICY <policy_name>;
                ```
        - id: terraform
          desc: |
            With the `snowflakedb/snowflake` provider, set `min_length` to at least `14` on the `snowflake_password_policy` resource, then attach the policy to the account. Both resources are preview features, so enable them in the provider configuration first:

            ```hcl
            provider "snowflake" {
              preview_features_enabled = [
                "snowflake_password_policy_resource",
                "snowflake_account_password_policy_attachment_resource",
              ]
            }

            resource "snowflake_password_policy" "account" {
              database   = "SECURITY"
              schema     = "POLICIES"
              name       = "ACCOUNT_PASSWORD_POLICY"
              min_length = 14
            }

            resource "snowflake_account_password_policy_attachment" "account" {
              password_policy = snowflake_password_policy.account.fully_qualified_name
            }
            ```
    refs:
      - url: https://docs.snowflake.com/en/sql-reference/sql/create-password-policy
        title: Snowflake password policy documentation
  - uid: mondoo-snowflake-security-password-policy-lockout-configured
    title: Ensure password policies enforce account lockout
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-308-a-5-ii-c-security-awareness-training-and-tools-log-in-monitoring
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-g
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-8
      compliance/pci-dss-4: pcidss-requirement-8-3-4
      compliance/soc2-2017: soc2-control-cc6-1-8
      compliance/vda-isa-5: vda-isa-5-4-1-2
    variants:
      - uid: mondoo-snowflake-security-password-policy-lockout-configured-snowflake
        tags:
          mondoo.com/filter-title: Snowflake
          mondoo.com/filter-icon: snowflake
      - uid: mondoo-snowflake-security-password-policy-lockout-configured-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-snowflake-security-password-policy-lockout-configured-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-snowflake-security-password-policy-lockout-configured-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that a password policy exists and that every Snowflake password policy allows no more than five failed sign-in attempts before locking the account for at least 15 minutes. Lockout rate-limits password guessing so that brute-force attacks cannot run unchecked.

        **Why this matters**

        - **Stops unlimited guessing:** Without lockout, automated brute-force tools can attempt thousands of passwords per second against an account.
        - **Blunts credential stuffing:** Lockout interrupts systematic attempts to reuse known compromised credentials.
        - **Surfaces attacks:** Lockout events provide a clear signal of unauthorized access attempts that monitoring can detect.
        - **Slows automated attacks:** Even strong passwords can eventually be guessed without a forced pause between attempts.

        **Risk mitigation**

        - **Set a sane retry limit:** Configure the maximum retry count between 3 and 5 attempts so legitimate users are not over-penalized.
        - **Set a lockout duration:** Apply a reasonable lockout time, such as 15 to 30 minutes, and monitor lockout events for signs of attack.
        - **Layer with MFA:** Combine lockout with multi-factor authentication for defense in depth.
      audit: |
        ### Audit via SQL

        Run the query in a Snowsight worksheet or with SnowSQL:

        ```sql
        SHOW PASSWORD POLICIES;
        ```

        For the policy attached to the account, run `DESC PASSWORD POLICY <policy_name>`: a passing result shows `PASSWORD_MAX_RETRIES` of 5 or fewer and `PASSWORD_LOCKOUT_TIME_MINS` of 15 or greater, while a failing result shows a higher retry limit, a shorter lockout time, or no password policy configured.
      remediation:
        # No console remediation: Snowsight has no password policy editor. Password policies are schema-level objects managed entirely through SQL; use the SQL method in a Snowsight worksheet.
        - id: sql
          desc: |
            Run as `ACCOUNTADMIN` in a Snowsight worksheet, via SnowSQL, or with the Snowflake CLI.

            > **Important:** A Snowflake account attaches **at most one** password policy. Prefer `ALTER PASSWORD POLICY` on the existing policy. Do not blindly `CREATE OR REPLACE`, because that overwrites settings other policy checks may have already configured.

            1. Find the policy currently attached to the account:

                ```sql
                SHOW PASSWORD POLICIES;
                SHOW PARAMETERS LIKE 'PASSWORD_POLICY' IN ACCOUNT;
                ```

            2. Update the existing policy:

                ```sql
                ALTER PASSWORD POLICY <policy_name> SET
                  PASSWORD_MAX_RETRIES       = 5
                  PASSWORD_LOCKOUT_TIME_MINS = 15;
                ```

            3. If no policy is attached yet, create one and attach it. Subsequent password-policy checks should `ALTER` this same policy:

                ```sql
                CREATE PASSWORD POLICY IF NOT EXISTS <policy_name>
                  PASSWORD_MAX_RETRIES       = 5
                  PASSWORD_LOCKOUT_TIME_MINS = 15;
                ALTER ACCOUNT SET PASSWORD POLICY <policy_name>;
                ```
        - id: terraform
          desc: |
            With the `snowflakedb/snowflake` provider, set `max_retries` on the `snowflake_password_policy` resource and pair it with `lockout_time_mins`, then attach the policy to the account. Both resources are preview features, so enable them in the provider configuration first:

            ```hcl
            provider "snowflake" {
              preview_features_enabled = [
                "snowflake_password_policy_resource",
                "snowflake_account_password_policy_attachment_resource",
              ]
            }

            resource "snowflake_password_policy" "account" {
              database          = "SECURITY"
              schema            = "POLICIES"
              name              = "ACCOUNT_PASSWORD_POLICY"
              max_retries       = 5
              lockout_time_mins = 15
            }

            resource "snowflake_account_password_policy_attachment" "account" {
              password_policy = snowflake_password_policy.account.fully_qualified_name
            }
            ```
    refs:
      - url: https://docs.snowflake.com/en/sql-reference/sql/create-password-policy
        title: Snowflake password policy documentation
  - uid: mondoo-snowflake-security-network-policies-configured
    title: Ensure network policies are configured for the account
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-snowflake-security-network-policies-configured-snowflake
        tags:
          mondoo.com/filter-title: Snowflake
          mondoo.com/filter-icon: snowflake
      - uid: mondoo-snowflake-security-network-policies-configured-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-snowflake-security-network-policies-configured-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-snowflake-security-network-policies-configured-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that the Snowflake account is configured with a network policy attached at the account level. A network policy restricts which IP addresses or ranges can connect, and without one attached Snowflake accepts connections from any address on the internet.

        **Scope of this check**

        The evaluation reads the account-level `NETWORK_POLICY` parameter, which returns the name of the policy currently bound to the account. It checks this binding rather than merely whether a policy definition exists, because an account can hold several `CREATE NETWORK POLICY` definitions that sit unattached and enforce no IP gating at all.

        **Why this matters**

        - **Closes global exposure:** Without a network policy, the account is reachable from any IP address in the world.
        - **Contains stolen credentials:** A network policy prevents leaked credentials from being used outside trusted networks.
        - **Adds a defense layer:** IP allowlisting and blocklisting provide protection that operates independently of authentication.
        - **Meets compliance:** Many frameworks require network-level access restrictions for data platforms.

        **Risk mitigation**

        - **Restrict to trusted ranges:** Create network policies that allow only corporate networks and VPN egress addresses.
        - **Enforce account-wide:** Attach a network policy at the account level so the restriction applies broadly, and use network rules for more granular control.
        - **Keep allowlists current:** Review and update IP allowlists as network infrastructure changes.
      audit: |
        ### Audit via Snowsight

        1. Sign in to Snowsight as a user with the ACCOUNTADMIN or SECURITYADMIN role.
        2. Go to **Governance & security** » **Network policies**.
        3. Review the policy list to see which policy, if any, is marked as active for the account.

        A passing result shows a network policy marked as active for the account; a failing result shows no active policy.

        ### Audit via SQL

        Run the query in a Snowsight worksheet or with SnowSQL:

        ```sql
        SHOW PARAMETERS LIKE 'NETWORK_POLICY' IN ACCOUNT;
        ```

        A passing result shows a non-empty policy name in the `value` column; a failing result shows an empty value.
      remediation:
        - id: console
          desc: |
            **Using Snowsight**

            1. In Snowsight, go to **Governance & security** » **Network policies**.
            2. Select the **Network Rules** tab, then **+ Network Rule**. Name the rule and add the CIDR ranges your organization uses for office, VPN, and data center egress.
            3. Select the **Network Policies** tab, then **+ Network Policy**. Name the policy, select **Allowed**, and add the rule you created.
            4. Before activating, confirm the allowed ranges cover every administrator, ETL job, and BI tool that connects to Snowflake. Snowflake only verifies that your own current IP address is allowed; any other user or integration outside the ranges is locked out the moment the policy activates.
            5. Find the policy in the list, select the **…** menu, then select **Activate** to enforce it account-wide.
        - id: sql
          desc: |
            Run as `ACCOUNTADMIN` or `SECURITYADMIN` in a Snowsight worksheet, via SnowSQL, or with the Snowflake CLI.

            > **Important:** A Snowflake account attaches **at most one** network policy at a time. If one is already attached, prefer `ALTER NETWORK POLICY` on it instead of creating a new one. Before attaching, inventory the egress ranges of every administrator, ETL job, and BI tool. Snowflake refuses the attachment if your own current IP is not allowed, but it does not validate anyone else's address, so an incomplete allowlist locks other users out immediately.

            1. Inspect existing network policies and what is attached:

                ```sql
                SHOW NETWORK POLICIES;
                SHOW PARAMETERS LIKE 'NETWORK_POLICY' IN ACCOUNT;
                ```

            2. Create the policy with the CIDR ranges your organization actually uses. The `203.0.113.0/24` and `198.51.100.0/24` values below are reserved documentation ranges from RFC 5737, so they are placeholders you must replace with your real egress ranges:

                ```sql
                CREATE NETWORK POLICY <policy_name>
                  ALLOWED_IP_LIST = ('203.0.113.0/24', '198.51.100.0/24');
                ```

            3. Attach it to the account. This takes effect immediately, so anyone connecting from outside the allowed ranges, including you, loses access at once:

                ```sql
                ALTER ACCOUNT SET NETWORK_POLICY = <policy_name>;
                ```

            4. Verify the policy is attached and contains the expected ranges:

                ```sql
                DESC NETWORK POLICY <policy_name>;
                ```
        - id: terraform
          desc: |
            With the `snowflakedb/snowflake` provider, define a `snowflake_network_policy` and bind it account-wide by setting the `NETWORK_POLICY` account parameter with `snowflake_account_parameter`. Ensure the allowed list covers every administrator and integration before applying, because Terraform only validates the IP of the credentials it runs with:

            ```hcl
            resource "snowflake_network_policy" "corp" {
              name            = "CORP_NETWORK_POLICY"
              allowed_ip_list = ["203.0.113.0/24", "198.51.100.0/24"]
            }

            resource "snowflake_account_parameter" "network_policy" {
              key   = "NETWORK_POLICY"
              value = snowflake_network_policy.corp.name
            }
            ```
    refs:
      - url: https://docs.snowflake.com/en/user-guide/network-policies
        title: Snowflake network policy documentation
  - uid: mondoo-snowflake-security-network-policies-no-unrestricted-access
    title: Ensure no network policy allows 0.0.0.0/0 or ::/0
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-snowflake-security-network-policies-no-unrestricted-access-snowflake
        tags:
          mondoo.com/filter-title: Snowflake
          mondoo.com/filter-icon: snowflake
      - uid: mondoo-snowflake-security-network-policies-no-unrestricted-access-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-snowflake-security-network-policies-no-unrestricted-access-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-snowflake-security-network-policies-no-unrestricted-access-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that no Snowflake network policy is configured to allow a wildcard CIDR, meaning `0.0.0.0/0` for IPv4 or `::/0` for IPv6, in its allowed IP list. Either entry permits connections from any address and effectively nullifies the network policy.

        **Why this matters**

        - **Creates false security:** A policy that allows `0.0.0.0/0` or `::/0` exists but offers no real protection, masking the gap.
        - **Restores global exposure:** Every risk of having no network policy applies equally when a policy allows all addresses.
        - **Misleads audits:** Compliance checks may incorrectly pass simply because a network policy is present, even though it gates nothing.

        **Risk mitigation**

        - **Replace wildcards:** Substitute `0.0.0.0/0` and `::/0` entries with specific trusted IP ranges.
        - **Audit for over-permissiveness:** Review network policies regularly for entries that are broader than necessary.
        - **Use minimal CIDRs:** Apply the smallest CIDR blocks that still cover your organization's legitimate access points.
      audit: |
        ### Audit via Snowsight

        1. Sign in to Snowsight as a user with the ACCOUNTADMIN or SECURITYADMIN role.
        2. Go to **Governance & security** » **Network policies**.
        3. Open each policy and review its allowed IP entries.

        A passing result shows no policy listing `0.0.0.0/0` or `::/0` among its allowed IPs; a failing result shows at least one policy that does.

        ### Audit via SQL

        Run the query in a Snowsight worksheet or with SnowSQL:

        ```sql
        SHOW NETWORK POLICIES;
        ```

        For each policy, run `DESC NETWORK POLICY <policy_name>`: a passing result shows no `ALLOWED_IP_LIST` containing `0.0.0.0/0` or `::/0`, while a failing result shows one or both wildcard entries.
      remediation:
        - id: console
          desc: |
            **Using Snowsight**

            1. In Snowsight, go to **Governance & security** » **Network policies**.
            2. Open the policy whose allowed list includes `0.0.0.0/0` or the IPv6 wildcard `::/0`.
            3. Replace the wildcard entry with the specific CIDR ranges your organization actually uses for office, VPN, and data center egress. If the policy is active for the account, confirm the replacement ranges cover every administrator and integration first, because the change takes effect immediately.
            4. Save the policy.

            > **Warning:** Removing the wildcard restricts access immediately. Confirm your own current public IP is one of the allowed ranges before you save, or you will lock yourself out of the account.
        - id: sql
          desc: |
            Run as `ACCOUNTADMIN` or `SECURITYADMIN` in a Snowsight worksheet, via SnowSQL, or with the Snowflake CLI.

            > **Important:** If the policy is active for the account, the new list takes effect immediately. Snowflake verifies that your own current IP remains allowed, but it does not check anyone else's, so confirm the replacement ranges cover every administrator, ETL job, and BI tool before running the change.

            1. Find the offending policy and read its current IP list:

                ```sql
                SHOW NETWORK POLICIES;
                DESC NETWORK POLICY <policy_name>;
                ```

            2. Replace the open `0.0.0.0/0` or IPv6 `::/0` entry with the specific CIDR ranges your organization actually uses. The `203.0.113.0/24` and `198.51.100.0/24` values below are reserved documentation ranges from RFC 5737, so replace them with your real egress ranges:

                ```sql
                ALTER NETWORK POLICY <policy_name>
                  SET ALLOWED_IP_LIST = ('203.0.113.0/24', '198.51.100.0/24');
                ```

            3. Verify the change:

                ```sql
                DESC NETWORK POLICY <policy_name>;
                ```
        - id: terraform
          desc: |
            With the `snowflakedb/snowflake` provider, set the `allowed_ip_list` of every `snowflake_network_policy` to specific trusted CIDR ranges. Never include the `0.0.0.0/0` or `::/0` wildcards:

            ```hcl
            resource "snowflake_network_policy" "corp" {
              name            = "CORP_NETWORK_POLICY"
              allowed_ip_list = ["203.0.113.0/24", "198.51.100.0/24"]
            }
            ```
    refs:
      - url: https://docs.snowflake.com/en/user-guide/network-policies
        title: Snowflake network policy documentation
  - uid: mondoo-snowflake-security-no-accountadmin-default-role
    title: Ensure no active user has ACCOUNTADMIN as their default role
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-1-access-control
      compliance/iso-27001-2022: iso-27001-2022-a-8-2
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-6
      compliance/pci-dss-4: pcidss-requirement-7-2-2
      compliance/soc2-2017: soc2-control-cc6-3-3
      compliance/vda-isa-5: vda-isa-5-4-2-1
    variants:
      - uid: mondoo-snowflake-security-no-accountadmin-default-role-snowflake
        tags:
          mondoo.com/filter-title: Snowflake
          mondoo.com/filter-icon: snowflake
      - uid: mondoo-snowflake-security-no-accountadmin-default-role-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-snowflake-security-no-accountadmin-default-role-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-snowflake-security-no-accountadmin-default-role-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that no active Snowflake user is configured with ACCOUNTADMIN as their default role. When ACCOUNTADMIN is the default, every session for that user automatically starts with the highest privilege level, increasing the risk of accidental or malicious actions.

        **Why this matters**

        - **Violates least privilege:** Every query and operation runs with full administrative privileges by default rather than the minimum needed.
        - **Maximizes blast radius:** Accidental DROP, DELETE, or ALTER operations carry their largest possible impact when run as ACCOUNTADMIN.
        - **Amplifies session compromise:** If the user's session is hijacked, the attacker immediately holds the highest privileges with no further escalation needed.
        - **Undermines privilege separation:** Routine work should run under lower-privilege roles, which a privileged default role prevents.

        **Risk mitigation**

        - **Default to least privilege:** Set each user's default role to the minimum privilege level needed for daily tasks, such as SYSADMIN, SECURITYADMIN, or a custom role.
        - **Elevate only when needed:** Use ACCOUNTADMIN explicitly by switching roles only when a task requires it.
        - **Review regularly:** Periodically audit user default role assignments to catch privileged defaults.
      audit: |
        ### Audit via Snowsight

        1. Sign in to Snowsight as a user with the ACCOUNTADMIN or SECURITYADMIN role.
        2. Go to **Governance & security** » **Users & roles**.
        3. Sort or filter the user list by **Default role** and review the entries.

        A passing result shows no active user with a default role of `ACCOUNTADMIN`; a failing result shows one or more active users whose default role is `ACCOUNTADMIN`.

        ### Audit via SQL

        Run the query in a Snowsight worksheet or with SnowSQL:

        ```sql
        SHOW USERS;
        ```

        A passing result shows no row where `disabled` is false and `default_role` equals `ACCOUNTADMIN`; a failing result shows at least one such row.
      remediation:
        - id: console
          desc: |
            **Using Snowsight**

            1. In Snowsight, go to **Governance & security** » **Users & roles**.
            2. Find users whose default role is `ACCOUNTADMIN`.
            3. Open each user, expand **Advanced User Options**, change **Default role** to a least-privilege role such as `SYSADMIN` or a project-specific role, and save.
            4. Users can still `USE ROLE ACCOUNTADMIN` when explicit elevation is needed; this only changes which role is active at login.
        - id: sql
          desc: |
            Run as `ACCOUNTADMIN` or `SECURITYADMIN` in a Snowsight worksheet, via SnowSQL, or with the Snowflake CLI.

            1. Identify users whose default role is `ACCOUNTADMIN`:

                ```sql
                SELECT NAME, DEFAULT_ROLE
                FROM SNOWFLAKE.ACCOUNT_USAGE.USERS
                WHERE DEFAULT_ROLE = 'ACCOUNTADMIN'
                  AND DISABLED = FALSE;
                ```

                `ACCOUNT_USAGE` views can lag the live state by up to about 3 hours. For an authoritative snapshot, run `SHOW USERS;` and inspect the `default_role` column.

            2. For each affected user, change their default role to the least-privilege role they need day-to-day, such as `SYSADMIN`, `SECURITYADMIN`, or a custom role:

                ```sql
                ALTER USER <user_name> SET DEFAULT_ROLE = SYSADMIN;
                ```

            3. The user can still `USE ROLE ACCOUNTADMIN` when explicit elevation is needed; this only changes which role is active at login.
        - id: terraform
          desc: |
            With the `snowflakedb/snowflake` provider, set `default_role` on each `snowflake_user` resource to a least-privilege role such as `SYSADMIN`. Never set it to `ACCOUNTADMIN`:

            ```hcl
            resource "snowflake_user" "analyst" {
              name         = "ANALYST"
              default_role = "SYSADMIN"
            }
            ```
    refs:
