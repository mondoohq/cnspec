  - uid: mondoo-snowflake-security-password-policy-complexity-configured
    title: Ensure password policies enforce character complexity requirements
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-308-a-5-ii-d-security-awareness-training-and-tools-password-management
      compliance/iso-27001-2022: iso-27001-2022-a-5-17
      compliance/nis-2: nis-2-21-2-g
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-5
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-7
      compliance/pci-dss-4: pcidss-requirement-8-3-6
      compliance/soc2-2017: soc2-control-cc6-1-8
      compliance/vda-isa-5: vda-isa-5-4-1-3
    variants:
      - uid: mondoo-snowflake-security-password-policy-complexity-configured-snowflake
        tags:
          mondoo.com/filter-title: Snowflake
          mondoo.com/filter-icon: snowflake
      - uid: mondoo-snowflake-security-password-policy-complexity-configured-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-snowflake-security-password-policy-complexity-configured-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-snowflake-security-password-policy-complexity-configured-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that every Snowflake password policy is configured to require a mix of character types, with at least one uppercase letter, one lowercase letter, one numeric digit, and one special character. Complexity requirements increase resistance to dictionary and brute-force attacks.

        **Why this matters**

        - **Prevents trivial passwords:** Without complexity rules, users may choose simple, easily guessable passwords such as all-lowercase strings.
        - **Defeats dictionary attacks:** Passwords that mix character types are far harder to match against wordlists.
        - **Enlarges the search space:** Requiring multiple character classes forces passwords into a larger keyspace, making brute-force attacks less feasible.

        **Risk mitigation**

        - **Require every class:** Mandate at least one character from each category: uppercase, lowercase, numeric, and special.
        - **Pair with length:** Combine complexity requirements with a strong minimum length for maximum protection.
        - **Layer with MFA:** Use multi-factor authentication as an additional layer of protection.
      audit: |
        ### Audit via SQL

        Run the query in a Snowsight worksheet or with SnowSQL:

        ```sql
        SHOW PASSWORD POLICIES;
        ```

        For the policy attached to the account, run `DESC PASSWORD POLICY <policy_name>`: a passing result shows `PASSWORD_MIN_UPPER_CASE_CHARS`, `PASSWORD_MIN_LOWER_CASE_CHARS`, `PASSWORD_MIN_NUMERIC_CHARS`, and `PASSWORD_MIN_SPECIAL_CHARS` all set to 1 or greater, while a failing result shows any of them at 0 or no password policy configured.
      remediation:
        # No console remediation: Snowsight has no password policy editor. Password policies are schema-level objects managed entirely through SQL; use the SQL method in a Snowsight worksheet.
        - id: sql
          desc: |
            Run as `ACCOUNTADMIN` in a Snowsight worksheet, via SnowSQL, or with the Snowflake CLI.

            > **Important:** A Snowflake account attaches **at most one** password policy. Prefer `ALTER PASSWORD POLICY` on the existing policy. Do not blindly `CREATE OR REPLACE`, because that overwrites settings other policy checks may have already configured.

            1. Find the policy currently attached to the account:

                ```sql
                SHOW PASSWORD POLICIES;
                SHOW PARAMETERS LIKE 'PASSWORD_POLICY' IN ACCOUNT;
                ```

            2. Update the existing policy:

                ```sql
                ALTER PASSWORD POLICY <policy_name> SET
                  PASSWORD_MIN_UPPER_CASE_CHARS = 1
                  PASSWORD_MIN_LOWER_CASE_CHARS = 1
                  PASSWORD_MIN_NUMERIC_CHARS    = 1
                  PASSWORD_MIN_SPECIAL_CHARS    = 1;
                ```

            3. If no policy is attached yet, create one and attach it. Subsequent password-policy checks should `ALTER` this same policy:

                ```sql
                CREATE PASSWORD POLICY IF NOT EXISTS <policy_name>
                  PASSWORD_MIN_UPPER_CASE_CHARS = 1
                  PASSWORD_MIN_LOWER_CASE_CHARS = 1
                  PASSWORD_MIN_NUMERIC_CHARS    = 1
                  PASSWORD_MIN_SPECIAL_CHARS    = 1;
                ALTER ACCOUNT SET PASSWORD POLICY <policy_name>;
                ```
        - id: terraform
          desc: |
            With the `snowflakedb/snowflake` provider, set each character-class minimum to at least `1` on the `snowflake_password_policy` resource, then attach the policy to the account. Both resources are preview features, so enable them in the provider configuration first:

            ```hcl
            provider "snowflake" {
              preview_features_enabled = [
                "snowflake_password_policy_resource",
                "snowflake_account_password_policy_attachment_resource",
              ]
            }

            resource "snowflake_password_policy" "account" {
              database             = "SECURITY"
              schema               = "POLICIES"
              name                 = "ACCOUNT_PASSWORD_POLICY"
              min_upper_case_chars = 1
              min_lower_case_chars = 1
              min_numeric_chars    = 1
              min_special_chars    = 1
            }

            resource "snowflake_account_password_policy_attachment" "account" {
              password_policy = snowflake_password_policy.account.fully_qualified_name
            }
            ```
    refs:
      - url: https://docs.snowflake.com/en/sql-reference/sql/create-password-policy
        title: Snowflake password policy documentation
  - uid: mondoo-snowflake-security-password-policy-max-age-configured
    title: Ensure password policies enforce a maximum password age
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
