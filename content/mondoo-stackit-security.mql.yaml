  - uid: mondoo-stackit-security-db-postgres-acl-restricted
    title: Ensure PostgreSQL Flex instances do not allow access from the internet
    impact: 90
    filters: asset.platform == "stackit-postgres-flex-instance"
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-4-4
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-7
    mql: |
      stackit.postgresFlex.instance.acl.none(_ == "0.0.0.0/0" || _ == "::/0")
    docs:
      desc: |
        This check ensures that STACKIT PostgreSQL Flex instances do not include `0.0.0.0/0` in their access control list (ACL). A database reachable from the entire internet is exposed to brute-force, exploitation, and data-exfiltration attempts.

        **Why this matters**

        - **Direct data exposure:** A world-open database ACL puts the data one credential away from the entire internet.
        - **Attack surface:** Internet-reachable database ports are continuously scanned and attacked.
      remediation:
        - id: console
          desc: |
            In the STACKIT Portal, edit the PostgreSQL Flex instance ACL and restrict access to the specific application subnets or hosts that require connectivity.
        - id: terraform
          desc: |
            Restrict the `acl` list on the `stackit_postgresflex_instance` resource to the application subnets that require connectivity, excluding `0.0.0.0/0` and `::/0`:

            ```hcl
            resource "stackit_postgresflex_instance" "example" {
              project_id = var.project_id
              name       = "example-instance"
              acl        = ["10.0.0.0/8", "192.168.0.0/16"] # not 0.0.0.0/0
              flavor = {
                cpu = 2
                ram = 4
              }
              storage = {
                class = "premium-perf2-stackit"
                size  = 5
              }
              version = 14
            }
            ```
    refs:
      - url: https://docs.stackit.cloud/products/databases/postgresql-flex/
        title: STACKIT Documentation - PostgreSQL Flex
  - uid: mondoo-stackit-security-db-postgres-backups
    title: Ensure PostgreSQL Flex instances have a backup schedule configured
    impact: 60
    filters: asset.platform == "stackit-postgres-flex-instance"
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-bcr-08
      compliance/dora: dora-art-12
      compliance/hipaa: hipaa-security-ss164-308-a-7-ii-a-contingency-plan-data-backup-plan
      compliance/iso-27001-2022: iso-27001-2022-a-8-13
      compliance/nis-2: nis-2-21-2-c
      compliance/nist-csf-1: nist-csf-1-pr-ip-4
      compliance/nist-csf-2: nist-csf-2-pr-ds-11
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cp-9
      compliance/nist-sp-800-171: false
      compliance/pci-dss-4: false
      compliance/soc2-2017: false
      compliance/vda-isa-5: vda-isa-5-3-1-2
    mql: |
      stackit.postgresFlex.instance.backupSchedule != ""
    docs:
      desc: |
        This check ensures that STACKIT PostgreSQL Flex instances have a backup schedule configured. Regular automated backups are essential for recovery from data loss, corruption, or ransomware.

        **Why this matters**

        - **Recoverability:** A backup schedule provides restore points for the database.
        - **Business continuity:** Backups limit data loss after a destructive incident.
      remediation:
        - id: console
          desc: |
            In the STACKIT Portal, configure a backup schedule for the PostgreSQL Flex instance with a frequency and retention that meet your recovery objectives.
        - id: terraform
          desc: |
            Set a cron `backup_schedule` on the `stackit_postgresflex_instance` resource so automated backups run on a defined cadence:

            ```hcl
            resource "stackit_postgresflex_instance" "example" {
              project_id      = var.project_id
              name            = "example-instance"
              acl             = ["10.0.0.0/8"]
              backup_schedule = "00 02 * * *" # daily at 02:00
              flavor = {
                cpu = 2
                ram = 4
              }
              storage = {
                class = "premium-perf2-stackit"
                size  = 5
              }
              version = 14
            }
            ```
    refs:
      - url: https://docs.stackit.cloud/products/databases/postgresql-flex/
        title: STACKIT Documentation - PostgreSQL Flex
