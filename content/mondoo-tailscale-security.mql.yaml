  # No Terraform variants: the ACL policy is a HuJSON/JSON string in tailscale_acl.acl.
  # Asserting "no rule with src ['*'] and dst ['*:*'] and action 'accept'" requires parsing
  # the string body and is highly sensitive to formatting, comments, variable interpolation,
  # heredoc vs jsonencode(), and module references. Inspecting the raw string risks false
  # positives and false negatives, so this check stays runtime-only. The terraform remediation
  # below still shows the safe shape.
  - uid: mondoo-tailscale-security-acl-no-allow-all
    title: Ensure tailnet ACL policy does not contain blanket allow-all rules
    impact: 90
    filters: asset.platform == 'tailscale'
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-4
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-5-2-7
    mql: |
      tailscale.aclPolicy.acls.none(
        _['action'] == "accept" &&
        _['src'].contains("*") &&
        _['dst'].contains("*:*")
      )
    docs:
      desc: |
        This check ensures that the tailnet ACL policy does not contain a rule that accepts traffic from every source to every destination on every port. Tailscale's default starter policy includes such a rule, and it must be removed before the policy provides any meaningful network segmentation.

        **Why this matters**

        - **Prevents a flat network:** An accept rule with a source of `*` and destination of `*:*` collapses the entire ACL into a permissive flat network.
        - **Enables lateral movement:** Any compromised device can pivot to every other device, service, and port on the tailnet.
        - **Masks tighter rules:** Tag-based segmentation, group restrictions, and per-service rules added later are overridden by the catch-all and provide no protection.

        **Risk mitigation**

        - **Replace the catch-all:** Swap any accept rule whose source is `*` and destination is `*:*` for explicit per-group or per-tag allow rules.
        - **Validate with policy tests:** Use Tailscale's policy tests to confirm intended access still works after tightening the ACL.
        - **Adopt a least-privilege baseline:** Ensure every new rule names specific sources, destinations, and ports.
      audit: |
        ### Audit via Admin Console

        1. Sign in to the Tailscale admin console at login.tailscale.com/admin.
        2. Open the **Access controls** page and the policy file editor.
        3. Inspect the `acls` section for any entry with `src` of `["*"]`, `dst` of `["*:*"]`, and `action` of `"accept"`.

        A passing result shows no blanket allow-all entry in the policy file; a failing result shows at least one catch-all accept rule.

        ### Audit via API

        Query the Tailscale API and inspect the result:

        ```bash
        curl -s -u "$TAILSCALE_API_KEY:" \
          "https://api.tailscale.com/api/v2/tailnet/<tailnet>/acl"
        ```

        A passing response shows no `acls` entry combining `"action": "accept"` with a `*` source and a `*:*` destination; a failing response includes such a catch-all rule.
      remediation:
        - id: console
          desc: |
            **Using Tailscale Admin Console**

            1. Go to the [Tailscale admin console access controls](https://login.tailscale.com/admin/acls/file).
            2. Open the policy file editor.
            3. Before removing the catch-all, add explicit per-group, per-tag, or per-service rules that grant the access each group needs, including a rule preserving administrator access to managed machines.
            4. Remove or scope down any `acls` entry whose `src` is `["*"]`, `dst` is `["*:*"]`, and `action` is `"accept"`.
            5. Use the **Preview** feature and the policy `tests` block to confirm the intended access still works. ACL changes take effect immediately on every device, and an over-tightened policy can cut off the operators applying it.
            6. Save the policy.
        - id: cli
          desc: |
            To update the ACL policy via the Tailscale API:

            ```bash
            # Fetch the current policy; the ETag response header carries the version
            curl -s -i -u "$TAILSCALE_API_KEY:" \
              "https://api.tailscale.com/api/v2/tailnet/<tailnet>/acl"

            # Validate the edited policy without applying it
            curl -s -u "$TAILSCALE_API_KEY:" \
              -H "Content-Type: application/hujson" \
              -X POST "https://api.tailscale.com/api/v2/tailnet/<tailnet>/acl/validate" \
              --data-binary @policy.hujson

            # Apply it; If-Match prevents overwriting a concurrent edit
            curl -s -u "$TAILSCALE_API_KEY:" \
              -H "Content-Type: application/hujson" \
              -H 'If-Match: "<etag>"' \
              -X POST "https://api.tailscale.com/api/v2/tailnet/<tailnet>/acl" \
              --data-binary @policy.hujson
            ```
        - id: terraform
          desc: |
            To manage the tailnet ACL in Terraform, declare a `tailscale_acl` resource whose `acl` argument is least-privilege HuJSON with no `src = ["*"]` paired with `dst = ["*:*"]` at `action = "accept"`. Use `jsonencode` so the structure is easy to review in diffs:

            ```hcl
            resource "tailscale_acl" "policy" {
              acl = jsonencode({
                tagOwners = {
                  "tag:web" = ["group:platform"]
                  "tag:db"  = ["group:platform"]
                }
                acls = [
                  {
                    action = "accept"
                    src    = ["group:platform"]
                    dst    = ["tag:web:443"]
                  },
                  {
                    action = "accept"
                    src    = ["tag:web"]
                    dst    = ["tag:db:5432"]
                  },
                ]
              })
            }
            ```
    refs:
      - url: https://tailscale.com/kb/1018/acls
        title: Tailscale ACL policy documentation
      - url: https://tailscale.com/kb/1192/tailnet-policy
        title: Writing a tailnet policy file
  - uid: mondoo-tailscale-security-authkeys-have-expiration
    title: Ensure active pre-auth keys have an expiration set
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-10
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-5-17
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-5
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-6
      compliance/pci-dss-4: pcidss-requirement-8-6-3
      compliance/soc2-2017: soc2-control-cc6-1-9
      compliance/vda-isa-5: vda-isa-5-4-1-1
    variants:
      - uid: mondoo-tailscale-security-authkeys-have-expiration-tailscale
        tags:
          mondoo.com/filter-title: Tailscale Tailnet
          mondoo.com/filter-icon: tailscale
      - uid: mondoo-tailscale-security-authkeys-have-expiration-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-tailscale-security-authkeys-have-expiration-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-tailscale-security-authkeys-have-expiration-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that every active pre-auth key has a non-zero `expires` timestamp. A pre-auth key with no expiration acts as a long-lived bearer credential that can enroll arbitrary devices into the tailnet for the life of the tailnet itself; a leaked copy stays valid indefinitely.

        **Why this matters**

        - **Indefinite blast radius:** A non-expiring pre-auth key in a CI pipeline, container image, or shared credential store remains usable years after the original use case is gone, so a single leak can re-enroll attacker-controlled nodes long after the team rotated other secrets.
        - **Provisioning-lifecycle drift:** Pre-auth keys are issued for specific automation runs; without an expiration the credential outlives the workflow that needed it, accumulating dormant access.
        - **Audit visibility gap:** Tailscale does not warn on keys that simply never expire. Expired keys disappear from the active set; non-expiring keys must be enumerated manually.
        - **Compliance hard requirement:** Most authentication-credential controls require a documented lifetime on every secret used to authenticate devices or services. A non-expiring key cannot satisfy that.

        **Risk mitigation**

        - **Bounded credential lifetime:** Setting an explicit expiration means a leaked key automatically becomes useless after the configured window, capping the damage from any single exposure event.
        - **Forces rotation discipline:** A finite lifetime requires operators to reissue keys on a defined cadence, which surfaces unused automation and keeps the active-key list honest.
      audit: |
        ### Audit via Admin Console

        1. Sign in to the [Tailscale admin console](https://login.tailscale.com/admin).
        2. Open the **Keys** tab and review the **Auth keys** section.
        3. For each key whose **Revoked** column is empty, confirm the **Expires** column shows a future date.

        A passing tailnet shows a finite expiration on every active key. A failing tailnet shows at least one active key with **Expires: never**.

        ### Audit via API

        1. List active auth keys via the Tailscale API:

        ```bash
        curl -s -u "$TAILSCALE_API_KEY:" \
          "https://api.tailscale.com/api/v2/tailnet/<tailnet>/keys?all=true"
        ```

        2. Then retrieve each individual key:

        ```bash
        curl -s -u "$TAILSCALE_API_KEY:" \
          "https://api.tailscale.com/api/v2/tailnet/<tailnet>/keys/<key-id>"
        ```

        A passing key has `revoked` set or `expires` set to a future RFC 3339 timestamp. A failing key has `revoked` empty and `expires` equal to the zero value (`"0001-01-01T00:00:00Z"`).
      remediation:
        - id: console
          desc: |
            To replace a non-expiring pre-auth key from the admin console:

            1. Sign in to the [Tailscale admin console](https://login.tailscale.com/admin) and open **Settings** > **Keys**.
            2. Generate a replacement key with an explicit expiration. The **Expires** picker offers fixed windows up to 90 days; pick the shortest that satisfies the automation that consumes it.
            3. Match the **Reusable**, **Ephemeral**, and **Pre-approved** options to the key being replaced so enrolled devices keep the same lifecycle behavior.
            4. Update every consumer of the old key to use the new value.
            5. Revoke the old non-expiring key on the same page.
        - id: cli
          desc: |
            To replace a non-expiring pre-auth key via the Tailscale API, create a key with an explicit expiration and the same capability flags as the key it replaces. Devices enrolled with an ephemeral key are removed automatically when they go offline, so set `ephemeral` to `true` only when the old key behaved that way:

            ```bash
            # Create a replacement key with an explicit 90-day expiration in seconds
            curl -s -u "$TAILSCALE_API_KEY:" \
              -H "Content-Type: application/json" \
              -X POST "https://api.tailscale.com/api/v2/tailnet/<tailnet>/keys" \
              --data '{
                "capabilities": {
                  "devices": { "create": { "reusable": false, "ephemeral": false, "preauthorized": true, "tags": ["tag:ci"] } }
                },
                "expirySeconds": 7776000
              }'

            # Update consumers, then revoke the old key
            curl -s -u "$TAILSCALE_API_KEY:" \
              -X DELETE "https://api.tailscale.com/api/v2/tailnet/<tailnet>/keys/<old-key-id>"
            ```
        - id: terraform
          desc: |
            To ensure a pre-auth key has a finite expiration in Terraform, leave `expiry` at its default of 7776000 seconds, which is 90 days, or set it to an explicit positive integer on `tailscale_tailnet_key`. Setting `expiry = 0` disables expiry and is the failure case. Set `ephemeral` to match how the enrolled devices should behave; ephemeral devices are removed automatically when they go offline:

            ```hcl
            resource "tailscale_tailnet_key" "ci" {
              reusable      = false
              ephemeral     = true
              preauthorized = true
              expiry        = 7776000
              description   = "CI bootstrap"
              tags          = ["tag:ci"]
            }
            ```
    refs:
      - url: https://tailscale.com/kb/1085/auth-keys
        title: Tailscale auth keys
