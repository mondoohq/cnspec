policies:
  - uid: mondoo-tailscale-security
    name: Mondoo Tailscale Security
    version: 1.3.2
    license: BUSL-1.1
    tags:
      mondoo.com/category: security
      mondoo.com/platform: tailscale,saas
    require:
      - provider: tailscale
    authors:
      - name: Mondoo, Inc.
        email: hello@mondoo.com
    summary: Secure Tailscale tailnet ACLs and device settings
    docs:
      desc: |
        The Mondoo Tailscale Security policy identifies critical misconfigurations in Tailscale tailnets that could weaken your zero-trust network posture. This policy helps organizations detect and remediate weaknesses before they can be exploited, reducing the likelihood of unauthorized device access, stale credentials granting persistent network entry, and exposure of services that should remain private to authorized members.

        This policy provides security checks across key Tailscale areas:

        - Device authorization and tagging
        - Auth key and OAuth client lifecycle
        - Tailscale client software updates
        - User access controls and ACL configuration
        - Key expiry and rotation

        Learn more about scanning Tailscale in the [cnspec Tailscale documentation](https://mondoo.com/docs/cnspec/saas/tailscale).

        Have suggestions for new checks in this policy? Visit our [cnspec repository](https://github.com/mondoohq/cnspec).
    groups:
      - title: Tailscale Devices
        checks:
          - uid: mondoo-tailscale-security-devices-authorized
          - uid: mondoo-tailscale-security-devices-key-expiry-enabled
          - uid: mondoo-tailscale-security-devices-client-up-to-date
          - uid: mondoo-tailscale-security-devices-no-tailnet-lock-errors
          - uid: mondoo-tailscale-security-device-approval-required
          - uid: mondoo-tailscale-security-devices-auto-updates-enabled
          - uid: mondoo-tailscale-security-devices-key-duration-capped
      - title: Tailscale Users
        checks:
          - uid: mondoo-tailscale-security-no-users-pending-approval
          - uid: mondoo-tailscale-security-admin-owner-roles-limited
          - uid: mondoo-tailscale-security-no-idle-users
          - uid: mondoo-tailscale-security-user-approval-required
      - title: Tailscale ACL Policy
        checks:
          - uid: mondoo-tailscale-security-acl-no-allow-all
      - title: Tailscale Authentication Keys
        checks:
          - uid: mondoo-tailscale-security-authkeys-have-expiration
          - uid: mondoo-tailscale-security-authkeys-not-reusable
      - title: Tailscale Audit Logging
        checks:
          - uid: mondoo-tailscale-security-configuration-logstream-configured
      - title: Tailscale Webhooks
        checks:
          - uid: mondoo-tailscale-security-webhooks-use-https
    scoring_system: highest impact
queries:
  - uid: mondoo-tailscale-security-devices-authorized
    title: Ensure all devices are authorized to join the tailnet
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-16
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-1
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-1
    variants:
      - uid: mondoo-tailscale-security-devices-authorized-device
        tags:
          mondoo.com/filter-title: Tailscale Device
          mondoo.com/filter-icon: tailscale
      - uid: mondoo-tailscale-security-devices-authorized-tailnet
        tags:
          mondoo.com/filter-title: Tailscale Tailnet
          mondoo.com/filter-icon: tailscale
      - uid: mondoo-tailscale-security-devices-authorized-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-tailscale-security-devices-authorized-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-tailscale-security-devices-authorized-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that every device connected to the tailnet has been explicitly authorized by an administrator. Unauthorized devices may have joined without proper review and can reach internal services until they are removed.

        **Why this matters**

        - **Controls who joins the network:** Device authorization is the gate that decides which machines are allowed onto the tailnet.
        - **Catches stale and rogue endpoints:** Unauthorized devices may belong to former employees or to systems that have been compromised.
        - **Prevents silent enrollment:** Without authorization enforcement, any user with access can add a device with no administrator review.

        **Risk mitigation**

        - **Enforce device approval:** Require authorization for all new devices so they remain pending until an administrator reviews them.
        - **Review the device list:** Regularly audit connected devices and remove any that are unknown or no longer needed.
        - **Layer in tag-based ACLs:** Use device tags and ACL rules to restrict what a device can reach even after it has been authorized.
      audit: |
        ### Audit via Admin Console

        1. Sign in to the Tailscale admin console at login.tailscale.com/admin.
        2. Open the **Machines** tab.
        3. Review the authorization status shown next to each device.

        A passing result shows every device marked as authorized; a failing result shows one or more devices flagged as not authorized or awaiting approval.

        ### Audit via API

        Query the Tailscale API and inspect the result:

        ```bash
        curl -s -u "$TAILSCALE_API_KEY:" \
          "https://api.tailscale.com/api/v2/tailnet/<tailnet>/devices"
        ```

        A passing response shows `"authorized": true` for every device in the list; a failing response includes at least one device with `"authorized": false`.
      remediation:
        - id: console
          desc: |
            **Using Tailscale Admin Console**

            1. Go to the [Tailscale admin console](https://login.tailscale.com/admin/machines).
            2. Review devices that are not authorized.
            3. For each legitimate device, open the device menu and select **Approve**.
            4. Remove any device you do not recognize: open the device menu and select **Remove**.

            To require device authorization for all new devices:

            1. Go to [Settings > Device management](https://login.tailscale.com/admin/settings/device-management).
            2. Enable **Device approval**.
        - id: cli
          desc: |
            To authorize a device via the Tailscale API:

            ```bash
            curl -s -u "$TAILSCALE_API_KEY:" \
              -H "Content-Type: application/json" \
              -X POST "https://api.tailscale.com/api/v2/device/<device-id>/authorized" \
              --data '{ "authorized": true }'
            ```

            To remove a device that should not be on the tailnet:

            ```bash
            curl -s -u "$TAILSCALE_API_KEY:" \
              -X DELETE "https://api.tailscale.com/api/v2/device/<device-id>"
            ```
        - id: terraform
          desc: |
            To authorize a device in Terraform, declare a `tailscale_device_authorization` resource with `authorized = true`. This covers devices managed through Terraform; devices added directly through the admin console or via auth keys remain governed by the tailnet-wide device approval setting:

            ```hcl
            resource "tailscale_device_authorization" "example" {
              device_id  = data.tailscale_device.example.id
              authorized = true
            }
            ```
    refs:
      - url: https://tailscale.com/kb/1099/device-authorization
        title: Tailscale device authorization documentation
  - uid: mondoo-tailscale-security-devices-authorized-device
    filters: asset.platform == 'tailscale-device'
    mql: |
      tailscale.device.authorized == true
  - uid: mondoo-tailscale-security-devices-authorized-tailnet
    filters: asset.platform == 'tailscale'
    mql: |
      tailscale.devices.all(authorized == true)
  - uid: mondoo-tailscale-security-devices-authorized-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "tailscale_device_authorization")
    mql: |
      terraform.resources("tailscale_device_authorization").all(arguments["authorized"] == true)
  - uid: mondoo-tailscale-security-devices-authorized-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "tailscale_device_authorization")
    mql: |
      terraform.plan.resourceChanges.where(type == "tailscale_device_authorization").all(change.after.authorized == true)
  - uid: mondoo-tailscale-security-devices-authorized-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "tailscale_device_authorization")
    mql: |
      terraform.state.resources.where(type == "tailscale_device_authorization").all(values.authorized == true)
  - uid: mondoo-tailscale-security-devices-key-expiry-enabled
    title: Ensure device key expiry is not disabled
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-17
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-5-17
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-5
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-6
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc6-1-9
      compliance/vda-isa-5: vda-isa-5-4-1-1
    variants:
      - uid: mondoo-tailscale-security-devices-key-expiry-enabled-device
        tags:
          mondoo.com/filter-title: Tailscale Device
          mondoo.com/filter-icon: tailscale
      - uid: mondoo-tailscale-security-devices-key-expiry-enabled-tailnet
        tags:
          mondoo.com/filter-title: Tailscale Tailnet
          mondoo.com/filter-icon: tailscale
      - uid: mondoo-tailscale-security-devices-key-expiry-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-tailscale-security-devices-key-expiry-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-tailscale-security-devices-key-expiry-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that key expiry is not disabled on tailnet devices, so that each device must periodically re-authenticate. When key expiry is disabled, a device stays authenticated indefinitely and there is no forced re-verification of its owner.

        **Why this matters**

        - **Limits credential lifetime:** Key expiry caps how long a single device key remains valid before re-authentication is required.
        - **Bounds the impact of compromise:** A device with expiry disabled grants permanent tailnet access if its key is stolen.
        - **Reclaims access from lost devices:** Lost or stolen devices keep network access until expiry forces them out or an administrator removes them.

        **Risk mitigation**

        - **Re-enable key expiry:** Turn key expiry back on for any device where it has been disabled.
        - **Match expiry to device risk:** Use shorter durations for higher-risk endpoints such as mobile devices.
        - **Monitor for drift:** Watch for devices with disabled key expiry and correct them as they appear.
      audit: |
        ### Audit via Admin Console

        1. Sign in to the Tailscale admin console at login.tailscale.com/admin.
        2. Open the **Machines** tab.
        3. Review each device for a "Key expiry disabled" indicator.

        A passing result shows no devices with key expiry disabled; a failing result shows one or more devices marked as having key expiry disabled.

        ### Audit via API

        Query the Tailscale API and inspect the result:

        ```bash
        curl -s -u "$TAILSCALE_API_KEY:" \
          "https://api.tailscale.com/api/v2/tailnet/<tailnet>/devices"
        ```

        A passing response shows `"keyExpiryDisabled": false` for every device; a failing response includes at least one device with `"keyExpiryDisabled": true`.
      remediation:
        - id: console
          desc: |
            **Using Tailscale Admin Console**

            1. Go to the [Tailscale admin console](https://login.tailscale.com/admin/machines).
            2. Find devices labeled "Key expiry disabled".
            3. Open the device menu and select **Enable key expiry**.
        - id: cli
          desc: |
            To re-enable key expiry for a device via the Tailscale API:

            ```bash
            curl -s -u "$TAILSCALE_API_KEY:" \
              -H "Content-Type: application/json" \
              -X POST "https://api.tailscale.com/api/v2/device/<device-id>/key" \
              --data '{ "keyExpiryDisabled": false }'
            ```

            The device keeps its current key until it reaches the tailnet key expiry window, after which the device owner must re-authenticate.
        - id: terraform
          desc: |
            To keep key expiry enabled in Terraform, leave `key_expiry_disabled` unset, which defaults to `false`, or set it to `false` explicitly on any `tailscale_device_key` resource:

            ```hcl
            resource "tailscale_device_key" "example" {
              device_id           = data.tailscale_device.example.id
              key_expiry_disabled = false
            }
            ```
    refs:
      - url: https://tailscale.com/kb/1028/key-expiry
        title: Tailscale key expiry documentation
  - uid: mondoo-tailscale-security-devices-key-expiry-enabled-device
    filters: asset.platform == 'tailscale-device'
    mql: |
      tailscale.device.keyExpiryDisabled == false
  - uid: mondoo-tailscale-security-devices-key-expiry-enabled-tailnet
    filters: asset.platform == 'tailscale'
    mql: |
      tailscale.devices.all(keyExpiryDisabled == false)
  - uid: mondoo-tailscale-security-devices-key-expiry-enabled-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "tailscale_device_key")
    mql: |
      terraform.resources("tailscale_device_key").all(arguments["key_expiry_disabled"] != true)
  - uid: mondoo-tailscale-security-devices-key-expiry-enabled-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "tailscale_device_key")
    mql: |
      terraform.plan.resourceChanges.where(type == "tailscale_device_key").all(change.after.key_expiry_disabled != true)
  - uid: mondoo-tailscale-security-devices-key-expiry-enabled-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "tailscale_device_key")
    mql: |
      terraform.state.resources.where(type == "tailscale_device_key").all(values.key_expiry_disabled != true)
  # No Terraform variants: client update-availability is runtime telemetry surfaced by the
  # Tailscale API per device. It is not a configuration field — there is no field in
  # tailscale_device_authorization, tailscale_device_key, or tailscale_tailnet_settings that
  # expresses or constrains the installed client version.
  - uid: mondoo-tailscale-security-devices-client-up-to-date
    title: Ensure devices are running up-to-date Tailscale client software
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-tvm-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-308-a-1-ii-b-security-management-process-risk-management
      compliance/iso-27001-2022: iso-27001-2022-a-8-8
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-id-ra-1
      compliance/nist-csf-2: nist-csf-2-pr-ps-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-1
      compliance/pci-dss-4: pcidss-requirement-6-3-3
      compliance/soc2-2017: soc2-control-cc7-1-2
      compliance/vda-isa-5: vda-isa-5-5-2-5
    variants:
      - uid: mondoo-tailscale-security-devices-client-up-to-date-device
        tags:
          mondoo.com/filter-title: Tailscale Device
          mondoo.com/filter-icon: tailscale
      - uid: mondoo-tailscale-security-devices-client-up-to-date-tailnet
        tags:
          mondoo.com/filter-title: Tailscale Tailnet
          mondoo.com/filter-icon: tailscale
    docs:
      desc: |
        This check ensures that tailnet devices are running the latest available Tailscale client release. Outdated clients may carry known vulnerabilities or lack current security features.

        **Why this matters**

        - **Closes known vulnerabilities:** Older client versions may contain flaws that are already public and exploitable.
        - **Delivers current protections:** Security features, protocol improvements, and bug fixes ship only in newer releases.
        - **Maintains compatibility:** Outdated clients may not support the latest authentication, encryption, and tailnet security settings.

        **Risk mitigation**

        - **Apply updates promptly:** Identify devices with an available update and ensure the client is upgraded.
        - **Enable automatic updates:** Turn on automatic client updates wherever the platform supports them.
        - **Fold into patch management:** Include Tailscale client updates in the organization's standard patch management process.
      audit: |
        ### Audit via Admin Console

        1. Sign in to the Tailscale admin console at login.tailscale.com/admin.
        2. Open the **Machines** tab.
        3. Look for devices flagged with an available update.

        A passing result shows no devices with an update available; a failing result shows one or more devices flagged as needing a client update.

        ### Audit via API

        Query the Tailscale API and inspect the result:

        ```bash
        curl -s -u "$TAILSCALE_API_KEY:" \
          "https://api.tailscale.com/api/v2/tailnet/<tailnet>/devices"
        ```

        A passing response shows `"updateAvailable": false` for every device; a failing response includes at least one device with `"updateAvailable": true`.
      remediation:
        - id: console
          desc: |
            **Using Tailscale Admin Console**

            1. Go to the [Tailscale admin console](https://login.tailscale.com/admin/machines).
            2. Devices with available updates are flagged with an update badge.
            3. Notify device owners to update their clients, or enable tailnet-wide auto-updates under [Settings > Device management](https://login.tailscale.com/admin/settings/device-management).
        - id: cli
          desc: |
            On platforms where the Tailscale client ships its own updater, update directly:

            ```bash
            sudo tailscale update
            ```

            Enable automatic updates on the device so future releases install without manual action:

            ```bash
            sudo tailscale set --auto-update
            ```

            Where the client was installed through a package manager or app store, update through that channel instead:

            - **macOS**: Update through the Mac App Store, run `brew upgrade --cask tailscale-app` for the Homebrew GUI app, or `brew upgrade tailscale` for the Homebrew formula.
            - **Windows**: Update through the Microsoft Store or download the installer from tailscale.com.
            - **Linux**: Run `sudo apt-get update && sudo apt-get install --only-upgrade tailscale` on Debian and Ubuntu, or `sudo dnf upgrade tailscale` on Fedora and RHEL.
    refs:
      - url: https://tailscale.com/download
        title: Tailscale download and update
  - uid: mondoo-tailscale-security-devices-client-up-to-date-device
    filters: asset.platform == 'tailscale-device' && tailscale.device.isExternal == false
    mql: |
      tailscale.device.updateAvailable == false
  - uid: mondoo-tailscale-security-devices-client-up-to-date-tailnet
    filters: asset.platform == 'tailscale'
    mql: |
      tailscale.devices.where(isExternal == false).all(updateAvailable == false)
  # No Terraform variants: tailnet lock errors are runtime state from the Tailscale API
  # (whether a device has unresolved signature/key issues with the tailnet lock). It is not
  # a configuration field, so there is no HCL/plan/state shape to evaluate.
  - uid: mondoo-tailscale-security-devices-no-tailnet-lock-errors
    title: Ensure no devices have tailnet lock errors
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-16
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-2
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-1
    variants:
      - uid: mondoo-tailscale-security-devices-no-tailnet-lock-errors-device
        tags:
          mondoo.com/filter-title: Tailscale Device
          mondoo.com/filter-icon: tailscale
      - uid: mondoo-tailscale-security-devices-no-tailnet-lock-errors-tailnet
        tags:
          mondoo.com/filter-title: Tailscale Tailnet
          mondoo.com/filter-icon: tailscale
    docs:
      desc: |
        This check ensures that no device in the tailnet reports a tailnet lock signature error. A lock error means a device's node key has not been properly signed by a trusted device, which can break connectivity in a locked tailnet or signal an improperly added device.

        **Why this matters**

        - **Confirms device verification:** Tailnet lock requires node keys to be signed by trusted devices, and an error means that verification did not succeed.
        - **Surfaces unauthorized additions:** A lock error can indicate that a device was added without proper authorization.
        - **Preserves connectivity:** Unresolved lock errors can prevent a device from communicating correctly within the tailnet.

        **Risk mitigation**

        - **Resolve errors promptly:** Review every device reporting a tailnet lock error and address it without delay.
        - **Sign legitimate devices:** Use a trusted signing node to sign node keys for devices that belong on the tailnet.
        - **Remove unverifiable devices:** Delete any device that cannot be properly verified through the tailnet lock process.
      audit: |
        ### Audit via Admin Console

        1. Sign in to the Tailscale admin console at login.tailscale.com/admin.
        2. Open the **Machines** tab.
        3. Review each device for a tailnet lock error indicator.

        A passing result shows no devices reporting tailnet lock errors; a failing result shows one or more devices flagged with a lock signature error.

        ### Audit via API

        Query the Tailscale API and inspect the result:

        ```bash
        curl -s -u "$TAILSCALE_API_KEY:" \
          "https://api.tailscale.com/api/v2/tailnet/<tailnet>/devices"
        ```

        A passing response shows an empty `"tailnetLockError"` string for every device; a failing response includes at least one device with a non-empty `"tailnetLockError"` value.
      remediation:
        - id: console
          desc: |
            **Using Tailscale Admin Console**

            1. Go to the [Tailscale admin console](https://login.tailscale.com/admin/machines).
            2. Review devices showing tailnet lock errors and decide whether each device belongs on the tailnet.
            3. Remove any device that should not be on the tailnet.
        - id: cli
          desc: |
            To sign a legitimate device, run the following on a device that holds a trusted tailnet lock signing key:

            ```bash
            # List devices whose node keys are not yet signed
            tailscale lock status

            # Sign the device's node key
            tailscale lock sign nodekey:<node-key-hex>
            ```

            The node key also appears on the device's detail page in the admin console.
    refs:
      - url: https://tailscale.com/kb/1226/tailnet-lock
        title: Tailscale tailnet lock documentation
  - uid: mondoo-tailscale-security-devices-no-tailnet-lock-errors-device
    filters: asset.platform == 'tailscale-device'
    mql: |
      tailscale.device.tailnetLockError == ""
  - uid: mondoo-tailscale-security-devices-no-tailnet-lock-errors-tailnet
    filters: asset.platform == 'tailscale'
    mql: |
      tailscale.devices.all(tailnetLockError == "")
  # No Terraform variants: user approval status ("needs-approval") is runtime state set by
  # the Tailscale API as a result of admin actions. The tailscale provider has no resource
  # that models a user's approval state — users themselves are not Terraform-managed (there
  # is no tailscale_user resource), only the tailnet-wide users_approval_on toggle. See the
  # user-approval-required check for the variant-covered control.
  - uid: mondoo-tailscale-security-no-users-pending-approval
    title: Ensure no users are pending approval to join the tailnet
    impact: 70
    filters: asset.platform == 'tailscale'
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-06
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-308-a-4-ii-b-information-access-management-access-authorization
      compliance/iso-27001-2022: iso-27001-2022-a-5-18
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-3-1
      compliance/vda-isa-5: vda-isa-5-4-1-3
    mql: |
      tailscale.users.none(status == "needs-approval")
    docs:
      desc: |
        This check ensures that no users are stuck in a "needs-approval" state. Users pending approval have requested tailnet access but have not yet been reviewed by an administrator, which can indicate a backlog in access management.

        **Why this matters**

        - **Keeps legitimate users productive:** Users left pending may be blocked from resources they are entitled to use.
        - **Signals process gaps:** A growing backlog of pending requests suggests that access review is not running effectively.
        - **Forces a clear decision:** Every pending request should be promptly approved or denied rather than left unresolved.

        **Risk mitigation**

        - **Review approvals regularly:** Work through pending user requests on a routine cadence.
        - **Approve or deny explicitly:** Approve expected users and deny unknown or unexpected access requests.
        - **Enable approval notifications:** Configure alerts so administrators are informed of new approval requests.
      audit: |
        ### Audit via Admin Console

        1. Sign in to the Tailscale admin console at login.tailscale.com/admin.
        2. Open the **Users** tab.
        3. Review the status column for users marked as needing approval.

        A passing result shows no users with a "Needs approval" status; a failing result shows one or more users awaiting approval.

        ### Audit via API

        Query the Tailscale API and inspect the result:

        ```bash
        curl -s -u "$TAILSCALE_API_KEY:" \
          "https://api.tailscale.com/api/v2/tailnet/<tailnet>/users"
        ```

        A passing response shows no user with `"status": "needs-approval"`; a failing response includes at least one user in the `needs-approval` status.
      remediation:
        - id: console
          desc: |
            **Using Tailscale Admin Console**

            1. Go to the [Tailscale admin console](https://login.tailscale.com/admin/users).
            2. Review users with "Needs approval" status.
            3. For each expected user, open the user menu and select **Approve**.
            4. For unknown or unexpected requests, deny the request and investigate how it was made.
        - id: cli
          desc: |
            To approve a pending user via the Tailscale API:

            ```bash
            curl -s -u "$TAILSCALE_API_KEY:" \
              -X POST "https://api.tailscale.com/api/v2/users/<user-id>/approve"
            ```
    refs:
      - url: https://tailscale.com/kb/1138/user-management
        title: Tailscale user management documentation
  # No Terraform variants: the tailscale provider does not expose a per-user role-assignment
  # resource. As of provider v0.29.x there is no tailscale_user_role (only the tailnet-wide
  # users_role_allowed_to_join_external_tailnet setting), so role membership for owners and
  # admins cannot be evaluated from HCL/plan/state. This may become possible if a future
  # provider release adds a user-role resource.
  - uid: mondoo-tailscale-security-admin-owner-roles-limited
    title: Ensure admin and owner roles are limited to a small number of users
    impact: 70
    filters: asset.platform == 'tailscale'
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-05
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-308-a-4-ii-c-information-access-management-access-establishment-and-modification
      compliance/iso-27001-2022: iso-27001-2022-a-8-2
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-4
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-5
      compliance/pci-dss-4: pcidss-requirement-7-2-2
      compliance/soc2-2017: soc2-control-cc6-3-3
      compliance/vda-isa-5: vda-isa-5-4-2-1
    mql: |
      tailscale.users.where(role == "owner").length <= 2
      tailscale.users.where(role == "admin").length <= 3
    docs:
      desc: |
        This check ensures that the number of users holding owner and admin roles is kept small. Owner and admin roles carry elevated permissions that can modify tailnet configuration, manage devices, and control user access.

        **Why this matters**

        - **Shrinks the attack surface:** Each admin or owner account is a high-value target, so fewer of them means fewer paths to full control.
        - **Contains compromise:** A compromised privileged account can rewrite ACLs, approve devices, and change tailnet settings.
        - **Preserves accountability:** A small set of administrators makes it easier to maintain clear audit trails and ownership.

        **Risk mitigation**

        - **Apply least privilege:** Keep owner roles to one or two primary owners and admin roles to a handful of trusted administrators.
        - **Default to member roles:** Assign the member role to users who only need device connectivity.
        - **Prune role assignments:** Regularly review owner and admin assignments and downgrade users who no longer need them.
      audit: |
        ### Audit via Admin Console

        1. Sign in to the Tailscale admin console at login.tailscale.com/admin.
        2. Open the **Users** tab.
        3. Count the users assigned the Owner and Admin roles.

        A passing result shows a small number of privileged users, with at most two owners and three admins; a failing result shows more privileged users than expected.

        ### Audit via API

        Query the Tailscale API and inspect the result:

        ```bash
        curl -s -u "$TAILSCALE_API_KEY:" \
          "https://api.tailscale.com/api/v2/tailnet/<tailnet>/users"
        ```

        A passing response shows few users with `"role": "owner"` or `"role": "admin"`; a failing response shows more privileged users than the agreed limit.
      remediation:
        - id: console
          desc: |
            **Using Tailscale Admin Console**

            1. Go to the [Tailscale admin console](https://login.tailscale.com/admin/users).
            2. Review users with "Admin" and "Owner" roles.
            3. For each user who does not need elevated privileges, open the user menu, select **Edit role**, and assign **Member**.

            Keep at least one owner at all times. Tailscale prevents removing the last owner, so plan owner changes while a second owner exists.
        - id: cli
          desc: |
            To downgrade a user to the member role via the Tailscale API:

            ```bash
            curl -s -u "$TAILSCALE_API_KEY:" \
              -H "Content-Type: application/json" \
              -X POST "https://api.tailscale.com/api/v2/users/<user-id>/role" \
              --data '{ "role": "member" }'
            ```
    refs:
      - url: https://tailscale.com/kb/1138/user-management
        title: Tailscale user roles documentation
  # No Terraform variants: user idle status ("idle") is runtime activity telemetry from the
  # Tailscale API based on last-seen timestamps. It is not a configuration field — there is
  # no tailscale_user resource and no HCL argument that expresses or constrains user activity.
  - uid: mondoo-tailscale-security-no-idle-users
    title: Ensure no users have been idle for an extended period
    impact: 50
    filters: asset.platform == 'tailscale'
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-07
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-308-a-4-ii-c-information-access-management-access-establishment-and-modification
      compliance/iso-27001-2022: iso-27001-2022-a-5-18
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-6
      compliance/pci-dss-4: pcidss-requirement-7-2-4
      compliance/soc2-2017: soc2-control-cc6-2-2
      compliance/vda-isa-5: vda-isa-5-4-1-3
    mql: |
      tailscale.users.none(status == "idle")
    docs:
      desc: |
        This check ensures that no users in the tailnet have remained idle for an extended period. Idle users have not been seen for more than 28 days and may represent dormant accounts that widen the attack surface.

        **Why this matters**

        - **Flags abandoned accounts:** Idle accounts often belong to former employees or contractors who no longer need access.
        - **Reduces an attacker target:** Dormant accounts are attractive targets, especially where credentials may be reused or already compromised.
        - **Enforces least privilege:** Unused accounts still hold network access and may carry overly permissive configurations.

        **Risk mitigation**

        - **Review idle users:** Routinely check idle users and confirm whether they still require access.
        - **Suspend or remove dormant accounts:** Disable or delete users who no longer need tailnet access.
        - **Strengthen offboarding:** Ensure the offboarding process explicitly removes tailnet access for departing personnel.
      audit: |
        ### Audit via Admin Console

        1. Sign in to the Tailscale admin console at login.tailscale.com/admin.
        2. Open the **Users** tab.
        3. Review the status and last seen columns for users marked as idle.

        A passing result shows no users with an "Idle" status; a failing result shows one or more users inactive for more than 28 days.

        ### Audit via API

        Query the Tailscale API and inspect the result:

        ```bash
        curl -s -u "$TAILSCALE_API_KEY:" \
          "https://api.tailscale.com/api/v2/tailnet/<tailnet>/users"
        ```

        A passing response shows no user with `"status": "idle"`; a failing response includes at least one user in the `idle` status.
      remediation:
        - id: console
          desc: |
            **Using Tailscale Admin Console**

            1. Go to the [Tailscale admin console](https://login.tailscale.com/admin/users).
            2. Review users with "Idle" status, meaning inactive for more than 28 days.
            3. Contact idle users to verify they still need access.
            4. Suspend users who no longer require tailnet access: open the user menu and select **Suspend**. Suspension is reversible and blocks the user's devices without deleting them.
            5. Delete a user only after confirming the account is permanently unneeded. Deleting a user also removes every device the user owns from the tailnet, including any servers registered under that account.
        - id: cli
          desc: |
            To suspend an idle user via the Tailscale API:

            ```bash
            curl -s -u "$TAILSCALE_API_KEY:" \
              -X POST "https://api.tailscale.com/api/v2/users/<user-id>/suspend"
            ```

            To delete the user once the account is confirmed permanently unneeded:

            ```bash
            curl -s -u "$TAILSCALE_API_KEY:" \
              -X POST "https://api.tailscale.com/api/v2/users/<user-id>/delete"
            ```
    refs:
      - url: https://tailscale.com/kb/1138/user-management
        title: Tailscale user management documentation
  - uid: mondoo-tailscale-security-device-approval-required
    title: Ensure new devices require admin approval to join the tailnet
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-16
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-308-a-4-ii-b-information-access-management-access-authorization
      compliance/iso-27001-2022: iso-27001-2022-a-8-1
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-1
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-1
      compliance/pci-dss-4: pcidss-requirement-7-2-1
      compliance/soc2-2017: soc2-control-cc6-3-1
      compliance/vda-isa-5: vda-isa-5-4-2-1
    variants:
      - uid: mondoo-tailscale-security-device-approval-required-tailscale
        tags:
          mondoo.com/filter-title: Tailscale Tailnet
          mondoo.com/filter-icon: tailscale
      - uid: mondoo-tailscale-security-device-approval-required-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-tailscale-security-device-approval-required-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-tailscale-security-device-approval-required-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that the tailnet requires administrators to manually approve every new device before it can connect. When device approval is enforced, an attacker who steals a user's credentials still cannot silently enroll a new endpoint into the tailnet.

        **Why this matters**

        - **Stops credential-to-access shortcuts:** Without approval, any successful authentication produces a connected device immediately, so phished credentials become network access.
        - **Adds a human review step:** Manual approval gives administrators a chance to catch unfamiliar device names, locations, or platforms.
        - **Keeps BYOD visible:** Compromised or unmanaged personal devices cannot join a corporate tailnet without IT seeing them first.

        **Risk mitigation**

        - **Enable device approval:** Require approval so new devices stay pending until an administrator reviews them.
        - **Alert on new requests:** Pair device approval with notifications so administrators act on requests promptly.
        - **Combine with tag-based ACLs:** Ensure an unapproved device cannot reach sensitive resources even briefly.
      audit: |
        ### Audit via Admin Console

        1. Sign in to the Tailscale admin console at login.tailscale.com/admin.
        2. Open **Settings > Device management**.
        3. Review the device approval setting.

        A passing result shows that manual approval for new devices is enabled; a failing result shows device approval turned off.

        ### Audit via API

        Query the Tailscale API and inspect the result:

        ```bash
        curl -s -u "$TAILSCALE_API_KEY:" \
          "https://api.tailscale.com/api/v2/tailnet/<tailnet>/settings"
        ```

        A passing response shows `"devicesApprovalOn": true`; a failing response shows `"devicesApprovalOn": false`.
      remediation:
        - id: console
          desc: |
            **Using Tailscale Admin Console**

            1. Go to [Settings > Device management](https://login.tailscale.com/admin/settings/device-management) in the Tailscale admin console.
            2. Locate the **Device approval** setting.
            3. Enable **Manually approve new devices**.

            Devices already on the tailnet are unaffected; only newly joining devices wait for approval.
        - id: cli
          desc: |
            To enable device approval via the Tailscale API:

            ```bash
            curl -s -u "$TAILSCALE_API_KEY:" \
              -H "Content-Type: application/json" \
              -X PATCH "https://api.tailscale.com/api/v2/tailnet/<tailnet>/settings" \
              --data '{ "devicesApprovalOn": true }'
            ```
        - id: terraform
          desc: |
            To enforce device approval in Terraform, set `devices_approval_on = true` on the `tailscale_tailnet_settings` resource:

            ```hcl
            resource "tailscale_tailnet_settings" "example" {
              devices_approval_on = true
            }
            ```
    refs:
      - url: https://tailscale.com/kb/1099/device-approval
        title: Tailscale device approval documentation
  - uid: mondoo-tailscale-security-device-approval-required-tailscale
