policies:
  - uid: mondoo-tls-security
    name: Mondoo TLS/SSL Security
    version: 1.7.1
    license: BUSL-1.1
    tags:
      mondoo.com/category: security
      mondoo.com/platform: host
    require:
      - provider: network
    authors:
      - name: Mondoo, Inc.
        email: hello@mondoo.com
    summary: Secure TLS/SSL certificates, ciphers, and protocols
    docs:
      desc: |
        The Mondoo TLS/SSL Security policy identifies weak or misconfigured TLS/SSL settings that could expose encrypted communications to interception, downgrade, and tampering. This policy helps organizations detect and remediate cryptographic weaknesses before attackers can exploit them in man-in-the-middle attacks to eavesdrop on sensitive data or inject malicious content into encrypted connections.

        This policy provides security checks across key TLS/SSL configuration areas:

        - TLS protocol versions and deprecation of insecure releases
        - Cipher suite strength and forward secrecy
        - Certificate validity, chain, and key strength
        - Key exchange mechanisms
        - Protection against known vulnerabilities such as BEAST, POODLE, and downgrade attacks

        Have suggestions for new checks in this policy? Visit our [cnspec repository](https://github.com/mondoohq/cnspec).
    groups:
      - title: Secure TLS/SSL connection
        filters: |
          asset.platform == 'host' && tls.params != empty
        checks:
          - uid: mondoo-tls-security-ciphers-include-aead-ciphers
          - uid: mondoo-tls-security-ciphers-include-pfs
          - uid: mondoo-tls-security-mitigate-beast
          - uid: mondoo-tls-security-no-diffie-hellman-cipher-suites
          - uid: mondoo-tls-security-no-export-cipher-suites
          - uid: mondoo-tls-security-no-null-cipher-suites
          - uid: mondoo-tls-security-no-old-cipher-suites
          - uid: mondoo-tls-security-no-rc4-ciphers
          - uid: mondoo-tls-security-no-rsa-key-exchange
          - uid: mondoo-tls-security-no-weak-block-cipher-modes
          - uid: mondoo-tls-security-no-weak-block-ciphers
          - uid: mondoo-tls-security-no-weak-tls-versions
          - uid: mondoo-tls-security-tls13-supported
          - uid: mondoo-tls-security-no-sni-certificate-leak
      - title: Valid TLS/SSL certificate
        filters: |
          asset.platform == 'host' && tls.params != empty
        checks:
          - uid: mondoo-tls-security-cert-domain-name-match
          - uid: mondoo-tls-security-cert-is-valid
          - uid: mondoo-tls-security-cert-no-cert-expired
          - uid: mondoo-tls-security-cert-no-certs-expired
          - uid: mondoo-tls-security-cert-no-weak-signature
          - uid: mondoo-tls-security-cert-not-revoked
          - uid: mondoo-tls-security-cert-not-self-signed
          - uid: mondoo-tls-security-cert-chain-verified
          - uid: mondoo-tls-security-cert-ocsp-configured
    scoring_system: highest impact
queries:
  - uid: mondoo-tls-security-cert-domain-name-match
    title: Certificate's domain name must match
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-17
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-15
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    mql: |
      tls.certificateMatchesDomain
    docs:
      desc: |
        This check ensures that the SSL/TLS certificate presented by the server is configured to match the hostname being secured, through either the Common Name or a Subject Alternative Name entry. A mismatch breaks the identity guarantee that TLS depends on and leaves clients unable to confirm they reached the legitimate server.

        **Why this matters**

        - **Man-in-the-middle exposure:** When domain validation fails, clients cannot confirm they are connecting to the legitimate server, which opens the door to interception attacks.
        - **Browser security warnings:** Users encounter alarming warnings that damage brand trust and train them to dismiss legitimate security alerts.
        - **Service disruptions:** API clients, mobile apps, and automated systems reject mismatched certificates, causing integration failures.
        - **Compliance violations:** Standards such as PCI DSS and HIPAA require valid TLS certificates for protecting data in transit.

        **Risk mitigation**

        - **List every hostname:** Include all required domain names in the Subject Alternative Name field, since modern browsers validate against SAN rather than the Common Name.
        - **Catch deployment errors early:** A mismatch often signals a deployment mistake, so correcting it removes a misconfiguration before it disrupts production.
      audit: |
        ### Audit via openssl

        Inspect the certificate the server returns for a given hostname with the OpenSSL client:

        ```bash
        openssl s_client -connect example.com:443 -servername example.com 2>/dev/null | openssl x509 -noout -subject -ext subjectAltName
        ```

        A passing result shows the requested hostname in the Common Name or in the Subject Alternative Name list, while a failing result shows a certificate whose names do not cover the hostname.
      remediation:
        - id: apache
          desc: |
            **Using Apache**

            1. Confirm what the certificate currently covers:

                ```bash
                openssl s_client -connect yourdomain.com:443 </dev/null 2>/dev/null \
                  | openssl x509 -noout -text \
                  | grep -EA1 "Subject:|Subject Alternative Name"
                ```

            2. Issue a certificate that lists every domain you serve in the Subject Alternative Name (SAN) extension. Certbot can request and install the cert directly into Apache:

                ```bash
                apt install certbot python3-certbot-apache       # Debian/Ubuntu
                yum install certbot python3-certbot-apache       # RHEL/CentOS
                certbot --apache -d yourdomain.com -d www.yourdomain.com
                ```

            3. Or, if you manage cert files manually, point Apache at the new chain and reload:

                ```apache
                SSLCertificateFile      /etc/letsencrypt/live/yourdomain.com/fullchain.pem
                SSLCertificateKeyFile   /etc/letsencrypt/live/yourdomain.com/privkey.pem
                ```

                ```bash
                apachectl configtest
                systemctl reload apache2   # Debian/Ubuntu
                systemctl reload httpd     # RHEL/CentOS
                ```

            4. Verify the SAN list now includes your domain by re-running the OpenSSL command from step 1.
        - id: nginx
          desc: |
            **Using Nginx**

            1. Confirm what the certificate currently covers:

                ```bash
                openssl s_client -connect yourdomain.com:443 </dev/null 2>/dev/null \
                  | openssl x509 -noout -text \
                  | grep -EA1 "Subject:|Subject Alternative Name"
                ```

            2. Issue a certificate that lists every domain you serve in the Subject Alternative Name (SAN) extension. Certbot can request and install the cert directly into Nginx:

                ```bash
                apt install certbot python3-certbot-nginx        # Debian/Ubuntu
                yum install certbot python3-certbot-nginx        # RHEL/CentOS
                certbot --nginx -d yourdomain.com -d www.yourdomain.com
                ```

            3. Or, if you manage cert files manually, point Nginx at the new chain and reload:

                ```nginx
                ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
                ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
                ```

                ```bash
                nginx -t && systemctl reload nginx
                ```

            4. Verify the SAN list now includes your domain by re-running the OpenSSL command from step 1.
        - id: haproxy
          desc: |
            **Using HAProxy**

            1. Confirm what the certificate currently covers:

                ```bash
                openssl s_client -connect yourdomain.com:443 </dev/null 2>/dev/null \
                  | openssl x509 -noout -text \
                  | grep -EA1 "Subject:|Subject Alternative Name"
                ```

            2. Issue a certificate that lists every domain you serve in the SAN extension. Certbot can issue a standalone cert for HAProxy:

                ```bash
                apt install certbot                              # Debian/Ubuntu
                yum install certbot                              # RHEL/CentOS
                certbot certonly --standalone -d yourdomain.com -d www.yourdomain.com
                ```

            3. HAProxy expects a single PEM file with the certificate chain followed by the private key. Build it and point `bind` at it:

                ```bash
                cat /etc/letsencrypt/live/yourdomain.com/fullchain.pem \
                    /etc/letsencrypt/live/yourdomain.com/privkey.pem \
                    > /etc/haproxy/certs/yourdomain.com.pem
                chmod 0600 /etc/haproxy/certs/yourdomain.com.pem
                ```

                ```haproxy
                frontend https-in
                    bind *:443 ssl crt /etc/haproxy/certs/yourdomain.com.pem
                ```

                ```bash
                haproxy -c -f /etc/haproxy/haproxy.cfg
                systemctl reload haproxy
                ```

            4. Verify the SAN list now includes your domain by re-running the OpenSSL command from step 1.
    refs:
      - url: https://www.ssllabs.com/projects/best-practices/
        title: SSL/TLS Deployment Best Practices
      - url: https://datatracker.ietf.org/doc/html/rfc8446
        title: TLS 1.3 RFC 8446
  - uid: mondoo-tls-security-cert-is-valid
    title: Certificate is valid
    impact: 95
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-15
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-17
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-15
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    mql: |
      tls.certificates.first {
        subject.commonName
        notBefore < time.now
        notAfter - notBefore < 398*time.day
      }
    docs:
      desc: |
        This check ensures that the SSL/TLS certificate is configured to be currently within its validity window and to have a total lifetime no longer than 398 days. Certificates that are not yet valid, already expired, or issued for an excessive duration are rejected by clients and break service availability.

        **Why this matters**

        - **Immediate connection failures:** Clients reject certificates that are not yet valid or have expired, causing service outages with no graceful degradation.
        - **Browser rejection:** Certificates with validity periods longer than 398 days are rejected by major browsers even when otherwise correct.
        - **Trust chain failures:** Certificates not signed by a trusted authority cannot be verified, which enables man-in-the-middle attacks.
        - **Incident response delays:** An invalid certificate can indicate compromise or misconfiguration that requires immediate investigation.

        **Risk mitigation**

        - **Automate renewal:** Use automated certificate management so certificates are renewed before they expire and stay within current validity limits.
        - **Issue from trusted CAs:** Obtain certificates from a recognized Certificate Authority so clients can complete trust chain verification.
      audit: |
        ### Audit via openssl

        Inspect the certificate's validity dates with the OpenSSL client:

        ```bash
        openssl s_client -connect example.com:443 -servername example.com 2>/dev/null | openssl x509 -noout -dates
        ```

        A passing result shows a notBefore date in the past, a notAfter date in the future, and a span between them under 398 days, while a failing result shows a window that is not yet open, already closed, or longer than 398 days.
      remediation:
        - id: apache
          desc: |
            **Using Apache**

            1. Check the certificate's validity window and chain trust:

                ```bash
                openssl s_client -connect yourdomain.com:443 -showcerts </dev/null 2>&1 \
                  | grep -E "verify|depth|notBefore|notAfter"
                ```

            2. Browser policies cap leaf cert validity at 398 days (13 months). Issue a new cert from a publicly trusted CA — for example, Let's Encrypt via Certbot's Apache plugin:

                ```bash
                certbot --apache -d yourdomain.com -d www.yourdomain.com
                ```

            3. If you manage cert files manually, point Apache at the full chain (server cert + intermediates):

                ```apache
                SSLCertificateFile      /etc/letsencrypt/live/yourdomain.com/fullchain.pem
                SSLCertificateKeyFile   /etc/letsencrypt/live/yourdomain.com/privkey.pem
                ```

                ```bash
                apachectl configtest
                systemctl reload apache2   # Debian/Ubuntu
                systemctl reload httpd     # RHEL/CentOS
                ```

            4. Re-run the verification command in step 1 — `Verify return code: 0 (ok)` confirms the new chain is trusted.
        - id: nginx
          desc: |
            **Using Nginx**

            1. Check the certificate's validity window and chain trust:

                ```bash
                openssl s_client -connect yourdomain.com:443 -showcerts </dev/null 2>&1 \
                  | grep -E "verify|depth|notBefore|notAfter"
                ```

            2. Browser policies cap leaf cert validity at 398 days (13 months). Issue a new cert from a publicly trusted CA — for example, Let's Encrypt via Certbot's Nginx plugin:

                ```bash
                certbot --nginx -d yourdomain.com -d www.yourdomain.com
                ```

            3. If you manage cert files manually, point Nginx at the full chain:

                ```nginx
                ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
                ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
                ```

                ```bash
                nginx -t && systemctl reload nginx
                ```

            4. Re-run the verification command in step 1 — `Verify return code: 0 (ok)` confirms the new chain is trusted.
        - id: haproxy
          desc: |
            **Using HAProxy**

            1. Check the certificate's validity window and chain trust:

                ```bash
                openssl s_client -connect yourdomain.com:443 -showcerts </dev/null 2>&1 \
                  | grep -E "verify|depth|notBefore|notAfter"
                ```

            2. Browser policies cap leaf cert validity at 398 days (13 months). Issue a new cert from a publicly trusted CA — for example, Let's Encrypt:

                ```bash
                certbot certonly --standalone -d yourdomain.com -d www.yourdomain.com
                ```

            3. HAProxy needs the chain followed by the private key in a single PEM:

                ```bash
                cat /etc/letsencrypt/live/yourdomain.com/fullchain.pem \
                    /etc/letsencrypt/live/yourdomain.com/privkey.pem \
                    > /etc/haproxy/certs/yourdomain.com.pem
                chmod 0600 /etc/haproxy/certs/yourdomain.com.pem
                ```

                ```haproxy
                frontend https-in
                    bind *:443 ssl crt /etc/haproxy/certs/yourdomain.com.pem
                ```

                ```bash
                haproxy -c -f /etc/haproxy/haproxy.cfg
                systemctl reload haproxy
                ```

            4. Re-run the verification command in step 1 — `Verify return code: 0 (ok)` confirms the new chain is trusted.
    refs:
      - url: https://www.ssllabs.com/projects/best-practices/
        title: SSL/TLS Deployment Best Practices
  - uid: mondoo-tls-security-cert-no-cert-expired
    title: Certificate is not near expiration or expired
    impact: 95
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-17
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-17
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-15
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    mql: |
      tls.certificates.first.subject.commonName
      switch {
        case tls.certificates.first.expiresIn.days > 30: score(100);
        case tls.certificates.first.expiresIn.days > 21: score(50);
        case tls.certificates.first.expiresIn.days > 14: score(20);
        case tls.certificates.first.expiresIn.days > 7: score(9);
        default: score(0);
      }
    docs:
      desc: |
        This check ensures that the leaf certificate is configured with enough remaining validity that it is not at risk of expiring soon. Scoring degrades as the expiration date approaches so teams can act before an outage occurs.

        **Why this matters**

        - **Service outages:** Expired certificates cause immediate connection failures across all clients with no graceful degradation.
        - **Emergency renewals:** Last-minute replacements are error-prone and often happen during off-hours when the problem is finally noticed.
        - **Trust degradation:** Users who encounter certificate warnings lose confidence in the service's security practices.
        - **Attack window:** During the confusion of an expired certificate, users are more likely to bypass warnings or fall for phishing.

        **Risk mitigation**

        - **Monitor with lead time:** Configure expiration alerts at 30, 14, and 7 days before expiry so renewal happens on a planned schedule.
        - **Automate renewal:** Use tools such as cert-manager or Certbot to renew certificates without manual intervention.
      audit: |
        ### Audit via openssl

        Check how much validity remains on the leaf certificate with the OpenSSL client:

        ```bash
        openssl s_client -connect example.com:443 -servername example.com 2>/dev/null | openssl x509 -noout -enddate
        ```

        A passing result shows a notAfter date comfortably more than 30 days in the future, while a failing result shows a date that is near or already past.
      remediation:
        - id: apache
          desc: |
            **Using Apache**

            1. Check the certificate's expiration date:

                ```bash
                openssl s_client -connect yourdomain.com:443 </dev/null 2>/dev/null \
                  | openssl x509 -noout -enddate
                ```

            2. Renew now, then load the new cert. With Certbot's Apache plugin:

                ```bash
                certbot renew --deploy-hook "systemctl reload apache2"
                ```

                Or, after renewing manually, reload Apache so it picks up the new files:

                ```bash
                apachectl configtest
                systemctl reload apache2   # Debian/Ubuntu
                systemctl reload httpd     # RHEL/CentOS
                ```

            3. Make renewal automatic. Certbot ships a `certbot.timer` systemd unit that runs `certbot renew` twice daily; ensure it is enabled:

                ```bash
                systemctl enable --now certbot.timer
                systemctl list-timers certbot.timer
                ```

            4. Watch for expiry. Set up monitoring (Nagios/Zabbix/Prometheus blackbox exporter, or a cloud certificate manager) and alert at 30/14/7 days remaining.
        - id: nginx
          desc: |
            **Using Nginx**

            1. Check the certificate's expiration date:

                ```bash
                openssl s_client -connect yourdomain.com:443 </dev/null 2>/dev/null \
                  | openssl x509 -noout -enddate
                ```

            2. Renew now, then load the new cert. With Certbot's Nginx plugin:

                ```bash
                certbot renew --deploy-hook "systemctl reload nginx"
                ```

                Or, after renewing manually, reload Nginx so it picks up the new files:

                ```bash
                nginx -t && systemctl reload nginx
                ```

            3. Make renewal automatic. Certbot ships a `certbot.timer` systemd unit that runs `certbot renew` twice daily; ensure it is enabled:

                ```bash
                systemctl enable --now certbot.timer
                systemctl list-timers certbot.timer
                ```

            4. Watch for expiry. Set up monitoring (Nagios/Zabbix/Prometheus blackbox exporter, or a cloud certificate manager) and alert at 30/14/7 days remaining.
        - id: haproxy
          desc: |
            **Using HAProxy**

            1. Check the certificate's expiration date:

                ```bash
                openssl s_client -connect yourdomain.com:443 </dev/null 2>/dev/null \
                  | openssl x509 -noout -enddate
                ```

            2. Renew the leaf cert and rebuild HAProxy's combined PEM (chain + key). With Certbot in `--standalone` mode, use a deploy hook to recombine and reload:

                ```bash
                certbot renew --deploy-hook '/usr/local/sbin/haproxy-reload.sh'
                ```

                Where `/usr/local/sbin/haproxy-reload.sh` (chmod 0755) does:

                ```bash
                #!/bin/bash
                set -e
                cat /etc/letsencrypt/live/yourdomain.com/fullchain.pem \
                    /etc/letsencrypt/live/yourdomain.com/privkey.pem \
                    > /etc/haproxy/certs/yourdomain.com.pem
                chmod 0600 /etc/haproxy/certs/yourdomain.com.pem
                systemctl reload haproxy
                ```

            3. Make renewal automatic. Ensure Certbot's systemd timer is enabled so the deploy hook fires before expiry:

                ```bash
                systemctl enable --now certbot.timer
                ```

            4. Watch for expiry. Set up monitoring (Nagios/Zabbix/Prometheus blackbox exporter, or a cloud certificate manager) and alert at 30/14/7 days remaining.
    refs:
      - url: https://www.ssllabs.com/projects/best-practices/
        title: SSL/TLS Deployment Best Practices
  - uid: mondoo-tls-security-cert-no-certs-expired
    title: None of the certificates (intermediate or root) have expired
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-17
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-17
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-15
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    mql: |
      tls.certificates {
        subject.commonName
        expiresIn.days > 0
      }
    docs:
      desc: |
        This check ensures that every certificate in the trust chain, including intermediate and root certificates, is configured to remain within its validity period. An expired intermediate or root breaks verification for all services that rely on that chain.

        **Why this matters**

        - **Cascading failures:** A single expired intermediate can simultaneously affect every service that uses that trust chain.
        - **Silent trust failures:** Intermediate expiration may not trigger renewal automation, catching teams off-guard.
        - **Client verification failures:** Even a valid leaf certificate cannot be verified if an intermediate in its chain has expired.
        - **Delayed diagnosis:** Trust chain problems are harder to identify than a simple expired leaf certificate.

        **Risk mitigation**

        - **Audit the full chain:** Regularly review every certificate in the chain rather than monitoring only the leaf.
        - **Track cross-signed paths:** Account for cross-signing relationships between roots and intermediates so renewals cover every validation path.
      audit: |
        ### Audit via openssl

        Inspect every certificate the server presents in its chain with the OpenSSL client:

        ```bash
        openssl s_client -connect example.com:443 -servername example.com -showcerts 2>/dev/null | openssl crl2pkcs7 -nocrl -certfile /dev/stdin | openssl pkcs7 -print_certs -noout
        ```

        A passing result shows valid date ranges for the leaf and every intermediate and root certificate, while a failing result shows any certificate in the chain whose notAfter date has passed.
      remediation:
        - id: apache
          desc: |
            **Using Apache**

            1. List every certificate the server presents and find the expired ones:

                ```bash
                openssl s_client -connect yourdomain.com:443 -showcerts </dev/null 2>/dev/null \
                  | awk '/BEGIN CERT/,/END CERT/' \
                  | csplit --quiet --prefix=/tmp/cert- -z - '/BEGIN CERT/' '{*}'
                for f in /tmp/cert-*; do
                  openssl x509 -in "$f" -noout -subject -enddate
                done
                ```

            2. Pull current intermediates from your CA. For Let's Encrypt, run `certbot renew --force-renewal` to refresh `/etc/letsencrypt/live/yourdomain.com/fullchain.pem`.

            3. Refresh the OS trust store so Apache validates updated roots correctly:

                ```bash
                apt update && apt install --only-upgrade ca-certificates   # Debian/Ubuntu
                yum update ca-certificates                                  # RHEL/CentOS
                update-ca-certificates                                       # Debian/Ubuntu
                update-ca-trust                                              # RHEL/CentOS
                ```

            4. Point Apache at the refreshed chain (leaf first, then intermediates) and reload:

                ```apache
                SSLCertificateFile      /etc/letsencrypt/live/yourdomain.com/fullchain.pem
                SSLCertificateKeyFile   /etc/letsencrypt/live/yourdomain.com/privkey.pem
                ```

                ```bash
                apachectl configtest
                systemctl reload apache2   # Debian/Ubuntu
                systemctl reload httpd     # RHEL/CentOS
                ```

            5. Re-run the iteration in step 1 — every `notAfter` should now be in the future.
        - id: nginx
          desc: |
            **Using Nginx**

            1. List every certificate the server presents and find the expired ones:

                ```bash
                openssl s_client -connect yourdomain.com:443 -showcerts </dev/null 2>/dev/null \
                  | awk '/BEGIN CERT/,/END CERT/' \
                  | csplit --quiet --prefix=/tmp/cert- -z - '/BEGIN CERT/' '{*}'
                for f in /tmp/cert-*; do
                  openssl x509 -in "$f" -noout -subject -enddate
                done
                ```

            2. Pull current intermediates from your CA. For Let's Encrypt, run `certbot renew --force-renewal` to refresh `/etc/letsencrypt/live/yourdomain.com/fullchain.pem`.

            3. Refresh the OS trust store so Nginx validates updated roots correctly:

                ```bash
                apt update && apt install --only-upgrade ca-certificates   # Debian/Ubuntu
                yum update ca-certificates                                  # RHEL/CentOS
                update-ca-certificates                                       # Debian/Ubuntu
                update-ca-trust                                              # RHEL/CentOS
                ```

            4. Point Nginx at the refreshed chain (`ssl_certificate` MUST be the full chain — leaf + intermediates) and reload:

                ```nginx
                ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
                ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
                ```

                ```bash
                nginx -t && systemctl reload nginx
                ```

            5. Re-run the iteration in step 1 — every `notAfter` should now be in the future.
        - id: haproxy
          desc: |
            **Using HAProxy**

            1. List every certificate the server presents and find the expired ones:

                ```bash
                openssl s_client -connect yourdomain.com:443 -showcerts </dev/null 2>/dev/null \
                  | awk '/BEGIN CERT/,/END CERT/' \
                  | csplit --quiet --prefix=/tmp/cert- -z - '/BEGIN CERT/' '{*}'
                for f in /tmp/cert-*; do
                  openssl x509 -in "$f" -noout -subject -enddate
                done
                ```

            2. Pull current intermediates from your CA. For Let's Encrypt, run `certbot renew --force-renewal` to refresh `/etc/letsencrypt/live/yourdomain.com/fullchain.pem`.

            3. Refresh the OS trust store so HAProxy validates updated roots correctly:

                ```bash
                apt update && apt install --only-upgrade ca-certificates   # Debian/Ubuntu
                yum update ca-certificates                                  # RHEL/CentOS
                update-ca-certificates                                       # Debian/Ubuntu
                update-ca-trust                                              # RHEL/CentOS
                ```

            4. Rebuild HAProxy's combined PEM (chain + key) and reload:

                ```bash
                cat /etc/letsencrypt/live/yourdomain.com/fullchain.pem \
                    /etc/letsencrypt/live/yourdomain.com/privkey.pem \
                    > /etc/haproxy/certs/yourdomain.com.pem
                chmod 0600 /etc/haproxy/certs/yourdomain.com.pem
                haproxy -c -f /etc/haproxy/haproxy.cfg
                systemctl reload haproxy
                ```

            5. Re-run the iteration in step 1 — every `notAfter` should now be in the future.
