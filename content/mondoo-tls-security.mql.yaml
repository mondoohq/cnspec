    docs:
      desc: |
        This check ensures that the server is configured to offer only TLS 1.2 and TLS 1.3 and to disable SSL 2.0, SSL 3.0, TLS 1.0, and TLS 1.1. The older protocols carry cryptographic weaknesses that configuration alone cannot fix.

        **Why this matters**

        - **POODLE attack:** SSL 3.0 can be exploited through a padding oracle attack to decrypt sensitive data.
        - **BEAST attack:** The CBC implementation in TLS 1.0 allows chosen-plaintext attacks against session cookies.
        - **Downgrade attacks:** Attackers can force connections onto weaker protocols whenever those protocols remain enabled.
        - **Browser deprecation:** Major browsers have removed support for TLS 1.0 and TLS 1.1 entirely.

        **Risk mitigation**

        - **Enable only modern protocols:** Restrict the server to TLS 1.2 and TLS 1.3, which provide current cryptographic protections.
        - **Meet baseline standards:** Disabling legacy protocols satisfies the TLS 1.2 minimum required by PCI DSS and other frameworks.
      audit: |
        ### Audit via nmap

        Enumerate the protocol versions the server accepts:

        ```bash
        nmap --script ssl-enum-ciphers -p 443 example.com
        ```

        A passing result lists only TLSv1.2 and TLSv1.3 sections, while a failing result shows SSLv2, SSLv3, TLSv1.0, or TLSv1.1 sections in the output.

        ### Audit via openssl

        Test whether the server accepts a specific weak protocol version with the OpenSSL client:

        ```bash
        openssl s_client -connect example.com:443 -tls1_1
        ```

        A passing result is a failed handshake, while a failing result completes the handshake, which confirms TLS 1.1 is still accepted.
      remediation:
        - id: apache
          desc: |
            **Using Apache**

            1. Open your Apache SSL configuration file (typically `/etc/httpd/conf.d/ssl.conf` or `/etc/apache2/sites-available/default-ssl.conf`).

            2. Add or modify the `SSLProtocol` directive to disable weak protocols:

                ```apache
                SSLProtocol -all +TLSv1.2 +TLSv1.3
                ```

            3. Save the file and restart Apache:

                ```bash
                systemctl restart apache2   # Debian/Ubuntu
                systemctl restart httpd     # RHEL/CentOS
                ```

            4. Verify the configuration:

                ```bash
                openssl s_client -connect yourdomain.com:443 -tls1   # Should fail
                openssl s_client -connect yourdomain.com:443 -tls1_2 # Should succeed
                ```
        - id: nginx
          desc: |
            **Using Nginx**

            1. Open your Nginx configuration file (typically `/etc/nginx/nginx.conf` or a site-specific file under `/etc/nginx/sites-available/`).

            2. Inside the `server` block (or `http` block for global settings), add or modify:

                ```nginx
                ssl_protocols TLSv1.2 TLSv1.3;
                ```

            3. Save the file and reload Nginx:

                ```bash
                nginx -t && systemctl reload nginx
                ```

            4. Verify the configuration:

                ```bash
                openssl s_client -connect yourdomain.com:443 -tls1   # Should fail
                openssl s_client -connect yourdomain.com:443 -tls1_2 # Should succeed
                ```
        - id: haproxy
          desc: |
            **Using HAProxy**

            1. Open your HAProxy configuration file (typically `/etc/haproxy/haproxy.cfg`).

            2. In the `global` section or your `bind` lines, add:

                ```haproxy
                ssl-default-bind-options ssl-min-ver TLSv1.2
                ```

                Or for specific frontends:

                ```haproxy
                bind *:443 ssl crt /path/to/cert.pem ssl-min-ver TLSv1.2
                ```

            3. Save the file and restart HAProxy:

                ```bash
                systemctl restart haproxy
                ```
        - id: aws-alb
          desc: |
            **Using AWS Application Load Balancer**

            1. Open the AWS Management Console and navigate to EC2 > Load Balancers.

            2. Select your Application Load Balancer and go to the Listeners tab.

            3. Edit the HTTPS listener and change the Security Policy to `ELBSecurityPolicy-TLS13-1-2-2021-06` or a newer policy that only supports TLS 1.2 and TLS 1.3.

            4. Save the changes. The update takes effect immediately without requiring a restart.

            **Using AWS CLI:**

            ```bash
            aws elbv2 modify-listener --listener-arn <listener-arn> \
              --ssl-policy ELBSecurityPolicy-TLS13-1-2-2021-06
            ```
        - id: iis
          desc: |
            **Using IIS (Windows Server)**

            **Option 1: Using IIS Crypto (Recommended)**

            1. Download and run IIS Crypto from Nartac Software (https://www.nartac.com/Products/IISCrypto).

            2. Click "Best Practices" or manually uncheck SSL 2.0, SSL 3.0, TLS 1.0, and TLS 1.1.

            3. Ensure TLS 1.2 and TLS 1.3 are checked.

            4. Click "Apply" and reboot the server.

            **Option 2: Manual Registry Configuration**

            1. Open Registry Editor (`regedit.exe`) as Administrator.

            2. Navigate to `HKLM\SYSTEM\CurrentControlSet\Control\SecurityProviders\SCHANNEL\Protocols\`.

            3. For each protocol to disable (SSL 2.0, SSL 3.0, TLS 1.0, TLS 1.1), create the following structure:

                ```text
                [Protocol Name]\Server\Enabled = 0 (DWORD)
                [Protocol Name]\Server\DisabledByDefault = 1 (DWORD)
                [Protocol Name]\Client\Enabled = 0 (DWORD)
                [Protocol Name]\Client\DisabledByDefault = 1 (DWORD)
                ```

            4. Restart the server:

                ```powershell
                Restart-Computer
                ```
    refs:
      - url: https://datatracker.ietf.org/doc/html/rfc8446
        title: TLS 1.3 RFC 8446
      - url: https://www.ssllabs.com/projects/best-practices/
        title: SSL/TLS Deployment Best Practices
  - uid: mondoo-tls-security-no-rc4-ciphers
    title: Avoid RC4 ciphers
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-2-ii-transmission-security-encryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-13
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-1
    mql: |
      tls.cipherSuites.none(encryption == /rc4/i)
    docs:
      desc: |
        This check ensures that the server is configured to reject all RC4 cipher suites. RC4 has known cryptographic flaws that allow practical recovery of plaintext from encrypted traffic.

        **Why this matters**

        - **Statistical biases:** The RC4 keystream has detectable biases that permit plaintext recovery once enough traffic is captured.
        - **Bar Mitzvah attack:** Weak keys in RC4 produce exploitable patterns in the first bytes of ciphertext.
        - **RFC 7465 prohibition:** The IETF has officially prohibited RC4 in all TLS versions because of these weaknesses.
        - **Browser removal:** All major browsers have removed RC4 support, so leaving it enabled serves no legitimate clients.

        **Risk mitigation**

        - **Remove RC4 suites:** Drop every RC4 cipher suite from the server's allowed cipher list.
        - **Use modern AEAD ciphers:** Replace RC4 with AES-GCM or ChaCha20-Poly1305, which have no known practical attacks.
      audit: |
        ### Audit via nmap

        Enumerate the cipher suites the server offers:

        ```bash
        nmap --script ssl-enum-ciphers -p 443 example.com
        ```

        A passing result shows no cipher names containing RC4, while a failing result lists one or more RC4 cipher suites, often flagged with a low letter grade.
      remediation:
        - id: apache
          desc: |
            **Using Apache**

            1. Open your Apache SSL configuration file (typically `/etc/httpd/conf.d/ssl.conf` or `/etc/apache2/sites-available/default-ssl.conf`).

            2. Set a cipher suite that excludes RC4:

                ```apache
                SSLCipherSuite ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:!RC4
                SSLHonorCipherOrder on
                ```

            3. Save the file and restart Apache:

                ```bash
                systemctl restart apache2   # Debian/Ubuntu
                systemctl restart httpd     # RHEL/CentOS
                ```

            4. Verify RC4 is disabled:

                ```bash
                nmap --script ssl-enum-ciphers -p 443 yourdomain.com | grep -i rc4
                ```

                This should return no results.
        - id: nginx
          desc: |
            **Using Nginx**

            1. Open your Nginx configuration file (typically `/etc/nginx/nginx.conf` or a site-specific file).

            2. Set a cipher suite that excludes RC4:

                ```nginx
                ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:!RC4';
                ssl_prefer_server_ciphers on;
                ```

            3. Save the file and reload Nginx:

                ```bash
                nginx -t && systemctl reload nginx
                ```

            4. Verify RC4 is disabled:

                ```bash
                nmap --script ssl-enum-ciphers -p 443 yourdomain.com | grep -i rc4
                ```
        - id: haproxy
          desc: |
            **Using HAProxy**

            1. Open your HAProxy configuration file (typically `/etc/haproxy/haproxy.cfg`).

            2. Set a cipher suite that excludes RC4:

                ```haproxy
                ssl-default-bind-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:!RC4
                ```

            3. Save the file and restart HAProxy:

                ```bash
                systemctl restart haproxy
                ```

            4. Verify RC4 is disabled:

                ```bash
                nmap --script ssl-enum-ciphers -p 443 yourdomain.com | grep -i rc4
                ```
    refs:
      - url: https://www.ssllabs.com/projects/best-practices/
        title: SSL/TLS Deployment Best Practices
  - uid: mondoo-tls-security-no-null-cipher-suites
    title: Avoid NULL cipher suites
    impact: 100
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-2-ii-transmission-security-encryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    mql: |
      tls.cipherSuites.none(nullCipher)
    docs:
      desc: |
        This check ensures that the server is configured to reject all NULL cipher suites. NULL ciphers transmit data with no encryption at all despite negotiating a TLS session.

        **Why this matters**

        - **No confidentiality:** All data travels in cleartext and is fully visible to anyone monitoring the network.
        - **False security:** Applications believe they hold a secure TLS connection while the data is actually unprotected.
        - **Credential exposure:** Passwords, session tokens, and other sensitive data are transmitted without any encryption.
        - **Downgrade attacks:** Attackers may try to negotiate a NULL cipher whenever one remains enabled.

        **Risk mitigation**

        - **Disable NULL ciphers explicitly:** Exclude the aNULL and eNULL cipher groups from the server's cipher configuration.
        - **Require encrypting ciphers:** Allow only cipher suites that provide genuine confidentiality, such as AES-GCM or ChaCha20-Poly1305.
      audit: |
        ### Audit via nmap

        Enumerate the cipher suites the server offers:

        ```bash
        nmap --script ssl-enum-ciphers -p 443 example.com
        ```

        A passing result shows only cipher suites that provide encryption, while a failing result lists cipher names containing NULL, which indicates unencrypted suites are accepted.
      remediation:
        - id: apache
          desc: |
            **Using Apache**

            1. Open your Apache SSL configuration file (typically `/etc/httpd/conf.d/ssl.conf` or `/etc/apache2/sites-available/default-ssl.conf`).

            2. Add `!NULL`, `!aNULL`, and `!eNULL` to exclude NULL cipher suites:

                ```apache
                SSLCipherSuite ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:!NULL:!aNULL:!eNULL
                SSLHonorCipherOrder on
                ```

                These directives exclude:
                - `!NULL`: Cipher suites offering no encryption
                - `!aNULL`: Cipher suites offering no authentication
                - `!eNULL`: Cipher suites with NULL encryption

            3. Save the file and restart Apache:

                ```bash
                systemctl restart apache2   # Debian/Ubuntu
                systemctl restart httpd     # RHEL/CentOS
                ```

            4. Verify NULL ciphers are disabled:

                ```bash
                nmap --script ssl-enum-ciphers -p 443 yourdomain.com | grep -i null
                ```
        - id: nginx
          desc: |
            **Using Nginx**

            1. Open your Nginx configuration file (typically `/etc/nginx/nginx.conf` or a site-specific file).

            2. Add `!NULL`, `!aNULL`, and `!eNULL` to exclude NULL cipher suites:

                ```nginx
                ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:!NULL:!aNULL:!eNULL';
                ssl_prefer_server_ciphers on;
                ```

            3. Save the file and reload Nginx:

                ```bash
                nginx -t && systemctl reload nginx
                ```

            4. Verify NULL ciphers are disabled:

                ```bash
                nmap --script ssl-enum-ciphers -p 443 yourdomain.com | grep -i null
                ```
        - id: haproxy
          desc: |
            **Using HAProxy**

            1. Open your HAProxy configuration file (typically `/etc/haproxy/haproxy.cfg`).

            2. Add `!NULL`, `!aNULL`, and `!eNULL` to exclude NULL cipher suites:

                ```haproxy
                ssl-default-bind-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:!NULL:!aNULL:!eNULL
                ```

            3. Save the file and restart HAProxy:

                ```bash
                systemctl restart haproxy
                ```

            4. Verify NULL ciphers are disabled:

                ```bash
                nmap --script ssl-enum-ciphers -p 443 yourdomain.com | grep -i null
                ```
    refs:
      - url: https://www.ssllabs.com/projects/best-practices/
        title: SSL/TLS Deployment Best Practices
  - uid: mondoo-tls-security-no-export-cipher-suites
    title: Avoid export cipher suites
    impact: 95
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-2-ii-transmission-security-encryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-13
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-1
    mql: |
      tls.cipherSuites.none(export)
    docs:
      desc: |
        This check ensures that the server is configured to reject all export-grade cipher suites. Export ciphers were deliberately weakened to satisfy 1990s-era US export rules and provide almost no real security.

        **Why this matters**

        - **Tiny key sizes:** Export ciphers use 40-bit or 56-bit keys that modern hardware can brute-force in minutes to hours.
        - **FREAK attack:** Attackers can force a server to use an export-grade RSA key, which enables decryption of captured traffic.
        - **Logjam attack:** Export-grade Diffie-Hellman parameters allow a downgrade attack against connections that should be secure.
        - **Active exploitation:** These attacks are practical and have been demonstrated against real-world servers.

        **Risk mitigation**

        - **Remove export suites:** Drop every export-grade cipher suite from the server's allowed cipher list.
        - **Require adequate key sizes:** Allow only ciphers with 128-bit keys or stronger so brute-force attacks are infeasible.
      audit: |
        ### Audit via nmap

        Enumerate the cipher suites the server offers:

        ```bash
        nmap --script ssl-enum-ciphers -p 443 example.com
        ```

        A passing result shows no cipher names containing EXPORT, while a failing result lists export-grade cipher suites, typically flagged with a failing letter grade.
      remediation:
        - id: apache
          desc: |
            **Using Apache**

            1. Open your Apache SSL configuration file (typically `/etc/httpd/conf.d/ssl.conf` or `/etc/apache2/sites-available/default-ssl.conf`).

            2. Add `!EXPORT` to exclude export cipher suites:

                ```apache
                SSLCipherSuite ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:!EXPORT:!EXPORT40:!EXPORT56
                SSLHonorCipherOrder on
                ```

                Export cipher suites use intentionally weak 40-bit or 56-bit keys and are vulnerable to attacks like FREAK and Logjam.

            3. Save the file and restart Apache:

                ```bash
                systemctl restart apache2   # Debian/Ubuntu
                systemctl restart httpd     # RHEL/CentOS
                ```

            4. Verify export ciphers are disabled:

                ```bash
                nmap --script ssl-enum-ciphers -p 443 yourdomain.com | grep -i export
                ```
        - id: nginx
          desc: |
            **Using Nginx**

            1. Open your Nginx configuration file (typically `/etc/nginx/nginx.conf` or a site-specific file).

            2. Add `!EXPORT` to exclude export cipher suites:

                ```nginx
                ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:!EXPORT';
                ssl_prefer_server_ciphers on;
                ```

            3. Save the file and reload Nginx:

                ```bash
                nginx -t && systemctl reload nginx
                ```

            4. Verify export ciphers are disabled:

                ```bash
                nmap --script ssl-enum-ciphers -p 443 yourdomain.com | grep -i export
                ```
        - id: haproxy
          desc: |
            **Using HAProxy**

            1. Open your HAProxy configuration file (typically `/etc/haproxy/haproxy.cfg`).

            2. Add `!EXPORT` to exclude export cipher suites:

                ```haproxy
                ssl-default-bind-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:!EXPORT
                ```

            3. Save the file and restart HAProxy:

                ```bash
                systemctl restart haproxy
                ```

            4. Verify export ciphers are disabled:

                ```bash
                nmap --script ssl-enum-ciphers -p 443 yourdomain.com | grep -i export
                ```
    refs:
      - url: https://www.ssllabs.com/projects/best-practices/
        title: SSL/TLS Deployment Best Practices
  - uid: mondoo-tls-security-no-diffie-hellman-cipher-suites
    title: Avoid anonymous Diffie-Hellman suites
    impact: 95
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-2-ii-transmission-security-encryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-1
    mql: |
      tls.cipherSuites.none(anonymous)
    docs:
      desc: |
        This check ensures that the server is configured to reject all anonymous Diffie-Hellman cipher suites. Anonymous Diffie-Hellman performs key exchange without authenticating the server, which makes interception straightforward.

        **Why this matters**

        - **No authentication:** The server cannot prove its identity, so any attacker can intercept and relay traffic.
        - **Trivial man-in-the-middle:** Unlike attacks that require forging a certificate, anonymous Diffie-Hellman makes interception simple.
        - **Full traffic visibility:** An attacker can decrypt, inspect, and modify all traffic in both directions.
        - **Certificate bypass:** Skipping authentication circumvents the entire PKI trust model.

        **Risk mitigation**

        - **Disable anonymous suites:** Remove all ADH cipher suites from the server's cipher configuration.
        - **Require authenticated key exchange:** Allow only mechanisms such as ECDHE that pair key exchange with certificate verification.
      audit: |
        ### Audit via nmap

        Enumerate the cipher suites the server offers:

        ```bash
        nmap --script ssl-enum-ciphers -p 443 example.com
        ```

        A passing result shows no anonymous cipher names containing DH_anon or ADH, while a failing result lists anonymous Diffie-Hellman suites, which indicates unauthenticated key exchange is accepted.
      remediation:
        - id: apache
          desc: |
            **Using Apache**

            1. Open your Apache SSL configuration file (typically `/etc/httpd/conf.d/ssl.conf` or `/etc/apache2/sites-available/default-ssl.conf`).

            2. Add `!ADH` and `!aNULL` to exclude anonymous Diffie-Hellman cipher suites:

                ```apache
                SSLCipherSuite ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:!ADH:!aNULL
                SSLHonorCipherOrder on
                ```

                Anonymous Diffie-Hellman (ADH) performs key exchange without server authentication, making it vulnerable to man-in-the-middle attacks.

            3. Save the file and restart Apache:

                ```bash
                systemctl restart apache2   # Debian/Ubuntu
                systemctl restart httpd     # RHEL/CentOS
                ```

            4. Verify anonymous DH ciphers are disabled:

                ```bash
                nmap --script ssl-enum-ciphers -p 443 yourdomain.com | grep -iE "anon|ADH"
                ```
        - id: nginx
          desc: |
            **Using Nginx**

            1. Open your Nginx configuration file (typically `/etc/nginx/nginx.conf` or a site-specific file).

            2. Add `!ADH` and `!aNULL` to exclude anonymous Diffie-Hellman cipher suites:

                ```nginx
                ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:!ADH:!aNULL';
                ssl_prefer_server_ciphers on;
                ```

            3. Save the file and reload Nginx:

                ```bash
                nginx -t && systemctl reload nginx
                ```

            4. Verify anonymous DH ciphers are disabled:

                ```bash
                nmap --script ssl-enum-ciphers -p 443 yourdomain.com | grep -iE "anon|ADH"
                ```
        - id: haproxy
          desc: |
            **Using HAProxy**

            1. Open your HAProxy configuration file (typically `/etc/haproxy/haproxy.cfg`).

            2. Add `!ADH` and `!aNULL` to exclude anonymous Diffie-Hellman cipher suites:

                ```haproxy
                ssl-default-bind-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:!ADH:!aNULL
                ```

            3. Save the file and restart HAProxy:

                ```bash
                systemctl restart haproxy
                ```

            4. Verify anonymous DH ciphers are disabled:

                ```bash
                nmap --script ssl-enum-ciphers -p 443 yourdomain.com | grep -iE "anon|ADH"
                ```
    refs:
      - url: https://www.ssllabs.com/projects/best-practices/
        title: SSL/TLS Deployment Best Practices
  - uid: mondoo-tls-security-no-weak-block-ciphers
    title: Avoid weak block ciphers
    impact: 85
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-2-ii-transmission-security-encryption
