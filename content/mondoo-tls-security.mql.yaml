  - uid: mondoo-tls-security-cert-not-self-signed
    title: Do not use a self-signed certificate
    impact: 85
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-17
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-15
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    mql: |
      tls.certificates.last.isCA
    docs:
      desc: |
        This check ensures that the certificate chain is configured to terminate at a trusted Certificate Authority root rather than at a self-signed certificate. Self-signed certificates bypass the third-party trust model that TLS authentication relies on.

        **Why this matters**

        - **No third-party verification:** Self-signed certificates provide no external validation of server identity, which enables impersonation attacks.
        - **User warning fatigue:** Clients display warnings that users must bypass, training them to ignore legitimate security alerts.
        - **Integration failures:** APIs, automated systems, and mobile apps reject self-signed certificates without a manual override.
        - **Man-in-the-middle vulnerability:** An attacker can present another self-signed certificate that users may accept as normal.

        **Risk mitigation**

        - **Use a recognized CA:** Obtain certificates from a publicly trusted Certificate Authority so clients can verify server identity automatically.
        - **Adopt automated issuance:** Free options such as Let's Encrypt provide trusted certificates with automated renewal at no cost.
      audit: |
        ### Audit via openssl

        Inspect the issuer and subject of the certificate the server presents with the OpenSSL client:

        ```bash
        openssl s_client -connect example.com:443 -servername example.com -showcerts 2>/dev/null | openssl x509 -noout -issuer -subject
        ```

        A passing result shows an issuer that differs from the subject and resolves to a recognized Certificate Authority, while a failing result shows an issuer identical to the subject, which indicates a self-signed certificate.
      remediation:
        - id: apache
          desc: |
            **Using Apache**

            1. Replace the self-signed cert with one from a publicly trusted CA. The simplest path is Let's Encrypt via Certbot's Apache plugin:

                ```bash
                apt install certbot python3-certbot-apache       # Debian/Ubuntu
                yum install certbot python3-certbot-apache       # RHEL/CentOS
                certbot --apache -d yourdomain.com -d www.yourdomain.com
                ```

            2. For a commercial CA (DigiCert, Sectigo, GlobalSign, …), generate a CSR and submit it through their portal:

                ```bash
                openssl req -new -newkey rsa:2048 -nodes \
                  -keyout /etc/ssl/private/yourdomain.com.key \
                  -out    /etc/ssl/yourdomain.com.csr \
                  -subj   "/CN=yourdomain.com"
                ```

            3. Once issued, point Apache at the new chain (leaf + intermediates):

                ```apache
                SSLCertificateFile      /etc/ssl/certs/yourdomain.com.fullchain.pem
                SSLCertificateKeyFile   /etc/ssl/private/yourdomain.com.key
                ```

                ```bash
                apachectl configtest
                systemctl reload apache2   # Debian/Ubuntu
                systemctl reload httpd     # RHEL/CentOS
                ```

            4. Confirm the new cert is publicly trusted:

                ```bash
                openssl s_client -connect yourdomain.com:443 </dev/null 2>&1 | grep "Verify return code"
                ```

                A return code of `0 (ok)` confirms the cert chains to a trusted root.
        - id: nginx
          desc: |
            **Using Nginx**

            1. Replace the self-signed cert with one from a publicly trusted CA. The simplest path is Let's Encrypt via Certbot's Nginx plugin:

                ```bash
                apt install certbot python3-certbot-nginx        # Debian/Ubuntu
                yum install certbot python3-certbot-nginx        # RHEL/CentOS
                certbot --nginx -d yourdomain.com -d www.yourdomain.com
                ```

            2. For a commercial CA, generate a CSR and submit it through their portal:

                ```bash
                openssl req -new -newkey rsa:2048 -nodes \
                  -keyout /etc/ssl/private/yourdomain.com.key \
                  -out    /etc/ssl/yourdomain.com.csr \
                  -subj   "/CN=yourdomain.com"
                ```

            3. Once issued, point Nginx at the new full chain:

                ```nginx
                ssl_certificate     /etc/ssl/certs/yourdomain.com.fullchain.pem;
                ssl_certificate_key /etc/ssl/private/yourdomain.com.key;
                ```

                ```bash
                nginx -t && systemctl reload nginx
                ```

            4. Confirm the new cert is publicly trusted:

                ```bash
                openssl s_client -connect yourdomain.com:443 </dev/null 2>&1 | grep "Verify return code"
                ```

                A return code of `0 (ok)` confirms the cert chains to a trusted root.
        - id: haproxy
          desc: |
            **Using HAProxy**

            1. Replace the self-signed cert with one from a publicly trusted CA. The simplest path is Let's Encrypt in standalone mode:

                ```bash
                apt install certbot                              # Debian/Ubuntu
                yum install certbot                              # RHEL/CentOS
                certbot certonly --standalone -d yourdomain.com -d www.yourdomain.com
                ```

            2. For a commercial CA, generate a CSR and submit it through their portal:

                ```bash
                openssl req -new -newkey rsa:2048 -nodes \
                  -keyout /etc/ssl/private/yourdomain.com.key \
                  -out    /etc/ssl/yourdomain.com.csr \
                  -subj   "/CN=yourdomain.com"
                ```

            3. HAProxy expects a single PEM file with the full chain followed by the private key:

                ```bash
                cat /etc/letsencrypt/live/yourdomain.com/fullchain.pem \
                    /etc/letsencrypt/live/yourdomain.com/privkey.pem \
                    > /etc/haproxy/certs/yourdomain.com.pem
                chmod 0600 /etc/haproxy/certs/yourdomain.com.pem
                ```

                ```haproxy
                frontend https-in
                    bind *:443 ssl crt /etc/haproxy/certs/yourdomain.com.pem
                ```

                ```bash
                haproxy -c -f /etc/haproxy/haproxy.cfg
                systemctl reload haproxy
                ```

            4. Confirm the new cert is publicly trusted:

                ```bash
                openssl s_client -connect yourdomain.com:443 </dev/null 2>&1 | grep "Verify return code"
                ```

                A return code of `0 (ok)` confirms the cert chains to a trusted root.
