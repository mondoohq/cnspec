  - uid: mondoo-tls-security-cert-no-weak-signature
    title: Do not use weak certificate signatures
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-13
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-15
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-1
    mql: |
      tls.certificates {
        subject.commonName
        signingAlgorithm != /md2|md5|sha1/i
      }
    docs:
      desc: |
        This check ensures that every certificate in the chain is configured to use a strong signature algorithm and not MD2, MD5, or SHA-1. Weak signature algorithms can be exploited to forge certificates that appear legitimately signed.

        **Why this matters**

        - **Certificate forgery:** MD5 and SHA-1 collision attacks allow creation of fraudulent certificates that pass signature verification.
        - **Historical attacks:** The Flame malware used MD5 weaknesses to forge Windows Update certificates in a real-world attack.
        - **Browser deprecation:** Major browsers reject certificates signed with SHA-1 and weaker algorithms.
        - **Future vulnerability:** As computing power grows, even SHA-1 becomes more exposed to practical collision attacks.

        **Risk mitigation**

        - **Require SHA-256 or stronger:** Issue and reissue all certificates with SHA-256, SHA-384, or SHA-512 signature algorithms.
        - **Verify the whole chain:** Confirm that intermediate and root certificates also use strong signatures, not just the leaf.
      audit: |
        ### Audit via openssl

        Inspect the signature algorithm of each certificate the server presents with the OpenSSL client:

        ```bash
        openssl s_client -connect example.com:443 -servername example.com -showcerts 2>/dev/null | openssl x509 -noout -text | grep "Signature Algorithm"
        ```

        A passing result shows SHA-256 or stronger for every certificate, while a failing result shows md2, md5, or sha1 in any signature algorithm field.
      remediation:
        - id: apache
          desc: |
            **Using Apache**

            1. Check the signature algorithm on every cert in the served chain:

                ```bash
                openssl s_client -connect yourdomain.com:443 -showcerts </dev/null 2>/dev/null \
                  | openssl crl2pkcs7 -nocrl -certfile /dev/stdin \
                  | openssl pkcs7 -print_certs -text -noout \
                  | grep "Signature Algorithm"
                ```

                Anything containing `md2`, `md5`, or `sha1` must be replaced with SHA-256 (or SHA-384/SHA-512).

            2. Generate a new private key and CSR with a strong signature algorithm:

                ```bash
                openssl req -new -newkey rsa:2048 -sha256 -nodes \
                  -keyout /etc/ssl/private/yourdomain.com.key \
                  -out    /etc/ssl/yourdomain.com.csr \
                  -subj   "/CN=yourdomain.com"
                ```

                Or, simpler with Let's Encrypt (always SHA-256):

                ```bash
                certbot --apache -d yourdomain.com -d www.yourdomain.com
                ```

            3. If a chain intermediate uses a weak signature, ask the CA for updated intermediates and refresh the bundle. Then point Apache at the new chain and reload:

                ```apache
                SSLCertificateFile      /etc/ssl/certs/yourdomain.com.fullchain.pem
                SSLCertificateKeyFile   /etc/ssl/private/yourdomain.com.key
                ```

                ```bash
                apachectl configtest
                systemctl reload apache2   # Debian/Ubuntu
                systemctl reload httpd     # RHEL/CentOS
                ```

            4. Re-run the iteration in step 1 — every entry should be SHA-256 or stronger.
        - id: nginx
          desc: |
            **Using Nginx**

            1. Check the signature algorithm on every cert in the served chain:

                ```bash
                openssl s_client -connect yourdomain.com:443 -showcerts </dev/null 2>/dev/null \
                  | openssl crl2pkcs7 -nocrl -certfile /dev/stdin \
                  | openssl pkcs7 -print_certs -text -noout \
                  | grep "Signature Algorithm"
                ```

                Anything containing `md2`, `md5`, or `sha1` must be replaced with SHA-256 (or SHA-384/SHA-512).

            2. Generate a new private key and CSR with a strong signature algorithm:

                ```bash
                openssl req -new -newkey rsa:2048 -sha256 -nodes \
                  -keyout /etc/ssl/private/yourdomain.com.key \
                  -out    /etc/ssl/yourdomain.com.csr \
                  -subj   "/CN=yourdomain.com"
                ```

                Or, simpler with Let's Encrypt (always SHA-256):

                ```bash
                certbot --nginx -d yourdomain.com -d www.yourdomain.com
                ```

            3. If a chain intermediate uses a weak signature, ask the CA for updated intermediates and refresh the bundle. Then point Nginx at the new chain and reload:

                ```nginx
                ssl_certificate     /etc/ssl/certs/yourdomain.com.fullchain.pem;
                ssl_certificate_key /etc/ssl/private/yourdomain.com.key;
                ```

                ```bash
                nginx -t && systemctl reload nginx
                ```

            4. Re-run the iteration in step 1 — every entry should be SHA-256 or stronger.
        - id: haproxy
          desc: |
            **Using HAProxy**

            1. Check the signature algorithm on every cert in the served chain:

                ```bash
                openssl s_client -connect yourdomain.com:443 -showcerts </dev/null 2>/dev/null \
                  | openssl crl2pkcs7 -nocrl -certfile /dev/stdin \
                  | openssl pkcs7 -print_certs -text -noout \
                  | grep "Signature Algorithm"
                ```

                Anything containing `md2`, `md5`, or `sha1` must be replaced with SHA-256 (or SHA-384/SHA-512).

            2. Generate a new private key and CSR with a strong signature algorithm, or use Let's Encrypt in standalone mode:

                ```bash
                openssl req -new -newkey rsa:2048 -sha256 -nodes \
                  -keyout /etc/ssl/private/yourdomain.com.key \
                  -out    /etc/ssl/yourdomain.com.csr \
                  -subj   "/CN=yourdomain.com"
                # or:
                certbot certonly --standalone -d yourdomain.com -d www.yourdomain.com
                ```

            3. If a chain intermediate uses a weak signature, ask the CA for updated intermediates and refresh the bundle. Rebuild HAProxy's combined PEM (chain + key) and reload:

                ```bash
                cat /etc/letsencrypt/live/yourdomain.com/fullchain.pem \
                    /etc/letsencrypt/live/yourdomain.com/privkey.pem \
                    > /etc/haproxy/certs/yourdomain.com.pem
                chmod 0600 /etc/haproxy/certs/yourdomain.com.pem
                haproxy -c -f /etc/haproxy/haproxy.cfg
                systemctl reload haproxy
                ```

            4. Re-run the iteration in step 1 — every entry should be SHA-256 or stronger.
