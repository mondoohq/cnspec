  # ─── Switch Security ─────────────────────────────────────────────────────────
  # No Terraform variants: the runtime check inspects the site-wide global-switch DHCP
  # snooping toggle (`siteSettings.globalSwitch.dhcpSnoop`), which is a controller-level
  # setting. The ubiquiti-community/unifi provider has no site-wide switch-globals
  # resource; it exposes only per-network `dhcp_guarding.enabled` (a different feature
  # that's set per individual network). Asserting the per-network attribute would catch a
  # different misconfiguration than the runtime check, so this stays runtime-only.
  - uid: mondoo-unifi-security-dhcp-snooping-enabled
    title: Ensure DHCP snooping is enabled
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-6
    mql: |
      unifi.siteSettings.globalSwitch.dhcpSnoop == true
    docs:
      desc: |
        This check ensures that DHCP snooping is enabled on UniFi switches to prevent rogue DHCP server attacks.

        **Why this matters**

        Without DHCP snooping, any device on the network can act as a DHCP server:
          - Rogue DHCP servers can assign malicious DNS servers and default gateways to clients.
          - Attackers can intercept all network traffic by becoming the default gateway via DHCP.
          - DHCP starvation attacks can exhaust the legitimate DHCP pool.

        DHCP snooping validates DHCP messages and builds a binding table that:
          - Only allows DHCP responses from trusted ports.
          - Prevents rogue DHCP servers from operating on the network.
          - Provides a foundation for dynamic ARP inspection and IP source guard.
      audit: |
        To verify DHCP snooping using the UniFi Network web application:

        1. Sign in to the UniFi Network web application.
        2. Go to **Settings > Networks > Global Switch Settings**.
        3. Review the **DHCP Snooping** setting.

        If **DHCP Snooping** is enabled, the check passes. If it is disabled, the check fails.
      remediation:
        - id: console
          desc: |
            To enable DHCP snooping using the UniFi Network web application:

            1. Go to **Settings > Networks > Global Switch Settings**.
            2. Enable **DHCP Snooping**.
        # No cli remediation: global switch settings are controller-managed; the device SSH CLI cannot change them and the controller overwrites local changes on provision.
    refs:
      - url: https://help.ui.com/hc/en-us/articles/360042281174
        title: UniFi switch configuration

  - uid: mondoo-unifi-security-stp-enabled
    title: Ensure Spanning Tree Protocol is using RSTP
    impact: 50
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-6
    variants:
      - uid: mondoo-unifi-security-stp-enabled-unifi
        tags:
          mondoo.com/filter-title: UniFi Controller
          mondoo.com/filter-icon: unifi
      - uid: mondoo-unifi-security-stp-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-unifi-security-stp-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-unifi-security-stp-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Rapid Spanning Tree Protocol (RSTP) is enabled on UniFi switches.

        **Why this matters**

        Spanning Tree Protocol prevents network loops that can cause broadcast storms and network outages:
          - Network loops can bring down an entire network segment within seconds.
          - RSTP provides faster convergence than legacy STP, reducing downtime during topology changes.
          - Without STP, connecting a cable between two switch ports can cause a catastrophic broadcast storm.

        RSTP provides:
          - Loop prevention with rapid convergence (seconds vs. 30-50 seconds for legacy STP).
          - Backward compatibility with legacy STP devices.
          - Protection against accidental or malicious loop creation.
      audit: |
        To verify the Spanning Tree Protocol version using the UniFi Network web application:

        1. Sign in to the UniFi Network web application.
        2. Go to **Settings > Networks > Global Switch Settings**.
        3. Review the **STP Version** setting.

        If **STP Version** is set to **RSTP**, the check passes. If it is set to legacy **STP** or disabled, the check fails.
      remediation:
        - id: console
          desc: |
            To set the Spanning Tree Protocol version to RSTP using the UniFi Network web application:

            1. Go to **Settings > Networks > Global Switch Settings**.
            2. Set **STP Version** to **RSTP**.
        # No cli remediation: global switch settings are controller-managed; the device SSH CLI cannot change them and the controller overwrites local changes on provision.
        - id: terraform
          desc: |
            To set the STP version to RSTP in Terraform, set `stp_version = "rstp"` on each `unifi_device` resource managing a switch. Note that the runtime check inspects the site-wide global switch STP version via `unifi.siteSettings.globalSwitch.stpVersion`; the ubiquiti-community/unifi provider only exposes STP per-device, so the variant scope is each declared switch device rather than the site default:

            ```hcl
            resource "unifi_device" "switch" {
              mac          = "aa:bb:cc:dd:ee:ff"
              stp_version  = "rstp"
              stp_priority = 32768
            }
            ```
    refs:
      - url: https://help.ui.com/hc/en-us/articles/360042281174
        title: UniFi switch configuration

  - uid: mondoo-unifi-security-stp-enabled-unifi
    filters: asset.platform == "unifi"
    mql: |
      unifi.siteSettings.globalSwitch.stpVersion == "rstp"
  - uid: mondoo-unifi-security-stp-enabled-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "unifi_device")
    mql: |
      terraform.resources("unifi_device").where(arguments["stp_version"] != empty).all(arguments["stp_version"] == "rstp")
  - uid: mondoo-unifi-security-stp-enabled-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "unifi_device")
    mql: |
      terraform.plan.resourceChanges.where(type == "unifi_device" && change.after.stp_version != empty).all(change.after.stp_version == "rstp")
  - uid: mondoo-unifi-security-stp-enabled-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "unifi_device")
    mql: |
      terraform.state.resources.where(type == "unifi_device" && values.stp_version != empty).all(values.stp_version == "rstp")

  # ─── Management & Controller ─────────────────────────────────────────────────
  - uid: mondoo-unifi-security-ssh-disabled
    title: Ensure SSH access to devices is disabled
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ccc-06
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-3
      compliance/nist-csf-2: nist-csf-2-pr-ps-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-17
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-12
      compliance/pci-dss-4: pcidss-requirement-2-2-1
      compliance/soc2-2017: soc2-control-cc6-1-5
      compliance/vda-isa-5: vda-isa-5-5-2-1
    variants:
      - uid: mondoo-unifi-security-ssh-disabled-unifi
        tags:
          mondoo.com/filter-title: UniFi Controller
          mondoo.com/filter-icon: unifi
      - uid: mondoo-unifi-security-ssh-disabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-unifi-security-ssh-disabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-unifi-security-ssh-disabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that SSH access to UniFi devices is disabled when not actively needed for troubleshooting.

        **Why this matters**

        SSH access to network devices increases the attack surface:
          - SSH brute-force attacks can target device credentials.
          - A compromised SSH session provides full shell access to the network device.
          - Network devices should be managed through the controller, not via direct SSH.
          - Leaving SSH enabled when not needed violates the principle of least privilege.

        Disabling SSH ensures:
          - Devices are managed exclusively through the UniFi controller.
          - No direct shell access is available to potential attackers.
          - Credential-based attacks against device SSH are not possible.
      audit: |
        To verify the device SSH setting using the UniFi Network web application:

        1. Sign in to the UniFi Network web application.
        2. Go to **Settings > System > Advanced**.
        3. Review the **SSH** setting.

        If **SSH** is disabled, the check passes. If it is enabled, the check fails.
      remediation:
        - id: console
          desc: |
            To disable device SSH access using the UniFi Network web application:

            1. Go to **Settings > System > Advanced**.
            2. Disable **SSH**.
            3. If SSH is required for troubleshooting, enable it temporarily and disable it when done.
        # No cli remediation: the device SSH setting is a controller-managed site setting; the device SSH CLI cannot durably change it and the controller overwrites local changes on provision.
        - id: terraform
          desc: |
            To disable SSH access to UniFi devices in Terraform, set `ssh_enabled = false` inside the `mgmt` nested attribute on a `unifi_setting` resource:

            ```hcl
            resource "unifi_setting" "mgmt" {
              site = "default"

              mgmt = {
                ssh_enabled = false
              }
            }
            ```
    refs:
      - url: https://help.ui.com/hc/en-us/articles/204909374
        title: UniFi device SSH access

  - uid: mondoo-unifi-security-ssh-disabled-unifi
    filters: asset.platform == "unifi"
    mql: |
      unifi.siteSettings.mgmt.sshEnabled == false
  - uid: mondoo-unifi-security-ssh-disabled-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "unifi_setting")
    mql: |
      terraform.resources("unifi_setting").where(arguments["mgmt"] != empty).all(arguments["mgmt"]["ssh_enabled"] == false)
  - uid: mondoo-unifi-security-ssh-disabled-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "unifi_setting")
    mql: |
      terraform.plan.resourceChanges.where(type == "unifi_setting" && change.after.mgmt != empty).all(change.after.mgmt.ssh_enabled == false)
  - uid: mondoo-unifi-security-ssh-disabled-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "unifi_setting")
    mql: |
      terraform.state.resources.where(type == "unifi_setting" && values.mgmt != empty).all(values.mgmt.ssh_enabled == false)

  # No Terraform variants: the SSH password-auth toggle (`mgmt.sshPasswordAuthEnabled`)
  # is not exposed by the ubiquiti-community/unifi provider — the unifi_setting mgmt block
  # carries only `auto_upgrade`, `ssh_enabled`, and `ssh_keys` (key-based auth list). To
  # express this as IaC the operator must enroll keys via `ssh_keys` and disable password
  # auth in the controller UI, since the provider has no Terraform-declared field for it.
  - uid: mondoo-unifi-security-ssh-password-auth-disabled
    title: Ensure SSH password authentication is disabled
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-j
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-5
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-7
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-3
    mql: |
      if (unifi.siteSettings.mgmt.sshEnabled == true) {
        unifi.siteSettings.mgmt.sshPasswordAuthEnabled == false
      }
    docs:
      desc: |
        This check ensures that if SSH is enabled on UniFi devices, password authentication is disabled in favor of key-based authentication.

        **Why this matters**

        SSH password authentication is vulnerable to brute-force and credential stuffing attacks:
          - Automated tools can attempt thousands of password combinations per minute.
          - Default or weak passwords on network devices are a common attack vector.
          - Key-based authentication provides stronger security and is not susceptible to brute-force attacks.
      audit: |
        To verify the device SSH password authentication setting using the UniFi Network web application:

        1. Sign in to the UniFi Network web application.
        2. Go to **Settings > System > Advanced**.
        3. If **SSH** is enabled, review the **SSH Password Authentication** setting.

        If SSH is disabled, or SSH is enabled with **SSH Password Authentication** disabled, the check passes. If SSH is enabled with password authentication still enabled, the check fails.
      remediation:
        - id: console
          desc: |
            To disable device SSH password authentication using the UniFi Network web application:

            1. Go to **Settings > System > Advanced**.
            2. If SSH must remain enabled, disable **SSH Password Authentication**.
            3. Configure SSH key-based authentication instead.
        # No cli remediation: the device SSH authentication setting is a controller-managed site setting; the device SSH CLI cannot durably change it and the controller overwrites local changes on provision.
    refs:
      - url: https://help.ui.com/hc/en-us/articles/204909374
        title: UniFi device SSH access

  # No Terraform variants: the controller's debug-tools toggle lives on the management
  # site setting (`mgmt.debugToolsEnabled`), but the ubiquiti-community/unifi unifi_setting
  # mgmt block only exposes `auto_upgrade`, `ssh_enabled`, and `ssh_keys`. The provider
  # does not surface the debug-tools flag, so HCL/plan/state cannot evaluate it.
  - uid: mondoo-unifi-security-debug-tools-disabled
    title: Ensure debug tools are disabled
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ccc-06
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-1
      compliance/nist-csf-2: nist-csf-2-pr-ps-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-6
      compliance/pci-dss-4: pcidss-requirement-2-2-1
      compliance/soc2-2017: soc2-control-cc6-8-1
      compliance/vda-isa-5: vda-isa-5-5-2-1
    mql: |
      unifi.siteSettings.mgmt.debugToolsEnabled == false
    docs:
      desc: |
        This check ensures that debug tools are disabled on the UniFi controller.

        **Why this matters**

        Debug tools provide low-level diagnostic capabilities that should not be enabled in production:
          - Debug tools may expose sensitive internal state and configuration details.
          - They can be used to gather information useful for further attacks.
          - Debug interfaces may bypass normal access controls.
          - Production environments should only run with production-grade interfaces enabled.
      audit: |
        To verify the debug tools setting using the UniFi Network web application:

        1. Sign in to the UniFi Network web application.
        2. Go to **Settings > System > Advanced**.
        3. Review the **Debug Tools** setting.

        If **Debug Tools** is disabled, the check passes. If it is enabled, the check fails.
      remediation:
        - id: console
          desc: |
            To disable debug tools using the UniFi Network web application:

            1. Go to **Settings > System > Advanced**.
            2. Disable **Debug Tools**.
        # No cli remediation: the debug tools setting is a controller-managed site setting; the device SSH CLI cannot change it and the controller overwrites local changes on provision.
    refs:
      - url: https://help.ui.com/hc/en-us/articles/204909374
        title: UniFi advanced system settings

  # No Terraform variants: controller automatic backups are a controller-wide setting
  # (controller.autobackupEnabled), not a site setting. The ubiquiti-community/unifi
  # provider exposes no `auto_backup` or `autobackup_enabled` attribute on any resource —
  # unifi_setting covers per-site mgmt/radius/usg only. Backups are configured via the
  # controller's System Settings UI.
  - uid: mondoo-unifi-security-autobackup-enabled
    title: Ensure automatic backups are enabled
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-bcr-08
      compliance/dora: dora-art-12
      compliance/hipaa: hipaa-security-ss164-308-a-7-ii-a-contingency-plan-data-backup-plan
      compliance/iso-27001-2022: iso-27001-2022-a-8-13
      compliance/nis-2: nis-2-21-2-c
      compliance/nist-csf-1: nist-csf-1-pr-ip-4
      compliance/nist-csf-2: nist-csf-2-pr-ds-11
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cp-9
      compliance/nist-sp-800-171: false
      compliance/pci-dss-4: false
      compliance/soc2-2017: soc2-control-cc9-1-1
      compliance/vda-isa-5: false
    mql: |
      unifi.controller.autobackupEnabled == true
    docs:
      desc: |
        This check ensures that automatic backups of the UniFi controller configuration are enabled.

        **Why this matters**

        Without automatic backups, a controller failure or misconfiguration can result in complete loss of network configuration:
          - All site settings, firewall rules, network configurations, and device adoption records could be lost.
          - Recovery without a backup requires manual reconfiguration of every setting and re-adoption of all devices.
          - Regular backups enable rapid recovery from ransomware, hardware failure, or accidental misconfiguration.
      audit: |
        To verify automatic backups using the UniFi Network web application:

        1. Sign in to the UniFi Network web application.
        2. Go to **Settings > System > Backups**.
        3. Review the **Auto Backup** setting.

        If **Auto Backup** is enabled, the check passes. If it is disabled, the check fails.
      remediation:
        - id: console
          desc: |
            To enable automatic backups using the UniFi Network web application:

            1. Go to **Settings > System > Backups**.
            2. Enable **Auto Backup**.
            3. Configure the backup schedule and retention period.
            4. Consider also enabling **Backup to Cloud** for off-site protection.
        # No cli remediation: controller backup configuration is a controller-managed setting with no device SSH CLI equivalent.
    refs:
      - url: https://help.ui.com/hc/en-us/articles/226218448
        title: UniFi backup and restore

  - uid: mondoo-unifi-security-auto-upgrade-enabled
    title: Ensure automatic firmware upgrades are enabled
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-tvm-03
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-8
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-12
      compliance/nist-csf-2: nist-csf-2-pr-ps-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-1
      compliance/pci-dss-4: pcidss-requirement-6-3-3
      compliance/soc2-2017: soc2-control-cc7-1-1
      compliance/vda-isa-5: vda-isa-5-5-2-1
    variants:
      - uid: mondoo-unifi-security-auto-upgrade-enabled-unifi
        tags:
          mondoo.com/filter-title: UniFi Controller
          mondoo.com/filter-icon: unifi
      - uid: mondoo-unifi-security-auto-upgrade-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-unifi-security-auto-upgrade-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-unifi-security-auto-upgrade-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that automatic firmware upgrades are enabled for UniFi devices.

        **Why this matters**

        Running outdated firmware exposes network devices to known vulnerabilities:
          - UniFi devices receive regular security patches and bug fixes.
          - Manually managing firmware across many devices is error-prone and often delayed.
          - Known vulnerabilities in network equipment can be exploited remotely.

        Automatic upgrades ensure:
          - Security patches are applied promptly across all devices.
          - The firmware fleet remains consistent and up to date.
          - Reduced operational burden for network administrators.
      audit: |
        To verify automatic firmware upgrades using the UniFi Network web application:

        1. Sign in to the UniFi Network web application.
        2. Go to **Settings > System > Firmware**.
        3. Review the **Auto Update** setting.

        If **Auto Update** is enabled, the check passes. If it is disabled, the check fails.
      remediation:
        - id: console
          desc: |
            To enable automatic firmware upgrades using the UniFi Network web application:

            1. Go to **Settings > System > Firmware**.
            2. Enable **Auto Update**.
            3. Configure the update window to a low-traffic period.
        # No cli remediation: the auto-update setting is a controller-managed site setting; the device SSH CLI cannot change it and the controller overwrites local changes on provision.
        - id: terraform
          desc: |
            To enable automatic firmware upgrades in Terraform, set `auto_upgrade = true` inside the `mgmt` nested attribute on a `unifi_setting` resource:

            ```hcl
            resource "unifi_setting" "mgmt" {
              site = "default"

              mgmt = {
                auto_upgrade = true
              }
            }
            ```
    refs:
      - url: https://help.ui.com/hc/en-us/articles/204911424
        title: UniFi firmware management

  - uid: mondoo-unifi-security-auto-upgrade-enabled-unifi
    filters: asset.platform == "unifi"
    mql: |
      unifi.siteSettings.mgmt.autoUpgrade == true
  - uid: mondoo-unifi-security-auto-upgrade-enabled-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "unifi_setting")
    mql: |
      terraform.resources("unifi_setting").where(arguments["mgmt"] != empty).all(arguments["mgmt"]["auto_upgrade"] == true)
  - uid: mondoo-unifi-security-auto-upgrade-enabled-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "unifi_setting")
    mql: |
      terraform.plan.resourceChanges.where(type == "unifi_setting" && change.after.mgmt != empty).all(change.after.mgmt.auto_upgrade == true)
  - uid: mondoo-unifi-security-auto-upgrade-enabled-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "unifi_setting")
    mql: |
      terraform.state.resources.where(type == "unifi_setting" && values.mgmt != empty).all(values.mgmt.auto_upgrade == true)

  # No Terraform variants: the analytics/telemetry opt-out is a controller-wide setting
  # (controller.enableAnalytics), not a site setting. The ubiquiti-community/unifi
  # unifi_setting resource only exposes the per-site `mgmt`, `radius`, and `usg` blocks —
  # no analytics/telemetry toggle on either the unifi_setting resource or the unifi_site
  # resource. The setting can only be changed in the controller UI.
  - uid: mondoo-unifi-security-analytics-disabled
    title: Ensure analytics data collection is disabled
    impact: 30
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: false
      compliance/dora: false
      compliance/hipaa: false
      compliance/iso-27001-2022: false
      compliance/nis-2: false
      compliance/nist-csf-1: false
      compliance/nist-csf-2: false
      compliance/nist-sp-800-53-rev5: false
      compliance/nist-sp-800-171: false
      compliance/pci-dss-4: false
      compliance/soc2-2017: false
      compliance/vda-isa-5: false
    mql: |
      unifi.controller.enableAnalytics == false
    docs:
      desc: |
        This check ensures that analytics data collection is disabled on the UniFi controller.

        **Why this matters**

        Analytics data collection sends usage telemetry to Ubiquiti:
          - Telemetry may include network topology and usage patterns.
          - Organizations with strict data governance policies may need to disable external data sharing.
          - Reducing unnecessary outbound data flows limits potential information leakage.
      audit: |
        To verify analytics data collection using the UniFi Network web application:

        1. Sign in to the UniFi Network web application.
        2. Go to **Settings > System**.
        3. Review the **Send Analytics and Improvement Data** setting.

        If **Send Analytics and Improvement Data** is disabled, the check passes. If it is enabled, the check fails.
      remediation:
        - id: console
          desc: |
            To disable analytics data collection using the UniFi Network web application:

            1. Go to **Settings > System**.
            2. Disable **Send Analytics and Improvement Data**.
        # No cli remediation: analytics collection is a controller-managed setting with no device SSH CLI equivalent.
    refs:
      - url: https://help.ui.com/hc/en-us/articles/204909374
        title: UniFi system settings

  # No Terraform variants: remote syslog is configured under a `remoteSyslog` site setting,
  # but the ubiquiti-community/unifi unifi_setting resource only exposes `mgmt`, `radius`,
  # and `usg` nested attributes — no `remote_syslog` or `rsyslogd` block. (The
  # filipowm/unifi provider, a separate fork, does expose unifi_setting_rsyslogd from
  # controller 8.5+; if cnspec ever standardizes on that provider this check could be
  # implemented.)
  - uid: mondoo-unifi-security-remote-syslog-enabled
    title: Ensure remote syslog is configured
    impact: 50
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    mql: |
      unifi.siteSettings.remoteSyslog.enabled == true
    docs:
      desc: |
        This check ensures that remote syslog is enabled to forward logs to a central log management system.

        **Why this matters**

        Without centralized logging, security events may be lost or tampered with:
          - Local logs on the controller can be overwritten or deleted by an attacker.
          - Centralized logging enables correlation of events across multiple systems.
          - Log retention on the controller is limited by storage capacity.
          - Incident response and forensic analysis require comprehensive log data.

        Remote syslog ensures:
          - Logs are preserved independently of the controller.
          - Security events can be monitored and alerted on in real time.
          - Compliance requirements for log retention and integrity are met.
      audit: |
        To verify remote syslog configuration using the UniFi Network web application:

        1. Sign in to the UniFi Network web application.
        2. Go to **Settings > System > Remote Logging**.
        3. Review the **Remote Syslog** setting.

        If **Remote Syslog** is enabled and a syslog server is configured, the check passes. If it is disabled, the check fails.
      remediation:
        - id: console
          desc: |
            To configure remote syslog using the UniFi Network web application:

            1. Go to **Settings > System > Remote Logging**.
            2. Enable **Remote Syslog**.
            3. Configure the syslog server IP address and port.
            4. Enable **Log All Contents** for comprehensive logging.
        # No cli remediation: remote logging is a controller-managed site setting; the device SSH CLI cannot change it and the controller overwrites local changes on provision.
    refs:
      - url: https://help.ui.com/hc/en-us/articles/204909374
        title: UniFi remote logging settings

