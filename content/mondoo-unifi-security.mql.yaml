policies:
  - uid: mondoo-unifi-security
    name: Mondoo Ubiquiti UniFi Security
    version: 1.2.0
    license: BUSL-1.1
    tags:
      mondoo.com/category: security
      mondoo.com/platform: unifi,networkdevice
    require:
      - provider: unifi
    authors:
      - name: Mondoo, Inc.
        email: hello@mondoo.com
    summary: Secure Ubiquiti UniFi controller and network settings
    docs:
      desc: |
        The Mondoo Ubiquiti UniFi Security policy identifies critical misconfigurations in UniFi controllers that could weaken your network security posture. This policy helps organizations detect and remediate hardening gaps before they can be exploited, reducing the likelihood of wireless intrusion, controller compromise, and disruption of network services.

        This policy provides security checks across key UniFi areas:

        - Wireless security and SSID protection
        - Firewall settings and inter-VLAN policies
        - Threat management and intrusion prevention
        - Device hardening and management plane access
        - Controller backup, updates, and management settings

        Learn more about scanning Ubiquiti UniFi in the [cnspec Ubiquiti UniFi documentation](https://mondoo.com/docs/cnspec/network/unifi).

        Have suggestions for new checks in this policy? Visit our [cnspec repository](https://github.com/mondoohq/cnspec).
    groups:
      - title: Wireless Security
        filters: asset.platform == "unifi"
        checks:
          - uid: mondoo-unifi-security-no-open-wlans
          - uid: mondoo-unifi-security-wlans-use-wpa2-or-wpa3
          - uid: mondoo-unifi-security-wlans-wpa3-enabled
          - uid: mondoo-unifi-security-wlans-pmf-enabled
          - uid: mondoo-unifi-security-guest-wlans-isolated
          - uid: mondoo-unifi-security-wlans-strong-encryption-cipher
          - uid: mondoo-unifi-security-wlans-group-rekey-interval
          - uid: mondoo-unifi-security-guest-wlans-l2-isolation
      - title: Threat Management
        filters: asset.platform == "unifi"
        checks:
          - uid: mondoo-unifi-security-ips-enabled
          - uid: mondoo-unifi-security-dns-filtering-enabled
          - uid: mondoo-unifi-security-honeypot-enabled
          - uid: mondoo-unifi-security-dpi-enabled
      - title: VPN Security
        filters: asset.platform == "unifi"
        checks:
          - uid: mondoo-unifi-security-vpn-servers-modern-protocol
          - uid: mondoo-unifi-security-vpn-tunnels-active
          - uid: mondoo-unifi-security-vpn-clients-modern-protocol
      - title: Gateway Security
        filters: asset.platform == "unifi"
        checks:
          - uid: mondoo-unifi-security-upnp-disabled
          - uid: mondoo-unifi-security-broadcast-ping-disabled
          - uid: mondoo-unifi-security-icmp-redirects-disabled
          - uid: mondoo-unifi-security-syn-cookies-enabled
          - uid: mondoo-unifi-security-geo-ip-filtering-enabled
      - title: Switch Security
        filters: asset.platform == "unifi"
        checks:
          - uid: mondoo-unifi-security-dhcp-snooping-enabled
          - uid: mondoo-unifi-security-stp-enabled

      - title: Management & Controller
        filters: asset.platform == "unifi"
        checks:
          - uid: mondoo-unifi-security-ssh-disabled
          - uid: mondoo-unifi-security-ssh-password-auth-disabled
          - uid: mondoo-unifi-security-debug-tools-disabled
          - uid: mondoo-unifi-security-autobackup-enabled
          - uid: mondoo-unifi-security-auto-upgrade-enabled
          - uid: mondoo-unifi-security-analytics-disabled
          - uid: mondoo-unifi-security-devices-firmware-uptodate
          - uid: mondoo-unifi-security-no-eol-devices
          - uid: mondoo-unifi-security-no-unsupported-devices
          - uid: mondoo-unifi-security-remote-syslog-enabled
      - title: Network Segmentation
        filters: asset.platform == "unifi"
        checks:
          - uid: mondoo-unifi-security-no-port-forwards-to-mgmt
          - uid: mondoo-unifi-security-dns-over-https-enabled
          - uid: mondoo-unifi-security-guest-network-isolation
          - uid: mondoo-unifi-security-igmp-snooping-enabled
    scoring_system: highest impact
queries:
  # ─── Wireless Security ───────────────────────────────────────────────────────
  - uid: mondoo-unifi-security-no-open-wlans
    title: Ensure no wireless networks use open authentication
    impact: 100
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-iam-02
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-j
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-5
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-7
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-3
    variants:
      - uid: mondoo-unifi-security-no-open-wlans-unifi
        tags:
          mondoo.com/filter-title: UniFi Controller
          mondoo.com/filter-icon: unifi
      - uid: mondoo-unifi-security-no-open-wlans-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-unifi-security-no-open-wlans-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-unifi-security-no-open-wlans-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that no enabled wireless networks on the UniFi controller use open (no encryption) authentication.

        **Why this matters**

        Open wireless networks transmit all traffic in plaintext, allowing anyone within radio range to intercept sensitive data:
          - Credentials, session tokens, and personal data can be captured with basic tools.
          - Attackers can perform man-in-the-middle attacks without any authentication barrier.
          - Open networks provide no protection against rogue clients joining the network.
          - Even guest networks should use WPA with a shared key or captive portal authentication.
      audit: |
        To verify wireless network security using the UniFi Network web application:

        1. Sign in to the UniFi Network web application.
        2. Go to **Settings > WiFi**.
        3. Select each enabled wireless network and review its **Security** setting.

        If every enabled network uses **WPA2** or **WPA3**, the check passes. If any enabled network has **Security** set to **Open**, the check fails.
      remediation:
        - id: console
          desc: |
            To secure an open wireless network using the UniFi Network web application:

            1. Go to **Settings > WiFi**.
            2. Select the open wireless network.
            3. Change the **Security** setting to **WPA2** or **WPA3**.
            4. Set a strong passphrase or configure enterprise (802.1X) authentication.
        # No cli remediation: wireless network security is a controller-managed site setting; the device SSH CLI cannot change it and the controller overwrites local changes on provision.
        - id: terraform
          desc: |
            To declare a wireless network with WPA encryption in Terraform using the `ubiquiti-community/unifi` provider, set `security` to a non-open value (`wpapsk` for personal, `wpaeap` for enterprise) on every `unifi_wlan` resource:

            ```hcl
            resource "unifi_wlan" "secure" {
              name       = "internal"
              security   = "wpapsk"
              passphrase = var.wifi_passphrase
              network_id = unifi_network.lan.id
              user_group_id = data.unifi_user_group.default.id
            }
            ```
    refs:
      - url: https://help.ui.com/hc/en-us/articles/205231710
        title: UniFi wireless network configuration

  - uid: mondoo-unifi-security-no-open-wlans-unifi
    filters: asset.platform == "unifi"
    mql: |
      unifi.wlans.where(enabled == true).all(security != "open")
  - uid: mondoo-unifi-security-no-open-wlans-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "unifi_wlan")
    mql: |
      terraform.resources("unifi_wlan").all(arguments["security"] != "open")
  - uid: mondoo-unifi-security-no-open-wlans-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "unifi_wlan")
    mql: |
      terraform.plan.resourceChanges.where(type == "unifi_wlan").all(change.after.security != "open")
  - uid: mondoo-unifi-security-no-open-wlans-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "unifi_wlan")
    mql: |
      terraform.state.resources.where(type == "unifi_wlan").all(values.security != "open")

  - uid: mondoo-unifi-security-wlans-use-wpa2-or-wpa3
    title: Ensure wireless networks use WPA2 or WPA3 encryption
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    variants:
      - uid: mondoo-unifi-security-wlans-use-wpa2-or-wpa3-unifi
        tags:
          mondoo.com/filter-title: UniFi Controller
          mondoo.com/filter-icon: unifi
      - uid: mondoo-unifi-security-wlans-use-wpa2-or-wpa3-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-unifi-security-wlans-use-wpa2-or-wpa3-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-unifi-security-wlans-use-wpa2-or-wpa3-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that all enabled wireless networks use WPA-PSK or WPA-Enterprise security modes, which provide WPA2 or WPA3 encryption.

        **Note:** The UniFi API uses `wpapsk` and `wpaeap` for WPA2/WPA3 modes. WPA1-only configurations use distinct security values. If your controller uses non-standard security values, verify the mapping for your firmware version.

        **Why this matters**

        Older security protocols like WEP have well-known vulnerabilities that allow attackers to crack encryption keys in minutes:
          - WEP uses RC4 encryption with known statistical weaknesses.
          - WPA1 (TKIP) has been deprecated due to practical attacks.
          - Only WPA2 (AES-CCMP) and WPA3 (SAE) provide adequate wireless security.

        Using strong wireless encryption ensures:
          - Data confidentiality for all wireless traffic.
          - Protection against eavesdropping and session hijacking.
          - Compliance with modern security standards and best practices.
      audit: |
        To verify wireless network encryption modes using the UniFi Network web application:

        1. Sign in to the UniFi Network web application.
        2. Go to **Settings > WiFi**.
        3. Select each enabled wireless network and review its **Security** setting.

        If every enabled network uses **WPA Personal** or **WPA Enterprise** (WPA2/WPA3), the check passes. If any enabled network uses WEP, WPA1-only, or open security, the check fails.
      remediation:
        - id: console
          desc: |
            To set a modern wireless encryption mode using the UniFi Network web application:

            1. Go to **Settings > WiFi**.
            2. Select each wireless network.
            3. Set **Security** to **WPA Personal** or **WPA Enterprise**.
            4. Ensure WPA mode is set to **WPA2** or higher.
        # No cli remediation: wireless network security is a controller-managed site setting; the device SSH CLI cannot change it and the controller overwrites local changes on provision.
        - id: terraform
          desc: |
            To declare a wireless network with WPA2/WPA3 encryption in Terraform, set `security` to `wpapsk` (Personal) or `wpaeap` (Enterprise) on every `unifi_wlan` resource:

            ```hcl
            resource "unifi_wlan" "personal" {
              name       = "internal"
              security   = "wpapsk"
              passphrase = var.wifi_passphrase
              network_id = unifi_network.lan.id
              user_group_id = data.unifi_user_group.default.id
            }
            ```
    refs:
      - url: https://help.ui.com/hc/en-us/articles/205231710
        title: UniFi wireless network configuration

  - uid: mondoo-unifi-security-wlans-use-wpa2-or-wpa3-unifi
    filters: asset.platform == "unifi"
    mql: |
      unifi.wlans.where(enabled == true).all(security.in(["wpapsk", "wpaeap"]))
  - uid: mondoo-unifi-security-wlans-use-wpa2-or-wpa3-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "unifi_wlan")
    mql: |
      terraform.resources("unifi_wlan").all(arguments["security"].in(["wpapsk", "wpaeap"]))
  - uid: mondoo-unifi-security-wlans-use-wpa2-or-wpa3-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "unifi_wlan")
    mql: |
      terraform.plan.resourceChanges.where(type == "unifi_wlan").all(change.after.security.in(["wpapsk", "wpaeap"]))
  - uid: mondoo-unifi-security-wlans-use-wpa2-or-wpa3-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "unifi_wlan")
    mql: |
      terraform.state.resources.where(type == "unifi_wlan").all(values.security.in(["wpapsk", "wpaeap"]))

  - uid: mondoo-unifi-security-wlans-wpa3-enabled
    title: Ensure WPA3 support is enabled on wireless networks
    impact: 50
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    variants:
      - uid: mondoo-unifi-security-wlans-wpa3-enabled-unifi
        tags:
          mondoo.com/filter-title: UniFi Controller
          mondoo.com/filter-icon: unifi
      - uid: mondoo-unifi-security-wlans-wpa3-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-unifi-security-wlans-wpa3-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-unifi-security-wlans-wpa3-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that WPA3 support or WPA3 transition mode is enabled on all secured wireless networks.

        **Why this matters**

        WPA3 provides significant security improvements over WPA2:
          - Simultaneous Authentication of Equals (SAE) replaces the PSK 4-way handshake, preventing offline dictionary attacks.
          - Forward secrecy ensures that captured traffic cannot be decrypted even if the passphrase is later compromised.
          - Protected Management Frames (PMF) are mandatory, preventing deauthentication attacks.

        WPA3 transition mode allows WPA2 clients to connect while still offering WPA3 to capable devices.
      audit: |
        To verify WPA3 support on secured wireless networks using the UniFi Network web application:

        1. Sign in to the UniFi Network web application.
        2. Go to **Settings > WiFi**.
        3. Select each enabled, secured wireless network and review the WPA mode under advanced settings.

        If every secured network has **WPA3** or **WPA2/WPA3 Transition** mode enabled, the check passes. If any secured network offers only WPA2, the check fails.
      remediation:
        - id: console
          desc: |
            To enable WPA3 support using the UniFi Network web application:

            1. Go to **Settings > WiFi**.
            2. Select each wireless network.
            3. Enable **WPA3** or **WPA2/WPA3 Transition** mode.
            4. Verify that all critical client devices support WPA3 or transition mode before disabling WPA2 entirely.
        # No cli remediation: wireless network security is a controller-managed site setting; the device SSH CLI cannot change it and the controller overwrites local changes on provision.
        - id: terraform
          desc: |
            To enable WPA3 support on a wireless network in Terraform, set `wpa3_support = true` (and optionally `wpa3_transition = true` for backward-compatible mode) on every secured `unifi_wlan` resource:

            ```hcl
            resource "unifi_wlan" "modern" {
              name            = "internal"
              security        = "wpapsk"
              passphrase      = var.wifi_passphrase
              wpa3_support    = true
              wpa3_transition = true
              network_id      = unifi_network.lan.id
              user_group_id   = data.unifi_user_group.default.id
            }
            ```
    refs:
      - url: https://help.ui.com/hc/en-us/articles/205231710
        title: UniFi wireless network configuration

  - uid: mondoo-unifi-security-wlans-wpa3-enabled-unifi
    filters: asset.platform == "unifi"
    mql: |
      unifi.wlans.where(enabled == true && security != "open").all(wpa3Support == true || wpa3Transition == true)
  - uid: mondoo-unifi-security-wlans-wpa3-enabled-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "unifi_wlan")
    mql: |
      terraform.resources("unifi_wlan").where(arguments["security"] != "open").all(arguments["wpa3_support"] == true || arguments["wpa3_transition"] == true)
  - uid: mondoo-unifi-security-wlans-wpa3-enabled-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "unifi_wlan")
    mql: |
      terraform.plan.resourceChanges.where(type == "unifi_wlan" && change.after.security != "open").all(change.after.wpa3_support == true || change.after.wpa3_transition == true)
  - uid: mondoo-unifi-security-wlans-wpa3-enabled-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "unifi_wlan")
    mql: |
      terraform.state.resources.where(type == "unifi_wlan" && values.security != "open").all(values.wpa3_support == true || values.wpa3_transition == true)

  - uid: mondoo-unifi-security-wlans-pmf-enabled
    title: Ensure Protected Management Frames are enabled
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-6
    variants:
      - uid: mondoo-unifi-security-wlans-pmf-enabled-unifi
        tags:
          mondoo.com/filter-title: UniFi Controller
          mondoo.com/filter-icon: unifi
      - uid: mondoo-unifi-security-wlans-pmf-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-unifi-security-wlans-pmf-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-unifi-security-wlans-pmf-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Protected Management Frames (PMF / IEEE 802.11w) are enabled on all secured wireless networks.

        **Why this matters**

        Without PMF, management frames such as deauthentication and disassociation are sent unprotected:
          - Attackers can forge deauthentication frames to disconnect clients (deauth attacks).
          - Deauth attacks are a prerequisite for WPA2 handshake capture and offline cracking.
          - Rogue AP attacks become easier when clients can be forcibly disconnected from legitimate APs.

        Enabling PMF (optional or required) protects against:
          - Deauthentication and disassociation flooding attacks.
          - Forced roaming to rogue access points.
          - Denial-of-service attacks targeting wireless clients.
      audit: |
        To verify Protected Management Frames using the UniFi Network web application:

        1. Sign in to the UniFi Network web application.
        2. Go to **Settings > WiFi**.
        3. Select each enabled, secured wireless network and review the **PMF** setting under advanced settings.

        If every secured network has **PMF** set to **Optional** or **Required**, the check passes. If any secured network has **PMF** set to **Disabled**, the check fails.
      remediation:
        - id: console
          desc: |
            To enable Protected Management Frames using the UniFi Network web application:

            1. Go to **Settings > WiFi**.
            2. Select each wireless network.
            3. Under advanced settings, set **PMF** to **Optional** or **Required**.
            4. Note: Setting PMF to **Required** may cause connectivity issues with older clients that do not support 802.11w.
        # No cli remediation: wireless network security is a controller-managed site setting; the device SSH CLI cannot change it and the controller overwrites local changes on provision.
        - id: terraform
          desc: |
            To enable Protected Management Frames on a wireless network in Terraform, set `pmf_mode` to `"required"` or `"optional"` on every secured `unifi_wlan` resource:

            ```hcl
            resource "unifi_wlan" "with_pmf" {
              name          = "internal"
              security      = "wpapsk"
              passphrase    = var.wifi_passphrase
              pmf_mode      = "optional"
              network_id    = unifi_network.lan.id
              user_group_id = data.unifi_user_group.default.id
            }
            ```
    refs:
      - url: https://help.ui.com/hc/en-us/articles/205231710
        title: UniFi wireless network configuration

  - uid: mondoo-unifi-security-wlans-pmf-enabled-unifi
    filters: asset.platform == "unifi"
    mql: |
      unifi.wlans.where(enabled == true && security != "open").all(pmfMode.in(["required", "optional"]))
  - uid: mondoo-unifi-security-wlans-pmf-enabled-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "unifi_wlan")
    mql: |
      terraform.resources("unifi_wlan").where(arguments["security"] != "open").all(arguments["pmf_mode"].in(["required", "optional"]))
  - uid: mondoo-unifi-security-wlans-pmf-enabled-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "unifi_wlan")
    mql: |
      terraform.plan.resourceChanges.where(type == "unifi_wlan" && change.after.security != "open").all(change.after.pmf_mode.in(["required", "optional"]))
  - uid: mondoo-unifi-security-wlans-pmf-enabled-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "unifi_wlan")
    mql: |
      terraform.state.resources.where(type == "unifi_wlan" && values.security != "open").all(values.pmf_mode.in(["required", "optional"]))

  # No Terraform variants: the WPA encryption-cipher selector (`wpaEnc`, values like
  # `ccmp`/`gcmp256`) is not exposed on the ubiquiti-community/unifi unifi_wlan resource —
  # there is no `wpa_enc` top-level attribute and no nested encryption block. The cipher
  # can only be selected in the controller UI under WLAN advanced settings.
  - uid: mondoo-unifi-security-wlans-strong-encryption-cipher
    title: Ensure WLANs use strong WPA encryption ciphers
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    mql: |
      unifi.wlans.where(enabled == true && security != "open").all(wpaEnc == "ccmp" || wpaEnc == "gcmp256")
    docs:
      desc: |
        This check ensures that all secured wireless networks use strong WPA encryption ciphers such as AES-CCMP or GCMP-256.

        **Why this matters**

        The encryption cipher determines the strength of the actual data encryption on the wireless network:
          - TKIP is a legacy cipher with known weaknesses and has been deprecated by the Wi-Fi Alliance.
          - AES-CCMP is the standard cipher for WPA2 and provides strong 128-bit encryption.
          - GCMP-256 is used with WPA3 and provides 256-bit encryption for the highest level of protection.
          - Using weak ciphers undermines the security provided by WPA2/WPA3, even with a strong passphrase.
      audit: |
        To verify wireless encryption ciphers using the UniFi Network web application:

        1. Sign in to the UniFi Network web application.
        2. Go to **Settings > WiFi**.
        3. Select each enabled, secured wireless network and review the encryption cipher under advanced settings.

        If every secured network uses **CCMP** (AES) or **GCMP-256**, the check passes. If any secured network uses TKIP or a mixed-mode cipher, the check fails.
      remediation:
        - id: console
          desc: |
            To set a strong encryption cipher using the UniFi Network web application:

            1. Go to **Settings > WiFi**.
            2. Select each wireless network.
            3. Under advanced settings, ensure the encryption cipher is set to **CCMP** (AES) or **GCMP-256**.
            4. Avoid selecting TKIP or mixed-mode cipher configurations.
        # No cli remediation: wireless network security is a controller-managed site setting; the device SSH CLI cannot change it and the controller overwrites local changes on provision.
    refs:
      - url: https://help.ui.com/hc/en-us/articles/205231710
        title: UniFi wireless network configuration

  # No Terraform variants: the WPA group-rekey / GTK rotation interval
  # (`groupRekeyInterval`) is not exposed on the ubiquiti-community/unifi unifi_wlan
  # resource — no top-level attribute and no nested encryption block carries the field.
  # The setting is only configurable via the controller UI under WLAN advanced settings.
  - uid: mondoo-unifi-security-wlans-group-rekey-interval
    title: Ensure WPA group rekey interval is configured
    impact: 50
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    mql: |
      unifi.wlans.where(enabled == true && security != "open").all(groupRekeyInterval > 0 && groupRekeyInterval <= 3600)
    docs:
      desc: |
        This check ensures that the WPA group temporal key (GTK) rekey interval is set to 3600 seconds (1 hour) or less on all secured wireless networks.

        **Why this matters**

        The group temporal key encrypts broadcast and multicast traffic on a wireless network. Regular rekeying limits the exposure window if a key is compromised:
          - A longer rekey interval means a compromised key can be used to decrypt broadcast traffic for a longer period.
          - Regular rekeying limits the amount of data encrypted under a single key, reducing the value of a captured key.
          - Industry best practice recommends a rekey interval of 3600 seconds or less.
          - A value of 0 disables rekeying entirely, which is a security risk.
      audit: |
        To verify the WPA group rekey interval using the UniFi Network web application:

        1. Sign in to the UniFi Network web application.
        2. Go to **Settings > WiFi**.
        3. Select each enabled, secured wireless network and review the **Group Rekey Interval** under advanced settings.

        If every secured network has a **Group Rekey Interval** between 1 and 3600 seconds, the check passes. If any secured network has the interval set to 0 or greater than 3600 seconds, the check fails.
      remediation:
        - id: console
          desc: |
            To configure the WPA group rekey interval using the UniFi Network web application:

            1. Go to **Settings > WiFi**.
            2. Select each wireless network.
            3. Under advanced settings, set the **Group Rekey Interval** to **3600** seconds or less.
        # No cli remediation: wireless network security is a controller-managed site setting; the device SSH CLI cannot change it and the controller overwrites local changes on provision.
    refs:
      - url: https://help.ui.com/hc/en-us/articles/205231710
        title: UniFi wireless network configuration

  - uid: mondoo-unifi-security-guest-wlans-l2-isolation
    title: Ensure L2 isolation is enabled on guest WLANs
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-6
    variants:
      - uid: mondoo-unifi-security-guest-wlans-l2-isolation-unifi
        tags:
          mondoo.com/filter-title: UniFi Controller
          mondoo.com/filter-icon: unifi
      - uid: mondoo-unifi-security-guest-wlans-l2-isolation-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-unifi-security-guest-wlans-l2-isolation-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-unifi-security-guest-wlans-l2-isolation-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that Layer 2 client isolation is enabled on all guest wireless networks, preventing direct communication between wireless clients.

        **Why this matters**

        Without L2 isolation, clients on the same wireless network can communicate directly at the data link layer:
          - Attackers on a guest network can ARP spoof other clients to intercept their traffic.
          - Direct client-to-client communication enables lateral movement and network scanning.
          - Compromised devices can attack other guests via protocols that operate at Layer 2.
          - Guest mode alone restricts access to internal networks but does not prevent guest-to-guest attacks.

        L2 isolation ensures:
          - All client traffic is forced through the gateway, enabling firewall inspection.
          - Clients cannot discover or communicate with each other directly.
          - ARP spoofing and other Layer 2 attacks between clients are prevented.
      audit: |
        To verify Layer 2 isolation on guest wireless networks using the UniFi Network web application:

        1. Sign in to the UniFi Network web application.
        2. Go to **Settings > WiFi**.
        3. Select each enabled guest wireless network and review the **L2 Isolation** (Client Isolation) setting under advanced settings.

        If every guest network has **L2 Isolation** enabled, the check passes. If any guest network has it disabled, the check fails.
      remediation:
        - id: console
          desc: |
            To enable Layer 2 isolation on a guest wireless network using the UniFi Network web application:

            1. Go to **Settings > WiFi**.
            2. Select each guest wireless network.
            3. Under advanced settings, enable **L2 Isolation** (Client Isolation).
        # No cli remediation: wireless network security is a controller-managed site setting; the device SSH CLI cannot change it and the controller overwrites local changes on provision.
        - id: terraform
          desc: |
            To enable Layer 2 isolation on a guest wireless network in Terraform, set `l2_isolation = true` on every `unifi_wlan` resource that uses `is_guest = true`:

            ```hcl
            resource "unifi_wlan" "guest" {
              name          = "guest"
              security      = "wpapsk"
              passphrase    = var.guest_passphrase
              is_guest      = true
              l2_isolation  = true
              network_id    = unifi_network.guest.id
              user_group_id = data.unifi_user_group.default.id
            }
            ```
    refs:
      - url: https://help.ui.com/hc/en-us/articles/205231710
        title: UniFi wireless network configuration

  - uid: mondoo-unifi-security-guest-wlans-l2-isolation-unifi
    filters: asset.platform == "unifi"
    mql: |
      unifi.wlans.where(enabled == true && isGuest == true).all(l2Isolation == true)
  - uid: mondoo-unifi-security-guest-wlans-l2-isolation-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "unifi_wlan")
    mql: |
      terraform.resources("unifi_wlan").where(arguments["is_guest"] == true).all(arguments["l2_isolation"] == true)
  - uid: mondoo-unifi-security-guest-wlans-l2-isolation-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "unifi_wlan")
    mql: |
      terraform.plan.resourceChanges.where(type == "unifi_wlan" && change.after.is_guest == true).all(change.after.l2_isolation == true)
  - uid: mondoo-unifi-security-guest-wlans-l2-isolation-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "unifi_wlan")
    mql: |
      terraform.state.resources.where(type == "unifi_wlan" && values.is_guest == true).all(values.l2_isolation == true)

  - uid: mondoo-unifi-security-guest-wlans-isolated
    title: Ensure guest wireless networks use guest mode
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-6
    variants:
      - uid: mondoo-unifi-security-guest-wlans-isolated-unifi
        tags:
          mondoo.com/filter-title: UniFi Controller
          mondoo.com/filter-icon: unifi
      - uid: mondoo-unifi-security-guest-wlans-isolated-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-unifi-security-guest-wlans-isolated-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-unifi-security-guest-wlans-isolated-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that wireless networks with "guest" in the name are configured with guest mode enabled, which provides client isolation.

        **Why this matters**

        Guest networks without proper isolation allow guest clients to communicate with each other and potentially access internal network resources:
          - Guest devices can scan and attack other devices on the same network.
          - Lateral movement from a compromised guest device to internal resources is possible.
          - Guest traffic should be isolated from corporate network segments.

        Guest mode in UniFi provides:
          - Client-to-client isolation, preventing guests from communicating with each other.
          - Separation from the management network and other VLANs.
          - Optional captive portal authentication for access control.
      audit: |
        To verify guest mode on wireless networks named "guest" using the UniFi Network web application:

        1. Sign in to the UniFi Network web application.
        2. Go to **Settings > WiFi**.
        3. Select each enabled wireless network whose name contains "guest" and review the **Guest** toggle.

        If every such network has the **Guest** toggle enabled, the check passes. If any has it disabled, the check fails.
      remediation:
        - id: console
          desc: |
            To enable guest mode on a wireless network using the UniFi Network web application:

            1. Go to **Settings > WiFi**.
            2. Select the guest wireless network.
            3. Enable the **Guest** toggle to activate guest policies.
            4. Optionally configure a captive portal under **Settings > Hotspot**.
        # No cli remediation: wireless network security is a controller-managed site setting; the device SSH CLI cannot change it and the controller overwrites local changes on provision.
        - id: terraform
          desc: |
            To mark a wireless network with a `guest`-style name as a guest network in Terraform, set `is_guest = true` on the `unifi_wlan` resource so guest network policy applies:

            ```hcl
            resource "unifi_wlan" "guest" {
              name          = "guest-wifi"
              security      = "wpapsk"
              passphrase    = var.guest_passphrase
              is_guest      = true
              network_id    = unifi_network.guest.id
              user_group_id = data.unifi_user_group.default.id
            }
            ```
    refs:
      - url: https://help.ui.com/hc/en-us/articles/115000166827
        title: UniFi guest network configuration

  - uid: mondoo-unifi-security-guest-wlans-isolated-unifi
    filters: asset.platform == "unifi"
    mql: |
      unifi.wlans.where(enabled == true && name == /guest/i).all(isGuest == true)
  - uid: mondoo-unifi-security-guest-wlans-isolated-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "unifi_wlan")
    mql: |
      terraform.resources("unifi_wlan").where(arguments["name"] == /guest/i).all(arguments["is_guest"] == true)
  - uid: mondoo-unifi-security-guest-wlans-isolated-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "unifi_wlan")
    mql: |
      terraform.plan.resourceChanges.where(type == "unifi_wlan" && change.after.name == /guest/i).all(change.after.is_guest == true)
  - uid: mondoo-unifi-security-guest-wlans-isolated-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "unifi_wlan")
    mql: |
      terraform.state.resources.where(type == "unifi_wlan" && values.name == /guest/i).all(values.is_guest == true)

  # ─── Threat Management ───────────────────────────────────────────────────────
  # No Terraform variants: the IPS/IDS toggle and `ipsMode` field live under UniFi's
  # Threat Management settings (`siteSettings.threatManagement.enabled` / `.ipsMode`).
  # The ubiquiti-community/unifi provider exposes no threat-management settings —
  # unifi_setting carries only `mgmt`, `radius`, and `usg` nested attributes. IPS can
  # only be enabled in the controller UI under Settings > Security > Threat Management.
  - uid: mondoo-unifi-security-ips-enabled
    title: Ensure Intrusion Prevention System is enabled
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-16
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-4
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-6
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    mql: |
      unifi.siteSettings.threatManagement.enabled == true
      unifi.siteSettings.threatManagement.ipsMode == "ips"
    docs:
      desc: |
        This check ensures that the UniFi Threat Management system is enabled and running in IPS (Intrusion Prevention System) mode rather than IDS (detection-only) mode.

        **Why this matters**

        IDS mode only detects and logs threats without blocking them, leaving the network vulnerable:
          - Known attack signatures are detected but traffic is not blocked.
          - Active exploitation attempts continue unimpeded in IDS mode.
          - IPS mode actively blocks malicious traffic in real time.

        Running in IPS mode provides:
          - Automatic blocking of known attack patterns and exploits.
          - Protection against network-based attacks, malware communication, and data exfiltration.
          - Real-time threat mitigation without manual intervention.
      audit: |
        To verify the Threat Management mode using the UniFi Network web application:

        1. Sign in to the UniFi Network web application.
        2. Go to **Settings > Security > Threat Management**.
        3. Confirm that **Threat Management** is enabled and review the selected mode.

        If Threat Management is enabled and set to **IPS** (Intrusion Prevention System), the check passes. If it is disabled or set to **IDS** (detection only), the check fails.
      remediation:
        - id: console
          desc: |
            To enable Threat Management in IPS mode using the UniFi Network web application:

            1. Go to **Settings > Security > Threat Management**.
            2. Enable **Threat Management**.
            3. Set the mode to **IPS** (Intrusion Prevention System).
            4. Review and enable appropriate threat categories for your environment.
        # No cli remediation: Threat Management is a controller-managed site setting; the device SSH CLI cannot change it and the controller overwrites local changes on provision.
    refs:
      - url: https://help.ui.com/hc/en-us/articles/360006893234
        title: UniFi Threat Management

  # No Terraform variants: DNS filtering is part of UniFi's Threat Management feature
  # (`siteSettings.threatManagement.dnsFiltering`). The ubiquiti-community/unifi provider
  # exposes no threat-management settings — unifi_setting carries only `mgmt`, `radius`,
  # and `usg`. The setting can only be toggled via the controller UI.
  - uid: mondoo-unifi-security-dns-filtering-enabled
    title: Ensure DNS filtering is enabled
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-6
    mql: |
      unifi.siteSettings.threatManagement.dnsFiltering == true
    docs:
      desc: |
        This check ensures that DNS filtering is enabled on the UniFi controller to block access to known malicious domains.

        **Why this matters**

        DNS filtering provides a network-wide layer of protection against malicious domains:
          - Blocks access to known phishing, malware distribution, and command-and-control domains.
          - Prevents DNS-based data exfiltration.
          - Protects all devices on the network regardless of their individual security software.

        DNS filtering works as a first line of defense before traffic reaches the target host.
      audit: |
        To verify DNS filtering using the UniFi Network web application:

        1. Sign in to the UniFi Network web application.
        2. Go to **Settings > Security > Threat Management**.
        3. Review the **DNS Filtering** setting.

        If **DNS Filtering** is enabled, the check passes. If it is disabled, the check fails.
      remediation:
        - id: console
          desc: |
            To enable DNS filtering using the UniFi Network web application:

            1. Go to **Settings > Security > Threat Management**.
            2. Enable **DNS Filtering**.
            3. Select the appropriate filtering level for your environment.
        # No cli remediation: DNS filtering is a controller-managed site setting; the device SSH CLI cannot change it and the controller overwrites local changes on provision.
    refs:
      - url: https://help.ui.com/hc/en-us/articles/360006893234
        title: UniFi Threat Management

  # No Terraform variants: the internal honeypot is part of UniFi's Threat Management
  # feature (`siteSettings.threatManagement.honeypotEnabled`). The ubiquiti-community/unifi
  # provider exposes no threat-management settings — unifi_setting only carries `mgmt`,
  # `radius`, and `usg` nested attributes. The honeypot can only be enabled in the
  # controller UI under Settings > Security.
  - uid: mondoo-unifi-security-honeypot-enabled
    title: Ensure the internal honeypot is enabled
    impact: 40
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-16
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-4
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-6
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    mql: |
      unifi.siteSettings.threatManagement.honeypotEnabled == true
    docs:
      desc: |
        This check ensures that the UniFi internal honeypot is enabled to detect lateral movement and internal threat activity.

        **Why this matters**

        An internal honeypot creates a decoy service that legitimate users and devices should never access:
          - Any connection to the honeypot is a strong indicator of malicious activity or compromise.
          - Detects lateral movement from compromised devices scanning the network.
          - Provides early warning of internal threats before they reach critical assets.
          - Low false-positive rate since legitimate traffic should never reach the honeypot.
      audit: |
        To verify the internal honeypot using the UniFi Network web application:

        1. Sign in to the UniFi Network web application.
        2. Go to **Settings > Security > Threat Management**.
        3. Review the **Internal Honeypot** setting.

        If **Internal Honeypot** is enabled, the check passes. If it is disabled, the check fails.
      remediation:
        - id: console
          desc: |
            To enable the internal honeypot using the UniFi Network web application:

            1. Go to **Settings > Security > Threat Management**.
            2. Enable **Internal Honeypot**.
        # No cli remediation: the internal honeypot is a controller-managed site setting; the device SSH CLI cannot change it and the controller overwrites local changes on provision.
    refs:
      - url: https://help.ui.com/hc/en-us/articles/360006893234
        title: UniFi Threat Management

  # ─── Gateway Security ────────────────────────────────────────────────────────
  - uid: mondoo-unifi-security-upnp-disabled
    title: Ensure UPnP is disabled on the gateway
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ccc-06
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-1
      compliance/nist-csf-2: nist-csf-2-pr-ps-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-6
      compliance/pci-dss-4: pcidss-requirement-2-2-1
      compliance/soc2-2017: soc2-control-cc6-8-1
      compliance/vda-isa-5: vda-isa-5-5-2-1
    variants:
      - uid: mondoo-unifi-security-upnp-disabled-unifi
        tags:
          mondoo.com/filter-title: UniFi Controller
          mondoo.com/filter-icon: unifi
      - uid: mondoo-unifi-security-upnp-disabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
