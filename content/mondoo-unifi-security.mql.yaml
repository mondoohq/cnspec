      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-6
    variants:
      - uid: mondoo-unifi-security-no-port-forwards-to-mgmt-unifi
        tags:
          mondoo.com/filter-title: UniFi Controller
          mondoo.com/filter-icon: unifi
      - uid: mondoo-unifi-security-no-port-forwards-to-mgmt-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-unifi-security-no-port-forwards-to-mgmt-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-unifi-security-no-port-forwards-to-mgmt-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that no enabled port forwarding rules expose common management ports (SSH, HTTPS, UniFi controller) to the internet. Both the forwarded (external) port and the destination (internal) port are checked.

        **Note:** This check matches exact port strings. Port ranges (e.g., "8000-8999") that include management ports are not detected by this check.

        **Why this matters**

        Port forwarding management interfaces to the internet is one of the most critical misconfigurations:
          - Exposes the UniFi controller login page or device SSH to the public internet.
          - Brute-force attacks against exposed management interfaces are common.
          - Known vulnerabilities in management interfaces can be exploited remotely.
          - Management interfaces should only be accessible from trusted internal networks or through a VPN.
      audit: |
        To verify port forwarding rules using the UniFi Network web application:

        1. Sign in to the UniFi Network web application.
        2. Go to **Settings > Routing > Port Forwarding**.
        3. Review each enabled rule's forwarded (external) and destination (internal) ports.

        If no enabled rule forwards to or from ports 22, 443, 8443, or 8080, the check passes. If any enabled rule exposes one of these management ports, the check fails.
      remediation:
        - id: console
          desc: |
            To remove port forwards that expose management interfaces using the UniFi Network web application:

            1. Go to **Settings > Routing > Port Forwarding**.
            2. Review all enabled port forwarding rules.
            3. Remove or disable any rules forwarding ports 22, 443, 8443, or 8080.
            4. Use a VPN to access management interfaces remotely instead of port forwarding.
        # No cli remediation: port forwarding rules are controller-managed; the device SSH CLI cannot change them and the controller overwrites local changes on provision.
        - id: terraform
          desc: |
            To avoid forwarding management ports in Terraform, ensure no `unifi_port_forward` resource exposes ports 22, 443, 8443, or 8080 on either the WAN-facing port (`wan.port`) or the internal forward port (`forward.port`):

            ```hcl
            resource "unifi_port_forward" "web" {
              name     = "Web"
              protocol = "tcp"
              wan      = { port = "80" }
              forward  = { ip = "192.168.1.100", port = "8000" }
            }
            ```
    refs:
      - url: https://help.ui.com/hc/en-us/articles/115003173168
        title: UniFi port forwarding settings

  - uid: mondoo-unifi-security-no-port-forwards-to-mgmt-unifi
    filters: asset.platform == "unifi"
    mql: |
      unifi.portForwards.where(enabled == true).none(fwdPort.in(["22", "443", "8443", "8080"]) || dstPort.in(["22", "443", "8443", "8080"]))
  - uid: mondoo-unifi-security-no-port-forwards-to-mgmt-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "unifi_port_forward")
    mql: |
      terraform.resources("unifi_port_forward").all(
        arguments["wan"]["port"] != "22" && arguments["wan"]["port"] != "443" && arguments["wan"]["port"] != "8443" && arguments["wan"]["port"] != "8080" &&
        arguments["forward"]["port"] != "22" && arguments["forward"]["port"] != "443" && arguments["forward"]["port"] != "8443" && arguments["forward"]["port"] != "8080"
      )
  - uid: mondoo-unifi-security-no-port-forwards-to-mgmt-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "unifi_port_forward")
    mql: |
      terraform.plan.resourceChanges.where(type == "unifi_port_forward").all(
        change.after.wan.port != "22" && change.after.wan.port != "443" && change.after.wan.port != "8443" && change.after.wan.port != "8080" &&
        change.after.forward.port != "22" && change.after.forward.port != "443" && change.after.forward.port != "8443" && change.after.forward.port != "8080"
      )
  - uid: mondoo-unifi-security-no-port-forwards-to-mgmt-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "unifi_port_forward")
    mql: |
      terraform.state.resources.where(type == "unifi_port_forward").all(
        values.wan.port != "22" && values.wan.port != "443" && values.wan.port != "8443" && values.wan.port != "8080" &&
        values.forward.port != "22" && values.forward.port != "443" && values.forward.port != "8443" && values.forward.port != "8080"
      )

  # No Terraform variants: DNS-over-HTTPS is configured under a `doh` site setting in the
  # UniFi controller, but the ubiquiti-community/unifi unifi_setting resource only exposes
  # `mgmt`, `radius`, and `usg` nested attributes — there is no `doh` block. The setting
  # can only be toggled through the controller UI or the network-application API.
  - uid: mondoo-unifi-security-dns-over-https-enabled
    title: Ensure DNS over HTTPS is enabled
    impact: 40
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    mql: |
      unifi.siteSettings.doh.state != "disabled"
    docs:
      desc: |
        This check ensures that DNS over HTTPS (DoH) is not disabled on the UniFi controller. Any active state (such as "auto" or "enabled") is considered compliant.

        **Why this matters**

        Standard DNS queries are transmitted in plaintext and can be intercepted or manipulated:
          - DNS queries reveal browsing patterns and can be used for surveillance.
          - DNS spoofing attacks can redirect users to malicious sites.
          - ISPs and network intermediaries can monitor and modify DNS responses.

        DNS over HTTPS provides:
          - Encryption of DNS queries, preventing eavesdropping and tampering.
          - Protection against DNS spoofing and man-in-the-middle attacks.
          - Privacy for network users' browsing activity.
      audit: |
        To verify DNS over HTTPS using the UniFi Network web application:

        1. Sign in to the UniFi Network web application.
        2. Go to **Settings > Security > DNS Shield** or **Settings > Internet**.
        3. Review the **DNS over HTTPS** setting.

        If **DNS over HTTPS** is set to an active state such as **Auto** or **Enabled**, the check passes. If it is set to **Disabled**, the check fails.
      remediation:
        - id: console
          desc: |
            To enable DNS over HTTPS using the UniFi Network web application:

            1. Go to **Settings > Security > DNS Shield** or **Settings > Internet**.
            2. Enable **DNS over HTTPS**.
        # No cli remediation: DNS over HTTPS is a controller-managed site setting; the device SSH CLI cannot change it and the controller overwrites local changes on provision.
    refs:
      - url: https://help.ui.com/hc/en-us/articles/360052224054
        title: UniFi DNS settings

  # No Terraform variants: the runtime check filters networks by `purpose == "guest"`,
  # but the ubiquiti-community/unifi unifi_network resource has no `purpose` attribute.
  # The schema uses `gateway_type` (`default`/`switch`) and `third_party_gateway` instead,
  # neither of which expresses "this is a guest network." Without a way to identify guest
  # networks from HCL/plan/state, a variant cannot replicate the runtime's targeting.
  - uid: mondoo-unifi-security-guest-network-isolation
    title: Ensure network isolation is enabled on guest networks
    impact: 70
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-6
    mql: |
      unifi.networks.where(purpose == "guest").all(networkIsolationEnabled == true)
    docs:
      desc: |
        This check ensures that network isolation is enabled on all networks with a guest purpose, preventing inter-VLAN routing to other network segments.

        **Note:** This check identifies guest networks by the `purpose` attribute set in the UniFi controller, not by network name. IoT and other sensitive networks should also have isolation enabled; consider adding a custom check for your environment's IoT network naming convention.

        **Why this matters**

        Without network isolation, devices on guest networks can route traffic to other VLANs on the network:
          - Guest users can scan and access services on internal network segments.
          - Compromised devices on guest networks can be used as a pivot point to reach corporate resources.
          - IoT devices with known vulnerabilities become a direct threat to sensitive systems.

        Network isolation ensures:
          - Traffic from guest networks cannot reach other VLANs.
          - Compromised devices are contained within their own network segment.
          - Defense-in-depth is maintained even if firewall rules are misconfigured.
      audit: |
        To verify network isolation on guest networks using the UniFi Network web application:

        1. Sign in to the UniFi Network web application.
        2. Go to **Settings > Networks**.
        3. Select each network with a guest purpose and review the **Network Isolation** setting.

        If every guest network has **Network Isolation** enabled, the check passes. If any guest network has it disabled, the check fails.
      remediation:
        - id: console
          desc: |
            To enable network isolation on a guest network using the UniFi Network web application:

            1. Go to **Settings > Networks**.
            2. Select each guest or IoT network.
            3. Enable **Network Isolation** to prevent inter-VLAN routing.
        # No cli remediation: network configuration is controller-managed; the device SSH CLI cannot change it and the controller overwrites local changes on provision.
    refs:
      - url: https://help.ui.com/hc/en-us/articles/115003173168
        title: UniFi network settings

  - uid: mondoo-unifi-security-igmp-snooping-enabled
    title: Ensure IGMP snooping is enabled on LAN networks
    impact: 40
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-6
    variants:
      - uid: mondoo-unifi-security-igmp-snooping-enabled-unifi
        tags:
          mondoo.com/filter-title: UniFi Controller
          mondoo.com/filter-icon: unifi
      - uid: mondoo-unifi-security-igmp-snooping-enabled-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-unifi-security-igmp-snooping-enabled-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-unifi-security-igmp-snooping-enabled-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |
        This check ensures that IGMP snooping is enabled on all LAN networks to control multicast traffic flooding.

        **Why this matters**

        Without IGMP snooping, multicast traffic is flooded to all ports on a VLAN like broadcast traffic:
          - Multicast flooding wastes bandwidth and can degrade network performance.
          - Attackers can use multicast flooding for reconnaissance by observing which hosts respond to multicast groups.
          - Excessive multicast traffic can cause denial-of-service conditions on low-powered devices.
          - mDNS and other multicast-based discovery protocols leak information across the entire VLAN.

        IGMP snooping ensures:
          - Multicast traffic is only forwarded to ports with hosts that have joined the multicast group.
          - Network bandwidth is conserved by eliminating unnecessary multicast flooding.
          - The attack surface for multicast-based reconnaissance is reduced.
      audit: |
        To verify IGMP snooping on LAN networks using the UniFi Network web application:

        1. Sign in to the UniFi Network web application.
        2. Go to **Settings > Networks**.
        3. Select each LAN network and review the **IGMP Snooping** setting under advanced settings.

        If every LAN network has **IGMP Snooping** enabled, the check passes. If any LAN network has it disabled, the check fails.
      remediation:
        - id: console
          desc: |
            To enable IGMP snooping on a LAN network using the UniFi Network web application:

            1. Go to **Settings > Networks**.
            2. Select each LAN network.
            3. Under advanced settings, enable **IGMP Snooping**.
        # No cli remediation: network configuration is controller-managed; the device SSH CLI cannot change it and the controller overwrites local changes on provision.
        - id: terraform
          desc: |
            To enable IGMP snooping in Terraform, set `igmp_snooping = true` on each `unifi_network` resource. Note that the runtime check filters by `networkGroup == "LAN"`; the ubiquiti-community/unifi provider has no `network_group` argument, so the variant applies the assertion to every declared network — keep that in mind for non-LAN networks where snooping may not be desired:

            ```hcl
            resource "unifi_network" "lan" {
              name           = "Default"
              purpose        = "corporate"
              subnet         = "10.0.0.0/24"
              vlan_id        = 1
              igmp_snooping  = true
            }
            ```
    refs:
      - url: https://help.ui.com/hc/en-us/articles/360042281174
        title: UniFi switch configuration

  - uid: mondoo-unifi-security-igmp-snooping-enabled-unifi
    filters: asset.platform == "unifi"
    mql: |
      unifi.networks.where(networkGroup == "LAN").all(igmpSnooping == true)
  - uid: mondoo-unifi-security-igmp-snooping-enabled-terraform-hcl
    filters: asset.platform == "terraform-hcl" && terraform.resources.contains(nameLabel == "unifi_network")
    mql: |
      terraform.resources("unifi_network").all(arguments["igmp_snooping"] == true)
  - uid: mondoo-unifi-security-igmp-snooping-enabled-terraform-plan
    filters: asset.platform == "terraform-plan" && terraform.plan.resourceChanges.contains(type == "unifi_network")
    mql: |
      terraform.plan.resourceChanges.where(type == "unifi_network").all(change.after.igmp_snooping == true)
  - uid: mondoo-unifi-security-igmp-snooping-enabled-terraform-state
    filters: asset.platform == "terraform-state" && terraform.state.resources.contains(type == "unifi_network")
    mql: |
      terraform.state.resources.where(type == "unifi_network").all(values.igmp_snooping == true)

  # ─── VPN Security ─────────────────────────────────────────────────────────────
  # No Terraform variants: the unifi_vpn_server resource has no `protocol`/`purpose`/`type`
  # selector — the protocol is determined by which of the three nested attributes
  # (`wireguard`, `l2tp`, `openvpn`) is present, with exactly one required. The runtime
  # check uses a string equality (`protocol == "wireguard" || protocol == "ipsec"`) that
  # does not map cleanly to "exactly one of these blocks is non-empty"; a faithful variant
  # would also need to allow `l2tp` (IPsec-over-L2TP) but flag plain `openvpn`, and the
  # semantic mismatch produces both false positives and false negatives.
  - uid: mondoo-unifi-security-vpn-servers-modern-protocol
    title: Ensure VPN servers use modern protocols
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    mql: |
      unifi.vpnServers.where(enabled == true).all(protocol.in(["wireguard", "ipsec"]))
    docs:
      desc: |
        This check ensures that all enabled VPN servers use modern protocols such as WireGuard or IPsec rather than legacy protocols.

        **Why this matters**

        The VPN protocol determines the strength of the encrypted tunnel protecting site-to-site and remote access traffic:
          - OpenVPN, while widely supported, requires careful configuration to avoid weak cipher suites and has a larger attack surface.
          - WireGuard uses modern, audited cryptographic primitives (ChaCha20, Curve25519) and has a minimal codebase, reducing the risk of vulnerabilities.
          - IPsec with IKEv2 provides strong encryption and is well-suited for site-to-site tunnels.
          - Legacy VPN protocols may use deprecated ciphers or have known implementation weaknesses.
      audit: |
        To verify VPN server protocols using the UniFi Network web application:

        1. Sign in to the UniFi Network web application.
        2. Go to **Settings > VPN > VPN Server**.
        3. Review the protocol of each enabled VPN server configuration.

        If every enabled VPN server uses **WireGuard** or **IPsec**, the check passes. If any enabled VPN server uses a legacy protocol such as OpenVPN, the check fails.
      remediation:
        - id: console
          desc: |
            To set a modern protocol on a VPN server using the UniFi Network web application:

            1. Go to **Settings > VPN > VPN Server**.
            2. Select each VPN server configuration.
            3. Set the protocol to **WireGuard** or **IPsec**.
            4. Migrate any existing OpenVPN tunnels to a modern protocol.
        # No cli remediation: VPN configuration is controller-managed; the device SSH CLI cannot change it and the controller overwrites local changes on provision.
    refs:
      - url: https://help.ui.com/hc/en-us/articles/115005445768
        title: UniFi VPN configuration

  # No Terraform variants: VPN tunnel connection status (the `status == "connected"`
  # assertion) is runtime telemetry from the UniFi controller about whether the tunnel is
  # actively up. It is not a configuration field — there is no `status` argument on
  # unifi_vpn_client or any resource that expresses tunnel-up state, because that's
  # observed-only data.
  - uid: mondoo-unifi-security-vpn-tunnels-active
    title: Ensure enabled VPN tunnels are connected
    impact: 50
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-16
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-4
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-6
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    mql: |
      unifi.vpnClients.where(enabled == true).all(status == "connected")
    docs:
      desc: |
        This check ensures that all enabled VPN client tunnels (typically site-to-site connections) have a connected status. Tunnels in error, connecting, or disconnected states will fail this check.

        **Why this matters**

        A VPN tunnel that is configured and enabled but disconnected indicates a connectivity failure that may create security blind spots:
          - Site-to-site tunnels carry traffic that is expected to be encrypted; a disconnected tunnel may cause traffic to be dropped or routed unencrypted.
          - Security monitoring and logging that depends on VPN connectivity will have gaps during disconnection.
          - Persistent disconnection may indicate misconfiguration, credential expiration, or an active attack disrupting the tunnel.
          - Stale VPN configurations that are enabled but non-functional should be investigated and remediated.
      audit: |
        To verify VPN tunnel status using the UniFi Network web application:

        1. Sign in to the UniFi Network web application.
        2. Go to **Settings > VPN > VPN Client**.
        3. Review the status of each enabled VPN client tunnel.

        If every enabled VPN client tunnel shows a **connected** status, the check passes. If any enabled tunnel is in an error, connecting, or disconnected state, the check fails.
      remediation:
        - id: console
          desc: |
            To restore disconnected VPN tunnels using the UniFi Network web application:

            1. Go to **Settings > VPN > VPN Client**.
            2. Review VPN client tunnels that are enabled but disconnected.
            3. Verify the remote endpoint is reachable and credentials are valid.
            4. Check firewall rules on both ends to ensure VPN traffic is permitted.
            5. Disable any VPN client configurations that are no longer needed.
        # No cli remediation: VPN configuration is controller-managed; the device SSH CLI cannot change it and the controller overwrites local changes on provision.
    refs:
      - url: https://help.ui.com/hc/en-us/articles/115005445768
        title: UniFi VPN configuration

  # No Terraform variants: the ubiquiti-community/unifi unifi_vpn_client resource is
  # WireGuard-only — `wireguard` is a Required nested attribute and there is no protocol
  # selector. Any declared client is implicitly WireGuard, so a variant that asserts
  # `protocol == "wireguard" || protocol == "ipsec"` would be vacuously true on every
  # declared client and would not surface ipsec/openvpn/l2tp clients (which can only be
  # configured through the UI). Better to keep this runtime-only.
  - uid: mondoo-unifi-security-vpn-clients-modern-protocol
    title: Ensure VPN clients use modern protocols
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-8
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    mql: |
      unifi.vpnClients.where(enabled == true).all(protocol.in(["wireguard", "ipsec"]))
    docs:
      desc: |
        This check ensures that all enabled VPN client connections use modern protocols such as WireGuard or IPsec.

        **Why this matters**

        VPN client connections to remote sites must use strong encryption to protect data in transit:
          - The same protocol risks that apply to VPN servers apply equally to client connections.
          - A VPN client using a weak protocol exposes traffic to interception at any point along the tunnel path.
          - WireGuard and IPsec provide authenticated encryption with modern ciphers and smaller attack surfaces.
          - Standardizing on modern protocols across both server and client configurations ensures consistent security posture.
      audit: |
        To verify VPN client protocols using the UniFi Network web application:

        1. Sign in to the UniFi Network web application.
        2. Go to **Settings > VPN > VPN Client**.
        3. Review the protocol of each enabled VPN client configuration.

        If every enabled VPN client uses **WireGuard** or **IPsec**, the check passes. If any enabled VPN client uses a legacy protocol such as OpenVPN, the check fails.
      remediation:
        - id: console
          desc: |
            To set a modern protocol on a VPN client using the UniFi Network web application:

            1. Go to **Settings > VPN > VPN Client**.
            2. Select each VPN client configuration.
            3. Set the protocol to **WireGuard** or **IPsec**.
            4. Coordinate with the remote site to ensure protocol compatibility.
        # No cli remediation: VPN configuration is controller-managed; the device SSH CLI cannot change it and the controller overwrites local changes on provision.
    refs:
      - url: https://help.ui.com/hc/en-us/articles/115005445768
        title: UniFi VPN configuration

  # ─── Device Hardening ─────────────────────────────────────────────────────────
  # No Terraform variants: device firmware version is runtime telemetry — the
  # ubiquiti-community/unifi provider's unifi_device resource only exposes `adopted`,
  # `state`, `type`, `model`, etc. and has no `upgradable`, `firmware_version`, or
  # `latest_firmware` attribute. The runtime check inspects whether each device is on the
  # latest firmware available from the Ubiquiti update server, which is not a
  # Terraform-declared property.
  - uid: mondoo-unifi-security-devices-firmware-uptodate
    title: Ensure all devices are running latest firmware
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-tvm-03
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-8
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-12
      compliance/nist-csf-2: nist-csf-2-pr-ps-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-1
      compliance/pci-dss-4: pcidss-requirement-6-3-3
      compliance/soc2-2017: soc2-control-cc7-1-1
      compliance/vda-isa-5: vda-isa-5-5-2-1
    mql: |
      unifi.devices.all(upgradable == false)
    docs:
      desc: |
        This check ensures that all adopted UniFi devices are running the latest available firmware with no pending upgrades.

        **Why this matters**

        Devices with pending firmware upgrades may be missing critical security patches:
          - Ubiquiti regularly releases firmware updates that address known vulnerabilities.
          - Network devices are high-value targets because compromising them provides access to all traffic passing through.
          - Even with automatic upgrades enabled, devices may fail to update due to connectivity issues or adoption problems.
          - This check verifies the actual device state rather than just the auto-upgrade setting.

        Keeping firmware current ensures:
          - Known vulnerabilities are patched promptly.
          - Devices have the latest security features and hardening improvements.
          - The network is not exposed to publicly disclosed exploits targeting older firmware.
      audit: |
        To verify device firmware status using the UniFi Network web application:

        1. Sign in to the UniFi Network web application.
        2. Go to **Devices**.
        3. Review the firmware status column for each adopted device.

        If no adopted device shows a pending firmware upgrade, the check passes. If any device shows an available update, the check fails.
      remediation:
        - id: console
          desc: |
            To update device firmware using the UniFi Network web application:

            1. Go to **Devices** and review devices showing available updates.
            2. Click **Update** on each device with a pending firmware upgrade.
            3. If devices fail to update, verify they are properly adopted and can reach the update servers.
            4. Enable **Auto Update** under **Settings > System > Firmware** to prevent future drift.
        # No cli remediation: firmware updates are orchestrated by the controller; the device SSH CLI has no supported firmware-update path that the controller will not revert.
    refs:
      - url: https://help.ui.com/hc/en-us/articles/204911424
        title: UniFi firmware management


  - uid: mondoo-unifi-security-no-eol-devices
    title: Ensure no end-of-life devices are in use
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-tvm-03
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-8
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-12
      compliance/nist-csf-2: nist-csf-2-pr-ps-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-1
      compliance/pci-dss-4: pcidss-requirement-6-3-3
      compliance/soc2-2017: soc2-control-cc7-1-1
      compliance/vda-isa-5: vda-isa-5-5-2-1
    mql: |
      unifi.devices.all(modelEol == false)
    docs:
      desc: |
        This check ensures that no adopted UniFi devices have reached end-of-life (EOL) status.

        **Why this matters**

        End-of-life hardware no longer receives firmware or security updates from Ubiquiti:
          - Vulnerabilities discovered after a device reaches EOL are never patched.
          - Network devices are high-value targets — a compromised access point, switch, or gateway exposes all traffic that flows through it.
          - EOL devices accumulate unmitigated risk for as long as they remain in service.

        Replacing end-of-life hardware ensures:
          - Devices continue to receive security patches.
          - The network is not anchored to permanently vulnerable equipment.
      audit: |
        To verify device lifecycle status using the UniFi Network web application:

        1. Sign in to the UniFi Network web application.
        2. Go to **Devices** and review each adopted device's model.
        3. Cross-reference the model against Ubiquiti's end-of-life announcements.

        If no adopted device is end-of-life, the check passes. If any device's model is end-of-life, the check fails.
      remediation:
        - id: console
          desc: |
            To remediate end-of-life devices using the UniFi Network web application:

            1. Identify the devices reported as end-of-life under **Devices**.
            2. Plan and budget replacement with a currently supported model.
            3. Migrate configuration to the replacement device and decommission the end-of-life hardware.
        # No cli remediation: device lifecycle status is reported by the controller; no device CLI action changes a model's end-of-life state.
    refs:
      - url: https://help.ui.com/hc/en-us/articles/204910134
        title: UniFi device lifecycle and support

  - uid: mondoo-unifi-security-no-unsupported-devices
    title: Ensure no unsupported devices are adopted
    impact: 50
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ccc-06
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-1
      compliance/nist-csf-2: nist-csf-2-pr-ps-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-1
      compliance/pci-dss-4: pcidss-requirement-2-2-1
      compliance/soc2-2017: soc2-control-cc6-8-1
      compliance/vda-isa-5: vda-isa-5-5-2-1
    mql: |
      unifi.devices.all(unsupported == false)
    docs:
      desc: |
        This check ensures that the controller is not managing any devices it reports as unsupported.

        **Why this matters**

        A device flagged as unsupported is not fully managed by the controller's current software:
          - Security settings and provisioning the controller applies may not take effect on the device.
          - The device may run firmware the controller can neither audit nor update.
          - Unsupported devices represent unmanaged, unverifiable attack surface on the network.

        Keeping every adopted device supported ensures the controller's hardening and update mechanisms actually apply to it.
      audit: |
        To verify device support status using the UniFi Network web application:

        1. Sign in to the UniFi Network web application.
        2. Go to **Devices** and review each adopted device's status.

        If no adopted device is reported as unsupported, the check passes. If any device is unsupported, the check fails.
      remediation:
        - id: console
          desc: |
            To remediate unsupported devices using the UniFi Network web application:

            1. Identify the unsupported devices under **Devices**.
            2. Update the controller (and the device firmware) to a version that supports the hardware, or replace the device with a supported model.
        # No cli remediation: support status is determined by the controller software; the device CLI cannot change it.
    refs:
      - url: https://help.ui.com/hc/en-us/articles/204910134
        title: UniFi device lifecycle and support

  - uid: mondoo-unifi-security-dpi-enabled
    title: Ensure Deep Packet Inspection is enabled
    impact: 40
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-16
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-4
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-6
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    mql: |
      unifi.siteSettings.dpiEnabled == true
    docs:
      desc: |
        This check ensures that Deep Packet Inspection (DPI) is enabled on the UniFi controller.

        **Why this matters**

        DPI provides application-level visibility into the traffic crossing the network:
          - Without DPI, traffic is only classified by port, which malware and tunneling tools routinely evade.
          - DPI surfaces anomalous applications and destinations that flat flow logs miss.
          - It is the data source behind UniFi's traffic-identification, fingerprinting, and several threat-management features.

        Enabling DPI improves the network's detection and monitoring posture.
      audit: |
        To verify Deep Packet Inspection using the UniFi Network web application:

        1. Sign in to the UniFi Network web application.
        2. Go to **Settings > Security** (or **Settings > System**, depending on version).
        3. Review the **Deep Packet Inspection** setting.

        If DPI is enabled, the check passes. If it is disabled, the check fails.
      remediation:
        - id: console
          desc: |
            To enable Deep Packet Inspection using the UniFi Network web application:

            1. Go to the security/system settings.
            2. Enable **Deep Packet Inspection**.
        # No cli remediation: DPI is a controller-managed site setting; the device SSH CLI cannot change it and the controller overwrites local changes on provision.
    refs:
      - url: https://help.ui.com/hc/en-us/articles/360038690813
        title: UniFi traffic identification and DPI

  - uid: mondoo-unifi-security-geo-ip-filtering-enabled
    title: Ensure geo-IP firewall filtering is enabled
    impact: 40
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-1
      compliance/vda-isa-5: vda-isa-5-5-2-2
    mql: |
      unifi.siteSettings.gateway.geoIpFilteringEnabled == true
    docs:
      desc: |
        This check ensures that geo-IP firewall filtering is enabled on the UniFi gateway.

        **Why this matters**

        Geo-IP filtering blocks traffic to and from countries the organization has no legitimate business with:
          - It removes large swaths of the internet (and the attackers operating from them) from the reachable attack surface.
          - It reduces inbound scanning, brute-force, and command-and-control traffic from high-risk regions.
          - Combined with explicit firewall rules, it provides defense-in-depth at the network boundary.

        Note that geo-IP filtering is a coarse control and is not a substitute for proper firewall rules, but it meaningfully reduces exposure.
      audit: |
        To verify geo-IP filtering using the UniFi Network web application:

        1. Sign in to the UniFi Network web application.
        2. Go to **Settings > Security > Geo IP Filtering** (or **Settings > Internet Security**, depending on version).
        3. Review whether geo-IP filtering is enabled and which countries and direction are configured.

        If geo-IP filtering is enabled, the check passes. If it is disabled, the check fails.
      remediation:
        - id: console
          desc: |
            To enable geo-IP filtering using the UniFi Network web application:

            1. Go to the gateway/internet security settings.
            2. Enable **Geo IP Filtering**.
            3. Choose **Block** (or **Allow**) mode, select the countries, and set the traffic direction (both, ingress, or egress) appropriate for your environment.
        # No cli remediation: gateway security is a controller-managed site setting; the device SSH CLI cannot change it and the controller overwrites local changes on provision.
    refs:
      - url: https://help.ui.com/hc/en-us/articles/115003173168
        title: UniFi gateway settings
