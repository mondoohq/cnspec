      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/pci-dss-4: pcidss-requirement-1-4-1
      compliance/soc2-2017: soc2-control-cc6-1-5
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-vmware-vsphere-esxi-security-baseline-ensure-port-groups-are-not-configured-to-vlan-4095-and-0-except-for-virtual-vsphere
        tags:
          mondoo.com/filter-title: VMware ESXi
          mondoo.com/filter-icon: vmware
      - uid: mondoo-vmware-vsphere-esxi-security-baseline-ensure-port-groups-are-not-configured-to-vlan-4095-and-0-except-for-virtual-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-vmware-vsphere-esxi-security-baseline-ensure-port-groups-are-not-configured-to-vlan-4095-and-0-except-for-virtual-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-vmware-vsphere-esxi-security-baseline-ensure-port-groups-are-not-configured-to-vlan-4095-and-0-except-for-virtual-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |-
        This check ensures that virtual switch port groups avoid VLAN IDs 0 and 4095. VLAN 4095 activates Virtual Guest Tagging, which passes every frame to the guest with its VLAN tags intact, and should be used only when a guest is explicitly built to manage VLAN tags itself.

        **Why this matters**

        - **Intentional VGT use:** Reserving VLAN 4095 for guests configured for Virtual Guest Tagging prevents accidental exposure of trunked traffic.
        - **Defined segmentation:** Avoiding VLAN 0 ensures every port group sits on an explicitly assigned segment.
        - **Reduced misconfiguration:** Excluding these special values keeps port group tagging behavior predictable.

        **Risk mitigation**

        - **Traffic exposure prevention:** Limiting VGT mode stops a guest from seeing VLAN traffic it was never meant to receive.
        - **Containment:** Correct VLAN assignment limits the spread of an attack between network segments.
      audit: |-
        ### Audit via the vSphere Client

        1. Select the host, then select `Configure` and expand `Networking`.
        2. Select `Virtual switches` and expand each standard vSwitch.
        3. In the topology diagram, review the VLAN ID of every port group.

        ### Audit via PowerCLI

        1. Connect to vCenter Server or the ESXi host with `Connect-VIServer`.
        2. List the VLAN ID of every port group:

           ```powershell
           Get-VMHost | Get-VirtualPortGroup | Select-Object VirtualSwitch, Name, VLanId
           ```

        The host passes when no port group uses VLAN ID `0` or `4095`. A port group set to VLAN `0`, or set to VLAN `4095` without a guest explicitly configured for Virtual Guest Tagging, is a failing result.
      remediation:
        - id: vsphere-client
          desc: |
            To set port groups to values other than 4095 and 0 unless VGT is required using the vSphere Client:

            1. From the vSphere Web Client, select the host.
            2. Select `Configure` then expand `Networking`.
            3. Select `Virtual switches`.
            4. Expand the Standard vSwitch.
            5. View the topology diagram of the switch, which shows the various port groups associated with that switch.
            6. For each port group on the vSwitch, verify and record the VLAN IDs used.
            7. If a VLAN ID change is needed, select the name of the port group in the topology diagram of the virtual switch.
            8. Select the `Edit settings` option.
            9. In the Properties section, enter an appropriate name in the `Network label` field.
            10. In the `VLAN ID` dropdown select or type a new VLAN.
            11. Select `OK`.
        - id: terraform
          desc: |
            To keep a port group off VLAN 0 and VLAN 4095 using Terraform, set `vlan_id` to a value between `1` and `4094` on the `vsphere_host_port_group` resource. Use VLAN 4095 only for a guest explicitly configured for Virtual Guest Tagging:

            ```hcl
            resource "vsphere_host_port_group" "pg" {
              name                = "VM Network"
              host_system_id      = data.vsphere_host.host.id
              virtual_switch_name = vsphere_host_virtual_switch.switch.name

              vlan_id = 100
            }
            ```
  # No Terraform variants: the vsphere Terraform provider does not manage ESXi host advanced settings such as Syslog.global.logHost.
  - uid: mondoo-vmware-vsphere-esxi-security-baseline-ensure-remote-logging-is-configured-for-esxi-hosts
    title: Ensure remote logging is configured for ESXi hosts
    impact: 60
    tags:
      compliance/bsi-sys-1-5: bsi-sys-1-5-a6
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-02
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-pt-1
      compliance/nist-csf-2: nist-csf-2-pr-ps-04
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-9
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-3-3
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    mql: |
      vsphere.host.syslogLogHost != ""
    docs:
      desc: |-
        This check ensures that the ESXi host forwards its logs to a central syslog server. By default ESXi stores logs only on a local scratch volume or ramdisk, so a remote log host is needed to preserve a copy off the host.

        **Why this matters**

        - **Off-host retention:** A central log server keeps log data even if the host's local storage is wiped or fails.
        - **Centralized analysis:** Aggregated logs let events from many hosts be searched and correlated in one place.
        - **Tamper resistance:** Logs shipped off the host are harder for an attacker to alter or delete.

        **Risk mitigation**

        - **Evidence preservation:** Remote logging ensures investigators retain host activity even after a compromise or crash.
        - **Faster detection:** A central log pipeline supports alerting and monitoring across the environment.
      audit: |-
        ### Audit via the vSphere Client

        1. Select the host, then select `Configure` and expand `System`.
        2. Select `Advanced System Settings`.
        3. Enter `Syslog.global.logHost` in the filter and read the current value.

        ### Audit via PowerCLI

        1. Connect to vCenter Server or the ESXi host with `Connect-VIServer`.
        2. Read the setting:

           ```powershell
           Get-VMHost | Get-AdvancedSetting -Name 'Syslog.global.logHost'
           ```

        The host passes when `Syslog.global.logHost` is set to the hostname or IP address of a central log server. An empty value is a failing result.
      remediation:
        - id: vsphere-client
          desc: |
            To configure remote logging properly using the vSphere Client:

            1. Select the host
            2. Select `Configure` then expand `System` then select `Advanced System Settings`.
            3. Select `Edit` then enter `Syslog.global.logHost` in the filter.
            4. Set the `Syslog.global.logHost` to the hostname or IP address of the central log server.
            5. Select `OK`.

            **Note:**
            When setting a remote log host, it is also recommended to set the "Syslog.global.logDirUnique" to true. You must configure the syslog settings for each host.
        - id: powershell
          desc: |
            To configure remote logging using PowerCLI, replacing the example with the hostname or IP address of the central log server:

            ```powershell
            Get-VMHost | Get-AdvancedSetting -Name Syslog.global.logHost | Set-AdvancedSetting -Value "syslog.example.com"
            ```
        # No Terraform remediation: the remote syslog host is a runtime host advanced setting with no Terraform resource.
  # No Terraform variants: the vsphere Terraform provider does not manage ESXi host services such as the TSM-SSH daemon.
  - uid: mondoo-vmware-vsphere-esxi-security-baseline-ensure-ssh-is-disabled
    title: Ensure SSH is disabled
    impact: 75
    tags:
      compliance/bsi-sys-1-5: bsi-sys-1-5-a22
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-04
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-pt-3
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-6
      compliance/pci-dss-4: pcidss-requirement-2-2-4
      compliance/soc2-2017: soc2-control-cc7-1-1
      compliance/vda-isa-5: vda-isa-5-5-2-3
    mql: |
      vsphere.host.services.where( key == "TSM-SSH").all( running == false )
      vsphere.host.services.where( key == "TSM-SSH").all( policy == "off" )
    docs:
      desc: |-
        This check ensures that the Secure Shell service is stopped and set to start manually on the ESXi host. SSH provides remote access to the ESXi shell, which should be enabled only when troubleshooting or diagnostics require it.

        **Why this matters**

        - **Reduced remote access:** A stopped SSH service removes a network path into the privileged ESXi shell.
        - **vCenter-centered management:** Routine administration flows through vCenter Server rather than direct shell sessions.
        - **No automatic restart:** A manual startup policy prevents SSH from coming back on after a reboot.

        **Risk mitigation**

        - **Brute-force exposure:** Disabling SSH removes an interface attackers commonly target for credential guessing.
        - **Controlled enablement:** SSH is turned on deliberately for a specific task and stopped again afterward.
      audit: |-
        ### Audit via the vSphere Client

        1. Select the host, then select `Configure` and expand `System`.
        2. Select `Services` and locate the `SSH` service.
        3. Confirm the service is `Stopped` and its startup policy is `Start and stop manually`.

        ### Audit via PowerCLI

        1. Connect to vCenter Server or the ESXi host with `Connect-VIServer`.
        2. Inspect the SSH service state and startup policy:

           ```powershell
           Get-VMHost | Get-VMHostService | Where-Object { $_.Key -eq 'TSM-SSH' } |
             Select-Object VMHost, Key, Running, Policy
           ```

        The host passes when the `TSM-SSH` service is not running and its `Policy` is `off`. A running service or a policy of `on` is a failing result.
      remediation:
        - id: vsphere-client
          desc: |
            To disable SSH using the vSphere Client:

            1. From the vSphere Web Client, select the host.
            2. Select `Configure` then expand `System` and select `Services`.
            3. Select `SSH` then select `Edit Startup Policy`.
            4. Set the Startup Policy is set to `Start and Stop Manually`.
            5. Select `OK`.
            6. While `SSH` is still selected, select `Stop`.

            **Impact:**

            In troubleshooting and assessment scenarios having SSH disabled, which is the default, may prevent connections to the host by tools or via other methods.
        - id: powershell
          desc: |
            To stop the SSH service and set it to start manually on all hosts using PowerCLI:

            ```powershell
            Get-VMHost | Get-VMHostService | Where-Object { $_.Key -eq "TSM-SSH" } | Set-VMHostService -Policy Off
            Get-VMHost | Get-VMHostService | Where-Object { $_.Key -eq "TSM-SSH" } | Stop-VMHostService -Confirm:$false
            ```
        # No Terraform remediation: SSH service state and startup policy are runtime host configuration with no Terraform resource.
  # No Terraform variants: the vsphere Terraform provider does not manage ESXi host lockdown mode.
  - uid: mondoo-vmware-vsphere-esxi-security-baseline-ensure-strict-lockdown-mode-is-enabled
    title: Ensure Strict Lockdown mode is enabled
    impact: 80
    tags:
      compliance/bsi-sys-1-5: bsi-sys-1-5-a5
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-04
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-2
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-3
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-6
      compliance/pci-dss-4: pcidss-requirement-2-2-4
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-5-2-7
    mql: |
      vsphere.host.properties['config']['lockdownMode'] == "lockdownStrict"
    docs:
      desc: |-
        This check ensures that Strict lockdown mode is enabled, which disables direct local access to the ESXi host and also disables the Direct Console User Interface. Strict mode requires the host to be managed exclusively through vCenter Server.

        **Why this matters**

        - **Strongest access restriction:** Strict mode removes both local shell and console paths, leaving vCenter as the only management surface.
        - **Centralized control:** All administration is subject to vCenter authentication, role enforcement, and audit logging.
        - **Reduced attack surface:** Disabling the console eliminates an interface that bypasses vCenter entirely.

        **Risk mitigation**

        - **Bypass prevention:** Strict lockdown stops any change being made directly on the host outside vCenter oversight.
        - **Lockout planning required:** Because the console is disabled, a loss of vCenter connectivity can require reinstalling ESXi, so recovery procedures must be in place.
      audit: |-
        ### Audit via the vSphere Client

        1. Select the host, then select `Configure` and expand `System`.
        2. Select `Security Profile` and review the `Lockdown Mode` status.

        ### Audit via PowerCLI

        1. Connect to vCenter Server with `Connect-VIServer`.
        2. Read the lockdown state of each host:

           ```powershell
           Get-VMHost | Select-Object Name, @{N='LockdownMode';E={$_.ExtensionData.Config.LockdownMode}}
           ```

        The host passes when the lockdown mode is `lockdownStrict`. A value of `lockdownDisabled` or `lockdownNormal` is a failing result for this check.
      remediation:
        - id: vsphere-client
          desc: |
            To enable lockdown mode using the vSphere Client:

            1. From the vSphere Web Client, select the host.
            2. Select `Configure`, then expand `System` and select `Security Profile`.
            3. Across from `Lockdown Mode` select `Edit`.
            4. Select the radio button for `Strict`.
            5. Select `OK`.

            **Impact:**

            With lockdown mode enabled, the host will only be accessible through vCenter preventing 'local' access. Disabling the DCUI can create a potential "lockout" situation, should the host become isolated from vCenter Server. Recovering from a "lockout" scenario requires reinstalling ESXi. Consider leaving DCUI enabled, and instead enable lockdown mode and limit the users allowed to access the DCUI using the DCUI. Access list.
        - id: powershell
          desc: |
            To enable strict lockdown mode for each host using PowerCLI:

            ```powershell
            Get-VMHost | ForEach-Object {
              $accessManager = Get-View $_.ExtensionData.ConfigManager.HostAccessManager
              $accessManager.ChangeLockdownMode("lockdownStrict")
            }
            ```

            **Impact:**

            Strict lockdown mode disables the DCUI. If the host loses connectivity to vCenter Server, recovery can require reinstalling ESXi, so confirm recovery procedures before applying this at scale.
        # No Terraform remediation: host lockdown mode is runtime host configuration with no Terraform resource.
  # No Terraform variants: the vsphere Terraform provider does not manage ESXi host advanced settings such as UserVars.DcuiTimeOut.
  - uid: mondoo-vmware-vsphere-esxi-security-baseline-ensure-the-dcui-timeout-is-set-to-600-seconds-or-less
    title: Ensure the DCUI timeout is set to 600 seconds or less
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iii-access-control-automatic-logoff
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-3
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-12
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-11
      compliance/pci-dss-4: pcidss-requirement-8-2-8
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-1-2
    mql: |
      vsphere.host.dcuiTimeOut <= 600
      vsphere.host.dcuiTimeOut != 0
    docs:
      desc: |-
        This check ensures that an idle Direct Console User Interface session is terminated after no more than 600 seconds. The Direct Console User Interface allows local login and host management, and an idle timeout closes sessions an operator opened but left unattended.

        **Why this matters**

        - **Abandoned session cleanup:** Idle console sessions are closed before an unattended terminal can be misused.
        - **Bounded exposure:** A short timeout limits how long a privileged local session stays open after the operator steps away.
        - **Enforced discipline:** Automatic termination removes reliance on operators logging out manually.

        **Risk mitigation**

        - **Physical access risk reduction:** A 600-second limit shrinks the window for someone with console access to reuse an open session.
        - **Consistent enforcement:** A non-zero value keeps the timeout active rather than disabling it entirely.
      audit: |-
        ### Audit via the vSphere Client

        1. Select the host, then select `Configure` and expand `System`.
        2. Select `Advanced System Settings`.
        3. Enter `UserVars.DcuiTimeOut` in the filter and read the current value.

        ### Audit via PowerCLI

        1. Connect to vCenter Server or the ESXi host with `Connect-VIServer`.
        2. Read the setting:

           ```powershell
           Get-VMHost | Get-AdvancedSetting -Name 'UserVars.DcuiTimeOut'
           ```

        The host passes when `UserVars.DcuiTimeOut` is between `1` and `600` seconds. A value greater than `600`, or `0` (which disables the timeout entirely), is a failing result.
      remediation:
        - id: vsphere-client
          desc: |
            To correct the DCUI timeout setting using the vSphere Client:

            1. From the vSphere Web Client, select the host.
            2. Select `Configure`, then under `System` select `Advanced System Settings`.
            3. Select `Edit` then enter `UserVars.DcuiTimeOut` in the filter.
            4. Change the current value to 600 seconds or less.
        - id: powershell
          desc: |
            To correct the DCUI timeout setting using PowerCLI:

            ```
            Get-VMHost | Get-AdvancedSetting -Name UserVars.DcuiTimeOut | Set-AdvancedSetting -Value 600
            ```
        # No Terraform remediation: the DCUI timeout is a runtime host advanced setting with no Terraform resource.
  # No Terraform variants: the vsphere Terraform provider does not manage ESXi host advanced settings such as Mem.ShareForceSalting.
  - uid: mondoo-vmware-vsphere-esxi-security-baseline-ensure-the-default-value-of-individual-salt-per-vm-is-configured
    title: Ensure the default value of individual salt per vm is configured
    impact: 60
    tags:
      compliance/bsi-sys-1-5: bsi-sys-1-5-a22
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-04
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ds-5
      compliance/nist-csf-2: nist-csf-2-pr-ps-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-4
      compliance/pci-dss-4: pcidss-requirement-2-2-6
      compliance/soc2-2017: soc2-control-cc7-1-1
      compliance/vda-isa-5: vda-isa-5-5-3-1
    mql: vsphere.host.memShareForceSalting == 2
    docs:
      desc: |-
        This check ensures that per-virtual-machine salting for Transparent Page Sharing is set to its default of 2. With this setting each virtual machine receives a distinct salt, so memory pages are shared only within a single virtual machine and never across virtual machines.

        **Why this matters**

        - **Inter-VM isolation:** Distinct salts prevent memory pages from being deduplicated across separate virtual machines.
        - **Side-channel defense:** Cross-VM page sharing has been shown to leak information through timing-based memory disclosure attacks.
        - **Safe default preserved:** A value of 2 keeps salting enabled as the vendor intends rather than relaxing it.

        **Risk mitigation**

        - **Information leakage prevention:** Restricting sharing to intra-VM pages removes a channel for one tenant to infer another's data.
        - **Tenant separation:** Per-VM salting reinforces the boundary between workloads sharing the same host.
      audit: |-
        ### Audit via the vSphere Client

        1. Select the host, then select `Configure` and expand `System`.
        2. Select `Advanced System Settings`.
        3. Enter `Mem.ShareForceSalting` in the filter and read the current value.

        ### Audit via PowerCLI

        1. Connect to vCenter Server or the ESXi host with `Connect-VIServer`.
        2. Read the setting:

           ```powershell
           Get-VMHost | Get-AdvancedSetting -Name 'Mem.ShareForceSalting'
           ```

        The host passes when `Mem.ShareForceSalting` is `2`. Any other value is a failing result.
      remediation:
        - id: vsphere-client
          desc: |
            To configure per-VM salting using the vSphere Client:

            1. Select a host
            2. Select `Configure`, then expand `System` and select `Advanced System settings`.
            3. Select `Edit`, then Filter for `Mem.ShareForceSalting`.
            4. Set the value to `2`.
            5. Select `OK`.

            **Impact:**

            There is potential for a performance impact with this setting depending on environment and infrastructure details.
        - id: powershell
          desc: |
            To configure per-VM salting using PowerCLI:

            ```
            Get-VMHost | Get-AdvancedSetting -Name Mem.ShareForceSalting | Set-AdvancedSetting -Value 2
            ```
        # No Terraform remediation: the Transparent Page Sharing salt setting is a runtime host advanced setting with no Terraform resource.
    refs:
      - url: https://docs.vmware.com/en/VMware-vSphere/8.0/vsphere-security/GUID-E9B71B85-FBA3-447C-8A60-DEA2FE111F4F.html
        title: Securing ESXi Hosts
  # No Terraform variants: the vsphere Terraform provider does not manage ESXi host firewall rulesets or their allowed-IP networks.
  - uid: mondoo-vmware-vsphere-esxi-security-baseline-ensure-the-esxi-host-firewall-is-configured-to-restrict-access-to-services-r
    title: Ensure the ESXi host firewall restricts access to running services
    impact: 60
    tags:
      compliance/bsi-sys-1-5: bsi-sys-1-5-a22
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-pt-4
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-4-1
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-3
    mql: |
      vsphere.host.services.where( running == true ).all( ruleset != [] )
      vsphere.host.properties['config']['firewall']['ruleset'].all( _['allowedHosts']['allIp'] == false )
      vsphere.host.properties['config']['firewall']['ruleset'].all( _['allowedHosts']['ipNetwork'] != null )
    docs:
      desc: |-
        This check ensures that the ESXi host firewall restricts each running service to specific authorized networks. The firewall is enabled by default, but a ruleset that allows all IP addresses leaves a service reachable from anywhere.

        **Why this matters**

        - **Scoped access:** Limiting each ruleset to defined networks ensures only intended clients can reach a service.
        - **No open services:** Disabling the allow-all setting prevents a service from being exposed to the entire network.
        - **Defined boundaries:** Every running service is tied to an explicit allowed network rather than an implicit default.

        **Risk mitigation**

        - **Exposure reduction:** Restricting source addresses shrinks the population of hosts that can attack a management service.
        - **Lateral movement containment:** Network-scoped rulesets make it harder for a compromised host to pivot to ESXi services.
      audit: |-
        ### Audit via the vSphere Client

        1. Select the host, then select `Configure` and expand `System`.
        2. Select `Firewall` and review the enabled services.
        3. For each enabled service, confirm `Allowed IP Addresses` lists specific networks rather than allowing all IP addresses.

        ### Audit via the ESXi shell

        1. Connect to the ESXi host with SSH.
        2. List the firewall rulesets and their allowed IP ranges:

           ```bash
           esxcli network firewall ruleset list
           esxcli network firewall ruleset allowedip list
           ```

        The host passes when every running service is associated with a firewall ruleset, no ruleset allows all IP addresses, and each ruleset defines a specific allowed network. A ruleset with `Allow All IP` enabled or with no allowed network is a failing result.
      remediation:
        - id: vsphere-client
          desc: |
            To properly restrict access to services running on an ESXi host using the vSphere Client:

            1. Select a host
            2. Select `Configure`, then expand `System` and select `Firewall`.
            3. Select `Edit` to view services which are enabled (indicated by a check).
            4. For each enabled service, (e.g., ssh, vSphere Web Access, http client) provide a list of allowed IP addresses.
            5. Select `OK`.

            **Impact:**

            Connections from IP addresses and ranges that are not explicitly set will be denied. Take care to ensure appropriate IPs/IP address ranges are allowed.
        # No Terraform remediation: the host firewall ruleset configuration is runtime host state with no Terraform resource.
  # No Terraform variants: the vsphere Terraform provider does not manage the ESXi host SSL machine certificate or its validity period.
  - uid: mondoo-vmware-vsphere-esxi-security-baseline-ensure-the-esxi-host-ssl-certificate-is-not-expired-or-expiring-soon
    title: Ensure the ESXi host SSL certificate is not expired or expiring soon
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-2-ii-transmission-security-encryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-2
      compliance/nist-csf-2: nist-csf-2-pr-ds-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-8
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-15
      compliance/pci-dss-4: pcidss-requirement-4-2-1
      compliance/soc2-2017: soc2-control-cc6-7-2
      compliance/vda-isa-5: vda-isa-5-5-1-2
    mql: |
      vsphere.host.certificate.notAfter - time.now > 90 * time.day
    docs:
      desc: |-
        This check ensures that the ESXi host machine certificate remains valid for at least 90 more days. Each host presents an SSL/TLS certificate to secure management connections from vCenter Server and API clients, and an expired certificate breaks the trust relationship with vCenter.

        **Why this matters**

        - **Uninterrupted management:** A valid certificate keeps vCenter and API clients able to connect to the host.
        - **Renewal lead time:** A 90-day window gives operators time to renew or replace the certificate before it expires.
        - **No insecure workarounds:** Avoiding expiration removes the temptation to disable certificate validation during an outage.

        **Risk mitigation**

        - **Trust preservation:** A current certificate maintains an authenticated, encrypted channel between the host and vCenter.
        - **Outage prevention:** Renewing ahead of expiration avoids an interruption to host management.
      audit: |-
        ### Audit via the vSphere Client

        1. Select the host, then select `Configure` and expand `System`.
        2. Select `Certificate` and review the `Valid To` date of the host machine certificate.

        ### Audit via PowerCLI

        1. Connect to vCenter Server with `Connect-VIServer`.
        2. Read the certificate expiration of each host:

           ```powershell
           Get-VMHost | ForEach-Object {
             (Get-View $_.ExtensionData.ConfigManager.CertificateManager).CertificateInfo
           }
           ```

        The host passes when the certificate's expiration date is more than 90 days in the future. A certificate that is expired or expires within 90 days is a failing result.
      remediation:
        - id: vsphere-client
          desc: |
            To renew or replace an expiring ESXi host certificate using the vSphere Client:

            1. Select the host.
            2. Select `Configure`, then expand `System` and select `Certificate`.
            3. Review the validity period, then select `Renew` to issue a new certificate from the VMware Certificate Authority, or `Import` to install a certificate signed by an enterprise or public CA.
            4. Confirm the host reconnects to vCenter Server successfully.

            For environments using custom CA-signed certificates, ensure a renewal process is in place well ahead of the expiration date.
        # No Terraform remediation: certificate expiry is observed runtime host state, not declarable Terraform configuration.
    refs:
      - url: https://docs.vmware.com/en/VMware-vSphere/8.0/vsphere-security/GUID-E9B71B85-FBA3-447C-8A60-DEA2FE111F4F.html
        title: Securing ESXi Hosts
  # No Terraform variants: the vsphere Terraform provider does not manage ESXi host services such as the TSM (ESXi Shell) daemon.
  - uid: mondoo-vmware-vsphere-esxi-security-baseline-ensure-the-esxi-shell-is-disabled
    title: Ensure the ESXi shell is disabled
    impact: 75
    tags:
      compliance/bsi-sys-1-5: bsi-sys-1-5-a22
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-04
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-pt-3
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-6
      compliance/pci-dss-4: pcidss-requirement-2-2-4
      compliance/soc2-2017: soc2-control-cc7-1-1
      compliance/vda-isa-5: vda-isa-5-5-2-3
    mql: |
      vsphere.host.services.where( key == "TSM").all( running == false )
      vsphere.host.services.where( key == "TSM").all( policy == "off" )
    docs:
      desc: |-
        This check ensures that the ESXi shell service is stopped and set to start manually. The ESXi shell is an interactive command line environment reachable from the Direct Console User Interface or over SSH, and it should be enabled only while running diagnostics or troubleshooting.

        **Why this matters**

        - **Reduced privileged access:** A stopped shell service removes a powerful command line interface from everyday availability.
        - **vCenter-centered management:** Routine administration flows through vCenter Server rather than direct shell sessions.
        - **No automatic restart:** A manual startup policy prevents the shell from re-enabling after a reboot.

        **Risk mitigation**

        - **Attack surface reduction:** Disabling the shell removes an interface that grants direct control over the host.
        - **Controlled enablement:** The shell is turned on deliberately for a specific task and stopped again afterward.
      audit: |-
        ### Audit via the vSphere Client

        1. Select the host, then select `Configure` and expand `System`.
        2. Select `Services` and locate the `ESXi Shell` service.
        3. Confirm the service is `Stopped` and its startup policy is `Start and stop manually`.

        ### Audit via PowerCLI

        1. Connect to vCenter Server or the ESXi host with `Connect-VIServer`.
        2. Inspect the ESXi shell service state and startup policy:

           ```powershell
           Get-VMHost | Get-VMHostService | Where-Object { $_.Key -eq 'TSM' } |
             Select-Object VMHost, Key, Running, Policy
           ```

        The host passes when the `TSM` service is not running and its `Policy` is `off`. A running service or a policy of `on` is a failing result.
      remediation:
        - id: vsphere-client
          desc: |
            To disable the ESXi shell using the vSphere Client:

            1. From the vSphere Web Client, select the host.
            2. Select `Configure`, then expand `System` and select `Services`.
            3. Select `ESXi Shell`, then select `Edit Startup Policy`.
            4. Set the Startup Policy is set to `Start and Stop Manually`.
            5. Select `OK`.
        - id: powershell
          desc: |
            To stop the ESXi shell service and set it to start manually on all hosts using PowerCLI:

            ```powershell
            Get-VMHost | Get-VMHostService | Where-Object { $_.Key -eq "TSM" } | Set-VMHostService -Policy Off
            Get-VMHost | Get-VMHostService | Where-Object { $_.Key -eq "TSM" } | Stop-VMHostService -Confirm:$false
            ```
        # No Terraform remediation: ESXi Shell service state and startup policy are runtime host configuration with no Terraform resource.
  # No Terraform variants: the vsphere Terraform provider does not manage the ESXi host image profile VIB acceptance level.
  - uid: mondoo-vmware-vsphere-esxi-security-baseline-ensure-the-image-profile-vib-acceptance-level-is-configured-properly
    title: Ensure the Image Profile VIB acceptance level is configured properly
    impact: 60
    tags:
      compliance/bsi-sys-1-5: bsi-sys-1-5-a22
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-04
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-19
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ds-6
      compliance/nist-csf-2: nist-csf-2-pr-ps-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-8
      compliance/pci-dss-4: pcidss-requirement-2-2-1
      compliance/soc2-2017: soc2-control-cc7-1-4
      compliance/vda-isa-5: vda-isa-5-5-2-3
    mql: vsphere.host.acceptanceLevel == /VMwareCertified|VMwareAccepted|PartnerSupported/
    docs:
      desc: |-
        This check ensures that the ESXi image profile acceptance level is set to VMware Certified, VMware Accepted, or Partner Supported. The acceptance level controls which vSphere Installation Bundles may be installed, and the Community Supported level allows bundles that no trusted party has tested.

        **Why this matters**

        - **Verified software origin:** The accepted levels only admit bundles created, tested, or signed by VMware or a certified partner.
        - **Untrusted code blocked:** Excluding the Community Supported level keeps unvetted bundles off the host.
        - **Consistent trust baseline:** A defined acceptance level applies the same standard to every installed component.

        **Risk mitigation**

        - **Supply chain protection:** Requiring a trusted acceptance level reduces the risk of installing malicious or unstable software.
        - **Hypervisor integrity:** Restricting installable bundles supports a fully signed and verifiable host image.
      audit: |-
        ### Audit via the vSphere Client

        1. Select the host, then select `Configure` and expand `System`.
        2. Select `Security Profile` and review the `Host Image Profile Acceptance Level`.

        ### Audit via the ESXi shell

        1. Connect to the ESXi host with SSH.
        2. Read the software acceptance level:

           ```bash
           esxcli software acceptance get
           ```

        The host passes when the acceptance level is `VMwareCertified`, `VMwareAccepted`, or `PartnerSupported`. An acceptance level of `CommunitySupported` is a failing result.
      remediation:
        - id: vsphere-client
          desc: |
            To set the host image profile acceptance level using the vSphere Client:

            1. From the vSphere Web Client, select the host.
            2. Select `Configure`, then under `System` and select `Security Profile`.
            3. Under `Host Image Profile Acceptance Level` select `Edit`
            4. In the dropdown select one of the following - `VMware Certified`, `VMware Accepted`, or `Partner Supported`.

            **Impact:**

            Unsigned (Community Supported) VIBs will not be able to be utilized on a host.
        - id: powershell
          desc: |
            To set the host image profile acceptance level using PowerCLI. In the example code the level is Partner Supported:

            ```powershell
            foreach ($vmHost in Get-VMHost) {
              $esxcli = Get-EsxCli -VMHost $vmHost
              $esxcli.software.acceptance.Set("PartnerSupported")
            }
            ```
        # No Terraform remediation: the image profile acceptance level is runtime host configuration with no Terraform resource.
  # No Terraform variants: the vsphere Terraform provider does not manage ESXi host advanced settings such as Security.AccountLockFailures.
  - uid: mondoo-vmware-vsphere-esxi-security-baseline-ensure-the-maximum-failed-login-attempts-is-set-to-5
    title: Ensure the maximum failed login attempts is set to 5
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-308-a-5-ii-c-security-awareness-training-and-tools-log-in-monitoring
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-8
      compliance/pci-dss-4: pcidss-requirement-8-3-4
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-2
    mql: |
      vsphere.host.accountLockFailures == 5
    docs:
      desc: |-
        This check ensures that an account is locked after 5 consecutive failed login attempts. A bounded failure count locks an account that is under attack before an attacker can work through a large set of password guesses.

        **Why this matters**

        - **Brute-force resistance:** A low failure threshold stops password-guessing attacks after only a few attempts.
        - **Early lockout:** The account is protected well before an attacker can exhaust common password lists.
        - **Consistent enforcement:** A fixed limit applies the same protection to every account on the host.

        **Risk mitigation**

        - **Credential compromise prevention:** Locking the account at 5 failures sharply reduces the chance of a successful guess.
        - **Attack visibility:** Repeated lockouts surface accounts that are actively being targeted.
      audit: |-
        ### Audit via the vSphere Client

        1. Select the host, then select `Configure` and expand `System`.
        2. Select `Advanced System Settings`.
        3. Enter `Security.AccountLockFailures` in the filter and read the current value.

        ### Audit via PowerCLI

        1. Connect to vCenter Server or the ESXi host with `Connect-VIServer`.
        2. Read the setting:

           ```powershell
           Get-VMHost | Get-AdvancedSetting -Name 'Security.AccountLockFailures'
           ```

        The host passes when `Security.AccountLockFailures` is `5`. Any other value is a failing result.
      remediation:
        - id: vsphere-client
          desc: |
            To set the maximum failed login attempts correctly using the vSphere Client:

            1. From the vSphere Web Client, select the host.
            2. Select `Configure`, then expand `System`.
            3. Select `Advanced System Settings` then select `Edit`.
            4. Enter `Security.AccountLockFailures` in the filter.
            5. Set the value for this parameter to `5`.

            **Impact:**

            A users account will be locked after 5 unsuccessful login attempts.
        - id: powershell
          desc: |
            To set the maximum failed login attempts correctly using PowerCLI:

            ```powershell
            Get-VMHost | Get-AdvancedSetting -Name Security.AccountLockFailures | Set-AdvancedSetting -Value 5
            ```
        # No Terraform remediation: the maximum failed-login count is a runtime host advanced setting with no Terraform resource.
  # No Terraform variants: the vsphere Terraform provider does not manage ESXi host advanced settings such as UserVars.ESXiShellTimeOut.
  - uid: mondoo-vmware-vsphere-esxi-security-baseline-ensure-the-shell-services-timeout-is-set-to-1-hour-or-less
    title: Ensure the shell services timeout is set to 1 hour or less
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iii-access-control-automatic-logoff
      compliance/iso-27001-2022: iso-27001-2022-a-8-18
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-3
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-12
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-11
      compliance/pci-dss-4: pcidss-requirement-8-2-8
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-1-2
    mql: |
      vsphere.host.esxiShellTimeOut <= 3600
      vsphere.host.esxiShellTimeOut != 0
    docs:
      desc: |-
        This check ensures that the ESXi shell and SSH services automatically stop after no more than 1 hour. Without this timeout the services run indefinitely once enabled, leaving remote access available long after the work that required it is finished.

        **Why this matters**

        - **Automatic shutdown:** The shell and SSH services stop on their own rather than staying enabled until someone remembers them.
        - **Bounded availability:** A 1-hour limit keeps these services reachable only for the duration of a typical task.
        - **Defense in depth:** This timeout complements the idle session timeout to cover both unattended and forgotten access.

        **Risk mitigation**

        - **Exposure reduction:** Limiting service uptime shrinks the window during which remote shell access can be attacked.
        - **Consistent enforcement:** A non-zero value keeps the timeout active rather than disabling it entirely.
      audit: |-
        ### Audit via the vSphere Client

        1. Select the host, then select `Configure` and expand `System`.
        2. Select `Advanced System Settings`.
        3. Enter `UserVars.ESXiShellTimeOut` in the filter and read the current value.

        ### Audit via PowerCLI

        1. Connect to vCenter Server or the ESXi host with `Connect-VIServer`.
        2. Read the setting:

           ```powershell
           Get-VMHost | Get-AdvancedSetting -Name 'UserVars.ESXiShellTimeOut'
           ```

        The host passes when `UserVars.ESXiShellTimeOut` is between `1` and `3600` seconds. A value greater than `3600`, or `0` (which disables the timeout entirely), is a failing result.
      remediation:
        - id: vsphere-client
          desc: |
            To set the timeout to the desired value using the vSphere Client:

            1. From the vSphere Web Client, select the host.
            2. Select `Configure`, then expand `System`.
            3. Select `Advanced System Settings`, then select `Edit`.
            4. Enter `ESXiShellTimeOut` in the filter.
            5. Set the value for this parameter is set to `3600` (1 hour) or less
            6. Select `OK`.

            **Note:**
            A value of 0 disables the ESXiShellTimeOut.
        - id: powershell
          desc: |
            To set UserVars.ESXiShellTimeOut to 3600 on all hosts using PowerCLI:

            ```powershell
            Get-VMHost | Get-AdvancedSetting -Name 'UserVars.ESXiShellTimeOut' | Set-AdvancedSetting -Value "3600"
            ```
        # No Terraform remediation: the shell services timeout is a runtime host advanced setting with no Terraform resource.
  # No Terraform variants: the vsphere Terraform provider does not manage ESXi host services such as the slpd (CIM SLP) daemon.
  - uid: mondoo-vmware-vsphere-esxi-security-baseline-ensure-the-slp-service-is-disabled
    title: Ensure the SLP service is disabled
    impact: 80
    tags:
      compliance/bsi-sys-1-5: bsi-sys-1-5-a22
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-04
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-pt-3
      compliance/nist-csf-2: nist-csf-2-pr-ps-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-6
      compliance/pci-dss-4: pcidss-requirement-2-2-4
      compliance/soc2-2017: soc2-control-cc7-1-1
      compliance/vda-isa-5: vda-isa-5-5-2-3
    mql: |
      vsphere.host.services.where( key == "slpd" ).all( running == false )
      vsphere.host.services.where( key == "slpd" ).all( policy == "off" )
    docs:
      desc: |-
        This check ensures that the Service Location Protocol daemon, `slpd`, is stopped and set to start manually. SLP lets ESXi advertise and discover services such as CIM-based hardware monitoring, and it should be disabled on hosts that do not require it.

        **Why this matters**

        - **Known vulnerability target:** SLP has been the subject of multiple critical ESXi flaws, including CVE-2021-21974, which ransomware campaigns exploited at scale.
        - **Reduced attack surface:** A stopped service removes a network-facing component that attackers actively scan for.
        - **Rarely needed:** Most hosts do not depend on CIM-based hardware monitoring over SLP, so the daemon serves no purpose.

        **Risk mitigation**

        - **Exploit prevention:** Disabling `slpd` removes the service that ransomware campaigns have used to compromise ESXi hosts.
        - **No automatic restart:** A manual startup policy keeps the daemon from re-enabling after a reboot.
      audit: |-
        ### Audit via the vSphere Client

        1. Select the host, then select `Configure` and expand `System`.
        2. Select `Services` and locate the `slpd` service.
        3. Confirm the service is `Stopped` and its startup policy is `Start and stop manually`.

        ### Audit via PowerCLI

        1. Connect to vCenter Server or the ESXi host with `Connect-VIServer`.
        2. Inspect the SLP service state and startup policy:

           ```powershell
           Get-VMHost | Get-VMHostService | Where-Object { $_.Key -eq 'slpd' } |
             Select-Object VMHost, Key, Running, Policy
           ```

        The host passes when the `slpd` service is not running and its `Policy` is `off`. A running service or a policy of `on` is a failing result.
      remediation:
        - id: vsphere-client
          desc: |
            To disable the SLP service using the vSphere Client:

            1. From the vSphere Web Client, select the host.
            2. Select `Configure`, then expand `System` and select `Services`.
            3. Select `slpd`, then select `Stop`.
            4. Select `Edit Startup Policy` and set it to `Start and stop manually`.
            5. Select `OK`.
        - id: cli
          desc: |
            To disable the SLP service using the ESXi shell:

            1. Verify the SLP service is not in use:

               ```bash
               esxcli system slp stats get
               ```

            2. Stop the service, block its firewall ruleset, and prevent it from starting at boot:

               ```bash
               /etc/init.d/slpd stop
               esxcli network firewall ruleset set --ruleset-id CIMSLP --enabled false
               chkconfig slpd off
               ```
        # No Terraform remediation: SLP service state and startup policy are runtime host configuration with no Terraform resource.
    refs:
      - url: https://knowledge.broadcom.com/external/article/318251
        title: VMware ESXi SLP Service Security Advisory
  # No Terraform variants: the vsphere Terraform provider does not manage ESXi host services such as the snmpd daemon.
  - uid: mondoo-vmware-vsphere-esxi-security-baseline-ensure-the-snmp-service-is-disabled
    title: Ensure the SNMP service is disabled
    impact: 70
    tags:
      compliance/bsi-sys-1-5: bsi-sys-1-5-a22
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-04
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-pt-3
      compliance/nist-csf-2: nist-csf-2-pr-ps-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-6
      compliance/pci-dss-4: pcidss-requirement-2-2-4
      compliance/soc2-2017: soc2-control-cc7-1-1
      compliance/vda-isa-5: vda-isa-5-5-2-3
    mql: |
      vsphere.host.services.where( key == "snmpd" ).all( running == false )
      vsphere.host.services.where( key == "snmpd" ).all( policy == "off" )
    docs:
      desc: |-
        This check ensures that the SNMP daemon, `snmpd`, is stopped and set to start manually unless monitoring explicitly requires it. SNMP v1 and v2c rely on community strings sent in clear text, which can be sniffed and replayed to read host data or change settings.

        **Why this matters**

        - **Clear-text exposure:** Community-based SNMP transmits credentials without encryption, making them trivial to capture.
        - **Reduced attack surface:** A stopped daemon removes a network service that can leak host information.
        - **Rarely needed by default:** Many hosts do not require SNMP polling, so the service serves no purpose when left running.

        **Risk mitigation**

        - **Information disclosure prevention:** Disabling SNMP stops an attacker from sniffing community strings to enumerate the host.
        - **Stronger alternative:** When monitoring is required, SNMPv3 with authentication and privacy replaces the insecure v1 and v2c protocols.
      audit: |-
        ### Audit via the vSphere Client

        1. Select the host, then select `Configure` and expand `System`.
        2. Select `Services` and locate the `snmpd` service.
        3. Confirm the service is `Stopped` and its startup policy is `Start and stop manually`.

        ### Audit via PowerCLI

        1. Connect to vCenter Server or the ESXi host with `Connect-VIServer`.
        2. Inspect the SNMP service state and startup policy:

           ```powershell
           Get-VMHost | Get-VMHostService | Where-Object { $_.Key -eq 'snmpd' } |
             Select-Object VMHost, Key, Running, Policy
           ```

        The host passes when the `snmpd` service is not running and its `Policy` is `off`. A running service or a policy of `on` is a failing result.
      remediation:
        - id: vsphere-client
          desc: |
            To disable the SNMP service using the vSphere Client:

            1. From the vSphere Web Client, select the host.
            2. Select `Configure`, then expand `System` and select `Services`.
            3. Select `snmpd`, then select `Stop`.
            4. Select `Edit Startup Policy` and set it to `Start and stop manually`.
            5. Select `OK`.
        - id: cli
          desc: |
            To disable the SNMP service using the ESXi shell:

            ```bash
            esxcli system snmp set --enable false
            ```

            If SNMP monitoring is required, configure SNMPv3 with authentication and privacy instead of SNMP v1 or v2c, and record the host as an approved exception to this check because the check requires the `snmpd` service to be stopped:

            ```bash
            esxcli system snmp set --v3targets monitor.example.com@161/poller/priv --authentication SHA1 --privacy AES128
            esxcli system snmp set --enable true
            ```
        # No Terraform remediation: SNMP service state and startup policy are runtime host configuration with no Terraform resource.
  - uid: mondoo-vmware-vsphere-esxi-security-baseline-ensure-the-vswitch-forged-transmits-policy-is-set-to-reject
    title: Ensure the vSwitch Forged Transmits policy is set to reject
    impact: 60
    tags:
      compliance/bsi-sys-1-5: bsi-sys-1-5-a4
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/pci-dss-4: pcidss-requirement-1-4-3
      compliance/soc2-2017: soc2-control-cc6-1-5
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-vmware-vsphere-esxi-security-baseline-ensure-the-vswitch-forged-transmits-policy-is-set-to-reject-vsphere
        tags:
          mondoo.com/filter-title: VMware ESXi
          mondoo.com/filter-icon: vmware
      - uid: mondoo-vmware-vsphere-esxi-security-baseline-ensure-the-vswitch-forged-transmits-policy-is-set-to-reject-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-vmware-vsphere-esxi-security-baseline-ensure-the-vswitch-forged-transmits-policy-is-set-to-reject-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-vmware-vsphere-esxi-security-baseline-ensure-the-vswitch-forged-transmits-policy-is-set-to-reject-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |-
        This check ensures that the Forged Transmits security policy is set to reject on every standard vSwitch and port group. Forged Transmits controls whether a virtual machine may send traffic using a source MAC address other than the one assigned to its virtual adapter.

        **Why this matters**

        - **Source MAC integrity:** Rejecting forged transmits ensures outbound frames carry the adapter's assigned MAC address.
        - **Consistent enforcement:** Applying the policy at both the vSwitch and port group levels prevents an override from weakening it.
        - **Predictable network behavior:** Genuine source addresses keep switching and monitoring accurate.

        **Risk mitigation**

        - **Spoofing prevention:** Blocking forged source MACs stops a virtual machine from impersonating another system on the network.
        - **Attack containment:** Enforced MAC integrity limits traffic injection and interception between virtual machines.
      audit: |-
        ### Audit via the vSphere Client

        1. Select the host, then select `Configure` and expand `Networking`.
        2. Select `Virtual switches` and select `Edit` on each standard vSwitch.
        3. Under `Security`, confirm `Forged transmits` is set to `Reject`, and review the same setting on each port group.

        ### Audit via the ESXi shell

        1. Connect to the ESXi host with SSH.
        2. Read the security policy of each standard vSwitch:

           ```bash
           esxcli network vswitch standard policy security get -v <vSwitch-name>
           ```

        The host passes when `Allow Forged Transmits` is `false` on every standard vSwitch and on every port group. A value of `true` at either level is a failing result.
      remediation:
        - id: vsphere-client
          desc: |
            To set the policy to reject forged transmissions using the vSphere Client:

            1. From the vSphere Web Client, select the host.
            2. Select `Configure`, then expand `Networking`.
            3. Select `Virtual switches`, then select `Edit`.
            4. Select `Security`.
            5. Set `Forged transmits` to `Reject` in the dropdown.
            6. Select `OK`.

            **Impact:**

            This will prevent VMs from changing their effective MAC address. This will affect applications that require this functionality, such as Microsoft Clustering, which requires systems to effectively share a MAC address. This will affect how a layer 2 bridge will operate. This will also affect applications that require a specific MAC address for licensing. An exception should be made for the port groups that these applications are connected to.
        - id: cli
          desc: |
            To set the policy to reject forged transmissions using the ESXi shell:

            ```bash
            esxcli network vswitch standard policy security set -v vSwitch2 -f false
            ```
        - id: terraform
          desc: |
            To reject forged transmits on a standard vSwitch using Terraform, set `allow_forged_transmits` to `false` on the `vsphere_host_virtual_switch` resource:

            ```hcl
            resource "vsphere_host_virtual_switch" "switch" {
              name           = "vSwitch2"
              host_system_id = data.vsphere_host.host.id

              network_adapters = ["vmnic0", "vmnic1"]

              allow_promiscuous      = false
              allow_mac_changes      = false
              allow_forged_transmits = false
            }
            ```
  - uid: mondoo-vmware-vsphere-esxi-security-baseline-ensure-the-vswitch-mac-address-change-policy-is-set-to-reject
    title: Ensure the vSwitch MAC Address Change policy is set to reject
    impact: 60
    tags:
      compliance/bsi-sys-1-5: bsi-sys-1-5-a4
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/pci-dss-4: pcidss-requirement-1-4-3
      compliance/soc2-2017: soc2-control-cc6-1-5
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-vmware-vsphere-esxi-security-baseline-ensure-the-vswitch-mac-address-change-policy-is-set-to-reject-vsphere
        tags:
          mondoo.com/filter-title: VMware ESXi
          mondoo.com/filter-icon: vmware
      - uid: mondoo-vmware-vsphere-esxi-security-baseline-ensure-the-vswitch-mac-address-change-policy-is-set-to-reject-terraform-hcl
