        title: Securing ESXi Hosts
  # No Terraform variants: the vsphere Terraform provider does not manage ESXi host advanced settings such as UserVars.ESXiShellInteractiveTimeOut.
  - uid: mondoo-vmware-vsphere-esxi-security-baseline-ensure-idle-esxi-shell-and-ssh-sessions-time-out-after-300-seconds-or-less
    title: Ensure idle ESXi shell and SSH sessions time out after 300 seconds or less
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iii-access-control-automatic-logoff
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-3
      compliance/nist-csf-2: nist-csf-2-pr-aa-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-12
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-11
      compliance/pci-dss-4: pcidss-requirement-8-2-8
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-4-1-2
    mql: |
      vsphere.host.esxiShellInteractiveTimeOut <= 300
      vsphere.host.esxiShellInteractiveTimeOut != 0
    docs:
      desc: |-
        This check ensures that idle ESXi shell and SSH sessions are automatically terminated after no more than 300 seconds. An interactive timeout closes sessions that an operator opened but left unattended, so an open prompt does not remain available indefinitely.

        **Why this matters**

        - **Abandoned session cleanup:** Idle sessions are closed before an unattended terminal can be misused.
        - **Bounded exposure:** A short interactive timeout limits how long a privileged shell stays reachable after the operator walks away.
        - **Enforced discipline:** Automatic termination removes reliance on operators remembering to log out.

        **Risk mitigation**

        - **Hijack prevention:** A 300-second limit shrinks the window in which an attacker can reuse an open administrative session.
        - **Consistent enforcement:** A non-zero value keeps the timeout active rather than disabling it entirely.
      audit: |-
        ### Audit via the vSphere Client

        1. Select the host, then select `Configure` and expand `System`.
        2. Select `Advanced System Settings`.
        3. Enter `UserVars.ESXiShellInteractiveTimeOut` in the filter and read the current value.

        ### Audit via PowerCLI

        1. Connect to vCenter Server or the ESXi host with `Connect-VIServer`.
        2. Read the setting:

           ```powershell
           Get-VMHost | Get-AdvancedSetting -Name 'UserVars.ESXiShellInteractiveTimeOut'
           ```

        The host passes when `UserVars.ESXiShellInteractiveTimeOut` is between `1` and `300` seconds. A value greater than `300`, or `0` (which disables the timeout entirely), is a failing result.
      remediation:
        - id: vsphere-client
          desc: |
            To set the timeout to the desired value using the vSphere Client:

            1. From the vSphere Web Client, select the host.
            2. Select `Configure` then expand `System`.
            3. Select `Advanced System Settings` then select `Edit`.
            4. Enter `ESXiShellInteractiveTimeOut` in the filter.
            5. Set the value for this parameter is set to the appropriate value ( `300` seconds or less).
            6. Select `OK`.

            **Note:**
            A value of 0 disables the ESXi ShellInteractiveTimeOut.
        - id: powershell
          desc: |
            To set UserVars.ESXiShellInteractiveTimeOut to 300 on all hosts using PowerCLI:

            ```powershell
            Get-VMHost | Get-AdvancedSetting -Name 'UserVars.ESXiShellInteractiveTimeOut' | Set-AdvancedSetting -Value "300"
            ```
        # No Terraform remediation: the interactive shell idle timeout is a runtime host advanced setting with no Terraform resource.
    refs:
      - url: https://docs.vmware.com/en/VMware-vSphere/8.0/vsphere-security/GUID-E9B71B85-FBA3-447C-8A60-DEA2FE111F4F.html
        title: Securing ESXi Hosts
  # No Terraform variants: the vsphere Terraform provider does not manage ESXi host advanced settings such as Config.HostAgent.plugins.solo.enableMob.
  - uid: mondoo-vmware-vsphere-esxi-security-baseline-ensure-managed-object-browser-mob-is-disabled
    title: Ensure Managed Object Browser (MOB) is disabled
    impact: 60
    tags:
      compliance/bsi-sys-1-5: bsi-sys-1-5-a22
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-04
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-pt-3
      compliance/nist-csf-2: nist-csf-2-pr-ps-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-6
      compliance/pci-dss-4: pcidss-requirement-2-2-4
      compliance/soc2-2017: soc2-control-cc7-1-1
      compliance/vda-isa-5: vda-isa-5-5-2-3
    mql: |
      vsphere.host.mobEnabled == false
    docs:
      desc: |-
        This check ensures that the Managed Object Browser, or MOB, is disabled on the ESXi host. The MOB is a web-based interface that exposes the host's internal object model and allows configuration changes, and it serves no purpose in normal operations.

        **Why this matters**

        - **Reduced attack surface:** Disabling the MOB removes a web endpoint that can be used to enumerate and alter host configuration.
        - **No debugging interface in production:** The MOB is primarily a development and troubleshooting tool that should not stay reachable on production hosts.
        - **Tighter management boundary:** Host configuration is changed through vCenter Server and supported APIs rather than an unmonitored browser interface.

        **Risk mitigation**

        - **Information disclosure prevention:** An attacker cannot use the MOB to walk the host object model and gather reconnaissance.
        - **Unauthorized change prevention:** Removing the MOB closes a path for modifying host settings outside normal management channels.
      audit: |-
        ### Audit via the vSphere Client

        1. Select the host, then select `Configure` and expand `System`.
        2. Select `Advanced System Settings`.
        3. Enter `Config.HostAgent.plugins.solo.enableMob` in the filter and read the current value.

        ### Audit via PowerCLI

        1. Connect to vCenter Server or the ESXi host with `Connect-VIServer`.
        2. Read the setting:

           ```powershell
           Get-VMHost | Get-AdvancedSetting -Name 'Config.HostAgent.plugins.solo.enableMob'
           ```

        The host passes when `Config.HostAgent.plugins.solo.enableMob` is `false`. A value of `true` is a failing result.
      remediation:
        - id: vsphere-client
          desc: |
            To disable MOB using the vSphere Client:

            1. Select a host
            2. Select `Configure` then expand `System` then select `Advanced System Settings`.
            3. Select `Edit` then search for `Config.HostAgent.plugins.solo.enableMob`
            4. Set the value to `false`.
            5. Select `OK`.

            **Note:**
            You cannot disable the MOB while a host is in lockdown mode.

            **Note 2:**
            You must disable MOB from the vSphere interface, not via the `vim-cmd` command.

            **Impact:**

            Some third-party tools may utilize the Managed Object Browser (MOB). Disabling MOB may cause those tools to malfunction.
        # No Terraform remediation: the Managed Object Browser toggle is a runtime host advanced setting with no Terraform resource.
  # No Terraform variants: the vsphere Terraform provider does not manage ESXi host lockdown mode.
  - uid: mondoo-vmware-vsphere-esxi-security-baseline-ensure-normal-lockdown-mode-is-enabled
    title: Ensure Normal Lockdown mode is enabled
    impact: 80
    tags:
      compliance/bsi-sys-1-5: bsi-sys-1-5-a5
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-04
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-2
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-3
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-6
      compliance/pci-dss-4: pcidss-requirement-2-2-4
      compliance/soc2-2017: soc2-control-cc6-1-3
      compliance/vda-isa-5: vda-isa-5-5-2-7
    mql: |
      vsphere.host.properties['config']['lockdownMode'] == "lockdownNormal"
    docs:
      desc: |-
        This check ensures that Normal lockdown mode is enabled, which blocks direct local access to the ESXi host and requires the host to be managed remotely through vCenter Server. Normal mode keeps the Direct Console User Interface available as a fallback while still steering routine administration through vCenter.

        **Why this matters**

        - **Centralized administration:** Funneling management through vCenter Server provides consistent authentication, role enforcement, and audit logging.
        - **Reduced direct access:** Disabling local access removes a path that bypasses vCenter controls.
        - **Console fallback retained:** The Direct Console User Interface remains available for recovery if the host loses contact with vCenter.

        **Risk mitigation**

        - **Bypass prevention:** Lockdown mode stops operators and attackers from making changes directly on the host outside vCenter oversight.
        - **Recoverability:** Keeping the console reachable avoids a lockout that would otherwise require reinstalling ESXi.
      audit: |-
        ### Audit via the vSphere Client

        1. Select the host, then select `Configure` and expand `System`.
        2. Select `Security Profile` and review the `Lockdown Mode` status.

        ### Audit via PowerCLI

        1. Connect to vCenter Server with `Connect-VIServer`.
        2. Read the lockdown state of each host:

           ```powershell
           Get-VMHost | Select-Object Name, @{N='LockdownMode';E={$_.ExtensionData.Config.LockdownMode}}
           ```

        The host passes when the lockdown mode is `lockdownNormal`. A value of `lockdownDisabled` or `lockdownStrict` is a failing result for this check.
      remediation:
        - id: vsphere-client
          desc: |
            To enable lockdown mode using the vSphere Client:

            1. From the vSphere Web Client, select the host.
            2. Select `Configure` then expand `System` and select `Security Profile`.
            3. Across from `Lockdown Mode` select `Edit`.
            4. Select the radio button for `Normal`.
            5. Select `OK`.

            **Impact:**

            With lockdown mode enabled the host will only be accessible through vCenter preventing 'local' access.
        - id: powershell
          desc: |
            To enable lockdown mode for each host using PowerCLI:

            ```powershell
            Get-VMHost | ForEach-Object { $_.ExtensionData.EnterLockdownMode() }
            ```

            **Impact:**

            With lockdown mode enabled the host will only be accessible through vCenter preventing 'local' access.
        # No Terraform remediation: host lockdown mode is runtime host configuration with no Terraform resource.
  # No Terraform variants: the vsphere Terraform provider does not manage ESXi host services such as the ntpd time-synchronization daemon.
  - uid: mondoo-vmware-vsphere-esxi-security-baseline-ensure-ntp-time-synchronization-is-configured-properly
    title: Ensure NTP time synchronization is configured properly
    impact: 60
    tags:
      compliance/bsi-sys-1-5: bsi-sys-1-5-a7
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-06
      compliance/dora: dora-art-10
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-17
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-pt-1
      compliance/nist-csf-2: nist-csf-2-pr-ps-04
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-45
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-7
      compliance/pci-dss-4: pcidss-requirement-10-6-1
      compliance/soc2-2017: soc2-control-cc7-1-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    mql: |
      vsphere.host.services.where( key == "ntpd").all( running == true )
      vsphere.host.services.where( key == "ntpd").all( policy == "on" )
    docs:
      desc: |-
        This check ensures that the Network Time Protocol service is running and configured to start with the host. Accurate, synchronized time keeps system event logs consistent and aligned with an agreed-upon standard such as Coordinated Universal Time.

        **Why this matters**

        - **Reliable forensics:** Synchronized clocks let log events from multiple hosts be correlated accurately during an investigation.
        - **Authentication integrity:** Many security protocols depend on clock accuracy to validate tickets and certificates.
        - **Persistent enablement:** A startup policy of on ensures time synchronization resumes automatically after every reboot.

        **Risk mitigation**

        - **Tamper detection:** Trustworthy timestamps make it harder for an attacker to obscure the timeline of an intrusion.
        - **Operational consistency:** Continuous synchronization prevents clock drift that would otherwise degrade logging and scheduled tasks.
      audit: |-
        ### Audit via the vSphere Client

        1. Select the host, then select `Configure` and expand `System`.
        2. Select `Time Configuration` and review the Network Time Protocol section.
        3. Confirm the `ntpd` service is running and that its startup policy is `Start and stop with host`.

        ### Audit via PowerCLI

        1. Connect to vCenter Server or the ESXi host with `Connect-VIServer`.
        2. Inspect the NTP service state and startup policy:

           ```powershell
           Get-VMHost | Get-VMHostService | Where-Object { $_.Key -eq 'ntpd' } |
             Select-Object VMHost, Key, Running, Policy
           ```

        The host passes when the `ntpd` service is `Running` and its `Policy` is `on`. A stopped service or a policy other than `on` is a failing result.
      remediation:
        - id: vsphere-client
          desc: |
            To enable and properly configure NTP synchronization using the vSphere Client:

            1. Select a host
            2. Select `Configure` then expand `System` then select `Time Configuration`.
            3. Select `Edit` next to Network Time Protocol
            4. Select the `Enable` box, then fill in the appropriate NTP Servers.
            5. in the `NTP Service Startup Policy` drop down select `Start and stop with host`.
            6. Select `OK`.
        - id: powershell
          desc: |
            To implement the recommended NTP configuration state using PowerCLI. If an internal NTP server is used, replace pool.ntp.org with the IP address or fully qualified domain name of the internal NTP server:

            ```powershell
            $ntpServers = "pool.ntp.org", "pool2.ntp.org"
            Get-VMHost | Add-VMHostNtpServer -NtpServer $ntpServers
            Get-VMHost | Get-VMHostService | Where-Object { $_.Key -eq "ntpd" } | Set-VMHostService -Policy On
            Get-VMHost | Get-VMHostService | Where-Object { $_.Key -eq "ntpd" } | Start-VMHostService
            ```
        # No Terraform remediation: NTP service state and startup policy are runtime host configuration with no Terraform resource.
  # No Terraform variants: the vsphere Terraform provider does not manage ESXi host advanced settings such as Syslog.global.logDir.
  - uid: mondoo-vmware-vsphere-esxi-security-baseline-ensure-persistent-logging-is-configured-for-all-esxi-hosts
    title: Ensure persistent logging is configured for all ESXi hosts
    impact: 60
    tags:
      compliance/bsi-sys-1-5: bsi-sys-1-5-a6
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-02
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-pt-1
      compliance/nist-csf-2: nist-csf-2-pr-ps-04
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-9
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    mql: |
      vsphere.host.syslogLogDir != ""
      vsphere.host.syslogLogDir != /scratch/
    docs:
      desc: |-
        This check ensures that the ESXi host writes its log files to a persistent datastore location rather than an in-memory file system. When the log directory points at a non-persistent location such as `/scratch`, only a single day of logs is retained and all log files are reinitialized on every reboot.

        **Why this matters**

        - **Log retention:** A persistent location preserves historical log data instead of discarding it after a day or a reboot.
        - **Incident investigation:** Durable logs remain available to reconstruct events long after they occur.
        - **Reboot survivability:** Logs stored on a datastore are not lost when the host restarts.

        **Risk mitigation**

        - **Evidence preservation:** Persistent logging prevents an attacker from erasing activity simply by triggering a reboot.
        - **Audit continuity:** Retained logs support compliance reviews that require a longer record of host activity.
      audit: |-
        ### Audit via the vSphere Client

        1. Select the host, then select `Configure` and expand `System`.
        2. Select `Advanced System Settings`.
        3. Enter `Syslog.global.logDir` in the filter and read the current value.

        ### Audit via PowerCLI

        1. Connect to vCenter Server or the ESXi host with `Connect-VIServer`.
        2. Read the setting:

           ```powershell
           Get-VMHost | Get-AdvancedSetting -Name 'Syslog.global.logDir'
           ```

        The host passes when `Syslog.global.logDir` points to a persistent datastore location. An empty value or a non-persistent location under `/scratch` is a failing result.
      remediation:
        - id: vsphere-client
          desc: |
            To configure persistent logging properly using the vSphere Client:

            1. Select the host
            2. Select `Configure` then expand `System` then select `Advanced System Settings`.
            3. Select `Edit` then enter `Syslog.global.LogDir` in the filter.
            4. Set `Syslog.global.logDir` to a persistent location specified as [datastorename] path\_to\_file where the path is relative to the datastore. For example, [datastore1] /systemlogs.
            5. Select `OK`.
        - id: powershell
          desc: |
            To configure persistent logging using PowerCLI, replacing the datastore and path with a persistent location in your environment:

            ```powershell
            Get-VMHost | Get-AdvancedSetting -Name Syslog.global.logDir | Set-AdvancedSetting -Value "[datastore1] systemlogs"
            ```
        # No Terraform remediation: the persistent log directory is a runtime host advanced setting with no Terraform resource.
    refs:
      - url: https://docs.vmware.com/en/VMware-vSphere/8.0/vsphere-security/GUID-E9B71B85-FBA3-447C-8A60-DEA2FE111F4F.html
        title: Securing ESXi Hosts
  - uid: mondoo-vmware-vsphere-esxi-security-baseline-ensure-port-groups-are-not-configured-to-the-value-of-the-native-vlan
    title: Ensure port groups are not configured to the value of the native VLAN
    impact: 60
    tags:
      compliance/bsi-sys-1-5: bsi-sys-1-5-a4
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-22
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-1
      compliance/pci-dss-4: pcidss-requirement-1-4-1
      compliance/soc2-2017: soc2-control-cc6-1-5
      compliance/vda-isa-5: vda-isa-5-5-2-7
    variants:
      - uid: mondoo-vmware-vsphere-esxi-security-baseline-ensure-port-groups-are-not-configured-to-the-value-of-the-native-vlan-vsphere
        tags:
          mondoo.com/filter-title: VMware ESXi
          mondoo.com/filter-icon: vmware
      - uid: mondoo-vmware-vsphere-esxi-security-baseline-ensure-port-groups-are-not-configured-to-the-value-of-the-native-vlan-terraform-hcl
        tags:
          mondoo.com/filter-title: Terraform HCL
          mondoo.com/filter-icon: terraform
      - uid: mondoo-vmware-vsphere-esxi-security-baseline-ensure-port-groups-are-not-configured-to-the-value-of-the-native-vlan-terraform-plan
        tags:
          mondoo.com/filter-title: Terraform Plan
          mondoo.com/filter-icon: terraform
      - uid: mondoo-vmware-vsphere-esxi-security-baseline-ensure-port-groups-are-not-configured-to-the-value-of-the-native-vlan-terraform-state
        tags:
          mondoo.com/filter-title: Terraform State
          mondoo.com/filter-icon: terraform
    docs:
      desc: |-
        This check ensures that virtual switch port groups use a VLAN ID between 2 and 4094 and avoid the native VLAN. ESXi has no concept of a native VLAN, so placing a port group on the upstream native VLAN ID, commonly 1, mixes virtual machine traffic with untagged switch traffic.

        **Why this matters**

        - **Traffic isolation:** A dedicated VLAN keeps virtual machine traffic separate from the physical switch's native VLAN.
        - **Predictable tagging:** Using a non-native VLAN ID ensures frames are tagged consistently end to end.
        - **Reduced misconfiguration:** Avoiding VLAN 1 removes ambiguity about which traffic belongs to which segment.

        **Risk mitigation**

        - **VLAN hopping resistance:** Keeping port groups off the native VLAN reduces exposure to attacks that exploit untagged traffic.
        - **Containment:** Proper segmentation limits the blast radius if one segment is compromised.
      audit: |-
        ### Audit via the vSphere Client

        1. Select the host, then select `Configure` and expand `Networking`.
        2. Select `Virtual switches` and expand each standard vSwitch.
        3. In the topology diagram, review the VLAN ID of every port group.

        ### Audit via PowerCLI

        1. Connect to vCenter Server or the ESXi host with `Connect-VIServer`.
        2. List the VLAN ID of every port group:

           ```powershell
           Get-VMHost | Get-VirtualPortGroup | Select-Object VirtualSwitch, Name, VLanId
           ```

        The host passes when every port group uses a VLAN ID between `2` and `4094`. A port group set to VLAN `0`, `1`, or any value above `4094` is a failing result.
      remediation:
        - id: vsphere-client
          desc: |
            To stop using the native VLAN ID for port groups using the vSphere Client:

            1. From the vSphere Web Client, select the host.
            2. Select `Configure` then expand `Networking`.
            3. Select `Virtual switches`.
            4. Expand the Standard vSwitch.
            5. View the topology diagram of the switch, which shows the various port groups associated with that switch.
            6. For each port group on the vSwitch, verify and record the VLAN IDs used.
            7. If a VLAN ID change is needed, select the name of the port group in the topology diagram of the virtual switch.
            8. Select the `Edit settings` option.
            9. In the Properties section, enter an appropriate name in the `Network label` field.
            10. In the `VLAN ID` dropdown select or type a new VLAN.
            11. Select `OK`.
        - id: terraform
          desc: |
            To move a port group off the native VLAN using Terraform, set `vlan_id` to a value between `2` and `4094` on the `vsphere_host_port_group` resource:

            ```hcl
            resource "vsphere_host_port_group" "pg" {
              name                = "VM Network"
              host_system_id      = data.vsphere_host.host.id
              virtual_switch_name = vsphere_host_virtual_switch.switch.name

              vlan_id = 100
            }
            ```
    refs:
      - url: https://docs.vmware.com/en/VMware-vSphere/8.0/vsphere-security/GUID-E9B71B85-FBA3-447C-8A60-DEA2FE111F4F.html
        title: Securing ESXi Hosts
  - uid: mondoo-vmware-vsphere-esxi-security-baseline-ensure-port-groups-are-not-configured-to-vlan-4095-and-0-except-for-virtual-
    title: Ensure port groups avoid VLAN 4095 and 0 except for VGT
    impact: 60
    tags:
      compliance/bsi-sys-1-5: bsi-sys-1-5-a4
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
