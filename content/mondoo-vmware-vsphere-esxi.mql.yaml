queries:
  # No Terraform variants: the vsphere Terraform provider does not manage ESXi host advanced settings such as Security.AccountUnlockTime.
  - uid: mondoo-vmware-vsphere-esxi-security-baseline-ensure-account-lockout-is-set-to-15-minutes
    title: Ensure account lockout is set to 15 minutes
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-04
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-308-a-5-ii-c-security-awareness-training-and-tools-log-in-monitoring
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ac-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-1-8
      compliance/pci-dss-4: pcidss-requirement-8-3-4
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-2
    mql: |
      vsphere.host.accountUnlockTime == 900
    docs:
      desc: |-
        This check ensures that a locked account is automatically released after 15 minutes. ESXi locks an account once it reaches the maximum number of failed consecutive login attempts, and a defined unlock window restores access for legitimate users without leaving the account locked indefinitely.

        **Why this matters**

        - **Reduced administrative burden:** Authorized users regain access automatically instead of waiting for an administrator to unlock the account manually.
        - **Brute-force resistance:** A timed lockout slows password-guessing attacks by forcing attackers to wait after each round of failures.
        - **Predictable behavior:** A fixed unlock interval keeps account recovery consistent across every host in the environment.

        **Risk mitigation**

        - **Account availability:** A 15-minute window balances security against the risk of locking out legitimate operators during an incident.
        - **Throttled attacks:** Repeated guessing is rate-limited because each locked period must elapse before further attempts succeed.
      audit: |-
        ### Audit via the vSphere Client

        1. Select the host, then select `Configure` and expand `System`.
        2. Select `Advanced System Settings`.
        3. Enter `Security.AccountUnlockTime` in the filter and read the current value.

        ### Audit via PowerCLI

        1. Connect to vCenter Server or the ESXi host with `Connect-VIServer`.
        2. Read the setting:

           ```powershell
           Get-VMHost | Get-AdvancedSetting -Name 'Security.AccountUnlockTime'
           ```

        The host passes when `Security.AccountUnlockTime` is `900`. Any other value, including `0`, is a failing result.
      remediation:
        - id: vsphere-client
          desc: |
            To set the account lockout to 15 minutes using the vSphere Client:

            1. From the vSphere Web Client, select the host.
            2. Select `Configure` then expand `System`.
            3. Select `Advanced System Settings` then select `Edit`.
            4. Enter `Security.AccountUnlockTime` in the filter.
            5. Set the value for this parameter to `900`.
        - id: powershell
          desc: |
            To set the account lockout to 15 minutes using PowerCLI:

            ```powershell
            Get-VMHost | Get-AdvancedSetting -Name Security.AccountUnlockTime | Set-AdvancedSetting -Value 900
            ```
        # No Terraform remediation: the account-lockout window is a runtime host advanced setting with no Terraform resource.
    refs:
      - url: https://docs.vmware.com/en/VMware-vSphere/8.0/vsphere-security/GUID-E9B71B85-FBA3-447C-8A60-DEA2FE111F4F.html
        title: Securing ESXi Hosts
  # No Terraform variants: the vsphere Terraform provider does not manage installed VIBs or the kernel modules loaded by the VMkernel at runtime.
  - uid: mondoo-vmware-vsphere-esxi-security-baseline-ensure-all-loaded-esxi-kernel-modules-are-signed
    title: Ensure all loaded ESXi kernel modules are signed
    impact: 80
    tags:
      compliance/bsi-sys-1-5: bsi-sys-1-5-a22
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-04
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-7
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ds-6
      compliance/nist-csf-2: nist-csf-2-pr-ps-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-8
      compliance/pci-dss-4: pcidss-requirement-2-2-1
      compliance/soc2-2017: soc2-control-cc7-1-4
      compliance/vda-isa-5: vda-isa-5-5-2-3
    mql: |
      vsphere.host.kernelModules.where( loaded == true ).all( signedStatus != "Unsigned" )
    docs:
      desc: |-
        This check ensures that every kernel module loaded by the VMkernel carries a valid cryptographic signature. A signed module establishes its origin and integrity, while an unsigned module has not been verified and may indicate tampering or untrusted third-party software running inside the hypervisor.

        **Why this matters**

        - **Hypervisor integrity:** Loading only signed modules confirms that low-level drivers and components have not been altered since the vendor built them.
        - **Tamper detection:** An unsigned module surfaces the presence of code that no trusted party has reviewed or approved.
        - **Secure Boot prerequisite:** A fully signed module set is required before UEFI Secure Boot can be enabled and trusted.

        **Risk mitigation**

        - **Reduced attack surface:** Rejecting unsigned modules blocks a common path for installing rootkits and malicious drivers.
        - **Verifiable supply chain:** Signature checks tie each loaded component back to a known vendor or partner.
      audit: |-
        ### Audit via the ESXi shell

        1. Connect to the ESXi host with SSH.
        2. List the loaded modules:

           ```bash
           esxcli system module list
           ```

        3. For each module reporting `Is Loaded: true`, check its signed status:

           ```bash
           esxcli system module get --module=<module-name>
           ```

        ### Audit via PowerCLI

        1. Connect to the ESXi host with `Connect-VIServer`.
        2. Inspect the loaded modules through the ESXCLI interface:

           ```powershell
           $esxcli = Get-EsxCli -VMHost (Get-VMHost)
           $esxcli.system.module.list.Invoke()
           ```

        The host passes when every loaded module reports a `Signed Status` other than `Unsigned`. A module reporting `Signed Status: Unsigned` is a failing result.
      remediation:
        - id: cli
          desc: |
            To identify unsigned modules and replace or remove them using the ESXi shell:

            1. Connect to the ESXi host via SSH.
            2. List loaded modules and their signed status:

               ```bash
               esxcli system module list
               esxcli system module get --module=<module-name>
               ```

            3. For any module reporting `Signed Status: Unsigned`, remove the associated VIB or replace it with a signed version from the vendor.
            4. Place the host in maintenance mode, migrate or shut down running virtual machines, and reboot the host so the updated module set is loaded.

            Configure the host image profile acceptance level so that unsigned VIBs cannot be installed in the first place. See "Ensure the Image Profile VIB acceptance level is configured properly".
        # No Terraform remediation: kernel module signing is verified against live host state, not declarable Terraform configuration.
    refs:
      - url: https://docs.vmware.com/en/VMware-vSphere/8.0/vsphere-security/GUID-E9B71B85-FBA3-447C-8A60-DEA2FE111F4F.html
        title: Securing ESXi Hosts
  # No Terraform variants: the vsphere Terraform provider does not manage ESXi iSCSI host bus adapter CHAP authentication properties.
  - uid: mondoo-vmware-vsphere-esxi-security-baseline-ensure-bidirectional-chap-authentication-for-iscsi-traffic-is-enabled
    title: Ensure bidirectional CHAP authentication for iSCSI traffic is enabled
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-d-person-or-entity-authentication
      compliance/iso-27001-2022: iso-27001-2022-a-8-5
      compliance/nis-2: nis-2-21-2-i
      compliance/nist-csf-1: nist-csf-1-pr-ac-7
      compliance/nist-csf-2: nist-csf-2-pr-aa-03
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-ia-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-5-2
      compliance/pci-dss-4: pcidss-requirement-8-3-1
      compliance/soc2-2017: soc2-control-cc6-1-4
      compliance/vda-isa-5: vda-isa-5-4-1-2
    mql: |
      vsphere.host.properties['config']['storageDevice']['hostBusAdapter'].where( _['driver'] == 'iscsi_vmk' ).all( _['authenticationProperties']['chapAuthEnabled'] == true )
      vsphere.host.properties['config']['storageDevice']['hostBusAdapter'].where( _['driver'] == 'iscsi_vmk' ).all( _['authenticationProperties']['chapAuthenticationType'] == 'chapRequired' )
      vsphere.host.properties['config']['storageDevice']['hostBusAdapter'].where( _['driver'] == 'iscsi_vmk' ).all( _['authenticationProperties']['chapName'] != empty )
      vsphere.host.properties['config']['storageDevice']['hostBusAdapter'].where( _['driver'] == 'iscsi_vmk' ).all( _['authenticationProperties']['chapSecret'] != empty )
      vsphere.host.properties['config']['storageDevice']['hostBusAdapter'].where( _['driver'] == 'iscsi_vmk' ).all( _['authenticationProperties']['mutualChapAuthenticationType'] == 'chapRequired' )
      vsphere.host.properties['config']['storageDevice']['hostBusAdapter'].where( _['driver'] == 'iscsi_vmk' ).all( _['authenticationProperties']['mutualChapName'] != empty )
      vsphere.host.properties['config']['storageDevice']['hostBusAdapter'].where( _['driver'] == 'iscsi_vmk' ).all( _['authenticationProperties']['mutualChapSecret'] != empty )
    docs:
      desc: |-
        This check ensures that iSCSI host bus adapters use bidirectional Challenge-Handshake Authentication Protocol, also known as Mutual CHAP. Bidirectional CHAP requires both the ESXi host and the iSCSI target to prove their identity to each other before storage traffic flows.

        **Why this matters**

        - **Target verification:** The host confirms it is talking to the legitimate storage array rather than a rogue target.
        - **Initiator verification:** The array confirms that only authorized hosts can connect to its iSCSI volumes.
        - **Defense against impersonation:** Mutual authentication closes the gap left by one-way CHAP, which leaves the target unverified.

        **Risk mitigation**

        - **Storage data protection:** Mutual authentication blocks unauthorized hosts from mounting or tampering with iSCSI datastores.
        - **Man-in-the-middle resistance:** Verifying both endpoints reduces the risk of an attacker intercepting or redirecting storage traffic.
      audit: |-
        ### Audit via the vSphere Client

        1. Select the host, then select `Configure` and expand `Storage`.
        2. Select `Storage Adapters` and select the iSCSI adapter.
        3. Under `Properties`, review the `Authentication` section.
        4. Confirm the authentication method is `Use bidirectional CHAP` and that both the outgoing and incoming CHAP names and secrets are set.

        ### Audit via PowerCLI

        1. Connect to vCenter Server or the ESXi host with `Connect-VIServer`.
        2. Inspect the CHAP configuration of each iSCSI host bus adapter:

           ```powershell
           Get-VMHost | Get-VMHostHba -Type Iscsi |
             Select-Object Device, ChapType, AuthenticationProperties
           ```

        The host passes when every iSCSI adapter has CHAP enabled with `chapPreferred` for both the outgoing and mutual authentication types, and both the CHAP name and secret and the mutual CHAP name and secret are set. An adapter with CHAP disabled, with a non-`chapPreferred` type, or with an empty name or secret is a failing result.
      remediation:
        - id: vsphere-client
          desc: |
            To enable bidirectional CHAP authentication for iSCSI traffic using the vSphere Client:

            1. From the vSphere Web Client, select the host.
            2. Select `Configure` then expand `Storage`.
            3. Select `Storage Adapters` then select the iSCSI Adapter.
            4. Under `Properties` select `Edit` next to `Authentication`.
            5. Next to `Authentication Method` select `Use bidirectional CHAP` from the dropdown.
            6. Specify the outgoing CHAP name.

            - Make sure that the name you specify matches the name configured on the storage side.
                - To set the CHAP name to the iSCSI adapter name, select "Use initiator name".
                - To set the CHAP name to anything other than the iSCSI initiator name, deselect "Use initiator name" and type a name in the Name text box.

            7. Enter an outgoing CHAP secret to be used as part of authentication. Use the same secret as your storage side secret.
            8. Specify incoming CHAP credentials. Make sure your outgoing and incoming secrets do not match.
            9. Select `OK`.
            10. Select the second to last symbol labeled `Rescan Adapter`.
        - id: powershell
          desc: |
            To configure bidirectional CHAP for the iSCSI adapter using PowerCLI, replacing the names and secrets with values that match the storage array configuration:

            ```powershell
            Get-VMHost | Get-VMHostHba -Type Iscsi | Set-VMHostHba -ChapType Required -ChapName "esxi-host-01" -ChapPassword "OutgoingChapSecret1" -MutualChapEnabled $true -MutualChapName "storage-array-01" -MutualChapPassword "IncomingChapSecret1"
            ```
        # No Terraform remediation: iSCSI CHAP credentials are configured on the live storage adapter and have no Terraform resource.
  # No Terraform variants: the vsphere Terraform provider does not manage ESXi host DNS network configuration.
  - uid: mondoo-vmware-vsphere-esxi-security-baseline-ensure-dns-is-statically-configured-on-the-esxi-host
    title: Ensure DNS is statically configured on the ESXi host
    impact: 60
    tags:
      compliance/bsi-sys-1-5: bsi-sys-1-5-a22
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-04
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-1
      compliance/nist-csf-2: nist-csf-2-pr-ps-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-2
      compliance/pci-dss-4: pcidss-requirement-2-2-1
      compliance/soc2-2017: soc2-control-cc7-1-1
      compliance/vda-isa-5: vda-isa-5-5-3-1
    mql: |
      vsphere.host.dnsConfig.dhcp == false
      vsphere.host.dnsConfig.servers != empty
    docs:
      desc: |-
        This check ensures that the ESXi host uses statically configured, trusted DNS servers rather than DHCP-supplied values. ESXi relies on DNS to resolve vCenter Server, NTP servers, syslog targets, and other infrastructure services, so the name resolution path must come from a controlled source.

        **Why this matters**

        - **Trusted resolution:** Static DNS guarantees the host queries name servers chosen by administrators rather than whatever DHCP advertises.
        - **Resistance to DHCP spoofing:** An attacker who influences DHCP responses cannot redirect the host's DNS lookups.
        - **Stable management connectivity:** Fixed DNS settings keep vCenter, logging, and time services reachable even if the DHCP environment changes.

        **Risk mitigation**

        - **Interception prevention:** Controlled DNS reduces the chance of management traffic being routed to an attacker-controlled endpoint.
        - **Operational reliability:** Static configuration removes a dependency on DHCP availability for critical host services.
      audit: |-
        ### Audit via the vSphere Client

        1. Select the host, then select `Configure` and expand `Networking`.
        2. Select `TCP/IP configuration` and select the `Default` TCP/IP stack.
        3. Review the `DNS configuration` and confirm `Enter settings manually` is selected with trusted DNS servers listed.

        ### Audit via the ESXi shell

        1. Connect to the ESXi host with SSH.
        2. Read the DNS configuration:

           ```bash
           esxcli network ip dns server list
           esxcli network ip interface ipv4 get
           ```

        The host passes when DHCP is disabled for DNS and one or more static DNS servers are configured. A host obtaining DNS settings from DHCP, or with no DNS servers configured, is a failing result.
      remediation:
        - id: vsphere-client
          desc: |
            To configure static DNS using the vSphere Client:

            1. Select the host.
            2. Select `Configure`, then expand `Networking` and select `TCP/IP configuration`.
            3. Select the `Default` TCP/IP stack, then select `Edit`.
            4. Select `DNS configuration` and choose `Enter settings manually`.
            5. Provide the trusted DNS server addresses and search domains.
            6. Select `OK`.
        - id: cli
          desc: |
            To configure static DNS using the ESXi shell:

            ```bash
            esxcli network ip dns server add --server=192.0.2.53
            ```

            If the management interface currently obtains its settings from DHCP, convert it to a static configuration. Supply the address and netmask explicitly, and perform this change from the DCUI or a console session because it can interrupt management connectivity:

            ```bash
            esxcli network ip interface ipv4 set --interface-name=vmk0 --type=static --ipv4=192.0.2.10 --netmask=255.255.255.0
            ```
        # No Terraform remediation: the host DNS configuration is runtime network state with no Terraform resource.
    refs:
      - url: https://docs.vmware.com/en/VMware-vSphere/8.0/vsphere-security/GUID-E9B71B85-FBA3-447C-8A60-DEA2FE111F4F.html
        title: Securing ESXi Hosts
  # No Terraform variants: the vsphere Terraform provider does not manage ESXi host advanced settings such as Net.DVFilterBindIpAddress.
  - uid: mondoo-vmware-vsphere-esxi-security-baseline-ensure-dvfilter-api-is-not-configured-if-not-used
    title: Ensure dvfilter API is not configured if not used
    impact: 60
    tags:
      compliance/bsi-sys-1-5: bsi-sys-1-5-a22
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-04
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-pt-3
      compliance/nist-csf-2: nist-csf-2-pr-ps-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-6
      compliance/pci-dss-4: pcidss-requirement-2-2-4
      compliance/soc2-2017: soc2-control-cc7-1-1
      compliance/vda-isa-5: vda-isa-5-5-2-3
    mql: |
      vsphere.host.dvFilterBindIpAddress == empty
    docs:
      desc: |-
        This check ensures that the dvfilter network API is left unconfigured when no security appliance uses it. The dvfilter API allows certain network security products to inspect virtual machine traffic, and an unused binding address needlessly exposes VM network data.

        **Why this matters**

        - **Minimized attack surface:** Leaving the API unconfigured removes a network introspection path that nothing on the host requires.
        - **No stray traffic redirection:** An empty binding address prevents VM network information from being sent to an unintended destination.
        - **Clear intent:** Configuring the API only when an appliance needs it keeps host settings aligned with actual deployments.

        **Risk mitigation**

        - **Reduced exposure:** Disabling an unused introspection channel limits the avenues available to an attacker.
        - **Controlled enablement:** When a dvfilter appliance is deployed, the binding address is set deliberately to the correct endpoint.
      audit: |-
        ### Audit via the vSphere Client

        1. Select the host, then select `Configure` and expand `System`.
        2. Select `Advanced System Settings`.
        3. Enter `Net.DVFilterBindIpAddress` in the filter and read the current value.

        ### Audit via PowerCLI

        1. Connect to vCenter Server or the ESXi host with `Connect-VIServer`.
        2. Read the setting:

           ```powershell
           Get-VMHost | Get-AdvancedSetting -Name 'Net.DVFilterBindIpAddress'
           ```

        The host passes when `Net.DVFilterBindIpAddress` is empty. A non-empty value on a host that does not run a dvfilter-based security appliance is a failing result.
      remediation:
        - id: vsphere-client
          desc: |
            To remove the configuration for the dvfilter network API using the vSphere Client:

            1. From the vSphere web client, select the host and select `Configure` then expand `System`
            2. Select `Advanced System Settings` then `Edit`.
            3. Search for `Net.DVFilterBindIpAddress` in the filter.
            4. Set `Net.DVFilterBindIpAddress` has an empty value.
            5. If an appliance is being used, make sure the value of this parameter is set to the proper IP address.
            6. Enter the proper IP address.
            7. Select `OK`.

            **Impact:**

            This will prevent a dvfilter-based network security appliance such as a firewall from functioning if not configured correctly.
        - id: powershell
          desc: |
            To set Net.DVFilterBindIpAddress to an empty value on all hosts using PowerCLI:

            ```powershell
            Get-VMHost | Get-AdvancedSetting -Name Net.DVFilterBindIpAddress | Set-AdvancedSetting -Value ""
            ```
        # No Terraform remediation: the dvfilter bind address is a runtime host advanced setting with no Terraform resource.
    refs:
