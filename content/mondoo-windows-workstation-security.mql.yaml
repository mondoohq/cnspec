policies:
  - uid: mondoo-windows-workstation-security
    name: Mondoo Microsoft Windows Workstation Security
    version: 0.4.0
    license: BUSL-1.1
    tags:
      mondoo.com/category: security
      mondoo.com/platform: windows:10,windows:11
    require:
      - provider: os
    authors:
      - name: Mondoo, Inc.
        email: hello@mondoo.com
    summary: Secure Windows workstation access, updates, and configs
    docs:
      desc: |
        The Mondoo Microsoft Windows Workstation Security policy identifies critical misconfigurations on Windows workstations that could leave end-user devices vulnerable to malware, unauthorized access, and data theft. Workstations are a frequent first foothold for attackers, with phishing, malicious downloads, and physical access threats all targeting the endpoint. Workstation hardening directly limits what an attacker can do once they get in.

        This policy provides security checks across key Windows workstation areas:

        - Secure Boot configuration
        - BitLocker disk encryption
        - Antivirus and Microsoft Defender presence
        - Automatic updates and patch posture
        - Windows Firewall configuration
        - User Account Control (UAC) and screen lock policies

        This policy supports Windows 10 and Windows 11.

        Learn more about scanning Windows in the [cnspec Windows documentation](https://mondoo.com/docs/cnspec/os/windows).

        Have suggestions for new checks in this policy? Visit our [cnspec repository](https://github.com/mondoohq/cnspec).
    groups:
      - title: Secure Boot
        filters: |
          asset.platform.contains("windows")
          windows.computerInfo['OsProductType'] == 1
        checks:
          - uid: mondoo-windows-workstation-security-antivirus-installed
          - uid: mondoo-windows-workstation-security-automatic-update-is-enabled
          - uid: mondoo-windows-workstation-security-bitlocker-enabled
          - uid: mondoo-windows-workstation-security-secure-boot-is-enabled
    scoring_system: highest impact
queries:
  - uid: mondoo-windows-workstation-security-bitlocker-enabled
    title: Ensure BitLocker Encryption is Enabled
    impact: 100
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    mql: windows.bitlocker.volumes.all( protectionStatus["text"] == "Protected" )
    docs:
      desc: |
        This check ensures that every disk volume is protected by BitLocker drive encryption. BitLocker encodes data so it is unreadable to anyone who does not hold the decryption key, which keeps information confidential if a workstation is lost or stolen.

        **Why this matters**

        - **Data theft protection:** An encrypted drive cannot be read by attaching it to another system or booting an alternate operating system.
        - **Loss and theft resilience:** Laptops are frequently lost or stolen; encryption renders the data on them useless to whoever ends up with the device.
        - **Tamper resistance:** Pairing BitLocker with a TPM detects offline modification of boot components and blocks unauthorized changes.
        - **Compliance:** Many regulatory frameworks require encryption of data at rest on end-user devices.
      audit: |
        ### Audit via Settings

        1. Open **Settings** and go to **Privacy & security** > **Device encryption**, or open **Control Panel** > **System and Security** > **BitLocker Drive Encryption**.
        2. Review the protection status listed for each drive.

        The workstation passes when every volume reports BitLocker as on. It fails if any volume reports BitLocker as off.

        ### Audit via PowerShell

        1. Open an elevated PowerShell session.
        2. Display the encryption status of all volumes:

           ```powershell
           Get-BitLockerVolume
           ```

        The workstation passes when every volume reports a `ProtectionStatus` of `On`. It fails if any volume reports `Off`.
      remediation:
        - id: gui
          desc: |
            **Using the Windows interface**

            Turn on device encryption:

            1. Sign in to Windows with an administrator account.
            2. Select **Start** > **Settings** > **Update & Security** > **Device encryption**.
            3. If device encryption is turned off, select **Turn on**.

            If Device encryption is not available, use standard BitLocker encryption:

            1. Sign in to your Windows device with an administrator account.
            2. In the search box on the taskbar, type **Manage BitLocker** and select it from the list of results.
            3. Select **Turn on BitLocker** and follow the instructions.

            Note: BitLocker is not available on Windows 10/11 Home edition.
        - id: powershell
          desc: |
            **Using PowerShell**

            Enable BitLocker on the operating system drive:

            ```powershell
            Enable-BitLocker -MountPoint "C:" -EncryptionMethod XtsAes256 -UsedSpaceOnly -TpmProtector
            ```

            If your device does not have a TPM, use a password protector instead:

            ```powershell
            Enable-BitLocker -MountPoint "C:" -EncryptionMethod XtsAes256 -UsedSpaceOnly -PasswordProtector
            ```

            To check the current BitLocker status:

            ```powershell
            Get-BitLockerVolume
            ```
        - id: ansible
          desc: |
            **Using Ansible**

            Enable BitLocker on the operating system drive using the following Ansible playbook:

            ```yaml
            ---
            - name: Enable BitLocker on the operating system drive
              hosts: all

              tasks:
                - name: Enable BitLocker with a TPM protector
                  community.windows.win_bitlocker:
                    drive: C
                    state: present
                    encryption_method: xts_aes256
                    used_space_only: true
            ```
    refs:
      - url: https://support.microsoft.com/en-us/windows/turn-on-device-encryption-0c453637-bc88-5f74-5105-741561aae838#:~:text=Turn%20on%20standard%20BitLocker%20encryption,-Sign%20in%20to&text=In%20the%20search%20box%20on,is%20available%20for%20your%20device.
        title: Turn on device encryption
  - uid: mondoo-windows-workstation-security-secure-boot-is-enabled
    title: Ensure Secure Boot is enabled
    impact: 100
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ccc-06
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-1
      compliance/nist-csf-2: nist-csf-2-pr-ps-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-2
      compliance/pci-dss-4: pcidss-requirement-2-2-1
      compliance/soc2-2017: soc2-control-cc7-1-1
      compliance/vda-isa-5: vda-isa-5-5-2-1
    mql: |
      machine.secureboot.enabled == true
    docs:
      desc: |
        This check ensures that Secure Boot is active. Secure Boot is a boot-integrity feature of the Unified Extensible Firmware Interface (UEFI) standard that allows the system to start only with firmware and boot loaders signed by trusted keys.

        **Why this matters**

        - **Bootkit defense:** Secure Boot blocks unsigned or tampered boot code, preventing malware from loading before the operating system starts.
        - **Boot chain integrity:** Only software trusted by the firmware can run during startup, establishing a verified foundation for the rest of the system.
        - **Persistence resistance:** Firmware-level malware that survives operating system reinstalls is far harder to install when Secure Boot is enforced.
        - **Compliance:** Secure Boot is a baseline configuration requirement in common Windows hardening benchmarks.
      audit: |
        ### Audit via System Information

        1. Press **Windows + R**, type `msinfo32`, and press **Enter**.
        2. In **System Summary**, locate the **Secure Boot State** value.

        The workstation passes when Secure Boot State reports **On**. It fails if the value reports **Off** or **Unsupported**.

        ### Audit via PowerShell

        1. Open an elevated PowerShell session.
        2. Query the Secure Boot status:

           ```powershell
           Confirm-SecureBootUEFI
           ```

        The workstation passes when the command returns `True`. It fails if the command returns `False` or reports that the platform does not support Secure Boot.
      remediation:
        - id: gui
          desc: |
            **Using the UEFI firmware interface**

            To enable Secure Boot, access the UEFI firmware settings on your computer. The steps vary by manufacturer, but generally:

            1. Restart your computer and enter the UEFI firmware settings. This is usually done by pressing a specific key during startup (for example F2, F10, DEL, or ESC).
            2. Look for the **Secure Boot** option in the UEFI settings. It is usually located under the **Boot** or **Security** tab.
            3. Change the Secure Boot setting to **Enabled**.
            4. Save the changes and exit the UEFI settings.
    refs:
      - url: https://media.defense.gov/2020/Sep/15/2002497594/-1/-1/0/CTR-UEFI-Secure-Boot-Customization-UOO168873-20.PDF
        title: UEFI Secure Boot Customization
  - uid: mondoo-windows-workstation-security-automatic-update-is-enabled
    title: Ensure Automatic Windows Update is enabled
    impact: 100
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-tvm-03
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-8
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-12
      compliance/nist-csf-2: nist-csf-2-pr-ps-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-1
      compliance/pci-dss-4: pcidss-requirement-6-3-3
      compliance/soc2-2017: soc2-control-cc7-1-1
      compliance/vda-isa-5: vda-isa-5-5-2-1
    mql: |
      registrykey.property(path: 'HKEY_LOCAL_MACHINE\Software\Policies\Microsoft\Windows\WindowsUpdate\AU', name: 'AUOptions') {
        data >= 4
      }
      registrykey.property(path: 'HKEY_LOCAL_MACHINE\Software\Policies\Microsoft\Windows\WindowsUpdate\AU', name: 'ScheduledInstallDay') {
        data == 0
      }
    docs:
      desc: |
        This check ensures that the workstation is configured to download and install Windows updates automatically on a daily schedule. Automatic updates close the gap between the release of a security fix and its application to the device.

        **Why this matters**

        - **Vulnerability remediation:** Security patches close flaws that attackers actively exploit; applying them promptly removes those entry points.
        - **Reduced exposure window:** Automatic installation shrinks the time a device runs with a known, unpatched vulnerability.
        - **Consistent posture:** Removing the dependency on users to apply updates keeps the whole fleet at a known patch level.
        - **Stability:** Updates also resolve defects that cause crashes and data loss, improving reliability alongside security.
      audit: |
        ### Audit via Settings

        1. Open **Settings** and go to **Update & Security** > **Windows Update** > **Advanced options**.
        2. Confirm that updates are configured to install automatically and that no pause is in effect.

        The workstation passes when automatic updates are enabled. It fails if updates are paused or set to notify only.

        ### Audit via PowerShell

        1. Open an elevated PowerShell session.
        2. Read the configured automatic-update policy values:

           ```powershell
           Get-ItemProperty -Path 'HKLM:\Software\Policies\Microsoft\Windows\WindowsUpdate\AU' -Name AUOptions, ScheduledInstallDay
           ```

        The workstation passes when `AUOptions` is `4` or greater and `ScheduledInstallDay` is `0`. It fails if either value is missing or set differently.
      remediation:
        - id: gui
          desc: |
            **Using Group Policy**

            Under `Computer Configuration\Administrative Templates\Windows Components\Windows update\Configure Automatic Updates`, you must select one of the following options:

            2 - Notify for download and auto install - When Windows finds updates that apply to this device, users will be notified that updates are ready to be downloaded. After going to Settings > Update & security > Windows Update, users can download and install any available updates.

            3 - Auto download and notify for Install - Windows finds updates that apply to the device and downloads them in the background (the user is not notified or interrupted during this process). When the downloads are complete, users will be notified that they are ready to install. After going to Settings > Update & security > Windows Update, users can install them.

            4 - Auto download and schedule the install - Specify the schedule using the options in the Group Policy Setting. For more information about this setting, see Schedule update installation.

            5 - Allow local admin to choose setting - With this option, local administrators will be allowed to use the settings app to select a configuration option of their choice. Local administrators will not be allowed to disable the configuration for Automatic Updates. This option is not available in any Windows 10 or later versions.

            7 - Notify for install and notify for restart (Windows Server 2016 and later only) - With this option, when Windows finds updates that apply to this device, they will be downloaded, then users will be notified that updates are ready to be installed. Once updates are installed, a notification will be displayed to users to restart the device.

            ```powershell
            $keypath = "Registry::HKEY_LOCAL_MACHINE\Software\Policies\Microsoft\Windows\WindowsUpdate\AU"
            $keyname = "AUOptions"
            New-Item -Path $keypath -Name $keyname -Force
            Set-ItemProperty -Path $keypath -Name $keyname -Value "4"
            ```

            Configure Scheduled install day for every day (set to 0) under

            ```text
            Computer Configuration\Policies\Administrative Templates\Windows Components\Windows Update\Manage end user experience\Configure Automatic Updates: Scheduled install day
            ```

            ```powershell
            $keypath = "Registry::HKEY_LOCAL_MACHINE\Software\Policies\Microsoft\Windows\WindowsUpdate\AU"
            $keyname = "ScheduledInstallDay"
            New-Item -Path $keypath -Name $keyname -Force
            Set-ItemProperty -Path $keypath -Name $keyname -Value "0"
            ```

            Critical operating system updates and service packs will automatically download every day (at 3:00 A.M., by default).
        - id: ansible
          desc: |
            **Using Ansible**

            Configure automatic Windows updates using the following Ansible playbook:

            ```yaml
            ---
            - name: Enable Automatic Windows Update
              hosts: all

              tasks:
                - name: Ensure WindowsUpdate AU registry key exists
                  ansible.windows.win_regedit:
                    path: HKLM:\Software\Policies\Microsoft\Windows\WindowsUpdate\AU
                    state: present

                - name: Set AUOptions to 4 (auto download and schedule)
                  ansible.windows.win_regedit:
                    path: HKLM:\Software\Policies\Microsoft\Windows\WindowsUpdate\AU
                    name: AUOptions
                    data: 4
                    type: dword

                - name: Set ScheduledInstallDay to 0 (every day)
                  ansible.windows.win_regedit:
                    path: HKLM:\Software\Policies\Microsoft\Windows\WindowsUpdate\AU
                    name: ScheduledInstallDay
                    data: 0
                    type: dword
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/windows/deployment/update/waas-wu-settings
        title: Manage additional Windows Update settings
      - url: https://learn.microsoft.com/de-de/security-updates/windowsupdateservices/18127499
        title: Configure Automatic Updates in a Non–Active Directory Environment
  - uid: mondoo-windows-workstation-security-antivirus-installed
    title: Ensure AntiVirus is installed, enabled and up-to-date
    impact: 100
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-tvm-03
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-7
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-de-cm-4
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-3
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-2
      compliance/pci-dss-4: pcidss-requirement-6-3-3
      compliance/soc2-2017: soc2-control-cc6-8-4
      compliance/vda-isa-5: vda-isa-5-5-2-1
    mql: |
      windows.security.products.one(
        type == "antivirus" &&
        productState == "ON" &&
        signatureState == "UP-TO-DATE" &&
        timestamp - time.now < 25 * time.hour
      )
    docs:
      desc: |
        This check ensures that an antivirus product is installed, actively running, and using threat signatures updated within the last 25 hours. Current signatures and active scanning are what allow the product to recognize and block recent malware.

        **Why this matters**

        - **Real-time protection:** Active antivirus scans files as they are accessed, downloaded, or executed, blocking threats before they can run.
        - **Malware defense:** Antivirus products detect viruses, trojans, worms, spyware, and ransomware that would otherwise compromise data or disable the system.
        - **Fresh detection:** Up-to-date signatures are required to recognize newly released malware variants; stale signatures leave the device blind to current threats.
        - **Baseline control:** Endpoint malware protection is a fundamental security control expected by every major hardening benchmark.
      audit: |
        ### Audit via Windows Security

        1. Open **Windows Security** and select **Virus & threat protection**.
        2. Confirm that real-time protection is on and review the **Protection updates** date.

        The workstation passes when an antivirus product is enabled and its definitions are current. It fails if protection is off or the definitions are out of date.

        ### Audit via PowerShell

        1. Open an elevated PowerShell session.
        2. Display the antivirus product status:

           ```powershell
           Get-MpComputerStatus | Select-Object AMServiceEnabled, RealTimeProtectionEnabled, AntivirusSignatureLastUpdated
           ```

        The workstation passes when the antivirus service and real-time protection are enabled and the signatures were updated within the last 25 hours. It fails if protection is disabled or the signatures are older than 25 hours.
      remediation:
        - id: gui
          desc: |
            **Using the Windows interface**

            Complete the following steps to turn on Microsoft Defender Antivirus on your device.

            1. Select the Start menu.
            2. In the search bar, type Group Policy. Then select Edit Group Policy from the listed results. The Local Group Policy Editor opens.
            3. Select Computer Configuration > Administrative Templates > Windows Components > Microsoft Defender Antivirus.
            4. Scroll to the bottom of the list and select Turn off Microsoft Defender Antivirus.
            5. Select Disabled or Not configured. It might feel counter-intuitive to select these options because the names suggest that you're turning Microsoft Defender Antivirus off. Don't worry, these options actually ensure that it's turned on.
            6. Select Apply > OK.

            If running these manually, they must be run line by line in order to function properly.

            ```powershell
            Set-MpPreference -DisableRealtimeMonitoring $false
            Set-MpPreference -DisableIOAVProtection $false
            New-Item -Path "HKLM:\SOFTWARE\Policies\Microsoft\Windows Defender" -Name "Real-Time Protection" -Force
            New-ItemProperty -Path "HKLM:\SOFTWARE\Policies\Microsoft\Windows Defender\Real-Time Protection" -Name "DisableBehaviorMonitoring" -Value 0 -PropertyType DWORD -Force
            New-ItemProperty -Path "HKLM:\SOFTWARE\Policies\Microsoft\Windows Defender\Real-Time Protection" -Name "DisableOnAccessProtection" -Value 0 -PropertyType DWORD -Force
            New-ItemProperty -Path "HKLM:\SOFTWARE\Policies\Microsoft\Windows Defender\Real-Time Protection" -Name "DisableScanOnRealtimeEnable" -Value 0 -PropertyType DWORD -Force
            New-ItemProperty -Path "HKLM:\SOFTWARE\Policies\Microsoft\Windows Defender" -Name "DisableAntiSpyware" -Value 0 -PropertyType DWORD -Force
            start-service WinDefend
            start-service WdNisSvc
            ```
        - id: ansible
          desc: |
            **Using Ansible**

            Enable Microsoft Defender Antivirus using the following Ansible playbook:

            ```yaml
            ---
            - name: Enable Microsoft Defender Antivirus
              hosts: all

              tasks:
                - name: Ensure Real-Time Protection registry key exists
                  ansible.windows.win_regedit:
                    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows Defender\Real-Time Protection
                    state: present

                - name: Disable DisableBehaviorMonitoring
                  ansible.windows.win_regedit:
                    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows Defender\Real-Time Protection
                    name: DisableBehaviorMonitoring
                    data: 0
                    type: dword

                - name: Disable DisableOnAccessProtection
                  ansible.windows.win_regedit:
                    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows Defender\Real-Time Protection
                    name: DisableOnAccessProtection
                    data: 0
                    type: dword

                - name: Disable DisableScanOnRealtimeEnable
                  ansible.windows.win_regedit:
                    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows Defender\Real-Time Protection
                    name: DisableScanOnRealtimeEnable
                    data: 0
                    type: dword

                - name: Disable DisableAntiSpyware
                  ansible.windows.win_regedit:
                    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows Defender
                    name: DisableAntiSpyware
                    data: 0
                    type: dword

                - name: Enable real-time monitoring via PowerShell
                  ansible.windows.win_powershell:
                    script: |
                      Set-MpPreference -DisableRealtimeMonitoring $false
                      Set-MpPreference -DisableIOAVProtection $false

                - name: Start Windows Defender services
                  ansible.windows.win_service:
                    name: "{{ item }}"
                    state: started
                  loop:
                    - WinDefend
                    - WdNisSvc
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/mem/intune/user-help/turn-on-defender-windows
        title: Turn on Microsoft Defender Antivirus to access company resources
