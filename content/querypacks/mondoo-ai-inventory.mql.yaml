packs:
  - uid: mondoo-ai-inventory
    name: AI Tools Inventory Pack
    version: 1.0.0
    license: BUSL-1.1
    require:
      - provider: os
    authors:
      - name: Mondoo, Inc
        email: hello@mondoo.com
    tags:
      mondoo.com/platform: macos,linux,windows
      mondoo.com/category: best-practices
    summary: Inventory AI coding agents, skills, MCP servers, plugins, and extensions on endpoints
    docs:
      desc: |
        The AI Tools Inventory Pack by Mondoo discovers AI coding agents, their skills, MCP servers, plugins, IDE extensions, and browser extensions installed on endpoints. This query pack collects data only and does not enforce policy.

        Use this pack to gain visibility into AI tool usage across your fleet before enabling enforcement via the Mondoo AI Security policy.

        ## Local scan

        To run this pack locally:

        ```bash
        cnspec scan local -f mondoo-ai-inventory.mql.yaml
        ```

        ## Remote scan

        To run this pack against a remote host using SSH:

        ```bash
        cnspec scan ssh <user>@<ip_address> -i <identity_file> -f mondoo-ai-inventory.mql.yaml
        ```
    groups:
      - title: Asset Information
        filters: |
          asset.family.contains("unix") || asset.family.contains("windows")
        queries:
          - uid: mondoo-ai-inventory-asset-info
            title: Asset information
            docs:
              desc: Returns basic asset information for correlation.
            mql: asset { kind title platform name arch version }

      - title: AI Coding Agents
        filters: |
          asset.family.contains("unix") || asset.family.contains("windows")
        queries:
          - uid: mondoo-ai-inventory-claude-code
            title: Claude Code configuration
            docs:
              desc: Returns Claude Code agent configuration including account, organization, plugins, skills, and MCP servers.
            mql: |
              claude.code {
                configPath
                email
                organization
                role
                subscription
                enabledPlugins
                plugins { name version scope enabled }
                skills { name description allowedTools source sha256 }
                projects { path hasMemory }
                mcpServers { name needsAuth }
              }
          - uid: mondoo-ai-inventory-openai-codex
            title: OpenAI Codex CLI configuration
            docs:
              desc: Returns OpenAI Codex CLI configuration including account, plugins, skills, MCP servers, and OAuth connectors.
            mql: |
              openai.codex {
                configPath
                authMode
                accountId
                version
                plugins { name version author category capabilities hasMcp hasHooks }
                skills { name description source plugin sha256 }
                mcpServers { name type url plugin }
                connectors { name id plugin }
              }
          - uid: mondoo-ai-inventory-cursor
            title: Cursor editor configuration
            docs:
              desc: Returns Cursor editor configuration including MCP servers, rules, and skills.
            mql: |
              cursor {
                configPath
                mcpServers { name command url args hasEnv }
                rules { name source }
                skills { name description allowedTools source sha256 }
              }
          - uid: mondoo-ai-inventory-github-copilot
            title: GitHub Copilot configuration
            docs:
              desc: Returns GitHub Copilot configuration including authenticated accounts, MCP servers, and skills.
            mql: |
              github.copilot {
                configPath
                accounts { user githubAppId }
                mcpServers { name type command args }
                skills { name description allowedTools source sha256 }
              }
          - uid: mondoo-ai-inventory-windsurf
            title: Windsurf editor configuration
            docs:
              desc: Returns Windsurf editor configuration including rules, MCP servers, and skills.
            mql: |
              windsurf {
                configPath
                rules { name source }
                mcpServers { name command args hasEnv }
                skills { name description allowedTools source sha256 }
              }
          - uid: mondoo-ai-inventory-gemini
            title: Gemini CLI configuration
            docs:
              desc: Returns Gemini CLI configuration including authentication type, MCP servers, and skills.
            mql: |
              gemini {
                configPath
                authType
                mcpServers { name command args hasEnv }
                skills { name description allowedTools source sha256 }
              }
          - uid: mondoo-ai-inventory-goose
            title: Goose AI agent configuration
            docs:
              desc: Returns Goose AI agent configuration including provider, model, extensions, and skills.
            mql: |
              goose {
                configPath
                provider
                model
                telemetryEnabled
                extensions { name enabled type description }
                skills { name description allowedTools source sha256 }
              }
          - uid: mondoo-ai-inventory-zed
            title: Zed editor configuration
            docs:
              desc: Returns Zed editor configuration including extensions.
            mql: |
              zed {
                configPath
                extensions
              }

      - title: Lightweight AI Agents
        filters: |
          asset.family.contains("unix") || asset.family.contains("windows")
        queries:
          - uid: mondoo-ai-inventory-roo
            title: Roo Code skills
            docs:
              desc: Returns Roo Code agent skills.
            mql: roo { configPath skills { name description allowedTools sha256 } }
          - uid: mondoo-ai-inventory-cline
            title: Cline skills
            docs:
              desc: Returns Cline agent skills.
            mql: cline { configPath skills { name description allowedTools sha256 } }
          - uid: mondoo-ai-inventory-kiro
            title: Kiro skills
            docs:
              desc: Returns Kiro agent skills.
            mql: kiro { configPath skills { name description allowedTools sha256 } }
          - uid: mondoo-ai-inventory-continuedev
            title: Continue skills
            docs:
              desc: Returns Continue agent skills.
            mql: continuedev { configPath skills { name description allowedTools sha256 } }
          - uid: mondoo-ai-inventory-trae
            title: Trae skills
            docs:
              desc: Returns Trae agent skills.
            mql: trae { configPath skills { name description allowedTools sha256 } }
          - uid: mondoo-ai-inventory-opencode
            title: OpenCode skills
            docs:
              desc: Returns OpenCode agent skills.
            mql: opencode { configPath skills { name description allowedTools sha256 } }
          - uid: mondoo-ai-inventory-pi
            title: Pi skills
            docs:
              desc: Returns Pi agent skills.
            mql: pi { configPath skills { name description allowedTools sha256 } }
          - uid: mondoo-ai-inventory-mistral-vibe
            title: Mistral Vibe skills
            docs:
              desc: Returns Mistral Vibe agent skills.
            mql: mistral.vibe { configPath skills { name description allowedTools sha256 } }
          - uid: mondoo-ai-inventory-antigravity
            title: Antigravity skills
            docs:
              desc: Returns Antigravity (Google) agent skills.
            mql: antigravity { configPath skills { name description allowedTools sha256 } }
          - uid: mondoo-ai-inventory-ibm-bob
            title: IBM Bob skills
            docs:
              desc: Returns IBM Bob agent skills.
            mql: ibm.bob { configPath skills { name description allowedTools sha256 } }
          - uid: mondoo-ai-inventory-openclaw
            title: OpenClaw skills
            docs:
              desc: Returns OpenClaw agent skills.
            mql: openclaw { configPath skills { name description allowedTools sha256 } }
          - uid: mondoo-ai-inventory-snowflake-cortex
            title: Snowflake Cortex Code skills
            docs:
              desc: Returns Snowflake Cortex Code agent skills.
            mql: snowflake.cortex { configPath skills { name description allowedTools sha256 } }
          - uid: mondoo-ai-inventory-junie
            title: Junie skills
            docs:
              desc: Returns Junie (JetBrains) agent skills.
            mql: junie { configPath skills { name description allowedTools sha256 } }
          - uid: mondoo-ai-inventory-augment
            title: Augment skills
            docs:
              desc: Returns Augment agent skills.
            mql: augment { configPath skills { name description allowedTools sha256 } }
          - uid: mondoo-ai-inventory-warp
            title: Warp AI terminal skills
            docs:
              desc: Returns Warp AI terminal skills.
            mql: warp { configPath skills { name description allowedTools sha256 } }
          - uid: mondoo-ai-inventory-kilocode
            title: Kilo Code skills
            docs:
              desc: Returns Kilo Code agent skills.
            mql: kilocode { configPath skills { name description allowedTools sha256 } }
          - uid: mondoo-ai-inventory-openhands
            title: OpenHands skills
            docs:
              desc: Returns OpenHands agent skills.
            mql: openhands { configPath skills { name description allowedTools sha256 } }
          - uid: mondoo-ai-inventory-qwen-code
            title: Qwen Code skills
            docs:
              desc: Returns Qwen Code (Alibaba) agent skills.
            mql: qwen.code { configPath skills { name description allowedTools sha256 } }

      - title: IDE Extensions
        filters: |
          asset.family.contains("unix") || asset.family.contains("windows")
        queries:
          - uid: mondoo-ai-inventory-vscode-extensions
            title: VS Code and compatible editor extensions
            docs:
              desc: Returns all extensions installed across VS Code, Cursor, Windsurf, Kiro, Antigravity, Positron, and other compatible editors.
            mql: |
              vscode.extensions {
                identifier
                name
                version
                publisher
                editor
                categories
              }

      - title: Browser Extensions
        filters: |
          asset.family.contains("unix") || asset.family.contains("windows")
        queries:
          - uid: mondoo-ai-inventory-chrome-extensions
            title: Chrome extensions
            docs:
              desc: Returns all installed Chrome extensions.
            mql: chrome.extensions { name version }
          - uid: mondoo-ai-inventory-firefox-addons
            title: Firefox add-ons
            docs:
              desc: Returns all installed Firefox add-ons.
            mql: firefox.addons { name version }
          - uid: mondoo-ai-inventory-safari-extensions
            title: Safari extensions
            filters: asset.platform == "macos"
            docs:
              desc: Returns all installed Safari extensions (macOS only).
            mql: safari.extensions { name version }

      - title: Running AI Processes
        filters: |
          asset.family.contains("unix") || asset.family.contains("windows")
        queries:
          - uid: mondoo-ai-inventory-ai-processes
            title: Running AI-related processes
            docs:
              desc: Detects running processes for known AI coding agents and local LLM runtimes including Ollama, LM Studio, llama.cpp, LocalAI, GPT4All, Cursor, Windsurf, and Claude.
            mql: |
              processes.where(
                executable == /(?i)(ollama|llama|lmstudio|lm-studio|localai|gpt4all|cursor|windsurf|claude|copilot|codeium|tabby|codex|goose|zed|chatgpt)/
              ) {
                executable
                pid
                command
              }
          - uid: mondoo-ai-inventory-llm-listening-ports
            title: Local LLM listening ports
            docs:
              desc: Detects local LLM inference servers listening on known default ports (Ollama 11434, LM Studio 1234, LocalAI 1337).
            mql: |
              ports.listening.where(
                port == 11434 || port == 1234 || port == 1337
              ) {
                port
                protocol
                address
                process { executable }
              }

      - title: Installed AI Packages
        filters: |
          asset.family.contains("unix") || asset.family.contains("windows")
        queries:
          - uid: mondoo-ai-inventory-ai-packages
            title: Installed AI-related packages
            docs:
              desc: Detects AI coding agents and local LLM runtimes installed via system package managers.
            mql: |
              packages.where(
                name == /(?i)(ollama|llama-cpp|llama\.cpp|lm-studio|localai|gpt4all|claude|codex|copilot|cursor|windsurf|codeium|tabby|chatgpt|goose)/
              ) {
                name
                version
                format
              }
          - uid: mondoo-ai-inventory-homebrew-ai-packages
            title: Installed AI-related Homebrew packages
            filters: asset.platform == "macos"
            docs:
              desc: Detects AI tools installed via Homebrew on macOS, including both formulae and casks.
            mql: |
              homebrew.packages.where(
                name == /(?i)(ollama|llama|llama-cpp|lm-studio|localai|gpt4all|claude|cursor|windsurf|copilot|codex|chatgpt|goose|zed|warp)/
              ) {
                name
                version
                type
                appName
              }
