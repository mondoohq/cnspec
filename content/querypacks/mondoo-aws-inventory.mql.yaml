packs:
  - uid: mondoo-asset-inventory-aws
    name: AWS Asset Inventory Pack
    version: 1.2.0
    license: BUSL-1.1
    require:
      - provider: aws
    authors:
      - name: Mondoo, Inc
        email: hello@mondoo.com
    tags:
      mondoo.com/platform: aws,cloud
      mondoo.com/category: best-practices
    summary: Inventory AWS accounts, EC2, S3, IAM, and more
    docs:
      desc: |
        The AWS Asset Inventory Pack retrieves information about AWS accounts for asset inventory.
    groups:
      - uid: mondoo-asset-inventory-aws-general-group
        title: AWS General
        filters: asset.runtime == "aws"
        queries:
          - uid: mondoo-asset-inventory-aws-account-id
          - uid: mondoo-asset-inventory-aws-enabled-regions
      - uid: mondoo-asset-inventory-aws-iam-group
        title: AWS IAM
        filters: asset.runtime == "aws"
        queries:
          - uid: mondoo-asset-inventory-aws-iam-users
          - uid: mondoo-asset-inventory-aws-iam-groups
          - uid: mondoo-asset-inventory-aws-iam-roles
          - uid: mondoo-asset-inventory-aws-iam-policies
      - uid: mondoo-asset-inventory-aws-vpc-group
        title: AWS VPC
        filters: asset.runtime == "aws"
        queries:
          - uid: mondoo-asset-inventory-aws-vpcs
          - uid: mondoo-asset-inventory-aws-vpc-subnets
      - uid: mondoo-asset-inventory-aws-ec2-group
        title: Amazon EC2
        filters: asset.runtime == "aws"
        queries:
          - uid: mondoo-asset-inventory-aws-ec2-security-groups
          - uid: mondoo-asset-inventory-aws-ec2-volumes
          - uid: mondoo-asset-inventory-aws-ec2-retrieve-all-data
          - uid: mondoo-asset-inventory-aws-ec2-instances-exposure
          - uid: mondoo-asset-inventory-aws-eips
      - uid: mondoo-asset-inventory-aws-elb-group
        title: Elastic Load Balancing
        filters: asset.runtime == "aws"
        queries:
          - uid: mondoo-asset-inventory-aws-elb-loadbalancers
      - uid: mondoo-asset-inventory-aws-rds-group
        title: Amazon RDS
        filters: asset.runtime == "aws"
        queries:
          - uid: mondoo-asset-inventory-aws-rds-dbclusters-all-data
          - uid: mondoo-asset-inventory-aws-rds-dbinstances-all-data
      - uid: mondoo-asset-inventory-aws-s3-group
        title: Amazon S3 Bucket
        filters: asset.runtime == "aws"
        queries:
          - uid: mondoo-asset-inventory-aws-s3-retrieve-all-data
      - uid: mondoo-asset-inventory-aws-eks-group
        title: Amazon EKS Cluster
        filters: asset.runtime == "aws"
        queries:
          - uid: mondoo-asset-inventory-aws-eks-clusters
      - uid: mondoo-asset-inventory-aws-lambda-group
        title: AWS Lambda Function
        filters: asset.runtime == "aws"
        queries:
          - uid: mondoo-asset-inventory-aws-lambda
      - uid: mondoo-asset-inventory-aws-access-analyzer-group
        title: IAM Access Analyzer
        filters: asset.runtime == "aws"
        queries:
          - uid: mondoo-asset-inventory-aws-access-analyzer
      - uid: mondoo-asset-inventory-aws-acm-group
        title: AWS Certificate Manager
        filters: asset.runtime == "aws"
        queries:
          - uid: mondoo-asset-inventory-aws-acm-certificates
      - uid: mondoo-asset-inventory-aws-cloudtrail-group
        title: AWS CloudTrail
        filters: asset.runtime == "aws"
        queries:
          - uid: mondoo-asset-inventory-aws-cloudtrail-trails
      - uid: mondoo-asset-inventory-aws-waf-group
        title: AWS WAF
        filters: asset.runtime == "aws"
        queries:
          - uid: mondoo-asset-inventory-aws-waf-acls

queries:
  - uid: mondoo-asset-inventory-aws-account-id
    filters: asset.platform == "aws"
    title: AWS account ID
    docs:
      desc: |
        Returns the unique AWS account identifier for the scanned account.
    mql: |
      aws.account.id

  - uid: mondoo-asset-inventory-aws-enabled-regions
    title: Regions enabled in the AWS account
    filters: asset.platform == "aws"
    docs:
      desc: |
        This query retrieves all AWS regions enabled in the account
    mql: |
      aws { regions }

  - uid: mondoo-asset-inventory-aws-vpcs
    title: VPCs
    docs:
      desc: |
        This query retrieves all of the configuration data for AWS VPCs
    variants:
      - uid: mondoo-asset-inventory-aws-vpcs-all
      - uid: mondoo-asset-inventory-aws-vpcs-single
  - uid: mondoo-asset-inventory-aws-vpcs-all
    filters: asset.platform == "aws"
    mql: |
      aws.vpcs
  - uid: mondoo-asset-inventory-aws-vpcs-single
    filters: asset.platform == "aws-vpc"
    mql: |
      aws.vpc

  - uid: mondoo-asset-inventory-aws-vpc-subnets
    title: VPC subnets and route tables
    docs:
      desc: |
        Lists VPC subnets with whether they auto-assign public IPs and their route
        table routes (including internet-gateway routes), so public vs. private
        subnet placement can be determined for internet-exposure analysis.
    variants:
      - uid: mondoo-asset-inventory-aws-vpc-subnets-all
      - uid: mondoo-asset-inventory-aws-vpc-subnets-single
  - uid: mondoo-asset-inventory-aws-vpc-subnets-all
    filters: asset.platform == "aws"
    mql: |
      aws.vpcs {
        id
        subnets {
          id
          mapPublicIpOnLaunch
          routeTable {
            id
            routeEntries { destinationCidrBlock gatewayId natGatewayId state }
          }
        }
      }
  - uid: mondoo-asset-inventory-aws-vpc-subnets-single
    filters: asset.platform == "aws-vpc"
    mql: |
      aws.vpc {
        id
        subnets {
          id
          mapPublicIpOnLaunch
          routeTable {
            id
            routeEntries { destinationCidrBlock gatewayId natGatewayId state }
          }
        }
      }

  - uid: mondoo-asset-inventory-aws-iam-users
    title: IAM users
    docs:
      desc: |
        This query retrieves data for all IAM users
    variants:
      - uid: mondoo-asset-inventory-aws-iam-users-all
      - uid: mondoo-asset-inventory-aws-iam-users-single
  - uid: mondoo-asset-inventory-aws-iam-users-all
    filters: asset.platform == "aws"
    mql: |
      aws.iam.users
  - uid: mondoo-asset-inventory-aws-iam-users-single
    filters: asset.platform == "aws-iam-user"
    mql: |
      aws.iam.user

  - uid: mondoo-asset-inventory-aws-iam-groups
    title: IAM groups
    docs:
      desc: |
        This query retrieves all of the IAM groups.
    variants:
      - uid: mondoo-asset-inventory-aws-iam-groups-all
      - uid: mondoo-asset-inventory-aws-iam-groups-single
  - uid: mondoo-asset-inventory-aws-iam-groups-all
    filters: asset.platform == "aws"
    mql: |
      aws.iam.groups
  - uid: mondoo-asset-inventory-aws-iam-groups-single
    filters: asset.platform == "aws-iam-group"
    mql: |
      aws.iam.group

  - uid: mondoo-asset-inventory-aws-iam-roles
    title: IAM roles
    docs:
      desc: |
        This query retrieves all IAM Roles
    variants:
      - uid: mondoo-asset-inventory-aws-iam-roles-all
  - uid: mondoo-asset-inventory-aws-iam-roles-all
    filters: asset.platform == "aws"
    mql: |
      aws.iam.roles

  - uid: mondoo-asset-inventory-aws-iam-policies
    title: Attached IAM policies
    filters: asset.platform == "aws"
    docs:
      desc: |
        This query retrieves all IAM policies attached to a user, group, or role.
    mql: aws.iam.policies.where( attachmentCount > 0 )

  - uid: mondoo-asset-inventory-aws-ec2-security-groups
    title: EC2 Security Groups
    docs:
      desc: |
        This query retrieves all AWS EC2 Security Groups
    variants:
      - uid: mondoo-asset-inventory-aws-ec2-security-groups-all
      - uid: mondoo-asset-inventory-aws-ec2-security-groups-single
  - uid: mondoo-asset-inventory-aws-ec2-security-groups-all
    filters: asset.platform == "aws"
    mql: |
      aws.ec2.securityGroups
  - uid: mondoo-asset-inventory-aws-ec2-security-groups-single
    filters: asset.platform == "aws-security-group"
    mql: |
      aws.ec2.securitygroup

  - uid: mondoo-asset-inventory-aws-ec2-volumes
    title: EBS volumes
    docs:
      desc: |
        This query retrieves all AWS EBS volumes
    variants:
      - uid: mondoo-asset-inventory-aws-ec2-volumes-all
      - uid: mondoo-asset-inventory-aws-ec2-volumes-single
  - uid: mondoo-asset-inventory-aws-ec2-volumes-all
    filters: asset.platform == "aws"
    mql: |
      aws.ec2.volumes
  - uid: mondoo-asset-inventory-aws-ec2-volumes-single
    filters: asset.platform == "aws-ebs-volume"
    mql: |
      aws.ec2.volume

  - uid: mondoo-asset-inventory-aws-ec2-retrieve-all-data
    title: Running EC2 instances
    docs:
      desc: |
        Lists all running EC2 instances (excluding terminated) with their configuration details.
    variants:
      - uid: mondoo-asset-inventory-aws-ec2-retrieve-all-data-all
      - uid: mondoo-asset-inventory-aws-ec2-retrieve-all-data-single
  - uid: mondoo-asset-inventory-aws-ec2-retrieve-all-data-all
    filters: asset.platform == "aws"
    mql: |
      aws.ec2.instances.where(state != "terminated")
  - uid: mondoo-asset-inventory-aws-ec2-retrieve-all-data-single
    filters:
      - mql: asset.platform == "aws-ec2-instance"
      - mql: aws.ec2.instance.state != "terminated"
    mql: |
      aws.ec2.instance

  - uid: mondoo-asset-inventory-aws-ec2-instances-exposure
    title: EC2 instance internet exposure
    docs:
      desc: |
        For every non-terminated EC2 instance, returns its internet-exposure
        analysis: whether it is reachable from the internet, whether it has a
        public IP, whether it sits in a public subnet, the security-group ingress
        rules that open it, and any internet-facing load balancers that front it.
    variants:
      - uid: mondoo-asset-inventory-aws-ec2-instances-exposure-all
      - uid: mondoo-asset-inventory-aws-ec2-instances-exposure-single
  - uid: mondoo-asset-inventory-aws-ec2-instances-exposure-all
    filters: asset.platform == "aws"
    mql: |
      aws.ec2.instances.where(state != "terminated") {
        instanceId
        publicIp
        privateIp
        state
        vpc { id }
        subnet { id mapPublicIpOnLaunch }
        securityGroups { id }
        exposure {
          internetReachable
          hasPublicIp
          inPublicSubnet
          securityGroupAllowsIngress
          networkAclAllowsIngress
          openIngressRules { ipProtocol fromPort toPort ipRanges ipv6Ranges }
          internetFacingLoadBalancers { arn name dnsName }
        }
      }
  - uid: mondoo-asset-inventory-aws-ec2-instances-exposure-single
    filters:
      - mql: asset.platform == "aws-ec2-instance"
      - mql: aws.ec2.instance.state != "terminated"
    mql: |
      aws.ec2.instance {
        instanceId
        publicIp
        privateIp
        state
        vpc { id }
        subnet { id mapPublicIpOnLaunch }
        securityGroups { id }
        exposure {
          internetReachable
          hasPublicIp
          inPublicSubnet
          securityGroupAllowsIngress
          networkAclAllowsIngress
          openIngressRules { ipProtocol fromPort toPort ipRanges ipv6Ranges }
          internetFacingLoadBalancers { arn name dnsName }
        }
      }

  - uid: mondoo-asset-inventory-aws-eips
    title: Elastic IP addresses
    docs:
      desc: |
        Lists Elastic IP addresses and the instance / network interface they are
        associated with, mapping externally routable public IPs to resources.

        Elastic IPs are enumerated only at the account level — there is no
        standalone `aws-eip` asset platform — so this query has no `-single`
        variant (same pattern as the ACM and Access Analyzer queries above).
    variants:
      - uid: mondoo-asset-inventory-aws-eips-all
  - uid: mondoo-asset-inventory-aws-eips-all
    filters: asset.platform == "aws"
    mql: |
      aws.ec2.eips {
        publicIp
        attached
        privateIpAddress
        networkInterfaceId
        region
        instance { instanceId }
      }

  - uid: mondoo-asset-inventory-aws-elb-loadbalancers
    title: Load balancers (ALB/NLB/GWLB)
    docs:
      desc: |
        Lists Elastic Load Balancers with their scheme (internet-facing vs.
        internal), listeners, security groups, internet-exposure breakdown, and the
        targets they route to (EC2 instances / Lambda functions, plus registered
        instances for classic load balancers).
    variants:
      - uid: mondoo-asset-inventory-aws-elb-loadbalancers-all
      - uid: mondoo-asset-inventory-aws-elb-loadbalancers-single
  - uid: mondoo-asset-inventory-aws-elb-loadbalancers-all
    filters: asset.platform == "aws"
    mql: |
      aws.elb.loadBalancers {
        arn
        name
        scheme
        elbType
        dnsName
        region
        securityGroups { id }
        listeners { port protocol }
        targetGroups {
          arn
          targetType
          port
          ec2Targets { instanceId }
          lambdaTargets { name }
        }
        instances { instanceId }
        exposure { internetReachable publiclyAccessible securityGroupAllowsIngress }
      }
  - uid: mondoo-asset-inventory-aws-elb-loadbalancers-single
    filters: asset.platform == "aws-elb-loadbalancer"
    mql: |
      aws.elb.loadbalancer {
        arn
        name
        scheme
        elbType
        dnsName
        region
        securityGroups { id }
        listeners { port protocol }
        targetGroups {
          arn
          targetType
          port
          ec2Targets { instanceId }
          lambdaTargets { name }
        }
        instances { instanceId }
        exposure { internetReachable publiclyAccessible securityGroupAllowsIngress }
      }

  - uid: mondoo-asset-inventory-aws-rds-dbclusters-all-data
    title: RDS database clusters configuration
    docs:
      desc: |
        Lists all RDS database clusters with their configuration for inventory and security review.
    variants:
      - uid: mondoo-asset-inventory-aws-rds-dbclusters-all-data-all
  - uid: mondoo-asset-inventory-aws-rds-dbclusters-all-data-all
    filters: asset.platform == "aws"
    mql: |
      aws.rds.clusters

  - uid: mondoo-asset-inventory-aws-rds-dbinstances-all-data
    title: RDS database instances
    docs:
      desc: |
        Lists all RDS database instances with their configuration for inventory and security review.
    variants:
      - uid: mondoo-asset-inventory-aws-rds-dbinstances-all-data-all
      - uid: mondoo-asset-inventory-aws-rds-dbinstances-all-data-single
  - uid: mondoo-asset-inventory-aws-rds-dbinstances-all-data-all
    filters: asset.platform == "aws"
    mql: |
      aws.rds.instances
  - uid: mondoo-asset-inventory-aws-rds-dbinstances-all-data-single
    filters: asset.platform == "aws-rds-dbinstance"
    mql: |
      aws.rds.dbinstance

  - uid: mondoo-asset-inventory-aws-s3-retrieve-all-data
    title: S3 buckets
    docs:
      desc: |
        Lists all S3 buckets with their configuration for inventory and access policy review.
    variants:
      - uid: mondoo-asset-inventory-aws-s3-retrieve-all-data-all
      - uid: mondoo-asset-inventory-aws-s3-retrieve-all-data-single
  - uid: mondoo-asset-inventory-aws-s3-retrieve-all-data-all
    filters: asset.platform == "aws"
    mql: |
      aws.s3.buckets
  - uid: mondoo-asset-inventory-aws-s3-retrieve-all-data-single
    filters: asset.platform == "aws-s3-bucket"
    mql: |
      aws.s3.bucket

  - uid: mondoo-asset-inventory-aws-eks-clusters
    title: EKS clusters
    docs:
      desc: |
        Lists all EKS Kubernetes clusters with their configuration for inventory.
    variants:
      - uid: mondoo-asset-inventory-aws-eks-clusters-all
  - uid: mondoo-asset-inventory-aws-eks-clusters-all
    filters: asset.platform == "aws"
    mql: |
      aws.eks.clusters

  - uid: mondoo-asset-inventory-aws-lambda
    title: Lambda functions
    docs:
      desc: |
        Lists all Lambda serverless functions with their configuration for inventory.
    variants:
      - uid: mondoo-asset-inventory-aws-lambda-all
      - uid: mondoo-asset-inventory-aws-lambda-single
  - uid: mondoo-asset-inventory-aws-lambda-all
    filters: asset.platform == "aws"
    mql: |
      aws.lambda.functions
  - uid: mondoo-asset-inventory-aws-lambda-single
    filters: asset.platform == "aws-lambda-function"
    mql: |
      aws.lambda.function

  - uid: mondoo-asset-inventory-aws-access-analyzer
    title: Access Analyzers
    docs:
      desc: |
        Lists all IAM Access Analyzer instances that help identify unintended resource access.
    variants:
      - uid: mondoo-asset-inventory-aws-access-analyzer-all
  - uid: mondoo-asset-inventory-aws-access-analyzer-all
    filters: asset.platform == "aws"
    mql: |
      aws.iam.accessAnalyzer.analyzers

  - uid: mondoo-asset-inventory-aws-acm-certificates
    title: Certificate Manager certificates
    docs:
      desc: |
        Lists all ACM SSL/TLS certificates for tracking certificate inventory and expiration.
    variants:
      - uid: mondoo-asset-inventory-aws-acm-certificates-all
  - uid: mondoo-asset-inventory-aws-acm-certificates-all
    filters: asset.platform == "aws"
    mql: |
      aws.acm.certificates

  - uid: mondoo-asset-inventory-aws-cloudtrail-trails
    title: CloudTrail trails
    docs:
      desc: |
        Lists all CloudTrail trails configured for API activity logging and auditing.
    variants:
      - uid: mondoo-asset-inventory-aws-cloudtrail-trails-all
      - uid: mondoo-asset-inventory-aws-cloudtrail-trails-single
  - uid: mondoo-asset-inventory-aws-cloudtrail-trails-all
    filters: asset.platform == "aws"
    mql: |
      aws.cloudtrail.trails
  - uid: mondoo-asset-inventory-aws-cloudtrail-trails-single
    filters: asset.platform == "aws-cloudtrail-trail"
    mql: |
      aws.cloudtrail.trail

  - uid: mondoo-asset-inventory-aws-waf-acls
    title: WAF web ACLs
    docs:
      desc: |
        Lists WAFv2 web ACLs and the ARNs of the resources (e.g. Application Load
        Balancers) they protect, so internet-facing entry points can be checked for
        an attached web application firewall.
    variants:
      - uid: mondoo-asset-inventory-aws-waf-acls-all
  - uid: mondoo-asset-inventory-aws-waf-acls-all
    filters: asset.platform == "aws"
    mql: |
      aws.waf.acls {
        arn
        name
        scope
        associatedResources
      }
