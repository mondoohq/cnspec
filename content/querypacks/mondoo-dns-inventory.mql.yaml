packs:
  - uid: mondoo-dns-inventory
    name: DNS Inventory Pack
    version: 1.0.0
    license: BUSL-1.1
    require:
      - provider: network
    authors:
      - name: Mondoo, Inc
        email: hello@mondoo.com
    tags:
      mondoo.com/platform: host,network
      mondoo.com/category: security
    summary: Inventory DNS records and configurations
    docs:
      desc: |
        ### Overview

        Collects a domain's DNS records: the full record set and the mail exchanger (MX) records.

        ### Prerequisites

        To run this query pack, you will need to install the mql binary ([Get Started with mql](https://mondoo.com/docs/mql)).

        ### Run query pack

        To run this query pack against a Domain:

        ```bash
        cnspec scan host <domain> -f mondoo-dns-inventory.mql.yaml
        ```
    filters: asset.family.contains('network')
    queries:
      - uid: mondoo-dns-inventory-dns-records
        title: Retrieve information about DNS records
        docs:
          desc: Returns every DNS record for the domain, including A, AAAA, CNAME, MX, and TXT.
        mql: dns.params
      - uid: mondoo-dns-inventory-dns-mx-records
        title: Retrieve information about the MX records
        docs:
          desc: Returns the mail exchanger (MX) records with each host's domain name and preference value.
        filters: dns.params.MX.name != empty
        mql: dns.mx { domainName preference }
