packs:
  - uid: mondoo-asset-inventory-oci
    name: OCI Asset Inventory Pack
    version: 1.0.0
    license: BUSL-1.1
    require:
      - provider: oci
    authors:
      - name: Mondoo, Inc
        email: hello@mondoo.com
    tags:
      mondoo.com/platform: oci,cloud
      mondoo.com/category: best-practices
    summary: Inventory OCI tenancies, compute, networking, and storage
    docs:
      desc: |
        Collects Oracle Cloud Infrastructure (OCI) tenancy inventory: regions and compartments, identity and access management, compute instances and images, virtual cloud networks, and object storage.

        ## Authentication

        Scanning OCI requires API key authentication configured in your OCI CLI config file (`~/.oci/config`).

        ## Scan an OCI tenancy

        ```bash
        cnspec scan oci
        ```
    groups:
      - uid: mondoo-asset-inventory-oci-general-group
        title: OCI General
        filters: asset.runtime == "oci"
        queries:
          - uid: mondoo-asset-inventory-oci-tenancy-info
          - uid: mondoo-asset-inventory-oci-regions
          - uid: mondoo-asset-inventory-oci-compartments
      - uid: mondoo-asset-inventory-oci-iam-group
        title: Identity and Access Management
        filters: asset.runtime == "oci"
        queries:
          - uid: mondoo-asset-inventory-oci-iam-users
          - uid: mondoo-asset-inventory-oci-iam-groups
          - uid: mondoo-asset-inventory-oci-iam-policies
      - uid: mondoo-asset-inventory-oci-compute-group
        title: Compute
        filters: asset.runtime == "oci"
        queries:
          - uid: mondoo-asset-inventory-oci-compute-instances
          - uid: mondoo-asset-inventory-oci-compute-images
      - uid: mondoo-asset-inventory-oci-object-storage-group
        title: Object Storage
        filters: asset.runtime == "oci"
        queries:
          - uid: mondoo-asset-inventory-oci-object-storage-namespace
          - uid: mondoo-asset-inventory-oci-object-storage-buckets
      - uid: mondoo-asset-inventory-oci-network-group
        title: Networking
        filters: asset.runtime == "oci"
        queries:
          - uid: mondoo-asset-inventory-oci-network-vcns
          - uid: mondoo-asset-inventory-oci-network-security-lists

queries:
  # --- General ---
  - uid: mondoo-asset-inventory-oci-tenancy-info
    title: OCI tenancy information
    filters: asset.platform == "oci"
    docs:
      desc: |
        Returns the OCI tenancy name, ID, and description.
    mql: |
      oci.tenancy {
        id
        name
        description
      }

  - uid: mondoo-asset-inventory-oci-regions
    title: OCI subscribed regions
    filters: asset.platform == "oci"
    docs:
      desc: |
        Lists the regions the tenancy subscribes to, with each region's status and home-region flag.
    mql: |
      oci.regions {
        id
        name
        isHomeRegion
        status
      }

  - uid: mondoo-asset-inventory-oci-compartments
    title: OCI compartments
    filters: asset.platform == "oci"
    docs:
      desc: |
        Lists the tenancy compartments with their name, description, and state.
    mql: |
      oci.compartments {
        id
        name
        description
        state
      }

  # --- Identity and Access Management ---
  - uid: mondoo-asset-inventory-oci-iam-users
    title: IAM users
    filters: asset.platform == "oci"
    docs:
      desc: |
        Lists the IAM users with their state, MFA activation, email verification, capabilities, and last login.
    mql: |
      oci.identity.users {
        id
        name
        email
        emailVerified
        state
        mfaActivated
        created
        lastLogin
        capabilities
      }

  - uid: mondoo-asset-inventory-oci-iam-groups
    title: IAM groups
    filters: asset.platform == "oci"
    docs:
      desc: |
        Lists the IAM groups with their description, state, and creation time.
    mql: |
      oci.identity.groups {
        id
        name
        description
        state
        created
      }

  - uid: mondoo-asset-inventory-oci-iam-policies
    title: IAM policies
    filters: asset.platform == "oci"
    docs:
      desc: |
        Lists the IAM policies with their permission statements.
    mql: |
      oci.identity.policies {
        id
        name
        description
        state
        statements
      }

  # --- Compute ---
  - uid: mondoo-asset-inventory-oci-compute-instances
    title: Compute instances
    filters: asset.platform == "oci"
    docs:
      desc: |
        Lists the compute instances with their shape, state, availability and fault domain, and freeform tags.
    mql: |
      oci.compute.instances {
        id
        name
        state
        shape
        availabilityDomain
        faultDomain
        created
        freeformTags
      }

  - uid: mondoo-asset-inventory-oci-compute-images
    title: Compute images
    filters: asset.platform == "oci"
    docs:
      desc: |
        Lists the compute images with their operating system, version, and size.
    mql: |
      oci.compute.images {
        id
        name
        state
        operatingSystem
        operatingSystemVersion
        sizeInMBs
        created
      }

  # --- Object Storage ---
  - uid: mondoo-asset-inventory-oci-object-storage-namespace
    title: Object Storage namespace
    filters: asset.platform == "oci"
    docs:
      desc: |
        Returns the tenancy Object Storage namespace.
    mql: |
      oci.objectStorage.namespace

  - uid: mondoo-asset-inventory-oci-object-storage-buckets
    title: Object Storage buckets
    filters: asset.platform == "oci"
    docs:
      desc: |
        Lists the Object Storage buckets with their public access type, storage tier, versioning, KMS encryption key, and size.
    mql: |
      oci.objectStorage.buckets {
        name
        id
        publicAccessType
        storageTier
        versioning
        objectEventsEnabled
        replicationEnabled
        isReadOnly
        kmsKeyId
        approximateCount
        approximateSize
        created
      }

  # --- Networking ---
  - uid: mondoo-asset-inventory-oci-network-vcns
    title: Virtual Cloud Networks
    filters: asset.platform == "oci"
    docs:
      desc: |
        Lists the virtual cloud networks (VCNs) with their CIDR blocks and DNS configuration.
    mql: |
      oci.network.vcns {
        id
        name
        state
        cidrBlocks
        dnsLabel
        vcnDomainName
        created
      }

  - uid: mondoo-asset-inventory-oci-network-security-lists
    title: VCN security lists
    filters: asset.platform == "oci"
    docs:
      desc: |
        Lists the VCN security lists with their ingress and egress rules and parent VCN.
    mql: |
      oci.network.securityLists {
        id
        name
        state
        vcn { id }
        ingressSecurityRules
        egressSecurityRules
        created
      }
