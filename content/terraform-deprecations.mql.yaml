policies:
  - uid: terraform-deprecations
    name: Terraform HCL Deprecations Policy
    version: 0.3.0
    license: BUSL-1.1
    tags:
      mondoo.com/category: best-practices
      mondoo.com/platform: terraform
    require:
      - provider: terraform
    authors:
      - name: Christoph Hartmann
        email: chris@mondoo.com
    summary: Identify deprecated Terraform providers and configs
    docs:
      desc: |
        The Terraform HCL Deprecations policy identifies deprecated Terraform providers and configurations that should be updated to keep infrastructure-as-code maintainable, secure, and compatible with current tooling. This policy helps organizations spot deprecated resources and arguments before they break upgrades, leave behind insecure defaults, or block teams from adopting newer features and CVE fixes shipped in current provider releases.

        This policy provides checks across key Terraform deprecation areas:

        - Deprecated providers
        - Deprecated resource types and arguments
        - Legacy configurations replaced by newer equivalents

        Learn more about scanning Terraform in the [cnspec docs](https://mondoo.com/docs/cnspec/supplychain/terraform).

        Have suggestions for new checks in this policy? Visit our [cnspec repository](https://github.com/mondoohq/cnspec).
    groups:
      - title: Terraform Provider Deprecations
        filters: asset.platform == "terraform-hcl"
        checks:
          - uid: terraform-provider-deprecations-template
queries:
  - uid: terraform-provider-deprecations-template
    title: Ensure Terraform template provider is not used
    mql: |
      # ensure it is not used in required providers
      terraform.settings.requiredProviders.none(name == "template")
      # ensure it is not used in data sources
      terraform.datasources.none ( nameLabel == "template_file")
    docs:
      desc: |
        The Terraform template provider is deprecated and should not be used anymore.
      remediation: Remove the provider from your Terraform configuration
    refs:
      - url: https://github.com/hashicorp/terraform-provider-template/issues/85
        title: Terraform template provider archival GitHub issue
