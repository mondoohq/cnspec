packs:
  - uid: test-colon-pack
    name: Test colon syntax in querypack
    version: 1.0.0
    require:
      - provider: github
    filters: asset.platform == "github-org"
    queries:
      - uid: test-query-colon
        title: Test colon syntax
        mql: |
          github.organization {
            counterSum: totalPublicRepos + totalPrivateRepos
          }
