# Configuration for crate-ci/typos (see .github/workflows/spell-check.yaml)
# Docs: https://github.com/crate-ci/typos

[files]
extend-exclude = [
  # Generated code (*.vtproto.pb.go is covered by *.pb.go)
  "*.pb.go",
  "*.ranger.go",
  "*_gen.go",
  # Vendored / cloned dependency
  "cnquery/",
  # Test fixtures and captured command output
  "**/testdata/**",
  "**/iac-variant-testdata/**",
  "content/validation/cmd_data/**",
  # Dependency manifests (module paths / hashes, not prose)
  "go.mod",
  "go.sum",
  # Binary assets
  "*.gif",
  "*.png",
  "*.jpg",
  "*.jpeg",
  "*.svg",
  "*.ico",
]

# Project-specific terms typos misflags. Each maps the word to itself so typos
# treats it as correct. Matching is case-insensitive (covers AKS, Aks, aks).
[default.extend-words]
# Product / technology names
aks = "aks"             # Azure Kubernetes Service
hashi = "hashi"         # HashiCorp
copywrite = "copywrite" # HashiCorp copywrite tool
secur = "secur"         # RSA SecurID
ot = "ot"               # Operational Technology
rto = "rto"             # Recovery Time Objective
# Linux / NFS commands
chage = "chage"
exportfs = "exportfs"
# Accepted word variants
writeable = "writeable"
unparseable = "unparseable"
# Code identifiers and embedded data (CPU models, DMARC/registry values, ...)
doamin = "doamin"       # typo baked into an existing querypack UID; can't rename
attemps = "attemps"     # Alibaba RAM API parameter MaxLoginAttemps (upstream spelling)
encrypter = "encrypter"
childs = "childs"
datas = "datas"
pn = "pn"
nd = "nd"
ue = "ue"
ba = "ba"
fo = "fo"
mis = "mis"
